 turkish_focus:0 "Türkischer Fokus"
 TUR_industrial_effort:0 "Vollständiger Plan für die ersten fünf Jahre"
 TUR_industrial_effort_desc:0 "Wir müssen unser fünfjähriges Industrieprogramm abschließen, das wir zuvor für die industrielle Entwicklung unseres Landes geplant hatten."
 TUR_construction_effort:0 "Verstaatlichung ausländischer Fabriken"
 TUR_construction_effort_tt:0 "Nicht genügend Bauplätze für §YCivilian Factories§!"
 TUR_construction_effort_desc:0 "Vor dem Ersten Weltkrieg gehörten die wenigen Industriebetriebe auf unserem Territorium fast alle ausländischen Staaten. Wir können durch ihre Verstaatlichung zu unserer Produktion beitragen."
 TUR_production_effort:0 "Institut für Maschinenbau und Chemie"
 TUR_production_effort_tt:0 "Nicht genügend Bauplätze für §YMilitärfabrik§!"
 TUR_production_effort_desc:0 "Wir müssen dieses Institut eröffnen, um den Bedarf unserer jungen Republik an Waffen, Maschinen und chemischen Produkten zu decken und private Einrichtungen zu leiten."
 TUR_construction_effort_2:0 "Orientierung an der nationalen Industrie"
 TUR_construction_effort_tt:0 "Nicht genügend Bauplätze für §YCivilian Factories§!"
 TUR_construction_effort_2_desc:0 "Durch den weiteren Ausbau unserer Fabriken können wir die Produktion von Waren für den Handel und weitere Bauvorhaben beschleunigen."
 TUR_production_effort_2:0 "Erhöhen Sie die Anzahl der Waffenfabriken"
 TUR_production_effort_tt:0 "Nicht genügend Bauplätze für §YMilitärfabrik§!"
 TUR_production_effort_2_desc:0 "Ein neuer großer Krieg steht bevor. Wenn wir mit der Aufrüstung zögern, könnten wir unserem Land eine neue Zerstörung zufügen."
 TUR_production_effort_3:0 "Entwickeln Sie Flugzeugfabriken"
 TUR_production_effort_tt:0 "Nicht genügend Bauplätze für §YMilitärfabrik§!"
 TUR_production_effort_3_desc:0 "Wir haben in der Luftfahrt große Fortschritte gemacht. Wir müssen unsere Rüstungsfabriken erweitern, um die Produktion zu steigern."
 TUR_infrastructure_effort:0 "Verstaatlichung der Eisenbahnen"
 TUR_infrastructure_effort_desc:0 "Viele Eisenbahnstrecken in unserem Gebiet gehören Ausländern. Um unsere Vorherrschaft im Krieg zu sichern, müssen wir sie verstaatlichen."
 TUR_infrastructure_effort_tt:0 "Nicht genügend Bauplätze für §YInfrastruktur§!"
 TUR_infrastructure_effort_2:0 "Bemühungen um Eisennetzwerke"
 TUR_infrastructure_effort_2_desc:0 "Der weitere Ausbau unserer Infrastruktur wird die für geheime Hightech-Projekte notwendigen Transport- und Kommunikationsmittel ermöglichen."
 TUR_nuclear_effort:0 "Atomenergiebehörde"
 TUR_nuclear_effort_desc:0 "Obwohl die Welt in der Physik und Chemie so wichtige und gefährliche Entdeckungen macht, sind wir in Zukunft möglicherweise nicht mit größeren Bedrohungen konfrontiert. Diese Lücke müssen wir schließen."
 TUR_synth_oil_focus:0 "Petrol Ofisi Company"
 TUR_synth_oil_focus_desc:0 "Durch die Entwicklung unserer petrochemischen Industrie können wir einen Teil unseres Ölbedarfs decken, der nicht zu unseren natürlichen Ressourcen gehört." 
 TUR_mta:0 "MTA-Institut"
 TUR_mta_desc:0 "MTA steht für Mineralforschung und -exploration. Unser Land verfügt über reiche Bodenschätze. Bisher sind wir jedoch nicht kompetent genug, diese Mineralien zu fördern. Wir können unseren Ressourcenbedarf decken, indem wir unsere Bergbauaktivitäten unter einem Dach bündeln."
 TUR_establish_itu:0 "Gründung der Technischen Universität Istanbul"
 TUR_establish_itu_desc:0 "Die Folgen der jahrhundertelangen Rückständigkeit haben wir im Ersten Weltkrieg auf schmerzhafteste Weise erfahren müssen. Jetzt müssen wir schnell die Zeit schnappen und eine umfassende Mobilisierung der Wissenschaft einleiten."
 TUR_food_rationing_tickets:0 "Grundnahrungsmittel-Ticket"
 TUR_food_rationing_tickets_desc:0 "Kriegszustände können manchmal zu Versorgungsengpässen mit Grundnahrungsmitteln führen. Um Hamsterkäufe und Opportunismus zu verhindern und sicherzustellen, dass die Menschen in diesen schwierigen Zeiten gleichermaßen Zugang zu Grundnahrungsmitteln haben, ist eine Lebensmittelrationierung erforderlich."
 TUR_jew_scholars:0 "Jüdische Gelehrte"
 TUR_jew_scholars_desc:0 "Viele qualifizierte Wissenschaftler, die der Rassenpolitik der Nazis ausgesetzt sind, planen, Deutschland zu verlassen. Wir könnten sie in mein Land einladen und sie bitten, ihre wissenschaftliche Arbeit für uns fortzusetzen. Adolf Hitler dürfte diese Situation jedoch nicht gefallen."
 TUR_village_institutes:0 "Dorfinstitute"
 TUR_village_institutes_desc:0 "Der Kampf gegen die Unwissenheit ist wichtiger als der Kampf gegen den Feind. Mit diesem Modell der Internatsbildung könnten selbst die Kinder der armen anatolischen Bevölkerung große Künstler oder Wissenschaftler werden. Wir müssen eine bewusste ländliche Gemeinschaft schaffen, indem wir die Erfolge der Pilotprojekte in allen Bundesstaaten des Landes verbreiten."
 TUR_technology_sharing:0 "Technologieaustausch"
 TUR_technology_sharing_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion die Forschung und Entwicklung im Kriegsfall effizienter durchführen."
 TUR_Straits:0 "Lösung der Meerengenfrage"
 TUR_Straits_desc:0 "Die Einschränkungen, die uns das mit dem Vertrag von Lausanne unterzeichnete Meerengen-Abkommen auferlegt, sind besorgniserregend. Die Wiederaufnahme des Rüstungswettlaufs scheint ein Vorbote künftiger Probleme zu sein. Wir müssen eine Konferenz organisieren und die betroffenen Unterzeichnerstaaten über unseren Vorschlag informieren, wie wir unser Unbehagen und den Status der Meerengen ändern und das Problem grundlegend lösen können." 
 TUR_liberal_pm:0 "Proliberaler Premierminister"
 TUR_liberal_pm_desc:0 "Die liberale Wirtschaft ist die Dynamik der wirtschaftlichen Entwicklung. Wenn es einen freien Markt gibt, sind auch die Menschen frei und die Entwicklung wird schneller voranschreiten."
 TUR_statist_pm:0 "Pro-Etatismus-Premierminister"
 TUR_statist_pm_desc:0 "Wie wir in der Großen Depression gesehen haben, ist der freie Markt immer offen für Spekulationen. Die staatliche Wirtschaft ist das beste System, um Marktschwankungen auszugleichen."
 TUR_liberty_ethos:0 "Frieden zu Hause, Frieden in der Welt"
 TUR_liberty_ethos_desc:0 "Wenn die Staaten der Welt bereit sind, sich gegenseitig zu erwürgen, werden wir weiterhin überall für den Frieden eintreten. Solange das Leben einer Nation nicht in Gefahr ist, ist Krieg Mord."
 TUR_neutrality_focus:0 "Balance-Richtlinie"
 TUR_neutrality_focus_desc:0 "Im Falle eines möglichen Konflikts zwischen den Weltmächten müssen wir politisch und militärisch unsere Position beibehalten und neutral bleiben. Dies ist nicht unser Kampf."
 TUR_ww_mobilization:0 "Mobilisierung im Weltkrieg"
 TUR_ww_mobilization_desc:0 "Obwohl wir versucht haben, die Auswirkungen dieses globalen Krieges zu vermeiden, ist es an der Zeit, uns auf eine zunehmende Mobilität jenseits unserer Grenzen vorzubereiten. Die Bürger müssen darauf achten, ihren Verpflichtungen nachzukommen."
 TUR_allies_calls:0 "Verbündetenruf"
 TUR_allies_calls_desc:0 "Die an den Grenzen stationierten faschistischen Panzer waren der letzte Tropfen auf dem heißen Stein. Wir müssen uns auf die Seite Großbritanniens und seiner Verbündeten stellen und gegen diese arroganten Faschisten kämpfen und zur Ausrottung dieser kranken Ideologie in der Welt beitragen."
 TUR_marshall:0 "Marshallplan"
 TUR_marshall_desc:0 "Nach dem Zweiten Weltkrieg litt [TUR.GetName] wie alle europäischen Länder unter dieser Zerstörung. Indem wir diese Anstrengungen gezielt einsetzen und amerikanische Hilfe in Anspruch nehmen, können wir unsere militärische Lage teilweise verbessern. Natürlich müssen wir dafür einige Opfer bringen!"
 TUR_hatay_plebiscite:0 "[877.GetName] Referendum" 
 TUR_hatay_plebiscite_desc:0 "Wenn Frankreich einen Rückzug aus Syrien plant, will es die Herrschaft über [877.GetName] an Syrien übergeben. Das ist für uns inakzeptabel! Wir müssen Frankreich unverzüglich eine Note zukommen lassen und den Status von [877.GetName] durch ein Treffen in Genf besprechen. Wenn wir sie nicht annektieren können, müssen sie zumindest unabhängig sein."
 TUR_demands_hatay:0 "Annexion von [877.GetName]" 
 TUR_demands_hatay_desc:0 "Im vergangenen Jahr boten die Franzosen neutrale Wahlen an, da sie glaubten, Atatürk könne [877.GetName] mit Gewalt einnehmen. Mit diesem Abkommen hatten wir das Recht, über eine gewisse militärische Macht in [877.GetName] zu verfügen. Nun müssen wir die Annexion von [877.GetName] an unser Vaterland abschließen und den Willen unseres Großen Führers erfüllen, der lautet: „[877.GetName] ist mein persönlicher Fall!“ " 
 TUR_demand_hatay_threat:0 "[877.GetName] Anforderungen"
 TUR_saadabad_pact:0 "Saadabad-Pakt" 
 TUR_saadabad_pact_desc:0 "Aufgrund unserer Grenzkonflikte mit den Nachbarstaaten, insbesondere in unseren Grenzregionen, kommt es zu ungehemmten Aufständen kurdischer Stämme. Wir können diese Aufstände durch Freundschaftsabkommen mit unseren Nachbarn verhindern. Angesichts des bevorstehenden großen Krieges müssen wir auch die Unabhängigkeit unserer regionalen Freunde sichern."
 TUR_ankara_pact:0 "Ankara-Pakt" 
 TUR_ankara_pact_desc:0 "Ein Konflikt im Mittelmeerraum stellt unsere Nationalität in Frage. Mit diesem Pakt, den wir mit zwei europäischen Supermächten schließen, werden wir uns sicherer fühlen."
 TUR_national_oath:0 "Misak-i Milli"
 TUR_national_oath_desc:0 "Unsere wahren Grenzen sind die Grenzen, die wir bei der Unterzeichnung des Waffenstillstands von Mudros festgelegt haben. Die Besetzung eines Teils unseres Landes kann uns nicht davon abhalten, ihr rechtmäßiger Eigentümer zu sein. Die Tage, an denen wir unser Land zurückerhalten, sind nahe. Dies ist unser Nationaleid, Misak-i Milli."
 TUR_national_oath_threat:0 "Misak-i Milli" 
 TUR_western_attack:0 "Westthrakien oder Krieg"
 TUR_western_attack_desc:0 "Thrakien ist ein Ganzes. So wie sein Osten uns gehört, sollte auch der Westen uns gehören. Es ist Zeit, die Ägäischen Inseln, die die Alliierten durch Besatzung aufgegeben haben, an ihre wahren Besitzer zurückzugeben. Griechenland wird für seine historischen Diebstähle bezahlen."
 TUR_western_attack_threat:0 "Bedrohungen für Westthrakien und die Inseln"
 TUR_rumelia_attack:0 "Rettet Ostrumelien"
 TUR_rumelia_attack_desc:0 "In Ostrumelien leben noch immer Hunderttausende türkischer und muslimischer Bevölkerungsgruppen. Wir werden die Gewalt einsetzen, um die Traumata des Balkankrieges auszulöschen und sie wieder zu bewahren."
 TUR_rumelia_attack_threat:0 "Bajonette durch Ostrumelien"
 TUR_musul_offensive:0 "Muslimische Offensive"
 TUR_musul_offensive_desc:0 "Mossul ist turkmenisches Heimatland. Die Turkmenen werden unter türkischer Flagge leben, unabhängig davon, ob sich die Alliierten aus den von ihnen besetzten Gebieten zurückziehen oder nicht. Dafür riskieren wir sogar den Krieg."
 TUR_musul_offensive_threat:0 "Muslimische Drohungen"
 TUR_halep_offensive:0 "Halep-Offensive"
 TUR_halep_offensive_desc:0 "Aleppo ist turkmenisches Heimatland. Die Turkmenen werden unter türkischer Flagge leben, unabhängig davon, ob sich die Alliierten aus den von ihnen besetzten Gebieten zurückziehen oder nicht. Dafür riskieren wir sogar den Krieg."
 TUR_halep_offensive_threat:0 "Halep-Bedrohungen"
 TUR_crete:0 "Südägäische Festung"
 TUR_crete_desc:0 "Es ist Zeit, Kreta zurückzuerobern, wo wir vor 50 Jahren mit Tricks, mit Blut und Schießpulver verloren haben. Dieses Mal werden die europäischen Staaten nur zusehen."
 TUR_crete_threat:0 "Kochendes Wasser in der Ägäis"
 TUR_onikiada:0 "Tränen-Augen-Behandlung"
 TUR_onikiada_desc:0 "Der Dodekanes wurde uns 1912 zu Unrecht weggenommen und vorübergehend Italien überlassen. Die Worte wurden jedoch nicht eingehalten und waren dauerhaft mit dem Ersten Weltkrieg beschäftigt. Dieser Deal ist Diebstahl!"
 TUR_onikiada_threat:0 "Tränen-Augen-Behandlung"
 TUR_mediterranean_dominance:0 "Dominanz im östlichen Mittelmeerraum"
 TUR_mediterranean_dominance_desc:0 "Die Festung des östlichen Mittelmeers war in der Vergangenheit vielleicht mit Tischtricks besetzt. Doch das schmerzhafte 19. Jahrhundert ist vorbei. Im 20. Jahrhundert werden wir wieder die Herrscher des östlichen Mittelmeers sein."
 TUR_mediterranean_dominance_threat:0 "Östliches Mittelmeer" 
 TUR_eastern_attack:0 "Ostoffensive"
 TUR_eastern_attack_desc:0 "Die Sowjets verfolgen die Menschen in Batumi, die wir im Stich gelassen haben, weil sie im Unabhängigkeitskrieg geholfen haben. Wir müssen auf die Hilferufe hören und sie aus dieser Verfolgung befreien."
 TUR_eastern_attack_threat:0 "Ostoffensive"  
 TUR_bygone_spirit:0 "Vergangener Geist"
 TUR_bygone_spirit_desc:0 "Wir sind die Enkel einer Nation mit einer ruhmreichen Geschichte. Nach einigen Jahrhunderten des Rückschritts scheint dieser mit unseren jüngsten militärischen Erfolgen endlich beendet zu sein. Wir stehen kurz davor, wieder Eigentümer Mitteleuropas, des Nahen Ostens und des Kaukasus zu werden."
 TUR_balkan_revenge:0 "Balkan Revenge"
 TUR_balkan_revenge_desc:0 "Wir haben unsere Macht zurückgewonnen und sind bereit für den dritten Balkankrieg, um die Gebiete zurückzugewinnen, die wir in der Vergangenheit verloren haben."
 TUR_balkan_revenge_threat:0 "Balkankrieg III"  
 TUR_desert_dominance:0 "Wüstendominanz"
 TUR_desert_dominance_desc:0 "Wir brauchen mehr Öl und natürliche Ressourcen, um unsere Armee und Technologie voranzubringen. Der beste Weg, unsere Verteidigungslinien zu lockern, besteht darin, unsere Feinde in die Schrecken der Wüste zu verschleppen."
 TUR_desert_dominance_threat:0 "Wüstendominanz"  
 TUR_caucasian_attack:0 "Kaukasische Offensive"
 TUR_caucasian_attack_desc:0 "Um unsere Verteidigung zu stärken, müssen wir unsere Grenzen bis zum Kaukasusgebirge ziehen und eine Verbindung zu den Turkvölkern Aserbaidschans und Zentralasiens aufbauen."
 TUR_caucasian_attack_threat:0 "Kaukasische Offensive"
 TUR_azerbaijan_brotherhood:0 "Aserbaidschanische Bruderschaft"
 TUR_azerbaijan_brotherhood_desc:0 "Wir sollten unsere befreundeten aserbaidschanischen Türken gegen die sowjetische Bedrohung unserer Ostgrenzen organisieren. Durch Propaganda in der Sowjetunion und im Iran können wir den ersten Schritt zur Vereinigung der Türken der Welt tun."
 TUR_azerbaijan_brotherhood_threat:0 "Aserbaidschanische Bruderschaft"
 TUR_ban_fascism:0 "Ban Fascism Trends"
 TUR_ban_fascism_desc:0 "Die überwältigenden Siege der deutschen Armeen seit Kriegsbeginn haben selbst in neutralen Ländern für Aufregung gesorgt. Infolgedessen nimmt die Zahl prodeutscher Organisationen, Ideen und Schriften in unserem Volk täglich zu. Wir müssen die Gefahr eines möglichen Aufstands sofort eindämmen."
 TUR_metropols:0 "Metropolen"
 TUR_metropols_desc:0 "Unsere Industrie wächst täglich. Doch die Unzulänglichkeit unserer Industriegebiete bremst diese Entwicklung. Wir müssen neue Industriegebiete erschließen, indem wir die Bildung von Metropolen fördern."
 TUR_ankara_radio:0 "Ankara Radio"
 TUR_ankara_radio_desc:0 "Wir müssen diese Initiative umsetzen, damit nationale Publikationen, Nachrichten und Propaganda bis in die entlegensten Winkel verbreitet werden. Diese Arbeit wird auch für unsere Radiotechnologie von Nutzen sein."
 TUR_religious:0 "Lockern Sie die religiösen Zwänge"
 TUR_religious_desc:0 "Die Revolutionen zwangen uns, auch in Bezug auf die Religion radikale Entscheidungen zu treffen. Wir müssen jedoch möglicherweise einige dieser Entscheidungen aufgeben, um die Einheit und Solidarität in unserem Land zu stärken, während der Krieg vor der Tür steht."
 TUR_civil_defense_measures:0 "Zivilschutzmaßnahmen"
 TUR_civil_defense_measures_desc:0 "Die Bevölkerung sollte nicht verzweifelt vor möglichen Bombardierungen und chemischen Angriffen zurückschrecken. Sie muss psychologisch und physisch auf den Krieg vorbereitet sein, um die Angriffe so gering wie möglich zu halten. Aus diesem Grund sollte die Bevölkerung mit ausreichend Gasmasken ausgestattet und Übungen für nächtliche Verdunkelungen und Luftangriffe durchgeführt werden."
 TUR_rewear_uniforms:0 "Wiederverwendbare Uniformen"
 TUR_rewear_uniforms_desc:0 "Wir sind seit jeher die Söhne einer Armeenation. Wir wurden ausgesandt, um diese Welt zu bekämpfen. Es ist Zeit, unsere Militäruniformen wieder anzuziehen."
 TUR_italy_visitation:0 "Italien-Besuch"
 TUR_italy_visitation_desc:0 "Wir fragen uns, wie das faschistische Regierungssystem funktioniert. Schicken Sie unseren Generalsekretär Recep Peker nach Italien, um das faschistische System zu untersuchen und einen Bericht zu erstellen."
 TUR_fascist_council_law:0 "Faschistisches Rätegesetz"
 TUR_fascist_council_law_desc:0 "Als Recep Peker in unsere Hauptstadt zurückkehrte, unterbreitete er der Regierung in seinem Bericht einen Vorschlag. Aufgrund dieses Berichts sollte ein faschistischer Rat über der Großen Versammlung eingesetzt werden. Erteilen Sie der Regierung den Auftrag, diesen Vorschlag umzusetzen."
 TUR_ultranationalismx:0 "Ultranationalismus"
 TUR_ultranationalismx_desc:0 "Der Krieg steht vor der Tür. Mit nationalistischer Propaganda können wir unsere Nation stärken und den Feind von unserem Land fernhalten, falls er uns angreift."
 TUR_panturkism:0 "Panturkismus"
 TUR_panturkism_desc:0 "Für Ausländer und Minderheiten ist auf unserem türkischen Boden kein Platz. Auch viele unserer Landsleute leben unter kommunistischer Besatzung. Wir sollten sie retten und ihnen ihre Unabhängigkeit geben."
 TUR_reopen_turk_ocaklari:0 "Reopen Türk Ocaklari"
 TUR_reopen_turk_ocaklari_desc:0 "Türk Ocaklari (Türkische Herde) war eine nationalistische Gesellschaft. Sie wurde 1931 in Gemeinschaftshäuser und kemalistische Propagandazentren umgewandelt. Jetzt ist es an der Zeit, diese Gesellschaften wieder zu eröffnen und mehr junge Menschen für unsere Sache zu gewinnen."
 TUR_kizil_elma:0 "Kizil Elma"
 TUR_kizil_elma_desc:0 "Kizil Elma (Roter Apfel) ist in der türkischen Mythologie ein Ideal der Eroberung der gesamten bekannten Welt und der Herrschaft unter einem türkischen Khaganat. Es ist nun unsere Pflicht, die Träume unserer Vorfahren, der Oghusen, zu verwirklichen."
 TUR_national_chief:0 "Nationaler Chef"
 TUR_national_chief_desc:0 "Demokratie ist eine große Lüge. Die falsche Entscheidung unseres Volkes könnte das Schicksal unserer Nation beeinträchtigen. Die Türken sollten nur unter einem großen, mächtigen Führer regieren."
 TUR_trotsky_plot:0 "Trotzki-Zusammenarbeit"
 TUR_trotsky_plot_desc:0 "Trotzki lebte in Istanbul und verließ unser Land 1933. Wir haben gehört, dass die Sowjets ihn zur Untersuchung durchsuchten. Durch die Zusammenarbeit mit der Sowjetregierung können wir gute Beziehungen aufbauen."
 TUR_mustafa_suphi_spirit:0 "Mustafa Suphi Spirit"
 TUR_mustafa_suphi_spirit_desc:0 "Mustafa Suphi war Anfang der 1920er Jahre ein kommunistischer Führer. Während des Unabhängigkeitskrieges kam er 1921 unter verdächtigen Umständen am Schwarzen Meer ums Leben. Jahre nach dem Vorfall wurden Versuche unternommen, die Verantwortlichen zu ermitteln, und die Regierung erklärte sich durch offizielle Geständnisse bereit, die Verantwortung zu übernehmen."
 TUR_reinvite_nazim_hikmet:0 "Abberufung von Nazim Hikmet "
 TUR_reinvite_nazim_hikmet_desc:0 "Nazim Hikmet ist ein berühmter kommunistischer türkischer Dichter. Kurz nach seiner Verurteilung zu einer Gefängnisstrafe flüchtete er unter Verdacht nach Russland. Doch die Bedingungen haben sich geändert, und die Meinung, dass wir diesen Wert übernehmen sollten, hat sich weit verbreitet. Wir brauchen seine Poesie und sein propagandistisches Talent."
 TUR_expand_communist_youth_organisation:0 "Kommunistische Jugendorganisation erweitern"
 TUR_expand_communist_youth_organisation_desc:0 "Die Kommunistische Jugendorganisation war eine inoffizielle Jugendorganisation der TKP, die darum kämpfte, mehr Kommunisten für unsere Sache zu gewinnen. Sie wurde 1935 geschlossen und für illegal erklärt. Diese Situation hat unserer Sache großen Schaden zugefügt. Jetzt ist unsere Ära angebrochen. Wir müssen diese Organisationen wiedereröffnen und ausbauen."
 TUR_educate_proleteriat:0 "Erziehe das Proletariat"
 TUR_educate_proleteriat_desc:0 "Der Weg zum Kommunismus führt über die Ausbildung von Bauern und Arbeitern. Ihre Sensibilisierung wird dazu beitragen, dass die Revolution auf einem soliden Fundament steht und das Proletariat moderne Produktionstechniken entwickelt."
 TUR_galiyevism:0 "Galijewismus"
 TUR_galiyevism_desc:0 "Faschistische Armeen stehen vor unserer Tür. Wir brauchen mehr Verbündete, um die faschistischen Schweine zurückzuschlagen. Wir glauben, dass wir eine Spaltung herbeiführen können, indem wir unter der Führung des vor Jahren inhaftierten großen tatarisch-kommunistischen Führers Mirsaid Sultan Galiev ein Abkommen mit den Sowjets, den tatarischen und baschkirischen Muslimen schließen."
 TUR_comrade:0 "Genosse Anführer"
 TUR_comrade_desc:0 "Unsere klassenlose Gesellschaft möchte sich um einen mächtigen und gerechten Führer scharen. Dann lasst uns ihm mehr Autorität verleihen."
 TUR_extra_tech_slot:0 "Zusätzlicher Forschungsplatz"
 TUR_extra_tech_slot_desc:0 "Unsere industrielle Expansion und andere aktuelle Fortschritte könnten es uns ermöglichen, parallel mehr Forschung und Entwicklung durchzuführen."
 TUR_harp_okulu:0 "Türkische Militärakademie"
 TUR_harp_okulu_desc:0 "Der Ausbau der Militärakademien wird dafür sorgen, dass unsere Armee mehr sachkundige und qualifizierte Offiziere ausbildet."
 TUR_harp_akademisi:0 "Militärakademie Ankara"
 TUR_harp_akademisi_desc:0 "Talentierte Armeen werden durch begabte Kommandeure hervorgebracht. Ein guter Führungsstab muss aus talentierten und würdigen Stabsoffizieren bestehen. Wir müssen diese Akademien eröffnen, um die taktischen Fähigkeiten unserer Armeekommandeure zu verbessern."
 TUR_improve_infantry:0 "Infanterie verbessern"
 TUR_improve_infantry_desc:0 "Die Grenzen der Ausrüstung, die von Infanterie getragen werden kann, werden ständig erweitert. Wir werden uns darauf konzentrieren, unseren Truppen die beste verfügbare Ausrüstung zur Verfügung zu stellen."
 TUR_armor_effort:0 "Panzerdivision"
 TUR_armor_effort_desc:0 "Wenn die Feuerkraft unserer Infanterie nicht ausreicht, müssen wir mit unseren Panzern helfen. Mit Stahl und Schießpulver werden wir die feindlichen Linien in Stücke reißen."
 TUR_armor_effort_tt:0 "§GTank-Kauf ist jetzt verfügbar§!"
 TUR_thrace_maneuvers:0 "Italien und Deutschland führen Thrakien-Manöver durch" 
 TUR_thrace_maneuvers_desc:0 "Die aggressiven Rüstungswettläufe Italiens und Deutschlands gelten als Vorbote eines neuen Krieges, der die Grenzen Europas verändern wird. Türkische Politiker, allen voran Atatürk, planen Militärübungen, um die militärische Leistungsfähigkeit der Streitkräfte und mögliche Verteidigungsmaßnahmen zu prüfen." 
 TUR_thrace_maneuvers_tt:0 "Fügen Sie §Y8 Landfestungen§! an den Grenzlinien hinzu.\n"
 TUR_expand_cakmak_line:0 "Erweitern Sie die Çakmak-Linie" 
 TUR_expand_cakmak_line_desc:0 "Inspiriert von der Maginot-Linie wurde die Idee zum Bau der Çakmak-Linie einige Jahre vor dem Krieg aufgeworfen. Sie wurde jedoch sowohl hinsichtlich der Rohstoffe als auch der Militärdoktrin, die Atatürk bis zu seinem Lebensende verteidigt hatte, als unnötig erachtet und nur ein kleiner Teil davon umgesetzt. Doch nun steht der Krieg vor der Tür und wir müssen zusätzliche Maßnahmen ergreifen." 
 TUR_expand_cakmak_line_tt:0 "Fügen Sie §Y8 Landfestungen§! zu den Verteidigungslinien hinzu.\n"
 TUR_eastern_front_observer:0 "Beobachter der Ostfront"
 TUR_eastern_front_observer_desc:0 "Die deutschen und sowjetischen Streitkräfte bereiten sich auf eine große Herausforderung auf dem Schlachtfeld vor. Wir können insbesondere Erfahrungen mit schweren Panzern sammeln, indem wir eine Delegation entsenden, die die Vorbereitungen für die Schlacht vor Ort besichtigt."
 TUR_mechanization_effort:0 "Armeemechanisierung"
 TUR_mechanization_effort_desc:0 "Indem wir die Möglichkeiten der motorisierten Infanterie überdenken, können wir die Grenzen der heute konstruierbaren Fahrzeuge erweitern."
 TUR_special_forces:0 "Spezial- und Hilfseinheiten"
 TUR_special_forces_desc:0 "Kämpfe in der Ebene, in den Bergen und in den Städten reichen nicht aus. Wir müssen in den Bergen, an der Küste und hinter feindlichen Linien kämpfen, wo der Feind es nie erwartet. Diese Soldaten müssen über das normale Training hinaus ausgebildet werden."
 TUR_gata:0 "GATA"
 TUR_gata_desc:0 "Die Kapazität unserer Militärkrankenhäuser wird von Tag zu Tag unzureichend. Wir müssen die Militärmedizinische Akademie Gülhane ausbauen, um neue Militärkrankenhäuser und mehr medizinisches Personal auszubilden."
 TUR_heavy_guns:0 "Modernisierung schwerer Waffen"
 TUR_heavy_guns_desc:0 "Mit der Weiterentwicklung gepanzerter Fahrzeuge und Kampftaktiken steigt auch der Bedarf an schweren Waffen. Wir müssen darauf vorbereitet sein, den Taktiken unserer potenziellen Feinde Widerstand zu leisten."
 TUR_tank_attempts:0 "Panzerentwicklungsversuche"
 TUR_tank_attempts_desc:0 "Als Notwendigkeit der modernen Zeit nimmt die Bedeutung der Mechanisierung von Tag zu Tag zu. Wir müssen unsere Kavallerieeinheiten mechanisieren und ihre Manövrierfähigkeit erhöhen."
 TUR_istanbul_defence_plans:0 "Istanbuler Verteidigungspläne"
 TUR_istanbul_defence_plans_desc:0 "Istanbul ist sowohl historisch als auch wirtschaftlich die wichtigste Stadt für uns. Deshalb müssen wir sie um jeden Preis verteidigen. Bereiten Sie sie sofort auf mögliche Luft- und Bodenangriffe vor."
 TUR_istanbul_defence_plans_tt:0 "Fügen Sie §Y5 Flugabwehr§! und §Y5 Landfestungen§! in §YIstanbul§! hinzu."
 TUR_invite_ford:0 "Ford Motor Company einladen"
 TUR_invite_ford_desc:0 "Eine Industrieinvestition des großen Motorenherstellers Ford in unserem Land wird unsere Automobilindustrie revolutionieren. Wir hoffen auf die Annahme unserer Einladung."
 TUR_north_africa_observation:0 "Beobachtung der Nordafrika-Kampagne"
 TUR_north_africa_observation_desc:0 "In Nordafrika kämpfen die anglo-italienischen und deutsch-englischen Armeen mit aller Gewalt. Die Entsendung eines Beobachters zu den Panzerkämpfen vor der Großoffensive wäre für uns eine goldene Gelegenheit."
 TUR_helmets_masks:0 "Helme &amp; Gasmasken"
 TUR_helmets_masks_desc:0 "Obwohl unsere Armee hinsichtlich ihrer Ausbildung eine abschreckende Wirkung hat, mangelt es ihr an der Ausrüstung. Diese Helme werden das erste Geschenk Großbritanniens sein, das uns im Krieg auf seine Seite ziehen will."
 TUR_cakmak_retirement:0 "Fevzi Çakmak in den Ruhestand schicken"
 TUR_cakmak_retirement_desc:0 "Feldmarschall Fevzi Çakmak Pascha hat unsere Armee jahrzehntelang hingebungsvoll geführt. Sein Alter liegt jedoch mittlerweile bei fast 70 Jahren und er hinkt den sich verändernden Welt- und Militärentwicklungen hinterher. Es wäre für jeden gut, den Rest seines Lebens mit Ruhe zu verbringen."
 TUR_reorganise_army:0 "Armee neu organisieren"
 TUR_reorganise_army_desc:0 "Auch wenn der Rücktritt von Fevzi Çakmak Pascha unsere Armee tief erschüttert, bietet er eine große Chance zur Umstrukturierung und Modernisierung. Die Taktik und Ausrüstung des Ersten Weltkriegs sind heute weit überholt. Jetzt ist es an der Zeit, schnell auf die moderne Kriegsführung umzusteigen."
 TUR_aviation_schools:0 "Flugzeugschulen"
 TUR_aviation_schools_tt:0 "Nicht genügend Bauplätze für §YAir Base§!"
 TUR_aviation_schools_desc:0 "Nationen, die ihren Himmel nicht kontrollieren können, sind dazu verdammt, irgendwo zu verkriechen und im Boden zu verrotten. Der Sieg liegt nicht mehr an der Spitze des Bajonetts. Der Siegesadler erhob sich von der Spitze des Bajonetts, hob ab und ließ sich auf den Flügeln des Flugzeugs nieder."
 TUR_fighter_focus:0 "Kampfflugzeugmodelle"
 TUR_fighter_focus_desc:0 "Die Lösung der Luftüberlegenheit besteht darin, feindliche Flugzeuge zu stoppen und zu zerstören, bevor sie ihre Ziele erreichen. Wir müssen unsere Luftüberlegenheit durch die Entwicklung schnellerer und stärkerer Kampfflugzeuge stärken."
 TUR_CAS_effort:0 "CAS-Modelle"
 TUR_CAS_effort_desc:0 "Eine moderne Armee benötigt Fahrzeugunterstützung nicht nur am Boden, sondern auch in der Luft."
 TUR_aviation_academy:0 "Luftfahrt-Kriegsakademie"
 TUR_aviation_academy_desc:0 "Indem wir die Entwicklungen in der Luftfahrt verfolgen, müssen wir sie zu einer unabhängigen Kraft machen und nicht nur Piloten, sondern auch qualifizierte Flugoffiziere ausbilden."
 TUR_bomber_focus:0 "Taktische Luftflotte"
 TUR_bomber_focus_desc:0 "Das Blockieren feindlicher Flugzeuge dient lediglich der Verteidigung unserer gegenwärtigen Lage. Um einen endgültigen Sieg zu erringen, müssen wir die Manövrierfähigkeit und Produktionskapazität unseres Feindes durch die Zerstörung seiner Industrie- und Infrastruktureinrichtungen einschränken."
 TUR_air_brigades:0 "Luftbrigaden"
 TUR_air_brigades_desc:0 "Die verstärkte Präsenz unseres Luftwaffenstabs macht es erforderlich, dass unsere Streitkräfte von höheren Kommandostellen kommandiert werden."
 TUR_air_force_command:0 "Einrichtung des Oberkommandos der Luftstreitkräfte"
 TUR_air_force_command_desc:0 "Die anhaltenden Luftkämpfe mit all ihrer Gewalt zeigen, dass für einen effizienten und effektiven Einsatz der Luftstreitkräfte alle Lufteinheiten einem unabhängigen Oberkommando unterstellt werden müssen. Der rasante Modernisierungsschub, der in unserer Armee in letzter Zeit eingesetzt hat, macht diesen Schritt zwingend erforderlich."
 TUR_women_aviation:0 "Türkische Frauen in der Luftfahrt"
 TUR_women_aviation_desc:0 "Unsere Republik möchte den Wert der Frauen bewahren, indem sie sie in alle Lebensbereiche einbezieht. Man erinnere sich, dass Frauen vor einigen Jahren das Wahlrecht erhielten. Der Erfolg von Atatürks geistiger Tochter Sabiha Gökçen als Militärpilotin bei der Niederschlagung des Dersim-Aufstands scheint die Vorurteile der Armee gegenüber der Ausbildung weiblicher Piloten gebrochen zu haben."
 TUR_europe_trainees:0 "Europa-Pilotenausbildungsprogramm"
 TUR_europe_trainees_desc:0 "Es reicht nicht aus, nur Luftfahrttechnologien zu entwickeln. Es bedarf auch ausgebildeter und qualifizierter Piloten, um diese Technologien nutzen zu können. Wir sollten ein Ausbildungsprogramm ins Leben rufen, indem wir mit den führenden Luftfahrtländern verhandeln und die Ausbildung unserer Piloten sicherstellen."
 TUR_aircraft_purchase:0 "Flugzeugkauf"
 TUR_aircraft_purchase_desc:0 "Die Entwicklung neuer und leistungsfähiger Flugzeuge in kurzer Zeit ist möglicherweise nicht für alle Länder und jederzeit möglich. Manchmal ist der Kauf die bessere Option, um die Lücke zu schließen."
 TUR_aircraft_purchase_tt:0 "§Flugzeugkauf möglich§!"
 TUR_aircraft_modernization:0 "Modernisierung der Luftstreitkräfte"
 TUR_aircraft_modernization_desc:0 "Angesichts der Gewalt des Krieges entwickeln sich die Flugzeugtechnologien täglich weiter. Neutrale und kämpfende Armeen sollten mit der fortschreitenden Technologie Schritt halten und ihre Luftflotten modernisieren."
 TUR_food_rationing_tickets_tt:0 "„Landesweite Lebensmittelmarken werden Hungersnöte lindern“!"
 TUR_agricultural_reform:0 "Agrarreform"
 TUR_agricultural_reform_desc:0 "Unsere Gesellschaft kämpft darum, die Armut zu überwinden, die durch eine jahrhundertealte feudale Ordnung entstanden ist. Nach den jüngsten Landreformen ist es äußerst wichtig, dass wir die unfruchtbaren anatolischen Länder nun mit modernen landwirtschaftlichen Techniken auf eine Weise bewirtschaften, die die Bedürfnisse der Bevölkerung befriedigen kann."
 TUR_taskizak:0 "Erweitern Sie die Taskizak-Marinewerft"
 TUR_taskizak_tt:0 "Nicht genügend Bauplätze für §YNaval Dockyards§!"
 TUR_taskizak_desc:0 "Die Taşkızak-Werften mit ihrer fast 500-jährigen Geschichte waren die Küche der osmanischen Marine. Aufgrund der knappen Ressourcen unserer jungen Republik blieben unsere Marine und diese Werften jedoch ungenutzt. Um die schmerzhaften Erfahrungen, die wir in Reşadiye gemacht haben, nicht zu wiederholen, sollten wir unsere eigenen Werften modernisieren und wieder in Betrieb nehmen."
 TUR_modernise_yavuz:0 "Modernisierung der Yavuz-Klasse"
 TUR_modernise_yavuz_desc:0 "Der Schlachtkreuzer der Yavuz-Klasse, dessen Ursprung auf der SMS Goeben beruht und der während des Ersten Weltkriegs umstrittenerweise in die osmanische Marine aufgenommen wurde, ist nach wie vor das Flaggschiff unserer Republik. Die Yavuz, die nach acht Jahren Krieg eine Reihe von Reparaturen durchlaufen hat, ist immer noch eines der gefürchtetsten Schiffe im Mittelmeer, muss jedoch eine Reihe von Modernisierungen durchlaufen, um mit der Zeit Schritt zu halten."
 TUR_light_fleet:0 "Leichte Flotte stärken"
 TUR_light_fleet_desc:0 "Obwohl unser Land an drei Seiten von Meeren umgeben ist, sind tiefe Gewässer noch weit entfernt. Die oberste Priorität unserer Marine besteht darin, leichte und schnelle Schiffe sowie eine Verteidigungsdoktrin zum Schutz ihrer Hoheitsgewässer einzusetzen."
 TUR_mediterranean_maneuvers:0 "Mittelmeermanöver"
 TUR_mediterranean_maneuvers_desc:0 "Wir planen, unsere Marinebemühungen zur Verbesserung der Manövrierfähigkeit anhand möglicher Konfliktszenarien im östlichen Mittelmeer zu evaluieren. Unsere Admirale sind sich einig, dass wir sowohl unsere Feuerkraft als auch unsere Manövrierfähigkeit erhöhen sollten. Wenn wir uns darauf konzentrieren, wird unsere Marine zu einer der stärksten Marinen der Welt."
 TUR_strengthen_straits:0 "Meerengen stärken"
 TUR_strengthen_straits_desc:0 "Während die Staaten der Welt damit beschäftigt sind, sich gegenseitig die Kehle zuzudrücken, müssen wir unsere Souveränität in den Meerengen um jeden Preis verteidigen, indem wir unsere Vorbereitungen gegen die Sowjetunion abschließen, um die Konvention über die Meerenge von Montreux zu verletzen."
 TUR_strengthen_straits_tt:0 "Füge §Y6 Küstenfestungen§ hinzu! \n"
 TUR_strengthen_straits_tt_2:0 "Füge §Y4 Küstenfestungen§ hinzu! \n"
 TUR_clear_great_war_mines:0 "Räumen Sie die Minen des Ersten Weltkriegs"
 TUR_clear_great_war_mines_desc:0 "In unseren Hoheitsgewässern und Meerengen liegen noch immer zahlreiche Seeminen aus dem Ersten Weltkrieg. Obwohl unsere Flotte täglich wächst, müssen wir uns der Tatsache stellen, dass diese Minen jederzeit Katastrophen verursachen können. Daher müssen wir unsere Küsten so schnell wie möglich säubern."
 TUR_naval_forces_commandership:0 "Etablierung des Kommandos der Seestreitkräfte"
 TUR_naval_forces_commandership_desc:0 "Damit unsere Marine, die unter dem Namen „Unterstaatssekretariat für Marine“ operiert, eine Organisationsstruktur erhält, die der der westlichen Marinen entspricht, und eine eigenständige Streitmacht werden kann, muss die Kommandoebene erhöht werden."
 TUR_battleship_plans:0 "Schlachtschiffpläne"
 TUR_battleship_plans_desc:0 "Die Gründung des Seestreitkräftekommandos führte auch zu neuen Meinungsverschiedenheiten innerhalb der Marineführung. Das Oberkommando vertritt die Ansicht, dass die Marine dringend einen neuen Schlachtschifftyp benötigt, während die jüngeren Mitarbeiter die Marineflieger- und Trägerdoktrin vertreten, um mit der sich verändernden Welt Schritt zu halten. Das Oberkommando hat jedoch Recht."
 TUR_carrier_plans:0 "Mobilfunktarife"
 TUR_carrier_plans_desc:0 "Die Gründung des Seestreitkräftekommandos führte auch zu neuen Meinungsverschiedenheiten innerhalb der Marineführung. Das Oberkommando vertritt die Ansicht, dass die Marine dringend einen neuen Schlachtschifftyp benötigt, während die jungen Mitarbeiter die Marineflieger- und Trägerdoktrin vertreten, um mit der sich verändernden Welt Schritt zu halten. Wir sollten den jungen Mitarbeitern eine Chance geben."
 TUR_adana_meeting:0 "Adana-Treffen"
 TUR_adana_meeting_desc:0 "Seit Kriegsbeginn haben die Alliierten und die Achsenmächte versucht, uns auf ihre Seite zu ziehen. Wir haben jedoch viel aus den schmerzhaften Erfahrungen des Ersten Weltkriegs gelernt. Unsere beste Option ist es, unsere Neutralität zu wahren und dies zu tun, indem wir auf die Alliierten zugehen."
 turan:0 "Turan"
 turkey.1.t:0 "Der Tod von Mustafa Kemal Atatürk"
 turkey.1.d:0 "\n Die Republik trauert. \n\n Kriegsheld, Revolutionär, Präsident und Vater der Türken: Mustafa Kemal Atatürk ist gestorben.\n\nBis zum Schluss blieb er dem türkischen Volk und der von ihm gegründeten Republik treu. Tausende Trauernde erwiesen ihm in Istanbul die letzte Ehre, bevor sein Leichnam per Transportwagen, Schiff und Zug nach Ankara überführt wurde. Dort fand sein Staatsbegräbnis im Beisein des gesamten Parlaments und Würdenträgern aus aller Welt statt.\n\nNachdem der Vater der modernen türkischen Nation gestorben ist, muss die Republik nach vorne schauen. Die Große Nationalversammlung hat den ehemaligen Premierminister Ismet Inönü zu seinem Nachfolger gewählt."
 turkey.1.a:0 "Atatürk wird in Erinnerung bleiben"
 turkey.2.t:0 "Montreux-Straßenkonvention" 
 turkey.2.d:0 "[TUR.GetName] war stets besorgt über die Beschränkungen, die das mit dem Vertrag von Lausanne unterzeichnete Abkommen über die Meerengen auferlegte. [TUR.GetName], das angesichts des erneuten Aufrüstungswettlaufs zunehmend beunruhigt ist, teilt den Unterzeichnerstaaten seine Bedenken und den Vorschlag zur Änderung des Status der Meerengen mit und nimmt die Gespräche wieder auf." 
 turkey.2.a:0 "Unterzeichnung der Montreux-Straßenkonvention" 
 turkey.12.t:0 "[877.GetName] ist wieder türkisches Land."
 turkey.12.d:0 "Schließlich endeten die Verhandlungen mit dem französischen Staat friedlich. Durch den unabhängigen [877.GetName]-Staat und die Forderungen seines Volkes in diese Richtung schloss sich [877.GetName] wieder dem Mutterland an. " 
 turkey.12.a:0 "Frieden zu Hause, Frieden in der Welt!" 
 turkey.13.t:0 "Es gibt keinen anderen Weg aus dem Krieg"
 turkey.13.d:0 "Trotz aller Verhandlungen ignoriert der französische Staat die Forderungen der Bevölkerung von [877.GetName]. Die türkische Armee wird das rechtmäßige Land zurückerobern, selbst auf Kosten der Seele." 
 turkey.13.a:0 "Die Mobilmachungsvorbereitungen beginnen" 
 turkey.14.t:0 "Dersim-Aufstand"
 turkey.14.d:0 "In der Region Dersim brach ein ethnisch-feudaler Aufstand gegen die junge Republik aus. Die Rebellen organisierten Angriffe auf Gendarmeriestationen, sprengten Brücken und Straßen und sabotierten Telefon- und Telegrafenleitungen. Zahlreiche Soldaten verloren bei den Angriffen und Sabotageakten ihr Leben." 
 turkey.14.a:0 "Senden Sie sofort 3 Divisionen an die Region Sivas"
 turkey.15.t:0 "Saadabad-Pakt"
 turkey.15.d:0 "Es war äußerst wichtig, die Unabhängigkeit dieser Staaten zu betonen, die die Kolonial- und Halbkolonialzeit hinter sich lassen konnten. Am 2. Oktober 1935 wurde erstmals ein Dreimächtevertrag zwischen Genf, [TUR.GetName], dem Iran und dem Irak unterzeichnet. Später schloss sich auch Afghanistan an. Der Irak schlug dem Iran und [TUR.GetName] einen Nichtangriffspakt vor, um seine Loyalität gegenüber Großbritannien auszugleichen. [TUR.GetName] hingegen schlug vor, anstelle einzelner Pakte einen regionalen Pakt zu schließen." 
 turkey.15.a:0 "Bieten Sie einen regionalen Pakt an"
 turkey.15.b:0 "Unterzeichnen Sie den Pakt"
 turkey.19.t:0 "Mehmet Akif Ersoy ist gestorben"
 turkey.19.d:0 "Unser Unabhängigkeitsdichter Mehmet Akif Ersoy, der Autor unserer Nationalhymne, ist verstorben. \n\nAls er kürzlich an Leberzirrhose erkrankte, bereiste er mehrere Länder mit dem Gedanken, die Luft zu verändern. Unser Nationaldichter verlor sein Leben in Istanbul, wohin er zur Behandlung kam." 
 turkey.19.a:0 "Sein Gedicht wird für immer leben." 
 turkey.20.t:0 "Deutsche Juden fordern Asyl"
 turkey.20.d:0 "\nDie antijüdische Propaganda Nazi-Deutschlands wird zunehmend besorgniserregend. Viele jüdische Wissenschaftler suchen weiterhin ein Land, in dem sie Zuflucht finden können, indem sie das Land verlassen. Der berühmte Wissenschaftler Albert Einstein schrieb uns einen Brief, in dem er uns bat, den Asylgesuchen einiger dieser Wissenschaftler in seinem Land stattzugeben. \nWir pflegen langjährige und gute Beziehungen zu Deutschland. Die Annahme dieses Angebots könnte unsere deutschen Beziehungen gefährden. Abgesehen von der Menschlichkeit würde es auch erhebliche Vorteile in Wissenschaft und Technologie bringen. Die Ablehnung des Angebots könnte zu engeren militärischen Beziehungen mit Deutschland führen. Diese Entscheidung könnte uns jedoch in der Weltöffentlichkeit in eine schwierige Lage bringen."
 turkey.20.a:0 "Es ist eine menschliche Pflicht, sie in unserem Land aufzunehmen."
 turkey.20.b:0 "Dieses Thema ist eine innere Angelegenheit Deutschlands."
 turkey.21.t:0 "Mobilisierung im Weltkrieg"
 turkey.21.d:0 "Während die großen europäischen Staaten versuchen, sich gegenseitig zu erwürgen, rufen sie oft neutrale Staaten um Hilfe oder drohen ihnen. Die Regierung hat eine Teilmobilmachung angekündigt, um möglichen Bedrohungen und Besatzungen vorzubeugen, und kündigte eine Erhöhung der Wehrpflicht auf vier Jahre an. Mit diesem Gesetz könnten voraussichtlich über eine Million junge Menschen der türkischen Armee beitreten."
 turkey.21.a:0 "Wir müssen uns so schnell wie möglich auf den Krieg vorbereiten."
 turkey.22.t:0 "Türkische Militärbeamte bei Kursk-Besuch"
 turkey.22.d:0 "\nDie deutschen Armeen bereiten sich auf einen sowjetischen Generalangriff vor. Die deutschen Armeen treffen ihre letzten Vorbereitungen an der Front, wo beide Seiten voraussichtlich mit Panzern, Stahl und Pulver kämpfen werden. \n\nWir planen die Entsendung einer Militärdelegation unter dem Vorsitz von General Cemil Cahit Toydemir, um die türkisch-deutschen Militärbeziehungen zu entwickeln und sie an der Front zu untersuchen. Dieser Besuch wird uns umfangreiche Erfahrungen insbesondere im Bereich der Panzertruppen vermitteln."
 turkey.22.a:0 "Der Besuch sollte so bald wie möglich stattfinden."
 turkey.23.t:0 "Die griechische Regierung beugt sich"
 turkey.23.d:0 "Die griechische Regierung hat unsere Ansprüche in Westthrakien und auf den Ägäischen Inseln anerkannt und die Übertragung des Gebiets an uns als rechtmäßig erachtet. Unsere Truppen werden in wenigen Tagen mit der Ansiedlung in den Städten beginnen."
 turkey.23.a:0 "So sollte es sein"
 turkey.24.t:0 "Griechische Regierung lehnt unser Angebot ab"
 turkey.24.d:0 "Die griechische Regierung hat unsere Landforderungen abgelehnt. Um das Problem zu lösen, werden friedliche Straßen blockiert. Danach werden die Waffen sprechen."
 turkey.24.a:0 "Wir werden unsere Bajonette schärfen"
 turkey.25.t:0 "Frankreich möchte die Aleppo-Frage auf diplomatischem Wege lösen."
 turkey.25.d:0 "Frankreich erkennt an, dass es angemessen wäre, die Region an die türkische Regierung zu übertragen, da es seine Besorgnis über die Ausweitung einzelner Ereignisse in Aleppo für berechtigt hält. Nach dieser Entscheidung begannen die Menschen in Aleppo, türkische Flaggen an ihren Häusern und Balkonen aufzuhängen."
 turkey.25.a:0 "Aleppo bleibt turkmenisch"
 turkey.26.t:0 "[From.Getname] Hat nicht auf die von uns gesendete Nachricht geantwortet"
 turkey.26.d:0 "Die [From.GetAdjective]-Regierung erklärte, dass es lustig wäre, auf diese unsinnige Forderung, die wir gestellt haben, überhaupt zu antworten."
 turkey.26.a:0 "Aleppo wird mit [From.GetAdjective] Blut getränkt"
 turkey.27.t:0 "[From.Getname] hat die Verwaltung von Mossul aufgegeben"
 turkey.27.d:0 "Mit der Übertragung der Verwaltung Mossuls an uns wurde eines unserer Grenzprobleme ohne Blutvergießen gelöst. Diese Annexion ist sowohl im Hinblick auf unsere Bedeutung in der Region als auch auf die dort zu gewinnenden unterirdischen Ressourcen von großer Bedeutung."
 turkey.27.a:0 "Es sollte sein"
 turkey.28.t:0 "[From.GetName] hat unsere Ansprüche abgelehnt"
 turkey.28.d:0 "Die [From.GetAdjective]-Regierung hat erklärt, dass unsere Ansprüche und Probleme eine Angelegenheit zwischen uns und Großbritannien seien und dass das Problem den neu gegründeten [From.GetAdjective]-Staat nicht betreffe."
 turkey.28.a:0 "Mosul ist unsere Angelegenheit, und es spielt keine Rolle, wer die Kontrolle hat"
 turkey.29.t:0 "[From.GetName] akzeptiert unsere Zypern-Ansprüche"
 turkey.29.d:0 "Die britische Regierung beschloss, sich aus Zypern zurückzuziehen, das sie 1914 besetzt hatte, um unter den herrschenden Kriegsbedingungen nicht einen neuen Feind zu erobern. Zypern wird eine Schlüsselrolle bei der Übergabe der Vorherrschaft im östlichen Mittelmeerraum an unsere Seite spielen."
 turkey.29.a:0 "Mit Betrug genommen wird durch Angst gegeben"
 turkey.30.t:0 "[From.GetName] hat beschlossen, seine Präsenz in Zypern zu verstärken"
 turkey.30.d:0 "Die [From.GetAdjective] haben beschlossen, das Angebot bezüglich unserer Ansprüche auf Zypern abzulehnen und ihre Präsenz auf der Insel zu verstärken. Offenbar gibt es für uns keine andere Option als die Besetzung der Insel."
 turkey.30.a:0 "Sie haben es durch Betrug genommen, wir werden es mit dem Blut nehmen."
 turkey.31.t:0 "Kreta gehört uns!"
 turkey.31.d:0 "Unsere verstärkte Militärpräsenz vor der Insel Kreta hat positive Ergebnisse gebracht. Sie haben uns die Inseln zurückgegeben, die sie uns rechtmäßig zugesprochen hatten. Die türkische Nation bleibt wieder stark!"
 turkey.31.a:0 "Es herrscht Frieden, zumindest im Moment."
 turkey.32.t:0 "Sie haben unsere Forderungen auf Kreta abgelehnt"
 turkey.32.d:0 "Griechenland gibt seine 50 Jahre alte betrügerische Annexion Kretas nicht auf. Offenbar ist ihnen die Ernsthaftigkeit unserer militärischen Präsenz und unserer Drohungen nicht bewusst. Wir müssen ihnen das deutlicher sagen."
 turkey.32.a:0 "Sie haben ihr Schicksal selbst in die Hand genommen."
 turkey.33.t:0 "[From.GetName] hat beschlossen, Batumi auszuliefern."
 turkey.33.d:0 "Die [From.GetAdjective]-Regierung betonte, dass ein Krieg mit einer anderen großen Nation um ein so kleines Stück Land völlig unnötig und eine Verschwendung von Ressourcen wäre."
 turkey.33.a:0 "Batumi ist jetzt Teil des Misak-i Milli."
 turkey.34.t:0 "[From.GetName] hält unsere Behauptungen für Unsinn"
 turkey.34.d:0 "Die [From.GetAdjective]-Regierung hielt unsere Behauptungen für die Vergangenheit für Unsinn und lachte uns ins Gesicht. Ein weiterer hervorzuhebender Punkt ist, dass dies nach dem Ende der faschistischen Gefahr möglicherweise erneut in Betracht gezogen wird."
 turkey.34.a:0 "In diesem Fall ist der Feind meines Feindes mein Verbündeter."
 turkey.35.t:0 "Ankara-Pakt"
 turkey.35.d:0 "Europa steht kurz vor einem erneuten Krieg. Obwohl es in diesem Krieg vorrangig ist, neutral zu bleiben, ist es für uns angebracht, im Einklang mit unseren Interessen einen Pakt mit Frankreich und Großbritannien zur Sicherheit des Mittelmeers und unserer Küsten im Falle eines möglichen Konflikts zu schließen."
 turkey.35.a:0 "Wir unterzeichnen den Pakt"
 turkey.36.t:0 "[TUR.GetName] bietet einen regionalen Pakt im Mittelmeerraum an"
 turkey.36.d:0 "[TUR.GetName], das sich für den bevorstehenden großen regionalen Pakt aus der Vorkriegszeit einsetzt, bietet einen regionalen Pakt gegen die Möglichkeit eines Konflikts im Mittelmeerraum an. Wir müssen ihn für die Sicherheit Maltas und des Suezkanals akzeptieren."
 turkey.37.d:0 "[TUR.GetName], das sich für den bevorstehenden großen regionalen Pakt aus der Vorkriegszeit einsetzt, bietet einen regionalen Pakt gegen die Möglichkeit eines Konflikts im Mittelmeerraum an. Wir müssen ihn für die Sicherheit Korsikas und unserer Südküste akzeptieren."
 turkey.38.t:0 "Marshallplan"
 turkey.38.d:0 "Bei den Treffen mit der UNO nach den Kriegszerstörungen wurde ein antikommunistischer Wirtschaftshilfeplan entwickelt, um die Zerstörung Europas zu beheben. Die Forderungen der UdSSR hinsichtlich der Meerengen erhöhen den Druck auf uns zunehmend. \n\nAls Teil dieser Hilfe wird uns militärische Ausrüstung für unsere Verteidigung gegen die Sowjetunion von entscheidender Bedeutung sein. Im Rahmen dieses Plans müssen wir jedoch die Produktion einiger ziviler und militärischer Fabriken einstellen."
 turkey.38.a:0 "Das brauchen wir"
 turkey.39.t:0 "Fall Rassismus-Turanismus"
 turkey.39.d:0 "Während der Krieg mit all seiner Gewalt weiterging, begann ein Teil der Intellektuellen der Bevölkerung, Propaganda für Deutschland zu betreiben. Diese Propaganda findet in allen Teilen der Bevölkerung Unterstützung und entwickelt sich zu einer politischen Organisation. Wenn wir die pro-deutsche Propaganda nicht sofort stoppen, droht uns ein faschistischer Putsch."
 turkey.39.a:0 "Verhaften und verurteilen Sie ihre Anführer"
 turkey.39_tt:0 "Nihal Atsiz vor Gericht"
 turkey.39_tt2:0 "Nihal Atsız freigesprochen"
 turkey.40.t:0 "Die Rebellion wächst"
 turkey.40.d:0 "Unsere Operationspläne sind fast fertig. Unsere Divisionen warten auf Ihre Befehle zur Niederschlagung des Aufstands."
 turkey.40.a:0 "Der Aufstand wird um jeden Preis niedergeschlagen!"
 turkey.41.t:0 "Der erste Einsatz hat begonnen"
 turkey.41.d:0 "Unsere Truppen sind mit den Rebellen zusammengestoßen. Doch wir brauchen mehr, um die Guerillataktiken des Feindes zu vereiteln."
 turkey.41.a:0 "Töte sie alle!"
 turkey.42.t:0 "Luftangriffe erfolgreich"
 turkey.42.d:0 "Die Piloten, darunter Sabiha Gökçen (die erste Kampfpilotin der Welt), die geistige Tochter von Gazi Pascha (ein Spitzname von Kemal Atatürk), überfielen die Rebellen. Die Rebellen fliehen in die Berge."
 turkey.42.a:0 "Feiglinge"
 turkey.43.t:0 "Zweiter Einsatz kann jederzeit beginnen"
 turkey.43.d:0 "Die erste Operation war abgeschlossen, und die Rebellen zogen sich in die Berge zurück. Hunderte Milizen wurden getötet. Geheimdienstberichten zufolge gewinnen die Rebellen jedoch an Macht, da viele ihrer Kämpfer aus den Stämmen stammen. Viele Rebellenführer wurden tot oder lebend gefangen genommen."
 turkey.43.a:0 "Sie werden wie Wäsche aufgehängt"
 turkey.44.t:0 "Der Aufstand steht kurz vor der Niederschlagung"
 turkey.44.d:0 "Die zweite Operation führte zu gewaltsamen Auseinandersetzungen und einigen Tragödien. Die meisten Rebellen wurden vernichtet, und die Säuberungsaktionen begannen. Während der Operation sorgten zivile Opfer, die durch die Gewalt des Konflikts teilweise verursacht wurden, für internationale Kritik."
 turkey.44.a:0 "Ein paar triviale Fehler"
 turkey.45.t:0 "Aserbaidschanischer Aufstand"
 turkey.45.d:0 "Unsere Bemühungen haben endlich Früchte getragen. Während wir versuchen, dem sowjetischen Expansionismus einen entscheidenden Schlag zu versetzen, haben sich auch unsere aserbaidschanischen türkischen Brüder entschlossen, uns zu begleiten und ihr Heimatland vor der Krankheit des Kommunismus zu retten. Die Unterstützung mit Waffen und Ausrüstung wird unsere Arbeit erleichtern."
 turkey.45.a:0 "Für unseren Bruder"
 turkey.46.t:0 "[FROM.Getname] Anforderungen [211.GetName]"
 turkey.46.d:0 "[FROM.GetName] hat einen Teil unseres Vaterlandes unter dem Vorwand, dass in [211.GetName] türkische und muslimische Bevölkerung lebt, über die Ausbruchsabsichten informiert. Wir haben unsere militärische und diplomatische Lage bewertet. Wie sollten wir reagieren?"
 turkey.46.a:0 "Wir können nicht widerstehen"
 turkey.46.b:0 "Arroganz"
 turkey.47.t:0 "[BUL.GetName] hat ihr Ende vorbereitet"
 turkey.47.d:0 "[BUL.GetName] hat sich unseren Forderungen entschieden widersetzt. Sie erklären klar, dass sie bis zum Tod Widerstand leisten werden."
 turkey.47.a:0 "Waffen an den Schultern"
 turkey.48.t:0 "Heldentum für die Menschheit"
 turkey.48.d:0 "Es gibt wichtige Neuigkeiten von unserem Botschafter in Paris, Behiç Erkin. Als die Deutschen die Außenbezirke der Stadt erreichten, brachen in der Stadt Angst und Panik aus. Unser Botschafter versuchte, das Leben von 20.000 französischen Juden zu retten. Mit den von ihm ausgehändigten vorläufigen türkischen Pässen rettete er ihnen das Leben, indem er sie nach [TUR.GetName] begleitete und ein großartiges Beispiel an Heldentum zeigte."
 turkey.48.a:0 "Er hat ein großes Herz"
 turkey.49.t:0 "Erdbeben in Erzincan"
 turkey.49.d:0 "Oh Gott! Um Mitternacht ereignete sich in Erzincan ein schweres Erdbeben. Berichten zufolge wurden Zehntausende Gebäude zerstört und Tausende unserer Bürger starben."
 turkey.49.a:0 "Senden Sie, was immer sie brauchen"
 turkey.49.a_tt:0 "Einer unserer Industriekomplexe wurde zerstört"
 turkey.50.t:0 "Italienisch-Türkisches Freundschaftstreffen"
 turkey.50.d:0 "[TUR.GetName] hat eine offizielle Anfrage gestellt, um unser derzeitiges Regierungssystem zu untersuchen und die freundschaftlichen Beziehungen auszubauen. Dies wird im Interesse unserer regionalen Interessen hilfreich sein. Was sollen wir antworten?"
 turkey.50.a:0 "Natürlich! Gerne!" 
 turkey.51.t:0 "Straße zum roten Apfel"
 turkey.51.d:0 "Es ist an der Zeit, der Welt zu verkünden, dass unser ultimatives Ziel darin besteht, die ganze Welt zu erobern und zu beherrschen. Lasst uns auf diesem Weg einige Freunde gewinnen."
 turkey.51.a:0 "Viel Glück!" 
 turkey.52.t:0 "Modernes Khaganat"
 turkey.52.d:0 "Endlich sind wir auf dem Höhepunkt unserer Macht und bereit, unter der Führung unseres starken Anführers an der Weltpolitik teilzunehmen. Doch welchen Weg wählen wir auf dem Weg zu diesem Ziel?"
 turkey.52.a:0 "Wir werden unseren eigenen Weg gehen" 
 turkey.52.b:0 "Es ist die beste Wahl, mächtige Freunde zu finden"
 turkey.53.t:0 "[TUR.GetName] bittet um Allianz"
 turkey.53.d:0 "[TUR.GetName] hat uns einen diplomatischen Brief für ein Militärbündnis geschickt. Sie wollen mit uns kämpfen."
 turkey.53.a:0 "Gute Idee"
 turkey.53.b:0 "Auf keinen Fall"
 turkey.54.t:0 "Trotzki-Zusammenarbeit"
 turkey.54.d:0 "[TUR.GetName] schlägt ein geheimes Protokoll vor, das uns die Zusammenarbeit bei der Festnahme Trotzkis anbietet. Dem Plan zufolge werden die Türken Trotzki, der eine Zeit lang im Exil lebte und ihr Land vor einigen Jahren verließ, wieder einladen und ihn politisch aktiv werden lassen. Sobald er jedoch in ihr Land einreist, werden sie ihn verhaften und an uns ausliefern. Ja, das ist ein Komplott."
 turkey.54.a:0 "Gut! Lass es uns versuchen"
 turkey.54.b:0 "Zeitverschwendung"
 turkey.55.t:0 "Galiyev-Angebot"
 turkey.55.d:0 "Genosse, [TUR.GetName] verlangt eine Einigung über den Gefangenen Sultan Galijew. Wenn wir das Angebot annehmen, werden wir Sultan Galijew freilassen und ihm erlauben, zwei tatarische Divisionen zu bilden und sich der türkischen Armee anzuschließen. Im Gegenzug werden sie anbieten, Seite an Seite gegen den faschistischen und imperialistischen Abschaum zu kämpfen."
 turkey.55.a:0 "Vielleicht ... können wir es versuchen" 
 turkey.55.b:0 "Wie kann man es wagen" 
 turkey.56.t:0 "[TUR.GetName] bittet um Allianz"
 turkey.56.d:0 "[TUR.GetName] hat uns einen diplomatischen Brief für ein Militärbündnis geschickt. Sie wollen in einem offiziellen Bündnis mit uns kämpfen."
 turkey.56.a:0 "Gute Idee"
 turkey.56.b:0 "Auf keinen Fall"
 turkey.57.t:0 "[TUR.GetName] erobert die Dodekanes zurück"
 turkey.57.d:0 "[TUR.GetName] hat eine diplomatische Note geschickt, in der unsere Errungenschaften im Ouchy-Abkommen nicht anerkannt werden. In diesem Zusammenhang wollen sie die Dodekanes-Inseln zurück."
 turkey.57.a:0 "Bußgeld"
 turkey.57.b:0 "Das ist doch wohl ein Witz!"
 turkey.57_tt:0 "§Y[TUR.GetName]§! erhält für uns das Kriegsziel §CErobern§!, die Dodekanes zurückzuerobern."
 turkey.58.t:0 "[From.GetName] hat festgestellt, dass dieser Anspruch „ungerechtfertigt“ ist."
 turkey.58.d:0 "Sie haben unseren Anspruchsvorschlag abgelehnt. Es gibt nur einen Weg, diese missliche Lage zu lösen."
 turkey.58.a:0 "Wir werden unsere Ansprüche geltend machen."
 turkey.60.t:0 "[TUR.GetName] fordert Panzerhandel an"
 turkey.60.d:0 "Heute haben wir einen Brief vom türkischen Botschafter erhalten, in dem er uns auffordert, einige unserer überzähligen Panzer aufzukaufen."
 turkey.60.a:0 "Nun, wir können unseren Freunden helfen"
 turkey.60.b:0 "Wir können so viel tun, wie wir können"
 turkey.60.c:0 "Wir haben keine überschüssigen Tanks"
 turkey.61.t:0 "Anfrage angenommen"
 turkey.61.desc:0 "Unsere diplomatischen Forderungen sind endlich abgeschlossen. Die Sowjetunion hat sich bereit erklärt, alle von uns angeforderten Fahrzeuge bereitzustellen."
