 turkey.85.desc:0 "Die Unterstützung unserer Verbündeten im Kampf gegen den Feind kann den Druck und die Gewalt auf unsere Jungs an der Front verringern. Wir sollten ihnen einige unserer überschüssigen oder ungenutzten Panzer zur Verfügung stellen und ihre Kriegsanstrengungen unterstützen."
