 turkey.86.t:0 "Unser Verbündeter USA hat unsere Kriegsanstrengungen voll unterstützt."
 turkey.86.desc:0 "Unsere diplomatischen Forderungen sind endlich abgeschlossen. Die USA haben sich bereit erklärt, alle von uns angeforderten Fahrzeuge bereitzustellen."
