 turkey.87.t:0 "Anfrage teilweise akzeptiert"
 turkey.87.desc:0 "Unsere diplomatischen Forderungen sind endlich abgeschlossen. Die USA haben sich bereit erklärt, uns einige der von uns angeforderten Fahrzeuge zur Verfügung zu stellen."
 turkey.87.a:0 "Nicht schlecht!"
 turkey.88.t:0 "Anfrage abgelehnt"
 turkey.88.desc:0 "Unsere diplomatischen Forderungen sind nun endlich abgeschlossen. Leider teilten die USA mit, dass sie nicht über viele Militärfahrzeuge verfügen, die sie zur Verfügung stellen könnten."
 turkey.88.a:0 "Wir müssen einen anderen Weg finden"
 turkey.90.t:0 "Piloten in Ausbildung"
 turkey.90.desc:0 "Da unsere Luftwaffe täglich wächst, müssen wir unsere Pilotenausbildung im gleichen Tempo verbessern. Die Kriegsintensität auf dem Höhepunkt der Krise führt auch zu rasanten Fortschritten in der Luftkampftaktik. Um diese Entwicklungen schnell zu erfassen, müssen wir ein Ausbildungsprogramm starten, das einige Pilotenanwärter in europäische Länder entsendet."
 turkey.90.a:0 "Schicken Sie sie zum Reich"
 turkey.90.b:0 "Schicken Sie sie nach Großbritannien"
 turkey.91.t:0 "Piloten in Ausbildung"
 turkey.91.desc:0 "Das türkische Außenministerium wartet auf unsere endgültige Entscheidung zum Militärpilotenausbildungsprogramm als weitere Säule der bestehenden guten Beziehungen und des Handels mit militärischer Ausrüstung."
 turkey.91.a:0 "Sie sind willkommen"
 turkey.92.t:0 "Piloten in Ausbildung"
 turkey.92.desc:0 "Das türkische Außenministerium wartet auf unsere endgültige Entscheidung zum Militärpilotenausbildungsprogramm als weitere Säule der bestehenden guten Beziehungen und des Handels mit militärischer Ausrüstung."
 turkey.92.a:0 "Sie sind willkommen"
 turkey.93.t:0 "Ein unglaublicher Vorfall"
 turkey.93.desc:0 "Einige unserer Piloten, die Trainingsflüge über London durchführten, wurden zufällig von einem deutschen Luftangriff getroffen. Obwohl unsere Piloten versuchten, dem Angriff mit ihren Fähigkeiten zu entkommen, stürzten sie aufgrund der Entwaffnung der Flugzeuge ab und verloren ihr Leben."
 turkey.93.a:0 "Ein trauriges Unglück für unser Land"
 turkey.94.t:0 "Ein unglaublicher Vorfall"
 turkey.94.desc:0 "Einige unserer Piloten, die Trainingsflüge über Berlin durchführten, wurden zufällig von den Alliierten angegriffen. Obwohl unsere Piloten versuchten, dem Angriff mit ihren Fähigkeiten zu entkommen, stürzten sie aufgrund der Entwaffnung der Flugzeuge ab und verloren ihr Leben."
 turkey.94.a:0 "Ein trauriges Unglück für unser Land"
 turkey.100.t:0 "Turkestanische Legion"
 turkey.100.d:0 "Wir haben unsere Brüder, die aus dem Land ihrer Vorfahren kamen, neu ausgebildet und neu ausgerüstet. Sie sind nun bereit, für die Freiheit ihres Heimatlandes zu kämpfen."
 turkey.100.a:0 "Lasst uns eine Abteilung gründen"
 turkey.100_tt:0 "An unserer Ostgrenze wird eine Elitelegion auftauchen."
 turkey.101.t:0 "Tatarische Legionen"
 turkey.101.d:0 "Wir haben unsere muslimischen kommunistischen Brüder, die aus der Heimat der Revolution kamen, neu ausgebildet und neu ausgerüstet. Sie sind nun bereit, gegen den Faschismus zu kämpfen."
 turkey.101.a:0 "Lasst uns einige Abteilungen erstellen"
 turkey.101_tt:0 "An unserer nordöstlichen Grenze werden zwei ausgebildete Legionen auftauchen."
