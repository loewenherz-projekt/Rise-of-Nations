 TUR_traktors_desc:0 "Unsere Verbündeten sind sich unserer Probleme in der Landwirtschaft und der Hungersnot bewusst. Schließlich haben sie angeboten, uns einige landwirtschaftliche Traktoren und Produktionstechniker sowie einige hochqualifizierte Agrarspezialisten zu schicken."
