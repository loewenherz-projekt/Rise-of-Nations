 turkey.135.c:0 "Wir haben keine überschüssigen Flugzeuge"
 turkey.136.t:0 "Unser Verbündeter Großbritannien wird unsere Kriegsanstrengungen voll unterstützen."
 turkey.136.desc:0 "Unsere diplomatischen Forderungen haben endlich ein Ende. Großbritannien wird uns alle Flugzeuge zur Verfügung stellen, die wir zu unserer Unterstützung benötigen."
 turkey.136.a:0 "Gut"
 turkey.137.t:0 "Unser Verbündeter Großbritannien wird unsere Kriegsanstrengungen teilweise unterstützen"
 turkey.137.desc:0 "Unsere diplomatischen Forderungen sind endlich abgeschlossen. Großbritannien wird uns einige Flugzeuge zur Unterstützung zur Verfügung stellen."
 turkey.137.a:0 "Nicht schlecht!"
 turkey.138.t:0 "Hilfe wurde abgelehnt"
 turkey.138.desc:0 "Unsere diplomatischen Forderungen sind nun endlich abgeschlossen. Leider teilte Großbritannien mit, dass es nicht viele Militärflugzeuge zur Verfügung stellen könne."
 turkey.138.a:0 "Wir müssen einen anderen Weg finden"
 turkey.140.t:0 "Flugzeughilfe für [TUR.GetName]"
 turkey.140.desc:0 "Die Unterstützung unserer Verbündeten im Kampf gegen den Feind kann den Druck und die Gewalt auf unsere Soldaten an der Front verringern. Wir sollten ihnen einige unserer überschüssigen oder ungenutzten Flugzeuge zur Verfügung stellen und sie in ihren Kriegsanstrengungen unterstützen."
 turkey.140.a:0 "Lasst uns geben, was wir können"
 turkey.140.b:0 "Wir können in begrenztem Umfang unterstützen"
 turkey.140.c:0 "Wir haben keine überschüssigen Flugzeuge"
 turkey.141.t:0 "Unser Verbündeter USA wird unsere Kriegsanstrengungen voll unterstützen."
 turkey.141.desc:0 "Unsere diplomatischen Forderungen sind endlich abgeschlossen. Die USA haben sich bereit erklärt, alle von uns angeforderten Flugzeuge bereitzustellen."
 turkey.141.a:0 "Gut"
 turkey.142.t:0 "Unser Verbündeter Großbritannien wird unsere Kriegsanstrengungen teilweise unterstützen"
 turkey.142.desc:0 "Unsere diplomatischen Forderungen sind endlich abgeschlossen. Die USA haben sich bereit erklärt, einige der von uns angeforderten Flugzeuge bereitzustellen."
 turkey.142.a:0 "Nicht schlecht!"
 turkey.143.t:0 "Hilfe wurde abgelehnt"
 turkey.143.desc:0 "Unsere diplomatischen Forderungen sind nun endlich zu Ende. Leider teilten die USA mit, dass sie nicht viele Militärflugzeuge zur Verfügung hätten."
 turkey.143.a:0 "Wir müssen einen anderen Weg finden"
 turkey.150.t:0 "Es besteht die Gefahr einer Hungersnot"
 turkey.150.d:0 "Es scheint, als hätte ein neuer großer Krieg begonnen. Sollte er sich unseren Grenzen nähern, könnten wir uns in die Konflikte einmischen. Wir sind ein armes Land und unsere Ressourcen sind begrenzt. Im Moment gibt es kein Problem, aber wir sollten uns der Gefahr einer landesweiten Hungersnot bewusst sein."
 turkey.150.a:0 "Wir sollten mit den Vorsichtsmaßnahmen beginnen"
 turkey.150.b:0 "Wir sollten mit den Vorsichtsmaßnahmen beginnen"
 turkey.151.t:0 "Hungersnot nimmt zu"
 turkey.151.d:0 "Mit dem Beginn des deutsch-sowjetischen Krieges wird sich für uns alles noch verschlechtern. Es ist abzusehen, dass unser bereits begonnenes Hungerproblem mit der bald beginnenden Teilmobilmachung noch weiter zunehmen wird."
 turkey.151.a:0 "Gott helfe unserer Nation!"
 turkey.151.b:0 "Gott helfe unserer Nation!"
 turkey.151.c:0 "Gott helfe unserer Nation!"
 remove_participants_claims_tt:0 "Dadurch werden unsere Ansprüche auf das Territorium anderer Teilnehmer §Yentfernt§!"
 turkey.152.t:0"Balkanpakt"
 turkey.152.d:0"Jahrzehntelang kämpften wir um Gebiete auf dem Balkan, der letzte Krieg war eine Katastrophe. Vergessen wir nicht, wie sehr die Menschen gelitten haben. Es ist nun an der Zeit, unsere in Versailles gezogenen Grenzen zu respektieren. Wir müssen uns den Mächten, die uns angreifen wollen, stellen. Lasst uns eine geschlossene Front bilden und alle umstrittenen Gebietsansprüche gegenüber anderen Teilnehmern und unseren unmittelbaren Nachbarn zurückstellen."
 turkey.152.a:0"Unterschreiben wir es"
 turkey.152.b:0"Das ist Unsinn!"
 tur_france.40.t:0 "[877.GetName] möchte [TUR.GetName] beitreten" 
 tur_france.40.d:0 "[TUR.GetName] besteht weiterhin auf [877.GetName]. Im vergangenen Jahr hat das Volk von [877.GetName] durch Initiativen der türkischen Regierung und des Völkerbundes seine teilweise Unabhängigkeit erlangt und möchte nun an [TUR.GetName] teilnehmen, indem es sich vollständig unserem Einfluss entzieht." 
 tur_france.40.a:0 "[877.GetName] ist nicht unsere Priorität." 
 tur_france.40.b:0 "Wie kannst du es wagen?"
 tur_france.40_tt:0 "§Y[TUR.GetName]§! erhält ein §CConquer§!-Kriegsziel für uns, nämlich die Einnahme von [877.GetName]."
 tur_france.42.t:0 "[877.GetName] möchte [TUR.GetName] beitreten" 
 tur_france.42.d:0 "[TUR.GetName] besteht weiterhin auf [877.GetName]. Im vergangenen Jahr hat das Volk von [877.GetName] durch Initiativen der türkischen Regierung und des Völkerbundes seine teilweise Unabhängigkeit erlangt und möchte nun an [TUR.GetName] teilnehmen, indem es sich vollständig unserem Einfluss entzieht." 
 tur_france.42.a:0 "[877.GetName] ist nicht unsere Priorität." 
 tur_france.42.b:0 "Wie kannst du es wagen?"
 tur_france.41.t:0 "[TUR.GetName] beansprucht Aleppo." 
 tur_france.41.d:0 "[TUR.GetName] erhebt Anspruch auf die Gebiete, die es nach dem Waffenstillstand von Mondros behalten hat. Als Vorwand nutzten sie einige Einzelereignisse in den turkmenischen Vierteln Aleppos und schickten uns eine Nachricht, in der sie Aleppo beanspruchen." 
 tur_france.41.a:0 "Es lohnt sich nicht, für Sand zu sterben." 
 tur_france.41.b:0 "Wie kannst du es wagen?!"
 tur_france.41_tt:0 "§Y[TUR.GetName]§! erhält für uns das Kriegsziel §CErobern§!, Aleppo einzunehmen."
 tur_iraq.1.t:0 "[TUR.GetName] fordert Mosul"
 tur_iraq.1.d:0 "[TUR.GetName] möchte heute das Problem lösen, das in der Vergangenheit mit England nicht gelöst werden konnte. Da sie einen Vorwand für die Spannungen zwischen ethnischen Gruppen in der Stadt bieten, sind wir sicher, dass das Hauptziel die Ölvorkommen in Mossul sind."
 tur_iraq.1.a:0 "Wir halten die Forderungen der Irak-Türken für gerechtfertigt"
 tur_iraq.1.b:0 "Wenn sie Mossul wollen, sind sie bereit für den Krieg"
 tur_iraq.1_tt:0 "§Y[TUR.GetName]§! erhält für uns das Kriegsziel §CConquer§!, Mosul einzunehmen."
 tur_greece.10.t:0 "[TUR.GetName] beansprucht Westthrakien und die Ägäischen Inseln"
 tur_greece.10.d:0 "[TUR.GetName] erhebt erneut Anspruch auf die Gebiete, die wir in den Balkankriegen und im Ersten Weltkrieg erobert haben. In jüngster Zeit haben wir aufgrund der Übungen in unseren Grenzregionen begonnen, eine solche Möglichkeit in Betracht zu ziehen. Diese Forderung wird unsere Beziehungen schädigen."
 tur_greece.10.a:0 "Trotzdem können wir nicht dafür kämpfen"
 tur_greece.10.b:0 "Diese Forderung ist inakzeptabel!"
 tur_greece.10_tt:0 "§Y[TUR.GetName]§! erhält für uns das Kriegsziel §CEroberung§!, Thrakien und die Ostägäischen Inseln einzunehmen."
 tur_greece.11.t:0 "Kreta-Ansprüche"
 tur_greece.11.d:0 "[TUR.GetName] fordert mehr Zugeständnisse im östlichen Mittelmeerraum. Am Rande eines Zypernkriegs erheben sie nun auch Anspruch auf Kreta. Diese aggressive Außenpolitik muss ein Ende haben."
 tur_greece.11.a:0 "Es lohnt sich auf keinen Fall, dafür zu kämpfen."
 tur_greece.11.b:0 "Irgendwo muss diese aggressive Politik ein Ende haben."
 tur_greece.11_tt:0 "§Y[TUR.GetName]§! erhält für uns das Kriegsziel §CEroberung§!, Kreta zurückzuerobern."
 tur_soviet.200.t:0 "[TUR.GetName] will Batumi zurück"
 tur_soviet.200.d:0 "Die türkische Regierung will Batumi, das sie uns während des türkischen Unabhängigkeitskrieges geschenkt hat. Wir werden dieser Herausforderung nachkommen."
 tur_soviet.200.a:0 "Wir haben schon genug Ärger."
 tur_soviet.200.b:0 "Diese Behauptung ist völliger Unsinn!"
 tur_soviet.200_tt:0 "§Y[TUR.GetName]§! erhält für uns das Kriegsziel §CConquer§!, Georgien zurückzuerobern."
 tur_britain.100.t:0 "Zypern-Forderungen"
 tur_britain.100.d:0 "[TUR.GetName] erhebt Anspruch auf die Insel Zypern, um seine Vorherrschaft im östlichen Mittelmeerraum auszubauen. Angesichts der aktuellen Lage wäre eine Rückgabe vielleicht das kleinere Übel, würde jedoch unserer Position auf der Weltbühne schaden. Der Rat muss dies diskutieren."
 tur_britain.100.a:0 "Wir müssen uns an Gallipoli erinnern"
 tur_britain.100.b:0 "Diese Behauptung ist inakzeptabel und unerhört."
 tur_britain.100_tt:0 "§Y[TUR.GetName]§! erhält für uns das Kriegsziel §CErobern§!, Zypern zurückzuerobern."
 tur_britain.101.t:0 "[TUR.GetName] möchte sich Verbündeten anschließen"
 tur_britain.101.d:0 "Seit langem laufen zwischen den alliierten Führern und [TUR.GetLeader] Verhandlungen über die Eröffnung einer neuen Front. Die türkische Regierung, die ihre Besorgnis über die Verschärfung des Krieges in Europa zum Ausdruck bringt, möchte sich den Reihen der Alliierten anschließen und, als ob dies für einen Kriegseintritt notwendig wäre, ihre Länder durch technische Unterstützung schützen."
 tur_britain.101.a:0 "Wir akzeptieren gerne"
 tur_britain.101.b:0 "Es ist nicht notwendig"
 bulgaria.10.t:0 "Faschistischer Putsch!"
 bulgaria.10.d:0 "Die faschistischen Milizen umzingelten die Versammlung. Wir müssen zurücktreten"
 bulgaria.10.a:0 "Traurig"
 news.1250.t:0 "Remilitarisierung der Meerengen" 
 news.1250.d:0 "Mit der neuen Meerengen-Konvention, die nach zweimonatigen Sitzungen unterzeichnet wurde, wurden [TUR.GetName]s eingeschränkte Rechte wiederhergestellt und die Souveränität über die Meerengenregion ging auf [TUR.GetName] über. Infolgedessen wurde die Meerenge bedingungslos der Republik [TUR.GetName] überlassen und das Recht zum Bau von Befestigungsanlagen gewährt. \n\nDie türkische Regierung wird den Vertrag im Auge behalten, um sicherzustellen, dass alle Bestimmungen bezüglich der Durchfahrt von Schlachtschiffen durch die Meerengen eingehalten werden."
 news.1250.a:0 "Ein gerechter Frieden" 
 news.1250.b:0 "Die Meerengen bleiben unter türkischer Souveränität!"
 news.1251.t:0 "[877.GetName] hat ein Referendum" 
 news.1251.d:0 "Die Franzosen boten [877.GetName] neutrale Wahlen an, da sie glaubten, Atatürk könne [877.GetName] mit Gewalt einnehmen. Mit dieser Vereinbarung beschlossen beide Seiten, eine gewisse militärische Macht in [877.GetName] zu behalten. Als Ergebnis der Wahlen wurde unter der Garantie Frankreichs und [TUR.GetName] ein vorübergehender, unabhängiger Staat gegründet."
 news.1251.a:0 "Interessant" 
 news.1251.b:0 "[877.GetName] sollte sein eigenes Schicksal selbst bestimmen"
 news.1252.t:0 "[877.GetName] wurde von [TUR.GetName] annektiert" 
 news.1252.d:0 "Das Endergebnis war der langjährige diplomatische Austausch zwischen dem französischen und dem türkischen Staat, die aufgrund der zunehmenden Spannungen in Europa einen möglichen Krieg vermeiden wollten. [877.GetName] schloss sich [TUR.GetName] erneut an."
 news.1252.a:0 "Der Frieden muss fortbestehen" 
 news.1252.b:0 "Der Wille Atatürks wurde erfüllt"
 news.1253.t:0 "Kampf um [877.GetName]" 
 news.1253.d:0 "Alle Gespräche mit dem französischen Staat für [877.GetName] blieben ergebnislos. Der französische Staat ignorierte die Forderungen der Bevölkerung von [877.GetName]. Die türkische Regierung erklärte, ein Krieg für [877.GetName] sei nun unvermeidlich."
 news.1253.a:0 "Besorgniserregend" 
 news.1253.b:0 "[877.GetName] kurtarılana kadar savaşacağız"
 news.1254.t:0 "Der Aufstand wurde niedergeschlagen" 
 news.1254.d:0 "Denn der monatelange Konflikt endete schließlich mit einem Sieg. Aufständische Gangster wurden unter schweren Verlusten besiegt und flohen. Viele Familien derer, die sich Isa anschlossen, wurden in andere Regionen des Landes verbannt."
 news.1254.a:0 "Sie haben den Preis bezahlt"
 news.1254.a_tt:0 "Kurdische Separatistenbewegung wurde unterdrückt"
 news.1255.t:0 "Thrakien-Manöver" 
 news.1255.d:0 "\nFür die Übung wurde die Region Thrakien ausgewählt, die seit dem Osmanischen Reich schwer zu verteidigen war. Ziel war es, die Verteidigungsfähigkeit in der Region zu stärken, in der die angreifenden Streitkräfte einen wichtigen Vorteil hätten, da die Geländestruktur für einen Frontkrieg nicht geeignet war.\n\nEtwa 200.000 Soldaten nahmen drei Tage lang an der Übung teil."
 news.1255.a:0 "Wir müssen jederzeit zum Krieg bereit sein" 
 news.1255.b:0 "Der Frieden muss fortbestehen"
 news.1256.t:0 "Der Sadabad-Pakt wurde unterzeichnet" 
 news.1256.d:0 "Zwischen [TUR.GetName], dem Irak, dem Iran und Afghanistan wurde ein regionaler Nichtangriffspakt unterzeichnet. Die Seiten verpflichten sich grundsätzlich, sich nicht in die inneren Angelegenheiten der jeweils anderen Seite einzumischen, sich in Fragen von gemeinsamem Interesse zu beraten, gegenseitige Angriffe zu vermeiden und den Schutz ihrer Grenzen zu respektieren. Das Problem der kurdischen Stämme, das den Hauptgrund für den Pakt darstellt, wird jedoch in den folgenden Formulierungen des Artikels 7 verborgen: \nBEine der Vertragsparteien ist verpflichtet, die Gründung und Durchführung von Aktionen bewaffneter Banden, Vereinigungen oder Organisationen zu verhindern, die darauf abzielen, die Institutionen anderer Vertragsparteien auf ihrem Territorium zu zerstören, die Ordnung und Sicherheit zu stören oder das politische Regime zu stürzen."
 news.1256.a:0 "Die Unabhängigkeit unserer Nachbarn sollte respektiert werden" 
 news.1256.b:0 "Interessant"
 news.1257.t:0 "Militärakademien" 
 news.1257.d:0 "Die Kriegsakademien und Reserveoffiziersschulen werden ausgebaut, um für unsere junge Republik besser qualifizierte und talentierte Offiziere auszubilden, ihnen eine bessere Ausbildung zu bieten und ihnen die Kunst der Kriegsführung entsprechend den Bedingungen der Zeit beizubringen."
 news.1257.a:0 "Unsere Offiziere werden weltweit ein Vorbild sein" 
 news.1258.t:0 "Atatürks Vermächtnis" 
 news.1258.d:0 "Als sich sein Gesundheitszustand verschlechterte, musste Atatürk der Regierung seinen Willen mitteilen. Er verkündete, dass er alle Bauernhöfe und Güter dem Staat, seinen geistlichen Töchtern einen Teil seines Gehalts und dem Türkischen Historischen Verein einen Teil seiner Anteile schenken würde."
 news.1258.a:0 "Traurige Tage stehen bevor" 
 news.1259.t:0 "Die nationale Industriepolitik ist im Gange" 
 news.1259.d:0 "Unsere nationale Industrie entwickelt sich weiter. Die Regierung, die sich um den Aufschwung unserer Republik bemühte, konnte zahlreiche Industrie- und Dienstleistungsunternehmen, die sich in ausländischer Hand befanden, verstaatlichen. Darüber hinaus werden zahlreiche neue Fabriken und Betriebe eröffnet."
 news.1259.a:0 "Wir werden zeitgenössische Zivilisationen erreichen" 
 news.1260.t:0 "15. Jahr der Republik" 
 news.1260.d:0 "Der 15. Jahrestag unserer Republik, die unter tausend Opfern gegründet wurde, wurde feierlich, aber auch etwas traurig gefeiert. Atatürks Abwesenheit aufgrund seiner zunehmenden Krankheit bedrückte die Bürger. \n\nSchüler der Kuleli-Militärhochschule begrüßten Atatürk, indem sie die Unabhängigkeitshymne in die Mundhöhle sangen, während sie mit einer Fähre den Dolmabahçe passierten."
 news.1260.a:0 "Unsere Republik wird ewig leben!"
 news.1261.t:0 "[TUR.GetName] Aufbau am Bosporus"
 news.1261.d:0 "Mit der Montreux-Konvention erhielt [TUR.GetName] das Recht, die Meerenge zu befestigen und zu militarisieren. Mit der zunehmenden Kriegsgefahr in [TUR.GetName] begann man mit dem Bau von Befestigungen zum Schutz der Meerenge. \n\nAndererseits deuten viele Gerüchte darauf hin, dass die Forderung der Sowjetunion nach einem Stützpunkt in der Meerenge einer der Gründe für die verstärkten Befestigungen ist."
 news.1261.a:0 "Dies war notwendig"
 news.1261.b:0 "Sie haben das Recht, dies zu tun"
 news.1262.t:0 "Dorfinstitute"
 news.1262.d:0 "Der Unterricht in Dörfern wurde für an traditionellen Lehrerbildungsanstalten ausgebildete Lehrer eher als Pflichtaufgabe denn als ehrenamtliche Tätigkeit angesehen. In den ersten Jahren der Republik lebten etwa 80 % der türkischen Bevölkerung in Dörfern, und nur 5 % von ihnen konnten lesen und schreiben. Genau zu diesem Zweck wurden Dorfinstitute eröffnet.\n\nObwohl der Hauptzweck der Dorfinstitute die Ausbildung intelligenter Schüler war, zielten sie in den folgenden Jahren darauf ab, das Bewusstsein der Dorfbevölkerung zu schärfen, sie in Landwirtschaft und landwirtschaftlichen Techniken zu unterrichten und auch die tiefe Kluft zwischen ihnen und dem städtischen Leben zu verringern."
 news.1262.a:0 "Für die Arbeit, Bildung in der Arbeit!"
 news.1263.t:0 "Misak-i Milli"
 news.1263.d:0 "[TUR.GetName] startet diplomatische Initiativen zur Neuverhandlung der 1920 festgelegten Grenzen des Misak-i Milli (Nationaleid). Die Grenzen des Misak-i Milli umfassen die Gebiete, die während des Waffenstillstands von Mondros, der Kapitulationserklärung des Osmanischen Reiches, unter türkischer Souveränität standen. Einige dieser Gebiete liegen jedoch innerhalb der Grenzen anderer Staaten. Angesichts der Möglichkeit, dass diese Initiativen in den kommenden Jahren militärische Folgen haben könnten, wird über die Aussicht auf weitere Spannungen diskutiert. Oder träumen die Türken von einem neuen Osmanischen Reich mit geändertem Namen?"
 news.1263.a:0 "Wir werden unsere wahren Grenzen erreichen"
 news.1263.b:0 "Besorgniserregend"
 news.1264.t:0 "Westthrakien tritt an [TUR.GetName] ab"
 news.1264.d:0 "Die Forderungen von [TUR.GetName] auf den Ägäischen Inseln und in Westthrakien erwiesen sich als erfolgreich. Griechenland gab die Verwaltung der Regionen auf, um einen möglichen Krieg zu verhindern. Obwohl die europäischen Staaten froh sind, dass die Krise nicht in einen Krieg ausartete, ist es sicher, dass sie die neuen Ereignisse begreifen werden."
 news.1264.a:0 "Wir haben bekommen, was wir verdient haben"
 news.1264.b:0 "Wir konnten den Krieg nicht riskieren"
 news.1264.c:0 "Hoffen wir, dass es nicht so weitergeht"
 news.1265.t:0 "Die Krise in West-Thrakien verschärft sich"
 news.1265.d:0 "Die Ansprüche von [TUR.GetName] auf den Ägäischen Inseln und in Westthrakien waren nicht überzeugend. Die griechische Regierung drohte [TUR.GetName] mit der Ankündigung, dass es zum Krieg kommen könnte, wenn die Ansprüche bestehen bleiben. Auf türkischer Seite wird unter anderem bekannt, dass militärische Mobilität beginnt. Die Gewässer in der Ägäis erwärmen sich erneut."
 news.1265.a:0 "Wir werden genau dort mit ihnen kämpfen"
 news.1265.b:0 "Uns interessieren diese leeren Drohungen nicht"
 news.1265.c:0 "Hoffen wir, dass die Krise nicht eskaliert"
 news.1266.t:0 "Schicksal der Turkmenen"
 news.1266.d:0 "Mit der friedlichen Lösung des [877.GetName]-Problems erhebt [TUR.GetName] erneut ethnische Forderungen und fordert, genau wie [877.GetName], die Übergabe Aleppos an [TUR.GetName]. Die französischen Behörden mussten dieser Forderung aufgrund der Kriegsverpflichtungen nachkommen. Werden diese Forderungen ein Ende haben?"
 news.1266.a:0 "Wenn wir uns mit unserem Land wiedervereinigen, wird Frieden kommen"
 news.1266.b:0 "Wir müssen das tun"
 news.1266.c:0 "Besorgniserregend"
 news.1267.t:0 "Die Krise in Aleppo verschärft sich"
 news.1267.d:0 "Mit der friedlichen Lösung des [877.GetName]-Problems fordert [TUR.GetName] erneut aus ethnischen Gründen die Übergabe Aleppos an [TUR.GetName], genau wie [877.GetName]. Frankreich lehnte diese Forderung jedoch trotz der Schwierigkeiten der aktuellen Kriegslage entschieden ab. Sollten sich die Bedingungen ändern, könnte [TUR.GetName] in eine schwierige Lage geraten."
 news.1267.a:0 "Informieren wir unsere Freunde dort"
 news.1267.b:0 "Wir werden uns dafür rächen"
 news.1267.c:0 "Diese Aggression muss beendet werden"
 news.1268.t:0 "Der Irak hat Mossul aufgegeben"
 news.1268.d:0 "Die Mossul-Frage, die seit Jahrzehnten zwischen Großbritannien und [TUR.GetName] schwelt, konnte trotz heftiger Debatten während der Verhandlungen in Lausanne nicht gelöst werden und verzögerte sich. Großbritanniens Bemühungen, die Verhandlungen vor vollendete Tatsachen zu stellen, brachten die beiden Länder erneut an den Rand eines Krieges. [TUR.GetName] musste jedoch aufgrund der Aufstände im Südosten von [TUR.GetName] von diesen Ansprüchen Abstand nehmen. \n\nMit dem Rückzug Großbritanniens aus dem Irak stellte [TUR.GetName] dem Irak ein Ultimatum, indem es seine Ansprüche auf Mossul, das unter irakischer Verwaltung verblieb, angesichts der zunehmenden Spannungen wieder auf die Tagesordnung brachte. Die irakische Regierung fügte sich diesem Ultimatum, da sie glaubte, keine Hilfe zu erhalten, und gab die Verwaltung Mossuls auf."
 news.1268.a:0 "Mosul wurde an den wahren Besitzer abgetreten"
 news.1268.b:0 "Wir haben nicht genug Macht, um es zu verhindern"
 news.1268.c:0 "Sie gehen zu weit"
 news.1269.t:0 "Militärischer Aufmarsch in Mossul"
 news.1269.d:0 "Die Mossul-Frage, die seit Jahrzehnten zwischen Großbritannien und [TUR.GetName] schwelt, konnte trotz heftiger Debatten während der Verhandlungen in Lausanne nicht gelöst werden und verzögerte sich. Großbritanniens Bemühungen, die Verhandlungen vor vollendete Tatsachen zu stellen, brachten die beiden Länder erneut an den Rand eines Krieges. [TUR.GetName] musste jedoch aufgrund der Aufstände im Südosten von [TUR.GetName] von diesen Ansprüchen Abstand nehmen. \n\nMit dem Rückzug Großbritanniens aus dem Irak stellte [TUR.GetName] dem Irak ein Ultimatum, indem es seine Ansprüche angesichts der zunehmenden Spannungen für Mossul, das weiterhin unter irakischer Verwaltung stand, wieder auf die Tagesordnung brachte. Die irakische Regierung weigerte sich energisch, die Verwaltung von Mossul aufzugeben, und bezeichnete dieses Ultimatum als arrogant."
 news.1269.a:0 "Mosul wird schließlich zu seinem wahren Besitzer"
 news.1269.b:0 "Wir können Mossul nicht ohne Kampf aufgeben"
 news.1269.c:0 "Wir hoffen, dass dies keinen Krieg auslöst"
 news.1270.t:0 "Türkische Ansprüche auf Zypern"
 news.1270.d:0 "Die Insel Zypern, die während des Osmanisch-Russischen Krieges 1877–1878 teilweise von Großbritannien kontrolliert wurde, war zu Beginn des Ersten Weltkriegs vollständig besetzt. Zypern ist für die Sicherheit des östlichen Mittelmeers und des Suezkanals von strategischer Bedeutung. Die türkischen Behörden bezeichneten die Besetzung Zyperns als reine Täuschung und forderten den sofortigen Rückzug Englands von Zypern sowie die Übergabe der Kontrolle über die Insel. Angesichts der Kriegslasten in Europa und der Möglichkeit einer neuen Front akzeptierte die britische Regierung die Übertragung der Kontrolle über Zypern."
 news.1270.a:0 "Das wird uns sehr nützlich sein"
 news.1270.b:0 "Wir kümmern uns später darum"
 news.1270.c:0 "Eine weitere Krise wurde ohne Krieg gelöst."
 news.1271.t:0 "Ein Gegenangebot"
 news.1271.d:0 "Die Insel Zypern, die während des Osmanisch-Russischen Krieges von 1877–1878 teilweise annektiert wurde, war zu Beginn des Ersten Weltkriegs vollständig besetzt. Zypern ist für die Sicherheit des östlichen Mittelmeers und des Suezkanals von strategischer Bedeutung. Die türkischen Behörden bezeichneten die Besetzung Zyperns als bloßes bürokratisches Schlupfloch und forderten den sofortigen Abzug aller Besatzungstruppen von der Insel Zypern sowie die Übernahme der Kontrolle über die Insel durch [TUR.GetName]. Die Gegenregierung betrachtete diese Forderung als Opportunismus und wies sie entschieden zurück, da sie einen höheren Preis für diese Forderung habe."
 news.1271.a:0 "Wir werden der alleinige Herrscher des östlichen Mittelmeers sein"
 news.1271.b:0 "Dafür werden wir in Zukunft bezahlen"
 news.1271.c:0 "Oder wird es eine zweite Gallipoli-Katastrophe geben?"
 news.1272.t:0 "Türkische Ansprüche auf Kreta"
 news.1272.d:0 "Trotz des gewonnenen Krieges gegen das griechische Königreich verlor das Osmanische Reich durch politische Tricks die Kontrolle über Kreta. Dieses jahrelang vernachlässigte Thema rückte mit der verstärkten Präsenz der türkischen Marine in der Ägäis und im Mittelmeer wieder in den Vordergrund. Die zunehmenden Spannungen nach den türkischen Marinemanövern vor Kreta erreichten ihren Höhepunkt, als die türkische Seite Griechenland Ultimaten bezüglich Kretas stellte. Nach Einschätzung der griechischen Militärbehörden musste die Verwaltung Kretas aufgegeben werden, da Kreta nicht mehr verteidigt werden konnte."
 news.1272.a:0 "Aegean jetzt völlig sicher"
 news.1272.b:0 "Wir haben eine wichtige Macht im östlichen Mittelmeerraum verloren"
 news.1272.c:0 "[TUR.GetName] muss dem Kriegsgeschrei ein Ende setzen"
 news.1273.t:0 "Griechenland entschied sich für die Verteidigung Kretas"
 news.1273.d:0 "Trotz des gewonnenen Krieges gegen das griechische Königreich verlor das Osmanische Reich durch politische Tricks die Kontrolle über Kreta. Dieses jahrelang vermiedene Thema rückte mit der verstärkten Präsenz der türkischen Marine in der Ägäis und im Mittelmeer wieder in den Vordergrund. Die zunehmende Spannung nach den Übungen der türkischen Marine vor der Küste Kretas erreichte ihren Höhepunkt, als die türkische Seite Griechenland Ultimaten bezüglich Kretas stellte. Yunan askeri yetkilerin açıklamalarına göre savaş planının hazır olduğu, Girit&#39;in ne pahasına olursa olsun savunulacağı bildirildi."
 news.1273.a:0 "Wir bereiten unsere Kriegspläne vor"
 news.1273.b:0 "Wir werden Kreta niemals aufgeben"
 news.1273.c:0 "[TUR.GetName] muss dem Kriegsgeschrei ein Ende setzen"
 news.1274.t:0 "Die Sowjetunion zieht sich aus Batumi zurück"
 news.1274.d:0 "[TUR.GetName] hat Batumi den Sowjets als Geschenk für seine Hilfe im Unabhängigkeitskrieg hinterlassen. Aufgrund der stark zunehmenden Militärpräsenz von [TUR.GetName] stellte [TUR.GetName] Batumi unter Berücksichtigung der Lage der Sowjetunion ein Ultimatum und forderte Batumi zurück. Die sowjetischen Behörden waren gezwungen, dieses Angebot anzunehmen, da sie befürchteten, dass eine neue Grenze im Süden den endgültigen Sieg für immer verhindern könnte."
 news.1274.a:0 "Im Osten sind wir an unsere Grenzen gestoßen"
 news.1274.b:0 "Wir werden dieses Problem in Zukunft definitiv lösen"
 news.1274.c:0 "Die Rückkehr erfolgte am Rande einer großen Schlacht."
 news.1275.t:0 "Aufbau in Georgien"
 news.1275.d:0 "[TUR.GetName] hat Batumi als Geschenk an die Sowjets hinterlassen, da er im Unabhängigkeitskrieg geholfen hatte. Aufgrund der stark zunehmenden Militärpräsenz stellte [TUR.GetName] Batumi ein Ultimatum und forderte Batumi zurück. Die sowjetischen Behörden bezeichneten diese Forderung als Verrat und konnten nur erklären, dass der Preis für diesen Verrat früher oder später fällig würde."
 news.1275.a:0 "Wir werden Batumi nicht aufgeben"
 news.1275.b:0 "Sie kommen, wenn sie es sich leisten können."
 news.1275.c:0 "[TUR.GetName] schwimmt in gefährlichen Gewässern"
 news.1276.t:0 "[TUR.GetName] folgt der Balkan-Spread-Richtlinie"
 news.1276.d:0 "[TUR.GetName] plant, die in den letzten 50 Jahren auf dem Balkan verlorenen Gebiete zurückzuerobern. Mit der Machtübernahme der faschistischen Regierung wurde eine noch stärkere Ausbreitung der Ausbreitungspolitik vorhergesagt. Das heute in den frühen Morgenstunden veröffentlichte Ultimatum prognostiziert einen Ausbruch großer Kämpfe auf der Balkanhalbinsel."
 news.1276.a:0 "Ein Hindernis, das auf dem Weg zum Imperium überwunden werden muss"
 news.1276.b:0 "Wir werden kämpfen, wir werden gewinnen!"
 news.1276.c:0 "Diese dunklen Zeiten"
 news.1277.t:0 "Wüstensturm im Anmarsch"
 news.1277.d:0 "[TUR.GetName] plant, sein Land vor dem Ersten Weltkrieg zurückzuerobern. Mit der Machtübernahme der faschistischen Regierung wurde eine noch stärkere Ausbreitung der Gewalt vorhergesagt. Mit dem heute in den frühen Morgenstunden veröffentlichten Ultimatum wird ein Ausbruch einer großen Schlacht im Nahen Osten vorhergesagt."
 news.1277.a:0 "Wüste &amp; Stahl &amp; Feuer &amp; Schießpulver"
 news.1277.b:0 "Es ist Zeit, diesen Unsinn zu beenden"
 news.1277.c:0 "Diese dunklen Zeiten"
 news.1278.t:0 "[TUR.GetName] zielt auf Rassenpolitik ab "
 news.1278.d:0 "[TUR.GetName] behauptet, dass die türkischen und muslimischen Völker im Osten nun unter seinem Schutz stehen. Mit der Machtergreifung der faschistischen Regierung wurde eine noch stärkere Ausbreitung der Gewalt vorhergesagt. Es wird vorausgesagt, dass an der Küste des Schwarzen Meeres und des Kaspischen Meeres eine große Schlacht ausbrechen könnte. Das Ultimatum wurde heute in den frühen Morgenstunden veröffentlicht."
 news.1278.a:0 "Wir werden unsere Verwandten vor der kommunistischen Verfolgung retten."
 news.1278.b:0 "Gegen Ende des Faschismus"
 news.1278.c:0 "Diese dunklen Zeiten"
 news.1279.t:0 "[TUR.GetName] akzeptiert Asylanträge"
 news.1279.d:0 "[TUR.GetName] hat den Asylanträgen jüdischer Wissenschaftler stattgegeben, die vor der nationalsozialistischen Verfolgung geflohen waren. In der Erklärung hieß es, sie würden vorläufige Ausweise für Asylbewerber erhalten und könnten innerhalb der Grenzen von [TUR.GetName] frei arbeiten. Es wird jedoch erwartet, dass sich diese Situation negativ auf die türkisch-deutschen Beziehungen auswirken wird."
 news.1279.a:0 "Im Namen der Menschlichkeit"
 news.1279.b:0 "Mitarbeiter!"
 news.1279.c:0 "Gute Nachrichten"
 news.1280.t:0 "Vermögensteuerrecht"
 news.1280.d:0 "Das Gesetz, das hauptsächlich die Handelsbourgeoisie, aber auch Landwirte, Handwerker und Lohnempfänger betrifft, ist eine Sondersteuer, die von bestimmten Kommissionen einmalig erhoben wird und gegen die kein Einspruch eingelegt werden kann. Es wird behauptet, das Gesetz sei erlassen worden, um „die hohen Gewinne zu besteuern, die durch die außergewöhnlichen Kriegsbedingungen erzielt werden“ und richte sich nicht gegen eine religiöse oder ethnische Gruppe. Allerdings bereitet diese ausschließlich von Nichtmuslimen erhobene Steuer [TUR.GetName] Schwierigkeiten, insbesondere durch negative Spekulationen in der ausländischen Presse."
 news.1280.a:0 "Wir brauchen das"
 news.1281.t:0 "[TUR.GetName] ist den Alliierten beigetreten"
 news.1281.d:0 "[TUR.GetName] suchte nach Maßnahmen gegen die drohende faschistische Gefahr. Die letzten langwierigen Verhandlungen mit England und seinen Verbündeten fanden in einem Eisenbahnwaggon in Adana statt. Die Liste der Materialien, die [From.GetLeader] als Voraussetzung für den Kriegseintritt verlangte, wurde von den Allianzmitgliedern besprochen und angenommen. [TUR.GetName] wird voraussichtlich mit dem Beginn der Hilfsmaßnahmen eine neue Front eröffnen."
 news.1281.a:0 "Dies ist die Seite, auf der wir sein müssen"
 news.1281.b:0 "Ein weiterer Schritt zum endgültigen Sieg"
 news.1281.c:0 "Interessant"
 news.1282.t:0 "[TUR.GetName] gibt den Beitritt zu den Alliierten auf"
 news.1282.d:0 "[TUR.GetName] suchte nach Maßnahmen gegen die drohende faschistische Gefahr. Die letzten langwierigen Verhandlungen mit England und seinen Verbündeten fanden in einem Eisenbahnwaggon in Adana statt. Die von [From.GetLeader] als Voraussetzung für den Kriegseintritt geforderte Materialliste wurde von den Allianzmitgliedern diskutiert und abgelehnt. [From.GetLeader] erklärte, dass es unter diesen Bedingungen unmöglich sei, eine neue Front zu eröffnen."
 news.1282.a:0 "Dann nutzen wir die verfügbaren Einrichtungen"
 news.1282.b:0 "Vielleicht ist es das Richtige"
 news.1282.c:0 "Interessant"
 news.1283.t:0 "[TUR.GetName] lehnt Asylanträge ab"
 news.1283.d:0 "[TUR.GetName] lehnte den Asylantrag jüdischer Wissenschaftler ab, die vor der Nazi-Tyrannei geflohen waren. Es wurde erklärt, dass die Asylfrage eine innerdeutsche Angelegenheit sei und [TUR.GetName] sich in dieser Angelegenheit nicht einmischen werde. Obwohl dies die deutsch-türkischen Beziehungen positiv beeinflussen dürfte, haben Großbritannien und seine Verbündeten angekündigt, [TUR.GetName] für einen möglichen Völkermord verantwortlich zu machen."
 news.1283.a:0 "Unsere Präferenz wird schwerwiegende Konsequenzen haben"
 news.1283.b:0 "Dies sollte"
 news.1283.c:0 "Besorgniserregend"
 news.1284.t:0 "Ankara-Pakt unterzeichnet"
 news.1284.d:0 "[TUR.GetName] suchte nach einem Bündnis gegen einen möglichen Konflikt im Mittelmeerraum und konnte die Sicherheit seiner Küsten mit dem Pakt gewährleisten, den er England und Tur_France vorschlug. Dem Pakt zufolge werden sich die Parteien im Falle eines Konflikts im Mittelmeerraum gegenseitig im Rahmen ihrer Möglichkeiten militärisch und wirtschaftlich unterstützen."
 news.1284.a:0 "Ein großer Schritt im Namen unserer nationalen Sicherheit"
 news.1284.b:0 "Ein notwendiger Schritt für die Sicherheit des Mittelmeers"
 news.1284.c:0 "Sie bereiten sich auf das Schlimmste vor."
 news.1285.t:0 "Fall von Rassismus und Turanismus abgeschlossen"
 news.1285.d:0 "Zahlreiche prodeutsche Schriftsteller, Dichter und Akademiker wurden wegen faschistischer Propaganda zu Gefängnisstrafen unterschiedlicher Höhe und teilweise zur Verbannung verurteilt. Hüseyin Nihal Atsiz, der häufig prodeutsche Empfehlungsschreiben an die Regierung verfasste, wurde im Rahmen des Rassismus-Turanismus-Prozesses wegen prodeutscher Propaganda angeklagt und zu einer Gefängnisstrafe verurteilt. Mit der Bestätigung seines Urteils wird er künftig keiner Regierungstätigkeit mehr nachgehen können."
 news.1285.a:0 "Sie wurden verurteilt und bestraft"
 news.1285.b:0 "Was glauben sie, was sie tun?"
 news.1286.t:0 "Freispruch im Fall Rassismus und Turanismus."
 news.1286.d:0 "Zahlreiche prodeutsche Schriftsteller, Dichter und Wissenschaftler, die wegen faschistischer Propaganda vor Gericht standen, wurden zu Gefängnisstrafen unterschiedlicher Höhe und teilweise zur Verbannung verurteilt. Die Einsprüche gegen die Anklagen wurden jedoch anerkannt und ein Großteil der Anschuldigungen zurückgewiesen. Die anerkannten Anklagepunkte wurden unter Anrechnung der einjährigen Haftstrafe der Angeklagten erlassen, und alle Inhaftierten wurden des Landes verwiesen."
 news.1286.a:0 "Dann hat die Gerechtigkeit ihren Platz gefunden"
 news.1287.t:0 "Erdbeben in Erzincan"
 news.1287.d:0 "Katastrophe!\nDie Schäden des schweren Erdbebens in Erzincan sind bereits sichtbar. Sogar Gefangene aus dem Gefängnis halfen bei den Rettungsarbeiten. Durch die Katastrophe wurden über 100.000 Gebäude zerstört und 30.000 Menschen kamen ums Leben."
 news.1287.a:0 "Gott helfe ihnen"
 news.1288.t:0 "[TUR.GetName] unterstützt einen Aufstand der aserbaidschanischen Türken"
 news.1288.d:0 "[TUR.GetName], die ihre Landsleute bewaffnen, um die Sicherheit ihrer Ostgrenze zu erhöhen. Aufgrund der zunehmenden Spannungen mit den Sowjets und dem Iran wird mit der Unterstützung von [TUR.GetName] ein Aufstand der aserbaidschanischen Türken erwartet."
 news.1288.a:0 "Auch unsere Verwandten sollten einen unabhängigen Staat haben."
 news.1288.b:0 "Dieser Aufstand wird sofort niedergeschlagen"
 news.1288.c:0 "Dieser Aufstand wird sofort niedergeschlagen"
 news.1288.e:0 "Besorgniserregend"
 news.1289.t:0 "[TUR.GetName] hat alle Schulden der osmanischen Staatsschuldenverwaltung bezahlt"
 news.1289.d:0 "[TUR.GetName] hat sämtliche Auslandsschulden des Osmanischen Reiches getilgt, die mit dem Krimkrieg begannen und bis zum Fall des Osmanischen Reiches andauerten. Zweifellos hat die Tilgung dieser belastenden Schulden im Land große Begeisterung ausgelöst, aber auch in der Weltöffentlichkeit wurde sie mit Anerkennung und Erstaunen aufgenommen."
 news.1289.a:0 "Noch eine Kette aus Ringen, vor der wir unsere Füße gerettet haben!"
 news.1289.b:0 "Eine interessante Entwicklung"
 news.1290.t:0 "Nationales Schutzgesetz"
 news.1290.d:0 "Aufgrund der großen Kriegsgefahr nimmt unsere Militärpräsenz täglich zu. Es gibt jedoch Probleme mit der Versorgung und Ausrüstung der Armee. Dieses Gesetz zielt darauf ab, die mit der Versorgung und Ausrüstung der Armee verbundene wirtschaftliche Belastung zu verringern."
 news.1290.a:0 "Wir brauchen das"
 news.1291.t:0 "Das Anıtkabir-Mausoleum wurde errichtet"
 news.1291.d:0 "Der Leichnam von Mustafa Kemal Atatürk, dem Gründer unserer Republik, wurde nach seinem Tod im Ethnografischen Museum in Ankara bestattet. In der Bevölkerung wurde jedoch eine Kampagne gestartet, um ihm ein würdiges Mausoleum zu errichten. Viele Jahre nach seinem Tod wurde mit freiwilligen Spenden ein ihm würdiges Gedenkgrab errichtet. Außerdem wurden dem Gedenkgrab mit dem Namen Anıtkabir einige Museen hinzugefügt."
 news.1291.a:0 "Ruhe in Frieden, Atatürk"
 news.1291.b:0 "Also"
 news.1292.t:0 "Erste Bosporus-Brücke wurde fertiggestellt"
 news.1292.d:0 "Der Bau einer Brücke über den Bosporus war jahrhundertelang der Traum der Architekten und Herrscher der Stadt. Aufgrund unzureichender Bautechnik und der damit verbundenen Kosten konnte das Projekt jahrhundertelang nicht realisiert werden. Endlich wurde es realisiert. Jetzt sind Europa und Asien durch eine Hängebrücke wie das Goldene Tor verbunden"
 news.1292.a:0 "Großartige Arbeit für unsere Nation"
 news.1292.b:0 "Eine interessante Entwicklung"
 news.1293.t:0 "Struma-Katastrophe"
 news.1293.d:0 "Die Nazis setzten in Rumänien ähnliche antijüdische Gesetze in Kraft, wie sie sie zuvor in Polen angewandt hatten. Eine große Gruppe reicher jüdischer Intellektueller aus Rumänien, die Palästina über [TUR.GetName] Hoheitsgewässer erreichen wollten, charterte mit dem gesamten Geld ein 46 Meter langes Kohleschiff namens Struma mit einem Motor Modell 1830. Die Struma war ein [BUL.GetAdjective]n Schiff unter panamaischer Flagge.\nDas Schiff erreichte nach einiger Zeit den Bosporus. [TUR.GetName] zögerte jedoch, dem Schiff die Durchfahrt zu gestatten, da eine politische Krise drohte. Während das Schiff auf die Durchfahrtsgenehmigung für Istanbul wartete, wurde es von einem sowjetischen U-Boot torpediert. 768 Menschen, darunter 103 Kinder, starben. Nur 1 Person überlebte."
 news.1293.a:0 "Einige unnötige Menschen starben"
 news.1293.b:0 "Was für eine schreckliche Katastrophe"
 news.1294.t:0 "Refah-Tragödie"
 news.1294.d:0 "[TUR.GetName] hatte vor Kriegsbeginn U-Boote und Flugzeuge aus Großbritannien bestellt. Geplant war, dass die Delegation, bestehend aus Militärangehörigen und Zivilisten, die die Befehle entgegennehmen sollten, zunächst mit dem Schiff Refah nach Ägypten fahren und dann per Flugzeug nach Großbritannien weiterfliegen sollte. Das Schiff mit der Delegation wurde jedoch vor Zypern von einem unbekannten U-Boot versenkt. Eine Kommission wurde zur Untersuchung des Vorfalls eingesetzt, und erste Erkenntnisse deuten darauf hin, dass das Schiff Refah versehentlich von einem U-Boot der französischen Vichy-Dynastie torpediert wurde. 168 Menschen starben bei der Tragödie, 32 überlebten."
 news.1294.a:0 "Wir finden die Täter"
 news.1294.b:0 "Ein falsches Ziel"
 news.1294.c:0 "Ein verdächtiger Vorfall"
 news.1295.t:0 "Italienisch-türkische Konvergenz"
 news.1295.d:0 "Türkische Beamte statteten Italien einen offiziellen Besuch ab. Auch wenn Gründe und Inhalt des Besuchs nicht erläutert wurden, gilt der Besuch als ein Schritt in Richtung einer türkisch-italienischen militärischen und politischen Annäherung."
 news.1295.a:0 "Unsere neuen Freunde"
 news.1295.b:0 "Also"
 news.1295.c:0 "Interessant"
 news.1296.t:0 "Turanismus breitet sich aus"
 news.1296.d:0 "[TUR.GetName] bereitet sich auf die Öffnung des türkischen Vorgehens in Zentralasien vor. Kürzlich wurde eine Division aus desertierten Soldaten gebildet, die vor der sowjetischen Armee in die Türkei geflohen waren. Die Beziehungen zwischen den Sowjets wurden dadurch beschädigt. Werden die Türken ihre Ideale verwirklichen?"
 news.1296.a:0 "Wir werden das Land unserer Vorfahren erreichen"
 news.1296.b:0 "Faschisten!"
 news.1296.c:0 "Besorgniserregend"
 news.1297.t:0 "Türkisch-Deutsches Bündnis"
 news.1297.d:0 "Deutschland hat endlich die Früchte seiner langjährigen Überzeugungsarbeit geerntet und die Türken auf seine Seite gezogen. Es wird erwartet, dass die Türken bald nach dem Berliner Vertrag in den Krieg eintreten werden."
 news.1297.a:0 "Gemeinsam sind wir stärker"
 news.1297.b:0 "Eine Chance für eine neue Front"
 news.1297.c:0 "Sie bereiteten ihre eigenen Enden vor"
 news.1298.t:0 "Türkisch-Sowjetisches Bündnis"
 news.1298.d:0 "Die Sowjetunion hat endlich die Früchte ihrer langjährigen Überzeugungsarbeit geerntet und die Türken auf ihre Seite gezogen. Es wird erwartet, dass die Türken bald nach dem Moskauer Vertrag in den Krieg eintreten werden."
 news.1298.a:0 "Gemeinsam sind wir stärker"
 news.1298.b:0 "Eine Chance für eine neue Front"
 news.1298.c:0 "Sie bereiteten ihre eigenen Enden vor"
 news.1299.t:0 "Heldentum für die Menschheit"
 news.1299.d:0 "Ein Türke rettete 20.000 französischen Juden das Leben.\n\n[TUR.GetName]s Botschafter in Paris, Behiç Erkin, rettete Zehntausenden Juden das Leben, indem er ihnen mit den von ihm ausgehändigten vorläufigen türkischen Pässen den Einstieg in einen Zug ermöglichte, der nach [TUR.GetName] fuhr."
 news.1299.a:0 "Für die Menschheit"
 news.1299.b:0 "Dummkopf"
 news.1299.c:0 "Er ist ein Held"
 news.1300.t:0 "Rückgabe des Landes in Ostrumelien"
 news.1300.d:0 "Zwischen [TUR.GetName] und [BUL.GetName] ist eine Krise um die Region Burgas ausgebrochen, in der sich in Ostrumelien eine ausgedehnte türkische und muslimische Siedlung befindet. [TUR.GetName] beanspruchte diese Region aufgrund des Drucks, den die Regierung von [BUL.GetName] auf Türken und Muslime ausübte. [BUL.GetName], der nach den gewaltsamen Verhandlungen allein gelassen wurde, wurde unterworfen."
 news.1300.a:0 "Ostrumelien ist ein Türkenland!"
 news.1300.b:0 "Ergebnisse unserer Schwäche"
 news.1300.c:0 "Besorgniserregend"
 news.1301.t:0 "Rhodos-Krise gelöst"
 news.1301.d:0 "Mit dem Vertrag von Ouchy im Jahr 1912 gerieten Rhodos und die Dodekanes-Inseln vorübergehend unter Fremdherrschaft, die nach dem Ersten Weltkrieg endgültig wurde. Aufgrund der Drohversuche des türkischen Außenministeriums stimmten sie jedoch zu, Rhodos zu verlassen."
 
 news.1302.t:0 "Der Hauptbahnhof von Ankara wird in [TUR.GetName] eingeweiht"
 news.1302.d:0 "Nach vielen Jahren hat [TUR.GetName] endlich ein Hauptbahnhofsgebäude errichtet, das seiner neuen Hauptstadt würdig ist, und gleichzeitig unsere Bahnverbindung mit der Schwarzmeerlinie realisiert."
 news.1302.a:0 "Ein glücklicher Tag"
 news.2000.t:0 "HoI IV-Historical [TUR.GetName] Mod v1.9.3-La Resistance"
 news.2000.d:0 "Mit diesem Modus, der das Ergebnis einer über dreijährigen Studie ist, soll den Spielern von [TUR.GetName] ein unterhaltsames Spielerlebnis geboten werden, das noch nicht im Fokus steht. Der Mod basiert im Wesentlichen auf historischen Fakten und enthält teilweise dystopische und utopische Elemente. Für Vorschläge und Fehlerberichte im Kontext des Mods: \nsteam/battle4royal(Coder-Entwickler) \nsteam/withche07(Entwickler)"
 news.2000.a:0 "Lauft diesen Weg, den Ruhm und den Weg des Sieges!"
