 TUR_duyunu_umumiye_category:0 "Düyun-u Umumiye Osmanische Schulden"
 TUR_duyunu_umumiye_category_desc:0 "Düyun-u Umumiye, was so viel bedeutet wie Osmanische Staatsschuldenverwaltung, war eine von europäischen Gläubigerländern gegründete Einrichtung zur Strukturierung der Auslandsschulden des Osmanischen Reiches. Nach der Gründung der Republik wurden die Verhandlungen über die Düyun-u Umumiye-Schulden 1928 abgeschlossen und beschlossen, die Schulden durch eine Teilung mit den in den ehemaligen Reichsgebieten gegründeten Staaten zu strukturieren."
