 entente_balkanique:0 "Balkan Entente"
 entente_balkanique_desc:0 "Gegen die italienische und deutsche Gefahr auf dem Balkan unterzeichneten die vier Balkanstaaten Griechenland, Jugoslawien, Rumänien und [TUR.GetName] am 9. Februar 1934 in Athen die Balkanabkommensakte. Im Rahmen dieser Entente sicherten die Balkanländer gegenseitig ihre Grenzen."
 debt_of_ottomans:0 "Schulden der Osmanen"
 debt_of_ottomans_desc:0 "Nach vielen Jahren der Verhandlungen nach dem Vertrag von Lausanne erklärte sich [TUR.GetName] bereit, seinen Anteil an den verbleibenden Schulden des Osmanischen Reiches zu begleichen (diese Schulden wurden von anderen Nationen geteilt, die ihre Unabhängigkeit von den Osmanen erlangten)."
 ten_years_war_exhaustion:0 "10 Jahre Kriegserschöpfung"
 ten_years_war_exhaustion_desc:0 "Vom Tripolis-Krieg bis zum Unabhängigkeitskrieg: Zehn Jahre lang haben wir gekämpft. Unser Land wurde von westlichen Besatzern verwüstet, und Millionen Menschen verloren in diesen Kriegen ihr Leben. Unser Volk will keine weiteren Kämpfe."
 kurdish_separatism:0 "Kurdische Separatistenaufstände"
 kurdish_separatism_desc:0 "Die separatistischen kurdischen Aufstände, die seit Mitte des 19. Jahrhunderts immer wieder aufflammen, stellen weiterhin eine Bedrohung für die Sicherheit und den Handel an unseren Ostgrenzen dar. Banditen dringen aus den Bergen in die Städte ein, bedrohen Zivilisten, greifen die Sicherheitskräfte an und plündern das Eigentum unserer Händler."
