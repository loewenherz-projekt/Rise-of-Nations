 turkey.80.t:0 "Panzerhilfe für [TUR.GetName]"
 turkey.80.desc:0 "Die Unterstützung unserer Verbündeten im Kampf gegen den Feind kann den Druck und die Gewalt auf unsere Jungs an der Front verringern. Wir sollten ihnen einige unserer überschüssigen oder ungenutzten Panzer zur Verfügung stellen und ihre Kriegsanstrengungen unterstützen."
 turkey.80.a:0 "Lasst uns geben, was wir können"
 turkey.80.b:0 "Wir können in begrenztem Umfang unterstützen"
 turkey.80.c:0 "Wir haben keine überschüssigen Tanks"
 turkey.81.t:0 "Unser Verbündeter Großbritannien wird unsere Kriegsanstrengungen voll unterstützen."
 turkey.81.desc:0 "Unsere diplomatischen Forderungen haben endlich ein Ende. Großbritannien wird uns alle Fahrzeuge zur Verfügung stellen, die wir zu unserer Unterstützung benötigen."
 turkey.81.a:0 "Gut"
 turkey.82.t:0 "Unser Verbündeter Großbritannien wird unsere Kriegsanstrengungen teilweise unterstützen"
 turkey.82.desc:0 "Unsere diplomatischen Forderungen sind endlich abgeschlossen. Großbritannien wird uns einige Fahrzeuge zur Verfügung stellen, um uns zu unterstützen."
 turkey.82.a:0 "Nicht schlecht!"
 turkey.83.t:0 "Hilfe wurde abgelehnt"
 turkey.83.desc:0 "Unsere diplomatischen Forderungen sind nun endlich abgeschlossen. Leider teilte Großbritannien mit, dass es nicht viele Militärfahrzeuge zur Verfügung stellen könne."
 turkey.83.a:0 "Wir müssen einen anderen Weg finden"
