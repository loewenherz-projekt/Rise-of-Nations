 TUR_anitkabir_desc:0 "Die Leiche von Mustafa Kemal Atatürk, dem Gründer unserer Republik und ewigen Meister, wurde nach seinem Tod im Ethnografischen Museum in Ankara begraben. In der Bevölkerung wurde jedoch eine Kampagne gestartet, um ihm ein würdiges Mausoleum zu errichten. Beginnen wir mit dem Bau eines ihm würdigen Gedenkgrabes mit freiwilligen Spenden der Bevölkerung."
 TUR_anitkabir:0 "Bau des Anıtkabir-Mausoleums"
 TUR_bosphorus_bridge_desc:0 "Der Bau einer Brücke über den Bosporus war jahrhundertelang der Traum der Architekten und Herrscher der Stadt. Aufgrund unzureichender Bautechnik und der damit verbundenen Kosten konnte das Projekt jahrhundertelang nicht verwirklicht werden. Doch heute verfügt die Welt über die Technologie, um ein solch großes Projekt zu verwirklichen. Es ist an der Zeit, Europa und Asien miteinander zu verbinden."
