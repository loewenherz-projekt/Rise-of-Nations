CW_Expansion_country.342.t:0 "Gründung der Lateinischen Union"
CW_Expansion_country.342.d:0 "Die Lateinische Union ist eine internationale Organisation romanischer Sprachgemeinschaften, deren Aktivitäten seit 2012 ruhen. Ihr Hauptsitz befindet sich in Paris. Ihr Ziel ist der Schutz, die Verbreitung und Förderung des gemeinsamen kulturellen Erbes der romanischen Völker sowie die Vereinheitlichung der Identitäten der romanischen und romanisch geprägten Welt. Die Union wurde 1954 in Madrid gegründet. Sie nahm 1983 ihre Tätigkeit auf und zählte seitdem 12 Mitglieder, darunter Länder in Nordamerika, Südamerika, Nordeuropa, Südeuropa, Afrika und dem asiatisch-pazifischen Raum."
CW_Expansion_country.342.a:1 "OK"
CW_Expansion_news.342.t:0 "Gründung der Lateinischen Union"
CW_Expansion_news.342.d:0 "Die Lateinische Union ist eine internationale Organisation romanischer Sprachgemeinschaften, deren Aktivitäten seit 2012 ruhen. Ihr Hauptsitz befindet sich in Paris. Ihr Ziel ist der Schutz, die Verbreitung und Förderung des gemeinsamen kulturellen Erbes der romanischen Völker sowie die Vereinheitlichung der Identitäten der romanischen und romanisch geprägten Welt. Sie wurde 1954 in Madrid, Spanien, gegründet. Sie nahm 1983 ihre Tätigkeit auf und ihre Mitgliederzahl stieg von 12 auf 36 Staaten, darunter Länder in Nordamerika, Südamerika, Nordeuropa, Südeuropa, Afrika und dem asiatisch-pazifischen Raum."
CW_Expansion_news.342.a:1 "OK"

CW_Expansion_country.343.t:0 "Nordisches Arbeitsmarktgesetz"
CW_Expansion_country.343.d:0 "1954 schlossen die nordischen Länder ein formelles Abkommen über die freie Mobilität der Arbeitskräfte. Die Migrationsprofile haben sich seitdem stark verändert. Das nordische Abkommen über die freie Mobilität ist jedoch nach wie vor ein klarer Vorteil, sowohl für die betroffenen Einzelpersonen als auch für die teilnehmenden Länder."
