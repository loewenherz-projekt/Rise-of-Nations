CW_Expansion_country.86.t:0 "Volksrepublik Albanien ausgerufen"
CW_Expansion_country.86.d:0 "Im Dezember 1945 wählten die Albaner eine neue Volksversammlung, doch den Wählern wurde nur eine Liste der kommunistisch dominierten Demokratischen Front (ehemals Nationale Befreiungsbewegung) vorgelegt. Die offiziellen Stimmauszählungen zeigten, dass 92 % der Wahlberechtigten ihre Stimme abgegeben hatten, und 93 % der Wähler sich für die Demokratische Front entschieden. Die Versammlung trat im Januar 1946 zusammen. Ihre erste Amtshandlung bestand darin, Zog formell zu entthronen, die Monarchie abzuschaffen und Albanien zur „Volksrepublik“ zu erklären. Allerdings stand das Land bereits seit etwas mehr als zwei Jahren unter vollständig kommunistischer Herrschaft. Nach monatelangen hitzigen Debatten verabschiedete die Versammlung eine Verfassung, die den Verfassungen Jugoslawiens und der Sowjetunion entsprach. Einige Monate später wählten die Mitglieder der Versammlung eine neue Regierung, die symbolisch für Hoxhas fortschreitende Machtkonsolidierung stand; Hoxha wurde gleichzeitig Premierminister, Außenminister, Verteidigungsminister und Oberbefehlshaber der Armee."
CW_Expansion_country.86.a:1 "OK"
CW_Expansion_news.86.t:0 "Volksrepublik Albanien ausgerufen"
CW_Expansion_news.86.d:0 "Im Dezember 1945 wählten die Albaner eine neue Volksversammlung, doch den Wählern wurde nur eine Liste der kommunistisch dominierten Demokratischen Front (ehemals Nationale Befreiungsbewegung) vorgelegt. Die offiziellen Stimmauszählungen zeigten, dass 92 % der Wahlberechtigten ihre Stimme abgegeben hatten, und 93 % der Wähler sich für die Demokratische Front entschieden. Die Versammlung trat im Januar 1946 zusammen. Ihre erste Amtshandlung bestand darin, Zog formell zu entthronen, die Monarchie abzuschaffen und Albanien zur „Volksrepublik“ zu erklären. Allerdings stand das Land bereits seit etwas mehr als zwei Jahren unter vollständig kommunistischer Herrschaft. Nach monatelangen hitzigen Debatten verabschiedete die Versammlung eine Verfassung, die den Verfassungen Jugoslawiens und der Sowjetunion entsprach. Einige Monate später wählten die Mitglieder der Versammlung eine neue Regierung, die symbolisch für Hoxhas fortschreitende Machtkonsolidierung stand; Hoxha wurde gleichzeitig Premierminister, Außenminister, Verteidigungsminister und Oberbefehlshaber der Armee."
CW_Expansion_news.86.a:1 "OK"

CW_Expansion_country.87.t:0 "Charles de Gaulle tritt zurück"
CW_Expansion_country.87.d:0 "De Gaulle, ein Veteran des Ersten Weltkriegs, setzte sich zwischen den Kriegen erfolglos für die Modernisierung der Streitkräfte seines Landes ein. Nachdem Henri Pétain und andere französische Politiker im Juni 1940 einen Waffenstillstand mit Nazideutschland unterzeichnet hatten, floh er nach London, wo er die Freien Französischen Streitkräfte organisierte und die französischen Kolonien für die Sache der Alliierten sammelte. Seine Truppen kämpften erfolgreich in Nordafrika, und im Juni 1944 wurde er zum Chef der französischen Exilregierung ernannt. Am 26. August, nach der Invasion der Alliierten in Frankreich, zog de Gaulle triumphierend in Paris ein. Drei Monate später wurde er einstimmig zum provisorischen Präsidenten Frankreichs gewählt. Im Januar 1946 trat er jedoch mit der Begründung zurück, ihm fehle die Regierungsmacht. De Gaulle gründete eine neue politische Partei, die jedoch nur mäßigen Wahlerfolg hatte, und zog sich 1953 zurück. Fünf Jahre später löste jedoch ein Militär- und Zivilaufstand in Algerien eine politische Krise in Frankreich aus, und er wurde aus dem Ruhestand geholt, um die Nation zu führen. Eine neue Verfassung wurde verabschiedet und Ende Dezember wurde er zum Präsidenten der Fünften Republik gewählt."
CW_Expansion_country.87.a:1 "OK"
CW_Expansion_news.87.t:0 "Charles de Gaulle tritt zurück"
CW_Expansion_news.87.d:0 "De Gaulle, ein Veteran des Ersten Weltkriegs, setzte sich zwischen den Kriegen erfolglos für die Modernisierung der Streitkräfte seines Landes ein. Nachdem Henri Pétain und andere französische Politiker im Juni 1940 einen Waffenstillstand mit Nazideutschland unterzeichnet hatten, floh er nach London, wo er die Freien Französischen Streitkräfte organisierte und die französischen Kolonien für die Sache der Alliierten sammelte. Seine Truppen kämpften erfolgreich in Nordafrika, und im Juni 1944 wurde er zum Chef der französischen Exilregierung ernannt. Am 26. August, nach der Invasion der Alliierten in Frankreich, zog de Gaulle triumphierend in Paris ein. Drei Monate später wurde er einstimmig zum provisorischen Präsidenten Frankreichs gewählt. Im Januar 1946 trat er jedoch mit der Begründung zurück, ihm fehle die Regierungsmacht. De Gaulle gründete eine neue politische Partei, die jedoch nur mäßigen Wahlerfolg hatte, und zog sich 1953 zurück. Fünf Jahre später löste jedoch ein Militär- und Zivilaufstand in Algerien eine politische Krise in Frankreich aus, und er wurde aus dem Ruhestand geholt, um die Nation zu führen. Eine neue Verfassung wurde verabschiedet und Ende Dezember wurde er zum Präsidenten der Fünften Republik gewählt."
CW_Expansion_news.87.a:1 "OK"

CW_Expansion_country.88.t:0 "Krise von 1946"
CW_Expansion_country.88.d:0 "Die Irankrise von 1946, in iranischen Quellen auch als Aserbaidschankrise bekannt, war eine der ersten Krisen des Kalten Krieges. Auslöser war die Weigerung der Sowjetunion unter Josef Stalin, trotz wiederholter Zusicherungen besetztes iranisches Gebiet aufzugeben. Das Ende des Zweiten Weltkriegs hätte das Ende der gemeinsamen alliierten Besetzung des Iran bedeuten sollen. Stattdessen riefen prosowjetische Iraner die separatistische Aserbaidschanische Volksregierung und die kurdische Separatistenrepublik Mahabad aus. Der Druck der USA auf die Sowjetunion zum Rückzug ist der erste Beweis für den Erfolg der neuen Strategie der Truman-Doktrin und der Eindämmung."
CW_Expansion_country.88.a:1 "OK"
CW_Expansion_news.88.t:0 "Iran-Krise von 1946"
CW_Expansion_news.88.d:0 "Die Irankrise von 1946, in iranischen Quellen auch als Aserbaidschankrise bekannt, war eine der ersten Krisen des Kalten Krieges. Auslöser war die Weigerung der Sowjetunion unter Josef Stalin, trotz wiederholter Zusicherungen besetztes iranisches Gebiet aufzugeben. Das Ende des Zweiten Weltkriegs hätte das Ende der gemeinsamen alliierten Besetzung des Iran bedeuten sollen. Stattdessen riefen prosowjetische Iraner die separatistische Aserbaidschanische Volksregierung und die kurdische Separatistenrepublik Mahabad aus. Der Druck der USA auf die Sowjetunion zum Rückzug ist der erste Beweis für den Erfolg der neuen Strategie der Truman-Doktrin und der Eindämmung."
CW_Expansion_news.88.a:1 "OK"

CW_Expansion_country.89.t:0 "Ungarn wird eine Republik"
CW_Expansion_country.89.d:0 "Nach der Besetzung Ungarns durch die Rote Armee folgte die sowjetische Militärbesetzung. Nachdem die Sowjets den Deutschen den Großteil ihres materiellen Vermögens entrissen hatten, versuchten sie mit einigem Erfolg, die politischen Angelegenheiten Ungarns zu kontrollieren. Mit Gewalt richtete die Rote Armee Polizeiorgane zur Verfolgung der Opposition ein, in der Annahme, dies würde der Sowjetunion ermöglichen, die bevorstehenden Wahlen zu beeinflussen. Gleichzeitig versuchte sie mit intensiver kommunistischer Propaganda, ihre Herrschaft zu legitimieren. Trotz aller Bemühungen unterlag die Ungarische Kommunistische Partei bei den Wahlen im November 1945 einer von Kleinbauern geführten Koalition und erhielt nur 17 % der Stimmen. Die Koalition unter Ministerpräsident Zoltán Tildy enttäuschte damit die Erwartungen des Kremls, durch eine demokratisch gewählte Regierung zu regieren."
CW_Expansion_country.89.a:1 "OK"
