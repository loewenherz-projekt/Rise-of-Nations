CW_Expansion_country.155.t:0 "Griechische Kommunisten ziehen sich nach Albanien zurück"
CW_Expansion_country.155.d:0 "Am 16. Oktober 1949 verkündete Dimitrios Partsalidis, Präsident der provisorischen demokratischen Regierung (der von der Kommunistischen Partei Griechenlands eingesetzten Regierung), im Radio das Ende der Feindseligkeiten: „Die Demokratische Armee Griechenlands hat ihre Waffen nicht niedergelegt, sondern nur gesenkt. Sie hat sich der enormen Übermacht des Monarchofaschismus ergeben …“"
CW_Expansion_country.155.a:1 "OK"
