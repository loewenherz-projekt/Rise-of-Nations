CW_Expansion_country.468.t:0 "Schlacht von Santa Clara"
CW_Expansion_country.468.d:0 "Die Schlacht von Santa Clara war eine Reihe von Ereignissen Ende Dezember 1958, die zur Eroberung der kubanischen Stadt Santa Clara durch Revolutionäre unter Che Guevara führten. Die Schlacht war ein entscheidender Sieg für die Rebellen gegen das Regime von General Fulgencio Batista. Innerhalb von 12 Stunden nach der Einnahme der Stadt floh Batista aus Kuba, und Fidel Castros Truppen errangen den Gesamtsieg. Das Motiv ist auf der Rückseite des Drei-Peso-Konvertiblen-Scheins abgebildet."
CW_Expansion_country.468.a:1 "OK"
