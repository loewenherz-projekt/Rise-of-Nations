CW_Expansion_country.399.t:0 "Rosa Parks weigert sich, ihren Sitz aufzugeben"
CW_Expansion_country.399.d:0 "Parks wurde am 1. Dezember 1955 verhaftet, nachdem sie sich geweigert hatte, ihren Sitzplatz in einem überfüllten Bus für einen weißen Fahrgast freizugeben. Entgegen einigen Berichten war Parks körperlich nicht erschöpft und konnte ihren Platz verlassen. Sie weigerte sich aus Prinzip, ihren Sitzplatz aufgrund ihrer Rasse aufzugeben, was damals in Montgomery gesetzlich vorgeschrieben war."
CW_Expansion_country.399.a:1 "OK"
