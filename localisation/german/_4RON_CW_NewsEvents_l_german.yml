CW_Expansion_country.232.t:0 "Alice im Wunderland veröffentlicht"
CW_Expansion_country.232.d:0 "Alice im Wunderland ist eine US-amerikanische Zeichentrickkomödie aus dem Jahr 1951, die von Walt Disney Productions produziert wurde und auf den Alice-Büchern von Lewis Carroll basiert. Als dreizehnte Folge von Disneys Zeichentrickfilmen feierte der Film am 26. Juli 1951 in London und am 28. Juli 1951 in New York City Premiere. Zu hören sind Kathryn Beaumont als Alice, Sterling Holloway als Grinsekatze, Verna Felton als Herzkönigin und Ed Wynn als Verrückter Hutmacher. Walt Disney versuchte in den 1930er Jahren erstmals, Alice in einen abendfüllenden Zeichentrickfilm zu adaptieren, und ließ die Idee in den 1940er Jahren wieder aufleben. Der Film war ursprünglich als Real-/Animationsfilm geplant, doch Disney entschied sich für einen reinen Animationsfilm."
CW_Expansion_country.232.a:1 "OK"
