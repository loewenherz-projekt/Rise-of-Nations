CW_Expansion_country.253.t:0 "Fulgencio Batista übernimmt in Kuba erneut die Macht"
CW_Expansion_country.253.d:0 "Nach acht Regierungsjahren unter den demokratisch gewählten Präsidenten Ramón Grau (1944–1948) und Carlos Prío Socarrás (1948–1952) war Batista einer der Kandidaten bei den Wahlen von 1952. Einige Umfragen sahen ihn jedoch nur auf dem dritten Platz, und so schlug er am 10. März 1952, nur drei Monate vor den Präsidentschaftswahlen, zu. Dabei nutzte er seine Position in der Armee und wurde von einigen politischen Kreisen des Landes unterstützt. Der Putsch selbst verlief unblutig, erregte jedoch die Aufmerksamkeit und Besorgnis eines Großteils der Bevölkerung. Batista stürzte Präsident Carlos Prío Socarrás, annullierte die Wahl und übernahm als „provisorischer Präsident“ die Kontrolle über die Regierung."
CW_Expansion_country.253.a:1 "OK"
