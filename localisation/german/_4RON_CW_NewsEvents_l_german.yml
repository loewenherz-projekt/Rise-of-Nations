ron_warscountry.58.d:0 "Was werden wir tun?"
ron_warscountry.58.a:1 "In den Krieg ziehen"
ron_warscountry.58.b:1 "Aufgeben"

ron_warscountry.59.t:0 "Algerien erhebt sich!"
ron_warscountry.59.d:0 "Was werden wir tun?"
ron_warscountry.59.a:1 "In den Krieg ziehen"
ron_warscountry.59.b:1 "Aufgeben"

ron_warscountry.60.t:0 "Café Conflict"
ron_warscountry.60.d:0 "Was werden wir tun?"
ron_warscountry.60.a:1 "In den Krieg ziehen"
ron_warscountry.60.b:1 "Aufgeben"

ron_warscountry.61.t:0 "Präventivstreik von Marechal Lott"
ron_warscountry.61.d:0 "Was werden wir tun?"
ron_warscountry.61.a:1 "In den Krieg ziehen"
ron_warscountry.61.b:1 "Aufgeben"

ron_warscountry.62.t:0 "Stammesaufstand"
ron_warscountry.62.d:0 "Was werden wir tun?"
ron_warscountry.62.a:1 "Unterdrücke es"
ron_warscountry.62.b:1 "Aufgeben"

ron_warscountry.63.t:0 "Calderonistische Invasion Costa Ricas"
ron_warscountry.63.d:0 "Die calderonistische Invasion Costa Ricas war ein kleiner Aufstand im Nordwesten Costa Ricas, der von Truppen durchgeführt wurde, die dem verärgerten ehemaligen Präsidenten Rafael Calderón treu ergeben waren. Unterstützt wurde er von der Regierung Nicaraguas, die mit der Wahl von José „Pepe“ Figueres Ferrer zum Präsidenten Costa Ricas zwei Jahre zuvor unzufrieden war."
ron_warscountry.63.a:1 "In den Krieg ziehen"
ron_warscountry.63.b:1 "Aufgeben"

ron_warscountry.64.t:0 "Zypern-Revolten"
ron_warscountry.64.d:0 " Insgesamt ereigneten sich 18 Bombenanschläge an verschiedenen Orten der Insel. Besonders bemerkenswert waren die Anschläge in Nikosia durch die Gruppe von Markos Drakos sowie die Zerstörung des Senders des zyprischen Rundfunks. Die Anschläge wurden von einer revolutionären Proklamation begleitet, die vom „Führer Digenes“ unterzeichnet war. Grivas beschloss, seine Beteiligung vorerst geheim zu halten und nannte sich einen byzantinischen General, der Zypern im Mittelalter verteidigt hatte. Grivas verbot damals auch Angriffe auf die türkischen Zyprioten und wollte nur britische Soldaten und griechische Kollaborateure angreifen. Die Briten, die mit dieser Entwicklung nicht gerechnet hatten, verstärkten ihre lokalen Militärstützpunkte (Dhekelia und Akrotiri) durch die Verlegung von Truppen aus Ägypten."
ron_warscountry.64.a:1 "In den Krieg ziehen"
ron_warscountry.64.b:1 "Aufgeben"

ron_warscountry.65.t:0 "Kamerun bricht aus"
ron_warscountry.65.d:0 "Was werden wir tun?"
ron_warscountry.65.a:1 "In den Krieg ziehen"
ron_warscountry.65.b:1 "Aufgeben"

ron_warscountry.66.t:0 "Aufstände in Ober-Yafā"
ron_warscountry.66.d:0 "Was werden wir tun?"
ron_warscountry.66.a:1 "In den Krieg ziehen"
ron_warscountry.66.b:1 "Aufgeben"

ron_warscountry.67.t:0 "Bürgerkrieg!"
ron_warscountry.67.d:0 "Was werden wir tun?"
ron_warscountry.67.a:1 "In den Krieg ziehen"
ron_warscountry.67.b:1 "Aufgeben"

ron_warscountry.68.t:0 "Der Vietnamkonflikt"
ron_warscountry.68.d:0 "Der Vietnamkrieg (vietnamesisch Chiến tranh Việt Nam), auch bekannt als Zweiter Indochinakrieg und in Vietnam als Widerstandskrieg gegen Amerika (vietnamesisch Kháng chiến chống Mỹ) oder einfach als Amerikanischer Krieg, war ein Konflikt in Vietnam, Laos und Kambodscha vom 1. November 1955 bis zum Fall Saigons am 30. April 1975. Es war der zweite Indochinakrieg und wurde offiziell zwischen Nordvietnam und Südvietnam ausgetragen. Nordvietnam wurde von der Sowjetunion, China und anderen kommunistischen Verbündeten unterstützt; Südvietnam wurde von den Vereinigten Staaten, Südkorea, den Philippinen, Australien, Thailand und anderen antikommunistischen Verbündeten unterstützt. Der Krieg, der von manchen als Stellvertreterkrieg aus der Zeit des Kalten Krieges angesehen wird, dauerte 19 Jahre. Die direkte Beteiligung der USA endete 1973. Er umfasste den Laotischen Bürgerkrieg und den Kambodschanischen Bürgerkrieg, die 1975 mit dem Kommunismus aller drei Länder endeten."
ron_warscountry.68.a:1 "In den Krieg ziehen"
ron_warscountry.68.b:1 "Aufgeben"

ron_warscountry.69.t:0 "Posener Aufstand"
ron_warscountry.69.d:0 "Die Posener Proteste von 1956, auch bekannt als Posener Juni (polnisch Poznański Czerwiec), waren der erste von mehreren Massenprotesten gegen die kommunistische Regierung der Volksrepublik Polen. Demonstrationen von Arbeitern, die bessere Arbeitsbedingungen forderten, begannen am 28. Juni 1956 in den Posener Cegielski-Fabriken"
ron_warscountry.69.a:1 "Unterdrückt die Rebellen"
ron_warscountry.69.b:1 "Aufgeben"

ron_warscountry.70.t:0 "Revolution!"
ron_warscountry.70.d:0 "Die Ungarische Revolution von 1956 oder der Ungarische Volksaufstand war eine landesweite Revolution gegen die Ungarische Volksrepublik und ihre von der Sowjetunion aufgezwungene Politik, die vom 23. Oktober bis zum 10. November 1956 dauerte. Zu Beginn führerlos, war er die erste größere Bedrohung für die sowjetische Kontrolle, seit die Rote Armee Nazideutschland am Ende des Zweiten Weltkriegs in Europa aus seinem Territorium vertrieben hatte."
ron_warscountry.70.a:1 "Unterdrückt die Revolutionäre"
ron_warscountry.70.b:1 "Aufgeben"

ron_warscountry.71.t:0 "Krise im Suez"
ron_warscountry.71.d:0 "Die Suezkrise oder der Zweite Arabisch-Israelische Krieg, in der arabischen Welt auch als Dreimächtekrieg und in Israel als Sinai-Krieg bezeichnet, war eine Invasion Israels, gefolgt von Großbritannien und Frankreich, in Ägypten Ende 1956. Ziel war es, die westliche Kontrolle über den Suezkanal zurückzugewinnen und den ägyptischen Präsidenten Gamal Abdel Nasser zu stürzen, der den Kanal gerade verstaatlicht hatte."
ron_warscountry.71.a:1 "In den Krieg ziehen"
ron_warscountry.71.b:1 "Aufgeben"

ron_warscountry.72.t:0 "Aufstand in Quỳnh Lưu"
ron_warscountry.72.d:0 "Der Quỳnh-Lưu-Aufstand (vietnamesisch Khởi-nghĩa Quỳnh-lưu 1956) war ein Aufstand gegen die nordvietnamesische kommunistische Regierung im ländlichen Bezirk Quỳnh Lưu in der Provinz Nghệ An vom 2. bis 14. November 1956."
ron_warscountry.72.a:1 "In den Krieg ziehen"
ron_warscountry.72.b:1 "Aufgeben"

ron_warscountry.73.t:0 "Ifni-Konflikt"
ron_warscountry.73.d:0 "Der Ifni-Krieg, in Spanien auch der Vergessene Krieg (la Guerra Olvidada) genannt, war eine Reihe bewaffneter Einfälle marokkanischer Aufständischer in Spanisch-Westafrika, die im Oktober 1957 begannen und mit der fehlgeschlagenen Belagerung von Sidi Ifni ihren Höhepunkt erreichten. Der Krieg, der als Teil der allgemeinen Entkolonialisierungsbewegung angesehen werden kann, die Afrika in der zweiten Hälfte des 20. Jahrhunderts erfasste, wurde hauptsächlich von Teilen der Marokkanischen Befreiungsarmee geführt, die, da sie nicht länger in Konflikte mit den Franzosen verwickelt war, einen erheblichen Teil ihrer Ressourcen und Arbeitskräfte für die Eroberung spanischer Besitztümer einsetzte."
ron_warscountry.73.a:1 "In den Krieg ziehen"
ron_warscountry.73.b:1 "Aufgeben"

ron_warscountry.74.t:0 "Anti-Steuer-Rebellen!"
ron_warscountry.74.d:0 "Was werden wir tun?"
ron_warscountry.74.a:1 "Unterdrücke sie"
ron_warscountry.74.b:1 "Aufgeben"

ron_warscountry.75.t:0 "Krise im Libanon"
ron_warscountry.75.d:0 "Die Libanonkrise von 1958 (auch bekannt als libanesischer Bürgerkrieg von 1958) war eine politische Krise im Libanon, die durch politische und religiöse Spannungen im Land verursacht wurde und eine militärische Intervention der Vereinigten Staaten beinhaltete. Die Intervention dauerte etwa drei Monate, bis Präsident Camille Chamoun, der um Hilfe gebeten hatte, seine Amtszeit als Präsident des Libanon beendete."
ron_warscountry.75.a:1 "In den Krieg ziehen"
ron_warscountry.75.b:1 "Aufgeben"

ron_warscountry.76.t:0 "Offiziere revoltieren!"
ron_warscountry.76.d:0 "Was werden wir tun?"
ron_warscountry.76.a:1 "Unterdrücke sie"
ron_warscountry.76.b:1 "Aufgeben"

ron_warscountry.77.t:0 "Vietnam marschiert bei uns ein!"
ron_warscountry.77.d:0 "Nordvietnam unterstützte die Pathet Lao zwischen 1958 und 1959 im Kampf gegen das Königreich Laos. Die Kontrolle über Laos ermöglichte den Bau des Ho-Chi-Minh-Pfades, der als Hauptversorgungsroute (MSR) für verstärkte Aktivitäten der NLF (Nationale Befreiungsfront, Vietcong) und NVA (Nordvietnamesische Armee) in der Republik Vietnam dienen sollte."
ron_warscountry.77.a:1 "In den Krieg ziehen"
ron_warscountry.77.b:1 "Aufgeben"

ron_warscountry.78.t:0 "Konflikt mit Mexiko"
ron_warscountry.78.d:0 "Der Mexiko-Guatemala-Konflikt war ein bewaffneter Konflikt zwischen Mexiko und Guatemala, bei dem mexikanische zivile Fischerboote von der guatemaltekischen Luftwaffe beschossen wurden. Die Feindseligkeiten wurden durch die Amtseinführung von Miguel Ydígoras als Präsident Guatemalas am 2. März 1958 ausgelöst."
ron_warscountry.78.a:1 "In den Krieg ziehen"
ron_warscountry.78.b:1 "Aufgeben"

ron_warscountry.79.t:0 "Permesta-Rebellen"
ron_warscountry.79.d:0 "Permesta war eine Rebellenbewegung in Indonesien, deren Name sich an Piagam Perdjuangan Semesta (Charta des universellen Kampfes) anlehnte. Sie wurde am 2. März 1957 von zivilen und militärischen Führern Ostindonesiens ausgerufen. Das Zentrum der Bewegung befand sich in Manado auf Sulawesi, und die Bewegung wurde von Oberst Ventje Sumual angeführt. Alexander Evert Kawilarang gab seinen Posten als indonesischer Militärattache in den USA auf, um General der Permesta-Armee zu werden."
ron_warscountry.79.a:1 "Unterdrücke sie"
ron_warscountry.79.b:1 "Aufgeben"

ron_warscountry.80.t:0 "Aufstand in Mossul"
ron_warscountry.80.d:0 "Der Mossul-Aufstand von 1959 war ein Putschversuch arabischer Nationalisten in Mossul. Sie wollten den damaligen irakischen Premierminister Abd al-Karim Qasim stürzen und eine arabisch-nationalistische Regierung einsetzen, die die Republik Irak mit der Vereinigten Arabischen Republik vereinigen sollte. Nach dem Scheitern des Putsches brachen in Mossul Recht und Ordnung zusammen. Mehrere Tage lang kam es zu gewalttätigen Straßenschlachten zwischen verschiedenen Gruppen, die das Chaos für politische und persönliche Auseinandersetzungen nutzen wollten."
ron_warscountry.80.a:1 "Unterdrücke es"
ron_warscountry.80.b:1 "Aufgeben"

ron_warscountry.81.t:0 "Aufstand der Geistersoldaten"
ron_warscountry.81.d:0 "Der Aufstand der Spirit Soldiers von 1959 war ein antikommunistischer Bauernaufstand im Kreis Sizhuang in Henan. Er war einer von mehreren Aufständen in Henan aufgrund des katastrophalen Großen Sprungs nach vorn, den die chinesische Regierung durchführte. Er dauerte im Februar 1959 zwanzig Tage und war einer der größten ländlichen Aufstände in China in den 1950er Jahren."
ron_warscountry.81.a:1 "Unterdrücke sie"
ron_warscountry.81.b:1 "Aufgeben"

ron_warscountry.82.t:0 "Tibetischer Aufstand"
ron_warscountry.82.d:0 "Der tibetische Aufstand von 1959 begann am 10. März 1959 mit einem Aufstand in Lhasa, der Hauptstadt Tibets, die seit dem 17-Punkte-Abkommen von 1951 de facto von der Volksrepublik China kontrolliert wurde. Der bewaffnete Konflikt zwischen tibetischen Guerillas und der Volksbefreiungsarmee (VBA) hatte 1956 in den sozialistischen Reformregionen Kham und Amdo begonnen. Der Guerillakrieg weitete sich später auf andere Gebiete Tibets aus und dauerte bis 1962."
ron_warscountry.82.a:1 "In den Krieg ziehen"
ron_warscountry.82.b:1 "Aufgeben"

ron_warscountry.83.t:0 "Bürgerkrieg!"
ron_warscountry.83.d:0 "Der Laotische Bürgerkrieg (1959–1975) war ein Bürgerkrieg in Laos, der vom 23. Mai 1959 bis zum 2. Dezember 1975 zwischen der kommunistischen Pathet Lao (darunter viele Nordvietnamesen laotischer Abstammung) und der königlich-laotischen Regierung ausgetragen wurde. Er wird mit dem kambodschanischen Bürgerkrieg und dem Vietnamkrieg in Verbindung gebracht, wobei beide Seiten in einem Stellvertreterkrieg zwischen den globalen Supermächten des Kalten Krieges starke externe Unterstützung erhielten. "
ron_warscountry.83.a:1 "In den Krieg ziehen"
ron_warscountry.83.b:1 "Aufgeben"

ron_warscountry.84.t:0 "Escambray-Rebellion"
ron_warscountry.84.d:0 "Der Escambray-Aufstand war ein sechsjähriger Konflikt (1959–1965) im Escambray-Gebirge, bei dem mehrere aufständische Gruppen gegen die kubanische Regierung unter Fidel Castro kämpften. Der Aufstand wurde von der kubanischen Regierung „Krieg gegen die Banditen“ oder „Kampf gegen die Banditen“ (spanisch „Lucha contra Bandidos“) genannt."
ron_warscountry.84.a:1 "Unterdrücke es"
ron_warscountry.84.b:1 "Aufgeben"

ron_warscountry.85.t:0 "Paschtunischer Aufstand"
ron_warscountry.85.d:0 "Was werden wir tun?"
ron_warscountry.85.a:1 "Unterdrücke es"
ron_warscountry.85.b:1 "Aufgeben"

ron_warscountry.86.t:0 "Unruhen in Ober-Yafâ"
ron_warscountry.86.d:0 "Was werden wir tun?"
ron_warscountry.86.a:1 "Löse sie"
ron_warscountry.86.b:1 "Aufgeben"

ron_warscountry.87.t:0 "Kuba marschiert bei uns ein!"
ron_warscountry.87.d:0 "Was werden wir tun?"
ron_warscountry.87.a:1 "Verteidigen"
ron_warscountry.87.b:1 "Aufgeben"

ron_warscountry.88.t:0 "Kuba marschiert bei uns ein!"
ron_warscountry.88.d:0 "Was werden wir tun?"
ron_warscountry.88.a:1 "Verteidigen"
ron_warscountry.88.b:1 "Aufgeben"

ron_warscountry.89.t:0 "Konflikt auf Baskisch"
ron_warscountry.89.d:0 "Der Baskenkonflikt, auch bekannt als Spanien-ETA-Konflikt, war ein bewaffneter und politischer Konflikt von 1959 bis 2011 zwischen Spanien und der Baskischen Nationalen Befreiungsbewegung, einer Gruppe sozialer und politischer baskischer Organisationen, die die Unabhängigkeit von Spanien und Frankreich anstrebten."
ron_warscountry.89.a:1 "In den Krieg ziehen"
ron_warscountry.89.b:1 "Aufgeben"

ron_warscountry.90.t:0 "Putschversuch!"
ron_warscountry.90.d:0 "Was werden wir tun?"
ron_warscountry.90.a:1 "Besiege Kebur Zabangna"
ron_warscountry.90.b:1 "Aufgeben"

ron_warscountry.91.t:0 "Kampagne in Bejaur"
ron_warscountry.91.d:0 "Der Bajaur-Feldzug bezeichnet die organisierte Vorgehensweise, die in Bajaur an der Grenze zwischen Pakistan und Afghanistan stattfand."
ron_warscountry.91.a:1 "In den Krieg ziehen"
ron_warscountry.91.b:1 "Aufgeben"

ron_warscountry.92.t:0 "Kampagne an unserer Grenze!"
ron_warscountry.92.d:0 "Die Kampagne an der chinesisch-burmesischen Grenze (vereinfachtes Chinesisch 中缅边境作战; traditionelles Chinesisch 中緬邊境作戰) war eine Reihe von Schlachten, die nach dem chinesischen Bürgerkrieg an oder um die chinesisch-burmesische Grenze ausgetragen wurden. Auf der einen Seite standen die kommunistische Volksrepublik China (VR China) und die Union von Burma, auf der anderen die nationalistischen Kräfte der Republik China (ROC). In China ist sie offiziell als Chinesisch-burmesische Grenzüberwachungs- und Sicherheitsoperation (chinesisch 中缅边境勘界警卫作战) bekannt."
ron_warscountry.92.a:1 "In den Krieg ziehen"
ron_warscountry.92.b.:1 "Aufgeben"

ron_warscountry.93.t:0 "Aufstand in Katanga"
ron_warscountry.93.d:0 "Unmittelbar nach der Unabhängigkeit der Demokratischen Republik Kongo im Jahr 1960 kam es in Katanga erstmals zu Aufständen und politischer Instabilität. Die Region versuchte mit Unterstützung Belgiens, einen abtrünnigen Staat zu gründen. Belgien wollte einen Marionettenstaat bilden und so Zugang zu der rohstoffreichen Region erhalten. Der Staat Katanga konnte seine Unabhängigkeit während der Kongokrise jedoch nicht verteidigen und wurde 1963 in den Kongo eingegliedert."
ron_warscountry.93.a:1 "In den Krieg ziehen"
ron_warscountry.93.b:1 "Aufgeben"

ron_warscountry.94.t:0 "Bürgerkrieg!"
ron_warscountry.94.d:0 "Der Guatemaltekische Bürgerkrieg war ein Bürgerkrieg in Guatemala, der zwischen der Regierung Guatemalas und verschiedenen linken Rebellengruppen ausgetragen wurde. Diese wurden von den indigenen Völkern der Maya und den Ladino-Bauern unterstützt, die zusammen die arme Landbevölkerung bilden. "
ron_warscountry.94.a:1 "In den Krieg ziehen"
ron_warscountry.94.b:1 "Aufgeben"

ron_warscountry.95.t:0 "Aufstand!"
ron_warscountry.95.d:0 "Was werden wir tun?"
ron_warscountry.95.a:1 "Unterdrückt sie!"
ron_warscountry.95.b:1 "Aufgeben"

ron_warscountry.96.t:0 "Konflikt in Xinjiang"
ron_warscountry.96.d:0 "Der Xinjiang-Konflikt (chinesisch 新疆冲突), auch bekannt als Uigurisch-Chinesischer Konflikt, ist ein Konflikt in der nordwestlichsten autonomen Region Xinjiang in China, in dessen Mittelpunkt die Uiguren stehen, eine ethnische Minderheit der Turkvölker, die die größte Gruppe in der Region bilden."
ron_warscountry.96.a:1 "Unterdrückt sie!"
ron_warscountry.96.b:1 "Aufgeben"

ron_warscountry.97.t:0 "Revolution!"
ron_warscountry.97.d:0 "Die nicaraguanische Revolution (spanisch Revolución Nicaragüense oder Revolución Popular Sandinista) umfasste den wachsenden Widerstand gegen die Somoza-Diktatur in den 1960er und 1970er Jahren, die gewalttätige Kampagne der Sandinistischen Nationalen Befreiungsfront (FSLN) zum Sturz der Diktatur 1978–1979, die anschließenden Bemühungen der FSLN, von 1979 bis 1990 Nicaragua zu regieren, und den Contra-Krieg, der von 1981 bis 1990 zwischen der von der FSLN geführten Regierung Nicaraguas und den von den USA unterstützten Contras geführt wurde. "
ron_warscountry.97.a:1 "In den Krieg ziehen"
ron_warscountry.97.b:1 "Aufgeben"

ron_warscountry.98.t:0 "Die KDP schlägt uns zu!"
ron_warscountry.98.d:0 "Der Erste Irakisch-Kurdische Krieg, auch bekannt als Aylul-Aufstand (kurdisch شۆڕشی ئەیلوول), war ein wichtiges Ereignis des Irakisch-Kurdischen Konflikts, der von 1961 bis 1970 andauerte. Der Kampf wurde von Mustafa Barzani angeführt, mit dem Ziel, eine autonome kurdische Verwaltung im Nordirak zu etablieren."
ron_warscountry.98.a:1 "In den Krieg ziehen"
ron_warscountry.98.b:1 "Aufgeben"

ron_warscountry.99.t:0 "Die USA marschieren bei uns ein!"
ron_warscountry.99.d:0 "Die Invasion in der Schweinebucht war eine gescheiterte Landungsoperation an der Südwestküste Kubas im Jahr 1961. Sie wurde von kubanischen Exilanten durchgeführt, die sich Fidel Castros kubanischer Revolution widersetzten. Die Operation, die heimlich von der US-Regierung finanziert und geleitet wurde, fand auf dem Höhepunkt des Kalten Krieges statt. Ihr Scheitern führte zu tiefgreifenden Veränderungen in den internationalen Beziehungen zwischen Kuba, den Vereinigten Staaten und der Sowjetunion."
ron_warscountry.99.a:1 "Verteidigen!"
ron_warscountry.99.b:1 "Aufgeben"

ron_warscountry.100.t:0 "Krise in Bizerte"
ron_warscountry.100.d:0 "Die Bizerte-Krise ereignete sich im Juli 1961, als Tunesien eine Blockade über den französischen Marinestützpunkt in Bizerte verhängte, um dessen Räumung zu erzwingen. Die Krise gipfelte in einer dreitägigen Schlacht zwischen französischen und tunesischen Streitkräften, bei der etwa 630 Tunesier und 24 Franzosen starben. Schließlich trat Frankreich 1963 die Stadt und den Marinestützpunkt an Tunesien ab."
ron_warscountry.100.a:1 "In den Krieg ziehen"
ron_warscountry.100.b:1 "Aufgeben"

ron_warscountry.101.t:0 "Militäraufstand der OAS!"
ron_warscountry.101.d:0 "Was werden wir tun?"
ron_warscountry.101.a:1 "In den Krieg ziehen"
ron_warscountry.101.b:1 "Aufgeben"

ron_warscountry.102.t:0 "Operation Trikora"
ron_warscountry.102.d:0 "Die Operation Trikora war eine indonesische Militäroperation, deren Ziel die Eroberung und Annexion des niederländischen Überseegebiets Niederländisch-Neuguinea in den Jahren 1961 und 1962 war. Nach Verhandlungen unterzeichneten die Niederlande am 15. August 1962 das New Yorker Abkommen mit Indonesien und gaben damit die Kontrolle über West-Neuguinea an die Vereinten Nationen ab."
ron_warscountry.102.a:1 "Ausführen"
ron_warscountry.102.b:1 "Abbrechen"

ron_warscountry.103.t:0 "Eritrea erklärt seine Unabhängigkeit!"
ron_warscountry.103.d:0 "Der Eritreische Unabhängigkeitskrieg war ein Konflikt zwischen aufeinanderfolgenden äthiopischen Regierungen und eritreischen Unabhängigkeitskämpfern vom 1. September 1961 bis zum 24. Mai 1991."
ron_warscountry.103.a:1 "In den Krieg ziehen"
ron_warscountry.103.b:1 "Aufgeben"

ron_warscountry.104.t:0 "Indien annektiert Goa"
ron_warscountry.104.d:0 "Die Annexion Goas war der Prozess, bei dem die Republik Indien die ehemaligen portugiesisch-indischen Gebiete Goa, Daman und Diu annektierte. Der Prozess begann mit der bewaffneten Aktion der indischen Streitkräfte im Dezember 1961. In Indien wird diese Aktion als „Befreiung Goas“ bezeichnet. In Portugal spricht man von der „Invasion Goas“."
ron_warscountry.104.a:1 "In den Krieg ziehen"
ron_warscountry.104.b:1 "Was auch immer"

ron_warscountry.105.t:0 "Angola erklärt seine Unabhängigkeit!"
ron_warscountry.105.d:0 "Der angolanische Unabhängigkeitskrieg (portugiesisch Guerra de Independência de Angola; 1961–1974), in Angola Luta Armada de Libertação Nacional („Bewaffneter Kampf der nationalen Befreiung“) genannt, begann als Aufstand gegen den Zwangsanbau von Baumwolle und entwickelte sich zu einem fraktionsübergreifenden Kampf um die Kontrolle der portugiesischen Überseeprovinz Angola zwischen drei nationalistischen Bewegungen und einer separatistischen Bewegung."
ron_warscountry.105.a:1 "In den Krieg ziehen"
ron_warscountry.105.b:1 "Aufgeben"

ron_warscountry.106.t:0 "Revolte!"
ron_warscountry.106.d:0 "Der Aufstand von 1961 in Somalia war ein erfolgloser Aufstand und Putschversuch im Norden Somalias, der im Dezember 1961 stattfand. Die Putschisten, eine Gruppe junger Offiziere aus dem Norden, beabsichtigten, die Unabhängigkeit des Staates Somaliland wiederherzustellen."
ron_warscountry.106.a:1 "Unterdrückt sie!"
ron_warscountry.106.b:1 "Aufgeben"

ron_warscountry.107.t:0 "Piloten revoltieren!"
ron_warscountry.107.d:0 "Der Pilotenaufstand war ein Militäraufstand von sechs Mitgliedern der dominikanischen Militärluftfahrt (heute: Dominikanische Luftwaffe) am 19. November 1961, der die 31-jährige Herrschaft der Trujillo-Diktatur endgültig beendete und die Familie Trujillo aus dem Land verbannte. Er verhinderte die Rückkehr von Ramfis Trujillo, José Arismendy Trujillo und Héctor Bienvenido Trujillo Molina an die Macht und die Wiederherstellung des Regimes ihres Bruders Rafael Trujillo."
ron_warscountry.107.a:1 "Unterdrückt sie!"
ron_warscountry.107.b:1 "Aufgeben..?"

ron_warscountry.108.t:0 "Rebellion in Taureg!"
ron_warscountry.108.d:0 "Der Tuareg-Aufstand von 1962–1964, manchmal auch Erster Tuareg-Aufstand oder Alfellaga genannt, war ein Aufstand der Bevölkerung im heutigen Norden Malis, der kurz nach der Unabhängigkeit des Landes von Frankreich im Jahr 1960 begann. Dieser kurze Aufstand konnte erst durch den Eintritt Marokkos und Algeriens in den Konflikt im Jahr 1963 niedergeschlagen werden. Marokko und Algerien lieferten die 35 Anführer des Gegenaufstands aus und verhängten anschließend eine Militärherrschaft über die Tuareg-Gebiete."
ron_warscountry.108.a:1 "Unterdrückt sie!"
ron_warscountry.108.b:1 "Aufgeben"

ron_warscountry.109.t:0 "Bürgerkrieg!"
ron_warscountry.109.d:0 "Der burmesische Staatsstreich vom 2. März 1962 markierte den Beginn der totalitären Herrschaft und der politischen Dominanz der Armee in Burma (heute Myanmar), die 26 Jahre andauerte. Im Zuge des Putsches ersetzte das Militär die zivile AFPFL-Regierung unter Premierminister U Nu durch den Union Revolutionary Council unter dem Vorsitz von General Ne Win."
ron_warscountry.109.a:1 "In den Krieg ziehen"
ron_warscountry.109.b:1 "Aufgeben"

ron_warscountry.110.t:0 "Aufstand in Brunei"
ron_warscountry.110.d:0 "Der Brunei-Aufstand (Malay Pemberontakan Brunei) war ein Aufstand im Dezember 1962 im britischen Protektorat Brunei. Gegner der Monarchie und der geplanten Eingliederung des Landes in die Föderation Malaysia zettelten einen Aufstand an. Die Aufständischen waren Mitglieder der TNKU (North Kalimantan National Army), einer von Indonesien gestellten Miliz mit Verbindungen zur linksgerichteten Brunei People&#39;s Party (BPP), die eine Föderation Nord-Borneos befürwortete. "
ron_warscountry.110.a:1 "Unterdrückt sie!"
ron_warscountry.110.b:1 "Aufgeben"

ron_warscountry.111.t:0 "Kommunistische Aufständische in Sarawak"
ron_warscountry.111.d:0 "Der kommunistische Aufstand in Sarawak ereignete sich von 1962 bis 1990 in Malaysia und betraf die Kommunistische Partei Nordkalimantans und die malaysische Regierung. Es war einer der beiden kommunistischen Aufstände, die die ehemalige britische Kolonie Malaysia während des Kalten Krieges herausforderten. Wie schon beim früheren Malayan Emergency (1948–1960) waren die kommunistischen Aufständischen in Sarawak überwiegend ethnische Chinesen, die sich der britischen Herrschaft über Sarawak widersetzten und später den Zusammenschluss des Staates mit der neu geschaffenen Föderation Malaysia ablehnten."
ron_warscountry.111.a:1 "Unterdrückt sie!"
ron_warscountry.111.b:1 "Aufgeben"

ron_warscountry.112.t:0 "Rebellion in Dhofar"
ron_warscountry.112.d:0 "Der Dhofar-Aufstand (arabisch ثورة ظفار‎), auch bekannt als der Krieg in Dhofar (arabisch الحرب في ظفار‎) oder der omanische Bürgerkrieg (arabisch الحرب الأهلية العمانية‎), wurde von 1962 bis 1976 in der Provinz Dhofar dagegen geführt das Sultanat Maskat und Oman. Der Krieg begann mit der Bildung der Dhofar-Befreiungsfront, einer Gruppe, die darauf abzielte, in Dhofar einen unabhängigen Staat zu schaffen, frei von der Herrschaft des omanischen Sultans Said bin Taimur. "
ron_warscountry.112.a:1 "Leg sie ab"
ron_warscountry.112.b:1 "Aufgeben"

ron_warscountry.113.t:0 "Die Marine revoltiert!"
ron_warscountry.113.d:0 "Der Aufstand der argentinischen Marine von 1963 war eine bewaffnete Auseinandersetzung zwischen Teilen des argentinischen Militärs, die vom 21. September 1962 bis zum 5. April 1963 dauerte. Der Aufstand wurde von Militäroffizieren versucht, die von der Regierung eine harte Haltung gegenüber der politischen Beteiligung peronistischer Politiker forderten. Dies war der Höhepunkt des Konflikts zwischen Azules und Colorados."
ron_warscountry.113.a:1 "Unterdrückt sie"
ron_warscountry.113.b:1 "Aufgeben"

ron_warscountry.114.t:0 "Kuba marschiert bei uns ein!"
ron_warscountry.114.d:0 "Was werden wir tun?"
ron_warscountry.114.a:1 "Verteidigen!"
ron_warscountry.114.b:1 "Aufgeben"

ron_warscountry.115.t:0 "Grenzkonflikt mit Algerien"
ron_warscountry.115.d:0 "Der Sandkrieg (arabisch حرب الرمال ḥarb ar-rimāl) war ein Grenzkonflikt zwischen Algerien und Marokko im Oktober 1963. Er resultierte größtenteils aus dem Anspruch der marokkanischen Regierung auf Teile der algerischen Provinzen Tindouf und Béchar. Der Sandkrieg führte über mehrere Jahrzehnte zu erhöhten Spannungen zwischen den beiden Ländern."
ron_warscountry.115.a:1 "In den Krieg ziehen"
ron_warscountry.115.b:1 "Aufgeben"

ron_warscountry.116.t:0 "Ramadan-Revolution"
ron_warscountry.116.d:0 "Die Ramadan-Revolution, auch als Revolution des 8. Februar und Staatsstreich im Irak vom Februar 1963 bezeichnet, war ein Militärputsch des irakischen Flügels der Baath-Partei, der 1963 den irakischen Premierminister Abd al-Karim Qasim stürzte. Er fand zwischen dem 8. und 10. Februar 1963 statt. "
ron_warscountry.116.a:1 "Leg es hin"
ron_warscountry.116.b:1 "Aufgeben"

ron_warscountry.117.t:0 "Ar-Rashid-Aufstand"
ron_warscountry.117.d:0 "Der ar-Rashid-Aufstand bezeichnet einen gescheiterten Aufstand gegen die Baath-Regierung im Irak im Jahr 1963. Anhänger der irakischen Kommunistischen Partei und Militärs planten den Aufstand. Der Aufstand konnte sich nicht über Bagdad hinaus ausbreiten und wurde von den Baath-Truppen niedergeschlagen."
ron_warscountry.117.a:1 "Leg es hin"
ron_warscountry.117.b:1 "Aufgeben"

ron_warscountry.118.t:0 "Staatsstreich!"
ron_warscountry.118.d:0 "Was werden wir tun?"
ron_warscountry.118.a:1 "Hör auf!"
ron_warscountry.118.b:1 "Aufgeben"

ron_warscountry.119.t:0 "Staatsstreich!"
ron_warscountry.119.d:0 "Was werden wir tun?"
ron_warscountry.119.a:1 "Hör auf!"
ron_warscountry.119.b:1 "Aufgeben"

ron_warscountry.120.t:0 "Konfrontation mit unserem Nachbarn"
ron_warscountry.120.d:0 "Die indonesisch-malaysische Konfrontation oder Borneo-Konfrontation (auch unter dem indonesischen/malaiischen Namen Konfrontasi bekannt) war ein gewaltsamer Konflikt von 1963 bis 1966, der aus Indonesiens Widerstand gegen die Gründung Malaysias resultierte. Die Gründung Malaysias erfolgte im September 1963 durch den Zusammenschluss der Föderation Malaya (heute Westmalaysia), Singapurs und der Kronkolonien/britischen Protektorate Nordborneo und Sarawak (gemeinsam bekannt als Britisch-Borneo, heute Ostmalaysia)."
ron_warscountry.120.a:1 "In den Krieg ziehen"
ron_warscountry.120.b:1 "Aufgeben"

ron_warscountry.121.t:0 "Shifta-Konflikt"
ron_warscountry.121.d:0 "Der Shifta-Krieg (1963–1967) war ein Sezessionskonflikt, in dem ethnische Somalier im Northern Frontier District (NFD) Kenias versuchten, sich von Kenia abzuspalten und sich Somalia anzuschließen. Die kenianische Regierung nannte den Konflikt im Rahmen einer Propagandamaßnahme „Shifta“, nach dem somalischen Wort für „Bandit“."
ron_warscountry.121.a:1 "In den Krieg ziehen"
ron_warscountry.121.b:1 "Aufgeben"

ron_warscountry.122.t:0 "Bale-Aufstand"
ron_warscountry.122.d:0 "Der Bale-Aufstand oder die Bale-Bauernbewegung war ein Guerillakrieg in der südöstlichen äthiopischen Provinz Bale, der von der lokalen Oromo- und Somali-Bevölkerung angeführt wurde. Der Aufstand richtete sich gegen die Ansiedlung des Amhara-Volkes und das bestehende Feudalsystem im äthiopischen Reich."
ron_warscountry.122.a:1 "Unterdrücke es!"
ron_warscountry.122.b:1 "Aufgeben"

ron_warscountry.123.t:0 "Guinea-Bissau erklärt seine Unabhängigkeit"
ron_warscountry.123.d:0 "Was werden wir tun?"
ron_warscountry.123.a:1 "In den Krieg ziehen"
ron_warscountry.123.b:1 "Aufgeben"

ron_warscountry.124.t:0 "Notfall in Aden"
ron_warscountry.124.d:0 "The Aden Emergency, also known as the Radfan Uprising, was an armed insurgency by NLF and FLOSY during the Cold War against the Federation of South Arabia, a protectorate of the British Empire, which now forms part of Yemen.
ron_warscountry.124.a:1 "In den Krieg ziehen"
ron_warscountry.124.b:1 "Aufgeben"

ron_warscountry.125.t:0 "Grenzkonflikt"
ron_warscountry.125.d:0 "Der äthiopisch-somalische Grenzkrieg von 1964 war ein kurzer Krieg zwischen der Republik Somalia und dem äthiopischen Kaiserreich, in dem Äthiopien mehrere Städte entlang der somalisch-äthiopischen Grenze angriff. Dies geschah als Reaktion auf die Unterzeichnung eines Militärhilfepakts zwischen Somalia und der Sowjetunion, der die Ausrüstung einer 20.000 Mann starken Armee vorsah."
ron_warscountry.125.a:1 "In den Krieg ziehen"
ron_warscountry.125.b:1 "Aufgeben"

ron_warscountry.126.t:0 "Simba-Rebellion"
ron_warscountry.126.d:0 "Der Simba-Aufstand von 1963–1965, auch als Orientalischer Aufstand bekannt, war ein Aufstand in der Demokratischen Republik Kongo, der im weiteren Kontext der Kongokrise und des Kalten Krieges stattfand."
ron_warscountry.126.a:1 "Leg es hin"
ron_warscountry.126.b:1 "Aufgeben"

ron_warscountry.127.t:0 "Der Bush-Krieg"
ron_warscountry.127.d:0 "Der Rhodesische Buschkrieg – auch Zweiter Chimurenga-Krieg und Simbabwe-Befreiungskrieg genannt – war ein Bürgerkrieg von Juli 1964 bis Dezember 1979 im nicht anerkannten Staat Rhodesien (später Simbabwe-Rhodesien)."
ron_warscountry.127.a:1 "In den Krieg ziehen"
ron_warscountry.127.b:1 "Aufgeben"

ron_warscountry.128.t:0 "Aufstand gegen uns!"
ron_warscountry.128.d:0 "Was werden wir tun?"
ron_warscountry.128.a:1 "In den Krieg ziehen"
ron_warscountry.128.b:1 "Aufgeben"

ron_warscountry.129.t:0 "Interne Konflikte"
ron_warscountry.129.d:0 "Der Kolumbianische Konflikt (spanisch Conflicto armado interno de Colombia) begann am 27. Mai 1964 und ist ein asymmetrischer Krieg niedriger Intensität zwischen der kolumbianischen Regierung, rechtsextremen paramilitärischen Gruppen, Verbrechersyndikaten und linksextremen Guerillagruppen wie den Revolutionären Streitkräften Kolumbiens (FARC), der Nationalen Befreiungsarmee (ELN) und der Volksbefreiungsarmee (EPL), die gegeneinander kämpfen, um ihren Einfluss auf kolumbianischem Gebiet zu vergrößern."
ron_warscountry.129.a:1 "Beginnen Sie, sie zu lösen!"
ron_warscountry.129.b:1 "Aufgeben"

ron_warscountry.130.t:0 "Mosambik erklärt seine Unabhängigkeit"
ron_warscountry.130.d:0 "Der mosambikanische Unabhängigkeitskrieg war ein bewaffneter Konflikt zwischen den Guerillakräften der Mosambikanischen Befreiungsfront oder FRELIMO (Frente de Libertação de Moçambique) und Portugal. "
ron_warscountry.130.a:1 "In den Krieg ziehen"
ron_warscountry.130.b:1 "Aufgeben"

ron_warscountry.131.t:0 "Aufstand im Nordosten!"
ron_warscountry.131.d:0 "An den Aufständen in Nordostindien sind mehrere bewaffnete separatistische Gruppierungen beteiligt, die in den nordöstlichen Bundesstaaten Indiens operieren. Diese sind durch den Siliguri-Korridor, einen nur 23 Kilometer breiten Landstreifen, mit dem Rest Indiens verbunden. Die meisten Gruppierungen befürworten einen eigenen Staat, während andere regionale Autonomie anstreben. Einige Gruppen fordern völlige Unabhängigkeit. Andere wollten religiöses Recht."
ron_warscountry.131.a:1 "Leg es hin!"
ron_warscountry.131.b:1 "Aufgeben"

ron_warscountry.132.t:0 "Sansibar-Revolution!"
ron_warscountry.132.d:0 "Die Sansibar-Revolution (arabisch ثورة زنجبار‎ Thawrat Zanjibār) ereignete sich 1964 und führte zum Sturz des Sultans von Sansibar und seiner hauptsächlich arabischen Regierung durch lokale afrikanische Revolutionäre. Sansibar war ein ethnisch vielfältiger Staat, der aus mehreren Inseln vor der Ostküste Tanganjikas bestand und 1963 von Großbritannien in die Unabhängigkeit entlassen worden war."
ron_warscountry.132.a:1 "In den Krieg ziehen"
ron_warscountry.132.b:1 "Aufgeben"

ron_warscountry.133.t:0 "Bewegung des 30. September"
ron_warscountry.133.d:0 "Die Bewegung des 30. September (indonesisch Gerakan 30. September, abgekürzt G30S, auch bekannt unter dem Akronym Gestapu für Gerakan September Tiga Puluh, Bewegung des 30. September) war eine selbsternannte Organisation von Mitgliedern der indonesischen Streitkräfte, die in den frühen Morgenstunden des 1. Oktober 1965 sechs Generäle der indonesischen Armee in einem fehlgeschlagenen Staatsstreich ermordeten, was zu dem inoffiziellen, aber genaueren Namen Gestok für Gerakan Satu Oktober oder Bewegung des 1. Oktober führte."
ron_warscountry.133.a:1 "Leg es hin!"
ron_warscountry.133.b:1 "Aufgeben"

ron_warscountry.134.t:0 "Bürgerkrieg!"
ron_warscountry.134.d:0 "Der Dominikanische Bürgerkrieg (spanisch Guerra Civil Dominicana) fand vom 24. April 1965 bis zum 3. September 1965 in Santo Domingo, Dominikanische Republik, statt. Er begann, als zivile und militärische Anhänger des ehemaligen Präsidenten Juan Bosch den amtierenden Präsidenten Donald Reid Cabral stürzten."
ron_warscountry.134.a:1 "In den Krieg ziehen"
ron_warscountry.134.b:1 "Aufgeben"

ron_warscountry.135.t:0 "Die USA marschieren bei uns ein!"
ron_warscountry.135.d:0 "Was werden wir tun?"
ron_warscountry.135.a:1 "Verteidigen!"
ron_warscountry.135.b:1 "Aufgeben"

ron_warscountry.136.t:0 "Amerika besetzt uns!"
ron_warscountry.136.d:0 "Was werden wir tun?"
ron_warscountry.136.a:1 "Also.."
ron_warscountry.136.b:1 "Aufgeben"

ron_warscountry.137.t:0 "Indisch-pakistanische Konflikte"
ron_warscountry.137.d:0 "Der Indisch-Pakistanische Krieg von 1965 war der Höhepunkt der Auseinandersetzungen zwischen Pakistan und Indien, die zwischen April und September 1965 stattfanden. Der Konflikt begann nach der pakistanischen Operation Gibraltar, deren Ziel die Einschleusung pakistanischer Truppen in Jammu und Kaschmir war, um einen Aufstand gegen die indische Herrschaft auszulösen."
ron_warscountry.137.a:1 "In den Krieg ziehen"
ron_warscountry.137.b:1 "Aufgeben"

ron_warscountry.138.t:0 "Kommunistischer Aufstand"
ron_warscountry.138.d:0 "Der kommunistische Aufstand in Thailand war ein Guerillakrieg, der von 1965 bis 1983 dauerte und hauptsächlich von der Kommunistischen Partei Thailands (CPT) und der thailändischen Regierung geführt wurde."
ron_warscountry.138.a:1 "Leg es hin"

ron_warscountry.139.t:0 "Bürgerkrieg!"
ron_warscountry.139.d:0 "Der tschadische Bürgerkrieg von 1965 bis 1979 wurde von mehreren Rebellenfraktionen gegen den tschadischen Präsidenten François Tombalbaye geführt, dessen Regime von Autoritarismus, extremer Korruption und Günstlingswirtschaft geprägt war."
ron_warscountry.139.a:1 "In den Krieg ziehen"
ron_warscountry.139.b:1 "Aufgeben"

ron_warscountry.140.t:0 "Guerrilha do Caparaó"
ron_warscountry.140.d:0 "Was werden wir tun?"
ron_warscountry.140.a:1 "Unterdrücke es!"
ron_warscountry.140.b:1 "Aufgeben"

ron_warscountry.141.t:0 "Krise in Französisch-Somaliland"
ron_warscountry.141.d:0 "Was werden wir tun?"
ron_warscountry.141.a:1 "In den Krieg ziehen"
ron_warscountry.141.b:1 "Aufgeben"

ron_warscountry.142.t:0 "Meutereien in Stanleyville"
ron_warscountry.142.d:0 "Die Kisangani-Meutereien, auch bekannt als Stanleyville-Meutereien oder Söldnermeutereien, ereigneten sich 1966 und 1967 in der Demokratischen Republik Kongo."
ron_warscountry.142.a:1 "Unterdrückt sie!"
ron_warscountry.142.b:1 "Aufgeben"

ron_warscountry.143.t:0 "Guerillakonflikt in Ñancahuazú"
ron_warscountry.143.d:0 "Die Ñancahuazú-Guerilla oder Ejército de Liberación Nacional de Bolivia (Nationale Befreiungsarmee Boliviens; ELN) war eine Gruppe hauptsächlich bolivianischen und kubanischen Guerillas unter der Führung des Guerillaführers Che Guevara, die von 1966 bis 1967 in der Cordillera-Provinz Boliviens aktiv war. "
ron_warscountry.143.a:1 "Zieh in den Krieg"
ron_warscountry.143.b:1 "Aufgeben"

ron_warscountry.144.t:0 "Koreanischer DMZ-Konflikt"
ron_warscountry.144.d:0 "Der Konflikt um die koreanische DMZ, von manchen auch als Zweiter Koreakrieg bezeichnet, war eine Reihe kleinerer bewaffneter Zusammenstöße zwischen nordkoreanischen Streitkräften und den Streitkräften Südkoreas und der Vereinigten Staaten, die größtenteils zwischen 1966 und 1969 an der koreanischen DMZ stattfanden."
ron_warscountry.144.a:1 "Zieh in den Krieg"
ron_warscountry.144.b:1 "Aufgeben"

ron_warscountry.145.t:0 "Südafrikanischer Grenzkrieg"
ron_warscountry.145.d:0 "Der Südafrikanischer Grenzkrieg, auch bekannt als Namibischer Unabhängigkeitskrieg und in Südafrika manchmal als Angolanischer Buschkrieg bezeichnet, war ein weitgehend asymmetrischer Konflikt, der vom 26. August 1966 bis zum 21. März 1990 in Namibia (damals Südwestafrika), Sambia und Angola stattfand. "
ron_warscountry.145.a:1 "Zieh in den Krieg!"
ron_warscountry.145.b:1 "Aufgeben"

ron_warscountry.146.t:0 "Invasion von Machurucuto"
ron_warscountry.146.d:0 "Der Machurucuto-Zwischenfall, auch bekannt als die Invasion von Machurucuto, war eine Schlacht zwischen Truppen der venezolanischen Armee und der Nationalgarde und von Kuba ausgebildeten Guerillas. Am 10. Mai 1967 landeten ein Dutzend Guerillas am Strand von Machurucuto in Venezuela."
ron_warscountry.146.a:1 "Zieh in den Krieg!"
ron_warscountry.146.b:1 "Aufgeben"

ron_warscountry.147.t:0 "Grenzkonflikte!"
ron_warscountry.147.d:0 "Bei den Zusammenstößen am Nathu La und Cho La handelte es sich um eine Reihe militärischer Auseinandersetzungen zwischen Indien und China entlang der Grenze des Himalaya-Königreichs Sikkim, das damals ein indisches Protektorat war."
ron_warscountry.147.a:1 "Zieh in den Krieg!"
ron_warscountry.147.b:1 "Sprechen Sie es aus"

ron_warscountry.148.t:0 "Krieg mit den Arabern"
ron_warscountry.148.d:0 "Der Sechstagekrieg (hebräisch מִלְחֶמֶת שֵׁשֶׁת הַיָּמִים‎, Milhemet Sheshet Ha Yamim; arabisch النكسة, an-Naksah, „Der Rückschlag“ oder حرب 1967, Ḥarb 1967, „Krieg von 1967“), auch bekannt als Junikrieg, Arabisch-Israelischer Krieg von 1967 oder Dritter Arabisch-Israelischer Krieg, wurde zwischen dem 5. und 10. Juni 1967 von Israel und den Nachbarstaaten Jordanien, Syrien und Ägypten geführt."
ron_warscountry.148.a:1 "Also gut, bereitet die Armee vor!"
ron_warscountry.148.b:1 "Aufgeben"

ron_warscountry.149.t:0 "Der kurdische Aufstand"
ron_warscountry.149.d:0 "Der kurdische Aufstand von 1967 im Iran brach im März 1967 als Teil des langjährigen kurdischen Separatistenkampfes aus. Abrahamian beschreibt den Aufstand als marxistischen Aufstand mit dem Ziel, den Kurden im Iran Autonomie zu verschaffen, nach dem Vorbild einer föderalen Republik."
ron_warscountry.149.a:1 "Unterdrücke es!"
ron_warscountry.149.b:1 "Aufgeben"

ron_warscountry.150.t:0 "Guerillakonflikt in Araguaia"
ron_warscountry.150.d:0 "Die Araguaia-Guerilla (portugiesisch Guerrilha do Araguaia) war eine bewaffnete Bewegung in Brasilien gegen die dortige Militärdiktatur, die zwischen 1967 und 1974 im Einzugsgebiet des Flusses Araguaia aktiv war. Sie wurde von Militanten der Kommunistischen Partei Brasiliens (PC do B) gegründet, dem damaligen maoistischen Gegenstück zur Kommunistischen Partei Brasiliens (PCB). Ihr Ziel war es, eine ländliche Hochburg zu errichten, von der aus ein „Volkskrieg“ gegen die brasilianische Militärdiktatur geführt werden sollte, die seit dem Staatsstreich von 1964 an der Macht war."
ron_warscountry.150.a:1 "Unterdrücke es!"
ron_warscountry.150.b:1 "Aufgeben"

ron_warscountry.151.t:0 "Bürgerkrieg!"
ron_warscountry.151.d:0 "Der kambodschanische Bürgerkrieg (Khmerសង្គ្រាមស៊ីវិលកម្ពុជា) war ein Bürgerkrieg in Kambodscha, der zwischen den Streitkräften der Kommunistischen Partei Kampucheas (bekannt als die Roten Khmer, unterstützt von Nordvietnam und dem Vietcong) und den Regierungstruppen des Königreichs Kambodscha und, nach Oktober 1970, der Khmer-Republik, die das Königreich abgelöst hatte, ausgetragen wurde (beide wurden von den Vereinigten Staaten (USA) und Südvietnam unterstützt)."
ron_warscountry.151.a:1 "In den Krieg ziehen"
ron_warscountry.151.b:1 "Aufgeben"

ron_warscountry.152.t:0 "Bürgerkrieg!"
ron_warscountry.152.d:0 "Der nigerianische Bürgerkrieg (auch bekannt als Biafra-Krieg, Völkermord an den Biafra-Inseln oder Nigerianisch-Biafran-Krieg) war ein Bürgerkrieg in Nigeria, der vom 6. Juli 1967 bis zum 15. Januar 1970 zwischen der nigerianischen Regierung unter General Yakubu Gowon und dem abtrünnigen Staat Biafra unter der Führung des verstorbenen Oberstleutnants Odumegwu Ojukwu (1933–2011) ausgetragen wurde."
ron_warscountry.152.a:1 "In den Krieg ziehen"
ron_warscountry.152.b:1 "Aufgeben"

ron_warscountry.153.t:0 "Krieg mit den Arabern"
ron_warscountry.153.d:0 "Der Zermürbungskrieg (arabisch حرب الاستنزاف‎ Ḥarb al-Istinzāf, hebräisch מלחמת ההתשה‎ Milhemet haHatashah) umfasste von 1967 bis 1970 Kämpfe zwischen Israel und Ägypten, Jordanien, der PLO und ihren Verbündeten."
ron_warscountry.153.a:1 "In den Krieg ziehen"
ron_warscountry.153.b:1 "Aufgeben"

ron_warscountry.154.t:0 "Naxalitisch-maoistischer Aufstand"
ron_warscountry.154.d:0 "Was werden wir tun?"
ron_warscountry.154.a:1 "Unterdrücke es!"
ron_warscountry.154.b:1 "Aufgeben"

ron_warscountry.155.t:0 "Kommunistischer Aufstand!"
ron_warscountry.155.d:0 "Der kommunistische Aufstand in Malaysia, auch bekannt als Zweiter malaiischer Notstand (Malay Perang insurgensi melawan pengganas komunis oder Darurat Kedua), war ein bewaffneter Konflikt, der von 1968 bis 1989 in Malaysia zwischen der Malayan Communist Party (MCP) und malaysischen Bundessicherheitskräften stattfand."
ron_warscountry.155.a:1 "Unterdrücke es!"
ron_warscountry.155.b:1 "Aufgeben"

ron_warscountry.156.t:0 "Die Unruhen, PIRA-Rebellen!"
ron_warscountry.156.d:0 "Der Nordirlandkonflikt (irisch Na Trioblóidí) war ein ethno-nationalistischer[14][15][16][17] Konflikt in Nordirland im späten 20. Jahrhundert. International auch als Nordirlandkonflikt bekannt[18][19][20][21] wird er manchmal als „irregulärer Krieg“ oder „Krieg auf niedriger Ebene“ beschrieben. Der Konflikt begann in den späten 1960er Jahren"
ron_warscountry.156.a:1 "Unterdrücke es!"
ron_warscountry.156.b:1 "Aufgeben"

ron_warscountry.157.t:0 "Jahre Vorsprung vor uns"
ron_warscountry.157.d:0 "Die bleiernen Jahre (italienisch Anni di piombo) ist ein Begriff, der für eine Zeit sozialer und politischer Unruhen in Italien in den späten 1960er Jahren verwendet wird."
ron_warscountry.157.a:1 "Besiegt die Terroristen!"
ron_warscountry.157.b:1 "Aufgeben"

ron_warscountry.158.t:0 "Der Warschauer Pakt marschiert bei uns ein!"
ron_warscountry.158.d:0 "Die Invasion des Warschauer Pakts in der Tschechoslowakei, offiziell bekannt als Operation Donau, war eine gemeinsame Invasion der fünf Warschauer-Pakt-Staaten – der Sowjetunion, Polen, Bulgarien, Ostdeutschland und Ungarn – in der Nacht vom 20. auf den 21. August 1968.[20] Etwa 250.000[7] Soldaten des Warschauer Pakts griffen in dieser Nacht die Tschechoslowakei an."
ron_warscountry.158.a:1 "Verteidigen"
ron_warscountry.158.b:1 "Aufgeben"

ron_warscountry.159.t:0 "Zivile Konflikte"
ron_warscountry.159.d:0 "Der Bürgerkrieg auf den Philippinen im Februar 2019 besteht aus einem Aufstand zwischen Regierungstruppen und maoistischen Rebellen, der 1969 während der Herrschaft von Ferdinand Marcos begann."
ron_warscountry.159.a:1 "Unterdrückt sie!"
ron_warscountry.159.b:1 "Aufgeben"

ron_warscountry.160.t:0 "Aufstand!"
ron_warscountry.160.d:0 "Der kommunistische Aufstand auf den Philippinen ist ein andauernder Konflikt zwischen der Regierung der Philippinen (GPH) und der Neuen Volksarmee (NPA), dem bewaffneten Flügel der marxistisch-leninistisch-maoistischen Kommunistischen Partei der Philippinen (CPP). Der Konflikt wird auch mit der Nationalen Demokratischen Front der Philippinen (NDFP) in Verbindung gebracht, die als politischer Flügel der CPP fungiert."
ron_warscountry.160.a:1 "Unterdrücke es!"
ron_warscountry.160.b:1 "Aufgeben"

ron_warscountry.161.t:0 "Moro-Aufstand!"
ron_warscountry.161.d:0 "Der Moro-Konflikt war ein Aufstand in der Region Mindanao auf den Philippinen von 1969 bis 2019. In den 1960er Jahren kam es zu politischen Spannungen und offenen Feindseligkeiten zwischen der philippinischen Regierung und den Rebellengruppen der Moro-Muslime."
ron_warscountry.161.a:1 "Unterdrücke es!"
ron_warscountry.161.b:1 "Aufgeben"

ron_warscountry.162.t:0 "Der Fußballkonflikt!"
ron_warscountry.162.d:0 "Der Fußballkrieg (spanisch „La guerra del fútbol“; umgangssprachlich „Fußballkrieg“ oder „Hundertstundenkrieg“, auch bekannt als „100-Stunden-Krieg“) war ein kurzer Krieg zwischen El Salvador und Honduras im Jahr 1969. Die bestehenden Spannungen zwischen den beiden Ländern fielen mit Unruhen während eines Qualifikationsspiels zur FIFA-Weltmeisterschaft 1970 zusammen. Der Krieg begann am 14. Juli 1969, als das salvadorianische Militär einen Angriff auf Honduras startete."
ron_warscountry.162.a:1 "Zieh in den Krieg!"
ron_warscountry.162.b:1 "Lass uns darüber reden"

