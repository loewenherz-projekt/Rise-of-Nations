CW_Expansion_country.264.t:0 "Vertrag von Taipeh"
CW_Expansion_country.264.d:0 "Der Chinesisch-Japanische Friedensvertrag, offiziell der Friedensvertrag zwischen der Republik China und Japan und allgemein bekannt als Vertrag von Taipeh, war ein Friedensvertrag zwischen Japan und der Republik China (ROC), der am 28. April 1952 in Taipeh, Taiwan, unterzeichnet wurde und am 5. August desselben Jahres in Kraft trat. Damit markierte er das formelle Ende des Zweiten Japanisch-Chinesischen Krieges (1937–1945). Weder die Republik China noch die Volksrepublik China wurden zur Unterzeichnung des Vertrags von San Francisco eingeladen, da andere Länder Meinungsverschiedenheiten darüber hatten, welche Regierung während und nach dem chinesischen Bürgerkrieg die legitime Regierung Chinas war. Auf Druck der Vereinigten Staaten unterzeichnete Japan einen separaten Friedensvertrag mit der Republik China, um den Krieg zwischen den beiden Staaten mit einem Sieg der ROC formell zu beenden. Obwohl die ROC selbst aufgrund des Wiederaufflammens des chinesischen Bürgerkriegs nach 1945 nicht an der Friedenskonferenz von San Francisco teilnahm, entspricht dieser Vertrag weitgehend dem von San Francisco."
CW_Expansion_country.264.a:1 "OK"
CW_Expansion_news.264.t:0 "Vertrag von Taipeh"
