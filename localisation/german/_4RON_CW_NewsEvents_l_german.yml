CW_Expansion_country.98.t:0 "Rama IX. Himmelfahrt"
CW_Expansion_country.98.d:0 "Bhumibol bestieg den Thron, nachdem sein Bruder, König Ananda Mahidol, am 9. Juni 1946 unter bis heute ungeklärten Umständen durch eine Schusswunde gestorben war. In einer ersten Regierungserklärung hieß es, Ananda habe sich versehentlich selbst erschossen, doch ein Untersuchungsausschuss hielt dies für nahezu unmöglich. Zwei Palastbeamte wurden schließlich wegen Königsmordes verurteilt und hingerichtet. Eine dritte Möglichkeit, dass Bhumibol seinen Bruder versehentlich erschoss, während die Brüder mit ihren Pistolen spielten, wurde offiziell nie in Betracht gezogen."
CW_Expansion_country.98.a:1 "OK"
CW_Expansion_news.98.t:0 "Rama IX. Himmelfahrt"
