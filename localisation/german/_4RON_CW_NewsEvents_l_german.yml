CW_Expansion_country.327.t:0 "US-Behörden kündigen Wasserstoffbombentest an"
CW_Expansion_country.327.d:0 "Am 31. Januar 1950 gibt US-Präsident Harry S. Truman öffentlich seine Entscheidung bekannt, die Entwicklung der Wasserstoffbombe zu unterstützen. Diese Waffe soll theoretisch hundertmal stärker sein als die Atombomben, die im Zweiten Weltkrieg über Japan abgeworfen wurden."
