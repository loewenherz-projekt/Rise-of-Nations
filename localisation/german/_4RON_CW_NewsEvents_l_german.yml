#1958 Events

CW_Expansion_country.453.t:0 "Erste Überlanddurchquerung der Antarktis"
CW_Expansion_country.453.d:0 "Der Commonwealth Trans-Antarctic Expedition (1955–1958) gelang die erste Überlanddurchquerung der Antarktis über den Südpol. Die 3.473 Kilometer lange Route führte durch anspruchsvolles und bis dahin unerforschtes Gelände vom Weddellmeer zum Südpol und weiter in den McMurdo-Sund."
CW_Expansion_country.453.a:1 "OK"
