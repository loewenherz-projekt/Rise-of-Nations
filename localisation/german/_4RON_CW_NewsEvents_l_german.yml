CW_Expansion_country.92.t:0 "Mannerheim tritt zurück"
CW_Expansion_country.92.d:0 "Feldmarschall Baron Carl Gustav Mannerheim ist als finnischer Präsident zurückgetreten, wie Ministerpräsident Juho K. Paasikivi heute bekannt gab. Als Nachfolger wird Dr. Paasikivi erwartet, der seit November letzten Jahres amtierender Präsident war."
