CW_Expansion_country.360.t:0 "Algerischer Unabhängigkeitskrieg"
CW_Expansion_country.360.d:0 "Der Algerienkrieg, auch bekannt als Algerische Revolution oder Algerischer Unabhängigkeitskrieg, in Algerien gelegentlich auch als Krieg des 1. November, wurde von 1954 bis 1962 zwischen Frankreich und der Algerischen Nationalen Befreiungsfront ausgetragen und führte zur Unabhängigkeit Algeriens von Frankreich. Als wichtiger Entkolonialisierungskrieg war dieser komplexe Konflikt von Guerillakrieg und Folter geprägt. Der Konflikt entwickelte sich auch zu einem Bürgerkrieg zwischen den verschiedenen Gemeinschaften und innerhalb der Gemeinschaften. Der Krieg fand hauptsächlich auf algerischem Gebiet statt und hatte Auswirkungen auf das französische Mutterland."
CW_Expansion_country.360.a:1 "OK"
