CW_Expansion_country.149.t:0 "Indisch-pakistanischer Waffenstillstand"
CW_Expansion_country.149.d:0 "Indien und Pakistan kämpften 1949 um die Region und einigten sich schließlich auf eine Waffenstillstandslinie. Erst der Krieg zwischen Indien und Pakistan um den Status von Bangladesch im Jahr 1971 führte dazu, dass diese Waffenstillstandslinie zur heutigen Line of Control (LoC) wurde."
