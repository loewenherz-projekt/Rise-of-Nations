CW_Expansion_country.309.t:0 "Nikita Chruschtschow wird Vorsitzender des Zentralkomitees"
CW_Expansion_country.309.d:0 "Im September 1953 verlieh das Zentralkomitee Chruschtschow den Titel des Ersten Sekretärs, wodurch sein Dienstalter im Zentralkomitee offiziell wurde. Dank seiner neu erworbenen Machtbefugnisse konnte Chruschtschow Mitarbeiter in die Führung Georgiens, Aserbaidschans, der Ukraine, Armeniens und Moldawiens (dem heutigen Moldawien) berufen, während Malenkow im Gegensatz dazu nur in Moskau einen Mitarbeiter in die Führung berufen konnte. Unter Chruschtschow kam es in der lokalen Parteiführung der Russischen Sozialistischen Föderativen Sowjetrepublik (Russische SFSR) zum größten Wechsel bei den Provinzführern seit der Großen Säuberung; zwei von drei Provinzführern wurden allein im Jahr 1953 ersetzt. Malenkow wurde eine identische Politik in den Regierungsinstitutionen zugesichert; die bemerkenswerteste Veränderung war die Ernennung von Michail Perwuchin, Iwan Tewosjan und Maxim Saburow zu stellvertretenden Vorsitzenden des Ministerrats."
CW_Expansion_country.309.a:1 "OK"
