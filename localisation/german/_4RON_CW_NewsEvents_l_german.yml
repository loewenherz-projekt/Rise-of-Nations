CW_Expansion_country.331.t:0 "Die UdSSR erkennt die Souveränität Ostdeutschlands an"
CW_Expansion_country.331.d:0 "1954 gewährte die Sowjetunion der DDR ihre Souveränität, und die Sowjetische Kontrollkommission in Berlin wurde aufgelöst. Zu diesem Zeitpunkt waren die Reparationszahlungen bereits geleistet, und die SAGs waren wieder in ostdeutschen Besitz übergegangen. Die fünf Länder, die früher die sowjetische Besatzungszone bildeten, wurden 1952 ebenfalls aufgelöst und durch 15 Bezirke ersetzt; die Vereinigten Staaten, Großbritannien und Frankreich erkannten den 15. Bezirk, Ost-Berlin, nicht an. 1950 begann die DDR, sich aktiv am Rat für gegenseitige Wirtschaftshilfe (RGW) zu beteiligen. 1955 wurde Ministerpräsident Otto Grotewohl nach Moskau eingeladen und schloss zwischen dem 17. und 20. September den Vertrag über die Beziehungen zwischen der UdSSR und der DDR mit der Sowjetunion, der am 6. Oktober in Kraft trat. Gemäß seinen Bestimmungen war die Deutsche Demokratische Republik fortan „frei, über Fragen ihrer Innen- und Außenpolitik zu entscheiden, einschließlich ihrer Beziehungen zur Bundesrepublik Deutschland sowie zu anderen Staaten“. Obwohl die sowjetischen Streitkräfte unter noch zu vereinbarenden Bedingungen vorübergehend im Land blieben, griffen sie nicht in das gesellschaftliche und politische Leben ein. Die beiden Regierungen stärkten die wirtschaftlichen, wissenschaftlich-technischen und kulturellen Beziehungen und konsultierten einander in Fragen, die ihre Interessen berührten. Am 14. Mai 1955 trat Ostdeutschland dem Warschauer Pakt bei, und 1956 wurde die Nationale Volksarmee (NVA) gegründet."
CW_Expansion_country.331.a:1 "OK"
CW_Expansion_news.331.t:0 "Die UdSSR erkennt die Souveränität Ostdeutschlands an"
CW_Expansion_news.331.d:0 "1954 gewährte die Sowjetunion der DDR ihre Souveränität, und die Sowjetische Kontrollkommission in Berlin wurde aufgelöst. Zu diesem Zeitpunkt waren die Reparationszahlungen bereits geleistet, und die SAGs waren wieder in ostdeutschen Besitz übergegangen. Die fünf Länder, die früher die sowjetische Besatzungszone bildeten, wurden 1952 ebenfalls aufgelöst und durch 15 Bezirke ersetzt; die Vereinigten Staaten, Großbritannien und Frankreich erkannten den 15. Bezirk, Ost-Berlin, nicht an. 1950 begann die DDR, sich aktiv am Rat für gegenseitige Wirtschaftshilfe (RGW) zu beteiligen. 1955 wurde Ministerpräsident Otto Grotewohl nach Moskau eingeladen und schloss zwischen dem 17. und 20. September den Vertrag über die Beziehungen zwischen der UdSSR und der DDR mit der Sowjetunion, der am 6. Oktober in Kraft trat. Gemäß seinen Bestimmungen war die Deutsche Demokratische Republik fortan „frei, über Fragen ihrer Innen- und Außenpolitik zu entscheiden, einschließlich ihrer Beziehungen zur Bundesrepublik Deutschland sowie zu anderen Staaten“. Obwohl die sowjetischen Streitkräfte unter noch zu vereinbarenden Bedingungen vorübergehend im Land blieben, griffen sie nicht in das gesellschaftliche und politische Leben ein. Die beiden Regierungen stärkten die wirtschaftlichen, wissenschaftlich-technischen und kulturellen Beziehungen und konsultierten einander in Fragen, die ihre Interessen berührten. Am 14. Mai 1955 trat Ostdeutschland dem Warschauer Pakt bei, und 1956 wurde die Nationale Volksarmee (NVA) gegründet."
CW_Expansion_news.331.a:1 "OK"

CW_Expansion_country.332.t:0 "Atomtest von Castle Romeo"
CW_Expansion_country.332.d:0 "Castle Romeo war der Codename eines der Tests der US-Atomtestreihe Operation Castle. Es war der erste Test der thermonuklearen Waffe TX-17, der ersten eingesetzten thermonuklearen Bombe."
CW_Expansion_country.332.a:1 "OK"
