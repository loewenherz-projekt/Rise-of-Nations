CW_Expansion_country.102.t:0 "Schwedischer Ministerpräsident stirbt im Amt"
CW_Expansion_country.102.d:0 "Nach der Kapitulation Deutschlands wollte Hansson eine sozialdemokratisch geführte Koalitionsregierung aller nichtkommunistischen Parteien aufrechterhalten. Dies gelang ihm jedoch aufgrund des starken Widerstands innerhalb seiner eigenen Partei, die nach dem Krieg eine radikale Reformagenda bevorzugte. Hansson stimmte widerstrebend einer Alleinparteienregierung zu. Er hatte seine frühen revolutionären und strikt antimilitaristischen Ansichten zugunsten eines sozialen Korporatismus, Klassenzusammenarbeit und einer Reformagenda aufgegeben, die wenige Verstaatlichungen, aber stabile Streitkräfte zur Wahrung der Neutralität vorsah. Er starb am 6. Oktober 1946 in Stockholm an einem Herzinfarkt, als er an der Station Ålstens Gård aus einer Straßenbahn stieg. Sein Nachfolger als Parteivorsitzender und Ministerpräsident wurde Bildungsminister Tage Erlander, der beide Ämter bis 1969 gleichzeitig innehatte und damit den größten Teil von Hanssons Erbe vollendete. Per Albin Hansson, der oft als der erfolgreichste Ministerpräsident der schwedischen Geschichte gilt, ist auf dem Norra Begravningsplatsen in Stockholm beigesetzt."
CW_Expansion_country.102.a:1 "OK"
CW_Expansion_news.102.t:0 "Schwedischer Ministerpräsident stirbt im Amt"
CW_Expansion_news.102.d:0 "Nach der Kapitulation Deutschlands wollte Hansson eine sozialdemokratisch geführte Koalitionsregierung aller nichtkommunistischen Parteien aufrechterhalten. Dies gelang ihm jedoch nicht aufgrund des starken Widerstands innerhalb seiner eigenen Partei, die nach dem Krieg eine radikale Reformagenda bevorzugte. Hansson stimmte widerstrebend einer Alleinparteienregierung zu. Er hatte seine frühen revolutionären und strikt antimilitaristischen Ansichten zugunsten eines sozialen Korporatismus, Klassenzusammenarbeit und einer Reformagenda aufgegeben, die wenige Verstaatlichungen, aber stabile Streitkräfte zur Wahrung der Neutralität vorsah. Er starb am 6. Oktober 1946 in Stockholm an einem Herzinfarkt, als er an der Station Ålstens Gård aus einer Straßenbahn stieg. Sein Nachfolger als Parteivorsitzender und Ministerpräsident wurde Bildungsminister Tage Erlander, der beide Ämter bis 1969 gleichzeitig innehatte und damit den größten Teil von Hanssons Erbe vollendete. Per Albin Hansson, der oft als der erfolgreichste Ministerpräsident der schwedischen Geschichte gilt, ist auf dem Norra Begravningsplatsen in Stockholm beigesetzt."
