CW_Expansion_country.449.t:0 "Zwei Züge kollidieren in Yarimburgaz"
CW_Expansion_country.449.d:0 "Das Zugunglück von Yarımburgaz war ein Frontalzusammenstoß zweier Züge, der sich am 20. Oktober 1957 in der Nähe von Yarımburgaz, Küçükçekmece, westlich von Istanbul in der Türkei ereignete. Mit 95 Toten und 150 Verletzten war es der bisher schwerste Zugunfall des Landes."
