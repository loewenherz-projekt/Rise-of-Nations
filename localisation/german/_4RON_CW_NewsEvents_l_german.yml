CW_Expansion_country.478.t:0 "American Airlines Flug 320 stürzt ab"
CW_Expansion_country.478.d:0 "American Airlines Flug 320 war ein Linienflug zwischen dem Chicago Midway International Airport und dem New Yorker Flughafen LaGuardia. Am 3. Februar 1959 stürzte die Lockheed L-188 Electra, die den Flug durchführte, beim Sinkflug in den East River. 65 der 73 Menschen an Bord kamen dabei ums Leben. Schlechte Wetterbedingungen am Zielort führten dazu, dass die Besatzung durch dichte Wolken und Nebel absteigen musste. Das Flugzeug flog jedoch niedriger als von den Piloten beabsichtigt und stürzte 1.500 m vor der Landebahn mit einer Geschwindigkeit von 140 Knoten (260 km/h) in den eisigen Fluss. American Airlines hatte diesen Flugzeugtyp vor dem Unfall erst etwa zwei Wochen lang im kommerziellen Dienst eingesetzt."
CW_Expansion_country.478.a:1 "OK"
