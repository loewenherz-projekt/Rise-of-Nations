CW_Expansion_country.463.t:0 "Zweite Taiwanstraßenkrise"
CW_Expansion_country.463.d:0 "Die Zweite Taiwankrise, auch Taiwankrise von 1958 genannt, war ein Konflikt zwischen der Volksrepublik China (VRC) und der Republik China (ROC). In diesem Konflikt beschoss die VR China die Inseln Kinmen (Quemoy) und die Matsu-Inseln vor der Ostküste des chinesischen Festlands (in der Taiwanstraße), um Taiwan von der Nationalistischen Partei Chinas (Kuomintang, KMT) zu „befreien“ und das Ausmaß der US-Verteidigung Taiwans auszuloten. Zudem kam es zu einer Seeschlacht um die Insel Dongding, als die Marine der ROC eine amphibische Landung der VR China abwehrte."
CW_Expansion_country.463.a:1 "OK"
