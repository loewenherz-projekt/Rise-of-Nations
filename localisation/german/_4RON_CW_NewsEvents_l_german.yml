CW_Expansion_country.145.t:0 "Juliana zur Königin der Niederlande gekrönt"
CW_Expansion_country.145.d:0 "Die Unabhängigkeit Indonesiens, in deren Rahmen über 150.000 niederländische Soldaten als Dekolonialisierungstruppen stationiert waren, galt als wirtschaftliche Katastrophe für die Niederlande. Angesichts des sicheren Verlusts der wertvollen Kolonie verkündete die Königin am 4. September 1948 ihre Absicht abzudanken. Zwei Tage später wurde Juliana vor den Augen der Weltöffentlichkeit in einer gemeinsamen Sitzung der Generalstaaten in der Nieuwe Kerk in Amsterdam vereidigt und als Monarchin ins Amt eingeführt. Damit war sie das zwölfte Mitglied des Hauses Oranien, das die Niederlande regierte."
CW_Expansion_country.145.a:1 "OK"
CW_Expansion_news.145.t:0 "Juliana zur Königin der Niederlande gekrönt"
