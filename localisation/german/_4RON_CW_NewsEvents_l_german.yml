CW_Expansion_country.378.t:0 "Österreichischer Staatsvertrag"
CW_Expansion_country.378.d:0 "Der Österreichische Staatsvertrag (auch Unabhängigkeitsvertrag genannt) stellte Österreich als souveränen Staat wieder her. Er wurde am 15. Mai 1955 im Schloss Belvedere in Wien zwischen den alliierten Besatzungsmächten und der österreichischen Regierung unterzeichnet. Die benachbarte Föderative Volksrepublik Jugoslawien trat dem Vertrag später bei. Er trat am 27. Juli 1955 offiziell in Kraft. Der Vertrag stellte ein freies, souveränes und demokratisches Österreich wieder her. Grundlage des Vertrags war die Moskauer Deklaration vom 30. Oktober 1943. Das Abkommen und seine Anhänge sahen sowjetische Ölfeldkonzessionen und Eigentumsrechte an Ölraffinerien in Ostösterreich sowie die Übertragung der Vermögenswerte der Donauschifffahrtsgesellschaft an die UdSSR vor."
CW_Expansion_country.378.a:1 "OK"
