CW_Expansion_country.434.t:0 "Absturz des Trans-Canada Airlines-Fluges 810"
CW_Expansion_country.434.d:0 "Trans-Canada Air Lines Flug 810-9 war eine Canadair North Star auf einem Linienflug von Vancouver nach Calgary (und weiter nach Regina, Winnipeg und Toronto). Das Flugzeug stürzte am 9. Dezember 1956 in den Mount Slesse nahe Chilliwack, British Columbia, Kanada, nachdem es über den Bergen auf starke Vereisung und Turbulenzen gestoßen war. Alle 62 Menschen an Bord starben. Damit war der Absturz bis zu diesem Zeitpunkt einer der tödlichsten Flugzeugabstürze überhaupt; er gilt bis heute als die sechstschwerste Flugzeugkatastrophe in der kanadischen Geschichte."
CW_Expansion_country.434.a:1 "OK"
CW_Expansion_news.434.t:0 "Absturz des Trans-Canada Airlines-Fluges 810"
