CW_Expansion_country.414.t:0 "Nasser verstaatlicht den Suezkanal"
CW_Expansion_country.414.d:0 "Nach dem Zweiten Weltkrieg drängte Ägypten auf den Abzug der britischen Truppen aus der Suezkanalzone, und im Juli 1956 verstaatlichte Präsident Nasser den Kanal in der Hoffnung, durch die Erhebung von Mautgebühren den Bau eines riesigen Staudamms am Nil finanzieren zu können. Als Reaktion darauf marschierte Israel Ende Oktober ein, und Anfang November landeten britische und französische Truppen und besetzten die Kanalzone. Unter dem Druck der Sowjetunion, der USA und der UNO zogen sich Großbritannien und Frankreich im Dezember zurück, und die israelischen Streitkräfte zogen im März 1957 ab. Im selben Monat übernahm Ägypten die Kontrolle über den Kanal und öffnete ihn wieder für die Handelsschifffahrt."
CW_Expansion_country.414.a:1 "OK"
