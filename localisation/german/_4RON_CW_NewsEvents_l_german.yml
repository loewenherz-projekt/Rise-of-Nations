CW_Expansion_country.385.t:0 "AL-Flug 402 über Bulgarien abgeschossen"
CW_Expansion_country.385.d:0 "Am 27. Juli 1955 geriet der von einer Lockheed Constellation mit der Registrierungsnummer 4X-AKC durchgeführte Flug in den damals kommunistischen bulgarischen Luftraum und wurde von zwei bulgarischen MiG-15-Düsenjägern angegriffen. Sie stürzten in der Nähe von Petrich ab. Alle sieben Besatzungsmitglieder und 51 Passagiere an Bord des Flugzeugs kamen ums Leben."
