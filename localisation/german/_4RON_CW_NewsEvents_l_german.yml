CW_Expansion_country.123.t:0 "Erster Prototyp der AK-47 gebaut"
CW_Expansion_country.123.d:0 "Das AK-47, offiziell bekannt als Avtomat Kalashnikova; auch bekannt als Kalaschnikow oder einfach AK, ist ein gasbetriebenes Sturmgewehr mit der Patronenkammer 7,62 × 39 mm. Es wurde in der Sowjetunion vom russischen Kleinwaffenkonstrukteur Michail Kalaschnikow entwickelt und ist die ursprüngliche Waffe der Kalaschnikow-Familie (oder „AK“). Mehr als sieben Jahrzehnte nach seiner Entwicklung sind das Modell AK-47 und seine Varianten nach wie vor die beliebtesten und am weitesten verbreiteten Gewehre der Welt. Die Zahl „47“ bezieht sich auf das Jahr der Fertigstellung des Gewehrs. Die Entwicklungsarbeiten am AK-47 begannen 1945. Es wurde 1947 für offizielle Militärtests vorgestellt, und 1948 wurde die Version mit festem Schaft bei ausgewählten Einheiten der Sowjetarmee in den aktiven Dienst gestellt. Anfang 1949 wurde das AK offiziell von den sowjetischen Streitkräften anerkannt und von der Mehrheit der Mitgliedstaaten des Warschauer Pakts verwendet."
CW_Expansion_country.123.a:1 "OK"
