CW_Expansion_country.372.t:0 "Gescheiterter Attentat auf Zhou Enlai"
CW_Expansion_country.372.d:0 "Die Kashmir Princess, auch Air-India-Flug 300 genannt, war ein gecharterter Lockheed L-749A Constellation-Flug der Air India. Am 11. April 1955 wurde das Flugzeug in der Luft durch eine Bombenexplosion beschädigt und stürzte auf dem Weg von Bombay (Indien) und Hongkong nach Jakarta (Indonesien) ins Südchinesische Meer. 16 Insassen kamen ums Leben, drei überlebten. Die Explosion war ein Attentat auf den chinesischen Premierminister Zhou Enlai, der den Flug aufgrund eines medizinischen Notfalls verpasste und nicht an Bord war. Die chinesische Regierung kam zu dem Schluss, dass die Kuomintang (KMT) für den Bombenanschlag verantwortlich war."
CW_Expansion_country.372.a:1 "OK"
