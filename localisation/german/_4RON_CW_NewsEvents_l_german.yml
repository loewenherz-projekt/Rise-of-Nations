CW_Expansion_country.351.t:0 "Der erste Indochinakrieg endet"
CW_Expansion_country.351.d:0 "In der zweiten Hälfte des 19. Jahrhunderts wurde Vietnam schrittweise von den Franzosen erobert, die es zunächst als Protektorat (1883–1939) und dann als Besitztum (1939–1945) kontrollierten. Die vietnamesische Herrschaft kehrte erst am 2. September 1945 in das Land zurück, als der nationalistische Führer Ho Chi Minh die Unabhängigkeit proklamierte. Von 1946 bis 1954 widersetzten sich die Franzosen der Unabhängigkeit, und Ho Chi Minh führte im Ersten Indochinakrieg einen Guerillakrieg gegen sie, der am 7. Mai 1954 mit dem vietnamesischen Sieg bei Dien Bien Phu endete. Am 21. Juli 1954 wurde in Genf ein Abkommen unterzeichnet, das eine vorübergehende Teilung des Landes am 17. Breitengrad zwischen einem kommunistisch dominierten Norden und einem von den USA unterstützten Süden vorsah. "
CW_Expansion_country.351.a:1 "OK"
