CW_Expansion_country.357.t:0 "Japanische Fähre Toya Maru sinkt"
CW_Expansion_country.357.d:0 "Die Tōya Maru war ein japanisches Eisenbahnschiff der Japanischen Staatsbahn, das am 26. September 1954 während eines Taifuns in der Tsugaru-Straße zwischen den japanischen Inseln Hokkaidō und Honshū sank. Die Japanische Staatsbahn gab im September 1955 bekannt, dass bei dem Unglück 1.153 Menschen an Bord ums Leben kamen. Die genaue Zahl der Todesopfer ist jedoch unbekannt, da es Opfer gab, die in letzter Minute eine Passage auf dem Schiff ergattern konnten, und andere, die ihre Fahrt kurz vor dem Unglück absagten."
CW_Expansion_country.357.a:1 "OK"
