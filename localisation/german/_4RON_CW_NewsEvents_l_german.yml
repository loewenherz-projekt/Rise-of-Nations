CW_Expansion_news.318.a:1 "OK"

CW_Expansion_country.319.t:0 "Lawrentij Beria hingerichtet"
CW_Expansion_country.319.d:0 "Das Zentralkomitee verbrachte fünf Tage damit, sich von Berijas Schuld zu überzeugen, und RA Rudenko, ein erfahrener und Chruschtschow wohlbekannter Staatsanwalt, wurde beauftragt, dafür zu sorgen, dass der Polizeichef zügig und unter größtmöglichem Anschein von Legalität vor Gericht gestellt, verurteilt und hingerichtet wurde. Die Prawda verkündete Berijas Sturz am 10. Juli, schrieb ihn der Initiative des Genossen Malenkow zu und verwies auf Berijas „kriminelle Aktivitäten gegen Partei und Staat“. Am 17. Dezember gab Rudenkos Büro bekannt, dass Berija und sechs Komplizen, ermutigt von ausländischen Geheimdiensten, seit vielen Jahren geplant hätten, die Macht in der Sowjetunion zu ergreifen und den Kapitalismus wiederherzustellen. Ein Sondertribunal wurde eingerichtet. Den Angeklagten wurde keine Vertretung und keine Berufung gestattet. Als das Todesurteil verkündet wurde, fiel Berija laut General Moskalenko zu Boden und flehte auf Knien um Gnade. Diese Eigenschaft hatte er anderen gegenüber nicht gezeigt und zeigte sie auch jetzt nicht ihm selbst. Er und seine Komplizen wurden abgeführt und sofort erschossen. Seine Frau und sein Sohn wurden in ein sibirisches Arbeitslager geschickt."
CW_Expansion_country.319.a:1 "OK"
