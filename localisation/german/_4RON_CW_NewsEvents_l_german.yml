CW_Expansion_country.516.t:0 "Erdbeben in Valdivia, Chile"
CW_Expansion_country.516.d:0 "Das Erdbeben und der Tsunami von Valdivia 1960, auch bekannt als das Große Chile-Erdbeben vom 22. Mai 1960, waren das stärkste jemals registrierte Erdbeben. Verschiedene Studien bezifferten die Stärke auf 9,4–9,6 auf der Momenten-Magnituden-Skala. Es ereignete sich am Nachmittag und dauerte etwa 10 Minuten. Die daraus resultierenden Tsunamis trafen Südchile, Hawaii, Japan, die Philippinen, Ostneuseeland, Südostaustralien und die Aleuten."
CW_Expansion_country.516.a:1 "OK"
