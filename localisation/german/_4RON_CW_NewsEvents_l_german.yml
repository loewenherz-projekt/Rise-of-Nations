CW_Expansion_country.411.t:0 "Proteste in Posen"
CW_Expansion_country.411.d:0 "Die Proteste von Posen im Jahr 1956, auch bekannt als Posener Juni, waren die ersten von mehreren Massenprotesten gegen die kommunistische Regierung der Volksrepublik Polen. Demonstrationen von Arbeitern, die bessere Arbeitsbedingungen forderten, begannen am 28. Juni 1956 in den Cegielski-Fabriken in Posen und wurden gewaltsam niedergeschlagen."
CW_Expansion_country.411.a:1 "OK"
