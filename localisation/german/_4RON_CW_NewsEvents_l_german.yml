CW_Expansion_country.383.t:0 "Disneyland-Themenpark in Kalifornien eröffnet"
CW_Expansion_country.383.d:0 "Disneyland, Walt Disneys Metropole der Nostalgie, Fantasie und des Futurismus, eröffnet am 17. Juli 1955. Der 17 Millionen Dollar teure Themenpark wurde auf 160 Hektar ehemaligen Orangenhainen in Anaheim, Kalifornien, errichtet und erzielte schon bald schwindelerregende Gewinne. Heute empfängt Disneyland jährlich über 18 Millionen Besucher, die fast drei Milliarden Dollar ausgeben."
CW_Expansion_country.383.a:1 "OK"
