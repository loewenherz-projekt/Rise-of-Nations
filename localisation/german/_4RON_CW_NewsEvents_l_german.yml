CW_Expansion_country.101.t:0 "Bulgarien wird zur Volksrepublik erklärt"
CW_Expansion_country.101.d:0 "Im September 1946 wurde die Monarchie durch eine Volksabstimmung abgeschafft. 95,6 Prozent der Stimmen stimmten für die Republik. Der junge Zar Simeon II. wurde ins Exil geschickt. Die Kommunisten übernahmen offen die Macht und Bulgarien wurde zur Volksrepublik erklärt. Wassil Kolarow, die Nummer drei der Partei, wurde Präsident. Im Laufe des folgenden Jahres festigten die Kommunisten ihre Macht. Bei den Wahlen zur verfassunggebenden Versammlung im Oktober 1946 erlangten die Kommunisten die Mehrheit. Einen Monat später wurde Dimitrow Premierminister."
CW_Expansion_country.101.a:1 "OK"
