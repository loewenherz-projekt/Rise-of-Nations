CW_Expansion_country.300.t:0 "Verheerender Angriff auf die Moncada-Kaserne"
CW_Expansion_country.300.d:0 "Am 26. Juli 1953 wurde die Kaserne zum Schauplatz eines bewaffneten Angriffs einer kleinen Gruppe von Revolutionären unter Fidel Castro. Der Angriff scheiterte, die überlebenden Revolutionäre wurden inhaftiert. Dieser bewaffnete Angriff gilt allgemein als Beginn der kubanischen Revolution. Das Datum des Angriffs, der 26. Juli, wurde von Castro als Name für seine revolutionäre Bewegung übernommen, die schließlich am 1. Januar 1959 die Diktatur von Fulgencio Batista stürzte."
CW_Expansion_country.300.a:1 "OK"
