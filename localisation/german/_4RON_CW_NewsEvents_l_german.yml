CW_Expansion_country.425.t:0 "Tanger-Protokoll"
CW_Expansion_country.425.d:0 "Das Protokoll wurde am 18. Dezember 1923 in Paris unterzeichnet und trat mit der Ratifizierung am 14. Mai 1924 in Kraft. Ab 1929 übernahm Spanien die Polizeigewalt in der Stadt. Zur Verwaltung der Stadt wurde ein internationales Gesetzgebungsorgan geschaffen. Spanien besetzte Tanger von 1940 bis 1945 und profitierte dabei von der Besetzung Frankreichs durch Deutschland im Jahr 1940. Der Status der internationalen Zone blieb bis zu ihrer Wiedereingliederung in Marokko am 29. Oktober 1956 bestehen, nachdem Marokko im selben Jahr seine Unabhängigkeit erlangt hatte."
CW_Expansion_country.425.a:1 "OK"
