CW_Expansion_country.228.t:0 "Nazi-Kriegsverbrecher gehängt"
CW_Expansion_country.228.d:0 "Am 7. Juni 1951 wurden Ohlendorf und die drei anderen EG-Kommandeure im Landsberger Gefängnis gehängt. Als der politische und humanitäre Druck zunahm, wurden die anderen in den darauffolgenden Nürnberger Prozessen sowie von den US-Militärkommissionen Verurteilten stillschweigend freigelassen. Wegen Zwangsarbeit verurteilte Industrielle, Ärzte, die medizinische Experimente durchführten, SS- und Wehrmachtsoffiziere sowie wegen schwerer Verbrechen gegen die Menschlichkeit verurteilte Beamte des Auswärtigen Amtes durften allesamt stillschweigend nach Hause gehen. Bis zum 5. Mai 1958 wurden alle noch im Kriegsverbrechergefängnis Nr. 1 in Landsberg inhaftierten Häftlinge freigelassen. Auch wenn die Freilassungen als Rechtsbeugung angesehen werden können, schufen die Nürnberger Prozesse einen bleibenden Präzedenzfall dafür, dass Verbrechen gegen die Menschlichkeit „nie wieder“ toleriert werden würden."
CW_Expansion_country.228.a:1 "OK"
