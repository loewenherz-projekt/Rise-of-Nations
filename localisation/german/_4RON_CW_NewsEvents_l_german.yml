CW_Expansion_country.272.t:0 "[USA..GetLeader] geht nach Korea"
CW_Expansion_country.272.d:0 "Kurz nach seiner Wahl löste Eisenhower sein Wahlversprechen ein, wurde jedoch nicht sehr konkret, was er damit erreichen wollte. Nach einem kurzen Aufenthalt kehrte er in die Vereinigten Staaten zurück, schwieg jedoch über seine Pläne bezüglich des Koreakriegs. Nach seinem Amtsantritt verfolgte Eisenhower jedoch eine harte Politik gegenüber den Kommunisten in Korea. Er deutete an, die nationalchinesischen Streitkräfte auf Taiwan gegen das kommunistische China „loszulassen“, und sandte nur leicht verhüllte Botschaften, dass er jede notwendige Gewalt (einschließlich des Einsatzes von Atomwaffen) anwenden würde, um den Krieg zu beenden, falls die Friedensverhandlungen nicht vorankämen. Die Chinesen, erschöpft von mehr als zwei Jahren Krieg, stimmten schließlich den Bedingungen zu, und am 27. Juli 1953 wurde ein Waffenstillstand unterzeichnet. "
CW_Expansion_country.272.a:1 "OK"
