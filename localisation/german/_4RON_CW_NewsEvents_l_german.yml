CW_Expansion_country.501.t:0 "Alitalia-Flug 618 stürzt ab"
CW_Expansion_country.501.d:0 "Am Morgen des 26. Februar 1960 legte Flug 618 unter Aufsicht eines Prüfpiloten seinen ersten Zwischenstopp am Flughafen Shannon ein, um aufzutanken und anschließend seine Reise über den Atlantik fortzusetzen. Nur 45 Minuten nach der ersten Ankunft hatte die Maschine bei klarem, aber noch dunklem und teilweise bewölktem Himmel die Starterlaubnis von Startbahn 05 erhalten. Der Start verlief ohne Probleme, und die Besatzung fuhr das Fahrwerk ein, bevor sie eine Linkskurve flog, als die Maschine bei eingeschalteten Landescheinwerfern eine Höhe von 50 m erreicht hatte. Während der Kurve wurde die Leistung der Maschine leicht reduziert, die Landeklappen jedoch nie vollständig eingefahren. Statt zu steigen, beschleunigte die Maschine nur und verlor sehr schnell an Höhe. Die Piloten konnten nicht verhindern, dass die linke Flügelspitze eine Steinmauer in der Nähe der Kirche von Clonloghan traf, gefolgt von den linken Triebwerken und dem Rest des Flügels, der auch mehrere Grabsteine des umliegenden Friedhofs traf. An diesem Punkt war das Schicksal des Flugzeugs besiegelt, und nachdem auch die Propeller des rechten Triebwerks an der Mauer vorbeigeschrammt waren, schlug das außer Kontrolle geratene Flugzeug auf einem offenen Feld hinter dem Friedhof auf dem Boden auf und ging in Flammen auf."
CW_Expansion_country.501.a:1 "OK"
