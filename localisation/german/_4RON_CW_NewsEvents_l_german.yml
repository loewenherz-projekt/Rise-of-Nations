CW_Expansion_country.410.t:0 "Molotow tritt als Außenminister zurück"
CW_Expansion_country.410.d:0 "Molotow tritt als sowjetischer Außenminister zurück: Herr Molotow ist gestern Abend als sowjetischer Außenminister zurückgetreten. Nachfolger des 66-jährigen Molotow wird Dmitri Schepilow, der 50-jährige Herausgeber der Prawda."
