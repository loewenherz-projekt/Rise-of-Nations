CW_Expansion_country.394.t:0 "Präsident Eisenhower erleidet eine Koronarthrombose"
CW_Expansion_country.394.d:0 "Eisenhower flog am 14. August 1955 nach Denver, um dort, wie er es nannte, bis Oktober einen „Arbeits- und Freizeiturlaub“ zu verbringen. Der Arbeitsteil sollte auf dem Luftwaffenstützpunkt Lowry im Osten Denvers stattfinden, der inzwischen ebenfalls geschlossen und in ein Wohnviertel umgewandelt worden war. Der Freizeitteil sollte entweder Angeln auf der Byers Peak Ranch in den Rocky Mountains oder Golfen auf den vielen Golfplätzen in der Umgebung von Denver sein. Es stellte sich heraus, dass es sich um einen Golfplatz handelte, auf dem, wie einige Historiker und Mediziner heute vermuten, sein Herzinfarkt seinen Ursprung hatte. Da er sich nach einer Runde Golf im Cherry Hills Golf Club im Süden Denvers unwohl fühlte, kehrte er zum Haus der Familie Doud zurück und legte sich am frühen Abend des 23. September ins Bett. Als er am frühen Morgen des 24. September mit Brustschmerzen aufwachte, wurde sein Leibarzt gerufen, der versuchte, Eisenhowers Beschwerden zu lindern. Stunden später – eine Verzögerung, die seitdem untersucht wird – wurde ein Kardiologe aus dem Fitzsimons Army Hospital gerufen, um ein Elektrokardiogramm durchzuführen, das den Verdacht bestätigte: Der Präsident hatte einen schweren Herzinfarkt erlitten. Eisenhower wurde in einem Geheimdienstwagen ins Krankenhaus gebracht."
CW_Expansion_country.394.a:1 "OK"
