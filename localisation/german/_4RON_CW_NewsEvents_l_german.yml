CW_Expansion_country.416.t:0 "Munitionslaster explodieren in Kalifornien"
CW_Expansion_country.416.d:0 "Am 7. August 1956 explodierten in Cali, Kolumbien, sieben Munitionslastwagen der Armee. Dabei kamen über 1.000 Menschen ums Leben, Tausende wurden verletzt. Kurz nach Mitternacht explodierten alle sieben Lastwagen in einer schnellen Kettenreaktion. Ein nahegelegener Bahnhof und eine Kaserne wurden zerstört. 500 Soldaten in der Kaserne verloren augenblicklich ihr Leben. Ein drei Häuserblocks umfassendes Gebiet der dicht besiedelten Stadt wurde völlig dem Erdboden gleichgemacht. Nahezu alle Fenster im Umkreis von mehreren Kilometern zerbarsten. Die Lastwagen selbst wurden zerstört und hinterließen einen riesigen Krater im Boden. Die schweren Bronzetüren der über 10 Häuserblocks entfernten St. Paul’s Cathedral wurden von der Kirche weggesprengt. Die Ursache der Explosionen ist bis heute ein Rätsel."
CW_Expansion_country.416.a:1 "OK"
