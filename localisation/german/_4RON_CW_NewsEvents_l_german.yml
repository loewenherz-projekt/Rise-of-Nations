CW_Expansion_country.398.t:0 "Der Vietnamkrieg beginnt offiziell"
CW_Expansion_country.398.d:0 "Der Vietnamkrieg begann nach Ansicht der meisten Historiker in den 1950er Jahren, obwohl der Konflikt in Südostasien seine Wurzeln in der französischen Kolonialzeit des 19. Jahrhunderts hatte. Die USA, Frankreich, China, die Sowjetunion, Kambodscha, Laos und andere Länder wurden im Laufe der Zeit in den langwierigen Krieg verwickelt, der schließlich 1975 mit der Wiedervereinigung Nord- und Südvietnams endete. Die folgende Zeitleiste des Vietnamkriegs bietet einen Überblick über die komplexen politischen und militärischen Probleme eines Krieges, der letztendlich Millionen von Menschenleben forderte."
CW_Expansion_country.398.a:1 "OK"
