CW_Expansion_news.238.a:1 "OK"

CW_Expansion_country.241.t:0 "Erste Schlacht von Maryang-San"
CW_Expansion_country.241.d:0 "Die Erste Schlacht von Maryang-san (3.–8. Oktober 1951), auch bekannt als Verteidigungsschlacht von Maliangshan, wurde während des Koreakrieges zwischen Streitkräften des UN-Kommandos (UN) – hauptsächlich australischen und britischen – und der chinesischen Volksfreiwilligenarmee (PVA) ausgetragen. Die Kämpfe ereigneten sich während einer begrenzten UN-Offensive des US I Corps mit dem Codenamen Operation Commando. Diese Offensive drängte die PVA schließlich vom Imjin-Fluss zur Jamestown-Linie zurück und vernichtete nach schweren Kämpfen Teile von vier PVA-Armeen. Die deutlich kleinere Schlacht von Maryang San dauerte fünf Tage und sah das 3. Bataillon des Royal Australian Regiment (3 RAR) gemeinsam mit anderen Einheiten der 1. Commonwealth-Division eine zahlenmäßig überlegene PVA-Truppe von den taktisch wichtigen Standorten Kowang san (Hügel 355) und Maryang san (Hügel 317) vertreiben."
CW_Expansion_country.241.a:1 "OK"
CW_Expansion_news.241.t:0 "Erste Schlacht von Maryang-San"
