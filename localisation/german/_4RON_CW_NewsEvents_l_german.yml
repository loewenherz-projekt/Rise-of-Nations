CW_Expansion_country.472.t:0 "Fidel Castro kommt in Havanna an"
CW_Expansion_country.472.d:0 "Am 8. Januar 1959 zieht Fidel Castro triumphierend in Havanna ein, nachdem er das von den USA unterstützte Regime von General Fulgencio Batista gestürzt hatte. Castros Ankunft in der kubanischen Hauptstadt markierte einen endgültigen Sieg seiner Bewegung des 26. Juli und den Beginn seiner jahrzehntelangen Herrschaft über den Inselstaat."
