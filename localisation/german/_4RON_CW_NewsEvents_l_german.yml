CW_Expansion_country.502.t:0 "Erdbeben in Agadir erschüttert Marokko"
CW_Expansion_country.502.d:0 "Das Agadir-Erdbeben von 1960 ereignete sich am 29. Februar um 23:40 Uhr westeuropäischer Zeit nahe der Stadt Agadir im Westen Marokkos an der Atlantikküste. Trotz der moderaten Magnitude von 5,8 (Mw) führte die relativ geringe Tiefe des Erdbebens (15,0 km) zu starken Oberflächenerschütterungen mit einer maximal wahrgenommenen Intensität von X (extrem) auf der Mercalli-Skala. Zwischen 12.000 und 15.000 Menschen (etwa ein Drittel der damaligen Stadtbevölkerung) kamen ums Leben, weitere 12.000 wurden verletzt, mindestens 35.000 Menschen wurden obdachlos. Damit war das Erdbeben das verheerendste und tödlichste in der marokkanischen Geschichte. Besonders schwer betroffen waren Founty, die Kasbah, Yachech/Ihchach und die Gegend um Talborjt. Als Gründe für die Zerstörung des Erdbebens nannten Erdbebeningenieure und Seismologen den flachen Fokus des Erdbebens, die Nähe zur Hafenstadt Agadir und unzureichende Baumethoden."
CW_Expansion_country.502.a:1 "OK"
CW_Expansion_news.502.t:0 "Erdbeben in Agadir erschüttert Marokko"
CW_Expansion_news.502.d:0 "Das Agadir-Erdbeben von 1960 ereignete sich am 29. Februar um 23:40 Uhr westeuropäischer Zeit nahe der Stadt Agadir im Westen Marokkos an der Atlantikküste. Trotz der moderaten Magnitude von 5,8 (Mw) führte die relativ geringe Tiefe des Erdbebens (15,0 km) zu starken Oberflächenerschütterungen mit einer maximal wahrgenommenen Intensität von X (extrem) auf der Mercalli-Skala. Zwischen 12.000 und 15.000 Menschen (etwa ein Drittel der damaligen Stadtbevölkerung) kamen ums Leben, weitere 12.000 wurden verletzt, mindestens 35.000 Menschen wurden obdachlos. Damit war das Erdbeben das verheerendste und tödlichste in der marokkanischen Geschichte. Besonders schwer betroffen waren Founty, die Kasbah, Yachech/Ihchach und die Gegend um Talborjt. Als Gründe für die Zerstörungskraft des Erdbebens nannten Erdbebeningenieure und Seismologen den flachen Fokus, die Nähe zur Hafenstadt Agadir und unzureichende Baumethoden."
CW_Expansion_news.502.a:1 "OK"

CW_Expansion_country.504.t:0 "Absturz von Northwest Orient Airlines Flug 710"
CW_Expansion_country.504.d:0 "Northwest Orient Airlines Flug 710, eine Lockheed L-188 Electra, zerbrach während des Fluges und stürzte am 17. März 1960 in der Nähe von Cannelton, Indiana (10 Meilen östlich von Tell City, Indiana) ab. An Bord des Fluges befanden sich 57 Passagiere und sechs Besatzungsmitglieder. Es gab keine Überlebenden."
