CW_Expansion_country.154.t:0 "Freundschaftsvertrag mit Indien"
CW_Expansion_country.154.d:0 "Die Regierung Indiens einerseits und die Regierung Seiner Hoheit des Druk Gyalpo andererseits, gleichermaßen beseelt von dem Wunsch, die durch die Beendigung der Autorität der britischen Regierung in Indien entstandene Lage auf freundschaftliche Weise und auf einer soliden und dauerhaften Grundlage zu regeln und die für das Wohlergehen ihrer Völker so notwendigen freundschaftlichen und nachbarschaftlichen Beziehungen zu fördern und zu pflegen, haben beschlossen, den folgenden Vertrag zu schließen, und haben zu diesem Zweck ihre Vertreter benannt, nämlich Sri Harishwar Dayal als Vertreter der Regierung Indiens, der die volle Vollmacht hat, dem besagten Vertrag im Namen der Regierung Indiens zuzustimmen, sowie Deb Zimpon Sonam, Tobgye Dorji, Yang-Lop Sonam, Chho-Zim Thondup, Rin-Zim Tandin und Ha Drung Jigmie Palden Dorji als Vertreter der Regierung Seiner Hoheit des Druk Gyalpo, Maharadscha von Bhutan, die die volle Vollmacht haben, demselben Vertrag im Namen der Regierung Bhutans zuzustimmen."
CW_Expansion_country.154.a:1 "OK"
