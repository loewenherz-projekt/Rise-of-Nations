CW_Expansion_country.355.t:0 "Atomübung Totskoje"
CW_Expansion_country.355.d:0 "Das Atommanöver von Tozkoje war eine Militärübung der sowjetischen Armee, um defensive und offensive Kriegsführung in einem Atomkrieg zu erproben. Bei der Übung mit dem Codenamen „Schneeball“ wurde eine 40-kt-Atombombe vom Typ RDS-4 aus der Luft gezündet. Erklärtes Ziel der Operation war das militärische Training für den Durchbruch durch die stark befestigten Verteidigungslinien eines militärischen Gegners, der über Atomwaffen verfügt. Kurz nach der Atomexplosion marschierte eine Armee von 45.000 Soldaten durch das Gebiet um das Hypozentrum. Die Übung fand am 14. September 1954 um 9:33 Uhr unter dem Kommando von Marschall Georgi Schukow nördlich des Dorfes Tozkoje in der Oblast Orenburg, Russland, im Militärbezirk Südural statt. Das Epizentrum der Detonation ist durch ein Denkmal gekennzeichnet."
CW_Expansion_country.355.a:1 "OK"
