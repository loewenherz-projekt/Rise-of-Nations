#1953 Events
CW_Expansion_country.273.t:0 "Asiatische Sozialistische Konferenz"
CW_Expansion_country.273.d:0 "Die Asiatische Sozialistische Konferenz (ASC) war eine Organisation sozialistischer politischer Parteien in Asien, die von 1953 bis 1965 existierte. Sie wurde mit dem Ziel gegründet, eine panasiatische multinationale sozialistische Organisation aufzubauen, die eindeutig unabhängig von früheren europäischen Kolonialzentren und dennoch frei von den neuen Supermächten des Kalten Krieges war. Bis 1963 befand sich ihr Hauptsitz in Rangun, Burma; erster Vorsitzender und Schatzmeister der Konferenz waren die burmesischen Sozialistenführer Ba Swe bzw. Kyaw Nyein. 1956 zählten die Mitgliedsparteien der ASC zusammen rund 500.000 Mitglieder. Insgesamt fanden vier Asiatische Sozialistische Konferenzen statt: in Rangun 1953 und 1954 sowie in Bombay 1956 und 1965."
CW_Expansion_country.273.a:1 "OK"
