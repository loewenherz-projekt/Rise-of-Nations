CW_Expansion_country.271.t:0 "NSA erstellt"
CW_Expansion_country.271.d:0 "Die National Security Agency (NSA) ist ein nationaler Geheimdienst des US-Verteidigungsministeriums und untersteht dem Director of National Intelligence (DNI). Die NSA ist für die weltweite Überwachung, Sammlung und Verarbeitung von Informationen und Daten für in- und ausländische Geheimdienste und Spionageabwehr zuständig und hat sich auf die sogenannte Signalaufklärung (SIGINT) spezialisiert. Die NSA ist außerdem mit dem Schutz der US-amerikanischen Kommunikationsnetze und Informationssysteme beauftragt. Zur Erfüllung ihrer Mission setzt die NSA eine Vielzahl von Maßnahmen ein, die größtenteils im Geheimen erfolgen. Die Existenz der NSA wurde erst 1975 bekannt. Die NSA beschäftigt rund 32.000 Mitarbeiter."
CW_Expansion_country.271.a:1 "OK"
