CW_Expansion_country.270.t:0 "Operation Ivy"
CW_Expansion_country.270.d:0 "Bei der Operation Ivy wurde erstmals eine Wasserstoffbombe anstelle einer Atombombe eingesetzt. Dies geschah auf Anordnung von Präsident Harry S. Truman vom 31. Januar 1950, die USA sollten ihre Forschungen an allen Formen von Atomwaffen fortsetzen. Die Bomben wurden von der US-Atomenergiekommission und dem US-Verteidigungsministerium an Bord von Marineschiffen vorbereitet und konnten vom Kontrollschiff Estes aus ferngezündet werden."
CW_Expansion_country.270.a:1 "OK"
