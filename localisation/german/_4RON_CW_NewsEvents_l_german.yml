CW_Expansion_country.134.t:0 "Gründung von Toys R Us"
CW_Expansion_country.134.d:0 "Toys R Us ist ein US-amerikanischer Einzelhändler für Spielzeug, Kleidung und Babyartikel im Besitz von Tru Kids und verschiedenen anderen Unternehmen. Das Unternehmen wurde 1957 gegründet; sein erstes Geschäft wurde im April 1948 eröffnet. Der Hauptsitz befindet sich in Parsippany-Troy Hills, New Jersey, im Großraum New York."
