CW_Expansion_country.185.t:0 "Eröffnung des Maracana-Stadions in Rio De Janeiro"
CW_Expansion_country.185.d:0 "Das Stadion wurde 1950 als Austragungsort der FIFA-Weltmeisterschaft eröffnet, bei der Brasilien am 16. Juli 1950 im entscheidenden Spiel vor einem bis heute bestehenden Zuschauerrekord von 199.854 Zuschauern mit 1:2 gegen Uruguay verlor. 26 Mal waren 150.000 oder mehr Zuschauer vor Ort, zuletzt am 29. Mai 1983, als 155.253 Zuschauer Flamengo beim 3:0-Sieg gegen Santos sahen. 284 Mal waren mehr als 100.000 Zuschauer im Stadion. Da die Terrassenbereiche im Laufe der Zeit durch Sitzplätze ersetzt wurden und nach der Renovierung für die FIFA-Weltmeisterschaft 2014, wurde die ursprüngliche Kapazität auf aktuell 78.838 reduziert. Es ist jedoch immer noch das größte Stadion Brasiliens und das zweitgrößte Südamerikas nach dem Estadio Monumental in Peru."
CW_Expansion_country.185.a:1 "OK"
CW_Expansion_news.185.t:0 "Eröffnung des Maracana-Stadions in Rio De Janeiro"
CW_Expansion_news.185.d:0 "Das Stadion wurde 1950 für die FIFA-Weltmeisterschaft eröffnet, bei der Brasilien am 16. Juli 1950 im entscheidenden Spiel vor einem bis heute bestehenden Zuschauerrekord von 199.854 Zuschauern mit 1:2 gegen Uruguay verlor. 26 Mal waren 150.000 oder mehr Zuschauer vor Ort, zuletzt am 29. Mai 1983, als 155.253 Zuschauer Flamengo beim 3:0-Sieg gegen Santos zusahen. 284 Mal waren mehr als 100.000 Zuschauer im Stadion. Da die Terrassenbereiche im Laufe der Zeit durch Sitzplätze ersetzt wurden und nach der Renovierung für die FIFA-Weltmeisterschaft 2014, wurde die ursprüngliche Kapazität auf aktuell 78.838 reduziert. Es ist jedoch immer noch das größte Stadion Brasiliens und das zweitgrößte Südamerikas nach dem Estadio Monumental in Peru."
CW_Expansion_news.185.a:1 "OK"

CW_Expansion_country.186.t:0 "Der Koreakrieg beginnt"
CW_Expansion_country.186.d:0 "Streitkräfte des kommunistischen Nordkoreas marschieren in Südkorea ein und lösen damit den Koreakrieg aus. Die USA, die unter der Schirmherrschaft der Vereinten Nationen agieren, eilen Südkorea umgehend zur Hilfe und führen drei Jahre lang einen blutigen und frustrierenden Krieg."
CW_Expansion_country.186.a:1 "OK"
CW_Expansion_news.186.t:0 "Der Koreakrieg beginnt"
CW_Expansion_news.186.d:0 "Streitkräfte des kommunistischen Nordkoreas marschieren in Südkorea ein und lösen damit den Koreakrieg aus. Die USA eilen unter der Schirmherrschaft der Vereinten Nationen schnell zur Hilfe für Südkorea und führen drei Jahre lang einen blutigen und frustrierenden Krieg."
CW_Expansion_news.186.a:1 "OK"

CW_Expansion_country.187.t:0 "Gesetz zur Unterdrückung des Kommunismus"
CW_Expansion_country.187.d:0 "Der Suppression of Communism Act von 1950, 1976 in Internal Security Act umbenannt, war ein Gesetz der Regierung im Apartheid-Südafrika, das die Kommunistische Partei Südafrikas formell verbot und jede Partei oder Gruppe, die sich dem Kommunismus verschrieben hatte, gemäß einer einzigartig weit gefassten Definition des Begriffs verbot. Er diente auch als Grundlage für Verbote gegen Einzelpersonen und hatte in der Praxis zur Folge, dass Andersdenkende isoliert und zum Schweigen gebracht wurden."
CW_Expansion_country.187.a:1 "OK"
CW_Expansion_news.187.t:0 "Südafrika verabschiedet Gesetz zur Unterdrückung des Kommunismus"
