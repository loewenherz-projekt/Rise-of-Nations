CW_Expansion_country.417.t:0 "Westdeutschland verbietet die Kommunistische Partei"
CW_Expansion_country.417.d:0 "Die Partei erlebte nach dem Krieg im geteilten West- und Ostdeutschland eine Wiederbelebung und errang bei den ersten Bundestagswahlen 1949 Sitze. Nach der Gründung der Deutschen Demokratischen Republik in der ehemaligen sowjetischen Besatzungszone im Osten brach ihre Unterstützung jedoch ein. Die KPD wurde 1956 in Westdeutschland vom Bundesverfassungsgericht als extremistisch verboten. 1969 gründeten einige ihrer ehemaligen Mitglieder eine noch kleinere Randpartei, die Deutsche Kommunistische Partei (DKP), die bis heute legal ist. Darüber hinaus entstanden in der Folgezeit zahlreiche kleine Splittergruppen, die behaupteten, die Nachfolge der KPD anzutreten."
CW_Expansion_country.417.a:1 "OK"
