CW_Expansion_country.334.t:0 "Petrov-Affäre"
CW_Expansion_country.334.d:0 "Die Petrov-Affäre war ein Spionagevorfall während des Kalten Krieges in Australien, bei dem es um die Flucht des KGB-Offiziers Vladimir Petrov aus der sowjetischen Botschaft in Canberra im Jahr 1954 ging. Die Flucht führte zu einer königlichen Untersuchungskommission und die daraus resultierende Kontroverse trug zur Spaltung der australischen Labor Party im Jahr 1955 bei."
CW_Expansion_country.334.a:1 "OK"
