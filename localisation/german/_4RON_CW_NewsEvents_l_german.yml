CW_Expansion_country.110.t:0 "SS Heimara Waschbecken"
CW_Expansion_country.110.d:0 "Am 18. Januar 1947 stach die Heimara mit einer 86-köpfigen Besatzung und etwa 550 Passagieren von Thessaloniki in See und nahm Kurs auf Piräus. Während des griechischen Bürgerkriegs waren 36 der Passagiere politische Gefangene, die ins Exil geschickt wurden. Wegen widriger Wetterbedingungen beschloss der Kapitän, Kurs auf den Golf von Euböa zu nehmen und das gefährliche Kap Kafireas (Cavo d&#39; Oro) an der Südostspitze der Insel Euböa zu meiden. Nach einem Zwischenstopp in Chalkida, wo sie 10 Passagiere von Bord nahm, stach sie um 01:30 Uhr wieder in See. Am 19. Januar 1947 lief das Schiff gegen 4:00 Uhr morgens bei Nebel im südlichen Golf von Euböa auf ein Riff in der Nähe der Verdugia-Inseln auf, die zwischen Agia Marina (el) und Nea Styra (el) liegen. Die Kollision verursachte Schäden am Ruder und am Funkgerät sowie eine Überflutung. Nach dem Unglück dauerte es anderthalb Stunden, bis die Heimara nur eine Meile vor der Küste der Insel Kavalliani sank. Die Panik während des ungeordneten Verlassens des Schiffes, die niedrigen Temperaturen und die starken Meeresströmungen führten jedoch dazu, dass rund 400 Menschen umkamen. Mehrere Quellen sprechen von 383 Opfern, die genaue Zahl ist jedoch unbekannt, da die Zahl der an Bord befindlichen Personen nicht bestätigt wurde."
CW_Expansion_country.110.a:1 "OK"
