CW_Expansion_country.285.t:0 "Nikita Chruschtschow zum Generalsekretär gewählt"
CW_Expansion_country.285.d:0 "Als Stalin im März 1953 starb, übernahm Malenkow das Amt des Ministerpräsidenten und Ersten Sekretärs der Kommunistischen Partei. Er schien reformorientiert zu sein, denn er forderte Kürzungen der Militärausgaben und lockerte die politische Repression in der Sowjetunion und den Ostblockstaaten. Diese Maßnahmen hätten ihm zum Verhängnis werden können. Innerhalb von nur zwei Wochen hatte sein politischer Hauptgegner in der Kommunistischen Partei, Nikita Chruschtschow, eine Koalition politischer und militärischer Führer gegen Malenkow organisiert und wurde Erster Sekretär."
CW_Expansion_country.285.a:1 "OK"
