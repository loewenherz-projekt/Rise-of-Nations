CW_Expansion_country.115.t:0 "Rebellenführer im Iran gehängt"
CW_Expansion_country.115.d:0 "Am 15. Dezember 1946 marschierten iranische Truppen in Mahabad ein und sicherten es. Dort angekommen, schlossen sie die kurdische Druckerei, verboten den Kurdischunterricht und verbrannten alle kurdischen Bücher, die sie finden konnten. Schließlich wurde Qazi Muhammad am 31. März 1947 in Mahabad wegen Hochverrats gehängt. Auf Geheiß von Archie Roosevelt Jr., der argumentierte, Qazi sei aus Zweckmäßigkeit zur Zusammenarbeit mit den Sowjets gezwungen worden, drängte der US-Botschafter im Iran, George V. Allen, den Schah, Qazi oder seinen Bruder nicht hinzurichten, woraufhin dieser beruhigt wurde: „Haben Sie Angst, dass ich sie erschießen lasse? Wenn ja, können Sie beruhigt sein. Ich habe keine.“ Roosevelt berichtete später, dass der Befehl zur Tötung der Qazis wahrscheinlich erteilt wurde, „sobald unser Botschafter die Tür hinter sich geschlossen hatte“, und fügte mit Blick auf den Schah hinzu: „Ich war nie einer seiner Bewunderer.“"
CW_Expansion_country.115.a:1 "OK"
