CW_Expansion_country.462.t:0 "KLM-Flug 607-E stürzt ins Meer"
CW_Expansion_country.462.d:0 "KLM-Flug 607-E, eine Lockheed Super Constellation namens Hugo de Groot mit der Kennung PH-LKM, war ein internationaler Linienflug, der am 14. August 1958 180 Kilometer nordwestlich des Flughafens Shannon in Irland abstürzte. Alle 91 Passagiere und acht Besatzungsmitglieder starben bei dem Unfall, darunter sechs Mitglieder des ägyptischen Fechtteams (Osman Abdel Hafeez, Mohamed Ali Riad, Ahmed Sabry usw.). Das „E“ in der Flugnummer stand für die Bezeichnung eines zusätzlichen Economy-Class-Fluges, um der gestiegenen saisonalen Touristennachfrage gerecht zu werden."
CW_Expansion_country.462.a:1 "OK"
