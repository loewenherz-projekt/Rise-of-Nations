CW_Expansion_country.415.t:0 "„In God We Trust“ wird zum US-Motto"
CW_Expansion_country.415.d:0 "Am 30. Juli 1956, zwei Jahre nachdem er sich für die Aufnahme des Satzes „under God“ in den Treueschwur eingesetzt hatte, unterzeichnete Präsident [USA.GetLeader] ein Gesetz, das „In God We Trust“ offiziell zum nationalen Motto erklärte. Das Gesetz, PL 84-140, ordnete zudem an, dass der Satz auf allen amerikanischen Banknoten abgedruckt werden musste. Der Satz war seit dem Bürgerkrieg auf US-Münzen zu finden, als die religiösen Gefühle laut der historischen Vereinigung des US-Finanzministeriums ihren Höhepunkt erreichten. Eisenhowers Finanzminister George Humphrey hatte vorgeschlagen, den Satz auch auf Banknoten zu drucken."
CW_Expansion_country.415.a:1 "OK"
