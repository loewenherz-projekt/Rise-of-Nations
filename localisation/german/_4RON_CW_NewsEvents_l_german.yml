CW_Expansion_country.130.t:0 "Gründung der British Railways"
CW_Expansion_country.130.d:0 "British Railways, auch British Rail genannt, war das ehemalige nationale Eisenbahnsystem Großbritanniens und wurde durch den Transport Act von 1947 gegründet, der die Verstaatlichung der Eisenbahnen einführte. Die erste in Großbritannien mit Dampflokomotiven gebaute Eisenbahn war die 1825 eröffnete Stockton and Darlington."
CW_Expansion_country.130.a:1 "OK"
