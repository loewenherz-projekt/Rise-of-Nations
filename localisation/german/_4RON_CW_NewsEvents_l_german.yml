CW_Expansion_country.198.t:0 "Giuseppe Farina gewinnt die Formel-1-Meisterschaft"
CW_Expansion_country.198.d:0 "Giuseppe Farina war vor 70 Jahren der Sieger des ersten Formel-1-Weltmeisterschaftsrennens für Alfa Romeo in Silverstone und zudem der erste Weltmeister – so viel wissen Sie vielleicht. Aber was wissen Sie sonst noch über den Italiener? David Tremayne zeichnet das Bild eines kompromisslosen Fahrers mit einem schwierigen Erbe … Enzo Ferrari beschrieb „Nino“ Farina als „einen vollkommenen Mann, der jeder von ihm verlangten Leistung gewachsen war, ein Mann aus Stahl, innerlich und äußerlich, ein Mann, der im wahrsten Sinne des Wortes ein Rennchampion war“. Und doch betrachtete ihn Stirling Moss, der Farinas unverwechselbaren Fahrstil mit gestreckten Armen übernahm, als einen Mann, dem man im Duell nie zu nahe kommen wollte."
CW_Expansion_country.198.a:1 "OK"
