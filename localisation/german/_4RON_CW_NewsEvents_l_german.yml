CW_Expansion_country.287.t:0 "Erdbeben in Yenice-Gonen"
CW_Expansion_country.287.d:0 "Das Erdbeben von Yenice-Gönen 1953 ereignete sich am 18. März um 21:06 Uhr Ortszeit in der Provinz Çanakkale und Balıkesir in der Marmararegion im Westen der Türkei. Die Oberflächenwellenstärke betrug 7,5 und die maximale gefühlte Intensität IX (Heftig) auf der Mercalli-Skala. Es verursachte weitreichende Schäden, 1.070 Menschen kamen ums Leben, und der Schaden, dessen Reparaturwert auf 3.570.000 US-Dollar geschätzt wird, wurde auf 3.570.000 US-Dollar geschätzt."
CW_Expansion_country.287.a:1 "OK"
CW_Expansion_news.287.t:0 "Erdbeben in Yenice-Gonen"
CW_Expansion_news.287.d:0 "Das Erdbeben von Yenice-Gönen 1953 ereignete sich am 18. März um 21:06 Uhr Ortszeit in der Provinz Çanakkale und Balıkesir in der Marmararegion im Westen der Türkei. Die Oberflächenwellenstärke betrug 7,5 und die maximal gefühlte Intensität IX (Heftig) auf der Mercalli-Skala. Es richtete weitreichende Schäden an, tötete 1.070 Menschen und verursachte Schäden, deren Reparaturwert auf 3.570.000 US-Dollar geschätzt wird."
CW_Expansion_news.287.a:1 "OK"

CW_Expansion_country.288.t:0 "Polio-Impfstoff angekündigt"
CW_Expansion_country.288.d:0 "Am 26. März 1953 verkündete der amerikanische Medizinforscher Dr. Jonas Salk in einer landesweiten Radiosendung, dass er erfolgreich einen Impfstoff gegen Poliomyelitis getestet habe, das Virus, das die schwere Kinderlähmung verursacht. Im Jahr 1952 – einem Epidemiejahr der Kinderlähmung – wurden in den USA 58.000 Neuerkrankungen gemeldet, und mehr als 3.000 Menschen starben an der Krankheit. Für seinen Beitrag zur Ausrottung der Krankheit, die als „Säuglingslähmung“ bekannt ist, weil sie hauptsächlich Kinder befällt, wurde Dr. Salk als der größte Arzt und Wohltäter seiner Zeit gefeiert."
CW_Expansion_country.288.a:1 "OK"
