CW_Expansion_country.258.t:0 "Catalina-Affäre"
CW_Expansion_country.258.d:0 "Die Catalina-Affäre war eine militärische Konfrontation und diplomatische Krise während des Kalten Krieges im Juni 1952, bei der Kampfjets der sowjetischen Luftwaffe zwei schwedische Flugzeuge über internationalen Gewässern in der Ostsee abschossen. Das erste abgeschossene Flugzeug war eine unbewaffnete Tp 79 der schwedischen Luftwaffe, ein Derivat der Douglas DC-3, die für die National Defence Radio Establishment (Försvarets radioanstalt, FRA) Funk- und Radarsignale sammelte. Keines der achtköpfigen Besatzungsmitglieder überlebte. Das zweite abgeschossene Flugzeug war eine Tp 47 der schwedischen Luftwaffe, ein Catalina-Flugboot, das an der Such- und Rettungsaktion nach der vermissten DC-3 beteiligt war. Die fünfköpfige Besatzung der Catalina konnte gerettet werden. Die Sowjetunion bestritt öffentlich jede Beteiligung bis zu ihrer Auflösung im Jahr 1991. Beide Flugzeuge wurden 2003 geortet; die DC-3 wurde geborgen."
CW_Expansion_country.258.a:1 "OK"
