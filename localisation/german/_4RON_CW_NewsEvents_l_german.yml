CW_Expansion_country.492.t:0 "10. Jahrestag der Volksrepublik China"
CW_Expansion_country.492.d:0 "Die Feierlichkeiten zum zehnten Jahrestag der Gründung der Volksrepublik China fanden am 1. Oktober 1959 statt. Die Hauptveranstaltung fand auf dem Platz des Himmlischen Friedens in Peking statt. Am Vorabend war ein großes Bankett mit zahlreichen internationalen Würdenträgern organisiert worden."
