CW_Expansion_country.519.t:0 "Attentat auf den venezolanischen Präsidenten"
CW_Expansion_country.519.d:0 "Am 24. Juni 1960 detonierte eine in einem geparkten Fahrzeug platzierte Autobombe, als Betancourts Präsidentenwagen den Paseo Los Próceres, eine der Hauptstraßen von Caracas, entlangfuhr. Betancourt erlitt bei dem Attentat schwere Verbrennungen, der Fahrer wurde schwer verletzt und sein Sicherheitschef kam ums Leben."
