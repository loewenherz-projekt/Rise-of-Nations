CW_Expansion_country.225.t:0 "König Georg VI. eröffnet das Festival of Britain"
CW_Expansion_country.225.d:0 "Am 3. Mai 1951 eröffnete König Georg VI. offiziell das Festival of Britain am Londoner South Bank, eine Messe und Ausstellung, die die Errungenschaften Großbritanniens im Laufe der Geschichte feierte und den ganzen Sommer über 8,5 Millionen Besucher anzog. Mit einem Budget von 12 Millionen Pfund fand das Festival an der South Bank statt, wo sich die neu erbaute Royal Festival Hall befand, die von Sir Robert Matthew, Leslie Martin und Sir Hubert Bennett entworfen wurde. 1967 kam die Queen Elizabeth Hall hinzu, der langjährige Austragungsort des Finales des jährlichen Musikwettbewerbs des ROSL. Tickets für das kürzlich renovierte Finale können Sie hier buchen."
CW_Expansion_country.225.a:1 "OK"
