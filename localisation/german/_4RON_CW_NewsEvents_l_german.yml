CW_Expansion_country.180.t:0 "Jordanien annektiert offiziell das Westjordanland"
CW_Expansion_country.180.d:0 "Der arabische Staat, dessen Gründung im UN-Teilungsplan von 1947 vorgesehen war, wurde nie verwirklicht, und das Westjordanland wurde am 24. April 1950 formell von Jordanien annektiert, obwohl diese Annexion nur von Großbritannien und Pakistan anerkannt wurde."
