CW_Expansion_country.131.t:0 "Niederländisch-indonesischer Waffenstillstand"
CW_Expansion_country.131.d:0 "Renville-Abkommen (17. Januar 1948): Ein Vertrag zwischen den Niederlanden und der Republik Indonesien, der auf dem US-Kriegsschiff Renville geschlossen wurde, das im Hafen von Djakarta (heute Jakarta) vor Anker lag. Es handelte sich um einen – wenn auch erfolglosen – Versuch, Streitigkeiten zu schlichten, die durch ein früheres niederländisch-indonesisches Abkommen, das Linggadjati-Abkommen von 1946, nicht beigelegt worden waren."
CW_Expansion_country.131.a:1 "OK"
