CW_Expansion_country.476.t:0 "MS Hans Hedtoft sinkt"
CW_Expansion_country.476.d:0 "Die MS Hans Hedtoft war ein dänisches Passagierschiff, das am 30. Januar 1959 auf seiner Jungfernfahrt vor der Küste Westgrönlands mit einem Eisberg kollidierte und sank. Das einzige Wrackteil, das jemals gefunden wurde, war ein Rettungsring. Bis 2022 war sie das letzte bekannte Schiff, das von einem Eisberg versenkt wurde und Opfer forderte."
