CW_Expansion_country.175.t:0 "Chinesisch-sowjetischer Vertrag zur gegenseitigen Verteidigung"
CW_Expansion_country.175.d:0 "Die Sowjetunion und die Volksrepublik China, die beiden größten kommunistischen Nationen der Welt, geben die Unterzeichnung eines Vertrags zur gegenseitigen Verteidigung und Unterstützung bekannt. Die Verhandlungen zu diesem Vertrag fanden in Moskau zwischen den chinesischen Staatschefs Mao Zedong und Zhou En-lai sowie dem sowjetischen Ministerpräsidenten Josef Stalin und Außenminister Andrej Wyschinski statt. Die Vertragsbedingungen sahen vor, dass die Sowjets der VR China einen Kredit in Höhe von 300 Millionen Dollar gewähren. Außerdem wurde der Sowjetunion vorgeschrieben, den Chinesen die Kontrolle über eine wichtige Eisenbahnstrecke sowie die Städte Port Arthur und Dairen in der Mandschurei zurückzugeben, die gegen Ende des Zweiten Weltkriegs von russischen Streitkräften eingenommen worden waren. Der Abschnitt zur gegenseitigen Verteidigung des Abkommens betraf in erster Linie etwaige künftige Aggressionen Japans und „jeder anderen direkt oder indirekt mit Japan verbundenen Staaten“. Zhou En-lai erklärte stolz, durch den Zusammenschluss der beiden kommunistischen Nationen sei eine Streitmacht entstanden, die „unmöglich zu besiegen“ sei."
CW_Expansion_country.175.a:1 "OK"
