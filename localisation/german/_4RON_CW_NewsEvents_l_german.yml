CW_Expansion_country.430.t:0 "Nikita Chruschtschow äußert berühmten Satz"
CW_Expansion_country.430.d:0 "„Wir werden euch begraben!“ ist ein Satz, den der sowjetische Erste Sekretär Nikita Chruschtschow am 18. November 1956 bei einem Empfang in der polnischen Botschaft in Moskau vor westlichen Botschaftern sprach. Der Satz wurde ursprünglich von Chruschtschows persönlichem Dolmetscher Viktor Suchodrew ins Englische übersetzt."
