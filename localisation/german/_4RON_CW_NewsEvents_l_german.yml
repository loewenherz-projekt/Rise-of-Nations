CW_Expansion_country.234.t:0 "Der Fänger im Roggen – Erstveröffentlichung"
CW_Expansion_country.234.d:0 "JD Salingers einziger Roman in voller Länge, „Der Fänger im Roggen“, erscheint am 16. Juli 1951 bei Little, Brown. Das Buch über einen verwirrten Teenager, der von der Erwachsenenwelt desillusioniert ist, wird sofort ein Erfolg und wird jahrzehntelang an den High Schools gelehrt."
