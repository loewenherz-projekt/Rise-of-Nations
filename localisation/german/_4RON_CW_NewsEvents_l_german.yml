CW_Expansion_country.222.t:0 "Operation Ripper"
CW_Expansion_country.222.d:0 "Operation Ripper, auch bekannt als die Vierte Schlacht um Seoul, war eine Militäroperation der Vereinten Nationen (UN), die von der 8. US-Armee unter General Matthew Ridgway während des Koreakrieges konzipiert wurde. Ziel der Operation war die Vernichtung möglichst vieler Truppen der chinesischen Freiwilligen Volksarmee (PVA) und der Koreanischen Volksarmee (KPA) rund um Seoul und die Städte Hongch&#39;on, 80 Kilometer östlich von Seoul, und Chuncheon, 24 Kilometer weiter nördlich. Ziel der Operation war es außerdem, UN-Truppen bis zum 38. Breitengrad zu bringen. Sie folgte unmittelbar auf Operation Killer, eine achttägige UN-Offensive, die am 28. Februar endete und die PVA/KPA-Truppen nördlich des Han-Flusses zurückdrängen sollte. Die Operation begann am 6. März 1951 mit dem I. und IX. Korps der USA im Westen nahe Seoul und Hoengsong und dem X. Korps der USA und dem III. Korps der Armee der Republik Korea (ROK) im Osten, um die Idaho-Linie zu erreichen, einen Bogen, dessen Scheitelpunkt direkt südlich des 38. Breitengrads in Südkorea liegt."
CW_Expansion_country.222.a:1 "OK"
