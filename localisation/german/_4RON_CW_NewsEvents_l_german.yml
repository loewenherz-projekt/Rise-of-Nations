CW_Expansion_country.324.t:0 "Stapellauf der USS Nautilius"
CW_Expansion_country.324.d:0 "Die USS Nautilus war das erste einsatzfähige Atom-U-Boot der Welt und das erste U-Boot, das am 3. August 1958 eine Unterwasserdurchquerung des Nordpols absolvierte. Ihr erster Kommandant war Eugene „Dennis“ Wilkinson, ein weithin respektierter Marineoffizier, der viele der Protokolle der heutigen Atommarine der USA prägte und während und nach seinem Militärdienst eine ruhmreiche Karriere hinlegte."
CW_Expansion_country.324.a:1 "OK"
