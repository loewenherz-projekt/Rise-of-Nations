CW_Expansion_country.483.t:0 "Kronprinz Akihito heiratet Bürgerliche"
CW_Expansion_country.483.d:0 "1959 heiratete der japanische Kaiser Akihito, der damalige Kronprinz, eine Bürgerliche und beendete damit eine 1500 Jahre alte Tradition. Die Liebesgeschichte von Kaiser Akihito und Kaiserin Michiko, die sich beim Tennisspielen kennenlernten, wurde als „Tennisplatz-Romanze“ bezeichnet. Der 85-jährige Kaiser trat heute nach drei Jahrzehnten auf dem Thron aus Altersgründen und seines nachlassenden Gesundheitszustands zurück."
CW_Expansion_country.483.a:1 "OK"
