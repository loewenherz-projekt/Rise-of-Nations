CW_Expansion_country.369.t:0 "Claudette Colvin weigert sich, ihren Sitzplatz aufzugeben"
CW_Expansion_country.369.d:0 "Claudette Colvin wurde 1955 verhaftet, weil sie sich weigerte, ihren Sitzplatz in einem Bus in Montgomery, Alabama, für einen Weißen freizugeben. Dieser Akt des Widerstands geschah neun Monate, bevor Rosa Parks dasselbe tat und damit einen Wendepunkt in der Bürgerrechtsbewegung markierte."
