CW_Expansion_country.197.t:0 "Massaker von Hill 303"
CW_Expansion_country.197.d:0 "Das Massaker von Hügel 303 war ein Kriegsverbrechen, das sich in den ersten Tagen des Koreakrieges am 17. August 1950 auf einem Hügel oberhalb von Waegwan in der Republik Korea ereignete. 41 Kriegsgefangene der US-Armee wurden während einer der Gefechte der Schlacht um Busan von Truppen der nordkoreanischen Volksarmee ermordet."
