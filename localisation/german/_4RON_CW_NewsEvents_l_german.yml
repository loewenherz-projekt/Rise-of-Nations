CW_Expansion_country.214.t:0 "Winter des Terrors"
CW_Expansion_country.214.d:0 "Der Winter des Terrors war ein dreimonatiger Zeitraum im Winter 1950/51, in dem sich in den Alpen entlang der österreichisch-schweizerischen Grenze eine beispiellose Anzahl von Lawinen ereignete. Die Serie von 649 Lawinen tötete über 265 Menschen und verursachte große Schäden an Wohnhäusern und anderen von Menschenhand geschaffenen Gebäuden."
