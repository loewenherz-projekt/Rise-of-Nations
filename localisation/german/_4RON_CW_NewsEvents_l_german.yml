CW_Expansion_country.265.t:0 "Abdankung des jordanischen Königs Talal"
CW_Expansion_country.265.d:0 "Abdullah strebte 1946 die Unabhängigkeit an, und das Emirat wurde zum Haschemitischen Königreich Jordanien. Talal wurde Kronprinz, als sein Vater ihn zum König von Jordanien ernannte. Abdullah wurde 1951 in Jerusalem ermordet, und Talal wurde König. Talals bedeutendste Leistung als König ist die Einführung der modernen jordanischen Verfassung im Jahr 1952, die sein Königreich zu einer konstitutionellen Monarchie machte. Er regierte weniger als dreizehn Monate, bis er vom Parlament zur Abdankung gezwungen wurde, da er an einer psychischen Erkrankung litt, die als Schizophrenie bezeichnet wurde. Talal verbrachte den Rest seines Lebens in einem Sanatorium in Istanbul und starb dort am 7. Juli 1972. Sein Nachfolger wurde sein ältester Sohn Hussein."
CW_Expansion_country.265.a:1 "OK"
CW_Expansion_news.265.t:0 "König Talal von Jordanien dankt ab"
