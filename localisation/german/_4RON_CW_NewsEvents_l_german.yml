CW_Expansion_country.142.t:0 "Deutsche Mark wird offizielles Zahlungsmittel"
CW_Expansion_country.142.d:0 "Die Deutsche Mark war von 1948 bis 1990 die offizielle Währung Westdeutschlands und später des vereinten Deutschlands von 1990 bis zur Einführung des Euro im Jahr 2002. Im Englischen wurde sie üblicherweise „Deutschmark“ genannt. Eine Deutsche Mark war in 100 Pfennige unterteilt."
