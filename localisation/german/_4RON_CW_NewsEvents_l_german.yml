CW_Expansion_news.173.a:1 "OK"

CW_Expansion_country.174.t:0 "Stasi in Ostdeutschland gegründet"
CW_Expansion_country.174.d:0 "Am 8. Februar 1950 wurde in Ostdeutschland das Ministerium für Staatssicherheit, kurz Stasi, gegründet. Die Stasi wollte „alles über jeden wissen“. Ihr Jahresbudget wurde auf rund eine Milliarde Dollar geschätzt."
