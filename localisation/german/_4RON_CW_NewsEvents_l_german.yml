CW_Expansion_country.448.t:0 "Windscale-Feuer"
CW_Expansion_country.448.d:0 "Der Brand im Windscale-Kraftwerk vom 10. Oktober 1957 war der schlimmste Atomunfall in der Geschichte Großbritanniens und einer der schlimmsten weltweit. Auf der Internationalen Bewertungsskala für nukleare Ereignisse wurde er mit Stufe 5 von 7 bewertet. Der Brand ereignete sich in Block 1 des aus zwei Reaktoren bestehenden Windscale-Kraftwerks an der Nordwestküste Englands in Cumberland (heute Sellafield, Cumbria). Die beiden graphitmoderierten Reaktoren, damals „Piles“ genannt, waren im Rahmen des britischen Atombombenprojekts der Nachkriegszeit gebaut worden. Windscale-Kraftwerk Nr. 1 ging im Oktober 1950 in Betrieb, Kraftwerk Nr. 2 folgte im Juni 1951."
CW_Expansion_country.448.a:1 "OK"
