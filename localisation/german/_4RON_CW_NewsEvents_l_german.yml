CW_Expansion_country.517.t:0 "Unblutiger Militärputsch"
CW_Expansion_country.517.d:0 "Der türkische Staatsstreich von 1960 war der erste Staatsstreich in der Republik Türkei. Er fand am 27. Mai 1960 statt. Der Putsch wurde von einer Gruppe 38 junger türkischer Offiziere durchgeführt, die außerhalb der militärischen Befehlskette agierten. Bis zum Putsch wurden die Offiziere de facto von Cemal Madanoğlu angeführt. Nach einer Drohung von Ragıp Gümüşpala, er würde den Putsch niederschlagen, wenn dieser nicht von jemandem mit einem höheren militärischen Rang als er selbst angeführt würde, setzten die Offiziere General Cemal Gürsel als ihren Anführer ein. Der Putsch richtete sich gegen die demokratisch gewählte Regierung der Demokratischen Partei und führte schließlich zur Hinrichtung ihres Premierministers Adnan Menderes sowie zweier seiner Minister, Fatin Rüştü Zorlu und Hasan Polatkan."
CW_Expansion_country.517.a:1 "OK"
