CW_Expansion_country.350.t:0 "Italienische Expedition zum K2"
CW_Expansion_country.350.d:0 "Am 31. Juli 1954 erreichten die italienischen Bergsteiger Achille Compagnoni und Lino Lacedelli als erste Menschen den Gipfel des K2, des zweithöchsten Berges der Welt nach dem Mount Everest, der im Jahr zuvor erstmals bestiegen worden war. Die Expedition wurde von Ardito Desio geleitet."
