CW_Expansion_country.290.t:0 "Tornado-Ausbruch in Waco"
CW_Expansion_country.290.d:0 "Eine tödliche Serie von mindestens 33 Tornados traf vom 9. bis 11. Mai 1953 mindestens zehn verschiedene US-Bundesstaaten. Von Minnesota im Norden bis Texas im Süden traten täglich Tornados auf. Der stärkste und tödlichste Tornado war ein mächtiger F5-Tornado, der am 11. Mai Waco, Texas, traf und 114 der 144 Todesopfer forderte. Neben dem Goliad-Tornado von 1902 war er der tödlichste Tornado in der Geschichte von Texas und steht an elfter Stelle der tödlichsten Tornados in der Geschichte der USA. Die Winde des Tornados zerstörten mehr als 600 Häuser, 1.000 andere Gebäude und über 2.000 Fahrzeuge. 597 Menschen wurden verletzt, und viele Überlebende mussten mehr als 14 Stunden auf Rettung warten. Die Zerstörung widerlegte den Mythos, dass Waco aufgrund der geografischen Lage vor Tornados verschont geblieben sei. Zusammen mit anderen tödlichen Tornados im Jahr 1953 trug die Katastrophe von Waco maßgeblich zum Verständnis des Zusammenhangs zwischen Tornados und Radar-Echos bei. Sie führte auch zu der Forderung nach verbesserten Zivilschutzsystemen, dem Aufbau von Wetterradarnetzen und einer verbesserten Kommunikation zwischen Beteiligten wie Meteorologen, lokalen Behörden und der Öffentlichkeit."
CW_Expansion_country.290.a:1 "OK"
