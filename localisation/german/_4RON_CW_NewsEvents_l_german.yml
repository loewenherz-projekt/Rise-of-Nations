CW_Expansion_country.318.t:0 "Rede zum Thema „Atome für den Frieden“"
CW_Expansion_country.318.d:0 "Präsident [USA.GetLeader] war entschlossen, das „furchtbare Atomdilemma“ zu lösen, indem er einen Weg fand, wie die „wundersame Erfindungsgabe des Menschen“ nicht seinem Tod, sondern seinem Leben geweiht werden könnte. In seiner Rede „Atome für den Frieden“ vor der Generalversammlung der Vereinten Nationen am 8. Dezember 1953 versuchte Präsident Eisenhower, dieses schreckliche Problem zu lösen, indem er ein Mittel vorschlug, um das Atom von einer Plage in einen Segen für die Menschheit zu verwandeln."
CW_Expansion_country.318.a:1 "OK"
