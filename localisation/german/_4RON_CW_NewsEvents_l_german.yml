CW_Expansion_country.159.t:0 "Vertrag von Den Haag"
CW_Expansion_country.159.d:0 "Der Vertrag von Den Haag (auch bekannt als Vertrag von Den Haag) wurde am 27. Dezember 1949 zwischen Vertretern Indonesiens und der Niederlande unterzeichnet. Gemäß den Vertragsbedingungen gewährten die Niederlande Indonesien mit Ausnahme Westindiens die Unabhängigkeit. Das Abkommen begründete offiziell die Niederländisch-Indonesische Union, wodurch Indonesien in eine Föderation umgewandelt wurde."
CW_Expansion_country.159.a:1 "OK"
