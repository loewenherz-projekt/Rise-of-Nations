CW_Expansion_country.493.t:0 "Twilight Zone feiert Premiere auf CBS"
CW_Expansion_country.493.d:0 "The Twilight Zone (in den letzten beiden Staffeln als Twilight Zone vermarktet) ist eine US-amerikanische Science-Fiction-Horror-Anthologie-Fernsehserie, die von Rod Serling kreiert und präsentiert wurde und vom 2. Oktober 1959 bis zum 19. Juni 1964 fünf Staffeln lang auf CBS lief. Jede Folge präsentiert eine eigenständige Geschichte, in der die Charaktere mit oft verstörenden oder ungewöhnlichen Ereignissen konfrontiert werden, eine Erfahrung, die als Eintritt in die „Twilight Zone“ beschrieben wird, oft mit einem überraschenden Ende und einer Moral. Obwohl die Serie überwiegend Science-Fiction ist, tendieren die paranormalen und kafkaesken Ereignisse der Serie in Richtung Fantasy und Horror. Der von der Serie inspirierte Begriff „Twilight Zone“ wird verwendet, um surreale Erlebnisse zu beschreiben."
CW_Expansion_country.493.a:1 "OK"
