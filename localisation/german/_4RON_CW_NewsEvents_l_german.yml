### Pandemics

ron_diseasesnews.1.t:0 "Spanische Grippe"
ron_diseasesnews.1.d:0 "Die Spanische Grippe, auch bekannt als Grippepandemie von 1918, war eine ungewöhnlich tödliche Grippepandemie, die durch das Influenza-A-Virus H1N1 ausgelöst wurde. Sie dauerte von Februar 1918 bis April 1920 und infizierte in vier aufeinanderfolgenden Wellen 500 Millionen Menschen – etwa ein Drittel der damaligen Weltbevölkerung. Die Zahl der Todesopfer wird auf 17 bis 50 Millionen geschätzt, möglicherweise sogar auf 100 Millionen. Damit handelte es sich um eine der tödlichsten Pandemien der Menschheitsgeschichte."
ron_diseasesnews.1.a:1 "Beunruhigend ..."

ron_diseasesnews.2.t:0 "Influenza Pandemie"
ron_diseasesnews.2.d:0 "Die Influenzapandemie von 1957–1958, auch bekannt als Asiatische Grippe, war eine globale Pandemie des Influenza-A-Virus Subtyp H2N2, die ihren Ursprung in Guizhou, China, hatte. Eine Studie aus dem Jahr 2016 schätzte die Zahl der durch die Pandemie von 1957–1958 verursachten Todesfälle weltweit auf 1,1 Millionen."
ron_diseasesnews.2.a:1 "Beunruhigend ..."

ron_diseasesnews.3.t:0 "Cholera-Pandemie"
ron_diseasesnews.3.d:0 "Die Cholerapandemie von 1961–1975 (auch als siebte Cholerapandemie bekannt) war der siebte große Choleraausbruch und ereignete sich hauptsächlich zwischen 1961 und 1975; der betroffene Stamm ist bis heute vorhanden. Diese Pandemie, die von dem Stamm namens El Tor ausging, begann 1961 in Indonesien und breitete sich bis 1963 nach Bangladesch aus. 1964 erreichte sie Indien und 1966 die Sowjetunion. Im Juli 1970 gab es einen Ausbruch in Odessa und 1972 gab es Berichte über Ausbrüche in Baku, aber die Sowjetunion unterdrückte diese Informationen. Die Krankheit erreichte 1973 von Nordafrika aus Italien. In Japan und im Südpazifik kam es Ende der 1970er Jahre zu einigen Ausbrüchen. 1971 lag die Zahl der weltweit gemeldeten Fälle bei 155.000. 1991 waren es bereits 570.000. Die Ausbreitung der Krankheit wurde durch moderne Transportmöglichkeiten und Massenmigration begünstigt. Die Sterblichkeitsraten sanken jedoch deutlich, als die Regierungen moderne Heil- und Präventionsmaßnahmen einführten. Die übliche Sterblichkeitsrate von 50 % sank in den 1980er Jahren auf 10 % und in den 1990er Jahren auf unter 3 %."
ron_diseasesnews.3.a:1 "Beunruhigend ..."

ron_diseasesnews.4.t:0 "Schweinegrippe-Pandemie"
ron_diseasesnews.4.d:0 "Die Schweinegrippe-Pandemie 2009 dauerte etwa 19 Monate, von Januar 2009 bis August 2010. Sie war die zweite von zwei Pandemien mit dem H1N1-Influenzavirus (die erste war die Spanische Grippe von 1918–1920). Das Virus wurde erstmals im April 2009 beschrieben und schien ein neuer Stamm von H1N1 zu sein, der aus einer vorherigen dreifachen Neukombination von Vogel-, Schweine- und menschlichen Grippeviren resultierte, die sich weiter mit einem eurasischen Schweinegrippevirus kombinierten, was zum Begriff „Schweinegrippe“ führte."
ron_diseasesnews.4.a:1 "Beunruhigend ..."

ron_diseasesnews.5.t:0 "Ebola-Epidemie"
ron_diseasesnews.5.d:0 "Die westafrikanische Ebola-Virusepidemie (2013–2016) war der bislang größte Ausbruch der Ebola-Viruserkrankung (EVD). Sie forderte in der Region, vor allem in Guinea, Liberia und Sierra Leone, zahlreiche Todesopfer und führte zu sozioökonomischen Verwerfungen. Die ersten Fälle wurden im Dezember 2013 in Guinea registriert; später breitete sich die Krankheit auf die benachbarten Länder Liberia und Sierra Leone aus, während es auch anderswo zu kleineren Ausbrüchen kam. Die Krankheit verursachte eine erhebliche Sterblichkeitsrate, die anfangs beträchtlich war, während sie unter hospitalisierten Patienten bei 57–59 % lag. Endgültig belief sich die Zahl der Infizierten auf 28.616, darunter 11.310 Todesfälle, was einer Letalitätsrate von 40 % entspricht. Kleinere Ausbrüche ereigneten sich in Nigeria und Mali, und in den USA und Spanien kam es zu Sekundärinfektionen von medizinischem Personal. Zudem wurden vereinzelte Fälle im Senegal, Großbritannien und Italien registriert. Die Zahl der Fälle erreichte im Oktober 2014 ihren Höhepunkt und begann dann nach der Bereitstellung erheblicher internationaler Ressourcen allmählich zu sinken. Bis zum 8. Mai 2016 meldeten die Weltgesundheitsorganisation (WHO) und die jeweiligen Regierungen insgesamt 28.646 Verdachtsfälle und 11.323 Todesfälle (39,5 %). Die WHO ist jedoch der Ansicht, dass dies das Ausmaß des Ausbruchs erheblich unterschätzt."
ron_diseasesnews.5.a:1 "Beunruhigend ..."

ron_diseasesnews.6.t:0 "Covid-19 Pandemie"
ron_diseasesnews.6.d:0 "Die COVID-19-Pandemie, auch bekannt als Coronavirus-Pandemie, ist eine anhaltende Pandemie der Coronavirus-Krankheit 2019 (COVID-19), die durch das Schwere Akute Respiratorische Syndrom Coronavirus 2 (SARS-CoV-2) verursacht wird. Die Krankheit wurde erstmals im Dezember 2019 in Wuhan, Hubei, China, diagnostiziert. Der Ausbruch wurde im Januar 2020 von der Weltgesundheitsorganisation (WHO) zu einer internationalen gesundheitlichen Notlage erklärt und im März 2020 als Pandemie anerkannt. Bis zum 5. Oktober 2020 wurden weltweit mehr als 35,3 Millionen Fälle gemeldet, obwohl die tatsächliche Zahl der Fälle vermutlich deutlich höher ist. Ein zuverlässigerer Indikator für die Ausbreitung der Fälle sind die mehr als 1,03 Millionen Todesfälle, die auf COVID-19 zurückgeführt werden."
ron_diseasesnews.6.a:1 "Beunruhigend ..."

ron_diseasesnews.7.t:0 "HIV/AIDS-Epidemie weltweit"
ron_diseasesnews.7.d:0 "HIV/AIDS (Humanes Immundefizienz-Virus) wird von manchen Autoren als globale Pandemie betrachtet. Die WHO verwendet jedoch aktuell den Begriff „globale Epidemie“, um HIV zu beschreiben. Im Jahr 2018 waren weltweit etwa 37,9 Millionen Menschen mit HIV infiziert. Im Jahr 2018 gab es etwa 770.000 Todesfälle durch AIDS. Die Global Burden of Disease Study aus dem Jahr 2015, ein in The Lancet veröffentlichter Bericht, schätzte, dass die weltweite Inzidenz von HIV-Infektionen 1997 mit 3,3 Millionen pro Jahr ihren Höhepunkt erreichte. Die weltweite Inzidenz sank von 1997 bis 2005 rapide auf etwa 2,6 Millionen pro Jahr, blieb von 2005 bis 2015 jedoch stabil."
ron_diseasesnews.7.a:1 "Beunruhigend ..."


### Economic Crisis

ron_economicnews.x.t:0 ""
ron_economicnews.x.d:0 ""
ron_economicnews.x.a:1 "Beunruhigend ..."

ron_economicnews.1.t:0 "Panik von 1901"
ron_economicnews.1.d:0 "Die Panik von 1901 war der erste Börsencrash an der New Yorker Börse. Sie wurde teilweise durch den Kampf zwischen E. H. Harriman, Jacob Schiff und J. P. Morgan/James J. Hill um die finanzielle Kontrolle der Northern Pacific Railway verursacht. Die Aktienblockade wurde von James Stillman und William Rockefellers First National City Bank orchestriert, die mit Geldern von Standard Oil finanziert wurde. Nach einem Kompromiss gründeten die Mogule die Northern Securities Company. Infolge der Panik wurden Tausende von Kleinanlegern ruiniert."
ron_economicnews.1.a:1 "Beunruhigend ..."

ron_economicnews.2.t:0 "Panik von 1907"
ron_economicnews.2.d:0 "Die Panik von 1907 – auch bekannt als Bankenpanik von 1907 oder Knickerbocker-Krise – war eine dreiwöchige Finanzkrise in den USA ab Mitte Oktober, als die New Yorker Börse gegenüber ihrem Höchststand des Vorjahres um fast 50 % fiel. Die Panik entstand, da dies mitten in einer Wirtschaftsrezession geschah, und es kam zu zahlreichen Anstürmen auf Banken und Treuhandgesellschaften. Die Panik von 1907 breitete sich schließlich im ganzen Land aus, als viele staatliche und lokale Banken und Unternehmen Insolvenz anmeldeten. Hauptursachen für den Ansturm waren ein Rückgang der Marktliquidität bei einigen New Yorker Banken und ein Vertrauensverlust der Einleger, der durch unregulierte Nebenwetten in sogenannten Bucket Shops noch verschärft wurde. Auslöser der Panik war der gescheiterte Versuch im Oktober 1907, den Markt für Aktien der United Copper Company zu monopolisieren. Als dieses Angebot scheiterte, erlitten die Banken, die dem Cornering-System Geld geliehen hatten, einen Ansturm auf die angeschlossenen Banken und Trusts, der sich später auf diese ausweitete und eine Woche später zum Zusammenbruch der Knickerbocker Trust Company – New Yorks drittgrößtem Trust – führte. Der Zusammenbruch der Knickerbocker verbreitete Angst in den Trusts der Stadt, da Regionalbanken Reserven von New Yorker Banken abzogen. Panik breitete sich im ganzen Land aus, da unzählige Menschen Einlagen von ihren Regionalbanken abzogen. Es handelte sich um den achtgrößten Einbruch in der Geschichte des US-Aktienmarkts."
ron_economicnews.2.a:1 "Beunruhigend ..."

ron_economicnews.3.t:0 "Depression von 1920"
ron_economicnews.3.d:0 "Die Depression von 1920–1921 war eine scharfe deflationäre Rezession in den Vereinigten Staaten, Großbritannien und anderen Ländern, die 14 Monate nach dem Ende des Ersten Weltkriegs begann. Sie dauerte von Januar 1920 bis Juli 1921. Das Ausmaß der Deflation war nicht nur enorm, sondern auch im Verhältnis zum damit einhergehenden Rückgang der realen Wirtschaftsleistung enorm. Unmittelbar nach Kriegsende setzte eine zweijährige Rezession ein, die die Integration von Millionen von Veteranen in die Wirtschaft erschwerte. Die Wirtschaft begann zu wachsen, hatte aber noch nicht alle Anpassungen des Übergangs von einer Kriegs- zu einer Friedenswirtschaft abgeschlossen. Als Faktoren, die zum Abschwung beitrugen, wurden die heimkehrenden Truppen identifiziert, die einen Anstieg der zivilen Erwerbsbevölkerung und Probleme bei der Integration der Veteranen verursachten, ein Rückgang der Gewerkschaftskämpfe, Änderungen in der Fiskal- und Geldpolitik sowie veränderte Preiserwartungen."
ron_economicnews.3.a:1 "Beunruhigend ..."

ron_economicnews.4.t:0 "Weltwirtschaftskrise von 1929"
ron_economicnews.4.d:0 "Die Große Depression war eine schwere weltweite Wirtschaftskrise, die sich hauptsächlich in den 1930er Jahren ereignete und in den Vereinigten Staaten ihren Anfang nahm. Der Zeitpunkt der Großen Depression variierte weltweit; in den meisten Ländern begann sie 1929 und dauerte bis in die späten 1930er Jahre. Sie war die längste, tiefste und am weitesten verbreitete Depression des 20. Jahrhunderts. Die Große Depression wird häufig als Beispiel dafür herangezogen, wie stark die Weltwirtschaft schrumpfen kann."
ron_economicnews.4.a:1 "Beunruhigend ..."

ron_economicnews.5.t:0 "Wall-Street-Crash von 1929"
ron_economicnews.5.d:0 "Der Wall-Street-Crash von 1929, auch bekannt als der Große Crash, war ein schwerer amerikanischer Börsencrash im Herbst 1929. Er begann im September und endete Ende Oktober mit dem Einbruch der Aktienkurse an der New Yorker Börse. Betrachtet man das gesamte Ausmaß und die Dauer seiner Nachwirkungen, war es der verheerendste Börsencrash in der Geschichte der Vereinigten Staaten. Der Crash, der auf den Crash der Londoner Börse im September folgte, markierte den Beginn der Weltwirtschaftskrise."
ron_economicnews.5.a:1 "Beunruhigend ..."

ron_economicnews.6.t:0 "Energiekrise der 1970er Jahre"
ron_economicnews.6.d:0 "Die Energiekrise der 1970er Jahre ereignete sich, als die westliche Welt, insbesondere die USA, Kanada, Westeuropa, Australien und Neuseeland, mit erheblichen realen und vermeintlichen Ölengpässen sowie hohen Preisen konfrontiert war. Die beiden schlimmsten Krisen dieser Zeit waren die Ölkrise von 1973 und die Energiekrise von 1979, als der Jom-Kippur-Krieg und die iranische Revolution zu Unterbrechungen der Ölexporte im Nahen Osten führten."
ron_economicnews.6.a:1 "Beunruhigend ..."

ron_economicnews.7.t:0 "OPEC-Ölpreisschock"
ron_economicnews.7.d:0 "Die Ölkrise von 1973 begann im Oktober 1973, als die Mitglieder der Organisation Arabischer Erdölexportierender Länder ein Ölembargo verhängten. Das Embargo richtete sich gegen Länder, die Israel während des Jom-Kippur-Krieges unterstützten. Die ersten betroffenen Länder waren Kanada, Japan, die Niederlande, Großbritannien und die USA. Später wurde das Embargo auch auf Portugal, Rhodesien und Südafrika ausgeweitet. Bis zum Ende des Embargos im März 1974 war der Ölpreis weltweit um fast 300 % gestiegen, von 3 USD pro Barrel auf fast 12 USD; die US-Preise waren deutlich höher. Das Embargo verursachte eine Ölkrise oder einen „Schock“ mit zahlreichen kurz- und langfristigen Auswirkungen auf die Weltpolitik und die Weltwirtschaft. Diese Krise wurde später als „erster Ölschock“ bezeichnet, gefolgt von der Ölkrise von 1979, die als „zweiter Ölschock“ bezeichnet wurde."
ron_economicnews.7.a:1 "Beunruhigend ..."

ron_economicnews.8.t:0 "Schuldenkrise in Lateinamerika"
ron_economicnews.8.d:0 "Die lateinamerikanische Schuldenkrise war eine Finanzkrise, die Anfang der 1980er Jahre (und in manchen Ländern bereits in den 1970er Jahren) ihren Anfang nahm und oft als La Década Perdida (Das verlorene Jahrzehnt) bezeichnet wird. Damals erreichten die lateinamerikanischen Länder einen Punkt, an dem ihre Auslandsschulden ihre Ertragskraft überstiegen und sie nicht mehr in der Lage waren, diese zurückzuzahlen."
ron_economicnews.8.a:1 "Beunruhigend ..."

ron_economicnews.9.t:0 "Energiekrise von 1979"
ron_economicnews.9.d:0 "Die Ölkrise von 1979, auch bekannt als Ölschock von 1979 oder Zweite Ölkrise, war eine Energiekrise, die durch einen Rückgang der Ölproduktion infolge der iranischen Revolution ausgelöst wurde. Obwohl das weltweite Ölangebot nur um etwa vier Prozent zurückging, trieb die Reaktion der Ölmärkte den Rohölpreis in den folgenden zwölf Monaten drastisch in die Höhe und verdoppelte ihn auf 39,50 Dollar pro Barrel. Der Preisanstieg führte zu Treibstoffknappheit und langen Warteschlangen an den Tankstellen, ähnlich wie bei der Ölkrise von 1973."
ron_economicnews.9.a:1 "Beunruhigend ..."

ron_economicnews.10.t:0 "Chile-Krise von 1982"
ron_economicnews.10.d:0 "Die Krise von 1982 war eine schwere Wirtschaftskrise, die Chile während der Militärdiktatur nach Jahren radikaler neoliberaler Reformen erlitt. Es war die schlimmste Wirtschaftskrise seit der Weltwirtschaftskrise der 1930er Jahre. Chiles BIP sank um 14,3 Prozent, die Arbeitslosigkeit stieg auf 23,7 Prozent."
ron_economicnews.10.a:1 "Beunruhigend ..."

ron_economicnews.11.t:0 "Spar- und Kreditkrise"
ron_economicnews.11.d:0 "Die Sparkassenkrise der 1980er und 1990er Jahre (allgemein als S&amp;L-Krise bezeichnet) führte zwischen 1986 und 1995 zum Bankrott von 1.043 der 3.234 Sparkassen in den USA. Eine S&amp;L oder „Sparkasse“ ist ein Finanzinstitut, das Spareinlagen entgegennimmt und Hypotheken-, Auto- und andere Privatkredite an einzelne Mitglieder vergibt (ein genossenschaftliches Unternehmen, das im Vereinigten Königreich als Bausparkasse bekannt ist). Die Federal Savings and Loan Insurance Corporation (FSLIC) schloss zwischen 1986 und 1989 296 Institute oder wickelte diese anderweitig ab. Daraufhin übernahm die neu gegründete Resolution Trust Corporation (RTC) diese Aufgaben. Die RTC schloss zwischen 1989 und 1995 747 Institute oder wickelte sie anderweitig ab, mit einem geschätzten Buchwert zwischen 402 und 407 Milliarden US-Dollar. Im Jahr 1996 schätzte das General Accounting Office (GAO) die Gesamtkosten auf 160 Milliarden Dollar, einschließlich 132,1 Milliarden Dollar, die den Steuerzahlern abgenommen wurden."
ron_economicnews.11.a:1 "Beunruhigend ..."

ron_economicnews.12.t:0 "Japanische Vermögenspreisblase"
ron_economicnews.12.d:0 "Die japanische Vermögenspreisblase war eine Wirtschaftsblase in Japan von 1986 bis 1991, in der die Immobilien- und Aktienmarktpreise stark überhöht waren. Anfang 1992 platzte diese Preisblase und Japans Wirtschaft stagnierte. Die Blase war gekennzeichnet durch einen rasanten Anstieg der Vermögenspreise und eine überhitzte Konjunktur sowie eine unkontrollierte Geldmengen- und Kreditausweitung. Genauer gesagt waren übermäßiges Vertrauen und Spekulationen in Bezug auf Vermögens- und Aktienpreise eng mit der damaligen exzessiven geldpolitischen Lockerungspolitik verbunden."
ron_economicnews.12.a:1 "Beunruhigend ..."

ron_economicnews.13.t:0 "Schwarzer Montag"
ron_economicnews.13.d:0 "„Schwarzer Montag“ ist die Bezeichnung für den weltweiten, plötzlichen, schweren und weitgehend unerwarteten Börsencrash am 19. Oktober 1987. In Australien und Neuseeland wird der Tag aufgrund der Zeitverschiebung zu den USA auch als „Schwarzer Dienstag“ bezeichnet."
ron_economicnews.13.a:1 "Beunruhigend ..."

ron_economicnews.14.t:0 "Rezession der 1990er Jahre"
ron_economicnews.14.d:0 "Die USA gerieten 1990 in eine Rezession, die acht Monate bis März 1991 andauerte. Obwohl die Rezession im Vergleich zu anderen Nachkriegsrezessionen mild ausfiel, war sie durch eine schleppende Erholung der Beschäftigung gekennzeichnet, die gemeinhin als „jobless recovery“ (Erholung ohne Beschäftigung) bezeichnet wird. Die Arbeitslosigkeit stieg bis Juni 1992 weiter an, obwohl das Wirtschaftswachstum im Vorjahr zurückgekehrt war."
ron_economicnews.14.a:1 "Beunruhigend ..."

ron_economicnews.15.t:0 "Asiatische Finanzkrise"
ron_economicnews.15.d:0 "Die asiatische Finanzkrise erfasste ab Juli 1997 weite Teile Ost- und Südostasiens und weckte Ängste vor einem weltweiten wirtschaftlichen Zusammenbruch aufgrund finanzieller Ansteckung. Die Krise begann am 2. Juli in Thailand mit dem finanziellen Zusammenbruch des thailändischen Baht, nachdem die thailändische Regierung aufgrund fehlender Devisen zur Unterstützung ihrer Währungsbindung an den US-Dollar gezwungen war, den Baht freizugeben. Fast unmittelbar darauf setzte eine Kapitalflucht ein, die eine internationale Kettenreaktion auslöste. Thailand hatte sich zu diesem Zeitpunkt mit Auslandsschulden belastet. Mit der Ausbreitung der Krise erlebten die meisten Länder Südostasiens und Japans einen Einbruch der Währungen, Abwertungen an den Aktienmärkten und anderen Vermögenswerten sowie einen steilen Anstieg der privaten Verschuldung."
ron_economicnews.15.a:1 "Beunruhigend ..."

ron_economicnews.16.t:0 "Russische Finanzkrise"
ron_economicnews.16.d:0 "Die russische Finanzkrise (auch Rubelkrise oder Russische Grippe genannt) traf Russland am 17. August 1998. Sie führte dazu, dass die russische Regierung und die russische Zentralbank den Rubel abwerteten und ihre Schulden nicht mehr begleichen konnten. Die Krise hatte schwerwiegende Auswirkungen auf die Wirtschaft vieler Nachbarländer. James Cook, Senior Vice President des US Russia Investment Fund, meinte unterdessen, die Krise habe den russischen Banken den positiven Effekt vermittelt, ihre Vermögenswerte zu diversifizieren."
ron_economicnews.16.a:1 "Beunruhigend ..."

ron_economicnews.17.t:0 "Rezession der 2000er Jahre"
ron_economicnews.17.d:0 "Die Rezession Anfang der 2000er Jahre war ein Rückgang der Wirtschaftstätigkeit, der vor allem in den Industrieländern auftrat. Die Europäische Union war in den Jahren 2000 und 2001 von der Rezession betroffen, die Vereinigten Staaten von März bis November 2001. Großbritannien, Kanada und Australien entgingen der Rezession, während Russland, ein Land, das in den 1990er Jahren keinen Wohlstand erlebte, sich von dieser Situation zu erholen begann. Japans Rezession der 1990er Jahre hielt an. Diese Rezession wurde von Ökonomen vorhergesagt, da sich der Boom der 1990er Jahre (begleitet von niedriger Inflation und niedriger Arbeitslosigkeit) in einigen Teilen Ostasiens während der asiatischen Finanzkrise 1997 verlangsamte. Die Rezession in den Industrieländern war nicht so ausgeprägt wie die beiden vorangegangenen weltweiten Rezessionen."
ron_economicnews.17.a:1 "Beunruhigend ..."

ron_economicnews.18.t:0 "Bankenkollaps"
ron_economicnews.18.d:0 "Die Finanzkrise von 2007–2008, auch als globale Finanzkrise bekannt, war eine schwere weltweite Finanzkrise. Übermäßiges Risikoverhalten der Banken und das Platzen der US-Immobilienblase ließen den Wert von an US-Immobilien gebundenen Wertpapieren drastisch sinken, was Finanzinstituten weltweit Schaden zufügte. Die Krise gipfelte in der Insolvenz von Lehman Brothers am 15. September 2008 und einer internationalen Bankenkrise. Die Krise löste die Große Rezession aus, die damals die schwerste globale Rezession seit der Großen Depression war. Ihr folgten die europäische Schuldenkrise, die Ende 2009 mit einem Defizit in Griechenland begann, und die isländische Finanzkrise von 2008–2011, die die Insolvenz aller drei großen Banken Islands zur Folge hatte und gemessen an der Größe der isländischen Volkswirtschaft der größte Wirtschaftseinbruch aller Länder in der Wirtschaftsgeschichte war."
ron_economicnews.18.a:1 "Beunruhigend ..."

ron_economicnews.19.t:0 "Coronavirus-Rezession"
ron_economicnews.19.d:0 "Die COVID-19-Rezession ist eine schwere, anhaltende globale Wirtschaftskrise, die in einigen Ländern sowohl eine Rezession als auch in anderen eine Depression verursacht hat. Es handelt sich derzeit um die schlimmste globale Wirtschaftskrise seit der Großen Depression. Die Wirtschaftskrise begann aufgrund der wirtschaftlichen Folgen der anhaltenden COVID-19-Pandemie. Erstes deutliches Anzeichen der Rezession war der Zusammenbruch der Märkte während des Börsencrashs 2020, der Ende Februar begann und bis März andauerte. Seit September 2020 befinden sich alle Industrieländer in einer Rezession oder Depression, während sich alle Schwellenländer in einer Rezession befinden. Modellrechnungen der Weltbank deuten darauf hin, dass in einigen Regionen eine vollständige Erholung erst 2025 oder später erreicht wird."
ron_economicnews.19.a:1 "Beunruhigend ..."


ron_world_fair_news.1.t:0 "Weltausstellung von 1900"
ron_world_fair_news.1.d:0 "Die Exposition Universelle von 1900, im Englischen besser bekannt als Pariser Exposition 1900, war eine Weltausstellung, die vom 14. April bis 12. November 1900 in Paris, Frankreich, stattfand, um die Errungenschaften des vergangenen Jahrhunderts zu feiern und die Entwicklung für das nächste Jahrhundert zu beschleunigen. Die Messe, die von fast 50 Millionen Menschen besucht wurde, zeigte viele technische Innovationen, darunter das Riesenrad Grande Roue de Paris, das Rollsteig, Dieselmotoren, Tonfilme, Rolltreppen und das Telegraphon (das erste magnetische Audioaufnahmegerät). Sie lenkte auch die internationale Aufmerksamkeit auf den Jugendstil. Darüber hinaus präsentierte sie Frankreich als bedeutende Kolonialmacht durch zahlreiche Pavillons auf dem Hügel des Trocadéro-Palastes."
ron_world_fair_news.1.a:1 "OK"

ron_world_fair_news.2.t:0 "Panamerikanische Ausstellung von 1901"
ron_world_fair_news.2.d:0 "Die Panamerikanische Ausstellung war eine Weltausstellung, die vom 1. Mai bis 2. November 1901 in Buffalo, New York, USA, stattfand. Die Ausstellung erstreckte sich über 350 Acres (0,55 Quadratmeilen) Land am westlichen Rand des heutigen Delaware Parks und erstreckte sich von der Delaware Avenue bis zur Elmwood Avenue und nach Norden bis zur Great Arrow Avenue. Sie ist heute vor allem als Ort der Ermordung des US-Präsidenten William McKinley am 6. September 1901 im Temple of Music in Erinnerung geblieben. Die Ausstellung war nachts beleuchtet. Thomas A. Edison, Inc. filmte sie tagsüber und eine Kamerafahrt nachts."
ron_world_fair_news.2.a:1 "OK"

ron_world_fair_news.3.t:0 "Hanoi-Ausstellung"
ron_world_fair_news.3.d:0 "Die Hanoi-Ausstellung war eine Weltausstellung, die vom 16. November 1902 bis zum 15. oder 16. Februar 1903 in Hanoi stattfand. Hanoi war bereits 1902 zur Hauptstadt Französisch-Indochinas geworden und hatte Saigon abgelöst. Zu den früheren Veranstaltungen zur Feier des Wandels gehörten ein Fest am 26. Februar 1902, an dem Kaiser Thành Thái und Generalgouverneur Paul Doumer teilnahmen, sowie die Eröffnung der Paul-Doumer-Brücke (heute Long Biên-Brücke). Die Ausstellung war eine Idee von Paul Doumer."
ron_world_fair_news.3.a:1 "OK"

ron_world_fair_news.4.t:0 "Nationale Industrieausstellung"
ron_world_fair_news.4.d:0 "Die fünfte und letzte Nationale Industrieausstellung fand vom 1. März bis 31. Juli 1903 in Tennōji-ku, Osaka, statt. Sie dauerte 153 Tage und zog 4.350.693 Besucher an, durchschnittlich 28.436 Besucher pro Tag. Erstmals waren auch ausländische Aussteller zugelassen (acht ausländische Autos wurden ausgestellt). Der Menschenpavillon sorgte für einige Kontroversen."
ron_world_fair_news.4.a:1 "OK"

ron_world_fair_news.5.t:0 "Louisiana Purchase Ausstellung"
ron_world_fair_news.5.d:0 "Die Louisiana Purchase Exposition, umgangssprachlich auch St. Louis World&#39;s Fair genannt, war eine internationale Ausstellung, die vom 30. April bis 1. Dezember 1904 in St. Louis, Missouri, USA, stattfand. Die Veranstaltung wurde mit lokalen, staatlichen und bundesstaatlichen Mitteln in Höhe von insgesamt 15 Millionen US-Dollar finanziert. Mehr als 60 Länder und 43 der damals 45 US-Bundesstaaten unterhielten Ausstellungsflächen auf der Messe, die von fast 19,7 Millionen Menschen besucht wurde."
ron_world_fair_news.5.a:1 "OK"

ron_world_fair_news.6.t:0 "Lüttich International"
ron_world_fair_news.6.d:0 "Die Exposition Universelle et Internationale de Liège war eine Weltausstellung, die vom 27. April bis 6. November 1905 in Lüttich stattfand, nur 8 Jahre nach einer belgischen Ausstellung in Brüssel. Sie sollte die industrielle Bedeutung Lüttichs demonstrieren und markierte gleichzeitig 75 Jahre belgische Unabhängigkeit und 40 Jahre Herrschaft Leopolds II."
ron_world_fair_news.6.a:1 "OK"

ron_world_fair_news.7.t:0 "Flughafen Mailand"
ron_world_fair_news.7.d:0 "Die Mailänder Internationale war eine Weltausstellung, die 1906 in Mailand stattfand und den Titel L&#39;Esposizione Internazionale del Sempione, auch bekannt als Die Große Expo der Arbeit, trug. Sie verzeichnete 4.012.776 Besucher und erstreckte sich über 250 Hektar. Die Messe wurde am 28. April 1906 eröffnet, dauerte bis zum 31. Oktober und markierte die Eröffnung des Simplontunnels. Die Messe fand im Sempione-Park und auf der Piazza d&#39;Armi statt. Der erste Standort beherbergte Ausstellungen bildender Künste und der zweite Industrie- und Ingenieursausstellungen sowie die ausländischen Pavillons. Zu den teilnehmenden Ländern gehörten viele westeuropäische, China, Japan, die Türkei, die Vereinigten Staaten, Kanada und mehrere südamerikanische Länder, die sich einen Pavillon teilten."
ron_world_fair_news.7.a:1 "OK"

ron_world_fair_news.8.t:0 "Irische Internationale Ausstellung"
ron_world_fair_news.8.d:0 "Die Irish International Exhibition (manchmal auch Dublin International) war eine Weltausstellung, die 1907 in Dublin, Irland, stattfand, als das Land noch Teil des Vereinigten Königreichs war. Die Entscheidung, die Ausstellung abzuhalten, wurde auf der Irish Industrial Conference im April 1903 getroffen und war von einer kleinen Ausstellung in Cork (der Cork International Exhibition) fünf Jahre zuvor inspiriert. Die Ausstellung von 1907 sollte den Handel mit irischen Waren verbessern. Die treibende Kraft hinter dem Projekt war William Martin Murphy, ein Geschäftsmann und Eigentümer des Irish Independent, des Kaufhauses Clerys (Clery &amp; Co.), der Dublin United Transport Company und mehrerer anderer irischer und ausländischer Unternehmen. Zu den weiteren Organisatoren gehörte der irische Journalist William Francis Dennehy."
ron_world_fair_news.8.a:1 "OK"


ron_world_fair_news.9.t:0 "Französisch-britische Ausstellung"
ron_world_fair_news.9.d:0 "Die Französisch-Britische Ausstellung war eine große öffentliche Ausstellung, die vom 14. Mai bis 31. Oktober 1908 in London stattfand. Sie zog 8 Millionen Besucher an und feierte die 1904 zwischen Großbritannien und Frankreich unterzeichnete Entente Cordiale. Der Hauptarchitekt der Gebäude war John Belcher. Die Ausstellung fand in einem Viertel im Westen Londons nahe Shepherd&#39;s Bush statt, das heute White City heißt. Der Name leitet sich von den weiß gestrichenen Ausstellungsgebäuden ab. Parallel zu den Feierlichkeiten fanden in diesem Viertel auch die Fechtwettbewerbe der Olympischen Sommerspiele 1908 statt."
ron_world_fair_news.9.a:1 "OK"

ron_world_fair_news.10.t:0 "Alaska-Yukon-Pazifik-Ausstellung"
ron_world_fair_news.10.d:0 "Die Alaska-Yukon-Pacific Exposition war eine Weltausstellung, die 1909 in Seattle stattfand und die Entwicklung des pazifischen Nordwestens bekannt machte. Ursprünglich war sie für 1907 geplant, um den 10. Jahrestag des Klondike-Goldrauschs zu feiern. Als die Organisatoren jedoch von der Jamestown Exposition erfuhren, die in diesem Jahr stattfand, verlegten sie den Termin."
ron_world_fair_news.10.a:1 "OK"


ron_world_fair_news.11.t:0 "Internationale Ausstellung in Brüssel"
ron_world_fair_news.11.d:0 "Die Weltausstellung 1910 in Brüssel war eine Weltausstellung, die vom 23. April bis 1. November 1910 in Brüssel, Belgien, stattfand. Sie fand nur dreizehn Jahre nach der vorherigen Weltausstellung in Brüssel statt. Sie hatte 13 Millionen Besucher, erstreckte sich über 220 Hektar und brachte 100.000 belgische Francs ein."
ron_world_fair_news.11.a:1 "OK"

ron_world_fair_news.12.t:0 "Flughafen Turin"
ron_world_fair_news.12.d:0 "Die Turin International war eine Weltausstellung, die 1911 in Turin unter dem Titel Esposizione internazionale dell&#39;industria e del lavoro stattfand. Sie verzeichnete 4.012.776 Besucher und erstreckte sich über 247 Hektar. Die Messe wurde am 29. April eröffnet, nur neun Jahre nach einer früheren Turiner Messe, die sich auf die dekorativen Künste konzentriert hatte, und zur gleichen Zeit wie eine andere italienische Messe in Rom, ebenfalls mit einem Kunstschwerpunkt. Diese Messe zeichnete sich bewusst durch ihren Fokus auf Industrie und Arbeit aus. Die Messe fand im Parco del Valentino statt (wie auch die drei vorherigen Turiner Messen 1884, 1885 und 1902 sowie die darauffolgende Turiner Messe 1924)."
ron_world_fair_news.12.a:1 "OK"

ron_world_fair_news.13.t:0 "Lateinisch-britische Ausstellung"
ron_world_fair_news.13.d:0 "Die Latin-British Exhibition von 1912 war eine der letzten Ausstellungen in Shepherd&#39;s Bush, London, auf dem als Great White City, später einfach als White City bekannten Ausstellungsgelände. Auf dem Ausstellungsgelände befinden sich heute das BBC White City Centre und das Einkaufszentrum Westfield London, eines der größten in Großbritannien. Zu den Attraktionen gehörte die Flip Flap, eine große Seilbahn mit Blick auf die Stadt"
ron_world_fair_news.13.a:1 "OK"

ron_world_fair_news.14.t:0 "Exposition Universelle et Internationale"
ron_world_fair_news.14.d:0 "Die Exposition universelle et internationale von 1913 war eine Weltausstellung, die vom 26. April bis 3. November in Gent stattfand. Zu diesem Anlass wurden zahlreiche Gebäude fertiggestellt. Insbesondere der Bahnhof Gent-Sint-Pieters wurde 1912 rechtzeitig zur Ausstellung fertiggestellt und befand sich gegenüber dem neuen Hotel Flandria Palace. Der Park, der Citadelpark, wurde für die Messe neu gestaltet. Die Ausstellung fand auf einer Fläche von 130 Hektar statt und war damit größer als die Expo 58 in Brüssel. Verschiedene belgische Städte hatten Pavillons und eine künstliche Stadt namens „Oud Vlaenderen“ (Alt-Flandern) wurde angelegt."
ron_world_fair_news.14.a:1 "OK"

ron_world_fair_news.15.t:0 "Exposition Internationale Urbane de Lyon"
ron_world_fair_news.15.d:0 "Die Exposition internationale urbaine de Lyon war die Weltausstellung 1914 in der französischen Stadt Lyon. Die Ausstellung konzentrierte sich auf Stadtplanung und öffentliche Gesundheit. Der Bürgermeister von Lyon, Édouard Herriot, organisierte die Ausstellung zusammen mit dem Architekten Tony Garnier und dem Arzt Jules Courmont."
ron_world_fair_news.15.a:1 "OK"

ron_world_fair_news.16.t:0 "Internationale Ausstellung Panama-Pazifik"
ron_world_fair_news.16.d:0 "Die Panama-Pacific International Exposition war eine Weltausstellung, die vom 20. Februar bis 4. Dezember 1915 in San Francisco, Kalifornien, stattfand. Ihr erklärter Zweck war die Feier der Fertigstellung des Panamakanals, doch in der Stadt wurde sie auch als Gelegenheit gesehen, den Wiederaufbau nach dem Erdbeben von 1906 zu präsentieren. Die Ausstellung wurde auf einem 2,6 km² großen Gelände entlang der Nordküste zwischen dem Presidio und Fort Mason errichtet, das heute als Marina District bekannt ist."
ron_world_fair_news.16.a:1 "OK"

ron_world_fair_news.19.t:0 "Internationale Ausstellung Bronx"
ron_world_fair_news.19.d:0 "Die Bronx International Exposition of Science, Arts and Industries war eine Weltausstellung, die 1918 in der Bronx im US-Bundesstaat New York stattfand. Sie sollte an den 300. Jahrestag der Besiedlung der Bronx erinnern, erfreute sich jedoch nicht großer Beliebtheit, da die Ausstellung während des Ersten Weltkriegs stattfand. Nach dem Ende der Ausstellung wurde das Gelände für einen Vergnügungspark namens Starlight Park genutzt."
ron_world_fair_news.19.a:1 "OK"

ron_world_fair_news.23.t:0 "Internationale Ausstellung zum 100. Jahrestag der Unabhängigkeit"
ron_world_fair_news.23.d:0 "Die Internationale Unabhängigkeitsausstellung war eine Weltausstellung, die vom 7. September 1922 bis zum 23. März 1923 in Rio de Janeiro stattfand, um den 100. Jahrestag der brasilianischen Unabhängigkeit zu feiern. Die Expo fand während der Amtszeit von Epitácio Pessoa statt und wurde als Gelegenheit gesehen, die wachsenden Industrien und den potenziellen Markt Brasiliens zu präsentieren. Die Messe wurde entlang der Avenida Rio Branco auf einem eigens für diesen Anlass errichteten Gelände errichtet."
ron_world_fair_news.23.a:1 "OK"

ron_world_fair_news.24.t:0 "Göteborger Jubiläumsausstellung zum 300. Jahrestag"
ron_world_fair_news.24.d:0 "Die Göteborger Jubiläumsausstellung (auf Schwedisch Jubileumsutställningen i Göteborg) war eine Weltausstellung, die 1923 im schwedischen Göteborg anlässlich des 300. Jahrestages der Stadtgründung stattfand. Die Messe wurde am 8. Mai eröffnet und dauerte bis zum 30. September."
ron_world_fair_news.24.a:1 "OK"

ron_world_fair_news.25.t:0 "Ausstellung zum Britischen Empire"
ron_world_fair_news.25.d:0 "Die British Empire Exhibition war eine Kolonialausstellung, die vom 23. April 1924 bis zum 31. Oktober 1925 im Wembley Park in England stattfand. 1920 beschloss die britische Regierung, die British Empire Exhibition im Wembley Park zu veranstalten, an der Stelle der von Sir Edward Watkin in den 1890er Jahren angelegten Vergnügungsgärten. Eine British Empire Exhibition war erstmals 1902 von der British Empire League und erneut 1913 vorgeschlagen worden. Der Russisch-Japanische Krieg hatte die Umsetzung des ersten Plans verhindert, und der Erste Weltkrieg setzte dem zweiten ein Ende, obwohl es 1911 ein Festival of Empire gegeben hatte, das teilweise im Crystal Palace stattfand."
ron_world_fair_news.25.a:1 "OK"

ron_world_fair_news.26.t:0 "Internationale Ausstellung"
ron_world_fair_news.26.d:0 "Die Internationale Ausstellung moderner dekorativer und industrieller Kunst war eine Weltausstellung, die von April bis Oktober 1925 in Paris, Frankreich, stattfand. Sie wurde von der französischen Regierung veranstaltet, um den neuen modernen Stil in der Architektur, Inneneinrichtung, bei Möbeln, Glas, Schmuck und anderen dekorativen Künsten in Europa und der ganzen Welt ins Rampenlicht zu rücken. Viele Ideen der internationalen Avantgarde aus den Bereichen Architektur und angewandte Kunst wurden auf der Ausstellung zum ersten Mal präsentiert. Die Veranstaltung fand zwischen der Esplanade des Invalides und den Eingängen des Grand Palais und des Petit Palais sowie an beiden Ufern der Seine statt. Es gab 15.000 Aussteller aus zwanzig verschiedenen Ländern, und während ihrer siebenmonatigen Laufzeit wurde die Ausstellung von sechzehn Millionen Menschen besucht. Der auf der Ausstellung präsentierte moderne Stil wurde später nach dem Namen der Ausstellung als „Art déco“ bekannt."
ron_world_fair_news.26.a:1 "OK"

ron_world_fair_news.27.t:0 "150-Jahr-Ausstellung"
ron_world_fair_news.27.d:0 "Die Sesqui-Centennial International Exposition von 1926 war eine Weltausstellung in Philadelphia, Pennsylvania. Ihr Zweck war es, den 150. Jahrestag der Unterzeichnung der Unabhängigkeitserklärung der Vereinigten Staaten und den 50. Jahrestag der Centennial Exposition von 1876 zu feiern."
ron_world_fair_news.27.a:1 "OK"

ron_world_fair_news.29.t:0 "Ibero-Amerikanische Ausstellung"
ron_world_fair_news.29.d:0 "Die Iberoamerikanische Ausstellung 1929 war eine Weltausstellung, die vom 9. Mai 1929 bis zum 21. Juni 1930 in Sevilla, Spanien, stattfand. Zu den teilnehmenden Ländern gehörten Portugal, die Vereinigten Staaten, Brasilien, Uruguay, Mexiko, Peru, Argentinien, Chile, die Republik Kolumbien, Kuba, Venezuela, die Dominikanische Republik, Bolivien, Panama, El Salvador, Costa Rica und Ecuador. Jede spanische Region und jede Provinz Andalusiens war ebenfalls vertreten. Spaniens Generaldiktator Miguel Primo de Rivera hielt die Eröffnungsrede. Primo de Rivera überließ es dem spanischen König Alfons XIII., die Schlussworte zu sprechen und die Ausstellung offiziell zu eröffnen."
ron_world_fair_news.29.a:1 "OK"

ron_world_fair_news.30.t:0 "Internationale Ausstellung Barcelona"
ron_world_fair_news.30.d:0 "Die Weltausstellung 1929 in Barcelona war die zweite Weltausstellung in Barcelona; die erste fand 1888 statt. Sie fand vom 20. Mai 1929 bis zum 15. Januar 1930 in Barcelona, Spanien, statt. Sie wurde auf dem Montjuïc abgehalten, dem Hügel oberhalb des Hafens südwestlich des Stadtzentrums, und erstreckte sich über eine Fläche von 118 Hektar (291,58 Acres). Die geschätzten Kosten beliefen sich auf 130 Millionen Peseten (25.083.921 US-Dollar). Zwanzig europäische Nationen nahmen an der Messe teil, darunter Deutschland, Großbritannien, Belgien, Dänemark, Frankreich, Ungarn, Italien, Norwegen, Rumänien und die Schweiz. Darüber hinaus nahmen private Organisationen aus den USA und Japan teil. Hispanoamerikanische Länder sowie Brasilien, Portugal und die USA waren im iberoamerikanischen Bereich in Sevilla vertreten."
ron_world_fair_news.30.a:1 "OK"


ron_world_fair_news.31.t:0 "Stockholmer Ausstellung"
ron_world_fair_news.31.d:0 "Die Stockholmer Ausstellung fand 1930 in Stockholm, Schweden, statt und hatte großen Einfluss auf die Architekturstile Funktionalismus und Internationaler Stil. Veranstalter der Ausstellung waren die Stadt Stockholm und der Kunstgesellschaft Svenska Slöjdföreningen (aus der sich die heutige Organisation Swedish Form entwickelte). Der Kunsthistoriker und Leiter der Svenska Slöjdföreningen, Gregor Paulsson, war der intellektuelle Leiter der Ausstellung. Nach einem Besuch der Stuttgarter Weißenhofsiedlung im Jahr 1927 wurde er dazu inspiriert, eine ähnliche Veranstaltung in Stockholm zu organisieren."
ron_world_fair_news.31.a:1 "OK"

ron_world_fair_news.32.t:0 "Pariser Kolonialausstellung"
ron_world_fair_news.32.d:0 "Die Pariser Kolonialausstellung war eine sechsmonatige Kolonialausstellung, die 1931 in Paris stattfand und die vielfältigen Kulturen und immensen Ressourcen der französischen Kolonialbesitzungen zur Schau stellen sollte. Die Ausstellung wurde am 6. Mai 1931 im Bois de Vincennes am östlichen Stadtrand von Paris eröffnet. Ihr Ausmaß war enorm. Schätzungsweise 7 bis 9 Millionen Besucher aus aller Welt kamen. Die französische Regierung brachte Menschen aus den Kolonien nach Paris und ließ sie einheimisches Kunsthandwerk herstellen und in großformatigen Reproduktionen ihrer einheimischen Architekturstile wie Hütten oder Tempeln auftreten. Andere Nationen nahmen an der Veranstaltung teil, darunter die Niederlande, Belgien, Italien, Japan, Portugal, das Vereinigte Königreich und die Vereinigten Staaten."
ron_world_fair_news.32.a:1 "OK"

ron_world_fair_news.33.t:0 "Levante-Messe"
ron_world_fair_news.33.d:0 "Die Levant Fair war eine internationale Handelsmesse, die in den 1920er und 1930er Jahren in Tel Aviv stattfand. Die Messe von 1932 wurde von fast 300.000 Menschen besucht."
ron_world_fair_news.33.a:1 "OK"

ron_world_fair_news.34.t:0 "Weltausstellung in Chicago"
ron_world_fair_news.34.d:0 "Die Century of Progress International Exposition, auch bekannt als Chicago World&#39;s Fair, war eine Weltausstellung, die von 1933 bis 1934 in Chicago, Illinois, USA, stattfand. Die beim Bureau International des Expositions (BIE) registrierte Messe feierte das hundertjährige Bestehen der Stadt. Das Thema der Messe war technologische Innovation, und ihr Motto lautete „Wissenschaft findet, Industrie wendet an, Mensch passt sich an“ und vermittelte die Botschaft, dass Wissenschaft und amerikanisches Leben eng miteinander verbunden sind. Ihr architektonisches Wahrzeichen war der Sky Ride, eine senkrecht zum Ufer stehende Schwebefähre, auf der man von einer Seite der Messe zur anderen fahren konnte."
ron_world_fair_news.34.a:1 "OK"

ron_world_fair_news.35.t:0 "Portugiesische Kolonialausstellung"
ron_world_fair_news.35.d:0 "Die portugiesische Kolonialausstellung war eine Weltausstellung, die 1934 in Porto, Portugal, stattfand, um die Errungenschaften der portugiesischen Kolonien in Afrika und Asien zu zeigen. Portugals Direktor der „Colonial Show Fairs“ Henrique Galvão, der Portugal auf der Pariser Kolonialausstellung 1931 vertreten hatte, wurde zum technischen Direktor dieser Ausstellung ernannt. Es wurde beschlossen, den Palácio de Cristal, der für eine frühere Ausstellung in Porto errichtet worden war, wiederzuverwenden. Die Exponate kamen aus Portugal selbst (Braga, Chaves, Leixões, Matosinhos und Porto), Angola, Kap Verde, Guinea (Guinea-Bissau), Indien, Macao (einschließlich einer Reproduktion des Guia-Leuchtturms), Mosambik, São Tomé und Príncipe sowie Timor (Portugiesisch-Timor)."
ron_world_fair_news.35.a:1 "OK"

ron_world_fair_news.36.t:0 "Internationale Ausstellung in Brüssel"
ron_world_fair_news.36.d:0 "Die Brüsseler Weltausstellung 1935 war eine Weltausstellung, die vom 27. April bis 6. November 1935 auf dem Heysel-Plateau in Brüssel (Belgien) stattfand. An der vom Bureau International des Expositions offiziell genehmigten Ausstellung nahmen 25 Länder teil, weitere fünf waren inoffiziell vertreten. Das Thema war die Kolonisierung anlässlich des 50. Jahrestages der Gründung des Freistaats Kongo. Die Ausstellung zog rund 20 Millionen Besucher an. Der belgische Architekt Joseph van Neck war der Hauptarchitekt der Messe und des Art-déco-Palais des Expositions (auch bekannt als Grand Palais) mit seinen parabolischen Betonbögen im Inneren und vier heroischen Bronzestatuen auf Pfeilern."
ron_world_fair_news.36.a:1 "OK"

ron_world_fair_news.37.t:0 "Ausstellung der Großen Seen"
ron_world_fair_news.37.d:0 "Die Great Lakes Exposition (auch bekannt als Weltausstellung von 1936) fand im Sommer 1936 und 1937 in Cleveland, Ohio, am Ufer des Eriesees nördlich der Innenstadt statt. Die Ausstellung gedachte des hundertjährigen Bestehens Clevelands. Sie sollte der von der Weltwirtschaftskrise schwer getroffenen Stadt neue Energie verleihen, hob den Fortschritt hervor, der in der Region der Großen Seen in den letzten 100 Jahren erzielt worden war, und zeigte den Weg für zukünftige Fortschritte. Sie erstreckte sich über 135 Hektar an Clevelands Seeufer und bot zahlreiche Attraktionen – Fahrgeschäfte, Sideshows, botanische Gärten, Cafés, Kunstgalerien und vieles mehr. Ähnlich wie die Weltausstellung in Chicago wollte auch die Ausstellung den Besuchern die Kulturen anderer Länder näherbringen, die amerikanische Industrie feiern und lokale Unternehmen fördern."
ron_world_fair_news.37.a:1 "OK"

ron_world_fair_news.38.t:0 "Panpazifische Friedensausstellung in Nagoya"
ron_world_fair_news.38.d:0 "Die Nagoya Pan-Pacific Peace Exposition (1937) war eine Weltausstellung, die vom 15. März bis 31. Mai 1937 im heutigen Bezirk Minami der japanischen Stadt Nagoya stattfand. Die von der japanischen Regierung geförderte und von Seiner Hoheit Prinz Higashikuni Naruhiko geleitete Nagoya Pan-Pacific Peace Exposition sollte Industrie, Transport, Bildung, Wissenschaft, Bauwesen, Architektur, Sozialwesen, Tourismus, Kunst und Handwerk fördern. Jede der teilnehmenden Nationen oder Kolonien hatte einen eigenen Pavillon, um ihre Produkte und Kultur zu präsentieren, und jede Präfektur Japans (mit Ausnahme von Tottori und den Außengebieten Taiwan, Karafuto und Korea) hatte ebenfalls einen Pavillon. Darüber hinaus sponserten auch große japanische Industrieunternehmen ihre eigenen Pavillons."
ron_world_fair_news.38.a:1 "OK"

ron_world_fair_news.39.t:0 "Zweite Internationale Luftfahrtausstellung"
ron_world_fair_news.39.d:0 "Die Zweite Internationale Luftfahrtausstellung (vollständiger Name: Zweite Internationale Luftfahrtausstellung im Verband der finnischen Luftverteidigung SILI) fand 1938 in Helsinki statt. Sie lief vom 14. bis 22. Mai 1938. Es handelte sich um eine vom Bureau International des Expositions (BIE) anerkannte Sonderausstellung, die 25 teilnehmende Länder anzog, darunter die Tschechoslowakei, Finnland, Deutschland, Großbritannien, Ungarn, Lettland und Schweden. Sie zog 15 Millionen Besucher an und fand in der Ausstellungshalle von Helsinki statt. Die Kommissare waren Alexander Frey, Erik von Frenckell und Mauri Honkajuuri, Direktor von Kansallis-Osake-Pankki. Zu den Besuchern zählten der Rennfahrer SPJ Keinänen und der Premierminister Aimo Cajander."
ron_world_fair_news.39.a:1 "OK"

ron_world_fair_news.40.t:0 "New Yorker Weltausstellung"
ron_world_fair_news.40.d:0 "Die New Yorker Weltausstellung 1939–1940 fand im Flushing Meadows-Corona Park in Queens, New York, USA, statt. Sie war die zweitteuerste amerikanische Weltausstellung aller Zeiten, nur übertroffen von der Louisiana Purchase Exposition in St. Louis im Jahr 1904. Zahlreiche Länder weltweit beteiligten sich daran, und in zwei Saisons besuchten über 44 Millionen Menschen die Ausstellungen. Es war die erste zukunftsorientierte Ausstellung mit dem Eröffnungsslogan „Morgendämmerung eines neuen Tages“ und ermöglichte allen Besuchern einen Blick auf die „Welt von morgen“."
ron_world_fair_news.40.a:1 "OK"

ron_world_fair_news.41.t:0 "Portugiesische Weltausstellung"
ron_world_fair_news.41.d:0 "Die portugiesische Weltausstellung fand 1940 in Lissabon statt, um den 800. Jahrestag der Staatsgründung und den 300. Jahrestag der Wiederherstellung der Unabhängigkeit von Spanien zu feiern. Die Ausstellung fand vom 23. Juni bis 2. Dezember 1940 auf der Praça do Império statt und wurde von 3 Millionen Menschen besucht."
ron_world_fair_news.41.a:1 "OK"


ron_world_fair_news.50.t:0 "Exposition Internationale Du Bicentenaire"
ron_world_fair_news.50.d:0 "Die Exposition internationale du bicentenaire de Port-au-Prince war eine Weltausstellung, die 1949 in Port-au-Prince, Haiti, anlässlich des 200. Jahrestages der Gründung von Port-au-Prince stattfand. Präsident Dumarsais Estimé plädierte 1948 für eine Ausstellung, um die haitianische Kultur anderen Ländern zu präsentieren und den Tourismus zu fördern, und stellte eine Million Dollar (damals fast drei Viertel des haitianischen Jahresbudgets) für das Projekt bereit. Die Messe wurde auf einem Gelände in der Gonave-Bucht eröffnet, das von Häusern befreit und mit Gärten, Parks und hohen Kokosnussbäumen und Palmen angelegt worden war."
ron_world_fair_news.50.a:1 "OK"

ron_world_fair_news.52.t:0 "Festival von Großbritannien"
ron_world_fair_news.52.d:0 "Das Festival of Britain war eine nationale Ausstellung und Messe, die im Sommer 1951 Millionen Besucher im gesamten Vereinigten Königreich anzog. Der Historiker Kenneth O. Morgan bezeichnet das Festival als „triumphalen Erfolg“, bei dem die Menschen zum South Bank-Gelände strömten, um den Dome of Discovery zu besichtigen, den Skylon zu bestaunen und ganz allgemein ein Fest im Zeichen nationaler Feierlichkeiten zu genießen. Im ganzen Land stießen kleinere Feste auf große bürgerliche und freiwillige Begeisterung. Ein Volk, das durch Jahre totalen Krieges gezügelt und durch Entbehrungen und Trübsinn halb erdrückt wurde, zeigte, dass es seine Fähigkeit zur Freude nicht verloren hatte … Vor allem aber bot das Festival einen spektakulären Rahmen und präsentierte den Erfindungsreichtum und die Genialität britischer Wissenschaftler und Techniker."
ron_world_fair_news.52.a:1 "OK"

ron_world_fair_news.56.t:0 "Helsingborg-Ausstellung"
ron_world_fair_news.56.d:0 "Die Helsingborg-Ausstellung von 1955, auch bekannt als H55, war eine vom BIE anerkannte Weltausstellung, die vom 10. Juni bis 28. August 1955 in Helsingborg, Schweden, stattfand. Insgesamt waren neun Nationen auf der Ausstellung vertreten: Dänemark, Finnland, Frankreich, Japan, Norwegen, Schweden, die Schweiz, Großbritannien und Westdeutschland. Das Thema der Ausstellung war Kunst und Handwerk. Ziel war es zu zeigen, wie modernes Design sowohl in kommerziellen als auch in Luxusgütern eingesetzt werden kann. Aussteller aus zehn Ländern brachten unter anderem das String-Design-Bücherregal von Nisse Strinning mit."
ron_world_fair_news.56.a:1 "OK"

ron_world_fair_news.63.t:0 "Ausstellung „Century 21“"
ron_world_fair_news.63.d:0 "Die Century 21 Exposition (auch bekannt als Seattle World’s Fair) war eine Weltausstellung, die vom 21. April bis 21. Oktober 1962 in Seattle, Washington, stattfand. Fast 10 Millionen Menschen besuchten die Ausstellung. Wie geplant hinterließ die Ausstellung ein Messegelände sowie zahlreiche öffentliche Gebäude und Arbeiten; manche schreiben ihr eine Wiederbelebung des wirtschaftlichen und kulturellen Lebens Seattles zu (siehe Geschichte von Seattle seit 1940). Im Rahmen der Ausstellung wurden die Space Needle und die Alweg-Einschienenbahn sowie mehrere Sportstätten (das Washington State Coliseum, heute Climate Pledge Arena, derzeit im Umbau) und Gebäude für darstellende Künste (das Playhouse, heute Cornish Playhouse) errichtet, von denen die meisten inzwischen ersetzt oder grundlegend umgebaut wurden. Im Gegensatz zu einigen anderen Weltausstellungen ihrer Zeit erzielte Century 21 einen Gewinn."
ron_world_fair_news.63.a:1 "OK"

ron_world_fair_news.65.t:0 "New Yorker Weltausstellung"
ron_world_fair_news.65.d:0 "Die New Yorker Weltausstellung 1964/1965 war eine Weltausstellung mit über 140 Pavillons, 110 Restaurants, 80 Nationen (37 davon waren Gastgeber), 24 US-Bundesstaaten und über 45 Unternehmen, die im Flushing Meadows-Corona Park in Queens, New York City, Ausstellungen und Attraktionen errichteten. Die riesige Messe erstreckte sich über 261 Hektar auf der Hälfte des Parks und verfügte über zahlreiche Pools und Springbrunnen sowie einen Vergnügungspark mit Fahrgeschäften in der Nähe des Sees. Die Messe erhielt jedoch keine offizielle Unterstützung oder Genehmigung vom Bureau of International Expositions (BIE)."
ron_world_fair_news.65.a:1 "OK"

ron_world_fair_news.69.t:0 "HemisFair &#39;68"
ron_world_fair_news.69.d:0 "Die HemisFair &#39;68 war die offizielle Weltausstellung 1968, die vom 6. April bis 6. Oktober 1968 in San Antonio, Texas, stattfand. Das Thema der Ausstellung war „Der Zusammenfluss der Zivilisationen in Amerika“ und würdigte die vielen Nationen, die die Region besiedelten. Die Ausstellung fand 1968 anlässlich des 250. Jahrestages der Gründung von San Antonio im Jahr 1718 statt. Mehr als dreißig Nationen und fünfzehn Unternehmen waren mit Pavillons auf der Messe vertreten."
ron_world_fair_news.69.a:1 "OK"

ron_world_fair_news.71.t:0 "Expo &#39;70"
ron_world_fair_news.71.d:0 "Die Expo 70 war eine Weltausstellung, die vom 15. März bis 13. September 1970 in Suita in der japanischen Präfektur Osaka stattfand. Das Thema der Expo war „Fortschritt und Harmonie für die Menschheit“. Im Japanischen wird die Expo 70 oft als Osaka Banpaku bezeichnet. Es war die erste Weltausstellung in Japan. Der Masterplan für die Expo wurde vom japanischen Architekten Kenzo Tange entworfen, der von zwölf weiteren japanischen Architekten unterstützt wurde, die Elemente des Plans entwarfen. Die Symbolzone überbrückte das Gelände entlang einer Nord-Süd-Achse. Sie war auf drei Ebenen geplant und diente in erster Linie als sozialer Raum mit einem verbindenden Fachwerkdach."
ron_world_fair_news.71.a:1 "OK"

ron_world_fair_news.75.t:0 "Expo &#39;74"
ron_world_fair_news.75.d:0 "Die Expo &#39;74, offiziell bekannt als Internationale Umweltausstellung Spokane 1974, war eine Weltausstellung, die vom 4. Mai bis 3. November 1974 in Spokane, Washington, im Nordwesten der USA stattfand. Sie war die erste Weltausstellung mit Umweltthema und wurde von rund 5,6 Millionen Menschen besucht. Das Herzstück des Messegeländes befand sich auf Canada Island, Havermale Island und dem angrenzenden Südufer des Spokane River, dem heutigen Riverfront Park im Stadtzentrum."
ron_world_fair_news.75.a:1 "OK"

ron_world_fair_news.76.t:0 "Expo &#39;75"
ron_world_fair_news.76.d:0 "Die Expo 75 war eine Weltausstellung, die vom 20. Juli 1975 bis zum 18. Januar 1976 auf der japanischen Insel Okinawa stattfand. Sie sollte unter anderem an die Übergabe Okinawas an Japan durch die Amerikaner im Jahr 1972 erinnern. Das Thema der Ausstellung waren die Ozeane, mit Schwerpunkt auf ozeanografischen Technologien, Meereslebewesen und ozeanischen Kulturen. Das Motto lautete: „Das Meer, das wir gerne sehen würden“."
ron_world_fair_news.76.a:1 "OK"

ron_world_fair_news.82.t:0 "Expo 81"
ron_world_fair_news.82.d:0 "Die Internationale Ausstellung Plovdiv 1981 wurde vom Bureau International des Expositions organisiert und fand vom 14. Juni bis 12. Juli 1981 in Plovdiv, Bulgarien, statt. Die Ausstellung erstreckte sich über eine Fläche von 51 Hektar. Am 12. Juni 1980 wurde die Ausstellung als Fachausstellung angemeldet. Das Thema der Ausstellung war „Jagd, Fischerei und der Mensch in der Gesellschaft“. Ziel war es, durch die Exponate der teilnehmenden Länder die Umwelt, die Entwicklung der Jagd in verschiedenen Teilen der Welt, die Wechselwirkung zwischen Jagd, Fischerei und dem Menschen in der heutigen Gesellschaft zu präsentieren und so zur Erhaltung und Stärkung der Jagdkultur beizutragen."
ron_world_fair_news.82.a:1 "OK"

ron_world_fair_news.83.t:0 "Internationale Energieausstellung Knoxville"
ron_world_fair_news.83.d:0 "Die Weltausstellung 1982, offiziell Knoxville International Energy Exposition, fand in Knoxville, Tennessee, USA, statt. Die Fachausstellung mit dem Motto „Energie dreht die Welt“ wurde vom Bureau International des Expositions (BIE) anerkannt. Sie wurde am 1. Mai 1982 eröffnet und schloss am 31. Oktober 1982 nach über elf Millionen Besuchern. Zu den teilnehmenden Ländern gehörten Australien, Belgien, Kanada, die Volksrepublik China, Dänemark, Ägypten, Frankreich, Griechenland, Ungarn, Italien, Japan, Luxemburg, Mexiko, die Niederlande, Panama, Peru, die Philippinen, Saudi-Arabien, Südkorea, das Vereinigte Königreich, die Vereinigten Staaten und Westdeutschland."
ron_world_fair_news.83.a:1 "OK"

ron_world_fair_news.85.t:0 "Weltausstellung in Louisiana"
ron_world_fair_news.85.d:0 "Die Louisiana World Exposition 1984 war eine Weltausstellung in New Orleans, Louisiana, USA. Sie fand 100 Jahre nach der früheren Weltausstellung der Stadt, der World Cotton Centennial im Jahr 1884, statt. Sie wurde am Samstag, dem 12. Mai 1984, eröffnet und endete am Sonntag, dem 11. November 1984. Das Thema lautete „Die Welt der Flüsse – Süßwasser als Quelle des Lebens“."
ron_world_fair_news.85.a:1 "OK"

ron_world_fair_news.86.t:0 "Expo &#39;85"
ron_world_fair_news.86.d:0 "Die Expo &#39;85, offiziell „International Exposition, Tsukuba, Japan, 1985“, war eine Weltausstellung, die vom 17. März bis 16. September 1985 in Tsukuba, Ibaraki, Japan (Tsukuba Science City, eine auf Technologie ausgerichtete Planstadt nördlich von Tokio) stattfand. Das Thema der Messe war „Wohnen und Umgebung – Wissenschaft und Technologie für den Menschen zu Hause“. Über 20 Millionen Besucher kamen aus 48 Ländern und zahlreiche Unternehmen nahmen teil."
ron_world_fair_news.86.a:1 "OK"

ron_world_fair_news.87.t:0 "Expo 86"
ron_world_fair_news.87.d:0 "Die Weltausstellung für Verkehr und Kommunikation 1986, kurz Expo 86, war eine Weltausstellung, die vom Freitag, dem 2. Mai, bis Montag, dem 13. Oktober 1986, in Vancouver, British Columbia, Kanada, stattfand. Das Motto der Ausstellung lautete „Verkehr und Kommunikation – Welt in Bewegung – Welt in Berührung“. Sie fiel mit Vancouvers 100-jährigem Jubiläum zusammen und fand am Nordufer des False Creek statt. Es war die zweite Weltausstellung in Kanada, die erste fand anlässlich der kanadischen Hundertjahrfeier auf der Expo 67 in Montreal statt. Seit 1986 war sie zudem die dritte Weltausstellung im pazifischen Nordwesten der USA in den letzten 24 Jahren und bis heute die letzte Weltausstellung in Nordamerika."
ron_world_fair_news.87.a:1 "OK"

ron_world_fair_news.89.t:0 "Weltausstellung 88"
ron_world_fair_news.89.d:0 "Die Weltausstellung 1988, auch Expo 88 genannt, war eine Sonderausstellung, die sechs Monate lang vom 30. April 1988 bis einschließlich Sonntag, 30. Oktober 1988, in Brisbane, der Hauptstadt des australischen Bundesstaates Queensland, stattfand. Das Thema der Expo war „Freizeit im Zeitalter der Technologie“, und das Maskottchen der Expo war ein australisches Schnabeltier namens Expo Oz."
ron_world_fair_news.89.a:1 "OK"

ron_world_fair_news.92.t:0 "Expo Sevilla &#39;92"
ron_world_fair_news.92.d:0 "Die Weltausstellung Sevilla (Expo &#39;92) fand von Montag, dem 20. April, bis Montag, dem 12. Oktober 1992, auf der Isla de La Cartuja (Kartuja-Insel) in Sevilla, Spanien, statt. Das Thema der Expo war „Das Zeitalter der Entdeckungen“ und feierte den 500. Jahrestag der Ankunft von Christoph Kolumbus auf dem amerikanischen Kontinent nach seiner Ausfahrt vom Hafen Sevillas (am Guadalquivir). Über 100 Länder waren vertreten. Die Gesamtfläche der Expo betrug 215 Hektar (531 Acres) und die Gesamtzahl der Besucher lag bei 41.814.571 (laut der Website des Bureau International des Expositions (BIE)). Die Ausstellung lief zeitgleich mit der kleineren und kürzeren Genua Expo &#39;92, einer Fachausstellung, die in der Geburtsstadt von Christoph Kolumbus stattfand."
ron_world_fair_news.92.a:1 "OK"

ron_world_fair_news.93.t:0 "Expo Genua &#39;92"
ron_world_fair_news.93.d:0 "L&#39;Esposizione Internazionale Specializzata Genova &#39;92 – Colombo &#39;92 (auf Englisch Internationale Ausstellung Genua &#39;92 – Colombo &#39;92) oder informeller Expo 1992, fand vom 15. Mai bis 15. August 1992 in Genua, Italien, statt. Das Thema war „Christoph Kolumbus, das Schiff und das Meer“, und der Zeitpunkt der Expo war so gewählt, dass 500 Jahre seit der Entdeckung Amerikas durch den genuesischen Seefahrer Christoph Kolumbus gefeiert wurden. Wegen des Themas war die Expo auch als Colombiadi bekannt. Es war eine spezialisierte Ausstellung mit 54 vertretenen Ländern. Insgesamt kamen 694.800 Besucher. Die Ausstellung fand zur gleichen Zeit statt wie die größere und länger dauernde Expo &#39;92 in Sevilla, eine Weltausstellung, die in der Stadt stattfand, von deren Hafen (am Guadalquivir) Kolumbus 1492 in See gestochen war."
ron_world_fair_news.93.a:1 "OK"

ron_world_fair_news.94.t:0 "Expo &#39;93"
ron_world_fair_news.94.d:0 "Die Taejon Expo &#39;93 war eine dreimonatige internationale Ausstellung, die vom 7. August 1993 bis 7. November 1993 in der südkoreanischen Stadt Daejeon stattfand. Das Thema der Ausstellung war „Die Herausforderung eines neuen Entwicklungsweges“, ergänzt durch verschiedene Unterthemen rund um nachhaltige und „grüne“ Entwicklung. Die Ausstellung war eine offiziell anerkannte Sonderausstellung des Bureau International des Expositions (BIE) zum hundertsten Jahrestag der ersten Vertretung Koreas auf einer Weltausstellung, nämlich der Columbian Exposition of Chicago 1893. Sie galt als die erste Ausstellung in einem Entwicklungsland, obwohl sowohl die vom BIE genehmigte Exposition internationale du bicentenaire de Port-au-Prince 1949 als auch die Expo 2010 in Shanghai diesen Titel für sich beanspruchen könnten."
ron_world_fair_news.94.a:1 "OK"

ron_world_fair_news.99.t:0 "Expo &#39;98"
ron_world_fair_news.99.d:0 "Die Expo &#39;98 (Weltausstellung 1998 in Lissabon) war eine offizielle Weltausstellung, die vom Freitag, dem 22. Mai, bis Mittwoch, dem 30. September 1998, in Lissabon, Portugal, stattfand. Das Thema der Ausstellung lautete „Die Ozeane, ein Erbe für die Zukunft“ und sollte unter anderem an 500 Jahre portugiesischer Entdeckungen erinnern. Die Expo verzeichnete in 132 Tagen rund 11 Millionen Besucher. 143 Länder und zahlreiche Organisationen waren vertreten."
ron_world_fair_news.99.a:1 "OK"

ron_world_fair_news.100.t:0 "Weltgartenbauausstellung"
ron_world_fair_news.100.d:0 "Die Weltgartenbauausstellung 1999 war eine vom Bureau International des Expositions (BIE) anerkannte internationale Gartenbauausstellung der Kategorie A1. Sie wurde unter der Schirmherrschaft der International Association of Horticultural Producers organisiert und fand in Kunming, China, statt. Das Thema der Ausstellung lautete „Mensch und Natur auf dem Weg ins 21. Jahrhundert“."
ron_world_fair_news.100.a:1 "OK"

ron_world_fair_news.101.t:0 "Expo 2000"
ron_world_fair_news.101.d:0 "Die Expo 2000 war eine Weltausstellung, die vom 1. Juni bis 31. Oktober 2000 in Hannover stattfand. Sie fand auf dem Messegelände Hannover statt, dem größten Ausstellungsgelände der Welt. Ursprünglich wurden rund 40 Millionen Besucher erwartet. Da jedoch weniger als die Hälfte dieser Besucherzahl erreicht wurde, war die Expo ein Flop und ein finanzieller Misserfolg."
ron_world_fair_news.101.a:1 "OK"

ron_world_fair_news.103.t:0 "Expo.02"
ron_world_fair_news.103.d:0 "Die Expo.02 war die 6. Schweizer Landesausstellung und fand vom 15. Mai bis 20. Oktober 2002 rund um den Neuenburgersee, den Bielersee und den Murtensee statt. Sie war in fünf Standorte unterteilt, die aufgrund ihrer Nähe zum Wasser Arteplages genannt wurden (einige Standorte waren sogar teilweise oder ganz auf dem Wasser gebaut). Die fünf Arteplages befanden sich in Neuenburg, Yverdon-les-Bains, Murtensee und Bielersee sowie auf einem mobilen Lastkahn, der von einem Standort zum anderen fuhr. Der Lastkahn repräsentierte den Kanton Jura, der keinen Zugang zu einem der drei Seen hat."
ron_world_fair_news.103.a:1 "OK"

ron_world_fair_news.105.t:0 "Universelles Forum der Kulturen"
ron_world_fair_news.105.d:0 "Das Universal Forum of Cultures 2004 war eine 141-tägige internationale Veranstaltung, die vom 9. Mai bis 26. September 2004 im Centre de Convencions Internacional de Barcelona (CCIB) und den umliegenden Veranstaltungsorten in Barcelona, Spanien, stattfand. Es war die erste Ausgabe des Universal Forum of Cultures. Der für die Veranstaltung genutzte Freiraum ist heute ein öffentlicher Park namens Parc del Fòrum."
ron_world_fair_news.105.a:1 "OK"

ron_world_fair_news.106.t:0 "Expo 2005"
ron_world_fair_news.106.d:0 "Die Expo 2005 war eine Weltausstellung, die 185 Tage lang von Freitag, dem 25. März, bis Sonntag, dem 25. September 2005, in der japanischen Präfektur Aichi, östlich der Stadt Nagoya, stattfand. Japan war bereits Gastgeber der Expo &#39;70 Osaka (Weltausstellung), der Expo &#39;75 Okinawa (Spezialausstellung), der Expo &#39;85 Tsukuba (Spezialausstellung) und der Expo &#39;90 Osaka (Gartenbauausstellung) und wird 2025 Osaka (Weltausstellung) ausrichten."
ron_world_fair_news.106.a:1 "OK"

ron_world_fair_news.109.t:0 "Expo 2008"
ron_world_fair_news.109.d:0 "Die Expo 2008 war eine internationale Ausstellung, die vom Samstag, 14. Juni, bis Sonntag, 14. September 2008, in Saragossa, Spanien, zum Thema „Wasser und nachhaltige Entwicklung“ stattfand. Die Ausstellung fand in einer Flussschleife des Ebro statt. Sie wurde vom Bureau International des Expositions koordiniert, der Organisation, die für die Genehmigung von Weltausstellungen zuständig ist."
ron_world_fair_news.109.a:1 "OK"

ron_world_fair_news.111.t:0 "Expo 2010"
ron_world_fair_news.111.d:0 "Die Expo 2010, offiziell Expo 2010 Shanghai China, fand vom 1. Mai bis 31. Oktober 2010 an beiden Ufern des Huangpu-Flusses in Shanghai, China, statt. Es war eine große, vom Bureau International des Expositions (BIE) registrierte Weltausstellung in der Tradition internationaler Messen und Ausstellungen, die erste seit 2005. Das Thema der Ausstellung lautete „Bessere Stadt – besseres Leben“ und symbolisiert Shanghais neuen Status als „nächste große Weltstadt“ im 21. Jahrhundert. Das Emblem der Expo zeigt das so abgewandelte chinesische Schriftzeichen, das drei Personen darstellt, sowie das Datum 2010. Es war die größte Zahl teilnehmender Länder und die teuerste Expo in der Geschichte der Weltausstellungen. Die Weltausstellung in Shanghai war mit 5,28 Quadratkilometern zudem das größte Weltausstellungsgelände aller Zeiten."
ron_world_fair_news.111.a:1 "OK"

ron_world_fair_news.113.t:0 "Expo 2012"
ron_world_fair_news.113.d:0 "Die Expo 2012 Yeosu Korea war eine vom Bureau International des Expositions (BIE) anerkannte internationale Ausstellung in Yeosu, Südkorea. Sie wurde am 12. Mai 2012 eröffnet und lief bis zum 12. August 2012. Das Thema der Expo war „Der lebendige Ozean und die Küste“ mit den Unterthemen „Erhaltung und nachhaltige Entwicklung des Ozeans und der Küste“, „Neue Ressourcentechnologie“ und „Kreative Meeresaktivitäten“. 105 Länder und internationale Organisationen nahmen teil, und 8.203.956 Besucher kamen."
ron_world_fair_news.113.a:1 "OK"

ron_world_fair_news.116.t:0 "Expo 2015"
ron_world_fair_news.116.d:0 "Die Expo 2015 war eine Weltausstellung in Mailand, Italien. Sie begann am 1. Mai um 10:00 Uhr MESZ und endete am 31. Oktober. Nach der Mailänder Weltausstellung 1906 war Mailand damit zum zweiten Mal Gastgeber einer Ausstellung. Die Generalversammlung des Bureau International des Expositions (BIE) in Paris entschied am 31. März 2008 für Mailand. Am 23. November 2010 gab das BIE die Veranstaltung bekannt. Das Thema der Expo 2015 lautete „Den Planeten ernähren, Energie fürs Leben“."
ron_world_fair_news.116.a:1 "OK"

ron_world_fair_news.118.t:0 "Expo 2017"
ron_world_fair_news.118.d:0 "Die Expo 2017 Astana war eine Weltausstellung, die vom 10. Juni bis 10. September 2017 in Astana, dem heutigen Nur-Sultan, Kasachstan, stattfand. Das Thema der Expo war „Energie der Zukunft“ und zielte darauf ab, eine globale Debatte zwischen Ländern, Nichtregierungsorganisationen, Unternehmen und der breiten Öffentlichkeit über die entscheidende Frage anzustoßen: „Wie gewährleisten wir einen sicheren und nachhaltigen Zugang zu Energie für alle und reduzieren gleichzeitig die CO2-Emissionen?“"
ron_world_fair_news.118.a:1 "OK"

ron_world_fair_news.120.t:0 "Expo 2019"
ron_world_fair_news.120.d:0 "Die Expo 2019 war eine Weltgartenbauausstellung des Bureau International des Expositions und fand im Bezirk Yanqing in Peking, Volksrepublik China, statt. Die Expo 2016 in Antalya, Türkei, war die Vorgängerausstellung. Die Ausstellung begann am 29. April 2019 und endete am 7. Oktober 2019. Das Gelände ist 503 Hektar groß, und es wurden 16 Millionen Besucher erwartet."
ron_world_fair_news.120.a:1 "OK"


ron_coupscountry.x.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.x.d:0 "Was werden wir tun?"
ron_coupscountry.x.a:1 "Friedlicher Übergang"
ron_coupscountry.x.b:1 "Vernichte die Rebellen"

## Coups

ron_coupscountry.1.t:0 "Mai-Putsch"
ron_coupscountry.1.d:0 "Der Maiputsch war ein Staatsstreich, bei dem der serbische König Alexander Obrenović und seine Gemahlin, Königin Draga, in der Nacht vom 10. auf den 11. Juni 1903 im Königspalast in Belgrad ermordet wurden. Dieser Akt führte zum Aussterben der Obrenović-Dynastie, die das Königreich Serbien seit Mitte des 19. Jahrhunderts regiert hatte. Die Ermordung des Königspaares wurde von einer Gruppe von Armeeoffizieren unter der Führung des damaligen Hauptmanns Dragutin Dimitrijević Apis organisiert. Nach dem Maiputsch ging der serbische Thron von der rivalisierenden Karađorđević-Dynastie an Peter I. über. Was werden wir tun?"
ron_coupscountry.1.a:1 "Lang lebe der König"

ron_coupscountry.2.t:0 "Juan Vicente Gomez führt einen Putsch durch"
ron_coupscountry.2.d:0 "1908 war Präsident Cipriano Castro zu krank, um in Venezuela geheilt zu werden, und reiste nach Deutschland ab. Juan Vicente Gómez übernahm die Regierung. Castro war erst bis zu den Äußeren Antillen vorgedrungen, als Gómez die Regierung übernahm und Castro die Rückkehr verbot. Dies war der Beginn eines Regimes, das bis 1935 andauerte und eng mit der frühen Entwicklung der Ölindustrie verbunden ist, die die Geschichte Venezuelas maßgeblich geprägt hat. Was werden wir tun?"
ron_coupscountry.2.a:1 "So sei es"

ron_coupscountry.3.t:0 "Goudi-Putsch"
ron_coupscountry.3.d:0 "Der Goudi-Putsch war ein Militärputsch, der in der Nacht des 28. August 1909 in Griechenland stattfand und in der Kaserne von Goudi, einem Stadtteil am östlichen Stadtrand von Athen, seinen Ausgang nahm. Der Putsch war ein Schlüsselereignis in der modernen griechischen Geschichte, da er zur Ankunft von Eleftherios Venizelos in Griechenland und seiner Ernennung zum Premierminister führte. Mit einem Schlag beendete er das alte politische System und leitete eine neue Ära ein. Von da an und für mehrere Jahrzehnte wurde das griechische politische Leben von zwei gegensätzlichen Kräften dominiert: dem liberalen, republikanischen Venizelismus und dem konservativen, monarchistischen Anti-Venizelismus. Was werden wir tun?"
ron_coupscountry.3.a:1 "Ernennung von Venizelos zum Premierminister"
ron_coupscountry.3.b:1 "Zerschmettert die Meuterer"

ron_coupscountry.4.t:0 "Überfall auf die Hohe Pforte"
ron_coupscountry.4.d:0 "Der osmanische Staatsstreich von 1913, auch bekannt als der Überfall auf die Hohe Pforte, war ein Staatsstreich im Osmanischen Reich, der von Mitgliedern des Komitees für Einheit und Fortschritt (KUP) unter der Führung von Ismail Enver Bey und Muhammad Talaat Bey durchgeführt wurde. Die Gruppe führte einen Überraschungsangriff auf die zentralen Regierungsgebäude des Osmanischen Reiches, die Hohe Pforte, durch. Während des Putsches wurde der Generalstabschef der Armee, Nazım Pascha, ermordet und der Großwesir, Kâmil Pascha, zum Rücktritt gezwungen. Nach dem Putsch fiel die Regierung in die Hände des KUP, nun unter der Führung des Triumvirats der „Drei Paschas“, bestehend aus Enver, Talaat und Djemal Pascha. Was werden wir tun?"
ron_coupscountry.4.a:1 "Ernennung von Enver Pascha zum Kriegsminister"
ron_coupscountry.4.b:1 "Vernichte die Rebellen"

ron_coupscountry.5.t:0 "Lij Iyasu abgesetzt!"
ron_coupscountry.5.d:0 "Der äthiopische Adel war mit der Herrschaft Kaiser Iyasus V. unzufrieden. Als Iyasu schließlich den wichtigen religiösen Feiertag Meskel in der Hauptstadt Addis Abeba nicht beging und stattdessen in der überwiegend muslimischen Stadt Harar blieb, beschloss man zuzuschlagen. 17 Tage später, am 27. September, trafen sich mehrere Adlige und überzeugten Abuna Mattewos, Iyasu zu exkommunizieren, da er zum Islam konvertiert sei. Anschließend verkündeten sie auf den Stufen des Palastes, Iyasus Absetzung zugunsten von Kaiserin Zawditu sei erfolgt. Was sollen wir tun?"
ron_coupscountry.5.a:1 "Lang lebe die Königin"

ron_coupscountry.6.t:0 "Kaiserreich China"
ron_coupscountry.6.d:0 "Das Kaiserreich China war ein kurzlebiger Versuch des Staatsmannes und Generals Yuan Shikai, von Ende 1915 bis Anfang 1916 die Monarchie in China wiederherzustellen, mit sich selbst als Kaiser von Hongxian. Der Versuch scheiterte; er warf die chinesische republikanische Sache um viele Jahre zurück und spaltete China in eine Zeit des Konflikts zwischen verschiedenen lokalen Kriegsherren. Was werden wir tun?"
ron_coupscountry.6.a:1 "Lang lebe der Kaiser!"
ron_coupscountry.6.b:1 "Ist er verrückt geworden?"

ron_coupscountry.7.t:0 "Federico Tinoco hat einen Putsch gestartet"
ron_coupscountry.7.d:0 "Der Staatsstreich in Costa Rica vom 27. Januar 1917 war ein Bruch mit der verfassungsmäßigen Ordnung der Republik Costa Rica. Der verfassungsmäßige Präsident Alfredo González Flores wurde von seinem Kriegs- und Marineminister Federico „Pelico“ Tinoco und seinem Bruder und Armeekommandeur José Joaquín Tinoco gestürzt. Der Putsch wurde von der costa-ricanischen Oligarchie unterstützt – hauptsächlich von Bankiers und Kaffeebauern – und war von González&#39; Steuerreform betroffen, die insbesondere eine höhere Steuerlast für das Großkapital vorsah. González genoss keine öffentliche Unterstützung, da er vom Kongress ernannt und nicht in offenen Wahlen gewählt worden war. Was sollen wir tun?"
ron_coupscountry.7.a:1 "Macht übergeben"
ron_coupscountry.7.b:1 "Vernichte die Rebellen"

ron_coupscountry.8.t:0 "Admiral Kolchak hat einen Putsch gestartet"
ron_coupscountry.8.d:0 "Am 18. November 1918 wurden die in Omsk anwesenden Direktoriumsmitglieder verhaftet. Der Ministerrat verkündete die Übernahme der gesamten Obergewalt und beschloss anschließend, diese einer Person zu übertragen, der er den Titel des Obersten Führers verlieh. Admiral Alexander Koltschak wurde in geheimer Abstimmung für diesen Posten in den Ministerrat gewählt. Der Admiral nahm das Angebot an und verkündete die Übernahme des Ranges des Oberbefehlshabers. Eine neue russische Regierung wurde gebildet, die als Omsker Regierung oder Koltschak-Regierung in die Geschichte einging und bis zum 4. Januar 1920 existierte. Was werden wir tun?"
ron_coupscountry.8.a:1 "Er wird uns zur Herrlichkeit führen"
ron_coupscountry.8.b:1 "Vernichte die Rebellen"

ron_coupscountry.9.t:0 "Alvaro Obregon hat einen Putsch gestartet"
ron_coupscountry.9.d:0 "1920 zettelte Obregón einen Aufstand gegen Carranza an, bei dem dieser ermordet wurde. Die darauffolgenden Wahlen gewann Obregón mit überwältigender Mehrheit. Obregóns Präsidentschaft war die erste stabile Präsidentschaft seit Beginn der Revolution 1910. Er führte eine umfassende Bildungsreform durch (die mexikanische Muralistik erlebte eine Blütezeit), eine moderate Landreform und Arbeitsgesetze, die vom immer mächtiger werdenden Regionalverband der mexikanischen Arbeiter unterstützt wurden. Was werden wir tun?"
ron_coupscountry.9.a:1 "Friedlicher Übergang"
ron_coupscountry.9.b:1 "Vernichte die Rebellen"

ron_coupscountry.10.t:0 "Kapp-Putsch"
ron_coupscountry.10.d:0 "Der Kapp-Putsch, auch bekannt als Kapp-Lüttwitz-Putsch, benannt nach seinen Anführern Wolfgang Kapp und Walther von Lüttwitz, war ein Putschversuch in Berlin am 13. März 1920. Sein Ziel war es, die Deutsche Revolution von 1918–1919 rückgängig zu machen, die Weimarer Republik zu stürzen und an ihrer Stelle eine autokratische Regierung zu installieren. Der Putsch wurde von Teilen der Reichswehr sowie nationalistischen und monarchistischen Fraktionen unterstützt. Die legitime deutsche Regierung musste aus der Stadt fliehen. Der Putsch scheiterte nach wenigen Tagen, als große Teile der deutschen Bevölkerung einem Aufruf der Regierung zu einem Generalstreik folgten. Die meisten Beamten weigerten sich, mit Kapp und seinen Verbündeten zusammenzuarbeiten. Trotz seines Scheiterns hatte der Putsch erhebliche Folgen für die Zukunft der Weimarer Republik. Was werden wir tun?"
ron_coupscountry.10.a:1 "Friedlicher Übergang"
ron_coupscountry.10.b:1 "Vernichte die Rebellen"

ron_coupscountry.11.t:0 "Reza Khan hat einen Putsch gestartet"
ron_coupscountry.11.d:0 "Der persische Staatsstreich von 1921, im Iran als 3. Esfand 1299-Staatsstreich bekannt, bezieht sich auf mehrere wichtige Ereignisse in Persien im Jahr 1921, die schließlich 1925 zur Etablierung der Pahlavi-Dynastie als Herrscherhaus des Landes führten. Die Ereignisse begannen mit einem Putsch der persischen Kosakenbrigade unter Führung von Reza Khan und unter britischer Leitung am 21. Februar 1921. Was werden wir tun?"
ron_coupscountry.11.a:1 "Friedlicher Übergang"
ron_coupscountry.11.b:1 "Vernichte die Rebellen"

ron_coupscountry.12.t:0 "Septemberrevolution 1922"
ron_coupscountry.12.d:0 "Die griechische Armee war gerade im Kleinasienfeldzug besiegt und aus Anatolien auf die griechischen Inseln in der östlichen Ägäis evakuiert worden. Die Unzufriedenheit der mittleren Offiziere und Mannschaften über die Führung des Feldzugs durch die königliche Regierung kochte über und führte zu einem bewaffneten Aufstand unter der Führung provenizelistischer und antiroyalistischer Offiziere. Die Meuterei breitete sich schnell aus und übernahm die Macht in Athen. König Konstantin I. wurde zur Abdankung und zum Verlassen des Landes gezwungen. Eine Militärregierung regierte das Land bis Anfang 1924, kurz bevor die griechische Monarchie abgeschafft und die Zweite Hellenische Republik gegründet wurde. Was werden wir tun?"
ron_coupscountry.12.a:1 "Friedlicher Übergang"
ron_coupscountry.12.b:1 "Friedlicher Übergang"
ron_coupscountry.12.c:1 "Vernichte die Rebellen"
ron_coupscountry.12.e:1 "Vernichte die Rebellen"

ron_coupscountry.13.t:0 "Marsch auf Rom"
ron_coupscountry.13.d:0 "Der Marsch auf Rom war eine organisierte Massendemonstration im Oktober 1922, die zur Machtübernahme von Benito Mussolinis Nationalfaschistischer Partei (Partito Nazionale Fascista, PNF) im Königreich Italien (Regno d&#39;Italia) führte. Ende Oktober 1922 planten die Führer der Faschistischen Partei einen Aufstand, der am 28. Oktober stattfinden sollte. Als faschistische Truppen in Rom einmarschierten, wollte Ministerpräsident Luigi Facta den Belagerungszustand verhängen, doch König Viktor Emanuel III. widersprach diesem. Am folgenden Tag, dem 29. Oktober 1922, ernannte der König Mussolini zum Ministerpräsidenten und übergab damit die politische Macht ohne bewaffneten Konflikt an die Faschisten. Was werden wir tun?"
ron_coupscountry.13.a:1 "Viva Il Duce!"
ron_coupscountry.13.b:1 "Zerschmettert die Faschisten"

ron_coupscountry.14.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.14.d:0 "Mit Unterstützung von König Alfons XIII. und der Armee führte Primo de Rivera am 13. September 1923 einen von Mussolini inspirierten Militärputsch an. Er wurde vom König zum Premierminister ernannt. Er versprach, die Korruption zu beseitigen und Spanien zu regenerieren. Zu diesem Zweck setzte er die Verfassung außer Kraft, verhängte das Kriegsrecht, führte ein strenges Zensursystem ein und beendete das Turno-System (Beutesystem) der wechselnden Parteien. Primo de Rivera sagte zunächst, er würde nur 90 Tage regieren, entschied sich jedoch, an der Macht zu bleiben. Es fanden kaum Sozialreformen statt, aber er versuchte, die Arbeitslosigkeit durch Ausgaben für öffentliche Arbeiten zu senken. Um dies zu finanzieren, führte Primo de Rivera höhere Steuern für die Reichen ein. Als diese sich beschwerten, änderte er seine Politik und versuchte, Geld durch öffentliche Kredite aufzutreiben. Dies führte zu einer rapiden Inflation und nachdem er die Unterstützung der Armee verloren hatte, wurde er im Januar 1930 zum Rücktritt gezwungen. Nach seinem Tod spielte sein Sohn, José Antonio Primo de Rivera, eine wichtige Rolle bei der Entwicklung des Faschismus in Spanien. Unter Primo de Riveras Herrschaft wurde Francisco Franco zum General befördert, der jüngste Mann in diesem hohen Rang in Europa. Was werden wir tun?"
ron_coupscountry.14.a:1 "Friedlicher Übergang"
ron_coupscountry.14.b:1 "Vernichte die Rebellen"

ron_coupscountry.15.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.15.d:0 "Der bulgarische Staatsstreich von 1923, auch bekannt als der Putsch vom 9. Juni, war ein Staatsstreich in Bulgarien, der von den Streitkräften unter General Ivan Valkovs Militärunion am Vorabend des 9. Juni 1923 durchgeführt wurde. Zögerlich durch ein Dekret von Zar Boris III. von Bulgarien legitimiert, stürzte er die Regierung der Bulgarischen Nationalen Agrarunion unter Alexander Stambolijski und ersetzte sie durch eine Regierung unter Alexander Zankow. Was werden wir tun?"
ron_coupscountry.15.a:1 "Friedlicher Übergang"
ron_coupscountry.15.b:1 "Vernichte die Rebellen"

ron_coupscountry.16.t:0 "Bierhallenputsch"
ron_coupscountry.16.d:0 "The Beer Hall Putsch, also known as the Munich Putsch and, in German, as the Hitlerputsch, Hitler–Ludendorff-Putsch, Bürgerbräu-Putsch or Marsch auf die Feldherrnhalle ('March on the Field Marshals' Hall'), was a failed coup d'état by the Nazi Party (NSDAP) leader Adolf Hitler—along with Generalquartiermeister Erich Ludendorff and other Kampfbund leaders—to seize power in Munich, Bavaria, which took place on 8–9 November 1923. Approximately two thousand Nazis were marching to the Feldherrnhalle, in the city centre, when they were confronted by a police cordon, which resulted in the deaths of 16 Nazi party members and four police officers. What will we do?"
ron_coupscountry.16.a:1 "Friedlicher Übergang"
ron_coupscountry.16.b:1 "Vernichte die Rebellen"

ron_coupscountry.17.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.17.d:0 "Am 5. September 1924 forderte eine Gruppe junger Offiziere unter Führung von Oberst Marmaduque Grove und Major Carlos Ibáñez del Campo infolge des als „Säbellärm“ bekannten Vorfalls von Präsident Arturo Alessandri die Entlassung dreier seiner Minister, darunter des Kriegsministers, die Verabschiedung eines Arbeitsgesetzes, eines Einkommensteuergesetzes und die Verbesserung der Militärgehälter. Alessandri hatte keine andere Wahl, als General Altamirano, den damaligen Oberbefehlshaber der Armee, zum Innenminister zu ernennen und ein neues Kabinett zu leiten. Am 8. September erschien General Altamirano vor dem Kongress und forderte die Verabschiedung von acht Gesetzen, darunter Alessandris Arbeitsgesetz und den Einkommensteuerentwurf. Der Kongress wagte nicht zu protestieren und die Gesetze wurden innerhalb weniger Stunden verabschiedet. Zu diesem Zeitpunkt hatte Alessandri das Gefühl, nur noch eine Marionette des Militärs zu sein. Am 9. September trat er zurück und beantragte Asyl bei der US-Botschaft. General Altamirano wurde Vizepräsident (ein Amt, das laut chilenischer Verfassung in Abwesenheit eines Präsidenten dem Innenminister vorbehalten ist). Der Kongress lehnte Alessandris Rücktritt ab und gewährte ihm stattdessen einen sechsmonatigen verfassungsmäßigen Urlaub. Alessandri verließ das Land umgehend und ging nach Italien. Was sollen wir tun?"
ron_coupscountry.17.a:1 "Friedlicher Übergang"
ron_coupscountry.17.b:1 "Vernichte die Rebellen"

ron_coupscountry.18.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.18.d:0 "Der chilenische Staatsstreich von 1925 fand am 23. Januar 1925 statt, als das chilenische Militär die Septemberjunta stürzte. Unter der Führung von Oberst Marmaduque Grove verhafteten die Truppen den Präsidenten der Junta, General Luis Altamirano, und übergaben die Macht an General Pedro Dartnell als Interimspräsidenten. Die Organisatoren des Putsches hofften, den ehemaligen Präsidenten Arturo Alessandri Palma abberufen zu können, der nach der Machtübernahme der Septemberjunta ins Exil gezwungen worden war. General Dartnell weigerte sich jedoch, allein zu regieren und bildete wenige Tage später die Januarjunta, die er an Emilio Bello Codesido übergab. Alessandri kehrte erst am 20. März 1925 aus dem Exil zurück und beendete die Junta. Was werden wir tun?"
ron_coupscountry.18.a:1 "Friedlicher Übergang"
ron_coupscountry.18.b:1 "Vernichte die Rebellen"

ron_coupscountry.19.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.19.d:0 "Im Juni 1925 führte Pangalos einen unblutigen Putsch durch. Seine Machtübernahme wurde von der Nationalversammlung anerkannt und zum Premierminister ernannt. Als „konstitutioneller Diktator“ regierte er das Land bis zu seinem Sturz im August 1926. Von April 1926 bis zu seiner Absetzung war er zudem Präsident der Republik. Was werden wir tun?"
ron_coupscountry.19.a:1 "Friedlicher Übergang"
ron_coupscountry.19.b:1 "Friedlicher Übergang"
ron_coupscountry.19.c:1 "Vernichte die Rebellen"
ron_coupscountry.19.e:1 "Vernichte die Rebellen"

ron_coupscountry.20.t:0 "Der Mai-Putsch"
ron_coupscountry.20.d:0 "Der Maiputsch war ein Staatsstreich, den Marschall Józef Piłsudski zwischen dem 12. und 14. Mai 1926 in Polen durchführte. Der Putsch stürzte die demokratisch gewählte Regierung von Präsident Stanisław Wojciechowski und Premierminister Wincenty Witos. Eine neue Regierung unter dem Professor des Polytechnikums in Lemberg, Kazimierz Bartel, wurde eingesetzt. Die Ereignisse waren teilweise durch die Notwendigkeit außergewöhnlicher Maßnahmen angesichts neu auftretender Bedrohungen für die Stabilität der polnischen Unabhängigkeit motiviert. Piłsudskis eigene Einschätzung der Verträge, die die Weimarer Republik 1925 mit Frankreich (in denen sie Polen im Wesentlichen fallenließ) und im April 1926 mit der Sowjetunion unterzeichnet hatte, zu denen polnische Vertreter nicht eingeladen worden waren, bedingte dies. Was werden wir tun?"
ron_coupscountry.20.a:1 "Friedlicher Übergang"
ron_coupscountry.20.b:1 "Vernichte die Rebellen"

ron_coupscountry.21.t:0 "Revolution vom 28. Mai"
ron_coupscountry.21.d:0 "Der Staatsstreich vom 28. Mai 1926, auch 28.-Mai-Revolution oder während des autoritären Estado Novo Nationale Revolution genannt, war ein Militärputsch nationalistischen Ursprungs, der die instabile Erste Portugiesische Republik beendete und 48 Jahre autoritärer Herrschaft in Portugal einleitete. Das unmittelbar aus dem Putsch hervorgegangene Regime, die Ditadura Nacional (Nationale Diktatur), wurde später zum Estado Novo (Neuer Staat) umgestaltet, der wiederum bis zur Nelkenrevolution 1974 bestehen sollte. Was werden wir tun?"
ron_coupscountry.21.a:1 "Friedlicher Übergang"
ron_coupscountry.21.b:1 "Vernichte die Rebellen"

ron_coupscountry.22.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.22.d:0 "Der litauische Staatsstreich von 1926 war ein Militärputsch in Litauen, der zur Ersetzung der demokratisch gewählten Regierung durch eine konservative, autoritäre Regierung unter Antanas Smetona führte. Der Putsch fand am 17. Dezember 1926 statt und wurde größtenteils vom Militär organisiert; Smetonas Rolle ist bis heute umstritten. Der Putsch brachte die Litauische Nationalistische Union, die damals konservativste Partei, an die Macht. Vor 1926 war sie eine relativ neue und unbedeutende nationalistische Partei gewesen; ihre Mitgliederzahl betrug etwa 2.000, und sie hatte bei den Parlamentswahlen nur drei Sitze gewonnen. Die Litauische Christdemokratische Partei, damals die größte Partei im Seimas, kollaborierte mit dem Militär und verlieh dem Putsch verfassungsmäßige Legitimität, übernahm jedoch keine wichtigen Posten in der neuen Regierung und zog sich im Mai 1927 zurück. Nachdem das Militär die Macht an die Zivilregierung übergeben hatte, spielte sie keine direkte Rolle mehr im politischen Leben. Was werden wir tun?"
ron_coupscountry.22.a:1 "Friedlicher Übergang"
ron_coupscountry.22.b:1 "Vernichte die Rebellen"

ron_coupscountry.23.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.23.d:0 "Am 24. August 1926 stürzte Georgios Kondylis in einem unblutigen Putsch die Diktatur von Theodoros Pangalos, bildete eine Regierung und rief für November Wahlen aus. Bemerkenswerterweise nahm seine Partei nicht daran teil. Bei den Wahlen im August 1928 wählten die Wähler neun Kandidaten seiner Partei zu Abgeordneten, und er wurde in Kavala gewählt. Was werden wir tun?"
ron_coupscountry.23.a:1 "Friedlicher Übergang"

ron_coupscountry.24.t:0 "Die Kommunisten haben einen Putsch gestartet"
ron_coupscountry.24.d:0 "Der tuwinische Staatsstreich von 1929 ereignete sich in der Tuwinischen Volksrepublik. Er ereignete sich im Januar, nachdem die tuwinische Regierung unter Premierminister Donduk Kuular versucht hatte, nationalistische, religiöse und antisowjetische Maßnahmen umzusetzen, darunter die Einführung des tibetischen Buddhismus als Staatsreligion. Mit Unterstützung der Sowjetunion stürzten fünf tuwinische Jugendliche erfolgreich die Regierung, und einer von ihnen, Salchak Toka, wurde als Generalsekretär des Zentralkomitees der Tuwinischen Revolutionären Volkspartei oberster Herrscher. Sie machten Donduks Politik rasch rückgängig und führten die Republik näher an die Sowjetunion heran. Die Tuwinische Volksrepublik schloss sich später 1944 der Sowjetunion an. Was werden wir tun?"
ron_coupscountry.24.a:1 "Friedlicher Übergang"
ron_coupscountry.24.b:1 "Vernichte die Rebellen"

ron_coupscountry.25.t:0 "Die Revolution von 1930"
ron_coupscountry.25.d:0 "Die Revolution von 1930 war eine bewaffnete Bewegung in Brasilien, die von den Bundesstaaten Minas Gerais, Paraíba und Rio Grande do Sul angeführt wurde und in einem Putsch gipfelte. Die Revolution stürzte am 24. Oktober 1930 Präsident Washington Luís, verhinderte die Amtseinführung des gewählten Präsidenten Júlio Prestes und beendete die Alte Republik. Im Jahr 1929 brachen die Führer von São Paulo das Bündnis mit den Mineiros (d. h. Menschen aus dem Bundesstaat Minas Gerais), bekannt als „Kaffee-mit-Milch-Politik“ („política do café-com-leite“ auf Portugiesisch), und bezeichneten den Paulista Júlio Prestes als Kandidaten für die Präsidentschaft. Als Reaktion darauf unterstützte der Präsident von Minas Gerais, Antônio Carlos Ribeiro de Andrada, den Oppositionskandidaten aus dem Süden, Getúlio Vargas. Am 1. März 1930 fanden Präsidentschaftswahlen statt, aus denen der Regierungskandidat Júlio Prestes, Präsident des Bundesstaates São Paulo, siegte. Er trat sein Amt jedoch nicht an, da am 3. Oktober 1930 ein Putsch ausbrach; stattdessen wurde er ins Exil geschickt. Getúlio Vargas übernahm am 3. November 1930 die Führung der provisorischen Regierung, ein Datum, das das Ende der Alten Republik markiert. Was werden wir tun?"
ron_coupscountry.25.a:1 "Friedlicher Übergang"
ron_coupscountry.25.b:1 "Vernichte die Rebellen"

ron_coupscountry.26.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.26.d:0 "Oberstleutnant Luis Miguel Sanchez Cerro führte ab dem 22. August 1930 einen Militäraufstand gegen die Regierung in Arequipa an. Präsident Leguia Salcedo trat am 24. August 1930 zurück und eine Militärjunta unter der Führung von Oberstleutnant Sanchez Cerro übernahm am 27. August 1930 die Kontrolle über die Regierung. Was werden wir tun?"
ron_coupscountry.26.a:1 "In den Krieg ziehen"
ron_coupscountry.26.b:1 "Friedlicher Übergang"

ron_coupscountry.27.t:0 "Die Septemberrevolution"
ron_coupscountry.27.d:0 "Der argentinische Staatsstreich von 1930, von seinen Anhängern auch Septemberrevolution genannt, stürzte die argentinische Regierung von Hipólito Yrigoyen durch Truppen von General José Félix Uriburu. Der Putsch fand am 6. September 1930 statt, als Uriburu eine kleine Truppenabteilung in die Hauptstadt führte, ohne auf nennenswerten Widerstand zu stoßen und die Casa Rosada einzunehmen. In Buenos Aires versammelten sich große Menschenmengen zur Unterstützung des Putsches. Uriburus Truppen übernahmen die Hauptstadt und verhafteten Anhänger der Radikalen Bürgerunion. Der Putsch hatte keine Opfer zu beklagen. Was werden wir tun?"
ron_coupscountry.27.a:1 "In den Krieg ziehen"
ron_coupscountry.27.b:1 "Friedlicher Übergang"

ron_coupscountry.28.t:0 "Rafael Estrella hat eine Rebellion gestartet"
ron_coupscountry.28.d:0 "Im Februar 1930 brach in Santiago ein Aufstand oder Staatsstreich gegen den dominikanischen Präsidenten Horacio Vásquez aus. Trujillo schloss heimlich einen Deal mit dem Rebellenführer Rafael Estrella Ureña. Im Gegenzug dafür, dass Trujillo Estrella die Macht überließ, erlaubte Estrella Trujillo, bei Neuwahlen als Präsident zu kandidieren. Als die Rebellen auf Santo Domingo marschierten, befahl Vásquez Trujillo, sie niederzuschlagen. Trujillo täuschte jedoch „Neutralität“ vor und behielt seine Männer in den Kasernen, sodass Estrellas Rebellen die Hauptstadt praktisch ohne Widerstand einnehmen konnten. Am 3. März wurde Estrella zum amtierenden Präsidenten ernannt und Trujillo als Chef der Polizei und der Armee bestätigt. Gemäß ihrer Vereinbarung wurde Trujillo der Präsidentschaftskandidat der Patriotischen Bürgerkoalition (spanisch: Coalición patriotica de los ciudadanos), mit Estrella als seinem Vizepräsidenten. Die anderen Kandidaten wurden Zielscheibe von Schikanen durch die Armee. Als klar wurde, dass die Armee nur Trujillo ungehindert Wahlkampf machen lassen würde, zogen sich die anderen Kandidaten zurück. Schließlich wurde das Team Trujillo-Estrella mit unglaublichen 99 Prozent der abgegebenen Stimmen zum Sieger erklärt. In einer Mitteilung an das Außenministerium schrieb der amerikanische Botschafter Charles Boyd Curtis, Trujillo habe weit mehr Stimmen erhalten als die tatsächlichen Wähler. Was sollen wir tun?"
ron_coupscountry.28.a:1 "In den Krieg ziehen"
ron_coupscountry.28.b:1 "Friedlicher Übergang"

ron_coupscountry.29.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.29.d:0 "Die salvadorianischen Streitkräfte stürzten die Regierung des demokratisch gewählten Präsidenten Arturo Araujo, des Kandidaten der Arbeiterpartei. Während seiner Amtszeit war El Salvador mit politischen Spannungen und öffentlichen Unruhen konfrontiert. Auch Steuerreformen scheiterten am Widerstand der wohlhabenden Klasse. Der letzte Tropfen, der das Fass zum Überlaufen brachte, war ein Versuch, das Militärbudget zu kürzen, der auf heftigen Widerstand der Militäroffiziere stieß. Da die Regierung nicht in der Lage war, den Offizieren ihre Gehälter zu zahlen, putschte die Armee am 2. Dezember 1931 um 22 Uhr, um die Regierung Arturo Araujos zu stürzen. Die Militäroffiziere errichteten das Bürgerdirektorium als provisorische Regierung unter der Führung von General und ehemaligem Vizepräsidenten Maximiliano Hernández Martínez und Oberst Osmín Aguirre y Salinas. Was werden wir tun?"
ron_coupscountry.29.a:1 "In den Krieg ziehen"
ron_coupscountry.29.b:1 "Friedlicher Übergang"

ron_coupscountry.30.t:0 "Siamesische Revolution von 1932"
ron_coupscountry.30.d:0 "Die siamesische Revolution von 1932 oder der siamesische Staatsstreich von 1932 war ein Staatsstreich, der am 24. Juni 1932 in Thailand (Siam) stattfand. Die Revolution von 1932 wurde von der Khana Ratsadon („Volkspartei“), der ersten politischen Partei in Siam, ins Leben gerufen und von einer vergleichsweise kleinen Gruppe von Zivilisten und Militärs unter der Führung von Pridi Banomyong und Plaek Phibunsongkhram angeführt. Die Khana Ratsadon stürzte die Regierung von König Prajadhipok des Königreichs Rattanakosin als Reaktion auf innenpolitische Probleme sowie weltpolitische Strömungen und beendete damit fast 800 Jahre absolute Monarchie unter den Königen von Siam. Die Revolution von 1932 führte zu einem nahezu unblutigen Übergang Siams zu einem konstitutionellen Monarchiesystem, der Einführung der Demokratie und der ersten Verfassung Thailands, der Gründung der thailändischen Nationalversammlung und der Dominanz des Khana Ratsadon in der thailändischen Politik bis in die 1950er Jahre. Was werden wir tun?"
ron_coupscountry.30.a:1 "In den Krieg ziehen"
ron_coupscountry.30.b:1 "Friedlicher Übergang"

ron_coupscountry.31.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.31.d:0 "Der siamesische Staatsstreich vom Juni 1933 gilt als der erste erfolgreiche Sturz der verfassungsmäßigen Regierung durch das Militär in der thailändischen Geschichte. Der Putsch fand am 20. Juni 1933 in Bangkok friedlich statt. Angeführt wurde er von Oberst Phraya Phahol Pholphayuhasena gegen den Premierminister Phraya Manopakorn Nititada. Der Putsch war de facto ein Gegenputsch gegen die diktatorische Politik Phraya Manos, die aus der Krise um die Gelbe Karte resultierte. Was werden wir tun?"
ron_coupscountry.31.a:1 "In den Krieg ziehen"
ron_coupscountry.31.b:1 "Friedlicher Übergang"

ron_coupscountry.32.t:0 "Uruguayischer Selbstputsch"
ron_coupscountry.32.d:0 "Am 31. März 1933 führte er mit Unterstützung der Polizei (angeführt von seinem Schwager Alfredo Baldomir), der Armee und des Mehrheitssektors der Nationalen Partei (angeführt von Luis Alberto de Herrera) einen Staatsstreich durch. Das Parlament wurde aufgelöst, und er löste den Nationalen Verwaltungsrat auf, ein 1919 eingerichtetes Sonderorgan zur Kontrolle und zum Ausgleich der Machtverhältnisse. Bald darauf folgten die völlige Abschaffung der Verfassung, die Zensur der Presse und die Zusammenlegung der Staatsgewalt mit dem Präsidentenamt. Er setzte eine Regierung konservativen, autoritären und illiberalen Charakters ein, die sich gegen den Batllismo und die Linke richtete. 1934 erarbeitete er eine neue Verfassung, stellte sich zur Wahl und wurde unter dem Deckmantel des Misstrauens gewählt. Die durch den Putsch eingeleitete Periode wird als Terra-Diktatur bezeichnet. Was werden wir tun?"
ron_coupscountry.32.a:1 "In den Krieg ziehen"
ron_coupscountry.32.b:1 "Friedlicher Übergang"

ron_coupscountry.33.t:0 "Aufstand der Sergeanten"
ron_coupscountry.33.d:0 "Der Sergeantenaufstand, auch Kubanische Revolution von 1933 genannt, war ein Staatsstreich, der im September 1933 in Kuba stattfand. Er begann als Aufstand von Sergeanten und einfachen Soldaten, die sich bald mit studentischen Aktivisten des Directorio Estudiantil Universitario verbündeten. Der Putsch stürzte Carlos Manuel de Céspedes y Quesada als Präsident und setzte eine neue Regierung unter Führung einer Fünferkoalition ein, die als Pentarchie von 1933 bekannt wurde. Nach nur fünf Tagen machte die Pentarchie dem Präsidenten Ramón Grau Platz, dessen Amtszeit als Hundert-Tage-Regierung bekannt ist. Der Anführer des Aufstands, Sergeant Fulgencio Batista, wurde Oberbefehlshaber der Streitkräfte und leitete eine lange Periode einflussreichen Einflusses auf die kubanische Politik ein. Was werden wir tun?"
ron_coupscountry.33.a:1 "In den Krieg ziehen"
ron_coupscountry.33.b:1 "Friedlicher Übergang"

ron_coupscountry.34.t:0 "Geschäftsgrundstück"
ron_coupscountry.34.d:0 "Der Wirtschaftskomplott (auch bekannt als der Putsch im Weißen Haus) war eine angebliche politische Verschwörung im Jahr 1933 in den USA. Der pensionierte Generalmajor des Marine Corps, Smedley Butler, behauptete, reiche Geschäftsleute planten die Gründung einer faschistischen Veteranenorganisation mit Butler an der Spitze, um diese für einen Staatsstreich zum Sturz von Präsident Franklin D. Roosevelt zu nutzen. Nun scheinen die Gerüchte wahr zu sein, denn Butlers loyale Truppen haben das Weiße Haus umzingelt und Präsident Roosevelt ein Ultimatum gestellt."
ron_coupscountry.34.a:1 "Sturm auf das Weiße Haus"
ron_coupscountry.34.b:1 "Verhaften Sie die Verschwörer"

ron_coupscountry.35.t:0 "Die Ära des Schweigens"
ron_coupscountry.35.d:0 "In der aufgeladenen Atmosphäre, die 1934 in Europa herrschte, als Adolf Hitler zum allseits bewunderten populistischen Vorbild autoritärer Nationalisten geworden war, betrachteten die estnischen Eliten die Gefahr einer Machtübernahme durch ähnliche Gruppen wie die Vaps-Bewegung als glaubwürdig und unmittelbar bevorstehend. Päts nutzte die Autorität der neu verabschiedeten Verfassung von 1933 und verhängte am 12. März das Kriegsrecht. Er ernannte seinen vertrauten Kollegen Johan Laidoner, einen Helden des Unabhängigkeitskrieges, der aber ein Gegner der Vaps-Führung war, zum Oberbefehlshaber der Streitkräfte. Was werden wir tun?"
ron_coupscountry.35.a:1 "In den Krieg ziehen"
ron_coupscountry.35.b:1 "Friedlicher Übergang"

ron_coupscountry.36.t:0 "Lettischer Putsch 1934"
ron_coupscountry.36.d:0 "Der lettische Staatsstreich von 1934, in Lettland als Putsch vom 15. Mai oder Ulmanis-Putsch bekannt, war ein Selbstputsch des langjährigen Premierministers Kārlis Ulmanis gegen das parlamentarische System Lettlands. Sein Regime hielt bis zur sowjetischen Besetzung Lettlands 1940. In der Nacht vom 15. auf den 16. Mai übernahm Ulmanis mit Unterstützung von Kriegsminister Jānis Balodis und der paramilitärischen Organisation Aizsargi die Kontrolle über die wichtigsten Staats- und Parteibüros, rief in Lettland den Kriegszustand aus, setzte die Verfassung außer Kraft und löste alle politischen Parteien und die Saeima (das Parlament) auf. Ulmanis errichtete daraufhin ein exekutives, nichtparlamentarisches, autoritäres Regime, in dem er als Premierminister regierte. Die amtierende Regierung erließ weiterhin Gesetze. Der amtierende Präsident Lettlands, Alberts Kviesis, der dem lettischen Bauernverband Ulmanis angehörte, akzeptierte den Putsch und übte seine restliche Amtszeit bis zum 10. April 1936 aus. Ulmanis übernahm daraufhin widerrechtlich das Amt des Staatspräsidenten und wurde offiziell als „Präsident und Premierminister“ (Valsts un Ministru Prezidents; wörtlich „Staats- und Ministerpräsident“) bezeichnet, in Veröffentlichungen jedoch üblicherweise als „Führer des Volkes“ (Tautas Vadonis) oder einfach als „Führer“ (Vadonis). Was sollen wir tun?"
ron_coupscountry.36.a:1 "In den Krieg ziehen"
ron_coupscountry.36.b:1 "Friedlicher Übergang"

ron_coupscountry.37.t:0 "Juliputsch"
ron_coupscountry.37.d:0 "Der Juliputsch war ein gescheiterter Putschversuch österreichischer Nazis gegen das austrofaschistische Regime vom 25. bis 30. Juli 1934. Nur wenige Monate nach dem österreichischen Bürgerkrieg griffen österreichische Nazis und deutsche SS-Soldaten das Reichskanzleramt in Wien an, um die herrschende Vaterländische Frontregierung unter Engelbert Dollfuß zu stürzen und durch eine pro-nazistische Regierung unter Anton Rintelen von der Christlichsozialen Partei zu ersetzen. Der Naziputsch scheiterte letztendlich, da die Mehrheit der österreichischen Bevölkerung und Armee der Regierung treu blieb. Den Nazis gelang es, Dollfuß zu töten, aber Kurt Schuschnigg folgte ihm nach und das austrofaschistische Regime blieb an der Macht. Eine deutsche Invasion Österreichs zur Unterstützung des Putsches wurde abgewendet, weil Österreich vom faschistischen Italien seine Unabhängigkeit garantierte und diplomatische Unterstützung erhielt. Was werden wir tun?"
ron_coupscountry.37.a:1 "In den Krieg ziehen"
ron_coupscountry.37.b:1 "Friedlicher Übergang"

ron_coupscountry.38.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.38.d:0 "Der Volksblock, der seit 1934 an der Macht war, bestand aus der Demokratischen Partei, der Bulgarischen Nationalen Agrarunion (BANU) „Vrabcha 1“, der Nationalliberalen Partei und der Radikaldemokratischen Partei. Obwohl die restriktiven Gesetze der ehemaligen Regierung des Demokratischen Abkommens dadurch nicht abgeschafft wurden und sich die Arbeitsweise der Polizei nicht änderte, stieß der Putsch auf Feindseligkeit von rechten Kräften wie der Militärunion (angeführt von Damyan Velchev), Sweno und Aleksandar Zankows Volksbewegung, deren aktivste die Sweno-Aktivisten waren. Nach einem Kongress der Militärunion im November 1933 begannen die direkten Vorbereitungen für den Putsch. Die Verschwörer versuchten, die Unterstützung der BANU „Wrabtscha 1“, der BANU „Aleksandar Stambolijski“ und sogar der Demokratischen Partei zu gewinnen, jedoch vergeblich. Die Sweno-Aktivisten nutzten die Uneinigkeit im Volksblock im Frühjahr 1934 und führten am Vorabend des 19. Mai den Putsch durch, noch vor den Anhängern Aleksandar Zankows, die einen Putsch für den 20. Mai geplant hatten. Der Putsch setzte eine Regierung unter Kimon Georgiew ein, die neben Zu den Zveno-Mitgliedern zählten auch rechtsgerichtete Agrarier und Vertreter der Nationalsozialen Bewegung, während die wichtigsten Ministerposten von der Militärgewerkschaft besetzt wurden. Was werden wir tun?"
ron_coupscountry.38.a:1 "Friedlicher Übergang"

ron_coupscountry.39.t:0 "Referendum zur griechischen Monarchie"
ron_coupscountry.39.d:0 "1935 wurde Ministerpräsident Georgios Kondylis, ein ehemaliger Venizelos-treuer Offizier, zum mächtigsten Politiker Griechenlands. Am 10. Oktober zwang er Panagis Tsaldaris zum Rücktritt und übernahm die Regierung. Dabei setzte er zahlreiche Verfassungsbestimmungen außer Kraft. Kondylis, der sich inzwischen den Konservativen angeschlossen hatte, beschloss ein Referendum zur Wiederherstellung der Monarchie, obwohl er einst dem antimonarchistischen Flügel der griechischen Politik angehörte. Was sollen wir tun?"
ron_coupscountry.39.a:1 "Lang lebe Georg II.!"
ron_coupscountry.39.b:1 "Griechenland soll eine Republik bleiben"

ron_coupscountry.40.t:0 "Das Regime des 4. August"
ron_coupscountry.40.d:0 "Das Regime des 4. August, auch bekannt als Metaxas-Regime (griechisch Καθεστώς Μεταξά, Kathestós Metaxá), war ein totalitäres Regime unter der Führung von General Ioannis Metaxas, das das Königreich Griechenland von 1936 bis 1941 regierte. Am 4. August 1936 suspendierte Metaxas mit Unterstützung von König Georg II. das griechische Parlament und führte fortan eine konservative, entschieden antikommunistische Regierung. Das Regime ließ sich in seiner Symbolik und Rhetorik vom faschistischen Italien inspirieren, unterhielt jedoch enge Verbindungen zu Großbritannien und der Dritten Französischen Republik statt zu den Achsenmächten. Da es keine Basis in der Bevölkerung hatte, hing das Regime nach Metaxas’ Tod im Januar 1941 vollständig vom König ab. Obwohl Griechenland nach der deutschen Invasion im April 1941 besetzt war und die griechische Regierung ins Exil in das britisch kontrollierte Königreich Ägypten gezwungen war, überlebten mehrere prominente Persönlichkeiten und Elemente des Regimes, insbesondere der berüchtigte Sicherheitschef Konstantinos Maniadakis, mehrere Monate im Kabinett, bis der König sie in einem Kompromiss mit den Vertretern des alten demokratischen politischen Establishments entlassen musste. Was werden wir tun?"

ron_coupscountry.41.t:0 "Bolivianischer Putsch"
ron_coupscountry.41.d:0 "Tejada wurde von der bolivianischen Militärführung verachtet. Sie betrachteten ihn als einen der alten politischen Eliten, die sie verantwortungslos in den Krieg geführt und ihnen dann nicht die nötigen Mittel zum Sieg gegeben hatten. Die Unfähigkeit des Präsidenten, die lähmenden wirtschaftlichen Probleme des Landes zu bewältigen, war für junge Offiziere wie Busch Grund genug, ihn zu stürzen. Was sollen wir tun?"

ron_coupscountry.42.t:0 "Die Cagoule-Verschwörung"
ron_coupscountry.42.d:0 "La Cagoule (die Kutte, ein von Maurice Pujo, einem Nationalisten der Action Française, geprägter Spitzname in der Presse), offiziell Comité secret d&#39;action révolutionnaire (Geheimes Komitee für revolutionäre Aktion), war eine französische faschistisch geprägte und antikommunistische Terrorgruppe, die von 1935 bis 1941 in der Dritten Französischen Republik ihre Aktivitäten mit Gewalt durchsetzte. Sie wurde gegründet, um die linksgerichtete Volksfrontregierung zu stürzen. La Cagoule wurde von Eugène Deloncle gegründet. Unter anderem finanzierte der Gründer des Kosmetikunternehmens L&#39;Oréal, Eugène Schueller, die geheime Bewegung. Die Gruppe verübte Attentate, Bombenanschläge, Waffensabotage und andere Gewalttaten, von denen einige darauf abzielten, Kommunisten in Verdacht zu bringen und die politische Instabilität zu verstärken. La Cagoule plante im November 1937 einen Regierungssturz. Die Polizei unterwanderte die Organisation und die Regierung verhaftete und inhaftierte etwa 70 Männer. Was werden wir tun?"
ron_coupscountry.42.a:1 "Unterstützen Sie den Putsch"
ron_coupscountry.42.b:1 "Verhaften Sie die Verschwörer"

ron_coupscountry.43.t:0 "Estado Novo"
ron_coupscountry.43.d:0 "Vargas&#39; vierjährige Amtszeit als Präsident gemäß der Verfassung von 1934 wäre 1938 abgelaufen, und er war von einer Wiederwahl ausgeschlossen. Am 10. November 1937 hielt Vargas jedoch eine landesweit ausgestrahlte Radioansprache, in der er die Existenz eines kommunistischen Komplotts zum Sturz der Regierung, den sogenannten Cohen-Plan, anprangerte. Tatsächlich wurde Plano Cohen jedoch in die Regierung eingebracht, um ein günstiges Klima für Vargas&#39; Machterhalt zu schaffen, seine Herrschaft zu verewigen und diktatorische Macht zu erlangen. Tatsächlich hatten die Kommunisten im November 1935 in einem missglückten Putschversuch, der als Intentona Comunista (Kommunistischer Versuch) bekannt wurde, versucht, die Regierung zu übernehmen. Nach dem gescheiterten kommunistischen Aufstand hatte der Kongress Vargas bereits größere Machtbefugnisse übertragen und die Schaffung eines Nationalen Sicherheitsgerichts (Tribunal de Segurança Nacional) durch ein am 11. September 1936 verabschiedetes Gesetz genehmigt. In seiner Ansprache vom 10. November 1937 verhängte Vargas unter Berufung auf die vermeintliche kommunistische Bedrohung den Ausnahmezustand und löste die Legislative auf. Er verkündete zudem die Verabschiedung einer neuen, streng autoritären Verfassung durch einen Präsidentenerlass, die ihm praktisch die gesamte Regierungsgewalt übertrug. Die Verfassung von 1934 wurde damit abgeschafft, und Vargas proklamierte die Gründung eines „Estado Novo“ (Neuen Staates). Die kurze Unterbrechung war ein weiterer Beweis dafür, dass der Putsch von langer Hand geplant worden war. Was werden wir tun?"

ron_coupscountry.44.t:0 "König Carols Staatsstreich"
ron_coupscountry.44.d:0 "König Carol inszenierte am 10. Februar 1938 einen Selbstputsch und verhängte Notstandsbefugnisse. Bald darauf begann der Universitätsprofessor Istrate Micescu auf der Grundlage von Vorschlägen des Königs mit der Ausarbeitung einer neuen Verfassung. Micescus Entwurf wurde am 20. Februar veröffentlicht. Vier Tage später mussten die Wähler vor ihren lokalen Wahlbüros erscheinen und mündlich über die Charta abstimmen („Ja“ oder „Nein“). Von 4.303.064 Wählern stimmten 4.297.581 (99,87 %) dafür, nur 5.483 (0,13 %) stimmten dagegen; Schweigen wurde als Zustimmung gewertet. Die Verfassung wurde am 27. Februar verkündet und am nächsten Tag im Monitorul Oficial veröffentlicht. Was werden wir tun?"

ron_coupscountry.45.t:0 "Nasjonal Samling hat einen Coup gestartet"
ron_coupscountry.45.d:0 "Vidkun Quisling, Führer der Partei Nasjonal Samling, hatte am 9. April 1940, dem Tag des deutschen Einmarsches in Norwegen, erstmals versucht, einen Putsch gegen die norwegische Regierung durchzuführen. Um 19:32 Uhr besuchte Quisling die Studios des norwegischen Rundfunks und hielt eine Radioansprache, in der er sich selbst zum Ministerpräsidenten ernannte und jeglichen Widerstand zur sofortigen Einstellung aufrief. Er verkündete, er und die Nasjonal Samling würden die Macht übernehmen, weil Nygaardsvolds Kabinett „bewaffneten Widerstand geleistet und umgehend geflohen“ habe. Er erklärte weiter, in der gegenwärtigen Situation sei es „die Pflicht und das Recht der Bewegung der Nasjonal Samling, die Regierungsmacht zu übernehmen“. Quisling behauptete, das Kabinett Nygaardsvold habe die Macht abgegeben, obwohl es lediglich nach Elverum, etwa 50 Kilometer von Oslo entfernt, umgezogen war und Verhandlungen mit den Deutschen führte. Was sollen wir tun?"
ron_coupscountry.45.a:1 "Ernennung von Quisling zum Premierminister"
ron_coupscountry.45.b:1 "Ignoriere sie"

ron_coupscountry.46.t:0 "Besetzung der baltischen Staaten"
ron_coupscountry.46.d:0 "Die Besetzung der baltischen Staaten beinhaltete die militärische Besetzung der drei baltischen Staaten – Estland, Lettland und Litauen – durch die Sowjetunion im Juni 1940 unter der Schirmherrschaft des Molotow-Ribbentrop-Pakts von 1939. Im August 1940 wurden sie dann als Teilrepubliken in die Sowjetunion eingegliedert, obwohl die meisten westlichen Mächte und Nationen ihre Eingliederung nie anerkannten. Am 22. Juni 1941 griff Nazideutschland die Sowjetunion an und besetzte innerhalb weniger Wochen die baltischen Gebiete. Im Juli 1941 gliederte das Dritte Reich das baltische Gebiet in sein Reichskommissariat Ostland ein. Infolge der Baltischen Offensive der Roten Armee im Jahr 1944 eroberte die Sowjetunion die meisten baltischen Staaten zurück und hielt die verbleibenden deutschen Streitkräfte im Kurlandkessel gefangen, bis sie im Mai 1945 formell kapitulierten. Die sowjetische „Annexionsbesetzung“ oder Besetzung sui generis der baltischen Staaten dauerte bis August 1991, als die drei Länder ihre Unabhängigkeit wiedererlangten. Was werden wir tun?"
ron_coupscountry.46.a:1 "Annexion akzeptieren"
ron_coupscountry.46.b:1 "Annexion ablehnen"

ron_coupscountry.47.t:0 "Der Golden Square Coup"
ron_coupscountry.47.d:0 "Der irakische Staatsstreich von 1941, auch Rashid Ali Al-Gaylani-Putsch oder Goldenes-Quadrat-Putsch genannt, war ein nationalistischer und pro-nazistischer Staatsstreich im Irak am 1. April 1941, der das pro-britische Regime von Regent Abd al-Ilah und seinem Premierminister Nuri al-Said stürzte und Rashid Ali al-Gaylani als Premierminister einsetzte. Der Putsch wurde von vier irakischen nationalistischen Armeegenerälen angeführt, die als „Goldenes Quadrat“ bekannt waren und den Krieg nutzen wollten, um nach der 1932 gewährten begrenzten Unabhängigkeit die vollständige Unabhängigkeit des Irak zu erzwingen. Zu diesem Zweck arbeiteten sie mit dem deutschen Geheimdienst zusammen und nahmen militärische Unterstützung von Nazi-Deutschland und dem faschistischen Italien an. Der Regierungswechsel führte zur britischen Invasion des Irak und der anschließenden Besatzung bis 1947. Was werden wir tun?"
ron_coupscountry.47.a:1 "Unterstützen Sie den Putsch"
ron_coupscountry.47.b:1 "Vernichte die Rebellen"

ron_coupscountry.48.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.48.d:0 "Am 3. Juni 1943 wurde Rawson von Mitgliedern der GOU (United Officers&#39; Group) kontaktiert, einer Gruppe von Militäroffizieren, die den Sturz der argentinischen Zivilregierung planten. Da die GOU nicht über die nötige Truppenstärke für einen erfolgreichen Putsch verfügte, wusste Rawson, dass er die benötigten Soldaten stellen konnte. Rawson, der schon vor der Kontaktaufnahme der GOU den Sturz der Regierung geplant hatte, stimmte ihrem Plan zu. Am 4. Juni marschierten Rawson und 10.000 Soldaten unter seinem Kommando in Buenos Aires ein und stürzten die Regierung von Ramón Castillo. Damit endete das als „Berüchtigtes Jahrzehnt“ bekannte historische Jahrzehnt und die Revolution von 1943 begann. Was werden wir tun?"

ron_coupscountry.49.t:0 "Handlung vom 20. Juli"
ron_coupscountry.49.d:0 "Am 20. Juli 1944 versuchten Claus von Stauffenberg und andere Verschwörer, Adolf Hitler, den Führer Nazideutschlands, in seinem Hauptquartier Wolfsschanze nahe Rastenburg in Ostpreußen zu ermorden. Der Name Unternehmen Walküre – der sich ursprünglich auf einen Teil der Verschwörung bezog – ist mit dem gesamten Ereignis verbunden. Das offensichtliche Ziel des Attentats bestand darin, der NSDAP (einschließlich der SS) die politische Kontrolle über Deutschland und seine Streitkräfte zu entreißen und so schnell wie möglich Frieden mit den Westalliierten zu schließen. Die Einzelheiten der Friedensinitiativen der Verschwörer sind nicht bekannt, aber sie sollen unrealistische Forderungen nach der Bestätigung der umfangreichen Annexionen europäischer Gebiete durch Deutschland enthalten haben. Das Komplott war der Höhepunkt der Bemühungen mehrerer Gruppen des deutschen Widerstands, die nationalsozialistische deutsche Regierung zu stürzen. Das Scheitern des Attentats und der darauf folgende geplante Militärputsch veranlassten die Gestapo, mehr als 7.000 Menschen zu verhaften und 4.980 von ihnen hinzurichten. Was werden wir tun?"
ron_coupscountry.49.a:1 "Unterstützen Sie den Putsch"
ron_coupscountry.49.b:1 "Vernichte die Verschwörer"

ron_coupscountry.50.t:0 "König Michaels Staatsstreich"
ron_coupscountry.50.d:0 "Der König-Michaels-Putsch war ein Staatsstreich unter der Führung von König Michael I. von Rumänien während des Zweiten Weltkriegs am 23. August 1944. Mit Unterstützung mehrerer politischer Parteien stürzte der König die Regierung von Ion Antonescu, die Rumänien auf die Seite Nazi-Deutschlands gestellt hatte, nachdem die Achsenfront im Nordosten Rumäniens angesichts einer erfolgreichen sowjetischen Offensive zusammengebrochen war. Die rumänische Armee erklärte einen einseitigen Waffenstillstand mit der sowjetischen Roten Armee an der Moldaufront, ein Ereignis, das als entscheidend für den Vormarsch der Alliierten gegen die Achsenmächte im europäischen Kriegsschauplatz des Zweiten Weltkriegs angesehen wurde. Der Putsch wurde von der Rumänischen Kommunistischen Partei, der Sozialdemokratischen Partei, der Nationalliberalen Partei und der Nationalen Bauernpartei unterstützt, die sich im Juni 1944 zum Nationaldemokratischen Block zusammengeschlossen hatten. Was werden wir tun?"
ron_coupscountry.50.a:1 "Seiten wechseln"
ron_coupscountry.50.b:1 "Bleiben Sie in der Achse"

ron_coupscountry.51.t:0 "1944 Bulgarisch"
ron_coupscountry.51.d:0 "Der bulgarische Staatsstreich von 1944, auch bekannt als Putsch vom 9. September, war der gewaltsame Regierungswechsel im Königreich Bulgarien am Vorabend des 9. September 1944. Im kommunistischen Bulgarien wurde er aufgrund der weit verbreiteten Unruhen als Volksaufstand vom 9. September und Sozialistische Revolution bezeichnet, da er einen politischen Wendepunkt und den Beginn radikaler Reformen hin zum Sozialismus darstellte. Was werden wir tun?"
ron_coupscountry.51.a:1 "Seiten wechseln"
ron_coupscountry.51.b:1 "Bleiben Sie in der Achse"

ron_coupscountry.52.t:0 "Operation Panzerfaust"
ron_coupscountry.52.d:0 "Das Unternehmen Panzerfaust war eine Militäroperation der deutschen Wehrmacht im Oktober 1944, die sicherstellen sollte, dass das Königreich Ungarn im Zweiten Weltkrieg ein Verbündeter Deutschlands blieb. Als der deutsche Diktator Adolf Hitler die Nachricht erhielt, dass Ungarns Regent Admiral Miklós Horthy heimlich über die Kapitulation seines Landes vor der vorrückenden Roten Armee verhandelte, schickte er den Kommandoführer Otto Skorzeny von der Waffen-SS und den ehemaligen Kommandeur der Spezialeinheiten Adrian von Fölkersam nach Ungarn. Hitler fürchtete, dass die Kapitulation Ungarns seine Südflanke gefährden würde, wo sich das Königreich Rumänien gerade mit den Sowjets verbündet und eine Million deutscher Soldaten abgeschnitten hatte, die noch immer gegen den sowjetischen Vormarsch auf der Balkanhalbinsel kämpften. Der Operation ging das Unternehmen Margarethe im März 1944 voraus, die Besetzung Ungarns durch deutsche Truppen, von der Hitler hoffte, dass sie Ungarns Platz unter den Achsenmächten sichern würde. Was werden wir tun?"
ron_coupscountry.52.a:1 "Invasion in Ungarn"
ron_coupscountry.52.b:1 "Wir können Ungarn vertrauen"

ron_coupscountry.53.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.53.d:0 "Am 9. Mai 1944 trat Maximiliano Hernández Martínez aufgrund eines Putschversuchs, Streiks gegen seine Regierung und des Drucks der Vereinigten Staaten zurück. Nach Hernández Martínez&#39; Rücktritt wurde Andrés Ignacio Menéndez provisorischer Präsident von El Salvador. Am 21. Oktober 1944 stürzten Aguirre y Salinas und andere Militärs, die zuvor Hernández Martínez unterstützt hatten, die Regierung von Andrés Ignacio Menéndez und machten sich selbst zum provisorischen Präsidenten von El Salvador. Er ging hart gegen die politische Opposition vor, was am 8. Dezember zu einem bewaffneten Aufstand von Studenten in San Salvador führte, dem vier Tage später ein Aufstand aus Guatemala folgte, wo im Juli Diktator Jorge Ubico gestürzt worden war. Beide Bewegungen wurden von der Regierung Aguirre y Salinas niedergeschlagen, die damit ihre Machtposition festigte. Was werden wir tun?"

ron_coupscountry.54.t:0 "Getulio Vargas erschießt sich"
ron_coupscountry.54.d:0 "Vargas’ politische Gegner lösten eine Krise aus, die im Vorfall in der Rua Tonelero gipfelte, bei dem Major Rubens Vaz bei einem Anschlag auf Vargas’ Hauptgegner Carlos Lacerda getötet wurde. Leutnant Gregório Fortunato, Chef von Vargas’ persönlicher Garde, auch „Schwarzer Engel“ genannt, wurde beschuldigt, den Mordanschlag geplant zu haben. Dies rief innerhalb des Militärs eine Reaktion gegen Vargas hervor, und die Generäle forderten seinen Rücktritt. In einem letzten verzweifelten Versuch berief Vargas am Vorabend des 24. August eine außerordentliche Kabinettssitzung ein, doch Gerüchte verbreiteten sich, die Offiziere der Streitkräfte seien unversöhnlich. Vargas verlor die Kontrolle über die Situation und schoss sich am 24. August 1954 im Catete-Palast mit einer Pistole in die Brust. Was sollen wir tun?"
ron_coupscountry.54.a:1 "OK"

ron_coupscountry.55.t:0 "1945 venezolanischer Putsch"
ron_coupscountry.55.d:0 "Der venezolanische Staatsstreich von 1945 ereignete sich am 18. Oktober 1945, als Präsident Isaías Medina Angarita durch eine Kombination aus Militäraufstand und einer von der Demokratischen Aktion angeführten Volksbewegung gestürzt wurde. Der Putsch führte zu einer dreijährigen Regierungsperiode, bekannt als El Trienio Adeco, in deren Verlauf die ersten partizipativen Präsidentschaftswahlen in der venezolanischen Geschichte stattfanden, beginnend mit den Wahlen zur verfassunggebenden Versammlung Venezuelas 1946. Bei den venezolanischen Parlamentswahlen 1947 wurde die Demokratische Aktion offiziell ins Amt gewählt (mit Rómulo Gallegos als Präsident, der Interimspräsident Rómulo Betancourt ablöste), wurde jedoch kurz darauf durch den Staatsstreich von 1948 abgesetzt. Was werden wir tun?"

ron_coupscountry.56.t:0 "1947 Siamesischer Staatsstreich"
ron_coupscountry.56.d:0 "Der siamesische Staatsstreich von 1947 war ein thailändischer Staatsstreich, der am Abend des 7. November 1947 stattfand und in den frühen Morgenstunden des 8. November endete. Der Putsch stürzte die Regierung von Konteradmiral Thawan Thamrongnawasawat, der von Khuang Aphaiwong als Premierminister Thailands abgelöst wurde. Angeführt wurde der Putsch von Generalleutnant Phin Chunhawan und Oberst Kat Katsongkhram. Was werden wir tun?"

ron_coupscountry.57.t:0 "Die Kommunisten haben einen Putsch gestartet"
ron_coupscountry.57.d:0 "Am 31. August 1947 fanden in Ungarn Parlamentswahlen statt, die später als „Blaue Wahlen“ berüchtigt wurden. Die Ungarische Kommunistische Partei, die die vorangegangene Wahl verloren hatte, festigte in der Zwischenzeit ihre Macht mit Salamitaktiken. Von den Kommunisten angeführte politische Intrigen hatten die Opposition ihres demokratisch erkämpften Mandats von 1945 beraubt, da zahlreiche prominente Antikommunisten wegen Verschwörung aus dem Amt entfernt wurden. Diese Verschwörungen erreichten Ende Mai 1947 ihren Höhepunkt, als die Ungarische Kommunistische Partei den demokratisch gewählten Ministerpräsidenten Ferenc Nagy durch einen Staatsstreich stürzte und damit einen der stärksten Gegner ihrer Herrschaft beseitigte und die Opposition schwächte. Diese Schwächung der Opposition, zusammen mit einem revidierten Wahlgesetz, führte zu weiteren Errungenschaften der Kommunisten. Was werden wir tun?"

ron_coupscountry.58.t:0 "Das Ende der rumänischen Monarchie"
ron_coupscountry.58.d:0 "Am Morgen des 30. Dezember 1947 beorderte Ministerpräsident Petru Groza Michael, der sich in Sinaia aufhielt, zurück nach Bukarest. Der Elisabethpalast war von Armeetruppen umstellt. Michael wurde gezwungen, eine vorgetippte Abdankungserklärung zu unterschreiben, wobei man ihn mit einer Waffe bewaffnete. Später sagte er aus, sie hätten auch damit gedroht, 1.000 verhaftete Studenten zu erschießen, falls er nicht abdanken würde. Später am selben Tag musste er seine Abdankung im Radio verkünden. Rumänien wurde zur Rumänischen Volksrepublik ausgerufen. Am 3. Januar 1948 wurde Michael gezwungen, ins Exil zu gehen, sein Besitz wurde konfisziert und er verlor 1948 seine rumänische Staatsbürgerschaft. Im März 1948 gab Michael bekannt, dass seine Abdankung illegal gewesen sei. Gerüchten zufolge hatte er das Land mit vielen Schätzen verlassen, darunter wertvolle Gemälde, Gold und Schmuck, was Michael selbst stets bestritten hat. Was sollen wir tun?"

ron_coupscountry.59.t:0 "Tschechoslowakischer Putsch 1948"
ron_coupscountry.59.d:0 "Ende Februar 1948 übernahm die Kommunistische Partei der Tschechoslowakei mit sowjetischer Unterstützung die unangefochtene Kontrolle über die Regierung der Tschechoslowakei und markierte damit den Beginn von vier Jahrzehnten kommunistischer Herrschaft im Land. Die Bedeutung des Putsches reichte weit über die Staatsgrenzen hinaus, da er ein deutlicher Meilenstein auf dem bereits weit fortgeschrittenen Weg zum Kalten Krieg war. Das Ereignis alarmierte die westlichen Länder und trug zur raschen Verabschiedung des Marshallplans, der Staatsgründung in Westdeutschland, paramilitärischen Maßnahmen zur Machtabwehr der Kommunisten in Frankreich, Griechenland und insbesondere Italien sowie zu Schritten in Richtung gegenseitiger Sicherheit bei, die in etwas mehr als einem Jahr zur Gründung der NATO und dem endgültigen Fall des Eisernen Vorhangs bis zu den Revolutionen von 1989 führten. Was werden wir tun?"

ron_coupscountry.60.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.60.d:0 "Der Staatsstreich in Venezuela von 1948 fand am 24. November 1948 statt, als Carlos Delgado Chalbaud, Marcos Pérez Jiménez und Luis Felipe Llovera Páez den gewählten Präsidenten Rómulo Gallegos stürzten. Gallegos war bei den venezolanischen Parlamentswahlen von 1947 (die als die erste ehrliche Wahl des Landes gelten) gewählt worden und hatte sein Amt im Februar 1948 angetreten. Chalbaud war Gallegos&#39; Verteidigungsminister gewesen. Jiménez übernahm als Diktator die Führung des Landes. Was werden wir tun?"

ron_coupscountry.61.t:0 "März 1949 Syrischer Putsch"
ron_coupscountry.61.d:0 "Der syrische Staatsstreich vom 30. März 1949 war ein unblutiger Putsch, der den ersten Militärputsch in der modernen syrischen Geschichte darstellte und die demokratisch gewählte Regierung des Landes stürzte. Angeführt wurde er vom Generalstabschef der syrischen Armee, Husni al-Za&#39;im, der am 11. April 1949 Präsident Syriens wurde. Zu den Offizieren, die al-Za&#39;im bei der Machtübernahme unterstützten, gehörten Sami al-Hinnawi und Adib al-Shishakli, die beide später auch militärische Führer des Landes wurden. Präsident Shukri al-Quwatli wurde beschuldigt, minderwertige Waffen für die syrische Armee gekauft und schlechte Führung bewiesen zu haben. Er wurde kurzzeitig inhaftiert, dann aber ins ägyptische Exil entlassen. Das syrische Parlament, damals Repräsentantenhaus genannt, wurde aufgelöst. Al-Za&#39;im ließ auch viele politische Führer inhaftieren, wie beispielsweise Munir al-Ajlani, den er der Verschwörung zum Sturz der Republik beschuldigte. Was werden wir tun?"

ron_coupscountry.62.t:0 "Putsch verhindert Amtsantritt des bolivianischen Präsidenten"
ron_coupscountry.62.d:0 "Die bolivianischen Wähler wählen Victor Paz Estenssoro vom populistischen Movimiento Nacionalista Revolucionario (MNR) zum Präsidenten. Doch ein Putsch in letzter Minute verhindert seinen Sieg. Was sollen wir tun?"

ron_coupscountry.63.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.63.d:0 "Der kubanische Staatsstreich von 1952 ereignete sich am 10. März 1952 in Kuba, als die kubanische Armee unter der Führung von Fulgencio Batista in die für den 1. Juni angesetzten Wahlen eingriff, einen Staatsstreich durchführte und de facto eine Militärdiktatur im Land errichtete. Was werden wir tun?"

ron_coupscountry.64.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.64.d:0 "Der iranische Staatsstreich von 1953, im Iran als „28. Mordad-Putsch“ bekannt, war der Sturz des demokratisch gewählten Premierministers Mohammad Mossadegh zur Stärkung der monarchischen Herrschaft des Schahs Mohammad Reza Pahlavi am 19. August 1953. Orchestriert wurde der Putsch von den Vereinigten Staaten (unter dem Namen TPAJAX-Projekt oder „Operation Ajax“) und Großbritannien (unter dem Namen „Operation Boot“), durchgeführt vom iranischen Militär. Was werden wir tun?"

ron_coupscountry.65.t:0 "Verfassungsputsch"
ron_coupscountry.65.d:0 "Der Verfassungsputsch war die Entlassung der Regierung des pakistanischen Premierministers Khawaja Nazimuddin im Jahr 1953 durch Generalgouverneur Ghulam Mohammad, obwohl der Premierminister die Unterstützung der verfassunggebenden Versammlung genoss, und die anschließende Auflösung der ersten verfassunggebenden Versammlung Pakistans durch den Generalgouverneur im Jahr 1954. Ghulam Mohammad entließ die Nazimuddin-Regierung mit Unterstützung von General Ayub Khan im April 1953, obwohl die Regierung erst zwei Wochen zuvor das Vertrauen des Repräsentantenhauses gewonnen hatte. General Ayub selbst gab auf einer Pressekonferenz im Gouverneurspalast in Karatschi im Oktober 1964 zu: „Als es einen Konflikt zwischen ihm (Khawaja Nazimuddin) und dem Generalgouverneur gab, entschied ich mich, auf die Seite des Generalgouverneurs zu stehen.“ Was werden wir tun?"

ron_coupscountry.66.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.66.d:0 "Der Staatsstreich in Guatemala im Jahr 1954, Codename Operation PBSuccess, war eine verdeckte Operation des US-Geheimdienstes CIA, die den demokratisch gewählten Präsidenten Jacobo Árbenz stürzte und die guatemaltekische Revolution von 1944–1954 beendete. Er setzte die Militärdiktatur von Carlos Castillo Armas ein, dem ersten einer Reihe von autoritären Herrschern in Guatemala, die von den USA unterstützt wurden. Was werden wir tun?"

ron_coupscountry.67.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.67.d:0 "Der Staatsstreich von 1954 in Paraguay ereignete sich im Mai 1954. Angeführt wurde er von Alfredo Stroessner, unterstützt von Epifanio Méndez Fleitas, und führte zum Sturz der Regierung von Federico Chávez. Der Putsch war der Höhepunkt einer komplexen Reihe politischer Rivalitäten innerhalb der regierenden Colorado-Partei. Bei dem Putsch wurden etwa 25 Menschen getötet, was die Grundlage für die Wahl Stroessners zum Präsidenten Paraguays später im selben Jahr bildete. Was werden wir tun?"

ron_coupscountry.68.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.68.d:0 "Am 16. September setzte ein neuer Aufstand unter der Führung von General Eduardo Lonardi, General Pedro E. Aramburu und Admiral Isaac Rojas Perón ab und setzte eine provisorische Regierung ein. Mehrere Tage lang kam es zu Kämpfen an Orten wie der Stadt Córdoba (Lonardis Zentralkommando), dem Marinestützpunkt Puerto Belgrano in der Nähe von Bahía Blanca, einem weiteren Marinestützpunkt in Río Santiago und einem mechanisierten Infanterieregiment in Curuzú Cuatiá, Provinz Corrientes. Was werden wir tun?"

ron_coupscountry.69.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.69.d:0 "Am 10. Mai 1957 startete die mit der Regierung Rojas unzufriedene kolumbianische Bevölkerung einen landesweiten Massenprotest und forderte seinen Rücktritt. Rojas wurde gestürzt, und die Ereignisse dieses Tages wurden als „Staatsstreich der öffentlichen Meinung“ bezeichnet. Eine Militärjunta aus fünf Generälen übernahm die Kontrolle über das Land. Was werden wir tun?"

ron_coupscountry.70.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.70.d:0 "Am 13. September 1957 übergab Sarit Phibun das Ultimatum der Armee. Das von 58 Armeeoffizieren unterzeichnete Ultimatum forderte den Rücktritt der Regierung. Die Öffentlichkeit unterstützte Sarits Ultimatum. Am 15. September versammelte sich eine öffentliche Kundgebung, um gegen Phibun und seine Regierung zu protestieren. Die Menge, die schnell an Zahl anwuchs, marschierte zu Sarits Residenz, um ihre Unterstützung für die Forderungen der Armee zu zeigen. Da Sarit nicht zu Hause war, drang die Menge in den Regierungskomplex ein, wo sie Reden hielt, in denen sie die Regierung verurteilte. Später kehrten die Demonstranten zu Sarits Haus zurück, wo er auf sie wartete, um zu ihnen zu sprechen. In seiner Rede sagte Sarit: „Im Namen der Armee und der Abgeordneten der zweiten Kategorie habe ich meine Aktivitäten auf der Grundlage des Volkswillens und der Interessen des Volkes durchgeführt – Ihr Kommen hierher gibt mir moralische Unterstützung, weiterzumachen.“ Am nächsten Morgen inszenierten Sarit und seine Armee einen Staatsstreich. In weniger als einer Stunde eroberte die Armee erfolgreich strategische Punkte ohne Widerstand. Zur Erkennung trugen Sarits Truppen weiße Armbinden als Zeichen der Reinheit. Daraufhin floh Phibun sofort aus dem Land und Phao wurde nach Europa deportiert. Damit begann Sarits Herrschaft. Was werden wir tun?"

ron_coupscountry.71.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.71.d:0 "In den frühen Morgenstunden des 23. Januar beschloss Pérez Jiménez, trotz der Unterstützung eines wichtigen Teils der Streitkräfte, den Miraflores-Palast zu verlassen und zum Flughafen La Carlota in Caracas zu fahren, um dort ein Flugzeug in die Dominikanische Republik zu besteigen. Als die Nachricht vom Sturz bekannt wurde, gingen die Menschen auf die Straße, plünderten die Häuser von Regimeanhängern, griffen das Hauptquartier der Nationalen Sicherheit an und lynchten Beamte. Was sollen wir tun?"

ron_coupscountry.72.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.72.d:0 "Der pakistanische Staatsstreich von 1958 bezeichnet die Ereignisse zwischen dem 7. Oktober, als der pakistanische Präsident Iskander Mirza die pakistanische Verfassung außer Kraft setzte und das Kriegsrecht verhängte, und dem 27. Oktober, als Mirza selbst von General Ayub Khan, dem Oberbefehlshaber der pakistanischen Armee, abgesetzt wurde. Zwischen 1956 und 1958 gab es mehrere Premierminister, und General Ayub Khan war zu einem Zeitpunkt der Meinung, die Armee solle die Kontrolle übernehmen, um die Stabilität wiederherzustellen. Die Politiker Ostpakistans wollten mehr Mitspracherecht bei der Führung der Zentralregierung, was die Spannungen verschärfte. Iskander Mirza hatte die Unterstützung vieler führender Politiker verloren und war alarmiert über einen Plan Suhrawardys, die politische Führung Bengalens und Punjabs gegen ihn aufzubringen. Daher wandte er sich hilfesuchend an Ayub Khan und das Militär. Was sollen wir tun?"

ron_coupscountry.73.t:0 "Revolution vom 14. Juli"
ron_coupscountry.73.d:0 "Am 14. Juli 1958 stürzte eine Gruppe, die sich als die Freien Offiziere ausgab, eine geheime Militärgruppe unter der Führung von Brigadier Abd al-Karim Qasim, die Monarchie. Diese Gruppe hatte einen ausgesprochen panarabischen Charakter. König Faisal II., Prinz Abd al-Ilah und Nuri al-Said wurden alle getötet. Die verstümmelten Leichen von Prinz Abd al-Ilah von Hedschas (links) und Premierminister Nuri al-Said (rechts). Arabischer Text: „Prinz Abd al-Ilah aufgehängt und mit Schawerma-Messern zerstückelt, Pascha Nuri al-Said herumgezerrt.“ Die Freien Offiziere waren von den ägyptischen Freien Offizieren inspiriert und nach ihrem Vorbild gestaltet, die 1952 die ägyptische Monarchie stürzten. Sie vertraten alle Parteien und politische Fraktionen. Qasim gehörte der Generation an, die die Revolution in Ägypten angestoßen hatte, und war in einer Zeit aufgewachsen, in der Radikalismus und Panarabismus an Schulen, Gymnasien und Militärakademien, kursierten. Die meisten Freien Offiziere waren sunnitische Araber aus der modernen Mittelschicht. Die Freien Offiziere wurden von zahlreichen Ereignissen im Nahen Osten im Jahrzehnt vor 1952 inspiriert. Der Krieg gegen Israel im Jahr 1948 stärkte das Pflichtgefühl der ägyptischen Freien Offiziere. Sie verstanden ihre Mission darin, die korrupten Regime zu stürzen, die die vereinte arabische Nation schwächten und ihre Länder in Bedrängnis brachten. Der Erfolg der Freien Offiziere beim Sturz der ägyptischen Monarchie und der Machtergreifung im Jahr 1952 machte auch Nasser zu einer Quelle der Inspiration. Was werden wir tun?"

ron_coupscountry.74.t:0 "Maikrise 1958"
ron_coupscountry.74.d:0 "Die Maikrise von 1958 (auch Putsch von Algier oder Staatsstreich vom 13. Mai) war eine politische Krise in Frankreich während der Wirren des Algerischen Unabhängigkeitskrieges (1954–1962), die zum Zusammenbruch der Vierten Republik und ihrer Ersetzung durch die Fünfte Republik unter Charles de Gaulle führte, der nach zwölfjähriger Abwesenheit an die Macht zurückkehrte. Sie begann als politischer Aufstand in Algier am 13. Mai 1958 und entwickelte sich dann zu einem Militärputsch unter der Führung einer Koalition um den Stellvertreter von Algier und Reserveoffizier der Luftlandedivision Pierre Lagaillarde, die französischen Generäle Raoul Salan, Edmond Jouhaud, Jean Gracieux und Jacques Massu sowie Admiral Philippe Auboyneau, den Befehlshaber der Mittelmeerflotte. Der Putsch wurde vom ehemaligen algerischen Generalgouverneur Jacques Soustelle und seinen verbündeten Aktivisten unterstützt. Was sollen wir tun?"

ron_coupscountry.75.t:0 "Kubanische Revolution"
ron_coupscountry.75.d:0 "Die kubanische Revolution war ein bewaffneter Aufstand der revolutionären Bewegung des 26. Juli unter Fidel Castro und ihrer Verbündeten gegen die Militärdiktatur des kubanischen Präsidenten Fulgencio Batista. Die Revolution begann im Juli 1953 und dauerte sporadisch an, bis die Rebellen Batista am 31. Dezember 1958 schließlich stürzten und seine Regierung ablösten. Der 26. Juli 1953 wird in Kuba als Tag der Revolution (Día de la Revolución) gefeiert. Die Bewegung des 26. Juli reformierte sich später nach marxistisch-leninistischen Grundsätzen und wurde im Oktober 1965 zur Kommunistischen Partei, der später auch die kubanische Regierung unterstellt wurde. Was werden wir tun?"

ron_coupscountry.76.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.76.d:0 "Von 1923 bis 1939 relativ vernachlässigt, erlebte die Armee während des Zweiten Weltkriegs einen rasanten Aufschwung und wurde nach dem Krieg mit Hilfe US-amerikanischer Berater umfassend modernisiert. Viele Offiziere befürchteten, dass die DP die Prinzipien des säkularen, progressiven kemalistischen Staates bedrohte. Einige jüngere Offiziere betrachteten die Armee als direktes Instrument der Einheit und Reform. Am 3. Mai 1960 forderte der Befehlshaber der Landstreitkräfte, General Cemal Gürsel, politische Reformen und trat zurück, als seine Forderungen abgelehnt wurden. Am 27. Mai handelte die Armee; Offiziere und Kadetten der Militärakademien von Istanbul und Ankara führten einen fast unblutigen Putsch durch. Die Führung gründete ein 38-köpfiges Komitee der Nationalen Einheit mit Gürsel als Vorsitzendem. Die demokratischen Führer wurden inhaftiert. Was sollen wir tun?"

ron_coupscountry.77.t:0 "Mobutus Putsch"
ron_coupscountry.77.d:0 "Am 14. September verkündete Mobutu im Radio, er werde eine „friedliche Revolution“ starten, um die politische Sackgasse zu überwinden und damit den Präsidenten, die Regierungen Lumumbas und Iléos sowie das Parlament bis zum 31. Dezember außer Gefecht zu setzen. Er erklärte, „Techniker“ würden die Verwaltung leiten, während die Politiker ihre Differenzen beilegten. In einer anschließenden Pressekonferenz stellte er klar, dass kongolesische Universitätsabsolventen gebeten würden, eine Regierung zu bilden, und erklärte außerdem, alle Ostblockstaaten sollten ihre Botschaften schließen. Lumumba war von dem Putsch überrascht und reiste noch am Abend zum Camp Leopold II, um Mobutu zu suchen und ihn umzustimmen. Er verbrachte die Nacht dort, wurde aber am Morgen von Luba-Soldaten angegriffen, die ihn für die Gräueltaten in Süd-Kasaï verantwortlich machten. Einem ghanaischen ONUC-Kontingent gelang es, ihn zu befreien, doch sein Aktenkoffer blieb zurück. Einige seiner politischen Gegner haben es wiedergefunden und die darin angeblich enthaltenen Dokumente veröffentlicht, darunter Briefe von Nkrumah, Unterstützungsappelle an die Sowjetunion und die Volksrepublik China, ein Memorandum vom 16. September, in dem die Präsenz sowjetischer Truppen innerhalb einer Woche angekündigt wurde, und einen Brief Lumumbas vom 15. September an die Provinzpräsidenten (mit Ausnahme von Tschombe) mit dem Titel „Maßnahmen für die Anfangsphase der Diktatur“. Einige dieser Dokumente waren echt, während andere, insbesondere das Memorandum und der Brief an die Provinzpräsidenten, mit ziemlicher Sicherheit Fälschungen waren. Was sollen wir tun?"

ron_coupscountry.78.t:0 "Putsch vom 16. Mai"
ron_coupscountry.78.d:0 "Der Militärputsch vom 16. Mai war ein Militärputsch in Südkorea im Jahr 1961. Organisiert und durchgeführt wurden er von Park Chung-hee und seinen Verbündeten, die das Militärische Revolutionskomitee gründeten, das nominell von Generalstabschef Chang Do-yong geführt wurde, nachdem dieser am Tag des Putsches zugestimmt hatte. Der Putsch entmachtete die demokratisch gewählte Regierung von Yun Bo-seon und beendete die Zweite Republik. Er setzte einen reformistischen militärischen Obersten Rat für Nationalen Wiederaufbau ein, der de facto von Park geführt wurde, der nach General Changs Verhaftung im Juli den Vorsitz übernahm. Der Putsch trug maßgeblich dazu bei, eine neue entwicklungsorientierte Elite an die Macht zu bringen und den Grundstein für die schnelle Industrialisierung Südkoreas unter Parks Führung zu legen. Sein Erbe ist jedoch wegen der Unterdrückung von Demokratie und bürgerlichen Freiheiten, die er mit sich brachte, und der Säuberungen, die in seinem Gefolge stattfanden, umstritten. Park und seine Verbündeten bezeichneten den Putsch als „Militärrevolution vom 16. Mai“, als „neues, reifes nationales Debüt des Geistes“. Sein Charakter als „Revolution“ ist jedoch umstritten und seine Bewertung umstritten. Was werden wir tun?"

ron_coupscountry.79.t:0 "Putsch vom 29. März 1962"
ron_coupscountry.79.d:0 "Der Militärputsch vom 29. März 1962 war insofern einzigartig, als nach dem Sturz von Arturo Frondizi (von der UCRI) kein Militär, sondern ein Zivilist die Macht übernahm. Frondizi musste während seiner Herrschaft wiederholt Proteste und Militäraufstände ertragen, bei denen sich sogar der Wirtschaftsminister (Álvaro Alsogaray) ihm widersetzte. Diese Ereignisse endeten mit dem Putsch vom 29. März 1962 unter der Führung von General Raúl Poggi. Ausschlaggebend für den Putsch war der überwältigende Sieg des Peronismus bei den elf Tage zuvor abgehaltenen Wahlen, bei denen zehn der damals vierzehn bestehenden Provinzen siegten, darunter die strategisch wichtige Provinz Buenos Aires, in der der Gewerkschaftsführer der Textilindustrie, Andrés Framini, gewann. Der Peronismus war von der Regierung der Revolución Libertadora verboten worden, doch Frondizi ließ ihn bei den Wahlen zu, verbot Juan Perón jedoch weiterhin die Rückkehr ins Land und seine Kandidatur. Frondizi versuchte sofort, seine Macht in den Provinzen zu etablieren, in denen die peronistischen Parteien gewonnen hatten, doch der Putsch erwies sich als unaufhaltsam. Was werden wir tun?"

ron_coupscountry.80.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.80.d:0 "Der Bürgerkrieg im Nordjemen tobte von 1962 bis 1970 zwischen Anhängern des Mutawakkiliten-Königreichs und der Jemenitischen Arabischen Republik. Der Krieg begann 1962 mit einem Staatsstreich revolutionärer Republikaner unter der Führung der Armee von Abdullah as-Sallal. Dieser stürzte den frisch gekrönten Imam Muhammad al-Badr und erklärte den Jemen unter seiner Präsidentschaft zur Republik. Der Imam floh an die saudi-arabische Grenze, wo er die Unterstützung der schiitischen Stämme im Norden sammelte, um die Macht zurückzuerobern. Dies eskalierte rasch zu einem umfassenden Bürgerkrieg. Was sollen wir tun?"

ron_coupscountry.81.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.81.d:0 "Der burmesische Staatsstreich vom 2. März 1962 markierte den Beginn der totalitären Herrschaft und der politischen Dominanz der Armee in Burma (heute Myanmar), die 26 Jahre andauerte. Durch den Putsch ersetzte das Militär die zivile AFPFL-Regierung unter Premierminister U Nu durch den Union Revolutionary Council unter dem Vorsitz von General Ne Win. Was werden wir tun?"

ron_coupscountry.82.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.82.d:0 "1963 stürzte Ydígoras’ Verteidigungsminister Oberst Enrique Peralta Azurdia ihn schließlich. Peralta behauptete, die gesamte Regierung sei von Kommunisten unterwandert, setzte die Verfassung außer Kraft und übernahm die Staatsführung. Peraltas Putsch wurde von mehreren Oppositionsparteien unterstützt, die verhindern wollten, dass der ehemalige linksgerichtete Präsident Juan José Arévalo nach Guatemala zurückkehrte und bei den bevorstehenden Wahlen kandidierte. Was sollen wir tun?"

ron_coupscountry.83.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.83.d:0 "Am 25. September 1963, nach nur sieben Monaten im Amt, wurde Bosch durch einen Putsch unter der Führung von Oberst Wikipedia:Elías Wessin gestürzt und durch eine dreiköpfige Militärjunta ersetzt. Bosch kehrte ins Exil nach Puerto Rico zurück. Was werden wir tun?"

ron_coupscountry.84.t:0 "1963 Südvietnamesischer Putsch"
ron_coupscountry.84.d:0 "Im November 1963 wurde Präsident Ngô Đình Diệm von Südvietnam von einer Gruppe von Offizieren der Armee der Republik Vietnam abgesetzt, die mit seinem Umgang mit der buddhistischen Krise und der Bedrohung des Regimes durch den Vietcong nicht einverstanden waren. In Südvietnam wurde der Putsch als Cách mạng 1-11-63 („Revolution vom 1. November 1963“) bezeichnet. Die Kennedy-Regierung war sich der Putschplanung bewusst, aber Telegramm 243 des US-Außenministeriums an den US-Botschafter in Südvietnam, Henry Cabot Lodge, Jr., erklärte, es sei US-Politik, nicht zu versuchen, ihn zu stoppen. Lucien Conein, der Verbindungsmann der CIA zwischen der US-Botschaft und den Putschplanern, teilte ihnen mit, dass die USA nicht eingreifen würden, um den Putsch zu stoppen. Conein stellte den Putschisten auch Gelder zur Verfügung. Der Putsch wurde von General Dương Văn Minh angeführt und begann am 1. November. Der Prozess verlief reibungslos, da viele loyalistische Anführer unvorbereitet gefangen genommen wurden und es nur wenige Verluste gab. Diệm wurde gefangen genommen und am nächsten Tag zusammen mit seinem Bruder und Berater Ngô Đình Nhu hingerichtet. Was sollen wir tun?"

ron_coupscountry.85.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.85.d:0 "Die Militärjunta von 1963 setzte Präsident Carlos Julio Arosemena Monroy ab, weil er die Politik Fidel Castros unterstützte. Dies brachte ihn in Konflikt mit dem Nationalkongress und den Streitkräften. Die nachfolgende Junta galt als Gegner der kubanischen Revolution in internationalen Fragen. Die Junta, die ursprünglich aus vier Angehörigen der Streitkräfte bestand, wurde für ihre umfassenden Reformen gelobt, aber auch für ihren Autoritarismus und die massive Repression kritisiert. Was werden wir tun?"

ron_coupscountry.86.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.86.d:0 "Der togolesische Staatsstreich von 1963 war ein Militärputsch, der am 13. Januar 1963 im westafrikanischen Togo stattfand. Die Putschisten – insbesondere Emmanuel Bodjollé, Étienne Eyadéma (später Gnassingbé Eyadéma) und Kléber Dadjo – besetzten Regierungsgebäude, verhafteten den Großteil des Kabinetts und ermordeten Togos ersten Präsidenten, Sylvanus Olympio, vor der amerikanischen Botschaft in Lomé. Die Putschisten riefen rasch Nicolas Grunitzky und Antoine Meatchi, beide im Exil lebende politische Gegner Olympios, zur Bildung einer neuen Regierung zusammen. Obwohl die Regierung Ghanas und ihr Präsident Kwame Nkrumah in den Putsch und die Ermordung Olympios verwickelt waren, wurden die Ermittlungen nie abgeschlossen, und der internationale Aufschrei verebbte schließlich. Das Ereignis war von großer Bedeutung, da es sich um den ersten Staatsstreich in den französischen und britischen Kolonien Afrikas handelte, die in den 1950er und 1960er Jahren ihre Unabhängigkeit erlangten. Olympio gilt als einer der ersten Staatschefs, die während eines Militärputsches in Afrika ermordet wurden. Was werden wir tun?"

ron_coupscountry.87.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.87.d:0 "Am 28. Oktober übernahm Christophe Soglo, Stabschef der 800 Mann starken Dahomey-Armee, die Kontrolle über das Land, um einen Bürgerkrieg zu verhindern. Er entließ das Kabinett, löste die Versammlung auf, setzte die Verfassung außer Kraft und verbot Demonstrationen jeglicher Art. Nachdem er Maga noch am selben Tag seinen Rücktritt unterzeichnen ließ, übertrug er ihm, Apithy und Ahomadégbé-Tomêtin die Machtbefugnisse des Staatsministeriums. Süd-Dahomey errichtete später eine Statue zu Ehren dieses nationalen Tages. Die Streiks endeten am nächsten Tag. Die Gründe für den Sturz Magas waren „der luxuriöse Lebensstil der Herrscher, die übermäßige Zunahme der Ministerposten, unbefriedigte soziale Forderungen, nicht eingehaltene Versprechen, der Anstieg der Lebenshaltungskosten und antidemokratische Maßnahmen, die das Volk marterten und es auf ein Nichts reduzierten“. Was sollen wir tun?"

ron_coupscountry.88.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.88.d:0 "Der syrische Staatsstreich von 1963, von der syrischen Regierung als Revolution des 8. März (arabisch ثورة الثامن من آذار) bezeichnet, war die erfolgreiche Machtergreifung in Syrien durch das Militärkomitee des syrischen Regionalverbandes der Arabischen Sozialistischen Baath-Partei. Die Planung und die sich entfaltende Verschwörung waren vom erfolgreichen Militärputsch des irakischen Regionalverbandes inspiriert. Der Putsch wurde vom Militärkomitee und nicht von der zivilen Führung der Baath-Partei geplant, doch Michel Aflaq, der Parteivorsitzende, stimmte der Verschwörung zu. Die führenden Mitglieder des Militärkomitees während des gesamten Planungsprozesses und unmittelbar nach der Machtübernahme waren Muhammad Umran, Salah Jadid und Hafez al-Assad. Das Komitee konnte sich die Unterstützung zweier Nasseristen, Rashid al-Qutayni und Muhammad al-Sufi, sowie des unabhängigen Ziad al-Hariri sichern. Der Putsch war ursprünglich für den 7. März geplant, wurde aber einen Tag verschoben, nachdem die Regierung herausgefunden hatte, wo sich die Verschwörer versammeln wollten. Was sollen wir tun?"

ron_coupscountry.89.t:0 "Ramadan-Revolution"
ron_coupscountry.89.d:0 "Die Ramadan-Revolution, auch als Revolution des 8. Februar oder Staatsstreich im Irak vom Februar 1963 bekannt, war ein Militärputsch des irakischen Flügels der Baath-Partei, der 1963 den irakischen Premierminister Abd al-Karim Qasim stürzte. Der Putsch ereignete sich zwischen dem 8. und 10. Februar 1963. Qasims ehemaliger Stellvertreter Abdul Salam Arif, der kein Baathist war, erhielt den eher zeremoniellen Titel des Präsidenten, während der prominente baathistische General Ahmed Hassan al-Bakr zum Premierminister ernannt wurde. Der mächtigste Führer der neuen Regierung war der Generalsekretär der irakischen Baath-Partei, Ali Salih al-Sa‘di, der die Nationalgarde kontrollierte und nach dem Putsch ein Massaker an Hunderten – wenn nicht Tausenden – mutmaßlichen Kommunisten und anderen Dissidenten organisierte. Was werden wir tun?"

ron_coupscountry.90.t:0 "Irakischer Putsch im November 1963"
ron_coupscountry.90.d:0 "Am Dienstag, dem 12. November, wurden al-Sadi und 18 seiner Parteikollegen aus der Baath-Partei mit vorgehaltener Waffe festgenommen und nach Madrid ausgeflogen. Am nächsten Tag verkündete Radio Bagdad, ohne al-Sadi zu erwähnen, dass die regierende Baath-Partei nun von einem 15-köpfigen Rat unter al-Bakr angeführt werde. Wenige Minuten vor 11:00 Uhr fiel der Sender aus, und Kampfjets beschossen den Präsidentenpalast in Bagdad. Große Menschenmengen von al-Sadi-Anhängern demonstrierten in Bagdad. Am Nachmittag hatten die Truppen von Premierminister al-Bakr die Kontrolle zurückerlangt. Am nächsten Abend verkündete al-Sadi in Madrid, dass acht der neuen Baath-Führer abgesetzt und nach Beirut ausgeflogen worden seien und dass al-Sadi mit syrischen Baathisten nach Bagdad zurückkehren werde. Am Montag, dem 18. November, besiegten der irakische Präsident Abdul Salam Arif, sein Bruder, Brigadegeneral Abdul Rahman Arif, und ihre Anhänger in der irakischen Armee die Baath-Nationalgarde (deren Stärke zwischen Februar und August 1963 von 5.000 auf 34.000 Mann angewachsen war) und bombardierten das Hauptquartier der Baath-Nationalgarde. Andere hochrangige Offiziere und Anhänger Abdul Salam Arifs, wie Khaleel Jassim AlDabbagh, Saeed Hamo, Abdul Aziz Al Aqili und Younis Atar Bashi, übernahmen die Kontrolle über die vierte und dritte Division und besiegten die Baath-Nationalgarde in Mosul und Karkuk. Anschließend setzte er al-Bakr als Premierminister ab; al-Sadi wurde nicht in den neuen Rat aufgenommen und blieb im Exil. Was sollen wir tun?"

ron_coupscountry.91.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.91.d:0 "Der honduranische Staatsstreich von 1963 war eine militärische Machtübernahme am 3. Oktober 1963, zehn Tage vor den angesetzten Wahlen. Oswaldo López Arellano löste Ramón Villeda Morales als Präsidenten ab und leitete eine zwei Jahrzehnte dauernde Militärherrschaft ein. Villeda Morales hatte fortschrittliche Arbeitsgesetze und eine Agrarreformpolitik eingeführt, was ihm von der Rechten in Honduras und den USA kommunistische Sympathien vorwarf. Sein Plan, der United Fruit Company Land zu enteignen, wurde zwar nie umgesetzt, sorgte aber für besondere Spannungen. Die zivil-militärischen Beziehungen in Honduras hatten sich seit 1957 verschlechtert. Ein Putschversuch im Jahr 1959, der von Studenten und gewerkschaftlichen Unterstützern von Villeda Morales niedergeschlagen wurde, provozierte heftige Feindseligkeiten gegenüber dem Militär sowie die Schaffung einer autonomen Präsidentengarde. Politiker diskutierten über die Abschaffung des Militärs. Modesto Rodas Alvarado, der Präsidentschaftskandidat der Liberalen Partei, trat mit dem Versprechen der Entmilitarisierung an und sollte die Wahl am 13. Oktober 1963 gewinnen. Das Militär handelte präventiv und übernahm die Kontrolle über die Regierung. Was werden wir tun?"

ron_coupscountry.92.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.92.d:0 "Der brasilianische Staatsstreich von 1964 war eine Reihe von Ereignissen in Brasilien vom 31. März bis 1. April, die zum Sturz von Präsident João Goulart durch Angehörige der brasilianischen Streitkräfte mit Unterstützung der US-Regierung führten. Am folgenden Tag, als das Militär bereits die Kontrolle über das Land hatte, unterstützte der brasilianische Kongress den Putsch und billigte ihn, indem er das Präsidentenamt für vakant erklärte. Der Putsch beendete die Regierung von Goulart (auch bekannt als „Jango“), einem Mitglied der brasilianischen Arbeiterpartei. Goulart war in derselben Wahl demokratisch zum Vizepräsidenten gewählt worden, in der der konservative Jânio Quadros von der Nationalen Arbeiterpartei, unterstützt von der Nationalen Demokratischen Union, die Präsidentschaft gewann. Was sollen wir tun?"

ron_coupscountry.93.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.93.d:0 "Der Putsch begann am frühen Morgen des 3. November, als Truppen des Ingavi-Regiments in La Paz rebellierten. Bis zum Abend unterstützten alle größeren Militäreinheiten den Putsch, und am Nachmittag des 4. November wurde Estenssoro mit seiner Familie nach Lima verbannt, während Barrientos und Ovando ihre Junta errichteten. Es wurde von vereinzelten Zusammenstößen zwischen Arbeitermiliz und Armee berichtet, die jedoch bald abklangen. Ovando verkündete öffentlich die Bildung der Junta, doch am Abend des 4. November trat der populärere und verfassungsmäßig akzeptierte Vizepräsident Barrientos als Anführer hervor. Was sollen wir tun?"

ron_coupscountry.94.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.94.d:0 "Der Putsch in Südvietnam im Dezember 1964 ereignete sich vor Tagesanbruch des 19. Dezember 1964, als die herrschende Militärjunta Südvietnams unter General Nguyễn Khánh den Hohen Nationalrat (HNC) auflöste und einige seiner Mitglieder verhaftete. Der HNC war ein nicht gewähltes ziviles Beratungsgremium im gesetzgebenden Stil, das sie auf Ersuchen der Vereinigten Staaten – Südvietnams Hauptsponsor – geschaffen hatte, um den Anschein einer zivilen Herrschaft zu erwecken. Die Auflösung bestürzte die Amerikaner, insbesondere den Botschafter Maxwell D. Taylor, der sich einen wütenden Wortkrieg mit verschiedenen Generälen, darunter Khánh, lieferte und mit Kürzungen der Entwicklungshilfe drohte. Sie konnten nichts gegen die ihnen gestellten vollendeten Tatsachen unternehmen, da sie den Vietnamkrieg unbedingt gewinnen wollten und die Armee der Republik Vietnam unterstützen mussten. Stattdessen waren Taylors beißende verbale Angriffe kontraproduktiv, da sie die vietnamesischen Offiziere um den bedrängten Khánh mobilisierten. Zu dieser Zeit war Khánhs Führung durch seine Generalskollegen und auch durch Taylor bedroht, der sich mit ihm überworfen hatte und seine Absetzung forderte. Was werden wir tun?"

ron_coupscountry.95.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.95.d:0 "Am Abend des 18. Juni 1965 setzten die Putschisten den Plan zur Absetzung Ben Bellas in die Tat um. In dieser Nacht blieb Boumédiène in seinem Büro und überwachte die Durchführung des Putsches, die weitgehend Kommandant Chabou, einem der ersten Verschwörer, übertragen wurde. Als Präsident ließ sich Ben Bella in der „Villa Joly“ in Algier nieder. Normalerweise bewachten Wachen der Compagnies nationales de securite (CNS) das Gelände, und die Wachen wechselten jeden Abend um 20:00 Uhr die Schicht. Am 18. Juni jedoch stellte Sicherheitsdirektor Ahmed Draia sicher, dass die neuen Wachen für die Nachtschicht militärtreue Djounoud waren. Um 1.00 Uhr befahl Boumédiène, in der gesamten Hauptstadt Panzer an strategischen Positionen wie der Grande Poste d&#39;Alger, Radio-Télévision Algérienne und dem Place de l&#39;Émir-Abdelkader (dem damaligen Parteisitz) aufzustellen. Der Film „Schlacht um Algier“ wurde zu dieser Zeit in der Hauptstadt gedreht und viele Zuschauer dachten, die Militärbewegung stünde mit den Dreharbeiten zu dem Film in Verbindung. Gegen 1.30 Uhr näherten sich Tahar Zbiri, Said Abid und Oberst Abbes der Villa Joly und wurden von den Ersatzwachen am Eingang eingelassen. Tahar Zbiri weckte Ben Bella, der im sechsten Stock schlief, und erklärte: „Im Namen des Revolutionsrats habe ich Befehl, Sie wegen Hochverrats festzunehmen.“ Die drei Militäroffiziere erlaubten Ben Bella, sich anzuziehen, und brachten ihn dann in einem Auto zu einem Ort in der Stadt Maison-Carrée, 20 Kilometer von Algier entfernt, wo er unter Hausarrest gestellt wurde. Zbiri berichtete Boumédiène: „Mission erfüllt.“ Ben Bella blieb bis 1980 unter Hausarrest und kehrte erst 1990 öffentlich nach Algerien zurück. Was werden wir tun?"

ron_coupscountry.96.t:0 "Saint-Sylvestre-Putsch"
ron_coupscountry.96.d:0 "Der Staatsstreich von Saint-Sylvestre war ein von Jean-Bédel Bokassa, dem Anführer der Armee der Zentralafrikanischen Republik (ZAR), und seinen Offizieren inszenierter Staatsstreich gegen die Regierung von Präsident David Dacko am 31. Dezember 1965 und 1. Januar 1966. Dacko, Bokassas Cousin, übernahm 1960 die Macht im Land, und Bokassa, ein Offizier der französischen Armee, trat 1962 der Armee der ZAR bei. 1965 befand sich das Land in Aufruhr – geplagt von Korruption und langsamem Wirtschaftswachstum, während seine Grenzen von Rebellen aus den Nachbarländern durchbrochen wurden. Dacko erhielt finanzielle Hilfe von der Volksrepublik China, doch trotz dieser Unterstützung blieben die Probleme des Landes bestehen. Bokassa schmiedete Pläne, die Regierung zu übernehmen; Dacko wurde darüber informiert und versuchte, dem entgegenzuwirken, indem er die Gendarmerie unter der Leitung von Jean Izamo gründete, der schnell zu Dackos engstem Berater wurde. Was werden wir tun?"

ron_coupscountry.97.t:0 "Krönung von Bokassa I."
ron_coupscountry.97.d:0 "Die Krönung Bokassas I. zum Kaiser von Zentralafrika fand am 4. Dezember 1977 in einem Sportstadion in Bangui, der Hauptstadt des Zentralafrikanischen Reiches, statt. Es war die einzige Krönung in der Geschichte dieses Reiches – eines kurzlebigen Einparteienstaates und einer selbsternannten Monarchie –, das 1976 von Jean-Bédel Bokassa, dem Militärdiktator und Präsidenten auf Lebenszeit der Zentralafrikanischen Republik, gegründet wurde. Die Krönung – die fast eine exakte Kopie der Krönung Napoleons I. zum Kaiser der Franzosen im Jahr 1804 war – und die damit verbundenen Ereignisse waren von Luxus und Pomp geprägt. Trotz erheblicher materieller Unterstützung aus Frankreich beliefen sich die Kosten auf über 20 Millionen US-Dollar (heute 80 Millionen Dollar) und fügten dem Staat schweren Schaden zu, was in Afrika und weltweit zu enormen Empörung führte. Was werden wir tun?"
ron_coupscountry.97.a:1 "Lang lebe der Kaiser!"
ron_coupscountry.97.b:1 "Eine Militärdiktatur ist vorzuziehen"

ron_coupscountry.98.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.98.d:0 "Der National Liberation Council (NLC) führte die ghanaische Regierung vom 24. Februar 1966 bis zum 1. Oktober 1969. Das Gremium ging aus einem angeblich von der CIA unterstützten Staatsstreich (dem ersten in Ghana) gegen die Zivilregierung unter Kwame Nkrumah hervor. Der ghanaische Polizeidienst und die ghanaischen Streitkräfte führten den Putsch gemeinsam mit dem ghanaischen Staatsdienst durch. Es wird behauptet, die Verschwörer hätten gute Verbindungen zu den Regierungen Großbritanniens (unter Premierminister Harold Wilson) und der USA (damals unter Lyndon B. Johnson) gehabt. Manche glauben, die USA hätten den Putsch gutgeheißen, weil Nkrumah ihre politischen und wirtschaftlichen Ambitionen in Afrika in Frage stellte. Was sollen wir tun?"

ron_coupscountry.99.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.99.d:0 "Der Staatsstreich von Obervolta 1966 ereignete sich am 3. Januar 1966 in der Republik Obervolta (heute Burkina Faso). Nach massiven Unruhen griff das Militär gegen die Regierung ein, zwang Präsident Maurice Yaméogo zum Rücktritt und ersetzte ihn durch Oberstleutnant Sangoulé Lamizana. Lamizana regierte bis 1980, als ihn ein weiterer Militärputsch stürzte. Der Putsch von 1966 war der erste in einer langen Reihe von Putschen in Obervolta und später in Burkina Faso – sowohl erfolgreich als auch gescheitert – und markierte den Beginn einer 50-jährigen Militärherrschaft. Was werden wir tun?"

ron_coupscountry.100.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.100.d:0 "Der syrische Staatsstreich von 1966 bezieht sich auf Ereignisse zwischen dem 21. und 23. Februar, in deren Verlauf die Regierung der Arabischen Republik Syrien gestürzt und ersetzt wurde. Das regierende Nationalkommando der Arabischen Sozialistischen Baath-Partei wurde durch eine Vereinigung des Militärkomitees der Partei und des Regionalkommandos unter der Führung von Salah Jadid entmachtet. Der Putsch wurde durch eine Verschärfung des Machtkampfes zwischen der alten Garde der Partei, vertreten durch Michel Aflaq, Salah al-Din al-Bitar und Munif al-Razzaz, und den jüngeren Fraktionen, die eine neobaathistische Position vertraten, ausgelöst. Am 21. Februar ordneten Anhänger der alten Garde in der Armee die Versetzung ihrer Rivalen an. Zwei Tage später startete das Militärkomitee mit Unterstützung der jüngeren Fraktionen einen Putsch, der gewaltsame Kämpfe in Aleppo, Damaskus, Deir ez-Zor und Latakia zur Folge hatte. Infolge des Putsches flohen die historischen Gründer der Partei aus dem Land und verbrachten den Rest ihres Lebens im Exil. Was werden wir tun?"

ron_coupscountry.101.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.101.d:0 "Der nigerianische Staatsstreich von 1966 begann am 15. Januar 1966, als meuternde nigerianische Soldaten unter der Führung von Chukwuma Kaduna Nzeogwu und Emmanuel Ifeajuna 22 Menschen töteten, darunter den nigerianischen Premierminister, zahlreiche hochrangige Politiker, zahlreiche hochrangige Armeeoffiziere (einschließlich ihrer Frauen) und Wachposten im Schutzdienst. Die Putschisten griffen die Städte Kaduna, Ibadan und Lagos an und blockierten innerhalb von zwei Tagen den Niger und den Benue, bevor sie überwältigt wurden. Der kommandierende General der nigerianischen Armee, Johnson Aguiyi-Ironsi, sah sich gezwungen, die Regierung eines Landes im Umbruch zu übernehmen, wodurch Nigerias junge Demokratie unabsichtlich auf Eis gelegt wurde. Seine Machtübernahme wurde von den Putschisten, bei denen es sich hauptsächlich um Igbo-Offiziere handelte, als Verschwörung angesehen, um General Aguiyi-Ironsi den Weg zum Staatsoberhaupt Nigerias zu ebnen. Infolgedessen führten die Vergeltungsschläge von Angehörigen der nigerianischen Armee aus dem Norden, die zum Tod vieler unschuldiger Igbo-Soldaten und Zivilisten führten, zum nigerianischen Bürgerkrieg. Was werden wir tun?"

ron_coupscountry.102.t:0 "Nigerianischer Gegenputsch"
ron_coupscountry.102.d:0 "Der nigerianische Gegenputsch von 1966, auch bekannt als „Juli-Revanche“, war der zweite von vielen Militärputschen in Nigeria. Er wurde von Oberstleutnant Murtala Muhammed und zahlreichen Offizieren aus dem Norden geplant. Der Putsch begann am 28. Juli 1966 gegen Mitternacht als Meuterei und war eine Reaktion auf die Tötung von Politikern und Offizieren aus dem Norden durch überwiegend Igbo-Soldaten am 15. Januar 1966 (siehe nigerianischer Staatsstreich von 1966). Die Meuterei/der Gegenputsch im Juli führte zur Ermordung von Nigerias erstem militärischen Staatschef, General Johnson Aguiyi-Ironsi, und Oberstleutnant Adekunle Fajuyi (der einen zu Besuch weilenden Aguiyi-Ironsi beherbergte) in Ibadan durch verärgerte Unteroffiziere aus dem Norden. Nach dem Ende der Regierung Ironsis wurde Oberstleutnant Yakubu Gowon von den Putschisten im Juli 1966 zum Staatsoberhaupt ernannt. Was werden wir tun?"

ron_coupscountry.103.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.103.d:0 "Der Putsch vom Juni 1966 machte General Juan Carlos Onganía zum De-facto-Präsidenten. Unterstützt wurde er von mehreren Führern des Allgemeinen Gewerkschaftsbundes (CGT), darunter Generalsekretär Augusto Vandor. Es folgten eine Reihe von vom Militär ernannten Präsidenten und die Umsetzung einer liberalen Wirtschaftspolitik, die von multinationalen Konzernen, Arbeitgeberverbänden, Teilen der mehr oder weniger korrupten Arbeiterbewegung und der Presse unterstützt wurde. Während frühere Militärputsche auf die Errichtung temporärer Übergangsjuntas abzielten, zielte die von Onganía angeführte Revolución Argentina auf die Errichtung einer neuen politischen und sozialen Ordnung, die sich sowohl gegen die liberale Demokratie als auch gegen den Kommunismus richtete und den argentinischen Streitkräften eine führende politische und wirtschaftliche Rolle einräumen sollte. Was werden wir tun?"

ron_coupscountry.104.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.104.d:0 "Der chilenische Staatsstreich von 1973 war ein Militärputsch in Chile, der die Regierung der Unidad Popular von Präsident Salvador Allende stürzte. Am 11. September 1973, nach einer längeren Phase sozialer Unruhen und politischer Spannungen zwischen dem oppositionskontrollierten Kongress und dem sozialistischen Präsidenten sowie einem von US-Präsident Richard Nixon angeordneten Wirtschaftskrieg, putschte sich eine Gruppe von Militärs unter Führung von General Augusto Pinochet und Admiral José Toribio Merino an die Macht und beendete die Zivilherrschaft. Das Militär errichtete eine Junta, die alle politischen Aktivitäten in Chile einstellte und linke Bewegungen unterdrückte, insbesondere kommunistische und sozialistische Parteien sowie die Bewegung der Revolutionären Linken (MIR). Pinochet erlangte innerhalb eines Jahres nach dem Putsch die absolute Macht und wurde Ende 1974 offiziell zum Präsidenten Chiles ernannt. Die Nixon-Regierung, die die Voraussetzungen für den Putsch geschaffen hatte, erkannte die Junta-Regierung umgehend an und unterstützte sie bei der Festigung ihrer Macht. Was werden wir tun?"

ron_coupscountry.105.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.105.d:0 "Am 21. April 1967, nur wenige Wochen vor den angesetzten Wahlen, putschte eine Gruppe rechtsgerichteter Armeeoffiziere unter Brigadegeneral Stylianos Pattakos und den Obersten George Papadopoulos und Nikolaos Makarezos die Macht. Den Obersten gelang es, durch Überraschungs- und Verwirrungsmomente schnell die Macht zu ergreifen. Pattakos war Kommandant des Panzerausbildungszentrums in Athen. Die Putschisten postierten Panzer an strategischen Positionen in Athen und erlangten so de facto die vollständige Kontrolle über die Stadt. Gleichzeitig wurde eine große Zahl kleiner mobiler Einheiten entsandt, um führende Politiker, Autoritätspersonen und normale Bürger zu verhaften, die laut im Voraus erstellten Listen linksgerichteter Sympathien verdächtigt wurden. Einer der ersten Verhafteten war Generalleutnant Grigorios Spandidakis, Oberbefehlshaber der griechischen Armee. Die Obersten überredeten Spandidakis, sich ihnen anzuschließen, und ließen ihn einen zuvor ausgearbeiteten Aktionsplan zur Durchführung des Putsches in die Tat umsetzen. Unter dem Kommando des Fallschirmjäger-Brigadegenerals Kostas Aslanides übernahm die LOK das griechische Verteidigungsministerium, während Pattakos die Kontrolle über Kommunikationszentren, das Parlament und den Königspalast erlangte und – detaillierten Listen zufolge – über 10.000 Menschen verhaftete. Was werden wir tun?"

ron_coupscountry.106.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.106.d:0 "Der togolesische Staatsstreich von 1967 war ein unblutiger Militärputsch, der sich am 13. Januar 1967 im westafrikanischen Togo ereignete. Der Anführer des Putsches, Oberstleutnant Étienne Eyadéma (später General Gnassingbé Eyadéma), stürzte Togos zweiten Präsidenten, Nicolas Grunitzky, den er nach dem Staatsstreich von 1963 praktisch an die Macht gebracht hatte. Nach dem Putsch wurden politische Parteien verboten und alle verfassungsmäßigen Prozesse ausgesetzt. Oberst Kléber Dadjo wurde zum Interimspräsidenten Togos (als Vorsitzender des Nationalen Versöhnungskomitees) ernannt, ein Amt, das er bis zum 14. April 1967 innehatte, als Eyadéma das Präsidentenamt übernahm. Was werden wir tun?"

ron_coupscountry.107.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.107.d:0 "Sierra Leone war das erste Land im postkolonialen Afrika, in dem erfolgreiche demokratische Wahlen stattfanden. Diese Auszeichnung währte jedoch nur vier Tage. Am 21. März 1967 beauftragte Lansana Samuel Hinga Norman mit der außergerichtlichen Verhaftung des neuen, demokratisch gewählten Premierministers Siaka Stevens. Die Verhaftung erfolgte noch vor der Verkündung des Wahlergebnisses. Lansana übernahm daraufhin die Kontrolle über das Regierungsgebäude sowie die nationalen Radio- und Fernsehsender und verhängte das Kriegsrecht in Sierra Leone. Am 22. März 1967 wiederholte Lansana in einer zweiten Radioansprache die Verhängung des Kriegsrechts. Was werden wir tun?"

ron_coupscountry.108.t:0 "Suharto hat einen Putsch gestartet"
ron_coupscountry.108.d:0 "Im Januar 1967 war Suharto überzeugt, Sukarno innerhalb der Streitkräfte jegliche nennenswerte Unterstützung entzogen zu haben, und die MPRS beschloss, eine weitere Sitzung abzuhalten, um Sukarno seines Amtes zu entheben. Am 22. Februar 1967 verkündete Sukarno seinen Rücktritt vom Präsidentenamt, und am 12. März entzog ihm die MPRS alle verbleibenden Machtbefugnisse und ernannte Suharto zum amtierenden Präsidenten. Sukarno wurde im Bogor-Palast unter Hausarrest gestellt; man hörte kaum noch von ihm, und er starb im Juni 1970. Am 27. März 1968 ernannte die MPRS Suharto für seine erste von fünf Jahren zum Präsidenten. Was werden wir tun?"

ron_coupscountry.109.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.109.d:0 "Am Freitag, dem 11. Oktober 1968, stürzte die Nationalgarde Präsident Arnulfo Arias, der sich in einem Kino in Panama-Stadt aufhielt. Als er von den Ereignissen erfuhr, flüchtete er in die von der US-Armee kontrollierte Panamakanalzone. Major Boris Martínez (aus der Provinz Chiriquí) und Oberstleutnant José Humberto Ramos (aus Santiago, Provinz Veraguas) befehligten den Putsch. Die „provisorische Regierungsjunta“ unter Führung der Obersten José María Pinilla Fábrega und Bolívar Urrutia Parrilla wurde eingesetzt. Am 12. Oktober berichtete die Zeitung El Mundo (die einzige an diesem Tag erscheinende Zeitung), dass eine Militärjunta die Macht übernommen habe, ohne die Namen ihrer Mitglieder zu nennen, und dass Truppen der Nationalgarde mit Maschinengewehren die Residenz von Arnulfo Arias umzingelt hätten, dem es gelungen war, in die Panamakanalzone zu fliehen. Die Zeitung berichtete außerdem, dass „in den Elendsvierteln von Panama-Stadt“ vereinzelte Schüsse zu hören waren. Der Direktor des Hospital Santo Tomás erklärte, ein Mann und eine Frau seien angeschossen und verletzt worden. Die Zeitung warnte, dass sämtliche Bürgerrechte aufgehoben worden seien. Im Jahr 1968 wurden Guerillaaktivitäten im Stadtgebiet und im Landesinneren registriert, die von der Federación de Estudiantes de Panamá und anderen Organisationen sowie von Anhängern des abgesetzten Präsidenten Arias durchgeführt wurden. Es kam zu Militäraktionen gegen die Nationalgarde, der Schließung von Zeitungen und der Verbreitung von Flugblättern und Geheimschriften. Was sollen wir tun?"

ron_coupscountry.110.t:0 "Revolution vom 17. Juli"
ron_coupscountry.110.d:0 "Die Revolution vom 17. Juli war ein unblutiger Putsch im Irak im Jahr 1968 unter der Führung von Ahmed Hassan al-Bakr, Abd ar-Razzaq an-Naif und Abd ar-Rahman al-Dawud, der Präsident Abdul Rahman Arif und Premierminister Tahir Yahya stürzte und den irakischen Regionalzweig der Arabischen Sozialistischen Baath-Partei an die Macht brachte. Zu den am Putsch und an der anschließenden Säuberung der gemäßigten Fraktion unter Naif beteiligten Baath-Anhängern gehörten Hardan al-Tikriti, Salih Mahdi Ammash und Saddam Hussein, der spätere Präsident des Irak. Der Putsch richtete sich in erster Linie gegen Yahya, einen ausgesprochenen Nasseristen, der die durch den Sechstagekrieg im Juni 1967 entstandene politische Krise ausnutzte, um Arifs gemäßigte Regierung zur Verstaatlichung der in britisch-amerikanischem Besitz befindlichen Iraq Petroleum Company (IPC) zu drängen, um das irakische „Öl als Waffe im Kampf gegen Israel“ einzusetzen. Die vollständige Verstaatlichung des IPC erfolgte erst 1972 unter der Baath-Regierung. Nach dem Putsch festigte die neue irakische Regierung ihre Macht, indem sie angebliche Machenschaften der USA und Israels anprangerte, im Zuge einer umfassenden Säuberung 14 Menschen (darunter neun irakische Juden) aufgrund erfundener Spionagevorwürfe öffentlich hinrichten ließ und die traditionell engen Beziehungen des Irak zur Sowjetunion ausbaute. Was werden wir tun?"

ron_coupscountry.111.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.111.d:0 "Der peruanische Staatsstreich von 1968 ereignete sich während der Regierung Belaúnde (1963–1968). Politische Streitigkeiten wurden zur Normalität, es kam zu heftigen Auseinandersetzungen zwischen Präsident Belaúnde und dem Kongress, der von der Koalition APRA-UNO (Unión Nacional Odríista) dominiert wurde. Auch Zusammenstöße zwischen dem Präsidenten und seiner eigenen Partei Acción Popular (Volksaktion) waren an der Tagesordnung. Der Kongress zensierte daraufhin mehrere Kabinette der Regierung Belaúnde, und es herrschte allgemeine politische Instabilität. General Juan Velasco Alvarado führte den Putsch an. Was sollen wir tun?"

ron_coupscountry.112.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.112.d:0 "Die Putschisten waren Soldaten der Streitkräfte der Republik Sierra Leone, die mit ihren niedrigen Löhnen und schlechten Arbeitsbedingungen unzufrieden waren. Sie waren Teil der Anti-Corruption Revolutionary Movement (ACRM) unter Führung von Brigadier John Amadu Bangura, der nach dem Putsch als Generalstabschef diente. Bangura kritisierte den Zusammenbruch der Regierung nach einer Reihe von Putschen im Anschluss an die heiß umkämpften Wahlen vom März 1967. Die Sergeants formierten sich zunächst in der Stadt Darn und zogen dann in die Hauptstadt Freetown. Die ACRM inhaftierte hochrangige NRC-Mitglieder und verhaftete alle hochrangigen Offiziere in Armee und Polizei. Bangura war vom 18. bis 22. April 1968 kurzzeitig Staatsoberhaupt. Bei dem Putsch wurden mindestens zwölf Menschen getötet. An seinem letzten Tag im Amt übergab er den Posten des Premierministers an Siaka Stevens, nachdem sein Vorgänger Sir Henry Lightfoot Boston den All People&#39;s Congress zum Wahlsieger erklärt hatte. Gleichzeitig wurde die Verfassung Sierra Leones wiederhergestellt. Nachdem Stevens einen Einparteienstaat ausgerufen hatte, inszenierte Bangura einen weiteren Militärputsch, der diesmal erfolglos blieb. Bangura wurde später wegen Hochverrats hingerichtet. Sein Cousin Tinga Seisay wurde später ein aktiver Gegner der Stevens-Regierung und ein prodemokratischer Aktivist. Dies gilt allgemein als Beispiel für einen Putsch, der seine erklärten Ziele nicht erreichte, indem er eine spätere autokratische Regierung an die Macht brachte. Was werden wir tun?"

ron_coupscountry.113.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.113.d:0 "Der malische Staatsstreich von 1968 war ein unblutiger Militärputsch gegen die Regierung von Präsident Modibo Keïta am 19. November 1968. Angeführt wurde der Putsch von Leutnant (später Generalmajor) Moussa Traoré, der anschließend Staatsoberhaupt wurde. Was werden wir tun?"

ron_coupscountry.114.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.114.d:0 "Am 1. September 1969 übernahm eine Gruppe von etwa 70 jungen Armeeoffizieren, bekannt als die Bewegung der Freien Offiziere, und Mannschaften, die größtenteils dem Nachrichtenkorps zugeteilt waren, die Kontrolle über die Regierung und stürzte die libysche Monarchie. Der Putsch begann in Bengasi und war innerhalb von zwei Stunden abgeschlossen. Armeeeinheiten sammelten sich rasch zur Unterstützung des Putsches, und innerhalb weniger Tage wurde in Tripolis und anderswo im Land die militärische Kontrolle hergestellt. Die Bevölkerung, insbesondere die jüngere Bevölkerung in den Städten, reagierte begeistert auf den Putsch. Befürchtungen über Widerstand in der Cyrenaika und im Fezzan erwiesen sich als unbegründet. Es wurden keine Todesfälle oder gewalttätigen Zwischenfälle im Zusammenhang mit dem Putsch gemeldet. Was werden wir tun?"

ron_coupscountry.115.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.115.d:0 "Der Putsch begann am frühen Morgen des 25. Mai. Um 4 Uhr morgens waren die wichtigsten Einrichtungen im Gebiet Khartum-Bahri-Omdurman besetzt und führende Generäle der sudanesischen Armee verhaftet. Um 7 Uhr strahlte Radio Omdurman eine Aufzeichnung von Reden von Nimeiry und Babiker Awadalla aus, in denen sie ihre Regierungspläne darlegten. Später am Morgen strahlte Radio Omdurman auch die Namen der Mitglieder des neuen Ministerrats aus, die am 23. Mai bei einem Treffen zwischen Awadalla und den sechs wichtigsten Offizieren bestimmt worden waren. Was sollen wir tun?"

ron_coupscountry.116.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.116.d:0 "Im August 1969 erlitt Präsident Costa e Silva eine schwere Hirnthrombose. Vizepräsident Pedro Aleixo (der laut Verfassung amtierender Präsident hätte werden sollen), die Presse und die brasilianische Bevölkerung erfuhren einige Tage lang nichts von seinem Zustand, während die obersten Ränge der Streitkräfte über die Bewältigung der Krise entschieden. Am 31. August 1969 übernahmen die drei Verteidigungsminister mit Zustimmung der übrigen Militärelite die Exekutivgewalt und erließen das Verfassungsgesetz Nr. 12 (AI-12), um die Gründung einer Militärjunta zu formalisieren. Was werden wir tun?"

ron_coupscountry.117.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.117.d:0 "Ayub Khan war während der gesamten 1960er Jahre Präsident Pakistans, doch gegen Ende des Jahrzehnts kochte der Unmut der Bevölkerung über. Pakistan geriet in Aufruhr, und die seit langem anhaltenden Unruhen in Ostpakistan eskalierten im Januar 1969 zu einem Massenaufstand. Nach erfolglosen Gesprächen mit der Opposition übergab Ayub Khan im März 1969 die Macht an Yahya Khan, der umgehend das Kriegsrecht verhängte. Als Yahya Khan am 25. März 1969 das Amt übernahm, erbte er ein seit zwei Jahrzehnten bestehendes Verfassungsproblem der ethnischen Rivalität zwischen dem von Punjabi, Paschtunen und Mohajir dominierten Westpakistan und dem ethnisch bengalisch-muslimischen Ostpakistan. Darüber hinaus erbte Yahya auch das elf Jahre dauernde Problem, ein Land, das im Wesentlichen von einem Mann regiert wurde, in ein demokratisches Land umzuwandeln, was die ideologische Grundlage der Anti-Ayub-Bewegung von 1968–69 bildete. Als Armeechef verfügte Yahya über alle Fähigkeiten, Qualifikationen und das Potenzial, erbte jedoch ein äußerst komplexes Problem und war gezwungen, die Mehrfachrolle eines Übergangspräsidenten des Landes zu übernehmen, eine provisorische Verfassung zu entwerfen, die Frage der Einheit zu lösen und die Frustrationen und das Gefühl der Ausbeutung und Diskriminierung zu lindern, die im Ostflügel durch eine Reihe von Regierungspolitiken seit 1948 sukzessive entstanden waren. Was werden wir tun?"

ron_coupscountry.118.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.118.d:0 "Am 15. Oktober 1969 wurde Präsident Abdirashid Ali Sharmarke, Somalias zweiter Präsident der postkolonialen Ära, von seinem Leibwächter mit einem automatischen Gewehr erschossen, als er in der nördlichen Stadt Las Anod aus einem Auto stieg. Sein Nachfolger wurde Interimspräsident Scheich Mukhtar Mohamed Hussein. Der Putsch begann am Tag nach Sharmarkes Beerdigung. Der Staatsstreich fand in den frühen Morgenstunden des 21. Oktober 1969 statt. Truppen der somalischen Nationalen Streitkräfte, unterstützt von Panzern und kommandiert von verschiedenen Mitgliedern des Obersten Revolutionsrats, riegelten mehrere strategische Ziele in Mogadischu ab, darunter das Parlamentsgebäude, das Informationsministerium, den Sender Radio Mogadischu, das Polizeipräsidium und die Villa von Premierminister Egal. Hohe Regierungsbeamte wurden entführt und inhaftiert. Während des Putsches wurden auch mehrere ehemalige hochrangige somalische Politiker festgenommen, darunter der ehemalige Präsident Aden Adde und der ehemalige Premierminister Abdirizak Haji Hussein. Beide wurden inhaftiert und erst 1973 freigelassen. Auch Premierminister Egal wurde inhaftiert, allerdings in Einzelhaft. Trotz der Besetzung von Polizeigebäuden im Zuge des Putsches leistete die Polizei dem Militär keinen Widerstand und kooperierte sogar mit ihm. Jama Ali Korshel, der Chef der somalischen Polizei, wurde zum stellvertretenden Vorsitzenden des Obersten Revolutionsrats ernannt. Was sollen wir tun?"

ron_coupscountry.119.t:0 "Korrigierende Revolution"
ron_coupscountry.119.d:0 "Al-Assad begann kurz nach der gescheiterten syrischen Militärintervention in der Krise des Schwarzen Septembers in Jordanien mit der Planung seiner Machtübernahme. Während Al-Assad seit 1969 de facto die syrische Politik kontrollierte, hielten Salah Jadid und seine Anhänger weiterhin alle formellen Machtinstrumente inne. Nach der Teilnahme an Gamal Abdel Nassers Beerdigung kehrte Al-Assad nach Syrien zurück, um am außerordentlichen Nationalkongress am 30. Oktober 1970 teilzunehmen. Auf dem Kongress wurde Al-Assad von Jadid und seinen Anhängern, die die Mehrheit der Parteidelegierten stellten, verurteilt. Vor seiner Teilnahme am Kongress hatte Al-Assad jedoch ihm treu ergebenen Truppen befohlen, das Gebäude zu umzingeln, in dem der Kongress stattfand. Die Kritik an Al-Assads politischer Position hielt an, doch als Assads Truppen das Gebäude umzingelten, wusste die Mehrheit der Delegierten, dass sie die Schlacht verloren hatten. Was werden wir tun?"

ron_coupscountry.120.t:0 "Der Kronprinz startete einen Putsch"
ron_coupscountry.120.d:0 "Am 23. Juli 1970 informierte Qaboos bin Said al Said, der 29-jährige Sohn des Sultans und Absolvent von Sandhurst, angeblich die britischen Kommandeure über seine Absicht, seinen Vater zu stürzen. Die Planungen für den Putsch waren jedoch bereits seit Wochen im Gange, und von den Briten geführte Militäreinheiten wurden in Stellung gebracht, um den Sultan zu stürzen. Graham berief die obersten arabischen Kommandeure des Wüstenregiments ein, der wichtigsten omanischen Einheit, die den Putsch durchführen sollte, und informierte sie über den Brief von Qaboos, in dem diesen die britischen Offiziere „befohlen“ wurden, den Putsch durchzuführen. Das Treffen sicherte ihnen ihre Loyalität und Kooperation. Die Truppen trafen am al-Husn-Palast in Salalah, Oman ein und stießen auf keinen Widerstand. Der Stammesscheich der 500 Gardisten, die mit der Verteidigung der Palastfassade betraut waren, war von den Briten überredet worden, seinen Männern vor dem Putsch den Rückzug zu befehlen. Der Rest des Putsches wurde überwiegend von arabischen Truppen durchgeführt, um das Ausmaß der britischen Beteiligung an der Operation zu verschleiern. Während des Putsches schoss Said bin Taimur Scheich Braik Al Ghafri, einem Putschisten und Sohn eines prominenten omanischen Gouverneurs, in den Bauch und schoss sich beim Spannen seiner Pistole versehentlich selbst in den Fuß. Said bin Taimur gelang es mit einigen Vertrauten und Leibwächtern kurzzeitig durch eine Reihe versteckter Gänge und Tunnel zu entkommen, wurde aber schnell wieder gefasst. Der verwundete Sultan drängte seinen Berater, Oldman eine dringende Nachricht über die Ereignisse zu schicken, die Oldman als Putschplaner ignorierte. Der Putsch endete, als Said bin Taimur eine Abdankungserklärung unterzeichnete und die Zügel des Landes an seinen Sohn Qaboos übergab. Was sollen wir tun?"

ron_coupscountry.121.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.121.d:0 "Irgendwann am 16. oder 17. März konnte Sirik Matak Lon Nol schließlich dazu bewegen, Sihanouk aus der Regierung zu entfernen. Lon Nol, der bis dahin möglicherweise nur gehofft hatte, Sihanouk würde seine Beziehungen zu Nordvietnam beenden, zeigte sich zunächst zögerlich, gegen das Staatsoberhaupt vorzugehen. Um ihn zu überzeugen, spielte Sirik Matak ihm angeblich eine auf Band aufgezeichnete Pressekonferenz aus Paris vor, in der Sihanouk drohte, sie beide nach seiner Rückkehr nach Phnom Penh hinzurichten. Der Premierminister blieb jedoch unentschlossen, sodass Sirik Matak, begleitet von drei Armeeoffizieren, den weinenden Lon Nol schließlich mit vorgehaltener Waffe zwang, die notwendigen Dokumente zu unterzeichnen. Am nächsten Tag, dem 18. März, bezog die Armee Stellungen rund um die Hauptstadt und unter Leitung von In Tam fand in der Nationalversammlung eine Debatte statt. Ein Mitglied der Versammlung (Kim Phon, der später von pro-Sihanouk-Demonstranten in Kampong Cham getötet wurde) verließ aus Protest die Sitzung, blieb jedoch unverletzt. Der Rest der Versammlung stimmte einstimmig für die Anwendung von Artikel 122 der kambodschanischen Verfassung, der Sihanouk das Vertrauen entzog. Lon Nol übernahm im Notfall die Macht des Staatsoberhaupts, während das Amt an den Präsidenten der Generalversammlung, Cheng Heng, überging. In Tam wurde als Präsident des Sangkum bestätigt. Die Absetzung Sihanouks folgte somit im Wesentlichen verfassungsmäßigen Formen und war keine offensichtliche militärische Machtübernahme. Diese Ereignisse markierten die Gründung der Khmer-Republik. Was werden wir tun?"

ron_coupscountry.122.t:0 "Türkisches Militärmemorandum"
ron_coupscountry.122.d:0 "In dieser Atmosphäre übergab Generalstabschef Memduh Tağmaç dem Premierminister am 12. März ein Memorandum, das eigentlich einem Ultimatum der Streitkräfte gleichkam. Darin wurde „die Bildung einer starken und glaubwürdigen Regierung im Rahmen demokratischer Prinzipien gefordert, die die derzeitige anarchische Situation neutralisiert und, inspiriert von Atatürks Ansichten, die in der Verfassung vorgesehenen Reformgesetze umsetzt“ und „der Anarchie, den Bruderkämpfen und den sozialen und wirtschaftlichen Unruhen“ ein Ende setzt. Sollten die Forderungen nicht erfüllt werden, würde die Armee „ihrer verfassungsmäßigen Pflicht nachkommen“ und selbst die Macht übernehmen. Demirel trat nach einem dreistündigen Treffen mit seinem Kabinett zurück; der erfahrene Politiker und Oppositionsführer İsmet İnönü verurteilte jegliche Einmischung des Militärs in die Politik aufs Schärfste. Während die genauen Gründe für die Intervention umstritten bleiben, gab es drei allgemeine Motivationen hinter dem Memorandum. Erstens glaubten die höheren Kommandeure, Demirel habe die Macht verloren und sei nicht in der Lage, mit den zunehmenden Unruhen und dem politischen Terrorismus umzugehen. Deshalb wollten sie die Ordnung in der Türkei wiederherstellen. Zweitens schienen viele Offiziere nicht bereit zu sein, die Verantwortung für die gewaltsamen Maßnahmen der Regierung zu übernehmen, wie etwa die Niederschlagung der Arbeiterdemonstrationen in Istanbul im Juni zuvor. Radikalere Mitglieder waren überzeugt, dass sich die Unruhen und marxistischen Revolutionsbewegungen nicht allein durch Zwang stoppen ließen und dass der soziale und wirtschaftliche Reformismus, der dem Putsch von 1960 zugrunde lag, in die Praxis umgesetzt werden müsse. Schließlich kam eine Minderheit der höheren Offiziere zu dem Schluss, dass Fortschritt innerhalb eines liberalen demokratischen Systems unmöglich sei und dass autoritäre Regime zu einer egalitäreren, unabhängigeren und „moderneren“ Türkei führen würden. Andere Offiziere waren der Meinung, sie müssten eingreifen, und sei es nur, um diesen radikalen Elementen zuvorzukommen. Was sollen wir tun?"

ron_coupscountry.123.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.123.d:0 "Als Amin erfuhr, dass Obote ihn wegen Veruntreuung von Armeegeldern verhaften wollte, startete er am 25. Januar 1971 einen Putsch, während Obote an einem Gipfeltreffen des Commonwealth in Singapur teilnahm. Amin treu ergebene Armee- und Militärpolizeitruppen sicherten strategische Positionen in und um Kampala und Entebbe. Die Putschisten riegelten den internationalen Flughafen von Entebbe ab, um Obotes Rückkehr zu verhindern, und Panzer und Soldaten patrouillierten in den Straßen von Kampala und Entebbe. Hier leisteten einige Präsident Obote treu ergebene Soldaten und Mitglieder der General Service Unit den Putschisten Widerstand, und auch an der Polizeiakademie in Kampala kam es zu Kämpfen. Aus Jinja, etwa 80 Kilometer von Kampala entfernt, wurden heftige Kämpfe gemeldet. Obotes Residenz wurde umstellt und wichtige Straßen gesperrt. Die Putschisten verhängten eine nächtliche Ausgangssperre. Insgesamt waren die Obote-Anhänger zu unorganisiert, um wirksamen Widerstand zu leisten, und wurden schnell überwältigt. Um 16:30 Uhr wurde bekannt gegeben, dass Armee und Polizei unter Amins Führung das gesamte Land kontrollierten. Im ugandischen Radio wurde die Obote-Regierung der Korruption beschuldigt. Die Armee sei überzeugt, dass Obotes Politik zu Gewalt führe, und warf ihm vor, bestimmte Regionen des Landes zu bevorzugen. Die Sendung wurde in der Hauptstadt mit jubelnden Menschenmengen aufgenommen. Nachdem Amin die Macht an sich gerissen hatte, säuberte er das Militär von politischen Rivalen und befahl die Ermordung von Acholi- und Lango-Soldaten, die er verdächtigte, Obote zu unterstützen. Bis 1972 wurden etwa 5.000 von ihnen getötet. Was sollen wir tun?"

ron_coupscountry.124.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.124.d:0 "Thanom ernannte sich im Februar 1969 nach den Parlamentswahlen selbst zum Premierminister. Im folgenden Jahr begannen die Bauernaufstände der 1970er Jahre in Thailand. Im November 1971 putschte er dann gegen seine eigene Regierung und begründete dies mit der Notwendigkeit, die kommunistische Unterwanderung zu unterbinden. Er löste das Parlament auf, ernannte sich selbst zum Vorsitzenden des Nationalen Exekutivrates und amtierte ein Jahr lang als Übergangsregierung. Im Dezember 1972 ernannte er sich selbst zum vierten Mal zum Premierminister und fungierte zudem als Verteidigungs- und Außenminister. Thanom, sein Sohn Oberst Narong und Narongs Schwiegervater General Praphas Charusathien wurden als die „drei Tyrannen“ bekannt. Was werden wir tun?"

ron_coupscountry.125.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.125.d:0 "Acheampong führte am 13. Januar 1972 einen unblutigen Staatsstreich durch, um die demokratisch gewählte Regierung der Fortschrittspartei und ihren Vorsitzenden Dr. Kofi Busia zu stürzen. Er wurde Staatsoberhaupt und Vorsitzender des Nationalen Erlösungsrates (NRC), der später am 9. Oktober 1975 in den Obersten Militärrat umgewandelt wurde, mit Oberst Acheampong (befördert zum General) als Vorsitzendem. Was werden wir tun?"

ron_coupscountry.126.t:0 "Proklamation Nr. 1081"
ron_coupscountry.126.d:0 "Allgemeiner Befehl Nr. 1 – Der Präsident verkündete, dass er die gesamte Regierung einschließlich aller ihrer Behörden und Einrichtungen leiten und alle Befugnisse seines Amtes ausüben werde, einschließlich seiner Rolle als Oberbefehlshaber der Streitkräfte der Philippinen.\nAllgemeiner Befehl Nr. 2 – Der Präsident wies den Verteidigungsminister an, die in der beigefügten Liste genannten Personen festzunehmen oder verhaften zu lassen und in Gewahrsam zu nehmen und sie festzuhalten, bis der Präsident oder sein ordnungsgemäß benannter Vertreter etwas anderes anordnet, sowie Personen festzunehmen oder verhaften zu lassen und in Gewahrsam zu nehmen und sie festzuhalten, bis sie auf Anordnung des Präsidenten oder seines ordnungsgemäß benannten Vertreters freigelassen werden.\nAllgemeiner Befehl Nr. 3 – Der Präsident ordnete an, dass alle Exekutivabteilungen, Ämter, Büros, Behörden und Einrichtungen der Nationalregierung, staatseigene oder staatlich kontrollierte Unternehmen sowie alle Regierungen aller Provinzen, Städte, Gemeinden und Barrios unter der Leitung ihrer derzeitigen Beamten und Angestellten weiterarbeiten sollen, bis der Präsident oder seine ordnungsgemäß benannten Vertreter etwas anderes anordnen. Der Präsident ordnete außerdem an, dass die Justiz weiterhin gemäß ihrer gegenwärtigen Organisation und Besetzung arbeiten und versuchen soll, alle Straf- und Zivilsachen gemäß den geltenden Gesetzen zu entscheiden, mit Ausnahme bestimmter in der Anordnung aufgeführter Fälle.\nAllgemeine Anordnung Nr. 4 – Der Präsident ordnete an, dass auf den gesamten Philippinen von Mitternacht bis vier Uhr morgens eine Ausgangssperre aufrechterhalten und durchgesetzt wird.\nAllgemeine Anordnung Nr. 5 – Alle Kundgebungen, Demonstrationen und andere Formen von Gruppenaktionen, einschließlich Streiks und Streikposten, in wichtigen Industrien wie in Unternehmen, die in der Herstellung oder Verarbeitung sowie in der Produktion oder Verarbeitung wichtiger Güter oder Produkte für den Export tätig sind, und in Unternehmen, die im Bankwesen jeglicher Art tätig sind, sowie in Krankenhäusern und in Schulen und Hochschulen sind verboten.\nAllgemeine Anordnung Nr. 6 – Niemand darf außerhalb seines Wohnsitzes eine Schusswaffe besitzen oder tragen, es sei denn, er ist ordnungsgemäß dazu befugt, eine solche Schusswaffe zu besitzen oder zu tragen, mit Ausnahme derjenigen, die im Dienst der Philippinen ins Ausland geschickt werden. Was werden wir tun?"
ron_coupscountry.126.a:1 "Implementieren Sie die Proklamation"
ron_coupscountry.126.b:1 "Respektiere die Demokratie"

ron_coupscountry.127.t:0 "Oktober-Restaurierung"
ron_coupscountry.127.d:0 "Der Oktober-Yusin oder die Oktober-Restauration war ein südkoreanischer Selbstputsch im Oktober 1972, bei dem Präsident Park Chung-hee die diktatorische Macht übernahm. Park war nach dem Putsch vom 16. Mai 1961 als Vorsitzender des Obersten Rates für Nationalen Wiederaufbau an die Macht gekommen. 1963 gewann er die Wahlen und übernahm das Amt des zivilen Präsidenten. Was werden wir tun?"

ron_coupscountry.128.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.128.d:0 "Der Putsch wurde von Soldaten der Garnison von Ouidah durchgeführt und ereignete sich während einer Sitzung des Präsidialrats zwischen Maga und Ahomadégbé-Tomêtin. Berichten vom Tatort zufolge erschienen Soldaten plötzlich im Kabinettssaal des Präsidentenpalastes in der Hauptstadt Porto Novo und feuerten Schüsse ab; verletzt wurde jedoch niemand. Kérékou führte die erste bewaffnete Kompanie Soldaten an, die in die Sitzung eindrangen und dort das Ende des Präsidialrats verkündeten. Kérékou verkündete den Putsch im nationalen Radio (später ORTB) mit den Worten, die „dreiköpfige Gestalt sei ein wahres Monster“, geplagt von „angeborenen Mängeln … notorischer Ineffizienz und … unverzeihlicher Inkompetenz“. Ähnlich wie der Staatsstreich von Christophe Soglo im Jahr 1963 wurde dieser Putsch von einem Großteil der Bevölkerung des Landes positiv aufgenommen. Kerekou ernannte sich selbst zum neuen Staatsoberhaupt und besetzte die verschiedenen Ministerposten mit Militärs. Was werden wir tun?"

ron_coupscountry.129.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.129.d:0 "López diente 1957 kurzzeitig einer Militärjunta, die nach den Wahlen zurücktrat. Nach einem gewaltsamen Putsch amtierte er vom 3. Oktober 1963 bis zum 7. Juni 1971 erstmals als Präsident. Anschließend ließ er im April 1971 weitere Wahlen (die Parlamentswahlen in Honduras 1971) abhalten, bei denen Ramón Ernesto Cruz an die Macht kam. Am 4. Dezember 1972 übernahm López im Zuge des Staatsstreichs in Honduras erneut die Macht. Was werden wir tun?"

ron_coupscountry.130.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.130.d:0 "König Zahir Shah und mehrere seiner Begleiter, darunter Sardar Shah Wali Khan, verließen Afghanistan am Morgen des 25. Juni 1973 über Rom in Richtung London, angeblich um sich wegen einer Augenverletzung behandeln zu lassen. Nach der Behandlung kehrte er nach Italien zurück und verbrachte einige Zeit auf der Insel Ischia. Mohammed Daoud Khan startete am Morgen des 17. Juli zusammen mit mehreren hundert seiner Anhänger aus der Armee den Putsch. Innerhalb weniger Stunden und ohne bewaffneten Widerstand endete die Monarchie, und Khan rief um 7 Uhr morgens über Radio Afghanistan die neue Republik aus. Mitarbeiter des Nationalen Sicherheitsrats der Vereinigten Staaten beschrieben den Putsch als „gut geplanten und rasch ausgeführten Putsch“. Was werden wir tun?"

ron_coupscountry.131.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.131.d:0 "Der ruandische Staatsstreich von 1973, auch bekannt als Staatsstreich vom 5. Juli, war ein von Juvénal Habyarimana inszenierter Militärputsch gegen den amtierenden Präsidenten Grégoire Kayibanda in der Republik Ruanda. Der Putsch fand am 5. Juli 1973 statt und wurde von vielen als Verrat angesehen. Was werden wir tun?"

ron_coupscountry.132.t:0 "Dekret Nr. 464/973"
ron_coupscountry.132.d:0 "Der Präsident der Republik verfügt:\n1. Die Kammern der Senatoren und der Abgeordneten werden hiermit für aufgelöst erklärt.\n2. Hiermit wird ein Staatsrat eingerichtet, der aus zu ernennenden Mitgliedern besteht und folgende Befugnisse hat:\nA) Die spezifischen Aufgaben der Generalversammlung unabhängig wahrzunehmen;\nB) Die Maßnahmen der Exekutive hinsichtlich der Achtung der individuellen Rechte und der Unterwerfung dieser Macht unter die Verfassungs- und Rechtsnormen zu kontrollieren;\nC) Einen Entwurf für eine Verfassungsreform auszuarbeiten, der die Grundprinzipien der Demokratie und der Repräsentanten bekräftigt und vom Wahlgremium gebührend anerkannt werden muss.\n3. Es ist verboten, durch die Presse mündlich, schriftlich oder im Fernsehen Informationen, Kommentare oder Aufzeichnungen jeglicher Art zu verbreiten, die direkt oder indirekt auf die Bestimmungen dieses Dekrets hinweisen oder sich darauf beziehen und der Exekutive diktatorische Absichten zuschreiben.\n4. Die Streitkräfte und die Polizei sind befugt, die notwendigen Maßnahmen zu ergreifen, um die weitere Bereitstellung wesentlicher öffentlicher Dienste sicherzustellen. Was werden wir tun?"
ron_coupscountry.132.a:1 "Umsetzung des Dekrets"
ron_coupscountry.132.b:1 "Demokratie schützen"

ron_coupscountry.133.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.133.d:0 "Brigadegeneral Dimitrios Ioannidis, ein verärgerter Junta-Hardliner und langjähriger Protegé von Papadopoulos als Chef der gefürchteten Militärpolizei, nutzte den Aufstand als Vorwand, um die öffentliche Ordnung wiederherzustellen, und inszenierte einen Gegenputsch, der Papadopoulos und Spyros Markezinis am 25. November stürzte. Das Militärrecht wurde wieder eingeführt, und die neue Junta ernannte General Phaedon Gizikis zum Präsidenten und den Ökonomen Adamantios Androutsopoulos zum Premierminister, obwohl Ioannidis der starke Mann hinter den Kulissen blieb. Was werden wir tun?"

ron_coupscountry.134.t:0 "Nelkenrevolution"
ron_coupscountry.134.d:0 "Die Nelkenrevolution, auch bekannt als 25. April, war ursprünglich ein Militärputsch vom 25. April 1974 in Lissabon, der das autoritäre Regime des Estado Novo stürzte. Die Revolution begann als Putsch der Bewegung der Streitkräfte (portugiesisch Movimento das Forças Armadas, MFA), die aus regimekritischen Offizieren bestand, wurde aber bald mit einer unerwarteten, zivilen Widerstandskampagne der Bevölkerung verbunden. Die Revolution führte zum Sturz des Estado Novo, beendete den portugiesischen Kolonialkrieg und leitete einen revolutionären Prozess ein, der zu einem demokratischen Portugal führen sollte. Der Name der Revolution entstand, weil fast keine Schüsse fielen. Celeste Caeiro schenkte den Soldaten Nelken, als die Bevölkerung auf die Straße ging, um das Ende der Diktatur zu feiern; andere Demonstranten folgten ihrem Beispiel, und Nelken wurden in Gewehrmündungen und auf die Uniformen der Soldaten gesteckt. In Portugal ist der 25. April ein Nationalfeiertag zum Gedenken an die Revolution. Was werden wir tun?"

ron_coupscountry.135.t:0 "Die griechische Junta hat einen Putsch inszeniert"
ron_coupscountry.135.d:0 "Der Putsch wurde von Dimitrios Ioannidis, dem Schattenführer der griechischen Junta, angeordnet. Griechische Offiziere führten die zypriotische Nationalgarde an, um den Präsidentenpalast in Nikosia einzunehmen. Das Gebäude brannte fast vollständig nieder. Makarios entging bei dem Angriff nur knapp dem Tod. Er floh durch die Hintertür des Präsidentenpalastes nach Paphos, wo ihn die Briten am Nachmittag des 16. Juli festnahmen und ihn in einem Transportflugzeug der Royal Air Force von Akrotiri nach Malta und von dort am nächsten Morgen nach London flogen. Am 19. Juli nahm er an einer Sitzung des UN-Sicherheitsrats in New York teil und hielt eine Rede, in der er erklärte, Zypern sei von Griechenland überfallen worden. Was sollen wir tun?"

ron_coupscountry.136.t:0 "Äthiopische Revolution"
ron_coupscountry.136.d:0 "Am 12. September 1974 wurden Haile Selassie und seine Regierung vom Derg gestürzt, einem ideologiefreien Komitee aus einfachen Offizieren und Mannschaften der äthiopischen Armee, das zur herrschenden Militärjunta wurde. Am 21. März 1975 schaffte der Derg die Monarchie ab und übernahm den marxistisch-leninistischen Kommunismus als offizielle Ideologie. Damit etablierte er sich als provisorische Regierung für den Aufbau eines sozialistischen Staates in Äthiopien. Der Kronprinz ging ins Exil nach London, wo mehrere andere Mitglieder des Hauses Salomon lebten, während andere Mitglieder, die sich zum Zeitpunkt der Revolution in Äthiopien aufhielten, inhaftiert wurden. Zu den Inhaftierten gehörten Haile Selassie, seine Tochter aus erster Ehe, Prinzessin Ijigayehu, seine Schwester, Prinzessin Tenagnework, und viele seiner Neffen, Nichten, nahen Verwandten und Schwiegereltern. Am 27. August 1975 starb Haile Selassie unter mysteriösen Umständen im Jubilee Palace in Addis Abeba. Im selben Jahr verstaatlichte der Derg die meisten Industrien und privaten städtischen Immobilien. Was sollen wir tun?"

ron_coupscountry.137.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.137.d:0 "Der Staatsstreich in Bangladesch vom 15. August 1975 war ein Militärputsch, der von Offizieren mittleren Ranges in Bangladesch durchgeführt wurde. Die Offiziere planten, die säkulare Regierung von Scheich Mujibur Rahman durch eine islamische Regierung unter Khandaker Mushtaque Ahmed zu stürzen. Scheich Mujibur und die meisten seiner Familienmitglieder wurden bei dem Putsch getötet. Was sollen wir tun?"

ron_coupscountry.138.t:0 "Söldner haben einen Putsch gestartet"
ron_coupscountry.138.d:0 "Am 3. August 1975, weniger als einen Monat nach der Unabhängigkeit der Komoren von Frankreich, stürzte Soilih Präsident Said Mohamed Jaffar und übernahm die Führung eines Revolutionsrates, der die Komoren übernahm. Soilih, dessen Anhänger kaum bewaffnet waren, heuerte den französischen Söldner Bob Denard an, um Ahmed Abdallah zu stürzen. Im Januar 1976 wurde er offiziell Präsident des Revolutionsrates. Durch eine neue Verfassung erhielt er weitreichende Machtbefugnisse und setzte eine sozialistische Wirtschaftspolitik um. 1977 hielt er ein Referendum über seine Präsidentschaft ab, das mit 56,63 % der Stimmen angenommen wurde. Was sollen wir tun?"

ron_coupscountry.139.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.139.d:0 "Der nigerianische Staatsstreich von 1975 war ein unblutiger Militärputsch, der am 29. Juli 1975 in Nigeria stattfand, als eine Fraktion junger Offiziere der Streitkräfte General Yakubu Gowon stürzte (der selbst bei einem Gegenputsch von 1966 die Macht übernahm). Oberst Joseph Nanven Garba verkündete den Putsch in einer Sendung von Radio Nigeria (das 1978 zu FRCN wurde). Zum Zeitpunkt des Putsches nahm Gowon am 12. Gipfeltreffen der Organisation für Afrikanische Einheit (OAU) in Kampala, Uganda teil. Die Putschisten ernannten Brigadier Murtala Mohammed zum Staatsoberhaupt und Brigadier Olusegun Obasanjo zu seinem Stellvertreter. Der Putsch wurde durch die Unzufriedenheit junger Offiziere angesichts der mangelnden Fortschritte, die Gowon auf dem Weg zur Demokratie gemacht hatte, motiviert, während Garbas Rolle als Insider dafür verantwortlich ist, dass der Putsch unblutig verlief. Was werden wir tun?"

ron_coupscountry.140.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.140.d:0 "Der Putsch begann am 13. April vor Sonnenaufgang, als in Boraho, einem 56 Kilometer von der Hauptstadt entfernten Ort, Armeeeinheiten unter Leutnant Dimtolaum ihren Stützpunkt verließen und in Richtung N&#39;Djamena marschierten, wo sie am Rande der Stadt vor dem Präsidentenpalast mit seinen weißen Mauern zusammentrafen. Um 5:00 Uhr begann eine heftige und blutige Schlacht mit Tombalbayes Präsidentengarde, den Compagnies Tchadiennes de Securité (CTS). Ausschlaggebend für den Ausgang der Schlacht war die Ankunft des Interimskommandeurs der FAT, Noël Milarew Odingar, der Verstärkung brachte und das Kommando über die Aufständischen übernahm. Was werden wir tun?"

ron_coupscountry.141.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.141.d:0 "Poveda kam 1976 durch einen Militärputsch an die Macht und wurde vom Obersten Regierungsrat zum Präsidenten ernannt. Er regierte zusammen mit zwei weiteren Mitgliedern, General Guillermo Durán Arcentales (für die ecuadorianische Armee) und General Luis Leoro Franco (für die ecuadorianische Luftwaffe). Das Triumvirat entwarf einen Plan zur Rückkehr zu einer demokratischen Regierung, der nach einem Referendum über die Wahl zwischen einer neuen Verfassung, die von einer vom Triumvirat ernannten verfassungsgebenden Versammlung geschaffen wurde, und der Verfassung von 1948 mit mehreren Reformen zu Mehrparteienwahlen führte. Was werden wir tun?"

ron_coupscountry.142.t:0 "Die KPCh hat einen Putsch gestartet"
ron_coupscountry.142.d:0 "Am Abend sollte in der Großen Halle des Volkes eine außerordentliche Sitzung des Politbüros stattfinden. Ihre Anwesenheit war erforderlich. Da Wang Dongxing ihr Verbündeter gewesen war, hegten sie keinen Verdacht gegen ihn ... Als sie durch die Schwingtür in die Eingangshalle traten, wurden sie festgenommen und in Handschellen abgeführt. Eine Sondereinheit 8341 begab sich dann zu Frau Maos Residenz in der Fischerterrasse Nr. 17 und verhaftete sie. In dieser Nacht wurde Mao Yuanxin in der Mandschurei verhaftet, und die Propagandisten der Viererbande an der Peking-Universität und in Zeitungsredaktionen wurden in Gewahrsam genommen. Alles geschah ruhig und effizient. In Shanghai erhielten die Anhänger der Bande die Nachricht, sie sollten „zu einem Treffen“ nach Peking kommen. Sie kamen und wurden verhaftet. So wurden die Pläne der Viererbande, die absolute Macht auszuüben, vereitelt, ohne dass ein Tropfen Blut vergossen wurde. Was werden wir tun?"

ron_coupscountry.143.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.143.d:0 "Nach dem Massaker an der Thammasat-Universität vom 6. Oktober 1976 wurde der demokratisch gewählte Premierminister Seni Pramoj durch einen Militärputsch unter Admiral Sangad Chaloryu gestürzt. Zwei Tage später ernannte König Bhumibol Adulyadej seinen Favoriten Thanin zum Interimspremierminister. Thanin bestand darauf, sein Kabinett selbst zu bilden und lehnte die meisten Nominierungen der Militärjunta ab. Das Militär besetzte lediglich die Posten des stellvertretenden Premierministers und des stellvertretenden Verteidigungsministers. Thanin führte das erste thailändische Kabinett an, in dem Frauen, Wimolsiri Chamnarnvej und Lursakdi Sampatisiri, Ministerposten innehatten. Thanin galt als ehrlich und intelligent, aber auch als überaus ideologisch und politisch extrem. Was sollen wir tun?"

ron_coupscountry.144.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.144.d:0 "Der argentinische Staatsstreich von 1976 war ein rechtsgerichteter Putsch, der Isabel Perón am 24. März 1976 als Präsidentin Argentiniens stürzte. An ihrer Stelle wurde eine Militärjunta eingesetzt; diese wurde von Generalleutnant Jorge Rafael Videla, Admiral Emilio Eduardo Massera und Brigadegeneral Orlando Ramón Agosti angeführt. Der am 24. März 1976 eingeleitete politische Prozess erhielt den offiziellen Namen Nationaler Reorganisationsprozess, und die Junta blieb, wenn auch nicht mit ihren ursprünglichen Mitgliedern, bis zur Rückkehr zum demokratischen Prozess am 10. Dezember 1983 an der Macht. Angesichts der systematischen Verfolgung einer sozialen Minderheit wurde dieser Zeitraum als Völkermord eingestuft. Dies wurde in den Urteilen wegen Verbrechen gegen die Menschlichkeit festgestellt. Der Staatsstreich war seit Oktober 1975 geplant, und das US-Außenministerium erfuhr zwei Monate vor seiner Ausführung von den Vorbereitungen. Henry Kissinger traf sich nach dem Putsch mehrmals mit der Führung der argentinischen Streitkräfte und drängte sie, ihre Gegner schnell zu vernichten, bevor in den USA der Aufschrei über die Menschenrechtsverletzungen lauter würde. Was werden wir tun?"

ron_coupscountry.145.t:0 "Operation Fair Play"
ron_coupscountry.145.d:0 "Operation Fair Play war der Deckname für den Putsch des pakistanischen Generalstabschefs Muhammad Zia-ul-Haq vom 5. Juli 1977, mit dem er die Regierung von Premierminister Zulfikar Ali Bhutto stürzte. Der Putsch selbst verlief unblutig. Ihm gingen soziale Unruhen und politische Konflikte zwischen der linksgerichteten Regierung Bhuttos von der Pakistanischen Volkspartei und der rechtsgerichteten islamistischen Oppositionspartei Pakistanische Nationalallianz voraus, die Bhutto beschuldigte, die Parlamentswahlen von 1977 manipuliert zu haben. Bei der Ankündigung des Putsches versprach Zia „freie und faire Wahlen“ innerhalb von 90 Tagen. Diese wurden jedoch wiederholt unter dem Vorwand der Rechenschaftspflicht verschoben, und erst 1985 fanden die (parteilosen) Parlamentswahlen statt. Zia selbst blieb elf Jahre lang an der Macht, bis er bei einem Flugzeugabsturz starb. Was werden wir tun?"

ron_coupscountry.146.t:0 "SDUP hat einen Putsch gestartet"
ron_coupscountry.146.d:0 "Die Aufständischen übernahmen strategische Punkte auf der Hauptinsel Mahé, wo sich die Hauptstadt Victoria befindet. Die zentrale Polizeistation wurde „praktisch ohne einen einzigen Schuss“ eingenommen. Im Gegensatz dazu kam es auf der Polizeiwache Mont Fleuri, wo das Waffenlager untergebracht war, zu einem Schusswechsel. Ein Polizist und einer der Aufständischen wurden bei den Kämpfen getötet. Die Verschwörer verhafteten sechs Offiziere der britischen Streitkräfte, die die Polizei der Seychellen seit 1976, als die Seychellen ihre Unabhängigkeit vom Vereinigten Königreich erlangten, beraten hatten. Die Offiziere und ihre Familien sowie der Vorsitzende Richter des Obersten Gerichtshofs, Adrien O&#39;Brien Queen, ein Richter aus Irland, der ebenfalls von seiner Regierung ausgeliehen worden war, wurden nach Europa ausgeflogen. Was sollen wir tun?"

ron_coupscountry.147.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.147.d:0 "Der thailändische Staatsstreich vom Oktober 1977 war ein unblutiger Militärputsch, der am 20. Oktober 1977 in Thailand stattfand und von den Königlich Thailändischen Streitkräften (RTAF) inszeniert wurde. Der Putsch wurde nominell unter der Autorität von Admiral Sangad Chaloryu von der Königlich Thailändischen Marine, dem Chef des Nationalen Verwaltungsreformrats (NARC), durchgeführt, tatsächlich jedoch von General Kriangsak Chamanan von der Königlich Thailändischen Armee, dem Oberbefehlshaber der RTAF, angeführt. Er führte zur Absetzung von Premierminister Thanin Kraivichien, der das Amt unmittelbar nach dem Massaker an der Thammasat-Universität nach dem Staatsstreich von 1976 (der ebenfalls von Admiral Sangad angeführt wurde und zur Gründung des NARC führte) übernommen hatte. Was sollen wir tun?"

ron_coupscountry.148.t:0 "Saur Revolution"
ron_coupscountry.148.d:0 "Die Saur-Revolution, auch romanisiert als Sowr-Revolution oder Aprilrevolution oder Aprilputsch, war ein Staatsstreich (oder selbsternannte Revolution) unter Führung der sowjetisch unterstützten Demokratischen Volkspartei Afghanistans (DVPA) gegen die Herrschaft des afghanischen Präsidenten Mohammed Daoud Khan am 27. und 28. April 1978. Daoud Khan und der Großteil seiner Familie wurden im Präsidentenpalast ermordet. Die Revolution führte zur Bildung einer Regierung mit Nur Muhammad Taraki (Generalsekretär des Revolutionsrates) als Präsident und war der Vorläufer der sowjetischen Intervention 1979 und des sowjetisch-afghanischen Krieges gegen die Mudschaheddin von 1979 bis 1989. Was werden wir tun?"

ron_coupscountry.149.t:0 "Putsch vom 12. Dezember"
ron_coupscountry.149.d:0 "Der Staatsstreich vom 12. Dezember oder der „Militäraufstand vom 12.12.“ war ein Militärputsch, der am 12. Dezember 1979 in Südkorea stattfand. Generalmajor Chun Doo-hwan, Kommandeur des Sicherheitskommandos der südkoreanischen Armee, ordnete ohne Genehmigung des amtierenden Präsidenten Choi Kyu-ha die Verhaftung von General Jeong Seung-hwa, dem Stabschef der südkoreanischen Armee, an. Ihm wird vorgeworfen, an der Ermordung von Präsident Park Chung Hee beteiligt gewesen zu sein. Was sollen wir tun?"

ron_coupscountry.150.t:0 "Revolution vom 4. Juni"
ron_coupscountry.150.d:0 "Auslöser war, dass die damalige Militärregierung des Obersten Militärrats (SMC II) unter General F. K. Akuffo den damaligen Flight Lieutenant Jerry John Rawlings am 15. Mai 1979 wegen seines versuchten Regierungsumsturzes vor Gericht stellte. Dies geschah, weil Rawlings ein junger Soldat der ghanaischen Armee war, dem ebenso wie anderen Soldaten die Auszahlung ihres Gehalts verweigert wurde. Rawlings wendete den Prozess gegen die Regierung, indem er ihr massive Korruption vorwarf und die Freilassung seiner Mitangeklagten forderte, da er allein für die Meuterei verantwortlich sei. Bis zur Urteilsverkündung wurde er inhaftiert. Seine Tirade fand im ganzen Land Anklang, da es großes Leid gab. In der Nacht des 3. Juni 1979 brachen junge Offiziere, darunter Major Boakye Djan, in das Gefängnis ein, in dem Rawlings festgehalten wurde, befreiten ihn und führten ihn angeblich zum nationalen Radiosender, um eine Erklärung abzugeben. Das erste Mal, dass die Öffentlichkeit von Rawlings hörte, war seine inzwischen legendäre Erklärung, dass er von den jungen Offizieren freigelassen worden sei und unter ihrem Kommando stehe. Er forderte alle Soldaten auf, sich mit ihnen im Nicholson-Stadion im Burma Camp in Accra zu treffen. Die ganze Nation geriet in Aufruhr. Die Soldaten verhafteten hochrangige Militärs, darunter drei ehemalige Staatschefs, General F. K. Akuffo, Ignatious Kutu Acheampong und Afrifa, und stellten sie vor Gericht. Anschließend wurden sie erschossen. Was sollen wir tun?"

ron_coupscountry.151.t:0 "Operation Barracuda"
ron_coupscountry.151.d:0 "Die Operation Barracuda war eine Militäroperation, die Frankreich zur Unterstützung des neu eingesetzten Präsidenten der Zentralafrikanischen Republik, David Dacko, startete. Die Operation Caban vom 21. September 1979 war eine unblutige Militäroperation, bei der Kaiser Bokassa I. des Zentralafrikanischen Reiches gestürzt wurde. Was werden wir tun?"
ron_coupscountry.151.a:1 "Unterstützen Sie die Rebellen"
ron_coupscountry.151.b:1 "Wir können uns nicht einmischen"

ron_coupscountry.152.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.152.d:0 "Der salvadorianische Staatsstreich von 1979 war ein Militärputsch, der am 15. Oktober 1979 in El Salvador stattfand. Der von jungen Offizieren angeführte Putsch stürzte unblutig den Militärpräsidenten Carlos Humberto Romero und schickte ihn ins Exil. Der Machtgriff der Partei der Nationalen Versöhnung wurde gebrochen, und an ihrer Stelle errichtete das Militär die Revolutionäre Regierungsjunta von El Salvador (JRG). Die Junta bestand aus zwei Offizieren und drei Zivilisten. Was werden wir tun?"

ron_coupscountry.153.t:0 "Putsch vom 18. Mai"
ron_coupscountry.153.d:0 "Am 17. Mai 1980 zwang General Chun Doo-hwan das Kabinett, das Kriegsrecht auf das ganze Land auszudehnen, das zuvor nicht für Jeju-do gegolten hatte. Das erweiterte Kriegsrecht führte zur Schließung von Universitäten, zum Verbot politischer Aktivitäten und zu weiteren Einschränkungen der Presse. Um das Kriegsrecht durchzusetzen, wurden Truppen in verschiedene Teile des Landes entsandt. Am selben Tag stürmte die KCIA eine nationale Konferenz von Studentenführern von 55 Universitäten. Etwa 2.700 Menschen, darunter 26 Politiker, wurden festgenommen. Am 18. Mai 1980 erhoben sich die Bürger von Gwangju gegen Chun Doo-hwans Militärdiktatur und übernahmen die Kontrolle über die Stadt. Im Zuge des Aufstands griffen die Bürger zu den Waffen, um sich zu verteidigen, wurden aber letztendlich von ROKA niedergeschlagen. Was sollen wir tun?"

ron_coupscountry.154.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.154.d:0 "Eine Gruppe rechtsgerichteter Elemente des bolivianischen Militärs übte Druck auf Präsidentin Lidia Gueiler aus, General García Meza zum Oberbefehlshaber der Armee zu machen. Wenige Monate später erzwang die Junta der Kommandeure unter García Meza am 17. Juli 1980 einen gewaltsamen Staatsstreich, auch als Kokainputsch bezeichnet. Dabei wurden mehrere bolivianische Intellektuelle, darunter Marcelo Quiroga Santa Cruz, getötet. Als Teile der Bevölkerung Widerstand leisteten, wie schon beim gescheiterten Putsch vom November 1979, forderte dies Dutzende Todesopfer. Viele wurden gefoltert. Angeblich war die argentinische Armeeeinheit Batallón de Inteligencia 601 an dem Putsch beteiligt. Was sollen wir tun?"

ron_coupscountry.155.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.155.d:0 "Am 7. September 1980 beschlossen Evren und die vier Kommandeure der Streitkräfte, die Zivilregierung zu stürzen. Am 12. September verkündete der Nationale Sicherheitsrat (türkisch Milli Güvenlik Konseyi, MGK) unter Evrens Führung auf dem staatlichen Fernsehsender den Staatsstreich. Der MGK verhängte daraufhin das Kriegsrecht im ganzen Land, schaffte Parlament und Regierung ab, setzte die Verfassung außer Kraft und verbot alle politischen Parteien und Gewerkschaften. Er berief sich auf die kemalistische Tradition des staatlichen Säkularismus und der Einheit der Nation, die bereits frühere Putsche gerechtfertigt hatte, und stellte sich als Gegner von Kommunismus, Faschismus, Separatismus und religiösem Sektierertum dar. Was sollen wir tun?"

ron_coupscountry.156.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.156.d:0 "In den frühen Morgenstunden des 12. April 1980 starteten 17 Unteroffiziere und Soldaten der AFL unter Führung von Master Sergeant Samuel Doe einen gewaltsamen Staatsstreich. Alle Verschwörer waren indigene Liberianer, Tolbert hingegen gehörte den Americo-Liberianern an. Die Gruppe drang in den Präsidentenpalast ein und tötete Tolbert. Dessen Leiche wurde zusammen mit 27 anderen Putschopfern in einem Massengrab verscharrt. Berichten zufolge war Harrison Pennoh der Mörder Tolberts. Später versammelte sich eine Menge wütender Liberianer, beschimpfte die Leichen und bewarf sie mit Steinen. Was sollen wir tun?"

ron_coupscountry.157.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.157.d:0 "Der Staatsstreich von Guinea-Bissau 1980 war ein unblutiger Militärputsch, der am 14. November 1980 unter der Führung von Premierminister General João Bernardo Vieira in Guinea-Bissau stattfand. Er führte zur Absetzung von Präsident Luís Cabral, der das Amt seit 1973 innehatte, während der Unabhängigkeitskrieg des Landes noch andauerte. Darüber hinaus führte er zur Aufgabe der geplanten Vereinigung Guinea-Bissaus mit Kap Verde, einem ebenfalls portugiesischsprachigen westafrikanischen Land. Der kapverdische Zweig der PAIGC (der Regierungspartei in beiden Ländern) spaltete sich ab und gründete im Januar 1981 die neue PAICV unter der Führung von Aristides Pereira, Präsident von Kap Verde und ehemaliger Generalsekretär der PAIGC. Was werden wir tun?"

ron_coupscountry.158.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.158.d:0 "Der surinamischen Staatsstreich von 1980, gemeinhin als Sergeantenputsch bezeichnet, war ein Militärputsch in Suriname, der am 25. Februar 1980 stattfand, als eine Gruppe von 16 Sergeanten der surinamischen Streitkräfte (SKM) unter der Führung von Dési Bouterse die Regierung von Premierminister Henck Arron mit einem gewaltsamen Staatsstreich stürzte. Dies markierte den Beginn der Militärdiktatur, die das Land von 1980 bis 1991 beherrschte. Die Diktatur war geprägt von einer abendlichen Ausgangssperre, fehlender Pressefreiheit, einem Verbot politischer Parteien (ab 1985), einer Einschränkung der Versammlungsfreiheit, einem hohen Maß an Korruption in der Regierung und standrechtlichen Hinrichtungen politischer Gegner. Was werden wir tun?"

ron_coupscountry.159.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.159.d:0 "Am 1. Oktober begannen die Lehrer zu streiken, was sich Anfang November in einen Generalstreik verwandelte und die Regierung stark unter Druck setzte. Am 12. November setzte sich Präsident Lamizana mit 33 zu 24 Stimmen gegen ein Misstrauensvotum durch. Obwohl die Lehrer am 22. November zustimmten, ihre Arbeit wieder aufzunehmen, hatten die Unruhen ihren Höhepunkt noch nicht erreicht. Am 25. November führte Oberst Saye Zerbo einen Militärputsch durch, der Präsident Lamizana stürzte. Der Putsch war unblutig und erfolgreich. Die gegen die streikenden Arbeiter eingesetzte Bereitschaftspolizei versuchte einen Gegenputsch zur Unterstützung Lamisanas, konnte ihn jedoch nicht wieder einsetzen. Zerbo – ein Kriegsveteran, ehemaliger Außenminister von 1974 bis 1976, Kommandeur eines Armeeregiments in der Hauptstadt Ouagadougou und Chef des militärischen Geheimdienstes – setzte die Verfassung außer Kraft und gründete das Militärkomitee zur Wiederherstellung des nationalen Fortschritts (französisch: Comité Militaire de Redressement pour le Progrès National, CMPRN), eine 31-köpfige Junta. Mehrere Mitglieder der Junta waren jung und radikal, darunter die späteren Präsidenten Thomas Sankara und Blaise Compaoré. Zu den Teilen der Gesellschaft, die den Putsch unterstützten, gehörten die Mossi und die Katholiken aus Obervolta, zwei von Lamizana ausgegrenzte Gruppen, obwohl Zerbo wie sein Vorgänger ein Bissa-Muslim war. Was sollen wir tun?"

ron_coupscountry.160.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.160.d:0 "Am 1. September 1981 stürzte General André Kolingba den zentralafrikanischen Präsidenten David Dacko in einem unblutigen Putsch, während dieser sich zu einem offiziellen Staatsbesuch in Libyen aufhielt. Am Tag nach dem Putsch wurde ein „Militärkomitee für den nationalen Wiederaufbau“ unter Kolingbas Führung gegründet. Das CMRN setzte daraufhin die Verfassung außer Kraft und schränkte die politische Parteitätigkeit ein. Was sollen wir tun?"

ron_coupscountry.161.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.161.d:0 "Rawlings war überzeugt, dass das Limann-Regime Ghanas neokoloniale wirtschaftliche Abhängigkeit nicht lösen könne. Er führte einen zweiten Putsch gegen Limann durch und klagte am 31. Dezember 1981 die gesamte politische Klasse an. Anstelle von Limanns People&#39;s National Party setzte Rawlings die Militärjunta des Provisional National Defence Council (PNDC) als offizielle Regierung ein. Was sollen wir tun?"

ron_coupscountry.162.t:0 "Kriegsrecht in Polen"
ron_coupscountry.162.d:0 "Der Kriegszustand in Polen bezeichnet den Zeitraum vom 13. Dezember 1981 bis zum 22. Juli 1983. Damals schränkte die autoritäre kommunistische Regierung der Volksrepublik Polen das alltägliche Leben drastisch ein, indem sie das Kriegsrecht und eine Militärjunta verhängte, um die politische Opposition, insbesondere die Solidarność-Bewegung, zu unterdrücken. Tausende Oppositionelle wurden ohne Anklage inhaftiert, bis zu 91 wurden getötet. Obwohl das Kriegsrecht 1983 aufgehoben wurde, wurden viele politische Gefangene erst nach einer Generalamnestie 1986 freigelassen. Was werden wir tun?"

ron_coupscountry.163.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.163.d:0 "Am 24. März 1982 zwangen Truppen, die Generalleutnant Ershad treu ergeben waren, Präsident Abdus Sattar und den Vizepräsidenten zum Rücktritt. Ershad verhängte das Kriegsrecht und ernannte sich selbst zum obersten Verwalter des Kriegsrechts. Er ernannte die Chefs der Marine und der Luftwaffe zu stellvertretenden obersten Verwaltern des Kriegsrechts. Er setzte zudem grundlegende Bürgerrechte und die Verfassung Bangladeschs außer Kraft, hob sie jedoch nicht auf. Drei Tage nach dem Putsch ernannte Ershad den Richter des Obersten Gerichtshofs von Bangladesch, Abul Fazal Muhammad Ahsanuddin Chowdhury, zum Präsidenten und übernahm gleichzeitig den Titel des Präsidenten des Ministerrats. Ershad erklärte, er habe den Putsch durchgeführt, um das Land vor der Korruption und Ineffizienz der BNP-geführten Regierung zu retten. Das Parlament von Bangladesch wurde aufgelöst und alle politischen Parteien verboten. Mehrere Hundert Politiker wurden wegen Korruptionsvorwürfen festgenommen. 1983 übernahm Ershad das Amt des Präsidenten von Bangladesch. Was werden wir tun?"

ron_coupscountry.164.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.164.d:0 "Am 7. November 1982 hatten die progressiven und radikalen Fraktionen des Militärregimes genug von Saye Zerbo. Zu ihnen gehörte die „Kommunistische Offiziersgruppe“, eine geheime Bewegung von Sankara, Compaoré, Zongo und Jean-Baptiste Boukary Lingani. In der Hauptstadt Ouagadougou riefen Generalstabschef Oberst Gabriel Yoryan Somé und andere Offiziere, die sich zum Rat der Volksrettung zusammenschlossen, Zerbo ab. Was sollen wir tun?"

ron_coupscountry.165.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.165.d:0 "Der Putschversuch von Obervolta 1983 ereignete sich am 28. Februar 1983 in der Republik Obervolta (heute Burkina Faso), nur wenige Monate nach einem früheren Putsch am 7. November 1982. Radikale Elemente der Armee hatten gegen das Regime von Oberst Saye Zerbo geputscht, der 1980 durch einen Putsch gegen Generalmajor Sangoulé Lamizana an die Macht gekommen war. Der Putschversuch vom 28. Februar, der sich gegen den Rat der Volksrettung (CPS) und seinen Anführer Major Jean-Baptiste Ouédraogo richtete, scheiterte. Was sollen wir tun?"

ron_coupscountry.166.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.166.d:0 "Der burkinabeische Staatsstreich von 1987 war ein blutiger Militärputsch in Burkina Faso, der am 15. Oktober 1987 stattfand. Der Putsch wurde von Hauptmann Blaise Compaoré gegen den amtierenden linksradikalen Präsidenten Hauptmann Thomas Sankara organisiert, seinen ehemaligen Freund und Verbündeten während der Unruhen von 1983. Was werden wir tun?"

ron_coupscountry.167.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.167.d:0 "Oberst Tunde Ogbeha wurde von den Putschisten beauftragt, die friedliche Kapitulation der Armeeeinheit der Gardebrigade von Präsident Shagari auszuhandeln. Ogbeha konnte Oberst Bello Kaliel, den Kommandeur der Gardebrigade, nicht erreichen und verwickelte sich in ein Suchspiel von Lagos nach Abuja und zurück, das Kaliels Misstrauen weckte. Brigadegeneral Ibrahim Bako wurde mit der Verhaftung von Präsident Shagari beauftragt, nachdem Ogbeha erfolgreich eine friedliche Kapitulation ausgehandelt hatte. Bako wusste nicht, dass eine solche Kapitulation nicht ausgehandelt worden war. Darüber hinaus waren Einzelheiten des Komplotts nicht nur an Präsident Shagari, sondern auch an Hauptmann Anyogo durchgesickert, und Oberstleutnant Eboma von der Gardebrigade begann in Erwartung eines Angriffs die Verteidigung der Präsidentenvilla. Wie erwartet traf Brigadegeneral Bako bei der Präsidentenvilla ein, um Präsident Shagari zu verhaften, doch Präsident Shagaris Wachen ließen sich nicht wie erwartet beruhigen. Es kam zu einem Feuergefecht, bei dem Brigadegeneral Bako getötet wurde. Was werden wir tun?"

ron_coupscountry.168.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.168.d:0 "Im Oktober 1983 verschärften sich die politischen Fraktionskämpfe innerhalb der Regierung. Besonders deutlich wurde dies durch Bishops angebliche Befürwortung einer Annäherung, die mit Austins Wunsch nach einem Anschluss an die Sowjetunion kollidierte. Diese Konflikte führten dazu, dass Vizepremierminister Bernard Coard Maurice Bishop unter Hausarrest stellte und die Regierung übernahm. Austin unterstützte diese Maßnahme. Konflikte zwischen Austin und Bishop hatten sich bereits früh im Putsch von 1979 entwickelt: Austins Wunsch, möglichst viele Oppositionsmitglieder auszuschalten, stand im Widerspruch zu Bishops Wunsch nach einem unblutigen Putsch. Anschließend brachen Volksdemonstrationen gegen Bishops Inhaftierung aus. Im Zuge einer dieser Demonstrationen wurde Bishop aus dem Hausarrest entlassen und schließlich von Armeesoldaten hingerichtet. Während des gesamten Konflikts lieferte Juri Andropow weiterhin Waffen nach Grenada und unternahm nichts, um Bishop während dieser Tortur zu helfen. Es wurde vermutet, dass Austin und Coard bei der Absetzung Bishops von der Sowjetunion zumindest passiv unterstützt wurden. Was werden wir tun?"

ron_coupscountry.169.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.169.d:0 "Der mauretanische Staatsstreich von 1984 war ein unblutiger Militärputsch in Mauretanien, der am 12. Dezember 1984 stattfand. Angeführt wurde der Putsch vom Generalstabschef, Oberst Maaouya Ould Sid&#39;Ahmed Taya, der in der Hauptstadt Nouakchott die Macht übernahm, während Präsident, Oberst Mohamed Khouna Ould Haidalla, außer Landes war. Haidalla nahm an einem französischsprachigen Gipfeltreffen in Bujumbura, Burundi, teil. Taya hatte den Vorsitz des 24-köpfigen Militärkomitees zur Nationalen Rettung (CMSN) übernommen, einer Militärjunta, die nach einem früheren Putsch im Jahr 1979 gegründet worden war. Was sollen wir tun?"

ron_coupscountry.170.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.170.d:0 "Das Militär schlug nur wenige Stunden zu, bevor das Politbüro der Demokratischen Partei Guineas (PDG), der einzigen legal zugelassenen Partei des Landes, einen neuen Vorsitzenden wählen sollte. Es wurde erwartet, dass Interimspräsident Beavogui die Wahl gewinnt. Laut Verfassung wäre der neue Vorsitzende automatisch für eine siebenjährige Amtszeit zum Präsidenten gewählt und per Referendum im Amt bestätigt worden. Oberst Conté setzte die Verfassung außer Kraft und löste die PDG, die Nationalversammlung und alle Massenorganisationen auf. Das Militärkomitee der Nationalen Wiederherstellung (CMNR) wurde als herrschende Junta eingesetzt. Er ordnete die Freilassung der politischen Gefangenen aus Camp Boiro an, einem Konzentrationslager in der Hauptstadt Conakry. Conté wurde am 5. April zum neuen Präsidenten ernannt. Was werden wir tun?"

ron_coupscountry.171.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.171.d:0 "Im August 1985 startete die NRA eine Reihe koordinierter Angriffe, die zur Eroberung bedeutender Gebiete in Zentral- und Westuganda führten. Sie belagerte und eroberte die wichtigen Garnisonsstädte Masaka und Mbarara und schwächte die UNLA dadurch erheblich. Im Zuge dieser Operationen expandierte die NRA stark, indem sie in eroberten Gebieten neue Truppen rekrutierte und desertierte Regierungssoldaten aufnahm. Innerhalb weniger Monate konnte sie rund 9.000 Kämpfer anwerben und wuchs bis Dezember 1985 auf insgesamt etwa 10.000 Soldaten an. Im Januar 1986 begann die UNLA zu zerfallen, als die Rebellen von Süden und Südwesten her an Boden gewannen. Okellos Regime endete faktisch mit der Einnahme Kampalas durch die NRA am 26. Januar 1986. Yoweri Museveni wurde daraufhin am 29. Januar als Präsident vereidigt, und die NRA wurde zur neuen regulären Armee Ugandas. Tito Okello floh in den Sudan. Trotz dieser massiven Niederlage versuchte die UNLA erneut, sich zu sammeln und ihre verbleibenden Besitzungen in Norduganda zu verteidigen. Was werden wir tun?"

ron_coupscountry.172.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.172.d:0 "Im Juli 1985 putschte Tito Lutwa Okello gemeinsam mit Bazilio Olara-Okello Präsident Milton Obote. Er regierte sechs Monate lang, bis er von der Nationalen Widerstandsarmee (NRA) unter der Führung des heutigen Präsidenten Yoweri Museveni gestürzt wurde. Nach seinem Sturz ging er ins Exil nach Kenia. Was werden wir tun?"

ron_coupscountry.173.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.173.d:0 "Der nigerianische Staatsstreich von 1985 war ein Militärputsch, der am 27. August 1985 in Nigeria stattfand, als eine Gruppe von Offizieren mittleren Ranges der Streitkräfte unter Führung des Generalstabschefs Ibrahim Babangida die Regierung von Generalmajor Muhammadu Buhari stürzte (der selbst durch den Staatsstreich von 1983 die Macht übernahm). Buhari wurde anschließend bis 1988 in Benin-Stadt inhaftiert. Babangida rechtfertigte den Putsch damit, dass es Buhari nicht gelungen sei, die wirtschaftlichen Probleme des Landes durch die Umsetzung des Buharismus zu lösen, und versprach, „die durch Jahrzehnte der Misswirtschaft und Korruption der Regierung verwüstete Wirtschaft wiederzubeleben“. Babangida ersetzte daraufhin den herrschenden Obersten Militärrat (SMC) durch einen neuen Regierungsrat der Streitkräfte (AFRC), der bis 1993 im Amt blieb. Das Regime überlebte 1990 einen Putschversuch. Was werden wir tun?"

ron_coupscountry.174.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.174.d:0 "Die sudanesischen Streitkräfte übernahmen am 6. April 1985 die Kontrolle über das Land, nachdem es mehr als eine Woche lang zu Unruhen gekommen war. Auslöser waren steigende Lebensmittelpreise und die wachsende Unzufriedenheit mit der Regierung von Präsident Nimeiry, der 1969 selbst durch einen Staatsstreich an die Macht gekommen war. Nimeiry befand sich zum Zeitpunkt des Putsches in den USA. Der Putsch wurde im Radio verkündet. Die Radiostudios in Omdurman wurden schwer bewacht, die Soldaten zogen sich erst nach der Ankündigung zurück. Berichten zufolge gab es während des Putsches zwei Todesopfer: Sie wurden bei einer kurzen Schießerei getötet, als Soldaten das Hauptquartier der Staatssicherheit in der Hauptstadt Khartum einnahmen. Was sollen wir tun?"

ron_coupscountry.175.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.175.d:0 "Der Staatsstreich von 1986 in Lesotho war ein Militärputsch, der am 15. Januar 1986 unter der Führung von General Justin Lekhanya in Lesotho stattfand. Er führte zur Absetzung von Premierminister Leabua Jonathan, der das Amt seit 1965 innehatte und 1970 nach der Annullierung der Parlamentswahlen diktatorische Machtbefugnisse erlangte. General Lekhanya kündigte die Gründung eines Militärrats an, der im Namen von König Moshoeshoe II. sämtliche Exekutiv- und Legislativgewalt ausüben sollte. Schließlich entwickelte sich ein Machtkampf zwischen Lekhanya und dem König, der im Februar 1990 ins Exil nach Großbritannien gezwungen wurde. Lekhanya selbst wurde 1991 durch den von Oberst Elias Phisoana Ramaema angeführten Staatsstreich abgesetzt. Was sollen wir tun?"

ron_coupscountry.176.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.176.d:0 "Die Putsche auf Fidschi im Jahr 1987 führten zum Sturz der gewählten Regierung des fidschianischen Premierministers Timoci Bavadra, zur Absetzung von Königin Elisabeth II. und zur Ausrufung der Republik. Der erste Putsch, bei dem Bavadra abgesetzt wurde, fand am 14. Mai 1987 statt; ein zweiter Putsch am 28. September beendete die Monarchie und wurde kurz darauf am 7. Oktober zur Ausrufung der Republik erklärt. Beide Militäraktionen wurden von Oberstleutnant Sitiveni Rabuka angeführt, dem damaligen dritten Kommandeur der Königlich Fidschianischen Streitkräfte. Je nach Perspektive kann man das Ereignis entweder als zwei aufeinanderfolgende Staatsstreiche mit einer viermonatigen Pause oder als einen einzigen Putsch betrachten, der am 14. Mai begann und mit der Ausrufung der Republik endete. Was werden wir tun?"

ron_coupscountry.177.t:0 "Jasmin Revolution"
ron_coupscountry.177.d:0 "Der tunesische Staatsstreich von 1987 beinhaltete den unblutigen Sturz des alternden tunesischen Präsidenten Habib Bourguiba am 7. November 1987 und seine Ersetzung durch den kurz zuvor ernannten Premierminister Zine El Abidine Ben Ali. Die Aktion wurde mit Bourguibas schlechtem Gesundheitszustand und Artikel 57 der tunesischen Verfassung gerechtfertigt. Später tauchten Berichte auf, denen zufolge der italienische Geheimdienst an der Planung beteiligt war. Manche Quellen bezeichnen den Putsch von 1987 als „Révolution de jasmin“ (Jasminrevolution), da die Jasminblüte als Symbol Tunesiens gilt. Neuere Quellen verwenden jedoch genau denselben Begriff auch für die tunesische Revolution von 2011. Was werden wir tun?"

ron_coupscountry.178.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.178.d:0 "Am 18. September 1988 übernahm das Militär die Macht im Land zurück. General Saw Maung hob die Verfassung von 1974 auf und gründete den Staatlichen Rat für die Wiederherstellung von Recht und Ordnung (SLORC). Er verhängte „drakonischere Maßnahmen als Ne Win“. Nachdem Maung das Kriegsrecht verhängt hatte, wurden die Proteste gewaltsam niedergeschlagen. Die Regierung verkündete im staatlichen Rundfunk, das Militär habe im Interesse der Bevölkerung die Macht übernommen, „um die sich auf allen Seiten im ganzen Land verschlechternde Lage zeitnah zu beenden“. Tatmadaw-Truppen marschierten durch Städte in ganz Burma und schossen wahllos auf Demonstranten. Was sollen wir tun?"

ron_coupscountry.179.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.179.d:0 "Der haitianische Staatsstreich vom Juni 1988 ereignete sich am 20. Juni 1988, als Henri Namphy Leslie Manigat stürzte. Manigat, der die vom Militär kontrollierten Parlamentswahlen 1988 in Haiti gewonnen hatte, hatte sein Amt am 7. Februar angetreten. Am 14. Juni 1988 nahm Henri Namphy eine Reihe von militärischen Versetzungen vor, darunter die Versetzung von Oberst Jean-Claude Paul ins Armeehauptquartier und seine Ernennung zum stellvertretenden Generalstabschef. Paul rief Präsident Leslie Manigat an, um gegen den Schritt zu protestieren, und am folgenden Tag gab Manigat eine Erklärung heraus, in der er die Veränderungen annullierte und sagte, er sei als verfassungsmäßiger Oberbefehlshaber der Streitkräfte Haitis nicht konsultiert worden. Am 19. Juni versetzte Manigat Namphy in den Ruhestand und sagte, er habe einen Putsch vorbereitet. Am 20. Juni stürzte Namphy Manigat in einem Staatsstreich und erklärte sich selbst mit Oberst Jean-Claude Paul an seiner Seite zum Präsidenten. Was werden wir tun?"

ron_coupscountry.180.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.180.d:0 "Der haitianische Staatsstreich vom September 1988 ereignete sich am 18. September 1988, als eine Gruppe von Unteroffizieren der haitianischen Präsidentengarde General Henri Namphy stürzte und General Prosper Avril an die Macht brachte. Namphy war von 1986 bis zur Amtseinführung von Leslie Manigat im Februar 1988 Mitglied des Nationalen Regierungsrats. Manigat hatte die vom Militär kontrollierten Parlamentswahlen 1988 gewonnen. Namphy hatte Manigat im Juni 1988 beim Staatsstreich in Haiti gestürzt, als Manigat sein verfassungsmäßiges Recht auf Kontrolle militärischer Einsätze ausüben wollte. Was werden wir tun?"

ron_coupscountry.181.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.181.d:0 "In der Nacht des 2. Februar 1989 befahl Rodríguez Einheiten seines 1. Armeekorps, darunter etwa 40 bis 50 Panzer, in die Straßen von Asunción zu schicken. Die Einheit, die stärkste und am besten ausgerüstete der paraguayischen Streitkräfte, eroberte das Zentrum der Hauptstadt. Truppen der Einheit versuchten, Stroessner beim Essen im Haus seiner Geliebten festzunehmen, doch die Leibwächter leisteten erbitterten Widerstand und ermöglichten dem Präsidenten die Flucht zum Hauptquartier des Präsidenten-Eskorteregiments. Es kam zu einem Gefecht zwischen Rodríguez&#39; Truppen und der 700 Mann starken Präsidentengarde. Unterdessen schworen die übrigen Militärbezirke Paraguays den Rebellen die Treue. Artillerieeinheiten und Marineschiffe im Hafen der Stadt beschossen im Verlauf des Gefechts das Hauptquartier und am 3. Februar um 17:00 Uhr kapitulierte die Regierung unter Stroessner. Rodríguez verkündete die Kapitulation im Radio und sagte, Stroessner sei in Gewahrsam und unverletzt. Die offizielle Zahl der Putschopfer liegt bei 31, andere Schätzungen gehen jedoch von 150 bis 250 Toten aus, die meisten davon Stroessners Wachen. Der katholische Sender Radio Caritas sprach von bis zu 200 Toten bei den Kämpfen. Was sollen wir tun?"

ron_coupscountry.182.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.182.d:0 "Am 30. Juni 1989 ersetzten Militäroffiziere unter dem Kommando des damaligen Brigadegenerals Omar Hassan al-Bashir auf Betreiben und mit Unterstützung der Nationalen Islamischen Front (NIF) die Regierung von Sadiq al-Mahdi durch den Revolutionären Kommandorat zur Nationalen Rettung (RCC) mit der Behauptung, das Land vor den „verdorbenen politischen Parteien“ zu retten. Am selben Tag wurde Al-Bashir zum Staatsoberhaupt, Premierminister, Verteidigungsminister und Oberbefehlshaber der Streitkräfte ernannt. Die neue Militärjunta sollte aus 15 Offizieren bestehen (1991 wurden es nur noch 12) und von einem zivilen Kabinett unterstützt werden. Was werden wir tun?"

ron_coupscountry.183.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.183.d:0 "Der Staatsstreich im Tschad von 1990 ereignete sich am 3. Dezember 1990, als die Streitkräfte der Patriotischen Heilsbewegung (MPS), einer von Libyen unterstützten Rebellengruppe unter der Führung von General Idriss Déby, ohne Widerstand in die tschadische Hauptstadt N&#39;Djamena einmarschierten. Die MPS-Truppen waren drei Wochen zuvor vom Sudan aus in den Tschad einmarschiert. Zuvor, am 2. Dezember, floh der prowestliche Präsident Hissène Habré (der das Land seit 1982 regierte) Berichten zufolge mit seiner Familie, seinem Kabinett und seinen engsten Beratern ins benachbarte Kamerun, als seine Armee, die Tschadischen Nationalen Streitkräfte (FANT), zusammenbrach. Was sollen wir tun?"

ron_coupscountry.184.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.184.d:0 "Am 24. Dezember 1990, gegen Mitternacht surinamer Zeit (UTC−03:00), teilte Graanoogst Präsident Shankar telefonisch mit, dass er abgesetzt werde und er und seine Regierung „besser zu Hause bleiben sollten“. Am 27. Dezember wurde die Regierung entlassen, die Nationalversammlung aufgelöst und Johan Kraag am 29. Dezember zum Präsidenten ernannt. Am 31. Dezember wurde Bouterse erneut zum Oberbefehlshaber der SNL ernannt. Was werden wir tun?"

ron_coupscountry.185.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.185.d:0 "Der Putsch war kurz und in der Nacht des 28. September 1991 kam es zu einigen Konflikten. Der Großteil der Aktionen fand jedoch am 29. September statt und endete mit Aristides Deportation ins französische Exil und Cédras‘ Verkündung des Putscherfolgs am Montag, den 30. September, um 23 Uhr. In der Nacht des 28. September meuterten einige Armeestützpunkte und Polizeistationen und stellten sich in Bezug auf die Aristide-Regierung auf die Seite von Cédras. Bei Tagesanbruch schossen Soldaten auf Aristides Residenz und seinen gepanzerten Mannschaftstransportwagen, als er auf dem Weg zum Nationalpalast war. Soldaten besetzten den Palast, nahmen Aristide gefangen und führten ihn zum Armeehauptquartier. Dort verhandelten venezolanische, französische und US-amerikanische Botschafter erfolgreich mit den Putschisten über Aristides Leben. Aristide wurde ins Exil gezwungen und flog nach Frankreich. Später besuchte er die Vereinigten Staaten und sprach vor den Vereinten Nationen. Was werden wir tun?"

ron_coupscountry.186.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.186.d:0 "Der georgische Staatsstreich von 1991–1992, auch bekannt als Tiflis-Krieg oder Putsch von 1991–1992, war ein innerer militärischer Konflikt, der nach dem Zerfall der Sowjetunion vom 22. Dezember 1991 bis zum 6. Januar 1992 in der neuen unabhängigen Republik Georgien stattfand. Der Putsch, ein gewalttätiges Abbild des Chaos, das Anfang der 1990er Jahre im Kaukasus herrschte, stellte Fraktionen der Nationalgarde, die Präsident Zviad Gamsachurdia treu ergeben waren, gegen mehrere paramilitärische Organisationen, die sich Ende 1991 unter der Führung der Warlords Tengiz Kitovani, Jaba Ioseliani und Tengiz Sigua zusammengeschlossen hatten. Was werden wir tun?"

ron_coupscountry.187.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.187.d:0 "Oberstleutnant Amadou Toumani Touré putschte und stürzte Traoré. Krankenhausquellen berichteten von mindestens 59 weiteren Toten und 200 Verletzten, darunter auch von Rachemorden. Bildungsminister Bakary Traoré und Mamadou Diarra, der Schwager des ehemaligen Führers, wurden verbrannt. Der Nationale Versöhnungsrat (der bald in Übergangskomitee zur Rettung des Volkes umbenannt wurde) unter Tourés Vorsitz wurde eingerichtet, um das Land vorübergehend zu regieren, bis 1992 nach einem Verfassungsreferendum sowie Präsidentschafts- und Parlamentswahlen eine Zivilregierung wiederhergestellt wurde. Was werden wir tun?"

ron_coupscountry.188.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.188.d:0 "Der Somalische Aufstand markierte den Beginn des Bürgerkriegs in Somalia, der in den späten 1970er und frühen 1990er Jahren tobte. Der Aufstand begann 1986, als Siad Barre begann, mit seiner Spezialeinheit, den „Roten Baretten“ (Duub Cas), clanbasierte Dissidentengruppen anzugreifen, die sich seiner Herrschaft widersetzten. Die Dissidenten waren seit fast einem Jahrzehnt, nachdem er abrupt von der Sowjetunion zu den Vereinigten Staaten übergelaufen war und der verheerende Ogadenkrieg von 1977–1978 stattgefunden hatte, immer mächtiger geworden. Als Barre am 23. Mai 1986 bei einem Autounfall verletzt wurde, wurden Rivalen innerhalb von Barres eigener Regierung und Oppositionsgruppen dreister und gerieten in einen offenen Konflikt. Siad Barres Flucht aus der Hauptstadt am 26. Januar 1991 markierte eine deutliche Wende im Konflikt. Von diesem Zeitpunkt an dauerten die Kämpfe bis April 1992 an, bis die UN-Missionen in Somalia (UNOSOM I und UNOSOM II) eintrafen. Die Kollektivstrafe von Siad Barre bezieht sich auf die gewalttätigen Aktionen des ehemaligen somalischen Präsidenten Siad Barre gegen Clanmitglieder, die er als rivalisierende Clans während des somalischen Aufstands gegen Barre betrachtete. Die schlimmsten Formen der Clan-Gewalt unter der Barre-Diktatur richteten sich gegen die Clans Isaaq und Majeerteen. Was werden wir tun?"

ron_coupscountry.189.t:0 "Peruanische Verfassungskrise"
ron_coupscountry.189.d:0 "In der Nacht vom Sonntag, dem 5. April 1992, trat Fujimori im Fernsehen auf und verkündete, dass er den Kongress der Republik „vorübergehend auflösen“ und die Judikative „reorganisieren“ werde. Dann befahl er der peruanischen Armee, mit einem Panzer vor die Stufen des Kongresses zu fahren, um ihn zu schließen. Als eine Gruppe von Senatoren versuchte, eine Sitzung abzuhalten, wurde Tränengas gegen sie eingesetzt. In derselben Nacht wurde das Militär geschickt, um prominente Mitglieder der politischen Opposition festzunehmen. Fujimori wurde 2009 wegen der Entführung des Journalisten Gustavo Gorriti und des Geschäftsmanns Samuel Dyer verurteilt, die beide in der Putschnacht vom Militär festgenommen worden waren. Eine der am meisten kritisierten Maßnahmen Fujimoris war der Versuch, den ehemaligen Präsidenten Alan García festzunehmen, um ihn zahlreichen Prozessen zu unterziehen. Zum Putsch trug auch Fujimoris Wunsch bei, García, der als Senator amtierte, als politischen Rivalen und möglichen künftigen Präsidentschaftskandidaten auszuschalten. García konnte jedoch der Verhaftung entgehen und beantragte politisches Asyl in Kolumbien. Was werden wir tun?"
ron_coupscountry.189.a:1 "Kongress auflösen"
ron_coupscountry.189.b:1 "Kongress unterstützen"

ron_coupscountry.190.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.190.d:0 "Während seiner Amtszeit reduzierte Bendjedid die Rolle des Staates in der Wirtschaft und lockerte die staatliche Überwachung der Bürger. Als die Wirtschaft Ende der 1980er Jahre aufgrund rapide fallender Ölpreise zusammenbrach, wuchsen die Spannungen zwischen den Teilen des Regimes, die Bendjedids Politik der Wirtschaftsliberalisierung unterstützten, und denen, die eine Rückkehr zum staatlichen Modell forderten. Im Oktober 1988 eskalierten Jugendmärsche gegen die Sparpolitik des Regimes und riefen Parolen gegen Bendjedid. Sie entwickelten sich zu massiven Unruhen, die als Oktoberunruhen von 1988 bekannt sind und sich auf Oran, Annaba und andere Städte ausweiteten. Die brutale Niederschlagung der Randalierer durch das Militär forderte mehrere Hundert Todesopfer. Vielleicht als politische Überlebensstrategie forderte Bendjedid daraufhin einen Übergang zur Mehrparteiendemokratie und begann, diesen umzusetzen. Doch 1991 intervenierte das Militär, um die Wahlen zu verhindern, die die islamistische Front Islamique du Salut (FIS) an die Macht brachten. Bendjedid wurde aus dem Amt gedrängt, und ein langer und blutiger algerischer Bürgerkrieg löste aus. Was werden wir tun?"

ron_coupscountry.191.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.191.d:0 "Strasser und andere junge Offiziere organisierten einen Putsch. Sie fuhren mit einem Konvoi in die Hauptstadt Freetown und besetzten das State House, in dem sich Momohs Büro befand, obwohl Momoh noch nicht eingetroffen war. Das State House wurde kurzzeitig von loyalen Truppen erobert, fiel aber bald wieder in die Hände der Meuterer. Als Momoh gefunden wurde, wurde er per Hubschrauber nach Guinea ins Exil geschickt. Was sollen wir tun?"

ron_coupscountry.192.t:0 "Russische Verfassungskrise"
ron_coupscountry.192.d:0 "Die russische Verfassungskrise von 1993 (auch bekannt als Oktoberputsch 1993, Schwarzer Oktober, Erschießung des Weißen Hauses oder Ukas 1400) war eine politische Pattsituation zwischen dem russischen Präsidenten Boris Jelzin und dem russischen Parlament, die mit militärischer Gewalt beigelegt wurde. Das Verhältnis zwischen Präsident und Parlament hatte sich schon seit einiger Zeit verschlechtert. Der Machtkampf erreichte am 21. September 1993 seinen Höhepunkt, als Präsident Jelzin das höchste Organ des Landes (den Kongress der Volksdeputierten) und das Parlament (den Obersten Sowjet) auflösen wollte, obwohl die Verfassung dem Präsidenten keine entsprechende Befugnis gab. Jelzin rechtfertigte seinen Befehl mit dem Ergebnis des Referendums vom April 1993. Daraufhin erklärte das Parlament die Entscheidung des Präsidenten für null und nichtig, klagte Jelzin an und ernannte Vizepräsident Alexander Rutskoi zum amtierenden Präsidenten. Was werden wir tun?"
ron_coupscountry.192.a:1 "Das Parlament auflösen"
ron_coupscountry.192.b:1 "Unterstützen Sie das Parlament"

ron_coupscountry.193.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.193.d:0 "Der aserbaidschanische Staatsstreich von 1993 wurde am 1. September 1993 von Milizen unter der Führung von Militärkommandeur Surat Hüseynov durchgeführt. Aserbaidschan verlor den Krieg gegen Armenien, doch Präsident Abulfaz Elchibey entsandte aufgrund militärischer Misserfolge Surat Hüseynov. Dadurch entstand eine regierungsfeindliche Miliz, die die Niederlage Aserbaidschans beschleunigte. Am 1. September eroberte seine Miliz die Hauptstadt Baku und zwang Präsident Abulfaz Elchibey zur Flucht. Was sollen wir tun?"

ron_coupscountry.194.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.194.d:0 "Am 21. Juli 1994 legte die USS La Moure County in Banjul an, um einen internationalen Höflichkeitsbesuch zu machen und am nächsten Tag eine gemeinsame Trainingsübung mit der GNA durchzuführen. Dies wurde von gambischen Radiosendern ausgestrahlt und machte die Öffentlichkeit darauf aufmerksam, dass es am nächsten Tag in Gambia keine militärische Präsenz geben würde. Dank dieses Vorteils und des uneingeschränkten und unkontrollierten Zugangs zu Militärfahrzeugen und Waffenlager konnte der Putsch durchgeführt werden, bevor die GNA eine Chance hatte zu reagieren. Am nächsten Tag um 7:30 Uhr wurde der Putsch in der Yundum-Kaserne, 25 Kilometer von der Hauptstadt entfernt, in Gang gesetzt. Der Putsch begann als Protest verärgerter Leutnants und Unteroffiziere der GNA, die Forderungen bezüglich ihres fehlenden Solds stellen wollten. Unter dem Kommando dieser Unteroffiziere besetzte die GNA den Flughafen, eine Radiostation und ein Kraftwerk. Stunden später flohen Jawara und seine Familie in den Bezirk La Moure, um den Schutz und möglicherweise die Unterstützung des US Marine Corps zu gewinnen. Nachdem die Amerikaner ein Eingreifen abgelehnt hatten, verließ das Schiff am Nachmittag Banjul und legte in Dakar an, wo Jawara unter dem Schutz amerikanischer Kriegsschiffe an Land ging. Nachdem Jawara das Land verlassen hatte, konnten die Putschisten ihre Kontrolle über das Land sichern und mit der Bildung ihrer eigenen Regierung beginnen. Diese wurde als Provisorischer Rat der Streitkräfte (AFPRC) bekannt und regierte Gambia bis 1996, als sie von einer Zivilpartei abgelöst wurde. Als ranghöchster Offizier der Putschisten wurde Jammeh kurz nach ihrer Gründung zum Vorsitzenden des AFPRC gewählt. Was werden wir tun?"

ron_coupscountry.195.t:0 "Sarin-Anschlag in der Tokioter U-Bahn"
ron_coupscountry.195.d:0 "Der Sarin-Anschlag in der Tokioter U-Bahn war ein Akt inländischen Terrorismus, der am 20. März 1995 in Tokio, Japan, von Mitgliedern der Sekte Aum Shinrikyo verübt wurde. In fünf koordinierten Anschlägen setzten die Täter während der Hauptverkehrszeit Sarin auf drei Linien der Tokioter U-Bahn (damals Teil der Tokioter U-Bahn) frei. Dabei starben zwölf Menschen, 50 wurden schwer verletzt und fast 1.000 weitere erlitten vorübergehende Sehbehinderungen. Der Anschlag richtete sich gegen Züge, die durch Kasumigaseki und Nagatachō fuhren, wo sich in Tokio das japanische Parlament befindet. Was sollen wir tun?"

ron_coupscountry.196.t:0 "Der Crown Price hat einen Putsch gestartet"
ron_coupscountry.196.d:0 "Der katarische Staatsstreich von 1995 war ein unblutiger Palastputsch, der am 27. Juni 1995 in Katar stattfand. Der Putsch wurde vom damaligen Kronprinzen Hamad bin Khalifa Al Thani durchgeführt, der mit Unterstützung der herrschenden Familie Al Thani die Kontrolle über das Land übernahm, während sein Vater, Emir Khalifa bin Hamad Al Thani, zu Besuch in Genf war. Der Putsch erfolgte nach einem Zerwürfnis zwischen Hamad bin Khalifa und seinem Vater, der Anfang 1995 versucht hatte, einen Teil der Autorität zurückzugewinnen, die er Hamad seit 1992 verliehen hatte. Was werden wir tun?"

ron_coupscountry.197.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.197.d:0 "Am 21. Juli 1996 griffen Hutu-Rebellen ein Flüchtlingslager im Land an und töteten über 300 Menschen. Am 23. Juli tauchte Präsident Ntibantunganya im Haus des US-Botschafters Morris N. Hughes Jr. unter. Am 25. Juli übernahm die Armee die Macht, was Verteidigungsminister Firmin Sinzoyiheba im Radio ankündigte. Pierre Buyoya wurde zum Interimspräsidenten ernannt. Die Machtübernahme durch das Militär wurde von internationalen Führungspersönlichkeiten verurteilt, darunter US-Präsident Bill Clinton, UN-Generalsekretär Boutros Boutros-Ghali und der Vorsitzende der Organisation für Afrikanische Einheit, Salim Ahmed Salim. Es war die vierte Machtübernahme dieser Art in Burundi seit der Unabhängigkeit des Landes im Jahr 1962 und die zweite, die zur Machtübernahme Buyoyas führte. Was werden wir tun?"

ron_coupscountry.198.t:0 "Türkisches Militärmemorandum"
ron_coupscountry.198.d:0 "Das Militärmemorandum von 1997 in der Türkei bezieht sich auf die Beschlüsse der türkischen Militärführung bei einer Sitzung des Nationalen Sicherheitsrats am 28. Februar 1997. Dieses Memorandum leitete den Prozess ein, der den Rücktritt des islamistischen Ministerpräsidenten Necmettin Erbakan von der Wohlfahrtspartei und das Ende seiner Koalitionsregierung herbeiführte. Da die Regierung ohne Auflösung des Parlaments oder Außerkraftsetzung der Verfassung aus dem Amt gedrängt wurde, bezeichnete der türkische Admiral Salim Dervişoğlu den Vorfall als „postmodernen Putsch“. Die darauf folgenden Prozesse sollen von der Batı Çalışma Grubu (Westliche Arbeitsgruppe) organisiert worden sein, einer angeblichen Geheimgruppe innerhalb des Militärs. Was sollen wir tun?"

ron_coupscountry.199.t:0 "Kambodschanischer Putsch"
ron_coupscountry.199.d:0 "Am 16. März 1992 traf die UN-Übergangsverwaltung in Kambodscha (UNTAC) unter dem UNSYG-Sondergesandten Yasushi Akashi und Generalleutnant John Sanderson in Kambodscha ein, um mit der Umsetzung des UN-Siedlungsplans zu beginnen, der infolge des Pariser Friedensabkommens von 1991 beschlossen worden war. 1993 fanden freie Wahlen statt. Die Roten Khmer oder Partei des Demokratischen Kampuchea (PDK), deren Streitkräfte nie entwaffnet oder demobilisiert wurden, schlossen in den 10–15 Prozent des Landes (sechs Prozent der Bevölkerung), die sie damals kontrollierten, einen Teil der Bevölkerung von der Wahl aus. Insgesamt nahmen über vier Millionen Kambodschaner (etwa 90 Prozent der Wahlberechtigten) an den Wahlen im Mai 1993 teil. Prinz Norodom Ranariddhs royalistische FUNCINPEC-Partei erhielt mit 45,5 % der Stimmen die meisten Stimmen, gefolgt von Hun Sens (ehemals kommunistisch) und der Buddhistischen Liberaldemokratischen Partei (von Son Sann). Trotz des Wahlsieges musste die FUNCINPEC Koalitionsverhandlungen mit der von Hun Sen geführten Kambodschanischen Volkspartei aufnehmen, die sich weigerte, die Macht abzugeben. Nach den Gesprächen wurden Prinz Ranariddh und Hun Sen Erster bzw. Zweiter Premierminister der kambodschanischen Regierung. Was werden wir tun?"

ron_coupscountry.200.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.200.d:0 "Die Machtübernahme des Militärs in Pakistan im Jahr 1999 war ein unblutiger Staatsstreich. Angestoßen wurde er vom Militärstab des Vereinigten Stabs unter dem Vorsitzenden des Komitees der Vereinigten Stabschefs, General Pervez Musharraf. Am 12. Oktober 1999 übernahm er die Kontrolle über die Zivilregierung des öffentlich gewählten Premierministers Nawaz Sharif. Gleichzeitig amtierte General Musharraf als Generalstabschef der Armee und damaliger Regierungschef des Landes. Mit einer umstrittenen einstweiligen Verfügung verhängte er am 14. Oktober 1999 den Ausnahmezustand. Dies war ein direkter Verstoß gegen die pakistanische Verfassung – nur zwei Tage, nachdem er auf Rechtsberatung seines Anwaltsteams unter der Leitung von Sharifuddin Pirzada die Kontrolle über die Bundesregierung übernommen hatte. Was sollen wir tun?"

ron_coupscountry.201.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.201.d:0 "Am 23. Dezember 1999 rebellierte eine Gruppe von Soldaten unter der Führung von Tuo Fozié. Bédié weigerte sich, auf die Forderung der Soldaten zurückzutreten und wurde am folgenden Tag durch einen Staatsstreich gestürzt. Der ehemalige Armeekommandeur Robert Guéï, der den Staatsstreich nicht angeführt hatte, wurde aus dem Ruhestand geholt und als Vorsitzender eines Nationalen Komitees zur öffentlichen Rettung (französisch: Comité National de Salut Public) eingesetzt. Vereinzelte Schüsse waren in der Umgebung von Abidjan zu hören. Guéï verkündete die Auflösung des Parlaments, der ehemaligen Regierung, des Verfassungsrates und des Obersten Gerichtshofs. Die Rebellen übernahmen die Kontrolle über den Flughafen Abidjan und wichtige Brücken, errichteten Kontrollpunkte und öffneten Gefängnistore, um politische Gefangene und andere Insassen freizulassen. Der Mob nutzte das Machtvakuum, um Autos zu entführen. Einige Teile Abidjans wurden zudem von Soldaten und Zivilisten geplündert. Im Fernsehen verkündete Guéï seine Machtergreifung. Er richtete außerdem eine Fernsehansprache an die Bevölkerung und ausländische Diplomaten. Darin versicherte er, dass die Demokratie geachtet, internationale Abkommen eingehalten, die Sicherheit der Ivorer und Nicht-Ivorer gewährleistet, Missionen ins Ausland entsandt würden, um die Gründe für den Putsch zu erläutern, und dass man sich um die Probleme der Bauern kümmern würde. Was werden wir tun?"

ron_coupscountry.202.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.202.d:0 "Als Reaktion auf die Wirtschaftspläne „strömten indianische Menschenmengen nach Quito und forderten Mahuads Entlassung sowie die Besetzung des Kongresses und des Obersten Gerichtshofes“. Am 21. Januar 2000 riefen Lucio Gutiérrez und CONAIE-Präsident Antonio Vargas eine „Regierung der nationalen Rettung“ aus. Dies führte zu „hektischen Beratungen zwischen Generälen, Politikern und US-Diplomaten“ und führte schließlich dazu, dass hochrangige Militärs Vizepräsident Gustavo Noboa zum Präsidenten ernannten und die Putschisten verhafteten. Während des Putsches gab es kaum Mobilisierung dagegen, und eine Umfrage zeigte breite Unterstützung in der Bevölkerung für die Besetzung des Kongresses durch die CONAIE, die es dem Militär ermöglicht hatte, Mahuads Rücktritt zu fordern. Die Militärregierung fand jedoch kaum öffentliche Unterstützung, was den hochrangigen Militärs, die die Verhandlungen während des Putsches führten, bewusst war. Die hochrangigen Militärs lehnten die Pläne der Koalition ab und pflegten enge Beziehungen zur politischen und wirtschaftlichen Elite des Landes, die sich ebenfalls gegen die Pläne stellte (wie zum Beispiel der einflussreiche ehemalige Präsident und damalige Bürgermeister von Guayaquil, León Febres Cordero). Sie wurden zudem von den Drohungen mit US-Wirtschaftssanktionen beeinflusst. Die Rolle der unteren Offiziere beim Putsch wurde zudem als Untergrabung der militärischen Hierarchie angesehen, und der Chef des militärischen Oberkommandos, General Carlos Mendoza, erklärte, die Generäle könnten Oberstleutnant Lucio Gutiérrez nicht als militärischen Vertreter der herrschenden Junta akzeptieren. Es gab Verhandlungen über die Ersetzung Gutiérrez durch Mendoza, doch kurz nachdem die Junta dies akzeptiert hatte, „kaperte Mendoza den Putsch und beendete ihn, indem er die Macht an den Vizepräsidenten des Landes übergab“. Was sollen wir tun?"

ron_coupscountry.203.t:0 "Die Malaita Eagle Force hat einen Putsch gestartet"
ron_coupscountry.203.d:0 "Der Staatsstreich auf den Salomonen ereignete sich am 5. Juni 2000 in der Hauptstadt Honiara. Er war die Folge langjähriger ethnischer Spannungen in der Provinz, die seit Ende der 1990er Jahre zum Aufkommen bewaffneter politischer Gruppen führten. Dieser Aufschwung endete schließlich mit einem Staatsstreich, bei dem Premierminister Bartholomew Ulufa&#39;alu von der militanten Gruppe Malaita Eagle Force als Geisel genommen wurde. Was sollen wir tun?"

ron_coupscountry.204.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.204.d:0 "Im März 2003 kam es in der Zentralafrikanischen Republik zu einem Staatsstreich, als die Truppen von General François Bozizé auf Bangui, die Hauptstadt des Landes, marschierten, während Präsident Ange-Félix Patassé auf einer Regionalkonferenz in Niger war. Während seiner Abwesenheit führte Bozizé 1.000 Kämpfer in die Hauptstadt Bangui und eroberte den internationalen Flughafen und den Präsidentenpalast. Die Regierungstruppen, von denen viele seit Monaten keinen Sold erhalten hatten, leisteten kaum Widerstand. Die 370 CEMAC-Friedenstruppen verließen ihre Posten, anstatt zu kämpfen. Anschließend verhängte Bozizé eine Ausgangssperre und setzte die Verfassung außer Kraft. Präsident Patassé floh unterdessen aus dem Land ins benachbarte Kamerun, als Rebellen auf sein Flugzeug schossen. Unter den Rebellenkämpfern wurden auch Militante aus dem Tschad gesichtet, doch der Präsident des Tschad, Idriss Déby, bestritt, Bozizé militärisch unterstützt zu haben. Mindestens 15 Menschen wurden getötet. Was sollen wir tun?"

ron_coupscountry.205.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.205.d:0 "Der Staatsstreich in Guinea-Bissau 2003 war ein unblutiger Militärputsch, der am 14. September 2003 unter Führung von General Veríssimo Correia Seabra gegen den amtierenden Präsidenten Kumba Ialá stattfand. Seabra begründete die Machtübernahme mit der „Unfähigkeit“ der Ialá-Regierung sowie mit einer stagnierenden Wirtschaft, politischer Instabilität und Unzufriedenheit des Militärs über ausstehende Gehälter. Ialá erklärte am 17. September öffentlich seinen Rücktritt, und ein im selben Monat unterzeichnetes politisches Abkommen verbot ihm für fünf Jahre die politische Betätigung. Ende September wurde eine zivil geführte Übergangsregierung unter Führung des Geschäftsmanns Henrique Rosa und PRS-Generalsekretär Artur Sanhá eingesetzt. Was sollen wir tun?"

ron_coupscountry.206.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.206.d:0 "Im September 2003 wurde Amiot Métayer tot aufgefunden. Seine Augen waren ausgeschossen und sein Herz herausgeschnitten, höchstwahrscheinlich aufgrund von Machetenverletzungen. Vor seinem Tod war er der Anführer der Gonaives-Bande, die als „Kannibalenarmee“ bekannt war. Nach seinem Tod schwor sein Bruder Buteur Métayer Rache an denen, die er für Amiots Tod verantwortlich machte – nämlich Präsident Jean-Bertrand Aristide. Buteur übernahm das Kommando über die Kannibalenarmee und benannte sie umgehend in Nationale Revolutionäre Front zur Befreiung Haitis um. Louis Rosario vom Untersuchungsausschuss der Dominikanischen Republik behauptete, die US-Regierung habe die haitianischen Rebellen finanziell unterstützt und ausgebildet. Bei der Vorstellung des Berichts in der dominikanischen Hauptstadt Santo Domingo wurde er mit den Worten zitiert: „200 Soldaten der US-Spezialeinheiten trafen mit Genehmigung des dominikanischen Präsidenten Hipolito Mejia im Rahmen einer Militäroperation zur Ausbildung haitianischer Rebellen in der Dominikanischen Republik ein.“ Am 5. Februar 2004 übernahm diese Rebellengruppe die Kontrolle über Haitis viertgrößte Stadt Gonaïves und markierte damit den Beginn eines kleinen Aufstands gegen Aristide. Während ihrer Plünderung der Stadt brannten sie die Polizeistation nieder und plünderten sie nach Waffen und Fahrzeugen, mit denen sie ihren Feldzug entlang der Küste fortsetzten. Am 22. Februar hatten die Rebellen Haitis zweitgrößte Stadt Cap-Haïtien eingenommen. Gegen Ende Februar drohten die Rebellen, die Hauptstadt Port-au-Prince einzunehmen, was zu zunehmenden politischen Unruhen und dem Bau von Barrikaden in der gesamten Hauptstadt führte. Haitianer flohen auf Booten aus ihrem Land in der Hoffnung, in die Vereinigten Staaten zu gelangen. Nach einem dreiwöchigen Aufstand verließ Aristide Haiti unfreiwillig in einem US-Flugzeug, begleitet von US-Sicherheitspersonal, als die Rebellen die Hauptstadt einnahmen. Er wurde ohne Kenntnis seiner Route und seines Ziels über Antigua nach Bangui in der Zentralafrikanischen Republik geflogen. Was sollen wir tun?"

ron_coupscountry.207.t:0 "Der Kongress hat einen Putsch gestartet"
ron_coupscountry.207.d:0 "Am 20. April 2005, nach einer Woche massiver Demonstrationen, beschloss der Kongress Ecuadors (der in einer Sondersitzung in einem privaten Gebäude, CIESPAL, nur mit Delegierten der Opposition zusammentrat) mit 60 zu 2 Stimmen (38 Mitglieder, darunter die große Mehrheit der PRE/PRIAN/PSP-Abgeordneten, waren nicht anwesend) Gutiérrez aus dem Amt zu entfernen und Vizepräsident Alfedo Palacio González zum neuen Präsidenten zu ernennen. Er begründete dies damit, dass Gutiérrez seine verfassungsmäßigen Pflichten vernachlässigt habe. Gleichzeitig erklärte das gemeinsame Kommando der ecuadorianischen Streitkräfte (Comando Conjunto de las Fuerzas Armadas) öffentlich, dass es Gutiérrez seine Unterstützung entziehe. Gutiérrez hatte keine andere Wahl, als den Präsidentenpalast in einem Hubschrauber zu verlassen. Er suchte im Haus des brasilianischen Botschafters im Norden Quitos politisches Asyl, nachdem sein Versuch, die Stadt in einem Flugzeug am internationalen Flughafen Quito zu verlassen, von Hunderten wütenden Demonstranten vereitelt worden war, die die Sicherheitskontrollen des Flughafens durchbrochen und die Landebahn blockiert hatten. Was werden wir tun?"

ron_coupscountry.208.t:0 "Die Präsidentengarde hat einen Putsch gestartet"
ron_coupscountry.208.d:0 "Während Taya am 3. August 2005 der Beerdigung von König Fahd von Saudi-Arabien beiwohnte, umstellten Mitglieder der Präsidentengarde den Präsidentenpalast und andere wichtige Ministerien. In der ganzen Hauptstadt waren Schüsse zu hören, die die Straßen von Nouakchott leerten. Die Putschisten übernahmen auch die Kontrolle über staatliche Radio- und Fernsehsender. In einer offiziellen Botschaft im mauretanischen Fernsehen erklärten die Putschisten: „Die Streitkräfte und Sicherheitskräfte haben einstimmig beschlossen, den totalitären Handlungen des untergegangenen Regimes, unter dem unser Volk in den letzten Jahren schwer gelitten hat, ein endgültiges Ende zu setzen.“ Was sollen wir tun?"

ron_coupscountry.209.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.209.d:0 "Der thailändische Staatsstreich von 2006 ereignete sich am 19. September 2006, als die Königlich Thailändische Armee einen Staatsstreich gegen die gewählte Übergangsregierung von Premierminister Thaksin Shinawatra inszenierte. Der Staatsstreich, der Thailands erster nicht verfassungsmäßiger Regierungswechsel seit 15 Jahren war, folgte einer jahrelangen politischen Krise, in die Thaksin, seine Verbündeten und politische Gegner verwickelt waren, und ereignete sich weniger als einen Monat vor den landesweiten Parlamentswahlen. In Thailand und anderswo wurde vielfach berichtet, dass General Prem Tinsulanonda, Vorsitzender des Kronrates, der Drahtzieher des Putsches war. Das Militär sagte die für den 15. Oktober angesetzten Wahlen ab, hob die Verfassung von 1997 auf, löste Parlament und Verfassungsgericht auf, verbot Proteste und alle politischen Aktivitäten, unterdrückte und zensierte die Medien, verhängte im ganzen Land das Kriegsrecht und verhaftete Kabinettsmitglieder. Was werden wir tun?"

ron_coupscountry.210.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.210.d:0 "Der Staatsstreich auf Fidschi im Dezember 2006 war eine Fortsetzung des Drucks, der sich seit den militärischen Unruhen des Staatsstreichs auf Fidschi im Jahr 2000 und der politischen Krise auf Fidschi 2005–2006 aufgebaut hatte. In den letzten zwei Jahrzehnten hatte es auf Fidschi vier endgültige Staatsstreiche gegeben. Im Zentrum der drei vorherigen standen die Spannungen zwischen den ethnischen Fidschianern und den indischen Fidschianern. Religion spielte eine bedeutende Rolle; die Mehrheit der ethnischen Fidschianer gehört der Methodistenkirche an, während die Mehrheit der Inder Hindus sind. Bei jedem Putsch versuchte eine der Seiten, den indischen Fidschianern eingeschränkte Rechte einzuräumen; die andere Seite versuchte, den indischen Fidschianern mehr Rechte und Gleichberechtigung zu gewähren. Die Kirche Fidschis spielte in der Politik häufig eine bedeutende Rolle – hochrangige Vertreter der Methodistenkirche von Fidschi und Rotuma unterstützten den Putsch von 2000 und den anschließenden Vorschlag, die Beteiligten zu begnadigen. Sogar die Möglichkeit, Fidschi zu einem theokratischen christlichen Staat zu erklären, wurde in der Vergangenheit vorgeschlagen. Dies hat Josaia Voreqe „Frank“ Bainimarama, den Anführer des Putsches im Dezember 2006, in der Vergangenheit in Konflikt mit der Methodistenkirche gebracht. Was werden wir tun?"

ron_coupscountry.211.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.211.d:0 "Der mauretanische Staatsstreich von 2008 war ein Militärputsch, der am 6. August 2008 in Mauretanien stattfand. Dabei wurde Präsident Sidi Ould Cheikh Abdallahi von den mauretanischen Streitkräften, angeführt von einer Gruppe hochrangiger Generäle, die er zuvor am selben Tag aus dem Amt entlassen hatte, aus dem Amt gestürzt. Was werden wir tun?"

ron_coupscountry.212.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.212.d:0 "Sechs Stunden nachdem Somparé Contés Tod bekannt gegeben hatte, wurde im staatlichen Radio eine Erklärung verlesen, die einen Militärputsch ankündigte. In dieser Erklärung, die von Hauptmann Moussa Dadis Camara im Namen des Nationalen Rates für Demokratie und Entwicklung (CNDD) verlesen wurde, hieß es, „die Regierung und die Institutionen der Republik seien aufgelöst worden“. Außerdem wurde die Außerkraftsetzung der Verfassung „sowie der politischen und gewerkschaftlichen Aktivitäten“ angekündigt. Hauptmann Camara zufolge war der Putsch aufgrund der „tiefen Verzweiflung“ Guineas inmitten grassierender Armut und Korruption notwendig. Er sagte, die bestehenden Institutionen seien „unfähig, die Krisen zu lösen, mit denen das Land konfrontiert ist“. Darüber hinaus kündigte Camara an, dass ein Militär Präsident und ein Zivilist Premierminister an der Spitze einer neuen, ethnisch ausgewogenen Regierung werden würde. Der Nationale Rat für Demokratie und Entwicklung würde laut Camara aus 26 Offizieren und sechs Zivilisten bestehen. Was sollen wir tun?"

ron_coupscountry.213.t:0 "Verfassungskrise in Honduras"
ron_coupscountry.213.d:0 "Der Staatsstreich in Honduras 2009, Teil der Verfassungskrise in Honduras, ereignete sich, als die honduranische Armee am 28. Juni 2009 dem Befehl des Obersten Gerichtshofs von Honduras folgte, Präsident Manuel Zelaya zu stürzen und ins Exil zu schicken. Zelaya hatte versucht, eine unverbindliche Abstimmung über ein Referendum zur Einberufung einer verfassunggebenden Versammlung zur Neufassung der Verfassung anzusetzen. Zelaya weigerte sich, den gerichtlichen Anordnungen zur Einstellung des Putsches Folge zu leisten, und der Oberste Gerichtshof von Honduras erließ am 26. Juni einen geheimen Haftbefehl gegen ihn. Zwei Tage später stürmten honduranische Soldaten mitten in der Nacht das Haus des Präsidenten und nahmen ihn fest, wodurch die Abstimmung verhindert wurde. Anstatt ihn vor Gericht zu stellen, setzte ihn die Armee in ein Militärflugzeug und flog ihn nach Costa Rica. Später am selben Tag, nach der Verlesung eines Rücktrittsschreibens, dessen Echtheit umstritten war, stimmte der honduranische Kongress für Zelayas Amtsenthebung und ernannte den Kongresspräsidenten Roberto Micheletti, seinen verfassungsmäßigen Nachfolger, zu seinem Nachfolger. Was werden wir tun?"

ron_coupscountry.214.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.214.d:0 "Am 18. Februar 2010 kam es in Niger zu einem Staatsstreich. Soldaten griffen mittags den Präsidentenpalast in Niamey unter Waffenbeschuss an und nahmen Präsident Mamadou Tandja gefangen, der zu diesem Zeitpunkt eine Regierungssitzung leitete. Später am selben Tag verkündeten die Rebellen im Fernsehen die Gründung des Obersten Rates zur Wiederherstellung der Demokratie (CSRD) unter der Leitung von Chef d&#39;Escadron Salou Djibo. Was sollen wir tun?"

ron_coupscountry.215.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.215.d:0 "Der malische Staatsstreich 2012 begann am 21. März desselben Jahres, als meuternde malische Soldaten, unzufrieden mit der Führung des Tuareg-Aufstands, mehrere Orte in der Hauptstadt Bamako angriffen, darunter den Präsidentenpalast, das staatliche Fernsehen und Kasernen. Die Soldaten, die angaben, das Nationale Komitee zur Wiederherstellung von Demokratie und Staat gegründet zu haben, erklärten am folgenden Tag, sie hätten die Regierung von Amadou Toumani Touré gestürzt und ihn gezwungen, unterzutauchen. Dem Putsch folgten „einstimmige“ internationale Verurteilung, harte Sanktionen durch Malis Nachbarn und der rasche Verlust Nordmalis an die Tuareg-Truppen, was Reuters dazu veranlasste, den Putsch als „spektakuläres Eigentor“ zu bezeichnen. Am 6. April einigte sich die Junta mit den Verhandlungsführern der Wirtschaftsgemeinschaft westafrikanischer Staaten (ECOWAS) darauf, im Gegenzug für das Ende der Sanktionen von der Macht zurückzutreten und die Macht an eine Übergangsregierung unter Parlamentspräsident Dioncounda Traoré zu übergeben. In den folgenden Tagen traten sowohl Touré als auch Putschistenführer Amadou Sanogo formell zurück. Am 16. Mai galt die Junta jedoch noch immer als „die alleinige Kontrolle“. Am 3. Dezember 2013 wurde in Diago ein Massengrab entdeckt, in dem die sterblichen Überreste von 21 Soldaten lagen, die im Jahr zuvor verschwunden waren und dem gestürzten Präsidenten treu ergeben waren. Was sollen wir tun?"

ron_coupscountry.216.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.216.d:0 "Am 12. April war zwischen 19:00 und 21:00 Uhr Schüsse zu hören, als meuternde Truppen versuchten, die Regierung zu stürzen, indem sie die Kontrolle über das Zentrum der Hauptstadt Bissau übernahmen. Ersten Berichten von Diplomaten im Land zufolge werden Präsidentschaftskandidat Carlos Gomes Júnior und Interimspräsident Raimundo Pereira vermisst. Die Meuterer übernahmen die Kontrolle über die Büros der amtierenden Afrikanischen Partei für die Unabhängigkeit von Guinea und Kap Verde (PAIGC) sowie über Radiosender. Sie kämpften auch gegen regierungstreue Polizisten und zwangen diese zum Rückzug, nachdem sie unter Beschuss mit Panzerfäusten geraten waren. Die Soldaten blockierten die Zufahrtsstraßen in die und aus der Hauptstadt, und das nationale Radio und Fernsehen wurde um 20:00 Uhr abgeschaltet. Was sollen wir tun?"

ron_coupscountry.217.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.217.d:0 "Am 22. Mai 2014 starteten die Königlich Thailändischen Streitkräfte unter General Prayut Chan-o-cha, dem Kommandeur der Königlich Thailändischen Armee (RTA), nach einer sechsmonatigen politischen Krise einen Staatsstreich gegen die thailändische Übergangsregierung. Es war der zwölfte seit dem ersten Putsch des Landes im Jahr 1932. Das Militär errichtete eine Junta namens Nationaler Rat für Frieden und Ordnung (NCPO), um das Land zu regieren. Nach der Auflösung von Regierung und Senat übertrug der NCPO seinem Führer die Exekutive und Legislative und ordnete an, dass die Judikative seinen Weisungen folgte. Darüber hinaus hob er die Verfassung von 2007 teilweise auf (mit Ausnahme des zweiten Kapitels, das den König betrifft), verhängte landesweit das Kriegsrecht und eine Ausgangssperre, verbot politische Versammlungen, verhaftete und inhaftierte Politiker und Putschgegner, verhängte Internetzensur und übernahm die Kontrolle über die Medien. Der NCPO erließ eine Übergangsverfassung, die ihm Amnestie und umfassende Machtbefugnisse gewährte. Der NCPO richtete außerdem eine vom Militär dominierte nationale Legislative ein, die später General Prayuth einstimmig zum neuen Premierminister des Landes wählte. Was werden wir tun?"

ron_coupscountry.218.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.218.d:0 "Am Abend des 14. November 2017 versammelten sich Teile der Zimbabwe Defence Forces (ZDF) rund um Harare, die Hauptstadt Simbabwes, und übernahmen die Kontrolle über die Zimbabwe Broadcasting Corporation und wichtige Stadtteile. Am nächsten Tag veröffentlichte das ZDF eine Erklärung, in der es hieß, es habe sich nicht um einen Staatsstreich gehandelt und Präsident Robert Mugabe sei in Sicherheit. Die Lage werde sich jedoch erst wieder normalisieren, wenn das ZDF die „Kriminellen“ um Mugabe, die für die sozioökonomischen Probleme Simbabwes verantwortlich seien, zur Rechenschaft gezogen habe. Jacob Zuma, der damalige Präsident Südafrikas, rief Mugabe an und erfuhr, dass dieser unter Hausarrest stehe, es ihm aber ansonsten gut gehe. Was sollen wir tun?"

ron_coupscountry.219.t:0 "Bolivianische politische Krise"
ron_coupscountry.219.d:0 "Die politische Krise in Bolivien 2019 brach am 10. November 2019 aus, nach 21 Tagen ziviler Proteste im Anschluss an die umstrittenen Parlamentswahlen und der Veröffentlichung eines Berichts der Organisation Amerikanischer Staaten (OAS), in dem Unregelmäßigkeiten im Wahlprozess behauptet wurden. Gewerkschaften, Militär und Polizei forderten Präsident Evo Morales zum Rücktritt auf. Dieser kam der Aufforderung nach, und im Laufe des Tages traten weitere hochrangige Politiker zurück. Einige gaben an, um die Sicherheit ihrer Familien zu fürchten. Die mexikanische Regierung bot Morales am folgenden Tag politisches Asyl an, das dieser einen Tag später annahm. Was sollen wir tun?"

ron_coupscountry.220.t:0 "Das Militär hat einen Putsch gestartet"
ron_coupscountry.220.d:0 "Am Morgen des 18. August 2020 begannen Soldaten auf einem Militärstützpunkt in Kati, einer Stadt 15 Kilometer von Bamako, der Hauptstadt Malis, entfernt, in die Luft zu feuern. Nach ihrem Einmarsch in die Hauptstadt verhafteten die Meuterer Finanzminister Abdoulaye Daffe, den Stabschef der Nationalgarde Mahamane Touré und Moussa Timbiné, den Sprecher der Nationalversammlung. Premierminister Boubou Cissé rief zum Dialog mit den Meuterern auf und räumte ein, dass diese „berechtigte Frustrationen“ hätten. Ein Meutererführer behauptete später, Keïta und Cissé seien in dessen Residenz in Bamako festgenommen worden; der Vorsitzende der Kommission der Afrikanischen Union, Moussa Faki, bestätigte die Festnahme von Keïta, Cissé und anderen Beamten und forderte ihre Freilassung. Ein Sprecher der Oppositionskoalition M5-RFP begrüßte ihre Festnahme und bezeichnete sie als „Volksaufstand“. Was sollen wir tun?"

ron_warscountry.x.t:0 "Werden wir in den Krieg ziehen?"
ron_warscountry.x.d:0 "Was werden wir tun?"
ron_warscountry.x.a:1 "In den Krieg ziehen"
ron_warscountry.x.b:1 "Aufgeben"

## Cold War Wars

ron_warscountry.1.t:0 "Aufstand der Kreuzfahrer"
ron_warscountry.1.d:0 "Die Kreuzfahrer waren eine kroatische pro-ustaschaische antikommunistische Guerillaarmee. Ihre Aktivitäten begannen nach der Kapitulation des Unabhängigen Staates Kroatien, der damals ein Nazi-Marionettenstaat war, im Mai 1945, gegen Ende des Zweiten Weltkriegs. Die Aktivitäten der Kreuzfahrer endeten 1950. Sie wollten sich von Kroatien abspalten und den faschistischen Unabhängigen Staat Kroatien wiederherstellen. Was ist mit ihnen zu tun?"

ron_warscountry.2.t:0 "Aufstand in Chuzestan"
ron_warscountry.2.d:0 "Was werden wir tun?"

ron_warscountry.3.t:0 "Rebellion in Hazara"
ron_warscountry.3.d:0 "Der Hazara-Aufstand von 1945 war ein Aufstand der Hazara im Königreich Afghanistan, der in den Jahren 1945 und 1946 stattfand. Seine Ursachen lagen in der Einführung einer neuen Steuer, die nur den Hazara auferlegt wurde. Es begann im November 1945, als Hazara-Rebellen unter Ebrāhim Beg, auch bekannt als &quot;Bačča-Gāw-sawār&quot;, gegen die lokale Verwaltung von Shahristan revoltierten."

ron_warscountry.4.t:0 "Nordkorea marschiert bei uns ein!"
ron_warscountry.4.d:0 "Was werden wir tun?"
ron_warscountry.4.a:1 "In den Krieg ziehen"
ron_warscountry.4.b:1 "Aufgeben"

ron_warscountry.6.t:0 "Krise in Aserbaidschan"
ron_warscountry.6.d:0 "Die Iran-Krise von 1946, in iranischen Quellen auch als Aserbaidschan-Krise (persisch غائله آذربایجان, romanisiert Qaʾilih Âzarbâyjân) bekannt, war eine der ersten Krisen des Kalten Krieges. Auslöser war die Weigerung der Sowjetunion unter Josef Stalin, trotz wiederholter Zusicherungen besetztes iranisches Gebiet aufzugeben. Das Ende des Zweiten Weltkriegs hätte das Ende der gemeinsamen Besetzung des Iran durch die Alliierten bedeuten sollen. Stattdessen riefen prosowjetische Iraner die separatistische Aserbaidschanische Volksregierung aus."
ron_warscountry.6.a:1 "Erobern Sie unsere Gebiete zurück!"

ron_warscountry.7.t:0 "Kommunisten, erhebt euch!"
ron_warscountry.7.d:0 "Was werden wir tun?"
ron_warscountry.7.a:1 "Unterdrücke sie"
ron_warscountry.7.b:1 "Aufgeben"

ron_warscountry.8.t:0 "Hukbalahap-Rebellen!"
ron_warscountry.8.d:0 "Der Hukbalahap-Aufstand war ein Aufstand ehemaliger Hukbalahap- oder Hukbo ng Bayan Laban sa Hapon-Soldaten (Volksarmee gegen die Japaner) gegen die philippinische Regierung. Es begann während der japanischen Besetzung der Philippinen im Jahr 1942, dauerte während der Präsidentschaft von Manuel Roxas an und endete 1954 unter der Präsidentschaft von Ramon Magsaysay."
ron_warscountry.8.a:1 "Unterdrücke es"
ron_warscountry.8.b:1 "Aufgeben"

ron_warscountry.9.t:0 "Bauernaufstand"
ron_warscountry.9.d:0 "Der 10.1. Daegu-Aufstand von 1946 (hangul 대구 10·1 사건; hanja 大邱 10·1 事件) in Korea war ein Bauernaufstand in den südlichen Provinzen Koreas gegen die Politik der US-Militärregierung in Korea unter General John R. Hodge und für die Wiederherstellung der Macht der Volkskomitees der Volksrepublik Korea. Der Aufstand wurde auch als Daegu-Aufstand oder Daegu-Widerstandsbewegung bezeichnet."

ron_warscountry.10.t:0 "Aufstand von Punnapra-Vyalar"
ron_warscountry.10.d:0 "Der Punnapra-Vayalar-Aufstand (Oktober 1946) war ein kommunistischer Aufstand im Fürstenstaat Travancore in Britisch-Indien gegen den Premierminister CP Ramaswami Iyer und den Staat."

ron_warscountry.11.t:0 "Krieg um Indochina"
ron_warscountry.11.d:0 "Was werden wir tun?"
ron_warscountry.11.a:1 "In den Krieg ziehen"
ron_warscountry.11.b:1 "Aufgeben"

ron_warscountry.12.t:0 "Bürgerkrieg!"
ron_warscountry.12.d:0 "Was werden wir tun?"
ron_warscountry.12.a:1 "In den Krieg ziehen"
ron_warscountry.12.b:1 "Aufgeben"

ron_warscountry.13.t:0 "Rebellion in Poonch"
ron_warscountry.13.d:0 "Was werden wir tun?"
ron_warscountry.13.a:1 "Unterdrücke es"
ron_warscountry.13.b:1 "Aufgeben"

ron_warscountry.14.t:0 "Indien integriert uns!"
ron_warscountry.14.d:0 "Was werden wir tun?"
ron_warscountry.14.a:1 "In den Krieg ziehen"
ron_warscountry.14.b:1 "Erlaube es"

ron_warscountry.15.t:0 "Antikommunistischer Widerstand formiert!"
ron_warscountry.15.d:0 "Die rumänische antikommunistische Widerstandsbewegung war von den späten 1940er- bis Mitte der 1950er-Jahre aktiv, wobei einzelne Kämpfer bis Anfang der 1960er-Jahre auf freiem Fuß blieben. Der bewaffnete Widerstand war die erste und strukturierteste Form des Widerstands gegen das kommunistische Regime."
ron_warscountry.15.a:1 "Unterdrücke es"
ron_warscountry.15.b:1 "Aufgeben"

ron_warscountry.16.t:0 "Indisch-pakistanische Konflikte führen zum Krieg"
ron_warscountry.16.d:0 "Was werden wir tun?"
ron_warscountry.16.a:1 "In den Krieg ziehen"
ron_warscountry.16.b:1 "Aufgeben"

ron_warscountry.17.t:0 "Aufstand der Madagassen"
ron_warscountry.17.d:0 "Der Madagaskaraufstand war eine nationalistische Rebellion Madagaskars gegen die französische Kolonialherrschaft in Madagaskar, die von März 1947 bis Februar 1949 dauerte. Ab Ende 1945 führten die ersten Abgeordneten Madagaskars in der französischen Nationalversammlung, Joseph Raseta, Joseph Ravoahangy und Jacques Rabemananjara von der politischen Partei Mouvement démocratique de la rénovation malgache (MDRM), Bemühungen an, Madagaskar auf legalem Wege die Unabhängigkeit zu verschaffen."
ron_warscountry.17.a:1 "Unterdrücke es"
ron_warscountry.17.b:1 "Aufgeben"

ron_warscountry.18.t:0 "Palästina revoltiert!"
ron_warscountry.18.d:0 "Was werden wir tun?"
ron_warscountry.18.a:1 "In den Krieg ziehen"
ron_warscountry.18.b:1 "Aufgeben"

ron_warscountry.19.t:0 "Aufstand in Safi"
ron_warscountry.19.d:0 "Die afghanischen Stammesaufstände von 1944–1947 oder die Khost-Unruhen waren eine Reihe von Stammesaufständen im Königreich Afghanistan durch Stammesangehörige der Zadran, Safi und Mangal, die von Februar 1944 bis Januar 1947 andauerten. Die Ursachen der Aufstände lagen in der Verschlechterung der Bedingungen der Bauern, Änderungen der Wehrpflichtgesetze, der Beseitigung der Macht der Stammesführer der Safi, der Loyalität gegenüber Amanullah, Handelsmonopolen, staatlicher Überwachung, Besteuerung und Armut."
ron_warscountry.19.a:1 "Unterdrücke es"
ron_warscountry.19.b:1 "Aufgeben"

ron_warscountry.21.t:0 "Die Nationale Befreiungsarmee erhebt sich!"
ron_warscountry.21.d:0 "Was werden wir tun?"
ron_warscountry.21.a:1 "In den Krieg ziehen"
ron_warscountry.21.b:1 "Aufgeben"

ron_warscountry.22.t:0 "Arbeiteraufstand in Jeju!"
ron_warscountry.22.d:0 "Der Jeju-Aufstand (koreanisch 제주4·3사건, Jeju sasam sageon) war ein Aufstand auf der südkoreanischen Insel Jeju von April 1948 bis Mai 1949. Die Einwohner Jejus, die gegen die Teilung Koreas waren, protestierten und befanden sich seit 1947 in einem Generalstreik gegen die von der Temporären Kommission der Vereinten Nationen für Korea (UNTCOK) angesetzten Wahlen, die ausschließlich in den von der US-Militärregierung in Korea kontrollierten Gebieten abgehalten werden sollten. Die Arbeiterpartei Südkoreas und ihre Anhänger starteten im April 1948 einen Aufstand und griffen die Polizei an."
ron_warscountry.22.a:1 "Unterdrücke es"
ron_warscountry.22.b:1 "Aufgeben"

ron_warscountry.23.t:0 "La Violencia!"
ron_warscountry.23.d:0 "La Violencia begann vermutlich mit der Ermordung des populären Politikers Jorge Eliécer Gaitán am 9. April 1948, eines Präsidentschaftskandidaten der Liberalen Partei für die Wahlen im November 1949. Seine Ermordung löste die zehnstündigen Unruhen in Bogotá aus, bei denen rund 5.000 Menschen starben. Eine alternative Geschichtsschreibung sieht den Beginn der Gewalt mit der Rückkehr der Konservativen an die Macht nach den Wahlen von 1946. Polizisten und politische Führer in ländlichen Gemeinden ermutigten konservative Bauern, die landwirtschaftlichen Flächen liberaler Bauern zu beschlagnahmen, was in ganz Kolumbien zu Gewalt zwischen Bauern führte. "
ron_warscountry.23.a:1 "Stehen Sie auf der Seite der Kommunisten"
ron_warscountry.23.b:1 "Stehen Sie auf der Seite der Konservativen"

ron_warscountry.24.t:0 "Der arabisch-israelische Krieg "
ron_warscountry.24.d:0 "Der arabisch-israelische Krieg von 1948 war die zweite und letzte Phase des Palästinakrieges von 1947 bis 1949. Er begann offiziell nach dem Ende des britischen Mandats für Palästina um Mitternacht des 14. Mai 1948. Zuvor war am selben Tag die israelische Unabhängigkeitserklärung veröffentlicht worden, und am Morgen des 15. Mai marschierte eine Militärkoalition arabischer Staaten in das Gebiet des britischen Palästina ein."
ron_warscountry.24.a:0 "Zieh in den Krieg!"
ron_warscountry.24.b:0 "Wir schicken Freiwillige"
ron_warscountry.25.c:0 "Wir werden nichts tun"

#ron_warscountry.25.t:0 "Operation Polo"
#ron_warscountry.25.d:0 "Operation Polo was the code name of the Hyderabad "police action" in September 1948, by the then newly #independent Dominion of India against Hyderabad State. It was a military operation in which the Indian Armed Forces invaded the #Nizam-ruled princely state, annexing it into the Indian Union.At the time of Partition in 1947, the princely states of India, who in #principle had self-government within their own territories, were subject to subsidiary alliances with the British, giving them #control of their external relations. In the Indian Independence Act 1947 the British abandoned all such alliances, leaving the states #with the option of opting for full independence."
#ron_warscountry.25.a:1 "Execute the plan"
#ron_warscountry.25.b:1 "Forget it"

ron_warscountry.26.t:0 "Affäre in Madiun"
ron_warscountry.26.d:0 "Die Madiun-Affäre (indonesisch Peristiwa Madiun), lokal bekannt als der Aufstand der Kommunistischen Partei Indonesiens von 1948 (indonesisch Pemberontakan Partai Komunis Indonesia 1948), war ein bewaffneter Konflikt zwischen der Regierung der selbsternannten Republik Indonesien und der linksgerichteten Oppositionsgruppe Front Demokrasi Rakyat (FDR, Demokratische Volksfront) während der Indonesischen Nationalrevolution."

ron_warscountry.27.t:0 "Kommunisten in Yeosu-Suncheon!"
ron_warscountry.27.d:0 "Der Yeosu-Suncheon-Aufstand, auch bekannt als Yeo-Sun-Aufstand (Yeo-Sun ist eine Abkürzung der Gebietsnamen Yeosu und Suncheon), begann im Oktober 1948 und endete größtenteils im November desselben Jahres. Allerdings hielten sich noch bis 1957, also fast zehn Jahre später, Widerstandsnester. "

ron_warscountry.28.t:0 "Aufstand vor dem Koreakrieg!"
ron_warscountry.28.d:0 "Was werden wir tun?"
ron_warscountry.28.a:1 "In den Krieg ziehen"
ron_warscountry.28.b:1 "Aufgeben"

ron_warscountry.29.t:0 "Rebellion in Hazara"
ron_warscountry.29.d:0 "Der Hazara-Aufstand von 1949 war ein Aufstand von Hazara-Rebellen in der Region Shahristan im Königreich Afghanistan, der 1949 stattfand. Er wurde von einem Militärbataillon unter Führung des Gouverneurs von Kabul niedergeschlagen, woraufhin der Anführer des Aufstands, Qurban Zawar, verhaftet wurde."

ron_warscountry.30.t:0 "Palästinensischer Fedayeen-Aufstand"
ron_warscountry.30.d:0 "Der Aufstand der palästinensischen Fedajin bezeichnet den bewaffneten grenzüberschreitenden Konflikt, der zwischen 1949 und 1956 seinen Höhepunkt erreichte. In den Konflikt verwickelt waren israelische und palästinensische Militante, die hauptsächlich im Gazastreifen stationiert waren und nominell unter der Kontrolle des Allpalästinensischen Protektorats standen – eines im Oktober 1948 ausgerufenen palästinensischen Vasallenstaats Ägyptens, der zum Mittelpunkt der Aktivitäten der palästinensischen Fedajin wurde."

ron_warscountry.31.t:0 "Rebellion im Palast!"
ron_warscountry.31.d:0 "Was werden wir tun?"
ron_warscountry.31.a:1 "In den Krieg ziehen"
ron_warscountry.31.b:1 "Aufgeben"

ron_warscountry.32.t:0 "Kampagne zur Unterdrückung von Banditen im ganzen Land"
ron_warscountry.32.d:0 "Die Kampagne zur Unterdrückung von Banditen in Zentral- und Südchina (中南剿匪) war eine Anti-Guerilla-/Aufstandsbekämpfungskampagne der Kommunisten gegen die nationalistischen Guerillas, die hauptsächlich aus antikommunistischen irregulären Kräften und nationalistischen regulären Truppen bestanden, die nach dem Rückzug der nationalistischen Regierung vom chinesischen Festland zurückgelassen wurden. Die Kampagne wurde während des chinesischen Bürgerkriegs in der Nachkriegszeit in sechs chinesischen Provinzen – Henan, Hubei, Hunan, Jiangxi, Guangdong und Guangxi – geführt und endete mit einem Sieg der Kommunisten. "

ron_warscountry.33.t:0 "Aufstand in Darul"
ron_warscountry.33.d:0 "Darul Islam (Haus des Islam), auch bekannt als Darul Islam/Islamische Streitkräfte Indonesiens (indonesisch Darul Islam/Tentara Islam Indonesia, DI/TII), war eine islamistische Gruppe, die für die Errichtung eines islamischen Staates in Indonesien kämpfte. Sie wurde 1942 von einer Gruppe muslimischer Milizen gegründet, koordiniert von dem charismatischen radikalen muslimischen Politiker Sekarmadji Maridjan Kartosoewirjo. Die Gruppe erkannte ausschließlich die Scharia als gültige Rechtsquelle an. Die Bewegung hat Splittergruppen und Ableger hervorgebracht, die von der Jemaah Islamiyah bis hin zu gewaltfreien religiösen Gruppen reichen. "
ron_warscountry.33.a:1 "Unterdrücke es"
ron_warscountry.33.b:1 "Aufgeben"

ron_warscountry.34.t:0 "Scharmützel an unserer Grenze!"
ron_warscountry.34.d:0 "Was werden wir tun?"
ron_warscountry.34.a:1 "Scharmützel zurück!"
ron_warscountry.34.b:1 "Aufgeben"

ron_warscountry.34.t:0 "Konflikt in Buraimi"
ron_warscountry.34.a:1 "In den Krieg ziehen"

ron_warscountry.35.t:0 "Islamischer Aufstand in der Kuomintang"
ron_warscountry.35.d:0 "Der islamische Aufstand der Kuomintang (chinesisch 西北剿匪; Pinyin Xīběi Jiǎofěi) bezeichnet eine Fortsetzung des chinesischen Bürgerkriegs durch die Streitkräfte der chinesisch-muslimisch-nationalistischen Kuomintang-Armee der Republik China im Nordwesten Chinas, in den Provinzen Gansu, Qinghai, Ningxia und Xinjiang, sowie einen weiteren Aufstand in Yunnan."

ron_warscountry.36.t:0 "APRA-Staatsstreich!"
ron_warscountry.36.d:0 "Was werden wir tun?"
ron_warscountry.36.a:1 "Nimm sie runter"
ron_warscountry.36.b:1 "Aufgeben"

ron_warscountry.37.t:0 "Aufstand in Makassar"
ron_warscountry.37.d:0 "Der Makassar-Aufstand war ein Gefecht in Makassar, Sulawesi, zwischen ehemaligen Soldaten der Königlich Niederländischen Ostindien-Armee unter Hauptmann Andi Aziz und der Regierung der Republik der Vereinigten Staaten von Indonesien. Ziel des Aufstands war es, sich gegen die Eingliederung der indonesischen föderierten Staaten in die Indonesische Republik zu wehren. Der Aufstand wurde jedoch nach etwas mehr als zwei Wochen niedergeschlagen, als Truppen unter Oberstleutnant Suharto und Oberst Alexander Evert Kawilarang in Makassar eintrafen und nur auf geringen Widerstand stießen."
ron_warscountry.37.a:1 "Unterdrücke es"
ron_warscountry.37.b:1 "Aufgeben"

ron_warscountry.38.t:0 "La Revolución!"
ron_warscountry.38.d:0 "Was werden wir tun?"
ron_warscountry.38.a:1 "In den Krieg ziehen"
ron_warscountry.38.b:1 "Aufgeben"

ron_warscountry.39.t:0 "Schlacht in Chamdo"
ron_warscountry.39.d:0 "Was werden wir tun?"
ron_warscountry.39.a:1 "In den Krieg ziehen"
ron_warscountry.39.b:1 "Aufgeben"

ron_warscountry.40.t:0 "Puerto-ricanische Nationalisten, erhebt euch!"
ron_warscountry.40.d:0 "Der Aufstand der Nationalisten von San Juan war einer von vielen Aufständen gegen die Herrschaft der US-Regierung, die am 30. Oktober 1950 während der Revolten der Puerto Rican Nationalist Party in Puerto Rico stattfanden. Zu den Hauptzielen des Aufstands gehörten ein Angriff auf La Fortaleza (die Villa des Gouverneurs in San Juan) und das Gebäude des US-Bundesgerichts in Old San Juan."
ron_warscountry.40.a:1 "In den Krieg ziehen"
ron_warscountry.40.b:1 "Aufgeben"

ron_warscountry.41.t:0 "Krieg in Korea!"
ron_warscountry.41.d:0 "Was werden wir tun?"
ron_warscountry.41.a:1 "Schlagen"
ron_warscountry.41.b:1 "Aufgeben"

ron_warscountry.42.t:0 "Marineeinheiten Rebellen"
ron_warscountry.42.d:0 "Was werden wir tun?"
ron_warscountry.42.a:1 "Pass auf sie auf"
ron_warscountry.42.b:1 "Aufgeben"

ron_warscountry.43.t:0 "Vergeltungsmaßnahmen"
ron_warscountry.43.d:0 "Was werden wir tun?"
ron_warscountry.43.a:1 "Führen Sie die Raids durch"
ron_warscountry.43.b:1 "Verwerfen Sie den Plan"

ron_warscountry.44.t:0 "Ägypten bricht aus"
ron_warscountry.44.d:0 "Was werden wir tun?"
ron_warscountry.44.a:1 "In den Krieg ziehen"
ron_warscountry.44.b:1 "Aufgeben"

