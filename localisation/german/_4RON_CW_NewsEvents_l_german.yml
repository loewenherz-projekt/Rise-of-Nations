CW_Expansion_news.437.a:1 "OK"

CW_Expansion_country.438.t:0 "Israel zieht sich von der Sinai-Halbinsel zurück"
CW_Expansion_country.438.d:0 "Während der Suezkrise im Oktober und November 1956 eroberten israelische Streitkräfte erstmals die ägyptische Sinai-Halbinsel. Unter starkem internationalen Druck zogen sich die israelischen Streitkräfte im März 1957 zurück, nachdem sie das Gebiet gründlich kartiert und geheime Versorgungslager zur Vorbereitung auf den nächsten Krieg angelegt hatten."
CW_Expansion_country.438.a:1 "OK"
