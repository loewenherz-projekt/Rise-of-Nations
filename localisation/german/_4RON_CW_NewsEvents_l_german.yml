CW_Expansion_country.418.t:0 "Anastasio Somoza Garcia ermordet"
CW_Expansion_country.418.d:0 "Als er 1950 in eigenem Namen an die Macht zurückkehrte, hielt er seine eigene Liberale Partei fest im Griff und schloss gleichzeitig ein Abkommen mit den Konservativen; so stieß er auf keinerlei Opposition. Dies ermöglichte es ihm, ein riesiges Privatvermögen anzuhäufen. Am 21. September 1956 wurde er vom Dichter Rigoberto López Pérez angeschossen. Tödlich verwundet, wurde er in die Panamakanalzone geflogen, wo er eine Woche später starb."
CW_Expansion_country.418.a:1 "OK"
