CW_Expansion_country.176.t:0 "Cinderella-Film veröffentlicht"
CW_Expansion_country.176.d:0 "Cinderella ist ein US-amerikanischer animierter Fantasy-Musicalfilm aus dem Jahr 1950, produziert von Walt Disney. Basierend auf dem gleichnamigen Märchen von Charles Perrault ist es der 12. Zeichentrickfilm von Disney. Regie führten Wilfred Jackson, Hamilton Luske und Clyde Geronimi. Mack David, Jerry Livingston und Al Hoffman schrieben die Lieder, darunter „Cinderella“, „A Dream Is a Wish Your Heart Makes“, „Oh, Sing Sweet Nightingale“, „The Work Song“, „Bibbidi-Bobbidi-Boo“ und „So This is Love“. Mit den Stimmen von Ilene Woods, Eleanor Audley, Verna Felton, Rhoda Williams, James MacDonald, Luis van Rooten, Don Barclay, Mike Douglas, William Phipps und Lucille Bliss."
CW_Expansion_country.176.a:1 "OK"
