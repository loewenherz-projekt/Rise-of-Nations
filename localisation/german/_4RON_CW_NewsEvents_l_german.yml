CW_Expansion_country.525.t:0 "Zugunglück in Steblova"
CW_Expansion_country.525.d:0 "Das Eisenbahnunglück von Stéblová ereignete sich am 14. November 1960 um 17:42 Uhr MEZ auf einer eingleisigen Eisenbahnstrecke in Stéblová in Ostböhmen (Tschechoslowakei, heute Tschechische Republik). Um 17:42 Uhr MEZ kollidierte der mit 55 km/h fahrende Dampfzug 608 mit dem mit 60 km/h fahrenden Dieseltriebwagen 653. Bei dem Unfall starben 118 Menschen, 110 wurden schwer verletzt. Es war der tragischste Unfall in der Geschichte des tschechischen Eisenbahnverkehrs."
CW_Expansion_country.525.a:1 "OK"
