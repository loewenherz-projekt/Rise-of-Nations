CW_Expansion_country.371.t:0 "Anthony Eden wird Premierminister des Vereinigten Königreichs"
CW_Expansion_country.371.d:0 "Im April 1955 trat Churchill in den Ruhestand und Eden wurde sein Nachfolger als Premierminister. Aufgrund seines langen Kriegsdienstes und seines berühmten guten Aussehens und Charmes war er sehr beliebt. Seine berühmten Worte „Frieden steht immer an erster Stelle“ trugen zu seiner ohnehin schon großen Popularität bei. Nach seinem Amtsantritt rief er umgehend Neuwahlen für den 26. Mai 1955 aus, bei denen er die konservative Mehrheit von siebzehn auf sechzig Stimmen erhöhte – ein Zuwachs, der einen 90 Jahre alten Rekord für eine britische Regierung brach. Die Parlamentswahlen von 1955 waren die letzten, bei denen die Konservativen in Schottland die Mehrheit der Stimmen errangen. Eden hatte jedoch nie ein innenpolitisches Ressort innegehabt und verfügte über wenig Erfahrung in Wirtschaftsfragen. Er überließ diese Bereiche seinen Stellvertretern wie Rab Butler und konzentrierte sich weitgehend auf die Außenpolitik, wobei er eine enge Beziehung zu US-Präsident Dwight Eisenhower aufbaute. Edens Versuche, die Gesamtkontrolle über das Außenministerium zu behalten, stießen auf breite Kritik. Eden hat die Ehre, als britischer Premierminister die niedrigsten Arbeitslosenzahlen der Nachkriegszeit zu verzeichnen. Im Juli 1955 lag die Arbeitslosigkeit bei knapp über 215.000 – kaum ein Prozent der Erwerbsbevölkerung."
CW_Expansion_country.371.a:1 "OK"
