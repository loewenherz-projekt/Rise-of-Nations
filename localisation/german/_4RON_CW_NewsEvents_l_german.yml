CW_Expansion_news.126.a:1 "OK"

CW_Expansion_country.127.t:0 "Hochzeit von Prinzessin Elizabeth"
CW_Expansion_country.127.d:0 "Die Hochzeit von Prinzessin Elizabeth und Philip Mountbatten fand am Donnerstag, dem 20. November 1947, in der Westminster Abbey in London, Großbritannien, statt. Die Braut war die ältere Tochter von König Georg VI. und mutmaßliche Erbin des britischen Throns. Der Bräutigam war ein ehemaliger griechischer und dänischer Prinz."
CW_Expansion_country.127.a:1 "OK"
