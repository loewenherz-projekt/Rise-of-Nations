CW_Expansion_country.138.t:0 "Arabisch-Israelischer Krieg"
CW_Expansion_country.138.d:0 "Der arabisch-israelische Krieg von 1948 war die zweite und letzte Phase des Palästinakrieges von 1947 bis 1949. Er begann offiziell nach dem Ende des britischen Mandats für Palästina um Mitternacht des 14. Mai 1948. Zuvor war am selben Tag die israelische Unabhängigkeitserklärung veröffentlicht worden, und am Morgen des 15. Mai marschierte eine Militärkoalition arabischer Staaten in das Gebiet des britischen Palästina ein."
CW_Expansion_country.138.a:1 "OK"
