CW_Expansion_country.515.t:0 "Erster Laserbetrieb"
CW_Expansion_country.515.d:0 "Als im Jahr 1960 über den ersten funktionierenden Laser berichtet wurde, bezeichnete man ihn als „Lösung auf der Suche nach einem Problem“. Doch schon bald wurden die besonderen Eigenschaften des Lasers – seine Fähigkeit, einen intensiven, sehr schmalen Lichtstrahl einer einzigen Wellenlänge zu erzeugen – für Wissenschaft, Technik und Medizin nutzbar gemacht."
CW_Expansion_country.515.a:1 "OK"
