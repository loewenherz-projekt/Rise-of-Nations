CW_Expansion_country.370.t:0 "Winston Churchill tritt zurück"
CW_Expansion_country.370.d:0 "Winston Churchill, der Großbritannien im Zweiten Weltkrieg in einem Bündnis mit den USA und der Sowjetunion zum Sieg über die Achsenmächte führte, trat an diesem Tag als Premierminister zurück. Churchill, damals 80 Jahre alt, sollte noch zehn Jahre leben. Sein Nachfolger im Amt wurde Anthony Eden, der Außenminister und politischer Protegé, der schon lange versucht hatte, ihn zu ersetzen."
CW_Expansion_country.370.a:1 "OK"
