CW_Expansion_country.349.t:0 "Die Gefährten des Rings erschienen"
CW_Expansion_country.349.d:0 "Die Gefährten ist der erste von drei Bänden des epischen Romans Der Herr der Ringe des englischen Autors J.R.R. Tolkien. Ihm folgen Die zwei Türme und Die Rückkehr des Königs. Der Roman spielt im fiktiven Universum von Mittelerde und wurde ursprünglich am 29. Juli 1954 im Vereinigten Königreich veröffentlicht. Der Band besteht aus einem Vorwort, in dem der Autor seine Arbeit an Der Herr der Ringe bespricht, einem Prolog mit dem Titel „Über Hobbits und andere Angelegenheiten“ sowie der Haupterzählung in Buch I und Buch II."
CW_Expansion_country.349.a:1 "OK"
