CW_Expansion_country.495.t:0 "Familie Clutter in Kansas brutal ermordet"
CW_Expansion_country.495.d:0 "In den frühen Morgenstunden des 15. November 1959 wurden vier Mitglieder der Familie Clutter – Herb Clutter, seine Frau Bonnie und ihre jugendlichen Kinder Nancy und Kenyon – in ihrem ländlichen Haus nahe der kleinen Bauerngemeinde Holcomb in Kansas ermordet. Zwei ehemalige Sträflinge, Perry Smith und Richard Hickock, wurden der Morde für schuldig befunden und zum Tode verurteilt. Smith und Hickock wurden am selben Tag, dem 14. April 1965, vom Staat Kansas hingerichtet. Die Morde wurden von Truman Capote in seinem 1966 erschienenen Sachroman „Kaltblütig“ detailliert beschrieben."
CW_Expansion_country.495.a:1 "OK"
