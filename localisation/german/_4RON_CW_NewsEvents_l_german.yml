CW_Expansion_country.218.t:0 "Zugunglück in Woodbridge"
CW_Expansion_country.218.d:0 "Am 6. Februar 1951 entgleiste ein Zug der Pennsylvania Railroad auf einem provisorischen Holzgerüst in Woodbridge, New Jersey. 85 Passagiere kamen dabei ums Leben. Es war bis heute der tödlichste Zugunfall in New Jersey, die tödlichste Entgleisung in den USA seit 1918 und das tödlichste Eisenbahnunglück in Friedenszeiten in den Vereinigten Staaten."
CW_Expansion_country.218.a:1 "OK"
