CW_Expansion_country.379.t:0 "Le Mans-Katastrophe"
CW_Expansion_country.379.d:0 "Die Le-Mans-Katastrophe von 1955 war ein schwerer Unfall, der sich am 11. Juni 1955 während des 24-Stunden-Rennens von Le Mans auf dem Circuit de la Sarthe in Le Mans an der Sarthe in Frankreich ereignete. Große Trümmerteile flogen in die Menge und töteten 83 Zuschauer und den französischen Fahrer Pierre Levegh, fast 180 weitere wurden verletzt. Es war der schlimmste Unfall in der Geschichte des Motorsports und veranlasste Mercedes-Benz, sich bis 1989 aus dem Motorsport zurückzuziehen. Der Unfall begann, als Jaguar-Fahrer Mike Hawthorn vor Austin-Healey-Fahrer Lance Macklin auf die rechte Seite der Strecke zog und für seinen Boxenstopp bremste. Macklin wich hinter dem langsamer werdenden Jaguar aus und landete genau auf der Fahrbahn von Levegh, der in seinem viel schnelleren Mercedes-Benz 300 SLR links überholte. Levegh fuhr mit hoher Geschwindigkeit auf Macklin auf, überrollte Macklins Auto und schleuderte sein eigenes Auto durch die Luft. Leveghs Wagen übersprang mit 200 km/h einen schützenden Erdwall und hatte mindestens zwei Aufpralle im Zuschauerbereich. Beim letzten Aufprall zerbrach das Auto, wodurch Levegh auf die Strecke geschleudert wurde und sofort starb. Große Trümmerteile, darunter Motorblock, Kühler, Vorderradaufhängung und Motorhaube des Mercedes, flogen in den voll besetzten Zuschauerbereich vor der Tribüne. Das Heck von Leveghs Wagen landete auf dem Wall und ging in Flammen auf. Es gab heftige Debatten über die Schuldfrage. Die offizielle Untersuchung machte keinen der Fahrer konkret verantwortlich und kritisierte die Streckenführung der 30 Jahre alten Strecke, die nicht für so schnelle Autos wie die Unfallbeteiligten ausgelegt war."
CW_Expansion_country.379.a:1 "OK"
