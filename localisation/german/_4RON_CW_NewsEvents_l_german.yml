CW_Expansion_country.230.t:0 "Leopold III. von Belgien dankt ab"
CW_Expansion_country.230.d:0 "Um eine Zersplitterung des Landes zu vermeiden und die Monarchie zu bewahren, beschloss Leopold am 1. August 1950, zugunsten seines 20-jährigen Sohnes Baudouin zurückzutreten. Seine Abdankung wurde am 16. Juli 1951 wirksam."
