CW_Expansion_country.243.t:0 "Pakistanischer Premierminister ermordet"
CW_Expansion_country.243.d:0 "Am 16. Oktober 1951 schoss Said Akbar Khan während einer öffentlichen Versammlung in einem Park in Rawalpindi, Pakistan, zweimal auf Liaqat. Der Attentäter wurde Sekunden später von Polizisten erschossen. Liaquat wurde ins Krankenhaus gebracht, wo er starb. Said Akbars Motive für die Ermordung von Liaqat Ali Khan sind unklar, da er auf der Stelle erschossen wurde."
CW_Expansion_country.243.a:1 "OK"
