CW_Expansion_country.177.t:0 "Polnische Vertreibung ethnischer Deutscher"
CW_Expansion_country.177.d:0 "Nach der Potsdamer Konferenz unterstanden die Gebiete östlich der Oder-Neiße-Linie offiziell Polen. Obwohl Artikel 8 des Potsdamer Abkommens vom 2. August 1945 vorschrieb, dass die „Bevölkerungsumsiedlung“ geordnet und human erfolgen und erst nach der Ausarbeitung eines vom Alliierten Kontrollrat genehmigten Vertreibungsplans beginnen sollte, wurden die Vertreibungen weiterhin regellos durchgeführt und waren mit zahlreichen kriminellen Handlungen verbunden."
CW_Expansion_country.177.a:1 "OK"
