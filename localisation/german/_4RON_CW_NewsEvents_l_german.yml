CW_Expansion_news.241.a:1 "OK"

CW_Expansion_country.242.t:0 "Kommunistische Aufständische töten britischen Kommandanten"
CW_Expansion_country.242.d:0 "Die Ermordung von Sir Henry Gurney ereignete sich am 7. Oktober 1951 auf dem Höhepunkt des Malayan Emergency. Gurney, der britische Hochkommissar in Malaya, wurde von Mitgliedern der Malayan Communist Party bei Meile 56 ½ der Kuala Kubu Road auf dem Weg zu einem Treffen nach Fraser&#39;s Hill getötet."
