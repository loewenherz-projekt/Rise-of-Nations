CW_Expansion_country.226.t:0 "Operation Gewächshaus"
CW_Expansion_country.226.d:0 "Operation Greenhouse war die fünfte amerikanische Atomtestserie. Die zweite fand 1951 statt und war die erste, die Prinzipien erprobte, die zur Entwicklung thermonuklearer Waffen (Wasserstoffbomben) führten. Die Tests wurden auf dem neuen Pacific Proving Ground auf den Inseln des Enewetak-Atolls durchgeführt. Alle Geräte wurden in großen Stahltürmen montiert, um Luftexplosionen zu simulieren. Dieser Serie von Atomwaffentests ging die Operation Ranger voraus, und ihr folgte die Operation Buster-Jangle."
CW_Expansion_country.226.a:1 "OK"
