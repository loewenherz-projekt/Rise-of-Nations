CW_Expansion_country.254.t:0 "Konrad Adenauer überlebt Attentat"
CW_Expansion_country.254.d:0 "Am 27. März 1952 explodierte im Münchner Polizeipräsidium ein an Bundeskanzler Adenauer adressiertes Paket und tötete den bayerischen Polizeibeamten Karl Reichert. Ermittlungen ergaben, dass der Drahtzieher des Attentats Menachem Begin war, der spätere israelische Ministerpräsident. Begin war Kommandeur der Irgun, leitete zu dieser Zeit die Herut und war Mitglied der Knesset. Sein Ziel war es, Druck auf die deutsche Regierung auszuüben und die Unterzeichnung des Reparationsabkommens zwischen Israel und der Bundesrepublik Deutschland zu verhindern, das er vehement ablehnte. Die westdeutsche Regierung hielt alle Beweise unter Verschluss, um antisemitische Reaktionen der deutschen Öffentlichkeit zu verhindern."
CW_Expansion_country.254.a:1 "OK"
