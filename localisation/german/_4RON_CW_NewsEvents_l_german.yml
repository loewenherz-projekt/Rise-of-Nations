CW_Expansion_country.103.t:0 "Hinrichtung von Nazi-Kriegsverbrechern"
CW_Expansion_country.103.d:0 "The Nuremberg executions took place on 16 October 1946, shortly after the conclusion of the Nuremberg Trials. Ten prominent members of the political and military leadership of Nazi Germany were executed by hanging: Hans Frank, Wilhelm Frick, Alfred Jodl, Ernst Kaltenbrunner, Wilhelm Keitel, Joachim von Ribbentrop, Alfred Rosenberg, Fritz Sauckel, Arthur Seyss-Inquart, and Julius Streicher. Hermann Göring was also scheduled to be hanged on that day, but committed suicide using a potassium cyanide capsule the night before. Martin Bormann was also sentenced to death in absentia; at the time his whereabouts were unknown, but it is now thought that he committed suicide or was killed by Soviet troops while attempting to escape Berlin on 2 May 1945. The sentences were carried out in the gymnasium of Nuremberg Prison by the United States Army using the standard drop method instead of long drop. The executioners were Master Sergeant John C. Woods and his assistant, military policeman Joseph Malta. Woods miscalculated the lengths for the ropes used for the executions, some alleging intentionally, such that some of the men did not die quickly of an intended broken neck but instead strangled to death slowly. Some reports indicated some executions took from 14 to 28 minutes. The Army denied claims that the drop length was too short or that the condemned died from strangulation instead of a broken neck. Additionally, the trapdoor was too small, such that several of the condemned suffered bleeding head injuries when they hit the sides of the trapdoor while dropping through. The bodies were rumored to have been taken to Dachau for cremation, but were in fact incinerated in a crematorium in Munich and the ashes scattered over the river Isar. Kingsbury Smith of the International News Service wrote an eyewitness account of the hangings. His account appeared with photos in newspapers."
CW_Expansion_country.103.a:1 "OK"
CW_Expansion_news.103.t:0 "Hinrichtung von Nazi-Kriegsverbrechern"
CW_Expansion_news.103.d:0 "Die Nürnberger Hinrichtungen fanden am 16. Oktober 1946, kurz nach Abschluss der Nürnberger Prozesse, statt. Zehn prominente Mitglieder der politischen und militärischen Führung Nazideutschlands wurden durch den Strang hingerichtet: Hans Frank, Wilhelm Frick, Alfred Jodl, Ernst Kaltenbrunner, Wilhelm Keitel, Joachim von Ribbentrop, Alfred Rosenberg, Fritz Sauckel, Arthur Seyß-Inquart und Julius Streicher. Auch Hermann Göring sollte an diesem Tag gehängt werden, beging jedoch in der Nacht zuvor Selbstmord mit einer Zyankalikapsel. Martin Bormann wurde ebenfalls in Abwesenheit zum Tode verurteilt; sein Aufenthaltsort war damals unbekannt, doch heute wird angenommen, dass er Selbstmord beging oder am 2. Mai 1945 bei einem Fluchtversuch aus Berlin von sowjetischen Truppen getötet wurde."
CW_Expansion_news.103.a:1 "OK"

CW_Expansion_country.104.t:0 "Griechischer Bürgerkrieg"
CW_Expansion_country.104.d:0 "Der Griechische Bürgerkrieg dauerte von 1943 bis 1949. Er richtete sich hauptsächlich gegen das etablierte Königreich Griechenland (unterstützt von Großbritannien und den USA). Das Königreich siegte schließlich. Die unterlegene Opposition wurde von der Kommunistischen Partei Griechenlands (KKE) und ihrem militärischen Arm, der Demokratischen Armee Griechenlands (DSE), sowie der Volksrepublik der Provisorischen Demokratischen Regierung regiert. Die Rebellen wurden von Jugoslawien und der UdSSR unterstützt. Der Krieg begann als Konflikt zwischen der kommunistisch dominierten linken Widerstandsorganisation EAM-ELAS und lose verbündeten antikommunistischen Widerstandskräften und eskalierte später zu einem großen Bürgerkrieg zwischen dem griechischen Staat und den Kommunisten. Die Kämpfe endeten mit der Niederlage der DSE durch die griechische Armee."
CW_Expansion_country.104.a:1 "OK"
CW_Expansion_news.104.t:0 "Griechischer Bürgerkrieg"
