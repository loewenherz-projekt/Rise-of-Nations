CW_Expansion_country.442.t:0 "Gründung der Europäischen Wirtschaftsgemeinschaft"
CW_Expansion_country.442.d:0 "Am 25. März 1957 unterzeichneten die sechs EGKS-Mitglieder die beiden Römischen Verträge zur Gründung der Europäischen Atomgemeinschaft (Euratom) – deren Ziel es war, die Zusammenarbeit bei der Entwicklung, Forschung und Nutzung der Atomenergie zu fördern – und der Europäischen Wirtschaftsgemeinschaft (EWG). Die EWG schuf einen gemeinsamen Markt, der die Beseitigung der meisten Handelshemmnisse für Waren, Dienstleistungen, Kapital und Arbeitskräfte, das Verbot staatlicher Maßnahmen oder privater Vereinbarungen, die den Wettbewerb behindern, sowie eine gemeinsame Agrarpolitik (GAP) und eine gemeinsame Außenhandelspolitik vorsah."
CW_Expansion_country.442.a:1 "OK"
