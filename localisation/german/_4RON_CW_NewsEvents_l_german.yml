CW_Expansion_country.363.t:0 "Gegenseitiger Verteidigungsvertrag zwischen den USA und Taiwan"
CW_Expansion_country.363.d:0 "Der Chinesisch-Amerikanische Verteidigungsvertrag (SAMDT), offiziell Verteidigungsvertrag zwischen den Vereinigten Staaten von Amerika und der Republik China, war ein Verteidigungspakt zwischen den Vereinigten Staaten und der Republik China (Taiwan), der von 1955 bis 1980 in Kraft war. Ziel war es, die Insel Taiwan vor einer Invasion der Volksrepublik China zu schützen. Nach dem Scheitern des Rechtsstreits Goldwater gegen Carter wurden einige seiner Inhalte in den Taiwan Relations Act von 1979 übernommen."
CW_Expansion_country.363.a:1 "OK"
