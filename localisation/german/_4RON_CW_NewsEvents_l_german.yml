CW_Expansion_country.158.t:0 "Nationalistische Regierung schließt Rückzug aus Taiwan ab"
CW_Expansion_country.158.d:0 "Der Rückzug der Regierung der Republik China nach Taiwan, auch bekannt als Rückzug der Kuomintang nach Taiwan oder Großer Rückzug aus Taiwan, bezeichnet den Exodus der Überreste der international anerkannten Kuomintang-Regierung der Republik China (ROC) auf die Insel Taiwan (Formosa) am 7. Dezember 1949 nach der Niederlage im chinesischen Bürgerkrieg auf dem chinesischen Festland. An dem Rückzug nahmen die Kuomintang (Nationalistische Partei Chinas), ihre Offiziere und etwa zwei Millionen Soldaten der ROC teil, neben zahlreichen Zivilisten und Flüchtlingen, die vor dem Vormarsch der Volksbefreiungsarmee der Kommunistischen Partei Chinas (KPCh) flohen."
CW_Expansion_country.158.a:1 "OK"
