CW_Expansion_country.354.t:0 "Südostasien-Vertragsorganisation"
CW_Expansion_country.354.d:0 "Die Southeast Asia Treaty Organization (SEATO) war eine internationale Organisation zur kollektiven Verteidigung in Südostasien. Sie wurde durch den im September 1954 in Manila (Philippinen) unterzeichneten Vertrag zur kollektiven Verteidigung Südostasiens (Manila-Pakt) gegründet. Die formelle Gründung der SEATO erfolgte am 19. Februar 1955 bei einem Treffen der Vertragspartner in Bangkok (Thailand). Der Hauptsitz der Organisation befand sich ebenfalls in Bangkok. Acht Mitglieder traten der Organisation bei. SEATO wurde in erster Linie gegründet, um weitere kommunistische Eroberungen in Südostasien zu verhindern. Sie gilt allgemein als gescheitert, da interne Konflikte und Streitigkeiten den Einsatz des Militärs der SEATO behinderten. Die von der SEATO finanzierten Kultur- und Bildungsprogramme hinterließen jedoch nachhaltige Auswirkungen in Südostasien. SEATO wurde am 30. Juni 1977 aufgelöst, nachdem viele Mitglieder das Interesse verloren und ausgetreten waren."
CW_Expansion_country.354.a:1 "OK"
