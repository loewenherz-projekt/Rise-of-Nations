CW_Expansion_country.485.t:0 "Australopithecus erstmals entdeckt"
CW_Expansion_country.485.d:0 "Als Mary Leakey 1959 in der Olduvai-Schlucht in Tansania einen fast vollständigen Schädel entdeckte, war dies der erste Nachweis eines robusten Australopithecus in Ostafrika. Das Fossil wurde auf 1,8 Millionen Jahre datiert und war der erste afrikanische Hominine, dessen Alter durch Argonanalyse genau bestimmt werden konnte. Mit seinem südafrikanischen Cousin hat er die beiden Kauspezialitäten gemeinsam. Das Olduvai-Exemplar, auch „Nussknackermensch“ genannt, wird seiner eigenen Art zugeordnet, A. boisei, die auf 2,3 bis 1,3 Millionen Jahre datiert und an mehreren Fundorten in Kenia und Äthiopien identifiziert wurde. Aufgrund der stark übertriebenen Kaumerkmale bei A. boisei wird er gelegentlich als „hyperrobust“ bezeichnet. Er lebte zur gleichen Zeit wie Arten des frühen Homo, es gibt jedoch Hinweise darauf, dass Homo und A. boisei unterschiedliche Lebensräume bevorzugten. Trotz seines enormen Kauapparates hatte er einen relativ kleinen Körper: Die Männchen wogen etwa 49 kg (108 Pfund) und die Weibchen 34 kg (75 Pfund). Fossilien von A. robustus und A. boisei wurden bei Säugetieren gefunden, die normalerweise in trockenen Graslandschaften vorkommen. Studien zur Untersuchung der Kohlenstoffisotopenverhältnisse im Zahnschmelz legen nahe, dass A. boisei ein Grasfresser war."
CW_Expansion_country.485.a:1 "OK"
CW_Expansion_news.485.t:0 "Australopithecus erstmals entdeckt"
CW_Expansion_news.485.d:0 "Als Mary Leakey 1959 in der Olduvai-Schlucht in Tansania einen fast vollständigen Schädel entdeckte, wurde erstmals die Existenz eines robusten Australopithecus in Ostafrika nachgewiesen. Das Fossil wurde auf 1,8 Millionen Jahre datiert und war der erste afrikanische Hominine, dessen Alter durch Argonanalyse genau bestimmt werden konnte. Mit seinem südafrikanischen Cousin hat er die beiden Kauspezialitäten gemeinsam. Das Olduvai-Exemplar, auch „Nussknackermensch“ genannt, wird seiner eigenen Art zugeordnet, A. boisei, die auf 2,3 bis 1,3 Millionen Jahre datiert und an mehreren Fundorten in Kenia und Äthiopien identifiziert wurde. Aufgrund der stark übertriebenen Kaumerkmale bei A. boisei wird er gelegentlich als „hyperrobust“ bezeichnet. Er lebte zur gleichen Zeit wie Arten des frühen Homo, es gibt jedoch Hinweise darauf, dass Homo und A. boisei unterschiedliche Lebensräume bevorzugten. Trotz seines enormen Kauapparates hatte er einen relativ kleinen Körper: Die Männchen wogen etwa 49 kg (108 Pfund) und die Weibchen 34 kg (75 Pfund). Fossilien von A. robustus und A. boisei wurden bei Säugetieren gefunden, die normalerweise in trockenen Graslandschaften vorkommen. Studien zur Untersuchung der Kohlenstoffisotopenverhältnisse im Zahnschmelz legen nahe, dass A. boisei ein Grasfresser war."
CW_Expansion_news.485.a:1 "OK"

CW_Expansion_country.486.t:0 "Explosion in Roseburg"
CW_Expansion_country.486.d:0 "In den frühen Morgenstunden des 7. August 1959 entzündete ein Feuer bei der Gerretsen Building Supply Company einen in der angrenzenden Straße geparkten Lastwagen. Der Lastwagen hatte zwei Tonnen Dynamit und viereinhalb Tonnen Ammoniumnitrat geladen. Die darauf folgende Explosion machte acht Häuserblocks dem Erdboden gleich. Die Explosion hinterließ einen Krater mit einem Durchmesser von 16 Metern und einer Tiefe von 3,6 Metern. 300 Geschäfte im Umkreis von 30 Häuserblocks wurden durch die Explosion beschädigt. 72 dieser Geschäfte wurden für baufällig erklärt, was zu umfangreichen Reparatur- und Renovierungsarbeiten führte. Zwölf Gebäude außerhalb des Umkreises von acht Häuserblocks wurden abgerissen. Das Gesicht von Roseburg veränderte sich schlagartig für immer. Die Explosion wurde schließlich allgemein als „Die Explosion“ bekannt."
CW_Expansion_country.486.a:1 "OK"
