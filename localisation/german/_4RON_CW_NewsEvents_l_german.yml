CW_Expansion_country.400.t:0 "Anglo-ägyptisches Kondominium endet im Sudan"
CW_Expansion_country.400.d:0 "Anglo-Ägyptisches Kondominium: Die gemeinsame britisch-ägyptische Regierung regierte den Ostsudan von 1899 bis 1955. Es wurde durch die Anglo-Ägyptischen Kondominiumsabkommen vom 19. Januar und 10. Juli 1899 gegründet und bestand, mit einigen späteren Modifikationen, bis zur Gründung der souveränen, unabhängigen Republik Sudan am 1. Januar 1956. (Das Anglo-Ägyptische Abkommen von 1953 hatte die Schritte zur sudanesischen Selbstverwaltung und Selbstbestimmung dargelegt.)"
CW_Expansion_country.400.a:1 "OK"
