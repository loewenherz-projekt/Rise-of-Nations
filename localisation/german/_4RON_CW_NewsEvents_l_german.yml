CW_Expansion_news.115.a:1 "OK"

CW_Expansion_country.116.t:0 "Paul I. zum König von Griechenland gekrönt"
CW_Expansion_country.116.d:0 "Paul kehrte 1946 nach Griechenland zurück. Nach dem Tod seines kinderlosen älteren Bruders, König Georg II., während des griechischen Bürgerkriegs bestieg er 1947 den Thron. 1947 konnte er nicht an der Hochzeit seines Cousins, Prinz Philip, Herzog von Edinburgh, mit der späteren Königin Elisabeth II. des Vereinigten Königreichs teilnehmen, da er an Typhus litt."
CW_Expansion_country.116.a:1 "OK"
CW_Expansion_news.116.t:0 "Paul I. zum König von Griechenland gekrönt"
CW_Expansion_news.116.d:0 "Paul kehrte 1946 nach Griechenland zurück. Nach dem Tod seines kinderlosen älteren Bruders, König Georg II., während des griechischen Bürgerkriegs bestieg er 1947 den Thron. 1947 konnte er nicht an der Hochzeit seines Cousins, Prinz Philip, Herzog von Edinburgh, mit der späteren Königin Elisabeth II. des Vereinigten Königreichs teilnehmen, da er an Typhus litt."
CW_Expansion_news.116.a:1 "OK"

CW_Expansion_country.117.t:0 "Arabische Baath-Partei gegründet"
CW_Expansion_country.117.d:0 "Die Arabische Sozialistische Baʿath-Partei war eine politische Partei, die in Syrien von Mischel ʿAflaq, Ṣalāḥ al-Dīn al-Bītār und Gefährten von Zaki al-ʾArsūzī gegründet wurde. Die Partei vertrat den Baʿathismus, eine Ideologie, die arabischen Nationalismus, Panarabismus, arabischen Sozialismus und antiimperialistische Interessen vereint. Der Baʿathismus fordert die Vereinigung der arabischen Welt zu einem einzigen Staat. Sein Motto „Einheit, Freiheit, Sozialismus“ bezieht sich auf die arabische Einheit und die Freiheit von nicht-arabischer Kontrolle und Einmischung."
CW_Expansion_country.117.a:1 "OK"
