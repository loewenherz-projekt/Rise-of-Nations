CW_Expansion_country.337.t:0 "Konferenz über Korea und Indochina"
CW_Expansion_country.337.d:0 "Die Genfer Konferenz, die die noch offenen Fragen des Koreakriegs und des Ersten Indochinakriegs regeln sollte, war eine Konferenz mehrerer Nationen, die vom 26. April bis 20. Juli 1954 in Genf (Schweiz) stattfand. Der Teil der Konferenz, der sich mit der Koreafrage befasste, endete ohne die Annahme von Erklärungen oder Vorschlägen und wird daher allgemein als weniger relevant angesehen. Die Genfer Abkommen, die die Zerschlagung Französisch-Indochinas behandelten, erwiesen sich jedoch als lang anhaltende Folgen. Der Zerfall des französischen Kolonialreichs in Südostasien führte zur Gründung der Staaten Demokratische Republik Vietnam (Nordvietnam), Staat Vietnam (die spätere Republik Vietnam, Südvietnam), Königreich Kambodscha und Königreich Laos."
CW_Expansion_country.337.a:1 "OK"
