CW_Expansion_country.408.t:0 "Manaslu Erstbesteigung"
CW_Expansion_country.408.d:0 "Mit 8.163 Metern (26.781 Fuß) über dem Meeresspiegel ist der Manaslu der achthöchste Berg der Welt. Er liegt im Mansiri Himal, einem Teil des nepalesischen Himalaya im zentralen Westnepal. Der Name Manaslu bedeutet „Berg des Geistes“ und leitet sich vom Sanskrit-Wort manasa ab, das „Intellekt“ oder „Seele“ bedeutet. Der Manaslu wurde erstmals am 9. Mai 1956 von Toshio Imanishi und Gyalzen Norbu, Mitgliedern einer japanischen Expedition, bestiegen. Angesichts der vielen erfolglosen Versuche der Briten, den Everest vor dem Neuseeländer Edmund Hillary zu besteigen, heißt es: „So wie die Briten den Everest als ihren Berg betrachten, war der Manaslu schon immer ein japanischer Berg.“"
CW_Expansion_country.408.a:1 "OK"
