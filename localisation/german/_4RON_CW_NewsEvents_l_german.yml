CW_Expansion_country.389.t:0 "Black Emmet Till Lynched"
CW_Expansion_country.389.d:0 "Als Roy Bryant über den Vorfall informiert wurde, befragte er mehrere junge Schwarze, die den Laden betraten, energisch. Am Abend näherte sich Bryant zusammen mit einem Schwarzen namens JW Washington einem schwarzen Teenager, der die Straße entlangging. Bryant befahl Washington, den Jungen festzunehmen, ihn auf die Ladefläche eines Kleinlasters zu setzen und ihn einer Begleiterin von Carolyn zu zeigen, die den Vorfall mit Till beobachtet hatte. Freunde oder Eltern bürgten für den Jungen in Bryants Laden, und Carolyns Begleiterin bestritt, dass der Junge, den Bryant und Washington festgenommen hatten, derjenige war, der sie angegriffen hatte. Irgendwie fand Bryant heraus, dass der Junge aus Chicago stammte und bei Mose Wright wohnte. Mehrere Zeugen belauschten, wie Bryant und sein 36-jähriger Halbbruder John William „JW“ Milam darüber sprachen, Till aus seinem Haus zu holen."
CW_Expansion_country.389.a:1 "OK"
