CW_Expansion_country.157.t:0 "Ende des griechischen Bürgerkriegs"
CW_Expansion_country.157.d:0 "Der Bürgerkrieg hinterließ Griechenland in Trümmern und geriet in noch größere wirtschaftliche Not als nach dem Ende der deutschen Besatzung. Darüber hinaus spaltete er das griechische Volk in den folgenden Jahrzehnten, wobei beide Seiten ihre Gegner verunglimpften. Tausende saßen viele Jahre im Gefängnis oder wurden ins interne Exil auf die Inseln Gyaros und Makronisos geschickt. Viele andere suchten Zuflucht in kommunistischen Ländern oder wanderten nach Australien, Deutschland, in die USA, das Vereinigte Königreich, Kanada und anderswo aus. Die Polarisierung und Instabilität der griechischen Politik Mitte der 1960er Jahre war eine direkte Folge des Bürgerkriegs und der tiefen Kluft zwischen den linken und rechten Teilen der griechischen Gesellschaft. Eine große Krise infolgedessen war die Ermordung des linken Politikers Gregoris Lambrakis im Jahr 1963, die als Inspiration für den Politthriller Z von Costa Gavras diente. 1965 folgte die Krise der Apostasia, zusammen mit der „ASPIDA-Affäre“, in deren Rahmen eine Gruppe linker Offiziere einen Putsch geplant hatte. der mutmaßliche Anführer der Gruppe war Andreas Papandreou, Sohn von George Papandreou, dem Vorsitzenden der politischen Partei Zentrumsunion und damaligen Premierminister des Landes."
CW_Expansion_country.157.a:1 "OK"
