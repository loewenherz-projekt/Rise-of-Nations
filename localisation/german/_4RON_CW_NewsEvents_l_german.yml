CW_Expansion_country.395.t:0 "Schauspieler James Dean bei Autounfall getötet"
CW_Expansion_country.395.d:0 "Der Hollywood-Schauspieler James Dean kam am 30. September 1955 im Alter von 24 Jahren bei einem Autounfall in der Nähe von Cholame, Kalifornien, ums Leben. Er hatte zuvor an mehreren Autorennen teilgenommen und war auf dem Weg zu einem Sportwagenrennen, als er an der Kreuzung der California State Route 46 (ehemals 466) und der California State Route 41 einen Unfall hatte."
CW_Expansion_country.395.a:1 "OK"
CW_Expansion_news.395.t:0 "Schauspieler James Dean bei Autounfall getötet"
CW_Expansion_news.395.d:0 "Der Hollywood-Schauspieler James Dean kam am 30. September 1955 im Alter von 24 Jahren bei einem Autounfall in der Nähe von Cholame, Kalifornien, ums Leben. Er hatte zuvor an mehreren Autorennen teilgenommen und war auf dem Weg zu einem Sportwagenrennen, als er an der Kreuzung der California State Route 46 (ehemals 466) und der California State Route 41 mit seinem Auto verunglückte."
