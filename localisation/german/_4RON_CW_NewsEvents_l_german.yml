CW_Expansion_country.148.t:0 "Armee in Costa Rica abgeschafft"
CW_Expansion_country.148.d:0 "Costa Rica war 1949 das erste Land der Welt, das die Armee abgeschafft hat. Diese Entscheidung verlieh dem zivilisierten politischen Leben Costa Ricas institutionelle Stärke. Auf internationaler Ebene markierte die Abschaffung der Armee eine neue Erfahrung für die Diplomatie, die pazifistischen Willen und Glaubwürdigkeit in der Welt bewies und zeigte, dass ein Land ohne Armee, ohne Streitkräfte leben und diese Ressourcen in eine stärkere und bessere soziale Entwicklung investieren kann. Sie beweist, dass ein Staat freiwillig entwaffnet werden kann, um eine bessere Verteilung des Reichtums zu erreichen, indem er der Entwicklung sozialer Aspekte wie Gesundheit und Bildung Vorrang vor Investitionen in Waffen einräumt und zu einer gerechteren, stabileren und entwickelten Bevölkerung beiträgt."
