CW_Expansion_country.444.t:0 "Hurrikan Audrey verwüstet Louisiana"
CW_Expansion_country.444.d:0 "Hurrikan Audrey war einer der tödlichsten tropischen Wirbelstürme in der Geschichte der USA. Bei seiner Verwüstung der Südwestküste Louisianas im Jahr 1957 tötete er mindestens 416 Menschen. Zusammen mit Hurrikan Alex im Jahr 2010 war er auch der stärkste jemals im Atlantikbecken registrierte Juni-Hurrikan (gemessen am Druck). Der sich rasch entwickelnde Sturm traf den Südwesten Louisianas als intensiver Hurrikan der Kategorie 3 und verwüstete Küstengemeinden mit einer gewaltigen Sturmflut, die bis zu 32 Kilometer ins Landesinnere vordrang. Audrey war der erste benannte Sturm und Hurrikan der Hurrikansaison 1957. Er entstand am 24. Juni aus einer tropischen Welle, die in die Bucht von Campeche zog. Da die Bedingungen für eine tropische Entwicklung ideal waren, verstärkte sich Audrey schnell und erreichte einen Tag später die Stärke eines Hurrikans. Auf seinem Weg nach Norden verstärkte und beschleunigte er sich weiter, als er sich der Golfküste der Vereinigten Staaten näherte. Am 27. Juni erreichte der Hurrikan anhaltende Spitzenwindgeschwindigkeiten von 205 km/h und wurde damit zu einem schweren Hurrikan. Zu diesem Zeitpunkt hatte Audrey einen minimalen Luftdruck von 946 mbar (hPa; 27,91 inHg). Später am selben Tag traf der Hurrikan mit gleicher Intensität zwischen der Mündung des Sabine River und Cameron, Louisiana, auf Land und richtete in der gesamten Region beispiellose Zerstörungen an. Im Landesinneren schwächte sich Audrey ab und wurde am 29. Juni über West Virginia außertropisch. Audrey war der erste schwere Hurrikan, der sich seit 1945 im Golf von Mexiko gebildet hatte."
CW_Expansion_country.444.a:1 "OK"
CW_Expansion_news.444.t:0 "Hurrikan Audrey verwüstet Louisiana"
CW_Expansion_news.444.d:0 "Hurrikan Audrey war einer der tödlichsten tropischen Wirbelstürme in der Geschichte der USA. Bei seiner Verwüstung der Südwestküste Louisianas im Jahr 1957 tötete er mindestens 416 Menschen. Zusammen mit Hurrikan Alex im Jahr 2010 war er auch der stärkste jemals im Atlantikbecken registrierte Juni-Hurrikan (gemessen am Druck). Der sich rasch entwickelnde Sturm traf den Südwesten Louisianas als intensiver Hurrikan der Kategorie 3 und verwüstete Küstengemeinden mit einer gewaltigen Sturmflut, die bis zu 32 Kilometer ins Landesinnere vordrang. Audrey war der erste benannte Sturm und Hurrikan der Hurrikansaison 1957. Er entstand am 24. Juni aus einer tropischen Welle, die in die Bucht von Campeche zog. Da die Bedingungen für eine tropische Entwicklung ideal waren, verstärkte sich Audrey schnell und erreichte einen Tag später die Stärke eines Hurrikans. Auf seinem Weg nach Norden verstärkte und beschleunigte er sich weiter, als er sich der Golfküste der Vereinigten Staaten näherte. Am 27. Juni erreichte der Hurrikan anhaltende Spitzenwindgeschwindigkeiten von 205 km/h und wurde damit zu einem schweren Hurrikan. Zu diesem Zeitpunkt hatte Audrey einen minimalen Luftdruck von 946 mbar (hPa; 27,91 inHg). Später am selben Tag traf der Hurrikan mit gleicher Intensität zwischen der Mündung des Sabine River und Cameron, Louisiana, auf Land und richtete in der gesamten Region beispiellose Zerstörungen an. Im Landesinneren schwächte sich Audrey ab und wurde am 29. Juni über West Virginia außertropisch. Audrey war der erste schwere Hurrikan, der sich seit 1945 im Golf von Mexiko gebildet hatte."
CW_Expansion_news.444.a:1 "OK"

CW_Expansion_country.445.t:0 "Bürgerrechtsgesetz von 1957"
CW_Expansion_country.445.d:0 "Der Civil Rights Act von 1957 war das erste Bundesgesetz zu Bürgerrechten, das vom US-Kongress seit dem Civil Rights Act von 1875 verabschiedet wurde. Der Gesetzentwurf wurde vom 85. US-Kongress verabschiedet und am 9. September 1957 von Präsident [USA.GetLeader] in Kraft gesetzt."
