CW_Expansion_country.93.t:0 "Jüdische Rächer vergiften SS-Häftlinge"
CW_Expansion_country.93.d:0 "1946 beschloss Nakam, ein von den Amerikanern geführtes Lager, Stalag 13 in Nürnberg, zu vergiften. Doch kürzlich freigegebene US-Militärdokumente geben ein riesiges Rätsel über Nakams gewagteste Operation preis. Es gelang ihnen, einen Aktivisten in die Bäckerei einzuschleusen, und eines Nachts gelang es ihnen, das Brot für die folgenden Tage für das Lager mehrere Stunden lang mit einer ihrer Berechnungen nach tödlichen Dosis Arsen zu bestreichen. Tatsächlich zeigen die US-Dokumente nach Analyse, dass ihre Berechnungen richtig waren und dass das Brot die 3.000 Insassen von Stalag 13 hätte töten müssen. Tatsächlich verwendeten sie genug Arsen, um Zehntausende zu töten. Stattdessen erkrankten die meisten von ihnen in unterschiedlichem Ausmaß. Abgesehen von starken Schmerzen und Beschwerden sowie in einigen Fällen bleibenden Schäden zeigen die neu veröffentlichten Dokumente, dass es trotz früherer Behauptungen keine Todesopfer gab. Warum die Gefangenen überlebten, ist unbekannt. möglicherweise hatte ein frühes Opfer die anderen alarmiert und nicht genug Brot gegessen, um eine tödliche Dosis zu erzeugen. Doch trotz Nakams größter Bemühungen wurde der Plan vereitelt und sie mussten fliehen. Die Gruppe ließ sich in Israel nieder und setzte ihre Aktivitäten in der ganzen Welt für das folgende Jahrzehnt oder länger fort."
CW_Expansion_country.93.a:1 "OK"
CW_Expansion_news.93.t:0 "Jüdische Rächer vergiften SS-Häftlinge"
CW_Expansion_news.93.d:0 "1946 beschloss Nakam, ein von den Amerikanern geführtes Lager, Stalag 13 in Nürnberg, zu vergiften. Doch kürzlich freigegebene US-Militärdokumente geben ein riesiges Mysterium über Nakams gewagteste Operation preis. Es gelang ihnen, einen Aktivisten in die Bäckerei einzuschleusen, und eines Nachts gelang es ihnen, über mehrere Stunden das Brot für das Lager für die folgenden Tage mit einer ihrer Berechnung nach tödlichen Dosis Arsen zu bestreichen. Tatsächlich belegen die US-Dokumente nach Analyse, dass ihre Berechnungen richtig waren und das Brot die 3.000 Insassen von Stalag 13 hätte töten müssen. Tatsächlich verwendeten sie genug Arsen, um Zehntausende zu töten. Stattdessen erkrankten die meisten von ihnen in unterschiedlichem Ausmaß. Abgesehen von starken Schmerzen und Beschwerden sowie in einigen Fällen bleibenden Schäden belegen die neu veröffentlichten Dokumente, dass es trotz früherer Behauptungen keine Todesopfer gab."
CW_Expansion_news.93.a:1 "OK"

CW_Expansion_country.94.t:0 "Eröffnungssitzung des Internationalen Gerichtshofs"
CW_Expansion_country.94.d:0 "Die Schaffung des Gerichtshofs markierte den Höhepunkt eines langen Prozesses der Entwicklung von Methoden zur friedlichen Beilegung internationaler Streitigkeiten, dessen Ursprünge bis in die Antike zurückreichen. Artikel 33 der Charta der Vereinten Nationen nennt folgende Methoden zur friedlichen Beilegung von Streitigkeiten zwischen Staaten: Verhandlung, Untersuchung, Mediation, Schlichtung, Schiedsverfahren, gerichtliche Beilegung und Inanspruchnahme regionaler Einrichtungen oder Vereinbarungen, zu denen auch die Vermittlung guter Dienste hinzuzurechnen ist. Einige dieser Methoden beziehen die Dienste Dritter ein. So versetzt beispielsweise die Mediation die Streitparteien in die Lage, ihren Streit dank der Intervention Dritter selbst beizulegen. Ein Schiedsverfahren geht noch weiter, indem der Streit einem unparteiischen Dritten zur Entscheidung oder zum Schiedsspruch vorgelegt wird, sodass eine verbindliche Beilegung erreicht werden kann. Dasselbe gilt für die gerichtliche Beilegung (die vom Internationalen Gerichtshof angewandte Methode), mit der Ausnahme, dass ein Gericht, insbesondere in Verfahrensfragen, strengeren Regeln unterliegt als ein Schiedsgericht."
CW_Expansion_country.94.a:1 "OK"
CW_Expansion_news.94.t:0 "Eröffnungssitzung des Internationalen Gerichtshofs"
CW_Expansion_news.94.d:0 "Die Schaffung des Gerichtshofs markierte den Höhepunkt eines langen Prozesses der Entwicklung von Methoden zur friedlichen Beilegung internationaler Streitigkeiten, dessen Ursprünge bis in die Antike zurückreichen. Artikel 33 der Charta der Vereinten Nationen nennt folgende Methoden zur friedlichen Beilegung von Streitigkeiten zwischen Staaten: Verhandlung, Untersuchung, Mediation, Schlichtung, Schiedsverfahren, gerichtliche Beilegung und die Inanspruchnahme regionaler Einrichtungen oder Vereinbarungen, zu denen auch die Guten Dienste zählen. Einige dieser Methoden beziehen die Dienste Dritter ein. So versetzt beispielsweise die Mediation die Streitparteien dank der Intervention Dritter in die Lage, ihren Streit selbst beizulegen."
CW_Expansion_news.94.a:1 "OK"

CW_Expansion_country.95.t:0 "Gründung von Sony"
CW_Expansion_country.95.d:0 "Im September 1945, nach dem Ende des Zweiten Weltkriegs, eröffnete Masaru Ibuka im bombengeschädigten Kaufhausgebäude Shirokiya im Tokioter Stadtteil Nihonbashi eine Radioreparaturwerkstatt. Im darauffolgenden Jahr schloss sich ihm sein Forschungskollege Akio Morita aus Kriegszeiten an, und am 7. Mai 1946 gründeten sie die Firma Tokyo Tsushin Kogyo KK (Tokyo Telecommunications Engineering Corporation). Das Unternehmen produzierte Japans erstes Tonbandgerät, den Typ G."
CW_Expansion_country.95.a:1 "OK"
