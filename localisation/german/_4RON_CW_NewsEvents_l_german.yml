CW_Expansion_country.182.t:0 "Erstes Formel-1-Rennen"
CW_Expansion_country.182.d:0 "Die Formel-1-Saison 1950 war die vierte Saison des FIA-Formel-1-Rennsports. Sie umfasste die erste FIA-Fahrerweltmeisterschaft, die am 13. Mai begann und am 3. September endete, sowie eine Reihe von Nicht-Meisterschaftsrennen. Die Meisterschaft bestand aus sechs Grand-Prix-Rennen, die jeweils in Europa ausgetragen wurden und für Formel-1-Fahrzeuge offen waren, sowie dem Indianapolis 500, das nach den Regeln der AAA National Championship gefahren wurde. Giuseppe Farina gewann die Meisterschaft vor Juan Manuel Fangio und Luigi Fagioli."
CW_Expansion_country.182.a:1 "OK"
