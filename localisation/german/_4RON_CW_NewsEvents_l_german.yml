CW_Expansion_country.137.t:0 "ABC startet Fernsehdienste"
CW_Expansion_country.137.d:0 "Am 19. April 1948 begann ABC Television Network mit der Ausstrahlung seiner ersten Hauptsendung, WFIL-TV in Philadelphia. Die erste Sendung war „On The Corner“ mit Moderator Henry Morgan, der auch der Name seiner Radiosendung im ABC Blue Network war. Bis zur Übernahme durch WJZ-TV im August wurden ABC-Programme in New York von Dumonts WABD ausgestrahlt. Weitere Sender, die die erste Sendung ausstrahlten, waren WMAR-TV in Baltimore und WMAL-TV in Washington, D.C."
CW_Expansion_country.137.a:1 "OK"
