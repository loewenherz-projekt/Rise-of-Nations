CW_Expansion_country.373.t:0 "Taekwondo offiziell anerkannt"
CW_Expansion_country.373.d:0 "Der eigentliche Name Taekwondo wurde erst 1955 offiziell. Damals organisierte der koreanische General Hong Hi Choi eine Bewegung zur Vereinigung der verschiedenen koreanischen Kampfkunststile und legte einem eigens dafür gebildeten Komitee den Namen „Taekwondo“ vor. Am 11. April 1955 wurde Taekwondo als Name für die neu vereinheitlichte, offiziell anerkannte koreanische Kampfkunst anerkannt."
CW_Expansion_country.373.a:1 "OK"
