CW_Expansion_country.489.t:0 "Ceylons Premierminister WRD Bandaraike ermordet"
CW_Expansion_country.489.d:0 "SWRD Bandaranaike, der vierte Premierminister Ceylons (heute Sri Lanka), wurde am 25. September 1959 während einer öffentlichen Veranstaltung in seiner Privatresidenz Tintagel am Rosmead Place in Colombo vom buddhistischen Priester Talduwe Somarama Thero ermordet. Bandaranaike erlitt Schüsse in Brust, Bauch und Hand und starb am folgenden Tag in der Merchant&#39;s Ward des Colombo General Hospital. Er war der erste sri-lankische Staatschef, der ermordet wurde. Seine Witwe Sirima Ratwatte Dias Bandaranaike wurde daraufhin die erste Premierministerin der Welt."
CW_Expansion_country.489.a:1 "OK"
