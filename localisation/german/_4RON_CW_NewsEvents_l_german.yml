CW_Expansion_country.202.t:0 "Westdeutschland führt Säuberungen kommunistischer Funktionäre durch"
CW_Expansion_country.202.d:0 "Als Ideologie mit integrativer und brückender Funktion war der Antikommunismus für die innenpolitische Entwicklung Westdeutschlands in den ersten anderthalb Jahrzehnten nach dem Krieg von Bedeutung. Er prägte die Identität der jungen Nation und ihre antitotalitäre Ausrichtung. Die Gründer der Bundesrepublik, denen die innere Konsolidierung von besonderer Bedeutung war, betrachteten den Antikommunismus als parteiübergreifenden sozialen Kitt, der über Klassengrenzen hinweg alle ansprechen konnte, vom Arbeiter bis zum Direktor, vom Sozialdemokraten bis zur extremen Rechten. Er erwies sich als „politischer Kitt für die noch instabile Demokratie“. Nicht zuletzt eröffnete sein übergreifender antikommunistischer Konsens der westdeutschen Nachkriegsgesellschaft auch mehr Spielraum für die Aufarbeitung des NS-Erbes. Der Antitotalitarismus – der sich speziell gegen den Kommunismus richtete – wurde Teil der neuen westdeutschen Staatsräson und ein Mittel, die Zugehörigkeit der neuen Republik zur westlichen Wertegemeinschaft zu demonstrieren. Es half Westdeutschland auch, einen klaren Bruch mit dem nationalsozialistischen Regime zu vollziehen und seine NS-Vergangenheit zumindest teilweise für eine gewisse Zeit abzuschütteln. Der Antikommunismus war auch von zentraler Bedeutung für die politische Integration ehemaliger Nazi-Eliten."
CW_Expansion_country.202.a:1 "OK"
CW_Expansion_news.202.t:0 "Westdeutschland führt Säuberungen kommunistischer Funktionäre durch"
CW_Expansion_news.202.d:0 "Als Ideologie mit integrativen und brückenbildenden Funktionen war der Antikommunismus für die innenpolitische Entwicklung Westdeutschlands in den ersten anderthalb Jahrzehnten nach dem Krieg von Bedeutung. Er prägte die Identität der jungen Nation und ihre antitotalitäre Ausrichtung. Die Gründer der Bundesrepublik, denen die innenpolitische Konsolidierung besonders am Herzen lag, betrachteten den Antikommunismus als parteiübergreifenden sozialen Kitt, der über Klassengrenzen hinweg alle ansprechen konnte, vom Arbeiter bis zum Direktor, vom Sozialdemokraten bis zur extremen Rechten. Er erwies sich als „politischer Kitt für die noch instabile Demokratie“. Nicht zuletzt eröffnete sein übergreifender antikommunistischer Konsens der westdeutschen Nachkriegsgesellschaft auch mehr Spielraum für die Aufarbeitung des NS-Erbes. Der Antitotalitarismus – der sich speziell gegen den Kommunismus richtete – wurde Teil der neuen westdeutschen Staatsräson und ein Mittel, die Zugehörigkeit der neuen Republik zur westlichen Wertegemeinschaft zu demonstrieren. Es half Westdeutschland auch, einen klaren Bruch mit dem nationalsozialistischen Regime zu vollziehen und seine NS-Vergangenheit zumindest teilweise für eine gewisse Zeit abzuschütteln. Der Antikommunismus war auch von zentraler Bedeutung für die politische Integration ehemaliger Nazi-Eliten."
CW_Expansion_news.202.a:1 "OK"

CW_Expansion_country.203.t:0 "Schlacht am Nam-Fluss"
CW_Expansion_country.203.d:0 "Die Schlacht am Nam-Fluss war ein Gefecht zwischen dem Kommando der Vereinten Nationen (UN) und nordkoreanischen Streitkräften zu Beginn des Koreakrieges vom 31. August bis 19. September 1950 in der Nähe der Flüsse Nam und Naktong in Südkorea."
