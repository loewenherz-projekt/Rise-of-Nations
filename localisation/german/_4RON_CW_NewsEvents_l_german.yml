CW_Expansion_country.281.t:0 "Nordischer Rat eröffnet"
CW_Expansion_country.281.d:0 "Der Nordische Rat ist das offizielle Gremium für die formelle interparlamentarische Zusammenarbeit der nordischen Länder. Er wurde 1952 gegründet und verfügt über 87 Vertreter aus Dänemark, Finnland, Island, Norwegen und Schweden sowie aus den autonomen Gebieten Färöer, Grönland und Åland. Die Vertreter sind Abgeordnete in ihren jeweiligen Ländern oder Gebieten und werden von diesen Parlamenten gewählt. Der Rat hält jedes Jahr im Oktober/November eine ordentliche Tagung ab und normalerweise eine zusätzliche Tagung pro Jahr zu einem bestimmten Thema. Die offiziellen Sprachen des Rates sind Dänisch, Finnisch, Isländisch, Norwegisch und Schwedisch, obwohl er nur die gegenseitig verständlichen skandinavischen Sprachen – Dänisch, Norwegisch und Schwedisch – als Arbeitssprachen verwendet. Diese drei Sprachen sind die Muttersprache von etwa 80 % der Bevölkerung der Region und werden von den restlichen 20 % als Zweit- oder Fremdsprache gelernt."
CW_Expansion_country.281.a:1 "OK"
CW_Expansion_news.281.t:0 "Nordischer Rat eröffnet"
CW_Expansion_news.281.d:0 "Der Nordische Rat ist das offizielle Gremium für die formelle interparlamentarische Zusammenarbeit der nordischen Länder. Er wurde 1952 gegründet und verfügt über 87 Vertreter aus Dänemark, Finnland, Island, Norwegen und Schweden sowie aus den autonomen Gebieten Färöer, Grönland und Åland. Die Vertreter sind Parlamentsabgeordnete in ihren jeweiligen Ländern oder Gebieten und werden von diesen Parlamenten gewählt. Der Rat hält jedes Jahr im Oktober/November eine ordentliche Sitzung ab und normalerweise eine zusätzliche Sitzung pro Jahr zu einem bestimmten Thema. Die offiziellen Sprachen des Rates sind Dänisch, Finnisch, Isländisch, Norwegisch und Schwedisch, obwohl er nur die gegenseitig verständlichen skandinavischen Sprachen – Dänisch, Norwegisch und Schwedisch – als Arbeitssprachen verwendet. Diese drei Sprachen sind die Muttersprache von etwa 80 % der Bevölkerung der Region und werden von den restlichen 20 % als Zweit- oder Fremdsprache gelernt."
CW_Expansion_news.281.a:1 "OK"

CW_Expansion_country.282.t:0 "Balkanpakt"
CW_Expansion_country.282.d:0 "Der Balkanpakt von 1953, offiziell bekannt als Freundschafts- und Kooperationsabkommen, war ein Vertrag, der am 28. Februar 1953 in Ankara von Griechenland, der Türkei und Jugoslawien unterzeichnet wurde. Der Vertrag sollte als Abschreckung gegen die sowjetische Expansion auf dem Balkan dienen und sah die Schaffung eines gemeinsamen Militärstabs für die drei Länder vor. Zum Zeitpunkt der Gründung des Pakts waren die Türkei und Griechenland Mitglieder der Nordatlantikvertrags-Organisation (NATO), während Jugoslawien ein blockfreier kommunistischer Staat war. Der Balkanpakt ermöglichte Jugoslawien den indirekten Beitritt zur NATO."
CW_Expansion_country.282.a:1 "OK"
