CW_Expansion_country.90.t:0 "Gouzenko-Affäre"
CW_Expansion_country.90.d:0 "Die Gouzenko-Affäre war die Bezeichnung für die Ereignisse in Kanada im Zusammenhang mit dem Überlaufen von Igor Gouzenko aus der Sowjetunion im Jahr 1945 und seinen darauf folgenden Vorwürfen bezüglich der Existenz eines sowjetischen Spionagerings kanadischer Kommunisten. Historiker gehen davon aus, dass Gouzenkos Überlaufen und seine Enthüllungen den Beginn des Kalten Krieges in Kanada markierten und möglicherweise die Bühne für die „Rote Angst“ der 1950er Jahre bereiteten."
CW_Expansion_country.90.a:1 "OK"
