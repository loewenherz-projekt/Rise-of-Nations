CW_Expansion_country.204.t:0 "Erstveröffentlichung des Peanuts-Comics"
CW_Expansion_country.204.d:0 "Als „Peanuts“ im Oktober 1950 erschien, wurde es in sieben US-Zeitungen veröffentlicht. Im ersten Jahr landete der Comic in der Leserumfrage des New York World Telegram auf dem letzten Platz. Ein Buch mit Nachdrucken der Peanuts verhalf dem Comic jedoch zu einem größeren Publikum."
