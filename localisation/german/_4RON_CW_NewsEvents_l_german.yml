CW_Expansion_country.475.t:0 "Dornröschen-Film veröffentlicht"
CW_Expansion_country.475.d:0 "Dornröschen ist ein US-amerikanischer Zeichentrickfilm aus dem Jahr 1959, der von Walt Disney produziert wurde und auf der Erzählung „Dornröschen“ von Charles Perrault aus dem Jahr 1697 basiert. Der 16. Zeichentrickfilm von Disney kam am 29. Januar 1959 bei Buena Vista Distribution in die Kinos. Die Stimmen stammen von Mary Costa, Eleanor Audley, Verna Felton, Barbara Luddy, Barbara Jo Allen, Bill Shirley, Taylor Holmes und Bill Thompson."
