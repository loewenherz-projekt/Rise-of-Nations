CW_Expansion_country.494.t:0 "Erster Auftritt von Asterix dem Gallier"
CW_Expansion_country.494.d:0 "Asterix oder Die Abenteuer von Asterix ist eine Bande-Dessinée-Comicserie über ein Dorf unbezwingbarer gallischer Krieger, die während der Ära Julius Cäsars Abenteuer um die Welt erleben und mit Hilfe eines Zaubertranks gegen die Römische Republik kämpfen. Es handelt sich um eine ahistorische Erzählung aus der Zeit nach den Gallischen Kriegen. Die Serie erschien erstmals am 29. Oktober 1959 im französisch-belgischen Comicmagazin Pilote. Sie wurde von René Goscinny geschrieben und bis zu Goscinnys Tod 1977 von Albert Uderzo illustriert. Uderzo übernahm dann das Schreiben bis 2009, als er die Rechte an den Verlag Hachette verkaufte. Er starb 2020. 2013 übernahm ein neues Team bestehend aus Jean-Yves Ferri (Drehbuch) und Didier Conrad (Grafiken). Bis 2021 wurden 39 Bände veröffentlicht, der letzte erschien im Oktober 2021."
CW_Expansion_country.494.a:1 "OK"
