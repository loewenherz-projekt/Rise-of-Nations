CW_Expansion_country.237.t:0 "Vertrag von San Francisco"
CW_Expansion_country.237.d:0 "Der Vertrag von San Francisco, auch Friedensvertrag mit Japan genannt, stellte im Namen der Vereinten Nationen die friedlichen Beziehungen zwischen Japan und den Alliierten wieder her, indem er den Kriegszustand beendete und Wiedergutmachung für feindliche Handlungen bis einschließlich des Zweiten Weltkriegs vorsah. Er wurde am 8. September 1951 im War Memorial Opera House in San Francisco, Kalifornien, USA, von 49 Nationen unterzeichnet. Italien und China waren nicht eingeladen, letzteres aufgrund von Meinungsverschiedenheiten darüber, ob die Republik China oder die Volksrepublik China das chinesische Volk vertrat. Korea war ebenfalls nicht eingeladen, da eine ähnliche Meinungsverschiedenheit darüber bestand, ob Südkorea oder Nordkorea das koreanische Volk vertrat."
CW_Expansion_country.237.a:1 "OK"
CW_Expansion_news.237.t:0 "Vertrag von San Francisco"
CW_Expansion_news.237.d:0 "Der Vertrag von San Francisco, auch Friedensvertrag mit Japan genannt, stellte im Namen der Vereinten Nationen die friedlichen Beziehungen zwischen Japan und den Alliierten wieder her, indem er den Kriegszustand beendete und Wiedergutmachung für feindliche Handlungen bis einschließlich des Zweiten Weltkriegs vorsah. Er wurde am 8. September 1951 im War Memorial Opera House in San Francisco, Kalifornien, USA, von 49 Nationen unterzeichnet. Italien und China waren nicht eingeladen, letzteres aufgrund von Meinungsverschiedenheiten darüber, ob die Republik China oder die Volksrepublik China das chinesische Volk vertrat. Korea war ebenfalls nicht eingeladen, da eine ähnliche Meinungsverschiedenheit darüber bestand, ob Südkorea oder Nordkorea das koreanische Volk vertrat."
CW_Expansion_news.237.a:1 "OK"

CW_Expansion_country.238.t:0 "Sicherheitsvertrag zwischen den USA und Japan"
CW_Expansion_country.238.d:0 "Der Sicherheitsvertrag zwischen den Vereinigten Staaten und Japan wurde am 8. September 1951 in San Francisco, Kalifornien, von Vertretern der Vereinigten Staaten und Japans unterzeichnet. Er war Teil des Vertrags von San Francisco, der den Zweiten Weltkrieg in Asien beendete. Der Vertrag wurde Japan von den Vereinigten Staaten als Bedingung für die Beendigung der japanischen Besatzung und die Wiederherstellung der nationalen Souveränität aufgezwungen. Er führte zur Gründung eines dauerhaften Militärbündnisses zwischen den Vereinigten Staaten und Japan."
CW_Expansion_country.238.a:1 "OK"
CW_Expansion_news.238.t:0 "Sicherheitsvertrag zwischen den USA und Japan"
