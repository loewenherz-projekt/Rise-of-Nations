CW_Expansion_country.213.t:0 "Hexe von Buchenwald verurteilt"
CW_Expansion_country.213.d:0 "Ilse Koch, die Frau des Kommandanten des Konzentrationslagers Buchenwald, wird von einem westdeutschen Gericht zu lebenslanger Haft verurteilt. Wegen ihres außergewöhnlichen Sadismus erhielt Ilse Koch den Spitznamen „Hexe von Buchenwald“. Die in Dresden geborene Bibliothekarin Ilse heiratete 1936 SS-Oberst Karl Koch. Oberst Koch, selbst als Sadist bekannt, war Kommandant des Konzentrationslagers Sassenhausen, drei Kilometer nördlich von Berlin. Nach drei Jahren wurde er in das 7,2 Kilometer nordwestlich von Weimar gelegene Konzentrationslager Buchenwald verlegt; im Konzentrationslager Buchenwald waren während des Krieges insgesamt 20.000 Zwangsarbeiter untergebracht. Ilse, eine große Frau mit rotem Haar, durfte sich im Lager frei bewegen, peitschte Gefangene im Vorbeireiten mit ihrer Reitgerte aus, zwang Gefangene zum Sex und – am schrecklichsten – sammelte Lampenschirme, Buchumschläge und Handschuhe aus der Haut tätowierter Lagergefangener. Ein deutscher Häftling sagte während der Nürnberger Kriegsverbrecherprozesse Folgendes aus: „Alle Häftlinge mit Tätowierungen mussten sich in der Ambulanz melden. … Nach der Untersuchung der Häftlinge wurden diejenigen mit den besten und kunstvollsten Exemplaren durch Injektionen getötet. Die Leichen wurden dann der pathologischen Abteilung übergeben, wo die gewünschten tätowierten Hautstücke von den Körpern abgetrennt und weiterbehandelt wurden.“"
CW_Expansion_country.213.a:1 "OK"
