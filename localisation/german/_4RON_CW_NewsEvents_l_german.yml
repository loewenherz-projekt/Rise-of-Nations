CW_Expansion_country.344.t:0 "UEFA gegründet"
CW_Expansion_country.344.d:0 "Die UEFA wurde am 15. Juni 1954 im schweizerischen Basel nach Konsultationen zwischen den italienischen, französischen und belgischen Verbänden gegründet. Bei der Gründungsversammlung waren 25 Mitglieder anwesend. Sechs weitere Verbände, die nicht anwesend waren, wurden jedoch dennoch als Gründungsmitglieder anerkannt, sodass sich die Gesamtzahl der Gründungsverbände auf 31 erhöhte. Mitte der 1990er Jahre wuchs die UEFA auf über 50 Mitglieder an, da aus der Zersplitterung der Sowjetunion, Jugoslawiens und der Tschechoslowakei in ihre Einzelstaaten neue Verbände entstanden."
CW_Expansion_country.344.a:1 "OK"
