CW_Expansion_news.408.d:0 "Mit 8.163 Metern (26.781 Fuß) über dem Meeresspiegel ist der Manaslu der achthöchste Berg der Welt. Er liegt im Mansiri Himal, einem Teil des nepalesischen Himalaya im zentralen Westnepal. Der Name Manaslu bedeutet „Berg des Geistes“ und leitet sich vom Sanskrit-Wort manasa ab, das „Intellekt“ oder „Seele“ bedeutet. Der Manaslu wurde erstmals am 9. Mai 1956 von Toshio Imanishi und Gyalzen Norbu, Mitgliedern einer japanischen Expedition, bestiegen. Angesichts der vielen erfolglosen Versuche der Briten, den Everest vor dem Neuseeländer Edmund Hillary zu besteigen, heißt es: „So wie die Briten den Everest als ihren Berg betrachten, war der Manaslu schon immer ein japanischer Berg.“"
CW_Expansion_news.408.a:1 "OK"

CW_Expansion_country.409.t:0 "Erstbesteigung des Lhotse-Hauptgipfels"
CW_Expansion_country.409.d:0 "Der Lhotse (8.516 m) wurde am 18. Mai 1956 erstmals bestiegen. Damals erreichten Fritz Luchsinger und Ernst Reiss (beide Schweiz) den Gipfel. Der Lhotse ist einer der 8.000er, also der 14 Berge der Erde, die mehr als 8.000 m über dem Meeresspiegel liegen. Sie alle liegen im Himalaya und Karakorum in Asien."
CW_Expansion_country.409.a:1 "OK"
