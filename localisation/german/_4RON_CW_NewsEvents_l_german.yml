ron_warscountry.45.d:0 "Was werden wir tun?"
ron_warscountry.45.a:1 "Unterdrücke es"
ron_warscountry.45.b:1 "Aufgeben"

ron_warscountry.46.t:0 "Hamasa-Invasion"
ron_warscountry.46.d:0 "Was werden wir tun?"
ron_warscountry.46.a:1 "In den Krieg ziehen"
ron_warscountry.46.b:1 "Aufgeben"

ron_warscountry.47.t:0 "Aufstand der Mau Mau"
ron_warscountry.47.d:0 "Der Mau-Mau-Aufstand (1952–1960), auch bekannt als Mau-Mau-Rebellion, Kenia-Notstand und Mau-Mau-Revolte, war ein Krieg in der britischen Kolonie Kenia (1920–1963) zwischen der Kenya Land and Freedom Army (KLFA), auch bekannt als Mau Mau, und den britischen Behörden."
ron_warscountry.47.a:1 "Unterdrücke es"
ron_warscountry.47.b:1 "Aufgeben"

ron_warscountry.48.t:0 "Luftschlacht über Merklín"
ron_warscountry.48.d:0 "Was werden wir tun?"
ron_warscountry.48.a:1 "Befehlen Sie den Kämpfern, das Feuer zu eröffnen"
ron_warscountry.48.b:1 "Rückzug"

ron_warscountry.49.t:0 "Arbeiteraufstand in Pilsen"
ron_warscountry.49.d:0 "Der Pilsener Aufstand von 1953 ereignete sich, als Arbeiter in der tschechoslowakischen Stadt Pilsen drei Tage lang, vom 31. Mai bis 2. Juni, in gewaltsamen Protesten gegen die Währungsreformen der Kommunistischen Partei der Tschechoslowakei protestierten. Die geschätzte Zahl der Opfer liegt bei 200 Verletzten, niemand wurde tödlich verletzt."
ron_warscountry.49.a:1 "Unterdrücke sie"
ron_warscountry.49.b:1 "Aufgeben"

ron_warscountry.50.t:0 "Demonstranten auf den Straßen"
ron_warscountry.50.d:0 "Der Volksaufstand vom 17. Juni 1953 war ein Aufstand in Ostdeutschland, der vom 16. bis 17. Juni 1953 stattfand. Er begann mit einem Streik von Bauarbeitern in Ostberlin am 16. Juni gegen die Arbeitsquoten während des Sowjetisierungsprozesses in Ostdeutschland. Demonstrationen in Ostberlin entwickelten sich am nächsten Tag zu einem groß angelegten Aufstand gegen die Regierung der DDR und die Sozialistische Einheitspartei Deutschlands, an dem schätzungsweise mehr als eine Million Menschen in etwa 700 Orten im ganzen Land teilnahmen."
ron_warscountry.50.a:1 "Schicken Sie die Miliz"
ron_warscountry.50.b:1 "Lass sie sein"

ron_warscountry.51.t:0 "Revolution!"
ron_warscountry.51.d:0 "Die kubanische Revolution (spanisch Revolución cubana) war ein bewaffneter Aufstand der revolutionären Bewegung des 26. Juli unter Fidel Castro und ihrer Verbündeten gegen die Militärdiktatur des kubanischen Präsidenten Fulgencio Batista. Die Revolution begann im Juli 1953."
ron_warscountry.51.a:1 "In den Krieg ziehen"
ron_warscountry.51.b:1 "Aufgeben"

ron_warscountry.52.t:0 "Konflikte in Xinjiang"
ron_warscountry.52.d:0 "Der Xinjiang-Konflikt, auch bekannt als Uiguren-China-Konflikt, ist ein Konflikt in der nordwestlichsten autonomen Region Xinjiang in China, in dessen Mittelpunkt die Uiguren stehen, eine ethnische Minderheit der Turkvölker, die die größte Gruppe in der Region bilden."
ron_warscountry.52.a:1 "In den Krieg ziehen"
ron_warscountry.52.b:1 "Aufgeben"

ron_warscountry.53.t:0 "Kengir-Aufstand"
ron_warscountry.53.d:0 "Der Kengir-Aufstand war ein Gefangenenaufstand, der im Mai und Juni 1954 in Kengir (Steplag), einem sowjetischen Arbeitslager für politische Gefangene, stattfand. Seine Dauer und Intensität unterschied ihn von anderen Gulag-Aufständen im gleichen Zeitraum."
ron_warscountry.53.a:1 "Unterdrücke es"
ron_warscountry.53.b:1 "Aufgeben"

ron_warscountry.54.t:0 "Die Meerengenkrise"
ron_warscountry.54.d:0 "Was werden wir tun?"
ron_warscountry.54.a:1 "In den Krieg ziehen"
ron_warscountry.54.b:1 "Aufgeben"

ron_warscountry.55.t:0 "Staatsstreich von Yanaon"
ron_warscountry.55.d:0 "Was werden wir tun?"
ron_warscountry.55.a:1 "In den Krieg ziehen"
ron_warscountry.55.b:1 "Was auch immer"

ron_warscountry.56.t:0 "Annexion von Dadra und Nagar Haveli"
ron_warscountry.56.d:0 "Was werden wir tun?"
ron_warscountry.56.a:1 "In den Krieg ziehen"
ron_warscountry.56.b:1 "Was auch immer"

ron_warscountry.57.t:0 "Zweite Meerengenkrise!"
ron_warscountry.57.d:0 "Was werden wir tun?"
ron_warscountry.57.a:1 "In den Krieg ziehen"
ron_warscountry.57.b:1 "Aufgeben"

