CW_Expansion_country.297.t:0 "Luftkatastrophe von Tachikawa"
CW_Expansion_country.297.d:0 "Die Flugzeugkatastrophe von Tachikawa ereignete sich am Donnerstagnachmittag, dem 18. Juni 1953. Eine Douglas C-124 Globemaster II der US-Luftwaffe (USAF) stürzte drei Minuten nach dem Start im japanischen Tachikawa ab. Alle 129 Menschen an Bord kamen ums Leben. Der Absturz war damals der tödlichste in der Geschichte der Luftfahrt."
CW_Expansion_country.297.a:1 "OK"
CW_Expansion_news.297.t:0 "Luftkatastrophe von Tachikawa"
CW_Expansion_news.297.d:0 "Die Flugzeugkatastrophe von Tachikawa ereignete sich am Donnerstagnachmittag, dem 18. Juni 1953. Eine Douglas C-124 Globemaster II der US-Luftwaffe (USAF) stürzte drei Minuten nach dem Start im japanischen Tachikawa ab. Alle 129 Menschen an Bord kamen ums Leben. Der Absturz war damals der tödlichste in der Geschichte der Luftfahrt."
CW_Expansion_news.297.a:1 "OK"

CW_Expansion_country.298.t:0 "Rosenbergs hingerichtet"
CW_Expansion_country.298.d:0 "Am 19. Juni 1953 wurden Julius und Ethel Rosenberg im Sing-Sing-Gefängnis in Ossining, New York, hingerichtet. Sie waren wegen Verschwörung zur Weitergabe amerikanischer Atomgeheimnisse an die Sowjets verurteilt worden. Beide weigerten sich, jegliches Fehlverhalten einzugestehen und beteuerten bis zu ihrem Tod auf dem elektrischen Stuhl ihre Unschuld. Die Rosenbergs waren die ersten US-Bürger, die in Friedenszeiten wegen Spionage verurteilt und hingerichtet wurden. Ihr Fall ist bis heute umstritten."
CW_Expansion_country.298.a:1 "OK"
CW_Expansion_news.298.t:0 "Rosenbergs hingerichtet"
