CW_Expansion_country.477.t:0 "Der Tag, an dem die Musik starb"
CW_Expansion_country.477.d:0 "Am 3. Februar 1959 kamen die amerikanischen Rockmusiker Buddy Holly, Ritchie Valens und „The Big Bopper“ JP Richardson zusammen mit dem Piloten Roger Peterson bei einem Flugzeugabsturz nahe Clear Lake, Iowa, ums Leben. Das Ereignis wurde später als „Der Tag, an dem die Musik starb“ bekannt, nachdem der Singer-Songwriter Don McLean es 1971 in seinem Song „American Pie“ so bezeichnete."
CW_Expansion_country.477.a:1 "OK"
