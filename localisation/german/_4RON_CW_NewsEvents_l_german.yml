CW_Expansion_country.424.t:0 "Israel marschiert auf der Sinai-Halbinsel ein"
CW_Expansion_country.424.d:0 "Die israelische Besetzung der Sinai-Halbinsel war eine 15 Jahre dauernde militärische Besetzung der Sinai-Halbinsel durch israelische Streitkräfte, die nach der Eroberung der Region von Ägypten während des Arabisch-Israelischen Krieges 1967 erfolgte. Die vorläufige israelische Kontrolle über die Sinai-Halbinsel endete 1982 nach der Umsetzung des ägyptisch-israelischen Friedensvertrags von 1979, in dessen Rahmen Israel die Region an Ägypten zurückgab, im Austausch für die Anerkennung Israels als legitimen souveränen Staat durch Ägypten."
CW_Expansion_country.424.a:1 "OK"
