CW_Expansion_news.192.a:1 "OK"

CW_Expansion_country.193.t:0 "Schlacht von Taejon"
CW_Expansion_country.193.d:0 "Die Schlacht um Taejon (14.–21. Juli 1950) war eine der frühen Schlachten des Koreakriegs zwischen US-amerikanischen und nordkoreanischen Streitkräften. Truppen der US-Armee versuchten, das Hauptquartier der 24. Infanteriedivision zu verteidigen. Die 24. Infanteriedivision wurde in der Großstadt und dem Verkehrsknotenpunkt Taejon von den zahlenmäßig überlegenen Streitkräften der Koreanischen Volksarmee (KVA) überwältigt. Die Regimenter der 24. Infanteriedivision waren durch die Verzögerungsmaßnahmen der vorangegangenen zwei Wochen gegen den Vormarsch der KVA bereits erschöpft."
CW_Expansion_country.193.a:1 "OK"
CW_Expansion_news.193.t:0 "Schlacht von Taejon"
CW_Expansion_news.193.d:0 "Die Schlacht um Taejon (14.–21. Juli 1950) war eine der frühen Schlachten des Koreakriegs zwischen US-amerikanischen und nordkoreanischen Streitkräften. Truppen der US-Armee versuchten, das Hauptquartier der 24. Infanteriedivision zu verteidigen. Die 24. Infanteriedivision wurde in der Großstadt und dem Verkehrsknotenpunkt Taejon von den zahlenmäßig überlegenen Streitkräften der Koreanischen Volksarmee (KVA) überwältigt. Die Regimenter der 24. Infanteriedivision waren durch die Verzögerungsmaßnahmen der vorangegangenen zwei Wochen gegen den Vormarsch der KVA bereits erschöpft."
