CW_Expansion_country.257.t:0 "Erdbeben in San Juan"
CW_Expansion_country.257.d:0 "Das San-Juan-Erdbeben von 1952 ereignete sich am 11. Juni um 00:31:43 UTC in der argentinischen Provinz San Juan. Es hatte eine Stärke von 6,8 auf der Momenten-Magnituden-Skala und eine Tiefe von 30 Kilometern. Das Erdbeben war in San Juan mit einem Maximum von VIII (schwer) auf der Mercalli-Skala spürbar. Es verursachte an einigen Orten im Süden und Westen der Provinz Schäden und forderte einige Todesopfer."
CW_Expansion_country.257.a:1 "OK"
