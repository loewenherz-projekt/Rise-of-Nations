CW_Expansion_country.133.t:0 "Tschechoslowakischer Staatsstreich"
CW_Expansion_country.133.d:0 "Ende Februar 1948 übernahm die Kommunistische Partei der Tschechoslowakei mit sowjetischer Unterstützung die unangefochtene Kontrolle über die Regierung des Landes. Dies markierte den Beginn einer vier Jahrzehnte währenden Herrschaft der Partei im Land. Die Bedeutung des Putsches reichte weit über die Staatsgrenzen hinaus, da er ein deutlicher Meilenstein auf dem bereits weit fortgeschrittenen Weg zum Kalten Krieg war. Das Ereignis alarmierte die westlichen Länder und trug zur raschen Verabschiedung des Marshallplans, der Staatsgründung in Westdeutschland, paramilitärischen Maßnahmen zur Abwehr kommunistischer Machthaber in Frankreich, Griechenland und insbesondere Italien sowie zu Schritten in Richtung gegenseitiger Sicherheit bei, die in etwas mehr als einem Jahr zur Gründung der NATO und dem endgültigen Fall des Eisernen Vorhangs führten und bis zu den Revolutionen von 1989 andauerten."
CW_Expansion_country.133.a:1 "OK"
