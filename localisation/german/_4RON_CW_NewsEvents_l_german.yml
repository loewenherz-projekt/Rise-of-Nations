CW_Expansion_country.255.t:0 "Bolivianische Nationalrevolution"
CW_Expansion_country.255.d:0 "Die Bolivianische Revolution von 1952, auch bekannt als Revolution von 1952, war eine Reihe politischer Demonstrationen unter Führung der Revolutionären Nationalistischen Bewegung (RNM, MNR), die im Bündnis mit Liberalen und Kommunisten ein neues sozioökonomisches Modell in Bolivien durchsetzen wollte. Ihre wichtigsten Anführer waren die ehemaligen Präsidenten Víctor Paz Estenssoro und Hernán Siles Zuazo. Die MNR-Regierung nach dieser Revolution bestand vom 9. April 1952 bis zum Putsch vom 4. November 1964. In diesen zwölf Jahren kam es zu einer Koregierung und gleichzeitig zu einem Machtkampf zwischen Partei und Gewerkschaften."
CW_Expansion_country.255.a:1 "OK"
