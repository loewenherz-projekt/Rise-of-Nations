CW_Expansion_country.171.t:0 "Der Raubüberfall von Great Brink"
CW_Expansion_country.171.d:0 "Der große Brink&#39;s-Raub war ein bewaffneter Raubüberfall auf das Brink&#39;s-Gebäude an der Ostecke von Prince Street und Commercial Street im Norden von Boston, Massachusetts, am 17. Januar 1950. Heute ist das Gebäude ein Parkhaus in der Commercial Street 600. Der Diebstahl im Wert von 2,775 Millionen Dollar (heute 31,3 Millionen Dollar) bestand aus 1.218.211,29 Dollar in bar und 1.557.183,83 Dollar in Schecks, Zahlungsanweisungen und anderen Wertpapieren. Es war damals der größte Raubüberfall in der Geschichte der Vereinigten Staaten und blieb dies bis 1984. Der Raub, der geschickt ausgeführt wurde und bei dem nur wenige Hinweise am Tatort zurückblieben, wurde als „Verbrechen des Jahrhunderts“ bezeichnet. Es war das Werk einer elfköpfigen Bande, von denen zehn später verhaftet wurden."
CW_Expansion_country.171.a:1 "OK"
