CW_Expansion_country.224.t:0 "Zugbrand in Sakuragicho"
CW_Expansion_country.224.d:0 "Der Brand im Sakuragichō-Zug ereignete sich am 24. April 1951, als ein Zug der Serie 63 der Keihin-Linie (heute Teil der Negishi-Linie) bei der Annäherung an den Bahnhof Sakuragichō in Yokohama gegen eine lose Oberleitung fuhr, was einen Kurzschluss verursachte und einen Brand auslöste, bei dem 106 Menschen starben und 92 verletzt wurden."
CW_Expansion_country.224.a:1 "OK"
