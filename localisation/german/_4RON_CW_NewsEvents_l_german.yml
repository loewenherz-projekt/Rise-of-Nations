CW_Expansion_country.292.t:0 "Aufstand in Pilsen"
CW_Expansion_country.292.d:0 "Der Pilsener Aufstand von 1953 ereignete sich, als Arbeiter in der tschechoslowakischen Stadt Pilsen drei Tage lang, vom 31. Mai bis 2. Juni, in gewaltsamen Protesten gegen die Währungsreformen der Kommunistischen Partei der Tschechoslowakei protestierten. Die geschätzte Zahl der Opfer liegt bei 200 Verletzten, niemand wurde tödlich verletzt."
CW_Expansion_country.292.a:1 "OK"
