CW_Expansion_country.113.t:0 "Zivile Unruhen in Taiwan niedergeschlagen"
CW_Expansion_country.113.d:0 "Der Vorfall vom 28. Februar, auch bekannt als Massaker vom 28. Februar, 228-Vorfall oder 228-Massaker, war ein regierungsfeindlicher Aufstand in Taiwan, der von der nationalistischen Kuomintang (KMT) der Republik China gewaltsam niedergeschlagen wurde. Unter der Führung von Provinzgouverneur Chen Yi und Präsident Chiang Kai-shek wurden ab dem 28. Februar 1947 Tausende Zivilisten getötet. Die Zahl der Todesopfer durch den Vorfall und das Massaker wird auf 18.000 bis 28.000 geschätzt. Der Vorfall ist eines der wichtigsten Ereignisse in der modernen Geschichte Taiwans und gab der taiwanesischen Unabhängigkeitsbewegung einen entscheidenden Impuls."
CW_Expansion_country.113.a:1 "OK"
CW_Expansion_news.113.t:0 "Niederschlagung ziviler Unruhen in Taiwan"
CW_Expansion_news.113.d:0 "Der Vorfall vom 28. Februar, auch bekannt als Massaker vom 28. Februar, 228-Vorfall oder 228-Massaker, war ein regierungsfeindlicher Aufstand in Taiwan, der von der nationalistischen Kuomintang (KMT) der Republik China gewaltsam niedergeschlagen wurde. Unter der Führung von Provinzgouverneur Chen Yi und Präsident Chiang Kai-shek wurden ab dem 28. Februar 1947 Tausende Zivilisten getötet. Die Zahl der Todesopfer durch den Vorfall und das Massaker wird auf 18.000 bis 28.000 geschätzt. Der Vorfall ist eines der bedeutendsten Ereignisse in der modernen Geschichte Taiwans und gab der taiwanesischen Unabhängigkeitsbewegung einen entscheidenden Impuls."
CW_Expansion_news.113.a:1 "OK"

CW_Expansion_country.114.t:0 "Truman-Doktrin verkündet"
CW_Expansion_country.114.d:0 "Mit der Truman-Doktrin legte Präsident Harry S. Truman fest, dass die Vereinigten Staaten allen demokratischen Nationen, die von äußeren oder inneren autoritären Kräften bedroht werden, politische, militärische und wirtschaftliche Hilfe leisten würden. Die Truman-Doktrin führte zu einer Neuausrichtung der US-Außenpolitik: Weg vom üblichen Rückzug aus regionalen Konflikten, an denen die USA nicht direkt beteiligt waren, hin zu einer möglichen Intervention in weit entfernten Konflikten."
CW_Expansion_country.114.a:1 "OK"
