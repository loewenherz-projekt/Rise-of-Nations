CW_Expansion_country.181.t:0 "Rama IX. zum König von Thailand gekrönt"
CW_Expansion_country.181.d:0 "Nachdem er die lange hinausgezögerte zeremonielle Einäscherung seines Bruders Ananda Mahidol geleitet hatte, wurde Bhumibol am 5. Mai 1950 im Phaisan Thaksin Thronsaal des Großen Palastes in Bangkok zum König von Thailand gekrönt. Es war die erste Krönungszeremonie eines thailändischen Herrschers unter dem System der konstitutionellen Monarchie. Während der Zeremonie gelobte er, „zum Wohle und Glück des siamesischen Volkes rechtschaffen zu regieren“. Bemerkenswerte Elemente der Krönung waren der Bahadrabith-Thron unter dem großen weißen Staatsschirm sowie königliche Insignien und Utensilien."
CW_Expansion_country.181.a:1 "OK"
