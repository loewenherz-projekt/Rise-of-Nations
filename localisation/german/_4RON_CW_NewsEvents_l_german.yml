CW_Expansion_country.428.t:0 "UN-Resolution zur Suezkrise"
CW_Expansion_country.428.d:0 "Die erste außerordentliche Sitzung der Generalversammlung der Vereinten Nationen wurde am 1. November einberufen und endete am 10. November 1956 mit der Lösung der Suezkrise durch die Schaffung der Notfalltruppe der Vereinten Nationen, um eine internationale Präsenz zwischen den Kriegsparteien in der Kanalzone zu gewährleisten."
CW_Expansion_country.428.a:1 "OK"
