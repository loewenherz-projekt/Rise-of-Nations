CW_Expansion_country.201.t:0 "Schlacht von Incheon"
CW_Expansion_country.201.d:0 "Die Schlacht um Incheon war eine amphibische Invasion und eine Schlacht im Koreakrieg, die mit einem entscheidenden Sieg und einer strategischen Wende zugunsten des UN-Kommandos endete. An der Operation waren rund 75.000 Soldaten und 261 Kriegsschiffe beteiligt. Zwei Wochen später gelang die Rückeroberung der südkoreanischen Hauptstadt Seoul. Der Codename der Operation lautete Operation Chromite."
CW_Expansion_country.201.a:1 "OK"
