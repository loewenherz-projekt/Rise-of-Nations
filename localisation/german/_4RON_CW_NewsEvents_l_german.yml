CW_Expansion_country.358.t:0 "Heute Abend wird die Show ausgestrahlt"
CW_Expansion_country.358.d:0 "Die Tonight Show ist eine amerikanische Late-Night-Talkshow, die seit 1954 auf NBC ausgestrahlt wird. Die Show wurde von sechs Komikern moderiert: Steve Allen (1954–1957), Jack Paar (1957–1962), Johnny Carson (1962–1992), Jay Leno (1992–2009 und 2010–2014), Conan O&#39;Brien (2009–2010) und Jimmy Fallon (2014–heute). Neben den Hauptmoderatoren wurden eine Reihe regelmäßiger „Gastmoderatoren“ eingesetzt, insbesondere Ernie Kovacs, der zwischen 1956 und 1957 zwei Abende pro Woche moderierte."
CW_Expansion_country.358.a:1 "OK"
CW_Expansion_news.358.t:0 "Heute Abend wird die Show ausgestrahlt"
CW_Expansion_news.358.d:0 "Die Tonight Show ist eine US-amerikanische Late-Night-Talkshow, die seit 1954 auf NBC ausgestrahlt wird. Die Show wurde von sechs Komikern moderiert: Steve Allen (1954–1957), Jack Paar (1957–1962), Johnny Carson (1962–1992), Jay Leno (1992–2009 und 2010–2014), Conan O&#39;Brien (2009–2010) und Jimmy Fallon (2014–heute). Neben den Hauptmoderatoren gab es eine Reihe regelmäßiger „Gastmoderatoren“, insbesondere Ernie Kovacs, der von 1956 bis 1957 zwei Abende pro Woche moderierte, und eine Reihe von Gästen, die von Carson genutzt wurden, der seine eigenen Moderationspflichten in den 1980er Jahren auf drei Abende pro Woche reduzierte. Zu Carsons regelmäßigen Gastmoderatoren gehörten Joey Bishop, David Letterman, Joan Rivers, David Brenner und Jay Leno, obwohl diese Praxis seitdem größtenteils aufgegeben wurde, da die Moderatoren Wiederholungen der Präsentation potenzieller Rivalen vorzogen. Fallon hat nur selten Gastmoderatoren eingesetzt: Sie moderierte die Sendung vom 24. Mai 2021 gemeinsam mit Dave Grohl, Jimmy Kimmel moderierte die Sendung vom 1. April 2022 (wobei Fallon die Aufgaben mit Gastmoderator Jimmy Kimmel Live!) tauschte, Shawn Mendes die Sendung vom 29. April 2022 co-moderierte, Megan Thee Stallion die Sendung vom 11. August 2022 co-moderierte und Demi Lovato die Sendung vom 17. August 2022 co-moderierte. Die Tonight Show ist die am längsten laufende Talkshow der Welt und das am längsten laufende, regelmäßig ausgestrahlte Unterhaltungsprogramm in den Vereinigten Staaten. Sie ist die drittlängste Sendung auf NBC, nach den Nachrichten- und Talkshows Today und Meet the Press. Die aktuelle Inkarnation wurde im Studio 6B der NBC Studios im Rockefeller Center in New York aufgezeichnet, demselben Studio, das während der späteren Jack-Paar-Ära und den ersten zehn Jahren von Carson genutzt wurde. Während der Erstausstrahlung unter Steve Allen stammte die Show aus dem Hudson Theatre am Broadway. Von 1973 bis 2009 und von 2010 bis 2014 wurde die Show in einem von drei verschiedenen Studios der NBC Studios in Burbank, Kalifornien, aufgezeichnet. Während Conan O&#39;Briens Amtszeit wurde die Show in Stage 1 der Universal Studios Hollywood aufgezeichnet."
CW_Expansion_news.358.a:1 "OK"

CW_Expansion_country.359.t:0 "Viet Minh übernimmt die Kontrolle über Nordvietnam"
CW_Expansion_country.359.d:0 "Die Viet Minh übernehmen offiziell Hanoi und die Kontrolle über Nordvietnam. Die Vietnam Doc Lap Dong Minh (Vietnamesische Unabhängigkeitsliga), oder Viet Minh, wie sie weltweit genannt wurde, war eine kommunistische Tarnorganisation, die 1941 von Ho Chi Minh gegründet wurde, um den Widerstand gegen die französische Kolonialherrschaft und die japanischen Besatzungstruppen zu organisieren. Nach dem Ende der japanischen Besatzung 1945 versuchten die Franzosen, die Kolonialherrschaft wiederherzustellen. Die Viet Minh begannen einen langen und blutigen Guerillakrieg gegen die französischen Kolonialtruppen, der als Erster Indochinakrieg bekannt wurde. Schließlich besiegten die Viet Minh unter der Führung von General Vo Nguyen Giap die Franzosen im Mai 1954 in der Schlacht von Dien Bien Phu entscheidend. Am 1. August trat der Waffenstillstand in Kraft, der den Krieg beendete. Die triumphierenden Viet Minh marschierten in Hanoi ein, während die Franzosen sich auf den Abzug ihrer Truppen vorbereiteten."
CW_Expansion_country.359.a:1 "OK"
