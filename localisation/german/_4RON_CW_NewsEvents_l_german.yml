CW_Expansion_country.223.t:0 "Vertrag von Paris"
CW_Expansion_country.223.d:0 "Der Vertrag von Paris (ehemals Vertrag zur Gründung der Europäischen Gemeinschaft für Kohle und Stahl) wurde am 18. April 1951 zwischen Frankreich, Italien, Westdeutschland, Belgien, Luxemburg und den Niederlanden unterzeichnet und begründete die Europäische Gemeinschaft für Kohle und Stahl (EGKS), die später Teil der Europäischen Union wurde. Der Vertrag trat am 23. Juli 1952 in Kraft und lief am 23. Juli 2002 aus, genau 50 Jahre nach seinem Inkrafttreten. Der Vertrag sollte nach dem Zweiten Weltkrieg diplomatische und wirtschaftliche Stabilität in Westeuropa bringen. Einige der Hauptgegner des Krieges teilten sich nun die Produktion von Kohle und Stahl, den wichtigsten Rohstoffen, die zuvor für die Kriegsanstrengungen von zentraler Bedeutung gewesen waren."
CW_Expansion_country.223.a:1 "OK"
