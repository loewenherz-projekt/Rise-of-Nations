CW_Expansion_country.184.t:0 "Sir Thomas Blamey zum Feldmarschall befördert"
CW_Expansion_country.184.d:0 "Am 8. Juni 1950 wurde Blamey zum Feldmarschall befördert. Er war der erste und einzige Australier, der diesen Rang erreichte. Schwer krank, wurde ihm am 16. September 1950 im Rahmen einer Zeremonie im Heidelberg Repatriation General Hospital der Stab überreicht. Blamey erholte sich nie von seiner Krankheit und starb am 27. Mai 1951 an einem Schlaganfall."
CW_Expansion_country.184.a:1 "OK"
