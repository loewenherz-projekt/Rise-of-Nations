CW_Expansion_country.274.t:0 "Estnische Exilregierung in Oslo gebildet"
CW_Expansion_country.274.d:0 "Die estnische Exilregierung war die offiziell erklärte Regierungsbehörde der Republik Estland im Exil und existierte von 1944 bis zur Wiederherstellung der estnischen Souveränität über estnisches Gebiet in den Jahren 1991 und 1992. Ihre Legitimität ging auf die verfassungsmäßige Nachfolge der letzten estnischen Regierung zurück, die vor der sowjetischen Invasion 1940 an der Macht war. Während ihres Bestehens war sie die international anerkannte Regierung Estlands."
CW_Expansion_country.274.a:1 "OK"
