CW_Expansion_country.91.t:0 "Britische Truppen ziehen aus dem Iran ab"
CW_Expansion_country.91.d:0 "Obwohl die Besetzung des Iran nach Kriegsende auf der Potsdamer Konferenz nach der Kapitulation Deutschlands enden sollte, lehnte Stalin Churchills Vorschlag für einen vorzeitigen Rückzug der Alliierten aus dem Iran vor dem auf der Teheraner Konferenz vereinbarten Zeitplan ab. Nach dem Sieg über Japan im September 1945 zogen zunächst die Vereinigten Staaten und dann Großbritannien ihre Truppen innerhalb der vertraglich festgelegten Frist ab."
CW_Expansion_country.91.a:1 "OK"
