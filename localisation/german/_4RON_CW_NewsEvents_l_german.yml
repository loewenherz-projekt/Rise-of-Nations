CW_Expansion_country.196.t:0 "Bloody Gulch-Massaker"
CW_Expansion_country.196.d:0 "Das Massaker von Bloody Gulch war ein Kriegsverbrechen, das sich am 12. August 1950 im „Bloody Gulch“, westlich von Masan, Südkorea, während des Koreakriegs ereignete. Nach einem erfolgreichen Angriff auf zwei schutzlose US-Artilleriebataillone, bei dem Hunderte von US-Soldaten getötet oder verletzt wurden, ermordeten Angehörige des 13. Regiments der nordkoreanischen Koreanischen Volksarmee (KVA) während einer der kleineren Gefechte der Schlacht um Busan 75 gefangene US-Kriegsgefangene. Die ermordeten Soldaten gehörten dem 555. Feldartilleriebataillon der 24. US-Infanteriedivision und dem 90. Feldartilleriebataillon der 25. US-Infanteriedivision an."
CW_Expansion_country.196.a:1 "OK"
