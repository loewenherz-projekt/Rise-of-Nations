CW_Expansion_country.153.t:0 "Neunzehnhundertvierundachtzig veröffentlicht"
CW_Expansion_country.153.d:0 "„1984“ (auch stilisiert als „1984“) ist ein dystopischer Science-Fiction-Roman und warnendes Beispiel des englischen Schriftstellers George Orwell. Es erschien am 8. Juni 1949 bei Secker &amp; Warburg als Orwells neuntes und letztes Buch, das er zu seinen Lebzeiten vollendete. Thematisch dreht es sich um die Folgen von Totalitarismus, Massenüberwachung und repressiver Reglementierung von Menschen und Verhaltensweisen in der Gesellschaft. Orwell, ein demokratischer Sozialist, orientierte sich bei der Gestaltung der totalitären Regierungen im Roman am stalinistischen Russland und Nazi-Deutschland. Im weiteren Sinne untersucht der Roman die Rolle von Wahrheit und Fakten in der Politik und die Art und Weise, wie diese manipuliert werden."
CW_Expansion_country.153.a:1 "OK"
