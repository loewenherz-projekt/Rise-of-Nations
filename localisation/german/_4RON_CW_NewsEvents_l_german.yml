CW_Expansion_country.406.t:0 "Fairey Delta 2 bricht den Geschwindigkeitsweltrekord"
CW_Expansion_country.406.d:0 "Am 10. März 1956 brach die Fairey Delta 2 den Geschwindigkeitsweltrekord und steigerte ihn auf 1.132 mph (1.811 km/h) bzw. Mach 1,73. Damit übertraf sie den bisherigen Geschwindigkeitsrekord um 310 mph bzw. 37 Prozent; nie zuvor war der Rekord so deutlich übertroffen worden. Damit war die Fairey Delta 2 auch das erste Düsenflugzeug, das im Horizontalflug über 1.000 mph (1.600 km/h) fuhr."
CW_Expansion_country.406.a:1 "OK"
