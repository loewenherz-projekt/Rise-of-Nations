CW_Expansion_country.152.t:0 "Tokioter Börse nimmt Betrieb wieder auf"
CW_Expansion_country.152.d:0 "Nachdem das Hauptquartier der Alliierten Streitkräfte am 31. Januar 1949 die Wiederaufnahme des Wertpapierhandels genehmigt hatte, nahmen die Börsen von Tokio, Osaka und Nagoya am Montag, dem 16. Mai 1949, ihren Betrieb wieder auf. Kurz darauf wurden sechs weitere japanische Börsen unter der Aufsicht der japanischen Börsenaufsichtsbehörde SEC wiedereröffnet. Der Margin-Handel wurde 1951 nach dem US-amerikanischen System eingeführt."
CW_Expansion_country.152.a:1 "OK"
