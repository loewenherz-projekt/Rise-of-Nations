CW_Expansion_country.294.t:0 "Tornado-Ausbruch in Flint-Worcester"
CW_Expansion_country.294.d:0 "Anfang Juni 1953 ereignete sich im Mittleren Westen und Nordosten der USA eine Serie extrem verheerender und tödlicher Tornados. Zwei davon forderten jeweils mindestens 90 Todesopfer: ein Tornado der Stufe F5 am 8. Juni in Flint (Michigan) und ein Tornado der Stufe F4 am 9. Juni in Worcester (Massachusetts). Diese Tornados zählen zu den tödlichsten in der Geschichte der USA und wurden von demselben Sturmsystem verursacht, das sich ostwärts über das Land bewegte. Die Tornados werden in der Öffentlichkeit auch deshalb miteinander in Verbindung gebracht, weil im Anschluss an den Tornado in Worcester kurzzeitig im US-Kongress darüber diskutiert wurde, ob die Tornados durch kürzlich in der oberen Atmosphäre durchgeführte Atombombentests verursacht worden seien. Der republikanische Kongressabgeordnete James E. Van Zandt aus Pennsylvania war einer von mehreren Kongressabgeordneten, die ihrer Überzeugung Ausdruck gaben, dass die Tornados, die weit außerhalb der üblichen Tornado-Zone auftraten, durch die Bombentests vom 4. Juni verursacht worden seien. Sie forderten eine Reaktion der Regierung. Meteorologen widerlegten diese Behauptung schnell und der Kongressabgeordnete Van Zandt widerrief seine Aussage später."
CW_Expansion_country.294.a:1 "OK"
CW_Expansion_news.294.t:0 "Tornado-Ausbruch in Flint-Worcester"
CW_Expansion_news.294.d:0 "Anfang Juni 1953 ereignete sich im Mittleren Westen und Nordosten der USA eine Serie extrem verheerender und tödlicher Tornados. Zwei davon forderten jeweils mindestens 90 Todesopfer: ein Tornado der Stufe F5 am 8. Juni in Flint (Michigan) und ein Tornado der Stufe F4 am 9. Juni in Worcester (Massachusetts). Diese Tornados zählen zu den tödlichsten in der Geschichte der USA und wurden von demselben Sturmsystem verursacht, das sich ostwärts über das Land bewegte. Die Tornados werden in der Öffentlichkeit auch deshalb miteinander in Verbindung gebracht, weil im Anschluss an den Tornado in Worcester kurzzeitig im US-Kongress darüber diskutiert wurde, ob die Tornados durch kürzlich durchgeführte Atombombentests in der oberen Atmosphäre verursacht worden seien. Der republikanische Kongressabgeordnete James E. Van Zandt aus Pennsylvania war einer von mehreren Kongressabgeordneten, die der Ansicht waren, die Tornados, die weit außerhalb der üblichen Tornado-Zone auftraten, seien durch die Bombentests vom 4. Juni verursacht worden. Sie forderten eine Reaktion der Regierung. Meteorologen widerlegten diese Behauptung schnell und der Kongressabgeordnete Van Zandt widerrief seine Aussage später."
CW_Expansion_news.294.a:1 "OK"

CW_Expansion_country.296.t:0 "Arbeiteraufstand in Ostdeutschland"
CW_Expansion_country.296.d:0 "Der Ostdeutsche Volksaufstand von 1953 war ein Aufstand, der vom 16. bis 17. Juni 1953 in Ostdeutschland stattfand. Er begann mit einem Streik von Bauarbeitern in Ostberlin am 16. Juni gegen die Arbeitsquoten während des Sowjetisierungsprozesses in Ostdeutschland. Demonstrationen in Ostberlin arteten am nächsten Tag in einen groß angelegten Aufstand gegen die Regierung der DDR und die SED aus, an dem über eine Million Menschen in etwa 700 Orten im ganzen Land teilnahmen. Proteste gegen den sinkenden Lebensstandard und die unpopuläre Sowjetisierungspolitik führten zu einer Welle von Streiks und Protesten, die nicht leicht unter Kontrolle zu bringen waren und die ostdeutsche Regierung zu stürzen drohten. Der Aufstand in Ostberlin wurde von Panzern der sowjetischen Streitkräfte in Deutschland und der Kasernierten Volkspolizei gewaltsam niedergeschlagen, während die Demonstrationen in über 500 Städten und Dörfern noch mehrere Tage andauerten, bevor sie erloschen."
CW_Expansion_country.296.a:1 "OK"
CW_Expansion_news.296.t:0 "Arbeiteraufstand in Ostdeutschland"
