CW_Expansion_country.347.t:0 "Wunder von Bern"
CW_Expansion_country.347.d:0 "Das Finale der FIFA Fussball-Weltmeisterschaft 1954™ war das letzte Spiel der FIFA Fussball-Weltmeisterschaft 1954™, der fünften Weltmeisterschaft in der FIFA-Geschichte. Das Spiel wurde am 4. Juli 1954 im Wankdorfstadion in Bern, Schweiz, ausgetragen und sah Westdeutschland, das hoch favorisierte Goldene Team aus Ungarn mit 3:2 zu besiegen. Das Finale von 1954 wird oft als eines der größten Spiele der WM-Geschichte und auch als eine der unerwartetsten Überraschungen bezeichnet. Über den Fußball hinaus schreiben einige Historiker dem Spiel einen nachhaltigen Einfluss auf die deutsche und ungarische Nachkriegsgeschichte zu. In Westdeutschland trug es zu einem Gefühl wiedererlangter internationaler Anerkennung nach dem verlorenen Zweiten Weltkrieg und der Entnazifizierung bei, in Ungarn zur Unzufriedenheit mit dem kommunistisch-autoritären Regime im Vorfeld der ungarischen Revolution von 1956. In Deutschland ist das Finale von 1954 als das Wunder von Bern bekannt."
CW_Expansion_country.347.a:1 "OK"
CW_Expansion_news.347.t:0 "Wunder von Bern"
CW_Expansion_news.347.d:0 "Das Finale der FIFA Fussball-Weltmeisterschaft 1954™ war das letzte Spiel der FIFA Fussball-Weltmeisterschaft 1954™, der fünften Weltmeisterschaft in der FIFA-Geschichte. Das Spiel wurde am 4. Juli 1954 im Wankdorfstadion in Bern, Schweiz, ausgetragen und sah Westdeutschland, das hoch favorisierte Goldene Team aus Ungarn mit 3:2 zu besiegen. Das Finale von 1954 wird oft als eines der größten Spiele der WM-Geschichte und auch als eine der unerwartetsten Überraschungen bezeichnet. Über den Fußball hinaus schreiben einige Historiker dem Spiel einen nachhaltigen Einfluss auf die deutsche und ungarische Nachkriegsgeschichte zu. In Westdeutschland trug es zu einem Gefühl wiedererlangter internationaler Anerkennung nach dem verlorenen Zweiten Weltkrieg und der Entnazifizierung bei, in Ungarn zur Unzufriedenheit mit dem kommunistisch-autoritären Regime im Vorfeld der ungarischen Revolution von 1956. In Deutschland ist das Finale von 1954 als das Wunder von Bern bekannt."
