CW_Expansion_country.507.t:0 "Aprilrevolution in Südkorea"
CW_Expansion_country.507.d:0 "Die Aprilrevolution, auch Revolution des 19. April oder Bewegung des 19. April genannt, war ein Massenprotest in Südkorea gegen Präsident Syngman Rhee und die Erste Republik vom 11. bis 26. April 1960, der zu Rhees Rücktritt führte. Proteste gegen Rhee wurden am 11. April von Studenten- und Arbeitergruppen in der südöstlichen Hafenstadt Masan gestartet. Auslöser der Proteste war die Entdeckung der Leiche eines örtlichen Gymnasiasten, der im März bei Demonstrationen gegen Wahlfälschungen von der Polizei getötet worden war. Rhees autokratische Herrschaft, Korruption, Gewaltanwendung gegen politische Opposition und die ungleichmäßige Entwicklung Südkoreas führten zu Unzufriedenheit in der Bevölkerung. Die Entdeckung in Masan führte zu großen Studentenprotesten in Seoul, die gewaltsam niedergeschlagen wurden; während der zweiwöchigen Proteste wurden insgesamt 186 Menschen getötet. Rhee trat am 26. April zurück, bevor er ins Exil in die USA floh. Sein Nachfolger wurde Yun Posun, der den Übergang zur Zweiten Republik Südkorea einleitete."
CW_Expansion_country.507.a:1 "OK"
