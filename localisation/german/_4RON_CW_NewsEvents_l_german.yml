CW_Expansion_country.329.t:0 "Schlacht von Dien Bien Phu"
CW_Expansion_country.329.d:0 "Die Schlacht von Dien Bien Phu war ein Höhepunkt des Ersten Indochinakriegs, der vom 13. März bis zum 7. Mai 1954 stattfand. Sie wurde zwischen dem kolonialen Fernost-Expeditionskorps der Französischen Union und den kommunistischen Viet Minh-Revolutionären ausgetragen. Die Vereinigten Staaten waren offiziell keine Kriegspartei, beteiligten sich jedoch heimlich an der Schlacht, indem sie der Französischen Union finanzielle und materielle Hilfe leisteten. Dazu gehörte auch die Teilnahme von amerikanischem Personal im Auftrag der CIA an der Schlacht. Auch die Volksrepublik China und die Sowjetunion leisteten den Viet Minh wichtige Unterstützung, unter anderem mit dem Großteil ihrer Artillerie und Munition."
CW_Expansion_country.329.a:1 "OK"
