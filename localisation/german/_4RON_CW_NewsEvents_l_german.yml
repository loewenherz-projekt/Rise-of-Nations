CW_Expansion_country.106.t:0 "Iranische Truppen erobern die Kurdische Republik zurück"
CW_Expansion_country.106.d:0 "Als die Unterstützung der Stämme für Qazi Muhammads Regierung schwand, blieben die Barzani-Peschmerga als einzige Streitmacht Mahabads zurück. Infolgedessen wurde die Lage Mahabads Ende 1946 aussichtslos, da selbst die versprochene sowjetische Hilfe ausblieb. Die Republik Mahabad stand vor ihrer größten Herausforderung, als iranische Streitkräfte nach der Eroberung des iranischen Aserbaidschans im Dezember 1946 Mahabad zurückerobern wollten. Obwohl es noch einigen Widerstand gab, begannen die Seiten schließlich mit Verhandlungen. Die Barzanis, einschließlich der Peschmerga und ihrer Familien, zogen sich am 15. Dezember 1946 nach Naqada zurück, und das iranische Militär marschierte in Mahabad ein, womit die einjährige Existenz der Kurdischen Republik offiziell endete."
CW_Expansion_country.106.a:1 "OK"
