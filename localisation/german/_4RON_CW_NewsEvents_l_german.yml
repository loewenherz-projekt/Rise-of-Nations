CW_Expansion_country.120.t:0 "Erster Ferrari vorgestellt"
CW_Expansion_country.120.d:0 "Das erste Auto mit Ferrari-Logo war der 125 Sport von 1947, angetrieben von einem 1,5-Liter-V12-Motor. Am 12. März unternahm Enzo Ferrari mit dem Auto seine erste Testfahrt auf offener Straße. Zwei Exemplare debütierten am 11. Mai 1947 auf der Rennstrecke von Piacenza, gefahren von Franco Cortese und Nino Farina."
