CW_Expansion_country.386.t:0 "Der erste sudanesische Bürgerkrieg beginnt"
CW_Expansion_country.386.d:0 "Der Erste Sudanesische Bürgerkrieg war ein zwölfjähriger Konflikt zwischen den nördlichen und südlichen Regionen des Sudan zwischen 1955 und 1972. Der Krieg begann ein Jahr vor der Unabhängigkeitserklärung des Sudan von Großbritannien. Die Hauptkriegsparteien waren die sudanesische Zentralregierung und die Südsudanesische Befreiungsbewegung (SSLM). Großbritannien, Ägypten und die Sowjetunion unterstützten die Zentralregierung, während die SSLM von Äthiopien, Uganda und Israel unterstützt wurde. Schätzungsweise 500.000 Menschen starben während des zwölfjährigen Konflikts."
CW_Expansion_country.386.a:1 "OK"
