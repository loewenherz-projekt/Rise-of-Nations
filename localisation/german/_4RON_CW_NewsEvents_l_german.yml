CW_Expansion_country.99.t:0 "Türkische Meerengenkrise"
CW_Expansion_country.99.d:0 "Die türkische Meerengenkrise war ein Territorialkonflikt zwischen der Sowjetunion und der Türkei während des Kalten Krieges. Die Türkei war während des größten Teils des Zweiten Weltkriegs offiziell neutral geblieben. Nach Kriegsende drängte die sowjetische Regierung die Türkei, eine gemeinsame militärische Kontrolle der Passage durch die türkischen Meerengen einzurichten, die das Schwarze Meer mit dem Mittelmeer verbinden. Als die türkische Regierung sich weigerte, stiegen die Spannungen in der Region, was zu einer Machtdemonstration der Sowjetunion und Forderungen nach territorialen Zugeständnissen entlang der georgisch-türkischen Grenze führte."
CW_Expansion_country.99.a:1 "OK"
