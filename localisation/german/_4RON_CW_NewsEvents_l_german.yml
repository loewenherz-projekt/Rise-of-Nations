CW_Expansion_country.323.t:0 "Lawinen in Österreich"
CW_Expansion_country.323.d:0 "Die Blonser Lawinen ereigneten sich im Januar 1954 in Österreich. Sie ereigneten sich im Bundesland Vorarlberg, wo sie große Auswirkungen auf die Region Großes Walsertal und insbesondere das Dorf Blons hatten. Die Lawinen ereigneten sich über einen Zeitraum von zwei Tagen ab dem 11. Januar 1954 und forderten den Tod von 125 Menschen, davon 57 in Blons. Zwei große Lawinen trafen Blons innerhalb von 9 Stunden, wobei die zweite Rettungskräfte verschüttete, die versuchten, Zivilisten vor der ersten Lawine zu retten. Die Lawinen richteten im Dorf Blons große Zerstörungen an, beschädigten ein Drittel der Wohninfrastruktur und töteten ein Drittel der Bevölkerung. Die Blonser Lawinen gelten als eine der schlimmsten Massenverschüttungen in der österreichischen Geschichte und führten zu einer der höchsten Zahlen an Lawinentoten."
CW_Expansion_country.323.a:1 "OK"
