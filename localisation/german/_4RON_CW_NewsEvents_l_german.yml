#1959 Events
CW_Expansion_country.469.t:0 "Fulgencio Batista flieht aus Havanna"
CW_Expansion_country.469.d:0 "Am 1. Januar 1959 flieht der kubanische Diktator Fulgencio Batista angesichts einer Volksrevolution unter Fidel Castros Bewegung des 26. Juli aus dem Inselstaat. Inmitten von Feierlichkeiten und Chaos in der kubanischen Hauptstadt Havanna diskutieren die USA, wie sie am besten mit dem radikalen Castro und den bedrohlichen Anzeichen eines Antiamerikanismus in Kuba umgehen sollten."
