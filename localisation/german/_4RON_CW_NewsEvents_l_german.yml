CW_Expansion_country.512.t:0 "Mossad-Agenten entführen Adolf Eichmann"
CW_Expansion_country.512.d:0 "„Un momentito, Señor.“ Das waren die einzigen drei Worte, die der israelische Geheimdienstmitarbeiter Peter Malkin auf Spanisch konnte, doch sie sollten den Lauf der Geschichte verändern. Malkin sagte diese Worte am 11. Mai 1960 zu einem glatzköpfigen Mercedes-Benz-Fabrikarbeiter, als dieser auf dem Heimweg von der Arbeit war. Und als der Mann ihn widerstrebend grüßte, schritt Malkin zur Tat. Mit der Hilfe dreier anderer Geheimagenten rang er den Mann zu Boden und in ein Auto. Als sie davonbrausten, fesselten sie ihn und deckten ihn auf dem Rücksitz mit einer Decke zu. Dies war keine gewöhnliche Entführung. Der Mann auf dem Rücksitz war einer der berüchtigtsten Kriegsverbrecher der Welt: Adolf Eichmann, ein Nazi-Funktionär, der Deutschland im Zweiten Weltkrieg beim Massenmord an sechs Millionen Juden half. Jahrelang hatte er sich den Behörden entzogen und in relativem Frieden in Argentinien gelebt. Nun befand er sich in der Obhut des Mossad, des israelischen Geheimdienstes – und seine einst geheimen Verbrechen würden bald öffentlich bekannt werden."
CW_Expansion_country.512.a:1 "OK"
