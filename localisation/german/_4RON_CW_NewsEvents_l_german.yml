CW_Expansion_country.403.t:0 "20. Parteitag der KPdSU"
CW_Expansion_country.403.d:0 "Der 20. Parteitag der Kommunistischen Partei der Sowjetunion fand vom 14. bis 25. Februar 1956 statt. Er ist vor allem für die „Geheimrede“ des Ersten Sekretärs Nikita Chruschtschow bekannt, in der er den Personenkult und die Diktatur Josef Stalins anprangerte. Die Delegierten dieses Parteitags der Kommunistischen Partei der Sowjetunion wurden nicht vorgewarnt, was sie erwarten würde. Tatsächlich wurde die Veranstaltung mit dem Aufruf des Ersten Sekretärs Chruschtschow eröffnet, sich zum Gedenken an die seit dem letzten Parteitag verstorbenen kommunistischen Führer zu erheben, wobei er Stalin in einem Atemzug mit Klement Gottwald nannte. Hinweise auf eine neue Richtung kamen erst im Laufe der nächsten zehn Tage nach und nach durchsickern, was bei den Anwesenden für große Verwirrung sorgte. Der polnische kommunistische Führer Bolesław Bierut starb kurz nach seiner Teilnahme am 20. Parteitag in Moskau. Der Parteitag wählte das 20. Zentralkomitee."
CW_Expansion_country.403.a:1 "OK"
CW_Expansion_news.403.t:0 "20. Parteitag der KPdSU"
