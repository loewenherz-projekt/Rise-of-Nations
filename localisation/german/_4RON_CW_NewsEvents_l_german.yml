#1957 Events
CW_Expansion_country.436.t:0 "Anthony Eden tritt zurück"
CW_Expansion_country.436.d:0 "Sir Anthony Eden ist aus gesundheitlichen Gründen als britischer Premierminister zurückgetreten. In einer heute um 19:00 Uhr GMT veröffentlichten Erklärung des Buckingham Palace hieß es, Ihre Majestät habe nach einer Privataudienz bei der Königin den Rücktritt des Premierministers angenommen. Sir Anthony selbst gab am Abend folgende Erklärung ab: „Als ich vor einem Monat in dieses Land zurückkehrte, hoffte ich, dass meine Gesundheit so weit wiederhergestellt wäre, dass ich meine Pflichten für längere Zeit effektiv erfüllen könnte. Diese Hoffnung hat sich nicht erfüllt. Ich halte es nicht für richtig, mein Amt als Erster Minister der Königin fortzusetzen, da ich weiß, dass ich nicht in der Lage sein werde, meine Pflicht gegenüber meiner Souveränin und dem Land in vollem Umfang zu erfüllen.“"
CW_Expansion_country.436.a:1 "OK"
