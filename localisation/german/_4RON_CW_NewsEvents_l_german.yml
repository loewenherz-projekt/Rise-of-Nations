CW_Expansion_country.140.d:0 "Die „Schuhfabrik Rudolf Dassler (RUDA)“ wurde im Januar 1948 als Gewerbe angemeldet und nahm wenige Monate später, am 1. Juni 1948, den Betrieb auf. Bis zur Geburt der Marke PUMA dauerte es noch weitere vier Monate: Am 1. Oktober 1948 wurde „PUMA“ beim Deutschen Patent- und Markenamt eingetragen."
