CW_Expansion_country.421.t:0 "Schachspiel des Jahrhunderts"
CW_Expansion_country.421.d:0 "Die Partie des Jahrhunderts ist eine Schachpartie, die der damals 13-jährige spätere Weltmeister Bobby Fischer am 17. Oktober 1956 beim Rosenwald Memorial Tournament im Marshall Chess Club in New York City gegen Donald Byrne gewann. Hans Kmoch nannte sie in Chess Review „Die Partie des Jahrhunderts“ und schrieb: „Die folgende Partie, ein atemberaubendes Meisterwerk des Kombinationsspiels, das ein 13-jähriger Junge gegen einen beeindruckenden Gegner vorführt, entspricht den besten Leistungen, die jemals in der Geschichte der Schachwunderkinder verzeichnet wurden.“"
CW_Expansion_country.421.a:1 "OK"
