CW_Expansion_country.278.t:0 "Peter Pan Filmpremieren"
CW_Expansion_country.278.d:0 "Peter Pan ist ein US-amerikanischer Zeichentrickfilm aus dem Jahr 1953, der von Walt Disney Productions produziert wurde und auf dem Theaterstück Peter Pan oder Der Junge, der nicht erwachsen werden wollte von J.M. Barrie aus dem Jahr 1904 basiert. Unter der Regie von Clyde Geronimi, Hamilton Luske und Wilfred Jackson ist es der 14. Zeichentrickfilm von Disney. Mit den Stimmen von Bobby Driscoll, Kathryn Beaumont, Hans Conried, Paul Collins, Heather Angel und Bill Thompson handelt der Film von einer Gruppe von Kindern, die Peter Pan treffen und auf die Insel Nimmerland reisen, um jung zu bleiben, wo Peter auch versucht, Captain Hook zu entkommen."
CW_Expansion_country.278.a:1 "OK"
