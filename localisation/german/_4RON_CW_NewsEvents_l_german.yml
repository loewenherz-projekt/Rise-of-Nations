CW_Expansion_country.107.t:0 "Winter 1946–47"
CW_Expansion_country.107.d:0 "Der Winter 1946/47 war ein strenger Winter in Europa, der für seine verheerenden Auswirkungen auf Großbritannien bekannt war. Er führte zu erheblichen wirtschaftlichen und sozialen Problemen in einem Land, das sich noch immer vom Zweiten Weltkrieg erholte. Es kam zu massiven Störungen der Energieversorgung von Haushalten, Büros und Fabriken. Viehherden erfroren oder verhungerten. Die Menschen litten unter der anhaltenden Kälte, und viele Unternehmen mussten vorübergehend schließen. Als das warme Wetter zurückkehrte, taute das Eis und in den meisten tiefer gelegenen Gebieten kam es zu schweren Überschwemmungen."
CW_Expansion_country.107.a:1 "OK"
