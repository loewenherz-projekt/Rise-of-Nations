CW_Expansion_country.443.t:0 "Ägypten eröffnet den Suezkanal wieder"
CW_Expansion_country.443.d:0 "Nach dem Rückzug Israels aus dem besetzten ägyptischen Gebiet wird der Suezkanal wieder für den internationalen Verkehr geöffnet. Allerdings war der Kanal nach der Suezkrise so stark mit Trümmern übersät, dass ägyptische und UN-Mitarbeiter wochenlang aufräumten, bevor größere Schiffe den Kanal wieder befahren konnten."
