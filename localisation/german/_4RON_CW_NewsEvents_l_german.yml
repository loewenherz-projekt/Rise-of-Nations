CW_Expansion_country.97.t:0 "Referendum zur griechischen Monarchie"
CW_Expansion_country.97.d:0 "Das Referendum war das vierte seit 1920 über die Monarchie des Landes. Die Parlamentswahlen von 1946, bei denen die rechten Parteien einen Erdrutschsieg errangen, hatten gerade stattgefunden. Die neue konservative Regierung von Konstantinos Tsaldaris war Georg II. wohlgesonnen, doch was das Ergebnis stärker beeinflusste, war die Atmosphäre eines drohenden Bürgerkriegs."
CW_Expansion_country.97.a:1 "OK"
