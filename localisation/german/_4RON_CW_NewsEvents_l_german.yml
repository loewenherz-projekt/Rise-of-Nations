CW_Expansion_country.522.t:0 "Hurrikan Donna fordert 50 Todesopfer"
CW_Expansion_country.522.d:0 "Hurrikan Donna, in Puerto Rico als Hurrikan San Lorenzo bekannt, war der stärkste Hurrikan der atlantischen Hurrikansaison 1960 und richtete im August und September schwere Schäden auf den Kleinen und Großen Antillen sowie an der Ostküste der USA, insbesondere in Florida, an. Donna, der fünfte tropische Wirbelsturm, dritte Hurrikan und erste schwere Hurrikan der Saison, entwickelte sich am 29. August südlich der Kapverden. Auslöser war eine tropische Welle, der 63 Todesopfer bei einem Flugzeugabsturz im Senegal zugeschrieben wurden. Das Tiefdruckgebiet verstärkte sich am folgenden Tag zum tropischen Sturm Donna. Donna bewegte sich mit etwa 32 km/h west-nordwestwärts und erreichte am 1. September Hurrikanstärke. In den folgenden drei Tagen verstärkte sich Donna deutlich und erreichte am 4. September maximale anhaltende Windgeschwindigkeiten von 210 km/h. Danach behielt er seine Intensität bei, als er später am selben Tag die Kleinen Antillen traf. Auf Sint Maarten machte der Sturm ein Viertel der Inselbevölkerung obdachlos und tötete sieben Menschen. Weitere fünf Todesfälle wurden in Anguilla gemeldet, und auf den Jungferninseln gab es sieben weitere Todesopfer. In Puerto Rico forderten schwere Sturzfluten 107 Todesopfer, davon 85 allein in Humacao."
CW_Expansion_country.522.a:1 "OK"
