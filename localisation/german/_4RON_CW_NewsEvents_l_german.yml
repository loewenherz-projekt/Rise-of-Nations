CW_Expansion_country.231.t:0 "Abdullah I. von Jordanien wird ermordet"
CW_Expansion_country.231.d:0 "Am 16. Juli 1951 wurde Riad Bey Al Solh, ein ehemaliger Premierminister des Libanon, in Amman ermordet, wo Gerüchte kursierten, der Libanon und Jordanien würden über einen gemeinsamen Separatfrieden mit Israel verhandeln. 96 Stunden später, am 20. Juli 1951, wurde Abdullah bei einem Besuch der Al-Aqsa-Moschee in Jerusalem von einem Palästinenser aus dem Husseini-Clan erschossen, der offenbar strenge Sicherheitsvorkehrungen passiert hatte."
CW_Expansion_country.231.a:1 "OK"
