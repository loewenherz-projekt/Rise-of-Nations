CW_Expansion_country.307.t:0 "USA schicken 382 Schiffe nach Westdeutschland zurück"
CW_Expansion_country.307.d:0 "Die Vereinigten Staaten geben 382 im Zweiten Weltkrieg erbeutete Schiffe an Westdeutschland zurück."
CW_Expansion_country.307.a:1 "OK"
