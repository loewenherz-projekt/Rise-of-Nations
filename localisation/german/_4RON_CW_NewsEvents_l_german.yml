CW_Expansion_country.96.t:0 "Der Sieg der Kommunisten in der Tschechoslowakei"
CW_Expansion_country.96.d:0 "Am 26. Mai 1946 fanden in der Tschechoslowakei Parlamentswahlen statt. Die Kommunistische Partei der Tschechoslowakei wurde mit 38 % der abgegebenen Stimmen stärkste Partei und errang 114 der 300 Sitze (93 für die Hauptpartei und 21 für ihren slowakischen Zweig). Der Stimmenanteil der Kommunisten war höher als je zuvor bei einer tschechoslowakischen Parlamentswahl; zuvor hatte keine Partei mehr als 25 % erreicht. Die Wahlbeteiligung lag bei 93,9 %. Das nationale Ergebnis bestimmte auch die Zusammensetzung des Slowakischen Nationalrats und der lokalen Ausschüsse."
CW_Expansion_country.96.a:1 "OK"
