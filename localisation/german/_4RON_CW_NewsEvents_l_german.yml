CW_Expansion_country.301.t:0 "Koreanisches Waffenstillstandsabkommen"
CW_Expansion_country.301.d:0 "Das koreanische Waffenstillstandsabkommen war ein Waffenstillstand, der eine vollständige Einstellung der Feindseligkeiten im Koreakrieg herbeiführte. Es wurde von Generalleutnant William Harrison Jr. und General Mark W. Clark der US-Armee als Vertreter des UN-Kommandos (UNC), dem nordkoreanischen Führer Kim Il-sung und General Nam Il als Vertreter der Koreanischen Volksarmee (KPA) sowie Peng Dehuai als Vertreter der Chinesischen Volksfreiwilligenarmee (PVA) unterzeichnet. Der Waffenstillstand wurde am 27. Juli 1953 unterzeichnet und sollte „eine vollständige Einstellung der Feindseligkeiten und aller Waffengewaltakte in Korea sicherstellen, bis eine endgültige friedliche Lösung erreicht ist“."
CW_Expansion_country.301.a:1 "OK"
CW_Expansion_news.301.t:0 "Koreanisches Waffenstillstandsabkommen"
CW_Expansion_news.301.d:0 "Das koreanische Waffenstillstandsabkommen war ein Waffenstillstand, der eine vollständige Einstellung der Feindseligkeiten im Koreakrieg herbeiführte. Es wurde von Generalleutnant William Harrison Jr. und General Mark W. Clark der US-Armee als Vertreter des UN-Kommandos (UNC), dem nordkoreanischen Führer Kim Il-sung und General Nam Il als Vertreter der Koreanischen Volksarmee (KPA) sowie Peng Dehuai als Vertreter der Chinesischen Volksfreiwilligenarmee (PVA) unterzeichnet. Der Waffenstillstand wurde am 27. Juli 1953 unterzeichnet und sollte „eine vollständige Einstellung der Feindseligkeiten und aller Waffengewaltakte in Korea sicherstellen, bis eine endgültige friedliche Lösung erreicht ist“."
CW_Expansion_news.301.a:1 "OK"

CW_Expansion_country.302.t:0 "Operation Großer Schalter"
CW_Expansion_country.302.d:0 "Die Operation Big Switch zielte auf die Rückführung aller verbliebenen Gefangenen des Koreakriegs ab. Seit 1951 fanden Waffenstillstandsgespräche zwischen Nordkorea, China und den Streitkräften des UN-Kommandos (UNC) statt. Hauptstreitpunkt war die Rückführung aller Gefangenen in ihre Heimatländer gemäß Artikel 118 der Genfer Konvention von 1949. China und Nordkorea forderten eine Zwangsrepatriierung der Gefangenen gemäß der Genfer Konvention, doch das UNC bestand darauf, dass Gefangene, die an ihrem Aufenthaltsort bleiben wollten, dies tun durften. Nach zwei Jahren der Verhandlungen gaben China und Nordkorea in diesem Punkt nach, und am 27. Juli 1953 wurde das koreanische Waffenstillstandsabkommen unterzeichnet."
CW_Expansion_country.302.a:1 "OK"
CW_Expansion_news.302.t:0 "Operation Großer Schalter"
