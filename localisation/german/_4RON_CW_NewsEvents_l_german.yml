CW_Expansion_country.440.t:0 "Absturz einer Cebu Douglas C-47"
CW_Expansion_country.440.d:0 "Am 17. März 1957 stürzte ein Transportflugzeug vom Typ C-47 Skytrain an den Hängen des Mount Manunggal auf der philippinischen Insel Cebu ab. Bei dem Absturz kamen 25 der 26 Insassen des Flugzeugs ums Leben, darunter der amtierende Präsident der Philippinen, Ramon Magsaysay. Unter den Todesopfern waren auch mehrere hochrangige philippinische Minister, Militärs und Journalisten. Der einzige Überlebende war der Reporter des Philippine Herald, Nestor Mata."
CW_Expansion_country.440.a:1 "OK"
