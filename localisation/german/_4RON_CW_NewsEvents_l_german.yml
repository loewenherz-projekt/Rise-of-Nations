CW_Expansion_country.333.t:0 "Akademie der US-Luftwaffe"
CW_Expansion_country.333.d:0 "Die Gründung der US Air Force Academy am 1. April 1954 war der Höhepunkt einer jahrelangen Idee. Schon lange bevor die Air Force eine eigenständige Teilstreitkraft wurde, argumentierten führende Vertreter der Luftstreitkräfte, dass sie eine Schule für den Luftkrieg brauchten, um Flieger auszubilden. Nach der Gründung der Air Force als eigenständige Teilstreitkraft im September 1947 erhielt diese Idee endlich die Legitimität der neuen Teilstreitkraft."
CW_Expansion_country.333.a:1 "OK"
