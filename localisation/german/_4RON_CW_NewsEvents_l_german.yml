CW_Expansion_country.236.t:0 "ANZUS-Vertrag zur gegenseitigen Verteidigung"
CW_Expansion_country.236.d:0 "Der Sicherheitsvertrag zwischen Australien, Neuseeland und den Vereinigten Staaten (ANZUS oder ANZUS-Vertrag) ist ein unverbindliches kollektives Sicherheitsabkommen aus dem Jahr 1951 zwischen Australien und Neuseeland sowie, separat, Australien und den Vereinigten Staaten. Es sieht die militärische Zusammenarbeit im Pazifikraum vor. Heute wird der Vertrag jedoch auf Konflikte weltweit angewendet. Er sieht vor, dass ein bewaffneter Angriff auf eine der drei Parteien eine Gefahr für die anderen darstellen würde und dass jede Partei Maßnahmen ergreifen sollte, um der gemeinsamen Bedrohung zu begegnen. Er richtete einen Ausschuss der Außenminister ein, der zu Konsultationen zusammentreten kann."
CW_Expansion_country.236.a:1 "OK"
CW_Expansion_news.236.t:0 "ANZUS-Vertrag zur gegenseitigen Verteidigung"
