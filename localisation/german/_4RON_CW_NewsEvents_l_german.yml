CW_Expansion_country.484.t:0 "Erstes Little Caesars Pizza Restaurant eröffnet"
CW_Expansion_country.484.d:0 "1959 eröffneten Mike und Marian Ilitch das erste Little Caesars – das auch Spaghetti, Garnelen, Hühnchen und Fisch anbot – in einem Einkaufszentrum in Michigan in der Cherry Hill Road 32594 in Garden City. Mike wollte es „Pizza Cheap“ nennen, aber der Vorschlag „Little Caesars Pizza“ setzte sich als erster Name durch."
