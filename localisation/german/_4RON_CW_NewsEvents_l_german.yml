CW_Expansion_country.481.t:0 "Dalai Lama kommt in Indien an"
CW_Expansion_country.481.d:0 "Die chinesischen Kommunisten erklärten heute, der Dalai Lama habe am Dienstag in Indien Zuflucht gefunden. Sie deuteten an, er sei mit indischer Genehmigung eingetroffen. In der Meldung über den Pekinger Radiosender hieß es, der tibetische Führer sei „unter Zwang“ indischen Boden erreicht. „Man hat erfahren, dass der Dalai Lama unter dem Druck rebellischer Elemente nun nach Indien eingereist ist“, hieß es in der Pekinger Sendung. „Journalisten aus den USA und Großbritannien versuchen, ihn zu interviewen.“ „Der Dalai Lama und andere sind am 31. März in Indien angekommen. Die indische Grenzpolizei ist aus Towang aufgebrochen, um ihn zu treffen.“"
CW_Expansion_country.481.a:1 "OK"
