CW_Expansion_country.206.t:0 "Chinesische Intervention im Koreakrieg"
CW_Expansion_country.206.d:0 "Ende Oktober 1950 entsandte die Volksrepublik China rund 260.000 Soldaten in den Kampf nach Nordkorea. Die ursprüngliche Entscheidung Chinas, in den Korea-Konflikt einzugreifen, basierte auf einer falschen Einschätzung des amerikanischen Engagements, die kommunistische Expansion zu stoppen."
