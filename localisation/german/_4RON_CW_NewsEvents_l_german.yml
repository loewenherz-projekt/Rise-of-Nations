CW_Expansion_country.429.t:0 "Niederschlagung der ungarischen Revolution"
CW_Expansion_country.429.d:0 "Am 4. November 1956 rollten sowjetische Panzer in Budapest ein, um den Volksaufstand ein für alle Mal niederzuschlagen. Es kam zu heftigen Straßenkämpfen, doch die Übermacht der Sowjets sicherte den Sieg. Um 5:20 Uhr verkündete der ungarische Ministerpräsident Imre Nagy der Nation in einer düsteren 35-sekündigen Ansprache den Einmarsch und erklärte: „Unsere Truppen kämpfen. Die Regierung ist an der Macht.“ Doch innerhalb weniger Stunden beantragte Nagy Asyl bei der jugoslawischen Botschaft in Budapest. Kurz darauf wurde er gefangen genommen und zwei Jahre später hingerichtet. Nagys ehemaliger Kollege und künftiger Nachfolger, János Kádár, der heimlich aus Moskau in die 96 Kilometer südöstlich der Hauptstadt gelegene Stadt Szolnok eingeflogen worden war, bereitete sich mit Moskaus Unterstützung auf die Machtübernahme vor."
CW_Expansion_country.429.a:1 "OK"
