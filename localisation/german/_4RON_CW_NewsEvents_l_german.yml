CW_Expansion_country.156.t:0 "Amerikas erster Massenmord"
CW_Expansion_country.156.d:0 "Wenige Stunden später, am Morgen des 6. September, begann Unruh seinen „Walk of Death“. Bei einem zwanzigminütigen Amoklauf ermordete er 13 Menschen und verletzte drei weitere, bevor er nach einem gefährlichen Feuergefecht von der Polizei abgeführt wurde. Unruh, ein Mann, der außerhalb von Kriminologenkreisen und bei den Einheimischen in Vergessenheit geriet, war ein frühes Kapitel in der tragischerweise nur allzu bekannten amerikanischen Geschichte eines wütenden Mannes mit einer Waffe, der ein Blutbad anrichtete."
CW_Expansion_country.156.a:1 "OK"
