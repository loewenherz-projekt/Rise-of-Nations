CW_Expansion_news.123.a:1 "OK"

CW_Expansion_country.124.t:0 "Erste im Fernsehen übertragene Ansprache des Weißen Hauses"
CW_Expansion_country.124.d:0 "An diesem Tag im Jahr 1947 hielt Präsident Harry S. Truman die erste im Fernsehen übertragene Ansprache aus dem Weißen Haus. In den folgenden Jahrzehnten markierte seine Rede den Beginn einer sich entwickelnden Beziehung zwischen dem Weißen Haus und einem Medium, das das Präsidentenamt maßgeblich beeinflussen sollte – von der Wahlkampfführung der Kandidaten für das höchste Amt der Nation bis hin zur Art und Weise, wie Präsidenten mit den Amerikanern und der Welt kommunizieren."
CW_Expansion_country.124.a:1 "OK"
