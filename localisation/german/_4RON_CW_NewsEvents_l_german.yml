CW_Expansion_news.187.a:1 "OK"

CW_Expansion_country.188.t:0 "Verteidigung Südkoreas"
CW_Expansion_country.188.d:0 "Am 27. Juni 1950 traten die Vereinigten Staaten offiziell in den Koreakrieg ein. Die USA unterstützten die Republik Korea bei der Abwehr einer Invasion aus der Demokratischen Volksrepublik Korea."
CW_Expansion_country.188.a:1 "OK"
CW_Expansion_news.188.t:0 "Amerikanische Streitkräfte unterstützen die Verteidigung Südkoreas"
CW_Expansion_news.188.d:0 "Am 27. Juni 1950 traten die Vereinigten Staaten offiziell in den Koreakrieg ein. Die USA unterstützten die Republik Korea bei der Abwehr einer Invasion aus der Demokratischen Volksrepublik Korea."
CW_Expansion_news.188.a:1 "OK"

CW_Expansion_country.189.t:0 "Nordkoreanische Streitkräfte erobern Seoul"
CW_Expansion_country.189.d:0 "Die Erste Schlacht um Seoul, in der nordkoreanischen Geschichtsschreibung als „Befreiung von Seoul“ bekannt, war die Eroberung der südkoreanischen Hauptstadt Seoul durch Nordkorea zu Beginn des Koreakrieges. Am 25. Juni 1950 überquerten Truppen der Koreanischen Volksarmee (KVA) den 38. Breitengrad und marschierten in Südkorea ein. Die KVA führte einen Blitzkrieg mit T-34-Panzern und Artillerieunterstützung durch. Die Armee der Republik Korea (ROKA) hatte keine Möglichkeit, den Panzerangriff aufzuhalten, da sie weder über Panzerabwehrwaffen noch über Panzer verfügte."
CW_Expansion_country.189.a:1 "OK"
CW_Expansion_news.189.t:0 "Nordkoreanische Streitkräfte erobern Seoul"
CW_Expansion_news.189.d:0 "Die Erste Schlacht um Seoul, in der nordkoreanischen Geschichtsschreibung als „Befreiung von Seoul“ bekannt, war die Eroberung der südkoreanischen Hauptstadt Seoul durch Nordkorea zu Beginn des Koreakrieges. Am 25. Juni 1950 überquerten Truppen der Koreanischen Volksarmee (KVA) den 38. Breitengrad und marschierten in Südkorea ein. Die KVA führte einen Blitzkrieg mit T-34-Panzern und Artillerieunterstützung durch. Die Armee der Republik Korea (ROKA) hatte keine Möglichkeit, den Panzerangriff aufzuhalten, da sie weder über Panzerabwehrwaffen noch über Panzer verfügte."
CW_Expansion_news.189.a:1 "OK"

CW_Expansion_country.190.t:0 "Bombenanschlag auf die Hangang-Brücke"
CW_Expansion_country.190.d:0 "Der Bombenanschlag auf die Hangang-Brücke war eine Sprengaktion der südkoreanischen Armee am 28. Juni 1950, um die Hangang-Brücke in Seoul, Südkorea, zu zerstören und den schnellen Vormarsch Nordkoreas auf die Stadt zu verzögern. Am 25. Juni desselben Jahres marschierte Nordkorea in Südkorea ein und löste damit den Koreakrieg aus. Die nordkoreanischen Angriffstruppen und unterstützenden Panzer überwältigten die leicht bewaffnete und schlecht ausgerüstete südkoreanische Armee mühelos und standen innerhalb von zwei Tagen in unmittelbarer Nähe von Seoul."
CW_Expansion_country.190.a:1 "OK"
CW_Expansion_news.190.t:0 "Bombenanschlag auf die Hangang-Brücke"
CW_Expansion_news.190.d:0 "Der Bombenanschlag auf die Hangang-Brücke war eine Sprengaktion der südkoreanischen Armee am 28. Juni 1950, um die Hangang-Brücke in Seoul, Südkorea, zu zerstören und den schnellen Vormarsch Nordkoreas auf die Stadt zu verzögern. Am 25. Juni desselben Jahres marschierte Nordkorea in Südkorea ein und löste damit den Koreakrieg aus. Die nordkoreanischen Angriffstruppen und unterstützenden Panzer überwältigten die leicht bewaffnete und schlecht ausgerüstete südkoreanische Armee mühelos und standen innerhalb von zwei Tagen in unmittelbarer Nähe von Seoul."
CW_Expansion_news.190.a:1 "OK"

CW_Expansion_country.191.t:0 "Massaker im Seoul National University Hospital"
CW_Expansion_country.191.d:0 "Das Massaker am Seoul National University Hospital war ein Massaker der Koreanischen Volksarmee (KVA) am 28. Juni 1950 im Seoul National University Hospital im südkoreanischen Distrikt Seoul an 700 bis 900 Ärzten, Krankenschwestern, stationär behandelten Zivilisten und verwundeten Soldaten. Während der Ersten Schlacht um Seoul vernichtete die KVA am 28. Juni 1950 einen Zug, der das Seoul National University Hospital bewachte. Sie massakrierte medizinisches Personal, stationär behandelte Patienten und verwundete Soldaten. Die Koreanische Volksarmee erschoss die Menschen oder begrub sie bei lebendigem Leib. Allein die Zahl der zivilen Opfer betrug 900. Nach Angaben des südkoreanischen Verteidigungsministeriums befanden sich unter den Opfern 100 verwundete südkoreanische Soldaten."
CW_Expansion_country.191.a:1 "OK"
CW_Expansion_news.191.t:0 "Massaker im Seoul National University Hospital"
