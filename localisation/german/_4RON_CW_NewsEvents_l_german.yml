CW_Expansion_country.511.t:0 "Erste Unterwasserumrundung der Erde"
CW_Expansion_country.511.d:0 "Triton, ein US-amerikanisches Atom-U-Boot, das als erstes Schiff die Welt unter Wasser umrundete. Die Triton absolvierte ihre Weltumrundung auf ihrer Jungfernfahrt und begann ihre Mission offiziell am 24. Februar 1960 mitten im Atlantik."
