CW_Expansion_country.306.t:0 "Französische Regierung stürzt König Mohammed V. von Marokko"
CW_Expansion_country.306.d:0 "Am 20. August 1953 (dem Vorabend des Opferfestes) zwangen die französischen Kolonialbehörden Mohammed V., ein wichtiges Nationalsymbol der wachsenden marokkanischen Unabhängigkeitsbewegung, mit seiner Familie ins Exil nach Korsika. Sein Cousin zweiten Grades, Mohammed Ben Aarafa, der „französische Sultan“, wurde zum Marionettenmonarchen ernannt und auf den Thron gesetzt. Als Reaktion darauf verübte Muhammad Zarqtuni am Heiligabend desselben Jahres einen Bombenanschlag auf den Zentralmarkt von Casablanca."
CW_Expansion_country.306.a:1 "OK"
CW_Expansion_news.306.t:0 "Französische Regierung stürzt König Mohammed V. von Marokko"
