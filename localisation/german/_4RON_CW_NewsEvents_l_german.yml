CW_Expansion_country.227.t:0 "Siebzehn-Punkte-Vereinbarung"
CW_Expansion_country.227.d:0 "Das Siebzehn-Punkte-Abkommen ist eine Kurzform des Abkommens der Zentralen Volksregierung und der Lokalregierung Tibets über Maßnahmen zur friedlichen Befreiung Tibets oder des Siebzehn-Punkte-Abkommens zur friedlichen Befreiung Tibets, das am 23. Mai 1951 von den Bevollmächtigten der tibetischen Regierung in Lhasa und den Bevollmächtigten der Zentralen Volksregierung unterzeichnet und am 24. Oktober 1951 vom 14. Dalai Lama in Form eines Telegramms ratifiziert wurde."
