ron_coupnews.7.t:0 "Das Ende der Apartheid"
ron_coupnews.7.d:0 "Südafrikas Ära als internationaler Paria ist vorbei. Heute Abend heben Kanada und andere Nationen die meisten der verbleibenden Sanktionen gegen Südafrika auf und heißen das Land wieder in der internationalen Gemeinschaft willkommen. Sie tun dies auf Geheiß von Nelson Mandela und Präsident FW de Klerk, die die Staats- und Regierungschefs der Welt auffordern, die Fortschritte Südafrikas auf dem Weg zu einer multiethnischen Demokratie anzuerkennen. Und sie bemühen sich um finanzielle Mittel, um den Weg zu ebnen, damit die Welt ein „zweites Somalia, ein zweites Bosnien“ vermeiden kann."
ron_coupnews.7.a:1 "OK"

ron_coupnews.8.t:0 "Bokassa zum Kaiser gekrönt"
ron_coupnews.8.d:0 "Die Krönung Bokassas I. zum Kaiser von Zentralafrika fand am 4. Dezember 1977 in einem Sportstadion in Bangui, der Hauptstadt des Zentralafrikanischen Reiches, statt. Es war die einzige Krönung in der Geschichte des Reiches – eines kurzlebigen Einparteienstaates und einer selbsternannten Monarchie –, das 1976 von Jean-Bédel Bokassa, dem Militärdiktator und Präsidenten auf Lebenszeit der Zentralafrikanischen Republik, gegründet wurde. Die Krönung – die fast eine exakte Kopie der Krönung Napoleons I. zum Kaiser der Franzosen im Jahr 1804 war – und die damit verbundenen Ereignisse waren von Luxus und Pomp geprägt. Trotz erheblicher materieller Unterstützung aus Frankreich beliefen sich die Kosten auf über 20 Millionen US-Dollar (heute 80 Millionen Dollar) und fügten dem Staat schweren Schaden zu, was in Afrika und weltweit zu enormen Empörung führte."
ron_coupnews.8.a:1 "Ist er verrückt geworden?"

ron_coupnews.9.t:0 "Putsch in [From.GetName]"
ron_coupnews.9.d:0 "Der chilenische Staatsstreich von 1973 war ein Militärputsch in Chile, der die Regierung der Unidad Popular von Präsident Salvador Allende stürzte. Nach einer längeren Phase sozialer Unruhen und politischer Spannungen zwischen dem oppositionskontrollierten Kongress und dem sozialistischen Präsidenten sowie einem von US-Präsident Richard Nixon angeordneten Wirtschaftskrieg ergriff am 11. September 1973 eine Gruppe von Militärs unter der Führung von General Augusto Pinochet und Admiral José Toribio Merino in einem Putsch die Macht und beendete die Zivilherrschaft. Das Militär errichtete eine Junta, die alle politischen Aktivitäten in Chile einstellte und linke Bewegungen, insbesondere kommunistische und sozialistische Parteien sowie die Bewegung der Revolutionären Linken (MIR), unterdrückte. Pinochet erlangte innerhalb eines Jahres nach dem Putsch die absolute Macht und wurde Ende 1974 offiziell zum Präsidenten Chiles ernannt."
ron_coupnews.9.a:1 "OK"

ron_coupnews.10.t:0 "Putsch in Peru"
ron_coupnews.10.d:0 "Studenten kämpfen in Lima, Peru, mit Truppen nach dem Militärputsch, der die Regierung von Präsident Fernando Belaunde Terry stürzte. Die Junta scheint die Macht fest im Griff zu haben. Belaunde beantragt politisches Asyl in Buenos Aires. Die Opposition wirft der Regierung Korruption bei der Abwicklung eines neuen Ölvertrags mit einem amerikanischen Unternehmen vor."
ron_coupnews.10.a:1 "OK"

ron_coupnews.11.t:0 "Putsch in der Libyschen Republik ausgerufen"
ron_coupnews.11.d:0 "Die libysche Armee hat die Regierung in Libyen übernommen und die Republik ausgerufen, berichtete die italienische Nachrichtenagentur ANSA heute unter Berufung auf Radio Bengasi. Der Putsch ereignete sich, als König Idris in der Türkei weilte. Angeführt wurde er offenbar von einer Gruppe linker Armee- und Luftwaffenoffiziere, die umgehend einen Revolutionsrat zur Regierung des Landes einsetzten. Generalmajor Sadduddin Shuwier wurde zum Vorsitzenden ernannt. Die Radiosender in Tripolis und Bengasi schallten sozialistische Parolen und verkündeten, die Revolution stehe für „arabische Einheit, Sozialismus und Freiheit“. Der libysche Rundfunk sendete eine Botschaft an das Volk mit den Worten: „Ihr habt soeben einen eurer alten Träume verwirklicht: die Entstehung einer Sozialistischen Republik ...“"
ron_coupnews.11.a:1 "OK"

ron_coupnews.12.t:0 "Militärputsch in Uganda"
ron_coupnews.12.d:0 "„Angesichts der äußerst schlechten Lage, die das letzte Regime hinterlassen hat, sind wir uns völlig darüber im Klaren, dass unsere Regierung unter Seiner Exzellenz Generalmajor Idi Amin Dada vor einer großen Aufgabe steht. Das öffentliche Leben muss in Ordnung gebracht und die Wirtschaft auf eine solide Basis gestellt werden. Darüber hinaus muss die Bevölkerung Ugandas dazu erzogen werden, Uganda als Ganzes zu denken und einander im Geiste der Brüderlichkeit, Einheit und Gleichheit zu lieben und zu respektieren. Wir haben daher beschlossen, dass unsere Regierung unter Seiner Exzellenz Generalmajor Idi-Amin Dada mindestens fünf Jahre an der Macht bleiben soll. Wir glauben, dass am Ende dieses Zeitraums nationale Wahlen organisiert und in einer Zeit der Ruhe und des gegenseitigen Respekts abgehalten werden könnten...“ – Offiziere und Soldaten der ugandischen Armee und Luftwaffe"
ron_coupnews.12.a:1 "Was könnte möglicherweise schiefgehen?"

ron_coupnews.13.t:0 "Militärputsch in Argentinien"
ron_coupnews.13.d:0 "„Wir weisen darauf hin, dass das Land ab heute unter der operativen Kontrolle der Vereinigten Generalstabschefs der Streitkräfte steht. Wir empfehlen allen Einwohnern, die Bestimmungen und Anweisungen der Militär-, Sicherheits- und Polizeibehörden strikt einzuhalten und äußerste Vorsicht walten zu lassen, um individuelle oder gruppenbezogene Aktionen und Verhaltensweisen zu vermeiden, die ein drastisches Eingreifen des operativen Personals erfordern könnten.“ – General Jorge Rafael Videla, Admiral Emilio Eduardo Massera und Brigadier Orlando Ramón Agosti."
ron_coupnews.13.a:1 "OK"

ron_coupnews.14.t:0 "Peru setzt Demokratie außer Kraft und begründet dies mit Aufständen"
ron_coupnews.14.d:0 "Der peruanische Präsident hat den Kongress aufgelöst, die Verfassung außer Kraft gesetzt, Zensur verhängt und Politiker verhaftet. Er bezeichnete dies als eine Offensive gegen Rebellen und Drogenhändler. Andere bezeichneten das Vorgehen jedoch heute als Putsch, da Truppen das Kongressgebäude umstellten und rund um die Stadt Stellung bezogen. „Das Land darf nicht weiter durch Terrorismus, Drogenhandel und Korruption geschwächt werden“, sagte Präsident Alberto K. Fujimori in einer Fernsehansprache am Sonntagabend, als er seine Entscheidungen verkündete. „Die politische Korruption und Unterwanderung haben ein solches Ausmaß erreicht, dass sie auf allen Ebenen und in allen Gerichtsbarkeiten zu finden sind.“"
ron_coupnews.14.a:1 "Auflöser!"

ron_coupnews.15.t:0 "Jelzin attackiert das russische Parlament"
ron_coupnews.15.d:0 "Gestern Abend befahl der russische Präsident Boris Jelzin in Moskau Panzern und Luftlandetruppen, das „Weiße Haus“, das Gebäude des russischen Parlaments (Oberster Sowjet), zu beschießen und zu stürmen, um die Opposition zu unterdrücken, die ihn absetzen wollte. "
ron_coupnews.15.a:1 "OK"

ron_coupnews.16.t:0 "Nervengasangriff erschüttert Tokio"
ron_coupnews.16.d:0 "Die japanische Polizei hat den letzten Flüchtigen festgenommen, den sie im Zusammenhang mit einem Sarin-Nervengasangriff auf die Tokioter U-Bahn suchte, bei dem 1995 13 Menschen starben. Katsuya Takahashi, ein Mitglied der Weltuntergangssekte Aum Shinrikyo, war seit dem Angriff, bei dem ebenfalls 6.000 Menschen verletzt wurden, auf der Flucht."
ron_coupnews.16.a:1 "OK"

ron_decolonizationnews.1.t:0 "[Root.GetName] erklärt Unabhängigkeit"
ron_decolonizationnews.1.d:0 "Wenn es im Laufe der Menschheitsgeschichte für ein Volk notwendig wird, die politischen Bande aufzulösen, die es mit einem anderen Volk verbunden haben, und unter den Mächten der Erde den gesonderten und gleichberechtigten Platz einzunehmen, zu dem es nach den Gesetzen der Natur und ihres Gottes berechtigt ist, dann erfordert der angemessene Respekt vor der Meinung der Menschheit, dass es die Gründe darlegt, die es zu dieser Trennung zwingen."
ron_decolonizationnews.1.a:1 "OK"

ron_decolonizationnews.2.t:0 "Ende der Sowjetunion"
ron_decolonizationnews.2.d:0 "Der Sowjetstaat, der in seiner kurzen, aber turbulenten Geschichte von großen Errungenschaften und schrecklichem Leid geprägt war, starb heute nach einem langen und schmerzlichen Niedergang. Er wurde 74 Jahre alt. Konzipiert als utopisches Versprechen und geboren in den gewaltsamen Umwälzungen der „Großen Oktoberrevolution von 1917“, starb die Union in der düsteren Dunkelheit Ende Dezember 1991, entkleidet, zerstückelt, bankrott und hungrig – doch selbst in ihrem Untergang ehrfurchtgebietend. Das Ende der Sowjetunion kam mit dem Rücktritt Michail S. Gorbatschows, um Platz für eine neue „Gemeinschaft Unabhängiger Staaten“ zu machen. Um 19:32 Uhr, kurz nach dem Ende seiner Fernsehansprache, wurde die rote Fahne mit Hammer und Sichel über dem Kreml eingeholt und die weiß-blau-rote russische Flagge an ihrer Stelle gehisst. Keine Zeremonie, nur Glockenspiel"
ron_decolonizationnews.2.a:1 "OK"

ron_decolonizationnews.3.t:0 "Mitternacht kündigt die Wiedergeburt Deutschlands an"
ron_decolonizationnews.3.d:0 "Deutschland, ein wirtschaftlicher und politischer Koloss im Herzen Europas, wurde heute um Mitternacht nach über 45 Jahren Teilung als vereintes Land wiedergeboren. Mehr als eine Million Menschen erlebten das historische Ende der beiden deutschen Staaten, als 20 junge Menschen aus beiden Teilen Berlins die schwarz-rot-goldene Flagge der Bundesrepublik mit dem aufgerichteten Adler ins Reichstagsgebäude brachten und an einem eigens dafür vorgesehenen Fahnenmast vor dem Reichstag hissten, der dem deutschen Volk gewidmet war. Die Freiheitsglocke läutete durch ganz Berlin, und Bundespräsident Richard von Weizsäcker verkündete: „In freier Selbstbestimmung haben wir die Einheit und Freiheit Deutschlands vollendet. Wir wollen dem Weltfrieden in einem vereinten Europa dienen.“"
ron_decolonizationnews.3.a:1 "OK"

ron_decolonizationnews.4.t:0 "Vertrag von San Francisco"
ron_decolonizationnews.4.d:0 "Der Vertrag von San Francisco (auch Friedensvertrag mit Japan oder Nihon-koku to no Heiwa-Jōyaku genannt) stellte im Namen der Vereinten Nationen die friedlichen Beziehungen zwischen Japan und den Alliierten wieder her, um die Feindseligkeiten offiziell zu beenden und Wiedergutmachung für Taten bis einschließlich des Zweiten Weltkriegs zu fordern. Er wurde am 8. September 1951 im War Memorial Opera House in San Francisco (Kalifornien, USA) von 49 Nationen offiziell unterzeichnet, wobei drei Mitgliedsstaaten die Unterzeichnung verweigerten: die Sowjetunion, Polen und die Tschechoslowakei, allesamt Teile des Ostblocks, und zwei weitere Staaten weigerten sich, Vertreter zu entsenden: Indien und Jugoslawien. Italien und China wurden nicht eingeladen, letzteres aufgrund von Meinungsverschiedenheiten darüber, ob die Republik China oder die Volksrepublik China das chinesische Volk vertrat. Korea wurde ebenfalls nicht eingeladen, da eine ähnliche Meinungsverschiedenheit darüber bestand, ob Südkorea oder Nordkorea das koreanische Volk vertrat."
ron_decolonizationnews.4.a:1 "OK"

ron_decolonizationnews.5.t:0 "Vereinigte Arabische Republik proklamiert"
ron_decolonizationnews.5.d:0 "Die VAR wurde am 1. Februar 1958 als erster Schritt hin zu einem größeren panarabischen Staat gegründet, als eine Gruppe politischer und militärischer Führer Syriens dem ägyptischen Präsidenten Gamal Abdel Nasser einen Zusammenschluss der beiden Staaten vorschlug. Die panarabische Stimmung in Syrien war traditionell sehr stark ausgeprägt, und Nasser war nach dem Suezkrieg von 1956 in der gesamten arabischen Welt eine beliebte Heldenfigur. Daher gab es in Syrien beträchtliche Unterstützung für einen Zusammenschluss mit Nassers Ägypten. Die Arabische Sozialistische Baath-Partei war der führende Befürworter eines solchen Zusammenschlusses."
ron_decolonizationnews.5.a:1 "OK"

ron_decolonizationnews.6.t:0 "Nasser verliert Syrien"
ron_decolonizationnews.6.d:0 "Statt einer Föderation zweier arabischer Völker, wie viele Syrer es sich vorgestellt hatten, entwickelte sich die VAR zu einem vollständig von Ägyptern dominierten Staat. Auch das politische Leben Syriens wurde eingeschränkt, da Nasser die Auflösung aller politischen Parteien in Syrien forderte. Dabei zwang der stark zentralisierte ägyptische Staat dem schwächeren Syrien Nassers sozialistisches politisches und wirtschaftliches System auf und löste damit eine Gegenreaktion der syrischen Geschäfts- und Militärkreise aus, die schließlich zum Putsch vom 28. September 1961 und dem Ende der VAR führte. Laut Elie Podeh in „Der Niedergang der arabischen Einheit“ – „Aufstieg und Fall der Vereinigten Arabischen Republik“ „...konnte dieses Einheitskonzept die brüchige syrische Identität erfolgreich festigen. Tatsächlich wurde den Syrern nach dem Verlust ihrer Unabhängigkeit plötzlich klar, dass sie tatsächlich eine andere Identität als die Ägypter besaßen.“"
ron_decolonizationnews.6.a:1 "OK"

ron_decolonizationnews.7.t:0 "[Root.GetName] wird zum US-Bundesstaat"
ron_decolonizationnews.7.d:0 "Die Aufnahmeklausel der US-Verfassung, auch Neustaatenklausel genannt, in Artikel IV, Abschnitt 3, Satz 1, ermächtigt den US-Kongress, neue Staaten in die Union aufzunehmen (zusätzlich zu den dreizehn, die zum Zeitpunkt des Inkrafttretens der Verfassung bereits existierten). Die Verfassung trat am 21. Juni 1788 in Kraft, nachdem sie von neun der 13 Staaten ratifiziert worden war. Am 4. März 1789 nahm die Bundesregierung ihre Arbeit auf. Seitdem wurden 37 Staaten in die Union aufgenommen. Jeder neue Staat wurde gleichberechtigt mit den bereits bestehenden Staaten aufgenommen."
ron_decolonizationnews.7.a:1 "Manifest Destiny in der Tat"

ron_decolonizationdiplo.1.t:0 "[From.GetName] erkennt unsere Unabhängigkeit an"
ron_decolonizationdiplo.1.d:0 "Wir haben gerade eine Nachricht von der [From.GetAdjective]-Regierung erhalten, in der sie uns versichert, dass sie unsere Unabhängigkeitserklärung für rechtmäßig und gerecht hält und keine weiteren Maßnahmen ergreifen wird, um sich ihr zu widersetzen."
ron_decolonizationdiplo.1.a:1 "Gerechtigkeit ist geschehen ..."

ron_decolonizationdiplo.2.t:0 "[From.GetName] lehnt unsere Unabhängigkeit ab"
ron_decolonizationdiplo.2.d:0 "Wir haben gerade eine Nachricht von der [From.GetAdjective]-Regierung erhalten, in der sie darauf besteht, dass wir uns ihnen sofort unterwerfen, andernfalls müssen wir mit den Konsequenzen rechnen."
ron_decolonizationdiplo.2.a:1 "Bring es ..."
ron_decolonizationdiplo.2.b:1 "Akzeptieren Sie die Regel [From.GetAdjective]"
ron_decolonizationdiplo.2.c:1 "Werde ein Protektorat"

ron_decolonizationdiplo.3.t:0 "[From.GetName] bekräftigt seine Unabhängigkeit"
ron_decolonizationdiplo.3.d:0 "Wir haben gerade eine Nachricht von der [From.GetAdjective]-Regierung erhalten, in der sie darauf besteht, dass ihre Unabhängigkeitserklärung rechtsgültig und bindend ist."
ron_decolonizationdiplo.3.a:1 "Narren..."

ron_decolonizationdiplo.4.t:0 "[From.GetName] sendet"
ron_decolonizationdiplo.4.d:0 "Wir haben gerade eine Nachricht von der [From.GetAdjective]-Regierung erhalten, in der sie uns mitteilt, dass sie sich unserer Autorität unterwirft. "
ron_decolonizationdiplo.4.a:1 "Ein voller Erfolg!"

ron_decolonizationdiplo.5.t:0 "[From.GetName] schlägt Selbstverwaltung vor"
ron_decolonizationdiplo.5.d:0 "Wir haben gerade eine Nachricht von der [From.GetAdjective]-Regierung erhalten, in der ein Mittelweg vorgeschlagen wird. Wir gewähren ihnen Selbstverwaltung, sie bleiben aber weiterhin unser Protektorat und sind zu 100 % von unserer Militär- und Außenpolitik abhängig."
ron_decolonizationdiplo.5.a:1 "Akzeptieren"
ron_decolonizationdiplo.5.b:1 "Vollständige Annexion"

ron_decolonizationdiplo.6.t:0 "[From.GetName] lehnt unseren Vorschlag ab"
ron_decolonizationdiplo.6.d:0 "Wir haben gerade eine Nachricht von der [From.GetAdjective]-Regierung erhalten, in der unser Vorschlag zur Selbstverwaltung abgelehnt wird. Das könnte Krieg bedeuten."
ron_decolonizationdiplo.6.a:1 "So sei es..."

ron_decolonizationdiplo.7.t:0 "Österreich bittet um Unterstützung"
ron_decolonizationdiplo.7.d:0 "Wir haben gerade eine Nachricht der österreichischen Regierung erhalten, in der um Unterstützung gegen eine mögliche deutsche Aggression gebeten wird. Dies könnte Krieg bedeuten."
ron_decolonizationdiplo.7.a:1 "Garantie Österreich"
ron_decolonizationdiplo.7.b:1 "Austria Is Rightfully German

ron_decolonizationdiplo.8.t:0 "Italien gibt uns grünes Licht"
ron_decolonizationdiplo.8.d:0 "Wir haben gerade eine Nachricht der italienischen Regierung erhalten, in der sie uns mitteilt, dass sie im Falle eines österreichisch-deutschen Krieges nicht eingreifen wird."
ron_decolonizationdiplo.8.a:1 "Österreich ist zu Recht deutsch"
ron_decolonizationdiplo.8.b:1 "Wir können uns keinen Krieg leisten"

ron_decolonizationdiplo.9.t:0 "Italien garantiert Österreich"
ron_decolonizationdiplo.9.d:0 "Wir haben gerade eine Nachricht von der italienischen Regierung erhalten, in der sie uns mitteilt, dass sie Österreich im Falle eines österreichisch-deutschen Krieges unterstützen wird."
ron_decolonizationdiplo.9.a:1 "Wir können sie beide nehmen"
ron_decolonizationdiplo.9.b:1 "Wir können uns keinen Krieg leisten"

ron_decolonizationdiplo.10.t:0 "Nasjonal Samling schlägt Friedensbedingungen vor"
ron_decolonizationdiplo.10.d:0 "Vidkun Quisling, Führer der Partei Nasjonal Samling, hatte am 9. April 1940, dem Tag des deutschen Einmarsches in Norwegen, erstmals versucht, einen Putsch gegen die norwegische Regierung durchzuführen. Um 19:32 Uhr besuchte Quisling die Studios der Norwegischen Rundfunkgesellschaft und hielt eine Radioansprache, in der er sich selbst zum Premierminister ernannte und jeglichen Widerstand zur sofortigen Einstellung aufforderte. Er verkündete, dass er und Nasjonal Samling die Macht übernehmen würden, weil Nygaardsvolds Kabinett „bewaffneten Widerstand geleistet und umgehend geflohen“ sei. Er erklärte weiter, dass es in der gegenwärtigen Situation „die Pflicht und das Recht der Bewegung von Nasjonal Samling sei, die Regierungsmacht zu übernehmen“. Quisling behauptete, das Kabinett Nygaardsvold habe die Macht abgegeben, obwohl es lediglich nach Elverum, etwa 50 Kilometer von Oslo entfernt, umgezogen war und Verhandlungen mit den Deutschen führte. König Haakon legitimierte seine Regierung, indem er ihn zum Premierminister ernannte. Jetzt bittet er darum, sich den Achsenmächten anzuschließen. Was sollen wir tun?"
ron_decolonizationdiplo.10.a:1 "Stimmen Sie den Friedensbedingungen zu"
ron_decolonizationdiplo.10.b:1 "Ignoriere sie"

ron_decolonizationdiplo.11.t:0 "Nasjonal Samling schlägt Friedensbedingungen vor"
ron_decolonizationdiplo.11.d:0 "Vidkun Quisling, Führer der Partei Nasjonal Samling, hatte am 9. April 1940, dem Tag des deutschen Einmarsches in Norwegen, erstmals versucht, einen Putsch gegen die norwegische Regierung durchzuführen. Um 19:32 Uhr besuchte Quisling die Studios des Norwegischen Rundfunks und hielt eine Radioansprache, in der er sich selbst zum Premierminister ernannte und jeglichen Widerstand zur sofortigen Einstellung aufforderte. Er verkündete, dass er und Nasjonal Samling die Macht übernehmen würden, weil Nygaardsvolds Kabinett „bewaffneten Widerstand geleistet und umgehend geflohen“ habe. Er erklärte weiter, dass es in der gegenwärtigen Situation „die Pflicht und das Recht der Bewegung von Nasjonal Samling sei, die Regierungsmacht zu übernehmen“. Quisling behauptete, das Kabinett Nygaardsvold habe die Macht abgegeben, obwohl es lediglich nach Elverum, etwa 50 Kilometer von Oslo entfernt, umgezogen sei und Verhandlungen mit den Deutschen führe. König Haakon hat sich geweigert, Quisling zum Premierminister zu ernennen, und drohte in diesem Fall mit seinem Rücktritt. Quisling könnte sich jedoch noch als nützlich erweisen, indem er die norwegische Nationalsozialisten gegen die Regierung aufhetzt. Sollten wir seinen Vorschlag annehmen, würde er sich unserer Fraktion anschließen. Was werden wir tun?"
ron_decolonizationdiplo.11.a:1 "Stimmen Sie den Friedensbedingungen zu"
ron_decolonizationdiplo.11.b:1 "Ignoriere sie"

ron_decolonizationdiplo.12.t:0 "[From.GetName] akzeptiert Friedensbedingungen"
ron_decolonizationdiplo.12.d:0 "Ein Friedensvertrag ist eine Vereinbarung zwischen zwei oder mehr verfeindeten Parteien, in der Regel Ländern oder Regierungen, die einen Kriegszustand zwischen den Parteien formell beendet. Er unterscheidet sich von einem Waffenstillstand, der eine Vereinbarung zur Einstellung der Feindseligkeiten darstellt; einer Kapitulation, bei der eine Armee sich bereit erklärt, die Waffen abzugeben; oder einem Waffenstillstand, bei dem die Parteien vereinbaren können, die Kämpfe vorübergehend oder dauerhaft einzustellen. Die Rechtswissenschaftlerin Christine Bell bezeichnete die Kunst der Friedensverhandlungen in der Neuzeit als „lex pacificatoria“, wobei ein Friedensvertrag potenziell zum rechtlichen Rahmen für die Nachkriegszeit (ius post bellum) beiträgt."
ron_decolonizationdiplo.12.a:1 "Exzellent"

