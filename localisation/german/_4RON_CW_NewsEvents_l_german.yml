CW_Expansion_news.191.a:1 "OK"

CW_Expansion_country.192.t:0 "Massaker der Bodo-Liga"
CW_Expansion_country.192.d:0 "Das Massaker der Bodo-Liga war ein Massaker und Kriegsverbrechen an Kommunisten und mutmaßlichen Sympathisanten, das sich im Sommer 1950 während des Koreakrieges ereignete. Die Schätzungen über die Zahl der Todesopfer variieren. Historiker und Experten des Koreakrieges schätzen, dass die Gesamtzahl zwischen mindestens 60.000 und 110.000 (Kim Dong-choon) und 200.000 (Park Myung-lim) liegt."
CW_Expansion_country.192.a:1 "OK"
