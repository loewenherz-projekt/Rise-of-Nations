CW_Expansion_country.380.t:0 "Größte Diamantenmine der UdSSR entdeckt"
CW_Expansion_country.380.d:0 "Die diamanthaltigen Vorkommen wurden am 13. Juni 1955 von den sowjetischen Geologen Juri Chabardin, Jekaterina Jelagina und Viktor Awdejenko während der großen Amakinsky-Expedition in der Jakutischen ASSR entdeckt. Sie fanden Spuren des Vulkangesteins Kimberlit, das üblicherweise mit Diamanten in Verbindung gebracht wird. Dieser Fund war der zweite Erfolg bei der Suche nach Kimberlit in Russland nach zahlreichen gescheiterten Expeditionen in den 1940er und 1950er Jahren. (Die erste war die Zarnitsa-Mine im Jahr 1954.) Für diese Entdeckung erhielt Chabardin 1957 den Lenin-Preis, eine der höchsten Auszeichnungen der Sowjetunion."
CW_Expansion_country.380.a:1 "OK"
CW_Expansion_news.380.t:0 "Größte Diamantenmine der UdSSR entdeckt"
CW_Expansion_news.380.d:0 "Die diamanthaltigen Vorkommen wurden am 13. Juni 1955 von den sowjetischen Geologen Juri Chabardin, Jekaterina Jelagina und Viktor Awdejenko während der großen Amakinsky-Expedition in der Jakutischen ASSR entdeckt. Sie fanden Spuren des Vulkangesteins Kimberlit, das üblicherweise mit Diamanten in Verbindung gebracht wird. Dieser Fund war der zweite Erfolg bei der Suche nach Kimberlit in Russland nach zahlreichen gescheiterten Expeditionen in den 1940er und 1950er Jahren. (Die erste war die Zarnitsa-Mine im Jahr 1954.) Für diese Entdeckung erhielt Chabardin 1957 den Lenin-Preis, eine der höchsten Auszeichnungen der Sowjetunion."
CW_Expansion_news.380.a:1 "OK"

CW_Expansion_country.381.t:0 "Susi und Strolch Premiere in Chicago"
CW_Expansion_country.381.d:0 "Susi und Strolch ist ein US-amerikanischer Zeichentrickfilm aus dem Jahr 1955, der von Walt Disney produziert und von Buena Vista Film Distribution veröffentlicht wurde. Der 15. Zeichentrickfilm von Disney wurde von Clyde Geronimi, Wilfred Jackson und Hamilton Luske inszeniert und enthält die Stimmen von Barbara Luddy, Larry Roberts, Bill Thompson, Bill Baucom, Verna Felton und Peggy Lee. Basierend auf der Cosmopolitan-Geschichte „Happy Dan, The Cynical Dog“ von Ward Greene aus dem Jahr 1945 erzählt Susi und Strolch die Geschichte einer American Cocker Spaniel-Hündin namens Lady, die bei einer kultivierten Familie der oberen Mittelschicht lebt, und einem streunenden Mischlingsrüden namens Tramp. Als die beiden Hunde sich treffen, erleben sie viele romantische Abenteuer und verlieben sich ineinander."
CW_Expansion_country.381.a:1 "OK"
