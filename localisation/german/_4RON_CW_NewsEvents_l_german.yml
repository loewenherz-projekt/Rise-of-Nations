CW_Expansion_country.328.t:0 "Schießerei im US-Kapitol"
CW_Expansion_country.328.d:0 "Am 1. März 1954, als sich die Abgeordneten im Plenarsaal zu einer bevorstehenden Abstimmung versammelten, betraten drei Männer und eine Frau die Besuchertribüne über dem Saal und nahmen leise ihre Plätze ein. Alle vier gehörten der Puerto-Ricanischen Nationalistischen Partei an und waren erst wenige Stunden zuvor von New York City nach Washington, D.C. gereist. Die Vereinigten Staaten hatten Puerto Rico 1898 annektiert, und das Verhältnis der Insel zur Bundesregierung war seit langem ein Streitpunkt. Einige Puerto-Ricaner versuchten, ihre Beziehungen zum Festland aufrechtzuerhalten, andere, wie die vier Besucher im Repräsentantenhaus an diesem Tag, plädierten für ein unabhängiges Puerto Rico. Im Kapitol gab es zu dieser Zeit kaum Sicherheitsvorkehrungen, und die vier puerto-ricanischen Nationalisten betraten die Tribüne mit Handfeuerwaffen bewaffnet. Gegen 14:30 Uhr eröffneten sie wahllos das Feuer auf den Plenarsaal und entrollten eine puerto-ricanische Flagge – ein gewaltsamer Protestakt, der auf ihre Forderung nach der sofortigen Unabhängigkeit Puerto Ricos aufmerksam machen sollte. Fünf Kongressabgeordnete wurden bei der Schießerei verletzt. Abgeordnete, Pagen des Repräsentantenhauses und Polizisten halfen rasch dabei, drei der Angreifer vor der Galerie festzunehmen, während der vierte aus dem Kapitol floh und später am Nachmittag festgenommen wurde."
CW_Expansion_country.328.a:1 "OK"
