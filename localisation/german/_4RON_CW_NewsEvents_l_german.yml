CW_Expansion_country.263.t:0 "Der Putsch der Freien Offiziere in Ägypten"
CW_Expansion_country.263.d:0 "Die Ägyptische Revolution von 1952, auch bekannt als Staatsstreich von 1952 und Revolution des 23. Juli, war eine Zeit tiefgreifender politischer, wirtschaftlicher und gesellschaftlicher Veränderungen in Ägypten. Sie begann am 23. Juli 1952 mit dem Sturz von König Faruk durch einen Staatsstreich der Bewegung der Freien Offiziere, einer Gruppe von Armeeoffizieren unter der Führung von Mohamed Naguib und Gamal Abdel Nasser. Die Revolution leitete eine Welle revolutionärer Politik in der arabischen Welt ein und trug zur Eskalation der Entkolonialisierung und zur Entwicklung der Solidarität mit der Dritten Welt während des Kalten Krieges bei. Obwohl sich die Bewegung zunächst auf Beschwerden gegen König Faruk konzentrierte, verfolgte sie weitreichendere politische Ambitionen. In den ersten drei Jahren der Revolution setzten sich die Freien Offiziere dafür ein, die konstitutionelle Monarchie und Aristokratie Ägyptens und des Sudans abzuschaffen, eine Republik zu gründen, die britische Besatzung des Landes zu beenden und die Unabhängigkeit des Sudans zu sichern (der zuvor als Kondominium zwischen Ägypten und Großbritannien regiert wurde). Die Revolutionsregierung verfolgte eine entschieden nationalistische, antiimperialistische Agenda, die sich vor allem im arabischen Nationalismus und der internationalen Blockfreiheit ausdrückte."
CW_Expansion_country.263.a:1 "OK"
