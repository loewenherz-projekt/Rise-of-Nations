CW_Expansion_country.260.t:0 "Erster Miss Universe-Wettbewerb abgehalten"
CW_Expansion_country.260.d:0 "Miss Universe 1952, der erste Miss-Universe-Wettbewerb, fand am 28. Juni 1952 im Long Beach Municipal Auditorium in Long Beach, Kalifornien, USA, statt. Der Wettbewerb fand am Tag nach dem ersten Miss-USA-Wettbewerb am selben Ort statt. Dreißig Kandidatinnen kämpften um die Krone. Die erste Gewinnerin des Wettbewerbs war die 17-jährige Armi Kuusela aus Finnland, die von der Schauspielerin Piper Laurie gekrönt wurde."
CW_Expansion_country.260.a:1 "OK"
