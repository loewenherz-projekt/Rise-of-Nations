CW_Expansion_country.480.t:0 "Tibetischer Aufstand"
CW_Expansion_country.480.d:0 "Der tibetische Aufstand von 1959 begann am 10. März 1959 mit einem Aufstand in Lhasa, der Hauptstadt Tibets, die seit dem 17-Punkte-Abkommen von 1951 de facto von der Volksrepublik China kontrolliert wurde. Der Aufstand ereignete sich inmitten allgemeiner Spannungen zwischen China und Tibet und in einer Atmosphäre der Verwirrung, da tibetische Demonstranten befürchteten, die chinesische Regierung könnte den 14. Dalai Lama verhaften. Die Proteste wurden zudem durch antichinesische Ressentiments und Separatismus angeheizt. Zunächst bestand der Aufstand aus weitgehend friedlichen Protesten, doch es kam schnell zu Zusammenstößen, und die chinesische Volksbefreiungsarmee (VBA) setzte schließlich Gewalt ein, um die Demonstranten niederzuschlagen, von denen einige Waffen erbeutet hatten. In der letzten Phase des Aufstands kam es zu schweren Kämpfen mit hohen Verlusten unter der Zivilbevölkerung und dem Militär. Der 14. Dalai Lama floh aus Lhasa, während die Stadt am 23. März 1959 vollständig von chinesischen Sicherheitskräften zurückerobert wurde. Während des Aufstands von 1959 wurden Tausende getötet, die genaue Zahl ist jedoch umstritten."
CW_Expansion_country.480.a:1 "OK"
