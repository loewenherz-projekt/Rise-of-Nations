l_german:

CW_Expansion_country.1.t:0 "Churchill hält Rede vor dem Eisernen Vorhang"
CW_Expansion_country.1.d:0 "In einer der berühmtesten Reden des Kalten Krieges verurteilte der ehemalige britische Premierminister Winston Churchill die Politik der Sowjetunion in Europa und erklärte: „Von Stettin an der Ostsee bis Triest an der Adria hat sich ein Eiserner Vorhang über den Kontinent gelegt.“ Churchills Rede gilt als eine der ersten Salven, die den Beginn des Kalten Krieges ankündigten."
CW_Expansion_country.1.a:1 "Über den Kontinent ist ein Eiserner Vorhang gefallen."
CW_Expansion_country.2.t:0 "Erste Sitzung der Generalversammlung der Vereinten Nationen"
CW_Expansion_country.2.d:0 "Die erste Generalversammlung der Vereinten Nationen, der 51 Nationen angehören, tagt in der Westminster Central Hall in London. Eine Woche später tritt der UN-Sicherheitsrat zum ersten Mal zusammen und legt seine Geschäftsordnung fest. Am 24. Januar verabschiedet die Generalversammlung ihre erste Resolution, die die friedliche Nutzung der Atomenergie und die Abschaffung von Atom- und anderen Massenvernichtungswaffen fordert."
CW_Expansion_country.2.a:0 "Ein weiterer Versuch, die Welt zu vereinen"
CW_Expansion_country.3.t:0 "Auflösung des Völkerbundes"
CW_Expansion_country.3.d:0 "Der Ausbruch des Zweiten Weltkriegs zeigte, dass der Völkerbund seinen Hauptzweck, künftige Weltkriege zu verhindern, verfehlt hatte. Der Völkerbund bestand 26 Jahre lang. Nach dem Ende des Zweiten Weltkriegs traten die Vereinten Nationen (UN) an seine Stelle und übernahmen mehrere vom Völkerbund gegründete Agenturen und Organisationen."
CW_Expansion_country.3.a:0 "Für eine bessere Welt"
CW_Expansion_country.4.t:0 "Italien schafft die Monarchie ab"
CW_Expansion_country.4.d:0 "Nach einem Verfassungsreferendum wurde die italienische Monarchie von der italienischen Republik abgelöst. Die Savoyer mussten als Strafe für ihre Unterstützung der Diktatur Benito Mussolinis und für ihre „Versäumnis, die Würde des Landes zu wahren“, abdanken, indem sie nach dem Zusammenbruch von Mussolinis Regime aus Rom flohen. Berichten zufolge hatten Umberto II. und die königliche Familie das Land verlassen und den Thron der Nationen an die Republikaner übergeben."
CW_Expansion_country.4.a:0 "Die Krone fällt mit dem Adler."
CW_Expansion_country.4.b:0 "Lang lebe der König."
CW_Expansion_country.5.t:0 "Nürnberger Prozesse gehen weiter"
CW_Expansion_country.5.d:0 "Zwölf hochrangige Nazis wurden vom Internationalen Kriegsverbrechertribunal in Nürnberg zum Tode verurteilt. Zu den zum Tode durch den Strang Verurteilten gehörten Joachim von Ribbentrop, Nazi-Außenminister, Hermann Göring, Gründer der Gestapo und Chef der deutschen Luftwaffe, sowie Wilhelm Frick, Bundesinnenminister. Sieben weitere Angeklagte, darunter Rudolf Heß, der ehemalige Stellvertreter Adolf Hitlers, wurden zu Gefängnisstrafen zwischen zehn Jahren und lebenslänglich verurteilt, teilweise sogar zum Tode. Die Urteilsverkündung wird in Kürze bekannt gegeben."
CW_Expansion_country.5.a:0 "Sie haben bekommen, was sie verdienen"
CW_Expansion_country.6.t:0 "Unterzeichnung der Pariser Friedensverträge"
CW_Expansion_country.6.d:0 "Nach dem Ende des Zweiten Weltkriegs handelten die siegreichen Alliierten die Einzelheiten von Friedensverträgen mit Italien, Rumänien, Ungarn, Bulgarien und Finnland aus. Die Verträge ermöglichten es den besiegten Achsenmächten, ihre Verantwortung als souveräne Staaten in internationalen Angelegenheiten wieder aufzunehmen und sich für die Mitgliedschaft in den Vereinten Nationen zu qualifizieren. Die in den Friedensverträgen festgelegten Regelungen umfassten die Zahlung von Kriegsentschädigungen, die Einhaltung von Minderheitenrechten und territoriale Anpassungen, darunter das Ende des italienischen Kolonialreichs in Afrika, Griechenland und Albanien, sowie Änderungen der Grenzen zwischen Italien und Jugoslawien, Ungarn und der Tschechoslowakei, der Sowjetunion und Rumänien, Ungarn und Rumänien, Frankreich und Italien sowie der Sowjetunion und Finnland. Die Verträge verpflichteten die verschiedenen Staaten zudem, angeklagte Kriegsverbrecher für Kriegsverbrecherprozesse an die Alliierten auszuliefern."
CW_Expansion_country.6.a:0 "Hoffentlich wird dies den Konflikt in Europa beenden"
CW_Expansion_country.7.t:0 "US-Atomenergiekontrollplan"
CW_Expansion_country.7.d:0 "Der Baruch-Plan war ein Vorschlag der US-Regierung, der maßgeblich von Bernard Baruch verfasst wurde. Er sollte die Nutzung von Atomenergie kontrollieren und einschränken. Kürzlich wurde der Plan von den Vereinten Nationen angenommen, von einem ihrer Mitglieder, der Sowjetunion, jedoch abgelehnt. Die UdSSR unterbreitete einen Gegenvorschlag mit der Begründung, die Vereinten Nationen würden von den USA und ihren Verbündeten in Westeuropa dominiert und man könne ihnen daher nicht zutrauen, die Autorität über Atomwaffen unparteiisch auszuüben. Der Gegenvorschlag verlangte, dass Amerika zunächst seine eigenen Atomwaffen abschaffen müsse, bevor Vorschläge für ein Kontroll- und Inspektionssystem in Betracht gezogen würden. Die Entscheidung zur Umsetzung des Plans steht noch aus."
CW_Expansion_country.7.a:0 "Akzeptieren"
CW_Expansion_country.7.b:0 "Abfall"
CW_Expansion_country.8.t:0 "Mahatma Gandhi ermordet"
CW_Expansion_country.8.d:0 "Mahatma Gandhi, ein indischer Nationalist, der erfolgreich für Indiens Unabhängigkeit von der britischen Herrschaft kämpfte, wurde ermordet. Gandhi betete gerade für mehrere Religionen, als er auf das Podium zuging. Der Attentäter trat aus der Menge und schoss aus kürzester Distanz dreimal auf ihn. Wenige Augenblicke später wurde sein Tod festgestellt. Die Ermittlungen zur Suche und Festnahme des Täters dauern an."
CW_Expansion_country.8.a:0 "Er wird in Erinnerung bleiben"
CW_Expansion_country.9.t:0 "Internationales Militärtribunal in Japan eingerichtet"
CW_Expansion_country.9.d:0 "Das Internationale Militärtribunal für den Fernen Osten (IMTFE), auch bekannt als Tokioter Prozess oder Tokioter Kriegsverbrechertribunal, war ein Militärprozess, der am 29. April 1946 einberufen wurde, um die Führer des Kaiserreichs Japan wegen gemeinsamer Verschwörung zur Kriegsführung (eingestuft als Verbrechen der „Klasse A“), konventioneller Kriegsverbrechen („Klasse B“) und Verbrechen gegen die Menschlichkeit („Klasse C“) anzuklagen. Elf Länder (Australien, Kanada, China, Frankreich, Indien, die Niederlande, Neuseeland, die Philippinen, die Sowjetunion, das Vereinigte Königreich und die Vereinigten Staaten) stellten Richter und Staatsanwälte für das Gericht. Die Verteidigung bestand aus japanischen und amerikanischen Anwälten. 28 japanische Militär- und Politikerführer wurden in 55 Anklagepunkten angeklagt, darunter Führung eines Angriffskrieges, Mord und konventionelle Kriegsverbrechen an Kriegsgefangenen, internierten Zivilisten und der Bevölkerung der besetzten Gebiete. Zu den Angeklagten gehörten ehemalige Premierminister, ehemalige Außenminister und ehemalige Militärkommandeure. Im Laufe des Verfahrens entschied das Gericht, dass 45 der Anklagepunkte, darunter alle Mordanklagepunkte, entweder überflüssig oder gemäß der IMTFE-Charta nicht zulässig seien. "
CW_Expansion_country.9.a:0 "Gerechtigkeit"
CW_Expansion_country.10.t:0 "Juan Perón wurde in Argentinien gewählt"
CW_Expansion_country.10.d:0 "1943 beteiligte er sich als Armeeoffizier an einem Militärputsch gegen die ineffektive Zivilregierung Argentiniens. Er wurde zum Arbeitsminister ernannt, sein Einfluss wuchs und 1944 wurde er zudem Vizepräsident und Kriegsminister. Im Oktober 1945 wurde Perón durch einen Putsch verfassungstreuer Zivilisten und Offiziere aus seinen Ämtern gedrängt und inhaftiert. Doch Appelle von Arbeitern und seiner charismatischen Geliebten Eva Duarte erzwangen bald seine Freilassung. In der Nacht seiner Freilassung, dem 17. Oktober, sprach er vom Balkon des Präsidentenpalastes vor etwa 300.000 Menschen und versprach, das Volk bei den kommenden Präsidentschaftswahlen zum Sieg zu führen. Vier Tage später heiratete der verwitwete Perón Eva Duarte, oder „Evita“, wie sie liebevoll genannt wurde."
CW_Expansion_country.10.a:0 "Was bedeutet das für Argentinien?"
CW_Expansion_country.10.b:0 "Das werden wir nicht zulassen"
CW_Expansion_country.11.t:0 "Burnden Park-Katastrophe"
CW_Expansion_country.11.d:0 "Die Burnden-Park-Katastrophe war ein Menschengedränge, das sich am 9. März 1946 im Fußballstadion Burnden Park, der damaligen Heimstätte der Bolton Wanderers, ereignete. 33 Menschen starben, Hunderte von Bolton-Fans wurden verletzt. Es war die tödlichste Stadionkatastrophe in der britischen Geschichte bis zur Ibrox-Park-Katastrophe 1971. Das Spiel, ein Rückspiel der sechsten Runde des FA Cups zwischen Bolton und Stoke City, durfte fortgesetzt werden, endete jedoch torlos. Die Katastrophe führte zum Moelwyn-Hughes-Bericht, der eine strengere Kontrolle der Zuschauerzahlen empfahl."
CW_Expansion_country.11.a:0 "Tragisch"
CW_Expansion_country.12.t:0 "In Japan dürfen Frauen erstmals wählen"
CW_Expansion_country.12.d:0 "Die Anfänge des Frauenwahlrechts in Japan reichen bis in die Demokratisierung durch die Meiji-Restauration zurück. Die Frauenwahlrechtsbewegung erlangte während der Taisho-Zeit an Bedeutung. Das Frauenverbot für politische Versammlungen wurde 1922 auf Forderungen von Frauenorganisationen unter Führung von Aktivistinnen wie Hiratsuka Raichō und Ichikawa Fusae aufgehoben. Die Bewegung erlitt während und nach der Weltwirtschaftskrise schwere Rückschläge, als die Unterstützung für die Demokratie zu schwinden begann und der Einfluss des Militärs auf die Zivilbevölkerung dramatisch zunahm. Die ersten allgemeinen Wahlen ohne Unterschied des Geschlechts fanden 1946 statt, doch erst 1947, mit dem Inkrafttreten der Verfassung für das Nachkriegsjapan, wurde das allgemeine Wahlrecht in Japan eingeführt."
CW_Expansion_country.12.a:0 "Wer hat sie aus der Küche gelassen?"
CW_Expansion_country.13.t:0 "Schlacht von Alcatraz"
CW_Expansion_country.13.d:0 "Die Schlacht von Alcatraz, die vom 2. bis 4. Mai 1946 dauerte, war das Ergebnis eines erfolglosen Fluchtversuchs bewaffneter Häftlinge aus dem Bundesgefängnis Alcatraz. Zwei Beamte des Federal Bureau of Prisons – William A. Miller und Harold Stites – wurden zusammen mit drei der Täter getötet. Vierzehn weitere Beamte und ein unbeteiligter Häftling wurden ebenfalls verletzt. Zwei der überlebenden Täter wurden später 1948 für ihre Rolle hingerichtet."
CW_Expansion_country.13.a:0 "Beunruhigend"
CW_Expansion_country.14.t:0 "Ion Antonescu hingerichtet"
CW_Expansion_country.14.d:0 "Am 1. Juni 1946 wird Ion Antonescu, der vom 6. September 1940 bis zum 23. August 1944 rumänischer Diktator war, von einem Militärkommando hingerichtet. Antonescu war in einem Nürnberger Prozess als Kriegsverbrecher zum Tode verurteilt worden."
CW_Expansion_country.14.a:0 "Gerechtigkeit"
CW_Expansion_country.15.t:0 "Weltbank nimmt Betrieb auf"
CW_Expansion_country.15.d:0 "Die Weltbank wurde 1944 auf der UN-Währungs- und Finanzkonferenz (allgemein bekannt als Bretton-Woods-Konferenz) gegründet, die ein neues internationales Wirtschaftssystem nach dem Zweiten Weltkrieg etablieren sollte. Im Juni 1946 nahm sie offiziell ihre Arbeit auf. Ihre ersten Kredite dienten dem Wiederaufbau Westeuropas nach dem Krieg. Ab Mitte der 1950er Jahre spielte sie eine wichtige Rolle bei der Finanzierung von Investitionen in Infrastrukturprojekte in Entwicklungsländern, darunter Straßen, Wasserkraftwerke, Wasser- und Abwasseranlagen, Seehäfen und Flughäfen."
CW_Expansion_country.15.a:0 "Vielleicht könnten wir einen Kredit beantragen?"
CW_Expansion_country.16.t:0 "USA testen Atomwaffen"
CW_Expansion_country.16.d:0 "Operation Crossroads war eine Reihe von Atomwaffentests, die die USA Mitte 1946 auf dem Bikini-Atoll durchführten. Es waren die ersten Atomwaffentests seit Trinity im Juli 1945 und die ersten Detonationen von Atombomben seit dem Atombombenabwurf auf Nagasaki am 9. August 1945. Ziel der Tests war es, die Auswirkungen von Atomwaffen auf Kriegsschiffe zu untersuchen."
CW_Expansion_country.16.a:0 "Beunruhigend"
CW_Expansion_country.17.t:0 "Bombenanschlag auf das King David Hotel"
CW_Expansion_country.17.d:0 "Der Bombenanschlag auf das King David Hotel war ein Terroranschlag der militanten rechtsgerichteten zionistischen Untergrundorganisation Irgun am Montag, dem 22. Juli 1946, auf die britische Verwaltungszentrale für Palästina, die während des jüdischen Aufstands im Mandatsgebiet Palästina im Südflügel des King David Hotels in Jerusalem untergebracht war. 91 Menschen verschiedener Nationalitäten wurden getötet und 46 verletzt."
CW_Expansion_country.17.a:0 "Tragisch"
CW_Expansion_country.18.t:0 "Atomenergiekommission gegründet"
CW_Expansion_country.18.d:0 "Die United States Atomic Energy Commission, allgemein bekannt als AEC, war eine Behörde der US-Regierung, die nach dem Zweiten Weltkrieg vom US-Kongress gegründet wurde, um die Entwicklung der Atomwissenschaft und -technologie in Friedenszeiten zu fördern und zu kontrollieren. Präsident Harry S. Truman unterzeichnete am 1. August 1946 den McMahon/Atomic Energy Act, der die Kontrolle über die Atomenergie mit Wirkung zum 1. Januar 1947 vom Militär in die zivile Hand übertrug. Diese Übertragung gab den Mitgliedern der AEC die vollständige Kontrolle über die Anlagen, Labore, Ausrüstung und das Personal, die während des Krieges zur Herstellung der Atombombe zusammengezogen wurden."
CW_Expansion_country.18.a:0 "Hoffen wir auf dauerhaften Frieden"
CW_Expansion_country.19.t:0 "Das Weihnachtsmannland wird eröffnet"
CW_Expansion_country.19.d:0 "Holiday World &amp; Splashin&#39; Safari (vor 1984 als Santa Claus Land bekannt) ist ein kombinierter Themen- und Wasserpark in der Nähe der Interstate 64 und der US 231 in Santa Claus, Indiana, USA. Der Themenpark ist in vier Bereiche unterteilt, die Weihnachten, Halloween, Thanksgiving und den 4. Juli mit Fahrgeschäften, Live-Unterhaltung, Spielen und Attraktionen feiern. Holiday World enthält drei Holzachterbahnen – The Raven, The Legend und The Voyage – sowie Thunderbird (ein von Bolliger &amp; Mabillard herausgebrachter Wing Coaster) und The Howler. Der Wasserpark im Safari-Stil umfasst die beiden längsten Wasserachterbahnen der Welt, Wildebeest und den Guinness-Weltrekordhalter Mammoth; außerdem gibt es eine Duell-Wasserachterbahn namens Cheetah Chase, zahlreiche Floßfahrten und Wasserrutschen für Familien, zwei Wellenbecken, ein Junior-Wellenbecken, zwei Wasserrutschenbereiche in Kindergröße, einen Strömungskanal und zwei „Kippeimer“ für Familien."
CW_Expansion_country.19.a:0 "Ho Ho Ho"
CW_Expansion_country.20.t:0 "Tag der direkten Aktion"
CW_Expansion_country.20.d:0 "Der Direct Action Day (16. August 1946), auch bekannt als die Kalkutta-Morde von 1946, war ein Tag weitverbreiteter Unruhen von Muslimen in der Stadt Kalkutta (heute Kolkata) in der Provinz Bengalen in Britisch-Indien. Der Tag markierte zugleich den Beginn der sogenannten „Woche der langen Messer“."
CW_Expansion_country.20.a:0 "Tragisch"
CW_Expansion_country.21.t:0 "Großer Preis von Turin"
CW_Expansion_country.21.d:0 "Der Große Preis von Turin 1946 war ein Grand-Prix-Autorennen, das am 1. September 1946 im Valentino Park stattfand. Es war das erste Formel-1-Rennen der Geschichte."
CW_Expansion_country.21.a:0 "Spannend"
CW_Expansion_country.22.t:0 "Völkermord an den Noakhali"
CW_Expansion_country.22.d:0 "Bei den Noakhali-Unruhen handelte es sich um eine Reihe halborganisierter Massaker, Vergewaltigungen, Entführungen und Zwangskonvertierungen von Hindus zum Islam sowie Plünderungen und Brandstiftungen hinduistischen Eigentums, die von der muslimischen Gemeinde in den Distrikten Noakhali in der Chittagong-Division von Bengalen (heute Bangladesch) im Oktober und November 1946 verübt wurden, ein Jahr vor Indiens Unabhängigkeit von der britischen Herrschaft. Betroffen waren die Gebiete unter den Polizeistationen Ramganj, Begumganj, Raipur, Lakshmipur, Chhagalnaiya und Sandwip im Distrikt Noakhali sowie die Gebiete unter den Polizeistationen Hajiganj, Faridganj, Chandpur, Laksham und Chauddagram im Distrikt Tipperah, eine Gesamtfläche von mehr als 2.000 Quadratmeilen."
CW_Expansion_country.22.a:0 "Tragisch"
CW_Expansion_country.23.t:0 "Hochrangiger Naziführer begeht Selbstmord"
CW_Expansion_country.23.d:0 "Am 15. Oktober 1946 stirbt Hermann Göring, Oberbefehlshaber der Luftwaffe, Reichstagspräsident, Chef der Gestapo, Ministerpräsident Preußens, Oberförster des Reichs, Oberliquidator beschlagnahmter Güter, oberster Leiter des Reichswetteramtes und designierter Nachfolger Hitlers, durch eigene Hand."
CW_Expansion_country.23.a:0 "Er entkam dem Henker"
CW_Expansion_country.24.t:0 "Brand im Winecoff-Hotel"
CW_Expansion_country.24.d:0 "Der Brand im Winecoff Hotel am 7. Dezember 1946 war der tödlichste Hotelbrand in der Geschichte der USA. 119 Hotelgäste, darunter auch die ursprünglichen Eigentümer, kamen ums Leben. Das Winecoff Hotel in der Peachtree Street 176 in der Innenstadt von Atlanta, Georgia, USA, wurde als „absolut feuerfest“ beworben. Während die Stahlkonstruktion des Hotels tatsächlich gegen Feuer geschützt war, war die Innenausstattung des Hotels brennbar, und der Ausgang des Gebäudes bestand aus einer einzigen Treppe, die alle 15 Stockwerke miteinander verband. Alle Hotelgäste oberhalb des Brandherds im dritten Stock waren eingeschlossen, und die Überlebenden des Brandes wurden entweder aus Fenstern in den oberen Stockwerken gerettet oder sprangen in von Feuerwehrleuten gehaltene Netze. Der Brand war bemerkenswert wegen der Anzahl der Opfer, die in den Tod sprangen. Ein Foto des Sturzes eines Überlebenden gewann 1947 den Pulitzer-Preis für Fotografie. Der Brand – der auf den Brand des La Salle Hotels in Chicago am 5. Juni 1946 (mit 61 Todesopfern) und den Brand des Canfield Hotels in Dubuque, Iowa am 19. Juni 1946 (mit 19 Todesopfern) folgte – führte zu erheblichen Änderungen der nordamerikanischen Bauvorschriften. Vor allem wurden in den Gästezimmern von Hotels mehrere geschützte Fluchtwege und selbstschließende feuerfeste Türen vorgeschrieben."
CW_Expansion_country.24.a:0 "Tragisch"
CW_Expansion_country.25.t:0 "Konferenz von Havanna"
CW_Expansion_country.25.d:0 "Die Havanna-Konferenz von 1946 war ein historisches Treffen der Anführer der US-amerikanischen Mafia und Cosa Nostra in Havanna, Kuba. Angeblich von Charles „Lucky“ Luciano arrangiert, wurde die Konferenz abgehalten, um wichtige Mafia-Richtlinien, Regeln und Geschäftsinteressen zu diskutieren. An der Havanna-Konferenz nahmen Delegationen von Verbrecherfamilien aus den gesamten Vereinigten Staaten teil. Die Konferenz fand in der Woche vom 22. Dezember 1946 im Hotel Nacional statt. Die Havanna-Konferenz gilt als der wichtigste Mafia-Gipfel seit der Atlantic City-Konferenz von 1929. Die in Havanna getroffenen Entscheidungen hatten in den folgenden Jahrzehnten Auswirkungen auf die US-amerikanischen Verbrecherfamilien."
CW_Expansion_country.25.a:0 "Ich werde ihm ein Angebot machen, das er nicht ablehnen kann"
CW_Expansion_country.26.t:0 "Proklamation 2714"
CW_Expansion_country.26.d:0 "Die Präsidialproklamation 2714 (61 Stat. 1048) wurde am 31. Dezember 1946 von Präsident Harry S. Truman unterzeichnet, um offiziell die Einstellung aller Feindseligkeiten im Zweiten Weltkrieg zu erklären. Obwohl die eigentlichen Kampfhandlungen in Europa am 8. Mai 1945 und im Pazifik am 2. September 1945 endeten, wurde der Kriegszustand in Japan und Deutschland nicht aufgehoben, um die Notwendigkeit von Besatzungstruppen in diesen Ländern zu begründen. Nach Abschluss der Kriegsverbrecherprozesse galten die Feindseligkeiten als beendet. Die Unterzeichnung der Proklamation 2714 ist der Grund, warum die USA als Veteranen des Zweiten Weltkriegs alle Personen anerkennen, die zwischen dem 7. Dezember 1941 und dem 31. Dezember 1946 gedient haben."
CW_Expansion_country.26.a:0 "Endlich Frieden"
CW_Expansion_country.27.t:0 "Kopenhagen-Crash"
CW_Expansion_country.27.d:0 "Kurz nach dem Start stürzte eine DC-3 mit dem schwedischen Kronprinzen Prinz Gustaf Adolf und 21 anderen Passagieren ab, wobei alle an Bord ums Leben kamen."
CW_Expansion_country.27.a:0 "Ein Verlust für Schweden und die Welt"
CW_Expansion_country.28.t:0 "Frieden im Osten"
CW_Expansion_country.28.d:0 "Nach Gesprächen in Paris wurden die endgültigen Friedensverträge zwischen den Alliierten und Italien, Rumänien, Bulgarien und Finnland unterzeichnet, wodurch der Konflikt im Osten formell beendet wurde."
CW_Expansion_country.28.a:0 "Das Schlimmste liegt nun hinter uns."
CW_Expansion_country.29.t:0 "Internationaler Währungsfonds tritt in Kraft"
CW_Expansion_country.29.d:0 "Nach zweijährigen Verhandlungen haben alle 24 Mitglieder des IWF nun begonnen, auf der Grundlage vereinbarter gemeinsamer Strategien zu handeln, um eine Wiederholung der Großen Depression zu verhindern."
CW_Expansion_country.29.a:0 "Mehr Geld für alle!"
CW_Expansion_country.30.t:0 "Katastrophe in Texas City"
CW_Expansion_country.30.d:0 "Nach einem Brand im Laderaum der SS Grandcamp, die über 2300 Tonnen Ammoniumnitrat geladen hatte, erschütterte eine Reihe von Explosionen die Stadt. Die erste davon gilt als die größte nichtnukleare Explosion, die nicht durch eine Bombe verursacht wurde. 600 Menschen kamen durch die Explosionen und die darauffolgenden Brände ums Leben."
CW_Expansion_country.30.a:0 "Unser Mitgefühl gilt ihnen."
CW_Expansion_country.31.t:0 "Massaker von Portella Della Ginestra"
CW_Expansion_country.31.d:0 "Bei der Parade zum Tag der Arbeit am 1. Mai eröffnete eine Bande sizilianischer Separatisten das Feuer auf Zivilisten. Dabei wurden elf Menschen getötet und 27 weitere verletzt. Dies ist der bisher schlimmste Anschlag in der italienischen Nachkriegspolitik."
CW_Expansion_country.31.a:0 "Ein dunkler Tag für Italien"
CW_Expansion_country.32.t:0 "Weltuntergangsuhr eingeführt"
CW_Expansion_country.32.d:0 "Angesichts zunehmender Anzeichen für einen Anstieg der globalen Spannungen hat das Bulletin of Atomic Scientists beschlossen, eine Uhr einzuführen, die die Wahrscheinlichkeit eines dritten globalen Konflikts anzeigt. Man hofft, dass dies zur Entspannung der Lage beitragen wird."
CW_Expansion_country.32.a:0 "Hoffen wir, dass es nie 12 wird."
CW_Expansion_country.33.t:0 "Roswell-Zwischenfall"
CW_Expansion_country.33.d:0 "Sichtungen einer abgestürzten Scheibe in Roswell, New Mexico, haben Spekulationen ausgelöst, dass außerirdische Lebensformen Kontakt mit der Erde aufgenommen haben. Offiziell hat die USAAF dies dementiert und erklärt, es handele sich um Teile eines Wetterballons."
CW_Expansion_country.33.a:0 "Bringen Sie uns zu Ihrem Anführer!"
CW_Expansion_country.34.t:0 "Brotunruhen"
CW_Expansion_country.34.d:0 "Nach einer schlechten Getreideernte unternahm die französische Regierung den mutigen Schritt, die tägliche Brotration auf 200 g zu reduzieren, was zu Unruhen in Le Mans und Verdun führte."
CW_Expansion_country.34.a:0 "Interessant"
CW_Expansion_country.35.t:0 "Neue Mitglieder der UNO"
CW_Expansion_country.35.d:0 "Mit Wirkung vom 1. Oktober werden Jemen und Pakistan die ersten Nicht-Gründungsmitglieder der UNO sein. Es ist zu hoffen, dass sie die ersten von vielen weiteren sein werden."
CW_Expansion_country.35.a:0 "Willkommen im Club!"
CW_Expansion_country.36.t:0 "Allgemeines Zoll- und Handelsabkommen geschlossen"
CW_Expansion_country.36.d:0 "Im Rahmen der Bemühungen um eine globale wirtschaftliche Erholung haben über 70 Länder ein neues gemeinsames Abkommen über rechtliche Handelshemmnisse unterzeichnet. Man hofft, dass dies das Wachstum des globalen Handels und der Innovation fördern wird."
CW_Expansion_country.36.a:0 "Auf bessere Zeiten!"
CW_Expansion_country.37.t:0 "Königliche Hochzeit in Großbritannien"
CW_Expansion_country.37.d:0 "Nach rund vierjähriger Freundschaft heiratete der Herzog von Edinburgh heute in der Westminster Abbey Kronprinzessin Elizabeth und Philip Mountbatten. Die Hochzeit war die größte Zusammenkunft europäischer Monarchen seit dem Tod von Königin Victoria im Jahr 1901."
CW_Expansion_country.37.a:0 "Mögen sie eine glückliche Ehe haben."
CW_Expansion_country.38.t:0 "Sieg für Cambridge-Frauen"
CW_Expansion_country.38.d:0 "Nach 20 Jahren unermüdlichen Einsatzes wurde Frauen die Vollmitgliedschaft an der renommierten Universität Cambridge in England gewährt."
CW_Expansion_country.38.a:0 "Dies ist ein Schritt in die richtige Richtung"
CW_Expansion_country.39.t:0 "Erste Farbrolle"
CW_Expansion_country.39.d:0 "Warner Bros. zeigte heute seine Fortschritte bei der Filmproduktion mit der weltweit ersten Farbwochenschau!"
CW_Expansion_country.39.a:0 "Ich mag es"
CW_Expansion_country.40.t:0 "Nascar gegründet"
CW_Expansion_country.40.d:0 "Am 21. Februar 1948 wurde die National Association for Stock Car Racing – kurz NASCAR, wie sie später allgemein genannt wurde – offiziell gegründet. NASCAR-Rennen entwickelten sich zu einer der beliebtesten Zuschauersportarten Amerikas und zu einer Multimilliarden-Dollar-Industrie."
CW_Expansion_country.40.a:0 "Hübsch"
CW_Expansion_country.41.t:0 "Gründung der Hells Angels"
CW_Expansion_country.41.d:0 "Hells Angels, vollständig Hells Angels Motorcycle Club oder Hells Angels Motorcycle Corporation, ist ein Club für Motorradfahrer, der 1948 in Kalifornien gegründet wurde und wahrscheinlich die bekannteste der sogenannten „Outlaw Motorcycle Gangs“ ist. Dem international tätigen Club werden von den Strafverfolgungsbehörden kriminelle Aktivitäten vorgeworfen."
CW_Expansion_country.41.a:0 "Weiterfahren!"
CW_Expansion_country.42.t:0 "WHO gegründet"
CW_Expansion_country.42.d:0 "Weltgesundheitsorganisation (WHO), französische Organisation Mondiale de la Santé, ist eine Sonderorganisation der Vereinten Nationen (UN), die 1948 gegründet wurde, um die internationale Zusammenarbeit zur Verbesserung der öffentlichen Gesundheit zu fördern. Obwohl sie von der Gesundheitsorganisation des Völkerbundes (gegründet 1923) und dem Internationalen Büro für öffentliche Gesundheit in Paris (gegründet 1907) spezifische Aufgaben in Bezug auf Seuchenbekämpfung, Quarantänemaßnahmen und Arzneimittelstandardisierung übernahm, erhielt die WHO in ihrer Satzung das umfassende Mandat, das Erreichen des „höchstmöglichen Gesundheitsniveaus“ aller Völker zu fördern. Die WHO definiert Gesundheit positiv als „einen Zustand vollständigen körperlichen, geistigen und sozialen Wohlbefindens und nicht nur das Fehlen von Krankheit oder Gebrechen“. Ihren Gründungstag, den 7. April 1948, begeht die WHO jährlich als Weltgesundheitstag."
CW_Expansion_country.42.a:0 "WHO?"
CW_Expansion_country.43.t:0 "Sonnenfinsternis in Japan"
CW_Expansion_country.43.d:0 "Die kürzeste Sonnenfinsternis der Welt wurde heute über Japan und Italien gesichtet"
CW_Expansion_country.43.a:0 "Bedecken Sie Ihre Augen!"
CW_Expansion_country.44.t:0 "Erster Affenastronaut im Weltraum"
CW_Expansion_country.44.d:0 "Ein Kapuzineraffen namens Albert I. ist heute ins All geflogen und damit das erste Säugetier im Weltraum."
CW_Expansion_country.44.a:0 "Hoffentlich haben sie genug Bananen ..."
CW_Expansion_country.45.t:0 "Mantell-UFO-Vorfall"
CW_Expansion_country.45.d:0 "Am 7. Januar 1948 starb der 25-jährige Captain Thomas F. Mantell, ein Pilot der Kentucky Air National Guard, beim Absturz seines Kampfflugzeugs P-51 Mustang nahe Franklin im US-Bundesstaat Kentucky, nachdem er auf die Verfolgung eines unbekannten Flugobjekts (UFO) geschickt worden war. Das Ereignis gehörte zu den frühsten UFO-Vorfällen, die in der Öffentlichkeit am meisten Beachtung fanden. Spätere Untersuchungen des Project Blue Book der US Air Force ergaben, dass Mantell möglicherweise bei der Jagd auf einen Skyhook-Ballon ums Leben kam, ein streng geheimes Projekt, von dem er 1948 nichts wusste. Mantell verfolgte das Objekt in einem steilen Steigflug und ignorierte Empfehlungen, seine Flughöhe zu glätten. In großer Höhe verlor er aufgrund von Sauerstoffmangel das Bewusstsein; sein Flugzeug geriet in eine Sinkspirale und stürzte ab."
CW_Expansion_country.45.a:1 "Gruselig"
CW_Expansion_country.46.t:0 "Teigin-Giftfall"
CW_Expansion_country.46.d:0 "Am 26. Januar 1948 erschien vor Geschäftsschluss ein Mann, der sich Epidemiologe nannte, in einer Filiale der Kaiserlichen Bank (Teikoku Ginkō, auch bekannt als Teigin) in Shiinamachi, einem Vorort von Toshima, Tokio. Er erklärte, er sei ein Beamter des öffentlichen Gesundheitswesens, der von den US-Besatzungsbehörden geschickt worden sei und den Auftrag gehabt habe, das Personal gegen einen plötzlichen Ausbruch von Ruhr zu impfen. Er gab allen sechzehn anwesenden Personen eine Tablette und einige Tropfen Flüssigkeit. Die Anwesenden tranken die Flüssigkeit, die er ihnen gab. Später wurde angenommen, dass es sich dabei um „Nitrilcyanid“ handelte, ein ursprünglich im Noborito-Labor entwickelter Mordgiftstoff. Als alle außer Gefecht gesetzt waren, nahm der Räuber etwas Geld im Wert von 160.000 Yen (damals etwa 2.000 US-Dollar) von den Schreibtischen, ließ den Großteil jedoch zurück, sodass sein Motiv unbekannt ist. Zehn der Opfer starben noch am Tatort (eines war das Kind eines Angestellten), zwei weitere starben im Krankenhaus."
CW_Expansion_country.46.a:1 "Gieriger Feigling"
CW_Expansion_country.47.t:0 "Ermordung von Mahatma Gandhi"
CW_Expansion_country.47.d:0 "Mahatma Gandhi wurde am 30. Januar 1948 auf dem Gelände des Birla House (heute Gandhi Smriti), einem großen Herrenhaus in Neu-Delhi, ermordet. Sein Mörder war Nathuram Godse, ein Verfechter des Hindu-Nationalismus, Mitglied der politischen Partei Hindu Mahasabha und der hindu-nationalistischen Freiwilligenorganisation Rashtriya Swayamsevak Sangh (RSS). Godse war der Ansicht, Gandhi sei während der Teilung Indiens im Vorjahr den Muslimen gegenüber zu entgegenkommend gewesen. Zeugenaussagen zufolge hatte Gandhi kurz nach 17 Uhr die Stufen zum erhöhten Rasen hinter dem Birla House erreicht, wo er allabendlich multireligiöse Gebetstreffen abgehalten hatte. Als Gandhi auf das Podium zuging, trat Godse aus der Menge, die Gandhi flankierte, hervor und feuerte aus kürzester Distanz drei Kugeln in Gandhis Brust und Bauch. Gandhi stürzte zu Boden. Er wurde in sein Zimmer im Birla House zurückgebracht, aus dem einige Zeit später ein Vertreter kam, um seinen Tod bekannt zu geben."
CW_Expansion_country.47.a:1 "Tragisch"
CW_Expansion_country.48.t:0 "Bombenanschläge in der Ben-Yehuda-Straße"
CW_Expansion_country.48.d:0 "Die Bombenanschläge in der Ben-Yehuda-Straße sind eine Reihe von Anschlägen auf Zivilisten in der Jerusalemer Innenstadt ab Februar 1948, die von palästinensischen Arabern verübt oder angeordnet wurden. Einige von ihnen waren Selbstmordattentäter. Die Anschläge ereigneten sich in der Ben-Yehuda-Straße, einer Hauptverkehrsstraße, die später zu einer Fußgängerzone wurde und nach Eliezer Ben Yehuda, dem treibenden Geist hinter der Entstehung des modernen Hebräisch, benannt ist."
CW_Expansion_country.48.a:1 "Schrecklich"
CW_Expansion_country.49.t:0 "Vertrag von Brüssel"
CW_Expansion_country.49.d:0 "Der Vertrag von Brüssel, auch Brüsseler Pakt genannt, war zwischen 1948 und 1954 der Gründungsvertrag der Westlichen Union (WU). Anschließend wurde er zum Modifizierten Brüsseler Vertrag (MTB) abgeändert und diente bis zu seiner Auflösung im Jahr 2010 als Gründungsvertrag der Westeuropäischen Union (WEU). Der Vertrag sah die Organisation der militärischen, wirtschaftlichen, sozialen und kulturellen Zusammenarbeit zwischen den Mitgliedstaaten sowie eine gegenseitige Verteidigungsklausel vor. Der Vertrag wurde am 17. März 1948 von Belgien, Frankreich, Luxemburg, den Niederlanden und dem Vereinigten Königreich, den Mitgliedern der Westlichen Union, als Erweiterung des Vertrags von Dünkirchen unterzeichnet, der im Vorjahr zwischen Großbritannien und Frankreich zum Schutz vor einer möglichen deutschen oder sowjetischen Aggression nach dem Ende des Zweiten Weltkriegs unterzeichnet worden war."
CW_Expansion_country.49.a:1 "Die Europäische Union schaffen"
CW_Expansion_country.49.b:1 "Wir brauchen es nicht"
CW_Expansion_country.50.t:0 "Präsident Harry Truman unterzeichnet Marshallplan"
CW_Expansion_country.50.d:0 "An diesem Tag im Jahr 1948 unterzeichnete Präsident Harry S. Truman den Economic Assistance Act, der die Schaffung eines Programms genehmigte, das den europäischen Nationen nach den Zerstörungen des Zweiten Weltkriegs beim Wiederaufbau helfen sollte. Der als Marshallplan bekannte Plan zielte darauf ab, Europa wirtschaftlich und politisch zu stabilisieren, damit die europäischen Nationen nicht der Versuchung kommunistischer Parteien erliegen würden."
CW_Expansion_country.50.a:1 "OK"
CW_Expansion_country.50.b:0 "Aber egal, wir werden das nicht unterschreiben"
CW_Expansion_country.51.t:0 "Organisation Amerikanischer Staaten"
CW_Expansion_country.51.d:0 "Die Organisation Amerikanischer Staaten (OAS oder OEA) ist eine internationale Organisation, die am 30. April 1948 zum Zweck der Solidarität und Zusammenarbeit zwischen ihren Mitgliedsstaaten der westlichen Hemisphäre gegründet wurde."
CW_Expansion_country.51.a:1 "OK"
CW_Expansion_country.52.t:0 "Sowjetische Deportationen aus Litauen"
CW_Expansion_country.52.d:0 "Die sowjetischen Deportationen aus Litauen waren eine Serie von 35 Massendeportationen, die in Litauen zwischen 1941 und 1945–1952 durchgeführt wurden. Das Land war als sozialistische Teilrepublik der Sowjetunion besetzt. Mindestens 130.000 Menschen, 70 % davon Frauen und Kinder, wurden gewaltsam in Arbeitslager und andere Zwangssiedlungen in entlegenen Teilen der Sowjetunion deportiert, insbesondere in der Oblast Irkutsk und der Region Krasnojarsk. Unter den Deportierten waren etwa 4.500 Polen. Nicht enthalten in diesen Deportationen sind litauische Partisanen und politische Gefangene (ca. 150.000 Menschen), die in Gulags (Gefangenenlager) deportiert wurden. Die Deportationen der Zivilisten dienten einem doppelten Zweck: Sie unterdrückten den Widerstand gegen die Sowjetisierungspolitik in Litauen und sorgten für unbezahlte Arbeitskräfte in dünn besiedelten Gebieten der Sowjetunion."
CW_Expansion_country.52.a:1 "Nicht gut"
CW_Expansion_country.53.t:0 "United Airlines Flug 624 stürzt ab"
CW_Expansion_country.53.d:0 "United Airlines Flug 624, eine Douglas DC-6 mit der Kennung NC37506, war ein Linienflug mit Start in San Diego, Kalifornien, und Zwischenlandungen in Los Angeles und Chicago auf dem Weg zum Flughafen LaGuardia in New York City. Die viermotorige Propellermaschine stürzte am 17. Juni 1948 um 13:41 Uhr Eastern Daylight Time außerhalb von Aristes, Pennsylvania, ab. Dabei kamen alle vier Besatzungsmitglieder und 39 Passagiere an Bord ums Leben."
CW_Expansion_country.53.a:1 "Tragisch"
CW_Expansion_country.54.t:0 "Berlin-Blockade"
CW_Expansion_country.54.d:0 "Die Berlin-Blockade (24. Juni 1948 – 12. Mai 1949) war eine der ersten großen internationalen Krisen des Kalten Krieges. Während der multinationalen Besatzung Deutschlands nach dem Zweiten Weltkrieg blockierte die Sowjetunion den Eisenbahn-, Straßen- und Kanalzugang der Westalliierten zu den von Westmächte kontrollierten Sektoren Berlins. Die Sowjets boten an, die Blockade aufzuheben, wenn die Westalliierten die neu eingeführte D-Mark aus West-Berlin abziehen würden."
CW_Expansion_country.54.a:1 "Blockade Berlin"
CW_Expansion_country.54.b:1 "Nicht notwendig"
CW_Expansion_country.55.t:0 "Die Geburt des NHS"
CW_Expansion_country.55.d:0 "Am 5. Juli starten wir gemeinsam den neuen Nationalen Gesundheitsdienst. Seine Entstehung verlief nicht völlig reibungslos. Es gab verständliche Ängste, die bei einem so großen und neuartigen Unterfangen unvermeidlich sind. Auch wird sich unser gravierender Mangel an Pflegekräften und anderen Fachkräften sowie an modernen, sanierten Gebäuden und Geräten nicht über Nacht wie durch ein Wunder beheben lassen. Doch je früher wir beginnen, desto eher können wir versuchen, diese Dinge zu erkennen und die Verbesserungen zu erreichen, die wir alle wollen. Meine Aufgabe ist es, Ihnen alle mir zur Verfügung stehenden Einrichtungen, Ressourcen und Hilfe zur Verfügung zu stellen und Sie dann als Fachkräfte in Ruhe zu lassen, damit Sie Ihre Fähigkeiten und Ihr Urteilsvermögen ungehindert einsetzen können. Lassen Sie uns versuchen, diese Partnerschaft von nun an weiterzuentwickeln."
CW_Expansion_country.55.a:1 "Vielleicht können sie jetzt ihre Zähne reparieren"
CW_Expansion_country.56.t:0 "Durchführungsverordnung 9981"
CW_Expansion_country.56.d:0 "Die Executive Order 9981 wurde am 26. Juli 1948 von Präsident Harry S. Truman erlassen. Diese Executive Order schaffte die Diskriminierung „aufgrund von Rasse, Hautfarbe, Religion oder nationaler Herkunft“ in den US-Streitkräften ab und führte zur Beendigung der Rassentrennung in den Streitkräften während des Koreakriegs (1950–1953). Sie war ein entscheidendes Ereignis für die Bürgerrechtsbewegung nach dem Zweiten Weltkrieg und ein bedeutender Erfolg von Trumans Präsidentschaft."
CW_Expansion_country.56.a:1 "Unterschreiben Sie die Bestellung"
CW_Expansion_country.56.b:1 "Nein, wir sind Rassisten"
CW_Expansion_country.57.t:0 "Gründung der Republik Korea"
CW_Expansion_country.57.d:0 "Am 15. August 1948 wurde die Republik Korea mit Syngman Rhee als erstem Präsidenten offiziell gegründet. Mit der Einsetzung von Rhees Regierung ging auch die rechtliche Souveränität auf die neue Regierung über. Am 9. September 1948 wurde unter Kim Il-sung ein kommunistisches Regime, die Demokratische Volksrepublik Korea (Nordkorea), ausgerufen. Am 12. Dezember 1948 erkannten die Vereinten Nationen jedoch mit Resolution 195 der Dritten Generalversammlung die Republik Korea als alleinige rechtmäßige Regierung Koreas an."
CW_Expansion_country.57.a:1 "OK"
CW_Expansion_country.58.t:0 "DRPK gegründet"
CW_Expansion_country.58.d:0 "Als 1948 die Demokratische Volksrepublik Korea gegründet wurde, wurde Kim Il-Sung der erste Premierminister des nordkoreanischen kommunistischen Regimes. 1949 wurde er Vorsitzender der Koreanischen Arbeiterpartei (KWP), die aus den zuvor gegründeten kommunistischen Parteien hervorgegangen war. Bis zu seinem Tod 1994 regierte Kim das Land mit eiserner Hand und förderte einen Personenkult um sich selbst als „Großen Führer“ des koreanischen Volkes."
CW_Expansion_country.58.a:1 "OK"
CW_Expansion_country.59.t:0 "Erdbeben in Aschgabat"
CW_Expansion_country.59.d:0 "Das Erdbeben von Aschgabat 1948 ereignete sich am 6. Oktober in Turkmenistan nahe Aschgabat mit einer Oberflächenwellenstärke von 7,3 und einer maximalen Mercalli-Intensität von X (Extrem). Aufgrund der Zensur durch die Sowjetregierung wurde in den sowjetischen Medien nicht ausführlich über das Ereignis berichtet. Historiker sind sich einig, dass das Verbot der Berichterstattung über das Ausmaß der Opfer und Schäden es der Sowjetregierung nicht ermöglichte, genügend finanzielle Mittel für eine angemessene Reaktion bereitzustellen."
CW_Expansion_country.59.a:1 "OK"
CW_Expansion_country.60.t:0 "Japanische Beamte zum Tode verurteilt"
CW_Expansion_country.60.d:0 "Am Freitag, dem 12. November 1948, als die Kriegsverbrecherprozesse sich dem Ende zuneigten, verkündete der Präsident des Internationalen Militärgerichtshofs für den Fernen Osten, Oberster Richter Sir William Webb KBE LLD, die Urteile über diejenigen, die der Gerichtshof der Verbrechen gegen die Menschlichkeit für schuldig befunden hatte. "
CW_Expansion_country.60.a:1 "Gerechtigkeit"
CW_Expansion_country.61.t:0 "UNO verabschiedet Völkermordkonvention"
CW_Expansion_country.61.d:0 "Die Konvention über die Verhütung und Bestrafung des Völkermordes wurde am 9. Dezember 1948 von der Generalversammlung der Vereinten Nationen einstimmig als Resolution 260 verabschiedet. Die Konvention trat am 12. Januar 1951 in Kraft. Sie definiert Völkermord rechtlich und ist das Ergebnis jahrelanger Bemühungen des Anwalts Raphael Lemkin. Alle teilnehmenden Länder werden aufgefordert, Völkermord in Kriegs- und Friedenszeiten zu verhindern und zu bestrafen. Bis Mai 2019 haben 152 Staaten den Vertrag ratifiziert oder sind ihm beigetreten, zuletzt Mauritius am 8. Juli 2019. Ein Staat, die Dominikanische Republik, hat den Vertrag unterzeichnet, aber nicht ratifiziert."
CW_Expansion_country.61.a:1 "Großartig"
CW_Expansion_country.62.t:0 "Allgemeine Erklärung der Menschenrechte"
CW_Expansion_country.62.d:0 "Die Allgemeine Erklärung der Menschenrechte (AEMR) ist ein internationales Dokument, das von der Generalversammlung der Vereinten Nationen verabschiedet wurde und die Rechte und Freiheiten aller Menschen festschreibt. Sie wurde von der Generalversammlung in ihrer dritten Sitzung am 10. Dezember 1948 im Palais de Chaillot in Paris, Frankreich, als Resolution 217 angenommen. Von den damals 58 Mitgliedern der Vereinten Nationen stimmten 48 dafür, keiner dagegen, acht enthielten sich und zwei nahmen nicht an der Abstimmung teil."
CW_Expansion_country.62.a:1 "Großartig"
CW_Expansion_country.63.t:0 "Japanische Kriegsverbrecher in Tokio gehängt"
CW_Expansion_country.63.d:0 "In Tokio, Japan, wird Hideki Tojo, ehemaliger japanischer Premierminister und Chef der Kwantung-Armee, zusammen mit sechs weiteren hochrangigen japanischen Politikern wegen ihrer Kriegsverbrechen im Zweiten Weltkrieg hingerichtet. Sieben der Angeklagten wurden zudem wegen Verbrechen gegen die Menschlichkeit für schuldig befunden, insbesondere im Hinblick auf den systematischen Völkermord an der chinesischen Bevölkerung."
CW_Expansion_country.63.a:1 "Gerechtigkeit"
CW_Expansion_country.64.t:0 "Präsident Truman hält Rede zum Fair Deal"
CW_Expansion_country.64.d:0 "Am 5. Januar 1949 verkündete Präsident Harry S. Truman in seiner Rede zur Lage der Nation, dass jeder Amerikaner ein Recht auf faire Behandlung durch unsere Regierung habe. In Anlehnung an Franklin Roosevelts New-Deal-Politik kündigte Truman seine Pläne für innenpolitische Reformen an, darunter eine staatliche Krankenversicherung, sozialen Wohnungsbau, Bürgerrechtsgesetze und staatliche Bildungshilfe. Er plädierte für eine Erhöhung des Mindestlohns, staatliche Unterstützung für Landwirte und einen Ausbau der Sozialversicherung. Außerdem drängte er auf die sofortige Umsetzung von Antidiskriminierungsmaßnahmen im Arbeitsleben."
CW_Expansion_country.64.a:1 "OK"
CW_Expansion_country.65.t:0 "Kommunistische Kräfte erobern Peking"
CW_Expansion_country.65.d:0 "Nach dem Fall Tianjins an die kommunistischen Streitkräfte war die nationalistische Garnison in Beiping praktisch isoliert. Fu Zuoyi beschloss am 21. Januar, über eine Friedensregelung zu verhandeln. In der darauffolgenden Woche begannen 260.000 nationalistische Soldaten, die Stadt zu verlassen, in Erwartung einer sofortigen Kapitulation. Am 31. Januar marschierte die Vierte Feldarmee der Volksbefreiungsarmee in Beiping ein und nahm die Stadt ein. Damit war der Feldzug abgeschlossen."
CW_Expansion_country.65.a:1 "OK"
CW_Expansion_country.66.t:0 "Ende der Kleiderrationierung in Großbritannien"
CW_Expansion_country.66.d:0 "Die Ära des Improvisierens und Flickens ist endlich vorbei, da die Kleiderrationierung des Zweiten Weltkriegs endet. Wegen Stoffknappheit hatte die Kriegsregierung 1941 strenge Regeln eingeführt, um verschwenderisches Zuschneiden von Stoff zu verhindern. Kleider durften nicht mehr als zwei Taschen und fünf Knöpfe haben, der Rock eines Wollkleides durfte nicht mehr als sechs Nähte, zwei Kellerfalten oder vier Messerfalten haben. Unnötige Verzierungen waren nicht erlaubt."
CW_Expansion_country.66.a:1 "OK"
CW_Expansion_country.67.t:0 "Boxchampion Joe Louis tritt zurück"
CW_Expansion_country.67.d:0 "Nachdem er elf Jahre und acht Monate lang als Schwergewichts-Champion regiert hatte – ein Rekord –, trat Louis am 1. März 1949 zurück. "
CW_Expansion_country.67.a:1 "OK"
CW_Expansion_country.68.t:0 "März-Deportation"
CW_Expansion_country.68.d:0 "Operation Priboi war der Deckname für die sowjetische Massendeportation aus den baltischen Staaten vom 25. bis 28. März 1949. Baltische Historiker bezeichnen die Aktion auch als Märzdeportation (estnisch Märtsiküüditamine; lettisch Marta deportācijas; russisch Мартовская депортация). Mehr als 90.000 Esten, Letten und Litauer, die als „Volksfeinde“ galten, wurden in Zwangssiedlungen in unwirtlichen Gebieten der Sowjetunion deportiert. Über 70 % der Deportierten waren Frauen und Kinder unter 16 Jahren."
CW_Expansion_country.68.a:1 "OK"
CW_Expansion_country.69.t:0 "Anti-NATO-Aufruhr in Island"
CW_Expansion_country.69.d:0 "Auslöser der Anti-NATO-Unruhen in Island vom 30. März 1949 war die Entscheidung des isländischen Parlaments Alþingi, der neu gegründeten NATO beizutreten. Island wurde dadurch direkt in den Kalten Krieg verwickelt, stand in Opposition zur Sowjetunion und remilitarisierte das Land."
CW_Expansion_country.69.a:1 "OK"
CW_Expansion_country.70.t:0 "Der Status von Neufundland"
CW_Expansion_country.70.d:0 "Am 1. April 1949 setzte Premierminister Louis St-Laurent die ersten zeremoniellen Meißelstriche in den blanken Stein. Um 23:59 Uhr am Vorabend war Neufundland eine kanadische Provinz geworden. An seiner Seite befand sich der Neufundländer F. Gordon Bradley. Er war gerade als Mitglied des Bundeskabinetts vereidigt worden. „Wir sind jetzt alle Kanadier“, verkündete Bradley."
CW_Expansion_country.70.a:1 "Lass es Kanada haben"
CW_Expansion_country.70.b:1 "Neufundland ist britisch"
CW_Expansion_country.71.t:0 "Die Gründung der NATO"
CW_Expansion_country.71.d:0 "Die Vereinigten Staaten und elf weitere Nationen gründen die Nordatlantikpakt-Organisation (NATO), einen gegenseitigen Verteidigungspakt zur Eindämmung einer möglichen sowjetischen Aggression gegen Westeuropa. Während des gesamten Kalten Krieges war die NATO das wichtigste US-geführte Militärbündnis gegen die Sowjetunion."
CW_Expansion_country.71.a:1 "Gründung der NATO"
CW_Expansion_country.71.b:1 "Nicht erforderlich"
CW_Expansion_country.72.t:0 "Kommunistische Übernahme von Nanking"
CW_Expansion_country.72.d:0 "Am 23. April 1949, während des chinesischen Bürgerkriegs, eroberte Maos Volksbefreiungsarmee (VBA) die Stadt Nanking, heute Nanjing, damals Hauptstadt Chinas und Sitz der Nationalistischen Partei (auch bekannt als Kuomintang oder KMT). Obwohl die Kämpfe noch das ganze Jahr andauerten, während sich die KMT nach Südchina und schließlich nach Taiwan zurückzog, signalisierte dieser Sieg die unvermeidliche Niederlage der Nationalisten und das Ende des chinesischen Bürgerkriegs. Leonard L. Bacon war 1948 in Hangzhou stationiert und wurde kurz vor der Besetzung Nankings durch kommunistische Truppen nach Nanking versetzt."
CW_Expansion_country.72.a:1 "OK"
CW_Expansion_country.73.t:0 "Londoner Erklärung"
CW_Expansion_country.73.d:0 "In der vergangenen Woche trafen sich die Premierminister Großbritanniens, Australiens, Neuseelands, Südafrikas, Indiens, Pakistans und Ceylons sowie der kanadische Außenminister in London, um wichtige verfassungsrechtliche Fragen zu erörtern, die sich aus Indiens Entscheidung für eine republikanische Verfassung und seinem Wunsch, weiterhin Mitglied des Commonwealth zu bleiben, ergeben. Gegenstand der Diskussionen waren die Auswirkungen einer solchen Entwicklung auf die bestehende Struktur des Commonwealth und die verfassungsrechtlichen Beziehungen zwischen seinen Mitgliedern."
CW_Expansion_country.73.a:1 "OK"
CW_Expansion_country.74.t:0 "Fürst Rainier III. gekrönt"
CW_Expansion_country.74.d:0 "Rainier wurde in England und der Schweiz sowie an der Universität Montpellier in Frankreich ausgebildet. 1944, während des Zweiten Weltkriegs, diente er in der französischen Armee und studierte nach dem Krieg an der Universität von Paris. Nachdem seine Mutter 1944 auf ihre Thronfolge verzichtet hatte, bestieg Rainier am 5. Mai 1949, kurz vor dem Tod Ludwigs II., den Thron."
CW_Expansion_country.74.a:1 "Lang lebe der Prinz"
CW_Expansion_country.75.t:0 "Sowjetunion hebt elfmonatige Blockade auf"
CW_Expansion_country.75.d:0 "Am 12. Mai 1949 endete eine frühe Krise des Kalten Krieges, als die Sowjetunion ihre elfmonatige Blockade West-Berlins aufhob. Die Blockade war durch eine massive amerikanisch-britische Luftbrücke mit lebenswichtigen Gütern für die zwei Millionen Einwohner West-Berlins durchbrochen worden."
CW_Expansion_country.75.a:1 "OK"
CW_Expansion_country.76.t:0 "In Taiwan wurde das Kriegsrecht verhängt"
CW_Expansion_country.76.d:0 "Das Kriegsrecht wurde 1949 verhängt, als Chiang Kai-shek, Präsident der nationalistischen Regierung Chinas, und rund zwei Millionen Anhänger vor der vorrückenden kommunistischen Armee auf dem Festland flohen. Es verbot die Gründung neuer politischer Parteien, gab dem Militär weitreichende Zensurbefugnisse und wurde von Militärgerichten genutzt, um Tausende Zivilisten wegen Aufruhrs und anderer Verbrechen zu verurteilen."
CW_Expansion_country.76.a:1 "OK"
CW_Expansion_country.77.t:0 "Zweite Rote Angst"
CW_Expansion_country.77.d:0 "Die zweite Rote Angst war ein angstgetriebenes Phänomen, das durch die wachsende Macht kommunistischer Länder, insbesondere der Sowjetunion, nach dem Zweiten Weltkrieg ausgelöst wurde. Viele in den USA befürchteten, dass die Sowjetunion und ihre Verbündeten planten, den Kommunismus gewaltsam auf der ganzen Welt zu verbreiten und dabei sowohl demokratische als auch kapitalistische Institutionen zu stürzen. Da die Sowjetunion weite Teile Ost- und Mitteleuropas besetzt hielt, sahen viele in den USA ihre Befürchtungen vor einem kommunistischen Expansionismus bestätigt. Die USA befürchteten zudem, kommunistische Agenten hätten die Bundesregierung unterwandert. Es folgte eine massive Hexenjagd, um kommunistische Sympathisanten auszumerzen."
CW_Expansion_country.77.a:1 "Die Hexenjagd geht weiter"
CW_Expansion_country.77.b:1 "Dies ist nicht erforderlich"
CW_Expansion_country.78.t:0 "Explosion in Prüm"
CW_Expansion_country.78.d:0 "Am 15. Juli 1949 explodierte ein Munitionsdepot auf dem Kalvarienberg in der Eifel. Die Ursache der Explosion, bei der die Stadt schwer beschädigt wurde und zwölf Menschen starben, wurde nie geklärt. Der noch heute sichtbare Krater ist einer der größten von Menschenhand geschaffenen Explosionskrater überhaupt. Ein Kreuz auf dem Kalvarienberg erinnert an die Opfer der Katastrophe."
CW_Expansion_country.78.a:1 "OK"
CW_Expansion_country.79.t:0 "Die NBA ist geboren"
CW_Expansion_country.79.d:0 "Am 3. August 1949 fusionieren die rivalisierenden Basketball Association of America (BAA) und National Basketball League (NBL) nach einem dreijährigen, zermürbenden Kampf um Spieler und Fans zur National Basketball Association (NBA)."
CW_Expansion_country.79.a:1 "OK"
CW_Expansion_country.80.t:0 "Explosion bei Pacific Airlines"
CW_Expansion_country.80.d:0 "Die Explosion eines Flugzeugs der Canadian Pacific Airlines über der Region Charlevoix in Quebec am 9. September 1949 schockierte die Provinz. 23 Menschen, die nach Baie-Comeau in Quebec reisten, starben an diesem Tag, darunter Rita Morel, die Mutter eines vierjährigen Mädchens. Morels Ehemann, Albert Guay, wurde später wegen seiner Beteiligung an einem der ersten Bombenanschläge auf ein Passagierflugzeug in Kanada gehängt."
CW_Expansion_country.80.a:1 "OK"
CW_Expansion_country.81.t:0 "Sowjets zünden Atombombe"
CW_Expansion_country.81.d:0 "In einer überraschend zurückhaltenden und sorgfältig formulierten Erklärung informiert Präsident Harry S. Truman das amerikanische Volk über die Explosion einer sowjetischen Atombombe. Diese sowjetische Leistung, die den meisten US-Behörden um Jahre voraus war, löste in der amerikanischen Regierung Panik aus."
CW_Expansion_country.81.a:1 "Erhöhung der Ausgaben für Atomenergie"
CW_Expansion_country.81.b:1 "Nicht erforderlich"
CW_Expansion_country.82.t:0 "Kommunisten verurteilt"
CW_Expansion_country.82.d:0 "Dennis v. United States, 341 US 494 (1951), war ein Fall des Obersten Gerichtshofs der Vereinigten Staaten im Zusammenhang mit Eugene Dennis, Generalsekretär der Kommunistischen Partei der USA. Das Gericht entschied, dass Dennis gemäß dem Ersten Zusatzartikel zur US-Verfassung nicht das Recht auf freie Meinungsäußerung, Publikations- und Versammlungsfreiheit habe, wenn damit ein Komplott zum Sturz der Regierung verbunden sei. 1969 hob Brandenburg v. Ohio das Urteil von Dennis de facto auf."
CW_Expansion_country.82.a:1 "Ein hartes Urteil"
CW_Expansion_country.82.b:1 "Ein mildes Urteil"
CW_Expansion_country.83.t:0 "Ansprache von Winston Churchill"
CW_Expansion_country.83.d:0 "Am 28. November 1949 hält der ehemalige britische Premierminister Winston Churchill in der Kingsway Hall in London eine Rede, in der er die Idee einer Europäischen Union unterstützt und die Bedeutung der europäischen Bewegung in diesem Prozess betont."
CW_Expansion_country.83.a:1 "OK"
CW_Expansion_country.84.t:0 "Rückzug der Kuomintang nach Taiwan"
CW_Expansion_country.84.d:0 "Der Rückzug der Republik China nach Taiwan, auch bekannt als Rückzug der Kuomintang nach Taiwan oder (in Taiwan) „Der große Rückzug“, bezeichnet den Exodus der Überreste der international anerkannten Kuomintang-Regierung der Republik China auf die Insel Taiwan (Formosa) im Dezember 1949 gegen Ende der aktiven Kämpfe im chinesischen Bürgerkrieg. Die Kuomintang (KMT, Chinesische Nationalistische Partei), ihre Offiziere und etwa zwei Millionen Soldaten nahmen an dem Rückzug teil; außerdem viele Zivilisten und Flüchtlinge, die vor dem Vormarsch der kommunistischen Volksbefreiungsarmee flohen."
CW_Expansion_country.84.a:1 "OK"
CW_Expansion_country.85.t:0 "Der Warschauer Pakt wird gegründet"
CW_Expansion_country.85.d:0 "Der Warschauer Pakt, so genannt, weil der Vertrag in Warschau unterzeichnet wurde, umfasste die Sowjetunion, Albanien, Polen, Rumänien, Ungarn, Ostdeutschland, die Tschechoslowakei und Bulgarien. Der Vertrag rief die Mitgliedsstaaten dazu auf, jedem von einer externen Macht angegriffenen Mitgliedsstaat beizustehen, und richtete ein einheitliches Militärkommando unter Marschall Ivan S. Konev von der Sowjetunion ein. Die Einleitung zum Vertrag zur Gründung des Warschauer Pakts nannte den Grund für seine Existenz. Dieser drehte sich um „Westdeutschland, das remilitarisiert wird, und seine Aufnahme in den Nordatlantikblock, was die Gefahr eines neuen Krieges erhöht und eine Bedrohung für die nationale Sicherheit friedliebender Staaten darstellt“. Diese Passage bezog sich auf die Entscheidung der Vereinigten Staaten und der anderen Mitglieder der Nordatlantikvertrags-Organisation (NATO) vom 9. Mai 1955, Westdeutschland zum Mitglied der NATO zu machen und diesem Land die Remilitarisierung zu gestatten. Die Sowjets betrachteten dies offensichtlich als direkte Bedrohung und reagierten mit der Gründung des Warschauer Pakts."
CW_Expansion_country.85.a:1 "Gründung des Warschauer Pakts"
CW_Expansion_country.85.b:1 "Nicht erforderlich"

CW_Expansion_news.1.t:0 "Churchill hält Rede vor dem Eisernen Vorhang"
CW_Expansion_news.1.d:0 "In einer der berühmtesten Reden des Kalten Krieges verurteilte der ehemalige britische Premierminister Winston Churchill die Politik der Sowjetunion in Europa und erklärte: „Von Stettin an der Ostsee bis Triest an der Adria hat sich ein Eiserner Vorhang über den Kontinent gelegt.“ Churchills Rede gilt als eine der ersten Salven, die den Beginn des Kalten Krieges ankündigten."
CW_Expansion_news.1.a:1 "Über den Kontinent ist ein Eiserner Vorhang gefallen."
CW_Expansion_news.2.t:0 "Erste Sitzung der Generalversammlung der Vereinten Nationen"
CW_Expansion_news.2.d:0 "Die erste Generalversammlung der Vereinten Nationen, der 51 Nationen angehören, tagt in der Westminster Central Hall in London. Eine Woche später tritt der UN-Sicherheitsrat zum ersten Mal zusammen und legt seine Geschäftsordnung fest. Am 24. Januar verabschiedet die Generalversammlung ihre erste Resolution, die die friedliche Nutzung der Atomenergie und die Abschaffung von Atom- und anderen Massenvernichtungswaffen fordert."
CW_Expansion_news.2.a:0 "Ein weiterer Versuch, die Welt zu vereinen"
CW_Expansion_news.3.t:0 "Auflösung des Völkerbundes"
CW_Expansion_news.3.d:0 "Der Ausbruch des Zweiten Weltkriegs zeigte, dass der Völkerbund seinen Hauptzweck, künftige Weltkriege zu verhindern, verfehlt hatte. Der Völkerbund bestand 26 Jahre lang. Nach dem Ende des Zweiten Weltkriegs traten die Vereinten Nationen (UN) an seine Stelle und übernahmen mehrere vom Völkerbund gegründete Agenturen und Organisationen."
CW_Expansion_news.3.a:0 "Für eine bessere Welt"
CW_Expansion_news.4.t:0 "Italien schafft die Monarchie ab"
CW_Expansion_news.4.d:0 "Nach einem Verfassungsreferendum wurde die italienische Monarchie von der italienischen Republik abgelöst. Die Savoyer mussten als Strafe für ihre Unterstützung der Diktatur Benito Mussolinis und für ihre „Versäumnis, die Würde des Landes zu wahren“, abdanken, indem sie nach dem Zusammenbruch von Mussolinis Regime aus Rom flohen. Berichten zufolge hatten Umberto II. und die königliche Familie das Land verlassen und den Thron der Nationen an die Republikaner übergeben."
CW_Expansion_news.4.a:0 "Die Krone fällt mit dem Adler."
CW_Expansion_news.5.t:0 "Nürnberger Prozesse gehen weiter"
CW_Expansion_news.5.d:0 "Zwölf hochrangige Nazis wurden vom Internationalen Kriegsverbrechertribunal in Nürnberg zum Tode verurteilt. Zu den zum Tode durch den Strang Verurteilten gehörten Joachim von Ribbentrop, Nazi-Außenminister, Hermann Göring, Gründer der Gestapo und Chef der deutschen Luftwaffe, sowie Wilhelm Frick, Bundesinnenminister. Sieben weitere Angeklagte, darunter Rudolf Heß, der ehemalige Stellvertreter Adolf Hitlers, wurden zu Gefängnisstrafen zwischen zehn Jahren und lebenslänglich verurteilt, teilweise sogar zum Tode. Die Urteilsverkündung wird in Kürze bekannt gegeben."
CW_Expansion_news.5.d:0 "Sie haben bekommen, was sie verdienen"
CW_Expansion_news.6.t:0 "Unterzeichnung der Pariser Friedensverträge"
CW_Expansion_news.6.d:0 "Nach dem Ende des Zweiten Weltkriegs handelten die siegreichen Alliierten die Einzelheiten von Friedensverträgen mit Italien, Rumänien, Ungarn, Bulgarien und Finnland aus. Die Verträge ermöglichten es den besiegten Achsenmächten, ihre Verantwortung als souveräne Staaten in internationalen Angelegenheiten wieder aufzunehmen und sich für die Mitgliedschaft in den Vereinten Nationen zu qualifizieren. Die in den Friedensverträgen festgelegten Regelungen umfassten die Zahlung von Kriegsentschädigungen, die Einhaltung von Minderheitenrechten und territoriale Anpassungen, darunter das Ende des italienischen Kolonialreichs in Afrika, Griechenland und Albanien, sowie Änderungen der Grenzen zwischen Italien und Jugoslawien, Ungarn und der Tschechoslowakei, der Sowjetunion und Rumänien, Ungarn und Rumänien, Frankreich und Italien sowie der Sowjetunion und Finnland. Die Verträge verpflichteten die verschiedenen Staaten zudem, angeklagte Kriegsverbrecher für Kriegsverbrecherprozesse an die Alliierten auszuliefern."
CW_Expansion_news.6.a:0 "Hoffentlich wird dies den Konflikt in Europa beenden"
CW_Expansion_news.7.t:0 "Sowjetunion lehnt US-Atomenergiekontrollplan ab"
CW_Expansion_news.7.d:0 "Der Baruch-Plan war ein Vorschlag der US-Regierung, der maßgeblich von Bernard Baruch verfasst wurde. Er sollte die Nutzung von Atomenergie kontrollieren und einschränken. Kürzlich wurde der Plan von den Vereinten Nationen angenommen, von einem ihrer Mitglieder, der Sowjetunion, jedoch abgelehnt. Die UdSSR unterbreitete einen Gegenvorschlag mit der Begründung, die Vereinten Nationen würden von den USA und ihren Verbündeten in Westeuropa dominiert und man könne ihnen daher nicht zutrauen, die Autorität über Atomwaffen unparteiisch auszuüben. Der Gegenvorschlag verlangte, dass Amerika zunächst seine eigenen Atomwaffen abschaffen müsse, bevor Vorschläge für ein Kontroll- und Inspektionssystem in Betracht gezogen würden. Die Entscheidung zur Umsetzung des Plans steht noch aus."
CW_Expansion_news.7.a:0 "Das ist besorgniserregend"
CW_Expansion_news.8.t:0 "Mahatma Gandhi ermordet"
CW_Expansion_news.8.d:0 "Mahatma Gandhi, ein indischer Nationalist, der erfolgreich für Indiens Unabhängigkeit von der britischen Herrschaft kämpfte, wurde ermordet. Gandhi betete gerade für mehrere Religionen, als er auf das Podium zuging. Der Attentäter trat aus der Menge und schoss aus kürzester Distanz dreimal auf ihn. Wenige Augenblicke später wurde sein Tod festgestellt. Die Ermittlungen zur Suche und Festnahme des Täters dauern an."
CW_Expansion_news.8.a:0 "Er wird in Erinnerung bleiben"
CW_Expansion_news.9.t:0 "Internationales Militärtribunal in Japan eingerichtet"
CW_Expansion_news.9.d:0 "Das Internationale Militärtribunal für den Fernen Osten (IMTFE), auch bekannt als Tokioter Prozess oder Tokioter Kriegsverbrechertribunal, war ein Militärprozess, der am 29. April 1946 einberufen wurde, um die Führer des Kaiserreichs Japan wegen gemeinsamer Verschwörung zur Kriegsführung (eingestuft als Verbrechen der „Klasse A“), konventioneller Kriegsverbrechen („Klasse B“) und Verbrechen gegen die Menschlichkeit („Klasse C“) anzuklagen. Elf Länder (Australien, Kanada, China, Frankreich, Indien, die Niederlande, Neuseeland, die Philippinen, die Sowjetunion, das Vereinigte Königreich und die Vereinigten Staaten) stellten Richter und Staatsanwälte für das Gericht. Die Verteidigung bestand aus japanischen und amerikanischen Anwälten."
CW_Expansion_news.9.a:0 "Gerechtigkeit"
CW_Expansion_news.10.t:0 "Juan Perón wurde in Argentinien gewählt"
CW_Expansion_news.10.d:0 "1943 beteiligte er sich als Armeeoffizier an einem Militärputsch gegen die ineffektive Zivilregierung Argentiniens. Er wurde zum Arbeitsminister ernannt, sein Einfluss wuchs und 1944 wurde er zudem Vizepräsident und Kriegsminister. Im Oktober 1945 wurde Perón durch einen Putsch verfassungstreuer Zivilisten und Offiziere aus seinen Ämtern gedrängt und inhaftiert. Doch Appelle von Arbeitern und seiner charismatischen Geliebten Eva Duarte erzwangen bald seine Freilassung. In der Nacht seiner Freilassung, dem 17. Oktober, sprach er vom Balkon des Präsidentenpalastes vor etwa 300.000 Menschen und versprach, das Volk bei den kommenden Präsidentschaftswahlen zum Sieg zu führen. Vier Tage später heiratete der verwitwete Perón Eva Duarte, oder „Evita“, wie sie liebevoll genannt wurde."
CW_Expansion_news.10.a:0 "Was bedeutet das für Argentinien?"
CW_Expansion_news.11.t:0 "Burnden Park-Katastrophe"
CW_Expansion_news.11.d:0 "Die Burnden-Park-Katastrophe war ein Menschengedränge, das sich am 9. März 1946 im Fußballstadion Burnden Park, der damaligen Heimstätte der Bolton Wanderers, ereignete. 33 Menschen starben, Hunderte von Bolton-Fans wurden verletzt. Es war die tödlichste Stadionkatastrophe in der britischen Geschichte bis zur Ibrox-Park-Katastrophe 1971. Das Spiel, ein Rückspiel der sechsten Runde des FA Cups zwischen Bolton und Stoke City, durfte fortgesetzt werden, endete jedoch torlos. Die Katastrophe führte zum Moelwyn-Hughes-Bericht, der eine strengere Kontrolle der Zuschauerzahlen empfahl."
CW_Expansion_news.11.a:0 "Tragisch"
CW_Expansion_news.12.t:0 "In Japan dürfen Frauen erstmals wählen"
CW_Expansion_news.12.d:0 "Die Anfänge des Frauenwahlrechts in Japan reichen bis in die Demokratisierung durch die Meiji-Restauration zurück. Die Frauenwahlrechtsbewegung erlangte während der Taisho-Zeit an Bedeutung. Das Frauenverbot für politische Versammlungen wurde 1922 auf Forderungen von Frauenorganisationen unter Führung von Aktivistinnen wie Hiratsuka Raichō und Ichikawa Fusae aufgehoben. Die Bewegung erlitt während und nach der Weltwirtschaftskrise schwere Rückschläge, als die Unterstützung für die Demokratie zu schwinden begann und der Einfluss des Militärs auf die Zivilbevölkerung dramatisch zunahm. Die ersten allgemeinen Wahlen ohne Unterschied des Geschlechts fanden 1946 statt, doch erst 1947, mit dem Inkrafttreten der Verfassung für das Nachkriegsjapan, wurde das allgemeine Wahlrecht in Japan eingeführt."
CW_Expansion_news.12.a:0 "Wer hat sie aus der Küche gelassen?"
CW_Expansion_news.13.t:0 "Schlacht von Alcatraz"
CW_Expansion_news.13.d:0 "Die Schlacht von Alcatraz, die vom 2. bis 4. Mai 1946 dauerte, war das Ergebnis eines erfolglosen Fluchtversuchs bewaffneter Häftlinge aus dem Bundesgefängnis Alcatraz. Zwei Beamte des Federal Bureau of Prisons – William A. Miller und Harold Stites – wurden zusammen mit drei der Täter getötet. Vierzehn weitere Beamte und ein unbeteiligter Häftling wurden ebenfalls verletzt. Zwei der überlebenden Täter wurden später 1948 für ihre Rolle hingerichtet."
CW_Expansion_news.13.a:0 "Beunruhigend"
CW_Expansion_news.14.t:0 "Ion Antonescu hingerichtet"
CW_Expansion_news.14.d:0 "Am 1. Juni 1946 wird Ion Antonescu, der vom 6. September 1940 bis zum 23. August 1944 rumänischer Diktator war, von einem Militärkommando hingerichtet. Antonescu war in einem Nürnberger Prozess als Kriegsverbrecher zum Tode verurteilt worden."
CW_Expansion_news.14.a:0 "Gerechtigkeit"
CW_Expansion_news.15.t:0 "Weltbank nimmt Betrieb auf"
CW_Expansion_news.15.d:0 "Die Weltbank wurde 1944 auf der UN-Währungs- und Finanzkonferenz (allgemein bekannt als Bretton-Woods-Konferenz) gegründet, die ein neues internationales Wirtschaftssystem nach dem Zweiten Weltkrieg etablieren sollte. Im Juni 1946 nahm sie offiziell ihre Arbeit auf. Ihre ersten Kredite dienten dem Wiederaufbau Westeuropas nach dem Krieg. Ab Mitte der 1950er Jahre spielte sie eine wichtige Rolle bei der Finanzierung von Investitionen in Infrastrukturprojekte in Entwicklungsländern, darunter Straßen, Wasserkraftwerke, Wasser- und Abwasseranlagen, Seehäfen und Flughäfen."
CW_Expansion_news.15.a:0 "Vielleicht könnten wir einen Kredit beantragen?"
CW_Expansion_news.16.t:0 "USA testen Atomwaffen"
CW_Expansion_news.16.d:0 "Operation Crossroads war eine Reihe von Atomwaffentests, die die USA Mitte 1946 auf dem Bikini-Atoll durchführten. Es waren die ersten Atomwaffentests seit Trinity im Juli 1945 und die ersten Detonationen von Atombomben seit dem Atombombenabwurf auf Nagasaki am 9. August 1945. Ziel der Tests war es, die Auswirkungen von Atomwaffen auf Kriegsschiffe zu untersuchen."
CW_Expansion_news.16.a:0 "Beunruhigend"
CW_Expansion_news.17.t:0 "Bombenanschlag auf das King David Hotel"
CW_Expansion_news.17.d:0 "Der Bombenanschlag auf das King David Hotel war ein Terroranschlag der militanten rechtsgerichteten zionistischen Untergrundorganisation Irgun am Montag, dem 22. Juli 1946, auf die britische Verwaltungszentrale für Palästina, die während des jüdischen Aufstands im Mandatsgebiet Palästina im Südflügel des King David Hotels in Jerusalem untergebracht war. 91 Menschen verschiedener Nationalitäten wurden getötet und 46 verletzt."
CW_Expansion_news.17.a:0 "Tragisch"
CW_Expansion_news.18.t:0 "Atomenergiekommission gegründet"
CW_Expansion_news.18.d:0 "Die United States Atomic Energy Commission, allgemein bekannt als AEC, war eine Behörde der US-Regierung, die nach dem Zweiten Weltkrieg vom US-Kongress gegründet wurde, um die Entwicklung der Atomwissenschaft und -technologie in Friedenszeiten zu fördern und zu kontrollieren. Präsident Harry S. Truman unterzeichnete am 1. August 1946 den McMahon/Atomic Energy Act, der die Kontrolle über die Atomenergie mit Wirkung zum 1. Januar 1947 vom Militär in die zivile Hand übertrug. Diese Übertragung gab den Mitgliedern der AEC die vollständige Kontrolle über die Anlagen, Labore, Ausrüstung und das Personal, die während des Krieges zur Herstellung der Atombombe zusammengezogen wurden."
CW_Expansion_news.18.a:0 "Hoffen wir auf dauerhaften Frieden"
CW_Expansion_news.19.t:0 "Das Weihnachtsmannland wird eröffnet"
CW_Expansion_news.19.d:0 "Holiday World &amp; Splashin&#39; Safari (vor 1984 als Santa Claus Land bekannt) ist ein kombinierter Themen- und Wasserpark in der Nähe der Interstate 64 und der US 231 in Santa Claus, Indiana, USA. Der Themenpark ist in vier Bereiche unterteilt, die Weihnachten, Halloween, Thanksgiving und den 4. Juli mit Fahrgeschäften, Live-Unterhaltung, Spielen und Attraktionen feiern. Holiday World enthält drei Holzachterbahnen – The Raven, The Legend und The Voyage – sowie Thunderbird (ein von Bolliger &amp; Mabillard herausgebrachter Wing Coaster) und The Howler. Der Wasserpark im Safari-Stil umfasst die beiden längsten Wasserachterbahnen der Welt, Wildebeest und den Guinness-Weltrekordhalter Mammoth; außerdem gibt es eine Duell-Wasserachterbahn namens Cheetah Chase, zahlreiche Floßfahrten und Wasserrutschen für Familien, zwei Wellenbecken, ein Junior-Wellenbecken, zwei Wasserrutschenbereiche in Kindergröße, einen Strömungskanal und zwei „Kippeimer“ für Familien."
CW_Expansion_news.19.a:0 "Ho Ho Ho"
CW_Expansion_news.20.t:0 "Tag der direkten Aktion"
CW_Expansion_news.20.d:0 "Der Direct Action Day (16. August 1946), auch bekannt als die Kalkutta-Morde von 1946, war ein Tag weitverbreiteter Unruhen von Muslimen in der Stadt Kalkutta (heute Kolkata) in der Provinz Bengalen in Britisch-Indien. Der Tag markierte zugleich den Beginn der sogenannten „Woche der langen Messer“."
CW_Expansion_news.20.a:0 "Tragisch"
CW_Expansion_news.21.t:0 "Großer Preis von Turin"
CW_Expansion_news.21.d:0 "Der Große Preis von Turin 1946 war ein Grand-Prix-Autorennen, das am 1. September 1946 im Valentino Park stattfand. Es war das erste Formel-1-Rennen der Geschichte."
CW_Expansion_news.21.a:0 "Spannend"
CW_Expansion_news.22.t:0 "Völkermord an den Noakhali"
CW_Expansion_news.22.d:0 "Bei den Noakhali-Unruhen handelte es sich um eine Reihe halborganisierter Massaker, Vergewaltigungen, Entführungen und Zwangskonvertierungen von Hindus zum Islam sowie Plünderungen und Brandstiftungen hinduistischen Eigentums, die von der muslimischen Gemeinde in den Distrikten Noakhali in der Chittagong-Division von Bengalen (heute Bangladesch) im Oktober und November 1946 verübt wurden, ein Jahr vor Indiens Unabhängigkeit von der britischen Herrschaft. Sie betrafen die Gebiete unter den Polizeistationen Ramganj, Begumganj, Raipur, Lakshmipur, Chhagalnaiya und Sandwip im Distrikt Noakhali sowie die Gebiete unter den Polizeistationen Hajiganj, Faridganj, Chandpur, Laksham und Chauddagram im Distrikt Tipperah, eine Gesamtfläche von mehr als 2.000 Quadratmeilen."
CW_Expansion_news.22.a:0 "Tragisch"
CW_Expansion_news.23.t:0 "Hochrangiger Naziführer begeht Selbstmord"
CW_Expansion_news.23.d:0 "Am 15. Oktober 1946 stirbt Hermann Göring, Oberbefehlshaber der Luftwaffe, Reichstagspräsident, Chef der Gestapo, Ministerpräsident Preußens, Oberförster des Reichs, Oberliquidator beschlagnahmter Güter, oberster Leiter des Reichswetteramtes und designierter Nachfolger Hitlers, durch eigene Hand."
CW_Expansion_news.23.a:0 "Er entkam dem Henker"
CW_Expansion_news.24.t:0 "Brand im Winecoff-Hotel"
CW_Expansion_news.24.d:0 "Der Brand im Winecoff Hotel am 7. Dezember 1946 war der tödlichste Hotelbrand in der Geschichte der USA. 119 Hotelgäste, darunter auch die ursprünglichen Eigentümer, kamen ums Leben. Das Winecoff Hotel in der Peachtree Street 176 in der Innenstadt von Atlanta, Georgia, USA, wurde als „absolut feuerfest“ beworben. Während die Stahlkonstruktion des Hotels tatsächlich gegen Feuer geschützt war, war die Innenausstattung des Hotels brennbar, und der Ausgang des Gebäudes bestand aus einer einzigen Treppe, die alle 15 Stockwerke miteinander verband. Alle Hotelgäste oberhalb des Brandherds im dritten Stock waren eingeschlossen, und die Überlebenden des Brandes wurden entweder aus Fenstern in den oberen Stockwerken gerettet oder sprangen in von Feuerwehrleuten gehaltene Netze. Der Brand war bemerkenswert wegen der Anzahl der Opfer, die in den Tod sprangen. Ein Foto des Sturzes eines Überlebenden gewann 1947 den Pulitzer-Preis für Fotografie. Der Brand – der auf den Brand des La Salle Hotels in Chicago am 5. Juni 1946 (mit 61 Todesopfern) und den Brand des Canfield Hotels in Dubuque, Iowa am 19. Juni 1946 (mit 19 Todesopfern) folgte – führte zu erheblichen Änderungen der nordamerikanischen Bauvorschriften. Vor allem wurden in den Gästezimmern von Hotels mehrere geschützte Fluchtwege und selbstschließende feuerfeste Türen vorgeschrieben."
CW_Expansion_news.24.a:0 "Tragisch"
CW_Expansion_news.25.t:0 "Konferenz von Havanna"
CW_Expansion_news.25.d:0 "Die Havanna-Konferenz von 1946 war ein historisches Treffen der Anführer der US-amerikanischen Mafia und Cosa Nostra in Havanna, Kuba. Angeblich von Charles „Lucky“ Luciano arrangiert, wurde die Konferenz abgehalten, um wichtige Mafia-Richtlinien, Regeln und Geschäftsinteressen zu diskutieren. An der Havanna-Konferenz nahmen Delegationen von Verbrecherfamilien aus den gesamten Vereinigten Staaten teil. Die Konferenz fand in der Woche vom 22. Dezember 1946 im Hotel Nacional statt. Die Havanna-Konferenz gilt als der wichtigste Mafia-Gipfel seit der Atlantic City-Konferenz von 1929. Die in Havanna getroffenen Entscheidungen hatten in den folgenden Jahrzehnten Auswirkungen auf die US-amerikanischen Verbrecherfamilien."
CW_Expansion_news.25.a:0 "Ich werde ihm ein Angebot machen, das er nicht ablehnen kann"
CW_Expansion_news.26.t:0 "Proklamation 2714"
CW_Expansion_news.26.d:0 "Die Präsidialproklamation 2714 (61 Stat. 1048) wurde am 31. Dezember 1946 von Präsident Harry S. Truman unterzeichnet, um offiziell die Einstellung aller Feindseligkeiten im Zweiten Weltkrieg zu erklären. Obwohl die eigentlichen Kampfhandlungen in Europa am 8. Mai 1945 und im Pazifik am 2. September 1945 endeten, wurde der Kriegszustand in Japan und Deutschland nicht aufgehoben, um die Notwendigkeit von Besatzungstruppen in diesen Ländern zu begründen. Nach Abschluss der Kriegsverbrecherprozesse galten die Feindseligkeiten als beendet. Die Unterzeichnung der Proklamation 2714 ist der Grund, warum die USA als Veteranen des Zweiten Weltkriegs alle Personen anerkennen, die zwischen dem 7. Dezember 1941 und dem 31. Dezember 1946 gedient haben."
CW_Expansion_news.26.a:0 "Endlich Frieden"
CW_Expansion_news.27.t:0 "Kopenhagen-Crash"
CW_Expansion_news.27.d:0 "Kurz nach dem Start stürzte eine DC-3 mit dem schwedischen Kronprinzen Prinz Gustaf Adolf und 21 anderen Passagieren ab, wobei alle an Bord ums Leben kamen."
CW_Expansion_news.27.a:0 "Ein Verlust für Schweden und die Welt"
CW_Expansion_news.28.t:0 "Frieden im Osten"
CW_Expansion_news.28.d:0 "Nach Gesprächen in Paris wurden die endgültigen Friedensverträge zwischen den Alliierten und Italien, Rumänien, Bulgarien und Finnland unterzeichnet, wodurch der Konflikt im Osten formell beendet wurde."
CW_Expansion_news.28.a:0 "Das Schlimmste liegt nun hinter uns."
CW_Expansion_news.29.t:0 "Internationaler Währungsfonds tritt in Kraft"
CW_Expansion_news.29.d:0 "Nach zweijährigen Verhandlungen haben alle 24 Mitglieder des IWF nun begonnen, auf der Grundlage vereinbarter gemeinsamer Strategien zu handeln, um eine Wiederholung der Großen Depression zu verhindern."
CW_Expansion_news.29.a:0 "Mehr Geld für alle!"
CW_Expansion_news.30.t:0 "Katastrophe in Texas City"
CW_Expansion_news.30.d:0 "Nach einem Brand im Laderaum der SS Grandcamp, die über 2300 Tonnen Ammoniumnitrat geladen hatte, erschütterte eine Reihe von Explosionen die Stadt. Die erste davon gilt als die größte nichtnukleare Explosion, die nicht durch eine Bombe verursacht wurde. 600 Menschen kamen durch die Explosionen und die darauffolgenden Brände ums Leben."
CW_Expansion_news.30.a:0 "Unser Mitgefühl gilt ihnen."
CW_Expansion_news.31.t:0 "Massaker von Portella Della Ginestra"
CW_Expansion_news.31.d:0 "Bei der Parade zum Tag der Arbeit am 1. Mai eröffnete eine Bande sizilianischer Separatisten das Feuer auf Zivilisten. Dabei wurden elf Menschen getötet und 27 weitere verletzt. Dies ist der bisher schlimmste Anschlag in der italienischen Nachkriegspolitik."
CW_Expansion_news.31.a:0 "Ein dunkler Tag für Italien"
CW_Expansion_news.32.t:0 "Weltuntergangsuhr eingeführt"
CW_Expansion_news.32.d:0 "Angesichts zunehmender Anzeichen für einen Anstieg der globalen Spannungen hat das Bulletin of Atomic Scientists beschlossen, eine Uhr einzuführen, die die Wahrscheinlichkeit eines dritten globalen Konflikts anzeigt. Man hofft, dass dies zur Entspannung der Lage beitragen wird."
CW_Expansion_news.32.a:0 "Hoffen wir, dass es nie 12 wird."
CW_Expansion_news.33.t:0 "Roswell-Zwischenfall"
CW_Expansion_news.33.d:0 "Sichtungen einer abgestürzten Scheibe in Roswell, New Mexico, haben Spekulationen ausgelöst, dass außerirdische Lebensformen Kontakt mit der Erde aufgenommen haben. Offiziell hat die USAAF dies dementiert und erklärt, es handele sich um Teile eines Wetterballons."
CW_Expansion_news.33.a:0 "Bringen Sie uns zu Ihrem Anführer!"
CW_Expansion_news.34.t:0 "Brotunruhen"
CW_Expansion_news.34.d:0 "Nach einer schlechten Getreideernte unternahm die französische Regierung den mutigen Schritt, die tägliche Brotration auf 200 g zu reduzieren, was zu Unruhen in Le Mans und Verdun führte."
CW_Expansion_news.34.a:0 "Interessant"
CW_Expansion_news.35.t:0 "Neue Mitglieder der UNO"
CW_Expansion_news.35.d:0 "Mit Wirkung vom 1. Oktober werden Jemen und Pakistan die ersten Nicht-Gründungsmitglieder der UNO sein. Es ist zu hoffen, dass sie die ersten von vielen weiteren sein werden."
CW_Expansion_news.35.a:0 "Willkommen im Club!"
CW_Expansion_news.36.t:0 "Allgemeines Zoll- und Handelsabkommen geschlossen"
CW_Expansion_news.36.d:0 "Im Rahmen der Bemühungen um eine globale wirtschaftliche Erholung haben über 70 Länder ein neues gemeinsames Abkommen über rechtliche Handelshemmnisse unterzeichnet. Man hofft, dass dies das Wachstum des globalen Handels und der Innovation fördern wird."
CW_Expansion_news.36.a:0 "Auf bessere Zeiten!"
CW_Expansion_news.37.t:0 "Königliche Hochzeit in Großbritannien"
CW_Expansion_news.37.d:0 "Nach rund vierjähriger Freundschaft heiratete der Herzog von Edinburgh heute in der Westminster Abbey Kronprinzessin Elizabeth und Philip Mountbatten. Die Hochzeit war die größte Zusammenkunft europäischer Monarchen seit dem Tod von Königin Victoria im Jahr 1901."
CW_Expansion_news.37.a:0 "Mögen sie eine glückliche Ehe haben."
CW_Expansion_news.38.t:0 "Sieg für Cambridge-Frauen"
CW_Expansion_news.38.d:0 "Nach 20 Jahren unermüdlichen Einsatzes wurde Frauen die Vollmitgliedschaft an der renommierten Universität Cambridge in England gewährt."
CW_Expansion_news.38.a:0 "Dies ist ein Schritt in die richtige Richtung"
CW_Expansion_news.39.t:0 "Erste Farbrolle"
CW_Expansion_news.39.d:0 "Warner Bros. zeigte heute seine Fortschritte bei der Filmproduktion mit der weltweit ersten Farbwochenschau!"
CW_Expansion_news.39.a:0 "Ich mag es"
CW_Expansion_news.40.t:0 "Nascar gegründet"
CW_Expansion_news.40.d:0 "Am 21. Februar 1948 wurde die National Association for Stock Car Racing – kurz NASCAR, wie sie später allgemein genannt wurde – offiziell gegründet. NASCAR-Rennen entwickelten sich zu einer der beliebtesten Zuschauersportarten Amerikas und zu einer Multimilliarden-Dollar-Industrie."
CW_Expansion_news.40.a:0 "Hübsch"
CW_Expansion_news.41.t:0 "Gründung der Hells Angels"
CW_Expansion_news.41.d:0 "Hells Angels (vollständig Hells Angels Motorcycle Club oder Hells Angels Motorcycle Corporation) ist ein Club für Motorradfahrer, der 1948 in Kalifornien gegründet wurde und wahrscheinlich die bekannteste der sogenannten „Outlaw Motorcycle Gangs“ ist. Dem international tätigen Club werden von den Strafverfolgungsbehörden kriminelle Aktivitäten vorgeworfen."
CW_Expansion_news.41.a:0 "Weiterfahren!"
CW_Expansion_news.42.t:0 "WHO gegründet"
CW_Expansion_news.42.d:0 "Weltgesundheitsorganisation (WHO), französische Organisation Mondiale de la Santé, ist eine Sonderorganisation der Vereinten Nationen (UN), die 1948 gegründet wurde, um die internationale Zusammenarbeit zur Verbesserung der öffentlichen Gesundheit zu fördern. Obwohl sie von der Gesundheitsorganisation des Völkerbundes (gegründet 1923) und dem Internationalen Büro für öffentliche Gesundheit in Paris (gegründet 1907) spezifische Aufgaben in Bezug auf Seuchenbekämpfung, Quarantänemaßnahmen und Arzneimittelstandardisierung übernahm, erhielt die WHO in ihrer Satzung das umfassende Mandat, das Erreichen des „höchstmöglichen Gesundheitsniveaus“ aller Völker zu fördern. Die WHO definiert Gesundheit positiv als „einen Zustand vollständigen körperlichen, geistigen und sozialen Wohlbefindens und nicht nur das Fehlen von Krankheit oder Gebrechen“. Ihren Gründungstag, den 7. April 1948, begeht die WHO jährlich als Weltgesundheitstag."
CW_Expansion_news.42.a:0 "WHO?"
CW_Expansion_news.43.t:0 "Sonnenfinsternis in Japan"
CW_Expansion_news.43.d:0 "Die kürzeste Sonnenfinsternis der Welt wurde heute über Japan und Italien gesichtet"
CW_Expansion_news.43.a:0 "Bedecken Sie Ihre Augen!"
CW_Expansion_news.44.t:0 "Erster Affenastronaut im Weltraum"
CW_Expansion_news.44.d:0 "Ein Kapuzineraffen namens Albert I. ist heute ins All geflogen und damit das erste Säugetier im Weltraum."
CW_Expansion_news.44.a:0 "Hoffentlich haben sie genug Bananen ..."
CW_Expansion_news.45.t:0 "Mantell-UFO-Vorfall"
CW_Expansion_news.45.d:0 "Am 7. Januar 1948 starb der 25-jährige Captain Thomas F. Mantell, ein Pilot der Kentucky Air National Guard, beim Absturz seines Kampfflugzeugs P-51 Mustang nahe Franklin im US-Bundesstaat Kentucky, nachdem er auf die Verfolgung eines unbekannten Flugobjekts (UFO) geschickt worden war. Das Ereignis gehörte zu den frühsten UFO-Vorfällen, die in der Öffentlichkeit am meisten Beachtung fanden. Spätere Untersuchungen des Project Blue Book der US Air Force ergaben, dass Mantell möglicherweise bei der Jagd auf einen Skyhook-Ballon ums Leben kam, ein streng geheimes Projekt, von dem er 1948 nichts wusste. Mantell verfolgte das Objekt in einem steilen Steigflug und ignorierte Empfehlungen, seine Flughöhe zu glätten. In großer Höhe verlor er aufgrund von Sauerstoffmangel das Bewusstsein; sein Flugzeug geriet in eine Sinkspirale und stürzte ab."
CW_Expansion_news.45.a:1 "Gruselig"
CW_Expansion_news.46.t:0 "Teigin-Giftfall"
CW_Expansion_news.46.d:0 "Am 26. Januar 1948 erschien vor Geschäftsschluss ein Mann, der sich Epidemiologe nannte, in einer Filiale der Kaiserlichen Bank (Teikoku Ginkō, auch bekannt als Teigin) in Shiinamachi, einem Vorort von Toshima, Tokio. Er erklärte, er sei ein Beamter des öffentlichen Gesundheitswesens, der von den US-Besatzungsbehörden geschickt worden sei und den Auftrag gehabt habe, das Personal gegen einen plötzlichen Ausbruch von Ruhr zu impfen. Er gab allen sechzehn anwesenden Personen eine Tablette und einige Tropfen Flüssigkeit. Die Anwesenden tranken die Flüssigkeit, die er ihnen gab. Später wurde angenommen, dass es sich dabei um „Nitrilcyanid“ handelte, ein ursprünglich im Noborito-Labor entwickelter Mordgiftstoff. Als alle außer Gefecht gesetzt waren, nahm der Räuber etwas Geld im Wert von 160.000 Yen (damals etwa 2.000 US-Dollar) von den Schreibtischen, ließ den Großteil jedoch zurück, sodass sein Motiv unbekannt ist. Zehn der Opfer starben noch am Tatort (eines war das Kind eines Angestellten), zwei weitere starben im Krankenhaus."
CW_Expansion_news.46.a:1 "Gieriger Feigling"
CW_Expansion_news.47.t:0 "Ermordung von Mahatma Gandhi"
CW_Expansion_news.47.d:0 "Mahatma Gandhi wurde am 30. Januar 1948 auf dem Gelände des Birla House (heute Gandhi Smriti), einem großen Herrenhaus in Neu-Delhi, ermordet. Sein Mörder war Nathuram Godse, ein Verfechter des Hindu-Nationalismus, Mitglied der politischen Partei Hindu Mahasabha und der hindu-nationalistischen Freiwilligenorganisation Rashtriya Swayamsevak Sangh (RSS). Godse war der Ansicht, Gandhi sei während der Teilung Indiens im Vorjahr den Muslimen gegenüber zu entgegenkommend gewesen. Zeugenaussagen zufolge hatte Gandhi kurz nach 17 Uhr die Stufen zum erhöhten Rasen hinter dem Birla House erreicht, wo er allabendlich multireligiöse Gebetstreffen abgehalten hatte. Als Gandhi auf das Podium zuging, trat Godse aus der Menge, die Gandhi flankierte, hervor und feuerte aus kürzester Distanz drei Kugeln in Gandhis Brust und Bauch. Gandhi stürzte zu Boden. Er wurde in sein Zimmer im Birla House zurückgebracht, aus dem einige Zeit später ein Vertreter kam, um seinen Tod bekannt zu geben."
CW_Expansion_news.47.a:1 "Tragisch"
CW_Expansion_news.48.t:0 "Bombenanschläge in der Ben-Yehuda-Straße"
CW_Expansion_news.48.d:0 "Die Bombenanschläge in der Ben-Yehuda-Straße sind eine Reihe von Anschlägen auf Zivilisten in der Jerusalemer Innenstadt ab Februar 1948, die von palästinensischen Arabern verübt oder angeordnet wurden. Einige von ihnen waren Selbstmordattentäter. Die Anschläge ereigneten sich in der Ben-Yehuda-Straße, einer Hauptverkehrsstraße, die später zu einer Fußgängerzone wurde und nach Eliezer Ben Yehuda, dem treibenden Geist hinter der Entstehung des modernen Hebräisch, benannt ist."
CW_Expansion_news.48.a:1 "Schrecklich"
CW_Expansion_news.49.t:0 "Vertrag von Brüssel"
CW_Expansion_news.49.d:0 "Der Vertrag von Brüssel, auch Brüsseler Pakt genannt, war zwischen 1948 und 1954 der Gründungsvertrag der Westlichen Union (WU). Anschließend wurde er zum Modifizierten Brüsseler Vertrag (MTB) abgeändert und diente bis zu seiner Auflösung im Jahr 2010 als Gründungsvertrag der Westeuropäischen Union (WEU). Der Vertrag sah die Organisation der militärischen, wirtschaftlichen, sozialen und kulturellen Zusammenarbeit zwischen den Mitgliedstaaten sowie eine gegenseitige Verteidigungsklausel vor. Der Vertrag wurde am 17. März 1948 von Belgien, Frankreich, Luxemburg, den Niederlanden und dem Vereinigten Königreich, den Mitgliedern der Westlichen Union, als Erweiterung des Vertrags von Dünkirchen unterzeichnet, der im Vorjahr zwischen Großbritannien und Frankreich zum Schutz vor einer möglichen deutschen oder sowjetischen Aggression nach dem Ende des Zweiten Weltkriegs unterzeichnet worden war."
CW_Expansion_news.49.a:1 "Interessant"
CW_Expansion_news.50.t:0 "Präsident Harry Truman unterzeichnet Marshallplan"
CW_Expansion_news.50.d:0 "An diesem Tag im Jahr 1948 unterzeichnete Präsident Harry S. Truman den Economic Assistance Act, der die Schaffung eines Programms genehmigte, das den europäischen Nationen nach den Zerstörungen des Zweiten Weltkriegs beim Wiederaufbau helfen sollte. Der als Marshallplan bekannte Plan zielte darauf ab, Europa wirtschaftlich und politisch zu stabilisieren, damit die europäischen Nationen nicht der Versuchung kommunistischer Parteien erliegen würden."
CW_Expansion_news.50.a:1 "OK"
CW_Expansion_news.51.t:0 "Organisation Amerikanischer Staaten"
CW_Expansion_news.51.d:0 "Die Organisation Amerikanischer Staaten (OAS oder OEA) ist eine internationale Organisation, die am 30. April 1948 zum Zweck der Solidarität und Zusammenarbeit zwischen ihren Mitgliedsstaaten der westlichen Hemisphäre gegründet wurde."
CW_Expansion_news.51.a:1 "OK"
CW_Expansion_news.52.t:0 "Sowjetische Deportationen aus Litauen"
CW_Expansion_news.52.d:0 "Die sowjetischen Deportationen aus Litauen waren eine Serie von 35 Massendeportationen, die in Litauen zwischen 1941 und 1945–1952 durchgeführt wurden. Das Land war als sozialistische Teilrepublik der Sowjetunion besetzt. Mindestens 130.000 Menschen, 70 % davon Frauen und Kinder, wurden gewaltsam in Arbeitslager und andere Zwangssiedlungen in entlegenen Teilen der Sowjetunion deportiert, insbesondere in der Oblast Irkutsk und der Region Krasnojarsk. Unter den Deportierten waren etwa 4.500 Polen. Nicht enthalten in diesen Deportationen sind litauische Partisanen und politische Gefangene (ca. 150.000 Menschen), die in Gulags (Gefangenenlager) deportiert wurden. Die Deportationen der Zivilisten dienten einem doppelten Zweck: Sie unterdrückten den Widerstand gegen die Sowjetisierungspolitik in Litauen und sorgten für unbezahlte Arbeitskräfte in dünn besiedelten Gebieten der Sowjetunion."
CW_Expansion_news.52.a:1 "Nicht gut"
CW_Expansion_news.53.t:0 "United Airlines Flug 624 stürzt ab"
CW_Expansion_news.53.d:0 "United Airlines Flug 624, eine Douglas DC-6 mit der Kennung NC37506, war ein Linienflug mit Start in San Diego, Kalifornien, und Zwischenlandungen in Los Angeles und Chicago auf dem Weg zum Flughafen LaGuardia in New York City. Die viermotorige Propellermaschine stürzte am 17. Juni 1948 um 13:41 Uhr Eastern Daylight Time außerhalb von Aristes, Pennsylvania, ab. Dabei kamen alle vier Besatzungsmitglieder und 39 Passagiere an Bord ums Leben."
CW_Expansion_news.53.a:1 "Tragisch"
CW_Expansion_news.54.t:0 "Berlin-Blockade"
CW_Expansion_news.54.d:0 "Die Berlin-Blockade (24. Juni 1948 – 12. Mai 1949) war eine der ersten großen internationalen Krisen des Kalten Krieges. Während der multinationalen Besatzung Deutschlands nach dem Zweiten Weltkrieg blockierte die Sowjetunion den Eisenbahn-, Straßen- und Kanalzugang der Westalliierten zu den von Westmächte kontrollierten Sektoren Berlins. Die Sowjets boten den Westalliierten an, die Blockade aufzuheben, wenn sie die neu eingeführte D-Mark aus West-Berlin abziehen würden."
CW_Expansion_news.54.a:1 "OK"
CW_Expansion_news.55.t:0 "Die Geburt des NHS"
CW_Expansion_news.55.d:0 "Am 5. Juli starten wir gemeinsam den neuen Nationalen Gesundheitsdienst. Seine Entstehung verlief nicht völlig reibungslos. Es gab verständliche Ängste, die bei einem so großen und neuartigen Unterfangen unvermeidlich sind. Auch wird sich unser gravierender Mangel an Pflegekräften und anderen Fachkräften sowie an modernen, sanierten Gebäuden und Geräten nicht über Nacht wie durch ein Wunder beheben lassen. Doch je früher wir beginnen, desto eher können wir versuchen, diese Dinge zu erkennen und die Verbesserungen zu erreichen, die wir alle wollen. Meine Aufgabe ist es, Ihnen alle mir zur Verfügung stehenden Einrichtungen, Ressourcen und Hilfe zur Verfügung zu stellen und Sie dann als Fachkräfte in Ruhe zu lassen, damit Sie Ihre Fähigkeiten und Ihr Urteilsvermögen ungehindert einsetzen können. Lassen Sie uns versuchen, diese Partnerschaft von nun an weiterzuentwickeln."
CW_Expansion_news.55.a:1 "Vielleicht können sie jetzt ihre Zähne reparieren"
CW_Expansion_news.56.t:0 "Durchführungsverordnung 9981"
CW_Expansion_news.56.d:0 "Die Executive Order 9981 wurde am 26. Juli 1948 von Präsident Harry S. Truman erlassen. Diese Executive Order schaffte die Diskriminierung „aufgrund von Rasse, Hautfarbe, Religion oder nationaler Herkunft“ in den US-Streitkräften ab und führte zur Beendigung der Rassentrennung in den Streitkräften während des Koreakriegs (1950–1953). Sie war ein entscheidendes Ereignis für die Bürgerrechtsbewegung nach dem Zweiten Weltkrieg und ein bedeutender Erfolg von Trumans Präsidentschaft."
CW_Expansion_news.56.a:1 "OK"
CW_Expansion_news.57.t:0 "Gründung der Republik Korea"
CW_Expansion_news.57.d:0 "Am 15. August 1948 wurde die Republik Korea mit Syngman Rhee als erstem Präsidenten offiziell gegründet. Mit der Einsetzung von Rhees Regierung ging auch die rechtliche Souveränität auf die neue Regierung über. Am 9. September 1948 wurde unter Kim Il-sung ein kommunistisches Regime, die Demokratische Volksrepublik Korea (Nordkorea), ausgerufen. Am 12. Dezember 1948 erkannten die Vereinten Nationen jedoch mit Resolution 195 der Dritten Generalversammlung die Republik Korea als alleinige rechtmäßige Regierung Koreas an."
CW_Expansion_news.57.a:1 "OK"
CW_Expansion_news.58.t:0 "DRPK gegründet"
CW_Expansion_news.58.d:0 "Als 1948 die Demokratische Volksrepublik Korea gegründet wurde, wurde Kim Il-Sung der erste Premierminister des nordkoreanischen kommunistischen Regimes. 1949 wurde er Vorsitzender der Koreanischen Arbeiterpartei (KWP), die aus den zuvor gegründeten kommunistischen Parteien hervorgegangen war. Bis zu seinem Tod 1994 regierte Kim das Land mit eiserner Hand und förderte einen Personenkult um sich selbst als „Großen Führer“ des koreanischen Volkes."
CW_Expansion_news.58.a:1 "OK"
CW_Expansion_news.59.t:0 "Erdbeben in Aschgabat"
CW_Expansion_news.59.d:0 "Das Erdbeben von Aschgabat 1948 ereignete sich am 6. Oktober in Turkmenistan nahe Aschgabat mit einer Oberflächenwellenstärke von 7,3 und einer maximalen Mercalli-Intensität von X (Extrem). Aufgrund der Zensur durch die Sowjetregierung wurde in den sowjetischen Medien nicht ausführlich über das Ereignis berichtet. Historiker sind sich einig, dass das Verbot der Berichterstattung über das Ausmaß der Opfer und Schäden es der Sowjetregierung nicht ermöglichte, genügend finanzielle Mittel für eine angemessene Reaktion bereitzustellen."
CW_Expansion_news.59.a:1 "OK"
CW_Expansion_news.60.t:0 "Japanische Beamte zum Tode verurteilt"
CW_Expansion_news.60.d:0 "Am Freitag, dem 12. November 1948, als die Kriegsverbrecherprozesse sich dem Ende zuneigten, verkündete der Präsident des Internationalen Militärgerichtshofs für den Fernen Osten, Oberster Richter Sir William Webb KBE LLD, die Urteile über diejenigen, die der Gerichtshof der Verbrechen gegen die Menschlichkeit für schuldig befunden hatte. "
CW_Expansion_news.60.a:1 "Gerechtigkeit"
CW_Expansion_news.61.t:0 "UNO verabschiedet Völkermordkonvention"
CW_Expansion_news.61.d:0 "Die Konvention über die Verhütung und Bestrafung des Völkermordes wurde am 9. Dezember 1948 von der Generalversammlung der Vereinten Nationen einstimmig als Resolution 260 verabschiedet. Die Konvention trat am 12. Januar 1951 in Kraft. Sie definiert Völkermord rechtlich und ist das Ergebnis jahrelanger Bemühungen des Anwalts Raphael Lemkin. Alle teilnehmenden Länder werden aufgefordert, Völkermord in Kriegs- und Friedenszeiten zu verhindern und zu bestrafen. Bis Mai 2019 haben 152 Staaten den Vertrag ratifiziert oder sind ihm beigetreten, zuletzt Mauritius am 8. Juli 2019. Ein Staat, die Dominikanische Republik, hat den Vertrag unterzeichnet, aber nicht ratifiziert."
CW_Expansion_news.61.a:1 "Großartig"
CW_Expansion_news.62.t:0 "Allgemeine Erklärung der Menschenrechte"
CW_Expansion_news.62.d:0 "Die Allgemeine Erklärung der Menschenrechte (AEMR) ist ein internationales Dokument, das von der Generalversammlung der Vereinten Nationen verabschiedet wurde und die Rechte und Freiheiten aller Menschen festschreibt. Sie wurde von der Generalversammlung in ihrer dritten Sitzung am 10. Dezember 1948 im Palais de Chaillot in Paris, Frankreich, als Resolution 217 angenommen. Von den damals 58 Mitgliedern der Vereinten Nationen stimmten 48 dafür, keiner dagegen, acht enthielten sich und zwei nahmen nicht an der Abstimmung teil."
CW_Expansion_news.62.a:1 "Großartig"
CW_Expansion_news.63.t:0 "Japanische Kriegsverbrecher in Tokio gehängt"
CW_Expansion_news.63.d:0 "In Tokio, Japan, wird Hideki Tojo, ehemaliger japanischer Premierminister und Chef der Kwantung-Armee, zusammen mit sechs weiteren hochrangigen japanischen Politikern wegen ihrer Kriegsverbrechen im Zweiten Weltkrieg hingerichtet. Sieben der Angeklagten wurden zudem wegen Verbrechen gegen die Menschlichkeit für schuldig befunden, insbesondere im Hinblick auf den systematischen Völkermord an der chinesischen Bevölkerung."
CW_Expansion_news.63.a:1 "Gerechtigkeit"

CW_Expansion_news.64.t:0 "Präsident Truman hält Rede zum Fair Deal"
CW_Expansion_news.64.d:0 "Am 5. Januar 1949 verkündete Präsident Harry S. Truman in seiner Rede zur Lage der Nation, dass jeder Amerikaner ein Recht auf faire Behandlung durch unsere Regierung habe. In Anlehnung an Franklin Roosevelts New-Deal-Politik kündigte Truman seine Pläne für innenpolitische Reformen an, darunter eine staatliche Krankenversicherung, sozialen Wohnungsbau, Bürgerrechtsgesetze und staatliche Bildungshilfe. Er plädierte für eine Erhöhung des Mindestlohns, staatliche Unterstützung für Landwirte und einen Ausbau der Sozialversicherung. Außerdem drängte er auf die sofortige Umsetzung von Antidiskriminierungsmaßnahmen im Arbeitsleben."
CW_Expansion_news.64.a:1 "OK"
CW_Expansion_news.65.t:0 "Kommunistische Kräfte erobern Peking"
CW_Expansion_news.65.d:0 "Nach dem Fall Tianjins an die kommunistischen Streitkräfte war die nationalistische Garnison in Beiping praktisch isoliert. Fu Zuoyi beschloss am 21. Januar, über eine Friedensregelung zu verhandeln. In der darauffolgenden Woche begannen 260.000 nationalistische Soldaten, die Stadt zu verlassen, in Erwartung einer sofortigen Kapitulation. Am 31. Januar marschierte die Vierte Feldarmee der Volksbefreiungsarmee in Beiping ein und nahm die Stadt ein. Damit war der Feldzug abgeschlossen."
CW_Expansion_news.65.a:1 "OK"
CW_Expansion_news.66.t:0 "Ende der Kleiderrationierung in Großbritannien"
CW_Expansion_news.66.d:0 "Die Ära des Improvisierens und Flickens ist endlich vorbei, da die Kleiderrationierung des Zweiten Weltkriegs endet. Wegen Stoffknappheit hatte die Kriegsregierung 1941 strenge Regeln eingeführt, um verschwenderisches Zuschneiden von Stoff zu verhindern. Kleider durften nicht mehr als zwei Taschen und fünf Knöpfe haben, der Rock eines Wollkleides durfte nicht mehr als sechs Nähte, zwei Kellerfalten oder vier Messerfalten haben. Unnötige Verzierungen waren nicht erlaubt."
CW_Expansion_news.66.a:1 "OK"
CW_Expansion_news.67.t:0 "Boxchampion Joe Louis tritt zurück"
CW_Expansion_news.67.d:0 "Nachdem er elf Jahre und acht Monate lang als Schwergewichts-Champion regiert hatte – ein Rekord –, trat Louis am 1. März 1949 zurück. "
CW_Expansion_news.67.a:1 "OK"
CW_Expansion_news.68.t:0 "März-Deportation"
CW_Expansion_news.68.d:0 "Operation Priboi war der Deckname für die sowjetische Massendeportation aus den baltischen Staaten vom 25. bis 28. März 1949. Baltische Historiker bezeichnen die Aktion auch als Märzdeportation (estnisch Märtsiküüditamine; lettisch Marta deportācijas; russisch Мартовская депортация). Mehr als 90.000 Esten, Letten und Litauer, die als „Volksfeinde“ galten, wurden in Zwangssiedlungen in unwirtlichen Gebieten der Sowjetunion deportiert. Über 70 % der Deportierten waren Frauen und Kinder unter 16 Jahren."
CW_Expansion_news.68.a:1 "OK"
CW_Expansion_news.69.t:0 "Anti-NATO-Aufruhr in Island"
CW_Expansion_news.69.d:0 "Auslöser der Anti-NATO-Unruhen in Island vom 30. März 1949 war die Entscheidung des isländischen Parlaments Alþingi, der neu gegründeten NATO beizutreten. Island wurde dadurch direkt in den Kalten Krieg verwickelt, stand in Opposition zur Sowjetunion und remilitarisierte das Land."
CW_Expansion_news.69.a:1 "OK"
CW_Expansion_news.70.t:0 "Neufundland schließt sich Kanada an"
CW_Expansion_news.70.d:0 "Am 1. April 1949 setzte Premierminister Louis St-Laurent die ersten zeremoniellen Meißelstriche in den blanken Stein. Um 23:59 Uhr am Vorabend war Neufundland eine kanadische Provinz geworden. An seiner Seite befand sich der Neufundländer F. Gordon Bradley. Er war gerade als Mitglied des Bundeskabinetts vereidigt worden. „Wir sind jetzt alle Kanadier“, verkündete Bradley."
CW_Expansion_news.70.a:1 "OK"
CW_Expansion_news.71.t:0 "NATO-Pakt unterzeichnet"
CW_Expansion_news.71.d:0 "Die Vereinigten Staaten und elf weitere Nationen gründen die Nordatlantikpakt-Organisation (NATO), einen gegenseitigen Verteidigungspakt zur Eindämmung einer möglichen sowjetischen Aggression gegen Westeuropa. Während des gesamten Kalten Krieges war die NATO das wichtigste US-geführte Militärbündnis gegen die Sowjetunion."
CW_Expansion_news.71.a:1 "OK"
CW_Expansion_news.72.t:0 "Kommunistische Übernahme von Nanking"
CW_Expansion_news.72.d:0 "Am 23. April 1949, während des chinesischen Bürgerkriegs, eroberte Maos Volksbefreiungsarmee (VBA) die Stadt Nanking, heute Nanjing, damals Hauptstadt Chinas und Sitz der Nationalistischen Partei (auch bekannt als Kuomintang oder KMT). Obwohl die Kämpfe noch das ganze Jahr andauerten, während sich die KMT nach Südchina und schließlich nach Taiwan zurückzog, signalisierte dieser Sieg die unvermeidliche Niederlage der Nationalisten und das Ende des chinesischen Bürgerkriegs. Leonard L. Bacon war 1948 in Hangzhou stationiert und wurde kurz vor der Besetzung Nankings durch kommunistische Truppen nach Nanking versetzt."
CW_Expansion_news.72.a:1 "OK"
CW_Expansion_news.73.t:0 "Londoner Erklärung"
CW_Expansion_news.73.d:0 "In der vergangenen Woche trafen sich die Premierminister Großbritanniens, Australiens, Neuseelands, Südafrikas, Indiens, Pakistans und Ceylons sowie der kanadische Außenminister in London, um wichtige verfassungsrechtliche Fragen zu erörtern, die sich aus Indiens Entscheidung für eine republikanische Verfassung und seinem Wunsch, weiterhin Mitglied des Commonwealth zu bleiben, ergeben. Gegenstand der Diskussionen waren die Auswirkungen einer solchen Entwicklung auf die bestehende Struktur des Commonwealth und die verfassungsrechtlichen Beziehungen zwischen seinen Mitgliedern."
CW_Expansion_news.73.a:1 "OK"
CW_Expansion_news.74.t:0 "Fürst Rainier III. gekrönt"
CW_Expansion_news.74.d:0 "Rainier wurde in England und der Schweiz sowie an der Universität Montpellier in Frankreich ausgebildet. 1944, während des Zweiten Weltkriegs, diente er in der französischen Armee und studierte nach dem Krieg an der Universität von Paris. Nachdem seine Mutter 1944 auf ihre Thronfolge verzichtet hatte, bestieg Rainier am 5. Mai 1949, kurz vor dem Tod Ludwigs II., den Thron."
CW_Expansion_news.74.a:1 "Lang lebe der Prinz"
CW_Expansion_news.75.t:0 "Sowjetunion hebt elfmonatige Blockade auf"
CW_Expansion_news.75.d:0 "Am 12. Mai 1949 endete eine frühe Krise des Kalten Krieges, als die Sowjetunion ihre elfmonatige Blockade West-Berlins aufhob. Die Blockade war durch eine massive amerikanisch-britische Luftbrücke mit lebenswichtigen Gütern für die zwei Millionen Einwohner West-Berlins durchbrochen worden."
CW_Expansion_news.75.a:1 "OK"
CW_Expansion_news.76.t:0 "In Taiwan wurde das Kriegsrecht verhängt"
CW_Expansion_news.76.d:0 "Das Kriegsrecht wurde 1949 verhängt, als Chiang Kai-shek, Präsident der nationalistischen Regierung Chinas, und rund zwei Millionen Anhänger vor der vorrückenden kommunistischen Armee auf dem Festland flohen. Es verbot die Gründung neuer politischer Parteien, gab dem Militär weitreichende Zensurbefugnisse und wurde von Militärgerichten genutzt, um Tausende Zivilisten wegen Aufruhrs und anderer Verbrechen zu verurteilen."
CW_Expansion_news.76.a:1 "OK"
CW_Expansion_news.77.t:0 "Zweite Rote Angst"
CW_Expansion_news.77.d:0 "Die zweite Rote Angst war ein angstgetriebenes Phänomen, das durch die wachsende Macht kommunistischer Länder, insbesondere der Sowjetunion, nach dem Zweiten Weltkrieg ausgelöst wurde. Viele in den USA befürchteten, dass die Sowjetunion und ihre Verbündeten planten, den Kommunismus gewaltsam auf der ganzen Welt zu verbreiten und dabei sowohl demokratische als auch kapitalistische Institutionen zu stürzen. Da die Sowjetunion weite Teile Ost- und Mitteleuropas besetzt hielt, sahen viele in den USA ihre Befürchtungen vor einem kommunistischen Expansionismus bestätigt. Die USA befürchteten zudem, kommunistische Agenten hätten die Bundesregierung unterwandert. Es folgte eine massive Hexenjagd, um kommunistische Sympathisanten auszumerzen."
CW_Expansion_news.77.a:1 "OK"
CW_Expansion_news.78.t:0 "Explosion in Prüm"
CW_Expansion_news.78.d:0 "Am 15. Juli 1949 explodierte ein Munitionsdepot auf dem Kalvarienberg in der Eifel. Die Ursache der Explosion, bei der die Stadt schwer beschädigt wurde und zwölf Menschen starben, wurde nie geklärt. Der noch heute sichtbare Krater ist einer der größten von Menschenhand geschaffenen Explosionskrater überhaupt. Ein Kreuz auf dem Kalvarienberg erinnert an die Opfer der Katastrophe."
CW_Expansion_news.78.a:1 "OK"
CW_Expansion_news.79.t:0 "Die NBA ist geboren"
CW_Expansion_news.79.d:0 "Am 3. August 1949 fusionieren die rivalisierenden Basketball Association of America (BAA) und National Basketball League (NBL) nach einem dreijährigen, zermürbenden Kampf um Spieler und Fans zur National Basketball Association (NBA)."
CW_Expansion_news.79.a:1 "OK"
CW_Expansion_news.80.t:0 "Um seine Frau zu ermorden, tötete er 22 weitere"
CW_Expansion_news.80.d:0 "Die Explosion eines Flugzeugs der Canadian Pacific Airlines über der Region Charlevoix in Quebec am 9. September 1949 schockierte die Provinz. 23 Menschen, die nach Baie-Comeau in Quebec reisten, starben an diesem Tag, darunter Rita Morel, die Mutter eines vierjährigen Mädchens. Morels Ehemann, Albert Guay, wurde später wegen seiner Beteiligung an einem der ersten Bombenanschläge auf ein Passagierflugzeug in Kanada gehängt."
CW_Expansion_news.80.a:1 "OK"
CW_Expansion_news.81.t:0 "Präsident Truman gibt bekannt, dass die Sowjets eine Atombombe gezündet haben"
CW_Expansion_news.81.d:0 "In einer überraschend zurückhaltenden und sorgfältig formulierten Erklärung informiert Präsident Harry S. Truman das amerikanische Volk über die Explosion einer sowjetischen Atombombe. Diese sowjetische Leistung, die den meisten US-Behörden um Jahre voraus war, löste in der amerikanischen Regierung Panik aus."
CW_Expansion_news.81.a:1 "OK"
CW_Expansion_news.82.t:0 "Kommunisten verurteilt"
CW_Expansion_news.82.d:0 "Dennis v. United States, 341 US 494 (1951), war ein Fall des Obersten Gerichtshofs der Vereinigten Staaten im Zusammenhang mit Eugene Dennis, Generalsekretär der Kommunistischen Partei der USA. Das Gericht entschied, dass Dennis gemäß dem Ersten Zusatzartikel zur US-Verfassung nicht das Recht auf freie Meinungsäußerung, Publikations- und Versammlungsfreiheit habe, wenn damit ein Komplott zum Sturz der Regierung verbunden sei. 1969 hob Brandenburg v. Ohio das Urteil von Dennis de facto auf."
CW_Expansion_news.82.a:1 "OK"
CW_Expansion_news.83.t:0 "Ansprache von Winston Churchill"
CW_Expansion_news.83.d:0 "Am 28. November 1949 hält der ehemalige britische Premierminister Winston Churchill in der Kingsway Hall in London eine Rede, in der er die Idee einer Europäischen Union unterstützt und die Bedeutung der europäischen Bewegung in diesem Prozess betont."
CW_Expansion_news.83.a:1 "OK"
CW_Expansion_news.84.t:0 "Rückzug der Kuomintang nach Taiwan"
CW_Expansion_news.84.d:0 "Der Rückzug der Republik China nach Taiwan, auch bekannt als Rückzug der Kuomintang nach Taiwan oder (in Taiwan) „Der große Rückzug“, bezeichnet den Exodus der Überreste der international anerkannten Kuomintang-Regierung der Republik China auf die Insel Taiwan (Formosa) im Dezember 1949 gegen Ende der aktiven Kämpfe im chinesischen Bürgerkrieg. Die Kuomintang (KMT, Chinesische Nationalistische Partei), ihre Offiziere und etwa zwei Millionen Soldaten nahmen an dem Rückzug teil; außerdem viele Zivilisten und Flüchtlinge, die vor dem Vormarsch der kommunistischen Volksbefreiungsarmee flohen."
CW_Expansion_news.84.a:1 "OK"
CW_Expansion_news.85.t:0 "Der Warschauer Pakt wird gegründet"
CW_Expansion_news.85.d:0 "Der Warschauer Pakt, so genannt, weil der Vertrag in Warschau unterzeichnet wurde, umfasste die Sowjetunion, Albanien, Polen, Rumänien, Ungarn, Ostdeutschland, die Tschechoslowakei und Bulgarien. Der Vertrag rief die Mitgliedsstaaten dazu auf, jedem von einer externen Macht angegriffenen Mitgliedsstaat beizustehen, und richtete ein einheitliches Militärkommando unter Marschall Ivan S. Konev von der Sowjetunion ein. Die Einleitung zum Vertrag zur Gründung des Warschauer Pakts nannte den Grund für seine Existenz. Dieser drehte sich um „Westdeutschland, das remilitarisiert wird, und seine Aufnahme in den Nordatlantikblock, was die Gefahr eines neuen Krieges erhöht und eine Bedrohung für die nationale Sicherheit friedliebender Staaten darstellt“. Diese Passage bezog sich auf die Entscheidung der Vereinigten Staaten und der anderen Mitglieder der Nordatlantikvertrags-Organisation (NATO) vom 9. Mai 1955, Westdeutschland zum Mitglied der NATO zu machen und diesem Land die Remilitarisierung zu gestatten. Die Sowjets betrachteten dies offensichtlich als direkte Bedrohung und reagierten mit der Gründung des Warschauer Pakts."
CW_Expansion_news.85.a:1 "OK"

RON_European_Union_News.1.t:0 "[From.GetName] tritt der Europäischen Union bei"

RON_European_Union.1.t:0 "Einladung zum Beitritt zur Europäischen Union"
RON_European_Union.1.d:0 "Die Europäische Union (EU) ist ein politischer und wirtschaftlicher Zusammenschluss von 27 Mitgliedstaaten, die überwiegend in Europa liegen. Die Union hat eine Gesamtfläche von 4.233.255,3 km² (1.634.469,0 Quadratmeilen) und eine geschätzte Gesamtbevölkerung von etwa 447 Millionen Menschen. Durch ein standardisiertes Rechtssystem wurde ein Binnenmarkt geschaffen, der in allen Mitgliedstaaten nur in den Bereichen gilt, in denen sich die Staaten darauf geeinigt haben, als Einheit zu handeln. Die EU-Politik zielt darauf ab, den freien Verkehr von Personen, Waren, Dienstleistungen und Kapital innerhalb des Binnenmarkts zu gewährleisten, Gesetze in den Bereichen Justiz und Inneres zu erlassen und eine gemeinsame Politik in den Bereichen Handel, Landwirtschaft, Fischerei und regionale Entwicklung zu verfolgen. Die Passkontrollen für Reisen innerhalb des Schengen-Raums wurden abgeschafft. Die Eurozone ist eine 1999 gegründete und 2002 vollständig in Kraft getretene Währungsunion, die aus den 19 EU-Mitgliedstaaten besteht, die den Euro als Währung verwenden. Die EU wird oft als eine politische Einheit sui generis (ohne Präzedenzfall oder Vergleich) mit den Merkmalen einer Föderation oder Konföderation beschrieben."
