CW_Expansion_country.150.t:0 "Australische Staatsbürgerschaft geschaffen"
CW_Expansion_country.150.d:0 "Das Gesetz schuf die australische Staatsbürgerschaft und legte die Bedingungen für ihren Erwerb fest. Die wichtigsten Bestimmungen des Gesetzes lauteten: Alle in Australien geborenen und anderen britischen Staatsbürger, die in den fünf Jahren vor dem 26. Januar 1949 in Australien lebten, waren automatisch australische Staatsbürger."
CW_Expansion_country.150.a:1 "OK"
CW_Expansion_news.150.t:0 "Australische Staatsbürgerschaft geschaffen"
CW_Expansion_news.150.d:0 "Das Gesetz schuf die australische Staatsbürgerschaft und legte die Bedingungen für ihren Erwerb fest. Die wichtigsten Bestimmungen des Gesetzes lauteten: Alle in Australien geborenen und anderen britischen Staatsbürger, die in den fünf Jahren vor dem 26. Januar 1949 in Australien lebten, waren automatisch australische Staatsbürger."
CW_Expansion_news.150.a:1 "OK"

CW_Expansion_country.151.t:0 "Irland verlässt das britische Commonwealth"
CW_Expansion_country.151.d:0 "Die nachfolgende irische Gesetzgebung, der Republic of Ireland Act von 1948, sah die Abschaffung der letzten verbliebenen Funktionen des Königs in Bezug auf Irland vor und bestimmte, dass der irische Präsident diese Funktionen an seiner Stelle ausüben sollte. Mit Inkrafttreten des Gesetzes am 18. April 1949 endete Irlands Status als britisches Dominion. Damit endete auch Irlands Mitgliedschaft im Commonwealth of Nations und die bestehende Grundlage, auf der Irland und seine Bürger im Vereinigten Königreich und anderen Commonwealth-Ländern als „britische Untertanen“ und nicht als Ausländer behandelt wurden."
CW_Expansion_country.151.a:1 "OK"
