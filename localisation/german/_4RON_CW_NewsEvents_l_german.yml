CW_Expansion_news.403.a:1 "OK"

CW_Expansion_country.404.t:0 "Über den Personenkult und seine Folgen"
CW_Expansion_country.404.d:0 "„Über den Personenkult und seine Folgen“, allgemein bekannt als die „Geheimrede“, war ein Bericht des sowjetischen Staatschefs Nikita Chruschtschow, des Ersten Sekretärs der Kommunistischen Partei der Sowjetunion, den er am 25. Februar 1956 auf dem XX. Parteitag der Kommunistischen Partei der Sowjetunion hielt. Chruschtschows Rede übte scharfe Kritik an der Herrschaft des verstorbenen Generalsekretärs und Ministerpräsidenten Josef Stalin, insbesondere im Hinblick auf die Säuberungen, die vor allem die letzten Jahre der 1930er Jahre geprägt hatten. Chruschtschow warf Stalin vor, einen Personenkult um seine Führung gefördert zu haben, obwohl er angeblich weiterhin die Ideale des Kommunismus unterstützte. Die Rede wurde vom israelischen Geheimdienst Schin Bet, der sie von dem polnisch-jüdischen Journalisten Wiktor Grajewski erhalten hatte, an den Westen durchgestochen."
CW_Expansion_country.404.a:1 "Stalin anprangern"
