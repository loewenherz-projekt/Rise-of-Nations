CW_Expansion_country.352.t:0 "Erste Ausgabe von Sports Illustrated erschienen"
CW_Expansion_country.352.d:0 "Am 16. August 1954 erscheint an den amerikanischen Kiosken ein neues Sportmagazin. Das markante Titelbild von Eddie Mathews, dem Third Baseman der Milwaukee Braves, auf dem sein schwingender Schläger vor der dramatischen Kulisse des überfüllten Milwaukee County Stadiums verschwommen wirkt, kündigt sich an. Sports Illustrated wird von manchen Verlagen als Witzfigur angesehen und erzielt in den ersten zehn Jahren kaum Einnahmen. Doch schließlich wird es zum unangefochtenen Marktführer der amerikanischen Sportmedien, zum Sportmagazin schlechthin und zu einer der bekanntesten Medienmarken der Welt."
CW_Expansion_country.352.a:1 "OK"
