CW_Expansion_country.172.t:0 "Indien wird eine Republik"
CW_Expansion_country.172.d:0 "Am 26. Januar 1950 tritt die indische Verfassung in Kraft und macht die Republik Indien zur bevölkerungsreichsten Demokratie der Welt. Mohandas Gandhi kämpfte sich durch Jahrzehnte passiven Widerstand, bevor Großbritannien schließlich die Unabhängigkeit Indiens akzeptierte. Im Zweiten Weltkrieg war ihm Selbstverwaltung versprochen worden, doch nach dem Krieg scheiterten die Dreiecksverhandlungen zwischen Gandhi, Großbritannien und der Muslimliga an der Frage, ob Indien entlang religiöser Linien aufgeteilt werden sollte. Schließlich setzte Lord Mountbatten, der Vizekönig von Indien, einen Kompromissplan durch. Am 15. August 1947 wurde das ehemalige Mogulreich in die unabhängigen Nationen Indien und Pakistan geteilt. Gandhi nannte das Abkommen die „nobelste Tat der britischen Nation“, doch religiöse Konflikte zwischen Hindus und Muslimen trübten bald seine Begeisterung. Hunderttausende starben, darunter auch Gandhi, der im Januar 1948 während einer Mahnwache in einem Gebiet mit muslimisch-hinduistischer Gewalt von einem Hindu-Fanatiker ermordet wurde."
CW_Expansion_country.172.a:1 "OK"
CW_Expansion_news.172.t:0 "Indien wird eine Republik"
