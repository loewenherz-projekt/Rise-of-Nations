CW_Expansion_country.289.t:0 "Hussein zum König von Jordanien gekrönt"
CW_Expansion_country.289.d:0 "Am 11. August erklärte das jordanische Parlament voller Bedauern, dass König Talal an Schizophrenie leide und geistig nicht in der Lage sei zu regieren. Seine Herrschaft sei beendet und Hussein nun König von Jordanien. Hussein war erst 16 Jahre alt, und ein Regentschaftsrat wurde ernannt, der ihn bis zu seiner offiziellen Volljährigkeit im folgenden Jahr vertreten sollte. Talal nahm die Situation gelassen an und zog sich nach Istanbul zurück, wo er 1972 starb. Königin Zein blieb in Jordanien. Hussein hingegen blieb 46 Jahre lang auf dem jordanischen Thron, überlebte zahlreiche Attentate und Putschversuche und gewann 1970/71 einen Bürgerkrieg gegen die Palästinensische Befreiungsorganisation in Jordanien, bevor er 1999 im Alter von 63 Jahren in Amman starb. Es überrascht kaum, dass er seine Autobiografie „Uneasy Lies the Head“ nannte."
CW_Expansion_country.289.a:1 "OK"
CW_Expansion_news.289.t:0 "Hussein zum König von Jordanien gekrönt"
