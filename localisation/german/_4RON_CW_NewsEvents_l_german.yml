CW_Expansion_country.100.t:0 "Vergarola-Explosion"
CW_Expansion_country.100.d:0 "Die Vergarola-Explosion (in Italien als Vergarolla-Massaker bekannt) ereignete sich am 18. August 1946, als die plötzliche Detonation von zwölf großen Geschossen mit schätzungsweise neun Tonnen Sprengstoff am Strand von Vergarola (oder Vergarolla) in Pula (Pola), das zu dieser Zeit vorübergehend unter alliierter Militärverwaltung stand, mehr als 100 Menschen tötete und 100 weitere verletzte. Die Geschütze, die „aus dem Wasser gespült und am Strand zur Entsorgung aufgestapelt worden waren“, explodierten am 18. August 1946 kurz nach 14 Uhr. Erste Zeitungsberichte sprachen von 43 Toten und 57 Verletzten, darunter zwei britischen Soldaten. Viele der Opfer waren Badegäste, die an einem jährlichen Schwimmwettbewerb namens Scarioni Cup teilnahmen. Die Explosion hatte schwerwiegende politische Folgen, da lokale italienische Politiker und die wichtigste italienische Zeitung L&#39;Arena di Pola vermuteten, es handele sich um eine Demonstration gegen die italienischen Gefühle der Einwohner und um einen Versuch, den möglichen (später tatsächlichen) Anschluss an die Sozialistische Föderative Republik Jugoslawien zu bekräftigen. Die genaue Zahl der Opfer des Vorfalls ist unbekannt; Schätzungen gehen von bis zu etwa hundert Toten aus."
CW_Expansion_country.100.a:1 "OK"
