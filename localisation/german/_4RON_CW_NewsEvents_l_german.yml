CW_Expansion_country.362.t:0 "Joseph Mcarthy vom US-Senat verurteilt"
CW_Expansion_country.362.d:0 "Der US-Senat verurteilt Senator Joseph R. McCarthy mit 65 zu 22 Stimmen wegen seines ungebührlichen Verhaltens. Die Verurteilung, die einem Tadel gleichkam, bezog sich auf McCarthys umstrittene Untersuchung mutmaßlicher Kommunisten in der US-Regierung, dem Militär und der Zivilgesellschaft. In den ersten Monaten des Jahres 1954 überschritt McCarthy, der aufgrund seiner umstrittenen Taktik bereits die Unterstützung eines Großteils seiner Partei verloren hatte, endgültig seine Grenzen, als er mehrere Offiziere der US-Armee der kommunistischen Subversion beschuldigte. Der republikanische Präsident [USA.GetLeader] drängte auf eine Untersuchung der Anschuldigungen McCarthys, und die im Fernsehen übertragenen Anhörungen entlarvten den Senator als rücksichtslosen und maßlosen Tyrannen, der seine Behauptungen nie ordnungsgemäß belegen konnte."
CW_Expansion_country.362.a:1 "OK"
CW_Expansion_news.362.t:0 "Joseph Mcarthy vom US-Senat verurteilt"
