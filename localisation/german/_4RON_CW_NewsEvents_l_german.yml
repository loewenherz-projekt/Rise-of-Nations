CW_Expansion_country.205.t:0 "Schlacht von Chamdo"
CW_Expansion_country.205.d:0 "Die Schlacht von Chamdo fand vom 6. bis 24. Oktober 1950 statt. Es handelte sich um eine Militärkampagne der Volksrepublik China mit dem Ziel, die Region Chamdo von einem de facto unabhängigen tibetischen Staat zu erobern. Die Kampagne führte zur Einnahme von Chamdo und zur Annexion Tibets durch die Volksrepublik China."
