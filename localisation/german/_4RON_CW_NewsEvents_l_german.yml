CW_Expansion_country.340.t:0 "Boeing 707 Flugzeug freigegeben"
CW_Expansion_country.340.d:0 "Die Boeing 707 war das erste erfolgreiche kommerzielle Passagierflugzeug. Das viermotorige Mittel- und Langstreckenflugzeug mit schmalem Rumpf und Pfeilflügeln wurde von der Boeing Company entwickelt und hergestellt. Der Erstflug fand am 20. Dezember 1957 statt, am 26. Oktober 1958 wurde der kommerzielle Dienst aufgenommen."
CW_Expansion_country.340.a:1 "OK"
