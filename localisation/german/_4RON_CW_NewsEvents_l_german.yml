CW_Expansion_country.479.t:0 "Barbie-Puppe feiert in den USA ihr Debüt"
CW_Expansion_country.479.d:0 "Am 9. März 1959 wurde die erste Barbie-Puppe auf der American Toy Fair in New York City ausgestellt. Mit einer Größe von 28 Zentimetern und einer blonden Haarpracht war Barbie die erste in Massenproduktion hergestellte Spielzeugpuppe mit erwachsenen Gesichtszügen in den USA. Die Frau hinter Barbie war Ruth Handler, die 1945 gemeinsam mit ihrem Mann Mattel, Inc. gründete. Als sie sah, wie ihre kleine Tochter ihre Babypuppen ignorierte und stattdessen mit Papierpuppen erwachsener Frauen spielte, erkannte Handler, dass es eine wichtige Marktlücke für ein Spielzeug gab, das kleinen Mädchen ermöglichte, sich die Zukunft vorzustellen."
CW_Expansion_country.479.a:1 "OK"
