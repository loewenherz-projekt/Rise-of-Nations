CW_Expansion_country.291.t:0 "Britische Mount Everest Expedition"
CW_Expansion_country.291.d:0 "Die britische Mount-Everest-Expedition von 1953 war die neunte Bergsteigerexpedition, die die Erstbesteigung des Mount Everest versuchte, und die erste, deren Erfolg bestätigt wurde, als Tenzing Norgay und Edmund Hillary am 29. Mai 1953 den Gipfel erreichten. Unter der Leitung von Colonel John Hunt wurde sie vom Joint Himalayan Committee organisiert und finanziert. Die Nachricht vom Erfolg der Expedition erreichte London rechtzeitig, um am Morgen der Krönung von Königin Elisabeth II. am 2. Juni desselben Jahres veröffentlicht zu werden."
CW_Expansion_country.291.a:1 "OK"
