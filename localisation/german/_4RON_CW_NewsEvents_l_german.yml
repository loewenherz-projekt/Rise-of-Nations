CW_Expansion_country.364.t:0 "Erster Burger King eröffnet in Miami"
CW_Expansion_country.364.d:0 "Der Vorgänger von Burger King wurde 1953 in Jacksonville, Florida, als Insta-Burger King gegründet. Nach einem Besuch des ursprünglichen Geschäfts der McDonald-Brüder in San Bernardino, Kalifornien, eröffneten die Gründer und Eigentümer (Keith J. Kramer und Matthew Burns, der Onkel seiner Frau), die die Rechte an zwei Geräten namens „Insta-Maschinen“ erworben hatten, ihre ersten Restaurants. Ihr Produktionsmodell basierte auf einer der Maschinen, die sie erworben hatten, einem Ofen namens „Insta-Broiler“. Diese Strategie erwies sich als so erfolgreich, dass sie später von allen ihren Franchisenehmern die Verwendung dieses Geräts verlangten. Als das Unternehmen 1959 ins Straucheln geriet, wurde es von seinen Franchisenehmern aus Miami, Florida, James McLamore und David R. Edgerton, aufgekauft. Sie leiteten eine Unternehmensumstrukturierung der Kette ein und benannten das Unternehmen zunächst in Burger King um. Sie führten das Unternehmen acht Jahre lang als unabhängiges Unternehmen (und expandierten schließlich auf über 250 Standorte in den Vereinigten Staaten), bevor sie es 1967 an die Pillsbury Company verkauften."
CW_Expansion_country.364.a:1 "OK"
