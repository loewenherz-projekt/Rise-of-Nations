CW_Expansion_country.426.t:0 "Massaker von Khan Yunis"
CW_Expansion_country.426.d:0 "Das Massaker von Khan Yunis ereignete sich am 3. November 1956 während der Suezkrise in der palästinensischen Stadt Khan Yunis und dem nahegelegenen gleichnamigen Flüchtlingslager im Gazastreifen. Laut Benny Morris erschossen israelische Soldaten während einer Operation der israelischen Verteidigungsstreitkräfte zur Wiedereröffnung der von Ägypten blockierten Straße von Tiran in Khan Yunis und Rafah zweihundert Palästinenser. Laut Noam Chomskys „The Fateful Triangle“ wurden unter Berufung auf Donald Neff bei einer brutalen Hausdurchsuchung nach Fedajin 275 Palästinenser getötet (während weitere 111 Berichten zufolge in Rafah getötet wurden). Nach Angaben der israelischen Behörden trafen IDF-Soldaten auf lokale Militante und es kam zu einem Gefecht. IDF-Oberst Meir Pa&#39;il sagte gegenüber Associated Press: „Es hat noch nie eine Tötung solchen Ausmaßes gegeben. Niemand wurde ermordet. Ich war dort. Ich weiß von keinem Massaker.“"
CW_Expansion_country.426.a:1 "OK"
