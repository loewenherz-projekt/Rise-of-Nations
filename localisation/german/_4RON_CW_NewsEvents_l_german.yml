CW_Expansion_country.293.t:0 "Elizabeth II. zur Königin des Vereinigten Königreichs gekrönt"
CW_Expansion_country.293.d:0 "Die Krönung Elisabeths II. fand am 2. Juni 1953 in der Westminster Abbey in London statt. Elisabeth II. bestieg nach dem Tod ihres Vaters Georg VI. am 6. Februar 1952 im Alter von 25 Jahren den Thron und wurde kurz darauf von ihrem Kronrat und Exekutivrat zur Königin ernannt. Die Krönung fand mehr als ein Jahr später statt, da es Tradition ist, nach dem Tod eines Monarchen eine angemessene Zeitspanne verstreichen zu lassen, bevor solche Feste abgehalten werden. So hatten die Planungskomitees auch ausreichend Zeit, die Zeremonie vorzubereiten. Während des Gottesdienstes legte Elisabeth einen Eid ab, wurde mit heiligem Öl gesalbt, erhielt ein Gewand und Insignien und wurde zur Königin des Vereinigten Königreichs, Kanadas, Australiens, Neuseelands, Südafrikas, Pakistans und Ceylons (heute Sri Lanka) gekrönt."
CW_Expansion_country.293.a:1 "OK"
