CW_Expansion_country.520.t:0 "Schuss der US-Streitkräfte verletzt unseren Luftraum"
CW_Expansion_country.520.d:0 "Am 1. Juli 1960 wurde ein US-Aufklärungsflugzeug vom Typ RB-47H von den sowjetischen Luftabwehrkräften abgeschossen, als es in der Barentssee nahe der Kola-Halbinsel vor der arktischen Küste der Sowjetunion Funkaufklärung durchführte. Vier der sechs Besatzungsmitglieder starben. Der Abschuss ereignete sich genau zwei Monate nach dem weitaus bekannteren U-2-Abschuss von Francis Gary Powers und verschärfte die durch diesen Vorfall entstandenen Spannungen zusätzlich."
CW_Expansion_country.520.a:1 "OK"
