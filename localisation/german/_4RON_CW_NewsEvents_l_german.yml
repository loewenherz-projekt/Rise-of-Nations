CW_Expansion_country.500.t:0 "Avianca-Flug 671 stürzt ab"
CW_Expansion_country.500.d:0 "Avianca-Flug 671 (Registrierung HK-177) war eine Lockheed Constellation, die am 21. Januar 1960 bei der Landung in Montego Bay, Jamaika, abstürzte und verbrannte. Es war und ist der schwerste Unfall in der jamaikanischen Luftfahrtgeschichte. Der Flug startete am Miami International Airport in Florida. Die Maschine war eine Lockheed L-1049E Super Constellation, die von Avianca auf ihren Strecken Bogota-Montego Bay eingesetzt wurde. 37 der 46 Passagiere und Besatzungsmitglieder an Bord kamen ums Leben."
CW_Expansion_country.500.a:1 "OK"
