CW_Expansion_country.122.t:0 "Tagebuch der Anne Frank veröffentlicht"
CW_Expansion_country.122.d:0 "Das Tagebuch der Anne Frank, auch bekannt als „Das Tagebuch eines jungen Mädchens“, ist ein Buch mit Aufzeichnungen aus dem niederländischsprachigen Tagebuch, das Anne Frank während der Nazi-Besatzung der Niederlande zwei Jahre lang mit ihrer Familie im Versteck verbrachte. Die Familie wurde 1944 festgenommen und Anne Frank starb 1945 im Konzentrationslager Bergen-Belsen an Typhus. Das Tagebuch wurde von Miep Gies geborgen und kurz nach dem Ende des Zweiten Weltkriegs Annes Vater Otto Frank, dem einzigen bekannten Überlebenden der Familie, übergeben. Das Tagebuch wurde seitdem in über 70 Sprachen veröffentlicht. Erstmals veröffentlicht unter dem Titel „Het Achterhuis“. Das Tagebuch erschien 1947 im Verlag Contact Publishing in Amsterdam und wurde vom 14. Juni 1942 bis zum 1. August 1944 veröffentlicht. Mit der englischsprachigen Übersetzung Anne Frank: The Diary of a Young Girl von Doubleday &amp; Company (USA) und Vallentine Mitchell (Großbritannien) im Jahr 1952 erhielt es große Aufmerksamkeit bei Kritikern und Publikum. Seine Popularität inspirierte die Drehbuchautoren Frances Goodrich und Albert Hackett zu ihrem Theaterstück Das Tagebuch der Anne Frank aus dem Jahr 1955, das sie 1959 für die Leinwand adaptierten. Das Buch ist in mehreren Listen der besten Bücher des 20. Jahrhunderts aufgeführt."
CW_Expansion_country.122.a:1 "OK"
