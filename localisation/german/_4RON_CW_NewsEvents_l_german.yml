CW_Expansion_country.144.t:0 "Die niederländische Königin Wilhelmina dankt ab"
CW_Expansion_country.144.d:0 "Bestürzt über die Rückkehr zur Vorkriegspolitik und den drohenden Verlust Indonesiens dankte Wilhelmina am 4. September 1948 nach 57 Jahren und 286 Tagen Regentschaft aufgrund ihres fortgeschrittenen Alters und einer Krankheit ab. Sie übergab die Krone an Juliana und wurde fortan „Ihre Königliche Hoheit Prinzessin Wilhelmina der Niederlande“ genannt."
CW_Expansion_country.144.a:1 "OK"
