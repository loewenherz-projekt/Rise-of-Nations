CW_Expansion_country.423.t:0 "Invasion der Roten Armee in Ungarn"
CW_Expansion_country.423.d:0 "Ein spontaner Volksaufstand, der zwölf Tage zuvor in Ungarn begonnen hatte, wurde am 4. November 1956 von sowjetischen Panzern und Truppen brutal niedergeschlagen. Tausende wurden getötet und verwundet und fast eine Viertelmillion Ungarn flohen aus dem Land."
