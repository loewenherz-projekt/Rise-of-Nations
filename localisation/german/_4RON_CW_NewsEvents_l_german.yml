CW_Expansion_country.482.t:0 "Hawaii wird ein US-Bundesstaat"
CW_Expansion_country.482.d:0 "Die modernen Vereinigten Staaten erhalten ihren krönenden Stern, als Präsident [USA.GetLeader] eine Proklamation unterzeichnet, mit der Hawaii als 50. Bundesstaat in die Union aufgenommen wird. Der Präsident erließ außerdem den Befehl zur Einführung einer amerikanischen Flagge mit 50 Sternen, die in versetzten Reihen angeordnet sind: fünf Reihen mit je sechs Sternen und vier Reihen mit je fünf Sternen. Die neue Flagge wurde am 4. Juli 1960 offiziell eingeführt."
