CW_Expansion_country.200.t:0 "Kalifornien feiert hundertjähriges Jubiläum"
CW_Expansion_country.200.d:0 "Die ursprüngliche Planung sah auch Feierlichkeiten zum 100. Jahrestag der Goldfunde und des Goldrauschs in den Jahren 1948 und 1949 vor; diese sind in Teil I gesondert aufgeführt. Die staatliche Handelskammer war während der gesamten Zeit äußerst aktiv; Kreis- und Stadtausschüsse wurden gebildet, die alle Interessen vertraten. Im September 1947 gründete der Gesetzgeber eine Hundertjahrfeier-Kommission; für ein dreijähriges Programm wurden 2.000.000 US-Dollar bewilligt; die Koordination übernahm der staatliche Finanzdirektor. Lokale Ausschüsse durften staatliche Zuschüsse zur teilweisen Deckung der Kosten ihrer eigenen Feierlichkeiten in Anspruch nehmen."
CW_Expansion_country.200.a:1 "OK"
