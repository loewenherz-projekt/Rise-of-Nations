CW_Expansion_country.183.t:0 "Türkei hebt Verbot des arabischen Gebetsrufs auf"
CW_Expansion_country.183.d:0 "Der Gebetsruf, die Standardansage für den Gottesdienst am Freitag und die fünf täglichen rituellen Gebete, wurde in der Türkei und überall auf der Welt schon immer auf Arabisch rezitiert. In den 1930er und 1940er Jahren beschloss das kemalistische Regime in der Türkei jedoch, dieser Tradition ein Ende zu setzen. Der Gebetsruf wurde bis zum 16. Juni 1950 auf Türkisch rezitiert, als die Nationalversammlung das Gesetz änderte und die Rezitation auf Arabisch verbot. Mit dieser Änderung war der türkische Gebetsruf (Ezan) nicht mehr verpflichtend und der ursprüngliche arabische Gebetsruf nicht mehr strafbar."
CW_Expansion_country.183.a:1 "OK"
