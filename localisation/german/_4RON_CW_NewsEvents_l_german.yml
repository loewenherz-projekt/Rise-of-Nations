CW_Expansion_country.194.t:0 "Nordkoreas Luftwaffe zerstört"
CW_Expansion_country.194.d:0 "Von der Überraschung und Wucht der Invasion der DVRK am 25. Juni 1950 überrascht, führten die Streitkräfte der Republik Korea (ROK) und ihre US-Berater zunächst einen ungeordneten Rückzug in den Südosten der Halbinsel durch. Der anfängliche Schock der Invasion verwandelte sich jedoch bald in eine konzertierte Verteidigung um Busan. Entscheidend für die Stabilisierung waren die Luftstreitkräfte sowohl in der ROK als auch in Japan. Die Luftüberlegenheit über die Luftwaffe der DVRK wurde innerhalb eines Monats erlangt. Die Herstellung der Luftüberlegenheit entfachte erneut die Debatte über den Einsatz von Luftstreitkräften. Die Führung der USAF befürwortete die Herstellung und Aufrechterhaltung der Lufthoheit, Verbote zur Verlangsamung oder Aufhaltung kommunistischer Bewegungen sowie strategische Bombenangriffe, um die kommunistische Kriegsfähigkeit zu schwächen. Die Führung von US Army, Navy und Marine Corps wünschte sich eine weiterhin enge Zusammenarbeit der Luft- und Bodentruppen. Die Debatte darüber, welche Luftstrategie Priorität haben sollte, spiegelte weitgehend den aktuellen Stand des Krieges wider. Generell wurde die Debatte vertagt, indem alle Optionen mit unterschiedlicher Intensität geprüft wurden."
CW_Expansion_country.194.a:1 "OK"
