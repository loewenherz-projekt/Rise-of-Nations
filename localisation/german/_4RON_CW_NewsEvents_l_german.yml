CW_Expansion_country.388.t:0 "Erste Ausgabe des Guinness-Buchs der Rekorde veröffentlicht"
CW_Expansion_country.388.d:0 "Das Guinness-Buch der Rekorde wurde erstmals 1955 veröffentlicht und ist das meistverkaufte urheberrechtlich geschützte Buch aller Zeiten. Die Idee für das Guinness-Buch der Rekorde stammt von Sir Hugh Beaver, dem Geschäftsführer von Guinness in den 1950er Jahren. Am 10. November 1951 war Sir Hugh mit einer Jagdgesellschaft in der Grafschaft Wexford unterwegs, als ein Goldregenpfeifer über ihn hinwegflog. Sir Hugh zielte und verfehlte. Später am Abend entbrannte eine Diskussion darüber, welches Wildgeflügel am schnellsten flog. Dies brachte Sir Hugh auf die Idee, ein Sachbuch zusammenzustellen, das als maßgebliches Nachschlagewerk dienen sollte, um die nächtlichen Debatten in den 81.400 Pubs in Großbritannien und Irland zu schlichten."
CW_Expansion_country.388.a:1 "OK"
