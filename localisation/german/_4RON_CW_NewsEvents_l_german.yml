CW_Expansion_news.275.a:1 "OK"

CW_Expansion_country.276.t:0 "Nordseeflut"
CW_Expansion_country.276.d:0 "Die Nordseeflut von 1953 war eine schwere Überschwemmung, die durch einen schweren Sturm am Ende des Samstags, 31. Januar 1953, und am Morgen des nächsten Tages verursacht wurde. Die Sturmflut traf die Niederlande, Nordwestbelgien, England und Schottland. Eine Kombination aus Springflut und einem schweren europäischen Sturm über der Nordsee verursachte eine Sturmflut. Die Kombination aus Wind, Flut und Tiefdruck führte dazu, dass das Meer Land bis zu 5,6 Meter über dem Meeresspiegel überflutete. Die meisten Küstenschutzanlagen, die der Flut ausgesetzt waren, waren überfordert, was zu ausgedehnten Überschwemmungen führte."
CW_Expansion_country.276.a:1 "OK"
