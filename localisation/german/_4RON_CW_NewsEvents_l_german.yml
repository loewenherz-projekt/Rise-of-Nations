CW_Expansion_news.284.d:0 "Nur einen Tag nach dem Tod des langjährigen sowjetischen Diktators Josef Stalin wurde Georgi Malenkow zum Ministerpräsidenten und Ersten Sekretär der Kommunistischen Partei der Sowjetunion ernannt. Malenkows Amtszeit war äußerst kurz, und innerhalb weniger Wochen wurde er von Nikita Chruschtschow verdrängt. Malenkow war einer der wenigen Altbolschewisten, die Stalins blutige Säuberungen der 1930er Jahre überlebt hatten. Als ruhige Persönlichkeit, die es vorzog, im Hintergrund zu arbeiten, wurde Malenkow von vielen seiner Kollegen in der Sowjetregierung nicht ernst genommen, doch unter Stalins wachsamen Augen stieg er in den 1930er und 1940er Jahren die Hierarchie der Kommunistischen Partei hinauf. In den späten 1940er Jahren ging man allgemein davon aus, dass er Stalins Nachfolger werden würde. Als Stalin im März 1953 starb, übernahm Malenkow den Posten des Ministerpräsidenten und Ersten Sekretärs der Kommunistischen Partei. Es schien, als ob er eine reformistische Ader hätte, da er Kürzungen der Militärausgaben forderte und die politische Unterdrückung in der Sowjetunion und den Ostblockstaaten lockerte."
