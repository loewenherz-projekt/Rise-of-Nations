ron_decolonizationdiplo.17.t:0 "[From.GetName] bekräftigt Allianz"
ron_decolonizationdiplo.17.d:0 "Wir haben gerade eine Nachricht von der [From.GetAdjective]-Administration erhalten, in der uns mitgeteilt wird, dass sie bis zum Ende in unserer Fraktion bleiben werden."
ron_decolonizationdiplo.17.a:1 "Akzeptieren"

ron_decolonizationdiplo.18.t:0 "Frankreich akzeptiert unsere Annexion"
ron_decolonizationdiplo.18.d:0 "Der Staatsstreich von Yanam versetzte die französischen Behörden in Pondicherry in Rage. Gerüchte kursierten, die Franzosen würden einen Kreuzer nach Yanam schicken, um die fusionsbefürwortenden Politiker festzunehmen und ihre Macht wiederherzustellen. Nur drei Tage vor dem Putsch wurde der letzte oberste Kolonialverwalter von Yanam, George Sala, von André Ménard, dem damaligen Generalgouverneur von Pondicherry, abberufen. Dadala wurde für 14 Tage zum kommissarischen Kommissar von Yanam ernannt. Ende Juni 1954 stattete Kewal Singh Yanam einen Besuch ab und bat Dadala, nach Pondicherry zurückzukehren, um seine dortigen Aktivitäten fortzusetzen. Am 3. Juli verließ Dadala Yanam, nachdem er alle Vorkehrungen für eine ordnungsgemäße Verwaltung getroffen hatte. Am 1. November 1954 wurde Yanam de facto an Indien übergeben. Der indische Premierminister Jawaharlal Nehru besuchte Pondicherry am 16. Januar 1955. Edouard Goubert, S. Perumal, Dadala und Sri Pakirisamy Pillai hielten bei einer öffentlichen Versammlung auf dem Maidan von Gorimedu Ansprachen an Pandit Nehru."
ron_decolonizationdiplo.18.a:1 "Exzellent"

