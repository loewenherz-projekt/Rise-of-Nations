CW_Expansion_country.488.t:0 "Nikita Chruschtschow Tours Vereinigte Staaten"
CW_Expansion_country.488.d:0 "Chruschtschow traf am 15. September 1959 in Washington, D.C. ein und landete um 11:30 Uhr auf dem Luftwaffenstützpunkt Andrews. Begleitet wurde er von seiner Frau Nina sowie seinen erwachsenen Kindern (Sohn Sergej, Töchter Julia und Rada sowie Schwiegersohn Alexej). Dies war beispiellos, da es für sowjetische Beamte nicht üblich war, mit ihren Familien im In- oder Ausland zu reisen."
