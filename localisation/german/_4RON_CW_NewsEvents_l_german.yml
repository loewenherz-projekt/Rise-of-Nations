CW_Expansion_country.513.t:0 "Dhaulagiri Erstbesteigung"
CW_Expansion_country.513.d:0 "Der Dhaulagiri ist mit 8.167 Metern über dem Meeresspiegel der siebthöchste Berg der Welt und der höchste Berg innerhalb der Grenzen eines einzigen Landes (Nepal). Er wurde erstmals am 13. Mai 1960 von einer schweizerisch-österreichisch-nepalesischen Expedition bestiegen. Annapurna I (8.091 m) liegt 34 km östlich des Dhaulagiri. Der Fluss Kali Gandaki fließt zwischen den beiden Bergen in der Kaligandaki-Schlucht, die als die tiefste der Welt gilt. Die Stadt Pokhara liegt südlich des Annapurna, ein wichtiges regionales Zentrum und Ausgangspunkt für Bergsteiger und Wanderer, die beide Gebirgszüge besuchen, sowie ein eigenständiges Touristenziel."
CW_Expansion_country.513.a:1 "OK"
