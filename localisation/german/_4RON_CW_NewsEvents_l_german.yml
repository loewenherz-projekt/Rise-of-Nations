CW_Expansion_news.265.a:1 "OK"

CW_Expansion_country.266.t:0 "Nacht der ermordeten Dichter"
CW_Expansion_country.266.d:0 "In der Nacht der ermordeten Dichter wurden am 12. August 1952 dreizehn sowjetische Juden im Lubjanka-Gefängnis in Moskau hingerichtet. Die ersten Verhaftungen erfolgten im September 1948 und Juni 1949. Alle Angeklagten wurden fälschlich der Spionage, des Landesverrats und zahlreicher anderer Verbrechen beschuldigt. Nach ihrer Verhaftung wurden sie gefoltert, geschlagen und drei Jahre lang isoliert, bevor sie offiziell angeklagt wurden. Unter den Angeklagten befanden sich fünf jiddische Schriftsteller, die alle dem Jüdischen Antifaschistischen Komitee angehörten."
CW_Expansion_country.266.a:1 "OK"
