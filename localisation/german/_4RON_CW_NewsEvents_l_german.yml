CW_Expansion_country.143.t:0 "Zweite Wehrpflicht in Friedenszeiten in den USA"
CW_Expansion_country.143.d:0 "Die zweite Wehrpflicht in Friedenszeiten begann mit der Verabschiedung des Selective Service Act von 1948, nachdem der STSA ausgelaufen war. Das neue Gesetz verpflichtete alle Männer zwischen 18 und 26 Jahren zur Registrierung. Es schuf auch das System für den „Doctor Draft“, der darauf abzielte, medizinisches Fachpersonal zum Militärdienst zu verpflichten."
CW_Expansion_country.143.a:1 "OK"
