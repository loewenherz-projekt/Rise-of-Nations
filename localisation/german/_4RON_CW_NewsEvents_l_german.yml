CW_Expansion_country.509.t:0 "U-2-Spionageflugzeug verletzt unseren Luftraum"
CW_Expansion_country.509.d:0 "Am 1. Mai 1960 wurde ein US-amerikanisches U-2-Spionageflugzeug von den sowjetischen Luftabwehrstreitkräften abgeschossen, als es tief in sowjetischem Gebiet fotografische Luftaufklärung durchführte. Das einsitzige Flugzeug, geflogen vom amerikanischen Piloten Francis Gary Powers, war in Peshawar, Pakistan, gestartet und stürzte in der Nähe von Swerdlowsk (dem heutigen Jekaterinburg) ab, nachdem es von einer Boden-Luft-Rakete vom Typ S-75 Dvina (SA-2 Guideline) getroffen worden war. Powers landete sicher mit dem Fallschirm und wurde gefangen genommen."
CW_Expansion_country.509.a:1 "OK"
