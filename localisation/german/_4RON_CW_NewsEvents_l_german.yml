CW_Expansion_country.397.t:0 "Sowjetisches Schlachtschiff explodiert und tötet 608"
CW_Expansion_country.397.d:0 "Die Ursache der Explosion ist noch unklar. Die offizielle und wahrscheinlichste Ursache war eine magnetische RMH- oder LMB-Bodenmine, die von den Deutschen während des Zweiten Weltkriegs gelegt und durch das Ziehen der Ankerkette des Schlachtschiffs vor dem letzten Anlegen ausgelöst wurde. Bei nachfolgenden Suchvorgängen wurden 32 Minen dieses Typs gefunden, einige davon im Umkreis von 50 Metern um die Explosionsstelle. Der Schaden entsprach einer Explosion von 1.000–1.200 Kilogramm TNT, und möglicherweise detonierten mehrere Minen. Es wurden weitere Erklärungen für den Verlust des Schiffes vorgeschlagen, die gängigste davon ist, dass es von italienischen Kampfschwimmern der Spezialeinheit Decima Flottiglia MAS aus Kriegszeiten versenkt wurde, die – mehr als zehn Jahre nach Einstellung der Feindseligkeiten – entweder Rache für die Übergabe des ehemaligen italienischen Schlachtschiffs an die UdSSR nahmen oder es im Auftrag der NATO versenkten. Die Novorossiysk wurde am 24. Februar 1956 aus dem Schiffsregister gestrichen, am 4. Mai 1957 geborgen und anschließend verschrottet."
CW_Expansion_country.397.a:1 "OK"
