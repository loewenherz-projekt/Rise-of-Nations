CW_Expansion_country.407.t:0 "Grace Kelly heiratet Rainer III"
CW_Expansion_country.407.d:0 "Die Hochzeit von Rainier III., Fürst von Monaco, und Grace Kelly fand am 18. und 19. April 1956 im Fürstenpalast von Monaco und in der Kathedrale Saint-Nicolas statt. Der Bräutigam war der Fürst des Fürstentums Monaco. Die Braut war ein amerikanischer Filmstar. Die Hochzeit wurde von über 30 Millionen Zuschauern live im Fernsehen verfolgt, übertragen von den Metro-Goldwyn-Mayer Studios. Die Hochzeit stieß auf große öffentliche Aufmerksamkeit und wurde von den Medien als „Hochzeit des Jahrhunderts“ und „mit größter Spannung erwartete Hochzeit der Welt“ bezeichnet. Der Biograf Robert Lacey bezeichnete sie als „das erste moderne Ereignis, das einen Medienüberschuss auslöste“."
CW_Expansion_country.407.a:1 "OK"
