CW_Expansion_country.139.t:0 "Apartheid-Ära in Südafrika"
CW_Expansion_country.139.d:0 "Nachdem die National Party 1948 in Südafrika an die Macht gekommen war, begann ihre rein weiße Regierung sofort mit der Durchsetzung der bestehenden Politik der Rassentrennung. Unter der Apartheid waren nichtweiße Südafrikaner (die Mehrheit der Bevölkerung) gezwungen, in getrennten Gebieten von den Weißen zu leben und getrennte öffentliche Einrichtungen zu nutzen."
CW_Expansion_country.139.a:1 "OK"
