CW_Expansion_country.413.t:0 "Gasherbrum II Erstbesteigung"
CW_Expansion_country.413.d:0 "Die Erstbesteigung erfolgte am 7. Juli 1956 durch die Österreicher Fritz Moravec, Josef Larch und Hans Willenpart über den Südwestgrat. Nachdem sie Lager I errichtet hatten, mussten sie absteigen und fanden bei ihrer Rückkehr das Lager – samt ihrer gesamten Vorräte und Verpflegung – unter einer Lawine verschüttet vor. Trotzdem entschieden sie sich für einen schnellen Gipfelversuch. Nachdem sie eine Route freigelegt hatten, verließen sie Lager III am 6. Juli. Die Gruppe verbrachte die Nacht in einem Biwaksack und erreichte am nächsten Tag um 11:30 Uhr den Gipfel."
CW_Expansion_country.413.a:1 "OK"
