CW_Expansion_country.497.t:0 "Antarktisvertrag"
CW_Expansion_country.497.d:0 "Der Antarktisvertrag und damit verbundene Abkommen, zusammen bekannt als Antarktisvertragssystem (ATS), regeln die internationalen Beziehungen zur Antarktis, dem einzigen Kontinent der Erde ohne einheimische Bevölkerung. Es war das erste Rüstungskontrollabkommen während des Kalten Krieges, das den Kontinent als wissenschaftliches Reservat erklärte, die Freiheit wissenschaftlicher Forschung sicherte und militärische Aktivitäten verbot. Im Rahmen des Vertragssystems wird die Antarktis als das gesamte Land und die Eisschelfe südlich des 60. südlichen Breitengrades definiert. Seit September 2004 hat das Sekretariat des Antarktisvertrags, das das Vertragssystem umsetzt, seinen Sitz in Buenos Aires, Argentinien."
CW_Expansion_country.497.a:1 "OK"
CW_Expansion_news.497.t:0 "Antarktisvertrag"
CW_Expansion_news.497.d:0 "Der Antarktisvertrag und damit verbundene Abkommen, zusammen bekannt als Antarktisvertragssystem (ATS), regeln die internationalen Beziehungen zur Antarktis, dem einzigen Kontinent der Erde ohne einheimische Bevölkerung. Es war das erste Rüstungskontrollabkommen während des Kalten Krieges. Es erklärte den Kontinent zum wissenschaftlichen Schutzgebiet, garantierte die Freiheit wissenschaftlicher Forschung und verbot militärische Aktivitäten. Im Rahmen des Vertragssystems wird die Antarktis als das gesamte Land und die Eisschelfe südlich des 60. südlichen Breitengrades definiert. Seit September 2004 hat das Sekretariat des Antarktisvertrags, das das Vertragssystem umsetzt, seinen Sitz in Buenos Aires, Argentinien."
CW_Expansion_news.497.a:1 "OK"

CW_Expansion_country.498.t:0 "Malpasset-Damm in Südfrankreich bricht zusammen"
CW_Expansion_country.498.d:0 "Der Malpasset-Damm war ein Bogendamm am Fluss Reyran nördlich von Fréjus an der französischen Riviera. Er brach am 2. Dezember 1959 zusammen und tötete bei der darauffolgenden Überschwemmung 423 Menschen. Der Bruch wurde durch eine tektonische Störung im undurchlässigen Felsuntergrund verursacht, die unzureichend vermessen worden war."
CW_Expansion_country.498.a:1 "OK"
