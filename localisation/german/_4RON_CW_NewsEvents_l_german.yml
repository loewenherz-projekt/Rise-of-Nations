CW_Expansion_news.310.a:1 "OK"

CW_Expansion_country.311.t:0 "Erste deutsche Kriegsgefangene kehren aus der UdSSR nach Westdeutschland zurück"
CW_Expansion_country.311.d:0 "Es sollte bis 1953 bzw. 1956 dauern, bis die letzten überlebenden Kriegsgefangenen zurückkehrten. Ausschlaggebend waren Stalins Tod 1953 und Moskaus Wunsch, die Zahl ausländischer Gefangener im Land zu minimieren (viele japanische Kriegsgefangene wurden ebenfalls freigelassen), den Status quo in Europa zu sichern und die Beziehungen zu Westdeutschland zu normalisieren. Darüber hinaus wollte man der ostdeutschen Regierung nach dem Aufstand im Juni 1953 in Ostdeutschland einen Trumpf in die Hand geben, indem man Ostberlin die Repatriierungen anrechnete. Die Sowjets ließen 1953 10.200 Kriegsgefangene frei. Die verbleibenden 9.262 waren größtenteils wegen Kriegsverbrechen angeklagt und zu langen Haftstrafen verurteilt worden, die bis in die 1980er Jahre andauerten."
CW_Expansion_country.311.a:1 "OK"
CW_Expansion_news.311.t:0 "Erste deutsche Kriegsgefangene kehren aus der UdSSR nach Westdeutschland zurück"
CW_Expansion_news.311.d:0 "Es sollte bis 1953 bzw. 1956 dauern, bis die letzten überlebenden Kriegsgefangenen zurückkehrten. Ausschlaggebend waren Stalins Tod 1953 und Moskaus Wunsch, die Zahl ausländischer Gefangener im Land zu minimieren (viele japanische Kriegsgefangene wurden ebenfalls freigelassen), den Status quo in Europa zu sichern und die Beziehungen zu Westdeutschland zu normalisieren. Darüber hinaus wollte man der ostdeutschen Regierung nach dem Aufstand im Juni 1953 in Ostdeutschland einen Trumpf in die Hand geben, indem man Ostberlin die Repatriierungen anrechnete. Die Sowjets ließen 1953 10.200 Kriegsgefangene frei. Die verbleibenden 9.262 waren größtenteils wegen Kriegsverbrechen angeklagt und zu langen Haftstrafen verurteilt worden, die bis in die 1980er Jahre andauerten."
CW_Expansion_news.311.a:1 "OK"

CW_Expansion_country.313.t:0 "Flugrennen von London nach Christchurch"
CW_Expansion_country.313.d:0 "Das Flugrennen von London nach Christchurch im Jahr 1953, das „letzte große Flugrennen“, war 12.300 Meilen (19.800 km) lang, führte von London Heathrow zum Christchurch International Airport in Neuseeland und fand im Oktober 1953 statt, nachdem Christchurch seinen Flughafen 1950 zum internationalen Flughafen erklärt hatte."
CW_Expansion_country.313.a:1 "OK"
CW_Expansion_news.313.t:0 "Flugrennen von London nach Christchurch"
CW_Expansion_news.313.d:0 "Das Flugrennen von London nach Christchurch im Jahr 1953, das „letzte große Flugrennen“, war 12.300 Meilen (19.800 km) lang, führte von London Heathrow zum Christchurch International Airport in Neuseeland und fand im Oktober 1953 statt, nachdem Christchurch seinen Flughafen 1950 zum internationalen Flughafen erklärt hatte."
CW_Expansion_news.313.a:1 "OK"

CW_Expansion_country.314.t:0 "US-koreanischer gegenseitiger Verteidigungsvertrag"
CW_Expansion_country.314.d:0 "Der Verteidigungsvertrag zwischen den Vereinigten Staaten und der Republik Korea ist ein Vertrag zwischen Südkorea und den Vereinigten Staaten, der am 1. Oktober 1953 unterzeichnet wurde, zwei Monate nach der Unterzeichnung des Waffenstillstandsabkommens, das die Kämpfe im Koreakrieg beendete. Das Abkommen verpflichtet die beiden Nationen, sich gegenseitig Hilfe zu leisten, falls sie einem bewaffneten Angriff von außen ausgesetzt sind, und erlaubt den Vereinigten Staaten, in Absprache mit der südkoreanischen Regierung Streitkräfte in Südkorea zu stationieren."
CW_Expansion_country.314.a:1 "OK"
CW_Expansion_news.314.t:0 "US-koreanischer gegenseitiger Verteidigungsvertrag"
CW_Expansion_news.314.d:0 "Der gegenseitige Verteidigungsvertrag zwischen den Vereinigten Staaten und der Republik Korea ist ein Vertrag zwischen Südkorea und den Vereinigten Staaten, der am 1. Oktober 1953 unterzeichnet wurde, zwei Monate nach der Unterzeichnung des Waffenstillstandsabkommens, das die Kämpfe im Koreakrieg beendete. Das Abkommen verpflichtet die beiden Nationen, sich gegenseitig Hilfe zu leisten, falls eine von ihnen einem bewaffneten Angriff von außen ausgesetzt ist, und erlaubt den Vereinigten Staaten, in Absprache mit der südkoreanischen Regierung Streitkräfte in Südkorea zu stationieren."
CW_Expansion_news.314.a:1 "OK"

CW_Expansion_country.316.t:0 "Der saudische König Abdul Azis Al-Saud ist gestorben"
CW_Expansion_country.316.d:0 "Ibn Saud litt in seinen letzten Lebensjahren an einer Herzkrankheit, war halbblind und litt unter Arthritis. Im Oktober 1953 verschlimmerte sich seine Krankheit. Bevor Ibn Saud in der Nacht des 8. November schlafen ging, rezitierte er mehrmals die Schahada, seine letzten Worte. Er starb am 9. November 1953 im Alter von 78 Jahren im Shubra-Palast in Ta&#39;if an einem Herzinfarkt. Prinz Faisal war an seiner Seite. Das Totengebet wurde in Al Hawiya in Ta&#39;if verrichtet. Ibn Sauds Leichnam wurde nach Riad überführt, wo er auf dem Al-Oud-Friedhof neben seiner Schwester Noura begraben wurde."
CW_Expansion_country.316.a:1 "OK"
CW_Expansion_news.316.t:0 "Der saudische König Abdul Azis Al-Saud ist gestorben"
CW_Expansion_news.316.d:0 "Ibn Saud litt in seinen letzten Lebensjahren an einer Herzkrankheit, war halbblind und litt unter Arthritis. Im Oktober 1953 verschlimmerte sich seine Krankheit. Bevor Ibn Saud in der Nacht des 8. November schlafen ging, rezitierte er mehrmals die Schahada, seine letzten Worte. Er starb am 9. November 1953 im Alter von 78 Jahren im Shubra-Palast in Ta&#39;if an einem Herzinfarkt. Prinz Faisal war an seiner Seite. Das Totengebet wurde in Al Hawiya in Ta&#39;if verrichtet. Ibn Sauds Leichnam wurde nach Riad überführt und auf dem Al-Oud-Friedhof neben seiner Schwester Noura begraben."
CW_Expansion_news.316.a:1 "OK"

CW_Expansion_country.317.t:0 "Operation Castor"
CW_Expansion_country.317.d:0 "Die Operation Castor war eine französische Luftlandeoperation im Ersten Indochinakrieg. Sie errichtete einen befestigten Luftkopf in der Provinz Dien Bien im Nordwesten Vietnams und wurde von Brigadegeneral Jean Gilles kommandiert. Die Operation begann am 20. November 1953 um 10:35 Uhr. In den folgenden zwei Tagen wurden Verstärkungen abgeworfen. Nachdem alle Ziele erreicht waren, endete die Operation am 22. November. Castor war die größte Luftlandeoperation seit dem Zweiten Weltkrieg."
CW_Expansion_country.317.a:1 "OK"
