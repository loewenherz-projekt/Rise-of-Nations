CW_Expansion_country.496.t:0 "MGM veröffentlicht Ben-Hur"
CW_Expansion_country.496.d:0 "Ben Hur ist ein US-amerikanischer religiöser Epos aus dem Jahr 1959. Regie führte William Wyler, produziert wurde er von Sam Zimbalist. Die Titelrolle spielt Charlton Heston. Die Neuverfilmung des gleichnamigen Stummfilms aus dem Jahr 1925 basiert auf Lew Wallaces Roman Ben Hur: Eine Geschichte von Christus aus dem Jahr 1880. Das Drehbuch stammt von Karl Tunberg, enthält aber auch Beiträge von Maxwell Anderson, SN Behrman, Gore Vidal und Christopher Fry."
