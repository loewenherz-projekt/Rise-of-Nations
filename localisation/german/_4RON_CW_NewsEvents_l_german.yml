CW_Expansion_country.446.t:0 "Olav V. wird König von Norwegen"
CW_Expansion_country.446.d:0 "Haakon wurde 1955 bei einem Unfall verletzt; sein Sohn Olav amtierte bis zu seinem Tod als Regent. Haakon starb am 21. September 1957 im Königspalast in Oslo. Er wurde 85 Jahre alt. Nach seinem Tod folgte Olav ihm als Olav V. nach. Olav regierte als „Volkskönig“ und erfreute sich großer Beliebtheit. Er fuhr gern mit seinem eigenen Auto und benutzte öffentliche Fahrspuren, obwohl er als Monarch auch auf Busspuren fahren durfte. Als während der Energiekrise von 1973 das Autofahren eingeschränkt wurde, wollte König Olav – der hätte fahren dürfen – mit gutem Beispiel vorangehen. Während er sich auf einen Skiausflug vorbereitete, zog er sein Skioutfit an und bestieg die S-Bahn Holmenkollbanen, die Skier auf der Schulter. Als er später gefragt wurde, wie er es wagen konnte, ohne Leibwächter in der Öffentlichkeit aufzutreten, antwortete er, er habe „vier Millionen Leibwächter“ – Norwegen hatte damals vier Millionen Einwohner."
CW_Expansion_country.446.a:1 "OK"
CW_Expansion_news.446.t:0 "Olav V. wird König von Norwegen"
CW_Expansion_news.446.d:0 "Haakon wurde 1955 bei einem Unfall verletzt; sein Sohn Olav amtierte bis zu seinem Tod als Regent. Haakon starb am 21. September 1957 im Königspalast in Oslo. Er wurde 85 Jahre alt. Nach seinem Tod folgte ihm Olav als Olav V. nach. Olav regierte als ‚Volkskönig‘ und erfreute sich großer Beliebtheit. Er fuhr gern selbst Auto und benutzte öffentliche Fahrspuren, obwohl er als Monarch auch auf Busspuren fahren durfte. Als während der Energiekrise 1973 das Autofahren eingeschränkt wurde, wollte König Olav – der hätte fahren dürfen – mit gutem Beispiel vorangehen. Während er sich auf einen Skiausflug vorbereitete, zog er sein Skioutfit an und bestieg die Holmenkollbanen-Vorortbahn mit den Skiern auf der Schulter. Als er später gefragt wurde, wie er es wagen konnte, ohne Leibwächter in die Öffentlichkeit zu gehen, antwortete er, er habe ‚4 Millionen Leibwächter‘ – Norwegen hatte damals 4 Millionen Einwohner.“"
CW_Expansion_news.446.a:1 "OK"

CW_Expansion_country.447.t:0 "Killerbienen versehentlich in Brasilien freigelassen"
CW_Expansion_country.447.d:0 "Alles begann um 1957 in einem Labor in der Nähe von Rio Claro in Brasilien. Der Biologe Warwick E. Kerr wurde von der brasilianischen Regierung beauftragt, eine Bienenart zu züchten, die mehr Honig produzierte. Europäische Honigbienenarten waren zuvor in Südamerika eingeführt worden, erwiesen sich aber in der schwülen Hitze Brasiliens als ziemlich unproduktiv. „Die europäischen Honigbienen saßen den ganzen Tag in der Hängematte und tranken Limonade“, erklärte Eric Mussen, emeritierter Bienenzüchter an der UC Davis, gegenüber IFLScience. „Da er nicht viel Erfahrung mit der Tierzucht hatte, dachte er [Dr. Kerr], wenn er europäischen Honigbienen einige afrikanische Gene eintrug, würde das Ergebnis eine Hybride sein, die in tropischen Umgebungen besser Honig sammeln könnte als die europäischen Honigbienen aus gemäßigten Klimazonen.“ Kerr und sein Team schufen schließlich durch selektive Kreuzung der afrikanischen Honigbiene mit verschiedenen europäischen Honigbienen afrikanisierte Honigbienen, die heute umgangssprachlich als „Killerbienen“ bekannt sind. Anfangs war dies ein Erfolg, da die neuen Hybriden deutlich besser Honig zu produzieren schienen. Es gab jedoch einen großen Nachteil: Sie entwickelten auch extreme Instinkte zur Verteidigung ihres Volkes. Dann kam der entscheidende Moment. Irgendwie gelang es unter unklaren Umständen Tausenden dieser Bienen zu entkommen. „Die bekannteste und aufsehenerregendste Geschichte über eine ‚Bestandsfreilassung‘ handelt von einem Besucher, dem es nicht gefiel, die Königinnen hinter Königinnengittern an den Eingängen der Bienenstöcke eingesperrt zu sehen, weshalb die Gitter entfernt wurden“, erklärt Dr. Mussen. „Etwa 20 Völker entkamen in die Wildnis. Theoretisch führte diese Flucht dazu, dass viele Gebiete in Süd- und Mittelamerika von afrikanisierten Honigbienen völlig überrannt wurden.“"
CW_Expansion_country.447.a:1 "OK"
