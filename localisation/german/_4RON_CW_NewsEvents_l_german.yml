CW_Expansion_news.434.a:1 "OK"

CW_Expansion_country.435.t:0 "Britische und französische Truppen verlassen den Suezkanal"
CW_Expansion_country.435.d:0 "Am 29. Oktober 1956 marschierten zehn israelische Brigaden in Ägypten ein und rückten in Richtung Kanal vor, wobei sie die ägyptischen Streitkräfte in die Flucht schlugen. Großbritannien und Frankreich folgten ihrem Plan und forderten den Rückzug der israelischen und ägyptischen Truppen vom Kanal. Sie kündigten an, einzugreifen, um einen von den Vereinten Nationen angeordneten Waffenstillstand durchzusetzen. Am 5. und 6. November landeten britische und französische Truppen in Port Said und Port Fuad und begannen mit der Besetzung der Kanalzone. Dieser Schritt stieß bald auf wachsenden Widerstand im eigenen Land und auf von den USA unterstützte Resolutionen in der UNO (die teilweise als Reaktion auf sowjetische Interventionsdrohungen erlassen wurden), die dem englisch-französischen Vorgehen rasch ein Ende setzten. Am 22. Dezember evakuierten die UN die britischen und französischen Truppen, und die israelischen Streitkräfte zogen sich im März 1957 zurück. Nasser ging aus der Suezkrise als Sieger und Held für die Sache des arabischen und ägyptischen Nationalismus hervor. Israel erlangte zwar nicht die Freiheit zur Nutzung des Kanals, aber die Schifffahrtsrechte in der Straße von Tirān zurück. Großbritannien und Frankreich hatten weniger Glück und verloren infolge dieser Episode den größten Teil ihres Einflusses im Nahen Osten."
CW_Expansion_country.435.a:1 "OK"
