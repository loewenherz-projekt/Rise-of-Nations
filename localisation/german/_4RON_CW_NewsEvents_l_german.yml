CW_Expansion_country.259.t:0 "US-Spezialeinheiten gegründet"
CW_Expansion_country.259.d:0 "Im Juni 1952 wurde die 10. Special Forces Group (Airborne) unter Oberst Aaron Bank gegründet, kurz nach der Gründung der Psychological Warfare School, aus der schließlich das heutige John F. Kennedy Special Warfare Center and School hervorging. Die 10. Special Forces Group (Airborne) wurde aufgeteilt, wobei der Kader, der die Bezeichnung 10. SFG behielt, im September 1953 nach Bad Tölz, Deutschland, verlegt wurde. Der verbleibende Kader in Fort Bragg bildete die 77. Special Forces Group, die im Mai 1960 reorganisiert und zur heutigen 7. Special Forces Group ernannt wurde."
CW_Expansion_country.259.a:1 "OK"
