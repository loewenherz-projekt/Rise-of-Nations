CW_Expansion_country.467.t:0 "Gründung der Fünften Französischen Republik"
CW_Expansion_country.467.d:0 "Die Fünfte Republik ist das derzeitige republikanische Regierungssystem Frankreichs. Sie wurde am 4. Oktober 1958 von Charles de Gaulle im Rahmen der Verfassung der Fünften Republik gegründet. Die Fünfte Republik ging aus dem Zusammenbruch der Vierten Republik hervor und ersetzte die ehemalige parlamentarische Republik durch ein semipräsidentielles (oder dualistisches) System, das die Macht zwischen einem Präsidenten als Staatsoberhaupt und einem Premierminister als Regierungschef aufteilte. De Gaulle, der im Dezember 1958 als erster französischer Präsident der Fünften Republik gewählt wurde, glaubte an ein starkes Staatsoberhaupt, das er als Verkörperung des „Geistes der Nation“ beschrieb."
CW_Expansion_country.467.a:1 "OK"
