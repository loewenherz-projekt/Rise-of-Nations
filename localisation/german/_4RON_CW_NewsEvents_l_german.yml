CW_Expansion_country.391.t:0 "Militärputsch gegen Peron"
CW_Expansion_country.391.d:0 "Nach zehnjähriger Herrschaft wird der argentinische Präsident Juan Domingo Perón durch einen Militärputsch gestürzt. Perón, ein Demagoge, der 1946 mit Unterstützung der Arbeiterklasse an die Macht gekommen war, wurde mit dem Niedergang der argentinischen Wirtschaft Anfang der 1950er Jahre zunehmend autoritärer. Seine größte politische Ressource war seine charismatische Frau, Eva „Evita“ Perón. Doch sie starb 1952, was den Zusammenbruch der nationalen Koalition bedeutete, die ihn unterstützt hatte. Nachdem er sich Kirche, Studenten und andere zum Feind gemacht hatte, wurde er im September 1955 vom Militär ins Exil gezwungen. Er ließ sich in Spanien nieder, wo er als Anführer der „Peronisten“ im Exil diente – einer mächtigen Fraktion von Argentiniern, die ihm und seinem System treu blieben."
CW_Expansion_country.391.a:1 "OK"
CW_Expansion_news.391.t:0 "Militärputsch gegen Peron"
