CW_Expansion_country.135.t:0 "Bürgerkrieg im Mandatsgebiet Palästina"
CW_Expansion_country.135.d:0 "Der Bürgerkrieg im Mandatsgebiet Palästina von 1947–1948 war die erste Phase des Palästinakriegs von 1947–1949. Er brach aus, nachdem die Generalversammlung der Vereinten Nationen am 29. November 1947 eine Resolution verabschiedet hatte, in der sie die Annahme des Teilungsplans für Palästina empfahl. Jüdische Militante in Katamon, Jerusalem."
CW_Expansion_country.135.a:1 "OK"
