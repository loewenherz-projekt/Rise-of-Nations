CW_Expansion_country.353.t:0 "Brasilianischer Präsident begeht Selbstmord"
CW_Expansion_country.353.d:0 "Der brasilianische Präsident Getulio Vargas hat wenige Stunden nach seinem Rücktritt inmitten einer sich verschärfenden politischen Krise Selbstmord begangen. Sein Sohn fand ihn um 8:30 Uhr Ortszeit in seinen Privatgemächern. Dr. Vargas, der sich selbst ins Herz geschossen hatte, hinterließ einen dramatischen Abschiedsbrief, der nur zwei Stunden nach der Entdeckung seiner Leiche im nationalen Radio ausgestrahlt wurde. Darin beklagte er, dass seine Bemühungen zur „Befreiung“ des brasilianischen Volkes durch ausländische Interessen behindert worden seien, die er für die Wirtschaftskrise verantwortlich machte, die das Land derzeit im Griff hat. In seinem Brief stand: „Nichts bleibt außer meinem Blut. Ich gab euch mein Leben, nun gebe ich euch meinen Tod. Ich wähle diesen Weg, um euch zu verteidigen, denn meine Seele wird bei euch sein, mein Name soll ein Banner für euren Kampf sein.“ Der Brief endete: „Ich mache den ersten Schritt in die Ewigkeit. Ich verlasse das Leben, um in die Geschichte einzutreten.“"
CW_Expansion_country.353.a:1 "OK"
