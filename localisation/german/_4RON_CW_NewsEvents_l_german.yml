CW_Expansion_country.368.t:0 "Bagdad-Pakt"
CW_Expansion_country.368.d:0 "Die Middle East Treaty Organization (METO), auch bekannt als Bagdad-Pakt und später als Central Treaty Organization (CENTO), war ein Militärbündnis des Kalten Krieges. Es wurde am 24. Februar 1955 von Iran, Irak, Pakistan, der Türkei und Großbritannien gegründet. Das Bündnis wurde am 16. März 1979 aufgelöst."
