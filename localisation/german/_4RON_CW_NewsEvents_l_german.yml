CW_Expansion_country.321.t:0 "Die Amami-Inseln kehrten nach Japan zurück"
CW_Expansion_country.321.d:0 "Am 8. August verkündete Foster Dulles während seines Kurzbesuchs in Japan, dass die USA ihre Rechte gemäß Artikel 3 an der Amami-Oshima-Gruppe zugunsten einer Rückgabe durch Japan aufgeben wollten. Am 11. August stellte die US-Botschaft klar, dass der gesamte Bezirk Ōshima zurückgegeben würde, ohne die beiden südlichsten Inseln abzutrennen. Die Rückgabegruppen sowohl auf dem Festland als auch auf den Amami-Inseln waren von dieser Nachricht begeistert, doch die anfängliche Begeisterung schlug bald in Irritation und Misstrauen um, da die USA das Datum der Übergabe monatelang nicht bekannt gaben. Im November organisierten die Fukkyō sogar eine Massenkundgebung und Hungerstreiks. Am 24. Dezember 1953 unterzeichneten die beiden Länder schließlich das Abkommen zur Rückgabe der Amami-Inseln an Japan. Am folgenden Tag endete die US-Militärbesatzung der Amami-Inseln."
CW_Expansion_country.321.a:1 "OK"
