CW_Expansion_country.248.t:0 "Libyen wird von Italien unabhängig"
CW_Expansion_country.248.d:0 "An diesem Tag im Jahr 1947 erlangte Libyen seine Unabhängigkeit. Gemäß den Bedingungen des Friedensvertrags mit den Alliierten von 1947 verzichtete Italien auf alle Ansprüche auf Libyen. Der offiziell als Staat Libyen bezeichnete Staat ist ein Land in der Maghreb-Region in Nordafrika, das im Norden an das Mittelmeer, im Osten an Ägypten, im Südosten an den Sudan, im Süden an den Tschad, im Südwesten an Niger, im Westen an Algerien und im Nordwesten an Tunesien grenzt. Der souveräne Staat besteht aus drei historischen Regionen: Tripolitanien, Fezzan und Cyrenaika. Mit einer Fläche von fast 700.000 Quadratmeilen (1,8 Millionen km²) ist Libyen das viertgrößte Land Afrikas und das 16. größte Land der Welt. Am 24. Dezember 1951 erklärte Libyen seine Unabhängigkeit als Vereinigtes Königreich Libyen, eine konstitutionelle Erbmonarchie unter König Idris, dem einzigen Monarchen Libyens."
CW_Expansion_country.248.a:1 "OK"
