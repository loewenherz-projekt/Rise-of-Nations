CW_Expansion_country.119.t:0 "Tom und Jerry in den Kinos"
CW_Expansion_country.119.d:0 "Tom und Jerry ist ein US-amerikanisches Animations-Franchise und eine Reihe von Kurzfilmkomödien, die 1940 von William Hanna und Joseph Barbera geschaffen wurden. Die Serie, die vor allem durch ihre 161 Kinokurzfilme von Metro-Goldwyn-Mayer bekannt wurde, dreht sich um die Rivalität zwischen den Titelfiguren – einer Katze namens Tom und einer Maus namens Jerry. In vielen Kurzfilmen treten auch mehrere wiederkehrende Charaktere auf. In der Erstausstrahlung produzierten Hanna und Barbera von 1940 bis 1958 114 Tom-und-Jerry-Kurzfilme für MGM. In dieser Zeit gewannen sie sieben Oscars für den besten animierten Kurzfilm und belegten zusammen mit Walt Disneys Silly Symphonies den ersten Platz mit den meisten Auszeichnungen in dieser Kategorie. Nach der Schließung des MGM-Zeichentrickstudios im Jahr 1957 belebte MGM die Serie wieder. Gene Deitch drehte von 1961 bis 1962 weitere 13 Tom-und-Jerry-Kurzfilme für Rembrandt Films. Tom und Jerry wurde damit zur umsatzstärksten Zeichentrick-Kurzfilmreihe dieser Zeit und überholte Looney Tunes. Chuck Jones produzierte dann zwischen 1963 und 1967 weitere 34 Kurzfilme mit Sib Tower 12 Productions. Drei weitere Kurzfilme wurden produziert: The Mansion Cat (2001), The Karate Guard (2005) und A Fundraising Adventure (2014), sodass insgesamt 164 Kurzfilme produziert wurden."
CW_Expansion_country.119.a:1 "OK"
