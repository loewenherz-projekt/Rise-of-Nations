CW_Expansion_country.279.t:0 "Präsident Dwight Eisenhower lehnt Gnade für Rosenbergs ab"
CW_Expansion_country.279.d:0 "Eine der ersten Entscheidungen, die der neu gewählte Präsident [USA.GetLeader], ein Republikaner und Militärführer des Zweiten Weltkriegs, treffen musste, war, ob er den Rosenbergs Gnade gewähren und sie so vor der Hinrichtung bewahren sollte. An diesem Tag im Jahr 1953 lehnte Eisenhower dies mit der Begründung ab: „Das Verbrechen, für das sie schuldig befunden und verurteilt wurden, geht weit über die Tötung eines anderen Bürgers hinaus; es beinhaltet den vorsätzlichen Verrat an der gesamten Nation und könnte sehr wohl den Tod Tausender unschuldiger Bürger zur Folge haben. Mit ihrer Tat haben diese beiden Personen tatsächlich die Sache der Freiheit verraten, für die in dieser Stunde freie Menschen kämpfen und sterben.“"
CW_Expansion_country.279.a:1 "OK"
