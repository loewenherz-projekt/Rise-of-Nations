CW_Expansion_country.392.t:0 "Hurrikan Hilda trifft Mexiko"
CW_Expansion_country.392.d:0 "Hurrikan Hilda war ein starker Hurrikan der Kategorie 3 und der zweite in einer Reihe von drei Hurrikanen, die nahe Tampico, Mexiko, auftraten. Hilda, der achte benannte Sturm der atlantischen Hurrikansaison 1955, entstand am 10. September aus einer tropischen Welle in der Nähe der Kleinen Antillen. Er intensivierte sich schnell, während er sich westwärts zu einem kleinen Hurrikan entwickelte."
CW_Expansion_country.392.a:1 "OK"
CW_Expansion_news.392.t:0 "Hurrikan Hilda trifft Mexiko"
CW_Expansion_news.392.d:0 "Hurrikan Hilda war ein starker Hurrikan der Kategorie 3 und der zweite in einer Reihe von drei Hurrikanen, die nahe Tampico (Mexiko) auftrafen. Hilda, der achte benannte Sturm der atlantischen Hurrikansaison 1955, entstand am 10. September aus einer tropischen Welle in der Nähe der Kleinen Antillen. Auf seinem Weg nach Westen intensivierte er sich rasch zu einem kleinen Hurrikan und überquerte am 13. September den Südosten Kubas. Dort brachte er schwere Regenfälle und böige Winde mit sich, die 80 % der Kaffeeernte in der Provinz Oriente vernichteten. In der ostkubanischen Stadt Baracoa beschädigte Hilda die älteste Kirche des Landes schwer. Der Sachschaden belief sich in Kuba auf insgesamt 2 Millionen Dollar, und es gab vier Todesopfer. Später zog der Hurrikan über die nordwestliche Karibik, traf auf Grand Cayman und dann weiter in die nordwestliche Karibik, wo er in der dünn besiedelten Region der östlichen Halbinsel Yucatán leichte Schäden verursachte. Nachdem er den Golf von Mexiko erreicht hatte, verstärkte sich Hilda und erreichte am späten 18. September Spitzenwindgeschwindigkeiten von 200 km/h. Bevor der Hurrikan an Land zog, kam es in Tampico zu Überschwemmungen vom früheren Hurrikan Gladys. Hilda traf die Stadt am frühen 19. September mit Böen von schätzungsweise 240 km/h. Er brachte heftige Regenfälle mit sich, die 90 % von Tampico überschwemmten, während die starken Winde die Hälfte der Häuser beschädigten und 15.000 Menschen obdachlos machten. Der Sturm tötete 300 Menschen und verursachte in Mexiko Schäden von über 120 Millionen US-Dollar (1955 US-Dollar). Anhaltende Überschwemmungen lösten einen Ausbruch von Ruhr aus, und etwa 10 Tage nach Hilda traf Hurrikan Janet dieselbe Region und verursachte weitere Überschwemmungen und Schäden. Insgesamt machten die Schäden durch die Stürme etwa die Hälfte des mexikanischen Haushalts im Jahr 1955 aus. Trotz der hohen Zahl an Todesopfern von 304 und der Schäden von 120 Millionen Dollar wurde der Name Hilda nach der Saison nicht aufgegeben."
CW_Expansion_news.392.a:1 "OK"

CW_Expansion_country.393.t:0 "Hurrikan Janet trifft Mexiko"
CW_Expansion_country.393.d:0 "Hurrikan Janet war der stärkste tropische Wirbelsturm der atlantischen Hurrikansaison 1955 und einer der stärksten atlantischen Hurrikane seit Beginn der Aufzeichnungen. Janet war zudem der erste benannte Sturm, der 1.000 Todesopfer forderte, und der erste Sturm der Kategorie 5, dessen Name nicht mehr verwendet wurde. Als elfter tropischer Sturm, neunter Hurrikan und vierter schwerer Hurrikan des Jahres entstand Janet am 21. September aus einer tropischen Welle östlich der Kleinen Antillen. Auf seinem Weg westwärts über die Karibische See schwankte seine Intensität, verstärkte sich aber im Allgemeinen, bevor er als Hurrikan der Kategorie 5 mit Windgeschwindigkeiten von 282 km/h seine höchste Intensität erreichte. Mit dieser Stärke erreichte der heftige Hurrikan am 28. September nahe Chetumal (Mexiko) Land. Nachdem er sich über der Halbinsel Yucatán abgeschwächt hatte, bewegte er sich in die Bucht von Campeche, wo er sich leicht verstärkte, bevor er am 29. September nahe Veracruz endgültig auf Land traf. Über Mexikos Bergland schwächte sich Janet schnell ab, bevor er sich am 30. September auflöste. In seiner Entwicklungsphase verursachte Janet Schäden in Höhe von 7,8 Millionen Dollar auf den Kleinen Antillen und 189 Todesopfer auf den Grenadinen und Barbados. Während Janet sich in der zentralen Karibik aufhielt, flog ein Aufklärungsflugzeug in den Sturm und ging mit der gesamten Besatzung verloren. Dies ist bis heute der einzige derartige Verlust, der sich im Zusammenhang mit einem Hurrikan im Atlantik ereignet hat. Als Janet bei seinem Landgang auf der Halbinsel Yucatán die Kategorie 5 erreichte, richtete er in Gebieten von Quintana Roo und Britisch-Honduras schwere Verwüstungen an. Im mexikanischen Chetumal blieben nach dem Sturm nur fünf Gebäude unversehrt, und im mexikanischen Bundesstaat Quintana Roo kamen schätzungsweise 500 Menschen ums Leben. Als Janets zweiter Sturm nahe Veracruz auf Land traf, kam es zu erheblichen Überschwemmungen, die die Auswirkungen der Hurrikane Gladys und Hilda zu Beginn des Monats noch verschlimmerten."
CW_Expansion_country.393.a:1 "OK"
CW_Expansion_news.393.t:0 "Hurrikan Janet trifft Mexiko"
CW_Expansion_news.393.d:0 "Hurrikan Janet war der stärkste tropische Wirbelsturm der atlantischen Hurrikansaison 1955 und einer der stärksten atlantischen Hurrikane seit Beginn der Aufzeichnungen. Janet war zudem der erste benannte Sturm, der 1.000 Todesopfer forderte, und der erste Sturm der Kategorie 5, dessen Name nicht mehr verwendet wurde. Als elfter tropischer Sturm, neunter Hurrikan und vierter schwerer Hurrikan des Jahres entstand Janet am 21. September aus einer tropischen Welle östlich der Kleinen Antillen. Auf seinem Weg westwärts über die Karibische See schwankte seine Intensität, verstärkte sich aber im Allgemeinen, bevor er als Hurrikan der Kategorie 5 mit Windgeschwindigkeiten von 282 km/h seine höchste Intensität erreichte. Mit dieser Stärke erreichte der heftige Hurrikan am 28. September nahe Chetumal (Mexiko) Land. Nachdem er sich über der Halbinsel Yucatán abgeschwächt hatte, bewegte er sich in die Bucht von Campeche, wo er sich leicht verstärkte, bevor er am 29. September nahe Veracruz endgültig auf Land traf. Über Mexikos Bergland schwächte sich Janet schnell ab, bevor er sich am 30. September auflöste. In seiner Entwicklungsphase verursachte Janet Schäden in Höhe von 7,8 Millionen Dollar auf den Kleinen Antillen und 189 Todesopfer auf den Grenadinen und Barbados. Während Janet sich in der zentralen Karibik aufhielt, flog ein Aufklärungsflugzeug in den Sturm und ging mit der gesamten Besatzung verloren. Dies ist bis heute der einzige derartige Verlust, der sich im Zusammenhang mit einem Hurrikan im Atlantik ereignet hat. Als Janet bei seinem Landgang auf der Halbinsel Yucatán die Kategorie 5 erreichte, richtete er in Gebieten von Quintana Roo und Britisch-Honduras schwere Verwüstungen an. Im mexikanischen Chetumal blieben nach dem Sturm nur fünf Gebäude unversehrt, und im mexikanischen Bundesstaat Quintana Roo kamen schätzungsweise 500 Menschen ums Leben. Als Janets zweiter Sturm nahe Veracruz auf Land traf, kam es zu erheblichen Überschwemmungen, die die Auswirkungen der Hurrikane Gladys und Hilda zu Beginn des Monats noch verschlimmerten."
