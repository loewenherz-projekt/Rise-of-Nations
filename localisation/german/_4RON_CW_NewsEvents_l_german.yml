CW_Expansion_country.460.t:0 "Revolution vom 14. Juli"
CW_Expansion_country.460.d:0 "Die Revolution vom 14. Juli, auch bekannt als der irakische Staatsstreich von 1958, fand am 14. Juli 1958 im Irak statt und führte zum Sturz der Haschemitischen Monarchie im Irak, die 1921 von König Faisal I. unter britischer Schirmherrschaft errichtet worden war. König Faisal II., Prinz Abd al-Ilah und Premierminister Nuri al-Said wurden vom Militär hingerichtet."
CW_Expansion_country.460.a:1 "OK"
