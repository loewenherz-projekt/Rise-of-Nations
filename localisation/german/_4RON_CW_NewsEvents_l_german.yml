CW_Expansion_country.451.t:0 "Ausweisung niederländischer Staatsbürger durch Indonesien"
CW_Expansion_country.451.d:0 "Während des politischen Konflikts um die „Neuguinea-Frage“ wurden niederländische Staatsbürger von der jungen Republik Indonesien zu unerwünschten Elementen erklärt und rund 20.000 weitere Menschen wanderten in die Niederlande aus."
