CW_Expansion_country.275.t:0 "Kollektivierung der Landwirtschaft in Ostdeutschland"
CW_Expansion_country.275.d:0 "In der Landwirtschaft Ostdeutschlands war die Kollektivierung privaten und staatlichen Ackerlandes die Weiterentwicklung einer Politik der Ernährungssicherheit (auf Kosten der bürgerlichen Großbauern). Sie begann in den Jahren der sowjetischen Besatzung (1945–1948) als Teil der Notwendigkeit, die Ressourcen im sowjetischen Sektor zu verwalten. Beginnend mit der Zwangsenteignung allen Landesbesitzes über 100 Hektar (250 Acres) wurde das Land in kleinen Paketen von etwa 5 bis 7 Hektar (12 bis 17 Acres) an ankommende landlose Flüchtlinge umverteilt, die aus ehemals deutschen Gebieten im Osten vertrieben worden waren. Diese Neubauern (Neubauern) erhielten eingeschränkte Eigentumsrechte an dem Land, d. h. sie behielten es, solange sie es bewirtschafteten. Anfang der 1950er Jahre wurden die verbleibenden Landwirte mit größeren Grundstücken (60 bis 80 Hektar) effektiv aus dem Geschäft gedrängt, indem man ihnen beispielsweise den Zugang zu gemeinsamen Maschinen verwehrte und Produktionsziele festlegte, die exponentiell mit der Größe des Landbesitzes anstiegen und ein Niveau erreichten, das nicht erreicht werden konnte."
CW_Expansion_country.275.a:1 "OK"
CW_Expansion_news.275.t:0 "Kollektivierung der Landwirtschaft in Ostdeutschland"
