CW_Expansion_country.338.t:0 "Alfredo Stroessner Coup"
CW_Expansion_country.338.d:0 "Der paraguayische Staatsstreich von 1954 ereignete sich im Mai 1954. Er wurde von Alfredo Stroessner mit Unterstützung von Epifanio Méndez Fleitas angeführt und führte zum Sturz der Regierung von Federico Chávez. Der Putsch war der Höhepunkt einer komplexen Reihe politischer Rivalitäten innerhalb der regierenden Colorado-Partei. Bei dem Putsch wurden etwa 25 Menschen getötet, was die Grundlage für die Wahl Stroessners zum Präsidenten Paraguays später im selben Jahr bildete."
CW_Expansion_country.338.a:1 "OK"
