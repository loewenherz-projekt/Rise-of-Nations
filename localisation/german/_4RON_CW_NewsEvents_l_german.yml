CW_Expansion_country.320.t:0 "Tangiwai-Katastrophe"
CW_Expansion_country.320.d:0 "Die Tangiwai-Katastrophe ereignete sich am 24. Dezember 1953 um 22:21 Uhr, als eine Eisenbahnbrücke über den Whangaehu-Fluss in Tangiwai auf der Nordinsel Neuseelands unter einem Schnellzug einstürzte. Die Lokomotive und die ersten sechs Waggons entgleisten und stürzten in den Fluss. 151 Menschen starben. Die anschließende Untersuchungskommission stellte fest, dass der Unfall durch den Zusammenbruch des Tephra-Damms verursacht wurde, der den Kratersee des nahegelegenen Mount Ruapehu zurückhielt. Dadurch entstand ein schneller Schlammstrom (Lahar) im Whangaehu-Fluss, der einen der Brückenpfeiler in Tangiwai zerstörte, nur wenige Minuten bevor der Zug die Brücke erreichte. Der Vulkan selbst war zu diesem Zeitpunkt nicht ausgebrochen. Die Katastrophe ist bis heute Neuseelands schwerster Eisenbahnunfall."
CW_Expansion_country.320.a:1 "OK"
