CW_Expansion_country.523.t:0 "Muhammad Ali gewinnt Goldmedaille im Boxen"
CW_Expansion_country.523.d:0 "Cassius Clay kam als relativ unbekannter 18-Jähriger zu den Olympischen Spielen 1960 in Rom. Er hatte eine beeindruckende Amateurkarriere vorzuweisen und galt als größte Hoffnung der USA auf eine Goldmedaille im Boxen. Doch wenig deutete darauf hin, dass seine vier Siege den Grundstein für eine Karriere als Boxweltmeister und Weltklasse-Aktivist und Philanthrop legen würden."
CW_Expansion_country.523.a:1 "OK"
