CW_Expansion_country.490.t:0 "Taifun Vera trifft Zentral-Honshu"
CW_Expansion_country.490.d:0 "Taifun Vera war der stärkste und tödlichste Sturm, der Japan je getroffen hat. Vera, auch bekannt als Taifun Isewan, bildete sich am 20. September 1959 und löste sich am 29. September 1959 auf. Der gewaltige Sturm (heute Kategorie 5) verwüstete Teile Japans und traf die Insel mit Windgeschwindigkeiten von bis zu 305 km/h. Vera forderte über 5.000 Todesopfer und verursachte Schäden in Höhe von 261 Millionen US-Dollar (1959)."
CW_Expansion_country.490.a:1 "OK"
