CW_Expansion_country.245.t:0 "Juan Peron wiedergewählt"
CW_Expansion_country.245.d:0 "Obwohl er nur eine symbolische Opposition der UCR und der Sozialistischen Partei hatte und seine beliebte Frau Eva nicht als Vizekandidatin aufstellen konnte, wurde Perón 1951 mit einem Vorsprung von über 30 % wiedergewählt. Diese Wahl war die erste, bei der argentinische Frauen das Wahlrecht erhielten, und die erste in Argentinien, die im Fernsehen übertragen wurde: Im Oktober desselben Jahres wurde Perón im öffentlich-rechtlichen Fernsehen von Kanal 7 vereidigt."
CW_Expansion_country.245.a:1 "OK"
CW_Expansion_news.245.t:0 "Juan Peron wiedergewählt"
CW_Expansion_news.245.d:0 "Obwohl er nur gegen eine symbolische Opposition der UCR und der Sozialistischen Partei antrat und seine beliebte Frau Eva nicht als Vizekandidatin aufstellen konnte, wurde Perón 1951 mit einem Vorsprung von über 30 % wiedergewählt. Diese Wahl war die erste, bei der argentinischen Frauen das Wahlrecht zuerkannt wurde, und die erste in Argentinien, die im Fernsehen übertragen wurde: Im Oktober desselben Jahres wurde Perón im öffentlich-rechtlichen Fernsehen von Kanal 7 vereidigt."
CW_Expansion_news.245.a:1 "OK"

CW_Expansion_country.247.t:0 "Das erste Kernkraftwerk der Welt"
CW_Expansion_country.247.d:0 "Der Experimental Breeder Reactor I (EBR-I) ist ein stillgelegter Forschungsreaktor und ein nationales historisches Wahrzeichen der USA in der Wüste, etwa 29 Kilometer südöstlich von Arco, Idaho. Er war der erste Brutreaktor der Welt. Am 20. Dezember 1951 um 13:50 Uhr wurde er zu einem der ersten Kernkraftwerke der Welt, das Strom erzeugte, als er genügend Strom produzierte, um vier 200-Watt-Glühbirnen zum Leuchten zu bringen. EBR-I erzeugte anschließend genügend Strom, um das Gebäude zu betreiben, und wurde bis zu seiner Stilllegung 1964 weiterhin für Versuchszwecke genutzt. Das Museum ist von Ende Mai bis Anfang September für Besucher geöffnet."
CW_Expansion_country.247.a:1 "OK"
