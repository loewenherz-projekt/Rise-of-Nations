CW_Expansion_country.474.t:0 "Knox-Minenkatastrophe"
CW_Expansion_country.474.d:0 "Das Knox-Minenunglück war ein Grubenunglück am 22. Januar 1959 in der River-Slope-Mine im Jenkins Township, Pennsylvania. Die Katastrophe ereignete sich, als Arbeiter ohne angemessene Sicherheitsvorkehrungen illegal unter dem Susquehanna River graben mussten. Dadurch entstand ein Loch im Flussbett, das den Fluss in die vielen miteinander verbundenen Grubenstollen im Wyoming Valley zwischen der Stadt Exeter am rechten Ufer (Westufer) und der Stadt Port Griffith am linken Ufer (Ostufer) im Jenkins Township nahe Pittston strömen ließ. Zwölf Bergleute kamen ums Leben. Das Stopfen des Lochs im Flussbett dauerte drei Tage. Die Sanierungsmaßnahmen schufen mehrere neue Inseln zwischen den beiden Städten und veränderten den westlichen Flusslauf des Susquehanna um diese herum."
CW_Expansion_country.474.a:1 "OK"
