CW_Expansion_country.387.t:0 "Hurrikan Diane trifft den Nordosten der USA"
CW_Expansion_country.387.d:0 "Am 17. August erreichte Diane die Küste North Carolinas in der Nähe von Wilmington. Der Druck bei Landung wurde auf 986 Millibar (29,1 inHg) geschätzt, begleitet von Winden knapp unter Orkanstärke. Diane traf den Bundesstaat nur fünf Tage, nachdem Hurrikan Connie die gleiche Gegend getroffen hatte."
