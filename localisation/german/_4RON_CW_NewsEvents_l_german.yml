#1954 Events
CW_Expansion_country.322.t:0 "Boac-Flug 781 zerfällt"
CW_Expansion_country.322.d:0 "BOAC-Flug 781 war ein Linienflug der British Overseas Airways Corporation (BOAC) von Singapur nach London. Am 10. Januar 1954 erlitt ein Passagierflugzeug vom Typ de Havilland Comet, das den Flug durchführte, in großer Höhe eine explosive Dekompression und stürzte ab. Alle 35 Menschen an Bord kamen ums Leben. Die Maschine mit der Kennung G-ALYP war kurz zuvor vom Flughafen Ciampino in Rom zum letzten Abschnitt ihres Fluges von Singapur zum Flughafen Heathrow in London gestartet. Nach der Explosion fielen die Trümmer der Explosion in der Nähe der Insel Elba vor der italienischen Küste ins Meer."
CW_Expansion_country.322.a:1 "OK"
