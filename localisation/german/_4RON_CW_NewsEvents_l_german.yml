CW_Expansion_country.109.t:0 "Schwarze Dahlie brutal ermordet aufgefunden"
CW_Expansion_country.109.d:0 "14.-15. Januar 1947), posthum als „Schwarze Dahlie“ bekannt, war eine Amerikanerin, die am 15. Januar 1947 ermordet im Stadtteil Leimert Park in Los Angeles aufgefunden wurde. Ihr Fall erregte aufgrund der grausamen Art des Verbrechens, zu dem auch die Verstümmelung ihrer Leiche gehörte, die in der Taille zweigeteilt war, große Aufmerksamkeit."
CW_Expansion_country.109.a:1 "OK"
