CW_Expansion_country.382.t:0 "Neuseeländischer SAS gegründet"
CW_Expansion_country.382.d:0 "Das „Eliteelement“ der neuseeländischen Streitkräfte, der New Zealand Special Air Service (NZSAS), wurde offiziell am 1. Mai 1955 gegründet, seine Anfänge lassen sich jedoch auf eine der ersten in Neuseeland operierenden „Elitetruppen“ zurückführen – die Forest Rangers."
