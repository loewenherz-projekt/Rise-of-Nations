CW_Expansion_country.195.t:0 "Florence Chadwick schwimmt durch den Ärmelkanal"
CW_Expansion_country.195.d:0 "Chadwick nahm schon in jungen Jahren an Schwimmwettbewerben teil und errang ihren ersten Sieg im Alter von zehn Jahren. Sie merkte jedoch, dass sie Wettkämpfe im Meer dem Schwimmen im Becken vorzog. Mit zehn Jahren war sie die jüngste Person, die die Mündung der San Diego Bay durchschwamm. Ab ihrem elften Lebensjahr nahm sie an Wildwasserwettbewerben teil und gewann innerhalb von 18 Jahren zehnmal das jährliche 2,5-Meilen-Rennen im Meer vor La Jolla. Mehrere Jahrzehnte lang nahm sie als Amateurin an Hochseerennen in Südkalifornien teil, doch ihr größter Wunsch war es, den Ärmelkanal zu durchschwimmen. 1950 versuchte sie, an einem vom Daily Mail gesponserten Kanalschwimmwettbewerb teilzunehmen, wurde jedoch mangels ausreichender Reputation abgelehnt. Sie beschloss, es auf eigene Kosten zu versuchen, scheiterte im Juli nach 14 Stunden im Wasser, schaffte es jedoch im August und leistete damit ihren bekanntesten Beitrag zur Schwimmgeschichte."
CW_Expansion_country.195.a:1 "OK"
