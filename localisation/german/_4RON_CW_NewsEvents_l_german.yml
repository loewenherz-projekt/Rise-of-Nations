CW_Expansion_country.136.t:0 "Massaker am Hadassah-Medizinkonvoi"
CW_Expansion_country.136.d:0 "Das Massaker am Hadassah-Konvoi ereignete sich am 13. April 1948, als ein von der Haganah-Miliz eskortierter Konvoi, der medizinische und militärische Vorräte sowie Personal zum Hadassah-Krankenhaus auf dem Skopusberg in Jerusalem brachte, von arabischen Streitkräften überfallen wurde. 78 jüdische Ärzte, Krankenschwestern, Studenten, Patienten, Fakultätsmitglieder und Haganah-Kämpfer sowie ein britischer Soldat wurden bei dem Angriff getötet, darunter 23 Frauen. Dutzende nicht identifizierte Leichen, bis zur Unkenntlichkeit verbrannt, wurden in einem Massengrab auf dem Sanhedria-Friedhof begraben. Die Jewish Agency behauptete, das Massaker sei ein schwerer Verstoß gegen das humanitäre Völkerrecht gewesen, und forderte Maßnahmen gegen diesen Verstoß gegen die Genfer Konventionen. Die Araber behaupteten, sie hätten eine militärische Formation angegriffen, alle Mitglieder des Konvois seien in Kampfhandlungen verwickelt gewesen und es sei unmöglich gewesen, Kombattanten von Zivilisten zu unterscheiden. Es wurde eine Untersuchung eingeleitet. Schließlich wurde eine Einigung erzielt, militärische von humanitären Konvois zu trennen."
CW_Expansion_country.136.a:1 "OK"
