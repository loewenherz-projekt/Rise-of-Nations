#1955 Events

CW_Expansion_country.367.t:0 "Schutz Taiwans"
CW_Expansion_country.367.d:0 "Die Formosa-Resolution von 1955 war eine gemeinsame Resolution des US-Senats, die am 29. Januar 1955 von US-Präsident [USA.GetLeader] unterzeichnet wurde, um der Bedrohung einer Invasion Taiwans (Republik China) durch die Volksrepublik China (VRC) entgegenzuwirken. Die Resolution ermächtigte den US-Präsidenten, „die Streitkräfte der Vereinigten Staaten nach eigenem Ermessen einzusetzen, um Formosa und die Pescadores vor bewaffneten Angriffen [der Kommunisten] zu schützen und zu sichern“."
CW_Expansion_country.367.a:1 "OK"
