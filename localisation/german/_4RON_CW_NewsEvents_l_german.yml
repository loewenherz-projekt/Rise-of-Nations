CW_Expansion_country.341.t:0 "Haager Übereinkommen zum Schutz von Kulturgut"
CW_Expansion_country.341.d:0 "Das Haager Übereinkommen von 1954 zielt darauf ab, Kulturgüter wie Denkmäler der Architektur, Kunst oder Geschichte, archäologische Stätten, Kunstwerke, Manuskripte, Bücher und andere Objekte von künstlerischem, historischem oder archäologischem Interesse sowie wissenschaftliche Sammlungen aller Art unabhängig von ihrer Herkunft oder ihrem Eigentum zu schützen."
