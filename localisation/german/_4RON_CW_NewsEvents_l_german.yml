CW_Expansion_country.207.t:0 "Gustav VI. Adolf zum König von Schweden gekrönt"
CW_Expansion_country.207.d:0 "Am 29. Oktober 1950 wurde Kronprinz Gustaf Adolf, wenige Tage vor seinem 68. Geburtstag, nach dem Tod seines Vaters, König Gustaf V., König. Er war zu dieser Zeit der älteste Thronfolger einer Monarchie weltweit. Sein persönliches Motto lautete „Plikten framför allt“ (Pflicht vor allem). Während der Herrschaft von Gustaf VI. Adolf wurde an einer neuen Regierungsform gearbeitet, die die Verfassung von 1809 ersetzen und zeitgemäße Reformen einführen sollte. Zu den von einigen Schweden angestrebten Reformen gehörte die Ablösung der Monarchie oder zumindest eine Abschwächung der Bestimmung der alten Verfassung, dass „der König allein das Reich regieren soll“. Gustaf VI. Adolfs persönliche Qualitäten machten ihn beim schwedischen Volk beliebt, und diese Beliebtheit führte wiederum zu einer starken öffentlichen Meinung zugunsten der Beibehaltung der Monarchie. Gustav VI. Adolfs Fachwissen und sein Interesse an einer Vielzahl von Fachgebieten (Architektur und Botanik sind nur zwei davon) verschafften ihm Respekt, ebenso wie sein ungezwungener und bescheidener Charakter und sein bewusster Verzicht auf Pomp. Obwohl die Monarchie seit der endgültigen Einführung der parlamentarischen Herrschaft im Jahr 1917 de facto dem Reichstag und den Ministern untergeordnet war, verfügte der König nominell noch immer über beträchtliche Machtreserven. Mit wenigen Ausnahmen war Gustav jedoch verpflichtet, den Ratschlägen der Minister zu folgen."
CW_Expansion_country.207.a:1 "OK"
CW_Expansion_news.207.t:0 "Gustav VI. Adolf zum König von Schweden gekrönt"
CW_Expansion_news.207.d:0 "Am 29. Oktober 1950 wurde Kronprinz Gustaf Adolf, wenige Tage vor seinem 68. Geburtstag, nach dem Tod seines Vaters, König Gustaf V., König. Er war zu dieser Zeit der älteste Thronfolger einer Monarchie weltweit. Sein persönliches Motto lautete „Plikten framför allt“ (Pflicht vor allem). Während der Herrschaft von Gustaf VI. Adolf wurde an einer neuen Regierungsform gearbeitet, die die Verfassung von 1809 ersetzen und zeitgemäße Reformen einführen sollte. Zu den von einigen Schweden angestrebten Reformen gehörte die Ablösung der Monarchie oder zumindest eine Abschwächung der Bestimmung der alten Verfassung, dass „der König allein das Reich regieren soll“. Gustaf VI. Adolfs persönliche Qualitäten machten ihn beim schwedischen Volk beliebt, und diese Beliebtheit führte wiederum zu einer starken öffentlichen Meinung zugunsten der Beibehaltung der Monarchie. Gustav VI. Adolfs Fachwissen und sein Interesse an einer Vielzahl von Fachgebieten (Architektur und Botanik sind nur zwei davon) verschafften ihm Respekt, ebenso wie sein ungezwungener und bescheidener Charakter und sein bewusster Verzicht auf Pomp. Obwohl die Monarchie seit der endgültigen Einführung der parlamentarischen Herrschaft im Jahr 1917 de facto dem Reichstag und den Ministern untergeordnet war, verfügte der König nominell noch immer über beträchtliche Machtreserven. Mit wenigen Ausnahmen war Gustav jedoch verpflichtet, den Ratschlägen der Minister zu folgen."
