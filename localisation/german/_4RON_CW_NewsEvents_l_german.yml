CW_Expansion_news.198.a:1 "OK"

CW_Expansion_country.199.t:0 "Gesetz zur Verteidigungsproduktion"
CW_Expansion_country.199.d:0 "Der Defense Production Act ist die wichtigste Quelle der präsidialen Machtbefugnisse, um die Versorgung der US-Industrie mit Materialien und Dienstleistungen, die zur Förderung der nationalen Verteidigung erforderlich sind, zu beschleunigen und auszuweiten."
