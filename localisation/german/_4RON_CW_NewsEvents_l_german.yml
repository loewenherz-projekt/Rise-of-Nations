CW_Expansion_country.526.t:0 "König Mahendra stürzt demokratische Regierung in Nepal"
CW_Expansion_country.526.d:0 "Mahendra übernahm die Macht, nachdem er die Regierung des Nepali Congress aufgelöst, alle Oppositionellen inhaftiert und einen autoritären Regimestil entwickelt hatte. Er betrachtete politische Parteien als antinationale Elemente und verbot sie vollständig zugunsten eines parteilosen Systems. Obwohl er sich selbst als Anhänger der Demokratie sah und das Panchayat-System für ein demokratisches Regime hielt, wurde dieser Anspruch von vielen abgelehnt. Er kritisierte und widersprach auch König Tribhuvans Entscheidung, eine Mehrparteiendemokratie und die Einrichtung einer verfassunggebenden Versammlung zu akzeptieren. Mahendra sagte einmal: „Die Verfassung wird vom König gegeben. Sie soll nicht vom Volk gemacht werden.“"
CW_Expansion_country.526.a:1 "OK"
CW_Expansion_news.526.t:0 "König Mahendra stürzt demokratische Regierung in Nepal"
CW_Expansion_news.526.d:0 "Mahendra übernahm die Macht, nachdem er die Regierung des Nepali Congress aufgelöst, alle Oppositionellen inhaftiert und einen autoritären Regimestil entwickelt hatte. Er betrachtete politische Parteien als antinationale Elemente und verbot sie vollständig zugunsten eines parteilosen Systems. Obwohl er sich selbst als Anhänger der Demokratie sah und das Panchayat-System für ein demokratisches Regime hielt, wurde dieser Anspruch von vielen abgelehnt. Er kritisierte und widersprach auch König Tribhuvans Entscheidung, eine Mehrparteiendemokratie und die Einrichtung einer verfassunggebenden Versammlung zu akzeptieren. Mahendra sagte einmal: „Die Verfassung wird vom König gegeben. Sie soll nicht vom Volk gemacht werden.“"
CW_Expansion_news.526.a:1 "OK"

CW_Expansion_country.528.t:0 "Kollisionen in der Luft in New York"
CW_Expansion_country.528.d:0 "Am Freitag, dem 16. Dezember 1960, kollidierte eine Douglas DC-8 der United Airlines auf dem Weg zum Idlewild Airport (heute John F. Kennedy International Airport) in New York City in der Luft mit einer Lockheed L-1049 Super Constellation der TWA, die sich im Sinkflug auf den LaGuardia Airport befand. Die Constellation stürzte auf dem Miller Field in Staten Island ab, die DC-8 in Park Slope, Brooklyn. Alle 128 Insassen der beiden Maschinen und sechs Menschen am Boden kamen ums Leben. Der Unfall war zu dieser Zeit die weltweit tödlichste Flugkatastrophe."
CW_Expansion_country.528.a:1 "OK"
CW_Expansion_news.528.t:0 "Kollisionen in der Luft in New York"
CW_Expansion_news.528.d:0 "Am Freitag, dem 16. Dezember 1960, kollidierte eine Douglas DC-8 der United Airlines auf dem Weg zum Idlewild Airport (heute John F. Kennedy International Airport) in New York City in der Luft mit einer Lockheed L-1049 Super Constellation der TWA, die sich im Sinkflug auf den LaGuardia Airport befand. Die Constellation stürzte auf dem Miller Field in Staten Island ab, die DC-8 in Park Slope, Brooklyn. Alle 128 Insassen der beiden Maschinen und sechs Menschen am Boden kamen ums Leben. Der Unfall war zu dieser Zeit die weltweit tödlichste Flugkatastrophe."
CW_Expansion_news.528.a:1 "OK"

 CW_Expansion_news.529.t:0 "Der Tod von Georgi Dimitrov"
 CW_Expansion_news.529.d:0 "Am 2. Juli 1949 erlitten sowohl die Volksrepublik Bulgarien als auch die kommunistische Revolution einen schweren Verlust: Georgi Dimitrow, der erste Generalsekretär des kommunistischen Bulgariens und einer der einflussreichsten Theoretiker der Weltrevolution, Vater der dimitrowistischen Volksfront, die zur Enthauptung des faschistischen Adlers beitrug, starb eines natürlichen Todes. Ein großes Begräbnis wurde organisiert, um die Wertschätzung des Volkes für diesen überzeugten, unermüdlichen Revolutionär zu zeigen. In der Hitze spekulieren einige, dass er aufgrund seines sich rapide verschlechternden Gesundheitszustands vergiftet wurde, obwohl es dafür keine eindeutigen Beweise gibt."
 CW_Expansion_news.529.a:0 "Ein großer Verlust für die Revolution"
 CW_Expansion_news.529.b:0 "Ein Kommunist weniger, um den man sich Sorgen machen muss"

#End of 1960 Events


