#1952 Events
CW_Expansion_country.250.t:0 "Schwarzer Samstag in Ägypten"
CW_Expansion_country.250.d:0 "Der Brand von Kairo, auch als „Schwarzer Samstag“ bekannt, war eine Reihe von Unruhen, die am 26. Januar 1952 stattfanden und durch das Niederbrennen und Plündern von etwa 750 Gebäuden – Einzelhandelsgeschäften, Cafés, Kinos, Hotels, Restaurants, Theatern, Nachtclubs und der Casino-Oper der Stadt – in der Innenstadt von Kairo gekennzeichnet waren."
