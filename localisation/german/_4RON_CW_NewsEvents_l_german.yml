CW_Expansion_country.412.t:0 "Kollisionen in der Luft im Grand Canyon"
CW_Expansion_country.412.d:0 "Die Kollision im Grand Canyon ereignete sich am Samstag, dem 30. Juni 1956, im Westen der USA, als eine Douglas DC-7 der United Airlines über dem Grand Canyon Nationalpark in Arizona mit einer Lockheed L-1049 Super Constellation der Trans World Airlines kollidierte. Alle 128 Insassen beider Maschinen kamen ums Leben. Damit war es der erste Verkehrsunfall mit über hundert Todesopfern. Die Maschinen waren im Abstand von wenigen Minuten vom Los Angeles International Airport nach Chicago bzw. Kansas City gestartet. Die Kollision ereignete sich in unkontrolliertem Luftraum, in dem die Piloten für die Einhaltung des Abstands („Sehen und gesehen werden“) verantwortlich waren. Dies verdeutlichte den veralteten Zustand der Flugsicherung, der in den Fokus umfassender Luftfahrtreformen rückte."
CW_Expansion_country.412.a:1 "OK"
