CW_Expansion_country.179.t:0 "Ägypten fordert britischen Truppenabzug aus Suez"
CW_Expansion_country.179.d:0 "Der Suezkanal wurde in Ägypten unter der Leitung des französischen Diplomaten Ferdinand de Lesseps erbaut. Die künstliche Wasserstraße wurde 1869 nach zehnjähriger Bauzeit eröffnet und trennt den größten Teil Ägyptens von der Sinai-Halbinsel. Mit einer Länge von 193 Kilometern verbindet er das Mittelmeer über das Rote Meer mit dem Indischen Ozean und ermöglicht so einen direkteren Warentransport von Europa nach Asien und zurück. Seine Bedeutung für den internationalen Handel machte ihn fast sofort zu einem Konfliktherd zwischen Ägyptens Nachbarn – und den um die Vorherrschaft ringenden Supermächten des Kalten Krieges."
CW_Expansion_country.179.a:1 "OK"
