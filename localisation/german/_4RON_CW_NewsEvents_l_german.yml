CW_Expansion_country.326.t:0 "Nasser wird Premierminister von Ägypten"
CW_Expansion_country.326.d:0 "Gamal Abdel Nasser wurde im Februar 1954 zum ersten Mal Premierminister. Von November 1954 bis zu seiner Ernennung zum ägyptischen Präsidenten im Jahr 1956 war er Vorsitzender des Revolutionären Kommandorats und blieb bis zu seinem Tod im Jahr 1970 Präsident."
