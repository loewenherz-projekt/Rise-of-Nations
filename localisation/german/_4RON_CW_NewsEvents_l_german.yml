CW_Expansion_country.251.t:0 "Prinzessin Elizabeth wird Königin von England"
CW_Expansion_country.251.d:0 "Am 6. Februar 1952 stirbt König Georg VI. von Großbritannien und Nordirland nach langer Krankheit im Schlaf auf dem königlichen Anwesen in Sandringham. Prinzessin Elizabeth, die ältere der beiden Töchter des Königs und seine nächste Thronfolgerin, befand sich zum Zeitpunkt des Todes ihres Vaters in Kenia. Am 2. Juni 1953 wurde sie im Alter von 27 Jahren offiziell zur Königin Elizabeth II. gekrönt."
CW_Expansion_country.251.a:1 "OK"
