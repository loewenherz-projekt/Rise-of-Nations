ron_decolonizationdiplo.28.b:1 "Werde ein Staat"
ron_decolonizationdiplo.28.c:1 "Werde ein Protektorat"

ron_decolonizationdiplo.30.t:0 "Schaffung einer Nationalmiliz"
ron_decolonizationdiplo.30.d:0 "Wenn wir unsere Unabhängigkeit sichern wollen, müssen wir eine Armee aufbauen."
ron_decolonizationdiplo.30.a:1 "Erstellen Sie es"
ron_decolonizationdiplo.30.b:1 "Erstellen Sie es"
ron_decolonizationdiplo.30.c:1 "Erstellen Sie es"
