ron_decolonizationcountry.x.b:1 "Fordern Sie ihre Unterwerfung"

ron_decolonizationcountry.1.t:0 "Panama erklärt seine Unabhängigkeit"
ron_decolonizationcountry.1.d:0 "Mit Unterstützung der US-Regierung erklärt Panama seine Unabhängigkeit von Kolumbien. Die Revolution wurde von einer panamaischen Fraktion initiiert, die von der Panama Canal Company unterstützt wurde, einem französisch-amerikanischen Unternehmen, das den Atlantik und den Pazifik durch eine Wasserstraße über den Isthmus von Panama verbinden wollte. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.1.a:1 "Akzeptieren"
ron_decolonizationcountry.1.b:1 "Zerschmettere sie"

ron_decolonizationcountry.2.t:0 "Norwegen erklärt seine Unabhängigkeit"
ron_decolonizationcountry.2.d:0 "Die Auflösung der Union zwischen den Königreichen Norwegen und Schweden unter dem Haus Bernadotte wurde durch eine Resolution des norwegischen Parlaments (Storting) am 7. Juni 1905 eingeleitet. Nach einigen Monaten der Spannungen und Kriegsangst zwischen den benachbarten Königreichen – und einer norwegischen Volksabstimmung am 13. August, die mit überwältigender Mehrheit für die Auflösung stimmte – führten Verhandlungen zwischen den beiden Regierungen am 26. Oktober 1905 dazu, dass Schweden Norwegen als unabhängige konstitutionelle Monarchie anerkannte. An diesem Tag verzichtete König Oskar II. auf seinen Anspruch auf den norwegischen Thron, womit die Vereinigten Königreiche Schweden und Norwegen de facto aufgelöst wurden. Kurz darauf, am 18. November, bestieg Prinz Carl von Dänemark, der den Namen Haakon VII. annahm, den norwegischen Thron. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.2.a:1 "Akzeptieren"
ron_decolonizationcountry.2.b:1 "Zerschmettere sie"

ron_decolonizationcountry.3.t:0 "Bulgarien erklärt seine Unabhängigkeit"
ron_decolonizationcountry.3.d:0 "Das Chaos, das nach der Jungtürkischen Revolution von 1908 im Osmanischen Reich ausbrach, bot günstige Bedingungen für die bulgarische Unabhängigkeitserklärung. Viele Großmächte hatten ihre Unterstützung für die Osmanen aufgegeben und suchten stattdessen nach Gebietsgewinnen. Österreich-Ungarn hoffte auf die Annexion des bosnischen Vilâyet, Großbritannien strebte die Eroberung der arabischen Gebiete des Reiches im Osten an und das Hauptziel des Russischen Reiches war die Kontrolle über die türkischen Meerengen. Bei einem Treffen im September 1908 in Buchlov unterstützten die Gesandten Österreich-Ungarns und Russlands gegenseitig ihre Pläne und kamen überein, die wahrscheinliche Unabhängigkeitserklärung Bulgariens nicht zu behindern. Mitte September entschied die demokratische Regierung von Alexander Malinow, dass der geeignete Zeitpunkt gekommen sei. Am 4. Oktober 1908 traf Ferdinand von einem Urlaub in seinem ungarischen Herrenhaus in Russe ein. Dort wurde er von der Regierung erwartet, um an Bord des Schiffes Krum die endgültige Entscheidung zu besprechen. Anschließend fuhr die Delegation mit dem Zug nach Tarnowo, wo die offizielle Proklamation stattfinden sollte. Neueren Forschungen zufolge wurde das Unabhängigkeitsmanifest am 5. Oktober 1908 am Bahnhof Dve Mogili fertiggestellt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.3.a:1 "Akzeptieren"
ron_decolonizationcountry.3.b:1 "Zerschmettere sie"

ron_decolonizationcountry.4.t:0 "Mongolische Revolution"
ron_decolonizationcountry.4.d:0 "Die Mongolische Revolution von 1911 ereignete sich, als die Region der Äußeren Mongolei während der Xinhai-Revolution ihre Unabhängigkeit von der von den Mandschu geführten Qing-Dynastie erklärte. Eine Kombination von Faktoren, darunter wirtschaftliche Not und mangelnder Widerstand gegen den westlichen Imperialismus, führte dazu, dass viele Chinesen mit der Qing-Regierung unzufrieden waren. Als ein neues Programm zur Kolonisierung der Mongolei mit Han-Chinesen und zur Assimilation der Einheimischen vorgestellt wurde, stieß es auf Widerstand, der zu einer relativ unblutigen Trennung vom Qing-Reich führte. Viele Stammesfürsten der Barga und der Inneren Mongolei unterstützten die Revolution und wurden zu deren Anführern. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.4.a:1 "Akzeptieren"
ron_decolonizationcountry.4.b:1 "Zerschmettere sie"

ron_decolonizationcountry.5.t:0 "Albanische Unabhängigkeitserklärung"
ron_decolonizationcountry.5.d:0 "Die albanische Unabhängigkeitserklärung war die Unabhängigkeitserklärung Albaniens vom Osmanischen Reich. Das unabhängige Albanien wurde am 28. November 1912 in Vlora ausgerufen. Sechs Tage später bildete die Versammlung von Vlora die erste Regierung Albaniens, die von Ismail Qemali und dem Ältestenrat (Pleqnia) geführt wurde. Der Erfolg des albanischen Aufstands von 1912 war ein starkes Signal an die Nachbarländer, dass das Osmanische Reich schwach war. Das Königreich Serbien lehnte den Plan für ein albanisches Vilâyet ab und bevorzugte eine Aufteilung des europäischen Territoriums des Osmanischen Reiches unter den vier Balkanalliierten. Die Balkanalliierten planten die Aufteilung des europäischen Territoriums des Osmanischen Reiches unter sich und in der Zwischenzeit wurde vereinbart, dass den im Ersten Balkankrieg eroberten Gebieten der Status eines Kondominiums zugesprochen wird. Aus diesem Grund organisierte Ismail Qemali einen Allalbanischen Kongress in Vlora. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.5.a:1 "Akzeptieren"
ron_decolonizationcountry.5.b:1 "Zerschmettere sie"

ron_decolonizationcountry.6.t:0 "Anglo-Irischer Vertrag"
ron_decolonizationcountry.6.d:0 "Der Anglo-Irische Vertrag von 1921, allgemein bekannt als „Der Vertrag“ und offiziell als „Artikel des Abkommens für einen Vertrag zwischen Großbritannien und Irland“, war ein Abkommen zwischen der Regierung des Vereinigten Königreichs Großbritannien und Irland und Vertretern der Irischen Republik, das den Irischen Unabhängigkeitskrieg beendete. Es sah die Gründung des Irischen Freistaats innerhalb eines Jahres als selbstverwaltetes Dominion innerhalb der als Britisches Empire bekannten Völkergemeinschaft vor, ein Status, der dem des Dominion Kanada entsprach. Es bot Nordirland, das durch den Government of Ireland Act von 1920 geschaffen worden war, außerdem die Möglichkeit, aus dem Irischen Freistaat auszutreten, und nutzte diese Möglichkeit auch. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.6.a:1 "Akzeptieren"
ron_decolonizationcountry.6.b:1 "Zerschmettere sie"

ron_decolonizationcountry.7.t:0 "Finnische Unabhängigkeitserklärung"
ron_decolonizationcountry.7.d:0 "Die finnische Unabhängigkeitserklärung wurde am 6. Dezember 1917 vom finnischen Parlament verabschiedet. Sie erklärte Finnland zu einem unabhängigen Staat und beendete seine Autonomie innerhalb Russlands als Großfürstentum Finnland. Gleichzeitig wurde dem Parlament ein Gesetzentwurf vorgelegt, der Finnland stattdessen zu einer unabhängigen Republik machen sollte. Die Unabhängigkeitserklärung war nur ein Teil des langen Prozesses, der zur Unabhängigkeit Finnlands führte. Die Erklärung wird in Finnland als Unabhängigkeitstag gefeiert. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.7.a:1 "Akzeptieren"
ron_decolonizationcountry.7.b:1 "Zerschmettere sie"

ron_decolonizationcountry.8.t:0 "Armenische Unabhängigkeitserklärung"
ron_decolonizationcountry.8.d:0 "Angesichts des völligen politischen Zusammenbruchs des Transkaukasus und der neuen Situation, die durch die Unabhängigkeitserklärung Georgiens und Aserbaidschans entstanden ist, erklärt sich der Armenische Nationalrat zur obersten und alleinigen Verwaltung der armenischen Provinzen. Aufgrund bestimmter schwerwiegender Umstände, die uns an der Bildung einer armenischen Nationalregierung hindern, übernimmt der Armenische Nationalrat vorübergehend alle Regierungsfunktionen, um die politische und administrative Führung der armenischen Provinzen zu übernehmen. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.8.a:1 "Akzeptieren"
ron_decolonizationcountry.8.b:1 "Zerschmettere sie"

ron_decolonizationcountry.9.t:0 "Unabhängigkeitserklärung Aserbaidschans"
ron_decolonizationcountry.9.d:0 "Die Unabhängigkeitserklärung Aserbaidschans ist die Unabhängigkeitserklärung der Demokratischen Republik Aserbaidschan vom Russischen Reich. Aserbaidschan wurde am 28. Mai 1918 in Tiflis für unabhängig erklärt. Die Demokratische Republik Aserbaidschan wurde am 28. Mai 1918 vom Aserbaidschanischen Nationalrat in Tiflis gegründet, nachdem das Russische Reich infolge der Russischen Revolution von 1917 zusammengebrochen war. Die muslimische Vertretung im nicht mehr bestehenden Transkaukasischen Seim hatte sich zum Aserbaidschanischen Nationalrat konstituiert und am 28. Mai 1918 die Geburt einer neuen Nation verkündet. Aserbaidschan, bislang nur ein geografischer Bezugspunkt, wurde nun zum Staatsnamen, und rund zwei Millionen Menschen, die als Tataren, transkaukasische Muslime und kaukasische Türken bezeichnet wurden, wurden offiziell zu Aserbaidschanern. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.9.a:1 "Akzeptieren"
ron_decolonizationcountry.9.b:1 "Zerschmettere sie"

ron_decolonizationcountry.11.t:0 "Estland erklärt seine Unabhängigkeit"
ron_decolonizationcountry.11.d:0 "Die estnische Unabhängigkeitserklärung, auch bekannt als Manifest an die Völker Estlands (estnisch Manifest Eestimaa rahvastele), ist die Gründungsurkunde der Republik Estland aus dem Jahr 1918. Sie wird am 24. Februar, dem estnischen Nationalfeiertag bzw. Unabhängigkeitstag, gefeiert. Die Erklärung wurde vom Rettungskomitee verfasst, das von den Ältesten der estnischen Provinzversammlung gewählt wurde. Ursprünglich sollte sie am 21. Februar 1918 verkündet werden, doch die Verkündung verzögerte sich bis zum Abend des 23. Februar. An diesem Tag wurde das Manifest gedruckt und in Pärnu öffentlich verlesen. Am nächsten Tag, dem 24. Februar, wurde das Manifest gedruckt und in der Hauptstadt Tallinn verteilt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.11.a:1 "Akzeptieren"
ron_decolonizationcountry.11.b:1 "Zerschmettere sie"

ron_decolonizationcountry.12.t:0 "Georgien erklärt seine Unabhängigkeit"
ron_decolonizationcountry.12.d:0 "In den chaotischen Nachwirkungen der Russischen Revolution von 1917 erklärte sich Georgien, das seit dem frühen 19. Jahrhundert Teil des Russischen Reiches war, am 26. Mai 1918 zu einer unabhängigen Demokratischen Republik, nachdem es zuvor eine kurze und lockere föderale Union mit den südkaukasischen Nachbarländern Armenien und Aserbaidschan geschlossen hatte. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.12.a:1 "Akzeptieren"
ron_decolonizationcountry.12.b:1 "Zerschmettere sie"

ron_decolonizationcountry.13.t:0 "Lettland erklärt seine Unabhängigkeit"
ron_decolonizationcountry.13.d:0 "Am 18. November 1918 proklamierte der Volksrat Lettlands die Unabhängigkeit der Republik Lettland und setzte die lettische provisorische Regierung unter Kārlis Ulmanis ein. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.13.a:1 "Akzeptieren"
ron_decolonizationcountry.13.b:1 "Zerschmettere sie"

ron_decolonizationcountry.14.t:0 "Unabhängigkeitsakt Litauens"
ron_decolonizationcountry.14.d:0 "Die Akte zur Wiederherstellung der Unabhängigkeit Litauens (Akte vom 16. Februar) wurde am 16. Februar 1918 vom litauischen Rat unterzeichnet und proklamierte die Wiederherstellung eines unabhängigen, nach demokratischen Prinzipien regierten Staates Litauen mit Vilnius als Hauptstadt. Die Akte wurde von allen zwanzig Vertretern des Rates unterzeichnet, dessen Vorsitz Jonas Basanavičius innehatte. Die Akte vom 16. Februar war das Ergebnis einer Reihe von Resolutionen zu diesem Thema, darunter eine der Vilnius-Konferenz und die Akte vom 8. Januar. Der Weg zur Akte war lang und komplex, da das Deutsche Reich Druck auf den Rat ausübte, ein Bündnis zu schließen. Der Rat musste sorgfältig zwischen den Deutschen, deren Truppen in Litauen präsent waren, und den Forderungen des litauischen Volkes manövrieren. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.14.a:1 "Akzeptieren"
ron_decolonizationcountry.14.b:1 "Zerschmettere sie"

ron_decolonizationcountry.15.t:0 "Polen erklärt seine Unabhängigkeit"
ron_decolonizationcountry.15.d:0 "Die Zweite Polnische Republik war von 1919 bis 1926 eine parlamentarische Demokratie, in der der Präsident nur begrenzte Machtbefugnisse hatte. Er wurde vom Parlament gewählt, und mit Zustimmung des Sejm (Unterhauses) konnte er den Premierminister und die Regierung ernennen. Den Sejm konnte er jedoch nur mit Zustimmung des Senats auflösen. Seine Befugnisse, Dekrete zu erlassen, waren zudem dadurch eingeschränkt, dass der Premierminister und der zuständige Minister seine Dekrete mit ihrer Unterschrift bestätigen mussten. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.15.a:1 "Akzeptieren"
ron_decolonizationcountry.15.b:1 "Zerschmettere sie"

ron_decolonizationcountry.16.t:0 "Afghanistan erklärt seine Unabhängigkeit"
ron_decolonizationcountry.16.d:0 "Der Zweite Anglo-Afghanische Krieg (1878–1880) führte zunächst zur Niederlage Großbritanniens, dann zum Sieg in der Schlacht von Kandahar. Dieser führte zur Ernennung Abdur Rahman Khans zum neuen Emir und zum Beginn freundschaftlicher britisch-afghanischer Beziehungen. Die Briten erhielten die Kontrolle über die afghanischen Außenpolitik im Austausch für Schutz vor den Russen und Persern. Der Dritte Anglo-Afghanische Krieg 1919 führte dazu, dass die Briten 1921 die Kontrolle über die afghanischen Außenpolitik endgültig aufgaben. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.16.a:1 "Akzeptieren"
ron_decolonizationcountry.16.b:1 "Zerschmettere sie"

ron_decolonizationcountry.18.t:0 "Die Ukraine erklärt ihre Unabhängigkeit"
ron_decolonizationcountry.18.d:0 "Kurz nachdem die Bolschewiki im November 1917 die Kontrolle über das riesige, unruhige Russland übernahmen und Friedensverhandlungen mit den Mittelmächten begannen, erklärte der ehemalige russische Staat Ukraine seine völlige Unabhängigkeit. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.18.a:1 "Akzeptieren"
ron_decolonizationcountry.18.b:1 "Zerschmettere sie"

ron_decolonizationcountry.19.t:0 "Einseitige Unabhängigkeitserklärung Ägyptens"
ron_decolonizationcountry.19.d:0 "Die einseitige Unabhängigkeitserklärung Ägyptens wurde am 28. Februar 1922 von der Regierung des Vereinigten Königreichs Großbritannien und Irland herausgegeben. Mit dieser Erklärung beendete die britische Regierung einseitig ihr Protektorat über Ägypten und gewährte dem Land nominelle Unabhängigkeit mit Ausnahme von vier „reservierten“ Bereichen: Außenbeziehungen, Kommunikation, Militär und der anglo-ägyptische Sudan."
ron_decolonizationcountry.19.a:1 "Akzeptieren"

ron_decolonizationcountry.21.t:0 "Der Irak erklärt seine Unabhängigkeit"
ron_decolonizationcountry.21.d:0 "Mit der Aufnahme des Irak in den Völkerbund beendet Großbritannien sein Mandat über das arabische Land und macht den Irak nach 17 Jahren britischer und jahrhundertelanger osmanischer Herrschaft unabhängig. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.21.a:1 "Akzeptieren"
ron_decolonizationcountry.21.b:1 "Zerschmettere sie"

ron_decolonizationcountry.22.t:0 "Der Libanon erklärt seine Unabhängigkeit"
ron_decolonizationcountry.22.d:0 "Nördlich von Israel und westlich von Syrien, am Mittelmeer, liegt der Libanon, ein Land mit vier Millionen Einwohnern und einer Fläche, die nicht einmal drei Viertel der Fläche Connecticuts beträgt. Gäbe es friedlichere Bedingungen, wäre es sicherlich ein Anziehungspunkt für Historiker und Archäologen, die die Überreste der Zivilisationen erforschen möchten, die vor 4.000 Jahren in diesem Gebiet entstanden. Doch seine Geschichte ist komplizierter. Seit dem letzten Jahrzehnt des 16. Jahrhunderts Teil des Osmanischen Reiches, wurde es nach dem Ersten Weltkrieg französisches Mandatsgebiet. Die französische Herrschaft dauerte nur bis zum Zweiten Weltkrieg. Am heutigen Tag, dem 22. November 1943, nutzte der Libanon die französische Besatzung durch Deutschland und erklärte seine Unabhängigkeit. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.22.a:1 "Akzeptieren"
ron_decolonizationcountry.22.b:1 "Zerschmettere sie"

ron_decolonizationcountry.23.t:0 "Marokko erklärt seine Unabhängigkeit"
ron_decolonizationcountry.23.d:0 "Ende 1955, mitten in der sogenannten Revolution des Königs und des Volkes, verhandelte Sultan Mohammed V. erfolgreich die schrittweise Wiederherstellung der marokkanischen Unabhängigkeit im Rahmen der französisch-marokkanischen Interdependenz. Der Sultan stimmte Reformen zu, die Marokko in eine konstitutionelle Monarchie mit demokratischer Regierungsform umwandeln sollten. Im Februar 1956 erhielt Marokko eine begrenzte Selbstverwaltung. Weitere Verhandlungen über die vollständige Unabhängigkeit gipfelten im französisch-marokkanischen Abkommen, das am 2. März 1956 in Paris unterzeichnet wurde. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.23.a:1 "Akzeptieren"
ron_decolonizationcountry.23.b:1 "Zerschmettere sie"

ron_decolonizationcountry.25.t:0 "Island erklärt seine Unabhängigkeit"
ron_decolonizationcountry.25.d:0 "Vom 20. bis 23. Mai 1944 fand in Island ein zweiteiliges Referendum statt. Die Wähler wurden gefragt, ob die Union mit Dänemark aufgelöst und eine neue republikanische Verfassung angenommen werden sollte. Beide Maßnahmen wurden mit jeweils über 98 % angenommen. Die Wahlbeteiligung lag insgesamt bei 98,4 % und in zwei Wahlkreisen, Seyðisfirði und Vestur-Skaftafjellssýsla, bei 100 %. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.25.a:1 "Akzeptieren"
ron_decolonizationcountry.25.b:1 "Zerschmettere sie"

ron_decolonizationcountry.26.t:0 "Proklamation der indonesischen Unabhängigkeit"
ron_decolonizationcountry.26.d:0 "Die Unabhängigkeitserklärung Indonesiens wurde am Freitag, dem 17. August 1945, um 10:00 Uhr morgens verlesen. Die Erklärung markierte den Beginn des diplomatischen und bewaffneten Widerstands der Indonesischen Nationalrevolution gegen die niederländischen Streitkräfte und pro-niederländische Zivilisten, bis diese 1949 Indonesiens Unabhängigkeit offiziell anerkannten. Das Dokument wurde von Sukarno und Mohammad Hatta unterzeichnet, die am folgenden Tag zum Präsidenten bzw. Vizepräsidenten ernannt wurden. Der Tag der Unabhängigkeitserklärung Indonesiens wurde per Regierungserlass vom 18. Juni 1946 zum gesetzlichen Feiertag erklärt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.26.a:1 "Akzeptieren"
ron_decolonizationcountry.26.b:1 "Zerschmettere sie"

ron_decolonizationcountry.27.t:0 "Nordkorea erklärt seine Unabhängigkeit"
ron_decolonizationcountry.27.d:0 "1910 wurde Korea vom Kaiserreich Japan annektiert. Nach der japanischen Kapitulation am Ende des Zweiten Weltkriegs 1945 wurde Korea in zwei Zonen geteilt: den Norden besetzte die Sowjetunion, den Süden die USA. Verhandlungen über eine Wiedervereinigung scheiterten, und 1948 wurden getrennte Regierungen gebildet: die sozialistische Demokratische Volksrepublik Korea im Norden und die kapitalistische Republik Korea im Süden. Eine von Nordkorea initiierte Invasion führte zum Koreakrieg (1950–1953). Das koreanische Waffenstillstandsabkommen brachte einen Waffenstillstand, aber kein Friedensvertrag wurde unterzeichnet. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.27.a:1 "Akzeptieren"
ron_decolonizationcountry.27.b:1 "Zerschmettere sie"

ron_decolonizationcountry.28.t:0 "Südkorea erklärt seine Unabhängigkeit"
ron_decolonizationcountry.28.d:0 "1910 wurde Korea vom Kaiserreich Japan annektiert. Nach der japanischen Kapitulation am Ende des Zweiten Weltkriegs 1945 wurde Korea in zwei Zonen geteilt: den Norden besetzte die Sowjetunion, den Süden die USA. Verhandlungen über eine Wiedervereinigung scheiterten, und 1948 wurden getrennte Regierungen gebildet: die sozialistische Demokratische Volksrepublik Korea im Norden und die kapitalistische Republik Korea im Süden. Eine von Nordkorea initiierte Invasion führte zum Koreakrieg (1950–1953). Das koreanische Waffenstillstandsabkommen brachte einen Waffenstillstand, aber kein Friedensvertrag wurde unterzeichnet. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.28.a:1 "Akzeptieren"
ron_decolonizationcountry.28.b:1 "Zerschmettere sie"

ron_decolonizationcountry.29.t:0 "Vietnam erklärt seine Unabhängigkeit"
ron_decolonizationcountry.29.d:0 "Nur wenige Stunden nach der Kapitulation Japans im Zweiten Weltkrieg verkündete der vietnamesische Kommunist Ho Chi Minh die Unabhängigkeit Vietnams von Frankreich. Die Proklamation paraphrasierte die US-amerikanische Unabhängigkeitserklärung mit den Worten: „Alle Menschen sind gleich geboren – der Schöpfer hat uns unverletzliche Rechte, Leben, Freiheit und Glück geschenkt!“ Eine riesige Menschenmenge auf dem Ba-Dinh-Platz in Hanoi jubelte. Es sollte jedoch 30 Jahre dauern, bis Hos Traum von einem vereinten, kommunistischen Vietnam Wirklichkeit wurde. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.29.a:1 "Akzeptieren"
ron_decolonizationcountry.29.b:1 "Zerschmettere sie"

ron_decolonizationcountry.30.t:0 "Jordanien erklärt seine Unabhängigkeit"
ron_decolonizationcountry.30.d:0 "Am 25. Mai 1923 erkannten die Briten die Unabhängigkeit Transjordaniens unter der Herrschaft von Emir ʿAbdullāh an. Ein Vertrag und die Verfassung von 1928 legten jedoch fest, dass Finanz-, Militär- und Außenpolitik weiterhin in den Händen eines britischen „Residenten“ verbleiben sollten. Nach dem Zweiten Weltkrieg wurde Transjordanien schließlich durch einen am 22. März 1946 in London geschlossenen Vertrag vollständig unabhängig, und ʿAbdullāh proklamierte sich anschließend selbst zum König. Eine neue Verfassung wurde verkündet, und 1949 wurde der Staat in „Haschimitisches Königreich Jordanien“ umbenannt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.30.a:1 "Akzeptieren"
ron_decolonizationcountry.30.b:1 "Zerschmettere sie"

ron_decolonizationcountry.31.t:0 "Syrien erklärt seine Unabhängigkeit"
ron_decolonizationcountry.31.d:0 "1936 handelten Frankreich und Syrien einen Unabhängigkeitsvertrag aus, der Syrien seine Unabhängigkeit sicherte, Frankreich aber militärische und wirtschaftliche Macht verlieh. Während des Zweiten Weltkriegs besetzten britische und freifranzösische Truppen Syrien – doch kurz nach Kriegsende, 1946, wurde Syrien offiziell unabhängig. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.31.a:1 "Akzeptieren"
ron_decolonizationcountry.31.b:1 "Zerschmettere sie"

ron_decolonizationcountry.32.t:0 "Die Philippinen erklären ihre Unabhängigkeit"
ron_decolonizationcountry.32.d:0 "1935 wurde mit Zustimmung der USA der Commonwealth der Philippinen gegründet und Manuel Quezon zum ersten Präsidenten des Landes gewählt. Am 4. Juli 1946 gewährten die USA der Republik der Philippinen die volle Unabhängigkeit. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.32.a:1 "Akzeptieren"
ron_decolonizationcountry.32.b:1 "Zerschmettere sie"

ron_decolonizationcountry.33.t:0 "Indien erklärt seine Unabhängigkeit"
ron_decolonizationcountry.33.d:0 "Der Indian Independence Act von 1947 ist ein Gesetz des britischen Parlaments, das Britisch-Indien in die beiden neuen unabhängigen Gebiete Indien und Pakistan aufteilte. Das Gesetz erhielt am 18. Juli 1947 die königliche Zustimmung, und so entstanden am 15. August Indien und Pakistan, bestehend aus den Regionen West (heute Pakistan) und Ost (heute Bangladesch). Die gesetzgebenden Vertreter des Indischen Nationalkongresses, der Muslimliga und der Sikh-Gemeinde einigten sich mit Lord Mountbatten auf den sogenannten 3.-Juni-Plan oder Mountbatten-Plan. Dieser Plan war der letzte Plan zur Unabhängigkeit. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.33.a:1 "Akzeptieren"
ron_decolonizationcountry.33.b:1 "Zerschmettere sie"

ron_decolonizationcountry.34.t:0 "Pakistan erklärt seine Unabhängigkeit"
ron_decolonizationcountry.34.d:0 "Der Indian Independence Act von 1947 ist ein Gesetz des britischen Parlaments, das Britisch-Indien in die beiden neuen unabhängigen Gebiete Indien und Pakistan aufteilte. Das Gesetz erhielt am 18. Juli 1947 die königliche Zustimmung, und so entstanden am 15. August Indien und Pakistan, bestehend aus den Regionen West (heute Pakistan) und Ost (heute Bangladesch). Die gesetzgebenden Vertreter des Indischen Nationalkongresses, der Muslimliga und der Sikh-Gemeinde einigten sich mit Lord Mountbatten auf den sogenannten 3.-Juni-Plan oder Mountbatten-Plan. Dieser Plan war der letzte Plan zur Unabhängigkeit. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.34.a:1 "Akzeptieren"
ron_decolonizationcountry.34.b:1 "Zerschmettere sie"

ron_decolonizationcountry.36.t:0 "Israel erklärt seine Unabhängigkeit"
ron_decolonizationcountry.36.d:0 "Am 14. Mai 1948 proklamierte der Vorsitzende der Jewish Agency, David Ben-Gurion, in Tel Aviv den Staat Israel und gründete damit den ersten jüdischen Staat seit 2000 Jahren. Ben-Gurion wurde Israels erster Ministerpräsident. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.36.a:1 "Akzeptieren"
ron_decolonizationcountry.36.b:1 "Zerschmettere sie"

ron_decolonizationcountry.37.t:0 "Burmesische Unabhängigkeitserklärung"
ron_decolonizationcountry.37.d:0 "Die burmesische Unabhängigkeitserklärung wurde am 4. Januar 1948 offiziell verkündet und markierte das Ende der britischen Herrschaft in Burma (heute Myanmar). Das Datum wird heute als Unabhängigkeitstag gefeiert, ein nationaler Feiertag. Das Dokument wurde gemeinsam von Zawgyi, Min Thu Wun, Ohn Pe und Win Sein verfasst und von Maung Maung, U Thant, Khin Maung und Khin Zaw ins Englische übersetzt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.37.a:1 "Akzeptieren"
ron_decolonizationcountry.37.b:1 "Zerschmettere sie"

ron_decolonizationcountry.38.t:0 "Sri Lanka erklärt seine Unabhängigkeit"
ron_decolonizationcountry.38.d:0 "Die sri-lankische Unabhängigkeitsbewegung war eine friedliche politische Bewegung, deren Ziel die Unabhängigkeit und Selbstverwaltung Sri Lankas, des damaligen Britisch-Ceylon, vom Britischen Empire war. Der Machtwechsel wurde allgemein als friedliche Machtübergabe von der britischen Verwaltung an ceylonische Vertreter bezeichnet, ein Begriff, der eine beträchtliche Kontinuität mit der 400 Jahre dauernden Kolonialzeit impliziert. Die Bewegung begann um die Wende zum 20. Jahrhundert und wurde hauptsächlich von der gebildeten Mittelschicht getragen. Sie war erfolgreich, als Ceylon am 4. Februar 1948 als Dominion Ceylon die Unabhängigkeit erlangte. Der Dominion-Status innerhalb des Britischen Commonwealth blieb für die folgenden 24 Jahre bestehen, bis das Land am 22. Mai 1972 zur Republik wurde und in Republik Sri Lanka umbenannt wurde. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.38.a:1 "Akzeptieren"
ron_decolonizationcountry.38.b:1 "Zerschmettere sie"

ron_decolonizationcountry.41.t:0 "Libyen erklärt seine Unabhängigkeit"
ron_decolonizationcountry.41.d:0 "Am 24. Dezember 1951 erklärte Libyen seine Unabhängigkeit als Vereinigtes Königreich Libyen, eine konstitutionelle Erbmonarchie unter König Idris, dem einzigen Monarchen Libyens. Die Entdeckung bedeutender Ölreserven im Jahr 1959 und die daraus resultierenden Einnahmen aus dem Ölverkauf ermöglichten es einem der ärmsten Länder der Welt, einen äußerst wohlhabenden Staat aufzubauen. Obwohl das Öl die libysche Staatsfinanzen drastisch verbesserte, wuchs in einigen Fraktionen Unmut über die zunehmende Konzentration des nationalen Reichtums in den Händen von König Idris. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.41.a:1 "Akzeptieren"
ron_decolonizationcountry.41.b:1 "Zerschmettere sie"

ron_decolonizationcountry.42.t:0 "Kambodscha erklärt seine Unabhängigkeit"
ron_decolonizationcountry.42.d:0 "Frankreich übernahm 1863 die Kontrolle über Kambodscha. Nach rund 80 Jahren Kolonialherrschaft forderte König Norodom Sihanouk 1949 die Unabhängigkeit von Frankreich. 1953 gelang ihm die vollständige Unabhängigkeit, und Frankreich erklärte sich bereit, das gesamte Land zu entkolonialisieren. Aufgrund dieser Leistung wurde er von den kambodschanischen Bürgern als „Vater der Unabhängigkeit“ angesehen, was ihn zum Helden des Landes macht. Er trug zur rasanten Entwicklung des Landes bei. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.42.a:1 "Akzeptieren"
ron_decolonizationcountry.42.b:1 "Zerschmettere sie"

ron_decolonizationcountry.43.t:0 "Laos erklärt seine Unabhängigkeit"
ron_decolonizationcountry.43.d:0 "Laos erlangte 1953 seine Unabhängigkeit und wurde unter Sisavang Vong zu einer konstitutionellen Monarchie erklärt. Nach der Unabhängigkeit begann ein Bürgerkrieg, in dem der kommunistische Widerstand, unterstützt von der Sowjetunion, gegen die Monarchie kämpfte, die später unter den Einfluss von Militärregimen geriet, die von den USA unterstützt wurden. Nach dem Ende des Vietnamkriegs 1975 kam die kommunistische Pathet Lao an die Macht und beendete den Bürgerkrieg. Laos war danach bis zu ihrer Auflösung 1991 von militärischer und wirtschaftlicher Hilfe der Sowjetunion abhängig. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.43.a:1 "Akzeptieren"
ron_decolonizationcountry.43.b:1 "Zerschmettere sie"

ron_decolonizationcountry.44.t:0 "Österreichischer Staatsvertrag"
ron_decolonizationcountry.44.d:0 "Der Österreichische Staatsvertrag (auch Unabhängigkeitsvertrag genannt) stellte Österreich als souveränen Staat wieder her. Er wurde am 15. Mai 1955 im Schloss Belvedere in Wien von den alliierten Besatzungsmächten (Frankreich, Großbritannien, USA und Sowjetunion) und der österreichischen Regierung unterzeichnet. Die benachbarte Föderative Volksrepublik Jugoslawien trat dem Vertrag später bei. Er trat am 27. Juli 1955 offiziell in Kraft. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.44.a:1 "Akzeptieren"
ron_decolonizationcountry.44.b:1 "Zerschmettere sie"

ron_decolonizationcountry.45.t:0 "Zypern erklärt seine Unabhängigkeit"
ron_decolonizationcountry.45.d:0 "Die am 19. Februar 1959 unterzeichneten Londoner und Zürcher Abkommen leiteten den Prozess zur Gründung eines unabhängigen Zyperns ein. Am 16. August 1960 gewährte das Vereinigte Königreich Zypern die Unabhängigkeit und gründete die Republik Zypern. Erzbischof Makarios III., ein charismatischer religiöser und politischer Führer, wurde zum ersten Präsidenten des unabhängigen Zypern gewählt. Im Rahmen des Unabhängigkeitsabkommens behielt das Vereinigte Königreich die Hoheitsgebiete Akrotiri und Dhekelia als britisches Überseegebiet. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.45.a:1 "Akzeptieren"
ron_decolonizationcountry.45.b:1 "Zerschmettere sie"

ron_decolonizationcountry.46.t:0 "Marokko fordert vollständige Unabhängigkeit"
ron_decolonizationcountry.46.d:0 "Am 7. April 1956 gab Frankreich sein Protektorat in Marokko offiziell auf. Die internationalisierte Stadt Tanger wurde mit der Unterzeichnung des Tanger-Protokolls am 29. Oktober 1956 wieder integriert. Die Abschaffung des spanischen Protektorats und die Anerkennung der marokkanischen Unabhängigkeit durch Spanien wurden separat ausgehandelt und in der Gemeinsamen Erklärung vom April 1956 endgültig festgelegt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.46.a:1 "Akzeptieren"
ron_decolonizationcountry.46.b:1 "Zerschmettere sie"

ron_decolonizationcountry.47.t:0 "Sudan erklärt seine Unabhängigkeit"
ron_decolonizationcountry.47.d:0 "Am 1. Januar 1956 erlangte der anglo-ägyptische Sudan als Republik Sudan seine Unabhängigkeit. Vor 1955 hatte die Regierung unter Ismail al-Azhari den sudanesischen Prozess in Richtung Selbstbestimmung jedoch vorübergehend gestoppt, in der Hoffnung, die Einheit mit Ägypten zu fördern. Obwohl seine pro-ägyptische National Unionist Party (NUP) bei den Parlamentswahlen 1953 die Mehrheit errang, erkannte Azhari, dass sich die öffentliche Meinung gegen eine solche Union gewendet hatte. Azhari, der zuvor der wichtigste Verfechter der „Einheit des Niltals“ gewesen war, änderte daher die Haltung der NUP und unterstützte die sudanesische Unabhängigkeit. Am 19. Dezember 1955 verabschiedete das sudanesische Parlament unter Azharis Führung einstimmig eine Unabhängigkeitserklärung, die am 1. Januar 1956 in Kraft trat. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.47.a:1 "Akzeptieren"
ron_decolonizationcountry.47.b:1 "Zerschmettere sie"

ron_decolonizationcountry.48.t:0 "Tunesien erklärt seine Unabhängigkeit"
ron_decolonizationcountry.48.d:0 "Der tunesische Unabhängigkeitsprozess fand von 1952 bis 1956 zwischen Frankreich und einer separatistischen Bewegung unter Habib Bourguiba statt. Bourguiba wurde der erste Premierminister des Königreichs Tunesien, nachdem Verhandlungen mit Frankreich erfolgreich zur Beendigung des kolonialen Protektorats und zur Unabhängigkeit geführt hatten. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.48.a:1 "Akzeptieren"
ron_decolonizationcountry.48.b:1 "Zerschmettere sie"

ron_decolonizationcountry.49.t:0 "Ghana erklärt seine Unabhängigkeit"
ron_decolonizationcountry.49.d:0 "Der erste Premierminister Ghanas, Kwame Nkrumah, war von 1957 bis 1960 Regierungschef. Am 6. März 1957 verkündete Kwame Nkrumah dem ghanaischen Volk seine Freiheit und fügte hinzu: „Das afrikanische Volk ist in der Lage, seine eigenen Angelegenheiten zu regeln, und Ghana, unser geliebtes Land, ist für immer frei.“ Ghana war das erste Land in Afrika südlich der Sahara, das seine Unabhängigkeit von der europäischen Kolonialherrschaft erlangte. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.49.a:1 "Akzeptieren"
ron_decolonizationcountry.49.b:1 "Zerschmettere sie"

ron_decolonizationcountry.50.t:0 "Burkina Faso erklärt seine Unabhängigkeit"
ron_decolonizationcountry.50.d:0 "Die Republik Obervolta, heute Burkina Faso, war ein westafrikanischer Binnenstaat, der am 11. Dezember 1958 als selbstverwaltete Kolonie innerhalb der Französischen Gemeinschaft gegründet wurde. Vor der Erlangung der Autonomie war es französisches Obervolta und Teil der Französischen Union. Am 5. August 1960 erlangte es die vollständige Unabhängigkeit von Frankreich. Am 4. August 1984 änderte es seinen Namen in Burkina Faso. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.50.a:1 "Akzeptieren"
ron_decolonizationcountry.50.b:1 "Zerschmettere sie"

ron_decolonizationcountry.51.t:0 "Zentralafrikanische Republik erklärt ihre Unabhängigkeit"
ron_decolonizationcountry.51.d:0 "Das französische Verfassungsreferendum vom September 1958 löste die AEF auf, und am 1. Dezember desselben Jahres erklärte die Versammlung die autonome Zentralafrikanische Republik mit Boganda als Regierungschef. Boganda regierte bis zu seinem Tod bei einem Flugzeugabsturz am 29. März 1959. Sein Cousin David Dacko folgte ihm als Regierungschef nach. Am 12. Juli 1960 stimmte Frankreich der vollständigen Unabhängigkeit der Zentralafrikanischen Republik zu. Am 13. August 1960 wurde die Zentralafrikanische Republik ein unabhängiges Land und David Dacko wurde ihr erster Präsident. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.51.a:1 "Akzeptieren"
ron_decolonizationcountry.51.b:1 "Zerschmettere sie"

ron_decolonizationcountry.52.t:0 "Der Tschad erklärt seine Unabhängigkeit"
ron_decolonizationcountry.52.d:0 "Mit der Verfassung von 1957 wurde ein hohes Maß an Autonomie gewährt. Die erste Territorialregierung wurde von Gabriel Lisette gebildet, einem Westinder, der zum Vorsitzenden der Tschadischen Fortschrittspartei (PPT) aufgestiegen war. Im November 1958 wurde innerhalb der Französischen Gemeinschaft eine autonome Republik ausgerufen, und am 11. August 1960 erlangte die neu strukturierte Gemeinschaft ihre vollständige Unabhängigkeit. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.52.a:1 "Akzeptieren"
ron_decolonizationcountry.52.b:1 "Zerschmettere sie"

ron_decolonizationcountry.53.t:0 "Kongo erklärt seine Unabhängigkeit"
ron_decolonizationcountry.53.d:0 "Am 15. August 1960 erlangte die Republik Kongo ihre volle Unabhängigkeit von Frankreich. Youlou regierte als erster Präsident des Landes, bis ihn Arbeiterbewegungen und rivalisierende politische Parteien zu einem dreitägigen Aufstand stürzten. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.53.a:1 "Akzeptieren"
ron_decolonizationcountry.53.b:1 "Zerschmettere sie"

ron_decolonizationcountry.54.t:0 "Guinea erklärt seine Unabhängigkeit"
ron_decolonizationcountry.54.d:0 "Die ehemalige französische Kolonie Guinea erklärt am 2. Oktober 1958 ihre Unabhängigkeit. Sékou Touré wird ihr erster Staatschef. Guinea ist die einzige französische Kolonie in Westafrika, die sich für die vollständige Unabhängigkeit und gegen die Mitgliedschaft in der Französischen Gemeinschaft entscheidet. Kurz darauf stellt Frankreich die Unterstützung der neuen Republik ein. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.54.a:1 "Akzeptieren"
ron_decolonizationcountry.54.b:1 "Zerschmettere sie"

ron_decolonizationcountry.55.t:0 "Kuwait erklärt seine Unabhängigkeit"
ron_decolonizationcountry.55.d:0 "Großbritanniens Fähigkeit, Kuwait zu schützen, war nach dem Zweiten Weltkrieg stark geschwächt. Das wirtschaftlich am Boden liegende Vereinigte Königreich konnte es sich nicht länger leisten, den imperialen Schein zu wahren, und musste 1947 seine wertvollsten Kolonialjuwelen an die neuen souveränen Nationen Indien und Pakistan abtreten. Den Briten gelang es jedoch, einige Außenposten ihres ehemaligen Imperiums im Osten zu halten, darunter die kleinen Scheichtümer am Golf. Diese Scheichtümer hatten durch die Entdeckung großer Ölfelder auf ihren Territorien neue strategische Bedeutung erlangt. Die ersten Ölvorkommen in Kuwait wurden 1938 entdeckt, und 1946 stieg der kommerzielle Export dieses wertvollen Rohstoffs sprunghaft an. 1953 war Kuwait der größte Ölproduzent am Golf. Seine Reserven wurden auf mindestens 20 Prozent der bekannten weltweiten Reserven geschätzt. Diese „Erdölrevolution“ hatte weitreichende Auswirkungen. Auf internationaler Ebene zog sie den Neid der Regionalmächte auf sich, während sie den Herrschern von Al Sabah das Selbstvertrauen – und die finanzielle Leistungsfähigkeit – gab, einen Alleingang zu versuchen. Kuwait war 1961 das erste der von Großbritannien kontrollierten Scheichtümer am Golf, das seine Unabhängigkeit erlangte, und das einzige, das selbst die Initiative ergriff. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.55.a:1 "Akzeptieren"
ron_decolonizationcountry.55.b:1 "Zerschmettere sie"

ron_decolonizationcountry.56.t:0 "Tansania erklärt seine Unabhängigkeit"
ron_decolonizationcountry.56.d:0 "Tanganjika war ein souveräner Staat, der das Festland des heutigen Tansania umfasste und von 1961 bis 1964 existierte. Am 9. Dezember 1961 erlangte er unter der Führung von Königin Elisabeth II. seine Unabhängigkeit vom Vereinigten Königreich, bevor er ein Jahr später eine Republik innerhalb des Commonwealth of Nations wurde. Nach der Unterzeichnung der Unionsartikel am 22. April 1964 und der Verabschiedung eines Unionsgesetzes am 25. April schloss sich Tanganjika am Unionstag, dem 26. April 1964, offiziell mit der Volksrepublik Sansibar und Pemba zur Vereinigten Republik Tanganjika und Sansibar zusammen. Der neue Staat änderte innerhalb eines Jahres seinen Namen in Vereinigte Republik Tansania. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.56.a:1 "Akzeptieren"
ron_decolonizationcountry.56.b:1 "Zerschmettere sie"

ron_decolonizationcountry.57.t:0 "Sierra Leone erklärt seine Unabhängigkeit"
ron_decolonizationcountry.57.d:0 "Am 27. April 1961 führte Sir Milton Margai Sierra Leone in die Unabhängigkeit von Großbritannien und wurde der erste Premierminister des Landes. Tausende Sierra-Leoner feierten die Unabhängigkeit. Das Dominion Sierra Leone behielt sein parlamentarisches Regierungssystem und war Mitglied des Commonwealth of Nations. Der Vorsitzende der größten Oppositionspartei All People&#39;s Congress (APC), Siaka Stevens, sowie Isaac Wallace-Johnson, ein weiterer offener Kritiker der SLPP-Regierung, wurden verhaftet und in Freetown unter Hausarrest gestellt. 16 weitere Personen wurden wegen Störung der Unabhängigkeitsfeierlichkeiten angeklagt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.57.a:1 "Akzeptieren"
ron_decolonizationcountry.57.b:1 "Zerschmettere sie"

ron_decolonizationcountry.58.t:0 "Algerischer Unabhängigkeitskrieg"
ron_decolonizationcountry.58.d:0 "Der Algerienkrieg, auch bekannt als Algerischer Unabhängigkeitskrieg oder Algerische Revolution, in Algerien manchmal auch als Krieg des 1. November bezeichnet, wurde von 1954 bis 1962 zwischen Frankreich und der Algerischen Nationalen Befreiungsfront (französisch Front de Libération Nationale – FLN) geführt und führte zur Unabhängigkeit Algeriens von Frankreich. Als wichtiger Entkolonialisierungskrieg war dieser komplexe Konflikt von Guerillakrieg, Maquis-Kämpfen und Folter geprägt. Der Konflikt weitete sich auch zu einem Bürgerkrieg zwischen und innerhalb der verschiedenen Gemeinschaften aus. Der Krieg fand hauptsächlich auf algerischem Gebiet statt und hatte Auswirkungen auf das französische Mutterland. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.58.a:1 "Akzeptieren"
ron_decolonizationcountry.58.b:1 "Zerschmettere sie"

ron_decolonizationcountry.59.t:0 "Burundi erklärt seine Unabhängigkeit"
ron_decolonizationcountry.59.d:0 "Am 20. Januar 1959 forderte Burundis Herrscher Mwami Mwambutsa IV. die Unabhängigkeit Burundis von Belgien und die Auflösung der Ruanda-Urundi-Union. In den folgenden Monaten begannen burundische politische Parteien, sich für das Ende der belgischen Kolonialherrschaft und die Trennung Ruandas und Burundis einzusetzen. Die erste und größte dieser politischen Parteien war die Union für Nationalen Fortschritt (UPRONA). Burundis Streben nach Unabhängigkeit wurde von der Ruandischen Revolution und der damit einhergehenden Instabilität und den ethnischen Konflikten beeinflusst. Infolge der Ruandischen Revolution kamen zwischen 1959 und 1961 viele ruandische Tutsi-Flüchtlinge nach Burundi. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.59.a:1 "Akzeptieren"
ron_decolonizationcountry.59.b:1 "Zerschmettere sie"

ron_decolonizationcountry.60.t:0 "Jamaika erklärt seine Unabhängigkeit"
ron_decolonizationcountry.60.d:0 "Die Insel wurde 1509 eine imperiale Kolonie, als Spanien das indigene Volk der Arawak eroberte. 1655 nahmen britische Truppen die Insel fast kampflos ein und das Britische Empire beanspruchte sie. Im Laufe der Jahre schlossen sich entflohene Sklaven den überlebenden indigenen Völkern in den Bergen an und gründeten eine Gesellschaft, die als Maroons bekannt ist. Die Maroons gewannen einen Krieg gegen die britischen Streitkräfte (1728–1740), verloren jedoch einen zweiten Krieg (1795–1796). Im 19. Jahrhundert wurde die Sklaverei abgeschafft und die Jamaikaner erhielten das Wahlrecht, obwohl die Briten weiterhin an der Macht waren. Anfang des 20. Jahrhunderts förderte Marcus Garvey den schwarzen Nationalismus und wurde zum bedeutendsten schwarzen Anführer seiner Zeit. Während der Weltwirtschaftskrise protestierten Arbeiter gegen Ungleichheit und kämpften gegen die Behörden in Jamaika und anderen karibischen Kolonien. 1943 errang der Gewerkschaftsführer Alexander Bustamante einen Wahlsieg und setzte eine neue, liberalere Verfassung durch. Nach dem Zweiten Weltkrieg entwickelten die jamaikanischen Führer die Regierungsstruktur, um sich auf die Unabhängigkeit vorzubereiten. 1962 gewann Bustamantes Partei die Wahl und er wurde Premierminister. Im selben Jahr gewährte das britische Parlament Jamaika offiziell die Unabhängigkeit, und Bustamante wurde der erste Premierminister des unabhängigen Landes. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.60.a:1 "Akzeptieren"
ron_decolonizationcountry.60.b:1 "Zerschmettere sie"

ron_decolonizationcountry.61.t:0 "Ruanda erklärt seine Unabhängigkeit"
ron_decolonizationcountry.61.d:0 "Am 25. September 1961 wurde in einem Referendum entschieden, ob Ruanda eine Republik werden oder ein Königreich bleiben sollte. Die Bevölkerung votierte mit überwältigender Mehrheit für die Republik. Nach den am selben Tag abgehaltenen Parlamentswahlen wurde die erste Ruandische Republik ausgerufen, mit Kayibanda als Premierminister. Dominique Mbonyumutwa wurde zum ersten Präsidenten der Übergangsregierung ernannt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.61.a:1 "Akzeptieren"
ron_decolonizationcountry.61.b:1 "Zerschmettere sie"

ron_decolonizationcountry.62.t:0 "Samoa erklärt seine Unabhängigkeit"
ron_decolonizationcountry.62.d:0 "Nach wiederholten Bemühungen der samoanischen Unabhängigkeitsbewegung gewährte der neuseeländische Western Samoa Act 1961 vom 24. November 1961 Samoa die Unabhängigkeit mit Wirkung zum 1. Januar 1962. Damit endete das Treuhandabkommen. Samoa unterzeichnete außerdem einen Freundschaftsvertrag mit Neuseeland. Samoa, der erste unabhängige Inselstaat im Pazifik, trat am 28. August 1970 dem Commonwealth of Nations bei. Obwohl die Unabhängigkeit Anfang Januar erlangt wurde, feiert Samoa jährlich den 1. Juni als Unabhängigkeitstag. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.62.a:1 "Akzeptieren"
ron_decolonizationcountry.62.b:1 "Zerschmettere sie"

ron_decolonizationcountry.63.t:0 "Unabhängigkeitsgesetz von Trinidad und Tobago"
ron_decolonizationcountry.63.d:0 "Der Trinidad and Tobago Independence Act von 1962 war ein Gesetz des britischen Parlaments, das Trinidad und Tobago mit Wirkung vom 31. August 1962 die Unabhängigkeit gewährte. Das Gesetz sah auch die Verabschiedung einer neuen Verfassung für Trinidad und Tobago vor, die mit der Unabhängigkeit in Kraft treten sollte. Durch das Gesetz wurde Trinidad und Tobago ein unabhängiges Land in Westindien und erlangte die Unabhängigkeit vom Vereinigten Königreich. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.63.a:1 "Akzeptieren"
ron_decolonizationcountry.63.b:1 "Zerschmettere sie"

ron_decolonizationcountry.64.t:0 "Uganda erklärt seine Unabhängigkeit"
ron_decolonizationcountry.64.d:0 "Ugandas Ansatz zur Unabhängigkeit unterschied sich von dem der meisten anderen Kolonialgebiete, in denen politische Parteien gegründet wurden, um Selbstverwaltung oder Unabhängigkeit von einer widerstrebenden Kolonialregierung zu erzwingen. In Uganda gab es zwar einige Forderungen nach mehr Autonomie, diese kamen jedoch meist von lokalen Nationalisten der fünf Königreiche der Kolonie zum Ausdruck. Eine Ausnahme bildete der langlebige Ugandische Nationalkongress, der auf der indischen Kongresspartei basierte. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.64.a:1 "Akzeptieren"
ron_decolonizationcountry.64.b:1 "Zerschmettere sie"

ron_decolonizationcountry.65.t:0 "Kenia erklärt seine Unabhängigkeit"
ron_decolonizationcountry.65.d:0 "Ein Jahrzehnt zuvor, im Jahr 1952, hatte ein als Mau-Mau-Aufstand bekannter Aufstand die britische Kolonie erschüttert. Die Briten gaben nicht nur schätzungsweise 55 Millionen Pfund für die Niederschlagung des Aufstands aus, sie verübten auch Massaker an der Zivilbevölkerung, zwangen mehrere hunderttausend Kenianer in Konzentrationslager und setzten in einigen Städten die bürgerlichen Freiheiten außer Kraft. Der Krieg endete mit der Inhaftierung und Hinrichtung vieler Rebellen, doch auch die Briten erkannten, dass sich die Dinge dauerhaft geändert hatten. Die Kolonialregierung führte Reformen ein, die es Kenianern erleichterten, Land zu besitzen und Kaffee anzubauen, eine wichtige Einnahmequelle, die zuvor europäischen Siedlern vorbehalten war. Ab 1957 durften Kenianer in den Legislativrat gewählt werden. Als nationalistische Bewegungen den Kontinent erfassten und Großbritannien finanziell und militärisch nicht mehr in der Lage war, sein Imperium aufrechtzuerhalten, trafen sich die britische Regierung und Vertreter der kenianischen Unabhängigkeitsbewegung 1960, um über die Unabhängigkeit zu verhandeln. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.65.a:1 "Akzeptieren"
ron_decolonizationcountry.65.b:1 "Zerschmettere sie"

ron_decolonizationcountry.66.t:0 "Malawi erklärt seine Unabhängigkeit"
ron_decolonizationcountry.66.d:0 "Im Juli 1958 kehrte Dr. Hastings Kamuzu Banda nach langer Abwesenheit in den Vereinigten Staaten, Großbritannien und Ghana in das Land zurück. Er übernahm den Vorsitz der NAC, aus der später die Malawi Congress Party (MCP) hervorging. 1959 wurde Banda wegen seiner politischen Aktivitäten ins Gwelo-Gefängnis eingeliefert, aber 1960 freigelassen, um an einer Verfassungskonferenz in London teilzunehmen. Im August 1961 errang die MCP einen überwältigenden Sieg bei der Wahl eines neuen Legislativrats. Sie erlangte auch eine wichtige Rolle im neuen Exekutivrat und regierte Njassaland ein Jahr später praktisch bis auf den Namen. Bei einer zweiten Verfassungskonferenz im November 1962 in London stimmte die britische Regierung zu, Njassaland im folgenden Jahr den Status einer Selbstverwaltung zu gewähren. Hastings Banda wurde am 1. Februar 1963 Premierminister, obwohl die Briten noch immer die Kontrolle über das Finanz-, Sicherheits- und Justizsystem des Landes hatten. Im Mai 1963 trat eine neue Verfassung in Kraft, die eine nahezu vollständige Selbstverwaltung vorsah. Am 6. Juli 1964 wurde Malawi ein vollständig unabhängiges Mitglied des Commonwealth (ehemals Britisches Commonwealth). Wie werden wir darauf reagieren?"
ron_decolonizationcountry.66.a:1 "Akzeptieren"
ron_decolonizationcountry.66.b:1 "Zerschmettere sie"

ron_decolonizationcountry.67.t:0 "Malta erklärt seine Unabhängigkeit"
ron_decolonizationcountry.67.d:0 "Großbritannien gliederte Malta in sein Imperium ein, und 1869 wurde Malta als Zwischenstopp zwischen dem britischen Gibraltar und dem neu eröffneten Suezkanal berühmt. Die Insel wurde zu einer Festung ausgebaut und zum Stützpunkt der britischen Mittelmeerflotte. Ein Jahrhundert später brach der Zweite Weltkrieg aus. Da Malta die Heimat der britischen Flotte im Mittelmeer war, versuchten die Achsenmächte wiederholt, die Insel entweder zu zerstören oder unter ihre Kontrolle zu bringen. Dies verwüstete Malta, doch die Insel gab nie auf. Ihr erbitterter Widerstand gegen die Nazis und die faschistischen Italiener wurde von den Briten belohnt, indem sie den Maltesern das Georgs-Kreuz überreichten und ihnen die Unabhängigkeit versprachen. 1947 wurde ihnen ein gewisses Maß an lokaler Herrschaft gewährt, doch die vollständige Unabhängigkeit wurde erst am 21. September 1964 erlangt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.67.a:1 "Akzeptieren"
ron_decolonizationcountry.67.b:1 "Zerschmettere sie"

ron_decolonizationcountry.68.t:0 "Sambia erklärt seine Unabhängigkeit"
ron_decolonizationcountry.68.d:0 "Eine zweistufige Wahl im Oktober und Dezember 1962 führte zu einer afrikanischen Mehrheit im Legislativrat und einer instabilen Koalition zwischen den beiden afrikanischen nationalistischen Parteien. Der Rat verabschiedete Resolutionen, in denen die Abspaltung Nordrhodesiens von der Föderation sowie volle interne Selbstverwaltung im Rahmen einer neuen Verfassung und einer neuen Nationalversammlung mit umfassenderen, demokratischeren Wahlrechten gefordert wurden. Die Föderation wurde am 31. Dezember 1963 aufgelöst und im Januar 1964 gewann Kaunda die einzige Wahl zum Premierminister Nordrhodesiens. Der Kolonialgouverneur, Sir Evelyn Hone, stand Kaunda sehr nahe und drängte ihn, für das Amt zu kandidieren. Bald darauf kam es im Norden des Landes zu einem Aufstand, der als Lumpa-Aufstand bekannt wurde und von Alice Lenshina angeführt wurde – Kaundas erster interner Konflikt als Staatsoberhaupt. Am 24. Oktober 1964 wurde Nordrhodesien zur Republik Sambia mit Kenneth Kaunda als erstem Präsidenten. Trotz seines beträchtlichen Bodenschatzes stand Sambia nach seiner Unabhängigkeit vor großen Herausforderungen. Im Inland gab es nur wenige ausgebildete Sambier, die in der Lage waren, die Regierung zu führen, und die Wirtschaft war weitgehend auf ausländisches Fachwissen angewiesen. Dieses Fachwissen wurde unter anderem von John Willson CMG bereitgestellt. 1964 lebten über 70.000 Europäer in Sambia, und ihre wirtschaftliche Bedeutung war nach wie vor überproportional. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.68.a:1 "Akzeptieren"
ron_decolonizationcountry.68.b:1 "Zerschmettere sie"

ron_decolonizationcountry.69.t:0 "Gambia erklärt seine Unabhängigkeit"
ron_decolonizationcountry.69.d:0 "Politische Parteien entwickelten sich erst spät, doch bereits 1960 forderten mehrere die Unabhängigkeit. Großbritannien ging davon aus, dass Gambia sich irgendwann mit Senegal vereinigen würde, und gab dem Gebiet 1954, 1960 und 1962 neue Verfassungen. Im Februar 1965 gewährte es dem Land schließlich die Unabhängigkeit innerhalb des Commonwealth. Am 24. April 1970 wurde Gambia zur Republik. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.69.a:1 "Akzeptieren"
ron_decolonizationcountry.69.b:1 "Zerschmettere sie"

ron_decolonizationcountry.70.t:0 "Malediven erklären ihre Unabhängigkeit"
ron_decolonizationcountry.70.d:0 "Am 26. Juli 1965 erlangten die Malediven ihre vollständige Unabhängigkeit von den Briten (obwohl die Briten bis 1976 noch einen Luftwaffenstützpunkt auf der Insel Gan unterhielten). Die Freiheit, sich selbst zu regieren, brachte einige Herausforderungen mit sich, beispielsweise die Frage, wie dem Modernisierungsbedarf und der wirtschaftlichen Entwicklung begegnet werden sollte. Trotz einer kurzen Phase in den 1950er Jahren, in der die Malediven eine Republik waren, bestand nach der Trennung von den Briten weiterhin ein Sultanat. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.70.a:1 "Akzeptieren"
ron_decolonizationcountry.70.b:1 "Zerschmettere sie"

ron_decolonizationcountry.71.t:0 "Proklamation von Singapur"
ron_decolonizationcountry.71.d:0 "Die Proklamation Singapurs ist ein Anhang des Abkommens über die Abspaltung Singapurs von Malaysia als unabhängiger und souveräner Staat vom 7. August 1965 zwischen der Regierung Malaysias und der Regierung Singapurs. Außerdem wurde am 9. August 1965 ein Gesetz zur Änderung der Verfassung Malaysias und des Malaysia Act unterzeichnet, das von Duli Yang Maha Mulia Seri Paduka Baginda Yang di-Pertuan Agong unterzeichnet und am Tag der Abspaltung von Malaysia, dem 9. August 1965, von Lee Kuan Yew, dem Premierminister Singapurs, verlesen wurde. Der Premierminister erklärte die Unabhängigkeit Singapurs. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.71.a:1 "Akzeptieren"
ron_decolonizationcountry.71.b:1 "Zerschmettere sie"

ron_decolonizationcountry.72.t:0 "Barbados erklärt seine Unabhängigkeit"
ron_decolonizationcountry.72.d:0 "Die Unabhängigkeit wurde am 30. November 1966 mit der Verabschiedung des Barbados Independence Act 1966 (c. 37) durch das britische Parlament gewährt. Mit der Verabschiedung des Gesetzes wurde Barbados das vierte englischsprachige Land in Westindien, das die vollständige Unabhängigkeit vom Vereinigten Königreich erlangte. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.72.a:1 "Akzeptieren"
ron_decolonizationcountry.72.b:1 "Zerschmettere sie"

ron_decolonizationcountry.73.t:0 "Botswana erklärt seine Unabhängigkeit"
ron_decolonizationcountry.73.d:0 "Ab Ende der 1950er Jahre wurde klar, dass Betschuanaland nicht länger an Südafrika übergeben werden konnte und in Richtung politischer und wirtschaftlicher Autarkie entwickelt werden musste. Die Anhänger Seretse Khamas begannen ab 1952 politische Bewegungen zu organisieren und selbst unter älteren „Stammesführern“ war eine nationalistische Stimmung zu spüren. Verhandlungen der „Stämme“ der Ngwato über den Beginn des Kupferbergbaus führten 1959 zu einer Einigung. Nach begrenzten nationalen Wahlen wurde 1961 schließlich ein Legislativrat eingerichtet. Die Betschuanaland People’s Party wurde 1960 gegründet und die Betschuanaland Democratic Party (BDP; später bekannt als Botswana Democratic Party) – unter Führung Seretse Khamas – wurde 1962 gegründet. Nach langem Widerstand gegen eine Verfassungsänderung, bevor die wirtschaftliche Entwicklung diese finanzieren konnte, begannen die Briten 1964, politische Veränderungen voranzutreiben. In Gaborone wurde rasch eine neue Verwaltungshauptstadt errichtet. Betschuanaland erlangte 1965 unter einer gewählten BDP-Regierung mit Seretse Khama als Premierminister seine Selbstverwaltung. 1966 wurde das Land zur Republik Botswana, mit Seretse Khama als erstem Präsidenten. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.73.a:1 "Akzeptieren"
ron_decolonizationcountry.73.b:1 "Zerschmettere sie"

ron_decolonizationcountry.74.t:0 "Guyana erklärt seine Unabhängigkeit"
ron_decolonizationcountry.74.d:0 "Um dem Vorwurf des PNC entgegenzutreten, das bestehende Wahlsystem bevorzuge die südasiatische Bevölkerungsgruppe, führte die britische Regierung für die Wahlen im Dezember 1964 ein neues Verhältniswahlsystem ein. Anschließend bildeten der PNC und eine kleinere, konservativere Partei eine Koalitionsregierung unter Burnham, die die Kolonie am 26. Mai 1966 unter ihrem neuen Namen Guyana in die Unabhängigkeit führte. Der PNC erlangte bei den Parlamentswahlen 1968 die volle Macht, die von fragwürdigen Wählerlisten im Ausland und weit verbreiteten Vorwürfen von Wahlbetrug geprägt war. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.74.a:1 "Akzeptieren"
ron_decolonizationcountry.74.b:1 "Zerschmettere sie"

ron_decolonizationcountry.75.t:0 "Lesotho erklärt seine Unabhängigkeit"
ron_decolonizationcountry.75.d:0 "1884 wurde das Gebiet zur Kronkolonie mit dem Namen Basutoland und der Hauptstadt Maseru. Es blieb unter der direkten Herrschaft eines Gouverneurs, die eigentliche interne Macht übten jedoch die traditionellen Stammeshäuptlinge aus. 1905 wurde Maseru durch eine Eisenbahnlinie an das südafrikanische Eisenbahnnetz angeschlossen. Basutoland erlangte 1966 seine Unabhängigkeit von Großbritannien und wurde zum Königreich Lesotho. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.75.a:1 "Akzeptieren"
ron_decolonizationcountry.75.b:1 "Zerschmettere sie"

ron_decolonizationcountry.76.t:0 "Der Jemen erklärt seine Unabhängigkeit"
ron_decolonizationcountry.76.d:0 "Im Januar 1967 kam es im alten arabischen Viertel von Aden zu Massenunruhen von Anhängern der NLF und der FLOSY, die trotz des Eingreifens britischer Truppen bis Mitte Februar andauerten. In diesem Zeitraum kam es zu zahlreichen Angriffen auf die Truppen, und eine Douglas DC-3-Maschine von Aden Airways wurde in der Luft zerstört, ohne dass es Überlebende gab. Gleichzeitig töteten sich Mitglieder der FLOSY und der NLF gegenseitig in großer Zahl. Die vorübergehende Schließung des Suezkanals 1967 machte den letzten Grund zunichte, warum die Briten die Kolonien im Jemen gehalten hatten, und angesichts der unkontrollierbaren Gewalt begannen sie mit dem Rückzug. Am 20. Juni 1967 kam es in der Armee der Föderation Südarabiens zu einer Meuterei, die auch auf die Polizei übergriff. Die Briten stellten die Ordnung wieder her, hauptsächlich dank der Bemühungen des 1. Bataillons der Argyll and Sutherland Highlanders unter dem Kommando von Oberstleutnant Colin Mitchell. Am 30. November 1967 zogen sich die Briten endgültig zurück und überließen Aden der Kontrolle der NLF. Die Royal Marines, die 1839 als erste britische Truppen Aden besetzt hatten, zogen als letzte ab. Die Föderation Südarabien zerfiel, und Südjemen wurde als Volksrepublik Südjemen unabhängig. Die NLF erlangte mit Unterstützung der Armee die vollständige Kontrolle über den neuen Staat, nachdem sie die FLOSY und die Staaten der ehemaligen Föderation in einem langwierigen Terrorfeldzug besiegt hatte. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.76.a:1 "Akzeptieren"
ron_decolonizationcountry.76.b:1 "Zerschmettere sie"

ron_decolonizationcountry.77.t:0 "Nauru erklärt seine Unabhängigkeit"
ron_decolonizationcountry.77.d:0 "1947 richteten die Vereinten Nationen eine Treuhandschaft ein. Australien, Neuseeland und Großbritannien übernahmen die UN-Treuhänderschaft für die Insel, wobei die Verwaltung größtenteils an Australien überging. Im Januar 1966 erlangte Nauru die Selbstverwaltung. Am 31. Januar 1968, nach einer zweijährigen Verfassungsversammlung, wurde Nauru die kleinste unabhängige Republik der Welt. Angeführt wurde sie von Gründungspräsident Hammer DeRoburt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.77.a:1 "Akzeptieren"
ron_decolonizationcountry.77.b:1 "Zerschmettere sie"

ron_decolonizationcountry.78.t:0 "Äquatorialguinea erklärt seine Unabhängigkeit"
ron_decolonizationcountry.78.d:0 "In den 1960er Jahren gab es eine Bewegung zur Entkolonialisierung Afrikas. 1967 forderten die Einwohner Spanisch-Guineas die Unabhängigkeit. Anfang 1968 setzte die spanische Regierung die autonome politische Kontrolle über das Gebiet außer Kraft und schlug ein nationales Referendum über eine neue Verfassung vor. Die Verfassung wurde am 11. August von den Einwohnern Spanisch-Guineas angenommen, und am 12. Oktober 1968 erklärte Spanisch-Guinea seine Unabhängigkeit und änderte seinen Namen in Äquatorialguinea. Spanien erkannte den neuen Staat umgehend an und nahm diplomatische Beziehungen auf. Im selben Jahr wurde Francisco Macías Nguema der erste Präsident des neu unabhängigen Staates. Bis 1969 verließen alle spanischen Truppen und der Großteil der spanischen Bevölkerung das Land in Richtung Spanien. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.78.a:1 "Akzeptieren"
ron_decolonizationcountry.78.b:1 "Zerschmettere sie"

ron_decolonizationcountry.79.t:0 "Swasiland erklärt seine Unabhängigkeit"
ron_decolonizationcountry.79.d:0 "Im Vorfeld der Unabhängigkeit hatte die INM ihre politische Basis gefestigt. Dabei übernahm sie viele Forderungen der radikaleren Parteien, insbesondere die nach sofortiger Unabhängigkeit. 1966 erklärte sich die britische Regierung bereit, über eine neue Verfassung zu verhandeln. Ein Verfassungsausschuss einigte sich auf eine konstitutionelle Monarchie für Swasiland, die nach den Parlamentswahlen 1967 die Selbstverwaltung erhalten sollte. Swasiland erlangte am 6. September 1968 seine Unabhängigkeit. Die ersten Wahlen nach der Unabhängigkeit fanden im Mai 1972 statt. Die INM erhielt fast 75 % der abgegebenen Stimmen. Der Ngwane National Liberatory Congress (NNLC) erhielt etwas mehr als 20 % der Stimmen und sicherte sich damit drei Sitze im Parlament. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.79.a:1 "Akzeptieren"
ron_decolonizationcountry.79.b:1 "Zerschmettere sie"

ron_decolonizationcountry.80.t:0 "Mauritius erklärt seine Unabhängigkeit"
ron_decolonizationcountry.80.d:0 "Nach 1961 gewann die Unabhängigkeitsbewegung an Dynamik, als die Briten einer erweiterten Selbstverwaltung und schließlich der Unabhängigkeit zustimmten. Eine Koalition aus der Mauritian Labour Party (MLP), dem Muslim Committee of Action (CAM) von Sir Abdool Razack Mohamed und dem Independent Forward Bloc (IFB) – einer traditionalistischen Hindu-Partei – gewann bei den Wahlen zur Legislative Assembly 1967 die Mehrheit, trotz des Widerstands französisch-mauritischer und kreolischer Anhänger der Mauritian Social Democratic Party (PMSD) von Sir Gaetan Duval QC und Jules Koenig. Die Koalition aus Labour, IFB und CAM wurde als „Independence Party“ bekannt. Sir Seewoosagur Ramgoolam, Chief Minister der Kolonialregierung, wurde am 12. März 1968 der erste Premierminister nach der Unabhängigkeit. Der 12. März wurde speziell als Datum gewählt, um mit Mahatma Gandhis Salzmarsch vom 12. März 1930 zusammenzufallen. Zwischen 1965 und 1968 kam es zu verschiedenen ethnischen Unruhen, die nur mit Unterstützung britischer Truppen, die aus Südostasien einflogen, unter Kontrolle gebracht werden konnten. Die ethnischen Unruhen vor der Unabhängigkeit forderten rund 300 Todesopfer. Die britische Herrschaft endete am 12. März 1968 mit dem Mauritius Independence Act 1968. Die britische Monarchin Elisabeth II. blieb als Königin von Mauritius nominelles Staatsoberhaupt. Ihre verfassungsmäßigen Aufgaben wurden dem Generalgouverneur von Mauritius übertragen. Der letzte Gouverneur, Sir John Shaw Rennie, amtierte bis zum 27. August 1968 als erster Generalgouverneur. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.80.a:1 "Akzeptieren"
ron_decolonizationcountry.80.b:1 "Zerschmettere sie"

ron_decolonizationcountry.81.t:0 "Fidschi erklärt seine Unabhängigkeit"
ron_decolonizationcountry.81.d:0 "Im April 1970 einigte man sich bei einer Verfassungskonferenz in London darauf, dass Fidschi ein vollständig souveräner und unabhängiger Staat innerhalb des Commonwealth of Nations werden sollte. Das Dominion Fidschi erlangte am 10. Oktober desselben Jahres seine Unabhängigkeit. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.81.a:1 "Akzeptieren"
ron_decolonizationcountry.81.b:1 "Zerschmettere sie"

ron_decolonizationcountry.82.t:0 "Tonga erklärt seine Unabhängigkeit"
ron_decolonizationcountry.82.d:0 "Der Freundschaftsvertrag und Tongas Schutzstatus endeten 1970 gemäß den Vereinbarungen von Königin Salote Tupou III. vor ihrem Tod 1965. Aufgrund seiner britischen Beziehungen trat Tonga 1970 dem Commonwealth bei (untypischerweise als Land mit eigenem Monarchen anstelle des Vereinigten Königreichs, ähnlich wie Malaysia, Lesotho und Eswatini (Swasiland)) und wurde im September 1999 Mitglied der Vereinten Nationen. Obwohl Tonga kolonialen Zwängen ausgesetzt war, hat es sich stets selbst regiert, was es im Pazifik einzigartig macht. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.82.a:1 "Akzeptieren"
ron_decolonizationcountry.82.b:1 "Zerschmettere sie"

ron_decolonizationcountry.83.t:0 "Bahrain erklärt seine Unabhängigkeit"
ron_decolonizationcountry.83.d:0 "Der Unabhängigkeitstag Bahrains war der 15. August 1971. Nach einer Umfrage der Vereinten Nationen unter der bahrainischen Bevölkerung erklärte das Land seine Unabhängigkeit von Großbritannien. Die Briten hatten Anfang der 1960er Jahre den Abzug ihrer Truppen östlich von Suez angekündigt. Bahrain erklärte am 15. August 1971 seine Unabhängigkeit. Anlass war die Unterzeichnung eines Freundschaftsvertrags mit Großbritannien, der frühere Vereinbarungen zwischen beiden Seiten aufhob. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.83.a:1 "Akzeptieren"
ron_decolonizationcountry.83.b:1 "Zerschmettere sie"

ron_decolonizationcountry.84.t:0 "Proklamation der Unabhängigkeit Bangladeschs"
ron_decolonizationcountry.84.d:0 "Die Unabhängigkeit Bangladeschs wurde am 26. März 1971 zu Beginn des Bangladeschischen Unabhängigkeitskrieges von Bangabandhu Sheikh Mujibur Rahman ausgerufen. Am 27. März wurde die Erklärung von Major Ziaur Rahman im Radio verbreitet (die Erklärung von Sheikh Mujibur Rahman und die Radioansprache von Ziaur Rahman wurden Ende März 1971 in der internationalen Presse weit verbreitet). Am 10. April erließ die provisorische Regierung Bangladeschs auf Grundlage der vorherigen Erklärung eine Proklamation und verabschiedete eine Übergangsverfassung für die Unabhängigkeitsbewegung. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.84.a:1 "Akzeptieren"
ron_decolonizationcountry.84.b:1 "Zerschmettere sie"

ron_decolonizationcountry.85.t:0 "Katar erklärt seine Unabhängigkeit"
ron_decolonizationcountry.85.d:0 "Katar erklärte am 1. September 1971 seine Unabhängigkeit und wurde am 3. September ein unabhängiger Staat. Als Ahmad bin Ali die offizielle Erklärung von seiner Schweizer Villa statt von seinem Palast in Doha aus verkündete, waren viele Katarer überzeugt, dass es Zeit für einen Führungswechsel war. Am 22. Februar 1972 setzte Khalifa bin Hamad Ahmad bin Ali während eines Jagdausflugs in den Iran ab. Khalifa bin Hamad genoss die stillschweigende Unterstützung der Al Thani und Großbritanniens sowie die politische, finanzielle und militärische Unterstützung Saudi-Arabiens. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.85.a:1 "Akzeptieren"
ron_decolonizationcountry.85.b:1 "Zerschmettere sie"

ron_decolonizationcountry.86.t:0 "Die Vereinigten Arabischen Emirate erklären ihre Unabhängigkeit"
ron_decolonizationcountry.86.d:0 "1966 war die britische Regierung zu dem Schluss gekommen, dass sie es sich nicht länger leisten konnte, das Gebiet der heutigen Vereinigten Arabischen Emirate zu regieren. Im britischen Parlament wurde intensiv beraten, und mehrere Abgeordnete argumentierten, die Royal Navy sei nicht in der Lage, die Trucial-Scheichtümer zu verteidigen. Denis Healey, der damalige britische Verteidigungsminister, berichtete, die britischen Streitkräfte seien stark überfordert und in mancher Hinsicht gefährlich unterausgerüstet, um die Scheichtümer zu verteidigen. Am 16. Januar 1968 verkündete der britische Premierminister Harold Wilson die Beendigung der Vertragsbeziehungen mit den sieben Trucial-Scheichtümern, die zusammen mit Bahrain und Katar unter britischem Schutz gestanden hatten. Die britische Entscheidung zum Rückzug wurde im März 1971 von Premierminister Edward Heath bekräftigt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.86.a:1 "Akzeptieren"
ron_decolonizationcountry.86.b:1 "Zerschmettere sie"

ron_decolonizationcountry.88.t:0 "Bahamas erklärt seine Unabhängigkeit"
ron_decolonizationcountry.88.d:0 "Das britische Oberhaus stimmte am 22. Juni 1973 für die Unabhängigkeit der Bahamas. Prinz Charles übergab Premierminister Lynden Pindling die offiziellen Dokumente und erklärte die Bahamas am 10. Juli 1973 offiziell zu einer vollständig unabhängigen Nation. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.88.a:1 "Akzeptieren"
ron_decolonizationcountry.88.b:1 "Zerschmettere sie"

ron_decolonizationcountry.89.t:0 "Guinea-Bissau erklärt seine Unabhängigkeit"
ron_decolonizationcountry.89.d:0 "Der Unabhängigkeitskrieg von Guinea-Bissau war ein bewaffneter Unabhängigkeitskonflikt, der zwischen 1963 und 1974 in Portugiesisch-Guinea tobte. Er wurde zwischen Portugal und der Afrikanischen Partei für die Unabhängigkeit von Guinea und Kap Verde ausgetragen, einer bewaffneten Unabhängigkeitsbewegung, die von Kuba und der Sowjetunion unterstützt wurde. Aufgrund der großen Zahl an Soldaten und Material, die in diesem langen, größtenteils von Guerillakämpfen geprägten Krieg eingesetzt wurden, und der internen politischen Unruhen, die er in Portugal auslöste, wird der Krieg gemeinhin als „Vietnam Portugals“ bezeichnet. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.89.a:1 "Akzeptieren"
ron_decolonizationcountry.89.b:1 "Zerschmettere sie"

ron_decolonizationcountry.90.t:0 "Grenada erklärt seine Unabhängigkeit"
ron_decolonizationcountry.90.d:0 "Von 1958 bis 1962 war Grenada Teil der Westindischen Föderation. Nach dem Zerfall der Föderation erhielt Grenada am 3. März 1967 als assoziierter Staat volle Autonomie in seinen inneren Angelegenheiten. Herbert Blaize von der Grenada National Party (GNP) war von März bis August 1967 der erste Premierminister des assoziierten Staates Grenada. Eric Gairy amtierte von August 1967 bis Februar 1974 als Premierminister. Die Unabhängigkeit wurde am 7. Februar 1974 unter der Führung von Eric Gairy gewährt, der der erste Premierminister Grenadas wurde. Grenada entschied sich für den Verbleib im britischen Commonwealth und behielt Königin Elisabeth als Monarchin, die vor Ort durch einen Generalgouverneur vertreten wurde. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.90.a:1 "Akzeptieren"
ron_decolonizationcountry.90.b:1 "Zerschmettere sie"

ron_decolonizationcountry.91.t:0 "Angola erklärt seine Unabhängigkeit"
ron_decolonizationcountry.91.d:0 "Der angolanische Unabhängigkeitskrieg, in Angola Luta Armada de Libertação Nacional („Bewaffneter Kampf der nationalen Befreiung“) genannt, begann als Aufstand gegen den Zwangsanbau von Baumwolle und entwickelte sich zu einem Kampf zwischen drei nationalistischen und einer separatistischen Bewegung um die Kontrolle der portugiesischen Überseeprovinz Angola. Der Krieg endete mit dem Sturz des portugiesischen Estado-Novo-Regimes durch einen linken Militärputsch in Lissabon im April 1974. Das neue Regime stellte daraufhin alle militärischen Aktionen in den afrikanischen Kolonien ein und erklärte, ihnen unverzüglich die Unabhängigkeit zu gewähren. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.91.a:1 "Akzeptieren"
ron_decolonizationcountry.91.b:1 "Zerschmettere sie"

ron_decolonizationcountry.92.t:0 "Kap Verde erklärt seine Unabhängigkeit"
ron_decolonizationcountry.92.d:0 "Die armen und von Dürre geplagten Kapverden haben heute ihre Unabhängigkeit erlangt und damit 515 Jahre portugiesischer Herrschaft beendet. Als um Mitternacht die Geburtsstunde des 44. unabhängigen Staates Afrikas markiert wurde, begann ein Marathon der Feierlichkeiten mit Einheimischen, mehreren tausend Besuchern und portugiesischen Soldaten. Er dauerte die letzte Nacht und den heutigen Tag an. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.92.a:1 "Akzeptieren"
ron_decolonizationcountry.92.b:1 "Zerschmettere sie"

ron_decolonizationcountry.93.t:0 "Die Komoren erklären ihre Unabhängigkeit"
ron_decolonizationcountry.93.d:0 "Nachdem die Auswirkungen des Zweiten Weltkriegs es den Franzosen erschwerten, ihre Kolonien in Übersee zu unterhalten, wurden die Komoren zu einem französischen Überseegebiet und nicht zu einer französischen Kolonie, was für die Franzosen höhere Kosten verursacht hätte. Den Komoren wurde 1961 innere Autonomie zugestanden, die jedoch nach einem Referendum im Dezember 1974 aufgehoben wurde. Moheli, Anjouan und Groß-Komoren stimmten für ihre Unabhängigkeit, während Mayotte für den Verbleib unter französischer Herrschaft stimmte. Eine Resolution des komorischen Parlaments vom 6. Juli 1975 erklärte die Unabhängigkeit aller Komoreninseln von Frankreich, einschließlich Mayottes Ahmed Abdallah zum Präsidenten des Archipels. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.93.a:1 "Akzeptieren"
ron_decolonizationcountry.93.b:1 "Zerschmettere sie"

ron_decolonizationcountry.94.t:0 "Mosambik erklärt seine Unabhängigkeit"
ron_decolonizationcountry.94.d:0 "Der mosambikanische Unabhängigkeitskrieg war ein bewaffneter Konflikt zwischen den Guerillakräften der Mosambikanischen Befreiungsfront (FRELIMO) und Portugal. Der Krieg begann offiziell am 25. September 1964 und endete mit einem Waffenstillstand am 8. September 1974. 1975 mündete er in einer ausgehandelten Unabhängigkeit. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.94.a:1 "Akzeptieren"
ron_decolonizationcountry.94.b:1 "Zerschmettere sie"

ron_decolonizationcountry.95.t:0 "Unabhängigkeitsgesetz von Papua-Neuguinea"
ron_decolonizationcountry.95.d:0 "Der Papua-Neuguinea-Unabhängigkeitsgesetz von 1975 wurde vom australischen Parlament verabschiedet. Es ersetzte den Papua-Neuguinea-Gesetz von 1949 und änderte den Status des Territoriums Papua-Neuguinea in den eines unabhängigen Papua-Neuguineas. Das Gesetz legte den 16. September 1975 als Datum der Unabhängigkeit Papua-Neuguineas fest und beendete alle verbleibenden souveränen und gesetzgebenden Befugnisse Australiens über das Land. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.95.a:1 "Akzeptieren"
ron_decolonizationcountry.95.b:1 "Zerschmettere sie"

ron_decolonizationcountry.96.t:0 "São Tomé und Príncipe erklärt seine Unabhängigkeit"
ron_decolonizationcountry.96.d:0 "In den späten 1950er Jahren, als andere Schwellenländer auf dem afrikanischen Kontinent ihre Unabhängigkeit forderten, gründete eine kleine Gruppe von São Tomé und Príncipe die Bewegung zur Befreiung von São Tomé und Príncipe (MLSTP), die schließlich im nahegelegenen Gabun Fuß fasste. In den 1960er Jahren gewann diese Bewegung an Dynamik, und nach dem Sturz der Caetano-Diktatur in Portugal im April 1974 überschlugen sich die Ereignisse. Das neue portugiesische Regime war entschlossen, seine Überseekolonien aufzulösen. Im November 1974 trafen sich ihre Vertreter mit der MLSTP in Algier und arbeiteten ein Abkommen zur Übertragung der Souveränität aus. Nach einer Zeit der Übergangsregierung erlangten São Tomé und Príncipe am 12. Juli 1975 ihre Unabhängigkeit und wählten den Generalsekretär der MLSTP, Manuel Pinto da Costa, zum ersten Präsidenten. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.96.a:1 "Akzeptieren"
ron_decolonizationcountry.96.b:1 "Zerschmettere sie"

ron_decolonizationcountry.97.t:0 "Suriname erklärt seine Unabhängigkeit"
ron_decolonizationcountry.97.d:0 "1954 wurde Suriname neben den Niederländischen Antillen und den Niederlanden Teil des Königreichs der Niederlande. Dabei behielten die Niederlande die Kontrolle über die Verteidigung und die Außenpolitik. 1974 begann die lokale Regierung unter Führung der Nationalen Partei Surinams (NPS) (deren Mitglieder größtenteils aus Kreolen, d. h. ethnisch Afrikanern oder gemischt afro-europäischen Mitgliedern bestanden) Verhandlungen mit der niederländischen Regierung, die zur vollständigen Unabhängigkeit führten, die am 25. November 1975 gewährt wurde. Ein großer Teil der surinamischen Wirtschaft wurde im ersten Jahrzehnt nach der Unabhängigkeit durch Entwicklungshilfe der niederländischen Regierung finanziert. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.97.a:1 "Akzeptieren"
ron_decolonizationcountry.97.b:1 "Zerschmettere sie"

ron_decolonizationcountry.98.t:0 "Die Seychellen erklären ihre Unabhängigkeit"
ron_decolonizationcountry.98.d:0 "Erst 1964 entstanden neue politische Bewegungen. In diesem Jahr wurde die Seychelles People&#39;s United Party (SPUP, später Seychelles People&#39;s Progressive Front, SPPF) gegründet. Unter der Führung von France-Albert René kämpften sie für Sozialismus und Unabhängigkeit von Großbritannien. Die im selben Jahr gegründete Seychelles Democratic Party (SDP) des verstorbenen James Mancham vertrat dagegen Geschäftsleute und Plantagenbesitzer und strebte eine engere Integration mit Großbritannien an. 1966 fanden Wahlen statt, die die SDP gewann. Im März 1970 trafen sich koloniale und politische Vertreter der Seychellen in London zu einer verfassungsgebenden Versammlung. Die Seychelles Democratic Party (SDP) von James Mancham befürwortete eine engere Integration mit Großbritannien, während die Seychelles People&#39;s United Party (SPUP) von France-Albert René für die Unabhängigkeit eintrat. Weitere Wahlen im November 1970 brachten eine neue Verfassung mit Mancham als Ministerpräsident in Kraft. Im April 1974 fanden weitere Wahlen statt, bei denen beide großen politischen Parteien für die Unabhängigkeit kämpften. Im Anschluss an diese Wahl führten Verhandlungen mit den Briten zu einem Abkommen, durch das die Seychellen am 29. Juni 1976 eine unabhängige Republik innerhalb des Commonwealth wurden. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.98.a:1 "Akzeptieren"
ron_decolonizationcountry.98.b:1 "Zerschmettere sie"

ron_decolonizationcountry.99.t:0 "Dschibuti erklärt seine Unabhängigkeit"
ron_decolonizationcountry.99.d:0 "Am 8. Mai 1977 fand im französischen Afar- und Issa-Gebiet ein Unabhängigkeitsreferendum statt, parallel zu den Wahlen zur verfassunggebenden Versammlung. Anders als bei den manipulierten Volksabstimmungen von 1958 und 1967 erlangte das Gebiet diesmal am 27. Juni 1977 als Dschibuti seine Unabhängigkeit. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.99.a:1 "Akzeptieren"
ron_decolonizationcountry.99.b:1 "Zerschmettere sie"

ron_decolonizationcountry.100.t:0 "Tuvalu erklärt seine Unabhängigkeit"
ron_decolonizationcountry.100.d:0 "Die Gründung der Vereinten Nationen nach dem Zweiten Weltkrieg führte dazu, dass sich der Sonderausschuss der Vereinten Nationen für Entkolonialisierung zu einem Entkolonialisierungsprozess verpflichtete; in der Folgezeit beschritten die britischen Kolonien im Pazifik den Weg zur Selbstbestimmung. 1974 wurde in der Kolonie Gilbert- und Elliceinseln durch eine Verfassungsänderung eine Ministerialregierung eingeführt. Im selben Jahr fanden Parlamentswahlen statt, und 1974 wurde in einem Referendum entschieden, ob die Gilbert- und die Elliceinseln jeweils eine eigene Verwaltung erhalten sollten. Infolge des Referendums erfolgte die Trennung in zwei Schritten. Die Tuvaluan Order 1975, die am 1. Oktober 1975 in Kraft trat, erkannte Tuvalu als eigenständiges britisches Proviantgebiet mit eigener Regierung an. Der zweite Schritt erfolgte am 1. Januar 1976, als aus dem öffentlichen Dienst der Kolonie Gilbert- und Elliceinseln separate Verwaltungen geschaffen wurden. Am 27. August 1977 fanden Wahlen zum Repräsentantenhaus der britischen Kolonie Tuvalu statt. Toaripi Lauti wurde am 1. Oktober 1977 zum Chief Minister des Repräsentantenhauses der Kolonie Tuvalu ernannt. Das Repräsentantenhaus wurde im Juli 1978 aufgelöst, und die Regierung Toaripi Lautis blieb bis zu den Wahlen 1981 geschäftsführend. Am 1. Oktober 1978, als Tuvalu seine Unabhängigkeit erlangte, wurde Toaripi Lauti erster Premierminister. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.100.a:1 "Akzeptieren"
ron_decolonizationcountry.100.b:1 "Zerschmettere sie"

ron_decolonizationcountry.101.t:0 "Dominica erklärt seine Unabhängigkeit"
ron_decolonizationcountry.101.d:0 "Bis 1958 wurde Dominica als Teil der Britischen Inseln über dem Winde regiert. Die karibischen Inseln strebten von 1958 bis 1962 die Unabhängigkeit an, und Dominica wurde 1958 eine Provinz der kurzlebigen Westindischen Föderation. Nach der Auflösung der Föderation 1962 wurde Dominica 1967 ein assoziierter Staat des Vereinigten Königreichs und übernahm formell die Verantwortung für seine inneren Angelegenheiten. Am 3. November 1978 wurde dem Commonwealth Dominica unter Premierminister Patrick John die Unabhängigkeit als Republik gewährt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.101.a:1 "Akzeptieren"
ron_decolonizationcountry.101.b:1 "Zerschmettere sie"

ron_decolonizationcountry.102.t:0 "Die Salomonen erklären ihre Unabhängigkeit"
ron_decolonizationcountry.102.d:0 "Das Land wurde 1975 offiziell in Salomonen umbenannt und am 7. Juli 1978 unabhängig. Peter Kenilorea, der die Salomonen in die Unabhängigkeit geführt hatte, wurde ihr erster Premierminister (1978–1981) und diente von 1984 bis 1986 eine zweite Amtszeit. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.102.a:1 "Akzeptieren"
ron_decolonizationcountry.102.b:1 "Zerschmettere sie"

ron_decolonizationcountry.103.t:0 "St. Lucia erklärt seine Unabhängigkeit"
ron_decolonizationcountry.103.d:0 "Die Insel war bis 1959 Mitglied der Föderation der Inseln über dem Winde. 1959 trat St. Lucia der Westindischen Föderation bei, in deren Rahmen den britischen Karibikstaaten die Unabhängigkeit als Föderation vorgeschlagen wurde. Meinungsverschiedenheiten zwischen den größeren Mitgliedern führten 1962 zur Auflösung der Föderation, die daraufhin allein die Unabhängigkeit anstrebte. Mit dem Westindischen Gesetz von 1967 erhielt St. Lucia als einer der Föderierten Staaten der Antillen eine neue Verfassung, die dem Land volle interne Selbstverwaltung unter allgemeinem Wahlrecht gewährte. Am 22. Februar 1979 erlangte St. Lucia als konstitutionelle Monarchie und Mitglied des Commonwealth seine Unabhängigkeit. John Compton von der United Workers Party (UWP) wurde sein erster Premierminister und Sir Allen Montgomery Lewis sein erster Generalgouverneur. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.103.a:1 "Akzeptieren"
ron_decolonizationcountry.103.b:1 "Zerschmettere sie"

ron_decolonizationcountry.104.t:0 "St. Vincent und die Grenadinen erklären ihre Unabhängigkeit"
ron_decolonizationcountry.104.d:0 "St. Vincent und die Grenadinen waren Mitglied der Westindischen Föderation. Nach deren Auflösung 1962 und dem Streben der größeren karibischen Länder in die Unabhängigkeit begann in St. Vincent der Übergang zur Unabhängigkeit. Zunächst versuchten die kleineren ostkaribischen Länder, eine eigene Föderation zu gründen, doch die Verhandlungen zwischen ihnen blieben erfolglos. Das allgemeine Wahlrecht für Erwachsene war bereits 1951 eingeführt worden (und der Exekutivrat wurde teilweise gewählt). Die innere Selbstverwaltung wurde 1969 erreicht, die volle Unabhängigkeit im Oktober 1979. Am 27. Oktober 1979 erlangten St. Vincent und die Grenadinen nach einem Referendum unter Milton Cato als letzte der Inseln über dem Winde die Unabhängigkeit. Die Unabhängigkeit erfolgte am 10. Jahrestag der Anerkennung St. Vincents als assoziierter Staat. Milton Cato wurde der erste Premierminister und Sir Syndey Gun-Munro der erste Generalgouverneur. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.104.a:1 "Akzeptieren"
ron_decolonizationcountry.104.b:1 "Zerschmettere sie"

ron_decolonizationcountry.105.t:0 "Kiribati erklärt seine Unabhängigkeit"
ron_decolonizationcountry.105.d:0 "Die Gründung der Vereinten Nationen nach dem Zweiten Weltkrieg führte dazu, dass sich der Sonderausschuss der Vereinten Nationen für Entkolonialisierung zu einem Entkolonialisierungsprozess verpflichtete; in der Folgezeit beschritten die britischen Kolonien im Pazifik den Weg zur Selbstbestimmung. Infolge des Referendums über die Selbstbestimmung der Ellice-Inseln im Jahr 1974 erfolgte die Abspaltung in zwei Schritten. Die Tuvaluan Order 1975 des Privy Council, die am 1. Oktober 1975 in Kraft trat, erkannte Tuvalu als separates britisches Proviantgebiet mit eigener Regierung an. Die zweite Phase erfolgte am 1. Januar 1976, als aus dem öffentlichen Dienst der Kolonien Gilbert und Ellice-Inseln separate Verwaltungen geschaffen wurden. Die Gilbert-Inseln erhielten 1977 die interne Selbstverwaltung und hielten im Februar 1978 Parlamentswahlen ab, bei denen Ieremia Tabai im Alter von nur 27 Jahren zur Ministerpräsidentin gewählt wurde. Kiribati erlangte am 12. Juli 1979 durch die Kiribati Independence Order 1979 des Privy Council seine Unabhängigkeit. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.105.a:1 "Akzeptieren"
ron_decolonizationcountry.105.b:1 "Zerschmettere sie"

ron_decolonizationcountry.106.t:0 "Islamische Revolution"
ron_decolonizationcountry.106.d:0 "Die iranische Revolution war eine Reihe von Ereignissen, die im Sturz der Pahlavi-Dynastie unter Schah Mohammad Reza Pahlavi und der Ersetzung seiner Regierung durch eine islamische Republik unter Großajatollah Ruhollah Khomeini, einem Anführer einer der revoltierenden Fraktionen, gipfelten. Die Revolution wurde von verschiedenen islamistischen und linken Organisationen sowie Studentenbewegungen unterstützt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.106.a:1 "Allahu Akbar"
ron_decolonizationcountry.106.b:1 "Unsere Loyalität gilt der königlichen Familie"

ron_decolonizationcountry.107.t:0 "Vanuatu erklärt seine Unabhängigkeit"
ron_decolonizationcountry.107.d:0 "Der vielleicht letzte politische Anstoß zur Unabhängigkeit war die zentrale Frage des Landbesitzes, die in den 1960er Jahren aufkam. Nach den alten Bräuchen der Ni-Vanuatu wurde Land von den derzeitigen Verwaltern treuhänderisch für zukünftige Generationen verwaltet; die Europäer betrachteten es eher als Handelsware und besaßen etwa 30 % der Landesfläche. Dieses in europäischem Besitz befindliche Land war größtenteils für den Kokosnussanbau gerodet worden, doch als sie begannen, mehr Land für den Kokosnussanbau zu roden, brachen in Santo und Malekula Proteste aus, angeführt von Jimmy Stevens und seiner Kastom-Bewegung „Nagriamel“. Die erste politische Partei wurde Anfang der 1970er Jahre gegründet und hieß ursprünglich New Hebrides National Party. Einer der Gründer war Walter Lini, ein anglikanischer Priester, der später Premierminister wurde. Die Partei, die 1974 in Vanua&#39;aku Party umbenannt wurde, drängte auf Unabhängigkeit. 1975 wurde eine Repräsentantenversammlung eingerichtet, die jedoch 1977 nach Forderungen nach der Absetzung von Regierungsbeamten und sofortiger Unabhängigkeit aufgelöst wurde. 1979 wurden ausländische Eigentümer enteignet und erhielten von ihren eigenen Regierungen Entschädigungen. Zudem wurde ein Datum für die vollständige Unabhängigkeit festgelegt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.107.a:1 "Akzeptieren"
ron_decolonizationcountry.107.b:1 "Zerschmettere sie"

ron_decolonizationcountry.108.t:0 "Rhodesiens einseitige Unabhängigkeitserklärung"
ron_decolonizationcountry.108.d:0 "Die Einseitige Unabhängigkeitserklärung (UDI) war eine Erklärung des rhodesischen Kabinetts vom 11. November 1965. Darin verkündete das Kabinett, dass sich Rhodesien, ein britisches Territorium im südlichen Afrika, das sich seit 1923 selbst regiert hatte, nun als unabhängiger souveräner Staat betrachtete. Sie war der Höhepunkt eines langwierigen Streits zwischen der britischen und der rhodesischen Regierung über die Bedingungen, unter denen Rhodesien seine vollständige Unabhängigkeit erlangen könnte. Sie war der erste einseitige Bruch mit dem Vereinigten Königreich durch eine seiner Kolonien seit der Unabhängigkeitserklärung der Vereinigten Staaten im Jahr 1776. Großbritannien, der Commonwealth und die Vereinten Nationen erklärten Rhodesiens UDI für illegal, und es wurden erstmals in der Geschichte der UNO Wirtschaftssanktionen gegen die abtrünnige Kolonie verhängt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.108.a:1 "Akzeptieren"
ron_decolonizationcountry.108.b:1 "Zerschmettere sie"

ron_decolonizationcountry.109.t:0 "Antigua und Barbuda erklärt seine Unabhängigkeit"
ron_decolonizationcountry.109.d:0 "Als Teil der Kolonie Inseln über dem Winde waren Antigua und Barbuda von 1958 bis 1962 Teil der kurzlebigen Westindischen Föderation. Am 27. Februar 1967 wurden Antigua und Barbuda anschließend ein assoziierter Staat des Vereinigten Königreichs mit voller innerer Autonomie. Die 1970er Jahre waren geprägt von Diskussionen über die Zukunft der Inseln und der Rivalität zwischen Vere Bird von der Antigua Labour Party (ALP) (Premierminister von 1967 bis 1971 und 1976 bis 1981) und der Progressive Labour Movement (PLM) von George Walter (Premierminister von 1971 bis 1976). Schließlich erlangten Antigua und Barbuda am 1. November 1981 die volle Unabhängigkeit; Vere Bird wurde Premierminister des neuen Landes. Das Land entschied sich für den Verbleib im Commonwealth, behielt Königin Elisabeth als Staatsoberhaupt und den letzten Gouverneur, Sir Wilfred Jacobs, als Generalgouverneur. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.109.a:1 "Akzeptieren"
ron_decolonizationcountry.109.b:1 "Zerschmettere sie"

ron_decolonizationcountry.110.t:0 "Belize erklärt seine Unabhängigkeit"
ron_decolonizationcountry.110.d:0 "Seit ihrer Entstehung im Jahr 1950 waren Selbstverwaltung und Unabhängigkeit die Ziele der belizischen nationalistischen Bewegung. 1960 verabschiedeten die Vereinten Nationen eine historische Resolution, die die Unabhängigkeit kolonialer Gebiete und Völker uneingeschränkt unterstützte. Viele Länder folgten dem Kolonialismus und erlangten ihre Unabhängigkeit, manche nach Jahren bewaffneten Kampfes. In der Karibik erlangten Jamaika sowie Trinidad und Tobago 1962 ihre Unabhängigkeit. Belize blieb jedoch eine britische Kolonie, was größtenteils darauf zurückzuführen war, dass die Regierung Guatemalas auf ihrem Landanspruch auf Belize beharrte. Guatemala drohte mit Gewalt gegen Belize, falls das Land unabhängig würde, ohne seinen Anspruch zunächst zu begleichen. Viele Jahre lang überließ die belizische Regierung die Angelegenheiten weitgehend den Briten, die laut Verfassung für die Außenpolitik und die Verteidigung Belizes verantwortlich waren. Nach 14-jährigen Verhandlungen verlangte die guatemaltekische Regierung 1975 als Preis für die Rücknahme ihres Anspruchs die Abtretung eines großen Teils belizischen Territoriums. Die Regierung unter Premierminister George Price, dem Vorsitzenden der Peoples United Party, beschloss, eine Kampagne für die Unabhängigkeit zu führen, diesmal auf internationaler Ebene, um Unterstützung für ihren Anspruch auf vollständige Unabhängigkeit mit intaktem und sicherem Territorium zu gewinnen. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.110.a:1 "Akzeptieren"
ron_decolonizationcountry.110.b:1 "Zerschmettere sie"

ron_decolonizationcountry.111.t:0 "St. Kitts und Nevis erklärt seine Unabhängigkeit"
ron_decolonizationcountry.111.d:0 "Nach einer kurzen Zeit als Teil der Westindischen Föderation (1958–1962) wurden die Inseln 1967 ein assoziierter Staat mit voller innerer Autonomie. Sowohl Nevis als auch Anguilla waren mit der Dominanz von St. Kitts in der Föderation unzufrieden, und Anguilla erklärte 1967 einseitig seine Unabhängigkeit. 1971 erlangte Großbritannien die volle Kontrolle über Anguilla zurück, und 1980 erfolgte die formelle Abspaltung. Anschließend richtete sich die Aufmerksamkeit auf Nevis, wobei die Nevis Reformation Party versuchte, die Interessen der kleineren Insel in einem zukünftigen unabhängigen Staat zu wahren. Schließlich einigte man sich darauf, dass die Insel ein gewisses Maß an Autonomie mit eigenem Premierminister und eigener Versammlung sowie das verfassungsmäßig geschützte Recht auf einseitige Abspaltung erhalten sollte, wenn ein Referendum über die Unabhängigkeit mit einer Zweidrittelmehrheit dafür ausfiele. St. Kitts und Nevis erlangten am 19. September 1983 ihre volle Unabhängigkeit. Kennedy Simmonds von der PAM, seit 1980 Premierminister, wurde der erste Premierminister des Landes. St. Kitts und Nevis entschied sich für den Verbleib im britischen Commonwealth und behielt Königin Elisabeth als Monarchin, vertreten durch einen Generalgouverneur vor Ort. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.111.a:1 "Akzeptieren"
ron_decolonizationcountry.111.b:1 "Zerschmettere sie"

ron_decolonizationcountry.112.t:0 "Mikronesien strebt nach Unabhängigkeit"
ron_decolonizationcountry.112.d:0 "Die Vereinigten Staaten haben ein Abkommen unterzeichnet, das den Föderierten Staaten von Mikronesien, einer Inselgruppe im Zentralpazifik, zu der auch der ehemalige große japanische Marinestützpunkt Truk gehört, begrenzte Unabhängigkeit gewährt. Der Pakt und die dazugehörigen Dokumente wurden am Freitag in einer Zeremonie im Westin Ilikai Hotel von Fred M. Zeder, Präsident Reagans Vertreter in den Statusverhandlungen mit den Inseln, und Andon Amaraich, Außenminister der Föderierten Staaten, unterzeichnet. Sie gewähren den Vereinigten Staaten militärische Rechte auf den Inseln, belassen den Pazifikstaat jedoch in allen inneren und äußeren Angelegenheiten mit Ausnahme der Verteidigung autonom. Als Gegenleistung für die militärischen Zugeständnisse wird Washington diesen landschaftlich reizvollen, aber wirtschaftlich armen Inseln über einen Zeitraum von 15 Jahren finanzielle Zuschüsse in Höhe von rund einer Milliarde Dollar gewähren. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.112.a:1 "Akzeptieren"
ron_decolonizationcountry.112.b:1 "Zerschmettere sie"

ron_decolonizationcountry.113.t:0 "Palästinensische Unabhängigkeitserklärung"
ron_decolonizationcountry.113.d:0 "Die Palästinensische Unabhängigkeitserklärung wurde vom palästinensischen Dichter Mahmud Darwisch verfasst und am 15. November 1988 von Jassir Arafat verkündet. Zuvor war sie vom Palästinensischen Nationalrat, dem gesetzgebenden Organ der Palästinensischen Befreiungsorganisation (PLO), mit 253 Ja-Stimmen, 46 Nein-Stimmen und 10 Enthaltungen angenommen worden. Die Erklärung wurde in der Abschlusssitzung des 19. Palästinensischen Nationalrats unter stehenden Ovationen verlesen. Nach Abschluss der Verlesung der Erklärung nahm Arafat als Vorsitzender der Palästinensischen Befreiungsorganisation den Titel „Präsident Palästinas“ an. Im April 1989 wählte der Zentralrat der PLO Jassir Arafat zum ersten Präsidenten des Staates Palästina. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.113.a:1 "Akzeptieren"
ron_decolonizationcountry.113.b:1 "Zerschmettere sie"

ron_decolonizationcountry.114.t:0 "Ungarn erklärt seine Unabhängigkeit"
ron_decolonizationcountry.114.d:0 "Die kommunistische Herrschaft in der Volksrepublik Ungarn endete 1989 mit einem friedlichen Übergang zu einem demokratischen Regime. Obwohl die ungarische Revolution von 1956 1957 von den sowjetischen Streitkräften niedergeschlagen wurde, blieb Ungarn ein kommunistisches Land. Mit der Schwächung der Sowjetunion Ende der 1980er Jahre zerfiel der Ostblock. Die Ereignisse in Ungarn waren Teil der Revolutionen von 1989, die im Ungarischen als „Rendszerváltás“ bekannt sind. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.114.a:1 "Akzeptieren"
ron_decolonizationcountry.114.b:1 "Zerschmettere sie"

ron_decolonizationcountry.115.t:0 "Erklärung der staatlichen Souveränität der Belarussischen SSR"
ron_decolonizationcountry.115.d:0 "Die Erklärung der staatlichen Souveränität der Weißrussischen Sozialistischen Sowjetrepublik war ein formelles Dokument des Obersten Sowjets von Belarus, mit dem die Unabhängigkeit des Landes von der Sowjetunion bekräftigt wurde. Die Erklärung wurde am 27. Juli 1990 verabschiedet und leitete am 25. August 1991 den Prozess zur endgültigen Unabhängigkeit von Belarus ein. Bis 1996 wurde der 27. Juli in Belarus als Unabhängigkeitstag gefeiert. Mit der Erklärung wurde die Weißrussische SSR de facto in Republik Belarus umbenannt und die Grundlage für alle Staatssymbole wie Nationalflagge und -wappen, Nationalhymne und Nationalfarben geschaffen. Außerdem wurden die Landeswährung, das Militär und die Landessprache festgelegt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.115.a:1 "Akzeptieren"
ron_decolonizationcountry.115.b:1 "Zerschmettere sie"

ron_decolonizationcountry.116.t:0 "Kroatien erklärt seine Unabhängigkeit"
ron_decolonizationcountry.116.d:0 "Die Unabhängigkeit Kroatiens begann mit dem Wandel des politischen Systems und den Verfassungsänderungen im Jahr 1990, durch die die Sozialistische Republik Kroatien in die Republik Kroatien umgewandelt wurde. Kroatien verkündete daraufhin die Weihnachtsverfassung und hielt 1991 das kroatische Unabhängigkeitsreferendum ab. Nachdem das Land im Juni 1991 offiziell seine Unabhängigkeit erklärt und seine Verbindung zu Jugoslawien aufgelöst hatte, verhängte es auf Drängen der Europäischen Gemeinschaft und der Konferenz für Sicherheit und Zusammenarbeit in Europa ein dreimonatiges Moratorium für diese Entscheidung. Während dieser Zeit begann der kroatische Unabhängigkeitskrieg. Am 8. Oktober 1991 brach das kroatische Parlament alle verbleibenden Bindungen zu Jugoslawien ab. Das Badinter-Schiedsgericht musste in dieser Angelegenheit entscheiden. Schließlich wurde die kroatische Unabhängigkeit im Januar 1992 international anerkannt, als sowohl die Europäische Wirtschaftsgemeinschaft als auch die Vereinten Nationen Kroatien diplomatisch anerkannten und das Land kurz darauf in die Vereinten Nationen aufgenommen wurde. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.116.a:1 "Akzeptieren"
ron_decolonizationcountry.116.b:1 "Zerschmettere sie"

ron_decolonizationcountry.117.t:0 "Zur Wiederherstellung der Unabhängigkeit der Republik Lettland"
ron_decolonizationcountry.117.d:0 "Die Erklärung „Zur Wiederherstellung der Unabhängigkeit der Republik Lettland“ wurde am 4. Mai 1990 vom Obersten Sowjet der Lettischen SSR verabschiedet. In der Erklärung hieß es, Lettland habe zwar 1940 durch die Annexion durch die Sowjetunion de facto seine Unabhängigkeit verloren, sei aber de jure ein souveräner Staat geblieben, da die Annexion verfassungswidrig gewesen sei und gegen den Willen des lettischen Volkes erfolgt sei. Daher erklärte die Erklärung den Molotow-Ribbentrop-Pakt und die sowjetische Besetzung Lettlands im Jahr 1940 für illegal. Sie stellte außerdem fest, dass die stark manipulierten Wahlen von 1940 illegal und verfassungswidrig waren und dass alle Handlungen der bei diesen Wahlen gewählten „Volkssaeima“ – einschließlich des Antrags auf Beitritt zur Sowjetunion am 21. Juli 1940 – ipso facto nichtig seien. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.117.a:1 "Akzeptieren"
ron_decolonizationcountry.117.b:1 "Zerschmettere sie"

ron_decolonizationcountry.118.t:0 "Akt zur Wiederherstellung des Staates Litauen"
ron_decolonizationcountry.118.d:0 "Das Gesetz zur Wiederherstellung des Staates Litauen oder Gesetz vom 11. März war eine Unabhängigkeitserklärung Litauens, die am 11. März 1990 verabschiedet und von allen Mitgliedern des Obersten Rates der Republik Litauen unter dem Vorsitz von Sąjūdis unterzeichnet wurde. Das Gesetz betonte die Wiederherstellung und rechtliche Kontinuität des Litauens der Zwischenkriegszeit, das von der UdSSR besetzt war und im Juni 1940 seine Unabhängigkeit verlor. Es war das erste Mal, dass ein besetzter Staat seine Unabhängigkeit von der zerfallenden Sowjetunion erklärte. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.118.a:1 "Akzeptieren"
ron_decolonizationcountry.118.b:1 "Zerschmettere sie"

ron_decolonizationcountry.119.t:0 "Namibia erklärt seine Unabhängigkeit"
ron_decolonizationcountry.119.d:0 "Bis zum 9. Februar 1990 hatte die verfassunggebende Versammlung eine Verfassung ausgearbeitet und verabschiedet. Am Unabhängigkeitstag am 21. März 1990 nahmen zahlreiche internationale Repräsentanten teil, darunter die Hauptakteure, UN-Generalsekretär Javier Pérez de Cuéllar und der südafrikanische Präsident FW de Klerk, die Namibia gemeinsam die formelle Unabhängigkeit verliehen. Sam Nujoma wurde im Beisein von Nelson Mandela (der kurz zuvor aus dem Gefängnis entlassen worden war) und Repräsentanten aus 147 Ländern, darunter 20 Staatschefs, als erster Präsident Namibias vereidigt. Am 1. März 1994 übergab Südafrika die Küstenenklave Walvis Bay und 12 vorgelagerte Inseln an Namibia. Zuvor hatten die beiden Regierungen drei Jahre lang bilateral verhandelt und im November 1992 eine gemeinsame Übergangsverwaltungsbehörde (JAA) zur Verwaltung des 780 km² großen Gebiets eingerichtet. Die friedliche Lösung dieses Territorialstreits wurde von der internationalen Gemeinschaft gelobt, da sie den Bestimmungen der Resolution 432 des UN-Sicherheitsrates (1978) entsprach, die Walvis Bay zum integralen Bestandteil Namibias erklärte. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.119.a:1 "Akzeptieren"
ron_decolonizationcountry.119.b:1 "Zerschmettere sie"

ron_decolonizationcountry.120.t:0 "Armenien erklärt seine Unabhängigkeit"
ron_decolonizationcountry.120.d:0 "Am 23. August 1990 verabschiedete der Oberste Rat die Erklärung der staatlichen Souveränität Armeniens, in der die Abschaffung der Armenischen SSR und die Gründung der Republik Armenien verkündet wurden. Am 21. September 1991 stimmte das armenische Volk in einem Referendum für die Unabhängigkeit von der Sowjetunion. Levon Ter-Petrosyan wurde im November 1991 zum ersten Präsidenten Armeniens gewählt. Am 21. Dezember 1991 trat Armenien der Gemeinschaft Unabhängiger Staaten (GUS) bei. Am 26. Dezember erlangte Armenien im Zuge der Auflösung der UdSSR offiziell seine Unabhängigkeit. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.120.a:1 "Akzeptieren"
ron_decolonizationcountry.120.b:1 "Zerschmettere sie"

ron_decolonizationcountry.121.t:0 "Aserbaidschan erklärt seine Unabhängigkeit"
ron_decolonizationcountry.121.d:0 "Infolge der von Michail Gorbatschow initiierten Glasnost-Politik wuchsen in verschiedenen Regionen der Sowjetunion soziale Unruhen und ethnische Konflikte, darunter in Bergkarabach, einer autonomen Region der Aserbaidschanischen SSR. Die Unruhen in Aserbaidschan, als Reaktion auf Moskaus Gleichgültigkeit gegenüber einem bereits erhitzten Konflikt, führten zu Forderungen nach Unabhängigkeit und Sezession, die in den Ereignissen des Schwarzen Januars in Baku gipfelten. Später im Jahr 1990 strich der Oberste Rat der Aserbaidschanischen SSR die Worte „sowjetsozialistisch“ aus dem Titel, verabschiedete die „Souveränitätserklärung der Aserbaidschanischen Republik“ und führte die Flagge der Demokratischen Republik Aserbaidschan wieder als Staatsflagge ein. Infolge des gescheiterten Putsches im August in Moskau verabschiedete der Oberste Rat Aserbaidschans am 18. Oktober 1991 eine Unabhängigkeitserklärung, die im Dezember 1991 in einem landesweiten Referendum bestätigt wurde, während die Sowjetunion am 26. Dezember 1991 offiziell aufhörte zu existieren. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.121.a:1 "Akzeptieren"
ron_decolonizationcountry.121.b:1 "Zerschmettere sie"

ron_decolonizationcountry.122.t:0 "Eritrea erklärt seine Unabhängigkeit"
ron_decolonizationcountry.122.d:0 "Eritrea wurde ab 1947 vom Äthiopischen Kaiserreich beansprucht, nachdem es 1890 von der italienischen Besatzung befreit worden war (beide Länder gehörten während des Zweiten Weltkriegs zu Italienisch-Ostafrika). Äthiopien und einige der überwiegend christlichen Teile Eritreas befürworteten eine Union mit Äthiopien, während überwiegend muslimische und andere Gebiete Eritreas einen separaten eritreischen Staat wollten. Um beide Seiten zufriedenzustellen, beschloss die Generalversammlung der Vereinten Nationen 1950, Eritrea mit Äthiopien zu föderieren, und Eritrea wurde 1952 ein Teilstaat der Föderation Äthiopien-Eritrea. Eritreas schwindende Autonomie und die wachsende Unzufriedenheit mit der äthiopischen Herrschaft führten 1961 zu einer Unabhängigkeitsbewegung unter Führung der Eritreischen Befreiungsfront (ELF). Äthiopien löste die Föderation im darauffolgenden Jahr auf und annektierte Eritrea. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.122.a:1 "Akzeptieren"
ron_decolonizationcountry.122.b:1 "Zerschmettere sie"

ron_decolonizationcountry.123.t:0 "Estland erklärt seine Unabhängigkeit"
ron_decolonizationcountry.123.d:0 "Am 30. März 1990 verabschiedete der Oberste Sowjet der Estnischen SSR eine Resolution zum Staatsstatus Estlands. Darin wurde erklärt, dass die Besetzung der Republik Estland durch die Sowjetunion am 17. Juni 1940 die Existenz der Republik Estland de jure nicht unterbrach. Der Oberste Sowjet erklärte die Staatsmacht der Estnischen SSR vom Zeitpunkt ihrer Gründung an für illegal und verkündete den Beginn der Wiederherstellung der Republik Estland. Es wurde eine Übergangszeit bis zur Bildung der verfassungsmäßigen Organe der Staatsmacht der Republik Estland angekündigt. Am 8. Mai desselben Jahres verabschiedete der Oberste Sowjet der ESSR ein Gesetz, das den Namen „Estnische Sozialistische Sowjetrepublik“ für ungültig erklärte. Außerdem wurde gemäß diesem Gesetz die Verwendung des Wappens, der Flagge und der Hymne der Estnischen SSR als Staatssymbole beendet und die Verfassung der unabhängigen Republik Estland von 1938 wiederhergestellt. Eine Woche später wurde das Gesetz über die Grundsätze der Übergangsverwaltung Estlands verabschiedet. Demnach wurde die Unterordnung der öffentlichen Behörden, der öffentlichen Verwaltung, der Gerichtsorgane und der Staatsanwaltschaft der Republik unter die zuständigen Behörden der UdSSR aufgehoben und sie vom entsprechenden System der UdSSR getrennt. Es wurde bekannt gegeben, dass die Beziehungen zwischen der Republik und der UdSSR nun auf dem Friedensvertrag von Tartu basieren, der am 2. Februar 1920 zwischen der Republik Estland und der RSFSR geschlossen wurde. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.123.a:1 "Akzeptieren"
ron_decolonizationcountry.123.b:1 "Zerschmettere sie"

ron_decolonizationcountry.124.t:0 "Kasachstan erklärt seine Unabhängigkeit"
ron_decolonizationcountry.124.d:0 "Kasachstan erklärte am 16. Dezember 1991 seine Unabhängigkeit und erlangte sie mit dem Zerfall der Sowjetunion am 26. Dezember 1991. Keiner der zentralasiatischen Staaten hatte vor 1991 jemals als echter Nationalstaat existiert. Obwohl viele Kasachen die Befreiung von Moskaus Kontrolle begrüßten, gab es keine Unabhängigkeitsbewegung, und Kasachstan war auf die Eigenstaatlichkeit nahezu unvorbereitet. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.124.a:1 "Akzeptieren"
ron_decolonizationcountry.124.b:1 "Zerschmettere sie"

ron_decolonizationcountry.125.t:0 "Kirgisistan erklärt seine Unabhängigkeit"
ron_decolonizationcountry.125.d:0 "Am 31. August 1991 verabschiedete der Oberste Rat der Republik Kirgisistan ein Gesetz zur „Erklärung der staatlichen Unabhängigkeit der Republik Kirgisistan“. Damit wurde die Kirgisische Republik zum unabhängigen Staat erklärt. Kirgisistan bekannte sich offiziell zu den Prinzipien des Völkerrechts und der Zusammenarbeit zwischen den Völkern. 1993 wurde die erste Verfassung verabschiedet, die in den letzten 20 Jahren mehrmals geändert wurde. Seit der Unabhängigkeit erlebte Kirgisistan zwei Revolutionen, die die ersten beiden Präsidenten ins Exil nach Russland bzw. Weißrussland trieben. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.125.a:1 "Akzeptieren"
ron_decolonizationcountry.125.b:1 "Zerschmettere sie"

ron_decolonizationcountry.126.t:0 "Moldawien erklärt seine Unabhängigkeit"
ron_decolonizationcountry.126.d:0 "Die Unabhängigkeitserklärung der Republik Moldau wurde nach dem Zerfall der Sowjetunion vom moldauischen Parlament verabschiedet. Das Dokument bekräftigt die „tausendjährige Geschichte“ und die „ununterbrochene Staatlichkeit“ innerhalb historischer und ethnischer Grenzen. Die Republik Moldau erhielt am 2. März 1992 mit der Aufnahme in die Vereinten Nationen die offizielle Anerkennung ihrer Eigenstaatlichkeit. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.126.a:1 "Akzeptieren"
ron_decolonizationcountry.126.b:1 "Zerschmettere sie"

ron_decolonizationcountry.127.t:0 "Mazedonien erklärt seine Unabhängigkeit"
ron_decolonizationcountry.127.d:0 "Am 8. September 1991 stimmten bei einem Referendum über 95,5 % der Wähler bei einer Wahlbeteiligung von 75,8 % für die Unabhängigkeit der Republik Mazedonien. „Liebe Bürgerinnen und Bürger Mazedoniens, erlauben Sie mir, Ihnen und allen Bürgerinnen und Bürgern Mazedoniens heute Abend zum freien, souveränen und unabhängigen Mazedonien zu gratulieren!“, sagte der damalige Präsident der Republik Mazedonien, Kiro Gligorov, am Abend des 8. September in seiner Ansprache an die Bürgerinnen und Bürger, die sich spontan auf dem Mazedonien-Platz in der Hauptstadt Skopje versammelt hatten, um das erfolgreiche Referendum zu feiern. Der Wille des Volkes nach einem unabhängigen Staat wurde mit der Bekanntgabe des Referendumsergebnisses am 18. September 1991 durch das erste Mehrparteienparlament Mazedoniens bekräftigt. Schließlich wurde am 25. September 1991 die Unabhängigkeitserklärung vom mazedonischen Parlament angenommen. Anschließend wurde am 17. November 1991 die neue Verfassung der Republik Mazedonien verabschiedet. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.127.a:1 "Akzeptieren"
ron_decolonizationcountry.127.b:1 "Zerschmettere sie"

ron_decolonizationcountry.128.t:0 "Slowenien erklärt seine Unabhängigkeit"
ron_decolonizationcountry.128.d:0 "Am 23. Dezember 1990 fand ein Referendum über die Unabhängigkeit Sloweniens statt, bei dem mehr als 88 % der slowenischen Bevölkerung für die Unabhängigkeit Sloweniens von Jugoslawien stimmten. Slowenien erlangte seine Unabhängigkeit durch die Verabschiedung der entsprechenden Gesetze am 25. Juni 1991. Am Morgen des nächsten Tages begann ein kurzer Zehntagekrieg, in dem die slowenischen Streitkräfte die militärische Einmischung Jugoslawiens erfolgreich zurückschlugen. Am Abend wurde die Unabhängigkeit in Ljubljana feierlich vom Parlamentspräsidenten France Bučar proklamiert. Der Zehntagekrieg dauerte bis zum 7. Juli 1991. Dann wurde unter Vermittlung der Europäischen Gemeinschaft das Brijuni-Abkommen geschlossen und die jugoslawische Nationalarmee begann mit ihrem Rückzug aus Slowenien. Am 26. Oktober 1991 verließ der letzte jugoslawische Soldat Slowenien. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.128.a:1 "Akzeptieren"
ron_decolonizationcountry.128.b:1 "Zerschmettere sie"

ron_decolonizationcountry.129.t:0 "Tadschikistan erklärt seine Unabhängigkeit"
ron_decolonizationcountry.129.d:0 "Am 24. August 1990 verabschiedete der Oberste Sowjet der Tadschikischen SSR auf seiner zweiten Tagung die Erklärung „Über die Souveränität der Tadschikischen SSR“. Diese Souveränität wurde jedoch bereits zu Zeiten der Sowjetunion erklärt. Trotzdem war die Erklärung das erste Dokument auf dem Weg zur tatsächlichen Unabhängigkeit Tadschikistans. Darin hieß es, dass „die Tadschikische SSR auf ihrem Gebiet alle politischen, wirtschaftlichen, sozialen und kulturellen Fragen selbstständig löse, zusätzlich zu den Fragen, die Tadschikistan freiwillig in die Zuständigkeit der UdSSR überträgt“. Laut dem ehemaligen Justizminister der Republik Tadschikistan, H. Hamidov, „war die Erklärung das erste Dokument auf dem Weg zur Unabhängigkeit. So ist es beispielsweise der fünfte Artikel, der dem Obersten Sowjet der Republik die Befugnis erteilt, die Inkraftsetzung von Dokumenten der UdSSR zu stoppen, die den gesetzlichen Bestimmungen Tadschikistans widersprechen.“ Nach dem gescheiterten Putsch des Staatlichen Komitees für den Ausnahmezustand (19.–21. August 1991) begannen Anhänger der konservativen Kräfte der KPdSU in Moskau in den Nationalrepubliken mit der Ausrufung der nationalen Unabhängigkeit. Dieses Ereignis führte zu Unzufriedenheit unter den nationaldemokratischen und islamischen Kräften in Tadschikistan, die gegen die Kommunistische Partei Tadschikistans kämpften, die das Land regierte. In Duschanbe begann eine Kundgebung von Anhängern der Oppositionsparteien mit der Forderung, eine außerordentliche Sitzung des Obersten Rates der Republik Tadschikistan einzuberufen, die Unabhängigkeit zu erklären, die Führung der Tadschikischen SSR zurückzutreten und die Aktivitäten der Kommunistischen Partei einzustellen. Der Oberste Sowjet der Tadschikischen SSR wurde zu einer außerordentlichen Sitzung einberufen. Am 9. September 1991 wurde auf der Sitzung des Shuro Oli (Obersten Rates) eine Resolution und Erklärung „Zur staatlichen Unabhängigkeit der Republik Tadschikistan“ verabschiedet. Tadschikistan erlangte am 26. Dezember 1991 im Zuge der Auflösung der Sowjetunion seine formelle Unabhängigkeit. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.129.a:1 "Akzeptieren"
ron_decolonizationcountry.129.b:1 "Zerschmettere sie"

ron_decolonizationcountry.130.t:0 "Turkmenistan erklärt seine Unabhängigkeit"
ron_decolonizationcountry.130.d:0 "Die Turkmenische Sozialistische Sowjetrepublik beteiligte sich an dem Referendum im März 1991, um die Sowjetunion als erneuerte Föderation, die Union Souveräner Staaten, zu erhalten. 98,26 % der Wähler stimmten dafür. Nach dem gescheiterten Putsch im August beschloss der Oberste Sowjet Turkmenistans, das Gesetz „Über die Unabhängigkeit und die Grundlagen des Staatssystems Turkmenistans“ zu verabschieden und erklärte damit am 27. Oktober 1991 de facto seine Unabhängigkeit. Nach dem Zerfall der UdSSR war die Turkmenische SSR eine der letzten Republiken der ehemaligen Sowjetunion, die ihre staatliche Souveränität proklamierte. 2018 beschloss die Regierung Turkmenistans, das Datum um genau einen Monat auf den 27. September zu verschieben. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.130.a:1 "Akzeptieren"
ron_decolonizationcountry.130.b:1 "Zerschmettere sie"

ron_decolonizationcountry.131.t:0 "Die Ukraine erklärt ihre Unabhängigkeit"
ron_decolonizationcountry.131.d:0 "Beim Unabhängigkeitsreferendum am 1. Dezember 1991 drückte die ukrainische Bevölkerung ihre breite Unterstützung für die Unabhängigkeitserklärung aus: Über 90 % stimmten dafür, und 82 % der Wahlberechtigten beteiligten sich. Das Referendum fand am selben Tag wie die erste direkte Präsidentschaftswahl in der Ukraine statt; alle sechs Präsidentschaftskandidaten unterstützten die Unabhängigkeit und sprachen sich für ein „Ja“ aus. Mit der Annahme des Referendums endete jede realistische Chance auf einen – auch nur bedingten – Zusammenhalt der Sowjetunion; die Ukraine war lange Zeit wirtschaftlich und politisch nur Russland unterlegen. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.131.a:1 "Akzeptieren"
ron_decolonizationcountry.131.b:1 "Zerschmettere sie"

ron_decolonizationcountry.132.t:0 "Usbekistan erklärt seine Unabhängigkeit"
ron_decolonizationcountry.132.d:0 "Der Augustputsch von 1991 in der sowjetischen Hauptstadt Moskau veranlasste viele Sowjetrepubliken, ihre Unabhängigkeit von der Sowjetunion zu erklären. Der Präsident der Usbekischen SSR, Islam Karimow, erklärte am 31. August 1991 die Unabhängigkeit Usbekistans von der UdSSR. Am selben Tag verabschiedete der Oberste Sowjet Usbekistans eine Resolution zur Unabhängigkeitserklärung der Republik Usbekistan und ein Gesetz über die staatliche Unabhängigkeit Usbekistans. Nach der Unterzeichnung der Gesetze durch Karimow wurde die Usbekische SSR in Republik Usbekistan umbenannt. Der darauf folgende Tag wurde zum Nationalfeiertag und von der Regierung zu einem arbeitsfreien Tag erklärt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.132.a:1 "Akzeptieren"
ron_decolonizationcountry.132.b:1 "Zerschmettere sie"

ron_decolonizationcountry.133.t:0 "Die Slowakei erklärt ihre Unabhängigkeit"
ron_decolonizationcountry.133.d:0 "Am 1. Januar 1993 spaltete sich die Tschechoslowakei einvernehmlich in die Slowakische und die Tschechische Republik. Beide Länder gründeten nach der Teilung ihre eigenen parlamentarischen Demokratien, und die Slowakei nahm neue Symbole und eine neue Flagge an, um ihren Staat zu repräsentieren. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.133.a:1 "Dies ist das Ende der Tschechoslowakei"
ron_decolonizationcountry.133.b:1 "Niemals!"

ron_decolonizationcountry.134.t:0 "Bosnien erklärt seine Unabhängigkeit"
ron_decolonizationcountry.134.d:0 "Vom 29. Februar bis 1. März 1992 fand in Bosnien und Herzegowina ein Unabhängigkeitsreferendum statt. Dieses Referendum folgte auf die ersten freien Wahlen des Jahres 1990 und die zunehmenden ethnischen Spannungen, die schließlich zum Zerfall Jugoslawiens führten. Die bosniakischen und bosnisch-kroatischen Wähler waren klare Befürworter der Unabhängigkeit, während die bosnischen Serben das Referendum boykottierten oder von den bosnisch-serbischen Behörden an der Teilnahme gehindert wurden. Die Wahlbeteiligung lag bei 63,4 %, 99,7 % der Wähler stimmten für die Unabhängigkeit. Am 3. März erklärte der Vorsitzende des bosnisch-herzegowinischen Präsidialamts, Alija Izetbegović, die Unabhängigkeit der Republik Bosnien und Herzegowina, und das Parlament ratifizierte den Beschluss. Am 6. April erkannten die Vereinigten Staaten und die Europäische Wirtschaftsgemeinschaft Bosnien und Herzegowina als unabhängigen Staat an, und am 22. Mai wurde es in die Vereinten Nationen aufgenommen. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.134.a:1 "Akzeptieren"
ron_decolonizationcountry.134.b:1 "Zerschmettere sie"

ron_decolonizationcountry.136.t:0 "Osttimor erklärt seine Unabhängigkeit"
ron_decolonizationcountry.136.d:0 "Während die Fretilin die Rückkehr des portugiesischen Gouverneurs gefordert und dabei demonstrativ die portugiesische Flagge an Regierungsbüros gehisst hatte, musste sie angesichts der sich verschlechternden Lage unabhängig von Portugal die Welt um internationale Unterstützung bitten. Am 28. November 1975 gab die Fretilin eine einseitige Unabhängigkeitserklärung der Demokratischen Republik Osttimor (República Democrática de Timor-Leste auf Portugiesisch) ab. Diese wurde weder von Portugal, Indonesien noch Australien anerkannt; der UDI-Staat erhielt jedoch die formelle diplomatische Anerkennung von sechs Ländern, die von linken oder marxistisch-leninistischen Parteien geführt wurden, nämlich Albanien, Kap Verde, Guinea, Guinea-Bissau, Mosambik sowie São Tomé und Príncipe. Francisco Xavier do Amaral von der Fretilin wurde erster Präsident, während Fretilin-Führer Nicolau dos Reis Lobato Premierminister wurde. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.136.a:1 "Akzeptieren"
ron_decolonizationcountry.136.b:1 "Zerschmettere sie"

ron_decolonizationcountry.137.t:0 "Montenegro erklärt seine Unabhängigkeit"
ron_decolonizationcountry.137.d:0 "Am 21. Mai 2006 fand in Montenegro ein Unabhängigkeitsreferendum statt. 55,5 % der Wähler stimmten dafür und schafften damit nur knapp die 55-Prozent-Hürde. Bereits am 23. Mai wurde das vorläufige Ergebnis des Referendums von allen fünf ständigen Mitgliedern des UN-Sicherheitsrats anerkannt. Dies lässt auf eine breite internationale Anerkennung schließen, sollte Montenegro formal unabhängig werden. Am 31. Mai bestätigte die Referendumskommission das Ergebnis des Referendums offiziell und stellte fest, dass 55,5 % der montenegrinischen Wähler für die Unabhängigkeit gestimmt hatten. Da die Wähler die umstrittene 55-Prozent-Hürde erreichten, wurde das Referendum während einer Sondersitzung des Parlaments am 31. Mai in die Unabhängigkeitserklärung aufgenommen. Das Parlament der Republik Montenegro gab am Samstag, dem 3. Juni, eine formelle Unabhängigkeitserklärung ab. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.137.a:1 "Dies ist das Ende Jugoslawiens"
ron_decolonizationcountry.137.b:1 "Niemals!"

ron_decolonizationcountry.138.t:0 "Südsudan erklärt seine Unabhängigkeit"
ron_decolonizationcountry.138.d:0 "Zwischen dem 9. und 15. Januar 2011 fand ein Referendum statt, um zu entscheiden, ob der Südsudan ein unabhängiges Land werden und sich vom Sudan abspalten sollte. 98,83 % der Bevölkerung stimmten für die Unabhängigkeit. Am 9. Juli wurde der Südsudan offiziell vom Sudan unabhängig, obwohl gewisse Streitigkeiten weiterhin bestehen, darunter die Aufteilung der Öleinnahmen, da sich 75 % aller Ölreserven des ehemaligen Sudan im Südsudan befinden. Die Region Abyei ist weiterhin umstritten, und in Abyei wird ein separates Referendum darüber abgehalten, ob sie sich dem Sudan oder dem Südsudan anschließen möchte. Im Juni 2011 brach der Konflikt in Südkordofan zwischen der sudanesischen Armee und der SPLA um die Nuba-Berge aus. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.138.a:1 "Akzeptieren"
ron_decolonizationcountry.138.b:1 "Zerschmettere sie"

ron_decolonizationcountry.139.t:0 "Tuwa erklärt seine Unabhängigkeit"
ron_decolonizationcountry.139.d:0 "Seit 1759 gehörte Tuwa zur Mongolei, die wiederum zur chinesischen Qing-Dynastie gehörte. Nach dem Sturz der Qing-Dynastie in der Xinhai-Revolution von 1911 kam es auch in der Mongolei zu Revolutionen, die zur Unabhängigkeit sowohl der Mongolei als auch der Tuwinischen Republik Urjanchai führten. Nach einer Zeit politischer Unsicherheit wurde die neue Republik im April 1914 ein Protektorat des Russischen Reiches und als Region Urjanchai bekannt. Nach dem Untergang des Russischen Reiches 1917 und der Gründung der Russischen Republik bekräftigten sowohl Tuwa als auch die Region Urjanchai ihren Status als russisches Protektorat. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.139.a:1 "Akzeptieren"
ron_decolonizationcountry.139.b:1 "Zerschmettere sie"

ron_decolonizationcountry.140.t:0 "Die ZANU rebelliert gegen unsere Regierung"
ron_decolonizationcountry.140.d:0 "Der Rhodesische Buschkrieg – auch Zweiter Chimurenga-Krieg oder Simbabwe-Befreiungskrieg genannt – war ein Bürgerkrieg, der von Juli 1964 bis Dezember 1979 in dem nicht anerkannten Staat Rhodesien (später Simbabwe-Rhodesien) tobte. In dem Konflikt standen sich drei Mächte gegenüber: die von der weißen Minderheit geführte Regierung Rhodesiens unter Ian Smith (später die simbabwe-rhodesische Regierung von Bischof Abel Muzorewa); die Simbabwe African National Liberation Army, der militärische Flügel von Robert Mugabes Simbabwe African National Union; und die Simbabwe People&#39;s Revolutionary Army von Joshua Nkomos Simbabwe African People&#39;s Union. Der Krieg und die darauffolgende interne Regelung, die 1978 von Smith und Muzorewa unterzeichnet wurde, führten im Juni 1979 zur Einführung des allgemeinen Wahlrechts und zum Ende der Herrschaft der weißen Minderheit in Rhodesien, das unter einer schwarzen Mehrheitsregierung in Simbabwe-Rhodesien umbenannt wurde. Diese neue Ordnung fand jedoch keine internationale Anerkennung, und der Krieg ging weiter. Keine der beiden Seiten konnte einen militärischen Sieg erringen, und später wurde ein Kompromiss erzielt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.140.a:1 "Ein friedlicher Übergang ist angebracht"
ron_decolonizationcountry.140.b:1 "Rhodesier sterben nie"

ron_decolonizationcountry.141.t:0 "Russland erklärt seine Unabhängigkeit"
ron_decolonizationcountry.141.d:0 "Der Zerfall der Sowjetunion war ein Prozess des inneren Zerfalls der UdSSR. Er begann mit wachsenden Unruhen in ihren verschiedenen Teilrepubliken, die sich zu einem unaufhörlichen politischen und legislativen Konflikt zwischen den Republiken und der Zentralregierung entwickelten. Er endete mit der Erklärung der drei ursprünglichen Republiken (Russland, Ukraine und Weißrussland), dass die Sowjetunion nicht mehr existiere. Später folgten elf weitere Republiken. Präsident Michail Gorbatschow musste zurücktreten, und die Überreste des Sowjetparlaments mussten die bereits erfolgten Ereignisse formell anerkennen. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.141.a:1 "Dies ist das Ende der UdSSR"
ron_decolonizationcountry.141.b:1 "Niemals!"

ron_decolonizationcountry.142.t:0 "Georgien erklärt seine Unabhängigkeit"
ron_decolonizationcountry.142.d:0 "Das Referendum wurde vom Obersten Rat Georgiens genehmigt, der bei den ersten Mehrparteienwahlen in Sowjetgeorgien im Oktober 1990 gewählt worden war. Es wurde von einem pro-Unabhängigkeitsblock namens „Runder Tisch – Freies Georgien“ unter Führung des sowjetischen Dissidenten Zviad Gamsachurdia dominiert. Nachdem Georgien das unionsweite Referendum über die Fortsetzung der Föderation und die Verhandlungen über einen neuen Unionsvertrag am 17. März größtenteils boykottiert hatte, war es nach den drei baltischen Staaten (Litauen am 9. Februar 1991 sowie Lettland und Estland am 3. März) die vierte Sowjetrepublik, die ein Referendum zur Unabhängigkeitsfrage abhielt. Die einzige Frage des Referendums lautete: „Unterstützen Sie die Wiederherstellung der Unabhängigkeit Georgiens gemäß der Unabhängigkeitserklärung Georgiens vom 26. Mai 1918?“ Das offizielle Ergebnis zeigte eine Zustimmungsrate von über 99 % bei einer Wahlbeteiligung von 90,6 %. Aufgrund der anhaltenden ethnischen Zwietracht wurden die Wahlen von der nicht-georgischen Bevölkerung Abchasiens und Südossetiens weitgehend boykottiert. Vier Tage nach Bekanntgabe des Endergebnisses verabschiedete der Oberste Rat Georgiens einstimmig die Unabhängigkeitserklärung – am zweiten Jahrestag der Niederschlagung friedlicher Proteste in Tiflis am 9. April 1989 durch die sowjetische Armee. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.142.a:1 "Akzeptieren"
ron_decolonizationcountry.142.b:1 "Zerschmettere sie"

ron_decolonizationcountry.143.t:0 "Kamerun erklärt seine Unabhängigkeit"
ron_decolonizationcountry.143.d:0 "Nach dem Zweiten Weltkrieg führten die Entwicklungen in Kamerun und Europa zur Unabhängigkeit. In Französisch-Kamerun war die wichtigste Frage die Art und Intensität der Beziehungen zu Frankreich nach der Unabhängigkeit. Die erste nationalistische Partei, die Union des Populations Camerounaises (UPC) unter Führung von Felix-Roland Moumie und Reuben Um Nyobe, forderte einen vollständigen Bruch mit Frankreich und die Einführung einer sozialistischen Wirtschaft. Französische Beamte unterdrückten die UPC, was zu einem erbitterten Bürgerkrieg führte, und ermutigten gleichzeitig alternative politische Führungen. Am 1. Januar 1960 wurde die Unabhängigkeit gewährt. Bei Wahlen kurz nach der Unabhängigkeit wurde Ahmadou Ahidjo zum ersten Präsidenten der Republik Kamerun gewählt. Ahidjo und seine Partei, die Union Camerounaise (UPC), versprachen den Aufbau einer kapitalistischen Wirtschaft und die Aufrechterhaltung enger Beziehungen zu Frankreich. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.143.a:1 "Akzeptieren"
ron_decolonizationcountry.143.b:1 "Zerschmettere sie"

ron_decolonizationcountry.144.t:0 "Benin erklärt seine Unabhängigkeit"
ron_decolonizationcountry.144.d:0 "1946 wurde Dahomey ein französisches Überseegebiet. 1959 wurde es als autonome Republik innerhalb der Französischen Gemeinschaft gegründet und erlangte am 1. August 1960 seine vollständige Unabhängigkeit. Während der Entkolonialisierung zersplitterte sich die nationalistische Bewegung in Dahomey. Drei regionale Parteien entstanden – unter der Führung von Sourou-Migan Apithy (Präsident 1964–1965), Justin Ahomadégbé (1972) und Hubert Maga (1960–1963 und 1970–1972). Ihre Unterstützer kamen hauptsächlich aus Porto-Novo, Abomey und dem Norden. Nach der Unabhängigkeit 1960 verschärften sich diese politischen Probleme durch wirtschaftliche Schwierigkeiten, die sich in Studenten- und Gewerkschaftsunruhen niederschlugen. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.144.a:1 "Akzeptieren"
ron_decolonizationcountry.144.b:1 "Zerschmettere sie"

ron_decolonizationcountry.145.t:0 "Kongo erklärt seine Unabhängigkeit"
ron_decolonizationcountry.145.d:0 "Am 30. Juni 1960 erlangte der Kongo unter dem Namen Republik Kongo seine Unabhängigkeit von Belgien. Der kongolesische Nationalist Patrice Lumumba wurde zum ersten Premierminister gewählt, während Joseph Kasa-Vubu erster Präsident wurde. Es kam zu Konflikten um die Verwaltung des Gebiets, die als Kongokrise bekannt wurden. Die Provinzen Katanga unter Moïse Tschombe und Südkasai versuchten, sich abzuspalten. Nachdem die UNO und westliche Regierungen seine Hilfsersuchen abgelehnt hatten und Lumumba erklärte, er sei in der Krise für die Unterstützung jedes Landes, einschließlich der Sowjetunion, offen. Die USA und Belgien wurden misstrauisch und überwachten seine Amtsenthebung durch Kasa-Vubu am 5. September und seine Hinrichtung durch belgisch geführte katangaesische Truppen am 17. Januar 1961. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.145.a:1 "Akzeptieren"
ron_decolonizationcountry.145.b:1 "Zerschmettere sie"

ron_decolonizationcountry.146.t:0 "Gabun erklärt seine Unabhängigkeit"
ron_decolonizationcountry.146.d:0 "1910 wurde Gabun eines der vier Gebiete von Französisch-Äquatorialafrika. Am 15. Juli 1960 stimmte Frankreich der vollständigen Unabhängigkeit Gabuns zu. Am 17. August 1960 wurde Gabun ein unabhängiges Land. Als Gabun 1960 seine Unabhängigkeit erlangte, existierten zwei wichtige politische Parteien: der Gabunische Demokratische Block (BDG) unter Führung von Léon M&#39;Ba und die Gabunische Demokratische und Soziale Union (UDSG) unter Führung von Jean-Hilaire Aubame. Bei den ersten Wahlen nach der Unabhängigkeit, die unter einem parlamentarischen System abgehalten wurden, konnte keine der beiden Parteien die Mehrheit erringen. Der BDG erhielt die Unterstützung von drei der vier unabhängigen Abgeordneten, und M&#39;Ba wurde zum Premierminister ernannt. Kurz nachdem man zu dem Schluss gekommen war, dass Gabun nicht genügend Einwohner für ein Zweiparteiensystem hatte, einigten sich die beiden Parteiführer auf eine gemeinsame Kandidatenliste. Bei den Wahlen im Februar 1961, die unter dem neuen Präsidialsystem abgehalten wurden, wurde M&#39;Ba Präsident und Aubame Außenminister. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.146.a:1 "Akzeptieren"
ron_decolonizationcountry.146.b:1 "Zerschmettere sie"

ron_decolonizationcountry.147.t:0 "Die Elfenbeinküste erklärt ihre Unabhängigkeit"
ron_decolonizationcountry.147.d:0 "Die Elfenbeinküste erlangte am 7. August 1960 ihre Unabhängigkeit und ließ ihre Mitgliedschaft in der Gemeinschaft auslaufen. ... Er war einer der Gründer des Rassemblement Démocratique Africain (RDA), der führenden interterritorialen politischen Partei vor der Unabhängigkeit für alle französischen westafrikanischen Gebiete mit Ausnahme Mauretaniens. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.147.a:1 "Akzeptieren"
ron_decolonizationcountry.147.b:1 "Zerschmettere sie"

ron_decolonizationcountry.148.t:0 "Madagaskar erklärt seine Unabhängigkeit"
ron_decolonizationcountry.148.d:0 "Madagaskars Geschichte ist geprägt vom Kampf um politische Kontrolle. Um 1700 versuchten Frankreich und England, Siedlungen zu gründen, während die Herrscher der vielen Königreiche der Insel untereinander um die Vorherrschaft kämpften. Im 18. Jahrhundert erlangte die Volksgruppe der Merina die Kontrolle über das Zentralplateau und errichtete eine Monarchie; mit britischer Hilfe beherrschten sie schließlich den größten Teil der Insel. Ihre Herrschaft endete, als in den 1880er Jahren französische Marinesoldaten auf der Insel landeten und Frankreich die Kolonialherrschaft einführte. Madagaskar erlangte 1960 seine Unabhängigkeit, wurde seitdem jedoch von Attentaten, Militärputschen und umstrittenen Wahlen heimgesucht. Hier ist eine Zeitleiste der wichtigsten Ereignisse in der turbulenten Geschichte der Insel. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.148.a:1 "Akzeptieren"
ron_decolonizationcountry.148.b:1 "Zerschmettere sie"

ron_decolonizationcountry.149.t:0 "Mali erklärt seine Unabhängigkeit"
ron_decolonizationcountry.149.d:0 "Mali fiel im späten 19. Jahrhundert unter französische Herrschaft. Bis 1905 befand sich der größte Teil des Gebiets als Teil Französisch-Sudans unter fester französischer Kontrolle. Anfang 1959 vereinigten sich Französisch-Sudan (das seinen Namen in Sudanesische Republik änderte) und Senegal zur Mali-Föderation. Die Mali-Föderation erlangte am 20. Juni 1960 ihre Unabhängigkeit von Frankreich. Senegal trat im August 1960 aus der Föderation aus, wodurch die Sudanesische Republik am 22. September 1960 zur unabhängigen Republik Mali werden konnte. Dieses Datum ist heute der Unabhängigkeitstag des Landes. Modibo Keïta wurde zum ersten Präsidenten gewählt. Keïta errichtete rasch einen Einparteienstaat, verfolgte eine unabhängige afrikanische und sozialistische Ausrichtung mit engen Verbindungen zum Osten und setzte eine weitgehende Verstaatlichung der wirtschaftlichen Ressourcen um. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.149.a:1 "Akzeptieren"
ron_decolonizationcountry.149.b:1 "Zerschmettere sie"

ron_decolonizationcountry.150.t:0 "Mauretanien erklärt seine Unabhängigkeit"
ron_decolonizationcountry.150.d:0 "Als das Land am 28. November 1960 seine Unabhängigkeit erlangte, wurde die Hauptstadt Nouakchott an der Stelle eines kleinen Kolonialdorfes, dem Ksar, gegründet. 90 % der Bevölkerung waren damals noch Nomaden. Mit der Unabhängigkeit strömten mehr Menschen aus der Subsahara-Region (Haalpulaar, Soninke und Wolof) nach Mauretanien und siedelten sich in den Gebieten nördlich des Senegal-Flusses an. Wie schon vor der Unabhängigkeit machte ihre sesshafte Lebensweise diese Gruppen empfänglicher für die Staatsbildung und nützlicher dafür. Schnell dominierten sie die staatliche Verwaltung, auch wenn die von den Franzosen aufgebauten maurischen Gruppen weiterhin das politische Geschehen bestimmten. Die Mauren reagierten auf diesen Wandel mit zunehmendem Arabisierungsdruck und der Arabisierung vieler Aspekte des mauretanischen Lebens, etwa Recht und Sprache. Außerdem bauten sich ethnische Spannungen auf – begünstigt durch die gemeinsame Erinnerung an Kriege und Sklavenraub. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.150.a:1 "Akzeptieren"
ron_decolonizationcountry.150.b:1 "Zerschmettere sie"

ron_decolonizationcountry.151.t:0 "Niger erklärt seine Unabhängigkeit"
ron_decolonizationcountry.151.d:0 "Am 11. Juli 1960 stimmte Frankreich der vollständigen Unabhängigkeit Nigers zu. Die Fünfte Französische Republik verabschiedete eine Revision der Französischen Gemeinschaft, die die Mitgliedschaft unabhängiger Staaten ermöglichte. Am 28. Juli wurde die nigrische gesetzgebende Versammlung zur nigrischen Nationalversammlung. Die Unabhängigkeit wurde am 3. August 1960 unter der Führung von Premierminister Diori erklärt. Anschließend wurde Diori im November 1960 von der Nationalversammlung zum neuen Präsidenten Nigers gewählt. Während seiner Präsidentschaft bevorzugte Dioris Regierung die Erhaltung traditioneller sozialer Strukturen und die Aufrechterhaltung enger Wirtschaftsbeziehungen mit Frankreich. Er wurde 1965 und 1970 ohne Gegenkandidaten wiedergewählt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.151.a:1 "Akzeptieren"
ron_decolonizationcountry.151.b:1 "Zerschmettere sie"

ron_decolonizationcountry.152.t:0 "Nigeria erklärt seine Unabhängigkeit"
ron_decolonizationcountry.152.d:0 "1914 wurde das Protektorat Südnigeria mit dem Protektorat Nordnigeria vereinigt, um die Kolonie und das Protektorat Nigeria zu bilden, die an das heutige Nigeria grenzt. Ende der 1950er Jahre führten der Ruf nach Unabhängigkeit afrikanischer Gebiete und der Niedergang des Britischen Empires dazu, dass Nigeria am 1. Oktober 1960 als Föderation Nigeria die Unabhängigkeit erlangte. Drei Jahre später wurde die Verfassung geändert und das Land zur Bundesrepublik Nigeria erklärt. Nnamdi Azikiwe, der bisherige Generalgouverneur, wurde erster Präsident. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.152.a:1 "Akzeptieren"
ron_decolonizationcountry.152.b:1 "Zerschmettere sie"

ron_decolonizationcountry.153.t:0 "Senegal erklärt seine Unabhängigkeit"
ron_decolonizationcountry.153.d:0 "1946 verabschiedet die Nationalversammlung das Gesetz Lamine Gueye, das der gesamten indigenen Bevölkerung der französischen Kolonien die französische Staatsbürgerschaft zuspricht. Im selben Jahr erreicht der Ivorer Félix Houphouët Boigny die Abschaffung der Zwangsarbeit in den Kolonien. Die Französische Union ersetzt das Französische Kaiserreich und die Kolonien werden zu „Überseeischen Departements und Gebieten“. Die Unabhängigkeitsbewegungen in den französischen Kolonien werden Mitte des 20. Jahrhunderts stärker und im Januar 1959 fusioniert Senegal mit dem Französisch-Sudan (dem heutigen Mali) und wird zur Föderation Mali, die am 20. Juni 1960 gemäß den am 4. April 1960 (dem für die Unabhängigkeit Senegals gewählten Datum) mit Frankreich unterzeichneten Abkommen unabhängig wird. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.153.a:1 "Akzeptieren"
ron_decolonizationcountry.153.b:1 "Zerschmettere sie"

ron_decolonizationcountry.154.t:0 "Togo erklärt seine Unabhängigkeit"
ron_decolonizationcountry.154.d:0 "Am 27. April 1960 löste Togo in einem reibungslosen Übergang seine verfassungsmäßigen Bindungen zu Frankreich, gab seinen UN-Treuhandstatus auf und erlangte unter einer provisorischen Verfassung mit Olympio als Präsidenten die vollständige Unabhängigkeit. Eine neue Verfassung, die 1961 per Referendum angenommen wurde, setzte einen für sieben Jahre in allgemeiner Wahl gewählten Exekutivpräsidenten und eine schwache Nationalversammlung ein. Der Präsident war befugt, Minister zu ernennen und die Versammlung aufzulösen und besaß das Monopol der Exekutivgewalt. Bei den Wahlen in diesem Jahr, bei denen Grunitzkys Partei disqualifiziert wurde, gewann Olympios Partei 100 % der Stimmen und alle 51 Sitze in der Nationalversammlung, und er wurde Togos erster gewählter Präsident. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.154.a:1 "Akzeptieren"
ron_decolonizationcountry.154.b:1 "Zerschmettere sie"

ron_decolonizationcountry.155.t:0 "Somalia erklärt seine Unabhängigkeit"
ron_decolonizationcountry.155.d:0 "Italien erlangte 1889 die Kontrolle über Somalia, und 1936 wurde es als Staat in Italienisch-Ostafrika eingegliedert. Großbritannien marschierte 1941 ein und behielt die Kontrolle, bis Somalia 1950 ein UN-Treuhandgebiet unter italienischer Verwaltung wurde. 1960 wurde es mit Britisch-Somaliland zur unabhängigen Republik Somalia vereinigt. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.155.a:1 "Akzeptieren"
ron_decolonizationcountry.155.b:1 "Zerschmettere sie"

ron_decolonizationcountry.156.t:0 "Ägyptische Revolution"
ron_decolonizationcountry.156.d:0 "Die ägyptische Revolution von 1952 oder Revolution des 23. Juli wurde am 23. Juli 1952 von der Bewegung der Freien Offiziere begonnen, einer Gruppe von Armeeoffizieren unter der Führung von Mohammed Naguib und Gamal Abdel Nasser. Die Revolution zielte ursprünglich darauf ab, König Faruk zu stürzen. Laut Miles Copeland Jr. und Kermit Roosevelt Jr. war sie Teil der Operation Fat Fucker, deren Ziel ein Wechsel der politischen Führung in Ägypten zu einer progressiveren, pro-amerikanischen Führung war. Die Bewegung hatte jedoch weitergehende politische Ambitionen und strebte bald die Abschaffung der konstitutionellen Monarchie und Aristokratie in Ägypten und im Sudan, die Gründung einer Republik, die Beendigung der britischen Besatzung des Landes und die Sicherung der Unabhängigkeit des Sudan (der bis dahin als anglo-ägyptisches Kondominium regiert wurde) an. Die Revolutionsregierung verfolgte eine entschieden nationalistische, antiimperialistische Agenda, die vor allem im arabischen Nationalismus und in der internationalen Blockfreiheit zum Ausdruck kam. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.156.a:1 "Akzeptieren"
ron_decolonizationcountry.156.b:1 "Zerschmettere sie"

ron_decolonizationcountry.157.t:0 "Malaya erklärt seine Unabhängigkeit"
ron_decolonizationcountry.157.d:0 "Die unabhängige Föderation Malaya wurde am 31. August 1957 gegründet. Briefmarke der Straits Settlements von 1883. Die Geschichte des britischen Engagements in Malaya reicht bis ins Jahr 1786 zurück, als die East India Company einen Handelsposten auf der Insel Penang errichtete. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.157.a:1 "Akzeptieren"
ron_decolonizationcountry.157.b:1 "Zerschmettere sie"

ron_decolonizationcountry.158.t:0 "Brunei erklärt seine Unabhängigkeit"
ron_decolonizationcountry.158.d:0 "Das ölreiche Sultanat Brunei in Südostasien erklärte am Sonntag seine Unabhängigkeit von Großbritannien und wurde zu einem neuen islamischen Staat. Damit endete mit dem Jahreswechsel die 96-jährige britische Protektorat. Mit drei „Allah Akbar“-Rufen und 21 Salutschüssen wurde das kleine Land mit seinen 205.000 Einwohnern zum jüngsten unabhängigen Staat der Welt und zu einem der reichsten. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.158.a:1 "Akzeptieren"
ron_decolonizationcountry.158.b:1 "Zerschmettere sie"

ron_decolonizationcountry.159.t:0 "Australisches Verfassungsgesetz"
ron_decolonizationcountry.159.d:0 "Der Australia Act 1986 ist die Kurzbezeichnung zweier separater, aber miteinander verbundener Gesetze: ein Gesetz des australischen Commonwealth-Parlaments (also des Bundesparlaments) und ein Gesetz des britischen Parlaments. In Australien werden sie als Australia Act 1986 bzw. Australia Act 1986 (UK) bezeichnet. Diese nahezu identischen Gesetze wurden von beiden Parlamenten verabschiedet, da unklar war, ob das Commonwealth-Parlament allein die endgültige Entscheidungsbefugnis besaß. Sie wurden unter Nutzung der Gesetzgebungsbefugnis erlassen, die durch Ermächtigungsgesetze der Parlamente aller australischen Bundesstaaten verliehen wurde. Die Gesetze traten gleichzeitig in Kraft."
ron_decolonizationcountry.159.a:1 "Akzeptieren"
ron_decolonizationcountry.159.b:1 "Zerschmettere sie"

ron_decolonizationcountry.160.t:0 "Neuseeländisches Verfassungsgesetz"
ron_decolonizationcountry.160.d:0 "Das Verfassungsgesetz von 1986 ist ein Gesetz des neuseeländischen Parlaments und bildet einen wesentlichen Bestandteil der neuseeländischen Verfassung. Es legt den Rahmen für die grundlegenden politischen Regierungsprinzipien fest und regelt die Befugnisse der Exekutive, Legislative und Judikative. Es beschreibt die Rollen und Pflichten des Monarchen, des Generalgouverneurs, der Minister und der Richter. Das Gesetz hob das neuseeländische Verfassungsgesetz von 1852 und das Statut von Westminster auf und ersetzte es. Außerdem entzog es dem britischen Parlament die Befugnis, mit Zustimmung des neuseeländischen Parlaments Gesetze für Neuseeland zu verabschieden."
ron_decolonizationcountry.160.a:1 "Akzeptieren"
ron_decolonizationcountry.160.b:1 "Zerschmettere sie"

ron_decolonizationcountry.161.t:0 "Südafrikanischer Verfassungsakt"
ron_decolonizationcountry.161.d:0 "Der Republikanismus war schon immer ein zentraler Grundsatz des Afrikaaner-Nationalismus. Selbst als Nationalisten die Regierung kontrollierten, verhinderten die politischen Realitäten, dass dieses Ziel vor den 1960er Jahren erreicht wurde. Am 3. August 1960 kündigte die Regierung der National Party eine Volksabstimmung im Oktober desselben Jahres an, bei der die Wähler über die Umwandlung der Südafrikanischen Union in eine Republik abstimmen sollten. Die Abstimmung war weißen Südafrikanern vorbehalten. Mehr als 90 % der Wahlberechtigten beteiligten sich an der Volksabstimmung, und 52,3 % der Stimmen sprachen sich für „eine Republik für die Union“ aus. Der Verfassungsentwurf für die Republik Südafrika wurde im Januar 1961 eingebracht. Er trat am 31. Mai 1961 in Kraft. Der 31. Mai war ein bedeutender Tag in der südafrikanischen Geschichte, denn er war sowohl der Tag der Unterzeichnung des Vertrags von Vereeniging im Jahr 1902 zur Beendigung des Zweiten Burenkriegs als auch der Tag der Gründung der Südafrikanischen Union im Jahr 1910."
ron_decolonizationcountry.161.a:1 "Akzeptieren"
ron_decolonizationcountry.161.b:1 "Zerschmettere sie"

ron_decolonizationcountry.162.t:0 "Kanadisches Verfassungsgesetz"
ron_decolonizationcountry.162.d:0 "Das Verfassungsgesetz von 1982 ist Teil der kanadischen Verfassung. Es wurde im Zuge der kanadischen Verfassungsreform eingeführt und beinhaltete mehrere Änderungen am British North America Act von 1867, darunter die Umbenennung in Verfassungsgesetz von 1867. Neben der Reformierung der Verfassung verabschiedete das Verfassungsgesetz von 1982 die Kanadische Charta der Rechte und Freiheiten, garantierte die Rechte der kanadischen Ureinwohner, ermöglichte künftige Verfassungskonferenzen und legte die Verfahren für künftige Verfassungsänderungen fest."
ron_decolonizationcountry.162.a:1 "Akzeptieren"
ron_decolonizationcountry.162.b:1 "Zerschmettere sie"

ron_decolonizationcountry.163.t:0 "Gesetz der Republik Irland von 1948"
ron_decolonizationcountry.163.d:0 "Der Republic of Ireland Act 1948 (Nr. 22 von 1948) ist ein Gesetz des irischen Parlaments (Oireachtas), das Irland offiziell als Republik Irland bezeichnet und dem Präsidenten Irlands die Befugnis überträgt, auf Anraten der irischen Regierung die Exekutivgewalt des Staates in seinen Außenbeziehungen auszuüben. Das Gesetz wurde am 21. Dezember 1948 unterzeichnet und trat am 18. April 1949, Ostermontag, dem 33. Jahrestag des Beginns des Osteraufstands, in Kraft. Das Gesetz beendete die verbleibende gesetzliche Rolle der britischen Monarchie in Bezug auf den Staat, indem es den External Relations Act von 1936 aufhob, der Georg VI. und seinen Nachfolgern jene Funktionen übertragen hatte, die nun durch das Gesetz dem Präsidenten übertragen wurden."
ron_decolonizationcountry.163.a:1 "Akzeptieren"
ron_decolonizationcountry.163.b:1 "Zerschmettere sie"

ron_decolonizationcountry.164.t:0 "ANC fordert allgemeines Wahlrecht"
ron_decolonizationcountry.164.d:0 "Am 17. März 1992 fand in Südafrika ein Referendum zur Beendigung der Apartheid statt. Die Abstimmung beschränkte sich auf weiße südafrikanische Wähler. Sie wurden gefragt, ob sie die zwei Jahre zuvor von Staatspräsident FW de Klerk eingeleiteten Reformen unterstützten, mit denen er die seit 1948 bestehende Apartheid abschaffen wollte. Das Wahlergebnis war ein klarer Sieg für die „Ja“-Seite, der letztlich zur Aufhebung der Apartheid führte. Nun drängt der Afrikanische Nationalkongress auf das allgemeine Wahlrecht. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.164.a:1 "Akzeptieren"
ron_decolonizationcountry.164.b:1 "Zerschmettere sie"
ron_decolonizationcountry.164.c:1 "Zerschmettere sie"

ron_decolonizationcountry.165.t:0 "Gründung Westdeutschlands"
ron_decolonizationcountry.165.d:0 "Westdeutschland, von 1949 bis 1990 eine Republik, die die westlichen zwei Drittel des heutigen Deutschlands umfasste. Westdeutschland entstand 1949, als die Vereinigten Staaten, Großbritannien und Frankreich die Gebiete bzw. Teile Deutschlands, die sie am Ende des Zweiten Weltkriegs besetzt hatten, konsolidierten. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.165.a:1 "Akzeptieren"
ron_decolonizationcountry.165.b:1 "Absolut nicht"

ron_decolonizationcountry.166.t:0 "Gründung der DDR"
ron_decolonizationcountry.166.d:0 "Als Westdeutschland neu organisiert wurde und seine Unabhängigkeit von seinen Besatzern erlangte, wurde 1949 in Ostdeutschland die DDR gegründet. Die Gründung der beiden Staaten festigte die deutsche Teilung von 1945. Am 10. März 1952 unterbreitete Stalin in der sogenannten „Stalinnote“ den Vorschlag, Deutschland mit einer Neutralitätspolitik wiederzuvereinigen, ohne wirtschaftspolitische Bedingungen und mit Garantien für „die Menschenrechte und Grundfreiheiten, einschließlich der Meinungs-, Presse-, Religions- und politischen Überzeugungsfreiheit und der Versammlungsfreiheit“ sowie der freien Tätigkeit demokratischer Parteien und Organisationen. Dieser Vorschlag wurde abgelehnt; die Wiedervereinigung hatte für die Führung Westdeutschlands keine Priorität, und die NATO-Mächte lehnten den Vorschlag mit der Begründung ab, Deutschland müsse der NATO beitreten können, und derartige Verhandlungen mit der Sowjetunion würden als Kapitulation angesehen. Es gab mehrere Debatten darüber, ob 1952 eine echte Chance zur Wiedervereinigung verpasst wurde. 1949 übergaben die Sowjets die Macht in Ostdeutschland an die SED unter Wilhelm Pieck (1876–1960), der Präsident der DDR wurde und dieses Amt bis zu seinem Tod innehatte. Die Exekutivgewalt lag größtenteils bei SED-Generalsekretär Walter Ulbricht. Der sozialistische Parteichef Otto Grotewohl (1894–1964) blieb bis zu seinem Tod Ministerpräsident. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.166.a:1 "Akzeptieren"
ron_decolonizationcountry.166.b:1 "Absolut nicht"

ron_decolonizationcountry.167.t:0 "Westdeutschland schlägt Referendum vor"
ron_decolonizationcountry.167.d:0 "Die deutsche Wiedervereinigung war der Prozess, bei dem die Deutsche Demokratische Republik 1990 Teil der Bundesrepublik Deutschland wurde und so das wiedervereinigte Deutschland bildete, wie es der ursprüngliche Artikel 23 des Grundgesetzes vorsah. Der Abschluss des Einigungsprozesses wird offiziell als Deutsche Einheit bezeichnet und jedes Jahr am 3. Oktober als Deutsche Einheit gefeiert. Berlin wurde zu einer Stadt wiedervereinigt und erneut zur Hauptstadt des vereinten Deutschlands. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.167.a:1 "Akzeptieren"
ron_decolonizationcountry.167.b:1 "Absolut nicht"

ron_decolonizationcountry.168.t:0 "Saarland akzeptiert"
ron_decolonizationcountry.168.d:0 "Am 23. Oktober 1955 fand im Saarprotektorat eine Volksabstimmung über das Saarstatut statt. Das Statut hätte das Gebiet zu einem unabhängigen Staat unter der Schirmherrschaft eines vom Ministerrat der Westeuropäischen Union zu ernennenden EU-Kommissars gemacht, während das Saarland in der Wirtschaftsunion mit Frankreich verblieb. Die Ablehnung des Statuts wurde von den Wählern als Zeichen dafür gewertet, dass sie eine Wiedervereinigung mit Westdeutschland bevorzugen würden. Am 27. Oktober 1956 schlossen Frankreich und Westdeutschland den Saarvertrag, der festlegte, dass das Saarland gemäß Artikel 23 des Grundgesetzes Westdeutschland beitreten kann, sodass das Saarland mit Wirkung vom 1. Januar 1957 ein deutscher Staat wurde. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.168.a:1 "Gerechtigkeit"

ron_decolonizationcountry.169.t:0 "Saarland-Rückgänge"
ron_decolonizationcountry.169.d:0 "Am 23. Oktober 1955 fand im Saarprotektorat eine Volksabstimmung über das Saarstatut statt. Das Statut hätte das Gebiet zu einem unabhängigen Staat gemacht, unter der Schirmherrschaft eines vom Ministerrat der Westeuropäischen Union zu ernennenden EU-Kommissars, während es gleichzeitig in der Wirtschaftsunion mit Frankreich verblieb. Die Zustimmung der Wähler galt als Zeichen dafür, dass sie lieber ein Protektorat Frankreichs bleiben wollten. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.169.a:1 "Lass sie in Ruhe"
ron_decolonizationcountry.169.b:1 "Krieg ist es"

ron_decolonizationcountry.170.t:0 "Schlagen Sie der DDR die Vereinigung vor"
ron_decolonizationcountry.170.d:0 "Die deutsche Wiedervereinigung war der Prozess, bei dem die Deutsche Demokratische Republik 1990 Teil der Bundesrepublik Deutschland wurde und das wiedervereinigte Deutschland bildete, wie es der ursprüngliche Artikel 23 des Grundgesetzes vorsah. Der Abschluss des Einigungsprozesses wird offiziell als Deutsche Einheit bezeichnet und jedes Jahr am 3. Oktober als Deutsche Einheit gefeiert. Berlin wurde zu einer Stadt wiedervereinigt und erneut zur Hauptstadt des vereinten Deutschlands. Sollten wir diesen Plan umsetzen?"
ron_decolonizationcountry.170.a:1 "Angebot senden"
ron_decolonizationcountry.170.b:1 "Absolut nicht"

ron_decolonizationcountry.171.t:0 "Westdeutschland schlägt die Wiedervereinigung vor"
ron_decolonizationcountry.171.d:0 "Die deutsche Wiedervereinigung war der Prozess, bei dem die Deutsche Demokratische Republik 1990 Teil der Bundesrepublik Deutschland wurde und so das wiedervereinigte Deutschland bildete, wie es der ursprüngliche Artikel 23 des Grundgesetzes vorsah. Der Abschluss des Einigungsprozesses wird offiziell als Deutsche Einheit bezeichnet und jedes Jahr am 3. Oktober als Deutsche Einheit gefeiert. Berlin wurde zu einer Stadt wiedervereinigt und erneut zur Hauptstadt des vereinten Deutschlands. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.171.a:1 "Wir haben keine Wahl"
ron_decolonizationcountry.171.b:1 "Absolut nicht"

ron_decolonizationcountry.172.t:0 "Ostdeutschland im Niedergang"
ron_decolonizationcountry.172.d:0 "Die deutsche Wiedervereinigung war der Prozess, bei dem die Deutsche Demokratische Republik 1990 Teil der Bundesrepublik Deutschland wurde und so das wiedervereinigte Deutschland bildete, wie es der ursprüngliche Artikel 23 des Grundgesetzes vorsah. Der Abschluss des Einigungsprozesses wird offiziell als Deutsche Einheit bezeichnet und jedes Jahr am 3. Oktober als Deutsche Einheit gefeiert. Berlin wurde zu einer Stadt wiedervereinigt und erneut zur Hauptstadt des vereinten Deutschlands. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.172.a:1 "Lass sie in Ruhe"
ron_decolonizationcountry.172.b:1 "Krieg ist es"

ron_decolonizationcountry.173.t:0 "Schlagen Sie dem Saarland ein Referendum vor"
ron_decolonizationcountry.173.d:0 "Am 23. Oktober 1955 fand im Saarprotektorat eine Volksabstimmung über das Saarstatut statt. Das Statut hätte das Gebiet zu einem unabhängigen Staat unter der Schirmherrschaft eines vom Ministerrat der Westeuropäischen Union zu ernennenden EU-Kommissars gemacht, während das Saarland in der Wirtschaftsunion mit Frankreich verblieb. Die Ablehnung des Statuts durch die Wähler wurde als Zeichen dafür gewertet, dass sie eine Wiedervereinigung mit Westdeutschland vorziehen würden. Am 27. Oktober 1956 schlossen Frankreich und Westdeutschland den Saarvertrag, der festlegte, dass dem Saarland gemäß Artikel 23 des Grundgesetzes der Anschluss an Westdeutschland gestattet werden sollte. So wurde das Saarland mit Wirkung vom 1. Januar 1957 ein Staat Deutschlands. Sollen wir den Plan umsetzen?"
ron_decolonizationcountry.173.a:1 "Angebot senden"
ron_decolonizationcountry.173.b:1 "Absolut nicht"

ron_decolonizationcountry.174.t:0 "Ostdeutschland akzeptiert"
ron_decolonizationcountry.174.d:0 "Die deutsche Wiedervereinigung war der Prozess, bei dem die Deutsche Demokratische Republik 1990 Teil der Bundesrepublik Deutschland wurde und so das wiedervereinigte Deutschland bildete, wie es der ursprüngliche Artikel 23 des Grundgesetzes vorsah. Der Abschluss des Einigungsprozesses wird offiziell als Deutsche Einheit bezeichnet und jedes Jahr am 3. Oktober als Deutsche Einheit gefeiert. Berlin wurde zu einer Stadt wiedervereinigt und erneut zur Hauptstadt des vereinten Deutschlands. Wie werden wir darauf reagieren?"
ron_decolonizationcountry.174.a:1 "Was könnte möglicherweise schiefgehen?"

ron_decolonizationcountry.175.t:0 "Vertrag von San Francisco"
ron_decolonizationcountry.175.d:0 "Der Vertrag von San Francisco (auch Friedensvertrag mit Japan oder Nihon-koku to no Heiwa-Jōyaku genannt) stellte im Namen der Vereinten Nationen die friedlichen Beziehungen zwischen Japan und den Alliierten wieder her, um die Feindseligkeiten offiziell zu beenden und Wiedergutmachung für die Taten bis einschließlich des Zweiten Weltkriegs zu fordern. Er wurde am 8. September 1951 im War Memorial Opera House in San Francisco (Kalifornien, USA) von 49 Nationen offiziell unterzeichnet. Drei Mitgliedsstaaten weigerten sich jedoch zu unterzeichnen: die Sowjetunion, Polen und die Tschechoslowakei, die alle zum Ostblock gehörten, und zwei weitere Staaten weigerten sich, Vertreter zu entsenden: Indien und Jugoslawien. Italien und China wurden nicht eingeladen, letzteres aufgrund von Meinungsverschiedenheiten darüber, ob die Republik China oder die Volksrepublik China das chinesische Volk vertrat. Korea wurde ebenfalls nicht eingeladen, da eine ähnliche Meinungsverschiedenheit darüber bestand, ob Südkorea oder Nordkorea das koreanische Volk vertrat."
ron_decolonizationcountry.175.a:1 "Akzeptieren"

ron_decolonizationcountry.176.t:0 "Südafrikanischer Verband"
ron_decolonizationcountry.176.d:0 "1910 entstand die Südafrikanische Union durch die Vereinigung der beiden ehemals unabhängigen Burenrepubliken Südafrika (Zuid-Afrikaansche Republiek) und Oranje-Freistaat (Oranje Vrystaat) mit den von Großbritannien dominierten Provinzen Kapstadt und Natal. Besonders wichtig war, dass die neue, selbstverwaltete Südafrikanische Union internationales Ansehen erlangte und durch den Status eines britischen Dominions auf eine Stufe mit drei anderen wichtigen britischen Dominions und Verbündeten – Kanada, Australien und Neuseeland – stellte."
ron_decolonizationcountry.176.a:1 "OK"

ron_decolonizationcountry.177.t:0 "Militärputsch in Yanaon"
ron_decolonizationcountry.177.d:0 "Der Staatsstreich von Yanam versetzte die französischen Behörden in Pondicherry in Rage. Gerüchte kursierten, die Franzosen würden einen Kreuzer nach Yanam schicken, um die fusionsbefürwortenden Politiker festzunehmen und ihre Macht wiederherzustellen. Nur drei Tage vor dem Putsch wurde der letzte oberste Kolonialverwalter von Yanam, George Sala, von André Ménard, dem damaligen Generalgouverneur von Pondicherry, abberufen. Dadala wurde für 14 Tage zum kommissarischen Kommissar von Yanam ernannt. Ende Juni 1954 stattete Kewal Singh Yanam einen Besuch ab und bat Dadala, nach Pondicherry zurückzukehren, um seine dortigen Aktivitäten fortzusetzen. Am 3. Juli verließ Dadala Yanam, nachdem er alle Vorkehrungen für eine ordnungsgemäße Verwaltung getroffen hatte. Am 1. November 1954 wurde Yanam de facto an Indien übergeben. Der indische Premierminister Jawaharlal Nehru besuchte Pondicherry am 16. Januar 1955. Edouard Goubert, S. Perumal, Dadala und Sri Pakirisamy Pillai hielten bei einer öffentlichen Versammlung auf dem Maidan von Gorimedu Ansprachen an Pandit Nehru."
ron_decolonizationcountry.177.a:1 "OK"

ron_decolonizationcountry.178.t:0 "Zusammenbruch der Vereinigten Arabischen Republik"
ron_decolonizationcountry.178.d:0 "Statt einer Föderation zweier arabischer Völker, wie viele Syrer es sich vorgestellt hatten, entwickelte sich die VAR zu einem vollständig von Ägyptern dominierten Staat. Auch das politische Leben Syriens wurde eingeschränkt, da Nasser die Auflösung aller politischen Parteien in Syrien forderte. Dabei zwang der stark zentralisierte ägyptische Staat dem schwächeren Syrien Nassers sozialistisches politisches und wirtschaftliches System auf und löste damit eine Gegenreaktion der syrischen Geschäfts- und Militärkreise aus, die schließlich zum Putsch vom 28. September 1961 und dem Ende der VAR führte. Laut Elie Podeh in „Der Niedergang der arabischen Einheit“ – „Aufstieg und Fall der Vereinigten Arabischen Republik“ „...konnte dieses Einheitskonzept die brüchige syrische Identität erfolgreich festigen. Tatsächlich wurde den Syrern nach dem Verlust ihrer Unabhängigkeit plötzlich klar, dass sie tatsächlich eine andere Identität als die Ägypter besaßen.“ "
ron_decolonizationcountry.178.a:1 "OK"

ron_decolonizationcountry.179.t:0 "Gründung der Vereinigten Arabischen Republik"
ron_decolonizationcountry.179.d:0 "Die VAR wurde am 1. Februar 1958 als erster Schritt hin zu einem größeren panarabischen Staat gegründet, als eine Gruppe politischer und militärischer Führer Syriens dem ägyptischen Präsidenten Gamal Abdel Nasser einen Zusammenschluss der beiden Staaten vorschlug. Die panarabische Stimmung in Syrien war traditionell sehr stark ausgeprägt, und Nasser war nach dem Suezkrieg von 1956 in der gesamten arabischen Welt eine beliebte Heldenfigur. Daher gab es in Syrien beträchtliche Unterstützung für einen Zusammenschluss mit Nassers Ägypten. Die Arabische Sozialistische Baath-Partei war der führende Befürworter eines solchen Zusammenschlusses."
ron_decolonizationcountry.179.a:1 "Union vorschlagen"
ron_decolonizationcountry.179.b:1 "Bleiben Sie Ägypten"

ron_decolonizationcountry.180.t:0 "Abdankung von Yuan Shikai"
ron_decolonizationcountry.180.d:0 "Der provisorische Kaiser von China, Yuan Shikai, dankt ab und die Republik China wird wiederhergestellt. Es scheint, als ob die Instabilität in China bald ihren Höhepunkt erreicht und eine Zeit der Instabilität und des Leidens unmittelbar bevorsteht."
ron_decolonizationcountry.180.a:0 "Das Ende eines Imperiums"
ron_decolonizationcountry.180.b:0 "Lang lebe der Kaiser!"


