CW_Expansion_country.219.t:0 "Begrenzung der Amtszeit des Präsidenten auf zwei Amtszeiten"
CW_Expansion_country.219.d:0 "Niemand darf mehr als zweimal zum Präsidenten gewählt werden. Und niemand, der das Amt des Präsidenten länger als zwei Jahre einer Amtszeit innehatte oder als Präsident fungierte, für die eine andere Person zum Präsidenten gewählt wurde, darf mehr als einmal zum Präsidenten gewählt werden. Dieser Artikel gilt jedoch nicht für Personen, die das Amt des Präsidenten innehatten, als dieser Artikel vom Kongress vorgeschlagen wurde. Er hindert auch niemanden, der während der Amtszeit, in der dieser Artikel in Kraft tritt, das Amt des Präsidenten innehat oder als Präsident fungiert, daran, für den Rest dieser Amtszeit das Amt des Präsidenten innezuhaben oder als Präsident zu fungieren."
CW_Expansion_country.219.a:1 "OK"
CW_Expansion_news.219.t:0 "Zwei Amtszeiten für US-Präsidenten"
CW_Expansion_news.219.d:0 "Niemand darf mehr als zweimal zum Präsidenten gewählt werden. Und niemand, der das Amt des Präsidenten länger als zwei Jahre einer Amtszeit innehatte oder als Präsident fungierte, für die eine andere Person zum Präsidenten gewählt wurde, darf mehr als einmal zum Präsidenten gewählt werden. Dieser Artikel gilt jedoch nicht für Personen, die das Amt des Präsidenten innehatten, als dieser Artikel vom Kongress vorgeschlagen wurde. Er hindert auch niemanden, der während der Amtszeit, in der dieser Artikel in Kraft tritt, das Amt des Präsidenten innehat oder als Präsident fungiert, nicht daran, für den Rest dieser Amtszeit das Amt des Präsidenten innezuhaben oder als Präsident zu fungieren."
CW_Expansion_news.219.a:1 "OK"

CW_Expansion_country.220.t:0 "Erstes NBA All-Star Game"
CW_Expansion_country.220.d:0 "Das NBA All-Star Game 1951 war ein Basketball-Schauspiel, das am 2. März 1951 im Boston Garden in Boston, der Heimat der Boston Celtics, ausgetragen wurde. Das Spiel war die erste Ausgabe des All-Star Game der National Basketball Association (NBA) und wurde während der NBA-Saison 1950–51 ausgetragen. Die Idee, ein All-Star Game abzuhalten, entstand bei einem Treffen zwischen NBA-Präsident Maurice Podoloff, NBA-PR-Direktor Haskell Cohen und dem Besitzer der Boston Celtics, Walter A. Brown. Zu dieser Zeit war die Basketballwelt gerade vom Point-Sharing-Skandal im College-Basketball erschüttert worden. Um die öffentliche Aufmerksamkeit auf die Liga zurückzugewinnen, schlug Cohen vor, ein Schauspiel mit den besten Spielern der Liga auszurichten, ähnlich dem All-Star Game der Major League Baseball. Obwohl die meisten, darunter auch Podoloff, der Idee pessimistisch gegenüberstanden, blieb Brown zuversichtlich, dass sie ein Erfolg werden würde. Er bot sogar an, das Spiel auszurichten und alle Kosten oder potenziellen Verluste zu übernehmen, die durch das Spiel entstehen würden. Das Eastern All-Stars-Team besiegte das Western All-Stars-Team mit 111:94. Ed Macauley von den Boston Celtics wurde als erster NBA All-Star Game Most Valuable Player Award ausgezeichnet. Das Spiel wurde ein Erfolg und zog 10.094 Zuschauer an, deutlich mehr als der Saisondurchschnitt von 3.500."
CW_Expansion_country.220.a:1 "OK"
CW_Expansion_news.220.t:0 "Erstes NBA All-Star Game"
CW_Expansion_news.220.d:0 "Das NBA All-Star Game 1951 war ein Basketball-Schauspiel, das am 2. März 1951 im Boston Garden in Boston, der Heimat der Boston Celtics, ausgetragen wurde. Es war die erste Ausgabe des All-Star Game der National Basketball Association (NBA) und fand während der NBA-Saison 1950/51 statt. Die Idee, ein All-Star Game abzuhalten, entstand während eines Treffens zwischen NBA-Präsident Maurice Podoloff, NBA-PR-Direktor Haskell Cohen und dem Besitzer der Boston Celtics, Walter A. Brown. Zu dieser Zeit war die Basketballwelt gerade vom Skandal um die Punktabzüge im College-Basketball erschüttert worden. Um die öffentliche Aufmerksamkeit wieder auf die Liga zu lenken, schlug Cohen vor, ein Schauspiel mit den besten Spielern der Liga auszurichten, ähnlich dem All-Star Game der Major League Baseball. Obwohl die meisten, einschließlich Podoloff, der Idee pessimistisch gegenüberstanden, blieb Brown zuversichtlich, dass es ein Erfolg werden würde. Er bot sogar an, das Spiel auszurichten und alle Kosten und potenziellen Verluste zu übernehmen. Das Eastern All-Stars-Team besiegte das Western All-Stars-Team 111–94. Ed Macauley von den Boston Celtics wurde als erster NBA All-Star Game Most Valuable Player Award ausgezeichnet. Das Spiel wurde ein Erfolg und zog 10.094 Zuschauer an, deutlich mehr als der Saisondurchschnitt von 3.500."
CW_Expansion_news.220.a:1 "OK"

CW_Expansion_country.221.t:0 "Prozess gegen die Rosenbergs"
CW_Expansion_country.221.d:0 "Spionage war während des Manhattan-Projekts ein großes Problem für die US-Regierung. Einige der am Manhattan-Projekt beteiligten Personen waren Spione und lieferten der Sowjetunion wertvolle Informationen über die Konstruktion der Atombombe. Am 29. August 1949 führte die Sowjetunion heimlich ihren ersten Atomwaffentest durch. Bis heute diskutieren Historiker und Wissenschaftler, wie sehr Spionage den Fortschritt des sowjetischen Atomwaffenprogramms beschleunigte. Julius Rosenberg war ein wichtiger sowjetischer Spion, der Informationen an die Sowjetunion weitergab und Spione für das Manhattan-Projekt rekrutierte. Er war US-Bürger und Elektroingenieur. 1951 wurden Julius und seine Frau Ethel wegen Spionage angeklagt und verurteilt, weil sie der Sowjetunion geheime Informationen geliefert hatten."
CW_Expansion_country.221.a:1 "OK"
