CW_Expansion_country.457.t:0 "Charles De Gaulle kehrt aus dem Ruhestand zurück"
CW_Expansion_country.457.d:0 "Am 1. Juni 1958 erhielt General Charles de Gaulle grünes Licht für die Bildung einer neuen Regierung. Da der Algerienkrieg Frankreich in einen Bürgerkrieg zu treiben drohte, forderte de Gaulle Sondervollmachten, um Ordnung und Einheit wiederherzustellen. Mit seiner rauen, scharfen Stimme verlas der General seine Erklärung: Vollmachten für sechs Monate, die Befugnis, eine neue Verfassung auszuarbeiten, die einem Referendum unterzogen werden sollte, die Zusicherung, dass die neue Verfassung alle souveräne Macht auf allgemeines Wahlrecht stützen und Legislative und Exekutive klar trennen würde, die Regierung jedoch dem Parlament verantwortlich machen würde."
CW_Expansion_country.457.a:1 "OK"
