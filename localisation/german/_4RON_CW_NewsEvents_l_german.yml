CW_Expansion_country.261.t:0 "Nationale Volksarmee"
CW_Expansion_country.261.d:0 "Die NVA wurde am 1. März 1956 als Nachfolgerin der Kasernierten Volkspolizei gegründet und entwickelte sich unter dem Einfluss der Sowjetarmee zu einer der Streitkräfte des Warschauer Pakts, die während des Kalten Krieges gegen die NATO kämpften. Die Mehrheit der NATO-Offiziere bewertete die NVA aufgrund ihrer Disziplin, ihrer gründlichen Ausbildung und der Qualität ihrer Offiziersführung als die beste Armee des Warschauer Pakts."
CW_Expansion_country.261.a:1 "OK"
