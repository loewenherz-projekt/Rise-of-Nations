CW_Expansion_country.277.t:0 "Batepa-Massaker"
CW_Expansion_country.277.d:0 "Das Massaker von Batepá ereignete sich am 3. Februar 1953 in São Tomé, als Hunderte einheimische Kreolen, sogenannte Forros, von der Kolonialverwaltung und portugiesischen Landbesitzern massakriert wurden. Viele Forros glaubten, die Regierung wolle sie zur Vertragsarbeit zwingen, was sie ablehnten. Daraufhin machte der Gouverneur Kommunisten für die Unruhen verantwortlich und befahl dem Militär, diese Personen festzunehmen und die Zivilisten zum Schutz aufzufordern. Dies artete schnell in ein Blutbad aus, bei dem Hunderte Forros starben. Eine kommunistische Verschwörung konnte nie nachgewiesen werden."
CW_Expansion_country.277.a:1 "OK"
