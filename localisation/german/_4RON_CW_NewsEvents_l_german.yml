CW_Expansion_country.384.t:0 "Genfer Gipfel"
CW_Expansion_country.384.d:0 "Der Genfer Gipfel von 1955 fand während des Kalten Krieges in Genf, Schweiz, statt. Am 18. Juli 1955 trafen sich die „Großen Vier“: Präsident [USA.GetLeader] der Vereinigten Staaten, Premierminister Anthony Eden von Großbritannien, Premier Nikolai A. Bulganin von der Sowjetunion und Premierminister Edgar Faure von Frankreich. Begleitet wurden sie von den Außenministern der vier Mächte (die auch Mitglieder des Rates der Außenminister waren): John Foster Dulles, Harold Macmillan, Wjatscheslaw Molotow und Antoine Pinay. Ebenfalls anwesend war Nikita Chruschtschow, der De-facto-Führer der Sowjetunion."
CW_Expansion_country.384.a:1 "OK"
