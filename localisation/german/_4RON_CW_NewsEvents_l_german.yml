CW_Expansion_country.118.t:0 "König Frederik IX. zum König von Dänemark gekrönt"
CW_Expansion_country.118.d:0 "Friedrich IX. war von 1947 bis 1972 König von Dänemark. Er wurde im Haus Glücksburg geboren und war der älteste Sohn von König Christian X. und Königin Alexandrine von Dänemark. Als sein Vater 1912 die Nachfolge seines Vaters antrat, wurde er Kronprinz. Als junger Mann besuchte er die Königlich Dänische Marineakademie. 1935 heiratete er Prinzessin Ingrid von Schweden und sie bekamen drei Töchter, Margrethe, Benedikte und Anne-Marie. Während der Besetzung Dänemarks durch Nazi-Deutschland fungierte Friedrich von 1942 bis 1943 als Regent im Auftrag seines Vaters. Nach dem Tod seines Vaters Anfang 1947 wurde Friedrich König. Während der Herrschaft Friedrichs IX. veränderte sich die dänische Gesellschaft rapide, der Wohlfahrtsstaat wurde ausgebaut und infolge der boomenden Wirtschaft der 1960er Jahre traten Frauen in den Arbeitsmarkt ein. Die Modernisierung brachte neue Anforderungen an die Monarchie und Friedrichs Rolle als konstitutioneller Monarch mit sich. Friedrich IX. starb 1972 und wurde von seiner ältesten Tochter, Königin Margrethe II., beerbt."
CW_Expansion_country.118.a:1 "OK"
