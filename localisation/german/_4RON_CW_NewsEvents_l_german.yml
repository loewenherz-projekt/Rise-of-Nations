CW_Expansion_country.456.t:0 "F-104 Starfighter stellt Geschwindigkeitsweltrekord auf"
CW_Expansion_country.456.d:0 "Am 18. Mai 1958 stellte der Lockheed F-104 Starfighter den Geschwindigkeitsweltrekord für ein Flugzeug auf, indem er eine Strecke von 243,6 km/h auf einer Strecke von 24 km zurücklegte. Gleichzeitig war er das erste Flugzeug überhaupt, das sowohl den Geschwindigkeitsweltrekord als auch den Höhenweltrekord hielt (27.643 m am 7. Mai 1958)."
CW_Expansion_country.456.a:1 "OK"
