CW_Expansion_country.461.t:0 "NASA erstellt"
CW_Expansion_country.461.d:0 "Am 29. Juli 1958 verabschiedete der US-Kongress ein Gesetz zur Gründung der National Aeronautics and Space Administration (NASA), einer zivilen Behörde, die die amerikanischen Aktivitäten im Weltraum koordinieren soll. Seitdem hat die NASA sowohl bemannte als auch maschinelle Weltraumexpeditionen gefördert, die wichtige Erkenntnisse über das Sonnensystem und das Universum lieferten. Darüber hinaus startete sie zahlreiche erdumlaufende Satelliten, die von der Wettervorhersage über die Navigation bis hin zur globalen Kommunikation eine wichtige Rolle spielten."
CW_Expansion_country.461.a:1 "OK"
