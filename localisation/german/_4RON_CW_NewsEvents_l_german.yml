CW_Expansion_news.145.a:1 "OK"

CW_Expansion_country.146.t:0 "Operation Polo"
CW_Expansion_country.146.d:0 "Operation Polo war der Deckname der „Polizeiaktion“ des damals gerade unabhängig gewordenen Dominion of India im September 1948 gegen den Bundesstaat Hyderabad. Es handelte sich um eine Militäroperation, bei der die indischen Streitkräfte in den vom Nizam regierten Fürstenstaat einmarschierten und ihn der Indischen Union eingliederten. Zum Zeitpunkt der Teilung Indiens 1947 unterlagen die Fürstenstaaten Indiens, die innerhalb ihrer eigenen Territorien grundsätzlich Selbstverwaltung genossen, subsidiären Bündnissen mit den Briten, die ihnen die Kontrolle über ihre Außenbeziehungen gaben. Mit dem Indian Independence Act 1947 kündigten die Briten alle derartigen Bündnisse auf und stellten die Staaten vor die Möglichkeit, sich für die vollständige Unabhängigkeit zu entscheiden. Bis 1948 hatten sich jedoch fast alle entweder Indien oder Pakistan angeschlossen. Eine große Ausnahme bildete das reichste und mächtigste Fürstentum Hyderabad, wo der Nizam, Mir Osman Ali Khan und Asaf Jah VII., ein muslimischer Herrscher mit einer überwiegend hinduistischen Bevölkerung, die Unabhängigkeit wählten und hofften, diese mit einer irregulären Armee aufrechtzuerhalten. Der Nizam wurde außerdem vom Telangana-Aufstand heimgesucht, den er nicht unterdrücken konnte."
CW_Expansion_country.146.a:1 "OK"
