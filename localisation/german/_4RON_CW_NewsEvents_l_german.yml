CW_Expansion_news.360.a:1 "Zerschmettere diesen Aufstand"

CW_Expansion_country.361.t:0 "Erster Godzilla-Film feiert Premiere in Tokio"
CW_Expansion_country.361.d:0 "Godzilla ist ein japanischer Kaiju-Film aus dem Jahr 1954. Regie führte Ishirō Honda, mit Spezialeffekten von Eiji Tsuburaya. Produziert und vertrieben von Toho Co., Ltd., ist er der erste Film der Godzilla-Reihe. Die Hauptrollen spielen Akira Takarada, Momoko Kōchi, Akihiko Hirata und Takashi Shimura, die Rollen von Godzilla werden von Haruo Nakajima und Katsumi Tezuka gespielt. Im Film befassen sich die japanischen Behörden mit dem plötzlichen Auftauchen eines riesigen Monsters, dessen Angriffe im Nachkriegsjapan Ängste vor einem nuklearen Holocaust auslösen."
CW_Expansion_country.361.a:1 "OK"
