win_war:0 "Der Eiserne Vorhang fällt"
win_war_desc:0 "Wir werden ganz Europa kontrollieren, vom Atlantik bis zum Ural. Durch militärische Stärke und politischen Einfluss werden wir den Kommunismus in allen Ländern verbreiten, kapitalistische Regime zerschlagen und die sowjetische Vorherrschaft über den Kontinent sichern. Keine Macht wird uns im Weg stehen, wenn wir Europa unter dem Banner der Roten Armee neu gestalten."
ddr_soviet_offensive:0 "Sowjetische Offensive"
war_expands_NAME:0 "Die Rote Welle"
war_expands_DESC:0 "Wir werden den Krieg auf Spanien und darüber hinaus ausweiten und das Feuer der Revolution nach ganz Europa tragen. Kein Land wird sich unserem Zugriff entziehen, während wir den Einfluss des Kommunismus von der Iberischen Halbinsel bis in die entlegensten Winkel des Kontinents ausdehnen. Die Rote Armee wird über alle triumphieren, die sich uns in den Weg stellen."
