roncw_warnews.1.t:0 "Revolution vom 14. Juli"
roncw_warnews.1.d:0 "Die Revolution vom 14. Juli, auch bekannt als der irakische Staatsstreich von 1958, fand am 14. Juli 1958 im Irak statt und führte zum Sturz der Haschemitischen Monarchie, die 1921 unter britischer Schirmherrschaft von König Faisal I. errichtet worden war. König Faisal II., Prinz Abd al-Ilah und Premierminister Nuri al-Said wurden während des Aufstands getötet. Der Putsch führte zum Sturz der irakischen Haschemitischen Dynastie und damit zur Gründung der Irakischen Republik. Der Putsch beendete die Haschemitische Arabische Föderation zwischen dem Irak und Jordanien, die erst sechs Monate zuvor gegründet worden war. Abd al-Karim Qasim blieb bis 1963 Premierminister, bevor er während der Ramadan-Revolution gestürzt und getötet wurde."
roncw_warnews.1.a:1 "Beunruhigend ..."

roncw_warnews.2.t:0 "Krieg in Abchasien"
roncw_warnews.2.d:0 "Der Krieg in Abchasien (in Abchasien auch als Vaterländischer Krieg des abchasischen Volkes bekannt) wurde zwischen 1992 und 1993 größtenteils zwischen georgischen Regierungstruppen und abchasischen Separatisten, russischen Regierungstruppen und nordkaukasischen Militanten ausgetragen. Die in Abchasien lebenden ethnischen Georgier kämpften größtenteils auf der Seite der georgischen Regierungstruppen. Ethnische Armenier und Russen in der abchasischen Bevölkerung unterstützten die Abchasen größtenteils, und viele kämpften auf ihrer Seite. Die Separatisten erhielten Unterstützung von Tausenden nordkaukasischen und kosakischen Militanten sowie von den in und um Abchasien stationierten Streitkräften der Russischen Föderation."
roncw_warnews.2.a:1 "Beunruhigend ..."

roncw_warnews.3.t:0 "Aufstand in Aceh"
roncw_warnews.3.d:0 "Der Aufstand in Aceh, von der indonesischen Regierung offiziell als Aceh-Unruhen bezeichnet, war ein Konflikt, den die Bewegung Freies Aceh (GAM) zwischen 1976 und 2005 mit dem Ziel führte, die Unabhängigkeit der Provinz Aceh von Indonesien zu erreichen. Nach einer heftigen Militäroffensive im Jahr 2003 und dem Erdbeben im Indischen Ozean im Jahr 2004 kam es zu einem Friedensabkommen und dem Ende des Aufstands."
roncw_warnews.3.a:1 "Beunruhigend ..."

roncw_warnews.4.t:0 "Notfall in Aden"
roncw_warnews.4.d:0 "Der Aden-Notstand, auch bekannt als Radfan-Aufstand, war ein bewaffneter Aufstand der NLF und FLOSY während des Kalten Krieges gegen die Föderation Südarabien, ein Protektorat des Britischen Empires, das heute Teil des Jemen ist. Teilweise inspiriert von Gamal Abdel Nassers panarabischem Nationalismus, begann er am 14. Oktober 1963 mit dem Werfen einer Granate auf eine Versammlung britischer Beamter am Flughafen Aden. Anschließend wurde in der britischen Kronkolonie Aden und ihrem Hinterland, dem Protektorat Aden, der Ausnahmezustand verhängt. Der Ausnahmezustand eskalierte 1967 und beschleunigte das Ende der britischen Herrschaft in dem Gebiet, das 1839 begonnen hatte. Am 30. November 1967 zogen sich die britischen Truppen zurück und die unabhängige Volksrepublik Südjemen wurde ausgerufen."
roncw_warnews.4.a:1 "Beunruhigend ..."

roncw_warnews.5.t:0 "ADF-Aufstand"
roncw_warnews.5.d:0 "Der Aufstand der Alliierten Demokratischen Kräfte (ADF) ist ein andauernder Konflikt der Alliierten Demokratischen Kräfte (ADF) in Uganda und der Demokratischen Republik Kongo gegen die Regierungen dieser beiden Länder. Der Aufstand begann 1995, verschärfte sich 2013 und forderte Hunderte Todesopfer. Die ADF kontrollieren derzeit eine Reihe versteckter Lager, in denen etwa 2.000 Menschen leben. In diesen Lagern operieren die ADF als Protostaat mit einem „inneren Sicherheitsdienst, einem Gefängnis, Gesundheitskliniken und einem Waisenhaus“ sowie Schulen für Jungen und Mädchen."
roncw_warnews.5.a:1 "Beunruhigend ..."

roncw_warnews.6.t:0 "Zweiter Afar-Aufstand"
roncw_warnews.6.d:0 "Der Zweite Afar-Aufstand ist ein anhaltender Aufstand in der Afar-Region Äthiopiens und der südlichen Rotmeerregion Eritreas (auch bekannt als Dankalia), der von verschiedenen Afar-Rebellengruppen geführt wird. Sowohl Äthiopien als auch Eritrea haben verschiedene Rebellengruppen in der Region in einem Stellvertreterkrieg unterstützt und sind gelegentlich in Grenzscharmützel miteinander sowie mit gegnerischen Rebellengruppen verwickelt."
roncw_warnews.6.a:1 "Beunruhigend ..."

roncw_warnews.7.t:0 "Bürgerkrieg in Afghanistan"
roncw_warnews.7.d:0 "Mudschaheddin-Gruppen, von denen einige mehr oder weniger in der Mudschaheddin der Islamischen Einheit Afghanistans vereint waren, verkündeten in den Jahren 1989 bis 1992 ihre Überzeugung, dass sie in Kabul gegen das feindliche „Marionettenregime“ der Republik Afghanistan kämpften. Im März 1989 griffen die Mudschaheddin-Gruppen Hezb-e Islami Gulbuddin und Ittehad-e Islami in Zusammenarbeit mit dem pakistanischen Inter-Services Intelligence (ISI) Jalalabad an, wurden jedoch bis Juni besiegt. Im März 1991 eroberte eine Mudschaheddin-Koalition innerhalb kürzester Zeit die Stadt Khost. Nachdem er im März 1992 auch die letzten Reste sowjetischer Unterstützung verloren hatte, erklärte sich Präsident Mohammad Najibullah bereit, zurückzutreten und einer Mudschaheddin-Koalitionsregierung Platz zu machen. Eine Mudschaheddin-Gruppe, Hezb-e Islami Gulbuddin, weigerte sich, im Rahmen des von Pakistan geförderten Friedensabkommens von Peshawar über eine Koalitionsregierung zu beraten und zu diskutieren und marschierte in Kabul ein. Dies löste am 25. April 1992 einen Bürgerkrieg zwischen zunächst drei, innerhalb weniger Wochen jedoch fünf oder sechs Mudschaheddin-Gruppen oder -Armeen aus."
roncw_warnews.7.a:1 "Beunruhigend ..."

roncw_warnews.8.t:0 "Bürgerkrieg in Afghanistan"
roncw_warnews.8.d:0 "Am 25. April 1992 brach ein Bürgerkrieg zwischen drei, später fünf oder sechs Mudschaheddin-Armeen aus, als die Hezb-e Islami Gulbuddin unter Führung von Gulbuddin Hekmatyar und mit Unterstützung des pakistanischen Geheimdienstes ISI sich weigerte, eine Koalitionsregierung mit anderen Mudschaheddin-Gruppen zu bilden und versuchte, Kabul selbst zu erobern. Nach vier Monaten waren bereits eine halbe Million Einwohner Kabuls aus der schwer bombardierten Stadt geflohen."
roncw_warnews.8.a:1 "Beunruhigend ..."

roncw_warnews.9.t:0 "Luftschlacht über Merklín"
roncw_warnews.9.d:0 "Die Luftschlacht um Merklín war ein Luftkampf zwischen tschechoslowakischen und USAFE-Lufteinheiten über dem tschechischen Dorf Merklín im Böhmerwald am 10. März 1953. Während des Gefechts schoss der tschechische Pilot Jaroslav Šrámek mit einer MiG-15 einen von zwei amerikanischen F-84E Thunderjets (vom 53. Jagdbombergeschwader, 36. Jagdbombergeschwader) ab. Der amerikanische Pilot, Lt. Warren G. Brown, katapultierte sich aus dem Flugzeug, das auf deutschem Gebiet, etwa 35 Kilometer von der Grenze entfernt, abstürzte und überlebte."
roncw_warnews.9.a:1 "Beunruhigend ..."

roncw_warnews.10.t:0 "Al-Ansar-Aufstand"
roncw_warnews.10.d:0 "Als das Bündnis zwischen der Kommunistischen Partei und der Arabischen Sozialistischen Baath-Partei endete, folgte eine Welle brutaler Repressionen gegen die Kommunistische Partei. 1977 begann das Regime ein schärferes Vorgehen gegen die Kommunisten. Zahlreiche kommunistische Kader flohen in die kurdischen Gebiete im Nordirak, um einer Verhaftung zu entgehen. Bis Januar 1979 hatten die im Exil lebenden Kommunisten Partisanenkampfeinheiten gegründet. Im April 1979 war die al-Ansar-Bewegung einsatzfähig. Hauptquartiere der Partisaneneinheiten wurden in Kirkuk und as-Sulemaniyah eingerichtet, Stützpunkte in Erbil. Später kamen Stützpunkte in Dohuk und Ninive hinzu. Der Aufbau von al-Ansar erfolgte jedoch ohne die volle Zustimmung des Politbüros der Partei."
roncw_warnews.10.a:1 "Beunruhigend ..."

roncw_warnews.11.t:0 "Al-Qaida-Aufstand im Jemen"
roncw_warnews.11.d:0 "Der Al-Qaida-Aufstand im Jemen war ein bewaffneter Konflikt zwischen der jemenitischen Regierung, den USA und Al-Qaida-nahen Zellen im Jemen. Er ist Teil des Globalen Krieges gegen den Terror. Das rigorose Vorgehen der Regierung gegen Al-Qaida-Zellen begann 2001 und eskalierte stetig, bis der Jemen am 14. Januar 2010 Al-Qaida den offenen Krieg erklärte. Neben dem Kampf gegen Al-Qaida in mehreren Provinzen hatte der Jemen auch mit einem schiitischen Aufstand im Norden und militanten Separatisten im Süden zu kämpfen. Die Kämpfe mit Al-Qaida eskalierten im Zuge der jemenitischen Revolution 2011 weiter, als Dschihadisten den größten Teil des Gouvernements Abyan einnahmen und es zum Emirat erklärten. Eine zweite Welle der Gewalt begann Anfang 2012, als Militante inmitten schwerer Gefechte mit Regierungstruppen Gebiete im Südwesten beanspruchten. Am 16. September 2014 brach ein umfassender Bürgerkrieg aus, nachdem Huthi-Kämpfer Sana&#39;a stürmten und Interimspräsident Hadi stürzten. Dadurch spaltete sich die jemenitische Regierung zwischen der von der UNO anerkannten Regierung von Präsident Hadi und dem neu gegründeten Obersten Politischen Rat der Huthi. Der umfassende Bürgerkrieg führte zum Aufstieg islamistischer Gruppen (Al-Qaida, ISIS), Aufständen (Huthis) und Forderungen nach einer Abspaltung Südjemens."
roncw_warnews.11.a:1 "Beunruhigend ..."

roncw_warnews.12.t:0 "Albanischer Bürgerkrieg"
roncw_warnews.12.d:0 "Der albanische Bürgerkrieg war eine Zeit ziviler Unruhen in Albanien im Jahr 1997, die durch das Scheitern von Schneeballsystemen ausgelöst wurde. Die Regierung wurde gestürzt und über 2.000 Menschen kamen ums Leben. Man wertet den Krieg entweder als Rebellion, Bürgerkrieg oder als Rebellion, die zu einem Bürgerkrieg eskalierte. Im Januar 1997 gingen die albanischen Bürger, die insgesamt 1,2 Milliarden Dollar (durchschnittlich 400 Dollar pro Person im ganzen Land) verloren hatten, auf die Straße und protestierten damit. Ab Februar starteten Tausende von Bürgern täglich Protestaktionen und forderten die Regierung zur Rückerstattung ihrer Verluste, da sie glaubten, sie profitiere von den Schneeballsystemen. Am 1. März trat Ministerpräsident Aleksandër Meksi zurück und am 2. März rief Präsident Sali Berisha den Ausnahmezustand aus. Am 11. März errang die Sozialistische Partei Albaniens einen wichtigen Sieg, als ihr Vorsitzender Bashkim Fino zum Ministerpräsidenten ernannt wurde. Der Machtwechsel konnte die Unruhen jedoch nicht beenden und die Proteste weiteten sich auf Nordalbanien aus. Zwar gelang es der Regierung, die Aufstände im Norden niederzuschlagen, doch die Fähigkeit der Regierung und des Militärs, die Ordnung aufrechtzuerhalten, begann zu schwinden, insbesondere in der südlichen Hälfte Albaniens, die unter die Kontrolle von Rebellen und kriminellen Banden geriet."
roncw_warnews.12.a:1 "Beunruhigend ..."

roncw_warnews.13.t:0 "Bürgerkrieg in Algerien"
roncw_warnews.13.d:0 "Der Algerische Bürgerkrieg war ein Bürgerkrieg in Algerien, der vom 26. Dezember 1991 (nach einem Putsch, der einen islamistischen Wahlsieg zunichtemachte) bis zum 8. Februar 2002 zwischen der algerischen Regierung und verschiedenen islamistischen Rebellengruppen geführt wurde. Der Krieg begann langsam, da es zunächst so aussah, als hätte die Regierung die islamistische Bewegung erfolgreich niedergeschlagen. Doch dann entstanden bewaffnete Gruppen, die den Dschihad führten, und 1994 hatte die Gewalt ein solches Ausmaß erreicht, dass die Regierung ihr nicht mehr standhalten konnte. 1996/97 wurde deutlich, dass der islamistische Widerstand seine Unterstützung in der Bevölkerung verloren hatte, obwohl die Kämpfe noch mehrere Jahre andauerten."
roncw_warnews.13.a:1 "Beunruhigend ..."

roncw_warnews.14.t:0 "Algerienkrieg"
roncw_warnews.14.d:0 "Der Algerienkrieg, auch bekannt als Algerischer Unabhängigkeitskrieg oder Algerische Revolution, in Algerien manchmal auch als 1.-November-Krieg bezeichnet, wurde von 1954 bis 1962 zwischen Frankreich und der Algerischen Nationalen Befreiungsfront ausgetragen und führte zur Unabhängigkeit Algeriens von Frankreich. Als wichtiger Entkolonialisierungskrieg war dieser komplexe Konflikt geprägt von Guerillakrieg, Maquis-Kämpfen und Folter. Der Konflikt entwickelte sich auch zu einem Bürgerkrieg zwischen den verschiedenen Gemeinschaften und innerhalb der Gemeinschaften. Der Krieg fand hauptsächlich auf algerischem Gebiet statt und hatte Auswirkungen auf das französische Mutterland."
roncw_warnews.14.a:1 "Beunruhigend ..."

roncw_warnews.15.t:0 "Krise im Suez"
roncw_warnews.15.d:0 "Die Suezkrise, auch Zweiter Arabisch-Israelischer Krieg genannt, in der arabischen Welt auch Dreimächtekrieg und in Israel Sinai-Krieg genannt, war eine Invasion Israels Ende 1956 in Ägypten, gefolgt von Großbritannien und Frankreich. Ziel war es, die westliche Kontrolle über den Suezkanal zurückzugewinnen und den ägyptischen Präsidenten Gamal Abdel Nasser zu stürzen, der den Kanal gerade verstaatlicht hatte. Nach Beginn der Kämpfe führte politischer Druck der USA, der Sowjetunion und der Vereinten Nationen zum Rückzug der drei Invasoren. Diese Episode demütigte Großbritannien und Frankreich und stärkte Nassers Position."
roncw_warnews.15.a:1 "Beunruhigend ..."

roncw_warnews.16.t:0 "Bürgerkrieg in Angola"
roncw_warnews.16.d:0 "Der Angolanische Bürgerkrieg war ein Bürgerkrieg in Angola, der 1975 begann und mit Unterbrechungen bis 2002 andauerte. Der Krieg begann unmittelbar nach der Unabhängigkeit Angolas von Portugal im November 1975. Der Krieg war ein Machtkampf zwischen zwei ehemaligen antikolonialen Guerillabewegungen, der kommunistischen Volksbewegung zur Befreiung Angolas (MPLA) und der antikommunistischen Nationalen Union für die völlige Unabhängigkeit Angolas (UNITA). Der Krieg wurde von rivalisierenden Staaten wie der Sowjetunion, Kuba, Südafrika und den Vereinigten Staaten als Ersatzschlachtfeld für den Kalten Krieg genutzt."
roncw_warnews.16.a:1 "Beunruhigend ..."

roncw_warnews.17.t:0 "Angolanischer Unabhängigkeitskrieg"
roncw_warnews.17.d:0 "Der angolanische Unabhängigkeitskrieg, in Angola Luta Armada de Libertação Nacional („Bewaffneter Kampf der nationalen Befreiung“) genannt, begann als Aufstand gegen den Zwangsanbau von Baumwolle und entwickelte sich zu einem Kampf zwischen drei nationalistischen Bewegungen und einer separatistischen Bewegung um die Kontrolle der portugiesischen Überseeprovinz Angola. Der Krieg endete mit dem Sturz des portugiesischen Estado-Novo-Regimes durch einen linken Militärputsch in Lissabon im April 1974. Das neue Regime stellte daraufhin alle militärischen Aktionen in den afrikanischen Kolonien sofort ein und erklärte, ihnen unverzüglich die Unabhängigkeit zu gewähren."
roncw_warnews.17.a:1 "Beunruhigend ..."

roncw_warnews.18.t:0 "Annexion von Dadra und Nagar Haveli"
roncw_warnews.18.d:0 "Die Annexion von Dadra und Nagar Haveli war der Konflikt, in dessen Verlauf die Gebiete Dadra und Nagar Haveli 1954 von portugiesischer Herrschaft an die Indische Union übergingen. Dadra und Nagar Haveli waren kleine portugiesische Überseegebiete und von 1779 bis 1954 Teil Portugiesisch-Indiens. Die Gebiete waren Enklaven ohne Zugang zum Meer, die vom portugiesischen Gouverneur des Distrikts Daman verwaltet wurden. Nachdem Indien 1947 seine Unabhängigkeit erlangt hatte, besetzten einige Einwohner 1954 mit Hilfe von Freiwilligen von Organisationen wie der United Front of Goans (UFG), der National Movement Liberation Organisation (NMLO), der Goa People&#39;s Party (der kommunistischen Ideologie nahestehend), der Undivided Communist Party of India, der Rashtriya Swayamsevak Sangh und der Azad Gomantak Dal Dadra und Nagar Haveli und verdrängten die portugiesische Herrschaft. Die Gebiete wurden anschließend 1961 in die Indische Union eingegliedert."
roncw_warnews.18.a:1 "Beunruhigend ..."

roncw_warnews.19.t:0 "APRA-Staatsstreich"
roncw_warnews.19.d:0 "Der APRA-Putsch war ein Staatsstreich von Raymond Westerlings Legion von Ratu Adil (APRA) mit dem Ziel, Bandung und Jakarta einzunehmen und Sukarnos Einheitsrepublik Indonesien zu stürzen. Westerling war ein demobilisierter niederländischer Hauptmann der KNIL (Königlich Niederländisch-Ostindien-Armee), der die Bundesrepublik der Vereinigten Staaten von Indonesien bewahren wollte, die weiterhin von den Niederlanden und verschiedenen Minderheiten unterstützt wurde. Westerlings Truppen gelang es in den frühen Morgenstunden des 23. Januar 1950, Bandung einzunehmen."
roncw_warnews.19.a:1 "Beunruhigend ..."

roncw_warnews.20.t:0 "Erster arabisch-israelischer Krieg"
roncw_warnews.20.d:0 "Der Arabisch-Israelische Krieg von 1948 (oder Erste) war die zweite und letzte Phase des Palästinakriegs von 1947–1949. Er begann offiziell nach dem Ende des britischen Mandats für Palästina um Mitternacht des 14. Mai 1948; die israelische Unabhängigkeitserklärung war zuvor am selben Tag veröffentlicht worden, und am Morgen des 15. Mai marschierte eine Militärkoalition arabischer Staaten in das Gebiet Britisch-Palästinas ein. Die ersten Todesopfer des Palästinakriegs von 1947–1949 ereigneten sich am 30. November 1947 bei einem Hinterhalt auf zwei Busse mit Juden. Seit der Balfour-Deklaration von 1917 und der Schaffung des britischen Mandats für Palästina im Jahr 1920 hatte es Spannungen und Konflikte zwischen Arabern und Juden sowie zwischen ihnen und den britischen Streitkräften gegeben. Die britische Politik war sowohl bei Arabern als auch bei Juden unzufrieden. Der arabische Widerstand entwickelte sich zum Arabischen Aufstand in Palästina von 1936 bis 1939, während sich der jüdische Widerstand zum jüdischen Aufstand in Palästina (1944–1947) entwickelte. Diese anhaltenden Spannungen mündeten 1947 in einen Bürgerkrieg, nachdem am 29. November 1947 der Teilungsplan der Vereinten Nationen für Palästina verabschiedet worden war. Dieser sah die Aufteilung Palästinas in einen arabischen Staat, einen jüdischen Staat und das Internationale Sonderregime mit den Städten Jerusalem und Bethlehem vor."
roncw_warnews.20.a:1 "Beunruhigend ..."

roncw_warnews.21.t:0 "Guerillakrieg in Araguaia"
roncw_warnews.21.d:0 "Die Araguaia-Guerilla war eine bewaffnete Bewegung in Brasilien gegen die dortige Militärdiktatur und war zwischen 1967 und 1974 im Einzugsgebiet des Flusses Araguaia aktiv. Sie wurde von Aktivisten der Kommunistischen Partei Brasiliens (PC do B), dem damaligen maoistischen Gegenstück zur Kommunistischen Partei Brasiliens (PCB), gegründet. Ihr Ziel war es, eine ländliche Hochburg zu errichten, von der aus sie einen „Volkskrieg“ gegen die brasilianische Militärdiktatur führen wollte, die seit dem Staatsstreich von 1964 an der Macht war. Ihre geplanten Aktivitäten basierten auf den erfolgreichen Erfahrungen der Bewegung des 26. Juli während der kubanischen Revolution und der Kommunistischen Partei Chinas während des chinesischen Bürgerkriegs."
roncw_warnews.21.a:1 "Beunruhigend ..."

roncw_warnews.22.t:0 "Bewaffneter Widerstand in Chile"
roncw_warnews.22.d:0 "Nach dem chilenischen Staatsstreich von 1973 entwickelte sich eine bewaffnete linke Widerstandsbewegung gegen die Diktatur Augusto Pinochets, die bis zur Wiederherstellung der Demokratie 1990 andauerte. Dieser Konflikt war Teil des südamerikanischen Kalten Krieges, wobei die USA das chilenische Militär und die Sowjetunion die Guerilla unterstützten. Die wichtigsten bewaffneten Widerstandsgruppen dieser Zeit waren die Revolutionäre Linke Bewegung (MIR) und die Frente Patriótico Manuel Rodríguez (FPMR), der bewaffnete Flügel der Kommunistischen Partei Chiles. Diese Gruppen waren seit langem miteinander rivalisiert, unter anderem hinsichtlich der marxistischen Orthodoxie."
roncw_warnews.22.a:1 "Beunruhigend ..."

roncw_warnews.23.t:0 "Herbstaufstand"
roncw_warnews.23.d:0 "Der Daegu-Aufstand vom 10.1.1946 in Korea war ein Bauernaufstand in den südlichen Provinzen Koreas gegen die Politik der US-Militärregierung in Korea unter General John R. Hodge und für die Wiederherstellung der Macht der Volkskomitees der Volksrepublik Korea. Der Aufstand wurde auch als Daegu-Aufstand oder Daegu-Widerstandsbewegung bezeichnet. Die südkoreanische Wahrheits- und Versöhnungskommission wählte den neutralen Namen „Daegu-Oktober-Zwischenfall“."
roncw_warnews.23.a:1 "Beunruhigend ..."

roncw_warnews.24.t:0 "Bajaur-Kampagne"
roncw_warnews.24.d:0 "Die Beziehungen zwischen den beiden Ländern wurden gespannt, als Afghanistan sich als einziges Land weigerte, Pakistan als souveränen Staat in die Vereinten Nationen aufzunehmen. Darüber hinaus beanspruchte Afghanistan die westlichen Provinzen Pakistans. 1948 bewaffnete und finanzierte Afghanistan Stellvertretertruppen in Pakistan in der Region Tirah (Khyber) und Razmak (Wasiristan). Ende der 1950er Jahre griff die afghanische Armee mit Artillerieunterstützung Dobandi in Belutschistan an und besetzte die Eisenbahnverbindung Chaman-Quetta, einen wichtigen strategischen Pass. Nach einwöchigen Kämpfen eroberte die pakistanische Armee den Pass zurück und zwang die afghanischen Streitkräfte zum Rückzug. Die Beziehungen verschlechterten sich weiter, als 1951 der afghanische Staatsbürger Saad Akbar Babrak Mardood den pakistanischen Premierminister Liaquat Ali Khan während einer öffentlichen Kundgebung in Rawalpindi ermordete. Am 30. März 1955 griffen afghanische Demonstranten die pakistanische Botschaft und Konsulate in Kabul, Kandahar und Jalalabad an und brannten sie nieder. Die diplomatischen Beziehungen zwischen beiden Staaten wurden abgebrochen."
roncw_warnews.24.a:1 "Beunruhigend ..."

roncw_warnews.25.t:0 "Aufstand in Bangladesch"
roncw_warnews.25.d:0 "Der Aufstand in Bangladesch von 1972–1975 bezeichnet die Zeit nach der Unabhängigkeit Bangladeschs, als linksgerichtete Aufständische, insbesondere die Gonobahini, gegen die Regierung von Scheich Mujibur Rahman kämpften. Die Regierung reagierte mit der Gründung der Jatiya Rakkhi Bahini, die ein rigoroses Vorgehen gegen die Bevölkerung einleitete. Die Truppe war in zahlreiche Anklagen wegen Menschenrechtsverletzungen verwickelt, darunter politische Morde, Erschießungen durch Todesschwadronen und Vergewaltigungen."
roncw_warnews.25.a:1 "Beunruhigend ..."

roncw_warnews.26.t:0 "Bangladeschischer Befreiungskrieg"
roncw_warnews.26.d:0 "Der Bangladeschische Befreiungskrieg, auch bekannt als Bangladeschischer Unabhängigkeitskrieg oder einfach der Befreiungskrieg in Bangladesch, war eine Revolution und ein bewaffneter Konflikt, der durch den Aufstieg der bengalischen nationalistischen Selbstbestimmungsbewegung im damaligen Ostpakistan während des Völkermords in Bangladesch 1971 ausgelöst wurde. Er führte zur Unabhängigkeit der Volksrepublik Bangladesch. Der Krieg begann, nachdem die in Westpakistan stationierte pakistanische Militärjunta in der Nacht des 25. März 1971 die Operation Searchlight gegen die Bevölkerung Ostpakistans gestartet hatte. Sie zielte auf die systematische Eliminierung nationalistischer bengalischer Zivilisten, Studenten, Intellektueller, religiöser Minderheiten und bewaffneter Kräfte. Die Junta annullierte die Ergebnisse der Wahlen von 1970 und verhaftete den designierten Premierminister Scheich Mujibur Rahman. Der Krieg endete am 16. Dezember 1971 mit der Kapitulation Westpakistans."
roncw_warnews.26.a:1 "Beunruhigend ..."

roncw_warnews.27.t:0 "Konflikt der Basken"
roncw_warnews.27.d:0 "Der Baskenkonflikt, auch bekannt als Spanien-ETA-Konflikt, war ein bewaffneter und politischer Konflikt von 1959 bis 2011 zwischen Spanien und der Baskischen Nationalen Befreiungsbewegung, einer Gruppe sozialer und politischer baskischer Organisationen, die die Unabhängigkeit von Spanien und Frankreich anstrebten. Die Bewegung basierte auf der separatistischen Organisation ETA, die seit 1959 eine Angriffskampagne gegen die spanische Regierung gestartet hatte. Die ETA war zu verschiedenen Zeitpunkten von den spanischen, britischen, französischen und amerikanischen Behörden als terroristische Organisation verboten worden. Der Konflikt fand größtenteils auf spanischem Boden statt, obwohl er in geringerem Maße auch in Frankreich präsent war, das von ETA-Mitgliedern hauptsächlich als Zufluchtsort genutzt wurde. Es war der am längsten andauernde gewaltsame Konflikt im modernen Westeuropa."
roncw_warnews.27.a:1 "Beunruhigend ..."

roncw_warnews.28.t:0 "Batken-Konflikt"
roncw_warnews.28.d:0 "Der Batken-Konflikt war eine Zeit bewaffneter Auseinandersetzungen zwischen Militanten der Islamischen Bewegung Usbekistans (IMU) und den Streitkräften Kirgisistans, wobei letztere von den usbekischen Bodentruppen unterstützt wurden. Auslöser waren Einfälle von IMU-Militanten aus Tadschikistan in usbekisches und kirgisisches Gebiet. Im Mittelpunkt stand teilweise die einseitige Demarkation der Grenze zwischen Kirgisistan und Usbekistan durch Usbekistan."
roncw_warnews.28.a:1 "Beunruhigend ..."

roncw_warnews.29.t:0 "Schlacht von Chamdo"
roncw_warnews.29.d:0 "Die Schlacht von Chamdo fand vom 6. bis 19. Oktober 1950 statt. Es handelte sich um eine Militärkampagne der Volksrepublik China (VRC), um die Region Chamdo einem de facto unabhängigen tibetischen Staat abzunehmen, nachdem die Verhandlungen über den Status Tibets monatelang gescheitert waren. Laut Melvyn Goldstein zielte die Kampagne nicht darauf ab, Tibet an sich zu erobern, sondern die Chamdo besetzende Armee von Lhasa gefangen zu nehmen, die Regierung in Lhasa zu demoralisieren und Druck auszuüben, um tibetische Vertreter dazu zu bewegen, Verhandlungen in Peking zuzustimmen und Bedingungen zu unterzeichnen, die Chinas Souveränität über Tibet anerkannten. Die Kampagne führte zur Einnahme von Chamdo und weiteren Verhandlungen zwischen der VRC und tibetischen Vertretern, die schließlich zur Annexion Tibets durch die Volksrepublik China führten."
roncw_warnews.29.a:1 "Beunruhigend ..."

roncw_warnews.30.t:0 "Invasion in der Schweinebucht"
roncw_warnews.30.d:0 "Die Invasion in der Schweinebucht (auch Invasión de Playa Girón oder Batalla de Girón, nach der Playa Girón genannt) war eine gescheiterte Landungsoperation an der Südwestküste Kubas im Jahr 1961 durch kubanische Exilanten, die sich Fidel Castros kubanischer Revolution widersetzten. Die Operation wurde heimlich von der US-Regierung finanziert und geleitet, fand auf dem Höhepunkt des Kalten Krieges statt und ihr Scheitern führte zu erheblichen Veränderungen in den internationalen Beziehungen zwischen Kuba, den Vereinigten Staaten und der Sowjetunion."
roncw_warnews.30.a:1 "Beunruhigend ..."
#
roncw_warnewscountry.30.t:0 "Schweinebucht"
roncw_warnewscountry.30.d:0 "Sollten wir in die Schweinebucht einmarschieren? Die Invasion, auch Invasión de Playa Girón oder Batalla de Girón genannt, war eine gescheiterte Landungsoperation an der Südwestküste Kubas im Jahr 1961 durch Exilkubaner, die sich Fidel Castros kubanischer Revolution widersetzten. Die Operation, die heimlich von der US-Regierung finanziert und geleitet wurde, fand auf dem Höhepunkt des Kalten Krieges statt. Ihr Scheitern führte zu tiefgreifenden Veränderungen in den internationalen Beziehungen zwischen Kuba, den USA und der Sowjetunion. Dieses historische Ereignis ist zweifellos beunruhigend."
roncw_warnewscountry.30.a:0 "Wir werden die Invasion beginnen ..."
roncw_warnewscountry.30.b:0 "Wir werden nicht"
#
roncw_warnews.31.t:0 "Bizerte-Krise"
roncw_warnews.31.d:0 "Die Bizerte-Krise ereignete sich im Juli 1961, als Tunesien eine Blockade über den französischen Marinestützpunkt in Bizerte verhängte, um ihn zur Räumung zu zwingen. Die Krise gipfelte in einer dreitägigen Schlacht zwischen französischen und tunesischen Streitkräften, bei der etwa 630 Tunesier und 24 Franzosen starben. Schließlich trat Frankreich 1963 die Stadt und den Marinestützpunkt an Tunesien ab."
roncw_warnews.31.a:1 "Beunruhigend ..."

roncw_warnews.32.t:0 "Schwarzer September in Jordanien"
roncw_warnews.32.d:0 "Der Schwarze September war ein Konflikt im Haschemitischen Königreich Jordanien zwischen den jordanischen Streitkräften (JAF) unter der Führung von König Hussein und der Palästinensischen Befreiungsorganisation (PLO) unter der Führung von Jassir Arafat, der hauptsächlich zwischen dem 16. und 27. September 1970 ausgetragen wurde, wobei bestimmte Aspekte des Konflikts bis zum 17. Juli 1971 andauerten."
roncw_warnews.32.a:1 "Beunruhigend ..."

roncw_warnews.33.t:0 "Bosnienkrieg"
roncw_warnews.33.d:0 "Der Bosnienkrieg war ein internationaler bewaffneter Konflikt, der zwischen 1992 und 1995 in Bosnien und Herzegowina stattfand. Nach einer Reihe gewalttätiger Zwischenfälle Anfang 1992 wird der Beginn des Krieges allgemein auf den 6. April 1992 datiert. Der Krieg endete am 14. Dezember 1995. Die Hauptkriegsparteien waren die Streitkräfte der Republik Bosnien und Herzegowina sowie der Republika Srpska und der Herzegowina-Herzegowina, Protostaaten unter der Führung Serbiens bzw. Kroatiens."
roncw_warnews.33.a:1 "Beunruhigend ..."

roncw_warnews.34.t:0 "Aufstand in Brunei"
roncw_warnews.34.d:0 "Der Brunei-Aufstand war ein Aufstand im Dezember 1962 im britischen Protektorat Brunei von Gegnern der Monarchie und des geplanten Beitritts zur malaysischen Föderation. Die Aufständischen waren Mitglieder der TNKU (North Kalimantan National Army), einer von Indonesien gestellten Miliz mit Verbindungen zur linksgerichteten Brunei People&#39;s Party (BPP), die eine Föderation Nordborneos befürwortete. Die TNKU begann koordinierte Angriffe auf die Ölstadt Seria (mit dem Ziel der Ölanlagen von Royal Dutch Shell), auf Polizeistationen und Regierungseinrichtungen im gesamten Protektorat. Der Aufstand brach innerhalb weniger Stunden zusammen, da wichtige Ziele wie die Einnahme der Stadt Brunei und Sultan Omar Ali Saifuddien III. nicht erreicht worden waren. Der Aufstand beeinflusste die Entscheidung des Sultans im Jahr 1963, sich Malaysia nicht anzuschließen. Er gilt als eine der ersten Phasen der indonesisch-malaysischen Konfrontation."
roncw_warnews.34.a:1 "Beunruhigend ..."

roncw_warnews.35.t:0 "Cabinda-Krieg"
roncw_warnews.35.d:0 "Der Cabinda-Krieg ist ein anhaltender separatistischer Aufstand der Front zur Befreiung der Enklave Cabinda (FLEC) gegen die angolanische Regierung. Ziel der FLEC ist die Wiederherstellung der selbsternannten Republik Cabinda innerhalb der Grenzen der angolanischen Provinz Cabinda."
roncw_warnews.35.a:1 "Beunruhigend ..."

roncw_warnews.36.t:0 "Calderonistische Invasion Costa Ricas"
roncw_warnews.36.d:0 "Die calderonistische Invasion Costa Ricas war ein kleiner Aufstand im Nordwesten Costa Ricas, der von Truppen durchgeführt wurde, die dem verärgerten ehemaligen Präsidenten Rafael Calderón treu ergeben waren. Unterstützt wurde er von der Regierung Nicaraguas, die mit der Wahl von José „Pepe“ Figueres Ferrer zum Präsidenten Costa Ricas zwei Jahre zuvor unzufrieden war."
roncw_warnews.36.a:1 "Beunruhigend ..."

roncw_warnews.37.t:0 "Kambodschanischer Bürgerkrieg"
roncw_warnews.37.d:0 "Der kambodschanische Bürgerkrieg war ein Bürgerkrieg in Kambodscha, der zwischen den Streitkräften der Kommunistischen Partei Kampucheas (bekannt als die Roten Khmer, unterstützt von Nordvietnam und dem Vietcong) und den Regierungstruppen des Königreichs Kambodscha und, nach Oktober 1970, der Khmer-Republik, die das Königreich abgelöst hatte, ausgetragen wurde (beide unterstützt von den Vereinigten Staaten (USA) und Südvietnam). "
roncw_warnews.37.a:1 "Beunruhigend ..."

roncw_warnews.38.t:0 "Kambodschanisch-Vietnamesischer Krieg"
roncw_warnews.38.d:0 "Der Kambodschanisch-Vietnamesische Krieg (in Vietnam als „Gegenoffensive an der Südwestgrenze“ und von kambodschanischen Nationalisten als „Vietnamesische Invasion in Kambodscha“ bezeichnet) war ein bewaffneter Konflikt zwischen dem von den Roten Khmer kontrollierten Demokratischen Kampuchea und der Sozialistischen Republik Vietnam. Der Krieg begann mit wiederholten Angriffen der Kambodschanischen Revolutionsarmee an der Südwestgrenze Vietnams, insbesondere dem Massaker von Ba Chuc, bei dem über 3.000 vietnamesische Zivilisten ums Leben kamen. Am 25. Dezember 1978 startete Vietnam eine groß angelegte Invasion in Kampuchea, besetzte anschließend das Land und entmachtete die Regierung der Kommunistischen Partei Kampucheas."
roncw_warnews.38.a:1 "Beunruhigend ..."

roncw_warnews.39.t:0 "Bamileke-Krieg"
roncw_warnews.39.d:0 "Der Bamileke-Krieg, oft auch als Guerre Cachée oder Verborgener Krieg bezeichnet, ist der Name des Unabhängigkeitskampfes zwischen der nationalistischen Bamileke-Bewegung Kameruns und Frankreich. Angeführt wurde die Bewegung von der Kamerunischen Volksunion (UPC). Auch nach der Unabhängigkeit dauerte der Aufstand an und prägte die zeitgenössische Politik. Der Krieg begann 1955 mit Unruhen und dauerte auch nach der Unabhängigkeit Kameruns 1960 an. Nach der Unabhängigkeit forderte der erste Präsident Kameruns, Ahmadou Ahidjo, eine weitere französische Militärintervention zur Bekämpfung der UPC-Rebellen. Der UPC-Aufstand wurde bis 1964 von den kamerunischen Streitkräften und der französischen Armee weitgehend niedergeschlagen. Dieser Krieg gerät oft in Vergessenheit, da er auf dem Höhepunkt von Frankreichs größtem kolonialen Unabhängigkeitskampf, dem Algerienkrieg, stattfand."
roncw_warnews.39.a:1 "Beunruhigend ..."

roncw_warnews.40.t:0 "Casamance-Konflikt"
roncw_warnews.40.d:0 "Der Casamance-Konflikt ist ein andauernder Konflikt niedriger Intensität, der seit 1982 zwischen der senegalesischen Regierung und der Bewegung der Demokratischen Kräfte der Casamance (MFDC) ausgetragen wird. Die MFDC fordert die Unabhängigkeit der Region Casamance, deren Bevölkerung sich religiös und ethnisch vom Rest Senegals unterscheidet."
roncw_warnews.40.a:1 "Beunruhigend ..."

roncw_warnews.41.t:0 "Cenepa-Krieg"
roncw_warnews.41.d:0 "Der Cenepa-Krieg (26. Januar – 28. Februar 1995), auch bekannt als Alto-Cenepa-Krieg, war ein kurzer und örtlich begrenzter militärischer Konflikt zwischen Ecuador und Peru um die Kontrolle eines Gebiets auf peruanischem Territorium (im Osten der Cordillera del Cóndor, Provinz Condorcanqui, Región Amazonas, Republik Peru) nahe der Grenze zwischen den beiden Ländern (siehe Karte in der Infobox). Die beiden Nationen hatten nach dem Ecuadorianisch-Peruanischen Krieg von 1941 einen Grenzvertrag unterzeichnet, doch Ecuador widersprach später diesem Vertrag, da er die Gebiete Cenepa und Paquisha betraf, und erklärte ihn 1960 für null und nichtig."
roncw_warnews.41.a:1 "Beunruhigend ..."

roncw_warnews.42.t:0 "Tschadischer Bürgerkrieg"
roncw_warnews.42.d:0 "Der tschadische Bürgerkrieg von 1965 bis 1979 wird von mehreren Rebellenfraktionen gegen den tschadischen Präsidenten François Tombalbaye geführt, dessen Regime von Autoritarismus, extremer Korruption und Günstlingswirtschaft geprägt war."
roncw_warnews.42.a:1 "Beunruhigend ..."

roncw_warnews.43.t:0 "Tschadisch-libyscher Konflikt"
roncw_warnews.43.d:0 "Der tschadisch-libysche Konflikt war eine Reihe von Militärkampagnen im Tschad zwischen 1978 und 1987, die zwischen libyschen und verbündeten tschadischen Streitkräften gegen von Frankreich unterstützte tschadische Gruppen ausgetragen wurden, wobei gelegentlich auch andere Länder und Fraktionen beteiligt waren. Libyen war bereits vor 1978 und vor Muammar Gaddafis Machtübernahme in Libyen im Jahr 1969 in die inneren Angelegenheiten des Tschad verwickelt, beginnend mit der Ausweitung des tschadischen Bürgerkriegs auf den Norden des Tschad im Jahr 1968. Der Konflikt war geprägt von einer Reihe von vier separaten libyschen Interventionen im Tschad, die 1978, 1979, 1980–1981 und 1983–1987 stattfanden. Bei all diesen Gelegenheiten konnte sich Gaddafi der Unterstützung zahlreicher am Bürgerkrieg beteiligter Fraktionen erfreuen, während die Gegner Libyens auf die Unterstützung der französischen Regierung zählen konnten, die 1978, 1983 und 1986 militärisch intervenierte, um die tschadische Regierung zu unterstützen."
roncw_warnews.43.a:1 "Beunruhigend ..."

roncw_warnews.44.t:0 "Tschadisch-Nigerianischer Krieg"
roncw_warnews.44.d:0 "Der Tschadisch-Nigerianische Krieg war ein kurzer und obskurer Krieg, der um die Kontrolle der Inseln im Tschadsee geführt wurde. Der Krieg begann, als eine Truppe unter der Führung des tschadischen Armeechefs Idriss Déby Teile des nigerianischen Bundesstaates Borno einmarschierte, und endete damit, dass eine nigerianische Truppe unter der Führung von Muhammadu Buhari die Tschader vertrieb und kurzzeitig in tschadisches Gebiet eindrang."
roncw_warnews.44.a:1 "Beunruhigend ..."

roncw_warnews.45.t:0 "Chiapas-Konflikt"
roncw_warnews.45.d:0 "Der Chiapas-Konflikt bezieht sich auf den Zapatistenaufstand von 1994, die Zapatistenkrise von 1995 und ihre Folgen sowie auf die Spannungen zwischen den indigenen Völkern und den Subsistenzbauern im mexikanischen Bundesstaat Chiapas von den 1990er Jahren bis heute."
roncw_warnews.45.a:1 "Beunruhigend ..."

roncw_warnews.46.t:0 "Afghanischer Bürgerkrieg"
roncw_warnews.46.d:0 "Dieser Artikel behandelt die afghanische Geschichte zwischen der Eroberung Kabuls durch die Taliban und ihrer Gründung des Islamischen Emirats Afghanistan am 27. September 1996 sowie der Invasion Afghanistans durch die USA und Großbritannien am 7. Oktober 2001: eine Periode, die Teil des afghanischen Bürgerkriegs war, der 1989 begonnen hatte, und auch Teil des Krieges (im weiteren Sinne) in Afghanistan, der 1978 begonnen hatte."
roncw_warnews.46.a:1 "Beunruhigend ..."

roncw_warnews.47.t:0 "Bürgerkrieg im Mandatsgebiet Palästina"
roncw_warnews.47.d:0 "Der Bürgerkrieg von 1947 bis 1948 im Mandatsgebiet Palästina war die erste Phase des Palästinakriegs von 1948. Er brach aus, nachdem die Generalversammlung der Vereinten Nationen am 29. November 1947 eine Resolution verabschiedet hatte, in der sie die Annahme des Teilungsplans für Palästina empfahl."
roncw_warnews.47.a:1 "Beunruhigend ..."

roncw_warnews.48.t:0 "Kommunistischer Aufstand in Malaysia"
roncw_warnews.48.d:0 "Der kommunistische Aufstand in Malaysia, auch bekannt als Zweiter Malayan Emergency, war ein bewaffneter Konflikt, der von 1968 bis 1989 in Malaysia zwischen der Malayan Communist Party (MCP) und den malaysischen Bundessicherheitskräften stattfand."
roncw_warnews.48.a:1 "Beunruhigend ..."

roncw_warnews.49.t:0 "Kommunistischer Aufstand in Sarawak"
roncw_warnews.49.d:0 "Der kommunistische Aufstand in Sarawak ereignete sich von 1962 bis 1990 in Malaysia und betraf die Kommunistische Partei Nordkalimantans und die malaysische Regierung. Es war einer von zwei kommunistischen Aufständen, die die ehemalige britische Kolonie Malaysia während des Kalten Krieges herausforderten. Wie schon beim früheren Malayan Emergency (1948–1960) waren die kommunistischen Aufständischen in Sarawak überwiegend ethnische Chinesen, die sich der britischen Herrschaft über Sarawak widersetzten und später den Zusammenschluss des Staates mit der neu geschaffenen Föderation Malaysia ablehnten. Auslöser des Aufstands war der Brunei-Aufstand von 1962, der von der linksgerichteten Brunei People&#39;s Party als Opposition gegen die geplante Gründung Malaysias angezettelt worden war."
roncw_warnews.49.a:1 "Beunruhigend ..."

roncw_warnews.50.t:0 "Kommunistischer Aufstand in Thailand"
roncw_warnews.50.d:0 "Der kommunistische Aufstand in Thailand war ein Guerillakrieg, der von 1965 bis 1983 andauerte und hauptsächlich von der Kommunistischen Partei Thailands (CPT) und der thailändischen Regierung geführt wurde. Der Krieg ebbte 1980 nach der Erklärung einer Amnestie ab, und 1983 gab die CPT den Aufstand auf."
roncw_warnews.50.a:1 "Beunruhigend ..."

roncw_warnews.51.t:0 "Krise im Kongo"
roncw_warnews.51.d:0 "Die Kongokrise (französisch „Crise congolaise“) war eine Zeit politischer Unruhen und Konflikte in der Republik Kongo (heute Demokratische Republik Kongo) zwischen 1960 und 1965. Die Krise begann fast unmittelbar nach der Unabhängigkeit des Kongo von Belgien und endete inoffiziell mit der Herrschaft des gesamten Landes unter Joseph-Désiré Mobutu. Die Kongokrise bestand aus einer Reihe von Bürgerkriegen und war zugleich ein Stellvertreterkonflikt im Kalten Krieg, in dem die Sowjetunion und die USA gegnerische Fraktionen unterstützten. Schätzungsweise wurden während der Krise rund 100.000 Menschen getötet."
roncw_warnews.51.a:1 "Beunruhigend ..."

roncw_warnews.52.t:0 "Erster Kongokrieg"
roncw_warnews.52.d:0 "Der Erste Kongokrieg (1996–1997), auch Afrikas Erster Weltkrieg genannt, war ein Bürgerkrieg und internationaler militärischer Konflikt, der sich hauptsächlich in Zaire (der heutigen Demokratischen Republik Kongo) abspielte und auch den Sudan und Uganda erfasste. Der Konflikt gipfelte in einer ausländischen Invasion, bei der der zaireische Präsident Mobutu Sese Seko durch den Rebellenführer Laurent-Désiré Kabila ersetzt wurde."
roncw_warnews.52.a:1 "Beunruhigend ..."

roncw_warnews.53.t:0 "Costa Ricanischer Bürgerkrieg"
roncw_warnews.53.d:0 "Der costa-ricanische Bürgerkrieg war das blutigste Ereignis in der costa-ricanischen Geschichte des 20. Jahrhunderts. Er dauerte 44 Tage, und in ihm starben vermutlich etwa 2.000 Menschen. Auslöser des Konflikts war die Entscheidung des costa-ricanischen Parlaments, das von regierungsnahen Vertretern dominiert wurde, die Ergebnisse der Präsidentschaftswahlen vom Februar für ungültig zu erklären. Die Begründung lautete, der Sieg des Oppositionskandidaten Otilio Ulate gegen Rafael Ángel Calderón Guardia sei durch Wahlbetrug zustande gekommen."
roncw_warnews.53.a:1 "Beunruhigend ..."

roncw_warnews.54.t:0 "Staatsstreich von Yanaon"
roncw_warnews.54.d:0 "Der Staatsstreich von Yanaon (Yanam) war ein angespannter, aber letztlich nicht tödlicher politischer Putsch im indischen Yanam im Jahr 1954. Er ereignete sich, während Indien und Frankreich noch Verhandlungen über die Zukunft der französischen Siedlungen in Indien führten. Yanam war neben Pondicherry, Karikal und Mahé eine von vier kleinen französischen Kolonialenklaven, die nach der Unabhängigkeit von Großbritannien im Jahr 1947 in Indien verblieben. Obwohl sie an beiden Küsten Indiens weit voneinander entfernt lagen, wurden die Städte zusammen als Pondicherry bezeichnet, nach der größten der Siedlungen."
roncw_warnews.54.a:1 "Beunruhigend ..."

roncw_warnews.55.t:0 "Kroatischer Unabhängigkeitskrieg"
roncw_warnews.55.d:0 "Der kroatische Unabhängigkeitskrieg wurde von 1991 bis 1995 zwischen kroatischen Streitkräften, die der kroatischen Regierung treu ergeben waren – die ihre Unabhängigkeit von der Sozialistischen Föderativen Republik Jugoslawien (SFRJ) erklärt hatte – und der serbisch kontrollierten Jugoslawischen Volksarmee (JNA) sowie lokalen serbischen Streitkräften geführt. Die JNA beendete ihre Kampfhandlungen in Kroatien bis 1992. In Kroatien wird der Krieg vor allem als „Heimatkrieg“ und auch als „Großserbische Aggression“ bezeichnet. In serbischen Quellen spricht man vom „Krieg in Kroatien“."
roncw_warnews.55.a:1 "Beunruhigend ..."

roncw_warnews.56.t:0 "Kubanische Invasion in der Dominikanischen Republik"
roncw_warnews.56.d:0 "Die Kubaner versuchen eine Invasion in die Dominikanische Republik. Es ist sehr unwahrscheinlich, dass sie ihre Ziele erreichen werden."
roncw_warnews.56.a:1 "Beunruhigend ..."

roncw_warnews.57.t:0 "Kubanische Invasion in Panama"
roncw_warnews.57.d:0 "Die Kubaner versuchen eine weitere Invasion Panamas! Es ist sehr unwahrscheinlich, dass sie ihre Ziele erneut erreichen werden."
roncw_warnews.57.a:1 "Beunruhigend ..."

roncw_warnews.58.t:0 "Kubanische Invasion in Venezuela"
roncw_warnews.58.d:0 "Die Kubaner versuchen eine weitere Invasion Venezuelas! Dies hat bereits viele Nachbarstaaten verärgert."
roncw_warnews.58.a:1 "Beunruhigend ..."

roncw_warnews.59.t:0 "Kubanische Revolution"
roncw_warnews.59.d:0 "Die kubanische Revolution war ein bewaffneter Aufstand der revolutionären Bewegung des 26. Juli unter Fidel Castro und ihrer Verbündeten gegen die Militärdiktatur des kubanischen Präsidenten Fulgencio Batista. Die Revolution begann im Juli 1953 und dauerte sporadisch an, bis die Rebellen Batista am 31. Dezember 1958 endgültig stürzten und seine Regierung ablösten. Der 26. Juli 1953 wird in Kuba als Tag der Revolution (Día de la Revolución) gefeiert. Die Bewegung des 26. Juli reformierte sich später nach marxistisch-leninistischen Grundsätzen und wurde im Oktober 1965 zur Kommunistischen Partei, der später auch die Regierung Kubas unterstellt wurde."
roncw_warnews.59.a:1 "Beunruhigend ..."

roncw_warnews.60.t:0 "Zypern-Aufstand"
roncw_warnews.60.d:0 "Im Jahr 1955 war die Ethniki Organosis Kyprion Agoniston (EOKA) eine griechisch-zypriotische nationalistische Guerillaorganisation, die sich für das Ende der britischen Herrschaft auf Zypern, für die Selbstbestimmung der Insel und für eine spätere Vereinigung mit Griechenland einsetzte."
roncw_warnews.60.a:1 "Beunruhigend ..."

roncw_warnews.61.t:0 "Tschechoslowakischer Staatsstreich"
roncw_warnews.61.d:0 "Der als „Siegreicher Februar“ bekannte tschechoslowakische Staatsstreich von 1948 in der kommunistischen Ära war ein Ereignis Ende Februar, bei dem die Kommunistische Partei der Tschechoslowakei mit sowjetischer Unterstützung die unangefochtene Kontrolle über die Regierung der Tschechoslowakei übernahm und damit den Beginn von vier Jahrzehnten kommunistischer Herrschaft im Land markierte. Die Bedeutung des Putsches reichte weit über die Staatsgrenzen hinaus, da er ein klarer Meilenstein auf dem bereits weit fortgeschrittenen Weg zum Kalten Krieg war. Das Ereignis alarmierte die westlichen Länder und trug zur raschen Verabschiedung des Marshallplans, der Staatsgründung in Westdeutschland, paramilitärischen Maßnahmen zur Machtvermeidung der Kommunisten in Frankreich, Griechenland und insbesondere Italien sowie Schritten in Richtung gegenseitiger Sicherheit bei, die in etwas mehr als einem Jahr zur Gründung der NATO und dem endgültigen Fall des Eisernen Vorhangs bis zu den Revolutionen von 1989 führten."
roncw_warnews.61.a:1 "Beunruhigend ..."

roncw_warnews.62.t:0 "Krieg von Dagestan"
roncw_warnews.62.d:0 "Der Dagestankrieg begann, als die in Tschetschenien beheimatete Islamische Internationale Friedensbrigade (IIPB), eine islamistische Gruppe unter Führung der Kriegsherren Schamil Bassajew und Ibn al-Chattab, am 7. August 1999 in die benachbarte russische Republik Dagestan einmarschierte, um die separatistischen Rebellen der Schura von Dagestan zu unterstützen. Der Krieg endete mit einem großen Sieg für die Russische Föderation und die Republik Dagestan und dem Rückzug der IIPB. Die Invasion Dagestans diente neben der Serie von Wohnungsbombenanschlägen im September 1999 als Hauptkriegsgrund für den Zweiten Tschetschenienkrieg."
roncw_warnews.62.a:1 "Beunruhigend ..."

roncw_warnews.63.t:0 "Darul-Islam-Rebellion"
roncw_warnews.63.d:0 "Der Darul-Islam-Aufstand war ein Krieg, der zwischen 1949 und 1962 vom Islamischen Staat Indonesien (allgemein bekannt als Darul Islam) geführt wurde, um einen islamischen Staat in Indonesien zu errichten. Der Aufstand begann, als Sekarmadji Maridjan Kartosuwirjo, ein Nationalist, der sich während der Indonesischen Nationalrevolution den Niederländern widersetzt hatte, sich weigerte, die neue Republik Indonesien anzuerkennen. Stattdessen proklamierte er am 7. August 1949 die Gründung des Islamischen Staates Indonesien."
roncw_warnews.63.a:1 "Beunruhigend ..."

roncw_warnews.64.t:0 "DHKP/C-Aufstand in der Türkei"
roncw_warnews.64.d:0 "Der DHKP/C-Aufstand in der Türkei ist der marxistisch-leninistische Aufstand der Revolutionären Volksbefreiungspartei/Front (DHKP/C) gegen die Republik Türkei, der seit 1990 andauert. Der Aufstand begann mit politischen Attentaten in den frühen 1990er Jahren und eskalierte in den letzten Jahren durch den Einsatz von Selbstmordattentätern."
roncw_warnews.64.a:1 "Beunruhigend ..."

roncw_warnews.65.t:0 "Dhofar-Rebellion"
roncw_warnews.65.d:0 "Der Dhofar-Aufstand tobte von 1962 bis 1976 in der Provinz Dhofar gegen das Sultanat Maskat und Oman. Der Krieg begann mit der Gründung der Dhofar-Befreiungsfront, einer Gruppe, die sich die Schaffung eines unabhängigen Staates in Dhofar, frei von der Herrschaft des omanischen Sultans Said bin Taimur, zum Ziel gesetzt hatte. Die Rebellen verfolgten zudem die übergeordneten Ziele des arabischen Nationalismus, zu denen auch die Beendigung des britischen Einflusses am Persischen Golf gehörte."
roncw_warnews.65.a:1 "Beunruhigend ..."

roncw_warnews.66.t:0 "Schmutziger Krieg"
roncw_warnews.66.d:0 "Als „Schmutziger Krieg“ bezeichnete die Militärjunta bzw. zivil-militärische Diktatur Argentiniens die Zeit des von den USA unterstützten Staatsterrorismus in Argentinien von 1976 bis 1983 im Rahmen der Operation Condor. Während dieser Zeit jagten Militär- und Sicherheitskräfte sowie rechtsgerichtete Todesschwadronen in Form der Argentinischen Antikommunistischen Allianz (AAA oder Triple A) politische Dissidenten und alle Personen, die vermutlich mit dem Sozialismus, dem linken Peronismus oder der Montoneros-Bewegung in Verbindung standen."
roncw_warnews.66.a:1 "Beunruhigend ..."

roncw_warnews.67.t:0 "Der schmutzige Krieg geht weiter"
roncw_warnews.67.d:0 "Der „Schmutzige Krieg“ ist die Bezeichnung der Militärjunta bzw. der zivil-militärischen Diktatur Argentiniens, die immer noch tobt!"
roncw_warnews.67.a:1 "Beunruhigend ..."

roncw_warnews.68.t:0 "Dominikanische Bürgerkrieg"
roncw_warnews.68.d:0 "Der Dominikanische Bürgerkrieg fand vom 24. April 1965 bis zum 3. September 1965 in Santo Domingo, Dominikanische Republik, statt. Er begann mit dem Sturz des amtierenden Präsidenten Donald Reid Cabral durch zivile und militärische Unterstützer des ehemaligen Präsidenten Juan Bosch. Der Putsch veranlasste General Elías Wessin y Wessin, loyale Elemente des Militärs zu Präsident Reid („Loyalisten“) zu gründen und einen bewaffneten Feldzug gegen die sogenannten konstitutionalistischen Rebellen zu starten. Vorwürfe ausländischer Unterstützung der Rebellen führten zu einer Intervention der USA in den Konflikt, die später zu einer Besetzung des Landes durch die Organisation Amerikanischer Staaten (OAS) führte. 1966 fanden Wahlen statt, in deren Folge Joaquín Balaguer zum Präsidenten gewählt wurde. Später im selben Jahr zogen internationale Truppen aus dem Land ab."
roncw_warnews.68.a:1 "Beunruhigend ..."

roncw_warnews.69.t:0 "Aufstand in Ostdeutschland"
roncw_warnews.69.d:0 "Der Volksaufstand von 1953 begann mit einem Streik von Bauarbeitern in Ost-Berlin am 16. Juni gegen die Arbeitsquoten während des Sowjetisierungsprozesses in Ostdeutschland. Demonstrationen in Ost-Berlin arteten am nächsten Tag in einen groß angelegten Aufstand gegen die Regierung der DDR und die SED aus, an dem sich schätzungsweise mehr als eine Million Menschen in etwa 700 Orten im ganzen Land beteiligten. Proteste gegen den sinkenden Lebensstandard und die unpopuläre Sowjetisierungspolitik führten zu einer Welle von Streiks und Protesten, die nicht leicht unter Kontrolle zu bringen waren und die ostdeutsche Regierung zu stürzen drohten. Der Aufstand in Ost-Berlin wurde von Panzern der sowjetischen Streitkräfte in Deutschland und der Kasernierten Volkspolizei gewaltsam niedergeschlagen, während die Demonstrationen in mehr als 500 Städten und Dörfern noch mehrere Tage andauerten, bevor sie erloschen."
roncw_warnews.69.a:1 "Beunruhigend ..."

roncw_warnews.70.t:0 "Osttimoresische Krise"
roncw_warnews.70.d:0 "Die Osttimor-Krise von 1999 begann mit landesweiten Gewaltausbrüchen, deren Zentrum die Hauptstadt Dili war. Die Gewalt brach aus, nachdem sich eine Mehrheit der wahlberechtigten Osttimorer für die Unabhängigkeit von Indonesien ausgesprochen hatte. Schätzungsweise 1.400 Zivilisten starben. Eine von der UNO autorisierte Truppe (INTERFET), die hauptsächlich aus Angehörigen der australischen Streitkräfte bestand, wurde nach Osttimor entsandt, um Frieden zu schaffen und zu wahren."
roncw_warnews.70.a:1 "Beunruhigend ..."

roncw_warnews.71.t:0 "Entumbane-Aufstand"
roncw_warnews.71.d:0 "Der Aufstand von Entumbane 1981, auch bekannt als Schlacht von Bulawayo oder Entumbane II, ereignete sich zwischen dem 8. und 12. Februar 1981 in und um Bulawayo, Simbabwe, inmitten politischer Spannungen in dem gerade unabhängig gewordenen Staat. Guerillakämpfer der Simbabwe People&#39;s Revolutionary Army (ZIPRA), vor allem im westlichen Vorort Entumbane, rebellierten und schufen eine Situation, die kaum ein Jahr nach dem Ende des Bush-Krieges zu einem erneuten Bürgerkrieg zu führen drohte. Die Rhodesian African Rifles (RAR) und andere von Weißen kommandierte Elemente der ehemaligen Rhodesian Security Forces, die als Teil der neuen Zimbabwe National Army für die simbabwische Regierung kämpften, schlugen den Aufstand nieder. Gruppen von Kämpfern der Zimbabwe African National Liberation Army (ZANLA) griffen während des Aufstands sowohl die ZIPRA als auch die Regierungstruppen an, der auf einen kleineren Ausbruch von Kämpfen zwischen Guerillakämpfern im November 1980 folgte."
roncw_warnews.71.a:1 "Beunruhigend ..."

roncw_warnews.72.t:0 "Zweiter Bürgerkrieg in Eritrea"
roncw_warnews.72.d:0 "Der Zweite Bürgerkrieg wurde von der EPLF gegen die ELF geführt, um die Flanken der Front zu schützen, die dem enormen Druck eines wiedererstarkten Äthiopiens ausgesetzt war. 1980 nahm die ELF geheime Verhandlungen mit der Sowjetunion auf, um den Krieg zu beenden. Darüber hinaus zogen sich ELF-Einheiten im August desselben Jahres aus der Verteidigung der Sahel-Hochburg der EPLF zurück. Dies führte zu enormen Spannungen zwischen den Fronten, die schließlich zur Wiederaufnahme des Konflikts führten. Zu diesem Zeitpunkt war die ELF während des Wiedererstarkens Äthiopiens nach sowjetischer Unterstützung bereits erschöpft und wurde 1981 schließlich von den EPLF-Truppen besiegt. Die TPLF half auch dabei, die ELF aus Eritrea zu vertreiben. Sie wurde schließlich über die Grenze in den Sudan zurückgedrängt."
roncw_warnews.72.a:1 "Beunruhigend ..."

roncw_warnews.73.t:0 "Eritreisch-Äthiopischer Krieg"
roncw_warnews.73.d:0 "Eritrea und Äthiopien gaben Hunderte Millionen Dollar für den Krieg aus und erlitten als direkte Folge des Konflikts Zehntausende Opfer. Es kam nur zu geringfügigen Grenzänderungen. Laut einem Urteil einer internationalen Kommission in Den Haag brach Eritrea das Völkerrecht und löste den Krieg durch die Invasion Äthiopiens aus. Am Ende des Krieges hielt Äthiopien das gesamte umstrittene Gebiet und war in Eritrea eingedrungen. Nach Kriegsende stellte die von den Vereinten Nationen gegründete Grenzkommission Eritrea-Äthiopien fest, dass Badme, das umstrittene Gebiet im Zentrum des Konflikts, zu Eritrea gehört. Bis 2019 besetzt Äthiopien das Gebiet in der Nähe von Badme, einschließlich der Stadt Badme, noch immer. Am 5. Juni 2018 stimmte die regierende Koalition Äthiopiens (Äthiopische Revolutionäre Demokratische Volksfront) unter der Führung von Premierminister Abiy Ahmed der vollständigen Umsetzung des im Jahr 2000 mit Eritrea unterzeichneten Friedensvertrags zu. Im Juli 2018 erklärten beide Parteien den Frieden."
roncw_warnews.73.a:1 "Beunruhigend ..."

roncw_warnews.74.t:0 "Bürgerkrieg in Eritrea"
roncw_warnews.74.d:0 "Der Bürgerkrieg wurde von der ELF gegen die neu entstehenden Organisationen der Volksbefreiungskräfte geführt, die zuvor unter dem Kommando der ELF und der Obel-Gruppe gestanden hatten. Die Kämpfe begannen im Februar 1972 und weiteten sich auf das Tiefland aus, insbesondere entlang der Küste des Roten Meeres. Schließlich weitete sich der Konflikt weiter ins Hochland aus, bis im Oktober 1974 Rufe nach einem Ende des Konflikts endlich erhört wurden, nachdem bei einer Schlacht bei Woki 600 Kämpfer getötet worden waren. Diese Friedensrufe kamen von den Dorfbewohnern zu einer Zeit, als die Unabhängigkeitsbewegung kurz vor dem Sieg über Äthiopien stand. Die ELF und die EPLF handelten im Januar 1975 in Koazien ein Abkommen aus, in dem sie sich darauf einigten, gemeinsam gegen die äthiopische Regierung zu kämpfen. Dieser Bürgerkrieg forderte rund 3.000 Todesopfer, mehr als die Eritreer bis zu diesem Zeitpunkt in den dreizehn Jahren ihres Kampfes gegen die Regierung verloren hatten."
roncw_warnews.74.a:1 "Beunruhigend ..."

roncw_warnews.75.t:0 "Eritreischer Unabhängigkeitskrieg"
roncw_warnews.75.d:0 "Eritrea wurde ab 1947 vom Äthiopischen Kaiserreich beansprucht, nachdem es 1890 von der italienischen Besatzung befreit worden war (beide Länder gehörten während des Zweiten Weltkriegs zu Italienisch-Ostafrika). Äthiopien und einige der überwiegend christlichen Teile Eritreas plädierten für eine Union mit Äthiopien, während überwiegend muslimische und andere Gebiete Eritreas einen separaten eritreischen Staat wollten. Um beide Seiten zufriedenzustellen, beschloss die Generalversammlung der Vereinten Nationen 1950, Eritrea mit Äthiopien zu föderieren, und Eritrea wurde 1952 ein Teilstaat der Föderation Äthiopien-Eritrea. Eritreas schwindende Autonomie und die wachsende Unzufriedenheit mit der äthiopischen Herrschaft führten 1961 zu einer Unabhängigkeitsbewegung unter Führung der Eritreischen Befreiungsfront (ELF), die Äthiopien im folgenden Jahr zur Auflösung der Föderation und Annexion Eritreas veranlasste."
roncw_warnews.75.a:1 "Beunruhigend ..."

roncw_warnews.76.t:0 "Ogaden-Krieg"
roncw_warnews.76.d:0 "Der Ogadenkrieg oder Äthiopisch-Somalienkrieg war eine somalische Militäroffensive zwischen Juli 1977 und März 1978 um die umstrittene äthiopische Region Ogaden, die mit der somalischen Invasion in Äthiopien begann. Die Sowjetunion missbilligte die Invasion und stellte ihre Unterstützung für Somalia ein. Stattdessen begann sie, Äthiopien zu unterstützen. Äthiopien wurde vor einer schweren Niederlage und einem dauerhaften Gebietsverlust bewahrt durch eine massive Luftbrücke mit Militärgütern im Wert von einer Milliarde Dollar, die Ankunft von 16.000 bis 24.000 kubanischen Soldaten, die von Fidel Castro entsandt worden waren, um einen zweiten Sieg in Afrika zu erringen (nach seinem ersten Erfolg in Angola 1975–76), sowie 1.500 sowjetischen Beratern unter der Führung von General Wassili Petrow. Die Äthiopier und Kubaner (mit 300 Panzern, 156 Artilleriegeschützen und 46 Kampfflugzeugen) gewannen in Harar, Dire Dawa und Jijiga und begannen, die Somalier systematisch aus dem Ogaden zu verdrängen. Bis März 1978 hatten Äthiopier und Kubaner fast den gesamten Ogaden erobert, was die besiegten Somalier dazu veranlasste, ihren Anspruch auf die Region aufzugeben. Die Somalier erlitten schwere Verluste durch kubanische Artillerie und Luftangriffe. Ein Drittel der ursprünglichen Invasionstruppen der Somalischen Nationalarmee wurde getötet und die Hälfte der somalischen Luftwaffe vernichtet. Der Krieg hinterließ Somalia mit einer desorganisierten und demoralisierten Armee und einer wütenden Bevölkerung. All diese Umstände führten zu einem Aufstand in der Armee, der schließlich in einen Bürgerkrieg ausartete."
roncw_warnews.76.a:1 "Beunruhigend ..."

roncw_warnews.77.t:0 "Äthiopischer Bürgerkrieg"
roncw_warnews.77.d:0 "Der Derg stürzte am 12. September 1974 in einem Staatsstreich das äthiopische Kaiserreich und Kaiser Haile Selassie und etablierte Äthiopien als kommunistischen Staat mit einer Militärjunta und provisorischer Regierung. Verschiedene oppositionelle Gruppen unterschiedlicher ideologischer Ausrichtung, von kommunistisch bis antikommunistisch, oft ethnischen Minderheiten angehörend, begannen bewaffneten Widerstand gegen den von der Sowjetunion unterstützten Derg, zusätzlich zu den eritreischen Separatisten, die bereits im eritreischen Unabhängigkeitskrieg kämpften. Der Derg nutzte Militärkampagnen und den Qey Shibir (Äthiopischer Roter Terror), um die Rebellen zu unterdrücken. Mitte der 1980er Jahre erschütterten verschiedene Probleme wie die Hungersnot von 1983–1985, der wirtschaftliche Niedergang und andere Nachwirkungen der Derg-Politik Äthiopien und verstärkten die Unterstützung der Bevölkerung für die Rebellen. Der Derg löste sich 1987 auf und gründete die Demokratische Volksrepublik Äthiopien (PDRE) unter der Arbeiterpartei Äthiopiens (WEP), um seine Herrschaft zu sichern. Die Sowjetunion beendete ihre Unterstützung für die PDRE Ende der 1980er Jahre und die Regierung wurde von den zunehmend siegreichen Rebellengruppen überwältigt. Im Mai 1991 wurde die PDRE in Eritrea besiegt und Präsident Mengistu Haile Mariam floh außer Landes. Der äthiopische Bürgerkrieg endete am 4. Juni 1991, als die Revolutionäre Demokratische Volksfront Äthiopiens (EPRDF), eine Koalition linksgerichteter ethnischer Rebellengruppen, in die Hauptstadt Addis Abeba einmarschierte und die WEP stürzte. Die PDRE wurde aufgelöst und durch die von der Volksbefreiungsfront von Tigray geführte Übergangsregierung Äthiopiens ersetzt."
roncw_warnews.77.a:1 "Beunruhigend ..."

roncw_warnews.78.t:0 "Falklandkrieg"
roncw_warnews.78.d:0 "Der Falklandkrieg begann am 2. April mit der Invasion Argentiniens und der Besetzung der Falklandinseln. Am nächsten Tag folgte die Invasion Südgeorgiens. Am 5. April entsandte die britische Regierung eine Marine-Einsatzgruppe, um die argentinische Marine und Luftwaffe anzugreifen, bevor sie einen amphibischen Angriff auf die Inseln startete. Der Konflikt dauerte 74 Tage und endete mit der Kapitulation Argentiniens am 14. Juni, wodurch die Inseln wieder unter britische Kontrolle gerieten. Insgesamt starben 649 argentinische und 255 britische Soldaten sowie drei Falklandinsulaner während der Kampfhandlungen."
roncw_warnews.78.a:1 "Beunruhigend ..."

roncw_warnews.79.t:0 "Erster Tschetschenienkrieg"
roncw_warnews.79.d:0 "Der Erste Tschetschenienkrieg war ein Aufstand der Tschetschenischen Republik Itschkeria gegen die Russische Föderation, der von Dezember 1994 bis August 1996 dauerte. Nach dem ersten Feldzug von 1994–1995, der in der verheerenden Schlacht von Grosny gipfelte, versuchten russische Streitkräfte, die Kontrolle über die Bergregion Tschetscheniens zu erlangen, wurden jedoch durch tschetschenische Guerillakriege und Angriffe auf das Flachland zurückgeworfen, trotz Russlands überwältigender Überlegenheit hinsichtlich Feuerkraft, Truppenstärke, Waffen, Artillerie, Kampffahrzeugen, Luftangriffen und Luftunterstützung. Dem ersten Krieg ging die russische Intervention in Itschkeria voraus, in deren Verlauf Russland versuchte, die Regierung Itschkerias heimlich zu stürzen. Die daraus resultierende weit verbreitete Demoralisierung der Streitkräfte und die nahezu universelle Opposition der russischen Öffentlichkeit gegen den Konflikt veranlassten die Regierung von Boris Jelzin 1996, einen Waffenstillstand mit den Tschetschenen zu erklären und ein Jahr später einen Friedensvertrag zu unterzeichnen."
roncw_warnews.79.a:1 "Beunruhigend ..."

roncw_warnews.80.t:0 "Erster Indochinakrieg"
roncw_warnews.80.d:0 "Der Erste Indochinakrieg begann am 19. Dezember 1946 in Französisch-Indochina und dauerte bis zum 20. Juli 1954. Die Kämpfe zwischen französischen Streitkräften und ihren Việt Minh-Gegnern im Süden begannen bereits im September 1945. An dem Konflikt waren verschiedene Streitkräfte beteiligt, darunter das von Frankreich angeführte und von Bảo Đạis vietnamesischer Nationalarmee unterstützte Fernost-Expeditionskorps der Französischen Union gegen die Việt Minh unter Hồ Chí Minh und die vietnamesische Volksarmee unter Võ Nguyên Giáp. Die meisten Kämpfe fanden in Tonkin in Nordvietnam statt, obwohl der Konflikt das gesamte Land erfasste und sich auch auf die benachbarten französisch-indochinesischen Protektorate Laos und Kambodscha ausweitete."
roncw_warnews.80.a:1 "Beunruhigend ..."

roncw_warnews.81.t:0 "Erste Intifada"
roncw_warnews.81.d:0 "Die Erste Intifada, auch bekannt als Erste Palästinensische Intifada, war eine anhaltende Serie palästinensischer Proteste und in einigen Fällen gewalttätiger Ausschreitungen. Die Intifada begann am 9. Dezember 1987 im Flüchtlingslager Dschabalija, nachdem ein Lastwagen der israelischen Verteidigungsstreitkräfte (IDF) mit einem Zivilfahrzeug kollidierte und dabei vier palästinensische Arbeiter, drei von ihnen aus dem Flüchtlingslager Dschabalija, tötete. Die Palästinenser warfen dem Zusammenstoß vor, eine vorsätzliche Reaktion auf die Tötung eines Juden in Gaza einige Tage zuvor gewesen zu sein. Israel bestritt, dass der Unfall, der sich in einer Zeit erhöhter Spannungen ereignete, vorsätzlich oder koordiniert gewesen sei. Die palästinensische Reaktion war geprägt von Protesten, zivilem Ungehorsam und Gewalt."
roncw_warnews.81.a:1 "Beunruhigend ..."

roncw_warnews.82.t:0 "Irakisch-Kurdischer Krieg"
roncw_warnews.82.d:0 "Der Irakisch-Kurdische Krieg war ein zentrales Ereignis im Irakisch-Kurdischen Konflikt, der von 1961 bis 1970 andauerte. Angeführt wurde der Kampf von Mustafa Barzani, der versuchte, eine autonome kurdische Verwaltung im Nordirak zu etablieren. In den 1960er Jahren eskalierte der Aufstand zu einem langen Krieg, der trotz interner Machtwechsel im Irak nicht beigelegt werden konnte. Während des Krieges waren 80 % der irakischen Armee in Kämpfe mit den Kurden verwickelt. Der Krieg endete 1970 mit einem Patt, das zwischen 75.000 und 105.000 Opfer forderte. Im Anschluss an den Krieg kam es zu einer Reihe irakisch-kurdischer Verhandlungen, um den Konflikt zu lösen. Die Verhandlungen führten zum irakisch-kurdischen Autonomieabkommen von 1970."
roncw_warnews.82.a:1 "Beunruhigend ..."

roncw_warnews.83.t:0 "Sudanesischer Bürgerkrieg"
roncw_warnews.83.d:0 "Der sudanesische Bürgerkrieg war ein Konflikt zwischen dem nördlichen und dem südlichen Sudan, der von 1955 bis 1972 andauerte und Repräsentation und mehr regionale Autonomie forderte. In den 17 Jahren des Krieges starben eine halbe Million Menschen. Der Krieg verlief in vier Hauptphasen: anfänglicher Guerillakrieg, Ausbruch des Anyanya-Aufstands, politische Unruhen innerhalb der Regierung und Gründung der Südsudanesischen Befreiungsbewegung."
roncw_warnews.83.a:1 "Beunruhigend ..."

roncw_warnews.84.t:0 "Taiwanstraßenkrise"
roncw_warnews.84.d:0 "Die Taiwankrise war ein kurzer bewaffneter Konflikt zwischen der kommunistischen Volksrepublik China (VRC) und der nationalistischen Republik China (ROC) in Taiwan. Sie begann, als die VR China die Yijiangshan-Inseln besetzte und die ROC zwang, die Tachen-Inseln aufzugeben, die von der Marine der ROC und der USA geräumt wurden. Obwohl die physische Kontrolle über die Tachen-Inseln während der Krise wechselte, konzentrierte sich die amerikanische Berichterstattung ausschließlich auf die Inseln Kinmen (Quemoy) und Matsu, Schauplätze von Artillerieduellen zwischen den Kommunisten und den nationalistischen Kuomintang-Staaten."
roncw_warnews.84.a:1 "Beunruhigend ..."

roncw_warnews.85.t:0 "Fußballkrieg"
roncw_warnews.85.d:0 "Dieser Krieg war ein kurzer Krieg zwischen El Salvador und Honduras im Jahr 1969. Die bestehenden Spannungen zwischen den beiden Ländern fielen mit Unruhen während eines Qualifikationsspiels zur FIFA-Weltmeisterschaft 1970 zusammen. Der Krieg begann am 14. Juli 1969, als das salvadorianische Militär einen Angriff auf Honduras startete. Die Organisation Amerikanischer Staaten (OAS) handelte in der Nacht des 18. Juli einen Waffenstillstand aus (daher der Name „100-Stunden-Krieg“), der am 20. Juli vollständig in Kraft trat. Die salvadorianischen Truppen wurden Anfang August abgezogen."
roncw_warnews.85.a:1 "Beunruhigend ..."

roncw_warnews.86.t:0 "FULRO-Aufstand gegen Vietnam"
roncw_warnews.86.d:0 "Der FULRO-Aufstand gegen Vietnam wurde von der Vereinigten Front zur Befreiung unterdrückter Rassen gegen die süd- und nordvietnamesische Regierung sowie die vereinigte Sozialistische Republik Vietnam geführt. Die FULRO-Rebellen vertraten die Interessen der muslimischen und hinduistischen Cham-Minderheit, der christlichen Montagnards und der buddhistischen Khmer Krom gegen die vietnamesische Volksgruppe der Kinh. Sie wurden von China und Kambodscha entsprechend deren Interessen in den Indochinakriegen unterstützt und ausgerüstet."
roncw_warnews.86.a:1 "Beunruhigend ..."

roncw_warnews.87.t:0 "Bürgerkrieg in Georgien"
roncw_warnews.87.d:0 "Der Georgische Bürgerkrieg war ein Bürgerkrieg in Georgien, der aus interethnischen und intranationalen Konflikten in den Regionen Südossetien (1988–1992) und Abchasien (1992–1993) sowie dem gewaltsamen Militärputsch vom 22. Dezember 1991 bis 31. Dezember 1993 gegen den ersten demokratisch gewählten Präsidenten Georgiens, Zviad Gamsachurdia, und seinem anschließenden Aufstand zur Wiedererlangung der Macht (1993) bestand. Während der Gamsachurdia-Aufstand schließlich niedergeschlagen wurde, führten die Konflikte in Südossetien und Abchasien de facto zur Abspaltung beider Regionen von Georgien. Infolgedessen dauerten beide Konflikte mit gelegentlichen Aufflammungen an."
roncw_warnews.87.a:1 "Beunruhigend ..."

roncw_warnews.88.t:0 "Aufstand in Greensboro"
roncw_warnews.88.d:0 "Der Aufstand von Greensboro im Jahr 1969 ereignete sich auf und in der Nähe des Campus der James B. Dudley High School und der North Carolina Agricultural and Technical State University (A&amp;T) in Greensboro, North Carolina. Vom 21. bis 25. Mai kam es zu Schusswechseln zwischen protestierenden Studenten, der Polizei und der Nationalgarde. Ein Student, Willie Grimes, wurde getötet. Ob er von der Polizei oder von Demonstranten getötet wurde, ist unbekannt."
roncw_warnews.88.a:1 "Beunruhigend ..."

roncw_warnews.89.t:0 "Guatemaltekischer Bürgerkrieg"
roncw_warnews.89.d:0 "Der Guatemaltekische Bürgerkrieg war ein Bürgerkrieg in Guatemala, der von 1960 bis 1996 zwischen der guatemaltekischen Regierung und verschiedenen linken Rebellengruppen ausgetragen wurde. Diese wurden zunächst von indigenen Maya und ladinischen Bauern unterstützt, die zusammen die arme Landbevölkerung bilden. Die Regierungstruppen wurden wegen Völkermords an der Maya-Bevölkerung Guatemalas während des Bürgerkriegs und wegen weit verbreiteter Menschenrechtsverletzungen an der Zivilbevölkerung verurteilt. Der Kontext des Kampfes basierte auf langjährigen Problemen der ungerechten Landverteilung; Einwohner europäischer Abstammung und ausländische Unternehmen wie die amerikanische United Fruit Company hatten die Kontrolle über einen Großteil des Landes und gerieten in Konflikt mit der armen Landbevölkerung."
roncw_warnews.89.a:1 "Beunruhigend ..."

roncw_warnews.90.t:0 "Unabhängigkeitskrieg von Guinea-Bissau"
roncw_warnews.90.d:0 "Der Unabhängigkeitskrieg von Guinea-Bissau war ein bewaffneter Unabhängigkeitskonflikt, der zwischen 1963 und 1974 in Portugiesisch-Guinea stattfand. Der Krieg wurde zwischen Portugal und der Afrikanischen Partei für die Unabhängigkeit von Guinea und Kap Verde ausgetragen, einer bewaffneten Unabhängigkeitsbewegung, die von Kuba und der Sowjetunion unterstützt wurde. Aufgrund der großen Zahl an Männern und Material, die in einem langen, größtenteils von Guerillas geführten Krieg eingesetzt wurden, und der internen politischen Unruhen, die er in Portugal auslöste, wird er gemeinhin als „Vietnam Portugals“ bezeichnet. Der Krieg endete, als Portugal nach der Nelkenrevolution von 1974 Guinea-Bissau die Unabhängigkeit gewährte, ein Jahr später folgten Kap Verde."
roncw_warnews.90.a:1 "Beunruhigend ..."

roncw_warnews.91.t:0 "Der Golfkrieg"
roncw_warnews.91.d:0 "Der Golfkrieg, Codename Operation Desert Shield (Operation Desert Shield) für Operationen zum Truppenaufbau und zur Verteidigung Saudi-Arabiens, und Operation Desert Storm in seiner Kampfphase, war ein Krieg, den Koalitionstruppen aus 35 Nationen unter Führung der Vereinigten Staaten gegen den Irak führten. Er war eine Reaktion auf die Invasion und Annexion Kuwaits durch den Irak, die auf Streitigkeiten um die Ölpreise und die Ölproduktion zurückzuführen war."
roncw_warnews.91.a:1 "Beunruhigend ..."

roncw_warnews.92.t:0 "Aufstand in Gwanju"
roncw_warnews.92.d:0 "Der Aufstand war ein Volksaufstand in der südkoreanischen Stadt Gwangju vom 18. bis 27. Mai 1980. Schätzungen zufolge starben dabei rund 2.000 Menschen. Während dieser Zeit griffen die Bürger von Gwangju zu den Waffen (indem sie örtliche Waffenlager und Polizeistationen ausraubten), nachdem Studenten der Chonnam-Universität, die gegen die Kriegsrechtsregierung demonstrierten, von Regierungstruppen beschossen, getötet, vergewaltigt und geschlagen worden waren."
roncw_warnews.92.a:1 "Beunruhigend ..."

roncw_warnews.93.t:0 "Aufstand in Herat"
roncw_warnews.93.d:0 "Der Herat-Aufstand von 1979 war ein Aufstand, der im März 1979 in und um die afghanische Stadt Herat stattfand. Er umfasste sowohl einen Volksaufstand als auch eine Meuterei der afghanischen Armee gegen die Demokratische Republik Afghanistan (DRA). Das kommunistische Regime bat zunächst seine sowjetischen Verbündeten um Hilfe, doch die sowjetische Führung lehnte ein Eingreifen ab. Nachdem die Aufständischen die Stadt etwa eine Woche lang eingenommen und gehalten hatten, konnte das Regime sie mit eigenen Truppen zurückerobern. Bei den darauffolgenden Luftangriffen und der Rückeroberung Herats kamen bis zu 25.000 Einwohner ums Leben."
roncw_warnews.93.a:1 "Beunruhigend ..."

roncw_warnews.94.t:0 "Hukbalahap-Rebellion"
roncw_warnews.94.d:0 "Der Hukbalahap-Aufstand war ein Aufstand ehemaliger Hukbalahap- oder Hukbo ng Bayan Laban sa Hapon-Soldaten (Volksarmee gegen die Japaner) gegen die philippinische Regierung. Es begann während der japanischen Besetzung der Philippinen im Jahr 1942, dauerte während der Präsidentschaft von Manuel Roxas an und endete 1954 unter der Präsidentschaft von Ramon Magsaysay."
roncw_warnews.94.a:1 "Beunruhigend ..."

roncw_warnews.95.t:0 "Ungarische Revolution"
roncw_warnews.95.d:0 "Die Ungarische Revolution von 1956 war eine landesweite Revolution gegen die Ungarische Volksrepublik und ihre von der Sowjetunion aufgezwungene Politik und dauerte vom 23. Oktober bis zum 10. November 1956. Zu Beginn führerlos, war sie die erste größere Bedrohung der sowjetischen Herrschaft, seit die Rote Armee Nazideutschland am Ende des Zweiten Weltkriegs aus seinem Territorium vertrieben hatte. Der Aufstand begann als Studentenprotest, der Tausende anzog, die durch die Budapester Innenstadt zum ungarischen Parlamentsgebäude marschierten und auf der Straße mit einem Transporter mit Lautsprechern ihre Forderungen verkündeten. Eine Studentendelegation, die das Radiogebäude betrat, um die Forderungen der Studenten zu verbreiten, wurde festgenommen. Als die Demonstranten draußen die Freilassung der Delegation forderten, wurde sie aus dem Gebäude von der Staatssicherheitspolizei, bekannt als ÁVH (Abkürzung für Államvédelmi Hatóság, wörtlich „Staatliche Schutzbehörde“), beschossen. Mehrere Studenten starben, und einer wurde in eine Flagge gehüllt und über die Menge gehalten. Dies war der Beginn der nächsten Phase der Revolution. Als sich die Nachricht verbreitete, brachen in der gesamten Hauptstadt Unruhen und Gewalt aus."
roncw_warnews.95.a:1 "Beunruhigend ..."

roncw_warnews.96.t:0 "Ifni-Krieg"
roncw_warnews.96.d:0 "Der Krieg bestand aus einer Reihe bewaffneter Einfälle marokkanischer Aufständischer in Spanisch-Westafrika, die im Oktober 1957 begannen und mit der fehlgeschlagenen Belagerung von Sidi Ifni ihren Höhepunkt erreichten. Der Krieg, der als Teil der allgemeinen Entkolonialisierungsbewegung angesehen werden kann, die Afrika in der zweiten Hälfte des 20. Jahrhunderts erfasste, wurde hauptsächlich von Teilen der Marokkanischen Befreiungsarmee geführt, die, da sie nicht länger in Konflikte mit den Franzosen verwickelt war, einen erheblichen Teil ihrer Ressourcen und Arbeitskräfte für die Eroberung spanischer Besitztümer einsetzte."
roncw_warnews.96.a:1 "Beunruhigend ..."

roncw_warnews.97.t:0 "Indische Annexion von Goa"
roncw_warnews.97.d:0 "Die Annexion Goas war der Prozess, bei dem die Republik Indien die ehemaligen portugiesisch-indischen Gebiete Goa, Daman und Diu annektierte. Der Prozess begann mit der bewaffneten Aktion der indischen Streitkräfte im Dezember 1961. In Indien wird diese Aktion als „Befreiung Goas“ bezeichnet. In Portugal spricht man von der „Invasion Goas“. Nach dem Ende der portugiesischen Herrschaft 1961 wurde Goa unter Militärverwaltung gestellt, angeführt von Kunhiraman Palat Candeth als Vizegouverneur. Am 8. Juni 1962 wurde die Militärherrschaft durch eine Zivilregierung ersetzt, als der Vizegouverneur einen informellen Konsultativrat aus 29 nominierten Mitgliedern ernannte, der ihn bei der Verwaltung des Gebiets unterstützen sollte."
roncw_warnews.97.a:1 "Beunruhigend ..."

roncw_warnews.98.t:0 "Indisch-Pakistanischer Krieg"
roncw_warnews.98.d:0 "Der Konflikt war eine militärische Konfrontation zwischen Indien und Pakistan, die während des Befreiungskrieges in Ostpakistan vom 3. Dezember 1971 bis zum Fall von Dacca (Dhaka) am 16. Dezember 1971 stattfand. Der Krieg begann mit präventiven Luftangriffen auf elf indische Flugplätze, die zum Ausbruch der Feindseligkeiten mit Pakistan und zum Eintritt Indiens in den Unabhängigkeitskrieg in Ostpakistan auf Seiten der bengalischen nationalistischen Kräfte führten. Mit einer Dauer von nur 13 Tagen ist er einer der kürzesten Kriege der Geschichte."
roncw_warnews.98.a:1 "Beunruhigend ..."

roncw_warnews.99.t:0 "Indisch-Pakistanischer Krieg"
roncw_warnews.99.d:0 "Der Krieg zwischen Indien und Pakistan um den Fürstenstaat Jammu und Kaschmir wurde von 1947 bis 1948 geführt. Es war der erste von vier Indisch-Pakistanischen Kriegen zwischen den beiden gerade unabhängig gewordenen Nationen. Pakistan löste den Krieg wenige Wochen nach der Unabhängigkeit aus, indem es Stammesmilizen (Lashkar) aus Waziristan entsandte, um Kaschmir zu erobern, dessen Zukunft auf dem Spiel stand. Der ungewisse Ausgang des Krieges beeinflusst bis heute die Geopolitik beider Länder."
roncw_warnews.99.a:1 "Beunruhigend ..."

roncw_warnews.100.t:0 "Indonesien-malaysische Konfrontation"
roncw_warnews.100.d:0 "Die indonesisch-malaysische Konfrontation oder Borneo-Konfrontation war ein gewaltsamer Konflikt von 1963 bis 1966, der aus Indonesiens Widerstand gegen die Gründung Malaysias resultierte. Die Gründung Malaysias erfolgte durch den Zusammenschluss der Föderation Malaya (heute Westmalaysia), Singapurs und der Kronkolonie/britischen Protektorate Nordborneo und Sarawak (gemeinsam bekannt als Britisch-Borneo, heute Ostmalaysia) im September 1963. Wichtige Vorläufer des Konflikts waren Indonesiens Konfrontationspolitik gegenüber Niederländisch-Neuguinea von März bis August 1962 und der Brunei-Aufstand im Dezember 1962."
roncw_warnews.100.a:1 "Beunruhigend ..."

roncw_warnews.101.t:0 "Nationale Revolution in Indonesien"
roncw_warnews.101.d:0 "Die Indonesische Nationalrevolution oder der Indonesische Unabhängigkeitskrieg war ein bewaffneter Konflikt und diplomatischer Kampf zwischen der Republik Indonesien und dem Niederländischen Kaiserreich sowie eine interne soziale Revolution im Nachkriegs- und postkolonialen Indonesien. Er fand zwischen der Unabhängigkeitserklärung Indonesiens 1945 und der Anerkennung der Unabhängigkeit Indonesiens durch die Niederlande Ende 1949 statt. Der vierjährige Kampf umfasste sporadische, aber blutige bewaffnete Konflikte, interne politische und kommunale Unruhen in Indonesien sowie zwei große internationale diplomatische Interventionen. Den niederländischen Streitkräften (und zeitweise auch den Streitkräften der Alliierten im Zweiten Weltkrieg) gelang es, die großen Städte und Industriegebiete in den republikanischen Kerngebieten auf Java und Sumatra unter Kontrolle zu bringen, nicht jedoch die ländlichen Gebiete. 1949 waren der internationale Druck auf die Niederlande und die teilweise militärische Pattsituation so groß, dass sie die Unabhängigkeit Indonesiens anerkannten."
roncw_warnews.101.a:1 "Beunruhigend ..."

roncw_warnews.102.t:0 "Indisch-Pakistanischer Krieg"
roncw_warnews.102.d:0 "Der Konflikt gipfelte in einem Höhepunkt der Scharmützel, die zwischen April und September 1965 zwischen Pakistan und Indien stattfanden. Der Konflikt begann nach der pakistanischen Operation Gibraltar, deren Ziel die Einschleusung von Truppen nach Jammu und Kaschmir war, um einen Aufstand gegen die indische Herrschaft auszulösen. Indien reagierte mit einem umfassenden Militärangriff auf Westpakistan. Der siebzehntägige Krieg forderte auf beiden Seiten Tausende von Opfern und war Zeuge des größten Gefechts gepanzerter Fahrzeuge und der größten Panzerschlacht seit dem Zweiten Weltkrieg."
roncw_warnews.102.a:1 "Beunruhigend ..."

roncw_warnews.103.t:0 "Interner Konflikt in Peru"
roncw_warnews.103.d:0 "Der interne Konflikt in Peru ist ein andauernder bewaffneter Konflikt zwischen der peruanischen Regierung, der Kommunistischen Partei Perus (auch bekannt als Leuchtender Pfad oder „PCP-SL“) und der Revolutionären Bewegung Túpac Amaru. Der Konflikt begann am 17. Mai 1980. Schätzungsweise gab es fast 70.000 Todesopfer, was ihn zum blutigsten Krieg in der peruanischen Geschichte seit der europäischen Kolonialisierung des Landes macht."
roncw_warnews.103.a:1 "Beunruhigend ..."

roncw_warnews.104.t:0 "Die Vereinigten Staaten marschieren in Grenada ein"
roncw_warnews.104.d:0 "Die US-Invasion in Grenada begann im Morgengrauen des 25. Oktober 1983. Die USA und eine Koalition aus sechs karibischen Staaten marschierten in den Inselstaat Grenada ein, der 160 Kilometer nördlich von Venezuela liegt. Die Operation, die das US-Militär „Operation Urgent Fury“ nannte, führte innerhalb weniger Tage zur militärischen Besetzung. Auslöser waren Unruhen innerhalb der Revolutionären Volksregierung, die zum Hausarrest und zur Hinrichtung des früheren Präsidenten und zweiten Premierministers von Grenada, Maurice Bishop, sowie zur Einsetzung des Revolutionären Militärrats mit Hudson Austin als Vorsitzendem führten. Die Invasion führte zur Einsetzung einer Übergangsregierung, gefolgt von demokratischen Wahlen im Jahr 1984. Das Land ist seitdem ein demokratischer Staat geblieben."
roncw_warnews.104.a:1 "Beunruhigend ..."

roncw_warnews.105.t:0 "Krise im Iran"
roncw_warnews.105.d:0 "Die Irankrise von 1946, in iranischen Quellen auch als Aserbaidschankrise bekannt, war eine der ersten Krisen des Kalten Krieges. Auslöser war die Weigerung der Sowjetunion unter Josef Stalin, trotz wiederholter Zusicherungen besetztes iranisches Gebiet aufzugeben. Das Ende des Zweiten Weltkriegs hätte das Ende der gemeinsamen alliierten Besetzung des Iran bedeuten sollen. Stattdessen riefen prosowjetische Iraner die separatistische Aserbaidschanische Volksregierung und die kurdische Separatistenrepublik Mahabad aus. Der Druck der USA auf die Sowjetunion zum Rückzug ist der erste Beweis für den Erfolg der neuen Strategie der Truman-Doktrin und der Eindämmung."
roncw_warnews.105.a:1 "Beunruhigend ..."

roncw_warnews.106.t:0 "Iran-Irak-Krieg"
roncw_warnews.106.d:0 "Der Iran-Irak-Krieg war ein langwieriger bewaffneter Konflikt, der am 22. September 1980 mit der Invasion des benachbarten Irak in den Iran begann. Der Krieg dauerte fast acht Jahre und endete am 20. August 1988 in einer Pattsituation, als der Iran einen von den Vereinten Nationen vermittelten Waffenstillstand akzeptierte. Die irakische Begründung für die Invasion bestand in erster Linie darin, den Iran zu lähmen und Ayatollah Ruhollah Khomeini daran zu hindern, die iranische Revolutionsbewegung von 1979 in den schiitischen Irak zu exportieren und die sunnitisch dominierte Baath-Führung zu bedrohen. Der Irak wollte den Iran auch als dominierenden Staat am Persischen Golf ablösen, was zuvor aufgrund des vorrevolutionären Goliath-Status des Iran in wirtschaftlicher und militärischer Hinsicht sowie seiner engen Allianzen mit den Vereinigten Staaten und Israel nicht möglich gewesen war."
roncw_warnews.106.a:1 "Beunruhigend ..."

roncw_warnews.107.t:0 "Kurdischer Aufstand im Iran"
roncw_warnews.107.d:0 "Der kurdische Aufstand im Iran brach Mitte März 1979 aus, etwa zwei Monate nach dem Ende der iranischen Revolution. Er entwickelte sich zum größten landesweiten Aufstand gegen den neuen Staat und zu einem der heftigsten kurdischen Aufstände im modernen Iran. Anfangs versuchten die kurdischen Bewegungen, sich der neuen iranischen Regierung anzuschließen, ihre muslimische Identität zu betonen und eine gemeinsame Basis mit anderen Iranern zu finden. Die KDPI bezeichnete sich sogar kurzzeitig als nicht-separatistische Organisation und kritisierte angeblich diejenigen, die nach Unabhängigkeit riefen, forderte aber dennoch politische Autonomie. Die Beziehungen zwischen einigen kurdischen Organisationen und der iranischen Regierung verschlechterten sich jedoch rasch, und schiitische Kurden und einige Stammesführer wandten sich dem neuen schiitischen Islamischen Staat zu."
roncw_warnews.107.a:1 "Beunruhigend ..."

roncw_warnews.108.t:0 "Irakisch-Kurdischer Bürgerkrieg"
roncw_warnews.108.d:0 "Der Irakisch-Kurdische Bürgerkrieg war ein militärischer Konflikt, der Mitte der 1990er Jahre zwischen rivalisierenden kurdischen Fraktionen im irakischen Kurdistan stattfand, hauptsächlich zwischen der Patriotischen Union Kurdistans und der Demokratischen Partei Kurdistans. Im Verlauf des Konflikts wurden kurdische Fraktionen aus dem iranischen und türkischen Kurdistan sowie iranische, irakische und türkische Staatskräfte in die Kämpfe hineingezogen, zusätzlich beteiligten sich amerikanische Streitkräfte. Zwischen 3.000 und 5.000 Kämpfer und Zivilisten wurden getötet."
roncw_warnews.108.a:1 "Beunruhigend ..."

roncw_warnews.109.t:0 "Staatsstreich im Irak "
roncw_warnews.109.d:0 "Der irakische Staatsstreich vom November 1963 ereignete sich zwischen dem 13. und 18. November 1963, als pro-nasseristische irakische Offiziere nach parteiinternen Spaltungen einen Militärputsch innerhalb der Baath-Partei anführten. Obwohl der Putsch selbst unblutig verlief, wurden bei den damit verbundenen Aktionen 250 Menschen getötet. Nach der Machtergreifung im Irak im Februar 1963 führten Spaltungen zwischen pro- und anti-nasseristischen Baath-Führern sowie zwischen rechten und linken panarabischen nationalistischen Baath-Führern zum Zusammenbruch der ersten Baath-Regierung im Irak im November 1963, während 7.000 irakische Kommunisten inhaftiert blieben."
roncw_warnews.109.a:1 "Beunruhigend ..."

roncw_warnews.110.t:0 "Islamistischer Aufstand in Syrien"
roncw_warnews.110.d:0 "Der islamistische Aufstand in Syrien umfasste eine Reihe von Revolten und bewaffneten Aufständen sunnitischer Islamisten, hauptsächlich Angehöriger der Muslimbruderschaft, von 1976 bis 1982. Der Aufstand richtete sich gegen die Autorität der säkularen, von der Baath-Partei kontrollierten Regierung Syriens und wurde als „langjährige Terrorkampagne“ bezeichnet. Während der gewalttätigen Ereignisse griffen Islamisten sowohl Zivilisten als auch dienstfreies Militärpersonal an, und auch Zivilisten wurden bei Vergeltungsschlägen der Sicherheitskräfte getötet. Der Aufstand erreichte seinen Höhepunkt im Hama-Aufstand 1982."
roncw_warnews.110.a:1 "Beunruhigend ..."

roncw_warnews.111.t:0 "Der ivorische Bürgerkrieg"
roncw_warnews.111.d:0 "Der Erste Ivorische Bürgerkrieg war ein Konflikt in der Elfenbeinküste (auch bekannt als Côte d&#39;Ivoire), der 2002 begann. Obwohl die meisten Kämpfe Ende 2004 beendet waren, blieb das Land in zwei Teile gespalten: einen von Rebellen gehaltenen Norden und einen von der Regierung gehaltenen Süden. Die Feindseligkeiten nahmen zu, und es kam vermehrt zu Überfällen auf ausländische Truppen und Zivilisten. Ab 2006 herrschten in der Region Spannungen, und viele beklagten, dass es den Vereinten Nationen und dem französischen Militär nicht gelungen sei, den Bürgerkrieg zu beruhigen."
roncw_warnews.111.a:1 "Beunruhigend ..."

roncw_warnews.112.t:0 "Aufstand in Jammu und Kaschmir"
roncw_warnews.112.d:0 "Jammu und Kaschmir, lange Zeit ein Nährboden separatistischer Bestrebungen, wird seit 1989 von Aufständen heimgesucht. Obwohl die Ursache der anfänglichen Unzufriedenheit das Versagen der indischen Regierung und Demokratie war, spielte Pakistan eine wichtige Rolle bei der Umwandlung der Unzufriedenheit in einen voll entwickelten Aufstand. Einige aufständische Gruppen in Kaschmir unterstützen die vollständige Unabhängigkeit, während andere einen Beitritt zu Pakistan anstreben."
roncw_warnews.112.a:1 "Beunruhigend ..."

roncw_warnews.113.t:0 "JVP-Aufstand"
roncw_warnews.113.d:0 "Der Janatha-Vimukthi-Peramuna-Aufstand von 1971 war der erste erfolglose bewaffnete Aufstand der kommunistischen Janatha Vimukthi Peramuna (JVP) gegen die Regierung Ceylons (heute Sri Lanka) unter Premierminister Sirimavo Bandaranaike. Der Aufstand begann am 5. April 1971 und dauerte bis Juni 1971. Den Aufständischen gelang es, mehrere Städte und ländliche Gebiete einzunehmen und mehrere Wochen lang zu halten, bis sie von den Streitkräften zurückerobert wurden. Obwohl ihr erster Versuch, 1971 die Macht zu ergreifen, schnell gewaltsam niedergeschlagen wurde, startete diese Gruppe 1987 einen weiteren, weitaus heftigeren Aufstand im Süden, Zentrum und Westen des Landes."
roncw_warnews.113.a:1 "Beunruhigend ..."

roncw_warnews.114.t:0 "Aufstand in Jeju"
roncw_warnews.114.d:0 "Der Jeju-Aufstand fand von April 1948 bis Mai 1949 auf der südkoreanischen Insel Jeju statt. Die gegen die Teilung Koreas eingestellten Einwohner Jejus hatten seit 1947 gegen die von der UN-Korea-Kommission (UNTCOK) angesetzten Wahlen protestiert und sich in einem Generalstreik befunden. Die Wahlen sollten ausschließlich in dem von der US-Militärregierung in Korea kontrollierten Gebiet stattfinden. Die Arbeiterpartei Südkoreas und ihre Anhänger starteten im April 1948 einen antiimperialistischen, kommunistisch geprägten Aufstand. Sie griffen die auf Jeju stationierte Polizei und die Mitglieder der Nordwest-Jugendliga an, um die Proteste gewaltsam niederzuschlagen."
roncw_warnews.114.a:1 "Beunruhigend ..."

roncw_warnews.115.t:0 "Kargil-Krieg"
roncw_warnews.115.d:0 "Der Kargil-Krieg, auch bekannt als Kargil-Konflikt, war ein bewaffneter Konflikt zwischen Indien und Pakistan, der zwischen Mai und Juli 1999 im Distrikt Kargil in Kaschmir und anderswo entlang der Kontrolllinie (LOC) stattfand. In Indien wird der Konflikt auch als Operation Vijay bezeichnet, was der Name der indischen Operation zur Räumung des Kargil-Sektors war. Die Rolle der indischen Luftwaffe bei ihrem gemeinsamen Vorgehen mit den Bodentruppen der indischen Armee während des Krieges zielte darauf ab, reguläre und irreguläre Truppen der pakistanischen Armee aus den geräumten indischen Stellungen im Kargil-Sektor entlang der Kontrolllinie zu vertreiben. Diese spezielle Operation erhielt den Codenamen Operation Safed Sagar."
roncw_warnews.115.a:1 "Beunruhigend ..."

roncw_warnews.116.t:0 "Katanga-Aufstand"
roncw_warnews.116.d:0 "Der Katanga-Aufstand bezeichnet den anhaltenden Widerstand mehrerer Rebellengruppen in der Demokratischen Republik Kongo, von denen einige die Gründung eines eigenen Staates innerhalb Katangas anstreben. Der Aufstand ist seit 1960 in verschiedenen Formen aktiv, doch nach dem Gefängnisausbruch 2011, bei dem Gédéon Kyungu Mutanga freikam, der heute die Mehrheit der separatistischen Gruppen in Katanga befehligt, haben die Rebellengruppen ihre Bemühungen verstärkt."
roncw_warnews.116.a:1 "Beunruhigend ..."

roncw_warnews.117.t:0 "KDPI-Aufstand"
roncw_warnews.117.d:0 "Der Aufstand der Kurdischen Demokratischen Partei Irans (KDP) verschärfte sich 1989 und dauerte bis 1996 als Teil des kurdischen Separatismuskampfes. Auslöser des Konflikts im Juli 1989 war die Ermordung des KDPI-Führers Abdul Rahman Qassemlou durch mutmaßliche iranische Regierungsagenten. Die gewalttätigsten Episoden ereigneten sich 1990 und 1991, als kurdische Soldaten massive Angriffe auf iranische Militärstützpunkte in kurdischen Gebieten des Iran starteten. Dies löste schwere Vergeltungsmaßnahmen der iranischen Regierung aus, die darauf abzielte, die KDPI-Führung durch die Ermordung von Sadegh Sharafkandi und anderen KDPI-Führern im Jahr 1992 auszuschalten und so die kurdische Partei handlungsunfähig zu machen. Der Konflikt ebbte mit der effektiven, gezielten Mordpolitik des Iran ab, und 1996 war die KDPI militärisch nicht mehr handlungsfähig und verkündete einen Waffenstillstand."
roncw_warnews.117.a:1 "Beunruhigend ..."

roncw_warnews.118.t:0 "Aufstand in Kengir"
roncw_warnews.118.d:0 "Nach der Ermordung einiger Mitgefangener durch Wächter rebellierten die Kengir-Häftlinge und besetzten das gesamte Lagergelände. Sie hielten es wochenlang und verschafften sich so eine in der Geschichte des Gulag einzigartige Zeit der Freiheit. Nach einem seltenen Bündnis zwischen Kriminellen und politischen Gefangenen gelang es den Gefangenen, die Wächter und die Lagerverwaltung zur Flucht aus dem Lager zu zwingen und es effektiv von außen abzuschotten. Anschließend errichteten die Gefangenen komplexe Verteidigungsanlagen, um das Eindringen der Behörden in ihr neu erobertes Gebiet zu verhindern. Dieser Zustand hielt beispiellos lange an und führte zu neuartigen Aktivitäten, darunter der Bildung einer provisorischen Regierung durch die Gefangenen, der Verehelichung von Gefangenen und einer Propagandakampagne gegen die ehemaligen Behörden."
roncw_warnews.118.a:1 "Beunruhigend ..."

roncw_warnews.119.t:0 "Aufstand in Chuzestan"
roncw_warnews.119.d:0 "Der Aufstand in Chuzestan im Jahr 1979 war einer der landesweiten Aufstände im Iran, die im Gefolge der iranischen Revolution ausbrachen. Die Unruhen wurden durch arabische Autonomieforderungen genährt. Der Aufstand wurde von iranischen Sicherheitskräften erfolgreich niedergeschlagen, wobei auf beiden Seiten über hundert Menschen getötet wurden."
roncw_warnews.119.a:1 "Beunruhigend ..."

roncw_warnews.120.t:0 "Koreakonflikt"
roncw_warnews.120.d:0 "Vor 1945 war Korea jahrhundertelang eine einheitliche politische Einheit. Die Ursprünge der modernen Teilung Koreas gehen auf die Zeit der japanischen Kolonialherrschaft über Korea (1910–1945) zurück. Während des Zweiten Weltkriegs befassten sich die alliierten Truppen im Kampf gegen Japan mit der Frage der Zukunft Koreas nach der Kapitulation Japans. Sie einigten sich darauf, Korea von Japan zu befreien, es aber unter internationale Treuhand zu stellen, bis die Koreaner zur Selbstverwaltung bereit wären. Über diese eher vage Vereinbarung hinaus blieb die Zukunft Koreas weitgehend ungewiss."
roncw_warnews.120.a:1 "Beunruhigend ..."

roncw_warnews.121.t:0 "Korea im Krieg"
roncw_warnews.121.d:0 "Nach der Kapitulation Japans am Ende des Zweiten Weltkriegs am 15. August 1945 wurde Korea am 38. Breitengrad in zwei Besatzungszonen geteilt: Die Sowjets verwalteten die nördliche Hälfte, die Amerikaner die südliche. 1948 wurden die Besatzungszonen infolge der Spannungen des Kalten Krieges zu zwei souveränen Staaten. Im Norden entstand ein sozialistischer Staat unter der totalitären Führung Kim Il-sungs, im Süden ein kapitalistischer Staat unter der autoritären Führung Syngman Rhees. Beide Regierungen der beiden neuen koreanischen Staaten beanspruchten, die einzig legitime Regierung ganz Koreas zu sein, und akzeptierten die Grenze nicht als dauerhaft."
roncw_warnews.121.a:1 "Beunruhigend ..."

roncw_warnews.122.t:0 "Krieg im Kosovo"
roncw_warnews.122.d:0 "Die UCK, die Anfang der 1990er Jahre gegründet wurde, um die serbische Verfolgung der Kosovo-Albaner zu bekämpfen, startete ihre erste Kampagne 1995 mit Angriffen auf serbische Polizeikräfte im Kosovo. Im Juni 1996 bekannte sich die Gruppe zu Sabotageakten auf kosovarische Polizeistationen während des Kosovo-Aufstands. 1997 erwarb die Organisation durch Waffenschmuggel aus Albanien große Mengen Waffen; dies geschah nach einem Aufstand, bei dem Waffen aus albanischen Polizei- und Armeeposten geplündert wurden. Anfang 1998 führten Angriffe der UCK auf jugoslawische Behörden im Kosovo zu einer verstärkten Präsenz serbischer Paramilitärs und regulärer Streitkräfte, die daraufhin einen Vergeltungsfeldzug gegen UCK-Sympathisanten und politische Gegner starteten; bei diesem Feldzug wurden 1.500 bis 2.000 Zivilisten und UCK-Kämpfer getötet."
roncw_warnews.122.a:1 "Beunruhigend ..."

roncw_warnews.123.t:0 "Islamischer Aufstand der Kuomintang"
roncw_warnews.123.d:0 "Der islamische Aufstand der Kuomintang bezeichnet eine Fortsetzung des chinesischen Bürgerkriegs durch die chinesisch-muslimisch-nationalistischen Streitkräfte der Kuomintang-Armee der Republik China im Nordwesten Chinas in den Provinzen Gansu, Qinghai, Ningxia und Xinjiang sowie einen weiteren Aufstand in Yunnan. Die Mehrheit der Aufständischen waren formelle Mitglieder der Armee der Republik China unter Ma Bufang. Einige von ihnen waren prominente Generäle, wie beispielsweise Ma Hushan, der zuvor in Xinjiang gegen die Sowjetunion gekämpft hatte."
roncw_warnews.123.a:1 "Beunruhigend ..."

roncw_warnews.124.t:0 "Kurdische Aufstände im Irak"
roncw_warnews.124.d:0 "Die kurdischen Aufstände im Irak von 1983 bis 1986 ereigneten sich während des Iran-Irak-Krieges, als kurdische Milizen der PUK und der KDP im irakischen Kurdistan im Rahmen des irakisch-kurdischen Konflikts gegen Saddam Hussein rebellierten, um einen unabhängigen Staat zu gründen. Während die irakischen Regierungstruppen im Iran-Irak-Krieg besetzt waren, gelang es den kurdischen Peschmerga (die die Streitkräfte der KDP und der PUK vereinten) mit iranischer logistischer und manchmal militärischer Unterstützung, die Kontrolle über einige Enklaven zu übernehmen. Der anfängliche Aufstand endete 1985 in einer Pattsituation."
roncw_warnews.124.a:1 "Beunruhigend ..."

roncw_warnews.125.t:0 "Islamistischer Aufstand im irakischen Kurdistan"
roncw_warnews.125.d:0 "Der islamistische Aufstand im irakischen Kurdistan war ein militärischer Konflikt zwischen der islamistischen militanten Gruppe Ansar al-Islam und den beiden wichtigsten kurdischen Parteien, der Kurdischen Demokratischen Partei und der Patriotischen Union Kurdistans. Der Konflikt begann 2001, verschmolz aber später mit der größeren Invasion des Irak im Jahr 2003, die zur Niederlage von Ansar al-Islam führte. Nach der Invasion setzte Ansar al-Islam einen terroristischen Aufstand geringer Intensität gegen die Kurdische Demokratische Partei und die Patriotische Union Kurdistans fort."
roncw_warnews.125.a:1 "Beunruhigend ..."

roncw_warnews.126.t:0 "Revolution der 50er"
roncw_warnews.126.d:0 "Revolution 50 ist der Name der historischen epischen und heroischen Konfrontation zwischen Studenten des College National Independence American und den Streitkräften Perus, die zwischen dem 12. und 15. Juni 1950 in der Stadt Arequipa im Süden Perus stattfand. Ein Studentenstreik, der eine Forderung an den Direktor des Colleges richtete, artete in einen Bürgerkrieg aus, der sich über die ganze Stadt ausbreitete. Auslöser war der Versuch der Polizei, die Studenten auf Befehl des Präfekten von Arequipa, Daniel Meza Cuadra, eines autoritären Untergebenen des Diktators Manuel A. Odría, gewaltsam vom Campus zu vertreiben, der den Schießbefehl gegeben hatte."
roncw_warnews.126.a:1 "Beunruhigend ..."

roncw_warnews.127.t:0 "La Violencia Bürgerkrieg"
roncw_warnews.127.d:0 "Als Beginn von „La Violencia“ gilt die Ermordung des populären Politikers Jorge Eliécer Gaitán am 9. April 1948, eines Präsidentschaftskandidaten der Liberalen Partei für die Wahlen im November 1949. Seine Ermordung löste die zehn Stunden andauernden Unruhen in Bogotá aus, bei denen etwa 5.000 Menschen starben. Eine alternative Geschichtsschreibung geht davon aus, dass die Rückkehr der Konservativen an die Macht nach den Wahlen von 1946 den Beginn darstellte. Polizisten und politische Führer in ländlichen Gemeinden ermutigten konservative Bauern, die landwirtschaftlichen Flächen liberaler Bauern zu beschlagnahmen, was in ganz Kolumbien zu Gewalt zwischen Bauern führte."
roncw_warnews.127.a:1 "Beunruhigend ..."

roncw_warnews.128.t:0 "Bürgerkrieg in Laos"
roncw_warnews.128.d:0 "Der Laotische Bürgerkrieg war ein Bürgerkrieg in Laos, der vom 23. Mai 1959 bis zum 2. Dezember 1975 zwischen der kommunistischen Pathet Lao (darunter viele Nordvietnamesen laotischer Abstammung) und der königlich-laotischen Regierung ausgetragen wurde. Er wird mit dem kambodschanischen Bürgerkrieg und dem Vietnamkrieg in Verbindung gebracht, wobei beide Seiten in einem Stellvertreterkrieg zwischen den globalen Supermächten des Kalten Krieges starke externe Unterstützung erhielten. Unter dem CIA Special Activities Center und den Hmong-Veteranen des Konflikts wird er als Geheimer Krieg bezeichnet."
roncw_warnews.128.a:1 "Beunruhigend ..."

roncw_warnews.129.t:0 "Bürgerkrieg im Libanon"
roncw_warnews.129.d:0 "Vor dem Krieg war der Libanon multikonfessionell geprägt. In den Küstenstädten stellten Sunniten und Christen die Mehrheit, im Süden und im Bekaa-Tal im Osten lebten Schiiten, und die Bergbevölkerung bestand überwiegend aus Drusen und Christen. Die libanesische Regierung stand unter dem maßgeblichen Einfluss der maronitischen Elite. Die Verbindung zwischen Politik und Religion wurde unter dem Mandat der französischen Kolonialmächte von 1920 bis 1943 verstärkt, und die parlamentarische Struktur begünstigte eine führende Position der christlichen Bevölkerung. Das Land hatte jedoch einen hohen muslimischen Bevölkerungsanteil, und viele panarabische und linke Gruppen lehnten die prowestliche Regierung ab."
roncw_warnews.129.a:1 "Beunruhigend ..."

roncw_warnews.130.t:0 "Krise im Libanon"
roncw_warnews.130.d:0 "Die Libanonkrise von 1958 war eine politische Krise im Libanon, die durch politische und religiöse Spannungen im Land ausgelöst wurde und eine militärische Intervention der USA beinhaltete. Die Intervention dauerte etwa drei Monate, bis Präsident Camille Chamoun, der um Unterstützung gebeten hatte, seine Amtszeit als Präsident des Libanon beendete. Amerikanische und libanesische Regierungstruppen besetzten erfolgreich den Hafen von Beirut und den internationalen Flughafen Beirut. Nach dem Ende der Krise zogen sich die USA zurück."
roncw_warnews.130.a:1 "Beunruhigend ..."

roncw_warnews.131.t:0 "Tschadisch-libyscher Konflikt"
roncw_warnews.131.d:0 "Der tschadisch-libysche Konflikt war eine Reihe von Militärkampagnen im Tschad zwischen 1978 und 1987, die zwischen libyschen und verbündeten tschadischen Streitkräften gegen von Frankreich unterstützte tschadische Gruppen ausgetragen wurden, wobei gelegentlich auch andere Länder und Fraktionen beteiligt waren. Libyen war bereits vor 1978 und vor Muammar Gaddafis Machtübernahme in Libyen im Jahr 1969 in die inneren Angelegenheiten des Tschad verwickelt, beginnend mit der Ausweitung des tschadischen Bürgerkriegs auf den Norden des Tschad im Jahr 1968."
roncw_warnews.131.a:1 "Beunruhigend ..."

roncw_warnews.132.t:0 "Krieg zwischen Libyen und Ägypten"
roncw_warnews.132.d:0 "Im Juli 1977 verschärften sich die Zusammenstöße entlang der Grenze. Am 21. Juli überfiel ein libysches Panzerbataillon die Stadt Sallum. Die ägyptischen Streitkräfte überfielen die Stadt und starteten anschließend einen großen Gegenangriff. Sie führten Luftangriffe auf den Luftwaffenstützpunkt Gamal Abdel Nasser durch und schickten eine mechanisierte Truppe 24 Kilometer weit in libysches Gebiet, bevor sie sich zurückzogen."
roncw_warnews.132.a:1 "Beunruhigend ..."

roncw_warnews.133.t:0 "Aufstand der Lord&#39;s Resistance Army"
roncw_warnews.133.d:0 "Der Aufstand der Lord’s Resistance Army ist ein andauernder Guerillakrieg der Lord’s Resistance Army. Der Sturz des Acholi-Staatspräsidenten Tito Okello im Januar 1986 durch die National Resistance Army (NRA) des im Südwesten Ugandas geborenen Yoweri Museveni markierte eine Zeit heftiger Unruhen. In ihren Bemühungen, das ganze Land zu befreien, verübte die NRA zahlreiche Grausamkeiten an der Acholi-Bevölkerung. Diese Tat spornte einige Acholi zum Widerstand gegen die mittelalterlichen Taten an."
roncw_warnews.133.a:1 "Beunruhigend ..."

roncw_warnews.134.t:0 "Aufstand in Mazedonien"
roncw_warnews.134.d:0 "Der Aufstand in Mazedonien im Jahr 2001 war ein bewaffneter Konflikt, der mit dem Angriff der albanischen militanten Gruppe Nationale Befreiungsarmee (NLA), die sich aus Veteranen des Kosovo-Krieges und des Aufstands in der Bundesrepublik Jugoslawien zusammensetzte, auf die mazedonischen Sicherheitskräfte Anfang Februar 2001 begann und mit dem am 13. August desselben Jahres unterzeichneten Ohrid-Abkommen endete. Es gab auch Behauptungen, die NLA habe letztlich die Abspaltung albanisch geprägter Gebiete vom Land angestrebt, was hochrangige Mitglieder der Gruppe jedoch bestritten. Der Konflikt dauerte fast das ganze Jahr über an, doch Quellen aus beiden Konfliktparteien zufolge gab es auf beiden Seiten nur wenige Dutzend Opfer. Damit erreichten die Jugoslawienkriege Mazedonien. Mazedonien hatte 1991 seine friedliche Unabhängigkeit von Jugoslawien erlangt."
roncw_warnews.134.a:1 "Beunruhigend ..."

roncw_warnews.135.t:0 "Makassar-Aufstand"
roncw_warnews.135.d:0 "Der Makassar-Aufstand war ein Gefecht in Makassar, Sulawesi, zwischen ehemaligen Soldaten der Königlich Niederländischen Ostindischen Armee unter Hauptmann Andi Aziz und der Regierung der Republik der Vereinigten Staaten von Indonesien. Ziel des Aufstands war es, sich gegen die Eingliederung der indonesischen Bundesstaaten in die Indonesische Republik zu wehren. Der Aufstand wurde jedoch nach etwas mehr als zwei Wochen niedergeschlagen, als Truppen unter Oberstleutnant Suharto und Oberst Alexander Evert Kawilarang in Makassar eintrafen und nur auf geringen Widerstand stießen. Die ostindonesische Regierung weigerte sich, Aziz&#39; Vorgehen zu dulden, und er wurde daraufhin am 14. April in Jakarta verhaftet, als er versuchte, mit den republikanischen Behörden zu verhandeln. Der Makassar-Aufstand erleichterte lediglich die republikanische Kontrolle über die Bundesstaaten."
roncw_warnews.135.a:1 "Beunruhigend ..."

roncw_warnews.136.t:0 "Madagassischer Aufstand"
roncw_warnews.136.d:0 "Am Abend des 29. März 1947 starteten madagassische Nationalisten, die hauptsächlich mit Speeren bewaffnet waren, koordinierte Überraschungsangriffe auf Militärstützpunkte und französische Plantagen im Osten der Insel, insbesondere um Moramanga und Manakara. Die nationalistische Sache wurde im Süden schnell aufgegriffen und breitete sich im folgenden Monat auf das zentrale Hochland und die Hauptstadt Antananarivo aus. Die Zahl der madagassischen nationalistischen Kämpfer wird auf über eine Million geschätzt."
roncw_warnews.136.a:1 "Beunruhigend ..."

roncw_warnews.137.t:0 "Notfall in Malaya"
roncw_warnews.137.d:0 "Im Juni 1948 verhängte die Kolonialregierung in Britisch-Malaya den Ausnahmezustand, nachdem bei Angriffen auf Plantagen drei Europäer getötet worden waren. Unter der Führung von Chin Peng formierten sich kommunistische Aktivisten im malaysischen Dschungel neu und gründeten die MNLA, um einen Guerillakrieg gegen die britische Kolonialherrschaft zu führen. Viele der MNLA-Kämpfer, die gegen den britischen Kolonialismus kämpften, waren ehemalige Mitglieder der Malayan Peoples&#39; Anti-Japanese Army (MPAJA), die Jahre zuvor von den Briten ausgebildet und finanziert worden waren, um im Zweiten Weltkrieg gegen die Kaiserlich Japanische Armee zu kämpfen. Die kommunistischen Rebellen erhielten den größten Teil ihrer Unterstützung von der ethnisch malayisch-chinesischen Bevölkerung, die größtenteils in bitterer Armut lebte, rassistischer Verfolgung ausgesetzt war und nicht an Wahlen teilnehmen durfte."
roncw_warnews.137.a:1 "Beunruhigend ..."

roncw_warnews.138.t:0 "Manhattan-Rebellion"
roncw_warnews.138.d:0 "Der Manhattan-Aufstand war ein gescheiterter Putschversuch von Offizieren der Königlich Thailändischen Marine gegen die Regierung von Premierminister Plaek Pibulsonggram (Phibun) am 29. und 30. Juni 1951. Sie nahmen den Premierminister während einer Übergabezeremonie für das US-Schiff Manhattan als Geisel und brachten ihn an Bord des Flaggschiffs der Marine, der HTMS Sri Ayudhya. Sie wurden jedoch von den vereinten Streitkräften der Königlich Thailändischen Armee, der Luftwaffe und der Polizei empfangen. Es kam zu schweren Kämpfen, und die Sri Ayudhya wurde trotz Phibuns Anwesenheit an Bord versenkt; der Premierminister musste zusammen mit der Schiffsbesatzung an Land schwimmen. Dieses Ereignis führte dazu, dass die Marine einen Großteil ihrer Macht und ihres Einflusses verlor. Es zeigte auch, dass die politische Macht tatsächlich bei den Befehlshabern der Streitkräfte und nicht beim Premierminister lag."
roncw_warnews.138.a:1 "Beunruhigend ..."

roncw_warnews.139.t:0 "Maoistischer Aufstand in der Türkei"
roncw_warnews.139.d:0 "Am 24. April 1972 gründete eine radikale Gruppe unter Führung von İbrahim Kaypakkaya die Kommunistische Partei der Türkei/Marxisten-Leninisten (TKP/ML, manchmal fälschlicherweise nach dem Namen einer ihrer Publikationen als Partizan bezeichnet) mit der Absicht, einen Volkskrieg zu führen. Ein Jahr später wurde Kaypakkaya jedoch gefangen genommen, gefoltert und ermordet. 1978 hielt sie ihre erste Konferenz ab, auf der sie ihren Plan für einen Guerillakrieg bekräftigte, obwohl in dieser Richtung kaum Fortschritte erzielt wurden. Die TKP/ML war in den 1970er Jahren in politische Gewalt zwischen linken und rechten Gruppen verwickelt."
roncw_warnews.139.a:1 "Beunruhigend ..."

roncw_warnews.140.t:0 "Mau-Mau-Aufstand"
roncw_warnews.140.d:0 "Die KLFA war ein Aufstand in der britischen Kolonie Kenia, der von den Kikuyu, Meru und Embu dominiert wurde. Sie umfasste auch Einheiten der Kamba und Massai, die gegen die weißen europäischen Siedler in Kenia, die britische Armee und das örtliche Kenia-Regiment (britische Kolonisten, örtliche Hilfsmilizen und pro-britische Kikuyu) kämpften."
roncw_warnews.140.a:1 "Beunruhigend ..."

roncw_warnews.141.t:0 "Indonesien startet Militäroperationen"
roncw_warnews.141.d:0 "Die indonesischen Militäroperationen in Aceh, auch bekannt als Operation Red Net oder „Militärisches Operationsgebiet“, dauerten Anfang der 1990er Jahre und dauerten bis zum 22. August 1998. Sie richteten sich gegen die separatistische Bewegung Freies Aceh (GAM) in Aceh. Während dieser Zeit verübte die indonesische Armee massive und systematische Menschenrechtsverletzungen an der Bevölkerung Acehs. Der Krieg wurde als „schmutziger Krieg“ bezeichnet, der willkürliche Hinrichtungen, Entführungen, Folter, Massenvergewaltigungen, Verschwindenlassen und das Niederbrennen von Dörfern beinhaltete. Amnesty International bezeichnete die Reaktion der Militäroperation als „Schocktherapie“ für die GAM. Dörfer, die verdächtigt wurden, GAM-Mitglieder zu beherbergen, wurden niedergebrannt, und Familienangehörige mutmaßlicher Militanter wurden entführt und gefoltert. Zwischen 1989 und 1998 wurden bei der Operation zwischen 9.000 und 12.000 Menschen, hauptsächlich Zivilisten, getötet."
roncw_warnews.141.a:1 "Beunruhigend ..."

roncw_warnews.142.t:0 "Mindanao-Krise"
roncw_warnews.142.d:0 "Nach Angaben der philippinischen Regierung begannen die Zusammenstöße während einer Offensive in Marawi mit dem Ziel, Isnilon Hapilon, den Anführer der mit dem IS verbundenen Abu Sayyaf-Gruppe, festzunehmen. Zuvor hatte man Berichte erhalten, Hapilon befinde sich in der Stadt, möglicherweise um sich mit Kämpfern der Maute-Gruppe zu treffen. Es kam zu einem tödlichen Feuergefecht, als Hapilons Streitkräfte das Feuer auf die vereinten Armee- und Polizeiteams eröffneten und Verstärkung von der Maute-Gruppe anforderten. Diese bewaffnete Gruppe schwor dem Islamischen Staat die Treue und gilt laut Militärsprechern als für den Bombenanschlag in Davao City im Jahr 2016 verantwortlich."
roncw_warnews.142.a:1 "Beunruhigend ..."

roncw_warnews.143.t:0 "Mosambikanische Bürgerkrieg"
roncw_warnews.143.d:0 "Die RENAMO widersetzte sich den Versuchen der FRELIMO, einen sozialistischen Einparteienstaat zu errichten, und genoss dabei starke Unterstützung von den antikommunistischen Regierungen in Rhodesien und Südafrika. Die Verteidigungseinrichtungen Rhodesiens und Südafrikas wiederum nutzten die RENAMO als Stellvertreter, um die Unterstützung der FRELIMO für militante nationalistische Organisationen in ihren eigenen Ländern zu untergraben. Über eine Million Mosambikaner wurden bei den Kämpfen getötet oder verhungerten aufgrund unterbrochener Nahrungsmittellieferungen; weitere fünf Millionen wurden in der Region vertrieben. Der mosambikanische Bürgerkrieg zerstörte einen Großteil der wichtigen ländlichen Infrastruktur Mosambiks, darunter Krankenhäuser, Eisenbahnlinien, Straßen und Schulen. Den Sicherheitskräften der FRELIMO und den Aufständischen der RENAMO wurden zahlreiche Menschenrechtsverletzungen vorgeworfen, darunter der Einsatz von Kindersoldaten und Landminen."
roncw_warnews.143.a:1 "Beunruhigend ..."

roncw_warnews.144.t:0 "Mosambik-Unabhängigkeitskrieg"
roncw_warnews.144.d:0 "Portugals Kriege gegen Guerillakämpfer, die in seinen 400 Jahre alten afrikanischen Gebieten die Unabhängigkeit anstrebten, begannen 1961 mit Angola. In Mosambik brach der Konflikt 1964 aus. Auslöser waren Unruhen und Frustrationen unter vielen indigenen Mosambikanern, die die Fremdherrschaft als Ausbeutung und Misshandlung empfanden und damit lediglich den portugiesischen Wirtschaftsinteressen in der Region dienten. Viele Mosambikaner ärgerten sich zudem über Portugals Politik gegenüber der indigenen Bevölkerung. Diese führte zu Diskriminierung, erschwerte die traditionelle Lebensweise für viele Afrikaner und schränkte den Zugang zu portugiesischer Bildung und qualifizierter Arbeit ein."
roncw_warnews.144.a:1 "Beunruhigend ..."

roncw_warnews.145.t:0 "Bergkarabach-Krieg"
roncw_warnews.145.d:0 "Der Bergkarabach-Krieg, in Armenien als Befreiungskrieg von Arzach bezeichnet, war ein ethnischer und territorialer Konflikt, der von den späten 1980er Jahren bis Mai 1994 in der Enklave Bergkarabach im Südwesten Aserbaidschans zwischen der von Armenien unterstützten ethnischen Mehrheit der Armenier in Bergkarabach und der Republik Aserbaidschan ausgetragen wurde. Im weiteren Verlauf des Krieges verwickelten sich Armenien und Aserbaidschan, beides ehemalige Sowjetrepubliken, in einen langwierigen, nicht erklärten Gebirgskrieg in den Höhen von Bergkarabach, während Aserbaidschan versuchte, die Sezessionsbewegung in Bergkarabach einzudämmen."
roncw_warnews.145.a:1 "Beunruhigend ..."

roncw_warnews.146.t:0 "Ñancahuazú-Guerilla"
roncw_warnews.146.d:0 "Die Ñancahuazú-Guerilla oder Ejército de Liberación Nacional de Bolivia (Nationale Befreiungsarmee Boliviens; ELN) war eine Gruppe hauptsächlich bolivianischer und kubanischer Guerillas unter der Führung des Guerillaführers Che Guevara, die von 1966 bis 1967 in der bolivianischen Provinz Cordillera aktiv war. Die Gruppe errichtete ihr Basislager auf einer Farm jenseits des Flusses Ñancahuazú, einem saisonalen Nebenfluss des Rio Grande, 250 Kilometer südwestlich der Stadt Santa Cruz de la Sierra. Die Guerilla sollte als Foco fungieren, als Punkt des bewaffneten Widerstands, der als erster Schritt zum Sturz der bolivianischen Regierung und zur Gründung eines sozialistischen Staates dienen sollte. Die Guerillas besiegten mehrere bolivianische Patrouillen, bevor sie geschlagen wurden und Guevara gefangen genommen und hingerichtet wurde. Nur fünf Guerillas konnten überleben und nach Chile fliehen."
roncw_warnews.146.a:1 "Beunruhigend ..."

roncw_warnews.147.t:0 "Nepalesischer Bürgerkrieg"
roncw_warnews.147.d:0 "Der Aufstand wurde am 13. Februar 1996 von der KPN-M mit dem erklärten Ziel begonnen, die nepalesische Monarchie zu stürzen und eine Volksrepublik zu errichten. Er endete mit der Unterzeichnung des umfassenden Friedensabkommens am 21. November 2006. Der Konflikt war geprägt von standrechtlichen Hinrichtungen, Massakern, Säuberungen, Entführungen und anderen Kriegsverbrechen und Verbrechen gegen die Menschlichkeit. Der Aufstand forderte den Tod von über 17.000 Menschen, darunter Zivilisten, Aufständische, Armee- und Polizeiangehörige, und führte zur Binnenvertreibung von Hunderttausenden Menschen (vor allem aus ländlichen Gebieten Nepals). Laut INSEC waren 1.665 der Todesopfer Frauen."
roncw_warnews.147.a:1 "Beunruhigend ..."

roncw_warnews.148.t:0 "Revolution in Nicaragua"
roncw_warnews.148.d:0 "Die nicaraguanische Revolution umfasste den wachsenden Widerstand gegen die Somoza-Diktatur in den 1960er und 1970er Jahren, die gewalttätige Kampagne der Sandinistischen Nationalen Befreiungsfront (FSLN) zum Sturz der Diktatur 1978–1979, die anschließenden Bemühungen der FSLN, von 1979 bis 1990 Nicaragua zu regieren, und den Contra-Krieg, der von 1981 bis 1990 zwischen der FSLN-geführten Regierung Nicaraguas und den von den USA unterstützten Contras geführt wurde. Die Revolution markierte einen bedeutenden Abschnitt in der Geschichte Nicaraguas und entlarvte das Land als eines der wichtigsten Stellvertreterkriegsschauplätze des Kalten Krieges, was große internationale Aufmerksamkeit erregte."
roncw_warnews.148.a:1 "Beunruhigend ..."

roncw_warnews.149.t:0 "Bürgerkrieg in Nigeria"
roncw_warnews.149.d:0 "Er wurde vom 6. Juli 1967 bis zum 15. Januar 1970 zwischen der nigerianischen Regierung unter General Yakubu Gowon und dem abtrünnigen Staat Biafra unter dem verstorbenen Oberstleutnant Odumegwu Ojukwu (1933–2011) geführt. Biafra verkörperte die nationalistischen Bestrebungen des Igbo-Volkes, dessen Führung der Ansicht war, sie könne nicht länger mit der vom Norden dominierten Bundesregierung koexistieren. Der Konflikt war das Ergebnis politischer, wirtschaftlicher, ethnischer, kultureller und religiöser Spannungen, die der formellen Entkolonialisierung Nigerias durch Großbritannien zwischen 1960 und 1963 vorausgingen. Unmittelbare Ursachen des Krieges im Jahr 1966 waren ethnisch-religiöse Unruhen in Nordnigeria, ein Militärputsch, ein Gegenputsch und die Verfolgung der in Nordnigeria lebenden Igbo. Die Kontrolle über die lukrative Ölproduktion im Nigerdelta spielte ebenfalls eine entscheidende strategische Rolle."
roncw_warnews.149.a:1 "Beunruhigend ..."

roncw_warnews.150.t:0 "Bürgerkrieg im Nordjemen"
roncw_warnews.150.d:0 "Der Bürgerkrieg im Nordjemen tobte von 1962 bis 1970 zwischen Anhängern des Mutawakkiliten-Königreichs und der Jemenitischen Arabischen Republik. Der Krieg begann 1962 mit einem Staatsstreich revolutionärer Republikaner unter der Führung der Armee von Abdullah as-Sallal. Dieser stürzte den frisch gekrönten Imam Muhammad al-Badr und erklärte den Jemen unter seiner Präsidentschaft zur Republik. Der Imam floh an die saudi-arabische Grenze, wo er die Unterstützung der schiitischen Stämme im Norden sammelte, um die Macht zurückzuerobern. Dies eskalierte rasch zu einem umfassenden Bürgerkrieg."
roncw_warnews.150.a:1 "Beunruhigend ..."

roncw_warnews.151.t:0 "Operation Enduring Freedom – Horn von Afrika"
roncw_warnews.151.d:0 "Operation Enduring Freedom – Horn of Africa (OEF-HOA) ist die Militäroperation der Vereinigten Staaten zur Bekämpfung des militanten Islamismus und der Piraterie am Horn von Afrika. Sie ist ein Bestandteil der Operation Enduring Freedom (OEF), die acht afrikanische Staaten umfasst, die sich vom äußersten Nordosten des Kontinents bis zum ölreichen Golf von Guinea im Westen erstrecken. Die andere OEF-Mission in Afrika ist unter dem Namen Operation Enduring Freedom – Trans Sahara (OEF-TS) bekannt und wurde bis zur Schaffung des neuen United States Africa Command vom United States European Command geleitet. Die Combined Joint Task Force – Horn of Africa (CJTF-HOA) ist die wichtigste (aber nicht einzige) militärische Komponente, die mit der Erreichung der Missionsziele beauftragt ist. Die Marinekomponente ist die multinationale Combined Task Force 150, die unter der Leitung der Fünften Flotte der USA operiert."
roncw_warnews.151.a:1 "Beunruhigend ..."

roncw_warnews.152.t:0 "Operation Enduring Freedom – Philippinen"
roncw_warnews.152.d:0 "Operation Enduring Freedom – Philippines (OEF-P) oder Operation Freedom Eagle war Teil der Operation Enduring Freedom und des globalen Krieges gegen den Terror. Die Operation richtete sich gegen die verschiedenen im Land operierenden dschihadistischen Terrorgruppen. Bis 2009 berieten und unterstützten rund 600 US-Soldaten die Streitkräfte der Philippinen (AFP) im Süden der Philippinen. Darüber hinaus entsandte die CIA bis 2014 paramilitärische Eliteoffiziere ihrer Special Activities Division, um wichtige Terroristenführer zu jagen und zu töten oder festzunehmen. Diese Gruppe war besonders erfolgreich im Kampf gegen und bei der Festnahme von Al-Qaida-Führern und Anführern verbündeter Gruppen wie Abu Sayyaf."
roncw_warnews.152.a:1 "Beunruhigend ..."

roncw_warnews.153.t:0 "Indien startet Operation Polo"
roncw_warnews.153.d:0 "Operation Polo war der Deckname der „Polizeiaktion“ des gerade unabhängig gewordenen Dominion of India im September 1948 gegen den Bundesstaat Hyderabad. Es handelte sich um eine Militäroperation, bei der die indischen Streitkräfte in den von Nizam regierten Fürstenstaat einmarschierten und ihn der Indischen Union eingliederten. Zum Zeitpunkt der Teilung 1947 unterlagen die Fürstenstaaten Indiens, die innerhalb ihrer eigenen Territorien grundsätzlich Selbstverwaltung genossen, subsidiären Bündnissen mit den Briten, die ihnen die Kontrolle über ihre Außenbeziehungen gaben. Mit dem Indian Independence Act von 1947 kündigten die Briten alle derartigen Bündnisse auf und ließen den Staaten die Möglichkeit, sich für die vollständige Unabhängigkeit zu entscheiden. Bis 1948 hatten sich jedoch fast alle Staaten entweder Indien oder Pakistan angeschlossen."
roncw_warnews.153.a:1 "Beunruhigend ..."

roncw_warnews.154.t:0 "Operation Trikora"
roncw_warnews.154.d:0 "Als der Rest Niederländisch-Ostindiens im Dezember 1949 als Indonesien seine vollständige Unabhängigkeit erlangte, behielten die Niederländer die Souveränität über den westlichen Teil der Insel Neuguinea und unternahmen Schritte, um die Insel auf die Unabhängigkeit als eigenständiges Land vorzubereiten. Die niederländischen und westpapuanischen Führer argumentierten, das Gebiet gehöre nicht zu Indonesien, da die Westpapuaner ethnisch und geografisch von den Indonesiern getrennt seien, immer separat verwaltet worden seien und nicht unter indonesischer Kontrolle stehen wollten. Von seiner Unabhängigkeit 1949 bis 1961 versuchte Indonesien erfolglos, über die Vereinten Nationen die Kontrolle über West-Neuguinea zu erlangen. Seit der Indonesischen Nationalrevolution betrachteten indonesische Nationalisten West-Neuguinea als integralen Bestandteil des indonesischen Staates."
roncw_warnews.154.a:1 "Beunruhigend ..."

roncw_warnews.155.t:0 "Palästinensischer Fedayeen-Aufstand"
roncw_warnews.155.d:0 "Die Fedajin gingen aus den Reihen der palästinensischen Flüchtlinge hervor, die infolge des arabisch-israelischen Krieges von 1948 aus ihren Dörfern flohen oder vertrieben wurden. Mitte der 1950er Jahre begannen sie, von Syrien, Ägypten und Jordanien aus grenzüberschreitende Operationen nach Israel durchzuführen. Die ersten Infiltrationen dienten häufig dem Zweck, an Land und landwirtschaftliche Erzeugnisse zu gelangen, die die Palästinenser durch den Krieg verloren hatten. Später konzentrierten sie sich auf Angriffe auf israelische Militär- und Zivilziele. Die Angriffe der Fedajin richteten sich gegen die Grenzen zu Israel im Gazastreifen und auf der Sinai-Halbinsel. Israel ergriff daraufhin Vergeltungsmaßnahmen gegen die Fedajin, die wiederum häufig die Bürger ihrer Gastländer angriffen, was wiederum weitere Angriffe provozierte."
roncw_warnews.155.a:1 "Beunruhigend ..."

roncw_warnews.156.t:0 "Paquisha-Krieg"
roncw_warnews.156.d:0 "Der Paquisha-Krieg oder auch der falsche Paquisha-Krieg war ein militärischer Konflikt zwischen Ecuador und Peru zwischen Januar und Februar 1981 um die Kontrolle dreier Wachposten. Peru war der Ansicht, die Angelegenheit sei bereits im Ecuadorianisch-Peruanischen Krieg von 1941 entschieden worden, Ecuador war jedoch nicht mit dem Protokoll von Rio de Janeiro einverstanden. Später im Jahr 1998 entschieden die Garanten des Rio-Protokolls, dass die Grenze der nicht abgegrenzten Zone tatsächlich die Linie der Cordillera del Cóndor sei, wie Peru seit den 1940er Jahren behauptet hatte."
roncw_warnews.156.a:1 "Beunruhigend ..."

roncw_warnews.157.t:0 "Bürgerkrieg in Paraguay"
roncw_warnews.157.d:0 "1940 setzte Präsident Higinio Morínigo die Verfassung außer Kraft und verbot politische Parteien. Der Widerstand gegen seine Herrschaft äußerte sich in Generalstreiks und Studentenunruhen. 1946 legalisierte Morínigo politische Aktivitäten und bildete ein Kabinett mit der Febrerista Revolutionary Concentration und der Colorado Party. Die Febreristas traten am 11. Januar 1947 aus der Koalition aus, verärgert darüber, dass Morínigo die Colorados zu bevorzugen schien."
roncw_warnews.157.a:1 "Beunruhigend ..."

roncw_warnews.158.t:0 "Permesta-Rebellion in Indonesien"
roncw_warnews.158.d:0 "Der PRRI-Aufstand im Westen und der Permesta-Aufstand im Osten entstanden aus einer Kombination von Gründen. Vor allem waren bestimmte ethnische Gruppen auf Sulawesi und Zentralsumatra der Meinung, dass die Regierungspolitik aus Jakarta ihre lokale Wirtschaft stagnieren ließ, was wiederum die Möglichkeiten zur regionalen Entwicklung einschränkte. Außerdem gab es eine gewisse Feindseligkeit gegenüber der javanischen Volksgruppe, die im neu geschaffenen Einheitsstaat Indonesien die größte und einflussreichste war. Tatsächlich ging es in diesem Konflikt weniger um Überlegungen zur Abspaltung vom indonesischen Staat als vielmehr um eine gerechte Aufteilung der wirtschaftlichen und politischen Macht in Indonesien."
roncw_warnews.158.a:1 "Beunruhigend ..."

roncw_warnews.159.t:0 "Aufstand in Pilsen"
roncw_warnews.159.d:0 "Nachdem die Kommunistische Partei 1948 die Macht übernommen hatte, konzentrierte sie die Produktion auf die Schwerindustrie, insbesondere auf die Rüstungsproduktion. Der Agrarsektor wurde zwangskollektiviert. Diese Politik führte jedoch zu Engpässen bei Konsumgütern, insbesondere bei Lebensmitteln, und einer Inflation von 28 Prozent. Die Regierung reagierte darauf mit einer Preiserhöhung für staatlich gelieferte Güter Anfang 1953. Dies führte zu wachsender Unzufriedenheit in der Bevölkerung und zu kurzzeitigen Streiks. Der nächste Schritt war eine Währungsreform, die einer Abwertung der Ersparnisse gleichkam. Alle Ersparnisse wurden im Verhältnis 50:1 abgewertet, alle Gehälter im Verhältnis 5:1 – kleine Personengruppen waren davon ausgenommen. Alle staatlichen Verpflichtungen wurden abgeschafft. Die Rationierung von Lebensmitteln zu subventionierten Preisen wurde beendet und die Arbeitsquoten erhöht."
roncw_warnews.159.a:1 "Beunruhigend ..."

roncw_warnews.160.t:0 "Politische Gewalt in der Türkei"
roncw_warnews.160.d:0 "1975 wurde Süleyman Demirel, Vorsitzender der konservativen Gerechtigkeitspartei (türkisch: Adalet Partisi, AP), Nachfolger von Bülent Ecevit, dem Vorsitzenden der sozialdemokratischen Republikanischen Volkspartei (türkisch: Cumhuriyet Halk Partisi, CHP), als Ministerpräsident. Er bildete eine Koalition, die „Nationalistische Front (türkisch: Milliyetçi Cephe)“, mit Necmettin Erbakans islamistischer Nationalen Heilspartei (türkisch: Millî Selamet Partisi, MSP) und Alparslan Türkeş‘ rechtsextremer Partei der Nationalistischen Bewegung (türkisch: Milliyetçi Hareket Partisi, MHP). Die MHP nutzte die Gelegenheit, die staatlichen Sicherheitsdienste zu infiltrieren und verschärfte damit den seither tobenden Krieg niedriger Intensität zwischen den rivalisierenden Fraktionen erheblich."
roncw_warnews.160.a:1 "Beunruhigend ..."

roncw_warnews.161.t:0 "Proteste in Posen"
roncw_warnews.161.d:0 "Nach Josef Stalins Tod löste der Prozess der Entstalinisierung im gesamten Ostblock Debatten über grundlegende Fragen aus. Nikita Chruschtschows Rede Über den Personenkult und seine Folgen hatte weitreichende Auswirkungen sowohl innerhalb der Sowjetunion als auch in anderen kommunistischen Ländern. In Polen drehten sich neben der Kritik am Personenkult beliebte Diskussionsthemen um das Recht, einen unabhängigeren Kurs des „lokalen, nationalen Sozialismus“ zu steuern, anstatt dem sowjetischen Modell bis ins kleinste Detail zu folgen; solche Ansichten wurden in Diskussionen und Kritiken vieler Mitglieder der Polnischen Vereinigten Arbeiterpartei an Stalins Hinrichtung älterer polnischer Kommunisten der Kommunistischen Partei Polens während der Großen Säuberung gesehen."
roncw_warnews.161.a:1 "Beunruhigend ..."

roncw_warnews.162.t:0 "PUK-Aufstand"
roncw_warnews.162.d:0 "Der PUK-Aufstand war ein kleiner Aufstand der Patriotischen Union Kurdistans (PUK) gegen den baathistischen Irak von 1975 bis 1979. Er folgte auf die Niederlage der Demokratischen Partei Kurdistans (KDP) im Zweiten Irakisch-Kurdischen Krieg, die diese Organisation zu einem Waffenstillstand und einem Exil im Iran zwang. Aufgrund mangelnder ausländischer Unterstützung konnten die PUK-Guerillas nur in den entlegensten Teilen der Berge des irakischen Kurdistans operieren. Während dieser Zeit geriet die PUK in eine politische Krise mit der KDP, die zu schweren innerkurdischen Kriegen führte, die 1977 ihren Höhepunkt erreichten. Nach dem Aufstand ging die PUK während des Iran-Irak-Krieges ein Bündnis mit iranischen Streitkräften ein und wurde im kurdischen Aufstand von 1983 vom Iran unterstützt."
roncw_warnews.162.a:1 "Beunruhigend ..."

roncw_warnews.163.t:0 "Punnapra-Vayalar-Aufstand"
roncw_warnews.163.d:0 "Sir CP Ramaswami Iyer hatte Verfassungsreformen vorgeschlagen, die Travancore zu einem unabhängigen Land machen und einen Beitritt zur Indischen Union verhindern sollten. CP hatte ein „amerikanisches Modell“ für Travancore vorgeschlagen. Die Kommunisten in Travancore widersetzten sich diesem Schritt mit der Parole „Werft die amerikanischen und britischen Agenten ins Arabische Meer“. Der Kampf gegen das Königreich Travancore begann 1939 mit der Fusion sozialistischer Parteien, aus der eine neue radikale kommunistische Partei hervorging. Die brutale Hungersnot im Königreich Travancore während des Zweiten Weltkriegs hatte die Bauern auf die Seite der Kommunisten getrieben. Während der Hungersnot (1939–1943) starben allein im Taluk Cherthala über 21.000 Bauern. In den Taluks Cherthala und Ambalapuzha wuchs die Unzufriedenheit gegen Diwan. Im März 1946 wurde Alappuzha von der Polizei von Travancore aufgefüllt, um gegen die Mitglieder von ATTUC vorzugehen."
roncw_warnews.163.a:1 "Beunruhigend ..."

roncw_warnews.164.t:0 "Aufstand in Reggio"
roncw_warnews.164.d:0 "Die Proteste in Reggio Calabria eskalierten im Juli 1970, als die wesentlich kleinere Stadt Catanzaro (mit 82.000 Einwohnern gegenüber 160.000 Einwohnern in Reggio) zur Hauptstadt der Region Kalabrien gewählt wurde. Die Einwohner von Reggio machten die „Roten Barone“ in Rom für den Erfolg ihrer Rivalen verantwortlich, eine Gruppe einflussreicher Mitte-Links-Politiker aus Kalabrien aus Cosenza und Catanzaro, darunter auch Vizepremier Giacomo Mancini. Am 14. Juli wurde ein Generalstreik ausgerufen, und fünf Tage dauernde Straßenkämpfe forderten einen Toten und mehrere Verletzte bei den Polizisten. Eine Truppe von 5.000 bewaffneten Polizisten und Carabinieri-Agenten wurde in das Gebiet verlegt. Die Regierung verbot dem staatlichen Fernsehsender RAI, über den Aufstand zu berichten. Dennoch gewann der Aufstand zunehmend an Fahrt und Sympathie."
roncw_warnews.164.a:1 "Beunruhigend ..."

roncw_warnews.165.t:0 "Vergeltungsoperationen in Israel"
roncw_warnews.165.d:0 "Vergeltungsmaßnahmen wurden nach Überfällen bewaffneter Infiltratoren in Israel während des gesamten Zeitraums vom Arabisch-Israelischen Krieg 1948 bis Oktober 1956 durchgeführt. Die meisten Vergeltungsmaßnahmen folgten auf Überfälle, bei denen israelische Todesopfer zu beklagen waren. Von 1949 bis 1954 richteten sich die Vergeltungsmaßnahmen gegen Jordanien. 1954 beschlossen die jordanischen Behörden, die Infiltration aufgrund heftiger israelischer Aktivitäten einzudämmen. Die grenzüberschreitende Infiltration aus Jordanien ging erheblich zurück, ebenso wie die Zahl der Opfer. Die israelischen Streitkräfte stellten die Vergeltungsmaßnahmen gegen Jordanien ab September desselben Jahres ein."
roncw_warnews.165.a:1 "Beunruhigend ..."

roncw_warnews.166.t:0 "Bürgerkrieg in der Republik Kongo"
roncw_warnews.166.d:0 "Die Republik Kongo (Kongo-Brazzaville) erlangte 1960 ihre Unabhängigkeit von Frankreich und erlebte bald darauf eine Phase politischer Turbulenzen. Nach einem dreitägigen Aufstand geriet der Kongo unter den Einfluss des wissenschaftlichen Sozialismus, knüpfte Beziehungen zum Ostblock und wurde zu einer Einparteienrepublik. Angesichts zunehmender ethnischer Spannungen kam es zu zwei Regimewechseln. 1979 übernahm Denis Sassou Nguesso die Präsidentschaft. 1990 unternahm das Land erste Schritte in Richtung eines Mehrparteiensystems, was schließlich zu den Parlamentswahlen 1992 führte."
roncw_warnews.166.a:1 "Beunruhigend ..."

roncw_warnews.167.t:0 "Rhodesischer Buschkrieg"
roncw_warnews.167.d:0 "Der Rhodesische Buschkrieg – auch Zweiter Chimurenga-Krieg oder Simbabwe-Befreiungskrieg genannt – war ein Bürgerkrieg, der von Juli 1964 bis Dezember 1979 in dem nicht anerkannten Staat Rhodesien tobte. Drei Mächte standen sich in diesem Konflikt gegenüber: die von der weißen Minderheit geführte Regierung Rhodesiens unter Ian Smith (später die simbabwe-rhodesische Regierung von Bischof Abel Muzorewa); die Simbabwe African National Liberation Army, der militärische Flügel von Robert Mugabes Simbabwe African National Union; und die Simbabwe People&#39;s Revolutionary Army von Joshua Nkomos Simbabwe African People&#39;s Union. Der Krieg und die darauffolgende interne Regelung, die 1978 von Smith und Muzorewa unterzeichnet wurde, führten im Juni 1979 zur Einführung des allgemeinen Wahlrechts und zum Ende der Herrschaft der weißen Minderheit in Rhodesien, das unter einer schwarzen Mehrheitsregierung in Simbabwe-Rhodesien umbenannt wurde."
roncw_warnews.167.a:1 "Beunruhigend ..."

roncw_warnews.168.t:0 "Die USA marschieren in Panama ein"
roncw_warnews.168.d:0 "Die Vereinigten Staaten unterhielten zahlreiche Militärstützpunkte und eine beträchtliche Garnison in der gesamten Kanalzone, um den in amerikanischem Besitz befindlichen Panamakanal zu schützen und die amerikanische Kontrolle über dieses strategisch wichtige Gebiet aufrechtzuerhalten. Am 7. September 1977 unterzeichneten US-Präsident Jimmy Carter und der De-facto-Führer Panamas, General Omar Torrijos, die Torrijos-Carter-Verträge, die den Prozess der Übergabe des Panamakanals an Panama bis zum Jahr 2000 in Gang setzten. Obwohl der Kanal für die panamaische Verwaltung bestimmt war, blieben die Militärstützpunkte bestehen, und eine der Bedingungen der Übergabe war, dass der Kanal für die amerikanische Schifffahrt offen blieb. Die USA pflegten langjährige Beziehungen zu General Noriega, der seit 1967 als US-Geheimdienstmitarbeiter und bezahlter Informant der CIA diente, auch während der Zeit, als Bush Chef der CIA war."
roncw_warnews.168.a:1 "Beunruhigend ..."

roncw_warnews.169.t:0 "Revolution in Rumänien"
roncw_warnews.169.d:0 "Erste Proteste der ungarischen Minderheit fanden Mitte Dezember in Timișoara statt. Sie waren eine Reaktion auf den Versuch der Regierung, den ungarischen reformierten Pfarrer László Tőkés aus dem Amt zu vertreiben. Angesichts ähnlicher Ereignisse in den Nachbarländern forderten die Rumänen daraufhin eine Revolution und einen Regierungswechsel. Die allgegenwärtige Geheimpolizei des Landes, die Securitate, die zu den größten im Ostblock gehörte und jahrzehntelang die Hauptgewalt gegen den Widerstand der Bevölkerung hatte, indem sie politische Meinungsverschiedenheiten häufig und gewaltsam niederschlug, war letztlich nicht in der Lage, den drohenden, letztlich aber tödlichen und erfolgreichen Aufstand zu stoppen."
roncw_warnews.169.a:1 "Beunruhigend ..."

roncw_warnews.170.t:0 "Russische Verfassungskrise"
roncw_warnews.170.d:0 "Am 3. Oktober entfernten Demonstranten die Polizeiabsperrungen um das Parlament, besetzten auf Drängen ihrer Anführer das Bürgermeisteramt und versuchten, das Fernsehzentrum Ostankino zu stürmen. Die Armee, die zunächst ihre Neutralität erklärt hatte, stürmte auf Jelzins Befehl in den frühen Morgenstunden des 4. Oktober das Gebäude des Obersten Sowjets und verhaftete die Anführer des Widerstands. Auf dem Höhepunkt der Krise sahen manche Russland am Rande eines Bürgerkriegs. Der zehntägige Konflikt entwickelte sich zum tödlichsten Straßenkampf in der Geschichte Moskaus seit der Russischen Revolution. Nach Regierungsschätzungen wurden 187 Menschen getötet und 437 verletzt."
roncw_warnews.170.a:1 "Beunruhigend ..."

roncw_warnews.171.t:0 "Grenzscharmützel von Samita"
roncw_warnews.171.d:0 "Am 26. Dezember 1972 entsandte Kuwait eine Delegation von Mitgliedern der kuwaitischen Nationalversammlung in den Irak. Die kuwaitische Delegation traf sich mit Saddam Hussein, dem damaligen Vizepräsidenten des Irak, und besprach den Grenzverlauf zwischen Kuwait und dem Irak sowie die Notwendigkeit einer Lösung dieses Konflikts. Die kuwaitische Delegation traf sich auch mit dem irakischen Präsidenten Ahmed Hassan al-Bakr, der den Delegationsmitgliedern eine Lösung der Grenzsituation zusicherte. Daraufhin besuchte am 26. Februar 1973 eine weitere kuwaitische Delegation unter der Leitung von Scheich Sabah Al-Ahmad Al-Jaber Al-Sabah, dem damaligen kuwaitischen Außenminister, den Irak und blieb bis zum 2. März 1973."
roncw_warnews.171.a:1 "Beunruhigend ..."

roncw_warnews.172.t:0 "Nationalistischer Aufstand in San Juan"
roncw_warnews.172.d:0 "Am 17. September 1922 wurde die Puerto-Ricanische Nationalistische Partei gegründet. José Coll y Cuchí, ein ehemaliges Mitglied der Union Party, wurde zu ihrem ersten Präsidenten gewählt. Er strebte radikale Veränderungen in der Wirtschaft und den Sozialprogrammen Puerto Ricos an. 1924 trat der Anwalt Pedro Albizu Campos der Partei bei und wurde zu ihrem Vizepräsidenten ernannt. Albizu Campos war der erste Puerto-Ricaner, der die Harvard Law School abgeschlossen hatte. Er hatte im Ersten Weltkrieg als Leutnant in der US-Armee gedient und war der Ansicht, dass Puerto Rico eine unabhängige Nation sein sollte – selbst wenn dies eine bewaffnete Auseinandersetzung erforderte. 1930 verließ Coll y Cuchí die Partei aufgrund von Meinungsverschiedenheiten mit Albizu Campos über die Führung der Partei. Am 11. Mai 1930 wurde Albizu Campos zum Präsidenten der Nationalistischen Partei gewählt."
roncw_warnews.172.a:1 "Beunruhigend ..."

roncw_warnews.173.t:0 "Der Sandkrieg"
roncw_warnews.173.d:0 "Drei Faktoren trugen zum Ausbruch dieses Konflikts bei: das Fehlen einer genauen Grenzziehung zwischen Algerien und Marokko, die Entdeckung wichtiger Bodenschätze in dem umstrittenen Gebiet und der marokkanische Irredentismus, der durch die Großmarokko-Ideologie der Istiqlal-Partei und Allal al-Fassis geschürt wurde. Vor der französischen Kolonisierung der Region im 19. Jahrhundert standen Teile Süd- und Westalgeriens unter marokkanischem Einfluss und es gab keine definierte Grenze. Im Vertrag von Lalla Maghnia (18. März 1845), der die Grenze zwischen Französisch-Algerien und Marokko festlegte, heißt es: „Ein Gebiet ohne Wasser ist unbewohnbar und seine Grenzen sind überflüssig“ und die Grenze ist nur auf einer Länge von 165 km gezogen. Darüber hinaus gibt es nur ein Grenzgebiet, das von Stammesgebieten unterbrochen wird, die an Marokko oder Algerien angeschlossen sind."
roncw_warnews.173.a:1 "Beunruhigend ..."

roncw_warnews.174.t:0 "Zweiter Tschetschenienkrieg"
roncw_warnews.174.d:0 "Am 7. August 1999 drangen islamistische Kämpfer aus Tschetschenien in die russische Region Dagestan ein, erklärten sie zum unabhängigen Staat und riefen zum Heiligen Krieg auf. Am 1. Oktober marschierten russische Truppen in Tschetschenien ein. Dieser Feldzug beendete die De-facto-Unabhängigkeit der Tschetschenischen Republik Itschkeria und stellte die russische föderale Kontrolle über das Gebiet wieder her. Während des ersten Feldzugs lieferten sich russisches Militär und prorussische tschetschenische paramilitärische Kräfte offene Kämpfe mit tschetschenischen Separatisten und eroberten die tschetschenische Hauptstadt Grosny nach einer Winterbelagerung, die von Ende 1999 bis Februar 2000 andauerte. Im Mai 2000 errichtete Russland die direkte Herrschaft über Tschetschenien. Nach der Großoffensive forderte der tschetschenische militante Widerstand im gesamten Nordkaukasus weiterhin schwere russische Verluste und stellte die russische politische Kontrolle über Tschetschenien jahrelang in Frage."
roncw_warnews.174.a:1 "Beunruhigend ..."

roncw_warnews.175.t:0 "Zweiter Kongokrieg"
roncw_warnews.175.d:0 "Der Zweite Kongokrieg begann im August 1998 in der Demokratischen Republik Kongo, etwas mehr als ein Jahr nach dem Ersten Kongokrieg, und war zum Teil von denselben Problemen geprägt. Der Krieg endete offiziell im Juli 2003, als die Übergangsregierung der Demokratischen Republik Kongo die Macht übernahm. Obwohl 2002 ein Friedensabkommen unterzeichnet wurde, dauerte die Gewalt in vielen Regionen des Landes, insbesondere im Osten, an. Die Feindseligkeiten dauerten seit dem anhaltenden Aufstand der Lord&#39;s Resistance Army und den Konflikten in Kivu und Ituri an. Schließlich beteiligten sich neun afrikanische Länder und rund 25 bewaffnete Gruppen am Krieg. Bis 2008 forderten der Krieg und seine Folgen 5,4 Millionen Todesopfer, hauptsächlich durch Krankheit und Hunger. Damit war der Zweite Kongokrieg der tödlichste Konflikt weltweit seit dem Zweiten Weltkrieg."
roncw_warnews.175.a:1 "Beunruhigend ..."

roncw_warnews.176.t:0 "Die zweite Intifada"
roncw_warnews.176.d:0 "Die Zweite Intifada war eine Zeit verstärkter israelisch-palästinensischer Gewalt, die von den Palästinensern als Aufstand gegen Israel beschrieben wird, während die Israelis sie als eine anhaltende Terrorkampagne der Palästinensischen Autonomiebehörde und verschiedener palästinensischer militanter Gruppen betrachten. Als allgemeine Auslöser der Gewalt werden der israelische Rückzug aus dem Südlibanon-Konflikt im Frühjahr 2000 und das Scheitern des Camp-David-Gipfels im Juli 2000, bei dem keine endgültige Einigung über den israelisch-palästinensischen Friedensprozess erzielt werden konnte, genannt. Die Gewalt begann im September 2000, nachdem Ariel Sharon den Tempelberg besucht hatte, was von den Palästinensern als äußerst provokativ empfunden wurde. Palästinenser bewarfen die Polizei mit Steinen und wurden von der israelischen Armee mit Tränengas und Gummigeschossen auseinandergetrieben."
roncw_warnews.176.a:1 "Beunruhigend ..."

roncw_warnews.177.t:0 "Irakisch-Kurdischer Krieg"
roncw_warnews.177.d:0 "Das Friedensabkommen von 1970 hielt nicht lange, und 1974 startete die irakische Regierung eine neue Offensive gegen die kurdischen Rebellen und drängte sie nahe an die iranische Grenze. Wie im Ersten Irakisch-Kurdischen Krieg erhielten die Kurden materielle Unterstützung aus dem Iran und Israel. Israel betrachtete das irakische Militär als mögliche Bedrohung im Falle erneuter Kämpfe zwischen Israel und Syrien (während des Krieges von 1973 war etwa ein Drittel der irakischen Armee an die syrische Front geschickt worden, um gegen Israel zu kämpfen) und wollte die Iraker daher anderweitig beschäftigen. Der Iran wollte seine politische und militärische Position gegenüber dem Irak – der einzigen anderen Regionalmacht am Persischen Golf – stärken."
roncw_warnews.177.a:1 "Beunruhigend ..."

roncw_warnews.178.t:0 "Zweiter liberianischer Bürgerkrieg"
roncw_warnews.178.d:0 "Der Zweite Liberianische Bürgerkrieg begann 1999, als im Norden Liberias eine von der Regierung des benachbarten Guinea unterstützte Rebellengruppe namens Liberians United for Reconciliation and Democracy (LURD) entstand. Anfang 2003 entstand im Süden eine zweite Rebellengruppe, die Bewegung für Demokratie in Liberia (MODEL), und im Juni/Juli 2003 kontrollierte die Regierung von Charles Taylor nur noch ein Drittel des Landes. Die Hauptstadt Monrovia wurde von der LURD belagert, und der Beschuss der Stadt durch die Gruppe forderte den Tod zahlreicher Zivilisten. Tausende Menschen wurden infolge des Konflikts aus ihrer Heimat vertrieben. Am 18. August 2003 unterzeichneten die Kriegsparteien das umfassende Friedensabkommen von Accra, das das politische Ende des Konflikts markierte und den Übergang zur Demokratie unter der Nationalen Übergangsregierung Liberias einleitete."
roncw_warnews.178.a:1 "Beunruhigend ..."

roncw_warnews.179.t:0 "Taiwanstraßenkrise"
roncw_warnews.179.d:0 "1949 endete der chinesische Bürgerkrieg mit dem Sieg der kommunistischen Volksrepublik China (VRC). Die von Chiang Kai-shek und der Kuomintang (KMT) kontrollierte Regierung der Republik China (ROC) sowie 1,3 Millionen antikommunistische Chinesen flohen vom chinesischen Festland. Die Regierung der ROC zog auf die Insel Taiwan um. Das von der ROC kontrollierte Gebiet beschränkte sich auf Taiwan, Hainan, die Pescadores-Inseln (Penghu) und mehrere Inselgruppen entlang der Südostküste Chinas. Im April 1950 eroberte die VR China Hainan. Die dortigen Truppen der ROC wurden im Mai 1950 nach Taiwan evakuiert."
roncw_warnews.179.a:1 "Beunruhigend ..."

roncw_warnews.180.t:0 "Konflikt in der Sicherheitszone"
roncw_warnews.180.d:0 "In früheren Konflikten vor der israelischen Invasion 1982, darunter der Operation Litani, versuchte Israel, PLO-Stützpunkte im Libanon zu vernichten und christlich-maronitische Milizen zu unterstützen. Die Invasion 1982 führte zum Abzug der PLO aus dem Libanon. Die Schaffung der Sicherheitszone im Südlibanon kam der israelischen Zivilbevölkerung zugute, ging jedoch zu hohen Kosten für die palästinensische und libanesische Zivilbevölkerung einher. Trotz dieses Erfolgs Israels bei der Vernichtung der PLO-Stützpunkte und des teilweisen Rückzugs 1985 verschärfte die israelische Invasion den Konflikt mit lokalen libanesischen Milizen und führte zur Konsolidierung mehrerer lokaler schiitischer Bewegungen im Libanon, darunter der Hisbollah und Amal, aus einer zuvor unorganisierten Guerillabewegung im Süden. Im Laufe der Jahre stiegen die militärischen Verluste auf beiden Seiten, da beide Parteien modernere Waffen einsetzten."
roncw_warnews.180.a:1 "Beunruhigend ..."

roncw_warnews.181.t:0 "Shaba II"
roncw_warnews.181.d:0 "Shaba II war ein kurzer Konflikt, der 1978 in der zairischen Provinz Shaba (heute Katanga) ausgetragen wurde. Der Konflikt brach am 11. Mai 1978 aus, nachdem 6.500 Rebellen der Kongolesischen Nationalen Befreiungsfront (FNLC), einer separatistischen Miliz aus Katanga, die Grenze von Angola nach Zaire überquert hatten, um die Abspaltung der Provinz vom zairischen Regime Mobutus Sese Sekos zu erreichen. Die FNLC eroberte die wichtige Bergbaustadt Kolwezi. Die Mobutu-Regierung bat um ausländische Hilfe, und französische und belgische Militärinterventionen schlugen die Invasion zurück, genau wie 1977. Die USA und Kuba zwangen Angola und Zaire zu Verhandlungen, die zu einem Nichtangriffspakt führten. Zaire stellte vorübergehend die Unterstützung für die Front zur Befreiung der Enklave Cabinda (FLEC), die Nationale Befreiungsfront Angolas (FNLA) und die Nationale Union für die völlige Unabhängigkeit Angolas (UNITA) ein und Angola verbot weitere Aktivitäten der Shaba-Separatisten."
roncw_warnews.181.a:1 "Beunruhigend ..."

roncw_warnews.182.t:0 "Konflikt um die Shebaa-Farmen"
roncw_warnews.182.d:0 "Der Streit um die Besitzverhältnisse der Schebaa-Farmen resultierte teilweise aus dem Versäumnis der französischen Mandatsverwaltungen und später der libanesischen und syrischen Regierung, die Grenze zwischen dem Libanon und Syrien zu ziehen. Dokumente aus den 1920er und 1930er Jahren belegen, dass die Einwohner Steuern an die libanesische Regierung zahlten. Von den frühen 1950er Jahren bis zur Besetzung der Golanhöhen durch Israel im Sechstagekrieg war Syrien jedoch de facto die herrschende Macht. 1978 marschierte Israel in den Südlibanon ein und besetzte ihn. 1981 annektierte Israel die Golanhöhen, einschließlich der Schebaa-Farmen, – ein Schritt, den nur die USA anerkannten."
roncw_warnews.182.a:1 "Beunruhigend ..."

roncw_warnews.183.t:0 "Shifta-Krieg"
roncw_warnews.183.d:0 "Der Northern Frontier District (NFD) entstand 1925, als er aus der Region Jubaland im heutigen Südsomalia herausgelöst wurde. Während seiner Zeit unter britischer Kolonialverwaltung wurde die nördliche Hälfte Jubalands als Belohnung für die italienische Unterstützung der Alliierten im Ersten Weltkrieg an Italien abgetreten. Großbritannien behielt die Kontrolle über die südliche Hälfte des Gebiets, die später Northern Frontier District genannt wurde. Von 1926 bis 1934 war der NFD, der die heutige Nordostprovinz und die Distrikte Marsabit, Moyale und Isiolo umfasst, von den britischen Kolonialbehörden gesperrt. Die Ein- und Ausreise in den Distrikt war nur mit Pässen möglich. Trotz dieser Einschränkungen war die Viehzucht gut an die trockenen Bedingungen angepasst, und die nicht-somalischen Bewohner – die nur einen winzigen Bruchteil der Bevölkerung der Region ausmachten – waren relativ wohlhabend, während die somalischen Landbesitzer als unterbewertet galten."
roncw_warnews.183.a:1 "Beunruhigend ..."

roncw_warnews.184.t:0 "Konflikt in Siachen"
roncw_warnews.184.d:0 "Der Siachen-Konflikt, auch Siachen-Krieg genannt, war ein militärischer Konflikt zwischen Indien und Pakistan um die umstrittene Region des Siachen-Gletschers in Kaschmir. 2003 trat ein Waffenstillstand in Kraft. Das umstrittene Gebiet umfasst fast 2.600 km². Der Konflikt begann 1984 mit der erfolgreichen Eroberung des Siachen-Gletschers durch Indien im Rahmen der Operation Meghdoot und wurde anschließend mit der Operation Rajiv fortgesetzt. Indien übernahm die Kontrolle über den 70 Kilometer langen Siachen-Gletscher und seine Nebengletscher sowie alle Hauptpässe und Höhen des Saltoro-Rückens unmittelbar westlich des Gletschers, darunter Sia La, Bilafond La und Gyong La. Pakistan kontrolliert die Gletschertäler unmittelbar westlich des Saltoro-Rückens. Laut dem TIME Magazine erlangte Indien aufgrund seiner Militäroperationen in Siachen die Kontrolle über mehr als 2.500 km² Territorium."
roncw_warnews.184.a:1 "Beunruhigend ..."

roncw_warnews.185.t:0 "Bürgerkrieg in Sierra Leone"
roncw_warnews.185.d:0 "Der Bürgerkrieg in Sierra Leone begann am 23. März 1991, als die Revolutionary United Front (RUF) mit Unterstützung der Spezialeinheiten von Charles Taylors National Patriotic Front of Liberia (NPFL) in Sierra Leone intervenierte, um die Regierung von Joseph Momoh zu stürzen. Der daraus resultierende Bürgerkrieg dauerte elf Jahre, erfasste das ganze Land und forderte über 50.000 Todesopfer. Im ersten Kriegsjahr übernahm die RUF die Kontrolle über weite Gebiete im Osten und Süden Sierra Leones, die reich an alluvialen Diamanten waren. Die ineffektive Reaktion der Regierung auf die RUF und die Unterbrechung der staatlichen Diamantenproduktion führten im April 1992 zu einem Militärputsch des National Provisional Ruling Council (NPRC). Bis Ende 1993 war es der Sierra Leone Army (SLA) gelungen, die RUF-Rebellen an die liberianische Grenze zurückzudrängen, doch die RUF erholte sich und die Kämpfe gingen weiter."
roncw_warnews.185.a:1 "Beunruhigend ..."

roncw_warnews.186.t:0 "Die singende Revolution"
roncw_warnews.186.d:0 "Nach dem Zweiten Weltkrieg wurden die baltischen Staaten nach militärischer Besetzung und Annexion zunächst 1940 und dann erneut 1944 vollständig in die UdSSR eingegliedert. Michail Gorbatschow führte 1985 „Glasnost“ (Offenheit) und „Perestroika“ (Umstrukturierung) ein, in der Hoffnung, die schwächelnde sowjetische Wirtschaft anzukurbeln und die Produktivität zu steigern, insbesondere in den Bereichen Konsumgüter, Liberalisierung genossenschaftlicher Unternehmen und Wachstum des Dienstleistungssektors. Glasnost hob Einschränkungen der politischen Freiheiten in der Sowjetunion auf, die in den 1940er Jahren im Vorfeld des Krieges zu Problemen in den nichtrussischen besetzten Ländern geführt hatten. Bis dahin unerkannte Probleme, die zuvor von der Moskauer Regierung geheim gehalten wurden, wurden öffentlich eingestanden und lösten in den baltischen Staaten Unzufriedenheit aus. In Verbindung mit dem Krieg in Afghanistan und dem radioaktiven Niederschlag in Tschernobyl wurden die Missstände auf öffentlich brisante und politisch entscheidende Weise öffentlich zur Sprache gebracht. Die Esten waren besorgt über die demografische Bedrohung ihrer nationalen Identität durch den Zustrom von Angehörigen ausländischer ethnischer Gruppen, die an so großen sowjetischen Entwicklungsprojekten wie dem Phosphatabbau arbeiten wollten."
roncw_warnews.186.a:1 "Beunruhigend ..."

roncw_warnews.187.t:0 "Chinesisch-Indischer Krieg"
roncw_warnews.187.d:0 "Der Indisch-Chinesische Krieg, auch bekannt als Indochinesischer Krieg oder Chinesisch-Indischer Grenzkonflikt, war ein Krieg zwischen China und Indien, der 1962 ausbrach. Hauptursache des Krieges war die von China umstrittene Grenze im Himalaya. Nach dem Tibetaufstand von 1959, als Indien dem Dalai Lama Asyl gewährte, kam es zu einer Reihe gewaltsamer Grenzscharmützel zwischen den beiden Ländern. Indien verfolgte ab 1960 eine defensive Vorwärtspolitik, um chinesische Militärpatrouillen und Logistik zu behindern. Im Rahmen dieser Politik errichtete es Außenposten entlang der Grenze, darunter mehrere nördlich der McMahon-Linie, dem östlichen Teil der Line of Actual Control, die der chinesische Premier Zhou Enlai 1959 proklamierte."
roncw_warnews.187.a:1 "Beunruhigend ..."

roncw_warnews.188.t:0 "Chinesisch-sowjetischer Grenzkonflikt"
roncw_warnews.188.d:0 "Der sowjetisch-chinesische Grenzkonflikt war ein siebenmonatiger, nicht erklärter militärischer Konflikt zwischen der Sowjetunion und China auf dem Höhepunkt der chinesisch-sowjetischen Spaltung im Jahr 1969. Der schwerste dieser Grenzkonflikte, der die beiden größten kommunistischen Staaten der Welt an den Rand eines Krieges brachte, ereignete sich im März 1969 in der Nähe der Insel Zhenbao (Damansky) im Fluss Ussuri (Wusuli) nahe der Mandschurei. Der Konflikt endete mit einem Waffenstillstand und der Rückkehr zum Status quo."
roncw_warnews.188.a:1 "Beunruhigend ..."

roncw_warnews.189.t:0 "Chinesisch-Vietnamesischer Krieg"
roncw_warnews.189.d:0 "Chinesische Truppen drangen in Nordvietnam ein und eroberten mehrere Städte nahe der Grenze. Am 6. März 1979 erklärte China, das Tor nach Hanoi sei geöffnet und ihr Strafauftrag erfüllt. Daraufhin zogen sich die chinesischen Truppen aus Vietnam zurück. Sowohl China als auch Vietnam erklärten den letzten Indochinakrieg für siegreich. Da vietnamesische Truppen bis 1989 in Kambodscha blieben, konnte China sein Ziel, Vietnam von einem Engagement in Kambodscha abzubringen, nicht erreichen. Nach dem Zerfall der Sowjetunion 1991 wurde die chinesisch-vietnamesische Grenze endgültig festgelegt."
roncw_warnews.189.a:1 "Beunruhigend ..."

roncw_warnews.190.t:0 "Der Sechstagekrieg"
roncw_warnews.190.d:0 "Die Beziehungen zwischen Israel und seinen Nachbarn normalisierten sich nach dem Palästinakrieg von 1948 nicht. 1956 marschierte Israel in die ägyptische Sinai-Halbinsel ein, eines seiner Ziele war die Wiedereröffnung der Straße von Tiran, die Ägypten seit 1950 für die israelische Schifffahrt gesperrt hatte. Israel wurde schließlich zum Rückzug gezwungen, erhielt aber die Garantie, dass die Straße von Tiran offen bleiben würde. Eine Notfalltruppe der Vereinten Nationen (UNEF) wurde entlang der Grenze stationiert, es gab jedoch kein Entmilitarisierungsabkommen. In den Monaten vor Juni 1967 spitzten sich die Spannungen gefährlich zu. Israel bekräftigte seine Position von 1956, dass die Sperrung der Straße von Tiran für die israelische Schifffahrt einen Kriegsgrund (einen Casus Belli) darstellen würde. Der ägyptische Präsident Gamal Abdel Nasser verkündete im Mai die Sperrung der Straße für israelische Schiffe und mobilisierte daraufhin ägyptische Streitkräfte entlang der Grenze zu Israel, um die UNEF zu vertreiben. Am 5. Juni startete Israel eine Reihe präventiver Luftangriffe auf ägyptische Flugplätze und versicherte damit einen unmittelbar bevorstehenden Angriff der Ägypter. Die Frage, welche Seite den Krieg verursacht hat, ist eine von mehreren Kontroversen im Zusammenhang mit dem Konflikt."
roncw_warnews.190.a:1 "Beunruhigend ..."

roncw_warnews.191.t:0 "Südafrikanischer Grenzkrieg"
roncw_warnews.191.d:0 "Nach mehreren Jahren erfolgloser Petitionen für die Unabhängigkeit Namibias bei den Vereinten Nationen und dem Internationalen Gerichtshof gründete die SWAPO 1962 mit materieller Unterstützung der Sowjetunion, Chinas und sympathisierender afrikanischer Staaten wie Tansania, Ghana und Algerien die PLAN. Im August 1966 brachen Kämpfe zwischen der PLAN und den südafrikanischen Behörden aus. Zwischen 1975 und 1988 führten die SADF massive konventionelle Angriffe in Angola und Sambia durch, um die vorgeschobenen Operationsbasen der PLAN zu zerstören. Sie entsandten auch spezialisierte Aufstandsbekämpfungseinheiten wie Koevoet und das 32. Bataillon, die darauf trainiert waren, externe Aufklärung durchzuführen und Guerillabewegungen aufzuspüren."
roncw_warnews.191.a:1 "Beunruhigend ..."

roncw_warnews.192.t:0 "Weitere Konflikte im Südlibanon"
roncw_warnews.192.d:0 "Da es im Südlibanon kein klares Endspiel gab, war die israelische Armee mit der Art der Kriegsführung der Hisbollah nicht vertraut. Sie konnte der Hisbollah zwar Verluste zufügen, verfügte aber über keine langfristige Strategie. Da die Hisbollah Galiläa mit Raketen beschoss, erschien der offizielle Zweck der Sicherheitszone – der Schutz der nördlichen Gemeinden Israels – widersprüchlich. Die Hisbollah war zudem Meisterin der psychologischen Kriegsführung und dokumentierte ihre Angriffe auf israelische Soldaten häufig. Nach der Hubschrauberkatastrophe von 1997 begannen sich in der israelischen Öffentlichkeit ernsthafte Fragen zu stellen, ob die Besetzung des Südlibanons aufrechterhalten werden sollte. Die Bewegung der „Vier Mütter“ rückte in den Vordergrund der öffentlichen Debatte und spielte eine führende Rolle dabei, die Öffentlichkeit für einen Rückzug zu gewinnen."
roncw_warnews.192.a:1 "Beunruhigend ..."

roncw_warnews.193.t:0 "Krieg in Südossetien"
roncw_warnews.193.d:0 "Nach dem Zusammenbruch des zaristischen Regimes in Russland verbündeten sich die Südosseten mit den russischen Bolschewiki und führten Krieg gegen das gerade unabhängig gewordene menschewistische Georgien. Georgien war zunächst erfolgreich, doch 1921 eroberte die Rote Armee das Land. Südossetien wurde eine autonome Oblast in der Georgischen Sozialistischen Sowjetrepublik. Während der Sowjetzeit waren die Beziehungen zwischen ethnischen Osseten und Georgiern friedlich, mit einer hohen Interaktionsrate und zahlreichen Mischehen. 1989 lebten rund 98.000 Menschen in Südossetien. Davon waren 66,61 % Osseten und 29,44 % Georgier. Weitere 99.000 Osseten lebten im übrigen Georgien."
roncw_warnews.193.a:1 "Beunruhigend ..."

roncw_warnews.194.t:0 "Aufstand in Südthailand"
roncw_warnews.194.d:0 "Der Aufstand in Südthailand ist ein andauernder Konflikt mit Schwerpunkt im Süden Thailands. Er begann 1948 als ethnischer und religiöser separatistischer Aufstand in der historischen malaiischen Region Patani, die aus den drei südlichsten Provinzen Thailands und Teilen einer vierten besteht. Seit Anfang der 2000er Jahre ist er jedoch aufgrund von Drogenkartellen, Ölschmuggelnetzwerken und gelegentlich Piratenüberfällen komplexer und gewalttätiger geworden. Das ehemalige Sultanat Pattani, zu dem die südthailändischen Provinzen Pattani (Patani), Yala (Jala), Narathiwat (Menara) – auch bekannt als die drei südlichen Grenzprovinzen (SBP) – sowie angrenzende Teile der Provinz Songkhla (Singgora) und der nordöstliche Teil Malaysias (Kelantan) gehörten, wurde 1785 vom Königreich Siam erobert und wird seitdem, mit Ausnahme von Kelantan, von Thailand regiert."
roncw_warnews.194.a:1 "Beunruhigend ..."

roncw_warnews.195.t:0 "Sowjetisch-Afghanischer Krieg"
roncw_warnews.195.d:0 "Der Sowjetisch-Afghanische Krieg war ein Konflikt, in dem aufständische Gruppen (zusammenfassend als Mudschaheddin bekannt) sowie kleinere maoistische Gruppen in den 1980er Jahren einen neunjährigen Guerillakrieg gegen die Sowjetarmee und die Regierung der Demokratischen Republik Afghanistan führten, hauptsächlich auf dem Land. Die Mudschaheddin wurden vor allem von den USA, Pakistan, dem Iran, Saudi-Arabien, China und Großbritannien unterstützt; der Konflikt war ein Stellvertreterkrieg aus der Zeit des Kalten Krieges. Zwischen 562.000 und 2.000.000 Zivilisten wurden getötet, und Millionen Afghanen flohen aus dem Land, hauptsächlich nach Pakistan und in den Iran."
roncw_warnews.195.a:1 "Beunruhigend ..."

roncw_warnews.196.t:0 "Zweiter sudanesischer Bürgerkrieg"
roncw_warnews.196.d:0 "Der Zweite Sudanesische Bürgerkrieg war ein Konflikt zwischen der sudanesischen Zentralregierung und der Sudanesischen Volksbefreiungsarmee, der von 1983 bis 2005 andauerte. Er war weitgehend eine Fortsetzung des Ersten Sudanesischen Bürgerkriegs von 1955 bis 1972. Obwohl er im Südsudan seinen Ursprung hatte, dehnte sich der Bürgerkrieg auf die Nuba-Berge und den Blauen Nil aus. Er dauerte 22 Jahre und ist einer der längsten Bürgerkriege aller Zeiten. Sechs Jahre nach Kriegsende führte er zur Unabhängigkeit des Südsudan. Ungefähr zwei Millionen Menschen starben infolge von Krieg, Hunger und Krankheiten, die der Konflikt verursachte. Vier Millionen Menschen im Südsudan wurden während des Krieges mindestens einmal (und normalerweise mehrmals) vertrieben. Die Zahl der zivilen Todesopfer ist eine der höchsten aller Kriege seit dem Zweiten Weltkrieg und war von zahlreichen Menschenrechtsverletzungen geprägt. Dazu gehören Sklaverei und Massenmorde."
roncw_warnews.196.a:1 "Beunruhigend ..."

roncw_warnews.197.t:0 "Suezkrise"
roncw_warnews.197.d:0 "Am 29. Oktober marschierte Israel in den ägyptischen Sinai ein. Großbritannien und Frankreich stellten ein gemeinsames Ultimatum zur Waffenruhe, das ignoriert wurde. Am 5. November landeten Großbritannien und Frankreich Fallschirmjäger am Suezkanal. Die ägyptischen Streitkräfte wurden zwar besiegt, blockierten aber den Kanal für die gesamte Schifffahrt. Später stellte sich heraus, dass Israel, Frankreich und Großbritannien die Invasion geplant hatten. Die drei Alliierten hatten zwar einige ihrer militärischen Ziele erreicht, aber der Kanal war nutzlos. Starker politischer Druck der USA und der UdSSR führte zum Rückzug. US-Präsident [USA.GetLeader] hatte Großbritannien eindringlich vor einer Invasion gewarnt und drohte mit schwerem Schaden für das britische Finanzsystem durch den Verkauf von Pfund-Sterling-Anleihen der US-Regierung."
roncw_warnews.197.a:1 "Beunruhigend ..."

roncw_warnews.198.t:0 "Syrischer Staatsstreich"
roncw_warnews.198.d:0 "Der Putsch wurde vom Militärkomitee und nicht von der zivilen Führung der Baath-Partei geplant. Parteichef Michel Aflaq stimmte der Verschwörung jedoch zu. Die führenden Mitglieder des Militärkomitees während des gesamten Planungsprozesses und unmittelbar nach der Machtübernahme waren Muhammad Umran, Salah Jadid und Hafez al-Assad. Das Komitee konnte sich die Unterstützung zweier Nasseristen, Rashid al-Qutayni und Muhammad al-Sufi, sowie des unabhängigen Ziad al-Hariri sichern. Der Putsch war ursprünglich für den 7. März geplant, wurde aber einen Tag verschoben, nachdem die Regierung herausgefunden hatte, wo sich die Verschwörer versammeln wollten."
roncw_warnews.198.a:1 "Beunruhigend ..."

roncw_warnews.199.t:0 "Bürgerkrieg in Tadschikistan"
roncw_warnews.199.d:0 "Der Tadschikische Bürgerkrieg begann im Mai 1992, als sich regionale Gruppen aus den Regionen Garm und Berg-Badachschan gegen die neu gebildete Regierung von Präsident Rahmon Nabijew erhoben, die von Menschen aus den Regionen Chudschand und Kulob dominiert wurde. Angeführt wurden die Rebellengruppen von liberaldemokratischen Reformern und Islamisten, die sich später unter dem Banner der Vereinigten Tadschikischen Opposition organisierten. Die Regierung wurde von russischen Grenzsoldaten unterstützt."
roncw_warnews.199.a:1 "Beunruhigend ..."

roncw_warnews.200.t:0 "Taliban-Aufstand in Afghanistan"
roncw_warnews.200.d:0 "Der Aufstand der Taliban begann nach dem Sturz der Gruppe im Afghanistankrieg 2001. Die Taliban-Truppen kämpfen gegen die afghanische Regierung, die früher von Präsident Hamid Karzai und heute von Präsident Ashraf Ghani geführt wurde, sowie gegen die von den USA geführte Internationale Sicherheitsunterstützungstruppe (ISAF). Der Aufstand hat sich teilweise über die Grenze der Durand-Linie hinaus auf das benachbarte Pakistan ausgeweitet, insbesondere auf die Regionen Waziristan und Khyber Pakhtunkhwa. Die Taliban führen einen Krieg niedriger Intensität gegen die afghanischen nationalen Sicherheitskräfte und ihre NATO-Verbündeten sowie gegen zivile Ziele. Länder der Region, insbesondere Pakistan, Iran, China und Russland, werden oft beschuldigt, die aufständischen Gruppen zu finanzieren und zu unterstützen. Anführer der Taliban ist Hibatullah Akhundzada, der auch die Quetta Shura leitet. Das verbündete Haqqani-Netzwerk, Hezb-e Islami Gulbuddin und kleinere Al-Qaida-Gruppen waren ebenfalls an dem Aufstand beteiligt."
roncw_warnews.200.a:1 "Beunruhigend ..."

roncw_warnews.201.t:0 "Slowenischer Unabhängigkeitskrieg"
roncw_warnews.201.d:0 "Der Slowenische Unabhängigkeitskrieg war ein kurzer Konflikt, der auf die Unabhängigkeitserklärung Sloweniens von Jugoslawien am 25. Juni 1991 folgte. Er wurde zwischen der Slowenischen Territorialverteidigung und der Jugoslawischen Volksarmee (JNA) ausgetragen. Er dauerte vom 27. Juni 1991 bis zur Unterzeichnung des Brioni-Abkommens am 7. Juli 1991. Er markierte den Beginn der Jugoslawienkriege."
roncw_warnews.201.a:1 "Beunruhigend ..."

roncw_warnews.202.t:0 "Republik Kongo im Bürgerkrieg"
roncw_warnews.202.d:0 "Die Ursachen des Bürgerkriegs lagen in den umstrittenen Parlamentswahlen von 1993. Die Ninja-Milizen von Bernard Kolelas und die Cobra-Miliz von Sassou Nguesso kämpften gegen die Cocoye-Miliz von Präsident Pascal Lissouba. Der Konflikt forderte 2.000 Tote und Zehntausende Vertriebene. Im Dezember 1994 wurde ein Friedensabkommen unterzeichnet, um die Feindseligkeiten zu beenden."
roncw_warnews.202.a:1 "Beunruhigend ..."

roncw_warnews.203.t:0 "Tibetischer Aufstand"
roncw_warnews.203.d:0 "Der tibetische Aufstand von 1959 begann am 10. März 1959 mit einem Aufstand in Lhasa, der Hauptstadt Tibets, die seit dem 17-Punkte-Abkommen von 1951 de facto von der Volksrepublik China kontrolliert wurde. Der bewaffnete Konflikt zwischen tibetischen Guerillas und der Volksbefreiungsarmee (VBA) hatte 1956 in den sozialistischen Reformen unterworfenen Regionen Kham und Amdo begonnen. Der Guerillakrieg griff später auf andere Gebiete Tibets über und dauerte bis 1962. Manche betrachten den Xunhua-Vorfall von 1958 als Vorläufer des tibetischen Aufstands. Der Jahrestag des Aufstands wird von den Exiltibetern als „Tag des tibetischen Aufstands“ und „Tag des Frauenaufstands“ begangen. Der Jahrestag seines Endes wird in der Autonomen Region Tibet offiziell als „Tag der Befreiung der Leibeigenen“ gefeiert."
roncw_warnews.203.a:1 "Beunruhigend ..."

roncw_warnews.204.t:0 "Krieg in Transnistrien"
roncw_warnews.204.d:0 "Der Transnistrienkrieg war ein bewaffneter Konflikt, der im November 1990 in Dubăsari zwischen pro-transnistrischen Kräften, darunter der Transnistrischen Republikanischen Garde, Milizen und Kosakeneinheiten (die von Teilen der russischen 14. Armee unterstützt wurden), und pro-moldauischen Kräften, darunter moldauischen Truppen und Polizei, ausbrach. Die Kämpfe verschärften sich am 1. März 1992 und dauerten, abwechselnd mit Ad-hoc-Waffenstillständen, das ganze Frühjahr und den Frühsommer 1992 an, bis am 21. Juli 1992 ein Waffenstillstand erklärt wurde, der bis heute gehalten hat. Der Konflikt blieb ungelöst, doch 2011 fanden unter der Schirmherrschaft der Organisation für Sicherheit und Zusammenarbeit in Europa (OSZE) Gespräche statt, bei denen Litauen den rotierenden Vorsitz innehatte."
roncw_warnews.204.a:1 "Beunruhigend ..."

roncw_warnews.205.t:0 "Die Türkei marschiert in Zypern ein"
roncw_warnews.205.d:0 "Die türkische Invasion Zyperns, von der Türkei als Operation Atilla bezeichnet, war eine türkische Militärinvasion des Inselstaates Zypern. Sie begann am 20. Juli 1974 nach dem zypriotischen Staatsstreich vom 15. Juli 1974. Der Putsch war von der Militärjunta in Griechenland angeordnet und von der zypriotischen Nationalgarde in Zusammenarbeit mit der EOKA-B durchgeführt worden. Er stürzte den zypriotischen Präsidenten Erzbischof Makarios III. und setzte Nikos Sampson ein. Ziel des Putsches war die Vereinigung (Enosis) Zyperns mit Griechenland und die Ausrufung der Hellenischen Republik Zypern."
roncw_warnews.205.a:1 "Beunruhigend ..."

roncw_warnews.206.t:0 "Ugandischer Buschkrieg"
roncw_warnews.206.d:0 "Der ugandische Buschkrieg, auch bekannt als Luwero-Krieg, ugandischer Bürgerkrieg oder Widerstandskrieg, war ein Bürgerkrieg, den die offizielle ugandische Regierung und ihr bewaffneter Flügel, die Uganda National Liberation Army (UNLA), von 1980 bis 1986 gegen eine Reihe von Rebellengruppen, vor allem die National Resistance Army (NRA), führten. Der unpopuläre Präsident Milton Obote wurde 1971 durch einen Staatsstreich von General Idi Amin gestürzt, der eine Militärdiktatur errichtete. Amin wurde 1979 nach dem Uganda-Tansania-Krieg gestürzt, aber seine Anhänger begannen den Buschkrieg, indem sie 1980 einen Aufstand in der West-Nil-Region starteten. Bei den darauffolgenden Wahlen kehrte Obote in einer von der UNLA regierten Regierung an die Macht zurück. Mehrere Oppositionsgruppen behaupteten, die Wahlen seien manipuliert worden, und schlossen sich unter der Führung von Yoweri Museveni zur NRA zusammen, um am 6. Februar 1981 einen bewaffneten Aufstand gegen Obotes Regierung zu beginnen. In den letzten Monaten des Konflikts wurde Obote 1985 gestürzt und durch seinen General Tito Okello als Präsident ersetzt. Okello bildete eine Koalitionsregierung aus seinen Anhängern und mehreren bewaffneten Oppositionsgruppen, die einem Friedensabkommen zustimmten. Die NRA hingegen weigerte sich, Kompromisse mit der Regierung einzugehen und eroberte von August bis Dezember 1985 in mehreren Offensiven weite Teile West- und Südugandas."
roncw_warnews.206.a:1 "Beunruhigend ..."

roncw_warnews.207.t:0 "Uganda-Tansania-Krieg"
roncw_warnews.207.d:0 "Die Umstände des Kriegsausbruchs sind unklar, und es gibt zahlreiche unterschiedliche Darstellungen der Ereignisse. Im Oktober 1978 begannen ugandische Streitkräfte in Tansania einzufallen. Später im selben Monat startete die ugandische Armee eine Invasion, plünderte Eigentum und tötete Zivilisten. Die offiziellen ugandischen Medien verkündeten die Annexion des Kagera-Bogens. Am 2. November erklärte Nyerere Uganda den Krieg und mobilisierte die Tanzania People&#39;s Defence Force (TPDF), um den Bogen zurückzuerobern. Der Organisation für Afrikanische Einheit (OAU) gelang es nicht, eine diplomatische Lösung zu vermitteln, und die TPDF startete eine Gegenoffensive, eroberte Kagera bis Januar 1979 zurück und besetzte die ugandische Grenzstadt Mutukula. Nyerere mobilisierte zudem ugandische Rebellen, die Obote und Yoweri Museveni treu ergeben waren, um Amins Regime zu schwächen. Nyerere hatte zunächst nicht die Absicht, den Krieg über die Verteidigung tansanischen Territoriums hinaus auszuweiten. Nachdem Amin seine Ansprüche auf Kagera nicht aufgab und die OAU die ugandische Invasion nicht verurteilte, beschloss er, dass tansanische Truppen die Städte Masaka und Mbarara in Süduganda besetzen sollten, in der Hoffnung, dies würde einen Volksaufstand gegen Amin auslösen und zu seinem Sturz führen. Die 20. Division der TPDF startete im Februar ihre Offensive und besetzte die Städte, doch es kam zu keinem Aufstand."
roncw_warnews.207.a:1 "Beunruhigend ..."

roncw_warnews.208.t:0 "Die USA bombardieren Libyen"
roncw_warnews.208.d:0 "Der US-Bombenangriff auf Libyen im Jahr 1986, Codename Operation El Dorado Canyon, umfasste Luftangriffe der USA auf Libyen am Dienstag, dem 15. April 1986. Der Angriff wurde von der US Air Force, der US Navy und dem US Marine Corps als Vergeltung für den Bombenanschlag auf die Westberliner Diskothek zehn Tage zuvor durchgeführt. Es gab 40 libysche Opfer, und ein US-Flugzeug wurde abgeschossen. Eines der angeblichen libyschen Todesopfer war ein kleines Mädchen, angeblich Muammar Gaddafis Tochter Hana Gaddafi. Es gab jedoch Zweifel, ob sie tatsächlich getötet wurde oder ob sie überhaupt existierte."
roncw_warnews.208.a:1 "Beunruhigend ..."

roncw_warnews.209.t:0 "Bürgerkrieg in der Dominikanischen Republik"
roncw_warnews.209.d:0 "Der Dominikanische Bürgerkrieg fand vom 24. April 1965 bis zum 3. September 1965 in Santo Domingo, Dominikanische Republik, statt. Er begann mit dem Sturz des amtierenden Präsidenten Donald Reid Cabral durch zivile und militärische Unterstützer des ehemaligen Präsidenten Juan Bosch. Der Putsch veranlasste General Elías Wessin y Wessin, loyale Elemente des Militärs zu Präsident Reid („Loyalisten“) zu organisieren und einen bewaffneten Feldzug gegen die sogenannten konstitutionalistischen Rebellen zu starten."
roncw_warnews.209.a:1 "Beunruhigend ..."

roncw_warnews.210.t:0 "Die USA besetzen die Dominikanische Republik"
roncw_warnews.210.d:0 "Vorwürfe ausländischer Unterstützung für die Rebellen im dominikanischen Bürgerkrieg führten zu einer Intervention der USA in den Konflikt, die später zu einer Besetzung des Landes durch die Organisation Amerikanischer Staaten (OAS) führte. 1966 fanden Wahlen statt, in deren Folge Joaquín Balaguer zum Präsidenten gewählt wurde. Später im selben Jahr zogen internationale Truppen aus dem Land ab."
roncw_warnews.210.a:1 "Beunruhigend ..."

roncw_warnews.211.t:0 "Nordvietnamesische Invasion in Laos"
roncw_warnews.211.d:0 "Nordvietnam unterstützte die Pathet Lao zwischen 1958 und 1959 im Kampf gegen das Königreich Laos. Die Kontrolle über Laos ermöglichte den Bau des Ho-Chi-Minh-Pfades, der als Hauptversorgungsroute (MSR) für verstärkte Aktivitäten der NLF (Nationale Befreiungsfront, Vietcong) und NVA (Nordvietnamesische Armee) in der Republik Vietnam dienen sollte. Die Unterstützung der Pathet Lao im Kampf gegen das Königreich Laos durch Nordvietnam erwies sich als entscheidend für den letztendlichen Sieg der Kommunisten über Südvietnam im Jahr 1975, da die südvietnamesischen und amerikanischen Streitkräfte jede Stationierung und Nachschublieferung der NVA und NLF hätten verhindern können, wenn diese nur über den 17. Breitengrad, auch bekannt als die entmilitarisierte Zone (DMZ), erfolgt wäre, einem schmalen Landstreifen zwischen Nord- und Südvietnam, der von beiden Seiten streng bewacht wurde. Sie verhalf den Pathet Lao auch zum Sieg über das Königreich Laos, obwohl dieses von den USA unterstützt wurde."
roncw_warnews.211.a:1 "Beunruhigend ..."

roncw_warnews.212.t:0 "Krieg in Vietnam"
roncw_warnews.212.d:0 "Der Konflikt entstand aus dem Ersten Indochinakrieg gegen die kommunistisch geführte Vietminh. Die französische Kriegsführung wurde größtenteils von den USA finanziert. Nachdem die Franzosen 1954 Indochina verließen, übernahmen die USA die finanzielle und militärische Unterstützung des südvietnamesischen Staates. Die Việt Cộng, auch bekannt als Front national de libération du Sud-Viêt Nam oder NLF (Nationale Befreiungsfront), eine südvietnamesische gemeinsame Front unter Führung Nordvietnams, begann einen Guerillakrieg im Süden. Nordvietnam war Mitte der 1950er Jahre auch in Laos einmarschiert, um Aufständische zu unterstützen, und hatte den Ho-Chi-Minh-Pfad angelegt, um die Vietcong zu versorgen und zu verstärken. Das US-Engagement steigerte sich unter Präsident John F. Kennedy im Rahmen des MAAG-Programms von knapp tausend Militärberatern im Jahr 1959 auf 16.000 im Jahr 1963. Bis 1963 hatten die Nordvietnamesen 40.000 Soldaten zum Kampf nach Südvietnam geschickt. Nordvietnam wurde stark von der UdSSR und der Volksrepublik China unterstützt. China schickte außerdem Hunderte von PLA-Soldaten nach Nordvietnam, um in der Luftverteidigung und in unterstützenden Funktionen zu dienen."
roncw_warnews.212.a:1 "Beunruhigend ..."

roncw_warnews.213.t:0 "Zermürbungskrieg"
roncw_warnews.213.d:0 "Nach dem Sechstagekrieg von 1967 unternahmen die arabischen Staaten keine ernsthaften diplomatischen Anstrengungen, die Kernfragen des arabisch-israelischen Konflikts zu lösen. Im September 1967 formulierten die arabischen Staaten die „Drei Nein“-Politik, die Frieden, Anerkennung oder Verhandlungen mit Israel ausschloss. Der ägyptische Präsident Gamal Abdel Nasser glaubte, dass nur militärische Initiative Israel oder die internationale Gemeinschaft zu einem vollständigen israelischen Rückzug aus dem Sinai zwingen könne. Bald darauf flammten die Feindseligkeiten entlang des Suezkanals wieder auf."
roncw_warnews.213.a:1 "Beunruhigend ..."

roncw_warnews.214.t:0 "Krieg gegen den Terror"
roncw_warnews.214.d:0 "Der Krieg gegen den Terror, auch bekannt als Globaler Krieg gegen den Terrorismus oder US-Krieg gegen den Terror, ist eine internationale Militärkampagne der US-Regierung nach den Anschlägen vom 11. September. Die Ziele der Kampagne sind in erster Linie bewaffnete sunnitisch-islamische fundamentalistische Gruppen in der gesamten muslimischen Welt. Die bekanntesten Gruppen sind Al-Qaida, der Islamische Staat, die Taliban, Tehrik-i-Taliban Pakistan und die verschiedenen Franchise-Gruppen der beiden erstgenannten Organisationen. Die Benennung der Kampagne verwendet eine Kriegsmetapher, um eine Vielzahl von Aktionen zu bezeichnen, die keinen spezifischen Krieg im traditionellen Sinne darstellen. US-Präsident George W. Bush verwendete den Begriff „Krieg gegen den Terrorismus“ erstmals am 16. September 2001 und einige Tage später in einer offiziellen Rede vor dem Kongress „Krieg gegen den Terror“. In letzterer Rede erklärte George Bush: „Unser Feind ist ein radikales Netzwerk von Terroristen und jede Regierung, die sie unterstützt.“ Der Begriff wurde ursprünglich mit besonderem Fokus auf mit Al-Qaida verbundene Länder verwendet. Der Begriff wurde umgehend von Leuten wie Richard B. Myers, dem Vorsitzenden der Vereinigten Stabschefs, kritisiert. Später verwendete die Bush-Regierung differenziertere Begriffe, um die von den USA geführte internationale Kampagne öffentlich zu definieren. Obwohl er in internen Regierungsdokumenten nie als formelle Bezeichnung für US-Operationen verwendet wurde, wurde eine Medaille des Global War on Terrorism Service verliehen."
roncw_warnews.214.a:1 "Beunruhigend ..."

roncw_warnews.215.t:0 "Der Warschauer Pakt marschiert in die Tschechoslowakei ein"
roncw_warnews.215.d:0 "Die Invasion des Warschauer Pakts in der Tschechoslowakei, offiziell bekannt als Operation Donau, war eine gemeinsame Invasion der fünf Warschauer-Pakt-Staaten – der Sowjetunion, Polen, Bulgarien, Ostdeutschland und Ungarn – in der Nacht vom 20. auf den 21. August 1968. Etwa 250.000 Soldaten des Warschauer Pakts griffen in dieser Nacht die Tschechoslowakei an, wobei Rumänien und Albanien sich weigerten, sich zu beteiligen. Bis auf eine kleine Anzahl von Spezialisten nahmen die ostdeutschen Streitkräfte nicht an der Invasion teil, da ihnen wenige Stunden vor der Invasion aus Moskau befohlen wurde, die tschechoslowakische Grenze nicht zu überschreiten. Während der Besatzung wurden 137 tschechoslowakische Zivilisten getötet und 500 schwer verletzt."
roncw_warnews.215.a:1 "Beunruhigend ..."

roncw_warnews.216.t:0 "Krieg in der Westsahara"
roncw_warnews.216.d:0 "Der Westsaharakrieg war ein bewaffneter Kampf zwischen der indigenen sahrauischen Polisario-Front und Marokko von 1975 bis 1991 sowie Mauretanien von 1975 bis 1979 und stellte die bedeutendste Phase des Westsaharakonflikts dar. Der Konflikt brach aus, nachdem sich Spanien gemäß den Madrider Abkommen (unterzeichnet unter dem Druck des Grünen Marsches) aus der Spanischen Sahara zurückgezogen hatte, mit denen es die administrative Kontrolle über das Gebiet an Marokko und Mauretanien übertrug, nicht jedoch die Souveränität. Ende 1975 organisierte die marokkanische Regierung den Grünen Marsch mit etwa 350.000 marokkanischen Bürgern, eskortiert von etwa 20.000 Soldaten, die in die Westsahara einmarschierten und versuchten, eine marokkanische Präsenz zu etablieren. Während Marokko zunächst auf geringen Widerstand der POLISARIO stieß, lieferte es sich später einen langen Guerillakrieg mit den sahrauischen Nationalisten. In den späten 1970er Jahren versuchte die Polisario-Front, in dem Gebiet einen unabhängigen Staat zu gründen, sowohl Mauretanien als auch Marokko zu bekämpfen. 1979 zog sich Mauretanien nach der Unterzeichnung eines Friedensvertrags mit der POLISARIO aus dem Konflikt zurück. Der Krieg dauerte in den 1980er Jahren mit geringer Intensität an, obwohl Marokko zwischen 1989 und 1991 mehrere Versuche unternahm, die Oberhand zu gewinnen. Im September 1991 wurde schließlich ein Waffenstillstandsabkommen zwischen der Polisario-Front und Marokko geschlossen. Einige Quellen beziffern die endgültige Zahl der Todesopfer auf 10.000 bis 20.000."
roncw_warnews.216.a:1 "Beunruhigend ..."

roncw_warnews.217.t:0 "Konflikt in Xinjiang"
roncw_warnews.217.d:0 "Der Xinjiang-Konflikt, auch bekannt als Uiguren-Chinesen-Konflikt, ist ein Konflikt in der nordwestlichsten autonomen Region Xinjiang in China, dessen Mittelpunkt die Uiguren sind, eine ethnische Minderheit der Turkvölker, die die größte Gruppe in der Region bilden. Obwohl der Konflikt auf das Jahr 1931 zurückgeht, haben Faktoren wie die massive staatlich geförderte Migration von Han-Chinesen in den 1950er bis 1970er Jahren, Regierungspolitiken zur Förderung der chinesischen kulturellen Einheit und zur Bestrafung bestimmter Ausdrucksformen der uigurischen Identität sowie harte Reaktionen auf Separatismus zu Spannungen zwischen Uiguren, der Staatspolizei und Han-Chinesen beigetragen. Diese äußerten sich sowohl in häufigen Terroranschlägen als auch in größeren öffentlichen Unruhen wie den Unruhen in der Gemeinde Baren."
roncw_warnews.217.a:1 "Beunruhigend ..."

roncw_warnews.218.t:0 "Bürgerkrieg im Jemen"
roncw_warnews.218.d:0 "Der jemenitische Bürgerkrieg war ein Bürgerkrieg zwischen den beiden jemenitischen Kräften des unionsfreundlichen Nordens und des sozialistischen, separatistischen Südens sowie deren Unterstützern. Der Krieg führte zur Niederlage der Streitkräfte des Südens, zur Wiedervereinigung des Jemen und zur Flucht vieler Führer der Jemenitischen Sozialistischen Partei (JSP) und anderer Separatisten ins Exil. Der Südjemen hatte in den 1980er Jahren zwei Bürgerkriege erlebt, die zu Regimewechseln führten. Daraufhin begannen ernsthafte Schritte in Richtung Versöhnung und Vereinigung. Im Dezember 1989 unterzeichneten die Präsidenten des Nord- und Südjemen einen Verfassungsentwurf und stimmten einem einjährigen Zeitplan für die Vereinigung zu."
roncw_warnews.218.a:1 "Beunruhigend ..."

roncw_warnews.219.t:0 "Jemenitischer Krieg"
roncw_warnews.219.d:0 "Der Jemenitenkrieg von 1979 war ein kurzer militärischer Konflikt zwischen der Jemenitischen Arabischen Republik (YAR; Nordjemen) und der Demokratischen Volksrepublik Jemen (PDRY; Südjemen). Der Krieg entwickelte sich aus dem Zusammenbruch der Beziehungen zwischen den beiden Ländern, nachdem der Präsident des Nordjemen, Ahmad al-Ghashmi, am 24. Juni 1978 getötet und Salim Rubai Ali, ein gemäßigter Marxist, der an einem geplanten Zusammenschluss der beiden Jemen gearbeitet hatte, zwei Tage später ermordet worden war. Die feindselige Rhetorik der neuen Führung beider Länder eskalierte und führte zu kleineren Grenzkämpfen, die dann im Februar 1979 zu einem ausgewachsenen Krieg eskalierten. Nach einer Dreifronteninvasion südjemenitischer Truppenverbände schien Nordjemen am Rande einer entscheidenden Niederlage zu stehen. Dies konnte jedoch durch eine erfolgreiche Vermittlung in Form des Kuwait-Abkommens von 1979 verhindert werden, in dessen Folge Truppen der Arabischen Liga zur Überwachung der Nord-Süd-Grenze entsandt wurden. Außerdem wurde ein Abkommen zur Vereinigung beider Länder unterzeichnet, das jedoch nicht umgesetzt wurde."
roncw_warnews.219.a:1 "Beunruhigend ..."

roncw_warnews.220.t:0 "Yeosu-Suncheon-Aufstand"
roncw_warnews.220.d:0 "Der Yeosu-Suncheon-Aufstand, auch bekannt als Yeo-Sun-Vorfall (Yeo-Sun ist eine Abkürzung der Gebietsnamen Yeosu und Suncheon), war ein Aufstand, der im Oktober 1948 begann und größtenteils im November desselben Jahres endete. Widerstandsnester hielten jedoch bis 1957, also fast 10 Jahre später, an. Er wird oft als „Aufstandsvorfall“ bezeichnet, seit 1995 wird er jedoch als „Yeosu- und Suncheon-Vorfall“ oder „Yeosu-, Suncheon-10.19-Vorfall“ verwendet, da die Bewohner der Region ihn möglicherweise fälschlicherweise für das Hauptziel des Aufstands hielten. Der Aufstand ereignete sich in Yeosu, Suncheon und verschiedenen umliegenden Städten in der südkoreanischen Provinz Süd-Jeolla. Die zunehmende regierungsfeindliche Stimmung gegenüber dem Syngman-Rhee-Regime entzündete sich in einem Aufstand, als 2.000 linksgerichtete Soldaten aus der Region Yeo-Sun ihre Waffen erhoben, um gegen den Umgang der Rhee-Regierung mit dem Aufstand auf Jeju zu protestieren, der nur wenige Monate zuvor im April stattgefunden hatte. Park Chung-hee, der spätere Präsident Südkoreas, beteiligte sich an dem Aufstand, obwohl man ihm angeblich Milderung gewährte, weil er bei der Jagd auf andere an dem Aufstand beteiligte Personen half."
roncw_warnews.220.a:1 "Beunruhigend ..."

roncw_warnews.221.t:0 "Jom-Kippur-Krieg"
roncw_warnews.221.d:0 "Der Jom-Kippur-Krieg, Ramadan-Krieg oder Oktoberkrieg, auch bekannt als der Arabisch-Israelische Krieg von 1973, wurde vom 6. bis 25. Oktober 1973 von einer Koalition arabischer Staaten unter Führung Ägyptens und Syriens gegen Israel geführt. Der Krieg fand hauptsächlich auf dem Sinai und den Golanhöhen statt, die während des Sechstagekriegs von 1967 von Israel besetzt worden waren. Einige Kämpfe fanden auch im afrikanischen Ägypten und im Norden Israels statt. Ägyptens ursprüngliches Kriegsziel bestand darin, militärisch am Ostufer des Suezkanals Fuß zu fassen und von dort aus über die Rückgabe des restlichen Sinai zu verhandeln. Der Krieg begann, als die arabische Koalition an Jom Kippur, einem im Judentum weithin begangenen Ruhe-, Fasten- und Gebetstag, der in jenem Jahr auch in den muslimischen Fastenmonat Ramadan fiel, einen gemeinsamen Überraschungsangriff auf israelische Stellungen startete. Ägyptische und syrische Streitkräfte überschritten die Waffenstillstandslinien, um auf die Sinai-Halbinsel bzw. die Golanhöhen einzudringen. Sowohl die Vereinigten Staaten als auch die Sowjetunion leiteten während des Krieges massive Nachschubbemühungen für ihre jeweiligen Verbündeten ein, und diese Bemühungen führten beinahe zu einer Konfrontation zwischen den beiden Atomsupermächten."
roncw_warnews.221.a:1 "Beunruhigend ..."

roncw_warnews.222.t:0 "Indonesien marschiert in Osttimor ein"
roncw_warnews.222.d:0 "In den ersten Monaten der Besatzung sah sich das indonesische Militär im bergigen Landesinneren der Insel mit heftigem Widerstand der Aufständischen konfrontiert. Von 1977 bis 1978 beschaffte das Militär jedoch moderne Waffen aus den USA, Israel und anderen Ländern, um die Struktur der Fretilin zu zerstören. In den letzten beiden Jahrzehnten des Jahrhunderts kam es immer wieder zu Zusammenstößen zwischen indonesischen und osttimoresischen Gruppen über den Status Osttimors, bis 1999 eine Mehrheit der Osttimoresen mit überwältigender Mehrheit für die Unabhängigkeit stimmte (die Alternative wäre eine „Sonderautonomie“ bei gleichzeitigem Verbleib bei Indonesien gewesen). Nach weiteren zweieinhalb Jahren des Übergangs unter der Schirmherrschaft dreier verschiedener UN-Missionen erlangte Osttimor am 20. Mai 2002 die Unabhängigkeit."
roncw_warnews.222.a:1 "Beunruhigend ..."

roncw_warnews.223.t:0 "Ituri-Konflikt"
roncw_warnews.223.d:0 "Auslöser des Konflikts war vor allem der Zweite Kongokrieg, der zu einem verstärkten ethnischen Bewusstsein, einem großen Vorrat an Kleinwaffen und der Bildung verschiedener bewaffneter Gruppen geführt hatte. Langfristigere Faktoren waren Landkonflikte, Rohstoffkonflikte und die bestehenden ethnischen Spannungen in der gesamten Region. Die Lendu-Ethnie wurde vor allem durch die Nationalistische und Integrationistische Front (FNI) vertreten, während die Union Kongolesischer Patrioten (UPC) behauptete, für die Hema zu kämpfen. Der Konflikt war äußerst gewalttätig. Mitglieder beider ethnischer Fraktionen verübten massive Massaker. 2006 berichtete die BBC, dass seit 1998 in Ituri bis zu 60.000 Menschen gestorben seien."
roncw_warnews.223.a:1 "Beunruhigend ..."

roncw_warnews.224.t:0 "Konflikt an der DMZ"
roncw_warnews.224.d:0 "Es gibt Berichte über eine Reihe von bewaffneten Zusammenstößen geringer Intensität zwischen nordkoreanischen Streitkräften und den Streitkräften Südkoreas und der Vereinigten Staaten, die sich größtenteils zwischen 1966 und 1969 in der koreanischen DMZ ereigneten."
roncw_warnews.224.a:1 "Beunruhigend ..."

roncw_warnews.225.t:0 "Krieg im Libanon"
roncw_warnews.225.d:0 "Es begann am 6. Juni 1982, als die israelischen Verteidigungsstreitkräfte (IDF) in den Südlibanon einmarschierten. Zuvor hatte es wiederholt Angriffe und Gegenangriffe zwischen der im Südlibanon operierenden Palästinensischen Befreiungsorganisation (PLO) und den IDF gegeben, die auf beiden Seiten der Grenze zivile Opfer gefordert hatten. Die Militäroperation wurde eingeleitet, nachdem bewaffnete Männer von Abu Nidals Organisation versucht hatten, Shlomo Argov, den israelischen Botschafter in Großbritannien, zu ermorden. Der israelische Premierminister Menachem Begin machte Abu Nidals Feind, die PLO, für den Vorfall verantwortlich und nutzte ihn als Kriegsgrund für die Invasion."
roncw_warnews.225.a:1 "Beunruhigend ..."

roncw_warnews.226.t:0 "Konflikt zwischen Mexiko und Guatemala"
roncw_warnews.226.d:0 "Der Mexiko-Guatemala-Konflikt war ein bewaffneter Konflikt zwischen Mexiko und Guatemala, bei dem mexikanische zivile Fischerboote von der guatemaltekischen Luftwaffe beschossen wurden. Die Feindseligkeiten wurden durch die Amtseinführung von Miguel Ydígoras als Präsident Guatemalas am 2. März 1958 ausgelöst."
roncw_warnews.226.a:1 "Beunruhigend ..."

roncw_warnews.227.t:0 "Aufstand im Ogaden"
roncw_warnews.227.d:0 "Der Aufstand im Ogaden war ein bewaffneter Konflikt, der von 1994 bis 2018 andauerte. Er wurde von der separatistischen Ogaden National Liberation Front (ONLF) gegen die äthiopische Regierung geführt. Der Krieg begann 1994, als die ONLF versuchte, Großsomalia durch die Vereinigung der äthiopischen Somali-Region mit Somalia wiederherzustellen. Er endete mit einem Friedensabkommen im Rahmen der Reformen von Premierminister Abiy Ahmed."
roncw_warnews.227.a:1 "Beunruhigend ..."

roncw_warnews.228.t:0 "Poonch-Rebellion"
roncw_warnews.228.d:0 "Im Frühjahr 1947 brach im Poonch Jagir, einem Gebiet an der Grenze zwischen dem Distrikt Rawalpindi im Westpunjab und dem Distrikt Hazara in der Nordwestlichen Grenzprovinz im späteren Pakistan, ein Aufstand gegen Maharadscha Hari Singh von Jammu und Kaschmir aus. Der Anführer des Aufstands, Sardar Muhammad Ibrahim Khan, floh Ende August 1947 nach Lahore und überzeugte die pakistanischen Behörden, den Aufstand zu unterstützen. Zusätzlich zu dieser Unterstützung genehmigte Premierminister Liaquat Ali Khan eine Invasion des Staates durch ehemalige Angehörige der Indischen Nationalarmee im Süden und eine Truppe unter Major Khurshid Anwar im Norden. Diese Invasionen führten schließlich zum Ersten Kaschmirkrieg zwischen Indien und Pakistan und zur Gründung von Azad Kaschmir. Das Poonch Jagir ist seitdem aufgeteilt in Azad Kaschmir, das von Pakistan verwaltet wird, und den Staat Jammu und Kaschmir, der von Indien verwaltet wird."
roncw_warnews.228.a:1 "Beunruhigend ..."

roncw_warnews.229.t:0 "Salvadorianischer Bürgerkrieg"
roncw_warnews.229.d:0 "Der Bürgerkrieg in El Salvador war ein Bürgerkrieg in El Salvador, der vom 15. Oktober 1979 bis zum 16. Januar 1992 zwischen der vom Militär geführten Junta-Regierung von El Salvador und der Nationalen Befreiungsfront Farabundo Martí (FMLN) (einer Koalition oder „Dachorganisation“ linker Gruppen) ausgetragen wurde. Auf einen Putsch am 15. Oktober 1979 folgten Tötungen von Anti-Putsch-Demonstranten durch die Regierung und von Anti-Unruhen-Demonstranten durch die Guerillas. Dieser Krieg wird allgemein als Beginn des Bürgerkriegs angesehen. Der ausgewachsene Bürgerkrieg dauerte mehr als 12 Jahre und beinhaltete die gezielte Terrorisierung und gezielte Tötung von Zivilisten durch von den USA ausgebildete Todesschwadronen der Regierung, darunter prominente Geistliche der katholischen Kirche, die Rekrutierung von Kindersoldaten und andere Menschenrechtsverletzungen, hauptsächlich durch das Militär. Eine unbekannte Zahl von Menschen verschwand, während die UNO berichtet, dass dem Krieg zwischen 1979 und 1992 mehr als 75.000 Menschen zum Opfer fielen."
roncw_warnews.229.a:1 "Beunruhigend ..."

roncw_warnews.230.t:0 "Shaba 1"
roncw_warnews.230.d:0 "Shaba I war ein Konflikt in der zaireischen Provinz Shaba (Katanga), der vom 8. März bis zum 26. Mai 1977 andauerte. Der Konflikt begann, als die Front zur Nationalen Befreiung des Kongo (FNLC), eine Gruppe von etwa 2.000 kongolesischen Soldaten aus Katangan, die Veteranen der Kongo-Krise, des angolanischen Unabhängigkeitskrieges und des angolanischen Bürgerkriegs waren, von Angola aus die Grenze nach Shaba überquerte. Dank der sympathisierenden Einheimischen und der Desorganisation des zairischen Militärs (Forces Armées Zaïroises oder FAZ) konnte die FNLC schnell in der Region vordringen. Von der Grenze Zaires zu Angola ostwärts zogen die Rebellen nach Mutshatsha, einer Kleinstadt nahe der wichtigen Bergbaustadt Kolwezi."
roncw_warnews.230.a:1 "Beunruhigend ..."

roncw_warnews.231.t:0 "Somalischer Bürgerkrieg"
roncw_warnews.231.d:0 "In dem darauf folgenden Machtvakuum und den darauf folgenden Unruhen, insbesondere im Süden, wetteiferten verschiedene bewaffnete Fraktionen um Einfluss. In den Jahren 1990–1992 brach das Gewohnheitsrecht aufgrund der Kämpfe vorübergehend zusammen. Dies führte im Juli 1992 zur Ankunft von UN-Militärbeobachtern (UNOSOM I), gefolgt von größeren Friedenstruppen. Die Kämpfe im Süden gingen weiter. In Ermangelung einer Zentralregierung wurde Somalia zu einem „gescheiterten Staat“. Die UN zog sich 1995 nach erheblichen Verlusten zurück, doch war noch keine zentrale Autorität wiederhergestellt worden. Nach dem Zusammenbruch der Zentralregierung kam es in den meisten Regionen zu einer gewissen Rückkehr zum Gewohnheits- und Religionsrecht. 1991 und 1998 wurden im Norden des Landes zudem zwei autonome Regionalregierungen eingerichtet. Dies führte zu einem relativen Rückgang der Kampfintensität, und SIPRI strich Somalia für 1997 und 1998 von seiner Liste der größeren bewaffneten Konflikte."
roncw_warnews.231.a:1 "Beunruhigend ..."

roncw_warnews.232.t:0 "Abyan-Offensive"
roncw_warnews.232.d:0 "Die Abyan-Offensive 2012 war eine Offensive des jemenitischen Militärs gegen militante islamistische Kräfte in der Provinz Abyan, darunter möglicherweise auch Elemente von Al-Qaida auf der Arabischen Halbinsel (AQAP), mit dem Ziel, die von Militanten gehaltenen Städte Zinjibar und Jaʿār zurückzuerobern."
roncw_warnews.232.a:1 "Beunruhigend ..."

roncw_warnews.233.t:0 "Grenzscharmützel zwischen Afghanistan und Pakistan"
roncw_warnews.233.d:0 "Am 5. Mai 2017 kam es zu einem bewaffneten Zusammenstoß, nachdem afghanische Streitkräfte ein pakistanisches Volkszählungsteam in Chaman, Pakistan, nahe der Grenze zu Afghanistan, angegriffen hatten. Bei den unmittelbaren Grenzkonflikten starben auf beiden Seiten mindestens 15 Menschen. Es handelt sich um einen von mehreren ähnlichen Zwischenfällen an der Grenze zwischen den beiden Ländern."
roncw_warnews.233.a:1 "Beunruhigend ..."

roncw_warnews.234.t:0 "Anglophone Krise"
roncw_warnews.234.d:0 "Bei der Krise handelt es sich um einen Konflikt in der Region Südkamerun in Kamerun, der Teil des langjährigen anglophonen Problems ist. Im September 2017 erklärten Separatisten in den anglophonen Gebieten der Nordwestregion und der Südwestregion (gemeinsam als Südkamerun bekannt) die Unabhängigkeit Ambazoniens und begannen, gegen die Regierung Kameruns zu kämpfen. Der Konflikt begann als kleiner Aufstand, breitete sich innerhalb eines Jahres auf die meisten Teile der anglophonen Regionen aus."
roncw_warnews.234.a:1 "Beunruhigend ..."

roncw_warnews.235.t:0 "Zusammenstöße zwischen Armeniern und Aserbaidschanern"
roncw_warnews.235.d:0 "Die Operation Gyunnyut begann am 20. Mai 2018 zwischen den armenischen und den aserbaidschanischen Streitkräften. Zusammenstöße und anschließende Militäroperationen endeten mit der Rückeroberung mehrerer besetzter Dörfer und strategischer Positionen innerhalb der Autonomen Republik Nachitschewan durch Aserbaidschan. Diese Gebiete waren zuvor Teil eines Niemandslandes zwischen den aserbaidschanischen und armenischen Linien gewesen."
roncw_warnews.235.a:1 "Beunruhigend ..."

roncw_warnews.236.t:0 "Scharmützel in Bergkarabach"
roncw_warnews.236.d:0 "Der Bergkarabach-Konflikt 2016, auch als Vier-Tage-Krieg bekannt, begann am 1. April 2016 entlang der Kontaktlinie Bergkarabach mit der Arzachischen Verteidigungsarmee, die auf der einen Seite von den armenischen und auf der anderen Seite von den aserbaidschanischen Streitkräften unterstützt wurde."
roncw_warnews.236.a:1 "Beunruhigend ..."

roncw_warnews.237.t:0 "Stammeskonflikte in Assuan"
roncw_warnews.237.d:0 "Bei den Stammeskonflikten in Assuan handelte es sich um eine Reihe von Zusammenstößen zwischen zwei einheimischen ethnischen Stämmen östlich der südägyptischen Stadt Assuan: dem arabischen Al-Halayel-Clan (Beni Helal) und der nubischen Familie Al-Dabodeya. Am Mittwoch, zwei Tage vor den Ausschreitungen, kam es in der ganzen Stadt zu Schießereien und Messerstechereien, nachdem sich Schüler beider Seiten in einer örtlichen Schule verbal beleidigt hatten. Autos wurden in Brand gesteckt und Häuser geplündert und niedergebrannt."
roncw_warnews.237.a:1 "Beunruhigend ..."

roncw_warnews.238.t:0 "Bakassi-Konflikt"
roncw_warnews.238.d:0 "Der Bakassi-Konflikt ist ein anhaltender Aufstand, der 2006 auf der kamerunischen Halbinsel Bakassi begann und von lokalen Separatisten gegen kamerunische Regierungstruppen geführt wurde. Nach der Unabhängigkeit Kameruns und Nigerias war die Grenze zwischen beiden Ländern ungeklärt, und es kam zu weiteren Streitigkeiten. Die nigerianische Regierung behauptete, die Grenze sei die vor den britisch-deutschen Abkommen von 1913. Kamerun hingegen beanspruchte die in den britisch-deutschen Abkommen festgelegte Grenze. Der Grenzkonflikt verschärfte sich in den 1980er und 1990er Jahren nach Grenzzwischenfällen, die beinahe einen Krieg zwischen den beiden Ländern ausgelöst hätten."
roncw_warnews.238.a:1 "Beunruhigend ..."

roncw_warnews.239.t:0 "Baragoi-Zusammenstöße"
roncw_warnews.239.d:0 "Als Hauptursache des Konflikts werden Stammesrivalität und Kämpfe um Vieh genannt. Im November 2012 wurden im Suguta-Tal nahe Baragoi über 40 kenianische Polizisten und Reservisten getötet, als sie auf einer Mission waren, gestohlenes Vieh zurückzuholen. Bei erneuten Viehdiebstählen wurden vier Menschen getötet und mehrere weitere verletzt."
roncw_warnews.239.a:1 "Beunruhigend ..."

roncw_warnews.240.t:0 "Batwa-Luba-Zusammenstöße"
roncw_warnews.240.d:0 "Die Pygmäen-Batwa werden oft von den Luba und anderen Bantu-Gruppen ausgebeutet und angeblich versklavt. Obwohl die Pygmäen nie militärisch organisierten, um Widerstand zu leisten, organisierte Rebellenführer Laurent-Désiré Kabila, der den Krieg gewann, die Twa ab dem Ersten Kongokrieg in paramilitärischen Gruppen, um ihm zu helfen. Sein Sohn Joseph Kabila, der ihm nachfolgte, setzte diese Milizen im Zweiten Kongokrieg und gegen die überwiegend aus Luba bestehende Mai-Mai Kata Katanga ein."
roncw_warnews.240.a:1 "Beunruhigend ..."

roncw_warnews.241.t:0 "Boko Haram-Aufstand"
roncw_warnews.241.d:0 "Boko Harams anfänglicher Aufstand scheiterte, und ihr Anführer Mohammed Yusuf wurde von der nigerianischen Regierung getötet. Die Bewegung zerfiel daraufhin in autonome Gruppen und begann einen Aufstand, wobei es Rebellenkommandeur Abubakar Shekau gelang, eine Art Vorherrschaft unter den Aufständischen zu erlangen. Obwohl er von internen Rivalen wie Abu Usmatul al-Ansaris salafistisch-konservativer Fraktion und der Ansaru-Fraktion herausgefordert wurde, wurde Shekau de facto zum Anführer der Aufständischen und verhinderte größtenteils, dass die verschiedenen Boko-Haram-Fraktionen gegeneinander kämpften, und konzentrierte sich stattdessen auf den Sturz der nigerianischen Regierung. Unterstützt von anderen dschihadistischen Organisationen wie al-Qaida und al-Shabaab, waren Shekaus Taktiken von extremer Brutalität und gezielten Angriffen auf Zivilisten geprägt."
roncw_warnews.241.a:1 "Beunruhigend ..."

roncw_warnews.242.t:0 "Grenzstreit zwischen Kambodscha und Thailand"
roncw_warnews.242.d:0 "Der kambodschanisch-thailändische Grenzstreit begann im Juni 2008 als jüngste Runde eines jahrhundertelangen Streits zwischen Kambodscha und Thailand, der das Gebiet um den Preah-Vihear-Tempel aus dem 11. Jahrhundert in den Dângrêk-Bergen zwischen dem Bezirk Choam Khsant in der Provinz Preah Vihear im Norden Kambodschas und dem Bezirk Kantharalak (Amphoe) in der Provinz Sisaket im Nordosten Thailands betrifft."
roncw_warnews.242.a:1 "Beunruhigend ..."

roncw_warnews.243.t:0 "Zentralafrikanische Republik Bush-Krieg"
roncw_warnews.243.d:0 "Der Aufstand bestand aus mehreren Rebellengruppen, von denen einige sehr klein waren und erst gegen Ende des Konflikts gegründet wurden. Neben der UFDR waren an dem Konflikt die Volksarmee zur Wiederherstellung der Demokratie (CAR) (APRD), die Groupe d&#39;action patriotique pour la libération de Centrafrique (GAPLC), die Bewegung der zentralafrikanischen Befreier für Gerechtigkeit (MLCJ), die Front démocratique Centrafricain (FDC) und die Union der Republikanischen Kräfte (UFR) beteiligt."
roncw_warnews.243.a:1 "Beunruhigend ..."

roncw_warnews.244.t:0 "Bürgerkrieg in der Zentralafrikanischen Republik"
roncw_warnews.244.d:0 "Ein Großteil der Spannungen dreht sich um die religiöse Identität zwischen muslimischen Séléka-Kämpfern und christlichen Anti-Balaka. Weitere Faktoren sind ethnische Unterschiede zwischen ehemaligen Séléka-Fraktionen und historische Feindseligkeiten zwischen Landwirten, die einen Großteil der Anti-Balaka ausmachen, und Nomadengruppen, die den Großteil der Séléka-Kämpfer stellen. Mehr als 1,1 Millionen Menschen sind aus ihrer Heimat geflohen, in einem Land mit rund fünf Millionen Einwohnern – so viele wie nie zuvor."
roncw_warnews.244.a:1 "Beunruhigend ..."

roncw_warnews.245.t:0 "Tschadischer Bürgerkrieg"
roncw_warnews.245.d:0 "Der jüngste Bürgerkrieg im Tschad begann im Dezember 2005. Seit seiner Unabhängigkeit von Frankreich im Jahr 1960 ist der Tschad vom Bürgerkrieg zwischen den arabisch-muslimischen Völkern des Nordens und den subsaharischen Christen des Südens erschüttert. Infolgedessen wechselten Führung und Präsidentschaft im Tschad zwischen den christlichen Südländern und den muslimischen Nordländern hin und her. War eine Seite an der Macht, begann die andere Seite in der Regel einen revolutionären Krieg, um ihr entgegenzutreten."
roncw_warnews.245.a:1 "Beunruhigend ..."

roncw_warnews.246.t:0 "Scharmützel zwischen China und Indien"
roncw_warnews.246.d:0 "Die chinesisch-indischen Scharmützel 2020 sind Teil einer anhaltenden militärischen Pattsituation zwischen China und Indien. Seit dem 5. Mai 2020 liefern sich chinesische und indische Truppen entlang der chinesisch-indischen Grenze aggressive Handgemenge, Konfrontationen und Scharmützel, unter anderem in der Nähe des umstrittenen Pangong-Sees in Ladakh und der Autonomen Region Tibet sowie nahe der Grenze zwischen Sikkim und der Autonomen Region Tibet. Weitere Zusammenstöße ereigneten sich auch an Orten in Ost-Ladakh entlang der Line of Actual Control (LAC)."
roncw_warnews.246.a:1 "Beunruhigend ..."

roncw_warnews.247.t:0 "Konflikt im Libanon"
roncw_warnews.247.d:0 "Der Libanonkonflikt 2008 war ein kurzer innerstaatlicher Konflikt im Mai 2008 zwischen regierungstreuen und oppositionellen Milizen im Libanon, nachdem die 18 Monate andauernde politische Krise außer Kontrolle geraten war und beide Seiten in Kämpfen entlang konfessioneller Linien gegeneinander antraten. Die Kämpfe zwischen regierungstreuen und oppositionellen Milizen, die der Zukunftsbewegung bzw. der PSP angehören, auf der einen Seite und der Hisbollah, Amal, SSNP, LDP und der Arabischen Demokratischen Partei auf der anderen Seite wurden durch einen Schritt der Regierung ausgelöst, das Telekommunikationsnetz der Hisbollah abzuschalten und den Sicherheitschef des Flughafens Beirut zu entlassen, nachdem eine versteckte ferngesteuerte Kamera entdeckt worden war, die eine der Start- und Landebahnen des Flughafens überwachte, und seine angeblichen Verbindungen zur Hisbollah."
roncw_warnews.247.a:1 "Beunruhigend ..."

roncw_warnews.248.t:0 "Konflikt im Nigerdelta"
roncw_warnews.248.d:0 "Der aktuelle Konflikt im Nigerdelta entstand Anfang der 1990er Jahre aufgrund von Spannungen zwischen ausländischen Ölkonzernen und einer Reihe ethnischer Minderheiten im Nigerdelta, insbesondere den Ogoni und Ijaw, die sich ausgebeutet fühlen. Trotz der Rückkehr zur Demokratie und der Wahl der Obasanjo-Regierung im Jahr 1999 hielten die ethnischen und politischen Unruhen in den gesamten 1990er Jahren an. Der Kampf um den Ölreichtum hat die Gewalt zwischen den ethnischen Gruppen angeheizt und zur Militarisierung fast der gesamten Region durch ethnische Milizen, nigerianische Militär- und Polizeikräfte, insbesondere die nigerianische mobile Polizei, geführt."
roncw_warnews.248.a:1 "Beunruhigend ..."

roncw_warnews.249.t:0 "Dschibutisch-eritreischer Grenzkonflikt"
roncw_warnews.249.d:0 "Der dschibutisch-eritreische Grenzkonflikt zwischen den Streitkräften Dschibutis und Eritreas ereignete sich zwischen dem 10. und 13. Juni 2008. Auslöser waren Spannungen, die am 16. April 2008 begannen, als Dschibuti meldete, dass eritreische Streitkräfte in Dschibuti eingedrungen seien und auf beiden Seiten der Grenze Schützengräben ausgehoben hätten. Die Krise verschärfte sich, als es am 10. Juni 2008 im Grenzgebiet zu bewaffneten Zusammenstößen zwischen den beiden Streitkräften kam."
roncw_warnews.249.a:1 "Beunruhigend ..."

roncw_warnews.250.t:0 "Dongo-Konflikt"
roncw_warnews.250.d:0 "Der Dongo-Konflikt war ein kleinerer Konflikt in der Stadt Dongo am linken Ufer des Ubangi-Flusses im Distrikt Sud-Ubangi in der Demokratischen Republik Kongo. Ende Oktober 2009 brachen die ersten Gewaltausbrüche nach einem lokalen Streit um Fischereirechte aus. Dies destabilisierte die Region und führte zu einer Gewaltspirale sowie einem Exodus der Zivilbevölkerung, die vor den Kämpfen zu fliehen versuchte. Bis Dezember 2009 war dieser Konflikt einer der größten Konflikte zwischen MONUC und UN; mehr als 168.000 Menschen waren aus ihrer Heimat geflohen, viele von ihnen in die benachbarte Republik Kongo. Eine Intervention der kongolesischen Armee und der Mission der Vereinten Nationen in der Demokratischen Republik Kongo (MONUC) beendete den Konflikt am 13. Dezember 2009."
roncw_warnews.250.a:1 "Beunruhigend ..."

roncw_warnews.251.t:0 "Eelam-Krieg IV"
roncw_warnews.251.d:0 "Eelam-Krieg IV ist die Bezeichnung für die vierte Phase des bewaffneten Konflikts zwischen dem sri-lankischen Militär und den separatistischen Befreiungstigern von Tamil Eelam (LTTE). Erneute Feindseligkeiten begannen am 26. Juli 2006, als Kampfjets der sri-lankischen Luftwaffe mehrere LTTE-Lager rund um Mavil Aru Anicut bombardierten."
roncw_warnews.251.a:1 "Beunruhigend ..."

roncw_warnews.252.t:0 "Ethnische Gewalt im Südsudan"
roncw_warnews.252.d:0 "Ethnische Gewalt hat im Südsudan eine lange Geschichte unter den verschiedenen ethnischen Gruppen des Landes. Der Südsudan zählt 64 Stämme, von denen die Dinka mit etwa 35 % der Bevölkerung den größten darstellen und die Regierung dominieren. Die zweitgrößte Gruppe sind die Nuer. Konflikte zwischen Nomadengruppen werden oft durch die Frage von Vieh und Weideland verschärft und sind Teil der umfassenderen sudanesischen Nomadenkonflikte."
roncw_warnews.252.a:1 "Beunruhigend ..."

roncw_warnews.253.t:0 "Fraktionsgewalt in Libyen"
roncw_warnews.253.d:0 "Seit dem Ende des libyschen Bürgerkriegs im Jahr 2011, der zum Sturz von Muammar Gaddafi führte, kam es immer wieder zu Gewalt zwischen verschiedenen Milizen und den neuen staatlichen Sicherheitskräften. Die Gewalt eskalierte und führte zum aktuellen libyschen Bürgerkrieg im Jahr 2014."
roncw_warnews.253.a:1 "Beunruhigend ..."

roncw_warnews.254.t:0 "Fatah-Hamas-Konflikt"
roncw_warnews.254.d:0 "Es handelte sich um einen Konflikt zwischen den beiden größten palästinensischen Parteien, Fatah und Hamas, der 2007 zur Spaltung der Palästinensischen Autonomiebehörde führte. Der Versöhnungsprozess und die Vereinigung der Regierungen von Hamas und Fatah sind noch nicht abgeschlossen."
roncw_warnews.254.a:1 "Beunruhigend ..."

roncw_warnews.255.t:0 "Zusammenstöße zwischen Gaza und Israel"
roncw_warnews.255.d:0 "Die Zusammenstöße zwischen Gaza und Israel begannen am 11. November 2018, als bei einer missglückten israelischen Geheimoperation im Gebiet Khan Yunis im südlichen Gazastreifen sieben palästinensische Militante und ein israelischer Soldat getötet wurden. Die Schusswechsel dauerten noch zwei Tage an, bis unter ägyptischer Vermittlung ein Waffenstillstand erreicht wurde. Etwa zwei Wochen nach dem Waffenstillstand kam es zu kleineren Zwischenfällen und Protesten, deren Intensität abnahm."
roncw_warnews.255.a:1 "Beunruhigend ..."

roncw_warnews.256.t:0 "Zusammenstöße zwischen Gaza und Israel"
roncw_warnews.256.d:0 "Eine Eskalation des Konflikts zwischen Gaza und Israel begann am 3. Mai 2019, nachdem zwei israelische Soldaten während der wöchentlichen Proteste an der Grenze zwischen Gaza und Israel durch Scharfschützenfeuer aus dem Gazastreifen verletzt worden waren. Als Reaktion darauf führte die israelische Luftwaffe einen Luftangriff durch, bei dem zwei Palästinenser getötet wurden. Anschließend wurden Hunderte von Raketen aus Gaza auf Israel abgefeuert, während die israelische Luftwaffe zahlreiche Ziele im Gazastreifen angriff. Darüber hinaus verstärkte Israel seine Truppenpräsenz nahe der Sperranlage."
roncw_warnews.256.a:1 "Beunruhigend ..."

roncw_warnews.257.t:0 "Gaza-Krieg"
roncw_warnews.257.d:0 "Der Gaza-Krieg, auch bekannt als Operation Gegossenes Blei oder in der muslimischen Welt als Gaza-Massaker, war ein dreiwöchiger bewaffneter Konflikt zwischen palästinensischen paramilitärischen Gruppen im Gazastreifen und den israelischen Verteidigungsstreitkräften (IDF). Er begann am 27. Dezember 2008 und endete am 18. Januar 2009 mit einem einseitigen Waffenstillstand. Der Konflikt forderte zwischen 1.166 und 1.417 palästinensische und 13 israelische Todesopfer (vier davon durch Eigenbeschuss)."
roncw_warnews.257.a:1 "Beunruhigend ..."

roncw_warnews.258.t:0 "Schlacht um Gaza"
roncw_warnews.258.d:0 "Die Schlacht um Gaza, auch als Machtübernahme des Gazastreifens durch die Hamas bezeichnet, war ein militärischer Konflikt zwischen Fatah und Hamas, der vom 10. bis 15. Juni 2007 im Gazastreifen stattfand. Sie war ein bedeutendes Ereignis im Fatah-Hamas-Konflikt, bei dem es um den Machtkampf ging, nachdem die Fatah die Parlamentswahlen 2006 verloren hatte. Hamas-Kämpfer übernahmen die Kontrolle über den Gazastreifen und setzten Fatah-Funktionäre ab. Die Schlacht führte zur Auflösung der Einheitsregierung und zur De-facto-Teilung der palästinensischen Gebiete in zwei Entitäten: das Westjordanland unter der Herrschaft der Palästinensischen Autonomiebehörde und Gaza unter der Herrschaft der Hamas. Das IKRK schätzt, dass während der Kämpfe in der Woche bis zum 15. Juni mindestens 118 Menschen getötet und mehr als 550 verletzt wurden."
roncw_warnews.258.a:1 "Beunruhigend ..."

roncw_warnews.259.t:0 "Heglig-Krise"
roncw_warnews.259.d:0 "Die Heglig-Krise war ein kurzer Krieg zwischen den Ländern Sudan und Südsudan im Jahr 2012 um ölreiche Regionen zwischen den südsudanesischen Bundesstaaten Unity und Südkordofan. Der Südsudan marschierte in die kleine Grenzstadt Heglig ein und besetzte sie kurzzeitig, bevor er von der sudanesischen Armee zurückgedrängt wurde. Kleinere Zusammenstöße dauerten an, bis am 26. September ein Abkommen über Grenzen und natürliche Ressourcen unterzeichnet wurde, das die meisten Aspekte des Konflikts löste."
roncw_warnews.259.a:1 "Beunruhigend ..."

roncw_warnews.260.t:0 "Huthi-Aufstand im Jemen"
roncw_warnews.260.d:0 "Der Huthi-Aufstand im Jemen, auch bekannt als Huthi-Rebellion, Sa&#39;dah-Krieg oder Sa&#39;dah-Konflikt, war ein militärischer Aufstand zwischen zaiditisch-schiitischen Huthi und dem jemenitischen Militär. Er begann im Norden des Jemen und hat sich seitdem zu einem umfassenden Bürgerkrieg ausgeweitet. Auslöser des Konflikts war 2004 der Versuch der Regierung, Hussein Badreddin al-Huthi zu verhaften. Der zaiditische religiöse Führer der Huthi und ehemalige Parlamentarier war von der Regierung mit einem Kopfgeld von 55.000 Dollar belegt worden."
roncw_warnews.260.a:1 "Beunruhigend ..."

roncw_warnews.261.t:0 "Machtübernahme der Huthi im Jemen"
roncw_warnews.261.d:0 "Die Machtübernahme der Huthi im Jemen, von ihren Anhängern auch als Revolution des 21. September bezeichnet, war eine schrittweise bewaffnete Machtübernahme des ehemaligen jemenitischen Präsidenten Ali Abdullah Saleh durch die Huthi und ihre Anhänger, die die jemenitische Regierung von der Macht verdrängte. Sie hatte ihren Ursprung in den von den Huthi angeführten Protesten, die im Vormonat begonnen hatten, und eskalierte, als die Huthi am 21. September 2014 die jemenitische Hauptstadt Sana&#39;a stürmten. Dies führte zum Rücktritt von Premierminister Mohammed Basindawa und später am 22. Januar 2015 zum Rücktritt von Präsident Abdrabbuh Mansur Hadi und seinen Ministern, nachdem Huthi-Truppen den Präsidentenpalast, die Residenz und wichtige Militäreinrichtungen eingenommen und am 6. Februar 2015 einen Regierungsrat durch Huthi-Militante gebildet hatten."
roncw_warnews.261.a:1 "Beunruhigend ..."

roncw_warnews.262.t:0 "Betrogen"
roncw_warnews.262.d:0 "Dupe, benutze mich nicht"
roncw_warnews.262.a:1 "Beunruhigend ..."

roncw_warnews.263.t:0 "Aufstand in Cabo Delgado"
roncw_warnews.263.d:0 "Bei dem Aufstand handelt es sich um einen andauernden Konflikt in der Provinz Cabo Delgado in Mosambik, der hauptsächlich zwischen islamistischen Militanten, die einen islamischen Staat in der Region errichten wollen, und mosambikanischen Sicherheitskräften ausgetragen wird. Zivilisten sind das Hauptziel der Angriffe islamistischer Militanter. Die wichtigste aufständische Fraktion ist Ansar al-Sunna, eine einheimische extremistische Gruppierung mit schwachen internationalen Verbindungen. Seit Mitte 2018 ist der Islamische Staat im Irak und der Levante (ISIL) Berichten zufolge auch in Nordmosambik aktiv und bekannte sich im Juni 2019 zu seinem ersten Angriff auf mosambikanische Sicherheitskräfte. Darüber hinaus haben Banditen den Aufstand für Raubzüge ausgenutzt. Der Aufstand verschärft sich vermutlich, da im ersten Halbjahr 2020 fast so viele Angriffe verübt wurden wie im gesamten Jahr 2019."
roncw_warnews.263.a:1 "Beunruhigend ..."

roncw_warnews.264.t:0 "Aufstand im Nordkaukasus"
roncw_warnews.264.d:0 "Bei dem Aufstand handelt es sich um einen bewaffneten Konflikt zwischen Russland und militanten Gruppen, die mit dem Kaukasus-Emirat und seit Juni 2015 mit der Gruppe Islamischer Staat im Irak und der Levante (ISIL) in Verbindung stehen. Er folgte auf das offizielle Ende des zehn Jahre dauernden Zweiten Tschetschenienkriegs am 16. April 2009. Er zog Menschen aus dem Nahen Osten, Nordafrika, Europa und Zentralasien an, die sich anschließend an dem Konflikt beteiligten. Aber auch Freiwillige aus dem Nordkaukasus kämpfen in Syrien."
roncw_warnews.264.a:1 "Beunruhigend ..."

roncw_warnews.265.t:0 "Internationale Militärintervention gegen den IS"
roncw_warnews.265.d:0 "Als Reaktion auf die schnellen Gebietsgewinne des Islamischen Staates im Irak und der Levante (ISIL) im ersten Halbjahr 2014, die allgemein verurteilten Hinrichtungen, die gemeldeten Menschenrechtsverletzungen und die Angst vor weiteren Auswirkungen des syrischen Bürgerkriegs begannen viele Staaten, sowohl im syrischen als auch im irakischen Bürgerkrieg gegen den IS einzugreifen. Später kam es auch zu kleineren Interventionen einiger Staaten gegen mit dem ISIL verbundene Gruppen in Nigeria und Libyen."
roncw_warnews.265.a:1 "Beunruhigend ..."

roncw_warnews.266.t:0 "Invasion von Anjouan"
roncw_warnews.266.d:0 "Die Invasion von Anjouan (Codename Operation Demokratie auf den Komoren) am 25. März 2008 war ein amphibischer Angriff unter Führung der Komoren, unterstützt von Streitkräften der Afrikanischen Union (AU), darunter Truppen aus dem Sudan, Tansania und Senegal, sowie logistischer Unterstützung aus Libyen und Frankreich. Ziel der Invasion war der Sturz der Führung von Oberst Mohamed Bacar auf Anjouan, einer Insel der Union der Komoren, nachdem dieser sich nach einer umstrittenen Wahl im Jahr 2007 geweigert hatte, zurückzutreten und sich damit der Bundesregierung und der AU widersetzte. Der Komoren-Archipel im Indischen Ozean hat seit seiner Unabhängigkeit von Frankreich im Jahr 1975 eine turbulente Geschichte und erlebte mehr als 20 Putsche oder Putschversuche."
roncw_warnews.266.a:1 "Beunruhigend ..."

roncw_warnews.267.t:0 "Iran-PJAK-Konflikt"
roncw_warnews.267.d:0 "Der Iran-PJAK-Konflikt ist ein bewaffneter Konflikt zwischen der Islamischen Republik Iran und kurdischen Rebellen der Kurdischen Partei für Freies Leben (PJAK), der 2004 begann und 2011 weitgehend endete. Die Gruppe verübte zahlreiche Anschläge in der iranischen Provinz Kurdistan und den Provinzen Westirans. Die PJAK ist eng mit der militanten Arbeiterpartei Kurdistans (PKK) verbunden, dem Hauptgegner der Republik Türkei im kurdisch-türkischen Konflikt. Die PJAK wurde vom Iran, Japan, der Türkei und den USA als Terrororganisation eingestuft."
roncw_warnews.267.a:1 "Beunruhigend ..."

roncw_warnews.268.t:0 "Irakkrieg"
roncw_warnews.268.d:0 "Der Irakkrieg war ein langwieriger bewaffneter Konflikt, der 2003 mit der Invasion des Irak durch eine von den USA geführte Koalition begann, die die Regierung von Saddam Hussein stürzte. Der Konflikt dauerte über weite Teile des folgenden Jahrzehnts an, da sich ein Aufstand gegen die Besatzungstruppen und die nach der Invasion gebildete irakische Regierung formierte. Schätzungsweise 151.000 bis 1.033.000 Iraker wurden in den ersten drei bis vier Jahren des Konflikts getötet. Die US-Truppen wurden 2011 offiziell abgezogen. Nach der Ausweitung des syrischen Bürgerkriegs und den Gebietsgewinnen des Islamischen Staates im Irak und der Levante (ISIL) beschloss die Obama-Regierung jedoch 2014, US-Truppen wieder in den Irak zu verlegen. Viele ehemalige Soldaten sind bei Rüstungsunternehmen und privaten Militärfirmen beschäftigt."
roncw_warnews.268.a:1 "Beunruhigend ..."

roncw_warnews.269.t:0 "Krieg im Irak"
roncw_warnews.269.d:0 "Der Irakkrieg war ein bewaffneter Konflikt, der im Dezember 2013 begann und im Dezember 2017 endete. 2013 eskalierte der irakische Aufstand zu einem umfassenden Krieg mit der Eroberung von Ramadi, Falludscha, Mossul, Tikrit und großen Teilen Nordiraks durch den Islamischen Staat im Irak und der Levante (ISIL, auch bekannt als ISIS oder IS). Auf seinem Höhepunkt beherrschte ISIL 56.000 Quadratkilometer irakisches Territorium mit 4,5 Millionen Einwohnern."
roncw_warnews.269.a:1 "Beunruhigend ..."

roncw_warnews.270.t:0 "Irakischer Aufstand"
roncw_warnews.270.d:0 "Der irakische Aufstand von Mai 2003 bis Februar 2006 begann nach Abschluss der Invasion des Irak und dem Sturz von Saddam Hussein im Mai 2003. Der bewaffnete Widerstand der Aufständischen gegen die von den USA geführte multinationale Truppe im Irak und die irakische Regierung nach 2003 dauerte bis Anfang 2006 und eskalierte dann in die konfessionell motivierte Gewalt, die gewalttätigste Phase des Irak-Krieges."
roncw_warnews.270.a:1 "Beunruhigend ..."

roncw_warnews.271.t:0 "Irakischer Aufstand"
roncw_warnews.271.d:0 "Der irakische Aufstand begann Ende 2011 nach dem Ende des Irak-Krieges und dem Abzug der US-Truppen aus dem Irak und führte zu gewaltsamen Konflikten mit der Zentralregierung sowie zu leichter konfessioneller Gewalt zwischen den religiösen Gruppen des Irak."
roncw_warnews.271.a:1 "Beunruhigend ..."

roncw_warnews.272.t:0 "Irakischer Aufstand"
roncw_warnews.272.d:0 "Der irakische Aufstand (2017–heute) ist ein andauernder Aufstand niedriger Intensität, der Ende 2017 begann, nachdem der Islamische Staat im Irak und der Levante (ISIL) im Irakkrieg von 2014 bis 2017 die territoriale Kontrolle verloren hatte. Mehrere Rebellengruppen, darunter ISIL, Weiße Flaggen und die irakische Baath-Partei, bekämpfen das irakische Militär (das größtenteils von den Vereinigten Staaten und anderen Ländern unterstützt wird, die Luftangriffe gegen ISIL durchführen) und alliierte paramilitärische Kräfte (die größtenteils vom Iran unterstützt werden)."
roncw_warnews.272.a:1 "Beunruhigend ..."

roncw_warnews.273.t:0 "Irakisch-kurdischer Konflikt"
roncw_warnews.273.d:0 "Der irakisch-kurdische Konflikt 2017, auch als Kirkuk-Krise bekannt, ereignete sich außerhalb der kurdischen Region im Nordirak und begann am 15. Oktober 2017 als Folge des am 25. September 2017 abgehaltenen Referendums über das irakische Kurdistan. Die diplomatische Krise zwischen der irakischen Regierung und der Regionalregierung Kurdistans (KRG) eskalierte zu einem offenen Konflikt, als die Peschmerga wiederholte Warnungen des irakischen Premierministers Haider al-Abadi ignorierten, Kirkuk an die irakischen Regierungstruppen zu übergeben."
roncw_warnews.273.a:1 "Beunruhigend ..."

roncw_warnews.274.t:0 "ISIL-Aufstand in Tunesien"
roncw_warnews.274.d:0 "Der ISIL-Aufstand in Tunesien bezieht sich auf die anhaltenden militanten und terroristischen Aktivitäten des Islamischen Staates im Irak und der Levante in Tunesien. Die Aktivitäten des Islamischen Staates im Irak und der Levante (ISIL) in Tunesien begannen im Juni 2015 mit den Anschlägen von Sousse, obwohl sich ISIL zu einem früheren Terroranschlag im Bardo-Museum im März 2015 bekannte, während die tunesische Regierung die Okba-Ibn-Nafaa-Brigade für den Anschlag verantwortlich machte. Nach massiven Grenzzusammenstößen bei Ben Guerdane im März 2016 wurden die Aktivitäten der ISIL-Gruppe als bewaffneter Aufstand beschrieben, der von der bisherigen Taktik sporadischer Selbstmordanschläge zu Versuchen überging, die territoriale Kontrolle zu erlangen."
roncw_warnews.274.a:1 "Beunruhigend ..."

roncw_warnews.275.t:0 "Krise in der Elfenbeinküste"
roncw_warnews.275.d:0 "Die Elfenbeinkrise 2010/11 war eine politische Krise in der Elfenbeinküste, die begann, nachdem Laurent Gbagbo, seit 2000 Präsident der Elfenbeinküste, zum Sieger der ivorischen Wahlen 2010 erklärt worden war, der ersten Wahl im Land seit 10 Jahren. Der Oppositionskandidat Alassane Ouattara sowie eine Reihe von Ländern, Organisationen und Führern weltweit behaupteten, Ouattara habe die Wahl gewonnen. Nach Monaten versuchter Verhandlungen und sporadischer Gewalt trat die Krise in eine entscheidende Phase ein, als Ouattaras Streitkräfte eine Militäroffensive starteten, in der sie schnell die Kontrolle über den größten Teil des Landes erlangten und wichtige Ziele in Abidjan, der größten Stadt des Landes, belagerten."
roncw_warnews.275.a:1 "Beunruhigend ..."

roncw_warnews.276.t:0 "Kamwina-Nsapu-Aufstand"
roncw_warnews.276.d:0 "Der Kamwina-Nsapu-Aufstand, auch Kamuina-Nsapu-Aufstand geschrieben, ist ein andauernder Aufstand der Kamwina-Nsapu-Miliz gegen die staatlichen Sicherheitskräfte in den Provinzen Kasaï-Central, Kasaï, Kasai-Oriental, Lomami und Sankuru. Die Kämpfe begannen, nachdem die von Kamwina Nsapu angeführte Miliz im August 2016 die Sicherheitskräfte angegriffen hatte."
roncw_warnews.276.a:1 "Beunruhigend ..."

roncw_warnews.277.t:0 "Kasese-Zusammenstöße"
roncw_warnews.277.d:0 "Am 26. November 2016 brach in Kasese, der Hauptstadt des ugandischen Königreichs Rwenzururu, Gewalt aus. Die ugandische Polizei durchsuchte die Regierungsgebäude des Königreichs Rwenzururu, tötete acht Angehörige der königlichen Garde und verhaftete zwei weitere. Nach Angaben der ugandischen Regierung war die Razzia eine Reaktion auf militante Angriffe auf Polizeiposten in der Region zwei Wochen zuvor, die mutmaßlich von der königlichen Garde verübt worden waren."
roncw_warnews.277.a:1 "Beunruhigend ..."

roncw_warnews.278.t:0 "Unruhen in Kingston"
roncw_warnews.278.d:0 "Die Unruhen in Kingston 2010, lokal als Tivoli-Incursion bezeichnet, waren ein bewaffneter Konflikt zwischen Jamaikas Militär- und Polizeikräften in der Hauptstadt Kingston und dem Drogenkartell Shower Posse. Der Konflikt begann am 23. Mai 2010, als Sicherheitskräfte mit der Suche nach Christopher „Dudus“ Coke begannen, einem großen Drogenboss, nachdem die USA seine Auslieferung gefordert hatten. Er war auch der Anführer der kriminellen Bande, die mehrere Polizeistationen überfallen hatte. Bei den Gewaltausbrüchen, die sich größtenteils vom 24. bis 25. Mai ereigneten, kamen mindestens 73 Zivilisten ums Leben, mindestens 35 weitere wurden verletzt. Vier Soldaten und Polizisten wurden ebenfalls getötet und mehr als 500 Personen festgenommen, als jamaikanische Polizisten und Soldaten im Kingstoner Stadtteil Tivoli Gardens gegen bewaffnete Männer kämpften."
roncw_warnews.278.a:1 "Beunruhigend ..."

roncw_warnews.279.t:0 "Kivu-Konflikt"
roncw_warnews.279.d:0 "Der Kivu-Konflikt begann 2004 im Osten des Kongo als bewaffneter Konflikt zwischen dem Militär der Demokratischen Republik Kongo (FARDC) und der Hutu-Power-Gruppe Demokratische Kräfte zur Befreiung Ruandas (FDLR) in der Demokratischen Republik Kongo. Er verlief im Wesentlichen in drei Phasen, von denen die dritte noch andauert. Vor März 2009 war der Nationale Kongress zur Verteidigung des Volkes (CNDP) die wichtigste kämpfende Gruppe gegen die FARDC. Nach der Einstellung der Feindseligkeiten zwischen diesen beiden Kräften wurden die rebellischen Tutsi-Truppen, die zuvor unter dem Kommando von Laurent Nkunda standen, zur dominierenden Oppositionsgruppe der Regierungstruppen."
roncw_warnews.279.a:1 "Beunruhigend ..."

roncw_warnews.280.t:0 "Kondovo-Krise"
roncw_warnews.280.d:0 "Die Kondovo-Krise ereignete sich im Dorf Kondovo in der Republik Mazedonien. Eine bewaffnete Gruppe junger ethnischer Albaner, mutmaßlich ehemalige Mitglieder der NLA-Guerilla, riegelte das Dorf Kondovo in der Republik Mazedonien, einen Vorort der Hauptstadt Skopje, ab und begründete dies mit den schlechten Lebensbedingungen und der Unterdrückung durch die staatlichen Behörden. Die junge multiethnische Regierungskoalition spielte den Vorfall herunter und erklärte, es handele sich um ein lokales Problem, das auf die langsame Umsetzung des Friedensabkommens nach dem Bürgerkrieg von 2001 zurückzuführen sei. Einige Oppositionsparteien forderten hingegen „entschiedene Maßnahmen“."
roncw_warnews.280.a:1 "Beunruhigend ..."

roncw_warnews.281.t:0 "Kufra-Konflikt"
roncw_warnews.281.d:0 "Der Kufra-Konflikt 2008 war ein bewaffneter Konflikt in der libyschen Region Kufra zwischen der pro-Toubou-Fraktion der Toubou-Front zur Rettung Libyens (TFSL) und der libyschen Regierung. Der Konflikt begann Anfang November 2008, als die libysche Regierung den ethnischen Toubous die Staatsbürgerschaft entzog und behauptete, ihre Anführer hätten sich auf die Seite des Rivalen Tschad gestellt. Die Zusammenstöße begannen, als die TFSL ein lokales Regierungsgebäude in Brand setzte. Nach dem Vorfall entsandte die Regierung Armeeeinheiten und Hubschrauber in die Region und belagerte Kufra. Die Zusammenstöße endeten Mitte November, als sich beide Parteien auf einen Waffenstillstand einigten."
roncw_warnews.281.a:1 "Beunruhigend ..."

roncw_warnews.282.t:0 "Kurdisch-türkischer Konflikt"
roncw_warnews.282.d:0 "Ende Juli 2015 brach die dritte Phase des kurdisch-türkischen Konflikts zwischen verschiedenen kurdischen Aufständischengruppen und der türkischen Regierung aus, nachdem ein zweieinhalb Jahre dauernder Friedensprozess zur Lösung des langjährigen Konflikts gescheitert war. Der Konflikt zwischen der Türkei und der Arbeiterpartei Kurdistans (PKK) brach im Sommer 2015 nach zweijährigen Friedensverhandlungen erneut aus. Diese begannen Ende 2012, kamen jedoch angesichts der wachsenden Spannungen an der türkisch-syrischen Grenze Ende 2014 nicht voran, als der türkische Staat seine kurdischen Bürger daran hinderte, die Volksverteidigungseinheiten (YPG) zu unterstützen, die während der Belagerung von Kobane gegen den Islamischen Staat im Irak und der Levante (ISIL) kämpften."
roncw_warnews.282.a:1 "Beunruhigend ..."

roncw_warnews.283.t:0 "Ethnische Zusammenstöße in Südkirgisistan"
roncw_warnews.283.d:0 "Bei den Unruhen in Südkirgisistan 2010 handelte es sich um Zusammenstöße zwischen ethnischen Kirgisen und Usbeken im Süden Kirgisistans, vor allem in den Städten Osch und Dschalalabat, nach dem Sturz des ehemaligen Präsidenten Kurmanbek Bakijew am 7. April. Sie sind Teil der größeren kirgisischen Revolution von 2010. Die Gewalt zwischen Kirgisen und Usbeken, die am 19. Mai in Dschalalabat begann, eskalierte am 10. Juni in Osch."
roncw_warnews.283.a:1 "Beunruhigend ..."

roncw_warnews.284.t:0 "Libanon-Konflikt"
roncw_warnews.284.d:0 "Der Libanon-Konflikt 2007 begann am 20. Mai 2007 mit Kämpfen zwischen der islamistischen militanten Fatah al-Islam und den libanesischen Streitkräften (LAF) in Nahr al-Bared, einem palästinensischen Flüchtlingslager der UNRWA nahe Tripolis. Es handelte sich um die schwersten internen Kämpfe seit dem libanesischen Bürgerkrieg von 1975 bis 1990. Der Konflikt drehte sich hauptsächlich um die Belagerung von Nahr al-Bared, aber auch um Zusammenstöße im Flüchtlingslager Ain al-Hilweh im Südlibanon und weitere Bombenanschläge in und um die libanesische Hauptstadt Beirut. Die Kämpfe endeten im September 2007."
roncw_warnews.284.a:1 "Beunruhigend ..."

roncw_warnews.285.t:0 "Libanonkrieg"
roncw_warnews.285.d:0 "Der Libanonkrieg 2006, auch Israel-Hisbollah-Krieg 2006 genannt, war ein 34-tägiger militärischer Konflikt im Libanon, in Nordisrael und auf den Golanhöhen. Die Hauptparteien waren die paramilitärischen Kräfte der Hisbollah und die Israelischen Verteidigungsstreitkräfte (IDF). Der Konflikt begann am 12. Juli 2006 und dauerte bis zum Inkrafttreten eines von den Vereinten Nationen vermittelten Waffenstillstands am Morgen des 14. August 2006. Er endete jedoch offiziell am 8. September 2006, als Israel seine Seeblockade des Libanon aufhob. Aufgrund der beispiellosen iranischen Militärunterstützung für die Hisbollah vor und während des Krieges betrachten manche ihn eher als erste Runde des iranisch-israelischen Stellvertreterkonflikts denn als Fortsetzung des arabisch-israelischen Konflikts."
roncw_warnews.285.a:1 "Beunruhigend ..."

roncw_warnews.286.t:0 "Libyscher Bürgerkrieg"
roncw_warnews.286.d:0 "Der Erste Libysche Bürgerkrieg war ein bewaffneter Konflikt im Jahr 2011 in dem nordafrikanischen Land Libyen, der zwischen den Truppen von Oberst Muammar Gaddafi und von ausländischen Truppen unterstützten Gruppen ausgetragen wurde, die seine Regierung stürzen wollten. Er brach mit der Libyschen Revolution aus, die auch als Revolution des 17. Februar bekannt ist. Dem Krieg gingen Proteste in Zawiya am 8. August 2009 voraus und entzündete sich schließlich am Dienstag, dem 15. Februar 2011, an den Protesten in Bengasi, die zu Zusammenstößen mit Sicherheitskräften führten, die auf die Menge schossen."
roncw_warnews.286.a:1 "Beunruhigend ..."

roncw_warnews.287.t:0 "Libyscher Bürgerkrieg"
roncw_warnews.287.d:0 "Der Allgemeine Nationalkongress mit Sitz im Westen Libyens, der von verschiedenen Milizen sowie teilweise auch von Katar und der Türkei unterstützt wird, akzeptierte zunächst die Ergebnisse der Wahlen von 2014, lehnte sie jedoch ab, nachdem das Oberste Verfassungsgericht eine Änderung des Fahrplans für Libyens Übergangsphase und die Wahlen zum Repräsentantenhaus für ungültig erklärt hatte. Das Repräsentantenhaus (oder Abgeordnetenrat) kontrolliert Ost- und Zentrallibyen und genießt die Loyalität der Libyschen Nationalarmee. Es wird durch Luftangriffe Ägyptens und der Vereinigten Arabischen Emirate unterstützt."
roncw_warnews.287.a:1 "Beunruhigend ..."

roncw_warnews.288.t:0 "M23-Rebellion"
roncw_warnews.288.d:0 "Der M23-Aufstand war ein Kampf zwischen der Bewegung des 23. März und Regierungstruppen in Nord-Kivu in der Demokratischen Republik Kongo (DR Kongo). Der Aufstand war Teil der anhaltenden Kämpfe in der Region nach dem formellen Ende des Zweiten Kongo-Krieges im Jahr 2003. Er brach 2012 aus und dauerte bis 2013 an, als ein Friedensabkommen zwischen elf afrikanischen Nationen geschlossen wurde und die M23-Truppen in Uganda kapitulierten."
roncw_warnews.288.a:1 "Beunruhigend ..."

roncw_warnews.289.t:0 "Schlacht von Marawi"
roncw_warnews.289.d:0 "Nach Angaben der philippinischen Regierung begannen die Zusammenstöße während einer Offensive in Marawi zur Festnahme von Isnilon Hapilon, dem Anführer der ISIL-nahen Abu Sayyaf-Gruppe. Zuvor hatte man Berichte erhalten, Hapilon befinde sich in der Stadt, möglicherweise um sich mit Kämpfern der Maute-Gruppe zu treffen. Es kam zu einem tödlichen Feuergefecht, als Hapilons Truppen das Feuer auf die vereinten Armee- und Polizeiteams eröffneten und Verstärkung von der Maute-Gruppe anforderten. Die Maute-Gruppe ist eine bewaffnete Gruppe, die dem Islamischen Staat die Treue geschworen hat und laut Militärsprechern für den Bombenanschlag in Davao City 2016 verantwortlich sein soll."
roncw_warnews.289.a:1 "Beunruhigend ..."

roncw_warnews.290.t:0 "Mexikanischer Drogenkrieg"
roncw_warnews.290.d:0 "Der mexikanische Drogenkrieg ist das mexikanische Schauplatz des globalen Drogenkriegs unter Führung der US-Regierung. Er führt zu einem anhaltenden asymmetrischen Konflikt niedriger Intensität zwischen der mexikanischen Regierung und verschiedenen Drogensyndikaten. Als das mexikanische Militär 2006 einzugreifen begann, bestand das Hauptziel der Regierung darin, die drogenbedingte Gewalt einzudämmen. Die mexikanische Regierung betonte, ihr Hauptaugenmerk liege auf der Zerschlagung der mächtigen Drogenkartelle und der Eindämmung der Drogennachfrage, gemeinsam mit den US-Funktionären."
roncw_warnews.290.a:1 "Beunruhigend ..."

roncw_warnews.291.t:0 "Zusammenstöße zwischen Gaza und Israel"
roncw_warnews.291.d:0 "Eine Eskalation des Konflikts zwischen Gaza und Israel begann am 3. Mai 2019, nachdem zwei israelische Soldaten während der wöchentlichen Proteste an der Grenze zwischen Gaza und Israel durch Scharfschützenfeuer aus dem Gazastreifen verletzt worden waren. Als Reaktion darauf führte die israelische Luftwaffe einen Luftangriff durch, bei dem zwei Palästinenser getötet wurden. Anschließend wurden Hunderte von Raketen aus Gaza auf Israel abgefeuert, während die israelische Luftwaffe zahlreiche Ziele im Gazastreifen angriff. Darüber hinaus verstärkte Israel seine Truppenpräsenz nahe der Sperranlage."
roncw_warnews.291.a:1 "Beunruhigend ..."

roncw_warnews.292.t:0 "Aufstand am Mount Elgon"
roncw_warnews.292.d:0 "Der Aufstand am Mount Elgon war ein Konflikt, der 2005 begann, als die Miliz der Sabaot Land Defence Force in der Region Mount Elgon im Westen Kenias revoltierte."
roncw_warnews.292.a:1 "Beunruhigend ..."

roncw_warnews.293.t:0 "Bergkarabach-Konflikt"
roncw_warnews.293.d:0 "Der Bergkarabach-Konflikt 2020 ist ein andauernder bewaffneter Konflikt zwischen Aserbaidschan, unterstützt von der Türkei, und der selbsternannten Republik Arzach, unterstützt von Armenien, in der umstrittenen Region Bergkarabach. Es handelt sich um die jüngste Eskalation des ungelösten Bergkarabach-Konflikts um das Gebiet, das international als Teil Aserbaidschans anerkannt ist, aber größtenteils von Arzach regiert wird, einem abtrünnigen Staat mit armenischer ethnischer Mehrheit."
roncw_warnews.293.a:1 "Beunruhigend ..."

roncw_warnews.294.t:0 "Konflikt im Nigerdelta"
roncw_warnews.294.d:0 "Der Nigerdelta-Konflikt von 2016 ist ein andauernder Konflikt in der nigerianischen Nigerdelta-Region, bei dem es um die Abspaltung der Region geht, die Teil des abtrünnigen Staates Biafra war. Er folgt auf immer wiederkehrende Konflikte im christlich geprägten südlichen Nigerdelta in den vorangegangenen Jahren sowie auf einen Aufstand im muslimisch geprägten Nordosten."
roncw_warnews.294.a:1 "Beunruhigend ..."

roncw_warnews.295.t:0 "Zusammenstöße im Norden des Rakhaing-Staates"
roncw_warnews.295.d:0 "Im Norden des Bundesstaates Rakhine in Myanmar kommt es seit Oktober 2016 zu gewaltsamen Zusammenstößen. Aufständische Angriffe der Arakan Rohingya Salvation Army (ARSA) führten zu konfessioneller Gewalt, die von Myanmars Militär und der lokalen buddhistischen Bevölkerung gegen überwiegend muslimische Rohingya-Zivilisten verübt wurde. Der Konflikt löste internationale Empörung aus und wurde vom Hohen Kommissar der Vereinten Nationen für Menschenrechte als ethnische Säuberung bezeichnet."
roncw_warnews.295.a:1 "Beunruhigend ..."

roncw_warnews.296.t:0 "Mali-Krieg"
roncw_warnews.296.d:0 "Der Mali-Krieg ist ein andauernder bewaffneter Konflikt zwischen dem Norden und Süden Malis in Afrika, der im Januar 2012 begann. Am 16. Januar 2012 begannen mehrere aufständische Gruppen einen Feldzug gegen die malische Regierung für die Unabhängigkeit oder größere Autonomie Nordmalis, genannt Azawad. Die Nationale Bewegung zur Befreiung des Azawad (MNLA), eine Organisation, die für die Unabhängigkeit dieser malischen Region als Heimat der Tuareg kämpft, hatte im April 2012 die Kontrolle über die Region übernommen."
roncw_warnews.296.a:1 "Beunruhigend ..."

roncw_warnews.297.t:0 "Operation Juniper Shield"
roncw_warnews.297.d:0 "Die Operation Juniper Shield, früher bekannt als Operation Enduring Freedom – Trans Sahara (OEF-TS), ist eine Militäroperation der USA und ihrer Partnernationen in der Sahara/Sahelzone Afrikas. Sie umfasst Maßnahmen zur Terrorismusbekämpfung und zur Bekämpfung des Waffen- und Drogenhandels in Zentralafrika. Sie ist Teil des Globalen Krieges gegen den Terrorismus (GWOT). Die andere OEF-Mission in Afrika ist die Operation Enduring Freedom – Horn von Afrika (OEF-HOA)."
roncw_warnews.297.a:1 "Beunruhigend ..."

roncw_warnews.298.t:0 "Operation Linda Nchi"
roncw_warnews.298.d:0 "Bei der Operation Linda Nchi marschierten die kenianischen Streitkräfte ab 2011 in den Süden Somalias ein. Die kenianische Regierung erklärte die Operation im März 2012 für beendet, ihre Streitkräfte schlossen sich jedoch der AMISOM in Somalia an und werden voraussichtlich nicht vor 2020 abziehen."
roncw_warnews.298.a:1 "Beunruhigend ..."

roncw_warnews.299.t:0 "Operation Verbrannte Erde"
roncw_warnews.299.d:0 "Operation Verbrannte Erde war der Deckname einer jemenitischen Militäroffensive im nördlichen Gouvernement Saada, die im August 2009 begann. Sie markierte die fünfte Welle der Gewalt im anhaltenden Aufstand der Houthis gegen die Regierung. Im November 2009 weitete sich der Konflikt über die Grenze auf das benachbarte Saudi-Arabien aus. Dieser Konflikt führte zum Einmarsch des saudischen Militärs in den Jemen, der ersten Militäroperation Saudi-Arabiens seit 1991."
roncw_warnews.299.a:1 "Beunruhigend ..."

roncw_warnews.300.t:0 "Aufstand in Paraguay"
roncw_warnews.300.d:0 "Der Aufstand in Paraguay, auch bekannt als Aufstand der Paraguayischen Volksarmee und EPP-Rebellion (nach dem spanischen Namen der Gruppe „Ejército del Pueblo Paraguayo“), ist ein andauernder bewaffneter Konflikt niedriger Intensität im Nordosten Paraguays. Zwischen 2005 und Sommer 2014 forderte die anhaltende EPP-Kampagne insgesamt mindestens 50 Todesopfer, die meisten davon lokale Viehzüchter, private Sicherheitskräfte und Polizisten sowie mehrere Aufständische. Im selben Zeitraum verübte die Gruppe 28 Entführungen gegen Lösegeld und insgesamt 85 „Gewalttaten“."
roncw_warnews.300.a:1 "Beunruhigend ..."

roncw_warnews.301.t:0 "Krise am Persischen Golf"
roncw_warnews.301.d:0 "Die Golfkrise 2019–2020 ist eine Verschärfung der militärischen Spannungen zwischen der Islamischen Republik Iran und ihren Verbündeten sowie den Vereinigten Staaten von Amerika und ihren Verbündeten in der Golfregion. Die USA begannen mit dem Ausbau ihrer Militärpräsenz in der Region, um eine angeblich geplante Kampagne des Iran und seiner nichtstaatlichen Verbündeten zum Angriff auf amerikanische Streitkräfte und Interessen im Persischen Golf und im Irak abzuwehren."
roncw_warnews.301.a:1 "Beunruhigend ..."

roncw_warnews.302.t:0 "Peruanische politische Krise"
roncw_warnews.302.d:0 "Die peruanische politische Krise des Jahres 2009 war auf den anhaltenden Widerstand der einheimischen Ureinwohner gegen die Ölförderung im peruanischen Amazonasgebiet zurückzuführen. Sie protestierten gegen Petroperú und stellten sich der Nationalpolizei entgegen. An vorderster Front der Widerstandsbewegung stand die Asociación Interétnica de Desarrollo de la Selva (AIDESEP), ein Zusammenschluss indigener Gemeinschaftsorganisationen der Region."
roncw_warnews.302.a:1 "Beunruhigend ..."

roncw_warnews.303.t:0 "Unruhen in Qatif"
roncw_warnews.303.d:0 "Die Unruhen in Qatif 2017–2020 sind eine (Stand 2020) andauernde Konfliktphase in der Region Qatif in der Ostprovinz Saudi-Arabiens zwischen saudischen Sicherheitskräften und der örtlichen schiitischen Gemeinschaft, die ab 1979 sporadisch auftrat und eine Reihe von Protesten und Repressionen während der saudi-arabischen Proteste 2011–12 umfasste."
roncw_warnews.303.a:1 "Beunruhigend ..."

roncw_warnews.304.t:0 "RENAMO-Aufstand"
roncw_warnews.304.d:0 "Der RENAMO-Aufstand war ein Guerillafeldzug von Kämpfern der RENAMO-Partei in Mosambik. Der Aufstand gilt weithin als Nachbeben des mosambikanischen Bürgerkriegs. Er führte zu erneuten Spannungen zwischen der RENAMO und der regierenden FRELIMO-Koalition in Mosambik wegen Korruptionsvorwürfen im Staat und der umstrittenen Ergebnisse der Parlamentswahlen von 2014."
roncw_warnews.304.a:1 "Beunruhigend ..."

roncw_warnews.305.t:0 "Russisch-Georgischer Krieg"
roncw_warnews.305.d:0 "Der Russisch-Georgische Krieg war ein Krieg zwischen Georgien, Russland und den von Russland unterstützten selbsternannten Republiken Südossetien und Abchasien. Der Krieg fand im August 2008 statt, nachdem sich die Beziehungen zwischen Russland und Georgien, beides ehemalige Teilrepubliken der Sowjetunion, verschlechtert hatten. Die Kämpfe fanden in der strategisch wichtigen Region Transkaukasien statt. Er gilt als der erste europäische Krieg des 21. Jahrhunderts."
roncw_warnews.305.a:1 "Beunruhigend ..."

roncw_warnews.306.t:0 "Konfessionell motivierte Gewalt im Irak"
roncw_warnews.306.d:0 "Die konfessionelle Gewalt im Irak, auch als Irakischer Bürgerkrieg bezeichnet, war ein umfassender Bürgerkrieg zwischen sunnitischen und schiitischen Militanten sowie den mit der US-geführten Koalition verbündeten irakischen Streitkräften und eine Phase des Irak-Krieges. Nach der US-Invasion im Irak 2003 kam es zu gewaltsamen Auseinandersetzungen zwischen sunnitischen und schiitischen Fraktionen im Irak. Im Februar 2006 verübte die sunnitische Organisation Al-Qaida im Irak einen Bombenanschlag auf eine der heiligsten Stätten des schiitischen Islam – die Al-Askari-Moschee in Samarra. Dies löste eine Welle schiitischer Vergeltungsschläge gegen Sunniten aus, gefolgt von sunnitischen Gegenangriffen."
roncw_warnews.306.a:1 "Beunruhigend ..."

roncw_warnews.307.t:0 "Schiitischer Aufstand in Bahrain"
roncw_warnews.307.d:0 "Bei dem schiitischen Aufstand in Bahrain handelt es sich um einen andauernden Aufstand militanter schiitischer Gruppen, die vom Iran unterstützt werden und darauf abzielen, die sunnitische Minderheitsregierung Bahrains zu stürzen."
roncw_warnews.307.a:1 "Beunruhigend ..."

roncw_warnews.308.t:0 "Terroranschläge auf der Sinai-Halbinsel"
roncw_warnews.308.d:0 "Bei den Sinai-Terroranschlägen handelt es sich um anhaltende Terroranschläge auf der Sinai-Halbinsel in Ägypten, die von islamistischen Militanten gegen die ägyptischen Sicherheitskräfte verübt wurden und bei denen es auch zu Angriffen auf Zivilisten kam. Der Aufstand begann nach dem Beginn der Ägyptenkrise, die im Zuge der ägyptischen Revolution von 2011 zum Sturz des langjährigen ägyptischen Präsidenten Hosni Mubarak führte."
roncw_warnews.308.a:1 "Beunruhigend ..."

roncw_warnews.309.t:0 "Aufstand in Sistan und Belutschistan"
roncw_warnews.309.d:0 "Der Aufstand in Sistan und Belutschistan, Teil des Belutschistan-Konflikts, begann ungefähr im Jahr 2004"
roncw_warnews.309.a:1 "Beunruhigend ..."

roncw_warnews.310.t:0 "Somalischer Bürgerkrieg"
roncw_warnews.310.d:0 "Die Phase des somalischen Bürgerkriegs von 2009 bis heute konzentriert sich auf Süd- und Zentralsomalia sowie Teile Nordostkenias. Er begann Anfang Februar 2009 mit dem Konflikt zwischen den Streitkräften der somalischen Bundesregierung, unterstützt von Friedenstruppen der Afrikanischen Union, und verschiedenen militanten Gruppen und Fraktionen. Die Gewalt hat Tausende Menschen im Süden des Landes vertrieben. Im Zuge des Konflikts kam es auch zu Kämpfen zwischen der Sufi-Miliz Ahlu Sunna Waljama&#39;a und Al-Shabaab."
roncw_warnews.310.a:1 "Beunruhigend ..."

roncw_warnews.311.t:0 "Südsudanesischer Bürgerkrieg"
roncw_warnews.311.d:0 "Der südsudanesische Bürgerkrieg (15. Dezember 2013 – 22. Februar 2020) war ein Konflikt im Südsudan zwischen Regierungstruppen und Oppositionskräften. Im Dezember 2013 beschuldigte Präsident Kiir seinen ehemaligen Stellvertreter Riek Machar und zehn weitere Personen, einen Putschversuch unternommen zu haben. Machar bestritt den Putschversuch und floh, um die oppositionelle SPLM (SPLM-IO) anzuführen. Es kam zu Kämpfen zwischen der Sudanesischen Volksbefreiungsbewegung (SPLM) und der SPLM-IO, die den Bürgerkrieg auslösten. Ugandische Truppen wurden entsandt, um an der Seite der südsudanesischen Regierung zu kämpfen. Die Vereinten Nationen haben im Rahmen der Mission der Vereinten Nationen im Südsudan (UNMISS) Friedenstruppen im Land."
roncw_warnews.311.a:1 "Beunruhigend ..."

roncw_warnews.312.t:0 "Aufstand im Südjemen"
roncw_warnews.312.d:0 "Der Aufstand im Südjemen bestand aus einer Reihe von Protesten und Angriffen auf Regierungstruppen im Süden des Landes zwischen 2009 und 2014. Obwohl die Gewalt Elementen innerhalb der Sezessionsbewegung des Südjemen angelastet wurde, beharrten die Anführer der Gruppe darauf, ihr Unabhängigkeitsziel mit friedlichen Mitteln zu erreichen, und behaupteten, die Angriffe seien von einfachen Bürgern als Reaktion auf die provokativen Aktionen der Regierung erfolgt. Der Aufstand ereignete sich inmitten des schiitischen Aufstands im Norden des Landes, der von den Huthi-Gemeinden angeführt wurde. Nach der Vereinigung des Südjemen führten die Anführer des Südjemen 1994 eine kurze, erfolglose Sezession an. Viele von ihnen waren an der Sezessionsbewegung beteiligt. Die separatistischen Aufständischen des Südjemen waren hauptsächlich im ehemaligen Südjemen aktiv, aber auch im Gouvernement Ad Dali‘, das nicht Teil des unabhängigen Südstaates war."
roncw_warnews.312.a:1 "Beunruhigend ..."

roncw_warnews.313.t:0 "Sudanesischer Konflikt in Südkordofan und Blauem Nil"
roncw_warnews.313.d:0 "Der sudanesische Konflikt in Südkordofan und Blauer Nil ist ein bewaffneter Konflikt in den sudanesischen Südstaaten Südkordofan und Blauer Nil zwischen der Sudanesischen Armee (SAF) und der Sudanesischen Volksbefreiungsbewegung Nord (SPLM-N), einem nördlichen Ableger der Sudanesischen Volksbefreiungsbewegung (SPLM) im Südsudan. Nach einigen Jahren relativer Ruhe nach dem Abkommen von 2005, das den zweiten sudanesischen Bürgerkrieg zwischen der sudanesischen Regierung und den SPLM-Rebellen beendete, brachen im Vorfeld der Unabhängigkeit Südsudans am 9. Juli 2011 erneut Kämpfe aus. Sie begannen am 5. Juni in Südkordofan und griffen im September auf den benachbarten Bundesstaat Blauer Nil über. Die SPLM-N, eine Abspaltung von der gerade unabhängig gewordenen SPLM, griff zu den Waffen, um gegen die Eingliederung der beiden Südstaaten in den Sudan ohne Volksbefragung und gegen das Fehlen demokratischer Wahlen zu kämpfen."
roncw_warnews.313.a:1 "Beunruhigend ..."

roncw_warnews.314.t:0 "Konflikte sudanesischer Nomaden"
roncw_warnews.314.d:0 "udanische Nomadenkonflikte sind nichtstaatliche Konflikte zwischen rivalisierenden Nomadenstämmen, die im Sudan und seit 2011 auch im Südsudan stattfinden. Konflikte zwischen Nomadenstämmen im Sudan sind weit verbreitet und führen zu Kämpfen um knappe Ressourcen wie Weideland, Vieh und Trinkwasser. Zu den an diesen Zusammenstößen beteiligten Stämmen gehören die arabischen Stämme Messiria, Maalia, Rizeigat und Bani Hussein, die in Darfur und Westkordofan leben, sowie die afrikanischen Volksgruppen Dinka, Nuer und Murle, die im Südsudan leben. Die Konflikte wurden durch andere große Kriege in denselben Regionen angeheizt, insbesondere durch den Zweiten Sudanesischen Bürgerkrieg, den Krieg in Darfur und die sudanesischen Konflikte in Südkordofan und Blauem Nil."
roncw_warnews.314.a:1 "Beunruhigend ..."

roncw_warnews.315.t:0 "Syrischer Bürgerkrieg"
roncw_warnews.315.d:0 "Der syrische Bürgerkrieg ist ein andauernder Bürgerkrieg mit mehreren Seiten in Syrien, der zwischen der Baath-Partei der Arabischen Republik Syrien unter der Führung des syrischen Präsidenten Bashar al-Assad und ihren in- und ausländischen Verbündeten sowie verschiedenen in- und ausländischen Kräften ausgetragen wird, die sich in unterschiedlichen Kombinationen sowohl der syrischen Regierung als auch einander widersetzen."
roncw_warnews.315.a:1 "Beunruhigend ..."

roncw_warnews.316.t:0 "Auswirkungen des syrischen Bürgerkriegs auf den Libanon"
roncw_warnews.316.d:0 "Zwischen 2011 und 2017 griffen die Kämpfe des syrischen Bürgerkriegs auf den Libanon über, als Gegner und Anhänger der Arabischen Republik Syrien in den Libanon reisten, um sich auf libanesischem Boden gegenseitig zu bekämpfen und anzugreifen. Der Syrienkonflikt führte zu einem Wiederaufflammen konfessionell motivierter Gewalt im Libanon. Viele sunnitische Muslime im Libanon unterstützten die Rebellen in Syrien, während viele schiitische Muslime im Libanon die syrische Regierung unter Baschar al-Assad unterstützten, dessen alawitische Minderheit gemeinhin als Ableger des schiitischen Islams bezeichnet wird. Im gesamten Libanon kam es zu Morden, Unruhen und konfessionell motivierten Entführungen."
roncw_warnews.316.a:1 "Beunruhigend ..."

roncw_warnews.317.t:0 "Aufstand in Tadschikistan"
roncw_warnews.317.d:0 "Der tadschikische Aufstand war ein militärischer Konflikt im Osten Tadschikistans zwischen der tadschikischen Armee und islamistischen Militanten, angeführt von zahlreichen Anführern aus dem tadschikischen Bürgerkrieg. Der Konflikt entwickelte sich 2010 und erreichte 2012 mit der Niederlage der wichtigsten Rebellentruppen seinen Höhepunkt. Weitere Vorfälle ereigneten sich im September 2015, als der ehemalige stellvertretende Verteidigungsminister Abduhalim Nazarzoda einen bewaffneten Aufstand anführte, dem Verbindungen zur Islamischen Renaissance-Partei verdächtigt wurden."
roncw_warnews.317.a:1 "Beunruhigend ..."

roncw_warnews.318.t:0 "Pool War"
roncw_warnews.318.d:0 "Der Poolkrieg war ein Konflikt zwischen der Republik Kongo und der Ninja-Miliz im Departement Pool, einem Departement im Südosten des Landes. Die Spannungen zwischen Frédéric Bintsamou (auch bekannt als Pastor Ntumi) und dem kongolesischen Präsidenten Denis Sassou-Nguesso nahmen zu, nachdem Bintsamou Verfassungsänderungen angefochten hatte. Bintsamou war früher ein Kollaborateur von Sassou-Nguesso."
roncw_warnews.318.a:1 "Beunruhigend ..."

roncw_warnews.319.t:0 "Tuareg-Aufstand"
roncw_warnews.319.d:0 "Der Tuareg-Aufstand von 2007–2009 war ein Aufstand, der im Februar 2007 unter Teilen des in der Sahara im Norden Malis und Nigers lebenden Volkes begann. Er ist Teil einer Reihe von Aufständen ehemals nomadischer Tuareg-Bevölkerungen, die zuletzt Mitte der 1990er Jahre auftraten und mindestens bis 1916 zurückreichen. Bevölkerungsgruppen, die in den 1990er Jahren nach Algerien und Libyen sowie in den Süden Nigers und Malis verstreut waren, kehrten erst Ende der 1990er Jahre zurück. Ehemalige Kämpfer sollten in die nationalen Streitkräfte integriert werden, doch dieser Prozess verlief langsam und führte zu zunehmendem Unmut."
roncw_warnews.319.a:1 "Beunruhigend ..."

roncw_warnews.320.t:0 "Catatumbo-Kampagne"
roncw_warnews.320.d:0 "Die Catatumbo-Kampagne ist eine seit Januar 2018 andauernde Phase strategischer Gewalt zwischen Milizen in der kolumbianischen und venezolanischen Region Catatumbo. Sie ist eine Fortsetzung des Drogenkriegs und entwickelte sich nach dem kolumbianischen Friedensprozess von 2016. Der Krieg wurde im August 2019 nach einer Untersuchung von Human Rights Watch (HRW) offiziell bekannt gegeben. Kolumbianische Medien berichten, dass schätzungsweise 145.000 Menschen direkt von dem Krieg betroffen sind, HRW schätzt die Zahl auf 300.000."
roncw_warnews.320.a:1 "Beunruhigend ..."

roncw_warnews.321.t:0 "Krieg in Darfur"
roncw_warnews.321.d:0 "Der Darfur-Krieg, auch Land Cruiser-Krieg genannt, ist ein schwerer bewaffneter Konflikt in der sudanesischen Region Darfur. Er begann im Februar 2003, als die Rebellengruppen Sudanesische Befreiungsbewegung (SLM) und Gerechtigkeits- und Gleichheitsbewegung (JEM) begannen, gegen die sudanesische Regierung zu kämpfen, der sie die Unterdrückung der nichtarabischen Bevölkerung Darfurs vorwarfen. Die Regierung reagierte auf die Angriffe mit einer ethnischen Säuberungskampagne gegen die nichtarabische Bevölkerung Darfurs. Dies führte zum Tod Hunderttausender Zivilisten und zur Anklage des sudanesischen Präsidenten Omar al-Bashir wegen Völkermord, Kriegsverbrechen und Verbrechen gegen die Menschlichkeit durch den Internationalen Strafgerichtshof."
roncw_warnews.321.a:1 "Beunruhigend ..."

roncw_warnews.322.t:0 "Krieg im Donbass"
roncw_warnews.322.d:0 "Der Krieg im Donbass ist ein bewaffneter Konflikt in der ukrainischen Donbass-Region und Teil der Ukraine-Krise sowie des umfassenderen Russisch-Ukrainischen Krieges. Seit Anfang März 2014, im Gefolge der ukrainischen Revolution 2014 und der Euromaidan-Bewegung, kam es in den Oblasten Donezk und Luhansk der Ukraine, die zusammen als „Donbass“ bezeichnet werden, zu Protesten von von Russland unterstützten regierungsfeindlichen Separatistengruppen. Diese Demonstrationen, die auf die Annexion der Krim durch die Russische Föderation im Februar/März 2014 folgten und Teil einer größeren Gruppe gleichzeitiger Proteste in der Süd- und Ostukraine waren, eskalierten zu einem bewaffneten Konflikt zwischen den separatistischen Kräften der selbsternannten Volksrepubliken Donezk und Luhansk (DVR bzw. LVR) und der ukrainischen Regierung."
roncw_warnews.322.a:1 "Beunruhigend ..."

roncw_warnews.323.t:0 "Krieg in Inguschetien"
roncw_warnews.323.d:0 "Am 26. Juli 2007 wurde in Inguschetien eine massive Sicherheitsoperation gestartet. Auslöser war eine Reihe von Anschlägen, darunter ein Attentat auf Präsident Murat Sjasikow fünf Tage zuvor. Moskau entsandte zusätzliche 2.500 MWD-Soldaten und verdreifachte damit fast die Zahl der Spezialkräfte in Inguschetien."
roncw_warnews.323.a:1 "Beunruhigend ..."

roncw_warnews.324.t:0 "Aufstand in Khyber Pakhtunkhwa"
roncw_warnews.324.d:0 "Der Aufstand in Khyber Pakhtunkhwa, auch bekannt als Krieg im Nordwesten Pakistans, ist ein bewaffneter Konflikt, an dem Pakistan und bewaffnete militante Gruppen wie die Tehrik-i-Taliban Pakistan (TTP), Jundallah, Lashkar-e-Islam (LeI), TNSM, al-Qaida und ihre zentralasiatischen Verbündeten wie ISIL-Khorasan (ISIL), die Islamische Bewegung Usbekistans, die Ostturkistan-Bewegung, das Emirat Kaukasus sowie Elemente der organisierten Kriminalität beteiligt sind."
roncw_warnews.324.a:1 "Beunruhigend ..."

roncw_warnews.325.t:0 "Somalia-Krieg"
roncw_warnews.325.d:0 "Der Somaliakrieg, die äthiopische Invasion Somalias oder die äthiopische Intervention im somalischen Bürgerkrieg war ein bewaffneter Konflikt, an dem hauptsächlich äthiopische und somalische Streitkräfte der Übergangsregierung (TFG) sowie somalische Truppen aus Puntland gegen die somalische islamistische Dachorganisation Islamic Court Union (ICU) und andere angeschlossene Milizen um die Kontrolle des Landes kämpften. Der Krieg begann offiziell kurz vor dem 20. Juli 2006, als von den USA unterstützte äthiopische Truppen in Somalia einmarschierten, um die Übergangsregierung in Baidoa zu unterstützen."
roncw_warnews.325.a:1 "Beunruhigend ..."

roncw_warnews.326.t:0 "Aufstand im westlichen Togoland"
roncw_warnews.326.d:0 "Der Westtogoland-Aufstand ist ein anhaltender separatistischer Aufstand der nationalistischen Ewe-Front zur Wiederherstellung Westtogolands gegen die Regierung Ghanas, die die Unabhängigkeit des ehemaligen Britisch-Togoland anstrebt."
roncw_warnews.326.a:1 "Beunruhigend ..."

roncw_warnews.327.t:0 "Jemenitischer Bürgerkrieg"
roncw_warnews.327.d:0 "Der jemenitische Bürgerkrieg ist ein andauernder Konflikt mit vielen Seiten, der Ende 2014 begann. Er wird hauptsächlich zwischen zwei Fraktionen ausgetragen: der von Abdrabbuh Mansur Hadi geführten jemenitischen Regierung und der bewaffneten Huthi-Bewegung sowie deren Anhängern und Verbündeten. Beide erheben den Anspruch, die offizielle Regierung des Jemen zu bilden."
roncw_warnews.327.a:1 "Beunruhigend ..."

roncw_warnews.328.t:0 "Krise in Zamboanga City"
roncw_warnews.328.d:0 "Die Zamboanga City-Krise oder Zamboanga-Belagerung war ein bewaffneter Konflikt in Zamboanga City, Philippinen, zwischen den Streitkräften der philippinischen Regierung und einer Fraktion der Moro National Liberation Front, die von anderen Fraktionen allgemein als Rogue MNLF Elements (RME) unter dem Sulu State Revolutionary Command (SSRC) unter der Führung von Ustadz Habier Malik und Khaid Ajibon bekannt ist, dessen Gruppe Nur Misuari weiterhin als MNLF-Vorsitzenden anerkennt."
roncw_warnews.328.a:1 "Beunruhigend ..."

ron_coupnews.1.t:0 "Putsch in [From.GetName]"
ron_coupnews.1.d:0 "Ein Staatsstreich ist die Absetzung einer bestehenden Regierung, meist mit Gewalt. Typischerweise handelt es sich um eine illegale, verfassungswidrige Machtergreifung durch eine politische Fraktion, das Militär oder einen Diktator. Viele Wissenschaftler betrachten einen Staatsstreich als erfolgreich, wenn die Usurpatoren die Macht ergreifen und mindestens sieben Tage lang halten."
ron_coupnews.1.a:1 "Beunruhigend ..."

