CW_Expansion_country.405.t:0 "Demonstrationen in Georgien"
CW_Expansion_country.405.d:0 "Die Demonstrationen vom März 1956 (auch bekannt als Tiflis-Unruhen 1956 oder Massaker vom 9. März) in der Georgischen SSR waren eine Reihe von Protesten gegen Nikita Chruschtschows Entstalinisierungspolitik, die georgische Anhänger der stalinistischen Ideologie schockierten. Zentrum der Proteste war die Republikhauptstadt Tiflis, wo spontane Kundgebungen zum dritten Todestag Stalins und gegen Chruschtschows Verurteilung Stalins schnell zu unkontrollierbaren Massendemonstrationen und Unruhen wurden, die die Stadt lahmlegten. Bald wurden politische Forderungen wie ein Machtwechsel in Moskau und die Unabhängigkeit Georgiens von der Sowjetunion laut."
CW_Expansion_country.405.a:1 "OK"
