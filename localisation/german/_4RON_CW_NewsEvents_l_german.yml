CW_Expansion_country.132.t:0 "Miranda entdeckt"
CW_Expansion_country.132.d:0 "Miranda wurde am 16. Februar 1948 von Gerard P. Kuiper am McDonald-Observatorium im Westen von Texas auf Teleskopaufnahmen des Uranussystems entdeckt. Es war der letzte Mond des Uranus, der vor dem Besuch von Voyager 2 im Jahr 1986 entdeckt wurde."
