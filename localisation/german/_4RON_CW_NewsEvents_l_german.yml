CW_Expansion_country.356.t:0 "Herr der Fliegen veröffentlicht"
CW_Expansion_country.356.d:0 "Herr der Fliegen ist ein Roman des britischen Nobelpreisträgers William Golding aus dem Jahr 1954. Die Handlung dreht sich um eine Gruppe britischer Jungen, die auf einer einsamen Insel stranden, und ihre verheerenden Versuche, sich selbst zu regieren. Themen sind die Spannung zwischen Gruppendenken und Individualität, zwischen rationalen und emotionalen Reaktionen sowie zwischen Moral und Unmoral. Der Roman, Goldings Debüt, wurde allgemein gut aufgenommen. Er wurde in die 100 besten Romane der Modern Library aufgenommen und erreichte Platz 41 auf der Herausgeberliste und Platz 25 auf der Leserliste. 2003 wurde er in der BBC-Umfrage „The Big Read“ auf Platz 70 geführt, und 2005 kürte ihn das Time Magazine zu einem der 100 besten englischsprachigen Romane, die zwischen 1923 und 2005 veröffentlicht wurden, und nahm ihn in seine Liste der 100 besten Jugendbücher aller Zeiten auf. „Herr der Fliegen“ ist eine beliebte Schullektüre, insbesondere im englischsprachigen Raum. In einer britischen Umfrage aus dem Jahr 2016 belegte es den dritten Platz unter den beliebtesten Schulbüchern der Nation."
CW_Expansion_country.356.a:1 "OK"
