CW_Expansion_country.121.t:0 "Ferenc Nagy ins Exil gezwungen"
CW_Expansion_country.121.d:0 "Nagy dokumentierte sein Leben und seine politische Karriere in dem 1948 von MacMillan veröffentlichten Buch „The Struggle behind the Iron Curtain“. Dank der Tantiemen aus seinen Memoiren konnte er ein Haus mit großem Garten in Herndon, Virginia (damals ein Vorort von Washington, D.C.) kaufen. Er engagierte sich stark in der Exilpolitik, war Mitglied des Ungarischen Exilkomitees und nahm 1955 als Beobachter im Auftrag der US-Regierung an der Bandung-Konferenz teil. Während des Ungarischen Unabhängigkeitskriegs 1956 versuchte er, in sein Heimatland zurückzukehren, wurde jedoch von den österreichischen Behörden daran gehindert, um die Neutralität ihres Landes zu wahren. 1959 soll er Präsident von Permindex gewesen sein, einer Handelsorganisation mit Sitz in Basel in der Schweiz. Von 1964 bis 1970 war er Präsident der Internationalen Bauernunion. In den 1960er Jahren lehrte er an verschiedenen amerikanischen Universitäten und erhielt Ehrendoktorwürden von der University of Berkeley und der Indiana University in Bloomington. Er zog sich 1970 aus dem aktiven politischen Leben zurück, sprach sich jedoch 1977 für die Rückgabe der Heiligen Krone Ungarns aus den Vereinigten Staaten an Ungarn aus. Er starb 1979 unerwartet auf seiner Farm in Herndon, als er eine Rückkehr in sein Heimatland plante."
CW_Expansion_country.121.a:1 "OK"
