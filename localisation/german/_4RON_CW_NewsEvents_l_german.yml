CW_Expansion_country.402.t:0 "Finnische Truppen besetzen Porkkala wieder"
CW_Expansion_country.402.d:0 "Der Marinestützpunkt Porkkala war ein sowjetischer Marinestützpunkt, der von 1944 bis 1956 in den Gemeinden Kirkkonummi, Ingå und Siuntio auf der Halbinsel Porkkala, 30 Kilometer westlich von Helsinki, der finnischen Hauptstadt, in Betrieb war. Das Gebiet wurde gemäß dem 1944 unterzeichneten Moskauer Waffenstillstand zwischen Finnland, der Sowjetunion und dem Vereinigten Königreich an die Sowjetunion verpachtet. Das Gebiet wurde 1956 an Finnland zurückgegeben und beherbergt derzeit einen finnischen Marinestützpunkt Upinniemi."
CW_Expansion_country.402.a:1 "OK"
