CW_Expansion_country.299.t:0 "Erstbesteigung des Nanga Parbat"
CW_Expansion_country.299.d:0 "Nanga Parbat, was so viel bedeutet wie „König der Berge“, ist der neunthöchste Berg der Erde. Sein Gipfel liegt 8.126 m über dem Meeresspiegel. Nanga Parbat liegt unmittelbar südöstlich der nördlichsten Biegung des Indus in der Region Gilgit-Baltistan im pakistanisch verwalteten Kaschmir und ist der westlichste Gipfel des Himalaya. In der traditionellen Sichtweise, dass der Himalaya durch die Flüsse Indus und Yarlung Tsangpo/Brahmaputra begrenzt wird, ist er der westliche Ankerpunkt des gesamten Gebirges."
CW_Expansion_country.299.a:1 "OK"
