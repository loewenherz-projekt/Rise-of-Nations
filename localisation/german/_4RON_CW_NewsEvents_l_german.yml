CW_Expansion_country.112.t:0 "Entgleisung der Hachikō-Linie"
CW_Expansion_country.112.d:0 "Die Entgleisung der Hachikō-Linie war ein schwerer Eisenbahnunfall mit Todesfolge, der sich am 25. Februar 1947 zwischen den Bahnhöfen Komagawa und Higashi-Hannō auf der Hachikō-Linie in Japan ereignete. Es war der schlimmste Eisenbahnunfall in Japan. Ein Personenzug der Japanese Government Railways (JGR), der von einer Dampflokomotive der Klasse C57 gezogen wurde und in Zugrichtung fuhr, entgleiste in einer scharfen Kurve, und vier Waggons überschlugen sich auf einem Feld. 184 Passagiere kamen ums Leben, 495 wurden verletzt. Später stellte sich heraus, dass die Entgleisung auf eine Kombination aus überhöhter Geschwindigkeit zurückzuführen war und die hohe Opferzahl auf die überfüllten hölzernen Personenwagen zurückzuführen war, die durch die starke Beanspruchung während des Krieges bereits abgenutzt waren. Die JGR nutzte die Gelegenheit, um vom Oberbefehlshaber der Alliierten die Genehmigung zu erhalten, innerhalb weniger Jahre alle hölzernen Personenwagen (damals waren etwa 3.000 im Einsatz) durch Wagen mit Stahlkarosserie zu ersetzen."
CW_Expansion_country.112.a:1 "OK"
