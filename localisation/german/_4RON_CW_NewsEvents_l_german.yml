CW_Expansion_country.466.t:0 "LG-Vorgänger in Südkorea gegründet"
CW_Expansion_country.466.d:0 "LG Electronics Inc. ist ein südkoreanischer multinationaler Elektronikkonzern mit Hauptsitz in Yeouido-dong, Seoul, Südkorea. LG Electronics ist Teil der LG Corporation, dem viertgrößten Chaebol Südkoreas, und wird mit seiner Chemie- und Batteriesparte LG Chem oft als Speerspitze der LG Corp. angesehen. LG Electronics umfasst vier Geschäftsbereiche: Home Entertainment, Mobilkommunikation, Haushaltsgeräte &amp; Luftlösungen sowie Fahrzeugkomponenten. LG Electronics übernahm 1995 Zenith und war 2020 der größte Anteilseigner von LG Display, dem umsatzstärksten Display-Unternehmen der Welt. LG Electronics ist zudem nach Samsung Electronics der zweitgrößte TV-Hersteller der Welt. Das Unternehmen unterhält weltweit 128 Niederlassungen und beschäftigt 83.000 Mitarbeiter."
CW_Expansion_country.466.a:1 "OK"
