CW_Expansion_country.216.t:0 "Nepalesische Revolution"
CW_Expansion_country.216.d:0 "Die Revolution von 1951 war eine politische Bewegung gegen die 104 Jahre andauernde Direktherrschaft der Rana-Dynastie in Nepal. Sie markierte den Beginn des politischen Erwachens und der demokratischen Bewegungen in Nepal und führte zur sofortigen Abschaffung des institutionalisierten erblichen Premierministersystems in Nepal."
