CW_Expansion_country.419.t:0 "Film „Zehn Gebote“ veröffentlicht"
CW_Expansion_country.419.d:0 "Die Zehn Gebote ist ein US-amerikanisches religiöses Drama aus dem Jahr 1956, das von Cecil B. DeMille produziert, inszeniert und erzählt wurde. Gedreht wurde es in VistaVision (Farbe von Technicolor) und veröffentlicht wurde es von Paramount Pictures. Basierend auf dem Roman Der Prinz von Ägypten von Dorothy Clarke Wilson aus dem Jahr 1949, dem Roman Feuersäule von JH Ingraham aus dem Jahr 1859, dem Roman Auf Adlerschwingen von AE Southon aus dem Jahr 1937 und dem Buch Exodus dramatisiert Die Zehn Gebote die biblische Geschichte des Lebens von Moses, einem adoptierten ägyptischen Prinzen, der zum Befreier seiner wahren Brüder, der versklavten Hebräer, wird und danach den Exodus zum Berg Sinai führt, wo er von Gott die Zehn Gebote empfängt. In den Hauptrollen des Films sind Charlton Heston, Yul Brynner als Ramses, Anne Baxter als Nefretiri, Edward G. Robinson als Dathan, Yvonne De Carlo als Sephora, Debra Paget als Lilia und John Derek als Joshua zu sehen. Außerdem sind unter anderem Sir Cedric Hardwicke als Seti I, Nina Foch als Bithiah, Martha Scott als Yochabel, Judith Anderson als Memnet und Vincent Price als Baka zu sehen."
CW_Expansion_country.419.a:1 "OK"
