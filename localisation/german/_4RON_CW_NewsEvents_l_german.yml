CW_Expansion_country.126.t:0 "Der Krieg in Kaschmir beginnt"
CW_Expansion_country.126.d:0 "Seit 1947 befinden sich Indien und Pakistan in einem Konflikt um Kaschmir, eine mehrheitlich muslimische Region im äußersten Norden Indiens. Das gebirgige, 230.000 Quadratkilometer große Gebiet war einst ein Fürstenstaat. Heute wird es sowohl von Indien als auch von Pakistan beansprucht. Die Wurzeln des Konflikts liegen in der gemeinsamen Kolonialvergangenheit der beiden Länder. Vom 17. bis zum 20. Jahrhundert beherrschte Großbritannien den größten Teil des indischen Subkontinents, zunächst indirekt über die Britische Ostindien-Kompanie, ab 1858 dann direkt über die britische Krone. Mit der Zeit schwand Großbritanniens Macht über seine Kolonie, und eine wachsende nationalistische Bewegung bedrohte die schwindende Herrschaft der Krone."
CW_Expansion_country.126.a:1 "OK"
