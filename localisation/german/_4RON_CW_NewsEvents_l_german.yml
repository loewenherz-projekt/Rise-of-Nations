CW_Expansion_news.172.a:1 "OK"

CW_Expansion_country.173.t:0 "Letzte Kuomintang-Truppen kapitulieren auf dem chinesischen Festland"
CW_Expansion_country.173.d:0 "Die Kommunisten erlangten 1949 die Kontrolle über das chinesische Festland und gründeten die Volksrepublik China (VRC). Die Führung der Republik China musste sich daraufhin auf die Insel Taiwan zurückziehen. Seit den 1950er Jahren kam es zu einer anhaltenden politischen und militärischen Pattsituation zwischen beiden Seiten der Taiwanstraße. Sowohl die Republik China in Taiwan als auch die VRC in Festlandchina beanspruchten offiziell, die legitime Regierung Gesamtchinas zu sein. Nach der Zweiten Taiwankrise stellten beide Seiten 1979 stillschweigend den Waffenstillstand ein; ein Waffenstillstand oder Friedensvertrag wurde jedoch nie unterzeichnet."
CW_Expansion_country.173.a:1 "OK"
