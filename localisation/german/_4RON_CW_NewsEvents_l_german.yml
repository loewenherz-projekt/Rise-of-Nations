CW_Expansion_country.178.t:0 "Referendum über die belgische Monarchie"
CW_Expansion_country.178.d:0 "Am 12. März 1950 fand in Belgien ein Referendum über die Rückkehr von König Leopold III. nach Belgien und die Wiederherstellung seiner Macht und Pflichten als Monarch statt. Der Vorschlag wurde von 57,68 % der Wähler angenommen."
