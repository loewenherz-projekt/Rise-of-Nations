CW_Expansion_country.335.t:0 "Rede zur Dominotheorie"
CW_Expansion_country.335.d:0 "Präsident [USA.GetLeader] prägte einen der berühmtesten Sätze des Kalten Krieges, als er andeutete, dass der Fall Französisch-Indochinas an die Kommunisten einen „Dominoeffekt“ in Südostasien auslösen könnte. Die sogenannte „Dominotheorie“ dominierte das Denken der USA über Vietnam im nächsten Jahrzehnt."
CW_Expansion_country.335.a:1 "OK"
