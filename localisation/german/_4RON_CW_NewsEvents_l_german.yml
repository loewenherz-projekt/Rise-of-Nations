CW_Expansion_country.310.t:0 "Pakt von Madrid"
CW_Expansion_country.310.d:0 "Der Pakt von Madrid, der am 23. September 1953 vom franquistischen Spanien und den USA unterzeichnet wurde, war zusammen mit dem Konkordat von 1953 ein bedeutender Versuch, die internationale Isolation Spaniens nach dem Zweiten Weltkrieg zu durchbrechen. Diese Entwicklung erfolgte zu einer Zeit, als andere siegreiche Alliierte des Zweiten Weltkriegs und weite Teile der übrigen Welt einem faschistischen Regime, das mit der Sache der Achsenmächte sympathisierte und mit deren Unterstützung errichtet worden war, weiterhin feindlich gegenüberstanden (zur Verurteilung des franquistischen Regimes durch die Vereinten Nationen im Jahr 1946 siehe Spanische Frage). Das Abkommen von 1953 bestand aus drei separaten Durchführungsvereinbarungen, die die USA zusagten, Spanien wirtschaftliche und militärische Hilfe zu leisten. Die USA wiederum durften Luftwaffen- und Marinestützpunkte auf spanischem Territorium errichten und nutzen (Marinestützpunkt Rota, Luftwaffenstützpunkt Morón, Luftwaffenstützpunkt Torrejón und Luftwaffenstützpunkt Saragossa)."
CW_Expansion_country.310.a:1 "OK"
CW_Expansion_news.310.t:0 "Pakt von Madrid"
