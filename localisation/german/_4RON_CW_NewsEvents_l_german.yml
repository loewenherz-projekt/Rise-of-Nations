CW_Expansion_country.339.t:0 "Die Schlacht von Dien Bien Phu endet mit einer Niederlage Frankreichs"
CW_Expansion_country.339.d:0 "Am 7. Mai 1954 fiel die von Frankreich besetzte Garnison in Dien Bien Phu in Vietnam nach einer viermonatigen Belagerung unter Führung des vietnamesischen Nationalisten Ho Chi Minh. Nach dem Fall von Dien Bien Phu zogen sich die Franzosen aus der Region zurück. Aus Sorge vor der regionalen Instabilität engagierten sich die USA zunehmend im Kampf gegen kommunistische Nationalisten in Indochina. Die USA zogen sich erst zwanzig Jahre später aus Vietnam zurück."
CW_Expansion_country.339.a:1 "OK"
