CW_Expansion_country.303.t:0 "Georgi Malenkow kündigt Wasserstoffbombe an"
CW_Expansion_country.303.d:0 "Knapp ein Jahr, nachdem die USA am 1. November 1952 mit der Mike Shot ihre erste thermonukleare Sprengladung getestet hatten, testeten die Sowjets ihre eigene thermonukleare Bombe. Am 8. August 1953 verkündete der sowjetische Premier Georgi Malenkow, dass die USA ihr Monopol auf die Wasserstoffbombe verloren hätten. Vier Tage später, am 12. August 1953, fand der RDS-6s-Test statt, der erste Test einer sowjetischen thermonuklearen Sprengladung."
CW_Expansion_country.303.a:1 "OK"
CW_Expansion_news.303.t:0 "Georgi Malenkow kündigt Wasserstoffbombe an"
CW_Expansion_news.303.d:0 "Knapp ein Jahr, nachdem die USA am 1. November 1952 mit dem Mike Shot ihre erste thermonukleare Sprengvorrichtung getestet hatten, testeten die Sowjets ihre eigene thermonukleare Bombe. Am 8. August 1953 verkündete der sowjetische Premier Georgi Malenkow, dass die USA ihr Monopol auf die Wasserstoffbombe verloren hätten. Vier Tage später, am 12. August 1953, fand der RDS-6s-Test statt, der erste Test einer sowjetischen thermonuklearen Sprengvorrichtung."
CW_Expansion_news.303.a:1 "OK"

CW_Expansion_country.304.t:0 "Erste sowjetische thermonukleare Waffe"
CW_Expansion_country.304.d:0 "Am 12. August 1953 zündete die Sowjetunion auf dem Atomtestgelände Semipalatinsk im Norden Kasachstans eine thermonukleare („Wasserstoff-“) Bombe. Die Arbeiten an dieser Superbombe hatten 1946 begonnen, drei Jahre bevor die Sowjetunion ihre erste Atombombe zündete. Organisiert wurde das Projekt von der Ersten Hauptdirektion unter Lawrentij Beria, dem Minister für Staatssicherheit (MGB). Geleitet wurde es von Igor Kurtschatow (1903–1960), einem Physiker, der 1943 zum wissenschaftlichen Leiter des sowjetischen Atomprojekts ernannt worden war. Der Entwurf der Bombe basierte auf dem „Schichtkuchen“-Konzept des Physikers Andrej Sacharow (1921–1989), bei dem eine Spaltungsbombe abwechselnd aus thermonuklearen Materialien und Uran-238 besteht."
CW_Expansion_country.304.a:1 "OK"
CW_Expansion_news.304.t:0 "Erste sowjetische thermonukleare Waffe"
CW_Expansion_news.304.d:0 "Am 12. August 1953 zündete die Sowjetunion auf dem Atomtestgelände Semipalatinsk im Norden Kasachstans eine thermonukleare („Wasserstoff-“) Bombe. Die Arbeiten an dieser Superbombe hatten 1946 begonnen, drei Jahre bevor die Sowjetunion ihre erste Atombombe zündete. Organisiert wurde das Projekt von der Ersten Hauptdirektion unter Lawrentij Beria, dem Minister für Staatssicherheit (MGB). Geleitet wurde es von Igor Kurtschatow (1903–1960), einem Physiker, der 1943 zum wissenschaftlichen Leiter des sowjetischen Atomprojekts ernannt worden war. Der Entwurf der Bombe basierte auf dem „Schichtkuchen“-Konzept des Physikers Andrej Sacharow (1921–1989), bei dem eine Spaltungsbombe abwechselnd aus thermonuklearen Materialien und Uran-238 besteht."
CW_Expansion_news.304.a:1 "OK"

CW_Expansion_country.305.t:0 "Iranischer Putsch"
CW_Expansion_country.305.d:0 "Der iranische Staatsstreich von 1953, im Iran als „28. Mordad-Putsch“ bekannt, war der Sturz des demokratisch gewählten Premierministers Mohammad Mossadegh am 19. August 1953 zur Stärkung der monarchischen Herrschaft des Schahs Mohammad Reza Pahlavi. Orchestriert wurde er von den Vereinigten Staaten (unter dem Namen TPAJAX-Projekt oder „Operation Ajax“) und dem Vereinigten Königreich (unter dem Namen „Operation Boot“). Auch der Klerus spielte eine bedeutende Rolle."
CW_Expansion_country.305.a:1 "OK"
