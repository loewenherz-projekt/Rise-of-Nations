CW_Expansion_country.268.t:0 "Die Vereinten Nationen treten Eritrea an Äthiopien ab"
CW_Expansion_country.268.d:0 "Nachdem die Alliierten 1941 Eritreas italienische Kolonialherren vertrieben hatten, übernahm Großbritannien die Kontrolle über die Region und erhielt sie schließlich als UN-Treuhandgebiet. 1952 beschloss die UNO, Eritrea an Äthiopien anzugliedern, in der Hoffnung, äthiopische Souveränitätsansprüche und eritreische Unabhängigkeitsbestrebungen in Einklang zu bringen. Ein Jahrzehnt später löste der äthiopische Kaiser Haile Selassie die Föderation auf und annektierte Eritrea. Dies löste einen dreißigjährigen bewaffneten Kampf in Eritrea aus."
CW_Expansion_country.268.a:1 "OK"
