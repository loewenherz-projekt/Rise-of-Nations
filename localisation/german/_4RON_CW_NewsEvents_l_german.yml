CW_Expansion_country.286.t:0 "Operation Upshot"
CW_Expansion_country.286.d:0 "Operation Upshot–Knothole war eine Serie von elf Atomtests, die 1953 auf dem Testgelände in Nevada durchgeführt wurden. Sie folgte auf Operation Ivy und ging Operation Castle voraus. Über 21.000 Soldaten nahmen an der Bodenübung Desert Rock V teil, die auch den Grable-Schuss umfasste. Grable war ein 280-mm-Atomprojektil (AFAP), das aus der „Atomkanone“ abgefeuert wurde und von zahlreichen hochrangigen Militärs besichtigt wurde."
CW_Expansion_country.286.a:1 "OK"
