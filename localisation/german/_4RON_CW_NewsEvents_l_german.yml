CW_Expansion_country.108.t:0 "Kanadisches Staatsbürgerschaftsgesetz"
CW_Expansion_country.108.d:0 "Mit dem Canadian Citizenship Act von 1947 wurde die kanadische Staatsbürgerschaft geschaffen, die es Einwohnern Kanadas ermöglichte, die Staatsbürgerschaft unabhängig von ihrem Herkunftsland zu erhalten. Vor 1947 galten in Kanada geborene Personen und eingebürgerte Einwanderer als britische Staatsbürger und nicht als kanadische Staatsbürger."
CW_Expansion_country.108.a:1 "OK"
