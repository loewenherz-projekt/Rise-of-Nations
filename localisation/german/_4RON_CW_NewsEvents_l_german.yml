CW_Expansion_country.147.t:0 "Präsident Rómulo Gallegos wird von der Militärjunta gestürzt"
CW_Expansion_country.147.d:0 "Der Staatsstreich in Venezuela von 1948 fand am 24. November 1948 statt, als Carlos Delgado Chalbaud, Marcos Pérez Jiménez und Luis Felipe Llovera Páez den gewählten Präsidenten Rómulo Gallegos stürzten, der bei den venezolanischen Parlamentswahlen von 1947 (die allgemein als die ersten ehrlichen Wahlen des Landes gelten) gewählt worden war und im Februar 1948 sein Amt angetreten hatte. Chalbaud war Gallegos&#39; Verteidigungsminister gewesen. Jiménez übernahm als Diktator die Führung des Landes."
CW_Expansion_country.147.a:1 "OK"
