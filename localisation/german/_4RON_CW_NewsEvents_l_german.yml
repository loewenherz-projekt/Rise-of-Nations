CW_Expansion_country.283.t:0 "Josef Stalin erleidet einen Schlaganfall"
CW_Expansion_country.283.d:0 "Stalin verließ an diesem Morgen sein Zimmer nicht, und gegen Mittag machten sich seine Mitarbeiter Sorgen. Erschwerend kam hinzu, dass niemand seine Privatgemächer betreten durfte, es sei denn, er wurde gerufen. Den ganzen Nachmittag über warteten das Hauspersonal und seine Leibwache besorgt darauf, dass Stalin herauskam. Sie wurden schließlich beruhigt, als ein Wachposten draußen meldete, dass gegen 18.30 Uhr in seinem Esszimmer Licht angegangen sei. Wolkogonow schreibt: „Alle atmeten erleichtert auf und warteten auf das Läuten der Glocke. Stalin hatte weder gegessen noch sich die Post oder die Zeitungen angesehen. Es war höchst ungewöhnlich.“ Als es spät wurde, begannen sich das Hauspersonal und die Leibwache erneut Sorgen zu machen. Sie überlegten, was zu tun sei, bis sie die blanke Panik zum Handeln zwang. Es war mittlerweile 23.00 Uhr, der 1. März 1953."
CW_Expansion_country.283.a:1 "OK"
