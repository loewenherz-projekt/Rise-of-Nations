CW_Expansion_country.267.t:0 "Europäische Parlamentarische Versammlung"
CW_Expansion_country.267.d:0 "Als eine der ältesten gemeinsamen Institutionen entstand das Europäische Parlament als Gemeinsame Versammlung der Europäischen Gemeinschaft für Kohle und Stahl (EGKS). Es handelte sich um eine beratende Versammlung von 78 ernannten Abgeordneten aus den nationalen Parlamenten der Mitgliedsstaaten, die jedoch keine Gesetzgebungsbefugnis besaß. Professor David Farrell von der Universität Manchester hob die Veränderungen seit seiner Gründung hervor: „Das Europäische Parlament hätte man während eines Großteils seines Bestehens zu Recht als mehrsprachige Debattierklub bezeichnen können.“"
CW_Expansion_country.267.a:1 "OK"
