#1960 Events
CW_Expansion_country.499.t:0 "Bergbaukatastrophe von Coalbrook"
CW_Expansion_country.499.d:0 "Das Coalbrook-Bergwerksunglück ist das schlimmste Bergwerksunglück in der Geschichte Südafrikas. Es ereignete sich am 21. Januar 1960 gegen 19:00 Uhr in der Coalbrook-Kohlemine der Clydesdale Colliery, als rund 900 Pfeiler fast 180 Meter unter der Erde einstürzten. Die Mine liegt im nördlichen Freistaat, 21 Kilometer südwestlich von Vereeniging. Etwa 1.000 Bergleute befanden sich zu diesem Zeitpunkt in der Mine. 437 von ihnen starben, weil sie eingeschlossen waren, während der Rest durch einen Schrägschacht entkommen konnte. Die Bergleute wurden durch Methangas erstickt und durch Steinschlag erdrückt."
CW_Expansion_country.499.a:1 "OK"
