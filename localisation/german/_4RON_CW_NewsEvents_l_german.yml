CW_Expansion_country.422.t:0 "Ungarische Revolution"
CW_Expansion_country.422.d:0 "Die Ungarische Revolution von 1956 war eine landesweite Revolution gegen die Regierung der Ungarischen Volksrepublik (1949–1989) und die von der UdSSR aufgezwungene ungarische Innenpolitik. Der zunächst anarchische Aufstand des ungarischen Volkes gipfelte in Protesten gegen die von der UdSSR aufgezwungene Innenpolitik, und das Volk schloss sich zum Protest gegen die Sowjetunion zusammen."
CW_Expansion_country.422.a:1 "OK"
