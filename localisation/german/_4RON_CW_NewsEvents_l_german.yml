CW_Expansion_country.215.t:0 "Ausbruch des Mount Lamington"
CW_Expansion_country.215.d:0 "Anfang Januar 1951 erschütterte eine Reihe kleinerer Explosionen und Erdbeben den Mount Lamington, einen Vulkan in der Provinz Oro im Territorium Papua und Neuguinea. Vor dem Ausbruch wurde der Mount Lamington aufgrund fehlender historischer Ausbrüche und dichter Vegetation nicht als Vulkan anerkannt. Ab dem 15. Januar verstärkte sich die vulkanische Aktivität, und es entstanden hohe Eruptionsfahnen. Der stärkste Ausbruch ereignete sich am Morgen des 21. Januar, als eine dicke schwarze Aschefahne 15.000 Meter in die Atmosphäre stieg. Der Ausbruch ließ einen Lavadom einstürzen und erzeugte einen tödlichen pyroklastischen Strom, der 2.942–3.466 Menschen tötete. In den Jahren nach dem Ausbruch bildeten sich neue Lavadome, die nacheinander einstürzten. Die Aktivität hielt bis Juli 1956 an. Der Ausbruch war die tödlichste Naturkatastrophe in der australischen Geschichte, da die Region unter der Herrschaft der australischen Regierung stand."
CW_Expansion_country.215.a:1 "OK"
