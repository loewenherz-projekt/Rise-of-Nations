CW_Expansion_country.208.t:0 "Präsident von Venezuela entführt und ermordet"
CW_Expansion_country.208.d:0 "1948 gehörte Chalbaud zu denen, die die Regierung von Präsident Gallegos stürzten, und war zusammen mit Marcos Pérez Jiménez und Luis Llovera Páez, dem nominellen Chef der dreiköpfigen Junta, Mitglied der Militärjunta. Er wurde am 13. November 1950 von einer Gruppe unter der Führung von Rafael Simón Urbina und seinem Neffen Domingo Urbina entführt und ermordet. Die Entführung fand in Caracas zwischen den Vierteln Country Club und Chapellin statt, und seine Ermordung ereignete sich im halb verlassenen Viertel Las Mercedes. Seine Ermordung scheint das unbeabsichtigte Ergebnis einer gescheiterten Entführung unter der Führung von Simón Urbina zu sein, der die Präsidentschaft Chalbauds stürzen wollte. Einige glauben, Urbina habe Delgado Chalbaud verachtet, während andere argumentieren, sie hätten sich bis zu einem politischen Streit nahegestanden. Am Tag nach der Festnahme und Inhaftierung Urbinas wurde er auf Befehl der Direktion für nationale Sicherheit ermordet, wodurch Pérez Jiménez für die nächsten Jahre seine Position als starker Mann in Venezuela sicherte."
CW_Expansion_country.208.a:1 "OK"
CW_Expansion_news.208.t:0 "Präsident von Venezuela entführt und ermordet"
CW_Expansion_news.208.d:0 "1948 gehörte Chalbaud zu denen, die die Regierung von Präsident Gallegos stürzten, und war zusammen mit Marcos Pérez Jiménez und Luis Llovera Páez, dem nominellen Vorsitzenden der dreiköpfigen Junta, Mitglied der Militärjunta. Er wurde am 13. November 1950 von einer Gruppe unter der Führung von Rafael Simón Urbina und seinem Neffen Domingo Urbina entführt und ermordet. Die Entführung fand in Caracas zwischen den Vierteln Country Club und Chapellin statt, und seine Ermordung ereignete sich im halb verlassenen Viertel Las Mercedes. Seine Ermordung scheint das unbeabsichtigte Ergebnis einer gescheiterten Entführung unter der Führung von Simón Urbina zu sein, der die Präsidentschaft Chalbauds stürzen wollte. Einige glauben, Urbina habe Delgado Chalbaud verachtet, während andere argumentieren, sie hätten sich bis zu einem politischen Streit nahegestanden. Einen Tag nach der Festnahme und Inhaftierung Urbinas wurde er auf Befehl der Direktion für nationale Sicherheit ermordet, wodurch Pérez Jiménez für die nächsten Jahre seine Position als starker Mann in Venezuela sicherte."
CW_Expansion_news.208.a:1 "OK"

CW_Expansion_country.209.t:0 "Wintersturm verwüstet den Nordosten der USA"
CW_Expansion_country.209.d:0 "Einer der verheerendsten und meteorologisch einzigartigsten Winterstürme im Osten der USA ereignete sich am Thanksgiving-Wochenende 1950. Nach seinem Ende bedeckten bis zu 145 Zentimeter Schnee die zentralen Appalachen (lokal bis zu 167 Zentimeter in Coburn Creek, West Virginia). Zudem machte eines der ausgedehntesten und verheerendsten Windereignisse, die je über dem Nordosten der USA registriert wurden, den Großen Appalachen-Sturm von 1950 zum bis dahin teuersten Sturm aller Zeiten. Auch Ost-Kentucky blieb nicht verschont: Rekordkälte und über 30 Zentimeter Schnee in vielen Gebieten."
CW_Expansion_country.209.a:1 "OK"
