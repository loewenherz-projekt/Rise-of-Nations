CW_Expansion_country.125.t:0 "Massaker von Jammu"
CW_Expansion_country.125.d:0 "Nach der Teilung Indiens wurden im Oktober und November 1947 in der Region Jammu des Fürstenstaates Jammu und Kaschmir viele Muslime massakriert und andere nach Westpunjab vertrieben. Die Morde wurden von extremistischen Hindus und Sikhs verübt, die von den Streitkräften von Maharadscha Hari Singh unterstützt und angestiftet wurden. Die Aktivisten der Rashtriya Swayamsevak Sangh (RSS) spielten eine Schlüsselrolle bei der Planung und Durchführung der Unruhen. Schätzungsweise 20.000 bis 100.000 Muslime wurden massakriert. Anschließend wurden in der Region Mirpur im heute pakistanisch verwalteten Kaschmir viele Nichtmuslime von pakistanischen Stammesangehörigen und Soldaten massakriert. Schätzungsweise 30.000 Hindus und Sikhs wurden auch in der Region Rajouri der Division Jammu massakriert."
CW_Expansion_country.125.a:1 "OK"
