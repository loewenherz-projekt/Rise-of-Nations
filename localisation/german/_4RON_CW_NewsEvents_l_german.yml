CW_Expansion_country.141.t:0 "Malayanischer Notfall"
CW_Expansion_country.141.d:0 "Der Malayan Emergency, auch bekannt als Malay Emergency und Anti-British National Liberation War (1948–1960), war ein Guerillakrieg in Britisch-Malaya zwischen kommunistischen Unabhängigkeitskämpfern der Malayan National Liberation Army (MNLA) und den Streitkräften des Britischen Empire und Commonwealth. Die Kommunisten kämpften für die Unabhängigkeit Malayas vom Britischen Empire und den Aufbau einer sozialistischen Wirtschaft, während die Streitkräfte des Commonwealth den Kommunismus bekämpften und die britischen Wirtschafts- und Kolonialinteressen schützten. Der Konflikt wurde von der MNLA als „Anti-British National Liberation War“ bezeichnet, von den Briten jedoch als „Notfall“, da Londoner Versicherer im Falle eines Bürgerkriegs keine Zahlungen geleistet hätten."
CW_Expansion_country.141.a:1 "OK"
