CW_Expansion_country.420.t:0 "Das weltweit erste Kernkraftwerk im industriellen Maßstab"
CW_Expansion_country.420.d:0 "Calder Hall war das erste großtechnische Kernkraftwerk der Welt. Es wurde in Cumbria für 35 Millionen Pfund gebaut, 1956 in Betrieb genommen und erst 2003 stillgelegt. Das Kraftwerk verfügte über vier Reaktoren und eine Gesamtleistung von 194 MW."
