CW_Expansion_country.390.t:0 "Istanbuler Pogrom"
CW_Expansion_country.390.d:0 "Das Istanbuler Pogrom, auch bekannt als Istanbuler Unruhen oder Septemberereignisse, war eine Reihe von staatlich geförderten antigriechischen Angriffen am 6. und 7. September 1955, die sich vor allem gegen die griechische Minderheit Istanbuls richteten. Das Pogrom, das gelegentlich als Völkermord bezeichnet wurde, wurde von der regierenden Demokratischen Partei weitgehend geduldet. Orchestriert wurde es von verschiedenen Sicherheitsorganisationen, die mit der Operation Gladio in Verbindung standen (Taktische Mobilisierungsgruppe, Konterguerilla und Nationaler Sicherheitsdienst). Auslöser der Ereignisse war eine Falschmeldung, in der behauptet wurde, Griechen hätten am Vortag einen Bombenanschlag auf das türkische Konsulat im mazedonischen Thessaloniki verübt – das Haus, in dem Mustafa Kemal Atatürk 1881 geboren wurde. Auslöser der Ereignisse war eine Bombe, die ein türkischer Platzanweiser im Konsulat gelegt hatte, der später verhaftet wurde und gestand. Die türkische Presse schwieg über die Verhaftung, unterstellte stattdessen, Griechen hätten die Bombe gezündet."
CW_Expansion_country.390.a:1 "OK"
