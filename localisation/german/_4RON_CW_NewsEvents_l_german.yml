CW_Expansion_country.459.t:0 "Brasilien schlägt Schweden im WM-Finale mit 5:2"
CW_Expansion_country.459.d:0 "Das Finale der FIFA-Weltmeisterschaft 1958 fand am 29. Juni 1958 im Råsunda-Stadion in Solna (nahe Stockholm), Schweden, statt und diente der Ermittlung des Weltmeisters. Brasilien gewann die Weltmeisterschaft durch einen Sieg über das Gastgeberland Schweden und holte damit seinen ersten Weltmeistertitel. Das Finale von 1958 hält den Rekord für die meisten Tore in einem WM-Finale und teilt sich den Rekord für den höchsten Sieg (mit den Turnieren von 1970 und 1998). Die Rekorde für den jüngsten und ältesten Torschützen in einem WM-Finale wurden in diesem Spiel aufgestellt; von Pelé (17 Jahre und 249 Tage) bzw. Nils Liedholm (35 Jahre, 263 Tage). Das Finale war auch in vielerlei Hinsicht ein Novum: Es war das erste Finale zwischen einer europäischen und einer amerikanischen Mannschaft. Schweden war der erste und bislang einzige Gastgeber, der ein WM-Finale verlor (das Maracanazo von 1950 war zwar das entscheidende Spiel des Turniers, galt aber nicht als Finale, da Schweden gegen Spanien zeitgleich ausgetragen wurde). Die Niederlage bedeutete zudem, dass zum ersten Mal eine in Europa ausgetragene Weltmeisterschaft nicht von einer europäischen Nation gewonnen wurde."
CW_Expansion_country.459.a:1 "OK"
