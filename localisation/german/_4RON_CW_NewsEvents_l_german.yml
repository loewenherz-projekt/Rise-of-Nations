CW_Expansion_country.105.t:0 "Kauf von Grönland"
CW_Expansion_country.105.d:0 "1946 boten die USA Dänemark Gold im Wert von 100 Millionen Dollar (heute eine Milliarde Dollar) für Grönland an. US-Senator Owen Brewster erklärte im November 1945, er halte den Kauf der Insel für „eine militärische Notwendigkeit“. Der Planungs- und Strategieausschuss der Vereinigten Stabschefs entschied im April 1946, dass der Erwerb der für Dänemark „völlig wertlosen“ Insel für die USA lebenswichtig sei."
CW_Expansion_country.105.a:1 "OK"
