CW_Expansion_country.374.t:0 "Erstes Franchise-McDonald&#39;s-Restaurant"
CW_Expansion_country.374.d:0 "Ray Kroc, gebürtiger Chicagoer, verließ die High School nach seinem zehnten Jahr, um sich im Ersten Weltkrieg dem Sanitätskorps des Roten Kreuzes anzuschließen. Der Krieg endete, bevor seine Einheit nach Übersee geschickt wurde. Ray kehrte in seine Heimat zurück, um seinen Lebensunterhalt als Musiker zu verdienen und später Pappbecher zu verkaufen. 1939 wurde er der exklusive Vertriebshändler des Multimixers (eines Milchshake-Mixers). Er besuchte die McDonald-Brüder im Jahr 1954 und wurde daraufhin ihr Franchise-Agent. 1955 eröffnete Kroc das erste McDonald&#39;s östlich des Mississippi. Ray Krocs Vision war es, dass es allein in den Vereinigten Staaten 1.000 McDonald&#39;s-Restaurants geben sollte. Dennoch wuchs McDonald&#39;s weiter und expandierte in internationale Märkte, beginnend 1967 mit Eröffnungen in Kanada und Puerto Rico. Heute hat das Unternehmen über 36.000 Restaurants in über 100 Ländern. Die letzte Eröffnung erfolgte 2016 in Kasachstan."
CW_Expansion_country.374.a:1 "OK"
