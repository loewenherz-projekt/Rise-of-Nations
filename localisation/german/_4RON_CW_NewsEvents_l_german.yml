CW_Expansion_country.111.t:0 "Preußen abgeschafft"
CW_Expansion_country.111.d:0 "Preußen war jahrhundertelang eine Großmacht in Nordmitteleuropa mit Sitz rund um die Städte Berlin und Königsberg und erlangte im 18. und 19. Jahrhundert besondere Bedeutung. Nach seinem Sieg im Deutsch-Österreichischen Krieg wurde Preußen zur treibenden Kraft bei der Schaffung eines Deutschen Kaiserreichs ohne Österreich (ein Kleindeutsches Reich), und 1871 wurde der König von Preußen deutscher Kaiser. Nach dem Ersten Weltkrieg trug der neue Freistaat Preußen die meisten Gebietsverluste Deutschlands, blieb jedoch der dominierende Staat der Weimarer Republik. Schon vor Hitlers Machtergreifung war die preußische Regierung durch den Preußenschlag von 1932 faktisch abgeschafft worden. Nach dem Zweiten Weltkrieg betrafen fast alle Gebietsverluste Deutschlands erneut Gebiete, die zu Preußen gehört hatten – Ostpreußen wurde zwischen Polen und der Sowjetunion aufgeteilt. Preußen wurde 1947 durch das Kontrollratsgesetz Nr. 46 der alliierten Besatzungsbehörden offiziell abgeschafft."
CW_Expansion_country.111.a:1 "OK"
