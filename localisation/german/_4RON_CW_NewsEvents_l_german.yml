CW_Expansion_country.346.t:0 "Ende der Lebensmittelrationierung in Großbritannien"
CW_Expansion_country.346.d:0 "Am 4. Juli 1954 feierten die Amerikaner ihre Unabhängigkeit mit Hotdogs, während die Briten feierten, dass sie Hotdogs in sich hineinstopfen durften. An diesem Tag endete in Großbritannien offiziell die 14 Jahre währende Lebensmittelrationierung, die zu Beginn des Zweiten Weltkriegs verhängt worden war. Damals griffen deutsche U-Boote Schiffe an, die Lebensmittel nach Großbritannien brachten. Ziemlich schlimm, wenn man bedenkt, dass Großbritannien als Inselstaat zwei Drittel seiner Lebensmittel importierte. Um die vorhandenen Lebensmittel gerecht zu verteilen, bekam jeder Brite ein Heft mit Lebensmittelmarken, die er beim örtlichen Lebensmittelhändler gegen Grundnahrungsmittel einlösen konnte. Die durchschnittliche Milchration eines Erwachsenen umfasste 55 Gramm Butter und Käse, einige Liter Milch und ein Ei pro Woche. Schwangere Frauen erging es etwas besser, sie bekamen zuerst Obst und doppelt so viele Eier. Gleichzeitig forderte die Regierung die Bevölkerung auf, ihr eigenes Gemüse anzubauen, und klärte die Öffentlichkeit über richtige Ernährung auf. Tatsächlich ernährten sich einige Briten – vor allem die Armen – gesünder als vor dem Krieg. Als die Deutschen schließlich kapitulierten, waren die Briten bereit, wie in guten alten Zeiten zu schlemmen, doch die Lebensmittelrationierung zog sich über Jahre hin. Der Krieg hatte das Land fast in den Bankrott getrieben, und Importe waren teuer. So dauerte es bis Mitte der 50er Jahre, fast ein Jahrzehnt später, bis die letzte Ration aufgehoben wurde – für Fleisch. Es war verständlicherweise ein Freudentag. Ein Hausfrauenverband feierte auf dem Trafalgar Square, Menschen vergruben ihre Lebensmittelkarten in Scheinbegräbnissen, und in einer öffentlichen Zeremonie zündete der Brennstoffminister seine an."
CW_Expansion_country.346.a:1 "OK"
