CW_Expansion_country.508.t:0 "Brasilianische Hauptstadt nach Brasilia verlegt"
CW_Expansion_country.508.d:0 "Brasília ist die Hauptstadt Brasiliens und Regierungssitz des Bundesdistrikts. Die Stadt liegt im Hochland Brasiliens in der Region Zentralwest. Sie wurde am 21. April 1960 von Präsident Juscelino Kubitschek als neue Hauptstadt des Landes gegründet. Brasília ist schätzungsweise die drittgrößte Stadt Brasiliens. Unter den großen lateinamerikanischen Städten weist sie das höchste BIP pro Kopf auf."
CW_Expansion_country.508.a:1 "OK"
