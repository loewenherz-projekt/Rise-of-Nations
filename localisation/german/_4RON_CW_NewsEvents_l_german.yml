CW_Expansion_country.249.t:0 "Marshallplan läuft aus"
CW_Expansion_country.249.d:0 "Am 31. Dezember 1951 lief der Marshallplan aus, nachdem er über 13,3 Milliarden Dollar an Entwicklungshilfe für den Wiederaufbau Westeuropas nach dem Krieg bereitgestellt hatte. Dies fiel mit dem Geburtstag von George Marshall zusammen, dem Architekten des Plans, der am 31. Dezember 1880 geboren wurde."
