#1951 Events
CW_Expansion_country.212.t:0 "Dritte Schlacht von Seoul"
CW_Expansion_country.212.d:0 "Die Dritte Schlacht um Seoul, auch bekannt als Chinesische Neujahrsoffensive, Rückzug vom 4. Januar oder Dritte Phase der Kampagne im Westsektor, war eine Schlacht des Koreakrieges, die vom 31. Dezember 1950 bis zum 7. Januar 1951 rund um die südkoreanische Hauptstadt Seoul stattfand. Nach dem großen Sieg der chinesischen Freiwilligen Volksarmee (PVA) in der Schlacht am Ch&#39;ongch&#39;on-Fluss begann das Kommando der Vereinten Nationen (UN), die Möglichkeit einer Evakuierung von der koreanischen Halbinsel in Erwägung zu ziehen. Der Vorsitzende der Kommunistischen Partei Chinas, Mao Zedong, befahl der chinesischen Freiwilligen Volksarmee, den 38. Breitengrad zu überqueren, um die UN-Truppen zum Rückzug aus Südkorea zu drängen."
CW_Expansion_country.212.a:1 "OK"
