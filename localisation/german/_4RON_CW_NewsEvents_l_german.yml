CW_Expansion_country.437.t:0 "Harold McMillan wird Premierminister"
CW_Expansion_country.437.d:0 "Nach dem Rücktritt Edens im Zuge der Suezkrise wurde er am 10. Januar 1957 zum Premierminister ernannt und zwölf Tage später zum Vorsitzenden der Konservativen Partei gewählt."
