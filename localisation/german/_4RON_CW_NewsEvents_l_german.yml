CW_Expansion_country.325.d:0 "Die Übertragung der Oblast Krim an die Sowjetunion im Jahr 1954 war eine Verwaltungsmaßnahme des Präsidiums des Obersten Sowjets der Sowjetunion, mit der die Regierung der Krimhalbinsel von der Russischen Sozialistischen Föderativen Sowjetrepublik an die Ukrainische SSR übertragen wurde."
