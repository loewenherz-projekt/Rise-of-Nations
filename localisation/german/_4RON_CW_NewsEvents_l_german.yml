CW_Expansion_country.432.t:0 "Fidel Castro reist nach Kuba ab"
CW_Expansion_country.432.d:0 "Es war weniger eine Invasion als vielmehr ein Schiffbruch, wie einer der Teilnehmer bemerkte. 82 Männer hatten eine Woche zusammengepfercht auf einer ramponierten 21-Meter-Yacht namens Granma verbracht, die Fidel Castro in Tuxpan an der mexikanischen Küste gekauft hatte. Als der Moment zur Abfahrt kam, war das Wetter scheußlich, doch Castro befürchtete, dass General Batistas Regime in Kuba, dem der Invasionsplan verraten worden war, eine Überfahrt unter solchen Bedingungen nicht erwarten würde. Die Revolutionäre verließen Tuxpan in den frühen Morgenstunden des 25. November bei strömendem Regen. Auf der Granma gab es normalerweise acht Schlafplätze, und die Männer mussten sich im Sitzen und Stehen abwechseln, während sich das Schiff auf schwankender See zur kubanischen Küste mühte. Sie mussten ständig Wasser schöpfen, viele wurden seekrank, alle waren klatschnass, und ihre Lebensmittel gingen zur Neige."
CW_Expansion_country.432.a:1 "OK"
CW_Expansion_news.432.t:0 "Fidel Castro reist nach Kuba ab"
CW_Expansion_news.432.d:0 "Es war weniger eine Invasion als vielmehr ein Schiffbruch, wie einer der Teilnehmer bemerkte. 82 Männer hatten eine Woche zusammengepfercht auf einer ramponierten 21-Meter-Yacht namens Granma verbracht, die Fidel Castro in Tuxpan an der mexikanischen Küste gekauft hatte. Als der Moment zur Abfahrt kam, war das Wetter scheußlich, doch Castro befürchtete, dass General Batistas Regime in Kuba, dem der Invasionsplan verraten worden war, eine Überfahrt unter solchen Bedingungen nicht erwarten würde. Die Revolutionäre verließen Tuxpan in den frühen Morgenstunden des 25. November bei strömendem Regen. Auf der Granma gab es normalerweise acht Schlafplätze, und die Männer mussten sich im Sitzen und Stehen abwechseln, während sich das Schiff auf schwankender See zur kubanischen Küste mühte. Sie mussten ständig Wasser schöpfen, viele wurden seekrank, alle waren klatschnass, und ihre Lebensmittel gingen zur Neige."
CW_Expansion_news.432.a:1 "OK"

CW_Expansion_country.433.t:0 "Fidel Castro landet in Kuba"
CW_Expansion_country.433.d:0 "Sie wollten am 30. ankommen, wurden aber durch die Wetterbedingungen, die Unzulänglichkeit des Schiffsmotors und die Tatsache, dass einer von ihnen eines Nachts über Bord fiel und lange gesucht werden musste, aufgehalten. Ein im Voraus geplanter Aufstand zu ihrer Unterstützung in Santiago de Cuba erwies sich daher als verfrüht und konnte leicht niedergeschlagen werden. Es war der 2. Dezember, als die Granma an Kubas sumpfiger Südwestküste südlich von Niquero auf Grund lief. Die Invasoren mussten an Land waten und dabei ihre Gewehre über den Köpfen halten. Ein kubanisches Patrouillenboot näherte sich und feuerte auf die Granma, und Aufklärungsflugzeuge flogen über sie hinweg. Die Invasion hätte kaum schlechter beginnen können, und ein Bericht von United Press International in Havanna gab bekannt, dass die kubanische Marine und Luftwaffe Fidel selbst, seinen Bruder Raul und 38 ihrer Kameraden getötet hätten."
CW_Expansion_country.433.a:1 "OK"
