CW_Expansion_country.345.t:0 "Von der CIA inszenierter Militärputsch"
CW_Expansion_country.345.d:0 "Der Staatsstreich in Guatemala im Jahr 1954 mit dem Codenamen Operation PBSuccess war eine verdeckte Operation der CIA, die den demokratisch gewählten Präsidenten Guatemalas Jacobo Árbenz stürzte und die guatemaltekische Revolution von 1944–1954 beendete. Er setzte die Militärdiktatur von Carlos Castillo Armas ein, dem ersten einer Reihe von autoritären Herrschern in Guatemala, die von den USA unterstützt wurden."
CW_Expansion_country.345.a:1 "OK"
CW_Expansion_news.345.t:0 "Die CIA hat einen Militärputsch in Guatemala inszeniert"
