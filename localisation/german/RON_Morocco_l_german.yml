#Events

  morocco.1.t:0 "[MOR.GetName] schlägt eine Union vor"
  morocco.1.d:0 "Angesichts der Wiederauferstehung des Piratenlebens machte [MOR.GetLeader] unserer Regierung einen Vorschlag: die Gründung einer Piraten-Schwesterrepublik. Eine solche Union würde unseren Feinden Angst einjagen. Sollten wir sie annehmen?"
  morocco.1.a:0 "Ja, ja"
  morocco.1.b:0 "Er muss verrückt sein ..."
  morocco.2.t:0 "[DOM.GetName] hat unser Angebot abgelehnt"
  morocco.2.d:0 "Die [DOM.GetAdjective] lehnten unser Angebot ab, Teil unserer Piratenunion zu werden"
  morocco.2.a:0 "Das ist traurig"

  morocco.3.t:0 "Marokkanische Rebellen greifen Garnisonen an"
  morocco.3.d:0 "Berichten zufolge haben marokkanische Rebellen unsere Garnisonen in der Region angegriffen. Die marokkanische Regierung scheint nicht in der Lage zu sein, Stabilität ins Land zu bringen. Hochrangige Generäle schlagen vor, wir sollten ihnen helfen, die Ordnung aufrechtzuerhalten."
  morocco.3.a:0 "Eingreifen"
  morocco.3.b:0 "Es ist ihr Problem."

