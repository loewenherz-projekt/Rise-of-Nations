 ##Events 
 
 destitution.1.t:0 "Entlassung"
 destitution.1.d:0 "Die Regierung des derzeitigen Präsidenten wird nicht mehr als geeignet angesehen, das Land weiter zu führen. Daher wurde der Präsident auf Antrag der großen Opposition um Fulgencio Batista entlassen."
 destitution.1.a:0 "¡Saquen a ese perro!"
 elections.2.t:0 "Wahlen von 1940"
 elections.2.d:0 "Die Sozialdemokratische Partei Kubas hat nach dem Rücktritt von Federico Laredo Bru Fulgencio Batista als Präsidentschaftskandidaten ins Rennen geschickt. Könnte dies ein neuer Kurs für Kuba sein?"
 elections.2.a:0 "Es lebe!"
 elections.2.b:0 "Es ist nicht notwendig."
 ##########
 popularity.3.t:0 "Im Aufstieg"
 popularity.3.d:0 "Die Regierung von Fulgencio Batista hat in ihrer kurzen Amtszeit an Popularität gewonnen. Die obere Mittelschicht ist mit der neuen Regierung zufrieden, die Unterschicht hingegen ist nicht einverstanden und in verschiedenen Teilen der Insel kam es zu Unruhen."
 popularity.3.a:0 "¡A la carga!"
 popularity.4.t:0 "Im Aufstieg"
 popularity.4.d:0 "Die Unzufriedenheit in der Bevölkerung hat mit der Zeit zugenommen und die kommunistische Partei auf der Insel hat mehr Anhänger und Bedeutung gewonnen, als die Umfragen vermuten ließen."
 popularity.4.a:0 "Es lebe der Kommunismus!"
 popularity.5.t:0 "Verbotener Faschismus!"
 popularity.5.d:0 "Dank der sozialistischen und liberalen Bewegungen hat der derzeitige Senat die Entscheidung getroffen, alle Formen des Faschismus im Land auf unbestimmte Zeit auszusetzen."
 popularity.5.a:0 "¡Fuera bichos!"
 ##########
 news.299.t:0 "Wahlen!"
 news.299.d:0 "Nach Jahren an der Spitze dekadenter Führer steht nun eine neue Persönlichkeit der kubanischen Geschichte zur Wahl. Fulgencio Batista, der frühere De-facto-Führer, ist dieses Mal der Gewinner der demokratischen Wahlen und nimmt an der Demokratischen Sozialistischen Koalition teil."
 news.299.a:0 "Interessant"
 news.299.b:0 "Grande Batista!"
 news.299.c:0 "Ist es etwas Gutes?"
 news.300.t:0 "Haiti kapituliert"
 news.300.d:0 "Die haitianische Regierung hat sich den Forderungen der neuen kubanischen Regierung gebeugt. Ist dies der Beginn einer unkontrollierbaren Expansion?"
 news.300.a:0 "Perfekt"
 news.300.b:0 "Es war Zeit"
 news.300.c:0 "Bald eine Supermacht?"
 ##########
 haiti.6.t:0 "Annexion Haitis"
 haiti.6.d:0 "Vor einigen Tagen erreichte die haitianische Regierung eine Botschaft des kubanischen Präsidenten: Kapitulation oder Tod. Zum Glück für sein Volk war die Entscheidung weise."
 haiti.6.a:0 "Es lebe der Präsident!"
 ##########
 haiti.7.t:0 "Forderungen ablehnen"
 haiti.7.d:0 "¡No a Cuba!"
 haiti.7.a:0 "¡A la carga!"
 ##########
 haiti.8.t:0 "Benachrichtigung"
 haiti.8.d:0 "Die kubanische Regierung plant, sich das Land anzueignen, das ihr einst beinahe gehört hätte. Sich zu weigern, ist keine Option."
 haiti.8.a:0 "¡Vica Cuba!"
 haiti.8.b:0 "Es sind Loks!"
 ##########
 news.301.t:0 "Vacio"
 news.301.d:0 "Vacio"
 news.301.a:0 "Vacio"
 news.301.b:0 "Vacio"
 news.301.c:0 "Vacio"
 ##########
 news.302.t:0 "Ablehnung"
 news.302.d:0 "Die haitianische Regierung hat das kubanische Ultimatum abgelehnt! Sie bereitet sich nun auf den Krieg vor und ihr Präsident bittet die USA um internationale Hilfe."
 news.302.a:0 "Es la hora.."
 news.302.b:0 "¡Traidores"
 news.302.c:0 "¡Bichos fascistas!"
 ##########
 news.303.t:0 "Benachrichtigung"
 news.303.d:0 "Die kubanische Regierung forderte die vollständige und bedingungslose Kapitulation der Dominikanischen Republik. Anschließend erfolgte die vollständige Annexion und Aneignung aller mit dem alten Staat verbundenen Gebiete. Nach Verhandlungen akzeptierten die Betroffenen die vollständige Kapitulation und den Anschluss an Kuba."
 news.303.a:0 "Dies würde passieren"
 news.303.b:0 "Für den Sieg!"
 news.303.c:0 "Willkommen!"
 ##########
 news.304.t:0 "Ablehnung"
 news.304.d:0 "Die Regierung der Demokratischen Republik hat die Vorschläge Kubas zurückgewiesen und sich gegenüber den Beschwerden und Forderungen Kubas taub verhalten. Dies wird offenbar in einem Krieg enden."
 news.304.a:0 "Lass es uns hinter uns bringen"
 news.304.b:0 "An die Waffen!"
 news.304.c:0 "Nieder mit Kuba!"
 ##########
 news.306.t:0 "Wahlen!"
 news.306.d:0 "Nach langen internen Auseinandersetzungen hat der Senat beschlossen, Federico Laredo Bru, Mitglied der Authentischen Revolutionären Partei Kubas, zum neuen Präsidenten zu ernennen."
 news.306.a:0 "Für ein neues Kuba"
 news.306.b:0 "Es lebe Bru!"
 news.306.c:0 "Möge die Demokratie siegen"
 ##########
 dominican.9.t:0 "Dominikanische Kapitulation"
 dominican.9.d:0 "Die Dominikanische Republik akzeptierte die Ansprüche Kubas, kapitulierte und überließ der neuen Regierung Boden."
 dominican.9.a:0 "Langes Leben für Kuba"
 ##########
 dominican.10.t:0 "Erhalten Sie die Bedingungen"
 dominican.10.d:0 "Die Dominikanische Republik hat heute Nachmittag die Bedingungen für ihre vollständige Annexion durch Kuba erhalten, und man geht davon aus, dass Kuba auf die bestmögliche Weise reagieren wird, was beiden Staaten zugutekommt."
 dominican.10.a:0 "Es ist eine Frage der Zeit."
 ##########
 dominican.11.t:0 "Vertrag von Kuba"
 dominican.11.d:0 "Die Verhandlungen über den Vertrag mit Kuba haben begonnen und es wird erwartet, dass sich die Dominikanische Republik unserem Marsch gegen die Feinde anschließt, die uns vereinen."
 dominican.11.a:0 "Akzeptanzbehandlung"
 dominican.11.b:0 "Behandlung abgelehnt"
 
 
