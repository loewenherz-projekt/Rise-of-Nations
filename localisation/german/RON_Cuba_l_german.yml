 CUB_general_staff:0 "Allgemeine Ausländer"
 CUB_general_staff_desc:0 "Generäle aus mehreren Nachbarländern kommen ins Land, um unsere Männer und Kommandeure auszubilden. Dies gibt unseren Generälen die Möglichkeit, einem kriegerischen Konflikt bestmöglich zu begegnen."
 
 ##############
 CUB_reformed_constitutional:0 "Reformprogramm"
 CUB_reformed_constitutional_desc:0 "Es werden Informationen über ein Reformprogramm der Regierung mit kulturellem, sozialem, wirtschaftlichem und politischem Charakter veröffentlicht, dem sich die derzeitige Opposition widersetzt."
 ##############
 CUB_hospital_maternidad:0 "Krankenhaus der Mutterschaft"
 CUB_hospital_maternidad_desc:0 "Der amtierende Präsident Miguel Mariano Gómez weiht eines der wichtigsten Bauwerke der Inselstadt ein."
 ##############
 CUB_escuela_nacional:0 "Escuela José Miguel Gómez"
 CUB_escuela_nacional_desc:0 "Weitere große Vorteile der Regierung von Miguel Mariano Gómez."
 ##############
 CUB_army_experience:0 "Militärschule"
 CUB_army_experience_desc:0 "Dies wird es unseren Männern ermöglichen, angesichts der Widrigkeiten des Feindes nicht nur mit Waffen, sondern auch mit Weisheit zu kämpfen."
 ##########
 CUB_hospital_infantil:0 "Krankenhaus Infantil"
 CUB_hospital_infantil_desc:0 "Alles für die Betreuung unserer jungen Menschen!"
 ##########
 CUB_mecanizado_cubano:0 "Mechanisierte Infanterie"
 CUB_mecanizado_cubano_desc:0 "Dank ausländischer Experten aus den USA hat die kubanische Armee die Möglichkeit, ihre Transportmittel zu untersuchen und zu verbessern."
 ##########
 CUB_military_school:0 "Artillerie"
 CUB_military_school_desc:0 "Dank des technologischen Fortschritts in der Welt haben wir die Möglichkeit, in kürzerer Zeit auf neue Technologien zuzugreifen."
 ##########
 CUB_construction:0 "Industria Nacional"
 CUB_construction_desc:0 "Es lebe die kubanische Industrie!"
 ##########
 CUB_infraestructura:0 "Infrastruktur 1"
 CUB_infraestructura_desc:0 "Es ist Zeit, unsere Infrastruktur zu verbessern!"
 ##########
 CUB_construction:0 "Branche 1"
 CUB_construction_desc:0 "Es ist an der Zeit, dass wir mit der nationalen Industrie beginnen."
 ##########
 CUB_industrial_effort:0 "Industrielle Anstrengungen"
 CUB_industrial_effort_desc:0 "Mehr Kapazität"
 ##########
 CUB_faction:0 "Treten Sie der Fraktion bei"
 CUB_faction_desc:0 "Verzweifelte Zeiten erfordern verzweifelte Maßnahmen!"
 ##########
 CUB_Axis:0 "Lebe Deutschland!"
 CUB_Axis_desc:0 "Lasst uns unseren Freund Deutschland verehren! Es ist die neue Zukunft der Welt!"
 ##########
 CUB_comunismo:0 "Es lebe die Sowjetunion!"
 CUB_comunismo_desc:0 "Lasst uns den Faschismus beenden und aus dem Kapitalismus Kapital schlagen!"
 ##########
 CUB_fuerza_trabajador:0 "Arbeiterstärke"
 CUB_fuerza_trabajador_desc:0 "Beginnen wir damit, unsere Arbeitskräfte zu unterstützen. Nur so können wir eine wohlhabende Nation aufbauen."
 ##########
 CUB_military2:0 "Treten Sie der Armee bei!"
 CUB_military2_desc:0 "Mit Hilfe der nationalen Propaganda werden wir dafür sorgen, dass viele junge Menschen in unseren Reihen eine zweite Heimat für die Verteidigung Kubas finden."
 ##########
 CUB_industria_militar:0 "Militärindustrie 1"
 CUB_industria_militar_desc:0 "Lassen Sie uns unseren Feinden zeigen, dass wir in der Lage sind, eine riesige Armee aufzustellen."
 ##########
 CUB_jovenes:0 "Junge Versprechen"
 CUB_jovenes_desc:0 "Ermutigen wir unsere jungen Leute, der kubanischen königlichen Armee anzugehören und ihr zu dienen."
 ##########
 CUB_voluntarios:0 "Freiwillige"
 CUB_voluntarios_desc:0 "Freiwillige zum Krieg!"
 ##########
 newfocus_38:0 "Erobere Haiti"
 newfocus_38_desc:0 "Wir stellen der haitianischen Regierung ein Ultimatum. Die Zukunft Ihres Volkes wird von Ihrer Entscheidung abhängen."
 ##########
 newfocus_39:0 "Es lebe die Freiheit"
 newfocus_39_desc:0 "Lasst uns Kommunismus und Faschismus ein für alle Mal beenden. Lasst uns auf die gute Seite der Macht treten!"
 ##########
 newfocus_40:0 "Erobern Sie die Dominikanische Republik"
 newfocus_40_desc:0 "Den Preis der Geschichte muss nicht Haiti allein zahlen. Die Dominikanische Republik muss reagieren – sei es durch die Opferung ihres Volkes oder durch eine für immer andauernde Kapitulation vor Kuba."
 ##########
 CUB_liberty_ethos:0 "Behandelte &quot;Ferkel&quot;"
 CUB_liberty_ethos_desc:0 "Es ist an der Zeit, ein Handelsabkommen mit mehreren Ländern in der Nähe der Karibik und Südamerikas zu schließen und so unsere Möglichkeiten beim Handel mit natürlichen Ressourcen zu verbessern."
 ##########
 CUB_tanques:0 "Tanques Marca Cuba"
 CUB_tanques_desc:0 "Damit haben wir die Möglichkeit, mit der Untersuchung unserer eigenen Pläne für Kriegspanzer zu beginnen. Wir hoffen, bald mit der Produktion beginnen zu können."
 ##########
 CUB_military_dos:0 "Militärschule 2"
 CUB_military_dos_desc:0 "Nachdem wir die Theorien über den Krieg studiert hatten, begannen wir, Waffen und Munition des Krieges zu studieren und damit zu experimentieren, um bessere Erfahrungen zu sammeln."
 ##########
 CUB_special:0 "Spezialabteilungen"
 CUB_special_desc:0 "Es ist an der Zeit, dass die kubanischen Truppen in anderen Umgebungen trainieren. Nur dann wird unsere Armee bereit sein, sich allen Problemen auf dem Schlachtfeld zu stellen."
 ##########
 CUB_military_tres:0 "Artillerie 2"
 CUB_military_tres_desc:0 "Die Artillerie wird Tausenden Kubanern das Leben retten!"
 ##########
 CUB_air:0 "DAAFAR"
 CUB_air_desc:0 "Die Luftabwehr der Revolutionären Streitkräfte bereitet sich auf die Teilnahme an einem möglichen groß angelegten Krieg vor. Aus diesem Grund wurde mit dem Bau einer Verbesserung des kubanischen Luftwaffenstützpunkts begonnen."
 ##########
 CUB_figther:0 "Kämpfer"
 CUB_figther_desc:0 "Es ermöglicht die Untersuchung von Modellen modernerer Kampfflugzeuge."
 ##########
 CUB_bomber:0 "Bomber"
 CUB_bomber_desc:0 "Es ermöglicht die Untersuchung von Modellen modernerer Bomber."
 ##########
 CUB_air_tres:0 "Marinebomber"
 CUB_air_tres_desc:0 "Es ermöglicht die Untersuchung neuer Modelle in Marineflugzeugen."
 ##########
 CUB_cas:0 "Luftunterstützung"
 CUB_cas_desc:0 "Wir müssen unsere Armee aus der Luft unterstützen."
 ##########
 CUB_air_cuatro:0 "Luftschule"
 CUB_air_cuatro_desc:0 "Nach dem Erwerb der Technologie können wir unsere Männer nun an Prototypen von Flugzeugen der neuesten Generation ausbilden."
 ##########
 CUB_misil:0 "Kubanische Raketen"
 CUB_misil_desc:0 "Was ist das? Beschwerden von Dorfbewohnern behaupten, fliegende Objekte mit der kubanischen Flagge gesehen zu haben!"
 ##########
 CUB_nuclear:0 "Kernforschung"
 CUB_nuclear_desc:0 "Hat jemand Atomkrieg gesagt?"
 ##########
 CUB_navy:0 "Armada Nacional"
 CUB_navy_desc:0 "Wir müssen uns darauf konzentrieren, unsere Präsenz in den Meeren und Ozeanen zu verstärken. Nur so können wir unsere Souveränität bewahren."
 ##########
 CUB_eslastico:0 "Flexibles Marineblau"
 CUB_eslastico_desc:0 "Durch die Neugestaltung der Seekriegsführung unter Berücksichtigung der Fortschritte in der U-Boot-Technologie können wir feindliche Konvois effizient bekämpfen."
 ##########
 CUB_large:0 "Große Marine"
 CUB_large_desc:0 "Die Anpassung unserer Marinedoktrinen an große Schiffe und die Gewährleistung der Sicherheit unserer Handelskonvois wird uns viel darüber beibringen, welche Art von Schiffen wir benötigen."
 ##########
 CUB_submarine:0 "U-Boote"
 CUB_submarine_desc:0 "Es gibt keine bessere Verteidigung als eine gute Gruppe alter Wölfe."
 ##########
 CUB_crusero:0 "Kreuzfahrtschiffe"
 CUB_crusero_desc:0 "Ist es notwendig, dies zu untersuchen?"
 ##########
 CUB_destroyer:0 "Zerstörer"
 CUB_destroyer_desc:0 "Durch bessere, moderne und wirksame Zerstörer gegen die Produktion des Feindes."
 ##########
 CUB_capital:0 "Schlachtschiffe"
 CUB_capital_desc:0 "Es ist Zeit zu zeigen, wie groß und mächtig unsere Marineindustrie ist. Für die Schlachtschiffe!"+
 ##########
 CUB_costarica:0 "Krieg mit Costa Rica"
 CUB_costarica_desc:0 "Nach so vielen Vorbereitungen ist es an der Zeit, der Welt die Wahrheit zu zeigen."
 ##########
 CUB_nicaragua:0 "Krieg mit Nicaragua"
 CUB_nicaragua_desc:0 "Nicaragua muss fallen, um einen leichter zugänglichen Weg zum Kontinent zu haben."
 ##########
 CUB_honduras:0 "Krieg mit Honduras"
 CUB_honduras_desc:0 "Honduras ist ein weiterer Schritt auf dem Weg zu unserem wahren Ziel. Honduras und Mexiko."
 ##########
 CUB_mexico:0 "Invasion in Mexiko"
 CUB_mexico_desc:0 "Unsere mexikanischen Kollegen geraten auf Abwege und wir müssen sie zu einer neuen Ideologie führen. Wir werden ihr Land erobern und sie in eine neue Weltordnung führen!"
 ##########
 CUB_guatemala:0 "Invasion in Guatemala"
 CUB_guatemala_desc:0 "Bereiten wir eine Invasion Guatemalas vor und befreien wir ihn von der Unterdrückung durch seine Regierung!"
 ##########
 CUB_estadosunidos:0 "Anspruch auf Florida"
 CUB_estadosunidos_desc:0 "Viele Kubaner leben im Bundesstaat Florida. Wir fordern die Vereinigten Staaten auf, uns Territorium zu überlassen, sonst müssen sie sich unseren besten Soldaten stellen."
 ##########
 CUB_ger:0 "Außerhalb Deutschlands"
 CUB_ger_desc:0 "Unterstützen wir unsere sowjetischen Kameraden im Kampf gegen Deutschland!"
 ##########
 newfocus_48:0 "Infrastruktur 2"
 newfocus_48_desc:0 "Mehr Infrastruktur"
 ##########
 newfocus_49:0 "Industria Nacional 2"
 newfocus_49_desc:0 "Weitere Branchen"
 ##########
 newfocus_50:0 "Militärindustrie"
 newfocus_50_desc:0 "Weitere Branchen Militär"
 
 
