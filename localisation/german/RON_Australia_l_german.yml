 australia.15.t:0 "Antijapanische Haltung"
 australia.15.d:0 "Australien hat begonnen, uns auf der Weltbühne feindselige Schritte zu unternehmen. Wir sollten ihnen die Bedeutung echter Macht beibringen und zeigen, dass man sie fürchten sollte."
 australia.15.a:0 "Die Narren wissen nicht, mit wem sie sich anlegen"
 australia.16.t:0 "Feind unseres Feindes"
 australia.16.d:0 "Australien hat kürzlich seine Bemühungen im Krieg gegen die Japaner im Pazifik verstärkt. Wir täten gut daran, zusammenzuarbeiten, um diese Bedrohung zu zerschlagen."
