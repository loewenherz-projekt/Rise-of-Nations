l_german:
australian_focus:0 "Australischer nationaler Fokus"
 ###Industry###
 AST_create_drb:0 "Richten Sie den DRB ein"
 AST_create_drb_desc:0 "Das Australian Principle Supply Officer’s Committee richtete acht Unterausschüsse ein, die vom Defence Resources Board koordiniert wurden."
 AST_urban_planning:0 "Zivilbaukorps"
 AST_urban_planning_desc:0 "Im April 1942 wurde das CCC gegründet, um Arbeitskräfte für den Bau von Infrastruktur wie Flugplätzen, Geschützstellungen, Kasernen, Straßen und anderen Projekten bereitzustellen, die während des Zweiten Weltkriegs in Australien durchgeführt wurden. Bis zum Ende des Zweiten Weltkriegs hatten 77.500 Männer im CCC gedient und 218 von ihnen verloren ihr Leben."
 AST_construction:0 "Industrielle Anstrengungen der östlichen Staaten"
 AST_construction_desc:0 "Da die Tage in Europa immer düsterer werden, müssen wir Maßnahmen ergreifen, um sicherzustellen, dass unser Land wirtschaftlich in der Lage ist, eine Armee zu unterhalten, die das Festland verteidigen kann. Zunächst müssen wir uns den östlichen Staaten zuwenden, um eine Zukunft für unser Land aufzubauen."
 AST_construction_2:0 "Industrielle Anstrengungen der westlichen Staaten"
 AST_construction_2_desc:0 "Mit der Stärkung der östlichen Bundesländer wird die Entwicklung der Industrie im Westen der Wirtschaft weiter helfen."
 AST_construction_3:0 "Zusätzliche Baumaßnahmen"
 AST_construction_3_desc:0 "Durch den Ausbau unseres Infrastrukturnetzes haben wir unsere Baukapazitäten in der Westregion deutlich verbessert."
 AST_infrastructure:0 "Autobahnen im Osten des Staates"
 AST_infrastructure_desc:0 "Ein Land ohne angemessene Infrastruktur kann keine fortschrittlichen Projekte oder Bauvorhaben durchführen."
 AST_infrastructure_2:0 "Bau der Indian-Pacific-Zuglinie"
 AST_infrastructure_2_desc:0 "Der weitere Ausbau unserer Infrastruktur wird die für geheime Hightech-Projekte notwendigen Transport- und Kommunikationsmittel ermöglichen."
 AST_create_csir:0 "Finanzieren Sie das CSIR"
 AST_create_csir_desc:0 "Im Jahr 1926 wurde das Institut durch den Science and Industry Research Act durch den „Council for Scientific and Industrial Research“ (CSIR) ersetzt."
 AST_radio_efforts:0 "Einrichtung eines Radiophysik-Beirats"
 AST_radio_efforts_desc:0 "Die Forschung zur Radar- bzw. Funkortungstechnologie in Australien wurde vom Radiophysics Advisory Board koordiniert, das beim Council for Scientific and Industrial Research (CSIR) eingerichtet wurde."
 AST_nuclear_efforts:0 "Erwerben Sie Atomwaffen"
 AST_nuclear_efforts_desc:0 "Australien prüfte den Erwerb taktischer Atomwaffen aus dem Vereinigten Königreich oder den Vereinigten Staaten und empfahl den Erwerb taktischer Atomwaffen zur Bewaffnung der australischen Bomber English Electric Canberra und der Kampfflugzeuge CAC Sabre."
 AST_secret_weapons:0 "Geheimwaffen"
 AST_secret_weapons_desc:0 "Im September 1947 wurde Burnet eingeladen, dem Unterausschuss für chemische und biologische Kriegsführung des Ausschusses für die Entwicklung neuer Waffen und Ausrüstung beizutreten und verfasste anschließend einen geheimen Bericht mit dem Titel „Notiz zum Krieg aus biologischer Sicht“."
 AST_military_logistics:0 "Betriebsrat"
 AST_military_logistics_desc:0 "Der im Februar 1942 gegründete Allied Works Council hatte die Aufgabe, während des Zweiten Weltkriegs militärische Bauarbeiten in Australien zu beaufsichtigen und zu organisieren. Edward Granville Theodore wurde zum Generaldirektor des Councils ernannt."
 AST_armament:0 "Erweiterung der Lithgow Arms Factory"
 AST_armament_desc:0 "Die Fabrik in Lithgow kann den Waffenbedarf nicht decken. Eine neue Fabrik wird in Bathurst, etwa 40 Meilen westlich von Lithgow, errichtet. Es folgte der Bau von Zulieferfabriken in den umliegenden Städten Orange, Forbes, Wellington, Mudgee, Cowra, Young, Dubbo, Parkes, Portland und Katoomba."
 AST_armament_2:0 "John Lysaght Fabriken"
 AST_armament_2_desc:0 "Die Waffen wurden in den John Lysaght-Fabriken in Port Kembla und Newcastle hergestellt und zwischen März 1942 und Februar 1943 wurden 28.000 Owen-Gewehre produziert."
 AST_armament_3:0 "Zusätzliche Munitionsfabriken"
 AST_armament_3_desc:0 "Zusätzliche Munitionsfabriken sollen in Derwent Park (2-Zoll-Mörsergranaten), Tasmanien, Welshpool (.303-Gewehr) und Kalgoorlie (40-mm-Bofors-Granaten), Westaustralien, Adelaide (.303-Gewehr) und Finsbury (Patronenhülsen und Granatzünder), Südaustralien, gebaut werden."
 AST_defensive_focus:0 "Defensive Vorbereitungen"
 AST_defensive_focus_desc:0 "Die Welt scheint mit jedem Tag düsterer zu werden. Sowohl in Europa als auch in Asien erreichen die Spannungen einen Siedepunkt, und es ist nicht nur unklug, sondern schlichtweg gefährlich, untätig zuzusehen. Wir müssen Vorbereitungen treffen, nicht nur um uns selbst, sondern auch um unsere Verbündeten zu schützen."
 AST_fortification:0 "Schützen Sie das Festland"
 AST_fortification_desc:0 "Wir sind letztlich ein Inselstaat. Unsere Küsten sind riesig, und wir verfügen schlicht nicht über genügend Schiffe, um unsere gesamte Küste zu schützen. Um uns vor Seeinvasionen zu schützen, müssen entlang unserer wichtigsten Häfen Küstenbefestigungen errichtet werden."
 AST_fortification_2:0 "Verteidige die Inseln"
 AST_fortification_2_desc:0 "Unser Heimatland ist sicher, doch unsere abgelegenen Gebiete sind einer Invasion von See aus möglicherweise noch stärker ausgesetzt. Diese Inseln sind für uns lebenswichtig, und Befestigungen sind ein Muss."  
 
 ###Land###
 AST_aif_organisation:0 "2. AIF organisiert"
 AST_aif_organisation_desc:0 "Nach der Weltwirtschaftskrise war die Zahl der Bürgerwehren auf dem Papier auf 35.000 gesunken, mehr als die Hälfte der Freiwilligen war nicht in der Lage, regelmäßig zu helfen. Mangelnde Finanzierung und fehlende gesetzliche Unterstützung der Bürgerwehren gelten als die beiden Hauptursachen für den rapiden Rückgang. Angesichts des drohenden Krieges in Europa müssen wir Maßnahmen ergreifen, um diese Probleme zu lösen, bevor es zu spät ist. "
 AST_desert_doctrine:0 "Konventionelle Kriegsführung"
 AST_desert_doctrine_desc:0 "Die Vorkriegsdoktrin der australischen Armee konzentrierte sich auf konventionelle Kriegsführung im europäischen Umfeld. Diese Doktrin und die dazugehörigen Ausbildungshandbücher waren in allen Commonwealth-Ländern gleich. Nach Kriegsausbruch konzentrierte sich die Armee weiterhin auf die Vorbereitung ihrer Einheiten auf den Einsatz in Europa und Nordafrika."
 AST_pacific_doctrine:0 "Unkonventionelle Kriegsführung"
 AST_pacific_doctrine_desc:0 "Obwohl der Schwerpunkt der Armee auf konventioneller Kriegsführung lag, traf Ende 1940 der britische Offizier Lieutenant Colonel JC Mawhood mit einem kleinen Fachstab in Australien ein, um dort unkonventionelle Kriegsführung auszubilden. In Wilsons Promontory, Victoria, wurde eine Schule namens No. 7 Infantry Training Centre eröffnet."
 AST_infantry_forces:0 "Infanterieausrüstung"
 AST_infantry_forces_desc:0 "Australien verfügte bei Kriegsausbruch nicht über einen Bestand an modernen Waffen und Ausrüstung. Da die Briten aufgrund ihrer eigenen Mobilisierung nicht helfen konnten, mussten wir unsere eigenen Fertigungsstraßen entwickeln."
 AST_infantry_weapons:0 "Owen Gun-Designs"
 AST_infantry_weapons_desc:0 "Die Owen Machine Carbine war eine australische Maschinenpistole, die 1939 von Evelyn (Evo) Owen entwickelt wurde. Sie war äußerst zuverlässig und funktionierte auch noch, wenn sie vollständig in Sand und Schlamm versunken war, im Gegensatz zu den Maschinenpistolen von Sten und Thompson."
 AST_artillery_focus:0 "Königliches Regiment der australischen Artillerie"
 AST_artillery_focus_desc:0 "Im weiteren Verlauf des Krieges veranlassten die geografische Isolation Australiens und die andere Ausrichtung der Kriegspolitik und der Kriegsschauplätze als Großbritannien dazu, dass Australien zunehmend Waffen, Ausrüstung und militärische Unterstützung von den Vereinigten Staaten erhielt."
 AST_elite_forces:0 "Scout-Autos"
 AST_elite_forces_desc:0 "Die Lehren aus dem Ersten Weltkrieg flossen in kreative Anwendungen und Innovationen ein. Der Dingo basierte auf einem handelsüblichen Ford 30-cwt, der mit einem Allradantrieb, einem leichten Bren-Maschinengewehr und einem Mk19-Funkgerät ausgestattet war."
 AST_mechanized_focus:0 "Panzerwagen-Designs"
 AST_mechanized_focus_desc:0 "Zu Beginn des Zweiten Weltkriegs war Großbritannien nicht in der Lage, den Bedarf des Commonwealth an gepanzerten Kampffahrzeugen zu decken. Viele Commonwealth-Länder entwickelten daraufhin eigene gepanzerte Fahrzeuge. Der Rover wurde 1941 entworfen, die gepanzerten Karosserien wurden von Ruskin Motor Bodies in Melbourne hergestellt. Die Produktion wurde 1943 eingestellt; insgesamt wurden 238 Fahrzeuge gebaut."
 AST_night_ops:0 "Nachtbetrieb"
 AST_night_ops_desc:0 "Nachtkampf ist eine Idee, die schon seit Jahrhunderten existiert. Ihre wahre Bedeutung erlangte sie im Zweiten Weltkrieg. Im Pazifik setzten insbesondere die Japaner Nachtoperationen ein, um einen zahlenmäßig überlegenen Gegner effektiv zu bekämpfen. Wir können lernen, diese Taktiken nicht nur anzuwenden, um einen überlegenen Gegner zu besiegen, sondern auch, um nächtliche Angriffsversuche unserer Feinde abzuwehren."
 AST_m_unit:0 "M Spezialeinheit"
 AST_m_unit_desc:0 "Die Rolle der M Special Unit konzentrierte sich auf das Sammeln von Informationen über japanische Schiffs- und Truppenbewegungen, wobei kleine Teams der Einheit auf dem See-, Luft- oder Landweg hinter den feindlichen Linien landeten."
 AST_z_unit:0 "Z-Spezialeinheit"
 AST_z_unit_desc:0 "Die australische Z-Spezialeinheit war eine spezialisierte Aufklärungs- und Sabotageeinheit, deren Truppen per Fallschirm oder U-Boot abgeworfen wurden, um Informationen zu liefern und Guerillakriege zu führen."
 AST_armour_focus:0 "Panzerbemühungen"
 AST_armour_focus_desc:0 "Der Sentinel-Panzer war ein Kreuzerpanzer, der im Zweiten Weltkrieg in Australien als Reaktion auf den Krieg in Europa und die Bedrohung durch Japan entwickelt wurde. Es war der erste Panzer mit einem aus einem Stück gegossenen Rumpf und der einzige Panzer, der in Australien in großen Mengen produziert wurde."
 AST_medium_tanks:0 "Kaufen Sie US-Designs"
 AST_medium_tanks_desc:0 "Während des Zweiten Weltkriegs setzte die australische Armee eine Vielzahl unterschiedlicher Panzer ein, darunter erbeutete italienische Panzer, zurückeroberte französische Panzer, britische Panzer und amerikanische Panzer. Obwohl Vielfalt Vorteile bietet, war Australien größtenteils auf Ersatzteile oder Kriegsbeute anderer Nationen angewiesen. Anstatt weiterhin auf Panzer aus ausländischer Produktion zu setzen, sollen US-Panzerdesigns erworben werden, damit sie auf australischem Boden von australischen Handwerkern gebaut werden können."
 AST_heavy_tanks:0 "Erhalten Sie deutsche Baupläne"
 AST_heavy_tanks_desc:0 "Im Zweiten Weltkrieg war der Einsatz von Panzern der Achsenmächte für die australische Armee keine Seltenheit. Während der Afrika-Feldzüge nutzten australische Kavallerieregimenter erbeutete italienische Panzer, die mit Kängurus bemalt waren, um den Beschuss der Alliierten zu verhindern. Durch politische Bemühungen konnten deutsche Panzerdesigns über Spionageoperationen erworben werden, um die Qualität unserer Panzertruppen zu verbessern."
 AST_usa_tank_trade:0 "Produktionsvereinbarungen"
 AST_usa_tank_trade_desc:0 "Um die amerikanisch-australische Zusammenarbeit weiter zu formalisieren, wurden Produktionsabkommen zwischen den beiden Ländern geschlossen, um die Produktion amerikanischer Panzer unter Verwendung sowohl australischer als auch amerikanischer Teile für die australische Armee besser zu etablieren und zu rationalisieren."
 AST_ger_tank_trade:0 "Teile einschmuggeln"
 AST_ger_tank_trade_desc:0 "Angesichts des Chaos während des Zweiten Weltkriegs besteht kaum ein Zweifel daran, dass es irgendjemandem aufgefallen wäre oder dass es irgendjemandem etwas ausgemacht hätte, wenn Australien deutsche Ausrüstung zur besseren Bewaffnung hinausgeschmuggelt hätte."
 
 ###Air###
 AST_fund_raaf:0 "Finanzieren Sie die RAAF"
 AST_fund_raaf_desc:0 "Im Jahr 1939 trat Australien dem Empire Air Training Scheme bei, in dessen Rahmen Flugbesatzungen eine Grundausbildung in Australien erhielten, bevor sie zur Weiterbildung nach Kanada reisten."
 AST_create_cac:0 "Erstellen Sie das CAC"
 AST_create_cac_desc:0 "Essington Lewis überzeugte unsere Regierung davon, dass Flugzeuge während des Krieges nicht aus „traditionellen“ (d. h. britischen) Quellen verfügbar sein würden, und gründete die Commonwealth Aircraft Corporation. Die Verhandlungen zwischen einigen unserer größten Unternehmen verliefen gut, aber mit staatlicher Unterstützung können wir diese neue Industrie beschleunigen und ihre Finanzierung unterstützen."
 AST_local_planes:0 "Unterstützen Sie lokale Designs"
 AST_local_planes_desc:0 "Wenn wir unsere Bemühungen auf die Entwicklung lokaler Leichtflugzeuge konzentrieren, können wir die Lufthoheit erlangen."
 AST_foreign_planes:0 "Ausländische Designs kaufen"
 AST_foreign_planes_desc:0 "Der Erwerb ausländischer Schwerflugzeuge wird Langstreckenmissionen zugutekommen."
 AST_air_doctrine:0 "Kriegsanstrengungen im Pazifik"
 AST_air_doctrine_desc:0 "Der Beginn des Pazifikkriegs – und der schnelle Vormarsch der japanischen Streitkräfte – bedrohte das australische Festland zum ersten Mal in seiner Geschichte. Die RAAF war auf diesen Notfall völlig unvorbereitet und verfügte zunächst nur über vernachlässigbare Truppen für den Einsatz im Pazifik. Dies müssen wir ändern."
 AST_expand_cac:0 "Erweitern Sie das CAC"
 AST_expand_cac_desc:0 "Wir müssen die Commonwealth Aircraft Corporation erweitern, um mit den Anforderungen der immer stärker werdenden Kriegsanstrengungen Schritt zu halten."
 AST_found_wraaf:0 "Die WRAAF gefunden"
 AST_found_wraaf_desc:0 "Die intensive Lobbyarbeit von Frauen, die gern dienen wollten, und des Stabschefs der Luftwaffe, der männliches Personal für den Dienst im Ausland freistellen wollte, führte zur Gründung der Women&#39;s Royal Australian Air Force."
 AST_jet_effort:0 "Entwicklungen bei Strahltriebwerken"
 AST_jet_effort_desc:0 "Vielversprechende frühe Entwicklungen im Bereich der Triebwerkstechnologie könnten sich für den Sieg in der Luftschlacht als entscheidend erweisen."
 
 ###Navy###
 AST_fund_ran:0 "Finanzieren Sie das RAN"
 AST_fund_ran_desc:0 "Zu Kriegsbeginn war die Royal Australian Navy relativ bescheiden, auch wenn sie wohl die kampfbereiteste der drei Teilstreitkräfte war. Im Gegensatz zu den Vereinbarungen mit der britischen Admiralität zu Beginn des Ersten Weltkriegs blieben die Schiffe der RAN während des Zweiten Weltkriegs unter australischem Kommando."
 AST_underdog_focus:0 "Außenseitertaktiken"
 AST_underdog_focus_desc:0 "Wir verfügen weder über die nötige Industrie noch über die nötige Personalstärke, um eine unseren Feinden zahlenmäßig überlegene oder ebenbürtige Marine zu unterhalten. Um potenzielle Feinde wirksam zu bekämpfen, müssen wir klüger und nicht härter kämpfen."
 AST_british_navy:0 "Eine britische Marine"
 AST_british_navy_desc:0 "Wir sind Mitglied des Commonwealth! Wir haben wenig zu befürchten, wenn wir Seite an Seite mit der Royal Navy kämpfen, und deshalb werden wir unsere Marine ähnlich erweitern, wie sie ihre erweitert haben."
 AST_commerce_focus:0 "Handelsfokus"
 AST_commerce_focus_desc:0 "Unsere Verbündeten und Handelspartner sind weit entfernt, und unsere eigene Industrie ist letztlich begrenzt. Indem wir uns auf die Produktion von Begleitschiffen und Transportern konzentrieren, können wir unsere wichtigen Handelsbeziehungen wirksam schützen und ausbauen."
 AST_fleet_hub:0 "Flottenhubkonstruktionen"
 AST_fleet_hub_desc:0 "Australische Häfen gehören zu den wichtigsten im Osten. Während des Zweiten Weltkriegs waren australische Häfen wie Fremantle und Brisbane Dreh- und Angelpunkte der alliierten Kriegsanstrengungen im Südosten und im Pazifik. Der nördlichste Hafen von Darwin, Ausgangspunkt unserer Operationen im Norden, wird zur Unterstützung unserer Ziele verzehnfacht."
 AST_cruiser_focus:0 "Kreuzerstreitkräfte"
 AST_cruiser_focus_desc:0 "Der erste Schritt zum Ausbau unserer Marine ist die Verbesserung unserer Kreuzer. Kreuzer sind die Mittelklasse jeder Marine und die vielseitigsten Schiffe mit ausgewogener Geschwindigkeit, Reichweite, Panzerung und Feuerkraft. "
 AST_sea_wolves:0 "Beleben Sie das RANSS wieder"
 AST_sea_wolves_desc:0 "U-Boote haben sich durch die Erfolge der deutschen U-Boote im Ersten Weltkrieg als äußerst kostengünstige Kriegsschiffe bewährt. Zweimal zuvor scheiterte der U-Boot-Dienst der Royal Australian Navy aufgrund wirtschaftlicher Umstände oder schlichtweg fehlerhafter Maschinen. Die dritte Gründung der RANSS sichert ihre Zukunft als Kern der RAN."
 AST_destroyer_force:0 "Die Schrott-Eisen-Flottille"
 AST_destroyer_force_desc:0 "Die Schrott-Eisen-Flottille war der Name, den der Nazi-Propagandaminister Joseph Goebbels der fünfköpfigen Zerstörerflottille der RAN gab. In echter australischer Manier werden wir die sogenannte Schrott-Eisen-Flottille zur mächtigsten Zerstörerflotte auf hoher See ausbauen und dann sehen, was ausländische Propagandaminister dazu sagen!"
 AST_arm_coast:0 "Bewaffnen Sie die Küste"
 AST_arm_coast_desc:0 "Da die Spannungen in der Welt ihren Höhepunkt erreichen, ist es nun von größter Bedeutung, den Schutz unserer lebenswichtigen Häfen zu verbessern, um sie vor Angriffen vom Meer aus zu bewahren."
 AST_battleship_focus:0 "Unterstützung der Cockatoo Shipyards"
 AST_battleship_focus_desc:0 "Während des Zweiten Weltkriegs war Cockatoo Island die wichtigste Schiffsreparaturanlage im Südwestpazifik. Rund 250 Schiffe wurden auf der Insel umgebaut oder repariert."
 AST_carrier_focus:0 "Gründung der Fleet Air Arm"
 AST_carrier_focus_desc:0 "Aufgrund der zunehmenden Qualität und Bedeutung der Marinefliegerei wurde 1947 die Fleet Air Arm gegründet, die die alte Australian Navy Aviation Group ersetzte. Die FAA bildete die Kernstreitkräfte der neuen Royal Australian Navy."
 AST_trade_interdiction:0 "Veröffentlichung der australischen Seedoktrin"
 AST_trade_interdiction_desc:0 "Durch den Einsatz überlegener Technologie, hervorragend ausgebildeter Seeleute und einer flexiblen, soliden Doktrin wird sich die Royal Australian Navy unabhängig von ihrer Anzahl als die Beste der Besten hervorheben."
 AST_rule_waves:0 "Gemeinsam beherrschen wir die Wellen"
 AST_rule_waves_desc:0 "Die Schiffe, die unter dem Union Jack und dem Commonwealth fahren, segeln Seite an Seite mit der Royal Navy und behalten ihren Status als ewige Herrscher der Meere!"
 
 ###Political###
 AST_leave_commonwealth:0 "Verlassen Sie das Commonwealth"
 AST_leave_commonwealth_desc:0 "Zu lange haben wir unter den verächtlichen Blicken britischer Oberherren geschuftet. Es ist Zeit, Stellung zu beziehen und ein neues Schicksal für die australische Nation zu schmieden."
 AST_create_board:0 "Einrichtung eines beratenden Kriegsrates"
 AST_create_board_desc:0 "Im Jahr 1940 akzeptierte Menzies widerwillig Curtins Vorschlag zur Einrichtung eines Kriegsbeirats, in dem Regierung und Opposition gleichberechtigt vertreten sein sollten und den die Regierung in allen Fragen der Kriegsführung informieren und konsultieren könnte."
 AST_stay_commonwealth:0 "Bleiben Sie auf Kurs"
 AST_stay_commonwealth_desc:0 "Demokratie ist in der heutigen Zeit die wahrhaftigste und gerechteste Form der Staatsführung. Es wäre nicht töricht, den Commonwealth zu verlassen, und würde uns den Widrigkeiten des Auslands völlig aussetzen."
 
 ##Fascism##
 AST_nationalism_focus:0 "Werde Faschist"
 AST_nationalism_focus_desc:0 "Stärke ist die einzige Eigenschaft, die es wert ist, angestrebt zu werden. Andere haben diese Wahrheit angenommen, so sehr wir auch."
 AST_intervention_nationalists:0 "Nationalistische Intervention"
 AST_intervention_nationalists_desc:0 " Die Nationalisten gewinnen in Spanien endlich an Boden. Ihre Sache ist gerecht, und jeder, der bereit ist, für sie zu kämpfen, sollte dies tun dürfen."
 AST_militarism_focus:0 "Nationaler Militarismus"
 AST_militarism_focus_desc:0 "Wer das Militär als notwendiges Übel betrachtet, ist dazu verdammt, angesichts des Krieges zu zögern. Wir werden den Militarismus in unsere Kultur einprägen, um ein Volk von Soldaten zu werden."
 AST_demand_nz:0 "Nachfrage Neuseeland"
 AST_demand_nz_desc:0 "Nachdem wir nun unsere Unabhängigkeit von den Briten erlangt haben, sollten sie verstehen, dass sich dieser Anspruch auf alle ihre Ländereien in dieser Region erstreckt."
 AST_war_propaganda:0 "Die Anzac-Legende"
 AST_war_propaganda_desc:0 "Nachdem wir unsere Ideologie als wahrheitsgetreu etabliert haben, kann sie auch als Wahrheit gelehrt werden. Bildung und Medien müssen diese Lehre widerspiegeln."
 AST_claim_indonesia:0 "Anspruch auf Indonesien"
 AST_claim_indonesia_desc:0 "Die Niederländer weiten ihren Einfluss weit über ihre Grenzen hinaus aus, genau wie die Briten, und dies verdient die gleiche Behandlung."
 AST_ban_communism:0 "Verbot des Kommunismus"
 AST_ban_communism_desc:0 "Wir haben die Kontrolle über das Land erlangt, aber wir sind nicht völlig sicher. Der Kommunismus, der Erzfeind der ultranationalistischen Doktrinen, denen wir folgen, wird fortan aus der Presse, der Politik und der Öffentlichkeit verbannt."
 AST_fascist_faction:0 "Australien zuerst"
 AST_fascist_faction_desc:0 "Um uns wirklich von unseren früheren schwachen Oberherren abzuheben, müssen wir unsere eigene Fraktion gründen, eine Fraktion, die das australische Volk, die australischen Interessen und den australischen Ehrgeiz an erste Stelle setzt! "
 AST_join_axis:0 "Treten Sie der Achse bei"
 AST_join_axis_desc:0 "Es ist nur klug, sich der internationalen faschistischen Gemeinschaft anzuschließen und uns mit den großen Militärmächten des Westens und des Ostens zu verbünden."
 AST_asian_thrust:0 "Asiatischer Schub"
 AST_asian_thrust_desc:0 "Da der europäische Einfluss im Indopazifik-Raum auf einem historischen Tiefstand ist, ist es an der Zeit, unsere Beteiligungen in Übersee auf den größeren eurasischen Kontinent auszuweiten – die ersten Schritte auf unserem Weg zur Größe!"
 AST_german_research:0 "Deutscher Forschungspakt"
 AST_german_research_desc:0 "Die Deutschen haben uns ein Angebot für einen Forschungspakt zwischen unseren beiden großen Ländern unterbreitet. Es ist an der Zeit, dieses Angebot anzunehmen, denn die klügsten Köpfe Deutschlands und Australiens haben uns viel zu lehren."
 
 ##Communism##
 AST_communism_focus:0 "Werde Kommunist"
 AST_communism_focus_desc:0 "Nur wenn wir unser Volk vereinen, können wir uns gegen die Feinde durchsetzen, die uns zu vernichten drohen."
 AST_workers_state:0 "Arbeiterstaat"
 AST_workers_state_desc:0 "Wir sind ein Land mit endlosen Wäldern, unerschöpflichen Minen, fruchtbaren Böden und geschäftigen Städten. Wir sind ein Land der Möglichkeiten, mit einem Job für jeden Mann und einem Mann für jeden Job."
 AST_intervention_republicans:0 "Republikanische Intervention"
 AST_intervention_republicans_desc:0 "Das republikanische Spanien braucht unsere Hilfe! \nJeder, der bereit ist, für die Sache zu kämpfen, sollte dies dürfen. Wir dürfen nicht zulassen, dass ein weiteres faschistisches Regime an Boden gewinnt."
 AST_influence_neighbours:0 "Einfluss auf Nachbarn"
 AST_influence_neighbours_desc:0 "Der Kommunismus konzentriert sich auf die Menschen. Nicht auf die Menschen einer Nation, sondern auf die Menschen aller Nationen. Unsere Nachbarn hegen kommunistische Sympathien, und es ist unsere Pflicht, ihnen den wahren Weg zu zeigen."
 AST_communist_industry:0 "Großer Sprung nach vorn"
 AST_communist_industry_desc:0 "Durch hohe Investitionen in den Industriesektor und die Suche nach Ressourcen wurden neue Bergbaumöglichkeiten entdeckt. Große Bauxitvorkommen in der Region Weipa in Queensland, die Chromitmine Coobina in der Pilbara-Region in Westaustralien und die Middleback Ranges in Südaustralien enthielten reichlich Arrium."
 AST_mobalise_unions:0 "Mobilisieren Sie die Gewerkschaften"
 AST_mobalise_unions_desc:0 "Gewerkschaften bieten den vielen Arbeitern die Möglichkeit, sich gegen die wenigen Eliten zu wehren. Da das Land nun vom Volk regiert wird, ist es an der Zeit, die Gewerkschaften als echte Volksunion in die Regierung zu integrieren!"
 AST_socialist_science:0 "Sozialistische Wissenschaft"
 AST_socialist_science_desc:0 "Viel zu lange wurden die Wissenschaften von den Massen vernachlässigt, unterfinanziert und ignoriert. Das ist vorbei. Die großen Geister unserer Zeit sollen nicht länger der Willkür der Elite ausgeliefert sein. Die Wissenschaft wird eines der Hauptziele unserer Nation sein, und sie wird die Finanzierung und Unterstützung erhalten, die sie benötigt, denn sie ist der Wegweiser für die Zukunft!"
 AST_join_comintern:0 "Treten Sie der Komintern bei"
 AST_communist_faction:0 "Boykott der Komintern"
 AST_communist_faction_desc:0 "Stalin hat den Kommunismus korrumpiert! Die Komintern ist nicht die utopische Arbeitergesellschaft, von der Marx und Lenin träumten. Sie ist ein System, das ausschließlich der systematischen Unterdrückung von Minderheiten dient und Stalins Ego aufbläht! Wir werden uns niemals an einer solch verdorbenen, degenerierten Gesellschaft beteiligen und der Welt zeigen, was Kommunismus wirklich ist!"
 AST_anti_japanese:0 "Antijapanische Haltung"
 AST_anti_japanese_desc:0 "Unser Land ist Zielscheibe des japanischen Ultranationalismus. Sie glauben, wir seien nur ein Trittstein auf ihrem Weg zum Ruhm. Wir werden den Japanern zeigen, dass wir kein Stein auf dem anderen sind. Wir sind das Volk und wir werden zurückschlagen!"
 AST_convert_nz:0 "Konvertieren Neuseeland"
 AST_convert_nz_desc:0 "Die Menschen in Neuseeland haben genug von ihrer Regierung, die der britischen Krone wie ein Schoßhündchen dient. Wir werden diesen Missbrauch nicht länger dulden. Wir werden Forderungen stellen: Forderungen an Großbritannien, Neuseeland aus seinem imperialistischen Imperium zu befreien, und Forderungen an die neuseeländische Regierung, dem Volk zu dienen, anstatt sich vom Volk dienen zu lassen."
 AST_usa_pact:0 "Feind unseres Feindes"
 AST_usa_pact_desc:0 "Amerika mag eines Tages unser Feind sein, aber heute ist es der Feind unseres Feindes. Der japanische Imperialismus muss eingedämmt und niedergeschlagen werden, und Amerika teilt diesen Wunsch, Japans Ambitionen einzudämmen."
 AST_befriend_siam:0 "Siam zwingen"
 AST_befriend_siam_desc:0 "Siam ist eine Hochburg des indochinesischen Volkes, umgeben vom europäischen Kolonialismus und Imperialismus. Unsere Propaganda unter der siamesischen Bevölkerung hat bereits Fuß gefasst, doch es ist Zeit zu handeln: Wir müssen das Volk führen und Siam den Kommunismus annehmen lassen."
 
 ##White Australia##
 AST_strengthen_white_australia:0 "Stärkung der White Australia Policy"
 AST_strengthen_white_australia_desc:0 "Indem sichergestellt wird, dass nur berechtigte Bürger einreisen dürfen, kann das Land zu einer stärkeren Gesellschaft werden, die mehr im Einklang mit unserem Mutterland steht."
 AST_british_loyalty:0 "Loyalität gegenüber den Briten"
 AST_british_loyalty_desc:0 ""
 AST_neutrality_focus:0 "Fokus auf die Heimatfront"
 AST_neutrality_focus_desc:0 "Trotz oder vielleicht gerade wegen ihrer lebhaften Erinnerungen an die Schrecken des Ersten Weltkriegs führten viele Australier in den ersten Jahren des Zweiten Weltkriegs ihr alltägliches Leben mit wenig oder gar keinen Veränderungen fort. Sie kämpften mit steigenden Preisen und Arbeitslosigkeit, doch sofern ihre Verwandten nicht im Ausland dienten, spürten sie noch keine wirkliche Gefahr."
 AST_interventionism_focus:0 "Werden Sie im Ausland aktiv"
 AST_interventionism_focus_desc:0 "Wenn uns die Freiheit wichtig ist, müssen wir sie nicht nur für uns, sondern für alle Nationen schützen. Wenn das Krieg bedeutet, dann ist das so!"
 AST_deterrence:0 "Die japanische Bedrohung"
 AST_deterrence_desc:0 "Im Februar 1942 befürchteten viele Australier eine Invasion der Japaner. In Erwartung feindlicher Luftangriffe wurden Verdunkelungsmaßnahmen eingeführt und Luftangriffswarnungen herausgegeben. An vielen Stränden der Ostküste wurde zudem Stacheldraht gespannt."
 AST_volunteer_corps:0 "Rekrutierungspropaganda"
 AST_volunteer_corps_desc:0 "Freiheit kann nicht von Unwilligen erzwungen werden, sonst würde sie zur Farce. Wer freiwillig für die Freiheit zu den Waffen greift, muss allerdings auch die Mittel dazu erhalten."
 AST_foreign_expeditions:0 "Auslandsexpeditionen"
 AST_foreign_expeditions_desc:0 "Da unsere Feinde bereit sind, im Namen ihrer Ideale in weit entfernte Konflikte einzugreifen, müssen wir bereit sein, dasselbe für unsere zu tun."
 AST_why_we_fight:0 "Alles drin"
 AST_why_we_fight_desc:0 "Um der drohenden Gefahr zu begegnen, werden alle Australier – Männer, Frauen und Kinder – dazu aufgerufen, sich mit aller Kraft für den Krieg einzusetzen. Tatsächlich wurde die erwachsene Bevölkerung für den Krieg mobilisiert."
 AST_british_tech:0 "Britische Technologien"
 AST_british_tech_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion die Forschung und Entwicklung im Kriegsfall effizienter durchführen."
 
 ##Diverse Australia##
 AST_weaken_white_australia:0 "Schwächung der White Australia Policy"
 AST_weaken_white_australia_desc:0 "Eine Lockerung der Einwanderungsbeschränkungen nach Australien wird dazu beitragen, dass sich alle hier wohler fühlen."
 AST_make_island_states:0 "Machen Sie die Inselstaaten"
 AST_make_island_states_desc:0 "Durch die Verleihung des Staatsstatus an Neuguinea, Neubritannien und die Salomonen wird ihre Bindung an unser Land gestärkt." 
 AST_defend_others:0 "Verteidige unsere Brüder"
 AST_defend_others_desc:0 "Die neuen Versprechen, die wir der Öffentlichkeit gegeben haben, werden nicht gelten, wenn wir nicht bereit sind, unsere Brüder in Übersee zu verteidigen."
 AST_invite_nz:0 "Neuseeland einladen"
 AST_invite_nz_desc:0 "Angesichts der positiven Entwicklung Australiens werden unsere Nachbarn eine endgültige Versöhnung mit Neuseeland offen begrüßen."
 AST_social_security:0 "Sozialversicherungsgesetz"
 AST_social_security_desc:0 "Das Sozialversicherungsgesetz von 1935 garantierte den Bundesstaaten Zuschüsse zur Altersversorgung, staatliche Altersleistungen, Arbeitslosenunterstützung, Unterstützung für unterhaltsberechtigte Kinder und viele weitere Verbesserungen für die australische Bevölkerung. Australien wird sich von der Welt als ein Ort abheben, an dem jeder das Recht hat, nach seinen Wünschen, in Luxus und in Frieden zu leben."
 AST_island_construction:0 "Bemühungen um Inselressourcen"
 AST_island_construction_desc:0 "Unsere neuen Staaten können durch den Zugang zu neuen Ressourcen zu den Bemühungen der australischen Industrie beitragen."
 AST_island_naval:0 "Marineeinsatz des Inselstaates"
 AST_island_naval_desc:0 "Unsere neuen Staaten können zu den Marinebemühungen Australiens beitragen."
 AST_form_confederation:0 "Gründung der Australasiatischen Konföderation"
 AST_form_confederation_desc:0 "Unsere neu gegründete Koalition gewinnt an Macht und verdient die Anerkennung, die sie auf der Weltbühne verdient."
 AST_unite_acdf:0 "Vereint die ACDF"
 AST_unite_acdf_desc:0 "Die Australasian Confederation Defence Force vereint die taktische Macht aller Länder unter unserer Kontrolle."
 AST_acdf_research:0 "Forschungsinstitute"
 AST_acdf_research_desc:0 "Die Forschungsentwicklung der Inselstaaten hat in allen möglichen Bereichen zu überraschenden Ergebnissen geführt."
 AST_offshore_cac:0 "Offshore CAC entwickeln"
 AST_offshore_cac_desc:0 "Wir sind nun in der Lage, eine Niederlassung der Commonwealth Aircraft Corporation in unseren Offshore-Gebieten zu gründen."
 
