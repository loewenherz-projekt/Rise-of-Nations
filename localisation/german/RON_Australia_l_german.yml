 australia.1.t:0 "Ivy May Pearce"
 australia.1.d:0 "Ivy May Pearce hat beantragt, der RAAF als Kampfpilotin beizutreten"
 australia.1.a:0 "Lass sie"
 australia.1.b:0 "Verweigern"
 australia.2.t:0 "Verlassen Sie das britische Commonwealth"
 australia.2.d:0 "Die jahrelange Bindung an die Briten hat unsere Fähigkeit, die Nation zu werden, die wir verdienen, erstickt. Wir werden sie über unsere neu gewonnene Stärke informieren."
 australia.2.a:0 "Wir beziehen Stellung"
 australia.3.t:0 "Afrikanische Wüstentaktiken"
 australia.3.d:0 "Durch die Lehren aus dem vorherigen Krieg haben wir viel Wissen über die Strategien gewonnen, die für die Kriegsführung in den Wüsten Nordafrikas und des Nahen Ostens erforderlich sind."
 australia.3.a:0 "Zum Sieg!"
 australia.4.t:0 "Taktiken der Pazifikinvasion"
 australia.4.d:0 "Die Kämpfe auf dem Kokoda-Pfad waren ein Infanteristenkrieg im dichten Dschungel, in dem der Feind oft erst gesehen wurde, wenn er schon wenige Meter entfernt war …"
 australia.4.a:0 "Nutzen Sie den Vorteil!"
