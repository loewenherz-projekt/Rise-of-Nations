 australia.9.t:0 "Australisches Ultimatum"
 australia.9.d:0 "Die australische Regierung ist dreist geworden und fordert unser indonesisches Herrschaftsgebiet. Diese Ansprüche sind lächerlich, aber verfügen wir über die Ressourcen, den Pazifik zu verteidigen, während die deutsche Bedrohung vor unserer Haustür steht? Vielleicht können wir ihren Expansionsdrang mit einigen der kleineren Inseln stillen."
 australia.9.a:0 "Indonesien aufgeben"
 australia.9.b:0 "Unwichtiges Gebiet abtreten"
 australia.9.c:0 "Widerlegen Sie diese Behauptungen"
