 astnews.2.t:0 "Der König fordert einen neuen Generalgouverneur"
 astnews.2.d:0 "Der König hat die Ablösung von Sir Isaac Isaacs als Generalgouverneur gefordert. Sir Isaac Isaacs war der erste australische Generalgouverneur und erfreut sich großer Beliebtheit beim Volk. Der König hat bereits entschieden, dass Alexander Hore-Ruthven, 1. Earl of Gowrie, als Nachfolger fungieren wird. "
