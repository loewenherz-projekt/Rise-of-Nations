 focus_on_war_zombie:0 "Konzentriere dich auf die Zombies"
 focus_on_war_zombie_desc:0 "ZCOM hat nur eine Aufgabe: Die Ausrottung der Zombies."
 better_weapons:0 "Neue und bessere Waffen"
 better_weapons_desc:0 "Die Erforschung neuer militärischer Ausrüstung hat für ZCOM höchste Priorität. Nur so kann ein effektiver Kampf gegen die Zombies gewährleistet werden."
 better_artillery:0 "Bessere Artillerie"
 better_artillery_desc:0 "Der Fernkampf ist ein Schwerpunkt für ZCOM. Unsere Bewaffnung muss auf dem neuesten Stand gehalten werden."
 better_weapons2:0 "Neue und bessere Waffen"
 better_weapons2_desc:0 "Die Erforschung neuer militärischer Ausrüstung hat für ZCOM höchste Priorität. Nur so kann ein effektiver Kampf gegen die Zombies gewährleistet werden."
 import_weapons_international:0 "Kaufen Sie neue Waffen von den Weltmächten."
 import_weapons_international_desc:0 "Um unsere Truppen zu bewaffnen, brauchen wir Waffen. Waffen, die wir von den Supermächten der Welt kaufen."
 international_volunteers:0 "Freiwillige rekrutieren"
 international_volunteers_desc:0 "Unser Kampf gegen die Zombies braucht Soldaten. Wir sollten versuchen, Männer für unsere Sache zu gewinnen."
 new_soldiers:0 "Eine neue Armee"
 new_soldiers_desc:0 "Eine neue Rekrutierungs- und Ausbildungswelle soll uns die Soldaten bringen, die wir für den bevorstehenden Krieg brauchen."
 ZCOM_new_soldiers: "This focus works similarly to the permanent focus. New troops are trained every 60 days."
 international_weapons:0 "Waffen kaufen"
 international_weapons_desc:0 "Wir brauchen Waffen für unseren Krieg und sollten versuchen, sie zu kaufen."
 ZCOM_new_weapons: "This focus works similar to the permanent focus. You get new weapons every 60 days."
 internal_anwerber:0 "Rekrutieren Sie internationale Generäle"
 internal_anwerber_desc:0 "Wir sollten versuchen, die besten Generäle weltweit für unsere Sache zu gewinnen. Nur so können wir die Zombies ein für alle Mal besiegen."
 tank_project:0 "Panzerforschung"
 tank_project_desc:0 "Die Erforschung neuer militärischer Ausrüstung hat für ZCOM höchste Priorität und Panzer sind unsere wichtigsten Waffen."
 airborne_defence:0 "Luftfahrt"
 airborne_defence_desc:0 "Flugzeuge sind eine der wichtigsten Waffen gegen die Zombies und wir sollten versuchen, sie auf dem neuesten Stand zu halten."
 better_weapons3:0 "Neue und bessere Waffen"
 better_weapons3_desc:0 "Die Erforschung neuer militärischer Ausrüstung hat für ZCOM höchste Priorität. Nur so kann ein effektiver Kampf gegen die Zombies gewährleistet werden."
 internal:0 "innere Sicherheit"
 internal_desc:0 "Zypern muss um jeden Preis geschützt werden!"
 fortress:0 "Zypern befestigen"
 fortress_desc:0 "Es kann jederzeit zu einem Angriff kommen. Wir müssen vorbereitet sein."
 Ports:0 "Ports erweitern"
 Ports_desc:0 "Die Versorgung unserer Truppen erfordert Schiffe und Häfen, an denen sie anlanden können. Beides sollten wir ausbauen."
 ZCO_infrastructure:0 "Infrastruktur erweitern"
 ZCO_infrastructure_desc:0 "Zypern ist die wichtigste Bastion der Menschheit. Es ist nur logisch, dass wir die Infrastruktur der Insel ausbauen."
 criminal_way_focus:0 "Finden Sie andere nicht-legale Finanzierungsquellen"
 criminal_way_focus_desc:0 "Bei der Finanzierung durch die Vereinten Nationen sind wir an Regeln gebunden. Doch was wäre, wenn wir neue, bessere Finanzierungswege finden könnten?"
 sell_zombie_parts:0 "Verkaufe Zombieteile auf dem Schwarzmarkt"
 sell_zombie_parts_desc:0 "Der Verkauf von Zombieteilen auf dem Schwarzmarkt mag illegal sein, ist aber ein lukratives Geschäft."
 Black_market_small_arms:0 "Kaufen Sie Gewehre auf dem Schwarzmarkt"
 Black_market_small_arms_desc:0 "Die Bewaffnung unserer Truppen erfordert eine ständige Versorgung mit Waffen und Munition. Der Schwarzmarkt kann uns mit der notwendigen Ausrüstung versorgen, auch wenn viele Länder mit dieser Entscheidung unzufrieden sein mögen."
 ZCOM_black_market: "This focus unlocks" black market "decisions"
 Black_market_heavy_weapons:0 "Panzer auf dem Schwarzmarkt kaufen"
 Black_market_heavy_weapons_desc:0 "Die Bewaffnung unserer Truppen erfordert eine ständige Versorgung mit Waffen und Munition. Der Schwarzmarkt kann uns mit der notwendigen Ausrüstung versorgen, auch wenn viele Länder mit dieser Entscheidung unzufrieden sein mögen."
 Black_market_planes:0 "Flugzeuge auf dem Schwarzmarkt kaufen"
 Black_market_planes_desc:0 "Die Bewaffnung unserer Truppen erfordert eine ständige Versorgung mit Waffen und Munition. Der Schwarzmarkt kann uns mit der notwendigen Ausrüstung versorgen, auch wenn viele Länder mit dieser Entscheidung unzufrieden sein mögen."
 recrute_soeldner:0 "Rekrutiere Söldner"
 recrute_soeldner_desc:0 "Söldner sind zwar nicht so zuverlässig wie reguläre Truppen, können aber dennoch nützlich sein. Wir sollten versuchen, welche anzuheuern."
 ZCOM_soeldner: "This focus unlocks a "recute mercenary" decision"
 unite_with_triaden:0 "Bilden Sie ein Bündnis mit den Triaden"
 unite_with_triaden_desc:0 "Ein Bündnis mit den mächtigsten Gangstergruppen der Welt würde uns finanziell unabhängig machen. Viele Nationen werden davon allerdings nicht begeistert sein."
 unite_with_mafia:0 "Bilden Sie ein Bündnis mit der italienischen Mafia"
 unite_with_mafia_desc:0 "Ein Bündnis mit den mächtigsten Gangstergruppen der Welt würde uns finanziell unabhängig machen. Viele Nationen werden davon allerdings nicht begeistert sein."
 unite_with_yakuza:0 "Bilden Sie ein Bündnis mit der Yakuza"
 unite_with_yakuza_desc:0 "Ein Bündnis mit den mächtigsten Gangstergruppen der Welt würde uns finanziell unabhängig machen. Viele Nationen werden davon allerdings nicht begeistert sein."
 the_other_way2:0 "Der andere Weg"
 the_other_way2_desc:0 "Jahrelang mussten wir uns von den Mächtigen dieser Welt vorschreiben lassen. Das ist nun vorbei. Wir sind wirtschaftlich unabhängig und können Krieg führen, wie es uns gefällt."
 pirate:0 "Piraterie in der Ägäis"
 pirate_desc:0 "Die Ägäis ist ein Hotspot für den Handel aus aller Welt. Warum sollten wir nicht auch etwas vom Kuchen abbekommen?"
 anti_colonial:0 "Antikolonialismus"
 anti_colonial_desc:0 "Die Länder der Welt haben die ärmeren Regionen der Welt jahrhundertelang ausgebeutet. Wir sollten ihnen Einhalt gebieten und gleichzeitig neue Verbündete gewinnen."
 annex_syria:0 "Erobern Sie Syrien"
 annex_syria_desc:0 "Frankreich ist zu sehr mit den Zombies beschäftigt, als dass es sich um uns kümmern könnte. Wir sollten dies ausnutzen und Syrien besetzen, solange wir die Chance dazu haben."
 recrute_syrians:0 "Syrer rekrutieren"
 recrute_syrians_desc:0 "Wir brauchen mehr Soldaten für unseren Krieg. Wir sollten Truppen aus unserem neu erworbenen Land anwerben."
 recrute_syrians_forces:0 "Arabische Milizen ausbilden"
 recrute_syrians_forces_desc:0 "Viele Araber waren mit der französischen Herrschaft unzufrieden. Wir sollten diese Wut nutzen und arabische Milizen für unseren Krieg ausbilden."
 form_colonial_bounds:0 "Verbessern Sie die Beziehungen zu afrikanischen Nationen."
 form_colonial_bounds_desc:0 "Im bevorstehenden Konflikt brauchen wir Verbündete, und wo könnten wir bessere Verbündete finden als unter den Feinden der Europäer."
 form_anti_colonial:0 "Ein antikoloniales Militärprogramm aufstellen."
 form_anti_colonial_desc:0 "Wir könnten von Verbündeten genauso profitieren wie sie von uns."
 the_alliance:0 "Etablierung einer antikolonialen Achse"
 the_alliance_desc:0 "Wir sollten uns mit den letzten verbliebenen Nationen Afrikas verbünden."
 finance_rebels:0 "Finanzrebellen"
 the_alliance_desc:0 "Viele Völker Afrikas verabscheuen die Europäer. Wir sollten ihnen helfen."
 finance_rebels_libya:0 "Libysche Rebellen zum Aufruhr bringen"
 finance_rebels_libya_desc:0 "Das italienische Militär ist mit anderen Dingen beschäftigt. Der perfekte Moment, um ihre Kolonie zu befreien."
 finance_rebels_tunis:0 "Tunesische Rebellen zum Aufruhr bringen"
 finance_rebels_tunis_desc:0 "Das französische Militär ist mit anderen Dingen beschäftigt. Der perfekte Moment, um ihre Kolonie zu befreien."
 finance_rebels_egypt:0 "Ägyptische Rebellen zum Aufruhr bringen"
 finance_rebels_egypt_desc:0 "Das englische Militär ist mit anderen Dingen beschäftigt. Der perfekte Moment, um ihre Kolonie zu befreien."
 annex_jordan:0 "Erobere Jordanien"
 annex_jordan_desc:0 "Solange Großbritannien mit anderen Dingen beschäftigt ist, sollten wir versuchen, Jordanien zu erobern. Aber Vorsicht: Die Briten werden sich das sicher nicht gefallen lassen und uns den Krieg erklären."
 dominance:0 "Totaler Krieg!"
 dominance_desc:0 "Lange Zeit haben wir uns an die Regeln gehalten, die uns die Mächte dieser Welt vorgeschrieben haben. Damit ist nun Schluss! Wir dürfen keine Gnade, keine Schwäche zeigen."
 international_norms:0 "Keine Gnade, keine Schwäche"
 international_norms_desc:0 "Unser Krieg erlaubt uns kein Mitleid. Wenn unschuldige Menschen sterben, muss dies als Kollateralschaden betrachtet werden."
 ZCOM_norms:0 "Alle Länder werden mit dieser Entscheidung äußerst unzufrieden sein."
 minewar:0 "Nutze Minen im Kampf gegen die Zombies"
 minewar_desc:0 "Minen sind eine großartige Möglichkeit, die Zombies zu verlangsamen."
 firebombs:0 "Brandbomben"
 firebombs_desc:0 "Unsere Wissenschaftler haben herausgefunden, dass der Abwurf von Brandbomben den Krieg gegen die Zombies beschleunigen kann. Zivile Opfer sollten dabei kein Hindernis darstellen."
 ZCOM_bombs: "This focus unlocks the ability to drop bombs on zombie areas."
 weapons_of_mass_destruction:0 "Splitterbomben"
 weapons_of_mass_destruction_desc:0 "Unsere Wissenschaftler haben herausgefunden, dass das Abwerfen von Splittern den Kampf gegen die Zombies beschleunigen kann. Zivile Opfer sollten hier kein Hindernis darstellen."
 no_way_back:0 "Kein Weg zurück"
 no_way_back_desc:0 "Wir haben alle Regeln dieser Welt gebrochen. Jetzt gibt es nur noch Krieg und Sieg, nichts anderes hat mehr Bedeutung."
 external:0 "Außenpolitik"
 external_desc:0 "Der Fokus von ZCOM muss auf der Zusammenarbeit liegen. Nur so können wir gewinnen."
 international_Finance1:0 "Internationale Finanzierung"
 international_Finance1_desc:0 "Wir sollten versuchen, die Nationen der Welt davon zu überzeugen, uns mehr Ressourcen zur Verfügung zu stellen."
 international_Finance2:0 "Internationale Finanzierung"
 international_Finance2_desc:0 "Wir sollten versuchen, die Nationen der Welt davon zu überzeugen, uns mehr Ressourcen zur Verfügung zu stellen."
 international_Finance3:0 "Internationale Finanzierung"
 international_Finance3_desc:0 "Wir sollten versuchen, die Nationen der Welt davon zu überzeugen, uns mehr Ressourcen zur Verfügung zu stellen."
 ZCOM_finance: "This focus gives us additional means (political power) to continue our war."
 focus_on_asia:0 "Fokus auf Asien"
 focus_on_asia_desc:0 "Wir müssen darüber nachdenken, wohin wir unsere Mittel schicken. China und Japan wären gute Optionen."
 japanese_zcom:0 "Offene japanische ZCOM-Basis"
 japanese_zcom_desc:0 "Wir sollten einen weiteren Stützpunkt in Japan eröffnen."
 ask_research_JAP:0 "Fragen Sie Japanisch nach Wissenschaftlern"
 ask_research_JAP_desc:0 "Wir brauchen Unterstützung, um unsere Technologie auf dem neuesten Stand zu halten."
 zcom_jap:0 "Hilfe für die Japaner"
 zcom_jap_desc:0 "Eine engere Zusammenarbeit mit den Japanern ist für unseren Sieg absolut notwendig."
 ask_manpower_CHI:0 "China um Rekruten bitten"
 ask_manpower_CHI_desc:0 "China hat die größte Bevölkerung der Welt. Wir sollten versuchen, chinesische Rekruten anzuwerben."
 zcom_training:0 "Chinas militärische Ausbildung"
 zcom_training_desc:0 "Chinas Militär ist erbärmlich. Wir sollten einen Teil unserer Ressourcen dafür verwenden, die Truppenausbildung zu verbessern."
 zcom_soldiers:0 "Chinas Militär verbessern."
 zcom_soldiers_desc:0 "China verfügt fast gar nicht über schwere Waffen. Das sollten wir ändern."
 focus_on_europe:0 "Fokus Europa"
 focus_on_europe_desc:0 "Wir müssen darüber nachdenken, wohin wir unsere Mittel schicken. Deutschland, Frankreich und Großbritannien wären eine gute Option."
 ask_research_FRA:0 "Bitten Sie Frankreich um Wissenschaftler"
 ask_research_FRA_desc:0 "Wir brauchen Unterstützung, um unsere Technologie auf dem neuesten Stand zu halten."
 french_zcom:0 "Offene französische ZCOM-Basis"
 french_zcom_desc:0 "Wir sollten einen weiteren Stützpunkt in Frankreich eröffnen."
 french_zcom_artillerie:0 "Projekt Zeus"
 french_zcom_artillerie_desc:0 "Die französische Armee ist trotz ihrer Schwächen eine der größten und stärksten des Kontinents. Wir sollten ihr Wissen nutzen, um die Artillerie zu verbessern."
 french_infantry:0 "Französische Infanterie"
 french_infantry_desc:0 "Die langjährige Erfahrung der französischen Armee könnte uns einen Vorteil verschaffen."
 prepare_syria_war:0 "Bereiten Sie Syrien auf den bevorstehenden Krieg vor"
 prepare_syria_war_desc:0 "Syrien ist der ideale Landeplatz für unsere Truppen. Wir sollten die Infrastruktur verbessern."
 prepare_syria_war_port:0 "Bauen Sie Häfen in Syrien"
 prepare_syria_war_port_desc:0 "Syrien ist der ideale Landeplatz für unsere Truppen. Wir sollten Häfen bauen, um unsere Truppen zu unterstützen."
 ask_research_GER:0 "Fragen Sie Deutschland nach Wissenschaftlern"
 ask_research_GER_desc:0 "Wir brauchen Unterstützung, um unsere Technologie auf dem neuesten Stand zu halten."
 german_zcom:0 "Offene deutsche ZCOM-Basis"
 german_zcom_desc:0 "Wir sollten einen weiteren Stützpunkt in Deutschland eröffnen."
 german_zcom_tanks:0 "Projekt Tartarus"
 german_zcom_tanks_desc:0 "Die deutsche Armee ist eine der besten der Welt. Wir sollten ihr Wissen über Panzer nutzen."
 german_zcom_land:0 "Projekt Hades"
 german_zcom_land_desc:0 "Deutsche Waffentechnologie ist im bevorstehenden Krieg unverzichtbar."
 german_french_troops:0 "Deutsch-Französische Aktiengesellschaft"
 german_french_troops_desc:0 "Ein deutsch-französischer Konzern könnte uns retten, so unwahrscheinlich das auch ist."
