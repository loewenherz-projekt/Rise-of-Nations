 Zombienews.54.name:0 "Kampfzombie entwickelt"
 Zombienews.54.desc:0 "Unseren Wissenschaftlern ist es gelungen, Zombies mithilfe bestimmter Tonfrequenzen dazu zu bringen, einfachen Befehlen zu folgen."
 Zombienews.54.a:0 "Exzellent"
 Zombienews.55.name:0 "ZCOM reaktiviert"
 Zombienews.55.desc:0 "Obwohl ZCOM zerstört wurde, lebt der Traum weiter. Einige Regierungsvertreter beschlossen, ZCOM zu reaktivieren. Dieses ZCOM ist jedoch nicht so stark, da es nicht die Unterstützung der ganzen Welt genießt. "
 Zombienews.55.a:0 "Eine tolle Initiative?"
 Zombienews.56.name:0 "Zombies gefunden"
 Zombienews.56.desc:0 "Wir haben einige Zombies gefunden. Allerdings sind noch nicht alle gestrandeten Zombies vernichtet. Wir müssen weitersuchen."
 Zombienews.56.a:0 "OK"
 Zombienews.57.name:0 "Die Toten erheben sich"
 Zombienews.57.desc:0 "Wir schreiben das Jahr 1936. Während in Europa Krieg herrscht, hat eine bisher unbekannte Infektion Tausende Menschenleben gefordert. Und schlimmer noch: Erste Berichte besagen, dass die Krankheit Tote wieder auferstehen lässt. Es ist eine unsichere Zeit, und erst die Zukunft wird zeigen, welche Nationen die bevorstehenden Herausforderungen meistern und welche scheitern! "
 Zombienews.57.a:0 "Lasst die Spiele beginnen"
 Zombienews.58.name:0 "Indische Milizen."
 Zombienews.58.desc:0 "Tausende indische Männer und Frauen erhoben ihre Arme. Sie kämpfen für die Freiheit Indiens und für den Schutz der Lebenden."
 Zombienews.58.a:0 "Wir sollten ihrem Beispiel folgen."
 Zombienews.59.name:0 "Beginn des ゾンビとの戦い."
 Zombienews.59.desc:0 "Die japanische Regierung hat zusätzliche Mittel für das Projekt „Battle Zombie“ bereitgestellt."
 Zombienews.59.a:0 "Wir werden mit dieser neuen Waffe jeden vernichten."
 StaerkeZombie.1.name:0 "Stärke der Zombies."
 StaerkeZombie.1.desc:0 "Wählen Sie den Schwierigkeitsgrad der Zombies."
 StaerkeZombie.1.ab:0"Extrem. Die Zombies haben 6-mal so viele Einheiten und Boni."
 StaerkeZombie.1.ba:0"Schwer. Die Zombies haben dreimal so viele Einheiten."
 StaerkeZombie.1.ca:0"Mittel. Die Zombies haben doppelt so viele Einheiten."
 StaerkeZombie.1.da:0"Normal"
 doomsday.1.name:0 "Weltuntergangsabteilung"
 doomsday.1.desc:0 "Die wachsende Zombie-Bedrohung hat die Mächte dieser Welt dazu veranlasst, die „Doomsday Division“ und eine Unterabteilung namens „ZCOM“ zu gründen. Diese neutrale Organisation soll die Mächte der Welt dabei unterstützen, den Kampf gegen Zombies endlich effektiv zu führen."
 doomsday.1.a:0 "Eine tolle Initiative."
 doomsday.2.name:0 "Unterstützung für ZCOM"
 doomsday.2.desc:0 "ZCOM hat um Waffen und Soldaten gebeten, um die Zombies zu besiegen."
 doomsday.2.a:0 "Wir werden ZCOM unterstützen."
 doomsday.2.b:0 "Wir brauchen unsere Truppen selbst!"
 doomsday.5.name:0 "ZCOM-Festungen in Japan und China"
 doomsday.5.desc:0 "Nach langen Überlegungen beschloss die Führung des ZCOM, Japan und China, Hilfe in Form von Ausbildung und Truppen zu schicken. Darüber hinaus wurden in Tokio und Nanjing zwei riesige Festungen errichtet. Darüber hinaus will das ZCOM seine Präsenz in Asien fortsetzen. "
 doomsday.5.a:0 "Großartig!"
 doomsday.7.name:0 "ZCOM braucht Unterstützung im Kampf gegen die Zombies"
 doomsday.7.desc:0 "Die ZCOM-Führung benötigt Unterstützung bei ihrer Forschung. Sie hat uns um Hilfe gebeten. Wenn wir jedoch zustimmen, wird unsere eigene Forschung darunter leiden."
 doomsday.7.a:0 "Wir unterstützen Sie."
 doomsday.7.b:0 "Das können sie vergessen."
 doomsday.8.name:0 "ZCOM braucht Unterstützung im Kampf gegen die Zombies"
 doomsday.8.desc:0 "Die ZCOM-Führung benötigt Unterstützung bei der Ausbildung ihrer Soldaten. Sie hat uns um Hilfe gebeten. Wir können ihnen Soldaten schicken, aber diese Soldaten könnten uns in unseren eigenen Kämpfen fehlen."
 doomsday.8.a:0 "Wir unterstützen Sie."
 doomsday.8.b:0 "Das können sie vergessen."
 doomsday.16.name:0 "Gekaufte Waffen"
 doomsday.16.desc:0 "Heute wurde uns nach Verhandlungen die Möglichkeit gegeben, Waffen zu erwerben."
 doomsday.16.a:0 "Gut."
 doomsday.22.name:0 "Weitere Soldaten schließen sich der Sache an"
 doomsday.22.desc:0 "Heute hat eine weitere Division ihr Training beendet. Ein weiterer Schritt in Richtung Sieg."

