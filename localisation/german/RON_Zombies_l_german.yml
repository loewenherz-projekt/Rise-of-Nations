 Zombievereinigung.1.name:0 "Unter einem Banner vereint?"
 Zombievereinigung.1.desc:0 "Großbritannien sucht Verbündete gegen die Bedrohung durch die Untoten. Sollten wir uns ihnen anschließen?"
 Zombievereinigung.a:0"Ja, wir helfen ihnen."
 Zombievereinigung.b:0"Nein, niemals."
 Zombienews.1.name:0"Geschenk für den Führer."
 Zombienews.1.desc:0"Dieses Jahr war Himmler anlässlich des Geburtstags des Führers besonders schlau und brachte Hitler statt eines normalen Geschenks einen lebenden Untoten mit."
 Zombienews.1.a:0"Ein wunderschönes Geschenk."
 Zombienews.2.name:0"Duce kämpft mit Untoten."
 Zombienews.2.desc:0"Unser glorreicher Anführer Benito Mussolini bewies erneut seine Männlichkeit, indem er auf offener Straße gegen einen Untoten kämpfte und ihn besiegte."
 Zombienews.2.a:0"Was für ein Held."
 Zombienews.3.name:0"Göring hat den Zombie verloren."
 Zombienews.3.desc:0"Göring hatte schon oft Fehler gemacht, aber das ist die Krönung! Sein Hauszombie ist ihm entkommen und man kann nur hoffen, dass er bald gefasst wird."
 Zombienews.3.a:0"Dieser Idiot."
 Zombienews.4.name:0"Görings Zombies sind hier!"
 Zombienews.4.desc:0"Der Zombie, der Göring entkam, hat viele Deutsche infiziert."
 Zombienews.4.a:0"Hoffentlich kann die Wehrmacht sie aufhalten."
 Zombienews.5.name:0"Die Japaner wollen Kampfzombies erschaffen."
 Zombienews.5.desc:0"Das japanische Königreich denkt darüber nach, für den Kampf, der zur größten Gefahr in der Menschheitsgeschichte werden könnte, Kampfzombies zu züchten."
 Zombienews.5.a:0"Sind sie verrückt?"
 Zombienews.5.b:0"Gut gut."
 Zombienews.6.name:0"Die erste Phase unseres Projekts ist abgeschlossen."
 Zombienews.6.desc:0"Wir verstehen jetzt die grundlegenden Funktionen eines Zombies und haben auch einige erfolgreiche Tests zur Steuerung eines Zombies durchgeführt."
 Zombienews.6.a:0"Tolle Neuigkeiten."
 Zombienews.7.name:0"Beginn der zweiten Phase?"
 Zombienews.7.desc:0"Unsere Wissenschaftler sind sich jetzt sicher, dass sie einen Zombie kontrollieren können. Sollten wir ihnen die Erlaubnis dazu geben?"
 Zombienews.7.a:0"Sicher"
 Zombienews.7.b:0"Nein, die imperiale Armee braucht keine Zombies, um Kriege zu gewinnen."
 Zombienews.8.name:0"Zombie-Ausbruch aus Japans größtem Labor"
 Zombienews.8.desc:0"Mehrere Zombies sind aus dem Hauptlabor entkommen, aber die Behörden sind zuversichtlich, sie fangen zu können."
 Zombienews.8.a:0"Das könnte ein Problem sein."
 Zombienews.9.name:0"Indische Verteidigung."
 Zombienews.9.desc:0"Nachdem es der indischen Armee nicht gelungen war, die Zombie-Bedrohung aufzuhalten, haben die Inder nun Milizen zum Schutz ihres Landes gebildet."
 Zombienews.9.a:0"Hoffentlich können sie diese Gefahr besiegen."
 Zombienews.10.name:0"Der schlimmste Feind in der Geschichte Großbritanniens?"
 Zombienews.10.desc:0"Heute hat der Erste Lord der Admiralität, Winston Churchill, verkündet, dass Zombies der schlimmste Feind seien, dem die Briten je gegenüberstanden, und das Land dazu aufgerufen, Ruhe zu bewahren und bei den Kriegsvorbereitungen mitzuhelfen."
 Zombienews.10.a:0"Interessant."
 Zombienews.11.name:0"Franco setzt im Bürgerkrieg Zombies ein."
 Zombienews.11.desc:0"Franco, Anführer der Faschisten in Spanien, hat Zombies in den Metropolregionen Madrids freigelassen, um seinen Soldaten zu helfen, den Bürgerkrieg zu gewinnen."
 Zombienews.11.a:0"Wenn das eine gute Idee ist?"
 Zombienews.12.name:0"Stalin ruft zum großen Krieg gegen Zombies auf."
 Zombienews.12.desc:0"Heute hat Stalin angekündigt, dass die Sowjetunion sich um die Zombie-Plage kümmern werde, und alle Russen dazu aufgerufen, ihren Beitrag zu diesem großen Krieg zu leisten."
 Zombienews.12.a:0"Okay."
 Zombienews.13.name:0"Resistenzen in infizierten Gebieten"
 Zombienews.13.desc:0"Zivilisten leisteten in einem von Zombies kontrollierten Staat Widerstand und töteten viele Zombies."
 Zombienews.13.a:0"Helden der Menschheit."
 Zombienews.14.name:0"Resistenzen in infizierten Gebieten"
 Zombienews.14.desc:0"Einigen Zivilisten ist es heute gelungen, Tausende Zombies einzufangen und auszulöschen."
 Zombienews.15.name:0"Resistenzen in infizierten Gebieten"
 Zombienews.15.desc:0"Einige Zivilisten gruben sich in einem Gebäude ein und töteten Tausende von Zombies, bevor diese starben."
 Zombienews.16.name:0"Resistenzen in infizierten Gebieten"
 Zombienews.16.desc:0"Zivilisten in besetzten Gebieten haben begonnen, Minen zu legen und Tausende von Zombies getötet."
 Zombienews.17.name:0 "Totaler Krieg gegen Zombies, ohne Rücksicht auf Verluste"
 Zombienews.17.desc:0 "Heute hat ZCOM angekündigt, dass sie einen Krieg gegen die Zombies beginnen werden, wie ihn die Welt noch nie zuvor gesehen hat, und sie haben alle Zombiegebiete zu ihren Territorien erklärt."
 Zombienews.17.a:0 "Verrückt"
 Zombienews.18.name:0 "Dienstprogramm"
 Zombienews.18.desc:0 "ZCOM hat ein großes Hilfsprojekt gestartet, um Ländern im Kampf gegen die Zombies zu helfen."
 Zombienews.18.a:0 "Großartig"
 Zombienews.19.name:0 "ZCOM"
 Zombienews.19.desc:0 "Heute um 9 Uhr gab die Führung von ZCOM bekannt, dass sie nicht länger der Anti-Zombie-Allianz angehört. Stattdessen wolle sie ihren eigenen Krieg führen, der ihrer Aussage nach „effizienter“ sei."
 Zombienews.19.a:0 "Wie können sie das? Wir haben sie finanziert."
 Zombienews.20.name:0 "Weltuntergangsabteilung"
 Zombienews.20.desc:0 "Die wachsende Zombie-Bedrohung hat die Mächte dieser Welt dazu veranlasst, die „Doomsday Division“ und eine Unterabteilung namens „ZCOM“ zu gründen. Diese neutrale Organisation soll die Mächte der Welt dabei unterstützen, den Kampf gegen Zombies endlich effektiv zu führen."
 Zombienews.20.a:0 "Eine tolle Initiative."
 Zombienews.21.name:0 "Zombies in England"
 Zombienews.21.desc:0 "An der Küste Englands wurden heute einige Zombies angespült. Obwohl die Armee schnell reagierte, waren die Zombies bereits verschwunden."
 Zombienews.21.a:0 "Verdammt"
 Zombienews.22.name:0 "Zombies besiegt"
 Zombienews.22.desc:0 "Heute konnte Großbritannien die letzten Zombies finden und vernichten. Großbritannien ist vorerst gerettet."
 Zombienews.22.a:0 "OK"
