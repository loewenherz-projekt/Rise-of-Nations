 ###USA TRAITS
 ssf_trait:0 "1. Spezialeinheit"
 ssf_trait_desc:0 "Im Jahr 1942 wurde eine hochspezialisierte gemeinsame kanadisch-amerikanische Truppe gegründet, um Spezialoperationen in Europa durchzuführen."
 cia_trait:0 "CIA (Central Intelligence Agency)"
 cia_trait_desc:0 "Die Central Intelligence Agency (CIA) ist ein ziviler Auslandsgeheimdienst der US-Bundesregierung, dessen Aufgabe darin besteht, Informationen zur nationalen Sicherheit aus aller Welt zu sammeln, zu verarbeiten und zu analysieren, hauptsächlich durch den Einsatz menschlicher Intelligenz (HUMINT)."
 fbi_trait:0 "Federal Bureau of Investigation (FBI)"
 fbi_trait_desc:0 "Das Federal Bureau of Investigation (FBI) ist der Inlandsgeheimdienst und Sicherheitsdienst der Vereinigten Staaten und ihre wichtigste Bundesbehörde zur Strafverfolgung."
 marine_raiders_trait:0 "Marine Raiders"
 marine_raiders_trait_desc:0 "Die Marine Raiders waren Eliteeinheiten, die während des Zweiten Weltkriegs vom United States Marine Corps gegründet wurden, um spezielle amphibische leichte Infanteriekriege zu führen, insbesondere durch Landungen in Schlauchbooten und Operationen hinter den Linien."
 merills_marauders_trait:0 "Merrills Plünderer"
 merills_marauders_trait_desc:0 "Merrill&#39;s Marauders, offiziell 5307th Composite Unit (Provisional), war eine Spezialeinheit der US-Armee für Langstreckeneinsätze im Dschungelkrieg, die im südostasiatischen Kriegsschauplatz des Zweiten Weltkriegs (auch bekannt als China-Burma-India Theatre, CBI) kämpfte. Die Einheit wurde berühmt für ihre Tiefdurchdringungsmissionen hinter den japanischen Linien, bei denen sie oft gegen zahlenmäßig überlegene japanische Streitkräfte kämpfte."
 national_guard_trait:0 "Nationalgarde der Vereinigten Staaten"
 national_guard_trait_desc:0 "Dieser Kommandant ist Mitglied der US-Nationalgarde."
 oss_trait:0 "Büro für strategische Dienste (OSS)"
 oss_trait_desc:0 "Das Office of Strategic Services (OSS) war ein Kriegsgeheimdienst der Vereinigten Staaten während des Zweiten Weltkriegs und ein Vorgänger der Central Intelligence Agency (CIA)."
 us_air_force_trait:0 "Luftwaffe der Vereinigten Staaten (USAF)"
 us_air_force_trait_desc:0 "Dieser Kommandant ist Mitglied der US Air Force."
