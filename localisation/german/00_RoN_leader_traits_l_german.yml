 msvn_trait_desc:0 "Die Freiwillige Miliz für Nationale Sicherheit war ursprünglich der paramilitärische Flügel der Nationalfaschistischen Partei und nach 1923 eine reine Freiwilligenmiliz des Königreichs Italien."
