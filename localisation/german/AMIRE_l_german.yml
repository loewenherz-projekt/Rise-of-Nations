l_german:

 # DIPLOMACY
 IRE_belfast_blitz:0 "Belfast Blitz"
 IRE_axisalignger:0 "Iren auf Achse"
 IRE_axisalignuk:0 "Iren auf Achse"

 # EVENTS
 ireland.1.t:0 "Malcolm MacDonald"
 ireland.1.d:0 "Malcolm MacDonald, der zusammen mit Neville Chamberlain mit dem Irischen Freistaat verhandelte, wurde nach Irland geschickt, um sich mit uns zu treffen und einen interessanten Vorschlag zu besprechen. Großbritannien bietet an, die Teilung Irlands aufzuheben und Nordirland unter unsere Kontrolle zurückzugeben, sofern wir uns den Kriegsanstrengungen der Alliierten anschließen."
 ireland.1.a:0 "Irland soll eins sein!"
 ireland.1.b:0 "Die Niederlage Großbritanniens ist unvermeidlich!"
 ireland.2.t:0 "Plan W"
 ireland.2.d:0 "Die deutsche Aggression ist nicht unbemerkt geblieben. Die Briten haben uns gesicherte Geheimdienstinformationen über eine deutsche Invasion in Großbritannien (Operation Seelöwe) und sogar in Irland (Operation Grün) vorgelegt. Wir müssen Maßnahmen ergreifen, um uns davor zu schützen, selbst wenn dies bedeutet, uns auf die Seite der Alliierten zu stellen. \n\n Die Briten behaupten, unsere Interessen seien ihnen am Herzen und wollen ihre Beziehungen zu uns ausbauen."
 ireland.2.a:0 "Irisches Blut, englisches Herz!"
 ireland.2.b:0 "Wir müssen uns aus diesem Konflikt heraushalten"
 news.313.t:0 "Belfast Blitz"
 news.313.d:0 "Deutsche Bomber haben die nordirische Stadt Belfast in drei Angriffen angegriffen, die mittlerweile als „Belfast Blitz“ bezeichnet werden. Dabei kamen rund 1.000 Menschen ums Leben, weitere 1.500 wurden verletzt. Südirische Feuerwehrleute schlossen sich dem Kampf an, um ihren irischen Brüdern zu helfen. \n\n Die offizielle Erklärung der Republik lautet: „Die Menschen in Belfast sind auch Iren.“ "
 news.313.a:0 "Schade"
 news.313.b:0 "Sie sind unser Volk."
 news.313.c:0 "Eine beschämende Zurschaustellung der Achsenmächte!"
 news.313.e:0 "Vielleicht sollten wir unsere Beziehung zu Irland überdenken."
 news.3137.t:0 "Irland schließt sich der Achse an"
 news.3137.d:0 "Irland hat angekündigt, alliierte Diplomaten auszuweisen und die Beziehungen zu den Achsenmächten zu intensivieren. \n\n Hitler soll die Nachricht mit Jubel begrüßt und erklärt haben: „Die Iren haben eine lange Geschichte stolzer Krieger und werden ein lebenslanger Partner und geschätzter Verbündeter im Kampf gegen die Engländer sein.“"
 news.3137.a:0 "Die Achse wächst ..."
 news.3137.b:0 "Das wird uns stärker machen!"
 news.3137.c:0 "Ein dunkler Tag für das Imperium ..."
 news.3137.e:0 "Willkommen, Irland!"
 news.3138.t:0 "Irland schließt sich der Komintern an"
 news.3138.d:0 "Irland hat angekündigt, alliierte Diplomaten auszuweisen und die Beziehungen zu den Komintern-Mächten auszubauen. \n\n Sowjetische Diplomaten in Irland waren Berichten zufolge überrascht, da sie keine Ahnung hatten, dass die Iren überhaupt an einem Beitritt interessiert waren. Sowjetische Generäle hingegen begrüßten die Nachricht aufgrund der strategischen Vorteile Irlands."
 news.3138.a:0 "Die Komintern wächst …"
 news.3138.b:0 "Solidarität für alle Arbeiter!"
 news.3138.c:0 "Ein dunkler Tag für das Imperium ..."
 news.3138.e:0 "Ein weiterer Schritt zur Weltrevolution!"
 news.3139.t:0 "Der Weihnachtsüberfall"
 news.3139.d:0 "Am 23. Dezember 1939 überfiel die IRA das Magazine Fort in Dublin. \n\n Obwohl es ihnen gelungen war, größtenteils irische Munition zu erbeuten, wurde diese kurz darauf zurückerobert, und viele IRA-Freiwillige wurden gefasst und verhaftet. Viele hochrangige IRA-Mitglieder wurden hingerichtet, und der Oireachtas erhielt Notstandsvollmachten, um die Krise zu bewältigen."
 news.3139.a:0 "Ein Sieg für Irland!"
 news.3139.b:0 "Gut für sie."
 news.3133.t:0 "Ende des anglo-irischen Handelskrieges"
 news.3133.d:0 "Der Anglo-Irische Handelskrieg, auch bekannt als „Wirtschaftskrieg“, war zwar kein richtiger Krieg an sich, hatte aber verheerende Auswirkungen auf Großbritannien und Irland nach der Großen Depression. \n\n Der Eire (Confirmation of Agreements) Act beendete den „Krieg“ jedoch, und nun profitieren die irischen und britischen Industrien von mehr Freihandel."
 news.3133.a:0 "Endlich!"
 news.3133.b:0 "Gut für sie."
 news.3135.t:0 "Oskar Metzke"
 news.3135.d:0 "Heute wurde in Castletownroche in Cork ein Mann gefunden, der sich als „Oskar Metzke“ ausgab und behauptete, ein tschechischer Veteran zu sein. Bei der Durchsuchung fand man bei ihm offenbar eine Landkarte, einen Kompass und eine Luger-Pistole. \n\n Kurz darauf starb er in Gewahrsam der irischen Polizei Garda an den Folgen einer Reihe von Krämpfen. Wie sich später herausstellte, war er auf Zyanid zurückzuführen, das er geschluckt hatte. Viele vermuten, er sei ein deutscher Spion gewesen."
 news.3135.a:0 "Ein deutscher Spion? Hier?!"
 news.3135.b:0 "Okay"
 news.3132.t:0 "Die Glimmer Men"
 news.3132.d:0 "Die Kohlevorräte in Irland gehen zur Neige, viele Gaswerke wurden geschlossen. Während an der Verwendung von Torf anstelle von Kohle geforscht wird, hat die irische Regierung begonnen, die Kontrollen der Gasversorgung zu verschärfen. Der irische Versorgungsminister drohte mit einer offiziellen Gasrationierung. \n\n Dies hat dazu geführt, dass Inspektoren, die die Nutzung von Gas zu bestimmten Zeiten kontrollieren, von den Iren „Glimmer Men“ genannt werden."
 news.3132.a:0 "Dev, der Gasherd und der Glimmerman"
 news.3132.b:0 "Okay"

 # FOCUS

IRE_emergency:0 "Gesetz über Notstandsbefugnisse"
 IRE_emergency_desc:0 "Europa ist vom Krieg erfasst, und Irland ist in Gefahr. Wir müssen den Notstand ausrufen und den irischen Staat schützen."
 IRE_neut:0 "Erklären Sie die irische Neutralität"
 IRE_neut_desc:0 "Wir werden Irland in diesem Konflikt als neutral erklären, obwohl viele in Irland antifaschistische Gefühle hegen und einige sogar aus Trotz gegenüber den Briten mit ihnen sympathisieren."
 IRE_iraban:0 "Verstöße gegen das Staatsgesetz"
 IRE_iraban_desc:0 "Die IRA durfte seit dem Bürgerkrieg existieren, doch angesichts der drohenden Kriegsgefahr in Irland kann dies nicht länger geduldet werden. Wir werden prominente IRA-Mitglieder verhaften und entwaffnen."
 IRE_war:0 "Bereite dich auf den Krieg vor"
 IRE_war_desc:0 "Das irische Volk schreit nach Rache an den Briten, und während sich in ganz Europa ein Sturm zusammenbraut, zerfällt Großbritannien. Irland wird nicht tatenlos zusehen, während Europa in Aufruhr gerät. Wir werden in den Krieg ziehen!"
 IRE_opkath:0 "Operation Kathleen"
 IRE_opkath_desc:0 "Mit der Rückkehr der IRA in die Reihen der IRA haben wir einen Plan entdeckt, den sie gemeinsam mit den Deutschen ausgearbeitet hatte: die Invasion Nordirlands. Möglicherweise könnten wir diesen Plan selbst umsetzen, wenn wir uns den deutschen Schutz sichern."
 IRE_planw:0 "Plan W"
 IRE_planw_desc:0 "Die deutsche Aggression ist nicht unbemerkt geblieben. Die Briten haben uns gesicherte Geheimdienstinformationen über eine deutsche Invasion in Großbritannien (Operation Seelöwe) und sogar in Irland (Operation Grün) vorgelegt. Wir müssen Maßnahmen ergreifen, um uns davor zu schützen, selbst wenn dies bedeutet, uns auf die Seite der Alliierten zu stellen."
 IRE_irapower:0 "Stärken Sie die IRA"
 IRE_irapower_desc:0 "Irlands Kriegsbeschluss hat die IRA unruhig gemacht. Wir können sie jedoch mit diplomatischen Mitteln unterdrücken. Da sie unserer Sache wohlgesinnt sind, können wir sie in unsere Armee integrieren und ihre Erfahrung mit Guerillataktiken nutzen."
 IRE_axisalign:0 "An Achse ausrichten"
 IRE_axisalign_desc:0 "Wenn wir einen Krieg gegen Großbritannien planen, können wir das nicht allein tun. Irland muss sich mit den Achsenmächten verbünden und hoffentlich ein Bündnis zur Rückeroberung Nordirlands anstreben."
 IRE_unite:0 "Irland United"
 IRE_unite_desc:0 "Seit dem Unabhängigkeitskrieg von 1921 streben wir die Vereinigung Irlands an. Jetzt, da der Welt ein Krieg droht und Großbritannien schwächer wird, ist es an der Zeit, dieses Ziel zu verwirklichen!"
 IRE_ourpeople:0 "Sie sind unser Volk"
 IRE_ourpeople_desc:0 "Der Belfast Blitz war zwar gegen Nordirland und die Briten gerichtet, war aber ein Angriff auf irischen Boden und gegen das irische Volk. Sie sind unser Volk – wir sind ein und dasselbe Volk – und ihr Leid ist im vorliegenden Fall auch unser Leid."
 IRE_malcmcdonald:0 "Malcolm MacDonald"
 IRE_malcmcdonald_desc:0 "Malcolm MacDonald, der 1937 mit dem Irischen Freistaat über die Beilegung von Handelsstreitigkeiten verhandelte, ist mit einem interessanten Angebot nach Irland zurückgekehrt." 
 IRE_pol:0 "Verfassung Irlands"
 IRE_pol_desc:0 "Wir müssen eine Verfassung schaffen, die die Herrschaft des Oireachtas über Irland festigt. Diese Verfassung wird den irischen Staat als „Irland“ festigen."
 IRE_nat:0 "Nationale Unternehmenspartei"
 IRE_nat_desc:0 "Die National Corporate Party unter Führung von Eoin O&#39; Duffy und seinen Grünhemden erfreut sich wachsender Beliebtheit. Sie verspricht ein stärkeres Irland und die Abschaffung der Kommunisten."
 IRE_com:0 "Irische Arbeiterliga"
 IRE_com_desc:0 "Die Irish Worker League unter Führung von James Larkin, auch bekannt als „Big Jim“, dem Generalsekretär der Arbeitergewerkschaft. Sie verspricht bessere Rechte für die Arbeiter."
 IRE_mob:0 "Mobilisierung der irischen Verteidigungskräfte"
 IRE_mob_desc:0 "Mit dem Defence Forces Act von 1923 wurden die Verteidigungsstreitkräfte, Überbleibsel der im Bürgerkrieg eingesetzten Armee, zur Verteidigung Irlands gegen äußere und innere Bedrohungen eingesetzt. Nun ist es an der Zeit, sie zu mobilisieren."
 IRE_armyone:0 "An Chéad Chathlán Coisithe"
 IRE_armyone_desc:0 "Wir verfügen über eine kleine Verteidigungsstreitmacht, aber wenn wir Irland gegen seine Feinde verteidigen wollen, müssen wir innovativ sein."
 IRE_armytwo:0 "Nationalarmee"
 IRE_armytwo_desc:0 "Seit dem Ende des Bürgerkriegs und der Gründung der US-Verteidigungsstreitkräfte haben wir uns gegen eine „Nationalarmee“ gesträubt. Doch jetzt, da der Krieg näher rückt, sollten wir unsere Streitkräfte wieder aufbauen."
 IRE_armythree:0 "Spezielles Infanteriekorps"
 IRE_armythree_desc:0 "Nach dem Krieg wurde das Special Infantry Corps gegründet, um der IRA und sozialistischen Bedrohungen entgegenzuwirken und Streiks zu beenden. Jetzt können wir es für den Krieg umfunktionieren."
 IRE_ccp:0 "Kohle-Vieh-Pakt"
 IRE_ccp_desc:0 "Um den englisch-irischen Handelskrieg zu beenden, haben wir mit den Briten einen Pakt geschlossen, der einen besseren Import und Export von Kohle und Vieh ermöglicht. Dies dürfte einen Teil unserer Industrie entlasten."
 IRE_treet:0 "Vertragshäfen zurückfordern"
 IRE_treet_desc:0 "Nach dem irischen Unabhängigkeitskrieg haben wir im Friedensabkommen einige irische Häfen an die Briten abgetreten. Im anglo-irischen Handelskrieg können wir diese jedoch in unserem Friedensabkommen zurückfordern, um mehr Industrie für den Export freizugeben."
 IRE_coa:0 "Irland-Gesetz (Bestätigung von Vereinbarungen)"
 IRE_coa_desc:0 "Dieses Gesetz wird den englisch-irischen Handelskrieg beenden, Importe und Exporte zwischen unseren Ländern ermöglichen und Irland einen Großteil der industriellen Kontrolle zurückgeben."
 IRE_magfort:0 "Das Magazin-Fort"
 IRE_magfort_desc:0 "Das Magazinfort ist ein altes Fort aus dem Jahr 1735. Es wurde uns 1922 nach dem Unabhängigkeitskrieg geschenkt und wir können es als Munitionslager umfunktionieren."
 IRE_xmas:0 "IRA-Munition zurückfordern"
 IRE_xmas_desc:0 "Die IRA stiehlt im Rahmen terroristischer Aktionen gegen die vertragsfreundliche Regierung ständig irische Munitionslager. Wir können jedoch Zellen der IRA ausfindig machen und diese Munition zurückfordern."
 IRE_1stamend:0 "Der 1. Zusatzartikel"
 IRE_1stamend_desc:0 "In Europa ist Krieg vorprogrammiert, und in Deutschland schwären die Wunden des Ersten Weltkriegs. Wir müssen unsere Verfassung ändern, um für den bevorstehenden Sturm besser gerüstet zu sein, und dem Oireachtas die Befugnis erteilen, den Ausnahmezustand auszurufen."
 IRE_air1:0 "Das Air Corps"
 IRE_air1_desc:0 "Engere Beziehungen zum Vereinigten Königreich ermöglichen es uns, von dort bessere Flugzeuge zu kaufen, die wir im Falle eines Kriegsausbruchs benötigen werden."
 IRE_air2:0 "Goster Gladiatoren"
 IRE_air2_desc:0 "Der Krieg rückt immer näher. Wir müssen das Air Corps mit Flugzeugen aus dem Vereinigten Königreich verstärken, darunter auch mit den Doppeldeckern Goster Gladiator."
 IRE_air3:0 "Hawker Hurricanes"
 IRE_air3_desc:0 "Wenn wir vor einer Invasion sicher bleiben wollen, müssen wir das Air Corps modernisieren, angefangen mit den Hawker Hurricane-Kampfflugzeugen."
 IRE_navy1:0 "Der Marine- und Küstendienst"
 IRE_navy1_desc:0 "Ein Krieg droht, und wenn wir wie geplant neutral bleiben wollen, müssen wir unsere Gewässer verteidigen. Mit dem Rückzug der Royal Navy aus den Vertragshäfen können wir die Marine wieder aufbauen."
 IRE_navy2:0 "Der Marinedienst"
 IRE_navy2_desc:0 "Der Marine- und Küstendienst wächst und schützt unsere Gewässer und zivilen Schiffe auch jenseits unserer Küste. Wir werden ihn in „Marinedienst“ umbenennen."
 IRE_navy3:0 "Der Marinedienst"
 IRE_navy3_desc:0 "Es ist klar, dass der Marinedienst nicht ausreicht, und deshalb werden wir ihn auflösen und den Marinedienst als ständigen Teil der Verteidigungsstreitkräfte einrichten."
 IRE_inf:0 "Bord na Móna"
 IRE_inf_desc:0 "Wir müssen die irische Infrastruktur ausbauen, Brennstoff lagern und Strom bereitstellen."
 IRE_nuke:0 "Modernisierung des ESB"
 IRE_nuke_desc:0 "Das Electricity Supply Board (ESB) wurde 1927 vom Irischen Freistaat gegründet. Uran entwickelt sich zunehmend zu einer Alternative zur knappen Kohle. Wir sollten das ESB an die moderne Zeit anpassen."
 IRE_secwep:0 "Geheime Verteidigungstruppe"
 IRE_secwep_desc:0 "Mit unseren nun modernisierten Verteidigungsstreitkräften sind wir möglicherweise in der Lage, Schritte in Richtung der Erforschung geheimer Waffen wie Atom- oder Raketentechnologie zu unternehmen."
 IRE_rocketeffort:0 "Modernes Luftkorps"
 IRE_rocketeffort_desc:0 "Wir könnten die Möglichkeit prüfen, mithilfe der Düsentechnologie unser Air Corps wirklich als bedeutende Kraft in den Verteidigungsstreitkräften zu etablieren."
 IRE_indoct:0 "Neuer Treueeid"
 IRE_indoct_desc:0 "Bevor Artikel 17 aus der Verfassung gestrichen wurde, mussten Regierungsmitglieder einen Eid auf den britischen König schwören. Wir könnten diese Regel wieder einführen, wobei sich der Eid auf das irische Staatsoberhaupt bezieht, um Loyalität zu fördern."
 IRE_fanaticism:0 "Lehnen Sie den Anglo-Irischen Vertrag ab"
 IRE_fanaticism_desc:0 "Da unser Staat nun unter einer einheitlichen Führung stärker ist, können wir uns dem Anglo-Irischen Vertrag widersetzen und ein selbstverwalteter Staat werden, der frei von den Briten ist."
 IRE_militarism:0 "Éire Nua"
 IRE_militarism_desc:0 "Irland ist eine Nation! Und wir werden dafür sorgen, dass es vereint bleibt. Wir werden die Idee eines neuen Irlands, eines vereinten Irlands, unter unserer Regierung stärken."
 IRE_youth:0 "Fianna Éireann"
 IRE_youth_desc:0 "Die Fianna Éireann war eine nationalistische Jugendorganisation, die im Vorfeld des irischen Unabhängigkeitskrieges eine wichtige Rolle spielte – insbesondere beim Osteraufstand. Wir können unter unserer Regierung eine ähnliche Organisation zur Rekrutierung irischer Jugendlicher etablieren."
 IRE_commissars:0 "Oifigeach Polaitiúil"
 IRE_commissars_desc:0 "Die Komintern hatte großen Einfluss auf James Larkins Aufstieg zur Macht und die Gründung seiner Partei. Wir können viel von der Sowjetunion lernen, auch von ihrem System politischer Funktionäre."
 IRE_paramilitarism:0 "Óglaigh na hÉireann"
 IRE_paramilitarism_desc:0 "Irland blickt auf eine stolze Kriegergeschichte zurück. Wir sind eine Nation, die auf Krieg aufgebaut ist, und bald werden wir den größten Krieg erleben, den wir je erleben werden. Wir müssen unsere Kriegerkultur wiederaufbauen, um den kommenden Bedrohungen zu begegnen."
 IRE_techshare:0 "Stärkung der irischen Technologie"
 IRE_techshare_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion die Forschung und Entwicklung im Kriegsfall effizienter durchführen."
 IRE_extra_tech_slot:0 "Zusätzlicher Forschungsplatz"
 IRE_extra_tech_slot_desc:0 "Unsere industrielle Expansion und andere aktuelle Fortschritte könnten es uns ermöglichen, parallel mehr Forschung und Entwicklung durchzuführen."
 IRE_extra_tech_slot_2:0 "Zusätzlicher Forschungsplatz II"
 IRE_extra_tech_slot_2_desc:0 "Die schnelle Industrialisierung unseres Landes hat neue Möglichkeiten in Forschung und Entwicklung eröffnet, die wir nutzen sollten."
 IRE_demo:0 "Fianna Fáil"
 IRE_demo_desc:0 "Die Fianna Fáil-Partei wurde von Éamon de Valera gegründet und ist die wichtigste demokratische Partei Irlands. Sie ist seit 1932 an der Macht und muss dies auch bleiben, wenn Irland in diesen schwierigen Zeiten demokratisch bleiben soll."
 IRE_def:0 "Inselverteidigung"
 IRE_def_desc:0 "Irland hat gerade erst seine Unabhängigkeit erlangt, und schon jetzt drohen uns viele Gefahren. Nach Jahren blutiger Kriege ist es an der Zeit, unsere Verteidigung zu stärken."
 IRE_intervene:0 "Eingreifen"
 IRE_intervene_desc:0 "Obwohl Irland nur eine kleine Insel ist, verfügen wir möglicherweise dennoch über eine beträchtliche Armee, die in den Krieg gegen unsere demokratischen Verbündeten geschickt werden könnte, wenn wir unsere Heimatfront vernachlässigen."
 IRE_gallowglass:0 "Gallóglaigh"
 IRE_gallowglass_desc:0 "Die Gallóglaigh, anglisiert als „Gallowglass“, waren hauptsächlich nordisch-schottische Söldner, die von den irischen Königen der Antike eingesetzt wurden. Der Begriff kann „ausländische Krieger“ bedeuten, und wir können dieses Prinzip heute nutzen, um unsere eigenen Fremdenlegionen zu unseren Verbündeten zu schicken."
 IRE_why_we_fight:0 "Kanal Der Mór-ríoghain"
 IRE_why_we_fight_desc:0 "Die Morrigan waren drei Schwestergöttinnen, die mit dem Krieg in Verbindung gebracht wurden. Sie sind ein Symbol für eine stolze und lange Kriegsgeschichte Irlands, und selbst in diesen modernen Friedenszeiten können wir der Welt zeigen, wie stolz die Iren sein können."
 IRE_ourway:0 "Unser Weg"
 IRE_ourway_desc:0 "Die Welt ist in Aufruhr, und es ist heute klarer denn je, dass der Imperialismus Großbritanniens und die Gier der Achsenmächte die Welt auf einen dunklen Weg geführt haben. Sich mit irgendeiner Macht zu verbünden, wäre ein Fehler. Wir werden unseren eigenen Weg gehen, als Irland!"
 IRE_freeni:0 "Vereinigtes Irland"
 IRE_freeni_desc:0 "Wir müssen unser Heimatland wiedervereinigen, Irland wiedervereinigen. Wir müssen dieses Gebiet von Großbritannien zurückerobern, um unsere irischen Brüder vom britischen Imperialismus zu befreien."
 IRE_comintern:0 "Verbünde dich mit der Komintern"
 IRE_comintern_desc:0 "Wenn wir einen Krieg gegen Großbritannien planen, können wir das nicht allein tun. Irland muss sich der Komintern anschließen und hoffentlich ein Bündnis zur Rückeroberung Nordirlands anstreben."
 IRE_cominvasion:0 "Nordirland zurückerobern"
 IRE_cominvasion_desc:0 "Mit der Unterstützung der Komintern und der Sowjetmächte können wir in Großbritannien einmarschieren und Nordirland für die Republik Irland zurückerobern."

 # IDEAS

 IRE_neutral:0 "Irische Neutralität"
 IRE_neutral_desc:0 "Irland bleibt im Krieg neutral, respektiert gleichzeitig Deutschland, wahrt seine Souveränität gegenüber Großbritannien und unterstützt die Kriegsanstrengungen beider Länder."
 IRE_ira:0 "Irische Republikanische Armee"
 IRE_ira_desc:0 "Obwohl Irland mit dem Anglo-Irischen Vertrag von 1921 seine Unabhängigkeit erlangte, stellt sich die vertragsfeindliche IRA der Regierung und den Briten entgegen und schwächt den irischen Staat weiterhin."
 IRE_sean_russell:0 "Seán Russell"
