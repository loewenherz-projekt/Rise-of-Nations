##WW1 ideas and flags

GER_grp_victory:0 "GRP-Sieg"
GER_nlp_victory:0 "NLP-Sieg"
GER_junta:0 "Deutsche Junta"
send_lenin:0 "Schickt Lenin zurück nach Russland"
GER_mandatory_service_idea:0 "Ein obligatorischer Dienst"
GER_operation_nixe:0 "Operation Nixe"
GER_operation_nixe_desc:0 "Unser Plan hier ist es, Boston von der See aus zu erobern. Wir werden keine weiteren Vorstöße auf US-amerikanischen Boden unternehmen. Unser einziges Ziel ist es, sie dazu zu bringen, ihre Pakte mit den karibischen Inseln aufzukündigen, um uns so die Ausweitung unseres Kolonialreichs zu ermöglichen."
ww1_germany.78.t:0 "Der deutsch-amerikanische Pakt"
ww1_germany.78.d:0 "Aus Angst vor weiteren Invasionen baten die USA uns um die Unterzeichnung eines Vertrags. Dieser Vertrag verkündet das Ende des amerikanischen Einflusses auf die Karibik und ermöglicht uns die Ausweitung unseres Kolonialreichs in Amerika. Im Gegenzug für diesen Vertrag werden wir uns aus Boston zurückziehen."
ww1_germany.78.a:0 "Unterzeichnen Sie diesen Vertrag"
ww1_germany.82.t:0 "Stimme der Demokratie in Deutschland"
ww1_germany.82.d:0 "Die Sozialdemokratische Partei hat die Herzen unseres Volkes erobert. Mit der überwältigenden Unterstützung, die Idee der Demokratie im Land zu verbreiten, hat sie den Sieg errungen. Nicht eine einzelne Stimme, die die Nation beherrscht, sondern viele Stimmen, die an Meinungsfreiheit und Liberalität zum Wohle der Zukunft Deutschlands glauben."
ww1_germany.83.t:0 "Menschen über dem Thron"
ww1_germany.83.d:0 "Nach einer Reihe schwerwiegender Ereignisse, die durch die Bevorzugung der Sozialisten durch unser Volk verursacht wurden, hat sich die Stabilität der königlichen Verwaltung verschlechtert. Der Spartakusbund genießt ausreichend politische Unterstützung und forderte den Kaiser zur Abdankung auf. Da das Haus Hohenzollern keine andere Wahl hatte, zerfiel es. Die königliche Familie floh aus dem Land, und da niemand mehr an der Macht war, übernahmen die Sozialdemokraten den Thron."
ww1_germany.83.a:0 "Macht dem deutschen Volk!"
ww1_germany.84.t:0 "Nationalismus in seiner absoluten Form"
ww1_germany.84.d:0 "Unsere jüngste Anstrengung, den Nationalismus unseres Landes zu heilen, hat die gewünschten Ergebnisse gebracht. Wir haben unser Volk und unsere Nation in den Vordergrund gestellt und höchste Priorität. Die Völkische Bewegung hat den Großteil der politischen Unterstützung Deutschlands gewonnen und fordert die Rechte, das Land zu lenken. Kaiser Wilhelm hat keine andere Wahl, als vom Thron zurückzutreten. Nun liegt unser Schicksal in unserer Hand, zum Wohle unseres heiligen Deutschlands."
ww1_germany.84.a:0 "Ehre dem heiligen Deutschland!"
ww1_germany.85.t:0 "Schüsse auf deutsche Soldaten"
ww1_germany.85.d:0 "Als unsere Truppen in Agadir landeten, um die Rebellen gegen die französische Intervention zu unterstützen, gerieten sie ins Visier pro-französischer Marokkaner. Jüngsten Berichten zufolge wurden drei Männer getötet und einige verletzt. Diese Tat muss als Kriegshandlung gewertet und entsprechend bestraft werden. Wir müssen die Region ein für alle Mal befrieden!"
ww1_germany.85.a:0 "Start der Operation Sanddüne"
ww1_germany.85.b:0 "(Spielen Sie als Marokko)"
ww1_germany.86.t:0 "Deutsche Initiative: Waffenstillstandsvorschlag im Ersten Weltkrieg"
ww1_germany.86.d:0 "Der Große Krieg verwüstet weiterhin Länder und fordert einen hohen Tribut an Bevölkerung und Ressourcen. Sollte Deutschland die Initiative ergreifen und einen Waffenstillstand vorschlagen? Dies würde zwar keinen klaren Sieg bedeuten, könnte aber das Blutvergießen beenden und diplomatische Verhandlungen ermöglichen. Ist es an der Zeit, dass Deutschland aktiv wird und sich für ein Ende dieses langwierigen Konflikts einsetzt?"
ww1_germany.86.a:0 "Ja"
ww1_germany.86.b:0 "NEIN"
ww1_germany.87.t:0 "Französische Diplomatie: Ein Aufruf zum Waffenstillstand im Ersten Weltkrieg"
ww1_germany.87.d:0 "Angesichts der enormen Verluste, die der Erste Weltkrieg von unserem Land und Volk forderte, sollte Frankreich die Initiative für einen Waffenstillstand ergreifen? Dies würde zwar keinen klaren Sieg bedeuten, könnte aber das Leid beenden und die Möglichkeit für friedliche Verhandlungen schaffen. Ist es an der Zeit, dass Frankreich sich für ein Ende dieses langwierigen Konflikts einsetzt?"
ww1_germany.87.a:0 "Ja"
ww1_germany.87.b:0 "NEIN"
ww1_germany.88.t:0 "Waffenstillstand im Ersten Weltkrieg: Ein historischer Moment des Friedens"
ww1_germany.88.d:0 "In einer historischen Wendung der Ereignisse haben sich alle am Ersten Weltkrieg beteiligten Seiten auf einen Waffenstillstand geeinigt und damit einen der tödlichsten Konflikte der Menschheitsgeschichte beendet. Nach jahrelangen Kämpfen, die Länder verwüsteten und Millionen von Menschenleben kosteten, endet der Krieg ohne klaren Sieger. Dieser Waffenstillstand öffnet die Tür für diplomatische Verhandlungen zur Schaffung eines dauerhaften Friedens und zum Wiederaufbau kriegszerstörter Regionen. Die Welt beobachtet, wie diese bedeutsame Entscheidung den Weg für ein neues Kapitel in den globalen Beziehungen ebnet."
ww1_germany.88.a:0 "Die Welt feiert diesen Moment des Friedens"
ww1_germany.89.t:0 "Deutsche und französische Aufstände"
ww1_germany.89.d:0 "Nach dem Waffenstillstand, der den Ersten Weltkrieg beendete, steht Europa vor neuen Herausforderungen: Deutschland und Frankreich sind von inneren Unruhen erfasst. In Deutschland ist ein kommunistischer Aufstand ausgebrochen, und die verschiedenen Fraktionen kämpfen im Nachkriegschaos um die Kontrolle. In Frankreich versucht eine wachsende faschistische Bewegung, die Folgen des Krieges für sich zu nutzen und fordert radikale Veränderungen. Diese Aufstände drohen die Region zu destabilisieren und den fragilen Frieden nach dem Ersten Weltkrieg zu untergraben. Die Welt beobachtet aufmerksam, wie Europa mit den Folgen des Konflikts ringt."
ww1_germany.89.a:0 "Wenn ein Krieg endet, beginnt ein anderer."
ww1_germany.90.t:0 "Chaos und Konflikte in Osteuropa"
ww1_germany.90.d:0 "Der Zusammenbruch der deutschen Marionettenstaaten in Osteuropa hat die Region ins Chaos gestürzt, da sich diese ehemaligen Gebiete aus der deutschen Kontrolle befreiten und ihre Unabhängigkeit beanspruchten. Da es keine zentrale Autorität gibt, die für Ordnung sorgt, liefern sich rivalisierende Fraktionen innerhalb dieser Staaten nun gewaltsame Konflikte um die Ausweitung ihrer Territorien und ihres Einflusses. Die einst stabile Region ist in Anarchie versunken, während Warlords und Milizen um die Macht ringen, was zu weit verbreitetem Leid und Verwüstung führt. Die internationale Gemeinschaft beobachtet mit Sorge, wie Osteuropa nach dem Ersten Weltkrieg eine neue Welle der Unruhen erlebt."
ww1_germany.90.a:0 "Osteuropa versinkt im Chaos"
