 ### THC - Option 2 (ENG is alone, Home Islands occupied)
 umc_ger.530.t:0 "Die Haager Konferenz"
 umc_ger.530.d:0 "Wie viele Jahre sind vergangen, seit wir uns entschieden haben, den Deutschen die Stirn zu bieten? Seit den klangvollen Reden von Premierminister Churchill im Parlament, seit seinem Versprechen, bis zum Ende weiterzumachen. In Frankreich zu kämpfen, auf See und auf den Ozeanen zu kämpfen, mit wachsendem Selbstvertrauen und wachsender Stärke in der Luft zu kämpfen, unsere Insel zu verteidigen, koste es, was es wolle? Wie lange ist vergangen, seit wir unsere Strände und Landeplätze verloren haben? Seit dem Tag, an dem unsere tapferen Söhne und Väter auf den Feldern und Straßen starben.\n\nWie lange ist vergangen, seit unser letzter kämpfender Soldat auf den Britischen Inseln kapituliert und die Kontrolle über unser Heimatland den deutschen Invasoren überlassen hat?\n\nEs fühlt sich an wie eine Ewigkeit...\n\nNun erreichen uns aus Europa die Worte, dass die Deutschen an Friedensverhandlungen interessiert sind. Dem geht der totale Sieg über die Sowjetunion und die faktische Beseitigung der einzigen potentiellen Bedrohung durch das Großdeutsche Reich voraus.\n\nAuf dieser sogenannten Haager Konferenz soll das endgültige Bild des Nachkriegseuropas und -afrikas, Fragen des Commonwealth sowie unsere eigene Rolle in der neuen deutschen Ordnung erörtert werden."
 umc_ger.530.a:0 "Dies könnte unsere letzte Chance sein, Frieden zu schließen ... und nach Hause zurückzukehren."
 umc_ger.530.b:0 "Da wir uns mehr denn je auf das Commonwealth verlassen, müssen wir uns zunächst mit ihm beraten."
 umc_ger.530.b_EXPL:0 "\nWir werden unsere Teilnahme an der Haager Konferenz mit den Mitgliedern des Commonwealth §CDiskutieren§! Ihre §HZustimmung§! wird uns zusätzliche §Hpolitische Macht§! und §HStabilität§! verschaffen und gleichzeitig die Wahrscheinlichkeit einer Auflösung des Commonwealth §GLinger§! verringern."
 umc_ger.530.c:0 "... dann würde unser Reich jenseits der Meere den Kampf fortsetzen ..."
 
 umc_ger.531.t:0 "[FROM.GetName] lehnt Verhandlungen ab"
 umc_ger.531.d:0 ""
 umc_ger.531.a:0 "Unsere Wunderwaffen werden ihnen dann schnell den Garaus machen."
 
 umc_ger.532.t:0 "Haager Konferenz – Abstimmung im Commonwealth"
 umc_ger.532.d:0 ""
 umc_ger.532.a:0 "Wir stimmen für den Frieden."
 umc_ger.532.b:0 "Wir stimmen für den Krieg."
 
 umc_ger.533.t:0 "Die Haager Konferenz – Endgültige Entscheidung"
 umc_ger.533.d:0 "Nach einigen Tagen schwieriger Kommunikation haben die Mitglieder des Commonwealth endlich ihre Ansichten zu diesem langwierigen Krieg mit dem Deutschen Reich geäußert. Auch wenn wir nicht alle zufriedenstellen können, sollten wir ihre Ansichten zumindest berücksichtigen. Ein falscher Schritt bei dieser Entscheidung würde das Ende des Britischen Empires und unseres gesamten Einflusses in der Welt bedeuten.\n\nDie letzte Abstimmung liegt bei uns. Und die Welt schaut nervös zu..."
 umc_ger.533.a:0 "Die friedliche Rückkehr auf die Britischen Inseln muss unsere höchste Priorität sein."
 umc_ger.533.b:0 "... bis zu Gottes gegebener Zeit die Neue Welt der Alten zu Hilfe kommt ..."
