 ### THC - Option 3 (ENG is in faction with USA and still on the Home Islands)
 umc_ger.560.t:0 "Die Haager Konferenz"
 umc_ger.560.d:0 "Es waren harte Kriegsjahre. Lange, harte Jahre mit ständigen Luftangriffen der Luftwaffe und Seegefechten mit der Kriegsmarine. Jahrelanger strategischer Bombenangriffe Deutschlands, in denen unsere Bürger in ständiger Angst lebten. In Europa waren die von uns unterstützten Widerstandsbewegungen erfolgreich, doch sie galten als gescheitert, als die sowjetische Ostfront zu fallen begann und die Deutschen bis nach Moskau und darüber hinaus vordrangen. Selbst mit der Macht der USA an unserer Seite ist es sehr unwahrscheinlich, dass eine Seeinvasion des sogenannten deutschen Atlantikwalls anders als mit einer vernichtenden Niederlage enden würde.\n\nNun erreichten uns aus Berlin die Nachricht, dass die Deutschen an Friedensverhandlungen interessiert sind. Dem geht der totale Sieg über die Sowjetunion und die faktische Beseitigung der einzigen potentiellen Bedrohung durch das Großdeutsche Reich voraus.\n\nAuf dieser sogenannten Haager Konferenz soll das endgültige Bild des Nachkriegseuropas und -afrikas, Fragen des Commonwealth sowie unsere eigene Rolle in der deutschen Neuordnung debattiert werden.\n\nDa wir heute mehr denn je auf unsere amerikanischen Verbündeten angewiesen sind, müssen wir sehr vorsichtig sein, wenn wir diese Verhandlungen ablehnen wollen. Die Unterstützung für den Krieg in Europa hat in den USA nicht gerade eine stabile Basis."
 umc_ger.560.a:0 "Dieser Krieg ist ein endloses Patt. Ohne die Sowjets würde jede Invasion mit einer Niederlage enden."
 umc_ger.560.b:0 "Mit der Macht der USA werden wir diesen Krieg siegreich beenden!"
 
 # USA - FROM 560.a 
 umc_ger.561.t:0 "Die Haager Konferenz - [ENG.GetName] akzeptiert die Verhandlungen"
 umc_ger.561.d:0 "Nach der Niederlage der Sowjetunion gegen das Deutsche Reich in Europa strebte der deutsche Führer [GER.GetLeader] eine friedliche Beendigung des Deutsch-Britischen Krieges an. Das britische Parlament stimmte mit [ENG.GetLeader] für die Aufnahme von Verhandlungen mit den Deutschen.\n\nAuch wenn dies als die einzig vernünftige Option erscheint, diesen Krieg in einer Pattsituation zu beenden, gibt es auch starke Stimmen, die darauf hinweisen, dass diese faschistische Bedrohung bekämpft werden muss, solange dies noch möglich ist. Und da wir noch unsere Verbündeten in Europa haben, wird erwartet, dass das Britische Empire, sollte zwischen unseren drei Nationen Frieden geschlossen werden, bald in den deutschen Einflussbereich geraten würde."
 umc_ger.561.a:0 "Die Briten haben den richtigen Weg gewählt. Es gibt keinen Grund, gegen Deutschland zu kämpfen ... jetzt."
 umc_ger.561.b:0 "Was für ein Unsinn. Diese faschistische Bedrohung muss ein für alle Mal beseitigt werden!"
 
 # USA - FROM 560.b
 umc_ger.562.t:0 "Die Haager Konferenz - [ENG.GetName] lehnt die Verhandlungen ab"
 umc_ger.562.d:0 "Nach der Niederlage der Sowjetunion gegen das Deutsche Reich in Europa strebte der deutsche Führer [GER.GetLeader] eine friedliche Beendigung des Deutsch-Britischen Krieges an. Die Briten lehnten jedoch in ihrem Stolz das deutsche Verhandlungsangebot ab und setzten den Krieg fort. Sie versuchten damit, uns ihrem Beispiel zu folgen und unsere Soldaten und unsere Wirtschaft zu nutzen, um sie zum Sieg zu führen. \n\nObwohl die Bedrohung durch den Faschismus unbestreitbar gebannt werden sollte, solange dies noch möglich ist, muss auch beachtet werden, dass die Unterstützung für einen Krieg in Europa hierzulande nicht so groß ist. Und ohne die zweite Front würde jede Landung auf dem deutsch besetzten europäischen Festland ein hohes Opfer an Soldatenleben erfordern. \n\nWir haben zu diesem Thema noch viel zu sagen ... und wenn wir Glück haben, werden die Briten unserem Beispiel folgen."
 umc_ger.562.a:0 "Sie verlassen sich darauf, dass wir sie zum Sieg führen?! Dieser Krieg führt nirgendwo hin."
 umc_ger.562.b:0 "Die Briten haben Recht. Diese faschistische Bedrohung muss ein für alle Mal beseitigt werden!"

 # ENG - FROM 561.b
 umc_ger.563.t:0 "Die Haager Konferenz - [USA.GetName] drängt auf die Fortsetzung des Krieges"
 umc_ger.563.d:0 "Sobald wir die deutsche Einladung zur Haager Konferenz erhielten, um diesen Krieg und vor allem sein Ende zu besprechen, stellte sich die Frage, wie unsere Verbündeten darauf reagieren würden, denn wir sind schon lange nicht mehr die einzigen, die in Europa gegen die Nazi-Welle kämpfen.\n\nDie Vereinigten Staaten von Amerika haben unsere Sache von Anfang an unterstützt, und es ist sehr gewagt zu glauben, dass wir ohne ihre Hilfe so lange Widerstand leisten könnten. Sie stellten uns Waffen, Schiffe, Freiwillige zur Verfügung und, was am wichtigsten war, stärkten unsere Moral in den dunkelsten Stunden.\n\nUnd obwohl es einige Dinge gab, in denen wir uns nicht einigen konnten, fanden unsere beiden Nationen immer einen guten Mittelweg.\n\nNun jedoch, da wir unseren Wunsch geäußert haben, an der Haager Konferenz teilzunehmen und möglicherweise ein friedliches Ende dieses Krieges anzustreben, hat [USA.GetLeader] umgehend geantwortet und erklärt, dass jegliche Verhandlungen mit den Faschisten inakzeptabel seien und dass dies ihre Position in Europa und der Welt nur festigen würde. Sein Botschafter erklärte dann, es liege in unserem größten Interesse, nicht an der Konferenz teilzunehmen und diese Einladung in unseren Propagandakampagnen als Zeichen deutscher Schwäche und mangelnder Kriegsbereitschaft zu nutzen.\n\nWir stehen hier eindeutig an einem Scheideweg. Und obwohl wir noch versuchen können, unsere Verbündeten zur Einsicht zu bewegen, könnte dies, sollte es uns nicht gelingen, auch das Ende des Bündnisses bedeuten."
 umc_ger.563.a:0 "Sie können den Krieg auf eigene Faust fortsetzen, wenn sie möchten."
 umc_ger.563.b:0 "Sie haben Recht. Wir müssen den Kampf durchhalten."
 
 umc_ger.564.t:0 "[ENG.GetName] stimmt der Fortsetzung des Krieges zu"
 umc_ger.564.d:0 ""
 umc_ger.564.a:0 "Gemeinsam werden wir der Welt eine bessere Zukunft ermöglichen."
 
 # USA - FROM 563.a
 umc_ger.565.t:0 "Die Haager Konferenz – [ENG.GetName] hat sich für den Frieden entschieden"
 umc_ger.565.d:0 ""
 umc_ger.565.a:0 "Verdammt! Mit den Faschisten werden wir allein fertig!"
 umc_ger.565.b:0 "Ohne die Briten würden wir unseren Stand in Europa verlieren. Wir müssen ihrer Entscheidung folgen."

 umc_ger.566.t:0 "Die Haager Konferenz – [USA.GetName] akzeptiert unsere Führung"
 umc_ger.566.d:0 ""
 umc_ger.566.a:0 "Eine unerwartete, aber weise Entscheidung. Dann lasst uns nach Den Haag fahren."
 
 # ENG - FROM 565.a
 umc_ger.567.t:0 "Die Haager Konferenz - [USA.GetName] bringt uns von unserem Weg ab"
 umc_ger.567.d:0 ""
 umc_ger.567.a:0 "Sie können sich gegenseitig vernichten, wenn sie wollen. Wir gehen nach Den Haag, um Frieden zu schließen." ### - this goes to OPTION 1
 
 # ENG - FROM 562.a
 umc_ger.568.t:0 "Die Haager Konferenz - [USA.GetName] Presse für die Friedensverhandlungen"
 umc_ger.568.d:0 "Sobald wir die deutsche Einladung zur Den Haager Konferenz erhielten, um diesen Krieg und vor allem sein Ende zu diskutieren, stellte sich die Frage, wie unsere Verbündeten darauf reagieren würden, denn wir sind schon lange nicht mehr die einzigen, die in Europa gegen die Nazi-Welle kämpfen.\n\nDie Vereinigten Staaten von Amerika haben unsere Sache von Anfang an unterstützt, und es ist sehr gewagt zu glauben, dass wir ohne ihre Hilfe so lange Widerstand leisten könnten. Sie stellten uns Waffen, Schiffe, Freiwillige zur Verfügung und, was am wichtigsten war – sie stärkten unsere Moral in den dunkelsten Stunden.\n\nUnd obwohl es einige Dinge gab, in denen wir uns nicht einigen konnten, fanden unsere beiden Nationen immer einen guten Mittelweg.\n\nNachdem wir nun jedoch unseren Wunsch zum Ausdruck gebracht hatten, den Kampf fortzusetzen, bis ganz Europa von der faschistischen Bedrohung befreit ist, antwortete [USA.GetLeader] umgehend und teilte mit, dass diese Friedenschance nicht so einfach abgelehnt werden könne und dass es am klügsten wäre, zumindest an der Konferenz teilzunehmen und die Deutschen anzuhören.\n\nEs ist klar, dass wir hier an einem Scheideweg stehen. Und obwohl wir immer noch versuchen können, unsere Verbündeten davon zu überzeugen, die Gründe dafür einzusehen, könnte dies, sollte es uns nicht gelingen, auch das Ende des Bündnisses bedeuten."
 umc_ger.568.a:0 "Wir haben es versucht. Jetzt müssen wir ihrem Beispiel folgen."
 umc_ger.568.b:0 "Feiglinge. Mit Deutschland werden wir allein fertig."
 umc_ger.568.b_EXPL:0 "\nWir werden den Krieg mit [GER.GetFlag]§H[GER.GetName]§! §Cfortsetzen§!, während [USA.GetFlag]§H[USA.GetName]§! allein an den Verhandlungen teilnehmen und höchstwahrscheinlich einem §HPflichtungsfrieden§! zustimmen wird."
 
 # USA - FROM 568.b / 595.b
 umc_ger.569.t:0 "Die Haager Konferenz - [ENG.GetName] bringt uns von unserem Weg ab"
 umc_ger.569.d:0 ""
 umc_ger.569.a:0 "Das wird ihr Untergang sein. Nehmen wir Kontakt mit den Deutschen auf. Wir sind zu Verhandlungen bereit."
 
 # GER - FROM 562.b / 563.b
 umc_ger.574.t:0 "[ENG.GetName] &amp; [USA.GetName] lehnen die Haager Konferenz ab"
 umc_ger.574.d:0 ""
 umc_ger.574.a:0 "Wir werden bald in London marschieren und die USA in die Steinzeit bomben." 
 
 # FROM 561.a / 566.a / 568.a - both ENG and USA agreed for negotiations
 umc_ger.575.t:0 "[ENG.GetName] &amp; [USA.GetName] nehmen an der Haager Konferenz teil"
 umc_ger.575.d:0 "Da es für die beiden germanischen Nationen keinen Grund gibt, den Kampf fortzusetzen, da wir in Europa eindeutig siegreich sind, hat [ENG.GetLeader] zugestimmt, alle feindseligen Handlungen einzustellen und an der Haager Konferenz teilzunehmen. Allein die Tatsache, dass der Hauptvertreter des Britischen Empires den Verhandlungen über UNSER Land zugestimmt hat, gibt uns relative Gewissheit, dass die Briten alle unsere Forderungen erfüllen werden.\n\nObwohl unser großes Ziel der Kampf gegen die Kommunisten im Osten war, haben uns die Briten nach dem Weltkrieg großen Schaden zugefügt. Sie haben unsere großartige Nation gedemütigt, und das Deutsche Volk hat schwer gelitten.\n\nAußerdem entschieden sie sich, statt ihre Waffen niederzulegen, sobald wir Frankreich eroberten, zu kämpfen und fügten unserem Kampf gegen den Bolschewismus ständigen Schaden zu. Viele großartige Seeleute und Piloten starben im Versuch, unser Land zu schützen, unsere Versorgungslinien zu schützen und unseren Himmel frei von feindlichen Bombern zu halten.\n\nDaher werden selbst die größten Forderungen an sie als möglich angesehen. Das Großdeutsche Reich ist eine führende Macht in Europa und die Briten MÜSSEN sich fügen ... oder untergehen."
 umc_ger.575.a:0 "Unser ultimatives Ziel haben wir bereits erreicht. Wir wollen nur noch Frieden mit unseren Feinden schließen."
 umc_ger.575.b:0 "Als Strafe für diesen Krieg müssen uns die Briten ein Stück Land in Afrika überlassen, damit Frieden herrscht."
 umc_ger.575.c:0 "Um Frieden zu erreichen, müssen große Beutemengen im Mittelmeerraum, in Afrika und im Osten geteilt werden."
 umc_ger.575.e:0 "Wir werden uns nicht mit milden Forderungen zufrieden geben. Die Briten müssen ihren neuen Platz in Europa akzeptieren."
 GER_ITA_share_spoils_EXPL:0 "\nWir werden in der Lage sein, einen Teil unseres neu gewonnenen Territoriums an [ITA.GetFlag]§H[ITA.GetName]§! zu §Hübertragen§!."
 
 # FROM 575.a
 umc_ger.576.t:0 "Haager Konferenz - Deutsche bieten weißen Frieden an"
 umc_ger.576.d:0 ""
 umc_ger.576.a:0 "Das ist das beste Ergebnis, das wir erzielen konnten."

 umc_ger.577.t:0 "Haager Konferenz - Deutsche bieten weißen Frieden an"
 umc_ger.577.d:0 ""
 umc_ger.577.a:0 "Wir sind alle gleich daraus hervorgegangen. Doch manche Schrecken dürfen nicht vergessen werden."
 
 umc_ger.578.t:0 "Haager Konferenz – [ENG.GetName] &amp; [USA.GetName] akzeptieren den Weißen Frieden"
 umc_ger.578.d:0 ""
 umc_ger.578.a:0 "Europa gehört uns. Lebensraum gehört uns. Krieg gibt es nicht mehr. Wir stehen siegreich!"
 
 # FROM 575.b / c
 umc_ger.580.t:0 "Haager Konferenz – Deutschland fordert Territorium in Afrika"
 umc_ger.580.d:0 ""
 umc_ger.580.a:0 "Ein kleiner Preis für den Frieden."
 umc_ger.580.b:0 "Wir werden keinen Zentimeter unseres Imperiums aufgeben!"
 
 umc_ger.581.t:0 "Haager Konferenz - [ENG.GetName] akzeptiert milde deutsche Forderungen in Afrika"
 umc_ger.581.d:0 ""
 umc_ger.581.a:0 "Es ist gut, dass unsere Verbündeten vernünftig sind und den Krieg nicht um ein paar Gebiete fortsetzen werden."

 umc_ger.582.t:0 "Haager Konferenz - [ENG.GetName] weist deutsche Forderungen in Afrika zurück"
 umc_ger.582.d:0 ""
 umc_ger.582.a:0 "Warum wollen sie den Krieg fortsetzen?!"
 umc_ger.582.b:0 "Die Deutschen sind nicht in der Lage, Forderungen zu stellen. Sie müssen eine andere Lösung finden."
 
 umc_ger.583.t:0 "Haager Konferenz - [USA.GetName] unterstützt deutsche Forderungen"
 umc_ger.583.d:0 ""
 umc_ger.583.a:0 "Dann müssen wir uns fügen ..."
 
 umc_ger.584.t:0 "Haager Konferenz - [USA.GetName] widersetzt sich deutschen Forderungen"
 umc_ger.584.d:0 ""
 umc_ger.584.a:0 "Dann müssen sie eine andere Lösung finden."
 
 umc_ger.585.t:0 "Haager Konferenz – [ENG.GetName] &amp; [USA.GetName] akzeptiert unsere Forderungen"
 umc_ger.585.d:0 "After a long hours of arguing, our Führer [GER.GetLeader], British ambassador representing the will of [ENG.GetLeader] and American ambassador representing [USA.GetLeader] have finally reached an agreement. The Brits with the support of the Americans have agreed to accept most of our demands, thus ending the war in Europe for good.\n\nWhile the two foreign ambassadors wanted to fly home as soon as possible, [GER.GetLeader] insisted they stay for the grand announcement of the agreement that was signed, which was being prepared in a rush in Nuremberg. All three representatives of their countries - together with other powerful men of Europe Which were invited to Hague as well - departed to Nuremberg just half an hour after the signing, maintaining relatively positive and relaxing conversation.\n\nIn Nuremberg, 'Die Letzte Rallye' was already prepared. There, in front of hundreds of thousands of people gathered, and millions of people watching speeches on television or listening to speeches on the radio, our Führer made his most emotional and empowering speech, announcing the Endsieg in Europe and in the world.\n\nAbgeordnete! Männer aus dem stolzen Großdeutschland! Die langen Jahre des Kampfes sind zu Ende. Ich bin stolz darauf, dass ich verkünden kann, dass heute Morgen das endgültige Friedensabkommen mit unseren Feinden in Übersee geschlossen wurde...\n       ... Jetzt hat das deutsche Volk endlich seinen Platz in diesem Wort gefunden. Unsere Neue Ordnung, unser Reich, wird Tausende von Jahren leben! Aber machen Sie keinen Fehler! Der Kampf der deutschen Nation wird niemals enden, bis der letzte kommunistische und antideutsche Widerstand vom Boden verwurzelt ist!\n\nThis grandiose speech was magnificent... it was a successful underlining of all the hardships and efforts of the entire German people during these long years of war. And also the last nail in the coffin of the militancy of the German people... at least for a while..."
 umc_ger.585.a:0 "Europa gehört uns. Lebensraum gehört uns. Krieg gibt es nicht mehr. Wir stehen siegreich!"
 
 umc_ger.586.t:0 "Die Haager Konferenz – [ENG.GetName] und [USA.GetName] lehnen unsere Forderungen ab"
 umc_ger.586.d:0 ""
 umc_ger.586.a:0 "Wenn wir eine Einigung erzielen wollen, müssen wir unsere Forderungen zurückschrauben."
 
 # FROM 575.e
 umc_ger.590.t:0 "Die Haager Konferenz – Forderungen an [ENG.GetName]"
 umc_ger.590.d:0 "... nach wenigen Verhandlungsstunden wurde uns schnell klar, dass der amerikanische Einfluss auf die britischen Entscheidungen zu groß war, um sie zu übergehen. Deshalb hatte Reichsführer Himmler eine brillante Idee. Gemeinsam mit dem Oberbefehlshaber der Luftwaffe Göring setzten sie den Plan am zweiten Verhandlungstag in die Tat um.\n\nAm Morgen begann die Küste Großbritanniens unter dem Lärm modernster deutscher Flugzeuge zu erzittern. Es wird gesagt – und durch die Propaganda verstärkt –, dass an diesem Tag mindestens die Hälfte der Luftwaffe über Dover flog. Obwohl die Piloten der Royal Air Force mobilisiert wurden, führten der Größenunterschied zu den riesigen Flugverbänden der Luftwaffe und das zurückhaltende Verhalten unserer tapferen Piloten dazu, dass an diesem Tag keine Schüsse abgefeuert wurden.\n\nEs wird auch gemunkelt, dass der Reichsführer und der Reichsmarschall den Test der ultimativen Waffe von unvorstellbarer Macht in der Nähe der britischen Inseln durchführten – diese Gerüchte erhielten jedoch keine offizielle Bestätigung durch die Regierung.\n\nDas britische Parlament in London wird nun mit etwas gewagteren Forderungen konfrontiert werden als die, die in Den Haag diskutiert werden. Hoffen wir, dass diese Machtdemonstration für die kriegsmüden Briten der letzte Nagel zu ihrem Grab war."
 umc_ger.590.a:0 "Großbritannien muss sich mit seinen Dominions unserem Einflussbereich anschließen."
 umc_ger.590.b:0 "Das Britische Empire muss reformiert werden und unserem Beispiel folgen."
 umc_ger.590.c:0 "Um den ewigen Frieden zu sichern, müssen wir darauf bestehen, dass Großbritannien sich unserem Willen vollständig unterwirft.“"
 umc_ger.590.e:0 "Wir müssen einen anderen Weg finden."
 
 # ENG - FROM 590.a
 umc_ger.591.t:0 "Die Haager Konferenz – [GER.GetName] fordert unseren Beitritt zur [GER.GetFactionName]"
 umc_ger.591.d:0 ""
 umc_ger.591.a:0 "Nur durch die Zusammenarbeit mit den Deutschen können wir unsere Zukunft sichern."
 umc_ger.591.b:0 "Wenn wir dies akzeptieren, gewinnen wir nur einen anderen Feind."
 
 umc_ger.592.t:0 "Die Haager Konferenz - [GER.GetName] fordert unsere separate Kapitulation"
 umc_ger.592.d:0 ""
 umc_ger.592.a:0 "Wir sind am Ende unserer Kräfte. Wir müssen uns unterwerfen."
 umc_ger.592.b:0 "In welcher Welt würden wir uns ihrer Meinung nach darauf einigen?!"
 
 umc_ger.593.t:0 "Die Haager Konferenz – [GER.GetName] fordert unsere separate Kapitulation"
 umc_ger.593.d:0 ""
 umc_ger.593.a:0 "Wir sind am Ende unserer Kräfte. Wir müssen uns unterwerfen."
 umc_ger.593.b:0 "In welcher Welt würden wir uns ihrer Meinung nach darauf einigen?!"
 
 umc_ger.594.t:0 "Die Haager Konferenz – [ENG.GetName] Lehnen Sie unsere Forderungen ab"
 umc_ger.594.d:0 ""
 umc_ger.594.a:0 "Unsere Möglichkeiten werden immer geringer."
 
 umc_ger.595.t:0 "Haager Konferenz – [ENG.GetName] stimmt separatem Friedensabkommen zu"
 umc_ger.595.d:0 ""
 umc_ger.595.a:0 "Lediglich einige letzte Vereinbarungen müssen noch verfeinert werden."  # GOES to 550
 
 # GER - FROM 569.a / 
 umc_ger.600.t:0 "Haager Konferenz – [USA.GetName] stimmt dem Frieden zu, [ENG.GetName] setzt den Kampf fort"
 umc_ger.600.d:0 ""
 umc_ger.600.a:0 "Die Amerikaner aus dem Krieg herauszuholen, ist mehr, als wir hoffen können."
 
 # USA - FROM 600.a / 655.a
 umc_ger.601.t:0 "Haager Konferenz – Weißer Frieden mit [GER.GetName]"
 umc_ger.601.d:0 ""
 umc_ger.601.a:0 "Die Briten hätten unserem Beispiel folgen sollen, als sie noch die Chance dazu hatten."
 
 # USA - FROM 591.a / 592.a / 593.a / 641.b
 umc_ger.605.t:0 "Haager Konferenz – [ENG.GetName] stimmt einem separaten Friedensabkommen zu"
 umc_ger.605.d:0 "Die ersten beiden Verhandlungstage in Den Haag waren geprägt von Streit, Drohungen und Überredungskunst. Der deutsche Führer [GER.GetLeader], der persönlich an den Verhandlungen teilnahm, war nicht bereit, auch nur einen Teil seiner Forderungen an uns und vor allem an das Britische Empire aufzugeben. Er argumentierte, dass die Koexistenz deutscher und britischer Supermächte als getrennte Nationen in Europa nur zu einem weiteren blutigen Krieg führen würde. Es scheint bereits jetzt sehr unwahrscheinlich, dass vor Ablauf der dreitägigen Frist eine Einigung erzielt werden könnte. Oh Gott, wie sehr wir uns geirrt haben.\n\nAm Morgen des dritten Tages, als unser Botschafter im Binnenhof eintraf, wo die Verhandlungen fortgesetzt werden sollten, wurde er mit einem angewiderten Blick bedacht. [GER.GetLeader] und [ENG.GetLeader] schüttelten ihre Hände über dem bereits unterzeichneten Vertrag über einen deutsch-britischen Separatfrieden. Wie? Alle uns vorliegenden Informationen deuten darauf hin, dass dieser separate Deal von der Londoner Regierung und nicht vom anwesenden Botschafter ausgehandelt und durch eine erschreckende Demonstration der neuen tödlichen deutschen Technologieentwicklungen durchgesetzt wurde.\n\nDer Deal besagt, dass das gesamte Britische Empire dem deutschen Einflussbereich angegliedert wird und die Regierung in London einer „nichteingreifenden Kontrolle“ Germaniens unterworfen wird. Mit anderen Worten: Die Hälfte der Briten hat ihre Waffen niedergelegt und kapituliert, während die andere Hälfte bereit ist, diese Waffen gegen uns zu richten.\n\nDennoch wurde uns ein bereits vorbereitetes Abkommen zur Unterzeichnung vorgelegt. Dieses Abkommen könnte uns zumindest einen kurzfristigen Frieden mit dem Reich sichern; eine wertvolle Zeit, in der wir uns neu formieren und unsere Optionen überdenken können. Und obwohl dieses Abkommen auch die Grenzen Amerikas in ihrer aktuellen Form garantiert, ist dies ein Jahr des Verrats, und die Unterzeichnung des Abkommens sollte uns nicht daran hindern, das Abkommen einzuhalten, sobald wir wieder zu Hause sind."
 umc_ger.605.a:0 "Benutzt und betrogen. Wir haben genug von den Briten, den Deutschen und Europa als Ganzem."
 umc_ger.605.a_EXPL1:0 "   Üben Sie Druck auf [CAN.GetFlag]§H[CAN.GetName]§! und [AST.GetFlag]§H[AST.GetName]§! aus, den deutschen Einflussbereich zu verlassen und unser §Hüberwachter Staat§! zu werden."
 umc_ger.605.a_EXPL2:0 "   Erobern Sie das gesamte „britische Territorium“ in Amerika."
 umc_ger.605.b:0 "Ein Haufen Verräter. Wir werden sie beide vernichten."
 
 umc_ger.606.t:0 "Die Haager Konferenz – [USA.GetName] setzt den Kampf fort"
 umc_ger.606.d:0 ""
 umc_ger.606.a:0 "Mit unseren neu gewonnenen „Verbündeten“ werden wir sie mühelos vernichten."
 
 umc_ger.607.t:0 "Haager Konferenz – [USA.GetName] möchte die Feindseligkeiten beenden"
 umc_ger.607.d:0 ""
 umc_ger.607.a:0 "Mehr konnten wir uns nicht erhoffen."
 umc_ger.607.b:0 "Wir müssen den Kampf fortsetzen"
 
 umc_ger.608.t:0 "Haager Konferenz - [GER.GetName] Akzeptiere den Weißen Frieden"
 umc_ger.608.d:0 ""
 umc_ger.608.a:0 "Wir sind hier fertig."
 
 umc_ger.609.t:0 "Haager Konferenz - [GER.GetName] Ablehnung des Weißen Friedens"
 umc_ger.609.d:0 ""
 umc_ger.609.a:0 "Unsere Nation muss ihr Bestes geben, um zu überleben und sich durchzusetzen."
 
 ### THC - Option 4 (ENG is in faction with USA, GER controls Home Islands)
 umc_ger.620.t:0 "Die Haager Konferenz"
 umc_ger.620.d:0 "Nach der Niederlage der Sowjetunion gegen das Deutsche Reich in Europa strebt der deutsche Führer [GER.GetLeader] eine friedliche Beendigung des Deutsch-Britischen Krieges an. Zu diesem Zweck wird die Haager Konferenz vorbereitet – eine Konferenz, auf der dieser endlose Konflikt mit den Deutschen überdacht und eine neue Perspektive auf Europa geschaffen werden soll, sofern – was einem Wunder gleichkäme – für alle Beteiligten akzeptable Friedensbedingungen vereinbart würden.\n\nObwohl die faschistische Bedrohung unbestreitbar gebannt werden sollte, solange dies noch möglich ist, muss auch beachtet werden, dass die Unterstützung für einen Krieg in Europa hierzulande nicht so groß ist.\n\nOhne eine zweite Front und einen gesicherten Stützpunkt in Europa würde jede Landung auf den deutsch besetzten Britischen Inseln oder in einem anderen europäischen Staat ein enormes Opfer an Soldatenleben bedeuten. Schlimmer noch: Die deutsche Kriegsmarine ist nicht länger nur eine lächerliche Nebenstreitmacht. Sie verfügt nun über die modernste und größte Über- und Unterwasserflotte der Welt. Daher scheint selbst die Atlantiküberquerung nur noch ein ferner Traum zu sein...\n\nAls führende Nation dieser antifaschistischen Koalition müssen wir entscheiden, ob wir der Haager Konferenz beitreten oder nicht. Es wäre jedoch ratsam, zunächst die Meinung unserer Verbündeten in dieser Angelegenheit einzuholen."
 umc_ger.620.a:0 "Die Briten haben ihre Heimat und ihre Macht verloren. Wir müssen Frieden suchen."
 umc_ger.620.b:0 "Hören wir, was [ENG.GetLeader] darüber denkt."
 umc_ger.620.b_EXPL:0 "\nWir werden unsere Teilnahme an der Haager Konferenz mit [ENG.GetFlag]§H[ENG.GetName]§! §CDiskutieren§!. Ihrer §HChoice§! zu folgen, wird uns zusätzliche §HPolitische Macht§! und §HStabilität§! verschaffen und auch die Chance §GLinger§! verringern, dass sie selbst Maßnahmen ergreifen."
 umc_ger.620.c:0 "Wir werden den Kampf gegen die faschistische Bedrohung mit allen notwendigen Mitteln fortsetzen!"
 THC_ENG_choosed_war_bad_EXPL:0 "\n[ENG.GetFlag]§H[ENG.GetName]§! hat für §HWar§! gestimmt. Daher hat diese Option auch folgende §REffect§!:"
 THC_ENG_choosed_peace_good_EXPL:0 "\n[ENG.GetFlag]§H[ENG.GetName]§! hat für §HPeace§! gestimmt. Daher hat diese Option auch folgenden §GEffect§!:"
 THC_ENG_choosed_war_good_EXPL:0 "\n[ENG.GetFlag]§H[ENG.GetName]§! hat für §HWar§! gestimmt. Daher hat diese Option auch folgenden §GEffect§!:"
 THC_ENG_choosed_peace_bad_EXPL:0 "\n[ENG.GetFlag]§H[ENG.GetName]§! hat für §HPeace§! gestimmt. Daher hat diese Option auch folgende §REffect§!:"
 
 # ENG - FROM 620.b (response returns to 620, provides bonus to the option ENG choose)
 umc_ger.621.t:0 "Die Haager Konferenz"
 umc_ger.621.d:0 "Wie viele Jahre sind vergangen, seit wir uns entschieden haben, den Deutschen die Stirn zu bieten? Seit den fulminanten Reden von Premierminister Churchill im Parlament, seit seinem Versprechen, bis zum Ende durchzuhalten? In Frankreich zu kämpfen, auf See und auf den Ozeanen zu kämpfen, mit wachsendem Selbstvertrauen und wachsender Stärke in der Luft zu kämpfen, unsere Insel zu verteidigen, koste es, was es wolle? Wie lange ist vergangen, seit wir unsere Strände und Landeplätze verloren haben? Seit dem Tag, an dem unsere tapferen Söhne und Väter auf den Feldern und Straßen starben?\n\nWie lange ist vergangen, seit unser letzter kämpfender Soldat auf den Britischen Inseln kapitulierte und die Kontrolle über unser Heimatland den deutschen Invasoren übergab?\n\nEs fühlt sich wie eine Ewigkeit an...\n\nVon diesem Tag an setzten unsere Kolonien mit Hilfe der Royal Navy den Kampf fort. Doch selbst mit Hilfe der USA gelang es uns nicht, unser Heimatland zurückzuerobern oder in Europa nennenswerte Fortschritte gegen die Faschisten zu erzielen. Nun erreicht uns die Nachricht aus Europa, dass die Deutschen an Friedensverhandlungen interessiert sind. Dem geht der totale Sieg über die Sowjetunion und die faktische Beseitigung der einzigen potentiellen Bedrohung für das Großdeutsche Reich voraus.\n\nAuf dieser sogenannten Haager Konferenz werden das endgültige Bild des Nachkriegseuropas und -afrikas, die Frage des Commonwealth sowie unsere eigene Rolle in der deutschen Neuordnung diskutiert. Unsere amerikanischen Verbündeten haben bereits ihr Interesse an dieser Konferenz bekundet und uns kontaktiert, um unsere Meinung zu hören."
 umc_ger.621.a:0 "Die Deutschen besetzen unser Heimatland schon viel zu lange. Wir müssen uns um Frieden bemühen."
 umc_ger.621.a_EXPL:0 "\nDurch Auswahl dieser Option werden weitere Verhandlungsoptionen für [GER.GetFlag]§H[GER.GetName]§! §Cfreigeschaltet§!, falls [USA.GetFlag]§H[USA.GetName]§! die Einladung zur Haager Konferenz §Hablehnt§! und den Krieg fortsetzt."
 umc_ger.621.b:0 "Wir verlassen uns nicht nur auf die USA, sondern auch auf das Commonwealth. Wir müssen sie zuerst fragen."
 umc_ger.621.c:0 "Wir müssen unsere Heimat mit Gewalt zurückerobern! Vereint und stark!"
 
 umc_ger.622.t:0 "[ENG.GetName] schlägt die Teilnahme an der Haager Konferenz vor"
 umc_ger.622.d:0 "Sobald wir die deutsche Einladung zur Den Haag-Konferenz erhielten, um diesen Krieg und vor allem sein Ende zu besprechen, stellte sich die Frage, wie unsere Verbündeten darauf reagieren würden, denn wir sind schon lange nicht mehr die einzigen, die in Europa gegen die Nazi-Welle kämpfen.\n\nDas Britische Empire hat die Nazis lange vor uns bekämpft. Sie haben sie so gut es ging zurückgehalten – und sie hatten auch den Mut, den Kampf fortzusetzen, selbst als ihre Heimatinseln nach einer erfolgreichen deutschen Invasion besetzt waren.\n\nAls ehrenhafter Verbündeter haben wir sie um ihre Meinung gebeten, und sie haben geantwortet – es ist Frieden. [ENG.GetLeader] schlägt vor, nach Den Haag zu fahren, den deutschen Führer zu treffen und zumindest seine Friedensbedingungen zu hören."
 umc_ger.622.a:0 "Es ist gut, ihre Meinung zu dieser Angelegenheit zu kennen ..."
 
 umc_ger.623.t:0 "[ENG.GetName] schlägt vor, den Kampf fortzusetzen"
 umc_ger.623.d:0 "Sobald wir die deutsche Einladung zur Den Haager Konferenz erhalten hatten, um diesen Krieg und vor allem sein Ende zu diskutieren, stellte sich die Frage, wie unsere Verbündeten darauf reagieren würden, denn wir sind schon lange nicht mehr die einzigen, die in Europa gegen die Nazi-Welle kämpfen.\n\nDas Britische Empire hat die Nazis lange vor uns bekämpft. Sie haben sie so gut es ging zurückgehalten – und sie hatten auch den Mut, den Kampf fortzusetzen, selbst als ihre Heimatinseln nach einer erfolgreichen deutschen Invasion besetzt worden waren.\n\nAls ehrenhafter Verbündeter haben wir sie um ihre Meinung gebeten, und sie haben geantwortet: Es ist ein Krieg. Ein endloser und totaler Krieg, bis die Britischen Inseln befreit sind. Nur dann wäre die deutsche Position zumindest gleichwertig mit unserer und ihrer, und alle ihre Forderungen müssten dieser entsprechen."
 umc_ger.623.a:0 "Es ist gut, ihre Meinung zu dieser Angelegenheit zu kennen ..."
 
 # ENG - FROM 620.a & b 
 umc_ger.624.t:0 "[USA.GetName] beschließt, der Haager Konferenz beizutreten"
 umc_ger.624.d:0 ""
 umc_ger.624.a:0 "Dann fahren wir nach Den Haag."
 
 umc_ger.625.t:0 "[USA.GetName] beschließt, die Einladung zur Haager Konferenz abzulehnen"
 umc_ger.625.d:0 ""
 umc_ger.625.a:0 "Dann müssen wir den Kampf fortsetzen."
 
 # GER - FROM 624.a
 umc_ger.630.t:0 "[USA.GetName] &amp; [ENG.GetName] nehmen an der Haager Konferenz teil"
 umc_ger.630.d:0 "Nach unserem großen Sieg über den Bolschewismus im Osten und der erfolgreichen Invasion der Britischen Inseln zog das britische Parlament nach Kanada um und setzte von dort aus seinen verzweifelten Krieg fort – wobei es schließlich auch den schlafenden Riesen Amerika in den Krieg hineinzog. Doch bereits zu diesem Zeitpunkt waren die Britischen Inseln fest in unserer Hand, und der verbleibende Widerstand war gebrochen. Der Atlantikwall wurde fertiggestellt und verstärkt, was den Alliierten ihre letzte Hoffnung auf eine erfolgreiche Invasion nahm.\n\nDie Vertreter von [USA.GetName] und [ENG.GetName] erkannten ihre schwierige Lage und stimmten zu, an den Verhandlungen in Den Haag teilzunehmen. Ihre Forderung, mit einem Zwischenstopp in England zu fliegen, wurde natürlich abgelehnt, da dies Mut machen und die Anti-Besatzungs-Gesinnung der britischen Bevölkerung stärken könnte.\n\nNun richtet die ganze Welt ihre Augen auf Den Haag. Und obwohl unser großes Ziel der Kampf gegen die Kommunisten im Osten war, hatten uns die Briten nach dem Weltkrieg großen Schaden zugefügt. Sie haben unsere große Nation gedemütigt, und das Deutsche Volk hat schwer gelitten.\n\nAnstatt die Waffen sofort nach der Einnahme Frankreichs niederzulegen, haben sie weitergekämpft und unserem Kampf gegen den Bolschewismus ständig geschadet. Viele tapfere Matrosen und Piloten starben bei dem Versuch, unser Land zu schützen, unsere Versorgungslinien zu sichern und unseren Himmel vor feindlichen Bombern zu schützen. Viele tapfere Soldaten starben während des Unternehmens Seelöwe an den Küsten und Stränden Großbritanniens.\n\nEine letzte Frage muss vor Beginn der Konferenz noch entschieden werden: Sollen wir die britischen Kollaborateure um Hilfe bitten, um den Eindruck zu erwecken, Großbritannien wolle mit uns zusammenarbeiten, oder sollen wir uns ausschließlich auf unseren Einfluss und unsere Macht verlassen?"
 umc_ger.630.a:0 "Laden wir auch Prinz Edward nach Den Haag ein, um die Wünsche des besetzten Großbritanniens zu vertreten."
 umc_ger.630.a_EXPL:0 "\nWir werden Prinz Edward zu den Verhandlungen einladen. Das wird uns mehr diplomatische Macht verleihen und Großbritannien, sollten die Verhandlungen erfolgreich sein, ein höheres Maß an Autonomie sichern."
 umc_ger.630.b:0 "Die Verhandlungen beginnen!"
 
 umc_ger.631.t:0 "Prinz Edward nimmt an der Haager Konferenz teil"
 umc_ger.631.d:0 "Auf unsere Bitte hin beschloss Prinz Edward, Herzog von Windsor, an der Konferenz in Den Haag teilzunehmen, um Großbritannien und seine Interessen bei diesen Verhandlungen zu vertreten.\n\nEr ist – zusammen mit seiner Frau Wallis – heute früh in einer Spezialversion eines Messerschmitt Me 264 Amerikabombers von London abgeflogen, begleitet von der gesamten Luftwaffenstaffel, da der Abschuss des „Prince Collaborator“ für die Alliierten und ihre Verbündeten im Widerstand sicherlich sehr verlockend gewesen wäre. Glücklicherweise verlief der Flug ohne größere Komplikationen, und sie landeten wenige Stunden nach ihrem Abflug in der Nähe von Den Haag. Man kann die symbolische Bedeutung der Situation jedoch nicht leugnen – ein Flugzeug, das unsere ultimativen Bomben an die amerikanische Küste bringen sollte, befördert nun einen Vertreter zu den Friedensverhandlungen.\n\nNun können die Verhandlungen endlich beginnen … alle, die es brauchen, sind hier versammelt, von unserem Führer [GER.GetLeader], den britischen und amerikanischen Botschaftern und Prinz Edward bis hin zu allen anderen Vertretern der europäischen Staaten."
 umc_ger.631.a:0 "Er wird Großbritannien rechtlich vertreten und als Gegengewicht zu Churchills Standhaftigkeit wirken."
 
 # FROM 631.a 
 umc_ger.635.t:0 "Die Haager Konferenz"
 umc_ger.635.d:0 ""
 umc_ger.635.a:0 "Teilen Sie das Britische Empire. Wir behalten Europa und Afrika und sie behalten den Rest."
 umc_ger.635.b:0 "Das Territorium in Amerika wird unter US-Mandat fallen. Der Rest muss uns übergeben werden."
 umc_ger.635.c:0 "Wir müssen das gesamte Britische Empire unter Edwards Herrschaft und unserer Kontrolle wieder vereinen." # Goes to 590
 umc_ger.635.e:0 "Dies ist dann das Ende der Konferenz."
 # ONLY visible if A/B/C fails and if you invited Edward
 umc_ger.635.f:0 "Dies ist dann das Ende der Konferenz."
 
 umc_ger.636.t:0 "Die Haager Konferenz - Deutsche Friedensbedingungen"
 umc_ger.636.d:0 ""
 umc_ger.636.a:0 "Auf ein besseres Ergebnis können wir nicht hoffen." 
 umc_ger.636.b:0 "Dies würde die Briten aus unserem Einflussbereich herausziehen. Ablehnung ist die einzige Möglichkeit."
 
 umc_ger.637.t:0 "Haager Konferenz - USA stimmen deutschen Friedensbedingungen zu"
 umc_ger.637.d:0 ""
 umc_ger.637.a:0 "Wir können nicht auf ein besseres Ergebnis hoffen. Zumindest wird unser Volk „frei“ sein."   
 umc_ger.637.b:0 "Kein Marionettenstaat wird über Großbritannien herrschen! Wir müssen den Krieg fortsetzen!"
 
 # ENG - FROM 636.b
 umc_ger.638.t:0 "Haager Konferenz - USA sind mit deutschen Friedensbedingungen nicht einverstanden"
 umc_ger.638.d:0 ""
 umc_ger.638.a:0 "Wir sind bereits am Rande unserer Stärke. Wir müssen diese Bedingungen akzeptieren."
 umc_ger.638.b:0 "Sie haben recht. Die Deutschen würden uns nur immer mehr wegnehmen."
 
 umc_ger.639.t:0 "Die Haager Konferenz - [ENG.GetName] drängt auf die Annahme der Friedensbedingungen"
 umc_ger.639.d:0 ""
 umc_ger.639.a:0 "Ihre Argumente sind vernünftig ... Wir werden ihrem Beispiel folgen."
 umc_ger.639.b:0 "Wir haben nein gesagt."
 
 umc_ger.640.t:0 "Haager Konferenz – USA folgen unserem Beispiel"
 umc_ger.640.d:0 ""
 umc_ger.640.a:0 "Es ist die richtige Entscheidung... zumindest müssen wir darauf hoffen."
 
 umc_ger.641.t:0 "Haager Konferenz - USA lehnen deutsche Friedensbedingungen ab"
 umc_ger.641.d:0 ""
 umc_ger.641.a:0 "Wir haben versucht, die Amerikaner unter Druck zu setzen, jetzt müssen wir ihrem Beispiel folgen."
 umc_ger.641.b:0 "Wie gesagt – wir MÜSSEN Frieden schließen." # USA gets umc_ger.605
 
 # GER - FROM 641.b
 umc_ger.642.t:0 "Haager Konferenz – [ENG.GetName] strebt separate Friedensverhandlungen an"
 umc_ger.642.d:0 ""
 umc_ger.642.a:0 "Ihre Allianz ist zerbrochen. Jetzt lasst uns über das Schicksal des Imperiums entscheiden." # GOES to 535
 
 # USA - FROM 637.b
 umc_ger.643.t:0 "Die Haager Konferenz - [ENG.GetName] drängt auf Fortsetzung des Krieges"
 umc_ger.643.d:0 ""
 umc_ger.643.a:0 "Und sie verlassen sich darauf, dass unsere Soldaten für ihren Sieg sterben?! Wir brauchen Frieden!"
 umc_ger.643.b:0 "Sie haben Recht. Wir müssen dieser faschistischen Bedrohung ein für alle Mal ein Ende setzen."
 
 umc_ger.644.t:0 "Die Haager Konferenz – [USA.GetName] stimmt der Fortsetzung des Krieges zu"
 umc_ger.644.d:0 ""
 umc_ger.644.a:0 "Ein kleiner Sieg für uns – jetzt lasst uns daraus Nutzen ziehen."
 
 umc_ger.645.t:0 "Haager Konferenz – [USA.GetName] entscheidet sich für den Frieden"
 umc_ger.645.d:0 ""
 umc_ger.645.a:0 "Ohne die USA wären wir verloren. Frieden ist die einzige gangbare Option."
 umc_ger.645.b:0 "Wie gesagt: Wir müssen unser Heimatland zurückerobern und unser Volk befreien."
 
 umc_ger.646.t:0 "Die Haager Konferenz - [ENG.GetName] Den Krieg fortsetzen"
 umc_ger.646.d:0 ""
 umc_ger.646.a:0 "Verdammte Idioten. Nehmen Sie Kontakt mit den Deutschen auf. Wir sind bereit, Frieden zu schließen."     # Goes to 600
 

 # GER - FROM 638.b / 643.a
 umc_ger.648.t:0 "[USA.GetName] &amp; [ENG.GetName] lehnen unsere Forderungen ab"
 umc_ger.648.d:0 ""
 umc_ger.648.a:0 "Dann müssen wir eine andere Lösung finden." # goes back to 635
 
 # GER - FROM 637.a / 640.a / 645.a
 umc_ger.649.t:0 "[USA.GetName] &amp; [ENG.GetName] stimmen unseren Bedingungen zu"
 umc_ger.649.d:0 "After a long hours of arguing, our Führer [GER.GetLeader], British ambassador representing the will of [ENG.GetLeader] and American ambassador representing [USA.GetLeader] have finally reached an agreement. The Brits with the support of the Americans have agreed to accept most of our demands, thus ending the war in Europe for good.\n\nWhile the two foreign ambassadors wanted to fly home as soon as possible, [GER.GetLeader] insisted they stay for the grand announcement of the agreement that was signed, which was being prepared in a rush in Nuremberg. All three representatives of their countries - together with other powerful men of Europe Which were invited to Hague as well - departed to Nuremberg just half an hour after the signing, maintaining relatively positive and relaxing conversation.\n\nIn Nuremberg, 'Die Letzte Rallye' was already prepared. There, in front of hundreds of thousands of people gathered, and millions of people watching speeches on television or listening to speeches on the radio, our Führer made his most emotional and empowering speech, announcing the Endsieg in Europe and in the world.\n\nAbgeordnete! Männer aus dem stolzen Großdeutschland! Die langen Jahre des Kampfes sind zu Ende. Ich bin stolz darauf, dass ich verkünden kann, dass heute Morgen das endgültige Friedensabkommen mit unseren Feinden in Übersee geschlossen wurde...\n       ... Jetzt hat das deutsche Volk endlich seinen Platz in diesem Wort gefunden. Unsere Neue Ordnung, unser Reich, wird Tausende von Jahren leben! Aber machen Sie keinen Fehler! Der Kampf der deutschen Nation wird niemals enden, bis der letzte kommunistische und antideutsche Widerstand vom Boden verwurzelt ist!\n\nThis grandiose speech was magnificent... it was a successful underlining of all the hardships and efforts of the entire German people during these long years of war. And also the last nail in the coffin of the militancy of the German people... at least for a while..."
 umc_ger.649.a:0 "Europa gehört uns. Lebensraum gehört uns. Krieg gibt es nicht mehr. Wir stehen siegreich!"
 
 
 # GER - FROM 625.a (if ENG voted for WAR)
 umc_ger.650.t:0 "[USA.GetName] &amp; [ENG.GetName] lehnen die Haager Konferenz ab"
 umc_ger.650.d:0 ""
 umc_ger.650.a:0 "Sie werden es bereuen, wenn unsere Bomben auf New York fallen."
 
 # GER - FROM 625.a (if ENG voted for PEACE or didn't vote at all)
 umc_ger.651.t:0 "[USA.GetName] Lehnen Sie die Haager Konferenz ab"
 umc_ger.651.d:0 ""
 umc_ger.651.a:0 "Sie werden es bereuen, wenn unsere Bomben auf New York fallen."
 umc_ger.651.b:0 "Die Amerikaner haben also abgelehnt … aber was ist mit den Briten?"
 
 umc_ger.652.t:0 "[GER.GetName] sendet separate Einladung zur Haager Konferenz"
 umc_ger.652.d:0 ""
 umc_ger.652.a:0 "Kein Krieg ist das Leben unserer Bürger wert. Wir werden nach Den Haag gehen."
 umc_ger.652.b:0 "Wir dürfen unsere amerikanischen Verbündeten nicht verraten. Wir müssen den Kampf fortsetzen."
 
 umc_ger.653.t:0 "[ENG.GetName] nimmt an der Haager Konferenz teil"
 umc_ger.653.d:0 ""
 umc_ger.653.a:0 "Die Briten haben klug und vernünftig gehandelt. Wir werden Frieden schließen."     # GOES to 535
 
 umc_ger.654.t:0 "[ENG.GetName] nimmt allein an der Haager Konferenz teil"
 umc_ger.654.d:0 ""
 umc_ger.654.a:0 "Wir wurden verraten! Verdammt seien die Briten. Verdammt seien die Deutschen. Verdammt sei dieser Krieg."     
 umc_ger.654.b:0 "Wir werden die Verräter und auch die Nazis vernichten!"     
 
 umc_ger.655.t:0 "[USA.GetName] strebt einen weißen Frieden an"
 umc_ger.655.d:0 ""
 umc_ger.655.a:0 "Dies ist das beste Ergebnis, auf das wir hoffen konnten."   # USA gets 601
 umc_ger.655.b:0 "Mit der gesicherten Stellung in Amerika werden wir die USA vernichten!"
 
 umc_ger.656.t:0 "[GER.GetName] lehnt unser White Peace-Angebot ab"
 umc_ger.656.d:0 ""
 umc_ger.656.a:0 "Wir hätten nach Den Haag gehen sollen, als wir konnten."
 
 umc_ger.657.t:0 "[ENG.GetName] lehnt separate Einladung ab"
 umc_ger.657.d:0 ""
 umc_ger.657.a:0 "Loyal, aber töricht."
 
 umc_ger.657.t:0 "[USA.GetName] setzt den Kampf fort"
 umc_ger.657.a:0 "Wir werden sie in die Vergessenheit bomben."
 
 ### POST-THC
 umc_ger.660.t:0 "Regelung nach der Haager Konferenz und Beginn der Neuordnung"
 umc_ger.660.d:0 "Mit dem endgültigen Erfolg der Haager Konferenz endete der Krieg in Europa faktisch. Unser Volk jubelte, da es uns endlich gelungen war, den Alliierten ihre Gunst aus dem Ersten Weltkrieg zu erwidern. Das Großdeutsche Reich steht nun als mächtigste Nation Europas siegreich da – wie es sein sollte.\n\nDoch nachdem wir uns um unsere Feinde gekümmert haben, müssen wir uns nun auch um unsere Verbündeten kümmern. Wir kontrollieren eine Reihe von Gebieten, die de facto von anderen Nationen beansprucht werden, die auf unserer Seite standen.\n\nJetzt haben wir die einmalige Gelegenheit, aus den Fehlern Großbritanniens und Frankreichs zu lernen und die Gebiete bestmöglich aufzuteilen, um die meisten unserer Verbündeten zu besänftigen … oder die Kontrolle über alle zu behalten und ihnen allen zu zeigen, dass wir die einzige Führungsmacht Europas sind und sie gehorchen müssen – oder untergehen."
 umc_ger.660.a:0 "Neuordnung ist jetzt."
 
 # Egypt
 umc_ger.670.t:0 "Die Ägypten-Frage"
 umc_ger.670.d:0 ""
 umc_ger.670.a:0 "Es bleibt vollständig unter unserer Kontrolle."
 umc_ger.670.b:0 "Wir werden Italien einladen, über das Schicksal Ägyptens zu entscheiden."
 umc_ger.670.c:0 "Wir werden die Türkei einladen, über das Schicksal Ägyptens zu entscheiden."       ### REVISIT - need more states for this option
 umc_ger.670.e:0 "Wir werden sowohl Italien als auch die Türkei einladen und eine Entscheidung treffen, die für alle passt."
 umc_ger.670.f:0 "Es soll so bleiben, wie es ist."
 
 umc_ger.671.t:0 "[GER.GetName] behält die Kontrolle über Ägypten"
 umc_ger.671.d:0 ""
 umc_ger.671.a:0 "Unsere begehrteste Belohnung und sie haben sie uns weggenommen?!"
 
 umc_ger.675.t:0 "Die Ägypten-Frage"
 umc_ger.675.d:0 ""
 umc_ger.675.a:0 "Wir werden Italien einige Gebiete überlassen, aber die Kontrolle über die wichtigsten Gebiete behalten."
 umc_ger.675.b:0 "Italien sollte alles haben, außer der Kontrolle über den Suezkanal."
 umc_ger.675.c:0 "Ganz Ägypten soll italienisch sein."
 umc_ger.675.e:0 "Vielleicht passt eine andere Option besser zu uns."
 
 umc_ger.676.t:0 "[GER.GetName] Übergibt einen Teil Ägyptens unter unsere Kontrolle"
 umc_ger.676.d:0 ""
 umc_ger.676.a:0 "Wir bekommen wenigstens etwas. Aber ist es genug?"
 
 umc_ger.677.t:0 "[GER.GetName] Übergibt den größten Teil Ägyptens unter unsere Kontrolle"
 umc_ger.677.d:0 ""
 umc_ger.677.a:0 "Haben wir alles gewonnen und doch nichts?"
 
 umc_ger.678.t:0 "[GER.GetName] Übergibt ganz Ägypten unter unsere Kontrolle"
 umc_ger.678.d:0 ""
 umc_ger.678.a:0 "Sie haben Wort gehalten. Das könnte bedeuten, dass es sich lohnt, den Stahlpakt fortzusetzen."
 
 # Gibraltar
 umc_ger.690.t:0 "Die Gibraltar-Frage"
 umc_ger.690.d:0 ""
 umc_ger.690.a:0 "Gibraltar ist einer der wichtigsten Orte in Europa. Es muss unter unserer direkten Kontrolle stehen."
 umc_ger.690.b:0 "Italien sollte Gibraltar besitzen, um seine Kontrolle über das Mittelmeer zu festigen."
 umc_ger.690.c:0 "Spanien wollte schon immer die Kontrolle über den Felsen zurückgewinnen. Wir werden sie ihnen endlich geben."
 umc_ger.690.e:0 "Es soll so bleiben, wie es ist."
