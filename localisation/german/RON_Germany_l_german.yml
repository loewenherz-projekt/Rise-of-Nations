 ### FATE OF YUGOSLAVIA
 umc_ger.410.t:0 "Schicksal Jugoslawiens"
 umc_ger.410.d:0 "Jugoslawien entstand nach dem Weltkrieg 1918 unter dem Namen Königreich der Serben, Kroaten und Slowenen durch den Zusammenschluss des provisorischen Staates der Slowenen, Kroaten und Serben. Das Königreich erlangte am 13. Juli 1922 auf der Botschafterkonferenz in Paris internationale Anerkennung, und der offizielle Name des Staates wurde am 3. Oktober 1929 in Königreich Jugoslawien geändert.\n\nSeit seiner Gründung musste Jugoslawien mit einer großen Anzahl von Nationalitäten auf seinem Territorium leben. Obwohl nie völlig stabil, gelang es dem Staat, ein gewisses Maß an friedlichem Zusammenleben seiner Bürger zu bewahren. Die Nationalisten ließen jedoch nie nach, und als wir unseren Blick in diese Richtung richteten, erklangen die Stimmen der unzufriedenen Menschen erneut.\n\nJetzt müssen wir [YUG.GetLeader] und der jugoslawischen Regierung nur noch unseren „Vorschlag“ vorlegen. Die Aufteilung Jugoslawiens in drei separate Staaten mit den stärksten Nationalitäten wäre aus organisatorischer und wirtschaftlicher Sicht definitiv die einfachste Entscheidung. Oder wir könnten unsere Verbündeten beschwichtigen und sie die Bissen aus diesem gefallenen Staat nehmen lassen.\n\nDie drastischste Lösung wäre, Jugoslawien zu einer Marionette zu machen und zu versuchen, es zusammenzuhalten oder alle Gebiete unter die Verwaltung des Reiches zu stellen. In diesem Fall müssen wir allerdings mit großen Unruhen und Partisanenaktionen als Reaktion darauf rechnen."
 umc_ger.410.a:0 "Errichten Sie kleine Marionettenstaaten auf der Grundlage der Nationalitäten."
 umc_ger.410.a_EXPL:0 "Erhalte §H6§! Milizdivisionen.\n"
 umc_ger.410.b:0 "Teilen Sie Jugoslawien unter unsere Verbündeten auf und halten Sie den Rest für eine Marionette."
 umc_ger.410.c:0 "Versuchen Sie, Jugoslawien zusammenzuhalten, aber bringen Sie es in unseren Machtbereich."
 umc_ger.410.e:0 "Alle Gebiete müssen vom Reich annektiert werden."
 
 umc_ger.411.t:0 "Das von Deutschland diktierte Schicksal Jugoslawiens"
 umc_ger.411.d:0 "Infolge der zunehmenden Spannungen in Europa und der deutschen Annexion Österreichs geriet unser Land unbeabsichtigt in den deutschen Einflussbereich. Während wir uns gelegentlich deutschen Forderungen stellen mussten, trat kürzlich der deutsche Außenminister Joachim von Ribbentrop an uns heran, um die letzte Frage unseres Landes zu besprechen.\n\nEs wurde vorgeschlagen, unser Land in drei neue Nationen aufzuteilen: [CRO.GetName], [BOS.GetName] und [SER.GetName]. Dies würde die meisten hier lebenden Nationalitäten besänftigen und die Lage vor Ort stabilisieren.\n\nSollten wir ihre Forderungen akzeptieren, würde unser Land auf das Territorium Serbiens reduziert. Eine andere Möglichkeit wäre, unsere Regierung zu unseren möglichen Verbündeten zu verlegen und uns erneut um die Befreiung unseres Landes zu bemühen. Manche schlagen sogar vor, wir sollten unsere Stellung hier in unseren Häusern, auf unseren Hügeln und Inseln verteidigen. Wir sind zwar sicherlich nicht stark genug, um der deutschen Armee direkt entgegenzutreten, aber die Landschaft könnte uns zugutekommen."
 umc_ger.411.a:0 "Wir können den Staat nicht zusammenhalten, wenn uns das deutsche Messer am Hals sitzt."
 umc_ger.411.b:0 "Verlegen Sie die Regierung nach London und setzen Sie den Kampf von dort aus fort."
 umc_ger.411.c:0 "Verlegen Sie die Regierung nach Moskau und setzen Sie den Kampf von dort aus fort."
 umc_ger.411.e:0 "Die jugoslawische Nation steht stark da!"
 
 umc_ger.412.t:0 "[YUG.GetName] akzeptiert unsere Forderungen"
 umc_ger.412.d:0 "Angesichts unseres unerträglichen Drucks und der Drohung einer militärischen Intervention gab die Regierung von [YUG.GetLeader] schließlich nach und erklärte sich bereit, unseren Forderungen nachzukommen. Damit fällt der Staat [YUG.GetName] vollständig unter unsere Kontrolle.\n\nWie vereinbart wird Jugoslawien aufgelöst und an seiner Stelle werden neue Staaten gebildet, die sich nach den dort lebenden Nationalitäten richten. Dies wird uns zumindest ein gewisses Maß an Stabilität in dieser Region sichern. Diese Staaten können ihr wirtschaftliches Potenzial weiterhin nutzen, um die Kriegsmaschinerie des Reichs mit Rohstoffen zu unterstützen und billige Lebensmittel und Arbeitskräfte bereitzustellen."
 umc_ger.412.a:0 "Ein Sieg für die Neue Ordnung!"
 
 umc_ger.413.t:0 "Das von Deutschland diktierte Schicksal Jugoslawiens"
 umc_ger.413.d:0 "Infolge der zunehmenden Spannungen in Europa und der deutschen Annexion Österreichs geriet unser Land unbeabsichtigt in den deutschen Einflussbereich. Während wir uns gelegentlich deutschen Forderungen stellen mussten, trat kürzlich der deutsche Außenminister Joachim von Ribbentrop an uns heran, um die letzte Frage unseres Landes zu besprechen.\n\nWie vorgeschlagen, sollte unser Land aufgelöst und unser ehemaliges Territorium unter den Verbündeten von [GER.GetName] aufgeteilt werden. Auf dem verbleibenden Gebiet sollte ein neuer Staat Serbien gegründet werden.\n\nSollten wir ihre Forderungen akzeptieren, würde unser Land auf das bloße Territorium Serbiens reduziert. Eine andere Möglichkeit wäre, unsere Regierung zu unseren möglichen Verbündeten zu verlegen und erneut für die Befreiung unseres Landes zu kämpfen. Manche schlagen sogar vor, wir sollten unsere Stellung hier in unseren Häusern, auf unseren Hügeln und Inseln halten. Obwohl wir sicherlich nicht stark genug sind, um der deutschen Armee direkt entgegenzutreten, könnte die Landschaft uns in die Hände spielen."
 umc_ger.413.a:0 "Wir können den Staat nicht zusammenhalten, wenn uns das deutsche Messer am Hals sitzt."
 umc_ger.413.b:0 "Verlegen Sie die Regierung nach Moskau und setzen Sie den Kampf von dort aus fort."
 umc_ger.413.c:0 "Verlegen Sie die Regierung nach London und setzen Sie den Kampf von dort aus fort."
 umc_ger.413.e:0 "Die jugoslawische Nation steht stark da!"
 
 umc_ger.414.t:0 "[YUG.GetName] akzeptiert unsere Forderungen"
 umc_ger.414.d:0 "Angesichts unseres unerträglichen Drucks und der Drohung einer militärischen Intervention hat die Regierung von [YUG.GetLeader] schließlich nachgegeben und sich bereit erklärt, unseren Forderungen nachzukommen. Damit fällt der Staat [YUG.GetName] vollständig unter unsere Kontrolle.\n\nWie vereinbart wird Jugoslawien aufgelöst und die meisten seiner ehemaligen Gebiete unter unseren Verbündeten aufgeteilt. Der Rest fällt unter die Kontrolle der Militärregierung Serbiens. Dies wird uns zumindest ein gewisses Maß an Stabilität in dieser Region sichern und unsere Verbündeten stärken."
 umc_ger.414.a:0 "Ein Sieg für die Neue Ordnung!"
 
 umc_ger.415.t:0 "Das deutsche Ultimatum"
 umc_ger.415.d:0 "Infolge der zunehmenden Spannungen in Europa und der deutschen Annexion Österreichs geriet unser Land unbeabsichtigt in den deutschen Einflussbereich. Während wir uns gelegentlich deutschen Forderungen stellen mussten, trat kürzlich der deutsche Außenminister Joachim von Ribbentrop an uns heran, um die letzte Frage unseres Landes zu besprechen. Er drängte uns auf, dem deutschen Bündnis beizutreten und uns dessen Einfluss zu unterwerfen. Auf diese Weise konnten wir uns einen gewissen freien Willen bewahren, da unsere Regierung mit nur geringfügigen Änderungen bestehen bleiben durfte. Die Kommunisten müssen jedoch bekämpft werden – sie müssen eingesperrt oder aus unserem Land vertrieben werden. Obwohl diese Option wie ein goldener Mittelweg zwischen deutscher Herrschaft und unserem freien Staat erscheint, würden wir einen enormen Stabilitätsverlust erleiden, wenn wir sie akzeptieren würden, da alle Nationalitäten, die erwartet hatten, dass der deutsche Druck ihnen einen eigenen freien Staat sichern würde, mit dieser Kehrtwende höchst unzufrieden sein würden."
 umc_ger.415.a:0 "Wir müssen der Neuen Ordnung Europas folgen."
 umc_ger.415.b:0 "Die jugoslawische Nation steht stark da!"
 
 umc_ger.416.t:0 "[YUG.GetName] akzeptiert unsere Forderungen"
 umc_ger.416.d:0 "Angesichts unseres unerträglichen Drucks und der drohenden Militärintervention gab die Regierung von [YUG.GetLeader] schließlich nach und erklärte sich bereit, unseren Forderungen nachzukommen. Damit fiel der Staat [YUG.GetName] vollständig unter unsere Kontrolle.\n\nSobald dieses Abkommen in Kraft trat, begannen unsere Truppen mit dem Einmarsch in jugoslawisches Gebiet, um größeren Widerstand zu verhindern. Als unsere Beamten in XXX eintrafen, empfing [YUG.GetLeader] sie mit offenen Armen und schwor öffentlich seine Treue zur Neuen Ordnung.\n\nWährend die Lage in den Großstädten weitgehend ruhig war, kann man dies von den ländlichen Gebieten nicht behaupten. Dort haben die Kommunisten bereits begonnen, die Milizen zu bewaffnen und ihr Untergrundnetzwerk aufzubauen, mit einem einzigen Ziel: uns aus ihrem Land zu vertreiben. Auch die Kroaten und andere Nationalisten sind mit der Situation nicht zufrieden. Sie hofften auf einen eigenen Freistaat, doch stattdessen stecken sie nun in der jugoslawischen Föderation fest. Die Probleme kommen, so viel ist sicher."
 umc_ger.416.a:0 "Ein Sieg für die Neue Ordnung!"
 
 umc_ger.417.t:0 "Das deutsche Ultimatum"
 umc_ger.417.d:0 ""
 umc_ger.417.a:0 "Widerstand würde nur Blutvergießen bringen."
 umc_ger.417.b:0 "Die jugoslawische Nation steht stark da!"
 
