 GER_9000_iq_hitler:0 "Annäherung an den sowjetischen Koloss"
 GER_9000_iq_hitler_desc:0 "Wir werden unsere Ostgrenze sichern, bevor wir unsere westlichen Feinde über die Meere und Ozeane der Welt verfolgen. Die Lösung besteht nicht darin, die sowjetische Bestie anzugreifen – sondern darin, uns mit ihr anzufreunden. Wir müssen sie unserem Willen unterwerfen und sie erziehen, unseren Befehlen zu gehorchen, wie ein treuer Hund seinem Herrchen."
 GER_demand_soviet_territorial_concession:0 "Sowjetische Territorialkonzessionen"
 GER_demand_soviet_territorial_concession_desc:0 "Wir werden von der Sowjetunion die Abtretung von Gebieten im Osten, insbesondere Polen und Litauen, an uns fordern. Wenn wir uns in dieser Frage einigen können, sieht der Führer keinen Grund, warum wir die Beziehungen nicht weiter ausbauen können."
 

 
 
