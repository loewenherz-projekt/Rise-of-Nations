 GER_JAP_nippon_lurgi_goshi_kk_desc:0 ""
 GER_JAP_military_technology_collaboration:0 "Zusammenarbeit im Bereich Militärtechnologie"
 GER_JAP_military_technology_collaboration_desc:0 ""
 GER_JAP_ribbentrop_oshima_pact:0 "Ribbentrop-Ōshima-Pakt"
 GER_JAP_ribbentrop_oshima_pact_EXPL1:0 "Wenn sie §GAkzeptieren§!, [SOV.GetFlag]§H[SOV.GetName]§! unter der Bedingung unserer §HEquipment-Unterstützung§! anzugreifen, hat das Ereignis die folgende §GEffect§!:\n"
 GER_JAP_ribbentrop_oshima_pact_EXPL2:0 "Wenn sie §GAkzeptieren§!, [SOV.GetFlag]§H[SOV.GetName]§! sofort anzugreifen, hat das Ereignis die folgenden §GEffects§!:\n"
 GER_JAP_ribbentrop_oshima_pact_EXPL3:0 "Wenn sie den Angriff auf [SOV.GetFlag]§H[SOV.GetName]§! §RReject§! ablehnen, hat das Ereignis die folgenden §REffects§!:\n"
 GER_JAP_ribbentrop_oshima_pact_EXPL4:0 "Sobald der Sieg errungen ist, wird ein §GAbkommen§! zur Aufteilung Eurasiens entlang des §H70. östlichen Meridians§! geschlossen.\n"
 GER_JAP_ribbentrop_oshima_pact_EXPL5:0 "   Senden Sie §HGeneräle§!, §HArtillerie§!, §HMotorisierte§!, §HPanzer§! und §HFlugzeuge§! an [JAP.GetFlag]§H[JAP.GetName]§!, um ihre Teilnahme am Krieg mit [SOV.GetFlag]§H[SOV.GetName]§! sicherzustellen.\n"
 GER_JAP_ribbentrop_oshima_pact_pact_desc:0 ""
 
