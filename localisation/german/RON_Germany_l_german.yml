 ### PLAN Z
 GER_plan_z_cat:0 "Plan Z"
 GER_plan_z_cat_desc:0 "Plan Z bezeichnet die geplante Neuausrüstung und Erweiterung der Kriegsmarine. Die Flotte soll die Seemacht Großbritanniens herausfordern und soll bis 1945 fertiggestellt sein.\n\nBei erfolgreichem Abschluss soll die Kriegsmarine über 10 Schlachtschiffe, 4 Flugzeugträger, 4 Schlachtkreuzer, 20 Schwere und 20 Leichte Kreuzer sowie über 100 Zerstörer verfügen."
 
 GER_plan_z_mission_dec:0 "Plan Z"
 GER_plan_z_mission_dec_desc:0 "Plan Z ist die Bezeichnung für die geplante Neuausrüstung und Erweiterung der Kriegsmarine. Die Flotte soll der Seemacht Großbritanniens Paroli bieten und bis 1945 fertiggestellt sein."
 GER_plan_z_redirect_production_dec:0 "Umleitung der Militärproduktion"
 GER_plan_z_redirect_production_dec_desc:0 "Waffen, Visiere, Panzerung. All das und mehr muss beim Schiffsbau Priorität haben, wenn wir unser Ziel rechtzeitig erreichen wollen. "
