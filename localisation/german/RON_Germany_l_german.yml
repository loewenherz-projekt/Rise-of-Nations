 GER_restore_hohenzollern:0 "Haus Hohenzollern restaurieren"
 GER_restore_hohenzollern_desc:0 "Da unsere Regierung nun offiziell eine Monarchie ist, sollten wir die Aufgabe zu Ende bringen und einen Monarchen aus unserem ursprünglichen Herrscherhaus auf den Thron bringen: den Hohenzollern."
 GER_empower_chancellorship:0 "Stärkung der Kanzlerschaft"
 GER_empower_chancellorship_desc:0 "Wenn dem Bundeskanzler mehr Macht über die Regierung übertragen wird, wird dies insgesamt zu einem reibungsloseren Regierungshandeln führen und außerdem unsere internationale Perspektive verbessern."
 GER_empower_emperor:0 "Stärkung der imperialen Autorität"
 GER_parlimentary_politics:0 "Parlamentarische Politik"
 GER_monarchal_politics:0 "Monarchische Politik"
 GER_weltpolitik:0 "Weltpolitik"
 GER_weltpolitik_desc:0 "Die vor Ausbruch des Ersten Weltkriegs verfolgte Philosophie der Weltpolitik verschaffte Deutschland großen internationalen Einfluss und die damit verbundenen Vorteile. Zwar ging man beim letzten Mal zugegebenermaßen zu weit, doch eine gemäßigtere, aggressivere Außenpolitik dürfte Erfolge bringen."
 GER_high_seas_fleet:0 "Die deutsche Hochseeflotte"
 GER_high_seas_fleet_desc:0 "Deutschland hatte noch nie eine Hochseeflotte, die mit der des Vereinigten Königreichs hätte mithalten können, und jetzt liegen wir sogar hinter den Franzosen! Die Verdoppelung unserer Anstrengungen im Bereich der Großkampfschiffe wird die einzige Möglichkeit sein, unserer Marine zu Weltruhm zu verhelfen."
 GER_unrestricted_submarine_warfare:0 "Uneingeschränkter U-Boot-Krieg"
 GER_rebuild_capital_ships:0 "Großkampfschiffe wiederaufbauen"
 GER_challenge_british_supremacy:0 "Fordern Sie die britische Vorherrschaft heraus"
 GER_challenge_british_supremacy_desc:0 "Die Briten haben viel zu lange die Hegemonie über den Atlantik und die Ostsee innegehabt – es ist höchste Zeit, dass sie erkennen, dass sie nicht mehr die einzige Weltmacht sind! Diese Vorstellung könnte sie, gelinde gesagt, verärgern."
 GER_new_deutches_heer:0 "Neues Deutsches Heer"
 GER_new_deutches_heer_desc:0 "Die Wiedererrichtung von Hitlers Wehrmacht als Deutsches Heer wird viele Veteranen des Ersten Weltkriegs dazu bewegen, sich unseren Reihen als Offiziere wieder anzuschließen und gleichzeitig unsere Rekrutierungsmöglichkeiten erheblich erweitern."
 GER_incorporate_OKW:0 "Integrieren Sie das OKW"
 GER_SS_to_freikorps:0 "SS in Freikorps umwandeln"
 GER_prussian_military_tradition:0 "Preußische Militärtradition"
 GER_realpolitik:0 "Realpolitik"
 GER_realpolitik_desc:0 "Die Philosophie der Regierungsführung und Politik, die pragmatische und realistische Tendenzen gegenüber idealistischen bevorzugt, ist die Realpolitik, die der große Einiger und Kanzler Bismarck begründete. Wir sollten diese Herrschaftsphilosophien in unserer Bürokratie wiederherstellen."
 GER_welfare_state:0 "Der Wohlfahrtsstaat"
 GER_welfare_state_desc:0 "Um die Menschen glücklicher zu machen und die Bedrohung durch den Kommunismus im eigenen Land abzuwehren, sollten wir uns die moderne Idee eines Wohlfahrtsstaates zu eigen machen. Indem wir unseren Bürgern Sozialleistungen und Schutz bieten, lassen sie sich weniger leicht von kommunistischen Sympathisanten überzeugen."
 GER_liberal_state_schools:0 "Liberale staatliche Schulen"
 GER_liberal_state_schools_desc:0 "Durch die Einführung einer Schulpflicht und einer staatlichen Schulorganisation wird die Bildung standardisiert und die qualifizierten Arbeitskräfte, für die die germanischen Völker seit Generationen bekannt sind, allgegenwärtig gemacht."
 GER_imperial_restorationism:0 "Kaiserlicher Restaurationismus"
 GER_new_zollverein:0 "Neuer Deutscher Zollverein"
 GER_new_zollverein_desc:0 "Der Zollverein war eine Zollunion, die Anfang des 19. Jahrhunderts von den verschiedenen deutschen Staaten gegründet wurde. Die Wiederherstellung eines solchen Zollvereins zur besseren Vereinheitlichung der deutschen Wirtschaft wird die nationale Industrie deutlich effizienter machen."
 GER_protective_tariffs:0 "Schutzzölle"
 GER_industrial_giant_once_more:0 "Deutscher Industriegigant erneut im Einsatz"
 GER_industrial_giant_once_more_desc:0 "Vor den Verwüstungen des Ersten Weltkriegs galt Deutschland als eine der stärksten Volkswirtschaften der Welt – nach der Weimarer Republik und ihrem wirtschaftlichen Ruin ist es uns immer noch nicht gelungen, diesen rechtmäßigen Titel zurückzuerobern. Lasst uns ihn wiedererlangen!"
 GER_prussian_military_tradition_desc:0 "Warum etwas reparieren, das nicht kaputt ist? Die berühmten militärischen Traditionen Preußens haben diesem Land, wie auch anderen deutschen Staaten, unglaublichen Ruhm beschert! Die Anwendung dieser Tradition auf die moderne Ära wird sich sicherlich als vorteilhaft erweisen."
 GER_imperial_restorationism_desc:0 "Indem wir dem deutschen Volk den Geist der alten Zeiten einflößen – den Wunsch nach dem Erfolg seiner großen Nation –, wird unser bereits starker Nationalgeist gestärkt."
 GER_imperial_restoration_desc:0 "Indem wir dem deutschen Volk den Geist der alten Zeiten einflößen – den Wunsch nach dem Erfolg seiner großen Nation –, wird unser bereits starker Nationalgeist gestärkt."
 GER_thousand_year_reich_desc:0 "Die NSDAP ist die Regierungspartei Deutschlands! Jetzt ist es an der Zeit, sich an die Arbeit zu machen und unsere Regierung so zu gestalten, wie sie für das geplante Tausendjährige Reich sein muss!"
 GER_new_kulturkampf_desc:0 "Die Wiederaufnahme des sprichwörtlichen Kulturkampfes gegen die unreine deutsche und religiöse Gesellschaft ist ein wichtiger Schritt, den wir unternehmen müssen, um Deutschland von seiner moralischen Zerstörung während der Weimarer Ära zu reinigen."
 GER_hitler_youth_desc:0 "Die Hitlerjugend ist eine Organisation, die die Bemühungen um das Ziel eines deutschen Deutschlands an die jüngsten Mitglieder der Gesellschaft heranträgt und dieses Ziel weitaus besser fördert, als wir es normalerweise könnten."
 GER_volkischer_beobachter_desc:0 "Der Volksbeobachter – die offizielle Zeitung der NSDAP – soll zur offiziellen Zeitung der deutschen Regierung gemacht werden! Die Ausweitung seiner Verbreitung dient ausschließlich der Verbesserung unserer Propagandamöglichkeiten."
 GER_reichskulturkammer_desc:0 "Durch die Einrichtung der Reichskulturkammer als offizielle Einrichtung unter der Leitung von Minister Goebbels können die künstlerischen und kulturellen Bestrebungen des deutschen Volkes vollständig mit unseren großen Visionen einer idealen deutschen Gesellschaft in Einklang gebracht werden."
 GER_new_german_order_desc:0 "Wir versuchen nicht nur, die Kultur und die Regierung Deutschlands zu erneuern, sondern wir versuchen, das gesamte Leben der deutschen Bevölkerung grundlegend und radikal zu verändern."
 GER_peoples_courts_desc:0 "Nach dem Scheitern der Strafverfolgung im Reichstagsbrandprozess ist es notwendig, dass wir Volksgerichte haben, um politische Staatsverbrechen zu verfolgen. Diese Gerichte können außerhalb der Rechtsprechung und der Verfassung recht erfolgreich agieren."
 GER_expand_farben_desc:0 "IG Farben ist das führende Unternehmen für die Vorentwicklung von Chemikalien für das Reich, insbesondere synthetisches Öl. Der Ausbau dieses Unternehmens wird es uns ermöglichen, diese wichtige Ressource für die deutsche Kriegsmaschinerie weiter zu erforschen."
 GER_NS_ordensburgen_desc:0 "Die Schlösser des neuen Nationalsozialistischen Ordens werden als Schulen für die kulturelle Elite unseres Landes dienen, zukünftige Führungspersönlichkeiten für unsere Regierung hervorbringen und noch mehr Möglichkeiten bieten, den Regierungsapparat zu rationalisieren."
 GER_restore_german_glory_desc:0 "Deutschland war einst eine ausgedehnte Nation mit Territorien, Protektoraten, Kolonien und großem Einfluss, die durch den Versailler Vertrag zerrissen wurde. Es ist höchste Zeit, dass wir beginnen, unseren rechtmäßigen Platz wiederherzustellen."
 GER_nation_alignment_desc:0 "Der Beginn diplomatischer Schmeicheleien in Ungarn und Rumänien wird den Übergang dieser Staaten in die deutsche Einflusssphäre erleichtern."
 GER_constructing_greater_germany_desc:0 "Das Großgermanische Reich erstreckt sich in Europa weit über die Gebiete hinaus, die sich gegenwärtig in sicherem deutschen Besitz befinden. Wir sollten diese wahrhaft deutschen Gebiete besetzen und assimilieren."
 GER_new_burgundy_state_desc:0 "Heinrich Himmler hat großes Interesse an den östlichen Regionen Frankreichs gezeigt und behauptet, dass die Region Burgund ein altes wirtschaftliches und kulturelles Zentrum sei, dessen germanisches Erbe wiederhergestellt werden müsse."
 GER_low_countries_desc:0 "Die Benelux-Staaten sind offensichtlich germanische Völker und ein wichtiger Teil des Großdeutschen Reiches, von dessen Wiedervereinigung wir träumen. Sie lassen sich problemlos in unseren totalen Machtbereich integrieren."
 GER_eastern_integration_desc:0 "Einige im Osten liegende polnische, tschechische und litauische Gebiete sind rechtmäßige Gebiete des Germanischen Reiches. Lassen Sie uns sie zurück in die Gemeinschaft bringen und in das Reich integrieren."
 GER_formalize_SS_desc:0 "Die SS war innerhalb der NSDAP und der neuen deutschen Regierung eine grob definierte Organisation – es ist an der Zeit, dass wir sie unter der festen Führung von Herrn Himmler offizieller machen."
 GER_general_SS_desc:0 "Die allgemeine SS-Unterabteilung der größeren Organisation wird für Geheimdienst- und politische Intrigentätigkeiten verantwortlich sein, die die Loyalität gegenüber unserer Partei und ihrer Regierung sichern."
 GER_territorial_policing_desc:0 "Indem wir die Verantwortung für die Polizeiarbeit und die Aufrechterhaltung der Ordnung in den besetzten Gebieten übertragen, können wir sicherstellen, dass wir unseren verzweifelten und zerstreuten Feinden immer einen Schritt voraus sind."
 GER_security_service_desc:0 "Der Sicherheitsdienst stellt den Höhepunkt der Bemühungen der Allgemeinen SS um die Polizeiarbeit als offizieller Sicherheitsdienst des Reiches dar. Der Ausbau und die Festigung seiner Organisation sind daher nur logisch."
 GER_waffen_SS_desc:0 "Der andere Teil der SS, der stärker im Blickpunkt der Öffentlichkeit steht, ist der paramilitärische Arm der NSDAP. Ihre Ausweitung zu einer Elitetruppe, die unter der Aufsicht der Partei an der Seite der Wehrmacht dient, ist nur natürlich."
 GER_SS_division_organization_desc:0 "Die Waffen-SS war eine uneinheitliche Gruppe von Brigaden und Bataillonen, die – bis jetzt – nicht in der Lage waren, an der Front eines größeren europäischen Krieges zu kämpfen."
 GER_equipment_prioritization_desc:0 "Indem wir der Versorgung der Waffen-SS-Divisionen im Feld mehr Gewicht verleihen, werden wir ihre Kapazität und Leistungsfähigkeit verbessern, indem wir in sie mit den modernsten landgestützten Technologien investieren, auf die wir Zugriff haben."
 
 GER_world_revolution:0 "Treiben Sie die Weltrevolution voran"
 GER_world_revolution_desc:0 "Trotzki hatte Recht. Nach dem Holodomor und den zahllosen anderen Misserfolgen der Sowjetunion ist klar, dass das stalinistische Modell des Sozialismus in einem Staat ein Desaster ist (wahrscheinlich gibt es dort nicht einmal Züge). Wir bleiben der Welt gegenüber offen!"
 GER_socialism_in_one_state:0 "Sozialismus in einem Staat"
 GER_socialism_in_one_state_desc:0 "Obwohl es viel gegen die Art und Weise zu sagen gibt, wie die Sowjets ihr Land regieren, gibt es noch mehr gegen das Ideal einer Weltrevolution zu sagen. Wir müssen das sozialistische Ideal zuerst in unserem Land verankern, bevor wir es den Arbeitern der Welt nahebringen."
 GER_communist_neutrality:0 "Kommunistische Neutralität"
 GER_communist_neutrality_desc:0 "Anstatt der gegenwärtigen Internationale beizutreten oder sie zu bekämpfen, können wir ebenso gut keine Position zu diesem Thema beziehen. An der Spitze des Sozialismus in der Welt zu bleiben und gleichzeitig den Zorn der Sowjetunion und ihres NKWD nicht auf uns zu ziehen, wäre im Moment die klügste Entscheidung."
 GER_socialism_with_a_human_face:0 "Sozialismus mit menschlichem Antlitz"
 GER_socialism_with_a_human_face_desc:0 "Frühere sozialistische Staaten hatten eine sehr schlechte Menschenrechtsbilanz – ein grundlegender Widerspruch zum Ziel des Kommunismus. Wenn wir den Sozialismus in unserem Land zu einem gemäßigteren System machen, wird sich unser Ansehen bei unserem Volk und in der Welt verbessern."
 GER_strengthen_the_vanguard:0 "Die Avantgarde stärken"
 GER_strengthen_the_vanguard_desc:0 "Ein zentraler Aspekt des Leninismus ist die Avantgarde-Partei, die eine Diktatur des Proletariats an der Regierung führt. Wenn wir unserer herrschenden kommunistischen Partei mehr Macht geben, kann sie diese Rolle besser ausfüllen und letztlich eine Kraft für die Befreiung des Proletariats sein!"
 GER_follow_the_nkvd_model:0 "Folgen Sie dem Modell des NKWD"
 GER_follow_the_nkvd_model_desc:0 "Die Abspaltung unserer Geheimdienste und Parteiorgane vom NKWD wird uns dabei helfen, das kommunistische Ideal in den Herzen unserer Bevölkerung zu verankern – ob sie es nun will oder nicht. Darüber hinaus wird die Eingliederung politischer Offiziere in die Armee unsere Truppen ermutigen, härter und stärker für ihr Vaterland zu kämpfen!"
 GER_our_own_path:0 "Unser eigener Weg"
 GER_our_own_path_desc:0 "Indem wir uns der Welt als eine von der Sowjetunion und der Kommunistischen Internationale unabhängige Macht präsentieren, werden wir in der Welt an Glaubwürdigkeit gewinnen. Dies wird die Menschen weltweit zu einer demokratischen, sozialistischen Bewegung bewegen, deren Anführer wir werden können."
 GER_strike_discrimination:0 "Streik gegen Diskriminierung"
 GER_strike_discrimination_desc:0 "Das moderne Deutschland wird vom Dämon der Diskriminierung geplagt, vor allem von Antisemitismus und Sexismus. Deutschland sollte eines der ersten Länder der Welt sein, das allen deutschen Bürgern umfassende Menschenrechte garantiert. Die Umgestaltung unseres Militärs hin zu einem egalitären System wird es auch ermöglichen, dass mehr Männer für den Militärdienst qualifiziert werden."
 GER_stoke_brain_gain:0 "Fördern Sie einen Brain Gain"
 GER_stoke_brain_gain_desc:0 "Nach dem Chaos der Weimarer Republik und der moralisch verwerflichen Herrschaft der NSDAP erlebte Deutschland einen extremen Brain Drain, der uns einige unserer besten Fachkräfte und Wissenschaftler kostete. Durch verstärkte Repatriierungsbemühungen und weitere Einwanderungsprogramme werden wir uns künftig einen neuen technologischen und industriellen Vorsprung verschaffen."
 
