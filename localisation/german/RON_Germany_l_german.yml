 ### Closer bonds with ARG
 germany.231.t:0 "[GER.GetName] schlägt engere Bindungen vor"
 germany.231.d:0 "Nach den bemerkenswerten deutschen Investitionen in unserem Land und der Stärkung ihrer Position in der Welt kamen deutsche Diplomaten heute mit dem Vorschlag, Argentinien in die Einflusssphäre des Deutschen Reiches einzugliedern. Aufgrund der großen deutschen Bevölkerung in Argentinien und der wirtschaftlichen und militärischen Macht des Deutschen Reiches wäre es für uns sicherlich von Vorteil, unsere Position in Südamerika zu stärken und vielleicht zurückzufordern, was uns gehören sollte."
 germany.231.a:0 "Eine hervorragende Idee!"
 germany.231.b:0 "Es könnte mehr Probleme verursachen, als es lösen würde ..."
 
 germany.232.t:0 "[ARG.GetName] stimmt einer engeren Beziehung zu"
 germany.232.d:0 "Unsere Diplomaten kehren mit guten Nachrichten aus Buenos Aires zurück! Nach nicht allzu langen Verhandlungen einigten sich die wichtigsten argentinischen Politiker auf eine engere Zusammenarbeit zwischen unseren beiden Nationen. Dieser Schritt vereint die deutsche Bevölkerung auf dem südamerikanischen Kontinent und bietet uns eine starke Basis für unsere Operationen sowie die versprochene Unterstützung der starken argentinischen Marine."
 germany.232.a:0 "Wir heißen sie in unserem Reich willkommen!"
 
 germany.233.t:0 "[ARG.GetName] bleibt neutral"
 germany.233.d:0 "Unsere Diplomaten kehren mit schlechten Nachrichten aus Buenos Aires zurück. Nach langen Verhandlungen mit den wichtigsten argentinischen Politikern kamen sie zu dem Schluss, dass es nicht ihre Absicht ist, in unseren Einflussbereich zu geraten. Dies ist Verrat an allen in Argentinien lebenden Deutschen, und es müssen Schritte unternommen werden, um diese diplomatische Fehlentscheidung zu kompensieren."
 germany.233.a:0 "Unser Wort wird nicht missachtet!"
 germany.233.b:0 "Es ist ihre Entscheidung. Aber wir werden die Rückzahlung unserer Investitionen verlangen."
 germany.233.c:0 "Wenn sie es wünschen."
 
 ### GER asks JAP for naval airforce tech
 germany.250.t:0 "[GER.GetName] fragt nach Marineflugzeugen"
 germany.250.d:0 "Deutsche Diplomaten bieten uns heute den Kauf unserer Trägerflugzeuge an. Auch wenn wir unsere gesamte Ausrüstung in den kommenden Konflikten benötigen werden, könnte uns dieser Deal nennenswerte deutsche Investitionen auf der Heimatinsel sichern."
 germany.250.a:0 "Diese enorme Industrieinvestition wird unserem Militär sicherlich mehr helfen als ein paar alte Flugzeuge."
 germany.250.b:0 "Wir können aus unserem Arsenal nichts entbehren außer Wissen."
 germany.250.c:0 "Japanische Dinge bleiben in Japan!"
 
 germany.251.t:0 "[JAP.GetName] stellt Testflugzeuge bereit"
 germany.251.d:0 "Die Japaner haben dem Kauf ihrer Flugzeuge zugestimmt und sie sind heute mit der Inspektion durch den Führer persönlich in Deutschland angekommen."
 germany.251.a:0 "Dies ist der Grundstein für unsere Marine-Luftwaffe!"
 GER_Navy_Luft_Ev_1:0 "20 Marinejäger und 20 Marinebomber werden dem Bestand hinzugefügt. Eine Lizenz für Marineflugzeuge wird mit Japan erteilt."
 
 germany.252.t:0 "[JAP.GetName] bietet Technologie"
 germany.252.d:0 ""
 germany.252.a:0 "Dies ist der Grundstein für unsere Marine-Luftwaffe!"
 GER_Navy_Luft_Ev_2:0 "Die Lizenz für „Marineflugzeuge“ wird mit Japan erteilt."
 
 germany.253.t:0 "[JAP.GetName] lehnt unsere Technologiekooperation ab"
 germany.253.d:0 ""
 germany.253.a:0 "Es hätte beide Seiten stärken können."
 
 ### Graf Zeppelin was launched
 germany.260.t:0 "Graf Zeppelin wurde vom Stapel gelassen!"
 germany.260.d:0 "Die jubelnde Menge, angeführt von unserem Anführer, verfolgte heute Morgen die Stapellauffeier der Graf Zeppelin, des Typschiffs einer neuen Klasse von zwei Flugzeugträgern. Mit einer Länge von 262 Metern und einer Kapazität für über 45 Flugzeuge wird sie einer der modernsten und innovativsten Flugzeugträger der Welt sein. Sie markiert den Beginn einer neuen, starken deutschen Marine, die die Weltmeere beherrschen wird."
 germany.260.a:0 "Das Reich wird über das Meer herrschen!"
 
 
