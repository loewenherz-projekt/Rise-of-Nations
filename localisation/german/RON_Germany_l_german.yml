 ### Lebensraum
 umc_ger.180.t:0 "Lebensraum"
 umc_ger.180.d:0 "Das deutsche Konzept des Lebensraums umfasst die Politik und Praxis des Siedlerkolonialismus, der sich in Deutschland seit den 1890er Jahren ausbreitete. Erstmals von Oscar Peschel verwendet, wurde es im Zweiten Weltkrieg zu einem geopolitischen Ziel Deutschlands, als Kernelement des Septemberprogramms der territorialen Expansion.\n\nNach [GER.GetLeader]s Machtergreifung wurde Lebensraum zu einem ideologischen Prinzip des Nationalsozialismus und diente als Rechtfertigung für die deutsche territoriale Expansion nach Mittel- und Osteuropa.\n\nDer Generalplan Ost sah vor, dass Deutschland einen für sein Überleben notwendigen Lebensraum benötigte und dass die meisten einheimischen Bevölkerungen Mittel- und Osteuropas dauerhaft verdrängt werden müssten. Die Eugenik des Lebensraums nimmt das Recht des deutschen arischen Herrenvolkes – des „Herrenvolkes“ – an, einheimische Völker im Namen ihres eigenen Lebensraums zu vertreiben.\n\nAber um dies zu erreichen, müssen wir einen riesigen Bären erlegen. Unsere Soldaten müssen vorbereitet sein, unsere Industrie muss ausreichend sein. Es ist noch ein langer Weg, aber das deutsche Volk verlangt ihn."
 umc_ger.180.a:0 "Unser Ziel muss erreicht werden."
 
