 #GER_rhineland_desc:0 "The western democracies have made a terrible blunder. Their attempt to seduce Italy has ended in abject failure. Their populations have lost faith in their ability to lead and Mussolini now looks to the Reich for friendship. It is time for the Fatherland to assume its rightful place in the world."
 GER_Autarky:0 "Der Weg zur Autarkie"
 GER_Autarky_desc:0 "Wir werden versuchen, wirtschaftliche Unabhängigkeit und militärische Einsatzbereitschaft zu erreichen. Ein Krieg steht bevor, und wir müssen unbedingt vorbereitet sein. Nur wenn wir wirklich autark sind, können wir unsere Feinde besiegen und diesen schrecklichen Makel von Versailles beseitigen."
 GER_Free_Market_Technocracy:0 "Entdecken Sie die Liberalisierung unseres Wirtschaftssystems"
 GER_Free_Market_Technocracy_desc:0 "In unserer Regierung bildet sich eine recht bedeutende Fraktion heraus. Sie wünscht sich Freihandel, Marktvermeidung und exorbitante Militärausgaben. Sie ist der Ansicht, dass das Land eine starke Wirtschaft braucht und dass wir alles in die Verbesserung der Wirtschaft investieren sollten, ohne uns in in- und ausländische Ablenkungen verwickeln zu lassen."
 GER_Autobahn_Investments:0 "Autobahninvestitionen I"
 GER_Autobahn_Investments_desc:0 "Wir werden in den Ausbau unseres Autobahnnetzes investieren. Viele haben sich gegen diese Projekte ausgesprochen, da die neuen Autobahnen wenig genutzt würden. Na und? Die Beschäftigung der Bevölkerung ist unser Hauptanliegen. Das Projekt wird viele Arbeitsplätze für Deutsche schaffen – das reicht."
 GER_Autobahn_Investments_2:0 "Autobahninvestitionen II"
 GER_Autobahn_Investments_2_desc:0 "Da wir noch mehr in den Ausbau der Autobahnen investieren, wird dieser Prozess schneller. Unsere Bürokratie mobilisiert die staatlichen Ressourcen effizienter und wir werden dieses neue Projekt in kürzester Zeit in Betrieb nehmen können."
 GER_Autobahn_Investments_3:0 "Autobahninvestitionen III"
 GER_Autobahn_Investments_3_desc:0 "Wir werden den Ausbau der Reichsautobahnen fortsetzen. Neben der wachsenden Unterstützung des Führers im Inland hat auch die Unterstützung der weltweit lebenden Volksdeutschen im Ausland erheblich zugenommen."
 GER_Autobahn_Investments_4:0 "Autobahninvestitionen IV"
 GER_Autobahn_Investments_4_desc:0 "Wir werden in einen letzten, umfassenden Ausbau des Autobahnnetzes investieren. Unsere Bürger werden dann mit zuverlässigen deutschen Automobilen auf gut befestigten Straßen durch das Reich fahren können. Dies wird den Handel deutlich steigern und langfristig zu wirtschaftlichem Wachstum führen."
 GER_Chinese_Ties:0 "Chinesisch-Deutsche Kooperation"
 GER_Chinese_Ties_desc:0 "Die Chinesen werden seit Jahrhunderten von ausländischen Mächten schikaniert, vor allem von den Briten und dem amerikanischen Marionettenreich Japan. Vielleicht würden sie uns für unsere Bemühungen entschädigen, wenn wir ihnen beim Aufbau eines modernen Militärs und einer modernen Industrie helfen würden?"
 GER_Chinese_Economic_Cooperation:0 "Chinesische Allianz"
 GER_Chinese_Economic_Cooperation_desc:0 "China ist die Zukunft Asiens, nicht Japan. China wird das antikommunistische Bollwerk des Ostens sein und uns bei der Zerstörung der kommunistischen Bedrohung unterstützen, so wie wir bei der Verteidigung ihres Heimatlandes gegen die Tyrannei geholfen haben."
 
 GER_A_More_Market_Oriented_Economy:0 "Eine stärker marktorientierte Wirtschaft"
 GER_A_More_Market_Oriented_Economy_desc:0 "Wir werden eine neue Wirtschaftspolitik verfolgen, die auf die Förderung der zivilen Industrieentwicklung abzielt und gleichzeitig militärische Investitionen zurückdrängt. Dies wird unsere militärische Wiederaufrüstung verlangsamen, doch wichtiger ist unsere wirtschaftliche Erholung."
 GER_Tease_Removing_Trade_Protections:0 "Tease: Aufhebung des Handelsschutzes"
 GER_Tease_Removing_Trade_Protections_desc:0 "Wir stehen unter dem Druck nationaler und internationaler Kapitalisten, die Regulierung zu deregulieren. Wenn wir den Eindruck erwecken, wir würden Handelsprotektionen aufheben und eine Laissez-faire-Handelspolitik verfolgen, können wir vielleicht kurzfristig mehr Investitionen und Wirtschaftsaktivität generieren."
 GER_Privatization_of_Public_Owned_Buisnesses:0 "Privatisierung öffentlicher Unternehmen"
 GER_Privatization_of_Public_Owned_Buisnesses_desc:0 "Wir werden öffentliche Versorgungsunternehmen privatisieren, um unsere eigenen Industriellen zufriedenzustellen und ausländische Investoren anzulocken. Dies wird zwar Kosten verursachen, ist aber notwendig, um unsere langfristigen Ziele zu erreichen."
 GER_Superiority_Through_Success:0 "Überlegenheit durch Erfolg"
 GER_Superiority_Through_Success_desc:0 "Wir müssen die Entwicklung der Wissenschaft vorantreiben. Wir werden in die Entwicklung einer besseren Infrastruktur an unseren Universitäten und in die Ausbildung von technischem Personal investieren."
 GER_Another_Reversal:0 "Eine weitere Umkehr"
 GER_Another_Reversal_desc:0 "Unsere judenfreundliche Politik war nur vorübergehend. Nachdem wir dem Westen alles genommen haben, was wir brauchten, werden wir unsere Verfolgung der niederträchtigen Semiten erneut beginnen."
 #GER_Balanced_Budget:0 "Balanced Budget"
 #GER_Balanced_Budget_desc:0 ""
 GER_Flirt_With_Wall_Street:0 "Flirt mit der Wall Street"
 GER_Flirt_With_Wall_Street_desc:0 "Wir werden unsere Beziehungen zu den Amerikanern stärken und uns an die US-Banken binden. Sie können uns das für den industriellen Ausbau notwendige Geld zu einem Sonderzins leihen."
 GER_End_to_Anti_Semitism:0 "Ende des institutionalisierten Antisemitismus"
 GER_End_to_Anti_Semitism_desc:0 "Um die Beziehungen zu den westlichen Demokratien zu verbessern, werden wir unsere Politik der institutionellen Diskriminierung und der Förderung des Antisemitismus beenden. Wir werden Gewalt und Diskriminierung gegenüber Semiten zumindest vorerst offiziell ablehnen."
 GER_Encourage_Buisness_Cooperation:0 "Fördern Sie die Zusammenarbeit zwischen Unternehmen"
 GER_Encourage_Buisness_Cooperation_desc:0 "Wir werden eine industrielle Zusammenarbeit zwischen unserem Land und den westlichen Demokratien vorschlagen. Sie werden dies sicherlich akzeptieren, da ein solches Abkommen allen Beteiligten nur nützen würde."
 #GER_Jewish_Professionals:0 "Jewish Professionals"
 #GER_Jewish_Professionals_desc:0 "The state will officially support jewish professionals who have valuable technical skills that they can use to contribute to the Reich. We will be consistent with our previous policy of ending anti-semite discrimination."
 GER_Rapid_Technological_Advancements:0 "Schnelle technologische Fortschritte"
 GER_Rapid_Technological_Advancements_desc:0 "Wir werden ein Forschungsabkommen mit den westlichen Demokratien vorschlagen, um multinationale Wissenschaftskonferenzen zu fördern, die allen beteiligten Nationen zugute kommen."
 GER_Worlds_First_Turbojet:0 "Das erste Turbojet-Triebwerk der Welt"
 GER_Worlds_First_Turbojet_desc:0 "Wir werden erhebliche Mittel in die Entwicklung von Turbojet-Flugzeugen investieren. Diese Theorien gibt es schon seit über einem Jahrzehnt, doch nach dem jüngsten deutsch-britischen Forschungsabkommen im Rahmen unseres Programms zur Förderung der technologischen Zusammenarbeit mit den westlichen Demokratien haben diese Theorien das Interesse des Führers geweckt."
 GER_Hanomag_Expansion:0 "Hanomag-Erweiterung"
 GER_Hanomag_Expansion_desc:0 "Wir werden erhebliche Mittel in die Mechanisierung der Wehrmacht investieren. Wir werden der Produktion von Hanomag-Halbkettenfahrzeugen Priorität einräumen und die Ressourcen unseres Landes darauf konzentrieren, möglichst viele dieser Fahrzeuge so günstig wie möglich zu produzieren."
 GER_Rapproachment_with_the_Church:0 "Schluss mit dem Kirchenkampf"
 GER_Rapproachment_with_the_Church_desc:0 "Der Kirchenkampf soll ein Ende haben. Der Staat wird seine Unterwanderung der Kirche in unserer Gesellschaft beenden. Hoffentlich werden dadurch die Spannungen abgebaut und der Widerstand gegen die neue Politik des Führers verringert."
 GER_Civilian_Industry_Investments:0 "Investitionen der Zivilindustrie"
 GER_Civilian_Industry_Investments_desc:0 "Wir werden den Ausbau von Industriezentren finanzieren, um unsere Wirtschaft anzukurbeln. Der Führer hofft, eine kritische Masse der Industrialisierung zu erreichen, bei der wir bei Industriegütern und Maschinen völlig autark sind und gleichzeitig unsere eigene zivile Industrie aufbauen."
 GER_Technological_Investments_Not_Welfare:0 "Technologische Investitionen"
 GER_Technological_Investments_Not_Welfare_desc:0 "Wir müssen in den Ausbau unserer technischen Anlagen und die Erhöhung unseres Forschungsbudgets investieren. Viele Intellektuelle und Wissenschaftler haben das Reich bereits verlassen, aber wenn wir alle Studien und Projekte mit potenziellem militärischen Nutzen mit ausreichend wissenschaftlichen Mitteln unterstützen, werden wir unseren wissenschaftlichen Rückstand bald aufholen und die archaischen französischen und britischen Demokratien überholen."
 GER_American_Production_Methods:0 "Amerikanische Produktionsmethoden"
 GER_American_Production_Methods_desc:0 "Wir werden uns auf die verstärkte Zusammenarbeit zwischen unseren eigenen und den US-amerikanischen Industriellen konzentrieren. In der Vergangenheit waren die Amerikaner bereit, Anlagen in Deutschland zu errichten. Nun werden wir Partnerschaften fördern, die es uns ermöglichen, ihre fortschrittlichen industriellen Methoden im ganzen Reich zu kopieren."
 #GER_Encourage_Anti_Roosevelt_Sentiment:0 "Encourage Anti-Roosevelt Sentiment"
 #GER_Encourage_Anti_Roosevelt_Sentiment_desc:0 "Franklin Roosevelt has been a thorn in our side. He harbors deep suspicions of fascism and publicly questions our motives. If the Americans were to move on us now, the whole house of cards could come tumbling down. We must discredit him before he can expose our agenda. "
 GER_World_Stage:0 "Weltbühne"
 GER_World_Stage_desc:0 "Wir haben Deutschland zu seinem früheren Glanz zurückgeführt. Arme deutsche Arbeiter betteln nicht länger in der Gosse. Unzufriedenheit und Angst in den unteren Schichten sind verschwunden. Das Reich wird sich den westlichen Demokratien anschließen, die es in der Vergangenheit schikaniert haben, und zu einer eigenständigen Industriemacht werden, mit einem Lebensstandard, der mit dem jeder westlichen Nation mithalten kann – zumindest behauptet das der Führer."
 GER_Accept_High_Power_Industrialists:0 "Akzeptieren Sie hochmächtige Industrielle"
 GER_Accept_High_Power_Industrialists_desc:0 "Unser wirtschaftlicher Aufstieg ging mit einem bedeutenden politischen und gesellschaftlichen Wandel einher. Der steigende Wert und die Gier nach Geld in unserer Gesellschaft ermöglichten es Industriellen und Kapitalisten im Reich, Einfluss bei verschiedenen bürokratischen und politischen Führern zu erkaufen. Wir könnten diesen Machenschaften leicht ein Ende setzen, doch vielleicht ist dies eine natürliche Weiterentwicklung der Vision des Führers von einem besseren Deutschland."
 GER_Western_Friends:0 "Wood-Ribbentrop-Pakt"
 GER_Western_Friends_desc:0 "Wir werden mit den westlichen Demokratien freundschaftlich zusammenarbeiten und gemeinsame geopolitische Interessen verfolgen. Es gibt keinen Grund, warum unsere Nationen nicht zusammenarbeiten sollten. Im Gegenteil, wir haben einander viel zu bieten. Wir werden die Vergangenheit ruhen lassen und in eine neue und aufregende Ära für unser Reich vorstoßen!"
 GER_Joint_Development_With_The_British:0 "Gemeinsame Entwicklung mit den Briten"
 GER_Joint_Development_With_The_British_desc:0 "Wir werden gemeinsame Militärmanöver mit dem britischen Militär durchführen, Informationen austauschen und Podiumsdiskussionen zu militärischen Theorien veranstalten. Das ist ein fairer Tausch, da wir in der Marineentwicklung erhebliche Defizite aufweisen, während die Briten versuchen, eine Stagnation ihrer Landstreitkräfte zu vermeiden."
 GER_Smooth_Things_Over_With_Poland:0 "Mit Polen die Wogen glätten"
 GER_Smooth_Things_Over_With_Poland_desc:0 "Im Geiste der Zusammenarbeit mit Demokratien werden wir unsere Beziehungen zu Polen verbessern. Bei genauerem Hinsehen teilen wir viele Interessen mit dem polnischen Volk, vor allem seinen antikommunistischen (und antirussischen!) Eifer. Es wäre für beide Seiten von Vorteil, zusammenzuarbeiten, um eine größere Bedrohung zu bekämpfen. "
 GER_Naval_Purchase:0 "Marinekauf"
 GER_Naval_Purchase_desc:0 "Sollte es zu einem Krieg mit der Sowjetunion oder einem weiteren Krieg in Nordeuropa kommen, müssen wir in der Lage sein, die Seehoheit in der Ostsee zu sichern, um unsere Küsten und Handelskonvois zu schützen. Zu diesem Zweck haben wir britische Schwere Kreuzer und Schlachtschiffe bei Werften in Großbritannien bestellt."
 GER_Order_Delivery:0 "Bestellungslieferung"
 GER_Order_Delivery_desc:0 "Wir werden die Schiffe abholen, die wir bei englischen Schiffsbauern bestellt haben. Sie sind größtenteils fertig, aber aus unbekannten Gründen sind die Arbeiten an diesen Projekten ins Stocken geraten. Leider sind die Engländer nicht so effizient und methodisch wie die Deutschen und brauchen einen Tritt in den Hintern, um ihre Faulheit zu beenden und den Prozess wieder in Gang zu bringen."
 GER_Our_Own_Carriers:0 "Unsere eigenen Spediteure"
 GER_Our_Own_Carriers_desc:0 "Der Führer war sehr beunruhigt, als er Geheimdienstberichte über britische und amerikanische Flugzeugträger und ihre Seemacht las. Sogar die Japaner besitzen diese mächtigen Giganten. Wir müssen unsere eigenen Entwürfe entwickeln!"
 GER_Threat_of_Bolshevism:0 "Bedrohung durch den Bolschewismus"
 GER_Threat_of_Bolshevism_desc:0 "In einer Rede, die von vielen als eine seiner besten gelobt wurde, sprach sich der Führer gegen das Sowjetregime und seinen Führer Josef Stalin aus. Er wies auf die militärische Unfähigkeit und die Ineffizienz der Industrie und Landwirtschaft hin und bezeichnete das Sowjetregime als „Reich des Bösen“, das seinen Willen den Unwilligen unter Androhung von Hinrichtung und Gefängnis aufzwingt."
 GER_Soviet_Threat:0 "Die sowjetische Bedrohung"
 GER_Soviet_Threat_desc:0 "Der Führer hat das rückschrittliche kommunistische Regime in der Sowjetunion erneut angeprangert und nun dazu aufgerufen, diese Krankheit mit allen Mitteln aus der Welt zu schaffen. Er sagte voraus, es sei nur eine Frage der Zeit, bis der sowjetische Expansionsimperialismus auch vor Deutschlands Haustüre ankomme, und jedes Land habe das Recht, sich durch präventive Verhinderung solcher Aktionen zu verteidigen."
 GER_Coming_Conflict:0 "Der kommende Konflikt"
 GER_Coming_Conflict_desc:0 "Es ist offensichtlich, dass wir uns einem Konflikt mit der Sowjetunion nähern. Wir sollten uns auf diesen Fall vorbereiten und werden dies durch die Errichtung von Protektoraten in den baltischen Staaten tun. Wir müssen schnell handeln, bevor die Sowjetunion die Unabhängigkeit dieser wertvollen Verbündeten untergräbt."
 #GER_Arms_Production:0 "Infantry Equipment Investments"
 #GER_Arms_Production_desc:0 "We will develop next-generation infantry equipment to give our soldiers an edge in close-quarters combat."
 GER_War_on_the_USSR:0 "Militärische Verfolgung des Kommunismus"
 GER_War_on_the_USSR_desc:0 "Wir werden der abscheulichen kommunistischen Ideologie und ihrem mächtigsten Förderer, der Sowjetunion, den Krieg erklären."
 GER_International_Financial_Judaism:0 "Internationales Finanzjudentum"
 GER_International_Financial_Judaism_desc:0 "Es ist Zeit, dem ungerechten Finanzsystem, das die Welt regiert, den Krieg zu erklären. Die New Yorker und Londoner Banken üben einen ungesunden Einfluss auf die Welt aus. Zusammen mit ihren französischen Lakaien müssen diese Degenerierten zum Wohle der gesamten Menschheit und vor allem der arischen Rasse vernichtet werden."
 
 
 
 GER_Reject_Mussolini:0 "Mussolinis Avancen zurückweisen"
 GER_Reject_Mussolini_desc:0 "Wir werden die Beziehungen zu den demokratischen Nationen der Welt verbessern. Die Faschisten haben unserem Land nichts zu bieten. Wir sind keine Nation schwacher Sentimentalität – wir müssen unsere alten Freunde zurücklassen, um in diesem neuen Zeitalter zu überleben."
 GER_Secretly_Support_Mussolini:0 "Unterstützen Sie Mussolini heimlich"
 GER_Secretly_Support_Mussolini_desc:0 "Während wir auf bessere Beziehungen zu demokratischen Ländern hoffen, werden wir mit unseren faschistischen Freunden weiterhin eine geheime Kommunikationslinie unterhalten. Wir haben sie nicht im Stich gelassen, wir nehmen die Demokratien lediglich auf eine lustige Reise mit."
 GER_Cede_Territorial_Claims:0 "Unsere Gebietsansprüche abtreten"
 GER_Cede_Territorial_Claims_desc:0 "Aus Respekt vor Mussolini wird der Führer die deutschen Ansprüche auf Österreich aufgeben. Er mag dies als Einladung verstehen, den italienischen Einfluss in der Region auszuweiten, doch dies ist ein notwendiger Preis für die Verfolgung unserer außenpolitischen Agenda."
 GER_Economic_Assistance_To_Italy:0 "Senden Sie Wirtschaftshilfe nach Italien"
 GER_Economic_Assistance_To_Italy_desc:0 "Wir werden Mussolini bei der Entwicklung seines Landes unterstützen. Italien ist völlig unvorbereitet auf einen modernen Krieg. Die Kosten des Äthiopienkriegs haben die italienische Staatskasse um die Mittel für die Modernisierung seiner Streitkräfte gebracht. Unsere Hilfe wird den Ausbau der Waffenbestände und der industriellen Kapazitäten des Landes erheblich fördern."
 GER_Support_Italian_Claims:0 "Unterstützen Sie italienische Ansprüche"
 GER_Support_Italian_Claims_desc:0 "Jugoslawien liegt eindeutig im italienischen Einflussbereich. Der Führer ist von dieser Tatsache überzeugt und wird unsere demokratischen Freunde davon überzeugen, dass sie Italien gestatten sollten, seine Vorherrschaft in der Region formell zu etablieren."
 GER_Make_A_Decision_About_The_Italian_Empire:0 "Seiten wählen"
 GER_Make_A_Decision_About_The_Italian_Empire_desc:0 "Es ist der Moment der Wahrheit. Wir müssen uns entscheiden, ob wir uns Italien anschließen oder unsere Stärke weiter ausbauen und dabei unsere Beziehungen zu den Demokratien nutzen. Schließlich müssen wir uns immer noch um die sowjetische Bedrohung sorgen und können uns eine zweite Front gegen Großbritannien und Frankreich kaum leisten."
 
 
 
 GER_Secret_Rearmament_1:0 "Geheime Wiederbewaffnung I"
 GER_Secret_Rearmament_1_desc:0 "Wir werden uns heimlich wieder aufrüsten. Es ist unerlässlich, dass wir bei der Auftragsvergabe an unsere Rüstungsindustrie zur Produktion verbotener Waffen Diskretion walten lassen."
 GER_Secret_Rearmament_2:0 "Geheime Wiederbewaffnung II"
 GER_Secret_Rearmament_2_desc:0 "Wir werden weiterhin heimlich unsere Rüstungsindustrie ausbauen und falsche Informationen über die Stärke und Aufstellung unserer Streitkräfte verbreiten."
 GER_Secret_Rearmament_3:0 "Geheime Wiederbewaffnung III"
 GER_Secret_Rearmament_3_desc:0 "Im Zuge unserer weiteren Militarisierung werden wir unsere Partner in der Privatwirtschaft dazu ermutigen, die für die Entwicklung und Entwicklung der besten Ausrüstung der Welt notwendigen Produktions- und Entwicklungsanlagen weiter auszubauen."
 GER_Wartime_Production:0 "Todt ist Tot!"
 GER_Wartime_Production_desc:0 "Die Anforderungen an eine Kriegswirtschaft unterscheiden sich deutlich von denen einer Friedenswirtschaft. Dies gilt insbesondere für das Management der Rüstungsindustrie. Fritz Todt war einst kompetent genug, doch angesichts des mit der Dauer des Krieges steigenden Bedarfs an militärischem Material ist er nicht mehr in der Lage, diese Anforderungen zu erfüllen."
 GER_Konto_Five:0 "Konto Five"
 GER_Konto_Five_desc:0 "Wir werden mit der Bestechung der höchsten Offiziere des deutschen Militärs beginnen. Der Staat muss sich auf die Loyalität dieser Männer verlassen können. Sie sind durch Ehre und Reichtum gebunden und dürfen das Reich in Zeiten der Not nicht enttäuschen!"
 GER_Lessons_from_Spain:0 "Lehren aus Spanien"
 GER_Lessons_from_Spain_desc:0 "Wir haben Berater entsandt und uns aktiv am spanischen Konflikt beteiligt. Obwohl dieser Konflikt geopolitisch bedeutsam ist, können unsere Militärexperten aus diesen Erfahrungen viel lernen. Wir dürfen uns diese wichtigen Erkenntnisse über moderne Kriegsführung nicht entgehen lassen!"
 GER_Lessons_From_Spain_tt:0 "Schaltet §YEntscheidungen§! frei und ermöglicht uns die Entwicklung fortgeschrittener §YBf 109§!-Varianten!"
 GER_Expand_Kummersdorf_Testing_Grounds:0 "Ausbau des Testgeländes Kummersdorf"
 GER_Expand_Kummersdorf_Testing_Grounds_desc:0 "Wir werden unser militärisches Testgelände im brandenburgischen Kummersdorf erweitern. Dies ist notwendig, da wir zunehmend mehr Waffensysteme für den Feldeinsatz erproben werden."
 GER_Conventional_Weapons:0 "Konventionelle Waffen I"
 GER_Conventional_Weapons_desc:0 "Der künftige Konflikt wird von einem gigantischen Waffengang zwischen den Weltmächten bestimmt werden. Wenn es uns gelingt, bessere Kleinwaffen, Artilleriegeschütze und eine entsprechende Infrastruktur zu entwickeln, werden wir in jeder Kampfsituation einen enormen Vorteil haben."
 GER_Wunderwaffe:0 "Wunderwaffe I"
 GER_Wunderwaffe_desc:0 "Während sich unsere Ingenieure schon seit einiger Zeit für Raketentechnik interessieren, werden wir den Schwerpunkt auf die Flugzeugentwicklung richten."
 GER_Conventional_Weapons2:0 "Konventionelle Waffen II"
 GER_Conventional_Weapons2_desc:0 "Wir werden uns auf die Entwicklung von Instrumenten für die mobile Kriegsführung konzentrieren, nämlich auf unsere mechanisierten und gepanzerten Fahrzeuge. Die Feinde des Reiches werden unter den Ketten unserer Panzer zermalmt!"
 GER_Conventional_Weapons3:0 "Konventionelle Waffen III"
 GER_Conventional_Weapons3_desc:0 "Damit eine echte mechanisierte Revolution stattfinden kann, müssen wir zunächst in die industrielle Produktion unserer neuen Halbkettenfahrzeuge investieren. Wir werden unsere Produktion auf mechanisierte und gepanzerte Fahrzeuge konzentrieren und die deutsche Wehrmacht an die Spitze bringen."
 GER_Wunderwaffe2:0 "Wunderwaffe II"
 GER_Wunderwaffe2_desc:0 "Wir werden der Raketenforschung deutlich mehr Ressourcen widmen."
 GER_Wunderwaffe3:0 "Wunderwaffe III"
 GER_Wunderwaffe3_desc:0 "Obwohl wir viel Zeit und Ressourcen in die Entwicklung des Konzepts raketengetriebener Flugzeuge investiert haben, haben wir noch nicht einmal begonnen, uns die Waffen vorzustellen, die sie tragen werden. Diese Arbeit muss jetzt beginnen."
 GER_Both3:0 "Konventionelle Wunderwaffe"
 GER_Both3_desc:0 "Wir müssen unsere Feinde nicht nur mit radikal neuen Waffen bombardieren, die unserer Doktrin des technologischen Fortschritts entsprechen. Wir müssen auch bestehende Waffensysteme verbessern, insbesondere unser strategisches Bomberprogramm. Es besteht die Sorge, dass unsere taktischen Bomber strategische Bombenangriffe durchführen müssen, was unsere taktische Bomberflotte gefährden würde."
 GER_Wunderwaffe4:0 "Wunderwaffe IV"
 GER_Wunderwaffe4_desc:0 "Die neuen Turbojet-Flugzeuge sind die Zukunft der Luftfahrt. Der Führer zeigte sich bei einer persönlichen Vorführung der Technologie sehr beeindruckt. Wir werden die vorgeschlagenen Entwürfe für düsengetriebene Kampfflugzeuge genehmigen und zügig in Produktion geben."
 GER_Conventional_Weapons4:0 "Konventionelle Waffen"
 GER_Conventional_Weapons4_desc:0 "Wir werden einen letzten Vorstoß zur Entwicklung der Waffen der Zukunft unternehmen. Unsere Infanterie wird mit neuen Waffen und Taktiken ausgerüstet und unsere Panzerdivisionen werden mit leistungsstarken neuen Maschinen vorrücken."
 GER_Jewish_Restrictions:0 "Jüdische Einschränkungen"
 GER_Jewish_Restrictions_desc:0 "Wir werden bessere Durchsetzungstechniken entwickeln, um sicherzustellen, dass Juden, die gegen unsere Gesetze verstoßen, schnell und angemessen bestraft werden. Wir werden unsere Gesetze außerdem anpassen, um die Beschränkungen für Juden auszuweiten und ihren Umgang mit guten, deutschen Menschen weiter einzuschränken."
 GER_Reward_the_Faithful:0 "Belohnen Sie die Treuen"
 GER_Reward_the_Faithful_desc:0 "Der Führer erkennt an, dass es viele Juden gibt, die überaus produktiv und patriotisch waren und über Generationen hinweg ihr Blut und ihren Schweiß für das Reich gegeben haben. Diesen Juden soll die Chance gegeben werden, vollwertige deutsche Staatsbürger zu werden, da sie bereits so vollständig germanisiert sind, dass sie mittlerweile praktisch Deutsche sind."
 GER_Jewish_Science:0 "Jüdische Wissenschaft"
 GER_Jewish_Science_desc:0 "Wir werden nicht länger nur die „deutsche Wissenschaft“ akzeptieren. Wir werden auch die „jüdische Wissenschaft“ akzeptieren und das freie Denken im Reich fördern, zumindest soweit es die Wissenschaft betrifft. Der Führer wird sich bemühen, deutsche Wissenschaftler zur Rückkehr ins Vaterland zu ermutigen und den jüngsten intellektuellen Einbruch zu beenden, der unser Reich lähmt."
 GER_Not_in_Our_Reich:0 "Nicht in unserem Reich!"
 GER_Not_in_Our_Reich_desc:0 "Wir werden unsere antisemitische Politik verschärfen. Es wird keine Liberalisierung unserer Rassengesetze geben, im Gegenteil. Wir werden unsere jüdische Bevölkerung in ausgewiesene Ghettos sperren und sie zwingen, ihre Rassenzugehörigkeit am Körper anzugeben – natürlich zu ihrer eigenen Sicherheit."
 GER_Forced_Labor:0 "Zwangsarbeit"
 GER_Forced_Labor_desc:0 "Wir werden aus unserer aktuellen Lage Kapital schlagen. Millionen unerwünschter Menschen – vor allem Juden – sitzen ziellos in unserem Land herum. Wenn wir Arbeitslager errichten und sie in die Produktionszentren verfrachten würden, könnten wir sie praktisch zu Zwangsarbeitern machen, bis wir eine bessere Verwendung für sie finden."
 GER_Restore_Soviet_Ties:0 "Wiederherstellung der sowjetischen Beziehungen"
 GER_Restore_Soviet_Ties_desc:0 "Wir werden auf die Sowjetunion zugehen und uns für die Wiederherstellung der Beziehungen einsetzen. Während wir ideologische Gegner sind, planen die sogenannten westlichen „Demokratien“ aktiv die Zerstörung unserer beiden Nationen. Wir sollten zusammenstehen und diese größere Bedrohung bekämpfen."
 GER_German_Soviet_Commercial_Agreement:0 "Deutsch-sowjetisches Handelsabkommen"
 GER_German_Soviet_Commercial_Agreement_desc:0 "Wir werden auf unsere sowjetischen Partner zugehen und einen wirtschaftlichen und militärischen Austausch aufbauen, der beide Nationen stärken soll. Wir erhalten Zugang zu lebenswichtigen Rohstoffen, während die Sowjets Zugang zu deutschen Ingenieuren und modernen Militärkonstruktionen haben."
 GER_Eastern_Ambitions:0 "Östliche Ambitionen"
 GER_Eastern_Ambitions_desc:0 "Nachdem wir der Sowjetunion unsere Position klargemacht haben, können wir nun damit beginnen, Land zurückzufordern, das uns zu Zeiten des Deutschen Reiches rechtmäßig gehörte. Der Westen wird sicherlich schmollen, aber letztlich wird er auf eine ähnlich empörte Reaktion der Sowjetunion warten, bevor er Maßnahmen ergreift – eine Reaktion, die er nicht erhalten wird."
 GER_Form_Axis:0 "Bilden Sie die Achse"
 GER_Form_Axis_desc:0 "Wir werden auf unsere Partner im Dreierpakt zugehen und eine formellere Vereinbarung mit ihnen treffen. Die Japaner würden aufgrund geografischer Einschränkungen eher zögerlich und zurückhaltend reagieren, während die Chinesen eine solche Vereinbarung sicherlich begrüßen würden. Zumindest könnten wir eine offizielle Partnerschaft mit Italien aufbauen und so anderen europäischen Verbündeten den Weg für den Beitritt ebnen."
 GER_Four_Year_Plan:0 "Ein Vierjahresplan"
 GER_Four_Year_Plan_desc:0 "Wir werden einen Plan initiieren, der Deutschland auf den nächsten europäischen Konflikt vorbereitet. Dies erfordert ein Mindestmaß an wirtschaftlicher und militärischer Bereitschaft, das wir erfüllen müssen und das unser Vierjahresplan erreichen wird. Innerhalb von vier Jahren wird das Reich eine unaufhaltsame wirtschaftliche und militärische Macht aufbauen."
 GER_Reichswerke_Hermann_Goering:0 "Reichswerke Hermann Göring"
 GER_Reichswerke_Hermann_Goering_desc:0 "Wir werden die Produktion um ein staatliches Konglomerat herum organisieren: die Reichswerke Hermann Göring. Dadurch wird die Produktion effizienter und leichter zu koordinieren, da die notwendigen militärischen Ressourcen direkt an die Fabriken der Reichswerke geliefert werden können."
 GER_Nibelungenwerk:0 "Nibelungenwerk"
 GER_Nibelungenwerk_desc:0 "Die großen österreichischen Panzerproduktionsanlagen werden zahlreiche Panzer und andere gepanzerte Fahrzeuge für das Reich produzieren. Obwohl sie ihr wahres Potenzial noch nicht ausgeschöpft haben, werden wir investieren, um sicherzustellen, dass sie zu einem späteren Zeitpunkt effizient erweitert werden können."
 GER_Volksgemeinschaft_Welfare:0 "Volksgemeinschaft Wohlfahrt"
 GER_Volksgemeinschaft_Welfare_desc:0 "Wir werden ein Sozialprogramm für Menschen deutscher Abstammung einführen und den Schwachen in unserer Gesellschaft wirtschaftliche Unterstützung und Unterkunft bieten."
 GER_Czechoslovakia_Fate:0 "Zerschlagung der Tschechoslowakei"
 GER_Czechoslovakia_Fate_desc:0 "Es ist Zeit, diesem hässlichen Versailler Abkommen ein Ende zu setzen. Die englisch-französische Kapitulation auf der Münchner Konferenz hat ihre mangelnde Entschlossenheit zur Unterstützung der Souveränität der Tschechoslowakei gezeigt. Wir werden daraus Kapital schlagen und den Tschechen ein Ultimatum stellen: Sie müssen sich friedlich ergeben und unsere Protektorschaft akzeptieren, oder sie werden einen unmittelbar bevorstehenden und verheerenden Angriff der Wehrmacht erleiden."
 GER_Seize_Czech_Military_Industry:0 "Beschlagnahme der tschechischen Militärindustrie"
 GER_Seize_Czech_Military_Industry_desc:0 "Obwohl unsere faktische Annexion der Tschechoslowakei sämtliche Waffenbestände und Staatsgüter umfasste, gingen wir nicht nennenswert gegen die tschechische Privatindustrie vor. Es gibt noch viele unabhängige Unternehmen, die in der Lage sind, Waffen zu produzieren, die aber noch nicht vom Reich beschlagnahmt wurden."
 GER_Keeping_Czech_Equipment_Relevant:0 "Tschechische Ausrüstung relevant halten"
 GER_Keeping_Czech_Equipment_Relevant_desc:0 "Wir werden neue Panzerungsvarianten entwickeln, um alte tschechische Panzerfahrgestelle wiederzuverwenden, damit sie in den Dienst der Wehrmacht gestellt werden können."
 GER_Volksdeutsche:0 "Volksdeutsche"
 GER_Volksdeutsche_desc:0 "Das Reich wird alle Menschen deutschen Blutes zur Rückkehr ins Reich aufrufen. Das Vaterland ist stark und braucht seine lange verlorenen Söhne und Töchter."
 GER_Master_Race:0 "Die Herrenrasse"
 GER_Master_Race_desc:0 "Die germanischen Völker sind die höchste Menschenform, die jemals auf diesem Planeten gelebt hat. Auch wenn Angelsachsen und andere Europäer nicht weit dahinter zu sein scheinen, ist es nur recht und billig, dass wir, das arische Volk, die Erde zum Wohle der Menschheit für die nächsten Jahrtausende erben."
 GER_Untermenschen:0 "Untermenschen"
 GER_Untermenschen_desc:0 "Wir sind keine Befreier, wir sind Eroberer, die die Grenzen unseres Reiches erweitern, um neue Gebiete für die deutsche Kolonisierung einzugliedern. Die einheimische Bevölkerung muss verdrängt und versklavt werden, um eine deutsche Zivilisation zu errichten, die tausend Jahre überdauern wird."
 GER_Liberators:0 "Die Befreiung der Leibeigenen vom Kommunismus"
 GER_Liberators_desc:0 "Unser Einmarsch in die Sowjetunion wurde oft missverstanden. Wir marschieren lediglich ein, um das repressive kommunistische Regime der Sowjetunion zu beenden, das sein eigenes Volk versklavt und es in der Bauernschaft versklavt. Sie sollten sich unserem Vormarsch nicht widersetzen, denn die deutsche Wehrmacht wird sie von ihren Oberherren befreien!"
 GER_Total_Mobilization:0 "Totale Mobilisierung"
 GER_Total_Mobilization_desc:0 "Wir werden uns voll und ganz für den Krieg mobilisieren. Obwohl der Führer schon lange Bedenken hat, Frauen in die Fabriken zu schicken und Männerarbeitsplätze zu besetzen, führt kein Weg daran vorbei. Das Reich muss sich voll und ganz für den Krieg einsetzen, dieses Land ist nicht für Schwächlinge!"
 GER_Japanese_Friendship:0 "Pflegen Sie die Beziehungen zu Japan"
 GER_Japanese_Friendship_desc:0 "Wir werden Japan als drittes Mitglied in unser Bündnis aufnehmen. Wir haben nach einem östlichen Verbündeten gegen den westlichen Imperialismus und den Sowjetkommunismus gesucht. Chinas Aussichten wurden durch die japanische Invasion stark beeinträchtigt, und der Führer ist ungeduldig. Japan ist jetzt stark, und wir werden es wählen."
 
 
 
 
 
 
 GER_Expand_Organization_Todt:0 "Organisation erweitern Todt"
 GER_Expand_Organization_Todt_desc:0 ""
 GER_Tech_Tree_Slot_2:0 "Reorganisation des Reichsforschungsrats"
 GER_Tech_Tree_Slot_2_desc:0 "Jahrelange Ineffizienz hat unseren Führer dazu bewogen, den Reichsforschungsrat neu zu organisieren und ihn dem Reichsministerium für Rüstung und Produktion zu unterstellen. Wissenschaftliche und technische Forschung wird nun im Reich einen hohen Stellenwert genießen."
 #GER_Fifth_Column:0 "A Fifth Column"
 #GER_Fifth_Column_desc:0 ""
 GER_East_Asian_Partner:0 "Ostasiatischer Partner"
 GER_East_Asian_Partner_desc:0 "Nachdem wir nun einen Verbündeten im Osten als Gegengewicht zum mächtigen Riesen Sowjetunion gewonnen haben, sind wir endlich bereit, unsere Fraktion zu versammeln und die Hunde des Krieges loszulassen."
 GER_Woo_Hungary:0 "Woo Ungarn"
 GER_Woo_Hungary_desc:0 "" 
 GER_Hungarian_Relations_I:0 "Ungarische Beziehungen I"
