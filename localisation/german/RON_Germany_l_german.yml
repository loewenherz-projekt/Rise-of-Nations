 ### GER - from 536/537/538 if ENG accepts
 # QUESTION of Africa
 umc_ger.550.t:0 "Haager Konferenz – Schicksal Afrikas und des Nahen Ostens"
 umc_ger.550.d:0 "Da die Briten unseren wichtigsten Friedensbedingungen zugestimmt haben, bleiben noch einige Fragen offen. Die wichtigste davon ist die Frage der britischen Gebiete in Afrika und dem Nahen Osten.\n\nUnsere Möglichkeiten sind hier unbegrenzt. Wir können sogar so kühn sein, alle britischen Kolonien zu fordern und die Briten vollständig aus dem Mittelmeerraum, Afrika und dem Nahen Osten zu verdrängen. Und obwohl die dortigen Gebiete industriell nicht gerade wertvoll sind, bergen sie doch viele natürliche Ressourcen und schließlich auch Lebensraum. Wir müssen auch die Wünsche unserer Verbündeten im Auge behalten, denn sie könnten bald unsere nächsten Feinde werden, sollten sie bei dieser Gebietsregelung außen vor bleiben."
 umc_ger.550.a:0 "Der Preis sind Ägypten, Westafrika und Besitzungen im Mittelmeerraum."
 umc_ger.550.b:0 "Ganz Afrika sowie alle Besitzungen im Mittelmeerraum müssen uns übergeben werden."
 umc_ger.550.c:0 "Alle Länder in Afrika und im Nahen Osten. Nichts weniger."
 umc_ger.550_EXPL:0 "Sollten die Verhandlungen erfolgreich sein, überträgt [ENG.GetFlag]§H[ENG.GetName]§! uns folgendes §HTerritory§!:"
 umc_ger.550.e:0 "Hören wir, was unsere italienischen Verbündeten dazu zu sagen haben."
 
 # QUESTION of ENG overseas holdings
 umc_ger.551.t:0 "Die Haager Konferenz – Britische Überseebesitzungen"
 umc_ger.551.d:0 ""
 umc_ger.551.a:0 "Das Britische Empire existiert nicht mehr. Alles muss unter unsere direkte Kontrolle fallen."
 umc_ger.551_EXPL:0 "Sollten die Verhandlungen erfolgreich sein, wird [ENG.GetFlag]§H[ENG.GetName]§! ihr gesamtes §HTerritory§! in §HAmerica§!, §HAsia§! und §HAustralia§! übertragen."
 umc_ger.551.b:0 "Die Briten können dieses Gebiet weiterhin verwalten. Vorerst …"
 
 # QUESTION of Stockpile, Air
 umc_ger.552.t:0 "Die Haager Konferenz – Frage der britischen Waffenlagerbestände"
 umc_ger.552.d:0 ""
 umc_ger.552.a:0 "Wir werden nur ein Viertel ihrer Vorräte und Ausrüstung verlangen."
 umc_ger.552.a_EXPL:0 "Sollten die Verhandlungen erfolgreich sein, wird [ENG.GetFlag]§H[ENG.GetName]§! etwa §H25 %§! ihrer Vorräte und §H25 %§! ihrer aktiven Luftstreitkräfte an uns übertragen."
 umc_ger.552.b:0 "Zur Deckung unserer Kosten muss die Hälfte ihrer Vorräte und Flugzeuge an uns übergeben werden."
 umc_ger.552.b_EXPL:0 "Sollten die Verhandlungen erfolgreich sein, wird [ENG.GetFlag]§H[ENG.GetName]§! etwa §H50%§! ihrer Vorräte und §H50%§! ihrer aktiven Luftstreitkräfte an uns übertragen."
 umc_ger.552.c:0 "Etwa drei Viertel ihrer Feld- und Luftstreitkräfte müssen abgegeben werden."
 umc_ger.552.c_EXPL:0 "Sollten die Verhandlungen erfolgreich sein, wird [ENG.GetFlag]§H[ENG.GetName]§! etwa §H75 %§! ihrer Vorräte und §H75 %§! ihrer aktiven Luftstreitkräfte an uns übertragen."
 umc_ger.552.e:0 "Sie müssen den Großteil ihrer Vorräte sowie ihre gesamte Luftwaffe abgeben."
 umc_ger.552.e_EXPL:0 "Sollten die Verhandlungen erfolgreich sein, wird [ENG.GetFlag]§H[ENG.GetName]§! etwa §H75 %§! ihrer Vorräte und §H100 %§! ihrer aktiven Luftstreitkräfte an uns übertragen."
 
 # QUESTION of Navy
 umc_ger.553.t:0 "Die Haager Konferenz – Frage der britischen Marine"
 umc_ger.553.d:0 ""
 umc_ger.553.a:0 "Wir werden nur einen kleinen Teil ihrer Schiffe verlangen, um unsere ultimative Überlegenheit zu demonstrieren."
 umc_ger.553.a_EXPL:0 "Sollten die Verhandlungen erfolgreich sein, wird [ENG.GetFlag]§H[ENG.GetName]§! etwa §H25 %§! ihrer Schiffe an uns übertragen."
 umc_ger.553.b:0 "Die Hälfte ihrer Schiffe muss an die Kriegsmarine übergeben werden, um unsere Verluste auszugleichen."
 umc_ger.553.b_EXPL:0 "Sollten die Verhandlungen erfolgreich sein, wird [ENG.GetFlag]§H[ENG.GetName]§! etwa §H50%§! ihrer Schiffe an uns übertragen."
 umc_ger.553.c:0 "Wir werden ihnen gerade genug Schiffe überlassen, damit sie ihre Küste schützen können."
 umc_ger.553.c_EXPL:0 "Sollten die Verhandlungen erfolgreich sein, wird [ENG.GetFlag]§H[ENG.GetName]§! etwa §H75 %§! ihrer Schiffe an uns übertragen."
 umc_ger.553.e:0 "Die britische Royal Navy soll aufgelöst und ihre Überreste in die Kriegsmarine integriert werden."
 umc_ger.553.e_EXPL:0 "Sollten die Verhandlungen erfolgreich sein, wird [ENG.GetFlag]§H[ENG.GetName]§! §H100%§! ihrer Schiffe an uns übertragen."
 
 # ENG - final decision
 umc_ger.554.t:0 "Die Haager Konferenz – Endgültiges Abkommen"
 umc_ger.554.d:0 ""
 umc_ger.554.a:0 "Als ob wir jetzt die Möglichkeit hätten, einen Rückzieher zu machen ..."
 umc_ger.554.b:0 "Beim zweiten jedoch ..."
 
 umc_ger.555.t:0 "Die Haager Konferenz – [ENG.GetName] lehnt unsere letzten Forderungen ab"
