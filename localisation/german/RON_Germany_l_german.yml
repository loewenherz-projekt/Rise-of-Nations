 umc_ger.230.t:0 "Ribbentrop-Ōshima-Pakt"
 umc_ger.230.d:0 "Nach der deutschen Kriegserklärung an [SOV.GetName] wurde unser Botschafter in Berlin, Hiroshi Ōshima, von seinem deutschen Amtskollegen Joachim von Ribbentrop kontaktiert, um die japanische Rolle im antisowjetischen Krieg und die endgültige Aufteilung der ehemaligen russischen Gebiete und Asiens als Ganzes zu besprechen.\n\nWährend die Wehrmacht in Richtung Ural vorrückt, wird klar, dass der russische Koloss nicht so leicht zu bezwingen sein wird. Obwohl der Krieg ohne offizielle Absprache mit unserer Regierung ausbrach, fordert von Ribbentrop unsere Regierung nun auf, sich dem Krieg anzuschließen und den Feind im Osten anzugreifen – in der Äußeren Mandschurei und Sibirien. Er erklärte offiziell: „Nie wieder würde Japan eine solche Gelegenheit haben wie derzeit, den russischen Koloss in Ostasien ein für alle Mal zu eliminieren.“\n\nMit dieser Forderung geht auch ein Abkommen über die Aufteilung Asiens entlang des 70. Längengrades Ost einher, sollten wir den Angriff auf [SOV.GetName] zulassen.\n\nWir stehen vor einer schwierigen Entscheidung: Der Einsatz von Truppen im Kampf gegen unseren nördlichen Feind könnte unsere anderen Fronten schwächen. Vielleicht wäre es besser, beide Fronten austrocknen zu lassen und dann einfach zu nehmen, was übrig bleibt."
 umc_ger.230.a:0 "Akzeptieren Sie das Abkommen nur, wenn Deutschland umfangreiche Ausrüstungsunterstützung leistet."
 umc_ger.230.b:0 "Akzeptieren Sie das Abkommen nur, wenn Deutschland zumindest eine gewisse Ausrüstungsunterstützung leistet."
 umc_ger.230.c:0 "Worauf warten wir? Tennō Heika Banzai!"
 umc_ger.230.e:0 "Wie das geht, haben wir bereits am Chalchin Gol herausgefunden."
 GER_rop_demand_ten_EXPL:0 "Wir werden [GER.GetFlag]§H[GER.GetName]§! um mindestens (§H10§!) Lieferungen von Ausrüstungsunterstützung bitten.\n"
