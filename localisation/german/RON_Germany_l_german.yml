 # From 502 B - only GER makes demands
 umc_ger.503.t:0 "Diskussion über die Friedensbedingungen"
 umc_ger.503.d:0 ""
 umc_ger.503.a:0 "Der Preis sind Ägypten, Westafrika und Besitzungen im Mittelmeerraum."
 umc_ger.503.b:0 "Ganz Afrika sowie alle Besitzungen im Mittelmeerraum müssen uns übergeben werden."
