 # CZE surrenders Sudetenland even with Support
 umc_ger.388.t:0 "[CZE.GetName] übergibt das Sudetenland"
 umc_ger.388.d:0 ""
 umc_ger.388.a:0 "Wir waren bereit, ihnen zu helfen."
 
 umc_ger.390.t:0 "Das Münchner Diktat"
 umc_ger.390.d:0 "Angesichts der wachsenden Spannungen im Sudetenland lud [GER.GetLeader] die Ministerpräsidenten führender europäischer Länder nach München ein, um das weitere Vorgehen in dieser Angelegenheit zu besprechen. Obwohl unsere Botschafter Hubert Masařík und Vojtěch Mastný in München anwesend waren, wurden sie nicht zur Konferenz eingeladen, und wir informierten sie erst nach Abschluss über das Ergebnis.\n\nDie auf der Konferenz getroffenen Entscheidungen sind verheerend. Wir müssen alle Gebiete mit lebender deutscher Mehrheit an [GER.GetName] abtreten. Darüber hinaus teilten uns [ENG.GetName] und [FRA.GetName] mit, dass wir Nazi-Deutschland entweder allein Widerstand leisten oder uns den vorgeschriebenen Annexionen unterwerfen könnten.\n\n„Der Frieden für unsere Zeit“ nennen sie das. Daran glaubt hier zu Hause niemand. Sobald die Bevölkerung vom Ergebnis der Münchner Konferenz erfuhr, begann sie mit dem „Mnichovský diktát“, „Mnichovská zrada“ oder „O nás bez nás!“. In Prag sammeln sich bereits Proteste gegen die deutsche Aggression, und unser Land ist bereit, standhaft zu bleiben und seine Grenzen zu verteidigen. Die Mobilmachung hat bereits begonnen – unsere Armee ist gut ausgebildet und ausgerüstet, und wir verfügen über eine der besten Grenzverteidigungen der Welt."
 umc_ger.390.a:0 "Ohne unsere „Verbündeten“ würden wir überrannt werden."
 umc_ger.390.b:0 "Wir werden niemals aufgeben!"
 
 umc_ger.391.t:0 "Das Münchner Abkommen"
 umc_ger.391.d:0 "Nach langwierigen Verhandlungen gaben Vertreter von [ENG.GetName] und [FRA.GetName] schließlich nach und akzeptierten unsere Forderungen bezüglich des Sudetenlandes. Die Ergebnisse wurden anschließend den tschechischen Botschaftern Hubert Masařík und Vojtěch Mastný vorgelegt. Die tschechoslowakische Regierung erkannte die Aussichtslosigkeit, uns allein gegenüberzutreten, kapitulierte widerwillig und erklärte sich bereit, die Vereinbarung einzuhalten.\n\nDamit wird uns die vollständige Kontrolle über das gesamte Sudetenland gewährt. Dieses Gebiet ist nicht nur ein politischer und nationaler Sieg, sondern auch ein wirtschaftlicher, da das Sudetenland 70 % der tschechoslowakischen Eisen- und Stahlindustrie, 70 % der Stromversorgung und sämtlicher Grenzverteidigungsanlagen beherbergt. Diese können weiter genutzt werden, da sie über moderne Waffen und Ausrüstung sowie hochwertigen Stahl verfügen.\n\nObwohl die Verhandlungen erfolgreich waren, erklärte der kriegslüsterne [GER.GetLeader] kurz nach dem Treffen mit Chamberlain: „Meine Herren, dies war meine erste internationale Konferenz und ich kann Ihnen versichern, dass es meine letzte sein wird.“ Bei einer anderen Gelegenheit hatte man ihn über Chamberlain sagen hören: „Wenn dieser dumme alte Mann hier noch einmal mit seinem Regenschirm auftaucht, trete ich ihn die Treppe hinunter und springe ihm vor den Fotografen auf den Bauch.“ Ein wahres Beispiel für die Geistesschwäche unserer Feinde, und unser Führer sorgte dafür, dass dieses Wissen noch weiter verbreitet wurde.\n\nDennoch feiern die Sudetendeutschen die sogenannte Befreiung, und diese Einigung hat unser Land noch weiter emporgehoben."
 umc_ger.391.a:0 "Die Sudetendeutschen sind jetzt in unserem Reich sicher."

 umc_ger.392.t:0 "Das Münchner Abkommen – Tschechien bleibt trotzig"
 umc_ger.392.d:0 ""
 umc_ger.392.a:0 "Endlich kann unsere Wehrmacht auf die Probe gestellt werden."
 
 umc_ger.393.t:0 "Das Münchner Abkommen"
 umc_ger.393.d:0 ""
 umc_ger.393.a:0 "Diesmal waren die Tschechen vernünftig."
 
 # ANNOUNCEMENTS for other nations what CZE are doing
 # ENG
 umc_ger.395.t:0 "Das Münchner Abkommen ist erfolgreich"
 umc_ger.395.d:0 "Nach langwierigen Verhandlungen gab die tschechische Regierung schließlich nach und stimmte der Übergabe des Sudetenlandes an Deutschland zu. Dies markiert einen großen Erfolg der Münchner Konferenz, mit der ein drohender Krieg erfolgreich abgewendet werden konnte.\n\nBei seiner Rückkehr auf die Britischen Inseln wurde Premierminister [ENG.GetLeader] von einer Menge von mindestens 5.000 Menschen begrüßt. Ihnen sagte er: „Die nun erzielte Lösung des tschechoslowakischen Problems ist meiner Ansicht nach nur der Auftakt zu einer größeren Lösung, in der ganz Europa Frieden finden kann. Heute Morgen hatte ich ein weiteres Gespräch mit dem deutschen Reichskanzler, Herrn Hitler, und hier ist das Papier, das sowohl seinen als auch meinen Namen trägt. Einige von Ihnen haben vielleicht schon gehört, was darin steht, aber ich möchte es Ihnen gerne vorlesen: „Wir betrachten das gestern Abend unterzeichnete Abkommen und das deutsch-britische Flottenabkommen als Symbol für den Wunsch unserer beiden Völker, nie wieder gegeneinander Krieg zu führen.“\n\nChamberlains Rückkehr stieß jedoch nicht überall auf positive Resonanz. 15.000 Menschen protestierten am selben Tag auf dem Trafalgar Square gegen das Münchner Abkommen – dreimal mehr als in der Downing Street 10. Labour-Sprecher Hugh Dalton behauptete öffentlich, das Stück Papier, mit dem Chamberlain wedelte, sei „aus Mein Kampf gerissen“. Aufgrund Chamberlains anhaltender Manipulation der BBC wurden diese Nachrichten jedoch weitgehend unterdrückt. Nun können wir nur hoffen, dass sich dieses Zugeständnis gelohnt hat und unsere jungen Leute nicht bis Ende des Jahres in den Schützengräben Europas sterben müssen."
 umc_ger.395.a:0 "Ein Frieden für unsere Zeit."
 
 # FRA and OTHERS
