##nazi exile

NAZ_the_hitler_question:0 "Die Hitler-Frage"
NAZ_the_hitler_question_desc:0 "Obwohl Hitler in Schlüsselbereichen unseres Landes die Kontrolle hat, ist es vielleicht das Beste, ihn vorerst im Hintergrund zu halten. Sollte eine alliierte Regierung uns finden, könnte sie Hitler vor Gericht stellen und unser Land zerstören wollen."
NAZ_ministry_of_peace:0 "Ministerium für Frieden"
NAZ_ministry_of_peace_desc:0 "Wir mögen klein sein, aber wenn wir in der Lage sind, mit [ARG.GetName] neu zu verhandeln, könnten wir möglicherweise mehr Einfluss gewinnen und schließlich ihr ganzes Land übernehmen."
NAZ_ministry_of_truth:0 "Ministerium für Wahrheit"
NAZ_ministry_of_truth_desc:0 "Wir müssen daran arbeiten, unsere Ideologie zu verbreiten und den Autoritarismus in der ganzen Welt am Leben zu erhalten! Wir werden daran arbeiten, eine bessere Union zu schaffen"
NAZ_the_fallen_eagle:0 "Der gefallene Adler"
NAZ_the_fallen_eagle_desc:0 "Unser Imperium liegt in Trümmern. Alles, was in unserem Land übrig ist, sind [GER.GetLeader] und sein Oberkommando. Wir müssen uns überlegen, wie wir weiter vorgehen."
NAZ_one_china_policy:0 "Ein-China-Politik"
NAZ_one_china_policy_desc:0 "Wir müssen die Nationalisten in China um jeden Preis unterstützen! Wir werden daran arbeiten, die kommunistische Bedrohung zu infiltrieren und [PRC.GetLeader] ein Ende zu setzen."
NAZ_our_last_hope:0 "Unsere letzte Hoffnung"
NAZ_our_last_hope_desc:0 "Da Europa verloren ist, müssen wir uns an [JAP.GetName] klammern, in der Hoffnung, dass sie uns unterstützen können! Wir werden mit den Führern von [JAP.GetAdjective] zusammenarbeiten, um uns ihren sogenannten [JAP.GetFactionName] anzuschließen."
NAZ_the_true_leader:0 "Der wahre Anführer"
NAZ_the_true_leader_desc:0 "Obwohl er mit uns und unseren Interessen in Konflikt geraten ist, haben wir keine andere Wahl. Wir müssen ihm helfen, in China an Einfluss zu gewinnen und den Bürgerkrieg zu gewinnen!"
NAZ_the_tyrant:0 "Der Tyrann"
NAZ_the_tyrant_desc:0 "[PRC.GetLeader], der Tyrann Chinas versucht, es wieder zu vereinen. Wir müssen daran arbeiten, seine Fortschritte zu behindern, während er seinen Angriff auf China vorbereitet"
NAZ_the_crumbling_empire:0 "Das zerfallende Imperium"
NAZ_the_crumbling_empire_desc:0 "Obwohl wir im Krieg zerstört wurden, zeigen sich Risse in der [ENG.GetName]-Bewegung. Wir werden dies ausnutzen und ihre Macht auf der Weltbühne untergraben."
NAZ_european_subversion:0 "Europäische Subversion"
NAZ_european_subversion_desc:0 "Wir werden daran arbeiten, die europäischen Angelegenheiten zu untergraben und Deutschland zurückzuerobern, wenn wir die Chance dazu bekommen."
NAZ_the_soviet_threat:0 "Die sowjetische Bedrohung"
NAZ_the_soviet_threat_desc:0 "Allem Anschein nach wollen die Sowjets in die Mandschurei und den Rest von [JAP.GetName] einmarschieren. Wir müssen Schritte unternehmen und mit den [JAP.GetAdjective] zusammenarbeiten, um dies zu verhindern!"


##win axis question

BP_germany.920.t:0 "Auflösung der Achse"
BP_germany.920.d:0 "Mit dem Sieg über die Alliierten und dem Ende des Krieges besteht für die Achsenmächte kein Bedarf mehr. Wir werden die Achsenmächte auflösen, würden jedoch viel lieber selbst entscheiden, was mit den ehemaligen Mitgliedern der Achsenmächte geschehen soll."
BP_germany.920.a:0 "Wir werden unsere europäischen Verbündeten schützen."
BP_germany.920.b:0 "Wir werden nur das germanische Volk schützen."
BP_germany.920.c:0 "Wir werden niemandem Schutz bieten! Deutschland steht allein."
BP_germany.921.t:0 "Massendemobilisierung auf der ganzen Welt"
BP_germany.921.d:0 "Mit dem Sieg über die Alliierten und dem Ende des Krieges begannen ganz Europa und Amerika mit der Demobilisierung, und die Angriffsallianzen begannen sich aufzulösen. Angesichts der veränderten Weltlage kann nur die Zukunft zeigen, was als Nächstes passiert …"
BP_germany.921.a:0 "Die neue Ordnung ist entstanden"
BP_germany.922.t:0 "Tokio-Washington-Vertrag"
BP_germany.922.d:0 "Angesichts der Spannungen in Europa, die ihren Höhepunkt erreicht haben und der deutschen Einnahme Moskaus und der japanischen Einnahme Hawaiis haben die Vereinigten Staaten einer Kapitulation vor den Japanern zugestimmt. Die Vereinigten Staaten werden sich darauf konzentrieren, Deutschland zur Kapitulation zu zwingen und gleichzeitig ihren Einfluss im Ostpazifik aufzugeben …"
BP_germany.922.a:0 "Die neue Ordnung ist entstanden"
NAZ__adolf_hitler:0 "[GER.GetLeader] "
