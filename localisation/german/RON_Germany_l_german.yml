 GER_rop_send_anti_tank_dec:0 "Unterstützen Sie sie mit Panzerabwehrartillerie"
 GER_rop_send_anti_tank_dec_desc:0 "Obwohl die stärksten sowjetischen Einheiten versuchen, unseren Vormarsch im Westen aufzuhalten, verfügen ihre Divisionen im Fernen Osten immer noch über eine beachtliche Anzahl an Panzern."
