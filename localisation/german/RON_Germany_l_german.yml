 GER_rop_send_generals_dec:0 "Senden Sie einen Militärattaché mit Panzererfahrung"
 GER_rop_send_generals_dec_desc:0 "Wenn wir den Japanern gute Panzer zur Verfügung stellen, können wir ihnen auch gleich ein paar fähige Generäle zu ihrer Führung zur Verfügung stellen, selbst wenn das bedeutet, dass wir unser eigenes Kommando schwächen."
