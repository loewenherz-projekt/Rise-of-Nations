# Events
 dnc_germany.1:0 "Friedensvorschlag"
 dnc_germany.1.d:0 "Der deutsche Botschafter unterbreitete ein Friedensangebot der deutschen Regierung. Nach ihrem Vormarsch in unsere Gebiete wollen uns die Deutschen nun ihr unrühmliches Friedensangebot aufzwingen. Unsere Nation blutet, doch die Annahme eines solchen Friedensangebots würde uns in der Weltpolitik ins Abseits drängen."

 dnc_germany.2.t:0 "Deutsche Kolonialinvasion!"
 dnc_germany.2.d:0 "Es scheint, dass Deutschland eine Offensive gegen unsere Kolonien gestartet hat. Dieser Akt ist ein Dolchstoß, da keine Kriegserklärung erfolgte. Wir sollten dies nicht unbemerkt lassen. Was wird Deutschland in Zukunft vorhaben?"

 dnc_germany.3.t:0 "Kongo-Ultimatum"
 dnc_germany.3.d:0 "Unser starker Nachbar Deutschland hat uns ein Ultimatum bezüglich der kongolesischen Gebiete gestellt. Sie wollen, dass wir dieses Gebiet im Austausch für ihren Schutz abtreten. Wie sie auf unsere Antwort reagieren werden, ist noch unklar."

 dnc_germany.4.t:0 "Kongo-Kauf"
 dnc_germany.4.d:0 "Unser starker Nachbar Deutschland schickte uns eine Anfrage. Sie schlugen vor, die kongolesischen Ländereien zu kaufen"
 
 dnc_germany.5.t:0 "Belgien hat unser Angebot angenommen"
 dnc_germany.5.d:0 "Die belgische Regierung hat unserem Angebot zum Kauf der kongolesischen Ländereien zugestimmt, es scheint, als ob sie es nicht mehr brauchen."
 dnc_germany.6.t:0 "Kauf abgelehnt"
 dnc_germany.6.d:0 "Die belgische Regierung antwortete auf unsere Anfrage zum Kauf kongolesischer Ländereien. Sie nahm das Angebot nicht an und möchte diese Gebiete behalten."

 dnc_germany.7.t:0 "Koloniales Ultimatum"
 dnc_germany.7.d:0 "Die Deutschen haben uns ein Ultimatum bezüglich unserer Gebiete in Afrika gestellt. Sie wollen, dass wir diese Gebiete im Austausch für ihren Schutz abtreten. Wie sie auf unsere Antwort reagieren werden, ist noch nicht bekannt."
 dnc_germany.8.t:0 "Ultimatum abgelehnt"
 dnc_germany.8.d:0 "Portugal lehnte unser Ultimatum ab und beschloss, die diplomatischen Beziehungen abzubrechen. Das ist ein Akt der Feindseligkeit! Wir müssen handeln, um unsere Stellung als Weltmacht zu behaupten!"
 dnc_germany.9.t:0 "Kolonialer Kauf"
 dnc_germany.9.d:0 "Deutschland hat uns einen Vorschlag unterbreitet, unsere afrikanischen Kolonien zu kaufen."
 dnc_germany.10.t:0 "Kauf abgeschlossen"
 dnc_germany.10.d:0 "Die portugiesische Regierung hat unserem Angebot zum Kauf ihres afrikanischen Landes zugestimmt, es scheint, als ob sie es nicht mehr braucht."
 
 dnc_germany.11.t:0 "Kauf abgelehnt"
 dnc_germany.11.d:0 "Die [POR.GetAdjective]-Regierung antwortete auf unsere Anfrage zum Kauf kongolesischer Ländereien. Sie nahm das Angebot nicht an und möchte diese Gebiete behalten."
 
 dnc_germany.12.t:0 "Norditalienisches Ultimatum"
 dnc_germany.12.d:0 "Die Deutschen haben unserer Regierung ein Ultimatum gestellt. Sie fordern uns auf, norditalienische Gebiete abzutreten, die sie als Teil Deutschlands beanspruchen und nicht bereit sind, die Bedingungen weiter zu diskutieren."
 
 dnc_germany.13.t:0 "Ultimatum abgelehnt"
 dnc_germany.13.d:0 "Die italienische Regierung lehnte unser Ultimatum bezüglich der norditalienischen Gebiete ab und brach daraufhin alle diplomatischen Beziehungen zu unserer Regierung ab."
 dnc_germany.17.t:0 "Deutsches Ultimatum"
 dnc_germany.17.d:0 "Unser mächtiger Nachbar Deutschland hat unserem Botschafter ein Ultimatum gestellt. Dieses Ultimatum folgt expansionistischen Visionen in Europa. Als Erbe von 1870 fordern sie noch mehr französisches Land. Diese unerhörte Forderung darf nicht zurückgewiesen werden!"

 dnc_germany.18.t:0 "Ultimatum abgelehnt"
 dnc_germany.18.d:0 "Die französische Regierung erkannte unsere Rechte an einigen französischen Ländern nicht an, offenbar lernten sie nicht viel aus dem Krieg von 1870. Nichts kann den Willen der Deutschen aufhalten"
 dnc_germany.19.t:0 "Ostfrankreich für Garantien"
 dnc_germany.19.d:0 "Die Deutschen haben sich mit einer unheiligen Bitte an unseren Botschafter in Berlin gewandt. Sie verlangen den östlichen Teil unseres Staatsgebiets im Austausch für ihren Schutz und ihre Unterstützung in zukünftigen Kriegen. Was sollen wir tun?"

 dnc_germany.20.t:0 "[FROM.GetName] akzeptiert"
 dnc_germany.20.d:0 "Es scheint, als hätte [FROM.GetAdjective] unsere Anfrage angenommen. Ihr Botschafter in [ROOT.Capital.GetName] hat unsere Regierung kontaktiert und eine positive Antwort auf unsere Forderungen gegeben."
 
 dnc_germany.21.t:0 "[FROM.GetName] abgelehnt"
 dnc_germany.21.d:0 "Es scheint, als hätte [FROM.GetAdjective] unsere Anfrage abgelehnt. Ihr Botschafter in [ROOT.Capital.GetName] kontaktierte unsere Regierung und antwortete negativ auf unsere Forderungen."
 
 dnc_germany.22.t:0 "Norditalien für Garantien"
 dnc_germany.22.d:0 "Die Deutschen haben sich mit einer unheiligen Bitte an unseren Botschafter in Berlin gewandt. Sie verlangen den nördlichen Teil unseres Staatsgebiets im Austausch für ihren Schutz und ihre Unterstützung in zukünftigen Kriegen. Was sollen wir tun?"

 dnc_germany.23.t:0 "Kolonien für Garantien"
 dnc_germany.23.d:0 "Die Deutschen haben sich mit einer unheiligen Forderung an unseren Botschafter in Berlin gewandt. Sie verlangen den Abzug ihrer Truppen aus unseren Kolonien und die Übertragung des Besitzes zwischen ihnen und uns. Sie versprechen Schutz und Unterstützung in zukünftigen Kriegen und geben die Kolonien auf. Was sollen wir tun?"

  
 dnc_germany.24.t:0 "[FROM.GetName] schlägt eine Zollunion vor"
 dnc_germany.24.d:0 "Es ist kein Geheimnis, dass unsere beiden deutschen Nationen eng befreundet sind. Vor diesem Hintergrund hat [FROM.GetName] uns die Gründung einer gemeinsamen österreichisch-deutschen Zollunion vorgeschlagen. Dies würde den Handel fördern und den Waren-, Personen- und Viehverkehr verbessern. [FROM.GetName] ist ein ressourcenreiches Land, und eine Zollunion wäre für beide Nationen von Vorteil. Wir sichern uns die Unterstützung von [FROM.GetName] für zukünftige Vorhaben zu."
 dnc_germany.241.t:0 "[FROM.GetName] Akzeptiert Zollunion"
 dnc_germany.241.d:0 "Es ist kein Geheimnis, dass unsere beiden deutschen Nationen eng befreundet sind. Vor diesem Hintergrund hat [FROM.GetName] uns die Gründung einer gemeinsamen österreichisch-deutschen Zollunion vorgeschlagen. Dies würde den Handel fördern und den Waren-, Personen- und Viehverkehr verbessern. [FROM.GetName] ist ein ressourcenreiches Land, und eine Zollunion wäre für beide Nationen von Vorteil. Wir sichern uns die Unterstützung von [FROM.GetName] für zukünftige Vorhaben zu."
 dnc_germany.25.t:0 "[FROM.GetName] lehnt Zollunion ab"
 dnc_germany.25.d:0 "Eine Nachricht von [From.Capital.GetName] mit der Antwort von [FROM.GetName] ist gerade eingetroffen: Sie haben sich entschieden, unseren Vorschlag für eine Zollunion abzulehnen."
 dnc_germany.26.t:0 "Die [AUH.GetName] akzeptiert Angebot für eine Zollunion"
 dnc_germany.26.d:0 "Eine Nachricht von [From.Capital.GetName] mit der Antwort von [FROM.GetName] ist gerade eingetroffen: Sie haben sich entschieden, unseren Vorschlag für eine Zollunion anzunehmen und so die Beziehungen zwischen unseren beiden Nationen weiter zu festigen."
 dnc_germany_news.1.t:0 "Gründung des österreichisch-deutschen Zollvereins"
 dnc_germany_news.1.d:0 "Es ist kein Geheimnis, dass [AUH.GetName] und [GER.GetName] enge Beziehungen pflegen. Um diese Beziehungen zu stärken, haben die beiden Nachbarstaaten die Gründung einer Zollunion beschlossen, um den Personen- und Warenverkehr zu fördern. Dies ist ein Beispiel für die enge Zusammenarbeit zwischen den beiden Nationen und ein Grundstein für viele weitere."
 
 dnc_germany.27.t:0 "Österreichische Auflösung"
 dnc_germany.27.d:0 "Nach dem langsamen Abstieg in den Abgrund erwies sich das österreichische Kaiserreich als unfähig, unserer Invasion Widerstand zu leisten. Verschiedene ethnische Gruppen forderten die Unabhängigkeit ihres gesamten Landes. Diese Invasion ist der letzte Nagel im Sarg. Als deutsche Truppen durch Wien marschierten, erklärten sich viele Provinzen zu Freistaaten und weigerten sich, für das ehemalige [AUH.GetName] zu kämpfen."
 dnc_germany.27.a:0 "Es musste explodieren"
 dnc_germany.27.c:0 "Aufteilung in Königreiche"
 dnc_germany.27.e:0 "Trennung Böhmens von Österreich"
 dnc_germany.27.f:0 "Behalten Sie die österreichischen Kronländer"

 dnc_germany.28.t:0 "Die deutschen Wahlen"
 dnc_germany.28.d:0 "Nach Jahren des Kampfes des deutschen Volkes haben wir endlich die Demokratie erreicht. Jeder Mann und jede Frau hat die Rechte erlangt, die ihnen zustehen. Dies ist ein wahrhaft bedeutsamer Tag, denn er markiert einen Wendepunkt in der deutschen Geschichte, an dem das deutsche Volk den Übergang von der Monarchie zur Demokratie vollzog. Mit diesem Tag hat sich Europa für immer verändert."
 dnc_germany.28.a:0 "Für die Menschen!"

 dnc_germany_news.2.t:0 "Deutschland wird demokratisch"
 dnc_germany_news.2.d:0 "Nach Jahren des Kampfes hat das deutsche Volk endlich die Demokratie erreicht. Jeder Mann und jede Frau hat die Rechte erhalten, die ihnen zustehen. Dies ist ein wahrhaft bedeutsamer Tag, denn er markiert einen Wendepunkt in der deutschen Geschichte, an dem das deutsche Volk von der Monarchie zur Demokratie überging. Der neue Name für Deutschland ist [GER.GetName]. Mit diesem Tag hat sich Europa für immer verändert."
 dnc_germany_news.2.a:0 "OK" 
 
 dnc_germany.29.t:0 "Nationalismus-Feuer ist erfolgreich"
 dnc_germany.29.d:0 "Unser Versuch, das Feuer des Nationalismus zu entfachen, war erfolgreich. [FROM.GetName] hat eine katastrophale diplomatische Niederlage erlitten und wurde von der lokalen Bevölkerung der Rebellenregion entfremdet. Wir haben heute einen großen Sieg errungen!"
 dnc_germany.29.a:0 "Tolle Neuigkeiten!"
dnc_germany.30.t:0 "Nationalismus-Feuer ist erfolgreich"
 dnc_germany.30.d:0 "Unser Versuch, das Feuer des Nationalismus zu entfachen, ist gescheitert. [FROM.GetName] hat einen erstaunlichen diplomatischen Sieg errungen und wurde von der lokalen Bevölkerung der Rebellenregion zum wahren Herrscher erklärt. Wir haben heute eine katastrophale Niederlage erlitten."
 dnc_germany.30.a:0 "Schade.."

dgk_germany.900.t:0 "Beleben Sie den Dreikaiserbund wieder"
dgk_germany.900.d:0 "Russland ist mit Plänen an uns herangetreten, den Dreikaiserbund wiederzubeleben, der in den 1880er Jahren aufgegeben wurde. Im Austausch für eine Neuordnung unseres Bündnisses bietet es wirtschaftliche Zugeständnisse an. Sollen wir diese annehmen?"
dgk_germany.900.a:0 "Natürlich!"
dgk_germany.900.b:0 "Unsere diplomatischen Ambitionen liegen woanders."

