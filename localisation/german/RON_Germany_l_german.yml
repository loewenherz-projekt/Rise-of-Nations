 GMO_Wel_Jap_Claim_the_Islands:0 "Beanspruchen Sie die Bismarckinseln"
 GMO_Wel_Jap_Claim_the_Islands_desc:0 "Die Japaner haben uns die Bismarckinseln gestohlen. Wir werden sie zurückerobern, koste es, was es wolle."
 GMO_Wel_Jap_War:0 "Krieg gegen den Militarismus"
 GMO_Wel_Jap_War_desc:0 ""
 GMO_Wel_Sia_Investments:0 "Investitionen in Siam"
 GMO_Wel_Sia_Investments_desc:0 ""
 GMO_Wel_Mittelafrika_Claim:0 "Renew Mittelafrika Claims"
 GMO_Wel_Mittelafrika_Claim_EXPL:0 "§HImperiale Kolonien von Mittelafrika§! erhält §Hcores§! und §Hclaims§! über die östlichen, mittleren und südlichen Regionen Afrikas.\n"
 GMO_Wel_Mittelafrika_Claim_desc:0 "Unsere afrikanischen Kolonien wurden uns schwer geraubt. Dieser Verrat muss mit hohen Zinsen vergolten werden. Wir werden den alten Mittelafrika-Plan wiederbeleben – die Idee eines riesigen Staates in Zentralafrika unter deutscher Herrschaft."
 GMO_Wel_Mittelafrika:0 "Imperiale Kolonien von Mittelafrika"
 GMO_Wel_Mittelafrika_EXPL:0 "Wenn wir oder unsere Verbündeten Gebiete kontrollieren, die von den „Imperialen Kolonien Mittelafrikas“ beansprucht werden, geben wir diese Gebiete an sie weiter.\n"
 GMO_Wel_Mittelafrika_desc:0 ""
 
 
 GMO_State_Question:0 "Organisieren Sie unseren neuen Staat"
 GMO_State_Question_desc:0 "Mit der Neuformierung des Deutschen Reiches zeigten der Kaiser und seine Familie ein zunehmendes Interesse an Staats- und Militärangelegenheiten. Mit Hilfe der Regierungen wollten sie den Staat umgestalten und ihn ruhmreich führen."
 GMO_Reveal_Nazi_Plans:0 "Enthüllen Sie Nazi-Pläne"
 GMO_Reveal_Nazi_Plans_desc:0 "Die Nazis hatten viele Pläne, in unsere Nachbarländer einzumarschieren und ihre Bürger auszurotten. Wir werden ihr Vertrauen gewinnen, indem wir ihnen diese Pläne in aller Höflichkeit offenbaren."
