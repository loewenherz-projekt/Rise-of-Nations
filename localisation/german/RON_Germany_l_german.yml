 nuremberg_laws2_desc:0 "Die Nürnberger Gesetze, die am 15. September 1935 vom Reichstag verabschiedet wurden, legten einen offiziellen Rechtsrahmen für die Diskriminierung von Juden fest, beschränkten die Staatsbürgerschaft auf ethnische Deutsche und verboten die Eheschließung sowie verschiedene Kontakte zwischen Deutschen und jüdischen „Einwohnern“ Deutschlands."
