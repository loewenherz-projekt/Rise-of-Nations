 GER_JAP_the_last_empire_standing_desc:0 ""
 
 ##### SOV ALLY BRANCH
 GER_SOV_anti_comitern_pact:0 "Anti-Komintern-Pakt"
 GER_SOV_anti_comitern_pact_desc:0 "Die Einmischung der Kommunistischen Internationale in die inneren Angelegenheiten der Nationen gefährdet nicht nur ihren inneren Frieden und ihr soziales Wohlergehen, sondern stellt auch eine Bedrohung für den Weltfrieden dar! Wir werden viele nichtkommunistische Länder auffordern, den Pakt zu unterzeichnen und dafür sorgen, dass wir die rote Bedrohung in Schach halten."
 GER_SOV_molotov_ribbentrop_pact:0 "Molotow-Ribbentrop-Pakt"
 GER_SOV_molotov_ribbentrop_pact_EXPL:0 "[SOV.GetFlag]§H[SOV.GetName]§! wird nicht in der Lage sein, die Politik der §HClosed Economy§! auszuwählen und uns §H2§! Jahre lang den Krieg zu erklären.\n"
 GER_SOV_molotov_ribbentrop_pact_desc:0 "Ein Freundschafts- und Nichtangriffspakt mit der UdSSR mag zwar den Magen umdrehen, doch er wird dafür sorgen, dass ihr kostbares Öl weiterhin nach Deutschland fließt. Der geheime Zusatz wird die Gebiete Rumäniens, Polens, Litauens, Lettlands, Estlands und Finnlands in deutsche und sowjetische Einflusssphären aufteilen."
 GER_SOV_the_unholy_alliance:0 "Die unheilige Allianz"
 GER_SOV_the_unholy_alliance_EXPL:0 "[ENG.GetFlag]§H[ENG.GetName]§! und [USA.GetFlag]§H[USA.GetName]§! werden in der Lage sein, demokratische Nationen gegen unser Bündnis zu §RUnite§! zu verbünden!"
 GER_SOV_the_unholy_alliance_desc:0 "Vielleicht ist es möglich, unsere ideologischen Differenzen mit den Sowjets beiseite zu legen und stattdessen das zu betonen, was uns verbindet: den Hass auf den egoistischen Liberalismus und den dekadenten Westen. Mit der UdSSR als Verbündetem hätten wir Zugriff auf alle Ressourcen, die wir brauchen – natürlich zusätzlich zu ihrer militärischen Macht."
 GER_SOV_chinese_solution:0 "Chinesische Lösung"
 GER_SOV_chinese_solution_desc:0 ""
 GER_SOV_eliminate_the_eastern_threat:0 "Beseitigen Sie die Bedrohung aus dem Osten"
 GER_SOV_eliminate_the_eastern_threat_desc:0 ""
 GER_SOV_united_support_for_free_india:0 "Gemeinsame Unterstützung für ein freies Indien"
 GER_SOV_united_support_for_free_india_desc:0 ""
 GER_SOV_build_kazan_panzerplant:0 "Baue das Panzerwerk Kazan"
 GER_SOV_build_kazan_panzerplant_desc:0 ""
 GER_SOV_koester_nakhimov_plan:0 "Koester-Nachimow-Plan"
 GER_SOV_koester_nakhimov_plan_desc:0 "Der Koester-Nachimow-Plan – benannt nach zwei großen deutschen und russischen Admiralen – verfolgt ein einfaches Ziel: die nahezu unschlagbare alliierte Marine herauszufordern. Dies kann nur erreicht werden, wenn der Großteil der Produktion und Ressourcen der Marineproduktion gewidmet wird."

 ##### SOV WAR BRANCH
 GER_heim_ins_ostliche_reich:0 "Heim ins Östliche-Reich"
 GER_heim_ins_ostliche_reich_desc:0 ""
 GER_the_turkestan_policy:0 "Die Turkestan-Politik"
 GER_the_turkestan_policy_EXPL:0 "   Wählen Sie Ihren Ansatz für die Nationen von §HTurkestan§!, die vor Kurzem die Freiheit von [SOV.GetFlag]§H[SOV.GetName]§! erlangt haben."
 GER_the_turkestan_policy_desc:0 ""
 GER_the_hague_conference:0 "Die Haager Konferenz"
 GER_the_hague_conference_EXPL1:0 "\nDies ist ein §CReaktiver Fokus§!. Entsprechend der aktuellen Situation:\n- [ENG.GetFlag]§H[ENG.GetName]§! §RKontrolliert§! die §HBritischen Inseln§!\n- [ENG.GetFlag]§H[ENG.GetName]§! ist §GNicht in Fraktion§! mit [USA.GetFlag]§H[USA.GetName]§!\nDie Verhandlungen werden an diese Situation angepasst."
 GER_the_hague_conference_EXPL2:0 "\nDies ist ein §CReaktiver Fokus§!. Entsprechend der aktuellen Situation:\n- [ENG.GetFlag]§H[ENG.GetName]§! §GKontrolliert nicht§! die §HBritischen Inseln§!\n- [ENG.GetFlag]§H[ENG.GetName]§! ist §GNicht in Fraktion§! mit [USA.GetFlag]§H[USA.GetName]§!\nDie Verhandlungen werden an diese Situation angepasst."
 GER_the_hague_conference_EXPL3:0 "\nDies ist ein §CReaktiver Fokus§!. Entsprechend der aktuellen Situation:\n- [ENG.GetFlag]§H[ENG.GetName]§! §RKontrolliert§! die §HBritischen Inseln§!\n- [ENG.GetFlag]§H[ENG.GetName]§! ist §RIn einer Fraktion§! mit [USA.GetFlag]§H[USA.GetName]§!\nDie Verhandlungen werden an diese Situation angepasst."
 GER_the_hague_conference_EXPL4:0 "\nDies ist ein §CReaktiver Fokus§!. Entsprechend der aktuellen Situation:\n- [ENG.GetFlag]§H[ENG.GetName]§! §GKontrolliert§! nicht die §HBritischen Inseln§!\n- [ENG.GetFlag]§H[ENG.GetName]§! ist §RIn einer Fraktion§! mit [USA.GetFlag]§H[USA.GetName]§!\nDie Verhandlungen werden dieser Situation angepasst."
 GER_the_hague_conference_EXPL5:0 "Wenn sie die Einladung zur Haager Konferenz annehmen, können wir verschiedene Forderungen stellen, die uns die Kontrolle über das Britische Empire, die Staaten und andere Bereiche ermöglichen. Wir werden mit den Nationen der Fraktion Frieden schließen. Nationen, die bereits von uns besetzt sind, werden aus der Fraktion ausgeschlossen und müssen sich in einer regulären Friedenskonferenz unseren Forderungen unterwerfen.\n"
 GER_the_hague_conference_EXPL6:0 "Wenn sie und [USA.GetFlag]§H[USA.GetName]§! die Einladung zur Haager Konferenz annehmen, können wir verschiedene Forderungen stellen, die uns die Kontrolle über das Britische Empire, die Staaten und andere Gebiete sichern. Wir werden mit den Nationen der Fraktion einen Frieden schließen. Nationen, die bereits von uns besetzt sind, werden aus der Fraktion ausgeschlossen und müssen sich in einer regulären Friedenskonferenz unseren Forderungen unterwerfen.\n"
 GER_the_hague_conference_desc:0 ""
 GER_utilize_the_lebensraum:0 "Den Lebensraum nutzen"
 GER_utilize_the_lebensraum_desc:0 ""
 GER_natural_resources_exploitation:0 "Ausbeutung natürlicher Ressourcen"
 GER_natural_resources_exploitation_desc:0 ""

 ##### ARG BRANCH
 GER_ARG_support_argentines_german_nationalists:0 "Unterstützen Sie die deutschen Nationalisten Argentiniens"
 GER_ARG_support_argentines_german_nationalists_desc:0 "In Argentinien leben viele Deutsche. Durch ihre Unterstützung könnten wir starke Verbündete auf dem amerikanischen Kontinent gewinnen."
 GER_ARG_provide_industrial_know_how:0 "Industrielles Know-how vermitteln"
 GER_ARG_provide_industrial_know_how_desc:0 "Wir werden argentinisches Industrie-Know-how einbringen, was uns sicherlich eine gewisse Popularität verschaffen wird."
 GER_ARG_invest_in_urban_regions:0 "Investieren Sie in urbane Regionen"
 GER_ARG_invest_in_urban_regions_desc:0 "Indem wir die Entwicklung der argentinischen Zivilindustrie unterstützen, können wir unseren Einfluss in Argentinien stärken. Außerdem können wir so mehr Männer in den Kampf nach Europa schicken, um dort unseren Kampf zu führen."
 GER_ARG_develop_chacos_steel_mines:0 "Entwicklung der Stahlminen von Chaco"
 GER_ARG_develop_chacos_steel_mines_desc:0 "Um die Armee und Marine unserer zukünftigen Verbündeten auszubauen, müssen wir ihre Stahlindustrie ausbauen. In der Provinz Chaco liegen große Mengen ungenutzten Stahls. Das muss sich ändern."
 GER_ARG_dockyards_of_the_reich:0 "Werften des Reiches"
 GER_ARG_dockyards_of_the_reich_desc:0 "Argentiniens Marineindustrie ist mangelhaft. Wir sollten sie finanzieren, um einen sicheren Zugang zu einem Marinestützpunkt in Amerika zu erhalten und unseren Einfluss auf die argentinische Politik zu stärken."
 GER_ARG_propose_closer_bonds:0 "Schlagen Sie engere Bindungen vor"
 GER_ARG_propose_closer_bonds_desc:0 "Die Regierung steht hinter uns. Die Bevölkerung unterstützt die deutschen Ideale. Es ist Zeit, unser Bündnis offiziell zu machen. Wir werden unsere Nationen zusammenführen und schließlich eine neue Ordnung in Südamerika schaffen."
 GER_ARG_joint_research_program:0 "Gemeinsames Forschungsprogramm"
 GER_ARG_joint_research_program_desc:0 "Nachdem wir nun in Südamerika einen neuen Verbündeten gewonnen haben, müssen wir die klugen Köpfe dieses Landes finden und sie mit uns zusammenarbeiten lassen, um die Entwicklung unserer beiden Streitkräfte voranzutreiben."
 GER_ARG_one_united_sudamerika:0 "One United Südamerika"
 GER_ARG_one_united_sudamerika_desc:0 "Argentinien ist das einzige Land, das Südamerika unter strenger Herrschaft und unserer Ideologie vereinen kann. Wir müssen ihnen helfen, die Ordnung im Süden Südamerikas wiederherzustellen, notfalls mit Gewalt. "
 
 ##### USA BRANCH
 GER_USA_war_with_usa:0 "Krieg mit den USA"
 GER_USA_war_with_usa_desc:0 "Es ist an der Zeit, die letzte verbliebene Supermacht zu vernichten, die eine Bedrohung für unser glorreiches Imperium darstellen könnte. Die USA waren lange Zeit eine Industriemacht mit einer riesigen Armee, doch die Weltwirtschaftskrise traf sie hart und schwächte sie enorm."
 GER_USA_form_rk_amerika:0 "Bilden Sie das Reichsprotektorat Amerika"
 GER_USA_form_rk_amerika_TRIG:0 "Wir oder unsere Verbündeten kontrollieren die ostamerikanischen Gebiete bis nach New Mexico, Colorado, Wisconsin und Montana."
 GER_USA_form_rk_amerika_desc:0 "Wir haben den letzten Krieg gewonnen, den wir jemals führen mussten. Die USA sind unter Kontrolle, doch die annektierten Gebiete sind viel zu groß, um von uns direkt regiert zu werden. Wir müssen ein Marionettenregime errichten, um unsere neuen Bürger im Westen fest im Griff zu behalten. John Smith hat sich als strenger Anführer und treuer Befolger unseres Führers erwiesen. Wir sollten ihm die Kontrolle über den Rest Amerikas anvertrauen."
 GER_USA_joe_blakes_service_in_germania:0 "Joe Blakes Dienst in Germania"
 GER_USA_joe_blakes_service_in_germania_desc:0 "Er wurde Anfang 1935 im Rahmen des Lebensborn-Programms als unehelicher Sohn von Martin Heusmann geboren, der während Hitlers Krankheit amtierende Reichskanzler war. Er hat sich als vorbildlicher SS-Agent erwiesen und wird in unserem Interesse wichtige Missionen ausführen. "
 GER_USA_closer_amerikan_economic_integration:0 "Engere amerikanische Wirtschaftsintegration"
 GER_USA_closer_amerikan_economic_integration_desc:0 "Unser Protektorat in Amerika verfügt über eine mächtige Industriebasis, die direkt vom Reich kontrolliert und geleitet werden muss."
 GER_USA_brooklyn_and_newport_under_direct_control:0 "Brooklyn und Newport unter direkter Kontrolle"
 GER_USA_brooklyn_and_newport_under_direct_control_desc:0 "Obwohl wir nicht die gesamten USA kontrollieren können, benötigen wir die direkte Kontrolle über wichtige Teile ihrer Industrie. Die ehemaligen Vereinigten Staaten von Amerika waren unter anderem für ihre riesige Marine und ihre großen Werften bekannt. Wir können diese für den Wiederaufbau unserer Hochseeflotte nutzen und alle Ozeane beherrschen."
 GER_USA_demanded_oil_shipments:0 "Geforderte Öllieferungen"
 GER_USA_demanded_oil_shipments_desc:0 "Die texanischen Ölfelder könnten unsere Kriegsmaschinerie auf lange Sicht versorgen. Wir müssen regelmäßige Öllieferungen sicherstellen, um die Interessen des Reichs in Europa zu unterstützen."
 
 ##### RHINELAND, RKs
 GER_rheinlandbesetzung:0 "Rheinlandbesetzung"
 GER_rheinlandbesetzung_EXPL1:0 "[FRA.GetFlag]§H[FRA.GetName]§! und [ENG.GetFlag]§H[ENG.GetName]§! werden in der Lage sein, der Remilitarisierung entgegenzutreten und uns zum Rückzug zu zwingen!\n"
 GER_rheinlandbesetzung_EXPL2:0 "Wenn das passiert und wir uns entscheiden, die §HRemilitarisierung voranzutreiben§!, wird dieser Fokus auch die folgenden §REffekte§! haben:\n"
 GER_rheinlandbesetzung_EXPL3:0 "Wenn das passiert und wir uns entscheiden, die Remilitarisierung abzubrechen, wird dieser Fokus auch die folgenden Auswirkungen haben:\n"
 GER_rheinlandbesetzung_EXPL4:0 "   Stürzt die faschistische §HNSDAP§! und installiert eine §HDokratische§! Regierung.\n"
 GER_rheinlandbesetzung_desc:0 "Das Rheinland ist seit dem Ende des Ersten Weltkriegs entmilitarisiert, doch diese Beleidigung soll nicht länger bestehen! Deutschland ist ein souveräner Staat und kann innerhalb seiner Grenzen Truppen überallhin verlegen!"
 
 ##### RMA BRANCH
 GER_reassert_claims_in_mittelafrika:0 "Ansprüche in Mittelafrika erneut geltend machen"
 GER_reassert_claims_in_mittelafrika_EXPL:0 "Gewinnt §HCore§! gegenüber den östlichen, mittleren und südlichen Staaten in Afrika.\n"
 GER_reassert_claims_in_mittelafrika_desc:0 "Unsere afrikanischen Kolonien wurden uns schwer genommen. Dieser Verrat muss mit hohen Zinsen vergolten werden. Wir werden den alten Mittelafrika-Plan wiederbeleben – die Idee eines riesigen Staates in Zentralafrika unter deutscher Herrschaft."
 GER_establish_rk_mittelafrika:0 "Errichtung der Reichskolonie Mittelafrika"
 GER_Mittelafrika_EXPL:0 "Wenn wir oder unsere Verbündeten Regionen kontrollieren, die von [RMA.GetFlag]§H[RMA.GetName]§! beansprucht werden, geben wir diese Regionen an sie weiter.\n"
 GER_establish_rk_mittelafrika_TRIG:0 "Wir oder unsere Marionetten kontrollieren jeden „Staat“ in Ost-, Mittel- oder Südafrika."
 GER_establish_rk_mittelafrika_desc:0 "Wir haben erfolgreich Gebiete in Afrika erobert und werden nun sein Selbstverwaltungssystem ausrufen. Ein Schritt zur Stärkung des Reiches und seines Herrenvolkes ist getan!"
 GER_make_a_use_out_of_afrikan_wastelands:0 "Machen Sie aus den afrikanischen Ödländern etwas"
 GER_make_a_use_out_of_afrikan_wastelands_EXPL:0 "Entwickelt Staaten in „HAfrika“, die entweder von „HUs“ oder „HPuppets“ kontrolliert werden."
 GER_make_a_use_out_of_afrikan_wastelands_TRIG:0 "Wir oder unsere Marionetten kontrollieren jeden „Staat“ in „Afrika“."
 GER_make_a_use_out_of_afrikan_wastelands_desc:0 ""
 GER_steel_plants_in_afrika:0 "Stahlwerke in Afrika"
 GER_steel_plants_in_afrika_TRIG:0 "Wir oder unsere Marionetten kontrollieren jeden „Staat“ in „Afrika“."
 GER_steel_plants_in_afrika_desc:0 ""
 GER_develop_oil_refineries_in_alexandria:0 "Bau von Ölraffinerien in Alexandria"
 GER_develop_oil_refineries_in_alexandria_desc:0 ""
 GER_erwin_rommels_deutsches_afrikakorps:0 "Erwin Rommels Deutsches Afrikakorps"
 GER_erwin_rommels_deutsches_afrikakorps_TRIG:0 "Wir oder unsere Verbündeten kontrollieren jeden Küstenstaat in Afrika."
 GER_erwin_rommels_deutsches_afrikakorps_EXPL:0 "Gewinnen Sie §H4§! Afrikakorps-Divisionen in §H3§! zufälligen Staaten in Afrika, wobei den nördlichen Staaten Priorität eingeräumt wird.\n"
 GER_erwin_rommels_deutsches_afrikakorps_desc:0 "Das Afrikakorps ist eine deutsche Elite-Expeditionstruppe in Afrika.\nZunächst als reine Überbrückungstruppe aufgestellt, wurde es später durch die Panzerarmee Afrika erweitert und erhielt auch das Kommando über andere alliierte Streitkräfte, die auf deutscher Seite kämpften."
 GER_form_rk_agypten:0 "Formular Reichsprotektorat Ägypten"
 GER_form_rk_agypten_TRIG:0 "Wir oder unsere Marionetten kontrollieren §HMarsa Matruh§!, §HAlexandria§!, §HCairo§!, §HAswan§!, §HEastern Desert§!, §HKhartoum§! und §HSudan§!."
 GER_form_rk_agypten_desc:0 ""
 GER_atlantropa_preparation_project:0 "Vorbereitungen für das Atlantropa-Projekt"
 GER_atlantropa_preparation_project_desc:0 "Atlantropa, auch Panropa genannt, ist ein gigantisches Ingenieurs- und Kolonisationskonzept des deutschen Architekten Hermann Sörgel aus den 1920er Jahren. Im Mittelpunkt steht der Bau eines Wasserkraftwerks quer durch die Straße von Gibraltar, das enorme Mengen an Wasserkraft liefern und den Wasserspiegel des Mittelmeers um bis zu 200 Meter absenken sollte."
 
 ##### ITA ALLY BRANCH
 GER_ITA_stahlpakt:0 "Stahlpakt"
 GER_ITA_stahlpakt_desc:0 "Der Stahlpakt, offiziell bekannt als „Freundschafts- und Bündnispakt zwischen Deutschland und Italien“, ist ein militärisches und politisches Bündnis zwischen Italien und Deutschland. Der Pakt besteht aus zwei Teilen. Der erste Teil war eine offene Erklärung des anhaltenden Vertrauens und der Zusammenarbeit zwischen Deutschland und Italien, während der zweite Teil, ein „geheimes Zusatzprotokoll“, eine gemeinsame Militär- und Wirtschaftspolitik förderte."
 GER_ITA_expand_technology_sharing_program:0 "Programm zum Technologieaustausch erweitern"
 GER_ITA_expand_technology_sharing_program_desc:0 ""
 GER_ITA_agypten_for_italy:0 "Ägypten für Italien"
 GER_ITA_agypten_for_italy_TRIG:0 "Wir oder unsere Marionetten kontrollieren mindestens einen „ägyptischen“ Staat."
 GER_ITA_agypten_for_italy_EXPL:0 "Wenn wir oder unsere Marionetten Regionen in §HEgypt§! kontrollieren, behandeln wir diese Regionen mit [ITA.GetFlag]§H[ITA.GetName]§!.\n"
 GER_ITA_agypten_for_italy_desc:0 ""
 
 ##### CHI ALLY BRANCH
 GER_CHI_continue_military_cooperation_with_china:0 "Fortsetzung der militärischen Zusammenarbeit mit China"
 GER_CHI_continue_military_cooperation_with_china_EXPL1:0 "Wenn sie unser Angebot §GAkzeptieren§!, können wir nicht mit [JAP.GetFlag]§H[JAP.GetName]§! zusammenarbeiten. Das Ereignis hat die folgenden §GEnwirkungen§!:\n"
 GER_CHI_continue_military_cooperation_with_china_desc:0 "Die Zusammenarbeit zwischen China und Deutschland trägt seit 1926 maßgeblich zur Modernisierung der Industrie und der Streitkräfte der Republik China bei. In China konnten wir kaum die nötige Erfahrung mit moderner Kriegsführung sammeln, da der Versailler Vertrag unsere Möglichkeiten in Europa stark einschränkte."
 GER_CHI_renew_stahlhelm_contract:0 "Stahlhelm-Verträge erneuern"
 GER_CHI_renew_stahlhelm_contract_desc:0 " China hat bereits Hunderttausende Stahlhelme und eine nicht erfasste große Zahl von Gewehren des Typs 88 und 98 gekauft. Um unsere Beziehungen zu China weiter zu vertiefen, werden wir einen neuen Vertrag mit dem chinesischen Staat abschließen und dem krisengeschüttelten Land verschiedene Arten von Militärausrüstung anbieten."
 GER_CHI_former_imperial_colony_state_of_quingdao:0 "Ehemaliger kaiserlicher Koloniestaat Quingdao"
 GER_CHI_former_imperial_colony_state_of_quingdao_desc:0 ""
 GER_CHI_chinese_three_year_plan:0 "Chinesischer Dreijahresplan"
 GER_CHI_chinese_three_year_plan_desc:0 ""
 GER_CHI_panzerschiff_contracts:0 "Panzerschiff-Verträge"
 GER_CHI_panzerschiff_contracts_EXPL1:0 "Fügen Sie §H4§! &#39;Deutchland-Klasse&#39; §HPanzerschiffs§! zu ihrer Produktion hinzu.\n"
 GER_CHI_panzerschiff_contracts_EXPL2:0 "Fügen Sie unserer Produktion §H4§! &#39;Deutchland Class&#39; §HPanzerschiffs§! hinzu.\n"
 GER_CHI_panzerschiff_contracts_desc:0 ""
 GER_CHI_support_local_cheaper_production:0 "Unterstützen Sie die lokale, günstigere Produktion"
 GER_CHI_support_local_cheaper_production_desc:0 ""
 GER_CHI_finalize_chinese_industrialization:0 "Abschluss der chinesischen Industrialisierung"
 GER_CHI_finalize_chinese_industrialization_desc:0 ""
 GER_CHI_berlin_nanjing_axis:0 "Achse Berlin-Nanjing"
 GER_CHI_berlin_nanjing_axis_desc:0 ""
 
 GER_prepare_die_ostfront:0 "Prepare die Ostfront"
 GER_prepare_die_ostfront_desc:0 ""
 GER_operation_barbarossa:0 "Unternehmen Barbarossa"
 GER_operation_barbarossa_EXPL1:0 "Die Boni werden §RLowered§!, je länger der Krieg mit [SOV.GetFlag]§H[SOV.GetName]§! dauert.\n"
 GER_operation_barbarossa_EXPL2:0 "Wenn wir beim Abschließen dieses Fokus immer noch den Nationalgeist „§HPrepare die Ostfront§!“ haben, hat dies stattdessen die folgenden §GEffects§!:\n"
 GER_operation_barbarossa_desc:0 ""
 GER_winter_equipment_production:0 "Winterausrüstungsproduktion"
 GER_winter_equipment_production_desc:0 "Unser Krieg dauert länger als erwartet. Der Winter naht und unsere Soldaten brauchen Kleidung und Ausrüstung, um darauf vorbereitet zu sein. Das wird teuer, aber es wird sich sicherlich auszahlen."
 GER_improve_the_supply_lines:0 "Verbessern Sie die Versorgungsleitungen"
 GER_improve_the_supply_lines_desc:0 "Die Russen sind ein zähes Volk und wissen, wie man auf ihrem Land kämpft. Sie können ihre Seite des Krieges versorgen, was wir in unserer gegenwärtigen Lage nicht können. Wir müssen, wenn es sein muss, dauerhafte Versorgungslinien von Berlin bis in die sibirische Wüste errichten!"
 GER_deploy_the_osttruppen:0 "Einsatz der Osttruppen"
 GER_deploy_the_osttruppen_EXPL:0 "   Bilden Sie §H-Truppen-Bataillone§! in ehemaligen sowjetischen Gebieten.\n"
 GER_deploy_the_osttruppen_desc:0 "Die Sowjetunion ist eine Nation von Nationen, Millionen verschiedener Völker ohne ein Gewehr in der Hand oder wahre Loyalität! Wir können unsere Ideale für den Krieg vorerst beiseite legen, aber sobald wir Deutschlands Zukunft gesichert haben, werden diese Völker wieder an ihren Platz zurückgewiesen: unter den germanischen Stiefel!"
 GER_blitzkrieg:0 "Blitzkrieg!"
 GER_blitzkrieg_desc:0 "Wir sind vorbereitet. Wir werden jetzt zuschlagen! Schnell und tödlich. Die Sowjets haben gegen unsere organisierte Panzerwaffe keine Chance."
 GER_counter_soviet_armor:0 "Konter gegen sowjetische Panzer"
 GER_counter_soviet_armor_desc:0 "Die sowjetischen Panzer erwiesen sich als stärker als erwartet. Je tiefer wir in die russischen Einöden vordringen, wo die Versorgung mit Panzern immer länger dauert, desto mehr müssen wir uns auf die Modernisierung unserer Artillerie konzentrieren, um den sowjetischen Panzern T-34 und KV-1 gewachsen zu sein."
 GER_the_whole_rotten_structure_crashed_down:0 "Die ganze morsche Struktur stürzte ein"
 GER_the_whole_rotten_structure_crashed_down_desc:0 ""
 GER_wehrbauern_plan:0 "Wehrbauernplan"
 GER_wehrbauern_plan_EXPL1:0 "Durch die Absolvierung dieses Schwerpunkts wird die für eine erfolgreiche Germanisierung erforderliche Zeit verkürzt.\n"
 GER_wehrbauern_plan_EXPL2:0 "Sie erhalten §H12§! Wehrbauern-Divisionen, sollte ihr Land angegriffen werden.\n"
 GER_wehrbauern_plan_desc:0 ""
 GER_the_wall_of_europe:0 "Die Mauer Europas"
 GER_the_wall_of_europe_desc:0 ""
 GER_eastern_raketenbasis:0 "Östliche Raketenbasis"
 GER_eastern_raketenbasis_desc:0 ""
 
 ##### SPEECHES, FOREIGN SUPPORT, GERMANIA BRANCH
 GER_hitlers_speeches:0 "Hitlers Reden"
 GER_hitlers_speeches_desc:0 "[GER.GetLeader] ist ein charismatischer Mann, der die Massen anzieht! Er wird bei den wichtigsten Ereignissen im Reich Reden halten und die Moral der Bevölkerung heben!"
 
 GER_empower_foreign_nationalists:0 "Ausländische Nationalisten stärken"
 GER_empower_foreign_nationalists_EXPL:0 "Erhalte §H3§! ausgebildete Generäle.\n"
 GER_empower_foreign_nationalists_desc:0 "Männer und Frauen in ganz Europa beobachten, wie Deutschland aus der Asche aufersteht, und sind sicher begierig darauf, sich uns unter der Macht des Reiches anzuschließen! Wenn wir die richtigen Entscheidungen treffen, können wir wertvolle Unterstützung aus nicht-germanischen Ländern gewinnen."
 GER_anti_communist_volunteer_brigades:0 "Antikommunistische Freiwilligenbrigaden"
 GER_anti_communist_volunteer_brigades_desc:0 "Wir dürfen nicht zulassen, dass die Sowjets noch mehr Land einnehmen. Es ist unsere Pflicht, die Welt vor den Fängen des Kommunismus zu schützen, aber wir können es nicht allein schaffen. Wir müssen jedes Land in unmittelbarer Nähe der kommunistischen Bedrohung bitten, uns zu helfen, diese widerliche Ideologie aus der Welt zu verbannen."
 
 ### FIN BRANCH
 GER_FIN_the_finnish_lion:0 "Der finnische Löwe"
 GER_FIN_the_finnish_lion_desc:0 "Die Finnen werden ständig von den Sowjets bedroht. Doch wo Stalin Feinde sieht, sehen wir einen wertvollen Verbündeten."
 GER_FIN_propose_anti_soviet_alliance:0 "Schlagen Sie eine antisowjetische Allianz vor"
 GER_FIN_propose_anti_soviet_alliance_desc:0 "Wir können in der finnischen Bevölkerung nach dem verlorenen Winterkrieg deutlich einen Groll gegen die Sowjets erkennen. Indem wir ihnen ihre verlorenen Gebiete und die Gebiete im Osten versprechen, könnten wir sie im Krieg gegen die Rote Armee vielleicht wieder auf unsere Seite ziehen."
 GER_FIN_continue_the_favorable_cooperation:0 "Fortsetzung der guten Zusammenarbeit"
 GER_FIN_continue_the_favorable_cooperation_desc:0 "Die Finnen haben bewiesen, dass sie unser Vertrauen verdienen, und wir glauben, dass ihnen eine Unterstützung in Forschung und Konstruktion sehr helfen könnte."
 GER_FIN_ensure_fulfillment_of_reichs_orders:0 "Sicherstellung der Erfüllung der Befehle des Reiches"
 GER_FIN_ensure_fulfillment_of_reichs_orders_desc:0 "Den Finnen kann man nicht trauen! Unser Ziel muss es sein, die volle Kontrolle über ihre Politik zu übernehmen, um sicherzustellen, dass wir uns auf die finnische Armee verlassen können."
 GER_FIN_grander_northern_finnish_territory:0 "Grander Nordfinnisches Gebiet"
 GER_FIN_grander_northern_finnish_territory_desc:0 "Indem wir Finnland die Gebiete östlich von Finnland zusprechen, die wir ihm versprochen haben, können wir die sowjetische Macht verringern, die Zahl der von uns rekrutierten Soldaten erhöhen und die Meinung der Finnen über uns verbessern."
 
 ### SPR BRANCH
 GER_can_support_SPR_flag:0 "Franco hat unsere Hilfe angenommen."
 GER_SPR_provides_mines_in_granada_EXPL:0 "Sie werden uns §HResources Rights§! in §H[173.GetName]§! gewähren, wenn es ihnen gelingt, den Bürgerkrieg zu gewinnen.\n"
 GER_SPR_provides_mines_in_murcia_EXPL:0 "Sie werden uns §HResources Rights§! in §H[168.GetName]§! gewähren, wenn es ihnen gelingt, den Bürgerkrieg zu gewinnen.\n"
 GER_SPR_provides_mines_in_extremadura_EXPL:0 "Sie werden uns §HResources Rights§! in §H[170.GetName]§! gewähren, wenn es ihnen gelingt, den Bürgerkrieg zu gewinnen.\n"
 GER_SPR_provides_mines_in_leon_EXPL:0 "Sie werden uns §HResources Rights§! in §H[174.GetName]§! gewähren, wenn es ihnen gelingt, den Bürgerkrieg zu gewinnen.\n"
 
 GER_SPR_support_nationalist_spain:0 "Unterstützen Sie das nationalistische Spanien"
 GER_SPR_support_nationalist_spain_EXPL:0 "   Stellen Sie zusätzlichen §HSupport§! für [SPA.GetFlag]§H[SPA.GetName]§! bereit.\n"
 GER_SPR_support_nationalist_spain_desc:0 "Spanien befindet sich im Bürgerkrieg, und wir müssen dafür sorgen, dass die richtige Seite gewinnt. Wir stellen Waffen, Lastwagen, Artillerie, Männer und alles, was Franco und seine Falangisten zum Sieg brauchen, zur Verfügung! Als Belohnung gewinnen wir einen starken potenziellen Verbündeten, der unsere zukünftigen Ziele unterstützt."
 GER_SPR_form_condor_legion:0 "Bilden Sie die Condor Legion"
 GER_SPR_form_condor_legion_EXPL:0 "§HWerner &#39;Daddy&#39; Mölders§! wird ein Jagdflieger-Ass.\n§HAdolf &#39;Dolfo&#39; Galland§! wird ein Jagdflieger-Ass.\n§HHans &#39;Hajo&#39; Herrmann§! wird ein Bomber-Ass.\nDie Jagdgeschwader der §HLegion Condor§! werden in Brandenburg gegründet.\nDie Bombergeschwader der §HLegion Condor§! werden in Brandenburg gegründet.\n"
 GER_SPR_form_condor_legion_desc:0 "Die Legion Condor wurde gegründet, um das nationalistische Spanien im Bürgerkrieg zu unterstützen. Sie bestand aus der Kampfgruppe 88 mit drei Staffeln Ju 52-Bombern und der Jagdgruppe 88 mit drei Staffeln Heinkel He 51-Jägern. Ihre Aufgabe bestand darin, den Nationalisten Luftunterstützung zu leisten und feindliche Städte zu bombardieren."
 GER_SPR_lessons_from_the_spain_campaign:0 "Lehren aus dem Spanienfeldzug"
 GER_SPR_lessons_from_the_spain_campaign_desc:0 "Der spanische Bürgerkrieg ist gewonnen! Dank unserer Hilfe sind die Flaggen der Falangisten in ganz Spanien zu sehen. Und da wir im Südwesten starke faschistische Verbündete gewinnen konnten, konnten wir auch wertvolle Erfahrungen aus dem bewaffneten Konflikt sammeln, den wir selbst ausgelöst haben."
 GER_SPR_alliance_for_morocco:0 "Allianz für Marokko"
 GER_SPR_alliance_for_morocco_EXPL:0 "Fordert Francos [SPR.GetFlag]§H[SPR.GetName]§! für eine Militärallianz im Austausch für §H[461.GetName]§! und §H[462.GetName]§!.\n"
 GER_SPR_alliance_for_morocco_desc:0 "Obwohl Franco uns unterstützt, will er nicht offen in den Krieg ziehen. Wir müssen ihm etwas bieten, das er sich wünscht, um Spanien unter unsere Flagge zu bringen."
 GER_SPR_develop_our_holdings_in_spain:0 "Ausbau unserer Beteiligungen in Spanien"
 GER_SPR_develop_our_holdings_in_spain_EXPL:0 "Entwickelt Ressourcen in „Spanien“! in den Staaten, in denen wir „Ressourcenrechte“ besitzen.\n"
 GER_SPR_develop_our_holdings_in_spain_desc:0 "Nachdem wir Zugang zu lebenswichtigen Ressourcen in Teilen Spaniens erlangt hatten, stellten wir fest, dass das ehemalige Königreich keine Maßnahmen zu deren Erschließung ergriff. Mit unserer heutigen Technologie können wir die verlorene Zeit problemlos aufholen."
 GER_SPR_request_docking_rights:0 "Dockingrechte anfordern"
 GER_SPR_request_docking_rights_EXPL1:0 "Bittet Francos [SPR.GetFlag]§H[SPR.GetName]§! um §HDocking-Rechte§! im Austausch für das Hinzufügen von §G1§! Bauplätzen und §H1 Marinewerft§! in §H[171.GetName]§!, §H[174.GetName]§! und §H[169.GetName]§!.\n"
 GER_SPR_request_docking_rights_desc:0 "Wir könnten den Ausbau der spanischen Werften gegen Anlegerechte in diesen Werften eintauschen. Dies würde uns eine ideale Position für U-Boot-Angriffe auf die Alliierten verschaffen."
 
 ##### STATE AFFAIRS BRANCH
 GER_open_up_state_affairs:0 "Öffnen Sie die Staatsangelegenheiten"
 GER_open_up_state_affairs_EXPL:0 "   Erhöhen Sie Ihre §HOperative Slots§!."
 GER_open_up_state_affairs_desc:0 "Nachdem wir nun die vollständige Unabhängigkeit von den Alliierten erlangt haben und das Rheinland wieder militarisiert ist, können wir uns darauf konzentrieren, unserem Land weiterhin zum Wohlstand zu verhelfen."
 GER_sportpalastrede_total_war_declaration:0 "Sportpalastrede Total War Declaration"
 GER_sportpalastrede_total_war_declaration_desc:0 "Ich frage euch: Wollt ihr den totalen Krieg? Wollt ihr ihn, wenn nötig, totaler und radikaler, als wir ihn uns heute überhaupt erst vorstellen können?\n Nun, Volk, steh auf und Sturm brich los!"
 GER_italian_war_effort_question:0 "Frage der italienischen Kriegsanstrengungen"
 GER_italian_war_effort_question_desc:0 "Die Italiener haben bewiesen, dass sie nicht in der Lage sind, den deutschen Sieg in diesem Krieg zu sichern. Sie beschlossen, Benito Mussolini zu stürzen und die Macht an König Viktor Emanuel III. zu übergeben. Unser Geheimdienst fand heraus, dass der verräterische Italiener heimlich einen Waffenstillstand mit den Alliierten plante. Unsere einzige Option ist nun, die Kontrolle über Italien selbst zu übernehmen."
 
 GER_form_the_volkssturm:0 "Bilden Sie den Volkssturm"
 GER_form_the_volkssturm_desc:0 "Angesichts der Tatsache, dass deutsches Land seit Kriegsbeginn von den Alliierten besetzt ist, müssen wir jeden kampffähigen Mann mobilisieren. Für die vollständige Ausbildung dieser tapferen Deutschen, die für das Land kämpfen wollen, bleibt keine Zeit, da wir dringend Soldaten benötigen."
 GER_emergency_gun_provision:0 "Notfall-Waffenversorgung"
 GER_emergency_gun_provision_desc:0 "Wir stehen kurz vor der Niederlage, und unseren Truppen fehlen Waffen und Nachschub. Die Bewaffnung unserer Bevölkerung ist jetzt der wichtigste Schritt zum Sieg. Dafür müssen wir jede Waffe in unserem Land finden und verteilen. Kein Nachschubdepot darf gefüllt bleiben, keine private Waffe darf in den Händen ihrer Besitzer bleiben."
 
 ##### THREE FUHRER'S REICH BRANCH
 GER_limit_hitlers_interference:0 "Begrenzen Sie Hitlers Einmischung"
 GER_limit_hitlers_interference_desc:0 "Obwohl Hitler unser großes Reich wieder aufrüstete, behinderte er die Wehrmacht dabei, stark zu werden. Indem er Ressourcen von wichtigen Operationen abzog, um extrem unpraktische und nahezu nutzlose Riesenwaffen, seine sogenannten „Wunderwaffen“, zu entwickeln, und indem er unlogische Befehle gab, um seine Überlegenheit zu demonstrieren, behinderte er unser Land nur und gefährdete unsere Soldaten."
 GER_elect_a_new_fuhrer:0 "Wählen Sie einen neuen Führer"
 GER_elect_a_new_fuhrer_desc:0 ""
 GER_they_shall_pay_for_every_step:0 "Sie werden für jeden Schritt bezahlen"
 GER_they_shall_pay_for_every_step_desc:0 "Wir MÜSSEN die Stellung um jeden Preis halten, der Feind ist überall um uns herum, wir sind dabei, diesen Krieg zu verlieren! Wir werden halten, wir werden uns eingraben, wir werden jedes letzte bisschen Verteidigungsmittel nutzen, das uns zur Verfügung steht!"
 GER_defence_of_berlin:0 "Verteidigung Berlins"
 GER_defence_of_berlin_desc:0 ""
 GER_unternehmen_werwolf:0 "Unternehmen Werwolf"
 GER_unternehmen_werwolf_desc:0 ""
 GER_propose_unconditional_surrender:0 "Schlagen Sie eine bedingungslose Kapitulation vor"
