 germany.500.t:0 "Tschechische Widerstandsbewegungen"
 germany.500.d:0 "Unsere Armeen marschieren durch Prag und Brünn, doch die Tschechen sind noch nicht vollständig besiegt. Zahlreiche Untergrundbewegungen gründen Widerstand und versuchen, unsere Rüstungsproduktion so weit wie möglich zu schädigen. Die beliebteste Zerstörungsaktivität ist die Herstellung fehlerhafter Waffen und Panzer in unseren Fabriken."
 germany.500.a:0 "Wir werden das nicht zulassen und es wird ihnen nicht gefallen."
 
