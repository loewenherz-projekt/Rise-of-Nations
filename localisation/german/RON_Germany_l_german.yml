 erwache.1.t:0 "Besetzung wirtschaftlicher Positionen"
 erwache.1.d:0 "Für die Ämter des Reichsbankpräsidenten und des Wirtschaftsministers stehen uns zwei Kandidaten zur Verfügung. Einer der möglichen Kandidaten, Hjalmar Schacht, ist sehr erfahren in der Zusammenarbeit mit deutschen Unternehmen und im Aufbau ziviler Infrastruktur, doch seine mangelnde Loyalität gegenüber der NSDAP und seine Verachtung für Militärausgaben machen ihn zu einer besorgniserregenden Wahl. Unser zweiter möglicher Kandidat, Walther Funk, ist der NSDAP gegenüber sehr loyal und ein großer Befürworter von Militärausgaben. Wenn wir beim deutschen Wiederaufbau gute Fortschritte erzielen wollen, müssen wir einen dieser beiden Männer für die Führung unserer Wirtschaft auswählen."
 erwache.1.a:0 "Hjalmar Schacht"
 erwache.1.b:0 "Walther Funk"
 erwache.2.t:0 "Das Problem der Stahlwerke"
 erwache.2.d:0 "Mit dem Wachstum der deutschen Streitkräfte müssen wir eine sichere und stabile Stahlversorgung sicherstellen. Unser aktueller Stahlproduzent, die Vereinigte Stahlwerke AG, war ein wertvoller Verbündeter beim Aufstieg der NSDAP zur Macht und ist ein wichtiger Arbeitgeber für deutsche Arbeiter. Die Stahlwerke haben jedoch nicht so viel Stahl produziert, wie sie hätten produzieren können. Die Gründung und Unterstützung der Reichswerke Hermann Göring könnte stattdessen eine deutlich größere Stahlmenge produzieren und die deutschen Kriegsanstrengungen effektiver unterstützen."
 erwache.2.a:0 "Reichswerke Hermann Göring"
 erwache.2.b:0 "Vereinigte Stahlwerke AG"
 erwache.4.t:0 "Der Untergang der Nazis"
 erwache.4.d:0 "Nach dem rasanten Aufstieg der Monarchisten und anderer kaiserfreundlicher Parteien sah die NSDAP keine andere Wahl, als die Kontrolle über die deutsche Regierung abzugeben. Diese historische Entscheidung wurde im Deutschen Reichstag offiziell verkündet, doch noch ist unklar, wer als Kaiser des neuen Vierten Reichs regieren wird. Wir können uns entweder auf Wilhelm II., den Herrscher des Zweiten Reichs während des Ersten Weltkriegs, oder auf Prinz Wilhelm III., den Sohn Wilhelms II., berufen, der durchaus geeignet ist, dieses historische Amt zu bekleiden."
 erwache.4.a:0 "Wilhelm II. wird uns führen"
 erwache.4.b:0 "Prinz Wilhelm III. wird uns führen"
 erwache.5.t:0 "Der deutsche Bürgerkrieg"
 erwache.5.d:0 "Monarchisten führten einen erfolgreichen Putsch gegen die NSDAP durch, stürmten den Reichstag und übernahmen die Regierung. In der Asche des niedergebrannten Reichstags liegt der ehemalige Reichskanzler [GER.GetLeader] tot. Heinrich Himmler ist nun das neue Regierungsoberhaupt in München. Himmler und die verbliebenen Nazi-Anhänger haben einen Bürgerkrieg gegen unsere neue Reichsregierung begonnen, und wir müssen für die Wiedervereinigung Deutschlands kämpfen. Wer wird uns auf unserem Weg zum vereinten Vierten Reich führen: der ehemalige Kaiser Wilhelm II. oder sein Sohn, Prinz Wilhelm III.?"
 erwache.5.a:0 "Wilhelm II. wird uns führen"
 erwache.5.b:0 "Prinz Wilhelm III. wird uns führen"
 erwache.6.t:0 "Deutschland fordert defensive Besatzung"
 erwache.6.d:0 "Deutschland hat schon lange Interessen an unserem Land, aber selbst das ist ein überraschendes Szenario. Deutschland verlangt von uns, dass wir die Besetzung unseres Landes durch seine Streitkräfte zulassen und uns damit im Wesentlichen in eine Marionette verwandeln."
 erwache.6.a:0 "Wir brauchen Verteidigung vor unseren Feinden"
 erwache.6.b:0 "Wir werden unsere Freiheit nicht aufgeben!"
 erwache.7.t:0 "Deutschland bietet Frieden!"
 erwache.7.d:0 "Der Sowjetunion wurde ein Vertrag zur Beendigung des deutsch-sowjetischen Krieges im Osten vorgeschlagen. Der Vertrag enthielt die Bedingung, mehrere westliche, sowjetisch besetzte Gebiete im Austausch für Frieden an die Deutschen abzutreten. Diese Bedingungen ähneln dem Vertrag von Brest-Litowsk, der den deutsch-sowjetischen Konflikt im Ersten Weltkrieg beendete."
 erwache.7.a:0 "Lehnen Sie die Bedingungen ab!"
 erwache.7.b:0 "Akzeptieren Sie die Bedingungen."
 erwache.11.t:0 "Offene Opposition gegen Hitler"
 erwache.11.d:0 "Trotz der Versuche des NSDAP-Regimes, den Widerstand zu unterdrücken, haben Untergrundbewegungen an Popularität gewonnen und sich offen der Gestapo und SS widersetzt. Obwohl sie zahlenmäßig stark sind, hat ihre Bewegung keine klare ideologische Grundlage. Wir können sie zu einem neuen Deutschland unserer Architektur beeinflussen."
 erwache.11.a:0 "Den monarchistischen Eifer wiederherstellen"
 erwache.11.b:0 "Beleben Sie den Spartacus-Bund wieder"
 erwache.11.c:0 "Geben Sie der Demokratie eine zweite Chance"
 erwache.12.t:0 "Verhaftung Hitlers!"
 erwache.12.d:0 "Endlich ist es an der Zeit, Deutschland von der NSDAP zurückzuerobern. Die Verhaftung der Nazi-Parteiführer wird schwierig sein, die wahre Herausforderung wird jedoch darin bestehen, eine Ersatzregierung zu bilden und die Unterstützung der Bevölkerung zu gewinnen."
 erwache.12.a:0 "Monarchisten werden Hitler verhaften!"
 erwache.12.b:0 "Kommunisten werden Hitler verhaften!"
 erwache.12.c:0 "Die Demokraten werden Hitler verhaften!"
 erwache.13.t:0 "Angebot zum Beitritt zu CETO"
 erwache.13.d:0 "Deutschland hat vor Kurzem mit der Gründung der Mitteleuropäischen Vertragsorganisation (CEU) begonnen. Angeblich dient dies der Abwehr der Bedrohung durch Extremismus in Europa, Afrika und Asien. Sollten wir uns diesem Bündnis anschließen oder unseren bisherigen Kurs beibehalten?"
 erwache.13.a:0 "Werden Sie CETO-Mitglied"
 erwache.13.b:0 "Angebot ablehnen"
 erwache.14.t:0 "Deutschland fordert Danzig!"
 erwache.14.d:0 "In der jüngsten politischen Situation boten uns die Deutschen Schutz vor der kommunistischen Bedrohung an unserer Ostgrenze. Ursprünglich war dies eine Geste der Freundschaft, doch nun scheinen sie im Austausch für weiteren Schutz die Wiederherstellung eines deutschen Danzigs zu fordern."
 erwache.14.a:0 "Das ist das Mindeste, was wir tun können"
 erwache.14.b:0 "Lehnen Sie diese übertriebene Annexion ab"
 erwache.15.t:0 "Deutschland bietet Allianz an"
 erwache.15.d:0 "Die Deutschen haben uns kürzlich einen Platz in ihrem Bündnis angeboten, offenbar um den früheren Ruhm unserer Nationen wiederherzustellen und unsere Gegner zu vernichten. Sollen wir uns ihrer Achse anschließen oder unter uns bleiben?"
 erwache.15.a:0 "Schließen Sie sich den Deutschen an"
 erwache.15.b:0 "Das Angebot ablehnen"
 erwache.16.t:0 "Den deutschen Kommunisten beitreten?"
 erwache.16.d:0 "Die neue sozialistische Regierung Deutschlands bietet mit Nachdruck die Eingliederung in ihre wirtschaftliche und politische Zone an. Dies könnte unserem Volk mehr Wohlstand und Schutz auf Kosten unserer Autonomie ermöglichen. Wie viel sind wir bereit zu geben?"
 erwache.16.a:0 "Akzeptieren Sie eine vollständige Gründung in Deutschland"
 erwache.16.b:0 "Schließen Sie sich ihrer wirtschaftlichen und politischen Zone an, behalten Sie jedoch einen Teil unserer Autonomie."
 erwache.16.c:0 "Das deutsche Angebot ablehnen"
 erwache.17.t:0 "Deutschland bietet ein Bündnis an"
 erwache.17.d:0 "Deutschland bietet uns einen Sitz am Runden Tisch seiner neuen Europäischen Sozialistischen Union an. Damit bieten wir uns eine Alternative zu den Sowjets, die sich als imperialistischer denn je erwiesen haben. Sollen wir das Risiko eingehen und uns ihnen anschließen?"
 erwache.17.a:0 "Werden Sie Mitglied der ESU"
 erwache.17.b:0 "Das Angebot ablehnen"
 erwache.18.t:0 "Kollektivierte wirtschaftliche Stabilisierung"
 erwache.18.d:0 "Die Umsetzung unserer schnellen Kollektivierungs- und Verstaatlichungsprogramme führte zu teilweisem Chaos und Widerstand in der Bevölkerung. Jetzt hat sich die Lage stabilisiert und wir können uns auf wichtigere Anliegen der Bevölkerung konzentrieren."
 erwache.18.a:0 "Ein weiterer Triumph für die [From.getname]-Kommunisten!"
 erwache.19.t:0 "Wiederherstellung der königlichen Familie"
 erwache.19.d:0 "Nachdem wir nun die Loyalität des deutschen Volkes und die Kontrolle über die deutsche Regierung gewonnen haben, sollten wir die ehemalige Herrscherfamilie zurückholen, damit wir unseren Weg zur Wiederherstellung des Kaiserreichs wirklich beginnen können. Sollten wir den verbannten König Wilhelm II. zurückholen oder die Thronbesteigung des Erben Wilhelm III. unterstützen?"
 erwache.19.a:0 "Wilhelm II. wird uns führen"
 erwache.19.b:0 "Wilhelm III. wird uns führen"
 erwache.19.c:0 "Victoria III wird uns führen"
 erwache.20.t:0 "Wilhelm II. stirbt!"
 erwache.20.d:0 "Im Alter von 82 Jahren starb unser Kaiser Wilhelm II. zum großen Entsetzen seiner Familie, unserer Regierung und unseres Volkes plötzlich. Es wird ein Staatsbegräbnis stattfinden, bei dem unser neuer Kaiser Wilhelm III. seine erste öffentliche Ansprache unter seinem neuen Titel halten wird."
 erwache.20.a:0 "Ruhe in Frieden"
 
 erwache_news.1.t:0 "Spanien lehnt deutsche Forderungen ab!"
 erwache_news.1.d:0 "Spanien hat die deutsche Forderung nach einer „defensiven Besetzung“ des Landes offiziell abgelehnt. Spanien befindet sich nun im Kriegszustand gegen Deutschland und zieht seine Streitkräfte an die Grenze."
 erwache_news.1.a:0 "Wir werden kämpfen!"
 erwache_news.1.b:0 "So sei es."
 erwache_news.1.c:0 "Ein weiteres Opfer der deutschen Expansion."
 erwache_news.2.t:0 "Die Sowjetunion verweigert den Frieden mit den Deutschen!"
 erwache_news.2.d:0 "Die Sowjetunion hat einen Vertragsentwurf zur Beendigung des deutsch-sowjetischen Krieges im Osten abgelehnt. Der Vertrag sah die Abtretung mehrerer sowjetisch besetzter Gebiete im Westen an die Deutschen im Austausch für Frieden vor. Diese Bedingungen ähneln dem Vertrag von Brest-Litowsk, der den deutsch-sowjetischen Konflikt im Ersten Weltkrieg beendete."
 erwache_news.2.a:0 "Dann müssen wir die russischen Länder mit Gewalt annektieren."
 erwache_news.2.b:0 "Wir werden um jeden Zentimeter kämpfen!"
 erwache_news.2.c:0 "Interessant."
 erwache_news.4.t:0 "In Deutschland bricht ein Bürgerkrieg aus!"
 erwache_news.4.d:0 "Deutsche Revolutionäre versuchten heute Morgen, [GER.GetLeader] und andere Führer der NSDAP zu verhaften, doch die SS reagierte mit Gewalt. Hitler versucht nun, diese Revolutionäre zu bekämpfen und seine Herrschaft über Deutschland wiederherzustellen, wobei der Ausgang des Krieges ungewiss ist."
 erwache_news.4.a:0 "Auf in ein neues Deutschland!"
 erwache_news.4.b:0 "Ein dunkler Tag für Faschisten überall"
 erwache_news.4.c:0 "Gute Reise"
 erwache_news.5.t:0 "[GER.GetLeader] Verhaftet!"
 erwache_news.5.d:0 "Am Morgen marschierten Revolutionäre durch Berlin, verhafteten die Führer der NSDAP und stürzten die nationalsozialistische deutsche Regierung. Nun beobachtet die Welt, was die neue deutsche Regierung mit ihrer neu gewonnenen Macht anstellen wird."
 erwache_news.5.a:0 "Ruhm für Deutschland!"
 erwache_news.5.b:0 "Ein dunkler Tag für Faschisten überall"
 erwache_news.5.c:0 "Eine interessante Aussicht"
 
