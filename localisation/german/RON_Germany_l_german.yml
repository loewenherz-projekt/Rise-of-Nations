 # B - Stalingrad
 umc_ger.444.t:0 "Eroberung von Stalingrad"
 umc_ger.444.d:0 "Obwohl das Unternehmen Barbarossa die Sowjetunion nicht in einem einzigen Feldzug endgültig besiegen konnte, eroberte die Wehrmacht riesige Gebiete, darunter die Ukraine, Weißrussland und die baltischen Republiken. Da die ersten Operationen sehr erfolgreich waren, wurde beschlossen, den nächsten Feldzug auf die südlichen Teile der Sowjetunion zu konzentrieren. Die Ziele in der Region um Stalingrad waren die Zerstörung der Industriekapazitäten der Stadt und die Stationierung von Truppen zur Blockade der Wolga. Der Fluss war eine wichtige Route vom Kaukasus und dem Kaspischen Meer nach Zentralrussland. Seine Einnahme würde den kommerziellen Flussverkehr stören und die Lieferung von Gütern aus dem Leih- und Pachtgesetz über den Persischen Korridor erheblich erschweren.\n\nDie Offensive zur Eroberung Stalingrads begann auf direkten Befehl von [GER.GetLeader] unter Einsatz der 6. Armee und Teilen der 4. Panzerarmee. Der Angriff wurde durch heftige Bombenangriffe der Luftwaffe unterstützt, die große Teile der Stadt in Schutt und Asche legten. Die Kämpfe arteten bald in Häuserkämpfe aus; beide Seiten schickten Verstärkung in die Stadt. Nach wochenlangen Kämpfen gelang es uns, die sowjetischen Verteidiger in enge Zonen am Westufer der Wolga zurückzudrängen, was auf beiden Seiten große Verluste an Menschenleben forderte.\n\nObwohl es zahlreiche Versuche der Sowjetunion gab, uns zurückzudrängen oder unsere schwächeren Flanken rund um die Stadt anzugreifen, war keiner von ihnen erfolgreich. Nachdem unsere Truppen die Wolga überquert und die Kämpfe auf der anderen Seite der Stadt entfacht hatten, begann die sowjetische Armee – trotz ihrer Befehle – einen unkoordinierten Rückzug.\n\nDie Schlacht um Stalingrad, geprägt von erbitterten Nahkämpfen und ständigen Luftangriffen, war die größte und blutigste Schlacht der Kriegsgeschichte. Und von nun an wird sie als leuchtendes Beispiel deutschen militärischen Könnens, Mutes und Einsatzes in Erinnerung bleiben."
 umc_ger.444.a:0 "Dieses bösartige Zeichen des Kommunismus wird bald von der Landkarte verschwinden."
 
