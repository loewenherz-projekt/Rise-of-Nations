 ### POST WAR STUFF - AFTER HESS MISSION
 GER_post_war_stuff_cat:0 "Neue Ordnung Europas"
 GER_post_war_stuff_cat_desc:0 "Von der Bretagne bis Warschau – ganz Europa steht unter der festen Kontrolle unseres Dritten Reiches. Doch mit dieser Macht geht auch Verantwortung einher.\n\nUnsere Wirtschaft muss reformiert werden, um alle eroberten Gebiete angemessen abzudecken – unser Untertan muss in das größere System integriert werden, das vom Reichswirtschaftsministerium geleitet wird.\n\nSchließlich ist unser Kampf noch nicht vorbei."
 
 GER_adress_a_total_victory_dec:0 "Sprechen Sie einen Totalsieg auf dem Reichsparteitagsgelände an"
 GER_adress_a_total_victory_dec_desc:0 ""
 GER_earmark_funds_for_territorial_integration_dec:0 "Zweckgebundene Mittel für die territoriale Integration"
 GER_earmark_funds_for_territorial_integration_dec_desc:0 ""
 GER_reform_local_industries_dec:0 "Reformindustrien in eroberten Gebieten"
 GER_reform_local_industries_dec_desc:0 ""
 GER_establish_RMA_dec:0 "Selbstverwaltung für Mittelafrika"
 GER_establish_RMA_dec_desc:0 ""
 
 GER_ITA_question_of_savoy_dec:0 "Italienische Verbündete - Savoyenfrage"
 GER_ITA_question_of_savoy_dec_EXPL1:0 "Wir werden die §HItalian§!-Kontrolle über §H[735.GetName]§! offiziell anerkennen.\n"
 GER_ITA_question_of_savoy_dec_desc:0 "Da Frankreich nun unter unserer Kontrolle ist, müssen wir die territorialen Ansprüche unserer Verbündeten, insbesondere Mussolinis Italien, erfüllen.\n\nObwohl sie nicht wirklich viel zu unserem Sieg beigetragen haben, ist bekannt, dass Mussolini die Gebiete Ostfrankreichs, insbesondere Savoyen, begehrt, aber auch das Gebiet bis zur Rhone im Blick hat. Und da unser endgültiger Kampf gegen die Sowjetunion immer näher rückt, wäre es klug, unsere Verbündeten auf unserer Seite zu halten. Zumindest vorerst."
 GER_ITA_question_of_tunisia_dec:0 "Italienische Verbündete - Tunesienfrage"
 GER_ITA_question_of_tunisia_dec_EXPL1:0 "Wir werden die §HItalian§!-Kontrolle über §H[458.GetName]§! offiziell anerkennen.\n"
 GER_ITA_question_of_tunisia_dec_desc:0 ""
 GER_ITA_question_of_egypt_dec:0 "Italienische Verbündete - Ägyptenfrage"
 GER_ITA_question_of_egypt_dec_EXPL1:0 "Diese §HDescheidung§! wird wirksam, wenn Sie entweder den Fokus &#39;§HFormular Reichsprotektorat Ägypten§!&#39; oder &#39;§HÄgypten für Italien§!&#39; ausfüllen.\n"
 GER_ITA_question_of_egypt_dec_EXPL2:0 "Wir werden die §HI-Italien§!-Kontrolle über §HEgypt§! offiziell anerkennen.\n"
 GER_ITA_question_of_egypt_dec_desc:0 ""
 GER_ITA_question_of_aliance_dec:0 "Italienische Allianz"
 GER_ITA_question_of_aliance_dec_EXPL:0 "§H[ITA.GetLeader]§! wird über das Schicksal des Stahlpakts entscheiden. Die Chance auf eine Fortsetzung des Bündnisses wird größer sein, wenn wir ihn durch die richtigen Entscheidungen bei den „§Italienischen Verbündeten§!“ besänftigen."
 GER_ITA_increase_chance_of_alliance_EXPL:0 "Dies §GInkräft§! die Chance, die Allianz mit [ITA.GetFlag]§H[ITA.GetName]§! fortzusetzen.\n"
 GER_ITA_decrease_chance_of_alliance_EXPL:0 "Dadurch wird die Chance auf eine Fortsetzung der Allianz mit [ITA.GetFlag]§H[ITA.GetName]§! §Rverringert§!.\n" 
 GER_ITA_not_selecting_decrease_chance_of_alliance_EXPL:0 "\nWenn wir diese Entscheidung nicht treffen, verringern wir unsere Chance, die Allianz mit [ITA.GetFlag]§H[ITA.GetName]§! fortzusetzen.\n"
 GER_ITA_question_of_aliance_dec_desc:0 "Was einst ein starkes Bündnis mit einem gemeinsamen Ziel war – die alliierten Mächte zu vernichten, die unsere Nationen in der Vergangenheit gedemütigt hatten – steht nun ohne gemeinsames Ziel da. Die Franzosen sind geschlagen, die Briten haben kapituliert und es bleibt nur noch, die Beute aufzuteilen.\n\nTeilen? Auf beiden Seiten gibt es starke Stimmen, die argumentieren, dass unsere Nationen diese militärische Achse nicht mehr brauchen.\n\nSchließlich ist jedes Bündnis, dessen Zweck nicht die Absicht ist, Krieg zu führen, sinnlos und nutzlos."
 
 GER_post_war_stuff_dec:0 "Neue Ordnung Europas"
 GER_post_war_stuff_dec_EXPL1:0 "Der erfolgreiche Abschluss von Entscheidungen zur „§HNeuen Ordnung Europas§!“ wird die Wirkung dieser Mission §GInnovieren§!.\n"
 GER_post_war_stuff_dec_EXPL2:0 "\nSie haben die Entscheidung „§HMittel für territoriale Integration bereitstellen§!“ noch nicht abgeschlossen, daher hat diese Mission folgende §REffect§!:\n"
 GER_post_war_stuff_dec_EXPL3:0 "\nSie haben die Entscheidung „§HMittel für territoriale Integration bereitstellen§!“ erfolgreich abgeschlossen, daher hat diese Mission folgende §GEnauswirkung§!:\n"
 GER_post_war_stuff_dec_EXPL4:0 "\nSie haben die Entscheidung „§HReform der Industrie in eroberten Gebieten§!“ noch nicht abgeschlossen, daher hat diese Mission folgende §REffect§!:\n"
 GER_post_war_stuff_dec_EXPL5:0 "\nSie haben die Entscheidung „§HReform der Industrie in eroberten Gebieten§!“ erfolgreich abgeschlossen, daher hat diese Mission folgende §GEnauswirkung§!:\n"
 GER_post_war_stuff_dec_EXPL6:0 "\nDu hast die Entscheidung &#39;§HSelbstverwaltung für Mittelafrika§!&#39; noch nicht abgeschlossen, daher hat diese Mission folgende §REffect§!:\n"
 GER_post_war_stuff_dec_EXPL7:0 "Einige §HAfrikanische Nationen§! könnten sich gegen Ihre Herrschaft §RRevoltieren§!\n"
 GER_post_war_stuff_dec_EXPL8:0 "\nSie haben die Entscheidung „§HSelbstverwaltung für Mittelafrika§!“ erfolgreich abgeschlossen, daher hat diese Mission folgende §GEnwirkung§!:\n"
 GER_post_war_stuff_dec_desc:0 "Von der Bretagne bis Warschau – ganz Europa steht unter der festen Kontrolle unseres Dritten Reiches. Doch mit dieser Macht geht auch Verantwortung einher.\n\nUnsere Wirtschaft muss reformiert werden, um alle eroberten Gebiete angemessen abzudecken – unser Untertan muss in das größere System integriert werden, das vom Reichswirtschaftsministerium geleitet wird.\n\nSchließlich ist unser Kampf noch nicht vorbei."
 
