 ### Plan Z - going well
 umc_ger.160.t:0 "Geplante Plan Z-Fortschrittskontrolle"
 umc_ger.160.d:0 "Heute Morgen versammelte sich eine große Gruppe von NSDAP-Funktionären in den Hamburger Docks, um den Baufortschritt neuer moderner Schiffe zu überwachen, die im Rahmen des Schiffbauprogramms „Plan Z“ gebaut werden. Sie besichtigten die Rümpfe großer Schlachtschiffe, die mit leistungsstarken Kanonen bestückt werden, kleinere Kreuzer mit modernster Radartechnologie und mechanischen Zielfernrohren an Bord sowie die Ausbildung des Personals der Kriegsmarine. Am nächsten Tag forderten sie vollständige Aufzeichnungen und Statistiken über den laufenden Bau an. Der Großadmiral erwartete, dass in den ersten zwei Jahren mindestens ein Viertel der Schiffe fertiggestellt sein wird."
 umc_ger.160.a:0 "Ausgezeichnet!"
 
