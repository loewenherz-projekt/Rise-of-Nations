 GER_focus_on_the_true_enemy_n:0 "Fordern Sie die französisch-britische Hegemonie auf dem Kontinent heraus"
 GER_focus_on_the_true_enemy_n_desc:0 "Franzosen und Briten haben uns nach dem Weltkrieg schwer geschadet. Der Aufstieg der Nazis war ihre Schuld. Doch wir werden uns ihnen nicht länger beugen. Sie sind durch jahrelange Stagnation und interne Probleme geschwächt. Wir werden uns zurückholen, was uns rechtmäßig zusteht."
 GMO_Wel_Claims_backed_by_force:0 "Mit Gewalt untermauerte Ansprüche"
 GMO_Wel_Claims_backed_by_force_desc:0 "Unsere Worte stellen nicht nur eine Bedrohung für den gesamten Planeten dar. Wir haben alles, was wir brauchen, um ihnen zu begegnen. Unsere Armee ist bestens ausgebildet, gut ausgerüstet und bereit, erneut auf Paris zu marschieren."
