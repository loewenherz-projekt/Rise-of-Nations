 umc_ger.235.t:0 "[JAP.GetName] Kriegsverweigerung mit [SOV.GetName]"
 umc_ger.235.d:0 "Trotz Oshimas antisowjetischer Haltung schloss die japanische Regierung einen Nichtangriffspakt mit Moskau – lehnte die Idee des 70. Längengrades Ost ab – und übergab Ribbentrop die folgende offizielle Erklärung der japanischen Regierung:\n\n„Die japanische Regierung ist sich der von Russland drohenden Gefahr voll und ganz bewusst und versteht den Wunsch ihres deutschen Verbündeten, dass auch Japan seinerseits in den Krieg gegen Russland eintritt. Angesichts der gegenwärtigen Kriegslage ist es der japanischen Regierung jedoch nicht möglich, in den Krieg einzutreten. Sie ist vielmehr der Überzeugung, dass es im gemeinsamen Interesse läge, den Krieg gegen Russland jetzt nicht zu beginnen. Andererseits würde die japanische Regierung die russische Frage niemals außer Acht lassen.“\n\nEs bleibt klar, dass unser Reich in diesem entscheidenden Kampf allein dastehen wird, und obwohl die Freundschaft mit den Japanern einige Vorteile hatte, beginnen ihr wahres Gesicht und ihre wahren Absichten zu offenbaren. Ein Fortbestand der Achsenmächte nach Kriegsende scheint unwahrscheinlich."
 umc_ger.235.a:0 "Sie werden das bereuen, wenn sie unsere Flaggen in Sibirien sehen."
 umc_ger.235.b:0 "Wir müssen jegliche Zusammenarbeit zwischen unseren Nationen sofort beenden."
 
