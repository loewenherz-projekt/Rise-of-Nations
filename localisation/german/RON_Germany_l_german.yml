 ##### OSTTRUPPEN CAT
 GER_osttruppen_cat:0 "Osttruppen-Legionen"
 GER_osttruppen_cat_desc:0 "In der Sowjetunion ist nicht jeder mit Stalins Führung einverstanden. Vor allem die Menschen in der Ukraine und im Kaukasus erinnern sich an die Schrecken, die die Sowjetunion über ihr Land brachte. Und genau diese Menschen können wir für die Osttruppen-Divisionen rekrutieren."
 
 GER_form_the_ostlegionen_dec:0 "Bilden Sie die Ostlegionen"
 GER_form_the_ostlegionen_dec_desc:0 "Ostlegionen, Ost-Bataillone, Osttruppen oder Osteinheiten werden unsere neu gebildeten Einheiten aus dem Personal der Länder sein, die zur Sowjetunion gehörten. Sie werden einen großen Teil der größeren Zahl ausländischer Freiwilliger und Wehrpflichtiger der Wehrmacht darstellen."
 GER_ol_RUS_west_dec:0 "Form Westrussische Befreiungsarmee"
 GER_ol_RUS_west_dec_EXPL:0 "Gewinnen Sie §H18§! Osttruppendivisionen in Westrussland.\n"
 GER_ol_RUS_west_dec_desc:0 ""
 GER_ol_RUS_east_dec:0 "Form Ostrussische Befreiungsarmee"
 GER_ol_RUS_east_dec_EXPL:0 "Gewinnen Sie §H18§! Osttruppendivisionen in Ostrussland.\n"
 GER_ol_RUS_east_dec_desc:0 ""
 GER_ol_UKR_west_dec:0 "Form West Ukrainische Befreiungsarmee"
 GER_ol_UKR_west_dec_EXPL:0 "Gewinnen Sie §H18§! Osttruppendivisionen in der Westukraine.\n"
 GER_ol_UKR_west_dec_desc:0 ""
 GER_ol_UKR_east_dec:0 "Form East Ukrainische Befreiungsarmee"
 GER_ol_UKR_east_dec_EXPL:0 "Gewinnen Sie §H18§! Osttruppendivisionen in der Ostukraine.\n"
 GER_ol_UKR_east_dec_desc:0 ""
 GER_ol_ARM_dec:0 "Form der Armenischen Legion"
 GER_ol_ARM_dec_EXPL:0 "Gewinnen Sie §H10§! Osttruppen-Divisionen in Krasnodar.\n"
 GER_ol_ARM_dec_desc:0 "Das Armenische Bataillon, auch Armenische Legion genannt, wird als militärische Einheit der deutschen Armee gegründet. Es besteht hauptsächlich aus sowjetischen Armeniern, die in Gefangenschaft geraten sind. Ihr Kommandeur wird General Drastamat Kanayan sein."
 GER_ol_GEO_dec:0 "Form Georgische Legion"
 GER_ol_GEO_dec_EXPL:0 "Gewinnen Sie §H8§! Osttruppendivisionen in Georgien.\n"
 GER_ol_GEO_dec_desc:0 "Die Georgische Legion wird eine militärische Formation Nazi-Deutschlands sein, die sich aus ethnischen Georgiern zusammensetzt. Sie wird aus georgischen Emigranten und Kriegsgefangenen gebildet, und ihr erklärtes Ziel wird die Wiederherstellung der Unabhängigkeit Georgiens von der Sowjetunion unter der Doktrin und Aufsicht der NSDAP sein."
 

