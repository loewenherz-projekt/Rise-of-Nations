 ##### THE HAGUE CONFERENCE
 ### THC - Option 1 (ENG is alone, still on the Home Islands)
 # ENDING EVENTS - 521 556
 umc_ger.500.t:0 "Die Haager Konferenz"
 umc_ger.500.d:0 "Es waren harte Kriegsjahre. Lange, harte Jahre ständiger Luftangriffe der Luftwaffe und Seegefechte mit der Kriegsmarine. Jahre deutscher strategischer Bombenangriffe, in denen unsere Bürger in ständiger Angst lebten. In Europa waren die von uns unterstützten Widerstandsbewegungen erfolgreich, doch sie galten als gescheitert, als die sowjetische Ostfront zu fallen begann und die Deutschen nach Moskau und darüber hinaus vordrangen. \n\nNun erreicht uns aus Berlin die Nachricht, dass die Deutschen an Friedensverhandlungen interessiert sind. Diesen vorausgegangen ist der totale Sieg über die Sowjetunion und die faktische Beseitigung der einzigen potentiellen Bedrohung durch das Großdeutsche Reich. \n\nAuf dieser sogenannten Haager Konferenz soll das endgültige Bild des Nachkriegseuropas und -afrikas, Fragen des Commonwealth sowie unsere eigene Rolle in der deutschen Neuordnung debattiert werden."
 umc_ger.500.a:0 "Ohne die Sowjets sind wir in diesem Kampf wirklich allein. Dies ist unsere letzte Chance, Frieden zu schließen."
 umc_ger.500.b:0 "Wir werden bis zum Ende kämpfen!"
 umc_ger.500.c:0 "Was? Die Deutschen bieten Frieden an? Das ist nur ihre Propaganda. Mehr nicht!"
 
 umc_ger.501.t:0 "[FROM.GetName] lehnt Verhandlungen ab"
 umc_ger.501.d:0 ""
 umc_ger.501.a:0 "Dann müssen wir die Sealion-Vorbereitungen erneuern."
 
 umc_ger.502.t:0 "[ENG.GetName] nimmt an der Haager Konferenz teil"
 umc_ger.502.d:0 "Da es für die beiden germanischen Nationen keinen Grund gibt, den Kampf fortzusetzen, da wir in Europa eindeutig siegreich sind, hat [ENG.GetLeader] zugestimmt, alle feindseligen Handlungen einzustellen und an der Haager Konferenz teilzunehmen. Allein die Tatsache, dass der Hauptvertreter des Britischen Empires den Verhandlungen über UNSER Land zugestimmt hat, gibt uns relative Gewissheit, dass die Briten alle unsere Forderungen erfüllen werden.\n\nObwohl unser großes Ziel der Kampf gegen die Kommunisten im Osten war, haben uns die Briten nach dem Weltkrieg großen Schaden zugefügt. Sie haben unsere großartige Nation gedemütigt, und das Deutsche Volk hat schwer gelitten.\n\nAußerdem entschieden sie sich, statt ihre Waffen niederzulegen, sobald wir Frankreich eroberten, zu kämpfen und fügten unserem Kampf gegen den Bolschewismus ständigen Schaden zu. Viele großartige Seeleute und Piloten starben im Versuch, unser Land zu schützen, unsere Versorgungslinien zu schützen und unseren Himmel frei von feindlichen Bombern zu halten.\n\nDaher werden selbst die größten Forderungen an sie als möglich angesehen. Das Großdeutsche Reich ist eine führende Macht in Europa und die Briten MÜSSEN sich fügen ... oder untergehen."
 umc_ger.502.a:0 "Ausgezeichnet. Hören wir, was unsere italienischen Verbündeten dazu zu sagen haben."
 umc_ger.502.a_EXPL:0 "[ITA.GetFlag]§H[ITA.GetName]§! präsentiert uns ihre §HForderungen§! über [ENG.GetFlag]§H[ENG.GetName]§!. Wir können ihre Forderungen entweder vollständig akzeptieren oder in verschiedenen Stufen reduzieren."
 umc_ger.502.b:0 "Ausgezeichnet. Die Verhandlungen beginnen!"
 umc_ger.502.b_EXPL:0 "Wir werden in der Lage sein, unterschiedlich große §HForderungen§! auf [ENG.GetFlag]§H[ENG.GetName]§! zu erlassen."
 GER_not_inviting_ITA_will_also_EXPL1:0 "\n[ITA.GetFlag]§H[ITA.GetName]§! ist mit uns in einer Fraktion, ist keine §HPuppet§! und hat mehr als §H50%§! Kriegsbeteiligung. Daher hat dieses Ereignis auch die folgende §REffect§!:"
