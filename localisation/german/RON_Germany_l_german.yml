 ### QUESTION OF BOSNIA
 umc_ger.427.t:0 "Frage von [BOS.GetName]"
 umc_ger.427.d:0 "Von den neuen Satellitenstaaten im ehemaligen Jugoslawien verzeichnet der Staat [BOS.GetName] die schlechtesten Ergebnisse, was die Rohstoff- und Arbeitskräfteversorgung betrifft. Viele meinen, dass seine Gebiete unter der Kontrolle von [CRO.GetName] und [SER.GetName] nützlicher wären.\n\nEin Befehl genügt, und der Staat wird aufgelöst und seine Ressourcen werden unter den beiden anderen aufgeteilt."
 umc_ger.427.a:0 "Teilen Sie es zwischen Kroatien und Serbien auf."
