 ##### AIR BRANCH
 GER_expand_the_luftwaffe:0 "Ausbau der Luftwaffe"
 GER_expand_the_luftwaffe_desc:0 "Da der Versailler Vertrag uns den Aufbau einer Luftwaffe untersagte, konnten wir nur eine kleine Gruppe von Piloten heimlich in Lipezk in der Sowjetunion ausbilden. Nachdem der Vertrag nun offiziell für gescheitert erklärt wurde, müssen wir uns auf den Wiederaufbau einer starken Luftwaffe konzentrieren, um gegen die RAF eine Chance zu haben."
 GER_modernize_the_jagdwaffe:0 "Modernisierung der Jagdwaffe"
 GER_modernize_the_jagdwaffe_desc:0 "Das Rückgrat der Luftwaffe, die Jagdwaffe, benötigt ein neues Jagdflugzeug. Messerschmitt und Focke-Wulf werden versuchen, neue Jagdflugzeugmodelle zu entwickeln, die am Himmel über Europa ihresgleichen suchen."
 GER_finish_messerchsmitt_jet_model:0 "Finish Messerschmitt Jet Model"
 GER_finish_messerchsmitt_jet_model_EXPL1:0 "Ermöglicht die Produktion von §HMe 262 &#39;Schwalbe&#39;§!.\n"
 GER_finish_messerchsmitt_jet_model_EXPL2:0 "§HWalter &#39;Nowi&#39; Nowotny§! wird zum Jagdflieger-Ass.\n§HHeinrich &#39;Pritzl&#39; Bär§! wird zum Jagdflieger-Ass.\nDas §HKommando Nowotny§! Jagdgeschwader wird in Brandenburg gegründet."
 GER_finish_messerchsmitt_jet_model_desc:0 "Mit der Anfrage des Reichsluftfahrtministeriums nach einem Düsenflugzeug mit einer Flugdauer von einer Stunde und einer Geschwindigkeit von mindestens 850 km/h begannen die Arbeiten am Projekt 1065, später bekannt als Me 262. Die Me 262 ist heute der erste flugfähige Düsenjäger der Welt. Entwickelt von Messerschmitt und angetrieben von zwei BMW-003-Triebwerken, wird uns ihre überlegene Technologie und Bewaffnung in jedem Luftkampf einen enormen Vorteil verschaffen."
 
 GER_the_amerikabomber_project:0 "Das Amerikabomber-Projekt"
 GER_the_amerikabomber_project_desc:0 "Der Amerikabomber ist ein ehrgeiziges Projekt. Ziel ist der Bau moderner Bomber, die einen Luftkampf über dem amerikanischen Kontinent führen und dort wichtige amerikanische Ziele wie Ölanlagen und Rüstungsfabriken bombardieren können."
 GER_above_the_atlantic:0 "Über dem Atlantik"
 GER_above_the_atlantic_EXPL:0 "Ermöglicht die Produktion von §HMe 264 &#39;Amerikabomber&#39;§!.\n"
 GER_above_the_atlantic_desc:0 "Mit der Entwicklung des neuesten strategischen Bombers werden wir eine weitere Langstreckenvariante schaffen, die in der Lage sein wird, den amerikanischen Kontinent anzugreifen."
 GER_long_range_transport_planes:0 "Langstreckentransportflugzeuge"
 GER_long_range_transport_planes_desc:0 "Da unsere Bomber nun bereit für den Atlantikflug sind, können wir uns nun auf die Entwicklung neuer Transportflugzeugmodelle konzentrieren, um den Luftkampf vollständig über den amerikanischen Kontinent zu verlagern. Auch wenn dies zeitaufwändig und kostspielig sein wird, werden sich die Ergebnisse sicherlich auszahlen."
 GER_expand_fallschirmjager_battalions:0 "Erweitern Sie die Fallschirmjäger-Bataillone"
 GER_expand_fallschirmjager_battalions_desc:0 "Da unsere Feinde zur See zweifellos überlegen sind, können wir keine Invasionen zur See ohne schwere Verluste durchführen. Daher bleibt uns nur eine Invasion aus der Luft, um Inseln zu sichern. Um jedoch erfolgreich zu sein, müssen wir unsere Fallschirmjägertruppen ausbauen."

 GER_innovate_naval_bomber_models:0 "Innovative Marinebombermodelle"
 GER_innovate_naval_bomber_models_desc:0 "Um die Operation Sealion starten zu können, müssen wir den Ärmelkanal kontrollieren. Da unsere Marine dies nicht alleine schaffen kann, benötigen wir Luftunterstützung. Die Erforschung neuer Marinebombertypen wird uns helfen, die britische Flotte zu zerstören."

 ##### ARMY BRANCH
 GER_deutsches_heer:0 "Deutsches Heer"
 GER_deutsches_heer_desc:0 "Die deutsche Armee gehört seit langem zu den am besten ausgebildeten der Welt. Wir werden unserem Erbe treu bleiben und dafür sorgen, dass die Wehrmacht keine einzige Schlacht verliert."
 GER_treaty_with_the_ussr:0 "Vertrag mit der UdSSR"
 GER_treaty_with_the_ussr_desc:0 "Wir können einen neuen Forschungsvertrag mit der Sowjetunion abschließen, um vor allem bessere Panzer zu entwickeln. Wenn sie einverstanden sind, können wir die Panzerschule in Kama wiedereröffnen, die wir 1933 geschlossen haben. Die sowjetische Zusammenarbeit bedeutet natürlich, dass auch sie von den Innovationen profitieren wird …"
 GER_gather_foreign_equipment:0 "Sammeln Sie ausländische Ausrüstung"
 GER_gather_foreign_equipment_desc:0 "Die Schlachtfelder sind überfüllt mit verlassenen Waffen und Panzern. Mit ein wenig Aufwand können wir sie für uns im Kampf gegen unseren Feind einsetzen."
 
 GER_military_maneuvers_in_the_rhineland:0 "Militärmanöver im Rheinland"
 GER_military_maneuvers_in_the_rhineland_desc:0 "Nachdem wir nun die Kontrolle über das Rheinland erlangt haben, sollten wir den Alliierten zeigen, dass es die richtige Entscheidung war, nicht auf einer entmilitarisierten Zone zu bestehen. Große Militärmanöver sollten Frankreich unsere Macht demonstrieren und gleichzeitig unsere Truppen und Generäle vorbereiten."
 
 GER_perfected_blitzkrieg_doctrine:0 "Perfektionierte Blitzkrieg-Doktrin"
 GER_perfected_blitzkrieg_doctrine_desc:0 "Die deutsche Doktrin der mobilen Kriegsführung wurde mit dem Rat eines der größten deutschen Generäle entwickelt und erweitert. Sie passt perfekt zur modernen Kriegsführung und wir müssen sie noch weiter ausbauen."
 GER_sonderkraftfahrzeug_mechanized_models:0 "Sonderkraftfahrzeug Mechanisierte Modelle"
 GER_sonderkraftfahrzeug_mechanized_models_desc:0 "Sonderkraftfahrzeug ist die Bezeichnung für die Kampfmittelausstattung unserer Reichsarmee. Unter anderem können wir die Entwicklung moderner Halbkettenfahrzeuge vorantreiben, die in schwierigem Gelände eingesetzt werden können. Diese Maschinen können auch mit MGs, Flugabwehrwaffen oder sogar Panzerabwehrkanonen ausgerüstet werden."
 GER_improve_infantry_equipment:0 "Infanterieausrüstung verbessern"
 GER_improve_infantry_equipment_desc:0 "Unsere Männer sind große Helden und wir müssen sicherstellen, dass sie im Kampf ihr volles Potenzial entfalten können. Dafür benötigen sie eine funktionierende und hochwertige Ausrüstung, die wir noch entwickeln müssen."
 GER_entwicklung_project:0 "Entwicklungsprojekt"
 GER_entwicklung_project_desc:0 "Unser größter Vorteil gegenüber unseren Gegnern ist der effektive Einsatz hochentwickelter Panzer. Wir müssen dafür sorgen, dass dies auch so bleibt, indem wir stets über aktuelle Versionen verfügen."
 
 ##### NAVAL BRANCH
 GER_naval_rearmament_EXPL:0 "Füge §G2§! Gebäudeplätze und §H2 Ausgewählte Gebäude§! in §HNorddeutschland§! hinzu.\n§GVerbessert§! die Wirkung des Fokus &#39;§HKarl Dönitz&#39; &#39;Rudeltaktik&#39;§!&#39; oder &#39;§HErich Raeders &#39;Hochseeflotte&#39;§!&#39;.\n"
 GER_naval_rearmament_accepted_plan_z_green_EXPL:0 "Sie haben den §HPlan Z§! des Lesers §GAkzeptiert§!, daher wird dieser Fokus auch folgende §GAWirkung§! haben:\n"
 GER_naval_rearmament_accepted_plan_z_red_EXPL:0 "Sie haben den §RAkzeptierten§! Leser-§HPlan Z§!, daher hat die Fertigstellung dieses Fokus vor dem Fokus &#39;§HErich Raeders &#39;Hochseeflotte&#39;§!&#39; auch folgende §REffect§!:\n"
 GER_naval_rearmament_rejected_plan_z_green_EXPL:0 "Sie haben den §HPlan Z§! des Lesers §GRejected§!, daher wird dieser Fokus auch folgende §GAEffect§! haben:\n"
 GER_naval_rearmament_rejected_plan_z_red_EXPL:0 "Sie haben den §HPlan Z§! des Lesers §RAbgelehnt§! Daher hat die Fertigstellung dieses Schwerpunkts vor dem Schwerpunkt &#39;§HKarl Dönitz&#39; &#39;Rudeltaktik&#39;§!&#39; auch folgende §REinwirkung§!:\n"
 
 GER_karl_donitzs_rudeltaktik:0 "Karl Dönitz&#39; „Rudeltaktik“"
 GER_karl_donitzs_rudeltaktik_desc:0 "Karl Dönitz‘ Hauptaugenmerk in der Seekriegsführung liegt auf dem Einsatz von U-Booten als Hauptbesatzung. Wenn wir uns voll und ganz auf unsere U-Boote konzentrieren, können wir die feindlichen Seetransporter effizienter zerstören."
 GER_ubootwaffe:0 "U-Bootwaffe"
 GER_ubootwaffe_desc:0 "Das Studium der U-Boot-Kriegsführung, ihre Perfektionierung und die Verbesserung ihrer Produktionslinien gibt uns die Möglichkeit, unsere U-Boote in Massenproduktion herzustellen und unsere Designs und Taktiken zu perfektionieren."
 
 GER_erich_readers_hochseeflotte:0 "Erich Raeders „Hochseeflotte“"
 GER_erich_readers_hochseeflotte_desc:0 "Erich Raeder und [GER.GetLeader] träumen von einer großen deutschen Marine, die alle Weltmeere beherrschen kann. Mit erheblichem Aufwand ist dies realisierbar."
 GER_graf_zepelin_project:0 "Graf Zeppelin Projekt"
 GER_graf_zepelin_project_desc:0 "Die Graf Zeppelin wird der erste deutsche Flugzeugträger und der neue Stolz der Reichsmarine sein. Ihre Fertigstellung wird jedoch alles andere als einfach sein, da unsere Ingenieure nur über begrenzte Erfahrung mit dem Bau dieser Schiffstypen verfügen."
 GER_an_independent_seeluftaffe:0 "Eine unabhängige Seeluftwaffe"
 GER_an_independent_seeluftaffe_EXPL1:0 "Fordert Lizenzen für §HCarrier Fighter§! und §HCarrier Naval Bomber§! von entweder [ENG.GetFlag]§H[ENG.GetName]§!, [FRA.GetFlag]§H[FRA.GetName]§!, [ITA.GetFlag]§H[ITA.GetName]§!, [USA.GetFlag]§H[USA.GetName]§! oder [JAP.GetFlag]§H[JAP.GetName]§! an, wenn sie mit uns im Frieden leben, eine ähnliche Regierung haben und über die gewünschte Technologie verfügen.\n"
 GER_an_independent_seeluftaffe_EXPL2:0 "Wenn keiner der beiden die §RBedingungen§! erfüllt, hat das Ereignis folgende Auswirkungen:\n"
 GER_an_independent_seeluftaffe_desc:0 "Wir verfügen über einen neu gebauten Flugzeugträger der Graff-Zeppelin-Klasse, haben aber keine Erfahrung mit Flugzeugen und sind auf die Unterstützung der Luftwaffe in Übersee angewiesen. Dies wird sich ändern, wenn wir die Hilfe unserer japanischen Verbündeten in Anspruch nehmen und lernen, unsere eigenen trägergestützten Flugzeuge effizient zu bauen."
 GER_retrain_the_naval_staff:0 "Umschulung des Marinepersonals"
 GER_retrain_the_naval_staff_desc:0 "Durch die Umschulung unseres Marinepersonals erhält unsere Marine wertvolle Erfahrungen und kann mehr und bessere Marinekommandeure ausbilden."
 
 GER_bismarck_class_battleship:0 "Schlachtschiff der Bismarck-Klasse"
 GER_bismarck_class_battleship_EXPL:0 "Fügen Sie §H2§! „Bismarck-Klasse“ §HSchlachtschiffe§! zu unserer Produktion hinzu.\n"
 GER_bismarck_class_battleship_desc:0 "Die Schlachtschiffe der Kriegsmarine sind veraltet. Sie sind das Herzstück unserer Marine, und wenn wir jemals die französisch-britische Marine herausfordern wollen, müssen wir die modernsten Schlachtschiffe aller Zeiten entwickeln. Glücklicherweise ist die Bismarck-Klasse für diese Rolle am besten geeignet."
 GER_expand_the_cruiser_fleet:0 "Erweitern Sie die Kreuzerflotte"
 GER_expand_the_cruiser_fleet_desc:0 "Die Modernisierung unserer Flotte hat für uns oberste Priorität und wir sollten zunächst mit der Verbesserung unserer Kreuzer beginnen."
 GER_plan_z:0 "Plan Z"
 GER_plan_z_EXPL:0 "   Erhöhen Sie die §HDockyard-Ausgabe§ deutlich!.\n"
 GER_plan_z_desc:0 "Plan Z ist die Bezeichnung für die geplante Neuausrüstung und Erweiterung der Kriegsmarine. Die Flotte soll der Seemacht Großbritanniens Paroli bieten und bis 1945 fertiggestellt sein."
 
 GER_kriegsmarine_reborn:0 "Kriegsmarine Reborn"
 GER_kriegsmarine_reborn_desc:0 "Unsere Marine erlebt eine Renaissance. Neue moderne Schlachtschiffe verlassen die Häfen, unerschrockene U-Boot-Rudel durchstreifen das Meer. Unsere Marine ist wieder eine Macht, mit der man rechnen muss."
 GER_further_dockyard_expansion:0 "Weiterer Ausbau der Werft"
 GER_further_dockyard_expansion_desc:0 "Durch die Erweiterung unserer Werften auf dem Festland können wir Schiffe schneller und effizienter bauen."
 GER_expand_marine_stostrupp_battalions:0 "Erweitern Sie die Marine-Stoßtrupp-Bataillone"
 GER_expand_marine_stostrupp_battalions_desc:0 "Das Land unserer Feinde wird durch die Meere geschützt. Wir werden unseren Soldaten eine spezielle Ausbildung zukommen lassen, damit sie besser mit Seeinvasionen umgehen können, die heute auf unserem Weg zum Sieg entscheidend sind."
 GER_secure_transoceanic_lines:0 "Sichere transozeanische Linien"
 GER_secure_transoceanic_lines_desc:0 "Unsere Verbündeten befinden sich weit über dem Meer. Wir müssen unsere Fähigkeiten zur Schiffsbegleitung verbessern, um stabile und sichere transozeanische Routen zu gewährleisten."

 ##### ITA WAR BRANCH
 GER_ITA_oppose_mussolinis_ambitions:0 "Widersetzen Sie sich Mussolinis Ambitionen"
 GER_ITA_oppose_mussolinis_ambitions_desc:0 "Das Verhältnis zwischen Hitler und Mussolini war kompliziert und sogar feindselig. Hitler bewunderte Mussolini bedingungslos, während Mussolini seiner Frustration über Hitler und dessen Handeln viel eher Ausdruck gab. Dies soll ein Ende haben. Wir werden unsere Beziehungen zu Italien beenden und den Staat offiziell verurteilen. "
 GER_ITA_increase_our_influence_in_austria:0 "Unseren Einfluss in Österreich erhöhen"
 GER_ITA_increase_our_influence_in_austria_desc:0 ""
 GER_ITA_prepare_to_cross_the_alps:0 "Bereiten Sie sich auf die Alpenüberquerung vor"
 GER_ITA_prepare_to_cross_the_alps_desc:0 "Die Alpen sind eine gefährliche Region. Viele Männer sind schon beim Versuch, sie zu durchqueren, gestorben, und noch viel mehr werden bei der Offensive in Norditalien sterben. Wir werden jeden Aspekt unseres Alpengebiets ausbauen, von Straßen bis zu Luftwaffenstützpunkten. Wir werden diese verdammten Berge in ihrer Gesamtheit erobern."
 GER_ITA_truncate_italian_dream:0 "Italienischer Traum verkürzen"
 GER_ITA_truncate_italian_dream_desc:0 ""
 GER_ITA_our_access_to_mediterranean_sea:0 "Unser Zugang zum Mittelmeer"
 GER_ITA_our_access_to_mediterranean_sea_desc:0 ""
 GER_ITA_take_out_the_fascist_pretenders:0 "Beseitigen Sie die faschistischen Prätendenten"
 GER_ITA_take_out_the_fascist_pretenders_desc:0 ""
 
 ##### YUG ALLY BRANCH
 GER_YUG_guarantee_pauls_regime:0 "Garantie für das Regime von Paul"
 GER_YUG_guarantee_pauls_regime_desc:0 ""
 GER_YUG_slovenian_high_quality_business:0 "Slowenisches Qualitätsunternehmen"
 GER_YUG_slovenian_high_quality_business_desc:0 ""
 GER_YUG_step_up_our_demands:0 "Unsere Forderungen erhöhen"
 GER_YUG_step_up_our_demands_desc:0 ""
 GER_YUG_integrate_yugoslavian_economy:0 "Integration der jugoslawischen Wirtschaft"
 GER_YUG_integrate_yugoslavian_economy_desc:0 ""
 GER_YUG_untere_reichsterritorien:0 "Untere Reichsterritorien"
 GER_YUG_untere_reichsterritorien_desc:0 ""
 
 ##### YUG WAR BRANCH
 GER_YUG_demand_slovenia:0 "Nachfrage Slowenien"
 GER_YUG_demand_slovenia_EXPL1:0 "[ENG.GetFlag]§H[ENG.GetName]§! und [FRA.GetFlag]§H[FRA.GetName]§! werden über das Schicksal von §HSlovenia§! entscheiden.\nWenn sie und [YUG.GetFlag]§H[YUG.GetName]§! sich §GGeeinigt§!, §HSlovenia§! an uns zu übergeben, wird das Ereignis die folgenden §GEffects§! haben:\n"
 GER_YUG_demand_slovenia_EXPL2:0 "Wenn sie und [YUG.GetFlag]§H[YUG.GetName]§! sich §RRefuse§! weigern, §HSlovenia§! an uns weiterzugeben, hat das Ereignis die folgenden §REffects§!:\n"
 GER_YUG_demand_slovenia_desc:0 "Im Vertrag von Saint-Germain-en-Laye wurden viele historische österreichische Gebiete an Nachfolgestaaten abgetreten. Nach der Wiedervereinigung Österreichs mit Deutschland ist es an der Zeit, diese Ungerechtigkeiten zu beenden. Die historischen Provinzen Krain und Steiermark, heute Slowenien, müssen zurückgeholt werden."
 GER_YUG_first_ljubljana_award:0 "Erster Ljubljana-Preis"
 GER_YUG_first_ljubljana_award_desc:0 "Die heuchlerischen westlichen Mächte predigten nationale Selbstbestimmung und überließen gleichzeitig viele Minderheiten der serbischen Herrschaft. Wir sind in der Lage, dieses historische Unrecht zu korrigieren und gleichzeitig Freunde zu gewinnen. Gegenüber denen, die sich in der europäischen Ordnung auf unsere Seite stellen wollen, können wir sehr großzügig sein."
 GER_YUG_fate_of_yugoslavia:0 "Schicksal Jugoslawiens"
 GER_YUG_fate_of_yugoslavia_EXPL1:0 "Wir können entweder [YUG.GetFlag]§H[YUG.GetName]§! vollständig annektieren, [CRO.GetFlag]§H[CRO.GetName]§! als unseren Marionettenstaat einrichten und den Rest annektieren oder sowohl [YUG.GetFlag]§H[YUG.GetName]§! als auch [CRO.GetFlag]§H[CRO.GetName]§! unter Kontrolle bringen.\n"
 GER_YUG_fate_of_yugoslavia_EXPL2:0 "Durch die Nutzung der jugoslawischen Goldreserven werden die Kosten für HMEFO-Rechnungen gesenkt."
 GER_YUG_fate_of_yugoslavia_desc:0 "Der jugoslawische Staat war immer ein künstliches Konstrukt, und die zentrale Autorität beginnt zu bröckeln. Wir müssen eingreifen und die Ordnung wiederherstellen. Die einzige Frage, die sich uns stellt, ist, wie wir dies am besten erreichen können."
 
 ##### ANSCHLUSS and UNDER BRANCH
 GER_anschluss_EXPL1:0 "Wir werden den pro-deutschen Teil von [AUS.GetFlag]§H[AUS.GetName]§! §GAnnektieren§! und dem Rest §Rden Krieg erklären§!.\n"
 GER_anschluss_EXPL2:0 "Erhalte §H12§! Heimwehr-Einheiten in Österreich.\n"
 GER_nibelungen_steyr_werke_tank_plant:0 "Tankwerk Nibelungen Steyr-Werke"
 GER_nibelungen_steyr_werke_tank_plant_desc:0 "Panzer sind für den Sieg in bewaffneten Konflikten unerlässlich. Wir werden die Steyr-Werke mit dem Bau des weltgrößten Panzermodells Nibelungen beauftragen. Auf dieser Grundlage werden wir eine mächtige und unbezwingbare Panzerwaffe bauen!"
 
 ##### POL, ENG, FRA, SWI WAR BRANCH
 GER_reassert_eastern_claims:0 "Bekräftigung der östlichen Ansprüche"
 GER_reassert_eastern_claims_desc:0 "Im Ersten Weltkrieg ging mit der Wiederauferstehung Polens und der Übergabe des Memellandes an Litauen ein großer Teil des deutschen Territoriums im Osten verloren. Beiden Nationen wird ein Ultimatum gestellt, doch zumindest Polen wird sich wahrscheinlich nicht bloßen Worten beugen."
 GER_operation_weserubung:0 "Operation Weserübung"
 GER_operation_weserubung_desc:0 ""
 
 GER_geheime_staatspolizei:0 "Geheime Staatspolizei"
 GER_geheime_staatspolizei_desc:0 "Die Gestapo, die Staatspolizei, wurde 1933 von Hermann Göring durch die Zusammenlegung der verschiedenen Sicherheitspolizeibehörden Preußens zu einer Organisation gegründet. Ab dem 20. April 1934 unterstand sie dem Reichsführer der Schutzstaffel (SS), Heinrich Himmler, der 1936 von Hitler zum Chef der Deutschen Polizei ernannt wurde."
 GER_incorporate_gestapo_into_divisions:0 "Eingliederung der Gestapo in die Divisionen"
 GER_incorporate_gestapo_into_divisions_EXPL:0 "Aktiviert §HGestapo-Training§!\n§HMilitärpolizei\n Urban§!\n Angriff: §G+5%§!\n Bewegung: §G+10%§!\n"
 GER_incorporate_gestapo_into_divisions_desc:0 ""
 GER_resettle_polish_citizens:0 "Polnische Bürger umsiedeln"
 GER_resettle_polish_citizens_desc:0 "Die Germanisierung unserer neu gewonnenen Gebiete muss weitergehen. Um unserer überlegenen Rasse einen Platz zu schaffen, müssen wir die einheimischen polnischen Bürger umsiedeln und sie hinter dem Uralgebirge ansiedeln."
 GER_generalgouvernement_final_germanization:0 "Generalgouvernement Endgültige Germanisierung"
 GER_generalgouvernement_final_germanization_TRIG:0 "Wir oder unsere Puppen kontrollieren §HDanzig§!, §HPoznan§!, §HPlock§!, §HLodz§!, §HKielce§!, §HKrakow§!, §HLublin§! und §HWarzsawa§!."
 GER_generalgouvernement_final_germanization_desc:0 "Die ursprünglich polnischen Gebiete werden als Erstes in unser Großdeutsches Reich integriert. Dies ist der Beginn, aber nicht das Ende unserer Expansion nach dringend benötigtem Lebensraum."
 
 ##### AROUND MAGINOT BRANCH, WAR WITH ENG, FRA, SWI BRANCH
 GER_war_with_britain:0 "Krieg mit Großbritannien"
 GER_war_with_britain_desc:0 ""
 GER_rudolf_hesss_mission:0 "Rudolf Hess&#39; Mission"
 GER_rudolf_hesss_mission_EXPL:0 "Wenn [ENG.GetFlag]§H[ENG.GetName]§! Friedensverhandlungen §Gakzeptiert§!, können wir:\n Frieden mit [ENG.GetFlag]§H[ENG.GetName]§!.\n Unterschiedlich große territoriale §HForderungen§! stellen.\n Ihre §HNehemalige Nichteinmischung§! in unsere europäischen Angelegenheiten sicherstellen.\nWenn [ENG.GetFlag]§H[ENG.GetName]§! Friedensverhandlungen §Rablehnt§!, hat das Ereignis die folgenden §REffects§!:\n"
 GER_rudolf_hesss_mission_desc:0 "Der Krieg in Europa ist gewonnen, und es besteht keine Notwendigkeit, den Kampf mit einer anderen germanischen Rasse fortzusetzen. Wir werden Hess&#39; Option akzeptieren und ihn offiziell nach Großbritannien schicken, um einen Friedensvertrag anzubieten. Wir werden unseren Sieg behalten, und Großbritannien wird das Empire behalten."
 GER_war_with_france_tt:0 "Krieg mit Frankreich"
 GER_war_with_france_tt_desc:0 "Nachdem Deutschland eine zufriedenstellende Lösung für die Frage seiner Ostgrenze gefunden hat, ist es nun an der Zeit, unsere Aufmerksamkeit nach Westen zu richten. Der Verlust Elsass-Lothringens ist ein Schandfleck auf der Ehre des deutschen Volkes, und nur durch einen gerechten und rechtmäßigen Krieg können wir dies rächen."
 
 GER_integrate_switzerland:0 "Integriere die Schweiz"
 GER_integrate_switzerland_desc:0 ""
 GER_exploit_swiss_wealth:0 "Schweizer Vermögen ausbeuten"
 GER_exploit_swiss_wealth_desc:0 ""
 
 ##### CZE WAR BRANCH
 GER_CZE_demand_sudetenland:0 "Nachfrage Sudetenland"
 GER_CZE_demand_sudetenland_EXPL1:0 "[ENG.GetFlag]§H[ENG.GetName]§! und [FRA.GetFlag]§H[FRA.GetName]§! werden über das Schicksal von §HSudetenland§! entscheiden.\nWenn sie und [CZE.GetFlag]§H[CZE.GetName]§! sich §GGeeinigt§!, §HSudetenland§! an uns zu übergeben, wird das Ereignis die folgenden §GEffects§! haben:\n"
 GER_CZE_demand_sudetenland_EXPL2:0 "Wenn sie und [CZE.GetFlag]§H[CZE.GetName]§! sich §RReweigern§!, §HSudetenland§! an uns zu übergeben, hat das Ereignis die folgenden §REffects§!:\n"
 GER_CZE_demand_sudetenland_desc:0 "Das Schicksal der Sudetendeutschen war eines der schlimmsten Ungerechtigkeiten, die der Versailler Vertrag mit sich brachte. Sie müssen unter unseren Schutz gestellt werden, ungeachtet der tschechischen Einwände."
 GER_CZE_fate_of_czechoslovakia:0 "Schicksal der Tschechoslowakei"
 GER_CZE_fate_of_czechoslovakia_EXPL1:0 "Wir werden in der Lage sein, [CZE.GetFlag]§H[CZE.GetName]§! vollständig anzugliedern, [SLO.GetFlag]§H[SLO.GetName]§! als §HPuppet§! einzurichten oder [SLO.GetFlag]§H[SLO.GetName]§! [HUN.GetFlag]§H[HUN.GetName]§! anzubieten.\n"
 GER_CZE_fate_of_czechoslovakia_EXPL2:0 "Durch die Nutzung der tschechoslowakischen Goldreserven werden die Kosten für HMEFO-Wechsel gesenkt."
 GER_CZE_fate_of_czechoslovakia_desc:0 "Es ist an der Zeit, die alten tschechischen Länder unter denjenigen aufzuteilen, die sie angemessen regieren können. Wir sollten auch die Schaffung eines separaten slowakischen Marionettenstaates im Osten in Erwägung ziehen."
 GER_CZE_sudetenlandische_treibstoffwerke_ag:0 "Sudetenländische Treibstoffwerke AG"
 GER_CZE_sudetenlandische_treibstoffwerke_ag_desc:0 "Die Öl- und Gasvorkommen in Tschechien sind gering und liegen vor allem in Südmähren. Wir werden die Sudetenländische Treibstoffwerke AG, eine Raffinerie in Litvínov, gründen, um aus tschechischer Braunkohle brauchbare Treibstoffe herzustellen. Ihr Kapital beträgt 100 Millionen Reichsmark, wovon 98 % den Hermann-Göring-Werken gehören."
 GER_CZE_the_man_with_the_iron_heart:0 "Der Mann mit dem eisernen Herzen"
 GER_CZE_the_man_with_the_iron_heart_desc:0 "Die Tschechen sabotieren ständig unsere Kriegsproduktion und es gibt nur einen Mann, der dem Abhilfe schaffen kann. Der Mann mit dem eisernen Herzen, Reinhard Heydrich, wird zum Beschützer Böhmens und Mährens und wird diesem Chaos ein Ende setzen."
 GER_CZE_czech_final_germanization:0 "Tschechische Endgermanisierung"
 GER_CZE_czech_final_germanization_desc:0 ""
 
 ##### VIENNA AWARDS BRANCH
 GER_second_vienna_award_EXPL:0 "Entscheidet über das Schicksal von §HTransylvania§!.\nSie können:\n [HUN.GetFlag]§H[HUN.GetName]§! nur §H[76.GetName]§! geben.\n [HUN.GetFlag]§H[HUN.GetName]§! ganz §HTransylvania§! geben.\n §HTransylvania§! für [ROM.GetFlag]§H[ROM.GetName]§! behalten."
 
 ##### TRAUTMAN MEDIATION BRANCH
 GER_trautmann_mediation:0 "Trautmann Mediation"
 GER_trautmann_mediation_EXPL1:0 "Wenn sie unser Angebot der §HVermittlung§! annehmen, wird das Angebot an [CHI.GetFlag]§H[CHI.GetName]§! weitergeleitet. Wenn sie es ebenfalls annehmen, hat das Ereignis die folgenden §GEffects§!:\n"
 GER_trautmann_mediation_EXPL2:0 "Zwischen [JAP.GetFlag]§H[JAP.GetName]§! und [CHI.GetFlag]§H[CHI.GetName]§! wird ein §HAntikommunistischer Kooperationspakt§! geschlossen.\n"
