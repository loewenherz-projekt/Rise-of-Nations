 GER_welthauptstadt_germania_I1:0 "Welthauptstadt Germania"
 GER_welthauptstadt_germania_I1_desc:0 "Die von Albert Speer entworfene und vom Führer persönlich genehmigte Welthauptstadt Germania wird ein edles und modernes Beispiel deutscher Größe sein. Von der Großen Halle bis zur Siegessäule wird ein modernes Straßen- und Schienennetz führen. Die Stadt wird mit modernster Ausstattung, den luxuriösesten Restaurants und den schönsten Parks ausgestattet sein. All dies zum Ruhm des Führers und des deutschen Volkes und der Nation."
 GER_welthauptstadt_germania_I2:0 "Welthauptstadt Germania"
 GER_welthauptstadt_germania_I2_desc:0 "Die von Albert Speer entworfene und vom Führer persönlich genehmigte Welthauptstadt Germania wird ein edles und modernes Beispiel deutscher Größe sein. Von der Großen Halle bis zur Siegessäule wird ein modernes Straßen- und Schienennetz führen. Die Stadt wird mit modernster Ausstattung, den luxuriösesten Restaurants und den schönsten Parks ausgestattet sein. All dies zum Ruhm des Führers und des deutschen Volkes und der Nation."
 
 GER_Oceanic_Line_I:0 "Sichere Ozeankonvois"
 GER_Oceanic_Line_I_desc:0 "Beim Handel mit oder bei der Seeinvasion in weit entfernte Länder ist die Sicherheit der Konvois von größter Bedeutung. Deutschland hat seine Schiffe für diese Aufgabe mit der entsprechenden Ausrüstung ausgestattet."
 
 
