 umc_gmo.124.d:0 "Unsere Politiker wurden heute Morgen von deutschen Botschaftern angesprochen, die sich klar mit den Forderungen von [GER.GetLeader] auseinandersetzten. Sie forderten erhebliche Eigentumsrechte an unseren Ölfeldern in der Muntenia.\n\nDa die Weltlage erneut gefährlich instabil wird und uns die Sowjetunion im Nacken sitzt, haben uns höchste Persönlichkeiten unserer Politik nahegelegt, [ROM.GetLeader] zumindest deutsche Angebote in Betracht zu ziehen."
