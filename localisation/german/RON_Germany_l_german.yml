 ##### Von Rundsted's Mission
 umc_gmo.20:0 "Von Rundstedts zweiter Militäreinsatz."
 umc_gmo.20.t:0 "Von Rundstedts zweiter Militäreinsatz."
 umc_gmo.20.d:0 ""
 umc_gmo.20.a:0 "Dies wird unsere Armee erheblich stärken."
 
 umc_gmo.21:0 "Beamte werden ausgebildet."
 umc_gmo.21.t:0 "Beamte werden ausgebildet."
 umc_gmo.21.d:0 ""
 umc_gmo.21.a:0 "Harika."
 
 umc_gmo.26:0 "Von Rundstedts Mission ist beendet."
 umc_gmo.26.t:0 "Von Rundstedts Mission ist beendet."
 umc_gmo.26.d:0 ""
 umc_gmo.26.a:0 "Er ist für uns von großem Wert. Wir sollten seinen Verbleib im Austausch für ein Bündnis fordern."
 umc_gmo.26.b:0 "Seine Mission hat gezeigt, dass ein Bündnis mit dem Kaiserreich unabdingbar ist."
 umc_gmo.26.c:0 "Seine Mission war erfolgreich, aber unsere Neutralität muss gewahrt bleiben."
 
 umc_gmo.27:0 "Die Türkei bietet ein Bündnis für Von Rundstedts Aufenthalt an."
 umc_gmo.27.t:0 "Die Türkei bietet ein Bündnis für Von Rundstedts Aufenthalt an."
 umc_gmo.27.d:0 ""
 umc_gmo.27.a:0 "Wenn er der Preis für ein Bündnis ist, müssen wir zustimmen."
 umc_gmo.27.b:0 "HA! Allein von Rundstedt ist wertvoller als die gesamte Türkei."
 
 umc_gmo.28:0 "Der Kaiser ist mit unserem Vorschlag einverstanden."
 umc_gmo.28.t:0 "Der Kaiser ist mit unserem Vorschlag einverstanden."
 umc_gmo.28.d:0 ""
 umc_gmo.28.a:0 "Es kommt alles zusammen."
 
 umc_gmo.29:0 "Kaiser ist anderer Meinung und erinnert sich an Von Rundstedt."
 umc_gmo.29.t:0 "Kaiser ist anderer Meinung und erinnert sich an Von Rundstedt."
 umc_gmo.29.d:0 ""
 umc_gmo.29.a:0 "Das ist wirklich eine verpasste Gelegenheit."
 
 umc_gmo.30:0 "Die Türkei bietet ein Bündnis an"
 umc_gmo.30.t:0 "Die Türkei bietet ein Bündnis an"
 umc_gmo.30.d:0 "Von Rundsteds Mission ist beendet. Er hat die türkische Armee ausgebildet und sie in Kriegstaktiken geschult. Im Gegenzug ist sich die Türkei, wie erhofft, der Bedeutung unserer Beziehungen bewusst und bereit, sich uns in einem offiziellen Bündnis anzuschließen. Dies verschafft uns einen starken Verbündeten im Nahen Osten gegen Frankreich und Großbritannien."
 umc_gmo.30.a:0 "Lasst uns auf diese erneuerte Allianz anstoßen!"
 umc_gmo.30.b:0 "Wenn ich es mir recht überlege, brauchen wir sie nicht."
 
 umc_gmo.31:0 "Der Kaiser lehnt unser Angebot ab."
 umc_gmo.31.t:0 "Der Kaiser lehnt unser Angebot ab."
 umc_gmo.31.d:0 ""
 umc_gmo.31.a:0 "Sie werden es bereuen!"
 
 umc_gmo.32:0 "Die Türkei möchte neutral bleiben."
 umc_gmo.32.t:0 "Die Türkei möchte neutral bleiben."
 umc_gmo.32.d:0 "Von Rundsteds Mission ist beendet. Er hat die türkische Armee ausgebildet und ihr Kriegstaktiken beigebracht.\nAber obwohl wir erwartet hatten, dass seine Mission die deutsch-türkischen Beziehungen stärken würde, wollen sie weiterhin ihre Neutralität wahren."
 umc_gmo.32.a:0 "Das ist schade."
 
 ##### Syrian Revolt
 umc_gmo.40:0 "Syrischer Aufstand"
 umc_gmo.40.t:0 "Syrischer Aufstand"
 umc_gmo.40.d:0 "Wir haben das Feuer der Revolution geschürt. Wir haben gerade die Nachricht von der syrischen Armee erhalten, dass sie heute einen Aufstand plant! Wir möchten sie voll unterstützen!"
 umc_gmo.40.a:0 "Dies wird die Franzosen sicherlich schwächen!"
 UMC_GMO_syrian_militia_EXPL:0 "Erzeugen Sie §H10 Milizeinheiten§! in Syrien."
 
 umc_gmo.41:0 "Syrischer Aufstand"
 umc_gmo.41.t:0 "Syrischer Aufstand"
 umc_gmo.41.d:0 "Unseren Quellen zufolge hat heute Morgen in Syrien ein erfolgreicher Aufstand stattgefunden.\nMit heimlicher Unterstützung und Versorgung durch das Kaiserreich wurde uns nun angeboten, die Führung des neuen Staates zu übernehmen.\nSollten wir zustimmen, werden wir vom Deutschen Reich unterstützt und die Franzosen werden sicherlich keinen größeren Widerstand leisten."
 umc_gmo.41.a:0 "Sie sind unter unseren Bannern willkommen."
 umc_gmo.41.b:0 "Dies liegt nicht in unserem Interesse."
 
 umc_gmo.42:0 "Die Türkei unterstützt den syrischen Aufstand"
 umc_gmo.42.t:0 "Die Türkei unterstützt den syrischen Aufstand"
 umc_gmo.42.d:0 ""
 umc_gmo.42.a:0 "Wir können uns keinen weiteren Konflikt leisten."
 umc_gmo.42.b:0 "Dieses Gebiet gehört uns!"
 
 umc_gmo.43:0 "Ununterstützter syrischer Aufstand"
 umc_gmo.43.t:0 "Ununterstützter syrischer Aufstand"
 umc_gmo.43.d:0 ""
 umc_gmo.43.a:0 "Sie haben einen dummen Fehler gemacht."
 umc_gmo.43.b:0 "Wenn sie einen Staat wollen, sollten sie ihn haben."

