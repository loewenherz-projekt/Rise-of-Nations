 GER_Deployment_SS_2.5:0 "Im Einsatz: SS-Wiking, SS-Prinz Eugen, SS-Nordland, SS-Galizien, SS-1. Lettisches Schiff, SS-Horst Wessel, SS-2. Lettisches Schiff, SS-1. Estnisches Schiff, SS-Nederland, SS-Langemarck, SS-Wallonien, SS-Italia, SS-Batschka, SS-Charlemagne und SS-Landstorm Nederland."
