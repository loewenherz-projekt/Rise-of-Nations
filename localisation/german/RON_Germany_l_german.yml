 GER_remaining_soviet_threat_I1:0 "Verbleibende sowjetische Bedrohung"
 GER_remaining_soviet_threat_I1_desc:0 "Obwohl es uns gelungen ist, die Sowjets zurückzudrängen, befinden sie sich immer noch auf unserer Seite des Uralgebirges. Um das Überleben des Deutschen Herrenvolkes zu sichern, müssen sie aus Europa vertrieben werden. Nur dann wird unser Sieg vollendet sein.\n§W---------------§!\nDieser Nationalgeist wird §GRemoved§!, wenn wir §H[573.GetName]§!, §H[876.GetName]§! und §H[402.GetName]§! kontrollieren oder wenn [SOV.GetFlag]§H[SOV.GetName]§! nicht existiert."
 
