 GER_SS_Expansion:0 "Erweitern Sie die SS"
 GER_SS_Expansion_desc:0 ""
 GER_SS_Intelligence:0 "SS-Geheimdienst"
 GER_SS_Intelligence_desc:0 "Wir werden einen SS-Geheimdienst gründen, der in die militärischen und politischen Organisationen unserer Feinde eindringt und uns verwertbare Informationen liefert."
 GER_SS_Counter_Intelligence:0 "SS-Geheimdienst"
 GER_SS_Counter_Intelligence_desc:0 "Wir werden einen SS-Gegenspionagedienst gründen, der die Unterwanderung unserer militärischen und politischen Organisationen durch ausländische Mächte verhindern wird."
 #GER_Spies_For_the_Reich:0 "GER_Spies_For_the_Reich"
 #GER_Spies_For_the_Reich_desc:0 ""
 GER_Integrate_the_Abwehr_into_the_SS:0 "Integration der Abwehr in die SS"
 GER_Integrate_the_Abwehr_into_the_SS_desc:0 ""
 GER_An_Attack_On_Tehran:0 "Ein Angriff auf Teheran"
 GER_An_Attack_On_Tehran_desc:0 ""
 GER_An_Attack_On_The_Emperor:0 "Ein Angriff auf den Kaiser"
 GER_An_Attack_On_The_Emperor_desc:0 ""
 
 
 
 
 
 
 
 
 
 
 GER_Host_Gestapo_NKVD_Conferences:0 "Gastgeber für Gestapo-NKWD-Konferenzen"
 GER_Host_Gestapo_NKVD_Conferences_desc:0 "Wir werden ein hochrangiges Treffen zwischen verschiedenen Gestapo-Führern und ihren NKWD-Kollegen abhalten. Dies wird den Grundstein für eine künftige Zusammenarbeit im Interesse der gemeinsamen nationalen Sicherheit legen und uns den Austausch von Repressionstechniken ermöglichen."
 GER_War_in_the_East:0 "Krieg im Osten"
 GER_War_in_the_East_desc:0 "Wir bereiten uns auf einen Krieg gegen die Sowjetunion vor. Die deutschen Streitkräfte sind eine gut geölte Maschine. Wir werden dafür sorgen, dass alle Teile unserer Streitkräfte ihre Aktionen effizient koordinieren, um einen Blitzkrieg in die russische Steppe zu führen."
 GER_Lessons_From_An_Eastern_War:0 "Lehren aus einem Krieg im Osten"
 GER_Lessons_From_An_Eastern_War_desc:0 "Unser Einmarsch in die Sowjetunion hat zu einem notwendigen Taktikwechsel geführt. Die Anforderungen an die Führung eines modernen Krieges haben sich offensichtlich geändert, und wir müssen diesen Entwicklungen immer einen Schritt voraus sein, sonst riskieren wir, den Anschluss zu verlieren."
 GER_Lessons_From_A_Eastern_War_tt:0 "Schaltet §YEntscheidungen§! frei und ermöglicht uns die Entwicklung fortschrittlicher §YPzKpfw IV§!-Varianten!"
 GER_War_in_Winter:0 "Krieg im Winter"
 GER_War_in_Winter_desc:0 "Ein Einmarsch in die Sowjetunion erfordert Vorbereitungen für den russischen Winter. Wir hätten bereits vor unserer Kriegserklärung in die Sowjetunion investieren sollen. Wir müssen unsere Ausrüstungsbeschaffung und Logistikinfrastruktur revolutionieren, um sicherzustellen, dass unsere Truppen genau das bekommen, was sie brauchen."
 GER_Learn_From_Soviet_Armor_Designs:0 "Lernen Sie von sowjetischen Panzerdesigns"
 GER_Learn_From_Soviet_Armor_Designs_desc:0 "Unser Konflikt mit der Sowjetunion hat zu revolutionären Entwicklungen im Panzerbau geführt. Diese neuen Konstruktionsmerkmale werden zum Standard für alle von unserem Land produzierten und eingesetzten Panzer."
 GER_CAS_Anti_Tank_Ability:0 "Fortschritte bei der CAS-Bewaffnung"
 GER_CAS_Anti_Tank_Ability_desc:0 "Wir werden uns auf die Revolutionierung der Luftnahunterstützung konzentrieren. Unsere Feinde werden sicherlich unsere neuen Techniken und Waffen kopieren, aber davon werden wir sicherlich mehr profitieren als unsere Feinde, die viel weniger in die Luftnahunterstützung investiert haben."
 #GER_Our_Last_Chance:0 "GER_Our_Last_Chance"
 #GER_Our_Last_Chance_desc:0 ""
 #GER_Camouflage_Patterns:0 "GER_Camouflage_Patterns"
 #GER_Camouflage_Patterns_desc:0 ""
 GER_SS_Expansion2:0 "SS-Formationen einsetzen"
 GER_SS_Expansion2_desc:0 ""
 GER_Expand_The_Gestapo:0 "Erweitern Sie die Gestapo"
 GER_Expand_The_Gestapo_desc:0 "Wir werden die Größe und Macht der Gestapo ausweiten. Der derzeitige staatliche Sicherheitsapparat kann mit der Zahl heimtückischer Individuen in unserer Gesellschaft nicht Schritt halten. Das muss sich ändern."
 GER_SS_Expansion3:0 "Verbesserte SS-Panzergrenadierformationen"
 GER_SS_Expansion3_desc:0 ""
 GER_Reconcile_Church:0 "Versöhne dich mit der Kirche"
 GER_Reconcile_Church_desc:0 "Der Kirchenkampf soll ein Ende haben. Der Staat wird seine Untergrabung der Kirche in unserer Gesellschaft beenden. Hoffentlich wird dies die Spannungen abbauen und den Pessimismus über den Anteil des Reichs an militärischen Misserfolgen verringern."
 GER_Organized_Slave_Labor:0 "Versklavung der Juden"
 GER_Organized_Slave_Labor_desc:0 "Der Führer hat entschieden, dass Semiten zwar schmutzig und unanständig seien, aber in den Fabriken arbeiten könnten und die Produktivität der Rüstungsindustrie erheblich steigern könnten."
 GER_SS_Expansion4:0 "SS-Panzerverbände"
 GER_SS_Expansion4_desc:0 ""
 GER_Deal_With_Trouble_Makers:0 "Die endgültige Lösung"
 GER_Deal_With_Trouble_Makers_desc:0 "Der Führer wird mit hochrangigen Vertretern der Staatssicherheit zusammentreffen, um die Möglichkeit der Vernichtung der semitischen Bevölkerung des europäischen Festlands zu besprechen. Viele treue Berater und Freunde des Führers haben darauf hingewiesen, dass dieses neue Programm die Bevölkerung hervorragend von anderen Problemen im Reich ablenken werde."
 GER_SS_Expansion5:0 "Entwicklung der SS-Formationen"
 GER_SS_Expansion5_desc:0 ""
 GER_Foreign_SS_Divisions:0 "Ausländische Freiwillige in der SS"
 GER_Foreign_SS_Divisions_desc:0 ""
 GER_New_Military_Workhorse:0 "Ein neuer Morgen für die SS"
 GER_New_Military_Workhorse_desc:0 ""
 
 
 
 
 GER_Lack_of_Oil:0 "Ölmangel"
 GER_Lack_of_Oil_desc:0 "Leider fördert das Reich nicht genug Öl, um seinen Bedarf zu decken. Nach dem Ersten Weltkrieg verlor es seine Kolonien, sodass wir nirgendwo anders hingehen konnten. "
 GER_Expand_Synthetic_Oil_Production:0 "Ausbau der synthetischen Ölproduktion I"
 GER_Expand_Synthetic_Oil_Production_desc:0 "Der Staat wird den Bau einiger neuer synthetischer Raffinerien finanzieren, in der Hoffnung, dass diese Technologie und diese Verfahren eines Tages unsere Abhängigkeit von importiertem Benzin beenden können."
 GER_Domestic_Petrol:0 "Inländische Benzinproduktion"
 GER_Domestic_Petrol_desc:0 "Wir werden bereits bestehende Bohraktivitäten erweitern, um die kurzfristige Ausbeute zu steigern."
 GER_French_Refineries:0 "Französische Raffinerien"
 GER_French_Refineries_desc:0 "In Frankreich gibt es viele unerschlossene Ölreserven. Warum diese ungenutzt bleiben, ist unseren Ingenieuren ein Rätsel. Die Region wird sich schon bald in eine Region mit verlässlicher Ölproduktion verwandeln."
 GER_Refineries_in_The_Low_Countries:0 "Raffinerien in den Niederlanden"
 GER_Refineries_in_The_Low_Countries_desc:0 "Unsere Gutachter haben in Holland und Belgien ungenutzte Mineralreserven identifiziert. Durch den Ausbau der dort bestehenden Förderanlagen ließe sich die Erdölproduktion in der Region deutlich steigern."
 GER_Help_Develop_Italian_Refineries:0 "Helfen Sie mit, italienische Raffinerien aufzubauen"
 GER_Help_Develop_Italian_Refineries_desc:0 "In Norditalien gibt es unerschlossene Mineralreserven. Wir werden die Italiener beim Aufbau der notwendigen Infrastruktur für die Förderung des äußerst wertvollen Öls unterstützen."
 GER_Other_Petrol_Solutions:0 "Andere Benzinlösungen"
 GER_Other_Petrol_Solutions_desc:0 "Wir werden damit beginnen, die Beziehungen zwischen dem Reich und Rumänien zu verbessern. Das rumänische Öl wird für die Kriegsproduktion von unschätzbarem Wert sein und im Austausch für das schwarze Gold werden wir ihre Souveränität und Sicherheit vor feindlichen Mächten gewährleisten."
 GER_Wartime_Petrol:0 "Kriegsbenzin"
 GER_Wartime_Petrol_desc:0 "Wir werden die Beziehungen zur rumänischen Regierung ausbauen, die notwendig sind, um im Kriegsfall zuverlässig Benzinlieferungen für den industriellen und militärischen Verbrauch zu erhalten."
 GER_Expand_Romanian_Refineries:0 "Ausbau der rumänischen Raffinerien I"
 GER_Expand_Romanian_Refineries_desc:0 "Wir werden die Rumänen beim Ausbau ihrer Erdölbohrungen und -raffinerien unterstützen."
 GER_Expand_Synthetic_Oil_Production2:0 "Erweiterung der Produktion synthetischer Öle II"
 GER_Expand_Synthetic_Oil_Production2_desc:0 "Wir werden weiterhin den Ausbau synthetischer Raffinerien im ganzen Land fördern und so die hungrige Industrie mit dem notwendigen Kautschuk und Öl versorgen."
 GER_Expand_Romanian_Refineries2:0 "Ausbau der rumänischen Raffinerien II"
 GER_Expand_Romanian_Refineries2_desc:0 "Wir werden die Rumänen beim Ausbau ihrer Ölraffinerien und allgemeinen Erdölproduktionsanlagen unterstützen."
 GER_Expand_Synthetic_Oil_Production3:0 "Erweiterung der Produktion synthetischer Öle III"
 GER_Expand_Synthetic_Oil_Production3_desc:0 "Wir werden den letzten, öffentlich geförderten Ausbau der synthetischen Raffinerien im ganzen Land durchführen."
 GER_War_With_England:0 "Krieg mit England"
 GER_War_With_England_desc:0 "Ihre Kultur ist zwar bewundernswert, sie sind jedoch einer der Hauptlieferanten des internationalen jüdischen Bankenkartells und ihre Manipulation der Völker auf der ganzen Welt ist vorbei."
 GER_War_With_France:0 "Krieg mit Frankreich"
 GER_War_With_France_desc:0 "Die dekadente französische Regierung versucht seit dem Ende des letzten Weltkrieges, das Reich und das deutsche Volk zu destabilisieren und zu missbrauchen. Dies kann nicht länger toleriert werden."
 GER_War_With_The_Benelux:0 "Krieg mit den Benelux-Staaten"
 GER_War_With_The_Benelux_desc:0 "Wir werden den Benelux-Staaten den Krieg erklären und die französische Maginot-Linie umgehen."
 GER_Operation_Weseruebung:0 "Operation Weserübung"
 GER_Operation_Weseruebung_desc:0 "Wir werden die Operation Wesser-Übung starten und die Souveränität Norwegens und Dänemarks verletzen. Wir haben ihnen die Chance gegeben, sich friedlich unserer Herrschaft zu unterwerfen, doch sie haben sich geweigert. Das ist die Konsequenz..."
 GER_Nationalize_Allied_Owned_Companies:0 "Unternehmen verstaatlichen"
 GER_Nationalize_Allied_Owned_Companies_desc:0 "Wir werden die Unternehmen der Alliierten im gesamten Reich und in den besetzten Gebieten verstaatlichen. Sie werden den Deutschen übergeben, und die deutschen Firmen werden ihre Produktion im Namen des Reiches fortsetzen."
 GER_Expand_Opel_Blitz_Production:0 "Ausbau der Opel Blitz-Produktion"
 GER_Expand_Opel_Blitz_Production_desc:0 "Die Anlagen von Opel Blitz, einer ehemaligen US-Tochtergesellschaft von GM, sollen erweitert werden und die berühmten „Opel Blitz“-Lastwagen sollen im ganzen Reich für militärische Zwecke in Massenproduktion gehen."
 GER_Revise_Versailles:0 "Versailles überarbeiten"
 GER_Revise_Versailles_desc:0 "Nach der Kapitulation Frankreichs beschloss der Führer, die Unterzeichnung der offiziellen Kapitulationsurkunde in genau dem Waggon abzuhalten, in dem das Deutsche Reich nur zwei Jahrzehnte zuvor ein so demütigendes Abkommen unterzeichnen musste. Nun ist es Frankreich, das an Deutschland Reparationen zahlen muss."
 GER_Expand_Deutsche_Werke:0 "Erweitern Sie die Werften der Deutschen Werke"
 GER_Expand_Deutsche_Werke_desc:0 "Durch den Ausbau der Werften der Deutschen Werke Kiel werden wir unsere Schiffbaukapazitäten erweitern."
 GER_Invest_in_Arado:0 "Investieren Sie in Arado"
 GER_Invest_in_Arado_desc:0 "Der Staat wird Arado bei der Ausweitung seiner Produktion unterstützen und die für die Entwicklung erfolgreicher Flugzeugdesigns erforderlichen Humanressourcen bereitstellen."
 GER_Battle_Of_Britain_Preparations:0 "Vorbereitung auf die „Luftschlacht um England“"
 GER_Battle_Of_Britain_Preparations_desc:0 "Wir bereiten uns darauf vor, die Kontrolle über den britischen Luftraum zu übernehmen. Die Briten werden uns wahrscheinlich mit aller Macht daran hindern, ihren Luftraum zu kontrollieren. Was dann folgen würde, wäre zweifellos eine Invasion."
 GER_Sealion_Preparations:0 "Seelöwenpräparate"
 GER_Sealion_Preparations_desc:0 "Das Reich wird Ressourcen für eine geplante Invasion der Britischen Inseln bereitstellen. Obwohl das Deutsche Reich noch nie zuvor ein derart gewaltiges Unterfangen gewagt hat, gab es im Laufe der Jahrhunderte bereits viele Invasionen auf die Insel, und der Führer ist vom Erfolg von Sealion überzeugt."
 GER_Give_Up_On_The_Kriegsmarine:0 "Verlassen Sie die Oberflächenflotte"
 GER_Give_Up_On_The_Kriegsmarine_desc:0 "Wir werden die Kriegsmarine aufgeben und unsere Aufmerksamkeit vom Schiffsbau abwenden. Unsere Marineinvestitionen werden ausschließlich in U-Boote fließen."
 GER_Kriegsmarine_Expansion:0 "Investieren Sie in die Stärkung der Überwasserflotte"
 GER_Kriegsmarine_Expansion_desc:0 "Wir werden unsere Schiffbauindustrie wiederbeleben und uns darauf konzentrieren, eine Seemacht mit einer starken Überwasserflotte zu werden."
 GER_Milchkuh:0 "Milchkuh"
 GER_Milchkuh_desc:0 "Wir werden Langstrecken-U-Boote vom Typ „Milchkuh“ einsetzen, die unsere U-Boote auf See mit Nachschub versorgen und so die Reichweite unserer U-Boot-Operationen erheblich vergrößern."
 GER_Spanish_U_Boat_Resupply:0 "Spanische U-Boot-Versorgung"
 GER_Spanish_U_Boat_Resupply_desc:0 "Wir werden diplomatisch auf die spanische Regierung zugehen und sie um die Möglichkeit bitten, ihre Häfen für Nachschub und Reparaturen zu nutzen."
 GER_Argentine_U_Boat_Resupply:0 "Nachschub für argentinische U-Boote"
 GER_Argentine_U_Boat_Resupply_desc:0 "Wir werden diplomatisch auf die argentinische Regierung zugehen und sie bitten, ihre Häfen für Nachschub und Reparaturen nutzen zu dürfen."
 GER_War_in_Africa:0 "Der Krieg in Afrika"
 GER_War_in_Africa_desc:0 "Wir werden die Versorgungsinfrastruktur in Italienisch-Afrika ausbauen, um unsere Logistikkapazitäten in der Region zu stärken. Von Libyen aus könnten wir problemlos Alexandria und den Suezkanal einnehmen."
 GER_Upper_Nile_Fortifications:0 "Befestigungsanlagen am Oberen Nil"
 GER_Upper_Nile_Fortifications_desc:0 "Sobald wir den Suezkanal eingenommen haben, müssen wir unsere Position befestigen und sicherstellen, dass die Tommys unsere neuen Kolonialbesitzungen nicht zurückerobern können."
 GER_War_With_The_United_States:0 "Krieg mit den Vereinigten Staaten"
 GER_War_With_The_United_States_desc:0 "Wir werden der Heimat des Kapitalismus und der „Demokratie“ den Krieg erklären. Die Vereinigten Staaten könnten ein gewaltiger Gegner sein, wenn sie erwachen. Andererseits könnte dies Japan vielleicht davon überzeugen, sich unseren Kriegsanstrengungen gegen die Sowjetunion und die westlichen Alliierten anzuschließen?"
 #GER_Disrupt_Soviet_Lend_Lease:0 "GER_Disrupt_Soviet_Lend_Lease"
 #GER_Disrupt_Soviet_Lend_Lease_desc:0 ""
 GER_A_War_Most_Total:0 "Totaler Krieg"
 GER_A_War_Most_Total_desc:0 "Es ist von größter Wichtigkeit, diesen Krieg so schnell wie möglich zu beenden. Reichspropagandaminister Dr. Goebbels wird eine Rede halten, in der er unsere totale Kriegswirtschaft befürwortet und sie dazu anspornt, unserem Regime auch weiterhin alles zu geben, was sie haben. Wir werden einen Krieg führen, der totaler und radikaler ist als alles, was wir uns je vorstellen können ... Und jetzt, Volk, erhebt euch und lasst den Sturm losbrechen!"
 GER_Turn_to_Wunderwaffe:0 "Wende dich an Wunderwaffe"
 GER_Turn_to_Wunderwaffe_desc:0 "Der Krieg ist nicht ganz so gut verlaufen, wie wir gehofft hatten. Wir werden unsere Wunderwaffe einsetzen, um die Initiative zurückzugewinnen und einen totalen Sieg über unsere Feinde zu erringen."
 GER_Norwegian_Heavy_Water:0 "Beleben Sie das Atombombenprojekt wieder"
 GER_Norwegian_Heavy_Water_desc:0 "Um den Krieg schneller zu beenden, hat der Führer beschlossen, das Atombombenprojekt zu finanzieren."
 GER_Amerika_Bomber_Projekt:0 "Amerika Bomber Projekt"
 GER_Amerika_Bomber_Projekt_desc:0 "Die Brüder Horten sind mit einem Vorschlag an uns herangetreten und wir haben beschlossen, ihnen die benötigten Mittel zur Verfügung zu stellen. Sie versprechen die Lieferung eines Bombers mit Düsentriebwerken, der sogar die Vereinigten Staaten treffen könnte!"
 #GER_Huckepack_Projekt:0 "GER_Huckepack_Projekt"
 #GER_Huckepack_Projekt_desc:0 ""
 GER_Release_Some_Control_Over_Industry:0 "Geben Sie etwas Kontrolle über die Industrie ab"
 GER_Release_Some_Control_Over_Industry_desc:0 "Um unseren eigenen Industriellen zu gefallen, werden wir die Regulierung und staatliche Kontrolle über die Privatwirtschaft lockern."
 GER_Emergency_Fighter_Program:0 "Notfall-Kämpfer-Programm"
 GER_Emergency_Fighter_Program_desc:0 "Unser Himmel ist voll von feindlichen Bombern, die Tod und Verderben über unsere Industrie und unsere Arbeiter bringen. Wir brauchen dringend neue Kampfflugzeuge und eine erhöhte Produktion von Kampfflugzeugen."
 GER_Final_Offensives:0 "Letzte Offensiven"
 GER_Final_Offensives_desc:0 "Unsere Truppen sind erschöpft und demoralisiert. Das Reich befindet sich seit Jahren im Krieg, und ein Ende ist nicht in Sicht. Wir werden den Beginn einer letzten Offensive ankündigen, um diesen Krieg ein für alle Mal zu gewinnen."
 GER_Armor_Doctrine_Commitment_Medium:0 "Verpflichtung zur Doktrin mittlerer Rüstung"
 GER_Armor_Doctrine_Commitment_Medium_desc:0 "Wir werden den Kern unserer Panzerdivisionen auf Einheiten konzentrieren, die mit mittleren Panzern ausgestattet sind."
 GER_Use_Of_Light_Armor:0 "Verwendung von leichter Rüstung"
 GER_Use_Of_Light_Armor_desc:0 "Der Schwerpunkt unserer Panzerentwicklungsprogramme sollte auf leichten Panzern liegen. Sie sollen die feindliche Verteidigung schnell durchbrechen und unseren Vormarsch in den Rücken des Feindes anführen."
 GER_Armor_Doctrine_Commitment_Heavy:0 "Verpflichtung zur schweren Rüstungsdoktrin"
 GER_Armor_Doctrine_Commitment_Heavy_desc:0 "Wir werden den Kern unserer Panzerdivisionen auf Einheiten konzentrieren, die mit schweren Panzern ausgestattet sind."
 GER_Super_Heavy_Armor_Project:0 "Superschweres Panzerungsprojekt"
 GER_Super_Heavy_Armor_Project_desc:0 "Der Schwerpunkt unserer Panzerungsentwicklungsprogramme liegt auf superschweren Panzern, die kleinere Panzer unter ihren Ketten zermalmen."
 GER_Land_Resources_Priority:0 "Priorität der Landressourcen"
 GER_Land_Resources_Priority_desc:0 "Der Erfolg oder Misserfolg unserer Nation in diesem Krieg wird an Land entschieden."
 GER_Air_Resources_Priority:0 "Priorität der Luftressourcen"
 GER_Air_Resources_Priority_desc:0 "Der Erfolg oder Misserfolg unserer Nation in diesem Krieg wird in der Luft entschieden."
 GER_Eine_Invasion_des_Mondes:0 "Eine Invasion des Mondes"
 GER_Eine_Invasion_des_Mondes_desc:0 "Unser Führer sagte einmal in einem Interview, eine Invasion des nordamerikanischen Kontinents sei ebenso durchführbar und realistisch wie eine Invasion des Mondes. Es ist an der Zeit, dass wir uns auf eine solche Invasion vorbereiten."
 GER_Airpower_Over_Amerika:0 "Luftmacht über Amerika"
 GER_Airpower_Over_Amerika_desc:0 "Wir werden unsere Bemühungen auf die Durchführung einer strategischen Bombenkampagne auf dem amerikanischen Festland konzentrieren. Dies wird ein gewaltiges Unterfangen sein, das eine umfangreiche logistische Infrastruktur erfordert."
 
 GER_Blitz_Amerika:0 "Blitzangriff auf die Vereinigten Staaten"
 GER_Blitz_Amerika_desc:0 "Unsere amerikanische Invasionstruppe wird einen neu konzipierten Blitzkrieg gegen die schwachen, semitischen Streitkräfte der Vereinigten Staaten entfesseln. Ähnlich wie der sowjetische Gigant, die Heimat des Kommunismus, unseren Panzerkolonnen zum Opfer fiel, wird es auch der Heimat der kapitalistischen Demokratie ergehen!"
 GER_Guided_Bombs:0 "Lenkbomben"
 GER_Guided_Bombs_desc:0 "Wir werden revolutionäre neue Waffen einsetzen, die gezielt auf ihre Ziele ausgerichtet sind. Die Royal Navy wird nicht länger die Meere beherrschen. Wir werden nicht länger mit Besorgnis auf unsere Küsten blicken. Wenn wir den Himmel beherrschen, werden wir mit Sicherheit auch die Meere beherrschen."
 GER_V2_Rockets:0 "V2-Raketen"
 GER_V2_Rockets_desc:0 "Wir werden eine neue Langstreckenrakete entwickeln, die unsere Feinde zerstören kann und dabei eine Geschwindigkeit erreicht, die zu hoch ist, um sie mit Flugzeugen abzufangen. Unsere Offiziere werden von ihren Pariser Offiziersclubs aus strategische Bombenangriffe auf London durchführen."
 GER_V3_Rockets:0 "V-3-Raketen"
 GER_V3_Rockets_desc:0 "Es ist Zeit, die nächste Generation von Langstreckenraketen zu präsentieren. Dies ist das Zeitalter interkontinentaler Raketen. Mit diesen neuen Überschallraketen können wir von Startplätzen auf dem europäischen Festland aus Ziele in Nordamerika erreichen."
 GER_Tactical_Jet_Bombers:0 "Düsenbomber"
 GER_Tactical_Jet_Bombers_desc:0 "Wir werden Arado mit der Entwicklung neuer taktischer Düsenbomber beauftragen. Der Führer ist ein glühender Anhänger von Düsenbombern und kann es kaum erwarten, dass die Produktion dieser neuesten Wunderwaffe beginnt."
 
 
 
 
 GER_Greater_German_Reich:0 "Das Großdeutsche Reich"
 GER_Greater_German_Reich_desc:0 "Wir werden unser Reich über die Grenzen nach Versailles hinaus ausdehnen. Wir werden jetzt unsere eigene Zukunft bestimmen."
 GER_Greater_Germanic_Reich:0 "Das Großgermanische Reich"
 GER_Greater_Germanic_Reich_desc:0 "Wir werden ein Reich für alle germanischen Völker germanischer Kultur errichten. Unsere Grenzen werden erheblich erweitert werden müssen, um diese Aufgabe zu erfüllen."
 GER_End_To_Versailles_Depression:0 "Eine ferne Erinnerung"
 GER_End_To_Versailles_Depression_desc:0 "Die schweren Zeiten sind vorbei. Nach unserem unvermeidlichen Sieg über unsere Feinde werden wir als stärkste Volkswirtschaft der Welt herrschen."
 GER_Welthauptstadt_Germania:0 "Germania"
 GER_Welthauptstadt_Germania_desc:0 "Wir werden die Hauptstadt unseres Landes in etwas umbenennen, das die Hauptstadt des Germanischen Reiches repräsentiert: Germania. Wir werden mit Bauprojekten beginnen, darunter dem Bau einer gewaltigen Säule, die unserem Sieg gewidmet ist, der Großen Halle und der Erweiterung des Reichstags."
 
 
 
