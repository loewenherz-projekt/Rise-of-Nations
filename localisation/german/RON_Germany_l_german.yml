 GER_Greater_German_Reich_tt:0 "Erobert Belgien, Holland, Luxemburg, Dänemark, Elsass-Lothringen, Böhmen-Mähren, Polen und die Deutsch-Ukraine für das Reich, verdrängt die bisherigen Bewohner der Region und fördert die deutsche Einwanderung in die neu integrierten Länder. \n Wenn Schweden und/oder Norwegen direkt im Besitz des Reichs sind, werden auch die besetzten Gebiete erobert."
 
