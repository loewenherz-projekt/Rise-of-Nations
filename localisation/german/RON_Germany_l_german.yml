###Interwar
###Focuses&Description
GER_INT_treaty_of_versailles:0 "Vertrag von Versailles"
GER_INT_treaty_of_versailles_desc:0 "Am 11. November wurde ein Waffenstillstand ausgerufen, um Verhandlungen zur Beendigung des Ersten Weltkriegs aufzunehmen. Der Krieg endete mit dem Vertrag von Versailles, der Deutschland schwere Beschränkungen auferlegte und großen Unmut in der deutschen Bevölkerung hervorrief."
GER_INT_a_national_humiliation:0 "Eine nationale Demütigung"
GER_INT_a_national_humiliation_desc:0 "Dies ist die größte Demütigung Deutschlands in der Geschichte. Der Krieg lief gut, warum haben wir kapituliert? Wir besetzten die Franzosen, nicht umgekehrt."
GER_INT_promote_antiallied_sentiments:0 "Förderung antialliierter Gefühle"
GER_INT_promote_antiallied_sentiments_desc:0 "Die Alliierten haben den Krieg zu Unrecht beendet und sich selbst zu Siegern erklärt. Das ist inakzeptabel. Die Bevölkerung muss sich darüber im Klaren sein, dass dieser Frieden ungültig ist und der Krieg noch andauert."
GER_INT_openly_criticize_versailles:0 "Versailles offen kritisieren"
GER_INT_openly_criticize_versailles_desc:0 "Durch die Abschaffung der Medienzensur können die wahren Gefühle der Nation gegenüber dem Vertrag zum Ausdruck gebracht werden. Die verräterischen Alliierten müssen wissen, dass das deutsche Volk dies nicht dulden wird."
GER_INT_stab_in_the_back:0 "Der Dolchstoß"
GER_INT_stab_in_the_back_desc:0 "Kurz vor Kriegsende vertrieb der Generalstab den Kaiser. Dies war eindeutig eine falsche Entscheidung. Unsere eigenen Führer haben uns in den Rücken gefallen. Wir müssen den Kaiser wieder einsetzen."
GER_INT_overthrow_the_interrim_republic:0 "Stürzen Sie die Regierung"
GER_INT_overthrow_the_interrim_republic_desc:0 "Um die rechtmäßige Regierung wiederherzustellen, müssen wir die Demokratie zerstören und den Weg für den Kaiser bereiten."
GER_INT_restore_the_monarchy:0 "Wiederherstellung der Monarchie"
GER_INT_restore_the_monarchy_desc:0 "Das Volk hat seine Forderung den Holländern, unseren Brüdern, mitgeteilt. Es liegt an ihnen, unseren Kaiser zurückzugeben. Gott helfe ihnen, wenn sie es nicht tun."
GER_INT_demand_the_return_of_the_kaiser:0 "Fordern Sie die Rückkehr des Kaisers"
GER_INT_demand_the_return_of_the_kaiser_desc:0 "Die Holländer haben ihre Antwort geschickt, der Kaiser selbst. Wir sind glücklich und werden uns in Zukunft daran erinnern."
GER_INT_renewed_war_effort:0 "Erneute Kriegsanstrengungen"
GER_INT_renew_the_war_effort:0 "Erneuern Sie die Kriegsanstrengungen"
GER_INT_renew_the_war_effort_desc:0 "Mit dem Kaiser wieder an der Spitze ist der Krieg zweifellos gewonnen. Alles, was noch übrig bleibt, ist, unsere Truppen durch die Straßen von Paris zu marschieren."
GER_INT_public_executions:0 "Öffentliche Hinrichtungen"
GER_INT_public_executions_desc:0 "Die Verantwortlichen für den Scheinfrieden wurden gefunden. Es ist an der Zeit, ihnen ein Ende zu setzen und sie zu einem Schaustück für andere zu machen, die möglicherweise erwägen, das Reich aufzugeben."
GER_INT_public_trials:0 "Öffentliche Gerichtsverfahren"
GER_INT_public_trials_desc:0 "Die Defätisten wurden ausfindig gemacht. Obwohl sie die Todesstrafe verdienen, hat jeder Mensch Anspruch auf einen Prozess."
GER_INT_unify_the_state:0 "Den Staat vereinen"
GER_INT_unify_the_state_desc:0 "Das deutsche Volk ist seiner Monarchie treu ergeben. Wir müssen es über die Rückkehr des Kaisers informieren, um sein Gefühl der Einheit wiederherzustellen."
GER_INT_victory_at_all_costs:0 "Sieg um jeden Preis"
GER_INT_victory_at_all_costs_desc:0 "Das deutsche Volk wusste 1914, was dieser Krieg bedeutete, und dieses Wissen ist bis heute erhalten geblieben. Der Sieg des Reiches musste um jeden Preis gesichert werden."
GER_INT_renounce_brestlitovsk:0 "Verzicht auf Brest-Litowsk"
GER_INT_renounce_brestlitovsk_desc:0 "Die Russen sind zwar verrückt, werden aber mehr Territorium benötigen, um uns bei unseren erneuten Kriegsanstrengungen zu unterstützen. Wir werden den Vertrag aufkündigen, der ihnen den Großteil des Landes zurückgibt, das sie an uns verloren haben."
GER_INT_a_fight_to_the_death:0 "Ein Kampf auf Leben und Tod"
GER_INT_a_fight_to_the_death_desc:0 "Die deutsche Nation beginnt mit geheimen Vorbereitungen für die sogenannte „Volksschlacht“. Jeder Deutsche kennt seine Pflicht: dem Feind Widerstand zu leisten, bis der Kaiser selbst tot ist."
GER_INT_secure_food_stuffs_for_the_volkschlacht:0 "Sichere Nahrung für die Schlacht"
GER_INT_secure_food_stuffs_for_the_volkschlacht_desc:0 "Heute sind die ersten Hilfslieferungen aus Russland eingetroffen. Lebensmittel und andere Güter des täglichen Bedarfs strömen von unseren neuen Verbündeten in unser Land. Die Zeit rückt näher."
GER_INT_sink_everything:0 "Alles versenken"
GER_INT_sink_everything_desc:0 "Die deutsche Hochseeflotte hat die Kriegsanstrengungen in erheblichem Maße unterstützt. Komme, was wolle, die Flotte wird in See stechen, mit einer Kompanie ziviler Fischerei- und Vergnügungsschiffe, die mit napoleonischen Kanonen nachgerüstet wurden, um die moderneren Schiffe abzuschirmen."
GER_INT_the_middle_eastern_decision:0 "Die Nahost-Entscheidung"
GER_INT_the_middle_eastern_decision_desc:0 "Nach unserem überwältigenden Sieg in der Volksschlacht müssen wir viel Territorium neu aufteilen. Es ist an der Zeit, unsere Aufmerksamkeit auf den Nahen Osten zu richten."
GER_INT_empower_our_friends_in_the_industrial_sector:0 "Stärken Sie die Branche"
GER_INT_empower_our_friends_in_the_industrial_sector_desc:0 "Die Volksschlacht war zwar ein militärischer Erfolg, hat aber einen Großteil der empfindlichen Industrie unseres Landes geschädigt. Indem wir Kapitalisten und Industriellen mehr Autonomie gewähren, können wir die wirtschaftliche Erholung beschleunigen."
GER_INT_government_industrial_intervention:0 "Staatliche Industrieintervention"
GER_INT_government_industrial_intervention_desc:0 "Trotz der weitgehenden Autonomie, die den Industriellen zugestanden wird, wird die Regierung eingreifen und viele Industriezweige retten müssen, die nicht mit kleinen Skaleneffekten wirtschaften können."
GER_INT_out_of_the_ashes:0 "Aus der Asche"
GER_INT_out_of_the_ashes_desc:0 "Die Volksschlacht hat uns zwar den Sieg im Krieg gesichert, sie hat unserer Nation aber auch einen hohen Tribut abverlangt. Es ist Zeit, die Armee zu demobilisieren und unsere Wunden zu lecken."
GER_INT_assess_the_damage_of_the_volkschlacht:0 "Bewerten Sie den Schaden der Volksschlacht"
GER_INT_assess_the_damage_of_the_volkschlacht_desc:0 "Der Schaden, den unser endgültiger Sieg angerichtet hat, war größer als geplant, aber dennoch haben wir für diese Situation Vorkehrungen getroffen und müssen sofort mit dem Wiederaufbau beginnen."
GER_INT_the_peoples_effort:0 "Die Bemühungen des Volkes"
GER_INT_the_peoples_effort_desc:0 "Das deutsche Volk beansprucht den Ruhm für unseren glorreichen Sieg für sich und das zu Recht. Doch dies hat zu vielen Forderungen nach einer stärkeren Einbindung des Volkes in die Regierungsführung geführt."
GER_INT_the_question_of_representation:0 "Die Frage der Repräsentation"
GER_INT_the_question_of_representation_desc:0 "Diese Frage kann der Kaiser nicht länger ignorieren. Die Forderungen nach der Wiedereinsetzung des Reichstags werden mit jedem Tag lauter. Der Kaiser muss eine Entscheidung treffen."
GER_INT_maintain_the_monarchy:0 "Bewahren Sie die Monarchie"
GER_INT_maintain_the_monarchy_desc:0 "Angesichts dieser demokratischen Bewegungen muss die Regierung rasch und behutsam daran arbeiten, die Monarchie zu stärken. Wir können die Forderungen nach Reformen vielleicht nicht gänzlich unterbinden, aber wir können dafür sorgen, dass einige Machtbefugnisse nicht der Kontrolle des Kaisers entgleiten."
GER_INT_collect_our_brightest_minds:0 "Sammeln Sie unsere klügsten Köpfe"
GER_INT_collect_our_brightest_minds_desc:0 "Bisher war der deutsche technische Fortschritt aus der Notwendigkeit heraus entstanden, doch es ist an der Zeit, dieser Notwendigkeit zuvorzukommen. Wenn wir die Hegemonialmacht bleiben wollen, müssen wir unsere wissenschaftlichen und technischen Kapazitäten bündeln, um unseren Vorsprung gegenüber den Alliierten zu wahren."
GER_INT_back_to_the_factories:0 "Zurück zu den Fabriken"
GER_INT_back_to_the_factories_desc:0 "Angesichts der hohen Mobilisierung ist es für viele Menschen schwierig, anschließend wieder einen Arbeitsplatz zu finden. Es muss eine staatliche Agentur eingerichtet werden, die die Rückkehr ins Berufsleben organisiert."
GER_INT_the_rhine_protests:0 "Die Rheinproteste"
GER_INT_the_rhine_protests_desc:0 "In den 1920er Jahren kam es im Rheinland zu einer Reihe von Protesten. Sie bestanden hauptsächlich aus prodemokratischen und sozialistischen Arbeitern, die auf eine Ausweitung der Volksvertretung unter der deutschen Monarchie hofften."
GER_INT_crush_the_movement:0 "Zerstöre die Bewegung"
GER_INT_crush_the_movement_desc:0 "Der Kaiser hat seine Entscheidung getroffen. Es war der schwache demokratische Westen, der in der Völkerschlacht besiegt wurde, und er ist entschlossen, nicht zuzulassen, dass das Vaterland demselben Schicksal erliegt."
GER_INT_embrace_democratic_values:0 "Demokratische Werte annehmen"
GER_INT_embrace_democratic_values_desc:0 "Der Kaiser hat seine Entscheidung getroffen. Es war die Entschlossenheit des Reichsvolkes, die zum Sieg führte. Eine wahre Demokratie bezieht ihre Macht aus der nationalistischen Begeisterung ihrer Bevölkerung, die das Vaterland in Scharen besitzt."
GER_INT_rebuilding_the_nation:0 "Wiederaufbau der Nation"
GER_INT_rebuilding_the_nation_desc:0 "Der Schaden ist angerichtet, aber der Krieg ist vorbei. Mit den Mitteln, die die Alliierten Deutschland als Reparationen zukommen lassen, wird seine Wirtschaft nie wieder stärker werden. Wir werden besser, schneller und stärker wiederaufbauen."
GER_INT_stablilize_the_government:0 "Stabilisierung der Regierung"
GER_INT_stablilize_the_government_desc:0 "Die Forderungen nach Reformen haben zu einem raschen Wandel der Regierungspolitik geführt. Es ist an der Zeit, diese Veränderungen aus dem Bereich der kaiserlichen Vorrechte herauszuholen und in geschriebenes Recht umzusetzen."
GER_INT_the_new_world_order:0 "Die Neue Weltordnung"
GER_INT_the_new_world_order_desc:0 "Deutschland ist seit langem eine der Großmächte Europas. Es ist an der Zeit, dass es seinen Platz als einzige europäische Macht einnimmt. Eine Bastion der Monarchie und die konservative Doktrin, die die Hände ihrer fähigsten Führer leitet, werden nun im Mittelpunkt der Neuen Weltordnung stehen."
GER_INT_demobilize_the_volksturmgrenadiers:0 "Demobilisierung der Volkssturmgrenadiere"
GER_INT_demobilize_the_volksturmgrenadiers_desc:0 "Nachdem der Krieg gewonnen und die Alliierten ausreichend entwaffnet waren, konnten die letzten Mitglieder des Volksregiments aufgelöst werden. Die Verteidigung Deutschlands war damit endlich abgeschlossen."
GER_INT_hunt_down_the_defeatists:0 "Jagen Sie die Defätisten"
GER_INT_hunt_down_the_defeatists_desc:0 "Am Ende des Krieges verloren einige Generalstabsmitglieder das Vertrauen in Deutschland. Sie müssen für diesen Orientierungsverlust bezahlen, aber die Frage ist: Können wir es uns leisten, ihre taktischen Fähigkeiten zu verlieren?"
GER_INT_our_time_in_need:0 "Unsere Zeit in Not"
GER_INT_our_time_in_need_desc:0 "Deutschland befindet sich in einer Zeit großer Not. Deshalb müssen wir über ideologische Grenzen hinweg die Hilfe der Kommunisten suchen. Dies könnte später unvorhergesehene Folgen haben, aber es ist unsere einzige Option."
GER_INT_organize_the_volksturmgrenadiers:0 "Organisieren Sie die Volksturmgrenadiere"
GER_INT_organize_the_volksturmgrenadiers_desc:0 "Da sich die Bürger voll und ganz der Sache verschrieben haben, ist es an der Zeit, sie in die militärische Hierarchie zu integrieren. Es wird schwierig sein, da das Reich noch nie eine Armee dieser Größe aufgestellt hat, aber es wird den Beteiligten große Chancen bieten."
GER_INT_field_everything:0 "Feld Alles"
GER_INT_field_everything_desc:0 "Um die größte Armee in der Geschichte des Reiches aufzurüsten, hat der Kaiser beschlossen, als veraltet geltende Waffenbestände zu reaktivieren."
GER_INT_begin_the_volkschlacht:0 "Beginn der Volksschlacht"
GER_INT_begin_the_volkschlacht_desc:0 "Die Divisionen wurden nach bestem Wissen und Gewissen aufgestellt und ausgerüstet. Der Kaiser hat sich im vorgeschobenen Kommandoposten verschanzt und beginnt mit den Vorbereitungen."
GER_INT_germany_shall_be_great_or_she_shant_be_at_all:0 "Größe oder Tod"
GER_INT_germany_shall_be_great_or_she_shant_be_at_all_desc:0 "Der Kaiser gibt widerstrebend den Befehl zum Beginn. Er ist sich völlig bewusst, dass die Alliierten Deutschland zerstören werden, wenn dieser misslingt, aber er vertraut darauf, dass Deutschland groß sein wird, wenn es ihnen gelingt."
GER_INT_der_frieden_des_volkes:0 "Der Frieden des Volkes"
GER_INT_der_frieden_des_volkes_desc:0 "Der Volkskrieg war erfolgreich und die Befürchtungen des Kaisers zerstreut. Wieder einmal haben die Deutschen in den Hallen von Versailles die Franzosen und ihre Verbündeten an den Verhandlungstisch gebracht. Sicher ist, dass ihnen hohe Reparationszahlungen auferlegt werden, doch die Frage der Gebietsabtretung bleibt bestehen."
GER_INT_the_balkan_decision:0 "Die Balkan-Entscheidung"
GER_INT_the_balkan_decision_desc:0 "Mit unserem Sieg über die Alliierten haben wir die Chance, die Landkarte Europas neu zu gestalten. Der Balkan war schon immer ein sensibles Gebiet, doch er war schon einmal vereint. Sollen wir seine derzeitigen Grenzen beibehalten oder ihn vielleicht wiedervereinigen?"
GER_INT_the_italian_decision:0 "Die italienische Entscheidung"
GER_INT_the_italian_decision_desc:0 "Italien ist eine Nation, die wir bestrafen müssen. Der Dreibund wurde genau aus diesem Grund gegründet, und dennoch haben sie uns im Stich gelassen. Vielleicht sollten wir sie einem wiederauferstandenen Österreich unterwerfen oder sie einfach der Herrschaft des Reiches unterstellen."
GER_INT_the_benelux_decision:0 "Die Benelux-Entscheidung"
GER_INT_the_benelux_decision_desc:0 "Die Niederlande sind ein heikles Thema. Die Niederländer sind deutsche Landsleute, und Belgien war kein Feind für uns, sondern nur ein Hindernis. Wir könnten unsere Vorherrschaft über die gesamte Region behaupten, aber das würde erheblich mehr politische Manöver erfordern und uns möglicherweise in einen Krieg mit den Niederländern führen."
GER_INT_the_french_decision:0 "Die französische Entscheidung"
GER_INT_the_french_decision_desc:0 "Die Franzosen waren allen Reichen immer ein Dorn im Auge. Wir befinden uns nun in der einzigartigen Lage, sie in eine Position zu bringen, in der sie das Reich nie mehr bedrohen werden."
GER_INT_germania_victorious_but_at_what_cost:0 "Ein siegreiches Germania"
GER_INT_germania_victorious_but_at_what_cost_desc:0 "Mit unserem neuen Vertrag kann Germania den endgültigen Sieg für sich beanspruchen. Nun beginnt der Prozess des Wiederaufbaus und der Demobilisierung."
GER_INT_a_honorable_defeat:0 "Eine ehrenvolle Niederlage"
GER_INT_a_honorable_defeat_desc:0 "Deutschland blickt auf eine lange und ruhmreiche Militärgeschichte zurück. Daher müssen wir die Niederlage, wenn sie kommt, mit Ehre akzeptieren. Auch wenn wir mit diesem Vertrag nicht einverstanden sind, werden wir ihn demütig akzeptieren."
GER_INT_circumvent_the_treaty:0 "Den Vertrag umgehen"
GER_INT_circumvent_the_treaty_desc:0 "Diplomatisch gesehen war die Annahme des Vertrags die richtige Entscheidung. Das bedeutet jedoch nicht, dass wir uns an den Geist des Vertrags halten müssen. Es gibt eine Vielzahl kleinerer Verstöße, gegen die die Alliierten wahrscheinlich nicht vorgehen werden."
GER_INT_exploit_loopholes:0 "Schlupflöcher ausnutzen"
GER_INT_exploit_loopholes_desc:0 "Nachdem wir den Vertrag etwas geprüft hatten, stießen unsere Diplomaten auf einige ziemlich große Schlupflöcher, die wir ausnutzen können."
GER_INT_evacuate_arms_manufacturers:0 "Rüstungsindustrie evakuieren"
GER_INT_evacuate_arms_manufacturers_desc:0 "Der militärisch-industrielle Komplex ist seit Jahrhunderten ein integraler Bestandteil der deutschen Wirtschaft. Wir müssen uns bemühen, diese Unternehmen zu schützen, indem wir ihre Evakuierung in neutrale Länder wie Schweden und die Schweiz erleichtern."
GER_INT_renegotiate_industrial_restrictions:0 "Industrielle Beschränkungen neu verhandeln"
GER_INT_renegotiate_industrial_restrictions_desc:0 "Die alliierten Beschränkungen für unsere Industrie werden es nahezu unmöglich machen, die Reparationen kurzfristig zurückzuzahlen. Wir müssen ihnen dies klarmachen, damit wir die Lockerung der Beschränkungen als Hebel nutzen können."
GER_INT_reanalyize_our_budget:0 "Analysieren Sie unser Budget erneut"
GER_INT_reanalyize_our_budget_desc:0 "Um diese immensen Reparationszahlungen leisten zu können, müssen wir einen möglichst großen Haushaltsüberschuss erwirtschaften. Dazu gehört auch eine Änderung unserer Handelspolitik, um Exporte und ausländische Investitionen zu fördern."
GER_INT_secret_rearmament:0 "Geheime Wiederbewaffnung"
GER_INT_secret_rearmament_desc:0 "Versailles meint es gut, doch es wird Deutschland in eine Lage versetzen, in der es sich nicht mehr verteidigen kann. Wir müssen Maßnahmen ergreifen, um sicherzustellen, dass Deutschland in neuen Kriegsgebieten nicht zu weit zurückfällt."
GER_INT_establish_the_truppenamt:0 "Gründung des Truppenamtes"
GER_INT_establish_the_truppenamt_desc:0 "Die Alliierten haben unser wichtigstes Kapital, den Generalstab, sorgfältig abgebaut. Sie haben uns die Möglichkeit gegeben, ein kleines Militärbüro zu unterhalten, und das können wir zu unserem Vorteil nutzen. Wir können ein neues „Truppenbüro“ einrichten, um die Versailler Beschränkungen zu umgehen und einige unserer Kriegsspielpraktiken beizubehalten."
GER_INT_the_reserve_scheme:0 "Das Reservesystem"
GER_INT_the_reserve_scheme_desc:0 "Durch die Schaffung einer neuen Art der Entlassung können wir eine Reserve an Männern ausbilden, für den Fall, dass wir jemals eine Armee mobilisieren müssen, die über das hinausgeht, was der Vertrag vorsieht."
GER_INT_a_rehabilitated_general_staff:0 "Rehabilitieren Sie den Generalstab"
GER_INT_a_rehabilitated_general_staff_desc:0 "Jetzt, da sich Deutschland im Krieg befindet, kümmern wir uns nicht um die Sanktionen von Versailles, wir können den Generalstab vollständig wiederherstellen."
GER_INT_reinstitute_the_draft:0 "Wiedereinführung der Wehrpflicht"
GER_INT_reinstitute_the_draft_desc:0 "Da wir jetzt erneut Verteidigungsbedarf haben, kann die Wehrpflicht ohne großen Druck aus dem Westen eingeführt werden."
GER_INT_versailles_is_forgotten:0 "Ende Versailles"
GER_INT_versailles_is_forgotten_desc:0 "Wir haben von den Franzosen die Zustimmung erhalten, den Versailler Vertrag bis Kriegsende auszusetzen. Mit ein wenig politischem Geschick können wir sicherstellen, dass der Vertrag nicht wieder in Kraft tritt."
GER_INT_begin_covert_training_exercises:0 "Verdeckte Trainingsübungen"
GER_INT_begin_covert_training_exercises_desc:0 "Da Deutschland von der Zusammenarbeit mit dem Westen ausgeschlossen ist, müssen wir uns dem Osten zuwenden. Die Sowjetunion bietet sich als guter Ort an, um fernab der neugierigen Blicke alliierter Inspektoren mit neuen Waffen und Taktiken zu experimentieren."
GER_INT_secret_armament_imports:0 "Geheimwaffenimporte"
GER_INT_secret_armament_imports_desc:0 "Indem wir unsere Käufe über neutrale Nationen absichern, können wir weltweit die neueste Militärtechnologie erwerben. Dies wird unsere Möglichkeiten erheblich verbessern, falls wir erneut zu den Waffen greifen müssen."
GER_INT_hidden_weapons_testing_sites:0 "Geheime Waffentestgelände"
GER_INT_hidden_weapons_testing_sites_desc:0 "Im Vaterland wimmelt es von alliierten Inspektoren. Es ist nicht sicher, unsere neuen Waffen hier zu testen. Unter dem Deckmantel ziviler Projekte können wir nur begrenzte Fortschritte erzielen. Wir müssen uns an unsere Freunde außerhalb des Reichs wenden, um unsere Entwürfe in voller militärischer Leistungsfähigkeit zu testen."
GER_INT_secret_piloting_schools:0 "Geheime Pilotenschulen"
GER_INT_secret_piloting_schools_desc:0 "Die weiten Ebenen Russlands eignen sich hervorragend für Flugmanöver und Tests. Mit der Erlaubnis der Russen werden wir Flugschulen gründen, um sicherzustellen, dass beide Nationen eine starke Flugtradition aufbauen können."
GER_INT_german_industrial_exchange:0 "Deutsche Industriebörse"
GER_INT_german_industrial_exchange_desc:0 "Wir können zwar einen Großteil der Produktion hier in Deutschland durchführen. Es wäre jedoch wesentlich einfacher, wenn wir neue Designs vollständig in der Sowjetunion produzieren und testen könnten. Wir werden Industrieexperten entsenden, um ihre Kapazitäten nach unseren Vorgaben zu entwickeln."
GER_INT_agricultural_equipment_exports:0 "Export von landwirtschaftlichen Geräten"
GER_INT_agricultural_equipment_exports_desc:0 "Wir müssen einen plausiblen Vorwand schaffen, falls die Alliierten versuchen sollten, unseren Handel mit Russland zu untersuchen. Vorerst werden wir unsere Lieferungen als landwirtschaftliche Geräte kennzeichnen."
GER_INT_submarine_trials_in_spain:0 "U-Boot-Tests in Spanien"
GER_INT_submarine_trials_in_spain_desc:0 "Die einzige Nation, die uns nicht offen feindlich gesinnt ist und über Häfen verfügt, von denen aus wir U-Boote auf offener See testen können, ist Spanien. Für diese Forschung ist es von entscheidender Bedeutung, dass wir ein geheimes Bündnis schließen."
GER_INT_deutshe_flyers_club:0 "Deutsche Flyers Club"
GER_INT_deutshe_flyers_club_desc:0 "Während unsere Flugzeugproduktion genau beobachtet wird, können wir durch die Gründung von Segelflugclubs unsere Kenntnisse in der Aerodynamik aufrechterhalten. Dadurch schaffen wir nicht nur eine einheimische Nachfrage nach Luftfahrttechnik, sondern auch einen Pool erfahrener Piloten, auf den wir zurückgreifen können."
GER_INT_an_alliance_of_equals:0 "Eine Allianz der Gleichen"
GER_INT_an_alliance_of_equals_desc:0 "Sowohl der Sowjetunion als auch Deutschland wurde die volle Souveränität und Anerkennung der internationalen Gemeinschaft verweigert. Es ist an der Zeit, dass unsere engen Verbindungen öffentlich werden und wir ein formelles Bündnis verkünden."
GER_INT_enemy_of_my_enemy_is_my_friend:0 "Der Feind meines Feindes ..."
GER_INT_enemy_of_my_enemy_is_my_friend_desc:0 "Auch wenn es keine perfekte Vereinbarung ist, steht unser Bündnis mit den Sowjets. Leider wird dies die linkeren Teile unserer Regierung und Bevölkerung ermutigen. Es ist an der Zeit zu entscheiden, ob wir versuchen, die Mitte zu halten oder uns der Revolution anzuschließen."
GER_INT_invite_the_spaniards:0 "Lade die Spanier ein"
GER_INT_invite_the_spaniards_desc:0 "Die Spanier sind ein enger Verbündeter und aufgrund dieser Beziehung verspüren wir das Bedürfnis, sie in diese Allianz der Gleichen einzuladen."
GER_INT_offer_the_fins_entry:0 "Laden Sie die Flossen ein"
GER_INT_offer_the_fins_entry_desc:0 "Die Finnen sind nicht unbedingt eine sozialistische Macht, aber die Sowjetunion und wir üben einen großen Einfluss auf die kleine Nation aus, und wir können dies nutzen, um sie zum Beitritt zur Allianz zu zwingen."
GER_INT_lenins_successor:0 "Lenins Nachfolger"
GER_INT_lenins_successor_desc:0 "Es ist klar, dass Lenins Gesundheitszustand sich verschlechtert, und Vertreter mehrerer Machtblöcke haben deutsche Diplomaten kontaktiert, um zu erfahren, wen wir als nächsten Generalsekretär unterstützen. Wir wollen uns nicht in einen weiteren Ostkrieg verwickeln lassen, aber unsere Unterstützung könnte einen weitgehend unblutigen Machtwechsel ermöglichen."
GER_INT_support_stalin:0 "Unterstütze Stalin"
GER_INT_support_stalin_desc:0 "Josef Stalin, ein enger Vertrauter Lenins, gilt als Favorit für den Posten des nächsten Generalsekretärs. Lenin selbst warnte jedoch viele, Stalin sei ein brutaler Mann und man dürfe ihm nicht die Nachfolge antreten."
GER_INT_support_trotsky:0 "Unterstützen Sie Trotzki"
GER_INT_support_trotsky_desc:0 "Auch Leo Trotzki, ein Mitstreiter der frühen Bolschewiki, könnte nach Lenins Tod die Macht übernehmen. Er scheint deutlich gemäßigter zu sein und Lenin hat ihm seinen Segen gegeben."
GER_INT_soviet_colossus_brethes_again:0 "Der sowjetische Koloss"
GER_INT_soviet_colossus_brethes_again_desc:0 "Die Sowjetunion ist ein riesiges Land mit nahezu unbegrenzten Ressourcen, aber unterentwickelt und würde in einem langwierigen Krieg nicht gut bestehen. Als Verbündeter ist es unsere Aufgabe, sie beim notwendigen Aufbau eines Militärs zu unterstützen, das ihrem Status als Großmacht würdig ist."
GER_INT_prepair_for_the_next_great_war:0 "Bereiten Sie den nächsten großen Krieg vor"
GER_INT_prepair_for_the_next_great_war_desc:0 "Durch die Nutzung einer Mischung aus Briefkastenfirmen und seriösen Industriellen können wir der Sowjetunion die Ressourcen verschaffen, die sie für die Fortsetzung ihrer schnellen Industrialisierung benötigt."
GER_INT_the_global_rvolution:0 "Die Weltrevolution"
GER_INT_the_global_rvolution_desc:0 "Nachdem unsere europäischen Allianzen nun gesichert sind, ist es an der Zeit, den Blick nach außen zu richten, um die Revolution auszuweiten."
GER_INT_south_american_revolutions:0 "Südamerikanische Revolutionen"
GER_INT_south_american_revolutions_desc:0 "Südamerika ist reif für ein neues Zentrum der Revolution, und wenn es erfolgreich ist, wird es uns einen Ort geben, von dem aus wir den König aller kapitalistischen Nationen angreifen können."
GER_INT_european_revolutions:0 "Europäische Revolutionen"
GER_INT_european_revolutions_desc:0 "Europa ist zwar derzeit nicht das Schlachtfeld, dennoch müssen wir uns auf die bevorstehende Rote Flut vorbereiten. Auf dem Kontinent gibt es eine Vielzahl unorganisierter und unzusammenhängender kommunistischer und sozialistischer Parteien. Wenn wir diese zu einer Vereinigten Europäischen Kommunistischen Partei vereinen, können wir beginnen, die Politik des Kontinents subtil zu beeinflussen."
GER_INT_strike_at_the_empire:0 "Schlage das Imperium"
GER_INT_strike_at_the_empire_desc:0 "Das Britische Empire ist eines der ältesten und stärksten Symbole imperialistischer Unterdrückung. Auch wenn wir es hassen, die Zerstörung eines anderen germanischen Imperiums mit anzusehen, ist sie unvermeidlich, der Dialekt verlangt es."
GER_INT_a_new_ally:0 "Ein neuer Verbündeter"
GER_INT_a_new_ally_desc:0 "Im Jahr 1927 geht im Osten ein neuer Stern auf. Mao Zedong hat eine Kommunistische Partei Chinas gegründet, die Sowjets haben die Regierung bereits anerkannt und es ist an der Zeit, dass wir dasselbe tun."
GER_INT_bastions_of_capitalism:0 "Bastionen des Kapitalismus"
GER_INT_bastions_of_capitalism_desc:0 "Nachdem wir ihrer Imperien beraubt und am Rande des Untergangs stehen, ist es an der Zeit, unseren Einfluss auf die imperialistischen Heimatländer geltend zu machen."
GER_INT_the_western_imperialists:0 "Die westlichen Imperialisten"
GER_INT_the_western_imperialists_desc:0 "Ohne ihr Empire sind die Briten hilflos. Wenn unser politischer Druck nicht ausreicht, werden deutsche Soldaten die Revolution an die Küsten Britanniens tragen."
GER_INT_the_eastern_imperialists:0 "Die östlichen Imperialisten"
GER_INT_the_eastern_imperialists_desc:0 "Die Japaner schufen aus der Not heraus ein Imperium, doch selbst dafür mussten sie bestraft werden. Mit Hilfe der Roten Flotte und Chinas. Die Revolution wird auf den japanischen Inseln Wurzeln schlagen."
GER_INT_the_hell_of_the_proletariat:0 "Die Hölle des Proletariats"
GER_INT_the_hell_of_the_proletariat_desc:0 "Die Vereinigten Staaten sind zum Zentrum der kapitalistischen Welt geworden und müssen als solches für die Unterdrückung ihrer Arbeiter bezahlen. Sie sind sogar so weit gegangen, ihre Arbeiter zu täuschen, die Revolution sei der Feind, und deshalb ist es doppelt wichtig, sie endgültig zu zerstören."
GER_INT_secret_armament_factories:0 "Geheime Rüstungsfabriken"
GER_INT_secret_armament_factories_desc:0 "Im Kriegsfall ist es wichtig, dass wir unsere militärischen Kapazitäten schnell wieder aufbauen können. Dies erreichen wir, indem wir sicherstellen, dass deutsche Interessen in neutralen Ländern uns mit dem benötigten Kriegsmaterial versorgen."
