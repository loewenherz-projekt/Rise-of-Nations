 GER_revise_weltpolitik:0 "Weltpolitik überarbeiten"
 
 GER_revise_weltpolitik_desc:0 "Obwohl die Idee der Weltpolitik des Deutschen Reichs spektakulär scheiterte, waren seine Grundannahmen hinsichtlich der Bedeutung der Außenpolitik in der Realität verwurzelt."
 GER_economic_conference:0 "Konferenz der Deutschen Wirtschaft"
 GER_economic_conference_desc:0 "Es soll eine kleine Konferenz mit den höchsten Vertretern unserer Regierungsführung und den führenden Wirtschaftsministern stattfinden. Dort werden wir Deutschlands Kurs festigen – oder es in eine andere Richtung lenken."
 GER_solidify_conference_results:0 "Konferenzergebnisse festigen"
 GER_solidify_conference_results_desc:0 "Obwohl die Ergebnisse der Konferenz umgesetzt wurden, erfordern die politischen Veränderungen eine tiefgreifendere Umstrukturierung einiger Ministerien und Abteilungen."
 GER_eliminate_facist_resistance:0 "Beseitigen Sie den faschistischen Widerstand"
 GER_eliminate_facist_resistance_desc:0 "Obwohl unser historischer Bürgerkrieg auf der Landkarte als Sieg gilt, gibt es weiterhin hartnäckige politische Widerstandsnester, die beseitigt werden müssen, um die Regierung und unsere Gesellschaft insgesamt zu stabilisieren."
 GER_fascism_censorship_campaigns:0 "Faschismus-Zensurkampagnen"
 GER_fascism_censorship_campaigns_desc:0 "Ein wichtiger Schritt zur Unterdrückung des nachhaltigen Einflusses der NSDAP ist die Verbannung ihrer Symbole und Ideologien aus der deutschen Gesellschaft."
 GER_consolidate_the_new_state_desc:0 "Obwohl die wichtigsten Organe der deutschen Regierung unter unserer Kontrolle stehen, müssen die kleineren staatlichen Institutionen und Ämter von den verbleibenden nationalsozialistischen Sympathien gesäubert und durch gemäßigteres Personal ersetzt werden."
 GER_consolidate_the_new_state:0 "Den neuen Staat konsolidieren"
 GER_economic_focus:0 "Wirtschaftlicher Fokus"
 GER_economic_focus_desc:0 "Die oberste Priorität der neuen Regierung sollte die Wiederherstellung der Stabilität im Wirtschaftsleben der einzelnen Deutschen sein, das sich durch den Aufstieg der NSDAP in vielerlei Hinsicht verändert hatte."
 GER_industrial_focus:0 "Industrieller Fokus"
 GER_industrial_focus_desc:0 "Die oberste Priorität der neuen Regierung sollte darin bestehen, unsere Anstrengungen im Industriesektor zu verdoppeln, ein breiteres Wirtschaftswachstum zu fördern und uns auf etwaige ausländische Feindseligkeiten vorzubereiten."
 GER_depoliticize_military:0 "Entpolitisierung des Militärs"
 GER_depoliticize_military_desc:0 "Unter Hitler richtete die Wehrmacht ihren Eid nicht auf ihr Volk, sondern auf den Diktator selbst. Die Umstrukturierung unseres Militärs zur Beseitigung politischer Einflussnahme und Intervention ist der Schlüssel zur Gewährleistung einer loyaleren und tatkräftigeren Armee."
 GER_professionalize_freikorps:0 "Professionalisierung der Freikorps"
 GER_professionalize_freikorps_desc:0 "Obwohl viele Mitglieder der alten Freikorps nach der Machtergreifung der Nazis der SS beitraten, ist ihre Loyalität gegenüber der deutschen Monarchie nach wie vor stark; es wäre töricht, sie nicht in einem neuen paramilitärischen Arm zu organisieren."
 GER_exercise_political_influence:0 "Unseren politischen Einfluss ausüben"
 GER_exercise_political_influence_desc:0 "Da sich unsere innenpolitischen Verhältnisse verbessert haben, ist es von entscheidender Bedeutung, dass wir unsere Rolle als wichtiger Akteur in der internationalen Politik schnell fortsetzen."
 GER_give_attaches_political_roles:0 "Geben Sie Attaches politische Rollen"
 GER_give_attaches_political_roles_desc:0 "Obwohl Militärattachés im Allgemeinen nur sehr eingeschränkt eingesetzt werden, kann uns die Ausweitung ihrer Rolle auf die eines Unterbotschafters einen Vorteil bei der Aufklärung und Planung verschaffen."
 GER_formalize_territorial_claims:0 "Formalisierung territorialer Ansprüche"
 GER_formalize_territorial_claims_desc:0 "Indem wir unsere Ansprüche der Welt offiziell bekannt geben, machen wir deutlich, dass Deutschland wieder auf dem Vormarsch ist und dass unsere territorialen Grenzen ernst genommen werden müssen."
 GER_rebuild_germany:0 "Deutschland wieder aufbauen"
 GER_rebuild_germany_desc:0 "Nach der Katastrophe des Bürgerkriegs und des Nazi-Regimes ist es von entscheidender Bedeutung, dass wir unsere Infrastruktur energisch wiederherstellen."
 GER_modern_german_military:0 "Modernes deutsches Militär"
 GER_modern_german_military_desc:0 "Anstatt uns bei der Entwicklung unserer militärischen Innovationen von der Vergangenheit leiten zu lassen, sollten wir uns bei der Modernisierung und Stärkung unserer Streitkräfte an den großen Militärreformern wie Clausewitz orientieren."
 GER_europe_stands_united:0 "Europa steht vereint"
 GER_europe_stands_united_desc:0 "Deutschland befindet sich in einer idealen Position, um große Teile Europas zusammenzubringen und ein gemeinsames Ziel zu erreichen: das Ende des Kommunismus."
 GER_balkan_membership:0 "Balkan-Mitgliedschaft"
 GER_balkan_membership_desc:0 "Der Balkan ist aufgrund seiner Zersplitterung und seiner wirtschaftlichen Schwäche eines der größten Ziele sowjetischen politischen Drucks. Wir müssen ihn schützen und für die Aufrechterhaltung stabiler Regierungen in der Region sorgen."
 GER_appeal_to_france:0 "Appell an Frankreich"
 GER_appeal_to_france_desc:0 "Obwohl Frankreich mit Großbritannien befreundet ist, könnte es sich als wichtiger Verbündeter erweisen, der seine kolonialen Ressourcen und seine industrielle Basis effektiv nutzen kann. Die Einbeziehung Frankreichs in unsere Fraktion könnte sich zumindest als Legitimationsfaktor als vorteilhaft erweisen."
 GER_offer_colonial_protection:0 "Bieten Sie kolonialen Schutz"
 GER_offer_colonial_protection_desc:0 "Die Niederländer und Belgier verfügen derzeit über bedeutende Kolonialgebiete in Übersee, die sie aufgrund ihrer Größe nicht wirksam schützen können. Vielleicht sollten wir diese Kolonien schützen, damit sie demokratisch und stabil bleiben?"
 GER_new_chancellor:0 "Ein neuer deutscher Kanzler"
 GER_new_chancellor_desc:0 "Um das Amt zu besetzen, das zuvor Hitler innehatte, ist ein willensstarker und moralisch undurchdringlicher Kanzler unerlässlich, und wir haben zwei sehr gute Kandidaten für diesen Job."
 GER_bundeswehr:0 "Die Bundeswehr"
 GER_bundeswehr_desc:0 "Um uns vom Erbe der Wehrmacht zu isolieren, werden wir eine neue Streitmacht schaffen, die Deutschland seine Schutzmacht nennen kann: die Bundeswehr."
 GER_conscription_and_civil_service:0 "Zivildienst"
 GER_conscription_and_civil_service_desc:0 "Die Einführung eines Wehrpflichtdienstes, der aufgeschobene Tätigkeiten – nämlich den Zivildienst – ermöglicht, wird nicht nur die Wehrdienstverweigerung verringern, sondern unseren öffentlichen Einrichtungen auch einige kleinere Vorteile bringen."
 GER_new_military_ethos:0 "Neues Militärethos"
 GER_new_military_ethos_desc:0 "Die Bundeswehr ist weder die Nachfolgerin der Reichswehr noch der Wehrmacht. Die Bundeswehr ist eine neue Streitkraft, die auf den Philosophien von Clausewitz, Scharnhorst und anderen basiert und im Namen des Volkes den Widerstand gegen die NSDAP unterstützen soll."
 GER_revising_the_abwehr:0 "Überarbeitung der Abwehr"
 GER_revising_the_abwehr_desc:0 "Die vorherige Regierung verfügte über einen recht effektiven Geheimdienst; in unserer gegenwärtigen Situation wäre es am sinnvollsten, ihn lediglich zu überarbeiten, anstatt ihn völlig zu erneuern."
 GER_gehlen_organization:0 "Die Gehlen-Organisation"
 GER_gehlen_organization_desc:0 " Die Ernennung des äußerst kompetenten und loyalen Reinhard Gehlen zum Vorsitzenden des deutschen Geheimdienstes wird sich als fantastische Investition in unseren Geheimdienst erweisen."
 GER_establish_BND:0 "Bundesnachrichtendienst"
 GER_establish_BND_desc:0 "Der Bundesnachrichtendienst soll die moderne Zusammenfassung der bisherigen Geheimdiensterfahrungen Deutschlands in Form einer gut funktionierenden Organisation sein."
 GER_establish_hegemony:0 "Etablierung einer hegemonialen Dominanz"
 GER_establish_hegemony_desc:0 "Deutschland hat seit dem moralisch verdorbenen Regime der Nazis einen langen Weg zurückgelegt und ist heute eine stolze Führungsmacht unserer Welt."
 GER_vertical_integration:0 "Vertikale Integration"
 GER_vertical_integration_desc:0 "Durch die Konsolidierung der gesamten Produktionskette von Anfang bis Ende in unserem Einflussbereich können wir aus unserem bereits effektiven System eine höhere Ressourceneffizienz und industrielle Effizienz herausholen."
 
 
