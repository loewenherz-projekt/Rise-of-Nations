 GER_not_inviting_ITA_will_also_EXPL4:0 "\n[ITA.GetFlag]§H[ITA.GetName]§! ist mit uns in einer Fraktion, ist keine §HPuppet§! und hat mehr als §H20%§! Kriegsbeteiligung. Daher hat dieses Ereignis auch die folgende §REffect§!:"
 GER_not_inviting_ITA_will_also_EXPL5:0 "\n[ITA.GetFlag]§H[ITA.GetName]§! ist mit uns in einer Fraktion, ist keine §HPuppet§! und hat mehr als §H10%§! Kriegsbeteiligung. Daher hat dieses Ereignis auch die folgende §REffect§!:"
