 GER_sphere_of_influence:0 "Einflussbereich"
 GER_sphere_of_influence_desc:0 "Indem wir unsere Hegemonie durch eine Politik begrenzter militärischer Interventionen ausbauen, halten wir möglicherweise den Schlüssel in der Hand, um neben den Vereinigten Staaten zu einem der Verteidiger der Demokratie in der Welt zu werden – was uns einen Teil dieses Einflusses sichern würde."
