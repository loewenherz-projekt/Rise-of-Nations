 GER_entwicklung_series_ADV_desc:0 "Die Entwicklungsserie vereint die meisten Panzerentwickler, um eine standardisierte Panzerserie zu entwickeln. Es soll Standardmodelle in fünf verschiedenen Gewichtsklassen (E-10, E-25, E-50, E-75 und E-100) geben, aus denen mehrere spezialisierte Varianten entwickelt werden sollen.\n\nDadurch wird der Trend zu extrem komplexen Panzerdesigns umgekehrt, der zu niedrigen Produktionsraten und mechanischer Unzuverlässigkeit geführt hatte."
