 ########################## Focuses ##########################
 GMO_west_wall:0 "Wiederaufbau der Siegfriedstellung"
 GMO_west_wall_desc:0 "Der seit dem Ersten Weltkrieg stillgelegte Westwall liegt an der Grenze zu Frankreich in Trümmern. Nach der kürzlich erfolgten Fertigstellung der Maginot-Linie sehen wir keinen Grund, den Bau einer vergleichbaren Verteidigungslinie hinauszuzögern. Dieses Mal sind wir vorbereitet!"
 GMO_atlantikwall:0 "Befestigen Sie die Atlantikküste"
 GMO_atlantikwall_desc:0 "Mit der jüngsten Eroberung Frankreichs haben wir uns der britischen Marine geöffnet, und die Alliierten werden vor nichts zurückschrecken, um das europäische Festland zurückzuerobern. Um dem entgegenzuwirken, hat unser Oberkommando die Idee entwickelt, die Küste zu befestigen, um solche Invasionen zu verhindern."
 GMO_ostwall:0 "Ostwall fertigstellen"
 GMO_ostwall_desc:0 "Der Bau der Festungsfront Oder-Warthe-Bogen, kurz Ostwall, begann 1932. Da der Krieg mit der UdSSR immer näher rückt, wäre es am besten, diese Bemühungen zu unterstützen und den Bau so schnell wie möglich abzuschließen."
 
 GMO_Reinstal_Kriegsamt:0 "Reinstall die Kriegsamt"
 GMO_Reinstal_Kriegsamt_desc:0 "Das „Oberste Kriegsamt“ diente im Ersten Weltkrieg als staatliche Organisation mit der Aufgabe, die Wirtschaft von der zivilen auf die militärische Produktion umzustellen. Wir werden das Kriegsamt wieder einführen und unsere Wirtschaft rechtzeitig auf die kommenden Kriege vorbereiten."
 GMO_Prewar_Industry:0 "Industrielle Mobilisierung vor dem Krieg"
 GMO_Prewar_Industry_EXPL:0 "Diese Idee wird „verloren gehen“, wenn wir in den Krieg ziehen."
 GMO_Prewar_Industry_desc:0 "Aus eigener Erfahrung während des Weltkriegs wissen wir, dass Deutschland keine Chance auf lang anhaltende Konflikte hat, wenn es uns nicht gelingt, unsere Industrie so zu mobilisieren, dass sie und das deutsche Volk den nächsten Weltkrieg überleben können."
 GMO_War_Economy:0 "Kriegswirtschaft"
 GMO_War_Economy_desc:0 "Da direkt vor unseren Grenzen Kriege ausgetragen werden, scheint es keinen Grund zu geben, unseren wirtschaftlichen Übergang zu einer vorwiegend auf den Krieg ausgerichteten Wirtschaft zu verzögern."
 GMO_Military_Storages:0 "Militärische Backup-Speicher"
 GMO_Military_Storages_EXPL:0 "Entscheidungen zum Freischalten: §HBackup-Waffenlager§!."
 GMO_Military_Storages_desc:0 "Wir können uns nicht mehr auf Blitzkriege verlassen wie früher. Die beste Lösung besteht darin, militärische Ausrüstung aufzubewahren."
 GMO_Oil_Reserves:0 "Öllager"
 GMO_Oil_Reserves_desc:0 "Bei den jüngsten Bemühungen um Autarkie und die Synthese von Öl haben wir festgestellt, dass die Menge an Kraftstoff, die wir derzeit haben, nicht genutzt wird. Daher besteht die Notwendigkeit, Kraftstofflager zu bauen, um Kraftstoff in Reserve zu halten, bis er benötigt wird."
 
 GMO_autarky:0 "Autarkie"
 GMO_autarky_desc:0 "Deutschland gerät in große Schwierigkeiten, wenn ihm die benötigten Ressourcen ausgehen. Um dem entgegenzuwirken, sind sich unsere Wirtschaftsminister einig, dass das Streben nach Autarkie derzeit die einzig mögliche Option ist."
 GMO_coal_liquidization:0 "Kohleverflüssigung"
 GMO_coal_liquidization_desc:0 "Eine der Ressourcen, die Deutschland dringend benötigt, aber an der es mangelt, ist Öl. Die Panzerwaffe, die Luftwaffe und die Kaiserliche Marine benötigen alle erhebliche Mengen Öl. Wir müssen lernen, dieses „schwarze Gold“ zu synthetisieren, um das Wachstum und den Erhalt des Deutschen Heeres zu sichern."
 GMO_synthetic_rubber:0 "Synthetischer Kautschuk"
 GMO_synthetic_rubber_desc:0 "Da wir den größten Teil unseres Ölbedarfs gedeckt haben, können wir uns auf die Synthese von Kautschuk konzentrieren, einer dringend benötigten Ressource für die Luftwaffe und die motorisierten Brigaden des Armeekorps."
 
 GER_a_new_and_better_germany_tt:0 "Neuer Vierjahresplan"
 GER_a_new_and_better_germany_tt_desc:0 ""
 GMO_autobahn:0 "Autobahnbau beenden"
 GMO_autobahn_desc:0 "Im Zuge der Modernisierung Deutschlands werden zunehmend Panzer und Lastwagen eingesetzt. Um sich besser auf künftige Konflikte vorzubereiten, ist der Ausbau der Autobahnen eine gute Idee. Sie werden mehrere Teile Deutschlands eng miteinander verbinden, was wiederum unserer Wirtschaft zugutekommt und unsere Reaktionszeit im Konfliktfall verbessert."
 GMO_civilian_one:0 "Kaiser Wilhelm Werke"
 GMO_civilian_one_desc:0 "Wir haben einen riesigen Teil der Industrie zurückerhalten, die den ehemaligen Nazis konfisziert worden war. Wir können sie nun in einen Konzern namens Kaiser Werke umwandeln, der allen deutschen Bürgern gleiche Arbeitsrechte garantiert."
 GMO_civilian_two:0 "Fortsetzung des Volkswagen-Programms"
 GMO_civilian_two_desc:0 "Die Idee hinter dem Peoples Car gibt es seit dem Modell T vor rund 20 Jahren. Das von Ferdinand Porsche und [GER.GetLeader] initiierte Programm ist bisher ein Erfolg für die Bürger Deutschlands. Wir können nur vermuten, dass die Fortsetzung dieses Programms für uns alle von Vorteil sein wird."
 GMO_Support_Threatened_Nations:0 "Unterstützen Sie die Grenzstaaten"
 GMO_Support_Threatened_Nations_desc:0 "Wir haben uns in letzter Zeit der Sowjetunion zugewandt, dem Brutland der Oktoberrevolution, und damit auch der Erkenntnis, dass die europäischen Grenzstaaten dringend Unterstützung benötigen. Wir müssen ihnen Unterstützung gegen den sowjetischen Bären schicken."
 GMO_Research:0 "Forschungseinrichtungen"
 GMO_Research_desc:0 "Wo unsere Gegner zahlenmäßig überlegen sind, müssen wir in Qualität und Innovation die Nase vorn haben. Die Finanzierung zusätzlicher Forschungseinrichtungen ist der richtige Schritt."
 GMO_wunderwaffe:0 "Unterstützen Sie Heisenbergs Kernforschung"
 GMO_wunderwaffe_desc:0 "Werner Karl Heisenberg ist theoretischer Physiker und einer der wichtigsten Pioniere der Quantenmechanik. Er leistete bereits wichtige Beiträge zur Theorie der Hydrodynamik turbulenter Strömungen, des Atomkerns, des Ferromagnetismus, der kosmischen Strahlung und der subatomaren Teilchen. Nun ist er nur noch wenige Schritte von der Entwicklung einer neuen, mächtigen Waffe entfernt: dem Heisenberg-Gerät, dem Höhepunkt der modernen Kriegsführung!"
 GMO_pool_technical_know_how:0 "Pooltechnisches Know-how"
 GMO_pool_technical_know_how_desc:0 ""
 
 GMO_New_Reichs_Heer:0 "Das neue Deutsche Heer"
 GMO_New_Reichs_Heer_desc:0 "Nach unserem jüngsten Sieg gegen die Nazi-Usurpatoren müssen wir die ehemalige Wehrmacht wieder in das Deutsche Heer umwandeln. Die Macht der deutschen Armee wird der Welt wieder sichtbar werden!"
 GMO_Reinforce_Modern_Doctrine:0 "Die moderne Doktrin verstärken"
 GMO_Reinforce_Modern_Doctrine_desc:0 "Die Zeiten der Schützengräben sind vorbei. Der Kaiser hat der Armee befohlen, ihre Taktik zu reformieren, um sicherzustellen, dass niemand auf beiden Seiten des Krieges die Notwendigkeit, geschweige denn die Zeit, sie auszuheben, haben wird."
 GMO_Reinforce_the_Panzerwaffe:0 "Modernisierung der Panzerwaffe"
 GMO_Reinforce_the_Panzerwaffe_desc:0 "Die Panzer des Ersten Weltkriegs waren langsam und unzuverlässig, doch jetzt, nach einiger Zeit und Investitionen, verfügen wir über ein mobiles Panzerkorps, das jederzeit bereit ist, mit der neuen Armee unseres großen Imperiums zuzuschlagen."
 GMO_Mechanized:0 "Sonderkraftfahrzeug-Modelle"
 GMO_Mechanized_desc:0 "Sonderkraftfahrzeug ist die Bezeichnung für die Kampfmittelausstattung unserer Reichsarmee. Unter anderem können wir die Entwicklung moderner Halbkettenfahrzeuge für den Einsatz in schwierigem Gelände vorantreiben. Diese Maschinen können mit MGs, Flugabwehrkanonen oder sogar Panzerabwehrkanonen ausgerüstet werden."
 GMO_Improve_Support_Companies:0 "Mobile Support-Unternehmen"
 GMO_Improve_Support_Companies_desc:0 "Mit der zunehmenden Mobilität der Armee werden auch ihre Logistik- und Unterstützungsunternehmen mobiler. Die Männer werden nicht länger hungern oder ohne Munition sein. Sie erhalten die Vorräte und Unterstützung, die sie für den Sieg brauchen!"
 GMO_Mobile_Warfare:0 "Moderner Blitzkrieg"
 GMO_Mobile_Warfare_desc:0 "Die Welt verändert sich, und unser Militär muss sich mit ihr verändern. Jede Division der Armee wird motorisiert oder mechanisiert sein. Die Mobilität der Armee ist der wichtigste Faktor für unsere Siege. Den Feind mit überlegenen Bewegungen und Vorstößen in wichtige Gebiete zu überwältigen, wird dem Kaiser Ruhm und Gold bringen!"
 GMO_Back_to_old_Tactics:0 "Zurück zu unseren alten Taktiken"
 GMO_Back_to_old_Tactics_desc:0 "Der Blitzkrieg hat uns im Weltkrieg im Stich gelassen. Deshalb müssen wir den Einsatz unserer Artillerie und Unterstützungsbrigaden verbessern und unsere Vorstöße mit Vorsicht planen."
 GMO_Prussian_Training:0 "Preußische Militärdisziplin"
 GMO_Prussian_Training_desc:0 "Preußen, der alte deutsche Staat, Vater des Deutschen Ordens. Preußische Soldaten waren für ihre Disziplin und ihr Können im Kampf bekannt. Ihr Erbe muss fortgeführt werden."
 GMO_Recall_Generals:0 "Rufen Sie die Generäle des Kaisers zurück"
 GMO_Recall_Generals_desc:0 "Nach dem Ersten Weltkrieg gingen viele Generäle aus Angst vor Vergeltungsmaßnahmen der „siegreichen Alliierten“ in den Ruhestand oder flohen aus Deutschland. Doch mit der Rückkehr des Kaisers sind sie vielleicht bereit, ihre Ehre und die Deutschlands wiederherzustellen, indem sie erneut in den Dienst des Kaisers treten."
 GMO_Improve_Infantry_Equipment:0 "Infanterieausrüstung verbessern"
 GMO_Improve_Infantry_Equipment_desc:0 "Das Kaiserreich muss seinen Feinden mit der Ausrüstung, die es seinen Truppen zur Verfügung stellt, immer einen Schritt voraus sein. Durch Investitionen in die militärische Entwicklung wird sichergestellt, dass die Männer die bestmögliche Ausrüstung erhalten."
 GMO_Artilery:0 "Moderne Artillerie"
 GMO_Artilery_desc:0 "Um auf dem Schlachtfeld über überlegene Feuerkraft zu verfügen, müssen wir unsere Artillerie modernisieren. Nur dann können wir die befestigten und verschanzten Linien des Feindes angreifen und mühelos durchbrechen."
 GMO_Support:0 "Verbesserte Support-Unternehmen"
 GMO_Support_desc:0 "Unsere derzeitigen Unterstützungsunternehmen sind nicht akzeptabel. Sie müssen mit besserer Ausrüstung und Ausbildung ausgestattet werden, um für das Imperium weiterhin nützlich zu sein."
 GMO_Overwhelming_Fire:0 "Kriegsdoktrin „Überwältigendes Feuer“."
 GMO_Overwhelming_Fire_desc:0 "Der Erste Weltkrieg wurde mit Menschen und Artillerie geführt. Wir müssen uns von der stationären Taktik der Vergangenheit abwenden und das verheerende Feuer der Artillerie in großen Mengen in unsere mechanisierten Streitkräfte integrieren. Nichts jagt dem Feind mehr Angst ein als eine ordentliche Dosis Blei, die aus kilometerweiter Entfernung abgefeuert wird – oder aus nächster Nähe, wie manche Kommandeure es bevorzugen."
 GMO_Heavy_Tanks:0 "Schwerer Panzer „Tiger, der Zuschlägt“."
 GMO_Heavy_Tanks_desc:0 "Qualität vor Quantität. Wir werden unsere schweren Panzerdesigns verbessern und einzigartige Panzer entwickeln, die weltweit ihresgleichen suchen. Hervorragende Panzerung, gute Beweglichkeit und eine herausragende Kanone werden andere Panzerbataillone in Stücke reißen."
 
 GMO_Luftwaffe:0 "Deutsche Luftstreitkräfte"
 GMO_Luftwaffe_desc:0 "Die Luftstreitkräfte, die deutsche Kaiserliche Luftwaffe, leisteten uns im Weltkrieg gute Dienste. Mit der Verbesserung der Flugzeugqualität wird ihr Einsatz in jedem zukünftigen Konflikt immer wichtiger."
 GMO_Focus_on_Offence:0 "Kontrolliere den feindlichen Himmel"
 GMO_Focus_on_Offence_desc:0 "Die Imperiale Luftwaffe soll ihre Piloten für Angriffsoperationen über feindlich besetztem Gebiet ausbilden und den Feind in seinem eigenen Land bedrängen, damit unser Land weiterhin einen klaren Himmel hat."
 GMO_Fighter_Innovations:0 "Die Jagdwaffe erneuern"
 GMO_Fighter_Innovations_desc:0 "Das Rückgrat der Luftstreitkräfte, die Jagdwaffe, muss modernisiert werden. Messerschmitt und Focke-Wulf werden versuchen, neue Jagdflugzeugmodelle zu entwickeln, die am Himmel über Europa ihresgleichen suchen."
 GMO_Riesenflugzeug_Program:0 "Neues Riesenflugzeug-Programm"
 GMO_Riesenflugzeug_Program_desc:0 "Riesenflugzeuge waren große Bomber aus dem Weltkrieg. Ihr Einsatz erwies sich als sehr wichtig und wir können unseren Konkurrenten bei der Modernisierung unserer aktuellen Bombermodelle nicht hinterherhinken."
 GMO_Bomber_Innovation:0 "Moderne Bomber"
 GMO_Bomber_Innovation_desc:0 "Die Geschwaderkommandeure der Luftwaffe haben dem Oberkommando auf Grundlage der Ergebnisse ihrer Einsätze Vorschläge und Forderungen unterbreitet. Diese Ansichten müssen wir berücksichtigen. Schließlich fliegen sie die Flugzeuge, die wir ihnen zur Verfügung stellen."
 GMO_Heavy_Fighter_Innovation:0 "Verteidigung und Eskorte\nSchwere Jäger"
 GMO_Heavy_Fighter_Innovation_desc:0 "Um den Himmel wirklich zu schützen, müssen wir schwere Kampfflugzeuge entwickeln, die in der Lage sind, große Entfernungen zurückzulegen, feindliche Bomber abzufangen und unsere eigenen zu eskortieren."
 GMO_Offensive_Air_Doctrine:0 "Offensive Luftdoktrin"
 GMO_Offensive_Air_Doctrine_desc:0 "Die neuen Ausbildungsmethoden der Luftwaffe müssen verfeinert werden. Wir sollten Innovation und Zusammenarbeit mit Heer und Marine fördern, um die Luftwaffe bei militärischen Operationen effektiver einsetzen zu können. Die Luftwaffe wird gemeinsam mit den Männern trainieren, die ihre Unterstützung im Kampf benötigen."
 GMO_Focus_on_Defence:0 "Schützen Sie unsere eigenen"
 GMO_Focus_on_Defence_desc:0 "Die kaiserliche Luftwaffe wird sich auf Verteidigungsoperationen in unserem Himmel konzentrieren. Unter der Aufsicht des Kaisers wird niemand jemals Zeuge der Bombardierung seiner Heimat."
 GMO_Flag_Towers:0 "Verteidigungsanlagen für Flaktürme"
 GMO_Flag_Towers_desc:0 "Wenn die Sicherheit unserer Heimat bedroht ist, werden alle Menschen Deutschlands und seines Reiches mit allen Mitteln in den Dienst des Kaisers strömen. Wir sollten sie zum Bau von Verteidigungsanlagen im gesamten Reich einsetzen, um die Arbeitskräfte des Militärs freizusetzen. Vielleicht können die Kinder dabei helfen?"
 GMO_Excellent_Interceptors:0 "Moderne Bomberjäger"
 GMO_Excellent_Interceptors_desc:0 "Um die Sicherheit unserer Bürger und unserer Industrie zu gewährleisten, müssen wir uns auf die Entwicklung eines hervorragenden Abfangjägers konzentrieren, der unseren Himmel vor jedem Bomber schützen kann, der es wagt, unseren souveränen Luftraum zu verletzen."
 GMO_Defensive_Air_Doctrine:0 "Defensive Luftdoktrin"
 GMO_Defensive_Air_Doctrine_desc:0 "Die Sicherheit unseres Imperiums hat für das Wohl unseres Volkes und seiner Truppen höchste Priorität. Zu diesem Zweck erhalten alle Piloten eine umfassende und professionelle Ausbildung im Umgang mit allen aktuellen und zukünftigen Abfangjägern. Sie tragen die persönliche Verantwortung für das Leben unserer Untertanen und den Schutz der Wirtschaft. Ihre Verantwortung wird sie zur mächtigsten Verteidigung antreiben!"
 GMO_Rocket_Innovations:0 "Raketeninnovationen"
 GMO_Rocket_Innovations_desc:0 "Fortschritte in der Treibstoffverbrennung und der Flugzeugentwicklung haben Wissenschaftler, Ingenieure und Piloten dazu ermutigt, gemeinsam an der Entwicklung effizienterer Triebwerke zu arbeiten, die weltweit beispiellose Geschwindigkeiten erreichen. Das Imperium muss die Entwicklung dieser neuen Ideen unterstützen!"
 
 GMO_Naval_Rearmament:0 "Wiederaufbau der Kaiserlichen Marine"
 GMO_Naval_Rearmament_desc:0 "Die französischen und britischen Hunde haben uns am Ende des letzten Krieges unsere Marine geraubt. Jetzt ist der Kaiser zurückgekehrt und träumt davon, die Marine wiederaufzubauen und sogar über die der britischen und französischen Marine zusammen hinaus zu erweitern! Beginnen wir mit der Umsetzung dieses Traums, indem wir die Voraussetzungen schaffen, um die Marine zu ihrem früheren und zukünftigen Ruhm zu führen!"
 GMO_Battleship:0 "Besseres Schlachtschiffdesign"
 GMO_Battleship_EXPL:0 "Technologie hinzufügen: §HSchlachtschiff H41§!.\n"
 GMO_Battleship_desc:0 "Die Schlachtschiffe der Kaiserlichen Marine sind veraltet. Sie sind das Herzstück unserer Marine, und wenn wir es wagen, die französisch-britische Seemacht herauszufordern, müssen wir die modernsten Schlachtschiffe entwickeln, die es je gab."
 GMO_Cruisers:0 "Kreuzer modernisieren"
 GMO_Cruisers_desc:0 "Die Modernisierung unserer Flotte hat für uns oberste Priorität und wir sollten zunächst mit der Verbesserung unserer Kreuzer beginnen."
 GMO_Destroyers:0 "U-Boot-Jagdtrupps"
 GMO_Destroyers_desc:0 "Wie wir im letzten Krieg festgestellt haben, können sich unsere U-Boote sehr gut vor Überwasserschiffen verstecken. Wir sollten Maßnahmen ergreifen, um ein Schiff zu entwickeln, das in der Lage ist, diese U-Boote und die unserer Feinde aufzuspüren."
 GMO_Zepelin:0 "Das Graf Zepelin Projekt"
 GMO_Zepelin_desc:0 "Die Graf Zeppelin wird der erste von vielen deutschen Flugzeugträgern und der neue Stolz der Kaiserlichen Marine sein. Ihre Fertigstellung wird jedoch nicht einfach sein, da unsere Ingenieure nur begrenzte Erfahrung mit dem Bau dieser Schiffstypen haben."
 GMO_Search_for_Naval_Aircrafts:0 "Entwicklung von Marineflugzeugen"
 GMO_Search_for_Naval_Aircrafts_desc:0 "Da nur wenige Verbündete bereit sind, uns bei der Entwicklung von Marineflugzeugen zu unterstützen, müssen wir uns bei der Entwicklung dieser neuen Flugzeugtypen auf unsere Erfahrungen aus der Vergangenheit und die deutsche Ingenieurskunst verlassen. Wir können alle notwendigen Informationen aus unseren früheren Versuchen während des Weltkriegs sammeln."
 GMO_New_Navy_Doctrine:0 "Neue Marinedoktrin"
 GMO_New_Navy_Doctrine_desc:0 "Schiffe sind langsam und anfällig für Angriffe aus dem Meer oder aus der Luft. Deshalb müssen wir unsere Kriegsdoktrin überarbeiten und Trägerkampfgruppen den Vorrang einräumen, da diese die nördlichen Meere problemlos kontrollieren und feindliche Schiffe und Häfen gleichermaßen angreifen können."
 GMO_Old_Navy_Doctrine:0 "Alte Marinedoktrin"
 GMO_Old_Navy_Doctrine_desc:0 "Schlachtschiffe, riesige und gepanzerte Schiffe, werden in zukünftigen Seeschlachten eine entscheidende Rolle spielen. Unsere Marinedoktrin muss auf dieser Überzeugung beruhen."
 GMO_Pride_of_Modern_Germany:0 "Der Stolz der Kaiserlichen Marine"
 GMO_Pride_of_Modern_Germany_desc:0 "Schlachtschiffe, riesige und gepanzerte Schiffe, werden in zukünftigen Seeschlachten eine entscheidende Rolle spielen. Unsere Feinde verfügen über eine große Marine, aber ihre Kriegsschiffe sind alt und haben gegen unsere Schlachtschiffe der neuen Ära keine Chance."
 GMO_Recall_Admirals:0 "Rufen Sie die Admirale des Kaisers zurück"
 GMO_Recall_Admirals_desc:0 "Nach dem Verlust des größten Teils unserer Marine gingen die Admirale in den Ruhestand oder übernahmen andere Aufgaben, die sie bei der Nachkriegsregierung übernehmen konnten. Nachdem der Kaiser die Wiedergeburt der Kaiserlichen Marine angeordnet hat, werden diese großen Seeleute keine Chance ausschlagen, im Namen eines starken Deutschlands, eines großen Kaisers und einer modernen Marine wieder in See zu stechen."
 GMO_Expand_Dockyards:0 "Erweitern Sie die Imperial Dockyards"
 GMO_Expand_Dockyards_desc:0 "Eine große Marine erfordert enorme Produktionskapazitäten. Der Ausbau unserer Werften wird uns helfen, Schiffe schneller und effizienter zu bauen."
 GMO_Marines:0 "Bilden Sie Kaiserliche Seebataillone"
 GMO_Marines_desc:0 "Die Länder unserer Feinde werden durch die Meere geschützt. Wir werden unseren Soldaten eine spezielle Ausbildung zukommen lassen, damit sie besser mit Seeinvasionen umgehen können, die heute für unseren Weg zum Sieg entscheidend sind."
 
 GMO_Weltpolitik:0 "Umarme die Weltpolitik"
 GMO_Weltpolitik_EXPL:0 "§MReaktiver Fokus!§! Schaltet „§HWeltpolitik-Fokuspfad§!“ frei."
 GMO_Weltpolitik_desc:0 "Weltpolitik ist eine imperialistische Außenpolitik mit dem Ziel, Deutschland durch aggressive Diplomatie, den Erwerb von Kolonien in Übersee und den Aufbau einer großen Marine in eine Weltmacht zu verwandeln.\nMit der Rückkehr des Kaisers an die Macht können wir diese Idee erneut aufgreifen und Deutschland in die Macht verwandeln, die es sein soll."
 GMO_Expand_German_World_Influence:0 "Vergrößern Sie den kaiserlichen Welteinfluss"
 GMO_Expand_German_World_Influence_desc:0 "Deutschland ist wieder vereint und fest. Jetzt dürfen wir nicht zögern, unseren Einfluss auf die Welt auszudehnen, die so lange vom französisch-britischen Kapitalismus und Imperialismus geschlagen wurde. Wir werden eine Alternative für diejenigen sein, die sich nicht allein verteidigen können."
PRC_power_consolidation:0 "Energiekonsolidierung"
PRC_power_consolidation_desc:0 "Durch die Konsolidierung der Macht im Partei- und Staatsapparat ist unsere Regierungsführung stabiler und effizienter, was es uns ermöglicht, unsere Politik wirksam umzusetzen und die Kontrolle über das Land zu behalten."

 GMO_Chi_EXPL:0 "Dieser Fokus wird unseren Einfluss in China „erhöhen“."
 GMO_Chi_Von_Falkenhausen:0 "Von Falkenhausens\nAufenthalt in China"
 GMO_Chi_Von_Falkenhausen_desc:0 "Alexander von Falkenhausen befindet sich auf einer Militärmission in China. Er hat sich für das chinesische Militär als wertvoll erwiesen. Indem wir seinen Aufenthalt dort dauerhaft gestalten, können wir unsere diplomatischen Beziehungen zu China deutlich verbessern und uns neue Möglichkeiten in Asien eröffnen."
 GMO_Chi_Expand_Military_Mission:0 "Ausbau der deutsch-chinesischen Militärmission"
 GMO_Chi_Expand_Military_Mission_desc:0 "Der Prozess, die unerfahrene chinesische Armee in eine mächtige Streitmacht umzuwandeln, erfordert Zeit und Geduld. Doch indem wir ihnen mehr unserer Generäle schicken, können wir diesen langwierigen Prozess erheblich beschleunigen."
 GMO_Chi_Investments:0 "Erneuerung der chinesischen Industrialisierung"
 GMO_China_Investments_EXPL:0 "Schalten Sie Entscheidungen zum Thema „Investitionen in China“ frei."
 GMO_Chi_Investments_desc:0 "Deutsche Investoren besitzen bereits einen beträchtlichen Anteil der chinesischen Industrie. Indem wir mehr in ihre Wirtschaft investieren, können wir unseren Einfluss in China stärken."
 GMO_Chi_Licences:0 "Stellen Sie unsere Lizenzen zur Verfügung"
 GMO_Chi_Licences_desc:0 "Da deutsche Investoren die Mehrheitsanteile und den größten Einfluss in der chinesischen Industrie haben, können wir den Chinesen unsere neuesten Designs und Lizenzen für deren Herstellung bedenkenlos zur Verfügung stellen, ohne befürchten zu müssen, dass sie diese an andere Länder weiterverkaufen."
 GMO_Chi_Guarantee_Chiang:0 "Garantieren Sie das Kuomintang-Regime"
 GMO_Chi_Guarantee_Chiang_desc:0 "Wir werden dem Kuomintang-Regime Garantien geben, die uns dabei helfen werden, unsere Investitionen und unseren Einfluss in China zu sichern."
 GMO_Chi_Stability:0 "Industrie- und Hafengebiet Nanjing"
 GMO_Chi_Stability_desc:0 "Um eine echte Seeverbindung zwischen unseren beiden Nationen sicherzustellen, werden wir in den Bau eines riesigen Industriehafengebiets in der Nähe von Nanjing investieren."
 GMO_Chi_In_Faction:0 "Laden Sie China zur imperialen Allianz ein"
 GMO_Chi_In_Faction_desc:0 "Nachdem wir unseren Einfluss in China gesichert haben, wäre der letzte Schritt die Formalisierung des Bündnisses zwischen unseren beiden Nationen."
 GMO_Chi_Demands:0 "Nutzen Sie unseren Einfluss"
 GMO_Chi_Demands_EXPL:0 "Je größer unser „Einfluss“ in China ist, desto mehr werden wir von ihnen bekommen, wenn wir diesen Schwerpunkt erreichen."
 GMO_Chi_Demands_desc:0 "Wir sollten versuchen, von den Chinesen größere Vorteile als Gegenleistung für unsere „Bemühungen“, ihnen zu helfen, zu erhalten."
 GMO_Chi_Subdue_Warlords:0 "Weisen Sie die Kriegsherren in ihre Schranken"
 GMO_Chi_Subdue_Warlords_desc:0 "China war in den letzten zwei Jahrzehnten zersplittert. Mit unserem gesicherten Bündnis mit China können wir nun dazu beitragen, China wieder zu vereinen!"
 
 GMO_Bra_Relationship:0 "Deutsch-brasilianische Beziehungen"
 GMO_Bra_Relationship_desc:0 "Getúlio Vargas, in Brasilien bekannt als „Vater der Armen“, betrachtete Deutschland stets als inspirierende Nation. Er möchte Brasilien industrialisieren und durch die Entsendung von Hilfsgütern könnten wir auf dem amerikanischen Kontinent einen starken Verbündeten gewinnen."
 GMO_Bra_Kickstart_the_Industry:0 "Ankurbeln der brasilianischen Industrialisierung"
 GMO_Bra_Kickstart_the_Industry_desc:0 "Brasilien bietet viele Möglichkeiten für unverhohlene Investitionen. Seine riesigen Ländereien bergen zahlreiche Bodenschätze und seine Städte sind bereit für eine Industrialisierung nach europäischem Vorbild. Und wir verfügen über die nötigen Ressourcen, um sie in Gang zu bringen."
 GMO_Bra_Vale_Mining:0 "Vale Bergbauindustrie"
 GMO_Bra_Vale_Mining_desc:0 "Der nächste Schritt zur Entwicklung der brasilianischen Industrie besteht darin, die Bodenschätze Brasiliens zu erschließen und zu nutzen. Der Ausbau der Eisenminen von Vale im Amazonasgebiet und in São Paulo wird dabei sicherlich hilfreich sein."
 GMO_Bra_Petrobras_Oil:0 "Mitbegründer der Petrobras Oil Company"
 GMO_Bra_Petrobras_Oil_desc:0 "Man geht davon aus, dass Brasilien über beträchtliche Ölvorkommen verfügt, die von der deutsch-brasilianischen Ölgesellschaft Petrobras vollständig gefördert werden können."
 GMO_Bra_Provide_Technology:0 "Know-how vermitteln"
 GMO_Bra_Provide_Technology_desc:0 "Um die Effizienz der brasilianischen Industrie zu maximieren, stellen wir ihnen unser industrielles Know-how zur Verfügung. Dies wird dazu beitragen, ihre älteren Maschinen und ihre Produktion zu modernisieren."
 GMO_Bra_Invitation:0 "Sichere brasilianische Allianz"
 GMO_Bra_Invitation_desc:0 "Brasilien ist industrialisiert und modernisiert, und Vargas ist unser Schuldner. Er hat die Vorteile erkannt, die unsere Freundschaft mit sich bringt, und wird ein Bündnisangebot sicherlich nicht ablehnen."
 
 GMO_Tur_Old_Times:0 "Erinnert an die\ngute alte Zeit"
 GMO_Tur_Old_Times_desc:0 "Die Osmanen beherrschten den Nahen Osten ein halbes Jahrtausend lang. Heute kennen die Türken nur noch das Unrecht, das ihnen nach dem Weltkrieg widerfuhr, und den Stolz ihrer Rebellion, die Atatürk erfolgreich beendete. Doch die Alliierten haben noch immer Schulden zu begleichen."
 GMO_Tur_Pressure_Bulgaria:0 "Druck Bulgarien"
 GMO_Tur_Pressure_Bulgaria_desc:0 "Bulgarien war im Ersten Weltkrieg einer unserer Verbündeten und wird es auch weiterhin sein. Unser Bündnis mit der Türkei hat das Land in eine einzigartige Lage gebracht: Schließt euch uns an oder ihr werdet völlig vernichtet."
 GMO_Tur_Syrian_Revolt:0 "Unterstützen Sie die syrische Revolution"
 GMO_Tur_Syrian_Revolt_desc:0 "Syrien wurde nach dem Weltkrieg die Unabhängigkeit versprochen. Doch die Alliierten haben gelogen, und nun ist das Land erneut vom westlichen Imperialismus besetzt. Es dürfte nicht schwer sein, einen geplanten Aufstand des nationalen Widerstands zu entfachen."
 GMO_Tur_Natural_Wealth:0 "Türkische Mineralvorkommen enthüllen"
 GMO_Tur_Natural_Wealth_desc:0 "Die Türkei verfügt über enorme Vorkommen an natürlichen Rohstoffen, insbesondere Stahl und Chrom. Mit unseren finanziellen Investitionen können wir diese in einem riesigen Rohstoffindustriekomplex nutzen, der bei der zukünftigen Bewaffnung unserer schweren Truppen eine große Rolle spielen wird."
 GMO_Tur_Ankara_Industry:0 "Industriekomplex Ankara"
 GMO_Tur_Ankara_Industry_desc:0 "Im nächsten Krieg werden Panzertruppen eine entscheidende Rolle spielen. Die Türken grenzen an die Sowjetunion, Frankreich und Großbritannien. Daher muss der Ausbau ihrer Panzerkapazitäten unsere Priorität sein."
 GMO_Tur_Second_Rundsted_Mission:0 "Von Rundstedts zweite Militärmission"
 GMO_Tur_Second_Rundsted_Mission_EXPL:0 "Wir werden §HGerd von Rundstedt§! auf eine 18-monatige Militärmission nach [TUR.GetFlag]§H[TUR.GetName]§! schicken.\nEr wird die türkischen Generäle ausbilden und hoffentlich ein türkisches Bündnis sichern.\n"
 GMO_Tur_Second_Rundsted_Mission_desc:0 "Von Rundstedt war sehr erfolgreich darin, die Chinesen zu beraten und auszubilden, doch es ist an der Zeit, dass er näher an der Heimat arbeitet. Die türkischen Generäle könnten einen erfahrenen General gebrauchen, der sie ausbildet und berät. Wenn er erfolgreich ist, könnten wir ihn dazu drängen, ein Bündnis mit den Generälen vorzuschlagen, mit denen er zusammenarbeitet."
 GMO_Tur_European_Standart_Army:0 "Europäische Standardarmeeausrüstung"
 GMO_Tur_European_Standart_Army_EXPL:0 "„Von Rundsteds“ Mission ist beendet."
 GMO_Tur_European_Standart_Army_desc:0 "Die türkische Armee ist ausgebildet und gut diszipliniert, es bleibt nur noch, sie auszurüsten.\nWir werden unsere Ingenieure schicken, um bei der Modernisierung ihrer Ausrüstung zu helfen."
 GMO_Tur_Ready:0 "Türkei – eifrig und bereit"
 GMO_Tur_Ready_desc:0 "Das türkische Militär hat sich von Rundstedt anvertraut. Er berichtet, dass die Türken bereit sind, das Imperium erneut bei Militäroperationen gegen unsere Feinde zu unterstützen."
 
 GMO_Ita_Hun_EXPL:0 "Dieser Fokus wirkt sich entweder auf [ITA.GetFlag]§H[ITA.GetName]§! oder [HUN.GetFlag]§H[HUN.GetName]§! aus, je nachdem, welche Nation wir unterstützen möchten."
 GMO_Ita_Istria_for_Panzerwaffe:0 "Istrien für die Panzerwaffe"
 GMO_Ita_Istria_for_Panzerwaffe_EXPL:0 "Wir werden außerdem ihre beiden Generäle ausbilden und ihnen die Technologie für mittlere Panzer zur Verfügung stellen."
 GMO_Ita_Istria_for_Panzerwaffe_desc:0 "Istrien war immer ein österreichisch-ungarisches Gebiet. Zum Wohle unserer Großväter und um einen sicheren Zugang zur Adria zu gewährleisten, werden wir es zurückkaufen."
 GMO_Hun_Stabilize_the_Regime:0 "Politisch-wirtschaftliche Hilfe für die Habsburger"
 GMO_Hun_Stabilize_the_Regime_EXPL1:0 "Wir werden in der Lage sein, in die [HUN.GetFlag]§Hösterreichisch-ungarische§! Politik einzugreifen und entweder ihre Stabilität §Hzu stärken§! oder sie heimlich §Hzu sabotieren§!, was letztendlich dazu führen würde, dass wir die Kontrolle über ihre Politik vollständig übernehmen."
 GMO_Hun_Stabilize_the_Regime_desc:0 ""
 GMO_Ita_Hun_Tech_Sharing:0 "Imperiale Zusammenarbeit beim Technologieaustausch"
 GMO_Ita_Hun_Tech_Sharing_desc:0 "Um unsere Forschungsanstrengungen so weit wie möglich zu vereinfachen, werden wir ein Research Tech-Sharing-Programm einrichten."
 GMO_Ita_Hun_Recognize_Ambitions:0 "Kriegsvertrag, Ansprüche und Freundschaft"
 GMO_Ita_Hun_Recognize_Ambitions_desc:0 "Der „Kriegsvertrag, Ansprüche und Freundschaft“, ein Vertrag zwischen den Staaten der Mittelmächte, verpflichtet jede Nation, ihren Verbündeten im Falle einer Bedrohung oder eines Angriffs zu unterstützen. Er behandelt auch mögliche Ansprüche auf fremde Gebiete im Falle eines Kriegsausbruchs."
 
 GMO_Tur_Ita_Fate_of_Greece:0 "Schicksal Griechenlands"
 GMO_Tur_Ita_Fate_of_Greece_desc:0 "Griechenland hat bewiesen, dass es den neuen Kräften, die auf Europa losgelassen wurden, nicht gewachsen ist. Mit uns auf der einen und den Osmanen auf der anderen Seite haben sie nur eine geringe Chance, unseren Forderungen zu widerstehen."
 GMO_Ita_Hun_Fate_of_Yugoslavia:0 "Schicksal Jugoslawiens"
 GMO_Ita_Hun_Fate_of_Yugoslavia_desc:0 "Der jugoslawische Staat war immer ein künstliches Konstrukt, und die zentrale Autorität beginnt zu bröckeln. Wir müssen eingreifen und die Ordnung wiederherstellen. Die einzige Frage, die sich uns stellt, ist, wie wir dies am besten erreichen können."
 
 GMO_Hun_Anschluss:0 "Anschluß Österreichs"
 GMO_Hun_Anschluss_desc:0 ""
 GMO_Hun_Mountain_Quality:0 "Österreichisches Bergsteigererlebnis"
 GMO_Hun_Mountain_Quality_desc:0 ""
 GMO_Hun_Mountain_Artillery:0 "Gebirgsartillerie"
 GMO_Hun_Mountain_Artillery_desc:0 ""
 GMO_Hun_Nibel_Bavaria_Werke:0 "Nibel-Bavaria Werke"
 GMO_Hun_Nibel_Bavaria_Werke_desc:0 "Panzer sind für den Sieg in bewaffneten Konflikten unerlässlich. Wir werden die Steyr-Werke mit dem Bau der weltweit größten gemeinsamen Panzeranlage in Bayern und Nibelungen beauftragen. Von dort aus werden wir eine mächtige und unbezwingbare Panzerwaffe bauen!"
 GMO_Hun_Germano_Austrian_Empire:0 "Habsburg-Hohenzollern-Kaiserhochzeit"
 GMO_Hun_Germano_Austrian_Empire_EXPL1:0 "Wir werden die Heirat zwischen „Victoria von Hohenzollern“ und „Totto von Habsburg“ arrangieren und ein vereintes „Haus von Germania“ bilden.\n"
 GMO_Hun_Germano_Austrian_Empire_EXPL2:0 "§RBevorsichtig! Dies wird das Land erheblich destabilisieren!§!\n"
 GMO_Hun_Germano_Austrian_Empire_desc:0 "Zwei Imperien, die im Weltkrieg vereint standen, wurden besiegt und aufgelöst. Obwohl wir stark genug waren, Ihre Rechte wieder einzufordern, hatten die Habsburger nicht so viel Glück.\nAber neue Tage eröffnen neue Möglichkeiten. Otto von Habsburg ist ein idealer Kandidat für eine arrangierte Ehe zwischen Hohenzollern und dem Haus Habsburg."
 GMO_Hun_Invite_Cze:0 "Laden Sie die Tschechen ein"
 GMO_Hun_Invite_Cze_desc:0 "Obwohl die Tschechen nach dem Weltkrieg gegen Österreich-Ungarn rebellierten, haben sie seitdem einen langen Weg zurückgelegt. Indem wir ihre nationalen Rechte und Gleichberechtigung in unserem neuen Reich sichern, können wir sie hoffentlich davon überzeugen, sich uns anzuschließen."
 GMO_Hun_Invite_Hun:0 "Laden Sie die Ungarn ein"
 GMO_Hun_Invite_Hun_desc:0 "Die Ungarn standen während des Weltkriegs an unserer Seite. Jetzt, mit Otto von Habsburg an unserer Seite, können wir sie sicherlich davon überzeugen, sich uns erneut anzuschließen."
 
 GMO_Hun_Czech_Shipbuilding_Legacy:0 "Böhmisches Schiffbau-Erbe"
 GMO_Hun_Czech_Shipbuilding_Legacy_desc:0 "Die tschechische Industrie war im ehemaligen Österreich-Ungarn für 75 % des Schiffbaus verantwortlich. Wir werden ihre modernen Technologien und ihre entwickelte Industrie nutzen, um einige wichtige Schiffsteile zu bauen, die später in unsere Kriegsschiffe eingebaut werden."
 GMO_Hun_Czech_Univerzities:0 "Tschechische Universitäten"
 GMO_Hun_Czech_Univerzities_desc:0 "Obwohl die Tschechen ein kleines Land sind, könnten ihre Forschungseinrichtungen sogar mit unseren konkurrieren. Wir müssen sicherstellen, dass ihre wissenschaftlichen Leistungen in unsere Interessen einbezogen werden."
 
 GMO_Hun_Question_of_Romania:0 "Rumänienfrage"
 GMO_Hun_Question_of_Romania_desc:0 "Rumänien war den Ungarn schon immer ein Dorn im Auge. Jetzt, da sie unter unserer Flagge stehen, wird die Frage Rumäniens dringlicher. Sollen sie sich um Siebenbürgen kümmern? Sollen wir uns auf ihre Ölfelder konzentrieren? Oder ist ein unwahrscheinliches Bündnis der richtige Weg?"
 GMO_Hun_Empire_United:0 "Das vereinte Imperium"
 GMO_Chaos_in_the_Army_I_EXPL:0 "Die negativen Auswirkungen werden §Hreduziert§! und nach 18 Monaten vollständig §Hbeseitigt§! sein.\n"
 GMO_Hun_Empire_United_desc:0 "Da wir alle Teile des ehemaligen Österreich-Ungarn kontrollieren, können wir einen Prozess echter Integration einleiten. Vier Nationen werden vereint sein und sich dem westlichen Imperialismus und dem östlichen Kommunismus entgegenstellen. Auch wenn die Integration sicherlich nicht ohne Probleme verlaufen wird, wird sie sich auf jeden Fall lohnen."
 
 
 GMO_All_Reminder_EXPL:0 "\n§MLänder, die sich bei diesem Fokus noch nicht in Ihrer Fraktion befinden, erhalten die Boni, sobald sie beitreten.§!\n"
 GMO_All_Back_to_the_Seas:0 "Zurück zu den Meeren!"
 GMO_All_Back_to_the_Seas_desc:0 "Unseren Feinden gehören die Meere.\nIhre Flotten sind riesig. Ihre Flotten sind unschlagbar.\nAber wir werden das ändern.\nMit unserem großen Fokus auf den Schiffsbau können wir die Seeherrschaft anderer Nationen herausfordern und unsere Position als seebeherrschende Nation sichern."
 GMO_All_Research_Slot:0 "Marineforschungsorganisationen"
 GMO_All_Research_Slot_desc:0 ""
 GMO_All_Navy_Tech:0 "Bereitstellung von Marinetechnologie"
 GMO_All_Navy_Tech_desc:0 "Die deutsche Ingenieurskunst ist der unserer Verbündeten weit überlegen. Indem wir ihnen unsere Schiffsentwürfe zur Verfügung stellen, können wir den Schiffbauprozess beschleunigen und seine Qualität verbessern."
 GMO_All_Research_Collab:0 "Meeresübergreifende Forschungskooperation"
 GMO_All_Research_Collab_EXPL:0 "Dieser Fokus wirkt sich auf §H[CHI.GetName]§!, §H[BRA.GetName]§! und §H[TUR.GetName]§! aus, wenn sie zu deiner Fraktion gehören.\n"
 GMO_All_Research_Collab_desc:0 ""
 GMO_All_Kiel_Marineakademie:0 "Wiedereröffnung Kiel Imperial Marineakademie"
 GMO_All_Kiel_Marineakademie_EXPL:0 "Dieser Fokus wirkt sich auf §H[CHI.GetName]§!, §H[BRA.GetName]§!, §H[TUR.GetName]§!, §H[ITA.GetName]§! oder §H[HUN.GetName]§! aus, wenn sie zu deiner Fraktion gehören.\n"
 GMO_All_Kiel_Marineakademie_CHI_EXPL:0 "Erhält Stufe §H2§! Admiral mit den Eigenschaften §H&#39;Blockadenbrecher&#39;§! und §H&#39;Fliegenklatsche&#39;§!.\n"
 GMO_All_Kiel_Marineakademie_GER_EXPL:0 "Erhält Stufe §H4§! Admiral mit der Eigenschaft §H&#39;Luftkontrolleur&#39;§!.\n"
 GMO_All_Kiel_Marineakademie_BRA_EXPL:0 "Erhält Stufe §H3§! Admiral mit der Eigenschaft §H&#39;Luftkontrolleur&#39;§!.\n"
 GMO_All_Kiel_Marineakademie_TUR_EXPL:0 "Erreicht Stufe §H3§! Admiral mit der Eigenschaft §H&#39;Eisenseite&#39;§!.\n"
 GMO_All_Kiel_Marineakademie_ITA_EXPL:0 "Erhält Stufe §H3§! Admiral mit den Eigenschaften §H&#39;Luftkontrolleur&#39;§! und §H&#39;Fliegenklatsche&#39;§!.\n"
 GMO_All_Kiel_Marineakademie_HUN_EXPL:0 "Erhält Level §H3§! Admiral mit den Eigenschaften §H&#39;Blockadebrecher&#39;§! und §H&#39;Aufklärer&#39;§!.\n"
 GMO_All_Kiel_Marineakademie_desc:0 "Die Marineakademie wurde 1872 vom Chef der Kaiserlichen Admiralität, Generalleutnant Albrecht von Stosch, als Graduiertenschule zur Ausbildung von Marineoffizieren für höhere Aufgaben in der Kaiserlichen Marine gegründet. Obwohl sie nach dem Weltkrieg geschlossen wurde, wird sie unseren Admiralen bei einer Wiedereröffnung wertvolle Erfahrungen vermitteln."
 
 GMO_Stuff_EXPL:0 "Dieser Fokus wirkt sich auf §H[CHI.GetName]§!, §H[BRA.GetName]§!, §H[TUR.GetName]§!, §H[ITA.GetName]§! oder §H[HUN.GetName]§! aus, wenn sie zu Ihrer Fraktion gehören."
 
