 GER_gc_lack_of_steel_mis:0 "Stahlmangel im Bauwesen"
 GER_gc_lack_of_steel_mis_desc:0 ""
 GER_gc_damaged_buildings_mis:0 "Bombardierung Brandenburgs"
 GER_gc_damaged_buildings_mis_desc:0 "Wir haben es nicht geschafft, den Bau der Welthauptstadt zu sichern. Feindliche Bomber haben es geschafft, über unser Wahrzeichen zu gelangen und es mit Schrecken zu überziehen.\n\nNun müssen wir den Schaden berechnen. Erst dann wird sich zeigen, wie sehr sich der Bau der neuen Weltstadt verzögern wird."
 
 GER_gc_germania_construction_mis:0 "Welthauptstadt Bau"
 GER_gc_germania_construction_mis_desc:0 "Das größte Bauprojekt der Menschheitsgeschichte ist in vollem Gange. Hunderttausende Arbeiter, Maurer, Glasmacher, Dachdecker und Soldaten haben sich in Berlin versammelt, um an der zukünftigen Weltstadt zu arbeiten. Doch nichts ist sicher. Der Erfolg – oder das Scheitern – dieses Projekts hängt vom Architekten des Ersten Reichs und seinen Mitarbeitern ab. Die finanziellen und personellen Ressourcen des Reichs müssen richtig eingeschätzt und alles erfolgreich koordiniert werden."
 
 
 
 umc_ger_tfr.10.t:0 "Beginn des Baus der Welthauptstadt Germania"
 umc_ger_tfr.10.d:0 "Die Welthauptstadt Germania ist die geplante Erneuerung der deutschen Hauptstadt Berlin. Entworfen vom „ersten Architekten des Dritten Reichs“, Albert Speer, und vom Führer selbst genehmigt, wird die Welthauptstadt Germania ein edles und modernes Beispiel deutscher Größe sein und [GER.GetLeader]s Vision für die Zukunft des Großdeutschen Reiches vollenden.\n\nIn den letzten Jahren hat Albert Speer in seiner Funktion als Aufseher des Projekts viele Pläne für die wiederaufgebaute Stadt erstellt – die Schaffung einer großen Ost-West-Stadtachse, die die Verbreiterung der Charlottenburger Chaussee und die Platzierung der Berliner Siegessäule in der Mitte umfasst; die Avenue of Splendours, eine Neuorganisation der Stadt entlang eines zentralen, fünf Kilometer langen Boulevards namens Prachtallee; den Triumphbogen am südlichen Ende der Allee, der auf dem Arc de Triomphe in Paris basieren soll, aber natürlich viel größer sein soll; Der Große Platz am nördlichen Ende der Allee an der Stelle des Königsplatzes soll ein großes, offenes Forum mit einer Fläche von etwa 350.000 Quadratmetern werden und von den großartigsten Gebäuden überhaupt umgeben sein: dem Führerpalast auf der Westseite an der Stelle der ehemaligen Krolloper, dem Reichstagsgebäude von 1894 auf der Ostseite und der dritten Reichskanzlei und dem Oberkommando der deutschen Armee auf der Südseite.\n\nUnd nicht zuletzt die Volkshalle – die „Volkshalle“, ein riesiger Kuppelbau, der von [GER.GetLeader] selbst entworfen wurde. Sie soll hinsichtlich ihrer Größe und Symbolik das wichtigste und eindrucksvollste Gebäude der Hauptstadt sein. Optisch soll sie das architektonische Herzstück Germaniens als Welthauptstadt sein. Von hier aus wird sich der Deutsche Führer entweder direkt an bis zu 200.000 Teilnehmer oder medial über Rundfunk und Fernsehen an das deutsche Volk wenden.\n\nDer Grundstein ist gelegt, die Arbeiten beginnen und der Führer erklärt: „In kürzester Zeit muss Berlin neu gestaltet werden und die Gestalt erhalten, die ihm durch die Größe unseres Sieges als Hauptstadt eines mächtigen neuen Reiches gebührt. In der Vollendung dieser nunmehr bedeutendsten Bauaufgabe des Landes sehe ich den bedeutendsten Beitrag zu unserem endgültigen Sieg.“"
 umc_ger_tfr.10.a:0 "Die Volksseele soll sich mit jedem fertiggestellten Gebäude freuen und stärker werden!"
 
 
 
