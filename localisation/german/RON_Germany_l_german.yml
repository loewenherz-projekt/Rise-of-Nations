 GER_JAP_the_common_goal_unites_us:0 "Das gemeinsame Ziel verbindet uns"
 GER_JAP_the_common_goal_unites_us_EXPL1:0 "Wenn sie unser Angebot §GAkzeptieren§!, können wir nicht mit [CHI.GetFlag]§H[CHI.GetName]§! zusammenarbeiten. Das Ereignis hat die folgenden §GEnwirkungen§!:\n"
 GER_JAP_the_common_goal_unites_us_desc:0 ""
