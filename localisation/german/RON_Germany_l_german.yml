 anti_semitic_nazi_desc:0 "Die jüdischen Bewohner des Reiches wurden in Ghettos umgesiedelt, um sie vor der Gewalt und Diskriminierung zu schützen, die sie in jüngster Zeit heimsuchte. Viele glauben, dass ein Zusammenleben möglich ist, denn es ist besser, ein Bürger zweiter Klasse in der größten Nation der Welt zu sein, als frei in einer primitiven Nation zu leben..."
