 ### GERMANIA & ENDSIEG BRANCH
 GER_endsieg:0 "Endsieg"
 GER_endsieg_desc:0 "Der Endsieg war errungen. Wir haben unsere alten Länder zurückerobert und unsere Feinde erzittern unter unserer militärischen Macht. Ein wahrhaft großer Tag für das gesamte deutsche Volk."
 GER_welthauptstadt_germania:0 "Welthauptstadt Germania"
 GER_welthauptstadt_germania_EXPL1:0 "\nWir werden mit dem Wiederaufbau Berlins zur Welthauptstadt Germania beginnen. Nach der Fertigstellung werden wir folgende Effekte erzielen:\n"
 GER_welthauptstadt_germania_EXPL2:0 "\nDie endgültigen §CEffects§! können durch das Abschließen verschiedener Entscheidungen weiter §Gverbessert§! werden."
 GER_welthauptstadt_germania_desc:0 "Die von Albert Speer entworfene und vom Führer persönlich genehmigte Welthauptstadt Germania wird ein edles und modernes Beispiel deutscher Größe sein. Von der Großen Halle bis zur Siegessäule wird ein modernes Straßen- und Schienennetz führen. Die Stadt wird mit modernster Ausstattung, den luxuriösesten Restaurants und den schönsten Parks ausgestattet sein. All dies zum Ruhm des Führers und des deutschen Volkes und der Nation."
 GER_centralized_state_administration:0 "Zentralisiertes Statusmanagement"
 GER_centralized_state_administration_desc:0 "Die Volkshalle wurde von A. Speer als zentrales Gebäude Deutschlands entworfen und sollte der ganzen Welt die Macht des Reiches demonstrieren. Mit einer Seitenlänge von 315 Metern und einer Höhe von 290 Metern stellt sie jedes andere Gebäude unserer glorreichen Hauptstadt in den Schatten. Die Kuppel auf der Spitze ist mit 46 Metern die größte Kuppel der Welt und übertrifft sogar die Kuppel des Petersdoms."
 GER_germanias_defence_sector:0 "Germanias Verteidigungssektor"
 GER_germanias_defence_sector_desc:0 "Um die Sicherheit unserer großen Welthauptstadt zu gewährleisten, werden wir in den Aufbau einer starken Rundumverteidigung investieren. Dazu gehören moderne Bunker, Raketensysteme, Flugabwehrtürme und professionelles Militärpersonal für deren Betrieb."
 GER_expand_germanias_laboratories:0 "Erweiterung der Germania-Labore"
 GER_expand_germanias_laboratories_desc:0 "Die großartige Stadt beherbergt viele kluge Köpfe. Unsere Priorität muss der Bau eines modernen Forschungskomplexes sein, um ihnen geeignete Arbeitsräume zu bieten."
 GER_lebensborn_program:0 "Lebensborn-Programm"
 GER_lebensborn_program_desc:0 "Der Lebensborn e.V., oder „Quelle des Lebens“, ist ein Programm mit dem Ziel, die Geburtenrate arischer Kinder künstlich zu erhöhen. Um das Überleben unserer dominanten Rasse zu sichern, haben wir begonnen, Abtreibungen zu verhindern, indem wir anonyme Geburten anbieten und die Kinder kostenlos zur Adoption freigeben. Außerdem müssen wir sicherstellen, dass alle arischen Kinder in den neu eroberten Gebieten von arischen Eltern nach deutschen Idealen aufgezogen werden."
 GER_germanias_volkshalle:0 "Germanias Volkshalle"
 GER_germanias_volkshalle_desc:0 "Die Volkshalle wurde von A. Speer als zentrales Gebäude Deutschlands entworfen und sollte der ganzen Welt die Macht des Reiches demonstrieren. Mit einer Seitenlänge von 315 Metern und einer Höhe von 290 Metern stellt sie jedes andere Gebäude unserer glorreichen Hauptstadt in den Schatten. Die Kuppel auf der Spitze ist mit 46 Metern die größte Kuppel der Welt und übertrifft sogar die Kuppel des Petersdoms."
 
 
 GER_europes_one_superpower:0 "Europas einzige Supermacht"
 GER_europes_one_superpower_desc:0 "Europa gehört uns. Von Gibraltar bis Moskau, von London bis Athen sind es deutsche Flaggen.\nDer Sieg ist unser, doch einige Fragen sind noch offen. Dürfen andere Nationen, die an unserer Seite gekämpft haben, ihre Souveränität behalten oder müssen sie sich der Herrschaft Germaniens beugen?\nWir müssen einen Gipfel organisieren und diese Fragen ein für alle Mal klären."
 GER_europes_one_superpower_ENG_TRIG:0 "§HUnted Kingdom§!: Kontrolliert keinen Staat auf den Britischen Inseln und Gibraltar"
 GER_europes_one_superpower_SOV_TRIG:0 "§HSowjetunion§!: Kontrolliert nicht Moskau, Stalingrad und Leningrad"
 GER_europes_one_superpower_EXPL1:0 "§H[GER.GetLeader] §! wird die Staats- und Regierungschefs gleichgesinnter Nationen Europas einladen, um über das zukünftige Schicksal Europas zu diskutieren.\nDa Deutschland nun die dominierende Nation ist, sollten andere akzeptieren, welchen Weg wir in dieser neuen Ära auch immer einschlagen.\n"
 GER_europes_one_superpower_EXPL2:0 "§RWalte Entscheidungen der Konferenz könnten zu einem Krieg mit europäischen Nationen führen, die sich noch nicht in unserem Einflussbereich befinden!§!\n"
 GER_one_reichs_navy:0 "Eine Reichsmarine"
 GER_one_reichs_navy_EXPL:0 "Fordert §HShips§! von allen europäischen Ländern an, die sich in unserem Einflussbereich befinden und über eine Marine mit mehr als 25 Schiffen verfügen, um eine §HUnited German-controlled Navy Force§! zu bilden.\n"
 GER_one_reichs_navy_desc:0 "Jetzt repräsentieren wir einen vereinten europäischen deutschen Staat und es besteht für unsere Marionetten keine Notwendigkeit, eine eigene Marine zu haben. Sie sollten ihre Schiffe lieber uns überlassen, um eine vereinigte Reichsmarine zu bilden."
 
 
