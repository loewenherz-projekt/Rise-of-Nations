 ### GER SWE TRADE DEAL
 germany.520.t:0 "Deutsch-schwedisches Handelsabkommen"
 germany.520.d:0 ""
 germany.520.a:0 "Unsere Wirtschaft wird davon stark profitieren."
 germany.520.b:0 "Unsere Neutralität muss gewahrt bleiben."
 
 germany.521.t:0 "[SWE.GetName] akzeptiert erhöhten Handel"
 germany.521.d:0 ""
 germany.521.a:0 "Jetzt haben wir alles, was wir brauchen, um unsere Kriegsmaschine anzutreiben."
 
 germany.522.t:0 "[SWE.GetName] lehnt verstärkten Handel ab"
 germany.522.d:0 ""
 germany.522.a:0 "Sie werden es in Zukunft bereuen."
 germany.130.t:0 "Deutscher Bund!"
germany.130.d:0 "Da unsere Regierung nichts gegen den Extremismus unternimmt, haben viele Gebiete begonnen, ihre Unabhängigkeit zu erklären, und es scheint, als könnte Deutschland jeden Tag zusammenbrechen. Wir müssen schnell handeln, sonst stirbt Deutschland vor unseren Augen!"
germany.130.a:0 "Deutschland ist verloren"
 germany.130.b:0 "Alle Gebiete, die ihre Unabhängigkeit erklärt haben, sind illegitim. Wir werden sie mit Gewalt zurückerobern!"
germany.130.c:0 "Wir werden die Preußen unterstützen!"
germany.132.t:0 "Der letzte Kampf"
germany.132.d:0 "Wir sind weiter vorgedrungen und haben die meisten unserer Gebiete zurückerobert. Jetzt müssen wir uns auf den finalen Showdown mit Frankreich vorbereiten. Wir werden den deutschen Ruhm ein für alle Mal wiederherstellen!"
germany.132.a:0 "Hurra!"
germany.132.t:0 "Sieg in Frankreich!"
germany.134.t:0 "Sieg in Frankreich!"
germany.134.d:0 "Sieg in Frankreich! Wir haben unsere Kämpfe überwunden und können endlich das Deutsche Reich reformieren!"
germany.134.a:0 "Wir müssen weiter vorankommen!"
germany.134.b:0 "Wir werden um Frieden bitten"

germany.135.t:0 "Der deutsche Zusammenbruch!"
germany.135.d:0 "Seit den Anfängen der Deutschen Republik standen sich viele hochrangige Funktionäre feindselig gegenüber. Kleinliche Meinungsverschiedenheiten und widersprüchliche Ziele waren an der Tagesordnung, und eine der wenigen Tatsachen, über die sich die Parteimitglieder einig waren, war, dass Hitler das Sagen hatte. Diese Situation spitzte sich in den letzten Jahren zu. [GER.GetLeader] wurde Ende der 20er und Anfang der 30er Jahre verhaftet. Heute ist er frei. Die verschiedenen Fraktionen innerhalb des Reiches begannen um Einfluss zu kämpfen, darunter auch Hitler, der das Land zum Zusammenbruch führte. "
germany.135.a: "What can I gain from this?"
