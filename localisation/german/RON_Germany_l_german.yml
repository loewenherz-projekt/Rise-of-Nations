###Interwar Sprits/Ideas
GER_treaty_of_versailles:0 "Der Vertrag von Versailles"
GER_treaty_of_versailles_desc:0 "Am Ende des Ersten Weltkriegs zwangen die Alliierten der neuen Weimarer Republik einseitig einen äußerst strengen Vertrag auf. Dieser sah zahlreiche Einschränkungen vor, darunter die Begrenzung der Größe von Heer und Marine sowie die erzwungene Auflösung des deutschen Generalstabs. Außerdem wurde die Produktion und/oder Forschung an U-Booten und Flugzeugen vollständig verboten."
GER_disbanded_generals:0 "Aufgelöster Generalstab"
GER_disbanded_generals_desc:0 "Gemäß dem Versailler Vertrag wurde der deutsche Generalstab aufgelöst. Dies stellte einen schweren Schlag für die deutsche Militärmacht dar und war somit einer der ersten Teile des Vertrags, der umgangen wurde."
GER_versailles_economic_restrictions:0 "Wirtschaftliche Beschränkungen in Versailles"
GER_versailles_economic_restrictions_desc:0 "Um die Möglichkeit eines starken Deutschlands in der Zukunft zu verhindern, legten die Alliierten der deutschen Rüstungsindustrie strenge Produktions- und Lagerbeschränkungen auf."
GER_inexperienced_civilian_industry:0 "Unerfahrene Zivilindustrie"
GER_inexperienced_civilian_industry_desc:0 "Aufgrund der Beschränkungen bei der Produktion von Kriegsmaterial versuchten viele deutsche Rüstungsunternehmen, auf die Produktion ziviler Güter umzusteigen und überschwemmten den Markt mit minderwertigen Konsumgütern."
GER_massive_reparations:0 "Kriegsentschädigungen"
GER_massive_reparations_desc:0 "Als letzte Strafmaßnahme verlangten die Alliierten von Deutschland die Ausfuhr großer Mengen Vieh, Rohstoffe und Geld. Insgesamt entsprach dies 132 Milliarden Goldmark (269 Milliarden US-Dollar (2019))."
