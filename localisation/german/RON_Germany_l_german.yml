 umc_ger.710.b:0 "Die Italiener wünschen sich diese Insel als festen Bestandteil ihres Reiches. Und sie werden sie bekommen."
 umc_ger.710.c:0 "Es wird jahrhundertelang unter griechischer Kontrolle bleiben."
 umc_ger.710.e:0 "Die Übergabe dieser Insel an die Türken wird uns sicherlich die Fortsetzung einer guten Beziehung sichern."
 umc_ger.710.f:0 "Für Bulgarien ist es an der Zeit, einen eigenen Stützpunkt im Mittelmeer zu haben."
