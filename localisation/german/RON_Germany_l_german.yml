 umc_ger_germania_news.1.t:0 "Welthauptstadt Germania"
 umc_ger_germania_news.1.d:0 "Heute hat der deutsche Führer den vollständigen Wiederaufbau Berlins verkündet. Diese neue Stadt soll Germania heißen und die Welthauptstadt werden. Sie wird das größte Wiederaufbauprojekt der Welt sein und Bauwerke wie den Triumphbogen und die Volkshalle beherbergen. Die Volkshalle wurde vom weltberühmten Architekten Albert Speer entworfen und soll 180.000 Zuhörern und 10.000 Soldaten Platz bieten. Das Rednerpult wird 24 Meter über dem Boden errichtet. Von hier aus werden Nazi-Funktionäre großartige und inspirierende Reden halten. Germania wird durch Hunderte von Flugabwehrtürmen und elf Flaktürme geschützt. Der Führer hat versprochen, genügend Bunker zu bauen, damit jeder Bürger im Falle eines feindlichen Bombenangriffs Schutz findet."
 umc_ger_germania_news.1.a:0 "Vielleicht statte ich dort eines Tages einen Besuch ab."
 
