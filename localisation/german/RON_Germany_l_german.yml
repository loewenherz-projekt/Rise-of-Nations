 GMO_Reinstal_Kriegsamt_I:0 "Kriegsamt"
 GMO_Reinstal_Kriegsamt_I_desc:0 "Das „Oberste Kriegsamt“ diente im Ersten Weltkrieg als staatliche Organisation mit der Aufgabe, die Wirtschaft von der zivilen auf die militärische Produktion umzustellen. Wir werden das Kriegsamt wieder einführen und unsere Wirtschaft rechtzeitig auf die kommenden Kriege vorbereiten."
 
 GMO_Prewar_Industry_I:0 "Industrielle Mobilisierung vor dem Krieg"
 GMO_Prewar_Industry_I_desc:0 "Aus eigener Erfahrung während des Weltkriegs wissen wir, dass Deutschland keine Chance auf lang anhaltende Konflikte hat, wenn es uns nicht gelingt, unsere Industrie so zu mobilisieren, dass sie und das deutsche Volk den nächsten Weltkrieg überleben können."
 
 GMO_Prussian_Training_I:0 "Preußische Disziplin"
 GMO_Prussian_Training_I_desc:0 "Preußen, der alte deutsche Staat, Vater des Deutschen Ordens. Preußische Soldaten waren für ihre Disziplin und ihr Können im Kampf bekannt. Ihr Erbe muss fortgeführt werden."
 
