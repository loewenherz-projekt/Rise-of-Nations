 ### CHI - helm delivery
 umc_ger.10.t:0 "[GER.GetName] bietet Ausrüstungsverträge an"
 umc_ger.10.d:0 "Wehrmachtsoffiziere haben ihrem militärischen Verbindungsmann, Herrn von Falkenhausen, den Auftrag erteilt, uns militärische Aufträge zu übermitteln. Falkenhausen erklärt, dass der Wiederaufbau der deutschen Armee zügig voranschreitet und zu überschüssiger Ausrüstung führt, die nicht mehr benötigt wird. Glücklicherweise haben sie an uns gedacht und hoffen, dass wir sie von diesem Überschuss befreien."
 umc_ger.10.a:0 "Eine gute Ausrüstung ist wie immer erforderlich."
 umc_ger.10.b:0 "Wir haben unsere eigenen."
 
 umc_ger.11.t:0 "[CHI.GetName] nimmt unser Angebot an"
 umc_ger.11.d:0 "Von Falkenhausen meldet Erfolg! Unsere chinesischen Freunde haben unsere Angebote für modernste deutsche Ausrüstung sehr begrüßt. Von Falkenhausen kümmert sich um die Details. Deutsche Qualität soll weltweit bekannt sein!"
 umc_ger.11.a:0 "Darm."
 
 umc_ger.12.t:0 "[CHI.GetName] lehnt unser Angebot ab"
 umc_ger.12.d:0 "Leider hat das chinesische Militär unser Angebot für eine bessere Ausrüstung abgelehnt, selbst unter Einbeziehung unserer mächtigen Panzer. Sie glauben, dass ihre Ausrüstung ausreichend ist."
 umc_ger.12.a:0 "Haben sie wirklich ihre eigene Ausrüstung unserer großartigen deutschen vorgezogen?"
 
 ### CHI - invitation to AXIS
 umc_ger.15.t:0 "[GER.GetName] bietet Berlin-Nanjing-Allianz an"
 umc_ger.15.d:0 "China hat im letzten Jahrhundert viel gelitten und muss sich der Zeit anpassen. Deutschland hat uns tatkräftig unterstützt, indem es uns bei der Reform unseres Militärs half und uns mit Ausrüstung und taktischer Erfahrung versorgte. Das Deutsche Reich ist eine der wenigen Nationen, die unsere Regierung anerkennt und uns gegen die Kriegsherren und imperialen Despoten unterstützt, die uns beherrschten und beherrschen wollen. Wir müssen China unter unserer Flagge wiedervereinigen, und mit den Deutschen könnte dies schneller gelingen."
 umc_ger.15.a:0 "Wir brauchen einen starken Verbündeten gegen die Japaner."
 umc_ger.15.b:0 "Es besteht keine Notwendigkeit, dass sich eine weitere westliche Macht in die chinesischen Probleme einmischt."
 
 umc_ger.16.t:0 "[CHI.GetLeader] Akzeptiert Berlin-Nanjing-Allianz"
 umc_ger.16.d:0 "Die Chinesen haben es für sinnvoll erachtet, gemeinsam mit dem Deutschen Reich große Anstrengungen zu unternehmen und ihre Ressourcen an der Seite des Reichs zu bündeln. Von Falkenhausen wird seine Aufgaben in China fortsetzen, nicht nur als militärischer Verbindungsmann, sondern auch als Mitglied des chinesischen Oberkommandos."
 umc_ger.16.a:0 "Vielleicht hören sie auf, Tee an die Briten zu verkaufen?"
 
 umc_ger.17.t:0 "[CHI.GetLeader] Berlin-Nanjing-Allianz ablehnen"
 umc_ger.17.d:0 "Von Falkenhausen berichtete, dass das chinesische Militär zwar voll und ganz für die Allianz sei, die politische Führung jedoch nichts davon wissen wolle. China für die Chinesen. Sie werden ihr zerrüttetes Land selbst vereinen. China werde nicht Opfer ausländischer Intrigen werden. Aus Protest gegen die Regierungsentscheidung organisierten chinesische Offiziere in Nanjing eine Militärparade für von Falkenhausen."
 umc_ger.17.a:0 "Chinesische Narren ... zumindest können wir sicher sein, dass von Falkenhausen seinen Spaß hatte."
 
 ### Opposed Mussolini's Ambitions
 umc_ger.20.t:0 "[GER.GetLeader] Spricht gegen unsere Nation"
 umc_ger.20.d:0 "In einer großen Rede an das Deutsche Reich und seine Nachbarn hat die deutsche Regierung offiziell ihre Absicht erklärt, die Beziehungen zu unserem Staat zu beenden. Als Begründung für diesen Schritt werden jüngste diplomatische Zwischenfälle angeführt. Möglicherweise handelt es sich dabei um eine Reaktion auf die jüngste italienische Aggression gegen Äthiopien und die italienischen Ambitionen."
 umc_ger.20.a:0 "Wir hätten Verbündete sein können ..."
 
 
 ### Hess' Mission
 umc_ger.30.t:0 "Rudolf Hess in Eaglesham gefangen genommen"
 umc_ger.30.d:0 "Unsere offiziellen Quellen in Nordengland berichten, dass der stellvertretende Führer Rudolf Heß, der in einer Bf 110E-1/N reiste, nach seiner Bruchlandung in Eaglesham gefangen genommen wurde.\n\nNach einem kurzen Verhör sagte er, er befinde sich auf einer offiziellen, vom Führer persönlich genehmigten Friedensmission. Seine Worte sind zweifellos verlockend – umso mehr angesichts unseres katastrophalen Ergebnisses in Europa. Frankreich ist gefallen. Deutsche Stahlstiefel marschieren unter dem Arc de Triomphe, während die französische Regierung mit Philippe Pétain an der Spitze einem Separatfrieden zustimmte. Und sie ließen uns allein, um den Kampf fortzusetzen.\n\nWir stehen nun vor einer schwierigen Entscheidung: Sollen wir öffentlich den Beginn von Friedensgesprächen mit [GER.GetName] verkünden, was zweifellos zu einem Stimmungsverlust in der Bevölkerung führen würde, oder sollen wir diesen Nazi-Abschaum einsperren und den Kampf fortsetzen?"
 umc_ger.30.a:0 "Sperrt ihn ein, er ist nur ein einfacher Spion."
 umc_ger.30.b:0 "Unser Imperium ist weitaus wichtiger als die kontinentale Lage in Europa."
 
 umc_ger.31.t:0 "Hess in England gefangen genommen"
 umc_ger.31.d:0 "Rudolf Heß, der stellvertretende Führer des Deutschen Reiches, wurde in britisches Gefängnis gebracht, nachdem er unerlaubt versucht hatte, mit Großbritannien über ein Ende der Feindseligkeiten zu verhandeln. Die deutsche Botschaft erklärte Heß bereits wegen solcher Aktionen zum Reichsverräter. Himmler soll kommentiert haben: „Heß war einer der loyalsten von uns allen, und uns so zu verraten? Wir müssen mehr SS-Leute in die Regierung holen, um weitere verräterische Deutsche auszumerzen.“ Kurz gesagt: Dies ist ein schwerer politischer Schlag für die deutsche Führung."
 umc_ger.31.a:0 "Dummer Verräter, sie können ihn haben ..."
 
 umc_ger.32.t:0 "[ENG.GetName] stoppt alle feindlichen Aktionen"
 umc_ger.32.d:0 "Da es für zwei germanische Nationen keinen Grund gibt, Krieg um ihre Verbündeten zu führen, hat [ENG.GetLeader] zugestimmt, alle feindseligen Handlungen einzustellen und offizielle Friedensgespräche aufzunehmen.\n\nObwohl unser großes Ziel der Kampf gegen die Kommunisten im Osten ist, haben uns die Briten nach dem Weltkrieg großen Schaden zugefügt. Sie haben unsere großartige Nation gedemütigt, und das Deutsche Volk hat sehr gelitten. Daher sind selbst die größten Forderungen an sie möglich, doch müssen wir in diesen Gewässern sehr vorsichtig sein, da dies als große Beleidigung angesehen und vom britischen Parlament nur dann in Betracht gezogen würde, wenn ihr Volk bereits genügend Verluste erlitten hat oder unsere industrielle und militärische Macht ihre bei weitem übertrifft.\n\nEines ist klar: Unsere Feinde fallen in den Wahnsinn, und unser Sieg wird so oder so bald sicher sein."
 umc_ger.32.a:0 "Der Frieden hat für uns höchste Priorität."
 umc_ger.32.b:0 "Sichern Sie westafrikanische Kolonien, um die nach dem Weltkrieg entstandene Schande wiedergutzumachen."
 umc_ger.32.c:0 "Wir müssen die vollständige Isolation Großbritanniens anstreben."
 
 umc_ger.33.t:0 "[GER.GetLeader] sendet Friedensbedingungen"
 umc_ger.33.d:0 "Das deutsche Militär hat seit Kriegsbeginn kurzen Prozess mit seinen Feinden gemacht. Die neue Form der mobilen Kriegsführung, die die Deutschen mit vollem Einsatz übernommen und weiterentwickelt haben, hat in ganz Europa Zerstörung und Verzweiflung ausgelöst. Da große Teile Europas in deutscher Hand sind und nur wenige erfolgreich Widerstand leisten, steht Großbritannien in Kontinentaleuropa allein da. Die nächsten Monate werden über Europas Schicksal entscheiden."
 umc_ger.33.a:0 "Verlasse Europa, rette das Imperium."
 umc_ger.33.b:0 "Wenn ich es mir recht überlege, müssen wir den Kampf fortsetzen!"
 
 umc_ger.34.t:0 "[GER.GetLeader] sendet Friedensbedingungen"
 umc_ger.34.d:0 "Das deutsche Militär hat seit Kriegsbeginn kurzen Prozess mit seinen Gegnern gemacht. Die neue Form der mobilen Kriegsführung, die die Deutschen mit vollem Einsatz übernommen und weiterentwickelt haben, hat in ganz Europa Zerstörung und Verzweiflung ausgelöst. Da große Teile Europas in deutscher Hand sind und nur wenige erfolgreich Widerstand leisten, steht Großbritannien in Kontinentaleuropa allein da. Die nächsten Monate werden über Europas Schicksal entscheiden."
 umc_ger.34.a:0 "Verlasse Europa, rette das Imperium."
 umc_ger.34.b:0 "Inakzeptabel!"
 
 umc_ger.35.t:0 "[GER.GetLeader] sendet Friedensbedingungen"
 umc_ger.35.d:0 ""
 umc_ger.35.a:0 "Schweren Herzens müssen wir diese Beleidigung hinnehmen."
 umc_ger.35.b:0 "Inakzeptabel!"
 
 umc_ger.36.t:0 "[ENG.GetLeader] Akzeptiert Friedensbedingungen"
 umc_ger.36.d:0 ""
 umc_ger.36.a:0 "Sieg ist erreicht!"
 
 umc_ger.37.t:0 "[ENG.GetLeader] lehnt Friedensbedingungen ab"
 umc_ger.37.d:0 ""
 umc_ger.37.a:0 "Der Krieg geht also weiter."
 
 ### Anti-Communist Volunteers
 umc_ger.40.t:0 "[GER.GetLeader] Ruft nach Freiwilligen gegen [SOV.GetName]"
 umc_ger.40.d:0 ""
 umc_ger.40.a:0 "Der Kommunismus ist die größte Bedrohung."
 umc_ger.40.b:0 "Unsere Neutralität muss gewahrt bleiben."
 
 ### Support for SPR
 umc_ger.50.t:0 "[GER.GetName] Bietet Hilfe gegen die Republikaner an"
 umc_ger.50.d:0 ""
 umc_ger.50.a:0 "Unser Sieg muss gesichert sein."
 GER_will_get_mines_EXPL:0 "Wir werden [GER.GetFlag]§H[GER.GetName]§! Ressourcenbesitz für bis zu §H4§! Minen bereitstellen, basierend auf der Größe ihrer Unterstützung, sobald der Krieg vorbei ist.\n"
 umc_ger.50.b:0 "Sie sollten sich aus unseren Angelegenheiten heraushalten."
 
 umc_ger.51.t:0 "[SPA.GetLeader] Akzeptiert Materialhilfe"
 umc_ger.51.d:0 ""
 umc_ger.51.a:0 "Darm."
 
 umc_ger.52.t:0 "[SPA.GetLeader] Lehnt Materialhilfe ab"
 umc_ger.52.d:0 ""
 umc_ger.52.a:0 "Haha. Er kann sie alleine bekämpfen, wenn er möchte."
 
 ### For SPR to give GER back generals and Res. Rights
 umc_ger.53.t:0 "Rückzahlung deutscher Unterstützung"
 umc_ger.53.d:0 ""
 umc_ger.53.a:0 "Sie haben uns bei unserer Sache geholfen, jetzt sind wir an der Reihe."
 GER_mines_granada_yes_flag:0 "Hat §HResources Rights§! in §HGranada§!."
 GER_mines_murcia_yes_flag:0 "Hat §HResources Rights§! in §HMurcia§!."
 GER_mines_extremadura_yes_flag:0 "Besitzt §HResources rights§! in §HExtremadura§!."
 GER_mines_leon_yes_flag:0 "Hat §HResources-Rechte§! in §HLeon§!."

 umc_ger.54.t:0 "Entschädigung nach dem Bürgerkrieg mit Francos Spanien"
 umc_ger.54.d:0 ""
 umc_ger.54.a:0 "Ein weiteres faschistisches Regime, ein weiterer potenzieller Verbündeter."
 
 ### Alliance with SPR (D0X) for Morocco
 umc_ger.55.t:0 "[GER.GetName] bietet Marokko ein Militärbündnis an"
 umc_ger.55.d:0 ""
 umc_ger.55.a:0 "Es ist Zeit für Spanien, aus dem Schatten zu treten!"
 umc_ger.55.b:0 "Wir haben gerade einen Krieg geführt."
 
 umc_ger.56.t:0 "[FROM.GetLeader] Akzeptiert"
 umc_ger.56.d:0 ""
 umc_ger.56.a:0 "Exzellent!"
 
 umc_ger.57.t:0 "[FROM.GetLeader] lehnt unser Angebot ab"
 umc_ger.57.d:0 ""
 umc_ger.57.a:0 "Franco ist ein noch größerer Feigling, als wir dachten."
 
 ### Docking rights from SPR
 umc_ger.60.t:0 "[GER.GetName] fragt nach Docking-Rechten"
 umc_ger.60.d:0 ""
 umc_ger.60.a:0 "Unsere deutschen Verbündeten müssen jede Hilfe bekommen, die sie brauchen."
 umc_ger.60.b:0 "Dies könnte die Briten verärgern."
 
 umc_ger.61.t:0 "[FROM.GetLeader] Bietet uns Andockrechte"
 umc_ger.61.d:0 ""
 umc_ger.61.a:0 "Unsere frühere Hilfe beginnt Früchte zu tragen."
 
 umc_ger.62.t:0 "[FROM.GetLeader] lehnt Docking Rights Deal ab"
 umc_ger.62.d:0 ""
 umc_ger.62.a:0 "Unsere Hilfe war also umsonst?"
 
 ### DEVELOP OUR MINES IN SPAIN
 umc_ger.65.t:0 "Deutsche Investitionen in ihre lokalen spanischen Beteiligungen"
 umc_ger.65.d:0 ""
 umc_ger.65.a:0 "Zumindest für etwas sind sie nützlich."
 
 ### SPA - GER loses Rss ownership
 umc_ger.68.t:0 "Ende der deutsch-spanischen Handelsverpflichtungen"
 umc_ger.68.d:0 "Die Vereinbarungen, die wir zur Sicherung der deutschen Unterstützung im Bürgerkrieg treffen mussten, sind nun endgültig abgelaufen. Der deutsche Besitz unserer Minen war der wichtigste Bestandteil dieser Vereinbarungen. Die wichtigste Ressource war Wolframerz, das für Deutschland aufgrund seiner fortschrittlichen Präzisionstechnik und damit für die Rüstungsproduktion unverzichtbar war. Unsere Taten sind nun jedoch vergolten – und wenn das Reich unseren Handel fortsetzen will, muss es dafür genauso bezahlen wie jeder andere. Wir hingegen können endlich von unserem Mineralienreichtum profitieren und die deutschen Investitionen hier als kleinen Bonus nutzen."
 umc_ger.68.a:0 "Unsere Wirtschaft ist endlich wieder ein Ganzes."
 
 umc_ger.69.t:0 "Ende der deutsch-spanischen Handelsverpflichtungen"
 umc_ger.69.d:0 ""
 umc_ger.69.a:0 "Diese Ressourcen wurden benötigt ... wir müssen eine andere Quelle finden."
 
 ### Alliance with FIN
 umc_ger.70.t:0 "[GER.GetLeader] schlägt eine antisowjetische Allianz vor"
 umc_ger.70.d:0 ""
 umc_ger.70.a:0 "Die Sowjets müssen besiegt werden. Mit unserer Hilfe!"
 umc_ger.70.b:0 "Unsere Neutralität ist wichtiger."

 umc_ger.71.t:0 "[FIN.GetName] tritt der Antisowjetischen Allianz bei"
 umc_ger.71.d:0 ""
 umc_ger.71.a:0 "Wir stehen zusammen gegen diesen kommunistischen Abschaum!"
 
 umc_ger.72.t:0 "[FIN.GetName] lehnt unser Angebot ab"
 umc_ger.72.d:0 ""
 umc_ger.72.a:0 "Feiglinge! Wir kämpfen diesen Krieg auch für sie!"
 
 ### Post War stuff - SAVOY for ITA
 umc_ger.80.t:0 "Frage von [735.GetName]"
 umc_ger.80.d:0 "Da Frankreich nun unter unserer Kontrolle ist, müssen wir die territorialen Ansprüche unserer Verbündeten, insbesondere Mussolinis Italien, erfüllen.\n\nObwohl sie nicht wirklich viel zu unserem Sieg beigetragen haben, ist bekannt, dass Mussolini die Gebiete Ostfrankreichs, insbesondere Savoyen, begehrt, aber auch das Gebiet bis zur Rhone im Blick hat. Und da unser endgültiger Kampf gegen die Sowjetunion immer näher rückt, wäre es klug, unsere Verbündeten auf unserer Seite zu halten. Zumindest vorerst."
 umc_ger.80.a:0 "Das Bündnis ist in Frankreich wichtiger als einige wenige Staaten."
 umc_ger.80.b:0 "Savoyen ist zu Recht italienisch."
 umc_ger.80.c:0 "So weit sind sie nicht gekommen."
 
 umc_ger.81.t:0 "[GER.GetName] kümmert sich um das Gebiet Ostfrankreich"
 umc_ger.81.d:0 ""
 umc_ger.81.a:0 "Wie nett von ihnen."
 
 ### Post War stuff - TUNISIA for ITA
 umc_ger.85.t:0 "Tunesien-Frage"
 umc_ger.85.d:0 ""
 umc_ger.85.a:0 "Wir müssen Mussolini besänftigen, unser Kampf ist noch nicht vorbei."
 umc_ger.85.b:0 "Tunesien ist eine wertvolle Basis für unsere Operationen im Mittelmeerraum."
 
 umc_ger.86.t:0 "[GER.GetName] behandelt Tunesien"
 umc_ger.86.d:0 ""
 umc_ger.86.a:0 "Unser Impero wächst."
 
 ### Post War stuff - Italian Alliance
 umc_ger.90.t:0 "Deutsch-Italienischer Pakt"
 umc_ger.90.d:0 "Was einst ein starkes Bündnis mit einem gemeinsamen Ziel war – die alliierten Mächte zu vernichten, die unsere Nationen in der Vergangenheit gedemütigt hatten – steht nun ohne gemeinsames Ziel da. Die Franzosen sind geschlagen, die Briten haben kapituliert. Zwei neue Mächte sind aufgestiegen, unser Impero Italiano beherrscht nun das Mittelmeer und es bleibt nur noch, die Beute aufzuteilen.\n\nTeilen? Auf beiden Seiten gibt es starke Stimmen, die argumentieren, dass unsere Nationen diese militärische Achse nicht mehr brauchen.\n\nSchließlich, wie [GER.GetLeader] einmal sagte – ist jedes Bündnis, dessen Zweck nicht die Absicht ist, Krieg zu führen, sinnlos und nutzlos."
 umc_ger.90.a:0 "Wir müssen diese positive Zusammenarbeit fortsetzen."
 umc_ger.90.b:0 "Es ist Zeit für Impero Italiano, aus dem deutschen Schatten zu treten."
 
 umc_ger.91.t:0 "[ITA.GetName] bleibt auf der Achse Berlin-Rom"
 umc_ger.91.d:0 ""
 umc_ger.91.a:0 "Gute Wahl."
 
 umc_ger.92.t:0 "[ITA.GetName] verlässt die Achse Berlin-Rom"
 umc_ger.92.d:0 ""
 umc_ger.92.a:0 "Unser Ziel wurde erreicht und eine weitere Zusammenarbeit ist erwünscht."
 umc_ger.92.b:0 "Sie stören uns nicht."
 umc_ger.92.c:0 "Als nächstes wird Mussolini unsere Macht zu spüren bekommen."
 umc_ger.92.e:0 "Das glauben wir nicht."
 
 ### Guarantee Paul's (YUG) Regime 
 umc_ger.100.t:0 "[GER.GetName] bietet eine engere Beziehung"
 umc_ger.100.d:0 ""
 umc_ger.100.a:0 "Wir müssen einen starken Verbündeten gegen die italienischen Ambitionen suchen."
 umc_ger.100.b:0 "Wir werden keinen Teufel gegen einen anderen eintauschen."
 
 umc_ger.101.t:0 "[YUG.GetLeader] stimmt einer engeren Beziehung zu"
 umc_ger.101.d:0 ""
 umc_ger.101.a:0 "Gut. Die Italiener sind weiter geschwächt."
 
 umc_ger.102.t:0 "[YUG.GetLeader] Lehne engere Beziehungen ab"
 umc_ger.102.d:0 ""
 umc_ger.102.a:0 "Schlecht für sie."
 
 ### for ITA that GER demands Tyrol and Istria
 umc_ger.110.t:0 "[GER.GetName] Forderungen über Tirol und Istrien"
 umc_ger.110.d:0 ""
 umc_ger.110.a:0 "Wir müssen einen Schritt zurücktreten. Vorerst."
 umc_ger.110.b:0 "Italien lässt sich nicht länger demütigen!"
 
 umc_ger.111.t:0 "[ITA.GetName] Retreats aus Tirol und Istrien"
 umc_ger.111.d:0 "Sobald der italienische Botschafter in Berlin eintraf, um die Istrien- und Tirol-Frage zu besprechen, war klar, dass sie mehr als bereit waren, unseren Forderungen nachzukommen. Unser Außenminister Joachim von Ribbentrop beruhigte seinen italienischen Amtskollegen, indem er sagte, dies seien die letzten Forderungen an ihr Land und das deutsche Ziel sei stets ein freundschaftliches Verhältnis zu Italien gewesen. Gleichzeitig betonte er die deutsche militärische und industrielle Überlegenheit. \n\nTrotzdem wurde der Vertrag unterzeichnet, und unsere Truppen konnten ohne Widerstand in Tirol und Istrien einmarschieren. Während die Bevölkerung in Tirol unsere Truppen als Befreier begrüßte, kam es in Istrien zu kurzen Protesten, die offensichtlich schnell niedergeschlagen wurden. \n\nMit diesem Erfolg haben wir es geschafft, ein weiteres Gebiet mit deutscher Mehrheit an das Deutsche Reich anzuschließen und unseren Zugang zum Mittelmeer zu sichern."
 umc_ger.111.a:0 "Dies hat ihre Schwäche gezeigt."
 
 umc_ger.112.t:0 "[ITA.GetName] mobilisiert!"
 umc_ger.112.d:0 ""
 umc_ger.112.a:0 "Falsche Entscheidung. Reich lässt sich nicht missachten."
 umc_ger.112.b:0 "Wir müssen einen Schritt zurücktreten. Vorerst."
 
 ### Step up Demands
 umc_ger.115.t:0 "[GER.GetName] Forderungen bezüglich unserer südlichen Besitzungen"
 umc_ger.115.d:0 ""
 umc_ger.115.a:0 "Dieses Regime wird bald fallen und wir werden unsere Verluste später wieder wettmachen."
 GER_YUG_step_up_our_demands_EXPL1:0 "Gewinnen Sie §H26§! kommunistische Milizdivisionen.\n"
 umc_ger.115.b:0 "Nicht mehr!"
 
 umc_ger.116.t:0 "[ITA.GetName] Geben Sie ihre südlichen Besitztümer auf"
 umc_ger.116.d:0 ""
 umc_ger.116.a:0 "Ein möglicher Feind vernichtet."

 umc_ger.117.t:0 "[ITA.GetName] lehnt unsere Forderungen bezüglich der südlichen Besitzungen ab"
 umc_ger.117.d:0 ""
 umc_ger.117.a:0 "Es ist Zeit, dieses gefallene Imperium zu zerschlagen."
 umc_ger.117.b:0 "Wir werden uns um sie kümmern ... später."
 

 
 ### Focus of German scientists
 umc_ger.130.t:0 "Fokus deutscher Wissenschaftler"
 umc_ger.130.d:0 "Durch die Erweiterung unserer Forschungseinrichtungen können wir unsere Mittel auf verschiedene Forschungsbereiche konzentrieren. Am interessantesten sind die Arbeiten von Werner Heisenberg und Wernher von Braun.\n\nWerner Karl Heisenberg, ein deutscher theoretischer Physiker und einer der wichtigsten Pioniere der Quantenmechanik, arbeitet an einem Atomwaffenprogramm, bekannt als Uranverein. Sein Ziel ist die Entwicklung einer ultimativen Waffe, die ganze Städte auslöschen kann. Dieses Gerät ist nicht nur in Kriegszeiten einsetzbar, sondern dient auch der Abschreckung.\n\nDer junge Wernher von Braun stellt seine Arbeit in seiner Dissertation „Konstruktion, theoretische und experimentelle Lösung des Problems der Flüssigtreibstoffrakete“ vor. Bereits Ende 1934 hatte seine Gruppe erfolgreich zwei Flüssigtreibstoffraketen gestartet, die Höhen von 2,2 und 3,5 km erreichten. Die Anwendungsmöglichkeiten seiner Arbeit scheinen endlos – von einer strategischen Langstreckenwaffe bis hin zu einem ersten Raumfahrtprogramm. Zweitens ist seine Abteilung für die Erprobung der ersten Raketenflugzeuge zuständig.\n\nBeide führenden Wissenschaftler wünschen sich dringend mehr Geld für ihre Arbeit und es liegt an uns, wem Vorrang eingeräumt werden soll."
 GER_wunderwaffe_EXPL1:0 "Das Forschungsteam von Werner Karl Heisenberg wird uns im Erfolgsfall einen Forschungsbonus für die Kerntechnologie gewähren.\n"
 GER_wunderwaffe_EXPL2:0 "Das Forschungsteam von „Wernher von Braun“ wird uns bei Erfolg einen Forschungsbonus für „Raketentechnologie“ gewähren.\n"
 umc_ger.130.a:0 "Unterstützen Sie die Kernforschung von Werner Karl Heisenberg."
 umc_ger.130.b:0 "Unterstützen Sie Wernher von Brauns Raketenforschung."
 
 umc_ger.131.t:0 "WK Heisenberg feiert Erfolg!"
 umc_ger.131.d:0 "Werner Karl Heisenberg, ein deutscher theoretischer Physiker und einer der wichtigsten Pioniere der Quantenmechanik, arbeitet am Atomwaffenprogramm „Uranverein“. Ziel ist die Entwicklung einer ultimativen Waffe, die ganze Städte auslöschen kann. Diese Waffe soll nicht nur in Kriegszeiten eingesetzt werden, sondern dient auch der Abschreckung. \n\nNun behauptet er endlich, dass seine Forschung dank der verstärkten Unterstützung des Reichsforschungsrats enorme Fortschritte gemacht habe und die ultimative Waffe fast einsatzbereit sei."
 umc_ger.131.a:0 "Das stärkt das Reich!"
 
 umc_ger.132.t:0 "W. von Braun feiert Erfolg!"
 umc_ger.132.d:0 "Der junge Wernher von Braun präsentiert seine Arbeit in seiner Dissertation „Konstruktion, theoretische und experimentelle Lösung des Problems der Flüssigtreibstoffrakete“. Bereits Ende 1934 hatte seine Gruppe zwei Flüssigtreibstoffraketen erfolgreich gestartet, die Höhen von 2,2 und 3,5 km erreichten. Die Anwendungsmöglichkeiten seiner Arbeit scheinen endlos – von einer strategischen Langstreckenwaffe bis hin zu einem ersten Raumfahrtprogramm. Darüber hinaus ist seine Abteilung für die Erprobung erster Raketenflugzeuge zuständig. Nun behauptet er endlich, dass seine Forschung dank der verstärkten Unterstützung durch den Reichsforschungsrat enorme Fortschritte gemacht habe und dass die strategischen V-2-Langstreckenraketen einsatzbereit seien. Er teilt uns außerdem mit, dass kurzfristig weitere Fortschritte möglich seien, die sogar den ersten Raumflug ermöglichen könnten. Denn wie er einmal sagte: „Ich habe gelernt, das Wort ‚unmöglich‘ mit größter Vorsicht zu verwenden.“"
 umc_ger.132.a:0 "Das stärkt das Reich!"
 
