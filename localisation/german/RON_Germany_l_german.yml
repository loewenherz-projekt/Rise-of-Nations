 secretive_nation:0 "Geheime Nation"
 secretive_nation_desc:0 "Es wird angenommen, dass die Deutschen Schritte unternommen haben, um sich über das in Versailles erlaubte Maß hinaus aufzurüsten. In welchem Ausmaß die Wehrmacht aufgerüstet wurde, ist nicht bekannt. Das Nazi-Regime hat Deutschlands Fähigkeiten in einen Mantel der Geheimhaltung gehüllt – erst im Krieg wird die Wahrheit ans Licht kommen."
