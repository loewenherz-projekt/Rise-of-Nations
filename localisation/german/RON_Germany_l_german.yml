### 1933 Events

germany_1933.1.t:0 "Hitler wird Kanzler"
germany_1933.1.d:0 "Am 30. Januar 1933 wurde das neue Kabinett während einer kurzen Zeremonie in Hindenburgs Büro vereidigt. Die NSDAP erhielt drei Posten: Hitler wurde zum Reichskanzler, Wilhelm Frick zum Innenminister und Hermann Göring zum Minister ohne Geschäftsbereich (und Innenminister Preußens) ernannt. SA und SS führten Fackelzüge durch Berlin. Dieses Ereignis wurde als Hitlers „Machtergreifung“ bezeichnet. Der Begriff wurde ursprünglich von einigen Nazis verwendet, um einen revolutionären Prozess zu suggerieren, obwohl Hitler und andere das Wort „Machtübernahme“ verwendeten, um auszudrücken, dass die Machtübergabe im bestehenden verfassungsmäßigen Rahmen stattfand und der Prozess legal war."
germany_1933.1.a:0 "Interessant..."

germany_1933.2.t:0 "Reichstagsbrandverordnung"
germany_1933.2.d:0 "Die Reichstagsbrandverordnung wurde am 28. Februar 1933 auf Anraten von Reichskanzler [GER.GetLeader] von Bundespräsident Paul von Hindenburg als unmittelbare Reaktion auf den Reichstagsbrand erlassen. Die Verordnung setzte viele wichtige bürgerliche Freiheiten deutscher Bürger außer Kraft. Da Nazis einflussreiche Positionen in der deutschen Regierung innehatten, diente die Verordnung als Rechtsgrundlage für die Inhaftierung von Personen, die als Gegner der Nazis galten, und für die Unterdrückung von Veröffentlichungen, die nicht als „freundlich“ gegenüber der Nazi-Sache galten."
germany_1933.2.a:0 "OK."

germany_1933.3.t:0 "Ermächtigungsgesetz"
germany_1933.3.d:0 "Das Ermächtigungsgesetz war ein Gesetz, das dem deutschen Kabinett, also dem Kanzler, die Macht gab, Gesetze ohne Beteiligung des Reichstags zu erlassen und grundlegende Aspekte der Weimarer Verfassung außer Kraft zu setzen. Das Ermächtigungsgesetz verlieh Hitler uneingeschränkte Vollmachten und folgte unmittelbar auf die Reichstagsbrandverordnung, die die meisten bürgerlichen Freiheiten abgeschafft und die Staatsgewalt der Reichsregierung übertragen hatte. Die kombinierte Wirkung beider Gesetze verwandelte Hitlers Regierung in eine legale Diktatur."
germany_1933.3.a:0 "Exzellent."

germany_1933.4.t:0 "Verbot politischer Parteien"
germany_1933.4.d:0 "Es ist an der Zeit, alle politischen Parteien außer der NSDAP zu verbieten."
germany_1933.4.a:0 "Exzellent."

germany_1933.5.t:0 "Nürnberger Reichsparteitag 1934"
germany_1933.5.d:0 "Der Reichsparteitag (offiziell: Nürnberger Reichsparteitag) war der jährliche Parteitag der NSDAP in Deutschland, der von 1923 bis 1938 stattfand. Es handelte sich um große Propagandaveranstaltungen der Nazis, insbesondere nach [GER.GetLeader]s Machtergreifung 1933. Diese Veranstaltungen fanden von 1933 bis 1938 auf dem Reichsparteitagsgelände in Nürnberg statt und werden im Englischen üblicherweise als „Nuremberg Rallies“ bezeichnet. Zu ihrem Gedenken wurden zahlreiche Filme gedreht, darunter Leni Riefenstahls „Triumph des Willens“ und „Der Sieg des Glaubens“."
germany_1933.5.a:0 "Sieg Heil!"

germany_1933.6.t:0 "Bücherverbrennung"
germany_1933.6.d:0 "Die Bücherverbrennungen der Nazis waren eine Aktion des Deutschen Studentenwerks (DSt), bei der in den 1930er Jahren in Nazi-Deutschland und Österreich feierlich Bücher verbrannt wurden. Die verbrannten Bücher galten als subversiv oder repräsentierten Ideologien, die dem Nationalsozialismus entgegenstanden. Dazu gehörten unter anderem Bücher jüdischer, pazifistischer, religiöser, liberaler, anarchistischer, sozialistischer, kommunistischer und sexualwissenschaftlicher Autoren. Die ersten verbrannten Bücher waren die von Karl Marx und Karl Kautsky."
germany_1933.6.a:0 "Entartete Bücher haben in Deutschland keinen Platz."

germany_1933.7.t:0 "Deutschland bietet ein Konkordat an"
germany_1933.7.d:0 "Concordat with the Vatican The Reichskonkordat ('Concordat between the Holy See and the German Reich') is a treaty negotiated between the Vatican and the emergent Nazi Germany. It was signed on 20 July 1933 by Cardinal Secretary of State Eugenio Pacelli, who later became Pope Pius XII, on behalf of Pope Pius XI and Vice Chancellor Franz von Papen on behalf of President Paul von Hindenburg and the German government. It was ratified 10 September 1933 and it has been in force from that date onward. The treaty guarantees the rights of the Roman Catholic Church in Germany. When bishops take office Article 16 states they are required to take an oath of loyalty to the Governor or President of the German Reich established according to the constitution. The treaty also requires all clergy to abstain from working in and for political parties. Nazi breaches of the agreement began almost as soon as it had been signed and intensified afterwards leading to protest from the Church including in the 1937 Mit brennender Sorge encyclical of Pope Pius XI. The Nazis planned to eliminate the Church's influence by restricting its organizations to purely religious activities."
germany_1933.7.a:0 "Akzeptieren."
germany_1933.7.b:0 "Abfall."

germany_1933.8.t:0 "Der Vatikan akzeptiert"
germany_1933.8.d:0 "Concordat with the Vatican The Reichskonkordat ('Concordat between the Holy See and the German Reich') is a treaty negotiated between the Vatican and the emergent Nazi Germany. It was signed on 20 July 1933 by Cardinal Secretary of State Eugenio Pacelli, who later became Pope Pius XII, on behalf of Pope Pius XI and Vice Chancellor Franz von Papen on behalf of President Paul von Hindenburg and the German government. It was ratified 10 September 1933 and it has been in force from that date onward. The treaty guarantees the rights of the Roman Catholic Church in Germany. When bishops take office Article 16 states they are required to take an oath of loyalty to the Governor or President of the German Reich established according to the constitution. The treaty also requires all clergy to abstain from working in and for political parties. Nazi breaches of the agreement began almost as soon as it had been signed and intensified afterwards leading to protest from the Church including in the 1937 Mit brennender Sorge encyclical of Pope Pius XI. The Nazis planned to eliminate the Church's influence by restricting its organizations to purely religious activities."
germany_1933.8.a:0 "Exzellent."

germany_1933.9.t:0 "Vatikan lehnt ab"
germany_1933.9.d:0 "Der Vatikan hat unseren vorgeschlagenen Pakt mit der Begründung abgelehnt, dass unser Regime gegen alles verstoße, wofür er stehe."
germany_1933.9.a:0 "Sie werden dafür bezahlen ..."

germany_1933.10.t:0 "Deutschland bietet einen Nichtangriffspakt an"
germany_1933.10.d:0 "Der deutsch-polnische Nichtangriffspakt war ein internationaler Vertrag zwischen Nazi-Deutschland und der Zweiten Polnischen Republik, der am 26. Januar 1934 unterzeichnet wurde. Beide Länder verpflichteten sich, ihre Probleme durch bilaterale Verhandlungen zu lösen und für einen Zeitraum von zehn Jahren auf bewaffnete Konflikte zu verzichten. Der Pakt normalisierte die Beziehungen zwischen Polen und Deutschland, die durch Grenzstreitigkeiten im Zusammenhang mit der Gebietsregelung im Versailler Vertrag belastet waren. Deutschland erkannte Polens Grenzen an und beendete einen wirtschaftlich schädlichen Zollkrieg zwischen den beiden Ländern, der im vorangegangenen Jahrzehnt stattgefunden hatte. "
germany_1933.10.a:0 "Akzeptieren."
germany_1933.10.b:0 "Abfall."

germany_1933.11.t:0 "Polen akzeptiert"
germany_1933.11.d:0 "Der deutsch-polnische Nichtangriffspakt war ein internationaler Vertrag zwischen Nazi-Deutschland und der Zweiten Polnischen Republik, der am 26. Januar 1934 unterzeichnet wurde. Beide Länder verpflichteten sich, ihre Probleme durch bilaterale Verhandlungen zu lösen und für einen Zeitraum von zehn Jahren auf bewaffnete Konflikte zu verzichten. Der Pakt normalisierte die Beziehungen zwischen Polen und Deutschland, die durch Grenzstreitigkeiten im Zusammenhang mit der Gebietsregelung im Versailler Vertrag belastet waren. Deutschland erkannte Polens Grenzen an und beendete einen wirtschaftlich schädlichen Zollkrieg zwischen den beiden Ländern, der im vorangegangenen Jahrzehnt stattgefunden hatte. "
germany_1933.11.a:0 "Exzellent."

germany_1933.12.t:0 "Polens Niedergang"
germany_1933.12.d:0 "Polen hat unseren Nichtangriffspakt abgelehnt."
germany_1933.12.a:0 "Wie können sie es wagen ..."

germany_1933.13.t:0 "Deutschland kündigt Wiederbewaffnung an"
germany_1933.13.d:0 "Die deutsche Aufrüstung war eine Politik und Praxis der Wiederaufrüstung, die in der Zwischenkriegszeit (1918–1939) in Deutschland unter Verletzung des Versailler Vertrags durchgeführt wurde. Sie begann kurz nach Unterzeichnung des Vertrags auf kleiner, geheimer und informeller Basis, wurde jedoch nach der Machtübernahme der NSDAP 1933 offen und massiv ausgeweitet. Trotz ihres Ausmaßes blieb die deutsche Aufrüstung eine weitgehend verdeckte Operation, die mithilfe von Tarnorganisationen wie Segelflugvereinen zur Pilotenausbildung und Sportvereinen sowie SA-Milizgruppen zur Vermittlung von Infanteriekampftechniken durchgeführt wurde. Tarnfirmen wie MEFO wurden gegründet, um die Wiederaufrüstung zu finanzieren, indem sie bei Krupp, Siemens, Gutehofnungshütte und Rheinmetall Großaufträge für durch den Versailler Vertrag verbotene Waffen erteilten. 1935 lehnte Hitler die durch den Versailler Vertrag festgelegten militärischen Beschränkungen offen ab. Die Wiederaufrüstung wurde am 16. März angekündigt, ebenso wie die Wiedereinführung der Wehrpflicht und damit auch die Wiederaufrüstung."
germany_1933.13.a:0 "Beunruhigend ..."

germany_1933.14.t:0 "Referendum zum Saarstatus"
germany_1933.14.d:0 "Am 13. Januar 1935 fand im Saarbeckengebiet eine Volksabstimmung über den Gebietsstatus statt. Über 90 % der Wähler sprachen sich für die Wiedervereinigung mit Deutschland aus, 9 % votierten für den Status quo als Mandatsgebiet des Völkerbundes und weniger als 0,5 % plädierten für eine Vereinigung mit Frankreich."
germany_1933.14.a:0 "Treten Sie Deutschland bei."
germany_1933.14.b:0 "Schließen Sie sich Frankreich an."
germany_1933.14.c:0 "Bleiben Sie ein Mandat des Völkerbundes."

germany_1933.15.t:0 "Das Saarland stimmt für den Beitritt zu Deutschland"
germany_1933.15.d:0 "Eine Volksabstimmung über den territorialen Status des Saarbeckengebiets endete zu unseren Gunsten. Von diesem Tag an wird das Saarland wieder Teil von [Root.GetName] sein."
germany_1933.15.a:0 "Exzellent."

germany_1933.16.t:0 "Das Saarland stimmt für den Beitritt zu Frankreich"
germany_1933.16.d:0 "Eine Volksabstimmung über den territorialen Status des Saarbeckengebiets endete zu unseren Gunsten. Von diesem Tag an wird das Saarland Teil von [Root.GetName] sein."
germany_1933.16.a:0 "Exzellent."

germany_1933.17.t:0 "Saarland stimmt für Verbleib im Völkerbundmandat"
germany_1933.17.d:0 "Das Saargebiet hat einseitig erklärt, dass es nicht wieder zu Deutschland zurückkehren wird."
germany_1933.17.a:0 "Das bedeutet Krieg."

germany_1933.18.t:0 "Die Nacht der langen Messer"
germany_1933.18.d:0 "Die Messernacht war eine Säuberungsaktion, die vom 30. Juni bis 2. Juli 1934 in Nazi-Deutschland stattfand. Auf Drängen von Hermann Göring und Heinrich Himmler ordnete Reichskanzler [GER.GetLeader] eine Reihe politischer außergerichtlicher Hinrichtungen an, um seine Macht zu festigen und die Bedenken des deutschen Militärs hinsichtlich der Rolle von Ernst Röhm und der Sturmabteilung (SA), der paramilitärischen Organisation der Nazis, zu zerstreuen. Die Nazi-Propaganda stellte die Morde als Präventivmaßnahme gegen einen angeblich bevorstehenden Putsch der SA unter Röhm dar – den sogenannten Röhm-Putsch."
germany_1933.18.a:0 "Exzellent."

germany_1933.19.t:0 "Deutschland fordert Südtirol"
germany_1933.19.d:0 "Überraschenderweise hat uns die deutsche Bundeskanzlerin ein Ultimatum gestellt: Wir müssten Südtirol übergeben, andernfalls würden wir überfallen. Wie sollen wir darauf reagieren?"
germany_1933.19.a:0 "Wir können uns keinen Krieg mit Deutschland leisten …"
germany_1933.19.b:0 "Wir geben keinen Zentimeter italienischen Territoriums ab!"

germany_1933.20.t:0 "Italien akzeptiert!"
germany_1933.20.d:0 "Es scheint, als hätte der Duce Einsicht gewonnen und uns unser rechtmäßiges Gebiet Südtirol zurückgegeben."
germany_1933.20.a:0 "Es war sowieso deutsch."

germany_1933.21.t:0 "Italien weigert sich!"
germany_1933.21.d:0 "Es scheint, als würde der Duce uns unterschätzen und uns die Rückgabe unseres rechtmäßigen Territoriums Südtirol verweigern."
germany_1933.21.a:0 "Südtirol gehört uns so oder so."

germany_1933.22.t:0 "Baue die Alpenfestung"
germany_1933.22.d:0 "Die Alpenfestung oder Alpenschanze war die im Zweiten Weltkrieg von Heinrich Himmler im November und Dezember 1943 geplante nationale Schanze, die der deutschen Regierung und den deutschen Streitkräften den Rückzug in ein Gebiet von „Südbayern über Westösterreich bis Norditalien“ ermöglichen sollte. Der Plan wurde von Hitler nie vollständig gebilligt, und es wurde kein ernsthafter Versuch unternommen, ihn in die Tat umzusetzen, obwohl er den Deutschen in der Endphase des Krieges als wirksames Instrument der Propaganda und militärischen Täuschung dienen sollte."
germany_1933.22.a:0 "Es wird ein teures Projekt ..."

germany_1933.23.t:0 "Unsere Hauptstadt verlegt"
germany_1933.23.d:0 "Wir haben nun alle wichtigen Regierungsmitarbeiter in unsere Superfestung in den Alpen verlegt."
germany_1933.23.a:0 "Kapitulieren? Nein!"

germany_1933.24.t:0 "Deutschland beantragt Asyl"
germany_1933.24.d:0 "Wir haben ein Telegramm der deutschen Führung erhalten, in dem sie uns bittet, ihre Exilregierung in Buenos Aires zu beherbergen. Wie sollen wir darauf reagieren?"
germany_1933.24.a:0 "Lassen Sie sie natürlich herein."
germany_1933.24.b:0 "Nein, das könnte unserem Ruf schaden."

germany_1933.25.t:0 "Argentinien gewährt Asyl"
germany_1933.25.d:0 "Die argentinische Regierung hat unserem Ersuchen stattgegeben. Wir müssen umgehend nach Argentinien ausreisen."
germany_1933.25.a:0 "Exzellent."

germany_1933.26.t:0 "Argentinien verweigert Asyl"
germany_1933.26.d:0 "Die argentinische Regierung hat unseren Asylantrag abgelehnt. Diese schwere Beleidigung ist unverzeihlich."
germany_1933.26.a:0 "Wir werden sie vernichten."

germany_1933.27.t:0 "Evakuierung erfolgreich"
germany_1933.27.d:0 "Wir haben unser wichtigstes Personal erfolgreich in die Deutsche Botschaft in Buenos Aires verlegt. Von hier aus werden wir unsere Kräfte neu organisieren und zum richtigen Zeitpunkt zurückschlagen."
germany_1933.27.a:0 "Sieg Heil."

germany_1933.28.t:0 "Wir wurden unserem Schicksal überlassen"
germany_1933.28.d:0 "Spitzenbeamte unserer Führung sind nach Argentinien geflohen und haben uns unserem Schicksal überlassen. Militärkommandeure halten sich nur widerwillig an Befehle und unsere Frontlinien drohen völlig zusammenzubrechen."
germany_1933.28.a:0 "Was soll aus dem Deutschen Reich werden?"
#### END

 GER_britain_peace:0 "Frieden mit Großbritannien"

 GER_begin_depression_recovery:0 "Beginnen Sie mit der Genesung von Depressionen"
 GER_begin_depression_recovery_desc:0 "Die Bewältigung der Weltwirtschaftskrise durch die Weimarer Republik hat die Wirtschaft noch weiter verschlechtert. Wir sollten anfangen, diesen Schaden zu beheben, den die Feinde Deutschlands angerichtet haben."
 GER_begin_reinhardt:0 "Beginnen Sie das Reinhardt-Programm"
 GER_begin_reinhardt_desc:0 "Der erste Schritt zur wirtschaftlichen Erholung besteht darin, das Unternehmenswachstum zu fördern. Indirekte Anreize, wie etwa Steuersenkungen, werden die private industrielle Entwicklung fördern."
 GER_finish_reinhardt:0 "Beenden Sie das Reinhardt-Programm"
 GER_finish_reinhardt_desc:0 "Ergänzend zum Reinhardt-Programm werden direkte Investitionen in die Infrastruktur großartige Ergebnisse bringen."
 GER_privatize_reichsbahn:0 "Privatisierung der Reichsbahn"
 GER_privatize_reichsbahn_desc:0 "Der erste Schritt zur Wiederherstellung unserer Infrastruktur wird die Wiederbelebung des Eisenbahnsystems durch Privatisierung sein."
 GER_privatize_stahlwerke:0 "Privatisierung der Vereinigten Stahlwerke"
 GER_privatize_stahlwerke_desc:0 "Um die Schlagkraft unseres Militärs auf das Niveau vor Versailles zu steigern, müssen wir die Effizienz unserer Stahlwerke steigern."
 GER_synth_oil_research:0 "Forschung zu synthetischem Öl"
 GER_synth_oil_research_desc:0 "Da es in Deutschland nur wenige natürliche Öl- und Kautschukquellen gibt, sind wir auf die Herstellung synthetischen Öls angewiesen, um unsere Reserven dieser wertvollen Ressourcen aufzustocken."
 GER_oil_refinery_development:0 "Bauen Sie Ölraffinerien"
 GER_oil_refinery_development_desc:0 "Da sich unsere Forschung und Technologie im Bereich synthetisches Öl verbessert hat, können wir modernere Raffinerien bauen."
 GER_establish_peenmunde:0 "Gründung des Peenemünde-Labors"
 GER_establish_peenmunde_desc:0 "Die Einrichtung dieses neuen Zentrallabors wird unser wissenschaftliches Wissen und unsere Forschung auf ein neues Niveau heben."
 GER_establish_SS:0 "Gründung der SS"
 GER_establish_SS_desc:0 "Die einzige Möglichkeit, die deutsche Führung vor äußeren Bedrohungen zu schützen, ist eine Elite-Leibwache. Diese Leibwache, die SS, wird dafür sorgen, dass die Regierung reibungslos funktioniert und sich mit jenen auseinandersetzen, die ihr schaden wollen."
 GER_aux_police_SS:0 "SS als Hilfspolizei einsetzen"
 GER_aux_police_SS_desc:0 "Die Rolle der SS kann sich natürlich auch auf den zivilen Bereich ausweiten, sowohl in Großdeutschland als auch in den besetzten Gebieten. Hoffentlich kann sie den Partisanen- und Terrorbedrohungen, die die Truppen der Wehrmacht angreifen, begegnen."
 GER_elite_soldiers_SS:0 "Verwenden Sie SS an der Frontlinie"
 GER_elite_soldiers_SS_desc:0 "Durch die spezielle Ausbildung und Schulung sind SS-Soldaten in Rollen, die mehr Hingabe und Loyalität gegenüber dem Vaterland erfordern, viel besser geeignet als normale Einheiten."
 GER_combine_SS_gestapo:0 "Kombinieren Sie die SS und die Gestapo"
 GER_combine_SS_gestapo_desc:0 "Durch die Zusammenlegung von SS und Gestapo verfügen wir über eine Streitmacht, die nicht nur zu militärischen Operationen, sondern auch zu friedenserhaltenden und antiterroristischen Operationen fähig ist."
 GER_purge_political_opponents:0 "Politische Gegner ausmerzen"
 GER_purge_political_opponents_desc:0 "Der unbestreitbar starke Einfluss anderer politischer Parteien lässt sich nur dadurch bekämpfen, dass wir sie alle gemeinsam beseitigen. Nur dann können wir die Einheit unserer Nation stärken und Deutschland zum Sieg führen."
 GER_strengthen_german_state:0 "Den deutschen Staat stärken"
 GER_strengthen_german_state_desc:0 "Erhöhte Investitionen in Industrie und Wissenschaft werden zweifellos den Zustand Deutschlands und seine technologischen Bestrebungen verbessern."
 GER_sweden_war:0 "Krieg mit Schweden"
 GER_sweden_war_desc:0 "Wir importieren seit Jahren Wolfram und Eisen aus Schweden. Die Bedrohung Schwedens durch den Feind stellt auch eine Bedrohung für Deutschlands Militär und Expansion dar. Wir müssen Schweden schützen, um sicherzustellen, dass diese lebenswichtigen Ressourcen nicht in die Hände des Feindes fallen."
 GER_finland_friend:0 "Befreunde dich mit Finnland"
 GER_finland_friend_desc:0 "Finnland ist seit langem ein Feind der Sowjetunion und könnte sich als wichtiges Bindeglied zur nördlichen UdSSR und dem Rest Skandinaviens erweisen."
 GER_finland_war:0 "Krieg mit Finnland"
 GER_finland_war_desc:0 "Finnlands Einfluss sowohl in der UdSSR als auch in Skandinavien ist für die weitere Expansion Deutschlands von entscheidender Bedeutung. Die Sicherung dieser Hochburg wäre für unsere Feinde ein schwerer Schlag."
 GER_prepare_france_invasion:0 "Bereiten Sie sich auf die Invasion Frankreichs vor"
 GER_prepare_france_invasion_desc:0 "Frankreich war ein Gegner unserer politischen und militärischen Expansion und war einer der federführenden Verfasser des verfluchten Versailler Vertrags. Um sicherzustellen, dass Frankreich unsere territorialen Ambitionen nicht länger behindert, müssen wir es von der Landkarte Europas entfernen."
 GER_core_lorraine:0 "Anspruch Elsass-Lothringen"
 GER_core_lorraine_desc:0 "Das Gebiet Elsass-Lothringen ist seit langem die Heimat einer deutschsprachigen Bevölkerung. Im Laufe unserer gemeinsamen Geschichte hat Frankreich Deutschland dieses Land geraubt. Jetzt ist es an der Zeit, es endgültig zurückzuerobern."
 GER_blitzkreig_tactics:0 "Blitzkrieg-Taktiken"
 GER_blitzkreig_tactics_desc:0 "Unsere technologischen Fortschritte in der Luft- und Landstreitkräfte können koordiniert werden, sodass wir die langsamen und blutigen Charakteristika des Stellungskriegs vermeiden können. Frankreich wird zum Übungsplatz für unser neues Militär, und wir werden eine neue Form der Kriegsführung einführen."
 GER_build_panzer_army:0 "Bauen Sie die Panzerarmee auf"
 GER_build_panzer_army_desc:0 "Bevor wir in Frankreich einmarschieren, müssen wir sicherstellen, dass unsere Panzerdivisionen auf dem neuesten Stand sind und über die erforderlichen Panzer verfügen."
 GER_above_maginot:0 "Über Maginot"
 GER_above_maginot_desc:0 "Einige unserer Oberbefehlshaber haben vorgeschlagen, unsere neue und schlagkräftige Luftwaffe voll auszunutzen, um Gefechte an der Maginot-Linie gänzlich zu vermeiden. Zuvor müssen wir jedoch verstärkt in Technologien investieren, die größere Luftlandeinsätze ermöglichen."
 GER_plan_sealion:0 "Bereiten Sie sich auf Sealion vor"
 GER_plan_sealion_desc:0 "Großbritannien ist uns schon seit langem ein Dorn im Auge. Die einzige Möglichkeit, diesen Dorn zu entfernen, besteht darin, den Ärmelkanal zu überqueren und ihn mit Gewalt herauszuholen."
 GER_landing_craft:0 "Forschungslandungsboot"
 GER_landing_craft_desc:0 "Die einzige Möglichkeit, das britische Festland erfolgreich zu erobern, ist eine große Invasion von der See aus, die nur mit neuen Landungsbooten möglich ist."
 GER_air_superiority_english_channel:0 "Luftschlacht um England"
 GER_air_superiority_english_channel_desc:0 "Zusätzlich zu den Angriffen über See müssen wir auch aus der Luft angreifen. Der Ausbau unserer Luftwaffe ist die einzige Möglichkeit, die RAF im direkten Kampf zu besiegen."
 GER_train_paratroopers:0 "Fallschirmjäger ausbilden"
 GER_train_paratroopers_desc:0 "Fallschirmjägerdivisionen, unsere Luftlandeinfanteriedivisionen, werden die einzige Möglichkeit sein, das britische Festland schnell zu erobern und einzunehmen."
 GER_naval_superiority_english_channel:0 "Überlegenheit im Ärmelkanal"
 GER_naval_superiority_english_channel_desc:0 "Die einzige Möglichkeit, unsere schwächeren Landungsboote zu eskortieren und eine Invasion von See aus zu unterstützen, ist der Aufbau einer Marine, die der britischen überlegen ist."
 GER_enact_sealion:0 "Seelöwe ausführen"
 GER_enact_sealion_desc:0 "Endlich ist es soweit: Wir werden unseren Plan zur Invasion Großbritanniens in die Tat umsetzen und endlich diesen Dorn entfernen, den wir so lange in uns getragen haben."
 GER_prepare_italy_invasion:0 "Bereiten Sie sich auf die Invasion Italiens vor"
 GER_prepare_italy_invasion_desc:0 "Während die Italiener zuvor eine politisch freundliche Kraft waren, sind die Beziehungen langsam angespannt und sie leisten offensichtlich keinen Beitrag. Um unsere Südflanke zu sichern, müssen wir in Italien einmarschieren."
 GER_core_south_tyrol:0 "Anspruch Südtirol"
 GER_core_south_tyrol_desc:0 "Ähnlich wie in Danzig oder Elsass-Lothringen ist Südtirol eine Provinz mit einem großen deutschsprachigen Bevölkerungsanteil. Wir müssen unsere vertriebenen Völker wieder unter deutschen Schutz stellen."
 GER_train_mountaineers:0 "Zug Gebirgsjäger"
 GER_train_mountaineers_desc:0 "Italien ist eine sehr gebirgige Region Europas, deren Gelände den Vormarsch unserer Standardinfanterie stark behindern würde. Durch die Ausbildung von Gebirgsjägerdivisionen, also speziell für den Gebirgskampf ausgebildeten Truppen, umgehen wir diese Probleme."
 GER_kick_italy_out:0 "Italien aus der Achse werfen"
 GER_kick_italy_out_desc:0 "Italien leistet nicht seinen Beitrag und muss versorgt werden. Um in ihr Land einzumarschieren, müssen wir sie jedoch zunächst aus unserer Fraktion vertreiben."
 GER_war_with_italy:0 "Krieg mit Italien"
 GER_war_with_italy_desc:0 "Unsere Vorbereitungen sind abgeschlossen und die Zeit ist gekommen: Wir müssen in die Länder unserer einstigen Verbündeten einfallen."
 GER_prepare_poland_invasion:0 "Bereiten Sie sich auf die Invasion Polens vor"
 GER_prepare_poland_invasion_desc:0 "Nach dem Ersten Weltkrieg hat uns Polen den Hafen von Danzig geraubt. Darüber hinaus ist er unser taktischer Weg nach Osteuropa. Aus diesen Gründen müssen wir in den polnischen Staat einmarschieren."
 GER_modernize_CAS:0 "Modernisierung der Luftunterstützung"
 GER_modernize_CAS_desc:0 "Während unsere Bodentruppen modernisiert werden können, müssen wir sie mit einer neu erforschten Luftnahunterstützungsstreitmacht unterstützen."
 GER_schwerepunkt_tactics:0 "Schwerpunkt Taktik"
 GER_schwerepunkt_tactics_desc:0 "Durch die Einrichtung spezifischer Konzentrationspunkte für unsere mobilen Kräfte, wie etwa Panzer- und motorisierte Divisionen, können wir sicherstellen, dass wir auch die stärksten Verteidigungslinien durchbrechen können."
 GER_soviet_friend:0 "Befreunde dich mit der UdSSR"
 GER_soviet_friend_desc:0 "Die Freundschaft mit der UdSSR wird für die Sicherung unserer Ostflanke von entscheidender Bedeutung sein. Sobald Polen aus dem Weg ist, ist unser Osten sicher und wir können uns auf andere Teile des Feldzugs konzentrieren."
 GER_war_with_poland:0 "Krieg mit Polen"
 GER_war_with_poland_desc:0 "Die Polen haben uns gegenüber in letzter Zeit große Feindseligkeit gezeigt. Sie sind sogar mehrmals über unsere Grenzen eingedrungen und haben unser Volk angegriffen! Wir müssen einen Verteidigungskrieg gegen die Polen führen! So jedenfalls die Geschichte."
 GER_romania_friend:0 "Befreunde dich mit Rumänien"
 GER_romania_friend_desc:0 "Rumänien als Verbündeten zu haben, wird uns nicht nur einen neuen militärischen Auftrieb geben, sondern auch dazu beitragen, die sowjetische Aggression einzudämmen."
 GER_romania_war:0 "Krieg mit Rumänien"
 GER_romania_war_desc:0 "Wir müssen Rumänien sichern; es ist unberechenbar und könnte leicht zu einer Angriffsroute für unsere Feinde im Süden und Osten werden."
 GER_soviet_invasion:0 "Invasion der UdSSR"
 GER_soviet_invasion_desc:0 "Wir liegen seit langem mit den Sowjets im Streit um die territoriale Vorherrschaft in Europa; die einzige Möglichkeit, dieser Bedrohung zu begegnen, besteht darin, sie vollständig von der Landkarte zu tilgen."
 GER_train_panzergrenadiers:0 "Zug Panzergrenadiere"
 GER_train_panzergrenadiers_desc:0 "Ein Großteil unserer Standardinfanterie ist nicht gut genug ausgebildet und ausgerüstet, um mit unseren Panzern mitzuhalten. Wir sollten einige unserer Divisionen zu Elite-Panzergrenadierdivisionen aufrüsten, um uns einen weiteren Vorteil gegenüber unseren Gegnern zu verschaffen."
 GER_counter_sloped_armor:0 "Konter gegen sowjetische Panzer"
 GER_counter_sloped_armor_desc:0 "Sowjetische Panzer wie der T-34 sind mit einer schrägen Panzerung ausgestattet; diese Panzerung kann einen Großteil unserer aktuellen Panzerabwehrkanonen abwehren. Die Ausrüstung unserer Truppen mit besseren Panzerabwehrwaffen wird dieser neuen Panzerung entgegenwirken."
 GER_seige_fortified_towns:0 "Belagern Sie befestigte Städte"
 GER_seige_fortified_towns_desc:0 "Die Sowjets haben die Verteidigung mehrerer Städte wie Leningrad und Moskau verstärkt. Um diese Städte einzunehmen, müssen wir sie umzingeln und mit möglichst viel Feuerkraft bombardieren."
 GER_counter_anti_tank:0 "Verbessern Sie unsere Rüstung"
 GER_counter_anti_tank_desc:0 "Die Sowjets haben Panzerabwehrwaffen entwickelt, die unsere Panzerung schnell und einfach besiegen können. Die Investition in schwere Panzer wird uns im Feld unbesiegbar machen."
 GER_encirclement_doctrine:0 "Einkreisungsdoktrin"
 GER_encirclement_doctrine_desc:0 "Den Sowjets stehen mehrere Millionen mehr Soldaten zur Verfügung als uns. Um dem entgegenzuwirken, müssen wir ihre Armeen einkreisen und vernichten, ohne ihnen die Möglichkeit zu geben, sich zu wehren."
 GER_train_marines:0 "Zug Seebataillone"
 GER_train_marines_desc:0 "Seebataillone verschaffen uns bei Invasionen von See aus einen Vorteil, da sie uns Truppen an die Hand geben, die auf die Landung an den Küsten unserer Feinde spezialisiert sind."
 GER_invade_switzerland:0 "Operation Tannenbaum"
 GER_invade_switzerland_desc:0 "Die Schweizer sind eng mit den Deutschen verwandt. Viele Schweizer sprechen sogar unsere Sprache. Wir sollten unsere Völker wiedervereinigen und ihnen einen besseren Schutz gewährleisten."
 GER_germanize_switzerland:0 "Integriere die Schweiz"
 GER_germanize_switzerland_desc:0 "Die Schweiz soll vollständig in unser Land integriert werden, damit unsere Bevölkerung ein sicheres und friedliches Leben führen kann."
 GER_germanize_benelux:0 "Germanisierung der Benelux-Länder"
 GER_germanize_benelux_desc:0 "Die Benelux-Länder haben seit langem enge kulturelle Bindungen zu Deutschland; jetzt, da wir unter derselben Flagge stehen, können wir ein und dasselbe Volk werden."
 GER_the_blitz:0 "Der Blitz"
 GER_the_blitz_desc:0 "Die Moral der britischen Bevölkerung lässt sich am besten dadurch schwächen, dass man ihre Städte in Schutt und Asche legt. Neue Investitionen in Bomber werden unsere Fähigkeit, dies zu erreichen, verbessern."
 GER_turkey_friend:0 "Befreunde dich mit der Türkei"
 GER_turkey_friend_desc:0 "Durch die Freundschaft mit der Türkei können wir unseren Einfluss im Nahen Osten und in Afrika vergrößern."
 GER_turkey_war:0 "Krieg mit der Türkei"
 GER_turkey_war_desc:0 "Die Kontrolle über die türkischen Gebiete verschafft uns Zugang zum Nahen Osten und nach Afrika, was für die Sicherung der britischen und französischen Kolonien von entscheidender Bedeutung ist. Darüber hinaus ist die Türkei ein köstliches Nahrungsmittel."
 GER_war_with_spain:0 "Krieg mit Spanien"
 GER_war_with_spain_desc:0 "Die Sicherung Spaniens verschafft uns eine taktische Position im Mittelmeer, erleichtert uns die Sicherung Gibraltars und ermöglicht uns einen schnellen Vormarsch nach Afrika."
 GER_foreign_volunteers:0 "Akzeptieren Sie ausländische Freiwillige"
 GER_foreign_volunteers_desc:0 "Viele Menschen im Ausland stimmen mit unserer Politik und unseren Positionen überein und sind sogar bereit, für uns zu kämpfen. Früher waren wir dazu nicht bereit, aber zu diesem Zeitpunkt des Krieges könnten wir mehr Truppen sicherlich gut gebrauchen."
 GER_poltical_sphere:0 "Öffnung der deutschen Politik"
 GER_political_sphere_desc:0 "Nach der Wahl Hitlers und der Machtkonsolidierung der NSDAP ist es nun an der Zeit, den politischen Raum für Veränderungen zu öffnen. Entweder wir gehen den Weg des Führers weiter oder wir finden einen neuen Weg."
 GER_kill_hitler:0 "Hitler loswerden"
 GER_kill_hitler_desc:0 "Hitler ist seit mehreren Jahren die Galionsfigur Deutschlands und seiner Politik. Da es in der NSDAP keine starken Nachfolger für ihn gibt, ist er ein bevorzugtes Ziel für alle, die den deutschen Faschismus stoppen wollen."
 GER_political_turmoil:0 "Nutzen Sie die politischen Turbulenzen"
 GER_political_turmoil_desc:0 "Jetzt, da Hitler tot ist, wird es mir viel leichter fallen, das Feuer der Instabilität im Reich weiter zu schüren."
 GER_denounce_versailles:0 "Den Versailler Vertrag kündigen"
 GER_denounce_versailles_desc:0 "Eine offizielle Kündigung des Versailler Vertrags wird unsere politische Position der Welt klar machen und in der Zivilbevölkerung Unterstützung für unsere Sache gewinnen."
 GER_military_industrial_complex:0 "Ausbau der Militärindustrie"
 GER_military_industrial_complex_desc:0 "Durch die Nutzung einer auf Auftragnehmern basierenden Rüstungsindustrie und umfangreicher staatlicher Fördermittel wird unser Industriekomplex auf eine neue Ebene gehoben."
 GER_restore_weimar:0 "Bemühungen zur Wiederherstellung der Weimarer Regierung"
 GER_restore_weimar_desc:0 "Das demokratische System der Weimarer Regierung war die beste Lösung für die deutsche Staatsführung. Hitlers Machtergreifung behinderte den friedlichen Weg Deutschlands. Wir sollten den Schaden, den Hitler angerichtet hat, wiedergutmachen, bevor es zu spät ist."
 GER_establish_bundesrepublik:0 "Gründung der Bundesrepublik"
 GER_establish_bundesrepublik_desc:0 "Die öffentliche Unterstützung für eine neue demokratische Regierung hat rapide zugenommen. Angesichts dieser neuen öffentlichen Gunst ist es für uns an der Zeit, eine Konterrevolution gegen die Faschisten durchzuführen."
 GER_post_fascism_recovery:0 "Erholung vom Faschismus"
 GER_post_fascism_recovery_desc:0 "Die Jahre des Faschismus haben unserer Wirtschaft und Kultur großen Schaden zugefügt. Wir müssen öffentliche Initiativen starten, um diesen Schaden rückgängig zu machen."
 GER_marshall_plan:0 "Der Marshallplan"
 GER_marshall_plan_desc:0 "Finanzielle Mittel aus dem Westen, insbesondere aus den USA, werden Wunder für unsere Wirtschaft und unsere Erholung vom Faschismus bewirken und außerdem die Anfälligkeit unserer Bevölkerung für den Kommunismus verringern."
 GER_replace_reichsmark:0 "Ersetzen Sie die Reichsmark"
 GER_replace_reichsmark_desc:0 "Das Chaos nach Hitlers Tod und die demokratische Konterrevolution führten zu einer massiven Inflation der Reichsmark. Um dem entgegenzuwirken, sollten wir die Reichsmark durch eine neue Währung ersetzen."
 GER_economic_miracle:0 "Das deutsche Wirtschaftswunder"
 GER_economic_miracle_desc:0 "Die Kombination aus der Unterstützung anderer Demokratien und unserem neuen freien Marktsystem hat zu einem enormen Aufschwung unserer Wirtschaft geführt."
 GER_post_war_economics:0 "Friedensökonomie"
 GER_post_war_economics_desc:0 "Da wir uns nun nicht mehr in einer kriegsbedingten Wirtschaftslage befinden, können wir uns auf unsere Zivilbevölkerung und ihren Wohlstand konzentrieren."
 GER_civilian_infrastructure:0 "Zivile Infrastruktur"
 GER_civilian_infrastructure_desc:0 "Auf unserem Weg zu einer Nachkriegswirtschaft werden wir die Infrastruktur verbessern, damit zivile Industrie und Wirtschaft florieren können."
 GER_establish_bundeswehr:0 "Aufbau der Bundeswehr"
 GER_establish_bundeswehr_desc:0 "Obwohl Deutschland nicht mehr faschistisch ist, besteht für unser Land weiterhin eine Bedrohung von außen. Um diese Bedrohungen zu bekämpfen, sollten wir eine neue Streitmacht aufbauen: die Bundeswehr."
 GER_defense_and_deterence:0 "Verteidigung und Abschreckung"
 GER_defense_and_deterence_desc:0 "Darüber hinaus sollten wir bei unserer Verteidigung gegen externe Bedrohungen eine Politik der Verteidigung und Abschreckung verfolgen, die die Verteidigung unseres Landes und Volkes gewährleistet."
 GER_western_science_funding:0 "Wissenschaftsförderung aus dem Westen"
 GER_western_science_funding_desc:0 "Als Erweiterung der bisherigen Unterstützung können uns auch die westlichen Demokratien mit Mitteln für unsere Wissenschaften versorgen."
 GER_repeal_reichstag_fire_decree:0 "Aufhebung der Reichstagsbrandverordnung"
 GER_repeal_reichstag_fire_decree_desc:0 "Die Reichstagsbrandverordnung, ein Gesetz, das den Kommunismus im Wesentlichen verbot, sollte aufgehoben werden, um unseren von Natur aus linken Menschen die Möglichkeit zu geben, ihre Interessen zum Ausdruck zu bringen."
 GER_alliance_with_soviets:0 "Bündnis mit den Sowjets"
 GER_alliance_with_soviets_desc:0 "Die Sowjetunion ist die stärkste kommunistische Macht der Welt. Ein Bündnis mit ihr würde eine neue Weltsupermacht schaffen."
 GER_progress_cult:0 "Fortschrittskult"
 GER_progress_cult_desc:0 "Durch die Finanzierung gut ausgebildeter und erstklassiger Wissenschaftler durch die Regierung können wir unsere Wissenschaften auf die nächste Ebene bringen."
 GER_soviet_scientists:0 "Importieren Sie sowjetische Wissenschaftler"
 GER_soviet_scientists_desc:0 "Die Ansiedlung von Wissenschaftlern aus der Sowjetunion nach Deutschland, ob legal oder nicht, wird unseren wissenschaftlichen Fortschritt noch weiter vorantreiben."
 GER_establish_stasi:0 "Gründung der Stasi"
 GER_establish_stasi_desc:0 "Um sicherzustellen, dass unsere Regierung nicht von Konterrevolutionären aus dem Inneren gestürzt wird, brauchen wir eine Agentur, die derartige Probleme untersucht."
 GER_recruit_grenztruppen:0 "Grenzertruppen rekrutieren"
 GER_recruit_grenztruppen_desc:0 "Neue Grenzertruppen-Divisionen werden unsere Grenzsicherheit und unser Militär insgesamt stärken."
 GER_rehabilitate_military:0 "Rehabilitieren Sie das Militär"
 GER_rehabilitate_military_desc:0 "Die Faschisten haben das deutsche Militär in eine rückständige und korrupte Bürokratie verwandelt, und wir müssen diese Probleme in unserem neuen Militär umkehren."
 GER_establish_NVA:0 "Gründung der NVA"
 GER_establish_NVA_desc:0 "Die Gründung der Nationalen Volksarmee als neue, aus Wehrpflichtigen bestehende, aber gut ausgebildete Streitmacht wird uns einen erheblichen Vorteil gegenüber unseren Feinden verschaffen."
 GER_production_effort:0 "Industrialisierungsbemühungen"
 GER_production_effort_desc:0 "Nach dem Schaden, den die vorherige faschistische Regierung der Industrie zugefügt hat, ist es unsere Pflicht, unsere Industriekapazitäten auszubauen und den entstandenen Schaden rückgängig zu machen."
 GER_collectivize_industry:0 "Industrie kollektivieren"
 GER_collectivize_industry_desc:0 "Als Erweiterung unserer Industrialisierungsbemühungen sollten wir unsere Industrien schrittweise kollektivieren, um sicherzustellen, dass sie mit maximaler Effizienz arbeiten."
 GER_total_war:0 "Total War"
 GER_total_war_desc:0 "Ich frage Sie: Wollen Sie einen totalen Krieg? Wollen Sie, wenn nötig, einen Krieg, der totaler und radikaler ist als alles, was wir uns je vorstellen können? - Joseph Goebbels"
 GER_case_anton:0 "Case Anton"
 GER_case_anton_desc:0 "Fall Anton, der Plan zur Invasion und Eingliederung unserer französischen Marionette in Deutschland, sollte in die Tat umgesetzt werden, um den Rest Frankreichs zu sichern."
 GER_lebensraum:0 "Lebensraum erweitern"
 GER_lebensraum_desc:0 "Lebensraum ist für Deutschland lebenswichtig. Wir müssen die wirtschaftliche Unabhängigkeit unseres Landes von anderen sicherstellen, um zu verhindern, dass sich ein Ereignis wie die britische Blockade während des Ersten Weltkriegs wiederholt."
 GER_germanize_netherlands:0 "Germanisierung der Niederlande"
 GER_germanize_netherlands_desc:0 "Die Niederlande waren schon immer die Heimat eines ausgesprochen germanischen Volkes, doch jetzt ist es an der Zeit, uns unter eine gemeinsame Flagge zu stellen."
 GER_germanize_belgium:0 "Belgien germanisieren"
 GER_germanize_belgium_desc:0 "Belgien war schon immer die Heimat eines ausgesprochen germanischen Volkes, doch nun ist es an der Zeit, uns unter eine gemeinsame Flagge zu vereinen."
 GER_germanize_luxembourg:0 "Luxemburg germanisieren"
 GER_germanize_luxembourg_desc:0 "Luxemburg war schon immer die Heimat eines ausgesprochen germanischen Volkes, doch nun ist es an der Zeit, uns unter die gleiche Flagge zu stellen."
 GER_germanize_lithuania:0 "Litauen germanisieren"
 GER_germanize_lithuania_desc:0 "Die Slawen Osteuropas haben sich immer in die Interessen Deutschlands eingemischt. Es ist an der Zeit, dass wir uns weiter mit diesen Problemen befassen und unseren Lebensraum erweitern."
 GER_germanize_estonia:0 "Estland germanisieren"
 GER_germanize_estonia_desc:0 "Die Slawen Osteuropas haben sich immer in die Interessen Deutschlands eingemischt. Es ist an der Zeit, dass wir uns weiter mit diesen Problemen befassen und unseren Lebensraum erweitern."
 GER_germanize_latvia:0 "Lettland germanisieren"
 GER_germanize_latvia_desc:0 "Die Slawen Osteuropas haben sich immer in die Interessen Deutschlands eingemischt. Es ist an der Zeit, dass wir uns weiter mit diesen Problemen befassen und unseren Lebensraum erweitern."
 GER_generalplan_ost_I:0 "Generalplan Ost I"
 GER_generalplan_ost_I_desc:0 "Die Slawen Osteuropas haben sich immer in die Interessen Deutschlands eingemischt. Es ist an der Zeit, dass wir uns weiter mit diesen Problemen befassen und unseren Lebensraum erweitern."
 GER_generalplan_ost_II:0 "Generalplan Ost II"
 GER_generalplan_ost_II_desc:0 "Die Slawen Osteuropas haben sich immer in die Interessen Deutschlands eingemischt. Es ist an der Zeit, dass wir uns weiter mit diesen Problemen befassen und unseren Lebensraum erweitern."
 GER_appoint_economic_positions:0 "Wirtschaftspositionen besetzen"
 GER_appoint_economic_positions_desc:0 "Deutschland kann sich nur dann vollständig von der Weltwirtschaftskrise erholen, wenn wir eine vereinte Wirtschaft schaffen. Dies kann durch die Ernennung eines Reichsbankpräsidenten und eines Wirtschaftsministers erleichtert werden."
 GER_two_side_economics:0 "Zweiseitige Ökonomie"
 GER_two_side_economics_desc:0 "In der deutschen Regierung konkurrieren zwei Gruppen um die Macht. Auf der einen Seite stehen die Technokraten, die glauben, dass die Besetzung von Machtpositionen mit Spezialisten und die Priorisierung der Industrie gegenüber dem Militär zu einer erfolgreichen Wirtschaft führen. Auf der anderen Seite stehen die Autarkie-Anhänger, die ein völlig autarkes und militärisch starkes Deutschland anstreben."
 GER_support_technocrats_I:0 "Stehen Sie auf der Seite der Technokraten"
 GER_support_technocrats_I_desc:0 "Wenn wir ein wirtschaftlich starkes Deutschland haben wollen, müssen wir uns auf die Seite der Technokraten stellen."
 GER_support_technocrats_II:0 "Geben Sie Technokraten Sitze in der Regierung"
 GER_support_technocrats_II_desc:0 "Wenn Technokraten Sitze in der Regierung erhalten, können sie ihre Politik wirksamer vorantreiben."
 GER_support_autarks_I:0 "Stehen Sie auf der Seite der Autarken"
 GER_support_autarks_I_desc:0 "Wenn wir ein wirtschaftlich starkes Deutschland haben wollen, müssen wir uns auf die Seite der Autarkie stellen."
 GER_support_autarks_II:0 "Geben Sie Autarkie-Mitgliedern Sitze in der Regierung"
 GER_support_autarks_II_desc:0 "Indem den Autarkie-Staaten Sitze in der Regierung eingeräumt werden, können sie ihre Politik wirksamer vorantreiben."
 GER_jet_research:0 "Fonds Jet Research"
 GER_jet_research_desc:0 "Das Düsentriebwerk wird uns in ein neues Zeitalter der Kriegsführung katapultieren und es uns ermöglichen, unsere Feinde mit unheimlicher Präzision zu bombardieren und den Himmel über Deutschland zu beherrschen, sagen zumindest unsere Wissenschaftler."
 GER_volksgemeinschaft:0 "Unterstützen Sie die Volksgemeinschaft"
 GER_volksgemeinschaft_desc:0 "Die Volksgemeinschaft wird dazu beitragen, die germanischen Völker Europas und der Welt zu vereinen und zu stärken."
 GER_deutsche_arbeitsfront:0 "Gründung der Deutschen Arbeitsfront"
 GER_deutsche_arbeitsfront_desc:0 "Durch die Ersetzung aller deutschen Gewerkschaften durch eine staatlich kontrollierte Gewerkschaft können wir eine optimale Effizienz im deutschen Industriekomplex sicherstellen und darüber hinaus die Umsetzung industrieller und wirtschaftlicher Reformen erleichtern."
 GER_volkswagen:0 "Volkswagen gründen"
 GER_volkswagen_desc:0 "Die Massenproduktion eines „Volksautos“ wird die Moral stärken und zu Investitionen in die zivile Infrastruktur und Industrie führen. Und wer mag nicht einen guten Kübelwagen?"
 GER_steelworks_issues:0 "Probleme mit dem Stahlwerk"
 GER_steelworks_issues_desc:0 "Die Vereinigte Stahlwerke AG ist seit langem ein wichtiger Stahlproduzent für Deutschland, aber es handelt sich um ein privates Unternehmen mit geringer staatlicher Kontrolle. Mit der Gründung der Reichswerke Hermann Göring erhalten wir einen Stahlproduzenten, der von der Regierung kontrolliert wird."
 GER_nationalize_resource_industries:0 "Verstaatlichung strategischer Rohstoffindustrien"
 GER_nationalize_resource_industries_desc:0 "Durch die Verstaatlichung der für die Produktion strategischer Ressourcen verantwortlichen Industrien können wir unsere Erträge aus diesen Ressourcen steigern und so unsere Streitkräfte besser aufrechterhalten."
 GER_nationalize_aviation_industry:0 "Verstaatlichung der Luftfahrtindustrie"
 GER_nationalize_aviation_industry_desc:0 "Durch die Verstaatlichung der für die Flugzeugherstellung zuständigen Industrien werden wir unsere Fähigkeit zur Produktion und Entwicklung neuer Militärflugzeuge verbessern."
 GER_reform_uranprojekt:0 "Das Uranprojekt wiederbeleben"
 GER_reform_uranprojekt_desc:0 "Das Uranprojekt, auch bekannt als „Uranclub“, wurde nach dem Einmarsch in Polen und der Einberufung von Wissenschaftlern zum Militär weitgehend aufgelöst. Die Wiederbelebung dieses Programms durch die Rekrutierung von Wissenschaftlern aus dem Militär könnte sich für unsere wissenschaftliche Leistung als lohnendes Unterfangen erweisen."
 GER_stimulate_economic_growth:0 "Wirtschaftswachstum ankurbeln"
 GER_stimulate_economic_growth_desc:0 ""
 GER_schachtplan:0 "Schachtplan"
 GER_schachtplan_desc:0 ""
 GER_rapid_remilitarization:0 "Schnelle Remilitarisierung"
 GER_rapid_remilitarization_desc:0 ""
 GER_lorenz_cipher:0 "Lorenz"
 GER_lorenz_cipher_desc:0 ""
 GER_support_public_works:0 "Öffentliche Arbeiten erweitern"
 GER_support_public_works_desc:0 ""
 GER_establish_mefo:0 "Gründung der Metallurgischen Forschungsgesellschaft"
 GER_establish_mefo_desc:0 "Um unsere Wiederaufrüstung zu finanzieren, müssen wir auf jeden Fall Geld dafür beschaffen, selbst wenn es sich dabei um ein Schneeballsystem handelt und unsere Wirtschaft auf lange Sicht zerstören wird."

 GER_rally_the_monarchists:0 "Versammelt die Monarchisten"
 GER_rally_the_monarchists_desc:0 "Das Versagen der Weimarer Regierung und die Korruption der NSDAP-Regierung stehen im Kontrast zu Deutschlands ruhmreicher imperialer Geschichte. Wir müssen Deutschland zu seinem früheren imperialen Glanz zurückführen, um unseren Platz als Weltmacht zu sichern."
 GER_a_new_reich:0 "Kampf für ein neues Reich"
 GER_a_new_reich_desc:0 "Nachdem wir Monarchisten und andere prokaiserliche Parteien hinter uns gebracht haben, ist es für uns endlich an der Zeit, in Deutschland die Macht zu übernehmen und dem Kaiserreich seinen früheren Glanz zurückzugeben!"
 GER_consolidate_new_reich:0 "Konsolidierung des Vierten Reiches"
 GER_consolidate_new_reich_desc:0 "Wir haben den Reichstag eingenommen und verfügen über eine mehr oder weniger provisorische Regierung mit unserem neuen Kaiser an der Spitze. Jetzt müssen wir Deutschland zum Vierten Reich festigen und konsolidieren."
 GER_restore_the_empire:0 "Das Reich wiederherstellen"
 GER_restore_the_empire_desc:0 "Nach der unglücklichen Niederlage des Zweiten Reichs im Ersten Weltkrieg und der Unterzeichnung des Versailler Vertrags wurden dem Reich viele rechtmäßig deutsche Gebiete entzogen. Wir müssen den langen und mühsamen Prozess der Rückgewinnung dieser Gebiete beginnen."
 GER_european_claims:0 "Wiederherstellung unserer europäischen Gebiete"
 GER_european_claims_desc:0 "Zuallererst müssen wir die Kerngebiete des Deutschen Reiches zurückerobern. Vor allem die heute französische Region Elsass-Lothringen und die polnische Stadt Danzig."
 GER_african_claims:0 "Wiederherstellung unserer afrikanischen Kolonien"
 GER_african_claims_desc:0 "Briten und Franzosen nutzten den Versailler Vertrag, um ihre Einflussnahme auf afrikanische Länder und Kolonien zu rechtfertigen. Dies verdeutlicht die Korruption dieser westlichen Imperialisten. Die Rückeroberung dieser Kolonien würde den deutschen Einfluss in der Region wiederherstellen und ein wichtiges Gegengewicht zum britischen und französischen Expansionismus bilden."
 GER_asian_claims:0 "Wiederherstellung unserer asiatischen Kolonien"
 GER_asian_claims_desc:0 "Ähnlich wie in Afrika nutzten die ehemaligen Alliierten den Versailler Vertrag, um ihre imperialistischen Tendenzen und ihren Raub am deutschen Volk zu rechtfertigen. Nun müssen wir den langen Weg der Wiederherstellung unserer ehemaligen Kolonien in Asien und im Pazifik antreten."
 GER_establish_imperial_german_army:0 "Gründung des Deutschen Heeres"
 GER_establish_imperial_german_army_desc:0 "Durch die Wiederbelebung des Deutschen Heeres nach dem Vorbild der Nazi-Wehrmacht wird das Vierte Reich zweifellos über eine der stärksten und schlagkräftigsten Streitkräfte der Welt verfügen."
 GER_support_landwehr:0 "Unterstützen Sie die Landwehr"
 GER_support_landwehr_desc:0 "Durch die Unterstützung der Landwehr können wir eine professionellere und schlagkräftigere Armee aufbauen, allerdings auf Kosten ihrer Größe."
 GER_support_freikorps:0 "Unterstützen Sie die Freikorps"
 GER_support_freikorps_desc:0 "Durch die Unterstützung der Freikorps wird die Unterstützung unserer Streitkräfte in der Bevölkerung gestärkt, was die Rekrutierung von Zivilisten erleichtert. Allerdings wird es dadurch zwangsläufig schwieriger, professionelle Standards aufrechtzuerhalten."
 GER_gott_mit_uns:0 "Gott Mit Uns"
 GER_gott_mit_uns_desc:0 ""
 GER_draft_new_constitution:0 "Entwurf einer neuen Verfassung"
 GER_draft_new_constitution_desc:0 "Um die nationale Einheit zu sichern und die Machtübernahme durch Extremisten zu verhindern, müssen wir dafür sorgen, dass unsere Monarchie verfassungsmäßig und demokratisch rechenschaftspflichtig ist. Nur dann wird das Vierte Reich zu einem Vorbild für den Rest der Welt."
 GER_prioritize_infrastructure:0 "Priorisieren Sie die Infrastruktur"
 GER_prioritize_infrastructure_desc:0 "Indem wir unsere Infrastruktur auf dem neuesten Stand halten, stellen wir sicher, dass unsere Industriemaschine in allen Sektoren effizienter laufen kann."
 GER_prioritize_civilian_industry:0 "Priorisierung der zivilen Industrie"
 GER_prioritize_civilian_industry_desc:0 "Durch die Gewährleistung einer starken zivilen Industrie können wir die Lebensqualität unserer Bevölkerung verbessern und darüber hinaus einen schnelleren Aufbau in anderen Sektoren ermöglichen."
 GER_prioritize_military_industry:0 "Priorisierung der Rüstungsindustrie"
 GER_prioritize_military_industry_desc:0 "Der einzige Weg zu einem starken Militär ist eine starke Rüstungsindustrie. Eine starke Rüstungsindustrie wird neue Möglichkeiten für unsere militärische Expansion eröffnen."
 GER_prioritize_defensive_construction:0 "Defensive Konstruktionen priorisieren"
 GER_prioritize_defensive_construction_desc:0 "In diesen politisch turbulenten Zeiten ist Deutschland einem besonders hohen Risiko einer feindlichen Invasion durch eine externe Macht ausgesetzt. Um die Stabilität und Sicherheit des deutschen Volkes zu gewährleisten, müssen wir daher Verteidigungsbauten den Vorrang geben."
 GER_kaiser_wilhelm_society:0 "Die Kaiser-Wilhelm-Gesellschaft neu beleben"
 GER_kaiser_wilhelm_society_desc:0 "Aufgrund der Wehrpflicht und der Nürnberger Gesetze gegen die Juden war die deutsche Wissenschaft kaum in der Lage, weiterhin effektive Forschung zu betreiben. Die Wiederbelebung der Kaiser-Wilhelm-Gesellschaft wird unserer militärischen und zivilen Forschung zu neuen Höhen verhelfen."
 GER_return_scientists:0 "Wissenschaftler vom Militärdienst befreien"
 GER_return_scientists_desc:0 "Viele ehemalige Wissenschaftler wurden durch Wehrpflicht oder andere verpflichtende Maßnahmen zum Militärdienst verpflichtet. Indem wir sie von diesen Programmen ausnehmen, verringern wir zwar unseren Personalbestand, stellen aber sicher, dass unsere Forschung auf dem neuesten Stand ist."
 GER_operation_isabella:0 "Operation Isabella"
 GER_operation_isabella_desc:0 "Die Briten haben seit langem großen Einfluss auf das Mittelmeer und die umliegenden Gebiete. Durch die Einnahme wichtiger Häfen in Spanien, Portugal und vor allem Gibraltar können wir unseren Einfluss auf Großbritannien weiter stärken."
 GER_enigma:0 "Rätsel"
 GER_enigma_desc:0 "Die weitere Erforschung der Enigma-Verschlüsselungsmethoden könnte zu erstaunlichen Ergebnissen führen, die es uns ermöglichen, unsere strategische Kommunikation noch besser vor dem Feind zu verbergen."
 GER_volkssturm:0 "Bilden Sie den Volkssturm"
 GER_volkssturm_desc:0 "Obwohl sich der Krieg gegen uns wendet, haben wir immer noch eine Chance, wenn wir als Deutsche zusammenhalten und den Eindringling frontal bekämpfen! Dies ist der letzte Baustein unseres totalen Krieges, und mit dem Volkssturm wird Deutschland niemals besiegt werden!"
 GER_iraq_friend:0 "Befreunde dich mit dem Irak"
 GER_iraq_friend_desc:0 "Der Irak verfügt über eine wertvolle strategische Position im Nahen Osten und einen großen Pool an Ressourcen, die für die deutsche Kriegsmaschinerie notwendig sind. Sich mit diesem Land anzufreunden, könnte sich als kluge Entscheidung erweisen, die uns nicht dazu zwingt, unsere Streitkräfte an eine weitere Front umzulenken."
 GER_iraq_war:0 "Invasion im Irak"
 GER_iraq_war_desc:0 "Der Irak verfügt über eine wertvolle strategische Position im Nahen Osten und einen großen Vorrat an Ressourcen, die für die deutsche Kriegsmaschinerie notwendig sind. Eine Invasion des Iraks wird es uns ermöglichen, diese Schlüsselposition zu halten und seine Ressourcen voll auszunutzen."
 GER_iran_friend:0 "Befreunde dich mit dem Iran"
 GER_iran_friend_desc:0 "Der Iran grenzt an die Sowjetunion und hat als Tor zu Asien eine äußerst strategische Position. Eine Freundschaft mit diesem Land wäre eine lohnende Investition, die unserer Hauptkampagne keine notwendigen Ressourcen entzieht."
 GER_iran_war:0 "Invasion des Iran"
 GER_iran_war_desc:0 "Der Iran grenzt an die Sowjetunion und hat als Tor zu Asien eine äußerst strategische Position. Eine Invasion des Irans würde es uns ermöglichen, den Druck auf dem gesamten asiatischen Kontinent weiter zu erhöhen und uns eine weitere strategische Front in Südrussland zu verschaffen."
 GER_influence_brazil:0 "Einfluss Brasilien"
 GER_influence_brazil_desc:0 "Brasilien verfügt nicht nur über natürliche Ressourcen, sondern auch über eine strategisch wichtige Position in Amerika. Ein Verbündeter in der Nähe gefährdeter südamerikanischer Länder und gleichzeitig in Reichweite der Vereinigten Staaten zu sein, ist eine Überlegung wert."
 GER_revive_brest_litovsk:0 "Den Vertrag von Brest-Litowsk wiederbeleben"
 GER_revive_brest_litovsk_desc:0 "Derzeit ist unser Krieg gegen die Russen erfolgreich, doch unsere Streitkräfte werden an anderen Fronten benötigt. Die Wiederbelebung des Vertrags von Brest-Litowsk wird es uns ermöglichen, Frieden mit den Russen zu schließen und die gewünschten Gebietsgewinne zu erzielen."
 GER_legit_hitler:0 "Legitimieren Sie Hitler"
 GER_legit_hitler_desc:0 "Der Führer, den wir jetzt haben, ist der Führer eines neuen Deutschlands! Die NSDAP muss mit der unerschütterlichen Unterstützung der Regierung unseren Führer dabei unterstützen, Deutschland zu seinem früheren Ruhm zurückzubringen!"
 GER_oppose_hitler:0 "Widersetzen Sie sich Hitler"
 GER_arrest_hitler:0 "Verhaftung Hitlers"
 GER_arrest_hitler_desc:0 "Nachdem die Opposition die nötigen Vorbereitungen getroffen hat, ist es an der Zeit, gegen die verachtenswerte faschistische Regierung vorzugehen. Wir werden direkt an die Spitze gehen und [GER.GetLeader] und seine Schergen im Namen eines größeren Deutschlands verhaften!"
GER_staydemocratic:0 "Behalte Hitler" 
GER_staydemocratic_desc:0 "Wir streben nach einem konföderierten Deutschland! Nur so können wir diese Republik retten"
GER_revokeclaims:0 "Ansprüche widerrufen"
GER_revokeclaims_desc:0 "Wir werden unsere Ansprüche auf unser Land zurückziehen, wir müssen Zugeständnisse machen"
GER_BAU:0 "Auf eine Konföderation hinarbeiten"
GER_returnlands:0 "Rückkehrländer"
GER_demiliterize:0 "Deutschland entmilitarisieren"

GER_confedeate:0 "Den Deutschen Bund gründen"
 GER_loyalty_to_democracy:0 "Loyalität zur Demokratie etablieren"
 GER_economic_liberalism:0 "Wirtschaftsliberalismus"
 GER_economic_liberalism_desc:0 "Der wohl wichtigste Grundpfeiler der Demokratie ist ein funktionierender freier Markt, der es dem Einzelnen ermöglicht, über die Früchte seiner Arbeit zu entscheiden. Die Förderung dieser Idee in unserer Regierung wird sich als entscheidend für den wirtschaftlichen Erfolg Deutschlands erweisen."
 GER_military_contracting:0 "Militärische Auftragsvergabe"
 GER_cooperative_military_research:0 "Kooperative Militärforschung"
 GER_cooperative_military_research_desc:0 "Wenn wir in den Augen anderer großer Nationen – nämlich der USA, Frankreichs und Großbritanniens – positiv genug sind, sollten wir Einblicke in ihre neuesten technologischen Entwicklungen erhalten."
 GER_currency_reform:0 "Währungsreform"
 GER_currency_reform_desc:0 "Die Wirtschaftspolitik der NSDAP war zwar stark im Aufbau der Industrie, ging aber im Inneren der Wirtschaft völlig verantwortungslos vor. Die ehemalige Reichsmark ist instabil und im Vergleich zu ausländischen Währungen abgewertet. Die Schaffung einer neuen Währung und deren ordnungsgemäße Verwaltung werden diese Probleme abmildern."
 GER_tax_reductions:0 "Steuerermäßigungen"
 GER_tax_reductions_desc:0 "Es ist seit Jahrhunderten bekannt, dass weniger Steuern zu glücklicheren und produktiveren Menschen führen. Steuersenkungen für Privatpersonen werden den Konsum ankurbeln und das Wachstum unseres Landes fördern."
 GER_tap_domestic_steel:0 "Tippen Sie auf Domestic Steel"
 GER_tap_domestic_steel_desc:0 "Die Bodenschätze des Ruhrgebiets sind nicht umsonst weltberühmt, auch wenn sie noch nicht vollständig erschlossen sind. Die Nutzung der hier vorhandenen Ressourcen wird sicherlich auch anderen Rohstoffsektoren und unseren Exportmöglichkeiten zugutekommen."
 GER_erhard_reforms:0 "Erhard-Reformen"
 GER_erhard_reforms_desc:0 "Herr Ludwig Erhard ist in Baden-Württemberg eine sehr beliebte Persönlichkeit und wird wahrscheinlich im Kabinett der Landesregierung sitzen. Seine Vorschläge zur Aufhebung wirtschaftlicher Beschränkungen, Preiskontrollen und Kreditbeschränkungen zur Steigerung des Konsums werden bei der Bevölkerung Anklang finden und hoffentlich unsere Wirtschaft revolutionieren."
 GER_ordoliberal_paradise:0 "Ordoliberales Paradies"
 GER_ordoliberal_paradise_desc:0 "Der Ordoliberalismus – eine typisch deutsche liberale Philosophie – nutzt den Staat als Werkzeug, um den freien Markt wie eine gut geölte Maschine laufen zu lassen. Die Akzeptanz dieses Systems hat sich als vorteilhaft erwiesen, und wir profitieren bereits in den Anfängen davon."
 GER_bulwark_against_communism:0 "Bollwerk gegen den Kommunismus"
 GER_formalize_the_community:0 "Formalisierung der Europäischen Gemeinschaft"
 GER_expand_to_low_countries:0 "Expansion in die Niederlande"
