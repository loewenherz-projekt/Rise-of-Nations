 ### BARBAROSSA
 umc_ger.430.t:0 "Die Ostfront"
 umc_ger.430.d:0 "Während sich unser Krieg mit [SOV.GetName] hinzieht und wir tiefer in sowjetisches Gebiet vordringen, müssen sich unsere Soldaten mit immer schlechterer Versorgung und dem undurchdringlichen Gelände der russischen Einöde auseinandersetzen. Wo wir Straßen erwarteten, ist Schlamm. Wo wir Felder erwarteten, ist verbrannter Boden, nass vom starken Regen.\n\nDennoch bleibt unser Führer seinem Entschluss treu, und unsere Truppen rücken vor. Hoffentlich ist es nur eine Frage der Zeit, bis das ganze morsche Gebäude zusammenbricht."
 umc_ger.430.a:0 "Wir werden alle notwendigen Hindernisse überwinden!"
 
 umc_ger.431.t:0 "Erschöpfung des Sowjetkrieges"
 umc_ger.431.d:0 ""
 umc_ger.431.a:0 "Unsere Soldaten werden alles Notwendige tun."
 
 # B - Leningrad
 GER_decision_stabilize_front_EXPL:0 "   Stabilisieren Sie die Ostfront und sorgen Sie mit [SOV.GetFlag]§H[SOV.GetName]§ für einen vorübergehenden „Frieden“!\n"
 umc_ger.440.t:0 "Eroberung Leningrads"
 umc_ger.440.d:0 "Die Einnahme Leningrads war eines der drei strategischen Ziele des Unternehmens Barbarossa und das Hauptziel der Heeresgruppe Nord. Motiviert wurde diese Strategie durch Leningrads politischen Status als ehemalige Hauptstadt Russlands und symbolische Hauptstadt der Russischen Revolution, seine militärische Bedeutung als Hauptstützpunkt der sowjetischen Baltischen Flotte und seine industrielle Stärke mit zahlreichen Rüstungsfabriken. Bis 1939 erwirtschaftete die Stadt 11 % der gesamten sowjetischen Industrieproduktion.\n\nSobald der Krieg mit der Sowjetunion begann, zogen unsere Wehrmachtstruppen wie geplant zügig durch Weißrussland und die baltischen Staaten und erreichten schließlich die Grenze Leningrads. Die Belagerung der Stadt begann, sobald die Wehrmacht die letzte Zufahrtsstraße gesperrt hatte. Auch die Streitkräfte Finnlands beteiligten sich an der Belagerung und blockierten den Zugang zur Stadt von Nordwesten her. Obwohl es den sowjetischen Streitkräften gelang, einen schmalen Landkorridor zur Stadt zu öffnen, trafen keine geeigneten Entsatztruppen ein, und die Stadt blieb bis zu ihrer Kapitulation um [GetDateText] nach dem letzten koordinierten Angriff von Wehrmacht und Luftwaffe praktisch eingeschlossen.\n\nDie Stadt liegt nun in unseren Händen, und ihr Schicksal ist noch nicht entschieden.\n\nDie Belagerung Leningrads gilt als eine der größten Stadtbelagerungen der Kriegsgeschichte. Bei diesem Ereignis kam es auch zum berühmtesten Einsatz des Schweren Gustav-Eisenbahngeschütz."
 umc_ger.440.a:0 "Die Stadt der Revolutionäre gehört uns!"
 
