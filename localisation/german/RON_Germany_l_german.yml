 umc_ger.462.d:0 ""
 umc_ger.462.a:0 "Wenn wir noch etwas haben, womit wir kämpfen können, dann ist jetzt die Zeit dafür."
 
 ### THE TURKESTAN POLICY
 umc_ger.470.t:0 "Die Turkestan-Politik"
 umc_ger.470.d:0 ""
 umc_ger.470.a:0 "Für freie Nationen ist in Asien kein Platz. Sie müssen unter unsere Kontrolle fallen."
 umc_ger.470.a_EXPL:0 "   Fordern Sie, dass die turkestanischen Staaten in ein „Reichskommissariat Turkestan“ umgewandelt werden. Fordern Sie, dass die turkestanischen Staaten als „Reichskolonien“ in Ihren Zuständigkeitsbereich fallen."
 umc_ger.470.b:0 "Binden Sie ihre Wirtschaft an das Reich und beuten Sie sie aus, ohne unsere Ressourcen nennenswert zu nutzen."
 umc_ger.470.c:0 "Schickt die Wehrmacht!"
 umc_ger.470.e:0 "Sie haben wie wir gegen die Bolschewiken gekämpft. Ihre Freiheit ist mit Blut erkauft."
 
