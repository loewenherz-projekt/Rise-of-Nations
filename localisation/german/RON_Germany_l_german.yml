 erwache.49.t:0 "Trotzki kehrt zurück!"
 erwache.49.d:0 "Trotz unzähliger Mordanschläge ist Leo Trotzki noch am Leben und wohlauf. Als er von unseren Entwicklungen in Richtung der Ideale der Vierten Internationale hörte, kam er zu unserer Partei, um sie zu unterstützen. Auch wenn es mehr sein mag, als er erwartet hatte, könnte seine Wahl zum Staatsoberhaupt eine politisch und pragmatisch starke Entscheidung sein."
 erwache.49.a:0 "Akzeptiere den Sohn der Revolution"
 erwache.49.b:0 "Wir sollten diese Position einem Deutschen geben"
 
 erwache.50.t:0 "Parteichef?"
 erwache.50.d:0 "Unsere Bürokratie nimmt langsam Gestalt an, doch einige Positionen müssen noch besetzt werden. Am wichtigsten ist die Besetzung des Staatsoberhaupts: Für dieses Amt gibt es mehrere plausible Kandidaten, allesamt Veteranen der kommunistischen Organisationen Deutschlands während der Weimarer Republik. Wen sollen wir wählen?"
 erwache.50.a:0 "Der Gemäßigte: Otto Grotewohl"
 erwache.50.b:0 "Der Schlichter: Arthur Ewert"
 erwache.50.c:0 "Die Jugend: Willy Brandt"
 erwache.50.e:0 "Der Veranstalter: Walter Ulbricht"
 erwache.50.f:0 "Der Leiter: Ernst Thälmann"
 
 scientific_giant:0 "Wissenschaftlicher Gigant"
 einstein_returns:0 "Einsteins Rückkehr"
 albert_einstein:0 "Albert Einstein"
 erwache_news.10.t:0 "Einstein kehrt nach Deutschland zurück!"
 erwache_news.10.d:0 "1933 floh der berühmte Physiker Albert Einstein nach der Machtübernahme von [GER.GetLeader] aus seiner Heimat Deutschland. Nach Hitlers Sturz und der Umsetzung neuer Maßnahmen zur Repatriierung der Opfer der Nazi-Unterdrückung hielt es Einstein für angebracht, in sein Heimatland zurückzukehren. Er wird wahrscheinlich zum Aushängeschild eines neuen und fortschrittlicheren Deutschlands werden."
 erwache_news.10.a:0 "Meine Güte!"
 erwache.51.t:0 "Albert Einstein selbst wurde im Rahmen des Rückführungsprogramms gefunden, das zur Förderung von Fachkräften eingerichtet wurde! Dies könnte sicherlich ein Segen für unsere Kampagne sein, da er einer der bekanntesten Wissenschaftler unserer Zeit ist!"
 erwache.51.a:0 "Geben Sie ihm die Überholspur und lassen Sie uns feiern!"
 
 GER_following_nkvd_role:0 "NKWD-Vorbild"
 GER_antisoviet_socialists:0 "Antisowjetische Sozialisten"
 GER_non_soviet_communism:0 "Nichtsowjetische Alternative"
 
 GER_consolidate_the_left_desc:0 "Jetzt, da die Revolution vorbei ist, müssen wir die Richtung des neuen deutschen sozialistischen Staates festlegen und entscheiden, wer uns führen wird."
 GER_proletarian_economy_desc:0 "Kollektivierung und Demokratie am Arbeitsplatz sind zentrale sozialistische Grundsätze, die wir rasch umsetzen müssen, auch wenn sie in den Augen unserer Bevölkerung möglicherweise nicht die beliebtesten politischen Maßnahmen sind."
 GER_lpg_collectivization_desc:0 "Die Idee einer Landwirtschaftlichen Produktionsgenossenschaft ermöglicht es Kleinbauern, Ressourcen zu bündeln und private Unternehmen zu unterhalten, während gleichzeitig die Produktionsmittel vor konsolidierenden und missbräuchlichen Händen geschützt werden."
 GER_mod_mech_auto_desc:0 "Anstelle des sowjetischen Modells des Schwerindustriefortschritts um jeden Preis sollten wir versuchen, die Effizienz unserer Wirtschaft zu verbessern, indem wir Forschung und technologischen Fortschritt priorisieren, um unsere industriellen Fähigkeiten zu optimieren."
 GER_light_industry_desc:0 "Obwohl unsere Schwerindustrie dadurch geopfert wird, werden Investitionen in die Leichtindustrie unsere Bevölkerung glücklicher machen und unsere gesamte Industriekapazität verbessern."
 GER_comintern_economic_hegemony_desc:0 "Die Etablierung einer wirtschaftlichen Vorherrschaft in der Komintern wird uns nahezu uneingeschränkten Zugang zu den Völkern des Ostblocks verschaffen. Dies wird wahrscheinlich auch unsere Schwerindustriekapazitäten und unsere Rüstungsindustrie verbessern, da die Komintern diesen Gütern Priorität einräumt."
 GER_global_trade_hegemony_desc:0 "Durch die Ausweitung unserer Wirtschaftsgrenzen nach Westen haben wir das Potenzial, unsere Leichtindustrie und unsere kommerziellen Kapazitäten weiter auszubauen – auf Kosten unserer Beziehungen zum Rest der Welt."
 GER_nuclear_development_desc:0 "Wenn wir unsere Stellung als Weltmacht wiederherstellen wollen, sollten wir dem Beispiel der USA, der UdSSR und Frankreichs folgen und in unsere nuklearen Kapazitäten investieren."
 GER_join_the_arms_race_desc:0 "Es scheint, als ob die Großmächte der Welt einen Krieg um Einfluss und Machtdemonstration beginnen, bei dem es vor allem um Rüstungstechnologien geht. Wenn wir eine Großmacht werden wollen, müssen auch wir uns an diesem Wettlauf beteiligen."
 GER_nationalize_resource_collection_desc:0 "Durch die Verstaatlichung unserer Rohstoffgewinnungsindustrien sollten wir in der Lage sein, mehr aus ihnen herauszuholen."
 GER_nationalize_heavy_industry_desc:0 "Indem wir die Schwerindustrie unter die Kontrolle des Staates stellen, haben wir das Potenzial, unsere bereits weithin bekannte deutsche Effizienz weiter zu steigern."
 GER_nva_desc:0 "Durch die Gründung der Nationalen Volksarmee werden wir unsere militärische Beteiligung und Wehrpflicht ausweiten und unsere Gesellschaft besser integrieren und der Aussicht auf Krieg gegenüber aufgeschlossener werden."
 GER_grenzer_kompanie_desc:0 "Die Gewährleistung der Sicherheit unserer Grenzen ist ein wesentlicher Bestandteil der nationalen Sicherheit und die Einrichtung eines Elite-Grenzschutzes wird diese Sicherheit gewährleisten."
 GER_elite_grenzerkompanie_desc:0 "Durch die Allgegenwärtigkeit der Grenzerkompanie und die Verbesserung ihrer Ausbildung wird eine Aufklärungstruppe geschaffen, die hinsichtlich Stärke und Leistungsfähigkeit auf dem neuesten Stand ist."
 GER_military_exports_desc:0 "Der weltweite Export unserer Waffen wird unsere Freundschaft nicht nur mit unseren engen kommunistischen Verbündeten stärken, sondern mit jedem Land, das sich zu Handelsbeziehungen verpflichten möchte."
 GER_military_economcs_desc:0 "Die Ausrichtung unserer Wirtschaft auf die Rüstungsproduktion verschafft uns einen Vorteil bei der Ausrüstung und Produktion unseres Militärs und der Verteidigung unseres Landes."
 GER_stasi_desc:0 "Durch die Einrichtung des Staatssicherheitsdienstes, kurz Stasi, soll die Sicherheit des Staates verbessert und ausländischen Interventionsversuchen ein Ende gesetzt werden."
 GER_expand_hva_desc:0 "Der HVA ist unser Auslandsgeheimdienst, der auf Aufklärung außerhalb unseres Landes und die Durchsetzung unserer Interessen im Ausland spezialisiert ist."
 
