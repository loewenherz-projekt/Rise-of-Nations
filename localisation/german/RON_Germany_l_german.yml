 ### B - SOV - Surrender event (when have Ural)
 umc_ger.460.t:0 "Lebensraum erreicht"
 umc_ger.460.d:0 "Wir sind siegreich... aber um welchen Preis?\n\nUnsere Wehrmacht erreichte mit den letzten Kräften endlich den Ural. Und nach tagelangen Kämpfen kämpften sich unsere Soldaten bis in den Osten - nach Asien - vor. Hinter ihnen... nur Tote, Freund wie Feind. Vor ihnen... nichts als weitere Wüste.\n\nTrotzdem ist es ein Sieg. Ganz Deutschland jubelt, ohne die müden Gesichter der blutenden deutschen Jugend im Osten zu sehen. Die größte Rede aller Zeiten hielt unser Führer [GER.GetLeader] in Nürnberg, in der er die totale Vernichtung der Bolschewiken, des schlimmsten Feindes des neuen Deutschlands, ankündigte.\n\nDie Führungsriege der NSDAP weiß jedoch, dass das nicht die ganze Wahrheit ist. Die Bolschewiken stehen noch immer in Asien. Obwohl Heinrich Himmler in den geheimen Posener Reden vom Uralgebirge als der Ostgrenze des Großdeutschen Reiches sprach, wo sich die germanische Rasse allmählich bis zu dieser Ostgrenze ausbreiten würde, sodass das deutsche Herrenvolk als führendes Volk Europas in einigen Generationen bereit wäre, „die Schicksalskämpfe gegen Asien wieder aufzunehmen“, die „mit Sicherheit wieder ausbrechen“ würden, gibt es bereits starke Stimmen, die vorschlagen, dass wir den Kampf sofort fortsetzen und uns jetzt und für immer mit dieser Bedrohung auseinandersetzen sollten.\n\nDies wird durch die Überzeugung von [GER.GetLeader] unterstützt, in der er das Gebirge als angemessene Grenze ablehnt und es absurd nennt, dass „diese mittelgroßen Gebirge“ die Grenze zwischen der „europäischen und der asiatischen Welt“ darstellten. Er erklärte weiter, dass nur eine „lebende Rassenmauer“ aus arischen Kämpfern als Grenze in Frage käme und dass im Osten ein permanenter Kriegszustand aufrechterhalten werden müsse, um „die Vitalität der Rasse zu bewahren“.\n\nDie Entscheidung ist schwer … und die Zahl der schweren Entscheidungen, die das deutsche Volk ertragen kann, nimmt mit jedem weiteren Kriegsmonat ab."
 umc_ger.460.a:0 "Von Berlin bis zum Uralgebirge erstreckt sich das Gebiet des neuen Großgermanischen Reiches. Nicht weiter."
 umc_ger.460.a_EXPL:0 "Gewinnen Sie das gesamte ehemalige Gebiet von [SOV.GetFlag]§H[SOV.GetName]§! in Europa, einschließlich des Uralgebirges."
 umc_ger.460.b:0 "Wir müssen die Bolschewiki bis nach Sibirien zurückdrängen!"
 umc_ger.460.b_EXPL:0 "Dieser Nationalgeist wird §GRemoved§! sein, wenn wir nicht mit [SOV.GetFlag]§H[SOV.GetName]§! im §RWar§! sind."
 
 umc_ger.461.t:0 "Niederlage in Europa"
 umc_ger.461.d:0 ""
 umc_ger.461.a:0 "Wir müssen uns jetzt neu organisieren, wieder aufbauen und überleben."
 
