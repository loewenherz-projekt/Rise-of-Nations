 umc_gmo.80:0 "Aufgedeckte Nazi-Pläne"
 umc_gmo.80.t:0 "Aufgedeckte Nazi-Pläne"
 umc_gmo.80.d:0 "Heute Morgen traf ein deutscher Gesandter mit Kopien der Nazi-Kriegspläne in unserer Hauptstadt ein. Diese enthalten nicht nur Pläne für Angriffe auf europäische Länder, sondern auch Pläne für grausame Aktionen gegen andere Rassen, um die Idee des abgesetzten Führers von einer rein arischen Rasse zu fördern. Darüber hinaus finden sich dort Notizen zu Plänen zur Bevölkerungsumsiedlung und zur schrittweisen Germanisierung eroberter Gebiete."
 umc_gmo.80.a:0 "Gott sei Dank hat es gut geklappt."
 umc_gmo.80.b:0 "Das ist nur ihre Sache."
 
 
 
 ##### Marriage
 umc_gmo.100:0 "Habsburg-Hohenzollern-Ehe"
 umc_gmo.100.t:0 "Habsburg-Hohenzollern-Ehe"
 umc_gmo.100.d:0 "Nach dem Weltkrieg hätte niemand geglaubt, dass irgendein Staat in Europa wieder von den alten Monarchen regiert werden würde.\n\nDoch die neuen Zeiten bergen neue Chancen. Mit der Rückkehr des Kaisers an die Macht und der Zustimmung Ottos von Habsburgs haben wir nun die Möglichkeit, eine Heirat zwischen unseren beiden, nicht immer freundlich gesinnten Familien zu arrangieren.\n\nEin Erfolg würde einen wachsenden Einfluss in der Tschechoslowakei und Ungarn, den ehemaligen Habsburgerstaaten, sowie im Rest Europas garantieren. Andere Nationen würden dies jedoch sicherlich als Bedrohung ihrer Vormachtstellung betrachten...\nDaher sollten wir es uns zweimal überlegen, bevor wir einem solch großartigen Ereignis zustimmen, da es uns mehr Feinde als Freunde bescheren könnte."
 umc_gmo.100.a:0 "Arrangieren Sie die Hochzeit!"
 umc_gmo.100.b:0 "Wenn ich es mir recht überlege, ist das keine gute Idee."
 GMO_Marriage_days_EXPL:0 "Nach §H15§! Tagen:\n"
 
 umc_gmo.101:0 "Proteste der Monarchisten"
 umc_gmo.101.t:0 "Proteste der Monarchisten"
 umc_gmo.101.d:0 "In den Tagen der Vorbereitung der kaiserlichen Hochzeit verlangten einige der ehrenwerten Mitglieder des Preußischen Kelches Audienzen beim Kaiser.\n\nMit der Begründung, dass das Deutsche Reich und Österreich-Ungarn in der Geschichte um Einfluss konkurrierten und sogar gegeneinander kämpften, ist diese Heirat zwischen einem Hohenzollern und einem Habsburger eine Beleidigung für alles deutsche Blut, das in der Vergangenheit vergossen wurde.\n\nLetztendlich brachte ihre Anwesenheit nur eines: Weiteres Unrecht, das in Zukunft korrigiert werden muss."
 umc_gmo.101.a:0 "Sie kennen ihren Platz."
 
 umc_gmo.102:0 "Mackensen geht in den Ruhestand"
 umc_gmo.102.t:0 "Mackensen geht in den Ruhestand"
 umc_gmo.102.d:0 "In den Tagen der Vorbereitungen zur kaiserlichen Hochzeit verlangte August von Mackensen, Held des Weltkrieges und Wiedereroberer des Deutschen Reiches, eine Audienz beim Kaiser.\n\nEr erklärte, dass das Deutsche Reich und Österreich-Ungarn in der Geschichte um Einfluss konkurrierten und sogar gegeneinander kämpften. Diese Heirat zwischen einem Hohenzollern und einem Habsburger sei eine Beleidigung für alles deutsche Blut, das in der Vergangenheit vergossen wurde.\n\nAm Ende des Tages entschied er sich nach einem langen Streit zwischen ihm und dem Kaiser, von seinem Feldmarschallsamt zurückzutreten."
 umc_gmo.102.a:0 "Er kann in Abgeschiedenheit leben, während wir Geschichte schreiben."
 
 umc_gmo.103:0 "Zwei Häuser in einem vereint"
 umc_gmo.103.t:0 "Zwei Häuser in einem vereint"
 umc_gmo.103.d:0 "Heute kommt die Sonne heraus und erhellt einen der größten Momente der modernen Geschichte. Zwei Häuser, das Haus Hohenzollern und das Haus Habsburg, werden vereint. Trotz einiger Einwände und Proteste wird die Kaiserhochzeit fortgesetzt.\n\nTausende Menschen versammelten sich auf dem Berliner Marktplatz, bereit, dem Brautpaar ihre Bräute zu übergeben und der majestätischen Militärparade beizuwohnen, die der Hochzeit vorausging. Hunderte von Panzern, Fahrzeugen und Flugzeugen waren an diesem Tag zu sehen und demonstrierten den technologischen Fortschritt des Kaiserreichs.\n\nDoch sobald die Kutsche des Brautpaares hinter der marschierenden Soldatenkolonne auftauchte, richteten sich alle Blicke auf sie. Victoria, die in ihrem altmodischen, wunderschönen weiß-blauen Kleid dasaß, erinnerte sicherlich alle an den Stolz und Ruhm, den das Deutsche Reich vor dem Weltkrieg erlangt hatte. Otto, der eine klassische Militärtruppe mit einem gebogenen Schwert am Gürtel trug, erinnerte an das Bündnis mit unseren südöstlichen Nachbarn. Ein zerbrochenes Bündnis, das vielleicht wieder geschmiedet werden könnte.\n\nAn der gesamten Veranstaltung nahm der Kaiser selbst sowie wichtige Persönlichkeiten der deutschen Führung teil. Auch Vertreter ausländischer Mächte, darunter Engländer, Franzosen und andere, beobachteten die Hochzeitszeremonie mit einer gewissen Unsicherheit, Verachtung und Angst.\n\nNach einer langen und ehrwürdigen Zeremonie begaben sich die Frischvermählten zu einem Hochzeitsempfang, begleitet von stürmischem Applaus. Und ganz Europa begab sich auf den Weg einer neuen Geschichte..."
 umc_gmo.103.a:0 "Jetzt nehmen wir uns, was uns rechtmäßig zusteht."
 
