 ### RIBBENTROP-OSHIMA PACT
 GER_ribbentrop_oshima_pact_cat:0 "Ribbentrop-Ōshima-Pakt"
 GER_ribbentrop_oshima_pact_cat_desc:0 "Der Ribbentrop-Ōshima-Pakt wurde erfolgreich ausgehandelt, unter der Bedingung, dass die japanische Kwantung-Armee zusätzliche Ausrüstung erhält, um ihre Kampfkraft gegen sowjetische Truppen zu erhöhen. Artillerie, Panzer, Flugzeuge – all das muss so schnell wie möglich geliefert werden, wenn der Überraschungsangriff an der Fernostfront möglich sein soll.\n\nWir haben ([?GER.GER_rop_completed_var|+0]) von (§H[?GER.GER_rop_wanted_var|0]§!) der gewünschten Ausrüstungslieferungen bereitgestellt."
 GER_rop_add_to_completed_one_var:0 "\nWenn Sie dies auswählen, wird Ihr [JAP.GetFlag]§HJapanese Support§!-Versprechen (§G1§!) erfüllt.\n"
 GER_rop_add_to_completed_two_var:0 "\nWenn Sie dies auswählen, werden die Punkte Ihrer [JAP.GetFlag]§HJapanese Support§!-Verpflichtung §HMeet§! (§G2§!) erfüllt.\n"
 
