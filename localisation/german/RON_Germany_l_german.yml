 ### Plan Z - going bad
 umc_ger.165.t:0 "Geplante Plan Z-Fortschrittskontrolle"
 umc_ger.165.d:0 "Heute Morgen versammelte sich eine große Gruppe von NSDAP-Funktionären im Hamburger Hafen, um den Baufortschritt der neuen modernen Schiffe zu überwachen, die im Rahmen des Schiffbauprogramms „Plan Z“ gebaut werden.\n\nSie besichtigten die Rümpfe eines großen Schlachtschiffs, das mit leistungsstarken Kanonen bestückt wird, kleinere Kreuzer mit modernster Radartechnologie und mechanischen Zielfernrohren an Bord sowie die Ausbildung des Personals der Kriegsmarine.\n\nAm nächsten Tag forderten sie vollständige Aufzeichnungen und Statistiken über den laufenden Bau an. Der Großadmiral erwartete, dass in den ersten zwei Jahren mindestens ein Viertel der Schiffe fertiggestellt sein würde. Eine Erwartung, die nicht einmal annähernd erfüllt wurde.\n\nWie erwartet war der Führer verärgert und forderte umgehend die Suspendierung des Führungsstabs für Plan Z. Darüber hinaus waren auch negative Reaktionen aus der Bevölkerung zu vernehmen, die das Vertrauen in die insgesamt perfekte Lage im Reich minderten."
 umc_ger.165.a:0 "Schade."
 
