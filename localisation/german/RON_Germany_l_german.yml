 umc_ger.270.b:0 "Wir müssen unseren eigenen Staat sichern."
 
 umc_ger.271.t:0 "Anschluss Österreichs"
 umc_ger.271.d:0 "Die Idee eines Anschlusses – eines vereinten Österreichs und Deutschlands, das ein „Großdeutschland“ bilden würde – entstand, nachdem Österreich und die Deutschösterreicher 1871 durch die deutsche Wiedervereinigung aus dem preußisch dominierten Deutschen Reich ausgeschlossen wurden. Nach dem Ende des Ersten Weltkriegs und dem Zerfall der österreichisch-ungarischen Monarchie im Jahr 1918 versuchte die neu gegründete Republik Deutschösterreich eine Union mit Deutschland zu bilden. Der Vertrag von Saint-Germain (10. September 1919) und der Vertrag von Versailles (28. Juni 1919) untersagten jedoch sowohl den Anschluss als auch die weitere Verwendung des Namens Deutschösterreich und entzogen Österreich einige seiner Gebiete, wie das Sudetenland.\n\nHeute, weniger als 20 Jahre später, sind die Westler einfach nicht in der Lage, die Verwirklichung unseres Traums von Großdeutschland zu verhindern. Das österreichische Volk sehnt sich nach der Einheit mit dem Reich, und so schlossen wir uns zusammen. Das Deutsche Reich ist nicht länger bereit, die Unterdrückung von zehn Millionen Deutschen an seinen Grenzen zu dulden.\n\nAuf direkten Befehl von oben überquerte die Wehrmacht die Grenze nach Österreich. Die Truppen wurden von jubelnden Österreichern mit Nazigrüßen, Nazifahnen und Blumen begrüßt. Obwohl die Invasionstruppen schlecht organisiert und die Einheiten schlecht koordiniert waren, spielte dies kaum eine Rolle, da die österreichische Regierung dem österreichischen Bundesheer befohlen hatte, keinen Widerstand zu leisten.\n\nAm Nachmittag überquerte Hitler mit einer 4.000 Mann starken Leibwache im Auto die Grenze zu seinem Geburtsort Braunau am Inn. Am Abend traf er in Linz ein und wurde begeistert empfangen. Kurz darauf verkündete Seyß-Inquart die Aufhebung von Artikel 88 des Vertrags von Saint-Germain."
 umc_ger.271.a:0 "Unsere Länder sind vereint."
 
 umc_ger.272.t:0 "Anschluss abgelehnt"
 umc_ger.272.d:0 ""
 umc_ger.272.a:0 "Die Menschen lassen sich nicht zum Schweigen bringen."
 
 umc_ger.273.t:0 "[GER.GetName] vereinigt sich mit Österreich"
 umc_ger.273.d:0 ""
 umc_ger.273.a:0 "Die Schleife zieht sich zu."
 
 
 
 ### RHINELAND
 umc_ger.290.t:0 "Die Remilitarisierung des Rheinlandes"
 umc_ger.290.d:0 "Gemäß den Artikeln 42, 43 und 44 des Versailler Vertrags von 1919 – der Deutschland nach dem Ersten Weltkrieg von den Alliierten auferlegt wurde – war es Deutschland verboten, „weder links noch rechts des Rheins westlich einer 50 Kilometer östlich des Rheins gezogenen Linie Befestigungen zu unterhalten oder zu errichten“. Jeder Verstoß gegen diesen Artikel, gleich welcher Art, „wird als feindselige Handlung angesehen … und als geeignet, den Weltfrieden zu stören“.\n\nDie im Oktober 1925 von Deutschland, Frankreich, Italien und Großbritannien unterzeichneten Verträge von Locarno besagten, dass das Rheinland seinen entmilitarisierten Status dauerhaft behalten sollte.\n\nNun drangen plötzlich neunzehn deutsche Infanteriebataillone und eine Handvoll Flugzeuge in das Rheinland ein. Sie erreichten den Rhein um 11:00 Uhr, und drei Bataillone setzten anschließend an das Westufer des Rheins über. Zur gleichen Zeit bestellte Baron von Neurath den italienischen Botschafter Baron Bernardo Attolico, den britischen Botschafter Sir Eric Phipps und den französischen Botschafter André François-Poncet in die Wilhelmstraße ein, um ihnen Notizen zu überreichen, in denen wir beschuldigt wurden, durch die Ratifizierung des französisch-sowjetischen Pakts gegen Locarno verstoßen zu haben. Außerdem wurde verkündet, dass Deutschland sich daher entschlossen habe, auf Locarno zu verzichten und das Rheinland wieder zu militarisieren."
 umc_ger.290.a:0 "Sie müssen den Vertrag von Versailles einhalten!"
 umc_ger.290.b:0 "Schließlich ist es ihr Territorium. Wir haben hier genug Probleme."
 GER_FRA_has_dg_will_lead_to_cw_EXPL:0 "Wir haben immer noch einen Nationalgeist, der von einer uneinheitlichen Regierung geprägt ist. Wenn der Krieg ausbricht, werden wir einen Bürgerkrieg erleben.\n"
 
 umc_ger.291.t:0 "Die Remilitarisierung des Rheinlandes"
 umc_ger.291.d:0 "Mehrere deutsche Divisionen sind kürzlich ins Rheinland vorgedrungen. Damit sind erstmals seit dem Ende des Ersten Weltkriegs deutsche Truppen westlich des Rheins stationiert. Dies stellt einen klaren Verstoß gegen den Versailler Vertrag dar, der Deutschland die Militarisierung der Region untersagt!\n\nDie Franzosen mobilisieren ihre Truppen und scheinen ein Ultimatum stellen zu wollen. Sollte Deutschland sich weigern, sind sie bereit, in Deutschland einzumarschieren, um dieser Bedrohung zu begegnen. Die britische Bevölkerung ist gegen einen Krieg, doch wenn wir uns weigern, den Franzosen beizustehen, wird unser Bündnis mit ihnen aufgelöst."
 umc_ger.291.a:0 "Wir werden unsere Jungs nicht noch einmal zum Sterben nach Europa schicken."
 umc_ger.291.b:0 "Wir stehen an der Seite unserer Verbündeten."
 
 umc_ger.292.t:0 "Großbritannien stimmt der Durchsetzung des Versailler Vertrags zu"
 umc_ger.292.d:0 "Obwohl die Unterstützung der britischen Bevölkerung für einen Krieg gering ist, hat die britische Regierung die Bedrohung durch die Deutschen erkannt und uns ihre volle Unterstützung zugesagt. Wir werden Deutschland ein letztes Ultimatum zum Rückzug aus der entmilitarisierten Zone stellen. Sollte Deutschland sich weigern, ist es Zeit für unsere Truppen, tief in Deutschland einzudringen und seinem tyrannischen Regime ein Ende zu setzen!"
 umc_ger.292.a:0 "Stellen Sie das Ultimatum."
 
 umc_ger.293.t:0 "Frankreich und Großbritannien erzwingen die Entmilitarisierung"
 umc_ger.293.d:0 "Die Briten und Franzosen haben sich geweigert, die Remilitarisierung des Rheinlandes zu akzeptieren, da sie sie als „unverzeihlichen Bruch“ des Versailler Vertrags bezeichnen. Sie mobilisieren ihre Streitkräfte gegen uns und haben ein Ultimatum gestellt: Unsere Truppen müssen sich sofort zurückziehen und das Rheinland entmilitarisiert bleiben, andernfalls befinden sich unsere Länder im Krieg."
 umc_ger.293.a:0 "Es ist unser Land."
 umc_ger.293.b:0 "Wir sind auf diese Konfrontation nicht vorbereitet. Wir müssen zurückweichen."
 
 umc_ger.294.t:0 "Deutschland lehnt unsere Forderungen nach Entmilitarisierung ab"
 umc_ger.294.d:0 ""
 umc_ger.294.a:0 "Wir werden sie dazu bringen, zuzustimmen."
 
 umc_ger.295.t:0 "[GER.GetName] Rückendeckung und Entmilitarisierung des Rheinlandes"
 umc_ger.295.d:0 ""
 umc_ger.295.a:0 "Im Moment herrscht Frieden."
 
 umc_ger.296.t:0 "Großbritannien weigert sich, den Versailler Vertrag durchzusetzen"
 umc_ger.296.d:0 "Die Briten weigern sich, uns im Kampf gegen Deutschland zu unterstützen, und behaupten, die Deutschen würden „nur in ihrem eigenen Hinterhof“ agieren. Sollten wir gegen sie in den Krieg ziehen, wären wir auf uns allein gestellt. Die öffentliche Meinung in Frankreich ist gegen einen Krieg, doch Deutschland würde nur stärker werden, und die Remilitarisierung des Rheinlandes stellt eine direkte Bedrohung unserer Grenzen dar. Ein Ultimatum wäre ohne Großbritannien an unserer Seite weniger bedrohlich. Sollten wir allein gegen sie vorgehen?"
 umc_ger.296.a:0 "Jetzt muss man sich um Deutschland kümmern."
 umc_ger.296.b:0 "Ohne die Briten müssen wir zurückweichen."
 
 umc_ger.297.t:0 "[FRA.GetName] Erzwingt die Demilitarisierung"
 umc_ger.297.d:0 "Die Briten haben Einsicht gezeigt und die Remilitarisierung des Rheinlandes akzeptiert, doch die wütenden Franzosen weigern sich, nachzugeben! Sie behaupten, dieser Vorfall stelle eine direkte Bedrohung für die Sicherheit ihres Landes dar, mobilisieren ihre Streitkräfte und könnten jeden Moment über die Grenze einmarschieren! Wir befinden uns im Krieg!"
 umc_ger.297.a:0 "Auch ohne ihre britischen Verbündeten können wir uns durchsetzen."
 umc_ger.297.b:0 "Wir sind auf diese Konfrontation nicht vorbereitet. Wir müssen zurückweichen."
 
 umc_ger.298.t:0 "Die Remilitarisierung des Rheinlandes"
 umc_ger.298.d:0 "Gemäß den Artikeln 42, 43 und 44 des Versailler Vertrags von 1919 – der Deutschland nach dem Ersten Weltkrieg von den Alliierten auferlegt wurde – war es Deutschland verboten, „weder links noch rechts des Rheins westlich einer 50 Kilometer östlich des Rheins gezogenen Linie Befestigungen zu unterhalten oder zu errichten“. Jeder Verstoß gegen diesen Artikel, gleich welcher Art, „wird als feindselige Handlung angesehen … und als geeignet, den Weltfrieden zu stören“.\n\nDie im Oktober 1925 von Deutschland, Frankreich, Italien und Großbritannien unterzeichneten Verträge von Locarno besagten, dass das Rheinland seinen entmilitarisierten Status dauerhaft behalten sollte.\n\nNun drangen plötzlich neunzehn deutsche Infanteriebataillone und eine Handvoll Flugzeuge in das Rheinland ein. Sie erreichten den Rhein um 11:00 Uhr, und drei Bataillone setzten anschließend an das Westufer des Rheins über. Zur gleichen Zeit bestellte Baron von Neurath den italienischen Botschafter Baron Bernardo Attolico, unseren Botschafter Sir Eric Phipps und den französischen Botschafter André François-Poncet in die Wilhelmstraße ein, um ihnen Notizen zu überreichen, in denen wir beschuldigt wurden, durch die Ratifizierung des französisch-sowjetischen Pakts gegen Locarno verstoßen zu haben. Außerdem wurde verkündet, dass Deutschland sich daher entschlossen habe, auf Locarno zu verzichten und das Rheinland zu remilitarisieren.\n\nDie Franzosen scheinen sich damit zufrieden zu geben, ihre Reaktion auf diesen Verstoß auf diplomatische Einwände zu beschränken, da die öffentliche Meinung in Großbritannien entschieden gegen einen Krieg ist."
 umc_ger.298.a:0 "Auch wir werden Widerspruch einlegen."
 umc_ger.298.b:0 "Sie haben Recht, Frankreich sollte sich niemals mit den Sowjets verbünden.“"
 
 umc_ger.299.t:0 "Die Remilitarisierung des Rheinlandes"
 umc_ger.299.d:0 "Während der sorgfältig vorbereiteten Operation drangen neunzehn deutsche Infanteriebataillone und eine Handvoll Flugzeuge ins Rheinland ein. Sie erreichten den Rhein um 11:00 Uhr, und drei Bataillone setzten anschließend an das Westufer des Rheins über. Gleichzeitig bestellte Baron von Neurath den italienischen Botschafter Baron Bernardo Attolico, den britischen Botschafter Sir Eric Phipps und unseren Botschafter André François-Poncet in die Wilhelmstraße ein, um ihnen Notizen zu überreichen, in denen wir beschuldigt wurden, durch die Ratifizierung des französisch-sowjetischen Pakts gegen Locarno verstoßen zu haben. Außerdem wurde bekannt gegeben, dass Deutschland beschlossen habe, Locarno aufzugeben und das Rheinland zu remilitarisieren.\n\nDa es außer geringfügigen Einwänden gegen die Remilitarisierung keine weiteren Maßnahmen gab, waren unsere Truppen keiner Gefahr ausgesetzt. Als die deutschen Truppen in Köln einmarschierten, bildete sich spontan eine riesige jubelnde Menge, um die Soldaten zu begrüßen. Sie warfen Blumen auf die Wehrmacht, während katholische Priester den Soldaten ihren Segen gaben.\n\nSpäter am selben Tag verkündete [GER.GetLeader] vor dem Reichstag die Remilitarisierung des Rheinlandes. Um die Kriegsgefahr zu mindern, bot Hitler an, dem Völkerbund wieder beizutreten, einen Luftpakt zu unterzeichnen, der Bombenangriffe als Kriegsmethode ächtete, sowie einen Nichtangriffspakt mit Frankreich, falls die anderen Mächte der Remilitarisierung zustimmten. In seiner Ansprache vor dem Reichstag verurteilte Hitler zunächst ausführlich den Versailler Vertrag als unfair gegenüber Deutschland, behauptete, er sei ein Mann des Friedens, der mit niemandem Krieg wolle, und argumentierte, er strebe lediglich Gleichheit für Deutschland an, indem er den unfairen Versailler Vertrag friedlich aufhebe."
 umc_ger.299.a:0 "Erster Schritt zur Größe."
 
 ### QUESTION OF POLAND
 umc_ger.300.t:0 "Die Frage des polnischen Territoriums"
 umc_ger.300.d:0 "Die Gebiete, die wir nach dem Weltkrieg durch den Versailler Vertrag an Polen verloren, sind uns schon lange ein Dorn im Auge. Das umstrittenste Gebiet liegt um die Stadt Danzig, wo bis heute mehr Deutsche als Polen leben. Obwohl wir am 26. Januar 1934 den deutsch-polnischen Nichtangriffspakt unterzeichneten, in dem wir und Polen uns verpflichteten, unsere Probleme durch bilaterale Verhandlungen zu lösen und für einen Zeitraum von zehn Jahren auf bewaffnete Konflikte zu verzichten, war dies größtenteils nur ein Versuch, Polens Beziehungen zu seinen anderen Verbündeten – vor allem zu Frankreich – zu verschlechtern. Kürzlich jedoch zog sich unser Führer [GER.GetLeader] einseitig sowohl aus dem deutsch-polnischen Nichtangriffspakt von 1934 als auch aus dem deutsch-englischen Flottenabkommen von 1935 zurück. Die Gespräche über Danzig und den Korridor scheiterten und Monate vergingen ohne diplomatische Interaktion zwischen Deutschland und Polen. Doch es ist Zeit zu handeln. Die Verhandlungen eröffnen viele Möglichkeiten – allerdings nur, wenn es überhaupt Verhandlungen gibt. Die Schutzstaffel hat eine Operation unter falscher Flagge vorbereitet, die mit etwa zwei Dutzend ähnlicher deutscher Vorfälle kurz vor dem vollständigen Einmarsch in Polen inszeniert werden kann. Dies könnte uns einen Vorwand liefern – auch wenn es unglaublich klingen mag. Denn wie der Führer sagte: „Wenn man eine Lüge nur groß genug und oft genug erzählt, wird man sie glauben.“"
 umc_ger.300.a:0 "Fordern Sie die sofortige Ankunft eines polnischen Diplomaten in Berlin, um das Schicksal Danzigs zu besprechen."
 umc_ger.300.a_EXPL:0 "Wenn sie unsere Forderungen §Gakzeptieren§!, können wir:\n Die Rückgabe von §HDanzig§! fordern.\n Die Wiederherstellung der §HPrenzen vor dem Krieg§! fordern.\n Die Wiederherstellung der §HPrenzen vor dem Krieg§! und die Form eines §HAntisowjetischen Verteidigungspakts§! fordern.\n [SOV.GetFlag]§H[SOV.GetName]§! zu den Verhandlungen einladen und versuchen, [POL.GetFlag]§H[POL.GetName]§! zu §HSplitting§!"
 umc_ger.300.b:0 "Nutzen Sie die Vermittlung der Alliierten, um die Rückgabe Danzigs zu erreichen."
 umc_ger.300.b_EXPL1:0 "[ENG.GetFlag]§H[ENG.GetName]§! und [FRA.GetFlag]§H[FRA.GetName]§! werden über das Schicksal der §HTerritorien§! entscheiden, die wir durch den Vertrag von Versailles verloren haben.\nWenn sie und [POL.GetFlag]§H[POL.GetName]§! sich §GGeeinigt§!, die §HLoten Gebiete§! an uns zu übergeben, wird das Ereignis die folgenden §GEffects§! haben:\n"
 umc_ger.300.b_EXPL2:0 "[ENG.GetFlag]§H[ENG.GetName]§! wird über das Schicksal des §HTerritoriums§! entscheiden, das wir durch den Vertrag von Versailles verloren haben.\nWenn sie und [POL.GetFlag]§H[POL.GetName]§! sich §GGeeinigt§!, uns die §HLoten Gebiete§! zu überlassen, wird das Ereignis die folgenden §GEffects§! haben:\n"
 umc_ger.300.b_EXPL2:0 "[FRA.GetFlag]§H[FRA.GetName]§! wird über das Schicksal des §HTerritoriums§! entscheiden, das wir durch den Vertrag von Versailles verloren haben.\nWenn sie und [POL.GetFlag]§H[POL.GetName]§! sich §GGeeinigt§!, uns die §HLoten Gebiete§! zuzuteilen, wird das Ereignis die folgenden §GEffects§! haben:\n"
 umc_ger.300.c:0 "Führen Sie die Operation Himmler durch und geben Sie Polen die Schuld für die Aggression."
 umc_ger.300.e:0 "Es gibt keinen vernünftigen Ausweg aus dieser Situation."
 
 umc_ger.301.t:0 "[GER.GetName] fordert die sofortige Ankunft unseres Botschafters in Berlin"
 umc_ger.301.d:0 "Die Gebiete, die Deutschland nach dem Weltkrieg durch den Versailler Vertrag an unsere neue Nation verlor, sind ihnen schon lange ein Dorn im Auge. Das umstrittenste Gebiet liegt um die Stadt Danzig, wo bis heute mehr deutsche als polnische Einwohner leben.\n\nObwohl wir am 26. Januar 1934 den deutsch-polnischen Nichtangriffspakt unterzeichneten, in dem wir und das Deutsche Reich uns verpflichteten, unsere Probleme durch bilaterale Verhandlungen zu lösen und für einen Zeitraum von 10 Jahren auf bewaffnete Konflikte zu verzichten, scheint es, dass dies nur ein Versuch war, Zeit für [GER.GetLeader] und seine Expansionspläne zu gewinnen, da unsere Botschafter gestern nach Berlin zitiert wurden, um die Frage der deutschen Bevölkerung in Polen zu besprechen. Sie sagen, der Botschafter müsse „ermächtigt“ sein, „jedes Abkommen zu unterzeichnen“..\n\nSollten wir dieses Angebot annehmen, wären wir bei den Verhandlungen völlig allein, da keiner unserer Verbündeten eingreifen und politische Unterstützung leisten könnte."
 umc_ger.301.a:0 "Wir müssen hoffen, dass diese Situation friedlich besprochen werden kann."
 umc_ger.301.b:0 "Dieses Ultimatum ist eine Beleidigung für unser Land."
 
 umc_ger.302.t:0 "Polnische Diplomaten lehnen Verhandlungen ab"
 umc_ger.302.d:0 "Der Botschafter von [POL.GetLeader] spürt die Gefahr, an einem Ort ohne Entkommen gefangen zu sein und lehnt unsere Forderungen nach seiner Ankunft in Berlin höflich ab, da es dort „kalt sei und eine schnelle Reise nicht möglich sei“. \n\nJoachim von Ribbentrop ist verärgert und sendet seinem polnischen Amtskollegen umgehend eine Drohbotschaft, in der er sagt, dass man das Schicksal des deutschen Volkes in Polen nicht auf die leichte Schulter nehmen werde und andere Wege gefunden würden, um das deutsche Ziel zu erreichen."
 umc_ger.302.a:0 "Dann müssen wir einen anderen Ansatz finden."
 
 umc_ger.303.t:0 "Polnische Diplomaten kommen nach Berlin"
 umc_ger.303.d:0 "Da sie erkannten, dass sie ihr Schicksal am besten selbst in die Hand nehmen würden, trafen die von [POL.GetLeader] entsandten polnischen Botschafter nur wenige Stunden nach der offiziellen Forderung in Berlin ein. Er wurde von seinem Amtskollegen Joachim von Ribbentrop begrüßt, der ihn dann zum Treffpunkt führte.\n\nDer polnische Botschafter Lipski teilte Ribbentrop mit, dass Polen Verhandlungen zumindest hinsichtlich der Stadt Danzig positiv gegenüberstehe."
 umc_ger.303.a:0 "Die Rückgabe der Stadt Danzig reicht aus, um den Frieden zu wahren."
 umc_ger.303.b:0 "Alle Gebiete, die rechtmäßig deutsch sind, müssen vom Reich wieder annektiert werden."
 umc_ger.303.c:0 "Nicht nur das Territorium, sondern auch Polen selbst muss sich uns anschließen, um der sowjetischen Bedrohung entgegenzutreten."
 umc_ger.303.e:0 "Laden Sie Molotow zu den Verhandlungen ein und bereiten Sie die Übergabe des Ultimatums vor."
 umc_ger.303.e_EXPL:0 "Wir werden [POL.GetFlag]§H[POL.GetName]§! ein §HUltimatum§! senden. Wenn sie unsere Forderungen §Gakzeptieren§!, werden wir ihr Land mit den [SOV.GetFlag]§H[SOV.GetName]§! gemäß dem §HMolotow-Ribbentrop-Vertrag§! teilen.\n"
 
 umc_ger.304.t:0 "[GER.GetName] fordert die Rückgabe von Danzig"
 umc_ger.304.d:0 "Während der Verhandlungen unseres Botschafters mit seinem deutschen Amtskollegen erhielt er einen 16 Punkte umfassenden deutschen Vorschlag. Die meisten Punkte betreffen die Freie Stadt Danzig, die wieder unter die Kontrolle von [GER.GetName] gestellt werden soll. Außerdem muss deutschen Truppen und Nachschub der Durchzug durch den Polnischen Korridor ermöglicht werden, um eine ordnungsgemäße Landverbindung zwischen Deutschland und Königsberg zu gewährleisten.\n\nViele argumentieren, dies sei ein diplomatischer Sieg für Polen, da wir [GER.GetLeader]s Ambitionen auf Danzig beschränken konnten, was ein geringer Preis dafür ist, die Deutschen aus unserem Land fernzuhalten. Außerdem könnte uns eine Beschwichtigung jetzt einen Verbündeten gegen eine mögliche sowjetische Invasion in der Zukunft sichern."
 umc_ger.304.a:0 "Ein kleiner Preis dafür, die Deutschen aus unserem Land fernzuhalten."
 umc_ger.304.b:0 "Danzig bleibt polnisch!"
 
 umc_ger.305.t:0 "[POL.GetName] Transfers Danzig"
 umc_ger.305.d:0 "Nach langwierigen Verhandlungen gab der polnische Botschafter schließlich nach und stimmte dem Vorschlag zu. Damit haben wir die Stadt Danzig unter unsere Kontrolle gebracht und uns den militärischen Zugang durch den Polnischen Korridor gesichert.\n\nNach der Unterzeichnung des Abkommens ordnete [GER.GetLeader] umgehend eine Großveranstaltung im Sportpalast an, bei der er stolz verkündete, dass ein weiteres Gebiet mit deutscher Bevölkerung wieder dem Reich angegliedert wurde. Unter lautem Jubel des deutschen Volkes und der Parteiführer fuhr er fort, dass seine Bemühungen nicht enden würden, bis der letzte Deutsche im Großdeutschen Reich lebe."
 umc_ger.305.a:0 "Heim ins Reich."
 
 umc_ger.306.t:0 "[POL.GetName] weigert sich, Danzig aufzugeben"
 umc_ger.306.d:0 ""
 umc_ger.306.a:0 "Dann müssen wir eine andere Lösung finden."
 
 umc_ger.307.t:0 "[GER.GetName] fordert Wiederherstellung der Vorkriegsgrenzen"
 umc_ger.307.d:0 "Während der Verhandlungen unseres Botschafters mit seinem deutschen Amtskollegen erhielt er einen 32 Punkte umfassenden deutschen Vorschlag. Die meisten Punkte betreffen die durch den Versailler Vertrag verlorenen deutschen Gebiete, die vor dem Zweiten Weltkrieg unter die Kontrolle von [GER.GetName] gestellt werden sollen.\n\nDies sind hohe Anforderungen an unser Land, da bereits viele Polen in diesen Gebieten leben. Sollte Deutschland die Kontrolle über diese Gebiete erlangen, muss eine allgemeine Evakuierung aller dort lebenden Polen angeordnet werden. Und das würde unserer Regierung gewiss keine größere Popularität einbringen. Eine solche Beschwichtigung von [GER.GetName] würde jedoch unsere – noch immer verkürzten – Westgrenzen sichern und es uns ermöglichen, mehr militärische Ressourcen an unserer Ostgrenze zu konzentrieren, die wir gemeinsam mit [SOV.GetName] immer stärker stärken."
 umc_ger.307.a:0 "Wenn die Deutschen dies akzeptieren, haben sie keinen weiteren Vorwand mehr, uns zu verärgern."
 umc_ger.307.b:0 "Wenn wir dies akzeptieren, sollten sie uns auch im Kampf gegen die sowjetische Bedrohung unterstützen."
 umc_ger.307.c:0 "Diese Gebiete sind jetzt polnisch."
 
 umc_ger.308.t:0 "[POL.GetName] stellt die Vorkriegsgrenzen wieder her"
 umc_ger.308.d:0 "Nach langwierigen Verhandlungen gab der polnische Botschafter schließlich nach und stimmte der Umsetzung des Vorschlags zu. Damit erlangten wir nicht nur die Kontrolle über die Stadt Danzig zurück, sondern über alle Gebiete, die wir durch den Versailler Vertrag verloren hatten.\n\nNach der Unterzeichnung des Abkommens ordnete [GER.GetLeader] umgehend eine Großveranstaltung im Sportpalast an, bei der er stolz verkündete, dass ein weiteres Gebiet mit deutscher Bevölkerung wieder dem Reich angegliedert werde. Unter lautem Jubel des deutschen Volkes und der Parteiführer erklärte er weiter, dass er seine Bemühungen nicht einstellen werde, bis der letzte Deutsche im Großdeutschen Reich lebe."
 umc_ger.308.a:0 "Heim ins Reich."
 
 umc_ger.309.t:0 "[POL.GetName] bietet Rückgabe des Territoriums für antisowjetischen Pakt an"
 umc_ger.309.d:0 ""
 umc_ger.309.a:0 "Ein kleiner Preis, der bezahlt werden muss."
 umc_ger.309.b:0 "Das wäre nicht mehr als ein leeres Versprechen."
 
 umc_ger.310.t:0 "[GER.GetName] stimmt dem antisowjetischen Verteidigungspakt zu"
 umc_ger.310.d:0 ""
 umc_ger.310.a:0 "Dies wird unseren Staat sichern."
 
 umc_ger.311.t:0 "[GER.GetName] lehnt den antisowjetischen Verteidigungspakt ab"
 umc_ger.311.d:0 ""
 umc_ger.311.a:0 "Uns gehen die Optionen aus."
 
 umc_ger.312.t:0 "[POL.GetName] weigert sich, Territorium zu übertragen"
 umc_ger.312.d:0 ""
 umc_ger.312.a:0 "Wir werden dann einen anderen Weg finden, es zu bekommen."
 
 umc_ger.313.t:0 "[GER.GetName] Forderungen nach Territorium und antisowjetischem Pakt"
 umc_ger.313.d:0 "Während der Verhandlungen unseres Botschafters mit seinem deutschen Amtskollegen erhielt er einen 38 Punkte umfassenden deutschen Vorschlag. Die meisten Punkte betreffen die durch den Versailler Vertrag verlorenen deutschen Gebiete, die vor dem Weltkrieg unter die Kontrolle von [GER.GetName] gestellt werden sollen. Außerdem sollen wir dem Antisowjetischen Verteidigungspakt mit [GER.GetName] beitreten und eine mögliche Aggression von [SOV.GetName] in Europa verhindern.\n\nDies sind hohe Anforderungen an unser Land, da bereits viele Polen in diesen Gebieten leben. Sollte Deutschland die Kontrolle über diese Gebiete erlangen, müsste eine allgemeine Evakuierung aller dort lebenden Polen angeordnet werden. Und das würde unserer Regierung sicherlich keine größere Popularität einbringen. Eine solche Beschwichtigung von [GER.GetName] würde jedoch unsere – noch immer verkürzten – Westgrenzen sichern und es uns ermöglichen, mehr militärische Ressourcen an unserer Ostgrenze zu konzentrieren, die wir gemeinsam mit [SOV.GetName] immer stärker stärken. Und deutsche Hilfe gegen die kommunistische Bedrohung könnte sich in Zukunft durchaus auszahlen, obwohl andere argumentieren, dass uns die Zustimmung zu diesem Pakt unter starken deutschen Einfluss setzen würde. Wenn das nicht unter Kontrolle gehalten würde, könnten wir später zu einem deutschen Satellitenstaat werden, dem die Hände gebunden wären, etwas dagegen zu unternehmen."
 umc_ger.313.a:0 "Besser die Deutschen als die Sowjets."
 umc_ger.313.b:0 "Wenn wir dem zustimmen, laufen wir Gefahr, später zu einem deutschen Satellitenstaat zu werden."
 
 umc_ger.314.t:0 "[POL.GetName] akzeptiert unsere Forderungen"
 umc_ger.314.d:0 "Nach langwierigen Verhandlungen gab der polnische Botschafter schließlich nach und stimmte der Umsetzung des Vorschlags zu. Damit erlangten wir nicht nur die Kontrolle über die Stadt Danzig zurück, sondern über alle Gebiete, die wir durch den Versailler Vertrag verloren hatten. Auch Polen konnten wir unserem Einflussbereich hinzufügen, da es nun offizielles Mitglied des Antisowjetischen Pakts ist, der uns militärische Hilfe gegen die Bedrohung durch die Bolschewiki sichert, uns aber auch die Möglichkeit gibt, uns in ihre inneren Angelegenheiten einzumischen.\n\nNach der Unterzeichnung des Abkommens ordnete [GER.GetLeader] umgehend eine Großveranstaltung im Sportpalast an, bei der er stolz verkündete, dass ein weiteres Gebiet mit seiner deutschen Bevölkerung wieder dem Reich angegliedert werde. Unter lautem Jubel des deutschen Volkes und der Parteiführer fuhr er fort, dass seine Bemühungen nicht enden würden, bis der letzte Deutsche in seinem Teil des Großdeutschen Reiches lebe und der letzte Kommunist tot sei oder aus Europa vertrieben worden sei."
 umc_ger.314.a:0 "Mehr könnten wir nicht verlangen."
 
 umc_ger.315.t:0 "[POL.GetName] lehnt unsere Forderungen ab"
 umc_ger.315.d:0 ""
 umc_ger.315.a:0 "Wir werden dann einen anderen Weg finden, es zu bekommen.&quot;"
 
 umc_ger.316.t:0 "[GER.GetName] lädt uns ein, die polnische Frage zu lösen"
 umc_ger.316.d:0 "Nachdem Polen zugestimmt hatte, die Territorialfrage allein und ohne seine Verbündeten zu diskutieren, lud uns der deutsche Botschafter Joachim von Ribbentrop – in Anerkennung des Molotow-Ribbentrop-Vertrags, den wir einige Monate zuvor unterzeichnet hatten – zu Verhandlungen ein, um unsere Kräfte zu vereinen und Polen ein letztes Ultimatum zu stellen.\n\nDa Polen nun zwischen unseren beiden Nationen eingeklemmt ist und kaum eine Chance zum Widerstand hat und der Molotow-Ribbentrop-Pakt immer noch in Kraft ist, könnten wir dieses hässliche Produkt von Versailles sogar spalten, ohne dass ein Schuss abgefeuert wird."
 umc_ger.316.a:0 "Eine hervorragende Gelegenheit."
 umc_ger.316.b:0 "Wir sind noch nicht bereit, uns der westlichen Welt zu stellen."
 
 umc_ger.317.t:0 "[SOV.GetName] lehnt Einladung zu den Verhandlungen ab"
 umc_ger.317.d:0 ""
 umc_ger.317.a:0 "Dann müssen wir eine andere Lösung finden."
 
 umc_ger.318.t:0 "[SOV.GetName] schickt Molotow, um an den Verhandlungen teilzunehmen"
 umc_ger.318.d:0 ""
 umc_ger.318.a:0 "Dann stellen Sie das Ultimatum."
 umc_ger.318.a_EXPL:0 "[POL.GetFlag]§H[POL.GetName]§! kann die Alliierten um §RUnterstützung§! bitten oder das Ultimatum §Rablehnen§!. In diesem Fall erhalten wir ein §HKriegsziel§!."
 
 umc_ger.319.t:0 "Ribbentrop-Molotow-Ultimatum"
 umc_ger.319.d:0 ""
 umc_ger.319.a:0 "Widerstand würde nur Blutvergießen bringen."
 umc_ger.319.b:0 "Es war ein Fehler, mit den Deutschen zu verhandeln. Wir müssen erneut die Hilfe der Alliierten in Anspruch nehmen."
 umc_ger.319.c:0 "Wir werden unsere Grenzen bis zum letzten Mann verteidigen!"
 
 umc_ger.320.t:0 "Ribbentrop-Molotow-Ultimatum – Polen kapituliert"
 umc_ger.320.d:0 "Da [POL.GetLeader] bei seinen Verbündeten keine Hilfe fand und keinen anderen Ausweg aus der Situation sah, gab er uns die offizielle Unterordnungserklärung unter unsere Forderungen. Damit ist das Ende dieses hässlichen Produkts von Versailles gekommen, da sein Territorium erneut zwischen uns und [SOV.GetName] aufgeteilt wird.\n\nMit dieser Erklärung begannen unsere Truppen, in unser Gebiet zu marschieren, um die Ordnung wiederherzustellen. Obwohl sie auf keinen größeren bewaffneten Widerstand stießen, kam es gelegentlich zu Unruhen und Protesten, die offensichtlich schnell von unserer Armee niedergeschlagen wurden.\n\nDieser beispiellose Erfolg wurde umgehend im Reichstag von unserem Führer [GER.GetLeader] verkündet, dessen Rede im ganzen Reich per Radio übertragen wurde. Nun kann selbst der letzte Deutsche nicht länger daran zweifeln, dass seine Führung unser Land aus den Ruinen heben und es wieder in die Position einer führenden Nation Europas bringen wird."
 umc_ger.320.a:0 "Heim ins Reich."
 
 umc_ger.321.t:0 "Ribbentrop-Molotow-Ultimatum – Polen kapituliert"
 umc_ger.321.d:0 "Da [POL.GetLeader] bei seinen Verbündeten keine Hilfe fand und keinen anderen Ausweg aus der Situation sah, gab er uns die offizielle Unterordnungserklärung unter unsere Forderungen. Damit ist das Ende dieses hässlichen Produkts von Versailles erreicht, da sein Territorium erneut zwischen uns und [GER.GetName] aufgeteilt wird.\n\nMit dieser Erklärung begannen unsere Truppen, in unser Gebiet zu marschieren, um die Ordnung wiederherzustellen. Obwohl sie auf keinen größeren bewaffneten Widerstand stießen, kam es gelegentlich zu Unruhen und Protesten, die offensichtlich schnell von unserer Armee niedergeschlagen wurden.\n\nDieser beispiellose Erfolg wurde von [SOV.GetLeader] umgehend als „vollständiger Sieg über westliches Diktat und Imperialismus“ verkündet."
 umc_ger.321.a:0 "Pobeda!"
 
 umc_ger.322.t:0 "[POL.GetName] sucht Hilfe gegen deutsch-sowjetische Forderungen"
 umc_ger.322.d:0 ""
 umc_ger.322.a:0 "Mit aller Kraft müssen wir dieser Bedrohung Seite an Seite entgegentreten."
 umc_ger.322.b:0 "Sie sind selbst in diese Lage geraten."
 
 umc_ger.323.t:0 "[FROM.GetName] Verteidigen Sie unsere territorialen Rechte"
 umc_ger.323.d:0 ""
 umc_ger.323.a:0 "Wir werden unsere Freiheit verteidigen."
 
 umc_ger.324.t:0 "[FROM.GetName] Sichert [POL.GetName]"
 umc_ger.324.d:0 ""
 umc_ger.324.a:0 "Das ändert nichts. Versammelt die Sowjets und setzt den Angriff fort!"
 umc_ger.324.b:0 "Darauf sind wir nicht vorbereitet."
 
 umc_ger.325.t:0 "[GER.GetName] akzeptiert bewaffnete Intervention aufgrund der polnischen Weigerung"
 umc_ger.325.d:0 ""
 umc_ger.325.a:0 "Wir werden dieses hässliche Produkt von Versailles gemeinsam aufteilen."
 umc_ger.325.b:0 "Gegen die Alliierten sind wir nicht vorbereitet."
 
 umc_ger.326.t:0 "[SOV.GetName] stimmt bewaffneter Intervention zu"
 umc_ger.326.d:0 ""
 umc_ger.326.a:0 "Der Polenfeldzug beginnt."
 
 umc_ger.327.t:0 "[SOV.GetName] lehnt mit bewaffneter Intervention ab"
 umc_ger.327.d:0 ""
 umc_ger.327.a:0 "Mit diesen Feiglingen werden wir uns später befassen."
 umc_ger.327.b:0 "Allein sind wir in der Unterzahl."
 
 # ALLIES - SOV sides with GER - war begins
 umc_ger.328.t:0 "[SOV.GetName] steht auf der Seite von [GER.GetName]"
 umc_ger.328.d:0 ""
 umc_ger.328.a:0 "Jetzt gibt es kein Zurück mehr."
 
 # ALLIES - GER alone - war begins
 umc_ger.329.t:0 "[SOV.GetName] tritt zurück, [GER.GetName] greift an"
 umc_ger.329.d:0 ""
 umc_ger.329.a:0 "Wir werden mit ihnen umgehen wie vor zwanzig Jahren."
 
 # ALLIES - GER alone - backs down 
 umc_ger.330.t:0 "[GER.GetName] und [SOV.GetName] demobilisieren"
 umc_ger.330.d:0 ""
 umc_ger.330.a:0 "Leere Drohungen. Aber das kann nicht ungestraft bleiben."
 
 # POL (from 322B) - They are alone - go to 319
 umc_ger.331.t:0 "[FROM.GetName] verweigert Unterstützung"
 umc_ger.331.d:0 ""
 umc_ger.331.a:0 "Wir stehen allein."
 
 # SOV (from 324) - GER backs down 
 umc_ger.332.t:0 "[GER.GetName] Demobilisiert"
 umc_ger.332.d:0 ""
 umc_ger.332.a:0 "Wir hätten es gemeinsam schaffen können."

 # ENG/FRA - GER gained territory from POL
 umc_ger.333.t:0 "[POL.GetName] tritt Territorium an [GER.GetName] ab"
 umc_ger.333.d:0 ""
 umc_ger.333.a:0 "Der Frieden ist das Wichtigste."
 
 # SOV - GER gained territory from POL (if has Mol-Rib - cancel it)
 umc_ger.334.t:0 "[GER.GetName] gewinnt Territorium von [POL.GetName]"
 umc_ger.334.d:0 ""
 umc_ger.334.a:0 "In dieser Situation ist das keine willkommene Wende."
 
 # SOV (from 327a) - GER goes to war
 umc_ger.335.t:0 "[GER.GetName] setzt ihre Forderungen durch"
 umc_ger.335.d:0 ""
 umc_ger.335.a:0 "Dies wird alle Seiten schwächen. Aber nicht uns."
 
 # SOV (from 328a) - GER backs down 
 umc_ger.336.t:0 "[GER.GetName] Demobilisiert"
 umc_ger.336.d:0 ""
 umc_ger.336.a:0 "Der Krieg wird sowieso bald ausbrechen."
 
 # GER - Protests/Riots
 umc_ger.338.t:0 "Unruhen, Krawalle, Brände in Südpolen"
 umc_ger.338.d:0 "Nach unserer Besetzung ehemaliger polnischer Gebiete kam es zu zahlreichen Protesten. Obwohl diese keine ernsthafte Bedrohung für unsere Herrschaft dort darstellen, behindern sie unsere Bemühungen, die dortige Industrie zu integrieren. Und bis dahin haben wir wenig bis gar keine Verwendung dafür.\n\nWährend einige Parteifunktionäre eine schnelle und harte Militärintervention vorschlagen, präsentierte uns SS-Gruppenführer Reinhard Heydrich einen anderen interessanten Weg: eine Politik des „Zuckers und der Peitsche“, bei der diejenigen, die bereit sind, mit dem Reich zu kooperieren, die Vorteile und die Sicherheit genießen, während die anderen kompromisslos bestraft werden."
 umc_ger.338.a:0 "Setzen Sie das Gesetz durch und sorgen Sie für Ordnung."
 umc_ger.338.b:0 "Heydrichs „Zucker-und-Schlag“-Politik ist der beste Weg."
 
 # SOV - Protests/Riots
 umc_ger.339.t:0 "Unruhen, Krawalle, Brände in Ostpolen"
 umc_ger.339.d:0 ""
 umc_ger.339.a:0 "Die Situation wird sich irgendwann beruhigen."

 # ENG - BERLIN CONFERENCE - this chain is for ENG + FRA
 umc_ger.340.t:0 "Die Berliner Konferenz"
 umc_ger.340.d:0 "Our Ambassador in Germany was contacted by the German foreign minister Joachim von Ribbentrop, who - with blessing of [GER.GetLeader]  - calls for our participation in a conference to discuss the future fate of the Germans territories lost by the Treaty of Versailles, which are now in the control of the Republic of Poland.\n\nEven though [GER.GetLeader] already violated most of the points of the treaty, he also shown that waging war against western nations is not amongst his intention and that his goals are pointing east to the bolshevik Soviet Union. And he used exactly such arguments in order to persuade us to back-up his claims.\n\nWhile we can't say that appeasing militarist Germany is a good idea, we can all agree that peace is our dearest thing to hold - no one wants our young people to die in the trenches once again. And having Germany as a buffer zone between us and the Soviets will not come in vain for sure."
 umc_ger.340.a:0 "Wenn wir Hitler alles geben, was er will, wird der Frieden gewahrt."
 umc_ger.340.b:0 "Wir haben unseren Bruchpunkt erreicht."      # THIS will jump to 348 if FRA is not CONDITIONS RIGHT
 
 umc_ger.341.t:0 "Die Berliner Konferenz – [ENG.GetName] vermittelt"
 umc_ger.341.d:0 ""
 umc_ger.341.a:0 "Wir müssen ihrem Beispiel folgen. Danzig ist deutsch."
 umc_ger.341.b:0 "Schluss damit! [GER.GetLeader] muss in seine Schranken gewiesen werden."
 
 # ENG (from 341B) - Message that FRA is going to War
 umc_ger.342.t:0 "[FRA.GetName] Sichert [POL.GetName]"
 umc_ger.342.d:0 ""
 umc_ger.342.a:0 "Dieses Mal werden wir sie nicht retten."
 
 umc_ger.343.t:0 "Die Berliner Konferenz – [ENG.GetName] unterstützt Polen"
 umc_ger.343.d:0 ""
 umc_ger.343.a:0 "Gemeinsam können wir die deutsche Aggression abwehren."
 umc_ger.343.b:0 "Warum für Danzig sterben?"
 
 umc_ger.344.t:0 "[ENG.GetName] und [FRA.GetName] stehen an unserer Seite"
 umc_ger.344.d:0 ""
 umc_ger.344.a:0 "Geben Sie Ribbentrop Bescheid."
 
 umc_ger.345.t:0 "[ENG.GetName] und [FRA.GetName] stehen zu Polen"
 umc_ger.345.d:0 ""
 umc_ger.345.a:0 "Sie haben ihre Wahl getroffen."
 umc_ger.345.b:0 "Die Vermittlung ist gescheitert. Wir müssen einen Rückzieher machen."
 
 # POL (from 341B)
 umc_ger.346.t:0 "[FRA.GetName] steht an unserer Seite"
 umc_ger.346.d:0 ""
 umc_ger.346.a:0 "Geben Sie Ribbentrop Bescheid."
 
 umc_ger.347.t:0 "[FRA.GetName] steht zu Polen"
 umc_ger.347.d:0 ""
 umc_ger.347.a:0 "Sie haben ihre Wahl getroffen. Ohne Großbritannien können wir sie leicht schlagen."
 umc_ger.347.b:0 "Die Vermittlung ist gescheitert. Wir müssen einen Rückzieher machen."
 
 # ENG (from 343B) - FRA refuses to back-up POL
 umc_ger.348.t:0 "[FRA.GetName] weigert sich, [POL.GetName] zu sichern"
 umc_ger.348.d:0 ""
 umc_ger.348.a:0 "Allein auf dem Kontinent können wir nicht viel tun."
 umc_ger.348.b:0 "Verdammt, diese Feiglinge! Wir stehen zu den Polen."
 
 umc_ger.349.t:0 "[ENG.GetName] steht an unserer Seite"
 umc_ger.349.d:0 ""
 umc_ger.349.a:0 "Geben Sie Ribbentrop Bescheid."
 
 umc_ger.350.t:0 "[ENG.GetName] steht zu Polen"
 umc_ger.350.d:0 ""
 umc_ger.350.a:0 "Sie haben ihre Wahl getroffen. Ohne Frankreich wären ihre Handlungsmöglichkeiten sehr begrenzt."
 umc_ger.350.b:0 "Die Vermittlung ist gescheitert. Wir müssen einen Rückzieher machen."
 
 # FRA - BERLIN CONFERENCE - this chain is for FRA
 umc_ger.351.t:0 "Die Berliner Konferenz"
 umc_ger.351.d:0 ""
 umc_ger.351.a:0 "Hitler hat uns gezeigt, dass Krieg nicht zu seinen Absichten gehört."
 umc_ger.351.b:0 "Dieser Nazi-Bedrohung muss sofort begegnet werden."
 
 # POL - ALLIES demands Return of Danzig
 umc_ger.352.t:0 "Die Berliner Konferenz – Die Alliierten fordern die Rückgabe Danzigs"
 umc_ger.352.d:0 ""
 umc_ger.352.a:0 "Alleine haben wir nur eine geringe Chance."
 umc_ger.352.b:0 "Wir werden unsere Grenzen um jeden Preis verteidigen!"
 
 umc_ger.353.t:0 "Die Berliner Konferenz – Wiedererlangtes Territorium"
 umc_ger.353.d:0 "Nach langwierigen Verhandlungen und den nicht enden wollenden Bemühungen unseres Außenministers Joachim von Ribbentrop, die westlichen Alliierten davon zu überzeugen, dass unser einziges Ziel der Schutz des deutschen Volkes im Ausland sei, kamen die britischen und französischen Botschafter schließlich zu dem Schluss, dass die Gebiete, die uns im Versailler Vertrag abgenommen worden waren, zurückgegeben werden müssen.\n\nAuch wenn wir die Punkte dieses Abkommens einhalten müssen – wir dürfen keine feindseligen Handlungen gegen [POL.GetName] begehen und die friedliche Umsiedlung der in diesen Gebieten lebenden polnischen Bevölkerung zulassen – ist dies zweifellos ein großer Sieg, der unsere politische Stärke und auch den schwachen Willen der westlichen Nationen zeigt, ihre Verbündeten zu verteidigen und Maßnahmen gegen unser Reich zu ergreifen.\n\nSobald das Abkommen unterzeichnet war, ordnete [GER.GetLeader] sofort die Organisation einer Großveranstaltung im Sportpalast an, bei der er stolz verkündete, dass ein weiteres Gebiet mit seiner deutschen Bevölkerung wieder dem Reich angegliedert wurde. Unter lautem Jubel des deutschen Volkes und der Parteiführer fuhr er fort, dass seine Bemühungen nicht enden würden, bis der letzte Deutsche in diesem Teil des Großdeutschen Reiches lebe."
 umc_ger.353.a:0 "Heim ins Reich."
 
 umc_ger.354.t:0 "Die Berliner Konferenz - Polen weigert sich, Danzig abzutreten"
 umc_ger.354.d:0 ""
 umc_ger.354.a:0 "Der Polenfeldzug beginnt."
 
 # GER - for POL/ENG/FRA that they Back Off/Press the Attack
 umc_ger.355.t:0 "[GER.GetName] setzt ihre Forderungen durch"
 umc_ger.355.d:0 ""
 umc_ger.355.a:0 "Wir werden jetzt für Danzig sterben."
 
 umc_ger.356.t:0 "[GER.GetName] von ihrer Forderung zurücktreten"
 umc_ger.356.d:0 ""
 umc_ger.356.a:0 "Damit zeigen wir der Welt unsere Stärke."
 
 ### GLEIWITZ INCIDENT
 umc_ger.360.t:0 "Operation Himmler"
 umc_ger.360.d:0 "Die Operation Himmler ist ein unter falscher Flagge geplantes und durchgeführtes Projekt, um den Anschein einer polnischen Aggression gegen Deutschland zu erwecken. Der offiziellen Ankündigung zufolge wird unserer Öffentlichkeit Folgendes mitgeteilt:\n\nHerhört, glorreiche Bevölkerung des Reiches! Heute Morgen stürmte die polnische Armee verschiedene Grenzgebäude, jagte der Bevölkerung mit ungenauen Schüssen Angst ein, verübte Vandalismus und zog sich zurück, wobei sie Leichen in polnischen Uniformen zurückließ.\n\nSpäter am selben Tag hielt [GER.GetLeader] seine Rede im Reichstag: „Ich kann seitens der polnischen Regierung keine Bereitschaft mehr erkennen, ernsthafte Verhandlungen mit uns zu führen. Diese Vermittlungsvorschläge sind gescheitert, weil in der Zwischenzeit zunächst die plötzliche polnische Generalmobilmachung als Antwort kam, gefolgt von weiteren polnischen Gräueltaten. Diese wiederholten sich letzte Nacht. Vor kurzem gab es in einer Nacht bis zu einundzwanzig Grenzzwischenfälle; letzte Nacht waren es vierzehn, von denen drei ziemlich schwerwiegend waren.“ Ich habe mich daher entschlossen, mit Polen in derselben Sprache zu sprechen, die Polen seit Monaten uns gegenüber verwendet... In dieser Nacht haben polnische reguläre Soldaten zum ersten Mal auf unser eigenes Territorium geschossen. Seit 5:45 Uhr erwidern wir das Feuer... \nIch werde diesen Kampf fortsetzen, egal gegen wen, bis die Sicherheit des Reichs und seine Rechte gewährleistet sind.&#39;\n\nUnmittelbar danach wurde dem Heer der Befehl zur Militarisierung erteilt und der Generalstab darüber informiert, dass in Kürze weitere offizielle Erklärungen und Vorgehensweisen bekannt gegeben würden."
 umc_ger.360.a:0 "Wie können sie es wagen?!"
 
 umc_ger.361.t:0 "Gleiwitz-Vorfall"
 umc_ger.361.d:0 ""
 umc_ger.361.a:0 "Wir haben was gemacht?!"
 
 umc_ger.362.t:0 "Gleiwitz-Vorfall"
 umc_ger.362.d:0 ""
 umc_ger.362.a:0 "Das klingt nicht richtig."
 
 ### DEMAND SUDETENLAND
 umc_ger.370.t:0 "Die Münchner Konferenz"
 umc_ger.370.d:0 "Angesichts der wachsenden Spannungen im Sudetenland wurde unser Premierminister [ENG.GetLeader] zusammen mit Vertretern von [FRA.GetName] und [ITA.GetName] zu einer Konferenz nach München eingeladen, auf der [GER.GetLeader] das weitere Vorgehen in dieser Angelegenheit besprechen möchte.\n\nDie Situation war mehr als angespannt. Obwohl tschechische Botschafter nach München eingeladen waren, durften sie nicht an der Konferenz teilnehmen und blieben hinter verschlossenen Türen. Dort sagte [GER.GetLeader] aus, wie die Sudetendeutschen unterdrückt und getötet werden und dass die einzige Lösung die vollständige Auflösung der Tschechoslowakei und die Übertragung ihres ehemaligen Territoriums an Deutschland, Polen und Ungarn sei.\n\nObwohl diese Lösung unerträglich war, schraubte [GER.GetLeader] seine Forderungen zurück und machte deutlich, dass er mit der Annexion des von den Deutschen dominierten Gebiets zufrieden wäre. Er erklärte weiter, dass Deutschland nach der Annexion des Sudetenlandes keine weiteren Gebietsansprüche auf die Tschechoslowakei erheben und ein gemeinsames Abkommen zur Sicherung der deutsch-tschechoslowakischen Grenzen schließen werde. Gegenüber [ENG.GetLeader] erklärte er außerdem, dass er dies dem Ministerpräsidenten als „Geschenk“ für seine Kooperationsbereitschaft und Unterstützung seines Vorschlags machen werde.\n\nNoch bevor wir uns entscheiden konnten, erließ [GER.GetLeader] das Godesberger Memorandum, in dem die Tschechoslowakei aufgefordert wurde, das Sudetenland an Deutschland abzutreten. Andernfalls würde Deutschland das Sudetenland mit Gewalt einnehmen.\n\nEs besteht kein Zweifel, dass der Krieg ausbricht, wenn der Führer nicht zufrieden ist. Vielleicht kann dieses kleine Stück Land aufgegeben werden, um den Krieg abzuwenden... Denn wie [GER.GetLeader] sagte: „Das Sudetenland wird die letzte Gebietsforderung sein, die er in Europa stellen muss.“"
 umc_ger.370.a:0 "Der Frieden unserer Zeit muss um jeden Preis bewahrt werden."
 umc_ger.370.a_EXPL:0 "Wenn sie und [CZE.GetFlag]§H[CZE.GetName]§! unsere Forderungen §Gakzeptieren§!:\n"
 umc_ger.370.b:0 "Wir können die Tschechen nicht an diesen Teufel verkaufen."
 
 umc_ger.371.t:0 "Die Münchner Konferenz – [ENG.GetName] vermittelt in der Situation"
 umc_ger.371.d:0 ""
 umc_ger.371.a:0 "Wir müssen ihrem Beispiel folgen."
 umc_ger.371.b:0 "Unsere Verbündeten müssen um jeden Preis geschützt werden!"
 
 umc_ger.372.t:0 "Die Münchner Konferenz - [FRA.GetName] unterstützt die Tschechen"
 umc_ger.372.d:0 ""
 umc_ger.372.a:0 "Dieses Mal werden wir sie nicht retten."
 
 umc_ger.373.t:0 "Die Münchner Konferenz - [ENG.GetName] unterstützt die Tschechen"
