 erwache_news.6.t:0 "Wirtschaftskonferenz beginnt"
 erwache_news.6.d:0 "Eine Gruppe von Vertretern der deutschen Regierung, von Beratungsgremien, der Wirtschaft und vielen anderen Gruppen trifft sich derzeit in Berlin, um den Kurs der deutschen Wirtschaft festzulegen."
 erwache_news.6.a:0 "Sehr gut."
 
 erwache_news.7.t:0 "Deutscher Verfassungskonvent beendet!"
 erwache_news.7.d:0 "Nach sorgfältigen und zeitintensiven Beratungen und Debatten hat die Provisorische deutsche Regierung ihre neue Verfassung veröffentlicht und deren Umsetzung beschleunigt. Deutschland ist endlich wieder ein stabiler und freier Staat."
 erwache_news.7.a:0 "Herzlichen Glückwunsch nach Deutschland!"
 erwache_news.7.b:0 "Verdammte Linke und Liberale!"
 erwache_news.7.c:0 "Senden Sie unsere formellen Glückwünsche!"
 
 erwache_news.8.t:0 "Schutzangebot abgelehnt!"
 erwache_news.8.d:0 "Unser Angebot, die Überseekolonien unserer Verbündeten zu schützen, wurde abgelehnt!"
 erwache_news.8.a:0 "Sozusagen."
 
 erwache_news.9.t:0 "Deutschland kündigt sich als Weltmacht an!"
 erwache_news.9.d:0 "In einer Rede proklamierte die deutsche Bundeskanzlerin Deutschland als globale Hegemonialmacht und deutete damit an, dass das Land auf der internationalen geopolitischen Bühne aktiv werden werde. Es ist unklar, welche Folgen dies für das deutsche Volk und die Welt insgesamt haben wird."
 erwache_news.9.a:0 "Deutschland wird stark sein!"
 erwache_news.9.b:0 "Ein wahrhaft mächtiger Verbündeter"
 erwache_news.9.c:0 "Vielleicht sind sie ein mächtiger Verbündeter?"
 erwache_news.9.e:0 "Eine beunruhigende Aussicht"
 
