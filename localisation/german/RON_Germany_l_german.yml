 GER_long_range_transport_planes_I1_desc:0 "Der Amerikabomber ist ein ehrgeiziges Projekt. Ziel ist der Bau moderner Bomber, die einen Luftkampf über dem amerikanischen Kontinent führen und dort wichtige amerikanische Ziele wie Ölanlagen und Rüstungsfabriken bombardieren können."
 
