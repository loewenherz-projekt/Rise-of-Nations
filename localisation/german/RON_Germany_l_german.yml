 GER_eastern_rk_cat:0 "Form Nord-Ost Reichskommissariate"
 GER_eastern_rk_cat_desc:0 "Wir dringen immer tiefer in die russische Einöde ein und können nicht genug Kraft aufbringen, um ein so großes Gebiet mit einer einzigen Herrschaft zu kontrollieren.\nDeshalb müssen einige autonome Staaten unter der Herrschaft des Reichs gegründet werden, um die lokale Bevölkerung, ihre Industrie und ihre Ressourcen besser kontrollieren zu können."
 GER_western_rk_cat:0 "Form Südwest Reichskommissariate"
 GER_western_rk_cat_desc:0 "Da unsere Eroberung der westlichen Alliierten planmäßig verläuft, können wir keine Arbeitskräfte entbehren, die auf erobertem Boden zurückgelassen werden.\nDaher müssen einige autonome Staaten unter der Herrschaft des Reichs gegründet werden, um die lokale Bevölkerung, ihre Industrie und ihre Ressourcen besser kontrollieren zu können."
