 ### JAP - TRAUTMANN MEDIATION (PART 1)
 umc_ger.260.t:0 "Trautmann Mediation"
 umc_ger.260.d:0 "Seit den 1920er Jahren pflegt [GER.GetName] enge Beziehungen zur Regierung der Republik China unter der Führung der Kuomintang und pflegt diese bis heute. Man ging davon aus, dass wir gemeinsam mit den Chinesen ein östliches Gegengewicht zur Sowjetunion bilden würden. Daher ist jeder bewaffnete Konflikt zwischen uns und China äußerst unerwünscht.\n\nAus diesen Gründen trat der deutsche Botschafter Oskar Trautmann an uns heran und bot uns eine Vermittlung zwischen unserem Premierminister Fumimaro Konoe und Chiang Kai-shek an, um Friedensverhandlungen aufzunehmen.\n\nKurz darauf wurden die sieben Friedensbedingungen vorgeschlagen: die Sicherung der Autonomie der Inneren Mongolei, die Schaffung einer Pufferzone zwischen Mandschukuo und China unter der Verwaltung der Nanking-Regierung und niedrigere Zölle für japanische Waren.\n\nDa ein endloser Krieg definitiv nicht unser primäres Ziel ist und wir unsere Ressourcen bald anderweitig einsetzen müssen, sollten wir dieses Angebot zumindest in Erwägung ziehen. Schließlich sind wir alle Asiaten, und der sowjetische Bär wartet schon."
 umc_ger.260.a:0 "Es besteht keine Notwendigkeit für einen längeren Krieg."
 umc_ger.260.b:0 "Diplomatie ist reine Zeitverschwendung."
 
 umc_ger.261.t:0 "[JAP.GetName] lehnt Trautmann-Vermittlung ab"
 umc_ger.261.d:0 ""
 umc_ger.261.a:0 "Der Kampf geht weiter."
 
 umc_ger.262.t:0 "Trautmann Mediation"
 umc_ger.262.d:0 "[GER.GetName] pflegt seit den 1920er Jahren enge Beziehungen zu unserer Regierung und pflegt diese bis heute. Man ging davon aus, dass wir gemeinsam mit den Japanern ein östliches Gegengewicht zur Sowjetunion bilden würden. Daher ist jeder bewaffnete Konflikt zwischen uns und dem Japanischen Kaiserreich äußerst unerwünscht.\n\nAus diesen Gründen trat der deutsche Botschafter Oskar Trautmann an uns heran und bot uns eine Vermittlung zwischen unserem Generalissimus Chiang Kai-shek und dem japanischen Premierminister Fumimaro Konoe an, um Friedensverhandlungen aufzunehmen. Kurz darauf schlugen die Japaner die sieben Friedensbedingungen vor: die Sicherung der Autonomie der Inneren Mongolei, die Schaffung einer Pufferzone zwischen Mandschukuo und China unter der Verwaltung der Nanking-Regierung und niedrigere Zölle für japanische Waren.\n\nDa die NRA noch nicht zu einem längeren Krieg bereit ist, sollten wir ihren Vorschlag zumindest in Betracht ziehen."
 umc_ger.262.a:0 "Wir sind darauf schlecht vorbereitet und die Kommunisten schmieden bereits Pläne gegen uns."
 umc_ger.262.b:0 "Deutschland ist ein schlechter Vermittler. Wir müssen andere auffordern, einzuspringen."
 umc_ger.262.c:0 "Unsere tapferen Soldaten werden die Japaner zurückdrängen!"
 
