 GMO_Distrust_for_Kaiser_I1_desc:0 "Seit Kaiser Wilhelms Abdankung 1918 hat Deutschland viele schwere Zeiten erlebt. Das Volk vertraute dem neuen Führer [GER.GetLeader]. Er baute die deutsche Wirtschaft wieder auf und gab den Menschen Arbeit und Stolz zurück. Nun ist er gestürzt, und das deutsche Volk zweifelt an dem neuen Regime. Der Kaiser muss altes Unrecht wiedergutmachen, um das Vertrauen des Volkes in ihn wiederherzustellen."
 
 
