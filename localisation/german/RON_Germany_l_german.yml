 #### Civil war - Get the navy back
 umc_gmo.160:0 "Kriegsmarine sendet Kapitulationsbedingungen!"
 umc_gmo.160.t:0 "Kriegsmarine sendet Kapitulationsbedingungen!"
 umc_gmo.160.d:0 "Nach unseren schnellen Siegen über die Nazis sieht der Teil der deutschen Marine, der zuvor mit den Nazis fusioniert war, keine Chance auf eine Verbesserung der Kriegslage. Daher bieten uns ihre Vertreter die Bedingungen einer Kapitulation an. Sollten wir ihr Angebot annehmen, würden wir ihre Kriegsschiffe zurückerhalten. Teile unserer Führung würden diese Vereinbarung jedoch mit einer gewissen Verachtung betrachten."
 umc_gmo.160.a:0 "Schließlich ist es unsere Marine. Und wir sind alle Deutsche."
 umc_gmo.160.b:0 "Sie werden sich dem Gesetz stellen, sobald der Krieg vorbei ist!"
 
