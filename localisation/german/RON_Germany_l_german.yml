 umc_leader_adolf_hitler_desc:0 "[GER.GetLeader] wurde am 20. April 1889 in Österreich geboren. Dort widmete er sich zunehmend zwei Interessen: Architektur und Musik. Er besuchte zehn Aufführungen von Lohengrin und lernte dort auch Karl Lueger kennen, einen überzeugten Populisten und Nationalisten. 1913 zog er nach Deutschland und wurde für seinen Dienst in der kaiserlichen Armee im Zweiten Weltkrieg ausgezeichnet. Seine Verbitterung über den Zusammenbruch der Kriegsanstrengungen prägte seine Ideologie, und nach dem Krieg trat er der DAP bei, die später in „Nationalsozialistische Deutsche Arbeiterpartei“, kurz NSDAP, umbenannt wurde. Von leidenschaftlichen Reden in Kneipen stieg er allmählich zum Parteivorsitzenden auf. Zu seinen frühen Anhängern zählten Rudolf Heß, der ehemalige Fliegerass Hermann Göring und Hauptmann Ernst Röhm.\n1923 nahm Hitler die Hilfe des Generals des Ersten Weltkriegs, Erich Ludendorff, für einen Putschversuch in Anspruch, der als „Bierkellerputsch“ bekannt wurde. Dieser scheiterte und Hitler wurde zu fünf Jahren Gefängnis im Gefängnis Landsberg verurteilt. Dort diktierte er den größten Teil des ersten Bandes von „Mein Kampf“ seinem Chauffeur Emil Maurice und dann seinem Stellvertreter Rudolf Heß. Obwohl sich die deutsche Wirtschaft stabilisierte, war sein politischer Einfluss stark eingeschränkt.\nDas änderte sich am 24. Oktober 1929 mit einem Börsencrash in den USA, der verheerende Auswirkungen auf Deutschland hatte. Hitler und die NSDAP bereiteten sich darauf vor, die Notlage zu nutzen, um Unterstützung für ihre Partei zu gewinnen. Sie versprachen, den Versailler Vertrag aufzukündigen, die Wirtschaft zu stärken und Arbeitsplätze zu schaffen. Und das taten sie.\nHitler wurde am 30. Januar 1933 zum Reichskanzler ernannt und festigte seine Macht wenige Monate später vollständig."
 
