 GER_inexperienced_carrier_constructors_I1:0 "Unerfahrene Trägerbauer"
 GER_inexperienced_carrier_constructors_I1_desc:0 "Da der Versailler Vertrag die deutsche Marine auf 15.000 Mann und 36 Schiffe beschränkte und eine Luftwaffe vollständig verbot, war unser Land nicht in der Lage, eine moderne Marine einschließlich der neu erfundenen Flugzeugträger aufzubauen, die Luftunterstützung auf offener See ermöglichten.\n§W---------------§!\nDieser Nationalgeist ist ausgeglichen (§R3§!)."
 GER_inexperienced_carrier_constructors_I2:0 "Unerfahrene Trägerbauer"
 GER_inexperienced_carrier_constructors_I2_desc:0 "Da der Versailler Vertrag die deutsche Marine auf 15.000 Mann und 36 Schiffe beschränkte und eine Luftwaffe vollständig verbot, war unser Land nicht in der Lage, eine moderne Marine einschließlich der neu erfundenen Flugzeugträger aufzubauen, die Luftunterstützung auf offener See ermöglichten.\n§W---------------§!\nDieser Nationalgeist ist ausgeglichen (§R2§!)."
 GER_inexperienced_carrier_constructors_I3:0 "Unerfahrene Trägerbauer"
 GER_inexperienced_carrier_constructors_I3_desc:0 "Da der Versailler Vertrag die deutsche Marine auf 15.000 Mann und 36 Schiffe beschränkte und eine Luftwaffe vollständig verbot, war unser Land nicht in der Lage, eine moderne Marine einschließlich der neu erfundenen Flugzeugträger aufzubauen, die Luftunterstützung auf offener See ermöglichten.\n§W---------------§!\nDieser Nationalgeist ist ausgeglichen (§R1§!)."
 
 GER_czech_resistance_I:0 "Tschechische Widerstandsbewegungen"
 GER_czech_resistance_I_desc:0 "Tschechen sind ein zähes Volk. Obwohl ihr Land besetzt und erobert wurde, sind sie immer noch willensstark. Angesichts der Dekadenz in und um unsere Fabriken kann die Zuverlässigkeit tschechischer Waffen nicht garantiert werden."
 
 
 
 
