 GER_Hungarian_Relations_II_desc:0 ""
 GER_Mediate_Dispute_Hungary_Romania:0 "Streit zwischen Ungarn und Rumänien vermitteln"
 GER_Mediate_Dispute_Hungary_Romania_desc:0 ""
 GER_Romanian_Relations_I:0 "Rumänische Beziehungen"
 GER_Romanian_Relations_I_desc:0 ""
 GER_Finland:0 "Finnland in der Achse"
 GER_Finland_desc:0 ""
