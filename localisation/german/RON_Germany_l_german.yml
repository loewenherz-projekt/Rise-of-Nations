 GER_Blitz_Poland:0 "Blitz Polen"
 GER_Blitz_Poland_desc:0 "Wir werden Polen den Krieg erklären, als ersten Schritt zur Wiederherstellung des Preußischen Reiches und zur Wiedergutmachung der Fehler von Versailles."
 GER_Increase_Military_Budget:0 "Erhöhung des Militärbudgets"
 GER_Increase_Military_Budget_desc:0 "Wir werden die Militärausgaben vorübergehend erhöhen, um die Produktion zu verbessern, während wir gleichzeitig unsere unterbewaffnete Wehrmacht weiter aufrüsten."
 GER_Embrace_Materialism:0 "Umarme den Materialismus"
 GER_Embrace_Materialism_desc:0 "Da Hitler innerhalb seiner eigenen Regierung an Boden verliert, ist es jetzt an der Zeit, sich auf die Ausweitung der Konsumgüterindustrie zu konzentrieren, indem wir unseren Industriepartnern bei ihrer Unternehmensexpansion helfen."
 GER_Fortify_the_Austrian_Border:0 "Befestigen Sie die österreichische Grenze"
 GER_Fortify_the_Austrian_Border_desc:0 "Wir werden unsere gemeinsame Grenze mit Österreich befestigen, während wir auf die italienische Aggression warten."
 GER_Fortify_the_Austrian_Alps:0 "Befestigen Sie die österreichischen Alpen"
 GER_Fortify_the_Austrian_Alps_desc:0 "Wir werden entlang der österreichischen Grenze zu Italien Befestigungen errichten, bevor italienische Truppen eine Offensive zur Unterdrückung der germanischen österreichischen Völker starten können."
 GER_Stimulus_Package:0 "Konjunkturimpulse"
 GER_Stimulus_Package_desc:0 "Wir werden Ressourcen in die Ankurbelung unserer Wirtschaft investieren, indem wir uns auf Bau- und öffentliche Arbeiten konzentrieren, Arbeitsplätze schaffen und die Stabilität innerhalb des Reiches fördern."

 
 
