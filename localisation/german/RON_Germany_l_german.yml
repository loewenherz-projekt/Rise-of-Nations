 umc_ger.534.t:0 "[ENG.GetName] nimmt an der Haager Konferenz teil"
 umc_ger.534.d:0 "Angesichts der verzweifelten Lage der Briten und der verzweifelten Stimmen von den Britischen Inseln hat [ENG.GetLeader] zugestimmt, alle Feindseligkeiten einzustellen und an der Haager Konferenz teilzunehmen. Es sind die ersten erfolgreichen Verhandlungen mit dem Britischen Empire seit Beginn des Zweiten Weltkriegs. Dies und die Tatsache, dass wir ihr Heimatland fest im Griff haben, geben uns die relative Gewissheit, dass die Briten alle unsere Forderungen erfüllen werden.\n\nObwohl unser großes Ziel der Kampf gegen die Kommunisten im Osten war, haben uns die Briten nach dem Weltkrieg großen Schaden zugefügt. Sie haben unsere großartige Nation gedemütigt, und das Deutsche Volk hat sehr gelitten.\n\nAußerdem entschieden sie sich für den Kampf, anstatt ihre Waffen niederzulegen, sobald wir Frankreich eroberten, und fügten unserem Kampf gegen den Bolschewismus ständigen Schaden zu. Viele großartige Seeleute und Piloten starben beim Versuch, unser Land zu schützen, unsere Versorgungslinien zu schützen und unseren Himmel frei von feindlichen Bombern zu halten. Viele tapfere Soldaten starben während des Unternehmens Seelöwe an den Küsten und Stränden Großbritanniens.\n\nDeshalb werden selbst die größten Forderungen an sie als möglich angesehen. Das Großdeutsche Reich ist eine führende Macht in Europa und die Briten MÜSSEN sich fügen ... oder untergehen."
 umc_ger.534.a:0 "Lasst die Verhandlungen beginnen!"
 
 umc_ger.535.t:0 "Die Haager Konferenz – Die Frage des Britischen Empire"
 umc_ger.535.d:0 "Da die Vertreter des Britischen Empires in Den Haag eingetroffen sind, liegt es nun an uns, die Verhandlungen zu führen. Die wichtigste Frage muss gleich zu Beginn geklärt werden: Welche Position wird das Britische Empire – oder besser gesagt das Vereinigte Königreich – in der Neuordnung einnehmen? \n\nEs gibt zahlreiche Möglichkeiten – von der einfachen Eingliederung aller Commonwealth-Staaten in die [GER.GetFactionName] bis hin zur bedingungslosen Kapitulation des gesamten Britischen Empires, um alle weiteren Forderungen zu erfüllen, die wir an sie stellen möchten. \n\nDie Atmosphäre der Verhandlungen ist düster und finster. Die Briten befinden sich mit Sicherheit in einer schwierigen Lage und haben kein Interesse an einer Fortsetzung dieses langwierigen Krieges. Wenn wir sie dazu bringen können, diese ersten Forderungen zu erfüllen, werden sie sicherlich auch den Rest akzeptieren. Doch wie heißt es so schön: Der verletzte Hund beißt am meisten ..."
 umc_ger.535.a:0 "Wir werden die Besetzung Großbritanniens beenden, aber das Commonwealth muss der Neuordnung beitreten."
 umc_ger.535.a_EXPL:0 "Wenn [ENG.GetFlag]§H[ENG.GetName]§! unsere §HForderungen§! in dieser Option §Gakzeptiert§!, hat das letzte Ereignis der Haager Konferenz auch die folgende §GEAuswirkung§!:"
 umc_ger.535.b:0 "Die Regierungen Großbritanniens und seiner Dominions müssen sich dem Willen des Reichs unterwerfen."
 umc_ger.535.b_EXPL:0 "Wenn [ENG.GetFlag]§H[ENG.GetName]§! unsere §HForderungen§! in dieser Option §Gakzeptiert§!, werden sie und alle anderen Länder des Commonwealth zu unseren §HSatelliten§!."
 umc_ger.535.c:0 "Das Britische Empire muss neu organisiert werden, um unter die direkte Kontrolle des Reichs zu fallen."
 umc_ger.535.c_EXPL:0 "Wenn [ENG.GetFlag]§H[ENG.GetName]§! unsere §HForderungen§! in dieser Option §Gakzeptiert§!, werden sie und alle anderen Länder des Commonwealth zu unseren §HReichsprotektoraten§! und das Abschlussereignis der Haager Konferenz wird außerdem die folgende §GEAuswirkung§! haben:."
 umc_ger.535.e:0 "Die bedingungslose Kapitulation des gesamten britischen Empire ist das einzige Ende dieses Krieges."
 umc_ger.535.e_EXPL:0 "Wenn [ENG.GetFlag]§H[ENG.GetName]§! unsere §HForderungen§! in dieser Option §Gakzeptiert§!, werden sie und alle anderen Länder des Commonwealth §Hkapitulieren§!. Gebietsansprüche werden in der §HPFRIEDENSKONFERENZ§! geklärt."
 umc_ger.535.f:0 "Sie hätten nachgeben sollen, als sie die Chance dazu hatten. Der Krieg geht weiter."
 
