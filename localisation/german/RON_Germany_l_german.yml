 ### Sino-German Cooperation 
 umc_ger.210.t:0 "Ausbau der deutsch-chinesischen Zusammenarbeit"
 umc_ger.210.d:0 "Die Zusammenarbeit zwischen China und Deutschland trägt seit 1926 maßgeblich zur Modernisierung der Industrie und der Streitkräfte der Republik China bei. Unser dringender Wunsch nach einer Modernisierung der Militär- und Verteidigungsindustrie sowie Deutschlands Bedarf an einer stabilen Rohstoffversorgung führten dazu, dass China und die Weimarer Republik ab den späten 1920er Jahren enge Beziehungen knüpften.\n\nNun steht die Führung unter Alexander von Falkenhausen, der sich dem Generalissimus mit dem offiziellen Angebot nähert, die chinesisch-deutsche Zusammenarbeit noch weiter zu intensivieren. Dies würde es dem Reich ermöglichen, seinen Einfluss im Osten zu vergrößern, hätte aber auch große Vorteile für unsere militärische und industrielle Lage."
 umc_ger.210.a:0 "Von Falkenhausens Mission hat einen großen Nutzen für die NRA."
 umc_ger.210.b:0 "Das ist nicht mehr nötig."
 
