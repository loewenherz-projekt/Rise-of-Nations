 ### Naval Rearmament
 umc_ger.150.t:0 "Wiederaufbau der Kriegsmarine"
 umc_ger.150.d:0 "Die deutsche Marine litt nach dem Weltkrieg schwer. Wir waren gezwungen, unsere größten Schlachtschiffe an die Alliierten abzugeben, doch durch die Intervention von Admiral Ludwig von Reuter wurden unsere Schiffe versenkt und dieses schändliche Schicksal erspart.\n\nDann wurde die Reichsmarine durch den Versailler Vertrag eingeschränkt. Deutschland durfte nur eine bestimmte Anzahl von Schiffen besitzen. Glücklicherweise wurden die vereinbarten Bedingungen ignoriert, und heute besitzt die Kriegsmarine bereits eine Reihe moderner Schiffe. Aber nicht genug. Im Rahmen des deutsch-britischen Flottenabkommens dürfen wir unsere Marineproduktion steigern, und genau das werden wir tun. Dem Führer wurden zwei große Pläne vorgelegt.\n\nErich Readers Idee einer erneut großen Hochseeflotte basiert auf einem ehrgeizigen Plan Z. Nach erfolgreichem Abschluss sollte die Kriegsmarine über 10 Schlachtschiffe, 4 Flugzeugträger, 4 Schlachtkreuzer, 20 Schwere und 20 Leichte Kreuzer sowie über 100 Zerstörer verfügen.\n\nIm Gegensatz dazu präsentierte Karl Dönitz die Vision einer riesigen Angriffsflotte, die aus modernen U-Booten bestehen sollte. Eine Streitmacht dieser Größenordnung könnte die Moral der Alliierten und den Transport von Kriegsmaterial in andere Länder in Zukunft erheblich beeinträchtigen. Dies würde auch die Produktionskosten deutlich senken und eingesparte Ressourcen könnten anderweitig eingesetzt werden."
 umc_ger.150.a:0 "Folgen Sie Erich Readers Plan der Hochseeflotte."
 GER_naval_rearmament_buffing_reader_EXPL:0 "\nDie Auswahl dieser Option §CImprove§! die Effekte des Fokus &#39;§HErich Raeders &#39;Hochseeflotte&#39;§!&#39;.\n"
 umc_ger.150.b:0 "Unterstützen Sie Dönitz‘ Idee einer billigeren Überfallflotte."
