 GER_polish_recompense:0 "Die polnische Belohnung"
 GER_polish_recompense_desc:0 "Wir können möglicherweise einen der Träume Deutschlands, Danzig zurückzuerobern, friedlich erfüllen, wenn wir Polen ein ebenso wertvolles Gut zur Verfügung stellen: unsere Garantie des Schutzes vor der drohenden sowjetischen Bedrohung."
 GER_neo_imperialism:0 "Neoimperialismus"
 GER_neo_imperialism_desc:0 "Obwohl der Wettlauf um Afrika vorbei ist und die Überseegebiete weitgehend vergeben sind, könnten wir möglicherweise noch über ähnliche Macht verfügen. Anstatt unsere Seemacht und Expansionsmacht einzusetzen, können wir unsere politischen und wirtschaftlichen Möglichkeiten weiterentwickeln, um unseren Einfluss geltend zu machen."
