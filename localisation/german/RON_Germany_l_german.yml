 #### Dutch Deal
 umc_gmo.190.t:0 "Deutsche Interessen an DEI"
 umc_gmo.190.d:0 "Nach einem erneuten entscheidenden Sieg des deutschen Blitzkriegs gegen die belgischen Streitkräfte traten deutsche Diplomaten mit einer heiklen Angelegenheit an uns heran.\n\nSie boten uns die Kontrolle über [6.GetName] im Austausch für die Erlaubnis, unsere Ressourcen in [335.GetName] zu nutzen. Wie wir wissen, könnte ihnen lokaler Kautschuk bei der Produktion von Kampfflugzeugen und Bombern sowie bei der Produktion von Kraftfahrzeugen helfen.\n\nDarüber hinaus konnten wir diese Tat verbergen, um die belgische Bevölkerung zu schützen und so keine feindlichen Aktionen gegen unser Land zu provozieren."
 umc_gmo.190.a:0 "Es ist besser, die Deutschen als Verbündete denn als Feinde zu behandeln."
 umc_gmo.190.b:0 "Wir müssen in diesem Konflikt wirklich neutral bleiben."
 
