 GER_allied_appeasement_I:0 "Beschwichtigung der Alliierten"
 GER_allied_appeasement_I_desc:0 "Appeasement ist im internationalen Kontext eine diplomatische Politik, die darauf abzielt, einer aggressiven Macht politische oder materielle Zugeständnisse zu machen, um Konflikte zu vermeiden. In unserem Fall übersehen Großbritannien und Frankreich die Verletzung des Versailler Vertrags und erlauben uns stillschweigend den Wiederaufbau unserer Armee, Marine und Luftwaffe, da sie uns als nützliches Bollwerk gegen den Kommunismus betrachten.\n\nDarüber hinaus werden sie unsere Forderungen mit Sicherheit unterstützen, sollten wir stark genug sein, sie durchzusetzen. Wie bereits erwähnt, glauben sie immer noch daran, dass der „Friede für unsere Zeit“ erreicht werden kann.\n§W---------------§!\nDieser Nationalgeist wird [ENG.GetFlag]§H[ENG.GetName]§! und [FRA.GetFlag]§H[FRA.GetName]§! dazu bewegen, die Appeasement-Politik zu unterstützen, sofern sie eine §HDokratische§! Regierung haben und sich nicht anders entscheiden.\n§W---------------§!\nDieser Nationalgeist wird §REntfernt§! wenn wir uns im „Offensivkrieg“ befinden!"
 
 GER_kkk_I:0 "Kinder, Küche, Kirche"
 GER_kkk_I_desc:0 "Im Reich hatten Frauen eine klare Aufgabe. Von ihnen wurde erwartet, zu Hause zu bleiben, sich um die Familie zu kümmern und Kinder zu zeugen, um die Zukunft der arischen Rasse zu sichern – die traditionelle Rolle der Frau, die vor den 1920er Jahren existierte. Der Führer glaubte, dass sich das Leben der Frauen um die drei „K“ drehen sollte: Kinder, Küche und Kirche.\n\nDies wird durch das Gesetz zur Förderung der Ehe gefördert, das frisch verheirateten Paaren ein Darlehen von 1.000 Mark gewährt und ihnen erlaubt, für jedes Kind 250 Mark zu behalten, sowie durch die Einführung des Gesetzes zur Verringerung der Arbeitslosigkeit, das Frauen finanzielle Anreize bietet, zu Hause zu bleiben. Außerdem dürfen sie nicht eingezogen werden oder in Fabriken arbeiten.\n§W---------------§!\nDieser Nationalgeist wird durch die Vervollständigung des Fokus „Sportpalastrede: Totale Kriegserklärung“ §GRemoved§!"
 
 GER_JAP_sino_japanese_trade_agreement_I1:0 "Chinesisch-japanisches Handelsabkommen"
 GER_JAP_sino_japanese_trade_agreement_I1_desc:0 ""
 
 GER_CHI_chinese_three_year_plan_I:0 "Von Deutschland unterstützter Dreijahresplan"
 GER_CHI_chinese_three_year_plan_I_desc:0 "Das wichtigste Industrieprojekt der deutsch-chinesischen Zusammenarbeit ist der Dreijahresplan, der von der Nationalen Ressourcenkommission der chinesischen Regierung und dem Hapro-Konzern verwaltet wird. Ziel dieses Plans ist es, eine Industriemacht zu schaffen, die Japan kurzfristig Widerstand leisten kann, und langfristig ein Zentrum für die zukünftige chinesische Industrieentwicklung zu schaffen. Der Plan umfasst mehrere grundlegende Komponenten, wie die Monopolisierung aller Wolfram- und Antimonproduktionsaktivitäten, den Bau zentraler Stahl- und Maschinenbauwerke in Hubei, Hunan und Sichuan sowie den Ausbau von Kraftwerken und Chemiefabriken.\n\nIm Rahmen dieses Programms soll der deutsch-chinesische Handel 17 % des chinesischen Außenhandels ausmachen und China zum drittgrößten Handelspartner Deutschlands machen.\n§W---------------§!\nDieser Nationalgeist wird §RRemoved§! sein, wenn [GER.GetFlag]§H[GER.GetName]§! sich an §HAlexander von Falkenhausen§! erinnert und §REnds§! die Deutsch-Chinesische Zusammenarbeit."
 
 GER_SOV_koester_nakhimov_plan_I:0 "Koester-Nachimow-Plan"
 GER_SOV_koester_nakhimov_plan_I_desc:0 "Der Koester-Nachimow-Plan – benannt nach zwei großen deutschen und russischen Admiralen – verfolgt ein einfaches Ziel: die nahezu unschlagbare alliierte Marine herauszufordern. Dies kann nur erreicht werden, wenn der Großteil der Produktion und Ressourcen der Marineproduktion gewidmet wird."
 
