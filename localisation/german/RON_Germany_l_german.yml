 #GER_Question_of_Yugoslavia_desc:0 ""
 GER_Ireland:0 "Irland in der Achse"
 GER_Ireland_desc:0 ""
 GER_Expand_German_Mines_in_Portugal_and_Spain:0 "Ausbau deutscher Minen in Portugal und Spanien"
 GER_Expand_German_Mines_in_Portugal_and_Spain_desc:0 "Wir werden unsere Wolfram-Aktivitäten in Portugal und Spanien ausbauen. Wir werden Ressourcenexplorationen durchführen und die Effizienz bestehender Minen verbessern. Ihr Wolfram ist für unsere Kriegsanstrengungen von entscheidender Bedeutung."
 GER_Expand_German_Mines_in_Portugal_and_Spain2:0 "Deutsche Bergbauinteressen weiter ausbauen"
 GER_Expand_German_Mines_in_Portugal_and_Spain2_desc:0 "Wir werden die Wolframproduktion auf der Iberischen Halbinsel weiter steigern, um unsere Kriegsmaschinerie zu unterstützen. Die Portugiesen und Spanier werden uns für unsere Hilfe zweifellos sehr dankbar sein."
 
 GER_New_Feminism:0 "Neuer Feminismus"
 GER_New_Feminism_desc:0 "Wir werden bestimmte weibliche Tugenden fördern, die für das Überleben unseres Reiches notwendig sind. Frauen werden fürsorgliche und wählerische Partnerinnen sein. Sie werden ihre Männer unterstützen und nur die germanischsten, patriotischsten und loyalsten unserer Männer auswählen, mit denen sie kopulieren und sich anderweitig um sie kümmern, um das Überleben unseres Reiches zu sichern."
 GER_Wartime_Women:0 "Frauen im Krieg"
 GER_Wartime_Women_desc:0 "Angesichts der großen Zahl von Männern, die derzeit eingezogen werden, ist es notwendig, dass Frauen die häuslichen Pflichten und Verantwortlichkeiten der Männer im Reich übernehmen. Wenn wir diesen Krieg weiterführen wollen, müssen die Brennöfen weiter brennen und die Fließbänder weiter funktionieren."
 GER_Escalating_Conflict:0 "Eskalierender Konflikt"
 GER_Escalating_Conflict_desc:0 "Wir werden die deutschen Frauen dazu drängen, länger zu arbeiten und sich auf die Rüstungsproduktion für das Reich zu konzentrieren. Traditionellere weibliche Tätigkeiten müssen eingestellt werden, das Überleben der Nation steht auf dem Spiel!"
 GER_Soldiers_for_the_Reich:0 "Mehr Soldaten für das Reich"
 GER_Soldiers_for_the_Reich_desc:0 "Wir werden alle körperlich kampffähigen Männer einziehen, auch die Frauen. Die Fittesten werden als Frontinfanteristen dienen, die Schwächeren werden unsere Männer von den unterstützenden Aufgaben hinter der Front entlasten."
 
 GER_Drang_nach_Osten:0 "Drang nach Osten"
 GER_Drang_nach_Osten_desc:0 "Fahrt gen Osten. Im Osten gibt es riesige Ackerflächen, die von Slawen bewohnt und von unterentwickelten Staaten kontrolliert werden. Es ist Deutschlands Schicksal, diese östlichen Ländereien zu erobern und sie für deutsche Nutzung und Besiedlung wieder anzueignen."
 GER_A_Seasoned_Wehrmacht:0 "Eine erfahrene Wehrmacht"
 GER_A_Seasoned_Wehrmacht_desc:0 "Nach Kämpfen und Erfolgen im Osten wie im Westen ist unsere Armee die beste der Welt. Unsere Armee verfügt über die größte kollektive Erfahrung aller Zeiten, und in unserer Armee gibt es zahlreiche Kriegsveteranen. Die von ihnen geschaffene Kultur wird militärische Spitzenleistungen auch in Zukunft fördern."
 GER_A_Seasoned_Wehrmacht_tt:0 "Verbessert die §YWehrmacht§!, um Kampferfahrung besser zu behalten und zu sammeln."
 GER_Lebensraum:0 "Lebensraum"
 GER_Lebensraum_desc:0 ""
 GER_Lebensraum_tt:0 "Schaltet §YEntscheidungen§! frei und ermöglicht es uns, neuen Wohnraum für die Bewohner des Reichs zu finden!"
 GER_Blood_And_Soil:0 "Blut und Boden"
 GER_Blood_And_Soil_desc:0 ""
 GER_Generalplan_Ost:0 "Generalplan Ost"
 GER_Generalplan_Ost_desc:0 "Wir werden den Osten für die Kolonisierung und Eingliederung in unser Reich vorbereiten. Unsere Reichsprotektorate werden als Magnaten für die Einwanderung und Germanisierung germanischer Völker dienen, während die nichtgermanische Bevölkerung entweder germanisiert oder beseitigt wird."
 GER_Generalplan_Ost_tt:0 "Schaltet §YEntscheidungen§! frei und ermöglicht uns die Gründung von Kolonien für das Reich!"
 GER_Germanization_of_Bohemia_Moravia:0 "Germanisierung Böhmen-Mährens"
 GER_Germanization_of_Bohemia_Moravia_desc:0 ""
