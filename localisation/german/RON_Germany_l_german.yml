 umc_ger.166.d:0 "Heute Morgen versammelte sich eine große Gruppe von NSDAP-Funktionären im Hamburger Hafen, um den Baufortschritt der neuen modernen Schiffe zu überwachen, die im Rahmen des Schiffbauprogramms „Plan Z“ gebaut werden.\n\nSie besichtigten die Rümpfe eines großen Schlachtschiffs, das mit leistungsstarken Kanonen bestückt wird, kleinere Kreuzer mit modernster Radartechnologie und mechanischen Zielfernrohren an Bord sowie die Ausbildung des Personals der Kriegsmarine.\n\nAm nächsten Tag forderten sie vollständige Aufzeichnungen und Statistiken über den laufenden Bau an. Der Großadmiral erwartete, dass in den nächsten fünf Jahren mehr als die Hälfte der geplanten Schiffe gebaut werden würden. Eine Erwartung, die nicht einmal annähernd erfüllt wurde.\n\nWie erwartet war der Führer verärgert und forderte umgehend die Suspendierung der Plan-Z-Führungskräfte. Darüber hinaus waren auch negative Reaktionen aus der Bevölkerung zu vernehmen, die das Vertrauen in die insgesamt perfekte Lage im Reich minderten."
