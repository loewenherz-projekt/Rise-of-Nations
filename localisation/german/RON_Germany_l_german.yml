 GER_influence_argentina:0 "Einfluss Argentinien"
 GER_influence_argentina_desc:0 "Argentinien verfügt nicht nur über natürliche Ressourcen, sondern auch über eine strategisch wichtige Position in Amerika. Ein Verbündeter in der Nähe gefährdeter südamerikanischer Länder und gleichzeitig in Reichweite der Vereinigten Staaten zu sein, ist eine Überlegung wert."
 
