 umc_ger.397.a:0 "Wie lange können sie sie aufhalten?"

 umc_ger.398.t:0 "Vorstöße ins Sudetenland"
 umc_ger.398.d:0 "Während unsere Soldaten ohne Widerstand ins Sudetenland vorrücken, sind sie – gemeinsam mit unserem Generalstab – überrascht von der Größe und Qualität der Grenzfestungen, den sogenannten „Řepíks“. Obwohl die meisten noch in einem akzeptablen Zustand sind, wurden einige von der sich zurückziehenden tschechoslowakischen Armee beschädigt. Sie zerstörten Optiken, Funkgeräte und schwere Geschütze, da sie diese unter unserer Kontrolle nicht einsetzen wollten. Auch aufgesprühte Inschriften, die Widerstand und Abneigung ausdrücken, bilden keine Ausnahme.\n\nTrotz dieses kleinen Rückschlags werden unsere Truppen von den Sudetendeutschen als Retter begrüßt, und es gelingt uns, die Kontrolle über das gesamte Sudetenland zu übernehmen. Damit sichern wir uns alles, was nach der tschechischen Armee übrig geblieben ist – Geschütze, Artillerie und mehr. Und der Rest der Tschechoslowakei liegt in unserer Reichweite."
 umc_ger.398.a:0 "Ein kleiner Akt des Trotzes."
 
 umc_ger.399.t:0 "Die Sudetendeutschen"
 umc_ger.399.d:0 "Die Sudetendeutsche Partei wurde am 1. Oktober 1933 von Konrad Henlein unter dem Namen Sudetendeutsche Heimatfront gegründet, einige Monate nachdem die Erste Tschechoslowakische Republik die Nationalsozialistische Arbeiterpartei Deutschlands verboten hatte. Mit der wachsenden Macht der NSDAP in Deutschland entwickelte sich die Sudetendeutsche Partei zu einer wichtigen pro-nationalsozialistischen Kraft in der Tschechoslowakei mit dem ausdrücklichen Ziel, das Land zu zerschlagen und dem Dritten Reich anzuschließen. Zu diesem Zeitpunkt hatte die Partei über 1,3 Millionen Mitglieder, d. h. 40,6 % der ethnisch deutschen Bürger der Tschechoslowakei.\n\nObwohl die SdP eine Schlüsselrolle bei unserer erfolgreichen Annexion des Sudetenlandes spielte, indem sie Forderungen stellte, Veranstaltungen inszenierte, die die Unterdrückung der Deutschen in der Tschechoslowakei durch die Tschechoslowakei verdeutlichen sollten, und militärische Aktionen durchführte, bleibt unklar, welches Schicksal die Partei nun erwartet, da unser Ziel erreicht wurde.\n\nEs wäre vielleicht die beste Idee, Konrad Henlein die Macht im Sudetenland zu überlassen, da er bereits über Erfahrung mit der lokalen Verwaltung verfügt und die Position des Reichsstatthalters mehr als ausreichend ausfüllen kann. Karl Hermann Frank, ehemaliger stellvertretender Vorsitzender der SdP und bekannt als der radikalste Nationalsozialist in der SdP, könnte dann seine Position als Obergruppenführer des Polizeiapparats im Sudetenland erreichen."
 umc_ger.399.a:0 "Die Sudetendeutschen wissen am besten, wie sie sich organisieren."
 umc_ger.399.a_EXPL:0 "Erhalte §H8§! Sudetendeutsches Freikorps im Sudetenland.\n"
 umc_ger.399.b:0 "Wir werden stattdessen die direkte Herrschaft des Reiches anwenden." 
 
 ### FATE OF CZECHOSLOVAKIA
 umc_ger.400.t:0 "Ende der Tschechoslowakei"
 umc_ger.400.d:0 ""
 umc_ger.400.a:0 "Unser Präsident hat Recht. Widerstand würde nur Blutvergießen bringen."
 umc_ger.400.b:0 ""
 
 umc_ger.401.t:0 "Schicksal der Tschechoslowakei"
 umc_ger.401.d:0 "Following the secession of Ruthenia, small scale fighting in the borderland and Slovakian desire for independent state, [CZE.GetLeader] requested an audience with our Führer [GER.GetLeader]. He was granted this permission and headed to Berlin immediately.\n\nThere he met firstly with our Foreign Minister, Joachim von Ribbentrop, to whom he announced his willingness to cooperate. Then [CZE.GetLeader] met with [GER.GetLeader], gave the Czech President two options: cooperate with Germany, in which case the 'entry of German troops would take place in a tolerable manner' and 'permit Czechoslovakia a generous life of her own, autonomy and a degree of national freedom...' or face a scenario in which 'resistance would be broken by force of arms, using all means'. Due to the worsening health of [CZE.GetLeader] the negotiations lasted only a few hours - then Czech President effectively signed Czechoslovakia away to Germany.\n\nOn the morning of the next day our troops entered remaining Czech parts of Rest-Tschechei, meeting practically no resistance, apart from one organized resistance in Místek where an infantry company commanded by Karel Pavlík refused to capitulate. Next day [GER.GetLeader] went to Czech lands and from Prague Castle proclaimed the German protectorate of Böhmen und Mähren.\n\nIn a speech delivered in the Reichstag, Führer stressed the military importance of occupation, noting that by occupying Czechoslovakia, Germany gained 2,175 field cannons, 469 tanks, 500 anti-aircraft artillery pieces, 43,000 machine guns, 1,090,000 military rifles, 114,000 pistols, about a billion rounds of ammunition and three million anti-aircraft grenades. This amount of weaponry would be sufficient to arm about half of our Heer."
 umc_ger.401.a:0 "Eine direkte Herrschaft aus dem Reichssatelliten Böhmen-Mähren-Slowakei ist wünschenswert."
 umc_ger.401.b:0 "Lassen Sie die Slowaken ihren Staat und annektieren Sie den Rest."
 umc_ger.401.c:0 "Das Angebot, die Tschechoslowakei von Ungarn zu trennen, ist ein möglicher Weg."
 
 umc_ger.402.t:0 "[GER.GetName] Angebote Slowakei"
 umc_ger.402.d:0 ""
 umc_ger.402.a:0 "Unser rechtmäßiges Land wird wieder zurückerobert."
 umc_ger.402.b:0 "Wir brauchen keine Gefälligkeiten von den Deutschen."
 
 umc_ger.403.t:0 "[HUN.GetName] Akzeptiert die Slowakei"
 umc_ger.403.d:0 ""
 umc_ger.403.a:0 "So wie es sein sollte."
 
 umc_ger.404.t:0 "[HUN.GetName] lehnt die Slowakei ab"
 umc_ger.404.d:0 ""
 umc_ger.404.a:0 "Dann schließen Sie die Slowakei an das Reich an."
 umc_ger.404.b:0 "Wir werden den Slowaken ihren Staat überlassen."
 
 umc_ger.405.t:0 "[CZE.GetLeader] bleibt trotzig"
 umc_ger.405.d:0 ""
 umc_ger.405.a:0 "Ihre Verteidigung ist gebrochen. Wie wollen sie uns widerstehen?"
 umc_ger.405.b:0 "Der Gewinn des Sudetenlandes ist genug für unsere Nation."
 
