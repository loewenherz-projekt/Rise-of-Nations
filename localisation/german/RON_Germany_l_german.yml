 erwache.48.t:0 "Richtung des deutschen Kommunismus"
 erwache.48.d:0 "Nachdem wir eine provisorische Regierung gebildet und die ehemalige faschistische Regierung gestürzt haben, ist es an der Zeit, eine neue Regierung zu bilden. Der Grundstein jedes kommunistischen Übergangsstaates ist natürlich unser Endziel. Sollen wir die marxistisch-leninistische Regierungsform unserer sowjetischen Nachbarn übernehmen oder den inzwischen verbannten Trotzkismus? Vielleicht können wir mit dem Syndikalismus oder dem Rätekommunismus unseren eigenen deutschen Weg beschreiten?"
