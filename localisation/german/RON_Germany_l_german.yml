 erwache.30.t:0 "Tarifkonferenz"
 erwache.30.d:0 "Der erste Punkt auf der Tagesordnung ist die zukünftige Entwicklung der Zölle. Wir können die bereits hohen Zölle zur Freude von Nationalisten und Autarkieländern weiter erhöhen. Wir können unsere aktuellen Zölle beibehalten, was von Konservativen befürwortet wird. Oder wir können, wie die Wirtschaftsminister vorschlagen, alle Zölle abschaffen oder sogar Handel und ausländische Investitionen fördern."
 erwache.30.a:0 "Verdoppeln Sie die Zölle"
 erwache.30.b:0 "Aktuelle Tarife beibehalten"
 erwache.30.c:0 "Alle Tarife entfernen"
 erwache.30.e:0 "Handel fördern"
 
 erwache.31.t:0 "Konferenz zu Militärausgaben"
 erwache.31.d:0 "Eines der umstrittensten Themen in unserer Regierung sind die Militärausgaben. Nationalisten schlagen vor, die derzeit hohen Ausgaben beizubehalten, manche bestehen sogar darauf, unsere Anstrengungen zu verdoppeln. Konservative und Ökonomen hingegen plädieren für ein ausgewogenes Verhältnis zwischen Militär- und Zivilausgaben, und unsere Wirtschaftsminister scheinen zu glauben, dass unsere Wirtschaft von stärkeren zivilen Anstrengungen profitieren würde."
 erwache.31.a:0 "Verdoppeln Sie Ihre Ausgaben"
 erwache.31.b:0 "Aktuelle Ausgaben beibehalten"
 erwache.31.c:0 "Neugewichtung der Sektoren"
 erwache.31.e:0 "Verlagerung hin zum zivilen Sektor"
 
 erwache.32.t:0 "Konferenz zu synthetischen Ölen"
 erwache.32.d:0 "Sollte das Pulverfass Europa erneut explodieren, wird Deutschland zweifellos im Zentrum des Konflikts stehen. Mit der Modernisierung unseres Militärs wächst auch der Bedarf an Erdöl und Treibstoff. Synthetische Öle sind derzeit unsere beste Option, doch die Forschung verläuft schleppend und der Aufbau der Infrastruktur ist komplex. Was sollen wir tun?"
 erwache.32.a:0 "Sparen Sie keine Kosten bei synthetischen Stoffen"
 erwache.32.b:0 "Öffentliche Arbeiten für Kunststoffe reduzieren"
 erwache.32.c:0 "Kürzung der Militärausgaben für synthetische Stoffe"
 erwache.32.e:0 "Investieren Sie nicht in synthetische Stoffe"
 
 erwache.33.t:0 "Bürokratische Beschäftigungskonferenz"
 erwache.33.d:0 "Schließlich müssen wir entscheiden, welche Art von Menschen wir in unserer Bürokratie haben wollen. Wir können zwischen Autarkie, Technokraten, Konservativen, Nationalisten und Kollektivisten für die Besetzung unserer Wirtschaftsinstitutionen wählen."
 erwache.33.a:0 "Autarke"
 erwache.33.b:0 "Technokraten"
 erwache.33.c:0 "Konservative"
 erwache.33.e:0 "Nationalisten"
 erwache.33.f:0 "Kollektivisten"
 
 erwache.34.t:0 "Der Verfassungskonvent beginnt"
 erwache.34.d:0 "Vertreter der Länder, der neuen Bundesregierung und weitere Berater haben sich in Berlin getroffen, um zu beraten, wie unsere neue Regierung aussehen soll."
 erwache.34.a:0 "Beginnen wir mit der Tagung"
 
 erwache.35.t:0 "Beendigung der Konvention"
 erwache.35.d:0 "Nachdem der Kongress nun vorbei ist und unsere Verfassung verfasst ist, müssen wir entscheiden, wie wir unsere neuen Gründungsdokumente offiziell umsetzen."
 erwache.35.a:0 "Öffentliche Abstimmung"
 erwache.35.b:0 "Abstimmung im Parlament"
 erwache.35.c:0 "Dekret ohne Abstimmung"
 
 erwache.36.t:0 "Verfassungskonvent: Ursprünge der Macht"
 erwache.36.d:0 "Alle Regierungen müssen ihre Legitimität und Macht irgendwoher beziehen. Ob von Gott, vom Thron oder vom Volk – Deutschland bildet da keine Ausnahme."
 erwache.36.a:0 "Unser Gott"
 erwache.36.b:0 "Die Menschen"
 erwache.36.c:0 "Der Thron"
 
 erwache.37.t:0 "Verfassungskonvent: Organisation"
 erwache.37.d:0 "Die Organisationsform unserer neuen Regierung ist wohl das wichtigste Element unserer Verfassung. Die Frage ist: Wie werden wir unsere Regierung organisieren?"
 erwache.37.a:0 "Demokratie"
 erwache.37.b:0 "Parlamentarische Republik"
 erwache.37.c:0 "Parlamentarische Monarchie"
 erwache.37.e:0 "Absolute Monarchie"
 
 erwache.38.t:0 "Verfassungskonvent: Die Rechte des Volkes"
 erwache.38.d:0 "Obwohl die Organisation der Regierung wichtig ist, sind die vom Volk garantierten und vom Staat eingeschränkten Rechte für das Überleben einer Gesellschaft von entscheidender Bedeutung. Welche Rechte soll unser Volk genießen?"
 erwache.38.a:0 "Volle und gleiche Rechte"
 erwache.38.b:0 "Ausgewogene Rechte"
 erwache.38.c:0 "Regierungsfreundliche Rechte"
 
 erwache.39.t:0 "Verfassungskonvent: Wahlrecht"
 erwache.39.d:0 "Das 20. Jahrhundert hat viele Revolutionen erlebt, die bedeutendste davon dürfte die Revolution des Frauenwahlrechts auf der ganzen Welt sein. Sollten wir die Revolution annehmen oder unseren Traditionen treu bleiben? Oder noch wichtiger: Sollten wir die Macht auf den alten Adel beschränken?"
 erwache.39.a:0 "Volles Wahlrecht"
 erwache.39.b:0 "Männerwahlrecht"
 erwache.39.c:0 "Wahlrecht des Adels"
 
 erwache.40.t:0 "Unser neuer Kanzler"
 erwache.40.d:0 "Nachdem wir nun eine demokratische Regierungsstruktur haben, ist es an der Zeit, unseren ersten Kanzler zu wählen. Adenauer ist ein überzeugter Konservativer, der bei dieser demokratischen Basis sowie bei vielen ehemaligen Monarchisten und Nationalisten große Anziehungskraft genießt. Schumacher hingegen ist ein Sozialdemokrat, was den konservativen Regierungsparteien Sorgen bereitet, bei der starken linken Basis jedoch eher Anklang findet."
 erwache.40.a:0 "Konrad Adenauer"
 erwache.40.b:0 "Kurt Schumacher"
 
 erwache.41.t:0 "Deutschland bietet den ostindischen Kolonien Schutz"
 erwache.41.d:0 "Die erstarkten Deutschen halten unser Militär für nicht stark genug, um unsere Kolonialgebiete zu schützen. Auch wenn sie damit Recht haben und unsere wirtschaftliche Bedeutung immer weiter abnimmt, sollten wir diesen Schlag für unsere Wirtschaftskraft hinnehmen?"
 erwache.41.a:0 "Gebt ihnen die Kolonien"
 erwache.41.b:0 "Behalte unsere Kolonien"
 
 erwache.42.t:0 "Deutschland bietet den südamerikanischen Kolonien Schutz"
 erwache.42.d:0 "Die erstarkten Deutschen halten unser Militär für nicht stark genug, um unsere Kolonialgebiete zu schützen. Auch wenn sie damit Recht haben und unsere wirtschaftliche Bedeutung immer weiter abnimmt, sollten wir diesen Schlag für unsere Wirtschaftskraft hinnehmen?"
 erwache.42.a:0 "Gebt ihnen die Kolonien"
 erwache.42.b:0 "Behalte unsere Kolonien"
 
 erwache.43.t:0 "Deutschland bietet Schutz für Belgisch-Kongo"
 erwache.43.d:0 "Die erstarkten Deutschen halten unser Militär für nicht stark genug, um unsere Kolonialgebiete zu schützen. Auch wenn sie damit Recht haben und unsere wirtschaftliche Bedeutung immer weiter abnimmt, sollten wir diesen Schlag für unsere Wirtschaftskraft hinnehmen?"
 erwache.43.a:0 "Gib ihnen die Kolonie"
 erwache.43.b:0 "Behalte unsere Kolonie"
 
 erwache.45.t:0 "Die Holländer haben uns Ostindien gegeben!"
 erwache.45.d:0 "Die Niederländer haben unser Angebot angenommen, Ostindien zu schützen! Was sollen wir mit den Gebieten tun?"
 erwache.45.a:0 "Eine deutsche Regierung einsetzen"
 erwache.45.b:0 "Angliedern Sie sie"
 erwache.45.c:0 "Befreie sie"
 
 erwache.45.t:0 "Die Niederländer haben uns das niederländische Südamerika geschenkt!"
 erwache.45.d:0 "Die Niederländer haben unser Angebot angenommen, ihre amerikanischen Besitzungen zu schützen! Was sollen wir mit den Gebieten tun?"
 
 erwache.45.t:0 "Die Holländer haben uns den Kongo gegeben!"
 erwache.45.d:0 "Die Niederländer haben unser Angebot angenommen, den Kongo zu schützen! Was sollen wir mit den Gebieten tun?"
 
 
