l_german:
 MEN.2.t:0 "Sieg in Suiyuan"
 MEN.2.d:0 "Seit unsere Truppen in der Provinz Suiyuan Fuß gefasst haben, ist klar, dass die Chinesen nicht in der Lage sind, einen Gegenangriff zu organisieren und weiteren Widerstand zu leisten. Unsere japanischen Beschützer sind jedoch nicht bereit, den Krieg zu verlängern und zu eskalieren und drängen auf einen Friedensvertrag, der die aktuellen De-facto-Grenzen formalisieren würde."
 MEN.2.a:0 "Dies ist nur der erste Schritt beim Aufbau eines neuen Imperiums!"
 MEN.3.t:0 "Zurückgreifen"
 MEN.3.d:0 "Selbst mit japanischer Unterstützung ist es uns nicht gelungen, Suiyuan zu erobern. Um eine weitere Verschlechterung der Lage zu verhindern, drängt Japan auf einen Friedensvertrag, der die Vorkriegsgrenzen zu China sichern soll."
 MEN.3.c:0 "Wir werden an einem anderen Tag kämpfen"
 MEN.4.t:0 "Sieg bei Ningxia"
 MEN.4.d:0 "Wir haben die Streitkräfte muslimischer Kriegsherren erfolgreich aus Ningxia vertrieben, während die Zentralregierung zu beschäftigt war, um einzugreifen. Da das Hauptziel der Kampagne erreicht ist, treiben unsere japanischen Förderer einen Friedensvertrag voran, der die aktuellen De-facto-Grenzen formalisiert."
 MEN.4.a:0 "Ein toller Tag"
 MEN.5.t:0 "Zurückgreifen"
 MEN.5.d:0 "Selbst mit japanischer Unterstützung ist es uns nicht gelungen, Ningxia zu erobern. Um eine weitere Verschlechterung der Lage zu verhindern, drängt Japan auf einen Friedensvertrag, der die Vorkriegsgrenzen zu China sichern soll."
 MEN.5.c:0 "Wir werden an einem anderen Tag kämpfen"
 MEN.6.t:0 "Die Mongolei ist wiedervereinigt"
 MEN.6.d:0 "Nach langem Ringen ist es uns endlich gelungen, die Völker der Inneren und Äußeren Mongolei zu vereinen. Nun ist [Root.GetLeader]s Anspruch auf ein wiedervereinigtes Mongolisches Reich und sein Erbe unbestreitbar."
 MEN.6.a:0 "Ruhm dem Khan!"
 MEN.7.t:0 "Glorreiche Allianz"
 MEN.7.d:0 "Wir haben Japan und der Welt unsere Macht und unseren Wert bewiesen. Unser Khan ist nicht länger der Diener des japanischen Kaisers, sondern sein Partner und Verbündeter. Es ist Zeit, aus dem Schatten zu treten!"
 MEN.7.a:0 "Es lebe Asien!"
 MEN.8.t:0 "Suiyuan-Gelegenheit"
 MEN.8.d:0 "Der Gouverneur von Shanxi ist wieder mit internen Konflikten in China beschäftigt. Dies ist die perfekte Gelegenheit, Truppen zu entsenden und die mongolischen Gebiete von Suiyuan zu sichern, während die Chinesen abgelenkt sind."
 MEN.8.a:0 "Prächtig"
 MEN.9.t:0 "Armee erweitern?"
 MEN.9.d:0 "Während unserer Vorbereitungskampagne schlugen einige japanische Beamte vor, weitere Männer aus Kollaborateuren, Deserteuren und sogar Banditen anzuwerben. Wir konnten den mongolischen Kriegsherrn Buyandelger, auch bekannt als Li Shouxin, und seine kampferprobte Kavallerie, den chinesischen Kollaborateur Wang Ying mit seiner Großen Han-Armee und viele unorganisierte Rebellen und Milizen überzeugen."
 MEN.9.a:0 "Rekrutiere Li Shouxin"
 MEN.9.b:0 "Rekrutiere beide Kriegsherren"
 MEN.9.c:0 "Wir brauchen jeden Soldaten, den wir kriegen können!" 
 MEN.10.t:0 "Ningxia-Chance"
 MEN.10.d:0 "Muslimische Generäle sind wieder mit internen Konflikten in China beschäftigt. Dies ist die perfekte Gelegenheit, Truppen zu entsenden und die mongolischen Gebiete von Ningxia zu sichern, während die Chinesen abgelenkt sind."
 MEN.10.a:0 "Prächtig"
 MEN.11.t:0 "Mongolen fordern gleichberechtigtes Bündnis" 
 MEN.11.d:0 "Da unsere mongolischen Marionettenkriegsherren große Erfolge bei der Vereinigung ihrer ethnischen Länder erzielt haben, behaupten ihre Führer nun, sie bräuchten unsere Schirmherrschaft nicht mehr und verdienten Freiheit. Stattdessen schlagen sie ein gleichberechtigtes Bündnis zwischen unseren Nationen im Einklang mit den Ideen des Panasiatismus vor. Wie sollen wir darauf reagieren?"
 MEN.11.a:0 "Ein ergebener Verbündeter ist besser als ein untreuer Untertan"
 MEN.11.b:0 "Niemals"
 MEN.12.t:0 "Japan lehnte ab"
 MEN.12.d:0 "Nach langer Überlegung beschloss die japanische Regierung, unseren Antrag auf Unabhängigkeit abzulehnen."
 MEN.12.a:0 "Wir können nicht widerstehen"
 MEN.12.b:0 "Dann müssen wir für unsere Freiheit kämpfen!"
 MEN.13.t:0 "Japan stimmte zu"
 MEN.13.d:0 "Nach langer Überlegung beschloss die japanische Regierung, unseren Vorschlag anzunehmen und uns die Unabhängigkeit zu gewähren."
 MEN.13.a:0 "Endlich!"
 MEN.14.t:0 "Einladung aus der Mongolei"
 MEN.14.d:0 "Die nach einem antikommunistischen Putsch gebildete provisorische Regierung der Mongolei hat eine Delegation zu Prinz Demchugdongrub geschickt. Sie lädt ihn ein, den Thron in der Äußeren Mongolei zu besteigen. Obwohl es verlockend ist, Mengjiang und die Mongolei gleichzeitig zu halten, ist es unmöglich: Japan wird uns keine allzu große Unabhängigkeit gestatten, und die mongolische Elite ist nicht bereit, sich von Japan abhängig zu machen." 
 MEN.14.a:0 "Demchugdongrub flieht in die Mongolei"
 MEN.14.b:0 "Demchugdongrub flieht in die Mongolei (Wechsel zu MON)"
 MEN.14.c:0 "Demchugdongrub bleibt in Mengjiang"
 MEN.15.t:0 "Demchugdongrub besteigt den Thron"
 MEN.15.d:0 "Prinz Demchugdongrub hat unsere Einladung angenommen und besteigt nun den Thron als Khan der Mongolei"
 MEN.15.a:0 "Ruhm dem Khan!"
 MEN.16.t:0 "Demchugdongrub lehnte ab"
 MEN.16.d:0 "Prinz Demchugdongrub hat unsere Einladung zum Thron abgelehnt und wir müssen einen anderen Kandidaten in Betracht ziehen."
 MEN.16.a:0 "Thronen Sie dann Tserendondovyn Navaanneren"
 
 
 MEN_prepare:0 "Bereite dich auf den Krieg vor"
 MEN_prepare_desc:0 "Unsere derzeitigen Streitkräfte bestehen größtenteils aus Demchugdongrubs eigener Garde. Bevor wir in den Krieg gegen die chinesischen Kriegsherren ziehen, müssen wir mehr Männer unter unserer Flagge sammeln."
 MEN_consolidate:0 "Aimags konsolidieren"
 MEN_consolidate_desc:0 "Die Innere Mongolei befindet sich nach der Niederlage der Antijapanischen Armee noch immer in Aufruhr. Mit Hilfe unserer japanischen Verbündeten ist es uns gelungen, die Macht zu ergreifen, und nun ist es an der Zeit, sie zu formalisieren und zu stärken.&quot; MEN_prepare_desc:0 &quot;Trotz unserer Bemühungen, die Mongolen zu vereinen, hält die republikanische Regierung noch immer viele unserer rechtmäßigen Gebiete. Jetzt, da China schwach und gespalten ist, müssen wir unsere Streitkräfte unbedingt schnellstmöglich aufbauen."
 MEN_central_academy:0 "Zentralakademie von Kalgan"
 MEN_central_academy_desc:0 "Die Akademie von Kalgan wurde von den Japanern als lokale Geheimdienstschule gegründet, aber wir können daraus einen Vorteil ziehen, indem wir mehr Kontrolle über sie erlangen und sie in unsere eigene Offiziersschule umwandeln."
 MEN_general_staff_focus:0 "Reorganisieren Sie den Generalstab"
 MEN_general_staff_focus_desc:0 "Unser Oberkommando ist heute eine lose Zusammensetzung aus mongolischen Feudalherren und japanischen Beratern. Durch die Formalisierung unseres Generalstabs und die Beförderung gut ausgebildeter Offiziere können wir seine Kompetenz verbessern und seine Autonomie gegenüber dem japanischen Militär bewahren."
 MEN_bank:0 "Währungsreform"
 MEN_bank_desc:0 "Die Bank von Mengjiang wurde von Japanern gegründet und ihre Währung ist an sich fast wertlos. Während sie zu sehr damit beschäftigt sind, unsere Finanzangelegenheiten zu kontrollieren, können wir versuchen, mehr Kontrolle über unser eigenes Bankensystem zu erlangen und unsere Währung abzuwerten."
 MEN_mining:0 "Bergbau erweitern"
 MEN_mining_desc:0 "Chahar ist eine von Natur aus eisenreiche Region, die jedoch sowohl von chinesischen als auch von japanischen Industriellen aufgegeben wurde. Mit etwas Aufwand können wir lokale Minen erschließen und so etwas weniger abhängig von den Rohstoffen werden."
 MEN_infrastructure:0 "Generaldirektion Kommunikation"
 MEN_infrastructure_desc:0 "Chahar ist ein riesiges, unerschlossenes Ödland, das für groß angelegte Militäroperationen ungeeignet ist. Da wir Krieg gegen die Chinesen führen werden, ist es notwendig, eine angemessene militärische Infrastruktur aufzubauen und unsere Logistik auf die bevorstehenden Schlachten vorzubereiten."
 MEN_reassure_claims:0 "Staatsgründungskonferenz"
 MEN_reassure_claims_desc:0 "Obwohl wir die Gunst und Unterstützung Japans gewonnen haben, sind unsere Beziehungen noch immer weitgehend uneinheitlich. Wir sollten eine Konferenz abhalten, auf der Vertreter beider Seiten den Plan zur Gründung eines neuen Mongolischen Reiches genehmigen."
 MEN_japanese_investors:0 "Japanische Investoren"
 MEN_japanese_investors_desc:0 "Trotz jüngster Fortschritte ist die Wirtschaft Mengjiangs noch immer ein Desaster. Zwar fehlen dem Land ausreichende Voraussetzungen für eine eigenständige Industrialisierung, doch ist es möglich, japanische Zaibatsu durch Steuererleichterungen anzuziehen."
 MEN_royal_marriage:0 "Königliche Hochzeit"
 MEN_royal_marriage_desc:0 "Demchugdongrubs Hof genießt mittlerweile so großes Ansehen, dass er in einflussreichen Häusern Japans willkommen ist. Wenn wir eine Heirat zwischen Demchugdongrubs Sohn und einem Mitglied einer bedeutenden japanischen Adels- oder Geschäftsdynastie arrangieren, können wir sicherstellen, dass unsere Stimme am kaiserlichen Hof gehört wird."
 MEN_suiyuan_offensive:0 "Shanxi infiltrieren"
 MEN_suiyuan_offensive_desc:0 "Suiyuan und Ordos waren schon immer mongolische Provinzen. Mit japanischer Unterstützung können wir sie infiltrieren und unseren Angriff vorbereiten."
 MEN_invade_ma:0 "Infiltrieren Sie Ma"
 MEN_invade_ma_desc:0 "Unser nächstes Ziel sind die mongolischen Provinzen, die derzeit von muslimischen Kriegsherren kontrolliert werden. Unsere Armeen, inspiriert durch den Sieg in Suiyuan, sind bereit, sie zurückzuerobern. Wir brauchen nur noch einige Vorbereitungen."
 MEN_invade_MON:0 "Einigungskrieg"
 MEN_invade_MON_desc:0 "Jetzt, da die gesamte Innere Mongolei uns gehört, können wir uns endlich auf den letzten Kampf vorbereiten – den Khalkha-Feldzug – und alle Mongolen endgültig vereinen."
 MEN_japanese_planes:0 "Japanische Flugzeuge"
 MEN_japanese_planes_desc:0 "Die japanische Regierung ist bereit, uns für zukünftige Kampagnen einige Flugzeuge zur Verfügung zu stellen. Dies wird unsere Abhängigkeit vom japanischen Militär erhöhen, da alle Piloten weiterhin Japaner sein werden, aber auch unsere Kampfkraft deutlich steigern."
 MEN_standing_advisors:0 "Ständige Berater"
 MEN_standing_advisors_desc:0 "Die Präsenz qualifizierter japanischer Spezialisten in unseren Streitkräften war sporadisch, vor allem in Zeiten intensiver Militäreinsätze. Wir werden uns bemühen, sie regelmäßig zu halten."
 MEN_greater_mongolia:0 "Große Mongolei"
 MEN_greater_mongolia_desc:0 "Die Welt hat die Wiedergeburt der Mongolei bereits erlebt. Doch das ist nicht genug – unsere Mission ist es, ihr ihren wahren Glanz der Vergangenheit zurückzugeben!"
 MEN_independence_peaceful:0 "Suchen Sie nach einer gleichberechtigten Allianz"
 MEN_independence_peaceful_desc:0 "Das Ziel der Mengjiang-Regierung ist erreicht: Die mongolischen Länder sind wieder vereint. Da wir uns ein gewisses Maß an Unabhängigkeit leisten können, müssen wir Verhandlungen mit der japanischen Regierung über mehr Autonomie und die Bildung einer gleichberechtigten panasiatischen Allianz aufnehmen."
 MEN_independence_war:0 "Abspaltung"
 MEN_independence_war_desc:0 "Unsere Tage als bloße Kriegsherren sind vorbei. Es ist Zeit, unseren Platz an der Sonne einzunehmen, und Japan kann uns dabei nicht im Weg stehen."
 MEN_rebuild_army:0 "Armee wieder aufbauen"
 MEN_rebuild_army_desc:0 "Unser Team hat bei den Aktionen in Suiyuan Schaden genommen und muss sich vor dem nächsten Feldzug erholen. Um dieses Ziel zu erreichen, müssen wir erbeutete chinesische Ausrüstung nutzen und Japan um zusätzliche Lieferungen bitten."
 MEN_feudal_republic:0 "Fürstenrepublik"
 MEN_feudal_republic_desc:0 "Obwohl Mengjiang gemäß den Beschlüssen der Staatsgründungskonferenz eine Monarchie sein soll, benötigt das Land ein gewisses Maß an Dezentralisierung. Indem wir die Freiheiten der Feudalfürsten formalisieren und ihnen das Recht einräumen, ihren Thronfolger zu wählen, können wir ihre Unterstützung gewinnen und die Probleme mit ihren Stämmen lösen."
 MEN_monarchy:0 "Khanat"
 MEN_monarchy_desc:0 "Gemäß den Beschlüssen der Staatsgründungskonferenz soll Mengjiang eine Monarchie sein, die nur vorübergehend von einem Komitee regiert wird. Es ist an der Zeit, diese Aussage durch die Zentralisierung der Macht des Herrschers und die Schaffung spezieller Militäreinheiten zu untermauern, die ihm direkt treu ergeben sind."
 MEN_technology_sharing:0 "Wissenschaftliche Zusammenarbeit"
 MEN_technology_sharing_desc:0 "Die japanische Wissenschaft mag unmenschlich sein und sich stark von der westlichen unterscheiden, doch sie hat sich als die beste in Asien erwiesen. Um unsere eigene Wissenschaft zu entwickeln, sind wir auf japanische Kollegen angewiesen."

 MEN_army_effort:0 "Armeeeinsatz"
 MEN_army_effort_desc:0 "Trotz der zunehmenden Möglichkeiten der Luft- und Seekriegsführung bleibt der Bodenkampf auch in den Kriegen von morgen von zentraler Bedeutung. Mit entsprechender Vorbereitung können wir die Hölle der Schützengräben vermeiden."
 MEN_equipment_effort:0 "Geräteaufwand"
 MEN_equipment_effort_desc:0 "Die Grenzen der Ausrüstung, die von Infanterie getragen werden kann, werden ständig erweitert. Wir werden uns darauf konzentrieren, unseren Truppen die beste verfügbare Ausrüstung zur Verfügung zu stellen."
 MEN_motorization_effort:0 "Motorisierungsbemühungen"
 MEN_motorization_effort_desc:0 "Mobilität und Schutz sind entscheidend für den sicheren Transport der Infanterie ins Feld und wieder hinaus. Wenn wir uns auf diese Entwicklungen konzentrieren, können wir schnell handeln."
 MEN_doctrine_effort:0 "Lehrbemühungen"
 MEN_doctrine_effort_desc:0 "Die militärischen Doktrinen, die den Bodenkampf im Ersten Weltkrieg bestimmten, sind überholt. Wir müssen unsere besten Köpfe mit der Aufgabe betrauen, das militärische Denken von morgen zu gestalten."
 MEN_equipment_effort_2:0 "Ausrüstungsaufwand II"
 MEN_equipment_effort_2_desc:0 "Wir werden unsere Bemühungen fortsetzen, sicherzustellen, dass unsere Infanterie- und Unterstützungstruppen mit der bestmöglichen Ausrüstung unserer Zeit ausgestattet sind."
 MEN_mechanization_effort:0 "Mechanisierungsbemühungen"
 MEN_mechanization_effort_desc:0 "Indem wir die Möglichkeiten der motorisierten Infanterie überdenken, können wir die Grenzen der heute konstruierbaren Fahrzeuge erweitern."
 MEN_doctrine_effort_2:0 "Lehrbemühung II"
 MEN_doctrine_effort_2_desc:0 "Das Schlachtfeld hat sich nicht nur in der Zwischenkriegszeit, sondern auch im Verlauf der jüngsten Konflikte verändert. Wir müssen unsere Doktrinen kontinuierlich neu bewerten, um dies widerzuspiegeln."
 MEN_equipment_effort_3:0 "Ausrüstungsaufwand III"
 MEN_equipment_effort_3_desc:0 "Anstatt ausländische Ausrüstung zu imitieren oder zu kaufen, sollten wir darauf abzielen, weltweit führend im Bereich Infanteriewaffen zu werden."
 MEN_armor_effort:0 "Rüstungsaufwand"
 MEN_armor_effort_desc:0 "Indem wir das anwenden, was wir bei der Mechanisierung unserer Infanterie gelernt haben, können wir auch unsere gepanzerten Fahrzeuge verbessern."
 MEN_special_forces:0 "Spezialeinheiten"
 MEN_special_forces_desc:0 "Wir brauchen Elitetruppen; Gebirgsjäger und Fallschirmjäger sollten unsere Priorität sein."
 MEN_aviation_effort:0 "Luftfahrtbemühungen"
 MEN_aviation_effort_tt:0 "Nicht genügend Bauplätze für §YAir Base§!"
 MEN_aviation_effort_desc:0 "Nirgendwo schreitet der technologische Fortschritt schneller voran als in der Luftkriegsführung. Die Luftfahrt ist ein Gebiet, das jede moderne Nation beherrschen muss."
 MEN_fighter_focus:0 "Kämpferfokus"
 MEN_fighter_focus_desc:0 "Luftkämpfe haben im Ersten Weltkrieg noch nicht stattgefunden. Wenn wir bei der Entwicklung von Kampfflugzeugen die Nase vorn haben, werden wir auch in Zukunft einen Vorteil haben."
 MEN_bomber_focus:0 "Bomberfokus"
 MEN_bomber_focus_desc:0 "Wenn die Menschen in Zukunft vom Schrecken der heutigen Kriege sprechen, wird Feuer, das vom Himmel regnet, eine zentrale Rolle spielen. Wir werden unser Bestes tun, um sicherzustellen, dass diese Geschichten auch von unseren Feinden erzählt werden."
 MEN_aviation_effort_2:0 "Luftfahrtbemühungen II"
 MEN_aviation_effort_2_desc:0 "Um unsere Luftwaffe gut in andere Zweige des Militärs zu integrieren, sind weitere Fortschritte in der Luftfahrt erforderlich."
 MEN_CAS_effort:0 "CAS-Aufwand"
 MEN_CAS_effort_desc:0 "Eine moderne Armee benötigt nicht nur am Boden, sondern auch in der Luft die Unterstützung durch Fahrzeuge."
 MEN_rocket_effort:0 "Raketenanstrengung"
 MEN_rocket_effort_desc:0 "Raketen- und Düsentriebwerke ermöglichen sowohl unbemannten als auch bemannten Schiffen beispiellose Geschwindigkeiten. Die Entwicklung dieser Technologien wird es uns ermöglichen, den Feind zu überraschen."
 MEN_NAV_effort:0 "NAV-Aufwand"
 MEN_NAV_effort_desc:0 "So wie die neue Seekriegsführung teilweise unter der Wasseroberfläche stattfindet, findet ein Teil davon in der Luft über dem Wasser statt."
 MEN_naval_effort:0 "Marinebemühungen"
 MEN_naval_effort_tt:0 "Nicht genügend Bauplätze für §YNaval Dockyards§!"
 MEN_naval_effort_desc:0 "Der Ausbau unserer Marine sollte unsere oberste Priorität sein. Alle verfügbaren Ressourcen sollten für neue Werften und die Erforschung leichter Überwasserschiffe eingesetzt werden."
 MEN_flexible_navy:0 "Flexibles Marineblau"
 MEN_flexible_navy_desc:0 "Durch die Neugestaltung der Seekriegsführung unter Berücksichtigung der Fortschritte in der U-Boot-Technologie können wir feindliche Konvois effizient bekämpfen."
 MEN_large_navy:0 "Große Marine"
 MEN_large_navy_desc:0 "Die Anpassung unserer Marinedoktrinen an große Schiffe und die Gewährleistung der Sicherheit unserer Handelskonvois wird uns viel darüber beibringen, welche Art von Schiffen wir benötigen."
 MEN_submarine_effort:0 "U-Boot-Anstrengungen"
 MEN_submarine_effort_desc:0 "Der U-Boot-Krieg ist die spannendste Entwicklung in der Marine seit der Erfindung des Torpedoboots. Wir tun gut daran, uns nicht nur vor U-Booten zu schützen, sondern sie auch gegen feindliche Schiffe einzusetzen."
 MEN_cruiser_effort:0 "Kreuzer-Anstrengung"
 MEN_cruiser_effort_desc:0 "Bevor wir uns auf die Erforschung fortgeschrittener Schlachtschiffe konzentrieren können, müssen die kleineren Kreuzer ersetzt werden."
 MEN_destroyer_effort:0 "Zerstörer-Anstrengung"
 MEN_destroyer_effort_desc:0 "Durch die Untersuchung der Konstruktion und des strategischen Einsatzes von U-Booten haben wir auch gelernt, wie wir diesen Strategien entgegenwirken können. Zerstörer werden dabei eine entscheidende Rolle spielen."
 MEN_capital_ships_effort:0 "Großkampfschiff-Anstrengung"
 MEN_capital_ships_effort_desc:0 "Die Nation mit den meisten Schlachtschiffen wird die Weltmeere beherrschen. Schlachtschiffe und Flugzeugträger repräsentieren die alte und die neue Seeüberlegenheit."
 MEN_industrial_effort:0 "Industrielle Anstrengungen"
 MEN_industrial_effort_desc:0 "Konzentrieren Sie alle unsere politischen Anstrengungen darauf, die zivile Industrie mit einem großen Sprung nach vorne aufzubauen."
 MEN_industrial_effort_2:0 "Industrielle Anstrengung II"
 MEN_industrial_effort_2_desc:0 "Mit eisernem Willen und einer unermüdlichen Arbeitsmoral können wir die Menschen zu einer weiteren großen industriellen Anstrengung mobilisieren."
 MEN_construction_effort:0 "Bauaufwand"
 MEN_construction_effort_tt:0 "Nicht genügend Bauplätze für §YCivilian Factories§!"
 MEN_construction_effort_desc:0 "Auch wenn weltweit ein Krieg droht, darf die zivile Industriekapazität nicht unterschätzt werden."
 MEN_production_effort:0 "Rüstungsanstrengungen"
 MEN_production_effort_tt:0 "Nicht genügend Bauplätze für §YMilitärfabrik§!"
 MEN_production_effort_desc:0 "Wer Traktoren bauen kann, kann auch Panzer bauen! Wir dürfen nicht zulassen, dass unsere militärische Produktionskapazität zurückbleibt."
 MEN_construction_effort_2:0 "Baumaßnahme II"
 MEN_construction_effort_2_desc:0 "Durch den weiteren Ausbau unserer Fabriken können wir die Produktion von Waren für den Handel und weitere Bauvorhaben beschleunigen."
 MEN_production_effort_2:0 "Rüstungsanstrengung II"
 MEN_production_effort_2_desc:0 "Der Versuch, zivile Fabriken für die Produktion militärischer Ausrüstung umzurüsten, ist ineffizient. Wir sollten uns jetzt auf die Vorbereitung der Rüstungsproduktion konzentrieren."
 MEN_production_effort_3:0 "Rüstungsanstrengung III"
 MEN_production_effort_3_desc:0 "Um den Bedarf an neuer Ausrüstung zu decken, sind kontinuierliche Anstrengungen zum Ausbau unserer Militärfabriken erforderlich."
 MEN_infrastructure_effort:0 "Infrastrukturaufwand"
 MEN_infrastructure_effort_desc:0 "Ein Land ohne angemessene Infrastruktur kann keine fortschrittlichen Projekte oder Bauvorhaben durchführen."
 MEN_infrastructure_effort_tt:0 "Nicht genügend Bauplätze für §YInfrastruktur§!"
 MEN_synth_oil_effort_tt:0 "Nicht genügend Bauplätze für §YSynthetische Raffinerie§!"
 MEN_infrastructure_effort_2:0 "Infrastrukturbemühungen II"
 MEN_infrastructure_effort_2_desc:0 "Der weitere Ausbau unserer Infrastruktur wird die für geheime Hightech-Projekte notwendigen Transport- und Kommunikationsmittel ermöglichen."
 MEN_construction_effort_3:0 "Baumaßnahme III"
 MEN_construction_effort_3_desc:0 "Durch den Ausbau unseres Infrastrukturnetzes haben wir unsere Baukapazitäten deutlich verbessert."
 MEN_nuclear_effort:0 "Nukleare Anstrengungen"
 MEN_nuclear_effort_desc:0 "Wir stehen am Rande einer weltverändernden Entdeckung und können nicht zulassen, dass andere das Feuer entfachen, das eines Tages die Erde verzehren könnte."
 MEN_extra_tech_slot:0 "Zusätzlicher Forschungsplatz"
 MEN_extra_tech_slot_desc:0 "Unsere industrielle Expansion und andere aktuelle Fortschritte könnten es uns ermöglichen, parallel mehr Forschung und Entwicklung durchzuführen."
 MEN_extra_tech_slot_2:0 "Zusätzlicher Forschungsplatz II"
 MEN_extra_tech_slot_2_desc:0 "Die schnelle Industrialisierung unseres Landes hat neue Möglichkeiten in Forschung und Entwicklung eröffnet, die wir nutzen sollten."
 MEN_secret_weapons:0 "Geheimwaffen"
 MEN_secret_weapons_desc:0 "Es ist verlockend, alle zusätzlichen Ressourcen in die Entwicklung von Panzern und Flugzeugen zu stecken, aber das Geheimnis, Kriege zu gewinnen, liegt in ganz neuen Wissenschaftsbereichen: Elektronik, Raketentechnik und Nuklearforschung."
 MEN_air_innovation:0 "Luftinnovationen"
 MEN_air_innovation_desc:0 "Moderne Kriege können nicht gewonnen werden, ohne den Himmel zu beherrschen. Wir müssen alles in unserer Macht Stehende tun, um die Luftwaffe auszubauen!"
 MEN_air_innovation_2:0 "Luftinnovationen II"
 MEN_air_innovation_2_desc:0 "Jeder Vorteil, den wir in der Luft erlangen können, ist wertvoll. Wir sollten all unsere Anstrengungen auf die Entwicklung unserer Kampfflugzeuge konzentrieren."
 MEN_naval_air_effort:0 "Luftangriffe der Marine"
 MEN_naval_air_effort_desc:0 "Die Wirksamkeit von Luftangriffen auf Seeziele wurde von den Amerikanern bereits 1921 demonstriert. Wir sollten diesen Zweig der Luftwaffe nicht vernachlässigen, wenn wir Krieg gegen eine Seemacht führen wollen."

