QIN_legacy_sino_japanese_war:0 "Erbe des Chinesisch-Japanischen Krieges"
QIN_legacy_sino_japanese_war_desc:0 "In den 1870er bis 1890er Jahren versuchte die Regierung, ihre Armee und Industrie zu modernisieren, indem sie moderne Panzerschiffe kaufte und ihre Armeeuniformen und -taktiken modernisierte. Trotz aller Bemühungen wurden wir im Japanisch-Chinesischen Krieg vom japanischen Stiefel zermalmt, und alle Hoffnungen auf einen Erfolg unserer „Verwestlichungsbewegung“ waren dahin."
QIN_low_legitimacy:0 "Geringe Integrität"
QIN_low_legitimacy_desc:0 "Nach gebrochenen Versprechen und dem Putsch der Kaiserin sind viele Intellektuelle und Bürgerliche, die auf Reformen hofften, des Status Quo überdrüssig geworden."
QIN_outdated_army:0 "Veraltete Armee"
QIN_outdated_army_desc:0 "Trotz unserer jüngsten „Verwestlichungsbewegung“ sind die meisten unserer Armeen und ihre Taktiken noch immer veraltet. Viele Einheiten setzen noch immer Speere, Schilde und Holzboote gegen Gewehre, Kanonen und Panzerschiffe ein."
QIN_foreign_concessions:0 "Ausländische Konzessionen"
QIN_foreign_concessions_desc:0 "Mit der Unterzeichnung der Ungleichen Verträge erhielten ausländische Mächte das Recht, Konzessionen zu besitzen und auf unserem Gebiet zu bauen. Dies veranlasste regionale Gouverneure, Abkommen mit den Ausländern zu schließen und unsere Macht in vielen Regionen des Reiches stark zu verringern."
QIN_foreign_concessions_2:0 "Erhöhte ausländische Zugeständnisse"
QIN_minority_revolts:0 "Minderheitenaufstände"
QIN_minority_revolts_desc:0 "Viele Minderheiten im Reich haben sich gegen unseren Mandschu-Monarchen gestellt und begonnen, Sabotageakte zu verüben und nationalistische Propaganda zu verbreiten."
QIN_agrarian_society:0 "Agrargesellschaft"
QIN_agrarian_society_desc:0 "Obwohl in den nördlichen Provinzen Peking und Shanghai eine gewisse Industrialisierung stattgefunden hat, ist China in weiten Teilen noch immer eine fast feudale Gesellschaft mit kleinen Bauernhöfen und ohne Industrialisierung."
QIN_outdated_army_2:0 "Veraltete Armee"
QIN_outdated_army_2_2_desc:0 "Trotz unserer jüngsten „Verwestlichungsbewegung“ sind die meisten unserer Armeen und ihre Taktiken noch immer veraltet. Viele Einheiten setzen noch immer Speere, Schilde und Holzboote gegen Gewehre, Kanonen und Panzerschiffe ein."
QIN_opium_addictions:0 "Opiumsucht"
QIN_opium_addictions_desc:0 "Nach den beiden Opiumkriegen war die Qing-Regierung gezwungen, den Opiumverkauf im Reich zuzulassen. Dies führte zu einer weit verbreiteten Sucht, und Menschen, die der Regierung hätten helfen können, wurden süchtig."
QIN_great_purge:0 "Die große Säuberung"
QIN_republican_journalism:0 "Republikanischer Journalismus"
# Localization for separatism movements

# Uyghur Separatism
uyghur_separatism:0 "Uigurischer Separatismus"
uyghur_separatism_desc:0 "Eine Bewegung, die sich für die Autonomie und Rechte des uigurischen Volkes in Xinjiang, China, einsetzt und versucht, seine ausgeprägte kulturelle Identität und seine Religionsfreiheit zu bewahren."

# Tibetan Separatism
tibetan_separatism:0 "Tibetischer Separatismus"
tibetan_separatism_desc:0 "Das Streben des tibetischen Volkes nach Autonomie oder Unabhängigkeit konzentrierte sich auf die Bewahrung seines einzigartigen kulturellen Erbes und den Widerstand gegen die Politik der chinesischen Regierung in Tibet."

# Catalan Separatism
catalan_separatism:0 "Katalanischer Separatismus"
catalan_separatism_desc:0 "Die Bewegung setzt sich für die Unabhängigkeit Kataloniens von Spanien ein und wird von dem Wunsch nach kultureller Bewahrung und Selbstverwaltung angetrieben."

# Scots Separatism
irish_separatism:0 "Irischer Separatismus"
irish_separatism_desc:0 "Eine Bewegung, die sich für die Vereinigung Irlands einsetzt, die britische Herrschaft in Nordirland beenden und die nationale Identität und Selbstbestimmung des irischen Volkes fördern will."
# Quebec Separatism
quebec_separatism:0 "Quebecer Separatismus"
quebec_separatism_desc:0 "Das Streben der Bevölkerung des kanadischen Quebec nach Souveränität, motiviert durch den Wunsch, ihre französische Sprache und kulturelle Identität zu schützen."

# Kurdish Separatism
kurdish_separatism:0 "Kurdischer Separatismus"
kurdish_separatism_desc:0 "Eine Bewegung, die sich in mehreren Ländern für die Rechte und die Autonomie des kurdischen Volkes einsetzt und sich auf Selbstbestimmung und kulturelle Anerkennung konzentriert."

# Basque Separatism
basque_separatism:0 "Baskischer Separatismus"
basque_separatism_desc:0 "Das Streben des baskischen Volkes nach Unabhängigkeit in Spanien und Frankreich zielte auf die Förderung seiner einzigartigen Sprache und Kultur ab."

# Tatar Separatism
tatar_separatism:0 "Tatarischer Separatismus"
tatar_separatism_desc:0 "Eine Bewegung, die sich für die Rechte und die Anerkennung des tatarischen Volkes in Russland einsetzt und versucht, seine kulturelle Identität zu bewahren und seine Selbstverwaltung zu fördern."
