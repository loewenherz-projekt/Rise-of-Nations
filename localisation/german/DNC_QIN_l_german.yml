#LEADER INFO
CHI_HOS_TITLE:0 "Huángdì"
CHI_HOG_TITLE:0 "Huánghòu" 
CHI_GUANGXU_NAME:0 "Guangxu"
GUANGXU_LEADER_DESCRIPTION:0 "Der 10. Himmlische Kaiser der Großen Qing und de jure Führer Chinas, Kaiser Guangxu, ist der Kaiser des größten Reiches in der chinesischen Geschichte. Er wurde 1870 im Prinz-Chun-Haus als Sohn des verstorbenen Kaisers Tongzhi geboren und war 4 Jahre alt, als er den Thron bestieg. Da er ein Kindermonarch war, waren Ausbeutung und Korruption weit verbreitet. Als er 9 Jahre alt war, starb seine Mutter und Cixi wurde zur neuen Kaiserinwitwe und Beschützerin des Kaisers Guangxu. Mit zunehmendem Alter wuchs Cixis Einfluss auf ihn, was ihr schließlich große Machtbefugnisse in der Regierung einbrachte. Nach der Niederlage der Qing gegen Japan im Japanisch-Chinesischen Krieg erkannte Guangxu, dass eine konstitutionelle Monarchie wie die Japans der Weg war, den die Qing einschlagen mussten, wenn sie politisch und wirtschaftlich stabil werden wollten. 1898 taten er und Mitglieder der Reform China Society sich zusammen und verabschiedeten liberale Reformen, die Hundert-Tage-Reform. Cixi war damit unzufrieden und stürzte die Regierung. Er stellte Guangxu unter Hausarrest, wo er als de jure Herrscher Chinas lebte. Alle Reformen wurden zurückgenommen und die reformistischen Gruppen ins Exil geschickt."
CIXI_LEADER_DESCRIPTION:0 "Cixi wurde 1835 als Tochter eines Herzogs des Blauen Banners mit Rand, einem Banner der Acht Banner der Mandschurei in Peking, geboren und war dazu bestimmt, ein luxuriöses Leben in der Politik zu führen. Sie war gut ausgebildet und wurde später, nachdem sie 1854 seine zweite Frau geworden war, eine Beraterin des verstorbenen Kaisers Xianfeng. Während ihrer Ehe mit Xianfeng war sie bestens über die Angelegenheiten des Landes informiert und machte sich in der Regierung Freunde und Feinde. Während der Opiumkriege starb Kaiser Xianfeng an einer Krankheit und hinterließ den Sohn seiner ersten Frau, Yi, als nächsten Kaiser der Großen Qing. Kaiser Guangxu übernahm 1875 die Macht und wurde 1880 Cixis Adoptivsohn. Zu diesem Zeitpunkt hatte Cixi die chinesische Regierung fest im Griff und nach den liberalen Reformen des Guangxu-Kaisers im Rahmen der Hunderttagereform von 1898 war sie mit ihrem Machtverlust und der Reformpolitik Guangxus unzufrieden. Dies führte dazu, dass Cixi den Kaiser putschte und als De-facto-Herrscherin der Großen Qing die Macht übernahm und den Kaiser unter Hausarrest stellte. Seitdem übt sie die völlige autokratische Herrschaft aus und unterdrückt die republikanischen und anarchistischen Gruppen Chinas."

#BOOKMARKS

CHI_SILENT_NIGHT_DESC:0 "Die Qing-Dynastie befindet sich seit den Opiumkriegen und dem Taiping-Aufstand seit über sechs Jahrzehnten im Niedergang. Wachsender Unmut gegenüber dem Qing-Kaiser und der Mandschu-Bevölkerung hat die politische und wirtschaftliche Stabilität des Reiches ins Wanken gebracht. Einer der führenden Gegner der Qing, der republikanische Führer Sun Yat Sen, erhält Unterstützung von vielen Chinesen und ist bereit, die Qing zu stürzen. Können die Qing überleben? Wird China eine Republik?"

