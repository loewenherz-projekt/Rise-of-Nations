dnc_china.4.t:0 "Unsere politische Situation"
dnc_china.4.d:0 "Seit unserem Kontakt mit den Westmächten und Ereignissen wie den Ungleichen Verträgen befindet sich unser 300 Jahre altes Reich im Niedergang. Andere Ereignisse wie der Taping-Aufstand und in jüngerer Zeit der Boxeraufstand haben unseren Einfluss auf das Land erheblich geschwächt und unsere Staatskasse leergefegt. Der Putsch der Kaiserinwitwe im Jahr 1898 gegen den Kaiser und die liberalen Führer der Hunderttagereform stürzte Kaiser Guangxu und hob die Hunderttagereform auf, eine Reform, die das Qing-Reich in eine konstitutionelle Monarchie verwandeln sollte. Während dieses Chaos gewannen Parteien wie die Revive China Society unter der Führung des Republikaners Sun Yat Sen und kleine anarchistische und kommunistische Gruppen wie Chen Duxui zunehmend an Unterstützung und starteten auf dem Weg dorthin Aufstände gegen die Qing-Regierung in der Hoffnung, eine Republik zu gründen. Wegen dieses zunehmenden Niedergangs begannen Militärführer und lokale Gouverneure, unabhängig zu handeln und setzten ihre eigenen Privatarmeen ein, wodurch China effektiv zwischen Kriegsherren aufgeteilt wurde."
dnc_china.4.a:0 "Kann sich China erholen?"

dnc_china.1.t:0 "Die Politik der Kaiserin gegenüber den Boxern"
dnc_china.1.d:0 "Nach dem Beginn des Boxeraufstands brach in der Qing-Regierung eine innenpolitische Krise aus. Es ging darum, ob man sich den Boxern im Kampf gegen die Ausländer anschließen oder die Beziehungen zum Westen verbessern sollte. Um Maßnahmen ergreifen zu können, musste die Kaiserin entscheiden, ob sie sich den Boxern anschließt oder sie angreift."
dnc_china.1.a:0 "Wir werden weiterhin mit den Boxern im Krieg bleiben"
dnc_china.1.b:0 "Schließt euch ihnen im Kampf gegen den Westen an! Verjagt die Ausländer aus China!"

dnc_china.3.t:0 "Tod von Li Hongzhang"
dnc_china.3.d:0 "Unser Feldmarschall und Gouverneur von Peking und der Region Zhili ist heute an einem Herzinfarkt gestorben. Nach dem Tod des Marschalls wird sein Lehrling Yuan Shikai seinen früheren Posten übernehmen. Dies wird enorme politische und militärische Auswirkungen haben."
dnc_china.3.a:0 "Memori Memori"

dnc_china.7.t:0 "Provinzgouverneure erklären Neutralität"
dnc_china.7.d:0 "Provinzielle Kriegsherren, die sich aus dem Boxeraufstand heraushalten wollten, erklärten ihre Neutralität und erklärten, sie würden den „Gegenseitigen Schutz Südchinas“ gründen, eine Gruppe von Provinzen, die während des Krieges bis zu dessen Ende neutral bleiben und nach Kriegsende ihre Souveränität an die Qing zurückgeben würden. Dies hat die Korruption und den Regionalismus des Kaiserreichs an die Öffentlichkeit gebracht und die Moral der Bevölkerung massiv beeinträchtigt."
dnc_china.7.a:0 "Unser Imperium zerfällt ..." 

dnc_china.6.t:0 "Krieg mit den Westmächten"
dnc_china.6.d:0 "Nachdem wir uns für ein Bündnis mit den Boxern entschieden hatten, war ein Krieg mit den Westmächten unvermeidlich. Das Ziel des Aufstands war es, die Westmächte aus China zu vertreiben, und wir müssen uns ihrer Sache anschließen und den wichtigsten ausländischen Mächten, die unser Land, unsere Kultur und unser Volk geraubt haben, den Krieg erklären und sie aus China vertreiben."
dnc_china.6.a:0 "Ein Krieg, den wir gewinnen können"

dnc_china.8.t:0 "Eine anarchistische Rede"
dnc_china.8.d:0 "Der Anarcho-Kommunist Chen Duxui hielt in Nanjing eine Rede, in der er sich gegen die Qing-Regierung aussprach. Er bezeichnete sie als überholtes imperialistisches Reich und sprach sich für eine anarchistische Gesellschaft als den Weg Chinas aus. Einige wenige unterstützten seine Sache, und der Widerstand gegen die Qing-Regierung wuchs in der Bevölkerung weiter."
dnc_china.8.a:0 "Noch mehr Unruhe?!"

dnc_china.9.t:0 "Die Acht-Nationen-Allianz wurde besiegt!"
dnc_china.9.d:0 "Nachdem unsere Truppen in die ausländischen Konzessionen einmarschiert waren und die Ausländer in Tianjin besiegt worden waren, bat die Acht-Nationen-Allianz um Frieden. Die Briten erklärten: „Nach den schweren Verlusten in der Schlacht um Hongkong und der gescheiterten russischen Invasion in der Mandschurei war der Krieg verloren und wir begannen, unsere Soldaten aus China abzuziehen.“ Dies ist ein großer Sieg für unser Reich und der Beginn einer besseren Selbststärkungsbewegung für unser Reich."
dnc_china.9.a:0 "Endlich Sieg!"

dnc_china.11.t:0 "Unsere Niederlage im Krieg"
dnc_china.11.a:0 "Können wir uns erholen? Werden die nächsten Jahre das Ende sein?"

dnc_china.14.t:0 "[FROM.GetName] fordert uns auf, unsere Konzessionen zu verlassen"
dnc_china.14.d:0 "Nach ihrem Sieg im Boxeraufstand forderte uns die chinesische Regierung auf, unsere Konzessionen aufzugeben. Sollten wir das Angebot annehmen?"
dnc_china.14.a:0 "Angebot annehmen"
dnc_china.14.b:0 "Wir werden ihnen nicht nachgeben!"

dnc_china.15.t:0 "Zentralregierung fordert Reintegration"

dnc_china.17.t:0 "[FROM.GetName] fordert uns auf, [QIN_GetZoneName] zu verlassen"
dnc_china.17.d:0 "Heute früh erreichte unser Kabinett ein Telegramm der [FROM.GetAdjective]-Regierung. Sie fordert uns auf, uns aus [QIN_GetZoneName] zurückzuziehen, da sie Einfluss auf die Region gewinnen wollen. Was sollen wir auf diese Aufforderung antworten?"
dnc_china.17.a:0 "Wir werden in Rente gehen"
dnc_china.17.b:0 "Die Region aufgeben? Niemals!"
dnc_china.18.t:0 "[FROM.GetName] möchte eine Konzession in [QIN_GetZoneName] eröffnen"
dnc_china.18.d:0 "Die [FROM.GetAdjective]-Regierung hat uns ein Telegramm geschickt, in dem sie erklärt, dass sie auf unserem Territorium eine Konzession eröffnen möchte."
dnc_china.18.a:0 "Heißen Sie sie willkommen"
dnc_china.18.b:0 "Wir brauchen keine Ausländer!"
chinese_empire.34.t:0 "Die Mongolei wird von der Anhui-Clique besetzt"
chinese_empire.34.d:0 "Die Anhui-Clique unter Duan Qirui hat die Kontrolle über die Mongolei übernommen und ihren Einfluss in der Region weiter ausgebaut. Diese Besetzung löste Empörung unter mongolischen Nationalisten aus und verschärfte die Spannungen zwischen verschiedenen Fraktionen, die in China um die Macht ringen."
chinese_empire.34.a:0 "Wir müssen entschlossen reagieren, um unsere Interessen in der Region zu sichern!"
chinese_empire.35.t:0 "Bildung der Kuomintang und neue Regierung der Guangxi-Clique"
chinese_empire.35.d:0 "Die Kuomintang (KMT), die Chinesische Nationalistische Partei, wurde offiziell gegründet und läutet damit eine neue Ära in der chinesischen Politik ein. Unter der Führung von Sun Yat-sen will die KMT China vereinen und die imperiale Herrschaft beenden. Gleichzeitig hat die Guangxi-Clique unter Li Zongren eine neue Regierung in der Provinz Guangxi gebildet, die die bestehenden Machtstrukturen in Frage stellt und den Weg für ein neues Kapitel in der chinesischen Geschichte ebnet."
chinese_empire.35.a:0 "Wir müssen uns an diese Veränderungen anpassen und uns in der sich verändernden politischen Landschaft zurechtfinden!"
chinese_empire.37.t:0 "Sollen wir dem chinesischen Kaiserreich Nachschub schicken?"
chinese_empire.37.d:0 "Das chinesische Kaiserreich steht vor zahlreichen Herausforderungen und bittet um Hilfe in Form von Hilfsgütern. Sollten wir es in dieser Notlage unterstützen?"
chinese_empire.37.a:0 "Ja, wir sollten Nachschub schicken."
chinese_empire.37.b:0 "Nein, wir sollten keine Vorräte schicken."

chinese_empire.26.t:0 "Das chinesische Kaiserreich fordert die Freilassung Koreas!"
chinese_empire.26.d:0 "China hat von uns die Befreiung Koreas gefordert. Was sollten wir als nächstes tun?"
chinese_empire.26.a:0 "Wir werden es ihnen zurückgeben!"
chinese_empire.26.b:0 "Krieg!"
chinese_empire.27.t:0 "Das chinesische Kaiserreich fordert die Freilassung Indochinas!"
chinese_empire.27.d:0 "China hat von uns die Befreiung Indochinas gefordert. Was sollten wir als nächstes tun?"
chinese_empire.27.a:0 "Wir werden es ihnen zurückgeben!"
chinese_empire.27.b:0 "Krieg!"
chinese_empire.28.t:0 "Das chinesische Kaiserreich fordert, dass wir Tibet und Nordchina verlassen!"
chinese_empire.28.d:0 "China hat von uns verlangt, Tibet und Nordchina zu verlassen. Was sollen wir tun?"
chinese_empire.28.a:0 "Wir werden es ihnen zurückgeben!"
chinese_empire.28.b:0 "Krieg!"
chinese_empire.29.t:0 "Kapitulation Chinas!"
chinese_empire.29.d:0 "China hat in seinem Angriffskrieg kapituliert, sein Führer wurde gestürzt und durch einen pazifistischen Führer ersetzt, das Reich ist gefallen …"
chinese_empire.29.a:0 "Der Drache ist getötet!"
chinese_empire.31.t:0 "Die Foreign Expeditions lösen sich auf"
chinese_empire.31.d:0 "Nach der Niederlage der Boxer kehren die ausländischen Expeditionen in ihre Heimatländer zurück."
chinese_empire.31.a:0 "Die Bedrohung ist verschwunden!"
chinese_empire.32.t:0 "Der Boxeraufstand wächst!"
chinese_empire.32.d:0 "Unsere Entscheidung, uns auf die Seite der Europäer gegen die Boxer zu stellen, hat in ganz China antimandschurische Stimmungen und Fremdenfeindlichkeit entfacht, was dazu geführt hat, dass die Boxer ihre Reihen um Zehntausende Rebellen vergrößert haben."
chinese_empire.32.a:0 "Wir werden die Rebellen ausmerzen!"
chinese_empire.33.t:0 "Unser Anführer wurde erschossen!"
chinese_empire.33.d:0 "Aufgrund der Instabilität in der Region wurde unser Anführer getötet, was eine weitere Welle von Aufständen in unserer einst großen Nation auslöste!"
chinese_empire.33.a:0 "Wir sind gefallen"


chinese_empire.38.t:0 "Guangdong-Guangxi-Krieg"
chinese_empire.38.d:0 "Zwischen den Provinzen Guangdong und Guangxi ist ein Konflikt ausgebrochen, der zu weit verbreiteter Gewalt und Instabilität in der Region geführt hat. Beide Seiten mobilisieren ihre Kräfte und suchen Verbündete, die ihre Sache unterstützen."
chinese_empire.38.a:0 "Wir werden diesen Krieg gewinnen!"

