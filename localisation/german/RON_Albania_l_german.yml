 ALB_even_greater:0 "Großkönigreich Albanien"
 alb_even_greater:0 "Großkönigreich Albanien"
 
 alb_soviet.63.t:0 "Albanien möchte der Komintern beitreten"
 alb_soviet.63.d:0 "Unsere Genossen in der Partei der Arbeit Albaniens haben große Fortschritte gemacht. Das albanische Volk ist bereit, der Komintern beizutreten."
 alb_soviet.63.a:0 "Lasst unsere Kameraden sich uns anschließen!"
 alb_soviet.63.b:0 "Sie sind noch nicht bereit."
 alb_news.334.t:0 "Albanien tritt der Komintern bei"
 alb_news.334.d:0 "Der Vorsitzende der Kommunistischen Partei Albaniens, Enver Hoxha, beantragte den Beitritt zur Komintern. Die Sowjetunion akzeptierte den Beitrittsantrag Albaniens, und das ehemalige Königreich Albanien ist nun Teil der Dritten Internationale. Da beide Länder dieselben Ideen und Ambitionen teilen, scheint ihre Freundschaft gefestigt, und Albanien sieht einer rosigen Zukunft in Europa entgegen." 
 alb_news.334.a:0 "Ein weiterer Sieg für die kommunistischen Ideale!"
 alb_news.335.t:0 "Albanien schließt sich den Alliierten an"
 alb_news.335.d:0 "Albanische Diplomaten beantragten während eines Besuchs in Großbritannien den Beitritt zu den Alliierten. Großbritannien kam dem Antrag nach, und Albanien wurde heute Mitglied. Albanien ist nun Teil des demokratischen Bündnisses zwischen Großbritannien und dem Commonwealth. Bei dieser Gelegenheit beschloss Albanien, sich gegen den Aufstieg von Faschismus und Kommunismus zu stellen und „extreme und gefährliche Ideologien“ anzuprangern."
 alb_news.335.a:0 "Albanien schließt sich den Alliierten an"
 alb_britain.24.t:0 "Albanien möchte den Alliierten beitreten"
 alb_britain.24.d:0 "Albanische Diplomaten haben ein diplomatisches Ersuchen um Beitritt zu den Alliierten eingereicht. Als demokratische Nation wollen sie gemeinsam mit uns die Bedrohung durch Faschismus und Kommunismus anprangern. Als führende demokratische Nation ist es unsere Aufgabe, die anderen zu führen und ein Beispiel für Demokratie zu sein."
 alb_germany.129.t:0 "Albanien möchte der Achse beitreten"
 alb_germany.129.d:0 "Unsere Freunde aus Albanien haben uns eine diplomatische Anfrage geschickt, unserer Fraktion beizutreten. Als Führer der faschistischen Nation ist es unsere Aufgabe, die kleineren faschistischen Staaten vor Demokratie und Kommunismus zu schützen. Was sollen wir tun?"
 alb_news.336.t:0 "Albanien schließt sich der Achse an!"
 alb_news.336.d:0 "Deutschland akzeptierte Albaniens Antrag auf Beitritt zur Achse. Gemeinsam stehen sie nun dem Kommunismus und den demokratischen Nationen gegenüber. König Zog drückte seinen Willen aus, der ganzen Welt die Macht seines Landes zu demonstrieren. Großbritannien und Frankreich äußerten sich besorgt über den Aufstieg des Faschismus in Europa und erinnerten deutsche Beamte an die Regeln des Versailler Vertrags, die Deutschland respektieren müsse. Es scheint, als würden die Demokratien des Westens nicht auf Deutschland und Albanien reagieren."
 alb_news.336.a:0 "Jetoni Shqipërinë!"
 albania.1.t:0 "Die italienische Affäre"
 albania.1.d:0 "Unsere nach Italien entsandten Spione und Diplomaten warnten uns, dass sie einen Invasionsplan des italienischen Oberkommandos entdeckt hätten. Die albanische Regierung war schockiert, da Italien und Albanien seit Jahren freundschaftliche Beziehungen pflegen und militärisch und wirtschaftlich zusammenarbeiten. In der jetzigen Situation hat unser Land nur geringe Chancen, die Invasion abzuwehren. Wir müssen unser Land schnellstmöglich mobilisieren und auf den Krieg vorbereiten!"
 albania.1.a:0 "Verflucht seien die Italiener!"
 albania.2.t:0 "Konferenz von Durrës"
 albania.2.d:0 "Mussolini und die italienische Regierung einigten sich darauf, in der albanischen Stadt Durrës einen Vertrag auszuhandeln. Als sie von ihren Invasionsplänen erfuhren, waren sie etwas überrascht, aber glücklicherweise nicht wütend auf uns. Sie eröffneten die Konferenz mit der Präsentation ihrer Forderungen: Sie wollen die vollständige Kontrolle über die albanische Außenpolitik. Außerdem fordern sie, dass albanischen Kindern obligatorisch Italienisch beigebracht wird. Im Gegenzug behalten wir die vollständige Kontrolle über unsere Wirtschaft, und sie gewährleisten unsere Sicherheit vor äußeren Feinden. Ihre Bedingungen sind wahrscheinlich weniger hart, als wenn wir sie ihren überraschenden Invasionsplan hätten ausführen lassen. Hätte ihr Plan funktioniert, wäre die vollständige Annexion fast unsere einzige Option gewesen. Was sollten wir tun?"
 albania.2.a:0 "Akzeptieren Sie die Bedingungen."
 albania.2.b:0 "Wir lehnen eine Unterwerfung unter Italien ab, sind jedoch bereit, einen Teil unserer Wirtschaft an italienische Investoren abzutreten."
 albania.3.t:0 "Erfolg der Konferenz"
 albania.3.d:0 "Die Verhandlungen mit Italien endeten mit einem Erfolg!"
 albania.3.a:0 "Großartig !"
 albania.4.t:0 "Wahl des Vorsitzenden von Çeta e Pezës"
 albania.4.d:0 "Der Staatsstreich hat funktioniert, und wir kontrollieren nun die Regierungszentrale. Zunächst galt Myslim Peza, der Oberbefehlshaber unserer Streitkräfte, als Favorit für das Präsidentenamt Albaniens. Doch der junge Hoxha, der bis vor kurzem in Paris lebte, erfreut sich zunehmender Beliebtheit. Seine Eloquenz ist nicht zu unterschätzen. Die Zentralorganisation der Partei beschloss, Wahlen abzuhalten, um zu entscheiden, wer das Land regieren soll."
 albania.4.a:0 "Lass uns mit Peza gehen!"
 albania.4.b:0 "Hoxha ist besser!"
 albania.5.t:0 "Hoxhas Bunker"
 albania.5.d:0 "Heute präsentierte Hoxha kommunistischen Führern und Journalisten einen ziemlich überraschenden Plan: den Bau von Bunkern im ganzen Land. Offiziell verkündete Hoxha, diese Bunker sollten das Land vor äußeren Bedrohungen schützen. Er warnte die Bevölkerung vor der Gefahr durch den Westen. Doch alle unsere Parteiführer wissen, dass diese Bunker vor allem als politisches Propagandainstrument dienen werden. Wir können die Angst der Bevölkerung nutzen, um sie noch besser als bisher zu kontrollieren. Der Bau von rund 173.000 Bunkern ist geplant. "
 albania.5.a:0 "Le Hoxha të na mbrojë!"
 albania.5.b:0 "Unsere Wirtschaft kann sich diese Ausgaben nicht leisten."
 albania.6.t:0 "Konferenz für ausländische Investoren"
 albania.6.d:0 "Die Regierung hat ausländische Investoren aus verschiedenen Ländern eingeladen, um mit ihnen über mögliche Investitionen im Land zu sprechen. Allerdings sind Investoren aus zwei verschiedenen Ländern insbesondere gegen den gegenseitigen Handel mit Albanien. Italienische Investoren sind unzufrieden mit dem Handel Frankreichs und drohen mit einer Einschränkung des Handels, wenn wir die Handelsbeziehungen mit Frankreich nicht beenden. Was sollen wir tun?"
 albania.6.a:0 "Es wäre besser, uns mit Italien zu verbünden."
 albania.6.b:0 "Verflucht sei Italien! Wir gehen mit Frankreich!"
 albania.7.t:0 "Vertrag von Mailand"
 albania.7.d:0 "Die albanische Regierung und Benito Mussolini beschlossen nach Verhandlungen, einen endgültigen Vertrag zu unterzeichnen. Wir konnten auf diplomatischem Wege einem totalen Krieg mit Italien entgehen. Die Bevölkerung ist uns dankbar, dass wir sie nicht in den Tod geschickt haben. Wir können stolz auf uns sein! (Hinweis: Italien kann Albanien nicht mehr über den Fokusbaum angreifen. Der Fokus „Albanische Besatzung“ ist nun deaktiviert.) "
 albania.7.a:0 "Großartig !"
 albania.8.t:0 "Lage des Königreichs Albanien im Jahr 1936"
 albania.8.d:0 "Unser Königreich befindet sich nicht in der bestmöglichen Lage. Die Wirtschaftskrise von 1929 ließ unsere Wirtschaft fast zusammenbrechen und machte uns von Italien abhängig. Italiens Einfluss ist in unserem Alltag zunehmend spürbar, da seine Investitionen in die Wirtschaft des Landes und seine Präsenz in unserem Bildungs- und politischen System weitaus wichtiger sind als erwartet. Angesichts der zunehmenden Spannungen in Europa sollte die Verbesserung unserer wirtschaftlichen Lage und die Forderung nach vollständiger Unabhängigkeit von Italien eine unserer Prioritäten sein. Die Verbesserung der Beziehungen zu unseren Nachbarn wie Griechenland und Jugoslawien ist ebenfalls wichtig. Das Erreichen dieser Ziele und der Ausbau unserer Armee werden uns zu einer Macht in der Adriaregion machen. Möge unser großer Führer uns führen!"
 albania.8.a:0 "Vorwärts!"
 albania.9.t:0 "Der Hungerstreik im Februar 1936"
 albania.9.d:0 "Arbeiter und Handwerker in Korça erhoben sich und begannen einen großen Streik in der Stadt. Sie prangerten die wirtschaftliche Lage des Landes und die Armut an, in der sie leben. Wenn wir sie weiter demonstrieren lassen, könnte sich diese Bewegung im Land ausbreiten und einen allgemeinen Aufstand auslösen. Die Niederschlagung des Streiks könnte jedoch unser öffentliches Image und unsere Beziehungen zu anderen Ländern beeinträchtigen."
 albania.9.a:0 "Stoppen Sie diese Demonstration und verhaften Sie die Anführer!"
 albania.9.b:0 "Lass sie in Ruhe."
 albania.11.t:0 "Aufstand im Norden!"
 albania.11.d:0 "Die Arbeiter im Norden erhoben sich, bewaffneten sich, besiegten die örtliche Garnison und übernahmen die Kontrolle über den Norden des Landes! Mit Myslim Peza als ihrem Anführer ist unsere Lage ernst. Wir hätten sie nicht gewähren lassen dürfen."
 albania.11.a:0 "Bereiten Sie die Truppen auf den Kampf vor!"
 albania.12.t:0 "Militärübungen mit Italien?"
 albania.12.d:0 "Die italienische Regierung schlug uns vor, gemeinsam Militärübungen in Neapel zu organisieren. Sie meinte, dies könne unseren Truppen wertvolle Erfahrungen vermitteln und die diplomatischen Beziehungen zwischen uns verbessern. "
 albania.12.a:0 "Wir werden akzeptieren."
 albania.12.b:0 "Lehnen Sie den Vorschlag ab."
 
 9_ALB_tt:0 "§R Es besteht die Möglichkeit, dass dies einen nationalen Aufstand und einen Bürgerkrieg auslöst!"
 
 
 vive_le_roi:0 "Es lebe der König!"
 vive_le_roi_desc:0 "Unser König ist der Beschützer unseres Landes! Er soll das Symbol unseres Kampfes gegen diejenigen sein, die unser Königreich bedrohen! Das Erbe Skanderbegs und unseres Königs soll an zukünftige Generationen weitergegeben werden!"
 the_king_shall_be_desposed:0 "Nieder mit dem König!"
 the_king_shall_be_desposed_desc:0 "König Zog ist nicht die Lösung unserer Probleme! Die Regierung und der König werden zunehmend von den Italienern beeinflusst und kontrolliert, während die Stämme und das Volk machtlos sind. Es ist Zeit für Veränderung!"
 ALB_political_reform:0 "Politische Reformen"
 ALB_political_reform_desc:0 "Nach dem Ende unserer Ersten Republik gründete König Zog das Königreich Albanien. Wir stehen nun an einem Wendepunkt und müssen wichtige Entscheidungen treffen. Wir werden unser Land zum Wohlstand führen!"
 the_people:0 "Die Volksrepublik"
 the_people_desc:0 "Unser Volk hat viel zu lange im Schatten gelebt. Es hat es satt, zu hungern und unter miserablen Bedingungen zu leben. Es ist Zeit für das Proletariat und die Stämme Albaniens, sich zu erheben und die albanische Volksrepublik zu gründen!"
 democracy_republic:0 "Die Demokratie siegt!"
 democracy_republic_desc:0 "Jeder Albaner soll das Recht haben, seine Meinung zu sagen, zu leben und frei zu sein! In Albanien muss Freiheit herrschen, und wir werden diesen Traum um jeden Preis verwirklichen, zum Wohle aller Albaner."
 the_people_army:0 "Die Volksarmee"
 the_people_army_desc:0 "Um unseren kommunistischen Traum zu verteidigen, muss das Volk zu den Waffen greifen und unsere Sozialistische Republik in Massen verteidigen! Wir werden nicht mehr so machtlos sein wie zuvor!"
 the_king:0 "Verbannen Sie den König!"
 the_king_desc:0 "Wenn unser Staatsstreich erfolgreich ist, müssen wir König Zog, Symbol der Diktatur und des politischen Versagens, ins Exil schicken. Das Königreich Italien hat unseren Vorschlag angenommen, den ehemaligen König nach Italien zu verbannen."
 the_king2:0 "Ermordet den König!"
 the_king2_desc:0 "Bei unserem nächsten Staatsstreich müssen wir den König töten, der für all das Elend des Volkes verantwortlich ist! Warum sollten wir ihn ins Exil gehen lassen, ohne für seine Verbrechen zu bezahlen? Soll der König den Zorn des Proletariats zu spüren bekommen!"
 albaniasoviet:0 "Kommunistische Diplomatie"
 albaniasoviet_desc:0 "Nach der Gründung unserer Sozialistischen Republik müssen wir nun die Freundschaft mit jenen suchen, die unsere Ideen teilen. Die Sowjetunion und die Volksrepublik China sind unsere Hauptziele. "
 peopleresearch:0 "Das Volksinstitut"
 peopleresearch_desc:0 "Nachdem unsere Revolution erfolgreich war, müssen wir uns auf die Forschung konzentrieren, um die technologische Unterlegenheit gegenüber unseren Nachbarn auszugleichen. Dieses brandneue Institut soll uns dabei helfen, unsere Ziele zu erreichen! "
 joincomin:0 "Treten Sie der Komintern bei"
 joincomin_desc:0 "Es ist Zeit für uns, unseren kommunistischen Traum zu verwirklichen und der Sowjetunion beizutreten! Wir werden die kommunistische Ideologie in der ganzen Welt verteidigen und verbreiten!"
 democracy_constitution:0 "Die Zweite Republik"
 democracy_constitution_desc:0 "Mit der Unterzeichnung unserer neuen Verfassung haben wir versprochen, aufzustehen und zu kämpfen, um unser Volk vor der faschistischen und kommunistischen Bedrohung zu schützen! Wir werden nicht zulassen, dass uns jemand unsere Ideale der Freiheit und unserer Grundrechte nimmt!"
 italian_threat:0 "Die italienische Bedrohung"
 italian_threat_desc:0 "Die Italiener hatten großen Einfluss auf die vorherige Regierung des Königs. Jetzt versuchen sie aktiv, ihre Kontrolle über uns zu verstärken. Als unabhängige Nation müssen wir unser Volk vor denen schützen, die unsere Unabhängigkeit bedrohen! "
 democracy_institute:0 "Tirana-Forschungsinstitut"
 democracy_institute_desc:0 "Es ist an der Zeit, ein neues Forschungsinstitut zu finanzieren, das uns dabei hilft, die Ausrüstung unserer Soldaten zu verbessern und unsere Armee zu modernisieren. Dies ist unsere Priorität, um unsere Bevölkerung vor äußeren Bedrohungen zu schützen."
 AlB_join_allies:0 "Schließen Sie sich den Verbündeten an"
 AlB_join_allies_desc:0 "Unsere demokratische Haltung hat uns mit den Großmächten des Westens Freundschaft geschlossen. Nun ist es an der Zeit, dass wir uns ihrem Bündnis anschließen und ihren Kampf gegen die extremen und gefährlichen Ideologien des Faschismus und Kommunismus unterstützen."
 AlB_alone:0 "Albanien auf eigene Faust!"
 AlB_alone_desc:0 "Albanien ist im Moment auf sich allein gestellt, aber wir werden selbst Verbündete gewinnen und zweifellos die Führung einer der größten Koalitionen übernehmen, die es jemals auf der Erde gegeben hat!  "
 AlB_social_one:0 "Sozialismus in einem Land!"
 AlB_social_one_desc:0 "„Sozialismus in einem Land“ ist eine Doktrin, die die Verteidigung unserer kommunistischen Ideale und unseres Heimatlandes in den Vordergrund stellt, anstatt die Revolution in der ganzen Welt zu verbreiten. Es ist besser für uns, uns zu stärken und unsere Überzeugungen zu verteidigen, um sicherzustellen, dass wir unsere Mission nicht verfehlen!"
 AlB_permanent_revolution:0 "Permanente Revolution!"
 AlB_permanent_revolution_desc:0 "Die Doktrin der permanenten Revolution konzentriert sich auf die Verbreitung der Revolution in den kapitalistischen Ländern weltweit. Wir werden unsere Ideale der Vorherrschaft und Herrschaft des Proletariats verbreiten!"
 AlB_republic_army:0 "Armee der Republik"
 AlB_republic_army_desc:0 "Um unser Vaterland vor Italien und anderen potenziellen Bedrohungen zu verteidigen, müssen wir die Zahl der Rekruten erhöhen, um eine echte Armee aufzubauen, die in der Lage ist, das Land vor Leuten wie Mussolini zu verteidigen."
 absolute_rule:0 "Absolute Monarchie"
 absolute_rule_desc:0 "Unser Land muss unter dem König vereint sein! Er muss ohne jegliche Opposition in unserem Land regieren! Deshalb müssen die Absolutisten immer mehr Einfluss in der Regierung gewinnen. Die vollständige Kontrolle über unser Land ist nur eine Frage der Zeit."
 constitution_rule:0 "Konstitutionelle Monarchie"
 constitution_rule_desc:0 "Unser Land sollte von den im Parlament vertretenen Bürgern der Oberschicht regiert werden. Deshalb müssen die Verfassungsrechtler immer mehr Einfluss in der Regierung gewinnen. Die vollständige Kontrolle über unser Land ist nur eine Frage der Zeit."
 break_constitution:0 "Aufhebung der Verfassung von 1928"
 break_constitution_desc:0 "Indem wir die Verfassung aufheben, geben wir unserem großen König alle Macht! Er wird unsere Nation zu Ruhm, Reichtum und Ansehen führen! Die Verantwortung für die Nation liegt auf den Schultern des Königs!"
 king_army:0 "Die Armee des Königs"
 king_army_desc:0 "Die Bevölkerung unseres Landes muss mobilisieren, um sich unseren Feinden entgegenzustellen. Wir werden der Welt beweisen, dass Albanien keine Nation ist, über die man lachen sollte! Wir werden nie wieder schwach sein, denn unser Mut ist eine unbesiegbare Waffe!"
 righteous_rule_focus:0 "Halten Sie sich an die Verfassung von 1928"
 righteous_rule_focus_desc:0 "Unser edler König regiert nun unser Land mit Hilfe des Parlaments. Seine Macht als König ist begrenzt, aber er ist immer noch Staatsoberhaupt und symbolischer Herrscher des Königreichs Albanien. Möge Gott Skenderbeg III. segnen!"
 neutral_diplomacy:0 "Strategische Diplomatie"
 neutral_diplomacy_desc:0 "Die Italiener sind eine große Hilfe, aber wir müssen andere Verbündete finden, um nicht von Italien abhängig zu werden. Wir werden in Europa verschiedene diplomatische Maßnahmen ergreifen, um Verbündete mit gemeinsamen Zielen zu finden."
 alb_defense_pact:0 "Albaniens Verteidigungspakt"
 alb_defense_pact_desc:0 "Die Ergebnisse unserer diplomatischen Gesandten zeigen sich. Jugoslawien, Polen und Rumänien haben sich bereit erklärt, unsere Unabhängigkeit zu garantieren. Es ist ein großer Tag für unser Land!"
 alb_royal_institute:0 "Königliches Institut für Technologie Tirana"
 alb_royal_institute_desc:0 "Wir dürfen in der technologischen Forschung nicht hinter unseren Nachbarn zurückbleiben. Wir haben den Bau dieses Instituts in der Hoffnung finanziert, unsere Armee, Marine und Industrie zu modernisieren. Wir sind auf dem Weg, eine moderne und industrialisierte Nation zu werden!"
 faith_in_liberty:0 "Glaube an die Freiheit"
 faith_in_liberty_desc:0 "Wir glauben an Demokratie und Freiheit und werden diese Werte um jeden Preis verteidigen. Unsere Bevölkerung ist bereit, das Land unter Einsatz ihres Lebens zu verteidigen. Wir sind das Land der Freiheit!"
 alb_trade:0 "Transeuropäisches Handelsabkommen"
 alb_trade_desc:0 "Mit Hilfe unserer diplomatischen Gesandten konnten wir ein für unser Land vorteilhaftes Handelsabkommen abschließen. Dieses Abkommen wird uns helfen, unsere Armee zu versorgen und Einfluss in der Geschäftswelt zu gewinnen."
 alb_fascist_diplo:0 "Faschistische Diplomatie"
 alb_fascist_diplo_desc:0 "Obwohl wir eine absolute Monarchie sind, stehen uns die Faschisten nicht am nächsten. Daher wäre es sinnvoll, die Beziehungen zu ihnen zu verbessern und über Bündnisse und wirtschaftliche Zusammenarbeit zu diskutieren."
 alb_join_axis:0 "Treten Sie der Achse bei"
 alb_join_axis_desc:0 "Ein Anschluss an Deutschland und die Achsenmächte wäre eine gute Idee, um uns vor äußeren Bedrohungen zu schützen. Deutschland teilt ähnliche Ansichten wie wir, und die hohen Regierungsvertreter sind meist prodeutsch. Es ist Zeit für uns, uns ihrer Fraktion anzuschließen!"
 alb_ger_aid:0 "Deutsch-Albanischer Handelspakt"
 alb_ger_aid_desc:0 "Die wirtschaftliche Zusammenarbeit zwischen unseren beiden Ländern soll unsere Freundschaft stärken und wäre für beide Seiten von Vorteil. Mit diesem Handelsabkommen wird es uns leichter fallen, unsere Truppen zu versorgen und zu organisieren."
 greater_albania:0 "Großkönigreich Albanien"
 greater_albania_desc:0 "Es ist Zeit für uns, uns auf die Expansion in Europa zu konzentrieren. Das Oberkommando möchte den Kosos, eine albanischsprachige Region Jugoslawiens, zusammen mit den südlichen Provinzen Jugoslawiens an uns binden. Einige Generäle wollen sogar noch weiter gehen und planen die Eroberung Nordgriechenlands und Bulgariens. Möge das Goldene Zeitalter Albaniens beginnen!"
 alb_yug:0 "Kümmere dich um Jugoslawien"
 alb_yug_desc:0 "Das Land Jugoslawien verfügt über albanischsprachige Provinzen. Wir werden diese Provinzen einnehmen, um die albanischsprachige Bevölkerung nach Hause zu holen!"
 alb_bul:0 "Machen Sie Bulgarien zu unserem!"
 alb_bul_desc:0 "Unsere politischen Motive drängen uns, Bulgarien anzugreifen. Ihre Armee ist mächtig, aber unsere ist besser! Wir werden den Feind vernichten!"
 alb_rom:0 "Rumäniens große Invasion"
 alb_rom_desc:0 "Die rumänischen Ölfelder sind wertvoll und sehr wichtig. Die Kontrolle über diese Felder würde es uns ermöglichen, unsere gesamte Armee zu versorgen, ohne auf Importe angewiesen zu sein. Wir werden diesen Feind vernichten!"
 alb_gre:0 "Marsch durch Griechenland"
 alb_gre_desc:0 "Griechenland besitzt einen wichtigen Handelswert, da sein Territorium von zahlreichen Handelsrouten durchzogen ist. Die Eroberung Griechenlands wird unseren Handelseinfluss erhöhen!"
 alb_hun:0 "Schicksal Ungarns"
 alb_hun_desc:0 "Unsere politischen Motive drängen uns, Ungarn anzugreifen. Ihre Armee ist mächtig, aber unsere ist besser! Wir werden diesen Feind vernichten!"
 alb_tur:0 "Der Geist von Skanderbeg"
 alb_tur_desc:0 "Im 15. Jahrhundert fiel das Osmanische Reich in unser Land ein. 1480 beendeten sie ihre Eroberung nach dem erbitterten Widerstand des legendären Skanderbeg und der albanischen Armee. Heute ist es Zeit für uns, im Namen Skanderbegs Rache zu nehmen!"
 alb_pol:0 "Rennen nach Warschau"
 alb_pol_desc:0 "Unsere Eroberung Europas geht weiter. Unsere Ideen und Träume sollen in Polen verbreitet werden! Ihre Armee ist mächtig, aber unsere ist besser! Wir werden diesen Feind vernichten!"
 alb_ita:0 "Mussolini unterwerfen"
 alb_ita_desc:0 "Vor nicht allzu langer Zeit waren wir die von den Italienern beeinflusste Nation und standen kurz vor der Ausrottung. Heute sind wir eine starke und mächtige Nation. Wir werden unsere Eroberungsserie fortsetzen und die italienische Halbinsel unter unsere Kontrolle bringen!"
 alb_eu4_achi:0 "Albanien oder Iberia"
 alb_eu4_achi_desc:0 "Wir müssen unsere Grenzen noch weiter ausdehnen. Unsere Regierung und das militärische Oberkommando haben eine Invasion Spaniens und der Kaukasusregion geplant. Wir müssen uns darauf vorbereiten, es im Westen mit Spanien und im Osten mit der Sowjetunion aufzunehmen."
 alb_ita_pre:0 "Entsenden Sie Diplomaten nach Italien"
 alb_ita_pre_desc:0 "Unsere wirtschaftliche und politische Lage hängt immer stärker von Italien ab. Da wir mit Italien befreundet sind, werden wir die Beziehungen zu ihnen verbessern, unsere Freundschaft ausbauen und vorsichtshalber einige Spione entsenden."
 alb_ita_affair:0 "Die italienische Affäre"
 alb_ita_affair_desc:0 "Es scheint, als hätten unsere Spione und Diplomaten in Italien etwas entdeckt. Es könnten schlechte Nachrichten sein, die unser Land betreffen könnten. Wir müssen auf das Schlimmste vorbereitet sein."
 alb_reform_army:0 "Armeereformen"
 alb_reform_army_desc:0 "Unsere Armee ist bereits jetzt schwach. Wir sind desorganisiert und unsere Truppen sind nicht ausreichend ausgebildet. Unsere Regierung muss eine umfassende Armeereform einleiten, um unsere Streitkräfte als echte Armee zu betrachten."
 alb_reform_economy: "Economic Reforms"
 alb_reform_economy_desc: "Our economy was severely affected by the Great Depression. Povrety is common, the unemployment rate is very high and our economy is in ruins. It is time to reform our economy in order to put the country back on its feet."
 alb_ita_strict:0 "Bereite dich auf den Krieg vor"
 alb_ita_strict_desc:0 "Wir werden nicht mit den Italienern verhandeln, die es gewagt haben, eine Invasion gegen uns vorzubereiten. Wir werden unser Land auf die Konfrontation mit den Italienern vorbereiten. Wir werden der Welt zeigen, dass Albanien kein Land ist, über das man lachen sollte!"
 alb_ita_negotiate:0 "Verhandeln Sie mit Mussolini"
 alb_ita_negotiate_desc:0 "Wir halten es für das Beste für uns und die Bevölkerung, mit Italien zu verhandeln. Wir werden Italien über unsere Erkenntnisse informieren und versuchen, einen Vertrag auszuhandeln, der einen Krieg zwischen unseren beiden Ländern verhindert. Die Kluft zwischen unseren beiden Nationen ist zu groß, und wir werden nicht Tausende junger Männer in den Tod schicken."
 alb_ita_treaty:0 "Vertrag von Mailand"
 alb_ita_treaty_desc:0 "Durch Verhandlungen gelang es uns, einen Krieg zu verhindern. Auch wenn es einen hohen Preis kostete, konnten wir der Auslöschung sicher entkommen. Die Bedingungen wären weitaus härter gewesen, wenn wir auf den Angriff der Italiener gewartet hätten."
 alb_man_mob_desc:0 "Zur Vorbereitung der Invasion ordnete die Regierung die vollständige Mobilisierung des Volkes für den Krieg an. Wir werden für die Unabhängigkeit Albaniens kämpfen!"
 alb_man_mob:0 "Massenmobilisierung"
 alb_behind_us:0 "Das Schlimmste liegt hinter uns!"
 alb_behind_us_desc:0 "Die albanische Bevölkerung erkennt unser Handeln an! Wir haben unzähligen jungen Männern das Leben gerettet! Die Bevölkerung ist uns dankbar. Sie steht den Werten der Regierung stärker denn je nahe! Sie tritt nun häufiger der Armee bei und ist in Kriegszeiten nachsichtiger mit der Lebensmittelrationierung. Wir konnten auf diplomatischem Wege Frieden erreichen. Solche Lösungen sind in Zeiten politischer Instabilität in Europa immer seltener. Jetzt, da wir Frieden erreicht haben, können wir uns darauf konzentrieren, unser Land von innen heraus zu verbessern und stärker zu werden ..."
 alb_will_to_fight:0 "Der Wille zum Kampf"
 alb_will_to_fight_desc:0 "Unser Land wird bis zum Ende kämpfen! Kein Schritt zurück, immer vorwärts! Wir werden unser Prestige nicht verlieren und uns nicht zu Verhandlungen mit den Italienern herablassen! Wir werden Widerstand leisten und zubeißen!"
 alb_meritocracy:0 "Meritokratisches System"
 alb_meritocracy_desc:0 "Wir müssen unser altes, auf sozialem Status basierendes Beförderungssystem durch ein auf Fähigkeiten basierendes System ersetzen! Wir brauchen kompetente Leute, um unsere Armeen zu führen. "
 alb_military_school:0 "Skanderbeg-Militärakademie"
 alb_military_school_desc:0 "Wir müssen neue Rekruten ausbilden. Unsere Armee muss professionell und organisiert sein! Um dieses Ziel zu erreichen, werden wir in der Hauptstadt eine Militärakademie errichten, in der neue Rekruten zu Elitesoldaten ausgebildet werden."
 alb_form_generals:0 "Befördern Sie brillante Offiziere"
 alb_form_generals_desc:0 "Mit der Gründung unserer Akademie fördern wir Rekruten und Mitglieder, die sich im Unterricht und in der militärischen Praxis hervorgetan haben. Einer von ihnen war Spiro Theodori Moisiu, ein junger Soldat in seinen Dreißigern. Seine Fähigkeiten überraschten die meisten Mitglieder des Militäroberkommandos, und es wurde einstimmig beschlossen, ihn als General in die Armee aufzunehmen."
 alb_equipment_research:0 "Militärische Forschung"
 alb_equipment_research_desc:0 "Unsere Armeen müssen über die besten Waffen verfügen, die die technologische Forschung liefern kann. Wir werden ein Zentrum für die Erforschung besserer Waffen, Artillerie und aller anderen militärischen Ausrüstungsgegenstände eröffnen."
 alb_change_doctrine:0 "Änderung der Lehre"
 alb_change_doctrine_desc:0 "Unsere Armee ist seit langem veraltet. Glücklicherweise holt sie nun schnell zu anderen Nationen auf. Unser militärisches Oberkommando hat entschieden, dass es Zeit ist, die Doktrin der Armee zu ändern. "
 alb_strike_first:0 "Schlag zuerst zu"
 alb_strike_first_desc:0 "Vor nicht allzu langer Zeit waren wir die von den Italienern beeinflusste Nation am Rande der Ausrottung. Heute sind wir eine starke und mächtige Nation. Wir werden uns gegen die Invasoren der italienischen Halbinsel verteidigen, indem wir zuschlagen, wenn sie unvorbereitet sind!"
 alb_blitz:0 "Blitzkrieg"
 alb_blitz_desc:0 "Es spielt keine Rolle, ob unsere Streitkräfte ihnen in Bezug auf die Feuerkraft unterlegen sind! Unsere Stärke liegt in schnellen Einkreisungen, um die Versorgungslinie der feindlichen Streitkräfte zu unterbrechen. Auf diese Weise können wir dem Feind mit möglichst wenig Kampfeinsatz schweren Schaden zufügen!"
 alb_superior_firepower:0 "Überlegene Feuerkraft"
 alb_superior_firepower_desc:0 "Wir müssen unsere Feuerkraft um jeden Preis erhöhen. Überlegene Feuerkraft ermöglicht es uns, den Feind mit möglichst geringen Verlusten zu besiegen. Die Arbeitskräfte unseres Landes sind wertvoll, und wir werden sie nicht verschwenden."
 alb_no_ita_officer:0 "Befreiung der Armee vom ausländischen Einfluss"
 alb_no_ita_officer_desc:0 "Jetzt, da unsere Armee reformiert wird und wir talentierte Offiziere rekrutieren, brauchen wir die italienischen Offiziere nicht mehr. Während ihres Aufenthalts schien die Organisation ihrer Armee nicht ihre Priorität zu sein. Wir werden die volle Kontrolle über unsere Armee haben!"
 alb_modern_army:0 "Moderne Armee"
 alb_modern_army_desc:0 "Dank der Reformen, die die Armee durchlaufen hat, können wir sie heute als eine moderne, organisierte und vorbereitete Armee betrachten. Regierung und Bevölkerung können stolz auf das neue Erscheinungsbild unserer Armee sein."
 alb_fortify_coastline:0 "Befestigen Sie die Küste"
 alb_fortify_coastline_desc:0 "Es wäre klug, unsere Küste zu befestigen, da es im Falle eines Krieges mit ausländischen Mächten höchstwahrscheinlich zu Invasionen von See aus kommen könnte. "
 alb_yug_borders:0 "Die Grenzen zu Jugoslawien befestigen"
 alb_yug_borders_desc:0 "Wir müssen die Grenzen zu Jugoslawien befestigen, um im Falle einer Überraschungsinvasion Widerstand leisten zu können. Die Festungen werden Jugoslawien besetzen, während wir den Großteil unserer Armee im Norden und Osten mobilisieren."
 alb_balance_budget:0 "Den Haushalt ausgleichen"
 alb_balance_budget_desc:0 "Durch die Kürzung unserer Staatsausgaben können wir den Haushaltsausgleich erreichen und die Steuern für die Durchschnittsbevölkerung senken, was eine Steigerung des Konsums ermöglicht."
 alb_invite_investors:0 "Laden Sie ausländische Investoren ein"
 alb_invite_investors_desc:0 "Damit unsere Volkswirtschaften und Unternehmen richtig funktionieren, brauchen wir Investoren."
 alb_encourage_cons:0 "Förderung des zivilen Konsums"
 alb_encourage_cons_desc:0 "Unsere Unternehmen werden boomen, wenn der Konsum steigt. Dann können wir die Wirtschaftskrise, in der wir uns seit 1929 befinden, überwinden. Wir werden unser Bestes tun, um die Bürger zum Konsum von Produkten aus unseren Unternehmen zu ermutigen!"
 alb_fund_industry:0 "Finanzieren Sie die Branche"
 alb_fund_industry_desc:0 "Um mit anderen Ländern konkurrieren zu können, müssen wir uns mit einer leistungsfähigen Industrie ausstatten. Zwar sind wir ein kleines und dünn besiedeltes Land, aber wir verfügen über ein beträchtliches industrielles Potenzial. Natürliche Ressourcen sind nicht knapp und es mangelt uns nicht an industriellen Arbeitskräften."
 alb_civ_1:0 "Offene Fabriken in abgelegenen Gebieten"
 alb_civ_1_desc:0 "Unsere ländlichen Gebiete sind weitgehend ungenutzt. Es gibt dort auch viele Arbeitslose, da es dort kaum Unternehmen gibt. Durch den Aufbau von Industrien in diesen Gebieten wird unser industrielles Potenzial gestärkt und die wirtschaftliche Situation der Landbewohner verbessert."
 alb_civ_2:0 "Stärkung der industriellen Lage in der Hauptstadt"
 alb_civ_2_desc:0 "Wir werden die Arbeitslosenquote in der Hauptstadt senken und unser Land durch den Bau neuer ziviler Fabriken noch weiter industrialisieren. Tirana soll zu einer der am stärksten industrialisierten Städte der Welt werden!"
 alb_mil_1:0 "Militärische Investitionen auf dem Land"
 alb_mil_1_desc:0 "Wir brauchen mehr Arbeitskräfte, um die Ausrüstung herzustellen, die die Armee braucht. Der ländliche Raum ist ein idealer Standort für die Rüstungsindustrie, da die Bevölkerung dort größtenteils arbeitslos ist."
 alb_mil_2:0 "Ausbau der Militärindustrie in Tirana"
 alb_mil_2_desc:0 "Es mangelt uns noch immer an Ausrüstung für unsere Armeen. Wir müssen unsere Rüstungsindustrie ausbauen, um sicherzustellen, dass unsere Soldaten für den Kampf bestens gerüstet sind."
 alb_infrastructure:0 "Gründen Sie die Hekurudha Shqiptare Compagny"
 alb_infrastructure_desc:0 "Die Hekurudha Shqiptare Company (Albanische Eisenbahngesellschaft) wird ein Eisenbahnunternehmen sein, das eine Zuglinie betreiben wird, die das ganze Land verbindet. Der Transport unserer Truppen wird dadurch wesentlich einfacher!"
 alb_auxiliary_sections_of_the_army:0 "Hilfsabteilungen der Armee"
 alb_auxiliary_sections_of_the_army_desc:0 "Wir müssen Teile der Armee entwickeln und aufbauen, die in der Lage sind, unsere Bodentruppen maßgeblich zu unterstützen und uns so im Kriegsfall die Überlegenheit zu sichern."
 alb_academy_air:0 "Flugkurse an Militärakademien"
 alb_academy_air_desc:0 "Wir müssen an den Militärakademien des Landes Flugkurse einführen, um kompetente Piloten für unsere Flugzeuge zu haben. Qualität vor Quantität!"
 alb_academy_navy:0 "Kurs für maritime Manöver an Militärakademien"
 alb_academy_navy_desc:0 "Wir müssen an den Militärakademien des Landes Kurse für maritime Manöver einführen, um kompetente Kapitäne auf unseren Schiffen zu haben. Qualität vor Quantität!"
 
 peoplearmy_focus:0 "Die Volksarmee"
 peoplearmy_focus_desc:0 "Um unseren kommunistischen Traum zu verteidigen, muss das Volk zu den Waffen greifen und unsere Sozialistische Republik in Massen verteidigen! Wir werden nicht mehr so machtlos sein wie zuvor!"
 second_republic:0 "Die Zweite Republik"
 second_republic_desc:0 "Wir müssen aufstehen und kämpfen, um unser Volk vor der Bedrohung durch Faschismus und Kommunismus zu schützen! Wir werden nicht zulassen, dass uns jemand unsere Ideale der Freiheit und unserer Grundrechte nimmt!"
 socialism_one_country_idea: "Socialism in One Country !"
 socialism_one_country_idea_desc: ""Socialism in One Country" is a doctrine proposed by Joseph Stalin in the 20's which prioritize the defense of our communist ideals and our homeland instead of spreading the revolution across the world. It is better for us to streghten ourself to become a defender of our beliefs to ensure we will not fail to accomplish our mission !"
 permanent_revolution_idea:0 "Permanente Revolution!"
 permanent_revolution_idea_desc:0 "Die Doktrin der permanenten Revolution konzentriert sich auf die Verbreitung der Revolution in den kapitalistischen Ländern weltweit. Wir werden unsere Ideale der Vorherrschaft und Herrschaft des Proletariats verbreiten!"
 democratic_army_focus:0 "Armee der Republik"
 democratic_army_focus_desc:0 "Um unser Vaterland vor Italien und anderen potenziellen Bedrohungen zu verteidigen, müssen wir die Zahl der Rekruten erhöhen, um eine echte Armee aufzubauen, die in der Lage ist, das Land vor Leuten wie Mussolini zu verteidigen."
 absolute_influence:0 "Absolutistischer Einfluss"
 absolute_influence_desc:0 "Die Absolutisten gewinnen immer mehr Einfluss in der Regierung. Die vollständige Kontrolle über unser Land ist nur eine Frage der Zeit."
 constitution_influence:0 "Einfluss der Verfassungsrechtler"
 constitution_influence_desc:0 "Die Verfassungsrechtler gewinnen in der Regierung immer mehr Einfluss. Es ist nur eine Frage der Zeit, bis sie die vollständige Kontrolle über unser Land erlangen."
 italian_in_the_army:0 "Italienische Offiziere in der Armee"
 italian_in_the_army_desc:0 "Italienische Offiziere wurden in unsere Armee entsandt. Sie bringen unseren Truppen zwar Erfahrung, erschweren aber die Führung der Armee und schwächen die Moral unserer Truppen. Dies wird so lange anhalten, bis wir den ausländischen Einfluss in unserer Armee beseitigt haben."
 absolute_ruler:0 "Unbestrittene Herrschaft"
 absolute_ruler_desc:0 "Mit der Aufhebung der Verfassung haben wir unserem großen König alle Macht gegeben! Er wird unsere Nation zu Ruhm, Reichtum und Ansehen führen! Die Verantwortung für die Nation liegt auf den Schultern des Königs!"
 king_army_idea:0 "Die Armee des Königs"
 king_army_idea_desc:0 "Die Bevölkerung unseres Landes muss mobilisieren, um sich unseren Feinden entgegenzustellen. Wir werden der Welt beweisen, dass Albanien keine Nation ist, über die man lachen sollte! Wir werden nie wieder schwach sein, denn unser Mut ist eine unbesiegbare Waffe!"
 righteous_ruler:0 "Gerechte Herrschaft"
 righteous_ruler_desc:0 "Unser edler König regiert nun unser Land mit Hilfe des Parlaments. Seine Macht als König ist begrenzt, aber er ist immer noch Staatsoberhaupt und symbolischer Herrscher des Königreichs Albanien. Möge Gott Skenderbeg III. segnen!"
 great_depression_alb:0 "Wirtschaftskrise"
 great_depression_alb_desc:0 "Die Weltwirtschaftskrise, die weltweit ein wirtschaftliches Chaos verursachte, traf Albanien schwer. Ausländische Investoren verließen das Land und es wurde immer schwieriger, Kredite zurückzuzahlen und den Staatshaushalt zu verwalten."
 faith_in_liberty_idea:0 "Glaube an die Freiheit"
 faith_in_liberty_idea_desc:0 "Wir glauben an Demokratie und Freiheit und werden diese Werte um jeden Preis verteidigen. Unsere Bevölkerung ist bereit, das Land unter Einsatz ihres Lebens zu verteidigen. Wir sind das Land der Freiheit!"
 balkans_trade:0 "Transeuropäisches Handelsabkommen"
 balkans_trade_desc:0 "Mit Hilfe unserer diplomatischen Gesandten konnten wir ein für unser Land vorteilhaftes Handelsabkommen abschließen. Dieses Abkommen wird uns helfen, unsere Armee zu versorgen und Einfluss in der Geschäftswelt zu gewinnen."
 german_alb_trade:0 "Deutsch-Albanischer Handelspakt"
 german_alb_trade_desc:0 "Die wirtschaftliche Zusammenarbeit zwischen unseren beiden Ländern soll unsere Freundschaft stärken und wäre für beide Seiten von Vorteil. Mit diesem Handelsabkommen wird es uns leichter fallen, unsere Truppen zu versorgen und zu organisieren."
 italian_invasion_incoming_idea:0 "Bevorstehende italienische Invasion"
 italian_invasion_incoming_idea_desc:0 "Unsere nach Italien entsandten Spione und Diplomaten haben uns gewarnt, dass sie einen Invasionsplan des italienischen Oberkommandos entdeckt hätten. Wenn das stimmt, müssen wir unser Land so schnell wie möglich auf den Krieg vorbereiten!"
 concessions:0 "Kompromiss mit Italien"
 concessions_desc:0 "Wir haben den Frieden mit Italien zu einem ziemlich hohen Preis erkauft, aber das war der Preis für die Rettung unserer Unabhängigkeit."
 albanian_concessions:0 "Albanische Konzessionen"
 economic_mobilisation:0 "Wirtschaftliche Mobilisierung"
 man_mobilisation:0 "Allgemeine Mobilmachung" 
 economy_overloaded:0 "Überlastete Wirtschaft" 
 acknowledgments_of_the_nation:0 "Danksagungen der Nation" 
 acknowledgments_of_the_nation_desc:0 "Die Bevölkerung Albaniens erkennt unser Handeln an! Wir haben unzähligen jungen Männern das Leben gerettet! Die Bevölkerung ist uns dankbar. Sie ist den Werten der Regierung heute stärker verpflichtet als je zuvor! Sie tritt auch häufiger der Armee bei und ist in Kriegszeiten nachsichtiger mit der Lebensmittelrationierung."
 will_to_fight:0 "Der Wille zum Kampf"
 will_to_fight_desc:0 "Unser Land wird bis zum Ende kämpfen! Kein Schritt zurück, immer vorwärts! Wir werden unser Prestige nicht verlieren und uns nicht zu Verhandlungen mit den Italienern herablassen! Wir werden Widerstand leisten und zubeißen!"
 meritocracy_system:0 "Meritokratisches System"
 meritocracy_system_desc:0 "Wir müssen unser altes, auf sozialem Status basierendes Beförderungssystem durch ein auf Fähigkeiten basierendes System ersetzen! Wir brauchen kompetente Leute, um unsere Armeen zu führen. "
 modern_army:0 "Moderne Armee"
 modern_army_desc:0 "Dank der Reformen, die die Armee durchlaufen hat, können wir sie heute als eine moderne, organisierte und vorbereitete Armee betrachten. Regierung und Bevölkerung können stolz auf das neue Erscheinungsbild unserer Armee sein."
 balanced_budget:0 "Ausgeglichener Haushalt"
 balanced_budget_desc:0 "Ein ausgeglichener Haushalt durch Kürzung unserer Staatsausgaben wird uns dabei helfen, die Steuern für die Durchschnittsbevölkerung zu senken und so eine Steigerung des Konsums zu ermöglichen."
 invite_investors:0 "Ausländische Investoren einladen"
 invite_investors_desc:0 "Damit unsere Volkswirtschaften und Unternehmen richtig funktionieren, brauchen wir Investoren."
 go_with_ita:0 "Verstärkter Handel mit Italien"
 go_with_fra:0 "Verstärkter Handel mit Frankreich"
 no_go_with_ita:0 "Italiens Autorität in Frage gestellt"
 civ_consommation:0 "Anstieg des zivilen Konsums"
 civ_consommation_desc:0 "Unsere Unternehmen werden boomen, wenn der Konsum steigt. Dann können wir die Wirtschaftskrise, in der wir uns seit 1929 befinden, überwinden. Wir werden unser Bestes tun, um die Bürger zum Konsum von Produkten aus unseren Unternehmen zu ermutigen!"
