l_german:
VEN_reformthearmy:0 "Reform der Armee"
VEN_reformthearmy_desc:0 "Unsere Armee muss dringend reformiert werden. Lassen Sie uns mit dem Prozess beginnen."
VEN_fundtheofficeracademy:0 "Finanzieren Sie die Offiziersakademie"
VEN_fundtheofficeracademy_desc:0 "Eines der größten Probleme unserer Streitkräfte ist der Mangel an kompetenten Offizieren. Wir müssen Maßnahmen ergreifen, um diese Situation zu verbessern."
VEN_lessonsfromthegreatwar:0 "Lehren aus dem Ersten Weltkrieg"
VEN_lessonsfromthegreatwar_desc:0 "Auch wenn wir vor zwanzig Jahren nicht direkt an dem schrecklichen Blutbad des Ersten Weltkriegs beteiligt waren, müssen wir unbedingt Lehren aus diesem Konflikt ziehen, damit wir nicht in eine ähnliche Situation geraten."
VEN_advancearmydoctrine:0 "Voranschreitende Armeedoktrin"
VEN_advancearmydoctrine_desc:0 "Es reicht nicht aus, nur eine moderne Armee zu haben, wenn wir immer noch kämpfen, als wäre es 1918. Wir müssen die neue Kunst der Kriegsführung erlernen."
VEN_integratethenationalguard:0 "Integration der Nationalgarde"
VEN_integratethenationalguard_desc:0 "Obwohl sie heute überwiegend auf die Polizeiarbeit beschränkt sind, ist die Nationalgarde eine große Quelle potenzieller Arbeitskräfte."
VEN_traintheinstructors:0 "Unterweisen Sie die Ausbilder"
VEN_traintheinstructors_desc:0 "Wir müssen Propaganda betreiben und Kundgebungen abhalten, um die Moral der Truppen zu stärken. Wenn unsere Soldaten motivierter sind, werden sie besser kämpfen."
VEN_improvemilitarypride:0 "Verbessern Sie den militärischen Stolz"
VEN_improvemilitarypride_desc:0 "Wir müssen Propaganda betreiben und Kundgebungen abhalten, um die Moral der Truppen zu stärken. Wenn unsere Soldaten motivierter sind, werden sie besser kämpfen."
VEN_thenewgeneration:0 "Die neue Generation"
VEN_thenewgeneration_desc:0 "Der Große Krieg ist schon viele Jahre her, und eine neue Generation, die die Schrecken des Krieges nie erlebt hat, tritt der Armee bei. Wir können diese naiven Narren leichter als sonst in die Schlacht führen."
VEN_amodernarmy:0 "Eine moderne Armee"
VEN_amodernarmy_desc:0 "Es ist uns gelungen, unsere Armee sowohl besser zu bewaffnen als auch besser auszubilden. Sie ist nun bereit, sich allen Herausforderungen der Welt zu stellen."
VEN_foundthemilitaryaviationschool:0 "Gründung der Militärfliegerschule"
VEN_foundthemilitaryaviationschool_desc:0 "Im Rahmen unserer militärischen Modernisierung müssen wir dem Beispiel der Großmächte folgen und eine Luftwaffe aufbauen, die dem Schutz unserer großen Nation würdig ist."
VEN_aquireforeignfighterdesigns:0 "Erwerben Sie ausländische Kampfflugzeugdesigns"
VEN_aquireforeignfighterdesigns_desc:0 "Wir können nur bis zu einem gewissen Punkt vorankommen, wenn wir unsere Piloten an alten Flugzeugen ausbilden. Wir sollten anfangen, unsere eigenen Kampfflugzeuge auf der Grundlage ausländischer Modelle zu produzieren."
VEN_tacticalbombereffort:0 "Taktischer Bombereinsatz"
VEN_tacticalbombereffort_desc:0 "Mit Kampfflugzeugen sind unsere Möglichkeiten begrenzt. Wir müssen Flugzeuge entwickeln, die direkte Angriffe und Truppenunterstützung durchführen können."
VEN_planejumping:0 "Überzeugen Sie die Leute, aus Flugzeugen zu springen"
VEN_planejumping_desc:0 "Obwohl es verrückt klingt, haben wir gehört, dass es eigentlich eine ziemlich gute Idee ist, Soldaten aus Flugzeugen abzuwerfen. Das einzige Problem besteht darin, die Soldaten davon zu überzeugen ..."
VEN_improveourequipment:0 "Verbessern Sie unsere Ausrüstung"
VEN_improveourequipment_desc:0 "Unsere Waffen sind veraltet und schlecht. Wir müssen anfangen, sie zu modernisieren."
VEN_hireforeignweapondesigners:0 "Stellen Sie ausländische Waffendesigner ein"
VEN_hireforeignweapondesigners_desc:0 "Es wäre schön, bessere Waffen zu haben. Lasst uns ein paar Leute anheuern, die sie für uns herstellen."
VEN_specializedequipment:0 "Spezialausrüstung"
VEN_specializedequipment_desc:0 "Jetzt, da wir bessere Waffen haben, können wir uns speziellere Ausrüstung zulegen. Zum Beispiel Schaufeln."
VEN_aquireamericanrifledesigns:0 "Erwerben Sie amerikanische Gewehrdesigns"
VEN_aquireamericanrifledesigns_desc:0 "Die Amerikaner haben gute Waffen. Wir sollten uns ihre Designs ausleihen."
VEN_supportartilleryeffort:0 "Unterstützung der Artilleriebemühungen"
VEN_supportartilleryeffort_desc:0 "Unsere Wissenschaftler haben herausgefunden, dass es effizienter ist, Granaten auf den Feind zu werfen, als nur warme Körper. Diese Idee sollten wir aufgreifen."
VEN_amotorizedmilitary:0 "Ein motorisiertes Militär"
VEN_amotorizedmilitary_desc:0 "Mit dem LKW ist man schneller als zu Fuß. Mehr muss man dazu nicht sagen."
VEN_tanksofourown:0 "Unsere eigenen Panzer"
VEN_tanksofourown_desc:0 "Da wir jetzt über Lastwagen verfügen, sollten wir auch passende Panzer dazu entwickeln."
VEN_purchaseitalianships:0 "Kaufen Sie italienische Schiffsdesigns"
VEN_purchaseitalianships_desc:0 "Wir verfügen zwar noch nicht über eine eigene Schiffbauindustrie, haben aber das Geld, um Schiffe zu kaufen. Nutzen wir dieses schwarze Gold."
VEN_newnavaldesigns:0 "Neue Schiffsdesigns"
VEN_newnavaldesigns_desc:0 "Um eine respektable Marine zu haben, sollten wir die Designs der italienischen Schiffe, die wir gekauft haben, studieren und nachahmen."
VEN_screeneffort:0 "Bildschirmaufwand"
VEN_screeneffort_desc:0 "Das Kopieren von Designs ist in Ordnung, aber wenn es um den Schutz unseres wertvollen Öls geht, sollten wir uns auf unsere eigenen Designs verlassen."
VEN_reformthemarines:0 "Reformieren Sie die Marines"
VEN_reformthemarines_desc:0 "Die venezolanische Marine blickt auf eine lange und bewegte Geschichte zurück. Wir sollten die Gruppe reformieren und sie besser ausbilden."
VEN_studyinvasiontactics:0 "Studieren Sie Invasionstaktiken"
VEN_studyinvasiontactics_desc:0 "Was nützen Marines ohne Invasionen vom Meer aus? Wir müssen lernen, wie wir das am besten erreichen."
VEN_growshipbuilding:0 "Ausbau der Schiffbauindustrie"
VEN_growshipbuilding_desc:0 "Beginnen wir mit der Entwicklung unserer Schiffbauindustrie, indem wir unsere ersten Werften bauen."
VEN_expandmaracaiboshipyard:0 "Erweiterung der Maracaibo-Werft"
VEN_expandmaracaiboshipyard_desc:0 "Die neuen Werften reichen nicht aus. Wir müssen die Produktion ausweiten."
VEN_upgradecaracasnavalbase:0 "Ausbau des Marinestützpunkts Caracas"
VEN_upgradecaracasnavalbase_desc:0 "Unsere derzeitigen Einrichtungen reichen nicht aus, um unsere wachsende Flotte unterzubringen. Wir sollten die Docks und die Seeverteidigung des Marinestützpunkts Caracas erweitern."
VEN_thesnrc:0 "Der Sonderrat für Marineforschung"
VEN_thesnrc_desc:0 "Viel zu lange bestand unsere Marine nur aus Küstenwachbooten und ein paar Schwimmwesten. Wir werden einen Rat aus Spitzeningenieuren bilden, der unsere neue Marine entwerfen soll."
VEN_convoyescorttactics:0 "Konvoi-Eskorttaktiken"
VEN_convoyescorttactics_desc:0 "Unsere Wirtschaft ist vom Öl abhängig. Um die Blutversorgung unseres Landes zu gewährleisten, müssen wir uns auf den Schutz der Ölkonvois konzentrieren."
VEN_morethanacoastguard:0 "Mehr als eine Küstenwache"
VEN_morethanacoastguard_desc:0 "Unsere Marine ist nicht länger ein Gegenstand des Mitleids und der Verachtung. Unsere Schiffe werden jetzt ernst genommen und wir können Einfluss über unsere eigenen Küsten hinaus ausüben."
VEN_strengthenthegovernment:0 "Stärkung der Regierung"
VEN_strengthenthegovernment_desc:0 "Seit dem letzten Putsch ist die Stabilität Venezuelas fraglich. Lassen Sie uns auf verschiedene Weise Schritte unternehmen, um die Situation zu verbessern."
VEN_embracestrikers:0 "Nehmen Sie die Reformen des Streikenden an"
VEN_embracestrikers_desc:0 "Die kommunistischen Arbeiter haben recht. Die ausländischen Teufel haben uns ausgesaugt wie Mücken und unser Volk wie Tiere behandelt. Das muss ein Ende haben."
VEN_communistwinelections:0 "Kommunisten gewinnen Kommunalwahlen"
VEN_communistwinelections_desc:0 "Nachdem die Regierung auf die Forderungen der Streikenden reagiert und die Ölkonzerne rausgeworfen hat, konnte die Kommunistische Partei in vielen Gemeinderäten und Kommunen Sitze gewinnen. Es ist nur eine Frage der Zeit, bis die rote Welle ihren Höhepunkt erreicht."
VEN_venezuelansocialism:0 "Venezolanischer Sozialismus"
VEN_venezuelansocialism_desc:0 "Die Sowjets mögen behaupten, die Führer des Kommunismus zu sein, aber ihr System ist fehlerhaft. Wir sind besser dran, wenn wir unsere Arbeiter selbst ins Paradies führen."
VEN_invitethetrotsyites:0 "Laden Sie die Trotzkisten ein"
VEN_invitethetrotsyites_desc:0 "Stalin ist ein grausamer Herrscher, und viele Intellektuelle, insbesondere diejenigen aus dem Umfeld Leo Trotzkis, leiden unter seiner Herrschaft. Wir sollten ihnen Visa und Asyl in unserem Land gewähren und die Vorteile daraus ziehen."
VEN_launchtherevolution:0 "Starten Sie die Revolution"
VEN_launchtherevolution_desc:0 "Die Befreiung unserer Arbeiter ist da. Es ist an der Zeit, dass wir das alte kapitalistische System formell abschaffen und einen mutigen Sprung in eine neue Welt wagen."
VEN_prosovietpolicies:0 "Prosowjetische Politik"
VEN_prosovietpolicies_desc:0 "Da uns die dickköpfigen Amerikaner im Nacken sitzen, besteht die einzige Möglichkeit für den Erfolg unseres kommunistischen Systems darin, uns mit den Sowjets zusammenzuschließen, Beziehungen aufzubauen und Handel zu treiben. "
VEN_thekharbovgonzaleztreaty:0 "Der Vertrag von Charbow und Gonzolez"
VEN_thekharbovgonzaleztreaty_desc:0 "Unser Botschafter hat ein Forschungs- und Industrieabkommen mit der UdSSR unterzeichnet, das uns große Vorteile bringen wird."
VEN_jointherevolution:0 "Schließen Sie sich der sowjetischen Revolution an"
VEN_jointherevolution_desc:0 "Es ist Zeit für uns, uns offen als Teil der Komintern zu bekennen und uns der globalen Revolution anzuschließen."
VEN_communisteducation:0 "Kommunistische Erziehung"
VEN_communisteducation_desc:0 "Da unter dem kommunistischen System alle unsere Bürger gleich sind, müssen wir dafür sorgen, dass unsere Kinder eine „richtige“ Erziehung in Marxismus und Nationalstolz erhalten."
VEN_worksmarternotharder:0 "Arbeiten Sie intelligenter, nicht härter"
VEN_worksmarternotharder_desc:0 "Den Mangel an etablierter Industrie müssen wir durch innovative Ideen und Lösungen ausgleichen."
VEN_restructuretheofficercorps:0 "Umstrukturierung des Offizierskorps"
VEN_restructuretheofficercorps_desc:0 "Die Offiziere der Armee sind im Rückstand und brauchen eine Umstrukturierung. Wir werden die Faulenzer durch echte sozialistische Venezolaner ersetzen."
VEN_spreadtherevolutionwest:0 "Verbreite die Revolution im Westen"
VEN_spreadtherevolutionwest_desc:0 "Die Bevölkerung Kolumbiens leidet unter ihrem korrupten demokratischen System. Wir werden sie von ihrem falschen Bewusstsein befreien."
VEN_liberatethewestcoast:0 "Befreie die Westküste"
VEN_liberatethewestcoast_desc:0 "Warum in Bogotá bleiben? Wir werden die Küste entlangziehen und unsere peruanischen und ecuadorianischen Brüder befreien. "
VEN_strikenorth:0 "Schlag nach Norden"
VEN_strikenorth_desc:0 "Wir sollten unsere enorme Stärke nutzen, um Marinestützpunkte in der Karibik zu errichten und sie in einen venezolanischen See zu verwandeln."
VEN_foundsebin:0 "SEBIN gefunden"
VEN_foundsebin_desc:0 "Der Servicio Bolivariano de Inteligencia Naciona, oder Bolivarischer Geheimdienst, ist ein logischer nächster Schritt, um sicherzustellen, dass die Menschen glücklich und frei vom Einfluss ausländischer Mächte sind."
VEN_ensuredomesticsecurity:0 "Gewährleistung der inneren Sicherheit"
VEN_ensuredomesticsecurity_desc:0 "Um den Widerstand der Bevölkerung gegen unsere Herrschaft zu unterdrücken, muss dem SEBIN im Inland mehr Handlungsspielraum eingeräumt werden, darunter die Inhaftierung ohne Gerichtsverfahren und die Legalisierung der Folter für des Hochverrats Angeklagte."
VEN_industrialespionage:0 "Industriespionage"
VEN_industrialespionage_desc:0 "Unsere Spione im Ausland senden uns ständig die neuesten Informationen zu den neuesten Industrietechniken."
VEN_crushthedissenters:0 "Zerschmettert die Andersdenkenden"
VEN_crushthedissenters_desc:0 "Was bilden sich diese dreckigen Kommunisten ein? Wir müssen die Nationalgarde schicken, damit diese faulen Schweine sofort wieder an die Arbeit gehen!"
VEN_reachouttogermany:0 "Deutschland erreichen"
VEN_reachouttogermany_desc:0 "Das deutsche Modell der Effizienz und Stärke ist bewundernswert, wir sollten eine freundschaftliche Beziehung zu ihnen aufbauen."
VEN_inviteigforben:0 "IG Farben einladen"
VEN_inviteigforben_desc:0 "Den Deutschen scheint es ständig an Ölmangel zu mangeln. Wir sind in der einzigartigen Lage, ihnen dabei zu helfen. Wir müssen Berater der IG Forben in unser Land einladen."
VEN_alignwiththeaxis:0 "An der Achse ausrichten"
VEN_alignwiththeaxis_desc:0 "Es ist an der Zeit, dass wir unseren Beitritt zum „Stahlpakt“ mit Deutschland offiziell erklären."
VEN_empowerthepresident:0 "Ermächtigen Sie den Präsidenten"
VEN_empowerthepresident_desc:0 "Die jüngsten Streiks haben die Schwäche der Regierung deutlich gemacht. Wir müssen der zentralen Exekutive mehr Macht geben, um die Unentschlossenheit zu verringern."
VEN_centralizethebureaucracy:0 "Zentralisierung der Bürokratie"
VEN_centralizethebureaucracy_desc:0 "Unsere bürokratischen Behörden sind korrupt und aufgebläht. Der Präsident muss ein Antikorruptionsgesetz erlassen und es zum Wohle des Staates strikt durchsetzen."
VEN_restricttheforeigners:0 "Beschränken Sie die Ausländer"
VEN_restricttheforeigners_desc:0 "Diese blutsaugenden Ölkonzerne gibt es schon zu lange. Wir sollten anfangen, ihre Aktivitäten einzuschränken, um unsere Souveränität wiederzuerlangen."
VEN_specialforces:0 "Spezialeinheiten"
VEN_specialforces_desc:0 "Unsere Spezialeinheiten sind derzeit nichts Besonderes. Strenges Training und Ausrüstungsverbesserungen sollten das ändern."
VEN_nationalizeoilproduction:0 "Verstaatlichung der Ölproduktion"
VEN_nationalizeoilproduction_desc:0 "Es ist an der Zeit, die Kontrolle über alle ausländischen Ölproduktionsanlagen an die Regierung zu übergeben und die gierigen Ausländer hinauszuwerfen. Venezolanisches Öl sollte die venezolanischen Taschen füllen!"
VEN_improvenationalwill:0 "Stärkung des nationalen Willens"
VEN_improvenationalwill_desc:0 "Durch eine umfangreiche Propagandakampagne wollen wir Stolz auf die Geschichte und den Weg unseres Landes vermitteln. Schließlich ist Venezuela das reichste und großartigste Land Südamerikas! (Vielleicht...)"
VEN_embracegrancolombianlegacy:0 "Nehmen Sie das großkolumbianische Erbe an"
VEN_embracegrancolombianlegacy_desc:0 "Seit dem unglücklichen Zusammenbruch Großkolumbiens ist rund ein Jahrhundert vergangen. Doch nun ist die Zeit reif, dem Konzept eine neue Chance zu geben. Solange die Regierung venezolanisch ist."
VEN_strikewest:0 "Streik im Westen"
VEN_strikewest_desc:0 "Wir müssen nach Westen vorstoßen und unsere historischen Ansprüche in Kolumbien geltend machen."
VEN_seizeperu:0 "Erobere Peru"
VEN_seizeperu_desc:0 "Peru ist ein schwacher Staat, wir müssen das Eisen schmieden, solange es heiß ist!"
VEN_mopupecuador:0 "Ecuador aufräumen"
VEN_mopupecuador_desc:0 "Ha, wir hätten es fast übersehen, weil es so unbedeutend war! Wischen Sie den Fleck an unserer Grenze weg!"
VEN_preparethenavy:0 "Bereiten Sie die Marine vor"
VEN_preparethenavy_desc:0 "Wir müssen unsere Marine auf Konflikte in der Karibik vorbereiten."
VEN_seizeguyana:0 "Erobere Guyana"
VEN_seizeguyana_desc:0 "Zu lange haben die Briten unser rechtmäßiges Land in Guyana kontrolliert. Wir müssen die Initiative ergreifen und es uns zurückholen! Allerdings müssen wir auf mögliche Vergeltungsschläge vorbereitet sein."
VEN_carribeanpush:0 "Karibik-Push"
VEN_carribeanpush_desc:0 "Die Karibik ist ein wunderschöner Ozean und es wäre wirklich eine Schande, ihn nicht vollständig zu besitzen."
VEN_comprimisewithworkers:0 "Kompromiss mit den Arbeitnehmern"
VEN_comprimisewithworkers_desc:0 "Wir sehen, dass viele Beschwerden der Arbeiter berechtigt sind. Wir werden ein wenig nachgeben, aber sie müssen wieder an die Arbeit gehen."
VEN_encourageforeigninvestment:0 "Förderung ausländischer Investitionen"
VEN_encourageforeigninvestment_desc:0 "Der schnellste Weg, unser Land zu entwickeln, ist mit ausländischem Geld. Deshalb müssen wir ein Magnet für mehr davon werden!"
VEN_empowerbusinesscouncils:0 "Stärkung der Wirtschaftsräte"
VEN_empowerbusinesscouncils_desc:0 "Die wahre Macht unseres Landes liegt in den Taschen unserer reichsten Geschäftsleute. Diese Männer haben sich im oligarchischen „Consejo de Negocios“ (Wirtschaftsrat) zusammengeschlossen und das Militär gekauft. Sie kontrollieren nun die Regierung."
VEN_limitforeigninfluence:0 "Begrenzen Sie den ausländischen Einfluss"
VEN_limitforeigninfluence_desc:0 "Ausländisches Geld ist gut und schön, aber wir müssen danach streben, Autarkie zu entwickeln."
VEN_protectionistpolicy:0 "Protektionistische Politik"
VEN_protectionistpolicy_desc:0 "Wir müssen unsere jungen Industrien mit Zöllen schützen, um die ausländische Konkurrenz zu blockieren."
VEN_diversifytheeconomy:0 "Diversifizierung der Wirtschaft"
VEN_diversifytheeconomy_desc:0 "Öl ist großartig, aber wir können damit keine Städte bauen. Wir müssen die Wirtschaft diversifizieren, um in Zukunft zu überleben."
VEN_anaggressivedefense:0 "Eine aggressive Verteidigung"
VEN_anaggressivedefense_desc:0 "Angriff ist die beste Verteidigung. Wir können in dieser Zeit des Konflikts nicht einfach untätig herumsitzen. Wir müssen bereit sein, anzugreifen, um unsere Interessen zu verteidigen."
VEN_lessonsfromswitzerland:0 "Lehren aus der Schweiz"
VEN_lessonsfromswitzerland_desc:0 "Um die Menschen und unser Geld zu schützen, sollten wir dem Schweizer Modell der militanten Neutralität folgen."
VEN_formtheleb:0 "Bilden Sie den lateinischen Wirtschaftsblock"
VEN_formtheleb_desc:0 "Da wir nun eine dominierende südamerikanische Volkswirtschaft sind, können wir unseren eigenen Wirtschafts- und Sicherheitsblock bilden, wie es die Amerikaner, Briten und Russen getan haben."
VEN_allowlocalelections:0 "Lokale Wahlen zulassen"
VEN_allowlocalelections_desc:0 "Um die Interessen unserer Bevölkerung bestmöglich zu vertreten, müssen wir ihr eine Stimme geben, damit sie uns sagen kann, was sie will. "
VEN_inviteamericaninvestors:0 "Laden Sie amerikanische Investoren ein"
VEN_inviteamericaninvestors_desc:0 "Die Amerikaner sind zu reich für ihr eigenes Wohl. Bringen wir sie dazu, sich von einem Teil dieses Geldes zu trennen."
VEN_pushforfreedom:0 "Streben nach Freiheit"
VEN_pushforfreedom_desc:0 "Unser Volk wünscht sich eine Stimme und Freiheit, wir müssen sie ihm geben!"
VEN_lowertradebarriers:0 "Niedrigere Handelsbarrieren"
VEN_lowertradebarriers_desc:0 "Der Außenhandel hat uns eine schnelle Entwicklung ermöglicht. Angesichts der drohenden Kriegsgefahr ist es vielleicht das Beste, möglichst viele Freunde zu haben."
VEN_oilbreakthrough:0 "Öl-Durchbruch"
VEN_oilbreakthrough_desc:0 "Ein Team britischer Geologen hat unter unseren Füßen riesige zusätzliche Ölreserven entdeckt! Dieser Durchbruch wäre ohne ausländische Hilfe nicht möglich gewesen."
VEN_americaneconomicsupport:0 "Amerikanische Wirtschaftsunterstützung"
VEN_americaneconomicsupport_desc:0 "Angesichts eines drohenden Krieges sind die Amerikaner mehr als bereit, bei der Entwicklung unseres Landes zu helfen, im Austausch für Öl, um ihre Industriemaschinerie anzutreiben."
VEN_alignwithallies:0 "Verbündeter"
VEN_alignwithallies_desc:0 "In diesen gefährlichen Zeiten ist es gut, große, starke Freunde zu haben, die einem den Rücken freihalten."
VEN_prepareintervention:0 "Intervention vorbereiten"
VEN_prepareintervention_desc:0 "Die Deutschen sind zu weit gegangen. Wir müssen die Freiheit unserer Mitmenschen schützen und sie niederschlagen."
VEN_awartimeeconomy:0 "Eine Kriegswirtschaft"
VEN_awartimeeconomy_desc:0 "Wir müssen die Produktion steigern, um unsere Kriegsanstrengungen voranzutreiben."
VEN_industrialexpansion:0 "Industrielle Expansion"
VEN_industrialexpansion_desc:0 "Die Industrie ist das neue Rückgrat unserer Wirtschaft, wir müssen sie verbessern."
VEN_exploitouroil:0 "Unser Öl ausbeuten"
VEN_exploitouroil_desc:0 "Unter unseren Füßen liegt ein scheinbar unbegrenzter Ölvorrat. Wir müssen sein volles Potenzial nutzen."
VEN_developthecountryside:0 "Ausbau der Nationalstraßen"
VEN_developthecountryside_desc:0 "Unsere derzeitige Infrastruktur ist miserabel. Es ist Zeit, in ein nationales Autobahnsystem zu investieren."
VEN_infrastructurepush:0 "Elektrifizierung"
VEN_infrastructurepush_desc:0 "Der Großteil der Bevölkerung lebt ohne Elektrizität. Eine Lösung dieses Problems würde sowohl die Wirtschaft als auch das Leben der Menschen verbessern."
VEN_civindexpansion1:0 "Erweiterung der Zivilindustrie 1"
VEN_civindexpansion1_desc:0 "Wir müssen kleine Unternehmen subventionieren, damit sie groß werden."
VEN_civindexpansion2:0 "Erweiterung der Zivilindustrie 2"
VEN_civindexpansion2_desc:0 "Überall schießen Fabriken aus dem Boden, das ist großartig."
VEN_expandmilitaryproduction:0 "Erweitern Sie die Militärproduktionen"
VEN_expandmilitaryproduction_desc:0 "Wir können nicht einfach nur Toasteröfen herstellen, unsere Armeen brauchen Waffen, um zu kämpfen und zu gewinnen."
VEN_createarmsfactoriesinthecapital:0 "Bauen Sie Waffenfabriken in der Hauptstadt"
VEN_createarmsfactoriesinthecapital_desc:0 "Wir haben in der Hauptstadt viele Vagabunden, wir sollten sie in einigen neuen Waffenfabriken beschäftigen."
VEN_militaryindexpansion:0 "Militärisch-industrielle Expansion"
VEN_militaryindexpansion_desc:0 "Um unsere Kriegsmaschinerie anzutreiben, ist eine weitere militärische Expansion erforderlich."
VEN_industrializedrubber:0 "Industrieller Gummi"
VEN_industrializedrubber_desc:0 "Kautschuk wird bei der Produktion von Fahrzeugen und anderen Gütern immer wichtiger. Wir sollten unsere Inlandsproduktion ausbauen, um nicht von ausländischen Lieferungen abhängig zu werden."
VEN_nationalindustrialeffort:0 "Nationale industrielle Anstrengungen"
VEN_nationalindustrialeffort_desc:0 "Wir müssen die Bevölkerung hinter unserer Branche mobilisieren und sie zu neuen Höhen führen."
VEN_efficiencysstandards:0 "Effizienz- und Qualitätsstandards"
VEN_efficiencysstandards_desc:0 "Um sicherzustellen, dass alle unsere Produkte die Bezeichnung „Made in Venezuela“ verdienen, müssen wir landesweite Effizienz- und Qualitätsstandards einführen und durchsetzen."
VEN_modernizationfueledbyoil:0 "Modernisierung durch Öl"
VEN_modernizationfueledbyoil_desc:0 "Öl ist der Treibstoff für Lastwagen, Schiffe und Flugzeuge. Es gibt keinen Grund, warum wir es nicht auch für unsere Modernisierung nutzen können."
VEN_createthecentralbank:0 "Erstellen Sie die Zentralbank"
VEN_createthecentralbank_desc:0 "Wir müssen eine Zentralbank gründen, um die Volkswirtschaft effizienter zu regulieren und die Landeswährung auszugeben und zu überwachen."
VEN_industrialresearch:0 "Industrielle Forschung"
VEN_industrialresearch_desc:0 "Die Verwendung der Einnahmen von Banken und des Staates zur Förderung der industriellen Forschung wird sich zweifellos positiv auf die Wirtschaft auswirken."
VEN_nationalelectricinstitute:0 "Nationales Elektrisches Institut"
VEN_nationalelectricinstitute_desc:0 "Wir werden das staatliche National Electrical and Engineering Institute gründen und subventionieren, um die nächste Generation von Ingenieuren und Erfindern auszubilden."
VEN_cryptographystudies:0 "Kryptographie-Studien"
VEN_cryptographystudies_desc:0 "Wir dürfen bei der Geheimhaltung unserer Kommunikation nicht hinter den anderen Ländern zurückfallen. Wir haben einige vielversprechende NEI-Studenten gefunden, die bereit sind, die Herausforderung anzunehmen."
VEN_universitysubsidies:0 "Universitätszuschüsse"
VEN_universitysubsidies_desc:0 "Neben dem NEI sollten wir auch staatliche und private Universitäten im ganzen Land mit zusätzlichen Mitteln versorgen."
VEN_institutethecensus:0 "Führen Sie die Volkszählung durch"
VEN_institutethecensus_desc:0 "Es ist lächerlich, dass wir nicht wissen, wer jeder innerhalb unserer Grenzen ist. Wir müssen eine obligatorische Volkszählung einführen, um diese Situation zu ändern."
VEN_nationalpublicschooling:0 "Nationales öffentliches Schulwesen"
VEN_nationalpublicschooling_desc:0 "Es ist sinnlos, die Hochschulbildung zu finanzieren, wenn es kaum eine weiterführende Bildung gibt. Lassen Sie uns ein Programm für eine verpflichtende öffentliche Schulbildung einführen, um unseren jungen Bürgern Chancen zu eröffnen."
VEN_developnukes:0 "Entwickeln Sie „La Bomba“"
VEN_developnukes_desc:0 "Um in dieser schönen neuen Welt zu überleben, müssen wir sicherstellen, dass wir über die größten und zerstörerischsten Waffen verfügen. Dazu gehören auch Atomwaffen."
