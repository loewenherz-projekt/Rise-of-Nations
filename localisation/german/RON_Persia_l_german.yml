PER_fund_islamic_school:0 "Finanzierung islamischer Schulen"
PER_very_angry_clergy:0 "Unzufriedene Geistliche"
PER_very_angry_clergy_desc:0 "Als Reaktion auf die Versuche der Regierung, ihre Macht einzuschränken, hat der Klerus begonnen, die Massen zu Demonstrationen gegen die Regierung aufzustacheln. Wenn wir den Klerus nicht bald vernichten oder wieder auf Augenhöhe mit ihm stehen, könnten wir in ernsthafte Schwierigkeiten geraten."\
