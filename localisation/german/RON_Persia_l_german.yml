PER_oil_nationalization_decision:0 "Verstaatlichung des Öls"
PER_oil_nationalization_decision_desc:0 "Ai Mellat! Es ist an der Zeit, unser Öl zu verstaatlichen, um unser rechtmäßiges Ölgeld zu erhalten. Angesichts der zunehmenden Spannungen in Europa haben die Briten keine andere Wahl, als sich auf Europa statt auf uns zu konzentrieren."
PER_nationalize_the_oil:0 "Verstaatlichung der Ölindustrie"
PER_nationalize_the_oil_again:0 "Beenden Sie den Ölvertrag"
PER_relation_with_germany:0 "Beziehungen zu Deutschland"
PER_relation_with_germany_desc:0 "Die Deutschen nehmen uns langsam in ihren Einflussbereich auf. Wir sind eine Art „Achse“ gegen die Briten. Indem wir politische Macht gegen Ausrüstung und Forschungsgelder tauschen, können wir uns gegenseitig helfen.\n\nEine übermäßige Abhängigkeit von den Deutschen @GER wird die Briten @ENG sehr verärgern und könnte zu einer Intervention führen!\n\n(Die [GER.GetAdjective] @GER-Meinung über uns sollte nicht höher als §G60§ sein!.)\n\nDie aktuelle [GER.GetAdjective]-Meinung über uns ist: §G[?var_german_opinion]§! @GER."
