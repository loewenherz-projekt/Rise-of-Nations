PER_pan_iranism_40_tt:0 "Die Unterstützung des Pan-Iranismus ist §G40§! oder höher"
PER_persian_assimilation:0 "§YEroberte Länder persianisieren§!"
PER_persian_assimilation_desc:0 "Indem wir unsere Macht investieren, können wir die Kultur unserer eroberten Länder umwandeln. Betrachten Sie es nicht als Assimilation, sondern eher als einen freundlichen Besuch.\n\nWenn alle Staaten bereits entkernt sind, erhalten Sie stattdessen §G3000§! an Arbeitskräften."
 

 
 
 
 
 