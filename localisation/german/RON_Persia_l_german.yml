PER_money_var_conversion:0 "Investieren Sie in die Regierung "
PER_money_var_conversion_desc:0 "Wir können unsere angesparten Gewinne nutzen, um unsere Regierung zu stabilisieren und durch Bestechung unerwünschte Personen aus Machtpositionen zu entfernen. Dies kann jedoch zu ungünstigen Ergebnissen führen.\n\nIm Moment können wir §G[?per_var_money]%§! unserer Gewinnspanne in §G[?per_var_money]§! politische Macht eintauschen.\n\nDurch den Tausch unserer §GGewinnspanne§! verlieren wir §R[?per_stab_down]§! Stabilität. "
