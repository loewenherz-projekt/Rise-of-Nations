PER_pan_iran_up_tt:0 "§YSteigert den §HPan-Iranismus§!-Eifer um §G10§!§!\n"
PER_pan_iranism_cat:0 "§gBüro der Eroberung§!"
PER_pan_iranism_cat_desc:0 "Wir werden unser Land Stück für Stück erweitern, es wird wachsen, und bald werden sich selbst die reichsten Mächte unserer Macht beugen. Viele Menschen geraten unter unseren Einfluss, und wir haben triftige Gründe, unsere verlorenen Länder zurückzuerobern. Wir werden ein tausendjähriges Reich errichten.\n\nUnsere Unterstützung für unsere Eroberung beruht auf der Begeisterung des Landes für den Paniranismus.\n\nDie aktuelle Begeisterung für den §HPaniranismus§! ist [?var_pan_iranism|+0]."
