PER_economic_build_up:0 "Wirtschaftlicher Aufbau"
PER_economic_build_up_desc:0 "Jahrelange industrielle Vernachlässigung hat den Iran weit hinter andere Länder zurückgeworfen. Um aufzuholen, müssen wir unsere Industrieproduktion steigern."
PER_trans_iranian_railway:0 "Transiranische Eisenbahn"
PER_trans_iranian_railway_desc:0 "Das Land im Iran ist rau, es ist schwierig, es zu durchqueren und Menschen zu transportieren. Wir müssen in eine Eisenbahnlinie vom ölproduzierenden Süden in die wichtigsten Städte im Norden investieren."
PER_abadan_refinery:0 "Abadan-Raffinerie"
PER_abadan_refinery_desc:0 "Der Süden des Iran ist der größte Ölproduzent. Durch Investitionen in weitere Raffinerien könnten wir versuchen, Öl und Kautschuk zu synthetisieren."
PER_industrial_literarcy:0 "Industrielle Kompetenz"
PER_industrial_literarcy_desc:0 "Wir sind in unserer Industrie zurückgefallen. Der Bau weiterer Fabriken wird einfach nicht ausreichen. Der Trick besteht darin, die Fabriken besser laufen zu lassen."
PER_improve_countryside:0 "Verbesserung der Landschaft"
PER_improve_countryside_desc:0 "Auf dem Land gibt es viele Bauern, die gerne in den Fabriken arbeiten würden. Investitionen in den ländlichen Raum könnten weitere Möglichkeiten schaffen."
PER_increase_workers_paycheck:0 "Erhöhen Sie den Gehaltsscheck"
PER_increase_workers_paycheck_desc:0 "Die Arbeiter verdienen einen größeren Anteil an den Früchten ihrer Arbeit."
PER_expand_bank_melli:0 "Erweitern Sie die Bank-e-Melli"
PER_expand_bank_melli_desc:0 "Unsere Nationalbank könnte eine Erweiterung gebrauchen. Ihre Erweiterung könnte mehr Geschäftsmöglichkeiten eröffnen."
PER_foreign_exchange_control:0 "Devisenkontrolle"
PER_foreign_exchange_control_desc:0 "Der Wert unserer Währung, des Rial oder Toman, wie er von der einheimischen Bevölkerung genannt und verwendet wird, schwankt ständig. Wir müssen ihn etwas stärker kontrollieren."
PER_western_advisors:0 "Westliche Berater"
PER_western_advisors_desc:0 "Eine Modernisierung ist schwierig, doch mit westlichen Beratern können wir den Iran verwestlichen, auch wenn wir möglicherweise feindselige Gefühle gegenüber einander hegen. "
PER_improve_automation:0 "Verbessern Sie die Automatisierung"
PER_improve_automation_desc:0 "Wir stehen kurz vor einer Reform unserer Branche, es bedarf lediglich einer kleinen Nachbesserung in Bezug auf die Automatisierung."
PER_employ_worker_oil:0 "Ölarbeiter beschäftigen"
PER_employ_worker_oil_desc:0 "Durch die Beschäftigung der Arbeiter in den Ölraffinerien, die wir schon vor einiger Zeit in den ländlichen Fabriken errichtet haben, wird unsere Produktion steigen. Darüber hinaus wird sich dadurch auch unsere industrielle Kompetenz steigern."
PER_the_worst_is_over:0 "Das Schlimmste ist vorbei"
PER_the_worst_is_over_desc:0 "Wir haben unser Bestes gegeben und das zeigt sich: Viel harte Arbeit hat uns die Früchte einer leistungsfähigen Industrie beschert."
PER_agrarian_policy:0 "Agrarpolitik"
PER_agrarian_policy_desc:0 "Wenn wir über den Tellerrand blicken, erkennen wir, dass viele Länder neue Wege im Umgang mit den Landwirten auf dem Land eingeschlagen haben. Auch wir müssen uns anpassen."
PER_mineral_exploit:0 "Mineralienabbau"
PER_mineral_exploit_desc:0 "Die Berge des Iran bergen wertvolle Ressourcen. Durch deren Nutzung sind wir weniger von ausländischen Mächten abhängig."
PER_military_expansion:0 "Militärische Expansion"
PER_military_expansion_desc:0 "Auch unser Militär braucht Fabriken. Bisher haben wir uns auf unsere zivile Industrie konzentriert, aber nachdem dieses Problem gelöst ist, braucht auch unser Militär etwas Aufmerksamkeit."
PER_expand_national_schoolsystem:0 "Schaffen Sie das nationale Schulsystem"
PER_expand_national_schoolsystem_desc:0 "Die Bildung lässt bestenfalls zu wünschen übrig, die islamische Schulbildung ist noch immer die einzige verfügbare offizielle Schulform, und deshalb müssen wir ein nationales Schulsystem schaffen. "
PER_tehran_military_complex:0 "Teheran Arms"
PER_tehran_military_complex_desc:0 "Durch die Schaffung von Rüstungsfabriken in Teheran können wir schnell die Waffen produzieren, die wir zur Ausrüstung unserer Truppen benötigen.  "
PER_fortification_effort:0 "Befestigungsbemühungen"
PER_fortification_effort_desc:0 "Eine Invasion scheint in diesen Zeiten sehr wahrscheinlich, und während unsere Berge unseren Truppen Schutz bieten, wird die Befestigung wichtiger Standorte unseren Soldaten den nötigen Vorteil verschaffen."
PER_clear_land:0 "Rodung"
PER_clear_land_desc:0 "Wir brauchen mehr Platz für unsere Industrie, also lasst uns daran arbeiten, diesen zu schaffen."
PER_isfahan_development:0 "Isfahan-Entwicklung"
PER_isfahan_development_desc:0 "Isfahan ist eine der am weitesten entwickelten Städte unseres Landes. Erhöhte Investitionen in Isfahan würden zu höheren Einnahmen führen."
###################
PER_soften_with_clergy:0 "Ein sanfterer Ton"
PER_soften_with_clergy_desc:0 "Der Klerus hat in der Bevölkerung großen Einfluss. Eine direkte Konfrontation mit dem Klerus hätte unvorhergesehene Konsequenzen. Wir müssen unsere Haltung etwas abmildern."
PER_offer_a_choice:0 "Bieten Sie eine Auswahl"
PER_offer_a_choice_desc:0 "Reza Schah zuckte beim Gedanken an islamische Bildung zusammen, aber wir können den Menschen eine Wahl bieten: Entweder sie entscheiden sich für die traditionelle islamische Bildung oder sie vertiefen sich in westliche Bildung."
PER_both_islam_and_persian:0 "Islamisches Denken, persischer Wille"
PER_both_islam_and_persian_desc:0 "Der Islam hat gute Seiten, und wir müssen unsere Identität nicht opfern, um ihm zu folgen. Wir werden eine neue Lebensweise annehmen: islamisches Denken, persischer Wille."
PER_end_the_schism:0 "Beendet das Schisma"
PER_end_the_schism_desc:0 "Die Regierung hat alles getan, um die religiöse Kluft zu überbrücken. Es ist an der Zeit, diese Spaltung zu überwinden. "
PER_allow_clergy_majlis:0 "Geistlichen den Zutritt zum Majlis gestatten"
PER_allow_clergy_majlis_desc:0 "Indem wir Geistlichen, die die Unterschicht repräsentieren, den Zutritt zum Madschlis (Parlament) ermöglichen, können wir dafür sorgen, dass sich jeder Bürger vertreten fühlt."
PER_kashf_e_hijab:0 "Kashfe Hijab"
PER_kashf_e_hijab_desc:0 "Wir haben den Bruchpunkt erreicht. Der Klerus hat einfach zu viel Macht. Wir müssen dem sofort ein Ende setzen! Zuerst müssen wir an der untersten Säule beginnen ..."
PER_seize_the_clerical_holding:0 "Beschlagnahme geistlichen Eigentums"
PER_seize_the_clerical_holding_desc:0 "Als nächstes kommt der Ort, an dem sich die Geistlichen versammeln und den Leuten das Falsche beibringen und das Richtige missachten. Wir werden nehmen, was sie haben, und es in etwas Nützliches umwandeln."
PER_shahnameh:0 "Shahnameh"
PER_shahnameh_desc:0 "Dreißig Jahre hat Ferdowsi damit verbracht, Farsi Ajam (nicht-arabisch) zu bewahren, seine Bemühungen werden nicht umsonst sein, denn von nun an ist nicht der Koran das Buch der Wahl, sondern das Schahname."
PER_crush_clerical_influence:0 "Zerschlagen Sie den Einfluss der Geistlichen"
PER_crush_clerical_influence_desc:0 "Das Zeitalter der islamischen Vorherrschaft neigt sich dem Ende zu. Der Islam wird nicht länger über die Bevölkerung herrschen wie ein Hirte über seine Schafherde."
PER_liberalize_the_country:0 "Liberalisieren Sie das Land"
PER_liberalize_the_country_desc:0 "Da wir nun die volle Kontrolle über unser Land haben, können wir es liberalisieren und zu einer freieren Gesellschaft machen."
###########################
PER_interal_matter:0 "Bleiben Sie bei dem, was wir wissen"
PER_interal_matter_desc:0 "Wir haben in diesen Ländern viele Ideologien erlebt. Sowohl die Monarchie als auch der Kommunismus haben gezeigt, was sie können, und es ist am besten, an ihnen festzuhalten."
PER_path_of_the_khan:0 "Pfad des Khans"
PER_path_of_the_khan_desc:0 "Seine Majestät ist nach Jahren der Dekadenz der Kadscharen an die Macht gekommen. Er hat uns bisher gute Dienste geleistet. Lassen Sie uns sehen, was er erreichen kann."
PER_continue_the_monarchy:0 "Die Monarchie fortsetzen"
PER_continue_the_monarchy_desc:0 "Ein zerrüttetes Land braucht einen starken Führer, und Reza Schah ist einer dieser Führer. Mit seiner eisernen Faust wird er die Korruption in die Knie zwingen."
PER_drift_germany:0 "Drift Richtung Deutschland"
PER_drift_germany_desc:0 "Während jede andere Führungspersönlichkeit versuchen würde, die Beziehungen zwischen den verschiedenen Ländern auszugleichen, hat Deutschland gezeigt, dass es in der Lage ist, gegen die Briten zu kämpfen. Daher müssen wir diesem Beispiel folgen. "
PER_expel_british:0 "Britische Berater ausweisen"
PER_expel_british_desc:0 "Die Briten haben in unserem Land zu viel Kontrolle, und ihre Ausweisung könnte sie zwar verärgern, ist aber ein notwendiges Übel."
PER_expand_boy_scout:0 "Die Pfadfinder"
PER_expand_boy_scout_desc:0 "Wir können die Pfadfinderschaft erweitern, um mehr Mitglieder aufzunehmen, und sie sogar in unsere Armee integrieren, um eine frühere Ausbildung zu ermöglichen."
PER_ban_communist:0 "Verbot der Linken"
PER_ban_communist_desc:0 "Die Linke ist uns ein Dorn im Auge, sie wächst wie ein Tumor, ihre Existenz muss beendet werden, da sie sich als gefährlich erweisen und die Säulen unserer Gesellschaft zerstören könnte."
PER_breakdown_corruption:0 "Hartes Vorgehen gegen die Korrupten"
PER_breakdown_corruption_desc:0 "Handeln Sie schnell! Wir müssen die korrupten Politiker sofort verhaften und einsperren! Ihre Zeit, diese Nation zu zerstören, ist vorbei!"
PER_khan_cult:0 "Kult des Khans"
PER_khan_cult_desc:0 "Der Khan hat bewiesen, dass er in der Lage ist, die Nation zu führen. Nachdem er nun das Chaos überwunden hat, ist es an der Zeit, ihn als Vater des modernen Iran zu etablieren."
PER_great_leap:0 "Fünf Schritte vorwärts"
PER_great_leap_desc:0 "Um die iranische Industrie auszubauen, ist eine Konzentration auf die Wirtschaftsleistung notwendig. Dies kann zwar mit Opfern verbunden sein, ist aber für einen modernen Iran notwendig. [PER.GetLeader] wird dafür sorgen, dass die Wirtschaft einen enormen Aufschwung erlebt."
PER_close_british_embassies:0 "Schließung der britischen Botschaft"
PER_close_british_embassies_desc:0 "Die Schließung der britischen Botschaft im Iran wird den britischen Einfluss auf die iranische Politik verringern. Das wird sie sicherlich verärgern, uns aber ermöglichen, uns stärker den Deutschen anzunähern."
PER_purchase_german_steel:0 "Importieren Sie deutschen Stahl"
PER_purchase_german_steel_desc:0 "Wir haben uns schon seit einiger Zeit mit [GER.GetAdjective] angefreundet und da wir für unsere wachsende Industrie immer mehr Stahl benötigen, können wir sie um materielle Unterstützung bitten."
PER_invite_arthur_millspaugh:0 "Laden Sie Arthur Millspaugh ein"
PER_invite_arthur_millspaugh_desc:0 "Arthur Millspaugh ist ein amerikanischer Finanzexperte, der dem Iran einige Jahre lang geholfen hat, dann aber entlassen wurde. Dank unserer Verbindungen zu [USA.GetNameDef] können wir ihn jedoch erneut einladen, seine Dienste anzubieten."
PER_opinion_usa_20_tt:0 "§Y[USA.GetAdjective]§!-Meinung muss §G20§! oder höher sein."
PER_opinion_german_20_tt:0 "§Y[GER.GetAdjective]§!-Meinung muss §G20§! oder höher sein."
PER_opinion_british_20_tt:0 "§Y[ENG.GetAdjective]§!-Meinung muss §G20§! oder höher sein."
PER_steel_ger_tt:0 "Erhöhen Sie die Produktion von §LSteel§! in §YTeheran§!.\nSie haben eine höhere Chance, dass [GER.GetNameDef] akzeptiert, wenn ihre Meinung uns gegenüber §G10§! oder höher ist.\n"
PER_gain_gendarmerie_tt:0 "§YSetzen Sie zusätzliche Gendarmerie-Brigaden ein§!"
PER_expand_gendarmerie:0 "Erweitern Sie die Gendarmerie"
PER_expand_gendarmerie_desc:0 "Die 1910 gegründete Gendarmerie ist die erste moderne Autobahnpolizei und Polizei im Iran. Es handelt sich um eine paramilitärische Truppe, deren Ausbau es uns ermöglichen wird, gegen Aufstände vorzugehen."

############################
PER_what_should_have_been:0 "Was hätte sein sollen"
PER_what_should_have_been_desc:0 "Reza Khan wollte nie König werden, aber die Briten zwangen ihn dazu, damit sie ihn wie eine Marionette kontrollieren konnten. Doch Reza Khan hat beschlossen, zurückzutreten und Premierminister des Iran zu werden."
PER_write_new_consitution:0 "Schreiben Sie eine neue Verfassung"
PER_write_new_consitution_desc:0 "Nach dem Rücktritt Reza Khans braucht das Land eine neue Verfassung. Die neuen Gesetze sollen einen freieren Iran ermöglichen."
PER_end_radicalism:0 "Schluss mit dem Radikalismus"
PER_end_radicalism_desc:0 "Da sich unser Land zu einer Demokratie entwickelt, müssen wir den radikalen Elementen in unserem Land ein Ende setzen, damit die Integrität unseres Landes stabil bleibt."
PER_conservative_values:0 "Konservative Werte"
PER_conservative_values_desc:0 "Unser Land ist zerbrechlich, große kulturelle Umwälzungen könnten das Land in kleinere Stämme zerfallen lassen, wir müssen bewahren, was wir haben."
PER_iran_first:0 "Iran zuerst"
PER_iran_first_desc:0 "Wir müssen uns auf unser eigenes Land konzentrieren, anstatt auf andere Länder zu blicken. Wir müssen in unsere eigene Industrie investieren."
PER_reorganize_beuracracy:0 "Reorganisieren Sie die Bürokratie"
PER_reorganize_beuracracy_desc:0 "Die Bürokratie ist voll von korrupten Beamten. Sie müssen gehen. Alle Beamten, die der Korruption verdächtigt werden, werden sofort entfernt."
PER_nationalize_companies:0 "Massenverstaatlichung der Industrie"
PER_nationalize_companies_desc:0 "Viele Unternehmen in unserem Land stehlen unsere Gewinne, die uns eigentlich zustehen. Durch die Verstaatlichung dieser Unternehmen können wir unsere Gewinne maximieren."
PER_centralize_industry:0 "Industrielle Zentralisierung"
PER_centralize_industry_desc:0 "Durch eine sorgfältige Überwachung unserer Branche kann diese sich nicht nur verbessern, sondern auch unseren Bedürfnissen entsprechen."
PER_3_year_plan:0 "Dreijahresplan"
PER_3_year_plan_desc:0 "Indem wir der breiten Masse Konsumgüter anbieten, können wir sie dazu ermutigen, für die Regierung zu arbeiten, damit die von uns benötigten Fabriken schneller gebaut werden."
PER_war_cabinet:0 "Kriegskabinett"
PER_war_cabinet_desc:0 "Durch die Bildung eines Kabinetts, das sich mit dem Krieg und den damit verbundenen Problemen auseinandersetzt, können wir unsere Kommando- und Armeestruktur besser verwalten."
########
PER_republic_mossadeq:0 "Mossadeghs Vision"
PER_republic_mossadeq_desc:0 "Eine neue Persönlichkeit ist in den Vordergrund getreten und wir sind der Meinung, dass er das Potenzial hat, den Iran einer besseren Zukunft näher zu bringen."
PER_a_true_republic:0 "Eine wahre Republik"
PER_a_true_republic_desc:0 "Ein Land wird nicht von einer einzigen Einheit regiert, wir brauchen eine gleichberechtigte Vertretung."
PER_cult_of_mossadq:0 "Mossadegh als Alleinherrscher"
PER_cult_of_mossadq_desc:0 "Mossadegh ist der Einzige, der dieses Land retten kann. Der Majlis tut nichts, außer ihn auszubremsen. Er braucht mehr Macht!"
PER_oust_the_shah:0 "Den Schah stürzen"
PER_oust_the_shah_desc:0 "Die Zeit ist gekommen. Handeln Sie jetzt. Wir müssen die korrupte Regierung des Schahs stürzen und mit der Sanierung des Iran beginnen!"
PER_nationalize_oil:0 "Verstaatlichung der Ölindustrie"
PER_nationalize_oil_desc:0 "Mossadeghs großer Traum: die Verstaatlichung des Öls. Er wird dafür sorgen, dass das Öl in unserem Boden uns gehört!"
PER_liberal_country:0 "Liberale Moral"
PER_liberal_country_desc:0 "Die Freiheit aller Iraner muss an erster Stelle stehen, die Regierung wird sich nur wenig einmischen."
PER_capitalist_society:0 "Kapitalistische Gesellschaft"
PER_capitalist_society_desc:0 "Die Menschen bleiben nicht länger in der Säule stecken, in die sie hineingeboren wurden. Durch harte Arbeit können sie sich ohne Grenzen weiterentwickeln."
PER_invest_industry:0 "Investieren Sie in den Industriesektor"
PER_invest_industry_desc:0 "Eine kapitalistische Gesellschaft braucht Fabriken. Lassen Sie uns in unsere Industrie investieren, um zu wachsen."
PER_stop_the_corrupt:0 "Stoppen Sie die Korruption"
PER_stop_the_corrupt_desc:0 "Die Zeit der Korruption ist vorbei."
PER_freedom_of_press:0 "Pressefreiheit"
PER_freedom_of_press_desc:0 "Den Menschen sollte es erlaubt sein, die Regierung zu kritisieren, damit wir unsere Fehler verbessern können."
PER_mossadegh_socialism:0 "Sozialistische Elemente"
PER_mossadegh_socialism_desc:0 "Obwohl Mossadeghs Ideen eher westlich anmuten, vertritt er einige sozialistische Ideen, die er in das Land integrieren möchte. Indem wir mit einigen groben Entwürfen beginnen, können wir seine Träume wahr werden lassen."

PER_democratic_shah_tt:0 "§RDies könnte zu einer britischen Invasion führen!§!"
PER_reza_karim_tt:0 "Reza Schah tritt als König von §YIran§! zurück, Karim Buzarjomehri übernimmt die Regentschaft von §YIran§!, Reza Khan wird Vorsitzender der Demokratischen Partei.\n\n"
##############
PER_tudeh_iraj:0 "Der Weg des Vorsitzenden"
PER_tudeh_iraj_desc:0 "Die Arbeiter schreien verzweifelt auf, weil sie ignoriert werden, obwohl sie das Rückgrat dieses Landes bilden. Ihre Stimme kann nicht länger unterdrückt werden. Wir müssen den einfachen Arbeiter aus den Klauen des Kapitalismus retten."
PER_rethink_gilan_soviet:0 "Überdenken Sie den Gilan-Sowjet"
PER_rethink_gilan_soviet_desc:0 "Der Tod von Mirza Kuchik Khan wird nicht umsonst gewesen sein. Sein Tod gilt vielen Iranern als Beispiel für Märtyrertum. Sein Traum wird wahr werden, aber im ganzen Land, nicht länger nur im Dschungel von Gilan."
PER_look_to_moscow:0 "Blick nach Moskau"
PER_look_to_moscow_desc:0 "Wir müssen uns von Russland, der Heimat der Revolution, leiten lassen, statt einen törichten Lebensweg anzustreben."
PER_russian_economic_treaty:0 "Wirtschaftsvertrag"
PER_russian_economic_treaty_desc:0 "Durch den Abschluss eines Vertrags mit Russland können wir unsere Wirtschaft wieder in Gang bringen."
PER_humanism:0 "Humanismus"
PER_humanism_desc:0 "In unserem Land hat Diskriminierung und Verfolgung aufgrund ethnischer Zugehörigkeit, Religion und Weltanschauung keinen Platz."
PER_solve_border_disputes:0 "Lösen Sie die Grenzstreitigkeiten"
PER_solve_border_disputes_desc:0 "Wir haben in der Vergangenheit Gebiete an Russland verloren und werden die bis heute bestehenden Grenzstreitigkeiten lösen."
PER_befriend_the_giant:0 "Befreunde dich mit dem Riesen"
PER_befriend_the_giant_desc:0 "Der Riese sitzt uns im Nacken, wir müssen offizielle Beziehungen zu ihm aufbauen."
PER_official_partnership:0 "Offizielle Partnerschaft"
PER_official_partnership_desc:0 "Ai Mellat! Wir haben es geschafft! Mit genügend Geduld haben wir den Iran erfolgreich in ein Arbeiterutopie verwandelt und können nun der kommunistischen Internationale beitreten."
PER_anti_imperalism:0 "Antiimperialismus"
PER_anti_imperalism_desc:0 "Der Imperialismus ist der Tumor dieser Welt und wir müssen ihn von der Bildfläche verschwinden lassen."
PER_independent_commune:0 "Eine unabhängige Kommune"
PER_independent_commune_desc:0 "Stalin ist dumm, sein Kommunismus ist nicht das, was Marx wollte. Wir müssen die Unabhängigkeit von Moskau anstreben."
PER_social_utopia:0 "Soziale Utopie"
PER_social_utopia_desc:0 "Der Iran wird zu einem Arbeiterparadies, wir werden uns auf den einfachen Arbeiter einstellen."
PER_equal_pay:0 "Gleicher Lohn"
PER_equal_pay_desc:0 "Der einfache Arbeiter verdient immer noch ungleiche Löhne, die Arbeiter werden von der Oberschicht an der Leine gehalten, wir müssen gerechtere Löhne einführen."
PER_women_in_factories:0 "Frauen in Fabriken"
PER_women_in_factories_desc:0 "Der Islam verbietet Frauen die Arbeit in Fabriken, aber wir müssen unsere Gemeinde an erste Stelle setzen. Indem wir Wachstum und Entwicklung unter Frauen fördern, können wir sie dazu motivieren, in den Fabriken zu arbeiten."
PER_free_scientist:0 "Freie Wissenschaftler"
PER_free_scientist_desc:0 "In vielen Ländern sind die Möglichkeiten der Wissenschaftler eingeschränkt, beispielsweise in Deutschland, wo die Atomwissenschaft als „jüdische Wissenschaft“ gilt. Hier hingegen haben Wissenschaftler den Freiraum, neue Technologien zu entwickeln."
PER_revolution_in_middle_east:0 "Revolution im Nahen Osten"
PER_revolution_in_middle_east_desc:0 "Die Ideen von Marx verbreiten sich in allen Ländern und das Einzige, was wir verlieren können, sind unsere Ketten. Nach Monaten der Vorbereitung können wir eine Revolution anzetteln und den korrupten [PER.GetLeader] stürzen!"
PER_not_flavoured_tt:0 "§YDiesem Pfad fehlt es an Würze, also wählen Sie diesen Pfad, wenn Sie ein skrupelloser Kommunist sind oder einfach nur neugierig, wohin das führt.§!\n\n"
PER_empower_worker:0 "Den einfachen Arbeiter stärken"
PER_empower_worker_desc:0 "Normale Arbeiter werden von den Vorgesetzten oft ignoriert, leisten aber den Großteil der Arbeit. Sie verdienen mehr Anerkennung, als sie derzeit erhalten."
PER_mass_collectivisation:0 "Massenkollektivierung"
PER_mass_collectivisation_desc:0 "Kommunismus bedeutet Kollektivierung der Industrie, d. h. die einfachen Arbeiter regulieren die Fabriken anstelle der kapitalistischen Oberschicht. Durch die Beseitigung der Oberschicht können wir das Wachstum unserer Industrie fördern."
PER_planned_industry:0 "Geplante Industrie"
PER_planned_industry_desc:0 "Jede Industrienation begann mit einem ordentlichen Plan, und Planung ist der Schlüssel zur Schaffung einer effizienten Industrie."
PER_restructure_government:0 "Umstrukturierung der Regierung"
PER_restructure_government_desc:0 "Die Regierung ist noch immer unorganisiert und weist noch viele Elemente der vorherigen Regierung auf, sodass eine Reorganisation erforderlich ist."
PER_trade_union:0 "Unterstützen Sie die Gewerkschaften"
PER_trade_union_desc:0 "Indem wir die Gewerkschaften im ganzen Land unterstützen, können wir unsere Legitimität und das Wohlergehen jedes einzelnen Arbeiters steigern."
PER_breadbasket_middle_east:0 "Kornkammer des Nahen Ostens"
PER_breadbasket_middle_east_desc:0 "Die iranischen Ländereien sind einzigartig: Sie sind sehr trocken, aber auch sehr fruchtbar und fruchtbar. Die Landwirtschaft in unserem Land kann florieren. Durch die Unterstützung unseres Agrarsektors können wir unserer Wirtschaft einen Aufschwung bescheren."
#####################
PER_artesh_iran:0 "Arteshe Iran"
PER_artesh_iran_desc:0 "Unser stehendes Heer ist veraltet und untrainiert und auf ausländische Interventionen nicht vorbereitet. Wir müssen es sofort modernisieren!"
PER_ground_forces:0 "Die Bodentruppen"
PER_ground_forces_desc:0 "Unsere Landarmee ist der wichtigste Teil der Armee. Ihre Offiziere haben die Armee verrotten lassen und Korruption ist weit verbreitet. Wir müssen diese Probleme lösen."
PER_favour_italian_tactics:0 "Bevorzugen Sie italienische Taktiken"
PER_favour_italian_tactics_desc:0 "Die Italiener schicken schon seit längerem ihre Berater, und ihre Denkweise passt besser zu unserem Land."
PER_favour_german_tactics:0 "Geschwindigkeit ist der Schlüssel"
PER_favour_german_tactics_desc:0 "Unser Gelände ist unwegsam, aber wenn wir den Feind ausmanövrieren können, können wir ihm leicht den Weg abschneiden."
PER_cezch_tanks:0 "Tschechische Panzer"
PER_cezch_tanks_desc:0 "Bisher haben wir tschechische Panzer eingesetzt, und sie haben ihre Aufgabe erfüllt. Das soll auch so bleiben."
PER_german_designs:0 "Deutsche Designs"
PER_german_designs_desc:0 "Schnellere, wendigere Panzer sind für unsere Einkreisungstaktik besser geeignet."
PER_favour_cossack:0 "Begünstigen Sie die Kosaken"
PER_favour_cossack_desc:0 "Für manche mag die Massenmotorisierung funktionieren, aber wir glauben immer noch an die Kraft des Pferdes."
PER_motorize_country:0 "Motorisiert das Land"
PER_motorize_country_desc:0 "Schnell vorrückende Infanterie ist der Weg."
PER_italian_chief_staff:0 "Italienischer Stabschef"
PER_italian_chief_staff_desc:0 "Ein guter Angriff ist eine gute Verteidigung und die Berge bieten das perfekte Terrain für die Verteidigung."
PER_british_staff:0 "Britischer Stabschef"
PER_british_staff_desc:0 "Sorgfältige Planung ist besser als hastig erledigte Arbeit"
PER_conducted_wargames:0 "Durchgeführte Kriegsspiele"
PER_conducted_wargames_desc:0 "Nach viel Blut, Schweiß und Mühe haben wir die Offiziere so weit ausgebildet, dass sie Kriegsspiele durchführen können und die wahre Art der Kriegsführung kennen."
#########################
PER_the_airforce:0 "Die Luftwaffe"
PER_the_airforce_desc:0 "In der modernen Kriegsführung geht es nicht mehr darum, die Soldaten in einer geraden Linie loszuschicken und zu schießen, sondern es sind Kämpfer nötig, die unsere Infanterie unterstützen."
PER_fighter_focus:0 "Fokus auf Kämpfer"
PER_fighter_focus_desc:0 "Die Konzentration auf Kampfflugzeuge ist günstiger als auf Bomber."
PER_italian_designs:0 "Italienische Designs"
PER_italian_designs_desc:0 "Italienische Designs haben gezeigt, dass sie unseren Anforderungen entsprechen."
PER_americans_designs:0 "Amerikanische Designs"
PER_americans_designs_desc:0 "Amerikanische Designs haben gezeigt, dass sie unseren Anforderungen entsprechen."
PER_cas_focus:0 "Bomberfokus"
PER_cas_focus_desc:0 "Die Unterstützung unserer Bodentruppen sollte oberste Priorität haben."
PER_german_designs_airforce:0 "Deutsche Designs"
PER_german_designs_airforce_desc:0 "Deutsche Designs haben gezeigt, dass sie unseren Anforderungen entsprechen."
PER_british_designs:0 "Britische Designs"
PER_british_designs_desc:0 "Britische Designs haben gezeigt, dass sie unseren Anforderungen entsprechen."
PER_mehrabad_airport:0 "Flughafen Mehrabad"
PER_mehrabad_airport_desc:0 "Die Schaffung eines Flughafens für kommerzielle Zwecke könnte unserer Bevölkerung helfen, vor allem aber würde er unsere Flugzeugkapazität verbessern."
PER_support_navy:0 "Unterstützen Sie unsere Marine"
PER_support_navy_desc:0 "Die Unterstützung unserer Marine ist jetzt, da wir eine Marine haben, wichtiger."
PER_independent_bombers:0 "Unabhängige Bomber"
PER_independent_bombers_desc:0 "Eine unabhängige Bomberflotte ist besser für unsere Bodentruppen."
PER_anti_air:0 "Luftabwehrbefestigung"
PER_anti_air_desc:0 "Im Falle einer Invasion ist der Schutz unserer Städte wichtig."
########################
PER_navy_focus:0 "Fokus auf die Marine"
PER_navy_focus_desc:0 "Unsere veraltete und glanzlose Marine hat nach Jahren des Niedergangs gelitten, wir müssen uns auf ihren Wiederaufbau konzentrieren."
PER_raid_the_coast:0 "Überfalle die Küste"
PER_raid_the_coast_desc:0 "Eine riesige Marine ist nicht unser Ding, eine kleinere Marine, die sich auf die Zerstörung feindlicher Konvois konzentriert, ist von größter Bedeutung."
PER_raiders_of_the_sea:0 "Piratenräuber"
PER_raiders_of_the_sea_desc:0 "Durch den Einsatz von Überfalltaktiken kann unsere recht kleine Marine die feindlichen Konvois schnell ausschalten, was eine Invasion dieser Länder wesentlich kostspieliger macht."
PER_block_the_strait:0 "Blockieren Sie die Meerenge"
PER_block_the_strait_desc:0 "Dem Feind sollte nicht einmal gestattet werden, die Straße von Hormus zu betreten. Wir werden seine Konvois und Schiffe zerstören, bevor er eine solche Invasion überhaupt versuchen kann."
PER_a_strong_fleet:0 "Eine starke Flotte"
PER_a_strong_fleet_desc:0 "Mit einer stärkeren, professionelleren Flotte können wir die feindlichen (britischen) Schiffe übertreffen, die den ganzen Weg von dort nach hier segeln müssen."
PER_start_shipbuilding:0 "Beginnen Sie mit der Konstruktion"
PER_start_shipbuilding_desc:0 "Nachdem wir nun die richtigen Schiffe erforscht haben, die nicht veraltet sind, können wir mit der Arbeit an einer richtigen Flotte beginnen."
PER_improve_submarines:0 "Verbessern Sie unsere U-Boote"
PER_improve_submarines_desc:0 "Nach vielen Tests sind wir zu dem Schluss gekommen, dass U-Boote für uns besser geeignet sind. Lassen Sie uns also mehr in diesen Bereich investieren."
PER_fleet_in_being:0 "Flotte im Sein"
PER_fleet_in_being_desc:0 "Eine große Flotte erfordert Hilfe von außen. Alleine schaffen wir das nicht. Wir können die Briten um Hilfe bitten, aber das würde ihnen mehr Einfluss auf unser Land verschaffen."
PER_man_the_guns:0 "Mann die Waffen"
PER_man_the_guns_desc:0 "Der Unterhalt unserer Marine ist ziemlich teuer und wir brauchen jeden Mann an Deck, wenn wir sie am Leben erhalten wollen. Jeder Matrose muss seine Pflicht tun und die Geschütze bedienen."
#########################
PER_GATHERING_STORM_DESC:0 "Der Iran ist einer der ältesten souveränen Staaten der Geschichte, doch die Geschichte war nicht gnädig mit diesem fragilen Land. Unzählige Jahre ausländischer Einflussnahme und Korruption haben das Land ausgeblutet. Der Klerus, die Anglo-Iranian Oil Company, die internen Konflikte und Stammesprobleme haben die Situation nicht gerade verbessert.\n\nEs bedarf enormer Anstrengungen, um dieses Land vor dem Zusammenbruch zu bewahren. "
PER_not_implemented_tt:0 "§R--DIESER PFAD IST NOCH NICHT IMPLEMENTIERT!--§!"
###################
PER_fascist_path:0 "Das Ende des Kranken"
PER_fascist_path_desc:0 "Der Iran braucht eine neue Führung, aber nicht die alte Monarchie oder den erprobten, aber gescheiterten Kommunismus in Gilan. Viele haben sich dieser Herausforderung gestellt, aber wir haben die Auswahl auf zwei reduziert... "
####################
PER_revanchism:0 "Iranischer Revanchismus"
PER_revanchism_desc:0 "Wir haben so viel verloren, zuerst durch die Eroberungen Alexanders und dann durch die arabische Invasion. Wir müssen viel zurückerobern und wir müssen sofort damit beginnen."
PER_restore_the_borders:0 "Wiederherstellung der Kadscharengrenzen"
PER_restore_the_borders_desc:0 "Der Verlust der Gebiete der Kadscharen-Dynastie liegt noch relativ jung zurück, daher haben wir immer noch Anspruch auf diese Ländereien. Wir können damit beginnen, diese Ländereien zurückzuerobern, bevor wir uns übernehmen."
PER_claim_turkmenistan:0 "Anspruch auf Turkmenistan"
PER_claim_turkmenistan_desc:0 "Wir besaßen das Land Turkmenistan, doch die zahllosen Kriege, die Russland gegen uns führte, führten dazu, dass das Land aus unserem Einflussbereich fiel. Daher können wir um dieses Land bitten oder es mit Gewalt erreichen."
PER_claim_farah:0 "Anspruch auf Afghani Farah"
PER_claim_farah_desc:0 "Afghanistan fiel in unsere Einflusssphäre und wir haben legitime Ansprüche auf das östliche Grenzland."
PER_legitimize_bahrain_claims:0 "Sichern Sie Hormuz"
PER_legitimize_bahrain_claims_desc:0 "Die Briten halten den Rest der Straße von Hormus. Wir können dort einen Aufstand beginnen und die Provinz für uns gewinnen, aber das wird Konsequenzen haben."
PER_claim_azerbajian:0 "Beanspruchen Sie aserbaidschanisches Land"
PER_claim_azerbajian_desc:0 "Wie im Falle Armeniens gehörte Aserbaidschan einst uns, und die Russen nahmen es uns wie Geier weg. Wir müssen das Land zurückerobern, das uns gehört."
PER_claim_armenia:0 "Beanspruchen Sie armenisches Land"
PER_claim_armenia_desc:0 "Wie im Falle Aserbaidschans: Armenien gehörte einst uns, und die Russen haben es uns wie Geier weggeschnappt. Wir müssen das Land zurückerobern, das uns gehört."
##
PER_push_eastward:0 "Vorstoß in den Westen"
PER_push_eastward_desc:0 "Die Expansion nach Westen ist ein ziemlich kostspieliges Unterfangen, das sich aber dennoch lohnt."
PER_push_into_iraq:0 "Vorstoß in den Irak"
PER_push_into_iraq_desc:0 "Der Irak ist ein künstliches Konstrukt, das von den Briten geschaffen wurde, um Pseudo-Marionettenstaaten zu errichten; ihre nutzlose Existenz muss ein Ende haben."
PER_the_star_and_crescent:0 "Der Stern und die Mondsichel"
PER_the_star_and_crescent_desc:0 "Die Türkei, das ehemalige Osmanische Reich, hat uns schon immer die Hände an die Kehle gedrückt. Es ist Zeit, dass wir uns für die jahrelange Unruhe rächen, die sie uns bereitet hat."
PER_the_peninsuala:0 "Die Halbinsel"
PER_the_peninsuala_desc:0 "Die Arabische Halbinsel, die vom saudischen Königshaus kontrolliert wird, ist ein Schandfleck dieser Welt. Ihre Existenz ist eine Beleidigung für uns, sie muss beseitigt werden."
PER_undo_thermopylae:0 "Thermopylae rückgängig machen"
PER_undo_thermopylae_desc:0 "Der Untergang des Achämenidenreichs war der Tropfen, der das Fass zum Überlaufen brachte. Jahre des iranischen Niedergangs waren die Folge dieser bitteren Niederlage. Als Schandfleck unserer Geschichte werden wir diese Länder zerstören, wie sie es mit unseren getan haben."
PER_unite_the_iranians:0 "Idee des Paniranismus"
PER_unite_the_iranians_desc:0 "Unser Volk hat genug gelitten. Wir können von niemand anderem als unserem eigenen Volk regiert werden. Es ist an der Zeit, diese Länder wieder zu vereinen."
PER_unite_afghanistan:0 "Vereint euch mit Afghanistan"
PER_unite_afghanistan_desc:0 "Indem wir die Idee eines vereinten iranischen Volkes fördern, können wir die Afghanen davon überzeugen, sich uns anzuschließen, anstatt ihnen eine Pistole an den Kopf zu halten."
PER_northen_tribes:0 "Die nördlichen Stämme"
PER_northen_tribes_desc:0 "Wir können in Turkmenistan einen Aufstand anzetteln, um gegen die Sowjets zu kämpfen. Wenn sie ganz Turkmenistan kontrollieren, können wir sie unserem Einflussbereich hinzufügen."
PER_parsi_in_india:0 "Rettet die Parsen"
PER_parsi_in_india_desc:0 "Nach der arabischen Invasion flohen viele Zoroastrier aus dem Land und suchten Zuflucht in Indien, was der König von Indien auch gewährte. Wir können sie in unseren Einflussbereich bringen."
PER_save_kurds:0 "Rettet die Kurden"
PER_save_kurds_desc:0 "Da die Kurden von fast allen verfolgt werden, fallen sie leicht in unseren Einflussbereich. Sie gehören auch derselben Kulturgruppe an, was hilfreich ist."
PER_push_into_levant:0 "Vorstoß in die Levante"
PER_push_into_levant_desc:0 "Westliche Herrschaft im Levante? Puh, wenn die Türken diese Länder nicht kontrollieren und die Araber zu faul sind, ihren Brüdern zu helfen, dann machen wir es eben selbst! Wenn nötig mit Gewalt!"
