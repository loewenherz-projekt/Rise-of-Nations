PER_clergy_dec_cat:0 "Der iranische Klerus"
PER_clergy_dec_cat_desc:0 "Der iranische Klerus versucht immer, die Nation aufzuwiegeln. Seit der Verfassungsrevolution im Jahr 1905 schwankt seine Macht hin und her.\n\nViele Regierungen haben versucht, ihre Macht einzuschränken, aber sie finden immer einen Weg zurück. Werden sie unterdrückt oder werden sie erneut siegen?\n\nDer Klerus hat eine Meinung über die Regierung, die derzeit die Regierung kontrolliert.\n\nWenn die Meinung des Klerus gegenüber der Regierung zu gering wird, können wir schnell die Unterstützung des Volkes verlieren!\n\nDie Meinung der Regierung darf nicht unter §R-40§ liegen!\n\nDie Meinung der Geistlichen über die Regierung ist [PER.GetClergyOpinionLevel]: [?var_clergy_opinion|+0]."
PER_clergy_down_tt:0 "\nDie Meinung der Geistlichen gegenüber der aktuellen Regierung sinkt um §R10§!.\n\n"
PER_clergy_up_tt:0 "\nDie Meinung der Geistlichen gegenüber der aktuellen Regierung steigt um §G10§!.\n\n"
PER_clergy_fill:0 "Verurteilen Sie nicht-schiitische Religionen"
PER_clergy_fill_2:0 "Verbreiten Sie die Worte Zoroasters"
PER_clergy_opinion_50_tt:0 "Die Meinung des Klerus über die aktuelle Regierung muss §G50§! oder höher sein."
PER_clergy_opinion_minus_40_tt:0 "Die Meinung des Klerus über die derzeitige Regierung muss §R-40§! oder niedriger sein."
PER_clergy_opinion_plus_40_tt:0 "Die Meinung des Klerus über die aktuelle Regierung muss §G40§! oder höher sein."
