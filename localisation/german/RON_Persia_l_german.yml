l_german:
 iran.1.t:0 "Haltung gegenüber den ländlichen Landwirten"
 iran.1.d:0 "Die Welt verändert sich ständig, und auch die Bauern, die in ihrer eigenen Pseudorealität leben, müssen sich ändern. Bisher wurden die Bauern in Ruhe gelassen und verkauften ihre Produkte selbst, aber wir können eine neue Politik für die Bauern und ihre Produkte einführen."
 iran.1.a:0 "Nehmen Sie gegenüber Landwirten eine westlichere Haltung ein."
 iran.1.b:0 "Schauen Sie sich Moskau als Referenz an"
 iran.1.c:0 "Den Status Quo beibehalten"
 ######
 iran.2.t:0 "Kashf-e hijab"
 iran.2.d:0 "Kashf-e hijab (Die Enthüllung) ist ein Dekret, das alle Formen islamischer Schleier (wie den Tschador) verbietet und als Verbrechen betrachtet. Nicht nur islamische Frauenkleidung wurde verboten, sondern auch viele traditionelle islamische Kleidungsstücke für Männer. Diese Enthüllung wird von der westlichen Oberschicht begrüßt, trifft aber einen wunden Punkt bei den Unterschichten, die noch immer an islamischen Traditionen festhalten.\n\nPolizisten werden angewiesen, Frauen sofort den Schleier abzunehmen und die Häuser der Täter zu durchsuchen. Viele Frauen entscheiden sich heute, zu Hause zu bleiben, doch die Enthüllung ist ein wichtiger Schritt zur Verwestlichung des Iran."
 iran.2.a:0 "Beseitigen Sie diese Beleidigung der iranischen Kultur!"
 ######
 iran.3.t:0 "Nowruz"
 iran.3.d:0 "Das uralte Fest Nowruz reicht weit zurück, sogar bis in die Zeit vor dem Achämenidenreich. Es wird am 21. März gefeiert, dem ersten Frühlingstag und ersten Monat des iranischen Kalenders. Es wird im ganzen Land gefeiert und bringt die Menschen zusammen."
 iran.3.a:0 "Eid Mubabarak!"
 #######
 iran.4.t:0 "Mossadeghs Putsch"
 iran.4.d:0 "Mossadegh, der aufstrebende Politiker, hat die Haltung des Schahs gegenüber den Menschen ohne Stimme satt: gegenüber jedem Einzelnen. Er sorgte dafür, dass das Regime durch ein demokratisches ersetzt wird, das die Korruption im Land bekämpfen kann.\n\nÜberall jubeln die Menschen, dass der Tyrann Reza Schah nicht mehr mit eiserner Faust regiert.\n\nÜberraschenderweise geschah der Putsch, ohne dass ein einziger Schuss abgefeuert wurde, und Reza Schah bietet weiterhin seine Dienste als Oberbefehlshaber an, da er seinem Land dienen will."
 iran.4.a:0 "Eine Überraschung...\nAber eine willkommene."
 #######
 iran.5.t:0 "Britischer Protest gegen die Verstaatlichung der Ölindustrie"
 iran.5.d:0 "Es schockiert uns nicht, dass das Vereinigte Königreich großen Anstoß daran nimmt, dass wir uns das Öl zurückholen, das uns rechtmäßig gehört. Unsere Möglichkeiten sind begrenzt, aber Widerstand könnte sich als schlechte Entscheidung erweisen."
 iran.5.a:0 "Machen Sie einen Rückzieher, das Risiko ist es nicht wert."
 iran.5.b:0 "Verhandeln Sie, einen Versuch ist es wert."
 iran.5.c:0 "Es gehört uns rechtmäßig."
 PER_better_negotiations:0 "Sie haben bessere Chancen, bei Verhandlungen erfolgreich zu sein, wenn Sie §YWestern Advisors§! abgeschlossen haben.\n\n"
 ######
 iran.6.t:0 "Die Iraner wollen verhandeln."
 iran.6.d:0 "Die Iraner haben uns einen Vertrag angeboten, der die AIOC einige Jahre früher ablöst. Wie reagieren wir darauf?"
 iran.6.a:0 "Also gut, sie werden den Deutschen gegenüber nicht mies."
 iran.6.b:0 "Nein, sie nähern sich den Deutschen an."
 ######
 iran.7.t:0 "Die Briten akzeptieren."
 iran.7.d:0 "Nach tagelangen Verhandlungen haben wir uns darauf geeinigt, dass wir unsere Ölgewinne zurückerhalten dürfen."
 iran.7.a:0 "Wunderbar!"
 ######
 iran.8.t:0 "Die Briten lehnen unser Gegenangebot ab!"
 iran.8.d:0 "Wir sind nicht schockiert, dass die Briten die Verhandlungen abgebrochen haben und verlangen, dass wir mit der Rückgabe der Ölgewinne beginnen."
 iran.8.a:0 "Sehr gut, einen Versuch war es wert."
 iran.8.b:0 "Nein! Wir geben nicht nach!"
 PER_abandon_aioc_tt:0 "§YDas Vereinigte Königreich§! erhält einen gültigen Casus Belli gegen uns, wenn wir den Deutschen gegenüber zu freundlich eingestellt sind.\n"
 PER_abandon2_aioc_tt:0 "Wenn unsere Beziehung zu §YDeutschland§! höher ist als §G50§!, erhält Großbritannien ein gültiges Kriegsziel!\n\n"
 PER_nationalize_oil_again_tt:0 "\nSie werden eine Entscheidung im Jahr 1939 freischalten, das Öl zu verstaatlichen.\n"
 #################
 iran.9.t:0 "Die Briten fordern, dass wir deutsche Berater abziehen"
 iran.9.d:0 "Die Briten haben gefordert, dass wir die deutschen Vertreter, die unser Land besuchen, abziehen. Sie haben gesagt, dass sie eingreifen könnten, wenn wir nicht zustimmen."
 iran.9.a:0 "Sehr gut, wir haben bereits bekommen, was wir wollten."
 iran.9.b:0 "Nein, wir werden weiterhin mit den Deutschen zusammenarbeiten!"
 ############
 iran.10.t:0 "Der Bruchpunkt"
 iran.10.d:0 "Die Briten stellen uns ein Ultimatum: Wir sollen uns den Deutschen anschließen und gegen sie arbeiten, uns weigern und die Konsequenzen tragen."
 iran.10.a:0 "Alles klar, alles klar, gut."
 iran.10.b:0 "NEIN!"
 PER_per_eng_breakdown_tt:0 "§RDies wird zu einem Bruch führen, einem letzten Ultimatum um 1941!§!"
 ##############
 iran.11.t:0 "Anglo-Invasion des Iran"
 iran.11.d:0 "Die Briten sind verärgert darüber, dass ihr Einfluss auf unser Land geschwächt wurde und wir uns den Deutschen immer mehr annähern. Sie haben beschlossen, die Waffen gegen uns zu erheben und für den Sturz unserer Regierung zu kämpfen."
 iran.11.a:0 "Wir werden kämpfen!"
 PER_do_not_lose_tt:0 "Verlieren Sie nicht die Kontrolle über §YIlam, Khuzestan§! und §YBushehr§!!\n\n"
 mohammed_desc:0 "Trotz seiner öffentlichen Bewunderungsbekundungen in späteren Jahren hegte Mohammad Reza ernsthafte Bedenken nicht nur gegenüber den groben und rücksichtslosen politischen Mitteln seines Vaters, sondern auch gegenüber dessen unbedarfter Herangehensweise an Staatsangelegenheiten."
 #######
 iran.12.t:0 "Innerer Kampf"
 iran.12.d:0 "Die Politik im Iran kann kompliziert sein. Reza Schah, der König, der nach dem Sturz der Kadscharen-Dynastie an die Macht kam, wird von vielen geliebt, aber nicht von allen. Wir wissen jedoch, dass er das Zeug dazu hat, den Iran in die Moderne zu führen.\n\nAllerdings sorgt eine neue Bewegung in den unteren Klassen unserer Gesellschaft für Unruhe: Die Kommunisten, die unter dem Deckmantel des „RTudeh“ agieren, wollen im Iran eine neue Ordnung etablieren, wie es Mirza Kuchak Khan schon vor Jahren versucht hat."
 iran.12.a:0 "§gStellen Sie sich auf die Seite des Schahs.§!"
 iran.12.c:0 "§RDie Arbeiter wurden lange genug unterdrückt.§!"
 PER_go_with_reza:0 "„Reza Schah sichert das Land“!"
 PER_go_with_mossadegh:0 "§MMeritoren, stellt euch auf die Seite Mossadeghs§!"
 PER_go_with_tudeh:0 "§RTudehs geheime Verschwörung§!"
 #########
 iran.13.t:0 "Tudeh erlangt die Gunst der Minister."
 iran.13.d:0 "Regierungsvertreter sind davon überzeugt, dass die Tudeh-Partei der einzige Weg zur Rettung des Iran sei und unterstützen daher mehrere Elemente der Tudeh-Partei, einer marxistischen Partei, die sich langsam als neue Denkweise in der Bevölkerung durchsetzt.\n\nDie Unterschicht, die es leid ist, von der Regierung vernachlässigt zu werden, hat ihre aktive Unterstützung zum Ausdruck gebracht.\n\nWas daraus wird, bleibt abzuwarten."
 iran.13.a:0 "Nur die Zeit wird es zeigen."
 #########
 iran.14.t:0 "Persische Kosakenbrigade"
 iran.14.d:0 "Die Brigade wurde ursprünglich 1879 von Naser Ad-Din Schah gegründet. Trotz ihres Namens war die Brigade keine gewöhnliche Kosakenbrigade, sondern basierte auf einem feudalistischen System, in dem Militärdienst mit privaten Landstreifen belohnt wurde.\n\nDas zweite große Ereignis, bei dem die Kosakenbrigade eine Rolle spielte, war die Verfassungsrevolution von 1906, die auf starken politischen Druck und Aufstände zurückzuführen war. Mozaffar Ad-Din Schah gab den Rebellen nach und starb kurz nach der Unterzeichnung der Verfassung. Es war die Persische Kosakenbrigade, die half, seinen Sohn Muhammad Ali Schah auf dem Thron zu halten. Infolgedessen wurde er jedoch als Marionette Russlands betrachtet. Später versuchte er im Januar 1907 mit Hilfe der Persischen Kosakenbrigade, die durch die Verfassung eingesetzte Regierung zu stürzen. Sie umzingelte das Madschles (Parlament) und beschoss das Gebäude mit schwerer Artillerie. Er war kurzzeitig erfolgreich und regierte Teheran mit Hilfe von Brigadekommandeur Oberst Ljachow ein Jahr lang als Militärdiktator. Ljachow wurde zum Militärgouverneur von Teheran ernannt. In den darauf folgenden Bürgerkriegen eroberten aserbaidschanische Streitkräfte unter der Führung von Sattar Khan und Yeprem Khan Teheran von der Kosakenbrigade zurück und zwangen den Schah zur Abdankung. Damit gelang es der Brigade nicht, die Macht des Schahs zu sichern. Dennoch behielt die Brigade als Werkzeug sowohl der Russen als auch des Schahs große Bedeutung.\n\nAm 14. Januar 1921 beförderte der britische General Ironside Reza Khan, der das Bataillon von Täbris befehligt hatte, zum Kommandeur der gesamten Brigade. Ungefähr einen Monat später führte Reza Khan unter britischer Führung seine 3.000–4.000 Mann starke Abteilung der Kosakenbrigade mit Basis in Qazvin und Hamadan nach Teheran und eroberte die Hauptstadt. Mit diesem Putsch etablierte sich Reza Khan als mächtigster Mann im Iran. Der Putsch verlief weitgehend unblutig und stieß auf wenig Widerstand. Reza Khans spätere Modernisierung und Vergrößerung der Armee nutzte die Kosakenbrigade als Kern. Vor dem Ersten Weltkrieg bildete die Kosakenbrigade zusammen mit der in Schweden ausgebildeten Gendarmerie die einzige wirklich professionelle Streitmacht im Iran. Mit seinen erweiterten Streitkräften und der Kosakenbrigade startete Reza Khan militärische Aktionen zur Zerschlagung separatistischer und regimekritischer Bewegungen in Täbris und Maschhad sowie der Dschangalis in Gilan, Simko und der Kurden. Die Brigade, die damals 7.000–8.000 Mann stark war, wurde mit der Gendarmerie und anderen Streitkräften zusammengelegt, um die neue 40.000 Mann starke iranische Armee zu bilden, die von iranischen Offizieren angeführt wurde, von denen viele Freunde und Kumpanen Reza Khans aus seiner Zeit als Offizier der Kosakenbrigade waren. Diese Offiziere der Kosakenbrigade erhielten Ernennungen und Unterstützung in Schlüsselpositionen der neuen Regierung und des Militärs. Mit der Kosakenbrigade als Sprungbrett gelang es Reza Khan, sich an die Macht zu bringen, das Land zu zentralisieren, den Schah zu stürzen und sich selbst zum neuen Schah zu krönen. Damit begründete er die Pahlavi-Dynastie. Er wurde fortan Reza Schah genannt."
 iran.14.a:0 "Eine interessante Hintergrundgeschichte."
 ##########
 iran.15.t:0 "Hamechi Kharab"
 iran.15.d:0 "Da die britischen Streitkräfte nicht zerfallen und die Briten langsam in unser Land vordringen, hat die Regierung beschlossen, vor den Briten zu kapitulieren. Unsere Regierung, die voller Verräter ist, hat einen Kapitulationsbrief geschickt. Darin heißt es, dass jeglicher Widerstand eingestellt, die derzeitige Regierung abgesetzt und Mohammed Reza Schah, der Sohn von Reza Schah, zum Monarchen des Iran ernannt wird. Aufgrund seiner Sympathie für die Briten wird er höchstwahrscheinlich ausländischen Verwicklungen erliegen. Diese Niederlage ist sicherlich eine dunkle Zeit für den Iran."
 iran.15.a:0 "Das Ende einer Ära ..."
 ##########
 iran.16.t:0 "Zugeständnisse für Turkmenistan"
 iran.16.d:0 "Der Iran hat einen Vorschlag unterbreitet: Wir geben Südturkmenistan auf, das er in der Vergangenheit kontrolliert hat, und erhalten im Gegenzug mehr Öl. Der Staat ist weitgehend nutzlos und die Bevölkerung widerspenstig. Man kann nie genug Öl bekommen."
 iran.16.a:0 "Sehr gut."
 iran.16.b:0 "Nein, wir brauchen kein Öl mehr."
 ##########
 iran.17.t.accepted:0 "Die Russen haben akzeptiert!"
 iran.17.d.accepted:0 "Die Russen haben unseren Vorschlag angenommen, sie werden uns den Staat Jerbent übertragen und im Gegenzug geben wir einen Teil unseres Öls ab."
 iran.17.a:0 "Willkommen zu Hause!"
 iran.17.t.denied:0 "Die Russen lehnten ab!"
 iran.17.d.denied:0 "Wir sind nicht schockiert, dass die Russen unser Angebot, unser Öl im Austausch für Yerbent aufzugeben, abgelehnt haben!"
 iran.17.b:0 "Es ist der harte Weg."
 ##########
 iran.18.t:0 "Sieg in Farah"
 iran.18.d:0 "Mit dem Vormarsch iranischer Truppen über die afghanischen Berge ist klar, dass der iranische Moloch bei seiner Eroberung der ehemaligen Grenzen nicht mehr aufzuhalten ist. Nachdem die afghanischen Truppen aus der Farah-Wüste vertrieben wurden, scheint ein Vorstoß nach Kabul sehr wahrscheinlich. Die iranische Regierung hat jedoch einem Waffenstillstand zugestimmt und Farah dem Iran überlassen."
 iran.18.a:0 "Ein Sieg, der unsere Vorfahren stolz machen würde!"
 PER_peace_afg_tt:0 "Der Iran hat Frieden geschlossen und Farah eingenommen."
 ##########
 iran.19.t:0 "Vereinigung der Meerenge"
 iran.19.d:0 "Die Straße von Hormus – kleine Veränderungen in dieser Region schlagen Wellen in der ganzen Welt. Wir kontrollieren einen großen Teil davon, aber das reicht nicht. Wir haben in diesen Regionen einen arabischen Aufstand angezettelt. Doch die Araber können die Wüste kaum kontrollieren, deshalb haben wir diese Gebiete für uns beansprucht. Die Briten, die uns gegenüber nur Verachtung empfinden, aber eine gleichgültige Führung haben, haben dies zugelassen, da sie keinen weiteren Krieg wollen. Sie erhoben jedoch Anspruch auf diese Gebiete, und unsere Beziehungen wurden schwer beschädigt. "
 iran.19.a:0 "So sei es."
 ######
 iran.20.t:0 "Sowjets ziehen sich aus Turkmenistan zurück"
 iran.20.d:0 "Da die Stämme ganz Turkmenistan kontrollieren und das unwegsame und hügelige Gelände Angriffe nahezu unmöglich macht, haben sich die Sowjets von der Grenze zurückgezogen. Nachdem die Stämme nun gegen ihren Unterdrücker gekämpft haben, können wir sie wieder in unseren Einflussbereich holen."
 iran.20.a:0 "So wie es sein sollte."
 #############
 iran.21.t:0 "Sieg gegen die Briten!"
 iran.21.d:0 "Da ihre Besitzungen im Nahen Osten in unseren Händen sind und Ägypten bald unter unserer Kontrolle steht, haben wir die Briten zum Rückzug gezwungen. Angesichts der Spannungen in Europa ist ein Krieg gegen uns einfach nicht lohnenswert. Deshalb haben sie uns ein Friedensangebot unterbreitet:\n\nWir gewinnen die Kontrolle über Französisch-Syrien, Britisch-Ägypten und den Nahen Osten. Außerdem gewinnen wir die Stadt Kuwait.\n\nWie reagieren wir?"
 iran.21.a:0 "Bußgeld!"
 iran.21.b:0 "Ich will mehr!"
 PER_victory_tt:0 "Der Sieg gehört uns! Wir werden die Levante, Syrien und Ägypten sowie Kuwait erobern!"
 ###########
 iran.22.t:0 "Blick Richtung Moskau"
 iran.22.d:0 "Unsere Vision ist die von Moskau und Stalin. Wir müssen akzeptieren, dass viele Länder keinen Kommunismus wollen. Daher muss der Staat stark sein und die Bevölkerung zum Wohle der Allgemeinheit kontrollieren."
 iran.22.a:0 "Es ist die Sowjetunion."
 ####
 iran.23.t:0 "Sieg im Kaukasus"
 iran.23.d:0 "Wir haben die Sowjetunion aus Aserbaidschan und Armenien vertrieben. Sollen wir Frieden anbieten?"
 iran.23.a:0 "Ja!"
 iran.23.b:0 "Warum hier aufhören?"
 #######
 iran.24.t:0 "Hassan Modarres"
 iran.24.d:0 "Ein schiitischer Geistlicher und Unterstützer der iranischen Verfassungsrevolution. Er ist einer der Gründerväter der Reformpartei Hezb-e Eslaah-talab. Mutig und unbestechlich ist er ein glühender Verfechter einer wahren Verfassungsregierung. Er sitzt derzeit im Gefängnis und hat viele Feinde, aber auch viele Anhänger. Sein Gesundheitszustand verschlechtert sich, und viele Menschen wollen seinen Tod. Doch …"
 iran.24.a:0 "Er wird vergiftet und beim Beten getötet."
 iran.24.b:0 "Seine Anhänger versammeln sich vor dem Gefängnis und schaffen es, ihn freizulassen!"
 ########################
 iran_flavour_political.1.t:0 "Reza Schah geht hart gegen seine Gegner vor."
 iran_flavour_political.1.d:0 "Reza Khan Mirpanj kam 1925 an die Macht und ist ein angesehener Kommandant und Revolutionär. Er stürzte die dekadente Kadscharen-Dynastie und versuchte sein Bestes, um das Land zu modernisieren. Viele kritisieren jedoch immer noch seine harte Natur. [PER.GetLeader] erklärte jedoch, dass dies für einen modernen Iran notwendig sei."
 iran_flavour_political.1.a:0 "[PER.GetLeader] wird das Land gut regieren."
 ################
 PER_clergy_party:0 "Reformerpartei"
 PER_clergy_party_long:0 "Die Reformerpartei"
 PER_clergy_coup_flag:0 "Klerusputsch"
 #
 iran_clergy_event.1.t:0 "Klerusputsch"
 iran_clergy_event.1.d:0 "Aus Angst, ihren Einfluss und ihre Macht zu verlieren, haben die Geistlichen Intrigen gegen die derzeitige Regierung geschmiedet und die Bevölkerung aufgehetzt. Sie hatten Erfolg und die Geistlichen ziehen mit Tausenden von Demonstranten durch verschiedene Straßen, durch alle Straßen und Städte.\n\nUnsere Armee steht auf Ihren Befehl bereit. Was sollen wir tun?"
 iran_clergy_event.1.a:0 "Feuer auf die Demonstranten!"
 iran_clergy_event.1.b:0 "§LDie Armee schließt sich den Demonstranten an!§!"
 iran_clergy_event.2.t:0 "§RBlutiger Samstag§!"
 iran_clergy_event.2.d:0 "Nachdem die örtliche Polizei und Armee auf die Demonstranten geschossen hatten, flohen die Geistlichen. Zwar konnten wir den Putsch der Geistlichen vorerst niederschlagen, doch hat er uns viel Stabilität gekostet."
 iran_clergy_event.2.a:0 "Wie werden wir uns jemals erholen?"
 ##################################
 ######### diplomacy event ########
 ##################################
 PER_sadabad_pact:0 "Saadabad-Pakt"
 PER_flavour_diplomacy.1.t:0 "[PER.GetName] schlägt eine Allianz vor."
 PER_flavour_diplomacy.1.d:0 "[PER.GetName] hat einen Bündnisvorschlag unterbreitet. Wir nähern uns schon seit einiger Zeit an, und die [PER.GetAdjective]-Regierung möchte noch enger zusammenrücken, da auch sie ein Land modernisieren möchte, das zuvor in Trümmern lag. [PER.GetLeader] hat viele Freundschaftsbriefe geschrieben. Wie sollen wir antworten?"
 PER_flavour_diplomacy.1.a:0 "Eine geniale Idee!"
 PER_flavour_diplomacy.1.b:0 "Lassen Sie uns die Region nicht noch einmal verärgern."
 PER_flavour_diplomacy.2.t:0 "Die [From.GetAdjective]-Regierung akzeptiert!"
 PER_flavour_diplomacy.2.d:0 "[From.GetLeader] hat einen Antwortbrief geschrieben, in dem es heißt, dass unsere Länder offiziell ein Freundschaftsbündnis eingehen werden und sich nun näher sind als je zuvor!"
 PER_flavour_diplomacy.2.a:0 "Großartig!"
 PER_flavour_diplomacy.3.t:0 "Stahl nach Persien?"
 PER_flavour_diplomacy.3.d:0 "Persien oder der Iran, wie es genannt wird, hat uns gebeten, eine Menge Stahl nach Teheran zu liefern. Dies würde unseren Einfluss in der Region erhöhen und könnte dazu führen, dass sie sich uns zuwenden."
 PER_flavour_diplomacy.3.a:0 "Eine hervorragende Möglichkeit, den Briten entgegenzutreten."
 PER_flavour_diplomacy.3.b:0 "Nicht jetzt."
 PER_flavour_diplomacy.4.t:0 "[From.GetNameDef] nimmt unseren Vorschlag an!"
 PER_flavour_diplomacy.4.d:0 "[From.GetLeader] hat unseren Vorschlag angenommen, Stahl in unser Land zu importieren, und die Lieferungen sollten in Kürze eintreffen."
 PER_flavour_diplomacy.4.a:0 "Endlich."
 PER_flavour_diplomacy.5.t:0 "[From.GetNameDef] hat unseren Vorschlag abgelehnt!"
 PER_flavour_diplomacy.5.d:0 "[From.GetLeader] hat uns in einem Brief mitgeteilt, dass sie uns den Stahl, den wir brauchen, derzeit nicht schicken werden!"
 PER_flavour_diplomacy.5.a:0 "Das ist eine Beleidigung."
 ############
 PER_flavour_economic.6.t:0 "Bereinigung von [GetYear]"
 PER_flavour_economic.6.d:0 "Rund ein Dutzend Politiker wurden von der [PER.GetCommunistParty] festgenommen und hingerichtet. Diese Politiker stehen im Verdacht, sich mit den [GER.GetAdjective]s oder [ENG.GetAdjective] angefreundet zu haben. Obwohl kein größeres Land Bedenken hinsichtlich dieses Ereignisses geäußert hat, gratulierte [SOV.GetLeader] der [PER.GetCommunistParty] zur Beseitigung der „Feinde der Revolution“. Dieses Massaker hat zwar nicht viel verändert, wird aber sicherlich eine Rolle für die Zukunft von [PER.GetName] spielen."
 PER_flavour_economic.6.a:0 "Wie es für notwendig erachtet wurde"
 ######################
 PER_go_fascist:0 "§LZahedi bekam eine Chance§!"
 PER_flavour_fascist.1.t:0 "Raus mit dem Alten"
 PER_flavour_fascist.1.d:0 "Monarchie und Kommunismus haben den Iran nicht nur destabilisiert, sondern auch zerstört. Viele Politiker in Machtpositionen haben begonnen, Unmut im Land zu säen. Viele versuchen, den Iran zu retten, doch ein Politiker hat die Aufmerksamkeit der Bevölkerung und des Parlaments besonders auf sich gezogen: Mohammed Mossadegh. Er behauptet, er werde den Iran aus den Fängen des Westens befreien.\n\nGeneral Zahedi hat erklärt, er selbst habe die Fähigkeit, [PER.GetName] zu seinem früheren Glanz zurückzuführen. Im Herzen ist er ein Ultranationalist und liebt sein Land innig, doch ein Faschist an der Spitze unseres Landes könnte problematisch werden."
 PER_flavour_fascist.1.a:0 "§MMossadegh hat mehr Erfahrung mit Politik§!"
 PER_flavour_fascist.1.b:0 "§LAch eigentlich...§!"
 PER_flavour_fascist.2.t:0 "Schlägerei von [GetYear]"
 PER_flavour_fascist.2.d:0 "In mehreren Städten im Iran kam es zu zahlreichen faschistischen Kundgebungen. Kleinere kommunistische Gruppen versuchten einzugreifen und die faschistischen Kundgebungen zu bekämpfen, doch es scheint, dass die faschistischen Anhänger die Kommunisten zurückgeschlagen haben. Infolgedessen gewann die faschistische Partei an Popularität, während die kommunistische Partei stetig an Popularität verlor.\n\nWährend die Polizei versuchte, in die Kämpfe einzugreifen, war die Zahl der Anhänger auf beiden Seiten viel zu groß, als dass die Polizei sie hätte stoppen können."
 PER_flavour_fascist.2.a:0 "Das verheißt nichts Gutes"
 PER_flavour_fascist.3.t:0 "Majlis-Gebäude schwer beschädigt"
 PER_flavour_fascist.3.d:0 "Faschistische Demonstranten und ihre Unterstützer standen vor dem iranischen Parlamentsgebäude, dem sogenannten Majlis. Während die Proteste mit Sprechchören in Richtung Parlament begannen, eröffneten bewaffnete Demonstranten das Feuer auf das Gebäude. Dabei zielten sie nicht auf die Politiker selbst, sondern versuchten, das Gebäude selbst zu beschmutzen. Als die Polizei eintraf, flohen die meisten Demonstranten, während eingefleischte Anhänger das Feuer in Richtung der Polizei eröffneten. Obwohl an diesem Tag niemand getötet wurde, gab es viele Verletzte, und die faschistischen Unterstützer gewannen durch ihren mutigen Akt gegen das sogenannte „korrupte“ Parlament weitere Anhänger."
 PER_flavour_fascist.3.a:0 "Damit ist dem fragilen Land nicht geholfen!"
 PER_flavour_fascist.4.t:0 "Schicksal der Monarchie"
 PER_flavour_fascist.4.d:0 "Reza Schah, ein Autokrat, ein Diktator, krank und alt, ist dennoch bei vielen beliebt. Er hat sich bemüht, den Iran zu modernisieren, und das können wir ihm nicht verübeln. Er sympathisiert mit dem Faschismus und könnte als faschistischer König gute Dienste leisten. Zahedi unterstützt ihn und wäre daher nicht verärgert, wenn der König an der Macht bliebe. Zahedi ist jedoch weiterhin offen für eine Führungsrolle."
 PER_flavour_fascist.4.a:0 "Der König wäre ein großartiger Anführer"
 PER_flavour_fascist.4.b:0 "Zahedi wird bevorzugt."
 PER_flavour_fascist.5.t:0 "Eine neue Flagge"
 PER_flavour_fascist.5.d:0 "Mit der neuen Regierung kommt eine neue Flagge, die die Regierung repräsentiert. Was für eine Flagge brauchen wir?"
 PER_flavour_fascist.5.a:0 "Dem Löwen und der Sonne geht es gut"
 PER_flavour_fascist.5.b:0 "Die paniranische Flagge!"

