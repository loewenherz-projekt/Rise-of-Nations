### fascist #########
#####################
PER_generals_coup:0 "Generals Coup"
PER_generals_coup_desc:0 "Zahedi ist ein faschistischer Politiker, der zwar weder mit Deutschland noch mit Italien verbündet ist, aber dennoch einen ultranationalistischen Staat anstrebt. Auch die iranischen Generäle unterstützen ihn und gewähren ihm freie Hand. Doch die Herzen der einfachen Bevölkerung hat er noch nicht erobert."
PER_brawl_communists:0 "Schlägerei auf den Straßen"
PER_brawl_communists_desc:0 "Nationalismus kann nur durch Macht hervorgerufen werden. Und was wäre eine bessere Machtdemonstration, als unsere größten Feinde auf der Straße zu bekämpfen?"
PER_storm_majlis:0 "Stürmen Sie den Madschlis"
PER_storm_majlis_desc:0 "Der Majlis ist ein korruptes und nutzloses Regierungsorgan. Indem wir Proteste in der Nähe des Gebäudes organisieren, können wir die Unterstützung für unsere Partei steigern."
PER_fate_of_the_king:0 "Das monarchistische Problem"
PER_fate_of_the_king_desc:0 "„[PER.GetLeader]s Herrschaft muss ein Ende haben. Er hat viel getan, aber für den Faschismus muss er entfernt werden!“, sagte einer der faschistischen Unterstützer.\n\nAber er hat Sympathien für den Faschismus, also könnte er noch an der Macht bleiben."
PER_crush_foreign_influence:0 "Zerschlagen Sie den ausländischen Einfluss"
PER_crush_foreign_influence_desc:0 "Wir müssen uns nicht auf ausländische Mächte verlassen, um unser Land zu verbessern. Wir sind durchaus in der Lage, dies selbst zu tun."
PER_crush_influence_tt:0 "§GInternationale Diplomatie§! Entscheidungen werden nicht mehr verfügbar sein."
PER_persian_identity:0 "Umarme die persische Identität"
PER_persian_identity_desc:0 "Wir sind keine Araber, Türken oder Inder, wir sind Perser, und das werden wir ganz klar zum Ausdruck bringen. Der Nationalismus wird sich im ganzen Land verbreiten."
PER_secret_police:0 "Durchsetzung des Militärrechts"
PER_secret_police_desc:0 "Den Menschen kann man nicht trauen. Wir brauchen eine erweiterte Geheimpolizei, um unser Gesetz durchzusetzen."
PER_revive_zoroastrianism:0 "Beleben Sie die Worte Zoroasters wieder"
PER_revive_zoroastrianism_desc:0 "Gute Gedanken, gute Worte, gute Taten. Worte, nach denen man leben sollte. Der Zoroastrismus ist und war der Grundstein unserer Kultur. Ohne ihn würden wir wie billige Araber aussehen. Wir müssen ihn annehmen und zu einem integralen Bestandteil unseres Landes machen. "
PER_all_for_iran:0 "Alles für den Iran"
PER_all_for_iran_desc:0 "Alles für den Iran! Wir werden für den Iran kämpfen und sterben! Jeder Iraner wird seinen Teil dazu beitragen, dieses Land zu schützen, auf dem unzählige Generationen gelebt haben."
PER_loyalize_army:0 "Loyalisieren Sie die Armee"
PER_loyalize_army_desc:0 "Viele Soldaten sind einer despotischen Monarchie immer noch treu. Indem wir ihren Eid auf die neue Regierungsform ablegen, können wir die Loyalität unserer Armee stärken."
