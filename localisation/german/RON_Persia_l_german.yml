PER_rural_economy_1:0 "Ländliche und veraltete Wirtschaft"
PER_rural_economy_1_desc:0 "Die bergige Landschaft des Iran hat das Land nicht nur kulturell, sondern auch wirtschaftlich gespalten. Unsere Agrargesellschaft hat keine Möglichkeit, mit der modernen Industrie Schritt zu halten. Es stehen uns dunkle Zeiten bevor, und wir müssen unsere Wirtschaft modernisieren, um mithalten zu können."
PER_rural_economy_2:0 "Ländliche und veraltete Wirtschaft"
PER_rural_economy_2_desc:0 "Die bergige Landschaft des Iran hat das Land nicht nur kulturell, sondern auch wirtschaftlich gespalten. Unsere Agrargesellschaft hat keine Möglichkeit, mit der modernen Industrie Schritt zu halten. Es stehen uns dunkle Zeiten bevor, und wir müssen unsere Wirtschaft modernisieren, um mithalten zu können."
PER_rural_economy_3:0 "Ländliche und veraltete Wirtschaft"
PER_rural_economy_3_desc:0 "Die bergige Landschaft des Iran hat das Land nicht nur kulturell, sondern auch wirtschaftlich gespalten. Unsere Agrargesellschaft hat keine Möglichkeit, mit der modernen Industrie Schritt zu halten. Es stehen uns dunkle Zeiten bevor, und wir müssen unsere Wirtschaft modernisieren, um mithalten zu können."
PER_religous_discontent:0 "Religiöse Unzufriedenheit"
PER_religous_discontent_desc:0 "Die Religiösen und Frommen haben ein Problem mit dem Schah, der Schah hegt eine große Verachtung für die Geistlichen und ihre rückständige Lebensweise, und die Geistlichen hassen den Weg, den der Schah in Richtung Verwestlichung einschlägt. Das Schisma hat das Land gespalten."
PER_untrained_officer:0 "Ungeschulte Beamte"
PER_untrained_officer_desc:0 "Der jahrelange Niedergang des Iran hat die Armee dazu gebracht, ihre Probleme zu ignorieren. Ignoranz und Vetternwirtschaft haben die Armee ruiniert. Sie wieder angemessen zu bewaffnen und die Offiziere so auszubilden, dass sie einsatzfähig sind, wird lange dauern."
