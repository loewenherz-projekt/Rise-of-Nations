PER_economy_decisions:0 "Iranische Wirtschaft"
PER_economy_decisions_desc:0 "Die iranische Wirtschaft ist bestenfalls glanzlos, seit die Briten unser Öl wollten. Der ehemalige König verschenkte es einfach so, es war sowieso nutzlos, aber heute ist es mehr wert als Gold. Öl mag der Grundstein für einen modernen Iran sein, aber wir brauchen Fabriken, um überhaupt arbeiten zu können. Wir sind kein rückständiges Land."
PER_further_expansion_oil_abadan:0 "Erweitern Sie die Ölraffinerie"
PER_decrease_influence:0 "Inflationskontrolle"
