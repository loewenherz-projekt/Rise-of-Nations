l_german:
CZE_little_entente:0 "Kleine Entente"
CZE_little_entente_desc:0 "Ein Bündnis, das aus gegenseitigem Schutz nach dem Ersten Weltkrieg entstand und von Frankreich gefördert wurde. Sein Ziel war es, die regionale Stabilität zu wahren, den ungarischen Revisionismus und die Rückkehr der Habsburger zu verhindern."
CZE_benes_wall:0 "Beneš-Mauer"
CZE_benes_wall_completion:0 "Fügt in jeder Provinz an der Grenze zu Deutschland eine Festung hinzu, wie historisch angelegt.\n\n"
CZE_benes_wall_desc:0 "Der wachsende deutsche Einfluss führte zu großer Unruhe in den angrenzenden Staaten. Die Tschechoslowakei unterhielt lange Grenzen zu Deutschland. Im Kriegsfall musste Edvard Beneš den deutschen Vormarsch lange genug verzögern, um sein Land zu mobilisieren."
CZE_french_philosophy:0 "Französische Philosophie"
CZE_french_philosophy_completion:0 "Fügt in jeder Provinz an der Grenze zu Deutschland ein Fort hinzu, wie historisch angelegt.\n\nFügt den französischen General Charles Belhague als Berater hinzu.\n\n"
CZE_french_philosophy_desc:0 "Von der französischen Maginot-Linie inspirierte Verteidigungskonzepte führten zu einer Revolution im Befestigungsbau und leiteten einen großangelegten Bau in der Tschechoslowakei ein."
CZE_sudetenland_defense:0 "Verteidigung des Sudetenlandes"
CZE_sudetenland_defense_completion:0 "Fügt in jeder Provinz an der Grenze zu Deutschland vier Festungen hinzu, wie historisch angelegt.\n\n"
CZE_sudetenland_defense_desc:0 "Das Sudetenland bildete den größten Teil der Grenze zu Deutschland und war damit der wichtigste Standort der Befestigungsanlagen – sie erstreckten sich über 2.000 km."
CZE_defense_in_depth:0 "Tiefenverteidigung"
CZE_defense_in_depth_completion:0 "Fügt in jeder Provinz vier Forts in der zweiten Verteidigungslinie hinzu.\n\n"
CZE_defense_in_depth_desc:0 "Statt einer einzigen Verteidigungslinie waren mehrere Schichten als Verteidigungslinie geplant."
CZE_fallback_line:0 "Fallback-Leitung"
CZE_fallback_line_completion:0 "Fügt in jeder Provinz vier Forts zur letzten Verteidigungslinie hinzu.\n\n"
CZE_fallback_line2_completion:0 "Fügen Sie in jeder Provinz an der slowakischen Grenze sechs Festungen hinzu.\n\n"
CZE_fallback_line_desc:0 "Man war sich darüber im Klaren, dass ein Sieg gegen Deutschland innerhalb der bestehenden Grenzen der Tschechoslowakei möglicherweise nicht möglich war und dass für einen eventuellen Sieg möglicherweise Gebiete, darunter auch Prag, abgetreten werden mussten."
CZE_defend_moravia:0 "Mährische Linie"
CZE_defend_moravia_completion:0 "Fügen Sie in jeder Provinz rund um den Staat Mähren sechs Festungen hinzu.\n\n"
CZE_defend_moravia_desc:0 "Eine Ausweitung unserer Verteidigungslinien bis in die Tschechoslowakei hinein wird es uns ermöglichen, unser Land besser zu kontrollieren. Während das Becken, in dem Böhmen liegt, in einem offenen Krieg gegen ein zahlenmäßig überlegenes Deutschland nicht zu verteidigen ist, ist die potenzielle Frontlinie in Mähren weitaus besser zu verteidigen."
CZE_hungarian_border:0 "Ungarische Grenze"
CZE_hungarian_border_completion:0 "Fügt vier Festungen pro Provinz an der Grenze zu Ungarn hinzu.\n\n"
CZE_hungarian_border_desc:0 "Ein Verbündeter Deutschlands während des Ersten Weltkriegs."
CZE_austrian_border:0 "Österreichische Grenze"
CZE_austrian_border_completion:0 "Fügt vier Festungen pro Provinz an der Grenze zu Österreich hinzu.\n\n"
CZE_austrian_border_desc:0 "Ein Verbündeter Deutschlands während des Ersten Weltkriegs."
CZE_polish_border:0 "Polnische Grenze"
CZE_polish_border_completion:0 "Fügt vier Festungen pro Provinz an der Grenze zu Polen hinzu.\n\n"
CZE_polish_border_desc:0 "Ein freundschaftlicher Nachbar, der in den vergangenen Jahren durch Grenzstreitigkeiten belastet war."
CZE_complete_fortifications:0 "Komplette Befestigungen"
CZE_complete_fortifications_completion:0 "Beendet den schnellen Aufbau von Verteidigungsanlagen.\n\n"
CZE_complete_fortifications_desc:0 "Die großen nationalen Anstrengungen zur Verteidigung unserer Grenzen haben in diesem Land ihren Preis gefordert, und die Befestigungen stehen kurz vor der Fertigstellung."
CZE_pact_of_reorganisation:0 "Reorganisationspakt"
CZE_pact_of_reorganisation_desc:0 "Seit 1933 besteht ein ständiger Rat der Kleinen Entente, der eine gemeinsame Politik der drei Staaten entwickeln und zusammenarbeiten soll. Die einzelnen Staaten stellen die Ressourcen und Fähigkeiten zur Verfügung, um das Ganze zu stärken."
CZE_romanian_arms_deal:0 "Rumänische Waffengeschäfte"
CZE_romanian_arms_deal_desc:0 "Der Reorganisationspakt führte zu bedeutenden militärischen, wirtschaftlichen und politischen Vereinbarungen zwischen den Mitgliedsstaaten. Die Modernisierung der nationalen Armeen war für die kleineren Staaten der Region von größter Bedeutung, da die Kriegsgefahr stieg. Die Tschechoslowakei reagierte auf diese Nachfrage und es kam zu einem Waren- und Materialfluss zwischen den Ländern."
CZE_yugoslavian_arms_deal:0 "Jugoslawische Waffengeschäfte"
CZE_yugoslavian_arms_deal_desc:0 "Der Reorganisationspakt führte zu bedeutenden militärischen, wirtschaftlichen und politischen Vereinbarungen zwischen den Mitgliedsstaaten. Die Modernisierung der nationalen Armeen war für die kleineren Staaten der Region von größter Bedeutung, da die Kriegsgefahr stieg. Die Tschechoslowakei reagierte auf diese Nachfrage und es kam zu einem Waren- und Materialfluss zwischen den Ländern."
CZE_freedom_of_relations:0 "Freiheit der Beziehungen"
CZE_freedom_of_relations_desc:0 "Die Meinungsverschiedenheiten in der Außenpolitik führten dazu, dass die Mitglieder der Kleinen Entente ihre Diplomatie nun individuell steuern wollten. Rumänien war das erste Land, das vorschlug, dass die einzelnen Nationen ihre eigene Diplomatie betreiben sollten."
CZE_collapse_of_the_entente:0 "Zusammenbruch der Entente"
CZE_collapse_of_the_entente_desc:0 "Die Unfähigkeit, hinsichtlich der äußeren Bedrohungen zu einer einstimmigen Einigung zu gelangen, endete damit, dass sich das Bündnis weigerte, die Tschechoslowakei gegen die deutsche Aggression zu unterstützen."
CZE_franco_soviet_alliance:0 "Französisch-sowjetisches Bündnis"
CZE_franco_soviet_alliance_desc:0 "In dem Bemühen, Europa einen dauerhaften Frieden zu bringen, wandte sich Frankreich an die Sowjetunion, um ein neues Bündnis zu gründen, das es dem Land ermöglichen sollte, seine Verbündeten im Osten zu sichern."
CZE_accept_communism:0 "Akzeptiere den Kommunismus"
CZE_accept_communism_desc:0 "Die öffentliche Meinung verändert sich mit der politischen Realität und die langjährige Freundschaft zwischen Beneš und Stalin bringt Fortschritte."
CZE_czech_soviet_entente:0 "Tschechisch-sowjetische Entente"
CZE_czech_soviet_entente_desc:0 "Das Endergebnis jahrelanger Diplomatie mit der Sowjetunion."
CZE_national_front:0 "Nationale Front"
CZE_national_front_desc:0 "Die wachsende Popularität der Kommunistischen Partei verschiebt unser politisches Spektrum nach links."
CZE_molotov_deal:0 "Der Molotow-Deal"
CZE_molotov_deal_desc:0 "Um den wachsenden Einfluss der USA in der Region zu verhindern, legte die Sowjetunion einen alternativen, von der Sowjetunion geförderten Wirtschaftsplan vor, der Europa dabei helfen sollte, sich vom Krieg zu erholen und seinen Handel mit der UdSSR neu zu organisieren."
CZE_polish_border_claims:0 "Polnische Grenzansprüche"
CZE_polish_border_claims_desc:0 "Seit der Existenz der Tschechoslowakei wird die genaue Grenze des Landes von Polen angefochten."
CZE_recreate_the_little_entente:0 "Erschaffen Sie die Kleine Entente neu"
CZE_recreate_the_little_entente_desc:0 "Die Kleine Entente wurde von Nachbarn zur Verteidigung gegen eine gemeinsame Bedrohung gegründet und zerbrach aufgrund einer anderen Bedrohung."
CZE_invite_yugoslavia:0 "Jugoslawien einladen"
CZE_invite_yugoslavia_desc:0 "Jugoslawien war ein starker Verbündeter, unsere grundlegenden Differenzen in der Außenpolitik führten zu einer Spaltung unseres Bündnisses, die unsere Feinde ausgenutzt haben. Doch die Zeit hat gezeigt, dass unsere Feinde dieselben sind und unsere Differenzen belanglos sind."
CZE_invite_romania:0 "Rumänien einladen"
CZE_invite_romania_desc:0 "Jugoslawien war ein starker Verbündeter, unsere grundlegenden Differenzen in der Außenpolitik führten zu einer Spaltung unseres Bündnisses, die unsere Feinde ausgenutzt haben. Doch die Zeit hat gezeigt, dass unsere Feinde dieselben sind und unsere Differenzen belanglos sind."
CZE_europe_at_war:0 "Europa im Krieg"
CZE_europe_at_war_desc:0 "Das Schicksal Europas ist in Gefahr und Ihre Grenzen sind einer ernsten Bedrohung ausgesetzt. Die Beziehungen verbessern sich jedoch schnell und die politische Isolation der Tschechoslowakei nähert sich ihrem Ende."
CZE_polish_czechoslovak_confederation:0 "Polnisch-Tschechoslowakische Konföderation"
CZE_polish_czechoslovak_confederation_desc:0 "Mit dem Zusammenbruch des polnischen Staates und seiner Exilregierung gewann in der polnischen Regierung der Vorschlag an Boden, Mitteleuropa als Gegengewicht zur Sowjetunion und zum deutschen Staat zu vereinen."
CZE_join_the_allies:0 "Die Demokratie setzt sich durch"
CZE_join_the_allies_desc:0 "Der Krieg hat Europa erreicht und große Zerstörungen angerichtet, doch es gibt kaum einen Grund, die Prinzipien aufzugeben, die der Tschechoslowakei so viel Erfolg beschert haben."
CZE_marshall_plan:0 "Marshallplan"
CZE_marshall_plan_desc:0 "Ziel ist es, Stabilität und Wohlstand nach Europa zurückzubringen, den Einfluss der Vereinigten Staaten in der Region zu stärken und das Wachstum des kommunistischen Einflusses einzudämmen."
CZE_warming_german_relations:0 "Krieg abwenden – Knie beugen"
CZE_warming_german_relations_desc:0 "Ein Krieg mit Deutschland schien sicher, und es liegt an uns, zu versuchen, diese Beziehung zu normalisieren. Alles zu tun, was nötig ist, um unseren Staat und unsere Nation zu erhalten."
CZE_fascist_leanings:0 "Faschistische Neigungen"
CZE_fascist_leanings_desc:0 "Die faschistische Seite der Politik annehmen und die deutsche Minderheit näher an das Mutterland bringen."
CZE_slovak_hungarian_union:0 "Slowakisch-Ungarische Union"
CZE_slovak_hungarian_union_desc:0 "Die ungarische Regierung vertritt weiterhin die Ansicht, die Slowakei falle in ihren Zuständigkeitsbereich. Diese Ansicht ist falsch und überholt. Diese Ansicht kann nicht so bleiben. Sie stellt eine existenzielle Bedrohung für die Souveränität unserer Nation dar. Die unmittelbare Reaktion wäre ein Krieg mit Ungarn und die Annexion seines Territoriums. Wir waren einst Teil eines großen Reiches."
CZE_empire_ambitions:0 "Imperiumsambitionen"
CZE_empire_ambitions_desc:0 "Einst herrschte über diese Länder ein großes Reich. Wir werden ihr Erbe zurückerobern und es neu aufbauen. Wir haben Ungarn zurückerobert, und wir müssen Österreich zurückerobern und unsere Länder bis zum Mittelmeer zurückerobern."
CZE_empire_ambitions_threat:0 "Die Tschechoslowakei hat das Feuer des Imperiumsaufbaus in Mitteleuropa neu entfacht."
CZE_industry_investment:0 "Nationale Investitionen"
CZE_industry_investment_desc:0 "Im Jahr 1932 gewährte die tschechoslowakische Regierung den verschuldeten Skoda-Werken Kredit im Austausch für eine spätere Beteiligung am Unternehmen. Der größte Anteilseigner war zuvor französischer Herkunft und schränkte den Handel innerhalb des Unternehmens ein."
CZE_transport_modernization:0 "Modernisierung des Transportwesens"
CZE_transport_modernization_desc:0 "Es war von größter Bedeutung, dass sowohl die Straße als auch die Schiene die Mobilisierung förderten und nicht behinderten. Bei einer 2.000 Kilometer langen Grenze war die Reaktionsfähigkeit auf Grenzüberschreitungen vom Transportsystem abhängig."
CZE_expansion_of_the_steel_industry:0 "Ausbau der Stahlindustrie"
CZE_expansion_of_the_steel_industry_completion:0 "Wählen Sie zwischen dem Ausbau der Industrie so weit wie möglich und der Steigerung der Produktion um 40 Stahl oder an einem bestimmten Standort um 30 Stahl.\n\n"
CZE_expansion_of_the_steel_industry_desc:0 "In der Zwischenkriegszeit dominierten Stahlkartelle den europäischen Markt und legten Quoten für die Stahlproduktion fest. Die Tschechoslowakei produzierte den Großteil ihres Stahls selbst, der für inländische Transport- und Bauprojekte stark nachgefragt war, konnte aber etwa ein Drittel ins Ausland exportieren."
CZE_expansion_of_the_oil_industry:0 "Expansion der Ölindustrie"
CZE_expansion_of_the_oil_industry_desc:0 "Um die Jahrhundertwende wurden in der Region Mähren-Wien Ölvorkommen entdeckt, als diese noch zu Österreich-Ungarn gehörten. \n\nAufgrund der Schwierigkeiten bei der Ölförderung war die Förderung zu kostspielig, und die Industrie wuchs erst 1917, als die erste kommerzielle Ölquelle eröffnet wurde. \n\nWährend des Zweiten Weltkriegs wurde das Öl in der Region außerordentlich wertvoll, und die Bemühungen wurden massiv ausgeweitet."
CZE_advancements_in_synthetic_oil:0 "Weiterentwicklung von synthetischem Öl"
CZE_advancements_in_synthetic_oil_desc:0 "Aufgrund des hohen Ölpreises und der großen Nachfrage, die die Welt veränderte, wurden die Bemühungen zur Herstellung dieser Substanz von jenen Ländern angeführt, die nicht über natürliche Vorkommen verfügten.\n\n Deutsche Ingenieure waren die ersten, die Erfolg hatten, indem sie Kohle als Quelle für Kohlenwasserstoffe nutzten.\n\nZum Glück für die Tschechoslowakei verfügt das Land im Gegensatz zu seinen übrigen Ressourcen über nahezu endlose Vorräte."
CZE_industry_effort:0 "Branchenbemühungen"
CZE_industry_effort_desc:0 "Der industrielle Fortschritt ist ein wichtiger Schritt für die weitere Unabhängigkeit der Tschechoslowakei. Die benachbarten Industriezentren in Deutschland und Österreich sorgen für erhebliche Konkurrenz innerhalb der Region."
CZE_industry_innovation:0 "Brancheninnovation"
CZE_industry_innovation_desc:0 "Angesichts der starken Konkurrenz durch österreichische und deutsche Hersteller waren Innovationen innerhalb der Branche ein wichtiger Schutz für die Aufrechterhaltung des Marktanteils."
CZE_industrial_construction:0 "Industriebau"
CZE_industrial_construction_desc:0 "Der Ausbau der Zivilindustrie war wichtig für das Wirtschaftswachstum und trug zur Erholung von der Depression bei. Außerdem brachte er Wohlstand über Böhmen hinaus."
CZE_military_exports:0 "Militärexporte"
CZE_military_exports_desc:0 "Die Tschechoslowakei erbte den industriellen Kern der österreichisch-ungarischen Monarchie, und ihre Entwicklungen waren weltweit einflussreich. Um diesen Anforderungen gerecht zu werden, war ein starkes Wachstum der Industrie erforderlich."
CZE_export_industry:0 "Exportindustrie"
CZE_export_industry_desc:0 "Die tschechoslowakische Industrie war nicht nur auf den Binnenmarkt ausgerichtet, sondern musste wachsen, um die Nachfrage vieler Länder zu befriedigen. Es kam zu einem massiven Anstieg der Exporte in die Sowjetunion und ihre unmittelbaren Nachbarn Rumänien und Jugoslawien, aber auch nach Übersee, insbesondere nach Ägypten, Großbritannien und Britisch-Indien."
CZE_export_industry2:0 "Ausländische Investitionen"
CZE_export_industry2_desc:0 "Sowohl englische als auch französische Unternehmen waren seit den 1920er Jahren stark an den Skoda-Werken beteiligt. Doch eine neue Investitionswelle setzte ein, sowohl von neuen Akteuren wie den USA als auch von bestehenden Investoren wie Großbritannien. Diese Investitionen beschränkten sich nicht nur auf die Skoda-Werke, sondern wirkten sich auf die gesamte Wirtschaft aus."
CZE_industrial_collaboration:0 "Industrielle Zusammenarbeit"
CZE_industrial_collaboration_desc:0 "Es wurde klar, dass die einzelnen Unternehmen die von ihnen geforderten Fähigkeiten nicht in der vorgegebenen Zeit erbringen würden. Stattdessen entschieden sich Skoda und CKD für eine Zusammenarbeit, um vor Ausbruch des Krieges neue Panzerkonstruktionen zu entwickeln."
CZE_extra_research_slot:0 "Zusätzlicher Forschungsplatz"
CZE_extra_research_slot_desc:0 "Eine neue Generation von Köpfen reift heran, die sich nicht mehr an die Imperien der Vergangenheit erinnern und ihre eigene Zukunft gestalten müssen. Unsere Universitäten haben die Chance, eine neue Generation zu beeinflussen."
CZE_extra_research_slot2:0 "Zusätzlicher Forschungsplatz"
CZE_extra_research_slot2_desc:0 "Die Tschechoslowakei hat sich als unabhängige Nation erwiesen, die alle Hindernisse überwinden kann. Eine Rückkehr zum Frieden führt zu großer nationaler Erleichterung."
CZE_arms_trade_dominance:0 "Dominanz des Waffenhandels"
CZE_arms_trade_dominance_desc:0 "Die Skoda-Werke wurden in ihrer Größe nur von den deutschen Krupp-Werken übertroffen. Sie dominierten den Waffenhandel in Osteuropa außerhalb der faschistischen Staaten vollständig, ihre Produkte wurden auf der ganzen Welt verkauft und ihre Designs gehörten zu den erfolgreichsten ihrer Zeit."
CZE_tank_innovation:0 "Panzerinnovation"
CZE_tank_innovation_desc:0 "Dutzende von Projekten gingen durch die tschechoslowakischen Designbüros, was zu einer großen Vielfalt an Designs und Erfahrungen führte."
CZE_advanced_tank_design:0 "Fortschrittliches Tankdesign"
CZE_advanced_tank_design_desc:0 "Die tschechoslowakischen Panzerkonstrukteure erkannten die wachsende Bedrohung durch Panzer und sorgten für ausreichend starke Panzerkanonen, um der Panzerentwicklung einen Schritt voraus zu sein."
CZE_modernized_infantry:0 "Modernisierte Infanterie"
CZE_modernized_infantry_desc:0 "In der zweiten Hälfte der 1930er Jahre erkannte das tschechoslowakische Militär die Bedrohung durch ein erstarkendes Deutschland und begann eine Kampagne zur Modernisierung und Aufrüstung seiner Divisionen."
CZE_infantry_focus:0 "Československá obec legionářů"
CZE_infantry_focus_desc:0 "Die Tschechoslowakische Legion – Seit Jahrtausenden kämpfen Männer in Europa, doch selten hat ein Volk in so vielen verschiedenen Armeen und Regionen gekämpft, in der Kaiserlich Russischen Armee, in Frankreich, in Italien. Es ist die Aufgabe der Alten, ihr Wissen an die Jungen weiterzugeben, damit sie nicht dieselben Fehler machen."
CZE_airforce_modernization:0 "Modernisierung der Luftwaffe"
CZE_airforce_modernization_desc:0 "Luftstreitkräfte wurden als zunehmende Notwendigkeit der modernen Kriegsführung erkannt. Die Fähigkeit, den eigenen Luftraum zu kontrollieren und Luftnahunterstützung zu leisten, wurde als äußerst wichtig erachtet."
CZE_french_bombers:0 "Ausländische Bomber"
CZE_french_bombers_desc:0 "Im Zuge der allgemeinen Modernisierung der tschechischen Streitkräfte erteilten die Franzosen den Tschechen eine Lizenz für den Block MB. 200, um ihre Luftwaffe auf den neuesten Stand zu bringen. Später bot die Sowjetunion die Tupolew SB als potenziellen Schnellbomber an."
CZE_artillery_focus:0 "Artillerie-Fokus"
CZE_artillery_focus_desc:0 "Die Skoda-Werke boten jedem, der es sich leisten konnte, eine große Auswahl an Gebirgsgeschützen, Belagerungskanonen und schwerer Artillerie an. Die Entwürfe wurden später im Ausland in Lizenz gebaut."
CZE_austro_hungarian_legacy:0 "Österreichisch-ungarisches Erbe"
CZE_austro_hungarian_legacy_desc:0 "Die Skoda-Werke verfügten über ein enormes Produktionsspektrum. Zu Zeiten des Kaiserreichs eigneten sich ihre umfangreichen Stahlkapazitäten und ihr Know-how in der Artillerie hervorragend für den Schiffsbau und die Bewaffnung. Im letzten Jahrhundert führten ihre Fähigkeiten dazu, dass Passagierschiffe gebaut wurden, und Kriegsschiffe zählten zu ihren wichtigsten Exportgütern."
CZE_war_preparations:0 "Defensive Vorbereitungen"
CZE_war_preparations_desc:0 "Krieg ist unvermeidlich. Die Tschechoslowakei, die erst vor 20 Jahren aus der österreichisch-ungarischen Monarchie hervorgegangen war, gerät zunehmend in Isolation, und viele Nachbarn erheben Anspruch auf ihr Land und ihre Ressourcen."
CZE_war_preparations_idea_future:0 "Bietet im Kriegsfall +150 politische Macht"
CZE_military_reservists:0 "Militärreservisten"
CZE_military_reservists_desc:0 "Die Ausbildung jeder neuen Generation zum Kämpfen und zur Teilnahme am Militär war ein wichtiger Ausgleichsfaktor bei der Verteidigung der tschechischen Grenzen vor Eindringlingen."
CZE_limit_exports:0 "Exporte begrenzen"
CZE_limit_exports_desc:0 "In einer Realität, in der die Produktion begrenzt ist, müssen auch die Exporte begrenzt sein, und die Verteidigung der Nation steht an erster Stelle."
CZE_extensive_conscription:0 "Umfangreiche Wehrpflicht"
CZE_extensive_conscription_desc:0 "Damit ein kleines Land inmitten von Supermächten bestehen kann, braucht es zwei Dinge: starke Allianzen und eine wirksame Abschreckung. Unsere Landsleute müssen bereit sein, aufzustehen und ihr Land zu verteidigen. Aus diesem Grund haben wir eine nationale Wehrpflicht eingeführt, die jede neue Generation für eine mögliche Verteidigung unseres Landes ausbildet."
CZE_contingency_planning:0 "Notfallplanung"
CZE_contingency_planning_desc:0 "Den tschechischen Generälen blieb kaum etwas anderes übrig, als über die zukünftigen Folgen einer deutschen Invasion nachzudenken. Dies verdeutlichte die harte Realität eines dünnen Landes mit langen Grenzen."
CZE_spanish_brigade:0 "Ehrenamtliches Erbe"
CZE_spanish_brigade_desc:0 "Die Tschechoslowakische Brigade setzte die mittlerweile lange Tradition freiwilliger Tschechoslowaken fort, die in ausländischen Kriegen kämpften, und schloss sich der Internationalen Brigade an, um den Faschismus innerhalb der spanischen Grenzen zu bekämpfen."

CZE_polish_czech_confederacy_completion:0 "Dieser Weg wird uns in Konflikt mit denen führen, die das polnische Territorium aufgeteilt haben.\n"
CZE_little_entente_completion:0 "Ein Nachkriegsbündnis zur Eindämmung der Aggression und zur Wahrung des Friedens in der Region.\n"
CZE_pact_of_reorganisation_completion:0 "Die Zusammenarbeit ist ein wichtiger Bestandteil unserer regionalen Sicherheit.\n"
CZE_recreate_the_little_entente_completion:0 "Ermöglicht der Tschechoslowakei, ihr altes Bündnis zu ehren und die Kleine Entente wiederherzustellen.\n"
CZE_polish_border_trigger:0 "Polen wird von der Tschechoslowakei oder ihren Verbündeten kontrolliert.\n"
CZE_austrian_border_trigger:0 "Österreich wird von der Tschechoslowakei oder ihren Verbündeten kontrolliert.\n"
CZE_hungarian_border_trigger:0 "Ungarn wird von der Tschechoslowakei oder ihren Verbündeten kontrolliert.\n"
CZE_spanish_brigade_completion:0 "Erhält National Spirit Volunteer Nation, was (Sende Freiwilligen-Spannungslimit -25%) gewährt\n"

czech.1.t:0 "Gründung der Sudetendeutschen Partei"
czech.1.d:0 "Heute gründete der nationalsozialistische Politiker Konrad Henlein die rechtsextreme Sudetendeutsche Partei."
czech.1.a:0 "Das kann nicht gut altern ... für uns ..."

czech.001.t:0 "KRIEG ERKLÄRT!"
czech.001.d:0 "Wir haben viele Jahre daran gearbeitet, diesen Tag zu verhindern. Unser Bündnis basierte auf der Verhinderung von Aggressionen und der Verteidigung des Status Quo.\n\nWir haben alles getan, um dies zu verhindern. Wir haben auf die Forderungen der Briten, der Franzosen, der Deutschen und unseres eigenen Volkes gehört.\n\nDoch wir haben dies nicht verhindert.\n\nSie können nur hoffen, dass unsere Rechtfertigung denjenigen Trost spendet, die ihr Leben oder ihre Angehörigen verlieren werden."
czech.001.a:0 "Katastrophe"
czech.001.b:0 "Ablehnen"
czech.002.t:0 "Exilregierung"
czech.002.d:0 "Mit der Invasion der Tschechoslowakei und dem Zusammenbruch der Regierung bildete Edvard Beneš von seiner neuen Heimat England aus eine Regierung in der Hoffnung auf eine Niederlage der Achsenmächte und die Rückgabe tschechoslowakischer Gebiete."
czech.002.a:0 "Willkommen zurück, Herr Präsident."
czech.002.b:0 "Ablehnen"
czech.003.t:0 "Mobilisierungs-Chaos"
czech.003.d:0 "Unsere Mobilisierungsversuche wurden durch die Aktionen der deutschen Freikorps durchkreuzt. Angehörige der deutschstämmigen Gruppen verweigerten den Befehl und viele flohen über die Grenze nach Deutschland. \n\nUm die Lage noch komplizierter zu machen, operieren bewaffnete deutsche Paramilitärs außerhalb der deutschen Grenzen und führen Überfälle in der Tschechoslowakei durch."
czech.003.a:0 "Katastrophe"
czech.004.t:0 "Mobilisierungs-Chaos"
czech.004.d:0 "Unsere Mobilisierungsversuche wurden durch die Aktionen der deutschen Freikorps durchkreuzt. Angehörige der deutschstämmigen Gruppen verweigerten den Befehl und viele flohen über die Grenze nach Deutschland. \n\nUm die Lage noch komplizierter zu machen, operieren bewaffnete deutsche Paramilitärs außerhalb der deutschen Grenzen und führen Überfälle in der Tschechoslowakei durch."
czech.004.a:0 "Katastrophe"
czech.010.t:0 "Wien ist gefallen!"
czech.010.d:0 "Die ehemalige Hauptstadt des großen österreichisch-ungarischen Reiches ist in unsere Hände gefallen. Viele unserer Leute erinnern sich noch daran, von dieser Stadt aus regiert worden zu sein, und es ist ein großer Sieg, sie erobert zu haben."
czech.010.a:0 "Exzellent!"
czech.011.t:0 "Dresden ist gefallen!"
czech.011.d:0 "Dresden ist nicht nur eine bedeutende Industriestadt, sondern auch Standort einer bedeutenden deutschen Garnison. Die Tatsache, dass wir die Stadt erobert haben, ist ein großer Sieg und hat die Herzen unserer Soldaten gestärkt."
czech.011.a:0 "Exzellent!"
czech.012.t:0 "Hilferuf"
czech.012.d:0 "Niemand war von der deutschen Aggression schockiert. Unsere große ethnisch-deutsche Bevölkerung, die zunehmend nationalistische Regierungspartei und die massiven Investitionen in das Militär.\n\nWas die Militärs schockierte, war die Geschwindigkeit, mit der sich dies entwickelte.\n\nNach dem Ersten Weltkrieg gründeten wir ein Bündnis, um den Status Quo aufrechtzuerhalten. Um unsere Grenzen zu schützen.\n\nWir müssen uns an sie wenden."
czech.012.a:0 "Senden Sie Nachrichten weit und breit."
czech.013.t:0 "Tschechoslowakei bittet um Hilfe"
czech.013.d:0 "Wir sind verpflichtet, dem Hilferuf unserer Verbündeten zu folgen.\n\nDie Kleine Entente wurde gegründet, um Stabilität in Mitteleuropa zu schaffen.\n\nJetzt müssen wir möglicherweise kämpfen, um einen neuen Frieden zu schaffen."
czech.013.a:0 "Wir werden antworten."
czech.013.b:0 "Lass sie fallen."
czech.014.t:0 "Tschechoslowakei bittet um Hilfe"
czech.014.d:0 "Wir sind verpflichtet, dem Hilferuf unserer Verbündeten zu folgen.\n\nDie Kleine Entente wurde gegründet, um Stabilität in Mitteleuropa zu schaffen.\n\nJetzt müssen wir möglicherweise kämpfen, um einen neuen Frieden zu schaffen."
czech.014.a:0 "Wir werden antworten."
czech.014.b:0 "Lass sie fallen."
czech.015.t:0 "Tschechoslowakei bittet um Hilfe"
czech.015.d:0 "Wir sind verpflichtet, dem Hilferuf unserer Verbündeten zu folgen.\n\nDie Kleine Entente wurde gegründet, um Stabilität in Mitteleuropa zu schaffen.\n\nJetzt müssen wir möglicherweise kämpfen, um einen neuen Frieden zu schaffen."
czech.015.a:0 "Wir werden antworten."
czech.015.b:0 "Lass sie fallen."
czech.016.t:0 "Die Tschechoslowakei wurde aufgegeben"
czech.016.d:0 "Die Kleine Entente ist vorzeitig zerfallen, Frankreich hat die Tschechoslowakei seinen Aggressoren überlassen.\n\nWeder Jugoslawien noch Rumänien sind bereit, ohne ihren westlichen Unterstützer in den Kampf zu ziehen.\n\nSo endet diese Ära des Wohlstands und des Friedens."
czech.016.a:0 "Die Tschechoslowakei ist allein."
czech.017.t:0 "Frankreich setzt sich für die Verteidigung der Tschechoslowakei ein"
czech.017.d:0 "Frankreich ist seiner militärischen Verpflichtung gegenüber der Tschechoslowakei nachgekommen.\n\nDie Aufrufe zum Krieg. Zur Intervention in Mitteleuropa."
czech.017.a:0 "Die Kleine Entente lebt."
czech.018.t:0 "Frankreich und Jugoslawien verteidigen die Tschechoslowakei"
czech.018.d:0 "\n\nFrankreich und Jugoslawien sind ihrer militärischen Verpflichtung gegenüber der Tschechoslowakei nachgekommen.\n\nDie Aufrufe zum Krieg. Zur Intervention in Mitteleuropa."
czech.018.a:0 "Die kleine Entente lebt"
czech.019.t:0 "Frankreich und Rumänien verteidigen die Tschechoslowakei"
czech.019.d:0 "\n\nFrankreich und Rumänien sind ihrer militärischen Verpflichtung gegenüber der Tschechoslowakei nachgekommen.\n\nDie Aufrufe zum Krieg. Zur Intervention in Mitteleuropa."
czech.019.a:0 "Die Kleine Entente lebt"
czech.020.t:0 "Die Kleine Entente festigt sich trotz deutscher Drohungen"
czech.020.d:0 "\nDie Kleine Entente wurde gegründet, um den Status Quo in Mitteleuropa durchzusetzen. Jetzt steht ihre Bewährungsprobe an.\n\nDas Eingreifen gegen die Aggression gegen die Tschechoslowakei hat alle Mitglieder zusammengebracht.\n\nDas Bündnis zur Verteidigung gegen den ungarischen Revisionismus ist heute eine Großmacht in der Region."
czech.020.a:0 "Die Kleine Entente ist wiedergeboren"
czech.021.t:0 "Warnung der Kleinen Entente"
czech.021.d:0 "Die Kleine Entente wurde gegründet, um die Stabilität in der Region zu gewährleisten.\n\nSie werden nicht tatenlos zusehen, wie sie zerstört wird.\n\nSie wurden gewarnt."
czech.021.a:0 "Sehr gut"
czech.022.t:0 "Warnung der Kleinen Entente"
czech.022.d:0 "Die Kleine Entente wurde gegründet, um die Stabilität in der Region zu gewährleisten.\n\nSie werden nicht tatenlos zusehen, wie sie zerstört wird.\n\nSie wurden gewarnt."
czech.022.a:0 "Sehr gut"
czech.023.t:0 "Prag ist gefallen"
czech.023.d:0 "Deutsche Truppen stürmten heute Prag, besetzten erfolgreich Böhmen und vertrieben die tschechischen Truppen aus der Stadt.\n\nViele Einwohner, die vor dem deutschen Angriff Schutz gesucht hatten, mussten feststellen, dass ihre Häuser und Geschäfte von deutschen Truppen besetzt waren.\n\nDeutsche Soldaten besetzten rasch die Tschechoslowakische Nationalbank und zwangen die Direktoren, zwei Überweisungsanträge nach London zu schicken, in denen sie die Überweisung von etwa 50 Tonnen tschechischen Goldes auf ein von Deutschland kontrolliertes Konto forderten.\n\nErschreckenderweise wurden trotz der Einfrierung aller tschechoslowakischen Vermögenswerte 23 Tonnen davon an die Reichsbank weitergeleitet."
czech.023.a:0 "Zumindest haben wir unsere lokalen Besitztümer evakuiert"
czech.023.b:0 "Katastrophe"

czech.025.t:0 "Allianz bricht zusammen!"
czech.025.d:0 "Unser Bündnis wurde gegründet, um aus der misslichen Lage der Tschechoslowakei Kapital zu schlagen und das zurückzuerobern, was uns gehört.\n\nEs handelt sich nicht um einen Verteidigungspakt. Es fungiert als Barriere für mögliche andere Beziehungen.\n\n"
czech.025.a:0 "Fragen Sie die Deutschen"
czech.025.b:0 "Ich habe keine Angst!"
czech.025.c:0 "Diese Entente ist beendet!"
czech.026.t:0 "Die Gelegenheit bietet sich!"
czech.026.d:0 "Viele Jahre lang hat Polen versucht, einen Ausgleich zwischen uns und der Sowjetunion zu schaffen.\n\nUnsere Versuche, Polen in die Gemeinschaft einzubinden, wurden sorgfältig vermieden und jeder Versuch einer militärischen Zusammenarbeit wurde ausgewichen.\n\nJetzt jedoch befinden sie sich im Krieg mit der Sowjetunion, ihr Stolz ist dahin und sie betteln uns an, ihnen dieselben Bedingungen zu bieten, die wir ihnen noch vor ein paar Monaten angeboten hätten."
czech.026.a:0 "Bringen Sie sie in die Herde"
czech.026.b:0 "Ich habe keine Angst!"
czech.028.t:0 "Polen tritt den Achsenmächten bei"
czech.028.d:0 "Polen hatte lange Zeit versucht, einen Ausgleich zwischen seinen Nachbarn zu schaffen und Konflikte mit beiden zu vermeiden.\n\nMit dem Einmarsch der Sowjetunion in Ostpolen wurde diese Politik aufgegeben.\n\nPolen strebt ein dauerhaftes Militärbündnis mit Deutschland an."
czech.028.a:0 "Sehr gut"
czech.029.t:0 "Die Polnisch-Ungarische Bruderschaft bricht zusammen"
czech.029.d:0 "Während Polen nach externen Mächten sucht, die in seinen Konflikt eingreifen, hat es sein eigenes Bündnis als politische Einheit aufgegeben.\n\nDie polnisch-ungarischen Beziehungen bleiben jedoch stark."
czech.029.a:0 "Sehr gut"

czech.030.t:0 "Rückeroberung von Zaolzie"
czech.030.d:0 "Seit der Gründung der Tschechoslowakei kämpfen wir um dieses Land. Es ist reich an Kohle und hoch industrialisiert mit einer starken Stahlindustrie. Es wäre dumm, diese Gelegenheit zum Angriff nicht zu nutzen. Die Tschechen kämpfen gegen die Deutschen und können uns kaum daran hindern, dieses Land zurückzuerobern."
czech.030.a:0 "Nimm es"
czech.030.b:0 "Ignoriere es"
czech.031.t:0 "Zaolzie-Besitz"
czech.031.d:0 "Viele Männer haben im Kampf gegen die Polen um diesen kleinen, kohlereichen Landstreifen ihr Leben verloren. Wir halten ihn seit 20 Jahren, aber sie haben ihn nicht vergessen. Sie fordern seine Rückgabe, andernfalls würden sie einen Großangriff starten. Unsere Verbündeten in Moskau haben gedroht, ihren Nichtangriffspakt mit den Polen aufzukündigen und ihre Armee zu mobilisieren. Das löst jedoch nicht das Problem der Tausenden polnischen Soldaten an unserer Grenze."
czech.031.a:0 "Übergeben Sie es friedlich"
czech.031.b:0 "Wir werden auch gegen sie kämpfen"
czech.032.t:0 "Zaolzie friedlich befreit"
czech.032.d:0 "Tausende polnische Soldaten marschierten heute in Zaolzie ein. Die Tschechoslowakei erlaubte friedlich die Übergabe der Provinz. Polnische Politiker argumentieren, ihr Volk verdiene die gleiche Freiheit, für die die Deutschen im Sudetenland kämpften."
czech.032.a:0 "Sehr gut"
czech.033.t:0 "Polen erklärt den Krieg"
czech.033.d:0 "Die gewaltsame Befreiung von Zaolzie hat begonnen. \n\nTausende polnische Soldaten marschieren in die kleine Provinz, um die polnische Kontrolle zu sichern und zu verhindern, dass Zaolzie in die Hände Nazi-Deutschlands fällt."
czech.033.a:0 "Weiterer Krieg in Europa"
czech.034.t:0 "Polen sichert sich Zaolzie"
czech.034.d:0 "Zaolzie ist bequem gesichert und die tschechischen Streitkräfte zum Rückzug gezwungen. Polen hat den Sieg erklärt und die Feindseligkeiten eingestellt. Nach einem Waffenstillstand mit Prag ist es an seine Grenzen zurückgekehrt. \n\nZaolzie wurde annektiert."
czech.034.a:0 "Katastrophe"
czech.035.t:0 "Polnisch-Ungarische Bruderschaft"
czech.035.d:0 "Wir haben jahrelang unsere Diplomatie zwischen den Supermächten, zwischen denen wir liegen, ausbalanciert.\n\nDie Chance, die sich uns jetzt bietet, ist jedoch wichtig. Sie wird unsere Isolation begrenzen.\n\nWir können uns unseren ungarischen Brüdern anschließen und die Überreste der Tschechoslowakei aufteilen, bevor die Deutschen sie vollständig annektieren."
czech.035.a:0 "Laden Sie sie ein"
czech.035.b:0 "Das brauchen wir nicht"
czech.036.t:0 "Polnisch-Ungarische Bruderschaft"
czech.036.d:0 "Wir waren jahrelang isoliert. Ein Bündnis, das den Status Quo bewahren will, hat uns umzingelt.\n\nDoch die Chance, die sich uns jetzt bietet, ist wichtig. Sie wird unsere Isolation begrenzen und ist der erste Schritt zum Wiederaufbau unseres Imperiums.\n\nWir können uns unseren polnischen Brüdern anschließen und die Slowakei zurückerobern, bevor die Deutschen sie vollständig annektieren oder, schlimmer noch, ihre Unabhängigkeit garantieren."
czech.036.a:0 "Schließen Sie sich ihnen an"
czech.036.b:0 "Wir werden alleine weitermachen"
czech.037.t:0 "Polnisch-ungarische Konferenz"
czech.037.d:0 "Angesichts der schwierigen Lage der Tschechoslowakei mit ihrer Geschichte von Grenzkonflikten und unerfüllten Ansprüchen stellten sich Polen und Ungarn schnell auf die Seite Deutschlands.\n\nInsgeheim versuchten Polen und Ungarn, ihre gemeinsame Grenze wiederherzustellen. Sie waren sich einig, dass eine Ausweitung ihrer Grenzen zu Deutschland gefährlich wäre.\n\nUngarn erhob Anspruch auf die Slowakei, die Polen für unteilbar hielt. Polen beanspruchte kleinere Grenzdörfer und die Karpatenukraine."
czech.037.a:0 "Katastrophe"
czech.038.t:0 "Die Teilung der Tschechoslowakei"
czech.038.d:0 "Nach dem Ersten Weltkrieg wurde die Tschechoslowakei gegründet, doch sie schenkte dem Land, das zu Polen gehörte und in dem das polnische Volk lebte, wenig Beachtung.\n\nWir haben jetzt eine Chance.\n\nPolen und Ungarn haben die perfekte Gelegenheit, unsere Grenzen neu zu ziehen und unsere Ländereien zurückzuerobern."
czech.038.a:0 "Nimm es von ihnen."
czech.038.b:0 "Kein Krieg mehr."
czech.039.t:0 "Polnisch-ungarische Forderungen"
czech.039.d:0 "In unserem Moment der Schwäche haben sich Polen und Ungarn verschworen, um sich zu nehmen, was ihnen nicht gehört.\n\nUngarn erhebt Anspruch auf die Slowakei, und zwar auf die gesamte Slowakei.\n\nPolen möchte einige Städte an unserer Nordgrenze einnehmen und Karpatenruthenien annektieren.\n\nSie behaupten, dies sei ein präventives Ziel, um ihre Grenze zu Deutschland zu begrenzen.\n\nDas ist jedoch einfach nur feige und grün."
czech.039.a:0 "Verweigere sie"
czech.039.b:0 "Einhalten"
czech.042.t:0 "Polnisch-tschechoslowakische Intervention"
czech.042.d:0 "Eine Gelegenheit bietet sich. Der Konflikt zwischen Polen und der Tschechoslowakei über ihre Grenzen lässt politischen Spielraum.\n\nFrankreich befindet sich in einer sehr prekären Lage, da es militärische Verpflichtungen gegenüber beiden Seiten hat, aber den Forderungen, die Tschechoslowakei gegen Deutschland oder Polen zu verteidigen, nicht nachgekommen ist.\n\nWir haben ein Militärbündnis mit Frankreich und der Tschechoslowakei, das jedoch zunächst von einem französischen Eingreifen abhängig ist.\n\nDies bietet uns die Möglichkeit, unseren Nichtangriffspakt mit Polen aufzukündigen, was möglicherweise zu einem Krieg führen könnte."
czech.042.a:0 "Zerreißt den Pakt."
czech.042.b:0 "Krieg ist nicht die Antwort."
czech.043.t:0 "Nichtangriff gefährdet"
czech.043.d:0 "Unser Konflikt mit der Tschechoslowakei hat eine heftige Reaktion Moskaus ausgelöst. Unser sorgfältig ausgehandelter Nichtangriffspakt wurde aufgrund unserer Aggression gegen ihren Verbündeten zerrissen.\n\nObwohl die Sowjetunion ohne die Beteiligung Frankreichs nicht verpflichtet ist, die Tschechoslowakei zu verteidigen, bilden beide Seiten weiterhin ein Militärbündnis.\n\nSie sind empört über unser Vorgehen.\n\nDas könnte sich als gefährlich erweisen."
czech.043.a:0 "Trotzen Sie ihnen."
czech.043.b:0 "Schließen Sie Frieden."
czech.044.t:0 "Steigende Spannungen in Polen"
czech.044.d:0 "Die Sowjetunion hat ihren Nichtangriffspakt mit Polen nach dem Konflikt mit dem sowjetischen Verbündeten Tschechoslowakei für null und nichtig erklärt.\n\nPolnische Regierungsvertreter vertraten eine harte Linie, die einen gerechtfertigten Konflikt, die Schaffung einer sichereren Südgrenze und die Rückgabe der Slowakei an den historischen Besitz vorsah.\n\nPolens historischer Gleichgewichtskurs wurde ernsthaft erschüttert, und die Sowjetunion hat sämtlichen Urlaub abgesagt und zieht Truppen in der Ukraine zusammen."
czech.044.a:0 "Wie dumm"
czech.045.t:0 "Steigende Spannungen in Polen"
czech.045.d:0 "Die Sowjetunion hat ihren Nichtangriffspakt mit Polen nach dem Konflikt mit dem sowjetischen Verbündeten Tschechoslowakei für null und nichtig erklärt.\n\nPolnische Regierungsvertreter haben versucht, den Konflikt mit der Tschechoslowakei zu beenden.\n\nPolens historischer Gleichgewichtszustand wurde ernsthaft erschüttert, und die Sowjetunion hat sämtlichen Urlaub abgesagt und zieht Truppen in der Ukraine zusammen."
czech.045.a:0 "Sehr gut"
czech.046.t:0 "Polnisch-sowjetischer Konflikt"
czech.046.d:0 "Da der Krieg zwischen Polen und der Tschechoslowakei weitergeht, sieht die Sowjetunion keine andere Wahl, als in den Konflikt einzugreifen.\n\nDies ist unsere Chance, unsere Grenzen ohne internationale Gegenreaktionen zu erweitern. In diesem Moment werden in der Ukraine Soldaten für den Krieg mobilisiert.\n\nDie sowjetische Armee wird bald bereit sein."
czech.046.a:0 "Treffen Sie die Vorbereitungen"
czech.046.b:0 "Wir sind nicht bereit"
czech.047.t:0 "Polnisch-sowjetischer Konflikt"
czech.047.d:0 "Die polnisch-sowjetischen Beziehungen sind seit dem Konflikt mit der Tschechoslowakei angespannt.\n\nJetzt haben wir die Chance, unsere Grenze nach Polen vorzuschieben.\n\nIn Polen droht ein Krieg, da unsere sowjetische Kriegsmaschinerie mobilisiert wird.\n\nEine mögliche französische Intervention ist aufgrund ihrer Verpflichtungen gegenüber beiden Teilstaaten problematisch. Die französische Führung ist durch ihre Unfähigkeit, sich hinter einem Teilstaat zu vereinen, gelähmt."
czech.047.a:0 "Treffen Sie die Vorbereitungen"
czech.047.b:0 "Wir sind nicht bereit"

czech.050.t:0 "Die Tschechoslowakei wird ein faschistischer Staat"
czech.050.d:0 "Alles ist möglich. Der Faschismus hat die Tschechoslowakei erobert. Aus der demokratischen Erfolgsgeschichte von Versailles ist ein weiterer faschistischer Staat im Osten Europas geworden. \n\nDies ist ein schlechtes Omen für die UdSSR und die Alliierten, bietet aber möglicherweise eine Lösung für die schlechten Beziehungen zwischen Deutschland und der Tschechoslowakei."
czech.050.a:0 "Wo werden wir landen?"
czech.051.t:0 "Veränderte Realitäten"
czech.051.d:0 "Angesichts des Verlusts der Demokratie in der Tschechoslowakei können wir nicht länger eine Mauer bauen und auf Hilfe warten. \n\nWir müssen unser Schicksal selbst in die Hand nehmen und hoffen, dass es der Bedrohung durch unsere Nachbarn standhält."
czech.051.a:0 "Wo werden wir landen?"
czech.052.t:0 "Ein aufstrebendes Imperium"
czech.052.d:0 "Die Tschechoslowakei bestand einst nur aus den nördlichen Provinzen des österreichisch-ungarischen Reiches. Ein kleines Land mit 15 Millionen Einwohnern, das seine Unabhängigkeit im Vertrag von Versailles sicherte.\n\nDie Rückkehr des Faschismus in der Region weckte jedoch große Ambitionen in diesem Land.\n\nSie haben Ungarn erobert. Wie geht es weiter?"
czech.052.a:0 "Wo werden wir landen?"
czech.053.t:0 "Wiedergeborenes Imperium"
czech.053.d:0 "Nachdem das Österreichisch-Ungarische Reich im Ersten Weltkrieg besiegt und seine einzelnen Nationen auseinandergerissen worden waren, ging man davon aus, dass dieses Reich längst untergegangen sei.\n\nDoch aus der schwelenden Asche eines demokratischen Versuchs ist ein neues böhmisches Reich entstanden, das seinen Platz einnimmt.\n\nSie haben das Land ihrer Vorfahren erfolgreich zurückerobert, wo werden sie haltmachen?"
czech.053.a:0 "Wo werden wir landen?"

czech.076.t:0 "Frieden in Europa"
czech.076.d:0 "Das Ziel der Beschwichtigungspolitik war es, einen Krieg in Europa zu verhindern. Diese Politik ist gescheitert.\n\n Wir haben der Tschechoslowakei unsere Unterstützung zugesichert und sie nun im Kampf gegen die Nazis allein gelassen.\n\nWenn wir jetzt unsere Unterstützung anbieten, können wir diesen Konflikt möglicherweise beenden. Schluss mit leeren Versprechungen und Rhetorik.\n\nSonst müssen wir mit unseren Taten leben."
czech.076.a:0 "Lassen Sie uns das klären"
czech.076.b:0 "Wir sollten das Leben unserer Leute nicht riskieren"

cze_peace_if_they_accept:0 "Sollten sie akzeptieren...\n"
czech.080.t:0 "Friedensgipfel"
czech.080.d:0 "Wir wurden nach Bern einberufen, um an einem Friedensgipfel teilzunehmen.\n\nDer Commonwealth hat sich zusammengeschlossen und ist bereit, uns zu unterstützen, falls die Deutschen sich weigern zu kommen.\n\nChamberlain ist jedoch weiterhin davon überzeugt, dass der deutsche Anspruch auf das Sudetenland gültig ist. Er erwartet einen Kompromiss."
czech.080.a:0 "Lasst uns beginnen"
czech.081.t:0 "Friedensgipfel"
czech.081.d:0 "Der britische Premierminister hat einen Friedensgipfel zwischen der Tschechoslowakei und Deutschland erzwungen.\n\nIndem er drohte, in den andauernden Konflikt einzugreifen, hat er beide Parteien an einen Tisch gebracht.\n\nBeide Staatschefs wurden nach Bern zitiert, um als letzte Hoffnung auf Frieden eine friedliche Lösung zu besprechen.\n\nSollte der Führer keine vernünftigen Bedingungen vorlegen, erhält die Tschechoslowakei die volle Unterstützung der Alliierten.\n\nWenn die Tschechoslowakei die Bedingungen nicht akzeptiert, wird sie den Deutschen überlassen."
czech.081.a:0 "Sehr gut"
czech.082.t:0 "Alles westlich von Bratislava abtreten"
czech.082.d:0 "Die Lage für die Tschechoslowakei ist ernst.\n\nDie Alliierten würden es nicht akzeptieren, wenn wir ihre vollständige Annexion fordern, aber wir können mehr verlangen, als sie jemals aufgeben würden.\n\nWerden sie es akzeptieren?"
czech.082.a:0 "Sehr gut"
czech.082.b:0 "Undenkbar"
czech.083.t:0 "Alles westlich von Bratislava abtreten"
czech.083.d:0 "Die Lage ist für uns katastrophal.\n\nDie Alliierten würden die Forderung nach unserer vollständigen Annexion nicht akzeptieren, aber sie können mehr verlangen, als wir jemals aufgeben würden. Böhmen würde unter ein entmilitarisiertes Protektorat gestellt.\n\nWerden wir akzeptieren?"
czech.083.a:0 "Sehr gut"
czech.083.b:0 "Undenkbar"
czech.083.c:0 "Wir werden alleine kämpfen"
czech.084.t:0 "Abtretung des Sudetenlandes und Böhmens"
czech.084.d:0 "Die Lage für die Tschechoslowakei ist ernst.\n\nDie Alliierten würden es nicht akzeptieren, wenn wir ihre vollständige Annexion fordern, aber wir können mehr verlangen, als sie jemals aufgeben würden.\n\nWerden sie es akzeptieren?"
czech.084.a:0 "Sehr gut"
czech.084.b:0 "Undenkbar"
czech.085.t:0 "Abtretung des Sudetenlandes und Böhmens"
czech.085.d:0 "Die Lage ist für uns katastrophal.\n\nDie Alliierten würden die Forderung nach unserer vollständigen Annexion nicht akzeptieren, aber sie können mehr verlangen, als wir jemals aufgeben würden. Böhmen würde unter ein entmilitarisiertes Protektorat gestellt.\n\nWerden wir akzeptieren?"
czech.085.a:0 "Sehr gut"
czech.085.b:0 "Undenkbar"
czech.085.c:0 "Wir werden alleine kämpfen"
czech.086.t:0 "Das Sudetenland abtreten"
czech.086.d:0 "Sie haben tapfer gekämpft und unser Sieg ist alles andere als sicher.\n\nEin schneller Frieden wird es uns ermöglichen, uns zu erholen, unsere Armee auf andere Nationen zu konzentrieren und wir werden in der Lage sein, zu Hause den Sieg zu erringen.\n\nWerden sie es akzeptieren?"
czech.086.a:0 "Sehr gut"
czech.086.b:0 "Undenkbar"
czech.087.t:0 "Das Sudetenland abtreten"
czech.087.d:0 "Wir haben die Stellung gehalten, kommen aber nicht voran.\n\nFrieden mit dem Reich gibt uns die Chance zum Wiederaufbau und zur Sicherung unserer Lage. Unsere Nachbarn haben unsere Unsicherheit ausgenutzt, und oppositionelle Parteien haben versucht, uns politisch zu manipulieren. Werden wir das akzeptieren?"
czech.087.a:0 "Sehr gut"
czech.087.b:0 "Undenkbar"
czech.087.c:0 "Wir werden alleine kämpfen"
czech.088.t:0 "Abtretung des Sudetenlandes mit Zugeständnissen"
czech.088.d:0 "Das Sudetenland ist unser Land. Unser Volk. Angeführt von unserem Führer.\n\nWir sind bereit, Frieden zu schließen. Wir sind nicht bereit, Frieden ohne das Sudetenland zu schließen.\n\nWir werden anerkennen, dass Zaolzie ein tschechischer Staat ist und an ihn zurückgegeben werden sollte."
czech.088.a:0 "Sehr gut"
czech.088.b:0 "Undenkbar"
czech.089.t:0 "Abtretung des Sudetenlandes mit Zugeständnissen"
czech.089.d:0 "Die Deutschen werden in der Frage des Sudetenlandes nicht nachgeben. Ihr einziger Casus Belli dreht sich um die Einnahme des Sudetenlandes. Der Führer wird sich nicht durch Kompromisse schwächen lassen.\n\nDer Führer wird unser Recht auf Zaolzie anerkennen.\n\nWünschen wir uns den Frieden so sehr, dass wir dieses Opfer bringen?"
czech.089.a:0 "Sehr gut"
czech.089.b:0 "Undenkbar"
czech.089.c:0 "Wir werden alleine kämpfen"
czech.090.t:0 "Abtretung des Westsudetenlandes mit Zugeständnissen"
czech.090.d:0 "Der Krieg macht kaum Fortschritte, daher wäre ein rascher Abschluss die sicherste Lösung.\n\nObwohl die Zerschlagung der Tschechoslowakei unser oberstes Ziel ist, wird die Tschechoslowakei durch unsere Aktionen erheblich geschwächt. Da wir weder über Grenzfestungen noch einen nennenswerten Teil ihrer Bevölkerung verfügen, werden wir im nächsten Krieg deutlich im Vorteil sein.\n\nWerden sie akzeptieren?"
czech.090.a:0 "Sehr gut"
czech.090.b:0 "Undenkbar"
czech.091.t:0 "Abtretung des Westsudetenlandes mit Zugeständnissen"
czech.091.d:0 "Die Deutschen werden niemals einen Frieden akzeptieren, bei dem sie die Verlierer sind, ohne selbst vernichtend besiegt zu werden.\n\nDies ist der beste Deal, den wir bekommen können: der Verlust des Sudetenlandes und eine Garantie unseres Anspruchs auf Zaolzie.\n\nLondon erwartet von uns, dass wir diesen Deal annehmen. Wenn wir ihn nicht annehmen, können wir keine weitere Einmischung erwarten."
czech.091.a:0 "Sehr gut"
czech.091.b:0 "Undenkbar"
czech.091.c:0 "Wir werden alleine kämpfen"
czech.092.t:0 "Diplomat gerügt"
czech.092.d:0 "Unser Diplomat versuchte, ein neues Angebot mit Nazi-Deutschland auszuhandeln, wurde jedoch von der deutschen Delegation hinausgeworfen.\n\nSie sind nicht bereit, weitere Kompromisse einzugehen. Sie haben uns ihr letztes Angebot unterbreitet.\n\nWerden wir es annehmen?"
czech.092.a:0 "Sehr gut"
czech.092.b:0 "Was war das nochmal?"
czech.093.t:0 "Frieden erreicht"
czech.093.d:0 "Der Konflikt zwischen der Tschechoslowakei und Deutschland wurde erfolgreich beigelegt.\n\nNazi-Deutschland würde dies niemals zugeben, aber einen langwierigen Konflikt kann es sich nicht leisten.\n\nEine anhaltende Isolation ist für die Tschechoslowakei keine Option. Das Gesicht Europas verändert sich rasant, und die Tschechoslowakei kann es sich nicht leisten, zurückzubleiben."
czech.093.a:0 "Sehr gut"
czech.094.t:0 "Zaolzie-Deal"
czech.094.d:0 "Unsere Verhandlungen mit der Tschechoslowakei sahen vor, dass wir den tschechischen Anspruch auf Zaolzie anerkennen.\n\nDurch unsere Eroberung Polens sind wir in den Besitz von Zaolzie gelangt.\n\nWir werden unsere Verpflichtung einhalten."
czech.094.a:0 "Sehr gut"
czech.095.t:0 "Zaolzie ist zurück"
czech.095.d:0 "Im Rahmen unserer Verhandlungen mit Deutschland hat Deutschland unser Recht auf Zaolzie anerkannt.\n\nDer Konflikt mit Polen hat den Staat gesichert.\n\nEr wurde uns zurückgegeben."
czech.095.a:0 "Sehr gut"
czech.096.t:0 "Alliierte laden die Tschechoslowakei ein"
czech.096.d:0 "Deutschlands Unvermögen, ernsthaft zu verhandeln und jeden Versuch eines Friedensschlusses abzulehnen, hat die Alliierten dazu veranlasst, uns ihre Unterstützung anzubieten.\n\nDas Versagen Deutschlands, die Tschechoslowakei zu besiegen, hat gezeigt, dass die Ängste der Alliierten hinsichtlich ihrer militärischen Macht unbegründet sind, und hat sie ermutigt, uns zur Seite zu stehen.\n\nDie politische Realität hat die Fehlleitung der ethnischen Rechte der Deutschsprachigen als politisches Instrument offengelegt."
czech.096.a:0 "Sehr gut"
czech.096.b:0 "Wir brauchen sie nicht"

czech.097.t:0 "Deutsch-Tschechoslowakischer Konflikt beendet"
czech.097.d:0 "Von den Alliierten vermittelte Verhandlungen zwischen Deutschland und der Tschechoslowakei haben zu einem unsicheren Frieden in der Region geführt.\n\nDamit endet der monatelange Konflikt zwischen diesen Feinden."
czech.097.a:0 "Sehr gut"
czech.098.t:0 "Alliierte schließen sich der Tschechoslowakei an"
czech.098.d:0 "Das Scheitern der Verhandlungen und das Scheitern des Versuchs, die Tschechen zu besiegen, haben die Alliierten ermutigt, in den Konflikt einzugreifen, viele Monate nachdem sie dazu verpflichtet waren.\n\nDie Tschechoslowakei ist begierig darauf, jede Unterstützung anzunehmen, die sie bekommen kann."
czech.098.a:0 "Sehr gut"
czech.099.t:0 "Deutsch-tschechoslowakische Verhandlungen scheitern"
czech.099.d:0 "Die Verhandlungen zwischen Deutschland und der Tschechoslowakei sind gescheitert und haben keine Fortschritte erzielt.\n\nJede Chance auf ein gegenseitiges Verständnis ist vertan und der Krieg in Europa tobt weiter."
czech.099.a:0 "Sehr gut"

czech.100.t:0 "Luftinnovation"
czech.100.d:0 "Die Konstrukteure von Avia haben eine verbesserte Bewaffnung für unsere B-534 entwickelt. Sie haben eine Kanone in der Nase angebracht, um die Tödlichkeit durch den Import von Oerlikon-Maschinenkanonen zu erhöhen. Dies wird hoffentlich die Lücke in unseren Luftfähigkeiten schließen."
czech.100.a:0 "Mach es möglich."
czech.100.b:0 "Wir haben dringendere Angelegenheiten."
czech.101.t:0 "Tschechisch-Polnische Politische Union"
czech.101.d:0 "Ein politisches Konzept zur Stärkung Mittel- und Osteuropas gegenüber dem wachsenden sowjetischen Einfluss. Es wurde von der polnischen Exilregierung in England ins Spiel gebracht und war in Wirklichkeit eine weniger ambitionierte Neubelebung des Międzymorze-Plans. \n\nEine Union der beiden Länder sollte in der Nachkriegszeit zu einem stärkeren Staat führen."
czech.101.a:0 "Wenn Polen doch nur noch ihnen gehören würde."
czech.102.t:0 "Jugoslawien einladen"
czech.102.d:0 "Die Kleine Entente ist praktisch schon vor vielen Jahren gestorben und wurde mit dem Münchner Diktat endgültig als beendet anerkannt. Obwohl Jugoslawien aus Eigeninteresse handelte und versuchte, seine eigene Zukunft zu sichern, war es lange Zeit ein Partner der Tschechoslowakei."
czech.102.a:0 "Ja"
czech.102.b:0 "NEIN"
czech.103.t:0 "Rumänien einladen"
czech.103.d:0 "Die Kleine Entente ist praktisch schon vor vielen Jahren gestorben und wurde mit dem Münchner Diktat endgültig als beendet anerkannt. Rumänien handelte zwar aus Eigeninteresse und versuchte, seine eigene Zukunft zu sichern, war aber schon lange ein Partner der Tschechoslowakei."
czech.103.a:0 "Ja"
czech.103.b:0 "NEIN"
czech.104.t:0 "Akzeptiert"
czech.104.d:0 "Unser Allianzangebot wurde dankbar angenommen und wir setzen große Hoffnungen in die gemeinsame Zukunft."
czech.104.a:0 "Exzellent."
czech.104.b:0 ""
czech.105.t:0 "Ablehnung"
czech.105.d:0 "Unser Bündnisangebot wurde brüsk abgelehnt, das werden wir nicht so schnell vergessen."
czech.105.a:0 "Katastrophe."
czech.105.b:0 ""
czech.106.t:0 "Treten Sie der Komintern bei"
czech.106.d:0 "Die Tschechoslowakei hat jahrelang um die Sowjetunion geworben, mit ihr zusammengearbeitet und ihr unsere Zukunft anvertraut. Nur ein echtes Bündnis zwischen diesen beiden Nationen kann unsere gemeinsame Zukunft sichern."
czech.106.a:0 "Einladen"
czech.106.b:0 "Ablehnen"
czech.107.t:0 "Prototyp einer Fabrik für synthetisches Öl"
czech.107.d:0 "Unsere Bemühungen in Brux haben Früchte getragen. Unsere neue Ölraffinerie ist in Betrieb genommen.\n\n Durch die künstliche Steigerung unserer Ölproduktion ist es uns gelungen, unsere Unabhängigkeit Anlage für Anlage zu sichern.\n\n Diese Raffinerien haben eine große Zukunft für unser Land."
czech.107.a:0 "Exzellent."
czech.108.t:0 "Ein Bündnis vor langer Zeit"
czech.108.d:0 "Einst hatten wir mit Jugoslawien ein gemeinsames Bündnis geschlossen, einen Verteidigungspakt, um Aggressionen einzudämmen und Stabilität zu gewährleisten. Dabei wurde jedoch nie berücksichtigt, dass die Bedrohung Osteuropas nicht von einem einzelnen Nachbarn ausging, sondern von all seinen Nachbarn. \n\nDoch jetzt haben wir die Wahl. Wir können zu diesem Bündnis stehen, das uns im Stich gelassen hat, oder wir können zusehen, wie es zerfällt."
czech.108.a:0 "Ein Feind unseres Feindes kann unser Freund sein."
czech.108.b:0 "Lass sie fallen"
czech.109.t:0 "Eine Allianz vor langer Zeit ..."
czech.109.d:0 "Einst hatten wir mit Rumänien ein gemeinsames Bündnis geschlossen, einen Verteidigungspakt, um Aggressionen einzudämmen und Stabilität zu gewährleisten. Dabei wurde jedoch nie berücksichtigt, dass die Bedrohung Osteuropas nicht von einem einzelnen Nachbarn ausging, sondern von all seinen Nachbarn. \n\nDoch jetzt haben wir die Wahl. Wir können zu diesem Bündnis stehen, das uns im Stich gelassen hat, oder wir können zusehen, wie es zerfällt."
czech.109.a:0 "Ein Feind unseres Feindes kann unser Freund sein."
czech.109.b:0 "Lass sie fallen."
czech.110.t:0 "Španěláci"
czech.110.d:0 "Unsere Landsleute waren schon immer bereit, für eine Sache zu kämpfen und zu sterben, und der Kampf gegen den Faschismus findet nicht nur innerhalb oder in der Nähe unserer Grenzen statt, sondern unsere Männer wollen auch in Spanien kämpfen."
czech.110.a:0 "Sehr gut."
czech.111.t:0 "Alliierte Seeherrschaft"
czech.111.d:0 "Als Mitglied der Alliierten verfügen wir über umfangreiche Erfahrung und Fachwissen im Marinebereich, von dem wir aus erster Hand lernen können. Wir waren nie eine Seemacht, und unsere Seeleute sind mehr als bereit, von denen zu lernen, die die Meere seit Jahrhunderten beherrschen."
czech.111.a:0 "Exzellent"

czech.112.t:0 "Verteidigungsstrategie"
czech.112.d:0 "Unsere ausgedehnte Grenze zu Deutschland hat erhebliche Auswirkungen auf unsere Verteidigungsfähigkeit. Unsere Verteidigungsmauer ist teilweise fertiggestellt, doch die Tausende von Kilometern Grenze schwächen unsere Streitkräfte erheblich. Sie werden zweifellos dazu dienen, den Vormarsch unserer Feinde zu verlangsamen, damit wir unsere Streitkräfte mobilisieren können. Wir haben zwei denkbare Optionen. Erstens intensivieren wir unsere Baubemühungen. Wir errichten stärkere Befestigungen. Wir halten sie an unseren Grenzen auf und verstärken die dort stationierten Männer. Zweitens planen wir eine organisierte Evakuierung ins äußerste Landesinnere. Mit einer deutlich reduzierten Fläche können wir die Deutschen nahezu unbegrenzt zurückhalten."
czech.112.a:0 "Sie werden keinen einzigen Schritt in die Tschechoslowakei hinein tun!"
czech.112.b:0 "Wir müssen unsere Schlachten wählen!"
czech.112_defend_the_sudetenland:0 "Verteidige das Sudetenland"
czech.112_defend_the_tail:0 "Rückzug in die Slowakei"
czech.113.t:0 "Befestigungsfortschritt"
czech.113.d:0 "Der Großteil unserer leichten Befestigungen und viele unserer schweren Objekte stehen kurz vor der Fertigstellung. \n\nViele ihrer Waffen müssen noch produziert und installiert werden. Unsere unmittelbaren Grenzbefestigungen sollten in Kürze weitgehend fertiggestellt sein.\n\n Wir müssen noch viel bauen, aber mit der Zeit sollten wir sicher sein.\n\nIm Moment bieten sie unseren Armeen bereits einen Vorteil im Falle eines Kriegsausbruchs."
czech.113.a:0 "Exzellent."
CZE_sudetenland_defense_half:0 "In jeder Provinz entlang der Benes-Linie wurden zwei Festungen fertiggestellt."
czech.114.t:0 "Ausbau der Stahlindustrie"
czech.114.d:0 "Die Stahlindustrie ist das Zentrum unserer wachsenden Wirtschaft und der Wirtschaft Mitteleuropas. Wir verfügen über Braunkohlebergwerke, die diese Industrie antreiben.\n\nUnsere Stahlindustrie wird von Kartellaktivitäten dominiert, wobei Absprachen zwischen uns und unseren Nachbarn unsere jeweiligen Märkte bestimmen.\n\nDa jedoch ein Krieg droht, muss die Stahlindustrie ihre Produktion steigern, um die Nachfrage zu decken.\n\nDie Frage ist, wo wir investieren sollten."
czech.114.a:0 "Lassen Sie es so schnell wie möglich wachsen."
czech.114.b:0 "Beschränken Sie das Wachstum auf Böhmen."
czech.114.c:0 "Beschränken Sie das Wachstum auf die Slowakei."

czech.120.t:0 "Industrielle Verlagerung"
czech.120.d:0 "Angesichts unserer neuen Verteidigungsstrategie, einen umfassenden Verteidigungskrieg zu führen, wäre es ratsam, wichtige Industrien in Gebiete zu verlagern, die wir für sicherer halten. \n\nUnser gesamter Schlachtplan dreht sich darum, möglicherweise Gebiete abzutreten, um unseren Gegner zu überdauern, bis unsere Verbündeten reagieren können. \n\nDas bedeutet, wir müssen Zeit gewinnen, um Böhmen zu räumen und nach Osten vorzurücken."
czech.120.a:0 "Machen Sie es möglich, egal, wie umständlich es ist."
czech.120.b:0 "Wir können uns den Produktionsstopp nicht leisten."
czech.120_factory_relocation:0 "1 Militärfabrik wird für den Transport zur nächsten Stufe abgebaut.\n"
czech.121.t:0 "Erster Umzug"
czech.121.d:0 "Die Fortschritte waren schnell, nach nur 60 Tagen konnten wir unseren ersten Betrieb in neue Gebäude in der Ostslowakei verlegen.\n\nWir haben zwar 60 Tage Produktion verloren, aber das wird im Falle des Verlusts von Böhmen wieder wettgemacht.\n\nDie Aussichten für die slowakische Wirtschaft sind mit diesen neuen Möglichkeiten besser."
czech.121.a:0 "Exzellent."
czech.122.t:0 "Industrieller Fortschritt"
czech.122.d:0 "Unsere neuen Gebäude und ein optimierter Prozess haben die Ausfallzeiten in der Produktion effektiv halbiert, und die Transportteams arbeiten rund um die Uhr, um Fortschritte zu erzielen.\n\nIn den letzten 60 Tagen haben wir zweimal Fabriken umgezogen, und von hier aus können wir uns nur noch verbessern."
czech.122.a:0 "Exzellent."
czech.123.t:0 "Die rasante Industrialisierung der Slowakei"
czech.123.d:0 "Die Transportmannschaften sind mittlerweile äußerst erfahren darin, Maschinen in ihre Hauptkomponenten zu zerlegen und sie für den Transport vorzubereiten.\n\nDas bedeutet, dass wir unsere Transportgeschwindigkeit praktisch verdreifacht haben, und das bei nur sehr geringer Produktionsunterbrechung.\n\nWir haben fast die Grenzen dessen erreicht, was wir transportieren können."
czech.123.a:0 "Exzellent."
czech.124.t:0 "Erweiterung unseres Umzugsangebots"
czech.124.d:0 "Nicht nur Militärfabriken sind für die Aufrechterhaltung unserer Kriegsmaschinerie von entscheidender Bedeutung, sondern auch ausreichende zivile Fabriken.\n\nWir haben im Sudetenland eine außerordentlich wichtige Industrie, die wir verlagert haben. Die Sudetendeutschen ärgern sich über den Verlust dieser Chancen und betrachten unser Vorgehen als Strafmaßnahme. Dennoch ist es für unsere nationale Sicherheit wichtig, unsere Wirtschaft auf diese Weise wieder ins Gleichgewicht zu bringen."
czech.124.a:0 "Lasst sie randalieren."
czech.125.t:0 "Umzug unterbrochen"
czech.125.d:0 "Mit dem Ausbruch des Krieges ist jeder Versuch, wichtige Industriekomponenten zu verlagern, fehlgeschlagen.\n\nUnser Transportnetz muss militärische Vorräte transportieren und unsere Bevölkerung in Sicherheit bringen.\n\nLeider stehen weitere Verlagerungen nicht zur Debatte. Wenn wir doch nur früher damit anfangen würden."
czech.125.a:0 "Katastrophe."

czech.300.t:0 "Rheinische Auswirkungen"
czech.300.d:0 "Die sich ständig verändernde politische Realität in Osteuropa hat die Kleine Entente erneut erschüttert, und derzeit diskutiert man über die Auswirkungen. \n\nMit der Remilitarisierung des Rheinlandes wird jede französische Intervention gegen Deutschland abgeschwächt, was zu einem geringeren Einfluss in der Region führt. Die Delegierten kommen zu dem Schluss, dass es in Osteuropa nur noch zwei Großmächte gibt: die Sowjetunion und Deutschland."
czech.300.a:0 "Ein Zeichen der Dinge, die kommen werden."
czech.301.t:0 "Der rumänische Diplomat Nicolae Titulescu wurde ersetzt"
czech.301.d:0 "König Carol II. hat den pro-französischen Außenminister Nicolae Titulescu abgelöst. Er versuchte, in unserem Konflikt mit den Polen zu vermitteln und sah das große Ganze, teilte unsere Ängste vor Nazi-Deutschland und versuchte, die Beziehungen zur UdSSR zu verbessern. Seine Entlassung rückt die Rumänen Nazi-Deutschland noch näher und wirft die Frage der Souveränität Bessarabiens mit der UdSSR erneut auf. Eine wichtige Diskussion, die es zu klären gilt, falls die UdSSR der Tschechoslowakei hilft. \n\nNicolae wurde aus Jugoslawien verbannt und floh in die Schweiz."
czech.301.a:0 "Ein trauriger Tag für unsere Allianz."
czech.302.t:0 "Jugoslawien geht zur Neutralität über"
czech.302.d:0 "Milan Stojadinović, Ministerpräsident Jugoslawiens, unterzeichnete einen historischen Nichtangriffspakt zwischen seinem Land und Italien und damit auch den Achsenmächten. Damit wollte er die Zukunft seines Landes als neutrale Macht sichern und war nicht länger besorgt über die relative Bedrohung durch den ungarischen Revisionismus. \n\nDurch sein Handeln hat er die Tschechoslowakei praktisch isoliert und von ihren Feinden umgeben zurückgelassen."
czech.302.a:0 "Getrennt fallen wir."
czech.303.t:0 "Zunehmende Isolation"
czech.303.d:0 "Die Kleine Entente blieb stark und vereint, solange sie einen gemeinsamen Feind, Ungarn, in Schach hielt. Heute ist Ungarn jedoch nur noch ein unbedeutender Akteur in der Region. Rumänien wird von der Sowjetunion bedroht, Jugoslawien von Italien und wir von Deutschland. \n\nMan kann sich nur fragen, wie lange unser Bündnis noch Bestand haben wird."
czech.303.a:0 "Katastrophe."

czech.306.t:0 "Bildung einer neuen staatlichen Verteidigungsgarde"
czech.306.d:0 "Seit 1918 werden unsere Grenzen von einer Behörde bewacht, deren Aufgabe es ist, unsere Zollgebühren und Handelsstandards durchzusetzen. Die zunehmenden Spannungen in der Region führten jedoch zu einer Ausweitung ihres Mandats und der formellen Schaffung einer zivilen Truppe zur Verteidigung unserer Grenzen und zur Durchsetzung des Rechts. \n\nIhre Zahl soll durch die Polizei auf Landes- und lokaler Ebene verstärkt werden, und zu einem späteren Zeitpunkt ist eine Erweiterung durch unser Militär möglich."
czech.306.a:0 "Sehr gut."
czech.307.t:0 "Ethnizität und Wehrpflicht"
czech.307.d:0 "Als Nation haben wir schon immer jede Generation rekrutiert, ausgebildet und ihnen das Kämpfen beigebracht. Dies ist ein zentraler Aspekt unserer nationalen Sicherheit und unserer individuellen Identität.\n\nDieser Anteil der in der Kriegskunst ausgebildeten Bevölkerung sichert die Zukunft unseres Landes gegenüber seinen Nachbarn.\n\nWenn jedoch viele unserer Leute aufgrund ihrer Herkunft und ethnischen Zugehörigkeit gespalten sind, können Probleme entstehen.\n\nEiner unserer ranghöchsten Generäle hat vorgeschlagen, deutsche Wehrpflichtige an der ungarischen Front und slowakische an der deutschen Front einzusetzen. Es darf keine gemischten Loyalitäten geben."
czech.307.a:0 "Mach es möglich."
czech.307.b:0 "Dies ist kein Problem."
czech.308.t:0 "Französisch-sowjetischer Vertrag über gegenseitige Unterstützung"
czech.308.d:0 "Heute haben Frankreich und die Sowjetunion ihr Bündnis ratifiziert. Der Pakt war ein Traum des 1934 ermordeten Louis Barthou und wurde bis zu seiner Vollendung erheblich überarbeitet. Der Pakt sollte die beiden Mitglieder vor äußeren Angriffen schützen und ihnen gegenseitige Unterstützung zusichern. Später wurde er jedoch durch Bestimmungen weitgehend untergraben, die den Völkerbund um die Bestätigung einer erfolgten Aggression baten. Der Vertrag sah vor, dass die Sowjetunion der Tschechoslowakei zu Hilfe kommen würde, wenn Frankreich ihr zuerst zu Hilfe käme."
czech.308.a:0 "Sehr gut."
czech.310.t:0 "Heinz Rutha verhaftet"
czech.310.d:0 "Veröffentlichte Vorwürfe homosexueller Aktivitäten Heinz Ruthas führten zu seiner Verhaftung. Die Polizei verhörte die jungen Männer in seiner Fabrik. Herr Rutha ist langjähriges Mitglied der SdP und Freund von Konrad Heinlein, dem Parteivorsitzenden der SdP. Er setzt sich seit langem für die Abspaltung des Sudetenlandes als unabhängiger Staat ein. Der prodeutsche Teil der Partei reagierte rasch und stärkte seine Position. Aufgrund des internen Drucks seiner Partei wurde Heinlein zu einem überzeugten Anhänger Adolf Hitlers. Er übernahm den Slogan „Ein Volk, ein Reich, ein Führer!“"
czech.310.a:0 "Eine enttäuschende Wendung der Ereignisse."


czech.321.t:0 "Grenzreibung"
czech.321.d:0 "Die polnisch-tschechoslowakischen Beziehungen werden seit 1920 erforscht. Nach dem Ersten Weltkrieg wurde die Besitzfrage von Zaolzie von den Alliierten entschieden, wobei sowohl Polen als auch die Tschechoslowakei Anspruch auf die Stadt und ihre reichen Kohlevorkommen und Verkehrsverbindungen erhoben. Beneš überzeugte die Polen, ein Abkommen zu unterzeichnen, um sich dem Urteil der Alliierten zu unterwerfen, obwohl er sich selbst bereits die Gunst der Alliierten gesichert hatte. Warschau fühlte sich betrogen, und die Beziehungen verschlechterten sich. Milan Hodža weckte den Traum von der europäischen Integration, doch Meinungsverschiedenheiten wie diese müssen beigelegt werden."
czech.321.a:0 "Zaolzie zurückgeben."
czech.321.b:0 "Es gehört uns."
czech.322.t:0 "Diplomatische Annäherungsversuche an Ungarn"
czech.322.d:0 "Um die Spannungen in der Region abzubauen und die Südgrenze der Tschechoslowakei zu sichern, wandte sich die tschechische Regierung an Ungarn. Sie bot Ungarn im Austausch für einen Nichtangriffspakt eine Lockerung der regionalen Haltung gegenüber der ungarischen Wiederbewaffnung an. Zu diesem Zeitpunkt war es jedoch bereits ein offenes Geheimnis, dass Ungarn wieder aufrüstete. Die Kleine Entente hatte es versäumt, die Wiederbewaffnung Ungarns zu bekämpfen, da sie zu sehr mit ihren eigenen Drohungen beschäftigt war. Miklós Horthy erkannte, dass die Tschechen nur wenig anboten, was sie nicht bereits selbst in Anspruch nahmen."
czech.322.a:0 "Eine verpasste Gelegenheit."


czech.400.t:0 "Hitler spricht vor dem Reichstag"
czech.400.d:0 "Hitler hielt eine große Rede vor der deutschen Regierung, dem Reichstag. \n\nEr sprach über Geschichte, Wirtschaft, die Schaffung von Arbeitsplätzen und die Rezession. \n\nBeunruhigend ist jedoch, dass er von 10 Millionen deutschen Männern und Frauen in den angrenzenden Ländern spricht. Länder, von denen er behauptet, sie würden sie unterdrücken und ihrer Rechte berauben, ihres Rechts auf Selbstbestimmung, wie es ihnen der Waffenstillstand zugesichert hatte. Länder, von denen er behauptet, sie würden zunehmend dem Bolschewismus zugeneigt sein. Es ist offensichtlich, auf welche Nation er sich bezieht."
czech.400.a:0 "Betreffend."
czech.401.t:0 "Geheimes SdP-Treffen mit dem Führer"
czech.401.d:0 "Der pro-nationalsozialistische Führer der Sudetendeutschen Partei, Konrad Henlein, reiste heimlich nach Deutschland, um sich mit Adolf Hitler zu treffen. \n\nWorüber sie gesprochen haben, ist immer noch ein Rätsel, aber es kann nur das Schicksal des Sudetenlandes und der darin lebenden Völker betreffen."
czech.401.a:0 "Ein Zeichen der Dinge, die kommen werden."
czech.402.t:0 "Forderungen des Sudetenlandes"
czech.402.d:0 "Heute fordert die Sudetendeutsche Partei eine Reihe von Reformen, darunter vor allem die Autonomie der deutschen Minderheiten. \n\nDas als Karlsbader Programm bekannte Programm war ein umfassender Forderungskatalog an die tschechoslowakische Regierung.\n\nDie Forderungen beinhalteten eine erhebliche Übertragung von Machtbefugnissen an die einzelnen Regionen."
czech.402.a:0 "Autonomie ist zu viel."
czech.403.t:0 "Deutschstämmige Rhetorik"
czech.403.d:0 "Hitler sprach heute vor großem Publikum in Berlin über den Fortschritt in Europa, den Frieden, den das deutsche Volk in Europa gefunden hat, und seine Rolle. Er sprach über die Wiedervereinigung des deutschen Volkes und seine Befreiung von der Unterdrückung durch Beneš. In seiner Rede fordert er weiterhin die Durchsetzung des Selbstbestimmungsrechts der 3,5 Milliarden Deutschen im Sudetenland. \n\nDie großen deutschsprachigen Minderheiten in unserem Land und der Vormarsch des Faschismus haben einen bedeutenden Teil unserer politischen Szene erfasst. Die Partei hat mittlerweile über 1,3 Millionen Mitglieder. \n\nIhre Partei dominiert fast die gesamte ethnisch-deutsche Wählerschaft in unserem Land."
czech.403.a:0 "Ein Zeichen der Dinge, die kommen werden."
czech.404.t:0 "Grenzbedrohungen"
czech.404.d:0 "Wir wurden über den Aufmarsch deutscher Truppen informiert und befürchten einen bevorstehenden Überraschungsangriff. Die Berichte sind jedoch unbestätigt. Die Bewegungen von Wehrmachtsdivisionen aus ihren Grenzgarnisonen deuten auf mögliche militärische Aktionen hin. \n\nHitlers Rhetorik über die Durchsetzung der Rechte der Volksdeutschen bestätigt dies nur. \n\nUnser Diplomat in Moskau, Zdeněk Fierlinger, informiert uns, dass die Rote Armee Maßnahmen ergriffen hat, um uns im Konfliktfall zu Hilfe zu kommen."
czech.404.a:0 "Treffen Sie Vorsichtsmaßnahmen."
czech.404.b:0 "Wir müssen vorsichtig sein."
czech.405.t:0 "Erhöhte Spannung"
czech.405.d:0 "Es gibt absolut keine Hinweise auf eine Aggression an unserer Grenze. Wir wurden auf der großen Bühne zum Narren gehalten.\n\nEntweder haben die Deutschen nichts unternommen, oder sie haben die Situation zweifelsfrei geklärt. \n\nDas lässt uns politisch angreifbar werden."
czech.405.a:0 "Schuld sind die Deutschen"
czech.405.b:0 "Die Sowjets haben uns in die Irre geführt"
czech.405.c:0 "Die Briten lassen uns im Stich"
czech.405.e:0 "Krieg ist unvermeidlich. Sorgen Sie dafür, dass er geschieht."
czech.406.t:0 "Krieg mit Deutschland"
czech.406.d:0 "Krieg ist unvermeidlich.\n\nWenn nicht heute, dann bald.\n\nUnsere einzige Möglichkeit ist, diesen Krieg zu erzwingen, bevor auf friedlichem Wege noch mehr Schaden angerichtet werden kann. Sie haben Separatismus zwischen unseren Minderheiten verursacht. Sie haben unser Bündnis gespalten, und diejenigen, die unsere Freunde sein könnten, haben sich mit kleinlichen Streitereien abgelenkt."
czech.406.a:0 "Es ist notwendig"
czech.407.t:0 "Krieg in Europa erklärt"
czech.407.d:0 "Die Tschechoslowakei hat Nazi-Deutschland den Krieg erklärt und begründet dies mit Selbstverteidigung und deutscher Aggression im In- und Ausland. Dies ist ein schwarzer Tag für Europa. Es ist unklar, was uns bevorsteht, doch die anderen Mächte reagieren nicht positiv auf die Entwicklung. Obwohl England und Frankreich verpflichtet sind, die Tschechoslowakei zu verteidigen, glauben sie nicht, dass Deutschland der Aggressor ist."
czech.407.a:0 "Sehr gut"
czech.408.t:0 "34. Internationaler Eucharistischer Kongress"
czech.408.d:0 "Josef Tiso, ein führender Politiker der Slowakischen Volkspartei und katholischer Priester, nahm am jährlichen Eucharistischen Kongress in Budapest teil, wo er vom ungarischen Außenminister Kálmán Kánya aufgesucht wurde.\n\nDie Ungarn versuchten, den Erfolg der SdP nachzuahmen und die Tschechoslowakei weiter zu spalten. Sie vertraten die Ansicht, die Slowakei sei ein historischer Anspruch ihrer Nation, waren aber bereit, den Slowaken weitaus mehr Autonomie zu gewähren, als sie unter der Tschechoslowakei genossen.\n\nTiso war unbeeindruckt. Sein Ehrgeiz reichte weit darüber hinaus. Die slowakische Wirtschaft war ohne die Tschechen schwach, und er glaubte, in der Union vorerst mehr erreichen zu können."
czech.408.a:0 "Sehr gut"

czech.420.t:0 "Zweite Hauptstadt der Tschechoslowakei"
czech.420.d:0 "Unsere Bemühungen, eine sicherere Hauptstadt für Kriegszeiten zu schaffen, sind nicht ganz erfolgreich. Prag ist von starken Verteidigungsbergen umgeben, hat aber eine lange Grenze zu Deutschland.\n\nEine zweite Hauptstadt in der Slowakei wäre vielleicht sinnvoll. Politisch würde sie die slowakische Moral in unserer tschechisch dominierten Politik stärken, wäre aber besser gegen Deutschland zu verteidigen und läge weiter entfernt von der Luftwaffe.\n\nBratislava, die Hauptstadt der Slowakei, liegt nur 60 km von der Grenze entfernt und würde schnell an die Frontlinie geraten.\n\nVon unseren Nachbarn ist unsere Grenze zu Ungarn wahrscheinlich die stabilste, und Košice hat viele Paläste, die umgenutzt werden könnten."
czech.420.a:0 "Košice ist"
czech.421.t:0 "Ostwanderung"
czech.421.d:0 "Der öffentliche Dienst und viele unserer Banken eröffnen derzeit neue Niederlassungen in unserer neuen zweitgrößten Stadt.\n\nNicht lebensnotwendige Ressourcen werden bereits abgezogen und Banken bauen neue Tresorräume, in denen ihr materieller Reichtum aufbewahrt werden kann.\n\nViele Tschechen ziehen mit diesen Institutionen um und bringen zusätzlichen Wohlstand in die Region."
czech.421.a:0 "Sehr gut"
czech.422.t:0 "Slowakischer Einfluss wächst"
czech.422.d:0 "Dank der Bewegung von Ressourcen, Institutionen und massiven Investitionen in der Slowakei lässt die Depression nach. Viele Slowaken betrachteten die tschechisch dominierte Politik als eine Art Vorreiter tschechischer Interessen auf Kosten ihrer eigenen. Seitdem hat sich viel verändert. In der Slowakei ist ein neues Zeitalter des Wohlstands angebrochen. Viele glauben noch immer, dass Krieg nicht unvermeidlich ist, und haben noch nicht erkannt, was die Zukunft bringt."
czech.422.a:0 "Die Einheit wächst"
czech.423.t:0 "Umzug der Regierung nach Košice"
czech.423.d:0 "Es ist klar: Deutschland hat sich entschieden, das Sudetenland mit Gewalt einzunehmen, und wird es dabei möglicherweise nicht belassen.\n\nUnsere Planungen haben Košice als zweiten Standort vorgesehen, und wir haben viele unserer wichtigeren Organisationen nach Osten verlegt.\n\nAuch wenn Prag fallen könnte, müssen wir die Slowakei halten und uns damit begnügen, unsere tschechischen Gebiete später zurückzuerobern.\n\nJetzt ist es wichtig, unsere Nation zusammenzuhalten."
czech.423.a:0 "Sehr gut"

czech.500.t:0 "Antisemitismus in Deutschland erreicht Höhepunkt"
czech.500.d:0 "Juden in Deutschland werden zunehmend mit Strafmaßnahmen belegt.\n\nDie jüdische Bevölkerung wird zunehmend von öffentlichen Dienstleistungen und privaten Unternehmen ausgeschlossen.\n\nDie deutsche Regierung hat eine Registrierung der Bevölkerung und die Ausstellung von Personalausweisen angeordnet."
czech.500.a:0 "Es braut sich etwas zusammen"
czech.501.t:0 "Lord Runciman kommt in Prag an"
czech.501.d:0 "Am 4. August entsandte die britische Regierung Lord Runciman und eine Delegation, um den Streit zwischen der Tschechoslowakei und Deutschland um das Sudetenland zu beenden. Ziel war es, die Spannungen in der Region abzubauen, zwischen den beiden Parteien zu vermitteln und die Lage zu beurteilen. \n\nEdvard Beneš traf sich zwar mit ihm, doch bisher versäumte er es, die SdP-Führung zu treffen. Stattdessen verbrachte er seine Zeit mit der lokalen SdP-freundlichen Aristokratie."
czech.501.a:0 "Sehr gut."
czech.502.t:0 "Das Bled-Abkommen"
czech.502.d:0 "Der Vertrag von Trianon erlegte Ungarn zahlreiche Beschränkungen auf. Er war einer von vielen Verträgen, die einen zukünftigen Krieg verhindern sollten, indem sie der Opposition die Möglichkeit nahmen, einen Krieg zu führen. \n\nDie Vereinbarung war einfach: Die Beschränkungen für Ungarn wurden aufgehoben und ein formeller Nichtangriffspakt geschlossen. Die Minderheitenfrage sollte von den einzelnen Ländern separat behandelt werden. Ungarn stellte höhere Forderungen an die Tschechoslowakei als die anderen Länder, und man kam erst mit dem Münchner Diktat und dem darauffolgenden Wiener Schiedsspruch zu einer Einigung.\n\nDer Führer ist wütend."
czech.502.a:0 "Vernünftig."
czech.503.t:0 "Verhandlungen ins Stocken geraten"
czech.503.d:0 "Am 24. August legte Lord Runciman einen Vorschlag vor, der Präsident Beneš‘ ursprüngliche Position zwar kompromittiert, aber möglicherweise Frieden verspricht. \n\nAllerdings wurde jeder Fortschritt durch eine Reihe von Morden an Polizisten und Zollbeamten an der Grenze gestoppt, die von der SdP inszeniert wurden. \n\nDie Täter flohen über die Grenze nach Deutschland, um der Justiz zu entgehen."
czech.503.a:0 "Natürlich werden sie es nicht akzeptieren."
czech.504.t:0 "Präsident Beneš kapituliert"
czech.504.d:0 "Am 9. September kehrten die SdP-Verhandler zur Prager Burg zurück und fanden dort einen Präsidenten ohne seine üblichen Höflichkeiten und Energie vor. \n\nEr holte ein Blatt Papier hervor und forderte sie auf, ihre Forderungen aufzuschreiben. Als sie dies nicht taten, bot er an, sie für sie zu schreiben. Die SdP-Verhandler hatten diesen Fall nicht eingeplant. Sie diktierten ihre Forderungen. Beneš akzeptierte sie alle. Er unterschrieb die Liste und verabschiedete sich von seinem Gast. Er hatte ihnen alles gegeben. \n\nSie akzeptierten nicht."
czech.504.a:0 "Es gab nie Hoffnung auf Verhandlungen."
czech.505.t:0 "Massenrücktritte der Regierung"
czech.505.d:0 "Die amtierende Regierung unter Milan Hodža ist zusammengebrochen.\n\nIn Deutschland versammelt Hitler sein Volk zum jährlichen Nürnberger Parteitag.\n\nInzwischen flog Neville Chamberlain nach Köln, um einen neuen Frieden zu erreichen. Er bot Hitler das gesamte Sudetenland an. Hitler antwortete, die einzige Lösung sei die Auflösung der Tschechoslowakei. Noch am selben Abend einigten sie sich auf eine sofortige Annexion, allerdings unter Einhaltung der neuen Grenzen.\n\nIn der Tschechoslowakei ernannte Edvard Beneš Jan Syrový zum neuen Premierminister und befahl ihm, das Amt zu übernehmen. Seine erste Amtshandlung war die vollständige Mobilisierung der Armee."
czech.505.a:0 "Es eskaliert nur."
czech.506.t:0 "Terrorismus in der Tschechoslowakei"
czech.506.d:0 "Auf Befehl Hitlers wurde das Sudetendeutsche Freikorps als direkte Reaktion auf die tschechoslowakischen Versuche, die Ordnung aufrechtzuerhalten, aufgestellt.\n\nEin Angriff auf Polizeibeamte wurde inszeniert – eine traurige Realität angesichts der Spannungen vor Ort. Dieses Mal wurde jedoch ein Abgeordneter der SdP von einem Offizier geschlagen. \n\nDie SdP brach jegliche Kommunikation mit der amtierenden Regierung ab und plante Terroranschläge in der gesamten Tschechoslowakei. \n\nLord Runciman und seine Delegation kehrten gescheitert nach Großbritannien zurück. Seine Mission in der Tschechoslowakei bot lediglich Einblick in die offensichtliche lokale Politik."
czech.506.a:0 "Es ist alles umsonst."

czech.600.t:0 "Politische Folgen"
czech.600.d:0 "Die Diplomatie ist gescheitert, Millionen Menschen gehören nicht mehr zu unserem Land, wichtige Ressourcen und Industrien sind abgeschnitten und alle Befestigungen isoliert. \n\nUnsere Regierung liegt in Trümmern, die Regierungspartei ist zurückgetreten und die Öffentlichkeit macht sie für die Ereignisse verantwortlich.\n\nJan Syrový hat eine Übergangsregierung eingesetzt, doch Deutschland sieht in Edvard Beneš nur einen Gegner. Sie haben ihn zum Rücktritt gezwungen, und nun ist die Zukunft ungewiss."
czech.600.a:0 "Wahlen planen."
czech.601.t:0 "Strategie und Umstände"
czech.601.d:0 "Der Verlust des Sudetenlandes hat zu einer massiven Überarbeitung unserer Verteidigungsstrategie geführt.\n\nUnser Land ist um 3,5 Millionen Menschen geschrumpft und unsere Versuche, eine Mauer nach dem Vorbild der Mauern im Westen zu bauen, sind gescheitert. Das Land, auf dem sie standen, ist zu unserem Gegner geworden.\n\nAufgrund der massiven Aufrüstungsprogramme des Deutschen Reiches haben wir in einer direkten Konfrontation kaum eine Chance, uns zu verteidigen."
czech.601.a:0 "Katastrophe"
czech.602.t:0 "Dezentralisierung in der Tschechoslowakei"
czech.602.d:0 "Vor dem Hintergrund zunehmender Spannungen, ethnischer Spaltungen und Unruhen in der Bevölkerung kämpfen die Tschechoslowakei und ihre zentralisierte Regierung mit ihrer tschechisch dominierten politischen Elite darum, Nationalismus und Unzufriedenheit zu verhindern.\n\nSlowakische Politiker träumen schon lange von einer Slowakei innerhalb der Tschechoslowakei, in der sie sich selbst regieren. Josef Tizo nutzte die deutschen Pläne rücksichtslos aus, um Zugeständnisse von Prag zu erzwingen, und Prag akzeptierte seine Vorschläge.\n\nMilan Hodža unternahm Anfang des Jahres die ersten Schritte, doch die Früchte dieser Arbeit werden nun mit der Gewährung größerer Autonomie Wirklichkeit."
czech.602.a:0 "Was auch immer es kostet."
czech.603.t:0 "Ausländische Unterstützung für die Slowakei"
czech.603.d:0 "Die Slowakei war einst für viele nur ein Traum: die Unabhängigkeit vom österreichischen Kaiserreich und die Zugehörigkeit zur Tschechoslowakei mit den Tschechen. \n\nDie politischen Ideale haben sich jedoch geändert, begünstigt durch deutsche Erklärungen und wachsende Unterstützung im Herzen der Slowakei.\n\nDer neue Traum einer unabhängigen Slowakei, getrennt von den Tschechen, ist in den nationalen Fokus gerückt."
czech.603.a:0 "Betreffend."
czech.604.t:0 "Flüchtlinge"
czech.604.d:0 "Viele unserer tschechischen Landsleute und ein kleiner Teil der sympathisierenden deutschen Bevölkerung sind aus dem Sudetenland über die Grenze geflohen, um dem faschistischen Staat zu entfliehen, in den sie gezwungen wurden. \n\nSie suchen Zuflucht innerhalb unserer Grenzen und neue Möglichkeiten. Doch der Winter naht."
czech.604.a:0 "Wir müssen ihnen Schutz bieten"
czech.606.t:0 "Präsidentschaftswahlen"
czech.606.d:0 "Edvard Beneš war seit der Unabhängigkeit unseres Landes ein führender Politiker, lebt nun jedoch im Exil in Putney, London.\n\nEmil Hácha ist der gewählte Nachfolger. Als Person außerhalb des Establishments ist er für alle Beteiligten sympathisch. Seine Werte sind unumstritten und seine Karriere als Anwalt wird respektiert. "
czech.606.a:0 "Ersetzen Sie ihn."
czech.606.b:0 "Seinen Rücktritt ablehnen"
czech.607.t:0 "Wahlen in der Slowakei"
czech.607.d:0 "Wir haben der Slowakei mehr Autonomie versprochen und unser Versprechen gehalten. \n\nDie Slowaken haben sich jedoch dazu entschieden, ihre Wahlen nicht als Abstimmung für die Selbstverwaltung zu gestalten, sondern als Referendum für die Unabhängigkeit, für den Austritt aus unserer Union."
czech.607.a:0 "Sehr gut."
czech.607.b:0 "Eingreifen."


czech.700.t:0 "Die Slowakei erklärt ihre Unabhängigkeit!"
czech.700.d:0 "Während wir uns mit der Konfrontation mit Deutschland auseinandersetzen, ist unsere Union gestürzt. Josef Tiso wurde zum slowakischen Präsidenten ernannt, doch seine gezielte Zerstörung und das Verbot alternativer politischer Parteien sowie seine Unabhängigkeitsgespräche mit Deutschland zwangen uns, ihn am 9. März mit militärischer Gewalt zu entfernen. Also reiste er nach Westen, um eine Lösung zu finden. Josef Tiso kehrte mit Hitlers Unterstützung aus Berlin zurück. Angesichts der drohenden Invasion im Falle einer Nichteinhaltung trat das slowakische Parlament zusammen und erklärte einstimmig die Unabhängigkeit."
czech.700.a:0 "Wir wurden ausmanövriert."
czech.701.t:0 "Karpatenruthenien erklärt seine Unabhängigkeit"
czech.701.d:0 "Inspiriert durch die slowakische Unabhängigkeitserklärung und den Verlust der geografischen Verbindung zur Karpatenukraine haben auch sie den Schritt der Abspaltung von unserem Land unternommen. \n\nLeider gab es für sie keine ausländische Unterstützung, und innerhalb von 24 Stunden wurden sie überfallen und annektiert und wurden Teil Ungarns. \n\nDies markiert eine sehr kurze Zeit als unabhängige Nation, die jedoch nicht anerkannt wurde."
czech.701.a:0 "Wir sind völlig gespalten"

czech.750.t:0 "Slowakei"
czech.750.d:0 "Unsere Intervention hat sich gelohnt. Wir haben die Tschechoslowakei zerstört und in ihre Einzelteile zerlegt, damit sie hoffentlich nie wieder zurückkehrt. Doch in unserer Zeit des Sieges müssen wir uns an unser Versprechen erinnern: eine unabhängige Slowakei."
czech.750.a:0 "Natürlich mit einer wohlwollenden Regierung."

czech.800.t:0 "Verrat!"
czech.800.d:0 "Das Bündnis, das unsere Unabhängigkeit garantiert, hat mit einem Schlag die größte Bedrohung für unsere Unabhängigkeit aller Nationen in unserer Geschichte geschaffen.\n\nDas sowjetische Hilfsangebot hängt direkt von der Unterstützung der Franzosen ab, ohne sie sind wir völlig allein.\n\nSelbst wenn die UdSSR uns zu Hilfe käme, würden Rumänien und Polen niemals zustimmen, ihre Truppen auf ihrem Boden zu stationieren."
czech.800.a:0 "Katastrophe"
czech.801.t:0 "Allianz neu gestaltet"
czech.801.d:0 "Die Verbündeten haben ihren Fehler erkannt und es mit einer einzigen Aktion für angebracht gehalten, das größte Unglück der Zeit zu verhindern."
czech.801.a:0 "Exzellent"
czech.804.t:0 "Territorialer Streit"
czech.804.d:0 "Wie können wir als Bündnis überleben, wenn wir über unsere eigenen Grenzstreitigkeiten streiten und gleichzeitig die Gefahren der Großmächte ignorieren, die die Region beherrschen?"
czech.804.a:0 "Geben Sie ihr Territorium zurück"
czech.805.t:0 "Gebiet zurückgegeben"
czech.805.d:0 "Wir haben Glück. Unser Bündnis verschafft uns nicht nur Sicherheit, sondern hat auch zur Rückgabe unserer verlorenen Gebiete geführt."
czech.805.a:0 "Hurra"
czech.806.t:0 "Territorialer Streit"
czech.806.d:0 "Wie können wir als Bündnis überleben, wenn wir über unsere eigenen Grenzstreitigkeiten streiten und gleichzeitig die Gefahren der Großmächte ignorieren, die die Region beherrschen?"
czech.806.a:0 "Geben Sie ihr Territorium zurück"
czech.807.t:0 "Gebiet zurückgegeben"
czech.807.d:0 "Wir haben Glück. Unser Bündnis verschafft uns nicht nur Sicherheit, sondern hat auch zur Rückgabe unserer verlorenen Gebiete geführt."
czech.807.a:0 "Hurra"
czech.808.t:0 "Der Revisionismus scheitert"
czech.808.d:0 "Angesichts des Krieges zwischen Deutschland und der Tschechoslowakei haben wir die Möglichkeit verloren, die Bedrohung durch Deutschland gegen die Tschechen auszuspielen.\n\nIn ihrer zunehmend verzweifelten Lage ist es fast unmöglich, eine so heikle Einigung auszuhandeln.\n\nDer Führer warnte uns, dass wir in seiner Küche kochen müssten, wenn wir ein Stück vom Kuchen abhaben wollten."
czech.808.a:0 "Sehr gut"

INT_czechoslovakia_hlucinsko.1.t:0 "Hlučínsko je Česko"
INT_czechoslovakia_hlucinsko.1.d:0 "Wir haben ein Grenzgefecht mit Deutschland um die Region Hlučínsko gewonnen."
INT_czechoslovakia_hlucinsko.1.a:0 "Za Naší Republiku!"
INT_czechoslovakia_hlucinsko.2.t:0 "In einem Grenzgefecht besiegt"
INT_czechoslovakia_hlucinsko.2.d:0 "Wir haben ein Grenzgefecht mit den Deutschen um die Region Hlučínsko verloren."
INT_czechoslovakia_hlucinsko.2.a:0 "Wir können nichts dagegen tun..."
INT_czechoslovakia_hlucinsko.3.t:0 "Hultschin ist Deutschland!"
INT_czechoslovakia_hlucinsko.3.d:0 "Wir haben ein Grenzgefecht mit der Tschechoslowakei um die Region Hultschin gewonnen."
INT_czechoslovakia_hlucinsko.3.a:0 "Sieg für die Junge Republik"
INT_czechoslovakia_hlucinsko.4.t:0 "Gefecht beendet"
INT_czechoslovakia_hlucinsko.4.d:0 "Ein Grenzscharmützel endete abrupt."
INT_czechoslovakia_hlucinsko.4.a:0 "..."

INT_czechoslovakia.1.t:0 "Die Tschechoslowakei fordert Hultschin"
INT_czechoslovakia.1.d:0 "Die tschechoslowakische Regierung fordert die Übergabe der Region Hultschin gemäß dem Versailler Vertrag."
INT_czechoslovakia.1.a:0 "Nun, die tschechische Armee ist beängstigend."
INT_czechoslovakia.1.b:0 "Dann ist es ein Krieg"
INT_czechoslovakia.1.b_tt:0 "§Die Tschechische Republik kann für die Region kämpfen!§!"
INT_czechoslovakia.2.t:0 "Deutschland ist eingeknickt!"
INT_czechoslovakia.2.d:0 "Die Deutschen haben uns gemäß dem Versailler Vertrag die Region Hlučínsko geschenkt."
INT_czechoslovakia.2.a:0 "Hurra!"

