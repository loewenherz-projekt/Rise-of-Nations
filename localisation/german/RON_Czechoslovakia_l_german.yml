POLITICS_EMIL_HACHA_DESC:0 "Einer der bedeutendsten Anwälte der Tschechoslowakei und von großer Bedeutung für das blühende tschechoslowakische Rechtssystem.\n\nEmil Hácha wurde in der dunkelsten Periode der tschechoslowakischen Geschichte Präsident. Er war ein schwacher Anführer und übernahm die Führung erst in seinen letzten Jahren.\n\nEr war gezwungen, unmögliche Entscheidungen zu treffen und wurde von Hitler eingeschüchtert. Die alliierten Führer taten wenig, um sein Land in seiner Krise zu unterstützen.\n\nDa das Amt des Präsidenten und seine Machtbefugnisse durch Deutschland ausgehöhlt wurden, wurde Emil Hácha kaum mehr als eine Marionette."


