	#### INDUSTRIAL SECTION ####
 
 FRA_tools_modernisation:0 "Werkzeugmodernisierung"
 FRA_tools_modernisation_desc:0 "Der französische Industriepark ist veraltet und vor allem alt. Wir müssen unsere Werkzeuge durch die Anschaffung neuer moderner Maschinen modernisieren."
 FRA_decrease_unemployement:0 "Arbeitslosigkeit senken"
 FRA_decrease_unemployement_desc:0 "Trotz der jüngsten Wirtschaftskrise ist die Arbeitslosenquote weiterhin hoch und die Produktion niedrig. Wir können damit beginnen, die Industrie zu Investitionen und der Schaffung neuer Arbeitsplätze zu ermutigen."
 FRA_overseas_factories:0 "Fabriken im Ausland"
 FRA_overseas_factories_desc:0 "Französisch-Algerien gilt als Teil Frankreichs, daher müssen wir die Produktionsinfrastrukturen in diesen Überseedepartements stärken."
 FRA_cnrs:0 "Nationales Zentrum für wissenschaftliche Forschung"
 FRA_cnrs_desc:0 "Um die Aktivitäten unserer derzeitigen Forschungslabore zu koordinieren, müssen wir alle Organismen in einem nationalen Zentrum zusammenführen, um die Forschungskapazität zu steigern."
 FRA_buy_heavy_water:0 "Kaufen Sie Heavy Water"
 FRA_buy_heavy_water_desc:0 "Europa ist instabil und die ersten Tests in der Atomwissenschaft haben vielversprechende Ergebnisse gezeigt. Wir sollten alle Schwerwasservorräte Norwegens nutzen, um unsere Forschungen voranzutreiben und zu sichern."
 FRA_research_grants:0 "Forschungsstipendien"
 FRA_research_grants_desc:0 "Um unsere nationale Forschungsleistung anzukurbeln, könnten wir unseren besten Wissenschaftlerteams Leistungsstipendien gewähren. Technologische Fortschritte können uns dort einen Vorsprung verschaffen, wo wir ihn am meisten brauchen."
 FRA_sncf:0 "Französische Nationale Eisenbahngesellschaft"
 FRA_sncf_desc:0 "Die Verstaatlichung der wichtigsten französischen Eisenbahngesellschaften soll die Kontrolle über die Verkehrsmittel sichern. Die neue französische Staatsbahn wird die Aufgabe haben, die bestehende Infrastruktur auszubauen."
 FRA_sncf_tooltip:0 "Maximale §YInfrastruktur§ hinzufügen! in §Yile de France§!, §YPas de Calais§!, §YChampagne§! und §YAlsace§!"
 
	#### COLONIAL FOCUS ####
	
 FRA_colonial_investments:0 "Kolonialinvestitionen"
 FRA_colonial_investments_desc:0 "Europa stehen gefährliche Zeiten bevor. Wir sollten uns auf die Verbesserung unserer Länder im Süden und in der Kolonie konzentrieren, um sicherzustellen, dass wir das Festland jederzeit unterstützen können."
 FRA_colonial_investments_tooltip:0 "Alle französischen Kolonien erhalten die Autonomiestufe „Kolonialinvestitionen“ und „Y-50“."
 FRA_continue_mandat:0 "Fortsetzung des Nahost-Mandats"
 FRA_continue_mandat_desc:0 "Wir können das Vienot-Abkommen derzeit nicht vollständig umsetzen, da die Welt von Tag zu Tag bedrohlicher wird. Wir könnten einige Zugeständnisse machen, um die Syrer und Libanesen zu ermutigen, uns zu unterstützen."
 FRA_develop_morocco:0 "Marokko entwickeln"
 FRA_develop_morocco_desc:0 "Unser Protektorat Marokko benötigt mehr Mittel, um die lokale Produktion zu stärken und eine effektive Wirtschaft aufzubauen."
 FRA_develop_tunisia:0 "Tunesien entwickeln"
 FRA_develop_tunisia_desc:0 "Das tunesische Protektorat bietet vielfältige Möglichkeiten, in die wir investieren sollten, um die bestehenden Infrastrukturen auszubauen."
 FRA_develop_algeria:0 "Algerien entwickeln"
 FRA_develop_algeria_desc:0 "Wir sollten unsere Industrie in Algier konzentrieren. Sollten die Spannungen in Europa zunehmen, verfügen wir weiterhin über Industriekapazitäten, die außerhalb der Reichweite feindlicher Bomber liegen."
 FRA_develop_indochine:0 "Indochine entwickeln"
 FRA_develop_indochine_desc:0 "Wenn wir unsere Kolonie in Indochina als Hauptstützpunkt im Pazifikraum nutzen wollen, müssen wir zunächst mehr Infrastruktur für die Stationierung unserer Truppen schaffen und die Kapazität unserer Häfen erhöhen."
 FRA_technology_sharing:0 "Technologieaustausch"
 FRA_technology_sharing_desc:0 "Um im technologischen Bereich auf Kurs zu bleiben, könnte es eine gute Lösung sein, unsere Forschungen mit unseren Kolonien und unseren Verbündeten zu teilen."
 FRA_technology_sharing_tooltip:0 "Alle französischen Kolonien erhalten einen Bonus von §G5 %§! für die gemeinsame Nutzung von Technologie durch §YFranzösische Forschung§!."
 FRA_sahara_oil:0 "Saharaöl"
 FRA_sahara_oil_desc:0 "Öl ist die einzige Ressource, die Frankreich nicht besitzt. Wir könnten in der Sahara nach diesem schwarzen Gold suchen. Außerdem ist unsere eigene Ölproduktion noch sehr begrenzt, daher sollten wir, wie Deutschland, die Technologie für synthetisches Öl entwickeln."
 FRA_tungsten_mines:0 "Wolframminen"
 FRA_tungsten_mines_desc:0 "Um unsere Kriegsmaschinerie zu versorgen, brauchen wir mehr Wolfram. Die indochinesischen Minen könnten mehr liefern, wenn wir sie erschließen."
 FRA_vienot_agreement_:0 "Vienot-Abkommen"
 FRA_vienot_agreement__desc:0 "Das französische Mandat für Syrien und den Libanon könnte nicht ewig dauern, doch der Senat zögert, die Unabhängigkeit zu gewähren. Der wachsende Nationalismus im Nahen Osten erschwert jedoch die Beziehungen. Wir sollten sie freigeben, da wir noch immer gute Beziehungen pflegen."
 FRA_rewrite_protectorate_treaties:0 "Neuverhandlung der Protektoratsverträge"
 FRA_rewrite_protectorate_treaties_desc:0 "Die Verträge, die Frankreich Marokko und Tunesien auferlegte, waren unausgewogen und standen nicht im Einklang mit dem Credo der Republik. Es ist an der Zeit, dem alten französischen Imperialismus ein Ende zu setzen."
 FRA_rewrite_protectorate_treaties_tooltip:0 "Marokko und Tunesien werden zu assoziierten Staaten. Sie können auch bedingungslos politische Aufmerksamkeit auf sich ziehen und sich auf eine pro-französische Diplomatie festlegen."
 FRA_autonomy_indochina:0 "Autonomie für Indochina"
 FRA_autonomy_indochina_desc:0 "Die Länder Indochinas sind die Perlen des französischen Kolonialreichs, doch seit der Kolonialisierung hat sich auf politischer Ebene nichts getan. Dem müssen wir abhelfen."
 FRA_autonomy_indochina_tooltip:0 "Vietnam, Ambodia und Laos werden zu assoziierten Staaten. Sie können auch bedingungslos politische Aufmerksamkeit auf sich ziehen und sich auf pro-französische Diplomatie binden."
 FRA_self_government_for_the_colonies:0 "Selbstverwaltung der Kolonien"
 FRA_self_government_for_the_colonies_desc:0 "Wir sollten den Überseeprovinzen, die nicht stark an Frankreich gebunden sind, mehr Autonomie zugestehen. Eine lokale Regierung kann die Verwaltung fernab von Frankreich effektiver gestalten."
 FRA_consolidate_african_federations:0 "Konsolidierung der afrikanischen Föderationen"
 FRA_consolidate_african_federations_desc:0 "Afrika ist ein großer und ethnisch gespaltener Kontinent, und unsere Kolonien sind nicht auf eine echte Selbstverwaltung vorbereitet. Wir sollten von Grund auf neue Staaten aufbauen, die auf den Föderationen der Kolonialländer basieren."
 FRA_gueye_lamine_law:0 "Guèye Lamine Law"
 FRA_gueye_lamine_law_desc:0 "Jedes Individuum des französischen Imperiums muss die gleichen Rechte haben, da Frankreich der Garant dafür ist. Auch wenn die Kolonisten damit nicht zufrieden sind."
 FRA_create_french_union:0 "Gründung der Französischen Union"
 FRA_create_french_union_desc:0 "Mit all diesen Reformen ist das französische Kolonialreich, wie es früher einmal war, überholt. Ein neues System wird Frankreich und alle Bürger der Kollektive miteinander verbinden."
 FRA_overseas_departements:0 "Überseedepartements"
 FRA_overseas_departements_desc:0 "Wir sollten darüber nachdenken, die Randgebiete besser zu verwalten, auch wenn dies bedeutet, dass wir viele Ressourcen aufwenden müssen, um die staatliche Verwaltung zu festigen."
 
	#### REARMEMENT FOCUS ####
 
 FRA_rearmament:0 "Wiederbewaffnung"
 FRA_rearmament_desc:0 "Deutschland wird von Tag zu Tag bedrohlicher. Wir können nicht pazifistisch bleiben und müssen unser Land wieder aufrüsten."
 FRA_military_complex_nationalisation:0 "Verstaatlichung des Militärkomplexes"
 FRA_military_complex_nationalisation_desc:0 "Unsere Fertigungskapazität ist noch begrenzt. Wir können die Verstaatlichung einiger Hersteller erzwingen, um eine echte Produktionseffizienz zu erreichen."
 FRA_defense_national_funds:0 "Nationale Verteidigungsfonds"
 FRA_defense_national_funds_desc:0 "Mit unserem derzeitigen Budget könnten wir uns keine umfassende Aufrüstung leisten und unsere Produktionsziele nicht erreichen. Wir müssen den für die Aufrüstung vorgesehenen Budgetanteil erhöhen und zusätzliche Mittel zur Finanzierung einiger Projekte bereitstellen."
 FRA_defense_national_funds_tooltip:0 "§YIndustrielle Unterstützung§! §RWird im Krieg eingestellt§!."
 FRA_war_material_licence:0 "Lizenz zur Herstellung von Kriegsmaterial"
 FRA_war_material_licence_desc:0 "Um die Entwicklung der Rüstungsindustrie zu fördern und die Versorgung der Infanterie mit Ausrüstung sicherzustellen, können wir Lizenzen zur Kontrolle der Produktion erteilen."
 FRA_aircraft_manufacturer_nationalisation:0 "Verstaatlichung von Flugzeugherstellern"
 FRA_aircraft_manufacturer_nationalisation_desc:0 "Da die Gespräche über den Kauf amerikanischer Flugzeuge ins Stocken geraten, sollten wir die Flugzeughersteller verstaatlichen, um die französischen Produktivitätsdefizite in diesem Sektor zu beheben."
 FRA_partial_mobilization:0 "Teilmobilisierung"
 FRA_partial_mobilization_desc:0 "Die Deutschen sind aggressiv und die Welt ist unsicher. Der Krieg steht vor der Tür und wir sollten die Teilmobilmachung erklären."
 FRA_commit_automobile_manufacturer:0 "Automobilhersteller verpflichten"
 FRA_commit_automobile_manufacturer_desc:0 "Die Automobilhersteller sind auch die Hauptproduzenten von Hochleistungs-Militärmotoren wie Panzern oder motorisierten Teilen. Der Staat muss mit der Industrie zusammenarbeiten, um seine Armee mechanisiert auszurüsten."
 FRA_wartime_organisation_act:0 "Kriegsorganisationsgesetz"
 FRA_wartime_organisation_act_desc:0 "Bevor der Krieg ausbricht, müssen wir die Organisation der Nation während des Krieges definieren."
 FRA_war_effort_law:0 "Kriegsanstrengungsgesetz"
 FRA_war_effort_law_desc:0 "Um zur Kriegsanstrengung beizutragen, muss jeder Franzose zusätzliche Steuern zahlen und kann auch Schatzanweisungen kaufen."
 
	#### DEMOCRATIC FOCUS ####
	
 FRA_social_reforms:0 "Sozialreformen"
 FRA_social_reforms_desc:0 "Die Matignon-Abkommen sind ein Teilerfolg, können aber angesichts der wirtschaftlichen Lage jederzeit wieder zunichte gemacht werden. Wir müssen unsere sozialen Reformen vorantreiben und unsere Vorteile sichern."
 FRA_support_blum:0 "Blum unterstützen"
 FRA_support_blum_desc:0 "Blums Reformen sind nicht so effektiv wie die Franzosen dachten, aber er geht in die richtige Richtung. Wir sollten ihm mehr Macht geben, die Gesellschaft zu reformieren."
 FRA_support_blum_tooltip:0 "§YVerzögern Sie den Zusammenbruch der Volksfront.\n§!"
 FRA_intervention:0 "Französische Intervention"
 FRA_intervention_desc:0 "Die Demokratie braucht unsere Hilfe. Wir dürfen nicht zulassen, dass ein weiteres faschistisches oder kommunistisches Regime an Boden gewinnt. Jeder, der bereit ist, für die Sache zu kämpfen, sollte dies tun dürfen. "
 FRA_intervention_tooltip:0 "§RBritannien wird ein Bündnis möglicherweise ablehnen.\n§!"
 FRA_support_daladier:0 "Unterstütze Daladier"
 FRA_support_daladier_desc:0 "Blum hat uns gezeigt, dass er ein Land in einer Krisensituation nicht führen kann. Er muss zurücktreten und das Amt Edouard Daladier überlassen, dem Führer der Parti Radical und der Nummer zwei der Volksfront."
 FRA_status_quo:0 "Status Quo"
 FRA_status_quo_desc:0 "Frankreich ist die Wiege und der Beschützer der Freiheit und sollte dies auch bleiben. Wenn wir jemals wieder Einheit erreichen wollen, müssen wir unsere Demokratie stabilisieren, bevor sie schwindet."
 FRA_little_entente:0 "Kleine Entente"
 FRA_little_entente_desc:0 "Die Kleine Entente, ein Bündnis, das nach dem Ersten Weltkrieg gegründet wurde, um Aggressionen Österreichs und Ungarns gegenüber ihren Nachbarn zu verhindern, wurde von Frankreich unterstützt, beginnt nun aber zu zerfallen. Anstatt die Beziehungen zu Großbritannien zu festigen, sollten wir die Initiative ergreifen, diese Fraktion wiederherzustellen und zu festigen, angefangen bei ihren Gründern in der Tschechoslowakei."
 FRA_go_with_britain:0 "Gehen Sie mit Großbritannien"
 FRA_go_with_britain_desc:0 "Russland hat sich für immer verändert, und von der alten Triple Entente sind nur noch Frankreich und Großbritannien übrig. Wenn sich die Geschichte wiederholen soll, müssen wir dafür sorgen, dass diese beiden Nationen, Bastionen der Demokratie und Freiheit in Europa, unsere Verbündeten bleiben."
 FRA_popular_front_united:0 "Volksfront vereint"
 FRA_popular_front_united_desc:0 "Nach Abschluss der Reformen müssen wir nun aufhören, uns gegenseitig zu bekämpfen und vereint bleiben. Die Front wird nicht zusammenbrechen, und wir werden für Frankreich und die Freiheit, Gleichheit und Brüderlichkeit kämpfen!"
 FRA_popular_front_united_tooltip1:0 "§RDie Volksfront wird im August 1938 zusammenbrechen, wenn sie nicht vereint ist.§!"
 FRA_popular_front_united_tooltip2:0 "§RDie Volksfront wird im Juni 1939 zusammenbrechen, wenn sie nicht vereint ist.§!"
 FRA_invite_yugoslavia:0 "Jugoslawien einladen"
 FRA_invite_yugoslavia_desc:0 "Jugoslawien hat genug Sorgen, auch ohne sich um expansionistische Nachbarn sorgen zu müssen. Sie wieder in die Kleine Entente zu holen, wäre sowohl für sie als auch für uns ein großer Dienst."
 FRA_invite_romania:0 "Rumänien einladen"
 FRA_invite_romania_desc:0 "Die rumänische Demokratie ist fragil und zwischen ihren faschistischen Fraktionen und dem sowjetischen Kommunismus gefangen. Die Aufnahme Rumäniens in die Kleine Entente wird es ihm ermöglichen, mit unserer Unterstützung seine Stabilität zu bewahren."
 FRA_invite_poland:0 "Polen einladen"
 FRA_invite_poland_desc:0 "Deutschland erhebt Anspruch auf Danzig und ehemalige Gebiete in Polen. Ihre Aufnahme in die Kleine Entente würde ihre Sicherheit garantieren."
 FRA_research_treaty:0 "Forschungsvertrag"
 FRA_research_treaty_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion die Forschung und Entwicklung im Kriegsfall effizienter durchführen."
 FRA_invite_benelux:0 "Französisch-belgisches Militärabkommen"
 FRA_invite_benelux_desc:0 "Belgien und Luxemburg sind für die Deutschen ein leichtes Ziel. Um zu verhindern, dass sie die Maginot-Linie umgehen, müssen wir sicherstellen, dass sie militärisch mit uns zusammenarbeiten."
 FRA_economic_cooperation_agreement:0 "Abkommen über wirtschaftliche Zusammenarbeit"
 FRA_economic_cooperation_agreement_desc:0 "Um eine perfekte militärische Zusammenarbeit zu gewährleisten, müssen wir einige wirtschaftliche und logistische Vereinbarungen treffen."
 FRA_preventive_intervention:0 "Präventive Intervention"
 FRA_preventive_intervention_desc:0 "Die Deutschen haben uns keine andere Wahl gelassen. Im Interesse der freien Welt und der Zukunft unserer Kinder. Es ist Zeit für Krieg."
 
	#### COMMUNIST FOCUS ####
 
 FRA_radicalize_front:0 "Radikalisierung der Linken"
 FRA_radicalize_front_desc:0 "Die Reformen der Volksfront reichen nicht aus, um die aktuelle Situation zu verbessern. Wir müssen unsere Politik radikalisieren und mehr Kommunisten in die Regierung lassen."
 FRA_grands_travaux:0 "Große Arbeiten"
 FRA_grands_travaux_desc:0 "Mit der neuen Sozialisierung des Landes wird eine Reihe von Sozialaufbauprogrammen einhergehen. Sie werden die Arbeitslosigkeit senken und öffentliche Strukturen schaffen."
 FRA_ideological_indoctrination:0 "Nationale Mobilisierung"
 FRA_ideological_indoctrination_desc:0 "Unsere politisch etablierten Werte und Ziele sind es wert, für sie zu sterben, genauso wie für jeden alten Glauben. Jeder Anhänger sollte darauf vorbereitet sein, dem Tod ins Auge zu sehen, und diejenigen, die vom Glauben abirren, sollten besser darauf vorbereitet sein, dem Tod ins Auge zu sehen."
 FRA_intervention_committee:0 "Interventionsausschuss"
 FRA_intervention_committee_desc:0 "Wir müssen unsere Politik gegenüber ausländischen Interventionen ändern und linke Organisationen in anderen Ländern unterstützen, um den faschistischen Einfluss zu stoppen."
 FRA_organise_international:0 "Organisieren Sie die 4. Internationale"
 FRA_organise_international_desc:0 "Wir sollten den Trotzkisten helfen, ihre revolutionäre sozialistische internationale Organisation aufzubauen, mit dem erklärten Ziel, der Arbeiterklasse dabei zu helfen, den Kapitalismus zu stürzen und auf den internationalen Kommunismus hinzuarbeiten."
 FRA_commune_proclamation:0 "Kommunalproklamation"
 FRA_commune_proclamation_desc:0 "Wir haben genügend Unterstützung für einen kommunistischen Putsch. Es ist Zeit, die Macht zu stärken und das Erbe der Kommune fortzuführen!"
 FRA_scientific_convention:0 "Übereinkommen von Paris"
 FRA_scientific_convention_desc:0 "Die Sowjets haben angeboten, unsere wissenschaftliche Zusammenarbeit auszuweiten. Wir sollten ein Abkommen zwischen unseren beiden Ländern unterzeichnen, um Forschung und technologische Innovation zu fördern."
 FRA_research_cooperation:0 "Wissenschaftliche Zusammenarbeit"
 FRA_research_cooperation_desc:0 "Die Sowjets sind ein intelligentes und einfallsreiches Volk, verfügen aber nicht über die Infrastruktur für ein ernsthaftes wissenschaftliches Programm. Wir werden mit unseren Verbündeten zusammenarbeiten und Wissen und bahnbrechende Erkenntnisse zum gegenseitigen Nutzen austauschen."
 FRA_assistance_treaty:0 "Französisch-sowjetischer Vertrag über gegenseitige Unterstützung"
 FRA_assistance_treaty_desc:0 "Ein bilateraler Vertrag zwischen unseren beiden kommunistischen Ländern wird die Bedrohung aus Mitteleuropa verringern. Insbesondere wird der Pakt zur gegenseitigen Unterstützung die Gefahr einer Aggression aus Deutschland verhindern."
 FRA_fascist_threat:0 "Die faschistische Bedrohung"
 FRA_fascist_threat_desc:0 "Der Versailler Vertrag und die Wirtschaftssanktionen haben Deutschland nicht aufgehalten, sondern vielmehr den Nährboden für noch finsterere Bewegungen bereitet. Deutschland muss erneut besiegt und unter unsere Kontrolle gebracht werden, zumindest vorerst."
 FRA_collectivisation:0 "Kollektivierung"
 FRA_collectivisation_desc:0 "Eine Kollektivierungskampagne der Privatwirtschaft und der Ressourcen wird uns helfen, den Staat besser zu überwachen und das Land zu stabilisieren, verbunden mit einer Säuberung der Regierung."
 FRA_humanite_unie:0 "Humanité Unie"
 FRA_humanite_unie_desc:0 "Die fetten Banker und machthungrigen Demagogen festigen ihren blutigen Griff um die Welt. Mit jedem Tag werden freie Menschen versklavt und die Welt stürzt tiefer in die Krise, verursacht durch die Gier des Einzelnen. Französische Ideale werden mehr denn je gebraucht! Die Menschheit braucht uns, und wir müssen die Menschheit vereinen!"
 FRA_strike_empire:0 "Schlag gegen das Imperium"
 FRA_strike_empire_desc:0 "Die wahre Bedrohung für die Freiheit in der Welt sind die kapitalistischen Imperien der europäischen Supermächte. Sie müssen zerschlagen und ihre Bevölkerungen befreit werden, angefangen mit dem Britischen Empire."
 
	#### FASCIST FOCUS ####
 
 FRA_far_right_leagues:0 "Rechtsextreme Ligen"
 FRA_far_right_leagues_desc:0 "Die rechtsextremen Ligen sind mehrere rechtsextreme Bewegungen in Frankreich, die sich gegen den Parlamentarismus stellen und sich hauptsächlich Militärparaden, Straßenkämpfen, Demonstrationen und Unruhen widmen. Um Frankreich zu vereinen, könnten wir sie nutzen, um unsere Überlegenheit und Stärke zu behaupten und dem Verfall zu entgehen."
 FRA_front_liberte:0 "Front de la Liberté"
 FRA_front_liberte_desc:0 "Um uns der Volksfront entgegenzustellen, müssen wir mit den anderen rechten Bewegungen ein antimarxistisches Bündnis bilden. Diese Front de la Liberté wird diejenigen zusammenschließen, die gegen den Kollektivismus protestieren."
 FRA_support_ppf:0 "Französische Volkspartei"
 FRA_support_ppf_desc:0 "Die Französische Volkspartei verurteilt den Parlamentarismus, versucht, die Demokratie einzuschränken und die französische Gesellschaft nach ihren eigenen autoritären Vorstellungen umzugestalten. Sie war eine vehemente Gegnerin sowohl des Marxismus als auch des Liberalismus. Nach dem Erfolg der Front de la Liberté sollte die Französische Volkspartei, die die Bewegung anführt, in die Regierung eintreten."
 FRA_charlemagne_division:0 "Teilung Karl der Große"
 FRA_charlemagne_division_desc:0 "Die Komintern wird stärker. Es ist Zeit, unsere Interessen zu zeigen und faschistische Organisationen zu unterstützen, um sie zu stoppen."
 FRA_demand_wallonia:0 "Nachfrage Wallonien"
 FRA_demand_wallonia_desc:0 "Die belgische Region Wallonien ist überwiegend von französischsprachigen Menschen bewohnt. Sie fühlen sich zwar nicht als Franzosen, aber wir könnten das Sprachargument nutzen, um die Kontrolle über diese Provinz zu übernehmen."
 FRA_revise_versailles:0 "Versailles überarbeiten"
 FRA_revise_versailles_desc:0 "Das Deutsche Reich wird zu einer Macht, mit der man rechnen muss. Seine Vision einer besseren Zukunft lässt sich mit unseren Interessen vereinbaren. Wir sollten es unterstützen, und sobald sich der Staub gelegt hat, wird Frankreich seinen rechtmäßigen Anteil an Europa bekommen."
 FRA_split_switzerland:0 "Split Schweiz"
 FRA_split_switzerland_desc:0 "Die neutrale Politik und das demokratische Funktionieren der Schweiz sind eine Beleidigung für unsere Regierung. Wir könnten einen geheimen Deal mit Hitler und Mussolini abschließen, um dieses Land in drei Teile zu teilen."
 FRA_strike_urss:0 "Schlag gegen die Sowjetunion"
 FRA_strike_urss_desc:0 "Die Bedrohung durch die Sowjetunion wächst trotz unserer Einwände weiter. Wir können eine aggressive Sowjetunion nicht tolerieren und haben keine andere Wahl, als für eine bessere Zukunft in den Krieg zu ziehen."
 FRA_cagoule_coup:0 "La Cagoule Coup"
 FRA_cagoule_coup_desc:0 "La Cagoule ist eine faschistisch geprägte und antikommunistische Gruppe, die ihre Aktivitäten mit Gewalt durchsetzt. Die geheime Bewegung steht in Kontakt mit Offizieren des Militärs und wird von Industriellen finanziert. Es wurde berichtet, dass es zu einem Putsch kommen könnte, da einige Militäroffiziere antiparlamentarische Bewegungen unterstützen."
 FRA_state_reorganisation:0 "Staatsumstrukturierung"
 FRA_state_reorganisation_desc:0 "Wir müssen die Rolle des Staates in Frankreich überdenken. Wir sollten all diese parlamentarischen Ideologien aufgeben und eine starke und einzigartige Partei gründen."
 FRA_claim_rhinland:0 "Anspruch Rheinland"
 FRA_claim_rhinland_desc:0 "Die Bedrohung durch Deutschland nimmt von Jahr zu Jahr zu. Wir müssen auf der linken Rheinseite einen Pufferstaat schaffen."
 FRA_woo_italy:0 "Woo Italien"
 FRA_woo_italy_desc:0 "Italien hat das Potenzial, eine mächtige Nation zu werden. Dank Mussolinis starker Führung ist das italienische Volk vereint und bereit, für die richtige Sache zu kämpfen. Lasst diese Sache auch uns sein."
 FRA_dismantle_germany:0 "Deutschland demontieren"
 FRA_dismantle_germany_desc:0 "Die Deutschen haben uns keine andere Wahl gelassen. Um Frankreichs und der Zukunft unserer Kinder willen ist es Zeit für den Krieg."
 FRA_convince_spain:0 "Spanien überzeugen"
 FRA_convince_spain_desc:0 "Franco und die spanischen Nationalisten sind unsere natürlichen Verbündeten, vereint durch Religion, Kultur und Ideologie. Gemeinsam werden wir die Lateinamerikaner vor der deutschen Bedrohung schützen."
 FRA_plan_xiv:0 "Plan XIV"
 FRA_plan_xiv_desc:0 "Den Norden haben wir bereits gesichert. Nur die Schweiz bleibt als potenzieller Weg zu uns. Das können wir nicht dulden."
 FRA_nothern_italy_claim:0 "Empire-Vermächtnis"
 FRA_nothern_italy_claim_desc:0 "Die Republik ist schon lange tot und hat keinerlei Legitimität mehr. Wir sollten die Bonaparte-Dynastie wählen, um das Land weiter zu führen."
 FRA_secure_catalonia:0 "Je Suis Le Déluge"
 FRA_secure_catalonia_desc:0 "Katalonien gehörte während des Ersten Kaiserreichs und unter Karl dem Großen zu Frankreich. Um unser Erbe zu ehren, ist die Unterwerfung Spaniens die einzige Lösung. Doch das perfide Albion wird das nicht zulassen. Wir sollten zuerst zuschlagen, um die französische Hegemonie in Europa zu sichern."
 
	#### MONARCHY FOCUS ####

 FRA_repel_law_exile:0 "Das Exilgesetz abwehren"
 FRA_repel_law_exile_desc:0 "Alle Adligen und königlichen Linien wurden von der Dritten Republik aus Frankreich verbannt. Die Symbole und Mythen, die Monarchen repräsentieren, können zur Stärkung der französischen Gesellschaft genutzt werden."	
 FRA_action_francaise:0 "Aktion Französisch"
 FRA_action_francaise_desc:0 "Die Action Française unterstützt die Wiederherstellung der Monarchie und, nach dem Gesetz zur Trennung von Kirche und Staat von 1905, die Wiedereinführung des römisch-katholischen Glaubens als Staatsreligion. Sie ist auch ein Sammelpunkt im Gegensatz zur Dritten Republik Frankreichs, die von vielen ihrer Gegner als korrupt und undurchführbar angesehen wurde und von denen sie hoffte, sie auf ihre Seite zu ziehen."
 FRA_action_francaise_tooltip:0 "§YJean d&#39;Orleans wird zum König gewählt.\n§!"
 FRA_counter_revolution:0 "Konterrevolution"
 FRA_counter_revolution_desc:0 "Die Monarchien in Europa sterben langsam aus. Wenn wir unsere Ideologie in den Nachbarländern wiederbeleben, werden sie uns bei der Unterstützung unserer Agenda unterstützen."
 FRA_legitimist_movement:0 "Legitimistische Bewegung"
 FRA_legitimist_movement_desc:0 "Nur ein wahrer Nachfolger der Bourbonen-Dynastie kann regieren. Alfons XIII., der ehemalige König von Spanien, ist der richtige Kandidat für die Restauration."
 FRA_legitimist_movement_tooltip:0 "§YAlphonse XIII wird zum König gewählt.\n§!"
 FRA_unite_crowns:0 "Vereint die Kronen"
 FRA_unite_crowns_desc:0 "Frankreich und Spanien werden nun vom selben Monarchen regiert. Eine Personalunion wird die Bindungen zwischen den beiden Ländern besiegeln." 
 FRA_restoration:0 "Wiederherstellung"
 FRA_restoration_desc:0 "Es ist an der Zeit, die Republik zu beenden und Frankreich seinem natürlichen Erben, dem König, zurückzugeben. Die neue Monarchie wird die Menschen hinter einem starken Führer vereinen."
 FRA_union_latins:0 "Lateinische Union"
 FRA_union_latins_desc:0 "Ein Bündnis auf der Grundlage der gemeinsamen lateinischen Zivilisation und Kultur in Europa (Italien, Frankreich, Spanien, Portugal und Rumänien) wird das Machtgleichgewicht zwischen uns und Deutschland schaffen. Beginnen wir mit Rumänien. Mit unserer Unterstützung wird es dem Land ermöglichen, seine Stabilität zu bewahren."
 FRA_invite_portugal:0 "Portugal einladen"
 FRA_invite_portugal_desc:0 "Portugal ist als lateinamerikanisches Land ein natürlicher Verbündeter des französischen Volkes. Wir müssen diese freundschaftlichen Bande stärken."
 FRA_retake_haiti:0 "Erobern Sie Haiti zurück"
 FRA_retake_haiti_desc:0 "Haiti ging nach der Revolution durch einen Sklavenaufstand verloren. Wenn wir unsere Position in der Karibik festigen und unser Ansehen wiederherstellen wollen, müssen wir es mit allen Mitteln zurückerobern."
 FRA_recover_quebec:0 "Quebec wiederherstellen"
 FRA_recover_quebec_desc:0 "Quebec wurde von den Briten geraubt und ist noch immer von Franzosen bewohnt. Es muss mit Gewalt in das ihm zustehende Land zurückkehren."
 FRA_claim_louisiana:0 "Anspruch Louisiana"
 FRA_claim_louisiana_desc:0 "Die Vereinigten Staaten werden niemals zulassen, dass ihr Einfluss auf Amerika weiter zunimmt. Die bessere Lösung ist, sie so schnell wie möglich zu besiegen."
 FRA_usa_deal:0 "Abkommen mit den USA"
 FRA_usa_deal_desc:0 "Die Vereinigten Staaten sind ein alter Verbündeter und die beste Unterstützung, die wir in Amerika haben können. Im Austausch für kanadisches Land sollten wir ein Bündnis schließen."
 
	#### MILITARY FOCUS ####
	
 FRA_giraud_plan:0 "Giraud-Plan"
 FRA_giraud_plan_desc:0 "In Zeiten wie diesen ist es am besten, unsere Verteidigung zu stärken. Wenn es Bedrohungen gibt, lasst sie zu uns kommen, damit wir sie auf unserem eigenen Land bekämpfen können. Wir haben einen perfekten Kandidaten für die Führung unserer Armee. Alles, was wir brauchen, ist euer Wort."
 FRA_fortification_focus:0 "Befestigungsfokus"
 FRA_fortification_focus_desc:0 "So wichtig unsere Festungen auch waren, wir müssen Wege finden, sie effizienter zu bauen. Die Maginot-Linie war eine wirksame Abschreckung für feindliche Streitkräfte. Wir könnten die Sicherheit weiterer ähnlicher Verteidigungsanlagen gebrauchen."
 FRA_alpine_forts:0 "Alpenfestungen"
 FRA_alpine_forts_desc:0 "Sobald wir die Alpen mit unserer neu geplanten Verteidigungslinie gesichert haben, werden die Italiener die Grenze nicht mehr so leicht überqueren. Wir werden Zeit haben, zu reagieren und unsere Position zu verstärken."
 FRA_commission_fortified_regions:0 "CORF-Mission"
 FRA_commission_fortified_regions_desc:0 "Wir können die alte Kommission zur Organisation der befestigten Gebiete von 1927 wieder ins Leben rufen, um unsere tatsächlichen Grenzbefestigungen zu untersuchen und unsere Verteidigungspläne zu aktualisieren."
 FRA_extend_the_maginot_line:0 "Erweiterung der Maginot-Linie"
 FRA_extend_the_maginot_line_desc:0 "Wir können nicht darauf zählen, dass Belgien seine Stellung hält. Wenn es feindliche Armeen durchlässt, könnten wir in Schwierigkeiten geraten. Die Verlängerung der Maginot-Linie ist entscheidend, um unerwünschte Armeen aus Frankreich fernzuhalten!"
 FRA_de_gaulle_strategy:0 "De Gaulle-Strategie"
 FRA_de_gaulle_strategy_desc:0 "Wir können nicht tatenlos zusehen, wie Feinde an unsere Grenzen vordringen. Und wir können unsere Verbündeten im Kriegsfall nicht sich selbst überlassen. Bereiten Sie unsere Armee vor! Gamelin ist der richtige Mann für diese Aufgabe."
 FRA_motorized_focus:0 "Motorisierte die Armee"
 FRA_motorized_focus_desc:0 "Wenn wir bessere Möglichkeiten zum Bau unserer Infanteriefahrzeuge finden, können wir die Frontlinien besser unterstützen und verstärken."
 FRA_mechanized_focus:0 "Division Kürassée"
 FRA_mechanized_focus_desc:0 "Panzer sind der Weg in die Zukunft der Militärindustrie. Wir wollen das Schlachtfeld kontrollieren und dafür brauchen wir neue, leistungsstarke Panzer!"
 FRA_tank_modernisation:0 "Modernisierung der Lehren"
 FRA_tank_modernisation_desc:0 "Gepanzerte Fahrzeuge spielen im Krieg eine immer wichtigere Rolle. Sie sind zwar etwas weniger einschüchternd als ein gewöhnlicher Panzer, verschaffen uns aber einen Vorteil in den Bereichen Kommunikation, Führung, Transport und Häuserkampf."
 FRA_further_armament_program:0 "Weiteres Rüstungsprogramm"
 FRA_further_armament_program_desc:0 "Mit den neuen Mitteln für die Armee können wir massenhaft Waffen produzieren. Wir werden jedem ein Gewehr in die Hand geben."
 FRA_infantry_focus:0 "Levée en masse"
 FRA_infantry_focus_desc:0 "Alle Männer und Frauen, die kämpfen können, werden dies tun. Wir sollten staatliche Mittel in die Produktion und Verbesserung von Infanteriewaffen stecken."
 FRA_artillery_focus:0 "Grande Batterie"
 FRA_artillery_focus_desc:0 "Unsere Artillerie bildet eine schlagkräftige Einheit, die das Feuer auf bestimmte Punkte konzentriert. Mit jeder Salve schwächen wir die feindlichen Linien und bahnen uns notfalls einen Weg durch!"
 FRA_army_reform:0 "Armeereform"
 FRA_army_reform_desc:0 "Keine Infanterieeinheit oder Hightech-Panzer allein werden uns den Krieg gewinnen lassen. Wir müssen unsere Anstrengungen darauf konzentrieren, sowohl unsere taktischen als auch unsere strategischen Fähigkeiten zu entwickeln. Mit den richtigen Leuten an der richtigen Stelle können wir uns als Armee weiterentwickeln."
 FRA_general_mobilisation_order:0 "Generalmobilmachungsbefehl"
 FRA_general_mobilisation_order_desc:0 "Wir müssen die Landarmee, die Luftwaffe und die Marine auf Kriegsfuß halten und alle verfügbaren Franzosen mobilisieren."
 FRA_africa_army:0 "Armee von Afrika"
 FRA_africa_army_desc:0 "Das Wissen der Afrikanischen Armee wird die Vorherrschaft in den Kolonien und Nordafrika sichern. Wir können auf einheimische arabische oder berberische Freiwillige und Regimenter französischer Siedler zählen."
 FRA_colonial_troops:0 "Kolonialtruppen"
 FRA_colonial_troops_desc:0 "Die Kolonialtruppen sind nicht Teil der Afrikanischen Armee, sondern gruppieren einheimische Truppen aus West- und Zentralafrika sowie aus Übersee. Wir können ihre Ausrüstung für den Kampf in unwirtlichen Gebieten nutzen."
 FRA_foreign_legion:0 "Fremdenlegion"
 FRA_foreign_legion_desc:0 "Die Fremdenlegion ist der Elitezweig der Afrikanischen Armee und besteht aus Soldaten unterschiedlicher Nationalitäten und Herkunft. Die Erfahrung der Legionäre und die Qualität ihrer Ausbildung bilden unsere Speerspitze."
 FRA_commandos_marine:0 "Kommandos Marine"
 FRA_commandos_marine_desc:0 "Die Commandos Marine sind die Spezialeinheiten der französischen Marine. Ihre Hilfe bei der amphibischen Kriegsführung und Seeaufklärung ermöglicht es, die Feinde Frankreichs schnell zu besiegen."
 FRA_blum_viollette_project:0 "Blum-Viollette-Vorschlag"
 FRA_blum_viollette_project_desc:0 "Der Blum-Viollette-Vorschlag sah vor, dass eine Minderheit der Algerier die volle französische Staatsbürgerschaft erhält, mit dem Plan, diese Vorteile später auf andere Gruppen auszuweiten. Wir können dieses Argument für die Rekrutierung in der Kolonie nutzen, aber die französischen Siedler werden massiv protestieren."
 FRA_abolish_indigenat_statut:0 "Abschaffung des Indigenat-Status"
 FRA_abolish_indigenat_statut_desc:0 "Jeder Mensch auf französischem Boden muss die gleichen Rechte haben, unabhängig von seiner Herkunft. Wir sollten jedem Algerier die volle Staatsbürgerschaft gewähren, auch wenn dies bedeutet, in Konflikt mit den französischen Siedlern zu geraten."
	
	#### NAVAL SECTION ####
 
 FRA_naval_contruction_program:0 "Schiffsbauprogramm"
 FRA_naval_contruction_program_tt:0 "Nicht genügend Bauplätze für §YNaval Base§!"
 FRA_naval_contruction_program_desc:0 "Wenn wir unsere Marine ausbauen wollen, müssen wir zunächst unsere Marinestützpunkte verbessern und erweitern. Unsere einzigartigen Schiffe erfordern ständige Aufmerksamkeit, um jederzeit kampfbereit zu bleiben."
 FRA_altlantic_domination:0 "Atlantische Herrschaft"
 FRA_altlantic_domination_desc:0 "Eine Verbesserung des Designs unserer Schlachtschiffe würde uns im Atlantik große taktische Vorteile verschaffen. Ihre Reichweite und Schlagkraft sind unübertroffen, und niemand wird ihren Geschützen entkommen können."
 FRA_pacific_protection:0 "Pazifikschutz"
 FRA_pacific_protection_desc:0 "Marinetheoretiker haben unsere Aufmerksamkeit auf unsere veralteten Flugzeugträger gelenkt. Sie haben Vorschläge, wie Flugzeugträger weiter genutzt werden können, wenn die Entwicklung in die richtige Richtung vorangetrieben wird. Wirkliche Fortschritte sind ohne unsere volle Unterstützung nicht möglich. Sie wird die Kontrolle über den Pazifik sichern und dazu beitragen, unsere Kolonien vor Japan zu schützen."
 FRA_darlan_doctrine:0 "Darlan-Doktrin"
 FRA_darlan_doctrine_desc:0 "Jüngste Fortschritte im Schiffsbau eröffnen neue Möglichkeiten für taktische und strategische Manöver. Admiral Darlan hat neue Theorien vorgeschlagen. Wir müssen sie gründlich testen und die Pläne konkretisieren, bevor der Krieg ausbricht."
 FRA_mediterranean_special_measures:0 "Sondermaßnahmen im Mittelmeerraum"
 FRA_mediterranean_special_measures_desc:0 "Die Italiener verstärken ihre Marine und wollen ihre Vorherrschaft im Mittelmeer ausbauen. Sollten wir unsere Verteidigungslinie auf See verlieren, riskieren wir eine direkte Invasion unseres Heimatlandes. Wir müssen sicherstellen, dass unsere Schiffe mit der neuesten Technologie gebaut werden."
 FRA_standardisation_engine:0 "Motorenstandardisierung"
 FRA_standardisation_engine_desc:0 "Unser U-Boot- und Marinebomberpark ist veraltet und bedarf einiger Änderungen. Allerdings gibt es zu viele Varianten der Hauptausrüstungsteile, um sie in Fließbändern zu fertigen. Wir müssen dies zunächst standardisieren."
 FRA_antille_bridgehead:0 "Antillen-Brückenkopf"
 FRA_antille_bridgehead_desc:0 "Die Antillen sind unser Brückenkopf für den Kampf in Amerika. Er muss um jeden Preis verteidigt werden."
 FRA_polynesie_defense:0 "Verteidigung Polynesiens"
 FRA_polynesie_defense_desc:0 "Wenn Japan immer bedrohlicher wird, könnte es unsere Kolonien im Pazifik bedrohen. Wir werden ihnen unseren Besitz nicht überlassen."
 
	#### AIR SECTION ####
 
 FRA_air_bases:0 "Erweitern Sie unsere neuen Luftwaffenstützpunkte"
 FRA_air_bases_bypass_tt:0 "Nicht genügend Bauplätze für §YAir Base§!"
 FRA_air_bases_desc:0 "Es ist an der Zeit, unsere Luftwaffe zu erweitern! Es gibt bereits Pläne für den Bau neuer Luftwaffenstützpunkte, um den starken Zuwachs an Personal und Flugzeugen zu ermöglichen."
 FRA_modernisation_program:0 "Modernisierungsprogramm"
 FRA_modernisation_program_desc:0 "Revolutionäre zivile Technik kann auf unsere Kampfflugzeuge angewendet werden, um ihre Geschwindigkeit, Reichweite und maximale Flughöhe zu verbessern. Wir müssen uns darauf konzentrieren, wenn wir mit den Fortschritten anderer mithalten wollen."
 FRA_buy_americain:0 "Kaufen Sie American Bombers"
 FRA_buy_americain_desc:0 "Luftunterstützung ist ein wichtiger Teil unserer Verteidigungs- und Angriffsfähigkeiten. Ihre aktuellen Bombermodelle sind jedoch zu alt, aber wenn wir die letzten amerikanischen Modelle kaufen können, bleiben wir im Rennen."
 FRA_buy_americain_tooltip:0 "Wir werden 200 taktische Bomber aus den USA erhalten."
 FRA_barrage_david:0 "Sperrfeuer David"
 FRA_barrage_david_desc:0 "	Inspiriert durch die britische Entdeckung wurde von der Luftwaffe ein neues Modell eines bistatischen Radars zur Erkennung feindlicher Flugzeuge entwickelt."
 FRA_jet_effort:0 "Experimentierdüse"
 FRA_jet_effort_desc:0 "Im Luftkampf kommt es vor allem auf Mobilität an. Das Düsentriebwerk ist ein so leistungsstarker Fortschritt, dass es so scheint, als stünden die feindlichen Piloten still, während wir sie vom Himmel holen."
 FRA_interwar_experience:0 "Zwischenkriegserfahrung"
 FRA_interwar_experience_desc:0 "Flugzeuge zur Unterstützung unserer Landstreitkräfte waren während des Anti-Atlas-Aufstands zwischen den beiden Weltkriegen eine sehr effiziente Ergänzung. Für diese Flugzeuge gibt es nun mehrere Verbesserungsvorschläge, die wir in unsere Manöver einbeziehen sollten."
 FRA_reorganize_air_army:0 "Reorganisieren Sie die Luftarmee"
 FRA_reorganize_air_army_desc:0 "Wir haben genügend Erfahrung gesammelt, um neue Theorien in der Luftkriegsführung schneller zu testen, aber mit unserer derzeitigen Kommandostruktur ist die Luftwaffe schwer zu verwalten. Wir müssen zunächst einige Umstrukturierungen vornehmen."
 FRA_parachute_battalions:0 "GIA 601-602"
 FRA_parachute_battalions_desc:0 "Die Sowjets haben eine neue Luftlandeeinheit zum Abwerfen von Soldaten und Ausrüstung geschaffen, und wir sollten eine ähnliche Militärgruppe gründen."
  
