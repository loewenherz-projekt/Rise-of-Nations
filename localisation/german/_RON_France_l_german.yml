 france.100.t:0 "Volksfront gewinnt die Wahl"
 france.100.d:0 "Die Volksfront hat die Parlamentswahl gewonnen und die Mehrheit im Parlament erlangt. Das Bündnis linker Bewegungen, darunter die Kommunistische Partei Frankreichs (PCF), die Französische Sektion der Arbeiterinternationale (SFIO) und die Radikale und Sozialistische Partei, kündigt die Bildung einer Regierung unter SFIO-Chef Léon Blum an. Die Franzosen hoffen, dass Blums Regierung soziale Reformen umsetzen wird, um die aktuelle politische Krise zu beenden."
 france.100.a:0 "Mit der Front ist alles möglich!"
 france.101.t:0 "Der Hoare-Laval-Pakt"
 france.101.d:0 "Die Presse hat den Hoare-Laval-Pakt öffentlich gemacht, der hinter ihrem Rücken ausgehandelt wird. Frankreich und Großbritannien, die in der Gunst Italiens stehen wollen, verhandeln mit Mussolini über ein Abkommen zur schnellen Beendigung des Zweiten Italienisch-Abessinischen Krieges mit Zugeständnissen Äthiopiens. Dies geschieht in der Hoffnung, die Unabhängigkeit des Landes zu bewahren, geschah jedoch ohne ihr Wissen. Es löste einen Aufruhr sowohl bei Rechten als auch bei Linken aus, die es als Beschwichtigungspolitik gegenüber Mussolini verurteilen, die Äthiopien zu einem Marionettenstaat machen würde. Albert Sarraut wird bis zu den Wahlen die Führung übernehmen."
 france.101.a:0 "Pierre Laval muss zurücktreten."
 france.102.t:0 "Leon Blum tritt zurück"
 france.102.d:0 "Da die Inflation ebenfalls um 46 % stieg, erwies sich die Einführung der 40-Stunden-Woche als äußerst ineffizient, da die Industrie Schwierigkeiten hatte, sich darauf einzustellen. Die wirtschaftliche Verwirrung behinderte die Wiederaufrüstung, und die rasante Zunahme der deutschen Rüstung zwang Blum, die Sozialreformen aufzugeben, auf die die Volksfront so viel gesetzt hatte. Léon Blum trat zurück, da ihm das Parlament die Mittel zur Lösung der Wirtschaftskrise verweigerte."
 france.102.a:0 "Edouard Daladier und die Radikalen werden eine neue Regierung bilden"
 france.103.t:0 "Inflation!"
 france.103.d:0 "1936 erholt sich Frankreich langsam von der Wirtschaftskrise, die das Land 1931 erschüttert hatte. Die instabile politische Lage, die hohe Arbeitslosigkeit und das Haushaltsdefizit stellen die Regierung bereits vor große Herausforderungen. Unglücklicherweise führt die schnelle Deflation zu einer Überbewertung des Franc. Dies löst eine Wirtschaftskrise aus, die zwei Drittel der Exporte einbricht. Angesichts der allgemeinen Kapitalflucht und des Widerstands einiger Arbeitgeber ist die Lage alarmierend, und die Enttäuschung der Arbeiterklasse über die Politik ist bereits groß."
 france.103.a:0 "Wir müssen die Wirtschaft schnell reformieren"
 FRA_inflation_tooltip:0 "§YEntscheidungen zur Reform der Wirtschaft freischalten.\n§!"
 france.104.t:0 "Matignon-Abkommen"
 france.104.d:0 "Nach der Wahl der Volksfront brach ein massiver Generalstreik der Arbeiterklasse aus. Er begann in Le Havre, wurde von Fabrikbesetzungen begleitet, um Aussperrungen zu verhindern, und breitete sich rasch auf ganz Frankreich aus. Mehr als eine Million Arbeiter streikten. Die soziale Bewegung folgte unmittelbar dem Wahlsieg der Volksfront, um diese Machtposition zu erreichen. Die neue Linksregierung unter Léon Blum verhandelte erfolgreich Sozialabkommen, die im Hotel Matignon unterzeichnet wurden. Alle Arbeiter profitierten von diesen Abkommen: Streikrecht, bezahlter Urlaub, 40-Stunden-Woche mit 48-Stunden-Bezahlung und die Beseitigung aller Hindernisse für gewerkschaftliche Organisation. "
 france.104.a:0 "Lasst uns Sozialreformen durchführen."
 france.104.b:0 "Wir können nicht alle unsere Versprechen erfüllen."
 france.105.t:0 "Kommunisten ziehen ihre Unterstützung zurück"
 france.105.d:0 "Unzufrieden mit der jüngsten Politik der linken Regierung kündigt Maurice Thorez, Vorsitzender der Kommunistischen Partei Frankreichs, an, dass die Kommunisten aus der Volksfront austreten und ihre Unzufriedenheit kundtun werden."
 france.105.a:0 "Wir brauchen ihre Hilfe nicht, um die Nation zu führen"	
 france.106.t:0 "Kommunisten unterstützen die Regierung"
 france.106.d:0 "Im Gegensatz zu anderen Nationen erklärt sich Frankreich bereit, den spanischen Republikanern im Spanischen Bürgerkrieg zu helfen. Blums Kabinett beschließt eine Interventionspolitik und formalisiert ein Abkommen über die Entsendung von Munition und freiwilligen Soldaten nach Spanien. Maurice Thorez, Vorsitzender der Kommunistischen Partei Frankreichs, verkündet, dass die Kommunisten Blums Politik unterstützen und die bestehende Front stärken werden."
 france.106.a:0 "Sozialisten und Kommunisten werden zusammenstehen!"	
 france.107.t:0 "Beliebte Schriftarten brechen zusammen"
 france.107.d:0 "Nach zwei Jahren intensiver Aktivität verlor die Volksfront ihren Elan und konnte angesichts der sich verschärfenden europäischen Krise nur noch provisorisch agieren. Die Arbeiter erhielten zwar wichtige neue Rechte, doch die 48-prozentige Lohnerhöhung wurde durch einen Preisanstieg von 46 Prozent zunichte gemacht. Die Arbeitslosigkeit blieb hoch, und die Industrieproduktion stagnierte insgesamt. Die Volksfront löste sich im Herbst 1938 auf, konfrontiert mit internen Meinungsverschiedenheiten im Zusammenhang mit dem Spanischen Bürgerkrieg, dem Widerstand der Rechten und den anhaltenden Auswirkungen der Weltwirtschaftskrise."
 france.107.a:0 "Camille Chautemps wird die neue Regierung führen"	
 france.108.t:0 "Belgien und Luxemburg einladen"
 france.108.d:0 "Um ein mögliches Wiederaufleben des aggressiven Expansionismus der alten Mittelmächte einzudämmen, hat Frankreich Belgien und Luxemburg aufgefordert, sich den Alliierten anzuschließen, um Hitlers Ambitionen Einhalt zu gebieten."
 france.108.a:0 "Wir müssen die Benelux-Länder schützen."
 france.108.b:0 "Wir wollen keinen wütenden Hitler."
 france.109.t:0 "Großbritannien akzeptiert das Bündnis"
 france.109.d:0 "Großbritannien begrüßt unsere Bemühungen und hat die Einladung Belgiens und Luxemburgs in das Bündnis angenommen."
 france.109.a:0 "Gerne können wir uns wieder Deutschland sichern."
 france.110.t:0 "Großbritannien lehnt das Bündnis ab"
 france.110.d:0 "Trotz unserer größten Bemühungen, den Verbündeten Unterstützung anzubieten, stieß unser jüngster Versuch, auf eines der Länder zuzugehen, auf Skepsis. Großbritannien weigerte sich, Belgien und Luxemburg in das Bündnis aufzunehmen."
 france.110.a:0 "Sie werden ein leichtes Ziel für Hitler sein!"
 france.111.t:0 "La Cagoule Coup"
 france.111.d:0 "La Cagoule, offiziell Geheimes Komitee der Revolutionären Aktion, ist eine französische faschistisch geprägte und antikommunistische Gruppe. Sie verübt Attentate, Bombenanschläge, Waffensabotage und andere gewalttätige Aktivitäten, um politische Instabilität zu schaffen. Mit Unterstützung des Militärs führten sie heute einen Staatsstreich durch. Das Kriegsrecht wurde ausgerufen, und angesichts der laufenden Veränderungen dürfte sich die Lage danach kaum ändern."
 france.111.a:0 "Der Militärstab übergibt Pétain die Führung."
 france.111.b:0 "Der General Franchet d&#39;Espèrey sollte das Land führen."
 france.112.t:0 "Nationalistisches Referendum"
 france.112.d:0 "Die Popularität der französischen Volkspartei (PPP) ist rasant gestiegen, und viele Nationalisten erheben nun den Anspruch, die Wünsche des Volkes zu vertreten. Die Forderung nach einem Referendum geht auf Jacques Doriot zurück, der die Parlamentswahlen wiederholen und eine Koalition mit Konservativen und Radikalen bilden will, um die politische Krise zu beenden. Die machtlose und unpopuläre Regierung muss Doriots Forderungen akzeptieren. Wenige Tage später gewinnt die Koalition die Mehrheit im Parlament und kann eine neue Regierung bilden."
 france.112.a:0 "Doriot wird die neue Regierung führen."
 france.113.t:0 "Frankreich fordert Wallonien"
 france.113.d:0 "Frankreich erhebt Anspruch auf Wallonien und stellt uns ein Ultimatum: Wenn wir die Provinz nicht überlassen, werden sie sie mit Gewalt einnehmen. "
 france.113.a:0 "Wir können nicht gegen sie kämpfen."
 france.113.b:0 "Wir geben unser Land niemals kampflos auf!"
 france.114.t:0 "Belgien akzeptiert"
 france.114.d:0 "Belgien hat unserer Forderung nachgegeben und uns Wallonien überlassen."
 france.114.a:0 "Die Wallonen sind jetzt Franzosen."
 france.115.t:0 "Belgien lehnt ab"
 france.115.d:0 "Belgien weigert sich, unserer Forderung nachzugeben und ist bereit zu kämpfen."
 france.115.a:0 "Sie kennen die Konsequenzen davon."
 france.116.t:0 "Geteilte Nachfrage der Schweiz"
 france.116.d:0 "Frankreich plant, die Schweiz in zwei Teile zu teilen, wobei wir den östlichen Teil erhalten. Sollten wir das akzeptieren?"
 france.116.a:0 "Ja, wir müssen dieses Land von der Karte entfernen!"
 france.116.b:0 "Nein, dafür ist jetzt nicht der richtige Moment."
 france.117.t:0 "Deutschland akzeptiert"
 france.117.d:0 "Hitler akzeptiert Ihren Plan, die Schweiz in zwei Teile zu spalten, und behauptet, Europa werde nun sowohl von Franzosen als auch von Deutschen regiert!"
 france.117.a:0 "Dank Ihrer neuen Freunde gehört Europa Ihnen!"
 france.118.t:0 "Deutschland lehnt ab"
 france.118.d:0 "Hitler lehnt Ihren Plan zur Teilung der Schweiz ab, da die weltpolitische Lage dafür nicht reif sei."
 france.118.a:0 "Das ist ein schrecklicher Fehler."
 france.119.t:0 "Pétain kehrt in die Regierung zurück"
 france.119.d:0 "Der Zweite Weltkrieg hat begonnen, und Pétain hat bereits mehrere Angebote, der Regierung beizutreten, abgelehnt. Er kritisiert das Parlament für die schlechte französische Waffenvorbereitung und die Kürzungen des Militärbudgets zwischen den Kriegen. Doch während des Krieges genoss Pétain als Frankreichs ranghöchster Soldat nach Fochs Tod und als menschlichster unserer Militärkommandanten ein hohes Ansehen. Wir sollten ihn jedoch erneut auffordern, in unsere Regierung einzutreten."
 france.119.a:0 "Pétain wird das Land einen"
 france.120.t:0 "Die Inflation sinkt"
 france.120.d:0 "Durch den aktuellen Krieg und die radikalen Maßnahmen der Regierung ist die Hyperinflation zurückgegangen und der Franken ist nun stabil."
 france.120.a:0 "Es wird unsere Positionen stärken"
 france.121.t:0 "Heilige Union"
 france.121.d:0 "Die Union Sacrée war ein politischer Waffenstillstand in Frankreich während des Ersten Weltkriegs, der die Regierung einen und in Kriegszeiten Solidarität schaffen sollte. In diesen schwierigen Zeiten kündigte die Regierung einen Deal mit den verschiedenen politischen Bewegungen an. Sie legten ihren Streit bei und kämpften für die Zukunft Frankreichs."
 france.121.a:0 "Es lebe Frankreich!"
 france.122.t:0 "Das Kabinett tritt zurück"
 france.122.d:0 "Die Abgeordnetenkammer wählte Reynaud mit nur einer Stimme Vorsprung zum Premierminister, da sich die meisten Abgeordneten seiner Partei enthielten. Die neue Regierung ist besonders instabil; viele Rechte forderten, Reynaud solle nicht Deutschland, sondern die Sowjetunion angreifen. Die Kammer zwang außerdem Daladier, den Reynaud persönlich für die Schwäche Frankreichs verantwortlich machte, zum Verteidigungs- und Kriegsminister."
 france.122.a:0 "Paul Reynaud wird die neue Regierung führen."
 france.123.t:0 "Wiederherstellung der Monarchie"
 france.123.d:0 "Heute hat Papst Pius XI. Jean d&#39;Orléans zum König des Königreichs Frankreich ernannt. Der neue Herrscher kündigte an, das Land in diesen unsicheren Zeiten zu führen."
 france.123.a:0 "Vive le Roi!"
 france.123.b:0 "Behalten Sie Charles Maurras an der Spitze des Landes."
 france.124.t:0 "Einladung zur französischen Fraktion"
 france.124.d:0 "Im Bemühen, ein neues Bündnis zu stärken und ein mögliches Wiederaufleben des aggressiven Expansionismus der alten Mittelmächte einzudämmen, hat Frankreich darum gebeten, dass wir uns einem Bündnis anschließen, dessen Ziel darin besteht, diese Nationen zusammenzubringen."
 france.124.a:0 "Gerne."
 france.124.b:0 "[Root.GetName] geht seinen eigenen Weg."
 france.125.t:0 "[From.GetName] tritt der französischen Fraktion bei"
 france.125.d:0 "Unser Plan, den deutschen Einfluss in Europa zu stoppen, macht Fortschritte. [From.GetLeader] begrüßt unsere Bemühungen und hat unsere Einladung zu einem Bündnis angenommen."
 france.125.a:0 "Wir sind dem Aufbau einer starken Fraktion einen Schritt näher gekommen."
 france.126.t:0 "[From.GetName] lehnt französisches Bündnis ab"
 france.126.d:0 "Trotz unserer Bemühungen, Unterstützung und Hilfe anzubieten, stieß unser jüngster Versuch, Kontakt zu einer der Nationen aufzunehmen, auf Skepsis. [From.GetLeader] hat sich geweigert, der Allianz beizutreten. Vielleicht zweifelt er an unseren Motiven oder befürchtet, dass eine zu enge Verbindung mit uns sie zur Zielscheibe machen könnte."
 france.126.a:0 "Sie könnten, soweit sie wissen, bereits ein Ziel sein!"
 france.127.t:0 "Schicksal der Benelux-Staaten"
 france.127.d:0 "Mit der Annexion Walloniens fehlt es an der deutschen Grenze an Verteidigungsanlagen. Um uns vor dem Reich zu schützen, müssen wir die Benelux-Staaten davon überzeugen, Ihrer Politik zu folgen."
 france.127.a:0 "Der Nordosten wird sicher sein."
 france.128.t:0 "Kommunistischer Staatsstreich"
 france.128.d:0 "Als sich die Führung und Armee der [Root.GetRulingParty] heute auf einen landesweiten Aufstand vorbereiteten, stellten einige Regierungsvertreter [Root.GetAdjective] [Root.GetLeader] kurzerhand unter Hausarrest und begannen Verhandlungen mit den Kommunisten. Unter dem Vorwand, die Ordnung zu wahren, sicherten die Verhandlungen de facto Positionen im neuen sozialistischen Staat für diejenigen, die kooperierten. Der Putsch war beendet, bevor ihn jemand stoppen konnte. Diejenigen, die kooperiert hätten, wurden nun vom neuen Regime inhaftiert, verbannt oder hingerichtet."
 france.128.a:0 "Um zu überleben, ist ein echter Kommunismus erforderlich."
 france.128.b:0 "CGT wird die Führung des Landes übernehmen."
 france.128.c:0 "Frankreich wird keine Marionette der Sowjets sein!"
 france.129.t:0 "Abkommen über wirtschaftliche Zusammenarbeit"
 france.129.d:0 "Um eine reibungslose militärische Zusammenarbeit zu gewährleisten, müssen wir einige wirtschaftliche und logistische Abkommen mit dem Vereinigten Königreich abschließen. Welche Maßnahmen müssen die Alliierten nun vorrangig ergreifen, nachdem das Abkommen unterzeichnet ist?"
 france.129.a:0 "Teilen Sie neue elektronische und industrielle Technologien"
 france.129.b:0 "Koordinieren Sie unsere militärische Logistik und Pläne"
 france.129.c:0 "Verhängen Sie Wirtschaftssanktionen gegen Deutschland"
 france.130.t:0 "Beauftragen Sie einen Materialdesigner"
 france.130.d:0 "Um den Bedarf an Ausrüstung für unsere Armee zu decken, können wir einen Materialdesigner engagieren. Was sollten wir wählen?"
 france.130.a:0 "MAB"
 france.130.b:0 "APX"
 france.130.c:0 "De Dion-Bouton"
 france.130.e:0 "Option für später speichern"
 france.131.t:0 "Beauftragen Sie einen Tankdesigner"
 france.131.d:0 "Um den Bedarf an Ausrüstung für unsere Armee zu decken, können wir einen Panzerkonstrukteur engagieren. Was sollten wir wählen?"
 france.131.a:0 "Lorraine-Dietrich"
 france.131.b:0 "Berlier"
 france.131.c:0 "Delaunay-Belleville"
 france.131.e:0 "Option für später speichern"
 france.133.t:0 "Französisches Ultimatum"
 france.133.d:0 "Frankreich drängt uns, einen „Beistandsvertrag“ mit ihnen zu unterzeichnen, der ihnen das Recht einräumen würde, Truppen auf unserem Territorium zu stationieren! Dies ist nichts weiter als ein kaum verhüllter Versuch, unser Land zu annektieren, doch wir können den an unserer Grenze stationierten Truppen kaum Widerstand leisten."
 france.133.a:0 "Akzeptiere das Unvermeidliche ..."
 france.133.b:0 "Sie werden unser Land mit Gewalt einnehmen müssen!"
 france.134.t:0 "Luxemburg legt vor"
 france.134.d:0 "Luxemburg hat sich unseren Forderungen gebeugt. Wir haben die derzeitige Regierung durch eine antideutsche ersetzt, und sie wird nun unserem Willen folgen."
 france.134.a:0 "Es gibt Safes aus Deutschland."
 france.135.t:0 "Luxemburg lehnt unser Angebot ab"
 france.135.d:0 "Luxemburg hat sich unverschämterweise dazu entschlossen, unser großzügiges Angebot eines gegenseitigen Beistandspakts gegen Deutschland abzulehnen! Wir müssen sie so schnell wie möglich mit Gewalt auf eine Linie bringen!"
 france.135.a:0 "Wir müssen die Luxemburger vor Deutschland schützen."
 france.136.t:0 "Französisches Ultimatum"
 france.136.d:0 "Frankreich drängt uns, einen „Beistandsvertrag“ mit ihnen zu unterzeichnen, der ihnen das Recht einräumen würde, Truppen auf unserem Territorium zu stationieren! Dies ist nichts weiter als ein kaum verhüllter Versuch, unser Land zu annektieren, doch wir können den an unserer Grenze stationierten Truppen kaum Widerstand leisten."
 france.136.a:0 "Akzeptiere das Unvermeidliche ..."
 france.136.b:0 "Sie werden unser Land mit Gewalt einnehmen müssen!"
 france.137.t:0 "Belgien reicht ein"
 france.137.d:0 "Belgien hat sich unseren Forderungen gefügt. Wir haben die derzeitige Regierung durch eine antideutsche ersetzt, und sie wird nun unserem Willen folgen."
 france.137.a:0 "Es gibt Safes aus Deutschland."
 france.138.t:0 "Belgien lehnt unser Angebot ab"
 france.138.d:0 "Belgien hat sich unverschämterweise dazu entschlossen, unser großzügiges Angebot eines gegenseitigen Beistandspakts gegen Deutschland abzulehnen! Wir müssen es so schnell wie möglich mit Gewalt auf eine Linie bringen!"
 france.138.a:0 "Wir müssen die Belgier vor Deutschland schützen."
 france.139.t:0 "Französisches Ultimatum"
 france.139.d:0 "Frankreich drängt uns, einen „Beistandsvertrag“ mit ihnen zu unterzeichnen, der ihnen das Recht einräumen würde, Truppen auf unserem Territorium zu stationieren! Dies ist nichts weiter als ein kaum verhüllter Versuch, unser Land zu annektieren, doch wir können den an unserer Grenze stationierten Truppen kaum Widerstand leisten."
 france.139.a:0 "Akzeptiere das Unvermeidliche ..."
 france.139.b:0 "Sie werden unser Land mit Gewalt einnehmen müssen!"
 france.140.t:0 "Niederlande reicht ein"
 france.140.d:0 "Die Niederlande haben sich unseren Forderungen gefügt. Wir haben die derzeitige Regierung durch eine antideutsche ersetzt, und sie wird nun unserem Willen folgen."
 france.140.a:0 "Es gibt Safes aus Deutschland."
 france.141.t:0 "Die Niederlande lehnen unser Angebot ab"
 france.141.d:0 "Die Niederlande haben sich unverschämterweise dazu entschlossen, unser großzügiges Angebot eines gegenseitigen Beistandspakts gegen Deutschland abzulehnen! Wir müssen sie so schnell wie möglich mit Gewalt auf eine Linie bringen!"
 france.141.a:0 "Wir müssen die Niederländer vor Deutschland schützen."
 france.142.t:0 "Französisches Protektoratsangebot"
 france.142.d:0 "Frankreich drängt uns, einen „Protektoratsvertrag“ mit ihnen zu unterzeichnen, der ihnen das Recht einräumen würde, Truppen auf unserem Territorium zu stationieren! Dies ist nichts weiter als ein kaum verhüllter Versuch, unser Land zu annektieren, doch wir können den an unserer Grenze stationierten Truppen kaum Widerstand leisten."
 france.142.a:0 "Akzeptiere das Unvermeidliche ..."
 france.142.b:0 "Sie werden unser Land mit Gewalt einnehmen müssen!"
 france.143.t:0 "Haiti unterwirft sich"
 france.143.d:0 "Haiti hat sich unseren Forderungen gefügt. Wir haben die derzeitige Regierung durch eine pro-französische ersetzt, und sie wird nun unserem Willen folgen."
 france.143.a:0 "So wie es sein sollte."
 france.144.t:0 "Haiti lehnt unser Angebot ab"
 france.144.d:0 "Haiti hat sich unverschämterweise entschieden, unser großzügiges Angebot eines Protektorats abzulehnen! Wir müssen sie so schnell wie möglich mit Gewalt unterwerfen!"
 france.144.a:0 "Wir müssen unsere ehemalige Kolonie jetzt mit Gewalt zurückerobern."
 france.145.t:0 "Frankreich fordert Katalonien"
 france.145.d:0 "Frankreich erhebt Anspruch auf Katalonien und stellt uns ein Ultimatum: Wenn wir die Provinz nicht überlassen, werden sie sie mit Gewalt einnehmen. "
 france.145.a:0 "Wir können nicht gegen sie kämpfen."
 france.145.b:0 "Wir geben unser Land niemals kampflos auf!"
 france.146.t:0 "Spanien akzeptiert"
 france.146.d:0 "Spanien hat unserer Forderung nachgegeben und uns Katalonien überlassen."
 france.146.a:0 "Die Katalanen sind jetzt Franzosen."
 france.147.t:0 "Spanien lehnt ab"
 france.147.d:0 "Spanien weigert sich, unserer Forderung nachzugeben und ist bereit zu kämpfen."
 france.147.a:0 "Sie kennen die Konsequenzen davon."
 france.148.t:0 "Wiederherstellung des Reiches"
 france.148.d:0 "Heute hat Papst Pius XI. Napoleon VI. zum Kaiser von Frankreich ernannt. Der neue Herrscher kündigte an, dass er das Land in diesen unsicheren Zeiten führen werde."
 france.148.a:0 "Es lebe der Kaiser!"
 france.149.t:0 "Jean d&#39;Orléans stirbt"
 france.149.d:0 "Gestern Nacht ist unser geliebter König Jean d&#39;Orléans friedlich im Schlaf gestorben. Trotz seines langen Exils hatte die Vorsehung es für angebracht befunden, ihm die Rückkehr ins Königreich noch vor seinem Tod zu ermöglichen. Seit seiner Rückkehr hat er unser Land gut geführt. Sein Sohn, Henri d&#39;Orléans, hat nun die Zügel der Nation übernommen und wird nach seiner Krönung als Henri VI. bekannt sein."
 france.149.a:0 "Der König ist tot, lang lebe der König!"
 france.150.t:0 "Französisches Gewerkschaftsangebot"
 france.150.d:0 "Frankreich drängt uns, einen „Unionsvertrag“ mit ihnen zu unterzeichnen, der ihnen das Recht einräumen würde, Truppen auf unserem Territorium zu stationieren! Dies ist nichts weiter als ein kaum verhüllter Versuch, unser Land zu annektieren, doch wir können den an unserer Grenze stationierten Truppen kaum Widerstand leisten."
 france.150.a:0 "Akzeptiere das Unvermeidliche ..."
 france.150.b:0 "Sie werden unser Land mit Gewalt einnehmen müssen!"
 france.151.t:0 "Spanien Akzeptieren"
 france.151.d:0 "Spanien hat unsere Forderungen akzeptiert. Wir haben die derzeitige Regierung durch eine pro-französische ersetzt, und sie wird nun unserem Willen folgen."
 france.151.a:0 "Vive le Roi!"
 france.152.t:0 "Spanien lehnt die Union ab"
 france.152.d:0 "Spanien hat sich unverschämterweise dazu entschlossen, unser großzügiges Angebot einer Union abzulehnen! Wir müssen es so schnell wie möglich mit Gewalt an die Macht bringen!"
 france.152.a:0 "Wir müssen das Land des Königs jetzt mit Gewalt einnehmen."
 france.153.t:0 "Wiederherstellung der Monarchie"
 france.153.d:0 "Heute hat Papst Pius XI. Alfons XIII. zum König des Königreichs Frankreich ernannt. Der neue Herrscher kündigte an, das Land in diesen unsicheren Zeiten zu führen."
 france.153.a:0 "Vive le Roi!"
 france.153.b:0 "Behalten Sie Charles Maurras an der Spitze des Landes."
 france.154.t:0 "Das Maginot-Projekt"
 france.154.d:0 "Nach den Erfahrungen des Ersten Weltkriegs entwarfen einige Architekten Pläne für eine Befestigungslinie an unseren Grenzen, um solche Vorkommnisse in Zukunft zu verhindern. Kriegsminister André Maginot drängt auf dieses Projekt und möchte unsere Haltung dazu erfahren. Einige Berichte deuten darauf hin, dass dieses Projekt unsere Wirtschaft schädigen und eine Geldverschwendung sein könnte, während andere es als brillanten strategischen Plan bezeichnen. Was sollen wir tun?"
 france.154.a:0 "Lass es uns bauen!"
 france.154.b:0 "Nein, die Deutschen sehen nicht mehr aggressiv aus"
 france.154.a.tooltip:0 "§CDies wird zum Bau der Maginot-Linie führen§!"
 france.155.t:0 "Das Schicksal der kleinen Entente"
 france.155.d:0 "Angesichts der deutschen Remilitarisierung baten uns Diplomaten aus Rumänien, Jugoslawien und der Tschechoslowakei, unsere aktuelle politische Haltung gegenüber ihren jeweiligen Regierungen zu klären. Werden wir sie im Falle eines Konflikts mit den Deutschen unterstützen?"
 france.155.a:0 "Nein, wir sollten aus dem Pakt aussteigen"
 france.155.b:0 "Ja, wir müssen gemeinsam gegen Deutschland kämpfen!"
 france.155.a.tooltip:0 "„Dadurch werden die Garantien aufgehoben, aber auch die Unruhen in der Bevölkerung werden reduziert.“"
 france.155.b.tooltip:0 "„Dadurch bleiben die Garantien erhalten, es wird jedoch zu verstärkten Unruhen in der Bevölkerung kommen und möglicherweise sogar einen Bürgerkrieg auslösen.“"
 ww1_france.65.t:0 "Das Madrider Übereinkommen"
 ww1_france.65.d:0 "Angesichts der Situation in Nordafrika und insbesondere in Marokko müssen wir einen Pakt mit der spanischen Regierung unterzeichnen, um diese Gebiete zu sichern und so künftige Konflikte zu verhindern. Die spanische Regierung schlug uns einige Optionen vor, und wir einigten uns auf die Aufteilung Marokkos zwischen unseren beiden Ländern."
 ww1_france.65.a:0 "Teilt es!"
 ww1_france.60.t:0 "Eine weitere Revolution?"
 ww1_france.60.d:0 "Heute Morgen griffen kommunistische Guerillas Mitglieder der Action Française an und lösten damit landesweite Rebellionen aus. Die Action Française schloss eine Koalition mit Alt-Right-Parteien, um die Ausbreitung des Kommunismus zu stoppen. Kommunisten und Syndikalisten verbündeten sich und riefen landesweite Streiks aus."
 ww1_france.60.a:0 ""
 ww1_france.68.t:0 "Cheminots-Streiks"
 ww1_france.68.d:0 "Die Gewerkschaften der Nordbahn forderten einen Mindestlohn von 5 Francs pro Tag. Da die Regierung dies jedoch ablehnte, beschloss das zentrale Streikkomitee zu handeln. Schnell breiteten sich die Streiks im ganzen Land aus. Wenn wir nicht schnell handeln, droht uns eine völlige Lähmung der Industrie, da sich immer mehr Männer den Streiks anschließen."
 ww1_france.68.a:0 "Schicken Sie die Truppen"
 ww1_france.68.b:0 "Wir müssen einen Kompromiss finden"
 ww1_france.69.t:0 "Parlamentswahlen von 1910"
 ww1_france.69.d:0 "Heute haben die französischen Bürger ihre Abgeordneten im Parlament gewählt. Es gab mehrere Optionen, aber die beiden wichtigsten Kräfte sind entweder eine Mitte-links- oder eine Mitte-rechts-Koalition. Es ist noch unklar, welche dieser beiden Kräfte die Mehrheit hat, da die Stimmen noch ausgezählt werden."
 ww1_france.69.a:0 "Klassischer Mitte-Links-Sieg"
 ww1_france.69.b:0 "Ein unerwarteter Sieg der Mitte-Rechts-Partei"
 ww1_france.70.t:0 "Der graue Sonntag"
 ww1_france.70.d:0 "Der Tag begann wie üblich, alles war ruhig, abgesehen von ein paar Streiks in verschiedenen Fabriken. Doch gegen 12 Uhr tauchte eine Gruppe Milizen in grauen Hemden auf und eröffnete das Feuer auf die Streikenden. Hunderte von Menschen starben und es herrscht immer noch Unruhe, da diese Milizengruppe von einem Streik zum nächsten zieht und Chaos und Tod verursacht."
 ww1_france.70.a:0 "Was für eine Katastrophe"
 
 ww1_france.71.t:0 "Die Zürcher Konferenz"
 ww1_france.71.d:0 "Die Franzosen und die Österreicher haben sich in Zürich geeinigt: Sie wollen uns Norditalien wegnehmen! Sie haben uns ein Ultimatum bezüglich dieser Gebiete gestellt. Was sollen wir antworten?"
 ww1_france.71.a:0 "Wir haben keine Wahl..."
 ww1_france.71.b:0 "Fahr zur Hölle!"
 ww1_france.72.t:0 "Italien akzeptierte das Ultimatum"
 ww1_france.72.d:0 "[FROM.GetLeader] reagierte weise auf unser Ultimatum. Durch die Abtretung Norditaliens verhinderte er einen schrecklichen Krieg, der in ganz Italien Tausende Todesopfer gefordert hätte."
 ww1_france.72.a:0 "Ein weiser Mann ..."
 ww1_france.73.t:0 "Italien lehnt Ultimatum ab"
 ww1_france.73.d:0 "Heute Abend ist ein Telegramm von [FROM.GetLeader] eingetroffen: Er lehnt unser Ultimatum bezüglich Norditalien ab und antwortete außerdem, dass Italien zu einem Krieg um diese Gebiete bereit sei."
 ww1_france.73.a:0 "Dann ist es Krieg"



 ww1_france.74.t:0 "Die Namur-Vereinbarungen"
 ww1_france.74.d:0 "[GER.GetLeader] und [FRA.GetLeader] haben ein Abkommen unterzeichnet, in dem sie über die Zukunft der Niederlande diskutieren. Deutschland strebt die Eingliederung des niederländischsprachigen Teils Belgiens in eine befreundete niederländische Regierung an, Frankreich die Eingliederung des französischsprachigen Teils Belgiens in Frankreich! Dieses Abkommen markiert das Ende Belgiens und Luxemburgs und den Beginn prodeutscher Niederlande."
 ww1_france.74.a:0 "Wir können nichts tun"
 ww1_france.74.b:0 "Nimm die Waffen!"
 ww1_france.75.t:0 "[FROM.GetName] akzeptiert Integration"
 ww1_france.75.d:0 "Heute Morgen hat [FROM.GetLeader] die Namur-Vereinbarungen unterzeichnet, in denen [FROM.GetName] nun Teil von"
 ww1_france.75.a:0 "Ein historischer Tag!"
 ww1_france.76.t:0 "[FROM.GetName] wird scharfgeschaltet"
 ww1_france.76.d:0 "[FROM.GetName] hat beschlossen, alle diplomatischen Beziehungen zu unserer Regierung abzubrechen, und Geheimdienstinformationen deuten darauf hin, dass sie sich bewaffnen"
 ww1_france.76.a:0 "Narren!"
 ww1_france.77.t:0 "Deutsch-Französisches Abkommen"
 ww1_france.77.d:0 "Wir haben mit den Deutschen eine Vereinbarung getroffen. Es gibt zwei Vorschläge: Entweder wir überlassen Marokko den Deutschen oder wir geben ihnen Teile unserer Kolonien in Afrika. Was sollen wir tun?"
 ww1_france.77.a:0 "Gebt ihnen Kolonien in Afrika"
 ww1_france.77.b:0 "Gib ihnen Marokko"
 ww1_france.78.t:0 "Präsidentschaftswahl 1913"
 ww1_france.78.a:0 "Poincaré wird gewählt"


 ww2_france.10.t:0"Stavisky-Affäre"
 ww2_france.10.d:0"Der Finanzier Alexandre Stavisky wurde von der Polizei tot aufgefunden. Offiziellen Berichten zufolge beging er Selbstmord. Es gibt jedoch Verbindungen zu unserem Premierminister. Zahlreiche Briefe belegen Verbindungen zwischen dem Finanzier und verschiedenen Abgeordneten. Korruptionsfragen werden aufgeworfen, und viele Stimmen fordern den Rücktritt unseres Premierministers."
 ww2_france.10.a:0"Sie sind alle korrupt"
 FRA_toppled_govt:0"§R Die Regierung wird gestürzt§! Dies erfordert eine neue Regierungsform"
 ww2_france.11.t:0"Demonstrationen in Paris!"
 ww2_france.11.d:0"Heute trafen sich rechtsextreme Gruppen in der Concorde, direkt vor der Nationalversammlung. Nach der Stavisky-Affäre fordern viele von ihnen den Rücktritt des Premierministers. Gerüchten zufolge handelt es sich um einen Staatsstreich, doch die Menge scheint sich bislang relativ friedlich zu verhalten, für den Fall, dass die Polizei auf dem Weg ist. Was tun, wenn die Situation außer Kontrolle gerät?"
 ww2_france.11.a:0"Wir sollten in Erwägung ziehen, das Feuer zu eröffnen ..."
 ww2_france.11.b:0"Lass sie rein, sie sind schließlich friedlich ..."
 ww2_france.12.t:0"Eine neue Regierung"
 ww2_france.12.d:0"Nach dem Ende der „korrupten Republik“ müssen wir nun eine neue Regierungsform einführen. Während einige unserer Mitglieder eine neue Republik wollen, fordern andere ein autoritäres Regime. Welchem Schritt wollen wir folgen?"
 ww2_france.12.a:0"Action Française – Solidarité Française"
 FRA_AF_SF_tt:0"„Action Française“ und „Solidarité Française“ sind zwei Bewegungen, die die „Monarchie“ in unserem Land wiederherstellen wollen."
 ww2_france.12.b:0"Jeunesses Patriotes"
 FRA_JP_tt:0"Die Jeunesses Patriotes sind eine bonapartistische Bewegung, die einen Kaiser wieder auf den französischen Thron setzen will."
 ww2_france.12.c:0"Parti Franciste"
 FRA_PF_tt:0"§RParti Franciste§! ist eine §Ybonapartistisch-faschistische§! Bewegung, deren Ziel die Förderung des „internationalen Faschismus“ und die Zusammenarbeit mit anderen faschistischen Regierungen ist."
 ww2_france.12.e:0"Kreuz des Feuers"
 FRA_CdF_tt:0"„Roix de Feu“ ist eine „nationalistische“ Bewegung von Veteranen, deren Ziel die Schaffung einer neuen und gerechteren „Republik“ ist."

