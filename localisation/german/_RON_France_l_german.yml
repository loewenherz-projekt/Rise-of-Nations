 FRA_jet_fighter_equipment_1_desc:0 "Die Dassault MD450 Ouragan war der erste in Frankreich entwickelte Düsenjäger, der in Produktion ging, und spielte eine Schlüsselrolle beim Wiederaufleben der französischen Luftfahrtindustrie nach dem Zweiten Weltkrieg. Die Ouragan wurde von Frankreich, Indien, Israel und El Salvador eingesetzt. Nach dem Krieg war der Flugzeugkonstrukteur Marcel Dassault bestrebt, die Luftfahrtindustrie mit einem rein französischen Düsenjäger wiederzubeleben, der 1947 skizziert wurde. Die Ouragan war kleiner und leichter als der Thunderjet und hatte dünne Flügel, ähnlich denen der Lockheed F-80 Shooting Star."
 FRA_jet_fighter_equipment_2:0 "Dassault MD 550 Mirage"
 FRA_jet_fighter_equipment_2_short:0 "Dassault Mirage"
 FRA_jet_fighter_equipment_2_desc:0 "Die Dassault MD 550 Mirage war ein Prototyp, der Mitte der 50er Jahre entworfen wurde. Die MD-550 Mirage schaffte es nicht in die Massenproduktion, aber die Forschungen führten zur Entwicklung der Dassault Mirage III, dem ersten Flugzeug der Mirage-Familie."
 FRA_jet_tac_bomber_equipment_1:0 "Dassault MD.452 Mystère"
 FRA_jet_tac_bomber_equipment_1_short:0 "Dassault Mystère"
 FRA_jet_tac_bomber_equipment_1_desc:0 "Die Dassault MD.452 Mystère ist ein französischer Jagdbomber aus den 1950er Jahren. Nach dem Erfolg der Ouragan arbeitete Dassault an einer darauf basierenden Weiterentwicklung, die Anfang 1951 als MD.452 Mystère I in die Luft ging. 171 Exemplare wurden gebaut."
 FRA_jet_tac_bomber_equipment_2:0 "Sud-Ouest Aviation Vautour II (SO 4050)"
 FRA_jet_tac_bomber_equipment_2_short:0 "Vautour II"
 FRA_jet_tac_bomber_equipment_2_desc:0 "Die SO 4050 Vautour II der Sud-Ouest Aviation (SNCASO) war ein französischer Bomber, Abfangjäger und Schlachtflugzeug. Im Juni 1951 forderten die Franzosen ein Düsenflugzeug, das als Bomber, Tiefflugjäger oder Allwetter-Abfangjäger eingesetzt werden konnte. SNCASO passte ihre vorhandene SO 4000 für diesen Zweck an. Der erste Prototyp der SO 4050 absolvierte seinen Erstflug am 16. Oktober 1952."
 FRA_jet_strat_bomber_equipment_1:0 "Dassault Mirage IV"
 FRA_jet_strat_bomber_equipment_1_short:0 "Mirage IV"
 FRA_jet_strat_bomber_equipment_1_desc:0 "Die Dassault Mirage IV war ein französischer strategischer Überschallbomber mit Düsenantrieb und Tiefenaufklärungsflugzeug. In den 1950er Jahren startete Frankreich ein umfangreiches Militärprogramm zur Produktion von Atomwaffen. Man erkannte jedoch, dass die vorhandenen französischen Flugzeuge für den Transport dieser Waffen ungeeignet waren. Daher begann 1956 die Entwicklung eines Überschallbombers für diese Aufgabe als Teil der umfassenden Entwicklung der unabhängigen französischen nuklearen Abschreckung."
 
 
