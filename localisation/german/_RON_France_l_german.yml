 worldnews.1.t:0 "Allianz mit den Benelux-Ländern"
 worldnews.1.d:0 "Frankreich, Belgien und Luxemburg haben mit Zustimmung Großbritanniens einen gemeinsamen Verteidigungspakt unterzeichnet. Der frühere Pakt wurde 1936 aufgelöst, als Belgien wieder eine Neutralitätspolitik verfolgte. Angesichts der faschistischen Bedrohung aus dem Osten wollten die Alliierten jedoch ein starkes Bündnisnetzwerk aufbauen, das die deutsche Machtausbreitung in Europa verhindern konnte."
 worldnews.1.a:0 "Die Alliierten werden stärker."
 worldnews.2.t:0 "Frankreich setzt die Benelux-Länder unter Druck"
 worldnews.2.d:0 "ZU TUN"
 worldnews.2.a:0 "ZU TUN"
 worldnews.3.t:0 "Frankreich annektiert Wallonien"
 worldnews.3.d:0 "ZU TUN"
 worldnews.3.a:0 "ZU TUN"
 worldnews.4.t:0 "Restaurierung in Frankreich"
 worldnews.4.d:0 "ZU TUN"
 worldnews.4.a:0 "Vive le Roi!"
 worldnews.5.t:0 "Die Pariser Weltausstellung" 
 worldnews.5.d:0 "Frankreich ist stolz, mit großem Tamtam die Weltausstellung 1937 eröffnen zu können. In Paris, auf einer Fläche von etwa 101 Hektar, präsentieren 44 Länder 1421 Pavillons rund um das Thema „Kunst und Technik im modernen Leben“. Fast 32 Millionen Besucher werden angereist kommen. Zu dieser Zeit wird Paris noch den Palais Chaillot, den Palais des Étés und den Palais de Tokyo besitzen. Der Geist und die neue Kunst triumphieren überall. Die Welt möchte für einen Augenblick glauben, dass die Ausstellung endlich alles zusammenbringen wird, was die Menschen verbindet. Doch die Stimmung wird von den beiden monumentalen sowjetischen und deutschen Pavillons berührt, die sich gegenseitig herausfordern: der eine mit einer 25 Meter hohen Statue eines Arbeiters und einer Kolchosbäuerin, die Hammer und Sichel schwingen; der andere mit einer monumentalen Skulptur eines Adlers, der ein Hakenkreuz in seinen Krallen hält."
 worldnews.5.a:0 "Ein großer weltweiter Erfolg" 
 worldnews.6.t:0 "FIFA Fussball-Weltmeisterschaft 1938"
 worldnews.6.d:0 "Die Fußballweltmeisterschaft findet in Frankreich statt. Die achtzehn aufeinanderfolgenden Spiele begeistern die Welt, und 376.000 Zuschauer strömten in die französischen Stadien. Die 34 teilnehmenden Länder liefern sich einen erbitterten Kampf, doch schließlich gewinnt Italien das Finale gegen Ungarn. Das Land ist zum zweiten Mal Weltmeister. Der Brasilianer Leônidas da Silva, bekannt als der „Schwarze Diamant“, ist mit seiner persönlichen Technik, dem „Fallrückzieher“, der beste Stürmer des Turniers."
 worldnews.6.a:0 "Italien verteidigte den Meistertitel."

