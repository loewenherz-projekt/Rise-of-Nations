	#### ECONOMIC ####
 FRA_economic_reforms:0 "Wirtschaftsreformen"
 FRA_economic_reforms_desc:0 "Die französische Wirtschaft befindet sich in einer prekären Lage. Wir müssen Wirtschaftsreformen einleiten, um die Inflation zu bekämpfen, den Franc zu stabilisieren und das Staatsdefizit zu senken."
 FRA_devaluation:0 "Frankenabwertung"
 FRA_devaluation_desc:0 "Der einzige wirksame Weg, die Inflation schnell loszuwerden, besteht darin, die Währung abzuwerten, wenn nötig auch mehrmals."
 FRA_budget_deficit_law:0 "Haushaltsdefizitgesetz"
 FRA_budget_deficit_law_desc:0 "Das Staatsdefizit muss durch drastische Maßnahmen wie die Kürzung der öffentlichen Ausgaben gesenkt werden."
 FRA_exchange_rate_stabilisation:0 "Wechselkursstabilisierung"
 FRA_exchange_rate_stabilisation_desc:0 "Die Exporte sind aufgrund des hohen Frankenwerts zurückgegangen. Wir können einen Devisenstabilisierungsfonds schaffen, um die Inflation und die Kapitalflucht zu bekämpfen."
 FRA_agriculture_national_office:0 "Nationales Landwirtschaftsamt"
 FRA_agriculture_national_office_desc:0 "Um den Getreidemarkt zu stabilisieren, könnten wir ein neues Amt einrichten, das den Import/Export kontrolliert und einen gerechten Preis festlegt."
 FRA_bank_france:0 "Verstaatlichung der Bank von Frankreich"
 FRA_bank_france_desc:0 "Wir haben den Status der Bank von Frankreich bereits 1936 reformiert, aber um die wirtschaftliche Lage wieder in den Griff zu bekommen, müssen wir sie verstaatlichen. "
 FRA_national_department_state_market:0 "Nationales Ministerium für staatliche Märkte"
 FRA_national_department_state_market_desc:0 "Dieses neue Amt wird die öffentlichen Aufträge zentralisieren und die Kreditvergabe an Unternehmen flexibler gestalten."
 
	#### NATIONALISATION ####
 FRA_nationalisation:0 "Verstaatlichungsmaßnahmen"
 FRA_nationalisation_desc:0 "Mit dem Budget des Nationalen Verteidigungsfonds können wir die Verstaatlichung von Industriebetrieben erzwingen, um die Produktionseffizienz zu steigern. Dies würde jedoch unsere Beziehungen zur Industrie verschlechtern, und „im Krieg werden wir dazu nicht in der Lage sein.“"
 FRA_nationalize_industy:0 "Industriekonzernintegration"
 FRA_nationalize_industy_desc:0 "Wir können Industrieunternehmen verstaatlichen, um unsere zivilen Fabriken zu vergrößern, aber sie werden in Zukunft für unsere Regierung nicht mehr nutzbar sein."
 FRA_nationalize_industy_1:0 ""
 FRA_nationalize_industy_2:0 ""
 FRA_nationalize_industy_3:0 ""
 FRA_nationalize_military_complex:0 "Verstaatlichung des Militärkomplexes"
 FRA_nationalize_military_complex_desc:0 "Wir können Panzer- und Materialentwickler verstaatlichen, um unsere Militärfabriken zu vergrößern, aber sie werden in Zukunft für unsere Regierung nicht mehr nutzbar sein."
 FRA_nationalize_military_complex_1:0 ""
 FRA_nationalize_military_complex_2:0 ""
