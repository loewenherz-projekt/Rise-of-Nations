###Interwar Events
will_unlock_eco_foc:0 "§YDieser Fokus ermöglicht Ihnen weitere wirtschaftliche Schwerpunkte zu setzen§!"
INT_france.1.t:0 "Besetzung des Ruhrgebiets"
INT_france.1.d:0 "Aufgrund der ausstehenden Zahlungen für die Kriegsentschädigungen beschlossen die Entente-Mächte, das Ruhrgebiet zu besetzen, um die deutsche Regierung zur Zahlung ihrer Reparationen zu zwingen."
INT_france.1.a:0 "Sie werden bezahlen!"
INT_france.2.t:0 "Die Ruhrbesetzung"
INT_france.2.d:0 "Die Entente-Mächte besetzen das Ruhrgebiet, weil wir ihrer Meinung nach nicht genügend Reparationen zahlen."
INT_france.2.a:0 "Warte, was?"
INT_france.5.t:0 "Frankreich fordert höhere Reparationen"
INT_france.5.d:0 "Die französische Regierung forderte von uns höhere Reparationszahlungen. Diese Reparationszahlungen lähmen bereits unsere Wirtschaft und es scheint, als wolle man sie völlig zerstören."
INT_france.5.a:0 "Sie wollen wirklich unser Ende ..."
INT_france.6.t:0 "Frankreich hat unsere Schulden reduziert"
INT_france.6.d:0 "Die französische Regierung wandte sich an uns und sah, wie schlecht unsere Wirtschaft war. Sie setzte die Reparationszahlungen aus."
INT_france.6.a:0 "So schlimm sind sie schließlich nicht"
INT_france.4.t:0 "Die Entente zieht sich aus unseren Ländern zurück"
INT_france.4.d:0 "Die Entente-Mächte beschlossen, sich aus unseren Gebieten zurückzuziehen. Offenbar haben sie bekommen, was sie wollten. Wir werden diese Länder zurückbekommen!"
INT_france.4.a:0 "Es ist endlich vorbei"

