france.200.t:0 "[FRA.GetName] Fordert Reparationen zur Finanzierung einer Mauer in Lothringen!"
france.200.d:0  "Frankreich will eine Mauer um [28.GetName] errichten. Das würde es uns erschweren, das Gebiet zurückzuerobern. Wir sind jedoch nicht in der Lage, etwas anderes zu verlangen. Wenn wir die Zahlungen verweigern, könnten wir noch mehr Schulden machen. Was sollen wir tun?"
france.200.a:0 "Wir werden ihnen unser Geld geben ..."
france.200.b:0 "Von uns bekommen sie keinen Cent!"
france.201:0 "Die Deutschen werden darüber nicht glücklich sein …"
INT_FRA_CESE:0 "CESE"

 france.236.t:0 "Französisches Ultimatum"
 france.236.d:0 "Frankreich drängt uns, einen „Beistandsvertrag“ mit ihnen zu unterzeichnen, der ihnen das Recht einräumen würde, Truppen auf unserem Territorium zu stationieren! Dies ist nichts weiter als ein kaum verhüllter Versuch, unser Land zu annektieren, doch wir können den an unserer Grenze stationierten Truppen kaum Widerstand leisten."
 france.236.a:0 "Akzeptiere das Unvermeidliche ..."
 france.236.b:0 "Sie werden unser Land mit Gewalt einnehmen müssen!"
 france.237.t:0 "Flandern reicht ein"
 france.237.d:0 "Flandern hat sich unseren Forderungen gefügt. Wir haben die derzeitige Regierung durch eine antideutsche ersetzt, und sie wird nun unserem Willen folgen."
 france.237.a:0 "Es gibt Safes aus Deutschland."
 france.238.t:0 "Flandern lehnt unser Angebot ab"
 france.238.d:0 "Flandern hat sich unverschämterweise dazu entschlossen, unser großzügiges Angebot eines gegenseitigen Beistandspakts gegen Deutschland abzulehnen! Wir müssen es so schnell wie möglich mit Gewalt auf eine Linie bringen!"
 france.238.a:0 "Wir müssen die Flamen vor Deutschland schützen."
