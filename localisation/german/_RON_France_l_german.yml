 MOR_sultan_diplomacy:0 "Sultan-Diplomatie"
 MOR_sultan_diplomacy_desc:0 "In diesen schwierigen Zeiten muss die Regierung ihre Autorität bekräftigen. Der Sultan wird das Königreich führen und versuchen, sowohl die Nationalisten als auch den französischen General zu beschwichtigen. Doch für die Zukunft Marokkos muss eine klare Entscheidung getroffen werden."
 MOR_nationalist_movement_pressure:0 "Druck nationalistischer Bewegungen"
 MOR_nationalist_movement_pressure_desc:0 "Wir haben Frankreich viel gegeben, aber nur wenig zurückbekommen. Wir sollten auf die verschiedenen nationalistischen Gruppen zugehen, um unsere Position zu sichern und über unsere Freiheit nachzudenken."
 MOR_french_resident_governance:0 "Verwaltung der Einwohner Frankreichs"
 MOR_french_resident_governance_desc:0 "Nach dem Krieg im Osten Frankreichs haben wir gesehen, was Frankreich tun kann, um einen Aufstand zu unterdrücken. Es liegt in Ihrem Interesse, Ihre Unabhängigkeit auf friedlichem Wege zu erlangen, indem Sie mit dem Generalresidenten zusammenarbeiten."
 MOR_moroccan_action_committee:0 "Marokkanisches Aktionskomitee"
 MOR_moroccan_action_committee_desc:0 "Die stark gespaltene nationalistische Bewegung gewinnt an Zusammenhalt. Sie zeigt, dass die Marokkaner nach dem Ersten Weltkrieg die reale Möglichkeit eines politischen Wandels in Betracht ziehen."
 MOR_moroccans_advisors:0 "Marokkanische Berater"
 MOR_moroccans_advisors_desc:0 "Der erste Schritt zur Wiedererlangung unserer Unabhängigkeit besteht darin, die Kontrolle über die eigenen Institutionen zurückzugewinnen. Durch die Zulassung marokkanischer Berater wird der Sultan seinen Einfluss auf die Landesführung festigen."
 MOR_moroccans_advisors_tooltip:0 "§YSchalte marokkanische politische Berater frei.§!\n"
 MOR_marocco_reforms_plan:0 "Reformplan Marokkos"
 MOR_marocco_reforms_plan_desc:0 "Der Sultan hat einen Reformplan vorgeschlagen, um Entscheidungen und Autorität in marokkanischen Händen zu zentralisieren. Es ist "
 MOR_abolish_indigena_statut:0 "Abschaffung des Indigena-Statuts"
 MOR_abolish_indigena_statut_desc:0 "Da Marokkaner nicht unter den Code de l’Indigénat fallen, können wir eine Kampagne gegen diese barbarischen Gesetze starten. Ein minderwertiger Rechtsstatus sollte im Kolonialreich nicht existieren."
