 YUG_idea_German_Dependent_Economy:0 "Deutsche abhängige Wirtschaft"
 YUG_idea_German_Dependent_Economy_desc:0 "Fast die Hälfte unserer Exporte und Importe entfällt auf die Deutschen, was ihnen über die Wirtschaft einen erheblichen Einfluss auf die Politik des Landes verleiht."
 YUG_idea_Croatian_Dissedence:0 "Politische Uneinigkeit"
 YUG_idea_Croatian_Dissedence_desc:0 "Kroatische, bosnische und slowenische Elemente zuvor verbotener Parteien haben eine Koalition gebildet und setzen ihre Bemühungen gegen die königliche Jugoslawische Radikale Union fort."
 YUG_idea_Croatian_Dissedence2:0 "Politische Zugeständnisse"
 YUG_idea_Croatian_Dissedence3:0 "Politische Unterdrückung"
 YUG_idea_Great_Depression:0 "Große Depression"
 YUG_idea_Great_Depression_desc:0 "Die Weltwirtschaftskrise traf die Agrarwirtschaft Südeuropas wie ein Schlag, auch unser Land. Fast alle Branchen, auch die Wissenschaft, waren betroffen. Es müssen Anstrengungen unternommen werden, um die Depression mit radikalen oder konventionellen Methoden zu bekämpfen."
 YUG_idea_Great_Depression2:0 "Langsame Erholung"
 YUG_idea_Great_Depression3:0 "Erholung der Wirtschaft"
 YUG_idea_Great_Depression4:0 "Stabilisierung der Wirtschaft"
 YUG_idea_Prince_Paul:0 "Prinzregent Paul"
 YUG_idea_Prince_Paul_desc:0 ""
 YUG_idea_Peter_II:0 "Peter II"
 YUG_idea_Ultranationalist_Movements:0 "Ultranationalistische Bewegungen"
 YUG_idea_Ultranationalist_Movements_desc:0 "In Kroatien und Mazedonien grassiert der Ultranationalismus. Solange er weiterhin aktiv ist, wird er in seinen Einsatzgebieten Chaos verursachen."
 YUG_Skoda_artillery:0 "Skoda Artillerie"
 YUG_idea_German_Dependent_Economy2:0 "Deutscher wirtschaftlicher Rückzug"
 YUG_idea_German_Dependent_Economy2_desc:0 "In einem neuen Bemühen, unseren Handel auszuweiten und den deutschen Druck auf unser Land zu verringern, haben wir den deutschen wirtschaftlichen Einflussbereich in Frage gestellt. Dies wird verheerende Auswirkungen auf unsere Wirtschaft haben, aber wir können uns davon erholen."
 YUG_idea_German_Dependent_Economy3:0 "Wirtschaftliche Erholung des Handels"
 YUG_idea_German_Dependent_Economy3_desc:0 "In einem neuen Bemühen, unseren Handel auszuweiten und den deutschen Druck auf unser Land zu verringern, haben wir den deutschen wirtschaftlichen Einflussbereich in Frage gestellt. Dies wird verheerende Auswirkungen auf unsere Wirtschaft haben, aber wir können uns davon erholen."
 YUG_idea_German_Dependent_Economy4:0 "Erhöhter Handel"
 YUG_idea_German_Dependent_Economy5:0 "Handelszentriert"
 YUG_idea_German_Dependent_Economy6:0 "Niederländer des Balkans"
 YUG_idea_German_Dependent_Economy6_desc:0 "Nachdem wir uns vollständig von unserer Entscheidung erholt hatten, uns aus der deutschen Einflusssphäre zu lösen, ist Jugoslawien beinahe zum Zentrum des gesamten Handels auf dem Balkan geworden. Wir stehen nur hinter den Rumänen und ihrem Öl an zweiter Stelle."
 YUG_idea_Embrace_Socialism:0 "Umarme den Sozialismus"
 YUG_idea_Embrace_Socialism2:0 "Jugoslawischer Einfluss"
 YUG_idea_Workers_Militia:0 "Arbeitermiliz"
 YUG_idea_German_Sanctions:0 "Deutsche Sanktionen"
 YUG_idea_German_Sanctions2:0 "Umfangreiche deutsche Sanktionen"
