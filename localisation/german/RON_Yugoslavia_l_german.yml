 YUG_Ultranationalism_Category_desc:0 "Radikale Parteien aus Kroatien und Mazedonien verteidigen ihre Unabhängigkeit, indem sie Schlüsselindustrien und die lokale Polizei angreifen. Solange sie keine Zugeständnisse machen, werden sie in weiten Teilen des Landes weiterhin Chaos verursachen."
