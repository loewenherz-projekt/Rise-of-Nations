 YUG_Trade_Category:0 "Außenhandel"
 YUG_Trade_Category_desc:0 "Um unsere Wirtschaft zu sanieren und die Ordnung im Land wiederherzustellen, müssen wir Handelsabkommen mit den anderen Mächten Europas anstreben."
