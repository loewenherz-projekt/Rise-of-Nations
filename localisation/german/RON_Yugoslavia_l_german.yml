 YUG_Formable_Nation:0 "Jugoslawisches Reich"
 YUG_Formable_Nation_desc:0 "Nachdem wir unser Ziel der Vereinigung der südslawischen Völker erreicht haben, können wir im Namen dieser Sache endlich ein Imperium errichten."
 YUG_Serb_Empire:0 "Errichtung des jugoslawischen Reiches"
 YUG_Formable_Nation2:0 "Byzantinisches Reich"
 YUG_Formable_Nation2_desc:0 "Unsere Eroberungen waren weitreichend und haben die Aufgaben unserer Vorfahren beinahe wiedergutgemacht. Mit den Ländern, die wir nun besitzen, können wir endlich wieder Anspruch auf Rom erheben und seinem Namen wieder zu Ruhm verhelfen."
 YUG_Byzantine:0 "Gründung des Byzantinischen Reiches"
