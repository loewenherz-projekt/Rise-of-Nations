###################### YUGO MOD ################################

yugoslavia.10.t:0 "Militärfabrik sabotiert!"
yugoslavia.10.d:0 "Es scheint, dass ultranationalistische Organisationen aus Kroatien und Mazedonien eine unserer Militärfabriken bombardiert haben. Wenn nichts unternommen wird, werden sie das Land höchstwahrscheinlich weiterhin terrorisieren."
yugoslavia.10.a:0 "Das ist inakzeptabel."
yugoslavia.11.t:0 "Zivile Fabrik sabotiert!"
yugoslavia.11.d:0 "Es scheint, dass ultranationalistische Organisationen aus Kroatien und Mazedonien eine unserer zivilen Fabriken bombardiert haben. Wenn nichts unternommen wird, werden sie das Land höchstwahrscheinlich weiterhin terrorisieren."
yugoslavia.11.a:0 "Wir müssen dem ein Ende setzen ..."
yugoslavia.12.t:0 "Eisenbahnen bombardiert!"
yugoslavia.12.d:0 "Es scheint, dass ultranationalistische Organisationen aus Kroatien und Mazedonien einen Bombenanschlag auf eine Eisenbahnlinie verübt haben und den Verkehr bis zur Reparatur lahmgelegt haben. Wenn nichts unternommen wird, werden sie das Land höchstwahrscheinlich weiter terrorisieren."
yugoslavia.12.a:0 "Diese Terroristen müssen unterdrückt werden!"
yugoslavia.13.t:0 "Aufstand!"
yugoslavia.13.d:0 "Es kam zu einem Aufruhr zwischen der Polizei und einer Gruppe gewalttätiger ultranationalistischer Demonstranten, der auf beiden Seiten des Konflikts Opfer forderte."
yugoslavia.13.a:0 "Unschuldige Leben verloren, alles umsonst ..."
yugoslavia.14.t:0 "Jugoslawien zieht sich aus der Wirtschaftssphäre zurück!"
yugoslavia.14.d:0 "Jugoslawien hat eine Erklärung veröffentlicht, in der es seinen Wunsch zum Ausdruck bringt, sich wirtschaftlich von uns zu distanzieren und den Handel mit westlichen Ländern zu intensivieren. Dies bedroht unsere wirtschaftlichen Interessen auf dem Balkan und die wirtschaftliche Sphäre, die wir derzeit über viele Länder der Region innehaben. Der Verlust Jugoslawiens als Wirtschaftssatellit könnte auch andere Länder dazu ermutigen, sich von uns zu distanzieren."
yugoslavia.14.a:0 "Ruiniere sie."
yugoslavia.15.t:0 "Deutsche Sanktionen!"
yugoslavia.15.d:0 "Als Reaktion auf unsere vorherige Erklärung haben die Deutschen schwere Wirtschaftssanktionen gegen das Land verhängt. Die Wirtschaft wird kurzfristig leiden, bis wir neue Handelspartner finden."
yugoslavia.15.a:0 "Wir können uns erholen."
yugoslavia.16.t:0 "Jugoslawien bietet einen Freundschaftsvertrag an."
yugoslavia.16.d:0 "Jugoslawiens Ministerpräsident Milan Stojadinović hat König Boris mit einem Freundschaftsvertrag vorgeschlagen. Sollten wir unterzeichnen, wäre das erste Angebot ein Nichtangriffspakt zwischen unseren Nationen, allerdings müssten wir jegliche Ansprüche auf ihre mazedonischen Gebiete zurücknehmen. Im Gegenzug würden die Jugoslawen unsere Ansprüche gegen Griechenland unterstützen."
yugoslavia.16.a:0 "Das klingt nach einer hervorragenden Idee!"
yugoslavia.16.b:0 "Dies ist keine Option."
yugoslavia.17.t:0 "Die Bulgaren akzeptieren!"
yugoslavia.17.d:0 "Die Bulgaren haben unseren Vorschlag für einen Nichtangriffspakt angenommen und werden ihn unverzüglich umsetzen."
yugoslavia.17.a:0 "Sehr gut."
yugoslavia.18.t:0 "Die Bulgaren leugnen!"
yugoslavia.18.d:0 "Die Bulgaren haben unseren Vorschlag für einen Nichtangriffspakt offiziell abgelehnt und erklärt, dass sie weiterhin Anspruch auf unsere mazedonischen Gebiete erheben."
yugoslavia.18.a:0 "So sei es."
yugoslavia.19.t:0 "Der Balkanpakt verlangt, dass wir den Nichtangriffspakt mit Bulgarien aufkündigen!"
yugoslavia.19.d:0 "Griechenland und Rumänien haben von uns den Rücktritt vom Vertrag mit Bulgarien gefordert. Sie behaupten, der Vertrag verstoße gegen den Balkanpakt und stellen uns vor zwei Optionen: Entweder wir erklären den Vertrag formell zurück oder wir verlassen den Pakt."
yugoslavia.19.a:0 "Wir werden sie dazu bringen, sich unserer Außenpolitik zu beugen."
yugoslavia.19.b:0 "Um den Pakt zu retten, werden wir den Vertrag aufkündigen."
yugoslavia.20.t:0 "Jugoslawien will den Balkanpakt formalisieren"
yugoslavia.20.d:0 "Die jugoslawische Regierung hat eine formelle Anfrage gestellt, in der sie uns auffordert, den Balkanpakt zu formalisieren, um unsere Interessen und unsere Souveränität zu schützen."
yugoslavia.20.a:0 "Das klingt nach einer außergewöhnlichen Idee!"
yugoslavia.20.b:0 "Dies würde uns nur einem größeren Risiko aussetzen."
yugoslavia.21.t:0 "[FROM.GetName] akzeptiert!"
yugoslavia.21.d:0 "Die Verwaltung von [FROM.GetName] hat der Idee des erweiterten Pakts zugestimmt und es werden umgehend Maßnahmen zu seiner Umsetzung ergriffen."
yugoslavia.21.a:0 "Exzellent"
yugoslavia.22.t:0 "[FROM.GetName] verweigert!"
yugoslavia.22.d:0 "Die Regierung von [FROM.GetName] hat sich geweigert, das Abkommen zu unterzeichnen, und weigert sich damit im Wesentlichen, den Pakt über das hinaus zu erweitern, was er bereits ist."
yugoslavia.22.a:0 "Schade."
yugoslavia.23.t:0 "Jugoslawien handelt nicht in unserem besten Interesse."
yugoslavia.23.d:0 "Die jugoslawische Regierung unternimmt Schritte, um den überholten Balkanpakt zu formalisieren. Dies beeinträchtigt nicht nur unsere Interessen in Südeuropa, sondern stellt auch ein weiteres Hindernis für uns dar."
yugoslavia.23.a:0 "Wenn wir unsere Sanktionen verhängen, werden sie darunter leiden."
yugoslavia.24.t:0 "Deutsche Sanktionen!"
yugoslavia.24.d:0 "Die Deutschen sind mit der Formalisierung des Balkanpakts sehr unzufrieden und schränken als Vergeltung ihre Exporte nach Deutschland ein. Bis ein Konjunkturprogramm auf den Weg gebracht werden kann, wird die Wirtschaft zunächst geschwächt sein."
yugoslavia.24.a:0 "Das ist schrecklich!"
yugoslavia.25.t:0 "Jugoslawien bittet um Schutz!"
yugoslavia.25.d:0 "Die Jugoslawen sind in unseren Einflussbereich eingedrungen, und nun ist endlich die Gelegenheit gekommen, unseren Einfluss in der Region zu festigen. Das jugoslawische Regime fordert nun von uns, es durch Schutzmaßnahmen zu unterstützen und es so weiter in unseren Einflussbereich zu drängen."
yugoslavia.25.a:0 "Warum sollten wir diese Gelegenheit nicht nutzen?"
yugoslavia.25.b:0 "Wir können das Risiko nicht eingehen ..."
yugoslavia.26.t:0 "Deutschland akzeptiert!"
yugoslavia.26.d:0 "Deutschland hat unsere Bitte um Schutz und stabile Beziehungen angenommen. Dies bringt uns jedoch noch tiefer in den deutschen Einflussbereich – und das alles zum Preis des Schutzes …"
yugoslavia.26.a:0 "Es ist unsere einzige Wahl ..."
yugoslavia.27.t:0 "Deutschland bestreitet!"
yugoslavia.27.d:0 "Die Deutschen sind verrückt! Aus irgendeinem Grund haben sie unsere Bitte um Schutz abgelehnt. Wir müssen jetzt einen neuen Weg finden ..."
yugoslavia.27.a:0 "Das ergibt keinen Sinn ..."
yugoslavia.28.t:0 "Der Prinz entfernt Stojadinović!"
yugoslavia.28.d:0 "Der Fürst hat Stojadinović als Premierminister abgesetzt, da er befürchtet, seine Macht könne durch den ehemaligen Premierminister untergraben werden. Fürst Paul wirft Stojadinović vor, sich zu weit in den Faschismus zu begeben, und hat seinen Nachfolger Dragiša Cvetković an die Macht gebracht."
yugoslavia.28.a:0 "Möge Cvetković dazu beitragen, diese zerbrochene Nation zu retten."
yugoslavia.29.t:0 "Slowenien tritt aus!"
yugoslavia.29.d:0 "Slowenien hat inmitten der Krise in Belgrad die Union verlassen und ist nun völlig unabhängig."
yugoslavia.29.a:0 "Wir werden sie zurückbringen ..."
yugoslavia.30.t:0 "Kroatien spaltet sich ab!"
yugoslavia.30.d:0 "Kroatien hat inmitten der Krise in Belgrad die Union verlassen und ist nun völlig unabhängig."
yugoslavia.30.a:0 "Wir werden sie zurückbringen ..."
yugoslavia.31.t:0 "Mazedonien tritt aus!"
yugoslavia.31.d:0 "Mazedonien hat inmitten der Krise in Belgrad die Union verlassen und ist nun völlig unabhängig."
yugoslavia.31.a:0 "Wir werden sie zurückbringen ..."
yugoslavia.32.t:0 "Bosnien spaltet sich ab!"
yugoslavia.32.d:0 "Bosnien hat inmitten der Krise in Belgrad die Union verlassen und ist nun völlig unabhängig."
yugoslavia.32.a:0 "Wir werden sie zurückbringen ..."
yugoslavia.33.t:0 "Cvetković-Maček-Abkommen"
yugoslavia.33.d:0 "Der Premierminister führte Gespräche mit dem liberalen kroatischen Politiker Vladko Maček und sie erzielten eine Einigung. Den Kroaten werden in gewisser Weise erweiterte Rechte, ähnlich denen der Serben, und eine stärkere Vertretung gewährt."
yugoslavia.33.a:0 "Bringen Sie die Kroaten ins Parlament und geben Sie ihnen den gleichen Status."
yugoslavia.33.b:0 "Verleihen Sie der Banschaft Kroatien den Autonomiestatus."
yugoslavia.34.t:0 "Jugoslawien will den Dreimächtepakt unterzeichnen"
yugoslavia.34.d:0 "Die Jugoslawen haben unserem Druck endlich nachgegeben und bieten nun an, den Dreimächtepakt zu unterzeichnen. Wenn wir sie künftig in unseren Einflussbereich einbeziehen wollen, müssen wir sie in den Pakt aufnehmen."
yugoslavia.34.a:0 "Bringen Sie sie in die Herde!"
yugoslavia.34.b:0 "Es ist zu gefährlich, sie einzuladen."
yugoslavia.35.t:0 "Die Deutschen nehmen uns in den Pakt auf!"
yugoslavia.35.d:0 "Mit der Unterzeichnung des Pakts durch unseren Premierminister Cvetković sind wir nun offiziell Mitglied des Dreimächtepakts. Frankreich und England sind über diese Entscheidung wütend, doch dies ist der einzige Weg, die Zukunft unserer Nation zu schützen."
yugoslavia.35.a:0 "Das ist ein Fluch ..."
yugoslavia.36.t:0 "Die Deutschen verweigern die Einreise!"
yugoslavia.36.d:0 "Die Deutschen haben unser Angebot, den Dreimächtepakt endlich zu unterzeichnen, abgelehnt und werden uns nicht in ihren Einflussbereich einbeziehen. Die Zukunft Jugoslawiens ist ungewiss, wir sind auf uns allein gestellt."
yugoslavia.36.a:0 "Wir sind von den Deutschen verschont geblieben... Aber was kommt als Nächstes?"
yugoslavia.37.t:0 "Die Jugoslawen bitten um Unterstützung bei der Erlangung von Sofia"
yugoslavia.37.d:0 "Unsere jugoslawische Marionette bittet uns, sie bei ihrem Anspruch auf den mehrheitlich bulgarischen Staat Sofia zu unterstützen. Sie fordert, dass wir unsere militärische Macht einsetzen, um die Nation zur Übergabe des Staates zu bewegen. Wir können dies auch als Gelegenheit nutzen, in Bulgarien ein kooperatives Regime zu installieren."
yugoslavia.37.a:0 "Das klingt nach einer hervorragenden Idee!"
yugoslavia.37.b:0 "Dieses Risiko können wir nicht eingehen."
yugoslavia.38.t:0 "Die Deutschen fordern die Übergabe Sofias"
yugoslavia.38.d:0 "Die Deutschen fordern, dass wir den Staat Sofia an Jugoslawien abtreten. Andernfalls haben sie militärische Maßnahmen zugesichert."
yugoslavia.38.a:0 "Es ist unsere einzige Option ..."
yugoslavia.38.b:0 "Niemals!"
yugoslavia.39.t:0 "Die Deutschen lehnen unseren Vorschlag ab!"
yugoslavia.39.d:0 "Die Deutschen haben eine Erklärung veröffentlicht, in der sie unsere Forderungen aus Sorge um ihre Sicherheit und ihre Interessen in der Region formell ablehnen. Sie werden unsere Ansprüche auf Sofia nicht unterstützen."
yugoslavia.39.a:0 "Vielleicht ein anderes Mal."
yugoslavia.40.t:0 "Die [From.GetNameDef]s verweigern!"
yugoslavia.40.d:0 "Unsere Forderungen nach dem Staat Sofia wurden abgelehnt. Unsere Armeen bereiten eine Invasion des Gebiets vor, um unsere Interessen in der Region zu schützen."
yugoslavia.40.a:0 "Bereiten Sie eine Invasion vor."
yugoslavia.41.t:0 "Die [From.GetNameDef]s akzeptieren!"
yugoslavia.41.d:0 "Unsere Forderungen für den Staat Sofia wurden angenommen und sie übergeben sofort die Kontrolle über den Staat."
yugoslavia.41.a:0 "Perfekt!"
yugoslavia.42.t:0 "Die Deutschen nehmen unseren Vorschlag an!"
yugoslavia.42.d:0 "In einer offiziellen Erklärung aus Berlin wurde gerade bestätigt, dass man Maßnahmen zur Errichtung des Staates im Namen unserer Nation ergreift und gleichzeitig versucht, in der Region Bulgarien einen Marionettenstaat zu errichten."
yugoslavia.42.a:0 "Perfekt!"
yugoslavia.43.t:0 "Kriegsrecht in Kroatien"
yugoslavia.43.d:0 "Die kroatischen Terroristen, insbesondere die Ustascha, verstärken ihre Bemühungen, nachdem sie von unserer extremen Anti-Terror-Politik erfahren haben. Wir sollten erwägen, in den Banschaften, die kroatische Gebiete umfassen, den Kriegszustand zu verhängen. Dazu wären jedoch Personal und Waffen erforderlich."
yugoslavia.43.a:0 "Verhängen Sie den strengen Kriegszustand."
yugoslavia.43.b:0 "Führen Sie leichte Polizeikontrollen durch."
yugoslavia.43.c:0 "Es ist nicht viel nötig."
yugoslavia.44.t:0 "Mehrere Bombenanschläge!"
yugoslavia.44.d:0 "Die kroatischen Terroristen haben zurückgeschlagen und mehrere Straßen und Eisenbahnlinien bombardiert. Vielleicht sind stärkere Truppen in der Region nötig."
yugoslavia.44.a:0 "Das ist katastrophal..."
yugoslavia.45.t:0 "Bombenanschläge!"
yugoslavia.45.d:0 "Die kroatischen Terroristen haben zurückgeschlagen und einige Eisenbahnlinien und Fabriken in der Region bombardiert. Wer weiß, was sie als Nächstes tun könnten."
yugoslavia.45.a:0 "Es hätte schlimmer kommen können ..."
yugoslavia.46.t:0 "Kriegsrecht in Mazedonien"
yugoslavia.46.d:0 "Die mazedonischen Terroristen verstärken ihre Bemühungen, nachdem sie von unserer extremen Anti-Terror-Politik erfahren haben. Wir sollten erwägen, die Banschaft mit den mazedonischen Gebieten unter Kriegsrecht zu stellen. Dazu wären jedoch Personal und Waffen erforderlich."
yugoslavia.46.a:0 "Verhängen Sie den strengen Kriegszustand."
yugoslavia.46.b:0 "Führen Sie leichte Polizeikontrollen durch."
yugoslavia.46.c:0 "Es ist nicht viel nötig."
yugoslavia.47.t:0 "Mehrere Bombenanschläge!"
yugoslavia.47.d:0 "Die mazedonischen Terroristen haben ihre Stimme deutlich gemacht und mehrere Straßen und Eisenbahnlinien bombardiert. Möglicherweise bedarf es einer stärkeren Truppe in der Region."
yugoslavia.47.a:0 "Das ist katastrophal..."
yugoslavia.48.t:0 "Bombenanschläge!"
yugoslavia.48.d:0 "Die mazedonischen Terroristen haben kleine Teile unserer Industrie in Mazedonien bombardiert und dabei Eisenbahnstrecken und einige Fabriken beschädigt."
yugoslavia.48.a:0 "Es hätte schlimmer kommen können ..."
yugoslavia.49.t:0 "Terroristenführung gefasst!"
yugoslavia.49.d:0 "Nach einer langen und anspruchsvollen Operation haben Militärangehörige endlich die Führung der Ustascha und mazedonischer Splitterorganisationen ausfindig gemacht und gefangen genommen. Sie werden nun an einem unbekannten Ort in Belgrad festgehalten und warten auf ihre Bestrafung."
yugoslavia.49.a:0 "Halten Sie eine öffentliche Hinrichtung ab!"
yugoslavia.49.b:0 "Sperren Sie sie lebenslang ein."
yugoslavia.50.t:0 "Jugoslawien fordert nordslawische Gebiete!"
yugoslavia.50.d:0 "Die Jugoslawen haben gerade einen diplomatischen Gesandten geschickt, der von uns die Abtretung unserer Gebiete mit slawischer Bevölkerung, nämlich Thrakien und Zentralmakedonien, fordert."
yugoslavia.50.a:0 "Geben Sie das Gebiet ab ... wir werden an einem anderen Tag zurückschlagen."
yugoslavia.50.b:0 "Sie werden kein griechisches Land erhalten!"
yugoslavia.51.t:0 "Griechenland knickt ein!"
yugoslavia.51.d:0 "Die griechische Regierung hat offiziell ein Abkommen über die Übertragung des Besitzes des Gebiets unterzeichnet und zieht alle griechischen Regierungselemente aus den von uns geforderten Gebieten ab. Jugoslawische Truppen marschieren nun in das Gebiet ein, um die Herrschaft wiederherzustellen."
yugoslavia.51.a:0 "Perfekt."
yugoslavia.52.t:0 "Griechenland leistet Widerstand!"
yugoslavia.52.d:0 "Die griechische Regierung hat unsere Forderungen gewaltsam abgelehnt und unsere Diplomaten in einem öffentlichen Wutanfall beinahe hingerichtet. Sie wird die Gebiete, die wir zuvor gefordert haben, nicht abtreten."
yugoslavia.52.a:0 "Sie lassen uns eine Wahl!"
yugoslavia.53.t:0 "Der Prinz ordnet eine Anti-Terror-Kampagne an."
yugoslavia.53.d:0 "Prinz Paul hat seiner Regierung befohlen, die terroristischen Elemente in Kroatien und Mazedonien aktiv zu suchen und schließlich zu vernichten. Die Gruppen werden sicherlich Vergeltung üben, doch das würde ihren Untergang nur beschleunigen."
yugoslavia.53.a:0 "Beginnen Sie die Suche!"
yugoslavia.54.t:0 "Die Kampagne erweist sich als erfolgreich!"
yugoslavia.54.d:0 "Nach einigen langen Monaten hat sich unsere Kampagne als sehr erfolgreich erwiesen. Es ist uns gelungen, Organisationen in ganz Kroatien und Mazedonien zu unterdrücken, die Widerstand gegen die jugoslawische Doktrin leisten."
yugoslavia.54.a:0 "Exzellent!"
yugoslavia.55.t:0 "Schicksal der serbischen Königsfamilie."
yugoslavia.55.d:0 "Nachdem die Sozialistische Partei nun endlich die Kontrolle über die Regierung hat, ist es an der Zeit, unsere Kontrolle offiziell zu festigen. Die königliche Familie ist ein Symbol des alten Jugoslawiens, der Unterdrückung und Repression vieler Völker. Heute beseitigen wir dieses Symbol."
yugoslavia.55.a:0 "Verbannen Sie sie!"
yugoslavia.55.b:0 "Halten Sie einen Prozess ab und richten Sie sie hin!"
yugoslavia.56.t:0 "Verbesserung der Industrie in Slowenien."
yugoslavia.56.d:0 "Um die Industrie des Landes wiederzubeleben, müssen wir staatliche Fabriken errichten, die dem Staat dienen und der Bevölkerung Arbeit geben. Was sollten wir in Slowenien bauen?"
yugoslavia.56.a:0 "Bauen Sie eine zivile Fabrik."
yugoslavia.56.b:0 "Bauen Sie eine Militärfabrik."
yugoslavia.57.t:0 "Verbesserung der Industrie in Kroatien."
yugoslavia.57.d:0 "Um die Industrie des Landes wiederzubeleben, müssen wir staatliche Fabriken errichten, die dem Staat dienen und der Bevölkerung Arbeit geben. Was sollten wir in Kroatien bauen?"
yugoslavia.57.a:0 "Bauen Sie eine zivile Fabrik."
yugoslavia.57.b:0 "Bauen Sie eine Militärfabrik."
yugoslavia.58.t:0 "Verbesserung der Industrie in Bosnien."
yugoslavia.58.d:0 "Um die Industrie des Landes wiederzubeleben, müssen wir staatliche Fabriken errichten, die dem Staat dienen und unserer Bevölkerung Arbeit geben. Was sollten wir in Bosnien bauen?"
yugoslavia.58.a:0 "Bauen Sie eine zivile Fabrik."
yugoslavia.58.b:0 "Bauen Sie eine Militärfabrik."
yugoslavia.59.t:0 "Verbesserung der Industrie in Serbien."
yugoslavia.59.d:0 "Um die Industrie des Landes wiederzubeleben, müssen wir staatliche Fabriken errichten, die dem Staat dienen und der Bevölkerung Arbeit geben. Was sollten wir in Serbien bauen?"
yugoslavia.59.a:0 "Bauen Sie zivile Fabriken."
yugoslavia.59.b:0 "Bauen Sie Militärfabriken."
yugoslavia.59.c:0 "Konstruieren Sie beides."
yugoslavia.60.t:0 "Verbesserung der Industrie in Montenegro."
yugoslavia.60.d:0 "Um die Industrie des Landes wiederzubeleben, müssen wir staatliche Fabriken errichten, die dem Staat dienen und der Bevölkerung Arbeit geben. Was sollten wir in Montenegro bauen?"
yugoslavia.60.a:0 "Bauen Sie eine zivile Fabrik."
yugoslavia.60.b:0 "Bauen Sie eine Militärfabrik."
yugoslavia.61.t:0 "Verbesserung der Industrie in Mazedonien."
yugoslavia.61.d:0 "Um die Industrie des Landes wiederzubeleben, müssen wir staatliche Fabriken errichten, die dem Staat dienen und der Bevölkerung Arbeit geben. Was sollten wir in Mazedonien bauen?"
yugoslavia.61.a:0 "Bauen Sie eine zivile Fabrik."
yugoslavia.61.b:0 "Bauen Sie eine Militärfabrik."
yugoslavia.62.t:0 "Jugoslawische Zusammenarbeit"
yugoslavia.62.d:0 ""
yugoslavia.62.a:0 "Werde zur Marionette."
yugoslavia.62.b:0 "Integration anfordern"
yugoslavia.63.t:0 "Albanien verlangt die Unterwerfung."
yugoslavia.63.d:0 "Die kommunistische Bewegung Albaniens hat in den letzten Monaten stark an Boden gewonnen, doch um ihre Herrschaft zu festigen, wünscht sie sich unsere Unterstützung."
yugoslavia.63.a:0 "Bringen Sie sie in die Herde!"
yugoslavia.64.t:0 "Albanien fordert eine Integration."
yugoslavia.64.d:0 "Die kommunistische Bewegung Albaniens hat in den letzten Monaten stark an Boden gewonnen. Um ihre Herrschaft zu festigen, wünscht sie sich jedoch unsere Unterstützung. Sie fordert, dass wir ihrer kommunistischen Partei die Kontrolle geben und sie als autonome sozialistische Republik in unserem Land etablieren."
yugoslavia.64.a:0 "Bringen Sie sie in die Herde!"
yugoslavia.64.t:0 "Jugoslawien fordert Verhandlungen."
yugoslavia.64.d:0 "Die Jugoslawen erklären, dass unsere Aggression ihnen gegenüber unnötig sei, da sie bereits dabei seien, ihre Regierung zu reformieren und die faschistische Diplomatie zu akzeptieren. Sie haben Recht, denn die Jugoslawen sind nun dazu bestimmt, ein Marionettenstaat des Deutschen Reichs zu werden."
yugoslavia.64.a:0 "Lass sie vorerst in Ruhe ..."


YUG_Acceptance_Of_German_Domination:0 "Akzeptanz der deutschen Herrschaft"
YUG_Acceptance_Of_German_Domination_desc:0 "Wenn wir als Nation auf der großen europäischen Bühne bestehen wollen, müssen wir die Deutschen weiterhin beschwichtigen."
YUG_Swiss_Of_The_Balkans:0 "Schweizer des Balkans"
YUG_Swiss_Of_The_Balkans_desc:0 "Eines unserer Hauptanliegen sollte es sein, uns aus den großen europäischen Angelegenheiten herauszuhalten. Ein neutrales, aber von Deutschland geprägtes geopolitisches System wird uns als souveräne Nation erhalten."
YUG_Treaty_With_Bulgaria:0 "Vertrag mit Bulgarien"
YUG_Treaty_With_Bulgaria_desc:0 "Um ein gewisses Maß an Frieden auf dem Balkan zu sichern, sollten wir versuchen, unsere zerrütteten Beziehungen zu den Bulgaren zu reparieren."
YUG_Italian_Diplomatic_Measures:0 "Italienische diplomatische Maßnahmen"
YUG_Italian_Diplomatic_Measures_desc:0 "Es ist kein Geheimnis, dass die Italiener es auf uns abgesehen haben und versuchen, Gebiete zu erobern, die ihnen gehören. Wir sollten Maßnahmen ergreifen, um uns mit den Italienern anzufreunden und sie von unserer Existenz zu überzeugen."
YUG_Address_The_Balkan_Pact:0 "Den Balkanpakt ansprechen"
YUG_Address_The_Balkan_Pact_desc:0 "Der Balkanpakt ist bestenfalls ein fragiles Bündnis. Die Entscheidung über seine Existenz liegt in unserer Hand und wird durch unsere Diplomatie bestimmt."
YUG_Formalize_The_Pact:0 "Formalisieren Sie den Pakt"
YUG_Formalize_The_Pact_desc:0 "Nachdem wir uns nun entschieden haben, den Balkanpakt wertzuschätzen, ist es an der Zeit, ihn offiziell zu machen."
YUG_Italian_Investment:0 "Italienische Investitionen"
YUG_Italian_Investment_desc:0 "Völker italienischer Abstammung leben seit langem an der Adriaküste. Es ist nur richtig, italienische Unternehmen in das Land investieren zu lassen und unsere Beziehungen weiter zu verbessern."
YUG_Solidify_German_Relations:0 "Festigung der deutschen Beziehungen"
YUG_Solidify_German_Relations_desc:0 "Und noch einmal: Wenn wir in diesem Zeitalter als souveräne Nation bestehen wollen, müssen wir die Deutschen als unseren Beschützer behalten."
YUG_Address_Political_Dissedence:0 "Politische Meinungsverschiedenheiten ansprechen"
YUG_Address_Political_Dissedence_desc:0 "Subversive Aktivitäten verschiedener Gruppen verfolgen und terrorisieren die Nation noch immer. Es ist an der Zeit, dass wir etwas gegen sie unternehmen."
YUG_Suppress_the_Ultranationalists:0 "Unterdrückt die Ultranationalisten"
YUG_Suppress_the_Ultranationalists_desc:0 "Kroatische und mazedonische Gruppen greifen schon zu lange Regierungsinteressen und -eigentum an. Es ist an der Zeit, dem ein Ende zu setzen."
YUG_Concessions_to_the_Opposition:0 "Zugeständnisse an die Opposition"
YUG_Concessions_to_the_Opposition_desc:0 "Anstatt die gegnerischen politischen Parteien gänzlich zu verbieten, sollten wir ihnen Rechte und Regierungssitze zugestehen, um die Nation weiter zu einen."
YUG_Oppress_the_Opposition:0 "Unterdrückung der Opposition"
YUG_Oppress_the_Opposition_desc:0 "Unseren politischen Feinden sollte nicht das Recht eingeräumt werden, gegen uns zu sprechen und unserem nationalen Image zu schaden. Alle gegnerischen politischen Parteien werden verboten und aufgelöst."
YUG_Reelection:0 "Wiederwahl"
YUG_Reelection_desc:0 "Die Amtszeit von Milan Stojadinović steht vor der Tür und wir haben das Gefühl, dass er wiedergewählt wird. Der Prinz ist jedoch nicht ganz zufrieden mit seinem Wunsch, die Nation mit eiserner Faust zu regieren."
YUG_Raise_the_Green_Shirts:0 "Erhebt die grünen Hemden"
YUG_Raise_the_Green_Shirts_desc:0 "Eine Gruppe serbisch-jugoslawischer Staatsbürger ist bereit, für die Nation zu kämpfen und sie zu verteidigen. Wir sollten diese Männer in Divisionen mobilisieren."
YUG_Continue_The_Status_Quo:0 "Den Status Quo beibehalten"
YUG_Continue_The_Status_Quo_desc:0 "Da wir nun einen neuen Premierminister haben, liegt es in unserem besten Interesse, den Frieden und die Stabilität unserer Lage aufrechtzuerhalten."
YUG_Cvetkovic_Macek_Agreement:0 "Cvetković-Maček-Abkommen"
YUG_Cvetkovic_Macek_Agreement_desc:0 "Der Ruf der Kroaten nach mehr Repräsentation ist nicht mehr zu überhören. Es muss eine Einigung mit den kroatischen Politikern und der Regierung erzielt werden."
YUG_Sign_The_Tripartite_Pact:0 "Unterzeichnen Sie den Dreiparteienpakt"
YUG_Sign_The_Tripartite_Pact_desc:0 "Die Deutschen haben uns in die Enge getrieben und lassen uns keine andere Wahl, als uns ihrem Kampf anzuschließen."
YUG_King_Peters_Coup:0 "König Peters Staatsstreich"
YUG_King_Peters_Coup_desc:0 "Der jugendliche König wurde von den überwiegend deutschfeindlichen Militärs an die Macht gebracht. Die Deutschen werden diese Nachricht nicht gerade freuen."
YUG_King_Peters_Reign:0 "Die Herrschaft von König Peter"
YUG_King_Peters_Reign_desc:0 "Nachdem König Peter nun die Kontrolle über die Nation übernommen und die Herzen des Volkes gewonnen hat, ist es wahrscheinlich das Beste, ihn auf seinem Thron zu belassen."
YUG_Establish_A_Constitutional_Monarchry:0 "Errichtung einer konstitutionellen Monarchie"
YUG_Establish_A_Constitutional_Monarchry_desc:0 "Die Nation kann nun ihre Chance zur vollständigen Vereinigung nutzen. Die Gründung einer Republik kann sich jetzt als endgültige Einheit der Nation erweisen."
YUG_Reactivate_the_Great_War_Forts:0 "Reaktivieren Sie die Festungen des Ersten Weltkriegs"
YUG_Reactivate_the_Great_War_Forts_desc:0 "Die Festungen, die uns einst während der österreichisch-ungarischen Invasion im letzten Krieg halfen, sind eine unserer einzigen Hoffnungen im Kampf gegen die Deutschen. Diese Festungen sollten schnellstmöglich wieder instand gesetzt und zur Verteidigung gegen die Deutschen genutzt werden."
YUG_Allied_Cooperation:0 "Zusammenarbeit der Alliierten"
YUG_Allied_Cooperation_desc:0 "Die Briten gehören zu den Unterstützern unseres Putsches und sind gerne bereit, uns in ihr Bündnis aufzunehmen, um den Deutschen eine weitere Front zu eröffnen."
YUG_Continue_the_War_in_London:0 "Der Krieg in London geht weiter"
YUG_Continue_the_War_in_London_desc:0 "Die Kapitulation unserer Nation bedeutet nicht, dass wir den Deutschen nachgeben müssen. Die Briten haben unserer Regierung erlaubt, weiterhin in London zu operieren, und wir werden sie auf jede erdenkliche Weise unterstützen."
YUG_Partisan_Efforts:0 "Partisanenbemühungen"
YUG_Partisan_Efforts_desc:0 "Eine Regierung zu unterstützen, die nicht einmal im Land ansässig ist, ist eine schreckliche Idee. Wir sollten radikale Untergrundgruppen in den ehemaligen jugoslawischen Gebieten unterstützen."
YUG_Liberation:0 "Befreiung"
YUG_Liberation_desc:0 "Dank der Bemühungen der Alliierten ist die Nation endlich befreit! Es ist an der Zeit, die Ordnung im Land in seinem Nachkriegszustand wiederherzustellen."
YUG_Beginnings_of_a_Fascist_Coup:0 "Anfänge eines faschistischen Putsches"
YUG_Beginnings_of_a_Fascist_Coup_desc:0 "Die Zeit ist ideal für einen pro-serbischen faschistischen Aufstand. Wir werden uns bemühen, diese faschistische Stimmung zu verbreiten."
YUG_March_On_Belgrade:0 "Marsch auf Belgrad"
YUG_March_On_Belgrade_desc:0 "Nachdem wir nun die Unterstützung einer faschistischen Regierung gewonnen haben, ist es an der Zeit, dies der Regierung vorzutragen und Kontrolle zu fordern."
YUG_Tackle_The_Fascists:0 "Bekämpfe die Faschisten"
YUG_Tackle_The_Fascists_desc:0 "Die faschistischen Kroaten und Mazedonier haben ihre Unabhängigkeit erklärt, doch diese neu gewonnene Unabhängigkeit wird nicht lange halten. Wir sollten dafür sorgen, dass wir sie wieder in die Gemeinschaft integrieren."
YUG_Tackle_The_Democracies:0 "Die Demokratien angehen"
YUG_Tackle_The_Democracies_desc:0 "Die Slowenen und Bosnier haben ein neues Gefühl der Freiheit gefunden, aber es ist unsere Pflicht, dieses Gefühl zu zerstören und sie wieder in den jugoslawischen Staat zu integrieren."
YUG_Reintegration:0 "Wiedereingliederung"
YUG_Reintegration_desc:0 "Jetzt, da wir alle unsere ehemaligen jugoslawischen Staaten haben, können wir unsere Herrschaft über die anderen Südslawen verstärken"
YUG_German_Economic_Cooperation:0 "Deutsche Wirtschaftszusammenarbeit"
YUG_German_Economic_Cooperation_desc:0 "Die Deutschen werden uns zwangsläufig zu einem integrierten Marionettenstaat machen, unabhängig von unseren politischen Entscheidungen. Wir können genauso gut jetzt nachgeben, solange wir unser Land noch behalten können."
YUG_Claim_On_Sofia:0 "Anspruch auf Sofia"
YUG_Claim_On_Sofia_desc:0 "Die Bulgaren sind die einzige Gruppe Südslawen, die nicht in unsere Nation integriert ist. Wir sollten uns dafür einsetzen, dass sich das ändert, und mit Hilfe der Deutschen können wir das auch."
YUG_Invade_Greece:0 "Erobern Sie Griechenland"
YUG_Invade_Greece_desc:0 "Die Griechen haben eine slawische Minderheit, die befreit werden muss, und wir sind die Einzigen, die dafür sorgen können, dass diese Minderheit geschützt wird. Um sie zu schützen, müssen wir in Griechenland einmarschieren und diese Gebiete annektieren."
YUG_Increased_Autonomy:0 "Erhöhte Autonomie"
YUG_Increased_Autonomy_desc:0 "Wir sollten jetzt die Gelegenheit nutzen, um mit der Loslösung von den Deutschen zu beginnen."
YUG_Serbo_Croatian_Nationalism:0 "Serbokroatischer Nationalismus"
YUG_Serbo_Croatian_Nationalism_desc:0 "Wir sollten dafür sorgen, dass Serben und Kroaten dieses Land gemeinsam regieren, und uns darüber im Klaren sein, dass es ihre Bestimmung ist, zusammenzuarbeiten."
YUG_Proclaim_Greater_Yugoslavia:0 "Großjugoslawien ausrufen"
YUG_Proclaim_Greater_Yugoslavia_desc:0 "Ein großjugoslawischer Staat ist endlich ein erreichbares Ziel, wir müssen nur dafür sorgen."
YUG_Challenge_German_Domination:0 "Fordern Sie die deutsche Vorherrschaft heraus"
YUG_Challenge_German_Domination_desc:0 "Die Deutschen haben zu viel Kontrolle über unser Land, wir sind praktisch schon ihre Marionette. Es ist Zeit, dass wir unsere Außenpolitik selbst in die Hand nehmen. Das wird jedoch seinen Preis haben."
YUG_Depose_Stojadinovic:0 "Stojadinović absetzen"
YUG_Depose_Stojadinovic_desc:0 "Milan Stojadinović ist zu gefährlich und radikal, um die Kontrolle über das Land zu behalten. Wir müssen ihn absetzen und eine neue Führung suchen."
YUG_Further_The_Royal_Dictatorship:0 "Weiter die königliche Diktatur"
YUG_Further_The_Royal_Dictatorship_desc:0 "Die Regierung von Prinz Paul sollte nach der Absetzung Stojadinovićs gestärkt werden. Indem wir die Macht der königlichen Regierung sichern, können wir eine stabile Nation gewährleisten."
YUG_Purge_The_Terrorists:0 "Säuberung der Terroristen"
YUG_Purge_The_Terrorists_desc:0 "Der Terror, der dieses Land heimsucht, muss beendet werden. Der einzige Weg dazu ist ein hartes Durchgreifen. Dieser Kampf wird langwierig sein, aber er wird die Sicherheit und Stabilität des Landes gewährleisten."
YUG_Oppress_Oppositional_Parties:0 "Unterdrückung oppositioneller Parteien"
YUG_Oppress_Oppositional_Parties_desc:0 "Der letzte Schritt zur Sicherung der Stabilität des Landes ist das Verbot aller politischen Parteien, die eine Bedrohung für die Royal Party darstellen."
YUG_Yugoslav_Sentiment:0 "Jugoslawische Stimmung"
YUG_Yugoslav_Sentiment_desc:0 "Jetzt, da die Stabilität des Landes wiederhergestellt werden kann, ist es an der Zeit, die Menschen unserer Nation daran zu erinnern, wer sie sind. Nur mit diesem Nationalismus können wir die Unabhängigkeit der Balkanslawen bewahren."
YUG_Establish_The_Royal_Corps:0 "Gründung des Royal Corps"
YUG_Establish_The_Royal_Corps_desc:0 "Wir müssen ein Korps aufstellen, das sich der Verteidigung der königlichen Familie und der Nation widmet."
YUG_Favor_Orthodoxy:0 "Bevorzugen Sie die Orthodoxie"
YUG_Favor_Orthodoxy_desc:0 "Die orthodoxe Kirche ist seit langem ein Symbol der südslawischen Einheit und natürlich die Hauptkirche. Wir sollten die Orthodoxen in unserem Reich und die mit der orthodoxen Kirche verbundenen Geistlichen bevorzugen."
YUG_Two_Equal_Churches:0 "Zwei gleichberechtigte Kirchen"
YUG_Two_Equal_Churches_desc:0 "Der Katholizismus spielt im jugoslawischen Staat noch immer eine große Rolle. Wir sollten es uns zur Priorität machen, dass die Mitglieder beider Kirchen gleichberechtigt behandelt werden."
YUG_Government_Supplied_Factories:0 "Von der Regierung belieferte Fabriken"
YUG_Government_Supplied_Factories_desc:0 "Wenn wir die Nation bewaffnen und verteidigen wollen, müssen wir Unternehmen Land und Material zur Verfügung stellen, damit sie Waffen für unsere Armee herstellen können."
YUG_Royal_Industrial_Effort:0 "Königliche Industrieanstrengung"
YUG_Royal_Industrial_Effort_desc:0 "Das Land ist noch relativ wenig industrialisiert. Unsere Aufgabe sollte es sein, die Industrialisierung kleiner Städte und Regionen zu fördern, in der Hoffnung, eines Tages so groß zu sein wie die anderen Industrienationen."
YUG_Unite_the_Balkan_Slavs:0 "Vereint die Balkanslawen"
YUG_Unite_the_Balkan_Slavs_desc:0 "Das Schicksal Bulgariens ist nahezu sicher. Die Bulgaren sollten in den jugoslawischen Staat eingegliedert werden, um die Freiheit und Unabhängigkeit aller Südslawen zu gewährleisten."
YUG_Establish_Bulgarian_Banovina:0 "Errichtung der bulgarischen Banowina"
YUG_Establish_Bulgarian_Banovina_desc:0 "Um die Loyalität und die Herzen der Bulgaren zu gewinnen, müssen wir ihnen das Recht geben, aktiv an der Regierung teilzunehmen."
YUG_Greek_Ultimatum:0 "Ultimatum an Griechenland"
YUG_Greek_Ultimatum_desc:0 "Die Griechen besitzen Gebiete, in denen Bulgaren und Mazedonier leben, und haben diese viel zu lange schlecht vertreten. Es ist an der Zeit, diese Gebiete von den Griechen zurückzufordern, damit wir unsere Völker schützen und die Balkanslawen offiziell vereinen können."
YUG_Preempt_Hungarian_Aggression:0 "Ungarische Aggression verhindern"
YUG_Preempt_Hungarian_Aggression_desc:0 "Die Ungarn sehnen sich nach ihren alten Gebieten, darunter der Vojvodina und möglicherweise Kroatien. Wir müssen uns auf ihre Forderungen vorbereiten, indem wir dafür sorgen, dass sie nicht in Erfüllung gehen."
YUG_Revenge_for_years_of_occupation:0 "Rache für jahrelange Besatzung"
YUG_Revenge_for_years_of_occupation_desc:0 "Die Osmanen beherrschten jahrhundertelang große Teile unseres Landes und setzten uns eine Herrschaft auf, die wir uns nie gewünscht hätten. Jetzt ist der richtige Zeitpunkt, ihnen das zu nehmen, was sie uns vor Jahren genommen haben."
YUG_Recognize_the_soviet_union:0 "Anerkennung der Sowjetunion"
YUG_Recognize_the_soviet_union_desc:0 "Unser Land weigert sich nach wie vor, diplomatische Missionen in die Sowjetunion zu unternehmen. Wenn wir den Handel unseres Landes wieder verbessern wollen, müssen wir den Handel mit der Sowjetunion wieder aufnehmen."
YUG_Trade_efforts_with_the_allies:0 "Handelsbemühungen mit den Alliierten"
YUG_Trade_efforts_with_the_allies_desc:0 "Die Alliierten waren und werden immer ein verlässlicher Handelspartner sein, solange wir uns auf ihrer Seite halten. Wenn wir unsere Wirtschaft verbessern wollen, sollten wir unseren Handel mit ihnen ausbauen."
YUG_Stabilize_The_Trade:0 "Stabilisieren Sie den Handel"
YUG_Stabilize_The_Trade_desc:0 "Nachdem wir unsere Türen nun für mehr Außenhandel geöffnet haben, können wir mit der Sanierung der Handelswirtschaft unseres Landes beginnen."
YUG_Dutch_of_the_Balkans:0 "Die Niederländer des Balkans"
YUG_Dutch_of_the_Balkans_desc:0 "Unsere Bemühungen zahlen sich endlich aus. Wir haben bewiesen, dass die Deutschen keine Kontrolle über uns haben. Lasst uns das endlich beweisen."
YUG_Embrace_Socialism:0 "Umarme den Sozialismus"
YUG_Embrace_Socialism_desc:0 "Unsere Bevölkerung hungert und fordert mehr Vertretung, als die Regierung ihr bietet. Wir sollten diese Notlage nutzen, um uns sozialistischen Werten zuzuwenden."
YUG_Workers_Militia:0 "Arbeitermiliz"
YUG_Workers_Militia_desc:0 "Sozialismus ist in diesem Land keine anerkannte Ideologie. Die Veteranen des letzten Krieges haben eigene Milizen gegründet, um gegen Sozialisten zu kämpfen. Um die Bewegung zu stärken, müssen wir in der Lage sein, diese Veteranenmilizen abzuschrecken und vor ihnen zu schützen."
YUG_National_Referendum:0 "Nationales Referendum"
YUG_National_Referendum_desc:0 "Diese Regierung ist schwach. Es ist an der Zeit, in die Hauptstadt zu gehen und ein sofortiges Referendum zu fordern. Jetzt ist es an der Zeit, die Kontrolle zu übernehmen."
YUG_Fate_of_the_Royal_Family:0 "Schicksal der königlichen Familie"
YUG_Fate_of_the_Royal_Family_desc:0 "Die königliche Familie verfügt aufgrund der Verfassung des Landes noch immer über eine gewisse Macht. Wir müssen das System reformieren, um sie von der Macht zu entfernen."
YUG_Yugo_Soviet_Split:0 "Jugosowjetische Spaltung"
YUG_Yugo_Soviet_Split_desc:0 "Die Sowjetunion wird uns nicht helfen. Ihr Ziel ist es nicht, uns zu unterstützen, sondern uns zu Marionetten zu machen. Sie wünscht sich keinen erfolgreichen Sozialismus, sondern nur Macht und Einfluss. Deshalb werden wir unseren eigenen Weg des Sozialismus beschreiten."
YUG_Entry_into_the_Cominterm:0 "Beitritt zur Komintern"
YUG_Entry_into_the_Cominterm_desc:0 "Die Sowjets sind eine der mächtigsten Kräfte in Europa und nur die Deutschen sind ihre Rivalen. Nachdem wir nun sozialistisch geworden sind und die Deutschen im Stich gelassen haben, bleibt uns nur noch die Möglichkeit, uns auf die Seite der Sowjets zu stellen."
YUG_Pan_Slavic_Workers_Congress:0 "Panslawischer Arbeiterkongress"
YUG_Pan_Slavic_Workers_Congress_desc:0 "Jetzt, da wir unseren eigenen Weg gehen, müssen wir eine Streitmacht aufbauen, die es mit den anderen Mächten aufnehmen kann. Diese Aufgabe können wir nicht allein bewältigen. Wir müssen uns mit den anderen Balkanstaaten zusammenschließen, um unsere Unabhängigkeit zu schützen."
YUG_Form_the_Federal_Republic:0 "Aus der Bundesrepublik"
YUG_Form_the_Federal_Republic_desc:0 "Das Banovina-System gehört der Vergangenheit an. Wir müssen halbautonome sozialistische Republiken errichten, die alle Belgrad unterstehen und bei der Regierung des Landes zusammenarbeiten."
YUG_Nation_Wide_Infrastructure:0 "Landesweite Infrastruktur"
YUG_Nation_Wide_Infrastructure_desc:0 "Um das Leben vieler Menschen und unsere Industrie zu verbessern, sollten wir uns darum bemühen, das Straßen- und Eisenbahnnetz im ganzen Land zu verbessern."
YUG_Government_Subsidized_Factories:0 "Staatlich subventionierte Fabriken"
YUG_Government_Subsidized_Factories_desc:0 "Wir müssen die Kontrolle über die Industrie übernehmen, und das können wir erreichen, indem wir den Bau von Fabriken subventionieren."
YUG_United_As_Brothers:0 "Als Brüder vereint"
YUG_United_As_Brothers_desc:0 "Unser Schicksal, unser jugoslawisches Schicksal, ist ewige Brüderlichkeit und Einheit. Wir sollten uns niemals gegenseitig bekämpfen oder schikanieren. Gemeinsam sind wir stark."
YUG_Establish_the_UDBA:0 "Gründung der UDBA"
YUG_Establish_the_UDBA_desc:0 "Die UDBA ist unser geplanter Geheimdienst. Wenn sie eingerichtet wird, wird sie dafür sorgen, dass die Ultranationalisten ihre Aktivitäten nicht mehr fortsetzen können."
YUG_Influence_Albania:0 "Einfluss Albanien"
YUG_Influence_Albania_desc:0 "Die Albaner sind schwach und verletzlich, deshalb sind sie ein Opfer der Italiener. Wir sollten dafür sorgen, dass Albanien nicht in italienischer, sondern in unserer Macht landet."
YUG_War_Economy:0 "Kriegswirtschaft"
YUG_War_Economy_desc:0 "Wir müssen unsere sozialistische Wirtschaft auf das Schlimmste vorbereiten. In Europa droht ein Krieg, und wir könnten bald mittendrin sein. Deshalb müssen wir unsere Wirtschaft sofort mobilisieren."
YUG_Spread_The_Revolution_Across_the_Adriatic:0 "Verbreite die Revolution an der Adria"
YUG_Spread_The_Revolution_Across_the_Adriatic_desc:0 "Unsere Stärke hat in diesem Moment ihren Höhepunkt erreicht. Wir sind endlich stark genug, um die Revolution auszubreiten, und unser erstes Ziel ist Italien."
YUG_Economic_Intervention:0 "Wirtschaftliche Intervention"
YUG_Economic_Intervention_desc:0 "Die Wirtschaft bricht aufgrund der Weltwirtschaftskrise zusammen. Wir müssen die Wirtschaft in den Griff bekommen, um das zu reparieren, was sich nicht von selbst reparieren kann."
YUG_Liquidize_Farmer_Debts:0 "Liquidierung der Schulden der Landwirte"
YUG_Liquidize_Farmer_Debts_desc:0 "Die Bauern sind gezwungen, immer mehr Schulden aufzunehmen, um ihre Besitztümer zu erhalten. Da die Bauern die Grundlage für die gesamte Nahrungsmittelversorgung des Landes bilden, sollten wir ihre Schulden liquidieren, um die Agrarwirtschaft vor dem Zusammenbruch zu bewahren."
YUG_Food_Programs:0 "Ernährungsprogramme"
YUG_Food_Programs_desc:0 "Unsere Bevölkerung hungert. Wir müssen jetzt handeln und im ganzen Land Suppenküchen einrichten."
YUG_Welfare_Efforts:0 "Wohlfahrtsbemühungen"
YUG_Welfare_Efforts_desc:0 "Der jugoslawische Wohlfahrtsstaat ist kein schöner Anblick, aber er trägt dazu bei, unseren Völkern Hilfe zu leisten."
YUG_Fund_Research_Programs:0 "Forschungsprogramme finanzieren"
YUG_Fund_Research_Programs_desc:0 "Seit der Großen Depression haben sich die Institutionen kaum über Wasser gehalten. Wenn die wissenschaftlichen Einrichtungen stärker gefördert werden, haben wir vielleicht eine Chance, zu den großen europäischen Nationen aufzuschließen."
YUG_Government_Jobs:0 "Regierungsjobs"
YUG_Government_Jobs_desc:0 "Ähnlich wie die WPA in den Vereinigten Staaten werden wir Bauvorhaben im ganzen Land finanzieren, um Arbeitsplätze für unsere Bevölkerung zu schaffen."
YUG_Stimulate_Arms_Industry:0 "Stimulierung der Rüstungsindustrie"
YUG_Stimulate_Arms_Industry_desc:0 "Die Finanzierung unserer Rüstungsindustrie ist der einzige Weg, eine starke Armee aufzubauen. Wenn wir unabhängig bleiben wollen, müssen wir in der Lage sein, eine starke Armee aufzubauen."
YUG_Improve_Civilian_Industry:0 "Verbesserung der zivilen Industrie"
YUG_Improve_Civilian_Industry_desc:0 "Wenn wir die Probleme der Weltwirtschaftskrise lösen wollen, muss die zivile Industrie verbessert werden."
YUG_Expand_the_Mining_Industry:0 "Ausbau der Bergbauindustrie"
YUG_Expand_the_Mining_Industry_desc:0 "Jugoslawien ist zwar reich an vielen seltenen Rohstoffen, es mangelt jedoch an einigen der wichtigsten. Der Bergbau sollte landesweit ausgebaut werden, um die Abhängigkeit von ausländischem Stahl und anderen Rohstoffen zu verringern."
YUG_Industrial_Funding:0 "Industrielle Finanzierung"
YUG_Industrial_Funding_desc:0 "Für weitere Fortschritte in anderen Bereichen ist eine kontinuierliche Finanzierung der nationalen Industrie erforderlich."
YUG_Exploit_Pannonian_Fields:0 "Die pannonischen Felder ausbeuten"
YUG_Exploit_Pannonian_Fields_desc:0 "Die weiten Felder unseres Landes könnten riesige Ölvorkommen bergen. Dieser ungenutzte Reichtum sollte genutzt werden, um unsere Unabhängigkeit zu stärken."
YUG_Expand_Yugoslav_Arsenals:0 "Erweitern Sie die jugoslawischen Arsenale"
YUG_Expand_Yugoslav_Arsenals_desc:0 "Es muss eine landesweite Initiative zur Erhöhung der Ausgaben für die Rüstungsindustrie ergriffen werden. Unsere Rüstungsindustrie kann durchaus sehenswert sein, aber zuerst muss ihre Finanzierung erhöht werden."
YUG_Civilian_Industrial_Improvements:0 "Zivile industrielle Verbesserungen"
YUG_Civilian_Industrial_Improvements_desc:0 "Nachdem wir uns nun größtenteils von der Weltwirtschaftskrise erholt haben, kann die zivile Industrie weiterentwickelt werden, um hoffentlich zu verhindern, dass sich ein derartiges Ereignis jemals wieder wiederholt."
YUG_Expand_the_Universites:0 "Ausbau der Universitäten"
YUG_Expand_the_Universites_desc:0 "Die Universitäten von Belgrad und Ljubljana sollten angesichts der stetigen Verbesserung unserer Industrie mehr Fördermittel erhalten. Weitere Förderungen eröffnen unzählige Möglichkeiten für Forschung und Entwicklung."
YUG_Commander_Training:0 "Kommandantenausbildung"
YUG_Commander_Training_desc:0 "Die weitere Ausbildung unserer Generäle kann im nächsten Krieg den entscheidenden Unterschied machen."
YUG_form_Marine_Battalions:0 "Bilden Sie Marinebataillone"
YUG_form_Marine_Battalions_desc:0 "Wir grenzen gemeinsam mit den Italienern an die Adria. Wir sollten das Meer für unsere militärischen Expeditionen nutzen können."
YUG_Air_Craft_Production:0 "Flugzeugproduktion"
YUG_Air_Craft_Production_desc:0 "Eine starke Luftwaffe kann unseren Truppen am Boden nur helfen und einen Sieg sichern. Wir sollten uns auf die Finanzierung weiterer Flugzeuge konzentrieren."
YUG_Import_Foreign_Fighters:0 "Importieren Sie ausländische Kämpfer"
YUG_Import_Foreign_Fighters_desc:0 "Um das Design unserer Kampfflugzeuge zu verbessern, sollten wir Kampfflugzeuge aus dem Ausland importieren und ihr Design studieren."
YUG_IK_3:0 "IK-3"
YUG_IK_3_desc:0 "Der IK-3 ist das Ergebnis jahrelanger Forschung. Wir haben endlich einen Jäger entwickelt, der es problemlos mit den großen Nationen aufnehmen kann."
YUG_Import_Foreign_Bombers:0 "Importieren Sie ausländische Bomber"
YUG_Import_Foreign_Bombers_desc:0 "Um das Design unserer Bomber zu verbessern, sollten wir Bomber aus dem Ausland importieren und ihr Design studieren."
YUG_IK_Orkan:0 "IK Orkan"
YUG_IK_Orkan_desc:0 "Der Orkan ist das nächste Produkt unserer Forschung und Studien zu ausländischen Bomberflugzeugen. Der Orkan kann ein beeindruckendes CAS-Flugzeug gegen feindliche Infanterie sein."
YUG_Experimental_Air_Craft:0 "Experimentalflugzeuge"
YUG_Experimental_Air_Craft_desc:0 "Unsere Entwicklungen zahlreicher unterschiedlicher Flugzeugtypen haben sich als erfolgreich erwiesen. Es ist an der Zeit, unsere Forschung auf neue Technologien und Flugzeugformen auszuweiten."
YUG_Fund_Battleship_Creation:0 "Finanzierung der Schlachtschifferschaffung"
YUG_Fund_Battleship_Creation_desc:0 "Der Begriff „jugoslawisches Schlachtschiff“ klingt fast seltsam, aber wir können es endlich produzieren. Wir sollten dafür sorgen, dass wir die nötigen Mittel für den Bau eines Schlachtschiffs erhalten."
