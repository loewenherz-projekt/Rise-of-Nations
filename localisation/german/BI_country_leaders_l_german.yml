l_german:
 #Country Leaders
 politics_clement_attlee_desc:0 "Vorsitzender der Labour Party"
 politics_louis_ferdinand_desc:0 "Kaiser des Deutschen Reiches"
 politics_wilhelm_iii_desc:0 "Kaiser des Deutschen Reiches"
 POLITICS_CHAO_KUNG_DESC:0 "Der chinesische Abt Chao Kung behauptete, der wahre Dalai Lama zu sein und wurde sowohl von Deutschland als auch von Japan unterstützt. Nur wenige wissen jedoch, dass es sich bei diesem Mann um den gebürtigen Ungarn Ignaz Trebitsch handelt. Er war unter dem Namen Trebitsch-Lincoln Mitglied des britischen Parlaments, arbeitete eine Zeit lang als Spion für Deutschland, bevor er nach China zog, zum Buddhismus konvertierte und Abt wurde – und das alles, bevor er behauptete, die Reinkarnation des Dalai Lama zu sein."

 POLITICS_JAPANESE_JUNTA_LEADER_DESC:0 "General Hiroki Tanaka, ein erfahrener Militärstratege, führt die japanische Junta mit eiserner Faust und befürwortet eine expansionistische Politik im Pazifikraum und darüber hinaus."
 #Afghanistan
 POLITICS_MOHAMMED_ZAHIR_SHAH_DESC:0 "Mohammed Zahir Shah ist der königliche Premierminister von Afghanistan. Im Gegensatz zu seinen Vorgängern hat Zahir Shah seinen Interessenbereich von Großbritannien und der Sowjetunion auf das nationalsozialistische Deutschland verlagert."
 #Albania
 POLITICS_KING_ZOG_DESC:0 "König Zog I., der sich selbst vom Präsidenten zum König ernannt hat, ist die Verkörperung der absoluten Monarchien des 20. Jahrhunderts in Europa: egoistisch, nachsichtig, kleinlich und bei seinen eigenen Untertanen äußerst unbeliebt."
 #Argentina
 POLITICS_AGUSTIN_PEDRO_JUSTO_DESC:0 "Agustín Pedro Justo, Präsident Argentiniens während des sogenannten „berüchtigten Jahrzehnts“, ist problematisch. Ihm wird Wahlbetrug vorgeworfen und er würde Argentinien wirtschaftlich in ein britisches Dominion verwandeln. Vor ihm liegt eine Herkulesaufgabe, um das Vertrauen der Öffentlichkeit zurückzugewinnen."
 POLITICS_NIMO_DE_ANQUIN_DESC:0 "Nimio de Anquín, Anführer der argentinischen faschistischen Bewegung, ist ein großer Bewunderer und Anhänger Benito Mussolinis. Seiner Sache verpflichtet, versucht Nimio, den italienischen Faschismus mit dem Katholizismus zu verbinden und ihn fest im politischen System Argentiniens zu verankern."
 POLITICS_MARCELO_ALVEAR_DESC:0 "Als Marcelo Torcuato de Alvear 1935 aus seinem Exil nach Argentinien zurückkehrt, ist er bereit, erneut Präsident zu werden. Als Vorsitzender der Radikalen Bürgerunion ist er überzeugt, dass er Argentiniens Wirtschaftswachstumshöhepunkt von 1928 wiederherstellen kann."
 POLITICS_FANNY_JABCOVSKY_DESC:0 "Abgestoßen vom Wahlbetrug im Jahr 1934 trat Fanny Jabcovsky der Partei Internationale Rote Hilfe bei. Als überzeugte Kommunistin war sie bereit, im Namen der Partei und der marxistischen Doktrin alles zu tun."
 #Australia
 POLITICS_JOSEPH_LYONS_DESC:0 "Joseph Lyons ist eine äußerst charismatische Persönlichkeit und der Kitt, der die United Australia Party zusammenhält. Als überzeugter Anhänger des Vereinigten Königreichs dient er dem Aufseher des Dominions mit äußerster Loyalität."
 POLITICS_JOHN_CURTIN_DESC:0 "John Curtin ist ein Patriot und eifriger Sozialreformer und wurde zum Gesicht der australischen Labour-Partei. Neben seinem Reformeifer setzt er sich entschieden für Frauen- und Kinderrechte ein und seine Politik kann als „patriotischer Labourismus“ bezeichnet werden."
 #Austria
 POLITICS_KURT_SCHUSCHNIGG_DESC:0 "Kurt Schuschnigg, Erbe der Diktatur von Engelbert Dollfuß nach dessen Ermordung durch die NSDAP, ist Gegner Hitlers und des Wunsches der NSDAP, Österreich einzuverleiben. Da Mussolini Anzeichen dafür zeigt, die Stresa-Front aufzugeben, sieht Österreichs Zukunft düster aus und Kurts Aufgabe wird zunehmend entmutigend."
 #Austria-Hungary
 POLITICS_FRANZ_JOSEPH_DESC:0 "Franz Joseph ist im historischen Bewusstsein der Nachwelt präsent. Er war ein Symbol der Monarchie, das über jede Kritik erhaben war. Auch heute noch gilt Franz Joseph in den Nachfolgestaaten der Monarchie als Inbegriff des Kaisers. Seine Persönlichkeit entwickelte sich unter einzigartigen und schwierigen Umständen: Von frühester Jugend an wurde ihm eingeschärft, dass er zum Kaiser auserwählt worden war, ein Amt, das er mit Demut ausüben sollte. Seine geistige Isolation wurde durch das Hofzeremoniell verstärkt, das seine kaiserliche Majestät auf eine fast religiöse Ebene erhob. Franz Joseph war ganz und gar von seiner göttlichen Mission als Kaiser durchdrungen. Im Dezember 1848 dankte Franz Josephs Onkel Kaiser Ferdinand in Olmütz ab. Dies war Teil des Plans von Ministerpräsident Felix zu Schwarzenberg, die Revolutionen von 1848 in Ungarn zu beenden. Anschließend bestieg Franz Joseph den Thron. Er galt weithin als Reaktionär und verbrachte seine frühe Regierungszeit damit, sich dem Konstitutionalismus in seinen Herrschaftsgebieten zu widersetzen. Nach dem Zweiten Italienischen Unabhängigkeitskrieg 1859 und dem Dritten Italienischen Unabhängigkeitskrieg 1866 war das Kaiserreich Österreich gezwungen, seinen Einfluss auf die Toskana und den größten Teil seines Anspruchs auf Lombardei-Venetien an das Königreich Sardinien abzutreten. Franz Joseph war während seiner gesamten Regierungszeit vom Nationalismus geplagt. Er schloss den Österreichisch-Ungarischen Ausgleich von 1867 ab, der Ungarn größere Autonomie gewährte und das Kaiserreich Österreich in die Doppelmonarchie Österreich-Ungarn umwandelte. Er regiert vorerst friedlich, musste jedoch persönlich die Tragödien der Hinrichtung seines Bruders Kaiser Maximilian I. von Mexiko im Jahr 1867, des Selbstmords seines Sohnes Kronprinz Rudolf im Jahr 1889 und der Ermordung seiner Frau Kaiserin Elisabeth im Jahr 1898 erleiden. Obwohl er trotz alledem vielen als integerer und anständiger Mensch bekannt ist, wird Franz Joseph von seinen Mitmenschen in seiner Reaktion auf die zahlreichen politischen und militärischen Niederlagen, die er als Herrscher erlitt und die er als persönliche Rückschläge empfand, unterschiedlich beschrieben: Er reagierte stoisch oder sogar gefühllos."
 #Belgium
 POLITICS_LEOPOLD_DESC:0 "König Leopold III. von Belgien war immer davor zurückgeschreckt, mit seinen Ministern zu verhandeln, und bevorzugte seine direkte Kontrolle über Angelegenheiten, die Belgien betrafen."
 POLITICS_HUBERT_PIERLOT_DESC:0 "Hubert Pierlot, ein Veteran des Ersten Weltkriegs, engagierte sich später in der Politik. Entsprechend seiner Erziehung trat Hubert der Katholischen Partei bei und wurde eines ihrer einflussreichsten und wichtigsten Mitglieder."
 POLITICS_ACHILLE_VAN_ACKER_DESC:0 "Als Mitglied der Belgischen Sozialistischen Partei (PSB-BSP) entwickelte Achille Van Acker seine sozialistischen Ansichten nach den Erfahrungen des Ersten Weltkriegs. Als er ins Parlament einzog, wurde die Sozialversicherungsgesetzgebung zu seinem Fachgebiet."
 #Mandatory Palestine
 POLITICS_ARTHUR_GRENFELL_DESC:0 "Sir Arthur Grenfell Wauchope, ein Veteran des Ersten Weltkriegs, ist ein fähiger Kolonialverwalter, der den Ideen eines israelischen Staates in Palästina aufgeschlossen gegenübersteht."
 POLITICS_AMIN_HUSSEINI_DESC:0 "Der Großmufti von Jerusalem, Amin al-Husseini, ist ein überzeugter arabischer Nationalist, der lautstärkste Gegner des britischen Mandats für Palästina und ein Bewunderer des deutschen Nationalsozialismus."
#Bolivia
 POLITICS_CARLOS_QUINTANILLA_DESC:0 "Carlos Quintanilla Quiroga ist seit 1939 Präsident der Republik. Er begann seine Militärkarriere in sehr jungen Jahren und kämpfte beim Ausbruch des Chaco-Krieges 1932 als Brigadegeneral gegen Paraguay. 1939 wurde er zum Chef des Generalstabs der Armee ernannt und im folgenden Jahr, nach dem Tod von Präsident Busch Becerra (1937–1939), Präsident von Bolivien. Seine erste Maßnahme an der Spitze des Landes bestand in der Aufhebung des Gesetzes seines Vorgängers, durch das die großen Bergbauunternehmen, viele davon mit ausländischem Kapital, gezwungen wurden, ihre gesamte Devisen an den Staat abzutreten. Auf diese Weise entfernte er sich von der sozialistisch angehauchten Politik, die Bolivien seit der Wahl David Toros zum Präsidenten im Jahr 1936 beherrscht hatte. Quintanilla regierte zum Nutzen der großen Landbesitzerfamilien Boliviens, der Patiños, Aramayos und Rothschilds."
 #Boxer Rebellion
 POLITICS_BOXERS_DESC:0 "Die Boxer, die im Chinesischen und Englischen auch unter verschiedenen anderen Namen bekannt sind, sind eine chinesische Geheimgesellschaft, die seit 1899 den Boxeraufstand auslöste. Sie entwickelte sich zu einer riesigen Bewegung mit 50.000 bis 100.000 Mitgliedern. Obwohl die Gruppe ursprünglich den Sturz der Qing-Dynastie wegen ihrer „Verwestlichung“ unterstützte, unterstützte sie später die Kaiserinwitwe bei der Beseitigung von Gruppen, die von den Boxern bekämpft wurden, insbesondere ausländische christliche Missionare und chinesische Konvertiten, die ihrer Ansicht nach ihren Bemühungen schadeten."
 POLITICS_CAO_FUTIAN_DESC:0 "Über das frühe Leben von Cao Futian ist wenig bekannt, doch er wurde im 19. Jahrhundert in Jinghai in der chinesischen Provinz Zhili geboren. Cao war Soldat und wurde von manchen Quellen als Bandit angesehen, der für seine Brutalität bekannt war. Er stellte in Tianjin eine Miliz auf, die größtenteils aus Analphabeten wie entlassenen Eisenbahnarbeitern, chinesischen religiösen Fanatikern, Kriminellen und arbeitslosen Jugendlichen bestand. Er ist ein Meister des Kung Fu und ein charismatischer Anführer. Cao hasst Ausländer wegen der Errichtung der ausländischen Konzessionen, aber noch mehr wegen der Verbreitung des Christentums durch Missionare. Er ist der Meinung, chinesische Christen sollten ausgewiesen werden, da sie die Reinheit der chinesischen Kultur befleckten. Anfangs feindlich gegenüber der chinesischen Kaiserlichen Armee eingestellt, kämpfte er im August 1899 gegen sie. Die Qing-Regierung war sich uneinig, wie sie auf die Aktivitäten der Boxer reagieren sollte, doch konservative Teile des Hofes unterstützten sie. Prinz Duan, ein glühender Anhänger der Sache, arrangierte ein Treffen zwischen Cao und der Kaiserinwitwe Ci Xi. Bei dem Treffen trug der Kronprinz sogar eine Boxeruniform, um seine Verbundenheit zu demonstrieren."
 POLITICS_ZHANG_DECHENG_DESC:0 "Zhang Decheng ist ein chinesischer Nationalist und Anführer der Fäuste der Harmonie und Gerechtigkeit. Obwohl er in seiner Jugend als Bootsmann arbeitete, verbrachte er einen Großteil des Boxeraufstands als Anführer der von ihm gegründeten Gruppe. Mit der Zeit und mit zunehmenden ausländischen Kontakten in Nordchina, insbesondere durch die Aktionen westlicher Missionare, machten sich Zhang und andere Gleichgesinnte daran, „Ausländer zu vernichten“. Obwohl die Fäuste der Harmonie und Gerechtigkeit Mitte der 1890er Jahre existierten, stellten sie für die offiziellen Qing- oder Außenpolitik nur eine geringfügige Unannehmlichkeit dar, da die Gruppe klein war, keinen Einfluss hatte und meist lokale Aktionen von Gruppen von jeweils etwa 50 Mann durchführten. Anfang 1900 ernannte er sich selbst zum „Boxer Nummer Eins“ und sagte, er habe einen Auftrag der Götter. Er führte damals mehrere tausend Anhänger an."
 #Brazil
 POLITICS_GETULIO_VARGAS_DESC:0 "Getúlio Dornelles Vargas ist der derzeitige Präsident Brasiliens. Er ist ein brasilianischer Politiker, der Nationalismus, Industrialisierung, Zentralisierung, Sozialfürsorge und Populismus befürwortet – weshalb er den Spitznamen „Vater der Armen“ erhielt. Geboren in einer wohlhabenden Familie mit langer Tradition in der brasilianischen Politik, interessierte ihn schon in seiner Jugend eine Karriere in der Armee und mit 16 Jahren meldete er sich bei der Armee. Er änderte jedoch bald seine Meinung und schrieb sich nach seinem Ausscheiden aus dem Militär an der juristischen Fakultät von Pôrto Alegre ein. Nach seinem Abschluss im Jahr 1908 begann er seine politische Karriere. 1922 wurde er zum Abgeordneten des Kongresses gewählt und 1926 ernannte ihn Präsident Washington Luis Pereira de Souza zum Finanzminister, ein Amt, das er bis zu seiner Wahl zum Gouverneur von Rio Grande do Sul, seinem Heimatstaat, im Jahr 1928 innehatte. Er nutzte diese Position erfolglos, um sich bei den Wahlen 1930 als Präsidentschaftskandidat Brasiliens aufzustellen. Getúlio Vargas schien die Niederlage zu akzeptieren, doch kurz nach der Wahl führte er einen Aufstand an, der ihn an die Spitze des Staates brachte. Vargas, der den Kongress fast immer ignorierte, regierte in den letzten Jahren und errichtete ein gemäßigt populistisches, autoritäres Regime."
 #Bulgaria
 POLITICS_FERDINAND_I_BUL_DESC:0 "Er wuchs im kosmopolitischen Umfeld des österreichisch-ungarischen Hochadels und in dessen angestammten Ländern in Ungarn und Deutschland auf. Das Haus Koháry entstammte einer immens wohlhabenden oberungarischen Adelsfamilie, die unter anderem die Fürstenländer Čabraď und Sitno in der Slowakei besaß. Der bisherige Fürst Bulgariens, Alexander von Battenberg, dankte 1886 nach einem prorussischen Putsch ab, nur sieben Jahre nach seiner Wahl. Ferdinand, ein Offizier der österreichisch-ungarischen Armee, wurde am 7. Juli 1887 von der Großen Nationalversammlung zum Fürsten des autonomen Bulgariens gewählt."
 POLITICS_BORIS_III_DESC:0 "Boris III. ist der derzeitige Zar von Bulgarien und Nachfolger von Ferdinand I. Nach einem Gegenputsch im Jahr 1935 erlangte Boris III. unter seiner „Königsregierung“ die Macht zurück und war verantwortlich für das, was heute als „Goldenes Zeitalter Bulgariens“ bekannt ist."
 #Burma
 POLITICS_ARCHIBALD_COCHRANE_DESC:0 "Sir Archibald Douglas Cochrane, ein schottischer Marineveteran aus dem Ersten Weltkrieg, war Abgeordneter, bis er im Mai 1936 zum Gouverneur von Burma ernannt wurde."
 #Canada
 POLITICS_MACKENZIE_KING_DESC:0 "William Lyon Mackenzie King ist ausgebildeter Jurist und Sozialarbeiter und war vor seiner dritten Amtszeit ab 1935 zweimal Premierminister Kanadas. Mackenzie King ist ein eigenartiger Mensch und hat viele unpopuläre und bizarre Überzeugungen, insbesondere seinen Spiritualismus."
 #China
 POLITICS_CHIANG_KAI-SHEK_DESC:0 "Chiang Kai-shek, der Nachfolger von Yun Sat-sen, ist ein chinesischer Nationalist, dessen Lebensziele die Industrialisierung Chinas, die Ausrottung der chinesischen Kommunisten und die Beseitigung westlicher Einflüsse in Asien sind. Dafür ist er bereit, alles zu tun."
 POLITICS_Committee_of_the_Chinese_Communist_Party_DESC:0 "Das Komitee der Kommunistischen Partei Chinas ist die Avantgarde unserer kommunistischen Führung. Es wurde 1927 gegründet und wird von einer sehr heterogenen Gruppe von Persönlichkeiten wie Chen Duxiu, Li Dazhao, Zhou Enlai und anderen geleitet. Wir sind verantwortlich für die theoretischen Grundlagen der Partei und den Übergang von der Revolution zur Regierung. "
 POLITICS_MAO_ZEDONG:0 "Mao Zedong"
 POLITICS_MAO_ZEDONG_DESC:0 "Mao Zedong, ein marxistisch-leninistischer totalitärer Revolutionär, wurde nach dem Langen Marsch, mit dem der Rückzug nach Shaanxi begann, zum Führer der Kommunistischen Partei Chinas."
 POLITICS_WANG_JINGWEI_DESC:0 "Wang Jingwei, einst Mitglied des linken Flügels der Kuomintang, rückte nach dem Scheitern seiner Verhandlungen mit der KPCh immer weiter nach rechts. Als persönlicher Feind Chiang Kai-sheks ist Wang Jingwei zu allem bereit, um China zu übernehmen, auch zur Kollaboration mit Ausländern."
 #Chinese Empire
 POLITICS_DOWAGER_CIXI_DESC:0 "Sie wird auch als „der alte Buddha“ bezeichnet und ist eine chinesische Kaiserinwitwe und Regentin, die seit 1861 47 Jahre lang die chinesische Regierung in der späten Qing-Dynastie de facto kontrollierte. In ihrer Jugend wurde sie zur Konkubine des Kaisers Xianfeng ernannt, und nach dem Tod des Kaisers im Jahr 1861 wurde ihr Sohn Kaiser Tongzhi und sie wurde seitdem Kaiserinwitwe."
 POLITICS_PRINCE_CHUN_DESC:0 "Zaifeng ist ein Mandschu-Prinz und der derzeitige Regent der späten Qing-Dynastie. Er war ein Sohn von Yixuan, dem siebten Sohn des Daoguang-Kaisers, und der Vater von Puyi. Ende Februar oder Anfang März 1901 wurde Prinz Chun vom kaiserlichen Hof der Qing-Dynastie, der nach der Evakuierung Pekings nach Xi&#39;an umgezogen war, zum Armeeinspektor ernannt. Im Juni 1901 wurde Prinz Chun auf Drängen der ausländischen Mächte zum Sonderbotschafter ernannt, um im Namen der Qing-Regierung Deutschland sein Beileid zum Mord an einem deutschen Diplomaten auszusprechen. Im Juli brach Prinz Chun auf dem Seeweg nach Deutschland auf und traf im September in Potsdam Kaiser Wilhelm II. Obwohl er zunächst geplant hatte, anschließend durch Europa zu reisen und Belgien und London zu besuchen, musste er seine Pläne absagen und aufgrund gesundheitlicher Probleme der Kaiserinwitwe Cixi vorzeitig nach China zurückkehren. Nach dem Tod des Kaisers von Guangxu am 14. November 1908 erließ die Kaiserinwitwe Cixi ein kaiserliches Edikt, in dem sie den ältesten Sohn von Prinz Chun, Puyi, zum Nachfolger ernannte."
 #Chile
 POLITICS_PEDRO_MONTT_DESC:0 "Pedro Montt schloss 1870 sein Jurastudium am Nationalen Institut ab. 1876 wurde er zum Mitglied der Abgeordnetenkammer gewählt und 1885 deren Präsident. Montt bekleidete zwei Posten im Kabinett des ehemaligen Präsidenten José Manuel Balmaceda, beteiligte sich jedoch 1891 aktiv an der Revolution, die Balmaceda stürzte. Anschließend ging er in die Vereinigten Staaten, zunächst als Agent der Revolutionsjunta und später (nach der Anerkennung durch die USA) als Minister."
 POLITICS_RAMON_BARROS_DESC:0 "Er stammte aus aristokratischer Herkunft, war aber arm. Er arbeitete als Lebensmittelhändler, kastrierte Vieh im Schlachthof und sang italienische Opern. Von 1897 bis 1900 war er außerdem außerordentlicher und bevollmächtigter Minister Chiles in Frankreich und von 1898 bis 1900 hatte er dieselbe Position vor der Schweiz und dem Heiligen Stuhl inne." 
 POLITICS_ARTURO_ALESSANDRI_DESC:0 "Arturo Alessandri, der dreimal als chilenischer Präsident amtierte, ist ein Reformer, der den Einfluss der Exekutive auf den chilenischen Kongress kontinuierlich ausgebaut hat."
 #Colombia
 POLITICS_GABRIEL_VARGAS_SANTOS_DESC:0 "Gabriel Vargas Santos, geboren 1829 auf Charalá, ist ein bekanntes und angesehenes Mitglied der Partido Liberal Colombiano. Nach seinem Kampf im Bürgerkrieg von 1860 zog er sich von den Schlachtfeldern zurück und wurde ein mächtiger Caudillo von Casanare, bevor er sich aus dem öffentlichen Leben zurückzog. Nach dem jüngsten Aufstand der Partido Liberal gegen die Regierung von Sanclemente und zahlreichen Anfragen anderer liberaler Führer kehrte er jedoch zurück, um die liberale Partei zu koordinieren."
 POLITICS_RAFAEL_ZENON_URIBE_DESC:0 "Rafael Zenon Uribe wurde in der Kleinstadt Valparaíso geboren und wuchs bei seiner Mutter auf. Der angeblich schüchterne Junge wurde an der Universität von Antioquia angenommen und studierte später Kampfkunst an der Militärschule „Escuela del Estado“. Nach seiner Verwundung im Bürgerkrieg 1876 besuchte er erneut die Universität und schloss sein Jurastudium ab. Unter seinen Mitschülern ist er vor allem für seine politischen Ideen bekannt, die den Aufbau eines Gildensozialismus und von Gewerkschaften in Kolumbien befürworteten, für seine diplomatische Arbeit und seine Unterstützung kolumbianischer Kaffeebauern im Kampf gegen Krankheiten wie Rost."
 POLITICS_MANUEL_ANTONIO_SANCLEMENTE_DESC:0 "Manuel Antonio Sanclemente wurde 1813, mitten in der Südamerikanischen Revolution, als Sohn von José und Marina Sanclemente geboren. Er studierte Jura an der Universität von Cauca und schloss sein Studium 1837 ab. Mit 84 Jahren wurde er Präsident. Seine frühe Amtszeit war geprägt von mangelnder Organisation. So verlegte er beispielsweise den Regierungssitz von Bogotá nach Villeta, um seinem schlechten Gesundheitszustand entgegenzuwirken. Trotz seines sich verschlechternden Gesundheitszustands ist er weiterhin bereit, sein Mandat fortzusetzen. Nun steht er vor der schwierigen Aufgabe, sowohl den Aufstand als auch die Korruption und den Gehorsamsverweigerer in seinem Kabinett zu bekämpfen."
 POLITICS_RAFAEL_REYES_PRIETO_DESC:0 "Rafael Reyes wurde 1849 in Santa Rosa de Viterbo als Sohn von Ambrosio Reyes Moreno geboren. Mit 17 Jahren schloss er sein Studium ab und gründete mit seinen Geschwistern die Exportfirma Hermanos Reyes, die Quina in den Amazonas-Dschungel exportierte. Nach dem Tod seines Bruders, der sein Unternehmen 1885 in Konkurs ging, trat der 35-jährige Reyes der Armee bei, um im Bürgerkrieg zu kämpfen. Aufgrund seines Mutes und seiner Kriegskunst wurde er kurz darauf zum General befördert. Reyes, ein angesehenes Mitglied der Partido Conservador, ist eher ein professioneller Verwalter und Sozialreformer als ein Politiker, der eine Versöhnung seiner Partei mit der Partido Liberal anstrebt."
 POLITICS_RAMON_GONZALEZ_VALENCIA_DESC:0 "Ramón González Valencia wurde 1851 in Chitagá geboren und arbeitete in seiner Kindheit als Bauer und Viehzüchter. 1876 trat er jedoch der Armee bei und nahm an der Schlacht von Hatogrande gegen Präsident Aquileo Parra teil. Später kämpfte er auch gegen den liberalen Aufstand von 1895. Während seiner gesamten Militärkarriere wurde er für seinen Mut und sein Mitgefühl geschätzt. Als rechtskonservativer Mann ist er für seine offene Religiosität bekannt und betete bei militärischen Niederlagen oft inbrünstig zu Gott, um ihm zu helfen, die Schlacht zu gewinnen. "
 POLITICS_MARCO_FIDEL_SUAREZ_DESC:0 "Marco Fidel Suárez wurde 1855 in einer bescheidenen Hütte in Hatoviejo geboren. Als Sohn der einfachen Arbeiterin Rosalía Suárez verkaufte er vor der Schule die Kekse seiner Mutter. Im Alter von 14 Jahren wurde er 1869 auf Empfehlung seines Lehrers und von Pater Joaquín Tobón in das Priesterseminar von Medellín aufgenommen, wo Suárez Latein, Philosophie, Theologie, Kirchenrecht, Bibliologie, Dogmatik und Kirchengeschichte studierte. Mitten in der von der radikalen Regierung verursachten sozialen Krise schloss er 1876 mit hervorragenden Noten ab. Trotz seiner tadellosen Laufbahn durfte er aufgrund seiner außerehelichen Herkunft nicht zum Priester geweiht werden. Er blieb in der Jungenschule seiner Heimatstadt Hatoviejo, wo er als Lehrer und Direktor arbeitete, bis er 1879 der Armee seines Departements unter dem Kommando von Braulio Jaramillo beitrat, nachdem es aufgrund der antiklerikalen Maßnahmen der Liberalen zu einem militärischen Aufstand gegen die lokale Regierung gekommen war. Später wurde er zum Leutnant befördert, doch die Niederlage seiner Einheit zwang ihn, sich nach Santa Rosa de Osos zurückzuziehen. 1880 reiste er nach Bogotá, wo er am Colegio del Espíritu Santo arbeitete und zusammen mit anderen hervorragenden Professoren wie Miguel Antonio Caro jungen Leuten aus der Elite der Hauptstadt Unterricht gab, darunter Antonio José Cadavid, José Vicente Concha und Miguel Abadía Méndez, die er Jahre später als seine Mitstreiter wiedersehen sollte. Ab dem Jahr 1896 begab sich Suárez in die Welt der Politik, die seinem Geist und friedlichen Charakter so fremd war. Er war in drei verschiedenen Regierungen Außenminister Kolumbiens und zeichnete sich in allen dreien durch sein diplomatisches Geschick und seine pazifistische Haltung aus. Derzeit ist er Präsident Kolumbiens und wird dabei vom Klerus und dem offiziellen Sektor seiner Partei unterstützt."
 POLITICS_GUILLERMO_QUINTERO_CALDERON_DESC:0 "Guillermo Quintero Calderón wurde 1832 in Puerto Nacional im Haus wohlhabender Eltern aus Ocaña geboren. Trotz der wohlhabenden Herkunft seiner Familie wurde Quintero an einem unwirtlichen und ungesunden Ort geboren, da Guillermos Eltern nach Bogotá flohen und die Geburt ihnen auf der Durchreise dort bevorstand. Quintero absolvierte sein Grundstudium an der Schule Pinillos de Mompós und ging später 1854 nach Bogotá, wo er sein Jurastudium an der Universidad del Rosario abschloss. Dank des Einflusses seines Vaters trat er der Armee bei und kämpfte unter dem Befehl des ehemaligen Präsidenten Tomás Cipriano de Mosquera gegen die Diktatur von José María Melo, wo er den Rang eines Generals erreichte. Quintero war Mitglied der Partido Conservador und wurde von der Partei zum Bürgerkrieg von 1885 gerufen, als die Liberalen gegen Präsident Rafael Núñez zu den Waffen gegriffen hatten. Dort leistete er Widerstand gegen die Ankunft der liberalen Radikalen in der sogenannten Schlacht von La Humareda, in der die Männer von Quintero siegreich waren und er als Kriegsheld anerkannt wurde. Er erhielt den Spitznamen „Der Held von La Humareda“ und wurde am 6. Juni 1886 mit der Heldenmedaille ausgezeichnet. In diesen Tagen ernannte ihn Präsident Núñez zum Gouverneur von Santander. Dieses Amt behielt er bis zu seiner Ernennung zum Generalkommandeur der kolumbianischen Armee. "
 POLITICS_MARIA_CANO_DESC:0 "María de los Ángeles Cano, Tochter von Rodolfo Cano und Amelia Márquez, wurde 1887 in Medellín geboren. Als Autodidaktin, die dem unabhängigen und freien Denken ihres Vaters folgte, arbeitete sie an den Zeitschriften Cyrano und El Correo Liberal (1923) mit und begründete zusammen mit den Schriftstellerinnen María Eastman und Fita Uribe die literarische Aktivität weiblicher Schriftsteller jener Zeit, die bald in verschiedenen Regionen des Landes Nachahmer fand. Sie begann ihr direktes politisches und gewerkschaftliches Engagement in den Minen von Segovia und Remedios und bereiste von dort aus praktisch das ganze Land, um die Rechte der Arbeiterklasse und der Frauen zu verteidigen. Sie führte den Kampf für die grundlegenden Bürgerrechte der Bevölkerung und für die Rechte der Angestellten an, rief zu Arbeiterstreiks auf und agitierte dafür, wodurch sie an der Verbreitung sozialistischer Ideen in Kolumbien mitwirkte."
 POLITICS_ELISEO_ARANGO_RAMOS_DESC:0 "Eliseo Arango Ramos, geboren 1900 in Bagadó, ist einer der führenden konservativen Ideologen Kolumbiens. Arango studierte Jura an der Universidad de Caldas und der Universidad Nacional und gründete später die Intellektuelle Gruppe „Los Leopardos“, eine rechtsextreme Gruppe, die sich dem Caudillismo von Laureano Gómez und dem Rest der konservativen Partei widersetzte."
 POLITICS_GUILLERMO_VALENCIA_DESC:0 "Guillermo Valencia Castillo, auch bekannt als „El Maestro“, wurde 1873 in Popayán in eine liberale Familie geboren. Als überzeugter Katholik mit starkem und zähem Temperament duldete er trotz seines Status die Abwertung der Unterschicht nicht. Als Pionier der modernistischen Literaturbewegung Kolumbiens trat er mit 23 Jahren der Partido Conservador bei, wo er aufgrund seines jungen Alters auffiel. Zwischen 1904 und 1908 war er erneut Abgeordneter und entwickelte sich zu einem herausragenden Parteiführer, bevor er bis 1914 nach Europa zog."
 POLITICS_ENRIQUE_OLAYA_HERRERA_DESC:0 "Enrique Alfredo Olaya Herrera wurde 1880 auf Guateque geboren und war der erste Liberale, der nach der langen Herrschaft der Konservativen, einer Zeit der konservativen Hegemonie, ein Amt bekleidete. In seiner Jugend als „der Kinderjournalist aus Guateque“ bekannt, gründete er mit zwölf Jahren die kleine Zeitung „El Patriota“. Er kämpfte im Tausendtagekrieg auf liberaler Seite und studierte später Jura an der Universidad Republicana."
 POLITICS_JORGE_ELIECER_GAITAN_DESC:0 "Jorge Eliécer Gaitán Ayala, Absolvent der Universidad Nacional, wurde 1903 in Bogotá geboren. Gaitán erwarb sich einen Ruf als Redner und Verteidiger populärer Anliegen, insbesondere durch seine Interventionen in der Debatte über das Bananenmassaker von 1928, die ihm den Titel „Volkstribun“ einbrachten. 1931 wurde er zum Präsidenten des Repräsentantenhauses gewählt und war zudem Professor für Strafrecht an der Nationaluniversität."
 POLITICS_LAUREANO_GOMEZ_DESC:0 "Laureano Eleuterio Gómez Castro wurde 1889 in Bogotá geboren. Gómez gilt als einer der radikalsten Führer der Konservativen Partei und als einer der vielversprechendsten Redner Kolumbiens. Seine offene Bewunderung für den Nationalsozialismus und den Franquismus brachte ihm mehrere Vertreibungen aus Kolumbien ein. Noch während seines Studiums schloss er sich der Konservativen Jugend an und erklärte sich zum Gegner der Regierung von General Rafael Reyes. Ursprünglich ein Gegner des Faschismus, wurde er 1930 als Botschafter nach Deutschland geschickt, wo er bis 1932 blieb, bevor er nach Kolumbien zurückkehrte. Nach seiner Rückkehr beschuldigte er Präsident Enrique Olaya Herrera, die politische Gewalt in Kolumbien wieder aufleben zu lassen, und ließ die Partido Conservador bei den Wahlen von 1934 und 1938 absetzen. Gómez’ Programm war in diesen Jahren ausgesprochen rassistisch. In seiner Zeitung „El Siglo“ äußerte er scharfe Kommentare gegen die jüdische, indigene und afroamerikanische Bevölkerung, führte zu einem Plebiszit zur Vertreibung der Juden und erklärte die indigene und afroamerikanische Rasse für minderwertig."
 POLITICS_MARIANO_OSPINA_PEREZ_DESC:0 "Luis Mariano Ospina Pérez wurde am 24. November 1891 in Medellín im Haus wohlhabender Geschäftsleute der Stadt geboren. Er entstammte einer der bedeutendsten Familien der nationalen Politik und absolvierte mit den Jesuiten das Colegio San Ignacio de Loyola in Medellín und später die Escuela de Minas de Antioquia, wo er 1914 einen Abschluss als Bergbauingenieur erlangte. Ospina blickt auf eine lange politische Karriere zurück und wurde von 1946 bis 1950 Präsident Kolumbiens. Seine Regierung zeichnete sich durch Werke wie die Einrichtung einer Sozialversicherungsanstalt, die Privatisierung der Ölindustrie und die Gründung der Großkolumbianischen Handelsflotte aus, doch wurde dies durch die unverhältnismäßige Zunahme der Partisanengewalt nach der Ermordung von Jorge Eliecer Gaitán im Jahr 1948 überschattet."
 POLITICS_ALFONSO_LOPEZ_PUMAREJO_DESC:0 "Alfonso López Pumarejo, Sohn des Geschäftsmanns und Bankiers Pedro A. López, studierte Wirtschaft und Finanzen in London und New York. Nach seiner Rückkehr im Jahr 1904 übernahm er die Leitung von Casa López und unternahm bedeutende Initiativen und Unternehmen. Zusammen mit anderen jungen Leuten rief er die republikanische Bewegung rund um die Zeitung El Liberal ins Leben, von wo aus er seine politische Karriere begann. Er arbeitete auch mit El Republicano und dem Diario Nacional zusammen. Als herausragendes Mitglied der Partei wurde er 1915 zum Abgeordneten der Versammlung von Tolima gewählt; 1925 war er Abgeordneter im Repräsentantenhaus und 1930 Senator. Nach seinem Wahlsieg im Jahr 1934 folgte er schließlich Enrique Olaya Herrera (1930–1934) als Präsident nach. Die erste Amtszeit von Alfonso López Pumarejo (1934–1938) führte zu einer Umgestaltung der Agrar- und Industriepolitik des Landes, einer Reform des Arbeits-, Steuer- und Justizsystems sowie einer Verbesserung der Hochschulbildung. Das Kabinett von López Pumarejo wählte die von ihm so genannte „Revolution im Gange“ zum Motto und orientierte sich an der Modernisierung des Landes und seinem Eintritt in die kapitalistische Wirtschaft."
 POLITICS_EDUARDO_SANTOS_MONTEJO_DESC:0 "Eduardo Santos Montejo, Sohn des Politikers und Journalisten Francisco Santos Galvis und Leopoldina Montejo Camero, wurde 1888 in Bogotá geboren. Nach dem frühen Tod seines Vaters im Jahr 1900 begann er ein Jurastudium an der Universidad del Rosario in Bogotá und schloss 1908 sein Studium der Rechtswissenschaften und Politikwissenschaften an der Nationaluniversität ab. Anschließend ging er nach Paris, um seine Ausbildung mit einem Studium der Literatur und Soziologie abzuschließen. Als Journalist tat er sich hervor, indem er für eine der einflussreichsten Zeitungen Kolumbiens, El Tiempo, arbeitete, für die er die Interessen der Liberalen Partei und seine eigenen politischen Ambitionen verteidigte. Seine Regierung wurde „der Große Stillstand“ genannt, im Gegensatz zur „Revolution in Bewegung“ der vorherigen Regierung von López Pumarejo, da sie progressive Maßnahmen einfror, um der katholischen Kirche, der Konservativen Partei und kolumbianischen Großgrundbesitzern zu gefallen. Obwohl er als Gegner von López galt, ging er nicht so weit, eines seiner Gesetze aufzuheben oder eine seiner Maßnahmen aufzuheben."
 POLITICS_DARIO_ECHANDIA_OLAYA_DESC:0 "Darío Echandía Olaya wurde 1897 in eine Familie von Viehzüchtern und Bauern geboren und war mit Anwälten und Politikern verwandt. Er trat schon in jungen Jahren der Partido Liberal bei. Er beteiligte sich an der Kampagne von Enrique Olaya Herrera bei den Wahlen von 1930 und wurde einer der Vertrauten des Direktors der Liberalen Partei, Alfonso López Pumarejo. 1934 wurde er zum Abgeordneten in die Kammer gewählt. Im selben Jahr, am 10. Februar, wurde er auch zum Mitglied des nationalen Direktoriums seiner Partei gewählt. Von dieser Position aus widmete sich Echandía der Unterstützung von López&#39; Präsidentschaftskampagne. Unter López&#39; Regierung wurde Echandía sowohl zum Regierungsminister als auch zum Bildungsminister ernannt und widmete sich der Förderung der „Revolución en Marcha“, dem von López propagierten Reformprogramm. Der Senat ernannte ihn 1943 zum Präsidenten und wechselte mit seinen Aufgaben als Minister, da der Präsident eine Reisegenehmigung in die Vereinigten Staaten beantragte, um sich um den angeschlagenen Gesundheitszustand seiner Frau Maria Michelsen zu kümmern."
 POLITICS_ALBERTO_LLERAS_CAMARGO_DESC:0 "Alberto Lleras Camargo wurde 1906 in Bogotá in einem bescheidenen Bauernhaus geboren. Seit seinem achten Lebensjahr war er Journalist und widmete seine ersten Jugendjahre dem Journalismus, einer Tätigkeit, die er später abwechselnd mit der Politik betrieb. 1929 wurde Lleras zum stellvertretenden Stadtrat von Bogotá gewählt, was seinen ersten Ausflug in die Politik markierte. Im folgenden Jahr, 1930, wurde Lleras zum Sekretär der Generalführung der Liberalen Partei Kolumbiens ernannt und war die rechte Hand von Alfonso López. Mit der Unterstützung des liberalen Präsidenten Enrique Olaya Herrera und seines Bruders Felipe Lleras (der bereits 1930 zum Senator gewählt worden war) wurde Alberto in das Repräsentantenhaus von Bogotá gewählt, wo er von 1931 bis 1933 saß. Im selben Jahr wurde er der erste Liberale seit über 40 Jahren an der Spitze des Hauses und beendete damit die Vorherrschaft der Konservativen. Nach seinem Ausscheiden aus der Regierung im Jahr 1946 widmete sich Lleras wieder seiner journalistischen Tätigkeit und gründete die Zeitschrift „Semana“, die im Stil der TIME sehr ähnlich war und als Vorläufer der Wochenzeitungen im Land galt. Er war ein entschiedener Gegner der Regierungen von Laureano Gómez und Gustavo Rojas Pinilla. Bei den Präsidentschaftswahlen 1958 besiegte Lleras den konservativen Dissidenten und ehemaligen Parlamentarier aus Bogotá, Jorge Leyva, mit über 77 % der abgegebenen Stimmen."
 POLITICS_GILBERTO_VIEIRA_WHITE_DESC:0 "Gilberto Vieira White, Gründer der Kommunistischen Partei, wurde 1911 in Medellín geboren. Er studierte am Instituto Universitario de Manizales, wurde aber wegen seiner kommunistischen Ansichten von der Universität verwiesen. Er war einer der Gründer der Central de Trabajadores de Colombia, führte Bauernbesetzungen in Viotá an und vertrat die Partido Comunista auf kommunistischen Kongressen in Russland, der Tschechoslowakei und Bulgarien, um nur einige zu nennen. Als sehr kluger Politiker weigerte er sich, für das Präsidentenamt zu kandidieren, da er wusste, dass seine Niederlage sicher war. Stattdessen verbreitete er seine Ideale durch Persönlichkeiten wie Jaime Pardo Leal, Bernardo Jaramillo Ossa und José Antequera, der schließlich inmitten des schmutzigen Krieges gegen die Patriotische Union ermordet wurde, den Vieira stets vehement verurteilte. Obwohl er schwierige Zeiten durchlebt hat, ist er nicht bereit, seine Überzeugungen aufzugeben. Als Präsident Kolumbiens wird er nun versuchen, eine gerechtere Gesellschaft für alle zu schaffen und dabei die Meinungen seiner politischen Gegner zu respektieren."

 #Costa Rica
 POLITICS_LEON_CORTES_CASTRO_DESC:0 "León Cortés Castro wurde am 8. Dezember 1882 in Alajuela, Costa Rica, als Sohn von Dr. Roberto Cortés und Fidelina Castro Ruiz geboren. Er besuchte die Grundschule in seiner Heimatstadt und die weiterführende Schule am Liceo de Costa Rica. Nach Abschluss seines Universitätsstudiums schloss er 1916 sein Lehramts- und Jurastudium ab und übte beide Disziplinen aus. Er war Lehrer, Schulbesucher und Richter. Später studierte er Jura und schloss 1916 sein Jurastudium an der Escuela de Derecho de Costa Rica ab. Nachdem er seine Anwaltskarriere aufgegeben hatte, beschloss er, in Alajuela Politik zu machen. Von dort aus hatte er verschiedene ehrenvolle Positionen inne, darunter: Diputado al Congreso por Alajuela in vier verschiedenen Perioden (1914-1917 und 1922-1929), Ministro Plenipotenciario de Costa Rica in Guatemala (1917-1918), Secretario de Educación Pública (1929-1930), unter anderem. Es entwickelte sich ein Regierungsstil, der sich durch Autoritarismus, Ordnung und Effizienz auszeichnete. 1936 gewann Cortés Castro die Wahlen und wurde neuer Präsident der Republik. Von diesem Tag an herrschte er über Costa Rica. Cortés entwickelte eine umfassende Infrastrukturpolitik, die das Wirtschaftswachstum und die Strukturierung des Landes förderte."
 #Croatia
 POLITICS_ANTE_PAVELIC_DESC:0 "Ante Pavelić, Gründer der kroatischen Ustascha-Partei, ist ein kroatischer Ultranationalist, dessen Politik an die des nationalsozialistischen Deutschlands erinnert. Er strebt ein „Kroatien für Kroaten“ an und schreckt vor nichts zurück, um dieses Ziel zu erreichen."
 #Czechoslovakia
 POLITICS_EDVARD_BENES_DESC:0 "Edvard Beneš, Mitglied des Völkerbundrates, ist eine international bekannte und einflussreiche Persönlichkeit. Als Nachfolger von Präsident Tomáš Masaryk ist er nun – ob nun gut oder schlecht – der alleinige Entscheidungsträger in der Tschechoslowakei."
 POLITICS_MILAN_HODZA_DESC:0 "Milan Hodža, ein prominenter tschechoslowakischer Politiker, ist einer der ersten Staatsmänner des Landes, der sich für die Belange der Slowakei einsetzte. Er schlägt eine stärkere regionale Integration vor und hofft, eine demokratische Föderation in Mitteleuropa zu errichten."
 #DDR
 POLITICS_WILHELM_PIECK_DESC:0 "Wilhelm Pleck entging 1922 nur knapp dem Tod und ist seit seinem Umzug nach Moskau 1933 ein überzeugter Kommunist und williger Anhänger Josef Stalins. Nach der Niederlage der Nationalsozialisten kehrte er nach Deutschland zurück, mit der festen Absicht, die Politik des sowjetischen Diktators umzusetzen."
 #Denmark
 POLITICS_CHRISTIAN_X_DESC:0 "Christian X., König von Dänemark und Island, ist ein altmodischer Monarch, der sich lieber stärker in die Angelegenheiten des Landes einbringt. Angesichts einer möglichen Revolution trat er jedoch zurück und übernahm die symbolische Rolle des Staatsoberhaupts, um den Kontakt zu den Dänen wiederherzustellen."
#Dervish State
 POLITICS_ABDULLAH_HASSAN_DESC:0 "Sayid Mohamed Abdullahi Hassan, oder einfach Mohammed Abdullah Hassan, ist der derzeitige militärische Anführer der Derwisch-Bewegung und führt militärische Expeditionen durch, um das Christentum zu bekämpfen. Nachdem eine Gruppe von Kindern zum Christentum konvertiert war, war Sayyid Hassan empört und sagte, die Briten hätten ihre Religion zerstört. Aus diesem Grund wurde ihnen der Krieg erklärt. Daraufhin bat er den Bimal-Clan, eine Familie, die für wichtige Widerstandsbewegungen gegen die Kolonialisten verantwortlich war, um Unterstützung im Kampf der Derwische."
#Ecuador
 POLITICS_FEDERICO_PAEZ_DESC:0 "Federico Páez Chiriboga wurde 1877 in Quito geboren. Er schloss seine Grund- und weiterführende Schule am Hoche Lyceum in Paris ab und studierte Ingenieurwissenschaften an den Universitäten Gent und Brüssel in Belgien. Er bekleidete die Ämter des Senators und des Ministers für öffentliche Arbeiten (1935). Obwohl er keiner Partei direkt angehörte, sympathisierte er mit der sozialistischen Linie, sodass linke Senatoren ihm den Spitznamen „fünfter Bolschewik“ gaben. Am 26. September 1935 wurde er vom militärischen Obersten Regierungschef ernannt und ist seit diesem Tag Präsident der Republik. Während seiner Regierungszeit wurde die Caja del Seguro Social de Empleados Privados y Obreros (Institut für soziale Wohlfahrt) gegründet, das Ley Orgánica del Trabajo (das Streiks regelte und den Mindestlohn einführte) und die Reformen des Bürgerlichen Gesetzbuches durchgeführt. Am 28. November 1936 kam es in Quito zum Aufstand des Calderón-Regiments im sogenannten „Vier-Stunden-Krieg“, den er einer von Moskau geförderten bolschewistischen Verschwörung zuschrieb. Infolgedessen verhärtete Páez seine Position bis hin zum grausamen Tyrannen. Er erließ das sogenannte Sozialversicherungsgesetz, durch das die wichtigsten Garantien abgeschafft wurden. Gegenüber der Literatenwelt schuf es eine Atmosphäre des Misstrauens und der Unterdrückung. Es schränkte die Pressefreiheit ein und bestrafte Verdächtige mit der Verbannung ins Ausland oder auf die Galapagosinseln."
 #Egypt
 POLITICS_FAROUK_MUHAMMAD_ALI:0 "König Faruk I., von seinen Untertanen als „geliebter König“ bezeichnet, ist der Herrscher Ägyptens. Obwohl er in Ägypten als Untertan der britischen Krone aufwuchs, hat Faruk die tiefe Italophilie seines Vaters geerbt. Ägyptens Zukunft ist in seinen Händen ungewiss."
#El Salvador
 POLITICS_MAXIMILIANO_HERNANDEZ_MARTINEZ_DESC:0 "Maximiliano Hernández Martínez wurde am 29. Oktober 1882 geboren. Der Einsiedler, der selten in der Öffentlichkeit auftritt, ist Theosoph, der an Reinkarnation glaubt und sich mit okkulten Praktiken beschäftigt. In sehr jungem Alter trat er der salvadorianischen Armee bei, wo er 1906 am Krieg gegen Guatemala teilnahm und 1919 zum Brigadegeneral aufstieg. Martínez kam 1931 in einem turbulenten Jahr politischer Manöver an die Macht. Er wurde Vizepräsident von Arturo Araujo, einem wohlhabenden Landbesitzer mit Reformambitionen. Nach seinem Wahlsieg erwies sich Araujo jedoch als schwacher Herrscher, der nicht in der Lage war, die ernsten Probleme zu bewältigen, die sich aus der Weltwirtschaftskrise ergaben, insbesondere den niedrigen Preisen für Kaffee, das wichtigste Exportgut des Landes. Im Dezember 1931 vertrieb eine Gruppe junger Armeeoffiziere Araujo in einem Militärputsch. Martínez wurde verhaftet, doch die jüngeren Offiziere setzten ihn später als Präsidenten ein, da er als Vizepräsident der nächste in der Thronfolge war. Die Lage änderte sich durch den Ausbruch eines Bauernaufstands im gesamten Landesinneren, bei dem verärgerte Bauern versuchten, das Land an sich zu reißen. Der Aufstand alarmierte die Landbesitzer und zwang sie, militärische Unterstützung zu suchen. Dabei wandten sie sich an General Martínez, der seine Chance erkannte und den Aufstand gnadenlos niederschlug. Mit der neuen Unterstützung der Oligarchie konnte Martínez seine Position festigen und inszenierte sorgfältig seine eigene Wahl. In den folgenden Jahren verlängerte Martínez sein Mandat zweimal. El Salvador war in den 1930er Jahren praktisch bankrott, und da daher wenig Geld für Regierungsprojekte übrig blieb, beschränkten sich Martínez&#39; Bemühungen auf minimale Ausgaben. Der General behielt seine persönliche Kontrolle über das Land, wobei das Regime in den letzten Jahren immer repressiver wurde."
 #England/United Kingdom 
 POLITICS_QUEEN_VICTORIA_DESC:0 "Als Königin des Vereinigten Königreichs von Großbritannien und Irland regierte sie seit dem 20. Juni 1837 länger als jeder andere britische Monarch vor ihr. Das Viktorianische Zeitalter ist eine Zeit des industriellen, politischen, wissenschaftlichen und militärischen Wandels im Vereinigten Königreich und geprägt von einer enormen Ausdehnung des Britischen Empire. 1876 verlieh ihr das britische Parlament durch eine Abstimmung zusätzlich den Titel einer Kaiserin von Indien. Ihre Mutter war äußerst fürsorglich und Victoria wuchs weitgehend isoliert von anderen Kindern im Rahmen des sogenannten „Kensington-Systems“ auf, einem ausgeklügelten Regelwerk und Protokollen, das von der Herzogin und ihrem ehrgeizigen und herrschsüchtigen Kontrolleur Sir John Conroy ausgearbeitet wurde, der Gerüchten zufolge der Liebhaber der Herzogin war. Victoria heiratete 1840 ihren Cousin ersten Grades, Prinz Albert von Sachsen-Coburg und Gotha. Ihre Kinder heirateten in königliche und adelige Familien auf dem ganzen Kontinent ein, was Victoria den Spitznamen „Großmutter Europas“ einbrachte und die Hämophilie unter den europäischen Königshäusern verbreitete. Albert wurde ein wichtiger politischer Berater und Begleiter der Königin und ersetzte Viscount Melbourne als dominierende einflussreiche Persönlichkeit in der ersten Hälfte ihres Lebens. Victorias Mutter wurde aus dem Palast nach Ingestre House am Belgrave Square vertrieben. Nach dem Tod von Victorias Tante, Prinzessin Augusta, im Jahr 1840 erhielt Victorias Mutter sowohl Clarence House als auch Frogmore House. Durch Alberts Vermittlung verbesserte sich das Verhältnis zwischen Mutter und Tochter langsam. Nach Alberts Tod im Jahr 1861 versank Victoria in tiefe Trauer und mied öffentliche Auftritte. Infolge ihrer Zurückgezogenheit gewann der Republikanismus im Vereinigten Königreich vorübergehend an Stärke, aber in der zweiten Hälfte ihrer Regentschaft erholte sie sich wieder an Popularität. Ihre Goldenen und Diamantenen Thronjubiläen waren Anlässe öffentlicher Feierlichkeiten. Victorias Verbindungen zu den europäischen Königshäusern brachten ihr 42 Enkelkinder von ihr und Albert ein, und derzeit haben 34 das Erwachsenenalter erreicht."
 POLITICS_STANLEY_BALDWIN_DESC:0 "Stanley Baldwin, der zum dritten Mal Premierminister war, stand der britischen Regierung vor, als der Generalstreik von 1926 ausbrach. Während Großbritannien den Sturm im eigenen Land überstand, setzte sich Baldwin für die britische Abrüstung ein. Die Entwicklungen in Deutschland brachten ihn jedoch zum Umdenken, und die Wiederbewaffnung beginnt langsam."
 POLITICS_NEVILLE_CHAMBERLAIN_DESC:0 "Neville Chamberlain ist ehemaliger Gesundheitsminister und Mitglied der Konservativen Partei. Er ist fest vom Frieden überzeugt und bereit, ihn so lange wie möglich zu verfolgen. Mit ihm an der Spitze des Landes wird Beschwichtigung zum Lieblingswort Großbritanniens."
 POLITICS_WINSTON_CHURCHILL_DESC:0 "Sir Winston Churchill, Veteran mehrerer Kriege und Erster Lord der Admiralität während des Ersten Weltkriegs, mit dem Spitznamen „British Bulldog“, ist ein unerschütterlicher britischer Patriot, der bereit ist, das Vereinigte Königreich zum Sieg zu führen, wie lang und hart der Weg auch sein mag."
 #Estonia
 POLITICS_KONSTANTIN_PATS_DESC:0 "Konstantin Päts ist einer der drei Gründerväter des unabhängigen Estland und dessen aktueller Präsident. Nach fünf Amtszeiten als demokratisch gewählter Präsident des Landes führte er mit Hilfe der Armee einen Putsch durch, der ihm diktatorische Machtbefugnisse verlieh. Er ist überzeugt, dass Estland seine Führung braucht, um sich zu einem großen Land zu entwickeln."
 #Finland 
 POLITICS_AIMO_CAJANDER_DESC:0 "Cajander trat 1927 der Nationalen Fortschrittspartei bei und wurde 1928 zum Verteidigungsminister gewählt. 1929 wurde Cajander ins Parlament gewählt. Als Idealist glaubte Cajander nicht an die Aussicht, dass Finnland in den Krieg ziehen müsste."
 #France
 POLITICS_EMILE_LOUBET_DESC:0 "Von Februar bis Dezember 1892 war er der 45. Premierminister und wurde 1899 Präsident. Nach seiner juristischen Ausbildung wurde er Bürgermeister von Montélimar, wo er als überzeugender Redner bekannt war. 1876 wurde er in die Abgeordnetenkammer und 1885 in den Senat gewählt. Unter Carnot und Ribot wurde er zum republikanischen Minister ernannt. 1892 war er kurzzeitig französischer Premierminister. Sein Ruf als Redner mit großer Überzeugungskraft und Klarheit in der Darstellung sowie als sicherer und ehrlicher Staatsmann verschaffte ihm 1896 den Vorsitz des Senats. Im Februar 1899 wurde er mit 483 Stimmen zum Präsidenten der Republik gewählt und trat damit die Nachfolge von Félix Faure an, während Jules Méline, sein einziger ernstzunehmender Konkurrent, mit 279 Stimmen antrat."
 POLITICS_PIERRE_LAVAL_DESC:0 "Pierre Laval, ein sozialistischer Abenteurer, hat in den letzten Jahren seine größten Verdienste auf internationaler Ebene erworben. Er betrachtet Deutschland als „Erbfeind Frankreichs“ und unternahm mehrere Schritte, um Deutschland von den anderen europäischen Großmächten zu isolieren: Er unterzeichnete den französisch-sowjetischen Beistandvertrag, ließ Italien und Großbritannien der Stressa-Front beitreten und gewährte Mussolini freie Hand in Abessinien – im Austausch für mögliche Hilfe gegen Deutschland."
 POLITICS_Paul_Reynaud_DESC:0 "Paul Reynaud ist ein überzeugter Befürworter der wirtschaftlichen Deregulierung und Mitglied der Demokratisch-Republikanischen Allianz. Er ist ein Befürworter einer deutschen Eindämmungspolitik und glaubt auch an die Ideen Charles de Gaulles zur optimalen Kriegsführung. Er ist bereit, ihn bei der Umsetzung dieser Ideen zu unterstützen."
 POLITICS_EDOUARD_DALADIER_DESC:0 "Édouard Daladier, Mitglied der Radikal-Sozialistischen Partei, ist ein alter Hase in der französischen Politik und spielte eine entscheidende Rolle bei der Abspaltung der Radikal-Sozialistischen Partei von der Sozialistischen Partei. Daladier, ein Verfechter des Sozialstaats, ist sich auch der drohenden Kriegsgefahr aus Deutschland durchaus bewusst."
 POLITICS_LEON_BLUM_DESC:0 "Léon Blum ist der Vorsitzende der französischen Sozialistischen Partei. Als einer der Gründer der Volksfront engagierte er sich bereits seit der Dreyfus-Affäre 1894 in der Politik. Angesichts des wiedererstarkten Deutschlands und Stalins Dominanz über radikale linke Elemente in Frankreich erscheint Léon Blums Aufgabe, Frankreich zu stabilisieren, als gewaltig." 
 #Germany
 POLITICS_WILHELM_II_1900_DESC:0 "Wilhelm II. war der Sohn von Prinz Friedrich Wilhelm von Preußen und Prinzessin Victoria. Sein Vater war der Sohn von Wilhelm I., dem deutschen Kaiser, und seine Mutter war die älteste Tochter von Königin Victoria von Großbritannien. Mit dem Tod von Wilhelms Großvater im März 1888 wurde sein Vater als Friedrich III. deutscher Kaiser und König von Preußen. Friedrich selbst starb im Juni desselben Jahres, und Wilhelm II. bestieg den Thron. Im März 1890 entließ er den mächtigen langjährigen Reichskanzler Otto von Bismarck. Wilhelm entwickelte daher ein gestörtes Verhältnis zu seinen Eltern, insbesondere zu seiner englischen Mutter. In einem Wutausbruch im April 1889. Obwohl er in seiner Jugend ein großer Bewunderer von Otto von Bismarck gewesen war, brachte Wilhelms charakteristische Ungeduld ihn bald in Konflikt mit dem „Eisernen Kanzler“."
 POLITICS_ADOLF_HITLER_DESC:0 "Der Führer und Reichskanzler Adolf Hitler war der Anführer des nationalsozialistischen Deutschlands. Seit 1933 an der Macht, ist er fest entschlossen, Deutschland wieder zu einer Weltmacht zu machen. Die Gründung der Wehrmacht 1935 hat seine Absichten und Ambitionen auf der Weltbühne deutlich gemacht. Bleibt die Frage, wie erfolgreich er sein wird." 
 #Greece
 POLITICS_GEORGIOS_II_DESC:0 "Mit der Rückkehr des griechischen Königs Georgios II. im Jahr 1935 wurde die Monarchie wiederhergestellt, nachdem er 1923 zur Abdankung und ins Exil gezwungen worden war. Da ihm plötzlich die Verantwortung für die Regierung des griechischen Königreichs zufiel und er keine echte Unterstützung seitens der griechischen Bevölkerung hatte, entschied sich Georgios für die Errichtung einer königlichen Diktatur mit Ioannis Metaxas als Premierminister."
#Guatemala
 POLITICS_JORGE_UBICO_DESC:0 "Jorge Ubico Castañeda ist ein guatemaltekischer Politiker und Militär, der seit 1931 Präsident von Guatemala ist. Als Sohn von Arturo Ubico und Matilde Castañeda, beide aus wohlhabenden Familien, studierte Jorge Ubico Castañeda eine Zeit lang in Europa und dann in Guatemala. Ab dem Alter von 19 Jahren begann er beim Militär aufzusteigen. Im Jahr 1900 war er bereits Hauptmann und stieg später zum Oberstleutnant auf. 1907 wurde Ubico zum politischen Chef und Waffenkommandeur des Departamento Alta Verapaz ernannt; dieselbe Position sollte er 1911 in Retalhuleu innehaben. Als Stabschef half er 1921 beim Sturz von Präsident Carlos Herrera und war von 1921 bis 1923 Kriegsminister. Er kandidierte erfolglos bei den Präsidentschaftswahlen von 1922 und 1926, gewann jedoch 1931. Während seiner Präsidentschaft entfesselte Jorge Ubico eine Verfolgung der Bauern und zwang Hunderte von Bürgern ins Exil. Seine Regierung militarisierte die weiterführende Bildung und verlängerte den Pachtvertrag für die Ufer des Flusses Motagua. 1936 änderte er die Vereinbarung mit der United Fruit Company und zwang sie zum Bau eines Hafens, obwohl die Firma dadurch das Recht behielt, das Land für den Bananenanbau zu nutzen. Anders als andere Caudillos beschränkten sich seine Projekte nicht auf die Hauptstadt, da er öffentliche Bauarbeiten in den Departementshauptstädten sowie in sehr abgelegenen Städten durchführte. Bis heute hat er die demokratische Freiheit unterdrückt, sich jedoch um öffentliche Bauarbeiten gekümmert."
 #Holland/Netherlands
 POLITICS_DIRK_JAN_DE_GEER_DESC:0 "Dirk Jan de Geer ist Mitglied der Christian Historical Union. Er verfügt über politische Erfahrung als ehemaliger Ministerpräsident und gilt als beständiger Politiker."
 POLITICS_HENDRIKUS_COLJIN_DESC:0 "Hendrikus Colijn wurde 1922 Vorsitzender der Antirevolutionären Partei und 1933 ein zweites Mal Premierminister. Auf den Ausbruch der Weltwirtschaftskrise in den Niederlanden reagierte Colijns Regierung mit einer sehr strengen Finanzpolitik. Unglücklicherweise für die Niederlande halfen seine wirtschaftlichen Fähigkeiten dem Land nicht, die Weltwirtschaftskrise zu bewältigen."
#Honduras
 POLITICS_TIBURCIO_CARIAS_ANDINO_DESC:0 "Tiburcio Carías Andino ist der derzeitige Präsident von Honduras. Nach seinem Jurastudium begann er seine Militärkarriere und nahm 1892 an den Auseinandersetzungen zwischen Liberalen und Konservativen teil, die von Mitte des 19. Jahrhunderts bis ins erste Drittel des 20. Jahrhunderts den Frieden in Honduras störten. In diesen Jahren wurde er zum General ernannt und übernahm die politische und militärische Führung der Zona Norte. Später nahm er am Krieg teil, den Honduras 1907 gegen Nicaragua führte. General Carías Andino, ein zutiefst Konservativer, gründete 1916 die Partido Nacional und beschloss als deren Vorsitzender, bei den Präsidentschaftswahlen im Oktober 1923 zu kandidieren. Bei den Wahlen war er der Kandidat mit den meisten Stimmen. Präsident Luis Gutiérrez war jedoch mit dem Ergebnis unzufrieden und entschlossen, an der Macht zu bleiben. Er verhängte das Kriegsrecht und erklärte sich selbst zum Diktator, um seine Präsidentschaft zu verlängern. Gutiérrez’ Entscheidung löste einen neuen Bürgerkrieg aus, der Carías Andinos Chancen auf eine Machtübernahme zunichtemachte. Die Lage geriet zunächst ins Chaos, doch nach einem Putsch kehrte wieder Normalität ein. Viele Jahre später, im Oktober 1932, fanden Neuwahlen statt, aus denen Carías Andino siegte. Seit 1933 ist er Präsident des Landes, und nach mehreren Verfassungsreformen konnte er seine Amtszeit verlängern. Er sah sich jedoch mehreren Sturzversuchen ausgesetzt. Für Carías Andino war die Wirtschaftskrise im Land das Wichtigste, wie er mehrfach zum Ausdruck brachte, doch bisher hat er diesbezüglich keine nennenswerten Maßnahmen ergriffen. Es wird immer deutlicher, dass der Präsident die absolute Kontrolle über die Lage erlangen und seine Macht autoritär und diktatorisch ausüben will."
 #Hungary
 POLITICS_MIKLOS_HORTHY_DESC:0 "„Der Admiral ohne Flotte“: Miklós Horthy ist Regent des Königreichs Ungarn. Seine Herrschaft begann er 1920 auf Ersuchen des ungarischen Parlaments. Als überzeugter Antikommunist und Gegner des Faschismus strebt Horthy vor allem die Aufhebung der Verträge an, die Ungarn seine Gebiete entzogen, um das Land im Inneren zu stabilisieren. Damit gerät seine anglophile Seite in Konflikt mit der zunehmenden Zusammenarbeit mit dem nationalsozialistischen Deutschland." 
 #Ireland
 POLITICS_EAMON_DE_VALERA_DESC:0 "Éamon de Valera, einer der irischen Anführer während des Unabhängigkeitskrieges, war Irlands erster Präsident. De Valera, der Erzrivale von Michael Collins, überdauerte ihn im irischen Bürgerkrieg und wurde 1932 Präsident des Exekutivrates (Premierminister) Irlands."
 #Italy
 POLITICS_UMBERTO_I_DESC:0 "Nach dem Tod seines Vaters Vittorio Emanuele II. am 9. Januar 1878 folgte ihm Umberto als Umberto I. auf den italienischen und als Umberto IV. auf den savoyischen Thron, da sein Vater trotz nationaler Einheit die Fortführung der nominellen Tradition auf dem savoyischen Thron etabliert hatte. Am selben Tag erließ er eine Proklamation an die Nation, in der es hieß: „Euer erster König ist tot; der Nachfolger wird euch beweisen, dass Institutionen nicht sterben!“. Während Umbertos Herrschaft versuchte Italien eine koloniale Expansion am Horn von Afrika und eroberte erfolgreich Eritrea und Somalia, obwohl es 1896 in der Schlacht von Adua von Abessinien besiegt wurde. 1882 schloss er den Dreibund mit dem Deutschen Reich und Österreich-Ungarn. Er wird von manchen für seine Haltung angesichts von Katastrophen wie der Choleraepidemie in Neapel im Jahr 1884 positiv gesehen, bei der er persönlich sein Bestes tat, um zu helfen (deshalb erhielt er den Spitznamen „Guter König“), und für die Verkündung des sogenannten Zanardelli-Codes, in dem er einige Neuerungen im Strafgesetzbuch vornahm, wie etwa die Abschaffung der Todesstrafe."
 POLITICS_VICTOR_EMMANUEL_III_1900_DESC:0 "Die Nachricht von der Ermordung seines Vaters, des italienischen Königs Umberto I., der am 29. Juli 1900 in Monza von dem Anarchisten Gaetano Bresci aus Prato ermordet worden war, erreichte Vittorio Emanuele, als er mit seiner Frau Elena von Montenegro eine Kreuzfahrt im Mittelmeer unternahm: Bis dahin hatte der Prinz von Neapel seine Thronbesteigung angesichts des Alters seines Vaters, der zum Zeitpunkt des Königsmordes 56 Jahre alt war, als noch in weiter Ferne geglaubt. Der junge König machte sich sofort an die Arbeit und bestellte nur zwei Tage nach dem Tod seines Vaters den Premierminister Giuseppe Saracco zu einem Gespräch ein, von dem dieser einen ausführlichen Bericht hinterließ: Saracco hatte gerade die Leichenhalle des verstorbenen Königs verlassen, als Vittorio Emanuele ihn in sein Arbeitszimmer rief; ohne ihm Zeit zu geben, die üblichen Beileidsbekundungen auszusprechen, zeigte ihm der neue König die Karten, die auf dem Tisch gestapelt waren. Es handelte sich um Dekrete, die sein Vater nicht hatte unterzeichnen können, die seiner Meinung nach aber nicht mit der Verfassung übereinstimmten. Saracco erwiderte, dass die Beurteilung der Verfassungsmäßigkeit nicht in der Verantwortung des Königs liege, der sich auf seine Unterschrift beschränken müsse, wie er es bis dahin immer getan habe. Der junge König jedoch erwiderte: „Ja, aber von nun an wird der König nur noch seine eigenen Fehler unterzeichnen, nicht mehr die anderer.“"
 POLITICS_BENITO_MUSSOLINI_DESC:0 "„Il Duce“, Benito Amilcare Andrea Mussolini, ist der Schöpfer des Faschismus und der faschistische Diktator Italiens. Mussolini war einst Sozialist, doch seine Erfahrungen als Bersagliere im Ersten Weltkrieg veranlassten ihn, diesen Weg zugunsten seines neuen Dritten Weges aufzugeben. Nach dem Marsch auf Rom übernahm Mussolini 1922 die Macht. Seine Ziele waren klar: die Ausweitung des italienischen Reiches auf das Niveau des Römischen Reiches in Größe, Reichtum und Einfluss."
 #Italian Social Republic
 POLITICS_SHOCKED_MUSSOLINI_DESC:0 "Er lernte an diesem Tag eine wertvolle Lektion, doch Benito Mussolini steht noch immer unter Schock"
#Japan
 POLITICS_MEIJI_DESC:0 "Der „Meiji-Kaiser“, auch bekannt als „Meiji der Große“ und „Meiji der Gute“. Mutsuhito ist gemäß der traditionellen Thronfolge der 122. Kaiser Japans. Er regierte seit dem 3. Februar 1867 und war der erste Monarch des Japanischen Kaiserreichs. Er präsidierte die Meiji-Ära und leitete die Meiji-Restauration ein, eine Reihe rascher Veränderungen, die Japans Wandlung von einem isolationistischen Feudalstaat zu einer industrialisierten Weltmacht mit sich brachten."
 POLITICS_Hirohito_DESC:0 "Der „Shōwa-Kaiser“ Hirohito ist der regierende Herrscher des Japanischen Kaiserreichs. Als 124. Kaiser Japans ist er ein Arahitogami, ein lebender Gott des japanischen Volkes. Mit der ihm völlig ergebenen Bevölkerung und der ihm durch die japanische Kaiserverfassung verliehenen absoluten Macht über sein Land kann Hirohito sich aufmachen, Japans Sonne in ganz Asien aufgehen zu lassen."
#Latvia
 POLITICS_KARLIS_ULMANIS_DESC:0 "Kārlis Ulmanis ist einer der Hauptgründer der lettischen Unabhängigkeit und war von 1918 bis 1934 Ministerpräsident. 1934 führte er jedoch einen Putsch durch, der Lettland zum autoritären Regime führte. 1936 verband Ulmanis das Amt des Ministerpräsidenten mit dem des Präsidenten und erlangte damit den Status eines Diktators. Obwohl er lettischer Nationalist ist, glaubt er dennoch, dass „Lettlands Sonne für alle gleichermaßen scheint“."
#Lithuania
 POLITICS_ANTANAS_SMETONA_DESC:0 "Antanas Smetona gehörte zu den Unterzeichnern der litauischen Unabhängigkeit von 1918 und war der erste Präsident des Landes. Wie in den baltischen Staaten üblich, putschte er 1926 und erlangte damit diktatorische Macht in der Republik. Als Nationalist trug Smetona maßgeblich zur Stärkung nationalistischer Gefühle in der litauischen Bevölkerung bei."
#Luxemburg
 POLITICS_CHARLOTTE_I_DESC:0 "Die derzeitige Großherzogin von Luxemburg, Charlotte I., regiert Luxemburg seit 1919, nachdem in einer Volksabstimmung darüber abgestimmt wurde, ob die Monarchie erhalten bleiben sollte oder nicht."
#Manchukuo
 POLITICS_Emperor_Puyi_DESC:0 "Puyi, der letzte Kaiser Chinas, nahm 1932 widerwillig das Angebot Japans an, ihn zum Oberhaupt Mandschukuos zu machen. Zunächst war er von dieser Vereinbarung sehr enttäuscht, doch die Entwicklungen, die ihm den Titel „Kaiser von Mandschukuo“ einbrachten, ließen ihn wieder strahlen und schöpften Hoffnung, dass dies ein Zeichen dafür sei, dass er erneut Kaiser Chinas werden würde, selbst wenn dies ein von Japan regiertes China bedeuten würde."
#Mexico
 POLITICS_LAZARO_CARDENAS_DESC:0 "Lázaro Cárdenas del Río, der derzeitige Präsident Mexikos, gilt als einer der größten mexikanischen Staatsmänner aller Zeiten. Cárdenas hat mehr als jeder andere Präsident zur Konsolidierung der mexikanischen Revolution und zur Umsetzung seiner Ideale von Gerechtigkeit und Gleichheit beigetragen. Lázaro Cárdenas del Río stammte aus einer sehr bescheidenen indigenen Familie und erhielt nur eine Grundschulbildung. 1914 schloss er sich der mexikanischen Revolution an und begann eine Militärkarriere, in der er schnell aufstieg. Unter dem Schutz eines anderen revolutionären Militärs, Präsident Plutarco Elías Calles, stürzte sich Cárdenas in die Politik. 1928 wurde er zum Gouverneur von Michoacán gewählt, eine Position, die er nutzte, um wichtige Reformen durchzuführen, die seinen politischen Wert im ganzen Land bewiesen. Er gründete zahlreiche Schulen, förderte die Landverteilung, förderte Gewerkschaftsverbände und die Demokratisierung der Universität. Später war er zusammen mit Pascual Ortiz Rubio Innenminister (1930–1932) und Kriegsminister (1932–1934). 1934 gewann er unter Calles‘ Protektion die Präsidentschaftswahlen. Lázaro Cárdenas emanzipierte sich von seiner Bevormundung und schlug eine eigene, eher linksgerichtete politische Linie ein. Er gründete die Partido Revolucionario Mexicano, in der ein breites Spektrum von Reformisten und Progressiven vertreten war. Unter dem Slogan „México para los mexicanos“, Mexiko für die Mexikaner, verfolgte Cárdenas eine Politik der Verstaatlichung. Er war auch für den Schutz der indigenen Bevölkerung zuständig, förderte die Agrarreform, bekämpfte den Großgrundbesitz, verstaatlichte die Eisenbahn und führte ein säkulares, kostenloses und obligatorisches öffentliches Schulsystem ein. Kurz gesagt: eine Wende hin zur Sozialisierung im postrevolutionären Mexiko."
#Mongolia
 POLITICS_BOGD_KHAN_VIII_DESC:0 "Er wurde 1869 unter dem Namen „Agvaan Luvsan Choijinnyam Danzan Vanchüg“ geboren und ist als 8. Jebtsundamba Khutuktu die drittwichtigste Person in der Hierarchie des tibetischen Buddhismus, gleich nach dem Dalai Lama und dem Panchen Lama. In Anwesenheit des 13. Dalai Lama und des Panchen Lama wurde er im Potala offiziell als neue Inkarnation des „Bogd Gegen“ anerkannt."
 POLITICS_BALINGIIN_TSERENDORJ_DESC:0 "Tserendorj genießt international den Ruf, einer der pragmatischsten, beständigsten und am meisten respektierten Regierungschefs der Mongolei zu sein. Von 1885 bis zu seiner Machtübernahme arbeitete er als Schreiber und Übersetzer in der örtlichen mandschurischen Rechtsanwaltskanzlei."
 POLITICS_GONCHIGJALZANGIIN_BADAMDORJ_DESC:0 "Über Badamdorjs frühes Leben ist wenig bekannt. Von 1900 bis zu seiner Machtübernahme diente er jedoch als Verwalter oder „Erdene Shanzav“ der Ländereien des Bogd Gegeen. Er ist ein enger Vertrauter, Berater und Lehrer des spirituellen Führers der Khalkha, Jebtsundamba Khutuktu (auch bekannt als Bogd Khan), der ihn 1895 als ersten mongolischen Gesandten nach St. Petersburg entsandte, um den frisch inthronisierten Zaren Nikolaus II. zu treffen und die russische Bereitschaft zu sondieren, die mongolischen Unabhängigkeitsbestrebungen von der Mandschu-Herrschaft zu unterstützen."
 POLITICS_DASHDORJIIN_NATSAGDORJ_DESC:0 "Natsagdorj gilt als einer der Gründerväter der modernen mongolischen Literatur und ist auch als erster „klassisch-sozialistischer“ Schriftsteller des Landes bekannt. Geboren am See Gün Galuutai in Darkhan Chin Wang Khoshuu in der verarmten Familie eines unbetitelten Adligen, genoss er in der Mongolei damals keine formale Schulbildung und erhielt einen Großteil seiner frühen Ausbildung von einem Privatlehrer. Ab seinem elften Lebensjahr arbeitete er als Schriftsteller in der Mongolischen Volksarmee."
 POLITICS_SAMBADONDOGIIN_TSERENDORJ_DESC:0 "Tserendorj, geboren 1872, wurde als 6. Reinkarnation des „Donkor-Manjushri Gegen“ anerkannt und nahm 1880 im Alter von fünf Jahren seinen Platz als Abt des Manjusri-Klosters ein."
 POLITICS_PELJIDIIN_GENDEN_DESC:0 "Genden ist ein prominenter politischer Führer der Mongolischen Volksrepublik, der von 1924 bis 1927 erster Präsident des Landes und seit 1932 neunter Premierminister war. Als einer von drei Sekretären der MPRP war Genden für die schnelle obligatorische Umsetzung der sozialistischen Wirtschaftspolitik in den frühen 1930er Jahren verantwortlich. Er wurde 1892 oder 1895 (die Quellen unterscheiden sich) im Bezirk Khujirt der Provinz Övörkhangai geboren und trat 1922 der Mongolischen Revolutionären Jugendliga (MRYL) bei. Ein Jahr später wurde er zum kommissarischen Leiter seiner örtlichen Zelle ernannt."
 POLITICS_ANADYN_AMAR_DESC:0 "Amar, der von 1928 bis 1930 zweimal Premierminister war und im März 1936 erneut sein Amt antrat, nachdem Peljidiin Genden aus beiden Ämtern entfernt worden war, nachdem dieser sich dem sowjetischen Druck zur Zerstörung der buddhistischen Kirchen der Mongolei widersetzt und Josef Stalin bei einem Empfang der mongolischen Botschaft öffentlich kritisiert hatte, gilt als weithin respektierter Politiker. Amar ist bekannt für seine eloquente Verteidigung der mongolischen Unabhängigkeit angesichts der zunehmenden sowjetischen Dominanz."
 POLITICS_KHORLOOGIIN_CHOIBALSAN_DESC:0 "Choibalsan, auch bekannt als „Der Stalin der Mongolei“, ist seit 1923 Oberbefehlshaber der Mongolischen Volksarmee. Nach der Revolution blieb Choibalsan stellvertretender Chef der Mongolischen Volksarmee und wurde gleichzeitig zum Vorsitzenden der Mongolischen Revolutionären Jugendliga gewählt. Trotz seiner Referenzen als Gründungsmitglieder der MPP gelang es ihm in den 1920er Jahren nicht, über zweitrangige Regierungsposten hinauszukommen. Sein starker Alkoholkonsum, seine Frauengeschichten und sein gewalttätiges Temperament entfremdeten ihn von der Parteiführung und Anfang der 1930er Jahre wurde er vorübergehend vom Außenminister zum einfachen Museumsdirektor degradiert. Während Choibalsans Bündnis mit Josef Stalin dazu beitrug, die noch junge Unabhängigkeit seines Landes in den Anfangsjahren der Mongolischen Volksrepublik zu bewahren, brachte es die Mongolei auch näher an die Sowjetunion heran. Während seiner Herrschaft vertieften sich die wirtschaftlichen, politischen und militärischen Bindungen der Mongolei an die Sowjetunion, die Infrastruktur und die Alphabetisierungsrate verbesserten sich und die internationale Anerkennung der Unabhängigkeit der Mongolei wuchs."
#Nicaragua
 POLITICS_ANASTASIO_SOMOZA_GARCIA_DESC:0 "Anastasio Somoza García, der Sohn eines Kaffeepflanzers, besuchte in Granada (Nicaragua) das Gymnasium und studierte Betriebswirtschaft in den USA. Durch die Heirat mit der Tochter der Sacasa-Familie, einem der Großgrundbesitzer des Landes, gelang ihm eine solide politische Karriere. Nach mehreren diplomatischen Missionen beteiligte sich Somoza 1926 an der Revolution gegen die konservative Regierung. Als der Liberalismus an die Macht kam, bekleidete Anastasio Somoza 1929 eine hohe Position im Staat und trat 1933 der Nationalgarde bei, von wo aus er ein wichtiges Einflussnetzwerk aufbauen sollte. 1933 ernannte ihn Präsident Juan Bautista Sacasa zum Chefdirektor der Nationalgarde, was ihn zum starken Mann des Landes machte. 1936 stürzte er, stets an der Spitze der Armee, den gewählten Präsidenten Juan Bautista Sacasa. Nach Ausrufung der Wahlen wurde Somoza zum Präsidenten gewählt und regiert Nicaragua seither."
#Ottoman Empire
 POLITICS_HAMID_II_DESC:0 "Abdul Hamid II., geboren am 21. September 1842, ist der Sohn des verstorbenen Sultans Abdulmejid I. Er bestieg am 31. August 1876 nach seinem Bruder Murad V. den Thron. Im Dezember 1876 verkündete er die erste osmanische Verfassung. Die Verfassung entstand als Reaktion auf verschiedene Rebellionen und Kriege, darunter der Aprilaufstand. Hauptsächlich sollte sie ausländische Interventionen abwehren, da die Westmächte und Russland über derartige Ereignisse empört waren. 1877 brach der Russisch-Türkische Krieg (1877–1878) aus, der für das Osmanische Reich in einer Katastrophe endete. Zu den Folgen gehörte die Übergabe großer Teile seines Territoriums an Großbritannien, Frankreich und Russland. Zudem brach in Ägypten ein Aufstand aus, in den Großbritannien eingriff und später praktisch die Kontrolle über Ägypten und den Sudan erlangte. Hamid entschied, dass er nicht länger auf die Westmächte zählen konnte. Er löste das Parlament auf und setzte die Verfassung außer Kraft. Von da an regierte er fast 25 Jahre lang mit Hilfe eines Geheimpolizeisystems und strenger Zensur."
 POLITICS_MEHMED_V_DESC:0 "Seit dem Putsch vom 27. April 1909 regiert Mehmed als konstitutioneller Monarch und mischt sich daher kaum in Regierungsangelegenheiten ein, obwohl seine Regierung die Verfassung kaum respektiert. Mehmed genoss als Kind seine Ausbildung im Çırağan-Palast. Halid Ziya, der zwischen 1909 und 1912 als oberster Beamter des Kammerherrnbüros tätig war, bezeichnete dies als dürftig. Dank seiner vergleichsweise hohen Intelligenz nutzte er seine Ausbildung jedoch für seinen weiteren Lebensweg. Er lernte Arabisch und Persisch und sprach Persisch sehr gut."
 POLITICS_MEHMED_VI_DESC:0 "Der Bruder von Mehmed V., auch bekannt als Şahbaba, wurde 1916 Thronfolger. Nach dem Selbstmord von Abdülaziz&#39; Sohn Şehzade Yusuf Izzeddin bestieg er als ältestes männliches Mitglied des Hauses Osman nach dem Tod von Mehmed V. den Thron. Am Ende des Ersten Weltkriegs war das Osmanische Reich eine Katastrophe. Britische und alliierte Streitkräfte eroberten während des Krieges Bagdad, Damaskus und Jerusalem, und der größte Teil des Osmanischen Reiches wurde unter den europäischen Verbündeten aufgeteilt."
 POLITICS_HALIL_RIFAT_DESC:0 "Halil ist Parlamentarier und Staatsmann und seit der ersten Verfassungsära im Amt. Seit 1895 ist er seit sechs Jahren Großwesir. Er wurde in Serres geboren und besuchte eine islamische Pfarrschule in Saloniki. Anschließend besuchte er die Mekteb-i Mülkiye in Konstantinopel. 1893 wurde er zum Innenminister ernannt. Im November 1895 folgte die Ernennung zum Großwesir. Die wichtigsten Ereignisse seiner Amtszeit als Großwesir waren die Unruhen von Sason (1895) und auf Kreta (1897) sowie der Griechisch-Türkische Krieg von 1897, der mit einem Sieg der Osmanen endete."
 POLITICS_MEHMED_SAID_PASHA_DESC:0 "Mehmed ist ein osmanischer Monarchist, Senator, Staatsmann und Herausgeber der türkischen Zeitung Jerid-i-Havadis. Er ist kein Unbekannter in der Position des Großwesirs. Kurz nach der Thronbesteigung des Sultans wurde er Erster Sekretär von Sultan Abdul Hamid II. und soll zur Verwirklichung des Plans Seiner Majestät beigetragen haben, die Macht in seinen eigenen Händen zu konzentrieren. Später wurde er nacheinander Innenminister und dann Gouverneur von Bursa und erreichte 1879 erstmals den hohen Posten des Großwesirs."
 POLITICS_HUSEYIN_HILMI_PASHA_DESC:0 "Hüseyin ist ein osmanischer Staatsmann und kaiserlicher Verwalter. Er diente bereits zweimal als Großwesir. Er war der erfolgreichste osmanische Verwalter auf dem explosiven Balkan des frühen 20. Jahrhunderts und war von 1902 bis 1908 osmanischer Generalinspektor von Mazedonien und von 1908 bis zu seinem kürzlichen Berufswechsel Innenminister."
 POLITICS_MEHMED_TALAT_PASHA_DESC:0 "Talat ist Vorsitzender der Partei für Einheit und Fortschritt. Geboren in Kırcaali, Vilâyet Adrianopel, verachtete Mehmed Talaat schon früh die Alleinherrschaft Sultan Abdülhamids II. Er war eines der ersten Mitglieder des Komitees für Einheit und Fortschritt (KUP), einer geheimen revolutionären Organisation der Jungtürken, und wurde mit der Zeit deren Anführer. Während des Russisch-Türkischen Krieges von 1877–1878 wurde Talaats Haus von russischen Truppen besetzt, woraufhin seine Familie nach Konstantinopel floh, was Talaats Nationalismus verstärkte. Sein Vater starb, als Talaat elf Jahre alt war."
 POLITICS_MUSTAFA_KEMAL_PASHA_DESC:0 "Mustafa Kemal ist Feldmarschall, revolutionärer Staatsmann und Autor. Am 14. März 1899 schrieb er sich an der Osmanischen Militärakademie im Stadtteil Pangaltı im Bezirk Şişli der osmanischen Hauptstadt Konstantinopel ein und schloss sie 1902 ab. Später schloss er am 11. Januar 1905 sein Studium am Osmanischen Militärkolleg in Konstantinopel ab. Kurz nach seinem Abschluss wurde er wegen antimonarchistischer Aktivitäten von der Polizei verhaftet. Nach mehrmonatiger Haft wurde er nur mit der Unterstützung von Rıza Pascha, seinem ehemaligen Schuldirektor, freigelassen. Er ist sowohl von den Jungosmanen als auch von den Jungtürken beeinflusst und übernimmt die Ideen der Säkularisierung und des türkischen Nationalismus dieser Bewegungen sowie deren Erfolge und Misserfolge."
 POLITICS_MUSTAFA_SUPHI_DESC:0 "Geboren 1883 in der Provinz Giresun im Osmanischen Reich. Er besuchte die Schule in Jerusalem, Damaskus und Erzurum, bevor er das Galatasaray-Gymnasium besuchte. Er studierte Politikwissenschaften in Paris, wo er auch Korrespondent der türkischen Zeitung Tanin war und Vorlesungen über Recht und Wirtschaft hielt. Er ist der Gründervater der Kommunistischen Partei der Türkei."
 POLITICS_REFIK_NEVZAT_DESC:0 "Soldat, Arzt, Politiker und Journalist. Nevzat ist einer der Pioniere des Sozialismus in der Türkei. Während seines Medizinstudiums äußerte er seine Opposition gegen die Regierung von Abdul Hamid II., tauchte 1894 in Frankreich unter und setzte sein Studium in Paris fort."
 POLITICS_BEHAEDDIN_SHAKIR_DESC:0 "Shakir ist Arzt und insgesamt ein türkisch-nationalistischer Politiker. Obwohl er weder Minister noch Abgeordneter in der Regierung ist, hat er großen Einfluss im Zentralkomitee des Komitees für Einheit und Fortschritt und ist Direktor der Şura-yı Ümmet, einer Zeitung, die die Partei unterstützt."
 POLITICS_ISMET_PASHA_FAS_DESC:0 "Als Kriegsminister und faktischer Oberbefehlshaber (trotz seiner Rolle als de jure stellvertretender Oberbefehlshaber, da der Sultan diesen Titel formell innehatte) ist Enver Pascha eine der mächtigsten Persönlichkeiten in der Regierung des Osmanischen Reiches. Er ist außerdem Mitglied des Komitees für Einheit und Fortschritt und der „Held der Revolution“. Als solcher ist er für das Reich und die Regierung des Sultans von großem Interesse."
 POLITICS_ISMET_PASHA_NEU_DESC:0 "Als Kriegsminister und De-facto-Oberbefehlshaber war Enver Pascha eine der mächtigsten Figuren in der Regierung des Osmanischen Reiches. Im Laufe seiner Karriere wurde er unter immer höheren Titeln bekannt, darunter Enver Efendi, Enver Bey und schließlich Enver Pascha. „Pascha“ ist der Ehrentitel, den osmanische Militäroffiziere erhielten, wenn sie zum Mirliva (Generalmajor) befördert wurden. Enver wurde am 22. November 1881 in Konstantinopel geboren. Er studierte an verschiedenen Militäreinrichtungen und schloss 1902 die Osmanische Militärakademie ab. Als Absolvent der Militärakademie war er ein Mektebli."
#Panama
 POLITICS_JUAN_DEMOSTENES_AROSEMENA_DESC:0 "Juan Demóstenes Arosemena wurde am 24. Juni 1879 in Panama-Stadt geboren. Nach Abschluss seines Studiums reiste er nach Ecuador, um dort in der Firma zu arbeiten, die für den Bau der Eisenbahnlinie von Quito nach Guayaquil zuständig war. Nach dem Tausendtagekrieg auf der Landenge kehrte er nach der Unabhängigkeit 1903 in sein Land zurück. Am 1. Oktober 1936 wurde er zum verfassungsmäßigen Präsidenten der Republik Panama ernannt."
#Paraguay
 POLITICS_FELIX_ESTIGARRIBIA_DESC:0 "José Félix Estigarribia, ein Berufssoldat und einer der angesehensten Helden des Landes, ist der Sohn von Mateo Estigarribia und Casilda Insaurralde. Er trat im Mai 1910 in die Armee ein. Zuvor hatte er die Landwirtschaftsschule als Agronom abgeschlossen. 1911 wurde er nach Chile geschickt, um seine akademische Vorbereitung zu verbessern. Jahre später, 1922, bekleidete er den Rang eines Majors und war eng mit der Liberalen Partei verbunden. Während des Bürgerkriegs desselben Jahres verteidigte er Präsident Eusebio Ayala; später wurde ihm bis 1924 die Leitung der Militärschule übertragen. Er reiste nach Frankreich, um einen Spezialisierungskurs zu absolvieren. Dort besuchte er die Escuela Superior de Guerra, die er als Generalstabsoffizier abschloss. Nach seiner Rückkehr ins Land wurde er zum Chef des Generalstabs der Armee ernannt. Als Oberbefehlshaber der Armee und Leiter der Operationen leistete José Félix Estigarribia einen hervorragenden Beitrag zum Chaco-Krieg (1932–1935). Nach dem Konflikt verlieh ihm das Parlament den Rang eines Generals der Armee außerhalb der Reihen. 1936 stürzte ein Militärputsch Präsident Eusebio Ayala. Estigarribia wurde verhaftet und ging ins Exil nach Montevideo (Uruguay). 1938 kehrte er ins Land zurück und reiste im Auftrag der Regierung nach Washington, um den endgültigen Frieden mit Bolivien auszuhandeln. Im selben Jahr wurde er als Nationalheld zum Präsidenten der Paraguayischen Republik gewählt."
#Peru
 POLITICS_OSCAR_BENAVIDES_DESC:0 "Oscar Raimundo Benavides Larrea ist ein peruanischer Politiker, der zweimal Präsident der Republik wurde. Als Sohn von Miguel Benavides und Erfilia Larrea studierte er an der Militärschule von Chorrillos, die er 1894 mit dem Titel eines Leutnants der Artillerie abschloss. 1905 wurde er für ein Spezialstudium nach Frankreich geschickt, wo er fünf Jahre blieb. Nach seiner Rückkehr nahm er am Feldzug gegen Kolumbien teil und war an der Aktion von Pedrera beteiligt. Am 4. Februar 1914 befehligte er den Putsch, der den damaligen Präsidenten Guillermo Billinghurst stürzte; zunächst stand er an der Spitze einer Militärjunta und amtierte später bis 1915 als provisorischer Präsident. Von seiner Militärpräsidentschaft aus versuchte er, Ordnung in die schweren sozialen Unruhen im Land zu bringen, doch der politische Druck seiner Gegner zwang die Junta, die Macht abzugeben, nachdem José Pardo y Barreda zum Präsidenten gewählt worden war. Mit der Machtübernahme von Pardo und Barreda am 18. August 1915 wurde Benavides mit verschiedenen diplomatischen Missionen in Europa betraut, da man ihn für eine Gefahr für die Stabilität der neuen Regierung hielt. Trotzdem nahm er nach dem Militärputsch, der die Amtszeit (1919–1930) von Präsident Augusto B. Leguía beendete, wieder aktiv an der peruanischen Politik teil. Die Militärregierungen lösten sich ab, was die Instabilität des Landes verstärkte und schließlich in einem weiteren Putsch endete. Nach dem Militärputsch war Benavides der Vertraute des Militärpräsidenten, General Luis M. Sánchez Cerro. Nach der Ermordung von Sánchez Cerro im Jahr 1933 beschloss die Militärregierung, Garantien für freie Wahlen anzubieten. Auf diese Weise wurde Óscar Benavides erneut Präsident von Peru, diesmal jedoch ein verfassungsmäßiger Präsident. Er wurde vom verfassunggebenden Kongress gewählt und am 30. April 1933 in sein Amt eingeführt."
 #Poland 
 POLITICS_WLADYSLAW_SIKORSKI_DESC:0 "Vor dem Ersten Weltkrieg gründete Władysław Sikorski zahlreiche Untergrundorganisationen, die sich für die Unabhängigkeit Polens einsetzten. Sikorski spielte eine bedeutende Rolle im polnisch-sowjetischen Krieg Anfang der 1920er Jahre und erreichte sein Ziel: Polen erlangte die Unabhängigkeit. Seitdem bekleidete Sikorski verschiedene Regierungsämter, unter anderem als Ministerpräsident."
 POLITICS_IGNACY_MOSCICKI_DESC:0 "Ignacy Mościcki ist Chemiker und bis zu seinem Tod im Jahr 1935 ein Untertan von Józef Piłsudski. Nach Piłsudskis Tod behielt Ignacy sein Amt als Präsident Polens, das er seit 1926 innehat. Als gemäßigter Politiker lehnte Mościcki trotz eines Pakts zwischen den beiden viele der nationalistischen Exzesse der rechteren Rydz-Śmigły ab."
 #Portugal
 POLITICS_MANUEL_II_DESC:0 "Nach der Ermordung seines Vaters, König Carlos I., bestieg sein Bruder, Prinz Luis Felipe, der Thronfolger, noch am selben Tag den Thron. Er überlebte das Attentat mit nur einem Schuss in den Arm und überlebte die Ermordung. Die Mörder wurden auf der Stelle von der königlichen Leibwache erschossen und später als Mitglieder der portugiesischen Republikanischen Partei identifiziert. Nun liegt es an ihm, die fragile Position der Braganza-Dynastie zu retten."
 POLITICS_ANTONIO_DE_OLIVEIRA_SALAZAR_DESC:0 "António de Oliveira Salazar ist der Gründer des portugiesischen Estado Novo und dessen derzeitiger Diktator. Im Gegensatz zu Demokratie, Kommunismus, Sozialismus, Anarchismus und Liberalismus ist die Ideologie Portugals konservativer und nationalistischer Natur. Salazar hat sich von faschistischen Diktaturen distanziert und in seinem Buch „Como se Levanta um Estado“ seine Verachtung für den Nationalsozialismus öffentlich gemacht."
 POLITICS_CARLOS_I_DESC:0 "Carlos I., auch bekannt als Carlos der Diplomat, ist seit seiner Thronbesteigung am 19. Oktober 1889 König von Portugal. Er ist nicht weniger extravagant als der Frauenheld, als der er dargestellt wird, und für seine Intelligenz bekannt. Während seiner Herrschaft verschlechterte sich der Ruf der Monarchie jedoch nur noch mehr. Angefangen mit dem britischen Ultimatum von 1890, das einen Großteil ihres Territoriums in Afrika forderte (und sie zwang, jegliche Expansionspläne aufzugeben) und die portugiesischen Absichten in der „Rosa Karte“ zurückwies. Dies begann eine tiefe soziale Unzufriedenheit, bei der die Bevölkerung behauptete, die Herrscherfamilie sei eine Marionette der Briten. Darüber hinaus wurde Portugal 1892 für bankrott erklärt, was die gegnerischen Parteien ausnutzten, um die Monarchie zu kritisieren. Aus diesem Grund kämpfte Carlos I. in den letzten Jahren um jeden Preis darum, die Macht zu behalten."
 #Romania
 POLITICS_CAROL_I_DESC:0 "König Carol ist ein kalter Mann, dem das Ansehen der von ihm gegründeten Dynastie stets am Herzen lag. Seine Frau Elisabeth behauptete, er „trage die Krone im Schlaf“. Er ist sehr penibel und versucht, allen in seiner Umgebung seinen Stil aufzuzwingen. Obwohl er sich seiner Aufgabe als Herrscher Rumäniens widmet, vergaß er nie seine deutschen Wurzeln. Am 20. April 1866 wurde er nach dem Sturz von Alexandru Ioan Cuza durch einen Palastputsch zum Fürsten der Vereinigten Rumänischen Fürstentümer gewählt. Im Mai 1877 wurde Rumänien zur unabhängigen und souveränen Nation erklärt. Der Sieg über das Osmanische Reich im Russisch-Türkischen Krieg sicherte Rumänien die Unabhängigkeit und er wurde am 26. März 1881 zum König ernannt. Er war der erste Herrscher der Dynastie Hohenzollern-Sigmaringen."
 POLITICS_FERDINAND_I_DESC:0 "Ferdinand, der Sohn von Prinz Leopold von Hohenzollern-Sigmaringen, wurde 1889 von seinem Onkel, König Carol I., dessen einziges Kind gestorben war, als Kronprinz von Rumänien adoptiert. 1893 heiratete er Lady Marie, die Tochter des Herzogs von Edinburgh und Enkelin von Königin Victoria und Zar Alexander II. von Russland."
 #Russian Empire
 POLITICS_NICHOLAS_II_DESC:0 "Obwohl Nikolaus der Thronfolger war, hatte ihn sein Vater nicht auf seine künftige Rolle als Zar vorbereitet. Er nahm an den Sitzungen des Staatsrats teil. Da sein Vater jedoch erst in den Vierzigern war, ging man davon aus, dass es noch viele Jahre dauern würde, bis Nikolaus den Thron besteigen würde. Sergei Witte, Russlands Finanzminister, sah die Dinge anders und schlug dem Zaren vor, Nikolaus in das sibirische Eisenbahnkomitee zu berufen. Alexander III. argumentierte, Nikolaus sei nicht reif genug, um ernsthafte Verantwortung zu übernehmen, worauf Witte erwiderte, wenn Nikolaus nicht in die Staatsangelegenheiten eingeführt würde, würde er nie bereit sein, diese zu verstehen. Alexanders Annahme, er würde ein langes Leben haben und Jahre Zeit haben, Nikolaus auf seine Zarenwürde vorzubereiten, erwies sich als falsch, denn 1894 verschlechterte sich Alexanders Gesundheitszustand. Am 26. Mai 1896 fand Nikolaus&#39; formelle Krönung zum Zaren in der Uspenski-Kathedrale im Kreml statt. Nikolaus glaubte stets daran, dass Gott ihn zum Zaren auserwählt hatte und dass dessen Entscheidungen daher den Willen Gottes widerspiegelten und nicht angefochten werden konnten. Er war überzeugt, dass das einfache russische Volk dies verstand und ihn liebte, was sich in den Zuneigungsbekundungen zeigte, die ihm bei öffentlichen Auftritten entgegengebracht wurden. Sein altmodischer Glaube machte ihn zu einem sehr sturen Herrscher, der verfassungsmäßige Beschränkungen seiner Macht ablehnte. Dies brachte den Zaren in Konflikt mit dem sich herausbildenden politischen Konsens der russischen Elite."
 #Ryukyu Kingdom
 POLITICS_SHO_SHO_DESC:0 "Shō Shō ist der Enkel von Shō Tai, dem letzten König des Ryūkyū-Königreichs. Er wurde als Sohn von Shō Ten und (Shoko) Nodake Aji-ganashi, dem letzten Prinzen von Nakagusuku des Ryūkyū-Königreichs, geboren. Nach dem Tod seines Vaters im Jahr 1920 wurde er Oberhaupt der Familie und erbte den Titel eines Marquis."
 POLITICS_HIROSHI_SHO_DESC:0 "Er ist das Oberhaupt der Shō-Familie, der königlichen Familie der Ryūkyū-Inseln. Er ist der Urenkel von Shō Tai, dem letzten König des Ryūkyū-Königreichs. Nach dem Tod seines Vaters am 19. Juni 1923 wurde er im Alter von fünf Jahren Oberhaupt der Familie und erbte den Familientitel eines Marquis. Er schloss sein Studium der ostasiatischen Geschichte an der Kaiserlichen Universität Tokio im Fach Literatur ab."
#Saudi Arabia
 POLITICS_ABDUL_RAHMAN_DESC:0 "Abdul Rahman bin Faisal Al Saud, auch einfach Abdul Rahman genannt, wurde 1850 als jüngster Sohn des ehemaligen Emirs Faisal bin Turki bin Abdullah geboren. Imam bin Turki starb im Dezember 1895. Der Tod seines Vaters löste große Unruhen und Misstrauen zwischen den vier Brüdern aus. Kurz darauf kam es zu einem Bürgerkrieg zwischen ihnen, da Abdul, Muhammad und Saud sich gegen Abdullah verbündet hatten. 1875 starb sein Bruder Saud bin Faisal und Abdul Rahman wurde Sauds Nachfolger. Trotzdem drohte sein Bruder Abdullah bin Faisal weniger als ein Jahr später, ihm Riad abzunehmen, und rief sich selbst zum König aus. 1886 revoltierten Abdullahs Brüder gegen ihn, und Abdul Rahman eroberte 1889 Riad erneut. Der Emir von Dschabal Schammar, Muhammad bin Abdullah Al Rashid, nutzte jedoch die Gelegenheit, in den Konflikt einzugreifen und seine Macht zu vergrößern. Allmählich dehnte Al Rashid seine Macht auf weite Teile von Nadschd aus, einschließlich der saudischen Hauptstadt Riad. Nach der Schlacht von Mulayda 1891 vertrieb er Abdul Rahman bin Faisal schließlich aus Nadschd. Die saudische Familie, darunter der zehnjährige Abdul Aziz Al-Saud, ging ins Exil nach Kuwait. Abdul Rahman übernahm jedoch bald erneut die Macht mit der Absicht, das Emirat noch viele weitere Jahre zu regieren."
 #Spain
 POLITICS_ALFONSO_XIII_1900_DESC:0 "Er war von Geburt an Monarch, da sein Vater, Alfons XII., im Vorjahr gestorben war. Alfonsos Mutter, Maria Christina von Österreich, amtiert derzeit als Regentin. Alfons XIII. wurde am 17. Mai 1886 im Königspalast von Madrid geboren. Er war der posthume Sohn von Alfons XII. von Spanien, der im November 1885 gestorben war, und wurde mit seiner Geburt König von Spanien. Kurz nach seiner Geburt wurde er nackt auf einem Silbertablett zum spanischen Premierminister Práxedes Mateo Sagasta gebracht."
 POLITICS_FRANCISCO_FRANCO_DESC:0 "Francisco Franco ist der Führer unseres Landes. Er ist auch ein erfahrener General, gefürchtet von den Rojos und respektiert von seinen Falangisten-Kameraden. Er kann unsere Armeen in Zeiten der Not führen."
 SPR_manuel_azana_diaz_desc:0 "Manuel Azaña, ein visionärer Intellektueller und standhafter Republikaner, führt Spanien mit Eloquenz und Entschlossenheit. Sein Engagement für säkulare Reformen und den Aufbau von Koalitionen stärkt die Einheit der Republik, während seine strategische Führung die Moral und Organisation angesichts ziviler Konflikte aufrechterhält."
 #Soviet Union 
 POLITICS_JOSEPH_STALIN_DESC:0 "Josef Wissarionowitsch Stalin ist Generalsekretär der Kommunistischen Partei der Sowjetunion. Er zeichnet sich durch extreme Brutalität und Paranoia aus und ist der eiserne „Vater der Nationen“ und Nachfolger von Wladimir Lenin. Als Opportunist versucht Stalin, den internationalen Einfluss der Sowjetunion mit allen Mitteln zu vergrößern."
 #Uruguay
 POLITICS_CNA_DESC:0 "Der Consejo Nacional de Administración (Nationaler Verwaltungsrat) war zwischen 1919 und 1933 Teil der Exekutive in Uruguay und regierte Seite an Seite mit dem Präsidenten der Republik. Das Colegiado-System wurde von Präsident José Batlle y Ordóñez während seiner zweiten Amtszeit vorgeschlagen, um ein Exekutivorgan nach dem Vorbild des Schweizer Bundesrates zu schaffen. Batlle war ein Gegner des Präsidialsystems, da er glaubte, ein Kollegialorgan würde das Risiko einer Diktatur verringern. Obwohl der Vorschlag 1916 scheiterte, handelte Batlle einen Kompromiss mit der Nationalen Partei aus, um das System in eine neue Verfassung aufzunehmen, die 1917 in einem Referendum angenommen wurde. Der Kompromiss sah einen Präsidenten und einen neunköpfigen Nationalen Verwaltungsrat vor, der sich aus sechs Mitgliedern der siegreichen Partei und drei Mitgliedern der zweitplatzierten Partei zusammensetzte. Der Präsident war für auswärtige Angelegenheiten, nationale Sicherheit und Landwirtschaft zuständig, während der CNA für den Haushalt, das Bildungswesen, das Gesundheitswesen, die Industrie, die Arbeitsbeziehungen, die Arbeit, die Viehzucht und öffentliche Arbeiten zuständig war."
 #USA
 POLITICS_WILLIAM_MCKINLEY_DESC:0 "McKinley, der seit dem 4. März 1897 als 25. Präsident amtierte, war während des Spanisch-Amerikanischen Krieges 1898 Präsident, erhöhte Schutzzölle, um die amerikanische Industrie anzukurbeln, und lehnte die expansive Geldpolitik des freien Silbers ab, um die Nation am Goldstandard zu halten. Als Republikaner war er der letzte Präsident, der im amerikanischen Bürgerkrieg diente; er war der einzige, der seinen Dienst als einfacher Soldat begann und als Brevet Major beendete. Nach dem Krieg ließ er sich in Canton, Ohio, nieder, wo er als Anwalt praktizierte und Ida Saxton heiratete. 1876 wurde McKinley in den Kongress gewählt, wo er zum Experten der Republikanischen Partei für Schutzzölle wurde, von denen er Wohlstand versprach. Sein McKinley-Zolltarif von 1890 war höchst umstritten und führte zusammen mit einer Neuaufteilung der Wahlbezirke durch die Demokraten, die darauf abzielte, ihn aus dem Amt zu drängen, zu seiner Niederlage bei der Erdrutsch-Wahl der Demokraten von 1890. Er wurde 1891 und 1893 zum Gouverneur von Ohio gewählt und verfolgte einen gemäßigten Kurs zwischen Kapital- und Arbeiterinteressen."
 POLITICS_THEODORE_ROOSEVELT_DESC:0 "Der oft als „Teddy“ oder nach seinen Initialen TR bezeichnete US-amerikanische Politiker, Staatsmann, Umweltschützer, Naturforscher, Historiker und Schriftsteller war der 26. Präsident der USA. Am 6. September 1901 besuchte Präsident McKinley die Panamerikanische Ausstellung in Buffalo, New York, als er vom Anarchisten Leon Czolgosz angeschossen wurde. Roosevelt machte Urlaub in Vermont und reiste nach Buffalo, um McKinley im Krankenhaus zu besuchen. Es schien, als würde McKinley sich erholen, also setzte Roosevelt seinen Urlaub fort. Als sich McKinleys Zustand verschlechterte, eilte Roosevelt erneut nach Buffalo zurück. McKinley starb am 14. September, und Roosevelt wurde informiert, während er in North Creek war; er reiste weiter nach Buffalo und wurde im Ansley Wilcox House als 26. Präsident der USA vereidigt."
 POLITICS_WILLIAM_JENNINGS_BRYAN_DESC:0 "William Jennings Bryan ist Politiker, Redner und Rechtsanwalt. Bekannt wurde er durch sein leidenschaftliches Eintreten für die Rechte des einfachen Mannes und seine drei erfolglosen Präsidentschaftskandidaten. Seine rednerischen Fähigkeiten brachten ihm den Spitznamen „Der große Bürger“ ein, und er ist ein Vorkämpfer der populistischen Bewegung. Bryan wurde 1860 in Salem, Illinois, geboren und machte sich in einer Zeit enormen wirtschaftlichen und sozialen Wandels zunächst einen Namen als brillanter Redner und überzeugter Anwalt der einfachen Leute. Bryans frühe politische Karriere ist geprägt von seinem leidenschaftlichen Eintreten für die freie Prägung von Silber. Auf dem Parteitag der Demokraten 1896 erklärte er: „Du sollst die Menschheit nicht an ein goldenes Kreuz schlagen.“ Obwohl er die Präsidentschaftswahlen in diesem Jahr knapp gegen den amtierenden William McKinley verlor, fanden seine populistischen Ideen bei einem großen Teil der amerikanischen Bevölkerung Anklang. Bei den Präsidentschaftswahlen 1900 nahm Bryans Schicksal eine andere Wendung. Mit seinem Wahlkampfprogramm progressiver Reformen und wirtschaftlichen Populismus gelingt es Bryan, landesweit eine breite Koalition von Unterstützern aufzubauen. Seine Vision einer gerechteren Gesellschaft, die Maßnahmen zur Regulierung der Großkonzerne und zur Gewährleistung größerer sozialer Gerechtigkeit umfasst, findet bei der Mehrheit der Wähler Anklang. Am Wahltag 1900 errang Bryan einen klaren Sieg gegen William McKinley und wurde Präsident der Vereinigten Staaten. Unter seiner Führung setzt sich Bryan für politische Maßnahmen wie Kartellrecht, Arbeitnehmerrechte und Verbraucherschutz ein und prägt die Geschichte des Landes nachhaltig."
 POLITICS_EUGENE_CHAFIN_DESC:0 "Eugene W. Chafin, eine prominente Figur der Prohibitionspartei, wurde 1852 in East Troy, Wisconsin, geboren. Chafin ist Anwalt und überzeugter Verfechter der Abstinenzbewegung, die den Konsum alkoholischer Getränke in den Vereinigten Staaten bekämpfen will. Chafins politische Karriere ist geprägt von seinem unerschütterlichen Einsatz für die Sache der Prohibition. Bei den Wahlen von 1908 war er Präsidentschaftskandidat der Prohibitionspartei und vertrat das Wahlprogramm, das eine Verfassungsänderung forderte, um die Herstellung und den Verkauf alkoholischer Getränke landesweit zu verbieten. Chafins prohibitionistische Botschaft findet großen Anklang bei einem beträchtlichen Teil der amerikanischen Wählerschaft. Sein leidenschaftliches Eintreten für Abstinenz und moralische Reformen findet Anklang bei Wählern, die sich über die sozialen Missstände im Zusammenhang mit Alkoholkonsum Sorgen machen. Infolgedessen erringt Eugene Chafin einen überraschenden Sieg bei den Präsidentschaftswahlen von 1908 und wird der 27. Präsident der Vereinigten Staaten."
 POLITICS_ALTON_B_PARKER_DESC:0 "Alton B. Parker, ein angesehener Jurist und Rechtswissenschaftler, spielte im frühen 20. Jahrhundert eine bedeutende Rolle in der amerikanischen Politik. Geboren 1852 in Cortland, New York, war Parkers frühe Karriere geprägt von seinen Erfolgen als Anwalt und Richter, die ihn schließlich auf die nationale politische Bühne führten. 1897 wurde er in das höchste Gericht New Yorks, das New York Court of Appeals, gewählt und amtierte von 1898 bis 1904 als Vorsitzender Richter. Dann trat er von seinem Amt zurück, um als Kandidat der Demokratischen Partei für das Präsidentenamt zu kandidieren und besiegte Randolph Hearst in den Vorwahlen. Parker hat in Roosevelt einen ernstzunehmenden Gegner, der für seine energische und reformorientierte Führung bekannt geworden ist. Parkers Programm betont die Rückkehr zu einem konservativeren und traditionelleren Regierungsstil und zielt darauf ab, einige der von Präsident Roosevelt verfochtenen progressiven Reformen rückgängig zu machen. Seine Stärke in der demokratischen Region des Südens, die damals den Spitznamen „solider Süden“ erhielt, katapultiert ihn ins Präsidentenamt, und er wird als 27. US-Präsident vereidigt. Während seiner Präsidentschaft konzentriert sich Parker auf Themen wie die Zollreform und versucht, ein Gleichgewicht zwischen dem Schutz der amerikanischen Industrie und der Förderung des Freihandels zu finden. Er arbeitet auch an der Verbesserung der Beziehungen zu anderen Nationen und setzt auf Diplomatie und Verhandlungen als Mittel zur Lösung internationaler Konflikte."
 POLITICS_EUGENE_DEBS_DESC:0 "Eugene V. Debs (1855–1926) war ein prominenter amerikanischer Gewerkschaftsführer, Sozialist und politischer Aktivist, der die Arbeiter- und Politiklandschaft des Landes im späten 19. und frühen 20. Jahrhundert nachhaltig geprägt hat. Der in Terre Haute, Indiana, geborene Debs begann seine Karriere als Eisenbahner und engagierte sich schnell in der Gewerkschaftsarbeit. 1893 war er Mitbegründer der American Railway Union (ARU), die zu einer der mächtigsten Gewerkschaften ihrer Zeit wurde. Debs‘ Führung während des Pullman-Streiks von 1894, einem landesweiten Eisenbahnerstreik, brachte ihm Anerkennung und Respekt unter den Arbeitern ein und führte zu seiner Inhaftierung wegen Missachtung einer gerichtlichen Verfügung. Während dieser Haftzeit wandte sich Debs erstmals sozialistischen Ideen zu. Nach seiner Entlassung widmete er sich der sozialistischen Politik und wurde schließlich zum Dauerkandidat der Sozialistischen Partei Amerikas für die Präsidentschaft. Zwischen 1900 und 1920 kandidierte er fünf Mal für das Präsidentenamt und vertrat dabei ein Programm, das Arbeitnehmerrechte, Sozialprogramme und die Umverteilung von Vermögen umfasst."
 POLITICS_WILLIAM_SIMMONS_DESC:0 "William Joseph Simmons (1880–1945) ist ein amerikanischer Prediger, der vor allem für seine Rolle bei der Wiederbelebung und Führung des Ku-Klux-Klans im frühen 20. Jahrhundert bekannt ist. Der in Harpersville, Alabama, geborene Simmons hat einen kirchlichen Hintergrund und verfolgte zunächst eine Karriere als methodistischer Wanderprediger. Simmons&#39; Leben nimmt 1915 eine dramatische Wendung, als er die zweite Inkarnation des Ku-Klux-Klans gründet, die gemeinhin als „Zweiter Klan“ bezeichnet wird. Unter seiner Führung verfolgt der Klan eine umfassendere Agenda als sein Vorgänger aus der Zeit der Rekonstruktion. Dieser neue Klan nimmt nicht nur Afroamerikaner ins Visier, sondern auch Katholiken, Juden, Einwanderer und jeden, der als Bedrohung für das wahrgenommen wird, was er als „weißen, protestantischen, amerikanischen Lebensstil“ betrachtet. Simmons nutzt seine Fähigkeiten als Organisator und Redner, um die Mitgliederzahl des Klans rasch zu erhöhen und ihn Mitte der 1920er Jahre in eine landesweite Organisation mit Millionen von Mitgliedern zu verwandeln. Während dieser Zeit übt der Klan erheblichen Einfluss auf die amerikanische Politik aus und verbündet sich oft mit nativistischen, einwanderungsfeindlichen und antikatholischen Ansichten. Simmons stellt den Klan zwar als Verteidiger eines „hundertprozentigen Amerikanismus“ dar, doch seine Aktionen sind von Gewalt, Terrorismus und Einschüchterung geprägt. Kreuzverbrennungen, Lynchmorde und andere Akte rassistischer und religiöser Gewalt sind in den vom Klan dominierten Gebieten an der Tagesordnung. Simmons’ Führung des Klans wird schließlich von internen Machtkämpfen und Skandalen geprägt, was Ende der 1920er Jahre zu einem Rückgang des Einflusses und der Mitgliederzahl der Organisation führt. 1923 wird er von Hiram Wesley Evans als Anführer des Klans abgesetzt. Nach seiner Zeit als Klan-Anführer verschwindet Simmons weitgehend aus der Öffentlichkeit. Er stirbt 1945 in Vergessenheit."
 POLITICS_WILLIAM_TAFT_DESC:0 "William Howard Taft (1857–1930) war von 1909 bis 1913 der 27. Präsident der Vereinigten Staaten. Er wurde in Cincinnati, Ohio, als Kind einer prominenten Politikerfamilie geboren. Taft schlug eine lange und abwechslungsreiche Karriere im öffentlichen Dienst ein, die er als stellvertretender Staatsanwalt in Ohio begann und später bis zum Superior Court in Cincinnati aufstieg. Präsident Benjamin Harrison ernennt Taft dann zum Solicitor General der Vereinigten Staaten. 1901 übernahm Taft unter Präsident William McKinley das Amt des Generalgouverneurs der Philippinen. Zu seinen Aufgaben gehört die Überwachung des Übergangs der Philippinen zur Selbstverwaltung. 1904 übernahm er unter Präsident Theodore Roosevelt das Amt des Kriegsministers und konzentrierte sich auf die Verbesserung der Infrastruktur und der militärischen Einsatzbereitschaft des Landes. Als Präsident des Jahres 1908 setzte Taft Roosevelts progressive Agenda fort und befasste sich mit den internen Spaltungen der Partei. Während seiner Präsidentschaft erzielte Taft bedeutende Erfolge, darunter die Gründung des US-Postsparsystems und die Einführung der Einkommensteuer. Diese Meinungsverschiedenheiten führten jedoch letztlich zu seiner Niederlage bei den Wahlen von 1912. Nach seiner Amtszeit lehrte Taft Jura an der Yale University und wurde 1921 Vorsitzender Richter des Obersten Gerichtshofs der Vereinigten Staaten. Er setzte sich erfolgreich für die Finanzierung des Baus des Obersten Gerichtshofs ein, was seine Amtszeit auszeichnete. Anfang 1930 trat Taft aus gesundheitlichen Gründen von seinem Amt als Richter zurück und starb kurz darauf. Er wurde als erster Präsident und erster Richter des Obersten Gerichtshofs auf dem Arlington National Cemetery begraben."
 POLITICS_FRANKLIN_DELANO_ROOSEVELT_DESC:0 "Franklin Delano Roosevelt ist der derzeitige Präsident der Vereinigten Staaten und bekleidet dieses Amt bereits zum zweiten Mal direkt nach seiner ersten Amtszeit. Um die Weltwirtschaftskrise zu bekämpfen, setzte er sich für beispiellose Bundesgesetze ein und erließ zahlreiche Durchführungsverordnungen, die seinen New Deal einführten. Mit diesem Programm erweiterte er die Rolle des Staates in der US-Wirtschaft, um das Land zu retten."
 POLITICS_DWIGHT_D_EISENHOWER:0 "Dwight D. Eisenhower, oft als „Ike“ bezeichnet, ist der 34. Präsident der Vereinigten Staaten. Geboren am 14. Oktober 1890 in Denison, Texas, war er vor seinem Amtsantritt Fünf-Sterne-General der US-Armee. Eisenhower ist weithin bekannt für seine strategische Brillanz und Führung während des Zweiten Weltkriegs. Er befehligte die alliierten Streitkräfte in Europa und überwachte die erfolgreiche Landung der Alliierten in der Normandie am D-Day 1944, ein entscheidendes Ereignis für den Ausgang des Krieges. Nach dem Krieg diente er als Militärgouverneur der amerikanisch besetzten Zone Deutschlands (1945), Stabschef der Armee (1945–1948), Präsident der Columbia University (1948–1953) und als erster Oberbefehlshaber der NATO (1951–1952). Es entstand eine Bewegung, die ihn in die Politik berufen wollte, um zu verhindern, dass Senator Robert A. Taft, ein überzeugter Isolationist, die republikanische Präsidentschaftsvorwahl gewann. Sein einprägsamer Slogan „I Like Ike“ und sein politischer Scharfsinn, der sich bei der Wahl von Richard Nixon, einem Liebling des republikanischen Parteiestablishments, zeigte, verhalfen ihm 1952 zu einem überwältigenden Sieg und machten ihn zum ersten Republikaner im Weißen Haus seit 20 Jahren. Seine Präsidentschaft ist geprägt von einem beständigen und pragmatischen Regierungsansatz. Als 34. Präsident der Vereinigten Staaten konzentriert er sich auf den Wohlstand im Inland und leitet eine Phase des Wirtschaftswachstums und der Entwicklung ein, die auch große Infrastrukturprojekte umfasst. In der Außenpolitik engagierte sich Eisenhower für Trumans Eindämmungspolitik während des Höhepunkts des Kalten Krieges und bemühte sich um die Aufrechterhaltung eines empfindlichen Gleichgewichts zwischen den Vereinigten Staaten und der Sowjetunion. Er ist auch bekannt für Eisenhowers Betonung der Haushaltsverantwortung und einen vorsichtigen Umgang mit staatlichen Eingriffen, was einen deutlichen Wandel gegenüber der Innenpolitik von FDR und Truman darstellt."
 POLITICS_HERBERT_HOOVER:0 "Herbert Hoover, geboren am 10. August 1874 in West Branch, Iowa, ist für seine abwechslungsreiche Karriere und seine Rolle als 31. Präsident der Vereinigten Staaten bekannt. Hoover stammt aus einfachen Verhältnissen und ist ein Selfmademan. Mit einem Abschluss in Bergbauingenieurwesen von der Stanford University startet er eine erfolgreiche Karriere als Bergbauingenieur. Während des Ersten Weltkriegs leitet Hoover humanitäre Hilfsmaßnahmen und erwirbt sich einen Ruf für sein Organisationstalent und seine mitfühlende Führung. Nachdem er bei seinen politischen Kontakten Lobbyarbeit betrieben hat, um ihn in die Wilson-Regierung zu holen, ernennt Präsident Wilson Hoover zum Leiter der US-Lebensmittelbehörde. er bleibt Leiter der Agentur, als diese in die American Relief Administration umgewandelt wird und nach Kriegsende 1918 dem zerstörten Europa hilft. Zunächst hofft er, als Präsidentschaftskandidat eingezogen zu werden, doch nachdem er zu dem Schluss kommt, dass die Demokraten geringere Aussichten auf das Weiße Haus haben, erklärt sich Hoover 1920 zum Republikaner und verliert die Vorwahl gegen Warren Harding. Harding ernennt ihn 1921 zum Handelsminister, wo er eine wichtige Rolle bei der Regulierung der boomenden Radioindustrie spielt. Er spielt auch eine überragende Rolle bei der Reaktion der Bundesregierung auf die große Mississippi-Flut von 1927, was sein Image als fähiger Verwalter in der Öffentlichkeit stärkt. 1928 sichert er sich die republikanische Präsidentschaftskandidatur und besiegt den demokratischen Kandidaten Al Smith. Trotz seiner aufrichtigen Bemühungen wird seine Präsidentschaft von wirtschaftlichen Turbulenzen überschattet. Der Börsencrash von 1929 führt zu einem schweren wirtschaftlichen Abschwung. Seine Reaktion ist zwar in vielerlei Hinsicht innovativ, reicht aber letztlich nicht aus, um die Krise zu lösen."
 POLITICS_WOODROW_WILSON_DESC:0 "Woodrow Wilson (1856–1924) war der 28. Präsident der Vereinigten Staaten und amtierte von 1913 bis 1921. Geboren wurde er am 28. Dezember 1856 in Staunton, Virginia. Er studierte an der Princeton University und promovierte später in Politikwissenschaften an der kurz zuvor gegründeten Johns Hopkins University. 1902 wurde er zum Präsidenten der Princeton University ernannt. 1910 wurde Wilson zum Gouverneur von New Jersey gewählt, wo er eine Reihe fortschrittlicher Reformen umsetzte, die landesweite Aufmerksamkeit erregten. Sein Erfolg als Gouverneur führte 1912 zu seiner Nominierung als demokratischer Präsidentschaftskandidat, bei dem er die zersplitterte Republikanische Partei, die zwischen Theodore Roosevelt und William Howard Taft hin- und hergerissen war, für sich gewann. Als Präsident führte Wilson ein umfassendes Programm innenpolitischer Reformen ein, bekannt als „Neue Freiheit“, mit dem Großunternehmen reguliert, Verbraucher geschützt und die wirtschaftlichen Chancen für normale Bürger verbessert werden sollten. Zu seinen wichtigsten Errungenschaften zählte die Gründung des Federal Reserve Systems und der Federal Trade Commission. Wilson wird auf dem Parteitag der Demokraten 1916 ohne nennenswerte Gegenwehr erneut nominiert. Wilsons zweite Amtszeit ist geprägt von seiner Führung im Ersten Weltkrieg. 1917 fordert er den Kongress auf, Deutschland den Krieg zu erklären, wodurch die langjährige Neutralitätspolitik der USA beendet und die Vereinigten Staaten in den Konflikt verwickelt werden. Er formuliert seine Vision einer Nachkriegswelt, die auf den Prinzipien der Selbstbestimmung und dem Völkerbund beruht, einer internationalen Organisation zur Verhinderung künftiger Konflikte. Seine Vierzehn-Punkte-Rede von 1918 findet weltweites Echo. Wilson sieht sich im Inland mit starker Opposition gegen seine interventionistische Außenpolitik konfrontiert, und der Senat ratifiziert den Beitritt der USA zum Völkerbund, der eine Idee des Präsidenten war, nicht. 1919 erhält Wilson den Friedensnobelpreis für seine Bemühungen, den Ersten Weltkrieg zu beenden und den Weltfrieden zu fördern"
#Venezuela
 POLITICS_ELEAZAR_LOPEZ_CONTRERAS_DESC:0 "Eleazar López Contreras ist ein venezolanischer Soldat und Politiker und seit 1936 Präsident der Republik. Er begann seine militärische Karriere unter bedeutenden Caudillos, unter deren Kommando er das Land gegen die Seeblockade von 1902 verteidigte. Während der Diktatur von Juan Vicente Gómez (1908–1935) hatte der zukünftige Präsident verschiedene Verwaltungspositionen inne. 1919 wurde er zum Kriegsdirektor ernannt, eine Position, von der aus er die Einführung der Militärluftfahrt befürwortete. 1924 diente er als Leiter der venezolanischen Militärdelegation in Peru. Zwischen 1928 und 1929 war er Chef der Garnison von Caracas. Obwohl er dem Gómez-Regime treu diente, unterstützte Eleazar López Contreras dessen repressive Maßnahmen während der Aufstände von 1928 und 1929 nicht und bat um seine Versetzung nach Táchira. Anschließend kehrte er nach Maracay zurück und wurde von Juan Vicente Gómez zum Interimschef des Generalstabs der Armee (1930) und zum Kriegs- und Marineminister (1931–1935) ernannt. Von dieser Position aus vereinigte und modernisierte er diese Gremien. Nach dem Tod von Präsident Juan Vicente Gómez (17. Dezember 1935) kam es zu zahlreichen Aufständen, die López Contreras niederschlug und die Situation unter Kontrolle brachte. Er wurde vom Ministerrat (1935) zum provisorischen Präsidenten ernannt. Im folgenden Jahr wurde die Wahl bestätigt, und seitdem ist er Präsident."
#Vietnam
Politics_Ho_Chi_Minh_DESC:0 "Ho Chi Minh, geboren 1890 als Nguyen Sinh Cung, wird zu einem zentralen Anführer im Kampf um die Unabhängigkeit Vietnams. Er gründet die Viet Minh, um sich während des Zweiten Weltkriegs der japanischen und französischen Kolonialherrschaft zu widersetzen. 1945 erklärt er die Unabhängigkeit Vietnams und meistert die Schwierigkeiten des Kalten Krieges, indem er sowohl die USA als auch die Sowjetunion um Unterstützung bittet. Sein Engagement führt zum Ersten Indochinakrieg, der 1954 in den Genfer Abkommen gipfelt, die Vietnam vorübergehend spalten."
