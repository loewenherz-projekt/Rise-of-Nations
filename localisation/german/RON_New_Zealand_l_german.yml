l_german:
 NZL_OND:0 "Organisation für Nationale Entwicklung"
 NZL_OND_desc:0 "Die Pläne der Organisation für Nationale Entwicklung zur wirtschaftlichen Sicherheit Neuseelands"
 NZL_KB:0 "Kiwibank"
 NZL_KB_desc:0 "Eine einzige Bank, die sich für die Interessen Neuseelands einsetzt"
 NZL_social_security:0 "Sozialversicherungsgesetz"
 NZL_social_security_desc:0 "Wohlfahrt und Sicherheit von der Wiege bis zur Bahre bedeuten mehr Menschen, die dienstfähig und bereit sind"
 NZL_EPWA:0 "Nutzen Sie das Gesetz über öffentliche Arbeiten"
 NZL_EPWA_desc:0 "Die Regierung nutzt das Gesetz über öffentliche Arbeiten, um Land zu Sicherheitszwecken zu erwerben"
 NZL_MA:0 "Das Arbeitsgesetz"
 NZL_MA_desc:0 "Maori werden in die Großstädte umgesiedelt, um dort in unseren Waffenfabriken lange Stunden für wenig Geld zu arbeiten."
 NZL_MAA:0 "Gesetz über die Angelegenheiten der Maori"
 NZL_MAA_desc:0 "Unproduktives Maori-Land wird von der Regierung beschlagnahmt und verwaltet"
 NZL_MAAE:0 "Erweitertes Maori-Angelegenheiten-Gesetz"
 NZL_MAAE_desc:0 "Sämtliches Maori-Land, das nicht optimal rentabel bewirtschaftet wird, wird beschlagnahmt und an Unternehmen verschenkt, um unsere Produktivität zu maximieren."
 NZL_AWR:0 "Allianz mit der Ratana-Kirche"
 NZL_AWR_desc:0 "Die Regierung arbeitet mit der Ratana-Kirche zusammen, um das gegenseitige Verständnis zwischen den verschiedenen Völkern Neuseelands zu fördern."
 NZL_RWK:0 "Kingitanga versöhnt"
 NZL_RWK_desc:0 "Obwohl die Fehler der Vergangenheit nicht vergessen sind, ist Kingitanga bereit, mit der Regierung zusammenzuarbeiten"
 NZL_CS:0 "Entschädigung für Beschlagnahmungen"
 NZL_CS_desc:0 "Einige Stämme erhalten jährliche Zahlungen als Entschädigung für zu Unrecht enteignetes Land."
 NZL_MWWL:0 "Māori-Frauenwohlfahrtsliga"
 NZL_MWWL_desc:0 "Die Māori Women&#39;s Welfare League unterstützt die städtischen Māori dabei, in den Großstädten erfolgreich zu sein"
 NZL_FWT:0 "Waitangi-Tribunal"
 NZL_FWT_desc:0 "Das Waitangi Tribunal bietet Māori die Möglichkeit zur Wiedergutmachung"
 NZL_IWC:0 "Kaiserlicher Kriegsrat"
 NZL_IWC_desc:0 "Wir arbeiten mit dem Commonwealth zusammen, um unsere gemeinsame Verteidigung zu gewährleisten."
 NZL_CMT:0 "Militärische Ausbildung in Schulen"
 NZL_CMT_desc:0 "Wir geben unseren Highschool-Schülern eine militärische Grundausbildung."
 infantry_equipment_designer:0 "Hersteller von Infanterieausrüstung"
 NZL_philip_charlton:0 " Philip Charlton"
 NZL_TAC:0 "Bomber"
 NZL_TAC_desc:0 "Wir bezahlen Großbritannien für die Bomber, die sie uns geschickt haben."
 NZL_INT:0 "Kämpfer"
 NZL_INT_desc:0 "Wir bezahlen Großbritannien für die Kämpfer, die sie uns geschickt haben."
 NZL_NAV:0 "Marinebomber"
 NZL_NAV_desc:0 "Wir bezahlen Großbritannien für die Marinebomber, die sie uns geschickt haben."
