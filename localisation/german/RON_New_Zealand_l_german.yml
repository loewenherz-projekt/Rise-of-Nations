 pacific_forum:0 "Pacific Forum"

NZL_social_security_act:0 "Sozialversicherungsgesetz"
NZL_social_security_act_desc:0 "Jeder Neuseeländer hat ein Recht auf einen angemessenen Lebensstandard, von der Wiege bis zur Bahre."
NZL_industrial_efficiency:0 "Industrielle Effizienz"
NZL_industrial_efficiency_desc:0 "Um das wirtschaftliche Wohlergehen Neuseelands zu fördern, müssen neue Industrien entwickelt und alte Industrien reguliert werden, um eine höhere industrielle Effizienz zu gewährleisten."
NZL_fraser_succeeds:0 "Fraser ist erfolgreich"
NZL_fraser_succeeds_desc:0 "Angesichts des sich verschlechternden Gesundheitszustands des Premierministers sollte man sich Gedanken über seine Nachfolge machen. Peter Fraser ist eine Stütze der Labour Party und genießt breite Unterstützung in der neuseeländischen Bevölkerung."
NZL_lee_succeeds:0 "Lee ist erfolgreich"
NZL_lee_succeeds_desc:0 "Angesichts des sich verschlechternden Gesundheitszustands des Premierministers sollte über seine Nachfolge nachgedacht werden. John A. Lee ist ein Kriegsheld, der sich zutiefst den sozialistischen Wurzeln unserer Partei verpflichtet fühlt."
NZL_organisation_of_national_development:0 "Organisation für Nationale Entwicklung"
NZL_organisation_of_national_development_desc:0 "Angesichts der zunehmenden Spannungen kann man sich nicht darauf verlassen, dass der freie Markt die wirtschaftliche Sicherheit unseres Landes gewährleistet."
NZL_nationalise_the_banks:0 "Verstaatlichung der Banken"
NZL_nationalise_the_banks_desc:0 "Was auch immer in Neuseeland passiert, die Banker werden ihre Interessen sichern – das heißt, bis wir ihnen ihre Banken wegnehmen."
NZL_relationship_with_UN:0 "Verhältnis zur UNO"
NZL_relationship_with_UN_desc:0 "Können wir mit der Ausweitung unseres Bündnisses sowohl die Demokratie als auch die internationale Sicherheit aufrechterhalten?"
NZL_international_communism:0 "Internationaler Kommunismus"
NZL_international_communism_desc:0 "Nachdem wir die Fesseln des Kapitalismus gesprengt haben, müssen wir entscheiden, wie wir für die Freiheit des internationalen Proletariats arbeiten."
NZL_maori_land_development_scheme:0 "Māori-Landentwicklungsprogramm"
NZL_maori_land_development_scheme_desc:0 "Indem wir den Māori Kredite gewähren, können wir die Ausbeutung brachliegender Stammesgebiete fördern."
NZL_MLDS:0 "Māori-Landentwicklungsprogramm"
NZL_MLDS_desc:0 "Stellen Sie das notwendige Kapital zur Verfügung, um Stammesland zu erschließen."
NZL_exploit_the_public_works_act:0 "Nutzen Sie das Gesetz über öffentliche Arbeiten"
NZL_exploit_the_public_works_act_desc:0 "Das Gesetz über öffentliche Bauvorhaben wurde oft dazu genutzt, die Māori von ihrem Land zu trennen. Angesichts der zunehmenden Unsicherheit ist es vielleicht an der Zeit für eine weitere Runde von Zwangsenteignungen."
NZL_Manpower_Act:0 "Das Arbeitsgesetz"
NZL_Manpower_Act_desc:0 "Die in ihren Stammesdörfern lebenden Māori sind eine verschwendete Ressource. Zum Wohle der Nation müssen sie in die Städte gebracht werden, um dort in Munitionsfabriken zu arbeiten."
NZL_maori_affairs_act:0 "Gesetz über Māori-Angelegenheiten"
NZL_maori_affairs_act_desc:0 "Māori-Land, das sich als unproduktiv erwiesen hat, wird direkt von der Regierung verwaltet, um das Wirtschaftswachstum zu maximieren."
NZL_maori_affairs_act_expansion:0 "Erweiterung des Māori Affairs Act"
NZL_maori_affairs_act_expansion_desc:0 "Um die Produktivität weiter zu steigern, könnten wir sämtliches Māori-Land beschlagnahmen, das nicht mit maximaler Rentabilität bewirtschaftet wird – und gleichzeitig die Māori zwingen, nachzuweisen, dass das Land mit maximaler Effizienz bewirtschaftet wird, um es zurückzubekommen."
NZL_alliance_with_ratana:0 "Bündnis mit der Rātana-Kirche"
NZL_alliance_with_ratana_desc:0 "Die Rātana-Kirche ist eine große Māori-Religion. Indem wir ein formelles Bündnis mit den Führern dieser Kirche eingehen, können wir dazu beitragen, die Völker Neuseelands zu vereinen."
NZL_kingitanga:0 "Versöhnung mit den Kiingitanga"
NZL_kingitanga_desc:0 "Vor siebzig Jahren marschierte die Regierung in große Teile des Kiingitanga-Gebiets ein und konfiszierte sie. Vielleicht waren einige der damaligen Ereignisse nicht ganz gerecht."
NZL_confiscation_payments:0 "Beschlagnahmungszahlungen"
NZL_confiscation_payments_desc:0 "Die unrechtmäßigen Enteignungen der Vergangenheit haben zu wirtschaftlichen Problemen für die Māori geführt. Jährliche Zahlungen an die betroffenen Stämme würden es ihnen ermöglichen, ihre Ressourcen zu entwickeln."
NZL_maori_womens_welfare_league:0 "Māori-Frauenwohlfahrtsliga"
NZL_maori_womens_welfare_league_desc:0 "Da immer mehr Māori in den Städten leben, sollten wir die Bemühungen unterstützen, ihr Wohlergehen und ihre Fähigkeit zum Zusammenleben im von Pakeha dominierten Neuseeland zu verbessern."
NZL_Waitangi_Tribunal:0 "Das Waitangi-Tribunal"
NZL_Waitangi_Tribunal_desc:0 "Da die Beschwerden der Māori über die Maßnahmen der Regierung zunehmen, wird die Einrichtung eines Tribunals notwendig, das die Regierung hinsichtlich der Rechtmäßigkeit ihrer Maßnahmen berät und ihr eine Möglichkeit zur Wiedergutmachung bietet."
NZL_State_Housing:0 "Staatliche Wohnungsbauinitiative"
NZL_State_Housing_desc:0 "Jeder Neuseeländer hat ein Recht auf ein anständiges Zuhause, zu viele unserer Landsleute leben in Slums, Hütten oder Zelten."
NZL_state_highways:0 "Staatsstraßen"
NZL_state_highways_desc:0 "Ein von der Regierung unterhaltenes Autobahnnetz, das die verschiedenen Städte Neuseelands miteinander verbindet, wird die Reisemöglichkeiten im Land erheblich verbessern."
NZL_oil_exploration:0 "Taranaki-Öl"
NZL_oil_exploration_desc:0 "Im Taranaki-Distrikt wird seit den 1860er Jahren Öl gefördert, und es besteht die Möglichkeit, diese Industrie auszubauen."
NZL_iron_sands:0 "Eisensand"
NZL_iron_sands_desc:0 "Während es in Neuseeland keine herkömmlichen Mineralvorkommen gibt, enthält der Sand der Strände der Westküste viele Mineralien, die aus Australien erodiert sind."
NZL_repair_the_coastal_forts:0 "Reparieren Sie die Küstenfestungen"
NZL_repair_the_coastal_forts_desc:0 "Rund um die großen Häfen Neuseelands gibt es eine Reihe von Küstenfestungen. Obwohl sie viele Jahre lang nicht instand gehalten wurden, könnten sie repariert werden."
NZL_landward_defences:0 "Landverteidigung"
NZL_landward_defences_desc:0 "Neuseelands Küste ist zu lang, um alle Strände zu verteidigen. Im Falle einer Invasion könnten unsere Städte vom Land aus angegriffen werden."
NZL_full_employment:0 "Vollbeschäftigung"
NZL_full_employment_desc:0 "Unser Ziel sollte es sein, dass jeder Neuseeländer einen Beruf hat."
NZL_extra_research:0 "Forschungseinrichtungen"
NZL_extra_research_desc:0 "Unsere modernisierte Wirtschaft wird viel mehr wissenschaftliche Forschung erfordern."
NZL_Commonwealth:0 "Das Commonwealth"
NZL_Commonwealth_desc:0 "Unser erster und treuester Verbündeter ist das britische Volk, wo immer es auch leben mag."
NZL_millitary_exchanges:0 "Militärische Börsen des Commonwealth"
NZL_millitary_exchanges_desc:0 "Wir sollten Militäroffiziere mit unseren Verbündeten austauschen, damit wir von ihren Erfahrungen profitieren können."
NZL_forward_defence:0 "Vorwärtsverteidigung"
NZL_forward_defence_desc:0 "Unsere erste Verteidigungslinie gegen die Japaner sind die britischen Streitkräfte in Südostasien."
NZL_imperial_war_council:0 "Schlagen Sie einen Imperialen Kriegsrat vor"
NZL_imperial_war_council_desc:0 "Das Commonwealth führt einen gemeinsamen Krieg. Wir sollten einen zwischenstaatlichen Imperialen Kriegsrat vorschlagen, um unsere vereinten Streitkräfte zu koordinieren."
NZL_expand_dsir:0 "Erweitern Sie den DSIR"
NZL_expand_dsir_desc:0 "Das Ministerium für wissenschaftliche und industrielle Forschung leitet die Forschungsbemühungen der Regierung."
NZL_radar_research:0 "RADAR-Forschung"
NZL_radar_research_desc:0 "Die Entfernung zwischen Neuseeland und potenziellen Feinden des Commonwealth macht es ideal, um fortschrittliche Technologien ohne neugierige Blicke zu testen."
NZL_project_seal:0 "Projekt SEAL"
NZL_project_seal_desc:0 "Unsere japanischen Feinde haben etwas mit Neuseeland gemeinsam. Sie sind ebenfalls ein Inselstaat auf aktiven Verwerfungslinien und somit potenziell anfällig für eine (theoretische) Tsunami-Bombe."
nzl_tsunami_bomb:0 "Tsunami-Bomben-Bemühungen"
NZL_technology_sharing:0 "Technologieaustausch"
NZL_technology_sharing_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion Forschung und Entwicklung im Kriegsfall effizienter durchführen."
NZL_imperial_federation:0 "Imperiale Föderation"
NZL_imperial_federation_desc:0 "Der Imperiale Kriegsrat sollte erweiterte Befugnisse erhalten und dauerhaft sein, damit das Imperium im Krieg wie im Frieden geschlossen agieren kann."
NZL_expand_regular_forces:0 "Erweitern Sie die reguläre Armee"
NZL_expand_regular_forces_desc:0 "Die neuseeländische Armee besteht aus Teilzeitsoldaten. Durch die Erhöhung der Zahl der Vollzeitsoldaten wird sich die Qualität unserer Truppen verbessern."
NZL_charlton:0 "Charlton-Automatikgewehre"
NZL_charlton_desc:0 "Phillip Charlton hat eine Methode entwickelt, um aus Gewehren aus der Zeit des Burenkriegs, die wir auf Lager haben, effektive leichte Maschinengewehre herzustellen."
NZL_doctrine_effort:0 "Lehrbemühungen"
NZL_doctrine_effort_desc:0 "Die militärischen Doktrinen, die den Bodenkampf im Ersten Weltkrieg bestimmten, sind überholt. Wir müssen unsere besten Köpfe mit der Aufgabe betrauen, das militärische Denken von morgen zu gestalten."
NZL_equipment_effort_2:0 "Ausrüstungsaufwand II"
NZL_equipment_effort_2_desc:0 "Wir werden unsere Bemühungen fortsetzen, sicherzustellen, dass unsere Infanterie- und Unterstützungstruppen mit der bestmöglichen Ausrüstung unserer Zeit ausgestattet sind."
NZL_mechanization_effort:0 "Mobilitätsaufwand"
NZL_mechanization_effort_desc:0 "Mobilität und Schutz sind entscheidend für den sicheren Transport der Infanterie ins Feld und wieder hinaus. Wenn wir uns auf diese Entwicklungen konzentrieren, können wir schnell handeln."
NZL_compulsory_millitary_training:0 "Militärische Ausbildung in Schulen"
NZL_compulsory_millitary_training_desc:0 "Indem wir unserer Jugend grundlegende militärische Fähigkeiten vermitteln, bauen wir eine Gesellschaft auf, die für den Militärdienst gut geeignet ist."
NZL_equipment_effort_3:0 "Ausrüstungsaufwand III"
NZL_equipment_effort_3_desc:0 "Anstatt ausländische Ausrüstung zu imitieren oder zu kaufen, sollten wir darauf abzielen, weltweit führend im Bereich Infanteriewaffen zu werden."
NZL_armor_effort:0 "Rüstungsaufwand"
NZL_armor_effort_desc:0 "Indem wir das anwenden, was wir bei der Mechanisierung unserer Infanterie gelernt haben, können wir auch unsere gepanzerten Fahrzeuge verbessern."
NZL_special_forces:0 "Spezialeinheiten"
NZL_special_forces_desc:0 "Wir brauchen Elitetruppen; Gebirgsjäger und Fallschirmjäger sollten unsere Priorität sein."
NZL_rnzaf:0 "Habe die RNZAF gefunden"
NZL_rnzaf_desc:0 "Neuseeland verfügt zwar über eine Reihe von Flugzeugen, verfügt jedoch nicht über eine eigenständige Luftwaffe. Die Gründung einer Royal New Zealand Air Force würde eine schnellere Entwicklung der Flugtaktik ermöglichen."
NZL_bomber:0 "Bomberfokus"
NZL_bomber_desc:0 "Der Zweck der Luftwaffe besteht darin, unseren Feinden Verwüstung zu bringen."
NZL_fighters:0 "Kämpferfokus"
NZL_fighters_desc:0 "Der Zweck der Luftwaffe besteht darin, unseren Himmel vom Feind freizuhalten."
NZL_aviation_effort:0 "Luftfahrtbemühungen"
NZL_aviation_effort_desc:0 "Um unsere Luftwaffe gut in andere Zweige des Militärs zu integrieren, sind weitere Fortschritte in der Luftfahrt erforderlich."
NZL_light_cruiser:0 "Leichte Kreuzer"
NZL_light_cruiser_desc:0 "Die neuseeländische Division muss modernisiert werden. Wir sollten ein Paar leichte Kreuzer anfordern, um unsere Meere zu patrouillieren."
NZL_heavy_cruiser:0 "Schwere Kreuzer"
NZL_heavy_cruiser_desc:0 "Die neuseeländische Division muss modernisiert werden, ein schwerer Kreuzer könnte den Kern einer Kampfgruppe bilden."
NZL_rnzn:0 "Habe das RNZN gefunden"
NZL_rnzn_desc:0 "Die Royal Navy wird Neuseeland nicht immer schützen können, wir sollten eine unabhängige Marine gründen."
NZL_naval_expansion:0 "Marineerweiterung"
NZL_naval_expansion_desc:0 "Um effektiv zu sein, bräuchte eine unabhängige Flotte viel mehr Werften als wir derzeit haben."
NZL_ships:0 "Moderne Schiffsdesigns"
NZL_ships_desc:0 "Wenn wir eine schlagkräftige Marine haben wollen, sollten wir darauf abzielen, die technologisch fortschrittlichsten Schiffe zu besitzen."
NZL_maori_battalion:0 "Bilden Sie ein Māori-Bataillon"
NZL_maori_battalion_desc:0 "Durch die Schaffung eines einzigartigen Māori-Raums in unserem Militär wird die Rekrutierung in diesem Teil der Bevölkerung deutlich gesteigert."

 
 nzl.1.t:0 "Unsere Beziehung zu den Vereinten Nationen"
 nzl.1.d:0 "Da unser Bündnis stärker wird, müssen wir uns entscheiden, ob wir die Führung der Großmächte unterstützen oder eine demokratischere Lösung für die internationale Sicherheit anstreben. "
 nzl.1.a:0 "Unterstützen Sie die Großmächte"
 nzl.1.b:0 "Mangelnde Demokratie kritisieren, aber im Bündnis bleiben"
 nzl.1.c:0 "Demokratie im Pazifik!"
 nzl.2.t:0 "Internationaler Kommunismus"
 nzl.2.d:0 "Nachdem wir mit unseren kapitalistischen Wurzeln gebrochen haben, müssen wir entscheiden, wie wir den Weltkommunismus voranbringen wollen."
 nzl.2.a:0 "Proletarier aller Länder, vereinigt euch!"
 nzl.2.b:0 "Sozialismus in der Südsee!"
 nzl.3.t:0 "Ein imperialer Kriegsrat?"
 nzl.3.d:0 "Die Streitkräfte der verschiedenen Nationen des Imperial Commonwealth führen einen gemeinsamen Krieg. Ihre Bemühungen könnten jedoch besser koordiniert werden, wenn wir einen gemeinsamen Imperialen Kriegsrat einrichten würden, der die Kriegsführung leitet."
 nzl.3.a:0 "Schlagen Sie einen Kriegsrat vor"
 nzl.3.b:0 "Die Dinge sind gut, so wie sie sind"
 nzl.21.t:0 "Kaiserlicher Kriegsrat?"
 nzl.21.d:0 "Einer unserer Verbündeten im Commonwealth hat vorgeschlagen, dass wir einen Imperialen Kriegsrat leiten, um die militärischen Bemühungen unseres Imperiums zu koordinieren. Dies erfordert eine intensivere Konsultation mit den Regierungen des Commonwealth, bringt aber militärische Vorteile."
 nzl.21.a:0 "Gründete den Imperialen Kriegsrat"
 nzl.21.b:0 "Die Kolonialherren werden nicht gebraucht"
 nzl.22.t:0 "Die Briten haben unseren Vorschlag abgelehnt"
 nzl.22.d:0 "Mit der Begründung, ein Imperial War Council sei ineffizient, schwerfällig und unnötig, hat das Vereinigte Königreich unseren Vorschlag abgelehnt."
 nzl.22.a:0 "So sei es"
 nzl.4.t:0 "Die Briten wollen einen Imperial War Council"
 nzl.4.d:0 "Die Briten haben einen Imperial War Council vorgeschlagen, um die Streitkräfte des Commonwealth zu koordinieren. Werden wir uns anschließen?"
 nzl.4.a:0 "Natürlich war es unsere Idee"
 nzl.4.b:0 "Das vereinte Imperium wird niemals besiegt werden!"
 nzl.4.c:0 "Wir werden abseits stehen"
 nzl.23.t:0 "[From.GetName] ist dem Imperialen Kriegsrat beigetreten"
 nzl.23.d:0 "[From.GetName] hat beschlossen, unsere Führung in unseren gemeinsamen Kriegsanstrengungen zu akzeptieren"
 nzl.23.a:0 "Vielen Dank, [From.GetName]"
 nzl.24.t:0 "[From.GetName] wird dem Imperial War Council nicht beitreten"
 nzl.24.d:0 "[From.GetName] wird dem Imperial War Council nicht beitreten"
 nzl.24.a:0 "Wie sie es wünschen"
 nzl.5.t:0 "Projekt SEAL bereit zum Testen"
 nzl.5.d:0 "Die theoretischen Berechnungen sind abgeschlossen und ein Prototyp wurde entwickelt. Unsere erste Tsunami-Bombe ist bereit, an einem Ort vor der Küste von Northland getestet zu werden."
 nzl.5.a:0 "Genehmigen"
 nzl.5.b:0 "Das klingt nach einer schlechten Idee"
 nzl.6.t:0 "Projekt SEAL – enttäuschende Ergebnisse"
 nzl.6.d:0 "Der Test der Tsunami-Bombe verlief enttäuschend. Obwohl technisch möglich, hätte man dafür eine enorme Menge an Bomben bauen und diese sorgfältig in geringer Entfernung zur feindlichen Küste platzieren müssen."
 nzl.6.a:0 "Wir müssen andere Mittel einsetzen, um unsere Feinde zu besiegen"
 nzl.7.t:0 "Projekt SEAL – Fehlschlag"
 nzl.7.d:0 "Unsere Tsunami-Bombe wurde getestet. Messgeräte am Ufer in der Nähe der Detonationsstelle haben eine große Welle registriert, aber es ist unklar, ob sie das Ergebnis der Bombe oder reiner Zufall war."
 nzl.7.a:0 "Was für eine Zeitverschwendung"
 nzl.8.t:0 "Projekt SEAL – Katastrophe"
 nzl.8.d:0 "Die Tsunami-Bombe wurde getestet. Sie erzeugte eine Welle, die hoch an die Küste schwappte und unsere Teststrukturen erheblich beschädigte. Sie interagierte jedoch auf unvorhergesehene Weise mit dem Meeresboden und den umliegenden Inseln, was zu einem Tsunami führte, der die Stadt Auckland traf. Die Zahl der Opfer ist unbekannt – aber hoch"
 nzl.8.a:0 "Der Test war ein Erfolg"
 nzl.9.t:0 "Imperiale Föderation"
 nzl.9.d:0 "Seit einem halben Jahrhundert diskutieren die Menschen über die Idee einer imperialen Föderation. Angesichts unserer jüngsten Zusammenarbeit ist es jetzt vielleicht an der Zeit, ein einziges Parlament vorzuschlagen, das über das gesamte Imperium regieren soll."
 nzl.9.a:0 "Schlagen Sie eine Föderation vor"
 nzl.9.b:0 "[Root.GetName] behält seine Unabhängigkeit"
 nzl.10.t:0 "Imperiale Föderation?"
 nzl.10.d:0 "[From.GetName] hat die Gründung einer Imperialen Föderation vorgeschlagen, einem einzigen Parlament mit Vertretern aller Länder des Commonwealth, das über das gesamte Imperium regieren soll. Diese Institution wäre für unsere gemeinsame Verteidigung und Außenpolitik in Krieg und Frieden verantwortlich."
 nzl.10.a:0 "Ein lohnender Vorschlag"
 nzl.10.b:0 "Warum sollten die Kolonien über Großbritannien herrschen?"
 nzl.11.t:0 "Imperiale Föderation"
 nzl.11.d:0 "Die Briten treiben den Vorschlag voran, eine imperiale Föderation zu gründen, der wir beitreten können, obwohl dies den Verlust unserer Unabhängigkeit bedeuten würde."
 nzl.11.a:0 "Exzellent"
 nzl.11.b:0 "Verbinden"
 nzl.11.c:0 "Unabhängigkeit für [Root.GetName]"
 nzl.12.t:0 "Großbritannien lehnt Föderation ab"
 nzl.12.d:0 "Die Briten haben unseren Vorschlag einer imperialen Föderation abgelehnt"
 nzl.12.a:0 "Heute fällt das Imperium"
 nzl.13.t:0 "[From.GetName] lehnt Föderation ab"
 nzl.13.d:0 "[From.GetName] hat es abgelehnt, der Imperialen Föderation beizutreten, sie werden jedoch unser Verbündeter bleiben"
 nzl.13.a:0 "Auf Wiedersehen, [From.GetName]"
 news.237.t:0 "[Root.GetName] tritt der British Imperial Federation bei "
 news.237.d:0 "Die Zusammenarbeit zwischen den Ländern des Commonwealth hat zu Forderungen nach einer dauerhafteren Lösung für die Verwaltung des Britischen Empire geführt. Ein Imperiales Parlament wurde gebildet und [Root.GetName] entsendet Vertreter"
 news.237.a:0 "Die Briten werden stärker"
 nzl.14.t:0 "Kaufen Sie Marinebomber"
 nzl.14.d:0 "Unsere neue Luftwaffe wird mehr Flugzeuge benötigen. Wir könnten einige aus Großbritannien kaufen."
 nzl.14.a:0 "Ja"
 nzl.14.b:0 "NEIN"
 nzl.15.t:0 "Kaufen Sie taktische Bomber"
 nzl.15.d:0 "Wenn wir unsere Feinde zerstören wollen, brauchen wir Bomber. Wir könnten welche von den Briten kaufen."
 nzl.15.a:0 "Ja"
 nzl.15.b:0 "NEIN"
 nzl.16.t:0 "Kämpfer kaufen"
 nzl.16.d:0 "Wir werden spezielle Flugzeuge brauchen, um unseren Luftraum zu schützen. Wir könnten einige Kampfflugzeuge aus Großbritannien kaufen."
 nzl.16.a:0 "Ja"
 nzl.16.b:0 "NEIN"
 nzl.17.t:0 "Meuterei auf See"
 nzl.17.d:0 "Zahlreiche Matrosen und Hilfskräfte unserer Marine haben gemeutert. Der Sold der neuseeländischen Matrosen ist deutlich niedriger als der ihrer Kollegen in Heer und Luftwaffe, die zudem mehr Urlaub und kürzere Dienstzeiten erhalten. Die Meuterei wird so lange andauern, bis zwischen den Teilstreitkräften Gleichberechtigung herrscht."
 nzl.17.a:0 "Eine vernünftige Bitte"
 nzl.17.b:0 "Zerschmettert die Meuterer!"
 nzl.leander:0 "Bekommt 2 leichte Kreuzer der Leander-Klasse. "
 nzl.kent:0 "Wird 1 schweren Kreuzer der Hawkins-Klasse erhalten. "
 nzl.nav:0 "Kaufen Sie 29 Marinebomber. "
 nzl.tac:0 "Kaufen Sie 30 taktische Bomber. "
 nzl.int:0 "Kaufen Sie 30 Kämpfer. "
 nzl.18.t:0 "Premierminister ist krank"
 nzl.18.d:0 "Der Premierminister ist schwer erkrankt. Er hatte eine medizinische Behandlung aufgeschoben, um im Wahlkampf antreten zu können. Die Ärzte gehen nun davon aus, dass seine Langzeitprognose schlecht ist."
 nzl.18.a:0 "Wir müssen auf seinen Nachfolger achten"
 nzl.19.t:0 "Der Premierminister ist tot"
 nzl.19.d:0 "Premierminister Savage ist seiner Krankheit erlegen. Obwohl dies für viele ein Schock war, war die Führung der Labour Party seit längerem über seinen Zustand informiert. John A. Lee wurde als neuer Premierminister vereidigt und gelobt, Savages Erbe fortzuführen."
 nzl.19.a:0 "Premierminister Lee"
 nzl.20.t:0 "Der Premierminister ist tot"
 nzl.20.d:0 "Premierminister Savage ist seiner Krankheit erlegen. John Lee, sein Hauptkritiker in der Partei, wurde zwei Tage vor dem Tod des Premierministers offiziell aus der Partei ausgeschlossen, wodurch Peter Fraser die Möglichkeit hatte, als Premierminister vereidigt zu werden."
 nzl.20.a:0 "Premierminister Fraser"
