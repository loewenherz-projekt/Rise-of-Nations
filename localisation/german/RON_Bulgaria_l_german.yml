  BUL_exercise_direct_power_desc:0 "Die Übernahme der direkten Kontrolle über die Regierung ermöglicht es uns, unser Land perfekt zu kontrollieren und alle zu verdrängen, die gegen uns sind."
  BUL_revise_our_regime_desc:0 "Durch die Reform unseres Regimes wird die Kontrolle über das Land dem Premierminister übertragen, wir werden aber auch bei den Westmächten beliebter."
  BUL_fight_the_crisis_desc:0 "Bulgarien wurde von der Krise hart getroffen. Als vereintes Land müssen wir uns zusammenschließen, um die Krise zu überwinden, oder wir werden einzeln daran zerbrechen."
  BUL_restore_the_bulgarian_army_desc:0 "Seit dem Ende des Ersten Weltkriegs ist unsere Armee eine Schande für die Gesellschaft. Das liegt zum Teil am Friedensvertrag, aber auch an unserer Untätigkeit. Wir sollten die Armee reorganisieren."
  BUL_greater_bulgaria_desc:0 "Seit dem Ersten Weltkrieg hatten wir die Idee eines Großbulgariens. Jetzt, da wir eine unabhängige und starke Macht sind, sind wir endlich in der Lage, dieses Ziel zu verfolgen."
  BUL_sign_salonika_agreement_desc:0 "Eines der ersten Dinge, die wir tun sollten, ist die Aufhebung der uns auferlegten Beschränkungen. Dies können wir tun, indem wir einen Vertrag mit den Griechen und den anderen Mitgliedern der Balkan-Entente unterzeichnen."
  BUL_ignore_treaty_neuilly_sur_seine_desc:0 "Die Folgen unserer Verluste im Ersten Weltkrieg sind noch immer sichtbar. Anstatt jedoch dem westlichen Befehl zu folgen, sollten wir versuchen, uns heimlich wieder aufzurüsten."
  BUL_vmz_sopot_desc:0 "VMZ Sopot kann uns mit Waffen für die Infanterie, Munition und Artillerie versorgen. VMZ Sopot könnte für den Wiederaufbau der bulgarischen Armee von entscheidender Bedeutung sein."
  BUL_treaty_of_friendship_yugoslavia_desc:0 "Wir sollten die Beziehungen zu Jugoslawien wiederaufnehmen. Wir sind uns sehr ähnlich, und Jugoslawien könnte in Zukunft ein wertvoller Verbündeter sein."
  BUL_expand_facilities_desc:0 "Um die Krise weiter zu bekämpfen, wäre es am besten, wenn wir die Industrie durch den Bau weiterer Fabriken verbessern und dadurch mehr Menschen einstellen würden."
  BUL_rearm_ourselves_desc:0 "Im Rahmen unseres Aufrüstungsplans müssen wir zunächst unsere Rüstungsproduktion steigern. Dies erreichen wir durch den Bau weiterer Fabriken und die Rekrutierung weiterer Soldaten."
  BUL_acquire_t_11_desc:0 "Ein erster Schritt zur Modernisierung der bulgarischen Armee ist die Anschaffung von Militärfahrzeugen. Wir brauchen nicht nur Lastwagen, sondern auch Panzer. Den Panzer T-11 können wir problemlos beschaffen."
  BUL_bulgarisation_desc:0 "Die Bulgarisierung ist der Prozess, den wir in Griechenland gegen das griechische Volk durchführen wollen. Im Grunde verändern wir ihre gesamte Kultur, damit sie unserem Stil entspricht, oder sie sterben."
  BUL_rearm_airforce_desc:0 "Die Wiederbewaffnung der bulgarischen Luftwaffe sollte eine unserer obersten Prioritäten sein. Wenn wir uns auf einen bevorstehenden Konflikt vorbereiten wollen, ist die Luftwaffe von entscheidender Bedeutung."
  BUL_fighter_focus_desc:0 "Wir sollten unsere Bemühungen auf die Kampfflugzeuge konzentrieren, nicht auf die Bomber. Wir brauchen die Kampfflugzeuge, um den Himmel zu beherrschen."
  BUL_bomber_focus_desc:0 "Statt einer leichten Luftwaffe sollten wir uns auf Bomber konzentrieren und den Feind aus der Luft vernichten."
  BUL_air_innovations_desc:0 "Wir sollten unsere Taktiken am Himmel aktualisieren und unsere Fehler aus dem Ersten Weltkrieg korrigieren."
  BUL_research_treaty_with_italy_desc:0 "Italien ist einer der führenden Innovatoren im Bereich der Luftkriegsführung. Wir sollten Italien um Hilfe bei der Modernisierung unserer Luftwaffe bitten."
  BUL_airfields_for_germany_desc:0 "Es könnte sowohl für uns als auch für die Deutschen von Vorteil sein, wenn wir den Deutschen die Nutzung unserer Luftwaffenstützpunkte gestatten. Denn wenn wir bei den Deutschen in der Gunst stehen, könnten sie uns dafür belohnen."
  BUL_bulgarian_arms_desc:0 "Die bulgarische Waffenproduktion muss wieder in Gang gebracht werden. Sie ist aufgrund unseres Versagens im Ersten Weltkrieg zusammengebrochen, und jetzt können wir das Problem lösen."
  BUL_bulgarian_will_desc:0 "Die slawischen Völker sind für ihre körperliche und geistige Stärke bekannt. Wenn wir unbezwingbar sein wollen, um zu gewinnen, dann werden wir es sein."
  BUL_acquire_panzer_iv_desc:0 "Wir können eine lokale Variante des Panzer IV mit einer ZiS-3-Kanone produzieren. Es soll einer unserer ersten im Inland produzierten Panzer sein."
  BUL_maintain_soviet_diplomats_desc:0 "Die Aufrechterhaltung der sowjetischen Diplomatie wird uns auf lange Sicht helfen, denn auf diese Weise werden wir in der Lage sein, die Beziehungen zu unseren slawischen Brüdern wiederherzustellen."
  BUL_reinforce_tsarist_navy_desc:0 "Die bulgarische Marine hat unter den Folgen des Ersten Weltkriegs schwer gelitten. Wenn wir sie wieder aufbauen wollen, müssen wir das selbst tun."
  BUL_destroyer_effort_desc:0 "Die bulgarische Marine kann Zerstörer gut gebrauchen, da sie über eine Anbindung an das Schwarze Meer verfügt, wo Zerstörer ihre beste Wirkung entfalten können."
  BUL_podvodnik_desc:0 "Basierend auf dem Podvodnik 18, einem bulgarischen U-Boot aus dem Ersten Weltkrieg, könnten wir eine Reihe weiterer U-Boote bauen, um die bulgarische Marine zu verstärken."
  BUL_dockyards_of_varna_desc:0 "Wir sollten unsere Anstrengungen auf die Schaffung eines konzentrierten Werftgeländes für die Schiffsproduktion konzentrieren. Der ideale Standort dafür ist Varna, eine unserer größten Städte."
  BUL_mobile_navy_desc:0 "Als Bulgaren könnten wir uns nie auf die Produktion von Großkampfschiffen und anderen schweren Schiffen dieser Art konzentrieren, also sollten wir uns stattdessen auf den Aufbau einer größeren Marine konzentrieren."
  BUL_bulgarian_research_committee_desc:0 "Um schneller voranzukommen, müssen wir unsere Anstrengungen auf die Forschung konzentrieren."
  BUL_bulgarian_research_institutes_desc:0 "Wir sollten dafür sorgen, dass unsere Institute und Universitäten sich auf den Fortschritt konzentrieren, denn wenn wir mit den anderen Nationen konkurrieren wollen, ist es wichtig, dass wir technologisch auf dem neuesten Stand bleiben."
  BUL_bulgarian_infrastructure_desc:0 "Die Infrastruktur hat sowohl unter der Weltwirtschaftskrise als auch unter den Verlusten im Ersten Weltkrieg stark gelitten. Davon müssen wir uns erholen, wenn wir unser Land wieder stark machen wollen."
  BUL_license_german_equipment_desc:0 "Wir müssen unsere Ausrüstung modernisieren, aber bis dahin können wir andere Länder um ihre Technologie bitten. Unsere beste Wahl ist Deutschland, da es über die beste Technologie verfügt."
  BUL_license_soviet_equipment_desc:0 "Eine Möglichkeit, unsere Armee zu modernisieren, besteht darin, sowjetische Ausrüstung in unsere Armee zu integrieren. Die sowjetische Ausrüstung ist besser als die unserer potenziellen Feinde, und sie könnten bereit sein, dem zuzustimmen."
  BUL_allied_research_support_desc:0 "Gemeinsam mit unseren Verbündeten können wir mehr erreichen, als wir es sonst könnten. Es wäre gut, dies zu erkennen."
  BUL_krali_marko_line_desc:0 "Die Krali-Marko-Linie ist unsere Art, unser Land vor ausländischen Angriffen zu schützen. Für den Bau der Linie werden wir die Ausrüstung unserer Verbündeten verwenden."
  BUL_black_sea_operations_desc:0 "Um unsere Seeherrschaft über das Schwarze Meer aufrechtzuerhalten, müssen wir uns mit Marinesoldaten bewaffnen, denn im Falle eines Krieges im Schwarzen Meer sind wir bereit."
  BUL_prosveta_publishing_house_desc:0 "Um unsere Entschlüsselungsforschung und Elektronik aufrechtzuerhalten, sollten wir ein Unternehmen beauftragen. Dies wird uns langfristig helfen, da es sicherstellt, dass wir auf dem neuesten Stand bleiben."
  BUL_acquire_p_38_desc:0 "Zu unserer Modernisierung gehört auch die Anschaffung moderner Fahrzeuge. Die tschechische Praga P-38 können wir zu einem relativ günstigen Preis erwerben. Das sollten wir in Betracht ziehen."
  BUL_bulgarian_ports_desc:0 "Um auf alles vorbereitet zu sein, was uns in den Weg kommen könnte, müssen wir sicherstellen, dass eine Versorgungsroute über unsere Docks aufrechterhalten werden kann. Daher sollten wir sie erweitern."

  BUL_nadezhda_desc:0 "Die Nadezhda war ein Torpedoboot der bulgarischen Marine und wurde von den Bulgaren als leichter Kreuzer angesehen. Wir sollten das Design übernehmen und es modernisieren, um es an eine moderne Flotte anzupassen."
  BUL_blacktrap_power_navy_desc:0 "Statt einer großen Flotte kleinerer Schiffe sollten wir stattdessen eine Flotte schwererer Schiffe einsetzen, die einer kleineren Flotte Platz bietet."
  BUL_across_the_seas_desc:0 "Unsere Marine ist alles andere als auf dem neuesten Stand. Eine Möglichkeit, eine moderne Flotte aufzubauen, besteht darin, über moderne Transportmittel zu verfügen. Dies sollte eines unserer Hauptziele sein."
  BUL_air_support_desc:0 "Zur Unterstützung unserer Armee benötigen wir die Produktion und den Einsatz von Kampfflugzeugen zur Luftnahunterstützung. Wir sollten unsere Luftwaffe entsprechend aufrüsten."
  BUL_heavy_fighter_project_desc:0 "Kampfflugzeuge sind zwar anständig, aber um den Luftkrieg zu gewinnen, brauchen wir schwere Mehrzweckkampfflugzeuge."
  BUL_strategic_bomber_focus_desc:0 "Mittelschwere Bomber sind gut und schön, aber wir brauchen strategische Bomber, um beide Enden des Landes unseres Feindes zu erreichen."
  BUL_skywalkers_desc:0 "Fallschirmjäger sind für eine gute Zusammenarbeit zwischen Bodentruppen und Luftwaffe unerlässlich, und wir brauchen sie im Kampf gegen unseren Feind. Möge die Macht mit uns sein."
  BUL_political_force_desc:0 "Der Wiederaufbau unseres Landes ist für unser Überleben von entscheidender Bedeutung, doch eine Öffnung unseres politischen Spektrums würde uns dabei helfen."
  BUL_bulgarian_resentment_desc:0 "Die Bulgaren hegen seit langem einen Groll gegen ihre Nachbarn auf dem Balkan wegen ihrer Verluste während der Balkankriege. Wir sollten dies erkennen und zu unserem Vorteil nutzen."
  BUL_reassert_western_claims_desc:0 "Wir haben in den letzten dreißig Jahren viel Territorium verloren und sollten der Welt mitteilen, dass wir diese Gebiete immer noch begehren."
  BUL_german_arm_deliveries_desc:0 "Wir sollten versuchen, den Vertrag von Neuilly-sur-Seine zu untergraben. Das Vereinigte Königreich hat erklärt, dass es uns dies angesichts unmittelbarer Bedrohungen von außen erlauben wird. Und wen könnten wir dafür besser fragen als Deutschland?"
  BUL_deal_with_the_macedonian_problem_desc:0 "Zu lange haben die Mazedonier unsere Regierung untergraben. Wir sollten uns so schnell wie möglich mit der IMRO auseinandersetzen – mit welchen Mitteln auch immer."
  BUL_satisfy_the_macedonians_desc:0 "Der effektivste Weg, mit den Mazedoniern umzugehen, besteht darin, sie zu beschwichtigen. Dafür müssen Opfer gebracht werden, aber am Ende wird es sich lohnen."
  BUL_honour_slavic_allegiance_desc:0 "Unsere wahren Ursprünge liegen weit entfernt von hier. Das sollten wir den Sowjets, dem führenden slawischen Land, zeigen. Unsere Loyalität sollte nur ihnen gelten."
  BUL_join_the_comintern_desc:0 "Um den Sowjets entgegenzukommen, werden wir darum bitten, der Komintern beizutreten. Das wird sie natürlich freuen, und wir werden geschützt sein, und unsere Bindung zu unseren slawischen Brüdern wird dadurch nur noch stärker."
  BUL_peasant_conviction_desc:0 "Wenn unsere Untertanen an ein erfolgreiches kommunistisches Regime glauben, werden wir bei unserem Streben nach einem wahren globalen Kollektivismus gut vorankommen."
  BUL_royal_communism_desc:0 "Unser Regime behält Zar Boris, aber nur als Galionsfigur. Er wird keine wirkliche Macht haben, und der Kommunistische Rat wird einberufen, um das Land zu führen."
  BUL_the_peoples_republic_desc:0 "Den Zaren zu behalten wäre ein Zeichen von Schwäche. Unsere wahre Stärke zeigen wir durch die Gründung der Volksrepublik."
  BUL_sign_the_tripartite_pact_desc:0 "Deutschland würde es vorziehen, wenn wir den Dreimächtepakt unterzeichnen und uns formell anschließen würden. Das würde uns zwar auf dem Weg dorthin sicherlich helfen, könnte sich auf lange Sicht jedoch als fatal erweisen."
  BUL_permit_german_troops_desc:0 "Um die Deutschen zu beschwichtigen, sollten wir ihnen Zugang zu unserem Territorium gewähren, damit sie dort gegebenenfalls Truppen stationieren können."
  BUL_join_the_axis_desc:0 "Wir haben Deutschland ausreichend beschwichtigt. Die Unterzeichnung des Dreimächtepakts und die Gewährung des Zugangs waren die beiden notwendigen Schritte für den Beitritt zur Achse, und wir werden darum bitten."
  BUL_expel_soviet_diplomats_desc:0 "Wir sollten unsere Loyalität und unser Engagement für die deutsche Sache unter Beweis stellen, indem wir die sowjetischen Diplomaten aus unserem Land ausweisen. Ein Schlag gegen unsere eigenen Brüder wird sie von unserer Loyalität überzeugen."
  BUL_dedication_to_the_axis_desc:0 "Unser Engagement für die Achsenmächte erweist sich als fruchtbar, da unser Land den Faschismus stärker zu unterstützen scheint. Hristo Lukov wäre eine kluge Wahl, wenn wir unseren Führer wählen."
  BUL_the_wrong_axis_desc:0 "Es scheint, wir haben uns für das falsche Bündnis entschieden. Die Achsenmächte sind nicht stark genug, um uns zu schützen, und wir haben die sowjetischen Diplomaten behalten. Zeit, sie zu nutzen."
  BUL_negotiate_with_the_soviets_desc:0 "Es ist an der Zeit, mit den Sowjets über unseren möglichen Beitritt zur Komintern zu verhandeln. Wir müssen unser eigenes Überleben vor dem der Deutschen sichern, und die Sowjets können uns dabei helfen."
  BUL_align_with_the_west_desc:0 "Angesichts der unmittelbaren Bedrohungen in Europa ist unser einziger Sicherheitsraum die Allianz unter dem Schutz Westeuropas."
  BUL_appease_the_allies_desc:0 "Die Alliierten haben ihre Unterstützung für Nikola Mushanov und seine Demokratische Partei als Premierminister bekundet. Die Machtübernahme von Mushanovs Regime wird unserer Sache sehr zugute kommen."
  BUL_deal_with_the_allies_desc:0 "Keine zwielichtigen Hinterzimmergeschäfte mehr, die Welt darf wissen, dass Bulgarien nun ein formelles Mitglied der Alliierten ist, was auch immer das Gute ist."
  BUL_balkan_alignment_desc:0 "Um unsere Agenda voranzutreiben, sollten wir einige Änderungen an unserer Ausrichtung vornehmen. Entweder wir schließen uns dem Balkan an, oder wir schließen uns dem Balkan an."
  BUL_befriend_greece_desc:0 "Unsere jahrzehntelange Rivalität mit Griechenland sollte ein Ende haben. Es war alles schön und gut, aber jetzt ist es an der Zeit, zusammenzuhalten."
  BUL_befriend_romania_desc:0 "Unser nördlicher Nachbar Rumänien ist uns nicht besonders sympathisch. Es ist Zeit, das zu ändern, damit die Balkanstaaten zusammenhalten und nicht einzeln abgeschlachtet werden."
  BUL_formalise_the_balkan_entente_desc:0 "Es ist gut, Teil des Entente-Systems zu sein, aber wir sollten darüber nachdenken, es erneut zu bekräftigen, damit wir denen Paroli bieten können, die uns angreifen wollen."
  BUL_alliance_with_the_entente_desc:0 "Nachdem wir Jugoslawien, Rumänien und Griechenland beschwichtigt haben, sollten wir einen Beitritt zur Balkan-Entente in Erwägung ziehen. Die Balkan-Entente wird uns stark machen."
  BUL_albanian_inheritance_desc:0 "Albanien ist nicht nur slawisch, sondern war auch Teil des großen bulgarischen Reiches. Es ist an der Zeit, die Situation zu ändern und Albanien daran zu erinnern, dass seine Unabhängigkeit von unserer Gnade abhängt."
  BUL_local_armour_acquirements_desc:0 "Anstatt uns bei der Beschaffung unserer Panzerausrüstung auf externe Quellen zu verlassen, sollten wir unsere eigene entwickeln und produzieren. Auf diese Weise sind wir immer sicher."
  BUL_over_the_balkans_desc:0 "Gebirgsjägerdivisionen sind auf dem Balkan von großem Nutzen. Ihre Erforschung und ihr Einsatz werden uns langfristig enorm helfen."
  BUL_protect_the_balkans_desc:0 "Um den Balkan zu schützen, müssen wir eine undurchdringliche Festungslinie errichten und diese mit unserem Militär sichern."
  BUL_girdap_desc:0 "Wir sollten uns Mittel von der Girdap-Bank in Bulgarien sichern. Sie kann viele Regierungsprojekte finanzieren und uns in einigen Bereichen unterstützen, in denen wir weniger bereit sind zu helfen."
  BUL_across_the_land_desc:0 "Wir sollten unsere Infrastruktur im ganzen Land verbessern. Unsere Straßen sind derzeit nicht besonders gut ausgebaut, und für die Unterstützung unserer zukünftigen Militärbewegungen ist dies ein guter Anfang."
  BUL_bulgarian_electronics_desc:0 "Die Elektronikforschung ist ein Schritt in die Zukunft. Wir sollten Pläne für diesen Schritt in die Zukunft verwirklichen."
  BUL_steel_exports_desc:0 "Bulgarien verfügt zwar nicht über enorme Stahlvorkommen, diese reichen jedoch aus, um den bulgarischen Bedarf zu decken und in geringem Umfang sogar zu exportieren."
  BUL_global_detection_desc:0 "Der nächste Modernisierungsschritt ist RADAR. Groß angelegter Rundfunk wird Bulgarien in die Zukunft führen, beginnend mit der Errichtung eines großen Senders in Vakarel."
  BUL_institute_for_nuclear_research_desc:0 "Wenn Bulgarien mit der Zeit Fortschritte machen soll, ist es von größter Bedeutung, dass wir mit unserer eigenen Forschung zur Kernenergie beginnen."
  BUL_jet_fighters_desc:0 "Während unsere alten Kämpfer sich unserem Militär in seiner jetzigen Form anpassen. Das wird nicht so bleiben, und was wäre da besser, als mit einem Sprung voranzukommen?"
  BUL_derhavna_samoletna_fabrika_desc:0 "Derhavna Samoletna Fabrika ist eine polnische Fabrik in Bulgarien, die vor Ort mehrere polnische Kampfflugzeuge für das bulgarische Militär produziert."
  BUL_retake_thrace_desc:0 "Thrakien gehört nominell uns! Vor dem Zweiten Balkankrieg war Thrakien bulgarisches Kerngebiet, und diese dreckigen Griechen haben es uns gestohlen! Wir sollten es um jeden Preis zurückerobern!"
  BUL_soviet_t_34_desc:0 "Wenn wir uns sowjetische Technologie aneignen wollen, dann müssen wir uns den T-34, ihren Kampfpanzer, anschaffen. Wir werden uns bemühen, diesen Panzer zu beschaffen."
  BUL_bulgarian_dars_desc:0 "Das bulgarische Unternehmen DAR hat in der Vergangenheit zahlreiche Schulflugzeuge gebaut. Vielleicht könnten wir diese Trainer nutzen, damit unsere Piloten damit fliegen und Erfahrungen sammeln können."
  BUL_dismantle_the_government_desc:0 "Die Regierung hat Zar Boris verraten! Wir müssen die Opposition ausschalten, bevor sie einen Staatsstreich versucht!"
  BUL_depose_the_king_desc:0 "Es ist Zeit, den falschen König endgültig zu beseitigen. Er verdient es nicht mehr, Bulgarien zu führen."
  BUL_local_antitank_innovation_desc:0 "Bulgarien kann als Land nicht genügend Panzer produzieren, um anderen Ländern Paroli zu bieten. Daher müssen wir uns nach anderen Methoden umsehen, um mit Panzern umzugehen."
  BUL_interventionism_desc:0 "Es ist an der Zeit, die Welt sicherer zu machen. Nachdem wir sie in der Vergangenheit so oft geschlagen haben, haben wir nun die Chance, uns zu rehabilitieren."

  BUL_vrazhdebna_airfield_desc:0 "Unsere Luftwaffe braucht einen Flugplatz. Dafür müssen wir Land für den Bau eines Flugplatzes bereitstellen. Auf Erlass der Regierung soll dieser errichtet werden."
  BUL_bulgarian_revanchism_desc:0 "Wir müssen auf die Verluste des Ersten Weltkriegs reagieren und Bulgariens Weg zur Größe erneut sichern."
  BUL_demand_dobrudja_desc:0 "Die Dobrudscha gehört uns rechtmäßig, und Rumänien hat sie uns infolge des Ersten Weltkriegs und der Balkankriege zu Unrecht genommen."
  BUL_our_brothers_in_macedonia_desc:0 "Vardar Mazedonien ist rechtmäßig bulgarisch und wir können sie dazu inspirieren, gegen die jugoslawische Regierung zu kämpfen."
  BUL_deal_with_germany_desc:0 "Sie sagen, die Deutschen hätten Pläne, in Jugoslawien einzumarschieren, was uns in die ideale Position versetze, Mazedonien von Deutschland zu erobern."
  BUL_yugoslavia_for_ourselves_desc:0 "Wir werden Jugoslawien nicht teilen, es ist slawisch und sollte mit Bulgarien vereint werden."
  BUL_return_to_the_aegan_desc:0 "Die Ägäis lag früher in unserem Einflussbereich, wir werden sie wieder für Großbulgarien sichern."
  BUL_enemy_of_my_enemy_desc:0 "Die Italiener können uns helfen, Thrakien vor Griechenland zu sichern. Sobald Italien einmarschiert, können wir die Kontrolle über Thrakien fordern und unser ehemaliges Reich Schritt für Schritt wiederherstellen."
  BUL_fleet_of_the_aegan_desc:0 "Um die Kontrolle über das Mittelmeer zu sichern und mehr Kontrolle über das Meer zu haben, muss mit dem Aufbau einer Flotte im Mittelmeer begonnen werden."
  BUL_anti_air_defence_of_sofia_desc:0 "Um potenziell tödliche Bombenangriffe auf die Hauptstadt zu verhindern, müssen wir in Sofia eine Luftabwehr installieren."
  BUL_befriend_turkey_desc:0 "Um uns mit der Entente anzufreunden, sollten wir uns mit der Türkei anfreunden."
  BUL_cut_ties_with_germany_desc:0 "Die Alliierten haben erklärt, sie würden uns helfen, wenn wir unsere Verbindungen zu Deutschland vollständig abbrechen würden. Es ist Zeit für Bulgarien, auf eigenen Beinen zu stehen."
  BUL_protect_bulgaria_desc:0 "Um uns zu verteidigen, sollten wir entlang unserer Grenzen eine Reihe von Festungen errichten. Diese werden uns bei zukünftigen Invasionen helfen."
  BUL_agrarian_utopia_desc:0 "Bulgarien besteht hauptsächlich aus Bauern und Agrariern, und das könnten wir bei unserem Streben nach dem Kommunismus gut nutzen."
  BUL_slavic_confederation_desc:0 "Anstatt uns den Sowjets anzuschließen, könnten wir unseren Einfluss hier auf dem Balkan am besten geltend machen, indem wir uns mit den Nachbarn verbünden und ihnen den richtigen Weg zeigen."
  BUL_macedonian_literary_circle_desc:0 "Die Kommunisten in unserer Regierung haben den angeblichen mazedonischen Literaturzirkel gegründet, um den Mazedoniern zum Fortschritt zu verhelfen. Nun werden wir ihn nutzen, um allgemein voranzukommen."
  BUL_support_urbanisation_desc:0 "Wir haben nicht mehr genügend Platz zum Bauen, wir sollten etwas Platz freimachen."
  BUL_synthetic_experiments_desc:0 "Leider können wir uns beim Handel nicht ewig auf die Außenwelt verlassen, insbesondere im Kriegsfall. Wir sollten versuchen, synthetische Ressourcen herzustellen."
  BUL_better_excavation_equipment_desc:0 "Unsere Aushubgeräte sind veraltet, wir können und sollten sie verbessern!"
  BUL_buy_from_britain_desc:0 "Vielleicht erlauben uns die Briten, Ausrüstung von ihnen und den anderen Verbündeten zu kaufen. Wenn wir von mehr Leuten kaufen können, haben wir Zugang zu mehr Ausrüstung, nicht wahr?"
  BUL_support_macedonian_industry_desc:0 "Unsere mazedonische Marionette braucht Unterstützung bei der Industrialisierung. Wir sollten ihr helfen, und am Ende wird sie uns nützlicher sein."
  BUL_the_macedonian_question_desc:0 "Die Mazedonier sind in Bulgarien im Allgemeinen ein Problem und wir sollten einen Weg finden, das zu lösen."
  BUL_mechanised_effort_desc:0 "Wir sind schon zu lange motorisiert, wir müssen zum nächsten Schritt übergehen: mechanisiert!"
  BUL_local_factories_desc:0 "Wenn wir lokale Produkte herstellen wollen, sollten wir dafür nicht Fabriken haben? Die Regierung könnte einige alte Gebäude räumen und wir könnten dort Fabriken bauen."
  BUL_support_equipment_desc:0 "Die bulgarische Armee braucht Unterstützungsausrüstung! Mit Waffen allein lässt sich das, was auf sie zukommt, nicht gewinnen."
    
  BUL_may_provoke_aggression:0 "§RDies könnte eine mazedonische Aggression provozieren.§!"
