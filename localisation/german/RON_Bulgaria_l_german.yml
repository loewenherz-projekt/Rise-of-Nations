 bulgarians.1.t:0 "Bulgarien will die Dreimächte-Konferenz unterzeichnen!"
 bulgarians.1.d:0 "Bulgarien hat angeboten, den Dreimächtepakt zu unterzeichnen und sich den Achsenmächten anzuschließen, um uns bei unserem Ziel der Weltherrschaft zu unterstützen."
 bulgarians.1.a:0 "Lass sie rein."
 bulgarians.1.b:0 "Wir wollen sie nicht hier haben!"
 bulgarians.2.t:0 "Wir dürfen rein!"
 bulgarians.2.d:0 "Deutschland hat uns den Beitritt zu den Achsenmächten gestattet, und damit haben wir unser Bündnis formalisiert und den Dreimächtepakt unterzeichnet."
 bulgarians.2.a:0 "Hurra!"
 bulgarians.3.t:0 "Sie haben abgelehnt!"
 bulgarians.3.d:0 "Die grausamen Deutschen haben unsere Bitte, sich den Achsenmächten anzuschließen, abgelehnt!"
 bulgarians.3.a:0 "Die Narren!"
 bulgarians.7.t:0 "Der Drama-Aufstand"
 bulgarians.7.d:0 "Als Reaktion auf unseren Bulgarisierungsprozess erhoben sich die Griechen und rebellierten gegen das Land. Viele tapfere Soldaten kamen im Kampf gegen sie ums Leben."
 bulgarians.7.a:0 "Verdammt!"
 bulgarians.9.t:0 "Vertrag mit Bulgarien"
 bulgarians.9.d:0 "Bulgarien hat uns gebeten, es bei der Modernisierung zu unterstützen und ihm bei der Entwicklung von Flugzeugen für die bulgarische Luftwaffe zu helfen. Dies könnte Bulgarien näher an uns heranführen und sich langfristig lohnen."
 bulgarians.9.a:0 "Was ist daran schlimm?"
 bulgarians.9.b:0 "Was?! Nein!"
 bulgarians.10.t:0 "Sie stimmten zu!"
 bulgarians.10.d:0 "Die Italiener haben sich bereit erklärt, uns bei der Modernisierung zu helfen!"
 bulgarians.10.a:0 "Umwerben!"
 bulgarians.11.t:0 "Sie waren nicht einverstanden!"
 bulgarians.11.d:0 "Die Italiener haben unserem Forschungsvertrag nicht zugestimmt! Irgendwann werden wir es ihnen beibringen."
 bulgarians.11.a:0 "Bah, Dreck."
 bulgarians.12.t:0 "Tritt Bulgarien der Komintern bei?"
 bulgarians.12.d:0 "Bulgarien hat den Beitritt zur Komintern beantragt. Das Land ist mittlerweile ein sozialistischer Staat, und es könnte von Vorteil sein, es in unser Bündnis aufzunehmen."
 bulgarians.12.a:0 "Sehr gut"
 bulgarians.12.b:0 "Sie sind allein"
 bulgarians.13.t:0 "Sie haben akzeptiert!"
 bulgarians.13.d:0 "Wir wurden in die Komintern aufgenommen. Gemeinsam steht die sowjetische Bruderschaft stark da!"
 bulgarians.13.a:0 "Endlich!"
 bulgarians.14.t:0 "Sie haben abgelehnt!"
 bulgarians.14.d:0 "Die Mitgliedschaft in der Komintern wurde uns verweigert. Das macht sie nur zu einem Ziel Großbulgariens."
 bulgarians.14.a:0 "Empörend!"
 bulgarians.15.t:0 "Die Balkanföderation"
 bulgarians.15.d:0 "Bulgarien hat uns angeboten, uns mit ihnen einer Fraktion auf Grundlage unserer gemeinsamen Ideologien anzuschließen. Das wäre vielleicht gut, denn es würde beweisen, dass der Balkan tatsächlich vereint werden kann."
 bulgarians.15.a:0 "Scheint fair."
 bulgarians.15.b:0 "Ich glaube nicht."
 bulgarians.16.t:0 "Jugoslawien hat zugestimmt!"
 bulgarians.16.d:0 "Jugoslawien hat unserem Konzept eines vereinten Balkans zugestimmt. Eine kommunistische Gemeinschaft auf dem Balkan ist ohnehin eine großartige Idee, und wer etwas anderes behauptet, ist dumm."
 bulgarians.16.a:0 "Umwerben!"
 bulgarians.17.t:0 "Jugoslawien hat abgelehnt!"
 bulgarians.17.d:0 "Die Jugoslawen haben unsere Idee eines vereinten Balkans abgelehnt! Diese Narren! Wir sollten es ihnen zeigen!"
 bulgarians.17.a:0 "Die Narren!"
 bulgarians.18.t:0 "Bulgarien fordert Thrakien!"
 bulgarians.18.d:0 "Bulgarien fordert sein altes Territorium Thrakien zurück. Obwohl es nach dem Ersten Balkankrieg einst Bulgarien gehörte, ist Thrakien heute eindeutig griechisch! Eine Beschwichtigungspolitik wäre jedoch eine gute Entscheidung."
 bulgarians.18.a:0 "Gib es auf."
 bulgarians.18.b:0 "Thrakien ist griechisch!"
 bulgarians.19.t:0 "Griechenland akzeptiert!"
 bulgarians.19.d:0 "Die Griechen haben unsere Forderungen für Thrakien akzeptiert. Sie müssen erkennen, dass sie im Vergleich zu uns eine unterlegene Macht sind."
 bulgarians.19.a:0 "Gut."
 bulgarians.20.t:0 "Die Griechen lehnten ab!"
 bulgarians.20.d:0 "Die Griechen haben unsere Gebietsforderungen abgelehnt! Wir sollten ihnen zeigen, wer hier die wahre Macht hat!"
 bulgarians.20.a:0 "Das sollten wir tatsächlich."
 bulgarians.24.t:0 "Mazedonischer Aufstand!"
 bulgarians.24.d:0 "Die Mazedonier haben sich gegen uns erhoben! Unser Vorgehen gegen sie war weniger effektiv als erhofft, und nun erheben sie sich gegen uns. Wir haben sie bekämpft, aber es hat uns schwer ersetzbare Arbeitskräfte gekostet. Wir haben jedoch dafür gesorgt, dass so etwas nicht wieder passiert."
 bulgarians.24.a:0 "Narren!"
 bulgarians.25.t:0 "Ein Abkommen vorgeschlagen!"
 bulgarians.25.d:0 "Die Bulgaren haben ein Abkommen vorgeschlagen. Denn die Bulgaren haben sich bisher an die Friedensverträge des Ersten Weltkriegs gehalten. Sie haben sich möglicherweise rehabilitiert und könnten ein nützlicher Verbündeter sein."
 bulgarians.25.a:0 "Alles klar, gut."
 bulgarians.25.b:0 "Was, nein!"
 bulgarians.26.t:0 "Griechenland stimmte zu!"
 bulgarians.26.d:0 "Gute Nachrichten! Die Griechen haben zugestimmt, die Beschränkungen für unser Land aufzuheben. Wir können nun endlich damit beginnen, unser Land auf den bevorstehenden Konflikt vorzubereiten."
 bulgarians.26.a:0 "Sieg!"
 bulgarians.27.t:0 "Die Griechen waren anderer Meinung!"
 bulgarians.27.d:0 "Die offensichtlich desillusionierte griechische Regierung hat unsere Wiederbewaffnung abgelehnt! Wir müssen handeln! Um unser Land vorzubereiten, müssen wir den Friedensvertrag aufkündigen."
 bulgarians.27.a:0 "Dann werden wir das auch tun."
 bulgarians.28.t:0 "Bulgarien fordert Dobrudscha"
 bulgarians.28.d:0 "Bulgarien fordert sein ehemaliges Gebiet Dobrudscha zurück. Nach dem Ersten Balkankrieg gehörte es ihm, verlor es aber nach und nach mit dem Zweiten Balkankrieg. Es wäre vielleicht klug, Bulgarien zu beschwichtigen. Es wäre jedoch gut, wenn wir es vernichten könnten, bevor es zu einer Bedrohung wird."
 bulgarians.28.a:0 "Gib es zurück"
 bulgarians.28.b:0 "Nein, es gehört uns!"
 bulgarians.29.t:0 "Rumänien stimmt zu!"
 bulgarians.29.d:0 "Rumänien hat sich bereit erklärt, uns die Dobrudscha zurückzugeben, das Gebiet, das wir nach den Ereignissen des Ersten Weltkriegs verloren haben. Wir sollten diese Gelegenheit nutzen."
 bulgarians.29.a:0 "Heu!"
 bulgarians.30.t:0 "Rumänien hat abgelehnt!"
 bulgarians.30.d:0 "Die Rumänen haben unsere Forderung nach der Dobrudscha abgelehnt! Wir sollten ihnen beibringen, sich uns nicht zu widersetzen!"
 bulgarians.30.a:0 "Verdammnis!"
 bulgarians.30.b:0 "Fragen Sie die Deutschen"
 bulgarians.30.c:0 "Macht nichts, gib auf"

 bulgarian_news.1.t:0 "Die Bulgaren haben den Dreimächtepakt unterzeichnet!"
 bulgarian_news.1.d:0 "Das bulgarische Außenministerium gab heute die formelle Unterzeichnung des Dreimächtepakts mit dem Deutschen Reich bekannt und bekräftigte damit seine militärischen und wirtschaftlichen Beziehungen. Der Minister erklärte, die Unterzeichnung sei auf die wachsenden Spannungen in der Region zurückzuführen, um die bulgarische Souveränität zu verteidigen. /n/nObwohl dies die offizielle Erklärung sein mag, sehen viele auf der internationalen Bühne darin einen aggressiveren Schritt im Sinne einer revanchistischeren Politik."
 bulgarian_news.1.a:0 "Na dann"
 bulgarian_news.1.b:0 "Heu!"
 bulgarian_news.1.c:0 "Ein Toast auf die Bulgaren!"
 bulgarian_news.2.t:0 "Bulgarien tritt der Komintern bei!"
 bulgarian_news.2.d:0 "Bulgarien ist der Komintern beigetreten und hat beschlossen, seine slawischen Brüder in den möglichen kommenden Konflikten zu unterstützen."
 bulgarian_news.2.a:0 "Fair genug."
 bulgarian_news.2.b:0 "Juhuu!"
 bulgarian_news.2.c:0 "Willkommen, Genossen!"
 bulgarian_news.4.t:0 "Zar Boris III. ist gestorben!"
 bulgarian_news.4.d:0 "Der bulgarische Zar Boris III. ist heute auf tragische Weise an Herzversagen gestorben. Formell hätte Boris‘ Sohn Simeon II. die Herrschaft über das Land übernommen, doch da er noch nicht volljährig war, übernahm Boris‘ Bruder, Fürst Kirill von Preslaw, die Herrschaft über das Land."
 bulgarian_news.4.a:0 "nun ja"
 bulgarian_news.5.t:0 "Zar Boris überlebt mutmaßliches Attentat"
 bulgarian_news.5.d:0 "Den bulgarischen Zeitungen zufolge überlebte Zar Boris ein Attentat, das angeblich von Deutschland geplant worden war, um den Zaren zu stürzen."
 bulgarian_news.5.a:0 "Angeblich? Hm.."
 bulgarian_news.6.t:0 "Beschränkungen für Bulgarien aufgehoben!"
 bulgarian_news.6.d:0 "Die griechische Regierung hat der Wiederbewaffnung des bulgarischen Militärs zugestimmt. Nach dem Ersten Weltkrieg waren die militärischen Anstrengungen und die Produktion Bulgariens eingeschränkt. Bulgarien hat sich jedoch in der Vergangenheit an diese Regeln gehalten, was die Griechen davon überzeugte, dass die Auswirkungen aufgehoben werden sollten."
 bulgarian_news.6.a:0 "Wenn sie es für klug halten ..."
 bulgarian_news.6.b:0 "... Ja, danke.."

 bulgariansenhanced.1.t:0 "Bulgarien fordert deutsche Waffen!"
 bulgariansenhanced.1.d:0 "Bulgarien hat im Rahmen seiner Wiederbewaffnung um unsere Unterstützung gebeten. Die Bulgaren behaupten, die Briten hätten ihnen die ungehinderte Wiederaufrüstung gestattet und begründen dies mit der Instabilität in der Region. Nun bitten sie uns, ihnen zur Unterstützung der Wiederaufrüstung einige tausend Waffen zu schicken. Eine Zustimmung würde unsere Beziehungen zu den Bulgaren verbessern, doch sie könnten uns ebenso gut in den Rücken fallen und sich auf die Seite des Feindes stellen. Wir sollten unsere Optionen sorgfältig abwägen."
 bulgariansenhanced.1.a:0 "Also gut, helfen Sie ihnen."
 bulgariansenhanced.1.b:0 "Sie sind auf sich allein gestellt."
 bulgariansenhanced.2.t:0 "Die Deutschen stimmten zu!"
 bulgariansenhanced.2.d:0 "Die Deutschen haben unserer Bitte um Unterstützung bei der Wiederaufrüstung entsprochen. Wir haben dafür zweitausend Waffen erhalten. Natürlich sollten wir sie dafür entschädigen! Oder wir könnten die Waffen benutzen und sie nie wieder ansehen – es ist eine Lotterie."
 bulgariansenhanced.2.a:0 ".. Ja."
 bulgariansenhanced.3.t:0 "Die Deutschen lehnten ab!"
 bulgariansenhanced.3.d:0 "Die Deutschen haben unsere großzügigste Bitte um Nachschub abgelehnt! Wir haben nur zweitausend Geschütze angefordert, und die können sie definitiv entbehren. Verdammt!"
 bulgariansenhanced.3.a:0 "Was! Dreck!"
 bulgariansenhanced.4.t:0 "Bulgarische Freundschaft?"
 bulgariansenhanced.4.d:0 "Bulgarien hat vorgeschlagen, dass wir mit ihnen einen Freundschaftsvertrag unterzeichnen, der den Titel „Vertrag der ewigen Freundschaft“ tragen soll. Die Bulgaren wollen die Beziehungen zu uns verbessern. Das ist offensichtlich eine Falle, aber es könnte für uns tatsächlich fruchtbar sein, wenn wir mitmachen."
 bulgariansenhanced.4.a:0 "Unterschreiben Sie es!"
 bulgariansenhanced.4.b:0 "Wie wäre es mit … nein."
 bulgariansenhanced.5.t:0 "Jugoslawien hat zugestimmt!"
 bulgariansenhanced.5.d:0 "Die Jugoslawen haben unserem Vertrag der ewigen Freundschaft zugestimmt! Ich nehme an, sie wissen, dass wir tatsächlich ihre Freunde sind! Nun ja, sie denken, wir wären es, aber wir wissen es besser."
 bulgariansenhanced.5.a:0 "Heu!"
 bulgariansenhanced.6.t:0 "Jugoslawien hat abgelehnt!"
 bulgariansenhanced.6.d:0 "Die Jugoslawen haben unseren Vertrag der ewigen Freundschaft abgelehnt! Wie konnten sie nur?! Merken sie denn nicht, dass wir uns geändert haben? Diese Narren! Wir sollten es ihnen beibringen!"
 bulgariansenhanced.6.a:0 "Wie schade."
 bulgariansenhanced.7.t:0 "Georgi Kyoseivanov tritt zurück!"
 bulgariansenhanced.7.d:0 "Der Premierminister tritt zurück! Premierminister Kyoseivanov, der das Land seit 1935 regierte, hat offiziell sein Amt niedergelegt! Jetzt könnten wir einen Nachfolger einsetzen, nämlich Bogdan Filov, einen Verbündeten von Zar Boris persönlich! Oder wir könnten Kyoseivanovs Regierung vollständig auflösen und Boris III. als unseren Führer einsetzen, da er es ja ist. Wir würden eine von Boris persönlich ausgewählte Regierung einsetzen."
 bulgariansenhanced.7.a:0 "Es ist Filov."
 bulgariansenhanced.7.b:0 "Es lebe der Zar!"
 bulgariansenhanced.8.t:0 "Vaterländische Front gestärkt!"
 bulgariansenhanced.8.d:0 "Unser Versuch, die Vaterländische Front zu stärken, hat sich ausgezahlt! Die Vaterländische Front ist gerade zur Mehrheitspartei der Regierung geworden und hat offiziell die Kontrolle übernommen. Zar Boris ist zwar noch an der Macht, hat aber keine direkte Kontrolle mehr. Nun bleibt zu hoffen, dass die Vaterländische Front uns von Deutschland weg und auf die Seite der Sowjetunion führen kann."
 bulgariansenhanced.8.a:0 "Heu!"
 bulgariansenhanced.9.t:0 "Beitritt zum Balkanpakt?"
 bulgariansenhanced.9.d:0 "Bulgarien hat den Beitritt zur Balkanentente als assoziierter Staat beantragt. Das bedeutet, dass wir Bulgarien unsere Hilfe garantieren, falls es Krieg gegen Bulgarien gibt. Natürlich können wir Bulgarien im Falle eines Krieges einfach im Stich lassen, auch wenn uns das unseren Ruf kosten würde. Wir können uns aber auch dazu entschließen, ihnen keine Hilfe zu gewähren, und dann wäre alles in Ordnung."
 bulgariansenhanced.9.a:0 "Heißen Sie sie willkommen!"
 bulgariansenhanced.9.b:0 "Sie sind auf sich allein gestellt."
 bulgariansenhanced.10.t:0 "Sie haben nein gesagt!"
 bulgariansenhanced.10.d:0 "Diese verdammten Rumänen haben unsere Bitte abgelehnt! Wir dürfen nicht in die Balkan-Entente! Das ist zum Verrücktwerden! Wir sollten Rache nehmen und sie erschießen oder so. Das dürfen sie nicht tun."
 bulgariansenhanced.10.a:0 "Was!"
 bulgariansenhanced.11.t:0 "Bulgaren wollen verhandeln!"
 bulgariansenhanced.11.d:0 "Es scheint, als habe die bulgarische Regierung endlich begriffen, dass sie in diesem Krieg auf der Verliererseite steht – und das, muss ich sagen, ziemlich spät. Wir werden dafür natürlich entschädigt. Abgesehen davon ist es nun an uns, über ihr Schicksal zu entscheiden. Entweder verbünden sie sich mit uns gegen die Deutschen und treten der Komintern bei, oder wir überlassen sie der sowjetischen Macht."
 bulgariansenhanced.11.a:0 "Ja, alles klar."
 bulgariansenhanced.11.b:0 "Töten!"
 bulgariansenhanced.12.t:0 "Sie stimmten zu!"
 bulgariansenhanced.12.d:0 "Die Sowjets haben uns in die Komintern aufgenommen! Jetzt kämpfen wir auf der guten Seite und könnten dabei auch etwas gewinnen! Aber jetzt sollten wir uns auf den Kampf gegen Nazi-Deutschland konzentrieren und die Sowjets stolz machen."
 bulgariansenhanced.12.a:0 "Mila Rodino, Bulgarien!"
 bulgariansenhanced.13.t:0 "Die Sowjets lehnten ab"
 bulgariansenhanced.13.d:0 "Die Sowjets haben unser Angebot abgelehnt! Unser Versuch, mit den Sowjets zu überleben, ist gescheitert. Jetzt sollten wir alles tun, um an der Seite der Deutschen zu überleben. Wir sollten sie stolz machen, aber noch wichtiger: unser Land und unser Volk stolz machen."
 bulgariansenhanced.13.a:0 "Verdammnis!"
 bulgariansenhanced.14.t:0 "Bulgarien will die Balkanentente bekräftigen!"
 bulgariansenhanced.14.d:0 "Das derzeitige System der Balkan-Entente scheint außer Gebrauch geraten zu sein. Unsere Verbündeten werden uns im Krieg nicht helfen, wenn wir sie nicht vertraglich binden. Vielleicht ist das sogar eine gute Idee. Andererseits sollten wir, wenn wir uns vom Balkan zurückziehen wollen, es wohl nicht erneut bekräftigen."
 bulgariansenhanced.14.a:0 "Gefunden! Verschicken Sie die Einladungen!"
 bulgariansenhanced.14.b:0 "Nein."
 bulgariansenhanced.15.t:0 "Die Rumänen stimmten zu!"
 bulgariansenhanced.15.d:0 "Die Rumänen haben sich bereit erklärt, die Balkanentente zu bekräftigen. Wir wurden als Ehrenmitglieder eingeladen, und sollte sich Rumänien als unfähig erweisen, das Bündnis weiter zu führen, sollte uns diese Rolle zufallen. Allerdings wurden auch die anderen Mitglieder der Balkanentente eingeladen, die Balkanentente zu bekräftigen. Ihnen ist wahrscheinlich klar, dass das derzeitige System ohnehin völlig kaputt ist, also wird es uns gut gehen."
 bulgariansenhanced.15.a:0 "Oh, hey!"
 bulgariansenhanced.16.t:0 "Die Rumänen hassen uns!"
 bulgariansenhanced.16.d:0 "Okay, vielleicht etwas zu dramatisch. Wahrscheinlich hassen sie uns nicht. Allerdings werden sie die Balkanentente nicht wieder bekräftigen. Man kann wohl davon ausgehen, dass sie sich selbst angreifen wollen. Oder sie hassen uns und die anderen Mitglieder der Balkanentente wirklich. Entweder das eine oder das andere. So oder so, jetzt sind sie zwei."
 bulgariansenhanced.16.a:0 "Zwei davon? Was?"
 bulgariansenhanced.17.t:0 "Das albanische Erbe"
 bulgariansenhanced.17.d:0 "Die Bulgaren haben verlangt, dass wir ihre Marionette werden, da unser Gebiet angeblich zu einem ihrer ehemaligen Reiche gehörte. Natürlich erinnern wir uns an nichts davon. Die Bulgaren sind uns jedoch bei weitem überlegen, und es besteht nur eine geringe Chance, dass wir sie besiegen können, wenn sie uns erobern. Es wäre möglich, ihre Marionette zu werden und unsere Unabhängigkeit zurückzugewinnen. Wenn Sie jedoch treu sind, können Sie das auf jeden Fall ablehnen."
 bulgariansenhanced.17.a:0 "Ja, alles klar, lass uns gehen"
 bulgariansenhanced.17.b:0 "Ich bin treu!"
 bulgariansenhanced.18.t:0 "Sie stimmten zu."
 bulgariansenhanced.18.d:0 "Die Albaner haben erkannt, dass wir Recht haben, und haben uns als ihre legitimen Herrscher anerkannt. Nun sollten wir Albanien friedlich in Großbulgarien integrieren. Das ist nur ein Schritt auf dem Weg zur Wiedererlangung der Größe unserer Nation."
 bulgariansenhanced.18.a:0 "Bam."
 bulgariansenhanced.19.t:0 "Sie haben abgelehnt!"
 bulgariansenhanced.19.d:0 "Die dummen Albaner haben unsere Bitte, unsere Marionette zu werden, abgelehnt! Ist ihnen nicht klar, dass ihr Territorium rechtmäßig uns gehört? Was ist mit ihnen los?! Wir sollten ihr Territorium sofort beschlagnahmen! Sie missachten das bulgarische Großreich!"
 bulgariansenhanced.19.a:0 "Angriff!"
 bulgariansenhanced.20.t:0 "Die Rumänen stimmten zu!"
 bulgariansenhanced.20.d:0 "Die Rumänen haben unserem Antrag auf eine Partnerschaft mit der Balkan-Entente zugestimmt. Sollte jetzt jemand gegen uns in den Krieg ziehen, sollten uns die Rumänen hoffentlich zu Hilfe kommen. Nun sollten wir daraus ein funktionierendes Bündnis zwischen uns, Rumänien und den anderen Mitgliedern der Balkan-Entente entwickeln."
 bulgariansenhanced.20.a:0 "Umwerben!"
 bulgariansenhanced.21.t:0 "Die Bulgaren bitten uns, als Meditierende für die südliche Dobrudscha zu fungieren"
 bulgariansenhanced.21.d:0 "Nach einer Welle des Nationalismus und Revanchismus in Bulgarien wegen der im Ersten Weltkrieg verlorenen Gebiete forderte der bulgarische Botschafter in Deutschland heute eine Lösung der Zukunft der Region. Die Bulgaren behaupten, dass ihnen die Region im Zweiten Balkankrieg geraubt wurde, und die ethnische Mehrheit der Bevölkerung sind Bulgaren."
 bulgariansenhanced.21.a:0 "Wir wissen, was es bedeutet, rechtmäßigen Grund und Boden zu verlieren."
 bulgariansenhanced.21.b:0 "Die Rumänen werden uns als bessere Verbündete dienen."
 bulgariansenhanced.22.t:0 "Die Deutschen fordern die Abtretung der Süddobrudscha"
 bulgariansenhanced.22.d:0 "Es scheint, als hätten die Bulgaren, die zu feige waren, uns allein zu bekämpfen, ihrem ehemaligen Herrn im Ersten Weltkrieg die Stiefel geleckt und versucht, rumänisches Land zu erobern. Obwohl wir die Bulgaren möglicherweise bekämpfen könnten, bleibt die Bedrohung durch eine deutsche Invasion ein anhaltender Faktor."
 bulgariansenhanced.22.a:0 "Warum für die Dobrudscha sterben?"
 bulgariansenhanced.22.b:0 "Wir sterben lieber, als dass wir uns selbst entehren."
 bulgariansenhanced.23.t:0 "Die Deutschen verweigern ihre Hilfe"
 bulgariansenhanced.23.d:0 "Obwohl auch Deutschland unter der Ungerechtigkeit zu leiden hatte, dass ihm im Zuge der Durchsetzung von Verträgen Land gestohlen wurde, weigert es sich, uns bei der rechtmäßigen Rückeroberung unseres Landes zu helfen, und behauptet, es habe nicht die Absicht, das Machtgleichgewicht auf dem Balkan zu stören."
 bulgariansenhanced.23.a:0 "Unsinn. Wenn Sie möchten, dass etwas richtig gemacht wird ..."
 bulgariansenhanced.24.t:0 "Rumänien tritt Dobrudscha ab"
 bulgariansenhanced.24.d:0 "Jubelnde Szenen in ganz Bulgarien und den zurückgewonnenen Ländern, als die Rumänen das Gebiet abtreten, das sie uns gestohlen haben. Wir haben uns mit ihnen auf einen Bevölkerungsaustausch unter deutscher Aufsicht geeinigt. Dies ist der erste Schritt zur Rückkehr in unsere rechtmäßige Position."
 bulgariansenhanced.24.a:0 "Eine Ungerechtigkeit ist beseitigt, weitere werden folgen."
 bulgariansenhanced.25.t:0 "Die Rumänen weigern sich, die südliche Dobrudscha abzutreten."
 bulgariansenhanced.25.d:0 "Trotz des Einflusses der Deutschen und der berechtigten Stellung dieses Gebiets in Bulgarien verweigern uns die niederträchtigen Rumänen und die Preußen erneut unser Recht. Uns fehlen die Worte, aber die Möglichkeiten sind noch lange nicht erschöpft."
 bulgariansenhanced.25.a:0 "Weisen wir die Rumänen in ihre Schranken."
 bulgariansenhanced.26.t:0 "Die Bulgaren schlagen eine Teilung Jugoslawiens vor"
 bulgariansenhanced.26.d:0 "Unsere bulgarischen Freunde auf dem Balkan präsentieren eine Lösung für den künstlichen Staat Jugoslawien. Ein Staat, der aus grausamen Verträgen hervorgegangen ist, und es scheint nur richtig, ihn zu beenden. Sie erklären, dass sie im Falle einer Invasion Jugoslawiens wie 1915 in Mazedonien einmarschieren und die Slawen innerhalb weniger Tage vernichten würden."
 bulgariansenhanced.26.a:0 "Eine weitere Demütigung des Ersten Weltkriegs wurde zunichte gemacht."
 bulgariansenhanced.26.b:0 "Wir teilen Land mit niemandem!"
 bulgariansenhanced.27.t:0 "Die Deutschen akzeptieren die Teilung"
 bulgariansenhanced.27.d:0 "Die Deutschen erkennen den Sinn unseres Plans und erklären sich bereit, bei der Beseitigung des gescheiterten Staates Jugoslawien mitzuhelfen und das zurückzugeben, was uns rechtmäßig zusteht."
 bulgariansenhanced.27.a:0 "Ein Toast auf unsere alten deutschen Verbündeten!"
 bulgariansenhanced.28.t:0 "Die Deutschen lehnen die Teilung ab"
 bulgariansenhanced.28.d:0 "Die Deutschen haben sich geweigert, uns bei der Rückeroberung des von den Serben besetzten bulgarischen Landes zu helfen, als wäre ihr niederer Charakter Gegenstand griechischer Theaterstücke. Wir stehen allein da, so wie damals, als wir vor all den Jahren vom Balkanbund verraten wurden."
 bulgariansenhanced.28.a:0 "Allein, aber nicht schwach."
 bulgariansenhanced.29.t:0 "Das bulgarische Abkommen einhalten?"
 bulgariansenhanced.29.d:0 "Jugoslawien und Mazedonien stehen unter unserer Kontrolle. Sollen wir unsere Vereinbarung mit den Bulgaren einhalten und Mazedonien an sie abtreten oder es für uns behalten?"
 bulgariansenhanced.29.a:0 "Ja, sie werden ein wertvoller Verbündeter sein."
 bulgariansenhanced.29.b:0 "Nein, wir haben andere Pläne."
 bulgariansenhanced.30.t:0 "Die Deutschen kehren Mazedonien zurück"
 bulgariansenhanced.30.d:0 "Um unsere Vereinbarung einzuhalten, übergaben die Deutschen offiziell Teile Mazedoniens an uns. Die Zeremonie wurde von Generalfeldmarschall Gunther von Kluge und dem bulgarischen Feldmarschall Dimitr Ayryanov in Skojpe durchgeführt und signalisierte die Rückgabe der bulgarischen Gebiete in der Region an den Vertrag von San Stefano."
 bulgariansenhanced.30.a:0 "Wir waschen den Vertrag von Neuilly-sur-Seine weg."
 bulgariansenhanced.31.t:0 "Die Deutschen weigern sich, das Abkommen einzuhalten"
 bulgariansenhanced.31.d:0 "Es scheint, dass die Gerüchte über deutsche Missetaten, die von Irland bis Cathay verbreitet wurden, wahr sind. Sie haben sich geweigert, uns das vereinbarte Gebiet zu überlassen, unseren Pakt gebrochen und sich als Verräter entlarvt. Das kann nicht hingenommen werden."
 bulgariansenhanced.31.a:0 "Vielleicht sollten wir über bessere Verbündete nachdenken."
 bulgariansenhanced.32.t:0 "Die Bulgaren schlagen einen Deal vor"
 bulgariansenhanced.32.d:0 "Der bulgarische Botschafter hat der italienischen Regierung heute den Vorschlag unterbreitet, Griechenland unter sich aufzuteilen. Unsere Ambitionen im Mittelmeerraum sind den Bulgaren offenbar klar, und sie fordern die Rückgabe Thrakiens an sie als Unterstützung für unseren Kampf um die Kontrolle der Adria. Wie sollen wir reagieren?"
 bulgariansenhanced.32.a:0 "Wir verfolgen ähnliche Ziele. Und wie schwer kann es sein, in Griechenland einzumarschieren?"
 bulgariansenhanced.32.b:0 "Bulgarien? Du meinst die Provinz Thrakien"
 bulgariansenhanced.33.t:0 "Die Italiener stimmen unserem Vorschlag zu"
 bulgariansenhanced.33.d:0 "Die Italiener haben sich bereit erklärt, uns Thrakien zurückzugeben, sollten sie mit den Griechen in Konflikt geraten, und uns damit das Ägäische Meer zurückzugeben."
 bulgariansenhanced.33.a:0 "Ich bin sicher, dass die Italiener mit den Griechen keine Probleme haben werden."
 bulgariansenhanced.34.t:0 "Die Italiener lehnen uns ab"
 bulgariansenhanced.34.d:0 "Die italienische Regierung hat uns im Stich gelassen, so wie sie die Deutschen und Österreicher im Ersten Weltkrieg verraten hat. Man kann ihnen anscheinend nichts anvertrauen, denn sie haben vor, ganz Griechenland für sich zu beanspruchen."
 bulgariansenhanced.34.a:0 "Dann werden wir daran arbeiten, sie zu untergraben."
 bulgariansenhanced.35.t:0 "Thrakien an Bulgarien geben?"
 bulgariansenhanced.35.d:0 "Griechenland wurde erobert – eine beeindruckende Leistung unserer fähigen und unglaublichen Armee. Nun haben die Bulgaren um die Erlaubnis gebeten, ihre Truppen nach Thrakien zu schicken, um es einzunehmen. Sollen wir den Pakt einhalten?"
 bulgariansenhanced.35.a:0 "Ja, die Ungerechtigkeiten des Ersten Weltkriegs müssen beseitigt werden."
 bulgariansenhanced.35.b:0 "Ich denke, wir werden es behalten."
 bulgariansenhanced.36.t:0 "Die Italiener kehren zurück nach Thrakien"
 bulgariansenhanced.36.d:0 "Heute haben italienische Truppen bei einer großen Zeremonie in Gyumyurdžina, dem ehemaligen Komotini, die griechische Flagge eingeholt und bulgarische Soldaten unsere stolzen Fahnen gehisst. Damit haben sie uns zurück an die Ägäis geführt und uns unser gestohlenes Land zurückgegeben. Der Zar selbst war bei der Gelegenheit anwesend, zusammen mit Teilen der königlichen Familie."
 bulgariansenhanced.36.a:0 "Es ist schön, wieder zurück zu sein."
 bulgariansenhanced.37.t:0 "Die Italiener weigern sich, Thrakien zurückzugeben"
 bulgariansenhanced.37.d:0 "An der Grenze zum italienisch besetzten Griechenland wurden bulgarische Truppen heute von Italienern daran gehindert, nach Thrakien vorzudringen. Obwohl es zwischen beiden Ländern keine bewaffneten Konflikte gibt, bleiben die Spannungen hoch, da die Italiener sich weigern, Thrakien an uns zurückzugeben. Dieser schwere Verrat wird nicht auf die leichte Schulter genommen."
 bulgariansenhanced.37.a:0 "Wir werden uns nicht vor denen verneigen, die einst gegen Afrikaner verloren haben."
 bulgariansenhanced.38.t:0 "Bulgarien fordert Käufe"
 bulgariansenhanced.38.d:0 "Obwohl Bulgarien noch immer durch den Vertrag von Neuilly-sur-Seine eingeschränkt ist, haben die Bulgaren uns gebeten, ihnen Ausrüstung zu verkaufen. Sie sollten sich zwar an den Vertrag halten, wissen aber, dass sie bereits deutsche Ausrüstung importiert haben. Vielleicht sollten wir dies zulassen, um sie aus der Achsenmacht herauszuhalten."
 bulgariansenhanced.38.a:0 "Vereinbart"
 bulgariansenhanced.38.b:0 "Die Bulgaren sind auf sich allein gestellt"
 bulgariansenhanced.39.t:0 "Sie haben ja gesagt!"
 bulgariansenhanced.39.d:0 "Die Briten haben sich bereit erklärt, an uns zu verkaufen. Vielleicht sind sie Idioten, vielleicht auch nicht. So oder so: Lasst uns kaufen!"
 bulgariansenhanced.39.a:0 "Ja!"
 bulgariansenhanced.40.t:0 "Die Briten lehnten ab!"
 bulgariansenhanced.40.d:0 "Die britischen Hunde haben unsere freundliche Bitte, ihre Ausrüstung zu kaufen, abgelehnt! Hmpf, wir werden sie woanders bekommen."
 bulgariansenhanced.40.a:0 "Das ist schade"
