RUS_new_ott_militias_desc:0 "Wir werden die Bürger des Kaukasus mobilisieren, um uns gegen die osmanische Bedrohung zu helfen!"
RUS_new_german_question:0 "Die deutsche Bedrohung"
RUS_new_build_up_poland:0 "Polen stärken"
