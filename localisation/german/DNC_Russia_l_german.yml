RUS_new_japwar_desc:0 "Da uns die Kriegserklärung Japans völlig überrascht hat, müssen wir die Öffentlichkeit mobilisieren, bevor wir Soldaten in den Fernen Osten entsenden können."
RUS_new_def_art_desc:0 "Japan wird mit Sicherheit versuchen, unseren einzigen Warmwasserhafen im Pazifik einzunehmen, also müssen wir ihn um jeden Preis verteidigen!"
RUS_new_def_muk_desc:0 "Wir müssen den japanischen Vormarsch bei Mukden eindämmen, damit sie nicht den Rest der Mandschurei und Wladiwostok bedrohen."
RUS_send_navy_desc:0 "Nach den Angriffen auf Port Arthur sitzt die Pazifikflotte praktisch im Hafen fest. Wir müssen unsere Flotte so schnell wie möglich aus der Ostsee nach Port Arthur schicken, um diese Blockade zu überwinden."
RUS_win_japwar_desc:0 "Da die öffentliche Unterstützung nach unserem Sieg gegen die Japaner rasant zugenommen hat, können wir uns nun den dringend notwendigen Reformen im Inland zuwenden."
RUS_lose_japwar_desc:0 "Wir müssen aus den Fehlern unseres Militärs während des Krieges lernen und das Land stabilisieren, bevor Revolutionäre es auseinanderreißen."
rus_ott_rei:0 "§GDie lokale Miliz wird sich erheben, um die Bedrohung durch die Osmanen zu bekämpfen!§W"!
RUS_new_finway_desc:0 "Die Transsibirische Eisenbahn ist fast fertiggestellt. Wir müssen den letzten Anstoß geben, um alle Regionen unseres glorreichen Reiches miteinander zu verbinden."
RUS_new_dep_desc:0 "Unsere Abhängigkeit von Frankreich hat uns reichlich belohnt. Wir müssen Narren sein, wenn wir diesen unglaublichen Deal mit dem französischen Kaiserreich aufgeben würden."
RUS_new_noagri_desc:0 "„Da sich der Großteil der Welt bereits von der Landwirtschaft abwendet, müssen wir die Industrialisierung vorantreiben, damit wir nicht zurückbleiben.“"!
RUS_french_dependancy_desc:0 "Unsere Wirtschaft ist stark von unseren französischen Verbündeten abhängig. Doch die Öffnung unserer Wirtschaft für Verbündete und Feinde hat uns teuer zu stehen gekommen. Wir müssen nach Möglichkeiten suchen, diesen schrecklichen Deal zu beenden."
RUS_high_iliteracy3:0 "Hohe Analphabetenrate"
RUS_high_iliteracy2:0 "Hohe Analphabetenrate"
RUS_high_iliteracy3_desc:0 "Die Bildungssituation in unserem Reich ist nicht die beste. Ein beträchtlicher Teil unserer Bevölkerung lebt in ländlichen Gebieten und es gibt kaum Schulen. Dies hat zu einer lähmenden Analphabetismusrate geführt."
RUS_SILENT_NIGHT_DESC:0 "Das Russische Reich steht zu Beginn des 20. Jahrhunderts vor zahlreichen Problemen. Analphabetismus, soziale Unruhen und überfüllte Städte sind nur einige der Probleme, die es zu bewältigen gilt. Und angesichts der Lage in Asien, die kurz vor einer Eskalation steht, stellt sich die Frage, ob Russland die Situation ausnutzen und seinen Einflussbereich ausweiten wird oder ob es sich auf seine internen Probleme konzentrieren und sich den größeren Bedrohungen stellen wird."
RUS_new_def_desc:0 "Da der Krieg immer bedrohlicher wird, haben wir uns entschieden, uns aus dem Krieg zurückzuziehen, auch wenn dies unser Prestige einbüßt. Man kann mit Sicherheit sagen, dass die Menschen „nicht glücklich“ sind."!
RUS_new_industry0_desc:0 "Aufgrund unserer Agrargesellschaft ist die russische Wirtschaft in letzter Zeit ins Stocken geraten. Wir müssen versuchen, so schnell wie möglich zu industrialisieren, um nicht von den europäischen Großmächten abgehängt zu werden."
RUS_new_limex_desc:0 "Wenn wir mit den anderen Großmächten mithalten wollen, müssen wir unsere Ressourcen für uns behalten. Wir werden die Zahl der Exporte an Verbündete und Feinde gleichermaßen reduzieren!"
RUS_new_orth_desc:0 "Viele Russen sind Christen, genauer gesagt orthodoxe Christen, doch viele von ihnen kennen ihre Religion nicht. Wir können dieses Problem bekämpfen, indem wir mehr orthodoxe Schulen im ganzen Reich bauen. Dies könnte auch die Analphabetenrate in unserem Land senken."
RUS_new_victory_chi:0 "Sieg in China"
RUS_new_best_army:0 "Bauen Sie die Armee auf"
RUS_new_develop:0 "Erschließen Sie unsere neuen Länder"
