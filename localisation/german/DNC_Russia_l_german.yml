RUS_new_develop_rural_sib:0 "Sibirien entwickeln"
RUS_new_develop_rail:0 "Modernisierung der Schieneninfrastruktur"
RUS_new_develop_rural_desc:0 "Unsere neu gewonnene Popularität wird es uns ermöglichen, einige Pläne zur wirtschaftlichen Entwicklung auf dem Land umzusetzen, um uns weiter von einer Agrarwirtschaft zu entfernen."
RUS_new_develop_rural_cau_desc:0 "Durch die Förderung der Industrialisierung und Urbanisierung im Kaukasus werden unsere Bergbau- und Bohraktivitäten dort modernisiert und wir können unsere südlichen Grenzen sichern."
RUS_new_develop_rural_sib_desc:0 "Durch die Entwicklung Sibiriens können wir die riesigen Ländereien und Ressourcen nutzen, die die Region zu bieten hat."
RUS_new_develop_rail:0 "Um die neu entwickelten Regionen anzubinden, müssen wir eine umfassende Modernisierung unserer Schieneninfrastruktur und unseres Fuhrparks vornehmen."
