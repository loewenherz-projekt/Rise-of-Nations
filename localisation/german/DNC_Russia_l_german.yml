# EVENTS
########### Russia Events Localisation ###########
DNC_Russia.1.t:0 "Erfolgreiche Propagandakampagnen"
DNC_Russia.1.d:0 "Nach den massiven Propagandakampagnen im ganzen Land zeigen Umfragen, dass die Menschen heute mehr Vertrauen und Glauben in Zar Nikolaus haben als je zuvor. Wir müssen diesen großen Sieg feiern!"
DNC_Russia.1.a:0 "Lang lebe der Zar"
DNC_Russia.ott.sit:0 "§RDie Osmanen haben uns den Krieg erklärt.§W"!
DNC_Russia.2.t:0 "Die Osmanen bleiben trotzig"
DNC_Russia.2.d:0 "Das Osmanische Reich hat unsere berechtigten Forderungen abgelehnt und die demokratischen Beziehungen zwischen unseren beiden Ländern sind abgebrochen. Wir müssen schnell handeln, um unsere Ländereien zu sichern."
DNC_Russia.2.a:0 "Für den Zaren!"
DNC_Russia.5.t:0 "Die chinesische Frage"
DNC_Russia.5.d:0 "Da unsere Streitkräfte kampfbereit sind und China mit seinen internen Problemen beschäftigt ist, sollten wir diese Situation vielleicht nutzen, um unseren Einfluss in Asien auszuweiten."
DNC_Russia.5.a:0 "§YNach Peking!§W"!
DNC_Russia.5.b:0 "Nein, wir müssen uns noch vorbereiten."
rus_quick_chi:0 "Die chinesische Bedrohung ist bewältigt"
RUS_brob1:0 "Erste Propagandawelle"
RUS_brob2:0 "Zweite Propagandawelle"
RUS_brob3:0 "Letzte Propagandawelle"
DNC_Russia.6.t:0 "Ein großartiger Sieg!"
DNC_Russia.6.d:0 "Nachdem die japanischen Bodentruppen aus Asien abgezogen sind, haben sie beschlossen, um Frieden zu bitten. Die Verhandlungen laufen bereits. Wir erwarten, dass die Japaner aus Asien vertrieben werden. Lang lebe der Zar!"
DNC_Russia.6.a:0 "Die Armee hat sich bewährt"
DNC_Russia.7.t:0 "Eine schreckliche Niederlage!"
DNC_Russia.7.d:0 "Die japanischen Bodentruppen haben uns zu weit gedrängt. Wir mussten um Frieden bitten, um nicht zu riskieren, dass Wladiwostok zum Kampfgebiet wird. Im ganzen Land sind Proteste ausgebrochen. Wir müssen schnell handeln, bevor es zu einer Revolution kommt."
DNC_Russia.7.a:0 "Oh je!"
DNC_Russia.8.t:0 "Besetzung der Mandschurei"
DNC_Russia.8.d:0 "Von Diplomaten aus Peking ist eine offizielle Waffenstillstandsanfrage eingetroffen. Sie wollen diesen kostspieligen Krieg beenden. Wir haben unsere rechtmäßigen Gebiete in der Mandschurei gefordert, und wie erwartet haben sie akzeptiert, da sie keine andere Wahl haben!"
DNC_Russia.8.a:0 "Es lebe der Zar!"
rus_occ_man:0 "Die russische Besetzung der Mandschurei."
blitz_man:0 " Wir müssen die Mandschurei innerhalb einer bestimmten Frist besetzen, sonst werden wir mit „schweren Konsequenzen“ rechnen müssen."!
DNC_Russia.9.t:0 "Ein kostspieliger Krieg"
DNC_Russia.9.d:0 "Der Krieg wütet nun schon seit fast fünf Monaten, und die Unterstützung der Bevölkerung schwindet. Die Menschen protestieren gegen den Krieg und fordern Frieden mit dem Qing-Reich. Die Moral der Armee ist bereits am Boden, aber nach einer Reihe von Niederlagen haben wir beschlossen, uns ein für alle Mal zurückzuziehen!"
DNC_Russia.9.a:0 "Für die Menschen"
DNC_Russia.9.b:0 "Nein! Wir stehen kurz vor dem Sieg"
rus_fail_man:0 "Russlands demütigende Niederlage gegen das „YQing-Imperium“"!
DNC_Russia.900.t:0 "Deutschland lehnt unsere Anfrage ab!"
DNC_Russia.900.d:0 "Das Deutsche Reich hat unsere Einladung zur Reform des Dreikaiserbundes aus uns unbekannten Gründen abgelehnt."
DNC_Russia.900.a:0 "Wir werden diese Beleidigung nicht vergessen."
DNC_Russia.901.t:0 "Deutschland nimmt unsere Anfrage an!"
DNC_Russia.901.d:0 "Das Deutsche Reich hat unsere Einladung zur Reform des Dreikaiserbundes angenommen und mit seiner Annahme ist auch Österreich-Ungarn diesem reformierten Bündnis beigetreten."
DNC_Russia.901.a:0 "Es lebe die Liga!"
DNC_Russia.998.t:0 "Gründung der Sozialistischen Revolutionären Partei"
DNC_Russia.998.d:0 "Anfang des Monats wurde die Sozialistische Revolutionäre Partei offiziell gegründet. Obwohl sie derzeit friedlich ist, müssen wir sie im Auge behalten."
DNC_Russia.998.a:0 "Oh je."
