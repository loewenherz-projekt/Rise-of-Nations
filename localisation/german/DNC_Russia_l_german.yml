RUS_HOG_TITLE:0 "Predsedatel&#39; Komiteta Ministrov"
RUS_HOS_TITLE:0 "Zar"
RUS_NICHOLAS_II:0 "Nikolaus II."
RUS_DURNOVO_NAME:0 "Ivan Durnovo"
NICHOLAS_II_LEADER_DESCRIPTION:0 "Nikolaus II., der Kaiser von ganz Russland und allen Russen. Als sechster Zar aus dem Hause Romanow ist Nikolaus&#39; Blutlinie geprägt von Prunk, Prunk und glanzvollen Ehren. Nikolaus regiert seit 1894 nach dem Tod seines Vaters Alexander und hat seine Herrschaft mit unerschütterlicher Hingabe an seine Pflichten und die orthodoxe Kirche begonnen. Als Heiliger und bekannt als Passionsträger, scheint Nikolaus&#39; Verehrung in der Kirche der stärkste einigende Faktor für sein Volk zu sein. Als traditioneller Mann wurde ihm oft eine Verfassung vorgeschlagen und seine absolute Herrschaft oft durchgesetzt. Nikolaus wünscht sich nichts sehnlicher als den Fortbestand eines Großrusslands und ist wild entschlossen, die Dinge in Ordnung zu halten. Er hat wenig Zeit für ausgefallene Angelegenheiten und mehr Zeit für seine Familie und seine Pflichten. Nikolaus hat wenig getan, um über den sprichwörtlichen Rahmen der Regierungsgewalt hinauszugehen. Der Zar ist jedoch von schlechten Vorzeichen geplagt. Während seiner Krönungsfeier wurden über tausend Moskauer Bürger niedergetrampelt, weitere tausend wurden aus Angst vor Nahrungsmittelknappheit verletzt. Selbst auf Reisen nach Westeuropa litt Nikolaus immer wieder unter Kopf- und Zahnschmerzen sowie Krankheiten – offenbar ein Zeichen für schlechte Beziehungen oder etwas noch Unheilvolleres. Bislang konzentriert sich Nikolaus auf die Wirtschaft. Die Transsibirische Eisenbahn ist eines der größten logistischen und industriellen Projekte Russlands bis heute, und die Einführung des Goldstandards im Jahr 1897 war der Beginn einer stabilen russischen Wirtschaft. Bislang ereignislos und wenig inspirierend, scheint Nikolaus&#39; Herrschaft eine ohne Störungen und ohne Verteilungspolitik zu sein. Wären da nicht nur die ständigen schlechten Omen und das Unglück, die seine Herrschaft plagen, könnte alles gut gehen …"
DURNOVO_LEADER_DESCRIPTION:0 "Iwan Nikolajewitsch Durnowo, 16. Vorsitzender des Ministerkomitees, Offizier der russischen kaiserlichen Armee und zweitwichtigste Person in der russischen Bürokratie, wird aufgrund seiner Führungsqualitäten auch „Kalbskopf“ genannt. Zuvor war er Adelsmarschall, Gouverneur von Tschernigow, Gouverneur von Jekaterinoslaw, stellvertretender Innenminister (später Innenminister) und Mitglied der vierten Abteilung der Kanzlei Seiner Kaiserlichen Majestät. Finanzminister Graf Sergei Witte beschreibt ihn als „einen angenehmen Adelsmarschall, einen angenehmen Gouverneur, einen angenehmen stellvertretenden Innenminister. Er ist jedoch keine kultivierte oder intelligente Person, sondern eher in seinen Fähigkeiten beschränkt. Ein gastfreundlicher, höflicher und sehr gerissener Mann.“ Er gewinnt leicht das Vertrauen seiner Vorgesetzten. Trotzdem ist er in der russischen Bevölkerung nicht beliebt. Seine Fähigkeiten sind Gegenstand von Witzen und Spott. Dennoch führte er viele wirtschaftliche und soziale Reformen durch, wie zum Beispiel die Verkürzung der Arbeitszeit. Durnowo war jedoch nicht für seine Innovationen bekannt, sondern vielmehr dafür, die Politik seines Vorgängers zu übernehmen. Hoffen wir, dass er Mütterchen Russland gute Dienste leisten wird."

