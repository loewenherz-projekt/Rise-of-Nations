RUS_new_convert_mil_schools:0 "Ausbau der Forschungslabore an Militärakademien"
RUS_new_demilitarize_desc:0 "Ein jahrelanger Kriegszustand ist nicht tragbar, daher müssen wir demobilisieren, bevor unsere Wirtschaft bankrott geht."
RUS_new_sell_equipment_desc:0 "Der Verkauf unserer überschüssigen Ausrüstung wird unsere leeren Kassen mit dem dringend benötigten Gold füllen."
RUS_new_convert_mils_desc:0 "Da der Krieg vorbei ist, brauchen wir nicht mehr so viele Rüstungsfabriken und können sie für zivile Zwecke umrüsten."
RUS_new_small_army_desc:0 "Durch die Verkleinerung unserer Armee wird nicht nur die Belastung unserer Wirtschaft verringert, sondern wir können auch eine professionellere Armee unterhalten, die besser in der Lage ist, unser Heimatland zu verteidigen."
RUS_new_convert_mil_schools_desc:0 "Die Umleitung von Ressourcen von der Offiziersausbildung zur Forschung wird unseren eigenen technologischen Fortschritt erheblich fördern."
RUS_new_lose_militarize:0 "Das besiegte Militär aufrechterhalten"
RUS_new_foreign_equipment:0 "Kaufen Sie französische Ausrüstung"
RUS_new_foreign_advisors:0 "Ausländische Militärberater hinzuziehen"
RUS_new_foreign_tools:0 "Lizenz für ausländische Werkzeugmaschinen"
RUS_new_improve_mil_schools:0 "Reorganisieren Sie die Militärakademien"
RUS_new_naval_rebuild:0 "Beginnen Sie mit dem Wiederaufbau der Marine"
RUS_new_foreign_advisors_navy:0 "Ausländische Marineberater hinzuziehen"
RUS_new_foreign_license_navy:0 "Lizenz für ausländische Marinetechnologie"
RUS_new_foreign_shipbuilding:0 "Beauftragung ausländischer Schiffbauer"
RUS_new_export_resources:0 "Rohstoffexporte steigern"
RUS_new_export_grain:0 "Getreideexporte steigern"
RUS_new_lose_militarize_desc:0 "Wir brauchen heute mehr denn je ein starkes Militär, um weitere Aggressionsakte anderer Mächte abzuwehren."
RUS_new_foreign_equipment_desc:0 "Wir müssen unsere Armee rasch neu ausrüsten, und der schnellste Weg dazu ist der Kauf ausländischer Waffen."
RUS_new_foreign_advisors_desc:0 "Da unsere eigenen Methoden während des Krieges offensichtlich nicht ausreichten, müssen wir ausländische Experten hinzuziehen, um unsere Armee zu modernisieren."
RUS_new_foreign_tools_desc:0 "Da wir uns noch immer in der Industrialisierung befinden, können wir viel von den Herstellungsprozessen und Maschinen bereits industrialisierter Länder lernen."
RUS_new_improve_mil_schools_desc:0 "Wir müssen die doktrinären Fehler untersuchen, die zu unserer Niederlage geführt haben, und dann den Lehrplan an unseren Akademien verbessern, um unser veraltetes Offizierskorps zu reformieren."
RUS_new_naval_rebuild_desc:0 "Der Krieg hat uns von einer Seemacht ersten Ranges zu einer Seemacht mittleren Ranges degradiert. Das müssen wir so schnell wie möglich korrigieren!"
RUS_new_foreign_advisors_navy_desc:0 "Ausländische Marineberater können uns dabei helfen, die Fehler in der Lehre und im Design zu ermitteln, die zu unseren peinlichen Niederlagen auf See im Fernen Osten geführt haben."
RUS_new_foreign_license_navy_desc:0 "Unsere neuen Schiffe müssen modern sein, und wir müssen uns möglicherweise an ausländische Unternehmen wenden, um unsere eigenen technologischen Defizite im Schiffbau auszugleichen."
RUS_new_foreign_shipbuilding_desc:0 "Durch die Bestellung von Schiffen bei ausländischen Werften können wir unserer Marine wieder ihre Vorkriegsstärke verleihen."
RUS_new_export_resources_desc:0 "Durch die ganze Auslandshilfe für den Wiederaufbau unseres Militärs haben wir ein immenses Handelsdefizit angehäuft, deshalb müssen wir unsere eigenen Exporte steigern, auch wenn dies zum Nachteil unserer eigenen Bürger geht."
RUS_new_export_grain_desc:0 "Durch die ganze Auslandshilfe für den Wiederaufbau unseres Militärs haben wir ein immenses Handelsdefizit angehäuft, deshalb müssen wir unsere eigenen Exporte steigern, auch wenn dies zum Nachteil unserer eigenen Bürger geht."
RUS_new_win_militarize:0 "Bewahren Sie das siegreiche Militär"
RUS_new_win_lesson:0 "Lernen Sie aus unseren Erfolgen"
RUS_new_build_east:0 "Bauen Sie den Fernen Osten auf"
RUS_new_schools_east:0 "Militärakademien im Fernen Osten"
RUS_new_win_militarize_desc:0 "Es besteht für uns keine Notwendigkeit, unsere siegreichen Soldaten zu demobilisieren. Wir sollten stattdessen unsere Armee für einen weiteren Krieg mit einer noch stärkeren Macht aufbauen."
RUS_new_win_lesson_desc:0 "Obwohl wir den Krieg gewonnen haben, hätten einige Veränderungen der militärischen Lage zu einer demütigenden Niederlage führen können. Wir müssen sicherstellen, dass wir nach unserem Sieg nicht selbstgefällig werden."
RUS_new_build_east_desc:0 "Nach der Niederlage Japans verfügen wir nun über wesentlich mehr Spielraum im Fernen Osten und im Pazifik. Wir sollten unsere Infrastruktur und Industrie ausbauen, um unseren Einfluss in ganz Ostasien und im Pazifik auszuweiten."
RUS_new_schools_east_desc:0 "Der Bau von Militärakademien in Port Arthur und Wladiwostok wird dazu beitragen, eine einheimische und loyale Basis von Offizieren, Wissenschaftlern und Ingenieuren aus der Mandschurei und Sibirien aufzubauen."
RUS_new_october_manifesto:0 "Veröffentlichung des Oktober-Manifests"
RUS_new_october_manifesto_desc:0 "Das Oktobermanifest verspricht grundlegende Bürgerrechte und eine konstitutionelle Monarchie. Selbst wenn wir diese Versprechen nicht einhalten, verschafft uns die Veröffentlichung des Manifests Zeit, um zu entscheiden, ob wir Kompromisse eingehen oder die Opposition unterdrücken wollen."
RUS_new_crack_down_revolutionaries:0 "Hartes Vorgehen gegen Revolutionäre"
RUS_new_expand_ohkrana:0 "Erweitern Sie das Ohkrana"
RUS_new_prop_campaign:0 "Starten Sie eine Propagandakampagne"
RUS_new_status_quo_constitution:0 "Status Quo-Verfassung"
RUS_new_crack_down_revolutionaries_desc:0 "Tausende unserer Soldaten kehren nach Hause zurück. Wir können diese Truppen einsetzen, um Revolutionäre und Subversive gewaltsam zu vertreiben."
RUS_new_expand_ohkrana_desc:0 "Die Ohkrana wurde genau für diese Situation geschaffen. Indem wir die Richtlinien lockern und der Organisation noch mehr Geld geben, können wir die unzähligen Oppositionsgruppen, die sich im Zuge der Revolution gebildet haben, heimlich unterdrücken."
RUS_new_prop_campaign_desc:0 "Eine PR-Offensive wird es uns ermöglichen, die Unterstützung für den Zaren zu stärken."
RUS_new_status_quo_constitution_desc:0 "Die Forderung nach einer Verfassung ist zu groß, um sie völlig zu eliminieren. Wenn wir jedoch eine Verfassung entwerfen, die nur geringfügige Zugeständnisse macht, können wir den Status quo aufrechterhalten und alle Elemente der Opposition beschwichtigen, mit Ausnahme der radikalsten."
RUS_new_begin_liberalization:0 "Beginnen Sie mit der Liberalisierung"
RUS_new_limit_ohkrana:0 "Begrenzen Sie das Ohkrana"
RUS_new_reduce_censorship:0 "Pressezensur reduzieren"
RUS_new_liberal_constitution:0 "Eine liberale Verfassung"
RUS_new_begin_liberalization_desc:0 "Indem wir den Revolutionären Zugeständnisse machen und ihre Botschaft öffentlich unterstützen, verschaffen wir uns Zeit und Unterstützung für entschlossenere Maßnahmen."
RUS_new_limit_ohkrana_desc:0 "Den Ohkrana wurde schon zu lange freie Hand gelassen. Wir werden ihre Aktivitäten unterbinden, bevor sie jede Chance auf einen Kompromiss zunichtemachen."
RUS_new_reduce_censorship_desc:0 "Die Lockerung der Beschränkungen für die Presse wird als großmütiger Schritt angesehen und wird viele Zeitungen besänftigen, die zuvor gezwungen waren, unterzutauchen."
RUS_new_liberal_constitution_desc:0 "Wir haben einen Punkt erreicht, an dem eine absolute Monarchie nicht länger haltbar ist. Wenn Russland überleben will, müssen wir Kompromisse mit den Gemäßigten schließen und dem Volk in einer neuen Verfassung eine Vertretung geben, um die Bedrohung durch Revolutionäre abzuwehren."
RUS_new_give_local_autonomy:0 "Gewähren Sie den Provinzen mehr Autonomie"
RUS_new_undermine_independence:0 "Forderungen nach Unabhängigkeit untergraben"
RUS_new_full_independence:0 "Gewähren Sie volle Unabhängigkeit"
RUS_new_partial_independence:0 "Eingeschränkte Selbstverwaltung"
RUS_new_russify:0 "Verstärkte Russifizierungsbemühungen"
RUS_new_give_local_autonomy_desc:0 "Die Unabhängigkeitsbewegungen im Baltikum, in Finnland und Polen haben, angetrieben durch unsere neuen liberalen Reformen, an Stärke gewonnen. Wir sollten diesen Bewegungen entgegenkommen und unsere Einmischung in ihre lokalen Angelegenheiten reduzieren."
RUS_new_undermine_independence_desc:0 "Diese neuen Unabhängigkeitsbewegungen bedrohen die territoriale Integrität des Russischen Reiches. Setzen Sie eine Kombination aus Soldaten, Polizei und der Ohkrana ein, um diese Bewegungen zu unterdrücken!"
RUS_new_full_independence_desc:0 "Wenn wir eine echte RUS-Demokratie sein wollen, müssen wir die Idee der Selbstbestimmung respektieren und unseren Provinzen die Möglichkeit geben, völlig unabhängig zu werden."
RUS_new_partial_independence_desc:0 "Die Unabhängigkeitsbewegungen sind zu groß geworden, um unsere Provinzen einfach im Russischen Reich zu belassen. Wenn wir ihnen jedoch eine begrenzte Selbstverwaltung zugestehen, werden wir immer noch einen enormen Einfluss auf diese neuen Länder haben und nicht riskieren, unseren Einflussbereich zu verkleinern."
RUS_new_russify_desc:0 "Unsere Gebiete sind seit Jahrhunderten russisch und werden es auch bleiben. Wir werden eine Umsiedlungs- und Umerziehungskampagne starten, um die russische Identität der dortigen Bürger zu stärken."
RUS_new_win_parades:0 "Veranstalten Sie Militärparaden"
RUS_new_win_representation:0 "Eingeschränkte Vertretung zulassen"
RUS_new_win_coalition:0 "Verbünde dich mit den Gemäßigten"
RUS_new_win_spending:0 "Neue Ausgabengesetzgebung"
RUS_new_win_integration:0 "Beginnen Sie mit der wirtschaftlichen Integration"
RUS_new_win_parades_desc:0 "Die Vorführung unserer siegreichen Armee in einer Reihe von Militärparaden in ganz Russland wird dazu dienen, die Macht des Imperiums zu demonstrieren und unsere eigene politische Position zu stärken."
RUS_new_win_representation_desc:0 "Durch die Schaffung einer Legislative können wir dazu beitragen, die Forderungen der Revolutionäre zu beschwichtigen, gleichzeitig aber den Großteil unserer Macht behalten."
RUS_new_win_coalition_desc:0 "Zwar verfügt die Legislative selbst nur über begrenzte Machtbefugnisse, doch eine Mehrheitsregierung wird unsere Herrschaft weiter legitimieren. Wenn wir auf die Liberalen und Demokraten zugehen, können wir eine Mehrheit gegen die radikaleren Kommunisten und Ultranationalisten bilden."
RUS_new_win_spending_desc:0 "Wir sollten umfassende Wirtschaftsreformen verabschieden, um den durchschnittlichen russischen Arbeiter zu fördern und die Industrialisierung voranzutreiben."
RUS_new_win_integration_desc:0 "Die Revolutionen haben unsere westlichsten Gebiete in Polen, Finnland und dem Baltikum erschüttert und separatistische Bewegungen aufflammen lassen. Wenn wir in diesen Regionen massiv investieren, können wir viele Revolutionäre beschwichtigen und sie stärker an die russische Wirtschaft binden. So verringern wir die Wahrscheinlichkeit erneuter Unruhen oder Unabhängigkeitsbewegungen."
RUS_new_win_korea:0 "Korea entwickeln"
RUS_new_win_korea_desc:0 "Unser neu erworbenes Protektorat Korea ist von einer veralteten Monarchie und einer vorwiegend agrarisch geprägten Gesellschaft geprägt. Die Industrialisierung Koreas wird das Land enger an uns binden und Ostasien stärker unter unseren wirtschaftlichen Einfluss bringen."
RUS_new_black_sea_forts:0 "Befestigen Sie das Schwarze Meer"
