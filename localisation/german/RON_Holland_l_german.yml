l_german:
#National Focuses
 tdlra_depillarize_the_dutch:0 "Entsäulen Sie die niederländische Gesellschaft"
 tdlra_depillarize_the_dutch_desc:0 "Eine auf Säulen beruhende Gesellschaft können wir in diesen turbulenten Zeiten nicht gebrauchen. Um den niederländischen Staat zu stärken, müssen wir die Gleichheit ausbauen und soziale Barrieren beseitigen."
 tdlra_go_left:0 "Nach links gehen"
 tdlra_go_left_desc:0 "Unser Land wurde viel zu lange von den Bankern und Bonzen dominiert. Wir müssen die Revolution verbreiten!"
 tdlra_go_right:0 "Nach rechts gehen"
 tdlra_go_right_desc:0 "Der Aufstieg des Nationalsozialismus und Faschismus in Deutschland und Italien hat einige in unserem Land dazu inspiriert, dasselbe zu fordern. Vielleicht sollten wir auf sie hören."
 tdlra_dutch_millitarism:0 "Niederländischer Militarismus"
 tdlra_dutch_millitarism_desc:0 "Einst herrschten wir über eines der stolzesten Reiche der Welt. Lasst es uns wieder tun! Zu den Waffen!"
 tdlra_claim_the_benelux:0 "Vereint die Provinzen"
 tdlra_claim_the_benelux_desc:0 "Die belgische Revolution von 1830 war lediglich ein Rückschlag. Es ist Zeit, das zurückzuerobern, was uns gehört!"
 tdlra_jeugdstorm:0 "Junger Sturm"
 tdlra_jeugdstorm_desc:0 "„Wie die Jugend es will, so will die Jugend es wollen!“ Mit der Gründung des Jeugdstorm ist unsere Jugend bestens für die große Zukunft gerüstet, die vor ihr liegt."
 tdlra_colonial_claims:0 "Kolonialansprüche"
 tdlra_colonial_claims_desc:0 "Um die zunehmend schwierigen Zeiten zu überleben, müssen wir das niederländische Reich erweitern und unsere Besitztümer im Fernen Osten festigen."
 tdlra_germany_millitary_coop:0 "Militärische Zusammenarbeit mit Deutschland"
 tdlra_germany_millitary_coop_desc:0 "Mit unserer Bekehrung zur faschistischen Sache boten uns die Deutschen an, uns ihre Kampfmethoden beizubringen, die allen bisher bekannten weit überlegen sind."
 tdlra_propaganda_ministry:0 "Einrichtung eines Propagandaministeriums"
 tdlra_propaganda_ministry_desc:0 "Ein Staat ist nur so stark wie seine Propagandamaschine. Die Einrichtung eines offiziellen Propagandaministeriums wird die wahre Botschaft des niederländischen Staates verstärken."
 tdlra_for_the_motherland:0 "Für das Vaterland"
 tdlra_for_the_motherland_desc:0 "Für nationalen Ruhm ist individuelles Leid erforderlich. Wir werden auf dem kollektiven Rücken der Arbeiter ein neues Niederlande aufbauen."
 tdlra_sign_pact_with_soviets:0 "Unterzeichnen Sie einen Pakt mit den Sowjets"
 tdlra_sign_pact_with_soviets_desc:0 "Unsere größte Bedrohung geht von Nazi-Deutschland aus. Die Sowjetunion hat angeboten, unsere Panzertechnologie zu verbessern, um mit den deutschen Panzern konkurrieren zu können. Wir sollten diese Chance unbedingt nutzen!"
 tdlra_technology_sharing:0 "Technologieaustausch"
 tdlra_technology_sharing_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion die Forschung und Entwicklung im Kriegsfall effizienter durchführen."
 tdlra_fortress_netherlands:0 "Verstärkung der Grebbe-Linie"
 tdlra_fortress_netherlands_desc:0 "Die Verteidigung unseres Heimatlandes ist für das Überleben der niederländischen Nation von größter Bedeutung. Der Bau ausgedehnter Befestigungslinien wird einen Eckpfeiler unserer Verteidigung bilden."
 tdlra_urbanize_the_east:0 "Urbanisieren Sie den Osten"
 tdlra_urbanize_the_east_desc:0 "Ostholland hinkt in der Stadtentwicklung dem Westen seit jeher hinterher. Es ist an der Zeit, die niederländische Wirtschaft durch die Urbanisierung der östlichen Provinzen wiederzubeleben."
 tdlra_militarize_the_east:0 "Militarisierung des Ostens"
 tdlra_militarize_the_east_desc:0 "Die Welt steuert immer stärker auf einen Krieg zu – wir brauchen mehr Waffen und Fabriken, um sie herzustellen."
 tdlra_experimental_weaponry:0 "Experimentelle Waffen"
 tdlra_experimental_weaponry_desc:0 "Geniale Erfindungen und radikale technologische Durchbrüche haben es uns ermöglicht, exotischere und effektivere Militärtechnologien zu entwickeln. Wir sollten dies bestmöglich ausnutzen." 
 tdlra_establish_radio_stations:0 "Radiosender verbessern"
 tdlra_establish_radio_stations_desc:0 "Wie die Briten gezeigt haben, sind Funkortungs- und Entfernungsmessstationen für die Landesverteidigung sehr nützlich. Lasst uns unsere eigene Kettenheimat errichten, damit wir die Niederlande effektiver verteidigen können."
 tdlra_establish_state_university:0 "Gründung einer staatlichen Universität"
 tdlra_establish_state_university_desc:0 "Schlachten werden durch Informationen gewonnen. Bessere Informationen bedeuten, dass wir mehr Schlachten gewinnen, und bessere Informationen werden durch überlegene Forschungseinrichtungen bereitgestellt."
 tdlra_invest_in_nuclear_program:0 "Gründung des Kernforschungsinstituts"
 tdlra_invest_in_nuclear_program_desc:0 "Aufbauend auf Albert Einsteins Relativitätstheorien und dem radioaktiven Zerfall von Uran-238 haben wir herausgefunden, dass bei der Atomspaltung enorme Energiemengen freigesetzt werden. Um unser Verständnis der Kernenergie zu vertiefen, müssen wir das Kernforschungsinstitut gründen."
 tdlra_further_nuclear_research:0 "Erweiterung des Kernforschungsinstituts"
 tdlra_further_nuclear_research_desc:0 "Die Experimente des Kernforschungsinstituts haben Früchte getragen. Dank unseres neuen Verständnisses des Atoms können wir die enorme Kraft der Kernspaltung nutzen, um Reaktoren anzutreiben ... und vielleicht sogar Waffen herzustellen."
 tdlra_start_rocket_program:0 "Raketenprogramm starten"
 tdlra_start_rocket_program_desc:0 "Die Raketentechnik ist eine neue Wissenschaft mit vielen Möglichkeiten. Die Erforschung dieser Möglichkeiten für eine militärische Nutzung könnte Früchte tragen."
 tdlra_exploit_the_mines:0 "Erweitern Sie die Koninklijke Hoogovens"
 tdlra_exploit_the_mines_desc:0 "Niederländische Fabriken sollten nicht auf ausländische Materialien angewiesen sein. Durch den Ausbau unserer heimischen Eisenmetallproduktion können wir uns von der Abhängigkeit von ausländischen Importen befreien."
 tdlra_surinam_aluminium:0 "Surinamisches Aluminium"
 tdlra_surinam_aluminium_desc:0 "Suriname ist eine wichtige metallurgische Kolonie für uns. Wir haben kürzlich Bauxitvorkommen entdeckt, aus denen Aluminium gewonnen werden kann. Der Ausbau dieser Minen dürfte sich als nützlich erweisen."
 tdlra_further_industrialize_the_capital:0 "Unsere Hauptstadt weiter industrialisieren"
 tdlra_further_industrialize_the_capital_desc:0 "Es gibt immer Raum für weitere Entwicklungen in unserer glorreichen Hauptstadt und den umliegenden Gebieten. Indem wir uns auf die Entwicklung Amsterdams konzentrieren, zentralisieren wir die industrielle Produktion und können sie möglicherweise besser verteidigen."
 tdlra_urbanize_the_colonies:0 "Urbanisieren Sie die Kolonien"
 tdlra_urbanize_the_colonies_desc:0 "Niederländisch-Indien ist riesig und hat eine ebenso große Bevölkerung. Bisher haben wir die Bevölkerung Ostindiens noch nicht erschlossen – es ist Zeit, das zu ändern."
 tdlra_prepare_the_colonies_for_war:0 "Bereiten Sie die Kolonien auf den Krieg vor"
 tdlra_prepare_the_colonies_for_war_desc:0 "Durch die weitere Erschließung Niederländisch-Indiens kann die Bevölkerung dort mit der Herstellung von Waffen für die niederländischen Kriegsanstrengungen beginnen. Dort sind sie vor der Luftwaffe sicher."
 tdlra_colonial_fortresses:0 "Kolonialfestungen"
 tdlra_colonial_fortresses_desc:0 "Die zunehmende Bedrohung durch Japan und der Krieg in China zwingen uns, uns mit der Verteidigung Niederländisch-Indiens zu befassen. Wir müssen Befestigungen errichten, um unsere Kolonialgebiete vor dem Feind zu schützen."
 tdlra_invest_in_shell:0 "Investieren Sie in Shell"
 tdlra_invest_in_shell_desc:0 "Royal Dutch Shell hat uns gebeten, in Ölexplorationsmissionen in Ostindien zu investieren, um unsere Ölproduktion auszuweiten. Davon profitiert natürlich der Staat."
 tdlra_stay_neutral:0 "Bleiben Sie neutral"
 tdlra_stay_neutral_desc:0 "Warum für die Kriege anderer sterben? Wir blieben im Ersten Weltkrieg neutral, und das hat uns gut getan. Und das wird uns auch weiterhin gut tun."
 tdlra_deterrence:0 "Abschreckung"
 tdlra_deterrence_desc:0 "Die wachsende Bedrohung durch den europäischen Faschismus macht deutlich, dass Neutralitätserklärungen nicht ausreichen. Wir müssen uns bewaffnen, um unseren Status zu verteidigen."
 tdlra_polderen:0 "Polderen Politik"
 tdlra_polderen_desc:0 "Durch Zusammenarbeit können wir sicherstellen, dass unser Land die kommenden turbulenten Zeiten übersteht."
 tdlra_democratic_influence:0 "Demokratischer Einfluss"
 tdlra_democratic_influence_desc:0 "Unser Land ist demokratisch und wir sollten uns nicht von neuen Ideen des Nationalismus oder Kommunismus beeinflussen lassen."
 tdlra_military_expenditure:0 "Militärausgaben"
 tdlra_military_expenditure_desc:0 "Wir müssen unsere Armee modernisieren und brauchen dafür die nötigen Mittel."
 tdlra_lessons_from_wwi:0 "Lehren aus dem Ersten Weltkrieg"
 tdlra_lessons_from_wwi_desc:0 "Indem wir uns ansehen, was im letzten großen Konflikt funktioniert hat und was nicht, sollten wir in der Lage sein, unsere Armeedoktrinen zu modernisieren."
 tdlra_repurpose_vehicles:0 "Fahrzeuge umfunktionieren"
 tdlra_repurpose_vehicles_desc:0 "Durch die Umrüstung ziviler Fahrzeuge für militärische Zwecke können wir unsere Kavallerie modernisieren."
 tdlra_military_research_interest:0 "Militärisches Forschungsinteresse"
 tdlra_military_research_interest_desc:0 "Durch die jüngsten Investitionen in unser Militär wurde auch unsere Forschungskapazität erweitert."
 tdlra_modern_equipment:0 "Moderne Ausstattung"
 tdlra_modern_equipment_desc:0 "Ein guter Anfang ist es, sich anzuschauen, was in der Vergangenheit funktioniert hat und was nicht. Wir müssen uns jedoch auch die moderneren Kriege ansehen und uns von ihnen ein Beispiel nehmen."
 tdlra_mechanized_infantry_investments:0 "Investitionen in mechanisierte Infanterie"
 tdlra_mechanized_infantry_investments_desc:0 "Die Mechanisierung unserer Infanterie ist ein wichtiger nächster Schritt in der neuen Welt der mobilen Kriegsführung."
 tdlra_memories_of_the_past:0 "Erinnerungen an die Vergangenheit"
 tdlra_memories_of_the_past_desc:0 "Die jüngsten Investitionen in unsere Kriegsanstrengungen haben dazu geführt, dass die Menschen mit Stolz auf unsere Militärgeschichte blicken und junge, wehrhafte Männer in Scharen in die Freiwilligenzentren strömen."
 tdlra_prototype_weapons:0 "Prototyp-Waffen"
 tdlra_prototype_weapons_desc:0 "Neuere Waffenprototypen haben sich als recht erfolgreich erwiesen. Wir sollten sie in Produktion nehmen, um unser Heimatland zu verteidigen." 
 tdlra_modernize_tanks:0 "Panzer modernisieren"
 tdlra_modernize_tanks_desc:0 "Unsere Panzer sind alt oder nicht vorhanden, wir sollten nach neuen modernen Panzertypen forschen."
 tdlra_daring_paratroopers:0 "Wagemutige Fallschirmjäger"
 tdlra_daring_paratroopers_desc:0 "Die jüngsten Militärausgaben und das erneute Interesse an der Luftkriegsführung haben die Bevölkerung und das militärische Oberkommando dazu veranlasst, eine spezielle &quot;Fallschirmjäger&quot;-Division zu fordern"
 tdlra_invest_in_fokker:0 "Investieren Sie in Fokker"
 tdlra_invest_in_fokker_desc:0 "Durch eine Investition in Anthony Fokkers Unternehmen können wir den Krieg am Himmel besser führen."
 tdlra_fokkers_fighters:0 "Fokker-Jäger"
 tdlra_fokkers_fighters_desc:0 "Anthony Fokker hat zwei Entwicklungspläne vorgelegt – wir sollten unseren Kampfflugzeugen Priorität einräumen!"
 tdlra_fokkers_bombers:0 "Fokker-Bomber"
 tdlra_fokkers_bombers_desc:0 "Anthony Fokker hat zwei Entwicklungspläne vorgelegt – wir sollten unseren Bombern Priorität einräumen!"
 tdlra_aerial_support:0 "Luftgestützte Bodenunterstützung"
 tdlra_aerial_support_desc:0 "Die Erforschung neuer Flugzeuge, die unsere Truppen unterstützen können, wird unseren Truppen im Kampf einen Vorteil verschaffen."
 tdlra_rule_the_sea_through_the_sky:0 "Herrsche durch den Himmel über das Meer"
 tdlra_rule_the_sea_through_the_sky_desc:0 "Beherrsche Holland! Holland beherrscht die Luft über den Meeren. Indem wir unsere Luftgeschwader mit neuen Marinebombern ausstatten, können wir unsere Marine bei ihren Operationen gegen unsere Feinde unterstützen."
 tdlra_further_investments_fokker_company:0 "Erhöhte Investitionen in Fokker"
 tdlra_further_investments_fokker_company_desc:0 "Weitere Investitionen in die Bemühungen von Anthony Fokker werden unsere Fähigkeit, Krieg am Himmel zu führen, erheblich verbessern."
 tdlra_interest_in_rocket_technology:0 "Interesse an Raketen"
 tdlra_interest_in_rocket_technology_desc:0 "Die jüngsten Investitionen in unsere Luftwaffe haben in unserem Land eine Art Raketen-„Wahn“ ausgelöst. Das sollten wir ausnutzen."
 tdlra_the_states_navy:0 "Die US-Marine"
 tdlra_the_states_navy_desc:0 "Die niederländische Marine ist in einem desolaten Zustand. Sie muss erweitert und neu aufgerüstet werden, und jetzt ist der richtige Zeitpunkt dafür!"
 tdlra_submarine_operations:0 "U-Boot-Operationen"
 tdlra_submarine_operations_desc:0 "Wir müssen unsere Marinebemühungen auf eine Streitmacht konzentrieren, die unsere Feinde aushungern kann, indem sie ihre Transportkonvois zerstört."
 tdlra_reinvigorate_naval_prowess_of_old:0 "Beleben Sie die alte Seemacht neu"
 tdlra_reinvigorate_naval_prowess_of_old_desc:0 "Unserer Marine mangelt es sehr, wir müssen sie stark machen und sie zu einer Macht machen, mit der man rechnen muss."
 tdlra_submarine_improvements:0 "U-Boot-Verbesserungen"
 tdlra_submarine_improvements_desc:0 "Um unsere neuen Strategien erfolgreich umsetzen zu können, müssen wir sicherstellen, dass wir über die modernsten U-Boote der Welt verfügen."
 tdlra_expand_the_states_navy:0 "Erweitern Sie die Marine"
 tdlra_expand_the_states_navy_desc:0 "Schlachtschiffe und Flugzeugträger sind der Weg, unser weit verstreutes Reich vor äußeren Bedrohungen zu verteidigen."
 tdlra_dutch_cruisers_and_destroyers:0 "Niederländische Kreuzer und Zerstörer"
 tdlra_dutch_cruisers_and_destroyers_desc:0 "Große Schiffe sind eine Verschwendung wertvoller Ressourcen. Warum sollten wir sie bauen, wenn wir unsere Seewege mit kleineren und schneller produzierenden Schiffen besser verteidigen können?"
 tdlra_dutch_marines:0 "Niederländische Marine"
 tdlra_dutch_marines_desc:0 "Um Inseln einzunehmen, benötigen wir spezielle Marinedivisionen, die bei einer Seeinvasion die größtmögliche Effektivität erzielen."
 tdlra_join_britain_alliance:0 "Schließen Sie sich den Verbündeten an"
 tdlra_join_britain_alliance_desc:0 "In Europa gibt es zwei Fronten: diejenigen, die die Freiheit schützen wollen, und diejenigen, die sie zerstören wollen. Es ist Zeit, auf Großbritannien zuzugehen und die Neutralität aufzugeben. Für die Alliierten!"
 tdlra_benelux_faction:0 "Aus den Benelux-Ländern"
 tdlra_benelux_faction_desc:0 "Wir sollten erneut eine Allianz der Provinzen gründen, um uns gegen äußere Bedrohungen zu verteidigen. Die Benelux-Allianz beginnt jetzt."
 tdlra_invite_bel_lux:0 "Belgien und Luxemburg einladen"
 tdlra_invite_bel_lux_desc:0 "Wir müssen Be und Lux zu BeNeLux hinzufügen."
 tdlra_establish_dutch_komosomol:0 "Algemeen Nederlands Jeugd Verbond"
 tdlra_establish_dutch_komosomol_desc:0 "Der russische Komosomol hat sich bei der Militarisierung und Indoktrinierung seiner Kinder als wirksam erwiesen. Wir sollten uns das zu Herzen nehmen und unsere eigene kommunistische Jugendorganisation gründen."
 tdlra_armed_neutrality:0 "Bewaffnete Neutralität" 
 tdlra_armed_neutrality_desc:0 "Um unsere Neutralität in diesen feindseligen Zeiten zu wahren, müssen wir zeigen, dass wir nicht kampflos untergehen werden."
 tdlra_british_ship_designs:0 "Britische Schiffsentwürfe"
 tdlra_british_ship_designs_desc:0 "Die Briten haben uns einige alte Marinepläne gegeben, damit wir unsere eigenen modernen Zerstörer bauen können."
 tdlra_trick_german_scum:0 "Zeigen Sie unsere Neutralität"
 tdlra_trick_german_scum_desc:0 "Durch den Bau einiger Küstenfestungen werden wir den Deutschen zeigen, dass wir uns gegen jede Bedrohung von außen verteidigen wollen, nicht nur gegen ihre eigene."
 tdlra_benelux_economic_cooperation:0 "Benelux-Zollunion"
 tdlra_benelux_economic_cooperation_desc:0 "Wir sollten als Handelsblock zusammenstehen"
 tdlra_brabant_tungsten:0 "Wolfram in Brabant"
 tdlra_brabant_tungsten_desc:0 "Jüngste Bergbauuntersuchungen haben ergeben, dass unser Land über ein großes Wolframvorkommen verfügt."
 tdlra_ramp_up_arnament_production:0 "Steigerung der Schmuckproduktion"
 tdlra_ramp_up_arnament_production_desc:0 "Wir müssen unsere Fabriken erweitern, wenn wir in dieser neuen Welt überleben wollen!"
 tdlra_expand_royal_steel_mills2:0 "Bau eines neuen Stahlwerks in Brabant"
 tdlra_expand_royal_steel_mills2_desc:0 "Wir müssen unsere wachsenden Bergbauaktivitäten zum Wohle unseres Landes weiter ausbauen!"
 
 #Ideas
 tdlra_pillarized_society:0 "Säulengesellschaft"
 tdlra_pillarized_society_desc:0 "Die Versäulung dominiert die niederländische Politik"
 tdlra_pillarized_society2:0 "Polderen Politik"
 tdlra_pillarized_society2_desc:0 "Während die Versäulung die niederländische Politik noch immer im Griff hat, haben wir ihren Einfluss durch unsere Zusammenarbeit verringert."
 tdlra_union_agreements:0 "Gewerkschaftsvereinbarungen"
 tdlra_union_agreements_desc:0 "Die jüngsten Gespräche der Union führten zu einem zufriedenstellenden Ergebnis"
 tdlra_states_army:0 "Armee der Vereinigten Staaten"
 tdlra_states_army_desc:0 "Geschichten über unsere Armeen aus unserem Goldenen Zeitalter haben Menschen dazu gebracht, sich freiwillig für unsere glorreiche Nation zu melden"
 tdlra_communist_police:0 "Kommunistische Polizei"
 tdlra_communist_police_desc:0 "Diese speziellen Polizeieinheiten gehen gegen den Widerstand unserer neu gewonnenen Bürger vor und machen unsere Truppen kampfbereiter – für das Vaterland!"
 tdlra_aerial_interest:0 "Luftinteresse"
 tdlra_aerial_interest_desc:0 "Mit unserem neuen Fallschirmjägerkorps und erneuten Investitionen in die Firma Fokkers haben wir ein öffentliches Interesse an der Entwicklung der Luftwaffe geweckt."
 tdlra_armed_neutrality_idea:0 "Bewaffnete Neutralität"
 tdlra_armed_neutrality_idea_desc:0 "Obwohl unser Land seine Neutralität erklärt hat, ist eine stehende Armee von größter Bedeutung für den Schutz dieser Neutralität."
 tdlra_british_ship_designs_idea:0 "Britische Schiffsentwürfe"
 tdlra_british_ship_designs_idea_desc:0 "Die Briten haben uns einige ihrer Trägerpläne gegeben, damit wir unsere eigenen Träger effektiver produzieren können"
 tdlra_economic_cooperation_within_benelux:0 "Wirtschaftsinitiative – Niederlande"
 tdlra_economic_cooperation_within_benelux2:0 "Wirtschaftsinitiative – Belgien"
 tdlra_economic_cooperation_within_benelux3:0 "Wirtschaftsinitiative - Luxemburg"
 tdlra_economic_cooperation_within_benelux4:0 "Wirtschaftsinitiative - Benelux"
 tdlra_catholic_schools:0 "Katholische Schulen"
 tdlra_protestant_schools:0 "Evangelische Schulen"
 tdlra_protestant_rejection:0 "Protestantische Ablehnung"
 tdlra_catholic_rejection:0 "Katholische Ablehnung"
 tdlra_female_scientists:0 "Wissenschaftlerinnen"
 tdlra_women_in_the_army:0 "Frauen in der Armee"

 tdlra_andries_cornelis_dirk_de_graeff:0 "Andries Cornelis Dirk De Graeff"
#Events
 tdlra.1.t:0 "[From.GetName] möchte, dass wir den Benelux-Staaten beitreten"
 tdlra.1.d:0 "[From.GetName] möchte ihre Allianz stärken, indem sie uns in sie aufnimmt"
 tdlra.1.a:0 "Akzeptieren"
 tdlra.1.b:0 "Verweigern"
 tdlra.2.t:0 "[From.GetName] lehnt ab"
 tdlra.2.d:0 "[From.GetName] hat unser Allianzangebot leider abgelehnt"
 tdlra.2.a:0 "Wir brauchen sie nicht"
 tdlra.3.t:0 "[From.GetName] Akzeptiert"
 tdlra.3.d:0 "[From.GetName] hat unser Allianzangebot angenommen und ist nun Teil der [Root.GetFactionName]"
 tdlra.3.a:0 "Gute Nachrichten"
 tdlra.4.t:0 "[From.GetName] bietet einen Pakt an"
 tdlra.4.d:0 "Da [From.GetName] erkannte, dass unsere Panzerentwürfe ihren eigenen überlegen sind, schlug er vor, dass wir unsere Entwürfe teilen, damit sie als Bastion des Kommunismus in Westeuropa dienen können."
 tdlra.4.a:0 "Akzeptieren"
 tdlra.4.b:0 "Verweigern"
 tdlra.5.t:0 "[From.GetName] akzeptiert unseren vorgeschlagenen Pakt"
 tdlra.5.d:0 "[From.GetName] ist sich unserer strategischen Bedeutung in der Mitte Westeuropas bewusst und hat uns technologisch überlegene Panzerkonstruktionen zur Verfügung gestellt, damit wir uns gegen äußere Einflüsse verteidigen können."
 tdlra.5.a:0 "Machen Sie sich an die Arbeit mit den neuen Designs"
 tdlra.6.t:0 "[From.GetName] lehnt unseren vorgeschlagenen Pakt ab"
 tdlra.6.d:0 "[From.GetName] hat unseren vorgeschlagenen Pakt zur Verbesserung unserer Panzerfähigkeiten nicht unterzeichnet. Wir müssen das selbst tun!"
 tdlra.6.a:0 "So sei es"
 tdlra.8.t:0 "Niederlande möchte [Root.GetFactionName] beitreten"
 tdlra.8.d:0 "[From.GetName] erkennt, dass die deutsche Aggression möglicherweise nicht eingedämmt werden kann, befürchtet eine bevorstehende Invasion und bittet um unseren Schutz"
 tdlra.8.a:0 "Akzeptieren"
 tdlra.8.b:0 "Verweigern"
 tdlra.9.t:0 "[From.GetName] Akzeptiert"
 tdlra.9.d:0 "Die Briten erkannten, dass die Benelux-Länder für einen Krieg gegen Deutschland strategisch günstig gelegen sind, und beschlossen, ihren Schutz auf unser Land auszudehnen."
 tdlra.9.a:0 "Tolle Neuigkeiten"
 tdlra.10.t:0 "[From.GetName] lehnt ab"
 tdlra.10.d:0 "Offenbar erkennen die Briten die Benelux-Region nicht als wichtig an, da sie uns nicht vor feindlichen Einfällen verteidigen werden."
 tdlra.10.a:0 "Verdammte Briten"
 tdlra.11.t:0 "Starten Sie den Depillarisierungsprozess"
 tdlra.11.d:0 "Wir brauchen in diesen turbulenten Zeiten keine Gesellschaft mit Säulen. Der Beginn des Abbruchs der Säulen ist ein wichtiger Schritt zur Stärkung unseres Staates."
 tdlra.11.a:0 "Starten Sie den Prozess"
 tdlra.12.t:0 "Wirtschaftlicher Vorschlag"
 tdlra.12.d:0 "[Root.GetName] hat vor kurzem neue Wirtschaftsabkommen ausgehandelt, die es uns ermöglichen würden, die Herstellungskosten zu senken"
 tdlra.12.a:0 "Akzeptieren"
 tdlra.12.b:0 "Verweigern"
 tdlra.13.t:0 "[From.GetName] Akzeptiert"
 tdlra.13.d:0 "[From.GetName] hat sich bereit erklärt, mit uns zusammenzuarbeiten, um die Kosten zu senken und uns weiter aufeinander abzustimmen"
 tdlra.13.a:0 "Gut zu hören"
 tdlra.14.t:0 "[From.GetName] lehnt ab"
 tdlra.14.d:0 "Leider hat [From.GetName] unser Angebot abgelehnt, da es „ihre Souveränität negieren“ würde."
 tdlra.14.a:0 "Ein trauriger Tag für die Benelux-Länder"
 tdlra.15.t:0 "Jeder akzeptiert das wirtschaftliche Angebot"
 tdlra.15.d:0 "Die gesamten Benelux-Länder haben unser wirtschaftliches Angebot angenommen, und in Zukunft werden wir nur noch enger zusammenwachsen"
 tdlra.15.a:0 "Tolle Neuigkeiten"
 tdlra.22.t:0 "Depillarisierung starten"
 tdlra.22.d:0 "[From.GetLeader] hat sich in letzter Zeit hartnäckig für die Entsäulenung unserer Gesellschaft eingesetzt. Kürzlich wurde er mit den Worten zitiert: „Die Säulen, in die sich unsere Bürger freiwillig aufgespalten haben, halten uns fest. Indem wir für eine Zukunft kämpfen, in der wir alle zusammenarbeiten, sichern wir unseren Platz in der Welt.“"
 tdlra.22.a:0 "Starten Sie den Prozess"
 tdlra.23.t:0 "Liberale unterstützen unsere Initiative"
 tdlra.23.d:0 "Kürzlich haben Liberale in unserer Regierung ihre Unterstützung für die jüngste Initiative von [From.GetLeader] zum Ausdruck gebracht. Ein prominenter liberaler Politiker hat seine volle Unterstützung für die Initiative und unser Kabinett zum Ausdruck gebracht."
 tdlra.23.a:0 "Tolle Neuigkeiten"
 tdlra.24.t:0 "Protestanten trotzig"
 tdlra.24.d:0 "Die Protestanten haben sich in letzter Zeit als ziemlich schwierig erwiesen, in ein neues Zeitalter zu gelangen, in dem wir alle zusammenarbeiten. Sie fordern, dass wir staatlich finanzierte protestantische Schulen zulassen, sonst werden wir mit heftigen Gegenreaktionen der Protestanten konfrontiert sein."
 tdlra.24.a:0 "Gewähre es"
 tdlra.24.b:0 "Diese Forderung stellt einen klaren Verstoß gegen die Trennung von Kirche und Staat dar."
 tdlra.25.t:0 "Katholiken trotzig"
 tdlra.25.d:0 "Katholiken haben sich in letzter Zeit als ziemlich schwierig erwiesen, in ein neues Zeitalter zu gelangen, in dem wir alle zusammenarbeiten. Sie fordern, dass wir staatlich finanzierte katholische Schulen zulassen, sonst werden wir mit heftigen Gegenreaktionen konfrontiert sein."
 tdlra.25.a:0 "Gewähre es"
 tdlra.25.b:0 "Diese Forderung stellt einen klaren Verstoß gegen die Trennung von Kirche und Staat dar."
 tdlra.26.t:0 "Kommunistische Forderungen"
 tdlra.26.d:0 "Die Kommunisten waren sich uneinig, welche Seite sie bei den jüngsten Bemühungen zur Entsäulenbildung wählen sollten. Sie haben sich bereit erklärt, uns zu unterstützen, wenn wir unsere Gesellschaft gleichberechtigt gestalten und Frauen die gleichen Rechte wie Männern einräumen."
 tdlra.26.a:0 "Frauen in die Armee lassen"
 tdlra.26.b:0 "Erlauben Sie Frauen den Zugang zu unseren Universitäten"
