tdrla.28.t:0 ""
tdrla.28.d:0 "Als der Habsburger Adlige in Tro Nederlands ankam, war die Stimmung angespannt. Die Stadtbewohner, die sich an die harte Herrschaft und die hohen Steuern seiner Vorfahren erinnerten, empfingen ihn mit kalten Blicken und flüsterten unzufrieden. Kinder wurden von ihren Eltern ins Haus gedrängt, und Ladenbesitzer schlossen ihre Türen und weigerten sich, ihn zu bedienen. Der Habsburger, in sein feines Gewand gekleidet, spürte die Last ihres kollektiven Grolls. Er versuchte, mit einigen Einheimischen ins Gespräch zu kommen, doch sie wandten sich ab, ihre Gesichter waren in eisiges Schweigen versunken. Die Ankunft des Habsburgers markierte den Beginn einer Zeit der Instabilität in den Niederlanden"
