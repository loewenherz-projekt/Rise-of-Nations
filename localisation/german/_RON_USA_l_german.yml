 USA_Age_of_McCarthyism:0 "USA_Zeitalter_des_McCarthyismus"
 USA_Age_of_McCarthyism_desc:0 ""
 USA_Leftist_I:0 "Die FED abschaffen"
 USA_Leftist_I_desc:0 "Wir werden die Federal Reserve verstaatlichen und damit diesem Wesen von Jekyll Island ein Ende bereiten. Die Geldpolitik dieses Landes wird nicht länger von einer Banker-Clique bestimmt, sondern direkt von vom Volk gewählten Vertretern."
 USA_Leftist_II:0 "Eine zweite Bill of Rights"
 USA_Leftist_II_desc:0 "Wir werden eine neue Bill of Rights fördern und durchsetzen. Die erste Bill of Rights garantierte zwar politische Rechte, die jedoch nicht ausreichten, um das Streben nach Glück in der modernen Zeit zu gewährleisten. Wir müssen daher eine Reihe neuer Verfassungszusätze verabschieden, die grundlegende wirtschaftliche Rechte garantieren."
