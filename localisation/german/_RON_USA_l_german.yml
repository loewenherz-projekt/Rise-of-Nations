### DNC Focus Tree

USADNC_retake_lost_teritory:0 "Erobern Sie verlorenes Territorium zurück"
USADNC_retake_lost_teritory_desc:0 "Wir müssen unsere früheren Grenzen zurückgewinnen!"
USADNC_talks_with_germany:0 "Gespräche mit Deutschland"
USADNC_talks_with_germany_desc:0 "Wir müssen mit deutschen Beratern über einen möglichen Beitritt zum Doppelbündnis oder die Ausarbeitung eines Handelsabkommens sprechen."
USADNC_the_seymour_expedition:0 "Die Seymour-Expedition"
USADNC_the_seymour_expedition_desc:0 "Bei der Seymour-Expedition handelt es sich um eine multinationale Militärtruppe mit dem Ziel, in Peking einzumarschieren."
USADNC_send_the_treaty_to_britian:0 "Senden Sie den Vertrag an Großbritannien"
USADNC_send_the_treaty_to_britian_desc:0 "Wir müssen den Vertrag zur Ratifizierung an das Vereinigte Königreich weiterleiten und endlich mit dem Bau des Panamakanals beginnen."
USADNC_public_railroads:0 "Öffentliche Eisenbahnen"
USADNC_public_railroads_desc:0 "Wir müssen die Eisenbahngesellschaften loswerden, da sie weiterhin Konzerne bevorzugen. Wir sollten die Eisenbahnen in einen öffentlichen Dienst umwandeln."
USADNC_william_mckinleys_assassination:0 "William McKinley ermordet"
USADNC_william_mckinleys_assassination_desc:0 "Die Ermordung von William McKinley war ein Schock für unsere Nation. Was sollen wir als nächstes tun?"
USADNC_the_boxer_rebellion:0 "Der Boxeraufstand"
USADNC_the_boxer_rebellion_desc:0 "China hat uns um Hilfe bei der Niederschlagung der Yihetuan-Bewegung gebeten. Wir müssen entscheiden, ob wir dem Imperium oder den Rebellen weiterhin unsere Unterstützung zeigen."
USADNC_ratify_the_haypauncefote_treaty:0 "Ratifizierung des Hay-Pauncefote-Vertrags"
USADNC_ratify_the_haypauncefote_treaty_desc:0 "Der Hay-Pauncefote-Vertrag ist ein vorläufiger Vertrag, der uns die Erlaubnis erteilt, mit dem Bau des Panamakanals zu beginnen."
USADNC_look_to_our_neighbors:0 "Schauen Sie auf unsere Nachbarn"
USADNC_look_to_our_neighbors_desc:0 "Wir müssen versuchen, gesunde Beziehungen zu unseren Nachbarstaaten aufrechtzuerhalten."
USADNC_implement_a_income_tax:0 "Führen Sie eine Einkommensteuer ein"
USADNC_implement_a_income_tax_desc:0 "Die Einführung einer Einkommensteuer wird sicherlich keine leichte Aufgabe sein, aber sie ist notwendig, damit unser Land vorankommt."
USADNC_end_the_philippines_resistance:0 "Beenden Sie den Widerstand der Philippinen"
USADNC_end_the_philippines_resistance_desc:0 "Wir müssen den Widerstand der Philippinen gegen unsere Herrschaft beenden. Wir haben die Philippinen erfolgreich unterworfen, doch die Widerstandsbewegung ist im Niedergang begriffen. Wir müssen uns mit den Rebellen treffen und mit ihnen über die Bedingungen verhandeln, um ihren Guerillakrieg zu beenden."
USADNC_britan_accepts_the_treaty:0 "Großbritannien akzeptiert den Vertrag"
USADNC_britan_accepts_the_treaty_desc:0 "Mit der Annahme des Vertrags können wir mit den Vorbereitungen für den Bau des Kanals beginnen"
USADNC_star_rebuilding_our_relationship_with_japan:0 "Unsere Beziehung zu Japan"
USADNC_star_rebuilding_our_relationship_with_japan_desc:0 "Japan hat Freiwillige auf die Philippinen geschickt. Unsere Beziehungen stehen kurz vor dem Zerbrechen. Wir müssen versuchen, unsere Beziehungen zu Japan wieder aufzubauen."
USADNC_denounce_benevolent_assimilation:0 "Verurteilen Sie die wohlwollende Assimilation"
USADNC_denounce_benevolent_assimilation_desc:0 "Wir müssen William McKinley dafür verurteilen, dass er diesen Krieg begonnen hat, aber wir werden dennoch an seiner Politik festhalten, um zu versuchen, die Bevölkerung der Philippinen zu beschwichtigen."
USADNC_destruction_of_villages:0 "Zerstörung von Dörfern"
USADNC_destruction_of_villages_desc:0 "Wir müssen die philippinische Kultur zerstören und von Grund auf neu aufbauen."
USADNC_harsh_treatment_to_the_locals:0 "Harte Behandlung der Einheimischen"
USADNC_harsh_treatment_to_the_locals_desc:0 "Die Einheimischen haben uns nur schikaniert. Der Krieg endete aufgrund des anhaltenden Aufstands mit mehr Opfern als nötig. Sie müssen für den Schaden aufkommen."
USADNC_sign_the_usphilippine_economic_recovery_act:0 "Unterzeichnen Sie den US-Philippine Economic Recovery Act"
USADNC_sign_the_usphilippine_economic_recovery_act_desc:0 "Wir müssen uns gegenseitig bei der Zahlung von Kriegsentschädigungen unterstützen, um unsere beiden Nationen wieder in Ordnung zu bringen – sowohl finanziell als auch diplomatisch."
USADNC_philippine_government_act:0 "Philippinisches Regierungsgesetz"
USADNC_philippine_government_act_desc:0 "Mit dem Philippine Government Act wird eine Kolonialregierung auf den Philippinen eingerichtet und der Philippinisch-Amerikanische Krieg beendet."
USADNC_move_troops_out_of_the_philippines:0 "Truppenabzug von den Philippinen"
USADNC_move_troops_out_of_the_philippines_desc:0 "Wir müssen die Besetzung der Philippinen beenden und mit der Wiederherstellung der Beziehungen zu ihnen beginnen."
USADNC_issue_american_currency_to_the_philippines:0 "Geben Sie amerikanische Währung auf den Philippinen aus"
USADNC_issue_american_currency_to_the_philippines_desc:0 "Wir müssen die amerikanische Industrie auf den Philippinen besänftigen, damit sie ihre Wirtschaft wieder aufbaut und ihnen bei der Zivilisierung hilft."
USADNC_encourage_immigration_to_the_philippines:0 "Migration fördern"
USADNC_encourage_immigration_to_the_philippines_desc:0 "Wir müssen mehr Amerikaner auf den Philippinen haben, um die Amerikanisierung der Philippinen voranzutreiben."
USADNC_full_control_over_the_philippines:0 "Volle Kontrolle über die Philippinen"
USADNC_full_control_over_the_philippines_desc:0 "Wir haben diesen Krieg gewonnen. Wir müssen unser rechtmäßiges Territorium zurückerobern."
USADNC_start_the_americanization_of_the_philippines:0 "Beginnen Sie mit der Amerikanisierung"
USADNC_start_the_americanization_of_the_philippines_desc:0 "Wir müssen anfangen, die amerikanische Kultur auf die Philippinen zu bringen. Wir werden anfangen, amerikanisches Geld auszugeben und Englisch als Pflichtsprache einzuführen."
USADNC_oklahoma_enabling_act:0 "Oklahoma-Ermächtigungsgesetz"
USADNC_oklahoma_enabling_act_desc:0 "Das Oklahoma Enabling Act gab dem Oklahoma-Territorium die Befugnis, Delegierte zu wählen."
USADNC_the_sequoyah_constitutional_convention:0 "Der Verfassungskonvent von Sequoyah"
USADNC_the_sequoyah_constitutional_convention_desc:0 "Der Sequoyah Constitutional Convention wird ein Treffen zwischen Amerikanern und Indianern sein, um zu versuchen, dem Indianergebiet die Eigenstaatlichkeit zu sichern."
USADNC_path_to_statehood_for_the_territory_of_oklahoma:0 "Der Weg zur Staatlichkeit Oklahomas"
USADNC_path_to_statehood_for_the_territory_of_oklahoma_desc:0 "Das Oklahoma-Territorium hat sich so weit verwestlicht und modernisiert, dass wir es zu einem offiziellen Staat machen können."
USADNC_limited_governance_over_the_philippines:0 "Eingeschränkte Regierungsführung auf den Philippinen"
USADNC_limited_governance_over_the_philippines_desc:0 "Die Schaffung eines überwachten Staates auf den Philippinen ist der beste Weg."
USADNC_hands_off_treatment_of_the_philippines:0 "Laissez-faire-Behandlung der Philippinen"
USADNC_hands_off_treatment_of_the_philippines_desc:0 "Wir müssen die Philippinen mit einer Laissez-faire-Politik regieren."
USADNC_darft_a_list_of_monopolies:0 "Erstellen Sie eine Liste der Monopole"
USADNC_darft_a_list_of_monopolies_desc:0 "Wir müssen eine Liste der Großunternehmen erstellen, die als zu groß für den Wettbewerb gelten."
USADNC_denounce_imperialism_from_the_european_powers:0 "Den Imperialismus der europäischen Mächte verurteilen"
USADNC_denounce_imperialism_from_the_european_powers_desc:0 "Die europäischen Mächte wollen China nicht helfen, sondern es ausbeuten. Wir müssen die Souveränität unterstützen und die Bemühungen der Boxer anerkennen."
USADNC_pass_chinese_inclusion_act:0 "Verabschiedung des Chinese Inclusion Act"
USADNC_pass_chinese_inclusion_act_desc:0 "Heben Sie den Chinese Exclusion Act auf und erlauben Sie die Einwanderung aus China."
USADNC_isthmian_canal_act:0 "Gesetz über den Isthmian Canal"
isthmian_canal_act:0 "Gesetz über den Isthmian Canal"
USADNC_isthmian_canal_act_desc:0 "Das Kanalgesetz sah die Finanzierung und den Bau des Panamakanals vor. Wir müssen dieses Gesetz verabschieden, um mit dem Bau des Kanals beginnen zu können."
USADNC_full_annexation_of_the_philippines:0 "Vollständige Annexion der Philippinen"
USADNC_full_annexation_of_the_philippines_desc:0 "Wir müssen die Philipper vollständig annektieren und in unser Territorium aufnehmen."
USADNC_promises_philippine_independence_within_a_few_years:0 "Versprechen Sie die Unabhängigkeit der Philippinen"
USADNC_promises_philippine_independence_within_a_few_years_desc:0 "Wir versprechen den Philippinen die Unabhängigkeit – und zwar irgendwann. Allerdings dürfen wir nicht zu voreilig handeln, da dies ihre innere Stabilität gefährden könnte."
USADNC_end_the_occupation_of_the_philippines_imminently:0 "Beenden Sie die Besatzung sofort"
USADNC_end_the_occupation_of_the_philippines_imminently_desc:0 "Die Forderungen nach einem Ende der Besetzung der Philippinen dürfen nicht ungehört verhallen. Wir müssen unseren Truppen den sofortigen Abzug aus den Philippinen befehlen."
USADNC_look_overseas:0 "Blick ins Ausland"
USADNC_look_overseas_desc:0 "Wir müssen im Ausland nach neuen Handelspartnern suchen."
USADNC_send_manpower_to_the_rebels:0 "Schicken Sie den Rebellen Arbeitskräfte"
USADNC_send_manpower_to_the_rebels_desc:0 "Wir müssen ihnen einige unserer Arbeitskräfte schicken, um Öl ins Feuer zu gießen."
USADNC_join_the_entete:0 "Treten Sie der Entente bei"
USADNC_join_the_entete_desc:0 "Frankreich braucht unsere Hilfe. Wir müssen uns bereit erklären, es um jeden Preis zu verteidigen."
USADNC_dissolve_standard_oil:0 "Standardöl auflösen"
USADNC_dissolve_standard_oil_desc:0 "Nach Abschluss des Rechtsstreits müssen wir Standarded Oil in 32 verschiedene Tochtergesellschaften aufteilen."
USADNC_free_trade_agreement_with_mexico:0 "Freihandelsabkommen mit Mexiko"
USADNC_free_trade_agreement_with_mexico_desc:0 "Mexiko ist zwar instabil, verfügt aber über zahlreiche wertvolle Bodenschätze. Ein Freihandelsabkommen wird unsere Beziehungen verbessern."
USADNC_alliance_focus:0 "Allianz-Fokus"
USADNC_alliance_focus_desc:0 "Um unser Land zu erhalten, müssen wir in europäische Angelegenheiten eingreifen."
USADNC_sue_standard_oil:0 "Sue Standard Oil"
USADNC_sue_standard_oil_desc:0 "Wir müssen Standard Oil wegen ihres Monopols über die Ölindustrie drängen."
USADNC_pass_the_hepburn_act:0 "Verabschiedung des Hepburn Act"
USADNC_pass_the_hepburn_act_desc:0 "Dieses Gesetz gab der Interstate Commerce Commission die Befugnis, Höchsttarife für den Eisenbahnverkehr festzulegen und erweiterte ihre Zuständigkeit. Dies verhinderte, dass Eisenbahnunternehmen ihre Favoriten wählten und treuen Spediteuren Freikarten gewährten."
USADNC_pass_the_elkins_antirebate_act:0 "Verabschiedung des Elkins Anti-Rabatt-Gesetzes"
USADNC_pass_the_elkins_antirebate_act_desc:0 "Dieses Gesetz wird den Eisenbahnen die Macht geben, ihre Tarife zu verwalten und es den Eisenbahnunternehmen verbieten, den Versendern Rabatte zu gewähren."
USADNC_bring_communism_to_canada:0 "Bringen Sie den Kommunismus nach Kanada"
USADNC_bring_communism_to_canada_desc:0 "Wir müssen Einfluss auf unsere nördlichen Nachbarn nehmen und ihnen die kommunistischen Ideale vermitteln."
USADNC_open_the_american_economy:0 "Öffnung der amerikanischen Wirtschaft"
USADNC_open_the_american_economy_desc:0 "Wir müssen anfangen, die Ideen eines freien amerikanischen Marktes zu fördern und die Wirtschaft zu öffnen, um vom Isolationismus wegzukommen."
USADNC_rid_all_political_opposition:0 "Politische Opposition beseitigen"
USADNC_rid_all_political_opposition_desc:0 "Wir müssen jegliche Opposition in unserem Land vertreiben und uns auf den Krieg vorbereiten."
USADNC_form_a_communist_defense_pace:0 "Bilden Sie einen kommunistischen Verteidigungspakt"
USADNC_form_a_communist_defense_pace_desc:0 "Wir müssen einen Verteidigungspakt schließen, um den Kommunismus zu schützen."
USADNC_revoke_the_bill_of_rights:0 "Widerrufen Sie die Bill of Rights"
USADNC_revoke_the_bill_of_rights_desc:0 "Die Amerikaner brauchen den Staat nicht, um ihre Rechte zu sichern. Vielmehr sollten die Bürger die Rechte des Staates sichern. Wir müssen die Kontinuität des Staates über die Rechte des Einzelnen stellen."
USADNC_send_more_forces_to_help_out_china:0 "Entsenden Sie mehr Truppen zur Unterstützung Chinas"
USADNC_send_more_forces_to_help_out_china_desc:0 "Wir müssen mehr Truppen entsenden, um China zu helfen und die Rebellen zu besiegen."
USADNC_make_peace_with_the_philippine_republic:0 "Schließen Sie Frieden mit der Republik Philippinen"
USADNC_make_peace_with_the_philippine_republic_desc:0 "Es ist Zeit, mit den Philippinen Schritt zu halten"
USADNC_rid_of_the_moros:0 "Befriedung der Moros"
USADNC_rid_of_the_moros_desc:0 "Die Moro-Bevölkerung bereitet einen Aufstand vor und wir sollten ihn stoppen, bevor er außer Kontrolle gerät."
USADNC_the_philippineamerican_war:0 "Der Philippinisch-Amerikanische Krieg"
USADNC_the_philippineamerican_war_desc:0 "Wir haben die Philippinen besetzt, jetzt müssen wir dem Volk einen Friedensvorschlag unterbreiten."
USADNC_excert_our_influence_over_the_philippines:0 "Einfluss auf die Philippinen"
USADNC_excert_our_influence_over_the_philippines_desc:0 "Wir müssen unseren Einfluss auf die Philippinen geltend machen, indem wir ihre Nation wieder aufbauen und uns gleichzeitig wirtschaftliche Macht über sie verschaffen."
USADNC_put_william_howard_taft_in_charge_of_the_governance_of_the_philippines:0 "Taft als Gouverneur der Philippinen"
USADNC_put_william_howard_taft_in_charge_of_the_governance_of_the_philippines_desc:0 "William Howard Taft ist bereits Kriegsminister und würde die Rolle des Gouverneurs perfekt übernehmen."
USADNC_free_trade_with_the_united_kingdom:0 "Freihandel mit Großbritannien"
USADNC_free_trade_with_the_united_kingdom_desc:0 "Das Vereinigte Königreich hat versucht, die Beziehungen zur Großen Annäherung zu verbessern und hat uns sogar während des Spanisch-Amerikanischen Krieges unterstützt. Wir sollten uns revanchieren und ein Freihandelsabkommen mit dem Vereinigten Königreich unterzeichnen."
USADNC_free_trade_with_germany:0 "Freihandel mit Deutschland"
USADNC_free_trade_with_germany_desc:0 "Obwohl unsere Beziehungen angespannt sind und Venezuela mit einer Besetzung droht, liegt es in unserem besten Interesse, ein Freihandelsabkommen mit Deutschland zu schließen, da das riesige Territorium des Landes reiche nationale Ressourcen beherbergen kann."
USADNC_extend_the_chinese_exclusion_act:0 "Verlängerung des Chinese Exclusion Act"
USADNC_extend_the_chinese_exclusion_act_desc:0 "Das Gesetz soll nun alle chinesischen Einwohner dazu verpflichten, sich zu registrieren und eine Aufenthaltsbescheinigung zu erhalten. Ohne diese Bescheinigung droht ihnen die Abschiebung."
USADNC_free_trade_agreement_with_the_philippines:0 "Freihandelsabkommen mit den Philippinen"
USADNC_free_trade_agreement_with_the_philippines_desc:0 "Wir werden die Philippinen freilassen und sie zwingen, ein Freihandelsabkommen mit uns zu unterzeichnen."
USADNC_calls_for_ending_the_occupation_of_the_philippines:0 "Die Öffentlichkeit fordert ein Ende der Besatzung"
USADNC_calls_for_ending_the_occupation_of_the_philippines_desc:0 "Das amerikanische Volk erkennt den Anspruch der Filipinos auf ihre Heimatinseln an. Forderungen nach einer Befreiung der Inseln sind bereits laut geworden. Selbst überzeugte Kolonialisten geben zu, dass der philippinische Guerillakrieg in der Bevölkerung Kriegsmüdigkeit hervorgerufen hat und eine fortgesetzte Besetzung möglicherweise nicht in unserem besten Interesse liegt."
USADNC_free_trade_aggreements:0 "Freihandelsabkommen"
USADNC_free_trade_aggreements_desc:0 "Wir sollten Freihandelsabkommen mit anderen Nationen schließen, um unsere Beziehungen zu ihnen zu verbessern und leichteren Zugang zu ihren Waren und Dienstleistungen zu erhalten."
USADNC_internal_politics:0 "Innenpolitik"
USADNC_internal_politics_desc:0 "Schalten Sie Schwerpunkte frei, die mit der Innenpolitik zu tun haben."
USADNC_apologize_for_warcrimes:0 "Entschuldigen Sie sich für Kriegsverbrechen"
USADNC_apologize_for_warcrimes_desc:0 "Wir sind mit der Kampagne auf den Philippinen vielleicht etwas zu weit gegangen. Wir haben große Teile der Bevölkerung massakriert und sollten uns offiziell bei der Nation entschuldigen."
USADNC_create_the_panama_canal_commission:0 "Gründung der Panamakanal-Kommission"
USADNC_create_the_panama_canal_commission_desc:0 "Mit der Unterzeichnung des Vertrags und der Annahme unserer Vereinbarung durch das Vereinigte Königreich können wir nun damit beginnen, Arbeiter und Fabriken für das Projekt bereitzustellen."
USADNC_britan_rejects_the_treaty:0 "Großbritannien lehnt den Vertrag ab"
USADNC_britan_rejects_the_treaty_desc:0 "Da Großbritannien den Vertrag ablehnt, wird der Traum von einem verbundenen Süd- und Nordamerika möglicherweise nie Wirklichkeit."
USADNC_free_trade_with_austria__hungry:0 "Freihandel mit Österreich-Ungarn"
USADNC_free_trade_with_austria__hungry_desc:0 "Österreich-Ungarn ist ein Verbündeter des Deutschen Reiches und jeder Freund Deutschlands sollte ein Freund der Vereinigten Staaten sein. Noch ein großes Reich, mit dem wir Freundschaft schließen und ein Handelsabkommen schließen sollten."
USADNC_free_trade_with_france:0 "Freihandel mit Frankreich"
USADNC_free_trade_with_france_desc:0 "Frankreich ist bereits ein Verbündeter der Vereinigten Staaten. Wir sollten unsere Beziehungen weiter ausbauen."
USADNC_teddy_roosevelt_takes_office:0 "Teddy Roosevelt tritt sein Amt an"
USADNC_teddy_roosevelt_takes_office_desc:0 "Vizepräsident Teddy Roosevelt wird nun sein Amt als Präsident der Vereinigten Staaten antreten."
USADNC_the_roosevelt_administration:0 "Die Roosevelt-Regierung"
USADNC_the_roosevelt_administration_desc:0 "Welche Gesetze wird Roosevelt bei seinem Amtsantritt verabschieden?"
USADNC_send_supplies_to_the_nationalists:0 "Versorgen Sie die Nationalisten"
USADNC_send_supplies_to_the_nationalists_desc:0 "Wir müssen die Nationalisten versorgen und den Aufstand finanzieren."
USADNC_the_invasion_of_colombia:0 "Invasion Kolumbiens"
USADNC_the_invasion_of_colombia_desc:0 "Kolumbien hat sich geweigert, Panama seine Unabhängigkeit zu gewähren. Jetzt ist es an der Zeit zu handeln. Wir müssen mit der Invasion Kolumbiens beginnen."
USADNC_setup_the_first_federal_bird_reservation:0 "Erstes Bundesvogelreservat"
USADNC_setup_the_first_federal_bird_reservation_desc:0 "Präsident Theodore Roosevelt wird auf Pelican Island ein Vogelreservat einrichten."
USADNC_fund_the_panama_nationalists:0 "Finanzieren Sie die Nationalisten Panamas"
USADNC_fund_the_panama_nationalists_desc:0 "Unsere Verhandlungen mit Kolumbien über den Erwerb der Panamakanalzone sind gescheitert. Vielleicht können wir Panama im Austausch für das Gebiet zur Unabhängigkeit verhelfen?"
USADNC_guarantee_the_independence_of_panama:0 "Garantie Panama"
USADNC_guarantee_the_independence_of_panama_desc:0 "Indem wir unsere Garantie an Panama weitergeben, können wir Kolumbien davon abhalten, den Aufstand niederzuschlagen."
USADNC_target_standard_oil:0 "Ziel Standardöl"
USADNC_target_standard_oil_desc:0 "Standard Oil ist der einzige große amerikanische Ölkonzern. Wir müssen ihn auflösen, um einen gesunden Wettbewerb zu fördern."
USADNC_sherman_antitrust_act:0 "Sherman Anti-Trust Act"
USADNC_sherman_antitrust_act_desc:0 "Der Sherman Anti-Trust Act war ein Gesetz zur Zerschlagung von Monopolen und brachte Roosevelt den Spitznamen „Trust Buster“ ein."
USADNC_pass_congregational_acts:0 "Verabschiedung von Gemeindegesetzen"
USADNC_pass_congregational_acts_desc:0 "We must pass congregational acts to progress our nation.
USADNC_target_rail_road_companies:0 "Zielbahnunternehmen"
USADNC_target_rail_road_companies_desc:0 "Eisenbahngesellschaften gewähren Gütertransporteuren Rabatte und schränken so den natürlichen Wettbewerb ein."
USADNC_free_trade_agreement_with_canada:0 "Freihandelsabkommen mit Kanada"
USADNC_free_trade_agreement_with_canada_desc:0 "Kanada kann ein Tor zu besseren Beziehungen mit dem Vereinigten Königreich sein."
USADNC_suppress_the_niagara_movement:0 "Unterdrücken Sie die Niagara-Bewegung"
USADNC_suppress_the_niagara_movement_desc:0 "Wir müssen die Bürgerrechtsbewegung in Niagara unterdrücken, da sie ein Hindernis für die richtige amerikanische Kultur darstellt."
USADNC_oklahoma_is_admitted_to_the_union:0 "Oklahoma wurde in die Union aufgenommen"
USADNC_oklahoma_is_admitted_to_the_union_desc:0 "Oklahoma muss endlich die volle Eigenstaatlichkeit erhalten."
USADNC_support_the_niagara_movement:0 "Unterstützen Sie die Niagara-Bewegung"
USADNC_support_the_niagara_movement_desc:0 "Wir müssen die Bürgerrechtsbewegung in Niagara unterstützen."
USADNC_protect_the_revolution_overseas:0 "Schützen Sie die Revolution im Ausland"
USADNC_protect_the_revolution_overseas_desc:0 "Wir müssen die Revolution schützen, indem wir nach Übersee blicken. Vielleicht wäre eine europäische Macht bereit, uns beim Schutz unserer Kommune zu helfen."
USADNC_form_a_north_american_communist_union:0 "Gründen Sie eine nordamerikanische kommunistische Union"
USADNC_form_a_north_american_communist_union_desc:0 "Da die großen Nationen Nordamerikas dem Kommunismus verfallen sind, können wir nun eine Protektoratsdoktrin ausrufen und die amerikanischen Küsten vor den bösen Kapitalisten verteidigen."
USADNC_bring_communism_to_brazil:0 "Bringen Sie den Kommunismus nach Brasilien"
USADNC_bring_communism_to_brazil_desc:0 "Brasilien ist die größte Nation Südamerikas, wir sollten unsere kommunistischen Ideale dort verbreiten."
USADNC_rewrite_the_constitution:0 "Schreiben Sie die Verfassung neu"
USADNC_rewrite_the_constitution_desc:0 "Wir müssen die alte Verfassung verwerfen und sie so umschreiben, dass sie besser zu unserer kommunistischen Sache passt."
USADNC_censor_the_media:0 "Zensur der Medien"
USADNC_censor_the_media_desc:0 "Wir müssen alle negativen Presseberichte über die Kommunistische Partei beseitigen und unseren Einfluss auf unser Land weiter stärken."
USADNC_storm_the_white_house:0 "Sturm auf das Weiße Haus"
USADNC_storm_the_white_house_desc:0 "Wir müssen die Flammen der Revolution verbreiten – ob friedlich oder nicht."
USADNC_promote_the_communist_manifesto:0 "Fördern Sie das Kommunistische Manifest"
USADNC_promote_the_communist_manifesto_desc:0 "Das Kommunistische Manifest war ein hervorragendes literarisches Werk und sollte für unsere Bevölkerung Pflichtlektüre sein."
USADNC_dissolve_monopolies:0 "Monopole auflösen"
USADNC_dissolve_monopolies_desc:0 "Wir müssen diese Unternehmensmonopole auflösen, denn sie nagen mit ihren wettbewerbsschädigenden Praktiken an der Produktivität unserer Nationen."
USADNC_ban_political_parties:0 "Verbot politischer Parteien"
USADNC_ban_political_parties_desc:0 "Wir brauchen keine politischen Parteien. Sie führen zu sinnlosen Meinungsverschiedenheiten und bringen nichts zustande. Wir brauchen den Ku-Klux-Klan an der Spitze Amerikas, um eine gesunde amerikanische Kultur und Moral zu fördern."
USADNC_the_second_american_civil_war:0 "Der Zweite Amerikanische Bürgerkrieg"
USADNC_the_second_american_civil_war_desc:0 "Wir haben die Hauptstadt gestürmt und unsere neue Flagge gehisst, doch es scheint, als ob ein Teil Amerikas nicht damit zufrieden ist, kommunistisch zu werden."
USADNC_independence_for_cuba:0 "Unabhängigkeit für Kuba"
USADNC_independence_for_cuba_desc:0 "Wir müssen die Besetzung Kubas beenden und unser Versprechen einhalten, die militärische Besetzung zu beenden."
USADNC_expand_presidential_powers:0 "Erweitern Sie die Machtbefugnisse des Präsidenten"
USADNC_expand_presidential_powers_desc:0 "Die derzeitigen Befugnisse des Präsidenten sind zu schwach. Wir müssen seine Macht ausweiten und ihm so die Arbeit erleichtern."
USADNC_end_american_neutrality:0 "Beenden Sie die amerikanische Neutralität"
USADNC_end_american_neutrality_desc:0 "Amerika muss nicht länger neutral sein – wir sollten unseren Einfluss auf die Welt ausweiten."
USADNC_fund_the_kkk:0 "Finanzieren Sie den KKK"
USADNC_fund_the_kkk_desc:0 "Wir müssen dem Ku-Klux-Klan Gelder zukommen lassen, da seine Lebensweise äußerst vorteilhaft ist und mit der richtigen amerikanischen Kultur im Einklang steht."
USADNC_revive_the_golden_circle:0 "Beleben Sie den Golden Circle wieder"
USADNC_revive_the_golden_circle_desc:0 "Der Golden Circle – ein Plan der Konföderierten – klingt immer mehr nach einer guten Idee. Wir sollten ihn wiederbeleben."
USADNC_our_rightful_claim_on_mexico:0 "Unser rechtmäßiger Anspruch auf Mexiko"
USADNC_our_rightful_claim_on_mexico_desc:0 "Mexiko wird sich gut in die Union einfügen."
USADNC_revoke_the_monroe_doctrine:0 "Widerrufen Sie die Monroe-Doktrin"
USADNC_revoke_the_monroe_doctrine_desc:0 "Wir brauchen die Monroe-Doktrin nicht mehr. Sie ist ein irrelevantes und veraltetes Dokument."
USADNC_promote_farright_parties:0 "Förderung rechtsextremer Parteien"
USADNC_promote_farright_parties_desc:0 "Wir müssen die Parteien fördern, die die Interessen Amerikas im Auge haben."
USADNC_ideological_focus:0 "Ideologischer Fokus"
USADNC_ideological_focus_desc:0 "Wir müssen unsere Ideologien und den aktuellen Zustand unseres Landes genau unter die Lupe nehmen."
USADNC_the_rightful_ruler:0 "Der rechtmäßige Herrscher"
USADNC_the_rightful_ruler_desc:0 "Amerikas Herrscher sollte ein Mitglied des Klans sein. Da wir bereits viele bedeutende soziale Reformen durchgeführt haben, sollten wir jemanden mit der richtigen Einstellung an die Spitze stellen."
USADNC_a_alternative_victory_in_the_elections:0 "Ein alternativer Wahlsieg"
USADNC_a_alternative_victory_in_the_elections_desc:0 "Was sollte unser Land als nächstes tun, nachdem William McKinley die Wahl verloren hat?"
USADNC_promote_farleft_parties:0 "Förderung linksextremer Parteien"
USADNC_promote_farleft_parties_desc:0 "Wir müssen linksradikale Parteien fördern, denn sie haben das Wohl Amerikas im Sinn."
USADNC_stateenforced_religion:0 "Staatlich erzwungene Religion"
USADNC_stateenforced_religion_desc:0 "Wir müssen in Amerika eine Staatsreligion durchsetzen, da die Schaffung einer angemessenen Moral der Grundwert des KKK ist."
USADNC_put_the_kkk_in_the_government:0 "Positionen des KKK in der Regierung"
USADNC_put_the_kkk_in_the_government_desc:0 "Mitglieder des Klans sollten Posten in der Regierung erhalten. Wir müssen unser Kabinett mit den effektivsten und fleißigsten Mitgliedern des Klans besetzen."
USADNC_fill_up_the_senate_with_klan_members:0 "Ein Senat aus Klan-Mitgliedern"
USADNC_fill_up_the_senate_with_klan_members_desc:0 "Die Gesetze der Vereinigten Staaten sollten von Klan-Mitgliedern diktiert werden und sie sollten die amerikanische Lebensweise kontrollieren und beeinflussen."
USADNC_fill_up_the_house_with_kkk_members:0 "KKK-Mitglieder Das Repräsentantenhaus"
USADNC_fill_up_the_house_with_kkk_members_desc:0 "Das Repräsentantenhaus sollte die Vereinigten Staaten repräsentieren. Mit dem Sieg des Ku-Klux-Klans sollte das Repräsentantenhaus auch diese repräsentieren."
USADNC_encourage_the_personality_cult:0 "Fördern Sie den Personenkult"
USADNC_encourage_the_personality_cult_desc:0 "Der Personenkult um den Ku-Klux-Klan sollte ausgeweitet und im amerikanischen Radio verbreitet werden. Wir werden seine Ideale in ganz Amerika verbreiten."
USADNC_end_free_elections:0 "Beenden Sie freie Wahlen"
USADNC_end_free_elections_desc:0 "Wir brauchen keine Wahlen mehr, da der Klan bereits unsere Lebensweise diktiert. Also können wir die unnötige Praxis des Wählens genauso gut beenden."
USADNC_dawn_of_a_new_decade:0 "Beginn eines neuen Jahrzehnts"
USADNC_dawn_of_a_new_decade_desc:0 "Das vergangene Jahrzehnt ist zu Ende. Mit dem Beginn des neuen Jahrzehnts müssen wir entscheiden, welchen Kurs unsere Nation einschlagen soll."
USADNC_william_mckinleys_administration:0 "William McKinleys Regierung"
USADNC_william_mckinleys_administration_desc:0 "William McKinley hat versprochen, den Freihandel innerhalb Amerikas zu fördern. Wir müssen ihn haben!"
USADNC_persue_the_dream_of_flight:0 "Verfolgen Sie den Traum vom Fliegen"
USADNC_persue_the_dream_of_flight_desc:0 "Amerika sollte das erste Land sein, das in die Lüfte steigt. Wir müssen Geld in die Entwicklung von Flugmaschinen investieren."
USADNC_create_a_us_airforce_department:0 "Bilden Sie die US Air Force"
USADNC_create_a_us_airforce_department_desc:0 "Amerika braucht eine eigene Luftwaffe."
USADNC_a_peaceful_revolution:0 "Eine friedliche Revolution"
USADNC_a_peaceful_revolution_desc:0 "Wir haben die amerikanische Hauptstadt ohne nennenswerten Widerstand gestürmt. Es scheint, als sei Amerika mit der kommunistischen Regierung zufrieden."
USADNC_switch_to_a_socialist_style_of_economy:0 "Umarme den Sozialismus"
USADNC_switch_to_a_socialist_style_of_economy_desc:0 "Der Laissez-faire-Kapitalismus gehört der Vergangenheit an. Wir müssen zu einem moderneren marktsozialistischen Wirtschaftssystem übergehen."
USADNC_spread_communism:0 "Verbreite den Kommunismus"
USADNC_spread_communism_desc:0 "Wir sollten den Kommunismus in anderen Ländern verbreiten und dabei die Monroe-Doktrin wie beabsichtigt anwenden."
USADNC_bring_communism_to_mexico:0 "Bringen Sie den Kommunismus nach Mexiko"
USADNC_bring_communism_to_mexico_desc:0 "Wir müssen den Kommunismus in Mexiko verbreiten und ihn in die Revolution einbringen."
USADNC_secure_our_capital:0 "Sichern Sie sich unser Kapital"
USADNC_secure_our_capital_desc:0 "Wir müssen unsere Hauptstadt befestigen, um den Zutritt demokratischer Kräfte zu verhindern."
USADNC_everyone_must_fight:0 "Jeder muss kämpfen"
USADNC_everyone_must_fight_desc:0 "Wir dürfen niemals aufgeben! Wir müssen weiterkämpfen, egal, was es kostet."
USADNC_victory_in_the_war:0 "Sieg im Krieg"
USADNC_victory_in_the_war_desc:0 "Wir haben den Bürgerkrieg gewonnen! Das wird die Geschichte für die kommenden Jahre verändern!"
USADNC_taxes_not_tariffs:0 "Steuern, keine Zölle"
USADNC_taxes_not_tariffs_desc:0 "Teddy Roosevelt befürwortete einen freien Handel ohne Zölle. Er plante, das Defizit durch die Einführung einer Einkommensteuer zu beseitigen."
USADNC_free_trade_with_japan:0 "Freihandel mit Japan"
USADNC_free_trade_with_japan_desc:0 "Wir haben Japan für die Handelswelt geöffnet. Wir sollten mit ihnen ein Freihandelsabkommen unterzeichnen."
USADNC_free_trade_with_russia:0 "Freihandel mit Russland"
USADNC_free_trade_with_russia_desc:0 "Das Russische Reich pflegt gute Beziehungen zu uns, seit es uns zusätzliches Land in Alaska angeboten hat. Wir sollten ein Freihandelsabkommen mit ihm abschließen."
USADNC_the_panama_agreement:0 "Das Panama-Abkommen"
USADNC_the_panama_agreement_desc:0 "Das Panama-Abkommen wird eine Vereinbarung zwischen uns und Panama zum geheimen Bau des Panamakanals sein."
USADNC_pass_congregational_acts_ii:0 "Verabschiedung der Gemeindegesetze II"
USADNC_pass_congregational_acts_ii_desc:0 "Wir müssen weiterhin relevante Gemeindegesetze verabschieden, um unsere Regierung zu stärken."
USADNC_our_claims_on_central_america:0 "Unsere Ansprüche auf Mittelamerika"
USADNC_our_claims_on_central_america_desc:0 "Mittelamerika gehört rechtmäßig uns! Wir müssen ganz Mittelamerika erobern."
USADNC_cuban_claims:0 "Kubanische Ansprüche"
USADNC_cuban_claims_desc:0 "Übernehmen Sie ganz Kuba und lassen Sie es dem Imperium beitreten."
USADNC_destabilize_central_america:0 "Destabilisierung Mittelamerikas"
USADNC_destabilize_central_america_desc:0 "Wir müssen den Status quo in Mittelamerika umkrempeln, um die Ausbreitung des Kommunismus vorzubereiten."
USADNC_the_kings_act:0 "Der Kings Act"
USADNC_the_kings_act_desc:0 "Wir müssen die entsprechenden Gesetze des Königs verabschieden, um unser Land zu verbessern."
USADNC_join_the_duel_alliance:0 "Treten Sie der Dual Alliance bei"
USADNC_join_the_duel_alliance_desc:0 "Wir werden eine Anfrage an Deutschland senden, sich seinem Bündnis anzuschließen, damit wir uns gegenseitig schützen können."
USADNC_empower_the_president:0 "Ermächtigen Sie den Präsidenten"
USADNC_empower_the_president_desc:0 "Wir müssen dem Präsidenten Macht verleihen und Dinge erledigen!"
USADNC_support_the_monarchy_party:0 "Unterstützen Sie die Monarchy Party"
USADNC_support_the_monarchy_party_desc:0 "Die Monarchy Party ist der Ansicht, dass Amerika eine absolute Monarchie sein sollte. Wir sollten diese Partei unterstützen."
USADNC_revoke_the_15th_amendment:0 "Widerrufen Sie den 15. Zusatzartikel"
USADNC_revoke_the_15th_amendment_desc:0 "Die Menschen in Amerika sollten nicht wählen dürfen. Amerika sollte eine absolute Monarchie sein."
USADNC_add_gorge_washington_to_the_dollar_bill:0 "George Washington auf dem Dollarschein"
USADNC_add_gorge_washington_to_the_dollar_bill_desc:0 "George Washington, der erste Präsident der Vereinigten Staaten, sollte eher als Monarch denn als gewählter Führer in Erinnerung bleiben."
USADNC_add_the_british_monarch_to_the_dollar_bill:0 "Fügen Sie den britischen Monarchen zum Dollarschein hinzu"
USADNC_add_the_british_monarch_to_the_dollar_bill_desc:0 "Wir waren bereits einmal unter der britischen Monarchie. Wir sollten als Untertanen unter dem Thron in das Vereinigte Königreich zurückkehren."
USADNC_a_subject_under_the_king:0 "Ein Untertan des Königs"
USADNC_a_subject_under_the_king_desc:0 "Die Vereinigten Staaten werden ein Untertan der britischen Krone sein. Wir werden die amerikanische Revolution vergessen."
USADNC_on_our_own:0 "Auf eigene Faust"
USADNC_on_our_own_desc:0 "Wir müssen eine Monarchie werden und gleichzeitig die Unabhängigkeit der Union bewahren."
USADNC_support_the_empire:0 "Unterstütze das Imperium"
USADNC_support_the_empire_desc:0 "Das Imperium ist der wahre Inhaber des Mandats des Himmels und des chinesischen Throns."
USADNC_support_the_rebels:0 "Unterstützt die Rebellen"
USADNC_support_the_rebels_desc:0 "Die Rebellen kämpfen für eine gerechte Sache. Wir werden sie unterstützen."
USADNC_send_equipment_to_the_rebels:0 "Senden Sie Ausrüstung an die Rebellen"
USADNC_send_equipment_to_the_rebels_desc:0 "Die Rebellen sind unterversorgt und müssen mit Schwertern und Schilden kämpfen. Wir werden ihnen Waffen und moderne Ausrüstung schicken."
USADNC_stay_democratic:0 "Bleiben Sie demokratisch"
USADNC_stay_democratic_desc:0 "Demokratie ist der Weg nach vorn."
USADNC_formation_of_the_secret_service:0 "Gründung des Geheimdienstes"
USADNC_formation_of_the_secret_service_desc:0 "Der Secret Service oder USSS ist eine Strafverfolgungsbehörde, die zum Schutz der Staatsführung und der finanziellen und kritischen Infrastruktur der Vereinigten Staaten gegründet wurde."
USADNC_immigration_act_of_1907:0 "Einwanderungsgesetz von 1907"
USADNC_immigration_act_of_1907_desc:0 "Dieses Gesetz wurde erlassen, um die japanische Einwanderung einzuschränken. Roosevelt verkündete 1907: „Wahrscheinlich kommt ein sehr großer Teil der Einwanderer, darunter auch die meisten Angehörigen der unerwünschten Klasse, nicht aus eigenem Antrieb hierher, sondern aufgrund der Aktivitäten der Agenten der großen Transportunternehmen, die viele Einwanderer, oft gegen ihr eigenes Interesse, dazu überreden, hierher zu kommen.“"
USADNC_great_britain_friendship_act:0 "Großbritannien-Freundschaftsgesetz"
USADNC_great_britain_friendship_act_desc:0 "Wir müssen dem Vereinigten Königreich ausländische Hilfe anbieten, falls in Europa jemals ein Krieg ausbricht."
USADNC_create_a_embassy_in_the_german_empire:0 "Eine Botschaft im Deutschen Reich"
USADNC_create_a_embassy_in_the_german_empire_desc:0 "Wir werden uns auf die Seite des Deutschen Reiches und Österreich-Ungarns stellen. Wir müssen mit der Wiederherstellung unserer Beziehungen beginnen, indem wir eine Botschaft im Deutschen Reich einrichten."
USADNC_create_a_embassy_in_the_united_kingdom:0 "Eine Botschaft im Vereinigten Königreich"
USADNC_create_a_embassy_in_the_united_kingdom_desc:0 "Wir werden uns auf die Seite Großbritanniens und Frankreichs stellen. Wir müssen mit der Wiederherstellung unserer Beziehungen beginnen, indem wir eine Botschaft im Vereinigten Königreich eröffnen."
USADNC_chose_a_side:0 "Wähle eine Seite"
USADNC_chose_a_side_desc:0 "Europa bereitet sich auf den Krieg vor. Vielleicht sollten wir uns im Konfliktfall für ein Bündnis entscheiden."
USADNC_create_a_embassy_in_austria_hungry:0 "Eine Botschaft in Österreich-Ungarn"
USADNC_create_a_embassy_in_austria_hungry_desc:0 "Wir sollten auch versuchen, die Beziehungen zu Österreich-Ungarn wiederherzustellen, da es ein Verbündeter des Deutschen Reiches ist."
USADNC_german_friendship_act:0 "Deutsches Freundschaftsgesetz"
USADNC_german_friendship_act_desc:0 "Wir müssen Deutschland ausländische Hilfe anbieten, falls in Europa jemals ein Krieg ausbricht."
USADNC_create_a_embassy_in_france:0 "Eine Botschaft in Frankreich"
USADNC_create_a_embassy_in_france_desc:0 "Wir sollten auch versuchen, die Beziehungen zu Frankreich wieder aufzubauen, da es ein Verbündeter des Vereinigten Königreichs ist."
USADNC_pay_the_philippines_depts:0 "Stimmen Sie der Zahlung von Schadensersatz zu"
USADNC_pay_the_philippines_depts_desc:0 "Wir haben auf den Philippinen großen Schaden angerichtet. Angesichts dieses zerstörten Zustands wird es für uns schwierig sein, ihr volles Potenzial auszuschöpfen."
USADNC_fund_communist_uprisings:0 "Finanzieren Sie kommunistische Aufstände"
USADNC_fund_communist_uprisings_desc:0 "Wir müssen kommunistische Aufstände in den gesamten Vereinigten Staaten finanzieren, vielleicht wollen einige Staaten gegen die Union rebellieren"
USADNC_fund_government_aviation_programs:0 "Finanzierung von Luftfahrtprogrammen"
USADNC_fund_government_aviation_programs_desc:0 "Wir müssen staatliche Gelder ausgeben, um schnell ein Flugzeug fertigzustellen."



USA_PHI_War:0 "Philippinisch-Amerikanischer Krieg"
USA_PHI_War_desc:0 "Der Philippinisch-Amerikanische Krieg, auch Philippinisch-Amerikanischer Krieg, Philippinischer Krieg und früher Philippinischer Aufstand oder Tagalog-Aufstand genannt, war ein bewaffneter Konflikt zwischen der Ersten Philippinischen Republik und den Vereinigten Staaten, der vom 4. Februar 1899 bis zum 2. Juli 1902 dauerte. Während philippinische Nationalisten den Konflikt als Fortsetzung des Unabhängigkeitskampfes betrachteten, der 1896 mit der Philippinischen Revolution begonnen hatte, betrachtete die US-Regierung ihn als Aufstand. Der Konflikt entstand, als die Erste Philippinische Republik Einwände gegen die Bedingungen des Vertrags von Paris erhob, unter dem die Vereinigten Staaten die Philippinen von Spanien übernahmen und damit den Spanisch-Amerikanischen Krieg beendeten."
USA_PHI_War2:0 "Philippinisch-Amerikanischer Krieg"
USA_PHI_War2_desc:0 "Der Philippinisch-Amerikanische Krieg, auch Philippinisch-Amerikanischer Krieg, Philippinischer Krieg und früher Philippinischer Aufstand oder Tagalog-Aufstand genannt, war ein bewaffneter Konflikt zwischen der Ersten Philippinischen Republik und den Vereinigten Staaten, der vom 4. Februar 1899 bis zum 2. Juli 1902 dauerte. Während philippinische Nationalisten den Konflikt als Fortsetzung des Unabhängigkeitskampfes betrachteten, der 1896 mit der Philippinischen Revolution begonnen hatte, betrachtete die US-Regierung ihn als Aufstand. Der Konflikt entstand, als die Erste Philippinische Republik Einwände gegen die Bedingungen des Vertrags von Paris erhob, unter dem die Vereinigten Staaten die Philippinen von Spanien übernahmen und damit den Spanisch-Amerikanischen Krieg beendeten."


