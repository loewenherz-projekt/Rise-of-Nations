 usa.302.d:0"Im weiteren Verlauf der Wahlen zum Repräsentantenhaus sind in den gesamten Vereinigten Staaten noch [?states_remaining_house] Sitze zu vergeben. Die Entscheidungen der Wählerschaft werden das Kräfteverhältnis im Kongress prägen. [?HOUSE_party1_seats|+G] Sitze werden voraussichtlich an §bLinkspopulisten/Sozialistische Parteien§!, [?HOUSE_party2_seats|+R] Sitze an die §bRepublikanische Partei§!, [?HOUSE_party3_seats|+B] Sitze an die §bDemokratische Partei§! und [?HOUSE_party4_seats|+b] Sitze an §bRechtspopulisten/Libertäre Parteien§! gehen. Das Erreichen einer Mehrheit von 218 Sitzen bleibt entscheidend für die Einflussnahme auf die zukünftige Gesetzgebungsagenda."
usa.303.d:0"Im weiteren Verlauf der Wahlen zum Repräsentantenhaus sind in den gesamten Vereinigten Staaten noch [?states_remaining_house] Sitze zu vergeben. Die Entscheidungen der Wählerschaft werden das Kräfteverhältnis im Kongress prägen. [?HOUSE_party1_seats|+G] Sitze werden voraussichtlich an §bLinkspopulisten/Sozialistische Parteien§!, [?HOUSE_party2_seats|+R] Sitze an die §bRepublikanische Partei§!, [?HOUSE_party3_seats|+B] Sitze an die §bDemokratische Partei§! und [?HOUSE_party4_seats|+b] Sitze an §bRechtspopulisten/Libertäre Parteien§! gehen. Das Erreichen einer Mehrheit von 218 Sitzen bleibt entscheidend für die Einflussnahme auf die zukünftige Gesetzgebungsagenda."
usa.302.t:0"Laufende Wahl"
usa.303.t:0"Laufende Wahl"
usa.302.a:0"Viel Glück"
usa.303.a:0"Viel Glück"
usa.302.b:0"Ergebnisse ansehen"
house_predection:0 "Im Hinblick auf die bevorstehende Wahl zum Repräsentantenhaus deuten Prognosen darauf hin, dass es in den gesamten Vereinigten Staaten sichere Sitze und Kopf-an-Kopf-Rennen gibt. Diese Prognosen werden das Kräfteverhältnis im Kongress prägen. Zu den prognostizierten sicheren Sitzen zählen §1[?HOUSE_party1_seats|+G] Sitze für Linkspopulisten/Sozialistische Parteien§!, §R[?HOUSE_party2_seats|+R] Sitze für die Republikanische Partei§!, §B[?HOUSE_party3_seats|+B] Sitze für die Demokratische Partei§! und §8[?HOUSE_party4_seats|+O] Sitze für Rechtspopulisten/Libertäre Parteien§!. Derzeit werden die Sitze im [?pstates_remaining_house] als Kopf-an-Kopf-Rennen prognostiziert. Das Erreichen einer Mehrheit von 218 Sitzen bleibt entscheidend für die Einflussnahme auf die zukünftige Gesetzgebungsagenda."

# FOCUS TREE
########### 1900-1914 Focus Tree Localisation ###########
USA_gilded_age:0 "Das vergoldete Zeitalter"
USA_gilded_age_desc:0 "Es ist das goldene Zeitalter der Vereinigten Staaten. Mit dem Ende des Wiederaufbaus in den 1870er Jahren konnten die USA endlich ihre Flügel ausbreiten und in das neue Jahrhundert starten. Nie zuvor in der Geschichte erlebte das Land eine Phase schnelleren Wirtschaftswachstums und einer schnelleren Entwicklung als heute. Vermögen werden innerhalb weniger Jahre gemacht, verspielt und wieder verloren, und der Boom hat Innovationen und die Entstehung der ersten amerikanischen Weltkonzerne befeuert. Im Osten boomt die Wirtschaft, und Namen wie John D. Rockefeller, Andrew Carnegie und JP Morgan prägen das Bild. Doch nicht alles ist so, wie es auf den ersten Blick scheint ..."

USA_jeffersons_vision:0 "Jeffersons Vision"
USA_jeffersons_vision_desc:0 "Betrachtet man die Ideale Thomas Jeffersons, so zeigt sich eine Vision Amerikas, die auf Agrarismus, individueller Freiheit und einer begrenzten Staatsmacht gründet. Seine Philosophie betont die Bedeutung einer gebildeten und tugendhaften Bürgerschaft und plädiert für eine Nation unabhängiger Landwirte und minimaler staatlicher Eingriffe."

USA_corporate_primacy:0 "Unternehmenspriorität"
USA_corporate_primacy_desc:0 "In der sich rasch industrialisierenden Landschaft des Gilded Age hat sich die Vorherrschaft der Konzerne durchgesetzt. Große Konzerne dominieren die Wirtschaft und üben immense Macht und Einfluss auf Marktpraktiken und Regierungspolitik aus. Diese Ära ist geprägt von einem Laissez-faire-Ansatz, der es Unternehmen ermöglicht, mit minimaler Regulierung zu florieren."

USA_continue_subsidies:0 "Weiterführende Förderungen"
USA_continue_subsidies_desc:0 "Kontinuierliche staatliche Subventionen für Schlüsselindustrien können weiteres Wirtschaftswachstum und Stabilität fördern. Durch die finanzielle Unterstützung aufstrebender und bestehender Sektoren kann der Staat Innovation, die Schaffung von Arbeitsplätzen und die Wettbewerbsfähigkeit auf globaler Ebene fördern."

USA_favorable_business_reg:0 "Günstige Geschäftsregulierung"
USA_favorable_business_reg_desc:0 "Die Einführung günstiger Unternehmensvorschriften kann ein wachstumsförderndes Umfeld schaffen. Durch den Abbau bürokratischer Hürden und die Schaffung von Anreizen für die Geschäftstätigkeit können wir Investitionen anziehen, Unternehmertum fördern und die Gesamtproduktivität steigern."

USA_ignore_monopolization:0 "Monopolisierung ignorieren"
USA_ignore_monopolization_desc:0 "Wer den Aufstieg von Monopolen ignoriert, kann die Macht der Konzerne ungehindert ausweiten. Dies mag zwar kurzfristige wirtschaftliche Vorteile mit sich bringen, die langfristigen Folgen könnten jedoch zu weniger Wettbewerb, höheren Verbraucherpreisen und größerer wirtschaftlicher Ungleichheit führen."

USA_true_free_market:0 "Echter freier Markt"
USA_true_free_market_desc:0 "Die Einführung einer echten freien Marktwirtschaft erfordert minimale staatliche Eingriffe, sodass Angebot und Nachfrage die Marktbedingungen bestimmen. Dieser Ansatz fördert Wettbewerb, Innovation und eine effiziente Ressourcenallokation und sorgt für ein dynamisches und widerstandsfähiges wirtschaftliches Umfeld."

USA_enforce_sherman_act:0 "Durchsetzung des Sherman Act"
USA_enforce_sherman_act_desc:0 "Der Sherman Antitrust Act wurde erlassen, um wettbewerbsschädigende Praktiken zu bekämpfen und fairen Wettbewerb zu gewährleisten. Durch die strikte Durchsetzung dieser Gesetzgebung können wir Monopole verhindern, Verbraucherinteressen schützen und ein ausgewogenes Wirtschaftsumfeld aufrechterhalten."

USA_anti_monopoly_hearings:0 "Antimonopol-Anhörungen"
USA_anti_monopoly_hearings_desc:0 "Durch die Durchführung von Antimonopol-Anhörungen können unlautere Geschäftspraktiken aufgedeckt und die Dominanz von Unternehmen eingedämmt werden. Diese Anhörungen dienen als Plattform für die Überprüfung der Aktivitäten großer Unternehmen und fördern Transparenz, Rechenschaftspflicht und faire Marktbedingungen."

USA_fair_competition:0 "Fairer Wettbewerb"
USA_fair_competition_desc:0 "Die Förderung eines fairen Wettbewerbs ist für eine gesunde Wirtschaft unerlässlich. Durch die Einführung von Vorschriften, die monopolistisches Verhalten verhindern und eine vielfältige Marktbeteiligung fördern, können wir sicherstellen, dass Unternehmen unter gleichen Wettbewerbsbedingungen agieren und so Innovation und Wahlfreiheit für die Verbraucher fördern."

USA_encourage_vertical_integration:0 "Fördern Sie die vertikale Integration"
USA_encourage_vertical_integration_desc:0 "Bei der vertikalen Integration handelt es sich um die Fusion von Unternehmen, die in verschiedenen Phasen des Produktionsprozesses tätig sind. Die Förderung dieser Praxis kann zu mehr Effizienz, Kosteneinsparungen und einer verbesserten Kontrolle über die Lieferkette führen und so die allgemeine Wettbewerbsfähigkeit steigern."

USA_consolidate_sectors:0 "Sektoren konsolidieren"
USA_consolidate_sectors_desc:0 "Durch die Konsolidierung von Sektoren können Abläufe rationalisiert und Redundanzen reduziert werden. Durch die Fusion kleinerer Unternehmen zu größeren Einheiten können wir Skaleneffekte erzielen, Marktanteile erhöhen und die allgemeine Branchenstabilität verbessern."

USA_sponsored_industrialization:0 "Geförderte Industrialisierung"
USA_sponsored_industrialization_desc:0 "Staatlich geförderte Industrialisierung kann die wirtschaftliche Entwicklung beschleunigen. Durch finanzielle Unterstützung und Investitionen in die Infrastruktur kann der Staat das industrielle Wachstum ankurbeln, Arbeitsplätze schaffen und die nationale Produktivität steigern."

USA_continue_laissez_faire:0 "Laissez-Faire fortsetzen"
USA_continue_laissez_faire_desc:0 "Die Fortsetzung eines Laissez-faire-Ansatzes beinhaltet minimale staatliche Eingriffe in wirtschaftliche Angelegenheiten. Diese Philosophie fördert Eigeninitiative, freie Märkte und begrenzte Regulierung und ermöglicht Unternehmen so ein Höchstmaß an Freiheit und Flexibilität."

USA_continue_protectionism:0 "Protektionismus fortsetzen"
USA_continue_protectionism_desc:0 "Die Beibehaltung protektionistischer Maßnahmen kann die heimische Industrie vor ausländischer Konkurrenz schützen. Durch die Einführung von Zöllen und Handelshemmnissen können wir lokale Unternehmen unterstützen, Arbeitsplätze erhalten und die nationale Wirtschaft gegenüber dem Druck externer Märkte stärken."

USA_gold_question:0 "Die Goldfrage"
USA_gold_question_desc:0 "Die Debatte über den Goldstandard dreht sich um die Frage, ob Gold als Grundlage unserer Währung erhalten bleiben soll. Befürworter argumentieren, es sorge für monetäre Stabilität und Vertrauen, während Gegner glauben, es schränke die wirtschaftliche Flexibilität und das Wachstumspotenzial ein."

USA_gold_standard_act:0 "Goldstandardgesetz"
USA_gold_standard_act_desc:0 "Der Gold Standard Act festigt Gold als Grundlage unseres Währungssystems. Ziel dieser Gesetzgebung ist es, einen stabilen und vorhersehbaren Währungswert zu gewährleisten und so das Vertrauen der Anleger und die Zuverlässigkeit des internationalen Handels zu stärken."

USA_gold_stay_course:0 "Bleiben Sie mit Gold auf Kurs"
USA_gold_stay_course_desc:0 "Die Beibehaltung des Goldstandards kann die Währungsstabilität sichern und Inflation verhindern. Indem wir sicherstellen, dass unsere Währung durch einen materiellen Vermögenswert gedeckt bleibt, können wir das öffentliche Vertrauen und die internationale Glaubwürdigkeit in unser Finanzsystem bewahren."

USA_fiduciary_responsibility:0 "Treuhänderische Verantwortung"
USA_fiduciary_responsibility_desc:0 "Treuhänderische Verantwortung bedeutet, finanzielle Ressourcen mit größter Sorgfalt und Integrität zu verwalten. Die Einhaltung dieses Grundsatzes stellt sicher, dass öffentliche Gelder sinnvoll eingesetzt, Investitionen umsichtig getätigt und wirtschaftliche Entscheidungen der Gesellschaft als Ganzes zugutekommen."

USA_central_banking_question:0 "Zentralbankfrage"
USA_central_banking_question_desc:0 "Die Gründung einer Zentralbank ist ein umstrittenes Thema. Befürworter argumentieren, sie könne für finanzielle Stabilität sorgen, die Inflation steuern und die Geldpolitik überwachen. Kritiker befürchten hingegen, sie könne zu viel Macht konzentrieren und die Prinzipien des freien Marktes untergraben."

USA_bimetallism:0 "Doppelwährung"
USA_bimetallism_desc:0 "Der Bimetallismus schlägt die Verwendung von Gold und Silber als Basis für unsere Währung vor. Dieses System zielt darauf ab, die Geldmenge zu erhöhen, den Deflationsdruck zu verringern und im Vergleich zu einem reinen Goldstandard eine größere Flexibilität in der Geldpolitik zu ermöglichen."

USA_america_silver_slippers:0 "Amerikas silberne Hausschuhe"
USA_america_silver_slippers_desc:0 "Die Integration von Silber in unser Währungssystem kann das Wirtschaftswachstum und die Stabilität fördern. Durch die Einführung eines bimetallischen Standards können wir die Geldmenge erweitern, Landwirte und Bergleute unterstützen und die Einschränkungen einer reinen Goldwährung abmildern."

USA_devalue_dollar:0 "Den Dollar abwerten"
USA_devalue_dollar_desc:0 "Eine Abwertung des Dollars kann unsere Exporte wettbewerbsfähiger machen und das Wirtschaftswachstum ankurbeln. Allerdings birgt sie auch das Risiko einer Inflation und einer verringerten Kaufkraft. Um diese potenziellen Folgen auszugleichen, ist ein sorgfältiges Management erforderlich."

USA_higher_man_tariffs:0 "Höhere Zölle auf die Produktion"
USA_higher_man_tariffs_desc:0 "Durch die Einführung höherer Zölle auf Industriegüter können die heimischen Industrien vor ausländischer Konkurrenz geschützt werden. Ziel dieser Politik ist es, Arbeitsplätze zu erhalten, lokale Unternehmen zu unterstützen und die nationale wirtschaftliche Unabhängigkeit zu fördern."

USA_compromise_with_farmers:0 "Kompromiss mit den Landwirten"
USA_compromise_with_farmers_desc:0 "Ein Kompromiss mit den Landwirten kann deren wirtschaftliche Anliegen berücksichtigen und die ländliche Entwicklung fördern. Durch finanzielle Unterstützung, die Verbesserung der Infrastruktur und die Umsetzung fairer Handelspolitiken können wir den Agrarsektor stärken und seine Nachhaltigkeit sicherstellen."

USA_purchase_ag_debt:0 "Kauf von Agrarschulden"
USA_purchase_ag_debt_desc:0 "Der Kauf von Agrarkrediten kann die finanzielle Belastung der Landwirte verringern. Durch die Reduzierung ihrer Schuldenlast können wir den Agrarsektor stabilisieren, Insolvenzen verhindern und die langfristige wirtschaftliche Gesundheit in ländlichen Gebieten fördern."

USA_american_ingenuity:0 "Amerikanischer Einfallsreichtum"
USA_american_ingenuity_desc:0 "Amerikanischer Einfallsreichtum steht für den Innovationsgeist und die Kreativität, die den Fortschritt unserer Nation vorantreiben. Durch die Förderung einer Kultur des Erfindens und der Problemlösung können wir technologische Fortschritte, Wirtschaftswachstum und globale Führungspositionen erreichen."

USA_hotbed_of_innovation:0 "Brutstätte der Innovation"
USA_hotbed_of_innovation_desc:0 "Die Vereinigten Staaten sind eine Hochburg der Innovation und ziehen Talente und Investitionen aus aller Welt an. Unsere dynamische Wirtschaft, robuste Infrastruktur und unterstützende Politik schaffen ein Umfeld, in dem neue Ideen gedeihen und Branchen verändern können."

USA_american_work_ethic:0 "Amerikanische Arbeitsmoral"
USA_american_work_ethic_desc:0 "Die amerikanische Arbeitsmoral ist geprägt von Engagement, Ausdauer und dem Streben nach Spitzenleistungen. Dieser kulturelle Wert fördert Produktivität, wirtschaftlichen Erfolg und die kontinuierliche Verbesserung unserer Gesellschaft und Industrie."

USA_agricultural_primacy:0 "Landwirtschaftliche Vorherrschaft"
USA_agricultural_primacy_desc:0 "Die landwirtschaftliche Vorrangstellung unterstreicht die Bedeutung der Landwirtschaft und des ländlichen Lebens für unsere nationale Identität und Wirtschaft. Indem wir der landwirtschaftlichen Entwicklung Priorität einräumen, können wir die Ernährungssicherheit gewährleisten, ländliche Gemeinden unterstützen und eine ausgewogene Wirtschaftsstruktur aufrechterhalten."

USA_limited_econ_intervention:0 "Begrenzte wirtschaftliche Intervention"
USA_limited_econ_intervention_desc:0 "Der Ansatz der begrenzten wirtschaftlichen Intervention befürwortet eine minimale staatliche Einmischung in das Marktgeschehen. Dieser Ansatz stützt sich auf freie Marktmechanismen, um Ressourcen zu verteilen, Innovationen voranzutreiben und das Wirtschaftswachstum ohne übermäßige Regulierung zu fördern."

USA_break_up_businesses:0 "Zerschlagung von Unternehmen"
USA_break_up_businesses_desc:0 "Die Zerschlagung großer Unternehmen kann monopolistische Praktiken verhindern und einen fairen Wettbewerb fördern. Durch die Zerschlagung von Konzernriesen können wir ein dynamischeres Marktumfeld schaffen, das sowohl Verbrauchern als auch kleineren Unternehmen zugutekommt."

USA_repeal_tariffs:0 "Aufhebung der Zölle"
USA_repeal_tariffs_desc:0 "Die Abschaffung von Zöllen kann den freien Handel fördern und die Verbraucherpreise senken. Durch den Abbau von Handelshemmnissen fördern wir den internationalen Handel, steigern die Markteffizienz und verbessern die Verfügbarkeit vielfältiger Waren und Dienstleistungen."

USA_common_man_policy:0 "Politik des einfachen Mannes"
USA_common_man_policy_desc:0 "Die Einführung einer Politik, die den einfachen Bürger unterstützt, kann soziale und wirtschaftliche Gerechtigkeit fördern. Indem wir auf die Bedürfnisse der Bürger eingehen, können wir Ungleichheit verringern, den Lebensstandard verbessern und eine integrativere Gesellschaft fördern."

USA_global_trade:0 "Globaler Handel"
USA_global_trade_desc:0 "Die Teilnahme am Welthandel öffnet Märkte und schafft Chancen für wirtschaftliches Wachstum. Durch die Teilnahme am internationalen Handel können wir unsere Wirtschaft diversifizieren, neue Ressourcen erschließen und die diplomatischen Beziehungen zu anderen Nationen stärken."

USA_british_contracts:0 "Britische Verträge"
USA_british_contracts_desc:0 "Der Abschluss britischer Verträge kann unsere Handelsbeziehungen und unsere wirtschaftliche Stabilität stärken. Durch die Partnerschaft mit Großbritannien können wir neue Märkte erschließen, Investitionen anziehen und vom gemeinsamen technologischen Fortschritt profitieren."

USA_german_trade:0 "Deutscher Handel"
USA_german_trade_desc:0 "Der Ausbau des Handels mit Deutschland kann unser Wirtschaftswachstum ankurbeln und unsere Marktchancen erweitern. Durch die Stärkung unserer Handelsbeziehungen mit diesem Industriestandort können wir den gegenseitigen Wohlstand und den Technologieaustausch fördern."

USA_nation_of_farmers:0 "Nation der Bauern"
USA_nation_of_farmers_desc:0 "Indem wir unsere Identität als Landwirt bekennen, stärken wir die Bedeutung der Landwirtschaft in unserer Gesellschaft. Durch die Unterstützung landwirtschaftlicher Gemeinschaften und nachhaltiger Praktiken können wir Ernährungssicherheit, ländliche Entwicklung und Umweltschutz gewährleisten."

USA_develop_western_territories:0 "Entwicklung westlicher Gebiete"
USA_develop_western_territories_desc:0 "Die Entwicklung der westlichen Gebiete kann enormes wirtschaftliches Potenzial freisetzen und das nationale Wachstum fördern. Durch Investitionen in die Infrastruktur, die Unterstützung von Siedlern und die Förderung der Rohstoffgewinnung können wir unsere Wirtschaftsgrenzen erweitern und diese Regionen in die nationale Wirtschaft integrieren."

USA_farming_innovations:0 "Innovationen in der Landwirtschaft"
USA_farming_innovations_desc:0 "Innovationen in der Landwirtschaft können die landwirtschaftliche Produktivität und Nachhaltigkeit revolutionieren. Durch die Einführung neuer Technologien und Verfahren können wir die Ernteerträge steigern, die Umweltbelastung reduzieren und eine stabile Nahrungsmittelversorgung sicherstellen."

USA_domestic_processing:0 "Inländische Verarbeitung"
USA_domestic_processing_desc:0 "Die Konzentration auf die inländische Verarbeitung kann den Wert unserer Rohstoffe steigern und Arbeitsplätze schaffen. Durch den Aufbau lokaler Industrien zur Verarbeitung landwirtschaftlicher und mineralischer Produkte können wir die wirtschaftliche Widerstandsfähigkeit stärken und die Abhängigkeit von ausländischen Märkten verringern."

USA_foreign_processing:0 "Ausländische Verarbeitung"
USA_foreign_processing_desc:0 "Die Auslagerung der Verarbeitung ins Ausland kann Kosten senken und die Effizienz steigern. Durch die Nutzung internationaler Ressourcen und Arbeitskräfte können wir unsere Wettbewerbsfähigkeit steigern und uns auf höherwertige Aspekte der Produktion konzentrieren."

USA_textile_subsidies:0 "Textilsubventionen"
USA_textile_subsidies_desc:0 "Subventionen für die Textilindustrie können die heimische Produktion und die Schaffung von Arbeitsplätzen fördern. Durch finanzielle Unterstützung dieses Sektors können wir seine globale Wettbewerbsfähigkeit stärken und einen wichtigen Bestandteil unserer industriellen Basis erhalten."

USA_minimal_protectionism:0 "Minimaler Protektionismus"
USA_minimal_protectionism_desc:0 "Ein minimaler Protektionismus fördert den freien Handel und die Markteffizienz. Durch den Abbau von Zöllen und Handelshemmnissen können wir den internationalen Handel fördern, die Verbraucherpreise senken und das Wirtschaftswachstum ankurbeln."

USA_self_sufficiency:0 "Selbstversorgung"
USA_self_sufficiency_desc:0 "Die Förderung der Autarkie kann die nationale Widerstandsfähigkeit stärken und die Abhängigkeit von ausländischen Ressourcen verringern. Durch die Entwicklung lokaler Industrien und nachhaltiger Praktiken können wir eine stabile Versorgung mit lebenswichtigen Gütern und Dienstleistungen sicherstellen."

USA_merchant_fleets:0 "Handelsflotten"
USA_merchant_fleets_desc:0 "Der Aufbau und die Instandhaltung robuster Handelsflotten können den internationalen Handel und das Wirtschaftswachstum unterstützen. Durch die Verbesserung unserer Schifffahrtskapazitäten können wir einen effizienten Gütertransport sicherstellen, den Export ankurbeln und unsere globale wirtschaftliche Präsenz stärken."

USA_global_free_trade:0 "Globaler Freihandel"
USA_global_free_trade_desc:0 "Das Eintreten für den globalen Freihandel kann neue Märkte erschließen und den wirtschaftlichen Wohlstand steigern. Durch den weltweiten Abbau von Handelsbarrieren können wir die wirtschaftliche Integration fördern, die Auswahlmöglichkeiten für Verbraucher erweitern und die internationale Zusammenarbeit stärken."

USA_business_unites_us:0 "Das Geschäft verbindet uns"
USA_business_unites_us_desc:0 "Geschäftsaktivitäten können als verbindende Kraft wirken und unterschiedliche Gemeinschaften durch wirtschaftliche Zusammenarbeit zusammenbringen. Durch die Förderung von Unternehmertum und kommerziellen Unternehmungen können wir gemeinsame Chancen schaffen und den sozialen Zusammenhalt stärken."

USA_american_politics:0 "Amerikanische Politik"
USA_american_politics_desc:0 "Die amerikanische Politik ist geprägt vom Zusammenspiel verschiedener Ideologien, Parteien und Interessengruppen. Das Verständnis dieses dynamischen Umfelds ist entscheidend für die Steuerung und Beeinflussung politischer Entscheidungen, die die Zukunft unseres Landes beeinflussen."

USA_question_of_establishment:0 "Frage der Gründung"
USA_question_of_establishment_desc:0 "Bei der Frage des Establishments geht es um die Rolle und den Einfluss etablierter Institutionen und Eliten bei der Gestaltung nationaler Politik. Um dieses Problem anzugehen, gilt es, Tradition und Innovation in Einklang zu bringen und sicherzustellen, dass die Regierungsführung effektiv und repräsentativ bleibt."

USA_status_quo:0 "Den Status Quo bewahren"
USA_status_quo_desc:0 "Die Erhaltung des Status Quo bedeutet die Beibehaltung bestehender Richtlinien und Strukturen. Dieser Ansatz zielt darauf ab, Stabilität und Kontinuität zu gewährleisten und Störungen zu vermeiden, die durch wesentliche Änderungen oder Reformen entstehen könnten."

USA_winds_of_change:0 "Winde der Veränderung"
USA_winds_of_change_desc:0 "Der Wind der Veränderung signalisiert eine Zeit des Wandels und der Reformen. Durch die Akzeptanz neuer Ideen und Strategien können wir aktuelle Herausforderungen bewältigen, den Fortschritt vorantreiben und unser Land an die sich verändernden sozialen, wirtschaftlichen und politischen Rahmenbedingungen anpassen."

USA_duopoly_preserved:0 "Bewahrung des politischen Duopols"
USA_duopoly_preserved_desc:0 "Die Erhaltung des politischen Duopols setzt die Aufrechterhaltung der Dominanz der beiden großen Parteien voraus. Dieser Ansatz zielt darauf ab, Stabilität und Kontinuität in der Regierungsführung zu gewährleisten und die Fragmentierung zu verhindern, die durch ein Mehrparteiensystem entstehen könnte."

USA_partisan_politics:0 "Parteipolitik"
USA_partisan_politics_desc:0 "Parteipolitik zeichnet sich durch eine starke Bindung an eine bestimmte politische Partei und ihre Politik aus. Diese Dynamik führt häufig zu Konkurrenz und Konflikten zwischen den Parteien und beeinflusst Gesetzgebungsprozesse und politische Ergebnisse."

USA_confederate_legacy:0 "Vermächtnis der Konföderierten"
USA_confederate_legacy_desc:0 "Das Erbe der Konföderation bezieht sich auf den historischen und kulturellen Einfluss der Konföderation und ihrer Werte. Die Auseinandersetzung mit diesem Erbe beinhaltet die Untersuchung von Fragen des Erbes, der Erinnerung und des anhaltenden Einflusses konföderierter Symbole und Erzählungen auf die Gesellschaft."

USA_damn_traitors:0 "Verdammte Verräter"
USA_damn_traitors_desc:0 "Die Stimmung der „verdammten Verräter“ spiegelt eine scharfe Verurteilung derjenigen wider, die die Konföderation unterstützten. Diese Perspektive betont die Notwendigkeit von Rechenschaftspflicht und Gerechtigkeit für Handlungen, die als Verrat an der Union und ihren Prinzipien wahrgenommen werden."

USA_lost_cause:0 "Die verlorene Sache"
USA_lost_cause_desc:0 "„The Lost Cause“ ist eine Erzählung, die die Sache der Konföderierten romantisiert und als edles, aber zum Scheitern verurteiltes Unterfangen darstellt. Diese Interpretation spielt die Rolle der Sklaverei oft herunter und fördert eine revisionistische Sicht auf die Geschichte des Bürgerkriegs."

USA_end_confederate_veneration:0 "Beenden Sie die Verehrung der Konföderierten"
USA_end_confederate_veneration_desc:0 "Die Beendigung der Verehrung der Konföderierten erfordert die Entfernung von Symbolen und Erzählungen, die die Konföderation verherrlichen. Dieser Ansatz soll ein genaueres und umfassenderes Verständnis der Geschichte fördern und die Auswirkungen der Sklaverei und des Bürgerkriegs anerkennen."

USA_jim_crow_crackdown:0 "Durchgreifen der Jim-Crow-Gesetze"
USA_jim_crow_crackdown_desc:0 "Die Bekämpfung der Jim-Crow-Gesetze erfordert die aktive Bekämpfung und Abschaffung der Rassentrennungspolitik. Ziel dieser Bemühungen ist die Förderung der Rassengleichheit, der Schutz der Bürgerrechte und die Bekämpfung der systematischen Diskriminierung von Afroamerikanern."

USA_1877_revisited:0 "1877 erneut besucht"
USA_1877_revisited_desc:0 "Bei der Rückbesinnung auf das Jahr 1877 werden die Auswirkungen des Kompromisses von 1877 und seine Auswirkungen auf die Rekonstruktion untersucht. Diese Periode markierte das Ende der Bundesintervention im Süden und den Beginn der Jim-Crow-Ära, die die Beziehungen zwischen den Rassen jahrzehntelang prägte."

USA_plessy_v_ferguson_revisited:0 "Plessy vs. Ferguson – erneute Betrachtung"
USA_plessy_v_ferguson_revisited_desc:0 "Bei der erneuten Betrachtung des Falls Plessy v. Ferguson geht es um die erneute Prüfung der Entscheidung des Obersten Gerichtshofs von 1896, die die Rassentrennung bestätigte. In diesem Fall wurde die Doktrin „getrennt, aber gleich“ etabliert, die die Rassentrennungsgesetze und -praktiken in den gesamten Vereinigten Staaten beeinflusste."

USA_fight_disenfranchisement:0 "Kampf gegen die Entrechtung"
USA_fight_disenfranchisement_desc:0 "Der Kampf gegen den Entzug des Wahlrechts beinhaltet die Anfechtung von Gesetzen und Praktiken, die Menschen, insbesondere Minderheiten, an der Ausübung ihres Wahlrechts hindern. Ziel dieser Bemühungen ist es, allen Bürgern eine faire und inklusive demokratische Teilhabe zu gewährleisten."

USA_enforce_14th_amendment:0 "Setzen Sie den 14. Zusatzartikel durch"
USA_enforce_14th_amendment_desc:0 "Die Durchsetzung des 14. Verfassungszusatzes bedeutet, sicherzustellen, dass alle Bürger den gleichen Schutz durch das Gesetz erhalten. Ziel dieser Verpflichtung ist es, die Bürgerrechte zu wahren, Diskriminierung zu bekämpfen und soziale Gerechtigkeit im Einklang mit der Verfassung zu fördern."

USA_federal_curriculum:0 "Bundeslehrplan"
USA_federal_curriculum_desc:0 "Die Einführung eines bundesweiten Lehrplans beinhaltet die Vereinheitlichung der Bildungsinhalte im ganzen Land. Ziel dieses Ansatzes ist es, allen Schülern unabhängig von ihrem Standort und ihrer Herkunft eine einheitliche und qualitativ hochwertige Ausbildung zu gewährleisten."
USA_replace_southern_teachers:0 "Ersetzen Sie die Lehrer im Süden"
USA_replace_southern_teachers_desc:0 "Wir plädieren für den Austausch von Lehrkräften in den Südstaaten, um die Werte und Perspektiven des Nordens in den Schulen durchzusetzen."

USA_ban_revisionist_books:0 "Verbot revisionistischer Bücher"
USA_ban_revisionist_books_desc:0 "Vorschlag zum Verbot von Büchern, die historische Darstellungen, insbesondere über den Bürgerkrieg und die Rekonstruktion, in Frage stellen oder revidieren."

USA_show_the_horror:0 "Zeigen Sie den Horror"
USA_show_the_horror_desc:0 "Hervorhebung und Betonung der Gräueltaten und negativen Aspekte der Geschichte des Südens, insbesondere mit Schwerpunkt auf der Sklaverei und ihren Folgen."

USA_shatter_the_mythos:0 "Zerschmettere den Mythos"
USA_shatter_the_mythos_desc:0 "Bemühungen, die Glorifizierung und Romantisierung der Konföderation und ihrer Führer zu demontieren und zu diskreditieren."

USA_confederate_monuments:0 "Denkmäler der Konföderierten"
USA_confederate_monuments_desc:0 "Kontroverse um die Existenz und öffentliche Ausstellung von Statuen und Denkmälern zu Ehren von Persönlichkeiten und Soldaten der Konföderierten."

USA_state_education:0 "Staatliche Bildung"
USA_state_education_desc:0 "Richtlinien und Debatten zur Rolle und Kontrolle der Landesregierungen bei der Gestaltung von Lehrplänen und Standards im Bildungsbereich."

USA_support_confederate_revisionism:0 "Unterstützen Sie den Revisionismus der Konföderierten"
USA_support_confederate_revisionism_desc:0 "Befürworten historischer Interpretationen, die die Ideale der Konföderierten begünstigen oder rechtfertigen."

USA_romanticize_CSA:0 "Romantisieren Sie CSA"
USA_romanticize_CSA_desc:0 "Die Konföderierten Staaten von Amerika (CSA) werden auf nostalgische oder idealisierte Weise dargestellt, wobei ihre kontroverse Geschichte übersehen oder heruntergespielt wird."

USA_turn_blind_eye:0 "Augen zudrücken"
USA_turn_blind_eye_desc:0 "Ignorieren oder Verharmlosen problematischer Aspekte der Geschichte des Südens, wie Sklaverei und Diskriminierung."

USA_separate_but_equal:0 "Getrennt, aber gleich"
USA_separate_but_equal_desc:0 "Unterstützung von Richtlinien oder Praktiken, die die Rassentrennung unter dem Deckmantel der Gleichheit aufrechterhalten und dabei historische Rechtfertigungen für die Rassentrennung aufgreifen."

USA_end_electoral_oversight:0 "Beenden Sie die Wahlaufsicht"
USA_end_electoral_oversight_desc:0 "Wir sind gegen die Aufsicht oder Einmischung des Bundes in die Wahlprozesse der Bundesstaaten und treten für die Rechte und die Autonomie der Bundesstaaten bei der Durchführung von Wahlen ein."

USA_out_of_sight:0 "Außer Sicht"
USA_out_of_sight_desc:0 "Kontroverse historische Themen oder Fragen im Zusammenhang mit der Geschichte des Südens aus dem öffentlichen Diskurs oder der Bildung heraushalten."

USA_question_of_populism:0 "Frage des Populismus"
USA_question_of_populism_desc:0 "Debatten und politische Maßnahmen zum Aufstieg populistischer Bewegungen und deren Auswirkungen auf die amerikanische Politik und Gesellschaft."

USA_absorb_populists:0 "Populisten absorbieren"
USA_absorb_populists_desc:0 "Bemühungen etablierter politischer Parteien, populistische Ansichten und Themen in ihre Programme zu integrieren oder zu übernehmen."

USA_more_to_dems:0 "Mehr zu den Demokraten"
USA_more_to_dems_desc:0 "Verschiebungen oder Entwicklungen zugunsten der Demokratischen Partei hinsichtlich Wählerunterstützung, politischer Ausrichtung oder Wahlstrategie."

USA_more_to_repubs:0 "Mehr zu Repubs"
USA_more_to_repubs_desc:0 "Verschiebungen oder Entwicklungen zugunsten der Republikanischen Partei hinsichtlich Wählerunterstützung, politischer Ausrichtung oder Wahlstrategie."

USA_change_election_laws:0 "Wahlgesetze ändern"
USA_change_election_laws_desc:0 "Vorschläge oder Maßnahmen, die auf eine Änderung von Wahlgesetzen und -vorschriften abzielen und sich auf Wahlrechte, Wahlverfahren oder die Wahlkampffinanzierung auswirken."

USA_no_third_parties:0 "Keine Drittparteien"
USA_no_third_parties_desc:0 "Opposition gegen die Präsenz oder den Einfluss von Kandidaten oder Bewegungen dritter Parteien in der amerikanischen Politik, Befürwortung eines Zweiparteiensystems."

USA_adopt_populism:0 "Populismus übernehmen"
USA_adopt_populism_desc:0 "Politische Strategien oder Maßnahmen, die populistische Rhetorik, Appelle oder Plattformen umfassen, um Wählerunterstützung zu gewinnen."

USA_silver_reexamined:0 "Silber neu untersucht"
USA_silver_reexamined_desc:0 "Neubewertung oder Debatten über die historische Bedeutung und die wirtschaftlichen Auswirkungen der „Free Silver“-Bewegung in der amerikanischen Politik."

USA_anti_monopoly_rhetoric:0 "Anti-Monopol-Rhetorik"
USA_anti_monopoly_rhetoric_desc:0 "Öffentlicher Diskurs oder politische Rhetorik, die sich gegen Monopole ausspricht und für Maßnahmen zur Förderung des Wettbewerbs und fairer Märkte eintritt."

USA_help_farmers:0 "Helfen Sie Landwirten"
USA_help_farmers_desc:0 "Richtlinien, Programme oder Initiativen, die darauf abzielen, landwirtschaftliche Erzeuger zu unterstützen, auf ihre Bedürfnisse einzugehen und die ländliche Entwicklung zu fördern."

USA_help_big_business:0 "Helfen Sie großen Unternehmen"
USA_help_big_business_desc:0 "Regierungsrichtlinien, Anreize oder Maßnahmen, die großen Unternehmen oder Branchen zugute kommen und das Wirtschaftswachstum und die Wettbewerbsfähigkeit ankurbeln sollen."

USA_socialist_problem:0 "Sozialistisches Problem"
USA_socialist_problem_desc:0 "Bedenken, Debatten oder Opposition in Bezug auf sozialistische Ideologien, Richtlinien oder Bewegungen in der amerikanischen Gesellschaft und Politik."

USA_trade_union_question:0 "Gewerkschaftsfrage"
USA_trade_union_question_desc:0 "Debatten, Richtlinien oder Probleme rund um Gewerkschaften, ihre Rechte, ihren Einfluss und ihre Auswirkungen auf die Wirtschaft und die Belegschaft."

USA_smear_campaign:0 "Verleumdungskampagne"
USA_smear_campaign_desc:0 "Koordinierte Bemühungen, negative oder irreführende Informationen über politische Gegner oder Rivalen zu verbreiten, um deren Glaubwürdigkeit und Unterstützung zu untergraben."

USA_infiltrate_socialists:0 "Sozialisten infiltrieren"
USA_infiltrate_socialists_desc:0 "Bemühungen, sozialistische Bewegungen, Ideologien oder Organisationen innerhalb der amerikanischen Gesellschaft oder Politik zu überwachen, zu beeinflussen oder zu bekämpfen."

USA_propaganda_campaign:0 "Propagandakampagne"
USA_propaganda_campaign_desc:0 "Systematische Verbreitung voreingenommener oder irreführender Informationen, um die öffentliche Meinung zu beeinflussen, die Wahrnehmung zu beeinflussen oder bestimmte Ziele zu fördern."

USA_new_politics:0 "Neue Politik"
USA_new_politics_desc:0 "Aufkommende politische Bewegungen, Strategien oder Ideologien, die traditionelle Normen, Praktiken oder Parteistrukturen in der amerikanischen Politik in Frage stellen."

USA_economic_populism:0 "Wirtschaftspopulismus"
USA_economic_populism_desc:0 "Politische Rhetorik oder Politik, die sich für die Interessen der einfachen Leute gegen die Wirtschaftseliten einsetzt und wirtschaftliche Gerechtigkeit und Fairness betont."

USA_free_silver:0 "Kostenloses Silber"
USA_free_silver_desc:0 "Historisches Eintreten für die unbegrenzte Prägung von Silber als Mittel zur Geldaufwertung und Linderung wirtschaftlicher Schwierigkeiten, die insbesondere Landwirte und Schuldner betreffen."

USA_the_financeers:0 "Die Finanziers"
USA_the_financeers_desc:0 "Einflussreiche Einzelpersonen, Gruppen oder Institutionen, die in der amerikanischen Gesellschaft in Finanzangelegenheiten, der Wirtschaftspolitik oder der Kapitalverwaltung involviert sind."

USA_examine_business_regulations:0 "Geschäftsvorschriften prüfen"
USA_examine_business_regulations_desc:0 "Überprüfung, Bewertung oder Diskussion staatlicher Vorschriften, die sich auf Unternehmen, Branchen oder wirtschaftliche Aktivitäten in den Vereinigten Staaten auswirken."

USA_church_and_state:0 "Kirche und Staat"
USA_church_and_state_desc:0 "Debatten, Richtlinien oder Rechtsfragen bezüglich der Trennung oder Interaktion zwischen religiösen Institutionen und Regierung in der amerikanischen Gesellschaft."

USA_protestant_domination:0 "Protestantische Herrschaft"
USA_protestant_domination_desc:0 "Historischer oder zeitgenössischer Einfluss und Verbreitung protestantischer Glaubensvorstellungen, Praktiken oder Institutionen in der amerikanischen Kultur, Politik und Gesellschaft."

USA_pan_christian_society:0 "Panchristliche Gesellschaft"
USA_pan_christian_society_desc:0 "Visionen, Bewegungen oder Bemühungen zur Förderung der Einheit oder Zusammenarbeit zwischen christlichen Konfessionen, zur Stärkung einer kollektiven Identität oder gesellschaftlichen Einflusses."

USA_god_and_evolution:0 "Gott und Evolution"
USA_god_and_evolution_desc:0 "Debatten, Kontroversen oder rechtliche Herausforderungen im Zusammenhang mit der Lehre der Evolutionstheorie, des Kreationismus oder des Intelligent Design an amerikanischen Schulen."

USA_temperance:0 "Mäßigkeit"
USA_temperance_desc:0 "Historische oder zeitgenössische Bewegungen, die sich für einen maßvollen oder abstinenten Alkoholkonsum einsetzen und sich mit den sozialen und gesundheitlichen Auswirkungen befassen."

USA_question_of_tolerance:0 "Frage der Toleranz"
USA_question_of_tolerance_desc:0 "Debatten, Richtlinien oder gesellschaftliche Einstellungen in Bezug auf Akzeptanz, Vielfalt und die Rechte von Minderheitengruppen in der amerikanischen Kultur und Politik."

USA_immigration:0 "Einwanderung"
USA_immigration_desc:0 "Richtlinien, Debatten oder Themen im Zusammenhang mit dem Zustrom, der Regulierung und den Auswirkungen von Einwanderern auf die amerikanische Gesellschaft, Kultur und Wirtschaft."

USA_religious_requirements:0 "Religiöse Anforderungen"
USA_religious_requirements_desc:0 "Debatten oder Kontroversen über religiöse Praktiken, Anforderungen oder Freiheiten, insbesondere in Bezug auf öffentliche Einrichtungen und Unterkünfte."

USA_protestant_immigration:0 "Protestantische Einwanderung"
USA_protestant_immigration_desc:0 "Historische oder aktuelle Trends, Auswirkungen oder Debatten rund um protestantische Einwanderer und ihre Integration in die amerikanische Gesellschaft."

USA_target_catholic_institutions:0 "Katholische Institutionen als Ziel"
USA_target_catholic_institutions_desc:0 "Bemühungen, Richtlinien oder Maßnahmen, die darauf abzielen, die Aktivitäten, Praktiken oder den Einfluss katholischer Institutionen in der amerikanischen Gesellschaft zu beeinflussen oder einzuschränken."

USA_irish_question:0 "Irische Frage"
USA_irish_question_desc:0 "Historische oder aktuelle Debatten, Herausforderungen oder Probleme im Zusammenhang mit irischen Einwanderern und ihrer Integration oder Behandlung in der amerikanischen Gesellschaft."

USA_amnesty_for_irish:0 "Amnestie für Iren"
USA_amnesty_for_irish_desc:0 "Eintreten für die rechtliche Vergebung oder Begnadigung irischer Einwanderer oder ihrer Nachkommen, die möglicherweise in der Vergangenheit diskriminiert oder strafrechtlich belangt wurden."

USA_throw_them_out:0 "Wirf sie raus"
USA_throw_them_out_desc:0 "Befürwortung oder Politik, die sich für die Ausweisung oder Abschiebung von Einwanderern oder bestimmten ethnischen Gruppen einsetzt, die in der amerikanischen Gesellschaft als unerwünscht gelten."

USA_force_assimilation:0 "Zwangsassimilation"
USA_force_assimilation_desc:0 "Richtlinien oder Bemühungen, Einwanderer oder Minderheitengruppen dazu zu zwingen, vorherrschende kulturelle Normen, Werte oder Praktiken der amerikanischen Gesellschaft zu übernehmen."

USA_america_for_americans:0 "Amerika für Amerikaner"
USA_america_for_americans_desc:0 "Befürwortung der Priorisierung der Interessen, Rechte und Privilegien gebürtiger Amerikaner gegenüber denen von Einwanderern oder im Ausland geborenen Einwohnern."

USA_our_motherland:0 "Unser Mutterland"
USA_our_motherland_desc:0 "Ausdruck von Patriotismus oder Treue gegenüber Amerika als Heimatland oder Mutterland seiner Bürger, wodurch nationale Identität und Nationalstolz betont werden."

USA_open_immigration_policy:0 "Offene Einwanderungspolitik"
USA_open_immigration_policy_desc:0 "Befürwortung oder Unterstützung einer milden oder uneingeschränkten Einwanderungspolitik, die es einer größeren Zahl von Einwanderern ermöglicht, in die Vereinigten Staaten einzureisen und sich dort niederzulassen."

USA_city_on_a_hill:0 "Stadt auf einem Hügel"
USA_city_on_a_hill_desc:0 "Amerika wird als leuchtendes Beispiel oder Leuchtfeuer der Hoffnung und Tugend bezeichnet, dem andere Nationen nacheifern sollten, oft verbunden mit Exzeptionalismus und moralischer Führung."

USA_worker_unions:0 "Gewerkschaften"
USA_worker_unions_desc:0 "Organisierte Arbeitnehmerverbände, die gegründet wurden, um ihre Interessen, Rechte und ihr Wohlergehen am Arbeitsplatz zu schützen und zu fördern."

USA_right_to_strike:0 "Streikrecht"
USA_right_to_strike_desc:0 "Der rechtliche oder moralische Anspruch von Arbeitnehmern, an Streiks oder kollektiven Arbeitskampfmaßnahmen teilzunehmen, um bessere Löhne, Arbeitsbedingungen oder Sozialleistungen auszuhandeln."

USA_maximum_hours:0 "Maximale Stunden"
USA_maximum_hours_desc:0 "Richtlinien oder Vorschriften, die die Anzahl der Stunden begrenzen, die Mitarbeiter pro Tag oder Woche arbeiten dürfen, um ihre Gesundheit, Sicherheit und ihr Wohlbefinden zu schützen."

USA_wage_protections:0 "Lohnschutz"
USA_wage_protections_desc:0 "Regierungsrichtlinien, Gesetze oder Vorschriften, die darauf abzielen, die Löhne der Arbeitnehmer zu sichern, eine gerechte Vergütung zu gewährleisten und Ausbeutung zu verhindern."

USA_rent_control:0 "Mieterschutz"
USA_rent_control_desc:0 "Staatlich auferlegte Beschränkungen oder Vorschriften für die Mietpreise von Wohnraum, die häufig eingeführt werden, um Mieter vor übermäßigen Mieterhöhungen zu schützen."

USA_armed_forces:0 "Streitkräfte"
USA_armed_forces_desc:0 "Die militärischen Institutionen, das Personal und die Operationen der Vereinigten Staaten, die für die nationale Verteidigung und Sicherheit verantwortlich sind."

USA_reorganize_war_department:0 "Reorganisieren Sie das Kriegsministerium"
USA_reorganize_war_department_desc:0 "Bemühungen oder Vorschläge zur Umstrukturierung oder Reform des Kriegsministeriums mit dem Ziel, die Effizienz, Effektivität oder Kontrolle in militärischen Angelegenheiten zu verbessern."

USA_overseas_army:0 "Überseearmee"
USA_overseas_army_desc:0 "Militärische Einsätze, Operationen oder Präsenz amerikanischer Streitkräfte in fremden Ländern oder Gebieten außerhalb der kontinentalen Vereinigten Staaten."

USA_american_foreign_legion:0 "Amerikanische Fremdenlegion"
USA_american_foreign_legion_desc:0 "Gründung einer amerikanischen Fremdenlegion nach dem Vorbild ausländischer Militäreinheiten, um ausländische Freiwillige für den Militärdienst zu rekrutieren."

USA_overseas_engineers:0 "Ingenieure im Ausland"
USA_overseas_engineers_desc:0 "Einsatz amerikanischer Pioniereinheiten in Überseegebieten zum Ausbau der Infrastruktur, für militärische Bauvorhaben oder humanitäre Missionen."

USA_regional_recruitment_centers:0 "Regionale Rekrutierungszentren"
USA_regional_recruitment_centers_desc:0 "Einrichtung regionaler Rekrutierungszentren im ganzen Land, um neues Militärpersonal effizient anzuwerben und auszubilden."

USA_occupation_force:0 "Besatzungsmacht"
USA_occupation_force_desc:0 "Stationierung und Aufrechterhaltung militärischer Kräfte in besetzten Gebieten oder Regionen zum Zwecke der Sicherheit, Stabilisierung oder Regierungsführung."

USA_defending_our_positions:0 "Unsere Positionen verteidigen"
USA_defending_our_positions_desc:0 "Strategien, Richtlinien oder Maßnahmen zur Verteidigung und Sicherung amerikanischer Militärpositionen, Außenposten oder Gebiete vor externen Bedrohungen."

USA_expand_our_army:0 "Erweitern Sie unsere Armee"
USA_expand_our_army_desc:0 "Initiativen oder Richtlinien zur Steigerung der Größe, Stärke oder Leistungsfähigkeit der US-Armee durch Rekrutierung, Ausbildung oder Modernisierung."

USA_civil_war_lessons:0 "Lektionen aus dem Bürgerkrieg"
USA_civil_war_lessons_desc:0 "Studium und Anwendung militärischer Strategien, Taktiken und Lehren aus dem amerikanischen Bürgerkrieg auf moderne Militärdoktrin und -operationen."

USA_industrial_warfare:0 "Industrielle Kriegsführung"
USA_industrial_warfare_desc:0 "Nutzung industrieller Ressourcen, Technologien und Produktionskapazitäten zur Unterstützung militärischer Operationen und Verbesserung der Kampfeffektivität."

USA_total_war_tactics:0 "Total War Tactics"
USA_total_war_tactics_desc:0 "Einführung von Strategien des totalen Krieges, die die Mobilisierung aller zivilen und militärischen Ressourcen beinhalten, um im Konflikt einen entscheidenden Sieg zu erringen."

USA_military_industrial_complex:0 "Militärisch-industrieller Komplex"
USA_military_industrial_complex_desc:0 "Integration und Zusammenarbeit zwischen Militärinstitutionen und Industriezweigen zur Entwicklung und Produktion von militärischer Ausrüstung und Technologie."

USA_military_contractors:0 "Militärische Auftragnehmer"
USA_military_contractors_desc:0 "Beauftragung privater Auftragnehmer oder Unternehmen zur Bereitstellung spezialisierter Dienste, Ausrüstung oder Unterstützung für das US-Militär."

USA_ready_to_defend:0 "Bereit zur Verteidigung"
USA_ready_to_defend_desc:0 "Sicherstellung der Bereitschaft und Fähigkeit der US-Streitkräfte, nationale Interessen, Territorien und Verbündete gegen potenzielle Bedrohungen zu verteidigen."

USA_fund_academies:0 "Fondsakademien"
USA_fund_academies_desc:0 "Bereitstellung von Ressourcen und Finanzmitteln für Militärakademien zur Ausbildung, Schulung und Entwicklung künftiger militärischer Führungskräfte."

USA_expand_military_budget:0 "Militärbudget erweitern"
USA_expand_military_budget_desc:0 "Erhöhung der staatlichen Ausgaben für Verteidigung und Militäroperationen, einschließlich Beschaffung, Ausbildung und Infrastruktur."

USA_authorize_RnD_programs:0 "Autorisierung von F&amp;E-Programmen"
USA_authorize_RnD_programs_desc:0 "Genehmigung und Unterstützung von Forschungs- und Entwicklungsprogrammen zur Weiterentwicklung militärischer Technologie, Innovation und Fähigkeiten."

USA_aerial_warfare:0 "Luftkrieg"
USA_aerial_warfare_desc:0 "Strategien, Taktiken und Technologieentwicklungen mit Schwerpunkt auf Luftkampf, Luftaufklärung und Unterstützungsoperationen in militärischen Kampagnen."

USA_state_of_the_navy:0 "Zustand der Marine"
USA_state_of_the_navy_desc:0 "Beurteilung, Bewertung oder Diskussion der Bereitschaft, Fähigkeiten und strategischen Rolle der US-Marine in der nationalen Verteidigung und bei globalen Operationen."

USA_continued_dreadnought_investment:0 "Fortgesetzte Dreadnought-Investition"
USA_continued_dreadnought_investment_desc:0 "Kontinuierliche Investitionen und Erweiterung der Dreadnought-Flotte als Eckpfeiler der Marinestrategie und der Projektion maritimer Macht."

USA_great_white_fleet:0 "Große Weiße Flotte"
USA_great_white_fleet_desc:0 "Historischer Einsatz der Great White Fleet der US Navy zur Demonstration der Seemacht und zur Förderung amerikanischer Interessen weltweit."

USA_submarine_development:0 "U-Boot-Entwicklung"
USA_submarine_development_desc:0 "Forschung, Konstruktion und Einsatz von U-Booten für Unterwasserkriegsführung, Aufklärung und strategische Abschreckung."

USA_undersea_warfare:0 "Unterwasserkrieg"
USA_undersea_warfare_desc:0 "Strategien, Technologien und Operationen mit Schwerpunkt auf Unterwasserkämpfen, einschließlich U-Boot-Kriegsführung und U-Boot-Abwehrtaktiken."

USA_commission_destroyers:0 "Kommissionszerstörer"
USA_commission_destroyers_desc:0 "Bau und Indienststellung von Schiffen der Zerstörerklasse zur Flottenverteidigung, für Eskortmissionen und zur U-Boot-Abwehr."

USA_support_ship_focus:0 "Unterstützungsschiff Fokus"
USA_support_ship_focus_desc:0 "Der Schwerpunkt liegt auf der Entwicklung und dem Einsatz von Unterstützungsschiffen für Logistik, Versorgung, medizinische Hilfe und andere nicht kampfbezogene Rollen bei Marineoperationen."

USA_versatile_task_forces:0 "Vielseitige Einsatzkräfte"
USA_versatile_task_forces_desc:0 "Bildung und Einsatz vielseitiger Task Forces, die zu Multi-Missions-Operationen fähig sind und sich an verschiedene strategische und operative Anforderungen anpassen."

USA_streamlined_production_techniques:0 "Optimierte Produktionstechniken"
USA_streamlined_production_techniques_desc:0 "Einführung effizienter Fertigungsmethoden und -praktiken zur Beschleunigung der Produktion militärischer Ausrüstung und Ressourcen."

USA_screen_ships:0 "Bildschirmschiffe"
USA_screen_ships_desc:0 "Einsatz von Abschirmkräften und Taktiken zum Schutz von Flottenformationen, zur Überwachung feindlicher Bewegungen und zur Aufrechterhaltung der Lageübersicht."

USA_quantity_over_quality:0 "Quantität vor Qualität"
USA_quantity_over_quality_desc:0 "Der Schwerpunkt liegt auf der Produktion einer größeren Menge an militärischen Mitteln, Personal oder Ausrüstung, anstatt sich auf die individuelle Qualität oder Leistungsfähigkeit zu konzentrieren."

USA_manueverability_over_firepower:0 "Manövrierfähigkeit vor Feuerkraft"
USA_manueverability_over_firepower_desc:0 "Priorisierung von Agilität, Geschwindigkeit und Manövrierfähigkeit bei militärischen Operationen und Taktiken gegenüber bloßer Feuerkraft oder statischer Verteidigung."

USA_global_navy:0 "Globale Marine"
USA_global_navy_desc:0 "Aufrechterhaltung, Erweiterung und Einsatz von Seestreitkräften für globale Operationen, Präsenz und Machtprojektion in internationalen Gewässern."

USA_maximum_firepower:0 "Maximale Feuerkraft"
USA_maximum_firepower_desc:0 "Der Schwerpunkt liegt auf der Maximierung der Angriffsfähigkeiten und Feuerkraft von Militäreinheiten, Plattformen oder Waffensystemen."

USA_bigger_ships:0 "Größere Schiffe"
USA_bigger_ships_desc:0 "Entwicklung, Bau oder Erwerb größerer Marineschiffe, Flugzeugträger oder Kriegsschiffe zur Verbesserung der Einsatzfähigkeit und Machtprojektion."

USA_bigger_guns:0 "Größere Waffen"
USA_bigger_guns_desc:0 "Entwicklung, Installation oder Aufrüstung von Geschützen, Kanonen oder Artillerie mit größerem Kaliber auf Marineschiffen oder bodengestützten Militärplattformen."

USA_new_naval_theory:0 "Neue Marinetheorie"
USA_new_naval_theory_desc:0 "Aufkommende oder sich entwickelnde Konzepte, Doktrinen oder Strategien, die die Seekriegsführung, Operationen und Taktiken in gegenwärtigen oder zukünftigen Szenarien prägen."

USA_the_battleship:0 "Das Schlachtschiff"
USA_the_battleship_desc:0 "Historische oder zeitgenössische Bedeutung, Rollen und Fähigkeiten von Schlachtschiffen als Schlüsselkomponenten von Flotten und Machtprojektionen."

USA_united_states_marines:0 "Marines der Vereinigten Staaten"
USA_united_states_marines_desc:0 "Historisches Erbe, Traditionen und Rollen des United States Marine Corps (USMC) in der amphibischen Kriegsführung, bei Expeditionsmissionen und in der Landesverteidigung."

USA_halls_of_montezuma:0 "Hallen von Montezuma"
USA_halls_of_montezuma_desc:0 "Bezug auf die Schlacht von Chapultepec während des Mexikanisch-Amerikanischen Krieges, zum Gedenken an die Tapferkeit und den Sieg des USMC."

USA_shores_of_tripoli:0 "Küste von Tripolis"
USA_shores_of_tripoli_desc:0 "Verweis auf die Schlacht von Derna während des Ersten Barbareskenkriegs, die die erste Landschlacht und den ersten Sieg des USMC in Übersee symbolisiert."

USA_fight_battles:0 "Kämpfe"
USA_fight_battles_desc:0 "Teilnahme an militärischen Einsätzen, Konflikten oder Schlachten zur Verteidigung nationaler Interessen, zum Schutz von Verbündeten oder zur Wahrung der internationalen Sicherheit."

USA_land_and_sea:0 "Land und Meer"
USA_land_and_sea_desc:0 "Integrierte Militäroperationen und -strategien, die landgestützte und maritime Streitkräfte kombinieren, um taktische und strategische Ziele zu erreichen."

USA_americas_finest:0 "Amerikas Beste"
USA_americas_finest_desc:0 "Anerkennung oder Würdigung des Engagements, des Mutes und der Professionalität der amerikanischen Streitkräfte, die ihr Engagement für die Landesverteidigung unter Beweis stellt."

german_northern_france:0 "Nordfrankreich"
kaiserschlachtvictory.390.t:0 "Ende des Zweiten Weltkriegs"
kaiserschlachtvictory.390.d:0 "Der Zweite Weltkrieg endete mit einem entscheidenden Sieg für Deutschland. Nach dem Triumph gründete Deutschland Nordfrankreich und schloss einen Friedensvertrag mit der Entente. Unterdessen versinken die übrigen Teile Europas in Konflikten. Das kommunistische Südfrankreich, das kommunistische Norditalien und die Britische Union liefern sich einen erbitterten Kampf gegen den spanischen Staat, das in Kanada gegründete Freibritannien und die Vereinigten Staaten von Amerika. Die Nachwirkungen des Krieges sind noch immer auf dem Kontinent zu spüren, während neue Allianzen und Feindschaften die Nachkriegslandschaft prägen."
kaiserschlachtvictory.390.a:0"Der Krieg tobt noch immer"
votepassprojectiongoldstandard:0 "Der Goldstandard Act wird voraussichtlich verabschiedet. Die aktuelle Stimmung im Kongress tendiert stark zur Einführung von Gold als alleinigem Währungsstandard der USA. Befürworter, vor allem aus der Republikanischen Partei, argumentieren, dieser Schritt werde die Wirtschaft stabilisieren, das Finanzsystem des Landes stärken und die internationale Wirtschaftsposition verbessern. Da das aktuelle Abstimmungsergebnis dafür spricht, steht die Verabschiedung des Gesetzes kurz bevor. Sollte das Gesetz verabschiedet werden, bekennen sich die Vereinigten Staaten vollständig zum Goldstandard und verfolgen einen Kurs, der wirtschaftliche Stabilität und internationales Vertrauen in die amerikanische Währung in den Vordergrund stellt. Diese Entscheidung markiert eine deutliche Abkehr vom Bimetallismus und stärkt die Position von Gold als Rückgrat des US-Währungssystems."
votefailprojectiongoldstandard:0 "§RDer Gold Standard Act wird voraussichtlich scheitern.§! Der Widerstand im Kongress ist erheblich. Viele Abgeordnete, insbesondere der §BDemokratisch Partei§! und der §GSilberrepublikaner§!, äußern Bedenken über mögliche wirtschaftliche Einschränkungen und negative Auswirkungen auf die Befürworter des Bimetallismus. Kritiker argumentieren, dass die Abkehr von Silber Wirtschaftssektoren schaden wird, die auf eine flexiblere Geldpolitik angewiesen sind. Da das aktuelle Abstimmungsergebnis §B[?usa_total_vote_against]§! gegen den Gesetzentwurf ausfällt, wird er wahrscheinlich scheitern. Sollte das Gesetz scheitern, müssten die Vereinigten Staaten weiterhin durch die komplexe Landschaft des Bimetallismus navigieren und die Interessen sowohl der Gold- als auch der Silberbefürworter in Einklang bringen. Dieses Ergebnis würde den Doppelstandard aufrechterhalten und eine größere Flexibilität in der Geldpolitik des Landes ermöglichen, aber auch die anhaltende Debatte über den effektivsten Ansatz zur Währungsstabilität fortsetzen."
gold_standard_act_vote:0 "Der Gold Standard Act von 1900"
gold_standard_act_vote_desc:0 "Der Gold Standard Act von 1900 ist ein zentrales Gesetz zur Definition und Stabilisierung des Währungssystems der Vereinigten Staaten. Mit diesem Gesetz wird Gold offiziell als einziger Standard für die Einlösung von Papiergeld festgelegt und der bimetallische Standard, der sowohl Gold als auch Silber umfasste, aufgehoben. Der Gesetzentwurf schreibt vor, dass alle Formen der US-Währung ausschließlich durch Gold gedeckt sein müssen, was das Finanzministerium verpflichtet, eine ausreichende Goldreserve zu halten, um im Umlauf befindliches Papiergeld einzulösen. Befürworter glauben, dass dieser Schritt ein stabileres und vorhersehbareres wirtschaftliches Umfeld schaffen, die Inflation senken und die internationale finanzielle Glaubwürdigkeit des Landes stärken wird. Kritiker argumentieren jedoch, dass der Ausschluss von Silber die Geldmenge einschränken und bestimmte Wirtschaftssektoren, insbesondere Landwirte und Bergbauunternehmen, benachteiligen wird. Das Ergebnis dieser Abstimmung wird bestimmen, ob sich die USA ausschließlich zum Goldstandard bekennen oder weiterhin sowohl Gold als auch Silber in ihrer Geldpolitik berücksichtigen."
current_vote_going_on:0 "§RAktuelle Abstimmung läuft:§!"
current_vote_going_on_desc:0 "[vote_going_on_usa]"
votegoldstandard:0 "§BAktuelle Abstimmung läuft:§!\nRepublikanische Partei: §G[?HOUSE_party2_seatsfor]§! Sitze dafür, §R[?republican_against_vote]§! Sitze dagegen.\nDemokratische Partei: §G[?HOUSE_party3_seatsfor]§! Sitze dafür, §R[?democratic_against_vote]§! Sitze dagegen.\nUnabhängig/Andere: §G[?independent_vote]§! Sitze dafür, §R[?independent_against_vote]§! Sitze dagegen.\n\nDer Gold Standard Act wird derzeit im Kongress beraten. Diese Abstimmung wird darüber entscheiden, ob die Vereinigten Staaten Gold als alleinigen Währungsstandard einführen, was sich auf die wirtschaftliche Stabilität und die Finanzpolitik auswirken wird.\n\nWir haben [?usa_total_vote] von [?votes_required_house], die für die Verabschiedung des Gesetzes erforderlich sind. Eine qualifizierte Mehrheit von 290 Stimmen kann die Abstimmung jedoch blockieren!"
vote_in_progress:0"Derzeit läuft eine Abstimmung."
hatch_act_vote:0 "Der Hatch Act von 1930"
hatch_act_vote_desc:0 "Der Hatch Act von 1930 ist ein wichtiges Gesetz zur Regulierung der politischen Aktivitäten von Bundesangestellten. Das Gesetz soll schädliche politische Aktivitäten verhindern, indem es Bundesangestellten verbietet, sich während der Dienstzeit parteipolitisch zu betätigen oder ihre Amtsgewalt zur Einflussnahme auf Wahlen zu missbrauchen. Befürworter argumentieren, der Hatch Act sorge für eine überparteiliche Bundesbelegschaft und schütze die Angestellten vor politischem Zwang. Kritiker hingegen sind der Meinung, er schränke die Meinungsfreiheit und das politische Engagement von Bundesangestellten ein. Das Ergebnis dieser Abstimmung wird bestimmen, inwieweit die politischen Aktivitäten von Bundesangestellten reguliert werden und sich auf die Balance zwischen der Aufrechterhaltung eines neutralen öffentlichen Dienstes und dem Schutz der individuellen politischen Freiheiten auswirken."
votepassprojectionhatchact:0 "Der Hatch Act von 1930 wird voraussichtlich verabschiedet. Die aktuelle Stimmung im Kongress tendiert stark zur Regulierung der politischen Aktivitäten von Bundesangestellten, um eine überparteiliche Bundesbelegschaft zu gewährleisten. Befürworter, vor allem aus der Republikanischen Partei, argumentieren, dass dieses Gesetz politischen Zwang verhindern und die Integrität des öffentlichen Dienstes wahren werde. Da das aktuelle Abstimmungsergebnis dafür spricht, steht das Gesetz kurz vor der Verabschiedung. Sollte das Gesetz verabschiedet werden, ist es Bundesangestellten untersagt, sich während der Dienstzeit parteipolitisch zu betätigen oder ihre Amtsgewalt zur Einflussnahme auf Wahlen zu nutzen. Diese Entscheidung ist ein wichtiger Schritt hin zu einem neutralen und professionellen öffentlichen Dienst und schützt die Angestellten vor politischem Druck."
votefailprojectionhatchact:0 "Der Hatch Act von 1930 wird voraussichtlich scheitern. Der Widerstand im Kongress ist groß. Viele Abgeordnete, insbesondere der Demokratischen Partei, äußern Bedenken hinsichtlich der Einschränkungen des politischen Engagements von Bundesbediensteten. Kritiker argumentieren, das Gesetz schränke die freie Meinungsäußerung und politische Teilhabe unangemessen ein. Da das aktuelle Abstimmungsergebnis §B[?usa_total_vote_against]§! gegen den Gesetzentwurf ausfällt, wird er wahrscheinlich scheitern. Sollte das Gesetz scheitern, behalten Bundesbedienstete ihr politisches Betätigungsrecht. Ihre individuellen politischen Freiheiten bleiben gewahrt, es gibt aber auch Bedenken hinsichtlich eines möglichen parteipolitischen Einflusses innerhalb des öffentlichen Dienstes."
votepassprojectionsmithact:0 "Der Smith Act von 1930 wird voraussichtlich verabschiedet. Die aktuelle Stimmung im Kongress tendiert stark zu strengeren Vorschriften für subversive Aktivitäten und zur Befürwortung der Loyalität gegenüber den Vereinigten Staaten. Befürworter, insbesondere aus der Demokratischen Partei, argumentieren, dass dieses Gesetz die nationale Sicherheit stärken wird, indem es die Befürwortung eines gewaltsamen Regierungssturzes unter Strafe stellt. Da das aktuelle Abstimmungsergebnis dafür spricht, steht die Verabschiedung des Gesetzes kurz bevor. Sollte das Gesetz verabschiedet werden, drohen Personen, die einen gewaltsamen Regierungssturz befürworten oder subversive Aktivitäten durchführen, strenge Strafen. Dies wäre ein wichtiger Schritt zur Stärkung der nationalen Sicherheit und zur Wahrung der politischen Stabilität."
smith_act_vote:0 "Der Smith Act von 1930"
smith_act_vote_desc:0 "Der Smith Act von 1930 ist ein wichtiges Gesetz, das Bedenken hinsichtlich der nationalen Sicherheit ausräumt und Personen ins Visier nimmt, die einen gewaltsamen Sturz der Regierung befürworten. Das Gesetz stellt die Befürwortung von Subversion und Aufruhr unter Strafe und zielt auf diejenigen ab, die die Autorität der US-Regierung mit Gewalt untergraben wollen. Es schafft zudem rechtliche Bestimmungen für die Verfolgung solcher Aktivitäten. Befürworter argumentieren, das Gesetz sei notwendig, um die Stabilität und Sicherheit des Landes zu schützen, während Kritiker Bedenken hinsichtlich möglicher Verletzungen der bürgerlichen Freiheiten und der freien Meinungsäußerung äußern. Der Ausgang dieser Abstimmung wird entscheiden, ob die USA strengere Kontrollen subversiver Aktivitäten durchsetzen oder ihren derzeitigen rechtlichen Sicherheitsansatz beibehalten."
votefailprojectionsmithact:0 "Der Smith Act von 1930 wird voraussichtlich scheitern. Der Widerstand im Kongress ist groß. Viele Abgeordnete, insbesondere der Republikanischen Partei, äußern Bedenken hinsichtlich möglicher Verletzungen der bürgerlichen Freiheiten und der freien Meinungsäußerung. Kritiker argumentieren, das Gesetz könne zu Übergriffen und ungerechtfertigten Strafverfolgungen führen. Da das aktuelle Abstimmungsergebnis §R[?usa_total_vote_against]§! gegen den Gesetzentwurf ausfällt, wird er wahrscheinlich scheitern. Sollte das Gesetz scheitern, bleibt der geltende Rechtsrahmen zur Bekämpfung subversiver Aktivitäten bestehen. Dies bewahrt zwar umfassendere Meinungs- und Vereinigungsfreiheit, hinterlässt aber möglicherweise Lücken in der nationalen Sicherheit."
votepassprojectionhousingact:0 "Der Wagner-Steagall Housing Act wird voraussichtlich verabschiedet. Die aktuelle Stimmung im Kongress deutet auf eine starke Unterstützung dieses wichtigen Gesetzes hin, das der Wohnungsnot entgegenwirken und die Lebensbedingungen in den Vereinigten Staaten verbessern soll. Befürworter, vor allem aus der Demokratischen Partei, argumentieren, dass dieses Gesetz wichtige Bundesmittel für den Wohnungsbau bereitstellt, die Slum-Beseitigung fördert und die öffentliche Gesundheit durch bessere Lebensbedingungen fördert. Da das aktuelle Stimmenergebnis dafür spricht, wird das Gesetz voraussichtlich verabschiedet. Sollte es in Kraft treten, wird es zu erheblichen Bundesinvestitionen in Wohnungsbauprogramme und Stadterneuerung führen, die Lebensqualität vieler Amerikaner verbessern und den wirtschaftlichen Aufschwung unterstützen."
votefailprojectionhousingact:0 "Der Wagner-Steagall Housing Act wird voraussichtlich scheitern. Die Opposition im Kongress, insbesondere von der Republikanischen Partei, äußert Bedenken hinsichtlich der finanziellen Belastung und der bundesstaatlichen Aufsicht. Kritiker argumentieren, das Gesetz könne zu Ineffizienzen führen und die Wirksamkeit staatlicher Interventionen im Wohnungsbau in Frage stellen. Da das aktuelle Abstimmungsergebnis gegen den Gesetzentwurf ausfällt, wird er wahrscheinlich scheitern. Sollte das Gesetz nicht verabschiedet werden, verpassen die USA eine wichtige Chance, Wohnungsnot zu bekämpfen und die Stadterneuerung voranzutreiben. Stattdessen müssen sie sich auf bestehende politische Maßnahmen und private Initiativen verlassen."
housing_act_vote:0 "Der Wagner-Steagall-Wohnungsbaugesetz von 1930"
housing_act_vote_desc:0 "Der Wagner-Steagall Housing Act von 1930 ist ein bahnbrechendes Gesetz zur Bekämpfung des akuten Wohnungsmangels in den USA. Das am 22. Juli 1930 offiziell in Kraft getretene Gesetz ermächtigt die Bundesregierung, den Bau von Sozialwohnungen zu finanzieren, Stadterneuerungsprojekte zu unterstützen und bei der Slumbeseitigung zu helfen. Ziel ist es, die Lebensbedingungen wirtschaftlich benachteiligter Amerikaner zu verbessern und das Wirtschaftswachstum durch mehr Arbeitsplätze im Baugewerbe und verwandten Branchen anzukurbeln. Während das Gesetz von der Demokratischen Partei unterstützt wird, die es als unverzichtbar für den sozialen Fortschritt und die öffentliche Gesundheit ansieht, äußern Gegner Bedenken hinsichtlich der Kosten und des Umfangs des Bundesengagements. Der Ausgang dieser Abstimmung wird bestimmen, in welchem Umfang sich der Bund zur Deckung des Wohnungsbedarfs und zur Förderung der Stadterneuerung verpflichtet."
reorganizing_war_department_vote:0 "Das Gesetz zur Reorganisation des Kriegsministeriums"
reorganizing_war_department_vote_desc:0 "Das War Department Reorganization Act zielt darauf ab, die Struktur und die Abläufe des Kriegsministeriums zu modernisieren, um dessen Effizienz und Reaktionsfähigkeit auf neue globale Bedrohungen zu erhöhen. Das Gesetz zielt darauf ab, Kommandostrukturen zu konsolidieren und zu rationalisieren, die Koordination zwischen den Teilstreitkräften zu verbessern und eine bessere Ressourcenallokation sicherzustellen. Befürworter argumentieren, die Reorganisation sei notwendig, um die Reaktionsfähigkeit des US-Militärs auf aktuelle Herausforderungen zu erhalten. Gegner äußern jedoch Bedenken hinsichtlich möglicher Übergriffe und der Auswirkungen auf militärische Traditionen und Rollen. Der Ausgang dieser Abstimmung wird die zukünftige Struktur und operative Strategie des US-Militärs bestimmen."

votepassprojectionwar:0 "§GDas Gesetz zur Reorganisation des Kriegsministeriums wird voraussichtlich verabschiedet.§! Dank der starken parteiübergreifenden Unterstützung im Kongress ist das Gesetz wahrscheinlich erfolgreich. Befürworter betonen seine Bedeutung für die Modernisierung militärischer Operationen, um aktuellen und zukünftigen Bedrohungen zu begegnen. Die aktuelle Stimmenauszählung zeigt §B[?usa_total_vote]§! dafür, was auf eine hohe Wahrscheinlichkeit der Verabschiedung hindeutet. Dies wird zu signifikanten Veränderungen in der Struktur und Strategie des Militärs führen und so Effizienz und Einsatzbereitschaft verbessern."

votefailprojectionwar:0 "Das Gesetz zur Reorganisation des Kriegsministeriums wird voraussichtlich scheitern.§! Der Widerstand im Kongress, vor allem von Seiten derjenigen, die die möglichen Auswirkungen auf militärische Traditionen und die Machtkonzentration befürchten, ist erheblich. Die aktuelle Stimmenauszählung zeigt §R[?usa_total_vote_against]§!, dass das Gesetz gegen den Gesetzentwurf ausfällt, was ein wahrscheinliches Scheitern vermuten lässt. Sollte das Gesetz nicht verabschiedet werden, bleibt die derzeitige Organisationsstruktur des Kriegsministeriums bestehen und der bisherige Ansatz der Militärverwaltung wird fortgeführt."
votereorganizingwardepartment:0 "§BAktuelle Abstimmung läuft:§!\nRepublikanische Partei: §G[?HOUSE_party2_seatsfor]§! Sitze dafür, §R[?republican_against_vote]§! Sitze dagegen.\nDemokratische Partei: §G[?HOUSE_party3_seatsfor]§! Sitze dafür, §R[?democratic_against_vote]§! Sitze dagegen.\nUnabhängig/Andere: §G[?independent_vote]§! Sitze dafür, §R[?independent_against_vote]§! Sitze dagegen.\n\nDer War Department Reorganization Act wird derzeit im Kongress debattiert. Diese entscheidende Abstimmung wird darüber entscheiden, ob die Vereinigten Staaten eine umfassende Umstrukturierung ihres Kriegsministeriums vornehmen, um ihre Militäroperationen zu modernisieren, Kommandostrukturen zu straffen und die Koordination zwischen den Teilstreitkräften zu verbessern. Befürworter argumentieren, dass diese Reform notwendig sei, um effektiv auf neue globale Bedrohungen reagieren und die Gesamteffizienz des Militärs verbessern zu können. Gegner hingegen äußern Bedenken hinsichtlich der möglichen Auswirkungen auf traditionelle militärische Rollen und des Risikos einer übermäßigen Machtzentralisierung.\n\nBisher liegen uns [?usa_total_vote] Ja-Stimmen der für die Verabschiedung des Gesetzesentwurfs erforderlichen [?votes_required_house] vor. Eine qualifizierte Mehrheit von 290 Gegenstimmen kann die Abstimmung jedoch blockieren!"
