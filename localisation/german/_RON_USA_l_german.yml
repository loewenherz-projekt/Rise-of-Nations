RI_withdraw_diplomats_desc:0 ""
RI_break_relations:0 "Beziehungen abbrechen"
RI_break_relations_desc:0 "Der formelle Akt des Abbruchs diplomatischer Beziehungen zu einem anderen Land, um die Missbilligung seiner Handlungen oder Politik zu unterstreichen. Dies wird nur in schwerwiegenden Fällen getan."

USA_Breadbasket_of_The_World:0 "Kornkammer der Welt"
USA_Breadbasket_of_The_World_desc:0 "Die Kornkammern der Welt sind die Regionen der Welt, die Nahrungsmittel produzieren, insbesondere Getreide zur Ernährung der Bevölkerung und für den Export. Diese Regionen investieren stark in landwirtschaftliche Praktiken und landwirtschaftliche Industrien zur Verarbeitung ihrer Produkte. Sie sind sehr wichtige Regionen der Welt, da sie einen großen Beitrag zur globalen Nahrungsmittelversorgung leisten."

