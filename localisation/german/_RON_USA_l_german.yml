 USA_Soil_Conservation_and_Domestic_Allotment_Act:0 "Bekämpfen Sie die Dust Bowl"
 USA_Soil_Conservation_and_Domestic_Allotment_Act_desc:0 "Der Oberste Gerichtshof hat unser Agraranpassungsgesetz zwar für ungültig erklärt, kann uns aber so kurz vor dem Wahlzyklus nicht daran hindern, unsere wirtschaftlichen Initiativen umzusetzen. Wir werden das Gesetz zum Bodenschutz und zur Bewirtschaftung von Kleingärten verabschieden, das ein wichtiges Ziel der AAA erfüllt: Landwirte zu motivieren und aufzuklären, nicht zur Dust Bowl beizutragen."
 USA_Proclaim_American_Neutrality:0 "Verkünden Sie die amerikanische Neutralität"
 USA_Proclaim_American_Neutrality_desc:0 "Geben Sie eine Erklärung ab, in der Sie dem amerikanischen Volk versichern, dass die derzeitige Regierung daran arbeiten wird, die amerikanische Neutralität zu wahren, auch wenn die Welt am Rande eines Konflikts zu stehen scheint. Amerika wird sich nicht in einen weiteren europäischen Krieg verwickeln lassen!"
 USA_Pass_a_Neutrality_Act:0 "Verabschiedung eines Neutralitätsgesetzes"
 USA_Pass_a_Neutrality_Act_desc:0 "Der Kongress soll ein Gesetz verabschieden, das die amerikanische Intervention in europäischen Kriegen verbietet, indem es die amerikanischen Waffenexporte begrenzt und unsere Fähigkeit zur Ausweitung unserer Streitkräfte einschränkt."
 USA_Secure_Canada:0 "Sicheres Kanada"
 USA_Secure_Canada_desc:0 "Wir werden klarstellen, dass wir einen feindseligen Nachbarn an unserer Nordgrenze nicht dulden werden. Kanada darf nicht als Ausgangspunkt für eine Invasion der Vereinigten Staaten genutzt werden! Kanada kann sich den Vereinigten Staaten freiwillig anschließen, oder es wird mit Gewalt aufgenommen. Eine solche Bedrohung unserer nationalen Sicherheit darf nicht bestehen!"
 USA_canadian_crisis_tt:0 "Schalten Sie die §YEntscheidung§! frei, um §YCanadian Territory§! zwangsweise zu §Rannex§! zu machen und geben Sie §YCanada§! die Möglichkeit, sich uns anzuschließen§G"
 USA_Cash_and_Carry:0 "Cash-and-Carry-Änderung"
 USA_Cash_and_Carry_desc:0 "Wir werden das Neutralitätsgesetz dahingehend ändern, dass es amerikanischen Unternehmen gestattet wird, Militärhilfe an andere Länder zu verkaufen, sofern die Ausrüstung mit nicht-amerikanischen Schiffen versandt und im Voraus in bar bezahlt wird."
 USA_cash_n_carry_tt:0 "Schalten Sie die §YEntscheidung§! frei, damit §YEngland§!, §YFrankreich§!, §YFinnland§!, §YChina§! und die §YSowjetunion§! §GMilitärhilfe§! in Form von §YInfanterieausrüstung§!, §YUnterstützungsausrüstung§! und §YKampfflugzeugausrüstung§! von amerikanischen Unternehmen kaufen können."
 USA_Qingdao_Purchase:0 "Kauf in Qingdao"
 USA_Qingdao_Purchase_desc:0 ""
 USA_Embargo_Germany_and_Italy:0 "Embargo Deutschland und Italien"
 USA_Embargo_Germany_and_Italy_desc:0 "Wir werden die Verhängung eines Handelsembargos gegen Deutschland und Italien in Erwägung ziehen und auch andere Länder weltweit davon überzeugen, dies zu tun, denn ihre offenkundig aggressiven und destabilisierenden Maßnahmen machen deutlich, dass man mit ihnen nicht zusammenarbeiten kann, sondern dass man sich vor ihnen in Acht nehmen muss."
 USA_trade_embargo_against_germany_and_italy_tt:0 "Schalten Sie §YEntscheidung§! frei, um mit dem Handel von §REmbargos§! gegen §YDeutschland§! und §YItalien§! zu beginnen."
 USA_War_Against_Germany_and_Italy:0 "Krieg gegen Deutschland und Italien"
 USA_War_Against_Germany_and_Italy_desc:0 "Wir haben die Nazi-Aggression in Europa lange genug toleriert. Es ist klar, dass die Nazi-Herrschaft in Europa zur Erdrosselung unserer Nation führen wird, sei es in fünf oder 50 Jahren. Man ruht sich nicht aus, wenn Schlangen im Haus sind – man schnappt sich seine Schrotflinte und jagt sie ins Jenseits!"
 USA_Embargo_Japan:0 "Embargo Japan"
 USA_Embargo_Japan_desc:0 "Wir werden ein Embargo gegen Japan verhängen und andere Nationen davon überzeugen, dasselbe zu tun, denn ihre Eroberungen in Asien, insbesondere in China, zeigen sehr deutlich, dass sie vor nichts zurückschrecken werden, um ihr Imperium aufzubauen, ungeachtet der menschlichen Kosten, die dies mit sich bringen wird – und dies ist für unsere Interessen schlichtweg inakzeptabel und mit unseren Werten unvereinbar."
 USA_trade_embargo_against_japan_tt:0 "Schalten Sie §YEntscheidung§! frei, um einen Handel §REmbargo§! gegen §YJapan§! zu beginnen."
 USA_War_Against_Japan:0 "Krieg gegen Japan"
 USA_War_Against_Japan_desc:0 "Es ist klar, dass das strategische Ziel Japans derzeit darin besteht, die optimale Position zu finden, von der aus sie uns angreifen und dann den gesamten Pazifik beherrschen können. Ihre Gräueltaten in Asien verdeutlichen ihre Absichten für die Region und die Welt. Wir werden sie zuerst angreifen und ihre Flotte mit einem tödlichen Schlag entscheidend schwächen."
 USA_World_Wide_Defense_of_Freedom:0 "Weltweite Verteidigung der Freiheit"
 USA_World_Wide_Defense_of_Freedom_desc:0 "Wir dürfen keine Angst davor haben, fremden Nationen die Stirn zu bieten, die Gewalt und Versklavung verbreiten. Wir dürfen keine Angst davor haben, unseren Einfluss auf die Welt geltend zu machen und sie zu einer besseren Welt zu machen."
 USA_Reactivate_Old_Destroyers:0 "Reaktivieren Sie alte Zerstörer"
 USA_Reactivate_Old_Destroyers_desc:0 "Wir haben viele alte Schiffe herumliegen, die darauf warten, außer Dienst gestellt und verschrottet zu werden. Wir könnten diese Schiffe stattdessen zum Schutz unserer Küsten und zur Verteidigung unseres Landes einsetzen."
 USA_Reactivate_the_Mothball_Fleet:0 "Reaktivieren Sie die Mothball-Flotte"
 USA_Reactivate_the_Mothball_Fleet_desc:0 "Es ist Zeit, die Marinereserve zu aktivieren. Viele alte Kriegsschiffe liegen in unseren Marinestützpunkten und warten darauf, von unserer Marine reaktiviert zu werden. Wir können diese Kräfte zur Verteidigung des Landes mobilisieren und unsere Flotte schnell erweitern, um uns gegen eine drohende Invasion zu verteidigen."
 #USA_destroyers_for_bases:0 "USA_destroyers_for_bases"
 #USA_destroyers_for_bases_desc:0 ""
 USA_British_Loans:0 "Finanzielle Unterstützung für Großbritannien"
 USA_British_Loans_desc:0 ""
 USA_Lend_Lease:0 "Verabschiedung des Leih- und Pachtgesetzes"
 USA_Lend_Lease_desc:0 "Wir werden den Kongress dazu drängen, ein Gesetz zu verabschieden, das es der Exekutive ermöglicht, im Kriegszustand das Leih- und Pachtrecht an ausländische Nationen zu genehmigen, während wir selbst neutral bleiben. Dies wird es uns ermöglichen, ausländische Freunde zu unterstützen, die verzweifelt ums Überleben kämpfen, während sich das amerikanische Volk weiterhin weigert, in den Konflikt verwickelt zu werden."
 USA_Lend_Lease_Britain:0 "Leih- und Pachtgesetz für Großbritannien"
 USA_Lend_Lease_Britain_desc:0 "Wir werden den Briten im Rahmen des Leih- und Pachtgesetzes Waffen zur Verfügung stellen, um ihre Streitkräfte zu verstärken und sie bei ihrer militärischen Mobilisierung zu unterstützen."
 USA_Lend_Lease_China:0 "Leih- und Pachtgesetz China"
 USA_Lend_Lease_China_desc:0 "Wir werden den nationalistischen Chinesen Waffen geben, um ihnen zu helfen, ihre riesigen Arbeitskräftereserven zu mobilisieren und die faschistische Invasion zu bekämpfen, die ihr Land bedroht."
 USA_Target_Tehran:0 "Target Teheran"
 USA_Target_Tehran_desc:0 ""
 USA_The_First_Moscow_Conference:0 "Stalin-Konferenz"
 USA_The_First_Moscow_Conference_desc:0 ""
 USA_Lend_Lease_to_the_USSR:0 "Militärhilfe für die UdSSR"
 USA_Lend_Lease_to_the_USSR_desc:0 ""
 USA_The_Second_Moscow_Conference:0 "USA_Die_zweite_Moskauer_Konferenz"
 USA_The_Second_Moscow_Conference_desc:0 ""
 USA_Communist_Ties:0 "Kommunistische Bindungen"
 USA_Communist_Ties_desc:0 ""
 USA_Push_Through_the_Merchant_Marine_Act:0 "Den Merchant Marine Act durchsetzen"
 USA_Push_Through_the_Merchant_Marine_Act_desc:0 "Wir werden im Rahmen der neu geschaffenen United States Maritime Commission ein Programm zum Aufbau einer neuen Flotte von Handelsfrachtschiffen organisieren, das uns dabei helfen wird, die Infrastruktur für den Aufbau einer großen Handelsmarine im Kriegsfall zu entwickeln."
 USA_National_Foundation_for_Infant_Paralysis:0 "Nationale Stiftung für Kinderlähmung"
 USA_National_Foundation_for_Infant_Paralysis_desc:0 "Der Präsident wird sich besonders für die Gründung einer Organisation einsetzen, die sich der Behandlung von Polio widmet und in der Freiwillige Spenden sammeln, das Bewusstsein für diese schreckliche Krankheit schärfen und die gesammelten Gelder in die Forschung stecken, die auf die Ausrottung dieser schrecklichen Plage abzielt."
 USA_Good_Neighbor_Policy:0 "Politik der guten Nachbarschaft"
 USA_Good_Neighbor_Policy_desc:0 "Wir werden positive Beziehungen zu unseren amerikanischen Nachbarn fördern. Sie haben lange genug unter der amerikanischen Hegemonie gelitten, die von US-Marines und US-Unternehmen dominiert wurde. Von nun an werden wir eine Laissez-faire-Strategie verfolgen, die Brüdern gebührt und nicht den Verwandten eines unerwünschten Patrons."
 USA_Abandon_Monroe_Doctrine:0 "Die Monroe-Doktrin aufgeben"
 USA_Abandon_Monroe_Doctrine_desc:0 "Die Ära des US-Imperialismus in Amerika ist vorbei! Wir werden unsere Verpflichtung aufgeben, über unsere amerikanischen Nachbarn zu wachen, und ihnen stattdessen Freiheit und die uneingeschränkte Ausübung ihrer Souveränität gewähren."
 USA_Renew_American_Interest:0 "Erneuern Sie das amerikanische Interesse"
 USA_Renew_American_Interest_desc:0 "Wir werden unser Interesse an Amerika verstärken und dazu beitragen, neue Demokratien zu stützen und bestehende Demokratien zu stärken, mit dem Ziel, Amerika gegen die kommende Welle ausländischen Imperialismus in dieser friedlichen Region der Welt zu verteidigen."
 USA_Selective_Training_and_Service_Act:0 "Das Selective Training and Service Act"
 USA_Selective_Training_and_Service_Act_desc:0 "Wir werden ein Gesetz verabschieden, das die erste Wehrpflicht in Friedenszeiten in der Geschichte der Vereinigten Staaten ermöglicht."
 USA_The_Next_Election:0 "Die nächste Wahl"
 USA_The_Next_Election_desc:0 "Wir müssen auf die nächste Wahl blicken. Es ist wichtig, dass wir unsere Anhänger organisieren und sie ermutigen, den Präsidenten zu unterstützen. Diese Aktion wird so populär sein, dass ihre Auswirkungen in den kommenden Jahren in ganz Washington nachhallen werden."
 USA_Enlarge_the_Supreme_Court:0 "Packen Sie das Gericht"
 USA_Enlarge_the_Supreme_Court_desc:0 "Wir werden den Obersten Gerichtshof durch die Ernennung zusätzlicher Richter erweitern. Wenn wir genügend freundliche Gesichter in den Gerichtshof stopfen können, wird er kein Zentrum des Widerstands mehr gegen uns sein. Zweifellos wird dies in Washington für Aufsehen sorgen, aber es ist notwendig in unserem Kampf für den Durchschnittsbürger. Die Menschen werden sicherlich erkennen, dass dies notwendig ist."
 USA_Agricultural_Adjustment_Act:0 "Agraranpassungsgesetz"
 USA_Agricultural_Adjustment_Act_desc:0 "Der Oberste Gerichtshof hat den Agricultural Adjustment Act von 1933 aus formalen Gründen für verfassungswidrig erklärt. Wir werden das Gesetz in einer Form erneut verabschieden, die die problematische Formalität umgeht und die Preisstützung für wichtige Nutzpflanzen wieder einführt."
 USA_Walsh_Healey_Public_Contracts_Act:0 "Walsh-Healey-Gesetz über öffentliche Aufträge"
 USA_Walsh_Healey_Public_Contracts_Act_desc:0 "Wir werden ein Gesetz verabschieden, das einen Mindestlohn in Höhe des vom US-Arbeitsministerium festgelegten ortsüblichen Lohns sowie Überstundenvergütungen für Arbeiten im Rahmen von US-Bundesverträgen sicherstellt und den Einsatz von Minderjährigen oder verurteilten Straftätern verbietet."
 USA_Liberal_I:0 "Eine neue Ära der Defizitausgaben"
 USA_Liberal_I_desc:0 "Die jüngste wirtschaftliche Verbesserung, einschließlich der sinkenden Arbeitslosenquote, hatte den Präsidenten überzeugt, den Haushalt auszugleichen. Doch nun hat eine neue Rezession viele Menschen in noch größere Not gestürzt. Der Präsident hat sich für eine keynesianisch orientierte Defizitfinanzierung entschieden. Diese Regierung wird diese Rezession beenden."
 USA_Trust_Indenture_Act:0 "Erweitern Sie die SEC I"
 USA_Trust_Indenture_Act_desc:0 "Wir werden den Trust Indenture Act verabschieden, der die Finanzbranche regulieren wird, indem er Treuhänder von Finanzfonds stärker dazu verpflichtet, im besten Interesse ihrer Kunden zu handeln."
 USA_Investment_Company_Act:0 "Erweitern Sie die SEC II"
 USA_Investment_Company_Act_desc:0 "Wir werden den Investment Company Act verabschieden, der Investmentfonds und geschlossene Fonds reguliert und ihnen bestimmte Aktivitäten untersagt, die als nicht im Interesse der Anleger und des Landes liegend erachtet werden."
 USA_Expand_the_SEC:0 "Erweitern Sie die SEC III"
 USA_Expand_the_SEC_desc:0 "Wir werden zusätzliche Mittel für die SEC bereitstellen, damit wir die Organisation erweitern können, damit sie ihren immer größeren Aufgaben bei der Regulierung des Marktes effektiv nachkommen kann."
 USA_Raise_Taxes:0 "Steuern erhöhen"
 USA_Raise_Taxes_desc:0 "Um die von der gegenwärtigen Regierung angeregte massive Erhöhung der Staatsausgaben zu finanzieren und das letztendliche Ziel einer Überwindung der Depression zu erreichen, müssen wir die nationalen Steuern anheben, andernfalls laufen wir Gefahr, eine gefährliche Inflation zu fördern."
 USA_Equal_Pay_Act:0 "Gesetz zur Lohngleichheit"
 USA_Equal_Pay_Act_desc:0 "Frauen wird für die gleiche Arbeit der gleiche Lohn wie Männern garantiert."
 USA_Support_Feminism:0 "Unterstützen Sie den Feminismus"
 USA_Support_Feminism_desc:0 "Die Bundesregierung wird finanzielle Mittel bereitstellen, um eine neue Welle der Frauenrechtsbewegung zu unterstützen, die sich für die allgemeine Gleichstellung der Frauen in unserer Gesellschaft einsetzt, sich dabei aber insbesondere auf die Erwerbsbevölkerung konzentriert."
 USA_Full_Employment_Act:0 "Vollbeschäftigungsgesetz"
 USA_Full_Employment_Act_desc:0 "Wir werden der Depression endlich ein Ende setzen, indem wir ein Gesetz verabschieden, das die staatlichen Ausgaben zurückstellt und im Wesentlichen Industrien subventioniert, die aufgrund der Depression in Schwierigkeiten geraten sind, sodass die Industrien wieder mit der Einstellung von Mitarbeitern beginnen können."
 USA_Foreign_Agents_Registration_Act:0 "Gesetz zur Registrierung ausländischer Agenten"
 USA_Foreign_Agents_Registration_Act_desc:0 "Personen, die im Namen der Interessen anderer Staaten Lobbyarbeit bei der Bundesregierung betreiben, sind verpflichtet, der Regierung der Vereinigten Staaten Informationen über ihre Beziehung zu dieser Regierung und ihre Aktivitäten mitzuteilen."
 USA_Hatch_Act:0 "Hatch Act"
 USA_Hatch_Act_desc:0 "Es gibt Vorwürfe des Machtmissbrauchs der Bundesregierung. Die Verantwortlichen der Exekutive haben von ihren Mitarbeitern verlangt, sich an politischen Aufgaben zu beteiligen, die nicht mit ihren offiziellen Pflichten in Zusammenhang stehen. Dieses Verhalten muss gesetzlich unterbunden werden."
 USA_Smith_Act:0 "Smith-Gesetz"
 USA_Smith_Act_desc:0 "Wir werden ein Gesetz verabschieden, das die Befürwortung des Sturzes der US-Bundesregierung unter Strafe stellt und alle erwachsenen Einwohner der Vereinigten Staaten ohne US-Staatsbürgerschaft dazu verpflichtet, sich bei der US-Regierung zu registrieren."
 USA_Community_Facilities_Act:0 "Gemeinsame Sache mit Großbritannien"
 USA_Community_Facilities_Act_desc:0 "Wir werden versuchen, die amerikanischen Politiker davon zu überzeugen, dass die Probleme Europas auch unsere Probleme sind und dass Hitlers Rhetorik und seine Angriffe auf die englische Kultur und die Werte anderer freier Völker einem Angriff auf unsere Werte, Freiheiten und Lebensweise gleichkommen."
 USA_National_Cancer_Institute_Act:0 "Nationales Krebsgesetz"
 USA_National_Cancer_Institute_Act_desc:0 "Das Gesetz sieht die Einrichtung eines Nationalen Krebsinstituts als Teil des Nationalen Gesundheitsinstituts vor, das die Krebsprävention und -behandlung auf Bundesebene koordinieren soll."
 USA_Federal_Food_Drug_and_Cosmetic_Act:0 "Bundesgesetz über Lebensmittel, Arzneimittel und Kosmetika"
 USA_Federal_Food_Drug_and_Cosmetic_Act_desc:0 "Die FDA erhält die Befugnis, die Sicherheit von Lebensmitteln, Arzneimitteln und Kosmetikprodukten zu überwachen, die innerhalb der Grenzen der Vereinigten Staaten vertrieben werden."
 USA_Public_Health_Service_Act:0 "Gesetz über den öffentlichen Gesundheitsdienst"
 USA_Public_Health_Service_Act_desc:0 "Wir werden die Befugnis der Bundesregierung zur Verwaltung der öffentlichen Gesundheit gesetzlich verankern."
 USA_Housing_Act:0 "Wohnungsbaugesetz"
 USA_Housing_Act_desc:0 "Wir werden den Weg für den Bau von Sozialwohnungen in den Städten ebnen, indem wir die Bundesregierung stärker in den Prozess einbinden und für die Finanzierung und Überwachung solcher Stadtumbauprojekte sorgen."
 USA_Fair_Labor_Standards_Act:0 "Gesetz zu fairen Arbeitsnormen"
 USA_Fair_Labor_Standards_Act_desc:0 "Dieses neue Arbeitsgesetz verbietet die Beschäftigung von Kindern, garantiert einen Mindestlohn und garantiert Überstundenzuschläge für zusätzliche Arbeit, die im Laufe einer Arbeitswoche geleistet wird."
 USA_Employment_Act:0 "Beschäftigungsgesetz"
 USA_Employment_Act_desc:0 "Wir werden ein neues Gesetz verabschieden, das die Bundesregierung dazu verpflichtet, die nationale Inflation und Arbeitslosenquote zu kontrollieren."
 USA_Nationalize_US_Banks:0 "Verstaatlichung der US-Banken"
 USA_Nationalize_US_Banks_desc:0 "Wir werden die Ära der korrupten Nationalbanken beenden und den Ball den staatlichen Banken und lokalen Kreditgenossenschaften überlassen. Es wird eine Nationalbank geben, die der US-Regierung gehört und von ihr für die Bevölkerung betrieben wird. Sie wird durch den öffentlichen Kauf und Zusammenschluss bestehender Nationalbanken entstehen."
 USA_Federal_Subsidies_for_Labor_Unions:0 "Bundeszuschüsse für Gewerkschaften"
 USA_Federal_Subsidies_for_Labor_Unions_desc:0 "Die Bundesregierung wird die Gewerkschaften der einzelnen Industriezweige in den Vereinigten Staaten anerkennen und ihre Organisation und Koordination im ganzen Land finanziell unterstützen, um einen Teil dieser Last von den einzelnen Arbeitnehmern zu nehmen und sie auf alle vereinten Arbeitnehmer der Vereinigten Staaten abzuwälzen."
 USA_Every_American:0 "Schluss mit der Segregation"
 USA_Every_American_desc:0 "Es gibt keinen einzigen freien Arbeiter, solange nicht alle Arbeiter frei sind. In der Vergangenheit wurden humanitäre Argumente für die Gleichbehandlung der Schwarzen in den Vereinigten Staaten vorgebracht. Diese Strategie war jedoch fehlerhaft – es liegt im Interesse aller weißen Arbeiter, dass alle schwarzen Arbeiter fair behandelt werden, damit die Industrie sie nicht länger dazu benutzen kann, den Wert der Arbeit zu drücken. Nur so können wir wirklich faire Löhne für alle sicherstellen."
 USA_End_the_Depression:0 "Beenden Sie die Depression"
 USA_End_the_Depression_desc:0 "Durch die Zusammenarbeit mit den Gewerkschaften werden wir die Zusammenarbeit zwischen Arbeitnehmern und Unternehmen koordinieren, um denjenigen, die in den Arbeitsmarkt einsteigen möchten, Beschäftigungsmöglichkeiten zu bieten und mit staatlichen Mitteln die Weichen zu stellen, damit dort, wo Bedarf besteht, wirtschaftliche Möglichkeiten für solche Einstellungen geschaffen werden können."
 USA_Subsidy_Programs_for_Mechanization_of_US_Agriculture:0 "Subventionierung der Mechanisierung der US-Landwirtschaft"
 USA_Subsidy_Programs_for_Mechanization_of_US_Agriculture_desc:0 "Während viele landwirtschaftliche Betriebe bereits mechanisiert sind, werden wir Traktoren und andere mechanisierte landwirtschaftliche Geräte mit Bundeszuschüssen fördern, die weniger wohlhabenden Landwirten dabei helfen, die Produktivität ihrer Ländereien zu steigern und auch zur Entwicklung unserer Schwerindustrie beitragen."
 USA_Welcome_Refugee_Scientists:0 "Willkommen, geflüchtete Wissenschaftler"
 USA_Welcome_Refugee_Scientists_desc:0 "Wir werden unser Land für Tausende von Fachkräften, Wissenschaftlern und anderen hochqualifizierten Arbeitskräften öffnen, die vor der Nazi-Tyrannei aus Europa fliehen. Dies wird wahrscheinlich eine deutliche Lockerung der Einwanderungsquoten bedeuten, doch die voraussichtliche Steigerung der wissenschaftlichen Produktivität ist es allemal wert."
 USA_Liberal_II:0 "Friedensgespräche mit Japan"
 USA_Liberal_II_desc:0 "Der Präsident hat begonnen, diplomatische Treffen mit dem japanischen Botschafter abzuhalten, um Frieden und Stabilität im gesamten Pazifikraum zu fördern."
 USA_Emergency_Price_Control_Act:0 "Gesetz zur Notfallpreiskontrolle"
 USA_Emergency_Price_Control_Act_desc:0 "Wir werden das Amt für Preisverwaltung einrichten, das in dieser Krisenzeit die Preisgestaltung für Waren in unserem Land kontrollieren wird, um eine Preisinflation für notwendige Waren und Dienstleistungen zu verhindern, da immer mehr Ressourcen für die Kriegsanstrengungen verwendet werden."
 USA_Servicemen_Dependents_Allowance_Act:0 "Gesetz über die Unterhaltsbeihilfe für Soldaten"
 USA_Servicemen_Dependents_Allowance_Act_desc:0 "Wir werden für die Angehörigen der Soldaten sorgen, damit die Familien der Helden nicht auf der Straße landen."
 USA_Emergency_Maternity_and_Infant_Care_Program:0 "Notfallprogramm für Mutterschaft und Säuglingspflege"
 USA_Emergency_Maternity_and_Infant_Care_Program_desc:0 "Im Rahmen unserer allgemeinen Bemühungen, die Produktivität unserer Bevölkerung zu steigern und Frauen dabei zu helfen, ihre Arbeitszeit in den Fabriken zu erhöhen, werden wir für Mütter Kinderbetreuungsdienste bereitstellen."
 USA_Mustering_Out_Payment_Act:0 "Gesetz über die Entlassungsentschädigung"
 USA_Mustering_Out_Payment_Act_desc:0 "Wir werden unsere Soldaten bezahlen, damit sie nach Kriegsende ihr Leben wieder aufnehmen können."
 USA_Servicemens_Readjustment_Act:0 "Gesetz zur Neuanpassung der Soldaten"
 USA_Servicemens_Readjustment_Act_desc:0 "Der Servicemen&#39;s Readjustment Act, umgangssprachlich auch als GI Bill bekannt, wird allen unseren Veteranen Vorteile bringen und ihnen den Zugang zum College und zu zinsgünstigen Darlehen für den Kauf eines Eigenheims und die Gründung eines Unternehmens ermöglichen."
 USA_War_Claims_Act:0 "Gesetz über Kriegsansprüche"
 USA_War_Claims_Act_desc:0 ""
 USA_Fair_Income_Act:0 "Gesetz über faires Einkommen"
 USA_Fair_Income_Act_desc:0 "Auch in Krisenzeiten sollte allen Arbeitnehmern ein fairer Lohn für ihre tägliche Arbeit garantiert werden. Wir werden gesetzlich fordern, dass das Recht der Menschen auf Überstundenvergütung, einen regionalen, inflationsbereinigten Mindestlohn und Sicherheit am Arbeitsplatz garantiert wird."
 USA_Clear_Prioritization_of_Citizen_Welfare:0 "USA_Klare_Priorisierung_des_Bürgerwohls"
 USA_Clear_Prioritization_of_Citizen_Welfare_desc:0 ""
 USA_Expand_the_Military_Academies:0 "Ausbau der Militärakademien"
 USA_Expand_the_Military_Academies_desc:0 "Um diesem globalen Konflikt angemessen begegnen zu können, müssen wir die militärischen Institutionen ausbauen, die für die Ausbildung des Kerns der Offiziere zuständig sind: die Militärakademien. Wir werden ein völlig neues Akademiesystem aufbauen, das bessere Ausbildungsmöglichkeiten bietet und die Entwicklung neuer Ideen fördert."
 USA_Construct_New_Public_Universities:0 "Neue öffentliche Universitäten"
 USA_Construct_New_Public_Universities_desc:0 "Wir werden Bundesmittel für den Bau öffentlicher Universitäten bereitstellen, die die amerikanische Jugend ausbilden und sie zu Ärzten, Ingenieuren und Wissenschaftlern machen. So können wir eine Welle junger Fachkräfte freisetzen, die eine bessere Nation und eine bessere Welt aufbauen werden."
 USA_Amend_the_Constitution:0 "Änderung der Verfassung"
 USA_Amend_the_Constitution_desc:0 "Endlich ist es an der Zeit, einen Verfassungskonvent abzuhalten, um die Zweite Bill of Rights, die Verfassungsänderungen, auf die Präsident Roosevelt gedrängt hatte, Wirklichkeit werden zu lassen."
 USA_Pro_Military_Propaganda:0 "Pro-Militär-Propaganda"
 USA_Pro_Military_Propaganda_desc:0 "Wir werden in unserer Propaganda für junge Männer die kriegerischen Tugenden betonen und sie dazu ermutigen, bei der Vernichtung des Feindes aggressiver vorzugehen. Und wir werden diejenigen, die sonst in technischer Funktion gedient hätten, dazu ermutigen, als Frontoffiziere zu dienen und so ihre Kampfkraft zu verbessern."
 USA_Pro_Industrial_Propaganda:0 "Pro-industrielle Propaganda"
 USA_Pro_Industrial_Propaganda_desc:0 "Wir werden die industrielle Produktion und die Bedeutung der Einhaltung von Produktionsquoten, die Bedeutung der Rationierung und den großen Bedarf an Facharbeitern hervorheben, der für den Sieg im Krieg notwendig sein wird."
 USA_Industrialization_of_the_South:0 "Industrialisierung des Südens"
 USA_Industrialization_of_the_South_desc:0 "Für die Zwecke des Krieges müssen wir die Industrialisierung im ganzen Land vorantreiben. Wenn wir als Nation wirklich vereint sein wollen, können wir uns nicht nur auf New York oder Philadelphia konzentrieren, sondern müssen auch die Bevölkerung des Südens in Arbeit bringen. Lasst uns Atlanta entwickeln. Lasst uns Nashville entwickeln. Lasst uns Baton Rouge und all die anderen Städte entwickeln."
 USA_Industrialization_of_the_West:0 "Industrialisierung des Westens"
 USA_Industrialization_of_the_West_desc:0 "Wir werden weiterhin Industriezentren ausbauen und neue entwickeln. Wir werden diese Revolution nach Westen tragen, an die Westküste und auch in den Mittleren Westen der USA."
 USA_Encourage_Wartime_Urbanization:0 "Förderung der Urbanisierung in Kriegszeiten"
 USA_Encourage_Wartime_Urbanization_desc:0 ""
 USA_War_Bond_Drive:0 "Kriegsanleihen-Kampagne"
 USA_War_Bond_Drive_desc:0 ""
 USA_War_Bond_Drive_tt:0 "Schaltet §YEntscheidung§! frei, um Kriegsanleihen an die Bevölkerung zu verkaufen"
 USA_Increase_Taxes:0 "Steuern erhöhen"
 USA_Increase_Taxes_desc:0 "Um die Ausgabensteigerungen im Zusammenhang mit dem Krieg und den Sozialprogrammen zur Bekämpfung der Depression zu finanzieren, müssen wir den Bundessteuersatz erhöhen."
 USA_Desegregate_the_Armed_Forces:0 "Aufhebung der Rassentrennung in den Streitkräften"
 USA_Desegregate_the_Armed_Forces_desc:0 "Wir werden der Rassentrennung in den US-Streitkräften mit der Autorität des Oberbefehlshabers ein Ende setzen."
 USA_Womens_Armed_Forces_Integration_Act:0 "Frauenbundeswehrintegrationsgesetz"
 USA_Womens_Armed_Forces_Integration_Act_desc:0 "Wir werden die Streitkräfte der Frauen nicht länger von denen der Männer trennen. Um effizient arbeiten zu können, müssen sie unter einem einheitlichen Kommando stehen."
 USA_Discourage_War_Profiteering:0 "Kriegsgewinnler unterbinden"
 USA_Discourage_War_Profiteering_desc:0 "Wir werden Kriegsgewinnler mit harten Strafen belegen und hoffentlich Korruption und Verschwendung im Kriegseinsatz eindämmen, damit die Ressourcen effizient in Waffen umgewandelt werden, die an die Front geliefert und zur schnellstmöglichen Beendigung des Konflikts eingesetzt werden können."
 USA_Aggressively_Eliminate_Corruption:0 "Korruption aggressiv bekämpfen"
 USA_Aggressively_Eliminate_Corruption_desc:0 ""
 USA_Hobbs_Anti_Racketeering_Act:0 "Hobbs Anti-Racketeering-Gesetz"
 USA_Hobbs_Anti_Racketeering_Act_desc:0 "Wir werden Kriegsgewinnler weiter unterbinden, indem wir Korruption in unserer aufstrebenden Rüstungsindustrie stärker bestrafen."
