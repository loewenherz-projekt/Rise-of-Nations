USAAH_empower_the_military:0 "Stärken Sie das Militär"
USAAH_empower_the_military_desc:0 "Die Zeit für einen Wandel ist gekommen. Jemand muss endlich etwas gegen diese dumme Demokratie-Sache unternehmen. Wir beginnen damit, dem Militär mehr Macht zu geben."
USAAH_suspend_elections:0 "Wahlen aussetzen"
USAAH_suspend_elections_desc:0 "Freie Wahlen waren ein Fehler. Wir müssen diesen Unsinn jetzt korrigieren, um sicherzustellen, dass in unserer Regierung keine Sonderlinge die Macht übernehmen."
USAAH_destroy_the_ideals_of_the_enlightment:0 "Zerstöre die Ideale der Aufklärung"
