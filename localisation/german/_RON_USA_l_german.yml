RON_American_Questions.1.t:0 "[From.GetNameDefCap] lädt [Root.GetNameDef] zum [From.GetFactionName] ein"
RON_American_Questions.1.d:0 "Die amerikanischen Staaten haben uns eingeladen, ihrer Fraktion beizutreten. Wenn wir die Einladung annehmen, erhöhen sich unsere Chancen, die stärkste kommunistische Macht der Welt zu werden."
RON_American_Questions.1.a:0 "Die kommunistischen amerikanischen Länder werden stärker werden!"
RON_American_Questions.1.b:0 "Nein, danke, kommunistischer Abschaum"
RON_American_Questions.2.t:0 "[From.GetLeader] Akzeptiert unseren Vorschlag."
RON_American_Questions.2.d:0 "[From.GetLeader] hat den Vorschlag angenommen, unserer Fraktion beizutreten und uns in zukünftigen Kriegen zu unterstützen."
RON_American_Questions.2.a:0 "Vielen Dank, [From.GetLeader]."
RON_American_Questions.3.t:0 "[From.GetNameDef] lehnt das Angebot ab"
RON_American_Questions.3.d:0 "[From.GetNameDef] hat unser Angebot zur Fraktionsmitgliedschaft abgelehnt. Uns ist nun klar, dass die Regierungspolitik von [From.GetNameDef] einer Anpassung bedarf …“" 
RON_American_Questions.3.a:0 "Es wird Blut fließen ..."
 
