 USA_political_chaos:0 "Politisches Chaos"
 USA_political_chaos_desc:0 "In Kürze werden einige Dokumente von den Medien veröffentlicht, die offenbar vom FBI stammen und die behaupten, unser „lieber“ Präsident Franklin Delano Roosevelt stecke hinter der Ermordung von Huey Long im vergangenen September.\nRufe „Verwüstung“ und lass die Hunde des Krieges los …"
