CAN_independence_struggle_category_usa:0 "Unabhängigkeit Kanadas"
CAN_independence_struggle_category_usa_desc:0 "Das Tauziehen zwischen Großbritannien und den USA um die Unabhängigkeit Kanadas verschärft sich. Beide Nationen versuchen, ihren Einfluss geltend zu machen, um ihren Sympathisanten Machtpositionen zu verschaffen und die Unterstützung der Bevölkerung zu gewinnen... \n\n"
CAN_independence_struggle_category_eng:0 "Unabhängigkeit Kanadas"
CAN_independence_struggle_category_eng_desc:0 "Das Tauziehen zwischen Großbritannien und den USA um die Unabhängigkeit Kanadas verschärft sich. Beide Nationen versuchen, ihren Einfluss geltend zu machen, um ihren Sympathisanten Machtpositionen zu verschaffen und die Unterstützung der Bevölkerung zu gewinnen... \n\n"
