#Alt History Events
RI_infrastructure_spending:0 "Infrastrukturausgaben"
RI_infrastructure_spending_desc:0 "Infrastruktur umfasst die Gesamtheit grundlegender Einrichtungen und Systeme, die die nachhaltige Funktionsfähigkeit von Haushalten und Unternehmen gewährleisten. Sie dient einem Land, einer Stadt oder einem anderen Gebiet und umfasst die für das Funktionieren der Wirtschaft notwendigen Dienstleistungen und Einrichtungen. Infrastruktur besteht aus öffentlichen und privaten physischen Strukturen wie Straßen, Eisenbahnen, Brücken, Tunneln, Wasserversorgung, Kanalisation, Stromnetzen und Telekommunikation (einschließlich Internet- und Breitbandzugang). Im Allgemeinen wird Infrastruktur definiert als „die physischen Komponenten miteinander verbundener Systeme, die Güter und Dienstleistungen bereitstellen, die für die Ermöglichung, Aufrechterhaltung oder Verbesserung der gesellschaftlichen Lebensbedingungen“ und für die Erhaltung der umgebenden Umwelt unerlässlich sind."
RI_infrastructure_airbase_spending:0 "Ausgaben für die Infrastruktur von Luftwaffenstützpunkten"
RI_infrastructure_airbase_spending_desc:0 "Infrastruktur umfasst die Gesamtheit grundlegender Einrichtungen und Systeme, die die nachhaltige Funktionsfähigkeit von Haushalten und Unternehmen gewährleisten. Sie dient einem Land, einer Stadt oder einem anderen Gebiet und umfasst die für das Funktionieren der Wirtschaft notwendigen Dienstleistungen und Einrichtungen. Infrastruktur besteht aus öffentlichen und privaten physischen Strukturen wie Straßen, Eisenbahnen, Brücken, Tunneln, Wasserversorgung, Kanalisation, Stromnetzen und Telekommunikation (einschließlich Internet- und Breitbandzugang). Im Allgemeinen wird Infrastruktur definiert als „die physischen Komponenten miteinander verbundener Systeme, die Güter und Dienstleistungen bereitstellen, die für die Ermöglichung, Aufrechterhaltung oder Verbesserung der gesellschaftlichen Lebensbedingungen“ und für die Erhaltung der umgebenden Umwelt unerlässlich sind."
