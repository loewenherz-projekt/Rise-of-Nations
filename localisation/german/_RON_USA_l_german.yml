eoanbm.1.title:0 "Bau des Panamakanals"
eoanbm.1.desc:0 "Wir müssen entscheiden, wie viele Mittel wir für den Bau des Kanals bereitstellen"
eoanbm.1.a:0 "Große Ressourcenzuweisung"
eoanbm.1.b:0 "Mittlere Ressourcenzuweisung"
eoanbm.1.c:0 "Geringe Ressourcenzuweisung"
eoanbm.2.title:0 "Kolumbien-Rebellion"
eoanbm.2.desc:0 "Unsere Geheimdienstinformationen haben sich als richtig erwiesen: Das kolumbianische Volk hat sich erhoben und die Unabhängigkeit erklärt! Was sollen wir tun?"
eoanbm.2.a:0 "Lasst sie in Ruhe, wenn die Amerikaner eingreifen, werden wir sie nicht zurücknehmen können"
eoanbm.2.b:0 "Wir müssen unser verlorenes Territorium zurückerobern"
eoanbm.3.title:0 "Kolumbianische Intervention!"
eoanbm.3.desc:0 "Kolumbien hat beschlossen, den Aufstand in Panama niederzuschlagen. Was sollten wir tun, um dies zu verhindern?"
eoanbm.3.a:0 "Wir müssen Panama um jeden Preis schützen"
eoanbm.3.b:0 "Wir haben andere Angelegenheiten zu erledigen"
eoanbm.4.title:0 "William McKinley erschossen!"
eoanbm.4.desc:0 "Am ersten Tag der Panamerikanischen Ausstellung hielt William eine viel beachtete Rede, in der er seine Wirtschaftstheorie des Freihandels vorstellte und die ihm viel Beifall und Unterstützung vom 50.000-köpfigen Publikum einbrachte. Alles schien vielversprechend für ihn und das Land. Doch am nächsten Tag, nachdem er mit seiner Frau die Niagarafälle besucht hatte, ignorierte er die Warnungen seines persönlichen Sekretärs und schüttelte weiterhin den Anwesenden die Hand. Tragischerweise kam es zur Katastrophe, als ein Anarchist namens Leon Czolgosz, einen Revolver in seinem Schweißtuch versteckt, beim Versuch, McKinley die Hand zu schütteln, seine Waffe zeigte und zwei Schüsse abfeuerte – einer streifte McKinleys Hemd, der andere traf seinen Bauch."
eoanbm.4.a:0 "Oh, die Schrecken!"
eoanbm.5.title:0 "Die Philippinen bitten um unsere Hilfe"
eoanbm.5.desc:0 "Auf den Philippinen hat es einen Aufstand gegeben und die Rebellen bitten uns um Hilfe. Vielleicht sollten wir diesen Aufstand finanzieren, um"
eoanbm.5.a:0 "Finanziere die Rebellion"
eoanbm.5.b:0 "Wir sollten gute Beziehungen zum Westen pflegen"
eoanbm.6.title:0 "Die Vereinigten Staaten schicken uns einen Vertrag!"
eoanbm.6.desc:0 "Die Vereinigten Staaten haben uns einen Vertrag vorgelegt, in dem sie um Ratifizierung bitten und uns die rechtliche Erlaubnis zum Bau eines Kanals durch ganz Panama erteilen. Der Bau dieses Kanals wird uns den Zugang zu einfacheren Handelsrouten ermöglichen."
eoanbm.6.a:0 "Unterzeichnen Sie den Vertrag"
eoanbm.6.b:0 "Den Vertrag ablehnen"
eoanbm.7.title:0 "Der Galveston-Hurrikan"
eoanbm.7.desc:0 "Der Galveston-Hurrikan, auch bekannt als der große Sturm von 1900, ist zu einem der tödlichsten Hurrikane in der amerikanischen Geschichte geworden und hat bis zu 12.000 Menschenleben gefordert und viele Häuser zerstört."
eoanbm.7.a:0 "Oh, die Schrecken!"
eoanbm.8.title:0 "Panama bietet Panamakanalzone an"
eoanbm.8.desc:0 "Jetzt, da Panama seine Unabhängigkeit erlangt hat und das Vereinigte Königreich den Vertrag akzeptiert hat, können wir mit dem Bau eines Kanals beginnen"
eoanbm.8.a:0 "Großartig!"
eoanbm.9.title:0 "Beginn eines neuen Jahrhunderts"
eoanbm.9.desc:0 "Zu Beginn eines neuen Jahrhunderts steht Präsident „William McKinley“ an der Spitze einer Nation im Wandel. Während seiner Amtszeit hat „Amerika“ nicht nur „neue Gebiete erobert“, sondern auch die Mexikaner und Spanier im Kampf besiegt und sich von Küste zu Küste ausgebreitet. Präsident McKinley hat sich für „wirtschaftliches Wachstum“ eingesetzt, neue Märkte für amerikanische Waren erschlossen und eine Phase beispiellosen „industriellen Wachstums“ eingeleitet. Seine Führung führte zur Verabschiedung des „Dingley Tariff Act“, der die amerikanische Industrie schützt und Wohlstand sichert. Darüber hinaus wurde unter McKinleys Regierung der „Gold Standard Act“ verabschiedet, der die nationale Wirtschaft stabilisierte. Mit Blick auf diese Erfolge bereitet sich McKinley auf die bevorstehende Wahl vor. Er ist sich bewusst, dass mit großem Fortschritt auch neue Herausforderungen einhergehen und die Entscheidungen der kommenden Monate die Zukunft des Landes prägen werden. Der Präsident weiß, dass das amerikanische Volk von ihm Stabilität und Visionen erwartet. Den Blick auf den Horizont gerichtet, blickt McKinley über den vor ihm liegenden Weg. Die Wahl rückt näher, ein entscheidender Moment, der Amerikas Zukunft bestimmen wird. Als er sich an die Nation wendet, schwingen seine Worte mit tiefer Zielstrebigkeit und Optimismus mit. „Wir sind weit gekommen“, erklärt er, „aber unsere Reise ist noch nicht zu Ende. Gemeinsam werden wir uns den Herausforderungen dieses neuen Jahrhunderts mit demselben Mut und derselben Entschlossenheit stellen, die uns hierher gebracht haben.“ Die bevorstehende Wahl belastet ihn schwer. McKinley weiß, dass das amerikanische Volk bald entscheiden wird, ob es den von ihm eingeschlagenen Weg des Fortschritts und der Stabilität fortsetzen will. Der Wahlkampf wird beschwerlich sein, voller Debatten, Kundgebungen und der unerbittlichen Beobachtung der Presse. McKinley hofft sehnsüchtig auf die Unterstützung der Wählerschaft, glaubt an die Stärke seiner Politik und das Versprechen einer besseren Zukunft. Er stellt sich eine Nation vor, die in ihrer Zielstrebigkeit vereint ist, bereit, Innovationen anzunehmen und die Werte hochzuhalten, die Amerika groß gemacht haben. Auch als der Wahltag näher rückt, bleibt McKinley standhaft und unerschütterlich. Die Geschichte von „Amerika“ geht weiter, und unter McKinleys Führung wird das nächste Kapitel aufgeschlagen. Die Nation wartet mit angehaltenem Atem und ist bereit, die Zukunft anzunehmen."


eoanbm.9.a:0 "Okay"
eoanbm.10.title:0 "Vereinigte Staaten gegen Standardöl"
eoanbm.10.desc:0 "Der Gerichtsprozess USA gegen Standard Oil beginnt in Kürze"
eoanbm.10.a:0 "Okay"
eoanbm.11.title:0 "Gericht entscheidet zugunsten von Standard Oil"
eoanbm.11.desc:0 "Der Oberste Gerichtshof der USA hat zugunsten der Standard Oil Company entschieden. Richter John Marshall Harlan erklärte, eine Verurteilung würde Standard Oil zu einer vertikalen Integration durch Agenturen oder durch den vollständigen Besitz der Tankstellen drängen. Nach der damals vorherrschenden Rechtsauffassung unterlägen solche Arten der Unternehmensintegration „einem wesentlich milderen Kartellrecht als die Vertragsintegration“. Die Folge wäre, dass Unternehmer zu Angestellten würden, was zu einer Verwässerung der „lokalen Führung“ und einem „schweren Verlust an Bürgerrechten“ für das „Dorf“ führe."
eoanbm.11.a:0 "Fall abgeschlossen"
eoanbm.12.title:0 "Gericht entscheidet zugunsten der USA"
eoanbm.12.desc:0 "Das historische Gerichtsurteil vom heutigen Tag wird die Vereinigten Staaten für immer verändern, da das Gericht zugunsten der Vereinigten Staaten entschied und feststellte, dass Standard Oil „der Monopolisierung der Erdölindustrie durch eine Reihe missbräuchlicher und wettbewerbswidriger Handlungen schuldig“ sei. Damit wird die Standard Oil Company in 34 Nachfolgeunternehmen aufgelöst und mit dem Urteil ist die Monopolisierung amerikanischer Unternehmen offiziell beendet."
eoanbm.12.a:0 "Hurra"
eoanbm.13.title:0 "Der Hay-Pauncefote-Vertrag wurde im US-Senat ratifiziert"
eoanbm.13.desc:0 "Der Hay-Pauncefote-Gesetzentwurf wurde vom US-Senat verabschiedet und erlaubt den USA den Bau eines Kanals durch die Panamastraße mit folgenden Bestimmungen: (1) Der Kanal wird von den Vereinigten Staaten oder unter ihrer Leitung gebaut. 2. Der Kanal soll auf Grundlage des Suezkanal-Abkommens dauerhaft neutralisiert werden – er soll jederzeit, im Krieg wie im Frieden, für alle Schiffe ohne Diskriminierung offen gehalten werden und es sollen keine Befestigungen errichtet werden, die den Kanal oder die angrenzenden Gewässer beherrschen. 3. Andere Mächte sollen eingeladen werden, sich dieser Neutralitätsgarantie anzuschließen."
eoanbm.13.a:0 "Hoffen wir, dass das Vereinigte Königreich den Vertrag akzeptiert!"
eoanbm.14.title:0 "Besetzung Kolumbiens"
eoanbm.14.desc:0 "Die amerikanische Armee ist erfolgreich in Kolumbien einmarschiert. Jetzt müssen wir entscheiden, was wir mit unserem neu erworbenen Land tun sollen."
eoanbm.14.a:0 "Rückgabe kolumbianischen Territoriums bei gleichzeitiger Belassung der Unabhängigkeit Panamas"
eoanbm.14.b:0 "Installieren Sie eine Demokratie in Kolumbien"
eoanbm.14.c:0 "Besetzen Sie weiterhin kolumbianisches Territorium"
eoanbm.15.title:0 "Das Ende des amerikanischen Wirtschaftsisolationismus"
eoanbm.15.desc:0 "Amerika hat seinen wirtschaftlichen Isolationismus offiziell beendet. William McKinley versprach, den amerikanischen Isolationismus zu beenden und Freihandelsabkommen mit vielen europäischen und amerikanischen Ländern zu schließen."
eoanbm.15.a:0 "Okay"
eoanbm.16.title:0 "USA ziehen Truppen von den Philippinen ab"
eoanbm.16.desc:0 "Die USA haben heute ihren Truppenabzug von den Philippinen angekündigt. Der US-Präsident begründete den Abzug mit der „geringe Unterstützung der Bevölkerung“ und der schweren Misshandlung der Einheimischen während des Krieges."
eoanbm.16.a:0 "Verstanden"
eoanbm.17.title:0 "Amerika wird die Philippinen zu einer Freihandelsrepublik machen"
eoanbm.17.desc:0 "Die Philippinen werden nun als Freihandelsgebiet weiterbestehen! Ein Ort, mit dem alle Länder freien Handel treiben können und der niemals Embargos verhängen wird!"
eoanbm.17.a:0 "Verstanden"
eoanbm.18.title:0 "Deutsches Freundschaftsgesetz"
eoanbm.18.desc:0 "Amerika hat heute ein Gesetz namens „German Friendship Act“ verabschiedet, in dem es seine Bereitschaft zum Ausdruck bringt, dem Deutschen Reich und allen seinen Verbündeten zu helfen. Was wird dieses Gesetz bewirken?"
eoanbm.18.a:0 "Schließen Sie einen Verteidigungspakt mit Deutschland ab"
eoanbm.18.b:0 "Lassen Sie uns direkt der Fraktion beitreten"
eoanbm.18.c:0 "Pflegen Sie enge Beziehungen, es sind keine weiteren Maßnahmen erforderlich"
eoanbm.19.title:0 "Freundschaftsakt Großbritannien"
eoanbm.19.desc:0 "Die Vereinigten Staaten haben ihren Wunsch zum Ausdruck gebracht, sich mit Großbritannien zu verbünden, indem sie den Great Britain Friendship Act verabschiedeten. Heute ist ein historischer Tag in der amerikanischen Geschichte, an dem Amerika Großbritannien seine Unterstützung anbietet. Was soll das Gesetz bewirken?"
eoanbm.19.a:0 "Schließen Sie einen Verteidigungspakt mit dem Vereinigten Königreich ab"
eoanbm.19.b:0 "Schlagen Sie vor, wir gründen eine Fraktion"
eoanbm.19.c:0 "Pflegen Sie enge Beziehungen, es sind keine weiteren Maßnahmen erforderlich"
eoanbm.20.title:0 "Die Vereinigten Staaten schlagen vor, dass wir mit ihnen einen Verteidigungspakt schließen"
eoanbm.20.desc:0 "Die Vereinigten Staaten haben den Wunsch geäußert, einen Verteidigungspakt mit uns zu schließen, und sogar ein Gesetz verabschiedet, das unsere Unabhängigkeit garantiert, falls wir jemals in einen Verteidigungskrieg geraten. Sollten wir uns im Gegenzug revanchieren?"
eoanbm.20.a:0 "Sie haben unsere Garantie"
eoanbm.20.b:0 "Wir möchten lieber nicht"
eoanbm.21.title:0 "Das Deutsche Reich lehnt unsere Garantie ab"
eoanbm.21.desc:0 "Das Deutsche Reich hat unsere Garantie der Zwecklosigkeit mit der Begründung abgelehnt: „Das Deutsche Reich wünscht keine Hilfe aus Amerika. Was sollen wir als nächstes tun?“"
eoanbm.21.a:0 "Wir werden unseren Pakt woanders hinführen"
eoanbm.21.b:0 "Wir werden unseren Rivalen Großbritannien eine Garantie bieten"
eoanbm.22.title:0 "Die Vereinigten Staaten bieten uns eine Garantie"
eoanbm.22.desc:0 "Trotz ihrer Aggressivität uns gegenüber scheinen die Amerikaner eher einen Groll gegen das Deutsche Reich zu hegen. Sie haben hiermit erklärt, dass sie uns im Kriegsfall schützen werden. Weitere Maßnahmen sind nicht erforderlich."
eoanbm.22.a:0 "Okay"
eoanbm.23.title:0 "Die Vereinigten Staaten schlagen vor, dass wir mit ihnen einen Verteidigungspakt schließen!"
eoanbm.23.desc:0 "Die USA haben uns vorgeschlagen, einen Verteidigungspakt mit ihnen zu schließen. Was sollten wir tun?"
eoanbm.23.a:0 "Akzeptiere den Pakt"
eoanbm.23.b:0 "Den Pakt ablehnen"
eoanbm.24.title:0 "USA wollen eine Fraktion bilden"
eoanbm.24.desc:0 "Die Vereinigten Staaten haben die Gründung einer europäischen Fraktion gefordert, um Stabilität und Ordnung in Europa und Amerika aufrechtzuerhalten und einen „ewigen Frieden“ zu gewährleisten."
eoanbm.24.a:0 "Wir werden eine Fraktion gründen"
eoanbm.24.b:0 "Wir werden auf eigenen Beinen stehen"
eoanbm.25.title:0 "Amtsantritt von Teddy Roosevelt"
eoanbm.25.desc:0 "Nach dem Tod von William McKinley schockierte die Nation sein Vizepräsident Teddy Roosevelt hat sein Amt angetreten und ist nun der neue Präsident der Vereinigten Staaten"
eoanbm.25.a:0 "Verstanden"
eoanbm.26.title:0 "Der Verfassungskonvent von Sequoyah"
eoanbm.26.desc:0 "Der Sequoyah Constitutional Convention fand heute statt. Obwohl erfolglos, wird er dem Staat Sequoyah den Weg zur Eigenstaatlichkeit ebnen. Bei dieser Versammlung wurde das Territorium abgegrenzt und die offiziellen Grenzen festgelegt. Der Staat wird sehr bald in die Union aufgenommen!"
eoanbm.26.a:0 "Tolle Neuigkeiten!"
eoanbm.27.title:0 "Oklahoma-Ermächtigungsgesetz"
eoanbm.27.desc:0 "Der Oklahoma Enabling Act war ein Gesetz, das dem neuen Territorium Oklahoma offiziell das Recht gab, Delegierte zu wählen und abzustimmen. Der Weg zur Eigenstaatlichkeit ist fast geebnet!"
eoanbm.27.a:0 "Okay"
eoanbm.28.title:0 "Oklahoma wurde in die Union aufgenommen!"
eoanbm.28.desc:0 "Heute in der Geschichte: Oklahoma ist offiziell ein US-Bundesstaat geworden. Damit profitiert der Staat von der Möglichkeit, Delegierte zu wählen und genießt die vollen verfassungsmäßigen Rechte des Territoriums. Die Aufnahme wird dem Staat außerdem einen Bevölkerungs- und Wirtschaftsschub bescheren, was unserer Gesellschaft nachhaltig zugutekommt!"
eoanbm.28.a:0 "Großartig"
eoanbm.29.title:0 "Das Elkins Anti-Rabatt-Gesetz"
eoanbm.29.desc:0 "Der Elkins Act wurde als Änderung des Interstate Commerce Act von 1887 verabschiedet. Das Gesetz ermächtigte die Interstate Commerce Commission, Eisenbahnen, die Rabatte anboten, sowie den Spediteuren, die diese Rabatte akzeptierten, hohe Geldstrafen aufzuerlegen."
eoanbm.29.a:0 "Okay"
eoanbm.30.title:0 "Ende der Eisenbahnrabatte"
eoanbm.30.desc:0 "Mit der Verabschiedung des Hepburn Act und des Elkins Anti-Rebate Act werden die Eisenbahngesellschaften nicht mehr in der Lage sein, ihre Kunden zu monopolisieren und unfaire Rabatte anzubieten. Es ist ein wahrhaft goldenes Zeitalter für Amerika."
eoanbm.30.a:0 "Okay"
eoanbm.31.title:0 "Kommunisten stürmen das Weiße Haus!"
eoanbm.31.desc:0 "Kommunistische Revolutionäre haben das Weiße Haus gestürmt! Präsident [Root.GetLeader] und sein Stab haben sich ohne offizielle Stellungnahme aus dem Gebäude zurückgezogen, doch die Zukunft Amerikas ist ungewiss …"
eoanbm.31.a:0 "Die Zukunft Amerikas ist ungewiss …"
eoanbm.32.title:0 "[Root.GetLeader] von Revolutionär erschossen"
eoanbm.32.desc:0 "Präsident [Root.GetLeader] wurde auf dem Weg zu einer Rede zur Belagerung des Weißen Hauses von Kommunisten erschossen! Die Zukunft Amerikas scheint ungewiss, da die kommunistischen Revolutionäre eine neue Regierung im Weißen Haus eingesetzt haben."
eoanbm.32.a:0 "Tolle Neuigkeiten!"
eoanbm.33.title:0 "[Root.GetLeader] Rede zu diesem Tag in Amerika"
eoanbm.33.desc:0 "[Root.GetLeader] hat eine Rede mit dem Titel „This day in america“ gehalten, in der er die aktuelle Situation und seine Pläne erläutert, das Weiße Haus zurückzuerobern und den kommunistischen Revolutionären ein Ende zu setzen."
eoanbm.33.a:0 "Wenn er einen Kampf will, wird er ihn auch bekommen!"
eoanbm.34.title:0 "Wahlen von 1900"
eoanbm.34.desc:0 "Die Wahlen von 1900 finden heute statt. William McKinley tritt zur Wiederwahl an und tritt gegen William Jennings Bryan an! Wer wird die Wahl gewinnen?"
eoanbm.34.a:0 "William McKinley gewinnt Wiederwahl"
eoanbm.34.b:0 "William Jennings Bryan gewinnt die Wahl!"
eoanbm.35.title:0 "Bau des Panamakanals abgeschlossen!"
eoanbm.35.desc:0 "Der Kanal wurde erfolgreich gebaut und ist bereit zur Eröffnung! Dadurch können Ressourcen frei durch den Kanal fließen und uns einen einfacheren Zugang zum Meer ermöglichen."
eoanbm.35.a:0 "Großartig!"
eoanbm.36.title:0 "Die Gebrüder Wright starten den ersten erfolgreichen Flugzeugflug!"
eoanbm.36.desc:0 "An diesem Tag bauten die Gebrüder Wright die erste erfolgreiche Flugmaschine. Dies war ein bedeutender Fortschritt in der Flugtechnik und wird noch zum 100. Jahrestag in Erinnerung bleiben. Die Flugmaschine hatte ein Holzgestell und eine Flügelspannweite von 12,3 Metern. Die Flugmaschine hieß Wright Flyer 1 und der Erstflug dauerte 12 Sekunden."
eoanbm.38.title:0 "McKinleys zweite Antrittsrede"
eoanbm.38.desc:0 "An einem frischen Märzmorgen [GetDateText] steht Präsident §RWilliam McKinley§! vor dem Kapitol, bereit, seine zweite Antrittsrede zu halten. Die Menge versammelt sich, gespannt auf die Worte eines Führers, der die Nation durch Triumphe und Herausforderungen geführt hat. McKinley beginnt seine Rede mit fester und ruhiger Stimme: „§W Meine lieben Mitbürger, als wir uns hier am 4. März 1897 versammelten, herrschte große Sorge hinsichtlich unserer Währung und Kreditwürdigkeit. Heute gibt es nichts mehr davon. Damals reichten unsere Staatseinnahmen nicht aus, um die laufenden Verpflichtungen der Regierung zu erfüllen. Heute reichen sie für alle öffentlichen Bedürfnisse aus, und wir haben einen Überschuss statt eines Defizits. §!§G Wir haben Fortschritte gemacht bei der großen Aufgabe, die Interessen unseres Volkes zu fördern und die Zivilisation der Welt voranzubringen.“ §!‘Während McKinley spricht, denkt er über die Errungenschaften seiner ersten Amtszeit nach: den Sieg im Spanisch-Amerikanischen Krieg, die Ausweitung der amerikanischen Gebiete und die Schaffung wirtschaftlicher Stabilität durch den Gold Standard Act. Seine Vision für die Zukunft ist klar und ehrgeizig.‘§W Das amerikanische Volk, zu Hause in der Freiheit verwurzelt, trägt seine Liebe dafür überallhin mit sich und weist die Doktrin, dass wir unsere eigenen Freiheiten verlieren, wenn wir die dauerhaften Grundlagen von Recht und Ordnung sichern, als falsch und unwürdig zurück. §!§W Unsere Pflichten in diesen neuen Gebieten erlegen uns die Verantwortung auf, ihnen die Segnungen der Freiheit, der Bildung und der freien Institutionen zukommen zu lassen. §!‘Die Menge hört aufmerksam zu, inspiriert von McKinleys Entschlossenheit und Optimismus. Seine Worte finden tiefen Nachhall, sie versprechen anhaltenden Wohlstand und ein unerschütterliches Bekenntnis zu den amerikanischen Idealen. In seinem Schlusswort ist ein Gefühl der Hoffnung und Entschlossenheit spürbar: „Mit erneuertem Vertrauen in unsere freien Institutionen und einem unerschütterlichen Glauben an ihre Ewigkeit wollen wir unsere Pflichten erfüllen und am amerikanischen Geist festhalten.“ Der Applaus ist tosend. McKinleys Antrittsrede bekräftigt nicht nur seine Hingabe an die Nation, sondern gibt auch den Ton für das nächste Kapitel Amerikas unter seiner Führung an."
eoanbm.37.desc:0 "Vor dem Hintergrund einer Nation im Wandel geht Präsident „William McKinley“ als Sieger aus der Wahl hervor und sichert sich eine weitere Amtszeit, um „Amerika“ ins neue Jahrhundert zu führen. Die Entscheidung der Wählerschaft ist ein Beweis für ihr Vertrauen in seine Führung und Vision. Während seiner vorherigen Amtszeit erlebte McKinley, wie „Amerika“ seine Territorien erweiterte und sowohl die Mexikaner als auch die Spanier im Kampf besiegte, wodurch Amerikas Präsenz von Küste zu Küste gefestigt wurde. Seine Regierung förderte das Wirtschaftswachstum, gekennzeichnet durch die Verabschiedung des „Dingley Tariff Act“, der die amerikanische Industrie schützte, und des „Gold Standard Act“, der die Wirtschaft stabilisierte. McKinleys Wiederwahl zeigt die Zustimmung der Nation zu seiner Politik und ihre Hoffnung auf anhaltenden Wohlstand. In seiner Ansprache an die Nation ist seine Botschaft klar und entschlossen: „Unsere Reise ist noch lange nicht zu Ende“, erklärt er. „Gemeinsam haben wir viel erreicht, aber es bleibt noch mehr zu tun.“ Mit Ihrer Unterstützung werden wir weiterhin ein stärkeres und wohlhabenderes Amerika aufbauen. Die Siegesfeier gilt nicht nur McKinley, sondern allen Amerikanern, die an die Verheißung einer besseren Zukunft glauben. Die Nation freut sich auf anhaltende Stabilität und Wachstum unter McKinleys unerschütterlicher Führung. Die Geschichte von „Amerika“ geht weiter, und unter McKinleys Führung ist das nächste Kapitel voller Versprechen und Potenzial."
eoanbm.38.a:0 "Willkommen, Präsident §RWilliam McKinley§!"
eoanbm.38.a:0 "Der alte Wächter hält"
USADNC.1.t:0 "Die Philippinen kapitulieren!"
USADNC.1.d:0 "Die Vereinigten Staaten haben einen weiteren Sieg errungen! Nach drei Jahren des Kampfes verkündete die Regierung der Philippinen ihre bedingungslose Kapitulation vor der Regierung der Vereinigten Staaten. Obwohl es so aussieht, als sei der Sieg errungen, ist die Region noch nicht stabil und die lokale Bevölkerung misstraut den amerikanischen Befreiern. Wir müssen bald unsere Politik in Bezug auf die Besatzung der Philippinen neu ordnen. Doch bevor uns das gelingt, müssen wir einen weiteren militärischen Feind besiegen: die Tagalog-Republik. Die Tagalog-Republik wurde von den Katipunan gegründet, einer philippinischen Revolutionsbewegung, die ursprünglich zum Aufstand gegen die spanischen Kolonialherren aufrief, sich heute aber der amerikanischen Besatzung widersetzt. Trotz der Kapitulation der philippinischen Regierung sind die Kämpfe noch lange nicht vorbei."
USADNC.1.a:0 "Beschäftige sie eine Zeit lang."

USADNC.2.t:0 "Die Goldfrage"
USADNC.2.d:0 "Seit dem Ende des Bürgerkriegs zweifeln viele Amerikaner an der Notwendigkeit und Wirksamkeit des Goldstandards. Einst eine solide und stabile Institution im US-Finanzsystem, gerät er nun in scharfe Kritik der progressiveren Parteien, vor allem der People&#39;s Party (die inzwischen in der Demokratischen Partei aufgegangen ist) unter William Jennings Bryan. Seit seinem Ausruf von 1896: „Du sollst die Menschheit nicht an ein goldenes Kreuz schlagen“, befürworten Politiker im ganzen Land die Haltung des Bimetallismus: Sie befürworten eine Abwertung des Dollars durch einen Zweimetallstandard: Gold und Silber. Letztere Haltung ist unter den verschuldeten US-Amerikanern, überwiegend Landwirten, beliebt. Sie befürworten sowohl eine Abkehr vom Goldstandard als auch eine deutliche Senkung der Zölle und gehören zu den lautstärksten Stimmen in den USA, die sich für „freies Silber“ und andere Wirtschaftsreformen einsetzen. Auf der anderen Seite stehen die Industriellen des Ostens, die überzeugte Hardliner sind und den Goldstandard zur Durchsetzung ihrer finanziellen Interessen beibehalten wollen. Trotz seiner Niederlage im Jahr 1896 bleiben William Jennings Bryan und die Demokratische Partei nach wie vor der Forderung nach freiem Silber in den Vereinigten Staaten verpflichtet, während das republikanische Establishment einen solchen Kurs strikt ablehnt. Da der Goldstandard Act jeden Tag im Kongress eingebracht werden soll, beginnt die Debatte über dieses historische Thema und die vielleicht prägendste Politik der Vereinigten Staaten für das nächste halbe Jahrhundert."
USADNC.2.a:0 "Ein Kampf der Titanen."

USADNC.3.t:0 "Der Goldstandard Act"
USADNC.3.d:0 "Der Gold Standard Act ist ein wichtiges Gesetz, das die US-Wirtschaft stabilisieren soll, indem Gold als alleiniger Standard für die Einlösung von Papiergeld etabliert wird. Dieses Gesetz würde die Bimetallismus-Debatte beenden, indem es den US-Dollar endgültig durch Gold gedeckt und so ein stabiles und zuverlässiges Währungssystem gewährleistet. Befürworter argumentieren, dass es das Vertrauen der Anleger stärken, die Inflation eindämmen und Amerikas wirtschaftliche Stellung weltweit festigen wird. Gegner hingegen befürchten, dass es die geldpolitische Flexibilität einschränken und diejenigen benachteiligen könnte, die Silber als Währungsstandard bevorzugen. Die Entscheidung über dieses Gesetz wird die Zukunft der amerikanischen Finanzpolitik und der wirtschaftlichen Stabilität prägen."
USADNC.3.a:0 "Wir beginnen mit der Abstimmung."


USADNC.4.t:0 "Amtseinführung von William McKinley"
USADNC.4.d:0 "Beschreibung erforderlich."
USADNC.4.a:0 "Amerika ist wieder sicher."

USADNC.5.t:0 "Die Bürgerrechtsfrage"
USADNC.5.d:0 "Beschreibung erforderlich."
USADNC.5.a:0 "Lösen Sie das Problem sofort."
USADNC.5.b:0 "Wir haben größere Probleme."

USADNC_republican_campaign_decisions.1.t:0 "Kampagne in den südwestlichen Zentralstaaten ist ein Erfolg!"
USADNC_republican_campaign_decisions.1.d:0 "Nach [Root.GetLeader]s jüngstem Wahlkampf in den südwestlichen Zentralstaaten verzeichneten Umfragen einen deutlichen Anstieg der Unterstützung für den Präsidentschaftskandidaten. Große Menschenmengen besuchten Kundgebungen in Dallas, Houston, New Orleans und Little Rock, während [Root.GetLeader] die Staaten in seiner persönlichen Lokomotive durchquerte – eine Reise, die an einen Cowboyfilm erinnerte."
USADNC_republican_campaign_decisions.1.a:0 "Wir sind dem Sieg einen Schritt näher gekommen."
USADNC_republican_campaign_decisions.2.t:0 "Kampagne in den südwestlichen Zentralstaaten gescheitert"
USADNC_republican_campaign_decisions.2.d:0 "Nach [Root.GetLeader]s jüngstem Wahlkampf wurde der Präsidentschaftskandidat von der Menge ausgebuht. Einige waren gekommen, um ihn zu unterstützen, die meisten nicht. Nachdem er in sein Auto gestiegen war, reihten sich die Bürger auf und buhten ihn aus, als er davonfuhr. Vielleicht kann [Root.GetLeader] ja eines Tages einen erfolgreichen Wahlkampf haben."
USADNC_republican_campaign_decisions.2.a:0 "Das nächste Mal werden wir erfolgreich sein."


