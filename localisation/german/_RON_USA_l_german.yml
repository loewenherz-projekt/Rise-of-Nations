USAAH_the_path_of_equality:0 "Der Weg der Gleichheit"
USAAH_the_path_of_equality_desc:0 "Kommunismus; die beste Erfindung seit Coca Cola. Er stellt sicher, dass jeder, egal wer er ist, wo er geboren wurde und welche Hautfarbe er hat, die gleichen Rechte hat, Zugang zu den gleichen Dingen hat und für die gleichen Dinge arbeiten kann. In unserem überlegenen kommunistischen Land wird es sicherlich keine Gier geben. Dem Durchschnittsbürger kann man das doch anvertrauen, oder?"
USAAH_send_commissaries_into_the_army:0 "Schicken Sie Kommissare zur Armee"
USAAH_send_commissaries_into_the_army_desc:0 "In unserer zukünftigen Kommunalarmee muss es Unterstützung für den Kommunismus geben, sonst wird es kein kommunistisches Amerika geben."
