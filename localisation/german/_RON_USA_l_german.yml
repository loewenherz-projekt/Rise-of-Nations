 USA_National_Science_Foundation_Act:0 "Bundesförderung für wissenschaftliche Forschung"
 USA_National_Science_Foundation_Act_desc:0 "Wir werden den National Science Foundation Act verabschieden, der den Prozess formalisiert, mit dem Bundesmittel für wissenschaftliche Studien und Forschung im ganzen Land bereitgestellt werden."
