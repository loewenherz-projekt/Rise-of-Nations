RON_American_Alt_History.2005.t:0 "Operation Rotbart"
RON_American_Alt_History.2005.d:0 "Amerika schlägt eine Invasion der Sowjetunion vor. Das europäische Russland bis zum Ural soll unter Deutschland, Polen, Rumänien und Finnland aufgeteilt werden, die Türkei erhält einen Teil des Kaukasus, Japan und Amerika den Rest. Zwischen dem Ural und Sibirien könnte ein neutraler russischer Pufferstaat entstehen. Operation Rotbart ist der Deckname für die Invasion der Sowjetunion durch Amerika und die meisten seiner Achsenmächte. Sie soll beginnen, sobald die Achsenmächte in Stellung sind. Benannt wurde die Operation nach Friedrich Barbarossa („Rotbart“), einem Kaiser des Heiligen Römischen Reiches und deutschen König aus dem 12. Jahrhundert. Die Operation soll das ideologische Ziel des faschistischen Amerikas umsetzen, die östliche Sowjetunion zu erobern und mit Amerikanern neu zu bevölkern. Der amerikanische Generalplan Neu-Alaska zielte darauf ab, einen Teil der eroberten Bevölkerung als Zwangsarbeiter für die Kriegsanstrengungen der amerikanischen Achsenmächte einzusetzen und gleichzeitig die in den besagten sowjetischen Gebieten vorhandenen Bodenschätze zu erobern. Ihr ultimatives Ziel ist die Schaffung von mehr Lebensraum für Amerika und die letztendliche Amerikanisierung der indigenen slawischen Völker durch die Unterdrückung der russischen Sprache. Damit dieses Bündnis zustande kommt, müssten wir zu den Grenzen von 1914 zurückkehren. Wir sollten bedenken, dass im Falle unserer Ablehnung die Wahrscheinlichkeit hoch ist, dass die Achsenmächte weitermarschieren und durch uns hindurchmarschieren."
RON_American_Alt_History.2005.a:1 "Wir werden den Kommunismus zerstören"
RON_American_Alt_History.2005.b:1 "Wir werden uns nicht einmischen"
RON_American_Alt_History.2005.c:1 "Wir verurteilen diesen Akt der Aggression"

RON_American_Alt_History.2006.t:0 "Operation Rotbart"
RON_American_Alt_History.2006.d:0 "Amerika schlägt eine Invasion der Sowjetunion vor. Das europäische Russland bis zum Ural soll unter Deutschland, Polen, Rumänien und Finnland aufgeteilt werden, die Türkei erhält einen Teil des Kaukasus, Japan und Amerika den Rest. Zwischen dem Ural und Sibirien könnte ein neutraler russischer Pufferstaat entstehen. Operation Rotbart ist der Deckname für die Invasion der Sowjetunion durch Amerika und die meisten seiner Achsenmächte. Sie soll beginnen, sobald die Achsenmächte in Stellung sind. Benannt wurde die Operation nach Friedrich Barbarossa („Rotbart“), einem Kaiser des Heiligen Römischen Reiches und deutschen König aus dem 12. Jahrhundert. Die Operation soll das ideologische Ziel des faschistischen Amerikas umsetzen, die östliche Sowjetunion zu erobern und mit Amerikanern neu zu bevölkern. Der amerikanische Generalplan Neu-Alaska zielte darauf ab, einen Teil der eroberten Bevölkerung als Zwangsarbeiter für die Kriegsanstrengungen der amerikanischen Achsenmächte einzusetzen und gleichzeitig die in den besagten sowjetischen Gebieten vorhandenen Bodenschätze zu erobern. Ihr ultimatives Ziel ist die Schaffung von mehr Lebensraum für Amerika und die letztendliche Amerikanisierung der indigenen slawischen Völker durch die Unterdrückung der russischen Sprache. Damit dieses Bündnis zustande kommen kann, müssten wir zu den Grenzen von 1914 zurückkehren."
RON_American_Alt_History.2006.a:1 "Wir werden den Kommunismus zerstören"
RON_American_Alt_History.2006.b:1 "Wir werden uns nicht einmischen"
RON_American_Alt_History.2006.c:1 "Wir verurteilen diesen Akt der Aggression"

RON_American_Alt_History.2010.t:0 "Deutschland lehnt unseren Vorschlag ab"
RON_American_Alt_History.2010.d:0 "Wir haben eine Nachricht von der deutschen Regierung erhalten, in der unser Vorschlag mit der Begründung abgelehnt wird, dass sie derzeit nicht bereit sei, nach Osten zu marschieren."
RON_American_Alt_History.2010.a:1 "Wir brauchen die Deutschen nicht"
RON_American_Alt_History.2010.b:1 "Bieten Sie Japan die Philippinen an"
RON_American_Alt_History.2010.c:1 "Operation Redbeard abbrechen"

RON_American_Alt_History.2011.t:0 "Amerika schlägt die Übergabe pazifischer Gebiete vor"
RON_American_Alt_History.2011.d:0 "Amerika schlägt vor, gemeinsam mit ihnen in die Sowjetunion einzumarschieren und dafür die Philippinen, Hawaii und andere pazifische Besitzungen zu erhalten. Das europäische Russland bis zum Ural würde unter Deutschland, Polen, Rumänien und Finnland aufgeteilt, die Türkei bekäme ein Stück des Kaukasus und Japan und Amerika würden den Rest aufteilen. Zwischen dem Ural und Sibirien könnte möglicherweise ein neutraler russischer Pufferstaat errichtet werden. Operation Rotbart ist der Codename für die Invasion der Sowjetunion durch Amerika und die meisten seiner Verbündeten innerhalb der amerikanischen Achsenmächte. Sie soll beginnen, sobald die Armeen der Achsenmächte in Stellung sind. Die Operation wurde nach Friedrich Barbarossa („Rotbart“) benannt, einem Kaiser des Heiligen Römischen Reiches und deutschen König aus dem 12. Jahrhundert. Mit der Operation sollte das ideologische Ziel des faschistischen Amerikas umgesetzt werden, die östliche Sowjetunion zu erobern und mit Amerikanern neu zu bevölkern. Der amerikanische Generalplan Neu-Alaska zielte darauf ab, einen Teil der eroberten Bevölkerung als Zwangsarbeiter für die Kriegsanstrengungen der amerikanischen Achsenmächte einzusetzen und gleichzeitig die in den besagten sowjetischen Gebieten gefundenen Bodenschätze zu erobern. Ihr ultimatives Ziel besteht darin, mehr Lebensraum für Amerika zu schaffen und durch die Unterdrückung der russischen Sprache eine Amerikanisierung der einheimischen slawischen Völker herbeizuführen."
RON_American_Alt_History.2011.a:1 "Wir werden den Kommunismus zerstören"
RON_American_Alt_History.2011.b:1 "Wir werden uns nicht einmischen"
RON_American_Alt_History.2011.c:1 "Wir verurteilen diesen Akt der Aggression"

RON_American_Alt_History.2110.t:0 "Unterzeichnen Sie einen Friedensvertrag mit der Sowjetunion"
RON_American_Alt_History.2110.d:0 "Nach einem überwältigenden Erfolg an der Ostfront, der in der Schlacht um Moskau gipfelte, ist es an der Zeit, mit der Sowjetunion zu verhandeln und diesen Krieg zu beenden. Die Sowjetunion hat um einen Verhandlungsfrieden gebeten. Zu diesem Zweck legt uns unser Außenminister zwei mögliche Friedensvorschläge vor.\n\nOption A: Wir fordern die Rückgabe der Grenzen von Brest-Litowsk an den Westen und die Abtretung eines kleinen Teils des Landes im Osten an Amerika und Japan.\n\nOption B: Wir fordern dasselbe wie Option A, mit der Ausnahme, dass Russland alle Gebiete westlich des Urals an die amerikanisch-deutsche Koalition abtritt und die amerikanischen und japanischen Gebiete in Sibirien erheblich erweitert werden."
RON_American_Alt_History.2110.a:0 "Option A"
RON_American_Alt_History.2110.b:0 "Option B"

RON_American_Alt_History.2111.t:0 "Amerika schlägt Friedensbedingungen vor"
RON_American_Alt_History.2111.d:0 "Nach einer vernichtenden Niederlage an der Ostfront, die in der verheerenden Schlacht um Moskau gipfelte, ist es an der Zeit, mit Amerika und Deutschland zu verhandeln und diesen Krieg zu beenden. Zu diesem Zweck hat uns der Außenminister folgenden Friedensvorschlag vorgelegt: Die Rückgabe der Grenzen von Brest-Litowsk an den Westen und die Abtretung eines kleinen Teils des Landes im Osten an Amerika und Japan."
RON_American_Alt_History.2111.a:0 "Akzeptieren"
RON_American_Alt_History.2111.b:0 "Abfall"

RON_American_Alt_History.2112.t:0 "Amerika schlägt Friedensbedingungen vor"
RON_American_Alt_History.2112.d:0 "Nach einer vernichtenden Niederlage an der Ostfront, die in der verheerenden Schlacht um Moskau gipfelte, ist es an der Zeit, mit Amerika und Deutschland zu verhandeln und diesen Krieg zu beenden. Zu diesem Zweck hat uns der Außenminister folgenden Friedensvorschlag vorgelegt: Russland soll alle Gebiete westlich des Urals an die amerikanisch-deutsche Koalition abtreten und einen großen Teil des Landes im Osten an Amerika und Japan abtreten."
RON_American_Alt_History.2112.a:0 "Akzeptieren"
RON_American_Alt_History.2112.b:0 "Abfall"

RON_American_Alt_History.2115.t:0 "Die Sowjetunion akzeptiert"
RON_American_Alt_History.2115.d:0 "Nach vielen Stunden der Beratung gab die sowjetische Delegation schließlich unseren Forderungen nach."
RON_American_Alt_History.2115.a:0 "Sieg!"

RON_American_Alt_History.2116.t:0 "Die Sowjetunion akzeptiert"
RON_American_Alt_History.2116.d:0 "Nach vielen Stunden der Beratung gab die sowjetische Delegation schließlich unseren Forderungen nach."
RON_American_Alt_History.2116.a:0 "Sieg!"

RON_American_Alt_History.2119.t:0 "Der Niedergang der Sowjetunion"
RON_American_Alt_History.2119.d:0 "Nach stundenlangen Beratungen lehnte die sowjetische Delegation alle unsere Forderungen mit der Begründung ab, sie seien äußerst unvernünftig. Wir konnten keinen Kompromiss finden, und die Verhandlungen scheiterten."
RON_American_Alt_History.2119.a:0 "Der Krieg tobt weiter"

RON_American_Alt_History.2120.t:0 "[FROM.GetName] nimmt die Einladung zu [ROOT.GetFactionName] an"
RON_American_Alt_History.2120.d:0 "[FROM.GetName] hat beschlossen, unser Angebot anzunehmen und sich der [ROOT.GetFactionName] anzuschließen. Von nun an werden wir gemeinsam bestehen oder fallen."
RON_American_Alt_History.2120.a:0 "Niemand kann uns widerstehen!"

RON_American_Alt_History.2121.t:0 "[FROM.GetName] lehnt ab"
RON_American_Alt_History.2121.d:0 "[FROM.GetName] hat jegliche Verhandlungen mit uns abgelehnt und erklärt, unser Land, unser Volk und unsere Ideologie müssten von der Erde getilgt werden. Es scheint, dieser Krieg sei unsere letzte Bewährungsprobe im Kampf ums Überleben."
RON_American_Alt_History.2121.a:0 "Kein Schritt zurück! Wir kämpfen für unsere Zukunft!"

RON_American_Alt_History_News.1.t:0 "Zweiter Amerikanischer Bürgerkrieg"
RON_American_Alt_History_News.1.d:0 "Nachdem das Hauptziel des Sturms auf das Weiße Haus, Präsident Roosevelt lebend gefangen zu nehmen, nicht erreicht wurde, scheint das Land nun in einen zweiten Bürgerkrieg verstrickt zu sein."
RON_American_Alt_History_News.1.a:0 "OK"

RON_American_Alt_History_News.2.t:0 "Zweiter Amerikanischer Bürgerkrieg vorbei"
RON_American_Alt_History_News.2.d:0 "Der Zweite Amerikanische Bürgerkrieg ist mit dem Sieg der [From.GetRulingParty] zu Ende gegangen."
RON_American_Alt_History_News.2.a:0 "OK"

RON_American_Alt_History_News.3.t:0 "Zweiter Amerikanischer Bürgerkrieg vorbei"
RON_American_Alt_History_News.3.d:0 "Der Zweite Amerikanische Bürgerkrieg ist mit einem Sieg der Bundesregierung zu Ende gegangen."
RON_American_Alt_History_News.3.a:0 "OK"

RON_American_Alt_History_News.4.t:0 "Zweiter Amerikanischer Bürgerkrieg vorbei"
RON_American_Alt_History_News.4.d:0 "Der Zweite Amerikanische Bürgerkrieg ist mit dem Sieg der Kommunisten zu Ende gegangen."
RON_American_Alt_History_News.4.a:0 "OK"

RON_American_Alt_History_News.5.t:0 "Zweiter Amerikanischer Bürgerkrieg vorbei"
RON_American_Alt_History_News.5.d:0 "Der Zweite Amerikanische Bürgerkrieg ist mit dem Sieg der Konföderation zu Ende gegangen."
RON_American_Alt_History_News.5.a:0 "OK"

RON_American_Alt_History_News.6.t:0 "Zweiter Amerikanischer Bürgerkrieg vorbei"
RON_American_Alt_History_News.6.d:0 "Der Zweite Amerikanische Bürgerkrieg ist mit dem Sieg des Amerikanischen Imperiums zu Ende gegangen."
RON_American_Alt_History_News.6.a:0 "OK"

RON_American_Alt_History_News.7.t:0 "Die USA erkennen die Unabhängigkeit der Konföderation an"
RON_American_Alt_History_News.7.d:0 "Die amerikanische Regierung hat die Konföderation als gleichberechtigt anerkannt."
RON_American_Alt_History_News.7.a:0 "Ein verzweifelter Schritt"

RON_American_Alt_History_News.8.t:0 "Silver Legion übernimmt die Macht in Amerika"
RON_American_Alt_History_News.8.d:0 "Inmitten der Wirren eines wütenden Bürgerkriegs entsteht die Silver Legion of America, auch bekannt als die Silver Shirts, als geheime faschistische Organisation unter der Führung von William Dudley Pelley. Von ihrem Stützpunkt in Asheville, North Carolina, aus verbreitet Pelley, ein ehemaliger Journalist und jetziger Spiritualist, extremistische Propaganda, darunter antisemitische Ansichten und unbegründete Behauptungen über Dämonen. Inspiriert von Hitlers Nazi-Bewegung zielt die Silver Legion darauf ab, in den von ihr kontrollierten Gebieten eine „spirituelle und politische Erneuerung“ durchzusetzen. Ihre Uniform erinnert an die der Nazi-Braunhemden."
RON_American_Alt_History_News.8.a:0 "Ein dunkler Tag für die Demokratie"

RON_American_Alt_History_News.9.t:0 "Der Deutsch-Amerikanische Bund ergreift die Macht in Amerika"
RON_American_Alt_History_News.9.d:0 "Der Deutsch-Amerikanische Bund, 1936 ursprünglich als German American Federation gegründet, nahm nach dem Vorwurf des Unpatriotismus einen neuen Namen an, um seine amerikanische Identität zu betonen. Die Organisation bestand ausschließlich aus amerikanischen Bürgern deutscher Abstammung und wollte ein positives Bild von Nazi-Deutschland zeichnen. Ihr Aufstieg markierte einen dunklen Wendepunkt in der Geschichte der Nation."
RON_American_Alt_History_News.9.a:0 "Ein dunkler Tag für die Demokratie"

RON_American_Alt_History_News.10.t:0 "Der Ku-Klux-Klan ergreift die Macht in Amerika"
RON_American_Alt_History_News.10.d:0 "Der Ku-Klux-Klan, berüchtigt für seine rassistischen und hasserfüllten Ideologien, hat die Macht an sich gerissen. Er hat Minderheiten wie Afroamerikaner, Juden und Einwanderer in den USA im Visier. Die Rückkehr des KKK markiert eine beunruhigende Ära des Extremismus. Mit seiner Geschichte von Terrorismus und Gewalt droht die Agenda des Klans, die Werte und Prinzipien der Nation zu verändern."
RON_American_Alt_History_News.10.a:0 "Ein dunkler Tag für die Demokratie"

RON_American_Alt_History_News.12.t:0 "Amerikanisches Militär festigt seine Macht"
RON_American_Alt_History_News.12.d:0 "Ein Schatten des Autoritarismus hat sich über die Vereinigten Staaten gelegt, nachdem das Militär die politische Macht fest im Griff hat. Die einst so lebendige Demokratie steht nun vor einem tiefgreifenden Wandel: Eine Militärdiktatur diktiert die Zukunft der Nation. Das Machtgleichgewicht hat sich verschoben, und die Bürger müssen sich mit den Folgen dieses dramatischen Regierungswechsels auseinandersetzen."
RON_American_Alt_History_News.12.a:0 "Ein dunkler Tag für die Demokratie"

RON_American_Alt_History_News.13.t:0 "Nachkomme Washingtons zum Kaiser von Amerika gekrönt"
RON_American_Alt_History_News.13.d:0 "Durch eine überraschende Wendung des Schicksals wurde ein Nachfahre George Washingtons zum Kaiser von Amerika gekrönt. Mit der Errichtung der Monarchie vollzog sich ein radikaler Wandel der politischen Landschaft des Landes von der Demokratie zur Autokratie. Die historische Bedeutung dieses Ereignisses ist weltweit spürbar, da Beobachter über die Zukunft einer Nation nachdenken, die einst auf demokratischen Werten beruhte."
RON_American_Alt_History_News.13.a:0 "Ein dunkler Tag für die Demokratie"

RON_American_Alt_History_News.14.t:0 "Nachkomme von Norton zum Kaiser von Amerika gekrönt"
RON_American_Alt_History_News.14.d:0 "Die Kommunistische Partei der USA, deren Wurzeln eng mit der amerikanischen Arbeiterbewegung verwoben sind, hat eine überraschende Machtübernahme inszeniert. Aus dem Schatten ihrer Untergrundaktivitäten hervorgetreten, übt sie nun erheblichen Einfluss auf die Politik des Landes aus. Die Entwicklung der Vereinigten Staaten hat sich unwiderruflich verändert, während das Gespenst des Kommunismus über der Zukunft schwebt."
RON_American_Alt_History_News.14.a:0 "Ein dunkler Tag für die Demokratie"

RON_American_Alt_History_News.15.t:0 "Die Kommunisten ergreifen die Macht in Amerika"
RON_American_Alt_History_News.15.d:0 "Die Kommunistische Partei der USA, deren Wurzeln eng mit der amerikanischen Arbeiterbewegung verwoben sind, hat eine überraschende Machtübernahme inszeniert. Aus dem Schatten ihrer Untergrundaktivitäten hervorgetreten, übt sie nun erheblichen Einfluss auf die Politik des Landes aus. Die Entwicklung der Vereinigten Staaten hat sich unwiderruflich verändert, während das Gespenst des Kommunismus über der Zukunft schwebt."
RON_American_Alt_History_News.15.a:0 "Ein dunkler Tag für die Demokratie"

RON_American_Alt_History_News.16.t:0 "Die Syndikalisten ergreifen die Macht in Amerika"
RON_American_Alt_History_News.16.d:0 "Ein gewaltiger Umbruch erschüttert die amerikanische Arbeiterschaft: Die Industrial Workers of the World, bekannt als die „Wobblies“, haben die Macht übernommen. Der Aufstieg der syndikalistischen Bewegung, die im revolutionären Industriegewerkschaftswesen verwurzelt ist, läutet eine Ära beispiellosen Wandels ein. Traditionelle Zünfte und Gewerkschaften werden herausgefordert und weichen einer neuen Ordnung, die von der Ideologie des Syndikalismus geprägt ist."
RON_American_Alt_History_News.16.a:0 "Ein dunkler Tag für die Demokratie"

RON_American_Alt_History_News.17.t:0 "Die Sozialisten ergreifen die Macht in Amerika"
RON_American_Alt_History_News.17.d:0 "Die Socialist Party of America (SPA) war eine sozialistische politische Partei in den Vereinigten Staaten. Sie entstand 1901 aus dem Zusammenschluss der drei Jahre alten Social Democratic Party of America und unzufriedener Elemente der Socialist Labor Party of America, die sich 1899 von der Hauptorganisation abgespalten hatten. In den ersten Jahrzehnten des 20. Jahrhunderts erhielt sie erhebliche Unterstützung von vielen verschiedenen Gruppen, darunter Gewerkschafter, progressive Sozialreformer, populistische Bauern und Einwanderer. Sie lehnte es jedoch ab, Koalitionen mit anderen Parteien einzugehen oder ihren Mitgliedern überhaupt die Wahl anderer Parteien zu gestatten."
RON_American_Alt_History_News.17.a:1 "Ein dunkler Tag für die Demokratie"

RON_American_Alt_History_News.18.t:0 "Amerika und der Heilige Stuhl unterzeichnen einen Pakt"
RON_American_Alt_History_News.18.d:0 "Der Heilige Pakt („Abkommen zwischen dem Heiligen Stuhl und dem amerikanischen Staat“) ist ein zwischen dem Vatikan und dem aufstrebenden amerikanischen Imperium ausgehandelter Vertrag. Er wurde von Kardinalstaatssekretär Eugenio Pacelli, dem späteren Papst Pius XII., im Namen von Papst Pius XI. und von Botschafter William Phillips im Namen der amerikanischen Regierung unterzeichnet. Der Vertrag garantiert die Rechte der katholischen Kirche in Amerika. Artikel 16 besagt, dass Bischöfe bei Amtsantritt einen Treueeid auf den Militärgouverneur oder Kaiser des gemäß der Verfassung eingesetzten amerikanischen Imperiums leisten müssen. Der Vertrag verpflichtet außerdem alle Geistlichen, sich der Tätigkeit in oder für politische Parteien zu enthalten."
RON_American_Alt_History_News.18.a:1 "OK"

 RON_American_Alt_History_News.19.t:0 "Die Union von Kanada"
 RON_American_Alt_History_News.19.d:0 "Nach einem erfolgreichen Staatsstreich der lokalen faschistischen Partei in Ottawa haben amerikanische Truppen die kanadische Grenze überschritten und die Kontrolle über das Land übernommen. \n\nEs wurden keine Kampfhandlungen gemeldet, und die amerikanischen Soldaten wurden in den Städten von jubelnden Menschenmengen begrüßt.\n\nIn einer Rede vor einer riesigen Menschenmenge auf dem Parliament Hill in Ottawa verkündete [USA.GetLeader] die Union Kanadas und den Anschluss des Landes an Amerika:\n\n„Die älteste nördliche Provinz des nordamerikanischen Volkes soll von nun an die neueste Bastion des amerikanischen Imperiums sein!“"
 RON_American_Alt_History_News.19.a:0 "Wenn sie das wünschen ..."
 RON_American_Alt_History_News.19.b:0 "Willkommen im Imperium!"
 RON_American_Alt_History_News.19.c:0 "Wir müssen unsere Nordgrenzen sichern!"
 RON_American_Alt_History_News.19.e:0 "Dies verstößt gegen alles, wofür sie stehen!"
 
 RON_American_Alt_History_News.156.t:0 "Das Washingtoner Abkommen"
 RON_American_Alt_History_News.156.d:1 "Die amerikanischen Forderungen nach dem Sinaloa-Gebiet in Mexiko, in dem eine beträchtliche amerikanische Minderheit lebt, haben zugenommen. \n\nBei einem Gipfeltreffen in Washington D.C. versuchten die USA, Großbritannien, Frankreich und Deutschland, eine diplomatische Lösung für die sogenannte „Sinaloa-Krise“ zu finden. Mexiko war nicht eingeladen. Es wurde eine Vereinbarung erzielt, wonach die USA das Sinaloa-Gebiet annektieren, aber keine weiteren Gebietsgewinne in Europa anstreben.\n\nHerr Chamberlain sprach vor den Menschenmengen in London:\n„Zum zweiten Mal ist ein Premierminister aus Amerika zurückgekehrt und hat ehrenvollen Frieden gebracht. Ich glaube, es ist Frieden für unsere Zeit.“"
 RON_American_Alt_History_News.156.a:0 "Also kein Krieg dieses Jahr."
 RON_American_Alt_History_News.156.b:0 "Zumindest für den Moment Ruhe ..."
 RON_American_Alt_History_News.156.c:0 "Ein weiterer Weltkrieg ist uns erspart geblieben."
 RON_American_Alt_History_News.156.e:0 "Dies ist keine Vereinbarung, sondern ein Diktat!"
 RON_American_Alt_History_News.157.t:0 "Die Sinaloa-Krise"
 RON_American_Alt_History_News.157.d:0 "Die amerikanischen Forderungen nach dem Sinaloa-Grenzgebiet in Mexiko, in dem eine beträchtliche amerikanische Minderheit lebt, haben sich in letzter Zeit verschärft. \n\nBei einem Gipfeltreffen in Washington, D.C. versuchten Amerika, Großbritannien, Frankreich und Deutschland, eine diplomatische Lösung für die sogenannte „Sinaloa-Krise“ zu finden.\n\nDie Gespräche scheinen jedoch gescheitert zu sein, da sowohl Großbritannien als auch seine Verbündeten Amerika eindringlich davor warnten, dass ein Überschreiten der mexikanischen Grenze durch seine Truppen zu Krieg führen würde. \n\nDie Zeit für eine friedliche Lösung des Konflikts scheint knapp zu werden."
 RON_American_Alt_History_News.157.a:0 "Es sieht aus, als würde es Krieg geben!"
 RON_American_Alt_History_News.157.b:0 "Narren!"
 RON_American_Alt_History_News.157.c:0 "Es ist Zeit, Stellung zu beziehen."
 RON_American_Alt_History_News.157.e:0 "Lasst die Amerikaner kommen!"
 RON_American_Alt_History_News.158.d:0 "Die amerikanischen Forderungen nach dem Sinaloa-Grenzgebiet in Mexiko, in dem eine beträchtliche amerikanische Minderheit lebt, haben sich in letzter Zeit verschärft. \n\nBei einem Gipfeltreffen in Washington D.C. versuchten Amerika, Großbritannien, Frankreich und Deutschland, eine diplomatische Lösung für die sogenannte „Sinaloa-Krise“ zu finden. \n\nZwischen Frankreich und Großbritannien hat sich ein Riss gebildet. Großbritannien akzeptiert die amerikanischen Ansprüche als angemessen, Frankreich hingegen nicht. Die Franzosen haben ein neues Bündnis mit den Mexikanern geschlossen und Amerika mit Krieg gedroht, sollten seine Truppen die mexikanische Grenze verletzen."
 RON_American_Alt_History_News.158.b:0 "Mit den Franzosen werden wir uns schon noch befassen."
 RON_American_Alt_History_News.158.c:0 "Diesmal sind die Franzosen auf sich allein gestellt."
 RON_American_Alt_History_News.158.e:0 "Die Amerikaner würden es jetzt nicht wagen, anzugreifen, oder?"
 RON_American_Alt_History_News.158.f:0 "Die freie Welt ist auf uns angewiesen."
 RON_American_Alt_History_News.159.t:0 "Das Diktat von Washington DC"
 RON_American_Alt_History_News.159.d:0 "Die amerikanischen Forderungen nach dem Sinaloa-Grenzgebiet in Mexiko, in dem eine beträchtliche amerikanische Minderheit lebt, haben sich in letzter Zeit verschärft. \n\nBei einem Gipfeltreffen in Washington D.C. versuchten Amerika, Großbritannien, Frankreich und Deutschland, eine diplomatische Lösung für die sogenannte „Sinaloa-Krise“ zu finden. \n\nWährend Großbritannien und Frankreich die amerikanischen Forderungen als vernünftig akzeptierten, weigerte sich Mexiko, das nicht zur Konferenz eingeladen war, auch nur einen Zentimeter nachzugeben. \n\nNun steht es Amerika allein gegenüber und sieht sich einem scheinbar aussichtslosen Kampf gegenüber."
 RON_American_Alt_History_News.159.a:0 "Für die Mexikaner sieht es düster aus."
 RON_American_Alt_History_News.159.b:0 "Hartnäckige Narren."
 RON_American_Alt_History_News.159.c:0 "Wir werden niemals aufgeben!"
 RON_American_Alt_History_News.160.t:0 "Das Schicksal Mexikos"
 RON_American_Alt_History_News.160.d:0 "Amerikanische Truppen sind in Zentralmexiko einmarschiert, angeblich um nach dem Zusammenbruch der mexikanischen Regierung die Ordnung in der Region wiederherzustellen. \n\nIn Mexiko-Stadt verkündeten die Besatzungstruppen die Schaffung eines „autonomen Protektorats“ innerhalb des amerikanischen Reichs.\n\nMit amerikanischer Unterstützung wurde Südmexiko unter der Führung von Salvador Abascal für unabhängig erklärt. Den Staat Mexiko gibt es nicht mehr."
 RON_American_Alt_History_News.160.d_2:0 "Nach der amerikanischen Annexion Mexikos wurde weiterhin darüber diskutiert, wie diese Gebiete aufgeteilt werden sollten. Nun scheint man zu einer Einigung gekommen zu sein.\n\nMit amerikanischer Unterstützung wurde Südmexiko unter der Führung von Salvador Abascal für unabhängig erklärt."
 RON_American_Alt_History_News.160.a:0 "So viel zum Thema Frieden."
 RON_American_Alt_History_News.160.b:0 "Die Mexikaner müssen vor sich selbst geschützt werden."
 RON_American_Alt_History_News.160.c:0 "Das ist nicht unsere Abmachung!"
 RON_American_Alt_History_News.160.e:0 "Guatemala wird zu seinem früheren Glanz zurückfinden!"
 
 RON_American_Alt_History_News.162.d:0 "Amerikanische Truppen sind kürzlich in Zentralmexiko einmarschiert, angeblich um nach dem Zusammenbruch der mexikanischen Regierung die Ordnung in der Region wiederherzustellen. \n\nIn Mexiko-Stadt verkündeten die Besatzungstruppen die Schaffung eines „autonomen Protektorats“ innerhalb des amerikanischen Reichs.\n\nEin zweites Protektorat, das sich um Südmexiko konzentriert, wurde ebenfalls in Villahermosa ausgerufen. Ganz Mexiko wurde damit faktisch von Amerika annektiert."
 RON_American_Alt_History_News.162.d_2:0 "Nach der amerikanischen Annexion Mexikos wurde weiterhin über die Aufteilung dieser Gebiete diskutiert. Nun scheint eine Einigung erzielt worden zu sein.\n\nDas annektierte Gebiet wurde in zwei Protektorate aufgeteilt, bleibt aber unter amerikanischer Kontrolle. In der Praxis hat sich wenig geändert, und ganz Mexiko bleibt unter amerikanischer Kontrolle."

###Decisions
USA_SA_panama_canal:0 "Panamakanalarbeiten"
USA_SA_panama_canal_desc:0 "Der Panamakanal ist ein monumentales Ingenieurprojekt, das eine wichtige Seeverbindung zwischen Atlantik und Pazifik schaffen soll. Er wird die Reisezeit für Schiffe deutlich verkürzen und den Welthandel erleichtern. Sie haben die Möglichkeit, Bauzeit und -kosten zu beeinflussen."
panama_canal_contruction_timer_USA:0 "Kanalbau"
panama_canal_contruction_timer_SA:0 "Kanalbau"
decrease_buid_time:0 "Kanalbau unterstützen"
decrease_buid_time_desc:0 "Unterstützen Sie den Bau des Panamakanals. Ihr Einsatz verkürzt die Bauzeit, erhöht aber die Kosten. Dies kommt dem Welthandel und dem Wohlstand Ihres Landes zugute."
increase_building_time:0 "Bau des Hinder-Kanals"
increase_building_time_desc:0 "Beschließen Sie, den Bau des Panamakanals zu behindern und dadurch Verzögerungen und zusätzliche Kosten zu verursachen. Dies mag Ihren strategischen Interessen dienen, geht aber auf Kosten des internationalen Handels."
panama_works_finished:0 "Der Panamakanal ist fertig"
