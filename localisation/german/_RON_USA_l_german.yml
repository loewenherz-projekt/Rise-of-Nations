RON_American_Alt_History.1.t:0 "Zweiter Amerikanischer Bürgerkrieg"
RON_American_Alt_History.1.d:0 "Da die Überreste der vorherigen Regierung an der Westküste fest verankert sind und sich weigern, auf unsere Kapitulationsforderungen einzugehen, scheint die einzige verbleibende Handlungsmöglichkeit darin zu bestehen, diese verräterischen Staaten mit Gewalt einzunehmen."
RON_American_Alt_History.1.a:0 "Das ist eine Katastrophe..."

RON_American_Alt_History.2.t:0 "Präsident Roosevelt in Haft"
RON_American_Alt_History.2.d:0 "Der Sturm auf das Weiße Haus verlief genau wie geplant. Obwohl der Secret Service erbittert kämpfte, war sein Widerstand angesichts unserer weit überlegenen Streitkräfte zwecklos. Der Präsident wurde in Gewahrsam genommen und musste eine Executive Order unterzeichnen, die der Militärregierung unter Smedley Butler außerordentliche Notfallvollmachten erteilte."
RON_American_Alt_History.2.a:0 "Exzellent"

RON_American_Alt_History.3.t:0 "Präsident Roosevelt im Kreuzfeuer getötet"
RON_American_Alt_History.3.d:0 "Der Sturm auf das Weiße Haus war teilweise erfolgreich, da wir das Gebäude sichern konnten. Washington ist nun fest in unserer Hand. Obwohl der Secret Service erbittert kämpfte, erwies sich sein Widerstand angesichts unserer weit überlegenen Streitkräfte als zwecklos. Unglücklicherweise wurde Präsident Roosevelt jedoch von einer Querschlägerkugel getroffen. Er wurde ins nächstgelegene Krankenhaus gebracht, starb aber Minuten später. Vizepräsident John Nance Garner ist nun amtierender Präsident. Berichten zufolge ist er an die Westküste geflohen, wo die Regierungen der Bundesstaaten Kalifornien, Oregon und Washington der Bundesregierung die Treue geschworen haben."
RON_American_Alt_History.3.a:0 "Nicht das, was wir beabsichtigt hatten"

RON_American_Alt_History.4.t:0 "Präsident Roosevelt flieht"
RON_American_Alt_History.4.d:0 "Der Sturm auf das Weiße Haus war teilweise erfolgreich, da wir das Gebäude sichern konnten. Washington ist nun fest in unserer Hand. Obwohl der Secret Service erbittert kämpfte, erwies sich sein Widerstand angesichts unserer weit überlegenen Streitkräfte als zwecklos. Doch in einer verheerenden Entwicklung wurde Präsident Roosevelt in letzter Sekunde von seinen letzten verbliebenen Sicherheitskräften durch geheime Tunnel entführt. Berichten zufolge ist er an die Westküste geflohen, wo die Regierungen der Bundesstaaten Kalifornien, Oregon und Washington der Bundesregierung die Treue geschworen haben."
RON_American_Alt_History.4.a:0 "Verdammt"

RON_American_Alt_History.5.t:0 "Der Süden erhebt sich wieder!"
RON_American_Alt_History.5.d:0 "Einige Staaten der ehemaligen Konföderation nutzten den Bürgerkrieg und das damit verbundene politische Chaos aus, erhoben sich und erklärten mit Unterstützung rechter Agitatoren ihren Austritt aus der Union."
RON_American_Alt_History.5.a:0 "Zerschmettere diesen Aufstand"
RON_American_Alt_History.5.b:0 "Wir werden uns später darum kümmern"
RON_American_Alt_History.5.c:0 "Ein Verbündeter wird sich als nützlich erweisen"

RON_American_Alt_History.6.t:0 "Der Norden wird rot!"
RON_American_Alt_History.6.d:0 "Einige Staaten der Region der Großen Seen nutzten den Bürgerkrieg und das damit verbundene politische Chaos aus, erhoben sich und erklärten mit Unterstützung radikaler linker Agitatoren ihren Austritt aus der Union."
RON_American_Alt_History.6.a:0 "Zerschmettere diesen Aufstand"
RON_American_Alt_History.6.b:0 "Wir werden uns später darum kümmern"
RON_American_Alt_History.6.c:0 "Ein Verbündeter wird sich als nützlich erweisen"

RON_American_Alt_History.7.t:0 "In Boston wird ein Imperium ausgerufen"
RON_American_Alt_History.7.d:0 "Einige Staaten im Nordosten nutzten den Bürgerkrieg und das damit verbundene politische Chaos aus, um mit Unterstützung einer Gruppe reicher Geschäftsleute, die sich selbst als „Großer Rat“ bezeichnen, ihren Austritt aus der Union zu erklären."
RON_American_Alt_History.7.a:0 "Zerschmettere diesen Aufstand"
RON_American_Alt_History.7.b:0 "Wir werden uns später darum kümmern"
RON_American_Alt_History.7.c:0 "Ein Verbündeter wird sich als nützlich erweisen"

RON_American_Alt_History.8.t:0 "Eine Koalitionsregierung?"
RON_American_Alt_History.8.d:0 "Es ist Zeit zu entscheiden, welchen Kurs unsere Regierung einschlagen wird. Wir brauchen Verbündete, um unsere Macht zu sichern."
RON_American_Alt_History.8.a:0 "Die Kommunisten"
RON_American_Alt_History.8.b:0 "Die Faschisten"
RON_American_Alt_History.8.c:0 "Die Gemäßigten"
RON_American_Alt_History.8.e:0 "Später entscheiden"

