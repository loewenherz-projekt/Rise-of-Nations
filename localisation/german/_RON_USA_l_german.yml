 usa.6.c:0 "Erringen Sie einen Erdrutschsieg für FDR."

 
 usa.89.t:0 "Die Raketenexperimente von Frank Malina"
 usa.89.d:0 ""
 usa.89.a:0 "Dies wird der Beginn des US-Raketenprogramms sein!"
 
 usa.90.t:0 "FDR in den Mord an Huey Long verwickelt"
 usa.90.d:0 "Ein verärgerter FBI-Agent hat der Presse eine Geschichte zugespielt, die den Präsidenten mit dem Mord an dem prominenten populistischen Senator aus Louisiana, Huey Long, in Verbindung bringt. Die Roosevelt-Regierung weist die Vorwürfe aufs Schärfste zurück, doch haben sie der Unterstützung und Glaubwürdigkeit der Roosevelt-Regierung, insbesondere im Süden, erheblich geschadet."
 usa.90.a:0 "Das ist eine Katastrophe."
 
 usa.91.t:0 "MacArthur bereitet Offensive gegen die Rebellen vor"
 usa.91.d:0 ""
 usa.91.a:0 "Sie werden von der Brillanz unseres glorreichen Anführers erdrückt werden."
 
 usa.92.t:0 "Südliches Grummeln"
 usa.92.d:0 "Obwohl es mit den Populisten des Südens, insbesondere Earl Long, begann, hat sich die Anti-Roosevelt- und Anti-New-Deal-Stimmung in weiten Teilen des Südens verbreitet. Von den Gewerkschaften bis zu den demokratischen Senatoren des Südens schwindet die Zahl der Verbündeten Roosevelts. Dies ist zweifellos das Ende der Präsidentschaft Roosevelts – er mag zwar noch einige Jahre im Amt bleiben, doch sein politisches Kapital ist völlig versiegt."
 usa.92.a:0 "Könnte dies eine Bedrohung für unsere Union darstellen?"
 
 usa.93.t:0 "Die Gründung der Konföderation"
 usa.93.d:0 "Aufrührerische Südstaatendemokraten haben erneut die Verbindungen zwischen dem Süden und dem Rest der Union gekappt. Peinlicherweise hat Vizepräsident Garner die Regierung verlassen, um sich den Rebellen anzuschließen. Es bleibt unklar, ob die Union in dieser Krisenzeit in der Lage sein wird, sich hinter Roosevelt zu vereinen."
 usa.93.a:0 "Schließen Sie sich der Südstaaten-Rebellion an."
 usa.93.b:0 "Bleiben Sie der Union treu."
 
 usa.94.t:0 "Murren an der Wall Street"
 usa.94.d:0 "Es ist bekannt, dass Roosevelts progressive Politik an der Wall Street für Aufsehen sorgte. Doch nun wurde berichtet, das FBI habe ernsthafte Pläne aufgedeckt, Roosevelt mit allen Mitteln aus dem Amt zu stürzen. Die Roosevelt-Regierung weist diese Gerüchte aufs Schärfste zurück, dennoch bleiben sie beunruhigend."
 usa.94.a:0 "Das ist destabilisierend."
 
 usa.95.t:0 "General Douglas MacArthur stürzt Präsident Franklin Roosevelt in einem Unternehmensputsch"
 usa.95.d:0 "In einem kurzen, aber blutigen Putsch gelang General MacArthur ein Militärputsch. Berichten zufolge artete die Verhaftung Roosevelts und seines Gefolges in ein Feuergefecht aus, bei dem Roosevelt und der Großteil seines Kabinetts ums Leben kamen."
 usa.95.a:0 "Es gibt keine Worte..."
 
 usa.96.t:0 "Henry Wallace gründet eine neue Regierung im Westen"
 usa.96.d:0 "Eines der überlebenden Kabinettsmitglieder von Präsident Roosevelt ist in den Westen geflohen und hat in San Francisco eine Regierung errichtet, die er als legitimen Exekutivbeamten der Vereinigten Staaten bezeichnet. Präsident Wallace bezeichnete MacArthur im Live-Radio als „nichts weiter als einen Speichellecker der Konzerne“ und richtete im Radio einen leidenschaftlichen Appell an die Bürger, ihre Abgeordneten zu drängen, die letzten Überreste der US-Regierung zu unterstützen, bevor diese in Tyrannei versinkt."
 usa.96.a:0 "Der Mann ist ein Witz."
 
 usa.97.t:0 "Wallaces Regierung gewinnt an Dynamik"
 usa.97.d:0 "Bis heute haben sich die Bundesstaaten Kalifornien, Washington, Oregon, Arizona, New Mexico, Nevada, Utah und Idaho Wallace gegen das „tyrannische“ und „unamerikanische“ Regime von General MacArthur angeschlossen."
 usa.97.a:0 "Schließen Sie sich ihm an – er ist Amerikas letzte Hoffnung."
 usa.97.b:0 "Wallace wird dieses Land in den Untergang treiben – wir müssen seinem Einfluss widerstehen."
 
 usa.98.t:0 "Stoppen Sie den Zerfall der Vereinigten Staaten"
 usa.98.d:0 ""
 usa.98.a:0 "Kundgebung unter MacArthur."
 usa.98.b:0 "(Mechanische Geräusche)"
 
 usa.99.t:0 "Die föderale Rückgewinnung der Vereinigten Staaten"
 usa.99.d:0 "Es begann als fernes Echo, das immer lauter wurde, bis es zu einem gewaltigen Brüllen wurde. So zumindest ging es Millionen von normalen Amerikanern, die sich an der Front des „Zweiten Amerikanischen Bürgerkriegs“ befanden."
 usa.99.a:0 "So beginnt der Zweite Amerikanische Bürgerkrieg ..."
 
 
 
 usa.100.t:0 "Die Sowjetunion fordert eine industrielle Zusammenarbeit mit den Vereinigten Staaten"
 usa.100.d:0 "Die Sowjetunion hat uns eine formelle Anfrage zur Aufnahme einer industriellen Zusammenarbeit mit unserem Land übermittelt, in deren Rahmen unsere Industriellen sie gegen eine finanzielle Entschädigung bei der Organisation verschiedener Projekte in ihrem Land unterstützen."
 usa.100.a:0 "Wir werden kooperativ sein."
 usa.100.b:0 "Wir müssen den niederträchtigen Kommunisten auf Schritt und Tritt Widerstand leisten!"
 
 usa.101.t:0 "Bundesregierung bekämpft Dustbowl!"
 usa.101.d:0 "Wir werden die Landwirte durch wirtschaftliche Anreize und Bildungsprogramme zum Bodenschutz dazu ermutigen, zerstörerische Anbaumethoden zu vermeiden. Obwohl es lange und hart dauern wird, das Problem ein für alle Mal zu lösen, wird es die Stimmung der Bevölkerung stärken, wenn sie die erheblichen Anstrengungen der Regierung sieht."
 usa.101.a:0 "Lass es uns tun!"
 
 usa.102.t:0 "Forschung für Polio-Behandlungen"
 usa.102.d:0 "Wir werden Bundesmittel in die Forschung zur Bekämpfung der Polio-Epidemie investieren, die das Land erfasst hat. Dieser Kampf wird langwierig sein, aber wir führen ihn für die Kinder dieses Landes!"
 usa.102.a:0 "Gehen wir zum nächsten Level."
 usa.103.t:0 "Polioforschung"
 usa.103.d:0 "Unsere Forscher berichten, dass wir kurz vor der Entwicklung eines wirksamen Polio-Impfstoffs stehen. Das sind zwar gute Neuigkeiten, wir können es uns jedoch nicht leisten, dieses Projekt zu überstürzen, um nicht wertvolle Zeit und Ressourcen für eine aussichtslose Forschungsstrategie zu verschwenden."
 usa.103.a:0 "Gute Arbeit!"
 usa.104.t:0 "Die Polio-Impfung"
 usa.104.d:0 "Endlich ist es soweit: Wir haben einen wirksamen Impfstoff gegen die schreckliche Polio-Epidemie entwickelt. Die Massenproduktion beginnt in diesem Moment."
 usa.104.a:0 "Verteilen Sie es sofort!"
 
 usa.105.t:0 "Unser Vorschlag stößt auf heftigen Widerstand"
 usa.105.d:0 "Unser Vorschlag, den Obersten Gerichtshof mit befreundeten Richtern zu besetzen, stößt auf heftigen Widerstand. Man behauptet, wir würden die Funktion des Obersten Gerichtshofs untergraben. Sie behaupten, dies sei nichts weniger als ein Angriff auf die Verfassung selbst. Wie sollen wir in dieser Angelegenheit weiter vorgehen?"
 usa.105.a:0 "Kämpfen!"
 usa.105.b:0 "Wir müssen uns zurückziehen."
 usa.106.t:0 "Die Höhlen der Opposition"
 usa.106.d:0 "Unsere Bemühungen, die Bevölkerung hinter uns zu mobilisieren, waren sehr erfolgreich. Angesichts drohender Streiks und Straßenunruhen musste die traditionalistische Opposition unseren Forderungen nachgeben, um kommunistische Aufstände und Arbeiterunruhen nicht zu riskieren. Die von uns ernannten Richter am Obersten Gerichtshof werden den Gerichtshof besetzen, und dieses Gremium wird dieser Regierung nicht länger im Wege stehen."
 usa.106.a:0 "Der Beginn einer neuen Ära!"
 
 usa.107.t:0 "Treffen mit Stalin"
 usa.107.d:0 ""
 usa.107.a:0 "Der Beginn einer wunderbaren Freundschaft?"
 
 usa.108.t:0 "Treffen mit dem Sonderberater von Roosevelt"
 usa.108.d:0 ""
 usa.108.a:0 "Wir werden daran arbeiten, diese Beziehung aufrechtzuerhalten."
 
 
 
 
 
 usa.199.t:0 "Angriff auf Pearl Harbor"
 usa.199.d:0 "Der Angriff auf Pearl Harbor war ein überraschender Militärschlag der Kaiserlich Japanischen Marine gegen den Marinestützpunkt Pearl Harbor in Honolulu,"
 usa.199.a:0 "Was für eine schreckliche Tragödie."
 
 
 usa.200.t:0 "Die Vereinigten Staaten kritisieren unsere gerechten Kriege zur Selbsterhaltung"
 usa.200.d:0 "Heute hat der amerikanische Botschafter in unserem Land einen Brief seiner Regierung überbracht, in dem er unsere militärischen Aktionen als skrupellos und grob illegal bezeichnet. Unsere Minister sind überzeugt, dass dieser „Brief“ von Präsident Roosevelt selbst inszeniert wurde. Dieser plumpe Brief wurde umgehend an die barbarische amerikanische Presse durchgestochen, deren Folgen uns wohl noch jahrelang im Ohr bleiben werden."
 usa.200.a:0 "Arrogante westliche Teufel!"
 
 usa.201.t:0 "Die Vereinigten Staaten bedrohen unsere Ölversorgung"
 usa.201.d:0 "Der amerikanische Botschafter in unserem Land hat uns heute darüber informiert, dass anhaltende aggressive Aktionen im Pazifik zu einem umfassenden Wirtschaftsembargo gegen unser Land führen könnten."
 usa.201.a:0 "Sie gehen zu weit."
 
 usa.202.t:0 "Die Vereinigten Staaten beenden den Handelsvertrag mit uns"
 usa.202.d:0 ""
 usa.202.a:0 "Ist das der Anfang von etwas?"
 
 usa.203.t:0 "Die Vereinigten Staaten verabschieden ein Exportkontrollgesetz"
 usa.203.d:0 ""
 usa.203.a:0 "Werden sie ihre Drohungen wahr machen?"
 
 usa.204.t:0 "Diplomatische Mission in den Vereinigten Staaten"
 usa.204.d:0 ""
 usa.204.a:0 "Das kann nicht ewig so weitergehen."
 
usa.205.t:0 "Die amerikanische Unverschämtheit wächst"
usa.205.d:0 "Während des Zweiten Weltkriegs verhängt Amerika ein Ölembargo, und Japans lebenswichtige Vorräte nehmen ab. Der Zufluss lebenswichtiger Ressourcen nimmt ab, und dies bereitet den Boden für eine drohende Krise."
usa.205.a:0 "Das kann nicht ewig so weitergehen."
usa.205.b:0 "Das ist unerträglich."

usa.206.t:0 "Die amerikanische Unverschämtheit wächst"
usa.206.d:0 "Da das Ölembargo weiterhin besteht, schrumpfen Japans Vorräte weiter, was die Ressourcen des Landes zunehmend belastet. Die Auswirkungen sind in verschiedenen Sektoren spürbar und signalisieren eine sich verschärfende Lage."
usa.206.a:0 "Das kann nicht ewig so weitergehen."
usa.206.b:0 "Das ist unerträglich."

usa.207.t:0 "Die amerikanische Unverschämtheit wächst"
usa.207.d:0 "Mit der Verschärfung des amerikanischen Ölembargos gehen Japans Vorräte rapide zur Neige, was zu kritischen Engpässen in wichtigen Bereichen führt. Die Situation eskaliert und verschärft die Herausforderungen für das Land."
usa.207.a:0 "Das kann nicht ewig so weitergehen."
usa.207.b:0 "Das ist unerträglich."

usa.208.t:0 "Die amerikanische Unverschämtheit wächst"
usa.208.d:0 "Das Ölembargo der USA drückt Japans Vorräte auf ein gefährlich niedriges Niveau, und wichtige Ressourcen sind nun stark knapp. Die Belastung der Wirtschaft und Infrastruktur des Landes wird immer deutlicher."
usa.208.a:0 "Das kann nicht ewig so weitergehen."
usa.208.b:0 "Das ist unerträglich."

usa.209.t:0 "Die amerikanische Unverschämtheit wächst"
usa.209.d:0 "Da das amerikanische Ölembargo weiterhin anhält, sind Japans Vorräte nahezu erschöpft. Die lebenswichtigen Ressourcen stehen kurz vor der Erschöpfung. Das Land steht vor beispiellosen Herausforderungen."
usa.209.a:0 "Das kann nicht ewig so weitergehen."
usa.209.b:0 "Das ist unerträglich."

usa.210.t:0 "Die amerikanische Unverschämtheit wächst"
usa.210.d:0 "Da Japans Vorräte aufgrund des von den USA aufrechterhaltenen Ölembargos nahezu erschöpft sind, befindet sich das Land in einer Notlage, in der lebenswichtige Ressourcen knapp werden, was eine ernste Bedrohung für seine Stabilität darstellt."
usa.210.a:0 "Das kann nicht ewig so weitergehen."
usa.210.b:0 "Das ist unerträglich."

usa.211.t:0 "Die amerikanische Unverschämtheit wächst"
usa.211.d:0 "Als die USA ein vollständiges Ölembargo verhängen, sind Japans Vorräte völlig erschöpft. Das Land gerät in einen Ausnahmezustand, in dem lebenswichtige Ressourcen nicht mehr verfügbar sind. Die Folgen sind katastrophal."
usa.211.a:0 "Das kann nicht ewig so weitergehen."
usa.211.b:0 "Das ist unerträglich."
 
 usa.212.t:0 "Organisieren Sie eine Gummi-Sammelaktion"
 usa.212.d:0 ""
 usa.212.a:0 "Exzellent."
 
 usa.213.t:0 "Gummi-Antriebsenden"
 usa.213.d:0 ""
 usa.213.a:0 "Schade."
 
 
 usa.214.t:0 "Organisieren Sie eine Schrottsammlung"
 usa.214.d:0 ""
 usa.214.a:0 "Exzellent."
 
 usa.215.t:0 "Schrottantriebsenden"
 usa.215.d:0 ""
 usa.215.a:0 "Schade."
 
 
 usa.216.t:0 "Wirtschaftsrezession von 1937"
 usa.216.d:0 "Die Arbeitslosigkeit steigt im ganzen Land rasant an. Die Produktionsleistung sinkt und die durchschnittliche Zahl der Arbeitsstunden sinkt. "
 usa.216.a:0 "Ist dies der Beginn einer Rezession?"
 
 
 
 usa.217.t:0 "Die Vergewaltigung von Nanjing"
 usa.217.d:0 "Aus der von Japan besetzten Stadt Nanjing, die vor Kurzem von der Kwantung-Armee eingenommen wurde, erreichen uns beunruhigende Nachrichten. Insbesondere haben wir Berichte über die Vergewaltigung und Ermordung unschuldiger Einwohner durch japanische Besatzungstruppen gehört."
 usa.217.a:0 "Die Japaner haben gegen die grundlegende menschliche Moral verstoßen."
 usa.217.b:0 "Das ist schrecklich … aber wir müssen unsere Neutralität bewahren."
 usa.217.c:0 "Das betrifft uns nicht."
 
 usa.218.t:0 "Gründung der UNO"
 usa.218.d:0 ""
 usa.218.a:0 "Treten Sie dieser neuen Organisation bei."
 usa.218.b:0 "Wir müssen unsere Neutralität wahren."
 
 usa.219.t:0 "Die Vereinigten Staaten von Amerika bieten uns eine Garantie"
 usa.219.d:0 ""
 usa.219.a:0 "Nehmen Sie das großzügige Angebot an."
 usa.219.b:0 "Lehnen Sie sie ab."
 
 usa.220.t:0 "Die Vereinigten Staaten fallen in eine Nachkriegsrezession"
 usa.220.d:0 ""
 usa.220.a:0 "Schade."
 usa.221.t:0 "Syndikalisten gehen auf die Straße …"
 usa.221.d:0 "Amerika zerfällt, während die Syndikalisten ihre neuen Waffen einsetzen, um ihre eigene Republik auszurufen. Wir müssen schnell handeln, bevor unser Land zusammenbricht …"
 usa.221.a:0 "Amerika ist gefallen"
 usa.666.t:0 "Enorme Verluste"
 usa.666.d:0 ""
 usa.666.a:0 "Unser Volk wird sich irgendwann erholen."
 usa.301.t:0"§Ergebnisse der Hauswahlen liegen vor§!"
usa.301.d:0"Die Ergebnisse der Wahlen zum Repräsentantenhaus stehen fest. Mit über 218 Sitzen markiert das Ergebnis einen Wendepunkt in der amerikanischen Politik. Die Nation ist gespannt, wie sich dies auf die Gesetzgebung der kommenden Jahre auswirken wird."
usa.301.a:0 "Viel Glück an alle"
usa.301.b:0 "Würfeln B"
usa.350.t:0" Übersicht über die Hauswahlen§!"
usa.350.d:0"Die Ergebnisse der Wahlen zum Repräsentantenhaus haben die kritische Schwelle von 218 \n[?HOUSE_party1_seats|+G] Sitzen für §bLinkspopulisten / Sozialistische Parteien§!\n [?HOUSE_party2_seats|+R] Sitze für §bRepublikanische Partei§!\n [?HOUSE_party3_seats|+B] Sitze für §bDemokratische Partei§!\n [?HOUSE_party4_seats|+b] Sitze für §bRechtspopulistische Partei / Libertäre Parteien§!.\n Das Erreichen einer Mehrheit von 218 Sitzen ist für eine effektive Regierungsführung und die Gestaltung zukünftiger legislativer Prioritäten in den Vereinigten Staaten von entscheidender Bedeutung."
 usa.350.a:0 "Die kleineren Parteien könnten in den größeren aufgehen!"
 usa.350.b:0"Helfen Sie der Republikanischen Partei, damit sie eine Mehrheit bekommt!"
 usa.350.c:0"Helfen Sie der Demokratischen Partei, damit sie eine Mehrheit bekommt!"
