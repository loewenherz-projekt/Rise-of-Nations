 USA_Central_Intelligence_Agency_Act:0 "Gesetz über die Central Intelligence Agency"
 USA_Central_Intelligence_Agency_Act_desc:0 "Wir werden die Central Intelligence Agency gründen, die die Geheimnisse unseres Landes schützen und Spionage betreiben wird, um wichtige Informationen aus dem Ausland zu erhalten."
 USA_Post_War_Conflict:0 "USA_Nachkriegskonflikt"
 USA_Post_War_Conflict_desc:0 ""
