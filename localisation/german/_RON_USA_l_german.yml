 USA_War_Mobilization:0 "Kriegsmobilisierung"
 USA_War_Mobilization_desc:0 "Wir sind Teil des weltweiten Konflikts und müssen uns bewaffnen und verteidigen. Wir werden unsere riesige Industrie mobilisieren, um Waffen herzustellen, die in Zehntausenden, ja Millionen Stück produziert werden, um den Krieg zu unseren Feinden zu tragen und sie zu vernichten."
 USA_Allied_Technical_Cooperation:0 "Alliierte technische Zusammenarbeit"
 USA_Allied_Technical_Cooperation_desc:0 ""
 USA_Federal_Funding_for_JPL:0 "Bundesmittel für JPL"
 USA_Federal_Funding_for_JPL_desc:0 "Wir werden Bundesmittel für das Jet Propulsion Laboratory beschaffen, das aus den Bemühungen eines Caltech-Studenten hervorgegangen ist: Frank Malina und seine Versuche im Raketenbau."
 USA_Investigate_Transportation_Problems:0 "Transportprobleme untersuchen"
 USA_Investigate_Transportation_Problems_desc:0 "Wir konzentrieren uns auf die Lösung von Transportproblemen mithilfe linearer Optimierungen. Das Erlernen der Tricks zur Lösung dieser neuen Problemklasse wird zu effizienteren Logistikabläufen führen."
 USA_The_Simplex_Method:0 "Die Simplex-Methode"
 USA_The_Simplex_Method_desc:0 "Wir werden eine Methode entwickeln, um Ziele mathematisch zu formulieren und zu maximieren und so effizient die optimale Lösung aus einer bekannten Reihe möglicher Lösungen zu finden. – Dies wird unseren Logistikmitarbeitern helfen, die Lieferketten effizienter zu gestalten."
 USA_Theory_of_Duality:0 "Theorie der Dualität"
 USA_Theory_of_Duality_desc:0 "Wir werden eine Klasse linearer Optimierungsprobleme untersuchen, für die es eine Parallelgleichung gibt, die wir dann lösen können, um das ursprüngliche und schwierigere Problem zu lösen. – Dies wird uns eine effizientere Verwaltung militärischer Ressourcen ermöglichen."
 USA_Optimal_Supply:0 "Optimale Versorgung"
 USA_Optimal_Supply_desc:0 "Die jüngsten Fortschritte im Bereich der linearen Optimierung konnten wir in der Vergangenheit nur teilweise in unseren Streitkräften umsetzen. Durch eine verbesserte Ausbildung unserer Logistikoffiziere wollen wir die Effizienz unserer logistischen Unterstützung weiter steigern."
 USA_Resource_Independence:0 "Ressourcenunabhängigkeit"
 USA_Resource_Independence_desc:0 "Wir müssen unsere Unabhängigkeit von ausländischen Ressourcen erklären, insbesondere von Kautschuk. Der Großteil des weltweit produzierten Naturkautschuks (920.000 Tonnen pro Jahr) befindet sich in Südostasien und steht uns während dieses Konflikts nicht zur Verfügung. Wir müssen synthetischen Kautschuk produzieren, um unseren Bedarf an dieser strategischen Ressource zu decken. Produzieren wir jährlich 920.000 Tonnen amerikanischen synthetischen Kautschuk!"
 USA_Rationing:0 "Rationierung einführen"
 USA_Rationing_desc:0 "Wir werden die für unsere Zivilbevölkerung zum Konsum verfügbaren Güter rationieren und auf die militärische Produktion umlenken."
 USA_Scrap_Drive:0 "Schrottfahrt"
 USA_Scrap_Drive_desc:0 ""
 USA_Rubber_Drive:0 "Gummiantrieb"
 USA_Rubber_Drive_desc:0 ""
 USA_Rubber_Independence:0 "Gummi-Unabhängigkeit"
 USA_Rubber_Independence_desc:0 "Im Rahmen unseres Programms zur Erschließung nachhaltiger Kautschukreserven werden wir im ganzen Land Raffinerien für synthetischen Kautschuk errichten."
 USA_Improve_Resource_Production_Efficiency:0 "Verbessern Sie die Effizienz der Gummiproduktion"
 USA_Improve_Resource_Production_Efficiency_desc:0 "Wir werden Technologien entwickeln, die es uns ermöglichen, den Kautschukraffinierungsprozess effizienter zu gestalten, was zu einer höheren Kautschukproduktion pro Kautschukfabrik führt."
 USA_Expand_Army_Design_Bureaus:0 "Erweitern Sie den Entwurfsapparat der Armee"
 USA_Expand_Army_Design_Bureaus_desc:0 ""
 USA_Decryption_Effort:0 "Investieren Sie in das OSS"
 USA_Decryption_Effort_desc:0 ""
 USA_Encryption_Effort:0 "Verschlüsselungsaufwand"
 USA_Encryption_Effort_desc:0 ""
 
 
 USA_OSS:0 "Erweitern Sie Army S2s"
 USA_OSS_desc:0 ""
 USA_Expand_the_Signal_Intelligence_Service:0 "Erweitern Sie den Signal Intelligence Service"
 USA_Expand_the_Signal_Intelligence_Service_desc:0 ""
 USA_Magic:0 "Reorganisieren Sie das Team, das mit der Lektüre der japanischen Diplomaten- und Marinekodizes beauftragt ist"
 USA_Magic_desc:0 "Wir haben den japanischen Diplomatenkodex schon vor einiger Zeit geknackt. Wir werden nun unsere Geheimdienste so organisieren, dass wir diese Informationen, egal welchen militärischen Wert sie haben, optimal nutzen können."
 USA_V12_Program:0 "V12-Programm"
 USA_V12_Program_desc:0 ""
 USA_Expand_the_Special_Forces:0 "Erweitern Sie die Spezialkräfte"
 USA_Expand_the_Special_Forces_desc:0 ""
 USA_Overflowing_with_Officers:0 "Die Besten und Klügsten"
 USA_Overflowing_with_Officers_desc:0 ""
 USA_New_Engineers:0 "Neue Ingenieure"
 USA_New_Engineers_desc:0 "In unserem Land wimmelt es von Ingenieuren und anderen technischen Experten. Viele von ihnen arbeiten in unserer Industrie und bauen größere und bessere Waffen, andere müssen jedoch an der Front dienen. Ihr effizienter Einsatz im Army Corps of Engineers könnte uns großen Nutzen bringen."
 USA_Army_Specialized_Training_Program:0 "Spezialisiertes Ausbildungsprogramm der Armee"
 USA_Army_Specialized_Training_Program_desc:0 ""
 USA_Field_Hospital_Focus:0 "Schwerpunkt Feldlazarett"
 USA_Field_Hospital_Focus_desc:0 "Die große Zahl an medizinischem Fachpersonal, die derzeit ausgebildet wird, ermöglicht es uns, den Einsatz und Ausbau von Feldlazaretten zu priorisieren, damit unsere verwundeten Soldaten schnellstmöglich wieder vollständig genesen und zu ihren Einheiten an der Front zurückkehren können."
 USA_Work_On_Modern_Land_Doctrines:0 "Arbeit an modernen Landdoktrinen"
 USA_Work_On_Modern_Land_Doctrines_desc:0 "Unser Militär hinkt in der strategischen und taktischen Landdoktrin hinterher. Wir müssen unsere Anstrengungen darauf konzentrieren, den Rückstand von zehn Jahren Militärtheorie aufzuholen."
 USA_Lessons_on_Mobile_Warfare:0 "Lektionen in mobiler Kriegsführung"
 USA_Lessons_on_Mobile_Warfare_desc:0 "Wir müssen unsere Streitkräfte mechanisieren. Unsere Truppen werden auf neuen Halbkettenfahrzeugen in die Schlacht ziehen, und unsere Offensiven dürfen nicht im Schlamm stecken bleiben."
 USA_Tank_Destroyer_Doctrine:0 "Entwicklung einer Panzerzerstörer-Doktrin"
 USA_Tank_Destroyer_Doctrine_desc:0 "Unsere Panzerstrategie ist einfach: Wir setzen Panzerkompanien zur Unterstützung von Infanterieangriffen ein, während unsere eigenen Panzerjägerkompanien die feindlichen Panzer neutralisieren. Was könnte da schon schiefgehen?"
 USA_Modernize_the_Armor_Force:0 "Modernisierung der Panzertruppe"
 USA_Modernize_the_Armor_Force_desc:0 "Während der Depression ließen wir zu, dass unsere Panzerentwicklung hinter der anderer Nationen der Welt zurückblieb. Es ist an der Zeit, diese Lücke zu schließen und neue, moderne Panzer zu entwickeln, die wir für die Massenproduktion im ganzen Land bestellen werden."
 USA_Take_Advantage_of_US_Industrial_Superiority:0 "Amerikanische industrielle Überlegenheit"
 USA_Take_Advantage_of_US_Industrial_Superiority_desc:0 ""
 USA_Take_Advantage_of_US_Industrial_Superiority_tt:0 "Ermöglicht §YDecisions§!, neue §YSherman§!-Varianten freizuschalten"
 USA_Motorized_Artillery_Brigades:0 "Motorisierte Artilleriebrigaden"
 USA_Motorized_Artillery_Brigades_desc:0 "Wir werden unsere Überlegenheit im motorisierten Transport gegenüber allen anderen Nationen der Erde ausnutzen und versuchen, eine motorisierte Armee aufzubauen: komplett mit gezogenen Haubitzen, Panzerabwehrkanonen, Flugabwehrkanonen und Raketenartillerie sowie Versorgungslastwagen, die die Munition transportieren."
 USA_Expanded_Support_Artillery:0 "Erweiterte Unterstützungsartillerie"
 USA_Expanded_Support_Artillery_desc:0 "Wir werden unsere industrielle Stärke, unsere motorisierten Transportmittel und unsere überlegene Logistik nutzen und unsere Divisionen mit Artillerie verstärken. Jede Division sollte durch eine große Batterie Feldhaubitzen unterstützt werden. Von den französischen Häfen bis nach Berlin soll eine LKW-Kette aufgebaut werden, die ausschließlich mit Artilleriegeschossen beladen ist!"
 USA_Focus_on_Airborne_Infantry:0 "Fokus auf Luftlandeinfanterie"
 USA_Focus_on_Airborne_Infantry_desc:0 "Wir werden unsere Spezialinfanterie durch die Schaffung neuer Luftlandedivisionen weiterentwickeln. Diese neuen Luftlandedivisionen werden hinter den feindlichen Linien landen und den Kampf in die hinteren Ränge unserer Gegner tragen, deren Organisationsfähigkeit untergraben und wichtige Ziele einnehmen, was letztlich amerikanische Leben retten wird."
 USA_Deploy_Airborne_Divisions:0 "Luftlandedivisionen einsetzen"
 USA_Deploy_Airborne_Divisions_desc:0 ""
 USA_aiborne_divisions_tt:0 "§YEinsatz§! Luftlandedivisionen§!"
 USA_Expand_Airborne_Infantry:0 "Ausbau der Luftlandeinfanterie"
 USA_Expand_Airborne_Infantry_desc:0 ""
 USA_Superior_Ground_Support_Payloads:0 "Überlegene Nutzlasten für die Bodenunterstützung"
 USA_Superior_Ground_Support_Payloads_desc:0 "Unsere Bodenunterstützungsflugzeuge werden verbesserte Bodenunterstützungs-Nutzlasten tragen, die speziell dafür entwickelt wurden, feindliche Stellungen zu pulverisieren und ihre mechanisierte Ausrüstung zu zerstören."
 USA_US_Land_Forces_Europe:0 "USA_US_Land_Forces_Europe"
 USA_US_Land_Forces_Europe_desc:0 ""
 USA_Liberate_Europe:0 "Befreie Europa"
 USA_Liberate_Europe_desc:0 "Wir werden uns darauf vorbereiten, von mehreren Punkten aus in Europa einzumarschieren. Wir müssen daran arbeiten, unsere Invasionsfähigkeit in dieser Region zu verbessern und die logistischen Netzwerke aufzubauen, die uns helfen, unsere Hoffnungen Wirklichkeit werden zu lassen."
 USA_Invasion_of_France:0 "USA_Invasion_in_Frankreich"
 USA_Invasion_of_France_desc:0 ""
 USA_Red_Ball_Express:0 "Der Red Ball Express"
 USA_Red_Ball_Express_desc:0 ""
 USA_US_Land_Forces_Asia:0 "USA_US_Land_Forces_Asia"
 USA_US_Land_Forces_Asia_desc:0 ""
 USA_Island_Hopping_Doctrine:0 "Inselhüpf-Doktrin"
 USA_Island_Hopping_Doctrine_desc:0 "Unsere Streitkräfte im Pazifik werden in alle japanischen Inselhochburgen in dieser Region einmarschieren und eine unanfechtbare Vorherrschaft aufbauen, die es uns eines Tages ermöglichen wird, eine Invasion Japans selbst zu starten."
 USA_Operation_Downfall:0 "Operation Untergang"
 USA_Operation_Downfall_desc:0 ""
 USA_Carrier_Based_Multirole:0 "Trägergestützte Mehrzweckflugzeuge"
 USA_Carrier_Based_Multirole_desc:0 "Boeing arbeitet seit einiger Zeit an einem sehr ehrgeizigen Projekt, das die Boeing-Ingenieure als „Fünf-in-Eins-Trägerjäger“ bezeichnen: einen Abfangjäger, einen Langstrecken-Begleitjäger, einen Sturzkampfbomber, einen Torpedobomber und einen taktischen Bomber, der die japanischen Heimatinseln treffen kann und dabei in einer Reichweite operiert, die es japanischen Kamikaze-Flugzeugen nicht ermöglicht, unsere Träger zu treffen."
 USA_Big_Blue_Blanket:0 "Große blaue Decke"
 USA_Big_Blue_Blanket_desc:0 ""
 USA_Employ_Chemical_Weapons:0 "Chemische Waffen einsetzen"
 USA_Employ_Chemical_Weapons_desc:0 ""
 USA_Army_Reforms:0 "USA_Army_Reformen"
 USA_Army_Reforms_desc:0 ""
 USA_P47:0 "Blitze"
 USA_P47_desc:0 "Unsere Arbeit an der Entwicklung eines neuen Kampfflugzeugs für den europäischen Kriegsschauplatz führte zur Entwicklung der P-47 Thunderbolt durch Republic Aviation. Dieses neue Flugzeug wurde sowohl als Eskorte für unsere Bomber als auch für Jagdbombereinsätze gegen feindliche Einheiten konzipiert."
 USA_Mustangs:0 "Mustangs"
 USA_Mustangs_desc:0 "Wir werden Ressourcen in die Entwicklung eines neuen Kampfflugzeugs investieren, das mit den stärksten Motoren ausgestattet ist, die wir bekommen können, und das in der Lage ist, unsere Bomber Tausende von Kilometern weit zu ihren Zielen zu eskortieren."
 USA_Corsairs:0 "Korsaren"
 USA_Corsairs_desc:0 "Wir werden einen neuen Jagdbomber für den pazifischen Kriegsschauplatz entwickeln: die Vought F4U Corsair."
 USA_Long_Range_Bombing_Missions:0 "Fokus auf Bomberabwehr"
 USA_Long_Range_Bombing_Missions_desc:0 ""
 USA_Advanced_Bomber_Formations:0 "Fortgeschrittene Bomberformationen"
 USA_Advanced_Bomber_Formations_desc:0 "Wir werden unsere Bomber in Formationen organisieren, die ihre Verteidigungsfähigkeit maximieren und es ihnen ermöglichen, Angriffe feindlicher Jäger besser abzuwehren."
 USA_New_Bombsight:0 "Neues Bombenzielgerät"
 USA_New_Bombsight_desc:0 "Wir werden unsere Bombenvisiere aktualisieren, um präzisere Bombenabwürfe bei Tageslicht zu ermöglichen. Dabei werden wir die Erfahrungen aus der Stationierung und Untersuchung des Norden-Bombenstandorts für eine verbesserte Version nutzen."
 USA_External_Fuel_Tanks:0 "Externe Kraftstofftanks"
 USA_External_Fuel_Tanks_desc:0 "Unsere Kampfflugzeuge können mit externen Abwurftanks ausgerüstet werden, die ihre Reichweite erhöhen und es ihnen ermöglichen, unsere Bomber noch weiter als bisher zu eskortieren, indem sie die sperrigen Treibstofftanks abwerfen, wenn sie in einen Luftkampf eintreten."
 USA_New_High_Performance_Fighters:0 "Neue Hochleistungsjäger"
 USA_New_High_Performance_Fighters_desc:0 "Wir werden ein neues, leistungsstarkes Kampfflugzeug mit gegenläufigen Propellern und einem neuen Allison-Motor entwickeln. Das Flugzeug wird schnell sein, eine große Reichweite haben und als Abfangjäger in großer Höhe unsere Bomber über weite Ozeane zu ihren Zielen und zurück begleiten können."
 USA_Superfortresses:0 "Superfestungen"
 USA_Superfortresses_desc:0 "Wir werden massiv in die Produktion neuer strategischer Bomber investieren, die über weite Ozeane fliegen und die Städte und Industrien unserer Feinde in Parkplätze verwandeln werden."
 USA_Incendiary_Bombing_Campaign:0 "Brandbombenkampagne"
 USA_Incendiary_Bombing_Campaign_desc:0 ""
 USA_Airborne_Radar:0 "Bordradar"
 USA_Airborne_Radar_desc:0 "Wir werden unsere Flugzeuge mit Radargeräten ausstatten, damit sie bei Kampfeinsätzen andere Flugzeuge besser erkennen können."
 USA_Doolittle_Raid:0 "Doolittle-Raid"
 USA_Doolittle_Raid_desc:0 ""
 USA_Establish_Dugway_Proving_Ground:0 "Errichtung des Dugway-Testgeländes"
 USA_Establish_Dugway_Proving_Ground_desc:0 "Wir werden in Utah einen Militärstützpunkt errichten, der es uns ermöglichen wird, die Wirkung neuer Waffen wie Bomben und sogar chemischer und biologischer Waffen zu testen."
 USA_Napalm:0 "Napalm"
 USA_Napalm_desc:0 "Wir werden unser chemisches Know-how nutzen, um eine neue brennbare Substanz zu entwickeln, die wir in Bomben einbauen und unseren Feind aus der Luft vernichten können. Eine interessante alternative Anwendung der Technologie ist der Einsatz in unseren Flammenwerfern."
 USA_Carrier_Based_Navy:0 "Trägergestützte Marine"
 USA_Carrier_Based_Navy_desc:0 "Wir werden uns auf die Beschaffung neuer Flugzeugträger konzentrieren. Diese neuen Schiffe der Essex-Klasse werden es uns ermöglichen, die japanische Flotte auf hoher See zu zerstören und ihre Marine als Bedrohung für unsere Streitkräfte und unser Land dauerhaft zu beseitigen."
 USA_Hellcats:0 "Höllenkatzen"
 USA_Hellcats_desc:0 "Wir werden in die Entwicklung neuer trägergestützter Kampfflugzeuge investieren. Diese Flugzeuge werden die Luftüberlegenheit über unsere Flotte sichern und unsere Marine-Kampfflugzeuge sicher zu ihren Zielen eskortieren."
 USA_Cruiser_Escorts:0 "Kreuzer-Eskorte"
 USA_Cruiser_Escorts_desc:0 "Unsere neue Trägerflotte benötigt schnelle, robuste Eskorten, die in der Lage sind, feindliche Schiffe aufzuhalten, während unsere Trägerflugzeuge sie auf den Meeresgrund versenken, und die gleichzeitig zusätzliche Flugabwehr- und U-Boot-Abwehrfähigkeiten bieten."
 USA_Improved_Convoy_Defense:0 "Verbesserte Konvoi-Verteidigung"
 USA_Improved_Convoy_Defense_desc:0 "Wir werden neue Methoden und Technologien einführen, die die Effizienz unserer Konvoi-Eskorte verbessern und die Zerstörerflotte unserer Marine stärken."
 USA_Advanced_Destroyers:0 "Fortgeschrittene Zerstörer"
 USA_Advanced_Destroyers_desc:0 "Unsere Marine muss Versorgungslinien schützen, die sich über den halben Globus erstrecken. Das bedeutet, dass unsere Zerstörer neben ihren Aufgaben in den Bereichen Bodenunterstützung, Seegefecht, Flugabwehr und U-Boot-Jagd auch umfangreiche Konvoi-Eskorteaufgaben übernehmen müssen. Diese Anforderungen erfordern eine Flotte neuer, moderner Zerstörer, die weltweit ihresgleichen sucht."
 USA_Improve_Anti_Aircraft_Armament:0 "Verbesserung unserer Marine-Flugabwehrbewaffnung"
 USA_Improve_Anti_Aircraft_Armament_desc:0 "Wir werden unser Geld in die Modernisierung der Flugabwehr unserer Kriegsschiffe investieren. Die Macht der Luftstreitkräfte und die damit verbundene Gefahr für unsere Kriegsschiffe sind offensichtlich. Es erscheint uns am besten, unsere Flugabwehr zu maximieren, unabhängig von den Kosten."
 USA_Improve_Anti_Aircraft_Armament_tt:0 "Ermöglicht §YEntscheidungen§!, neue Flugabwehrvarianten §YLeichte Kreuzer§! freizuschalten"
 USA_Shipboard_Radar:0 "Schiffsradar"
 USA_Shipboard_Radar_desc:0 "Jedes unserer Schiffe wird nun mit Radaranlagen ausgestattet, die unsere Erkennung feindlicher Schiffe erheblich verbessern, sodass wir ihnen angemessen begegnen können."
 USA_Radar_Guided_Artillery:0 "Radargelenkte Artillerie"
 USA_Radar_Guided_Artillery_desc:0 "Wir werden die Genauigkeit von Marinefeuereinsätzen verbessern, indem wir die Feuerkontrolle rationalisieren. Dazu nutzen wir Radar, um vollautomatische Verfolgungsmechanismen zu entwickeln, die die Positionen feindlicher Schiffe genau vorhersagen, sodass wir unseren Feind auch auf die äußerste Reichweite unserer Geschütze treffen können."
 USA_New_Naval_Doctrines:0 "Neue Marinedoktrinen"
 USA_New_Naval_Doctrines_desc:0 "Unsere Marine ist hinsichtlich Schiffsgröße und Marinetonnage deutlich gewachsen, unsere Marinedoktrin hinkt jedoch hinterher. Wir müssen in eine neue Ära der Seekriegsführung eintreten und neue Strategien und Taktiken nutzen, um unsere Feinde auf See zu vernichten."
 USA_Destroyers_for_Allies:0 "Zerstörer für Verbündete"
 USA_Destroyers_for_Allies_desc:0 ""
 usa_destroyers_for_allies_tt:0 "Schaltet eine §YEntscheidung§! frei, um die §YÜbergabe§! von §YZerstörern§! aus unserem Arsenal an die Flotten unserer Verbündeten in Lieferungen von §Y10§! zu organisieren."
 USA_Arctic_Convoys:0 "USA_Arctic_Convoys"
 USA_Arctic_Convoys_desc:0 ""
 USA_Iranian_Convoys:0 "USA_Iranische_Konvois"
 USA_Iranian_Convoys_desc:0 ""
 USA_Demobilization:0 "Demobilisierung"
 USA_Demobilization_desc:0 ""
 USA_Lessons_of_War:0 "USA_Lessons_of_War"
 USA_Lessons_of_War_desc:0 ""
 USA_Respond_to_Marshalls_Myth:0 "Reagieren Sie auf Marshalls Mythos"
 USA_Respond_to_Marshalls_Myth_desc:0 ""
 USA_Initiate_Operation_Paperclip:0 "Starten Sie die Operation „Büroklammer“"
 USA_Initiate_Operation_Paperclip_desc:0 "Wir werden uns die Ingenieure unserer ehemaligen Feinde zunutze machen und ihre Arbeit für unsere Zwecke finanzieren. Es ist unerlässlich, dass wir nie wieder in einen militärischen Konflikt verwickelt werden. Wir werden bei jeder technologischen Innovation, ob militärisch oder anderweitig, an der Spitze stehen."
 USA_Atomic_Energy_Act:0 "USA_Atomenergiegesetz"
 USA_Atomic_Energy_Act_desc:0 ""
