USAAH_join_the_comintern_communist_path:0 "Treten Sie der Komintern bei"
USAAH_join_the_comintern_communist_path_desc:0 "Die UdSSR und ihre Komintern-Fraktion haben sich in diesen Zeiten der Verzweiflung als würdiges kommunistisches Land erwiesen. Wir werden um ein diplomatisches Bündnis bitten, um die Revolution gleichzeitig auf zwei Kontinenten auszubreiten."
USAAH_undermine_allies:0 "Verbündete untergraben"
USAAH_undermine_allies_desc:0 "Die Alliierten sind dumm. Mit ihrer dürftigen Propaganda und ihren dummen, leeren Versprechungen können sie es niemals mit der Macht des Volkes aufnehmen. Wir können nicht schlimmer sein als sie, solange wir nicht etwas dazu zu sagen haben!"
USAAH_on_our_own:0 "Auf eigene Faust"
USAAH_on_our_own_desc:0 "Scheiß auf die Komintern und diese slawischen Mistkerle. Wir werden anfangen, diplomatische Einrichtungen zu schaffen und Rekrutierungsschreiben zu verschicken, damit wir das neue rote Leuchtfeuer der Hoffnung sein können."
USAAH_neutrality:0 "Neutralität"
USAAH_neutrality_desc:0 "Da wir nun über geeignete diplomatische Kommunikationskanäle verfügen, werden wir versuchen, ein friedliches, ausschließlich auf Verteidigung ausgerichtetes Bündnis zu gründen, dem jedes Land beitreten kann, wenn es von schmutzigen imperialistischen Mächten angegriffen wird."
USAAH_our_own_bloc:0 "Unser eigener Block"
USAAH_our_own_bloc_desc:0 "Die Komintern ist ein Relikt der Vergangenheit. Es braucht eine neue, starke und fortschrittliche kommunistische Kraft. Nachdem wir nun angemessene diplomatische Einrichtungen eingerichtet haben, können wir Diplomaten einstellen und unsere eigene Fraktion gründen. Nun geht es an die Verbreitung der Revolution!"
USAAH_peace_and_safety:0 "Frieden und Sicherheit"
USAAH_peace_and_safety_desc:0 ""
USAAH_faction_warn_tt:0 "Es wird dringend empfohlen, sich vor dem Versenden von Einladungen zu vergewissern, dass die Länder kommunistisch sind. Siehe auch „Verdeckte Agenten senden“! Fokus"
USAAH_invite_communists_central_america:0 "Laden Sie Kommunisten in Mittelamerika ein"
USAAH_invite_communists_central_america_desc:0 "Mexiko und andere zentralamerikanische Länder liegen praktisch direkt an unserer Südgrenze. Wir müssen sicherstellen, dass diese Länder unter unserem Einfluss bleiben und nicht mit unseren Feinden verbündet sind. Wir werden ihnen Bündnisvorschläge unterbreiten."
USAAH_upper_latin_american_countries:0 "Laden Sie Kommunisten in Ober-Lateinamerika ein"
USAAH_upper_latin_american_countries_desc:0 "Die neue Welt, wie man so schön sagt. Imperialisten mögen diese armen Stämme vor Hunderten von Jahren kolonisiert haben, aber wir sorgen dafür, dass das nie wieder passiert. Der Kommunismus wird unsere Kameraden ein für alle Mal befreien! Wir beginnen damit, ihnen Allianzeinladungen zu schicken. Gemeinsam sind wir stärker!"
USAAH_central_latin_america:0 "Laden Sie Kommunisten in Mittellateinamerika ein"
USAAH_central_latin_america_desc:0 "Senden Sie weiterhin Allianzeinladungen."
USAAH_lower_latin_american_countries:0 "Laden Sie Kommunisten in Lateinamerika ein"
USAAH_lower_latin_american_countries_desc:0 "Nachdem wir nun Einladungen an die meisten südamerikanischen Länder verschickt haben, können wir mit dieser letzten Ladung fertig werden."
USAAH_carribean_memberships:0 "Laden Sie Kommunisten in der Karibik ein"
USAAH_carribean_memberships_desc:0 "Die Karibik ist ein unerforschtes Gebiet, und diese dreckigen Imperialisten werden versuchen, dort ihre dumme Politik zu verbreiten. Wir werden den karibischen Ländern ein Bündnisangebot unterbreiten, schließlich wollen wir doch nicht, dass ausländische Mächte dort Militärstützpunkte errichten, oder?"
USAAH_help_canada:0 "Helfen Sie Kanada, sich abzuspalten"
USAAH_help_canada_desc:0 "Unsere Brüder im Norden müssen von der Unterdrückung durch die Briten befreit werden. Wir werden ein Referendum unter den Kanadiern einleiten und sie fragen, ob sie unserem Bündnis beitreten oder unter der Unterdrückung bleiben möchten."
USAAH_help_canada_second:0 "Laden Sie Kanada zur Allianz ein"
USAAH_help_canada_second_desc:0 "Nachdem wir nun sichergestellt haben, dass in Kanada eine ordnungsgemäße Regelung eingeführt wird, können wir den Gouverneuren einen Vorschlag für ein Bündnis unterbreiten."
CAN_canadian_independence_settled:0 " Die Unabhängigkeit Kanadas ist geklärt"
USAAH_spread_communism_in_the_americas:0 "Verbreitung des Kommunismus in Amerika"
USAAH_spread_communism_in_the_americas_desc:0 "Um sicherzustellen, dass unser Einflussbereich in Amerika stark bleibt, müssen wir damit beginnen, die Revolution auf unsere amerikanischen Mitnationen auszuweiten."
USAAH_finance_revolutionaries:0 "Finanzrevolutionäre"
USAAH_finance_revolutionaries_desc:0 "Der König aller Könige: Geld. Bis dieses unterdrückerische kapitalistische System etabliert ist, müssen wir es sammeln und mit unseren Revolutionären auf dem ganzen Kontinent teilen, um sicherzustellen, dass sie unseren Kampfgeist am Brennen halten."
USAAH_finance_revolutionaries_tt:0 "§YFinanzielle Hilfe§! wird an §Rkommunistische Sympathisanten§! in Amerika gesendet.\nDies wird die Wirkung der Entsendung verdeckter Agenten verstärken."
USAAH_send_weapons_to_revolutionaries:0 "Waffen an Revolutionäre schicken"
USAAH_send_weapons_to_revolutionaries_desc:0 "Im Ernstfall kann man nicht mit Stöcken und Steinen kämpfen, oder? Wir werden unsere Waffenreserven mit unseren Genossen auf dem ganzen Kontinent teilen, damit sie sich gegen die kapitalistische Unterdrückung verteidigen können."
USAAH_send_weapons_to_revolutionaries_tt:0 "§YWaffen§! werden an §Rkommunistische Milizen§! in Amerika geschickt. \nDies wird die Wirkung der Entsendung von Geheimagenten verstärken."
USAAH_spanish_and_portugese_propaganda_broadcasts:0 "Spanische und portugiesische Propagandasendungen"
USAAH_spanish_and_portugese_propaganda_broadcasts_desc:0 "Wir dürfen nicht kleinkariert sein, wir müssen über den Atlantik hinausblicken. Spanien und Portugal haben vor Hunderten von Jahren ihre gewalttätigen Ansichten so hartnäckig verbreitet, dass sie nun die Konsequenzen ihrer eigenen Politik zu spüren bekommen. Wir werden Agenten entsenden, um ihre Politik zu beeinflussen."
USAAH_send_covert_agents:0 "Senden Sie verdeckte Agenten"
USAAH_send_covert_agents_desc:0 "Wenn alle Vorbereitungen abgeschlossen sind und unsere Feinde in der Unterzahl sind, können wir endlich damit beginnen, auf dem ganzen Kontinent Revolutionen zu inszenieren."
USAAH_send_covert_agents_tt:0 "§YErmöglicht Entscheidungen§!, kommunistische Aufstände in amerikanischen Ländern anzuzetteln.\nDie Bereitstellung von §Ybeiden Arten von Hilfe§! erhöht die Chancen eines §Gfriedlichen Übergangs§!."
