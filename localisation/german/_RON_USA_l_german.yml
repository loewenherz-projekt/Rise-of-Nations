 #USA_the_pacific_war:0 "The War in the Pacific"
 USA_the_pacific_war:0 "Trägereskorte"
 USA_the_pacific_war_desc:0 "Der Geleitträger (auch „Baby-Flattop“ genannt) war ein kleiner und langsamer Flugzeugträgertyp, der im Zweiten Weltkrieg eingesetzt wurde. Meistens wurden sie auf dem Rumpf eines Handelsschiffs gebaut – die Geleitträger der Casablanca-Klasse wurden um die Rümpfe von Liberty-Schiffen herum gebaut –, da sie zu langsam waren, um mit der Hauptflotte mitzuhalten. Sie waren jedoch ausreichend, um Konvois zu eskortieren und Bodentruppen bei amphibischen Landungen Luftunterstützung zu geben. Geleitträger waren günstig und konnten schnell gebaut werden, sodass sie als Notlösung dienten, wenn Flottenträger knapp waren. Von den 151 Flugzeugträgern, die die USA während des Zweiten Weltkriegs bauten, waren 122 Geleitträger, darunter 50 der Casablanca-Klasse und 45 der Bogue-Klasse."
