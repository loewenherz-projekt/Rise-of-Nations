RON_American_Alt_History.93.t:0"Amerikaner drängen auf Union"
RON_American_Alt_History.93.d:0 "Es kam zu Unruhen und Gewaltausbrüchen, als Demonstranten ihren Wunsch äußerten, Kanada solle sich den USA in einer Union nordamerikanischer Völker anschließen. Washington drängt mit Nachdruck auf eine Union, die Kanada in die USA eingliedern würde."
RON_American_Alt_History.93.a:0 "Wir werden uns den Amerikanern anschließen!"
RON_American_Alt_History.93.b:0 "Nein, Kanadas Schicksal liegt woanders."

RON_American_Alt_History.173.t:0"Amerikaner drängen auf Union mit Kanada"
RON_American_Alt_History.173.d:0 "Es kam zu Unruhen und Gewaltausbrüchen, als Demonstranten ihren Wunsch äußerten, Kanada solle sich den USA in einer Union nordamerikanischer Völker anschließen. Washington drängt mit Nachdruck auf eine Union, die Kanada in die USA eingliedern würde."
RON_American_Alt_History.173.a:0 "Kanada kann sich ihnen anschließen"
RON_American_Alt_History.173.b:0 "Nein, Kanada ist ein integraler Bestandteil unseres Imperiums"

 USA_anschluss_rejected:0"Kanada lehnte den Anschluss ab"

 RON_American_Alt_History.94.t:0 "Union"
 RON_American_Alt_History.94.d:0 "Wiederholte Aufstände in Kanada zeigen deutlich, dass sich die Menschen dort nach der Einheit mit unserem Staat sehnen. Jetzt ist es an der Zeit, Maßnahmen zu ergreifen und dem Willen des Volkes Ausdruck zu verleihen."
 RON_American_Alt_History.94.a:0 "Wie kann jemand sagen, dass Kanada nicht amerikanisch ist?!"
 
 RON_American_Alt_History.95.t:0 "[From.GetName] lehnt die Union ab!"
 RON_American_Alt_History.95.d:0 "Die Idioten in [From.Capital.GetName] haben sich geweigert, die Fusion unserer beiden Nationen zu akzeptieren! Das ist eine eklatante Missachtung des Willens des kanadischen Volkes, und das wird nicht hingenommen! Wir müssen die Union möglicherweise mit militärischen Mitteln durchsetzen."
 RON_American_Alt_History.95.a:0 "Wir müssen uns auf eine militärische Intervention vorbereiten."

RON_American_Alt_History.1000.t:0 "Der Bürgerkrieg in Spanien"
RON_American_Alt_History.1000.d:0 "In Spanien tobt ein Bürgerkrieg zwischen Nationalisten und Republikanern. Natürlich müssen wir unseren Waffenbrüdern in ihrem Kampf für die Arbeiterrevolution helfen, aber wie viel Hilfe sind wir bereit zu leisten? Schließlich haben die imperialistischen Mächte auch uns im Visier, also könnten wir auch einige dieser Waffen brauchen."
RON_American_Alt_History.1000.a:0 "Wir werden Unterstützung schicken."
RON_American_Alt_History.1000.b:0 "Wir werden Ihnen eine beträchtliche Unterstützung zukommen lassen."
RON_American_Alt_History.1000.c:0 "Wir schicken ihnen alles, was sie sich wünschen könnten."

RON_American_Alt_History.1001.t:0 "Der Wiederaufbau Spaniens"
RON_American_Alt_History.1001.d:0 "Obwohl der Spanische Bürgerkrieg vorbei ist, ist das Land noch lange nicht wiederaufgebaut. Natürlich müssen wir unseren Waffenbrüdern in ihrem Kampf für die Arbeiterrevolution helfen, aber wie viel Hilfe sind wir bereit zu leisten? Schließlich haben die imperialistischen Mächte auch uns im Visier, sodass wir möglicherweise auch einige dieser Ressourcen benötigen."
RON_American_Alt_History.1001.a:0 "Wir werden Unterstützung schicken."
RON_American_Alt_History.1001.b:0 "Wir werden Ihnen eine beträchtliche Unterstützung zukommen lassen."
RON_American_Alt_History.1001.c:0 "Wir schicken ihnen alles, was sie sich wünschen könnten."

RON_American_Alt_History.1002.t:0 "Die USA haben uns Hilfe geschickt!"
RON_American_Alt_History.1002.d_military_help:0 "Die USA haben uns im Rahmen unseres Kampfes für die spanischen Arbeiter eine Menge militärische Ausrüstung geschickt."
RON_American_Alt_History.1002.d_industrial_help:0 "Die USA haben uns im Rahmen unseres Kampfes für die spanischen Arbeiter eine Menge Industrieausrüstung und Ressourcen geschickt."
RON_American_Alt_History.1002.a:0 "Vielen Dank!"
sent_some_help_to_spain:0 "Habe etwas Hilfe geschickt"
RON_American_Alt_History.1002.b:0 "Vielen Dank!"
sent_much_help_to_spain:0 "Viel Hilfe geschickt"
RON_American_Alt_History.1002.c:0 "Vielen Dank!"
sent_a_lot_help_to_spain:0 "Viel Hilfe geschickt"


#DC Conference

 abandoned_mexicans:0 "Verlassene Mexikaner"
 USA_demand_sinaloa_threat:0 "Amerika forderte Sinaloa"


 RON_American_Alt_History.140.t:0 "Die Washington DC-Konferenz"
 RON_American_Alt_History.140.d:0 "Die amerikanischen Forderungen nach der Sinaloa-Region in Mexiko, in der eine beträchtliche Zahl ethnischer Amerikaner lebt, haben einen Höhepunkt erreicht. [USA.GetLeader] hat Truppen entlang der mexikanischen Grenze stationiert, um einen Angriff vorzubereiten. In Washington, D.C. finden derzeit Gespräche zwischen Großbritannien, Frankreich, Deutschland und den USA statt, um eine friedliche Lösung der Sinaloa-Krise auszuhandeln. Wie wird die britische Position aussehen?"
 RON_American_Alt_History.140.d_2:0 "Die amerikanischen Forderungen nach der mexikanischen Sinaloa-Region, in der eine beträchtliche Zahl ethnischer Amerikaner lebt, haben einen Höhepunkt erreicht. [USA.GetLeader] hat Truppen entlang der mexikanischen Grenze stationiert, um einen Angriff vorzubereiten. Da wir bereits bewiesen haben, dass wir den amerikanischen Expansionismus nicht akzeptieren, haben wir nun einen weiteren Verbündeten im Krieg gegen Amerika."
 RON_American_Alt_History.140.d_3:0 "Die amerikanischen Forderungen nach der Sinaloa-Region in Mexiko, in der eine beträchtliche Zahl ethnischer Amerikaner lebt, haben einen Höhepunkt erreicht. [USA.GetLeader] hat Truppen entlang der mexikanischen Grenze stationiert, um einen Angriff vorzubereiten. In Washington, D.C. finden Gespräche zwischen den Niederlanden, Großbritannien, Frankreich, Deutschland und den USA statt, um eine friedliche Lösung der Sinaloa-Krise auszuhandeln. Wie wird die niederländische Position aussehen?"
 RON_American_Alt_History.140.a:0 "Die Mexikaner sind auf sich allein gestellt."
 RON_American_Alt_History.140.b:0 "Mexiko muss verteidigt werden!"
 RON_American_Alt_History.141.d:0 "Die amerikanischen Forderungen nach der Sinaloa-Region in Mexiko, in der eine beträchtliche Zahl ethnischer Amerikaner lebt, haben einen Höhepunkt erreicht. [USA.GetLeader] hat Truppen entlang der mexikanischen Grenze stationiert, um einen Angriff vorzubereiten. In Washington, D.C. finden derzeit Gespräche zwischen Großbritannien, Frankreich, Deutschland und den USA statt, um eine friedliche Lösung der Sinaloa-Krise zu erreichen. Die Briten haben deutlich gemacht, dass sie nicht die Absicht haben, wegen eines „Streits in einem fernen Land“ in den Krieg zu ziehen. Sollen wir ihrem Beispiel folgen oder unseren Verpflichtungen gegenüber Mexiko nachkommen und ihnen Unterstützung anbieten?"
 RON_American_Alt_History.141.a:0 "Überlassen Sie die Mexikaner ihrem Schicksal."
 RON_American_Alt_History.141.b:0 "Zum Teufel mit den Briten! Frankreich unterstützt seine Freunde!"
 RON_American_Alt_History.142.d:0 "Die amerikanischen Forderungen nach der Sinaloa-Region in Mexiko, in der eine beträchtliche Zahl ethnischer Amerikaner lebt, haben einen Höhepunkt erreicht. [USA.GetLeader] hat Truppen entlang der mexikanischen Grenze stationiert, um einen Angriff vorzubereiten. In Washington, D.C. finden derzeit Gespräche zwischen Großbritannien, Frankreich, Deutschland und den USA statt, um eine friedliche Lösung der Sinaloa-Krise zu erreichen. Die Briten weigern sich, nachzugeben, und drohen den Amerikanern stattdessen mit Krieg, sollten sie die Grenzen Mexikos verletzen. Ein Krieg könnte unmittelbar bevorstehen."
 RON_American_Alt_History.142.a:0 "Wir müssen uns vorbereiten!"
 RON_American_Alt_History.142.b:0 "Frankreich sollte sich da raushalten."
 RON_American_Alt_History.143.t:0 "Frankreich verlässt die Alliierten"
 RON_American_Alt_History.143.d:0 "Die sturköpfigen Franzosen haben sich in der Sinaloa-Krise geweigert, unserem Beispiel zu folgen! Sie stehen weiterhin zu Mexiko, und da wir dies nicht tun, haben sie beschlossen, unser Bündnis aufzukündigen. Schon jetzt bereitet sich Frankreich auf einen bevorstehenden Krieg mit Amerika vor."
 RON_American_Alt_History.143.a:1 "Narren! [USA.GetLeader] muss besänftigt werden!"
 RON_American_Alt_History.144.d:0 "Die amerikanischen Ansprüche auf unser Territorium in der Sinaloa-Region werden immer aggressiver, und nun sammeln sich ihre Truppen entlang unserer Grenze! In Washington D.C. findet eine Konferenz statt, auf der europäische Staats- und Regierungschefs über die Zukunft Mexikos diskutieren, zu der wir jedoch nicht eingeladen sind.\n\nGlücklicherweise scheinen die Alliierten ihre früheren Unterstützungsversprechen einzuhalten. Sie haben [USA.GetLeader] mit Krieg gedroht, sollte unsere Grenzen auch nur im Geringsten verletzt werden. Trotzdem müssen wir uns auf einen unmittelbar bevorstehenden amerikanischen Angriff vorbereiten."
 RON_American_Alt_History.144.a:0 "Gut! Lasst sie kommen!"
 RON_American_Alt_History.145.d:0 "Die amerikanischen Ansprüche auf unser Territorium in der Sinaloa-Region werden immer heftiger, und nun sammeln sich ihre Truppen entlang unserer Grenze! In Washington D.C. findet eine Konferenz statt, auf der europäische Staats- und Regierungschefs über die Zukunft Mexikos diskutieren, zu der wir jedoch nicht eingeladen sind.\n\nDie feigen Briten weigern sich, unsere Souveränität zu unterstützen, aber zumindest die Franzosen verteidigen uns! Sie haben ihr Bündnis mit Großbritannien aufgegeben und ein neues mit uns geschlossen und versprechen, Mexiko gegen die amerikanische Aggression zu unterstützen."
 RON_American_Alt_History.145.a:0 "Es lebe Frankreich!"
 RON_American_Alt_History.146.t:0 "Das Diktat von Washington DC"
 RON_American_Alt_History.146.d:0 "Die amerikanischen Ansprüche auf unser Territorium in der Sinaloa-Region werden immer aggressiver, und nun sammeln sich ihre Truppen entlang unserer Grenze! In Washington, D.C., findet eine Konferenz statt, auf der europäische Staats- und Regierungschefs über die Zukunft Mexikos diskutieren, zu der wir jedoch nicht eingeladen sind.\n\nSowohl Großbritannien als auch Frankreich haben ihre früheren Versprechen, uns gegen die amerikanische Aggression zu unterstützen, zurückgezogen. Ihre Diplomaten haben klargestellt, dass wir, wenn wir uns den Amerikanern widersetzen, dies allein tun. Vielleicht bleibt uns gar keine andere Wahl, als Sinaloa aufzugeben..."
 RON_American_Alt_History.146.a:0 "Dies ist ein schwarzer Tag für Europa."
 RON_American_Alt_History.146.b:0 "Wir werden niemals aufgeben!"
 RON_American_Alt_History.147.d:0 "In Washington, D.C., fanden Gespräche zwischen den Staatschefs Amerikas, Großbritanniens, Frankreichs und Deutschlands über die Zukunft Mexikos statt. Großbritannien und seine Verbündeten haben unsere rechtmäßigen Ansprüche auf Sinaloa zurückgewiesen und uns mit Krieg gedroht, sollten wir die tschechische Grenze „verletzen“.\n\nEin Plan für die Invasion Mexikos wurde ausgearbeitet, doch dieser wird wahrscheinlich einen Krieg in ganz Europa auslösen. Wir müssen sicherstellen, dass wir darauf vorbereitet sind."
 RON_American_Alt_History.147.a:0 "Zeit, dies auf die harte Tour zu tun."
 RON_American_Alt_History.148.d:0 "In Washington D.C. fanden Gespräche zwischen den Staatschefs Amerikas, Großbritanniens, Frankreichs und Deutschlands über die Zukunft Mexikos statt. Die Briten haben Einsicht gezeigt und unsere Ansprüche auf Sinaloa als legitim anerkannt, doch die sturen Franzosen weigern sich, nachzugeben.\n\nSie haben ihre Zusammenarbeit mit Großbritannien aufgegeben und stattdessen engere Beziehungen zu den Mexikanern aufgebaut. Es sieht so aus, als müssten wir uns mit beiden gleichzeitig auseinandersetzen, aber zumindest werden die Briten jetzt hoffentlich nicht eingreifen..."
 RON_American_Alt_History.148.a:0 "Dies könnte zu unserem Vorteil sein."
 RON_American_Alt_History.149.d:0 "In Washington, D.C., fanden Gespräche zwischen den Staatschefs Amerikas, Großbritanniens, Frankreichs und Deutschlands über die Zukunft Mexikos statt. Sowohl Großbritannien als auch Frankreich haben unsere Ansprüche auf den Sinaloa-Nationalpark als legitim anerkannt und ihre früheren Unterstützungsangebote an die Mexikaner zurückgezogen.\n\nTrotz der aussichtslosen Lage weigern sich die hartnäckigen Mexikaner, ihr Territorium aufzugeben! Wir werden es mit Gewalt einnehmen müssen. Ein Invasionsplan wurde ausgearbeitet, der dieses abscheuliche Versailles-Experiment von der Erde tilgen wird!"
 RON_American_Alt_History.149.a:0 "Die Mexikaner müssen vernichtet werden."
 RON_American_Alt_History.150.d:0 "In Washington, D.C., fanden Gespräche zwischen den Staatschefs Amerikas, Großbritanniens, Frankreichs und Deutschlands über die Zukunft Mexikos statt. Sowohl Großbritannien als auch Frankreich haben unsere Ansprüche auf das Sinaloa-Gebiet als legitim anerkannt und ihre früheren Unterstützungsangebote an die Mexikaner zurückgezogen. Die Mexikaner haben die Hoffnungslosigkeit ihrer Lage erkannt und uns die Sinaloa-Gebiete überlassen. Ihre unterdrückten amerikanischen Einwohner werden endlich in unsere große Nation integriert!"
 RON_American_Alt_History.150.a:0 "Dies ist ein historischer Tag für Amerika."
 
 RON_American_Alt_History.153.t:0 "Das Schicksal Mexikos"
 RON_American_Alt_History.153.d:0 "Die Amerikaner haben sich nicht mit dem Diebstahl des Sinaloa zufrieden gegeben, sondern nun beschlossen, auch den Rest unseres Landes zu erobern. Von unseren sogenannten Verbündeten im Stich gelassen und unsere besten Verteidigungsanlagen durch das Diktat Washingtons verloren, erscheint die Lage hoffnungslos..."
 RON_American_Alt_History.153.a:0 "Geben Sie den Amerikanern nach."
 RON_American_Alt_History.153.b:0 "...und dennoch müssen wir Widerstand leisten!"
 RON_American_Alt_History.154.t:0 "Die Mexikaner leisten Widerstand"
 RON_American_Alt_History.154.d:0 "Die Mexikaner haben irgendwie den Mut aufgebracht, gegen unsere Besetzung ihres Landes zu kämpfen. Ihre besten Verteidigungsanlagen befanden sich im Sinaloa-Gebiet, das jetzt unter unserer Kontrolle steht. Daher sollte dieser Feldzug schnell gehen."
 RON_American_Alt_History.154.a:0 "Mexiko-Stadt wird bald uns gehören."
 RON_American_Alt_History.155.d:0 "Das Ende Mexikos steht bevor, und unsere Truppen marschieren gerade in Mexiko-Stadt ein. Mit der Kapitulation des mexikanischen Militärs haben wir große Mengen an Waffen freigesetzt. Insbesondere die Panzer sollten unseren Streitkräften gute Dienste leisten.\n\nZentralmexiko wird als Protektorat an Amerika angegliedert, doch was soll aus Südmexiko werden? Wir können es als autonomen Marionettenstaat unter Salvador Abascal etablieren."
 RON_American_Alt_History.155.d_2:0 "Nachdem wir Mexiko erobert haben, müssen wir überlegen, wie wir diese Gebiete am besten aufteilen.\n\nZentralmexiko bleibt als Protektorat amerikanisch, aber was soll aus Südmexiko werden? Wir können es als autonomen Marionettenstaat unter Salvador Abascal etablieren."
 RON_American_Alt_History.155.a:0 "Machen Sie Südmexiko zu einem Marionettenstaat."
 RON_American_Alt_History.155.b:0 "Ganz Mexiko gehört zu Amerika!"
 
 RON_American_Alt_History.170.t:0 "[From.GetName] bietet Land an"
 RON_American_Alt_History.170.d:0 "Die Regierung von [From.GetName] hat uns gerade eine Nachricht geschickt, in der sie uns um die Übernahme einiger ihrer Gebiete bittet, da wir uns in einer besseren geografischen Lage befinden, um das besagte Land zu verwalten."
 RON_American_Alt_History.170.a:0 "Akzeptieren"
 RON_American_Alt_History.170.b:0 "Abfall"
 
 RON_American_Alt_History.171.t:0 "[From.GetName] Akzeptiert"
 RON_American_Alt_History.171.d:0 "Die Regierung von [From.GetName] hat uns soeben eine Nachricht gesendet, in der unsere Anfrage angenommen wurde. Die Landübertragung wird sofort wirksam."
 RON_American_Alt_History.171.a:0 "Exzellent"
 
 RON_American_Alt_History.172.t:0 "[From.GetName] lehnt ab"
 RON_American_Alt_History.172.d:0 "Die Regierung von [From.GetName] hat uns gerade eine Nachricht gesendet, in der unsere Anfrage abgelehnt wird."
 RON_American_Alt_History.172.a:0 "Narren"
 
 RON_American_Alt_History.174.t:0 "[From.GetName] bietet Unabhängigkeit"
 RON_American_Alt_History.174.d:0 "Die Regierung von [From.GetName] hat uns gerade eine Nachricht geschickt, in der sie ihre Unterstützung für eine starke und unabhängige irische Republik anbietet. Obwohl wir uns seit Jahrhunderten nach Freiheit sehnen, wäre diese wahrscheinlich mit einem hohen Preis verbunden, da Großbritannien uns wahrscheinlich nicht einfach aus seinem Empire austreten lassen wird."
 RON_American_Alt_History.174.a:0 "Unabhängigkeit erklären"
 RON_American_Alt_History.174.b:0 "Unsere Loyalität gilt Großbritannien"
 
 RON_American_Alt_History.175.t:0 "[From.GetName] Akzeptiert"
 RON_American_Alt_History.175.d:0 "Die Regierung von [From.GetName] hat uns gerade eine Nachricht gesendet, in der unsere Anfrage angenommen wird."
 RON_American_Alt_History.175.a:0 "Wir haben die Flammen der Revolution angefacht"
 
 RON_American_Alt_History.176.t:0 "[From.GetName] lehnt ab"
 RON_American_Alt_History.176.d:0 "Die Regierung von [From.GetName] hat uns gerade eine Nachricht gesendet, in der unsere Anfrage abgelehnt wird."
 RON_American_Alt_History.176.a:0 "Feiglinge..."
 
 RON_American_Alt_History.177.t:0 "[From.GetName] erklärt Unabhängigkeit"
 RON_American_Alt_History.177.d:0 "Die Regierung von [From.GetName] hat uns soeben eine Nachricht geschickt, in der sie die Unabhängigkeit und den Abbruch aller wirtschaftlichen und politischen Beziehungen zur Regierung Seiner Majestät erklärt. Irische Milizen haben Nordirland besetzt und die lokale Regierung als Geisel genommen. Darüber hinaus hat die provisorische Regierung in Dublin angekündigt, dass Verhandlungen vom Tisch sind."
 RON_American_Alt_History.177.a:0 "Wir werden diesen Aufstand niederschlagen!"
 RON_American_Alt_History.177.b:0 "Wen interessiert schon Irland?"
 
 RON_American_Alt_History.178.t:0 "Kommunistischer Aufstand!"
 RON_American_Alt_History.178.d:0 "Ein Bürgerkrieg ist ein Krieg zwischen organisierten Gruppen innerhalb eines Staates (oder Landes). Ziel einer Seite kann die Übernahme der Kontrolle über das Land oder eine Region, die Erlangung der Unabhängigkeit einer Region oder eine Änderung der Regierungspolitik sein. Der Begriff ist eine Lehnübersetzung des lateinischen „bellum civile“, das für die verschiedenen Bürgerkriege der Römischen Republik im 1. Jahrhundert v. Chr. verwendet wurde. Die meisten modernen Bürgerkriege sind mit der Intervention externer Mächte verbunden. Ein Bürgerkrieg ist ein anhaltender, organisierter und groß angelegter Konflikt mit hoher Intensität, an dem oft reguläre Streitkräfte beteiligt sind. Bürgerkriege können zu zahlreichen Opfern und dem Verbrauch erheblicher Ressourcen führen."
 RON_American_Alt_History.178.a:0 "Wir werden diesen Aufstand niederschlagen!"
 
 RON_American_Alt_History.179.t:0 "Kommunistische Verschwörung vereitelt!"
 RON_American_Alt_History.179.d:0 "Ein Staatsstreich ist die Entmachtung einer Regierung und ihrer Macht. Typischerweise handelt es sich dabei um eine illegale Machtergreifung durch eine politische Fraktion, eine Rebellengruppe, das Militär oder einen Diktator. Viele Wissenschaftler betrachten einen Putsch als erfolgreich, wenn die Usurpatoren die Macht ergreifen und mindestens sieben Tage lang halten."
 RON_American_Alt_History.179.a:0 "Narren..."
 
 RON_American_Alt_History.1501.t:0 "Die UdSSR erreichen"
 usa_use_foreign_aid:0 "Nutzung ausländischer Hilfe"
 RON_American_Alt_History.1501.d:0 "Nach der Machtübernahme der Kommunistischen Partei begannen viele Politiker, sich für eine kooperativere Politik gegenüber [SOV.GetName] einzusetzen."
 RON_American_Alt_History.1501.a:0 "Schlagen Sie eine Militärmission vor."
 RON_American_Alt_History.1501.b:0 "Schlagen Sie eine Wirtschaftsallianz vor."
 RON_American_Alt_History.1501.c:0 "Schlagen Sie einen Verteidigungspakt vor."
 RON_American_Alt_History.1502.t:0 "[USA.GetName] Schlagen Sie einen Vertrag vor"
 RON_American_Alt_History.1502.d_military_help:0 "Diplomaten der neu gegründeten [USA.GetName] sind vor Kurzem in [Sov.Capital.GetName] eingetroffen, um einen möglichen Vertrag zu besprechen, der eine Militärmission beinhaltet, die den Streitkräften beider Nationen durch den Austausch von Wissen des Oberkommandos helfen würde."
 RON_American_Alt_History.1502.d_industrial_help:0 "Diplomaten der neu gegründeten [USA.GetName] sind kürzlich in [Sov.Capital.GetName] eingetroffen, um einen möglichen neuen Wirtschaftspakt zwischen beiden Nationen zu besprechen. Dies würde beiden Nationen bei der Industrialisierung helfen und den Fünfjahresplan ergänzen."
 RON_American_Alt_History.1502.d_defensive_pact:0 "Diplomaten der neu gegründeten [USA.GetName] sind kürzlich in [Sov.Capital.GetName] eingetroffen, um einen möglichen neuen Verteidigungspakt zwischen beiden Nationen zu besprechen. Dieser würde uns zwingen, den [USA.GetAdjective] im Falle einer ausländischen Aggression zu helfen, würde uns aber garantieren, dass sie uns im Falle eines Angriffs auf das Mutterland unterstützen würden."
 RON_American_Alt_History.1502.a:0 "Unterzeichnen Sie den Vertrag"
 RON_American_Alt_History.1502.b:0 "Den Vertrag ablehnen"
 RON_American_Alt_History.1503.t:0 "Die Sowjets unterzeichnen den Vertrag"
 RON_American_Alt_History.1503.a:0 "Exzellent"
 RON_American_Alt_History.1503.b:0 "Exzellent"
 RON_American_Alt_History.1503.c:0 "Exzellent"
 RON_American_Alt_History.1504.t:0 "Die Sowjets lehnen den Vertrag ab"
 RON_American_Alt_History.1503.d_military_help:0 "[SOV.GetLeader] hat den Vertrag unterzeichnet und [SOV.GetAdjective] Militärberater haben begonnen, in den Vereinigten Staaten einzutreffen."
 usa_sov_military_treaty:0 "[SOV.GetAdjective]-[USA.GetAdjective] Militärmission"
 RON_American_Alt_History.1503.d_industrial_help:0 "[SOV.GetLeader] hat den Vertrag unterzeichnet und die [SOV.GetAdjective] haben begonnen, günstige Handelsabkommen mit uns zu schließen."
 usa_sov_economic_treaty:0 "[SOV.GetAdjective]-[USA.GetAdjective] Wirtschaftsvertrag"
 RON_American_Alt_History.1503.d_defensive_alliance:0 "[SOV.GetLeader] hat den Vertrag unterzeichnet und der [SOV.GetAdjective]-[USA.GetAdjective]-Verteidigungspakt ist nun in Kraft."
 RON_American_Alt_History.1504.a:0 "Wir werden uns daran erinnern"
 RON_American_Alt_History.1504.b:0 "Wir werden uns daran erinnern"
 RON_American_Alt_History.1504.c:0 "Wir werden uns daran erinnern"
 RON_American_Alt_History.1505.t:0 "Kommunistischer Aufstand"
 RON_American_Alt_History.1505.d:0 "Nach wochenlangen verstärkten Aktivitäten hat die [Root.GetCommunistParty] in den meisten Städten des Landes einen offenen Aufstand gegen [Root.GetLeader] begonnen. In [Root.Capital.GetName] wurden Bereitschaftspolizei und Armee eingesetzt, doch Experten gehen davon aus, dass es Wochen dauern wird, bis sich die Lage stabilisiert."
 RON_American_Alt_History.1505.a:0 "Das ist eine Katastrophe!"
 usa_one_state_communist_revolt:0 "Kommunistischer Aufstand"
 RON_American_Alt_History.1506.t:0 "Kommunistischer Aufstand"
 RON_American_Alt_History.1506.desc:0 "Nach Wochen verstärkter Aktivitäten hat die [Root.GetCommunistParty] einen bewaffneten Aufstand im ganzen Land gestartet, um [Root.GetLeader] zu stürzen. [Root.Capital.GetName] befindet sich im Belagerungszustand, während Kommunisten und Loyalisten auf den Hauptstraßen kämpfen."
 RON_American_Alt_History.1506.a:0 "Das Volk wird siegreich sein!"
 RON_American_Alt_History.1506.b:0 "Wir haben sie zurückgedrängt!"
 RON_American_Alt_History.1507.t:0 "Von den USA unterstützter Putsch"
 RON_American_Alt_History.1507.d:0 "Die [Root.GetCommunistParty] hat mit Unterstützung der [USA.GetName] einen erfolgreichen Putsch gegen die Regierung von [Root.GetLeader] gestartet, der nun wegen seiner Verbrechen gegen das [Root.GetAdjective]-Volk vor Gericht steht."
 RON_American_Alt_History.1507.a:0 "Das Volk steht siegreich da!"
 RON_American_Alt_History.1507.b:0 "Wir werden [Root.GetLeader] retten und uns zur Wehr setzen!"
 RON_American_Alt_History.1508.t:0 "Nationalistischer Aufstand"
 RON_American_Alt_History.1508.d:0 "Nach wochenlanger verstärkter Aktivität hat die [Root.GetFascistParty] in den meisten Städten des Landes einen offenen Aufstand gegen [Root.GetLeader] begonnen. In [Root.Capital.GetName] wurden Bereitschaftspolizei und Armee eingesetzt, doch Experten gehen davon aus, dass es Wochen dauern wird, bis sich die Lage stabilisiert."
 RON_American_Alt_History.1508.a:0 "Das ist eine Katastrophe!"
 usa_one_state_nationalist_revolt:0 "Nationalistischer Aufstand"
 RON_American_Alt_History.1509.t:0 "Nationalistischer Aufstand"
 RON_American_Alt_History.1509.desc:0 "Nach Wochen zunehmender Aktivität hat die [Root.GetFascistParty] einen bewaffneten Aufstand im ganzen Land gestartet, um [Root.GetLeader] zu stürzen. [Root.Capital.GetName] befindet sich im Belagerungszustand, während Nationalisten und Loyalisten auf den Hauptstraßen kämpfen."
 RON_American_Alt_History.1509.a:0 "Wir werden unsere Nation zur Größe führen!"
 RON_American_Alt_History.1509.b:0 "Wir haben sie zurückgedrängt!"
 RON_American_Alt_History.1510.t:0 "Von den USA unterstützter Putsch"
 RON_American_Alt_History.1510.d:0 "Die [Root.GetFascistParty] hat mit Unterstützung von [USA.GetName] einen erfolgreichen Putsch gegen die Regierung von [Root.GetLeader] gestartet, der wegen Verschwörung gegen die Zukunft von [Root.GetName] vor Gericht steht."
 RON_American_Alt_History.1510.a:0 "Wir werden unsere Nation zur Größe führen!"
 RON_American_Alt_History.1510.b:0 "Wir werden [Root.GetLeader] retten und uns zur Wehr setzen!" 
 usa_beacon_of_communism:0 "Leuchtfeuer des Kommunismus"
 RON_American_Alt_History.1511.t:0 "[Root.GetFactionName]-Mitgliedschaft"
 RON_American_Alt_History.1511.d:0 "Obwohl unser ruhmreiches Land an sich stark ist und [From.GetNameDefCap] kürzlich seine Prioritäten korrigiert und den Kommunismus als überlegene Art der Herrschaft über ein Volk akzeptiert hat, haben sie uns eine formelle Bitte geschickt, [Root.GetFactionName] beizutreten. Wir sollten darüber nachdenken."
 RON_American_Alt_History.1511.a:0 "Sie sind herzlich willkommen."
 RON_American_Alt_History.1511.b:0 "Sie sind noch nicht bereit."
 RON_American_Alt_History.1512.t:0 "Sie haben unsere Anfrage angenommen!"
 RON_American_Alt_History.1512.d:0 "[SOV.GetLeader] hat unserem Antrag auf Beitritt zur Komintern stattgegeben. Unsere Delegation ist mit vollem Stimmrecht dem Exekutivkomitee beigetreten."
 RON_American_Alt_History.1512.a:0 "Möge der Kommunismus siegen!"
 RON_American_Alt_History.1513.t:0 "Sie haben unsere Anfrage abgelehnt ..."
 RON_American_Alt_History.1513.d:0 "[SOV.GetLeader] hat unseren Antrag auf Beitritt zur Komintern ohne Angabe von Gründen abgelehnt."
 RON_American_Alt_History.1513.a:0 "Verlierer. Wir werden das überlegene kommunistische Land sein!"
 RON_American_Alt_History.1514.t:0 "Verstärkte Forderungen nach einem Referendum"
 RON_American_Alt_History.1514.d:0 "Nach wochenlangen hitzigen Diskussionen über unseren Status im Britischen Empire fordern beide Seiten nun ein Referendum, um unseren Status ein für alle Mal zu klären."
 RON_American_Alt_History.1514.a:0 "Erlauben Sie das Referendum"
 RON_American_Alt_History.1514.b:0 "Blockieren Sie das Referendum"
 RON_American_Alt_History.1515.t:0 "Ergebnisse des kanadischen Referendums"
 RON_American_Alt_History.1515.d_2:0 "Unsere politischen Manöver in Kanada haben Früchte getragen: Die Unabhängigkeitsoption wurde mit knapper Mehrheit im Referendum angenommen. Die kanadische Regierung erkannte das Ergebnis des Referendums an und erklärte ihre Unabhängigkeit vom Britischen Empire."
 RON_American_Alt_History.1515.d_1:0 "Trotz unserer Bemühungen hat die politische Einmischung der [ENG.GetAdjective]-Regierung dazu geführt, dass das Referendum nicht angenommen wurde und der Status quo beibehalten wurde. Vorerst ist Kanada Teil des Britischen Empire."
 RON_American_Alt_History.1515.a:0 "Exzellent."
 RON_American_Alt_History.1515.b:0 "Verdammt."
 RON_American_Alt_History.1516.d_2:0 "Trotz unserer Bemühungen, die Unabhängigkeitsbewegung in Kanada zu untergraben, konnte sie genügend Unterstützung gewinnen und das Referendum mit knapper Mehrheit annehmen. Die kanadische Regierung hat das Ergebnis des Referendums anerkannt und ihre Unabhängigkeit vom Britischen Empire erklärt."
 RON_American_Alt_History.1516.d_1:0 "Dank unserer Bemühungen, die Unabhängigkeitsbewegung zu untergraben, ist das Referendum gescheitert und der Status quo wurde gestärkt."
 RON_American_Alt_History.1516.a:0 "Sie haben uns noch nicht zum letzten Mal gesehen."
 RON_American_Alt_History.1516.b:0 "Wirklich gute Arbeit, Jungs."
 RON_American_Alt_History.1517.t:0 "Kanadische Regierung blockiert Referendum!"
 RON_American_Alt_History.1517.d:0 "Die kanadische Regierung hat das vom Volk geforderte Referendum blockiert! Dies ist ein eklatanter Machtmissbrauch gegenüber dem kanadischen Volk und unserer Forderung, gegen die kanadische Regierung vorzugehen. Sie ist jedoch immer noch Teil des britischen Empires, und ein Eingreifen würde uns in einen Krieg mit ihr führen."
 RON_American_Alt_History.1517.a:0 "Wir müssen eingreifen."
 RON_American_Alt_History.1517.b:0 "Es müssen kühlere Köpfe die Oberhand gewinnen."
 RON_American_Alt_History.1518.t:0 "Unsere Position im Kampf."
 RON_American_Alt_History.1518.d:0 "Unabhängigkeitsbewegungen unter Führung der [CAN.GetCommunistParty] fordern ein Referendum für die Unabhängigkeit Kanadas. Zwar fehlt es der Bewegung derzeit an Unterstützung, um den Status quo zu gefährden, doch Experten prognostizieren, dass sie in den kommenden Wochen weiter anwachsen wird. Die Regierung gerät zunehmend unter Druck, sich in diesem Kampf für eine Seite zu entscheiden."
 RON_American_Alt_History.1518.a:0 "Unterstützen Sie die Unabhängigen"
 RON_American_Alt_History.1518.b:0 "Unterstützen Sie die Loyalisten"

 ## Im claiming all 2000-2100 Event IDs For Operation Redbeard
RON_American_Alt_History.2000.t:0 "Operation Rotbart"
RON_American_Alt_History.2000.d:0 "Amerika schlägt vor, in die Sowjetunion einzumarschieren. Der europäische Teil Russlands bis zum Ural würde unter Deutschland, Polen, Rumänien und Finnland aufgeteilt, die Türkei bekäme ein Stück des Kaukasus und Japan und Amerika würden den Rest aufteilen. Zwischen dem Ural und Sibirien könnte möglicherweise ein neutraler russischer Pufferstaat errichtet werden. Operation Rotbart ist der Codename für die Invasion der Sowjetunion durch Amerika und die meisten seiner Verbündeten innerhalb der Achsenmächte. Sie soll beginnen, sobald die Armeen der Achsenmächte in Stellung sind. Die Operation wurde nach Friedrich Barbarossa („Rotbart“) benannt, einem Kaiser des Heiligen Römischen Reiches und deutschen König aus dem 12. Jahrhundert. Mit der Operation sollte das ideologische Ziel des faschistischen Amerikas umgesetzt werden, den Osten der Sowjetunion zu erobern und mit Amerikanern neu zu bevölkern. Der amerikanische Generalplan Neu-Alaska zielte darauf ab, einen Teil der eroberten Bevölkerung als Zwangsarbeiter für die Kriegsanstrengungen der amerikanischen Achsenmächte einzusetzen und gleichzeitig die in den besagten sowjetischen Gebieten gefundenen Bodenschätze zu erobern. Ihr ultimatives Ziel besteht darin, mehr Lebensraum für Amerika zu schaffen und durch die Unterdrückung der russischen Sprache eine Amerikanisierung der einheimischen slawischen Völker herbeizuführen."
RON_American_Alt_History.2000.a:1 "Wir werden den Kommunismus zerstören"
RON_American_Alt_History.2000.b:1 "Wir werden uns nicht einmischen"
RON_American_Alt_History.2000.c:1 "Wir verurteilen diesen Akt der Aggression"

RON_American_Alt_History.2001.t:0 "Die Frage der Führung"
RON_American_Alt_History.2001.d:0 "Operation Rotbart ist der Codename für die Invasion der Sowjetunion durch Amerika und die meisten seiner Achsenmächte. Sie soll beginnen, sobald die Achsenmächte in Stellung sind. Die Operation wurde nach Friedrich Barbarossa („Rotbart“) benannt, einem Kaiser des Heiligen Römischen Reiches und deutschen König aus dem 12. Jahrhundert. Mit der Operation soll das ideologische Ziel des faschistischen Amerikas umgesetzt werden, den Osten der Sowjetunion zu erobern und mit Amerikanern neu zu bevölkern. Der amerikanische Generalplan Neu-Alaska zielte darauf ab, einen Teil der eroberten Bevölkerung als Zwangsarbeiter für die Kriegsanstrengungen der amerikanischen Achsenmächte einzusetzen und gleichzeitig die in den besagten sowjetischen Gebieten vorhandenen Bodenschätze zu erobern. Ihr letztendliches Ziel ist die Schaffung von mehr Lebensraum für Amerika und die letztendliche Amerikanisierung der einheimischen slawischen Völker durch die Unterdrückung der russischen Sprache. Wer wird diese Operation leiten?"
RON_American_Alt_History.2001.a:1 "Amerika wird diese Operation leiten"
RON_American_Alt_History.2001.b:1 "Deutschland wird diese Operation leiten"

