RON_American_Alt_History.65.t:0 "Intervention im Zweiten Amerikanischen Bürgerkrieg"
RON_American_Alt_History.65.d:0 "Die Vereinigten Staaten von Amerika stehen in Flammen. Fünf verschiedene Regierungen erheben jeweils den Anspruch, die legitime Regierung des gesamten Landes zu sein. Es ist an der Zeit, dass wir entscheiden, welche Seite wir unterstützen, wenn überhaupt."
RON_American_Alt_History.65.a:0 "Unterstützen Sie das Militär"
RON_American_Alt_History.65.b:0 "Unterstützen Sie die Bundesregierung"
RON_American_Alt_History.65.c:0 "Unterstützen Sie die Konföderation"
RON_American_Alt_History.65.e:0 "Unterstützen Sie die Kommunisten"
RON_American_Alt_History.65.f:0 "Unterstützen Sie die Monarchisten"
RON_American_Alt_History.65.g:0 "Besser nicht einmischen"

RON_American_Alt_History.66.t:0 "[From.GetName] sendet Hilfe"
RON_American_Alt_History.66.d:0 "Die Regierung von [From.GetName] hat uns gerade eine Waffenlieferung geschickt."
RON_American_Alt_History.66.a:0 "Großartig!"

RON_American_Alt_History.67.t:0 "[From.GetName] fordert diplomatische Anerkennung"
RON_American_Alt_History.67.d:0 "Die Regierung von [From.GetName] hat uns soeben mitgeteilt, dass sie von uns die Anerkennung ihres Austritts aus der Union und die Rückgabe der ehemaligen Konföderierten Staaten an sie verlangt. Im Gegenzug garantiert sie unsere Unabhängigkeit und unterzeichnet einen Nichtangriffspakt mit uns. Die Nichteinhaltung dieser Bedingungen wird höchstwahrscheinlich zu einem Krieg führen."
RON_American_Alt_History.67.a:1 "Akzeptieren"
RON_American_Alt_History.67.b:1 "Abfall"

RON_American_Alt_History.68.t:0 "[From.GetName] Akzeptiert"
RON_American_Alt_History.68.d:0 "Ein Ultimatum ist eine Forderung, deren Erfüllung innerhalb einer bestimmten Frist verlangt wird und die mit einer Drohung für den Fall der Nichterfüllung verbunden ist. Ein Ultimatum ist in der Regel die letzte Forderung in einer Reihe von Forderungen. Daher ist die Frist meist kurz und die Forderung nicht verhandelbar. Die Drohung, die das Ultimatum untermauert, kann je nach Forderung und den sonstigen Umständen variieren."
RON_American_Alt_History.68.a:1 "Exzellent"

RON_American_Alt_History.69.t:0 "[From.GetName] lehnt ab"
RON_American_Alt_History.69.d:0 "Ein Ultimatum ist eine Forderung, deren Erfüllung innerhalb einer bestimmten Frist verlangt wird und die mit einer Drohung für den Fall der Nichterfüllung verbunden ist. Ein Ultimatum ist in der Regel die letzte Forderung in einer Reihe von Forderungen. Daher ist die Frist meist kurz und die Forderung nicht verhandelbar. Die Drohung, die das Ultimatum untermauert, kann je nach Forderung und den sonstigen Umständen variieren."
RON_American_Alt_History.69.a:1 "Sie werden dafür bezahlen"
RON_American_Alt_History.69.b:1 "Wir sind nicht bereit für den Krieg"

RON_American_Alt_History.70.t:0 "Die Silberne Legion von Amerika"
RON_American_Alt_History.70.d:0 "Die Silver Legion of America, allgemein bekannt als die Silver Shirts, war eine amerikanische faschistische Untergrundorganisation, die von William Dudley Pelley gegründet wurde und ihren Hauptsitz in Asheville, North Carolina, hatte. Pelley war ein ehemaliger Journalist, Romanautor und Drehbuchautor, der zum Spiritualisten wurde und ab 1931 antisemitische Ansichten verbreitete und behauptete, Juden seien von Dämonen besessen. Er gründete die Silver Legion mit dem Ziel, eine „spirituelle und politische Erneuerung“ herbeizuführen, inspiriert vom Erfolg von Hitlers Nazi-Bewegung in Deutschland. Die paramilitärische, nationalistisch-faschistische Gruppe Silver Legion trug eine Uniform, die Hitlers Braunhemden (SA) nachempfunden war. Sie bestand aus einem silbernen Hemd mit blauer Krawatte, einem Feldhut und blauen Cordhosen mit Leggings. Die Uniformhemden trugen über dem Herzen ein scharlachrotes L, das laut Pelley „für Liebe, Loyalität und Befreiung“ stand. Das blockige, serifenbetonte L-Emblem war in einer Schriftart gehalten, die der heutigen Rockwell Extra Bold ähnelte. Die Flagge der Organisation hatte ein schlichtes silbernes Feld mit einem roten L im oberen linken Bereich. Legionsführer Pelley rief zu einem „christlichen Gemeinwesen“ in Amerika auf, das die Prinzipien von Nationalismus und Theokratie vereinen, Juden und Nichtweiße jedoch ausschließen sollte. Er behauptete, er würde Amerika vor den jüdischen Kommunisten retten, so wie „Mussolini und seine Schwarzhemden Italien und Hitler und seine Braunhemden Deutschland gerettet hatten“. Pelley kandidierte bei den Wahlen des Jahres 1936 für das Amt des US-Präsidenten auf dem Ticket einer dritten Partei unter dem Banner der Christlichen Partei. Pelley hoffte, in einer „Silbernen Revolution“ die Macht zu ergreifen und sich selbst zum Diktator der Vereinigten Staaten zu machen. Er sollte „der Chef“ genannt werden, genau wie andere faschistische Staatsoberhäupter mit ähnlichen Titeln wie „Der Führer“ für Adolf Hitler und „II. Duce“ für Benito Mussolini."
RON_American_Alt_History.70.a:1 "Loyalität, Befreiung und Legion"

RON_American_Alt_History.71.t:0 "Der Deutsch-Amerikanische Bund"
RON_American_Alt_History.71.d:0 "Am 19. März 1936 wurde der Deutsch-Amerikanische Bund als Nachfolgeorganisation der Friends of New Germany in Buffalo, New York, gegründet. Der Bund wählte den in Deutschland geborenen amerikanischen Staatsbürger Fritz Julius Kuhn zu seinem Bundesführer. Kuhn war ein Veteran der bayerischen Infanterie im Ersten Weltkrieg und Alter Kämpfer der NSDAP, der 1934 die amerikanische Staatsbürgerschaft erhielt. Kuhn war anfangs ein erfolgreicher Anführer und konnte die Organisation einen und ihre Mitgliederzahl erhöhen, doch schließlich wurde er einfach als inkompetenter Betrüger und Lügner angesehen. Die Verwaltungsstruktur des Bundes ahmte die regionale Verwaltungsunterteilung der NSDAP nach. Der Deutsch-Amerikanische Bund teilte die Vereinigten Staaten in drei Gaue ein: Gau Ost, Gau West und Gau Mittlerer Westen. Zusammen umfassten die drei Gaue 69 Ortsgruppen: 40 im Gau Ost (17 in New York), 10 im Gau West und 19 im Gau Mittlerer Westen. Jeder Gau hatte seinen eigenen Gauleiter und Mitarbeiter, die die Aktivitäten des Bundes in der Region gemäß dem Führerprinzip leiteten. Der nationale Hauptsitz des Bundes befand sich in der 178 East 85th Street im New Yorker Stadtteil Manhattan. Die Organisation wählte ihren neuen Namen, um ihre amerikanische Glaubwürdigkeit zu betonen, nachdem die Presse ihr vorgeworfen hatte, unpatriotisch zu sein. Der Bund durfte nur aus amerikanischen Staatsbürgern deutscher Abstammung bestehen. Sein Hauptziel war es, ein positives Bild von Nazi-Deutschland zu fördern. "
RON_American_Alt_History.71.a:1 "Das amerikanische Reich erhebt sich"

RON_American_Alt_History.72.t:0 "Der Ku-Klux-Klan"
RON_American_Alt_History.72.d:0 "Der Ku-Klux-Klan, häufig abgekürzt als KKK oder der Klan, ist eine US-amerikanische, weiße, rassistische Terror- und Hassgruppe, deren Hauptziele Afroamerikaner, Juden, Latinos, Amerikaner asiatischer Abstammung, Katholiken, amerikanische Ureinwohner sowie Einwanderer, Linke, Homosexuelle, Muslime und Atheisten sind. Der Klan hat in drei verschiedenen Epochen existiert. Jede von ihnen hat extremistische, reaktionäre Positionen vertreten, wie etwa weißen Nationalismus, Einwanderungsgegner und – insbesondere in späteren Ausprägungen – Nordizismus, Antisemitismus, Antikatholizismus, Prohibition, Rechtspopulismus, Antikommunismus, Homophobie, Islamophobie, Antiprogressivismus und Antiatheismus. Historisch gesehen setzte der erste Klan Ende der 1860er Jahre Terrorismus – sowohl körperliche Angriffe als auch Mord – gegen politisch aktive Schwarze und ihre Verbündeten im Süden der USA ein. Alle drei Bewegungen haben zur „Säuberung“ der amerikanischen Gesellschaft aufgerufen und gelten allesamt als rechtsextreme Organisationen. In jeder Epoche war die Mitgliederzahl geheim und die Schätzungen der Gesamtzahl wurden sowohl von Freunden als auch von Feinden stark übertrieben."
RON_American_Alt_History.72.a:1 "Nicht ich selbst, sondern andere"

RON_American_Alt_History.75.t:0 "Formular der Roten Milizen"
RON_American_Alt_History.75.d:0 "Von Rekrutierungsbüros in unserem gesamten Gebiet haben wir Berichte erhalten, dass sich Tausende Freiwillige gemeldet haben, um für die Arbeiterrevolution zu kämpfen."
RON_American_Alt_History.75.a:1 "Gut"


RON_American_Alt_History.76.t:0 "Amerika entkolonialisiert"
RON_American_Alt_History.76.d:0 "In einem als rassistisch motiviert geltenden Schritt führt Amerika eine ethnische Säuberung seiner Länder durch und gewährt allen nicht-weißen Gebieten die Unabhängigkeit. Im Osten wurden die meisten Pazifikgebiete Japan im Austausch für einen gegenseitigen Verteidigungspakt angeboten. In den Black Belt-Staaten wurde eine Sonderverwaltungszone eingerichtet, und die amerikanische Regierung beabsichtigt, die dort lebende schwarze Bevölkerung zu deportieren."
RON_American_Alt_History.76.a:1 "Wir müssen unsere glorreiche Nation säubern"

RON_American_Alt_History.77.t:0 "Die Militärregierung"
RON_American_Alt_History.77.d:0 "Eine Militärdiktatur ist eine Diktatur, in der das Militär die vollständige oder weitgehende Kontrolle über die politische Autorität ausübt. Der Diktator ist häufig ein hochrangiger Offizier. Eine Militärjunta ist eine Regierung, die von einem Komitee militärischer Führer geführt wird. Der Begriff „Junta“ bedeutet „Versammlung“ oder „Komitee“ und stammt ursprünglich von der nationalen und lokalen Junta, die vom spanischen Widerstand gegen Napoleons Invasion in Spanien im Jahr 1808 organisiert wurde. Heute wird der Begriff für eine autoritäre Regierungsform verwendet, die durch eine oligarchische Militärdiktatur gekennzeichnet ist. Im Unterschied zu anderen Kategorien autoritärer Herrschaft, insbesondere dem starken Mann (autokratische Militärdiktaturen), der Maschinerie (oligarchische Parteidiktaturen) und dem Bossismus (autokratische Parteidiktaturen), wird damit eine Junta oft durch einen Staatsstreich an die Macht gebracht. Die Junta kann entweder formell die Macht als Regierungsorgan des Landes übernehmen und per Dekret regieren oder ihre Macht durch verbindliche (aber informelle) Kontrolle über eine nominell zivile Regierung ausüben. Diese beiden Formen der Juntaherrschaft werden auch als offene und verschleierte Herrschaft bezeichnet. Verschleierte Herrschaft kann die Form der Zivilisierung oder der indirekten Herrschaft annehmen. Zivilisierung liegt vor, wenn eine Junta ihre offensichtlich militärischen Merkmale öffentlich aufgibt, aber ihre Dominanz beibehält. Beispielsweise kann die Junta das Kriegsrecht aufheben, auf Militäruniformen zugunsten ziviler Kleidung verzichten, die Regierung mit ehemaligen Militäroffizieren „kolonisieren“ und sich politischer Parteien oder Massenorganisationen bedienen. „Indirekte Herrschaft“ bedeutet, dass die Junta verdeckt und hinter den Kulissen Kontrolle über eine zivile Marionette ausübt. Indirekte Herrschaft durch das Militär kann entweder eine umfassende Kontrolle über die Regierung oder die Kontrolle über einen engeren Satz von Politikbereichen wie Militär oder nationale Sicherheitsfragen umfassen. Wer wird die Militärregierung führen?"
RON_American_Alt_History.77.a:1 "Eine Junta ist vorzuziehen"
RON_American_Alt_History.77.b:1 "Douglas Macarthur"
RON_American_Alt_History.77.c:1 "Smedley Butler"

RON_American_Alt_History.78.t:0 "Nachkomme Washingtons zum Kaiser von Amerika gekrönt"
RON_American_Alt_History.78.d:0 "Eine Monarchie ist eine Regierungsform, in der eine Person, der Monarch, auf Lebenszeit oder bis zur Abdankung Staatsoberhaupt ist. Die politische Legitimität und Autorität des Monarchen kann von eingeschränkt und weitgehend symbolisch (konstitutionelle Monarchie) bis hin zu vollständig autokratischer (absolute Monarchie) variieren und sich auf die Bereiche Exekutive, Legislative und Judikative erstrecken."
RON_American_Alt_History.78.a:1 "Es lebe Paul I.!"

RON_American_Alt_History.79.t:0 "Nachkomme von Norton zum Kaiser von Amerika gekrönt"
RON_American_Alt_History.79.d:0 "Eine Monarchie ist eine Regierungsform, in der eine Person, der Monarch, auf Lebenszeit oder bis zur Abdankung Staatsoberhaupt ist. Die politische Legitimität und Autorität des Monarchen kann von eingeschränkt und weitgehend symbolisch (konstitutionelle Monarchie) bis hin zu vollständig autokratischer (absolute Monarchie) variieren und sich auf die Bereiche Exekutive, Legislative und Judikative erstrecken."
RON_American_Alt_History.79.a:1 "Lang lebe Norton II!"

RON_American_Alt_History.80.t:0 "Die Kommunistische Partei"
RON_American_Alt_History.80.d:0 "Die Kommunistische Partei der USA, offiziell Kommunistische Partei der Vereinigten Staaten von Amerika (CPUSA), ist eine kommunistische Partei in den Vereinigten Staaten, die 1919 nach einer Abspaltung der Sozialistischen Partei Amerikas infolge der Russischen Revolution gegründet wurde. Die Geschichte der CPUSA ist eng mit der amerikanischen Arbeiterbewegung und kommunistischen Parteien weltweit verbunden. Aufgrund der Palmer Raids, die während der Ersten Roten Angst begannen, operierte die Partei zunächst im Untergrund. In der ersten Hälfte des 20. Jahrhunderts hatte sie großen Einfluss auf die amerikanische Politik und spielte von den 1920er bis in die 1940er Jahre eine herausragende Rolle in der Arbeiterbewegung. Bekannt wurde sie durch ihren Kampf gegen Rassismus und Rassentrennung, nachdem sie 1931 die Verteidigung der Scottsboro Boys unterstützt hatte. Ihre Mitgliederzahl stieg während der Weltwirtschaftskrise, und die Partei spielte eine Schlüsselrolle im Congress of Industrial Organizations."
RON_American_Alt_History.80.a:1 "Proletarier aller Länder, vereinigt euch!"

RON_American_Alt_History.81.t:0 "Die Industriearbeiter der Welt"
RON_American_Alt_History.81.d:0 "Die Industrial Workers of the World (IWW), deren Mitglieder gemeinhin als „Wobblies“ bezeichnet werden, ist eine internationale Gewerkschaft, die 1905 in Chicago gegründet wurde. Der Ursprung des Spitznamens „Wobblies“ ist unklar. Die IWW-Ideologie verbindet allgemeines Gewerkschaftswesen mit Industriegewerkschaftswesen, da es sich um eine allgemeine Gewerkschaft handelt, die nach den verschiedenen Branchen unterteilt ist, die ihre Mitglieder beschäftigen. Die Philosophie und Taktik der IWW werden als „revolutionäres Industriegewerkschaftswesen“ beschrieben, mit Verbindungen zu sozialistischen, syndikalistischen und anarchistischen Arbeiterbewegungen. In den 1910er und frühen 1920er Jahren erreichte die IWW viele ihrer kurzfristigen Ziele, insbesondere im amerikanischen Westen, und organisierte über traditionelle Zünfte und Gewerkschaften hinweg Arbeiter in einer Vielzahl von Berufen und Branchen. Auf ihrem Höhepunkt im August 1917 wurde die Mitgliederzahl der IWW auf über 150.000 geschätzt, mit aktiven Zweigstellen in den Vereinigten Staaten, Kanada und Australien. Aufgrund der extrem hohen Mitgliederfluktuation in der IWW während dieser Zeit (geschätzt 133 % pro Jahrzehnt) ist es für Historiker schwierig, die Gesamtzahl der Mitglieder mit Sicherheit anzugeben, da die Arbeiter dazu neigten, der IWW in großer Zahl für relativ kurze Zeiträume beizutreten (z. B. während Streiks und Zeiten allgemeiner wirtschaftlicher Not)."
RON_American_Alt_History.81.a:1 "Proletarier aller Länder, vereinigt euch!"

RON_American_Alt_History.82.t:0 "Die Sozialistische Partei Amerikas"
RON_American_Alt_History.82.d:0 "Die Socialist Party of America (SPA) war eine sozialistische politische Partei in den Vereinigten Staaten. Sie entstand 1901 aus einem Zusammenschluss der drei Jahre alten Social Democratic Party of America und unzufriedenen Elementen der Socialist Labor Party of America, die sich 1899 von der Hauptorganisation abgespalten hatten. In den ersten Jahrzehnten des 20. Jahrhunderts erhielt sie beträchtliche Unterstützung von vielen verschiedenen Gruppen, darunter Gewerkschafter, progressive Sozialreformer, populistische Bauern und Einwanderer. Sie weigerte sich jedoch, Koalitionen mit anderen Parteien einzugehen oder ihren Mitgliedern auch nur zu erlauben, für andere Parteien zu stimmen. Eugene V. Debs erhielt bei den Präsidentschaftswahlen zweimal (1912 und 1920) über 900.000 Stimmen. Die Partei stellte außerdem zwei US-Abgeordnete (Victor L. Berger und Meyer London), Dutzende von Staatsabgeordneten, über 100 Bürgermeister und zahllose niedere Beamte. Der entschiedene Widerstand der Partei gegen die amerikanische Beteiligung am Ersten Weltkrieg wurde zwar von vielen begrüßt, führte aber auch zu prominenten Überläufern, behördlicher Repression und Selbstjustiz. Die Partei wurde durch einen Fraktionskrieg über die Reaktion auf die Oktoberrevolution in der Russischen Republik 1917 und die Gründung der Kommunistischen Internationale 1919 weiter erschüttert – viele Mitglieder verließen die Partei und traten der Kommunistischen Partei der USA bei."
RON_American_Alt_History.82.a:1 "Proletarier aller Länder, vereinigt euch!"

RON_American_Alt_History.83.t:0 "Freiwillige strömen herbei, um der American Legion beizutreten"
RON_American_Alt_History.83.d:0 "Die American Legion, allgemein bekannt als die Legion, ist eine gemeinnützige Organisation von US-Kriegsveteranen mit Hauptsitz in Indianapolis, Indiana. Sie besteht aus Bundesstaaten, US-Territorien und Überseedepartements, die wiederum aus lokalen Vertretungen bestehen. Die Organisation wurde am 15. März 1919 in Paris, Frankreich, von tausend Offizieren und Soldaten der American Expeditionary Forces (AEF) gegründet und am 16. September 1919 vom US-Kongress anerkannt. Die Legion spielte eine führende Rolle bei der Ausarbeitung und Verabschiedung des Servicemen&#39;s Readjustment Act von 1944, allgemein bekannt als „GI Bill“. Neben der Organisation von Gedenkveranstaltungen unterstützen die Mitglieder auch Krankenhäuser und Kliniken des Department of Veterans Affairs (VA). Die Legion engagiert sich in der themenorientierten US-Politik. Ihre wichtigste politische Tätigkeit ist die Lobbyarbeit für die Interessen von Veteranen und Militärangehörigen, einschließlich der Unterstützung von Leistungen wie Renten und der Veterans Health Administration. Darüber hinaus hat es in der Vergangenheit den Amerikanismus, die individuelle Verpflichtung gegenüber der Gemeinschaft, dem Staat und der Nation sowie Frieden und guten Willen gefördert."
RON_American_Alt_History.83.a:1 "Wir werden gewinnen"

