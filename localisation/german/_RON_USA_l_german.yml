RON_American_Alt_History.87.a:1 "Wir werden gewinnen"

RON_American_Alt_History.88.t:0 "Amerika bietet einen Pakt an"
RON_American_Alt_History.88.d:0 "Der Heilige Pakt („Abkommen zwischen dem Heiligen Stuhl und dem amerikanischen Staat“) ist ein zwischen dem Vatikan und dem aufstrebenden amerikanischen Imperium ausgehandelter Vertrag. Er wurde von Kardinalstaatssekretär Eugenio Pacelli, dem späteren Papst Pius XII., im Namen von Papst Pius XI. und von Botschafter William Phillips im Namen der amerikanischen Regierung unterzeichnet. Der Vertrag garantiert die Rechte der katholischen Kirche in Amerika. Artikel 16 besagt, dass Bischöfe bei Amtsantritt einen Treueeid auf den Militärgouverneur oder Kaiser des gemäß der Verfassung eingesetzten amerikanischen Imperiums leisten müssen. Der Vertrag verpflichtet außerdem alle Geistlichen, sich der Tätigkeit in oder für politische Parteien zu enthalten."
RON_American_Alt_History.88.a:0 "Akzeptieren."
RON_American_Alt_History.88.b:0 "Abfall."

RON_American_Alt_History.89.t:0 "Der Vatikan akzeptiert"
RON_American_Alt_History.89.d:0 "Der Heilige Pakt („Abkommen zwischen dem Heiligen Stuhl und dem amerikanischen Staat“) ist ein zwischen dem Vatikan und dem aufstrebenden amerikanischen Imperium ausgehandelter Vertrag. Er wurde von Kardinalstaatssekretär Eugenio Pacelli, dem späteren Papst Pius XII., im Namen von Papst Pius XI. und von Botschafter William Phillips im Namen der amerikanischen Regierung unterzeichnet. Der Vertrag garantiert die Rechte der katholischen Kirche in Amerika. Artikel 16 besagt, dass Bischöfe bei Amtsantritt einen Treueeid auf den Militärgouverneur oder Kaiser des gemäß der Verfassung eingesetzten amerikanischen Imperiums leisten müssen. Der Vertrag verpflichtet außerdem alle Geistlichen, sich der Tätigkeit in oder für politische Parteien zu enthalten."
RON_American_Alt_History.89.a:0 "Exzellent."

RON_American_Alt_History.90.t:0 "Vatikan lehnt ab"
RON_American_Alt_History.90.d:0 "Der Vatikan hat unseren vorgeschlagenen Pakt mit der Begründung abgelehnt, dass unser Regime gegen alles verstoße, wofür er stehe."
RON_American_Alt_History.90.a:0 "Sie werden dafür bezahlen ..."

RON_American_Alt_History.91.t:0 "Von Amerika gesponserter monarchistischer Putsch"
RON_American_Alt_History.91.d:0 "Eine Monarchie ist eine Regierungsform, in der eine Person, der Monarch, auf Lebenszeit oder bis zur Abdankung Staatsoberhaupt ist. Die politische Legitimität und Autorität des Monarchen kann von eingeschränkt und weitgehend symbolisch (konstitutionelle Monarchie) bis hin zu vollständig autokratischer (absolute Monarchie) variieren und sich auf die Bereiche Exekutive, Legislative und Judikative erstrecken."

