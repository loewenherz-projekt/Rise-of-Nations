 USA_Increase_Military_Funding:0 "Erhöhung der Militärfinanzierung"
 USA_Increase_Military_Funding_desc:0 "Wir werden einen Gesetzentwurf durch den Kongress bringen, der zusätzliche Mittel für das Militär vorsieht, die für den Ausbau unserer Streitkräfte verwendet werden sollen, um die Grenzen der Vereinigten Staaten besser verteidigen zu können."
 USA_New_Flying_Schools:0 "Neue Pilotschulen"
 USA_New_Flying_Schools_desc:0 "Wir werden neue Pilotenschulen für das Militär gründen, um den Pilotenpool unserer Luftwaffe zu erweitern."
 USA_B17s:0 "B17"
 USA_B17s_desc:0 "Wir werden Boeing mit der Nutzung ihres neuen strategischen Bomberdesigns „Flying Fortress“ für unsere Luftwaffe beauftragen."
 USA_Establish_the_USAAF:0 "Gründung der USAAF"
 USA_Establish_the_USAAF_desc:0 "Wir werden die US Army Air Forces gründen, um das alte US Army Air Corps zu ersetzen. Diese neue Organisation wird unabhängiger sein als ihre Vorgängerin und die Effektivität und Zerstörungskraft der amerikanischen Luftstreitkräfte erheblich steigern."
 USA_Norden_Bombsight:0 "Norden Bombenzielgerät"
 USA_Norden_Bombsight_desc:0 "Wir werden an allen unseren Bombern einen neuen Bombenwerfer anbringen. Dies wird uns ermöglichen, Präzisionsbombardements gegen feindliche Boden- und Seeziele durchzuführen."
 USA_Prewar_Aircraft_Production_Effort:0 "Produktionsanstrengungen für Flugzeuge vor dem Krieg"
 USA_Prewar_Aircraft_Production_Effort_desc:0 "Wir haben festgestellt, dass unsere Luftwaffe unzureichend ist. Wir hinken bei der Anzahl unserer Flugzeuge den anderen Großmächten hinterher und müssen diese Situation sofort ändern!"
 USA_Expand_the_Guard:0 "Erweitern Sie die Nationalgarde"
 USA_Expand_the_Guard_desc:0 "Wir werden die Schaffung neuer Nationalgardeeinheiten im ganzen Land fördern, um die Verteidigung des Landes in Kriegszeiten zu stärken und der Bevölkerung wirtschaftliche Anreize und Beschäftigungsmöglichkeiten zu bieten."
 USA_expand_the_guard_tt:0 "Schalten Sie §YEntscheidung§! frei, um im §YKrieg§! zusätzliche §YDivisionen§! der Nationalgarde §Yeinzusetzen§!"
 USA_Expand_the_Marines:0 "Erweitern Sie das Marine Corps"
 USA_Expand_the_Marines_desc:0 "Angesichts der zunehmenden Spannungen im Pazifik werden wir neue Marinedivisionen aufstellen. Diese Divisionen werden eines Tages an vorderster Front eines Krieges im Pazifik stehen."
 USA_expand_the_marines_tt:0 "Schalten Sie §YEntscheidung§! frei, um das Marine Corps effektiv zu ergänzen und zusätzliche Marine-§YDivisionen§! einzusetzen."
 USA_Deploy_the_Marines:0 "Setzen Sie die Marines ein"
 USA_Deploy_the_Marines_desc:0 "Wir werden unsere Marineregimenter neu organisieren und in sechs Marinedivisionen aufteilen und sie auf den Kampf im Pazifik vorbereiten."
 USA_Heed_Mitchells_Warnings:0 "Beachten Sie Mitchells Warnungen"
 USA_Heed_Mitchells_Warnings_desc:0 "Billy Mitchell sprach über die Bedeutung von Flugzeugen in der Seekriegsführung, die Bedeutung von Flugzeugträgern in den Konflikten von morgen und die Gefahr, die ein japanischer Angriff auf Pearl Harbor darstellt. Wir müssen seine Warnungen beachten und uns auf diese schöne neue Welt vorbereiten, während die Spannungen in Asien zunehmen."
 USA_Modern_Carrier_Aircraft:0 "Moderne Trägerflugzeuge"
 USA_Modern_Carrier_Aircraft_desc:0 "Wir werden neue trägergestützte Flugzeuge in Dienst stellen, da sich der Schwerpunkt unserer Marine von den alten Schlachtschiffen auf die schnittigen, neuen Flugzeugträger der Zukunft verlagert."
 USA_Modern_Carriers:0 "Moderne Träger"
 USA_Modern_Carriers_desc:0 "Wir werden in die Beschleunigung der Entwicklung des Flugzeugträgers der Zukunft investieren. Mit diesen Schiffen werden wir die Meere so beherrschen, dass unser Heimatland im nächsten Jahrzehnt garantiert vor der Gefahr einer Invasion geschützt ist."
 USA_Heightened_Naval_Readiness:0 "Erhöhte Marinebereitschaft"
 USA_Heightened_Naval_Readiness_desc:0 "Wir werden unsere Flotten in höchste Alarmbereitschaft versetzen und besonderen Wert auf Übungen und Gefechtstraining legen. Es ist wahrscheinlich, dass wir schon bald in einen Krieg hineingezogen werden. Unsere Flotte muss kriegsbereit bleiben, wenn sie erfolgreich sein will."
 USA_Create_the_Office_of_Scientific_Research_and_Development:0 "Erstellen des OSRD"
 USA_Create_the_Office_of_Scientific_Research_and_Development_desc:0 "Wir werden das Büro für wissenschaftliche Forschung und Entwicklung (Of Scientific Research and Development, OWF) gründen. Diese neue Organisation wird unter die Leitung von Vannevar Bush gestellt, der direkt dem Präsidenten unterstellt ist und alle militärischen Forschungsprojekte in den Vereinigten Staaten organisieren wird."
 USA_Superior_Radar_Systems:0 "Überlegene Radarsysteme"
 USA_Superior_Radar_Systems_desc:0 "Wir werden ein nationales Programm einrichten, im Rahmen dessen wir Ingenieure neue Radarsysteme entwickeln lassen."
 USA_Computers:0 "Computer"
 USA_Computers_desc:0 "Wir werden ein nationales Programm einrichten, im Rahmen dessen wir Ingenieure neue Computersysteme entwickeln lassen."
 USA_S1_Section:0 "S1 Abschnitt"
 USA_S1_Section_desc:0 "Wir werden unser Atomprogramm auf die nächste Stufe heben. Wir haben genug Zeit damit verbracht, die Machbarkeit dieses Projekts zu prüfen. Es ist an der Zeit, das Manhattan-Projekt zu organisieren und mit der Kanalisierung amerikanischer Investitionen zu beginnen."
 USA_Naval_Act:0 "Marinegesetz"
 USA_Naval_Act_desc:0 "Wir werden das Marinegesetz verabschieden, das unserer Marine zusätzliche Mittel zuweist und sie auf einen Krieg im Pazifik vorbereitet."
 USA_Two_Ocean_Navy_Act:0 "Zwei-Ozean-Marinegesetz"
 USA_Two_Ocean_Navy_Act_desc:0 "Wir werden den Vinson-Walsh Act verabschieden, der eine massive Erweiterung unserer Marine ermöglicht. Wir könnten in diesen Krieg hineingezogen werden, ob wir wollen oder nicht, aber wir werden auf jeden Fall vorbereitet sein. Wir werden 18 Flugzeugträger, 7 Schlachtschiffe, 6 Schlachtkreuzer, 27 Kreuzer, 115 Zerstörer, 43 U-Boote und 15.000 Flugzeuge hinzufügen."
 USA_Louisiana_Maneuvers:0 "Die Louisiana-Manöver"
 USA_Louisiana_Maneuvers_desc:0 "Wir werden in Louisiana eine Kriegsspielübung durchführen, um die Truppenausbildung, unsere logistischen Fähigkeiten und unsere Landdoktrinen zu bewerten."
 USA_Modernize_the_Artillery:0 "Modernisierung der Artillerie"
 USA_Modernize_the_Artillery_desc:0 "Unsere Armee verwendet immer noch Kopien der ehrwürdigen French-75, der erfolgreichsten Kanone ihrer Zeit – im Jahr 1897. Unser Militär benötigt moderne Artilleriegeschütze, die den US-Streitkräften im nächsten Konflikt ausreichende Feuerunterstützung bieten können."
 USA_Supreme_Commander_of_Allied_Forces:0 "Oberbefehlshaber der alliierten Streitkräfte"
 USA_Supreme_Commander_of_Allied_Forces_desc:0 "Wir werden Dwight D. Eisenhower, den fähigsten Organisationsführer, der uns zur Verfügung steht, damit beauftragen, die alliierten Streitkräfte bei der Befreiung der Welt von den Mächten der Tyrannei anzuführen."
 USA_Lessons_from_Spain:0 "Lehren aus Spanien"
 USA_Lessons_from_Spain_desc:0 "Da wir den Verlauf des spanischen Konflikts aus der Ferne beobachtet haben, haben wir ein besseres Verständnis für die Rolle von Flugzeugen in der modernen Kriegsführung entwickelt."
 USA_Occupy_Greenland_and_Iceland:0 "Grönland und Island besetzen"
 USA_Occupy_Greenland_and_Iceland_desc:0 "Nach der Niederlage Dänemarks begannen die Briten mit der Planung einer Invasion Islands, um sicherzustellen, dass das Land nicht als strategischer Stützpunkt gegen sie genutzt werden konnte. Diese Invasion ist ihnen zwar gelungen, sie verfügen jedoch nicht über die nötige Mannstärke, um Island zu besetzen. Sie fordern uns auf, dies mit unseren Truppen zu tun und sicherzustellen, dass weder Grönland noch Island gegen sie eingesetzt werden."
 USA_Expand_Pearl_Harbor:0 "Pearl Harbor erweitern"
 USA_Expand_Pearl_Harbor_desc:0 "Da ein Krieg mit Japan immer wahrscheinlicher wird, beginnen wir mit der Vorbereitung unserer Stützpunkte im Pazifik. Wir beginnen mit der Modernisierung unserer Anlagen in Pearl Harbor, um unsere Flotte dort stationieren und militärische Aktionen gegen die Japaner durchführen zu können."
 
 
