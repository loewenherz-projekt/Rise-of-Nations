USAAH_crack_down_on_dissidents:0 "Hartes Vorgehen gegen Dissidenten"
USAAH_crack_down_on_dissidents_desc:0 "Wer sich unseren überlegenen Überzeugungen widersetzt, muss lebenslang ins Gefängnis. Wir können es uns einfach nicht leisten, dass unsere geliebten Anhänger durch falsches Denken verwirrt werden."
USAAH_declare_martial_law:0 "Verhängung des Kriegsrechts"
USAAH_declare_martial_law_desc:0 "Vorerst verhängen wir das Kriegsrecht, um sicherzustellen, dass niemand unsere Pläne für ein besseres Amerika durchkreuzt. Wir werden es wieder großartig machen."
USAAH_the_fate_of_our_nation:0 "Das Schicksal unserer Nation"
USAAH_the_fate_of_our_nation_desc:0 "Jetzt, da alles an seinem Platz ist, können wir endlich unser eigenes Schicksal bestimmen, ohne von irgendjemandem gestört zu werden, der versuchen könnte, sich uns entgegenzustellen."
