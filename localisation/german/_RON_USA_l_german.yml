 USA_Defense_Production_Act_desc:0 ""
 
 
 
 USA_Civilian_Pilot_Training_Program:0 "Zivilpiloten-Ausbildungsprogramm"
 USA_Civilian_Pilot_Training_Program_desc:0 "Wir werden Programme fördern, die normale Zivilisten zu Flugzeugpiloten ausbilden und so eine Reserve an Personen schaffen, die in Krisenzeiten das Rückgrat für einen erweiterten Luftverkehr bilden können."
 USA_American_Food_Shipments:0 "Amerikanische Lebensmittellieferungen"
 USA_American_Food_Shipments_desc:0 ""
 USA_Lend_Lease_to_the_USSR_tt:0 "Schalten Sie §YEntscheidungen§! frei, um Leih- und Pachtprotokolle (§GAid§!) an die §YUSSR§! zu senden. Schalten Sie außerdem motorisierte Artillerie-§Ybrigaden§! für die §YUSSR§! frei."
