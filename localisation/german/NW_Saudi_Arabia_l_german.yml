    ## EVENTS ##
    NWsaudi.1.t:0 "Stammesaufstand"
    NWsaudi.1.d:0 "Lange Zeit gelang es dem König, die Stammesangehörigen unter Kontrolle zu halten. Diese hatten jedoch stets mit der auferlegten Steuerlast zu kämpfen und ärgerten sich darüber, dass „einige Städter“ mehr Privilegien genossen als die edlen Beduinen. \n\nIn letzter Zeit wurde die Unzufriedenheit unter den Beduinen immer deutlicher. Die Stämme, die einen Groll gegen den König hegten, erhoben erneut ihr Haupt. Schließlich startete der Stamm der Schammar, der schon lange von der Wiederherstellung des Raschidischen Staates geträumt hatte, einen offenen Aufstand gegen die Zentralregierung und überzeugte viele andere Clans und sogar einige illoyale Saudis, sich dem Aufstand anzuschließen."
    NWsaudi.1.a:0 "Wir werden die Rebellen vernichten"
    NWsaudi.1.b:0 "Nieder mit dem Tyrannen!"

    NWsaudi.3.t:0 "Palastputsch"
    NWsaudi.3.d:0 "Obwohl der König radikale Reformen durchführte, konnte er die Unzufriedenheit der Ulema lange Zeit unter Kontrolle halten, indem er seinen Status als Anführer aller Wahhabiten nutzte. Mit der Zeit verschärfte sich jedoch der Konflikt zwischen den islamischen Gelehrten und dem König. Schließlich erließen die Ulema eine Fatwa, in der sie den König der religiösen Unmoral und der Abweichung von islamischen Normen beschuldigten. Dies bot Prinz Muhammad, der schon lange versucht hatte, seine Macht im Königreich zu mehren, eine Gelegenheit, die Situation auszunutzen. Mit Unterstützung der Ulema belagerten Prinz Muhammads Truppen die Festung Masmak, wo der König stationiert war. Obwohl eine kleine Gruppe von Königswachen versuchte, sich gegen die Rebellen zu verteidigen, wurden sie schnell besiegt und ergaben sich. Prinz Muhammad wurde zum Sultan ausgerufen und verzichtete darauf, den Titel „König“ im westlichen Sinne zu verwenden."
    NWsaudi.3.a:0 "Es lebe der Sultan"

    NWsaudi.4.t:0 "[GetNewsHeadline]Putsch in Saudi-Arabien" # Omar Bin Hassan al-Sheikh
    NWsaudi.4.d:0 "Trotz der relativ gemäßigten Reformen von König Abdulaziz gelang es ihm nicht, sein Image als frommer und großzügiger Herrscher zu wahren, der der Führung aller Wahhabiten würdig gewesen wäre. Nach einer langen Phase wachsender Spannungen zwischen dem König und dem Klerus beschuldigten die Ulema Abdulaziz offen der religiösen Unmoral und der Abweichung von islamischen Normen. Muhammad al Saud nutzte die Instabilität und die Unterstützung des Klerus, um die Macht im Land zu ergreifen und sich selbst zum neuen Sultan zu ernennen."
    NWsaudi.4.a:0 "Hoffen wir, dass sie nicht gegen ausländische Unternehmen vorgehen"
    NWsaudi.4.b:0 "Es lebe der Sultan"
    NWsaudi.4.c:0 "Die Arabische Halbinsel ist wieder instabil"

    NWsaudi.5.t:0 "Neue Macht"
    NWsaudi.5.d:0 "Obwohl Muhammad al Saud den Thron bestiegen hat, ist seine Macht noch immer instabil. Die Unterstützung der Ulema ermöglicht dem neuen Sultan, an der Macht zu bleiben, hindert ihn aber auch daran, eigenständig zu handeln. \n\nVor wenigen Tagen wurde der Rat der Hohen Gelehrten unter Vorsitz von Großmufti Omar bin Hassan al-Sheikh, einem Nachfahren des Gründers der Wahhabitenbewegung, gegründet, der de facto die Rolle des wichtigsten Machtzentrums des Landes beansprucht. \n\nIn der gegenwärtigen Situation muss sich der neue Sultan entweder entscheiden, sich dem Rat entgegenzustellen, oder die faktische Einschränkung seiner Autorität akzeptieren und die Position der Hohen Ulema gesetzlich festlegen. Man sollte jedoch bedenken, dass die islamischen Gelehrten bis zu diesem Zeitpunkt keine Hierarchie hatten und der Rat daher nicht die Unterstützung aller Ulema genießt."
    NWsaudi.5.a:0 "Die Ulema können den Monarchen nur beraten"
    NWsaudi.5.b:0 "Wir sollten uns daran halten"
    
    NWsaudi.6.t:0 "Beginn des Hadsch" ## Umrah
    NWsaudi.6.d:0 "Die Pilgersteuer ist die Haupteinnahmequelle Saudi-Arabiens. Während der kleinen Pilgerfahrt, der Umra, sind die Steuereinnahmen relativ gering, steigen jedoch während des Hadsch, wenn Zehntausende Muslime zu den heiligen Stätten reisen, deutlich an. \n\nDer Hadsch findet jedes Jahr am achten Tag des Dhul-Hijjah statt und dauert nur fünf Tage. Viele Pilger bleiben jedoch eine Woche oder sogar einen Monat in Saudi-Arabien. Einige von ihnen bringen Waren aus ihren Heimatländern mit, um ihre Reisekosten zu decken. Die Sicherheit der Hadsch-Karawanen kommt auch professionellen Händlern zugute. Für kurze Zeit sind die Märkte Saudi-Arabiens mit einer beispiellosen Fülle an Textilien, Gewürzen, Schmuck und Kaffee gefüllt."
    NWsaudi.6.a:0 "Es gibt keinen Gott außer Allah, und Muhammad ist sein Prophet"
    ## побивание (да именно так пишется) - Stoning of the Devil
    NWsaudi.7.d:0 "Heute ist der 8. Zul-Hijjah im Jahr 1355, was bedeutet, dass die Zeit des Hadsch wieder gekommen ist. Zehntausende Pilger aus unserem Land und anderen muslimischen Ländern bereiten sich darauf vor, sieben Mal zwischen den Hügeln von Safa und Marwa zu laufen, zweimal Wasser aus der heiligen Quelle Zamzam zu schöpfen, einer Predigt auf dem Berg Arafat zu lauschen, am Ritual der Steinigung des Teufels teilzunehmen und einen Umweg um die Kaaba zu machen."
    
    NWsaudi.8.d:0 "Jedes Jahr, vom 8. bis 12. des islamischen Kalenders, unternehmen Zehntausende Pilger den Hadsch, die heilige Pflicht eines jeden Muslims. In den Tagen vor und nach dem Hadsch füllen sich die überfüllten Straßen Mekkas und der umliegenden Dörfer mit Waren aus allen Teilen der islamischen Welt, und die Staatskasse wird durch Pilger- und Handelssteuern erheblich aufgefüllt."
    
    NWsaudi.9.d:0 "Jedes Jahr, vom 8. bis 12. des islamischen Kalenders, unternehmen Zehntausende Pilger den Hadsch, die heilige Pflicht eines jeden Muslims. Normalerweise trägt der Hadsch durch die Pilgersteuer und den zunehmenden Handel erheblich zur Staatskasse bei, doch in diesem Jahr ist der Zustrom von Muslimen, die die heiligen Stätten besuchen möchten, aufgrund von Krieg und Instabilität in der Welt extrem gering."
    
    NWsaudi.10.t:0 "Die unübertreffliche Noura"
    NWsaudi.10.d:0 "Die charismatische Persönlichkeit der ältesten Schwester des Königs, Noura bint Abdul Rahman Al Saud, nimmt in der Geschichte Saudi-Arabiens einen bedeutenden Platz ein. Sie trug maßgeblich dazu bei, Abdulaziz’ Entschlossenheit zu stärken, einen Krieg zur Wiederherstellung des Emirats Riad zu beginnen, als die Saudis im Exil in Kuwait waren. Darüber hinaus heiratete sie Saud al-Kabir, das einflussreichste noch lebende Mitglied des Al-Qabir-Zweigs des saudischen Königshauses, der die höchste Macht im Land beanspruchte, und sicherte sich so seine Treue. \n\nNoura war schon immer sehr fortschrittlich und freimütig. Als beispielsweise das Telefon im Land eingeführt wurde, taten viele Geistliche es als Werkzeug des Schaitans ab, Noura jedoch unterstützte aktiv dessen Verwendung und sagte, es sei ein erstaunliches und notwendiges Gerät für das Leben. \n\nMit dem „Verstand von 40 Männern“ und einem guten politischen Verständnis wurde Noura eine der wichtigsten Beraterinnen von Abdul Aziz und diente zeitweise sogar als seine Stellvertreterin. König Abdulaziz hat sich in der Öffentlichkeit mehrfach als „Nouras Bruder“ bezeichnet. \n\nObwohl keiner der Ulema es wagt, offen darüber zu sprechen, sorgt Nouras wachsender Einfluss in der Regierung für Unmut unter den konservativen Geistlichen, die der Ansicht sind, dass Frauen nur die Arbeiten verrichten sollten, die Männer nicht verrichten dürfen." #Noura bint Abdul Rahman Al Saud
    NWsaudi.10.a:0 "Wenn sie nicht reden können, sollen sie den Mund halten"
    NWsaudi.10.b:0 "Vielleicht müssen wir ihre Kräfte doch noch einmal überdenken"
    
    NWsaudi.11.t:0 "Bin Suleimans neues Projekt" 
    NWsaudi.11.d:0 "Finanzminister Abdullah bin Suleiman, der manchmal als „Seine Exzellenz der Minister“ bezeichnet wird, ist nach König Abdulaziz’ Lieblingssohn Faisal eine der einflussreichsten Persönlichkeiten am Hof. Obwohl der König sich selten mit jemandem privat trifft, darf bin Suleiman nach allgemeinen Ratssitzungen das Schlafzimmer des Königs betreten, wo er dem König seine Anliegen vorträgt. \n\nWährend König Abdulaziz es als seine Verantwortung ansieht, die Staatskasse zu leeren, ist es bin Suleimans Aufgabe, sie wieder aufzufüllen. Bei einem kürzlichen privaten Treffen bat der Finanzminister den König jedoch um die Erlaubnis, einen beträchtlichen Betrag aus der Staatskasse für den Bau des ersten Hotels des Landes bereitzustellen, das insbesondere Pilgern Unterkunft bieten soll."
    NWsaudi.11.a:0 "Man kann einem treuen Freund Geld für ein gesegnetes Projekt nicht verweigern!"
    NWsaudi.11.b:0 "Verschwenden wir nicht unser Staatsgeld"
    
    NWsaudi.12.t:0 "John Philbys Reise"
    NWsaudi.12.d:0 "John Philby, Berater und enger Freund von Abdulaziz, spielte eine bedeutende Rolle bei der Stärkung des saudischen Staates und beriet den König in Außenpolitik. Selbst während seiner Tätigkeit für den britischen Geheimdienst sympathisierte er heimlich mit Ibn Saud und half ihm, die richtigen geopolitischen Entscheidungen zu treffen. Nach seinem Übertritt zum Islam im Jahr 1930 zog Philby nach Dschidda, wo er eine Schlüsselrolle bei den Verhandlungen über die SOCAL-Ölkonzession in Al-Hasa spielte. \n\nEs war an der Zeit, Philby eine neue Mission zuzuweisen. Die im kürzlich beendeten Saudi-Jemen-Krieg erworbenen Ländereien sind kaum erforscht; wir müssen die südlichen Grenzen unseres Staates kartieren. Zudem hat die Quarantäneauflage der International Medical Health Association für alle Muslime, die nach Mekka und Medina reisen, den Pilgerstrom erheblich reduziert, und es muss eine alternative Route zu den heiligen Stätten gefunden werden, um diese Beschränkung zu umgehen. Darüber hinaus würde diese Expedition John Philby auch zu Ruhm verhelfen, da er als erster Europäer die Region Nadschran erkundet."
    NWsaudi.12.a:0 "Niemand könnte diese Mission besser erfüllen als Philby"
    NWsaudi.12.b:0 "Es ist besser, er bleibt am Hof"
    
    NWsaudi.13.t:0 "Philby in Najran"
    NWsaudi.13.d:0 "Heute erreichte den Königspalast endlich die erste Nachricht von John Philby, der dessen sichere Ankunft in Nadschran verkündete. Er war der erste Europäer, der die Rub al-Chali mit dem Auto durchquert und das nahe Grenzgebiet erkundet hatte. In seinem Bericht bat Philby Abdulaziz um Erlaubnis, in den Norden des britischen Protektorats Aden reisen zu dürfen, um nach den Ruinen der mythischen Stadt Schabwa zu suchen. Noch wichtiger war ihm, den saudischen Einfluss in einer Region zu stärken, die ohnehin weitgehend unkontrolliert von den Briten war. Philbys Reise sollte als seine private Initiative dargestellt werden, die vom Gouverneur von Nadschran unterstützt wurde, um das Risiko eines diplomatischen Skandals zu minimieren." #Shabwa
    NWsaudi.13.a:0 "Endlich mal eine gute Idee"
    NWsaudi.13.b:0 "Lassen Sie uns unsere Beziehungen zu den Briten nicht verkomplizieren"
    
    NWsaudi.14.t:0 "Die verlorene Stadt Shabwa"
    NWsaudi.14.d:0 "In Europa hält die Aufregung um die verschwundene Stadt Schabwa seit Jahren an. Viele Menschen versuchen, das Geheimnis der „Stadt der achtzig Tempel“ zu lüften, die im vorislamischen Arabien das Zentrum des Königreichs Hadramaut war. \n\nNach wochenlanger Reise gelang es John Philby unerwartet, Schabwa zu finden. Seine Entdeckung verdankte er jedoch vor allem den gut bewaffneten Wachen und dem guten Willen der Einheimischen, die Ibn Sauds Gesandten bereitwillig halfen."
    NWsaudi.14.a:0 "Eine wirklich wunderbare Entdeckung"
     
    NWsaudi.15.t:0 "John Phildy Expedition"
    NWsaudi.15.d:0 "Heute erhielten wir alarmierende Berichte aus dem Protektorat Aden. Demnach hat der Arabist John Philby unter dem Schutz der Krieger des saudischen Gouverneurs von Nadschran eine Reise durch die nördlichen Regionen des Protektorats angetreten. Das offizielle Ziel der Expedition war die Suche nach der antiken Stadt Schabwa mit ihren mutmaßlich 60 Tempeln. Den Forschern gelang die Ortung der Stadt, doch Berichte aus Hadramaut deuten darauf hin, dass Philby trotz seines Status als britischer Agent aufgrund seiner engen Beziehung zu Abdulaziz und seines Übertritts zum Islam eine pro-saudische Propagandakampagne unter den einheimischen arabischen Stämmen führte. \n\nAngesichts unserer schwachen Autorität über die Stämme im Protektorat Aden und des Fehlens einer klar definierten Grenze wäre es möglicherweise ratsam, Philby zum Verlassen unseres Territoriums aufzufordern. Angesichts der geringen Zahl britischer Garnisonen in der Region wäre es jedoch schwierig, notfalls Gewalt anzuwenden."
    NWsaudi.15.a:0 "Phildy und seine Gruppe sollten Aden verlassen"
    NWsaudi.15.b:0 "Wir sollten unsere Truppen vorher vorbereiten"
     
    NWsaudi.16.t:0 "Briten wütend"
    NWsaudi.16.d:0 "Als Philbys Einheit in der Nähe von Schabwa eintraf, wurden sie von den einheimischen Stämmen begeistert empfangen, da sie glaubten, die saudische Expedition sei ausgesandt worden, um sie unter Abdulaziz&#39; Herrschaft zu bringen. Philby führte geschickt eine Propagandakampagne durch, in der er die historischen Rechte der Saudis auf die Kontrolle des Gebiets um Schabwa betonte. \n\nPhilbys Expedition löste bei den britischen Beamten in Aden Besorgnis aus, die ihn zum sofortigen Verlassen des Protektorats aufforderten. Obwohl es uns nicht gelang, die territoriale Kontrolle in der Region auszuweiten, gelang es der Expedition, eine alternative Route für Pilger zu finden und den saudischen Einfluss in der Umgebung der Schabwa-Ruinen etwas auszuweiten."
    NWsaudi.16.a:0 "Philby sollte Aden jetzt verlassen"
     
    NWsaudi.17.t:0 "Instabilität im Protektorat Aden"
    NWsaudi.17.d:0 "Als Philbys Einheit in der Nähe von Schabwa eintraf, wurden sie von den einheimischen Stämmen begeistert empfangen, da sie glaubten, die saudische Expedition sei ausgesandt worden, um sie unter Abdulaziz&#39; Herrschaft zu bringen. Philby startete eine Propagandakampagne, in der er die historischen Rechte der Saudis auf die Kontrolle der Umgebung von Schabwa propagierte, was ihren Einfluss in der Region weiter stärkte. \n\nDie Unentschlossenheit der britischen Regierung ermöglichte es den Saudis jedoch, ihren Einfluss deutlich auszuweiten. Obwohl die Expedition schließlich aus dem Protektorat Aden abgezogen wurde, um eine offene Konfrontation mit Großbritannien zu vermeiden, wurde die Macht der Saudis über die einheimischen Stämme erheblich geschwächt."
    NWsaudi.17.a:0 "Wunderbare Neuigkeiten!"
    NWsaudi.17.b:0 "Verdammte Beduinen!"
      
    NWsaudi.18.t:0 "Philby kehrt zurück"
    NWsaudi.18.d:0 "Philbys Expedition in den Süden Saudi-Arabiens ist nach über einem Monat der Kartierung der Grenzgebiete von Asir und Najran endlich abgeschlossen. Trotz des anspruchsvollen Geländes legte er täglich weite Strecken zurück, um diese wichtige Aufgabe zu erfüllen. Während die Grenze zum Jemen bereits zuvor markiert war, stärkte Philbys präzise Kartierung des Geländes Saudi-Arabiens Kontrolle über die Region."
    NWsaudi.18.a:0 "Willkommen zu Hause, unser lieber Freund"
    
    NWsaudi.19.t:0 "Das Gefolge des Königs" #Mohammed Suroor Sabban
    NWsaudi.19.d:0 "Abdulaziz’ leichte Fremdenfeindlichkeit und mangelnde Begeisterung für fremde Gesellschaften spiegeln sich in der Art und Weise wider, wie wichtige Entscheidungen von seinem inneren Zirkel getroffen werden, trotz der zunehmenden Komplexität des saudi-arabischen Verwaltungs- und Bürokratieapparats. Seine überschwängliche Gastfreundschaft und aufrichtige freundliche Aufmerksamkeit helfen dabei, diesen Charakterzug zu verbergen. Abdulaziz zieht es vor, Tag und Nacht, Jahr für Jahr, dieselben Leute um sich zu haben. Das sind die Menschen, denen er blind vertraut, deren Stärken und Schwächen er genau kennt, und die er großzügig belohnt, indem er ihre Ressourcen vermehrt. \n\nMit der Zeit benötigt Abdulaziz jedoch zunehmend Berater, die ihm bei der Modernisierung des Staates helfen. Mohammed Suroor Sabban, ein wegweisender Schriftsteller, Intellektueller und Ökonom aus dem Umfeld von Bin Suleiman, könnte ein solcher Berater sein. Seine Reformideen könnten jedoch vom konservativen Adel und sogar vom König selbst als radikal angesehen werden. Obwohl das Gefolge des Königs selten durch neue Mitglieder ergänzt wird, könnte Sabbans Ernennung trotz der damit verbundenen Herausforderungen den notwendigen Anstoß zur Modernisierung geben."
    NWsaudi.19.a:0 "Der König hat genügend Berater, die ihm bei der Modernisierung des Landes helfen"
    NWsaudi.19.b:0 "Bin Suleimans Mitarbeiter wäre ein guter Verbündeter für den König"
    
    NWsaudi.20.t:0 "Der Al-Ahli Fußballclub" # Al-Ittihad, Al-Ahli, Al-Falah, Ohod
    NWsaudi.20.d:0 "Dschidda hat sich zum Zentrum der aufstrebenden Sportkultur Saudi-Arabiens entwickelt. Hier wurde 1927 der erste Fußballverein des Landes, Al-Ittihad, gegründet. \n\nKürzlich gründete eine Gruppe von Schülern der Al-Falah-Schule, der ältesten Bildungseinrichtung Dschiddas, den Fußballverein Al-Ahli, der gemeinsam mit den Spielern von Al-Ittihad und dem vor einem Jahr in Medina gegründeten Verein Ohod gegeneinander antreten wird. Diese Entwicklung markiert einen bedeutenden Meilenstein für die Entwicklung des Sports im Land. Die Gründung neuer Vereine signalisiert eine vielversprechende Zukunft für den Sport in Saudi-Arabien."
    NWsaudi.20.a:0 "Wir erleben die Geburt des Profisports in Saudi-Arabien"
    
    NWsaudi.21.t:0 "Der Vater zweier Übel" #Muhammad bin Abdulaziz, Abu Sharayn, (the father of two evils)
    NWsaudi.21.d:0 "Prinz Muhammad bin Abdulaziz, der schon in jungen Jahren an zahlreichen Kriegen im jungen saudischen Staat beteiligt war, war für seinen aggressiven und grausamen Charakter bekannt. Auch als Erwachsener und Gouverneur von Medina blieb er so rau wie in seiner Kindheit. Darüber hinaus ist der Prinz in letzter Zeit ein immer häufigerer Gast auf Partys in Beirut, wo der in Saudi-Arabien verbotene Alkohol in Strömen fließt. \n\nObwohl Mohammed von den Mitgliedern der Herrscherdynastie wegen seines schlechten Temperaments und seiner Trinkgewohnheiten „Abu Scharain“ (Vater zweier Übel) genannt wird, bestreitet niemand, dass er auch ein kompetenter Verwalter und guter Heerführer ist, der seinen Mut und seine Entschlossenheit im Kampf bewiesen hat."
    NWsaudi.21.a:0 "Wir werden das unwürdige Verhalten eines wahren wahhabitischen Prinzen ignorieren"
    NWsaudi.21.b:0 "Er ist eine Schande für die Familie Al Saud"
    
    NWsaudi.22.t:0 "Justizielle Frage"
    NWsaudi.22.d:0 "Die Regierung Saudi-Arabiens strebt seit langem eine Vereinheitlichung des Rechts- und Justizsystems des Landes auf der Grundlage der Scharia an. Viele Stämme folgen jedoch noch immer dem Urf und dem Adat, die als zentrale Rechtsquellen dienen und eine Sammlung volkstümlicher Rechtsprechung darstellen. So ermöglicht der Urf beispielsweise die Gewährung von Asyl für verfolgte Personen unter bestimmten Umständen, obwohl das Asylrecht vom zentralisierten Staat nicht anerkannt wird. \n\nDie Beduinen betrachten bestimmte Taten wie Raub und Mord als Heldentaten, wenn sie außerhalb ihres Stammes begangen werden, während dieselben Taten innerhalb des Stammes als Verbrechen gelten. Dies läuft den Bedürfnissen und der Politik der Regierung zuwider. \n\nWir könnten drastische Maßnahmen ergreifen und die Scharia in allen Stämmen durchsetzen, doch ein solcher Ansatz wäre möglicherweise nicht effektiv und könnte bei den Beduinen Unmut hervorrufen. Daher wäre es möglicherweise klüger, die richterlichen Befugnisse der Provinz-Emire auszuweiten und die Scharia in bestimmten Bereichen wie Steuern, Familienrecht, Erbrecht und anderen durchzusetzen."
    NWsaudi.22.a:0 "Wir müssen einen energischen Angriff auf heidnische Bräuche starten"
    NWsaudi.22.b:0 "Wir sollten die Scharia schrittweise einführen"
    
    NWsaudi.23.t:0 "Die Monarch-Seile"
    NWsaudi.23.d:0 "Bei einer Begegnung im Palast in Riad bemerkte ein Mitglied der Ulema, dass der Monarch ein langes Gewand trug, das bis zum Boden reichte. Die Ulema rief: „Allah, Allah! [ROOT.GetLeader], dein Stolz hat dich übermannt. Deine Kleider schleifen auf dem Boden.“ Daraufhin befahl der Monarch einem Diener, eine Schere zu holen, die er dem Theologen mit den Worten überreichte: „Schneide ab, was deiner Meinung nach dem Islam widerspricht.“"
    NWsaudi.23.a:0 "Die Ulema können alles als dem Islam zuwiderlaufend betrachten!"
    
    NWsaudi.24.t:0 "Vorbereitung eines Aufstands?"
    NWsaudi.24.d:0 "Der Emir von Burayda erhielt heute einen Brief von Scheich bin Zuhairi, in dem er einen benachbarten Stamm beschuldigt, einen Aufstand vorzubereiten. Obwohl es dafür keine Beweise gibt, können die Vorwürfe aufgrund früherer Zweifel an der Loyalität des Stammes nicht gänzlich zurückgewiesen werden. Konkrete Anzeichen für drohende Unruhen gibt es derzeit jedoch nicht."
    NWsaudi.24.a:0 "Führen Sie sofort einen Überfall auf den Stamm durch"
    NWsaudi.24.b:0 "Ignoriere es vorerst"
    
    NWsaudi.25.t:0 "Überfall"
    NWsaudi.25.d:0 "Nach dem erfolgreichen Überfall unserer Truppen, der zur Gefangennahme der illoyalen Stammesangehörigen und ihrer Anführer führte, erhielten wir neue Informationen. Es stellte sich heraus, dass Scheich Zuhairi die Anzeige verfasst hatte, in der er den rivalisierenden Stamm fälschlich beschuldigte, einen Aufstand vorzubereiten, um seine Macht zu schwächen und die Kontrolle über seine Gebiete zu übernehmen. Die überfallenen Beduinen waren lediglich unzufrieden mit der Steuerdrückerei und hatten keine Aufstandspläne, wie zunächst angenommen. Diese neuen Informationen zeigen, dass wir bei der Annahme von Anschuldigungen ohne stichhaltige Beweise vorsichtig sein müssen, insbesondere bei Stammesstreitigkeiten."
    NWsaudi.25.a:0 "Wir müssen alle Gefangenen freilassen."
    
    NWsaudi.26.t:0 "Das Schicksal des „ungekrönten Königs“"
    NWsaudi.26.d:0 "Während der Herrschaft von Abdulaziz war Finanzminister Abdallah bin Suleiman einer der einflussreichsten Männer am Hof. Als enger Freund des Königs verfügte er über nahezu uneingeschränkte Machtbefugnisse im Wirtschaftsbereich, weshalb er sogar den Spitznamen „ungekrönter König Saudi-Arabiens“ erhielt. Nachdem die Saudis nun aus den wichtigsten Positionen entfernt wurden, fordern Stammesführer auch die Absetzung bin Suleimans."
    NWsaudi.26.a:0 "Wir können keinen kompetenten Ökonomen verlieren"
    NWsaudi.26.b:0 "Er sollte in den Ruhestand gehen"
    
    NWsaudi.27.t:0 "Neue Flagge"
    NWsaudi.27.d:0 "Bei der Herstellung der Flaggen unseres Landes wird der weiße Streifen oft nicht berücksichtigt. Es könnte sinnvoll sein, das Design der Flagge ohne Streifen offiziell als Standard festzulegen."
    NWsaudi.27.a:0 "Gut, lass es uns tun"
    NWsaudi.27.b:0 "Wir werden das Flaggendesign nicht ändern"
    
    
    NWsaudi.501.t:0 "Stammeskonflikt"
    NWsaudi.501.d:0 "Die Nachricht von einem neuen Territorialkonflikt zwischen zwei Stämmen hat uns erreicht. Auslöser der Auseinandersetzungen waren die Beduinen, die ihre Kamele auf andere Weiden trieben. \n\nObwohl sich die Zentralregierung normalerweise nicht in Stammesangelegenheiten einmischt, könnte dieser Konflikt die Region destabilisieren. Eine Möglichkeit besteht darin, den lokalen Emir anzuweisen, einzugreifen und die Beduinen zu unterwerfen, um eine weitere Eskalation der Situation zu verhindern."
    NWsaudi.501.a:0 "Wir sollten eingreifen"
    NWsaudi.501.b:0 "Die Stämme würden unsere Einmischung nicht schätzen"
    
    NWsaudi.502.t:0 "Stammeskampf"
    NWsaudi.502.d:0 "Heute erreichte uns die Nachricht von einem Zusammenstoß zweier Stammesangehöriger in der Nähe eines Wüstenbrunnens. Einer der Beduinen kam dabei ums Leben. Die Stammesscheichs konnten den Konflikt gütlich beilegen, indem sie den Mörder zur Zahlung eines Lösegeldes für den Toten aufforderten."
    NWsaudi.502.a:0 "Gelobt sei Allah, es kam nicht zu Blutrache."
    
    NWsaudi.503.d:0 "Heute erreichten uns Nachrichten über einen gewaltsamen Zusammenstoß zwischen zwei Stämmen in der Nähe eines Wüstenbrunnens, bei dem mehrere Beduinen ums Leben kamen. Der Vorfall hat langjährige Blutfehden zwischen den Stämmen neu entfacht, und die Situation droht zu einem ausgewachsenen Konflikt zu eskalieren."
    NWsaudi.503.a:0 "Scharia-Richter lösen Konflikt friedlich"
    NWsaudi.503.b:0 "Wir werden nicht eingreifen"
    
    NWsaudi.504.t:0 "Ein verärgerter Chef"
    NWsaudi.504.d:0 "Gemäß unseren Gepflogenheiten ist der Herrscher verpflichtet, jedem, der seinen Hof besucht, ein Geschenk zu machen. Heute wurden mehr als fünfhundert Menschen von unserem König begrüßt. Einer der Stammeshäuptlinge, die Riad besuchten, war jedoch mit der Anzahl der Münzen, die er im Namen des Herrschers erhalten hatte, unzufrieden. Es waren deutlich weniger als im Vorjahr, was den Beduinenhäuptling verärgerte. Er begann zu schreien und ein größeres Geschenk zu verlangen. Wir befürchten, dass seine Unzufriedenheit zu Illoyalität gegenüber dem Herrscher führen könnte. Wir müssen sorgfältig überlegen, wie wir mit dieser Situation umgehen und eine Lösung finden, die die Loyalität des Beduinenhäuptlings und seines Stammes aufrechterhält."
    NWsaudi.504.a:0 "Geben Sie ihm mehr Münzen und entschuldigen Sie sich aufrichtig im Namen des Königs"
    NWsaudi.504.b:0 "Er wird keinen einzigen Rial mehr erhalten!"
    
    NWsaudi.505.t:0 "Teure Gastfreundschaft"
    NWsaudi.505.d:0 "Jeder Araber, insbesondere ein Nomade, glaubt, dass es Brauch ist, dass der König denjenigen, die seinen Hof besuchen, ein Geschenk macht. Viele Beduinen reisen Hunderte von Kilometern, um Geschenke vom Herrscher zu erhalten. Darüber hinaus lebt eine beträchtliche Zahl unterprivilegierter Menschen auf Kosten des Königs in der Hauptstadt. Es gibt etwa hundert Familien von Ehrengefangenen mit ihren Dienern und Sklaven, deren Unterhalt aus der Staatskasse bezahlt wird. \n\nDer Hof des Königs wird normalerweise von etwa 500 bis 1.000 Menschen pro Tag besucht, aber heute hat die Zahl der Gäste 10.000 überschritten. Obwohl die meisten von ihnen nichts miteinander zu tun haben, kann die Gastfreundschaft des Königs die Staatskasse erheblich belasten, insbesondere wenn die Zahl der „Gäste“ in den folgenden Tagen nicht abnimmt."
    NWsaudi.505.a:0 "Allah hat dem König seinen Reichtum gegeben, also ist er verpflichtet, ihn zu teilen"
    NWsaudi.505.b:0 "Ein Teil des Geschenks sollte von Ulema sichergestellt werden"
    NWsaudi.505.c:0 "Es lohnt sich, den Wert von Geschenken zu reduzieren"
    
    NWsaudi.506.t:0 "Angriff auf Pilger"
    NWsaudi.506.desc:0 "Die Regierung unternimmt erhebliche Anstrengungen, um die Sicherheit der Pilger auf ihrer Reise zu den heiligen Stätten zu gewährleisten, doch die Reise bleibt ein riskantes Unterfangen. Jüngste Berichte deuten darauf hin, dass ein Stamm in der Region Hedschas mit offensichtlicher Billigung seines Scheichs Überfälle auf Reisende verübt. Trotz finanzieller Unterstützung der Regierung, um solche Plünderungen zu verhindern, scheint der Stamm weiterhin um seinen Lebensunterhalt zu kämpfen und ist daher gezwungen, auf illegale Mittel zurückzugreifen."
    NWsaudi.506.a:0 "Der Scheich und alle an den Raubüberfällen Beteiligten sollten streng bestraft werden"
    NWsaudi.506.b:0 "Nur den Räubern selbst die Hand abschneiden"
    NWsaudi.506.c:0 "Bestrafen Sie die Angreifer und erhöhen Sie gleichzeitig die Stammeszahlungen"
    NWsaudi.506.d:0 "Verurteilen Sie die Angreifer zu 70 Stockschlägen"
    
    NWsaudi.507.d:0 "Wir haben die Nachricht erhalten, dass eine Gruppe Beduinen Pilger auf dem Weg nach Mekka angegriffen hat. Eine Kavalleriepatrouille konnte die Täter jedoch erfolgreich ausfindig machen und festnehmen. Die Angreifer wurden später als die Söhne eines der Scheichs identifiziert, der vor Gericht um Gnade für seine Söhne bat. Die Ulema, islamische Gelehrte, betonten jedoch, dass Angriffe auf Pilger nach religiösem Recht mit dem Tod bestraft werden sollten."
    NWsaudi.507.a:0 "Schneide den Räubern die Hand ab"
    NWsaudi.507.b:0 "Hinrichtung der Verbrecher"
    
    NWsaudi.508.t:0 "LKW-Angriffe"
    NWsaudi.508.d:0 "In letzter Zeit erreichen uns immer mehr Nachrichten über zunehmende Überfälle auf Fahrzeuge in einer Provinz des Landes. Der Ausbau des Straßenverkehrs ist ein wesentlicher Aspekt der Modernisierung des Staates, sorgt aber auch bei den Stämmen, die traditionell Güter durch die Wüste transportieren, für Unmut. Einige Beduinen haben Lastwagen angegriffen und auf deren Scheinwerfer geschossen, um „dem Schaitan die Augen abzuschießen“. Nicht selten werden Fahrzeuge Opfer der üblichen Raubüberfälle."
    NWsaudi.508.a:0 "Es müssen harte Maßnahmen ergriffen werden"
    NWsaudi.508.b:0 "Lokale Scharia-Richter werden die Situation regeln"
    NWsaudi.508.c:0 "Lasst uns Stämme anheuern, um die Lastwagen zu bewachen"
    
    NWsaudi.509.t:0 "Pilgerinfrastruktur"
    NWsaudi.509.d:0 "Die Reise zu den heiligen Städten des Islam war für muslimische Pilger traditionell eine Herausforderung. Die Ulema sind jedoch überzeugt, dass die Regierung über die nötigen Mittel verfügt, um die Verkehrsinfrastruktur in [679.GetName] zu verbessern und so die Pilgerfahrt einfacher und sicherer zu machen."
    NWsaudi.509.a:0 "Es ist sinnvoll, dieser Bitte nachzukommen"
    
    NWsaudi.510.d:0 "Die Reise zu den heiligen Städten des Islam war für muslimische Pilger traditionell eine Herausforderung. Die Ulema sind jedoch überzeugt, dass die Regierung über die nötigen Mittel verfügt, um die Verkehrsinfrastruktur in [1073.GetName] zu verbessern und so die Pilgerfahrt einfacher und sicherer zu machen."
  
    NWsaudi.511.d:0 "Die Reise zu den heiligen Städten des Islam war für muslimische Pilger traditionell eine Herausforderung. Die Ulema sind jedoch überzeugt, dass die Regierung über die nötigen Mittel verfügt, um die Verkehrsinfrastruktur in [991.GetName] zu verbessern und so die Pilgerfahrt einfacher und sicherer zu machen."
    
    NWsaudi.512.t:0 "Piligrim-Krankenhäuser"
    NWsaudi.512.d:0 "Hitzschlag, Erschöpfung und altersbedingte Gesundheitsprobleme sind nur einige der Herausforderungen, denen Pilger auf ihrer Reise zu den heiligen Städten des Islam begegnen können. Die Ulema schlagen vor, in [679.GetName] mehrere staatlich finanzierte medizinische Zentren und Erholungsheime für Pilger zu bauen, um diesen Problemen zu begegnen."
    
    NWsaudi.513.d:0 "Hitzschlag, Erschöpfung und altersbedingte Gesundheitsprobleme sind nur einige der Herausforderungen, denen Pilger auf ihrer Reise zu den heiligen Städten des Islam begegnen können. Die Ulema schlagen vor, in [1073.GetName] mehrere staatlich finanzierte medizinische Zentren und Erholungsheime für Pilger zu bauen, um diesen Problemen zu begegnen."
  
    NWsaudi.514.d:0 "Hitzschlag, Erschöpfung und altersbedingte Gesundheitsprobleme sind nur einige der Herausforderungen, denen Pilger auf ihrer Reise zu den heiligen Städten des Islam begegnen können. Die Ulema schlagen vor, in [991.GetName] mehrere staatlich finanzierte medizinische Zentren und Erholungsheime für Pilger zu bauen, um diesen Problemen zu begegnen."
    
    NWsaudi.28.t:0 "Beratende Versammlung Saudi-Arabiens"
    NWsaudi.28.d:0 "1932 trat der Madschlis ash-Shura zum ersten Mal in Hedschas zusammen, noch vor der Bildung des zentralisierten Königreichs Saudi-Arabien durch die Vereinigung von Nedschd und Hedschas. Dieser Schritt sollte der Abschaffung der Hedschas-Autonomie mehr Legitimität verleihen, obwohl viele staatliche Institutionen zu diesem Zeitpunkt noch nicht nach Riad verlegt worden waren. \n\nMit der Zeit wurde immer deutlicher, dass der Beirat auf nationaler Ebene erneut einberufen werden musste, um den Entscheidungsprozess des Königs zu verbessern. Der Madschlis ash-Shura soll aus dem Ratsvorsitzenden, zwei Stellvertretern und zehn ständigen Mitgliedern bestehen. Der König muss entscheiden, wen er in den Rat ernennt."
    NWsaudi.28.a:0 "Bilden Sie einen Rat prominenter Nejj- und Hijazi-Beamter"
    NWsaudi.28.b:0 "Die Ulema in den Rat einbeziehen"
    NWsaudi.28.c:0 "Laden Sie prominente städtische Intellektuelle und Modernisten zum Rat ein"
    
    NWsaudi.29.t:0 "IPC beantragt Konzession"
    NWsaudi.29.d:0 "Lange Zeit glaubte man, es gäbe auf saudischem Gebiet keine Ölvorkommen, und die in der Region dominierenden britischen Ölkonzerne waren mit dem derzeitigen Produktionsniveau recht zufrieden. Nur das amerikanische Unternehmen Standard Oil of California erklärte sich 1933 bereit, eine Konzession zur Ölsuche in Al-Hasa zu pachten. \n\nObwohl es SOCAL drei Jahre lang nicht gelang, bei der Ölsuche in unserem Land nennenswerte Ergebnisse zu erzielen, unterbreitete die British Iraq Petroleum Company ein Angebot zur Pacht einer Konzession im Hedschas. Obwohl die Briten den Aussichten der Ölförderung in Saudi-Arabien skeptisch gegenüberstehen, wollen sie offenbar nicht zulassen, dass die Amerikaner ihren Einfluss auf das Königreich stärken, und wollen mit SOCAL konkurrieren."
    NWsaudi.29.a:0 "Wir haben keinen Grund, dieses Angebot abzulehnen"
    NWsaudi.29.b:0 "Wir würden am liebsten nur mit SOCAL zusammenarbeiten"
    
    NWsaudi.30.t:0 "Britische Liquidate-Ölkonzession"
    NWsaudi.30.d:0 "Die Ergebnisse der Ölsuche im Hedschas waren enttäuschend. Nachdem die Iraq Petroleum Company erhebliche Summen für die Expedition und Zahlungen an die Ölkasse ausgegeben hatte, war sie gezwungen, die Konzession aufzugeben."
    NWsaudi.30.a:0 "Zumindest haben sie einige Zehntausend Pfund zusätzlich in unsere Staatskasse gebracht."
    
    NWsaudi.31.t:0 "Dammam Nr. 7 Bohrungen"
    NWsaudi.31.d:0 "Während derzeit 62 Amerikaner und über tausend saudische Arbeiter im Dammam-Gebiet von Al-Hasa arbeiten, hat SOCAL bisher keine nennenswerten Ölfelder gefunden. Die erste Bohrung, Nr. 1, lieferte nie Öl. Nr. 2 produzierte zehnmal so viel Wasser wie Öl. Nr. 3 förderte kaum 100 Barrel Schweröl mit einem Schuss Wasser darin. Nr. 4 und Nr. 5 erwiesen sich als so trocken wie ein Knochen, der in der Sommersonne gelegen hat. Nr. 6, 1380 Meter tief, lieferte eine kleine Menge Öl mit Wasser vermischt.\n\nDrei Jahre sind seit der Unterzeichnung des Konzessionsvertrags vergangen, und bei den Vorstandssitzungen von SOCAL stellt sich die Frage: „Sollte die arabische Konzession aufgegeben werden? Ist es nicht besser, jetzt ein paar Millionen Dollar Verlust abzuschreiben, als in ein paar Jahren viel höhere Verluste zu erleiden?“ Auf diese Frage gibt es keine eindeutige Antwort.\n\nInzwischen hat der Vorstand der Bohrung des siebten Brunnens zugestimmt..."
    NWsaudi.31.a:0 "Wir können nichts tun"
    
    NWsaudi.32.t:0 "SOCAL-Vorstand"
    NWsaudi.32.d:0 "Die Arbeiten an der Bohrung Dammam Nr. 7 gestalteten sich schwierig; Ketten rissen, Bohrer gingen verloren und zahlreiche Pannen zwangen zu einer Unterbrechung der Arbeiten. Zehn Monate später tauchten in über 1.000 Metern Tiefe die ersten Anzeichen von Öl auf, doch zu diesem Zeitpunkt waren die Kapazitäten des Unternehmens und die Geduld seiner Eigentümer fast erschöpft. \n\nHeute wurde Max Steineke, der Chefgeologe der arabischen Expedition, nach Kalifornien beordert. Bei einer Vorstandssitzung von SOCAL sprach er erneut über die von ihm durchgeführten Untersuchungen. Auf die Frage, ob er sicher sei, dass die Bohrung Dammam Nr. 7 Öl produzieren würde, sagte Steineke ehrlich: „Es gibt keine absolute Gewissheit. Es hängt alles von einer Kombination von Umständen ab. Aber wir befinden uns irgendwo in der Nähe des Ölhorizonts.“ \n„Die Kosten nähern sich also zehn Millionen Dollar, und die Aussichten, Öl zu finden, sind weiterhin gering!“, rief einer der Direktoren des Unternehmens. \n„Meine Herren, es gibt eine Kopie des Bahrain-Feldes in den Tiefen Arabiens. Wir haben einfach ein bisschen Pech!“, versicherte der Chefgeologe."
    NWsaudi.32.a:0 "Die amerikanischen Konzessionen spülen viel Geld in unsere Staatskasse und wir möchten diese Einnahmequelle nicht verlieren."
    
    NWsaudi.33.t:0 "Al-Hasa-Konzession liquidiert"
    NWsaudi.33.d:0 "Heute wurde uns von der [FROM.GetAdjective]-Regierung eine offizielle Mitteilung über die Liquidierung unserer Ölkonzession in Al-Hasa zugesandt. Unsere Geologen müssen [FROM.GetName] so schnell wie möglich verlassen."
    NWsaudi.33.a:0 "Dies ist ein empörender Verstoß gegen unsere Vereinbarungen!"
    NWsaudi.33.b:0 "Dies ist ein guter Grund, sie zu erobern"
    
    NWsaudi.34.t:0 "Ölkonzession liquidiert"
    NWsaudi.34.d:0 "Da wir uns derzeit mit [?var:concession_owner.GetName] im Krieg befinden, wurde ihre Ölkonzession in Al-Hasa aufgehoben."
    NWsaudi.34.a:0 "Ich verstehe"
    
    NWsaudi.35.t:0 "[FROM.GetName] bietet Ermäßigungen an"
    NWsaudi.35.d:0 "Heute haben wir von der [FROM.GetAdjective]-Regierung ein Angebot zur Verlängerung der Al-Hasa-Ölkonzession erhalten. Im Gegenzug werden sie sehr nützliche Zahlungen leisten."
    NWsaudi.35.a:0 "Dieses Angebot ist sehr vorteilhaft"
    NWsaudi.35.b:0 "Wir sind nicht interessiert"
    
    NWsaudi.36.t:0 "[FROM.GetAdjective] Defaint"
    NWsaudi.36.d:0 "Die [FROM.GetAdjective]-Regierung zögert, in Al-Hasa Öl zu fördern."
    NWsaudi.36.a:0 "Ein trauriger Tag"
    
    NWsaudi.37.d:0 "Der Vorstand von SOCAL tagte heute, um zu entscheiden, ob die Finanzierung aufgrund der Ineffektivität der Arbeiten im Raum Dammam gekürzt oder ganz eingestellt werden sollte. Max Steineke durfte den Sitzungssaal nicht betreten, stürmte jedoch mit einem Blatt Papier in der Hand herein. Der sonst so gelassene Deutsche war in höchster Aufregung. „Da ist Öl!“, rief er triumphierend und warf ein Telegramm auf den Tisch, das er gerade aus Saudi-Arabien erhalten hatte. Darin stand, dass man bei der Bohrung Dammam Nr. 7, die bis in eine Tiefe von 1.440 Metern gebohrt worden war, auf Öl gestoßen sei. \n\nAm ersten Tag förderte die Bohrung nur 2.130 Barrel, dann immer mehr und einige Tage später bereits 3.372 Barrel. Auch die wieder aufgenommenen Arbeiten an den Bohrungen Dammam Nr. 2 und 4 brachten gute Ergebnisse. Es wurde deutlich, dass eine neue ölhaltige Schicht entdeckt worden war und es in Arabien noch mehr Öl gab."
    NWsaudi.37.a:0 "Ein bemerkenswerter Tag in unserer Geschichte"
    
    NWsaudi.38.t:0 "Ein Besuch am Brunnen."
    NWsaudi.38.d:0 "Auch in seinen reifen Jahren behielt unser König seine Neugier, seinen Wissensdurst und sein Interesse an Neuem. Er wollte die berühmte Quelle sehen, die eine so bedeutende Rolle für das Schicksal seines Landes gespielt hatte. Die Vertreter der Ölgesellschaft schlugen vor, die Reise in die Ostprovinz zu verschieben, um sie mit der Eröffnung der Pipeline zusammenfallen zu lassen, und der König stimmte zu. \n\nVor einigen Tagen durchquerte eine große Prozession von 400 Cadillacs, Fords, Chevrolets und anderen Autos die Wüste nach Dhahran. Den König begleiteten seine ältesten Söhne, Gefolgsleute, Frauen und Diener. In der Nähe einer der Oasen waren 350 Zelte aufgeschlagen, um zahlreiche Gäste unterzubringen. \n\nMit großem Interesse ritt [SAU.GetLeader] durch die Wüste, um die erste Brutstätte der zukünftigen Ölindustrie des Königreichs zu besichtigen. Er sah zum ersten Mal in seinem Leben eine Ölquelle und mehrere Pipelines und bekam Flaschen mit Ölproben zur Untersuchung. Als er die dunkle, ölige Flüssigkeit untersuchte, war er froh, dass Allah gnädig gewesen war und ihnen eine weitere Quelle des Reichtums geschenkt hatte: „schwarzes Gold“ statt gelbem. \n\n[SAU.GetLeader] verließ Dhahran in bester Stimmung. Endlich hatte er eine große und zuverlässige Quelle gefunden, um seine Schatzkammer aufzufüllen, da die Nachfrage nach Öl auf dem Weltmarkt stetig stieg. Die finanzielle Zukunft des Königreichs war nun gesichert."
    NWsaudi.38.a:0 "Allah ist gnädig!"
    
    NWsaudi.39.t:0 "[FROM.GetAdjective] Anforderungen"
    NWsaudi.39.d:0 "Nach der Einnahme von Lahij durch [FROM.GetAdjective] spitzt sich die Lage um Aden immer weiter zu. [FROM.GetLeader] ist der Ansicht, dass diese wichtige Hafenstadt rechtmäßig zum [FROM.GetAdjective]-Staat gehört. Daher wurde die Übergabe der Stadt gefordert."
    NWsaudi.39.a:0 "Wir sind zu schwach, um Widerstand zu leisten"
    NWsaudi.39.b:0 "Wir werden nicht nachgeben"
    
    NWsaudi.40.t:0 "[FROM.GetAdjective] Trotzig"
    NWsaudi.40.d:0 "Die [FROM.GetAdjective]-Regierung hat einer friedlichen Übergabe Adens an uns nicht zugestimmt."
    NWsaudi.40.a:0 "Wir werden es mit Gewalt nehmen"
    NWsaudi.40.b:0 "Keine Notwendigkeit einer weiteren Eskalation"
    
    NWsaudi.41.t:0 "[FROM.GetAdjective] Anforderungen"
    NWsaudi.41.d:0 "Nach der Einnahme der Sinai-Halbinsel durch die [FROM.GetAdjective]-Armee nehmen die Spannungen rund um den Suezkanal zu. Die [FROM.GetAdjective]-Regierung hat uns ein Ultimatum gestellt und die Übergabe der Kontrolle über das Kanalgebiet gefordert."
    
    NWsaudi.42.t:0 "[FROM.GetAdjective] Trotzig"
    NWsaudi.42.d:0 "Die [FROM.GetAdjective]-Regierung hat nicht zugestimmt, uns den Suezkanal friedlich zu überlassen."
    
    NWsaudi.43.t:0 "[SAU.GetAdjective] Diplomaten"
    NWsaudi.43.d:0 "Die [SAU.GetAdjective]-Regierung, die eine Politik der Unterstützung arabischer antikolonialer Bewegungen verfolgt, hat uns aufgefordert, Verhandlungen über die Unabhängigkeit des [FROM.GetName]-Staates aufzunehmen. [SAU.GetAdjective]-Diplomaten sind der Ansicht, unser Land müsse Solidarität mit der wiedererstarkten arabischen Welt zeigen und [FROM.GetAdjective] dem Volk das Recht geben, über sein eigenes Schicksal zu entscheiden. Zweifellos steckt hinter diesen Forderungen nur kaltes Kalkül, aber werden wir eine Konfrontation mit kriegerischen Arabern riskieren?"
    NWsaudi.43.a:0 "Diese Vorschläge sind absurd"
    NWsaudi.43.b:0 "Wir verfügen nicht über genügend Ressourcen, um den Konflikt in Arabien zu bewältigen"
    
    NWsaudi.44.t:0 "Verhandlungen gescheitert"
    NWsaudi.44.d:0 "Wie erwartet blieben die Verhandlungen mit der britischen Regierung ergebnislos. Sie verschärften lediglich die Spannungen in der Region und provozierten Zusammenstöße zwischen den Grenztruppen."
    NWsaudi.44.a:0 "Wir werden mit Gewalt zuschlagen"
    
    NWsaudi.45.t:0 "Eine befreite Nation"
    NWsaudi.45.d:0 "Der Staat [FROM.FROM.GetName] wird endgültig von der britischen Kontrolle befreit und wird zu einer freien Nation unter unserem Protektorat."
    NWsaudi.45.a:0 "Gelobt sei Allah!"
    
    NWsaudi.46.t:0 "[SAU.GetAdjective] Invasion"
    NWsaudi.46.d:0 "Die Invasion der [SAU.GetAdjective]-Truppen in unser Protektorat kam für die örtlichen Garnisonen völlig überraschend und war nicht in der Lage, dem Feind nennenswerten Widerstand zu leisten. Diese Niederlage wirkte sich negativ auf unser internationales Ansehen aus und wir sollten wahrscheinlich mit der Vorbereitung einer Vergeltungsinvasion beginnen."
    NWsaudi.46.a:0 "Das Imperium schlägt zurück"
    NWsaudi.46.b:0 "Lasst uns nicht wegen der Wüste in den Krieg ziehen"
    
    NWsaudi.47.t:0 "Unsere Armee wurde zurückgeschlagen"
    NWsaudi.47.d:0 "Unseren Truppen ist es nicht gelungen, die britischen Garnisonen zu überwältigen."
    NWsaudi.47.a:0 "Verdammt!"
    
    NWsaudi.48.t:0 "[SAU.GetAdjective] Armeen zurückgeschlagen"
    NWsaudi.48.d:0 "Unsere Truppen haben einen Versuch von [SAU.GetAdjective]-Truppen, britische Besitzungen zu besetzen, erfolgreich zurückgeschlagen."
    NWsaudi.48.a:0 "Wunderbare Neuigkeiten"
    
    NWsaudi.49.t:0 "Ausländische Intervention"
    NWsaudi.49.d:0 "[FROM.GetName] hat kürzlich eine äußerst harte Politik gegenüber den Juden in Palästina verfolgt. Die [FROM.GetAdjective]-Regierung stachelt die Araber immer offener zum Aufstand an."
    NWsaudi.49.a:0 "Empörend!"
    
    NWsaudi.50.t:0 "Unterstütze Kathiri"
    NWsaudi.50.d:0 "Der Krieg zwischen den Sultanaten Kathiri und Qu&#39;aiti dauert seit Jahrzehnten an. Die Kathiri erkennen die britische Herrschaft nur formell an, während Qu&#39;aiti aktive Unterstützung vom Vereinigten Königreich genießt, das jedoch nicht direkt in den Konflikt eingreifen will. Die Hoffnung der Kathiri auf eine Vorherrschaft in Hadramaut hat sich als unwahrscheinlich erwiesen, da das Sultanat den Zugang zum Meer verloren hat, was seine Wirtschaft und seine Fähigkeit zur Waffenbeschaffung beeinträchtigt. Dennoch beabsichtigt [FROM.GetLeader], das Konfliktgleichgewicht zu verschieben, indem es eine unmarkierte Wüstengrenze nutzt, um das Sultanat Kathiri mit Waffen zu versorgen."
    NWsaudi.50.a:0 "Es lohnt sich nicht, unsere Beziehung zu den Briten zu riskieren"
    NWsaudi.50.b:0 "Unsere gepanzerten Karawanen werden das Blatt im Krieg wenden"
    
    NWsaudi.51.t:0 "Unterstützung durch die [FROM.GetRulingParty]-Dynastie"
    NWsaudi.51.d:0 "Anders als die Qu&#39;aiti erkennen wir das britische Protektorat über unser Land nur formal an. Um das Blatt in unserem Krieg mit den Qu&#39;aiti zu wenden und den britischen Einfluss in der Region zu schwächen, beschloss [FROM.GetLeader], unser Land über die unmarkierte Wüstengrenze mit Waffen zu versorgen."
    NWsaudi.51.a:0 "Wunderbare Neuigkeiten"
