    SAU_resolve_the_camel_crisis:0 "Lösung der Kamelzuchtkrise"
    SAU_resolve_the_camel_crisis_desc:0 "Der Kamelverkauf war lange Zeit die Haupteinnahmequelle der Beduinen. Während der Hadsch-Saison wurden die Tiere zum dreifachen Preis verkauft. Der Ausbau des Straßenverkehrs und der Rückgang der Pilgerströme aufgrund der globalen Instabilität haben die Nachfrage nach Kamelen jedoch deutlich reduziert. Staatliche Unterstützung für Nomaden und der verstärkte Einsatz von Kamelen in der Armee werden dazu beitragen, die Situation der Stämme deutlich zu verbessern."
