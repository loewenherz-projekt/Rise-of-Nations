    SAU_disparity_between_nejd_and_hijaz_dyn:0 "Hijaz-Nedschd-Disparität"
    SAU_disparity_between_nejd_and_hijaz_dyn_desc:0 "Nach der Eroberung des Haschemitischen Königreichs Hedschas im Jahr 1926 sah sich Abdulaziz mit der Aufgabe konfrontiert, ein Land zu regieren, das weitaus fortschrittlicher war als sein Nedschd oder sogar Al-Hasa. Erst 1932 wurden Nedschd und Hedschas endgültig zu einem zentralisierten Staat vereinigt. Die Kluft zwischen den Regionen bleibt jedoch tief. Der nach osmanischen Maßstäben gestaltete bürokratische Apparat des Hedschas ist der fortschrittlichste in ganz Arabien, während Nedschd nach wie vor ein überwiegend von Stämmen bewohntes Gebiet ist."
