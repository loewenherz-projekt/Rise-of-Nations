    ## RASHID 2
    
    NWsaudi.52.t:0 "Ein Riss unter den Raschidis"
    NWsaudi.52.d:0 "Obwohl Abdullah ibn Mitab während des vom Stamm der Schammar unterstützten Aufstands zum Sultan von Arabien ernannt wurde, unterstützten ihn nicht alle Stämme. Kurz nach der Niederlage der etablierten Wahhabiten beschloss Muhammad ibn Talal al-Raschid, Abdullah offen herauszufordern. Er erhielt Unterstützung von der Aristokratie und einigen Stämmen des Hedschas, die ein übermäßiges Erstarken der „widerspenstigen“ Stämme des Nordens befürchteten."
    NWsaudi.52.a:0 "Wieder einmal wird die Familie Al Rashid durch interne Konflikte auseinandergerissen …"
    
    NWsaudi52a_tt:0 "§RInf die Stammesloyalität unter 50 % fällt, kommt es zu einem Palastputsch.\nDas Risiko eines Putsches bleibt bestehen, bis der Riss durch die Tötung eines der Gegner, einen Bürgerkrieg oder die Teilung des Landes beigelegt wird.§!"'
    NWsaudi52a_tt2:0 "\nNeue Entscheidungen werden der Kategorie „Beziehungen zu Stämmen“ hinzugefügt."
    loyalty_of_tribes_jihad_divisions_tt:0 "Änderungen der Anzahl der Stammesmilizdivisionen bei der Erklärung des Dschihad: §G+4§!"
    
    NWsaudi.53.t:0 "Alter Groll"
    NWsaudi.53.d:0 "Abdullah ibn Mitab wurde 1920 Herrscher des Emirats Jabal Schammar, als der Raschidenstaat seine letzten Monate unter ständigen Angriffen der Saudis verbrachte. Muhammad ibn Talal schwor dem neuen Emir die Treue und versprach, Hail zu verteidigen, doch Abdullah, der ihm misstraute, befahl seine Verhaftung. Einige Zeit später jedoch ließen die Hierarchen den Gefangenen frei und ernannten ihn zum Emir, woraufhin Abdullah aus Hail zu den Saudis fliehen musste. \nJetzt, da die Raschiden Arabien wieder beherrschen, werden Muhammads Anhänger diese Ereignisse nutzen, um die Ungerechtigkeit des Sultans gegenüber seinen treuen Untertanen zu beweisen. Wir müssen auf diese Anschuldigungen irgendwie reagieren. \nInsbesondere können wir darauf wetten, dass Abdullah während des zweiten Krieges mit den Saudis seinen Anspruch auf den Thron geltend machte. Muhammad hat kein Recht, Intrigen zu spinnen, um den Mann zu diffamieren, der dafür gesorgt hat, dass die Wahhabiten Arabien nicht länger terrorisieren. Wir können jedoch auch versuchen, mit unseren Gegnern ins Gespräch zu kommen und Mohammeds Haftbefehl als legitim zu bezeichnen, da sein anschließender Putsch seine Illoyalität und Machtgier bewies."
    NWsaudi.53.a:0 "Unsere jüngsten Erfolge sind wichtiger als alte Meinungsverschiedenheiten"
    NWsaudi.53.b:0 "Die Festnahme war legal"
    
    NWsaudi.54.t:0 "Ende der Diskussion"
    NWsaudi.54.d:0 "Abdullahs Versuch, sich den Großteil seiner Erfolge gegen die Saudis zuzuschreiben, stieß bei den Stammesangehörigen auf entschiedene Ablehnung. Sie sind der Ansicht, Ibn Mitab sei nur deshalb Sultan geworden, weil die Nomaden es erlaubten. Zudem sei der Sultan, so die Beduinen, nur der Primus inter Pares unter den Scheichs und habe kein Recht, sich wie die Wahhabiten zu verhalten und jegliche Kritik an sich selbst zu verbieten."
    NWsaudi.54.a:0 "Wir haben versagt"
    
    NWsaudi.55.d:0 "Die Auseinandersetzungen mit Mohammeds Anhängern konnten die Position seiner Gegner nicht vollständig ausräumen, die Abdullah für seine Flucht zu den Saudis und seine unzureichende Vorbereitung auf die Verteidigung von Hail kritisierten. Dennoch gelang es uns, viele Stammesscheichs auf unsere Seite zu ziehen, die Mohammed nun als Verräter betrachten und teilweise sogar seine Hinrichtung fordern. Trotzdem ist die Macht des Sultans noch zu schwach, um derzeit entschlossen zu handeln."
    NWsaudi.55.a:0 "Die Wahrheit ist auf unserer Seite"
    
    NWsaudi.56.t:0 "Umverteilung des Eigentums"
    NWsaudi.56.d:0 "Viele Stämme betrachten [ROOT.GetLeader] als schwachen, leicht beeinflussbaren Anführer oder zumindest als jemanden, der auf die Stämme hört, die ihn bei seiner Thronbesteigung unterstützt haben. Diese Stämme hoffen, die Kontrolle über einige der Weiden, Brunnen und Kamele zu erlangen, die den Stadtbewohnern und Stämmen gehören, die die Saudis unterstützt haben. Dies könnte jedoch zur Verarmung und zum Hungertod vieler Menschen führen, da die besiegten Clans bereits geschwächt sind und sich einer solchen Umverteilung nicht widersetzen können."
    NWsaudi.56.a:0 "Der Wunsch der Stämme ist absolut richtig"
    NWsaudi.56.b:0 "Wir beschränken uns auf eine teilweise Umverteilung des Eigentums"
    
    NWsaudi.57.t:0 "Stammesbestechung"
    NWsaudi.57.d:0 "Wir haben kürzlich Gerüchte gehört, dass die Gegner des Sultans begonnen haben, die Stämme zu bestechen, die im Kampf um den Thron neutral bleiben. Wir könnten uns auch an der Beschenkung der Beduinen beteiligen, doch dies würde die ohnehin schon sehr kleine Staatskasse noch weiter schmälern."
    NWsaudi.57.a:0 "Beduinen werden für ihre Treue belohnt"
    NWsaudi.57.b:0 "Das Land hat zu wenig Geld"
    
    NWsaudi.58.t:0 "Wahhabiten-Aufstand"
    NWsaudi.58.d:0 "Uns erreichte die Nachricht, dass die Wahhabiten in mehreren Regionen unseres Landes beschlossen haben, erneut zu den Waffen zu greifen, um die Macht der „Heil Götzendiener“ zu stürzen. Dieser verzweifelte Aufstandsversuch ist zum Scheitern verurteilt, und den Vizekönigen gelingt es, die Lage unter Kontrolle zu halten. Wir können sofort alle verfügbaren Kräfte mobilisieren, um den Aufstand niederzuschlagen, doch ohne entsprechende Vorbereitung könnten wir zu viele Verluste erleiden, sowohl durch wahhabitische Überfälle als auch durch Truppenschwund. Vielleicht sollten wir uns etwas Zeit nehmen, um die Logistik vorzubereiten, bevor wir alle verfügbaren Kräfte zur Niederschlagung des Aufstands mobilisieren."
    NWsaudi.58.a:0 "Wir werden sofort handeln"
    NWsaudi.58.b:0 "Eine übereilte Leistung führt zu zu vielen Verlusten"
    
    NWsaudi.59.t:0 "Rebellion unterdrückt"
    NWsaudi.59.d:0 "Unseren Truppen gelang es, den Aufstand der Wahhabiten niederzuschlagen, doch unser Angriff war schlecht vorbereitet. Aufgrund mangelnder Informationen agierten die eifrigen Scheichs zu chaotisch und unterschätzten oft die Stärke des Feindes."
    NWsaudi.59.a:0 "Und trotzdem haben wir gewonnen"
    
    NWsaudi.60.d:0 "Obwohl viele Scheichs sofort in die Schlacht ziehen wollten, ließ der Sultan mehr Zeit, um Truppen und Nachschub im Aufstandsgebiet zu sammeln, bevor er aktive Operationen startete. Obwohl der Aufstand schließlich niedergeschlagen wurde, behaupteten die Gegner des Sultans, sein unentschlossenes Handeln sei ein weiterer Beweis seiner heimlichen Sympathien für die Wahhabiten. Sie behaupteten, [ROOT.GetLeader] sei während seiner Jahre ehrenhafter Gefangenschaft in Riad stark von den Saudis beeinflusst worden. Als er Sultan wurde, versuchte er, Beziehungen zu den Anhängern des Wahhabismus aufzubauen und die Ordnung wiederherzustellen, die unter Abdulaziz von Anfang an geherrscht hatte."
    NWsaudi.60.a:0 "Wer würde diesen Unsinn glauben?"
    
    NWsaudi.61.t:0 "Palastputsch&quot;"
    NWsaudi.61.d:0 ""
    NWsaudi.61.a:0 "Kann er an der Macht bleiben?"
    
    NWsaudi.62.t:0 "Bürgerkrieg"
    NWsaudi.62.d:0 "Die Spannungen zwischen Abdullah und Mohammed hatten sich schon seit langem verstärkt, und früher oder später musste der Konflikt zu einem regelrechten Bürgerkrieg eskalieren. Der Versuch des Sultans, seinen Gegner zu töten, zwang die Gegner der bestehenden Macht zu einem offenen Aufstand."
    NWsaudi.62.a:0 "Ehre sei Sultan Abdullah!"
    NWsaudi.62.b:0 "Ehre sei Sultan Muhammad!"
    
    NWsaudi.63.t:0 "Das Ende von Abdullah ibn Mitab Al Rashid"
    NWsaudi.63.d:0 "In letzter Zeit hatte Abdullah ibn Mutaib Al Rashid an politischem Einfluss und Anhängern verloren, während [ROOT.GetLeader]s Position immer fester wurde. Daher beschloss der Sultan, drastische Maßnahmen zu ergreifen, um die Bedrohung seiner Herrschaft dauerhaft zu beseitigen."
    NWsaudi.63.a:0 "Die Lage hat sich endlich stabilisiert"
    
    NWsaudi.64.t:0 "Das Ende von Muhammad ibn Talal al-Rashid"
    NWsaudi.64.d:0 "In letzter Zeit hatte Muhammad ibn Talal al-Rashid an politischem Einfluss und Anhängern verloren, während [ROOT.GetLeader]s Position immer fester wurde. Daher beschloss der Sultan, drastische Maßnahmen zu ergreifen, um die Bedrohung seiner Herrschaft dauerhaft zu beseitigen."
    
