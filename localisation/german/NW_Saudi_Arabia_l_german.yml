    SAU_opinion_with_tribes_category:0 "Beziehungen zu Stämmen"
    SAU_opinion_with_tribes_category_desc:0 "[GetNameSaud_COUP_TRIBE]"
    SAU_COUP_TRIBE_YEP:0 "Der geschickte Einsatz der Stammesaristokratie, die Druckmittel, militärische Vergeltungsmaßnahmen sowie die Beschenkung und Verpflegung von Stammesoberhäuptern kombiniert, ermöglicht es der Regierung, auch die vielen und zuvor widerspenstigen Nomaden gehorsam zu halten. Doch die freiheitsliebenden Beduinen, die schwer bewaffnet sind und die Grundlage unserer Mobilisierungsfähigkeiten bilden, werden immer eine ernsthafte Bedrohung für unsere Macht darstellen. Wir müssen die Stimmung unter den Nomaden ständig beobachten und sicherstellen, dass ihre Loyalität nicht nachlässt."
    SAU_COUP_TRIBE_NAH:0 "$SAU_COUP_TRIBE_YEP$ \n\n§RIsst die Stammesloyalität auf 0 % sinkt, werden sie einen bewaffneten Aufstand starten.§!"
    SAU_COUP_TRIBE_SAUD:0 "$SAU_COUP_TRIBE_YEP$ \n\n§RIsst die Stammesloyalität auf 0 %, können die Saudis ins Land zurückkehren und ihre loyalen Stämme in einem bewaffneten Aufstand aufrütteln.§!"
    
    SAU_Establish_the_family_tree_of_the_Saudis_to_the_tribe_of_blue_blood:0 "Finden Sie die saudischen Wurzeln im Stamm der „blaublütigen“"
    SAU_Establish_the_family_tree_of_the_Saudis_to_the_tribe_of_blue_blood_desc:0 "Die Erhebung des Stammbaums der Saudis zum Anizah-Stamm, dem sogenannten „blaublütigen“ Stamm, dem zahlreichsten und mächtigsten in Arabien, würde dazu beitragen, die Autorität der herrschenden Dynastie in den Augen der Beduinen deutlich zu stärken."
    
    SAU_raise_zakat:0 "Erhöhen Sie die Zakat"
    SAU_raise_zakat_desc:0 "Aufgrund der sinkenden Zahl der Pilger sind die Staatseinnahmen zunehmend von der Erhebung von Steuern abhängig, deren Haupteinnahmequelle die Zakat ist. Die Zakat gilt als heiliges Gut des „wahren“ Islam und des „Monotheismus“, und die Steuereintreiber gelten bei den Beduinen als die Augen der Regierung, wodurch die Autorität der Zentralregierung gewahrt wird. Eine Erhöhung der Zakat würde den Staat zwar deutlich stärken, könnte aber zu Unmut unter den Stämmen führen, die ohnehin schon mit Steuern belastet sind. Darüber hinaus räumte Abdulaziz einmal ein, dass Steuereintreiber ihre Stellung missbrauchten und nur ein Drittel der eingenommenen Gelder an den König gingen."
    
    SAU_lower_zakat:0 "Niedrigere Zakat"
    SAU_lower_zakat_desc:0 "Zakat, eine religiöse Steuer, die vom „wahren“ Islam und „Monotheismus“ geheiligt wird, ist eine wichtige Einnahmequelle für die Staatskasse. Die armen Stämme, die an die Machtlosigkeit früherer Herrscher gewöhnt sind, fühlen sich jedoch durch die vom Staat auferlegten Steuern belastet. Zudem missbrauchen die Steuereintreiber oft ihre Position, und nur ein Drittel der eingenommenen Gelder kommt beim König an. Eine Senkung der Zakat würde die öffentliche Stimmung gegenüber der Regierung wahrscheinlich verbessern."
    
    SAU_lower_the_cost_of_the_king_guests:0 "Reduzieren Sie die Kosten für die Gäste des Königs"
    SAU_lower_the_cost_of_the_king_guests_desc:0 "In Riad lebt eine ganze Armee armer Menschen auf Kosten des Königs. Zweimal täglich werden 1.000 bis 2.000 Menschen in der königlichen Küche verköstigt. In der Hauptstadt werden etwa hundert Familien ehrenamtlicher Gefangener festgehalten. Der König bezahlt den Unterhalt ihrer Häuser, Ställe, Kamele, Kleidung, Nahrung und Sklaven. Die regelmäßige Zahl der Gäste am Hof beträgt 500, manchmal bewirtet der König bis zu 10.000 Menschen. Viele Beduinen reisen viele hundert Kilometer, um Geschenke vom König entgegenzunehmen. Es ist wichtig zu beachten, dass dieses Geschenk in der Verantwortung des Herrschers liegt. Jeder Araber, insbesondere ein Nomade, der ein Geschenk vom König erhalten hat, ob groß oder klein, in Form von Geld, Kleidung oder Proviant, ist der Ansicht, dass ihm jedes Jahr oder bei jedem seiner Besuche am Hof ein solches Geschenk zusteht. Wird ihm kein Geschenk überreicht, fühlt er sich beleidigt und schließt sich möglicherweise später den Feinden des Königs an. Durch die Reduzierung der Ausgaben für die Gäste des Herrschers würden erhebliche Mittel freigesetzt, die für wichtigere Bedürfnisse ausgegeben werden könnten. Ein solcher Bruch mit der Tradition würde jedoch bei weiten Teilen der Bevölkerung zu Unmut führen."
    
    SAU_conduct_a_raid_on_disloyal_tribes:0 "Überfalle illoyale Stämme"
    SAU_conduct_a_raid_on_disloyal_tribes_desc:0 "Manche Stämme sind dem König gegenüber nicht loyal genug. Manche von ihnen erlauben sich sogar Ungehorsam und Rebellion, um die Freiheitsideale der Beduinen zu verteidigen. Wir müssen solche Stämme streng bestrafen: Wir müssen ihnen ihr Vieh wegnehmen, sie hungern lassen und in extremen Fällen bewaffnete Überfälle auf sie verüben."
    
    SAU_threats_to_disloyal_leaders:0 "Bedrohung durch Illoyalisten"
    SAU_threats_to_disloyal_leaders_desc:0 "Der Stammesscheich ist der Vermittler zwischen Staat und Beduinen. Wehe dem Häuptling, der es wagt, die Zentralgewalt herauszufordern. Die Angst vor der Macht der Herrscherfamilie muss die Stammesführung vor vorschnellem Handeln bewahren."
    SAU_threats_to_disloyal_leaders_tt:0 "Loyalität der „Otribes“! &gt; 70 %"
    
    SAU_deal_with_disloyal_leaders:0 "Umgang mit illoyalen Führern"
    SAU_deal_with_disloyal_leaders_desc:0 "Angesichts der geringen Loyalität der Stämme müssen wir entschiedenere Schritte unternehmen. Scheichs, die ihre Stämme zum Ungehorsam aufstacheln, sollten hingerichtet und durch loyalere ersetzt werden."
    SAU_deal_with_disloyal_leaders_tt:0 "Loyalität der „Otribes“! &lt; 35 %"
    
    SAU_seize_weapons_from_the_tribes:0 "Beschlagnahmt Stammeswaffen"
    SAU_seize_weapons_from_the_tribes_desc:0 "Die Beduinen verfügen über eine große Anzahl an Waffen, vor allem veraltete britische und osmanische Gewehre. Deren Beseitigung könnte eine bessere Bewaffnung der Armee ermöglichen, die nicht mehr auf Stammesmilizen angewiesen ist. Dies könnte auch die Zahl der Stammeskonflikte verringern."
    
    SAU_opinion_with_ulema_category:0 "Beziehungen zu Ulema"
    SAU_opinion_with_ulema_category_desc:0 "[GetNameSaud_COUP_ULEMA]"
    SAU_COUP_ULEMA_YEP:0 "Die Ulema, islamische Gelehrte mit umfassenden theologischen und juristischen Kenntnissen, genießen aufgrund ihrer bedeutenden Rolle bei der Entwicklung von Schulen und Bibliotheken hohes Ansehen in der Bevölkerung. Sie lehnen jedoch häufig die Modernisierung des Staates und die Einführung neuer Technologien ab. Um die Stabilität in der Gesellschaft zu wahren, muss der Herrscher die Einhaltung islamischer Normen betonen und zeigen, dass er auf den Rat der Ulema hört, wenn dieser nicht im Widerspruch zu den Interessen des Staates steht."    
    SAU_COUP_ULEMA_NAH:0 "$SAU_COUP_ULEMA_YEP$ \n\n§RIm Falle der Loyalität der Ulema auf 0 % werden sie einen Staatsstreich inszenieren.§!"
    
    SAU_tightening_religious_norms:0 "Verschärfung der religiösen Normen"
    SAU_tightening_religious_norms_desc:0 "Selbst in einem theokratischen Staat muss die Regierung religiöse Normen nicht immer strikt befolgen, um einen florierenden Handel und die Stabilität der Gesellschaft zu gewährleisten. Beispielsweise dürfen Händler trotz des Verbots Tabak und Alkohol im Land behalten. In Al-Hasa ist zudem der schiitische Gottesdienst de facto verboten. Strengere religiöse Normen könnten zwar die Beziehungen zu den wahhabitischen Ulema verbessern, den Handel jedoch schädigen."
   
    SAU_relaxation_of_religious_prohibitions:0 "§8Lockert die religiösen Verbote§!"
    SAU_relaxation_of_religious_prohibitions_desc:0 "Obwohl der Radikalismus der Massen seit dem Ende der Einigungskriege deutlich abgenommen hat, besteht unsere Ideologie weiterhin in strengen religiösen Gesetzen, die die Entwicklung des Landes behindern. Selbst die Einführung von Radiosendern stößt auf Widerstand der Geistlichkeit. Der Staat ignoriert jedoch oft die Durchsetzung vieler Gesetze, und eine weitere Lockerung der religiösen Gesetze könnte die Entwicklung unseres Staates beschleunigen."
    SAU_relaxation_of_religious_prohibitions_tt:0 "§7Starte eine Mission, die alle 150 Tage die Loyalität der Ulema verringert. Du kannst die Mission jederzeit abbrechen, verlierst dabei aber zusätzliche Forschungsplätze.§!"
    SAU_relaxation_of_religious_prohibitions_mission:0 "§7Ulemas Groll über die Schwächung der religiösen Kontrolle§!"
    
    SAU_create_committee_for_the_Promotion_of_Virtue_and_the_Prevention_of_Vice:0 "Gründung des Komitees zur Förderung der Tugend und zur Verhinderung des Lasters" #Committee for the Promotion of Virtue and the Prevention of Vice
    SAU_create_committee_for_the_Promotion_of_Virtue_and_the_Prevention_of_Vice_desc:0 "Das Komitee zur Förderung der Tugend und zur Verhinderung des Lasters soll die Wirksamkeit unserer Religionspolizei stärken und das Engagement des Königs für die Integrität der Religion unter Beweis stellen. Sein Aufgabenbereich umfasst Betrug und Täuschung auf dem Markt, die Nichtzahlung der Zakat, die Verletzung von Fastenregeln, die Verletzung von Pilgervorschriften, Mord oder Selbstverletzung sowie den Verkauf oder Konsum alkoholischer Getränke."
    
    SAU_Establishment_of_a_committee_to_oversee_the_Grand_Mosque:0 "Ein Komitee zur Überwachung der Großen Moschee einrichten"
    SAU_Establishment_of_a_committee_to_oversee_the_Grand_Mosque_desc:0 "Die Einrichtung eines Ausschusses zur Überwachung der Großen Moschee von Mekka soll die Aufmerksamkeit der Regierung für dieses wichtige muslimische Heiligtum demonstrieren. Der Ausschuss wird für die ständige Aufsicht über die Große Moschee und alle notwendigen Bau-, Reparatur- und Umbauarbeiten verantwortlich sein."
    
    SAU_Renovation_of_the_Grand_Mosque:0 "Renovierung der Großen Moschee"
    SAU_Renovation_of_the_Grand_Mosque_desc:0 "Die in der Großen Moschee durchgeführte Untersuchung ergab, dass folgende Arbeiten erforderlich sind: Ausbesserung des Bodens im Hof und in den Korridoren mit Feuersteinen; Entfernung beschädigter Steine und Pflasterung mit Zement; Entfernung des Putzes von allen verschmutzten Wänden und Befestigung mit Zement und Befestigungen, um das Eindringen von Feuchtigkeit in die Wände zu verhindern; Anstrich der gesamten Moschee innen und außen, einschließlich der Türen, des Zamzam-Brunnens und der Schreine; und Ausbesserung von Rissen in den Kuppeln. Darüber hinaus sollten die Innenbereiche der Moschee mit frischem Kies behandelt werden."
    
    SAU_installation_of_new_doors_of_the_Kaaba:0 "Verbessere die Kaaba-Türen"
    SAU_installation_of_new_doors_of_the_Kaaba_desc:0 "Die Türen der Kaaba müssen schon lange ausgetauscht werden. Wir sollten Handwerker beauftragen, diese Arbeit zu erledigen."
    
    SAU_Prohibition_of_the_presence_of_Shiites_in_the_Hajj:0 "Verbot für Schiiten beim Hadsch"
    SAU_Prohibition_of_the_presence_of_Shiites_in_the_Hajj_desc:0 "Viele Ulema plädieren für ein Verbot der Anwesenheit von Schiiten während der Hadsch. Wir können diese Regel zwar gesetzlich verankern, in Wirklichkeit aber nur vorübergehend durchsetzen."
    
    SAU_allow_gramophones_and_cinema:0 "Grammophone und Filme zulassen"
    SAU_allow_gramophones_and_cinema_desc:0 "Obwohl die Ulema die Einführung von Telefon, Radio und Flugzeugen akzeptiert haben, deren Funktionsweise ihrer Ansicht nach auf Allahs Willen beruht, lehnen sie die Aufhebung des Grammophon- und Filmverbots noch immer ab, obwohl dieses Verbot häufig von wohlhabenden Arabern missachtet wird."
    
    SAU_ulema_issue_a_fatwa_against_the_division_of_the_nation:0 "Ulema: Erlasst eine Fatwa gegen die Spaltung der Nation"
    SAU_ulema_issue_a_fatwa_against_the_division_of_the_nation_desc:0 "Die religiösen Gesetze unseres Landes erlauben keinen Widerspruch und keinen Ungehorsam gegenüber den Behörden. Ulemas sollten alle Feinde unserer Regierung daran erinnern."
    SAU_ulema_issue_a_fatwa_tt:0 "Loyalität von §Gulema§! &gt; 80 %"
    
    SAU_ulema_issue_a_fatwa_on_the_legitimacy_of_war:0 "Ulema: Erlass einer Fatwa zur Legitimität des Krieges"
    SAU_ulema_issue_a_fatwa_on_the_legitimacy_of_war_desc:0 "In Kriegszeiten ist die Unterstützung der Geistlichen wichtiger denn je. Ulemas müssen die Gerechtigkeit dieses Krieges verkünden."
    
    SAU_ulema_issue_a_fatwa_against_the_invaders_and_their_minions:0 "Ulema: Erlasst eine Fatwa gegen die Invasoren und ihre Schergen"
    SAU_ulema_issue_a_fatwa_against_the_invaders_and_their_minions_desc:0 "Wenn der Feind in unser Land kommt, muss das Volk vereint sein wie nie zuvor. Die Ulemas müssen unseren Kampf unterstützen und diejenigen verurteilen, die es wagen, dem Feind zu dienen."
    
    SAU_invest_in_infrastructure_mecca:0 "Investieren Sie in §H[679.GetName]§! Infrastruktur"
    SAU_invest_in_infrastructure_medina:0 "Investieren Sie in §H[1073.GetName]§! Infrastruktur"
    SAU_invest_in_infrastructure_tabuk:0 "Investieren Sie in §H[991.GetName]§! Infrastruktur"
    
    SAU_invest_in_hospital_mecca:0 "Investieren Sie in §H[679.GetName]§! Krankenhäuser"
    SAU_invest_in_hospital_medina:0 "Investieren Sie in §H[1073.GetName]§! Krankenhäuser"
    SAU_invest_in_hospital_tabuk:0 "Investieren Sie in §H[991.GetName]§! Krankenhäuser"
    
    SAU_Development_of_oil_fields:0 "Entwicklung von Ölfeldern"
    SAU_Development_of_oil_fields_desc:0 "[ROOT.GetName] verfügt nicht über die nötigen Technologien, um selbst Öl zu fördern, und ist daher auf ausländische Unternehmen angewiesen, um seine Felder zu erschließen. Trotz der Ungerechtigkeit des Konzessionsvertrags deckt der Al-Hasa-Pachtvertrag einen großen Teil unseres Budgets. Sollten große Ölfelder entdeckt werden, würde dies die Modernisierung Saudi-Arabiens deutlich beschleunigen. \n\n Aktueller Konzessionsinhaber: §Y[?var:concession_owner.GetNameWithFlag]§!&quot;"
    SAU_Independent_development_of_oil_fields:0 "Ölfelder auf eigene Faust erschließen"
    SAU_Liquidate_the_concession_in_Al_Has:0 "Überarbeiten Sie die [?var:concession_owner.GetAdjective]-Konzession in Al-Hasa"
    SAU_Transfer_the_oil_concession_to_the_state:0 "Ölkonzession übertragen an [FROM.GetNameDef]"
    SAU_Development_of_Al_hasa_deposits:0 "Entwicklung der Al-Hasa-Ölfelder"
    
    SAU_sacred_war:0 "Heiliger Krieg"
    SAU_sacred_war_desc:0 "Der individuelle Kampf jedes Muslims gegen seine Laster ist die wichtigste und schwierigste Form des Dschihad. In diesen turbulenten Zeiten ist es jedoch die Pflicht jedes Wahhabiten, die Reinheit des Islam zu verteidigen und selbstlos für sein Heimatland und seinen Glauben zu kämpfen."
    SAU_sacred_war_tt:0 "§7Wir können ein nicht-muslimisches Land als Ziel des Dschihad auswählen und vorübergehend die gesamte Radikalität unseres Volkes gegen dieses Land richten§!"
    SAU_call_for_jihad:0 "Aufruf zum Dschihad"
    SAU_call_for_jihad_from:0 "Aufruf zum Jihag gegen [FROM.GetNameDef]"
    SAU_call_for_jihad_from_tt:0 "§6Zielland ist nicht muslimisch§!"
    
    SAU_expansion_category:0 "[ROOT.GetAdjective]-Erweiterung"
    SAU_expansion_category_desc:0 "Viele Muslime sind der Macht unwissender Tyrannen und Kolonialherren überdrüssig. Sie warten darauf, dass [ROOT.GetRulingParty] kommt und ihre gerechte Autorität etabliert. Wir hören ihre Rufe, und unser Staat ist bereit, seine Expansion fortzusetzen."
    
    ara_cores:0 "Zustände, die entkernt werden können"
    
