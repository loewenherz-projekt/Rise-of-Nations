    SAU_expansion_to_europe_desc:0 "Zu lange haben die Europäer die Muslime unterdrückt. Es ist Zeit, die Situation zu ändern."
    SAU_ban_radio:0 "Radio verbieten"
    SAU_ban_radio_desc:0 "Obwohl Abdulaziz den Koran per Radio verbreitet hat, widerspricht dieses Gerät immer noch dem Wesen unserer Lehre. Zweifellos ist diese Box eine Behausung der Schaitane und hat in unserem Land keinen Platz."
    SAU_condemn_ballooning:0 "Verurteilen Sie die luftgestützte Navigation"
    SAU_condemn_ballooning_desc:0 "Obwohl wir nur über eine kleine Luftwaffe verfügen, wissen wir, dass Flugzeuge gegen den Willen Allahs fliegen und ihr Einsatz unerwünscht ist. Wir sollten die zivile Luftfahrt verbieten und vorzugsweise Nicht-Wahhabiten als Militärpiloten einsetzen."
    SAU_limit_the_use_of_the_creations_of_satan:0 "Beschränken Sie die Nutzung der Schöpfungen des Shaitan"
    SAU_limit_the_use_of_the_creations_of_satan_desc:0 "Viele Ulema betrachten alle beweglichen Maschinen als Schöpfungen des Schaitan. Wir müssen ihren Einsatz einschränken."
    SAU_crush_vatican:0 "Zerschmettert den Vatikan"
    SAU_crush_vatican_desc:0 ""
    
    SAU_Rebuild_StPeters_Basilica_into_a_Mosque:0 "Umbau des Petersdoms zu einer Moschee"
    SAU_Rebuild_StPeters_Basilica_into_a_Mosque_desc:0 "Da die Muslime nun das Zentrum des katholischen Glaubens kontrollieren, muss der Petersdom das Schicksal der Hagia Sophia teilen."
    
    NWsaudi.65.t:0 "Bruch schrecklicher Verträge"
    NWsaudi.65.d:0 "Da die Regierung nun unter der Kontrolle der Anhänger des wahren Wahhabismus steht, ist es möglicherweise an der Zeit, die Abkommen mit Götzendienern zu überdenken. Dies könnte auch die Überprüfung von Abkommen mit Ölkonzernen oder Nachbarländern einschließen, die nicht denselben religiösen Prinzipien folgen."
    NWsaudi.65.a:0 "Inschallah"
    
    NWsaudi.66.t:0 "Saudis verlassen die Allianz"
    NWsaudi.67.t:0 "Die Allianz auflösen"
    NWsaudi.66.d:0 "In Saudi-Arabien sind vor kurzem Anhänger des radikalen Wahhabismus an die Macht gekommen. Das neue Regime hält Verträge mit Ländern, die nicht dem Wahhabismus angehören, für inakzeptabel."
    NWsaudi.66.a:0 "Wahnsinn"
    
    NWsaudi.68.t:0 "Возвращение Саудов"
    NWsaudi.68.d:0 "Nach dem Zusammenbruch des Dritten Saudischen Staates war der Al-Saud-Clan gezwungen, nach Kuwait umzusiedeln, genau wie drei Jahrzehnte zuvor. \n\nSaud, der älteste Sohn von Abdul-Aziz, übernahm die Führung des Clans und begann sofort, den kuwaitischen Emir und andere um Unterstützung zu bitten, um Riad zurückzuerobern. Er verbündete sich mit den Stämmen der Utaiba und Mutair, die einen Groll gegen die Raschidis hegten, und gemeinsam starteten sie einen Überraschungsangriff auf Riad, überraschten die örtliche Garnison und nahmen die Stadt schnell ein. \n\nGleichzeitig unterstützten die Stämme von Nejd, unzufrieden mit der Politik unserer Dynastie, offen Saud und rebellierten gegen unsere Herrschaft. Nun stehen wir vor der schwierigen Wahl, entweder die aufsässigen Saudis erneut zu unterdrücken oder aus der Geschichte zu verschwinden."
    NWsaudi.68.a:0 "Zerschmettere sie!"
    NWsaudi.68.b:0 "Es lebe Saud!"
    
