    SAU_anticolonial_policy:0 "Antikolonialpolitik"
    SAU_anticolonial_policy_desc:0 "Der Mangel an Verbündeten und der schwindende religiöse Eifer der Bevölkerung nach dem Ende der Einigungskriege machen eine Fortsetzung des Dschihad unmöglich. Wir müssen ein neues Banner hissen, das Banner des Antikolonialismus. Nur unser Staat hat den Willen, die Muslime gegen die europäischen Invasoren zu mobilisieren."
    
    SAU_liberate_uae:0 "Befreie [UAE.GetName]"
    SAU_liberate_uae_tt:0 "§4Unsere Diplomaten werden versuchen, die Befreiung von [UAE.GetName] von der britischen Herrschaft zu erreichen. Sollten die Verhandlungen scheitern, was bei einer stabilen Lage in Großbritannien mit ziemlicher Sicherheit der Fall sein wird, wird es zu einem Grenzkonflikt kommen. Das befreite Land wird unter unser Protektorat gestellt.§!"
    
