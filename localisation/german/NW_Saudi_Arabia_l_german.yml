    SAU_strengthening_the_authority_of_abdul_aziz:0 "Stärkung der Autorität von Abdulaziz"
    SAU_strengthening_the_authority_of_abdul_aziz_desc:0 ""
    SAU_reform_of_local_currency_and_financial_system:0 "Reform unseres Finanzsystems und des lokalen Geldkreislaufs"
    SAU_reform_of_local_currency_and_financial_system_desc:0 "Trotz der Ausgabe eigener Silbermünzen und der Einstellung des Umlaufs des Maria-Theresien-Talers und der britischen Sovereign-Münzen ist das Finanzsystem unseres Königreichs noch weit von modernen Standards entfernt. Wir müssen unser Währungssystem reformieren, es vom Pfund Sterling lösen und eine Währungsagentur gründen, die die Kontrolle über den Geldumlauf und die Durchführung von Finanztransaktionen übernimmt."
    SAU_the_opening_of_the_school_of_princes:0 "Offene Prinzenschule"
    SAU_the_opening_of_the_school_of_princes_desc:0 "Die Familie Al Saud ist äußerst zahlreich; allein Abdulaziz hat mehr als ein Dutzend Kinder. Obwohl der König es vorzieht, Verwandte nicht in die höchsten Positionen zu berufen, werden viele Nachkommen der Herrscherdynastie in Zukunft zweifellos eine wichtige Rolle im Staatsleben spielen. Die Eröffnung der Prinzenschule im im Bau befindlichen Murabba-Palast soll sie zu würdigen Vertretern der Familie machen."
    SAU_strengthening_centralization:0 "Zentralisierung des Staates"
    SAU_strengthening_centralization_desc:0 "König Abdulaziz ist das nahezu Unmögliche gelungen: Er hat die zuvor widerspenstigen und eigensinnigen Beduinen unter Kontrolle gebracht. Doch unser Staat ist noch immer recht schwach. Im Zuge der Ausweitung unserer Macht sollten wir unseren Staatsapparat noch weiter stärken."
    SAU_abolition_of_slavery:0 "Abschaffung der Sklaverei"
    SAU_abolition_of_slavery_desc:0 "Das Fortbestehen der Sklaverei hat einen zutiefst negativen Einfluss auf das internationale Ansehen unseres Landes. In einem sich wandelnden Königreich ist für ineffiziente Sklavenarbeit kein Platz. Die Abschaffung der Sklaverei wird auch von vielen Ulema positiv aufgenommen, während die Stämme und einige Geistliche, die die Sklaverei aufgrund ihrer Existenz zur Zeit des Propheten für akzeptabel halten, diesen Schritt ablehnen werden."
    SAU_regulate_the_terms_of_the_slave_trade:0 "Den Sklavenhandel regulieren"
    SAU_regulate_the_terms_of_the_slave_trade_desc:0 "Ein Verbot des Sklavenhandels würde unser internationales Ansehen stärken, doch die Sklaverei ist in der arabischen Gesellschaft zu tief verwurzelt, und wir können sie noch nicht abschaffen. Dennoch sollten wir die Bedingungen des Sklavenhandels regeln, indem wir Sklaven die Einreise ins Land nur auf dem Landweg aus dem Jemen, Hadramaut, Oman und Kuwait erlauben und unter der Bedingung, dass der Importeur nachweisen kann, dass die eingeführte Person im Herkunftsland Sklave war und über ein Gesundheitszeugnis verfügt. Sklaven müssen spezielle Ausweise mit Lichtbild erhalten. Darüber hinaus sollte der Sklavenhalter verpflichtet werden, die ihm gehörenden Sklaven zu ernähren und zu kleiden und sie schonend zu behandeln, andernfalls droht ihm der Zwangsverkauf an einen anderen Herrn."
    SAU_construction_of_murabba_palace:0 "Baue den Murabba-Palast"
    SAU_construction_of_murabba_palace_desc:0 "Der 1936 begonnene Bau des Murabba-Palastes, einer neuen Familienresidenz und Hofburg für den König, ist ein Symbol der Modernisierung unseres Königreichs und wird Abdulaziz&#39; Rolle als größter Herrscher Arabiens bestätigen. Obwohl er im traditionellen arabischen Stil erbaut wurde, bringt er dennoch eine Reihe neuer Technologien in unsere Gesellschaft: die Nutzung von Autos als Fortbewegungsmittel, Elektrizität und Trockentoiletten. Die erste Betonstraße des Landes wird den Palast mit dem Stadtzentrum verbinden."
    SAU_support_for_bedouin_traditions:0 "Unterstützen Sie die Traditionen der Beduinen"
    SAU_support_for_bedouin_traditions_desc:0 "Der Wahhabismus entstand aus der Unzufriedenheit der Beduinen und Ulema mit dem Wohlstand der Stadtbewohner. Obwohl die Nomaden sich sogar gegen die Einführung von Autos wehrten, sicherten sie sich durch die Pflege der Beduinentraditionen, die Bewahrung vieler Überreste des Stammessystems und deren Ausweitung in den Hedschas die Unterstützung der großen militarisierten Beduinenschicht."
    SAU_bet_on_the_hijaz_nobility:0 "Wetten Sie auf den Hedschas-Adel"
    SAU_bet_on_the_hijaz_nobility_desc:0 "Obwohl Abdulaziz das Königreich Hedschas eroberte, blieb der lokale Adel davon unberührt. Selbst nach der endgültigen Abschaffung der Hedschas-Autonomie nahm seine Rolle in der Staatsführung weiter zu. Während die Stämme mit der Stärkung der „arroganten Stadtbewohner“ unzufrieden waren, trug die Unterstützung der Hedschas-Aristokratie dazu bei, Nejd schneller zu modernisieren."
    SAU_flattening_economic_differences:0 "Wirtschaftliche Diskrepanz ausgleichen"
    SAU_flattening_economic_differences_desc:0 "Da sich Nejd und Hijaz kulturell nicht mehr so stark unterscheiden, sollten wir die wirtschaftlichen Unterschiede zwischen den beiden Regionen ausbügeln."
    SAU_support_for_compradors:0 "Unterstützen Sie die Kompradoren"
    SAU_support_for_compradors_desc:0 "Wie in allen Ländern des Nahen Ostens ist auch in unserem Land nicht die Produktion, sondern der Handel die treibende Kraft der Modernisierung. Die anfängliche Kapitalakkumulation durchläuft eine Phase des Kompradorentums – der Vermittlung zwischen ausländischen Unternehmen und dem heimischen Markt, die ausländische Unternehmen bedienen. Dies ermöglicht es arabischen Unternehmern, Geld und Erfahrung anzuhäufen und später zur Finanzbourgeoisie aufzusteigen."
    SAU_establishment_of_the_arab_industry_development_department:0 "Schaffung einer Abteilung für die Entwicklung der arabischen Industrie"
    SAU_establishment_of_the_arab_industry_development_department_desc:0 "Ausländische Unternehmen in unserem Land benötigen zahlreiche lokale Auftragnehmer. Als Reaktion auf diese Nachfrage gründen immer mehr Einwohner kleine Unternehmen, die Baumaterialien, Möbel, Flaschen, Eis und Autovermietungen herstellen. Ziel der neuen Abteilung ist es, zwischen einheimischen und ausländischen Unternehmen zu vermitteln."
    SAU_construction_of_modern_infrastructure:0 "Modernisierung der Infrastruktur"
    SAU_construction_of_modern_infrastructure_desc:0 "Der Ausbau der Infrastruktur ist eine der wichtigsten Etappen der staatlichen Modernisierung. In einem Land, in dem Nomaden auf Kamelen noch immer eine wesentliche Rolle beim Gütertransport spielen, ist es unmöglich, eine ausreichend starke Wirtschaft aufzubauen."
    SAU_establish_riyadh_university:0 "Gründung der Universität Riad" #Riyadh University
    SAU_establish_riyadh_university_desc:0 "Wir können uns bei der Ausbildung unserer Fachkräfte nicht auf ausländische Institutionen verlassen. Wir müssen in Riad eine eigene Universität eröffnen, die über die gleichen Einrichtungen verfügt wie die besten Bildungseinrichtungen der Türkei und Ägyptens."
    SAU_establishment_of_the_general_organization_of_war_industries:0 "Einrichtung einer Generalautorität für die Rüstungsindustrie"
    SAU_establishment_of_the_general_organization_of_war_industries_desc:0 "Abdulaziz war sich stets der Notwendigkeit bewusst, die Abhängigkeit des Landes von ausländischen Rüstungsgütern zu verringern. Mit steigenden Öleinnahmen können wir mit dem Aufbau einer vollwertigen Rüstungsindustrie beginnen."
