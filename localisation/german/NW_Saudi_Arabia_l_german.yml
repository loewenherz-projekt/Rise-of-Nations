    SAU_irregular_army_category:0 "Stammesmiliz"
    SAU_irregular_army_category_desc:0 "Zu Beginn verfügt Saudi-Arabien nicht über eine reguläre Armee, sodass Sie sich für eine gewisse Zeit auf die Stammesmiliz verlassen müssen (die irregulären Streitkräfte können Sie jedoch nur während des gesamten Spiels entwickeln). Ein besonderer Teil Ihrer Truppen sind die Ikhwan – eine einzigartige Einheit, die sich unter den Bedingungen der Arabischen Halbinsel großartig anfühlt, in anderen Regionen jedoch an Effektivität verliert.\n\n§HAktueller Zustand der Miliz:§!\nMiliz: [?num_armies_with_type@infantry] von §G[?num_of_militia_var]§!\nKamel: [?num_armies_with_type@camelry] von §G[?num_of_camelry_var]§!"
