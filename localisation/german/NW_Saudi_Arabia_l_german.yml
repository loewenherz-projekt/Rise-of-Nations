    SAU_subjugate_the_lesser_emirates_of_arabia:0 "Unterwerfe die kleinen Emirate"
    SAU_subjugate_the_lesser_emirates_of_arabia_desc:0 ""
    SAU_subjugate_the_lesser_emirates_of_arabia_tt:0 "Mindestens eine der Kernregionen [UAE.GetName], [BHR.GetName], [QAT.GetName], [KUW.GetName], [KTH.GetName], [MHR.GetName] oder [QUA.GetName] befindet sich nicht in einer Allianz, im Krieg oder ist Gegenstand von [ROOT.GetName]."
    SAU_subjugate_the_lesser_emirates_of_arabia_tt_effect:0 "Wir werden den Besitzern der Nationalregionen – dem truzialen Oman, Kuwait, den Sultanaten Hadramaut, Katar und Bahrain – den Krieg ansagen!"
    
