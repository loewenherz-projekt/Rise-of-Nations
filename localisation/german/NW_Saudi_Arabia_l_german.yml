    SAU_landing_pad_expansion:0 "Erweiterung der Landeflächen"
    SAU_landing_pad_expansion_desc:0 "Der König schenkt der Entwicklung der militärischen Luftfahrt in Saudi-Arabien große Aufmerksamkeit. Obwohl unsere Luftwaffe noch sehr klein ist, sollten wir die Anzahl der Start- und Landebahnen in unserem Land erweitern, damit Flugzeuge die Truppen im Notfall an jeder Front unterstützen können."
    SAU_cooperation_with_italy:0 "Zusammenarbeit mit Italien"
    SAU_cooperation_with_italy_desc:0 "Italien verfolgt eine recht aktive Politik zur Entwicklung der Beziehungen zu den arabischen Staaten. Insbesondere ist Mussolini bereit, mehrere Flugzeuge zu spenden, um die italienischen Positionen in Saudi-Arabien zu stärken. Darüber hinaus werden mehrere Ausbilder und Mechaniker entsandt, um uns dabei zu helfen, die neue Ausrüstung so schnell wie möglich zu beherrschen."
    SAU_send_pilots_to_study_in_italy:0 "Flugtrainings mit Italien"
    SAU_send_pilots_to_study_in_italy_desc:0 "Bereits 1932 schlug Italo Balbo vor, saudische Piloten zur Ausbildung nach Italien zu schicken. Nun ist es an der Zeit, seinen Vorschlag umzusetzen. Unsere Kadetten werden eine Sommerschule in Grottaglie besuchen und anschließend einen Kurs in Malpensa absolvieren."
    SAU_renew_cooperation_with_the_uk:0 "Erneuerung der Zusammenarbeit mit Großbritannien"
    SAU_renew_cooperation_with_the_uk_desc:0 "Großbritannien unterstützt uns nicht mehr beim Aufbau unserer Luftwaffe. Wir können jedoch weiterhin mit dem Vereinigten Königreich über den günstigen Kauf einiger veralteter Flugzeuge verhandeln."
    SAU_send_pilots_to_study_in_egypt:0 "Flugtrainings in Ägypten"
    SAU_send_pilots_to_study_in_egypt_desc:0 "Aus den Flugkursen in Kairo sind mehrere Generationen arabischer Piloten hervorgegangen. Wir sollten unsere Kadetten auch dorthin schicken."
    SAU_our_eagles:0 "Unsere Adler"
    SAU_our_eagles_desc:0 "Die im Ausland ausgebildeten Piloten werden offiziell als „unsere Adler“ bezeichnet und sind eine Quelle des Stolzes für den König. Trotz ihrer geringen Zahl entspricht die Ausbildung unserer Piloten europäischen Standards."
