    SAU_invasion_of_iraq:0 "Invasion im Irak"
    SAU_invasion_of_iraq_trigger:0 "Unter den Eigentümern des Irak gibt es mindestens ein Land, das keine Marionette von [SAU.GetNameDef] ist und weder mit uns verbündet ist noch sich mit uns im Krieg befindet."
    SAU_invasion_of_iraq_desc:0 ""
    SAU_invasion_of_iraq_tt:0 "Wir werden einen Krieg gegen die Besitzer der Kernstaaten des „Irak“ anzetteln!"
    
    SAU_invasion_of_levant:0 "Erobere Levante"
    SAU_invasion_of_levant_trigger:0 "Unter den Eigentümern mindestens eines der syrischen und palästinensischen Mandatsgebiete gibt es mindestens ein Land, das keine Marionette von [SAU.GetNameDef] ist und weder mit uns verbündet ist noch sich mit uns im Krieg befindet."
    SAU_invasion_of_levant_desc:0 ""
    SAU_invasion_of_levant_tt:0 "Wir werden einen Krieg gegen die Besitzer der Kernstaaten Palästina, Libanon, Jordanien, Syrien, Dschabal al-Druse und Alawiten anstreben!"
  
    SAU_invasion_of_egypt:0 "Invasion Ägyptens"
    SAU_invasion_of_egypt_trigger:0 "Unter den Eigentümern mindestens einer ägyptischen Region befindet sich mindestens ein Land, das keine Marionette von [SAU.GetNameDef] ist und weder mit uns verbündet ist noch sich mit uns im Krieg befindet."
    SAU_invasion_of_egypt_desc:0 ""
    SAU_invasion_of_egypt_tt:0 "Wir werden ein Kriegsziel gegen die Besitzer der Kernstaaten von §YEgypt§ erreichen!"
     
    SAU_invasion_of_libya:0 "Invasion in Libyen"
    SAU_invasion_of_libya_trigger:0 "Unter den Eigentümern mindestens einer libyschen Region gibt es mindestens ein Land, das keine Marionette von [SAU.GetNameDef] ist und weder mit uns verbündet ist noch sich mit uns im Krieg befindet."
    SAU_invasion_of_libya_desc:0 ""
    SAU_invasion_of_libya_tt:0 "Wir werden einen Krieg gegen die Besitzer der Kernstaaten von „Libyen“ anzetteln!"
     
    SAU_subjugation_of_maghreb:0 "Invasion im Maghreb"
    SAU_subjugation_of_maghreb_trigger:0 "Unter den Eigentümern mindestens einer der Regionen Algerien, Marokko und Tunesien gibt es mindestens ein Land, das keine Marionette von [SAU.GetNameDef] ist und weder mit uns verbündet ist noch sich mit uns im Krieg befindet."
    SAU_subjugation_of_maghreb_desc:0 ""
    SAU_subjugation_of_maghreb_tt:0 "Wir werden einen Krieg gegen die Besitzer der Kernstaaten Tunesien, Algerien und Marokko anstreben!"
    
    SAU_african_muslim_liberation:0 "Befreit die Muslime Afrikas"
    SAU_african_muslim_liberation_trigger:0 "Unter den Eigentümern mindestens einer der Regionen Westsahara, Mauretanien, Mali, Senegal, Niger, Tschad, Sudan, Eritrea, Dschibuti und Somalia gibt es mindestens ein Land, das keine Marionette von [SAU.GetNameDef] ist und weder mit uns verbündet ist noch sich mit uns im Krieg befindet."
