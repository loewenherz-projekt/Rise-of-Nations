 ###########################################
 ################## 1900 ###################
 ###########################################

 PRE_WW1_NAME:0 "Beginn des neuen Jahrhunderts"
 PRE_WW1_DESC:0 "Ein neues Jahrhundert bricht weltweit an. Der Globus ist geprägt vom letzten Jahrzehnt des Friedens und der Expansion. In Europa nähert sich die Matriarchin ihrer letzten Tage. Wie lange kann der europäische Frieden noch halten?"
 GER_PRE_WW1_DESC:0 "Das Deutsche Reich wurde 1871 in Versailles mit Blut und Eisen gegründet, nachdem Frankreich ein Jahr zuvor besiegt worden war. Doch mit dem Aufstieg Wilhelms II., der Bismarck entlassen hatte, und seinen Bemühungen, den Status quo aufrechtzuerhalten, sah sich Deutschland bald potenziellen Feinden an zwei Fronten gegenüber. Diese Tatsache dürfte dem deutschen Militär im Jahr 1914 nicht ferngeblieben sein: Generalstabschef von Moltke drückte es so aus: „Krieg ist unvermeidlich, und je früher, desto besser.“ Die Zeit läuft ab. Kann Deutschland seinen Platz an der Sonne und seine Vorherrschaft in der Welt noch erreichen?"
 AUH_PRE_WW1_DESC:0 "Die Doppelmonarchie entstand 1867 aus einem Kompromiss zwischen Kaiser Franz Josef und dem ungarischen Adel. Das Flickenteppichreich bestand aus elf großen ethnischen Gruppen. Das Reich hatte seinen Mittelpunkt in der Hauptstadt Wien und wurde maßgeblich durch die Charakterstärke Kaiser Franz Josefs zusammengehalten. Um den russischen Einfluss auf dem Balkan einzuschränken, schloss sich Österreich-Ungarn 1879 mit Deutschland und 1882 mit Italien zum Dreibund zusammen. Da Deutschland jedoch die dominierende Partei im Bündnis war, wurden die außenpolitischen Wünsche Österreich-Ungarns den Wünschen seines älteren Partners untergeordnet. Die Herrscher Österreich-Ungarns."
 OTT_PRE_WW1_DESC:0 "Im 18. Jahrhundert schrumpfte das Osmanische Reich, seine Macht erodierte durch den Verlust innerer Autorität und die expansionistischen Ambitionen der europäischen Mächte. Im 19. und frühen 20. Jahrhundert gab es Reformversuche, darunter die Schaffung einer Exekutive und einer zentralisierten Regierung. Gleichzeitig erlebte das Osmanische Reich jedoch auch einen erheblichen territorialen Niedergang. Gleichzeitig war die türkische Regierung kaum in der Lage, eigene Steuern einzutreiben, und die Kommunikations- und Infrastruktur des Reiches blieben dürftig, was die Türkei oft als „kranken Mann Europas“ bezeichnete. Kann sich das Osmanische Reich modernisieren und überleben oder wird es in die Vergangenheit zurückfallen, in die es nach Ansicht vieler gehört?"
 RUS_PRE_WW1_DESC:0 "Russlands Blick richtet sich auf den Balkan und Konstantinopel, das den lebenswichtigen Seeweg zur Außenwelt kontrolliert. Um dieses Ziel zu erreichen, verfügt Russland über die größte Armee der Welt und eine sich rasch modernisierende Industriebasis. Trotz aller Stärke leidet Russland jedoch unter gefährlichen Schwächen und schweren Unruhen in der Bevölkerung. Einige Mitglieder des Zarenrats raten, ein „kurzer, siegreicher Krieg“ könne das Volk mobilisieren und von seinen Sorgen ablenken. Doch könnte die Herrschaft des Zaren die Folgen überstehen, wenn der Krieg für Russland schlecht ausginge?"
 ENG_PRE_WW1_DESC:0 "Um die Jahrhundertwende schien alles gut für das Britische Empire – es umfasste zwei Fünftel der Erdoberfläche, beherbergte ein Viertel der Weltbevölkerung, wurde von der professionellsten Armee der Welt überwacht und von der mächtigsten Flotte aller Zeiten bewacht. Doch hinter den Beteuerungen imperialer Größe verbarg sich Unsicherheit über die Zukunft: Wirtschaftlich und industriell waren die USA den Briten überlegen, und die Deutschen hatten ein ominöses Flottenbauprogramm gestartet, um der Royal Navy die Vorherrschaft auf den Meeren streitig zu machen."
 FRA_PRE_WW1_DESC:0 "Frankreich, einst die größte Macht Europas, ist heute ein Land in Schwierigkeiten. Wirtschaftlich wurde es von vielen seiner Rivalen überholt. Eine sinkende Geburtenrate verspricht einen weiteren Rückgang und könnte sich in einem Zeitalter der Massenarmeen als fatale Schwäche erweisen. Politisch ist die Dritte Republik instabil. Auf der internationalen Bühne brennen die Niederlage gegen Preußen 1871 und die deutsche Besetzung der Provinzen Elsass und Lothringen, und die Forderungen nach „Revanche“ – Rache – an Deutschland bleiben laut."
 USA_PRE_WW1_DESC:0 "Seit ihrer Unabhängigkeit von Großbritannien im Jahr 1783 haben sich die Vereinigten Staaten und ihre Bevölkerung nach der Verkündung der Monroe-Doktrin im Jahr 1823 vor allem mit ihrem eigenen Kontinent und in geringerem Maße mit Mittel- und Südamerika beschäftigt. Nach der Niederlage Spaniens im Spanisch-Amerikanischen Krieg haben sich die Vereinigten Staaten zu einer Weltmacht entwickelt, gelten jedoch mit ihrer sehr kleinen Armee noch immer nicht als „Großmacht“ im europäischen Sinne, obwohl sie über ein enormes Potenzial dazu verfügen. Dieses Potenzial ergibt sich aus der Bevölkerung und der enormen Wirtschaft, die größer ist als die von Großbritannien, Frankreich, Russland und Deutschland zusammen."
 ITA_PRE_WW1_DESC:0 "Italien ist das kleinste Drittel des Dreibunds, einem Bündnis, dem es wenig Vertrauen entgegenbringt. Österreich-Ungarn, Italiens natürlicher Rivale, ist zwar ein Freund in der Welt der Verträge, aber immer noch ein Rivale in praktischer Hinsicht. Schließlich erklärt der italienische Irredentismus die von Österreich gehaltene dalmatinische Küste immer noch zu Italien. Im Moment gibt es jedoch dringlichere Angelegenheiten. \n\nKriegspläne mit den Osmanen werden bereits ausgearbeitet. Die Regierung sagt einen kurzen, entscheidenden Krieg voraus. Italien soll seine Macht beweisen."
 SER_PRE_WW1_DESC:0 "Serbien wird von Außenstehenden als rückständige, unbedeutende Nation betrachtet. Nichts weiter als eine Schachfigur in einem großen Spiel, das die Weltreiche gegeneinander ausspielen. Natürlich könnten die Weltreiche schneller als gedacht lernen, dass den Serben Größeres vergönnt ist. \n\nDerzeit leben die meisten Serben außerhalb unserer Grenzen, auf türkischem oder österreichischem Gebiet. Sollten wir einen Pakt mit dem Teufel – den Bulgaren – schließen, könnten die Serben ihren Weg zum Ruhm mit der vollständigen serbischen Vereinigung beginnen."
 BUL_PRE_WW1_DESC:0 "Bulgarien hat sich bereits durch erfolgreiche Kämpfe gegen die Serben und die Ausmanövrierung des Osmanischen Reiches zur Vereinigung mit Ostrumelien einen Namen gemacht. Natürlich befindet sich das Land jetzt in einer schwierigeren Lage. Die Türken scheinen nicht bereit zu sein, weiteres bulgarisches Territorium herzugeben, und die Russen ziehen langsam ihre Unterstützung zurück. \n\nVielleicht ist es noch nicht zu spät, die Beziehungen zu Serbien zu verbessern? Schließlich könnte ein Bulgarien mit starken Freunden eine überraschende Bedrohung darstellen."
 MEX_PRE_WW1_DESC:0 "Das Mexiko des Jahres 1910 ist wahrlich ein seltsamer Fall. Das Porfiriato war seit 1876 ein großer Segen für Mexiko, doch nun, da der Druck zunimmt, scheint Präsident Diaz&#39; Amtszeit begrenzt zu sein. Die Regierung sieht dies natürlich als Handgreiflichkeit. \n\nFrancisco Madero plant aktiv und offensichtlich gegen die Diaz-Regierung. Wenn er ehrgeizig genug ist, könnte er Mexiko noch in der eigenen Tasche haben."
 JAP_PRE_WW1_DESC:0 "In knapp 50 Jahren hat sich Japan von einem rückständigen Despotat unter der Herrschaft eines Shoguns zu einem modernen Kaiserreich entwickelt, das jedem europäischen Land in nichts nachsteht. Kaiser Meiji ist dafür verantwortlich, doch leider ist er alt und krank – und hat nicht mehr lange zu leben. \n\nBevor Kronprinz Yoshihito die Krone übernimmt, müssen jedoch noch einige Fragen geklärt werden. Der betagte Kaiser muss entscheiden, wie Japan zu Russland steht und was mit dem koreanischen Vasallen geschehen soll."
 BEL_PRE_WW1_DESC:0 "Unter dem Schutz der Briten und den Augen der Deutschen als Hintertür nach Paris, die die Konzentration des befestigten französischen Militärs entlang der deutsch-französischen Grenze umgeht, befindet sich das Königreich Belgien in einer schwierigen Lage.\n\nKönig Albert I. wird vor einer schwierigen Entscheidung stehen: Entweder er stellt sich gegen Kaiser Wilhelm II. und steht Seite an Seite mit der Entente, oder er lässt die deutschen Truppen in sein Gebiet eindringen und schlägt einen anderen Kurs ein."
 HOL_PRE_WW1_DESC:0 "Seit der Zweiten Haager Konferenz im Jahr 1907 tun die Niederlande alles, um ein politisches Bündnis mit einem anderen europäischen Reich zu vermeiden.\n\nWährend die Kriegstrommeln vor den Toren Amsterdams erklingen und trotz ihrer strengen Neutralitätspolitik, könnte das friedliche Mühlenland bald mit dem Rücken zur Wand stehen und eine Entscheidung treffen müssen, die die Zukunft des niederländischen Reiches für immer verändern könnte.\n\nNiemand weiß, wie die äußerst patriotische Königin Wilhelmina reagieren wird …"
 OTHER_PRE_WW1_DESC:0 "Die Nationen der Welt, ob groß oder klein, werden von diesem Konflikt betroffen sein, der sich über mehrere Kontinente erstreckt."
 QIN_PRE_WW1_DESC:0 "China steht unter der Qing-Dynastie am Vorabend des Ersten Weltkriegs an einem kritischen Punkt. Einst eine dominierende Weltmacht, sieht sich die Dynastie nun mit internen Konflikten, ausländischem Einfluss und Forderungen nach Modernisierung konfrontiert. Die Nachwirkungen der Opiumkriege und die darauf folgenden ungleichen Verträge haben die Qing-Regierung geschwächt und sie kämpft darum, die Kontrolle über ihre riesigen Gebiete zu behalten. Der Aufstieg regionaler Kriegsherren, gepaart mit dem wachsenden Einfluss westlicher Mächte und Japans, hat die Nation weiter fragmentiert. Inmitten dieser Herausforderungen gewinnen reformistische und revolutionäre Bewegungen an Dynamik, die China in einen modernen Staat verwandeln wollen, der seinen früheren Ruhm zurückgewinnen kann. Während die Welt einem Konflikt immer näher kommt, hängt das Schicksal der Qing-Dynastie in der Schwebe, und es besteht das Potenzial für erhebliche Umwälzungen und Veränderungen."
 COL_PRE_WW1_DESC:0 "Kolumbien, eingebettet im Nordwesten Südamerikas, strahlt eine Aura tropischer Ruhe und kulturellen Reichtums aus. Seine abwechslungsreichen Landschaften, von üppigen Regenwäldern bis zu den hoch aufragenden Andengipfeln, bilden die Kulisse für ein Land, das von seiner Artenvielfalt und Geschichte geprägt ist. Vor dem Ersten Weltkrieg war Kolumbien ein Land, das von seinen landwirtschaftlichen Exporten, darunter Kaffee und Bananen, geprägt war und zu seiner Wirtschaft beitrug. Seine Städte verbinden koloniale Architektur mit modernen Einflüssen und spiegeln eine Gesellschaft wider, die stolz auf ihr Erbe ist, aber dennoch bereit für den Wandel ist."
 SPR_PRE_WW1_DESC:0 "Spanien, eine Wiege europäischer Geschichte und Kultur, liegt am Schnittpunkt mediterraner und atlantischer Einflüsse. Seine weitläufigen Städte wie Madrid und Barcelona sind Zentren der Kunst, Literatur und Innovation. Vor dem Ersten Weltkrieg bewegte sich Spanien in einem politisch komplexen Umfeld, das von der konstitutionellen Monarchie bis zum aufkeimenden Republikanismus reichte. Sein reiches kulturelles Erbe, das aus jahrhundertealten maurischen, christlichen und iberischen Traditionen gewoben ist, prägt eine Nation, die für ihren Flamenco, ihren Stierkampf und ihre kulinarischen Köstlichkeiten bekannt ist."

