 EAST_SHOWDOWN_DESC:0 "The aftershocks of the COVID-19 pandemic are still fresh in our memory. While many governments faced criticism for their poor responses, this focus drew attention away from the rising tensions on the Russia-Ukraine border and in the Taiwan Strait.
