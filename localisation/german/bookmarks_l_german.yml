 ###########################################
 ################## 1960 ###################
 ###########################################

 DECADE_CRISIS_NAME:0 "Das Jahrzehnt der Krise"
 DECADE_CRISIS_DESC:0 "Der Kalte Krieg heizt sich weiter auf. Die USA und die Sowjetunion bekämpfen sich in Afrika, Asien und Lateinamerika in Stellvertreterkriegen, während ein sogenannter Dominoeffekt Asien erfasst. Wird die Welle des Kommunismus gestoppt oder wird Asien untergehen?"
 USA_DECADE_CRISIS_DESC:0 "Die Vereinigten Staaten von Amerika sind ein wichtiger Akteur auf dem kapitalistischen Block. Nachdem Kuba und China vollständig dem Kommunismus verfallen sind, sind sie bereit, mit allen Mitteln zu intervenieren, um den Aufstieg des Kommunismus in anderen asiatischen Ländern oder Lateinamerika zu stoppen. Sie haben Westeuropa zurückerobert und die kapitalistische Vorherrschaft dort gesichert. Nun ist es an der Zeit, die kapitalistische Vorherrschaft in der Welt zu sichern."
 SOV_DECADE_CRISIS_DESC:0 "Die Union der Sozialistischen Sowjetrepubliken hat ihre Politik entstalinisiert und ihre internen Probleme stabilisiert. Sie konzentriert sich nun auf die Erforschung des Weltraums und will ihren Einfluss geltend machen, indem sie die Arbeiter der Welt vereint und in vielen Ländern kommunistische Regierungen einführt. Die Sowjetunion ist auf dem Vormarsch. Werden das Wirtschaftswachstum und die politische Dominanz der UdSSR anhalten oder werden die Amerikaner den Spieß umdrehen?"
 DDR_DECADE_CRISIS_DESC:0 "Die Deutsche Demokratische Republik folgte unter Ulbricht in den meisten Angelegenheiten der Sowjetunion mit relativem Erfolg. Doch auch zu Beginn des neuen Jahrzehnts kämpft die DDR mit zahlreichen Problemen, allen voran der Republikflucht, bei der DDR-Bürger in den Westen fliehen. Neben wirtschaftlichen und internen Problemen muss Ulbricht schnell handeln, sonst riskiert er seine Vertreibung oder Schlimmeres."
 PRC_DECADE_CRISIS_DESC:0 "Die Volksrepublik China ging siegreich aus dem chinesischen Bürgerkrieg hervor. Nachdem die Kuomintang nach Taiwan verbannt worden war, konzentrierte sich Mao auf seine Vision, China groß zu machen. Dabei begegnete er jedoch vielen Hindernissen. Wird Mao Erfolg haben oder wird er in Vergessenheit geraten?"
 CUB_DECADE_CRISIS_DESC:0 "Die Republik Kuba, die nun unter Castro steht, wurde erst vor einem Jahr kommunistisch. Unruhen und Instabilität führten im Januar 1959 zum Sturz Batistas durch die Bewegung des 26. Juli, die anschließend unter Fidel Castro die kommunistische Herrschaft errichtete. Während die USA zunächst positiv auf die kubanische Revolution reagierten, verschlechterten Castros Legalisierung der Kommunistischen Partei und die darauf folgenden Hunderte von Hinrichtungen die Beziehungen zwischen den beiden Ländern. Es bleibt abzuwarten, was die Zukunft bringt. Frieden wird es sicher nicht geben."
 VIE_DECADE_CRISIS_DESC:0 "Am 26. Oktober 1955 wurde die Republik Vietnam ausgerufen. Ihr erster Präsident war Ngo Dinh Diem. Im Gegensatz zum kommunistischen Norden wird der Süden von den USA unterstützt. Die Situation ähnelt der in Korea. Wird auch dies zum Krieg führen?"
 FRA_DECADE_CRISIS_DESC:0 "Die Französische Republik wurde unter de Gaulle gerade als Fünfte Republik reformiert. Sie entstand aus dem Zusammenbruch der Vierten Republik und ersetzte die ehemalige parlamentarische Republik durch ein semipräsidentielles System. De Gaulle, der im Dezember 1958 als erster französischer Präsident der Fünften Republik gewählt wurde, glaubt an ein starkes Staatsoberhaupt, das er als Verkörperung des „Geistes der Nation“ beschreibt."
 ENG_DECADE_CRISIS_DESC:0 "Großbritannien befindet sich nach der Suezkrise in einer schwierigen Lage. Angesichts der wachsenden Unabhängigkeitsbewegung erwarten viele das baldige Ende des britischen Empires. Neben dem Zerfall des Empires erlebte das Land den Aufstieg des Kommunismus, der sich zu einem noch größeren Problem entwickeln könnte."
 ZIM_DECADE_CRISIS_DESC:0 "Seit 1953 bilden Südrhodesien, Nordrhodesien und Njassaland eine instabile Föderation. Mit der neuen Zentralregierung fragen sich viele, ob die Föderation Bestand haben oder zerbrechen wird. Der zunehmende Nationalismus in allen drei Gebieten könnte zu schwer zu bewältigen sein."

 ###########################################
 ################## 1970 ###################
 ###########################################

 DETENTE_NAME:0 "Entspannung"
 DETENTE_DESC:0 "Es sind erneut unruhige Zeiten in Europa. Der Zusammenbruch von Hitlers Drittem Reich hat die Spannungen zwischen den Alliierten und der Sowjetunion nicht entspannt. Der Pariser Friedensvertrag beendete den Vietnamkonflikt abrupt, obwohl dieser Vertrag nur auf Worten beruht. Die zunehmend aggressive Sowjetunion geht weiterhin hart gegen Demonstranten in ihren Satellitenstaaten vor. Angesichts der wirtschaftlichen Krise sucht sie im Nahen Osten nach neuen Möglichkeiten."

 ###########################################
 ################## 1980 ###################
 ###########################################

 CONFRONTATION_NAME:0 "Konfrontation"
 CONFRONTATION_DESC:0 "Der Nahe Osten ist von Instabilität geprägt, und erneut werden sich seine Nationen verändern. Die Sozialisten in Afghanistan haben die demokratische Regierung im Westen in einem unblutigen Putsch erfolgreich gestürzt. Und nun strebt auch die fundamentalistische islamische Bevölkerung nach Veränderung. Das iranische Volk hat gesprochen: Die Zeit der Pahvlavi-Dynastie ist zu Ende! Ein islamischer Iran wird als wahre islamische Nation der Welt die Bühne betreten! Unbeirrt vom amerikanischen Scheitern in Vietnam versuchen die Chinesen, ihren Einfluss im Südchinesischen Meer auszuweiten. Kriegsvorbereitungen laufen …"

 ###########################################
 ################## 1990 ###################
 ###########################################

 WINDS_OF_CHANGE_NAME:0 "Winde der Veränderung"
 WINDS_OF_CHANGE_DESC:0 "Mit dem Fall der Berliner Mauer weht nun endlich der Wind der Veränderung. Mit dem Zerfall des Kommunismus in der Sowjetunion und anderen Staaten des Warschauer Pakts werden die Vereinigten Staaten mit ihrem demokratischen System zur dominierenden Supermacht der Welt. Werden die großen Nationen der Welt zusammenkommen und ein Zeitalter der Freiheit und des Wohlstands erleben oder werden sie in einem endlosen Kreislauf der Gewalt verharren?"

 ###########################################
 ################## 2000 ###################
 ###########################################

 MILLENIUM_DAWN_NAME:0 "Millennium Dawn"
 MILLENIUM_DAWN_DESC:0 "Die Welt hat sich verändert. Weltweit herrschte etwa ein halbes Jahrhundert lang eine Atmosphäre des Friedens und des Wohlstands. Doch wie wird sich die Welt nach dem Ende des Kalten Krieges und dem Aufstieg der Volksrepublik China selbst sehen? Wie wird sie sich gestalten? Werden die Vereinigten Staaten ihre Dominanz fortsetzen? Wird die neue Russische Föderation ins Rampenlicht treten? Welche Rolle werden die ehemaligen großen europäischen Imperien Großbritannien, Frankreich und Deutschland spielen? Und welche Rolle wird der Schatten des Terrorismus spielen? Die Welt hat sich verändert. Die Welt verändert sich."
 ENG_MILLENIUM_DAWN_DESC:0 "In den späten 1990er Jahren erlebte Großbritannien nach Jahrzehnten des Niedergangs eine Rückkehr auf die Weltbühne. Mit der Übergabe Hongkongs an China im Jahr 1997 verlor das Vereinigte Königreich seinen letzten großen Kolonialbesitz. Die einst mächtigste Nation der Welt versucht verzweifelt, einen neuen Weg zu Größe und Ruhm zu finden. Mit einem Haushaltsüberschuss in ein vielversprechendes neues Jahrtausend zu starten, sind die Möglichkeiten, das Land zu verändern, endlos. Doch wird dieser Weg in der fortgesetzten Zusammenarbeit mit den Vereinigten Staaten liegen? Sollte Großbritannien enger an seine europäischen Brüder rücken? Oder wird Britannien wieder allein die Meere beherrschen?"
 FRA_MILLENIUM_DAWN_DESC:0 "Frankreich, die Grande Nation der Vergangenheit, versucht, in einer sich ständig verändernden Welt einen neuen Platz zu finden. Mit alten Rivalen und alten Freunden an der Seite, neuen Gegnern und neuen Bedrohungen am Horizont muss Frankreich entscheiden, ob die Zukunft der Wiege der Demokratie Einheit und Frieden oder eine Rückkehr in dunklere Zeiten sein soll."
 GER_MILLENIUM_DAWN_DESC:0 "Fast zehn Jahre sind seit der Wiedervereinigung der Bundesrepublik Deutschland und der Deutschen Demokratischen Republik vergangen. Das nun vereinte Deutschland ist ein Zentrum der europäischen Industrie. Das deutsche Militär hingegen liegt in Trümmern. Es fehlt an Munition für Bundeswehr, Luftwaffe und Bundesmarine. Deutschland trägt immer noch die Last der nationalsozialistischen und kommunistischen Verbrechen gegen die Menschlichkeit, die den Nationalstolz des deutschen Volkes verletzen, der fast nicht mehr existierte. Einigkeit, Recht und Freiheit! Die Menschen stellen sich die Frage: War der vereinigte deutsche Staat ein Fehler?"
 ITA_MILLENIUM_DAWN_DESC:0 "Italien hinkt seit Beginn des 20. Jahrhunderts den anderen Großmächten immer wieder etwas hinterher. Nach der Niederlage im Zweiten Weltkrieg hat Italien dank seiner starken Bindung an seine ehemaligen Feinde und seinen ehemaligen Verbündeten Deutschland wieder zu einem hoch entwickelten und wohlhabenden Land aufgestiegen. Doch was wird die Zukunft bringen? Nationale Größe oder wirtschaftliches Desaster?"
 JAP_MILLENIUM_DAWN_DESC:0 "Japan, die zweitgrößte Volkswirtschaft der Welt, ist seit dem Ende des Zweiten Weltkriegs das Zugpferd der ostasiatischen Demokratien. Unterstützt von amerikanischen und europäischen Verbündeten und geschützt durch eine starke Industriebasis, blickt Japan mit neuem Selbstvertrauen und neuem Konfliktpotenzial auf seinen alten Rivalen China."
 NOR_MILLENIUM_DAWN_DESC:0 "Norwegen stimmte 1995 gegen den Beitritt zur Europäischen Union und blieb seitdem bis zu einem gewissen Grad von Europa fern. Norwegen ist jedoch weiterhin NATO-Mitglied und hat eine kurze, aber wichtige Grenze mit der Russischen Föderation."
 PRC_MILLENIUM_DAWN_DESC:0 "China, im 20. Jahrhundert ein armes, unterentwickeltes Land, hat sich seit Deng Xiaopings Reformen, die Kapitalismus und sozialistische Systeme vereinen, rasant verändert. Doch Chinas Zukunft bleibt ungewiss. Das Land ist reich geworden, doch die Armut der Bauern ist nicht behoben. Und es gibt immer noch politische Gruppierungen, die versuchen, die Kommunistische Partei Chinas zu stürzen. Wie sieht die Zukunft Chinas aus? Kann China die Supermacht des 21. Jahrhunderts werden? Oder wird es sich selbst zerstören?"
 IND_MILLENIUM_DAWN_DESC:0 "China ist die Supermacht von morgen, Indien die Supermacht von morgen. Der ständige Kampf gegen Pakistan und China sowie die enge wirtschaftliche Verflechtung mit dem Westen haben Indien eine Nische für Wohlstand verschafft. Mit genügend Zeit wird der Tiger Südasiens stark genug sein, um jeden einzelnen seiner Feinde auszuschalten."
 RUS_MILLENIUM_DAWN_DESC:0 "Als die Sowjetunion 1991 zusammenbrach, war klar, dass der Weg zurück in die Geschichte für die Russische Föderation nicht leicht werden würde. System und Wirtschaft waren korrupt, das Militär zwar groß, aber veraltet, und die politische Reichweite war geschwächt. Russland musste ein Jahrzehnt lang abseits stehen. Nun strebt es die Rückkehr ins Rampenlicht an."
 SPR_MILLENIUM_DAWN_DESC:0 "Seit Francos Tod 1975 befindet sich Spanien auf einem langen Weg der Erholung. Trotz wirtschaftlicher und sozialer Schwierigkeiten gelang es dem Land, die Probleme, die Jahrzehnte des Falangismus verursacht hatten, teilweise zu bewältigen. Spanien trat der NATO (1982) und der EU (1986) bei und arbeitete unermüdlich und unter größter Anstrengung daran, zu den mächtigeren und wohlhabenderen großen europäischen Ländern – Deutschland, Frankreich, Großbritannien und Italien – aufzuschließen. In Zeiten wie diesen braucht Spanien eine starke Führung und eine stabile Hand. Kann Premierminister Aznar liefern? Oder wird seine Partido Popular einer würdigeren Führung Platz machen?"
 SWE_MILLENIUM_DAWN_DESC:0 "Schweden steckte Anfang der 1990er Jahre in einer schweren Wirtschaftskrise. Auch der EU-Beitritt des Landes 1995 konnte die Lage kaum verbessern. Schweden, das traditionell militärisch neutral bleibt, muss wirtschaftliche Antworten finden."
 OTHER_MILLENIUM_DAWN_DESC:0 "Erster Weltkrieg, Zweiter Weltkrieg, Koreakrieg, Vietnamkrieg, Afghanistankrieg. Die Kriege der Vergangenheit lassen die Nationen der Gegenwart vor der Zukunft fürchten. Dennoch besteht große Hoffnung, dass die Menschheit nach 20 Jahrhunderten des Blutvergießens den Übergang in eine Zeit des Friedens und der Stabilität vollziehen kann."
 MEX_MILLENIUM_DAWN_DESC:0 "Im Jahr 2000 erlebte Mexiko einen bedeutenden politischen Wandel, als die Partei der Institutionalisierten Revolution (PRI) nach über siebzig Jahren die Macht verlor. Vicente Fox, Vertreter der Partei der Nationalen Aktion (PAN), gewann die Präsidentschaftswahlen und läutete damit eine neue Ära der Demokratie und politischen Vielfalt ein. Trotz der wirtschaftlichen Herausforderungen nach der Peso-Krise von 1994 strebt Mexiko nach Modernisierung und kämpft gleichzeitig mit anhaltenden sozialen Problemen wie Armut und Kriminalität. Diese Ereignisse markieren einen entscheidenden Moment in der Geschichte Mexikos und prägen dessen zukünftige Entwicklung."
 ROM_MILLENIUM_DAWN_DESC:0 "Rumänien ist ein Land, in dem es im Gegensatz zu anderen Ländern unter russischer Herrschaft keinen friedlichen Regierungswechsel gab. Stattdessen kam es zu einer blutigen Revolution. Derzeit kämpft Rumänien mit vielen Problemen, unter anderem mit Arbeitslosigkeit. Soll Rumänien seine Probleme selbst bekämpfen oder wird das Militär dies für das Land tun?"
 GRN_MILLENIUM_DAWN_DESC:0 "Grönland ist eine große Landmasse mit geringer Bevölkerungsdichte. Das ist nicht die einzige Besonderheit dieser Insel: Sie verfügt über große Ressourcen und wichtige Positionen. Sollen sie ihre dänischen Oberherren verlassen oder ihre Bindungen zu ihnen stärken?"
 DEN_MILLENIUM_DAWN_DESC:0 "Dänemark ist als Mitglied der EU und der NATO in einer sicheren Lage. Der interne Wirtschaftsabschwung und die Konjunkturabschwächung stellen den dänischen Staat jedoch in letzter Zeit vor Herausforderungen."
 ETH_MILLENIUM_DAWN_DESC:0 "Äthiopiens Monarchie wurde 1974 gestürzt, die darauffolgende kommunistische Diktatur 1991. Die Verfassung von 1995 sorgte zwar für eine einigermaßen stabile Demokratie, konnte jedoch die Probleme Hunger, politische Krisen und Korruption nicht lösen. Auch den anhaltenden Konflikt mit Eritrea konnte sie nicht lösen."
 FIN_MILLENIUM_DAWN_DESC:0 "Finnland, stets um die Wahrung seiner Neutralität bemüht, hat den Zusammenbruch der Sowjetunion und die darauffolgende politische Expansion der westeuropäischen Mächte aufmerksam verfolgt. 1995 traten die Finnen der EU bei und stehen kurz davor, den Euro als Landeswährung einzuführen. Kann der Frieden von Dauer sein? Sind die Russen wirklich befriedet?"
 FRA_MILLENIUM_DAWN_DESC:0 "Frankreich, die Grande Nation der Vergangenheit, versucht, in einer sich ständig verändernden Welt einen neuen Platz zu finden. Mit alten Rivalen und alten Freunden an der Seite, neuen Gegnern und neuen Bedrohungen am Horizont muss Frankreich entscheiden, ob die Zukunft der Wiege der Demokratie Einheit und Frieden oder eine Rückkehr in dunklere Zeiten sein soll."
 ICE_MILLENIUM_DAWN_DESC:0 "In einer verborgenen Ecke Europas hat Island seit seiner Unabhängigkeit 1944 erfolgreich ein unauffälliges Bild hinterlassen. Die politischen Konflikte mit den Briten um Fischereirechte waren vielleicht die aufregendste Zeit in der isländischen Geschichte. Sollte Island eine zentralere Position einnehmen?"
 SWI_MILLENIUM_DAWN_DESC:0 "Die Schweiz ist seit jeher neutral und hat sich entschieden, nicht nur der NATO und der Europäischen Union, sondern sogar den Vereinten Nationen fernzubleiben. Kann sich die internationale Gemeinschaft weiterhin darauf verlassen, dass die Schweiz als stiller Richter und neutraler Boden fungiert, wie sie es immer war? Oder wird die Schweizer Bevölkerung eine aktivere Rolle ihrer Regierung im Ausland erleben, um den Frieden zu bewahren und die nationalen Interessen der Schweiz durchzusetzen?"
 USA_MILLENIUM_DAWN_DESC:0 "Die Bürger der Vereinigten Staaten haben im letzten Jahrhundert kaum etwas anderes als Erfolge erlebt. Siege in den Weltkriegen und im Kalten Krieg – die USA haben bisher eine nahezu perfekte Erfolgsbilanz vorzuweisen. Doch was kann Amerika angesichts des wachsenden Chinas am anderen Ende des Ozeans, des Strebens Russlands nach neuer Größe und der immer größer werdenden Bedrohung durch den Terrorismus tun, um seine Vormachtstellung zu bewahren?"
 ISR_MILLENIUM_DAWN_DESC:0 "Israel ist von Ländern umgeben, die es am liebsten vernichten würden. Mit wenigen natürlichen Ressourcen und nur einem Verbündeten ist Israels Lage düster. Dies könnte die einzige Chance für das jüdische Volk sein, einen Staat zu gründen, in dem Sicherheit garantiert ist. Was wird Israel also tun? Frieden mit seinen Feinden schließen? Oder wird es einen gewaltsameren Weg einschlagen?"
 TUR_MILLENIUM_DAWN_DESC:0 "Da die Türkei zum Zeitpunkt ihrer Gründung nicht stark genug war, blieb sie in globalen Fragen im Allgemeinen neutral. Nachdem das Land seine Kriege hinter sich gelassen und sich entwickelt hatte, gewann es zunehmend an Einfluss in internationalen Fragen. In den 2000er Jahren entwickelte es sich zu einer Regionalmacht auf dem Balkan und im Nahen Osten."
 SYR_MILLENIUM_DAWN_DESC:0 "Syrien war noch nie ein sogenanntes stabiles Land und es müssen noch viele Hindernisse überwunden werden, bevor innere Stabilität erreicht werden kann. Die israelische Besetzung der Golanhöhen muss gelöst werden, bevor derartige Gespräche stattfinden können."
 PRK_MILLENIUM_DAWN_DESC:0 "Nach dem Tod von Diktator Kim Il-sung übernahm sein Sohn Kim Jong-il die Macht. Der Machtwechsel in der Republik brachte viele Gegner hervor, und Kim Jong-il musste im Rahmen der Simhwajo-Säuberung viele seiner Gegner massakrieren. Die große Säuberung ist abgeschlossen, und Kim Jong-ils Diktatur wird wohl ewig andauern. Die DVR Korea bleibt jedoch zwei Risiken ausgesetzt: Hwang Jang-yop, ein bekannter prodemokratischer Aktivist, der nach Südkorea überlief, und Hyun Yong-chol, ein Anhänger Deng Xiaopings."
 SIA_MILLENIUM_DAWN_DESC:0 "Thailand kann auf eine lange Geschichte zurückblicken, auch wenn diese nur zu einem geringen Teil eine Demokratie war. Thailand muss bei seinen weiteren Schritten vorsichtig sein, da die Mächte China im Norden und Indien im Westen möglicherweise beabsichtigen, Thailands Macht einzuschränken."
 UKR_MILLENIUM_DAWN_DESC:0 "Die Ukraine ist eines der letzten Länder, die die Sowjetunion verlassen haben. Anders als Länder wie Polen oder die baltischen Staaten hat sich die Ukraine nicht vollständig in den Westen integriert oder sich aus Missachtung von Weißrussland Russland angeschlossen. Dies führte zu steigender Arbeitslosigkeit und einem Produktionsrückgang von 50 Prozent. Die Ukraine liegt am Boden. Wird sie überleben?"
 BUL_MILLENIUM_DAWN_DESC:0 "Die bulgarische Wirtschaft erholt sich noch immer vom Zusammenbruch des Rates für gegenseitige Wirtschaftshilfe. Doch das ist nicht das einzige Problem, mit dem Bulgarien noch zu kämpfen hat: schwaches Militär, Agrarwirtschaft und politische Krise. Wird sich Bulgarien erholen? Wird der Zarismus wiederhergestellt? Oder werden vielleicht sogar Technokraten zum zweiten Mal die Macht übernehmen?"
 PAK_MILLENIUM_DAWN_DESC:0 "PLATZHALTER"
 PER_MILLENIUM_DAWN_DESC:0 "PLATZHALTER"
 POL_MILLENIUM_DAWN_DESC:0 "Polen ist seit seinem Beitritt zur Europäischen Union im Jahr 2004 stark gewachsen. Es ist heute eine Regionalmacht und eine der am schnellsten wachsenden Volkswirtschaften Europas. Es ist auf dem besten Weg, eine der bedeutendsten Mächte Europas zu werden. Die aktuelle politische Situation Polens ist interessant, da die PiS an die Macht gekommen ist und die Beziehungen zur EU angespannt sind. Polen, ein entschieden antirussisches Land, unternimmt große Anstrengungen, um seine Beziehungen zu den USA zu stärken."
 AZR_MILLENIUM_DAWN_DESC:0 "Alijew und Elcibey liefern sich weiterhin einen Wettstreit. Wird einer der beiden oder ein anderer Kandidat das Land führen? Und was ist mit Karabach?"
 LAT_MILLENIUM_DAWN_DESC:0 "Nach der Unabhängigkeit Lettlands von der Sowjetunion und dem Austritt aus dem Rat für gegenseitige Wirtschaftshilfe erlitt Lettlands Wirtschaft einen schweren Schlag. Doch das ist nicht das einzige Problem: Es gibt auch Probleme mit der russischen Minderheit und dem veralteten Bildungssystem. Viele Letten radikalisieren sich und gründen Parteien wie die Pēdējā partija (Letzte Partei). Wird die Krise anhalten? Wird Lettland aufstehen und die baltischen Nationen vereinen? Oder übernehmen vielleicht sogar die Kommunisten wieder die Macht?"
 HUN_MILLENIUM_DAWN_DESC:0 "Ungarn hat den Kommunismus 1989 abgeschafft. Dennoch erholt sich Ungarn noch immer von dieser Diktatur. Viele Reformen wurden durchgeführt, und nun wird Ungarn von Orban regiert, der die Opposition vernichten will. Viele Menschen sind gegen ihn, aber werden sie einen Putsch organisieren und Ungarn in eine Diktatur verwandeln, oder wird die Demokratie überleben?"
 BRA_MILLENIUM_DAWN_DESC:0  "Brasilien war schon immer ein Land, das auf dem Weg zur Größe war. Es stand sogar kurz davor, die nächste Supermacht zu werden. Reformen sind notwendig, um uns auf den Weg zu bringen, eine führende Weltmacht zu werden, wie es unser Schicksal von uns verlangt."
 BHU_MILLENIUM_DAWN_DESC:0 "Bhutan ist ein Land, das von Indien und China umgeben ist, was sein Wachstum einschränkt und es anfällig für Angriffe und deren Einfluss macht. Unter dem Schutz Indiens ist Bhutan derzeit mit vielen Problemen konfrontiert, wie der Lhotshampa-Minderheit, einer schwachen Wirtschaft und Massenanalphabetismus. Bhutan befindet sich derzeit in einem rasanten Wandel. Vielleicht wird es zu einer konstitutionellen Monarchie, bleibt eine absolute Monarchie, wird von seinen Mönchen übernommen oder kommt es sogar zu einer kommunistischen Revolution?"
 CHI_MILLENIUM_DAWN_DESC:0 "2000 n. Chr.: Im Vorfeld der Präsidentschaftswahlen sieht sich die Insel Taiwan einer heftigen Konfrontation zwischen der Kuomintang, einer pannationalistischen Partei Chinas, die auf die Annexion Taiwans durch China besteht, und der Demokratischen Fortschrittspartei, einer taiwanesischen nationalistischen Partei, die die Unabhängigkeit Taiwans anstrebt, gegenüber. Wird Chen Shui-bian, ein überzeugter taiwanesischer Nationalist, die bevorstehende Wahl gewinnen und seinen Traum von einem unabhängigen Staat Taiwan verwirklichen? Oder bleibt sein Traum nur ein Tagtraum?"
 CUB_MILLENIUM_DAWN_DESC:0 "Nach dem Zusammenbruch der Sowjetunion begann für die Republik Kuba eine „Sonderperiode in Friedenszeiten“, wie sie offiziell genannt wird. Die Auflösung des COMECON führte zu einem 80-prozentigen Rückgang der kubanischen Wirtschaft, der, verschärft durch das US-Embargo, zu extremer Armut, Hunger und weit verbreiteter Protestbewegung führte. Doch Castros Regime hielt stand. Wirtschaftsreformen, die begrenzte private Initiativen und finanzielle Hilfen der EU und Chinas ermöglichten, führten dazu, dass sich Kuba im 21. Jahrhundert langsam von den Schrecken der 90er Jahre erholte. Was bringt die Zukunft?"
 ARM_MILLENIUM_DAWN_DESC:0 "Armenien ist nur zögerlich auf die Weltbühne zurückgekehrt. Es hatte die Sowjetunion wegen der Bergkarabach-Frage verlassen, wo die einheimische Bevölkerung sowohl Gorbatschows als auch den aserbaidschanischen Versuchen, die Region ethnisch zu säubern, trotzte. Doch kurz nach der Unabhängigkeit musste Russland eingreifen, um eine türkische Invasion abzuwenden. Heute stehen die Armenier am Rande der Vernichtung; sie können es im turanischen Projekt nicht mehr lange aushalten. Wird dieses Jahrhundert versöhnlicher sein als das letzte, oder wird das Echo der Zerstörung erneut über das armenische Hochland hallen?"
 OTHER_MILLENIUM_DAWN_DESC:0 "Erster Weltkrieg, Zweiter Weltkrieg, Koreakrieg, Vietnamkrieg, Afghanistankrieg. Die Kriege der Vergangenheit lassen die Nationen der Gegenwart vor der Zukunft fürchten. Dennoch besteht große Hoffnung, dass die Menschheit nach 20 Jahrhunderten des Blutvergießens den Übergang in eine Zeit des Friedens und der Stabilität vollziehen kann."
 SIG_MILLENIUM_DAWN_DESC:0 "Singapur ist ein kleiner Inselstaat an der Mündung der Straße von Malakka. Nach seiner Unabhängigkeit von Malaysia im Jahr 1965 gelang es dem Land ohne natürliche Ressourcen, sich von einem unterentwickelten zu einem der am weitesten entwickelten Länder der Welt zu entwickeln. Das Land hat sich zu einem Finanzzentrum Südostasiens entwickelt und zählt heute zu den wohlhabendsten Ländern der Welt. Im 21. Jahrhundert steht der kleine Inselstaat vor neuen Herausforderungen und Bedrohungen. Singapur muss geschlossen bleiben, um diese dunklen Zeiten zu meistern."
 MON_MILLENIUM_DAWN_DESC:0 "2000 n. Chr.: Viele Mongolen erleben schwere Zeiten. 1998 wurde Zorig, der Nationalheld der Mongolei, ermordet, und 1999 brach die mongolische Wirtschaftskrise aus. Die Regierungspartei DUC zerreißt die mongolische Gesellschaft durch politische Inkompetenz. Werden die Sozialisten schließlich die Kontrolle über die mongolische Regierung übernehmen? Oder wird die Mongolei ihren eigenen neuen Weg finden?"
 BOS_MILLENIUM_DAWN_DESC:0 "Vor fünf Jahren erlebte Bosnien den blutigsten Krieg Europas seit dem Zweiten Weltkrieg und zahlreiche Völkermorde, die das Land zerrissen. Nach drei Jahren des Kampfes ging die junge Republik teilweise siegreich hervor, nachdem sie mit den kroatischen Separatisten verhandelt und die von Jugoslawien unterstützten bosnisch-serbischen Separatisten zu einem Friedensvertrag gezwungen hatte. Das Dayton-Abkommen brachte Frieden und spaltete Bosnien in zwei autonome Einheiten: die Bosniakisch-Kroatische Föderation und die Republika Srpska. Nun wird die alte Führung der Republika Srpska wegen Kriegsverbrechen vor Gericht gestellt, während der bosnische Staat aus der Asche aufersteht. Wird dies so weitergehen?"
 BEL_MILLENIUM_DAWN_DESC:0 "Belgien hat das 21. Jahrhundert mit einer neuen Regierung erreicht, die nach den Kontroversen unter der alten Regierung Dehaene II. zu den Idealen des Liberalismus zurückkehrt. Die belgische Monarchie unter König Albert II. genießt hohe öffentliche Anerkennung, da viele ihn als den einzigen Zusammenhalt der Wallonen und Flamen betrachten. Wird Belgien in eine glänzende Zukunft geführt oder werden die Kontroversen erneut aufflammen und der Radikalismus in Europa erneut an Boden gewinnen?"
 LUX_MILLENIUM_DAWN_DESC:0 "Luxemburg war bis zum Ende des Zweiten Weltkriegs neutral und unbewaffnet, nachdem es innerhalb von 25 Jahren zwei deutsche Invasionen erlebt hatte. Das Großherzogtum wusste, dass es militärische Kräfte benötigen würde, um der nächsten möglichen Aggression entgegenzutreten, und wurde daher Gründungsmitglied der NATO und der Europäischen Union. Premierminister Jean Claude-Junker und Großherzog Jean genießen in der Öffentlichkeit hohes Ansehen, da sie als stark gelten und die demokratische Verfassung und Europa hochhalten. Wird Luxemburg das reichste Land Europas bleiben oder wird es sich radikal abwenden?"
 HOL_MILLENIUM_DAWN_DESC:0 "Die Niederlande haben unter dem zweiten Kabinett von Premierminister Wim Kok ihr BIP gesteigert und sich in vielen Bereichen verbessert. Königin Beatrix, Königin der Niederlande, hat die Aufgabe, die Nation zusammenzuhalten und die unpolitische Galionsfigur zu sein, die sie sein soll. Die Niederländer verloren 1949 ihre größte Kolonie, Indonesien, was in anderen Teilen der Niederlande, wie den ABC-Inseln Aruba, Bonaire und Curaçao, Stimmen nach Unabhängigkeit hervorrief. Wird das Königreich das demokratische Aushängeschild Europas bleiben und mit Europa voranschreiten oder wird es einen anderen Weg einschlagen?"
 AUS_MILLENIUM_DAWN_DESC:0 "Nach der Befreiung von der Nazi-Besatzung im Jahr 1945 und der zehnjährigen Besatzung durch die vier alliierten Großmächte erlangte Österreich seine Unabhängigkeit unter dem Kompromiss, dass die Republik Österreich zwischen West und Ost neutral blieb. Nach dem Zerfall der Sowjetunion trat Österreich der Europäischen Union bei und brach damit Teile seiner Neutralität. Obwohl es nicht der NATO angehörte, beteiligte es sich am Programm „Partnerschaft für den Frieden“ und entsandte Truppen in den Kosovo und nach Bosnien. Wird das nächste Jahrtausend vielversprechender sein als das letzte, oder wird Österreich bzw. die österreichische Neutralität insgesamt ausgelöscht?"
 LIC_MILLENIUM_DAWN_DESC:0 "Liechtenstein ist der viertkleinste Staat Europas und hat Jahrhunderte ohne Besatzung überstanden. Nach dem Ende des Zweiten Weltkriegs entwickelte es sich zu einem großen Wirtschaftsraum und trat sogar dem Europäischen Wirtschaftsraum bei, während der ebenfalls neutrale Nachbar, die Schweiz, diesem Beitritt noch nicht beigetreten ist. Fürst Hans Adam II. bestieg 1989 den Thron und ist seitdem dort. Die Unabhängigkeit Liechtensteins wird vom Nachbarn Schweiz geschützt. Liechtenstein wahrt die gleiche Neutralität, an die die Schweiz glaubt. Wird das kleine Fürstentum ein weiteres Jahrtausend ohne Besatzung überleben oder wird dies das unglückliche Ende Liechtensteins bedeuten?"
 CZE_MILLENIUM_DAWN_DESC:0 "Nach 41 Jahren kommunistischer Herrschaft ist Tschechien zur Demokratie zurückgekehrt. 1992 zerfiel die Tschechoslowakei in die Tschechische und die Slowakische Republik. Der tschechische Präsident Václav Havel hat die Tschechen durch all diese Krisen geführt und wird dies möglicherweise erneut tun müssen. 1993 trat das Land der Visegrad-Gruppe bei, was die Wertschätzung gegenüber Ländern wie Polen, Ungarn und der Slowakei stärkte. Vor einem Jahr trat Tschechien der NATO bei. Wird Tschechien den Status quo einer liberalen Demokratie bewahren und möglicherweise der Europäischen Union beitreten oder steht dem Land eine düstere Zukunft bevor?"
 POR_MILLENIUM_DAWN_DESC:0 "Nach dem Ende der langen Diktatur des Estado Novo im Jahr 1974 durch die Nelkenrevolution hat sich Portugal zu einem der sichersten Länder der Welt entwickelt und verfügt gleichzeitig über eine demokratische Regierung. Portugal war Gründungsmitglied der NATO und trat 1986 zusammen mit Spanien der Europäischen Union bei. Ein Großteil der Einnahmen des Landes stammt aus dem Tourismus, und Premierminister António Guterres möchte diesen noch stärker fördern. Portugal kämpft mit Drogenproblemen und erwägt sogar die Legalisierung aller Drogen, um die Polizei zu entlasten. Portugal steht im Westen stark und widersetzt sich Diktaturen, aber wird das so bleiben?"
 AND_MILLENIUM_DAWN_DESC:0 "Das kleine Bergfürstentum Andorra besteht seit 1278 und erlangte 1993 nach der Verfassungsänderung seine volle Unabhängigkeit. Andorra ist weltweit vor allem für seine Skipisten bekannt, weshalb viele Touristen nach Andorra kommen. Das Land wird von zwei Fürsten regiert: dem französischen Präsidenten und dem Bischof von Urgell. Andorra ist weder Mitglied der NATO noch der Europäischen Union und möchte es auch nicht werden. Wie wird die Zukunft Andorras entschieden?"
 MOC_MILLENIUM_DAWN_DESC:0 "Das Fürstentum Monaco ist im 21. Jahrhundert angekommen. Ein Glücksspielparadies mit Palmen und Stränden, perfekt für die Tourismusindustrie. Das Land wird derzeit von König Rainier III. regiert, der das Zirkusfestival von Monte Carlo ins Leben rief, um den Tourismus weiter anzukurbeln. Rainiers Gesundheitszustand verschlechtert sich jedoch langsam. Zusammenfassend lässt sich sagen, dass Monaco ein Hotspot für Festivals wie Zirkusse, Casinos und die Formel 1 ist. Wird Monaco den Status quo beibehalten, wird es letztendlich der Europäischen Union und/oder der NATO beitreten oder wird es sich noch weiter zurückentwickeln?"
 SAN_MILLENIUM_DAWN_DESC:0 "San Marino ist das älteste Land Europas, dessen Geschichte auf das Jahr 301 zurückgeht und das die älteste noch gültige Verfassung der Welt besitzt. Es ist ein Bergparadies mit einer wunderschönen Landschaft und dem Guaita-Turm. San Marino wurde in der Vergangenheit vom faschistischen Italien beeinflusst und steht auch heute noch stark unter italienischem Einfluss. Kapitänregent Gianfranco Terenzi führt San Marino mit der Absicht einer neutralen Demokratie, da sich die Regierung von der NATO und der Europäischen Union distanziert hat. Wird sich dies in Zukunft ändern und möglicherweise dazu führen, dass San Marino sich für eine Seite entscheidet, oder werden Ideen aus der Vergangenheit erneut aufleben und Europa erschüttern?"
 VAT_MILLENIUM_DAWN_DESC:0 "Der Sitz des Papstes und damit der wichtigste Ort für den Katholizismus. Hier befindet sich die Vatikanische Apostolische Bibliothek, die einen der wertvollsten Texte der Welt beherbergt. Wird der Papst für Stabilität und Frieden sorgen und den Katholizismus verbreiten, oder werden sie sich dem Teufel zuwenden?"
 GRE_MILLENIUM_DAWN_DESC:0 "Griechenland, das 1975 gerade die Demokratie wiederhergestellt hatte, war eine NATO-Hochburg im Mittelmeer. Doch die Republik steckt in Schwierigkeiten, hat im Laufe der Zeit hohe Schulden angehäuft, die Griechenland ohne ausländische Hilfe nicht zurückzahlen kann. 1981 trat Griechenland der Europäischen Union bei, um Hilfe gegen die Rezession zu erhalten und die Beziehungen zu Europa insgesamt zu verbessern. Griechenland hat einen schwierigen Nachbarn, die Türkei. Griechenland und die Türkei streiten ständig über bestimmte Themen wie die Zypernfrage und den Status einiger Ägäisinseln. Wird sich Griechenland von seiner Rezession erholen und auf dem Balkan stärker denn je dastehen, oder wird alles zu Staub zerfallen?"
 SLV_MILLENIUM_DAWN_DESC:0 "Nach der blutigen Revolution gegen Jugoslawien im Jahr 1991 hat Slowenien seine Regierung so weit gestärkt, dass es seine Unabhängigkeit bewahren konnte. Slowenien hat sich keiner Seite angeschlossen, strebt aber einen möglichen Beitritt zur Europäischen Union und/oder der NATO an. Präsident Janez Drnovšek, der an Nierenkrebs leidet, wurde kürzlich zum Präsidenten gewählt und versprach, Sloweniens Wirtschaft zu stärken. Die slowenische Bevölkerung hat den Zehntagekrieg gegen Jugoslawien nicht vergessen und hofft, dass Slowenien nicht wieder zu einer Marionette Serbiens wird. Wird Slowenien seine Unabhängigkeit bewahren oder wird alles wieder so sein wie 1991?"
 CRO_MILLENIUM_DAWN_DESC:0 "Kroatien erlangte seine Unabhängigkeit von Jugoslawien durch einen Krieg, der im Fall des Nachbarn Slowenien nicht zehn Tage, sondern vier Jahre dauerte. Nach dem Krieg und dem Wiederaufbau der Städte boomte Kroatiens Tourismusbranche wieder. Präsident Stjepan Mesić versprach, das Land stärker in die euroatlantische Zone einzubinden und möglicherweise der Europäischen Union und/oder der NATO beizutreten. Kroatien erkennt seine dunkle Vergangenheit als Nazi-Kollaborateur, die von vielen Ländern kritisiert wird, noch immer nicht. Wird Kroatien ein demokratischer Tourismus-Hotspot oder wird der Tourismus aufgrund der Vergangenheit absterben?"
 SER_MILLENIUM_DAWN_DESC:0 "Fast zehn Jahre sind vergangen, seit der Traum von einer vereinten slawischen Nation geplatzt ist. Nach den jüngsten NATO-Angriffen wegen Verbrechen gegen die Menschlichkeit im Kosovo, der ebenfalls nach Unabhängigkeit strebt, ist das serbische Volk entschieden gegen die NATO und unterstützt Russland. Doch ist das die Absicht der Regierung? Jugoslawien befindet sich in einer angespannten Lage und pflegt unfreundliche Beziehungen zu seinen Nachbarn Bosnien, Albanien und Kroatien. Wird Jugoslawien zusammenbleiben oder wird der Traum ein für alle Mal platzen?"
 WAS_MILLENIUM_DAWN_DESC:0 "Seit die maoistischen Kriegsherren des Wa-Staates 1989 ihre Unabhängigkeit erklärten, konnte Wa elf Jahre lang seine faktische Unabhängigkeit bewahren und blieb gleichzeitig de jure ein Gebiet Myanmars. Doch Wa ist weiterhin instabil, da seine Unabhängigkeit ohne chinesische Unterstützung nicht aufrechterhalten werden kann. Wird Wa im 21. Jahrhundert überleben? Wird es Wa gelingen, die maoistischen Ideale aufrechtzuerhalten?"

 ###########################################
 ################## 2008 ###################
 ###########################################

 ECONOMIC_CRISIS_NAME:0 "Wirtschaftskrise"
 ECONOMIC_CRISIS_DESC:0 "In den vergangenen Jahren florierten Investmentbanken, während die Wirtschaft immer mehr den Bezug zur Realität verlor. Wie die 1930er Jahre gezeigt haben, ist es nur eine Frage der Zeit, bis diese Blase platzt und damit die gesamte Wirtschaft zusammenbricht, was eine weltweite Rezession auslösen könnte. Die Aufgabe besteht darin, die Auswirkungen einer solchen Krise abzumildern. Doch wird uns das gelingen?"
 DEN_ECONOMIC_CRISIS_DESC:0 "Dänemark ist als Mitglied der EU und der NATO in einer sicheren Lage. Der interne Wirtschaftsabschwung und die Konjunkturabschwächung stellen den dänischen Staat jedoch in letzter Zeit vor Herausforderungen."
 ENG_ECONOMIC_CRISIS_DESC:0 "Mit der Übergabe Hongkongs an China im Jahr 1997 verlor Großbritannien seinen letzten großen Kolonialbesitz. Die einst mächtigste Nation der Welt versucht verzweifelt, einen neuen Weg zu Größe und Ruhm zu finden. Doch wird dieser Weg in der fortgesetzten Zusammenarbeit mit den Vereinigten Staaten liegen? Sollte Großbritannien seinen europäischen Brüdern näherkommen? Oder wird Britannien wieder allein die Meere beherrschen?"
 ETH_ECONOMIC_CRISIS_DESC:0 "Äthiopiens Monarchie wurde 1974 gestürzt, die darauffolgende kommunistische Diktatur 1991. Die Verfassung von 1995 sorgte zwar für eine einigermaßen stabile Demokratie, konnte jedoch die Probleme Hunger, politische Krisen und Korruption nicht lösen. Auch den anhaltenden Konflikt mit Eritrea konnte sie nicht lösen."
 FIN_ECONOMIC_CRISIS_DESC:0 "Finnland, stets um die Wahrung seiner Neutralität bemüht, hat den Zusammenbruch der Sowjetunion und die darauffolgende politische Expansion der westeuropäischen Mächte aufmerksam verfolgt. Die Finnen traten 1995 der EU bei und stehen kurz davor, den Euro als Landeswährung einzuführen. Kann der Frieden von Dauer sein? Sind die Russen wirklich befriedet?"
 FRA_ECONOMIC_CRISIS_DESC:0 "Frankreich, die Grande Nation der Vergangenheit, versucht, in einer sich ständig verändernden Welt einen neuen Platz zu finden. Mit alten Rivalen und alten Freunden an der Seite, neuen Gegnern und neuen Bedrohungen am Horizont muss Frankreich entscheiden, ob die Zukunft der Wiege der Demokratie Einheit und Frieden oder eine Rückkehr in dunklere Zeiten sein soll."
 GER_ECONOMIC_CRISIS_DESC:0 "Deutschland ist seit fast einem Jahrzehnt wiedervereinigt. Wirtschaftlich stärker denn je, aber mit der Aussicht auf eine Rezession in der Zukunft, muss Deutschland neue Ziele in der Welt finden. Die frisch unabhängigen Staaten Osteuropas befinden sich im Prozess des Beitritts zur Europäischen Union, in der Deutschland maßgeblichen Einfluss hat. Deutschland, obwohl von seiner dunklen Vergangenheit geplagt, blickt einer rosigen Zukunft entgegen."
 ICE_ECONOMIC_CRISIS_DESC:0 "In einer versteckten Ecke Europas hat Island seit seiner Unabhängigkeit 1944 erfolgreich ein eher unauffälliges Land gefunden. Die politischen Konflikte mit den Briten um Fischereirechte waren vielleicht die aufregendste Zeit in der isländischen Geschichte. Sollte Island eine zentralere Position einnehmen?"
 ITA_ECONOMIC_CRISIS_DESC:0 "Italien hinkt seit Beginn des 20. Jahrhunderts den anderen Großmächten immer wieder etwas hinterher. Nach der Niederlage im Zweiten Weltkrieg hat Italien dank seiner starken Bindung an seine ehemaligen Feinde und seinen ehemaligen Verbündeten Deutschland wieder zu einem hoch entwickelten und wohlhabenden Land aufgestiegen. Doch was wird die Zukunft bringen? Nationale Größe oder wirtschaftliches Desaster?"
 JAP_ECONOMIC_CRISIS_DESC:0 "Japan, die zweitgrößte Volkswirtschaft der Welt, ist seit dem Ende des Zweiten Weltkriegs das Zugpferd der ostasiatischen Demokratien. Unterstützt von amerikanischen und europäischen Verbündeten und geschützt durch eine starke Industriebasis, blickt Japan mit neuem Selbstvertrauen und neuem Konfliktpotenzial auf seinen alten Rivalen China."
 NOR_ECONOMIC_CRISIS_DESC:0 "Norwegen stimmte 1995 gegen den Beitritt zur Europäischen Union und blieb seitdem bis zu einem gewissen Grad von Europa fern. Norwegen ist jedoch weiterhin NATO-Mitglied und hat eine kurze, aber wichtige Grenze mit der Russischen Föderation."
 PRC_ECONOMIC_CRISIS_DESC:0 "China, das rückständige Land von gestern, ist die Supermacht von morgen. Seine industrielle Basis ist groß, sein politischer Einfluss wächst, sein Militär modernisiert sich und seine Arbeitskräfte sind nahezu unbegrenzt. China muss nur eines fürchten: Reformiert es zu langsam, könnte es zerstört werden. Reformiert es zu schnell, könnte es sich selbst zerstören."
 RAJ_ECONOMIC_CRISIS_DESC:0 "China ist die Supermacht von morgen, Indien die Supermacht von morgen. Der ständige Kampf gegen Pakistan und China sowie die enge wirtschaftliche Verflechtung mit dem Westen haben Indien eine Nische für Wohlstand verschafft. Mit genügend Zeit wird der Tiger Südasiens stark genug sein, um jeden einzelnen seiner Feinde auszuschalten."
 SOV_ECONOMIC_CRISIS_DESC:0 "Als die Sowjetunion 1991 zusammenbrach, war klar, dass der Weg zurück in die Geschichte für die Russische Föderation nicht leicht werden würde. System und Wirtschaft waren korrupt, das Militär zwar groß, aber veraltet, und die politische Reichweite war geschwächt. Russland musste ein Jahrzehnt lang abseits stehen. Nun strebt es die Rückkehr ins Rampenlicht an."
 RUS_ECONOMIC_CRISIS_DESC:0 "Als die Sowjetunion 1991 zusammenbrach, war klar, dass der Weg zurück in die Geschichte für die Russische Föderation nicht leicht werden würde. System und Wirtschaft waren korrupt, das Militär zwar groß, aber veraltet, und die politische Reichweite war geschwächt. Russland musste ein Jahrzehnt lang abseits stehen. Nun strebt es die Rückkehr ins Rampenlicht an."
 SPR_ECONOMIC_CRISIS_DESC:0 "Seit Francos Tod 1975 befindet sich Spanien auf einem langen Weg der Erholung. Trotz wirtschaftlicher und sozialer Schwierigkeiten gelang es dem Land, die Probleme, die Jahrzehnte des Falangismus verursacht hatten, teilweise zu bewältigen. Spanien trat der NATO (1982) und der EU (1986) bei und arbeitete unermüdlich und unter größter Anstrengung daran, zu den mächtigeren und wohlhabenderen großen europäischen Ländern – Deutschland, Frankreich, Großbritannien und Italien – aufzuschließen. In Zeiten wie diesen braucht Spanien eine starke Führung und eine stabile Hand. Kann Premierminister Aznar liefern? Oder wird seine Partido Popular einer würdigeren Führung Platz machen?"
 SWE_ECONOMIC_CRISIS_DESC:0 "Schweden steckte Anfang der 1990er Jahre in einer schweren Wirtschaftskrise. Auch der EU-Beitritt des Landes 1995 konnte die Lage kaum verbessern. Schweden, das traditionell militärisch neutral bleibt, muss wirtschaftliche Antworten finden."
 SWI_ECONOMIC_CRISIS_DESC:0 "Die Schweiz ist seit jeher neutral und hat sich entschieden, nicht nur der NATO und der Europäischen Union, sondern sogar den Vereinten Nationen fernzubleiben. Kann sich die internationale Gemeinschaft weiterhin darauf verlassen, dass die Schweiz weiterhin als stiller Richter und neutraler Boden fungiert, wie sie es immer war? Oder wird die Schweizer Bevölkerung eine aktivere Rolle ihrer Regierung im Ausland erleben, um den Frieden zu bewahren und die nationalen Interessen der Schweiz durchzusetzen?"
 USA_ECONOMIC_CRISIS_DESC:0 "Die Bürger der Vereinigten Staaten haben im letzten Jahrhundert kaum etwas anderes als Erfolge erlebt. Siege in den Weltkriegen und im Kalten Krieg – die USA haben bisher eine nahezu perfekte Erfolgsbilanz vorzuweisen. Doch was kann Amerika angesichts des wachsenden Chinas am anderen Ende des Ozeans, des Strebens Russlands nach neuer Größe und der immer größer werdenden Bedrohung durch den Terrorismus tun, um seine Vormachtstellung zu bewahren?"
 OTHER_ECONOMIC_CRISIS_DESC:0 "Erster Weltkrieg, Zweiter Weltkrieg, Koreakrieg, Vietnamkrieg, Afghanistankrieg. Die Kriege der Vergangenheit lassen die Nationen der Gegenwart vor der Zukunft fürchten. Dennoch besteht große Hoffnung, dass die Menschheit nach 20 Jahrhunderten des Blutvergießens den Übergang in eine Zeit des Friedens und der Stabilität vollziehen kann."

 ###########################################
 ################## 2013 ###################
 ###########################################

 ECONOMIC_CRISIS_TWO_NAME:0 "Wirtschaftskrise Zwei"
 ECONOMIC_CRISIS_TWO_DESC:0 "In den vergangenen Jahren florierten Investmentbanken, während die Wirtschaft immer mehr den Bezug zur Realität verlor. Wie die 1930er Jahre gezeigt haben, ist es nur eine Frage der Zeit, bis diese Blase platzt und damit die gesamte Wirtschaft zusammenbricht, was eine weltweite Rezession auslösen könnte. Die Aufgabe besteht darin, die Auswirkungen einer solchen Krise abzumildern. Doch wird uns das gelingen?"
 ENG_ECONOMIC_CRISIS_TWO_DESC:0 "Die Europäische Union ist unbeliebter denn je. Die Briten geben den Beamten in Brüssel und der deutschen Regierung in Berlin die Schuld an allem, was in ihrem Land schief läuft. Die Bevölkerung ist in dieser Frage tief gespalten. Großbritannien hat sich zwar gut von der Wirtschaftskrise 2008 erholt, doch ein Austritt aus der Europäischen Union könnte den wirtschaftlichen Fortschritt des letzten Jahrzehnts zunichtemachen. Und selbst dann: Ist nationale Souveränität nicht kleineren wirtschaftlichen Vorteilen vorzuziehen?"
 FRA_ECONOMIC_CRISIS_TWO_DESC:0 "Frankreich leidet unter wirtschaftlichen Schwierigkeiten und den schweren Terroranschlägen in Paris. Die Franzosen entwickeln zunehmend Feindseligkeit gegenüber ihren muslimischen und jüdischen Minderheiten. Der Front National erwägt, in diesen schwierigen Zeiten die Macht zu übernehmen. Werden sich das demokratische Establishment und die europäische Integration Frankreichs durchsetzen? Oder wird Frankreich wie in den guten alten Zeiten auf eigenen Beinen stehen?"
 GER_ECONOMIC_CRISIS_TWO_DESC:0 "Deutschland, das von der Flüchtlingskrise, wirtschaftlichen Schwierigkeiten und wachsendem internen Unmut gegenüber Ländern wie Griechenland, Italien und Spanien betroffen ist, ist weiterhin stark. Die Europäische Union weitet sich immer weiter nach Süden aus. Die europäischen Nachbarn sind zunehmend verärgert über die deutsche Politik. Lohnt es sich, diesen Weg fortzusetzen? Oder ist es vielleicht an der Zeit, alte Grenzkonflikte wieder aufleben zu lassen und die Soldaten wieder marschieren zu lassen?"
 JAP_ECONOMIC_CRISIS_TWO_DESC:0 "Japan sieht sich täglich mit der Möglichkeit eines Krieges konfrontiert, da chinesische Kriegsschiffe aggressiv auf die Senkaku-Inseln vordringen und nordkoreanische Raketen in die Stratosphäre geschossen werden. Artikel 9 der japanischen Verfassung wurde kürzlich geändert, um ein aktiveres japanisches Militär im Ausland zu ermöglichen. Diese militaristische Haltung ist in der Bevölkerung unpopulär, aber möglicherweise notwendig, um die nationale Sicherheit zu wahren."
 ITA_ECONOMIC_CRISIS_TWO_DESC:0 "Kein Land der G7 und der großen Vier Europas wurde von der Wirtschaftskrise 2008 so stark getroffen wie Italien. Die Erholung verläuft langsam, und die staatliche Unterstützung schwindet. Der Zustrom afrikanischer Migranten trägt nicht dazu bei, der Bevölkerung ein Bild innerer Stabilität zu vermitteln. Italien muss seine Optionen überdenken. Sicherlich ist jetzt nicht der richtige Zeitpunkt für eine Wiederbelebung des Imperialismus, aber drastische Reformen werden notwendig sein."
 PRC_ECONOMIC_CRISIS_TWO_DESC:0 "China legt großen Wert darauf, seine Feinde nicht seine Schwächen erkennen zu lassen. Umweltverschmutzung, Binnenmigration, sinkende Standards im Militär, die immer korruptere Führung der Kommunistischen Partei. Und doch ist China der Riese des Ostens, den alle kleinen Länder fürchten. Japan, Südkorea, die Rebellen in Taiwan, Vietnam – sie alle vereint ihr Hass auf China. Es ist Zeit für China, eine sinnvolle Antwort zu finden."
 RAJ_ECONOMIC_CRISIS_TWO_DESC:0 "Indiens Wirtschaft wächst rasant, ebenso wie seine Bevölkerung. Der Tiger steht zwar noch nicht im Rampenlicht der internationalen Öffentlichkeit, ist aber wohlgenährt und knurrt. Indien ist auf der Jagd, und seine Beute ist arglos."
 SPR_ECONOMIC_CRISIS_TWO_DESC:0 "Wie andere südeuropäische Länder stürzte auch Spanien 2008 in eine Wirtschaftskrise und benötigte Konjunkturhilfen aus den nordeuropäischen Ländern. Podemos und Ciudadanos brachten neuen Populismus und neue Unsicherheit in das alte politische System, während die katalanischen Unabhängigkeitsbewegungen die spanische Einheit stärker bedrohen als je zuvor. Der wirtschaftliche Aufschwung wird ein langer und steiniger Weg sein – wird Spanien an Europa festhalten und sich an die Abkommen halten, die eine unmittelbare Katastrophe verhindern – oder sieht die Zukunft Spaniens anders aus als die Nordeuropas?"
 SOV_ECONOMIC_CRISIS_TWO_DESC:0 "Rauswurf aus der G8, massive Wirtschaftssanktionen, der Kampf um die Aufrechterhaltung des eigenen Einflussbereichs, aber immerhin wieder mit den Krim-Brüdern vereint. So lässt sich die Lage der Russischen Föderation seit März 2014 zusammenfassen. Da der Westen Russland nun stark feindselig gegenübersteht, muss sich Russland entweder entschuldigen und auf sein international anerkanntes Territorium zurückziehen oder neue Verbündete finden. Peking kommt einem da in den Sinn."
 RUS_ECONOMIC_CRISIS_TWO_DESC:0 "Rauswurf aus der G8, massive Wirtschaftssanktionen, der Kampf um die Aufrechterhaltung des eigenen Einflussbereichs, aber immerhin wieder mit den Krim-Brüdern vereint. So lässt sich die Lage der Russischen Föderation seit März 2014 zusammenfassen. Da der Westen Russland nun stark feindselig gegenübersteht, muss sich Russland entweder entschuldigen und auf sein international anerkanntes Territorium zurückziehen oder neue Verbündete finden. Peking kommt einem da in den Sinn."
 USA_ECONOMIC_CRISIS_TWO_DESC:0 "Innerlich gespaltener denn je, extern stärker herausgefordert als jemals zuvor seit dem Ende des Kalten Krieges. Die Vereinigten Staaten erleben ganz sicher kein goldenes Zeitalter. Die Menschen sind misstrauisch gegenüber chinesischer Aggression, industriellen Problemen und wirtschaftlichen Schwierigkeiten, und die öffentliche Unterstützung für amerikanische Militärbündnisse schwindet. Der nächste Präsident der Vereinigten Staaten wird neu definieren müssen, was es bedeutet, die größte Nation der Welt zu sein, das Land der Freien und die Heimat der Tapferen."
 FRG_ECONOMIC_CRISIS_TWO_DESC:0 "Deutschland, das von der Flüchtlingskrise, wirtschaftlichen Schwierigkeiten und wachsendem internen Unmut gegenüber Ländern wie Griechenland, Italien und Spanien betroffen ist, ist weiterhin stark. Die Europäische Union weitet sich immer weiter nach Süden aus. Die europäischen Nachbarn sind zunehmend verärgert über die deutsche Politik. Lohnt es sich, diesen Weg fortzusetzen? Oder ist es vielleicht an der Zeit, alte Grenzkonflikte wieder aufleben zu lassen und die Soldaten wieder marschieren zu lassen?"
 SOJ_ECONOMIC_CRISIS_TWO_DESC:0 "Japan sieht sich täglich mit der Möglichkeit eines Krieges konfrontiert, da chinesische Kriegsschiffe aggressiv auf die Senkaku-Inseln vordringen und nordkoreanische Raketen in die Stratosphäre geschossen werden. Artikel 9 der japanischen Verfassung wurde kürzlich geändert, um ein aktiveres japanisches Militär im Ausland zu ermöglichen. Diese militaristische Haltung ist in der Bevölkerung unpopulär, aber möglicherweise notwendig, um die nationale Sicherheit zu wahren."
 OTHER_ECONOMIC_CRISIS_TWO_DESC:0 "Die Krim, der Islamische Staat, nordkoreanische Atomwaffen. Angesichts der immer stärker werdenden Konflikte müssen die kleineren Nationen der Welt einen Weg finden, entweder den Frieden zu bewahren oder ihre Feinde so schnell wie möglich zu vernichten."

 ###########################################
 ################## 2016 ###################
 ###########################################

 MODERN_DAY_NAME:0 "Ruhe vor dem Sturm"
 MODERN_DAY_DESC:0 "China beansprucht Hoheitsgewässer an seinen Küsten, Russland marschiert auf der Krim ein und der Terroranschlag des Islamischen Staats (IS) ruft sein Kalifat aus – bleibt die Welt so, wie sie ist? Großbritannien stößt auf Widerwillen, die europäische Integration fortzusetzen. Die jüngsten Terroranschläge haben die nationalen Prinzipien Frankreichs in ihrer Gesamtheit erschüttert. Flüchtlinge suchen Schutz vor Kriegen und Unruhen in Syrien und Libyen. Die nächste Präsidentschaftswahl in den USA könnte die entscheidende seit 1940 sein. Die Welt verändert sich weiter."
 ENG_MODERN_DAY_DESC:0 "Die Europäische Union ist unbeliebter denn je. Die Briten geben den Beamten in Brüssel und der deutschen Regierung in Berlin die Schuld an allem, was in ihrem Land schief läuft. Die Bevölkerung ist in dieser Frage tief gespalten. Großbritannien hat sich zwar gut von der Wirtschaftskrise 2008 erholt, doch ein Austritt aus der Europäischen Union könnte den wirtschaftlichen Fortschritt des letzten Jahrzehnts zunichtemachen. Und selbst dann: Ist nationale Souveränität nicht kleineren wirtschaftlichen Vorteilen vorzuziehen?"
 FRA_MODERN_DAY_DESC:0 "Frankreich leidet unter wirtschaftlichen Schwierigkeiten und den schweren Terroranschlägen in Paris. Die Franzosen entwickeln zunehmend Feindseligkeit gegenüber ihren muslimischen und jüdischen Minderheiten. Der Front National erwägt, in diesen schwierigen Zeiten die Macht zu übernehmen. Werden sich das demokratische Establishment und die europäische Integration Frankreichs durchsetzen? Oder wird Frankreich wie in den guten alten Zeiten auf eigenen Beinen stehen?"
 GER_MODERN_DAY_DESC:0 "Deutschland, das von der Flüchtlingskrise, wirtschaftlichen Schwierigkeiten und wachsendem internen Unmut gegenüber Ländern wie Griechenland, Italien und Spanien betroffen ist, ist weiterhin stark. Die Europäische Union weitet sich immer weiter nach Süden aus. Die europäischen Nachbarn sind zunehmend verärgert über die deutsche Politik. Lohnt es sich, diesen Weg fortzusetzen? Oder ist es vielleicht an der Zeit, alte Grenzkonflikte wieder aufleben zu lassen und die Soldaten wieder marschieren zu lassen?"
 JAP_MODERN_DAY_DESC:0 "Japan sieht sich täglich mit der Möglichkeit eines Krieges konfrontiert, da chinesische Kriegsschiffe aggressiv auf die Senkaku-Inseln vordringen und nordkoreanische Raketen in die Stratosphäre geschossen werden. Artikel 9 der japanischen Verfassung wurde kürzlich geändert, um ein aktiveres japanisches Militär im Ausland zu ermöglichen. Diese militaristische Haltung ist in der Bevölkerung unpopulär, aber möglicherweise notwendig, um die nationale Sicherheit zu wahren."
 ITA_MODERN_DAY_DESC:0 "Kein Land der G7 und der großen Vier Europas wurde von der Wirtschaftskrise 2008 so stark getroffen wie Italien. Die Erholung verläuft langsam, und die staatliche Unterstützung schwindet. Der Zustrom afrikanischer Migranten trägt nicht dazu bei, der Bevölkerung ein Bild innerer Stabilität zu vermitteln. Italien muss seine Optionen überdenken. Sicherlich ist jetzt nicht der richtige Zeitpunkt für eine Wiederbelebung des Imperialismus, aber drastische Reformen werden notwendig sein."
 PRC_MODERN_DAY_DESC:0 "China legt großen Wert darauf, seine Feinde nicht seine Schwächen erkennen zu lassen. Umweltverschmutzung, Binnenmigration, sinkende Standards im Militär, die immer korruptere Führung der Kommunistischen Partei. Und doch ist China der Riese des Ostens, den alle kleinen Länder fürchten. Japan, Südkorea, die Rebellen in Taiwan, Vietnam – sie alle vereint ihr Hass auf China. Es ist Zeit für China, eine sinnvolle Antwort zu finden."
 RAJ_MODERN_DAY_DESC:0 "Indiens Wirtschaft wächst rasant, ebenso wie seine Bevölkerung. Der Tiger steht zwar noch nicht im Rampenlicht der internationalen Öffentlichkeit, ist aber wohlgenährt und knurrt. Indien ist auf der Jagd, und seine Beute ist arglos."
 IND_MODERN_DAY_DESC:0 "Indiens Wirtschaft wächst rasant, ebenso wie seine Bevölkerung. Der Tiger steht zwar noch nicht im Rampenlicht der internationalen Öffentlichkeit, ist aber wohlgenährt und knurrt. Indien ist auf der Jagd, und seine Beute ist arglos."
 SPR_MODERN_DAY_DESC:0 "Wie andere südeuropäische Länder stürzte auch Spanien 2008 in eine Wirtschaftskrise und benötigte Konjunkturhilfen aus den nordeuropäischen Ländern. Podemos und Ciudadanos brachten neuen Populismus und neue Unsicherheit in das alte politische System, während die katalanischen Unabhängigkeitsbewegungen die spanische Einheit stärker bedrohen als je zuvor. Der wirtschaftliche Aufschwung wird ein langer und steiniger Weg sein – wird Spanien an Europa festhalten und sich an die Abkommen halten, die eine unmittelbare Katastrophe verhindern – oder sieht die Zukunft Spaniens anders aus als die Nordeuropas?"
 SOV_MODERN_DAY_DESC:0 "Rauswurf aus der G8, massive Wirtschaftssanktionen, der Kampf um die Aufrechterhaltung des eigenen Einflussbereichs, aber immerhin wieder mit den Krim-Brüdern vereint. So lässt sich die Lage der Russischen Föderation seit März 2014 zusammenfassen. Da der Westen Russland nun stark feindselig gegenübersteht, muss sich Russland entweder entschuldigen und auf sein international anerkanntes Territorium zurückziehen oder neue Verbündete finden. Peking kommt einem da in den Sinn."
