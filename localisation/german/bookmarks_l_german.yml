 BEL_RUSSO_JAPANESE_DESC:0 "Unter dem Schutz der Briten und den Augen der Deutschen als Hintertür nach Paris, die die Konzentration des befestigten französischen Militärs entlang der deutsch-französischen Grenze umgeht, befindet sich das Königreich Belgien in einer schwierigen Lage.\n\nKönig Albert I. wird vor einer schwierigen Entscheidung stehen: Entweder er stellt sich gegen Kaiser Wilhelm II. und steht Seite an Seite mit der Entente, oder er lässt die deutschen Truppen in sein Gebiet eindringen und schlägt einen anderen Kurs ein."
 HOL_RUSSO_JAPANESE_DESC:0 "Seit der Zweiten Haager Konferenz im Jahr 1907 tun die Niederlande alles, um ein politisches Bündnis mit einem anderen europäischen Reich zu vermeiden.\n\nWährend die Kriegstrommeln vor den Toren Amsterdams erklingen und trotz ihrer strengen Neutralitätspolitik, könnte das friedliche Mühlenland bald mit dem Rücken zur Wand stehen und eine Entscheidung treffen müssen, die die Zukunft des niederländischen Reiches für immer verändern könnte.\n\nNiemand weiß, wie die äußerst patriotische Königin Wilhelmina reagieren wird …"
 OTHER_RUSSO_JAPANESE_DESC:0 "Die Nationen der Welt, ob groß oder klein, werden von diesem Konflikt betroffen sein, der sich über mehrere Kontinente erstreckt."
 
 ###########################################
 ################## 1910 ###################
 ###########################################

 BALKAN_POWDER_KEG_NAME:0 "Das Pulverfass Balkan"
 BALKAN_POWDER_KEG_DESC:0 "Obwohl seit der Wiener Konferenz ständig über neue Krisen gestritten wird, konnte auf dem europäischen Kontinent fast hundert Jahre lang ein größerer Krieg vermieden werden. Doch in den letzten Jahrzehnten haben die Spannungen auf dem Balkan zugenommen, da verschiedene Imperien versuchen, ihre Vorherrschaft in der Region zu sichern. Ein kleiner Funke genügt, um das Pulverfass Balkan zur Explosion zu bringen."
 GER_BALKAN_POWDER_KEG_DESC:0 "Das Deutsche Reich wurde 1871 in Versailles mit Blut und Eisen gegründet, nachdem Frankreich ein Jahr zuvor besiegt worden war. Doch mit dem Aufstieg Wilhelms II., der Bismarck entlassen hatte, und seinen Bemühungen, den Status quo aufrechtzuerhalten, sah sich Deutschland bald potenziellen Feinden an zwei Fronten gegenüber. Diese Tatsache dürfte dem deutschen Militär im Jahr 1914 nicht ferngeblieben sein: Generalstabschef von Moltke drückte es so aus: „Der Krieg ist unvermeidlich, und je früher, desto besser.“ Die Zeit läuft ab. Kann Deutschland seinen Platz an der Sonne und seine Vorherrschaft in der Welt noch erreichen?"
 AUH_BALKAN_POWDER_KEG_DESC:0 "Die Doppelmonarchie entstand 1867 aus einem Kompromiss zwischen Kaiser Franz Josef und dem ungarischen Adel. Das Flickenteppichreich bestand aus elf großen ethnischen Gruppen. Das Reich hatte seinen Mittelpunkt in der Hauptstadt Wien und wurde maßgeblich durch die Charakterstärke Kaiser Franz Josefs zusammengehalten. Um den russischen Einfluss auf dem Balkan einzuschränken, schloss sich Österreich-Ungarn 1879 mit Deutschland und 1882 mit Italien zum Dreibund zusammen. Da Deutschland jedoch die dominierende Partei im Bündnis war, wurden die außenpolitischen Wünsche Österreich-Ungarns den Wünschen seines älteren Partners untergeordnet. Die Herrscher Österreich-Ungarns."
 OTT_BALKAN_POWDER_KEG_DESC:0 "Im 18. Jahrhundert schrumpfte das Osmanische Reich, seine Macht erodierte durch den Verlust innerer Autorität und die expansionistischen Ambitionen der europäischen Mächte. Im 19. und frühen 20. Jahrhundert gab es Reformversuche, darunter die Schaffung einer Exekutive und einer zentralisierten Regierung. Gleichzeitig erlebte das Osmanische Reich jedoch auch einen erheblichen territorialen Niedergang. Gleichzeitig war die türkische Regierung kaum in der Lage, eigene Steuern einzutreiben, und die Kommunikations- und Infrastruktur des Reiches blieben dürftig, was die Türkei oft als „kranken Mann Europas“ bezeichnete. Kann sich das Osmanische Reich modernisieren und überleben oder wird es in die Vergangenheit zurückfallen, in die es nach Ansicht vieler gehört?"
 RUS_BALKAN_POWDER_KEG_DESC:0 "Russlands Blick richtet sich auf den Balkan und Konstantinopel, das den lebenswichtigen Seeweg zur Außenwelt kontrolliert. Um dieses Ziel zu erreichen, verfügt Russland über die größte Armee der Welt und eine sich rasch modernisierende Industriebasis. Trotz aller Stärke leidet Russland jedoch unter gefährlichen Schwächen und schweren Unruhen in der Bevölkerung. Einige Mitglieder des Zarenrats raten, ein „kurzer, siegreicher Krieg“ könne das Volk mobilisieren und von seinen Sorgen ablenken. Doch könnte die Herrschaft des Zaren die Folgen überstehen, wenn der Krieg für Russland schlecht ausginge?"
 ENG_BALKAN_POWDER_KEG_DESC:0 "Um die Jahrhundertwende schien alles gut für das Britische Empire – es umfasste zwei Fünftel der Erdoberfläche, beherbergte ein Viertel der Weltbevölkerung, wurde von der professionellsten Armee der Welt überwacht und von der mächtigsten Flotte aller Zeiten bewacht. Doch hinter den Beteuerungen imperialer Größe verbarg sich Unsicherheit über die Zukunft: Wirtschaftlich und industriell waren die USA den Briten überlegen, und die Deutschen hatten ein ominöses Flottenbauprogramm gestartet, um der Royal Navy die Vorherrschaft auf den Meeren streitig zu machen."
 FRA_BALKAN_POWDER_KEG_DESC:0 "Frankreich, einst die größte Macht Europas, ist heute ein Land in Schwierigkeiten. Wirtschaftlich wurde es von vielen seiner Rivalen überholt. Eine sinkende Geburtenrate verspricht einen weiteren Rückgang und könnte sich in einem Zeitalter der Massenarmeen als fatale Schwäche erweisen. Politisch ist die Dritte Republik instabil. Auf der internationalen Bühne schwären die Niederlage gegen Preußen 1871 und die deutsche Besetzung der Provinzen Elsass und Lothringen wie ein schwärendes Geschwür, und die Forderungen nach „Revanche“ – Rache – an Deutschland bleiben laut."
 USA_BALKAN_POWDER_KEG_DESC:0 "Seit ihrer Unabhängigkeit von Großbritannien im Jahr 1783 haben sich die Vereinigten Staaten und ihre Bevölkerung nach der Verkündung der Monroe-Doktrin im Jahr 1823 vor allem mit ihrem eigenen Kontinent und in geringerem Maße mit Mittel- und Südamerika beschäftigt. Nach der Niederlage Spaniens im Spanisch-Amerikanischen Krieg haben sich die Vereinigten Staaten zu einer Weltmacht entwickelt, gelten jedoch mit ihrer sehr kleinen Armee noch immer nicht als „Großmacht“ im europäischen Sinne, obwohl sie über ein enormes Potenzial dazu verfügen. Dieses Potenzial ergibt sich aus der Bevölkerung und der enormen Wirtschaft, die größer ist als die von Großbritannien, Frankreich, Russland und Deutschland zusammen."
 ITA_BALKAN_POWDER_KEG_DESC:0 "Italien ist das kleinste Drittel des Dreibunds, einem Bündnis, dem es wenig Vertrauen entgegenbringt. Österreich-Ungarn, Italiens natürlicher Rivale, ist zwar ein Freund in der Welt der Verträge, aber immer noch ein Rivale in praktischer Hinsicht. Schließlich erklärt der italienische Irredentismus die von Österreich gehaltene dalmatinische Küste immer noch zu Italien. Im Moment gibt es jedoch dringlichere Angelegenheiten. \n\nKriegspläne mit den Osmanen werden bereits ausgearbeitet. Die Regierung sagt einen kurzen, entscheidenden Krieg voraus. Italien soll seine Macht beweisen."
 SER_BALKAN_POWDER_KEG_DESC:0 "Serbien wird von Außenstehenden als rückständige, unbedeutende Nation betrachtet. Nichts weiter als eine Schachfigur in einem großen Spiel, das die Weltreiche gegeneinander ausspielen. Natürlich könnten die Weltreiche schneller als gedacht lernen, dass den Serben Größeres bestimmt ist. \n\nDerzeit leben die meisten Serben außerhalb unserer Grenzen, auf türkischem oder österreichischem Gebiet. Sollten wir einen Pakt mit dem Teufel – den Bulgaren – schließen, könnten die Serben ihren Weg zum Ruhm mit der vollständigen serbischen Vereinigung beginnen."
 BUL_BALKAN_POWDER_KEG_DESC:0 "Bulgarien hat sich bereits durch erfolgreiche Kämpfe gegen die Serben und die Ausmanövrierung des Osmanischen Reiches zur Vereinigung mit Ostrumelien einen Namen gemacht. Natürlich befindet sich das Land nun in einer schwierigeren Lage. Die Türken scheinen nicht bereit zu sein, weiteres bulgarisches Territorium herzugeben, und die Russen ziehen langsam ihre Unterstützung zurück. \n\nVielleicht ist es noch nicht zu spät, die Beziehungen zu Serbien zu verbessern? Schließlich könnte ein Bulgarien mit starken Freunden eine überraschende Bedrohung darstellen."
 MEX_BALKAN_POWDER_KEG_DESC:0 "Das Mexiko des Jahres 1910 ist wahrlich ein seltsamer Fall. Das Porfiriato war seit 1876 ein großer Segen für Mexiko, doch nun, da der Druck zunimmt, scheint Präsident Diaz&#39; Amtszeit begrenzt zu sein. Die Regierung sieht dies natürlich als Handgreiflichkeit. \n\nFrancisco Madero plant aktiv und offensichtlich gegen die Diaz-Regierung. Wenn er ehrgeizig genug ist, könnte er Mexiko noch in der eigenen Tasche haben."
 JAP_BALKAN_POWDER_KEG_DESC:0 "In knapp 50 Jahren hat sich Japan von einem rückständigen Despotat unter der Herrschaft eines Shoguns zu einem modernen Kaiserreich entwickelt, das jedem europäischen Land in nichts nachsteht. Kaiser Meiji ist dafür verantwortlich, doch leider ist er alt und krank – und hat nicht mehr lange zu leben. \n\nBevor Kronprinz Yoshihito die Krone übernimmt, müssen jedoch noch einige Fragen geklärt werden. Der betagte Kaiser muss entscheiden, wie Japan zu Russland steht und was mit dem koreanischen Vasallen geschehen soll."
 SPA_IBERIAN_TINDERBOX_DESC:0 "Spanien ist eine gespaltene und in Aufruhr befindliche Nation. Das 19. Jahrhundert sah den Verlust großer Teile des spanischen Reiches, die verheerenden Karlistenkriege und tiefe Gräben zwischen Konservativen und Liberalen. Die Monarchie, fragil und von Fraktionskämpfen zerfressen, kämpft um ihre Legitimität, während in Katalonien und dem Baskenland der regionale Nationalismus erstarkt. \n\nDie Zweite Spanische Republik steht am Rande des Zusammenbruchs. Ideologische Spannungen zwischen Anarchisten, Kommunisten und Faschisten drohen einen Bürgerkrieg auszulösen. Spanien steht an einem Scheideweg, seine Zukunft hängt am seidenen Faden."
 BEL_BALKAN_POWDER_KEG_DESC:0 "Unter dem Schutz der Briten und den Augen der Deutschen als Hintertür nach Paris, die die Konzentration des befestigten französischen Militärs entlang der deutsch-französischen Grenze umgeht, befindet sich das Königreich Belgien in einer schwierigen Lage.\n\nKönig Albert I. wird vor einer schwierigen Entscheidung stehen: Entweder er stellt sich gegen Kaiser Wilhelm II. und steht Seite an Seite mit der Entente, oder er lässt die deutschen Truppen in sein Gebiet eindringen und schlägt einen anderen Kurs ein."
 HOL_BALKAN_POWDER_KEG_DESC:0 "Seit der Zweiten Haager Konferenz im Jahr 1907 tun die Niederlande alles, um ein politisches Bündnis mit einem anderen europäischen Reich zu vermeiden.\n\nWährend die Kriegstrommeln vor den Toren Amsterdams erklingen und trotz ihrer strengen Neutralitätspolitik, könnte das friedliche Mühlenland bald mit dem Rücken zur Wand stehen und eine Entscheidung treffen müssen, die die Zukunft des niederländischen Reiches für immer verändern könnte.\n\nNiemand weiß, wie die äußerst patriotische Königin Wilhelmina reagieren wird …"
 GRE_BALKAN_POWDER_KEG_DESC:0 "Die letzten Jahrzehnte waren für Griechenland ziemlich hart. Der Bankrott von 1893, der verlorene griechisch-türkische Krieg von 1897 mit der auferlegten internationalen Finanzkontrolle und der Goudi-Putsch von 1909 haben Griechenland in eine desolate Lage gebracht. Es ist Zeit für Reformen in allen Bereichen, insbesondere angesichts des drohenden Krieges gegen den kranken Mann Europas, die Osmanen. \n\nEs ist Zeit, dieses Land von den Fehlern der Vergangenheit zu befreien und es zu stabilisieren. Vielleicht gelingt es uns dabei, unsere seit 1453 verlorene Hauptstadt zurückzuerobern."
 QIN_BALKAN_POWDER_KEG_DESC:0 "Die Qing-Dynastie steht kurz vor dem Zusammenbruch. Das 19. Jahrhundert brachte verheerende Niederlagen in den Opiumkriegen, den Aufstand im Süden und zahlreiche gescheiterte Reformen mit sich. Nach dem Tod der alten Kaiserinwitwe und des Guangxu-Kaisers ist der vierjährige Xuantong-Kaiser nicht mehr in der Lage, das Land zu regieren, und hinterlässt nur Regenten. \n\nDie Opposition wächst rapide, und da der Boxeraufstand vielen noch in lebendiger Erinnerung ist, ist unklar, was aus der Nation werden wird."
 AST_BALKAN_POWDER_KEG_DESC: "Gold rushes and agricultural industries brought prosperity. Autonomous parliamentary democracies began to be established throughout the six British colonies from the mid-19th century. The colonies voted by referendum to unite in a federation in 1901, and modern Australia came into being.\n\nCatastrophic droughts plagued some regions in the late 1890s and early 20th century and together with a growing rabbit plague, created great hardship in rural Australia."
 CAN_BALKAN_POWDER_KEG_DESC:0 "Kanada war seit seiner Gründung ein loyaler Untertan und Freund der britischen Krone. In solch turbulenten Zeiten muss Kanada versuchen, der Krone und ihrem riesigen Empire zu helfen. Obwohl Kanada groß ist und über enorme Ressourcen und fruchtbares Land verfügt, hat es eine angeschlagene Wirtschaft und eine schwache Armee. Kanada könnte in Zeiten großer Schwierigkeiten der perfekte Verbündete sein..../n/n/n Aber Kanada könnte eine neue Bestimmung finden und ein Ort für Kanadier werden. Dieses junge Land ist mächtiger, als es scheint!"
 BRA_BALKAN_POWDER_KEG_DESC:0 "Die Republik der Vereinigten Staaten von Brasilien wurde am 15. November 1889 nach der Absetzung von Kaiser Dom Pedro II. gegründet. Seitdem wurde Brasilien von Militärs und Oligarchen regiert. \n\nDie Wahlen waren gefälscht, aber die Vertretung war wahr... Die Wahlen zählten nicht, aber die Abgeordneten und Senatoren waren das Beste, was Brasilien haben konnte!"
 KOR_BALKAN_POWDER_KEG_DESC:0 "Korea, das Land der Morgenstille, war ein vormodernes Königreich, das seine Politik der Isolation verfolgte. Die unvorbereitete, von den Japanern erzwungene Öffnung des Hafens führte jedoch dazu, dass Korea von externen Mächten behindert und beeinflusst wurde, die versuchten, Korea in allen Prozessen zu dominieren. Am Ende siegte der unfreundliche Nachbar Japan, der Korea ohne Einmischung seiner diplomatischen Rechte beraubte und die Armee auflöste. Nun bleibt nur noch die Annexion durch Japan. Doch die Koreaner brennen vor Widerstand bis zum Ende."
 SWE_BALKAN_POWDER_KEG_DESC:0 "Schweden stehen schwierige Zeiten bevor. Der Generalstreik von 1909, obwohl ein Fehlschlag, erschütterte die Nation und löste Klassenkonflikte aus. Es sieht so aus, als würden die Liberalen die bevorstehenden Wahlen gewinnen, was nichts Gutes verheißt für die ländlichen Gebiete des Landes, in denen sie äußerst unbeliebt sind. \n\nDann kommt der bevorstehende Sturm – Schweden flirtet sowohl mit den Deutschen als auch mit den Entente-Mächten. Wird sich die unentschlossene Regierung endlich für eine Seite entscheiden oder wird sie den Konflikt ausnutzen, um Ressourcen an beide Seiten zu verkaufen?"
 LIB_BALKAN_POWDER_KEG_DESC:0 "Liberia, Land der Freiheit! Naja, nicht wirklich. Die True Whig Party regiert praktisch ohne Gegenkandidaten, eine aristokratische Diktatur, die eher an die oligarchische Konföderation des amerikanischen Bürgerkriegs erinnert als an die demokratische Bastion der USA. Die herrschende afroamerikanische Klasse hat tiefe Konflikte mit der einheimischen Bevölkerung und kämpft darum, das Hinterland zu befrieden. Sie ist gezwungen, mit den britischen und französischen Imperialisten zu kollaborieren. 75 % der Wirtschaft hängen vollständig vom Deutschen Reich ab, und angesichts der aktuellen Lage in Europa verheißt dies nichts Gutes für die Zukunft..."
 KUW_BALKAN_POWDER_KEG_DESC:0 "Watani Al Kuwait Lka Al Majdu! Inded Kuwait, Ruhm sei dir. Kuwait kontrolliert die Perlenindustrie und den Perlenhandel im Persischen oder Persischen Golf – es hängt hauptsächlich davon ab, wo man sich befindet, es sei denn, man gehört zu den Osmanen und Basraiern, die ihn den Basra-Golf nennen. Die königliche Familie von Kuwait, Al Sabah, regiert dieses Land seit 1752, als Sabah I. bin Jabir aufgrund seiner weisen Taten einstimmig zum Scheich von Kuwait gewählt wurde. Kuwait steht derzeit unter osmanischer Obhut und britischem Schutz, ähnlich wie Ägypten."
 OMA_BALKAN_POWDER_KEG_DESC:0 "Das Sultanat Maskat und Oman befand sich in einer komplexen historischen Situation, die von politischer Instabilität und äußerem Druck geprägt war. Als relativ traditionelles Sultanat war es von internen Spaltungen und Stammesrivalitäten geprägt. Zu dieser Zeit hatte das Sultanat Maskat und Oman auch mit dem Vordringen ausländischer Mächte zu kämpfen, insbesondere des Britischen Empires, das aus strategischen Gründen seinen Einfluss in der Region ausweiten wollte. Dieser äußere Druck, kombiniert mit inneren Konflikten, prägte die historische Entwicklung des Sultanats Maskat und Oman im Laufe des Jahrzehnts."
 OTHER_BALKAN_POWDER_KEG_DESC:0 "Die Nationen der Welt, ob groß oder klein, werden von diesem Konflikt betroffen sein, der sich über mehrere Kontinente erstreckt."
 
 ###########################################
 ################## 1914 ###################
 ###########################################
 
 THE_GREAT_WAR_NAME:0 "Der Große Krieg"
 THE_GREAT_WAR_DESC:0 "Zum ersten Mal seit hundert Jahren braut sich in Europa ein Konflikt zusammen, der mehr Menschenleben fordern wird als je zuvor in der Geschichte und ungewöhnlich lange dauern wird. Zum ersten Mal in der Geschichte werden Mensch und Maschine zusammenwirken und Dutzende neuer Methoden zum Töten und Zerstören erfinden. Dies ist der Große Krieg."
