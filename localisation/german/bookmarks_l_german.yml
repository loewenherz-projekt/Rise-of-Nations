 ################## 1905 ###################
 ###########################################

 RUSSO_JAPANESE_NAME:0 "Russisch-Japanischer Krieg"
 RUSSO_JAPANESE_DESC:0 "Der Russisch-Japanische Krieg wurde in den Jahren 1904 und 1905 zwischen dem Russischen Reich und dem Japanischen Kaiserreich um rivalisierende imperiale Ambitionen in der Mandschurei und Korea geführt. Die wichtigsten Kriegsschauplätze waren die Halbinsel Liaodong und Mukden in der Südmandschurei sowie die Meere um Korea, Japan und das Gelbe Meer. Russland suchte für seine Marine und den Seehandel einen Warmwasserhafen am Pazifik. Wladiwostok war nur im Sommer einsatzbereit, während Port Arthur, ein Marinestützpunkt in der Provinz Liaodong, der von der chinesischen Qing-Dynastie an Russland verpachtet worden war, das ganze Jahr über in Betrieb war. Seit dem Ende des Ersten Japanisch-Chinesischen Krieges 1895 fürchtete Japan russische Eingriffe in seine Pläne, in Korea und der Mandschurei eine Einflusssphäre zu schaffen. Russland hatte seit der Herrschaft Iwans des Schrecklichen im 16. Jahrhundert eine expansionistische Politik im sibirischen Fernen Osten verfolgt. Japan betrachtete Russland als Rivalen und bot an, die russische Vorherrschaft in der Mandschurei anzuerkennen, wenn es im Gegenzug Korea als Teil seiner Einflusssphäre anerkannte. Russland lehnte ab und forderte, dass Korea nördlich des 39. Breitengrades eine neutrale Pufferzone zwischen Russland und Japan bilden sollte. Die japanische Regierung sah ihre Expansionspläne nach Asien durch Russland bedroht und entschied sich für den Krieg."
