 ITA_THE_GREAT_WAR_DESC:0 "Vor 22 Jahren schloss sich Italien halbherzig dem Dreibund mit Deutschland und den verhassten Österreichern an, um Frankreichs Erfolge in Tunesien zu kompensieren. Heute ist dieser Bund der wackeligste in Europa. Mit seinem alten Bündnis hätte Italien die Chance, Savoyen, Nizza, Korsika und Tunesien für sich zu gewinnen. Die Entente hingegen würde die dalmatinische Küste abtreten – und scheint dazu deutlich besser in der Lage zu sein. \n\nItalien hat vor dem Krieg noch Zeit, eine Entscheidung zu treffen. Doch auf welcher Seite liegt sein Schicksal?"
 SER_THE_GREAT_WAR_DESC:0 "Die Balkankriege waren ein großer Erfolg für Serbien und seinen wichtigsten Verbündeten Griechenland. Doch der schwierige Teil hat gerade erst begonnen: Die Habsburger halten noch immer die Region Bosnien und andere südslawische Gebiete. Schlimmer noch: Sie betrachten Serbien als Unruhestifter und würden die Welt nur zu gerne von diesem Staat befreien. \n\nGlücklicherweise scheint Russland Gefallen an Serbien gefunden zu haben, wenn auch vielleicht aus böswilligen Gründen. Wenn Zar Peter dies ausnutzt, könnte sich die Welt für immer verändern ..."
 BUL_THE_GREAT_WAR_DESC:0 "Bulgarien hat sich geirrt, als es darauf vertraute, dass sich Griechen und Rumänen aus dem unvermeidlichen Konflikt mit Serbien heraushalten würden. Die bulgarische territoriale Ausdehnung ist auf den niedrigsten Stand seit der Unabhängigkeit vom Osmanischen Reich gesunken. Es ist unwahrscheinlich, dass sich Bulgarien noch einmal täuschen lässt. Russland scheint der nächste falsche Freund zu sein, der nur auf Staatsgewinne aus ist. \n\nDie einzigen Länder, denen Bulgariens Wohl wirklich am Herzen zu liegen scheint, sind Deutschland und Österreich. Vielleicht ist es Zeit für ein neues Bündnis?"
 MEX_THE_GREAT_WAR_DESC:0 "Während Maderos Sieg in der ersten Phase des mexikanischen Bürgerkriegs zunächst das Ende zu sein schien, wurde er 1913 abgesetzt, getötet und durch einen seiner ehemaligen Generäle, Victoriano Huerta, ersetzt. Huerta ist weder beliebt noch besonders kompetent, und nur wenige glauben, dass er lange die Führung der Nation übernehmen wird. \n\nDennoch herrscht in der mexikanischen Bevölkerung keine Einigkeit darüber, wer der nächste Anführer sein soll. Einige unterstützen so extreme Ziele wie den Kommunismus oder die Militärdiktatur. Wird der Bürgerkrieg sein hässliches Haupt erheben?"
 JAP_THE_GREAT_WAR_DESC:0 "Leider stellt sich heraus, dass Kaiser Taisho mit psychischen Leiden geschlagen ist, die seine Herrschaftsfähigkeit stark beeinträchtigen. Zum Glück für Japan haben seine Minister und andere Mitglieder des kaiserlichen Hofes begonnen, Japan zu verwalten, dessen Bevölkerung nun erstmals Freiheit genießt. \n\nAber wie steht es mit dem Krieg in Europa? Wäre es für Japan von Vorteil, sich einzumischen? Schließlich ist das britisch-japanische Bündnis bestenfalls brüchig, und Japan wäre vielleicht besser beraten, einfach abzuwarten und zu entscheiden, welche Seite seinen Interessen am nächsten kommt."
 BEL_THE_GREAT_WAR_DESC:0 "Unter dem Schutz der Briten und den Augen der Deutschen als Hintertür nach Paris, die die Konzentration des befestigten französischen Militärs entlang der deutsch-französischen Grenze umgeht, befindet sich das Königreich Belgien in einer schwierigen Lage.\n\nKönig Albert I. wird vor einer schwierigen Entscheidung stehen: Entweder er stellt sich gegen Kaiser Wilhelm II. und steht Seite an Seite mit der Entente, oder er lässt die deutschen Truppen in sein Gebiet eindringen und schlägt einen anderen Kurs ein."
 CHI_SCHLIEFFEN_DESC:0 "Die Revolution von 1911 beendete die monarchistische Herrschaft in China und hinterließ eine instabile Republik, die von regionalen Kriegsherren beherrscht wurde. Yuan Shikai übernahm das Präsidentenamt, doch die Nation selbst ist fragil und wird nur durch die Loyalität seiner Generäle zusammengehalten.\n\nDa in Europa bald ein Krieg ausbricht, bleibt abzuwarten, was mit der jungen Republik geschehen wird. Ein Eingreifen könnte ihre schwere politische Instabilität offenlegen, doch die umliegenden Imperien bieten viele Vorteile."
 SWE_SCHLIEFFEN_DESC:0 "Zu Beginn des 20. Jahrhunderts war Schweden ein friedliches Land. Seit den Napoleonischen Kriegen und dem Kieler Frieden von 1814 erlebte das Land keine bewaffneten Konflikte mehr und konnte von einem Jahrhundert Frieden profitieren. Dieser fragile Frieden wird jedoch durch wachsende Spannungen zwischen den Großmächten bedroht. Wird das Land neutral bleiben? Niemand weiß es ..."
 ALB_SCHLIEFFEN_DESC:0 "Albanien war geprägt von einem komplexen Geflecht politischer und territorialer Konflikte und lag im Zentrum der europäischen Großmächte. Trotz der Unabhängigkeit vom Osmanischen Reich im Jahr 1912 war der neue Staat von inneren Spaltungen geprägt und verfügte nicht über die nötige Stabilität und die notwendigen Institutionen für eine effektive Regierungsführung. Diese Schwäche machte Albanien auch zu einem attraktiven Ziel für Nachbarmächte, die ihren Einfluss in der Region ausweiten wollten."
 OTHER_THE_GREAT_WAR_DESC:0 "Die Nationen der Welt, ob groß oder klein, werden von diesem Konflikt betroffen sein, der sich über mehrere Kontinente erstreckt."

 ###########################################
 ################## 1916 ###################
 ###########################################

 SOMME_NAME:0 "Die Schlacht um Verdun"
 SOMME_DESC:0 "Der Erste Weltkrieg dauerte fast zwei Jahre. Nach einem Überraschungsangriff der deutschen Armee durch Belgien gelang es der Triple Entente, den Vormarsch zu stoppen. Beide Seiten hatten sich in Schützengräben verschanzt und lieferten sich seitdem täglich einen erbitterten Kampf um einige Kilometer Land. "
 ENG_SOMME_DESC:0 "Großbritannien leidet nicht so sehr unter dem großen Krieg wie Frankreich oder das Russische Reich. Auch wenn Großbritannien mit den Mittelmächten im Krieg liegt, müssen nur Freiwillige am Krieg teilnehmen. Die Royal Navy beherrscht die Meere und blockiert die Handelsrouten nach Deutschland über die Nordsee."
 FRA_SOMME_DESC:0 "Die Westfront in Frankreich ist wahrscheinlich der wichtigste Schauplatz des gesamten Krieges. Beide Fraktionen haben sich tief in Schützengräben verschanzt, und der Lärm des Artilleriefeuers brennt sich in die Köpfe der Soldaten. Wie lange können sie durchhalten? Nur die Zeit kann es zeigen."
 GER_SOMME_DESC:0 "Die Triple Entente konnte den Schlieffen-Plan kurz vor Paris stoppen. Das Deutsche Reich hat noch immer die Initiative. Diese gilt es zu nutzen und keine Zeit zu verlieren. Die Erfolge an der Ostfront geben unseren Soldaten das nötige Selbstvertrauen. Gott sei mit uns!"
 OTT_SOMME_DESC:0 "Das Osmanische Reich hat im Nahen Osten große Probleme. Aber nicht nur an der Front. Innere Unruhen bereiten dem kranken Europa große Probleme. Viele Völker fordern Unabhängigkeit und Freiheit in den besetzten Gebieten. Drastische Veränderungen sind nötig."
 AUH_SOMME_DESC:0 "Deutschlands wichtigster Verbündeter gerät zunehmend in Gefahr. Die Doppelmonarchie mit ihren vielen verschiedenen Ethnien scheint dem Konflikt nicht gewachsen zu sein. Dass Kameraden aufeinander schießen, ist keine Seltenheit. Es ist alles eine Frage der Sprache."
 RUS_SOMME_DESC:0 "Das Russische Reich erlebt eine weitere Katastrophe. Nach der blamablen Niederlage gegen Japan 1905 muss sich die schlecht ausgerüstete russische Armee gegen die deutsche Armee behaupten. Es wurden keine ausreichenden Vorkehrungen getroffen, und nun fehlt sogar die Munition für die Streitkräfte. Es sieht nicht gut aus für den russischen Zaren."
 USA_SOMME_DESC:0 "Die Vereinigten Staaten haben sich in diesem Konflikt für eine Neutralität entschieden. Auch wenn die Mehrheit der Amerikaner diese Neutralität unterstützt, kann sich diese Meinung jederzeit ändern."
 OTHER_SOMME_DESC:0 "Auch wenn andere Länder interessant sind, haben sie keinen großen Einfluss auf das Kräfteverhältnis …"

 ###########################################
 ################## 1918 ###################
 ###########################################

 KAISERSCHLACHT_NAME:0 "Kaiserschlacht"
 KAISERSCHLACHT_DESC:0 "Seit vier Jahren herrscht an der Westfront eine brutale Pattsituation, doch im Osten gibt es mit dem Zusammenbruch des Russischen Reiches und der anschließenden Unterzeichnung des Vertrags von Brest-Litowsk keine Front mehr. Dieser ermöglichte Hunderttausenden deutschen Soldaten die Verlegung in den Westen, was in der Planung einer noch nie dagewesenen Großoffensive gipfelte: der Kaiserschlacht. Österreich-Ungarn, die Türkei und Bulgarien befinden sich jedoch in einem sehr geschwächten Zustand, und sollte im Westen kein bedeutender Sieg gelingen, ist sehr wahrscheinlich, dass nicht nur Deutschland, sondern das gesamte Bündnis zusammenbricht."
 GER_KAISERSCHLACHT_DESC:0 "Seit vier Jahren herrscht an der Westfront ein militärisches Patt, doch mit der Kapitulation des Russischen Reiches kann Deutschland diese Divisionen nutzen, um den alliierten Streitkräften an der Westfront vorübergehend zahlenmäßig überlegen zu sein. Es ist entscheidend, dass wir die Frontlinien durchbrechen und Frankreich einen Waffenstillstand aufzwingen, solange die Amerikaner noch in geringer Zahl vor Ort sind. Sobald sie hier sind, haben wir keine Chance mehr. Die Versorgungslage verschlechtert sich täglich, und die Truppen rinnen wie Sand durch die Finger. Wir müssen all unsere Kräfte bündeln, um diesen letzten Vorstoß zu schaffen, sonst müssen wir die Folgen einer Kapitulation tragen."
 AUH_KAISERSCHLACHT_DESC:0 "Die österreichisch-ungarische Monarchie war während des gesamten Krieges eine Katastrophe, doch die Schlacht von Caporetto im Oktober 1917 war ein wichtiger Sieg für das Reich. Der bald darauf folgende Zusammenbruch des Russischen Reiches und der Vertrag von Brest-Litowsk entlasteten unsere Streitkräfte im Osten, sodass sie sich auf Italien und den Balkan konzentrieren konnten. Das Reich kämpft jedoch immer noch um seine Existenz, da es stark kriegsmüde ist und eine starke Antikriegsstimmung in der Bevölkerung herrscht. Dies wird weder den Sieg noch den Erhalt des Reiches oder beides bedeuten ..."
 TUR_KAISERSCHLACHT_DESC:0 "Die Alliierten dachten, die Türkei wäre ein leichtes Unterfangen, doch der Krieg im Nahen Osten nahm seinen eigenen, wilden Lauf. Das Osmanische Reich, ein schwächelndes Reich, das dem Westen in fast jeder Hinsicht weit hinterherhinkt, konnte sich vier lange Jahre lang behaupten, doch das Blatt wendete sich: Die Briten nahmen Jerusalem, die heilige Stadt, sowie Bagdad ein und rücken nun von der mesopotamischen und jordanisch-israelischen Front auf Damaskus und Mossul vor. Wenn sie fallen, fallen auch wir. Doch mit dem unterzeichneten Vertrag von Brest-Litowsk stehen unsere Streitkräfte im Kaukasus endlich für andere Zwecke zur Verfügung."
 SOV_KAISERSCHLACHT_DESC:0 "Im Laufe des Ersten Weltkriegs geriet das schwache Russische Reich instabil und viele Menschen verloren ihr Leben. Soldaten und Arbeiter verloren jegliches Vertrauen und jeglichen Patriotismus gegenüber der kaiserlichen Regierung, die daraufhin ihre eigene kommunistische Regierung unter der Führung Wladimir Lenins bildete. Der verheerende Vertrag von Brest-Litowsk wurde unterzeichnet, aber wir hatten keine Wahl. Und inmitten all dessen steht uns nun ein noch größerer Konflikt bevor: der russische Bürgerkrieg."
 ENG_KAISERSCHLACHT_DESC:0 "Großbritannien hat auf den Schlachtfeldern Flanderns, in den Ebenen Afrikas und in den Wüsten des Nahen Ostens gekämpft. Im Verlauf des Krieges sind enorme Verluste an Menschenleben zu verzeichnen, und ein Sieg scheint zeitweise nicht näher. Doch durch die Seeblockade Deutschlands ist unser Feind stark geschwächt, was zu Massenhunger unter Zivilisten und Soldaten sowie einem starken Rückgang der Moral und der Kriegsanstrengungen führt. Auch unsere eigenen Kriegsanstrengungen sind nicht besser, da sie täglich an Popularität verlieren. Bald werden die Amerikaner eintreffen und frische Truppen und eine industrielle Überlegenheit gegenüber den Mittelmächten bereitstellen. Doch zunächst müssen wir den Ansturm der Ludendorff-Offensive überstehen."
 FRA_KAISERSCHLACHT_DESC:0 "Die Franzosen, die den Deutschen zahlenmäßig und waffentechnisch hoffnungslos unterlegen waren, kämpften vier Jahre lang mit Unterstützung der Briten weiter, doch die Front bewegte sich in diesen vier Jahren kaum, und es gab enorme Verluste an Menschenleben. Den Deutschen gelang jedoch kein Durchbruch, weder in Verdun noch an der belgischen Front. Mit ihren aus Russland abgelösten Truppen werden sie uns jedoch zahlenmäßig überlegen sein. Andererseits werden die Amerikaner bald kommen und uns mit frischen Truppen ablösen, also müssen wir durchhalten."
 USA_KAISERSCHLACHT_DESC:0 "Die Vereinigten Staaten blieben während des Ersten Weltkriegs weitgehend neutral. Doch der Untergang der Lusitania, das Zimmermann-Telegramm, die Sabotage der Black Tom sowie die Rückzahlung der Kredite an die Alliierten zwangen uns zum Kriegseintritt, da wir sonst im Falle eines Untergangs der Alliierten mit schweren finanziellen Verlusten rechnen müssten. Obwohl wir bereits im Vorjahr in den Krieg eingetreten sind, dauerte die Truppenverlegung deutlich länger als erwartet, und wir werden erst in den folgenden Monaten in großer Zahl in Europa eintreffen."
 OTHER_KAISERSCHLACHT_DESC:0 "Die Nationen der Welt, ob groß oder klein, werden von diesem Konflikt betroffen sein, der sich über mehrere Kontinente erstreckt."
 GERMAN_PUPPETS_EASTEUROPE_KAISERSCHLACHT_DESC:0 "Unsere Nation, die jahrzehntelang Teil des Russischen Reiches war – das inzwischen zweimal zerfiel –, genießt derzeit eine Form der Autonomie unter deutschem Schutz. Es scheint jedoch, dass auch das Deutsche Reich, wie andere am Ersten Weltkrieg beteiligte Nationen, kurz vor dem Zusammenbruch steht."
 BUL_KAISERSCHLACHT_DESC:0 "Bulgarien, das später im Jahr 1915 in den Ersten Weltkrieg eintrat, steht nun am Rande des Zusammenbruchs, da das südlich gelegene Griechenland uns überlegene Streitkräfte zur Verfügung stellt."
 WHR_KAISERSCHLACHT_DESC:0 "Im Verlauf des Ersten Weltkriegs geriet das ohnehin schwache Russische Reich zunehmend instabil. Die hohen Verluste an Menschenleben führten dazu, dass sowohl Soldaten als auch die Arbeiterklasse jegliches Vertrauen und jeglichen Patriotismus gegenüber der Zarenregierung verloren. Als Reaktion darauf bildeten sie eine neue kommunistische Regierung unter Wladimir Lenin. Das bolschewistische Regime unterzeichnete zwar den verheerenden Vertrag von Brest-Litowsk, doch trotz allem drohte ein noch größerer Konflikt: der russische Bürgerkrieg."
 ITA_KAISERSCHLACHT_DESC:0 "Italiens Kriegseintritt 1915 führte zu katastrophalen Verlusten und minimalen bis gar keinen Fortschritten. Die Lage in den Alpen ist noch schlimmer als an der Westfront in Frankreich, und es scheint, dass Italien, sollte der Konflikt noch einige Jahre andauern, vor einem wirtschaftlichen, sozialen und demografischen Zusammenbruch stehen könnte."
 UKR_KAISERSCHLACHT_DESC:0 "Die Ukraine, die nach 154 Jahren russischer Besatzung als halbunabhängiger Staat gegründet wurde, verfügt über eine weitgehend agrarisch geprägte und veraltete Wirtschaft, die nur schwer mithalten kann. Auch die kostenlose Weizenabgabe an Deutschland, um eine Hungersnot in der deutschen Bevölkerung zu verhindern, ist der Wirtschaft nicht gerade förderlich, insbesondere angesichts der instabilen Lage im ehemaligen Russischen Reich."

 ###########################################
 ################## 1919 ###################
 ###########################################

 THE_RUSSIAN_CIVIL_WAR_NAME:0 "Der russische Bürgerkrieg"
 THE_RUSSIAN_CIVIL_WAR_DESC:0 "Der als Großer Krieg bekannte Konflikt ist endlich zu Ende. Die Mittelmächte sind besiegt und unter den Entente-Mitgliedern aufgeteilt – doch Weltfrieden ist noch weit entfernt. Im Osten, insbesondere in Russland, wüten Bürgerkriege, während der Nahe Osten, China und die ehemaligen Mittelmächte von Instabilität heimgesucht werden. Auch jetzt müssen Frieden und Wohlstand erkämpft werden."
 GER_THE_RUSSIAN_CIVIL_WAR_DESC:0 "Mit dem Zusammenbruch des Deutschen Reiches hat sein Schatten, die Weimarer Republik, ihren Platz in Europa eingenommen. Die neue Regierung wird von einer schwächelnden Industrie, hohen Reparationszahlungen und vor allem von ständigen Konflikten zwischen Kommunisten und autokratischen Freikorps geplagt, die das Land in einen Bürgerkrieg zu reißen drohen.\n\n Nur wenige sind mit dem Status quo zufrieden. Wenn sich die Republik nicht bald stabilisiert, könnte sie das gleiche Schicksal erleiden wie das Deutschland von 1848."
 RUS_THE_RUSSIAN_CIVIL_WAR_DESC:0 "Es sind die weißrussischen Streitkräfte, die die Bevölkerung vor der Plage des Kommunismus schützen. Diese Plage hat sich jedoch als großes Problem erwiesen. Im letzten Kriegsjahr konnten die Sowjets entscheidende Erfolge gegen die unorganisierte und uneinige weiße Bewegung erzielen. Es gibt noch Hoffnung für Weißrussland.\n\nSolange es die Führungsprobleme lösen und lernen kann, mit internationaler Unterstützung zu kooperieren."
 SOV_THE_RUSSIAN_CIVIL_WAR_DESC:0 "Lenins Bewegung wütet wie ein Lauffeuer im alten Russischen Reich. Der charismatische, zielstrebige Führer Sowjetrusslands findet fast überall im Osten freundliche Bauern, obwohl er von der Weltöffentlichkeit verachtet wird. Dennoch bleibt noch viel zu tun.\n\n Die neuen und schwachen Staaten rund um Russland – insbesondere Polen – müssen in die Gemeinschaft einbezogen werden, um eine wahre Weltrevolution zu schaffen!"
 POL_THE_RUSSIAN_CIVIL_WAR_DESC:0 "Während sich Briten und Franzosen über den neuen polnischen Staat auf der Weltbühne freuten, sind nur wenige andere mit der „Zweiten Republik“ zufrieden. Die besiegten Deutschen wünschen sich eine Rückkehr in ihre alten Gebiete, Tschechen und Litauer befinden sich in einem Grenzkrieg, und – was noch schlimmer ist – die Sowjets versuchen aktiv, den Staat zu zerstören.\n\nDa der größte Teil der verbündeten Ukraine bereits verloren ist, hofft Polen auf ein Wunder – doch Wunder hat es schon gegeben."
 OTT_THE_RUSSIAN_CIVIL_WAR_DESC:0 "Das Osmanische Reich scheint dem Untergang geweiht. Das Land ist auf einen winzigen Teil Anatoliens geschrumpft, von dem die Regierung nur noch einen kleinen Teil kontrolliert. Es scheint, als liege der Staat, einst das größte Reich der Welt, im Sterben. Doch hat Osman nicht größere Hindernisse überwunden, um den Staat zu gründen?\n\nKann das Schicksal aufgehalten werden? Kann die alte Garde die Nation in ihrem letzten Moment retten? Oder ist der Mond wirklich ein für alle Mal untergegangen?"
 TUR_THE_RUSSIAN_CIVIL_WAR_DESC:0 "Da das Ende des Imperiums unausweichlich schien, entstand eine massive nationalistische Bewegung unter der Führung von Mustafa Kemal Pascha. Der Held von Gallipoli forderte die Gründung einer säkularen, modernistischen Republik in Anatolien, doch sein wahres Ziel scheint die Rückeroberung der besetzten türkischsprachigen Gebiete zu sein.\n\nKaum jemand kann leugnen, dass der Kampf gegen die Europäer und die Überreste des Imperiums eine große Herausforderung wäre. Kann die neue Türkei diese meistern?"
 ITA_THE_RUSSIAN_CIVIL_WAR_DESC:0 "Italien verließ den Versailler Vertrag hungrig. Trotz der im Verhältnis zur Bevölkerungszahl hohen Zahl an Todesopfern erhielt das Königreich nur Istrien, Zadar und begrenzte Herrschaft über Albanien. Zwar haben die Entente-Mitglieder bereits die Übertragung Südtirols versprochen, doch das ist kaum mehr Gebiet als die Mittelmächte versprochen hatten. Sollte die Öffentlichkeit nicht zufrieden sein, könnte Italien seinen Zorn erneut gegen seine ehemaligen Verbündeten richten."
 FRA_THE_RUSSIAN_CIVIL_WAR_DESC:0 "Am Ende konnte sich Frankreich nur knapp behaupten. Das Unrecht von 1870 wurde gerächt, deutsche Kolonien und das Osmanische Meer stärkten Frankreichs Imperium, und überall in Europa entstanden befreundete Regime. Doch Frankreich ist noch nicht über den Berg.\n\nDie Teilung durch die Habsburger steht noch immer zur Debatte. Die Marokkaner protestieren weiterhin gegen die Annexion. Am schlimmsten ist jedoch, dass die Sowjetunion die allgegenwärtigen lokalen Kommunisten inspiriert. Werden diese Probleme nicht gelöst, könnte der Sieg umsonst gewesen sein."
 ENG_THE_RUSSIAN_CIVIL_WAR_DESC:0 "Viele britische Söhne kehrten nicht aus den Schützengräben zurück. Obwohl Tansania und Namibia erobert wurden, war der Blutzoll hoch – insbesondere angesichts der Tatsache, dass Paris und nicht London die neuen Regierungen Europas lenkt. 1919 ist das Britische Empire auf seinem Höhepunkt – und doch möglicherweise so schwächlich wie nie zuvor. Diplomatie wird die neue Dreadnought sein. Neue Abkommen und eine neue Verwaltung sollen das Empire während des Wiederaufbaus unserer Streitkräfte bewahren. Die erste Bewährungsprobe ist der Umgang mit den Streitigkeiten in Ägypten."
 USA_THE_RUSSIAN_CIVIL_WAR_DESC:0 "Die Amerikaner hatten keine Lust auf Krieg, und nun, da dieser vorbei ist, scheint sich die Öffentlichkeit mehrheitlich zu fragen, ob sich die Intervention gelohnt hat. Die Bundesregierung scheint Woodrow Wilsons Idealismus den Rücken zu kehren und sich einer zynischen Neutralität zuzuwenden. Das Militär wird bereits entwaffnet, und die Gesetzgeber bekämpfen jeden Teil des Friedensprozesses. Sollte der Kongress dem Beitritt zum Völkerbund zustimmen, könnte dieser Kurs umgekehrt werden. Andernfalls droht den USA ein unaufhaltsamer Isolationismus."
 JAP_THE_RUSSIAN_CIVIL_WAR_DESC:0 "Das japanische Volk lebt zum ersten Mal unter einer demokratischen Regierung. Diese Idee ist in der Öffentlichkeit jedoch nicht so beliebt, wie es logisch erscheinen mag. Der Kaiser hat offensichtlich nicht mehr lange zu leben, und viele reaktionäre Persönlichkeiten, die eine Rückkehr zur Autokratie und die Gründung von Kolonien befürworten, haben sich nach der Krönung von Prinz Hirohito öffentlich zu Wort gemeldet. Vielleicht haben sie Recht. Vielleicht reichen ein paar Feldzüge im kriegszerrütteten China aus, um Japan zu einer respektierten Macht zu machen."
 
 ###########################################
 ################## 1933 ###################
 ###########################################
 RISE_OF_EVIL_NAME:0 "Aufstieg des Bösen"
 RISE_OF_EVIL_DESC:0 "Fast ein Drittel des Jahrhunderts dominierten Liberalismus und Demokratie die internationale Politik und die inneren Angelegenheiten. Dieses Weltbild bröckelt nun, und eine neue Macht ist auf dem Vormarsch. Italien steht seit zwölf Jahren unter der Herrschaft eines nationalistischen Diktators, wie ihn die Welt noch nie zuvor erlebt hat. In Deutschland ist der Aufschwung einer neuen politischen Ideologie zu beobachten, die sich gegen Freiheit und Liberalismus richtet. Ostasien leidet unter der Expansionspolitik des japanischen Kaiserreichs. Inmitten all dessen leiden die Volkswirtschaften Amerikas, Frankreichs und Großbritanniens unter der Weltwirtschaftskrise. Wird die Demokratie das ideologische Blatt wenden können, oder markiert dies den Beginn des Aufstiegs des Bösen?"
 GER_RISE_OF_EVIL_DESC:0 "Hitler gelangte im März 1933 an die Macht, nachdem der Reichstag im selben Monat das Ermächtigungsgesetz von 1933 verabschiedet hatte, das ihm erweiterte Machtbefugnisse einräumte. Reichspräsident Paul von Hindenburg hatte Hitler bereits am 30. Januar 1933 nach einer Reihe von Parlamentswahlen und den damit verbundenen Hinterzimmerintrigen zum Reichskanzler ernannt."
 ENG_RISE_OF_EVIL_DESC:0 "Obwohl das Vereinigte Königreich den Ersten Weltkrieg siegreich beendete, wurden die Grundlagen seines Imperiums bis ins Mark erschüttert. Eine Generation seiner besten jungen Männer fiel auf den Schlachtfeldern Flanderns und Nordfrankreichs, während sich im gesamten Commonwealth Unruhen ausbreiteten und enorme Schulden anhäuften. Das Trauma des letzten Krieges ist noch frisch in Erinnerung, und nun steht das Land vor der Aussicht auf einen weiteren Krieg. Es wird immer deutlicher, dass es keinen „Frieden für unsere Zeit“ geben wird."
 FRA_RISE_OF_EVIL_DESC:0 "Trotz der Verwüstungen des Ersten Weltkriegs befindet sich Frankreich dank seiner starken Wirtschaft, die durch deutsche Reparationszahlungen unterstützt wird, auf dem Weg der Erholung. Die Große Depression hat das Land jedoch noch immer beeinträchtigt, und das neue deutsche Regime zeigt wenig Interesse daran, die im Versailler Vertrag festgelegten Reparationszahlungen weiter zu zahlen. Angesichts der politischen Unruhen im eigenen Land erscheinen die Worte von Marschall Ferdinand Foch bei der Unterzeichnung des Vertrags: „Dies ist kein Frieden. Es ist ein Waffenstillstand für zwanzig Jahre.“ als ein gutes Omen. Diese zwanzig Jahre laufen schnell ab."
 ITA_RISE_OF_EVIL_DESC:0 "Nach dem Aufstieg des Faschismus erwartet Italien eine neue glorreiche Ära. Seine Streitkräfte versuchen derzeit, Äthiopien zu überreden, dem wachsenden italienischen Kolonialreich beizutreten. Doch enden Benito Mussolinis Ambitionen damit?\n\nDie Herrschaft über den Mittelmeerraum war doch schon immer Italiens Schicksal. Angesichts der sich in Europa scheinbar abzeichnenden Neuordnung der Dinge muss Italien bei der Flutwelle des Wandels einen Platz auf deren Höhepunkt finden, sonst läuft es Gefahr, weggespült zu werden."
 JAP_RISE_OF_EVIL_DESC:0 "Das japanische Kaiserreich steht an einem Scheideweg. Die Armee vertritt die Doktrin der nördlichen Expansion, „Hokushin-ron“, die einen Vormarsch nach Russland und China vorsieht. Die Marine hingegen unterstützt die Doktrin der südlichen Expansion, „Nanshin-ron“, die die rohstoffreichen europäischen Kolonien in Südostasien und im Pazifik zum Ziel hat.\n\nJapan verfügt über ein beeindruckendes Militär, doch seine Industrie benötigt dringend Ressourcen und die Zeit scheint knapp zu werden. Welchen Weg soll man wählen?"
 SOV_RISE_OF_EVIL_DESC:0 "„Ein Gespenst geht um in Europa – das Gespenst des Kommunismus.“\nAls sich der Staub nach dem Bürgerkrieg gelegt hatte, war die UdSSR als unangefochtene Herrscherin über weite Teile des ehemaligen Russischen Reiches hervorgegangen. Es folgten eine rasante staatliche Industrialisierung und Kollektivismus, oft mit hohen Opferzahlen.\n\nNun ist die Sowjetunion mit der Bedrohung durch ein wiedererstarktes Deutschland im Westen und ein kriegerisches Japan im Osten konfrontiert. Auch innerhalb der Kommunistischen Partei gibt es interne Bedrohungen, mit denen sie sich auseinandersetzen muss..."
 USA_RISE_OF_EVIL_DESC:0 "Nach dem Ersten Weltkrieg zogen sich die Vereinigten Staaten in den Isolationismus zurück und erlebten in den Goldenen Zwanzigern eine Zeit wirtschaftlichen Wohlstands. Diese fand jedoch ein dramatisches Ende, als die Nation 1929 von der „Großen Depression“ erfasst wurde. Die amerikanische Politik der Nichteinmischung in ausländische Kriege blieb bestehen, doch die Spannungen in Europa und Asien nehmen zu. Die „Große Neutrale“ könnte – ob gewollt oder nicht – in den Strudel hineingezogen werden."
 MEX_RISE_OF_EVIL_DESC:0 "Mexiko ist ein Land im Wandel und erholt sich noch immer von den turbulenten Folgen der mexikanischen Revolution. Obwohl unter Präsident Abelardo L. Rodríguez offiziell Stabilität herrscht, bleibt Mexiko zwischen Traditionalisten und Reformern gespalten. Mächtige regionale Eliten versuchen, ihre Macht zu behalten, während progressive Kräfte auf Modernisierung drängen. Angesichts von Armut, Korruption und Ungleichheit ist Mexikos Zukunft ungewiss. Mit einer dynamischen Kultur, reichlich vorhandenen natürlichen Ressourcen und einer jungen und wachsenden Bevölkerung hat Mexiko jedoch das Potenzial, zu einer Großmacht in der Region und darüber hinaus zu werden."
 ALB_RISE_OF_EVIL_DESC:0 "Albanien ist ein kleines und isoliertes Land zwischen Italien und Griechenland. Unter der Herrschaft von König Zog I. steht Albanien vor erheblichen wirtschaftlichen und politischen Herausforderungen. Der Industriesektor ist schwach, die Wirtschaft weitgehend agrarisch geprägt. Albaniens strategische Lage macht das Land zudem anfällig für äußere Einflüsse, insbesondere aus dem faschistischen Italien und dem kommunistischen Jugoslawien. Trotz dieser Herausforderungen bewahrt Albanien seine stolze und ausgeprägte nationale Identität mit einem reichen kulturellen Erbe und einer Geschichte des Widerstands gegen ausländische Herrschaft."
 ARG_RISE_OF_EVIL_DESC:0 "Argentinien ist ein riesiges und vielfältiges Land mit einem reichen kulturellen Erbe und einer turbulenten politischen Geschichte. Das derzeit von Präsident Agustín Pedro Justo regierte Land steht vor wirtschaftlichen Herausforderungen, da es stark von Agrarexporten abhängig ist und die Staatsverschuldung wächst. Auch die politischen Spannungen sind hoch: Die Gesellschaft ist tief gespalten, und es kommt zu anhaltenden Auseinandersetzungen zwischen Gewerkschaften und Industriellen. Trotz dieser Herausforderungen bleibt Argentinien eine Regionalmacht mit einem starken Militär und einer stolzen nationalen Identität. Die Zukunft des Landes ist jedoch ungewiss, da es inmitten einer globalen Krise sowohl nationalen als auch internationalen Druck bewältigen muss."
 AST_RISE_OF_EVIL_DESC:0 "Australien ist ein riesiges und dünn besiedeltes Land mit überwiegend britischem Kolonialerbe. Unter Premierminister Joseph Lyons steht Australien vor wirtschaftlichen Herausforderungen und einer hohen Arbeitslosenquote. Auch die politischen Spannungen sind hoch, die Gesellschaft ist tief gespalten und es gibt anhaltende Konflikte. Australiens strategische Lage im Pazifik macht das Land anfällig für äußere Einflüsse, insbesondere aus Japan. Trotz dieser Herausforderungen bewahrt Australien ein starkes nationales Identitätsbewusstsein mit einer stolzen Militärtradition und wachsender kultureller Unabhängigkeit."
 AUS_RISE_OF_EVIL_DESC:0 "Österreich, ein kleines, gebirgiges Land im Herzen Europas, steht unter der Herrschaft von Bundeskanzler Engelbert Dollfuß vor erheblichen politischen und wirtschaftlichen Herausforderungen. Das Land kämpft damit, sich von den Folgen des Ersten Weltkriegs zu erholen, einschließlich der Niederlage und des anschließenden Zerfalls der österreichisch-ungarischen Monarchie. Die politischen Spannungen sind hoch, da die wachsende Nazi-Bewegung versucht, die Autorität der Regierung in Frage zu stellen. Österreichs strategische Lage und kulturelle Bindungen machen das Land anfällig für externe Einflüsse, insbesondere aus Deutschland." 
 BEL_RISE_OF_EVIL_DESC:0 "Belgien ist ein kleines Land in Westeuropa und grenzt an Frankreich, Deutschland und die Niederlande. Unter der Herrschaft von König Albert I. herrscht in Belgien eine konstitutionelle Monarchie. Das Land kämpft jedoch mit erheblichen wirtschaftlichen und politischen Herausforderungen, insbesondere den Spannungen zwischen Flandern und Wallonien. Belgiens strategische Lage macht es anfällig für äußeren Druck, insbesondere durch seine mächtigen Nachbarn. Das Land erholt sich noch immer von den Folgen des Ersten Weltkriegs, in dessen Verlauf große Teile des Landes verwüstet wurden. Belgien bleibt jedoch eine stolze und widerstandsfähige Nation mit einer Tradition der Neutralität und Demokratie."
 BHU_RISE_OF_EVIL_DESC:0 "Bhutan ist ein kleines, abgelegenes Königreich im Himalaya, das von der Wangchuck-Dynastie regiert wird. Mit seiner weitgehend agrarisch geprägten Wirtschaft und den begrenzten Kontakten zur Außenwelt ist Bhutan vom Weltgeschehen relativ isoliert. Das Land zeichnet sich durch seine atemberaubende Naturschönheit, seine tief verwurzelten religiösen Traditionen und seine ausgeprägte kulturelle Identität aus. Unter der Führung des Vierten Druk Gyalpo beginnt Bhutan mit der Modernisierung und der Annäherung an die internationale Gemeinschaft. Die Zukunft des Landes bleibt jedoch ungewiss, da es versucht, die Bewahrung seines einzigartigen Erbes mit dem Druck der Modernisierung und Globalisierung in Einklang zu bringen."
 BOL_RISE_OF_EVIL_DESC:0 "Bolivien ist ein Binnenstaat im Herzen Südamerikas. Unter Präsident Daniel Salamanca steht das Land vor zahlreichen wirtschaftlichen und politischen Herausforderungen, darunter ein hohes Maß an Armut und Ungleichheit. Die Wirtschaft des Landes ist stark landwirtschaftlich geprägt, die industrielle Entwicklung ist begrenzt. Trotz dieser Herausforderungen ist Bolivien Heimat einer reichen indigenen Kultur und einer lebendigen sozialen Bewegung, die sich für mehr Gleichheit und Demokratie einsetzt. Die Zukunft des Landes ist ungewiss, doch es besteht Hoffnung, dass mutige Reformen und ein stärkeres Engagement der internationalen Gemeinschaft zur Lösung der drängenden Probleme beitragen können."
 BRA_RISE_OF_EVIL_DESC:0 "Brasilien ist ein riesiges und vielfältiges Land mit über 40 Millionen Einwohnern. Unter Präsident Getúlio Vargas steht Brasilien vor großen politischen und wirtschaftlichen Herausforderungen. Die Wirtschaft des Landes ist weitgehend landwirtschaftlich geprägt, doch gibt es zunehmende Bemühungen, die Industrialisierung und Diversifizierung der Wirtschaft voranzutreiben. Mit seinem reichen kulturellen Erbe und einer lebendigen intellektuellen Szene ist Brasilien eine aufstrebende Macht in Lateinamerika und ein potenzieller Akteur auf der Weltbühne."
 RAJ_RISE_OF_EVIL_DESC:0 "Das britische Raj ist ein riesiges und vielfältiges Gebiet in Südasien, das das heutige Indien, Pakistan und Bangladesch umfasst. Als Kronjuwel des britischen Empire ist das Raj ein Zentrum politischer, wirtschaftlicher und kultureller Aktivität. Unter der Oberfläche schwelen jedoch weiterhin Spannungen zwischen den britischen Kolonialherren und indischen Nationalisten, während der Indische Nationalkongress mehr Autonomie und Unabhängigkeit fordert. Das Raj hat zudem mit erheblichen wirtschaftlichen Herausforderungen zu kämpfen, darunter hohe Arbeitslosigkeit, Armut und Nahrungsmittelknappheit."
 BUL_RISE_OF_EVIL_DESC:0 "Bulgarien ist ein kleines Land in Südosteuropa, das sich von den Folgen des Ersten Weltkriegs erholt und mit den Auswirkungen der Weltwirtschaftskrise kämpft. Unter der Herrschaft von König Boris III. steht Bulgarien vor erheblichen wirtschaftlichen und politischen Herausforderungen. Die Wirtschaft schwächelt und es herrscht weit verbreitete Armut. Die Spannungen mit den Nachbarländern, insbesondere Griechenland und Jugoslawien, schwelen weiterhin aufgrund territorialer Streitigkeiten. Bulgariens Beziehungen zu Deutschland und anderen europäischen Mächten sind kompliziert und von widerstreitenden Interessen geprägt."
 CAN_RISE_OF_EVIL_DESC:0 "Kanada kämpft mit den Folgen der Weltwirtschaftskrise. Der wirtschaftliche Abschwung hat das Land hart getroffen, insbesondere die wichtigsten Wirtschaftszweige Land- und Forstwirtschaft. Die Arbeitslosigkeit ist hoch, und viele Kanadier kämpfen ums Überleben. Die Regierung unter Premierminister RB Bennett hat eine Reihe von Hilfsmaßnahmen ergriffen, die jedoch als unzureichend kritisiert wurden. Gleichzeitig schwelen die Spannungen zwischen französisch- und englischsprachigen Kanadiern, wobei die französischsprachige Provinz Quebec mehr Autonomie fordert."
 CHL_RISE_OF_EVIL_DESC:0 "Chile ist ein südamerikanisches Land, das mit einem schwierigen politischen und wirtschaftlichen Klima konfrontiert ist. Präsident Arturo Alessandri hat versucht, die wirtschaftlichen Probleme durch soziale Reformen zu lösen, doch politische Spaltungen und der Widerstand mächtiger Wirtschaftsinteressen behindern den Fortschritt. Zudem haben sich die Spannungen zwischen Regierung und Militär verschärft, wobei einige Fraktionen einen Putsch zur Machtübernahme befürworten. Chiles Zukunft bleibt ungewiss, während das Land diese komplexen Herausforderungen meistert und nach Stabilität und Wohlstand strebt."
 COL_RISE_OF_EVIL_DESC:0 "Im Jahr 1933 kämpft Kolumbien mit politischer und wirtschaftlicher Instabilität. Die Arbeitslosigkeit ist hoch und Armut weit verbreitet, insbesondere in ländlichen Gebieten. Gleichzeitig herrschen hohe politische Spannungen: Rivalisierende Fraktionen ringen um die Macht, und eine wachsende kommunistische Bewegung fordert die traditionellen Eliten heraus. Trotz dieser Herausforderungen bleibt Kolumbien ein Land von natürlicher Schönheit und reicher Kultur, mit einer vielfältigen Bevölkerung und einer langen Geschichte des Widerstands und der Widerstandsfähigkeit. Kolumbien hat das Zeug, eine Großmacht in der Region zu werden, aber nur, wenn es seine Karten richtig ausspielt."
 PRC_RISE_OF_EVIL_DESC:0 "Das kommunistische China, auch Volksrepublik China genannt, ist ein Land voller Konflikte und Kämpfe. Die Kommunistische Partei Chinas (KPCh) unter Mao Zedong befindet sich in einem blutigen Bürgerkrieg mit der nationalistischen Regierung unter Chiang Kai-shek. Die KPCh kontrolliert verschiedene ländliche Gebiete in Nord- und Zentralchina, die sie als „Sowjetische“ oder „Befreite Zonen“ bezeichnet. Sie hat Landreformen durchgeführt, feudale Praktiken abgeschafft und eigene Regierungsinstitutionen aufgebaut, ist jedoch ständigem militärischen Druck der nationalistischen Kräfte ausgesetzt. Die kommunistisch kontrollierte Region leidet zudem unter Armut, Hunger und Krankheiten, die durch den anhaltenden Konflikt noch verschärft werden."
 CUB_RISE_OF_EVIL_DESC:0 "Im Jahr 1933 befindet sich Kuba in politischen Turbulenzen. Präsident Gerardo Machado regiert das Land autoritär und unterdrückt politische Opposition und Andersdenkende. Die Wirtschaft ist stark von der Zuckerindustrie abhängig, die unter sinkenden Preisen und sinkender Produktion leidet. Die USA üben weiterhin erheblichen wirtschaftlichen und politischen Einfluss auf Kuba aus. Amerikanische Konzerne besitzen einen Großteil der Industrie des Landes und kontrollieren einen Großteil des Außenhandels. Die kubanische Bevölkerung ist unruhig, und weit verbreitete Armut und Ungleichheit schüren die Unzufriedenheit."
 CZE_RISE_OF_EVIL_DESC:0 "Nach dem Ersten Weltkrieg erlebte die Tschechoslowakei einen der größten Wirtschaftsbooms Europas. Seinen Höhepunkt erreichte das Land, als es zur zehntgrößten Volkswirtschaft aufstieg. Dieser Boom wurde erst durch die Weltwirtschaftskrise gestoppt. Seit der Depression kämpft die Tschechoslowakei um ihre Einheit, da ihre ethnische Zusammensetzung ständig gegen die Prager Regierung protestiert. Und nun stellt die NSDAP in Deutschland langfristig eine potenzielle Bedrohung für die Existenz der Tschechoslowakei dar..."
 DEN_RISE_OF_EVIL_DESC:0 "Dänemark ist 1933 ein kleines skandinavisches Land, das sich von den Auswirkungen der Weltwirtschaftskrise erholt. Trotz des wirtschaftlichen Abschwungs hat das Land eine stabile demokratische Regierung unter Premierminister Thorvald Stauning. Die politischen Spannungen sind jedoch hoch, da rechte Parteien auf mehr Autoritarismus und Antisemitismus drängen, während linke Gruppen sozialistische Reformen fordern. Dänemarks Verhältnis zu Deutschland, seinem mächtigen Nachbarn im Süden, bleibt aufgrund der Angst vor einer möglichen deutschen Aggression besorgniserregend. Die wichtigsten Wirtschaftszweige des Landes sind Landwirtschaft, Fischerei und Schifffahrt, und es verfügt weiterhin über einen starken Wohlfahrtsstaat."
 EST_RISE_OF_EVIL_DESC:0 "Estland, ein kleines Land in Nordeuropa, steht vor internen und externen Herausforderungen. Die Wirtschaft des Landes ist stark exportabhängig, doch der globale Wirtschaftsabschwung hat das Land hart getroffen. Die Regierung hat Sparmaßnahmen ergriffen und Kredite von ausländischen Mächten aufgenommen, um die Wirtschaft zu stabilisieren. Allerdings nehmen die Spannungen zwischen ethnischen Esten und der großen russischen Minderheit zu, die sich ausgegrenzt und diskriminiert fühlt. Die Sowjetunion stellt eine drohende Gefahr dar, da sie versucht, ihren Einfluss in der Region auszuweiten. Estland muss diese komplexen Probleme meistern, um sein Überleben in einer sich rasch verändernden Welt zu sichern."
 ETH_RISE_OF_EVIL_DESC:0 "Äthiopien ist einer der unabhängigen Staaten Afrikas und wird von Kaiser Haile Selassie regiert. Seine Unabhängigkeit verdankt Äthiopien einer mächtigen Monarchie und dem Feudalismus, in dem der lokale Adel über enorme Macht verfügt. Die Wirtschaft basiert auf der Landwirtschaft, und die meisten Menschen betreiben Ackerbau und Viehzucht. Äthiopien ist eine sehr traditionelle Gesellschaft mit der äthiopisch-orthodoxen Kirche als Mittelpunkt. Als Mitglied des Völkerbundes möchte Äthiopien mit der Welt interagieren, ohne seine historische und kulturelle Integrität zu gefährden."
 FIN_RISE_OF_EVIL_DESC:0 "Finnland ist ein junges Land, das nach langem Kampf seine Unabhängigkeit von Russland erlangt hat. Das Land steht vor zahlreichen Herausforderungen, darunter einer fragilen Wirtschaft und politischer Instabilität. Die Weltwirtschaftskrise hat Finnland hart getroffen und zu hoher Arbeitslosigkeit und sozialen Unruhen geführt. Darüber hinaus schwelen die Spannungen mit der Sowjetunion weiter, und die Gefahr einer Invasion ist ständig im Raum. Trotz dieser Herausforderungen kann Finnland auf ein stolzes kulturelles Erbe zurückblicken. Die Zukunft des Landes ist ungewiss, da es sowohl mit nationalem als auch internationalem Druck zu kämpfen hat."
 GRE_RISE_OF_EVIL_DESC:0 "Griechenland, in Südosteuropa gelegen, kämpft mit politischer Instabilität und wirtschaftlichen Schwierigkeiten. Das Land hat jahrelange politische Unruhen und Militärputsche erlebt. Die griechische Wirtschaft liegt am Boden, die Arbeitslosigkeit ist hoch, die Inflation ist hoch, verschärft durch die Auswirkungen der Weltwirtschaftskrise. Zudem herrscht Spannungen mit der Türkei wegen territorialer Streitigkeiten und einer großen Zahl griechischer Flüchtlinge, die aus der Türkei fliehen. Angesichts dieser Herausforderungen ist Griechenlands Zukunft ungewiss, und am Horizont droht ein Krieg."
 GXC_RISE_OF_EVIL_DESC:0 "Die Guanxi-Clique, die sich über die Provinzen Guanxi, Guangdong und Hainan erstreckt, ist die Bastion der Reformen in ganz China. Ihr Anführer Li Zngren führte zahlreiche Reformen durch, darunter die Gründung der Universität Guanxi 1928 in deren Hauptstadt Nanning und den Bau moderner Infrastruktur. Dank dieser Erfolge wurde Guanxi zu einer vorbildlichen, fortschrittlichen Provinz. Obwohl sie den Krieg in der Zentralebene gegen Chiang Kai-Sheks Nationalregierung verlor..."
 HOL_RISE_OF_EVIL_DESC:0 "Die Niederlande sind ein kleines, aber wohlhabendes Land in Westeuropa. Trotz der schweren Auswirkungen der Weltwirtschaftskrise konnte das Land seine Wirtschaft und sein politisches System stabil halten. Die Regierung unter Premierminister Hendrikus Colijn hat strenge Sparmaßnahmen ergriffen, um den Haushalt unter Kontrolle zu halten. Allerdings nehmen die Spannungen zwischen der regierenden konservativen Partei und der wachsenden sozialistischen Bewegung zu. Die Niederlande sehen sich zudem externem Druck ausgesetzt, insbesondere aus Deutschland, das unter der Führung Adolf Hitlers zunehmend aggressiver wird."
 HON_RISE_OF_EVIL_DESC:0 "Honduras wird 1933 von Juan Alberto Melgar Castros Militärdiktatur regiert, der ein autoritäres Regime ausübt. Das Land ist politisch instabil und es kommt zu Machtkämpfen zwischen verschiedenen Gruppen, wie der Militärelite und Liberalen. Aufgrund der Weltwirtschaftskrise hält die wirtschaftliche Not an, was zu weit verbreiteter Armut und Ungleichheit führt. Honduras ist stark von Agrarexporten, insbesondere Bananen, abhängig, die von ausländischen Konzernen kontrolliert werden. Die Gesellschaftsstruktur ist extrem polarisiert, mit eingeschränkten politischen Freiheiten und wachsender Unzufriedenheit in der Arbeiterklasse. Während das Regime die Kontrolle behält, nehmen Oppositionsbewegungen und Unruhen zu."
 HUN_RISE_OF_EVIL_DESC:0 "Ungarn ist ein Land, das inmitten der Weltwirtschaftskrise mit politischen Turbulenzen konfrontiert ist. Unter dem autoritären Herrscher Miklós Horthy kämpft das Land mit wachsender wirtschaftlicher Ungleichheit und dem Aufkommen extremistischer politischer Bewegungen, darunter der faschistischen Pfeilkreuzlerpartei. Gleichzeitig schwelen die Spannungen zwischen Ungarn und seinen Nachbarn, insbesondere Rumänien, aufgrund territorialer Streitigkeiten und der Behandlung ethnischer Ungarn in den Nachbarländern. Die Zukunft des Landes ist ungewiss, da es mit innerstaatlichem und internationalem Druck zu kämpfen hat, einschließlich der drohenden Bedrohung durch Nazideutschland."
 INS_RISE_OF_EVIL_DESC:0 "Niederländisch-Indien, eine Kolonie der Niederlande, ist eine wichtige Rohstoffquelle und ein bedeutender Handelsposten in Südostasien. Die Wirtschaft basiert weitgehend auf dem Export von Nutzpflanzen wie Kautschuk, Ölpalmen und Tee. Die Weltwirtschaftskrise traf die Wirtschaft der Kolonie jedoch hart, was zu weit verbreiteter Armut und Unruhen unter der lokalen Bevölkerung führte. Die niederländische Kolonialregierung reagierte mit wirtschaftspolitischen Maßnahmen zur Ankurbelung der Wirtschaft und zur Unterdrückung jeglicher Opposition. Gleichzeitig gewinnen nationalistische Bewegungen, die die Unabhängigkeit von der Kolonialherrschaft anstreben, an Stärke."
 IRQ_RISE_OF_EVIL_DESC:0 "Nach dem Ende des Osmanischen Reiches und der britischen Herrschaft erlangte der Irak 1932 seine Unabhängigkeit. Die neue Monarchie unter König Faisal I. steht vor großen Herausforderungen, darunter Stammeskonflikte und Spannungen mit den Nachbarländern. Die Wirtschaft ist weitgehend von Ölexporten abhängig, die von ausländischen Unternehmen kontrolliert werden. Die Regierung versucht, das Land durch Bildung und Infrastrukturausbau zu modernisieren, doch aufgrund begrenzter Ressourcen und innerer Unruhen kommen die Fortschritte nur langsam voran."
 IRE_RISE_OF_EVIL_DESC:0 "Irland ist durch einen Bürgerkrieg gespalten und kämpft um eine stabile Regierung. Die Regierung des Freistaats unter Eamon de Valera sieht sich mit dem Widerstand vertragsfeindlicher Republikaner konfrontiert, die eine Wiedervereinigung mit Nordirland anstreben. Die Wirtschaft ist schwach und die Arbeitslosigkeit hoch. Das Land ist nach wie vor stark von der katholischen Kirche geprägt, und die irische Sprache und Kultur werden weiterhin gefördert."
 LAT_RISE_OF_EVIL_DESC:0 "Lettland befindet sich in einer prekären Lage zwischen der Sowjetunion und Nazi-Deutschland. Das Land kämpft mit wirtschaftlichen Schwierigkeiten und politischer Instabilität; mehrere Regierungen brachen kurz hintereinander zusammen. Der autoritäre Führer Kārlis Ulmanis hat durch einen Putsch die Macht an sich gerissen und versucht, ein stabileres und geeintes Lettland zu errichten. Spannungen mit ethnischen Minderheiten und Nachbarländern bedrohen jedoch weiterhin den fragilen Frieden im Land."
 LIB_RISE_OF_EVIL_DESC:0 "Liberia, an der Westküste Afrikas gelegen, ist eine Republik, die im 19. Jahrhundert von freigelassenen amerikanischen Sklaven gegründet wurde. 1933 kämpft das Land aufgrund sinkender Kautschukpreise und der Weltwirtschaftskrise mit einer schweren Wirtschaftskrise. Die Regierung unter Präsident Edwin Barclay kämpft angesichts wachsender Opposition und sozialer Unruhen um die Aufrechterhaltung der Stabilität. Das Land ist zudem mit Territorialstreitigkeiten mit Nachbarländern und Spannungen mit indigenen Gemeinschaften konfrontiert."
 LIT_RISE_OF_EVIL_DESC:0 "Litauen ist ein kleines Land in Osteuropa. Nach seiner Unabhängigkeit von Russland im Jahr 1918 bemüht sich Litauen um die Etablierung als demokratischer Staat. Politische Instabilität und wirtschaftliche Schwierigkeiten haben das Land in den letzten Jahren jedoch geplagt. Die Regierung unter Präsident Antanas Smetona hat Maßnahmen zur Lösung dieser Probleme ergriffen, doch es gibt Bedenken hinsichtlich eines zunehmenden Autoritarismus. Auch die Spannungen mit dem benachbarten Polen über umstrittene Gebiete in Vilnius geben weiterhin Anlass zur Sorge."
 LUX_RISE_OF_EVIL_DESC:0 "Luxemburg, ein kleines Land in Westeuropa, war im frühen 20. Jahrhundert eine konstitutionelle Monarchie. 1933 stand das Land aufgrund der Weltwirtschaftskrise vor wirtschaftlichen Herausforderungen, die zu hoher Arbeitslosigkeit und Handelsrückgang führten. Die politische Lage war relativ stabil, mit einer Regierung der Christlich-Sozialen Partei unter Premierminister Pierre Dupong. Angesichts der zunehmenden Spannungen und der militärischen Aufrüstung im benachbarten Deutschland gab auch die Neutralitätspolitik des Landes Anlass zur Sorge. Trotzdem blieb Luxemburg während des Zweiten Weltkriegs neutral."
 MAL_RISE_OF_EVIL_DESC:0 "Britisch-Malaya ist eine Kolonie des Vereinigten Königreichs in Südostasien. Sie umfasst die Malaiische Halbinsel und Teile der Insel Borneo. Die Wirtschaft wird vom Kautschuk- und Zinnexport dominiert, wobei chinesische Arbeiter einen erheblichen Anteil der Erwerbsbevölkerung ausmachen. Die Kolonie wird von einem britischen Hochkommissar regiert und verfügt über eine gut organisierte Polizei. Allerdings nehmen nationalistische Gefühle zu, insbesondere unter der ethnisch malaiischen Bevölkerung, was zu gelegentlichen Protesten und Gewalttaten gegen die britische Herrschaft führt."
 MAN_RISE_OF_EVIL_DESC:0 "Das Mandschurische Kaiserreich ist ein Marionettenstaat Japans im Nordosten Chinas, der 1932 nach der japanischen Invasion gegründet wurde. Es wird von Puyi, dem letzten Kaiser der Qing-Dynastie, regiert und seine Regierung ist stark von Japan beeinflusst. Die Wirtschaft ist weitgehend von japanischen Investitionen und Handel abhängig, und das Militär wird von Japan kontrolliert. Es gibt jedoch auch einige lokale mandschurische Eliten, die Positionen in Regierung und Militär innehaben. Der Marionettenstaat stößt weiterhin auf Widerstand chinesischer Nationalisten, insbesondere außerhalb der Mandschurei."
 MEN_RISE_OF_EVIL_DESC:0 "Mengjiang ist ein japanischer Marionettenstaat im Nordosten Chinas. Der 1931 gegründete Staat wird von Prinz Demchugdongrub, einem mongolischen Adligen, regiert und ist politisch und wirtschaftlich stark von Japan abhängig. Trotz seiner nominellen Unabhängigkeit steht der Staat weiterhin unter erheblichem japanischen Einfluss und ist ein wichtiger Bestandteil der japanischen Strategie zur Ausweitung seines Einflusses in China."
 MON_RISE_OF_EVIL_DESC:0 "Die Mongolei ist ein Binnenstaat in Ostasien und grenzt an China und die Sowjetunion. Das Land wird von einer theokratischen Monarchie regiert, deren geistliches und politisches Oberhaupt Bogd Khan ist. Die mongolische Wirtschaft ist stark von der Landwirtschaft abhängig, insbesondere von der Viehzucht wie Pferden, Schafen und Kamelen. In den letzten Jahren hat die Regierung mit Unterstützung der Sowjetunion versucht, das Land zu modernisieren und zu industrialisieren. Dennoch ist die Mongolei nach wie vor weitgehend ländlich und unterentwickelt, ein Großteil der Bevölkerung lebt in Armut."
 CHI_RISE_OF_EVIL_DESC:0 "Die Republik China (ROC) ist ein Staat in Ostasien. Sie ist eine föderale Republik mit 22 Provinzen, fünf autonomen Regionen und vier regierungsunmittelbaren Städten. Die Regierung der ROC wird seit 1928 von Chiang Kai-shek geführt und kämpft derzeit im chinesischen Bürgerkrieg gegen die Kommunistische Partei Chinas (KPCh). Die Wirtschaft ist vorwiegend landwirtschaftlich geprägt, mit etwas Leichtindustrie, und das Militär wird derzeit mit Hilfe ausländischer Berater modernisiert."
 NZL_RISE_OF_EVIL_DESC:0 "In Neuseeland ist die Labour Party an der Macht und Michael Joseph Savage ist Premierminister. Das Land steht vor den Herausforderungen der Weltwirtschaftskrise, doch Savages Regierung setzt eine Reihe von Reformen um, die als „Erste Labour-Regierung“ bekannt sind. Dazu gehören die Einführung eines Wohlfahrtsstaates und die Schaffung von Arbeitsplätzen durch öffentliche Bauprojekte. Das Land betreibt zudem einen starken Handel mit dem Britischen Empire, insbesondere durch den Export von Milch- und Wollprodukten."
 NOR_RISE_OF_EVIL_DESC:0 "Norwegen ist ein kleines, aber wohlhabendes Land in Nordeuropa. Trotz seiner Neutralität und Isolationspolitik gerät es zunehmend unter Druck der aufstrebenden Mächte des Kontinents. Zu den wichtigsten Wirtschaftszweigen des Landes zählen Fischerei, Schifffahrt und Holzwirtschaft. Darüber hinaus verfügt das Land über bedeutende Ölreserven in der Nordsee. Norwegen ist eine konstitutionelle Monarchie mit einem Einkammerparlament und einem Premierminister als Regierungschef. Trotz seiner geringen Größe und relativen Isolation verfügt Norwegen über ein gut ausgerüstetes und modernes Militär, dessen Schwerpunkt auf der Küstenverteidigung liegt."
 PAR_RISE_OF_EVIL_DESC:0 "Paraguay, ein Binnenstaat in Südamerika, steht vor großen politischen Herausforderungen. Das Land wird von einer Militärregierung unter Präsident Eusebio Ayala regiert, der 1932 durch einen Staatsstreich die Macht übernahm. Die Regierung sieht sich mit Widerstand verschiedener Gruppierungen konfrontiert, darunter linke Gruppen und die liberale Oppositionspartei. Die Wirtschaft des Landes ist stark von der Landwirtschaft abhängig. Trotz dieser Herausforderungen bewahrt Paraguay ein reiches kulturelles Erbe mit einer lebendigen Musikszene und ist die Heimat der Guarani, einer der größten indigenen Gruppen Südamerikas."
 PER_RISE_OF_EVIL_DESC:0 "Der Iran ist ein zentraler Akteur in der Region und verfügt über eine reiche Geschichte und enorme Ressourcen. Das Land steht vor politischen und wirtschaftlichen Herausforderungen, und eine geschwächte Regierung kämpft um die Kontrolle über ihre Bevölkerung. Mehrere ausländische Mächte buhlen um Einfluss in der Region, was den Iran zu einem potenziellen Schauplatz globaler Konflikte macht. Es bleibt abzuwarten, wie der Iran diese turbulenten Zeiten meistern und seine Zukunft sichern wird."
 PRU_RISE_OF_EVIL_DESC:0 "Peru ist ein südamerikanisches Land mit einer vielfältigen Bevölkerung und einer reichen Geschichte. Die Wirtschaft basiert hauptsächlich auf Landwirtschaft, Bergbau und Fischerei. Unter der Regierung von Präsident Luis Miguel Sánchez Cerro ist das Land politisch stabil. Peru pflegt gute Beziehungen zu seinen Nachbarn und verfügt über eine starke Militärpräsenz, um seine territoriale Integrität zu sichern. Das Land ist außerdem für seine antiken Inka-Ruinen bekannt, die viele Touristen aus aller Welt anziehen."
 POL_RISE_OF_EVIL_DESC:0 "Polen ist ein junges Land, das nach über einem Jahrhundert der Teilung durch seine Nachbarn vor kurzem seine Unabhängigkeit wiedererlangt hat. Polen wird als Republik mit einem Präsidenten als Staatsoberhaupt regiert. Polen steht vor zahlreichen Herausforderungen, darunter wirtschaftliche Instabilität und politische Spannungen mit den Nachbarstaaten. Das Land ist bestrebt, sein Militär zu stärken und Bündnisse mit anderen Nationen zu schließen, um seine Grenzen zu sichern und seine Souveränität zu wahren."
 POR_RISE_OF_EVIL_DESC:0 "Portugal ist ein kleines, aber stolzes Land mit einer starken Militärtradition und einer reichen Geschichte der Entdeckungsreisen und Eroberungen. Trotz wirtschaftlicher Herausforderungen in den letzten Jahren ist die Regierung entschlossen, das Land zu modernisieren und eine stärkere, wohlhabendere Zukunft aufzubauen. Portugal pflegt freundschaftliche Beziehungen zu seinen Nachbarn, ist aber weiterhin vorsichtig gegenüber möglichen Bedrohungen seiner Souveränität und Unabhängigkeit. Die Streitkräfte sind gut ausgebildet und ausgerüstet und stehen bereit, die Interessen des Landes im In- und Ausland zu verteidigen."
 ROM_RISE_OF_EVIL_DESC:0 "Rumänien befand sich im Ersten Weltkrieg auf der Siegerseite und gewann dadurch neue Gebiete und Menschen hinzu – nicht alle davon waren Rumänen. Um den Ansprüchen jener Länder entgegenzuwirken, die gezwungen waren, Land abzutreten, um das zurückzugewinnen, was ihnen ihrer Meinung nach rechtmäßig zusteht.\n\nMit der sich verändernden politischen Lage in Europa könnte Rumänien möglicherweise allein dastehen – und verwundbar..."
 SAU_RISE_OF_EVIL_DESC:0 "Saudi-Arabien liegt auf der Arabischen Halbinsel und ist ein junger Staat, der in den letzten Jahren vom Haus Saud gegründet wurde. Das von König Abdulaziz Al Saud regierte Land verfügt über riesige Ölreserven, deren Erschließung gerade erst beginnt. Obwohl Saudi-Arabien streng islamische Gesetze praktiziert, strebt es die Modernisierung und den Ausbau seiner Infrastruktur an und behauptet gleichzeitig seine Unabhängigkeit gegenüber seinen Nachbarn."
 SIA_RISE_OF_EVIL_DESC:0 "Siam, auch bekannt als Thailand, ist eine konstitutionelle Monarchie unter der Herrschaft von König Prajadhipok. Trotz seiner traditionellen Kultur und Bräuche modernisiert sich das Land unter der Führung seiner jungen und ehrgeizigen Führer rasant. Dank seiner strategischen Lage in Südostasien versucht Siam, seinen Einfluss in der Region auszuweiten und sich durch Diplomatie und militärische Stärke als Großmacht zu etablieren."
 SHX_RISE_OF_EVIL_DESC:0 "Yan Xishan kontrollierte einst einen großen Teil Nordchinas, bevor er im Zentralebenenkrieg besiegt wurde. Jetzt ist ihm nur noch ein kleiner Regierungsbereich geblieben und er wird von zwei Mächten bedroht: dem Japanischen Kaiserreich im Nordosten und der Nationalregierung im Süden.\n\nKann Yan Xishans Shansi-Clique trotz des Drucks einen Ausweg aus ihrer eigenen Zukunft finden?"
 SIK_RISE_OF_EVIL_DESC:0 "Die Xinjiang-Clique unter Sheng Shicai regiert Xinjiang als sowjetisch unterstützten Kriegsherrenstaat. Politik und Wirtschaft, nominell chinesisch, stehen unter sowjetischer Kontrolle. Die heterogene Bevölkerung der Region – Uiguren, Kasachen, Hui und Han – leidet unter ethnischen Spannungen, insbesondere zwischen Muslimen und Han-Regierungen. Sheng behält die Kontrolle, unterdrückt abweichende Meinungen und setzt sowjetische Maßnahmen wie Landreformen und Säuberungen durch. Trotz seiner Abgeschiedenheit ist Xinjiang aufgrund seiner natürlichen Ressourcen und strategischen Handelsrouten von strategischer Bedeutung."
 SPR_RISE_OF_EVIL_DESC:0 "1933: Spanien ist eine stark polarisierte Republik in einem Zustand politischer und sozialer Unruhen. Die Zweite Spanische Republik unter Präsident Niceto Alcalá-Zamora kämpft mit Konflikten zwischen Konservativen, Sozialisten, Separatisten und Anarchisten. Streiks und Arbeitslosigkeit werden durch die Weltwirtschaftskrise angeheizt, und die Spannungen zwischen Kirche, Armee, Großgrundbesitzern und Arbeitern eskalieren. Während die politische Gewalt eskaliert, steuert Spanien auf eine größere Konfrontation zu."
 SWI_RISE_OF_EVIL_DESC:0 "Die Schweiz ist eine solide, neutrale Demokratie im Herzen Europas und vom wachsenden politischen Extremismus in ihrem Umfeld unberührt geblieben. Das von einem Bundesrat regierte Land blickt auf eine lange Tradition der direkten Demokratie und politischen Neutralität zurück. Bankwesen, Feinmechanik und Handel treiben die Wirtschaft an, sind jedoch durch die globalen Folgen der Weltwirtschaftskrise bedroht. Die Schweizer Gesellschaft ist multiethnisch und mehrsprachig: Deutsch-, Französisch- und Italienischsprachige leben in einem föderalen System zusammen. In einem zunehmenden Spannungsfeld in Europa baut die Schweiz ihre militärische Stärke aus, um ihre Unabhängigkeit zu schützen."
 TIB_RISE_OF_EVIL_DESC:0 "Tibet ist ein unabhängiger theokratischer Staat unter der Herrschaft des 13. Dalai Lama, Thubten Gyatso.\n\nDer Staat hat seinen Sitz in Lhasa und wird von buddhistischen Mönchen geführt. Das feudale Regierungssystem umfasst Klöster und Aristokraten mit erheblicher Macht. Die Wirtschaft ist landwirtschaftlich geprägt und basiert auf Subsistenzwirtschaft und Handel mit Indien und China. Die tibetische Gesellschaft ist tief religiös, wobei der Buddhismus den Alltag, die Regierung und das Bildungswesen prägt. Obwohl Tibet faktisch unabhängig ist, ist es externen Bedrohungen ausgesetzt, insbesondere durch China, das das Gebiet weiterhin als Teil seines Herrschaftsbereichs betrachtet."
 TUR_RISE_OF_EVIL_DESC:0 "Unter Mustafa Kemal Atatürk modernisiert und säkularisiert sich die Türkei rasant und wandelt sich vom Osmanischen Reich zu einer Reformrepublik. Atatürks Regierung verfolgt eine strikte Säkularpolitik, schwächt die Stellung des Islam im öffentlichen Leben ab und fördert westlich geprägte Institutionen. Die Wirtschaft erholt sich vom Zusammenbruch der osmanischen Wirtschaft. Staatliche Industrialisierungsprogramme zielen auf den Aufbau der nationalen Infrastruktur ab. Die türkische Gesellschaft verändert sich, traditionelle Lebensweisen stehen im Widerspruch zu Atatürks Vision eines modernen, säkularen Staates."
 VEN_RISE_OF_EVIL_DESC:0 "Venezuela steht seit 1908 unter der Herrschaft von Juan Vicente Gómez, der das Land mit eiserner Hand regiert. Das Land ist eine Ölnation und damit eine der reichsten Nationen Lateinamerikas, obwohl der Wohlstand auf die Elite konzentriert ist. Politisch wird jede Opposition gnadenlos unterdrückt, und Gómez&#39; Herrschaft ist geprägt von Militärherrschaft und Vetternwirtschaft.\n\nDie venezolanische Gesellschaft ist nach wie vor weitgehend ländlich geprägt, mit tiefen sozialen Unterschieden zwischen der herrschenden Klasse und der Bauernschaft. Obwohl Gómez&#39; Regierung sicher ist, stellt sein schlechter Gesundheitszustand die politischen Aussichten des Landes in Frage."
 XSM_RISE_OF_EVIL_DESC:0 "Xibei San Ma, ein locker kontrolliertes Gebiet im Nordwesten Chinas, wird von drei muslimischen Kriegsherren der Ma-Familie regiert. Als Teil der Republik China herrscht unter Ma Bufang, Ma Hongkui und insbesondere Ma Zhongying ein höheres Maß an lokaler Autonomie. Die wirtschaftlichen Aktivitäten in dieser Region basieren auf Landwirtschaft und Handel, kombiniert mit militärischen Subventionen aus der Zentralregierung. Die Gesellschaft ist eine Mischung aus Han-Chinesen und Hui-Muslimen, und der Islam spielt im täglichen Leben eine bedeutende Rolle. Inmitten der politischen Instabilität Chinas balanciert Xibei San Ma seine Loyalität gegenüber der Kuomintang mit der Verfolgung eigener militärischer und territorialer Interessen."
 YUG_RISE_OF_EVIL_DESC:0 "Jugoslawien, regiert von König Alexander I., steht seit 1929 unter königlicher Diktatur, um ethnische und politische Unruhen zu unterdrücken. Das multiethnische Königreich leidet unter tiefen nationalen Identitätskonflikten, darunter Sezessionsbewegungen in Kroatien und Mazedonien. Zerrissen durch die Weltwirtschaftskrise, ländliche Armut und eine unterentwickelte Industrie, brodeln die Spannungen. Während Alexander die Vereinigung anstrebt, bedrohen nationalistische Spannungen die Sicherheit des Königreichs."
 YUN_RISE_OF_EVIL_DESC:0 "Die Yunnan-Clique kontrolliert die südwestliche Provinz Yunnan als halbunabhängigen Warlord-Staat unter der Kontrolle von Long Yun. Nominell der Kuomintang-Regierung (KMT) unterstellt, hat Yunnan eine unabhängige politische und militärische Kontrolle. Die Wirtschaft der Region ist landwirtschaftlich geprägt, opiumorientiert und industriell rückständig. Aufgrund seiner geografischen Unzugänglichkeit und strategischen Lage nimmt Yunnan eine führende Rolle in Chinas zerfallener politischer Landschaft ein.\n\nLong Yun hat die lokale Kontrolle inne, wobei die Loyalitäten zwischen der Zentralregierung, Warlords und ausländischen Nationen schwanken."
 OTHER_RISE_OF_EVIL_DESC:0 "Die Nationen der Welt, ob groß oder klein, geben sich nicht damit zufrieden, den Atem anzuhalten und auf den Ausbruch eines weiteren globalen Konflikts zu warten. Von den Großmächten am Rande eines Bürgerkriegs bis hin zu den vielen Nationen, die durch den Ersten Weltkrieg entstanden und verändert wurden, werden alle schwierige Entscheidungen treffen und ihre Ideale mit Pragmatismus in Einklang bringen müssen, um die Zukunft der Welt mitzugestalten."
 
 
 ###########################################
 ################## 1936 ###################
 ###########################################
 
 GATHERING_STORM_NAME:0 "Aufziehender Sturm"
 GATHERING_STORM_DESC:0 "Es brechen dunkle Zeiten an. In Europa hat Adolf Hitler seine Macht gefestigt, und seine Aufmerksamkeit richtet sich zunehmend über die deutschen Grenzen hinaus. Benito Mussolinis Italien stürzt sich weiterhin in waghalsige militärische Abenteuer. In Asien steht das japanische Kaiserreich unterdessen kurz vor einem Angriff auf China. Noch nicht einmal eine Generation ist seit dem Ende des Ersten Weltkriegs vergangen, und die Welt scheint erneut mit Benzin übergossen zu sein. Ein einziger Funke könnte genügen."
 HITTING_FAN_NAME:0 "Der Schlag gegen den Ventilator"
 HITTING_FAN_DESC:0 "Ja, das stimmt! Diese Regenschirmsammlung wird sich als wirklich nützlich erweisen."
 ENG_GATHERING_STORM_DESC:0 "Obwohl das Vereinigte Königreich den Ersten Weltkrieg siegreich beendete, wurden die Grundlagen seines Imperiums bis ins Mark erschüttert. Eine Generation seiner besten jungen Männer fiel auf den Schlachtfeldern Flanderns und Nordfrankreichs, während sich im gesamten Commonwealth Unruhen ausbreiteten und enorme Schulden anhäuften. Das Trauma des letzten Krieges ist noch frisch in Erinnerung, und nun steht das Land vor der Aussicht auf einen weiteren Krieg. Es wird immer deutlicher, dass es keinen „Frieden für unsere Zeit“ geben wird."
 FRA_GATHERING_STORM_DESC:0 "Trotz der Verwüstungen des Ersten Weltkriegs befindet sich Frankreich dank seiner starken Wirtschaft, die durch deutsche Reparationszahlungen unterstützt wird, auf dem Weg der Erholung. Die Große Depression hat das Land jedoch noch immer beeinträchtigt, und das neue deutsche Regime zeigt wenig Interesse daran, die im Versailler Vertrag festgelegten Reparationszahlungen weiter zu zahlen. Angesichts der politischen Unruhen im eigenen Land erscheinen die Worte von Marschall Ferdinand Foch bei der Unterzeichnung des Vertrags: „Dies ist kein Frieden. Es ist ein Waffenstillstand für zwanzig Jahre.“ als ein gutes Omen. Diese zwanzig Jahre laufen schnell ab."
 GER_GATHERING_STORM_DESC:0 "Ein neues, stolzes Deutschland ist entstanden. Drei Jahre sind vergangen, seit die Weimarer Republik aufgelöst und durch Adolf Hitlers „Drittes Reich“ ersetzt wurde. Nach den schwierigen Jahren der „Großen Depression“ ist die wirtschaftliche Stabilität zurückgekehrt, und Massenarbeitslosigkeit gehört der Vergangenheit an. Die militärischen Beschränkungen, die Deutschland durch den Versailler Vertrag auferlegt wurden, sind längst vergessen, und die Wehrmacht wird täglich stärker. Könnten angesichts der Gerüchte über eine deutsche Wiederaufrüstung weitere Konflikte bevorstehen?"
 ITA_GATHERING_STORM_DESC:0 "Nach dem Aufstieg des Faschismus erwartet Italien eine neue glorreiche Ära. Seine Streitkräfte versuchen derzeit, Äthiopien zu „überreden“, dem wachsenden italienischen Kolonialreich beizutreten. Doch hören Benito Mussolinis Ambitionen damit auf?\n\nDie Herrschaft über den Mittelmeerraum war doch schon immer Italiens Schicksal. Angesichts der sich in Europa scheinbar abzeichnenden Neuordnung der Dinge muss Italien bei der Flutwelle des Wandels einen Platz auf deren Höhepunkt finden, sonst läuft es Gefahr, weggespült zu werden."
 JAP_GATHERING_STORM_DESC:0 "Das japanische Kaiserreich steht an einem Scheideweg. Die Armee vertritt die Doktrin der nördlichen Expansion, „Hokushin-ron“, die einen Vormarsch nach Russland und China vorsieht. Die Marine hingegen unterstützt die Doktrin der südlichen Expansion, „Nanshin-ron“, die die rohstoffreichen europäischen Kolonien in Südostasien und im Pazifik zum Ziel hat.\n\nJapan verfügt über ein beeindruckendes Militär, doch seine Industrie benötigt dringend Ressourcen und die Zeit scheint knapp zu werden. Welchen Weg soll man wählen?"
 SOV_GATHERING_STORM_DESC:0 "„Ein Gespenst geht um in Europa – das Gespenst des Kommunismus.“\nAls sich der Staub nach dem Bürgerkrieg gelegt hatte, war die UdSSR als unangefochtene Herrscherin über weite Teile des ehemaligen Russischen Reiches hervorgegangen. Es folgten eine rasante staatliche Industrialisierung und Kollektivismus, oft mit hohen Opferzahlen.\n\nNun sieht sich die Sowjetunion mit der Bedrohung durch ein wiedererstarktes Deutschland im Westen und ein kriegerisches Japan im Osten konfrontiert. Auch innerhalb der Kommunistischen Partei gibt es interne Bedrohungen, mit denen sie sich auseinandersetzen muss..."
 USA_GATHERING_STORM_DESC:0 "Nach dem Ersten Weltkrieg zogen sich die Vereinigten Staaten in den Isolationismus zurück und erlebten in den Goldenen Zwanzigern eine Zeit wirtschaftlichen Wohlstands. Diese fand jedoch ein dramatisches Ende, als die Nation 1929 von der „Großen Depression“ erfasst wurde. Die amerikanische Politik der Nichteinmischung in ausländische Kriege blieb bestehen, doch die Spannungen in Europa und Asien nehmen zu. Die „Große Neutrale“ könnte – ob gewollt oder nicht – in den Strudel hineingezogen werden."
 OTHER_GATHERING_STORM_DESC:0 "Die Nationen der Welt, ob groß oder klein, geben sich nicht damit zufrieden, den Atem anzuhalten und auf den Ausbruch eines weiteren globalen Konflikts zu warten. Von den Großmächten am Rande eines Bürgerkriegs bis hin zu den vielen Nationen, die durch den Ersten Weltkrieg entstanden und verändert wurden, werden alle schwierige Entscheidungen treffen und ihre Ideale mit Pragmatismus in Einklang bringen müssen, um die Zukunft der Welt mitzugestalten."
 POL_GATHERING_STORM_DESC:1 "Nach Jahrhunderten der Aufteilung Polens in drei Reiche ist es nun wieder stolz auf seine Unabhängigkeit. Seine politische Lage ist jedoch nicht einfach.\n\nIm Osten hat die Sowjetunion ihre demütigende Niederlage im polnisch-sowjetischen Krieg nicht vergessen.\n\nIm Westen macht der deutsche Führer Adolf Hitler keinen Hehl aus seinem Wunsch nach mehr Lebensraum für sein Volk. Das ehemalige deutsche Land, das jetzt unter polnischer Kontrolle steht, ist der erste Schritt auf dem Weg dorthin."
 CAN_GATHERING_STORM_DESC:0 "Kanada trat dem Ersten Weltkrieg als britische Kolonie bei und verließ ihn als Nation. Geboren im Schlamm von Passchendaele, unternimmt Kanada nun seine ersten unsicheren Schritte auf die Weltbühne.\n\nGeschwächt durch die „Große Depression“ und mit internen Spaltungen zwischen Anglophonen und Frankophonen sieht die Zukunft dieser relativ jungen Nation alles andere als sicher aus."
 AST_GATHERING_STORM_DESC:0 "Die Australier haben sich ihren Platz in den Geschichtsbüchern des Ersten Weltkriegs mit ihrem Blut verdient. Die Opfer der Gallipoli-Kampagne sind unvergessen – und auch diejenigen, die sie angeordnet haben. Australien steht nun am Scheideweg: Soll es bei seinem Kolonialherrn bleiben, der höchstwahrscheinlich in weitere Konflikte im fernen Europa hineingezogen wird, oder soll es sich auf die Bedrohung konzentrieren, die viel näher an der Heimat lauert?"
 SAF_GATHERING_STORM_DESC:0 "Zu Beginn des Ersten Weltkriegs weigerten sich viele Südafrikaner, für ihre britischen Herren zu den Waffen zu greifen. Das Militär verbrachte den Großteil des Krieges damit, deutsche Truppen um die afrikanischen Kolonien zu jagen – mit mäßigem Erfolg. Nun droht ein neuer Krieg. Damals wie heute gibt es einige, die der Meinung sind, Südafrika sollte überhaupt nicht gegen die Deutschen kämpfen. Manche glauben sogar, es sei an der Zeit, dass die Nachkommen der Buren die Freiheit zurückfordern, die ihren Vorfahren verwehrt blieb."
 NZL_GATHERING_STORM_DESC:0 "Die kleine Nation im Südpazifik kämpfte tapfer im Ersten Weltkrieg und erlitt hohe Verluste in den blutigen Schlachten bei Gallipoli und an der Westfront. Fast die Hälfte der Männer im kampffähigen Alter hatte in Übersee gedient und viele kehrten nicht zurück. Rund zwanzig Jahre nach dem Ende des Ersten Weltkriegs blickt die Bevölkerung Neuseelands besorgt auf das Weltgeschehen, denn dieses Mal rückt die Kriegsgefahr immer näher an ihr Heimatland heran..."
 RAJ_GATHERING_STORM_DESC:0 "Das „Kronjuwel“ des britischen Empires, die indische Herrschaft, ist eine seltsame Mischung aus imperialer Macht und Ohnmacht. Eine kleine Gruppe britischer Elitebeamter herrscht über einen riesigen Subkontinent mit Hunderten Millionen Untertanen. Aus diesen Reihen rekrutieren sie die indische Armee, die im Ersten Weltkrieg tapfer kämpfte.\n\nIndiens Führer hofften, dass die Opfer des letzten Krieges Indien die Unabhängigkeit von Großbritannien ermöglichen würden, doch bisher wurde diese Hoffnung enttäuscht. Angesichts eines drohenden neuen Krieges glauben viele Inder, dass die Zeit gekommen ist, die Freiheit zu erlangen – mit allen erforderlichen Mitteln."
 CZE_GATHERING_STORM_DESC:0 "Während des Ersten Weltkriegs kämpften tschechische Truppen in ganz Europa an der Seite der Entente, um die Anerkennung ihrer Nation zu erlangen. Ihre Bemühungen waren erfolgreich, und die Tschechoslowakei erhob sich aus der Asche der österreichisch-ungarischen Monarchie.\n\nSeit ihrem explosiven Eintritt in die Eigenstaatlichkeit bildete die Tschechoslowakei mit Jugoslawien und Rumänien die „Kleine Entente“, um Ungarns Bemühungen zur Wiederherstellung der österreichisch-ungarischen Monarchie zu unterdrücken. Mit der zunehmenden Macht Deutschlands verändert sich die politische Landschaft Europas jedoch rapide."
 HUN_GATHERING_STORM_DESC:0 "Ungarn, eine Hälfte des ehemaligen Österreichisch-Ungarischen Reiches, wurde nach dem Ersten Weltkrieg von der siegreichen Entente als besiegter Feind behandelt und verlor im Vertrag von Trianon zwei Drittel seines Territoriums. Millionen von Ungarn mussten außerhalb der Landesgrenzen leben, und die Wirtschaft Ungarns lag am Boden. Strenge Beschränkungen der Wiederbewaffnung sollten sicherstellen, dass Ungarn nie wieder den Frieden in Europa gefährden konnte.\n\nAngesichts des sich verändernden politischen Klimas in Europa ist es vielleicht an der Zeit, die Fehler der Vergangenheit zu korrigieren und den einstigen Ruhm der Nation wiederherzustellen."
 ROM_GATHERING_STORM_DESC:0 "Rumänien war im Ersten Weltkrieg auf der Siegerseite und gewann dadurch neue Gebiete und Menschen hinzu – nicht alle davon waren Rumänen. Um den Ansprüchen jener Länder entgegenzuwirken, die gezwungen waren, Land abzutreten, um das zurückzugewinnen, was ihnen ihrer Meinung nach rechtmäßig zusteht, knüpfte Rumänien ein Netz von Allianzen auf dem Balkan. In den letzten Jahren beschäftigte es sich jedoch hauptsächlich mit innenpolitischen Angelegenheiten, und die Regierung von König Karl II. ließ diese Allianzen erlöschen. \n\nMit der sich verändernden politischen Lage in Europa könnte Rumänien nun allein dastehen – und verwundbar."
 YUG_GATHERING_STORM_DESC:0 "Jugoslawien entstand 1922 durch den Zusammenschluss der Serben, Kroaten und Slowenen mit dem ehemals unabhängigen Königreich Serbien. Ursprünglich schloss sich Jugoslawien sowohl der Kleinen Entente als auch dem Balkanpakt an, um seine Unabhängigkeit zu sichern. Doch die Ermordung von König Alexander I. sowie der wachsende Druck von innen durch Nationalisten und von außen durch Italien und Deutschland führten in jüngster Zeit zu drastischen Umwälzungen und machten eine Neubewertung der politischen und strategischen Position des Landes erforderlich."
 MAN_GATHERING_STORM_DESC:0 "Puyi, der letzte chinesische Kaiser, wurde im Alter von sechs Jahren vom Drachenthron vertrieben und wartet nun auf den richtigen Zeitpunkt. Während sein ehemaliges Reich im chinesischen Bürgerkrieg zerbrach, fand Puyi in Japan neue Verbündete.\n\nFür Puyi war die Gründung des Mandschukuo-Kaiserreichs 1932 nur der erste Schritt auf dem Weg, sein angestammtes Geburtsrecht zurückzuerlangen. Im Moment ist er noch auf die japanische Armee angewiesen, um seine Herrschaft aufrechtzuerhalten, doch mit der Zeit könnte sich die Gelegenheit ergeben, die Fesseln der Knechtschaft abzuschütteln und zu dem zu werden, wozu er geboren wurde …"
 CHI_GATHERING_STORM_DESC:0 "Nach der Revolution, die den letzten Qing-Kaiser stürzte, kämpft die junge chinesische Republik ums Überleben. Kriegsherren beherrschen weite Teile des Landes an der Peripherie. Im Herzen des Landes haben die Kommunisten in einem abgelegenen Bergtal ein Stützpunktgebiet errichtet. Gleich hinter der Grenze haben die Japaner eine Marionettenregierung unter dem letzten chinesischen Kaiser eingesetzt und versuchen, das Land unter seiner Herrschaft wieder zu vereinen.\n\nAngesichts der Bedrohung durch zahlreiche Feinde muss die Regierung von Chiang Kai-Shek schwierige Entscheidungen treffen, wenn sie überleben und die unangefochtene Oberhoheit in China behalten will."
 PRC_GATHERING_STORM_DESC:0 "Vor gerade einmal zwei Jahren stand die Kommunistische Partei Chinas vor der völligen Vernichtung. Um zu überleben, unternahm sie den langen Marsch. Da nur ein Bruchteil der Armee die Strapazen des Marsches überlebte und kaum Industrie entstand, sind die Aussichten auf einen Sieg im chinesischen Bürgerkrieg gering.\n\nDoch mit der Zeit könnte die Bevölkerung für die kommunistische Sache gewonnen, neue Armeen aufgestellt und neue Stützpunkte errichtet werden. Und wenn die Zeit reif ist, wird der revolutionäre Kampf erneut entbrennen, bis der endgültige Sieg errungen ist."
 WARLORDS_GATHERING_STORM_DESC:0 "Die Schwäche der Zentralregierung könnte einem ehrgeizigen Mann die Chance bieten, an die Macht zu kommen. An der Peripherie des Landes haben sich lokale Führer ihre eigenen kleinen Lehen geschaffen und kümmern sich wenig um die Befehle der Zentralregierung. Ein Krieg steht bevor, und jeder dieser Kriegsherren steht vor einer schwierigen Entscheidung: Zusammenarbeit mit der Zentralregierung oder ein Bündnis mit den Kommunisten? Beide Optionen versprechen die Chance auf einen Platz am Verhandlungstisch, aber es gibt noch eine dritte Möglichkeit: China ganz für sich zu beanspruchen."
 TUR_GATHERING_STORM_DESC:0 "Die junge Republik Türkei hat ihre osmanische Vergangenheit endgültig hinter sich gelassen. Unter der Führung Mustafa Kemals gehören die alten Traditionen der Vergangenheit an und eine neue, modernere Türkei entsteht. Ist die Türkei aufgrund ihrer geografischen Lage gut positioniert, um von einem erneuten Kriegsausbruch in Europa zu profitieren? Wird sie sich im Falle eines Angriffs einer der großen Fraktionen verteidigen können?"
 FIN_GATHERING_STORM_DESC:0 "Die Republik Finnland blickt besorgt gen Osten. Trotz einer deutlichen Erholung von der Großen Depression beginnen die diplomatischen Beziehungen zum russischen Bären angespannt zu werden. Gerüchten zufolge soll in der ehemaligen finnischen Region Karelien das Blut finnischer Zivilisten vergossen werden. Sollte es zu einem Konflikt kommen, ist unser kleines Land den mächtigen Sowjets nicht gewachsen. Vielleicht gelingt es uns aber doch, ihnen eine blutige Nase zu verpassen und willige Verbündete zu finden, die uns unterstützen?"
 SWE_GATHERING_STORM_DESC:0 "Schweden baut seine Industriebasis stetig aus, um die Nachfrage nach Stahl, Kugellagern und Holzprodukten zu decken. Kann dieses fruchtbare sozialdemokratische Land einen möglichen europäischen Konflikt überstehen?\n\nBöte ein solcher Konflikt dem Land vielleicht die Möglichkeit, sich mit seinen skandinavischen Nachbarn zusammenzuschließen und gemeinsam seinen gemeinsamen Feinden entgegenzutreten? "
 HOL_GATHERING_STORM_DESC:0 "Holland spürt noch immer die lähmenden Auswirkungen der „Großen Depression“. Wird das Land angesichts der wachsenden Unruhe in der Zivilbevölkerung gezwungen sein, den „Goldstandard“ aufzugeben, den viele für die aktuellen Probleme verantwortlich machen?\n\nUnterdessen verlässt sich die niederländische Regierung stark auf ihre erklärte Neutralität, um nicht in einen europäischen Konflikt verwickelt zu werden, sollte es dazu kommen."
 BEL_GATHERING_STORM_DESC:0 "Belgien mag von manchen als unbedeutendes Territorium angesehen werden, doch seine Stellung als dicht industrialisiertes Land, das wertvolle Ressourcen aus seiner afrikanischen Kolonie gewinnt, macht es zu einem potenziellen Ziel für diejenigen mit hohen Ambitionen...\n\nObwohl sich das Land von der „Großen Depression“ erholt und große Infrastrukturprojekte im Gange sind, scheint es immer noch so, dass eine größere Zahl von Wählern Lösungen in extremistischen Diskursen sucht. Leon Degrelle gewinnt an Popularität und könnte die traditionellen Koalitionen der demokratischen Parteien bedrohen. Auch flämische Nationalisten sind aktiv und stiften Unruhe unter flämischen Soldaten!"
 IRE_GATHERING_STORM_DESC:0 "Dem Irischen Freistaat ist es trotz der Ausbreitung von Diktaturen auf dem europäischen Festland und der „Großen Depression“ gelungen, eine Demokratie zu bleiben.\n\nSollte sich die Nation angesichts eines möglicherweise bevorstehenden neuen Weltkonflikts mit den Feinden des verhassten Vereinigten Königreichs verbünden oder sollte sie versuchen, neutral zu bleiben und ihre Unabhängigkeit und ein vereintes Irland auf diplomatischem Wege zu erreichen?"
 SPR_GATHERING_STORM_DESC:0 "Die 1931 gegründete Zweite Spanische Republik ist zerrüttet. Der Sturz der zentristischen Regierung von Alejandro Lerroux aufgrund von Korruptionsskandalen führte im Februar zu Neuwahlen. Inzwischen regiert die Regierung von Manuel Portela das Land.\n\nAngetrieben von den Linksrepublikanern und der PCE haben sich die linken Kräfte, mit Ausnahme der anarchistischen CNT, in der Volksfront zusammengeschlossen. Die Rechte ist derweil in Monarchisten, Faschisten und die legalistische CEDA gespalten. Wie kann Spanien am Rande eines Bürgerkriegs, von Gewalt zerfressen und modernisierungsbedürftig überleben?"
 POR_GATHERING_STORM_DESC:0 "Die Zweite Portugiesische Republik unter der Führung von António de Oliveira Salazar ist ein leicht faschistischer kooperativer Staat unter der Führung eines Einparteienregimes.\n\nWie wird dieses Land reagieren, wenn sein einziger Nachbar scheinbar auf einen Bürgerkrieg zusteuert und an seinen Grenzen ein weiterer Krieg ausbricht? "
 IRQ_GATHERING_STORM_DESC:0 "Der Irak entstand aus drei ehemaligen osmanischen Vilajets und wurde 1920 unter britischer Verwaltung von König Faisal gegründet. 1932 erlangte er die Unabhängigkeit, blieb jedoch weiterhin in Großbritannien präsent. Nach Faisals Tod 1933 geriet das Land in einen Konflikt, der jederzeit in einen Bürgerkrieg ausbrechen konnte. Auf der einen Seite die Nationalisten, auf der anderen die pro-britischen Militanten.\n\nWirst du die Stabilität deines Landes wiederherstellen können? Oder wirst du es in den Ruin treiben?"
 BUL_GATHERING_STORM_DESC:0 "Bulgarien befand sich im Ersten Weltkrieg auf der Verliererseite. Was vom Dritten Bulgarischen Reich noch übrig war, wurde von den Alliierten und deren erzwungener Entmilitarisierung zerstört. Zusätzlich zu den Forderungen der Westmächte verhängten auch die Balkanstaaten Beschränkungen gegen Bulgarien. \n\nIm Gegensatz zu Österreich, Deutschland und Ungarn hatte Bulgarien jedoch eine lückenlose Verpflichtung gegenüber den Friedensforderungen der Alliierten."
 ALB_GATHERING_STORM_DESC:0 "Albanien befindet sich 1936 in einer prekären Lage, umgeben von größeren und mächtigeren Nachbarn. Das Land wird zwar demokratisch regiert, ist aber aufgrund seiner geringen Größe und begrenzten Ressourcen anfällig für äußeren Druck. Angesichts der zunehmenden Spannungen in Europa muss Albanien umsichtig agieren, um seine Souveränität und Unabhängigkeit zu schützen."
 ARG_GATHERING_STORM_DESC:0 "Argentinien ist im Jahr 1936 ein Land, das von politischer Stabilität und wirtschaftlichem Wohlstand geprägt ist. Unter einer demokratischen Regierung gelang es Argentinien, Konflikte zu vermeiden, die andere Nationen plagten. Die zunehmenden Spannungen in Europa und der Welt drohen jedoch diesen Frieden zu stören und zwingen Argentinien, seine Position auf der Weltbühne zu überdenken."
 AST_GATHERING_STORM_DESC:0 "Österreich steht 1936 vor einer schwierigen Zeit, nachdem es die Weltwirtschaftskrise gerade überwunden hat. Obwohl es eine Demokratie ist, ist die politische Landschaft Österreichs von Instabilität und inneren Spaltungen geprägt. Die Entscheidung des Landes, im Commonwealth zu bleiben oder es zu verlassen, wird erhebliche Auswirkungen auf seine Zukunft haben."
 AUS_GATHERING_STORM_DESC:0 "Seit dem Ende des Ersten Weltkriegs ist Österreich weltweit isoliert. Der Anschluss wurde durch den Versailler Vertrag von 1919 verboten, und Österreich erlitt erhebliche Gebietsverluste. Österreich erlebte einen Aufschwung des Rechtspopulismus und schließlich die Errichtung einer Diktatur. Nach der Ermordung Dolfußes 1934 ist Kurt Schuschnigg nun an der Macht, doch seine Position ist angesichts des zunehmenden Drucks Deutschlands und Italiens noch immer schwach. Auch die Alliierten haben Österreich und seiner Unabhängigkeit in dieser prekären Lage bislang keine Unterstützung zugesagt. Nur die Zeit wird zeigen, ob Österreich den kommenden Sturm überstehen kann …"
 BEL_GATHERING_STORM_DESC:0 "Belgien ist 1936 ein Land, das für seine Neutralität und politische Stabilität bekannt ist. Unter einer demokratischen Regierung gelang es Belgien, Konflikte zu vermeiden, die andere Nationen plagten. Die zunehmenden Spannungen in Europa drohen jedoch diesen Frieden zu stören und zwingen Belgien, seine Position zu überdenken."
 BHU_GATHERING_STORM_DESC:0 "Bhutan ist 1936 ein kleines, isoliertes Königreich im Himalaya. Dank seines demokratischen Systems konnte Bhutan seine Unabhängigkeit und traditionelle Lebensweise bewahren. Das Königreich sieht sich jedoch mit Herausforderungen durch seine größeren Nachbarn konfrontiert und muss seine Außenbeziehungen sorgfältig gestalten, um sein Überleben zu sichern."
 BOL_GATHERING_STORM_DESC:0 "Bolivien im Jahr 1936 ist ein Land, das von politischer Instabilität und wirtschaftlichen Herausforderungen geprägt ist. Trotz seiner demokratischen Regierung kämpft Bolivien mit Armut, Korruption und sozialen Unruhen. Die Zukunft des Landes steht auf dem Spiel, während es versucht, diese Probleme anzugehen und eine bessere Zukunft für seine Bevölkerung aufzubauen."
 BRA_GATHERING_STORM_DESC:0 "Brasilien befindet sich im Jahr 1936 in einem tiefgreifenden politischen und wirtschaftlichen Wandel. Unter einer demokratischen Regierung erlebte Brasilien eine rasante Industrialisierung und Urbanisierung. Das Land steht jedoch vor Herausforderungen wie Einkommensungleichheit und politischer Korruption, die diesen Fortschritt zu untergraben drohen."
 RAJ_GATHERING_STORM_DESC:0 "Die britische Kolonialherrschaft im Jahr 1936 ist das Herzstück des britischen Empires. Dank eines demokratischen Systems gelang es der Kolonialherrschaft, relativen Frieden und Stabilität zu bewahren. Die zunehmenden Forderungen nach Unabhängigkeit und die zunehmenden Spannungen in Europa stellen die Zukunft der Kolonialherrschaft jedoch vor Herausforderungen."
 BUL_GATHERING_STORM_DESC:0 "Bulgarien im Jahr 1936 ist ein Land, das von politischer Instabilität und wirtschaftlichen Herausforderungen geprägt ist. Trotz seiner demokratischen Regierung kämpft Bulgarien mit Armut, Korruption und sozialen Unruhen. Die Zukunft des Landes steht auf dem Spiel, während es versucht, diese Probleme anzugehen und eine wohlhabendere Zukunft für seine Bevölkerung aufzubauen."
 CAN_GATHERING_STORM_DESC:0 "Kanada ist im Jahr 1936 ein Land, das für seine enormen natürlichen Ressourcen und seine politische Stabilität bekannt ist. Unter einer demokratischen Regierung ist es Kanada gelungen, Konflikte zu vermeiden, die andere Nationen plagten. Die zunehmenden Spannungen in Europa drohen jedoch diesen Frieden zu stören und zwingen Kanada, seine Position zu überdenken."
 CHL_GATHERING_STORM_DESC:0 "Chile ist im Jahr 1936 ein Land, das sich durch politische Stabilität und wirtschaftlichen Wohlstand auszeichnet. Unter einer demokratischen Regierung gelang es Chile, Konflikte zu vermeiden, die andere Länder plagten. Die zunehmenden Spannungen in Europa und der Welt drohen jedoch diesen Frieden zu stören und zwingen Chile, seine Position auf der Weltbühne zu überdenken."
 COL_GATHERING_STORM_DESC:0 "Kolumbien im Jahr 1936 ist ein Land, das von politischer Instabilität und wirtschaftlichen Herausforderungen geprägt ist. Trotz seiner demokratischen Regierung kämpft Kolumbien mit Armut, Korruption und sozialen Unruhen. Die Zukunft des Landes steht auf dem Spiel, während es versucht, diese Probleme anzugehen und eine bessere Zukunft für seine Bevölkerung aufzubauen."
 PRC_GATHERING_STORM_DESC:0 "China im Jahr 1936 ist ein Land, das von politischen Unruhen und inneren Konflikten geprägt ist. Unter einer kommunistischen Regierung erlebte China bedeutende soziale und wirtschaftliche Veränderungen. Das Land bleibt jedoch gespalten, und verschiedene Fraktionen kämpfen um die Kontrolle. Die Zukunft Chinas angesichts dieser Herausforderungen ist ungewiss."
 CUB_GATHERING_STORM_DESC:0 "Kuba im Jahr 1936 ist ein Land, das von politischer Instabilität und wirtschaftlichen Herausforderungen geprägt ist. Trotz seiner demokratischen Regierung kämpft Kuba mit Armut, Korruption und sozialen Unruhen. Die Zukunft des Landes steht auf dem Spiel, während es versucht, diese Probleme anzugehen und eine wohlhabendere Zukunft für seine Bevölkerung aufzubauen."
 DEN_GATHERING_STORM_DESC:0 "Dänemark ist im Jahr 1936 ein Land, das für seine Neutralität und politische Stabilität bekannt ist. Unter einer demokratischen Regierung gelang es Dänemark, Konflikte zu vermeiden, die andere Nationen plagten. Die zunehmenden Spannungen in Europa drohen jedoch diesen Frieden zu stören und zwingen Dänemark, seine Position zu überdenken."
 EST_GATHERING_STORM_DESC:0 "Estland ist 1936 ein kleines baltisches Land, geprägt vom Unabhängigkeitskampf. Unter einer demokratischen Regierung konnte Estland trotz des Drucks seiner größeren Nachbarn seine Souveränität bewahren. Die Zukunft des Landes bleibt jedoch ungewiss, da es versucht, seinen Platz in der Welt zu sichern."
 FIN_GATHERING_STORM_DESC:0 "Finnland im Jahr 1936 ist ein Land, das vom Kampf um Unabhängigkeit und politische Stabilität geprägt ist. Unter einer demokratischen Regierung konnte Finnland trotz des Drucks seiner größeren Nachbarn seine Souveränität bewahren. Die Zukunft des Landes bleibt jedoch ungewiss, da es versucht, seinen Platz in der Welt zu sichern."
 GRE_GATHERING_STORM_DESC:0 "Griechenland im Jahr 1936 ist ein Land, das von politischer Instabilität und wirtschaftlichen Herausforderungen geprägt ist. Trotz seiner demokratischen Regierung kämpft Griechenland mit Armut, Korruption und sozialen Unruhen. Die Zukunft des Landes steht auf dem Spiel, während es versucht, diese Probleme anzugehen und eine wohlhabendere Zukunft für seine Bevölkerung aufzubauen."
 HOL_GATHERING_STORM_DESC:0 "Die Niederlande im Jahr 1936 sind ein Land, das für seine Neutralität und politische Stabilität bekannt ist. Unter einer demokratischen Regierung ist es den Niederlanden gelungen, Konflikte zu vermeiden, die andere Nationen plagten. Die zunehmenden Spannungen in Europa drohen jedoch diesen Frieden zu stören und zwingen die Niederlande, ihre Position zu überdenken."
 HUN_GATHERING_STORM_DESC:0 "Ungarn im Jahr 1936 ist ein Land, das von politischer Instabilität und wirtschaftlichen Herausforderungen geprägt ist. Trotz seiner demokratischen Regierung kämpft Ungarn mit Armut, Korruption und sozialen Unruhen. Die Zukunft des Landes steht auf dem Spiel, während es versucht, diese Probleme anzugehen und eine wohlhabendere Zukunft für seine Bevölkerung aufzubauen."
 INS_GATHERING_STORM_DESC:0 "Indonesien im Jahr 1936 ist ein Land, das vom Unabhängigkeitskampf geprägt ist. Unter einer demokratischen Regierung gelang es Indonesien, seine Souveränität trotz des Drucks der Kolonialherren zu bewahren. Die Zukunft des Landes bleibt jedoch ungewiss, da es versucht, seinen Platz in der Welt zu sichern."
 IRQ_GATHERING_STORM_DESC:0 "Der Irak im Jahr 1936 ist ein Land, das von politischer Instabilität und äußerem Druck geprägt ist. Trotz seiner demokratischen Regierung kämpft der Irak mit inneren Spaltungen und Konflikten. Die strategische Lage des Landes und die Interessen ausländischer Mächte in der Region erschweren die Zukunft des Landes zusätzlich."
 IRE_GATHERING_STORM_DESC:0 "Irland im Jahr 1936 ist ein Land, das vom Unabhängigkeitskampf geprägt ist. Unter einer demokratischen Regierung gelang es Irland, seine Souveränität trotz des Drucks der Kolonialherren zu bewahren. Die Zukunft des Landes bleibt jedoch ungewiss, da es versucht, seinen Platz in der Welt zu sichern."
 LAT_GATHERING_STORM_DESC:0 "Lettland ist 1936 ein kleines baltisches Land, geprägt vom Unabhängigkeitskampf. Unter einer demokratischen Regierung konnte Lettland trotz des Drucks seiner größeren Nachbarn seine Souveränität bewahren. Die Zukunft des Landes bleibt jedoch ungewiss, da es versucht, seinen Platz in der Welt zu sichern."
 LIB_GATHERING_STORM_DESC:0 "Liberia war 1936 eines der wenigen afrikanischen Länder, das seine Unabhängigkeit bewahrte. Unter einer demokratischen Regierung gelang es Liberia, Konflikte zu vermeiden, die andere Länder heimsuchten. Die zunehmenden Spannungen in der Welt drohen jedoch, diesen Frieden zu stören und zwingen Liberia, seine Position zu überdenken."
 LIT_GATHERING_STORM_DESC:0 "Litauen ist 1936 ein kleines baltisches Land, geprägt vom Unabhängigkeitskampf. Unter einer demokratischen Regierung konnte Litauen trotz des Drucks seiner größeren Nachbarn seine Souveränität bewahren. Die Zukunft des Landes bleibt jedoch ungewiss, da es versucht, seinen Platz in der Welt zu sichern."
 LUX_GATHERING_STORM_DESC:0 "Luxemburg ist im Jahr 1936 ein Land, das für seine Neutralität und politische Stabilität bekannt ist. Unter einer demokratischen Regierung gelang es Luxemburg, Konflikte zu vermeiden, die andere Nationen plagten. Die zunehmenden Spannungen in Europa drohen jedoch diesen Frieden zu stören und zwingen Luxemburg, seine Position zu überdenken."
 MAL_GATHERING_STORM_DESC:0 "Malta ist 1936 ein kleiner Inselstaat im Mittelmeer. Dank seines demokratischen Systems konnte Malta seine Unabhängigkeit und strategische Bedeutung bewahren. Das Land steht jedoch vor Herausforderungen durch seine größeren Nachbarn und muss seine Außenbeziehungen sorgfältig gestalten, um sein Überleben zu sichern."
 MAN_GATHERING_STORM_DESC:0 "Mandschukuo ist ein 1936 von Japan gegründeter Marionettenstaat im Nordosten Chinas. Mandschukuo wird von einem faschistischen Regime regiert und ist stark von seinen japanischen Oberherren beeinflusst. Die Zukunft des Landes ist ungewiss, da es seine komplexe Beziehung zu Japan und seine Position in der Region meistern muss."
 MEN_GATHERING_STORM_DESC:0 "Mengkukuo ist ein 1936 von Japan gegründeter Marionettenstaat im Nordosten Chinas. Mengkukuo wird von einem faschistischen Regime regiert und ist stark von seinen japanischen Oberherren beeinflusst. Die Zukunft des Landes ist ungewiss, da es seine komplexe Beziehung zu Japan und seine Position in der Region meistern muss."
 MEX_GATHERING_STORM_DESC:0 "Mexiko im Jahr 1936 ist ein Land, das von politischer Instabilität und wirtschaftlichen Herausforderungen geprägt ist. Trotz seiner demokratischen Regierung kämpft Mexiko mit Armut, Korruption und sozialen Unruhen. Die Zukunft des Landes steht auf dem Spiel, während es versucht, diese Probleme anzugehen und eine wohlhabendere Zukunft für seine Bevölkerung aufzubauen."
 MON_GATHERING_STORM_DESC:0 "Die Mongolei im Jahr 1936 ist ein Land, das vom Kampf um Unabhängigkeit und politische Stabilität geprägt ist. Unter einer kommunistischen Regierung gelang es der Mongolei, ihre Souveränität trotz des Drucks ihrer größeren Nachbarn zu bewahren. Die Zukunft des Landes bleibt jedoch ungewiss, da es versucht, seinen Platz in der Welt zu sichern."
 CHI_GATHERING_STORM_DESC:0 "Die Schweiz im Jahr 1936 ist ein Land, das für seine Neutralität und politische Stabilität bekannt ist. Dank seines demokratischen Systems konnte die Schweiz relativen Frieden und Wohlstand bewahren. Die zunehmenden Spannungen in Europa drohen diesen Frieden jedoch zu stören und zwingen die Schweiz, ihre Position zu überdenken."
 SAF_GATHERING_STORM_DESC:0 "Südafrika im Jahr 1936 ist ein Land, das von seiner Geschichte des Kolonialismus und der Apartheid geprägt ist. Unter einer demokratischen Regierung kämpft Südafrika darum, das Erbe seiner Vergangenheit aufzuarbeiten und eine integrativere Gesellschaft aufzubauen. Die Zukunft des Landes hängt von seiner Fähigkeit ab, diese Herausforderungen zu meistern und einen neuen Weg einzuschlagen."
 SPR_GATHERING_STORM_DESC:0 "Spanien im Jahr 1936 ist geprägt von politischen Unruhen und inneren Konflikten. Obwohl Spanien eine Demokratie ist, ist es tief gespalten zwischen verschiedenen Fraktionen, darunter Republikanern, Nationalisten und Anarchisten. Die Zukunft des Landes ist angesichts dieser komplexen politischen Dynamik ungewiss."
 SWE_GATHERING_STORM_DESC:0 "Schweden ist im Jahr 1936 ein Land, das für seine Neutralität und politische Stabilität bekannt ist. Unter einer demokratischen Regierung ist es Schweden gelungen, Konflikte zu vermeiden, die andere Nationen plagten. Die zunehmenden Spannungen in Europa drohen jedoch diesen Frieden zu stören und zwingen Schweden, seine Position zu überdenken."
 TIB_GATHERING_STORM_DESC:0 "Tibet im Jahr 1936 ist eine Region, die zwischen konkurrierenden Interessen gefangen ist. Tibet wird von einem demokratischen System regiert und kämpft gegen den Druck seiner mächtigen Nachbarn um seine Unabhängigkeit und Souveränität. Die Zukunft des Landes ist ungewiss, während es versucht, diese Herausforderungen zu meistern und seinen Platz in der Welt zu sichern."
 TUR_GATHERING_STORM_DESC:0 "Die Türkei im Jahr 1936 ist ein Land, das durch den Übergang zur Republik geprägt ist. Unter einer demokratischen Regierung hat die Türkei ein Programm der Modernisierung und Säkularisierung eingeleitet. Das Land steht jedoch vor Herausforderungen durch interne Spaltungen und externen Druck, der seine Stabilität bedroht."
 VEN_GATHERING_STORM_DESC:0 "Venezuela im Jahr 1936 ist ein Land, das von politischer Instabilität und wirtschaftlichen Herausforderungen geprägt ist. Trotz seiner demokratischen Regierung kämpft Venezuela mit Armut, Korruption und sozialen Unruhen. Die Zukunft des Landes steht auf dem Spiel, während es versucht, diese Probleme anzugehen und eine bessere Zukunft für seine Bevölkerung aufzubauen."
 YUG_GATHERING_STORM_DESC:0 "Jugoslawien im Jahr 1936 ist ein Land, das durch seine vielfältige Bevölkerung und komplexe politische Dynamiken geprägt ist. Unter einer demokratischen Regierung kämpft Jugoslawien um Stabilität und Einheit seiner verschiedenen ethnischen Gruppen. Die Zukunft des Landes hängt von seiner Fähigkeit ab, diese Herausforderungen zu meistern und eine gemeinsame Identität zu entwickeln."
 PHI_GATHERING_STORM_DESC:0 "Die Philippinen im Jahr 1936 sind ein Land, das vom Unabhängigkeitskampf geprägt ist. Unter einer demokratischen Regierung gelang es den Philippinen, ihre Souveränität trotz des Drucks der Kolonialherren zu bewahren. Die Zukunft des Landes bleibt jedoch ungewiss, da es versucht, seinen Platz in der Welt zu sichern."
 SWI_GATHERING_STORM_DESC:0 "Die Tschechoslowakei im Jahr 1936 ist ein Land, das sich durch seine junge Gründung und politische Stabilität auszeichnet. Unter einer demokratischen Regierung gelang es der Tschechoslowakei, Frieden und Wohlstand zu bewahren. Das Land steht jedoch vor Herausforderungen durch interne Spaltungen und externen Druck, die seine Stabilität bedrohen."
 SHX_GATHERING_STORM_DESC:0 "Yan Xishan kontrollierte einst einen großen Teil Nordchinas, bevor er im Zentralebenenkrieg besiegt wurde. Jetzt ist ihm nur noch ein kleiner Regierungsbereich geblieben und er wird von drei Mächten bedroht: dem Japanischen Kaiserreich und seinen Marionettenregimen im Norden, der Kommunistischen Partei im Westen und der Nationalregierung im Süden. Kann Yan Xishans Shansi-Clique trotz des Drucks einen Ausweg aus ihrer eigenen Zukunft finden?"

 ###########################################
 ################## 1939 ###################
 ###########################################
 
 BLITZKRIEG_NAME:0 "Blitzkrieg"
 BLITZKRIEG_DESC:0 "In den letzten Jahren kam es in Europa und Asien zu neuen Kriegen. Spanien wird nun von Nationalisten regiert, und Japan kämpft sowohl mit der Sowjetunion als auch mit China um Territorium, wobei letzteres für Japan erfolgreicher war. Der neue Nichtangriffspakt zwischen der Sowjetunion und Deutschland könnte für den Rest Europas schlechte Nachrichten bedeuten."
 ENG_BLITZKRIEG_DESC:0 "Obwohl das Vereinigte Königreich den Ersten Weltkrieg siegreich beendete, wurden die Grundlagen seines Imperiums bis ins Mark erschüttert. Eine Generation der besten Persönlichkeiten des Landes ging in den Schützengräben Flanderns und Nordfrankreichs verloren, während sich im gesamten Commonwealth Unruhen ausbreiteten und enorme Schulden anhäuften. Das Trauma des letzten Krieges ist noch frisch in Erinnerung, und nun steht das Land vor einem weiteren. Es wird immer deutlicher, dass es für unsere Zeit keinen Frieden geben wird."
 FRA_BLITZKRIEG_DESC:0 "Der Erste Weltkrieg ist noch frisch in Erinnerung, und Frankreich steht vor einem neuen Konflikt, nachdem Deutschland gezeigt hat, dass es nicht bereit ist, den Frieden zu wahren. Die Stärkung der Grenzverteidigung und die kluge Wahl der Verbündeten könnten für Frankreich durchaus der Weg sein, einen verheerenden Krieg zu vermeiden.\n\n Frankreich war schon einmal siegreich, und dieses Mal soll es nicht anders sein!"
 GER_BLITZKRIEG_DESC:0 "Nach der Remilitarisierung des Rheinlandes wuchs das Misstrauen Frankreichs und Großbritanniens gegenüber Deutschlands Absichten. Das Münchner Abkommen erlaubte Deutschland, das Sudetenland zum Wohle seines deutschen Volkes zu annektieren. Der Molotow-Ribbentrop-Pakt garantierte den Nichtangriff zwischen Deutschland und der Sowjetunion, legte aber auch die Aufteilung Polens zwischen den beiden Nationen fest. \n\nDeutschland hat zu lange auf diesen Moment gewartet. Jetzt ist es an der Zeit zu handeln!"
 JAP_BLITZKRIEG_DESC:0 "Im Südosten tobt Krieg. Obwohl Japan Anfang 1939 einige Verluste erlitt, befindet sich ein großer Teil des chinesischen Territoriums unter japanischer Kontrolle. Die Spannungen in Europa nehmen zu, und während die Sowjetunion ihre Aufmerksamkeit auf diese Angelegenheiten richtet, sollte sie sich nicht in den Krieg in Asien einmischen. \n\nSobald Chinas Ressourcen in japanischer Hand sind, wird es mit den Sowjets leicht sein, fertig zu werden."
 ITA_BLITZKRIEG_DESC:0 "Mussolini, der italienische Diktator, erlangte vor einem Jahr durch seine Rolle im Münchner Abkommen als Friedensstifter einige Berühmtheit. Die deutsche territoriale Expansion hat Italien jedoch bewusst gemacht, dass es mehr Land zu beanspruchen gibt, wenn eine Einigung mit den Deutschen erzielt werden könnte. \n\nDie Eroberung Albaniens ist lediglich ein Vorgeschmack auf Italiens militärische Fähigkeiten, und der Rest der Welt sollte sich Sorgen machen."
 SOV_BLITZKRIEG_DESC:0 "Die Unterstützung Manuel Azanas und der „Zweiten Spanischen Republik“ während des Spanischen Bürgerkriegs hat die Position der Sowjetunion gegenüber Italien und Deutschland deutlich gemacht. Nach dem Sieg über die japanische Armee in mehreren Grenzkonflikten der jüngeren Vergangenheit erscheint die Sowjetunion heute als eine zu große Macht, als dass ein einzelnes Land ihr Widerstand leisten könnte. \n\nDas Versprechen Deutschlands, die baltischen Staaten und Polen aufzuteilen, ist derzeit willkommen."
 USA_BLITZKRIEG_DESC:0 "Die zunehmenden Spannungen in Europa sind besorgniserregend. Obwohl die USA sich noch nicht wirklich Sorgen machen, könnte die Aggression Deutschlands bald weltweit zu hören sein. Solange es im Westen relativ friedlich ist, sind militärische Vorbereitungen alles in allem vielleicht keine schlechte Idee. \n\nSollten die USA in einen weiteren Krieg hineingezogen werden, werden sie ihn beenden."
 OTHER_BLITZKRIEG_DESC:0 "Die Nationen der Welt, ob groß oder klein, geben sich nicht damit zufrieden, den Atem anzuhalten und auf den Ausbruch eines weiteren globalen Konflikts zu warten. Von den Großmächten am Rande eines Bürgerkriegs bis hin zu den vielen Nationen, die durch den Ersten Weltkrieg entstanden und verändert wurden, werden alle schwierige Entscheidungen treffen und Ideale mit Pragmatismus in Einklang bringen müssen, um die Zukunft der Welt mitzugestalten."
 POL_BLITZKRIEG_DESC:0 "Nach Jahrhunderten, in denen die polnische Nation zwischen drei Reichen aufgeteilt war, ist Polen nun wieder unabhängig. Doch seine Lage ist nicht einfach. \n\nIm Osten hat die Sowjetunion die demütigende Niederlage im polnisch-sowjetischen Krieg nicht vergessen. \n\nIm Westen macht der deutsche Führer Adolf Hitler keinen Hehl aus seinem Wunsch nach mehr „Lebensraum“ – und dass die ehemaligen deutschen Gebiete, die jetzt unter polnischer Kontrolle stehen, der erste Schritt dorthin sein werden."
 CAN_BLITZKRIEG_DESC:0 "Kanada trat dem Ersten Weltkrieg als Kolonie bei und verließ ihn als Nation. Geboren im Schlamm von Passchendaele, unternimmt Kanada nun seine ersten unsicheren Schritte auf die Weltbühne. \n\nGeschwächt durch die Weltwirtschaftskrise und die internen Spaltungen zwischen Anglophonen und Frankophonen sieht die Zukunft dieser jungen Nation alles andere als sicher aus."
 AST_BLITZKRIEG_DESC:0 "Die Australier haben sich ihren Platz in den Geschichtsbüchern des Ersten Weltkriegs mit Blut erkämpft. Die Opfer der Gallipoli-Kampagne sind unvergessen – und auch diejenigen, die sie angeordnet haben. \n\nAustralien steht nun an einem Scheideweg: Soll es bei seinem Kolonialherrn bleiben, der kurz davor steht, in einen weiteren Konflikt im fernen Europa hineingezogen zu werden, oder soll es sich auf die Bedrohungen konzentrieren, die näher an der Heimat auftauchen?"
 SAF_BLITZKRIEG_DESC:0 "Zu Beginn des Ersten Weltkriegs weigerten sich viele Südafrikaner, für ihre britischen Herren zu den Waffen zu greifen. Das südafrikanische Militär verbrachte den Großteil des Ersten Weltkriegs damit, deutsche Truppen in ihren afrikanischen Kolonien zu vertreiben – mit mäßigem Erfolg. \n\nNun droht ein neuer Krieg am Horizont. Damals wie heute gibt es in Südafrika einige, die der Meinung sind, das Land sollte überhaupt nicht gegen die Deutschen kämpfen. Manche glauben sogar, dass die Zeit für die Nachkommen der Buren gekommen ist, die Freiheit zurückzufordern, die ihren Vorfahren verwehrt blieb."
 NZL_BLITZKRIEG_DESC:0 "Die kleine Nation im Südpazifik kämpfte tapfer im Ersten Weltkrieg und erlitt hohe Verluste in den blutigen Schlachten bei Gallipoli und an der Westfront. Fast die Hälfte der Männer im kampffähigen Alter hatte in Übersee gedient, und viele kehrten nicht zurück. Rund zwanzig Jahre nach dem Ende des Ersten Weltkriegs blicken die Menschen in Neuseeland besorgt auf die Weltbühne, denn diesmal scheint die Kriegsgefahr immer näher an ihre Heimat heranzurücken..."
 RAJ_BLITZKRIEG_DESC:0 "Das Kronjuwel des Britischen Empire, die indische Herrschaft, ist eine seltsame Kombination aus imperialer Macht und imperialer Machtlosigkeit. Eine winzige Elite britischer Beamter herrscht über einen riesigen Subkontinent mit Hunderten Millionen Untertanen. Aus ihren Reihen rekrutiert sich die indische Armee, die im Ersten Weltkrieg tapfer kämpfte.\n\nDie indischen Führer hofften, dass die im letzten Krieg gebrachten Opfer Indien helfen würden, seine Unabhängigkeit von Großbritannien zu erlangen, doch bisher wurde diese Hoffnung enttäuscht. Angesichts eines drohenden neuen Krieges glauben viele, dass die Zeit gekommen ist, sich diese Freiheit zu nehmen – mit allen erforderlichen Mitteln."
 HUN_BLITZKRIEG_DESC:0 "Ungarn, eine Hälfte des späten Österreichisch-Ungarischen Reiches, wurde nach dem Ersten Weltkrieg von der siegreichen Entente als besiegter Feind behandelt. Durch den Vertrag von Trianon verlor das Land fast zwei Drittel seines Territoriums. Millionen von Ungarn mussten außerhalb seiner Grenzen leben, und die Wirtschaft des Landes lag am Boden. Strenge Beschränkungen der Wiederbewaffnung sollten sicherstellen, dass Ungarn nie wieder den Frieden in Europa gefährden konnte. \n\nDoch angesichts des veränderten politischen Klimas in Europa ist es vielleicht an der Zeit, die Fehler der Vergangenheit endlich wiedergutzumachen und den einstigen Ruhm der Nation wiederherzustellen."
 ROM_BLITZKRIEG_DESC:0 "Rumänien befand sich im Ersten Weltkrieg auf der Siegerseite und gewann dadurch neue Gebiete und Menschen hinzu – nicht alle davon waren Rumänen. Um den revanchistischen Bestrebungen der Länder, die gezwungen waren, Land abzutreten, entgegenzuwirken, knüpfte Rumänien auf dem gesamten Balkan ein Netz von Allianzen. In den letzten Jahren beschäftigte sich das Land jedoch hauptsächlich mit innenpolitischen Angelegenheiten, und die Regierung von König Karl II. ließ diese Allianzen auslaufen. \n\nMit der sich verändernden politischen Lage in Europa könnte Rumänien nun allein dastehen – und verwundbar."
 YUG_BLITZKRIEG_DESC:0 "Jugoslawien entstand, nachdem das neue Königreich der Serben, Kroaten und Slowenen 1922 mit dem ehemals unabhängigen Königreich Serbien fusionierte. Ursprünglich trat Jugoslawien sowohl der Kleinen Entente als auch dem Balkanpakt bei, um seine Unabhängigkeit zu sichern. Doch in jüngster Zeit führten zunehmender nationalistischer Druck aus dem Inland und Druck aus dem Ausland aus Italien und Deutschland zu drastischen Umwälzungen und einer Neubewertung der politischen und strategischen Position des Landes."
 CHI_BLITZKRIEG_DESC:0 "Nach zwei Jahren Krieg gegen die Japaner haben sich die Armeen von Chiang Kai-Shek im Kampf gegen den Angriff verausgabt. Der Feind hat die reichsten Gebiete des Landes überrannt. Von den westlichen Demokratien kam kaum Unterstützung, und die Kommunisten scheinen nicht bereit zu sein, den Feind in offener Schlacht anzugreifen. Da der Krieg sich noch weiter auszubreiten droht, scheint das Schlimmste noch bevorzustehen. Da der japanische Angriff jedoch durch die Weite des Landes gebremst wird, könnten sie ihren Blick in andere Richtungen richten, und neue Allianzen könnten das Blatt noch wenden ..."
 PRC_BLITZKRIEG_DESC:0 "Angesichts eines umfassenden japanischen Angriffs haben Nationalisten und Kommunisten einen brüchigen Waffenstillstand geschlossen. Beide Seiten sind sich bewusst, dass diese Einheitsfront nicht von Dauer sein kann. Das kommunistische Stützpunktgebiet in Yan&#39;an bildet nun die Frontlinie im Krieg gegen die Japaner. Die Kommunisten müssen ihre Ressourcen sorgfältig verwalten, wenn sie überleben wollen. Alle Verluste im Kampf gegen Japan werden sich im Krieg gegen die Nationalisten doppelt bemerkbar machen, und genau darauf setzt die Regierung von Chiang Kai-Shek möglicherweise..."
 MAN_BLITZKRIEG_DESC:0 "Puyi, der letzte chinesische Kaiser, wurde im Alter von sechs Jahren vom Drachenthron vertrieben und wartet nun auf den richtigen Zeitpunkt. Während sein ehemaliges Reich im chinesischen Bürgerkrieg zerbrach, fand Puyi in Japan neue Verbündete.\n\nFür Puyi war die Gründung des Mandschukuo-Kaiserreichs 1932 nur der erste Schritt auf dem Weg, sein angestammtes Geburtsrecht zurückzuerlangen. Im Moment ist er noch auf die japanische Armee angewiesen, um seine Herrschaft aufrechtzuerhalten, doch mit der Zeit könnte sich die Gelegenheit ergeben, die Fesseln der Knechtschaft abzuschütteln und zu dem zu werden, wozu er geboren wurde …"
 WARLORDS_BLITZKRIEG_DESC:1 "Der Krieg mit Japan hat die chinesischen Kriegsherren gezwungen, sich für eine Seite zu entscheiden, doch es besteht kein Zweifel daran, dass dieses Bündnis nur noch eine Frage der Zeit ist. Der Tag wird kommen, an dem es seinen Nutzen überlebt hat, und dann ist das Spiel wieder offen für jeden Mann, der ehrgeizig und rücksichtslos genug ist, um den Titel des Herrschers von China anzustreben."
 MEXICO_BLITZKRIEG_DESC:0 "Die Regierung von Lázaro Cárdenas hat sich als treibende Kraft für positiven sozialen Wandel erwiesen als die seines Vorgängers Präsident Plutarco Calles, der inzwischen in die USA verbannt wurde. Nachdem sich die wirtschaftliche Lage stabilisiert hat und die ausländischen Ölfirmen unter staatliche Aufsicht gestellt wurden, kann die mexikanische Regierung beginnen, sich nach außen zu orientieren. Amerika hat an vielen Fronten Feinde und wird die Verstaatlichung von Standard Oil wahrscheinlich verzeihen, doch diese Feinde könnten noch lukrativer sein, um sich mit ihnen anzufreunden …"
 NETHERLANDS_BLITZKRIEG_DESC:0 "Ein Krieg zwischen Deutschland und den anderen europäischen Großmächten scheint unvermeidlich. Obwohl die Niederlande wieder auf ihre Neutralität vertrauen, erwägen ihre Führer, geheime Pläne mit ihren südlichen Nachbarn zu schmieden, um sich auf mögliche Feindseligkeiten vorzubereiten. Die Armee wurde mobilisiert, und die Arbeiten an den niederländischen Verteidigungslinien nehmen Fahrt auf, um das Land bestmöglich auf eine Verletzung seiner Souveränität vorzubereiten. Sollte dies scheitern, bleiben immer noch die Kolonien..."
 
 ###########################################
 ################## 1940 ###################
 ###########################################
 
 BURNING_EUROPE_NAME:0 "Europa in Flammen"
 BURNING_EUROPE_DESC:0 "Weniger als ein Jahr nach Kriegsbeginn hat die deutsche Militärmaschinerie ihre Macht gefestigt. In einer monatelangen Invasion hat sie Polen unterworfen und richtet nun die Macht ihrer Armeen an die Westfront. Frankreich und Großbritannien stehen dieser drohenden deutschen Invasion allein gegenüber. Angesichts der Neutralitätserklärung der USA und des Nichtangriffspakts zwischen der Sowjetunion und Deutschland, der in vollem Umfang in Kraft ist, scheinen die jungen Demokratien keine Fluchtmöglichkeit mehr zu haben. In ganz Europa kämpfen die kleineren demokratischen Nationen um ihre Verteidigung, da nationalistische Bewegungen in ihren Ländern Fuß gefasst haben. Der Krieg zwischen Faschisten und Demokraten nähert sich seinem Höhepunkt, und die Welt wird bald ein Europa in Flammen sehen."
 ENG_BURNING_EUROPE_DESC:0 "Obwohl das Vereinigte Königreich den Ersten Weltkrieg siegreich beendete, wurden die Grundlagen seines Imperiums bis ins Mark erschüttert. Eine Generation der besten Persönlichkeiten des Landes fiel in den Schützengräben Flanderns und Nordfrankreichs, während sich im gesamten Commonwealth Unruhen ausbreiteten und enorme Schulden anhäuften.\n\nDas Trauma des letzten Krieges ist noch frisch in Erinnerung, und nun steht das Land vor einem weiteren. Es wird immer deutlicher, dass es für unsere Zeit keinen Frieden geben wird."
