 ###########################################
 ################## 1943 ###################
 ###########################################

 TURNING_TIDE_NAME:0 "Die Wende"
 TURNING_TIDE_DESC:0 "Das Blatt hat sich für die Achsenmächte endlich gewendet. Deutschland wurde aus Stalingrad und Nordafrika vertrieben, und die Schlacht von Kursk wird nun über die Zukunft der deutschen Offensiv-Militäroperationen entscheiden. Sizilien wurde von den Alliierten eingenommen, und Italien droht, die Seiten zu wechseln. Im Pazifik hat das japanische Kaiserreich seinen Zenit erreicht und beginnt nun zu schrumpfen."
 ENG_TURNING_TIDE_DESC:0 "Die Sternstunde des Vereinigten Königreichs ist längst vorbei und es ist in diesem Konflikt nicht mehr allein. Die Deutschen wurden zusammen mit ihren italienischen Verbündeten in Nordafrika entscheidend besiegt und Sizilien wurde nun überfallen, was Italien aus dem Gleichgewicht bringt."
 FRA_TURNING_TIDE_DESC:0 "Das französische Festland wurde vom Feind erobert und hält es nun schon seit drei Jahren in seiner Gewalt. Doch die Franzosen geben nicht auf. Auch anderswo in den Kolonien gibt es weiterhin Widerstand, und es gibt Pläne, zurückzukehren und die Feinde, die Frankreich besetzt haben, zu vertreiben."
 GER_TURNING_TIDE_DESC:0 "Da Stalingrad eine Katastrophe war und wir aus dem Kaukasus vertrieben wurden, ist jede Hoffnung auf die Kontrolle über die riesigen Ölvorkommen der Sowjetunion verloren. In Afrika, wo wir eine entscheidende Niederlage erlitten haben, ist unser Glück nicht besser. Italien wurde überfallen und könnte höchstwahrscheinlich die Seiten wechseln, wenn wir es nicht mit Gewalt in der Achse halten. Es ist jedoch nicht alles verloren. Wir planen eine Großoperation unter dem Decknamen „Zitadelle“, um den Kursker Bogen abzuschneiden. Wenn es uns gelingt, die Sowjets hier zu besiegen und zurückzudrängen, sind wir wieder auf Kurs."
 ITA_TURNING_TIDE_DESC:0 "Das vergangene Jahr war für Italien eine Katastrophe. Wir wurden nicht nur aus Nordafrika und unseren anderen Kolonien vertrieben, sondern die Alliierten sind erst kürzlich in Sizilien einmarschiert und drohen nun mit einer Invasion des italienischen Festlands. Bombenangriffe sorgen bereits für Panik und Unzufriedenheit. Es könnte an der Zeit sein, die Seiten zu wechseln und den Duce loszuwerden …"
 JAP_TURNING_TIDE_DESC:0 "Das japanische Kaiserreich war in seinen Expansionsbemühungen bislang weitgehend unbesiegt, hat jedoch mit dem Ansturm der Vereinigten Staaten im Pazifik seinen Zenit erreicht und beginnt, an Macht und Einfluss zu verlieren. Wir müssen uns neu formieren und auf den Sieg drängen, oder wir müssen für immer mit den Folgen einer Niederlage leben …"
 SOV_TURNING_TIDE_DESC:0 "Der Große Vaterländische Krieg wütet nun schon seit zwei Jahren. Wir haben in diesem Konflikt viele Menschenleben verloren, um unser Vaterland vor den faschistischen Bestien zu schützen. Doch es war nicht umsonst. Die Deutschen wurden an allen Fronten schwer geschlagen. Nachdem Stalingrad und der Kaukasus gesichert sind, müssen wir uns auf die Verteidigung des Kursker Bogens konzentrieren, nachdem wir von den Briten Informationen erhalten haben, dass ein Angriff speziell auf dieses Gebiet gerichtet sein wird. Wir müssen auch die Belagerung Leningrads beenden, die nun schon zwei Jahre andauert und fast zwei Millionen Menschenleben kostete, denn es heißt, dass der Rückzug der Roten Armee mehr Mut erfordert als der Vormarsch."
 USA_TURNING_TIDE_DESC:0 "Die Vereinigten Staaten wurden nach dem japanischen Angriff auf Pearl Harbor unfreiwillig in diesen globalen Konflikt hineingezogen. Die Japaner haben sich als fähiger Feind erwiesen, aber wir sind ihnen nicht ebenbürtig. Die industrielle Macht der Vereinigten Staaten wird die Macht des japanischen Kaiserreichs im Pazifik zerschmettern, und wenn wir mit ihnen fertig sind, wird die japanische Sprache nur noch in der Hölle gesprochen werden."
 OTHER_TURNING_TIDE_DESC:0 "Die Nationen der Welt, ob groß oder klein, werden von diesem Konflikt betroffen sein, der sich über mehrere Kontinente erstreckt."

 ###########################################
 ################## 1944 ###################
 ###########################################

 GOTTERDAMMERUNG_NAME:0 "Götterdämmerung"
 GOTTERDAMMERUNG_DESC:0 "Die deutsche Ostfront steht kurz vor dem Zusammenbruch. Nach dem D-Day rücken die Alliierten rasch durch Frankreich vor und haben fast die Hälfte Italiens in ihren Händen. Während das Deutsche Reich zerfällt, geraten die japanischen Verbündeten zunehmend unter Druck durch den amerikanischen Riesen, der sich immer weiter dem japanischen Festland nähert."
 ENG_GOTTERDAMMERUNG_DESC:0 "Das Britische Empire hat nach seinem Rückzug aus Dünkirchen keine Schlachten in Europa erlebt, doch nun, fünf Jahre später, sind wir mit unseren Verbündeten in der Normandie gelandet und unsere Luftwaffe erobert mühelos den deutschen Luftraum. Wird es uns gelingen, Deutschland zur Kapitulation zu zwingen, oder wird unsere kostspielige Invasion in der Normandie scheitern und uns zwingen, Frieden zu suchen? Neben der Normandie halten wir auch den größten Teil Süditaliens mit der Hauptstadt Rom."
 FRA_GOTTERDAMMERUNG_DESC:0 "Nach der Kapitulation vor der deutschen Regierung im Jahr 1940 war die französische Nation praktisch eine Exilregierung. Doch jetzt, da unsere Verbündeten in der Normandie Fuß gefasst haben, steht uns vielleicht die Befreiung bevor."
 GER_GOTTERDAMMERUNG_DESC:0 "Nach rund fünf Jahren Krieg wurde das Reich zusammen mit seinen Verbündeten an allen Fronten zurückgedrängt. Im Juni 1944 haben die Alliierten in der Normandie Fuß gefasst, die Alliierten haben in Italien Fuß gefasst, und schlimmer noch: Die sowjetische Bedrohung ist uns in einigen Gebieten zahlenmäßig zehnmal überlegen und rückt nur noch langsam auf Berlin vor. Unsere Luftwaffe und Marine sind nicht mehr das, was sie einmal waren, und unsere Industrie zerfällt aufgrund alliierter Luftangriffe langsam. Können Sie das Reich retten?"
 JAP_GOTTERDAMMERUNG_DESC:0 "Unser Krieg gegen die Vereinigten Staaten hat zu einer ungünstigen Situation geführt. Das japanische Kaiserreich ist jedoch noch lange nicht tot und verfügt noch über zahlreiche Ressourcen. Aufgrund schwerer Handelsüberfälle der Alliierten und der Überlegenheit zur See sind unsere Vorräte jedoch extrem knapp, und die Industrie boomt alles andere als. Jetzt bleibt uns nur noch, auf Leben und Tod zu kämpfen, und genau das werden wir tun."
 ITR_GOTTERDAMMERUNG_DESC:0 "Nach der alliierten Invasion Siziliens im vergangenen Sommer, die den Alliierten die Invasion des restlichen Italiens ermöglichte, wurde Mussolini von seinem eigenen Volk gestürzt und gezwungen, eine Exilregierung zu bilden, die nur von Deutschland und Japan anerkannt wurde: die Italienische Sozialrepublik. Der Krieg ist jedoch noch lange nicht vorbei, und unsere Verluste können rückgängig gemacht werden."
 SOV_GOTTERDAMMERUNG_DESC:0 "Die faschistischen Invasoren haben die Stärke des russischen Volkes, vereint durch den Willen zur Verteidigung seines Vaterlandes, stark unterschätzt. Nach drei verheerenden Jahren des Kampfes gegen das Deutsche Reich und seine Verbündeten wurden sie an der Ostfront stark zurückgedrängt und erlitten eine Niederlage nach der anderen. Jetzt müssen wir die Operation Bagration starten, um das Biest ein für alle Mal zu vernichten und Weißrussland zu befreien."
 USA_GOTTERDAMMERUNG_DESC:0 "Nach dem Angriff auf Pearl Harbor traten die USA offiziell in den Krieg ein. 1944 landeten die USA und ihre Verbündeten in der Normandie und kontrollierten Süditalien. Im Pazifik brachte die Strategie des Inselhüpfens die USA immer näher an das japanische Festland heran, doch davon sind wir noch weit entfernt."
 OTHER_GOTTERDAMMERUNG_DESC:0 "Die Nationen der Welt, ob groß oder klein, werden von diesem Konflikt betroffen sein, der sich über mehrere Kontinente erstreckt."

 ###########################################
 ############## 1944 December ##############
 ###########################################

 KAMPF_DEM_VATERLAND_NAME:0 "Kampf für das Vaterland"
 KAMPF_DEM_VATERLAND_DESC:0 "Das Deutsche Reich wird von allen Seiten massiv zurückgedrängt. Die Alliierten im Westen haben ganz Frankreich und Belgien zurückerobert und stehen nun gefährlich nahe daran, durchzubrechen und in das Herz des Reiches einzudringen. Im Osten stehen die Russen zwar noch ein ganzes Stück hinter der Oder, aber die Front hat sich stark ausgedehnt, und unser Verbündeter Rumänien hat kapituliert, Ungarn ist gefährlich nahe. Italien befindet sich in einer Sackgasse, und in Asien verbessert sich die Lage für Japan nicht."
 ENG_KAMPF_DEM_VATERLAND_DESC:0 "Die Alliierten haben die Deutschen über einen Zeitraum von wenigen Monaten vollständig aus Frankreich und Belgien zurückgedrängt, in Italien sind sie ziemlich weit nach Norden vorgerückt und das Vereinigte Königreich hat den Deutschen vor Kurzem Griechenland abgenommen. Lasst uns unsere Kräfte sammeln und das Biest ein für alle Mal vernichten."
 FRA_KAMPF_DEM_VATERLAND_DESC:0 "Frankreich war in den letzten fünf Jahren vom Deutschen Reich besetzt. Mit der erfolgreichen Operation Overlord wurde Frankreich befreit. Wird es jedoch Hitlers letztem Wagnis zum Opfer fallen?"
 GER_KAMPF_DEM_VATERLAND_DESC:0 "Das Reich hat seine Besitzungen in Frankreich und Belgien verloren und wird nun auf sein eigenes Territorium zurückgedrängt, während Hitler die Würfel für Deutschlands letzte große Offensive und sein letztes großes Wagnis wirft. Im Osten haben die Sowjets Bulgarien und Rumänien eingenommen und gegen das Reich aufgehetzt. Zudem haben sie die Front bis nach Kroatien im Süden ausgedehnt. Obwohl diese Gebiete noch immer hinter der Oder liegen, wird das Reich diesem Druck nicht ewig standhalten können."
 KIT_KAMPF_DEM_VATERLAND_DESC:0 ""
 JAP_KAMPF_DEM_VATERLAND_DESC:0 "Das japanische Volk hat in den letzten vier Jahren im Pazifik tapfer gekämpft, doch der erwachte Riese Amerika rückte immer näher. In Burma wird Japan von den Briten zurückgedrängt, während die Chinesen endlich die Oberhand gewinnen und die japanischen Linien lichten. Doch der Krieg ist noch lange nicht vorbei. Das Volk wird sich nicht ergeben, bis Japan vollständig vernichtet ist."
 SOV_KAMPF_DEM_VATERLAND_DESC:0 "Die faschistische Bestie hat uns vor vier Jahren bis nach Moskau zurückgedrängt, doch nun, vier Jahre später, drängen wir sie zurück nach Berlin. Wir werden diesen Kampf fortsetzen, bis wir Berlin erreichen, und wir werden keine Gnade zeigen!"
 USA_KAMPF_DEM_VATERLAND_DESC:0 "Japan ist von der Liste der größten Seemächte der Welt gestrichen worden und muss nun nur noch von Insel zu Insel nach Tokio reisen, um den endgültigen Sieg zu erringen. An der Westfront haben die Vereinigten Staaten und ihre Verbündeten Frankreich und Belgien zurückerobert und sind weiter nach Norden nach Italien vorgedrungen. Der Krieg ist für den Feind eindeutig verloren, aber er ist noch lange nicht vorbei."
 OTHER_KAMPF_DEM_VATERLAND_DESC:0 "Die Nationen der Welt, ob groß oder klein, werden von diesem Konflikt betroffen sein, der sich über mehrere Kontinente erstreckt."
 GOTTERDAMMERUNG_NAME:0 "Götterdämmerung"
