 BHU_MODERN_DAY_DESC:0 "Bhutan ist von Indien und China umgeben, was sein Wachstum einschränkt und die beiden Länder anfällig für Angriffe und deren Einfluss macht. Unter dem Schutz Indiens steht Bhutan derzeit vor vielen Problemen wie der Lhotshampa-Minderheit, einer schwachen Wirtschaft und Massenanalphabetismus. Bhutan befindet sich derzeit in einem rasanten Wandel. Vielleicht wird es zu einer konstitutionellen Monarchie, bleibt eine absolute Monarchie, wird von seinen Mönchen übernommen oder kommt es sogar zu einer kommunistischen Revolution?"
 SPR_MODERN_DAY_DESC:0 "Wie andere südeuropäische Länder geriet auch Spanien 2008 in eine Wirtschaftskrise und benötigte Konjunkturhilfen aus den nordeuropäischen Ländern. Podemos und Ciudadanos brachten neuen Populismus und neue Unsicherheit in das alte politische System, während die katalanischen Unabhängigkeitsbewegungen die spanische Einheit stärker bedrohen als je zuvor. Der wirtschaftliche Aufschwung wird ein langer und steiniger Weg sein – wird Spanien an Europa festhalten und sich an die Abkommen halten, die eine unmittelbare Katastrophe verhindern – oder sieht die Zukunft Spaniens anders aus als die Zukunft Nordeuropas?"

