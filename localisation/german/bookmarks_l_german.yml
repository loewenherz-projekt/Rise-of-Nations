 THE_PANDEMIC_NAME:0 "Die Pandemie"
 THE_PANDEMIC_DESC:0 "Die Weltgesundheitsorganisation (WHO) hat den Ausbruch des neuartigen Coronavirus (COVID-19) am 11. März 2020 zu einer globalen Pandemie erklärt. Bei einer Pressekonferenz wies der Generaldirektor der WHO, Dr. Tedros Adhanom Ghebreyesus, darauf hin, dass sich die Zahl der Fälle außerhalb Chinas in den letzten zwei Wochen um das 13-fache und die Zahl der Länder mit Fällen um das Dreizehnfache erhöht habe. Es werden weitere Anstiege erwartet. Er sagte, die WHO sei „zutiefst besorgt sowohl über das alarmierende Ausmaß der Verbreitung und Schwere der Krankheit als auch über die alarmierende Untätigkeit“ und rief die Länder dazu auf, jetzt Maßnahmen zur Eindämmung des Virus zu ergreifen. „Wir sollten unsere Anstrengungen verdoppeln“, sagte er. „Wir sollten aggressiver vorgehen.“"
