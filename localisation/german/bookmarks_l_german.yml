 ################## 1941 ###################
 ###########################################
 
 OPERATION_BARBAROSSA_NAME:0 "Unternehmen Barbarossa"
 OPERATION_BARBAROSSA_DESC:0 "Mit dem Beginn des Unternehmens Barbarossa am 22. Juni 1941 brach Deutschland offiziell den Molotow-Ribbentrop-Pakt. Die erste Phase war der erste und einzige Angriff entlang der gesamten Frontlinie und eroberte einen Großteil des sowjetischen Territoriums. Die deutsche Armee schien unaufhaltsam, und die Luftwaffe zerstörte Berichten zufolge 4.000 sowjetische Flugzeuge, verlor aber nur 80 eigene. Libyen hält sich weiterhin stark, und die Sowjets scheinen den deutschen Panzern bislang nicht standhalten zu können. Japan steht bereit, die Alliierten im Pazifik anzugreifen ... "
 ENG_OPERATION_BARBAROSSA_DESC:0 "Obwohl das Vereinigte Königreich den Ersten Weltkrieg siegreich beendete, wurden die Grundlagen seines Imperiums bis ins Mark erschüttert. Eine Generation der besten Persönlichkeiten des Landes ging in den Schützengräben Flanderns und Nordfrankreichs verloren, während sich im gesamten Commonwealth Unruhen ausbreiteten und enorme Schulden anhäuften.\n\nDas Trauma des letzten Krieges ist noch frisch in Erinnerung, und nun steht das Land vor einem weiteren. Es ist klar, dass es für unsere Zeit keinen Frieden geben wird."
 FFR_OPERATION_BARBAROSSA_DESC:0 "Der Erste Weltkrieg ist noch frisch in Erinnerung, und Frankreich steht vor einem neuen Konflikt, nachdem Deutschland gezeigt hat, dass es nicht bereit ist, den Frieden zu wahren. Die Verstärkung der Grenzverteidigung und die kluge Wahl der Verbündeten haben sich als nutzlos erwiesen. Was wird als Nächstes passieren, nachdem Frankreich gefallen ist?"
 FRA_OPERATION_BARBAROSSA_DESC:0 "Der Erste Weltkrieg ist noch frisch in Erinnerung, und Frankreich steht vor einem neuen Konflikt, nachdem Deutschland gezeigt hat, dass es nicht bereit ist, den Frieden zu wahren. Die Verstärkung der Grenzverteidigung und die kluge Wahl der Verbündeten haben sich als nutzlos erwiesen. Was wird als Nächstes passieren, nachdem Frankreich gefallen ist?"
 VIC_OPERATION_BARBAROSSA_DESC:0 "Der Erste Weltkrieg ist noch frisch in Erinnerung, und Frankreich steht vor einem neuen Konflikt, nachdem Deutschland gezeigt hat, dass es nicht bereit ist, den Frieden zu wahren. Die Verstärkung der Grenzverteidigung und die kluge Wahl der Verbündeten haben sich als nutzlos erwiesen. Was wird als Nächstes passieren, nachdem Frankreich gefallen ist?"
 GER_OPERATION_BARBAROSSA_DESC:0 "Ein neues Deutschland ist entstanden. Acht Jahre sind vergangen, seit die Weimarer Republik zerschlagen und durch Hitlers Drittes Reich ersetzt wurde. Nach den schwierigen Jahren der Weltwirtschaftskrise ist die wirtschaftliche Stabilität zurückgekehrt, und die Massenarbeitslosigkeit ist bekämpft. Die militärischen Beschränkungen, die Deutschland durch den Versailler Vertrag auferlegt wurden, sind längst vergessen, und die Wehrmacht wird täglich stärker. Wer kann sie aufhalten?"
 JAP_OPERATION_BARBAROSSA_DESC:0 "Im Südosten tobt Krieg. Obwohl Japan Anfang 1939 einige Verluste erlitt, befindet sich ein großer Teil des chinesischen Territoriums unter japanischer Kontrolle. Die Spannungen in Europa nehmen zu, und während die Sowjetunion ihre Aufmerksamkeit auf diese Angelegenheiten richtet, sollte sie sich nicht in den Krieg in Asien einmischen. \n\nSobald Chinas Ressourcen in japanischer Hand sind, werden die Sowjets leicht zu besiegen sein."
 ITA_OPERATION_BARBAROSSA_DESC:0 "Mit dem Aufstieg des Faschismus begann für Italien eine neue glorreiche Ära. Seine Streitkräfte sind derzeit dabei, Äthiopien dem wachsenden italienischen Kolonialreich einzuverleiben, doch Mussolinis Ambitionen enden hier nicht. Die Herrschaft über das Mittelmeer war schon immer Italiens Schicksal, und in Europa nimmt eine neue Ordnung der Dinge Gestalt an. Wenn die Flutwelle des Wandels kommt, muss Italien einen Platz auf ihrem Höhepunkt finden, sonst riskiert es, weggespült zu werden."
 SOV_OPERATION_BARBAROSSA_DESC:0 "Die Unterstützung Manuel Azanas und der „Zweiten Spanischen Republik“ während des Spanischen Bürgerkriegs hat die Position der Sowjetunion gegenüber Italien und Deutschland deutlich gemacht. Nach dem Sieg über die japanische Armee in mehreren Grenzkonflikten der jüngeren Vergangenheit erscheint die Sowjetunion heute als eine zu große Macht, als dass ein einzelnes Land ihr Widerstand leisten könnte. \n\nDas Versprechen Deutschlands, die baltischen Staaten und Polen aufzuteilen, ist derzeit willkommen."
 USA_OPERATION_BARBAROSSA_DESC:0 "Die zunehmenden Spannungen in Europa sind besorgniserregend. Obwohl die USA sich noch nicht wirklich Sorgen machen, könnte die Aggression Deutschlands bald weltweit zu hören sein. Solange es im Westen relativ friedlich ist, sind militärische Vorbereitungen alles in allem vielleicht keine schlechte Idee. \n\nSollten die USA in einen weiteren Krieg hineingezogen werden, werden sie ihn beenden."
 OTHER_OPERATION_BARBAROSSA_DESC:0 "Die Nationen der Welt, ob groß oder klein, geben sich nicht damit zufrieden, den Atem anzuhalten und auf den Ausbruch eines weiteren globalen Konflikts zu warten. Von den Großmächten am Rande eines Bürgerkriegs bis hin zu den vielen Nationen, die durch den Ersten Weltkrieg entstanden und verändert wurden, werden alle schwierige Entscheidungen treffen und Ideale mit Pragmatismus in Einklang bringen müssen, um die Zukunft der Welt zu beeinflussen."
 1941_bookmark_threat:0 "Deutsche Aggression"
 
 ###########################################
 ################## 1942 ###################
 ###########################################
 
 ENEMY_AT_THE_GATES_NAME:0 "Feind vor den Toren"
 ENEMY_AT_THE_GATES_DESC:0 "Deutschland hat die größten Bedrohungen durch die Alliierten im Westen beseitigt. Amerika ist durch die Japaner abgelenkt und die Briten können auf den deutschen Vormarsch in Europa nicht reagieren. Nur eine Nation bedroht die Vorherrschaft Nazideutschlands über den europäischen Kontinent: die Sowjetunion. Hitler hat jedoch einen Plan: einen Frontalvorstoß tief in die sowjetischen Linien im Sommer, der deren Kapitulation bis zum Winter garantieren soll. Gleichzeitig haben die alliierten Streitkräfte ihre ersten Offensiven auf dem afrikanischen Kontinent koordiniert, um sich eine ausreichend starke Position für eine Seeinvasion in Italien zu sichern. Und Amerika hat begonnen, das Blatt im Krieg im Pazifik zu wenden. Da alle großen Nationen Angriffsbewegungen planen, kann man nur raten, welche Nationen ihren Vorstoß wagen und welche ihren Feind vor den Toren der Welt finden werden."
 ENG_ENEMY_AT_THE_GATES_DESC:0 "Obwohl das Vereinigte Königreich den Ersten Weltkrieg siegreich beendete, wurden die Grundlagen seines Imperiums bis ins Mark erschüttert. Eine Generation der besten Persönlichkeiten des Landes ging in den Schützengräben Flanderns und Nordfrankreichs verloren, während sich im gesamten Commonwealth Unruhen ausbreiteten und enorme Schulden anhäuften.\n\nDas Trauma des letzten Krieges ist noch frisch in Erinnerung, und nun steht das Land vor einem weiteren. Es ist klar, dass es für unsere Zeit keinen Frieden geben wird."
 FFR_ENEMY_AT_THE_GATES_DESC:0 "Der Erste Weltkrieg ist noch frisch in Erinnerung, und Frankreich steht vor einem neuen Konflikt, nachdem Deutschland gezeigt hat, dass es nicht bereit ist, den Frieden zu wahren. Die Verstärkung der Grenzverteidigung und die kluge Wahl der Verbündeten haben sich als nutzlos erwiesen. Was wird als Nächstes passieren, nachdem Frankreich gefallen ist?"
 FRA_ENEMY_AT_THE_GATES_DESC:0 "Der Erste Weltkrieg ist noch frisch in Erinnerung, und Frankreich steht vor einem neuen Konflikt, nachdem Deutschland gezeigt hat, dass es nicht bereit ist, den Frieden zu wahren. Die Verstärkung der Grenzverteidigung und die kluge Wahl der Verbündeten haben sich als nutzlos erwiesen. Was wird als Nächstes passieren, nachdem Frankreich gefallen ist?"
