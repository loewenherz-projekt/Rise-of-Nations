 OTHER_GOTTERDAMMERUNG_DESC:0 "Die Nationen der Welt, ob groß oder klein, werden von diesem Konflikt betroffen sein, der sich über mehrere Kontinente erstreckt."
 ENDSIEG_NAME:0 "Endsieg"
 ENDSIEG_DESC:0 "Unterstützt durch Luftangriffe, die die Kommunikation in ganz Deutschland lahmlegten, stürmten die alliierten Armeen über die Kölner Ebene. Mächtige Teile der Roten Armee formierten ihre Brückenköpfe entlang der Oder neu, während die Truppen an den Flanken bedeutende Fortschritte erzielten. Was von der einst mächtigen deutschen Armee übrig blieb, sind nun die ganz Alten und die Jungen, die das, was noch übrig war, verteidigen müssen, während Hitler in Berlin bereits seinen Bunker bezogen hat."
 ENG_ENDSIEG_DESC:0 "Nachdem Deutschland praktisch besiegt war, setzte Großbritannien seine intensiven Bombenangriffe auf die verbliebene deutsche Industrie fort, während die Alliierten in die Überreste des deutschen Widerstands eindrangen."
 FRA_ENDSIEG_DESC:0 "Deutschland existiert nicht mehr. Obwohl es bis auf den Namen besiegt ist, leistet die deutsche Armee noch immer erbitterten Widerstand. Doch es ist nur eine Frage der Zeit, bis wir über den Rhein durchbrechen und Deutschland zur Kapitulation zwingen."
 GER_ENDSIEG_DESC:0 "Deutschland liegt am Boden, seine Feinde sind in die deutsche Heimat eingedrungen und rücken weiter vor. Zehnjährige und siebzigjährige Männer haben sich dem Volkssturm angeschlossen, um das Reich um jeden Preis zu verteidigen. Der Führer ist zuversichtlich, dass der Krieg noch gewonnen werden kann, da Goebbels immer noch verkündet, dass der Endsieg nahe sei. Wie weit dies von der Wahrheit entfernt ist, wissen wir nicht, aber der Kampf wird weitergehen!"
 ITA_ENDSIEG_DESC:0 "Italien ist nur noch ein Schimmer seiner glorreichen Vergangenheit. Mit der Gründung der Sozialrepublik versuchen die Faschisten verzweifelt, die Macht zu behalten, doch die Alliierten drängen immer weiter vor …"
 JAP_ENDSIEG_DESC:0 "Das japanische Kaiserreich wurde schwer getroffen. Wir verfügen nicht mehr über genügend Seemacht, um uns auch nur annähernd gegen die Vereinigten Staaten zu verteidigen. Auf Iwo Jima haben die Vereinigten Staaten einen Teil ihrer Marine konzentriert, um das Gebiet zu bombardieren und es einzunehmen. Wir dürfen es um keinen Preis fallen lassen! Eine Kapitulation ist eine große Schande, und dafür müssen wir bis zum blutigen Ende kämpfen, selbst wenn dies bedeutet, dass Japan von der Bildfläche verschwindet!"
 SOV_ENDSIEG_DESC:0 "Der Große Vaterländische Krieg nähert sich seinem Ende. Die Deutschen stehen hinter der Weichsel und die Rote Armee rückt immer näher an Berlin heran, das Herz der Bestie selbst. Doch mit dem Ende des Großen Vaterländischen Krieges wird mitten in Europa eine neue Linie zwischen uns und den Alliierten mit unseren unterschiedlichen Ideologien gezogen."
 USA_ENDSIEG_DESC:0 "Die Vereinigten Staaten haben die Japaner erfolgreich zurückgedrängt, deren Macht heute nicht einmal ein Drittel ihrer ursprünglichen Größe beträgt. Es ist nur eine Frage der Zeit, bis ganz Japan zusammenbricht. Unsere Invasion der Philippinen ist bisher ein Erfolg, und auch Iwo Jima dürfte bald erobert werden. Das nächste Ziel ist vielleicht das japanische Festland selbst …"
 OTHER_ENDSIEG_DESC:0 "Die Nationen der Welt, ob groß oder klein, werden von diesem Konflikt betroffen sein, der sich über mehrere Kontinente erstreckt."
 
 ###########################################
 ################## 1946 ###################
 ###########################################

 END_OF_WW2_NAME:0 "Die Waffen verstummen"
 END_OF_WW2_DESC:0 "Vor nicht allzu langer Zeit war Deutschland die größte Bedrohung für den Weltfrieden. Nun beginnen die USA und die Sowjetunion um Einfluss in der Welt zu konkurrieren. Mit der Bildung neuer Marionettenregime in Deutschland und Osteuropa stellen diese beiden Blöcke eine Gefahr für alle neutralen Nationen dar. Wer wird sich durchsetzen?"
 ENG_END_OF_WW2_DESC:0 "Die Ära des britischen Imperialismus ist zu Ende. Der Reiz der Unabhängigkeit ist für die Untertanen der britischen Krone viel zu groß. Ihre Kolonien weltweit erfreuen sich wachsender Beliebtheit bei nationalistischen und kommunistischen Bewegungen. Während Großbritanniens globale Macht schwindet, setzt es auf seine westlichen Verbündeten, um sich vor der Bedrohung durch den Kommunismus zu schützen, der nun näher ist denn je. Die Ängste Oswald Mosleys sind längst vergangen, nun packt die Angst vor dem Kommunismus die Herzen des britischen Commonwealth."
 KOR_END_OF_WW2_DESC:0 "Endlich frei von der US-amerikanischen und japanischen Besatzung, hoffte die neu gegründete Republik Korea auf eine friedliche Wiedervereinigung mit ihren getrennten Landsleuten oberhalb des 38. Breitengrads. Doch nach der verdächtigen Ermordung des einzigen hochrangigen Politikers, der zu Verhandlungen mit dem Norden bereit war, und dem Wahlsieg des überzeugten Antikommunisten Lee Seung Man zur Präsidentschaft schwand diese Hoffnung rapide. Die USA mögen zwar die Schlüssel übergeben haben, doch keines der beiden Koreas hat die Kontrolle, und beide Republiken behaupten, der Konflikt auf der Halbinsel sei unvermeidlich."
 WGR_END_OF_WW2_DESC:0 "Die einst so große deutsche Nation wurde erneut besiegt. Der Ruhm des Deutschen Reiches ist nur noch eine ferne Erinnerung, und die Euphorie der Eroberungen von vor wenigen Jahren ist von Scham und Frustration getrübt. Das deutsche Volk steht erneut vor der Schusslinie. Von beiden Supermächten besetzt, ist es das Schachbrett ihrer politischen Spiele. Die Menschen in Deutschland sind müde und haben viel Wiederaufbauarbeit vor sich. Was bleibt, ist die Hoffnung auf Deeskalation und die Wiedervereinigung mit ihren östlichen Brüdern."
 GER_END_OF_WW2_DESC:0 "Die einst so große deutsche Nation wurde erneut besiegt. Der Ruhm des Deutschen Reiches ist nur noch eine ferne Erinnerung, und die Euphorie der Eroberungen von vor wenigen Jahren ist von Scham und Frustration getrübt. Das deutsche Volk steht erneut vor der Schusslinie. Von beiden Supermächten besetzt, ist es das Schachbrett ihrer politischen Spiele. Die Menschen in Deutschland sind müde und haben viel Wiederaufbauarbeit vor sich. Was bleibt, ist die Hoffnung auf Deeskalation und die Wiedervereinigung mit ihren östlichen Brüdern."
 DDR_END_OF_WW2_DESC:0 "Unter sowjetischer Militärherrschaft werden die Menschen Ostdeutschlands nun von den Menschen beherrscht, die sie einst unterdrückt hatten. Die Moral ist am Boden, doch die Lage bessert sich, da Pläne zur Gründung einer Deutschen Demokratischen Republik geschmiedet werden. Unter sowjetischer Führung schreitet der Aufbau zügig voran, doch das Leben ist schwierig, da die Gesellschaft streng reglementiert ist und die alleinige Schuld am Krieg auf den Schultern der Bevölkerung lastet. Große Teile der Bevölkerung haben sich bereits voll und ganz der kommunistischen Ideologie verschrieben, was eine ideologische Kluft zwischen den beiden deutschen Staaten geschaffen hat, die möglicherweise noch Generationen andauern wird …"
 DPK_END_OF_WW2_DESC:0 "Kurz nach der Ausrufung der Republik Korea gründeten der Revolutionär Kim Il Sung und die sowjetische Zivilverwaltung die Demokratische Volksrepublik Korea. Unabhängig von der sowjetischen Kontrolle und mit Grenzen zu zwei mächtigen kommunistischen Nationen, ist Kim bereit, seine Kameraden unterhalb des 38. Breitengrads zu befreien. Mit sowjetischer Ausrüstung, chinesischer Streitmacht und einer vereinten Bevölkerung unter dem Juche-System sollte der Krieg um die koreanische Wiedervereinigung ein Kinderspiel sein. Schließlich haben ihre Vormundschaft, die USA, größere Probleme …"
 PRC_END_OF_WW2_DESC:0 "Die Japaner wurden besiegt und der Waffenstillstand mit der Kuomintang gebrochen. Die Volksbefreiungsarmee ist exponentiell gewachsen, und mit der von den Japanern zurückgelassenen Ausrüstung ist die Volksrepublik bereit, den Rest Chinas zu sichern. Trotz minimaler Unterstützung durch die Sowjetunion ermöglichte die Führung Mao Zedongs nach dem Großen Marsch dem chinesischen Kommunismus eine Blütezeit. Nur noch wenige Schlüsselstädte, und China wird endlich vereint sein!"
 SOV_END_OF_WW2_DESC:0 "Dank des Opfers von Millionen tapferer Kommunisten ist der Faschismus größtenteils von der Erde verschwunden. Doch hinter dem gefallenen Monster verbirgt sich eine noch größere Bedrohung: die des Kapitalismus. Die Sowjetunion, die sich gerade erst befreit hat, muss nun die Welt vor einem weiteren imperialistischen System schützen. Die Menschen brauchen eine starke Führung, und es gibt keinen besseren Kandidaten als die Sowjetunion. Der Kommunismus gewinnt an Bedeutung, und Josef Stalin will dies auch weiterhin tun."
 USA_END_OF_WW2_DESC:0 "Mit ihrem Sieg im Zweiten Weltkrieg positionierten sich die USA als Vorkämpfer der westlichen Demokratie. Sie halten an ihren kapitalistischen Werten fest und stellen sich vehement gegen den kommunistischen Osten unter Führung der Sowjetunion. Anstatt nach den Zerstörungen des Zweiten Weltkriegs zu demilitarisieren, wird das Militär der Nation weiter ausgebaut, um der roten Bedrohung zu begegnen. Doch könnten die USA und der Westen angesichts der Atomwaffen, die beide Seiten im Blick haben, gegen einen so gewaltigen Feind wirklich bestehen?"
 ISR_END_OF_WW2_DESC:0 "Der Zionismus wurde endlich verwirklicht und ein jüdischer Staat gegründet. Obwohl die ersten Jahre vom arabisch-israelischen Krieg geprägt waren, gelang es den Israeliten mit Hilfe ihrer westlichen Verbündeten nicht nur, die Araber zurückzudrängen, sondern auch weiteres Land zu erobern. Das Heilige Land ist zersplittert und von feindlichen Mächten umzingelt, doch die jüdische Entschlossenheit, gestärkt durch den Holocaust, ist ungebrochen. Seit der Römerzeit hatte es keinen unabhängigen jüdischen Staat mehr gegeben, und die Juden wollen sich diese Chance nicht entgehen lassen."
 YUG_END_OF_WW2_DESC:0 "Nach der Spaltung Jugoslawiens und der Sowjetunion 1948 funktionierte Titos Modell des Marktsozialismus dank der Finanzierung durch den US-Marshallplan gut. Jugoslawien, das durch die italienische und deutsche Besatzung schwer beschädigt wurde, erfreute sich einer besseren Lebensqualität als jeder andere kommunistische Staat. Die politische Stabilität war jedoch eine ganz andere. Tito war bei seinen Landsleuten beliebt, doch seine Neutralitätsstrategie stieß im Osten wie im Westen auf Ablehnung. Kann Jugoslawien trotz ständiger Bedrohungen von beiden Seiten als unabhängiges sozialistisches Land bestehen?"
 IRQ_END_OF_WW2_DESC:0 "Nach dem arabisch-israelischen Krieg von 1948 ist der Irak trotz seiner Niederlage in der Lage, im Nahen Osten viel zu bewirken. Er hat jedoch mit kurdischen Rebellen zu kämpfen, die zuletzt durch Mustafa Barzanis Aufstand angefacht wurden. Der Irak ist von den Briten abhängig, die ihm im Gegenzug für Hilfe über die Iraqi Petroleum Company Zugang zu seinem Öl gewähren. An diesem haschemitischen Hof herrscht ein heftiger Konflikt zwischen den neuen „freien“ Militärs und dem alten monarchistischen Hof, der gelöst werden muss."
 EGY_END_OF_WW2_DESC:0 "Das Sultanat Ägypten soll 1922 seine Unabhängigkeit erlangt haben, doch ein großer Teil der Bevölkerung glaubt nicht, dass dies mehr als nur dem Namen nach wahr ist. König Faruk wird von vielen Ägyptern als Schlüsselinstrument der britischen Kontrolle über den Suezkanal angesehen. In allen Kreisen – Regierung, Zivilgesellschaft und Militär – regiert Widerstand gegen den regierenden Monarchen. Ägyptische und panarabische Nationalisten wollen den Suezkanal aus britischer Hand befreien. Eine weitere Herrschaft von König Faruk ist ohne außergewöhnliche britische Unterstützung unwahrscheinlich."
 JAP_END_OF_WW2_DESC:0 "Japans imperiale Ambitionen wurden von den Alliierten zunichte gemacht. Unter amerikanischer Besatzung versucht diese ehemalige imperiale Macht nun, sich von den verheerenden Bombenangriffen des Zweiten Weltkriegs zu erholen. Wie sieht die Zukunft Japans aus? Wird das Land den neuen demokratischen Weg einschlagen oder radikalere Maßnahmen ergreifen?"
 SOJ_END_OF_WW2_DESC:0 "Japans imperiale Ambitionen wurden von den Alliierten zunichte gemacht. Unter amerikanischer Besatzung versucht diese ehemalige imperiale Macht nun, sich von den verheerenden Bombenangriffen des Zweiten Weltkriegs zu erholen. Wie sieht die Zukunft Japans aus? Wird das Land den neuen demokratischen Weg einschlagen oder radikalere Maßnahmen ergreifen?"
 OTHER_DESC:0 "Die Nationen der Welt, ob groß oder klein, geben sich nicht damit zufrieden, den Atem anzuhalten und auf den Ausbruch eines weiteren globalen Konflikts zu warten. Von den Großmächten am Rande eines Bürgerkriegs bis hin zu den vielen Nationen, die durch den Zweiten Weltkrieg entstanden und verändert wurden, werden alle schwierige Entscheidungen treffen und Ideale mit Pragmatismus in Einklang bringen müssen, um die Zukunft der Welt mitzugestalten."

