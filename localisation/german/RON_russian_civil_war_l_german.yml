l_german: 
 russia_civilwar.1:0 "Auflösung der verfassunggebenden Versammlung"
 russia_civilwar.1.t:0 "Bolschewiki lösen die verfassunggebende Versammlung auf"
 russia_civilwar.1.d:0 "Die Allrussische Konstituierende Versammlung, die am 25. November 1917 zum ersten und einzigen Mal gewählt wurde, war der erste Versuch einer Öffnung Russlands hin zur Demokratie. Die Sozialrevolutionäre unter Viktor Tschernow errangen die Mehrheit der Sitze, gefolgt von den Bolschewiki unter Lenin. Dies galt jedoch bis Lenin, der seit der Oktoberrevolution die Hauptstadt und Westrussland kontrollierte und sich als Anhänger der sogenannten „bürgerlichen Demokratie“ bezeichnete. Er löste das Parlament auf und verboten die ihm angeschlossenen Parteien wie die Rechten Sozialrevolutionäre, Menschewiki, Kadetten und andere. Diese radikale Entscheidung führte zu politischen Unruhen seitens anderer hochrangiger Parteimitglieder und -führer, die die Haltung der Kommunisten öffentlich scharf kritisierten und sie als tyrannische Maßnahme und „gegen den Willen des Volkes“ bezeichneten."
 russia_civilwar.1.a:0 "Sie haben bekommen, was sie verdient haben."
 russia_civilwar.1.b:0 "Ein Schlag für die russische Demokratie"
