RUS_centralization_bop:0 "Kronenstabilität"
capture_the_east_rus:0 "Erobern Sie die östlichen Gebiete"
capture_the_east_rus_desc:0 "Erobern Sie die historisch bedeutsamen Gebiete, um unsere Präsenz im Osten zu festigen und unsere Kontrolle über die Region zu behaupten."
RUS_hold_onto_poland:0 "Behalten Sie polnisches Territorium"
RUS_hold_onto_poland_desc:0 "Die Kontrolle über polnische Gebiete zu behalten, um eine strategische Pufferzone zu sichern und unseren Einfluss in Osteuropa zu behaupten. Das Halten dieses Landes wird unsere regionale Macht stärken und potenzielle Bedrohungen aus dem Westen abschrecken."
RUS_hold_onto_minsk_kiev:0 "Halten Sie an Minsk und Kiew fest"
RUS_hold_onto_minsk_kiev_desc:0 "Nach dem Verlust Polens ist die Kontrolle über Minsk und Kiew für die Sicherung unserer westlichen Gebiete von entscheidender Bedeutung. Diese Städte sind wichtige Stützpunkte, die unseren Einfluss in der Region festigen und als strategische Puffer gegen weitere Vorstöße dienen. Die Verteidigung von Minsk und Kiew stärkt unsere Position und stabilisiert unsere Verteidigung."

capture_konigsberg_rus:0 "Königsberg erobern"
capture_konigsberg_rus_desc:0 "Königsberg ist eine strategisch wichtige Stadt mit kultureller und historischer Bedeutung. Ihre Eroberung würde unsere Macht im Osten festigen und uns eine wertvolle Festung bieten."
capture_budapest_decision:0 "Erobern Sie Budapest"
capture_budapest_decision_desc:0 "Erobern Sie Budapest, um dessen strategische Ressourcen und Infrastruktur zu sichern. Die Einnahme der Stadt stärkt unsere Position in der Region und dient als wichtige Basis für weitere Operationen."

rename_konigsberg_tzarsberg:0 "Umbenennung von Königsberg in Tzarsberg"
rename_konigsberg_tzarsberg_desc:0 "Um unseren Triumph zu würdigen und das Erbe der Krone zu etablieren, werden wir Königsberg in Tzarsberg umbenennen, um die Stärke und Autorität des Zaren zu symbolisieren."
RUS_stability_of_the_crown_bop_desc:0 "Stellt das Kräfteverhältnis zwischen der Monarchie und den Gegenkräften dar. Verschiebungen in diesem Gleichgewicht wirken sich auf die Stabilität der Krone aus."
RUS_monarchy_stability_side_desc:0 "Die Monarchie behält die Kontrolle und symbolisiert die Autorität des Zaren."
defeat_germany:0 "Deutschland besiegt"
defeat_germany_desc:0 "Deutschland ist besiegt. Seine einst in ganz Europa gefürchtete Militärmaschinerie ist unter der Last unserer Streitkräfte zusammengebrochen. Mit diesem Zusammenbruch verschieben sich die Machtverhältnisse und eröffnen neue Möglichkeiten für Einfluss und Stabilität in der Region."

defeat_austria_hungary:0 "Österreich-Ungarn besiegt"
defeat_austria_hungary_desc:0 "Die österreichisch-ungarische Monarchie ist gefallen. Die einst mächtige Doppelmonarchie konnte den Belastungen des Krieges und der inneren Spaltung nicht standhalten. Die Niederlage Österreich-Ungarns markiert das Ende einer Ära und verändert die politische Landschaft Mitteleuropas."
