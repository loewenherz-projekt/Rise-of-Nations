early_CAS_equipment_1910_desc:0 "Das erste Flugzeug, das ausschließlich der Luftnahunterstützung dient, entspricht im Grunde dem neuesten Stand der Technik. Das Design ist für den Einsatz gegen feindliche (oder eigene) Bodeneinheiten optimiert. Es verwendet zuverlässigere Teile, größere Treibstofftanks und einen sparsameren Motor."
early_fighter_equipment_1906_desc:0 "Es wurden weitere Verbesserungen am vorherigen Design vorgenommen. An der Vorderseite sind einfache Gewehre angebracht, sodass eine gewisse Angriffsfähigkeit gegeben ist, aber es handelt sich definitiv nicht um das Endprodukt."
early_fighter_equipment_1908_desc:0 "Es verfügt über einen größeren Motor, größere Treibstofftanks, bessere Steuerflächen und fortschrittlichere Gewehre als das Vorgängermodell. Was könnten wir mehr verlangen? Eigentlich eine Menge."

RON_Air_Engine_Improvements_desc:0 "Verbesserte Motoren für Kampfflugzeuge, mit besseren Zündzeitpunkten und besseren Teilen. Gute Voraussetzungen für zukünftige Innovationen."
RON_Fighter_1490_desc:0 "Der Traum vom Fliegen muss mit der Beobachtung von Vögeln am Himmel begonnen haben. Jahrtausendelang scheiterte der Fortschritt jedoch an Versuchen, Fluggeräte zu konstruieren, die den Flügelschlag von Vögeln nachahmen. Die Generationen von Experimentatoren und Träumern, die sich auf Ornithopter konzentrierten – Maschinen, bei denen Flügelschlag sowohl Auftrieb als auch Vortrieb erzeugte –, trugen nichts Wesentliches zur endgültigen Lösung der Probleme bei, die dem mechanischen Fliegen im Wege standen."
RON_Fighter_1890_desc:0 "In den 1870er Jahren stellte sich Otto Lilienthal schließlich der Herausforderung, den Traum des Menschen vom Fliegen zu verwirklichen, indem er zahlreiche Prototypen von Segelflugzeugen und motorlosen Doppeldeckern schuf und bis zu seinem Tod im Jahr 1896 über 2.000 Flüge absolvierte."
RON_Fighter_1903_desc:0 "„Wright Flyer – Die erste motorisierte Maschine, die mit einem Piloten im Ausland einen kontrollierten, anhaltenden Flug ermöglichte.“ Dies ist das erste Flugzeug, wie wir es kennen, und von hier aus können wir nur noch weitermachen."
bba_RON_Fighter_1890_desc:0 "In den 1870er Jahren nahm Otto Lilienthal als erster Mensch endlich die Herausforderung an, den Traum des Menschen vom Fliegen zu verwirklichen, indem er zahlreiche Prototypen von Segelflugzeugen und motorlosen Doppeldeckern entwickelte und bis zu seinem Tod im Jahr 1896 über 2.000 Flüge absolvierte."
bba_RON_Fighter_1903_desc:0 "„Wright Flyer – Die erste motorisierte Maschine, die mit einem Piloten im Ausland einen kontrollierten, anhaltenden Flug ermöglichte.“ Dies ist das erste Flugzeug, wie wir es kennen, und von hier aus können wir nur noch weitermachen."

