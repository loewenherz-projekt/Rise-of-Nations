#Descriptions
ww1_radio_desc:0 "AM-Radio – möglicherweise die wichtigste Erfindung des 20. Jahrhunderts. Die Fertigstellung dieses frühen Prototyps wird als Grundlage für noch ausgefeiltere Kriegsführung, zivile Kommunikation und mehr dienen."
ww1_electronic_mechanical_engineering_desc:0 "Durch die Zusammenlegung der Abteilungen Maschinenbau und Elektrotechnik wird sichergestellt, dass unsere Wissenschaftler bei zukünftigen Innovationen enger zusammenarbeiten und wir schnellere Ergebnisse erzielen können."
subhulltech1_desc:0 "Durch die Montage erster Funkgeräte im Inneren von U-Boot-Rümpfen können wir dafür sorgen, dass sie besser organisiert sind und im Feld eine bessere Leistung erbringen."
