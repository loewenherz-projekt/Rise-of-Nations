RON_Gas_Turbines_desc:0 "Ausschließlich für Forschungszwecke hergestellte Gasturbinen."
RON_Printing_Press_desc:0 "In einem Land ist es von entscheidender Bedeutung, vertrauliche Dokumente tatsächlich vertraulich zu behandeln. Indem wir die vorhandenen Druckschemata verbessern und rationalisieren und gleichzeitig neue Verfahren für den Umgang mit diesen Dokumenten entwickeln, können wir sie sicherer aufbewahren."
hoi4tgw_encryption_desc:0 "Weitere Verfahren dazu, was zu tun ist, um den Feind am Diebstahl wichtiger Informationen zu hindern, und wenn dies nicht möglich ist, wie man ihn daran hindert, ungestraft davonzukommen."
RON_Television_Broadcasting_desc:0 "Erste TV-Prototypen, vielleicht können wir sie später nutzen, um Informationen in Elektrizität zu speichern?"
RON_Early_Radio_desc:0 ""
RON_Early_Circuit_Boards_desc:0 "Die Herstellung einer ersten Leiterplatte wird uns einen großen Durchbruch in der Informatik bescheren."
RON_Information_Study_desc:0 "Um mehr Informationen über unsere Feinde zu erhalten, müssen wir unsere Geheimdienstnetzwerke darin schulen, wie man nach geheimen Dokumenten sucht und diese effektiv nutzt."
hoi4tgw_decryption_desc:0 "Mehr Schulungen zum Auffinden geheimer Dokumente und Ausbau unserer Geheimdienste. Vielleicht können wir in Zukunft eine Maschine bauen, die das für uns erledigt?"
RON_Headset_desc:0 "Verbesserte Headsets, die mit speziellen Funkgeräten verbunden sind, mit denen wir alle unverschlüsselten Gespräche des Feindes auffangen können. Das wird im Informationskrieg eine wichtige Rolle spielen."
