 modern_tank_aa_equipment_1:0 "Moderne SP-Luftabwehr"
 modern_tank_aa_equipment_1_desc:0 "Moderne Flugabwehrartillerie ist eine Kombination aus Flugabwehrraketen und Schnellfeuerkanonen und stellt eine tödliche Bedrohung für Flugzeuge dar."
