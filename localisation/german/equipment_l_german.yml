 ENG_infantry_equipment_3:0 "Sterling Mk.I"
 ENG_infantry_equipment_3_short:0 "Sterling Mk.I"
 ENG_light_field_gun_equipment_1890:0 "Ordnance BL 12-Pfünder 7 Zentner"
 ENG_light_field_gun_equipment_1890_short:0 "BL 12-Pfünder"
 ENG_light_field_gun_equipment_1890_desc:0 "Das Geschütz wurde zunächst sowohl von der Royal Field Artillery als auch von der Royal Horse Artillery eingesetzt und war ab 1885 voll im Einsatz. Es markierte eine Rückkehr zu Hinterladergeschützen, nachdem die britische Armee in den späten 1860er Jahren nach dem Versagen der Armstrong-Schraubenverschlussgeschütze wieder zu Vorderladern zurückgekehrt war."
 ENG_light_field_gun_equipment_1:0 "Ordnance BL 15-Pfünder"
 ENG_light_field_gun_equipment_1_short:0 "BL 15-Pfünder"
 ENG_light_field_gun_equipment_1_desc:0 "Der Ordnance BL 15-Pfünder, auch bekannt als 15-Pfünder 7 Zentner, war das Feldgeschütz der britischen Armee im Zweiten Burenkrieg und einige Exemplare davon blieben in begrenztem Umfang in kleineren Kriegsschauplätzen des Ersten Weltkriegs im Einsatz. Er feuerte Granaten mit einem Durchmesser von 3 Zoll und einem Höchstgewicht von 15 Pfund ab, daher sein Name, der ihn von seinem Vorgänger unterschied, der Granaten mit einem Gewicht von nur 12,5 Pfund abfeuerte."
 ENG_light_field_gun_equipment_1903:0 "Ordnance QF 18-Pfünder"
 ENG_light_field_gun_equipment_1903_short:0 "18-Pfünder-Kanone"
 ENG_light_field_gun_equipment_1903_desc:0 "Die Ordnance QF 18-Pfünder-Kanone, kurz 18-Pfünder-Kanone, war das Standard-Feldgeschütz des Britischen Empires im Ersten Weltkrieg. Sie bildete das Rückgrat der Royal Field Artillery und wurde in großen Stückzahlen produziert. Sie wurde von den britischen Streitkräften in allen wichtigen Kriegsschauplätzen und 1919 von britischen Truppen in Russland eingesetzt." 
 ENG_light_field_gun_equipment_1906:0 "Ordnance QF 18-Pfünder Mk II"
 ENG_light_field_gun_equipment_1906_short:0 "18-Pfünder Mk II"
 ENG_light_field_gun_equipment_1906_desc:0 "Das ursprüngliche 18-Pfünder-Geschütz wurde ab 1906 in der Produktion schnell durch das „rationalisierte“ Mark-II-Geschütz ersetzt, da es sich leichter auskleiden ließ. Die Außenseite des Innenrohrs war leicht konisch und wurde durch hydraulischen Druck in eine passende konische Hülse eingesetzt. Mark-I- und Mark-II-Geschütze waren auch nach dem Ersten Weltkrieg noch im Einsatz, und einige kamen sogar im Zweiten Weltkrieg im Fernen Osten zum Einsatz. " 
 ENG_light_field_gun_equipment_1908:0 "BLC 15-Pfünder-Gewehr"
 ENG_light_field_gun_equipment_1908_desc:0 "Das Ordnance BLC 15-Pfünder-Geschütz (BLC stand für BL Converted) war eine modernisierte Version des veralteten BL 15-Pfünder-7-Zentner-Geschützes und verfügte über einen Rückstoß- und Rekuperatormechanismus über dem Lauf sowie einen modifizierten, schneller öffnenden Verschluss. Es wurde entwickelt, um den Artilleriebrigaden der Territorial Force ein einigermaßen modernes Feldgeschütz zur Verfügung zu stellen, ohne die Kosten für die Ausrüstung mit dem neueren 18-Pfünder tragen zu müssen."
 ENG_light_field_gun_equipment_2:0 "18-Pfünder Mk IV"
 ENG_light_field_gun_equipment_2_short:0 "18-Pfünder Mk IV"
 ENG_light_field_gun_equipment_2_desc:0 "Die Hauptvariante war die Mark-IV-Kanone auf einer Mk-IV-Lafette. Die Mk-IV-Kanone wurde 1916 auf einer neuen Lafette mit Kastenführung getestet, was eine größere Höhenrichtbarkeit und maximale Reichweite von 6000 bis 8000 Metern mit der Zweiladungsgranate ermöglichte. Der neue einläufige „Asbury-Verschluss“ ermöglichte höhere Feuerraten, wobei eine Welin-Kegelschraube für den Verschluss verwendet wurde. Bis 1919 war die 18-Pfünder-Mk-IV-Kanone auf einer Mk-IV-Lafette das britische Standard-Feldgeschütz."
 ENG_light_field_gun2:0 "18-Pfünder Mk IVP"
 ENG_light_field_gun2_short:0 "Mk IVP"
 ENG_light_field_gun2_desc:0 "In den 1930er Jahren, als die britische Armee mit der vollständigen Mechanisierung begann, wurden alle Geschütze auf mechanisierten Schleppbetrieb umgerüstet. Zunächst wurden dafür schwere Holzräder mit Vollgummireifen montiert, wodurch die Lafetten zu den Typen Mk IIITR, IVR und VR wurden. Später wurden die Holzräder durch neue Achsen, Stahlräder, Luftreifen und moderne Bremsen ersetzt. Die Lafetten Mk IV und V wurden von den Briten umgebaut, um die Typen Mk IVP und VP mit 9,00 x 16 Zoll großen Rädern herzustellen."
 ENG_heavy_field_gun_equipment_1:0 "RML 6,6-Zoll-Haubitze"
 ENG_heavy_field_gun_equipment_1_short:0 "RLM 6,6 Zoll"
 ENG_heavy_field_gun_equipment_1_desc:0 "Die RML-Haubitze mit 6,6 Zoll war eine britische gezogene Vorderladerhaubitze, die im 19. Jahrhundert in England hergestellt wurde und ein Projektil mit einem Gewicht von etwa 100 Pfund abfeuerte. Sie wurde in Belagerungsbatterien und Befestigungen eingesetzt. "
 ENG_heavy_field_gun_equipment_1903:0 "BL 5-Zoll-Haubitze"
 ENG_heavy_field_gun_equipment_1903_short:0 "BL 5 Zoll"
 ENG_heavy_field_gun_equipment_1903_desc:0 "Die 5-Zoll-Haubitze Ordnance BL wurde ursprünglich eingeführt, um der Royal Field Artillery weiterhin die Möglichkeit zu geben, explosive Granaten herzustellen, nachdem man sich in den 1890er Jahren dazu entschlossen hatte, sich auf Schrapnells für Feldgeschütze zu konzentrieren."
 ENG_heavy_field_gun_equipment_1906:0 "BL 5-Zoll-Haubitze Upgrade 1"
 ENG_heavy_field_gun_equipment_1906_short:0 "BL 5-Zoll-Haubitze"
 ENG_heavy_field_gun_equipment_1906_desc:0 "Verbesserte BL 5-Zoll-Haubitze"
 ENG_heavy_field_gun_equipment_1908:0 "QF 4,5-Zoll-Haubitze"
 ENG_heavy_field_gun_equipment_1908_desc:0 "Die 4,5-Zoll-Haubitze Ordnance QF war die Standard-Feldhaubitze des Britischen Empires im Ersten Weltkrieg. Sie ersetzte die 5-Zoll-Haubitze BL und rüstete rund 25 % der Feldartillerie aus. Sie blieb während der Zwischenkriegszeit im Einsatz und wurde zuletzt Anfang 1942 von britischen Streitkräften im Feld eingesetzt. Bis zur Mechanisierung in den 1930er Jahren wurde sie in der Regel von Pferden gezogen."
 ENG_heavy_field_gun_equipment_2:0 "BL 9,2-Zoll-Haubitze" 
 ENG_heavy_field_gun_equipment_2_short:0 "BL 9,2 Zoll" 
 ENG_heavy_field_gun_equipment_2_desc:0 "Die 9,2-Zoll-Haubitze Ordnance BL war eine schwere Belagerungshaubitze, die im Ersten Weltkrieg die wichtigste Gegenbatterieausrüstung der britischen Streitkräfte in Frankreich bildete. Sie war in zahlreichen Belagerungsbatterien der Royal Garrison Artillery im Einsatz. Sie blieb bis etwa zum Beginn des Zweiten Weltkriegs im Einsatz. " 
 ENG_heavy_field_gun_equipment_3:0 "Ordnance BL 12-Zoll-Haubitze Mk IV"
 ENG_heavy_field_gun_equipment_3_short:0 "BL 12 Zoll Mk IV"
 ENG_heavy_field_gun_equipment_3_desc:0 "Nach dem Erfolg ihrer 9,2-Zoll-Haubitze BL entwarf Vickers eine fast identische Version mit einem Kaliber von 12 Zoll. Die Mk II wurde im August 1916 an der Westfront in Dienst gestellt. Die Mk IV war eine leistungsstärkere Version mit längerem Rohr und wurde ab 1917 produziert."
