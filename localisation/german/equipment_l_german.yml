 JAP_early_infantry_equipment_0:1 "Karabiner Typ 44"
 JAP_early_infantry_equipment_0_desc:1 "Ähnlich wie das Karabiner Typ 38 von der hinteren Mitte her unterscheidet sich das Gewehr Typ 44 von der vorderen Mitte her fast vollständig. Das Gewehr Typ 44 wurde 1911 eingeführt. Es gab drei Varianten des Gewehrs."
 JAP_early_infantry_equipment_0_short:1 "Karabiner Typ 44"
 JAP_early_infantry_equipment_1890:1 "Meiji Typ 13 Murata"
 JAP_early_infantry_equipment_1890_desc:1 "Das Murata-Gewehr war das erste im Inland produzierte japanische Dienstgewehr und wurde 1880 als Einzelladergewehr Meiji Typ 13 Murata eingeführt. Die 13 bezog sich auf das Einführungsdatum, das Jahr 13 in der Meiji-Zeit nach dem japanischen Kalender."
 JAP_early_infantry_equipment_1890_short:1 "Murata-Gewehr"
 JAP_early_infantry_equipment_1900:1 "Gewehr Typ 30"
 JAP_early_infantry_equipment_1900_desc:1 "Das Arisaka-Gewehr Typ 30 war ein Repetiergewehr mit Kastenlademechanismus und Zylinderverschluss, das von 1897 bis 1905 das Standard-Infanteriegewehr der Kaiserlich Japanischen Armee war."
 JAP_early_infantry_equipment_1900_short:1 "Typ 30"
 JAP_early_infantry_equipment_1902:1 "Karabiner Typ 30"
 JAP_early_infantry_equipment_1902_desc:1 "Das Karabiner- oder Kavalleriegewehr Typ 30 ist eine modifizierte Version, die 300 mm kürzer ist als das Infanteriemodell. Es wurde hergestellt, um Kavallerietruppen mit einem modernen Karabiner auszustatten."
 JAP_early_infantry_equipment_1902_short:1 "Karabiner Typ 30"
 JAP_early_infantry_equipment_1904:1 "Marinegewehr Typ 35"
 JAP_early_infantry_equipment_1904_desc:1 "Ein modifizierter und verbesserter Typ 30, hergestellt für die Kaiserlich Japanische Marine."
 JAP_early_infantry_equipment_1904_short:1 "Typ 35"
 JAP_early_infantry_equipment_1906:1 "Früher Typ 38"
 JAP_early_infantry_equipment_1906_desc:1 "Die IJA führte 1897 das Gewehr Typ 30 ein. Die Waffe hatte jedoch zahlreiche Mängel. Major Kijiro Nambu überarbeitete das Gewehr Typ 30 und gab ihm die Bezeichnung Typ 38. Das Gewehr wurde 1906 eingeführt."
 JAP_early_infantry_equipment_1906_short:1 "Früher Typ 38"
 JAP_early_infantry_equipment_1908:1 "Karabiner Typ 38"
 JAP_early_infantry_equipment_1908_desc:1 "Das für den Einsatz durch Kavallerie, Pioniere, Quartiermeister und andere Truppen außerhalb der Frontlinie vorgesehene Karabiner Typ 38 wurde etwa zur gleichen Zeit wie das Standardgewehr Typ 38 in Dienst gestellt."
 JAP_early_infantry_equipment_1908_short:1 "Karabiner Typ 38"
 JAP_early_infantry_equipment_1:1 "Typ 38 1914"
 JAP_early_infantry_equipment_1_desc:1 "Experimenteller Typ 38 1914"
 JAP_early_infantry_equipment_2:1 "Typ 38 1916"
 JAP_early_infantry_equipment_2_desc:1 "Experimenteller Typ 38 1916"
 JAP_early_infantry_equipment_3:1 "Nambu Typ 1"
 JAP_early_infantry_equipment_3_desc:1 "Die Nambu Typ 1, manchmal auch Experimental Type 1 Submachine Gun genannt, war eine japanische Maschinenpistole, die von der Nambu Arms Manufacturing Company hergestellt wurde."
 JAP_early_infantry_equipment_4:1 "Typ 38 1918"
 JAP_early_infantry_equipment_4_desc:1 "Experimenteller Typ 38 1918"
