 gw_car_equipment:0 "Panzerwagen der Zwischenkriegszeit"
 gw_car_equipment_desc:0 "Während es sich bei früheren Panzerwagen um einfache kommerzielle Modelle mit dünner Stahlpanzerung handelte, wurde dieses Modell von Grund auf für den Transport von Panzerung und leichter Bewaffnung konzipiert."
 gw_tank_equipment:0 "Panzer des Ersten Weltkriegs"
 gw_tank_equipment_desc:0 "Im Ersten Weltkrieg wurden Panzer von Großbritannien und Frankreich getrennt und gleichzeitig entwickelt, um den festgefahrenen Stellungskrieg an der Westfront zu beenden. Der Name „Tank“ wurde von den Briten in der frühen Entwicklungsphase als Sicherheitsmaßnahme übernommen, um ihren Zweck zu verschleiern. Frühe Panzer waren mit Maschinengewehren und kleinen Kanonen bewaffnet, bewegten sich langsam und waren nur so stark gepanzert, dass sie Kleinwaffenfeuer abwehrten."
 gw_tank_equipment_short:0 "Panzer des Ersten Weltkriegs"
