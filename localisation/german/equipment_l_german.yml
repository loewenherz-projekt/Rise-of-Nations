 SOV_infantry_equipment_0:0 "Mosin-Nagant M1891/30"
 SOV_infantry_equipment_0_desc:0 "Die am weitesten verbreitete Version des Mosin-Nagant. Es wurde von 1930 bis 1945 als Standardausrüstung für die gesamte sowjetische Infanterie hergestellt. Die meisten Dragonergewehre wurden ebenfalls auf den M1891/30-Standard umgebaut. Im Zweiten Weltkrieg wurde es häufig als Scharfschützengewehr eingesetzt."
