 mechanized_equipment:0 "Mechanisiert"
 mechanized_equipment_1:0 "Mechanisierte Ausrüstung I"
 mechanized_equipment_1_desc:0 "Mechanisierte Infanterie ist Infanterie, die für Transport und Kampf mit gepanzerten Mannschaftstransportwagen (APCs) oder Schützenpanzern (IFVs) ausgerüstet ist. Mechanisierte Infanterie unterscheidet sich von motorisierter Infanterie dadurch, dass ihre Fahrzeuge einen gewissen Schutz vor feindlichem Beschuss bieten, im Gegensatz zu weichhäutigen Radfahrzeugen (Lastwagen oder Jeeps) bei motorisierter Infanterie."
