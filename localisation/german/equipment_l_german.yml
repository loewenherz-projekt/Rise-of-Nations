 USA_early_infantry_equipment_0:0 "M1903-1910"
 USA_early_infantry_equipment_0_desc:0 "Modell M1903-1910"
 USA_early_infantry_equipment_1890:0 "Springfield Modell 1884"
 USA_early_infantry_equipment_1890_desc:0 "Das Springfield Modell 1888 war eines von mehreren Gewehrmodellen, die Springfield Armory im späten 19. Jahrhundert für das US-Militär herstellte. Es war das letzte Modell einer langen Reihe von „Trapdoor Springfield“-Gewehren, die seit den 1860er Jahren gebaut wurden, und das letzte Einzelschussgewehr, das im amerikanischen Militärdienst eingesetzt wurde. "
 USA_early_infantry_equipment_1900:0 "Springfield-Modell 1892–99"
 USA_early_infantry_equipment_1900_desc:0 "Das Springfield Model 1892–99 Krag–Jørgensen-Gewehr ist ein in Norwegen entwickeltes Repetiergewehr, das 1892 als Standard-Langwaffe der US-Armee eingeführt wurde und für US-Kaliber .30-40 Krag-Patronen ausgelegt war."
 USA_early_infantry_equipment_1902:0 "M1903 Springfield"
 USA_early_infantry_equipment_1902_desc:0 "Das M1903 Springfield, offiziell das United States Rifle, Kaliber .30-06, Modell 1903, ist ein amerikanisches Repetiergewehr mit Zylinderverschluss und fünfschüssigem Magazin, das hauptsächlich in der ersten Hälfte des 20. Jahrhunderts verwendet wurde."
 USA_early_infantry_equipment_1904:0 "Springfield M1905"
 USA_early_infantry_equipment_1904_desc:0 "Bis Januar 1905 wurden in der bundeseigenen Springfield Armory über 80.000 Springfield 1903-Gewehre hergestellt. Präsident Theodore Roosevelt beanstandete jedoch das Design des verwendeten Bajonetts mit Gleitstange, da es für den Kampfeinsatz zu schwach war. Alle bis dahin hergestellten Gewehre mussten daher auf ein Klingenbajonett namens M1905 umgerüstet werden."
 USA_early_infantry_equipment_1906:0 "Springfield M1903-1906"
 USA_early_infantry_equipment_1906_desc:0 "Die Umrüstung der Springfield-Gewehre des Modells M1905 war fast abgeschlossen, als entschieden wurde, eine weitere Änderung vorzunehmen, um die Verwendung von Spitzmunition zu ermöglichen. Die neue Patrone erhielt die Bezeichnung „Patrone, Kugel, Kaliber .30, Modell 1906“. Die M1906-Patrone ist besser bekannt als die .30-06 Springfield-Patrone, die in vielen Gewehren und Maschinengewehren verwendet wird und bis heute eine beliebte zivile Patrone ist."
 USA_early_infantry_equipment_1908:0 "M1903-1908"
 USA_early_infantry_equipment_1908_desc:0 "Modell M1903-1908"
 USA_early_infantry_equipment_1:0 "M1903-1913"
 USA_early_infantry_equipment_1_desc:0 "Modell M1903-1913"
 USA_early_infantry_equipment_2:0 "M1903-1917"
 USA_early_infantry_equipment_2_desc:0 "Modell M1903-1917"
 USA_early_infantry_equipment_3:0 "Garand Modell 1919"
 USA_early_infantry_equipment_3_desc:0 "Das Garand Modell 1919 ist der Prototyp eines halbautomatischen Gewehrs/leichten Maschinengewehrs. Die Waffe wurde bei der Entwicklung des M1 Garand verwendet."
 USA_early_infantry_equipment_4:0 "Springfield Modell 1903 Mark I"
 USA_early_infantry_equipment_4_desc:0 "Waffenkonstrukteur John Pedersen entwickelte einen Mechanismus, der in den Verschlusskanal eines Gewehrs passte und den Repetiermechanismus in eine halbautomatische Waffe verwandelte. Entwicklung und Produktion erfolgten unter Geheimhaltung unter der Bezeichnung US Automatic Pistol, Kaliber .30, Modell 1918, auch Pedersen Device genannt. Um das Pedersen Device unterzubringen, mussten einige Änderungen an einem Standard-Repetiergewehr vorgenommen werden. Das einzige Gewehr, das modifiziert wurde und in Serienproduktion ging, war das US Rifle, Kal. .30, Modell M1903, Mark I bei Springfield Armory."
