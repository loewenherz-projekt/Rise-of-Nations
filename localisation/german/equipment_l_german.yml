 train_equipment_0_desc:0 "Dampflokomotiven werden mit kohlebefeuerten Kesseln angetrieben, um eine Dampfmaschine anzutreiben. Züge transportieren Vorräte von der Versorgungshauptstadt zu Versorgungszentren, die per Bahn verbunden sind."
 train_equipment_1_desc:0 "Dampflokomotiven werden mit kohlebefeuerten Kesseln angetrieben, um eine Dampfmaschine anzutreiben. Züge transportieren Vorräte von der Versorgungshauptstadt zu Versorgungszentren, die per Bahn verbunden sind."
 train_equipment_2_desc:0 "Dampflokomotiven werden mit kohlebefeuerten Kesseln angetrieben, um eine Dampfmaschine anzutreiben. Züge transportieren Vorräte von der Versorgungshauptstadt zu Versorgungszentren, die per Bahn verbunden sind."
 train_equipment_3_desc:0 "Diesellokomotiven verwenden mit Diesel betriebene Verbrennungsmotoren, um größere Frachtmengen schneller zu transportieren als eine Dampflokomotive."
 train_equipment_4_desc:0 "Diesellokomotiven verwenden mit Diesel betriebene Verbrennungsmotoren, um größere Frachtmengen schneller zu transportieren als eine Dampflokomotive."
 train_equipment_5_desc:0 "Bei während des Krieges produzierten Zügen können bestimmte Sicherheits- und Schutzfunktionen nicht unbedingt gewährleistet werden, da man darauf aus ist, möglichst viele Lokomotiven zu produzieren, um die riesigen logistischen Netzwerke einer modernen Armee mit Energie zu versorgen."
 train_equipment_6_desc:0 "Bei während des Krieges produzierten Zügen können bestimmte Sicherheits- und Schutzfunktionen nicht unbedingt gewährleistet werden, da man darauf aus ist, möglichst viele Lokomotiven zu produzieren, um die riesigen logistischen Netzwerke einer modernen Armee mit Energie zu versorgen."
 train_equipment_7_desc:0 "Diesellokomotiven verwenden mit Diesel betriebene Verbrennungsmotoren, um größere Frachtmengen schneller zu transportieren als eine Dampflokomotive."
 train_equipment_8_desc:0 "Elektrische Lokomotiven verwenden Elektromotoren, die über Oberleitungen oder Batterien angetrieben werden, und sind daher effizienter als Dampf- und Diesellokomotiven."
 train_equipment_9_desc:0 "Elektrische Lokomotiven verwenden Elektromotoren, die über Oberleitungen oder Batterien angetrieben werden, und sind daher effizienter als Dampf- und Diesellokomotiven."
 train_equipment_10_desc:0 "Elektrische Lokomotiven verwenden Elektromotoren, die über Oberleitungen oder Batterien angetrieben werden, und sind daher effizienter als Dampf- und Diesellokomotiven."
 train_equipment_11_desc:0 "Elektrische Lokomotiven verwenden Elektromotoren, die über Oberleitungen oder Batterien angetrieben werden, und sind daher effizienter als Dampf- und Diesellokomotiven."
 train_equipment_12_desc:0 "Mithilfe leistungsstarker Elektromagnete schweben Magnetschwebebahnen über den Gleisen, wodurch die Reibung auf den Schienen beseitigt wird und die Züge mit beispielloser Geschwindigkeit durch das Land fliegen können."
