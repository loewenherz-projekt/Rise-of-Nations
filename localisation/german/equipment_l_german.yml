 super_heavy_tank_equipment:0 "Superschwerer Panzer"
 super_heavy_tank_equipment_1:0 "Superschwerer Panzer"
 super_heavy_tank_equipment_1_desc:0 "Superschwere Panzer sind eine Weiterentwicklung des Konzepts der schweren Panzer. Sie sind zwar größer, besser bewaffnet und stärker gepanzert, aber auch langsamer und haben große Probleme mit weichem Untergrund. Nur wenige Brücken können ihr Gewicht tragen."
