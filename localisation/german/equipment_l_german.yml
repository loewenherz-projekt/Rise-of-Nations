 CHI_early_infantry_equipment_0:1 "Gewehr Typ 1"
 CHI_early_infantry_equipment_0_desc:1 "Das Mauser Modell 1904 wurde ursprünglich während der kaiserlichen Herrschaft als Guang Xu Typ 33 hergestellt. Die neu gegründete Republik China wählte es zum Standardgewehr der chinesischen Armee, dem Gewehr Typ 1, das das Hanyang 88 ersetzen sollte."
 CHI_early_infantry_equipment_0_short:1 "Typ 1"
 CHI_early_infantry_equipment_1890_desc:1 "Das Typ 88, auch bekannt als Hanyang 88 oder Hanyang Zao, ist ein in China hergestelltes Repetiergewehr, das direkt dem deutschen Gewehr 88 nachempfunden ist. Es wurde gegen Ende des 19. Jahrhunderts von der Qing-Dynastie übernommen und war ein chinesisches Standardgewehr, das bis zum Ende des chinesischen Bürgerkriegs von mehreren Fraktionen und Formationen verwendet wurde."
 CHI_early_infantry_equipment_1890_short:1 "Hanyang 88"
 CHI_early_infantry_equipment_1890_short:1 "Typ 88"
 CHI_early_infantry_equipment_1900:1 "Hanyang 88 Karabiner"
 CHI_early_infantry_equipment_1900_desc:1 "Vom Hanyang 88 gab es auch eine Karabinervariante, die kürzer und leichter war, ähnlich dem Karabinermodell Gewehr 1891."
 CHI_early_infantry_equipment_1900_short:1 "Karabiner Typ 88"
 CHI_early_infantry_equipment_1902:1 "Hanyang 88 1902"
 CHI_early_infantry_equipment_1902_desc:1 "Experimenteller Typ 88 1902"
 CHI_early_infantry_equipment_1904:1 "Hanyang 88 1904"
 CHI_early_infantry_equipment_1904_desc:1 "Die Produktion des Typs 99 begann im Jahr 1895, aber der Typ 88 wurde 1904 zur Leistungssteigerung modifiziert. Das Design des Gewehrs wurde geändert, indem die Laufabdeckung entfernt und mehr Holz darauf gelegt wurde, um die Hände des Benutzers vor Verbrennungen zu schützen. Außerdem wurden weitere Anpassungen vorgenommen."
 CHI_early_infantry_equipment_1904_short:1 "Typ 88/1904"
 CHI_early_infantry_equipment_1906:1 "Hanyang 88/1904 Spitzer"
 CHI_early_infantry_equipment_1906_desc:1 "Obwohl die 5-Schuss-En-bloc-Magazine des Hanyang 88 die 7,92 x 57 mm Mauser S-Patronen aufnehmen konnten, kam es – obwohl geplant – nie zu einer Massenumrüstung des Hanyang 88 auf die Aufnahme von Spitzgeschossen."
 CHI_early_infantry_equipment_1906_short:1 "Typ 88 S"
 CHI_early_infantry_equipment_1908:1 "Guang Xu Typ 33"
 CHI_early_infantry_equipment_1908_desc:1 "Das Mauser Modell 1904 war ein Repetiergewehr vom Typ Gewehr 98, das von Mauser und DWM für den Exportmarkt hergestellt wurde. In China war das Gewehr als Modell 1904/1907 bekannt, und bald begann die Produktion im Arsenal von Guangdong als Guang Xu Typ 33, ausgestattet mit einer 6,8-mm-Mauser-Kammer."
 CHI_early_infantry_equipment_1908_short:1 "M1904/1907"
 CHI_early_infantry_equipment_1:1 "Typ 4"
 CHI_early_infantry_equipment_1_desc:1 "Die Revolution von 1911 verlangsamte den Waffenkauf, und 1914 wurden Tausende in Deutschland gelagerte 6,8-mm-Gewehre des Modells 1907 mit dem Standardkaliber 7,92 × 57 mm Mauser ausgestattet und in den Dienst des Deutschen Reiches gestellt. 1915 beschlossen auch die Chinesen, auf 7,92-Patronen umzusteigen, und das Gewehr wurde in 7,9 mm Typ 1 oder Typ 4 umbenannt."
 CHI_early_infantry_equipment_2:1 "Gewehr Typ 24"
 CHI_early_infantry_equipment_2_desc:1 "Der Typ 24 war eine in China hergestellte Kopie des deutschen Standardmodellgewehrs, dem Vorläufer des Karabiners 98k. Die chinesischen Kommunisten bezeichneten ihn damals als Typ 79."
 CHI_early_infantry_equipment_2_short:1 "Typ 24"
 CHI_early_infantry_equipment_3:1 "Blumenmund-Maschinengewehr"
 CHI_early_infantry_equipment_3_desc:1 "SIG in der Schweiz produzierte die ursprünglich deutsche Waffe in Lizenz als SIG Bergmann 1920 und exportierte sie nach dem Ersten Weltkrieg nach China. Chinesische Arsenale in Jinling und Shanghai begannen 1926 mit der Produktion im Kaliber 7,65 mm. Das Bergmann-Gewehr war zu dieser Zeit die am weitesten verbreitete Maschinenpistole in China und wurde „Flower Mouth Machine-gun“ genannt."
 CHI_early_infantry_equipment_3_short:1 "SIG Bergmann 1920"
 CHI_early_infantry_equipment_4:1 "Chiang Kai-shek-Gewehr"
 CHI_early_infantry_equipment_4_desc:1 "Der Typ 24 wurde in Chiang Kai-shek-Gewehr umbenannt, auch bekannt als Zhongzheng/Jiang Jieshi-Gewehr oder Generalissimus-Gewehr, und nach einem Besuch des Generalissimus in der Fabrik nach dem chinesischen Generalissimus Chiang Kai-shek benannt."
