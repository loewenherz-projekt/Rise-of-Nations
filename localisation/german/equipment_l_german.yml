 modern_tank_artillery_equipment:0 "Moderne SP-Artillerie"
 modern_tank_artillery_equipment_1:0 "Moderne SP-Artillerie"
 modern_tank_artillery_equipment_1_desc:0 "Moderne selbstfahrende Artilleriefahrzeuge ähneln oberflächlich betrachtet vielleicht Panzern, sind aber in der Regel nur leicht gepanzert – zu leicht, um im direkten Feuergefecht bestehen zu können. Sie schützen ihre Besatzungen jedoch vor Granatsplittern und Kleinwaffen."
 modern_tank_artillery_equipment_1_short:0 "Moderne Selbstfahrlafette"
 modern_tank_artillery_equipment_desc:0 "Moderne selbstfahrende Artilleriefahrzeuge ähneln oberflächlich betrachtet vielleicht Panzern, sind aber in der Regel nur leicht gepanzert – zu leicht, um im direkten Feuergefecht bestehen zu können. Sie schützen ihre Besatzungen jedoch vor Granatsplittern und Kleinwaffen."
 modern_tank_destroyer_equipment:0 "Moderner Jagdpanzer"
 modern_tank_destroyer_equipment_1:0 "Moderner Jagdpanzer"
 modern_tank_destroyer_equipment_1_desc:0 "Moderne Jagdpanzer sind eine Weiterentwicklung früherer leichter und mittlerer Jagdpanzer und bevorzugen Mobilität und Tarnung gegenüber schwerer Panzerung."
 modern_tank_destroyer_equipment_1_short:0 "Moderner Jagdpanzer"
 modern_tank_destroyer_equipment_desc:0 "Moderne Jagdpanzer sind eine Weiterentwicklung früherer leichter und mittlerer Jagdpanzer und bevorzugen Mobilität und Tarnung gegenüber schwerer Panzerung."
 modern_tank_equipment:1 "Moderner Panzer"
 modern_tank_equipment_1:1 "Moderner Panzer"
 modern_tank_equipment_1_desc:0 "Moderne Panzer sind wendige Mehrzweckpanzer, die viele Aufgaben übernehmen können, beispielsweise als Aufklärer, Unterstützungs- oder sogar Frontpanzer."
 modern_tank_equipment_1_short:1 "Mod. Panzer"
 modern_tank_equipment_desc:0 "Moderne Panzer sind wendige Mehrzweckpanzer, die viele Aufgaben übernehmen können, beispielsweise als Aufklärer, Unterstützungs- oder sogar Frontpanzer."
 motorized_equipment:0 "Motorisiert"
 motorized_equipment_1:0 "Motorisiert"
 motorized_equipment_1_desc:0 "Die Motorisierung der Infanterie ist der erste Schritt zur Mechanisierung einer Armee. Zivile Lastwagen lassen sich problemlos für militärische Zwecke umbauen, zum Transport von Soldaten, zum Ziehen von Waffen sowie zum Transport von Ausrüstung und Vorräten. Dies erhöht die strategische Mobilität von Infanterieeinheiten, die sonst auf Märsche angewiesen wären, erheblich."
 motorized_equipment_desc:0 "Lastwagen und andere Fahrzeuge, die für den Transport von Truppen zum und im Einsatzgebiet verwendet werden."
 motorized_rocket_equipment:0 "Motorisierte Raketenartillerie"
 motorized_rocket_equipment_1:0 "Motorisierte Raketenartillerie"
 motorized_rocket_equipment_1_desc:0 "Solche Mehrfachraketenwerfer bringen Sprengstoff schneller ins Zielgebiet als konventionelle Artillerie, sind jedoch weniger präzise und benötigen eine längere Nachladezeit. Auf Lastwagen montiert, kann diese Version Angriffe starten und die Position wechseln, bevor der Feind das Feuer erwidern kann."
 motorized_rocket_equipment_1_short:0 "Mot. R. Artillerie"
 motorized_rocket_equipment_desc:0 "Solche Mehrfachraketenwerfer bringen Sprengstoff schneller ins Zielgebiet als konventionelle Artillerie, sind jedoch weniger präzise und benötigen eine längere Nachladezeit. Auf Lastwagen montiert, kann diese Version Angriffe starten und die Position wechseln, bevor der Feind das Feuer erwidern kann."
 motorized_rocket_equipment_short:0 "Mot. R. Artillerie"
 plane_armor_upgrade:0 "Rüstung"
 plane_armor_upgrade_desc:0 "Selbstdichtende Treibstofftanks und Panzerplatten verbessern die Überlebenschancen."
 plane_bomb_upgrade:0 "Bombardierung"
 plane_bomb_upgrade_desc:0 "Größerer Bombenschacht für mehr Nutzlast."
 plane_cas_upgrade:0 "Angriff"
 plane_cas_upgrade_desc:0 "Verbesserte Waffen für den Angriff auf Bodenziele"
 plane_engine_upgrade:0 "Motor"
 plane_engine_upgrade_desc:0 "Eine höhere Geschwindigkeit verschafft einem Flugzeug einen Vorteil bei der Positionierung und Zielauswahl. Wichtig für Abfangjäger."
 plane_gun_upgrade:0 "Waffen"
 plane_gun_upgrade_desc:0 "Bessere Waffen für den Kampf gegen andere Flugzeuge"
 plane_naval_upgrade:0 "Angriff"
 plane_naval_upgrade_desc:0 "Höhere Tragfähigkeit von Antischiffswaffen."
 plane_range_upgrade:0 "Reichweite"
 plane_range_upgrade_desc:0 "Ein Flugzeug mit größerer Reichweite kann strategischere Gebiete für Missionen erreichen"
 plane_reliability_upgrade:0 "Zuverlässigkeit"
 plane_reliability_upgrade_desc:0 "Ein Flugzeug mit geringer Zuverlässigkeit birgt die Gefahr von Unfällen während der Missionen"
 plane_tac_bomb_upgrade:0 "Bombardierung"
 plane_tac_bomb_upgrade_desc:0 "Größerer Bombenschacht für mehr Nutzlast."
 rocket_artillery_equipment:0 "Geschleppte Raketenartillerie"
 rocket_artillery_equipment_1:0 "Geschleppte Raketenartillerie"
 rocket_artillery_equipment_1_desc:0 "Raketenartillerie ist weniger präzise und hat eine wesentlich geringere Dauerfeuerrate als Batterien herkömmlicher Artilleriegeschütze. Sie ist jedoch in der Lage, ein Ziel gleichzeitig mit mehreren Raketen zu treffen, was verheerende Wirkung hat."
 rocket_artillery_equipment_1_short:0 "Raketenartillerie"
 rocket_artillery_equipment_2:0 "Fortschrittliche Raketenartillerie"
 rocket_artillery_equipment_2_desc:0 "Drallstabilisierte Raketen, die die Reichweite leichterer Artilleriebatterien erhöhen."
 rocket_artillery_equipment_desc:0 "Raketenartillerie ist weniger präzise und hat eine wesentlich geringere Dauerfeuerrate als Batterien herkömmlicher Artilleriegeschütze. Sie ist jedoch in der Lage, ein Ziel gleichzeitig mit mehreren Raketen zu treffen, was verheerende Wirkung hat."
 rocket_artillery_equipment_short:0 "Raketenartillerie"
 sh_battleship:0 "Superschweres Schlachtschiff"
 sh_battleship_desc:0 "Das größte Großkampfschiff mit den größten Geschützen und der stärksten Panzerung, die man für Geld kaufen kann. Eine so teure Investition verdient die angemessene Unterstützung kleinerer Schutzschiffe."
 ship_ASW_upgrade:0 "ASW"
 ship_ASW_upgrade_desc:0 "Waffen zur U-Boot-Abwehr sind wichtig, um U-Boote zu orten und auszuschalten."
 ship_anti_air_upgrade:0 "Luftabwehr"
 ship_anti_air_upgrade_desc:0 "Mehr Kanonen, die Blei in die Luft schießen, bedeuten, dass mehr feindliche Flugzeuge abgeschossen werden!"
 ship_armor_upgrade:0 "Rüstung"
 ship_armor_upgrade_desc:0 "Mehr Panzerung zum Schutz Ihres Schiffes vor feindlichem Feuer"
 ship_deckspace_upgrade:0 "Deckfläche"
 ship_deckspace_upgrade_desc:0 "Mehr Platz zum Transport und Start trägergestützter Flugzeuge"
 ship_engine_upgrade:0 "Motor"
 ship_engine_upgrade_desc:0 "Ein Schiff mit einem stärkeren Motor kann die Distanz zu seinen Gegnern im Kampf kontrollieren"
 ship_gun_upgrade:0 "Pistole"
 ship_gun_upgrade_desc:0 "Es ist wichtig, eine Waffe zu haben, die mit der Panzerung des Gegners mithalten kann und durchdringen kann."
 ship_hull_light:1 "Leichter Rumpf"
 ship_hull_light_desc:0 "Das leichteste Schutzschiff. Seine Aufgabe ist die Verteidigung größerer Schiffe sowie das Aufspüren und Zerstören von U-Booten."
 ship_reliability_upgrade:0 "Zuverlässigkeit"
 ship_reliability_upgrade_desc:0 "Ein Schiff mit hoher Zuverlässigkeit ist weniger anfällig für kritische Treffer, die einem Schiff ohne gut durchdachte Konstruktion massiven Schaden zufügen können."
 ship_torpedo_upgrade:0 "Torpedo"
 ship_torpedo_upgrade_desc:0 "Ein Torpedo ist ein mächtiger Angriff, der von kleineren Schiffen in Reichweite gestartet werden kann und eine hohe Wahrscheinlichkeit kritischer Treffer aufweist."
 sub_engine_upgrade:0 "Motor"
 sub_engine_upgrade_desc:0 "Ein Schiff mit einem stärkeren Motor kann die Distanz zu seinen Gegnern im Kampf kontrollieren"
 sub_stealth_upgrade:0 "Heimlichkeit"
 sub_stealth_upgrade_desc:0 "Die größte Stärke eines U-Bootes besteht darin, unentdeckt zu bleiben und nur dann anzugreifen, wenn es im Vorteil ist."
 sub_torpedo_upgrade:0 "Torpedo"
 sub_torpedo_upgrade_desc:0 "Ein Torpedo ist ein mächtiger Angriff, der von kleineren Schiffen in Reichweite gestartet werden kann und eine hohe Wahrscheinlichkeit kritischer Treffer aufweist."
 submarine:0 "U-Boot"
 submarine_desc:0 "U-Boote nutzen Tarnkappentechnik und leistungsstarke Torpedos, um feindliche Konvois zu zerstören."
