 JAP_infantry_equipment_0:1 "Kurzgewehr Typ 38"
 JAP_infantry_equipment_0_desc:1 "In den späten 1930er bis frühen 1940er Jahren wurde im Nagoya Arsenal eine unbekannte Anzahl von Gewehren des Typs 38 zu Kurzgewehren umgebaut. Die Läufe wurden vom Standardlauf von 794 mm auf 635 mm gekürzt und der Schaft passend zum Lauf gekürzt, während der Handschutz seine ursprüngliche Länge behielt."
