 CHI_infantry_equipment_0:1 "FN Modell 24"
 CHI_infantry_equipment_0_desc:1 "Nach dem Ersten Weltkrieg wurden deutsche Waffenexporte durch den Versailler Vertrag verboten, und Rüstungsunternehmen anderer Länder sprangen ein, um die Lücke zu füllen. Die Republik China erhielt von 1930 bis 1934 24.000 belgische FN Modell 24."
 CHI_infantry_equipment_0_short:1 "FN Modell 24"
 CHI_infantry_equipment_1:1 "Gewehr Typ 77"
 CHI_infantry_equipment_1_desc:1 "Das Modell 30 wurde als Gewehr Typ 21 im Kwantung Arsenal und als Gewehr Typ 77 (aus dem Jahr 1937, dem Jahr des Marco-Polo-Brücken-Zwischenfalls) in den Zhejiang Iron Works kopiert."
 CHI_infantry_equipment_1_short:1 "Typ 77"
 CHI_infantry_equipment_2:0 "Thompson-Maschinenpistole"
 CHI_infantry_equipment_2_desc:0 "Das M1921 wurde kommerziell aus den USA importiert und seit den 1920er Jahren in China produziert. Mehrere Zehntausend wurden in den Arsenalen von Shanxi, Taiyuan und Sichuan hergestellt. Kriegsmodelle wurden an die X-Force in Burma geliefert, einige gingen auch an die Y-Force. Das M1 wurde auch an SACO-Einheiten geliefert."
 CHI_infantry_equipment_2_short:0 "Thompson-Maschinenpistole"
 CHI_infantry_equipment_3:0 "M1 Garand"
 CHI_infantry_equipment_3_desc:0 "Die meisten M1-Gewehre gingen an die US-Streitkräfte, Hunderttausende davon wurden aber auch als Entwicklungshilfe an amerikanische Verbündete geliefert. Die meisten Einheiten der Chinesisch-Amerikanischen Kooperativen Organisation (SCO) waren ab 1943 mit dieser halbautomatischen Waffe ausgestattet. Sie wurde auch von der X Force in Burma eingesetzt."
 CHI_infantry_equipment_3_short:0 "M1 Garand"
