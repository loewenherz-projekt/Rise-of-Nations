 battle_cruiser:0 "Schlachtkreuzer"
 battle_cruiser_desc:0 "Ein großes Großkampfschiff, dessen Angriffsfähigkeiten oft denen eines Schlachtschiffs ähneln, das jedoch im Tausch gegen eine höhere Geschwindigkeit eine schwächere Panzerung aufweist."
 battleship:0 "Schlachtschiff"
 battleship_desc:0 "Das größte Großkampfschiff mit den größten Geschützen und der stärksten Panzerung, die man für Geld kaufen kann. Eine so teure Investition verdient die angemessene Unterstützung kleinerer Schutzschiffe."
 both_cruisers_desc:0 "Leichter Kreuzer – Ein leichtes Schutzschiff. Seine Hauptaufgabe besteht darin, Großkampfschiffe vor feindlichen leichten Schiffen abzuschirmen, er kann aber auch mächtige Torpedos abfeuern, die größere Schiffe beschädigen können.\n\nSchwerer Kreuzer – Ein großer Panzerkreuzer mit hoher Flexibilität. Eine gute Wahl für Nationen, die sich den Bau größerer Großkampfschiffe nicht leisten können."
 cruisers_desc:0 "Ein leichtes Abschirmschiff. Seine Hauptaufgabe besteht darin, Großkampfschiffe vor feindlichen leichten Schiffen abzuschirmen, es kann aber auch mächtige Torpedos abfeuern, die größere Schiffe beschädigen können."
 carrier:0 "Träger"
 carrier_armor_upgrade:0 "Rüstung"
 carrier_armor_upgrade_desc:0 "Mehr Panzerung zum Schutz Ihres Schiffes vor feindlichem Feuer"
 carrier_desc:0 "Ein Großkampfschiff, das die Geschwader leistungsstarker Trägerflugzeuge in die Schlacht transportieren kann. Auch nützlich als schwimmender Flugplatz, den Sie vor der Küste Ihres Feindes positionieren können."
 convoy:0 "Konvoi"
 convoy_1:0 "Konvoi"
 convoy_desc:0 "Konvois für den internationalen Handel mit Waren und Ressourcen. Sie werden auch zum Transport von Truppen und für Seeinvasionen eingesetzt."
 cv_plane_gun_upgrade:0 "Waffen"
 cv_plane_gun_upgrade_desc:0 "Bessere Waffen für den Kampf gegen andere Flugzeuge"
 cv_plane_naval_upgrade:0 "Angriff"
 cv_plane_naval_upgrade_desc:0 "Höhere Tragfähigkeit von Antischiffswaffen."
 cv_plane_range_upgrade:0 "Reichweite"
 cv_plane_range_upgrade_desc:0 "Ein Flugzeug mit größerer Reichweite kann strategischere Gebiete für Missionen erreichen"
 torpedoboat_desc:0 "Küstenschiffe, die entwickelt wurden, um der Bedrohung durch Schlachtschiffe und andere langsame und schwer bewaffnete Schiffe durch Geschwindigkeit, Wendigkeit und leistungsstarke Torpedos entgegenzuwirken, und die enormen Kosten für den Bau einer entsprechenden Anzahl von Großkampfschiffen zur Abwehr feindlicher Angriffe. Ein Schwarm von entbehrlichen Torpedobooten, die in Massen angreifen, könnte die Fähigkeit eines größeren Schiffes, sie mit seinen großen, aber schwerfälligen Geschützen abzuwehren, überfordern."
 ship_torpedo_0:0 "2x 400-mm-Torpedowerfer"
 ship_torpedo_0_short:0 "Früher Torpedowerfer"
 ship_torpedo_0_desc:0 "Ein Satz mittelgroßer Torpedos, die auf Überwasserkriegsschiffen montiert werden können."
 ship_torpedo_sub_0:0 "2x 400-mm-Torpedorohre"
 ship_torpedo_sub_0_short:0 "Frühe Torpedorohre"
 ship_torpedo_sub_0_desc:0 "Ein Basissatz Torpedorohre, die aus dem Inneren des U-Boots nachgeladen werden können."
 destroyer:0 "Zerstörer"
 destroyer_desc:0 "Das leichteste Schutzschiff. Seine Aufgabe ist die Verteidigung größerer Schiffe sowie das Aufspüren und Zerstören von U-Booten."
 destroyer_engine_upgrade:0 "Motor"
 destroyer_engine_upgrade_desc:0 "Ein Schiff mit einem stärkeren Motor kann die Distanz zu seinen Gegnern im Kampf kontrollieren"
