 ENG_infantry_equipment_0_short:0 "Gewehr Nr. 1 Mk.V"
 ENG_infantry_equipment_1:0 "Gewehr Nr. 4 Mk.I"
 ENG_infantry_equipment_1_desc:0 "Anfang der 1930er Jahre wurden 2.500 Gewehre des Typs Nr. 4 Mk. I zu Testzwecken hergestellt. Diese ähnelten dem Typ Nr. 1 Mk. VI, hatten jedoch eine flache linke Seite und keine Riffelung. Ende der 1930er Jahre stieg der Bedarf an neuen Gewehren, und das Gewehr Nr. 4 Mk. I wurde offiziell eingeführt."
