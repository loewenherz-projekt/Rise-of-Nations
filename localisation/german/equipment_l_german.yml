 JAP_light_field_gun2:0 "Typ 41 75-mm-Kavalleriegeschütz"
 JAP_light_field_gun2_desc:0 "Dieses Geschütz basierte auf dem Typ 38 und wurde um ca. 30 kg leichter gemacht, damit es von der Kavallerie leichter getragen werden konnte."
 JAP_light_field_gun2_short:0 "Kavallerie Typ 41"
 JAP_light_field_gun_equipment_1890:0 "7cm Feldgeschütz"
 JAP_light_field_gun_equipment_1890_desc:0 "Ab etwa 1880 wollten die Japaner Artillerie im Inland produzieren. Unter italienischer Anleitung entwickelte die IJA neue 75-mm-Geschütze. Diese hatten einen Lauf aus Bronze, da Stahl in Japan teuer war. 7-cm-Geschütze wurden im Japanisch-Chinesischen Krieg 1894/95 als Hauptartillerie eingesetzt und auch im Russisch-Japanischen Krieg in der zweiten Linie eingesetzt."
 JAP_light_field_gun_equipment_1903:0 "Krupp 7,5 cm Modell 1903"
 JAP_light_field_gun_equipment_1903_desc:0 "Das Modell 1903 wurde von Krupp für den Export hergestellt. Es handelte sich um ein Standardgeschütz, das mit geringfügigen Anpassungen kurzfristig an Kunden geliefert werden konnte. Das Modell 1903 bildete auch die Grundlage für das in Japan verwendete 75-mm-Feldgeschütz Typ 38." 
 JAP_light_field_gun_equipment_1903_short:0 "Krupp 7,5 cm"
 JAP_light_field_gun_equipment_1906:0 "75-mm-Feldgeschütz Typ 38"
 JAP_light_field_gun_equipment_1906_desc:0 "Das 75-mm-Feldgeschütz Typ 38 war ein deutscher Entwurf aus dem Jahr 1905, der am Ende des Russisch-Japanischen Krieges vom japanischen Kaiserreich als Standard-Feldgeschütz der Kaiserlich Japanischen Armee erworben wurde. Über 2.000 Exemplare des in Japan entwickelten Typs 38 wurden vom Osaka Arsenal der Armee in Lizenz hergestellt." 
 JAP_light_field_gun_equipment_1906_short:0 "Typ 38 75 mm"
 JAP_light_field_gun_equipment_1908:0 "Typ 41 75 mm"
 JAP_light_field_gun_equipment_1908_desc:0 "Das 75-mm-Gebirgsgeschütz Typ 41 ist eine japanische Lizenzkopie des Krupp-Gebirgsgeschütz M1908. Es wurde 1908 als Standardartilleriewaffe der Kaiserlich Japanischen Armee eingeführt. Die Nummer des Typs 41 steht für das Jahr der Einführung des Geschützes, das 41. Regierungsjahr von Kaiser Meiji, also 1908 im gregorianischen Kalender."
 JAP_light_field_gun_equipment_1:0 "Typ 31 75-mm-Schnellfeuerkanone"
 JAP_light_field_gun_equipment_1_desc:0 "Der Typ 31 wurde 1898 eingeführt. Die Bezeichnung „Typ 31“ weist darauf hin, dass die Waffe im 31. Regierungsjahr von Kaiser Meiji entwickelt wurde. Der von Oberst Arisaka Nariakira entworfene Lauf bestand aus Stahl, was die Reichweite und Genauigkeit der Waffe gegenüber der früheren 7-cm-Bergkanone mit Bronzelauf verbesserte."
 JAP_light_field_gun_equipment_1_short:0 "Typ 31 75 mm"
