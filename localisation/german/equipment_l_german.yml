 FRA_early_infantry_equipment_0:0 "A6 Meunier"
 FRA_early_infantry_equipment_0_desc:0 "Das Meunier-Gewehr, bekannt als „Meunier A6“ oder „STA Nr. 8“, entstand im Rahmen eines 1890 vom französischen Militär initiierten Programms zur Entwicklung eines halbautomatischen Infanteriegewehrs, das schließlich das Lebel-Gewehr Mle 1886–1893 ersetzen sollte. Vier staatliche Forschungseinrichtungen (STA, ENT, Puteaux und CTV) schlugen über 20 Prototypen vor."
 FRA_early_infantry_equipment_1890:0 "Mle 1886 M93 Lebel"
 FRA_early_infantry_equipment_1890_desc:0 "Das Lebel-Gewehr Modell 1886 ist ein 8-mm-Infanteriegewehr mit Zylinderverschluss, das 1887 in den Dienst der französischen Armee gestellt wurde. Es handelt sich um ein Repetiergewehr mit acht Patronen im Vorderschaftrohrmagazin, einer Patrone im Transporter und einer Patrone im Lauf. Das Lebel-Gewehr ist die erste Militärwaffe, die rauchlose Pulvermunition verwendete. Das Lebel-Gewehr war während des gesamten Ersten Weltkriegs die Basiswaffe der französischen Infanterie. Insgesamt wurden zwischen 1887 und 1916 3,45 Millionen Lebel-Gewehre von den drei französischen Staatsfabriken produziert."
 FRA_early_infantry_equipment_1900:0 "Mle 1890 Berthier"
 FRA_early_infantry_equipment_1900_desc:0 "Das Berthier-Gewehr wurde ursprünglich als teilweiser Ersatz für das französische Lebel-Gewehr von 1886 eingeführt. Benannt nach seinem Erfinder André Berthier, einem französischen Zivilingenieur bei der algerischen Eisenbahn, konnte das dreischüssige, vertikal zugeführte En-bloc-Magazin vom Typ Mannlicher des Berthier-Gewehrs mit Clips geladen werden, was die Nachladegeschwindigkeit erheblich erhöhte und insbesondere für Kavallerie und andere berittene Truppen von Vorteil war."
 FRA_early_infantry_equipment_1900_short:0 "Mle 1900"
 FRA_early_infantry_equipment_1902:0 "Fusil Mle 1902" 
 FRA_early_infantry_equipment_1902_desc:0 "Nach dem Erfolg der Berthier-Karabiner wurden in den Jahren vor dem Ersten Weltkrieg zwei Berthier-Gewehre in voller Länge eingeführt. Das Mle 1902 wurde an die indochinesischen Tirailleur-Truppen ausgegeben. Die Berthier-Gewehre waren leichter und einfacher zu handhaben und zu laden als das Mle 1886/M93 Lebel-Gewehr. Sie erwiesen sich als besser für das Schießen aus der freien Hand geeignet und in tropischen Umgebungen einfacher zu warten."
 FRA_early_infantry_equipment_1904:0 "Mle 1904"
 FRA_early_infantry_equipment_1904_desc:0 "Experimentelles Mle 1904"
 FRA_early_infantry_equipment_1906:0 "Modell 1907"
 FRA_early_infantry_equipment_1906_desc:0 "Ähnlich wie das Vorgängermodell Mle 1902 wurde das Mle 1907 hauptsächlich an die Kolonialinfanterie ausgegeben. Das Mle 1907 wurde an senegalesische Tirailleur-Truppen ausgegeben."
 FRA_early_infantry_equipment_1906_short:0 "Mle 1907"
 FRA_early_infantry_equipment_1908:0 "Mle 1907 Kurzgewehr"
 FRA_early_infantry_equipment_1908_desc:0 "Eine Kurzgewehrversion des Berthier-Gewehrs wurde 1907 entwickelt."
 FRA_early_infantry_equipment_1:0 "Modell 1907/15"
 FRA_early_infantry_equipment_1_desc:0 "Zu Beginn des Ersten Weltkriegs wurde das Berthier-Gewehr Modell 1907 für die Massenproduktion modifiziert. Das Ergebnis war das Modell 07/15. Visier, Laufring und Stapelhaken wurden vereinfacht, um die Produktionsrate zu erhöhen. Während das Originalgewehr von 1907 ein Kreuzbajonett besaß, wurde das 07/15 modifiziert, um dasselbe Bajonett wie das Lebel aufzunehmen, was die Versorgung vereinfachte. Der umgedrehte Kammergriff wurde durch einen einfacheren geraden Kammerverschluss ersetzt."
 FRA_early_infantry_equipment_2:0 "Modèle 1907/15 M16"
 FRA_early_infantry_equipment_2_desc:0 "Im Ersten Weltkrieg erkannte man schnell, dass das Drei-Schuss-Magazin der Berthier im Vergleich zu ausländischen Waffen einfach zu klein war und zu häufig nachgeladen werden musste. Außerdem stellte man fest, dass Grabenschlamm und Sand durch die Öffnung im Magazinboden in die Waffe gelangen konnten. Um diese Probleme zu beheben, wurde das Berthier-Gewehr Modell 1916 mit einem Fünf-Schuss-En-bloc-Magazin eingeführt. Dieses verbesserte 5-Schuss-Design wurde dann in bestehende Berthier-Modelle in Gewehr- und Karabinerlänge eingebaut und als Mle 1907/15 M16 bezeichnet."
 FRA_early_infantry_equipment_3:0 "RSC M1917"
 FRA_early_infantry_equipment_4:0 "APX Mle 1916"
 FRA_early_infantry_equipment_4_desc:0 "Während das Lebel-Gewehr mit der standardmäßigen Balle D-Boattail-Geschossmunition auf bis zu 300 Meter recht effektiv war, wurde die Genauigkeit auf größere Entfernungen durch die vorhandene offene Visierung beeinträchtigt. Daher wurden die Modelle APX Mle 1916 und APX Mle 1917 des Lebel-Gewehrs mit verstellbarer Zielfernrohrvisierung ab Ende 1916 in großer Zahl im Ersten Weltkrieg ausgegeben." 
