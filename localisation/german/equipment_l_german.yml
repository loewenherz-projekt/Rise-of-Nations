 ac_engine_upgrade:0 "Motor"
 ac_engine_upgrade_desc:0 "Mehr Mobilität verschafft taktische und strategische Vorteile und ermöglicht mehr Panzerung, ohne wesentlich verlangsamt zu werden."
 amphibious_mechanized_equipment:0 "Amphibische Landefahrzeuge"
 amphibious_mechanized_equipment_1:0 "Amphibientraktor (Basis)"
 amphibious_mechanized_equipment_1_desc:0 "Amphibientraktoren (Amtracs) ermöglichen es Marines, unter Panzerschutz an einem Strand zu landen. Dies geht jedoch auf Kosten eines geringeren Kraftstoffverbrauchs."
 amphibious_mechanized_equipment_1_short:0 "Grundlegende Amtrac"
 amphibious_mechanized_equipment_2:0 "Verbesserter Amphibientraktor"
 amphibious_mechanized_equipment_2_desc:0 "Diese Amtracs weisen gegenüber der Basisversion mehrere Verbesserungen auf, beispielsweise eine Laderampe hinten zum leichteren Entladen am Strand."
 amphibious_mechanized_equipment_2_short:0 "Verbesserter Amtrac"
 amphibious_mechanized_equipment_desc:0 "Amphibientraktoren (Amtracs) ermöglichen es Marines, unter Panzerschutz an einem Strand zu landen. Dies geht jedoch auf Kosten eines geringeren Kraftstoffverbrauchs."
 amphibious_mechanized_equipment_short:0 "Amtracs"
 amphibious_tank_equipment:0 "Amphibienpanzer"
 amphibious_tank_equipment_1:0 "Einfacher Amphibienpanzer"
 amphibious_tank_equipment_1_desc:0 "Im Wesentlichen handelt es sich bei diesem Fahrzeug um einen leichten Panzer, der so umgebaut wurde, dass er schwimmt. Es bietet Einheiten, die einen Brückenkopf errichten, Feuerunterstützung."
 amphibious_tank_equipment_2:0 "Verbesserter Amphibienpanzer"
 amphibious_tank_equipment_2_desc:0 "Ein für die Bewegung durch Wasser modifizierter mittlerer Panzer. Die zusätzliche Vielseitigkeit und Mobilität geht auf Kosten einer geringeren Kraftstoffeffizienz."
 amphibious_tank_equipment_desc:0 "Panzer, die so modifiziert wurden, dass sie sich durch Wasser bewegen können. Sie eignen sich besser für amphibische Landungen und Flussüberquerungen als andere Panzer, benötigen aber mehr Treibstoff."
 amphibious_tank_equipment_short:0 "Amphibienpanzer"
 anti_air_equipment:0 "Geschleppte Flugabwehr"
 anti_air_equipment_1:0 "Geschleppte Flugabwehr"
 anti_air_equipment_1_desc:0 "Die Hauptaufgabe der Flugabwehrartillerie besteht darin, feindliche Flugzeuge abzuschießen, obwohl die Schnellfeuerkanonen auch gegen Bodenziele wirksam sein können."
 anti_air_equipment_1_short:0 "Luftabwehr"
 anti_air_equipment_2:0 "Verbesserte Luftabwehr"
 anti_air_equipment_2_desc:0 "Flugabwehrkanonen mit längeren Patronen und Läufen, die hochfliegende Flugzeuge angreifen können."
 anti_air_equipment_3:0 "Fortschrittliche Luftabwehr"
 anti_air_equipment_3_desc:1 "Ein fortschrittliches mobiles Flakgeschütz mit größerer Reichweite und Feuerkraft, um selbst die schnellsten und am höchsten fliegenden feindlichen Flugzeuge bekämpfen zu können."
 anti_air_equipment_desc:0 "Die Hauptaufgabe der Flugabwehrartillerie besteht darin, feindliche Flugzeuge abzuschießen, obwohl die Schnellfeuerkanonen auch gegen Bodenziele wirksam sein können."
 anti_air_equipment_short:0 "Luftabwehr"
 anti_tank_equipment:0 "Geschleppte Panzerabwehr"
 anti_tank_equipment_1:0 "Geschleppte Panzerabwehr"
 anti_tank_equipment_1_desc:0 "Artillerie ist auf die Bekämpfung gepanzerter Ziele wie Panzer spezialisiert und feuert im Allgemeinen panzerbrechende Granaten ab."
 anti_tank_equipment_1_short:0 "Panzerabwehr"
 anti_tank_equipment_2:0 "Verbesserte Panzerabwehr"
 anti_tank_equipment_2_desc:0 "Geschütze mit größerem Kaliber zur Bekämpfung schwererer Panzer mit schräger Panzerung."
 anti_tank_equipment_3:0 "Fortschrittliche Panzerabwehr"
 anti_tank_equipment_3_desc:0 "Durch die Kombination verschiedener neuer Munitionstechnologien mit Waffen mit höherer Mündungsgeschwindigkeit sind diese Panzerabwehrkanonen auf alle neuen Panzerungen vorbereitet, die unsere Feinde entwickeln könnten."
 anti_tank_equipment_desc:0 "Artillerie ist auf die Bekämpfung gepanzerter Ziele wie Panzer spezialisiert und feuert im Allgemeinen panzerbrechende Granaten ab."
 anti_tank_equipment_short:0 "Panzerabwehr"
 armored_car_at_equipment:0 "Panzerabwehrpanzerwagen"
 armored_car_at_equipment_desc:0 "Unsere leichten mechanisierten Einheiten werden irgendwann mit feindlichen Panzerkräften in Kontakt kommen. Die Entwicklung einer speziellen Panzerabwehrvariante würde ihnen eine Chance im Kampf geben."
 armored_car_equipment:0 "Panzerwagen"
 armored_car_equipment_1:0 "Einfacher Panzerwagen"
 armored_car_equipment_1_desc:0 "Eine verbesserte Innenaufteilung und zusätzliche Munitionslager sorgen für einen effektiveren Panzerwagen."
 armored_car_equipment_2:0 "Verbessertes Panzerfahrzeug"
 armored_car_equipment_2_desc:0 "Veränderungen auf dem Schlachtfeld erfordern eine wesentlich schwerere Bewaffnung und dickere Panzerung, um feindliche leichte Einheiten zu besiegen und zu überleben, um Bericht zu erstatten."
 armored_car_equipment_desc:0 "Leichte gepanzerte Radfahrzeuge. Häufig für Aufklärung und Widerstandsunterdrückung eingesetzt, können aber mit schwererer Bewaffnung ausgestattet werden."
 artillery_equipment:0 "Leichte Artillerieausrüstung"
 artillery_equipment_1:0 "Leichte Artillerieausrüstung I"
 artillery_equipment_1:0 "Geschleppte Artillerie"
 artillery_equipment_1_desc:0 "Ein Feldgeschütz ist ein Feldartilleriegeschütz. Ursprünglich bezog sich der Begriff auf kleinere Geschütze, die eine Feldarmee auf dem Marsch begleiten konnten und im Kampf je nach Gegebenheiten über das Schlachtfeld bewegt werden konnten (Feldartillerie). Im Gegensatz dazu standen in Forts installierte Geschütze (Garnisonsartillerie oder Küstenartillerie) oder Belagerungskanonen und -mörser, die zu groß für einen schnellen Transport waren und nur bei längeren Belagerungen zum Einsatz kamen."
 artillery_equipment_1_desc:0 "Unter Artillerie versteht man großkalibrige Waffen wie Kanonen und Haubitzen, die von Besatzungen bedient werden und Munition weit über die effektive Reichweite persönlicher Waffen hinaus abfeuern können."
