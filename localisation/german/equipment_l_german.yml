 GER_early_infantry_equipment_0:0 "Gewehr 98/10"
 GER_early_infantry_equipment_0_desc:0 ""
 GER_early_infantry_equipment_1890:0 "Modell 1888 Commission Rifle"
 GER_early_infantry_equipment_1890_desc:0 "Das Gewehr 88 (allgemein als Modell 1888 Kommissionsgewehr bezeichnet) war ein deutsches Repetiergewehr des späten 19. Jahrhunderts, das 1888 eingeführt wurde. Die französische Erfindung des rauchlosen Pulvers machte alle Schwarzpulvergewehre sofort obsolet. Um mit den Franzosen Schritt zu halten, entwickelten die Deutschen das Gewehr 88."
 GER_early_infantry_equipment_1890_short:0 "Gewehr 88"
 GER_early_infantry_equipment_1900:0 "Gewehr 98"
 GER_early_infantry_equipment_1900_desc:0 "Das Gewehr 98 (abgekürzt G98, Gew 98 oder M98) ist ein deutsches Repetiergewehr der Firma Mauser, das Patronen aus einem 5-Schuss-Magazin mit internem Clip verschießt. Es war von 1898 bis 1935 das deutsche Dienstgewehr."
 GER_early_infantry_equipment_1900_short:0 "G98" 
 GER_early_infantry_equipment_1902:0 "Karabiner 98A"
 GER_early_infantry_equipment_1902_desc:0 "Der Karabiner 98A (Kar 98A) war eine kürzere Version des Gewehrs 98, das ursprünglich für den Einsatz bei Kavallerie- und Unterstützungseinheiten entwickelt wurde. Der im Februar 1902 eingeführte Karabiner 98A hatte einen deutlich kürzeren Lauf als das Gewehr 98 und war mit 3,42 kg im Leerzustand auch leichter."
 GER_early_infantry_equipment_1902_short:0 "Kar 98A"
 GER_early_infantry_equipment_1904:0 "Gewehr 88 S"
 GER_early_infantry_equipment_1904_desc:0 "Im Jahr 1903 führte die deutsche Armee eine neue Dienstpatrone ein, die leichtere Geschosse mit einem Durchmesser von 8,20 mm abfeuerte. Von da an wurden viele Gewehre des Typs Gewehr 88 umgerüstet, um die neue 7,92 × 57 mm Mauser-Patrone des Musters 1903 abzufeuern, und wurden so zu Gewehren des Typs Gewehr 88 S."
 GER_early_infantry_equipment_1906:0 "Gewehr 88/05"
 GER_early_infantry_equipment_1906_desc:0 "Ab 1905 wurden auch die Gewehre 88 für die Verwendung des Ladestreifens vom Typ Gewehr 98 umgerüstet, indem Ladestreifenführungen an der oberen Rückseite des Gehäuses angebracht und das Magazin so verändert wurde, dass es zu Gewehren des Typs Gewehr 88/05 wurde."
 GER_early_infantry_equipment_1908:0 "Karabiner Modell 1898 AZ"
 GER_early_infantry_equipment_1908_desc:0 "Im Jahr 1908 wurde das Karabinermodell 1898 AZ (Kar 98AZ) in Dienst gestellt. Das AZ steht für Aufpflanz-und-Zusammensetzvorrichtung, also mit Bajonettbefestigungspunkt und Stapelstange."
 GER_early_infantry_equipment_1908_short:0 "Kar 98AZ"
 GER_early_infantry_equipment_1:0 "Gewehr 88/14"
 GER_early_infantry_equipment_1_desc:0 "Nach dem Beginn des Ersten Weltkriegs wurden einige der verbliebenen Gewehre des Typs Gewehr 88 S auf den Standard Gewehr 88/14 umgebaut, der im Großen und Ganzen dem Gewehr 88/05 ähnelte, jedoch eine gröbere Verarbeitung aufwies."
 GER_early_infantry_equipment_2:0 "Scharfschützen-Gewehr 98"
 GER_early_infantry_equipment_2_desc:0 "Im Jahr 1915 wurde beschlossen, 15.000 Gewehre des Typs 98, die aufgrund ihrer außergewöhnlichen Genauigkeit bei Werkstests ausgewählt worden waren, mit Zielfernrohren für den Scharfschützeneinsatz auszustatten (obwohl das Gewehr 98 nicht für die Verwendung mit Zieloptiken ausgelegt war). Das Scharfschützen-Gewehr 98 wurde 1915 offiziell mit 4× Zielfernrohren von Görtz oder Zeiss ausgestattet."
 GER_early_infantry_equipment_2_short:0 "S.Gewehr 98"
 GER_early_infantry_equipment_3:0 "MP 18"
 GER_early_infantry_equipment_3_desc:0 "Die von Theodor Bergmann (Abteilung Waffenbau) hergestellte MP 18 war die erste im Kampf eingesetzte Maschinenpistole. Sie wurde 1918 im Ersten Weltkrieg von der deutschen Armee als Hauptwaffe der Sturmtruppen in Dienst gestellt."
 GER_early_infantry_equipment_4:0 "Karabiner 98b"
 GER_early_infantry_equipment_4_desc:0 "Der Karabiner 98b war technisch gesehen keine weitere Karabinervariante, sondern vielmehr ein Gewehr, das als Karabiner bezeichnet wurde, um den Bestimmungen des Versailler Vertrags zu entsprechen, der nur Deutschland die Herstellung von Karabinern erlaubte."
 GER_gw_car_equipment:0 "Sonderkraftfahrzeug 222"
 GER_gw_car_equipment_short:0 "Sdkfz 222"
 GER_gw_tank_equipment:0 "Leichttraktor"
 GER_gw_tank_equipment_desc:0 "Der Leichttraktor war ein deutscher Versuchspanzer. Nach dem Ersten Weltkrieg war Deutschland durch den Versailler Vertrag in der militärischen Entwicklung eingeschränkt, doch ein geheimes Programm unter dem Decknamen „Traktor“ entwickelte gepanzerte Militärfahrzeuge und Artillerie."
 GER_gw_tank_equipment_short:0 "Leichttraktor"
 GER_heavy_field_gun2:0 "135 mm FK 1909"
 GER_heavy_field_gun3_short:0 "150 mm L/40 ir"
 GER_heavy_field_gun4_short:0 "150 mm Kannone 16"
 GER_heavy_field_gun_equipment_1903:0 "Krupp 15cm Haubitze 1902"
 GER_heavy_field_gun_equipment_1903_desc:0 "Die 15 cm schwere Feldhaubitze 1902 war das erste Artilleriegeschütz der deutschen Armee mit einem modernen Rückstoßsystem. Zu Beginn des Ersten Weltkriegs waren 416 Exemplare im Einsatz. Ihre Mobilität, die den Einsatz als mittlere Artillerie ermöglichte, und ihr relativ schweres Geschoss verschafften der deutschen Armee in den ersten Schlachten einen Feuerkraftvorteil, da die französische und britische Armee über kein vergleichbares Geschütz verfügten. "
 GER_heavy_field_gun_equipment_1903_short:0 "15cm sFH 02"
 GER_heavy_field_gun_equipment_1906:0 "10,5 cm Feldhaubitze 98"
 GER_heavy_field_gun_equipment_1906_desc:0 "Die 10,5 cm Feldhaubitze 98 war eine altmodische Waffe mit festem Rückstoß, die von Rheinmetall gebaut und 1898 an die deutsche Armee ausgeliefert wurde. Zwischen 1902 und 1904 wurde sie von Krupp mit einem neuen Rückstoßmechanismus und einer neuen Lafette überarbeitet. Historisch gesehen kam sie nie wie geplant zum Einsatz, da alle Modelle auf den 98/09-Standard aufgerüstet wurden, bevor die Waffe überhaupt zum Einsatz kam."
 GER_heavy_field_gun_equipment_1906_short:0 "10,5 cm FH 98"
 GER_heavy_field_gun_equipment_1908:0 "10,5 cm Feldhaubitze 98/09"
 GER_heavy_field_gun_equipment_1908_desc:0 "Die 10,5-cm-Feldhaubitze 98/09 wurde ursprünglich von Rheinmetall als 10,5-cm-Feldhaubitze 98 gebaut; zwischen 1902 und 1904 wurde sie von Krupp mit einem neuen Rückstoßmechanismus und einer neuen Lafette überarbeitet. Sie wurde jedoch erst 1909 in Dienst gestellt, daher die Endbezeichnung 98/09. Vorhandene Waffen wurden auf den neuen Standard von 1909 umgebaut. Wie üblich waren zwei Sitze an der Geschützblende angebracht. Zu Beginn des Ersten Weltkriegs waren 1.260 Exemplare im Einsatz."
 GER_heavy_field_gun_equipment_1908_short:0 "10,5 cm FH 98/09"
 GER_heavy_field_gun_equipment_1:0 "15 cm sFH 93"
 GER_heavy_field_gun_equipment_1_desc:0 "Die 15 cm sFH 93 wurde von Krupp entwickelt und gebaut und 1893 in Dienst gestellt. Die Entwicklung der sFH 93 erfolgte unter Berücksichtigung der Erfahrungen der Kriege des späten 19. Jahrhunderts, in denen Feldgeschütze mit kleineren Granaten und begrenzter Richtwirkung Schwierigkeiten hatten, Befestigungen zu überwinden. Die sFH 93 war für ihre Zeit recht konventionell, und die meisten Nationen verfügten über ähnliche Geschütze. Der fehlende Rückstoßmechanismus machte sie jedoch veraltet, und als der Erste Weltkrieg ausbrach, war sie bereits weitgehend ersetzt."
 GER_heavy_field_gun_equipment_1_short:0 "15 cm sFH 93"
 GER_heavy_field_gun_equipment_2:0 "135 mm FK 1909"
 GER_heavy_field_gun_equipment_2_desc:0 "135 mm FK 1909" 
 GER_heavy_field_gun_equipment_3:0 "150 mm L/40 ir"
 GER_heavy_field_gun_equipment_3_desc:0 "150 mm L/40 ir"
 GER_heavy_tank_artillery_equipment_2:0 "Sturmtiger"
 GER_heavy_tank_artillery_equipment_2_short:0 "Sturmtiger"
 GER_heavy_tank_artillery_equipment_3:0 "Geschützwagen Tiger"
 GER_heavy_tank_artillery_equipment_3_desc:0 "Basierend auf dem Rumpf eines Königstigers sollte es in der Lage sein, eine 170-mm-Kanone K 72 L/50 zu montieren"
 GER_heavy_tank_artillery_equipment_3_short:0 "GW Tiger"
 GER_heavy_tank_destroyer_equipment_1:0 "Selbstfahrlafette auf VK3001(H) Sturer Emil"
 GER_heavy_tank_destroyer_equipment_1_desc:0 "Die Selbstfahrlafette auf VK3001(H) Sturer Emil (deutsch für „Sturer Emil“) war eine deutsche selbstfahrende Panzerabwehrkanone auf Basis des Henschel VK3001-Chassis."
 GER_heavy_tank_destroyer_equipment_1_short:0 "Sturer Emil"
 GER_heavy_tank_destroyer_equipment_2:0 "Panzerjäger Tiger (P)"
 GER_heavy_tank_destroyer_equipment_2_desc:0 "Der Elefant war ein schwerer Jagdpanzer, der auf dem Fahrgestell des eingestellten Porsche Tiger-Projekts basierte und mit einer 88-mm-Panzerabwehrkanone 43/2 ausgestattet war."
 GER_heavy_tank_destroyer_equipment_2_short:0 "Elefant"
 GER_heavy_tank_destroyer_equipment_3:0 "Panzerjäger Tiger Ausf. B"
 GER_heavy_tank_destroyer_equipment_3_desc:0 "Der Jagdtiger war das schwerste gepanzerte Kampffahrzeug, das im Zweiten Weltkrieg im Einsatz war. Das Fahrzeug war mit einer 128-mm-PaK 44 L/55-Hauptkanone ausgestattet und hatte eine schwere Frontpanzerung."
 GER_heavy_tank_destroyer_equipment_3_short:0 "Jagdtiger"
 GER_heavy_tank_equipment_1:0 "Großtraktor"
 GER_heavy_tank_equipment_1_desc:0 "Der Großtraktor war eine Reihe von Prototypen zur Entwicklung eines schwereren Panzers in Deutschland. Nach dem Ersten Weltkrieg war Deutschland durch den Versailler Vertrag in der militärischen Entwicklung eingeschränkt, doch ein geheimes Programm unter dem Decknamen „Traktor“ entwickelte gepanzerte Militärfahrzeuge und Artillerie."
 GER_heavy_tank_equipment_1_short:0 "Großtraktor"
 GER_heavy_tank_equipment_2:0 "Panzerkampfwagen VI Tiger"
 GER_heavy_tank_equipment_2_desc:0 "Der Tiger I war ein deutscher schwerer Panzer, der 1942 als Antwort auf die unerwartet beeindruckende sowjetische Panzerung entwickelt wurde, auf die man in den ersten Monaten der Invasion der Achsenmächte in der Sowjetunion stieß, insbesondere auf den T-34 und den KV-1."
 GER_heavy_tank_equipment_2_short:0 "Tiger"
 GER_heavy_tank_equipment_3:0 "Panzerkampfwagen Tiger Ausf. B"
 GER_heavy_tank_equipment_3_desc:0 "Der unter dem informellen Namen Königstiger bekannte, von alliierten Soldaten jedoch oft halbwörtlich als „Königstiger“ übersetzte Panzer folgte dem gleichen Konzept wie der Tiger I, sollte aber noch beeindruckender sein. Der Tiger II kombinierte die dicke Panzerung des Tiger I mit der schrägen Panzerung des mittleren Panzers Panther. Der Panzer wog fast siebzig Tonnen, war an der Front durch 100 bis 180 mm Panzerung geschützt und mit der langläufigen 8,8-cm-Kampfwagenkanone 43 L/71 bewaffnet."
 GER_heavy_tank_equipment_3_short:0 "Königstiger"
 GER_infantry_at2:0 "Panzerschreck"
 GER_infantry_at:0 "Panzerfaust 30"
 GER_infantry_equipment_0:0 "Gewehr 98"
 GER_infantry_equipment_0_short:0 "Gewehr 98"
 GER_infantry_equipment_1:0 "Karabiner 98k"
 GER_infantry_equipment_1_short:0 "Karabiner 98k"
 GER_infantry_equipment_2:0 "MP 38"
 GER_infantry_equipment_2_short:0 "MP 38"
 GER_infantry_equipment_3:0 "MP 43"
 GER_infantry_equipment_3_short:0 "MP 43"
 GER_light_field_gun2:0 ""
 GER_light_field_gun2_desc:0 ""
 GER_light_field_gun2_short:0 ""
 GER_light_field_gun_equipment_1890:0 "9 cm Kanone C/73-91"
 GER_light_field_gun_equipment_1890_desc:0 "Nach dem Deutsch-Französischen Krieg begann die deutsche Armee, Ersatz für ihre vorhandenen C/61-Stahl-Hinterladerkanonen zu untersuchen. Obwohl wie ihr Vorgänger aus Stahl gefertigt, war die C/73 eine Mehrkammerkonstruktion mit einem zentralen gezogenen Rohr, einem Verstärkungsring von den Zapfen zum Verschluss und einer größeren Treibladungskammer für höhere Mündungsgeschwindigkeiten und größere Reichweite. Die C/73 verfügte über einen neuen Verschluss, der ein Vorläufer von Krupps horizontalem Gleitblock war. Später, im Jahr 1891, wurde ein neuer Lauf aus Nickelstahl eingeführt, um Laufexplosionen durch mit Pikrinsäure gefüllte Granaten entgegenzuwirken. Diese erhielten die Bezeichnung C/73-91."
 GER_light_field_gun_equipment_1890_short:0 "C/73-91"
 GER_light_field_gun_equipment_1903:0 "7,7 cm Feldkanone 96 nA"
 GER_light_field_gun_equipment_1903_desc:0 "Die meisten 7,7-cm-FK-96-Geschütze wurden 1904 nach modernen Standards umgebaut (nur der Lauf wurde beibehalten) und als 7,7-cm-FK-96 nA neuer Art (neues Modell) hergestellt, das während des gesamten Ersten Weltkriegs als eines der wichtigsten leichten Feldgeschütze Deutschlands diente." 
 GER_light_field_gun_equipment_1903_short:0 "7,7 cm FK 96 nA"
 GER_light_field_gun_equipment_1906:0 "10 cm Kanone 04"
 GER_light_field_gun_equipment_1906_desc:0 "Die 10 cm Kanone 04 (10 cm K 04) war ein deutsches Feldgeschütz im Ersten Weltkrieg. Es war das zweite schwere Geschütz mit modernem Rückstoßsystem, das von der deutschen Armee akzeptiert wurde. Es wurde als Ersatz für die 10 cm K 99 und die lange 15 cm Kanone 92 hergestellt. Obwohl die Standardversion keine Schutzblende hatte, wurden einige Modelle, wie die 10 cm K 04/12, mit einer speziellen Schutzblende und einigen anderen geringfügigen Modifikationen ausgestattet. Bei Kriegsausbruch waren nur 32 Exemplare im Einsatz." 
 GER_light_field_gun_equipment_1906_short:0 "10 cm K 04"
 GER_light_field_gun_equipment_1908:0 "10,5 cm Feldhaubitze 98/09 "
 GER_light_field_gun_equipment_1908_desc:0 "Die 10,5 cm Feldhaubitze 98/09 (10,5 cm FH 98/09), eine kurzläufige (1625 mm) 105-mm-Haubitze, auch als 10,5 cm leichte Feldhaubitze 98/09 bezeichnet, wurde im Ersten Weltkrieg und danach vom Deutschen Reich, dem Königreich Rumänien sowie dem Osmanischen Reich eingesetzt. Sie hatte eine maximale Reichweite von 6.300 Metern."
 GER_light_field_gun_equipment_1908_short:0 "Feldhaubitze 10,5 cm"
 GER_light_field_gun_equipment_1:0 "7,7 cm Feldkanone 96"
 GER_light_field_gun_equipment_1_desc:0 "Das FK 96 war ein durch und durch konventionelles Geschütz, eine modernisierte Version von Krupps FK 73-Geschütz, verfügte jedoch über kein anderes Rückstoßsystem als eine teilweise wirksame Spatenbremse. Daher wurde es überholt, als die Franzosen im folgenden Jahr ihr Canon de 75 modèle 1897 (mit hydropneumatischem Rückstoßmechanismus) einführten."
 GER_light_field_gun_equipment_1_short:0 "7,7 cm FK 96"
 GER_light_field_gun_equipment_2:0 "Krupp 75mm M1903"
 GER_light_field_gun_equipment_2_desc:0 "Krupp 75mm M1903"
 GER_light_tank_aa_equipment_1:0 "Flakpanzer I"
 GER_light_tank_aa_equipment_1_desc:0 "Eine auf dem Fahrgestell eines Panzer I montierte Flugabwehrkanone."
 GER_light_tank_aa_equipment_1_short:0 "FlakPz I"
 GER_light_tank_aa_equipment_2:0 "Flakpanzer Luchs"
 GER_light_tank_aa_equipment_2_desc:0 "Eine auf dem Fahrgestell eines Panzer II montierte Flugabwehrkanone."
 GER_light_tank_aa_equipment_2_short:0 "FlakPz Luchs"
 GER_light_tank_aa_equipment_3:0 "Flakpanzer 1602"
 GER_light_tank_aa_equipment_3_desc:0 "Eine Flugabwehrkanone, montiert auf dem Fahrgestell eines VK1602-Panzers."
 GER_light_tank_aa_equipment_3_short:0 "FlakPz 1602"
 GER_light_tank_artillery_equipment_1:0 "Sturmpanzer I Bison"
 GER_light_tank_artillery_equipment_1_desc:0 "Gezogene Geschütze, die den Infanteriegeschützkompanien motorisierter Infanterieregimenter zugeteilt waren, hatten im Gefecht Schwierigkeiten, mit Panzern mitzuhalten. Die einfachste Lösung bestand darin, ein Ersatzfahrgestell für den Panzer umzubauen und in die Schlacht mitzunehmen. Beim Bison wurde das Fahrgestell des Panzer I verwendet."
 GER_light_tank_artillery_equipment_1_short:0 "Bison"
 GER_light_tank_artillery_equipment_2:0 "Sd. Kfz. 124 Wespe"
 GER_light_tank_artillery_equipment_2_desc:0 "Das Sd.Kfz. 124 Wespe (deutsch für Wespe) war ein deutsches selbstfahrendes Artilleriefahrzeug, das auf einem modifizierten Panzer-II-Fahrgestell basierte."
 GER_light_tank_artillery_equipment_2_short:0 "Wespe"
 GER_light_tank_artillery_equipment_3:0 "Waffenträger Leopard"
 GER_light_tank_artillery_equipment_3_desc:0 "Der Waffenträger Leopard war ein geplantes selbstfahrendes Artilleriefahrzeug auf Basis des geplanten VK1602 Leopard-Chassis."
 GER_light_tank_artillery_equipment_3_short:0 "WT Leopard"
 GER_light_tank_destroyer_equipment_1:0 "7,5 cm PaK 40 auf Fahrgestell Marder II"
 GER_light_tank_destroyer_equipment_1_desc:0 "Der Marder II war ein deutscher Panzerzerstörer auf Basis des Panzer-II-Fahrgestells."
 GER_light_tank_destroyer_equipment_1_short:0 "Marder II"
 GER_light_tank_destroyer_equipment_2:0 "Marder III"
 GER_light_tank_destroyer_equipment_2_short:0 "Marder III"
 GER_light_tank_destroyer_equipment_3:0 "Sturmgeschütz auf Leopard"
 GER_light_tank_destroyer_equipment_3_desc:0 "Der JagdLeopard war eine mögliche Modifikation des geplanten leichten Panzers VK1602 Leopard."
 GER_light_tank_destroyer_equipment_3_short:0 "JagdLeopard"
 GER_light_tank_equipment_1:0 "Panzerkampfwagen I"
 GER_light_tank_equipment_1_desc:0 "Der Panzer I war ein leichter Panzer, der in den 1930er Jahren in Deutschland produziert wurde. Die Entwicklung des Panzer I begann 1932, die Massenproduktion startete 1934. Der PzKpfw I war ursprünglich als Übungspanzer gedacht, um die deutsche Armee mit dem Konzept der Panzerkriegsführung vertraut zu machen, wurde aber aufgrund des Mangels an moderneren Panzern häufig im Kampf eingesetzt."
 GER_light_tank_equipment_1_short:0 "Panzer I"
 GER_light_tank_equipment_2:0 "Panzerkampfwagen II"
 GER_light_tank_equipment_2_desc:0 "Der Panzer II war ursprünglich als Übergangslösung konzipiert, während größere, modernere Panzer entwickelt wurden. Aufgrund des Mangels an leistungsfähigeren Panzern wurde er jedoch häufig im Kampf eingesetzt."
 GER_light_tank_equipment_2_short:0 "Panzer II"
 GER_light_tank_equipment_3:0 "VK1602 Leopard"
 GER_light_tank_equipment_3_desc:0 "Der VK1602 Leopard war ein deutsches Aufklärungsfahrzeug, das 1942 entworfen wurde. Geplant war, das Fahrzeug mit der 75-mm-Kwk 41 zu bewaffnen, die jedoch durch eine kleinere 50-mm-Kanone ersetzt wurde. Der VK 1602 verfügte über eine geneigte Frontpanzerung, die vom Panther-Panzer inspiriert war. Um die Geländegängigkeit zu verbessern, wurde der VK 1602 mit 350 mm breiten Ketten ausgestattet."
 GER_light_tank_equipment_3_short:0 "Leopard"
 GER_mechanized_equipment_1:0 "Sonderkraftfahrzeug 11"
 GER_mechanized_equipment_1_desc:0 "Das Sd.Kfz. 11 (Sonderkraftfahrzeug) war ein deutsches Halbkettenfahrzeug, das im Zweiten Weltkrieg weit verbreitet war. Es konnte acht Soldaten transportieren und zusätzlich ein Geschütz oder einen Anhänger ziehen."
 GER_mechanized_equipment_1_short:0 "Sd.Kfz. 11"
 GER_mechanized_equipment_2:0 "Sonderkraftfahrzeug 251"
 GER_mechanized_equipment_2_desc:0 "Das Halbkettenfahrzeug Sd.Kfz. 251 war ein gepanzertes Kampffahrzeug, das von der Firma Hanomag während des Zweiten Weltkriegs auf der Grundlage ihres früheren Fahrzeugs Sd.Kfz. 11 entworfen und erstmals gebaut wurde."
 GER_mechanized_equipment_2_short:0 "Sd.Kfz. 251"
 GER_mechanized_equipment_3:0 "Sonderkraftfahrzeug 251/20"
 GER_mechanized_equipment_3_desc:0 "Eine aktualisierte Version des Sd.Kfz. 251, ausgestattet mit einem Infrarotscheinwerfer."
 GER_mechanized_equipment_3_short:0 "Sd.Kfz. 251/20"
 GER_medium_tank_aa_equipment_1:0 "Flakpanzer III Möbelwagen"
 GER_medium_tank_aa_equipment_1_desc:0 "Der Spitzname „Möbelwagen“ stammt von seinem kastenförmigen Turm im geschlossenen Zustand. Es handelte sich um ein selbstfahrendes Flugabwehrgeschütz, das auf dem Fahrgestell des Panzer III aufgebaut und mit einer 20-mm-Vierlingskanone bewaffnet war."
 GER_medium_tank_aa_equipment_1_short:0 "Möbelwagen"
 GER_medium_tank_aa_equipment_2:0 "Flakpanzer IV Ostwind"
 GER_medium_tank_aa_equipment_2_desc:0 "Der Flakpanzer IV „Ostwind“ war eine selbstfahrende Flugabwehrkanone auf Basis des Panzer IV. Er wurde 1944 als Nachfolger des früheren Flakpanzers IV entwickelt. Der Turm des Panzer IV wurde entfernt und durch einen offenen, sechseckigen Turm ersetzt, in dem eine 3,7-cm-FlaK 43 untergebracht war. Eine geschlossene Konstruktion wäre wünschenswert gewesen, war aber aufgrund der starken Rauchentwicklung der Kanone nicht möglich."
 GER_medium_tank_aa_equipment_2_short:0 "Ostwind"
 GER_medium_tank_aa_equipment_3:0 "Flakpanzer Wirbelwind"
 GER_medium_tank_aa_equipment_3_short:0 "Wirbelwind"
 GER_medium_tank_artillery_equipment_1:0 "Gitter"
 GER_medium_tank_artillery_equipment_1_desc:0 "Das Sd.Kfz. 138/1 Grille (deutsch für „Grille“) war ein selbstfahrendes Artilleriegeschütz, das im Zweiten Weltkrieg von Deutschland eingesetzt wurde. Es wurden etwa 490–500 Grille produziert. Sie wurden von Panzerdivisionen in der Sowjetunion sowie von Einheiten in Polen und Frankreich eingesetzt. Sie waren bis 1945 im Einsatz und kamen auch in Tunesien zum Einsatz, wo sie gegen feindliche Artillerie und Panzer kämpften."
 GER_medium_tank_artillery_equipment_1_short:0 "Gitter"
 GER_medium_tank_artillery_equipment_2:0 "Hummel"
 GER_medium_tank_artillery_equipment_2_desc:0 "Hummel war ein selbstfahrendes Artilleriegeschütz auf Basis des Geschützwagens III/IV, bewaffnet mit einer 15-cm-Haubitze. Es wurde von der deutschen Wehrmacht im Zweiten Weltkrieg von Anfang 1943 bis Kriegsende eingesetzt."
 GER_medium_tank_artillery_equipment_2_short:0 "Hummel"
 GER_medium_tank_artillery_equipment_3:0 "Brummbär"
 GER_medium_tank_artillery_equipment_3_short:0 "Brummbär"
 GER_medium_tank_destroyer_equipment_1:0 "Sturmgeschütz III"
 GER_medium_tank_destroyer_equipment_1_desc:0 "Das Sturmgeschütz III war im Zweiten Weltkrieg das meistgebaute deutsche Panzerkampffahrzeug. Es basierte auf dem Fahrgestell des bewährten Panzers III. Ursprünglich als mobiles, leichtes Geschütz zur Infanterieunterstützung konzipiert, wurde das StuG kontinuierlich modifiziert und fand breite Anwendung als Jagdpanzer."
 GER_medium_tank_destroyer_equipment_1_short:0 "StuG III"
 GER_medium_tank_destroyer_equipment_2:0 "Jagdpanzer IV"
 GER_medium_tank_destroyer_equipment_2_desc:0 "Der Jagdpanzer IV diente in den Panzerabwehrabteilungen der Panzer- und SS-Panzerdivisionen. Er kämpfte in der Normandie, in der Ardennenoffensive und an der Ostfront. Er war ein sehr erfolgreicher Panzerzerstörer, zeigte jedoch keine gute Leistung, wenn er – wie die meisten Panzerzerstörer – zweckentfremdet als Ersatz für Panzer oder Sturmgeschütze eingesetzt wurde. In der späteren Kriegsphase wurden sie jedoch zunehmend als Panzerersatz eingesetzt, da oft keine anderen Panzer verfügbar waren."
 GER_medium_tank_destroyer_equipment_2_short:0 "JagdPz IV"
 GER_medium_tank_destroyer_equipment_3:0 "Jagdpanther"
 GER_medium_tank_destroyer_equipment_3_desc:0 "Der Jagdpanther war ein Jagdpanzer, der im Zweiten Weltkrieg von Nazi-Deutschland auf Basis des Panther-Chassis gebaut wurde. Er wurde gegen Ende des Krieges (1944) in Dienst gestellt und war an der Ost- und Westfront im Einsatz. Der Jagdpanther kombinierte die leistungsstarke 8,8-cm-PaK-43-Kanone des Tiger II mit der charakteristischen hervorragenden Panzerung und Aufhängung des Panther-Chassis. Er litt jedoch unter der allgemein schlechten Lage Deutschlands im späteren Kriegsverlauf, die zu geringen Produktionszahlen, Ersatzteilmangel und mangelhafter Ausbildung der Besatzung führte."
 GER_medium_tank_destroyer_equipment_3_short:0 "Jagdpanther"
 GER_medium_tank_equipment_1:0 "Panzerkampfwagen III"
 GER_medium_tank_equipment_1_desc:0 "Bereits 1934/35 sah General Heinz Guderian zwei Grundtypen als umfangreichste Ausrüstung für die künftigen deutschen Panzerdivisionen vor. Das erste Fahrzeug sollte mit einer Panzerabwehrkanone und zwei Maschinengewehren bewaffnet sein, das zweite als Unterstützungsfahrzeug mit einem Geschütz größeren Kalibers. Der erste Typ wurde schließlich als Panzerkampfwagen III bekannt und sollte ein Standardpanzer für die drei leichten Kompanien eines Panzerbataillons werden. Der zweite wurde als Panzerkampfwagen IV bekannt."
 GER_medium_tank_equipment_1_short:0 "Panzer III"
 GER_medium_tank_equipment_2:0 "Panzerkampfwagen IV"
 GER_medium_tank_equipment_2_desc:0 "Der Panzer IV war ursprünglich als Infanterieunterstützungspanzer konzipiert und nicht für den Kampf gegen feindliche Panzer vorgesehen. Diese Funktion übernahm der leichtere Panzer III. Als jedoch die Mängel der Vorkriegsdoktrin und die sowjetischen T-34-Panzer deutlich wurden, übernahm der Panzer IV bald die Rolle seines zunehmend obsoleten Vetters im Panzerkampf. Der Panzer IV war der meistgebaute und eingesetzte deutsche Panzer des Zweiten Weltkriegs und diente als Basis für viele andere Kampffahrzeuge."
 GER_medium_tank_equipment_2_short:0 "Panzer IV"
 GER_medium_tank_equipment_3:0 "Panzerkampfwagen V Panther"
 GER_medium_tank_equipment_3_desc:0 "Panther ist die gebräuchliche Bezeichnung eines mittleren Panzers, den Deutschland im Zweiten Weltkrieg von Mitte 1943 bis zum Ende des europäischen Krieges 1945 einsetzte. Er war als Gegenstück zum russischen T-34 und als Ersatz für den Panzer III und den Panzer IV gedacht. Obwohl er letzteren nie ersetzte, diente er bis Kriegsende neben ihm und den schwereren Tiger-Panzern. Die hervorragende Kombination aus Feuerkraft, Mobilität und Schutz des Panthers diente als Maßstab für die Panzerkonstruktionen anderer Nationen in der Spät- und Nachkriegszeit, und er gilt als einer der besten Panzer des Zweiten Weltkriegs."
 GER_medium_tank_equipment_3_short:0 "Panther"
 GER_modern_tank_aa_equipment_1:0 "Kugelblitz"
 GER_modern_tank_aa_equipment_1_short:0 "Kugelblitz"
 GER_modern_tank_destroyer_equipment_1:0 "E-25 Standardpanzer"
 GER_modern_tank_destroyer_equipment_1_desc:0 "Eine aktualisierte Version des Jagdpanzers IV, der E-25 ist schneller und besser gepanzert"
 GER_modern_tank_destroyer_equipment_1_short:0 "E-25"
 GER_modern_tank_equipment_1:0 "E-50 Standardpanzer"
 GER_modern_tank_equipment_1_desc:0 "Die Entwicklungsserie war ein Versuch Deutschlands gegen Ende des Zweiten Weltkriegs, eine standardisierte Panzerserie zu entwickeln. Es sollte Standardmodelle in sechs verschiedenen Gewichtsklassen geben. Der E-50 Standardpanzer war als Standard-Mittelpanzer gedacht und sollte die Panther- und Tiger-Panzerserien sowie die darauf basierenden Umbauten ersetzen."
 GER_modern_tank_equipment_1_short:0 "E-50"
 GER_motorized_equipment_1:0 "Opel Blitz"
 GER_rocket_artillery_equipment_1:0 "28/32 cm Nebelwerfer 41"
 GER_rocket_artillery_equipment_1_short:0 "Nebelwerfer 41"
 GER_rocket_artillery_equipment_2:0 "21 cm Nebelwerfer 42"
 GER_super_heavy_tank_aa_equipment_1:0 "Flakpanzer VIII Maus"
 GER_super_heavy_tank_aa_equipment_1_desc:0 "Das Chassis einer Maus mit zwei 88-mm-Flugabwehrkanonen."
 GER_super_heavy_tank_aa_equipment_1_short:0 "FlakMaus"
 GER_super_heavy_tank_artillery_equipment_1:0 "Geschützwagen E-100"
 GER_super_heavy_tank_artillery_equipment_1_desc:0 "Dieses 210-mm-Artilleriegeschütz ist auf einem superschweren Panzerchassis montiert und kann es in seiner Leistung mit manchen Eisenbahngeschützen aufnehmen."
 GER_super_heavy_tank_artillery_equipment_1_short:0 "GW E-100"
 GER_super_heavy_tank_destroyer_equipment_1:0 "Sturmgeschütz auf Fahrgestell Maus"
 GER_super_heavy_tank_destroyer_equipment_1_desc:0 "Das Fahrgestell einer Maus mit einer 150-mm-Kanone in einem festen Aufbau."
 GER_super_heavy_tank_destroyer_equipment_1_short:0 "Jagdmaus"
 GER_super_heavy_tank_equipment_1:0 "Panzerkampfwagen VIII Maus"
 GER_super_heavy_tank_equipment_1_desc:0 "Der Panzerkampfwagen VIII Maus war ein deutscher superschwerer Panzer aus dem Zweiten Weltkrieg, der Ende 1944 fertiggestellt wurde. Er ist das schwerste vollständig geschlossene gepanzerte Kampffahrzeug, das je gebaut wurde. Die Hauptbewaffnung der Maus bestand aus einer 128-mm-Kanone vom Typ KwK 44 L/55 mit einer zusätzlichen koaxialen 75-mm-Kanone."
 GER_super_heavy_tank_equipment_1_short:0 "Maus"
