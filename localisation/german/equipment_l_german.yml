 JAP_heavy_field_gun_equipment_1903:0 "Krupp 15cm Haubitze"
 JAP_heavy_field_gun_equipment_1903_desc:0 "Die 15 cm schwere Feldhaubitze 1902 war das erste Artilleriegeschütz der deutschen Armee mit modernem Rückstoßsystem. Zu Beginn des Ersten Weltkriegs waren 416 Exemplare im Einsatz. Ihre Mobilität, die den Einsatz als mittlere Artillerie ermöglichte, und das relativ schwere Geschoss verschafften der deutschen Armee in den ersten Gefechten einen Feuerkraftvorteil, da die französische und britische Armee über kein vergleichbares Geschütz verfügten. Japan importierte diese Geschütze für den Einsatz im Russisch-Japanischen Krieg."
 JAP_heavy_field_gun_equipment_1903_short:0 "Krupp 15cm"
 JAP_heavy_field_gun_equipment_1906:0 "Typ 38 12-cm-Kanone"
 JAP_heavy_field_gun_equipment_1906_desc:0 "Die 12-cm-Kanone Typ 38 war ein schweres Geschütz, das von der Kaiserlich Japanischen Armee im Ersten Weltkrieg, im Zweiten Japanisch-Chinesischen Krieg und im Zweiten Weltkrieg eingesetzt wurde. Sie basierte auf den zuvor importierten Krupp-Designs und wurde vor Ort produziert."
 JAP_heavy_field_gun_equipment_1906_short:0 "Typ 38 105 mm"
 JAP_heavy_field_gun_equipment_1908:0 "Typ 38 15-cm-Kanone"
 JAP_heavy_field_gun_equipment_1908_desc:0 "Die 15-cm-Kanone Typ 38 war ein schweres Geschütz der Kaiserlich Japanischen Armee im Ersten Weltkrieg, im Zweiten Japanisch-Chinesischen Krieg und im Zweiten Weltkrieg. Wie die 12-cm-Kanone Typ 38 basierte auch sie auf den zuvor importierten Krupp-Entwürfen."
 JAP_heavy_field_gun_equipment_1:0 "Krupp 12cm Haubitze"
 JAP_heavy_field_gun_equipment_1_desc:0 "Nach dem Deutsch-Französischen Krieg begann die deutsche Armee, Ersatz für ihre 12-cm-Hinterladerkanonen Kanone C/64 zu suchen. Ein neues Geschütz, die 12-cm-Kanone C/80, wurde den Festungs- und Belagerungsartillerieregimenten der Armee zugeteilt. Die C/80 verwendete einen abgerundeten Verschlussblock, um Spannungsrisse zu vermeiden, die bei früheren Geschützen zu katastrophalen Ausfällen führten. Die C/80 war für ihre Zeit recht konventionell, und die meisten Nationen besaßen ähnliche Geschütze. Japan importierte dieses Geschütz später und setzte es im Russisch-Japanischen Krieg ein."
 JAP_heavy_field_gun_equipment_1_short:0 "Krupp 12cm"
