 ENG_early_infantry_equipment_0:0 "Muster 1913 Enfield"
 ENG_early_infantry_equipment_0_desc:0 "Aufgrund der schlechten Leistung der britischen .303-Patrone während des Zweiten Burenkrieges versuchten die Briten, die Patrone und das Lee-Enfield-Gewehr, mit dem sie abgefeuert wurde, zu ersetzen. Zum Abfeuern der Patrone wurde ein neues Gewehr auf Basis des Mauser-Designs entwickelt, das sogenannte Pattern 1913 Enfield."
 ENG_early_infantry_equipment_1890:0 "Lee-Metford-Gewehr"
 ENG_early_infantry_equipment_1890_desc:0 "Das Lee-Metford-Gewehr war ein Repetiergewehr der britischen Armee, das das von James Paris Lee entwickelte Hinterverriegelungssystem und das abnehmbare Magazin mit einem innovativen, von William Ellis Metford entworfenen gezogenen Lauf mit sieben Zügen kombinierte."
 ENG_early_infantry_equipment_1900:0 "Lee-Enfield-Gewehr"
 ENG_early_infantry_equipment_1900_desc:0 "Das Lee-Enfield ist ein Repetiergewehr mit Zylinderverschluss und Magazinzufuhr, das in der ersten Hälfte des 20. Jahrhunderts die Hauptfeuerwaffe der Streitkräfte des Britischen Empire und Commonwealth war. Von seiner offiziellen Einführung im Jahr 1895 bis 1957 war es das Standardgewehr der britischen Armee."
 ENG_early_infantry_equipment_1902:0 "Lee-Enfield Kavalleriekarabiner"
 ENG_early_infantry_equipment_1902_desc:0 "Eine kürzere Version des Lee-Enfield wurde als Lee–Enfield Cavalry Carbine Mk I oder LEC eingeführt, mit einem 540-mm-Lauf im Gegensatz zum 770-mm-Lauf der langen Version."
 ENG_early_infantry_equipment_1904:0 ".303 SMLE Mk.I*"
 ENG_early_infantry_equipment_1904_desc:0 "Das Lee-Enfield wurde einer Reihe kleinerer Verbesserungen unterzogen, darunter der Wegfall der Reinigungs-/Räumstange, und wurde zum Mk I*."
 ENG_early_infantry_equipment_1906:0 ".303 SMLE Mk.II"
 ENG_early_infantry_equipment_1906_desc:0 "Umbauten verschiedener „Long Lees“ in SMLE-Konfigurationen wurden genehmigt. Diese umgebauten Gewehre wurden als SMLE Converted Mk II bezeichnet."
 ENG_early_infantry_equipment_1908:0 ".303 SMLE Mk.III"
 ENG_early_infantry_equipment_1908_desc:0 "Das bekannteste Gewehr von Lee-Enfield, das SMLE Mk III, wurde am 26. Januar 1907 vorgestellt. Es verfügte über eine vereinfachte Kimme und eine feste Ladeführung. Das Design der Handschützer und des Magazins wurde ebenfalls verbessert und die Kammer für die neue Mk VII High Velocity Spitzer-Munition im Kaliber .303 angepasst."
 ENG_early_infantry_equipment_1:0 "Muster 1914 Enfield"
 ENG_early_infantry_equipment_2:0 ".303 SMLE Mk.III Star"
 ENG_early_infantry_equipment_2_desc:0 "Während des Ersten Weltkriegs stellte sich heraus, dass die Herstellung des SMLE Mk III zu kompliziert war und die Nachfrage das Angebot überstieg. Ende 1915 wurde der Mk III* mit mehreren Änderungen eingeführt."
 ENG_early_infantry_equipment_4:0 ".303 SMLE Mk V"
 ENG_early_infantry_equipment_4_desc:0 "Die Herstellung des SMLE-Designs war aufgrund der vielen erforderlichen Schmiede- und Bearbeitungsvorgänge relativ teuer. In den 1920er Jahren wurden eine Reihe von Experimenten durchgeführt, um diese Probleme zu lösen, die schließlich zum SMLE Mk V führten."
