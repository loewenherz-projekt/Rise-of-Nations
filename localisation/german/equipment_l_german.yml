 SOV_early_infantry_equipment_0:0 "Modell 1891/1910"
 SOV_early_infantry_equipment_0_desc:0 "Das Mosin-Nagant wurde 1910 als Modell 1891/1910 standardisiert und von der russischen Armee während des gesamten Ersten Weltkriegs und später des russischen Bürgerkriegs eingesetzt."
 SOV_early_infantry_equipment_1890:0 "Berdan-Gewehr"
 SOV_early_infantry_equipment_1890_desc:0 "Das Berdan-Gewehr ist ein russisches Gewehr, das 1868 vom amerikanischen Erfinder Hiram Berdan entwickelt wurde. Es war von 1870 bis 1891 Standardausrüstung der russischen Armee."
 SOV_early_infantry_equipment_1890_short:0 "Berdan-Gewehr"
 SOV_early_infantry_equipment_1900:0 "Mosin-Nagant-Gewehr"
 SOV_early_infantry_equipment_1900_desc:0 "Das 3-Linien-Gewehr M1891, umgangssprachlich Mosin-Nagant oder Mosins Gewehr genannt, ist ein fünfschüssiges Militärgewehr mit Repetiermechanismus und internem Magazin. Es wurde von den Streitkräften des Russischen Reiches, der Sowjetunion und verschiedener anderer Nationen eingesetzt. Es ist eines der am häufigsten in Massenproduktion hergestellten militärischen Repetiergewehre der Geschichte. Seit 1891 wurden über 37 Millionen Exemplare hergestellt. Trotz seines Alters wurde es bis heute in verschiedenen Konflikten weltweit eingesetzt."
 SOV_early_infantry_equipment_1900_short:0 "Mosin-Nagant-Gewehr"
 SOV_early_infantry_equipment_1902:0 "MN M1891 Dragoon"
 SOV_early_infantry_equipment_1902_desc:0 "Dieses für den Einsatz durch Dragoner vorgesehene Gewehr war 64 mm kürzer und 0,4 kg leichter als das M1891, hatte andere Riemenhalterungen und wurde ebenfalls mit einem Bajonett ausgestattet."
 SOV_early_infantry_equipment_1902_short:0 "M1891 Dragonergewehr"
 SOV_early_infantry_equipment_1904:0 "MN M1891 Kosaken"
 SOV_early_infantry_equipment_1904_desc:0 "Das Kosakengewehr ähnelte dem Dragoner-Modell, war jedoch für die Verwendung ohne Bajonett vorgesehen und wurde ohne Bajonett ausgegeben."
 SOV_early_infantry_equipment_1906:0 "Karabiner Modell 1907"
 SOV_early_infantry_equipment_1906_desc:0 "Mit 289 mm kürzerer Länge und 0,95 kg leichter als das M1891 eignete sich dieses Modell hervorragend für Kavallerie, Pioniere, Signalgeber und Artilleristen. Es war fast bis zum Korn durchgezogen und besaß daher kein Bajonett. Es wurde bis mindestens 1917 in geringer Stückzahl produziert."
 SOV_early_infantry_equipment_1908:0 "Gewehr Modell 1908"
 SOV_early_infantry_equipment_1908_desc:0 "Die Mosin-Nagant blieb bis 1908 unverändert. Zu dieser Zeit wurde ein neuer Patronentyp eingeführt, der ein spitzes Mantelgeschoss mit besserer Ballistik aufwies. Auch eine neue Art von Kimme wurde eingeführt."
 SOV_early_infantry_equipment_1:0 "Fedorov Avtomat"
 SOV_early_infantry_equipment_1_desc:0 "Der Fedorov Avtomat oder FA ist eine Waffe mit kurzem Rückstoß und verriegeltem Verschluss. 1913 reichte Hauptmann V. Fedorov den Prototyp eines automatischen Gewehrs mit einem festen Magazin mit Ladestreifen ein, das aus Kriegsgründen zu einem halbautomatischen Gewehr mit Kammer für seine eigene experimentelle randlose 6,5-mm-Patrone, die 6,5-mm-Fedorov, umgebaut wurde."
 SOV_early_infantry_equipment_2:0 "FA Arisaka"
 SOV_early_infantry_equipment_2_desc:0 "Die Produktion der neuen Patrone für das FA war nicht tragbar, daher wurde das Gewehr auf die japanische 6,5 × 50 mm Arisaka-Munition umgerüstet, die in Hülle und Fülle vorhanden war, da sie zusammen mit Arisaka-Gewehren aus Japan und Großbritannien gekauft worden war. Russland besaß zu Beginn des Ersten Weltkriegs über 400 Millionen Patronen 6,5 × 50 mm Arisaka."
 SOV_early_infantry_equipment_3:0 "Tokarev Modell 1927"
 SOV_early_infantry_equipment_3_desc:0 "Im Jahr 1924 beschloss die sowjetische Führung, auf alle Waffen mit ausländischer Munition zu verzichten. Dies führte zur Herstellung der ersten sowjetischen Maschinenpistole mit der Revolverpatrone 7,62 × 38 mm R."
 SOV_early_infantry_equipment_4:0 "FA 1922"
 SOV_early_infantry_equipment_4_desc:0 "Experimentelle FA 1922"
