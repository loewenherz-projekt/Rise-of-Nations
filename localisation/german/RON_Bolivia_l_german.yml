 BOL_provide_asylum:0 "Sicherer Himmel"
 BOL_provide_asylum_desc:0 "Es gibt Menschen in Europa, die wegen ihres Glaubens verfolgt werden. Es könnte für uns nützlich sein, ihnen zu helfen und sie hierher zu bringen."
