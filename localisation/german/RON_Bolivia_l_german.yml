 BOL_confront_barons:0 "Stell dich den Zinnbaronen"
 BOL_confront_barons_desc:0 "Wenn wir das Vertrauen der Menschen gewinnen wollen, müssen wir uns der Macht hinter dem Thron der Blechbarone entgegenstellen, die unsere Nation in den Ruin getrieben haben."
 BOL_dismantle_la_rosca:0 "La Rosca demontieren"
 BOL_dismantle_la_roscav_desc:0 "Die gegenwärtige Krise ist nur ein Symptom der dekadenten Fäulnis der oligarchischen Familien, die Bolivien regieren. Nur wenn wir die parasitäre bürgerliche Elite von der Macht vertreiben, können wir die Gesellschaft verändern."
 BOL_civil_military_pact:0 "Zivil-Militärischer Pakt"
 BOL_civil_military_pact_desc:0 "Die Republik wird von allen Seiten bedroht. Wir können die notwendigen Reformen nur durch einen Pakt mit dem Militär sicherstellen, das eine Übergangsregierung bilden wird, bis die Zeit reif ist, in der das Volk selbst regiert."
 BOL_thesis_of_pulacayo:0 "These von Pulacayo"
 BOL_thesis_of_pulacayo_desc:0 "Wir müssen die Grundlagen für eine Bewegung schaffen, die in der Lage ist, unsere Nation zu befreien."
 BOL_found_the_CTSB:0 "CTSB gefunden"
 BOL_found_the_CTSB_desc:0 "Damit die Arbeiterklasse Gehör findet, muss sie sich organisieren. Um dies zu erreichen, muss ein Organismus gegründet werden. Die „Confederación Sindical de Trabajadores de Bolivia“ wird sich darum kümmern."
 BOL_party_discipline:0 "Parteidisziplin"
 BOL_party_discipline_desc:0 "Eine Organisation nützt nichts, wenn niemand bereit ist, etwas für die Sache zu tun. Es bedarf der Indoktrination."
 BOL_fist_full_of_dynamite:0 "Eine Faust voll Dynamit"
 BOL_fist_full_of_dynamite_desc:0 ""
 BOL_socialist_science:0 "Sowjetische Wissenschaft"
 BOL_socialist_science_desc:0 "Wenn wir unsere Ziele mit denen der Sowjetunion in Einklang bringen, könnten wir möglicherweise eine wissenschaftliche Zusammenarbeit zwischen unseren Nationen aufbauen."
 BOL_permanent_revolution:0 "Permanente Revolution"
 BOL_permanent_revolution_desc:0 "Wir dürfen nicht mit der Befreiung unseres Volkes aufhören, auch unsere Nachbarn müssen befreit werden."
 BOL_nuevo_estado_boliviano:0 "Neuer Bolivianischer Staat"
 BOL_nuevo_estado_boliviano_desc:0 "Wir wurden von unseren Nachbarn verspottet, die uns unser Land und unseren Zugang zum Meer gestohlen haben, und unsere Regierungen haben nichts unternommen, um uns unser rechtmäßiges Land zurückzuerlangen oder unser Land voranzubringen. Es ist Zeit für eine Veränderung."
