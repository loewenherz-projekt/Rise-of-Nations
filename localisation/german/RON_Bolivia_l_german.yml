 bol_mestizaje_desc:0 ""
 bol_social_rights:0 "Soziale Rechte"
 bol_social_rights_desc:0 "Unsere Gesellschaft entwickelt sich weiter, sodass jeder das bekommt, was er verdient"
 bol_agrarian_reform:0 "Agrarreformen"
 bol_agrarian_reform_desc:0 "Die Umverteilung des Landes zurück an die Hände, die es bearbeiten, wird ein neues politisches Bündnis mit dem Bauernsektor schaffen"
 

bolivia.1.t:0 "Bündnis mit Bolivien"
 bolivia.1.d:0 "Unsere Brüder aus Bolivien haben angeboten, ein Bündnis zu bilden. Sie glauben, dass die weltweite Instabilität sich auf Südamerika ausweiten könnte und wir müssen bereit sein, wenn die Zeit kommt."
 bolivia.1.a:0 "Treten Sie der Allianz bei"
 bolivia.1.b:0 "Weigere dich, mitzumachen"
 bolivia.2.t:0 "Bündnis mit Bolivien"
 bolivia.2.d:0 "Unsere Brüder aus Bolivien haben angeboten, ein Bündnis zu bilden. Sie glauben, dass die weltweite Instabilität sich auf Südamerika ausweiten könnte und wir müssen bereit sein, wenn die Zeit kommt."
 bolivia.2.a:0 "Treten Sie der Allianz bei"
