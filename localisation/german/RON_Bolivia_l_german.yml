 BOL_social_constitution:0 "Sozialverfassung"
 BOL_social_constitution_desc:0 "Eine neue Verfassung, die positive soziale Rechte garantiert, wird den Menschen helfen, ihr Vertrauen in den Staat wiederherzustellen und uns die Kraft für die kommenden notwendigen Reformen geben."
 BOL_first_indigenous_congress:0 "Erster Indigener Kongress"
 BOL_first_indigenous_congress_desc:0 "Die Mehrheit unserer Bevölkerung leidet aufgrund ihrer indigenen Identität unter Rassentrennung. Mit der Einberufung des ersten Indigenenkongresses schmieden wir einen neuen nationalen Pakt zwischen den Ureinwohnern und dem Staat. Viele werden jedoch die Einbeziehung dieser „Wilden“ befürchten."
 BOL_nationalize_the_mines:0 "Verstaatlichung der Minen"
 BOL_nationalize_the_mines_desc:0 "Der Bergbau ist das Rückgrat unserer Wirtschaft. Indem wir unser Erbe aus den privaten Händen der Oligarchen zurückerobern, können wir die Entwicklung und soziale Gerechtigkeit unseres Landes sichern."
 BOL_redistribute_the_haciendas:0 "Neuverteilung der Haciendas"
 BOL_redistribute_the_haciendas_desc:0 "Die halbfeudale Klasse der Elite-Landbesitzer behindert die Entwicklung unseres Landes und unterwirft unsere Bevölkerung dem Status von Knechten. Die Rückverteilung des Landes an die Arbeiter wird ein neues politisches Bündnis mit dem Bauernsektor schaffen."
 BOL_la_union_es_la_fuerza:0 "La Union es la Fuerza"
 BOL_la_union_es_la_fuerza_desc:0 "Die nationalen Reformen haben für unser Volk eine neue Ära der nationalen Einheit eröffnet. Die Massen sprechen mit einer Stimme. Endlich handeln Volkswille und Staat gemeinsam."
 BOL_rural_schools:0 "Ländliche Schulen"
 BOL_rural_schools_desc:0 ""
 BOL_pachacuti:0 "Pachacuti"
 BOL_pachacuti_desc:0 "Wir werden unsere tausendjährige Aufgabe als Nachkommen der Inkas annehmen und den Kontinent von der Fremdherrschaft befreien."
 BOL_alliance_with_peru:0 "Bündnis mit Peru"
 BOL_alliance_with_peru_desc:0 "Gemeinsam mit unseren peruanischen Brüdern werden wir die Anden befreien!"
 BOL_people_of_the_sun:0 "Menschen der Sonne"
 BOL_people_of_the_sun_desc:0 "Vereinen Sie die Menschen des Kontinents hinter der Sache."
 BOL_take_back_the_sea:0 "Holt euch das Meer zurück"
 BOL_take_back_the_sea_desc:0 "Holen Sie sich unser Geburtsrecht auf das Meer zurück, das Chile im Salpeterkrieg zu Unrecht usurpiert hat."
 BOL_avenge_the_chaco:0 "Räche den Chaco"
 BOL_avenge_the_chaco_desc:0 "Rächen Sie die Toten und erobern Sie den Chaco von Paraguay zurück."
