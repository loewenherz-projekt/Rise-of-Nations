 bol_officers_in_charge:0 "Verantwortliche Offiziere"
 bol_officers_in_charge_desc:0 "Während sich eine neue Regierung auf die Regierungsbildung vorbereitet, sind Beamte für die Regierung verantwortlich"
 bol_soviet_engineers:0 "Sowjetische Ingenieure"
 bol_soviet_engineers_desc:0 "Mit Hilfe unserer sowjetischen Genossen können sich unsere Fabriken auf eine Weise entwickeln, wie sie es noch nie zuvor getan haben"
