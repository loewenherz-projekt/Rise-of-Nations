l_german:

 SAU_birthplace_of_islam:0 "Geburtsort des Islam"
 SAU_birthplace_of_islam_desc:0 ""
 
 SAU_desert_nomads:0 "Wüstennomaden"
 SAU_desert_nomads_desc:0 ""
 SAU_jewish_uprising:0 "Jüdischer Aufstand"
 
 SAU_aviation_reform:0 "Luftfahrtreform"
 SAU_aviation_reform_desc:0 "Nirgendwo schreitet der technologische Fortschritt schneller voran als in der Luftkriegsführung. Die Luftfahrt ist ein Gebiet, das jede moderne Nation beherrschen muss."
 SAU_arabian_spring:0 "Arabischer Frühling"
 SAU_arabian_spring_desc:0 "Es ist Zeit, die Ketten der Autokratie zu sprengen! Lassen Sie unser Land ein Beispiel für Wachstum und Fortschritt sein!"
 SAU_stay_neutral:0 "Neutrale Politik"
 SAU_stay_neutral_desc:0 "Während andere behaupten, dass es Mut und Weisheit erfordert, in einem globalen Konflikt Partei zu ergreifen, wissen wir, dass es mehr erfordert, sich zu weigern."
 SAU_restore_the_caliphate:0 "Das Kalifat wiederherstellen"
 SAU_restore_the_caliphate_desc:0 "Nach dem Zusammenbruch des Umayyaden-Kalifats im 11. Jahrhundert ist es nun an der Zeit, es wiederherzustellen."
 SAU_awoken_generation:0 "Erwachte Generation"
 SAU_awoken_generation_desc:0 "Wer das Militär als notwendiges Übel betrachtet, wird angesichts des Krieges zwangsläufig zögern. Wir werden den Militarismus in unsere Kultur einprägen, um Söhne Allahs zu werden."
 SAU_ask_british_colonies:0 "Fragen Sie die britischen Kolonien"
 SAU_ask_british_colonies_desc:0 "Die gesamte arabische Halbinsel gehört rechtmäßig uns, aber es besteht kein Grund zur Gewalt, wenn wir in dieser Angelegenheit eine friedliche diplomatische Lösung finden könnten."
 SAU_war_with_yemen_and_oman_desc:0 "Was für ein Kalifat schaffen wir, wenn wir Oman und Jemen nicht einbeziehen? Sie sind ein leichtes Ziel …"
 SAU_war_with_yemen_and_oman:0 "Krieg mit Jemen und Oman"
 SAU_umajid_pact:0 "Erstellen Sie unsere Fraktion"
 SAU_umajid_pact_desc:0 "Die islamischen Nationen des Nahen Ostens haben noch kein eigenes Bündnis. Es ist Zeit, das zu ändern."
 SAU_spread_islam:0 "Verbreite den Islam"
 SAU_spread_islam_desc:0 "Nationen wie die Türkei und der Iran haben ketzerische Überzeugungen. Wenn wir ein Bündnis mit ihnen eingehen wollen, müssen wir an dieselben Dinge glauben."
 SAU_establish_labor_camps:0 "Errichtung von Sklavenlagern"
 SAU_establish_labor_camps_desc:0 "Sklaven waren schon immer eine wichtige Arbeitskraft. Die Menschen im Oman und Jemen sind für diese Art von Arbeit am besten geeignet."
 SAU_liberty_ethos:0 "Freiheitsethos"
 SAU_liberty_ethos_desc:0 "Anstatt den Ideologien westlicher Autokratie zu folgen, sollten wir uns auf Handel und Demokratie konzentrieren."
 SAU_deterrence:0 "Abschreckung"
 SAU_deterrence_desc:0 "Alleine betrachtet, profitieren wir selten vom Krieg. Glücklicherweise wissen wir, dass die beste Verteidigung eine ist, die so bekannt ist, dass man sie nie anwenden muss."
 SAU_additional_research_slot_ii:0 "Zusätzlicher Forschungsplatz II"
 SAU_additional_research_slot_ii_desc:0 "Die schnelle Expansion und Industrialisierung hat neue Möglichkeiten in Forschung und Entwicklung eröffnet, die wir nutzen sollten"
 SAU_annex_isreal:0 "Annex Israel"
 SAU_annex_isreal_desc:0 "Wenn Israel schwach und neu ist, sollten wir dies als unsere Chance nutzen und all unser diplomatisches Geschick einsetzen, um es zu annektieren."
 SAU_annex_jordan:0 "Anhang Jordanien"
 SAU_annex_jordan_desc:0 "Die Annexion Jordaniens würde neue Möglichkeiten für eine weitere Expansion ins Mittelmeer eröffnen."
 SAU_propaganda_machine:0 "Propagandamaschine"
 SAU_propaganda_machine_desc:0 "Die Engländer haben den Imperialismus und die faschistischen Elemente erfolgreich ausgemerzt, und dennoch existieren sie immer noch und besetzen den größten Teil der Erde. Wir können Kontakt zu Dissidenten in Großbritannien aufnehmen und England auf den Weg der Reform bringen."
 SAU_attack_turkey:0 "Angriff auf die Türkei"
 SAU_attack_turkey_desc:0 "Nach dem großen Krieg hat das einst mächtige Osmanische Reich schwer gelitten und ist nun schwach. Wir können dies als Chance nutzen, um anzugreifen und die türkischen Länder mit dem mächtigen Kalifat wieder zu vereinen."
 SAU_attack_iran:0 "Angriff auf den Iran"
 SAU_attack_iran_desc:0 "In Chuzestan lebt eine kleine arabische Gemeinde. Diese gehört derzeit dem Iran. Wir können dies als Ziel für einen Angriff auf sie nutzen."
 SAU_invite_turkey:0 "Laden Sie die Türkei ein"
 SAU_invite_turkey_desc:0 "Das Osmanische Reich hat einen großen Krieg geführt und ist gescheitert. Wir müssen uns gegenseitig unterstützen und kooperieren, statt uns gegenseitig an die Gurgel zu gehen. Wenn sie unser Bündnis ablehnen, ist das eine andere Sache."
 SAU_invite_iran:0 "Laden Sie den Iran ein"
 SAU_invite_iran_desc:0 "Das persische Land ist reich an Kultur und Geschichte. Wir geben ihm die Möglichkeit, unserem neuen Pakt friedlich beizutreten."
 SAU_spread_islam_force:0 "Verbreitung des Islam mit Gewalt"
 SAU_spread_islam_force_desc:0 "Diplomatie ist Sache von Gentlemen. Wir werden den Islam mit unserem mächtigen Militär verbreiten. Doch zunächst müssen wir uns vorbereiten."
 SAU_spread_islam:0 "Verbreite den Islam"
 SAU_spread_islam_desc:0 "Unsere Nabers – Persien und die Türkei – haben sich von den wahren Lehren des Islams entfernt. Wir müssen dies durch Diplomatie versuchen, wenn wir ein Bündnis mit ihnen eingehen wollen."
 SAU_planned_expansion:0 "Geplante Erweiterung"
 SAU_planned_expansion_desc:0 "Um mithalten zu können, müssen wir expandieren! Überall! Immer! Aber planmäßig und geordnet."
 SAU_old_traditions:0 "Alte Traditionen wiederherstellen"
 SAU_old_traditions_desc:0 "In dieser Zeit des schnellen Wandels ist es am besten, auf die alten Routen zurückzukehren."
 SAU_modern_army:0 "Moderne Armee"
 SAU_modern_army_desc:0 "Dies ist der letzte Schritt zur Reorganisation unserer Armee. Unsere Armeen könnten es sogar mit Mohammed dem Großen selbst aufnehmen."
 SAU_special_forces:0 "Spezialeinheiten"
 SAU_special_forces_desc:0 "Andere Nationen entwickeln Eliteeinheiten wie Marines und Fallschirmjäger. Wir könnten das Gleiche tun. Sie könnten die perfekte Lösung für einige unserer Offensivprobleme sein."
 SAU_support:0 "Unterstützungsausrüstung"
 SAU_support_desc:0 "Während unser Militär schnell wächst, müssen wir sicherstellen, dass die Qualität damit Schritt halten kann."
 SAU_tanks:0 "Laden Sie US-Experten ein"
 SAU_tanks_desc:0 "Wir hatten nicht viel Zeit, unsere eigenen Panzer zu entwickeln. Wir sollten Ingenieure einladen, mit ausländischen Panzern zu arbeiten, um deren Stärken und Schwächen herauszufinden und noch bessere Panzer zu entwickeln."
 SAU_army_equipment:0 "Armeeausrüstung"
 SAU_army_equipment_desc:0 "Seit der Gründung unserer Gießerei sind wir auf ausländische Ausrüstung angewiesen. Wenn wir unsere eigene Ausrüstung herstellen, können wir Fortschritte erzielen."
 SAU_artillery:0 "Artillerie-Fokus"
 SAU_artillery_desc:0 "Wenn wir bessere Möglichkeiten zur Verbesserung unserer Artillerie finden, können wir unsere Truppen im Kampf effektiver unterstützen."
 SAU_army_motorisation:0 "Armeemotorisierung"
 SAU_army_motorisation_desc:0 "Motorisierte Divisionen sind heutzutage ein wichtiger Bestandteil jeder Armee. Es ist wichtig, mit der Zeit Schritt zu halten."
 SAU_army_reform:0 "Armeereform"
 SAU_army_reform_desc:0 "Die Offiziere in unserem Land verfügen über wenig praktisches und theoretisches Wissen. Wir müssen die Führung unserer Truppen reformieren. Die Modernisierung der Armee wartet auf niemanden."
 SAU_aviation_reform_desc:0 "Unser Wissen über die Luftfahrt ist eher rudimentär und wir haben keinerlei Kampferfahrung. Das müssen wir ändern."
 SAU_air_bases:0 "Neue Flugplätze"
 SAU_air_bases_desc:0 "Ohne Flugplätze können keine Flugzeuge landen. Wir müssen neue bauen, um die Flexibilität unserer Luftflotte zu gewährleisten."
 SAU_fighter_planes:0 "Entwicklung von Kampfflugzeugen"
 SAU_fighter_planes_desc:0 "Kampfflugzeuge sind der wichtigste Bestandteil jeder Luftflotte. Ohne sie sind wir anfällig für die Beherrschung des Himmels durch Feinde."
 SAU_bombers:0 "Entwicklung von Bomberflugzeugen"
 SAU_bombers_desc:0 "Bomberflugzeuge können uns einen echten Vorteil im Kampf verschaffen, indem sie feindliche Städte beschädigen oder ihre Truppen angreifen."
 SAU_cas:0 "CAS-Entwicklung"
 SAU_cas_desc:0 "Flugzeuge zur Luftnahunterstützung sind die Zukunft der Luftkriegsführung, da sie unsere Landtruppen direkt unterstützen."
 SAU_modern_aviation:0 "Moderne Luftfahrt"
 SAU_modern_aviation_desc:0 "Wir müssen in moderne Luftfahrtdoktrinen investieren, um sicherzustellen, dass unsere Luftstreitkräfte jeder Herausforderung gewachsen sind."
 SAU_fleet_reform:0 "Flottenreform"
 SAU_fleet_reform_desc:0 "Unsere Flotte ist alt und verfügt über keinerlei praktische oder theoretische Erfahrung. Wir müssen sie ändern."
 SAU_navy_bases:0 "Zusätzliche Werften"
 SAU_navy_bases_desc:0 "Durch die neue Werft wird unsere Marine flexibler und wir können schneller neue Schiffe bauen."
 SAU_submarines:0 "U-Boot-Einsatz"
 SAU_submarines_desc:0 "U-Boote sind lautlose Jäger. Viele Länder nutzen sie bereits als wichtigen Teil ihrer Flotten. Wir können ihnen nicht hinterherhinken."
 SAU_cruisers:0 "Anstrengung der Kreuzer"
 SAU_cruisers_desc:0 "Wir müssen in eine stationäre Flotte investieren, um die Sicherheit unserer Meere zu gewährleisten."
 SAU_destroyers:0 "Entwicklung von Zerstörern"
 SAU_destroyers_desc:0 "Zerstörer sind U-Boot-Jäger. Wir könnten in Zukunft welche brauchen."
 SAU_capital_ship:0 "Entwicklung von Großkampfschiffen"
 SAU_capital_ship_desc:0 "Die Entwicklung riesiger Großkampfschiffe wird unserer Flotte noch mehr Schlagkraft verleihen."
 SAU_naval_air:0 "Bemühungen der Marinefliegerei"
 SAU_naval_air_desc:0 "Flugzeuge, die Schiffe und Marinestützpunkte angreifen können, könnten in Zukunft sehr nützlich sein."
 SAU_carriers:0 "Entwicklung von Trägern"
 SAU_carriers_desc:0 "Diese riesigen Schiffe können Flugzeuge transportieren, was sie für Angriffe auf weit entfernte Küsten äußerst nützlich macht."
 SAU_modern_fleet:0 "Moderne Flotte"
 SAU_modern_fleet_desc:0 "Es ist Zeit, unsere Flotte wirklich zu modernisieren."

 SAU_arab_industrial_revolution:0 "Arabische Industrielle Revolution"
 SAU_arab_industrial_revolution_desc:0 "Unser technisches Wissen ist sehr grundlegend. Die Zeiten haben sich geändert und jetzt ist es an der Zeit, eigene, massive Industriezweige aufzubauen."
 SAU_modernisation_of_rural_roads:0 "Modernisierung von Landstraßen"
 SAU_modernisation_of_rural_roads_desc:0 "Unser Straßen- und Eisenbahnnetz besteht aus einigen unverbundenen, kleinen Linien. Es ist äußerst wichtig, sie in moderne Systeme umzuwandeln, um die Bewegungsfreiheit und Versorgung unserer Armeen zu verbessern."
 SAU_expand_rural_roads:0 "Landstraßen erweitern"
 SAU_expand_rural_roads_desc:0 "Durch den weiteren Ausbau unserer Straßen können wir mit dem Rest der Welt Schritt halten und unsere Ressourcen einfacher transportieren."
 SAU_additional_research_slot:0 "Zusätzlicher Forschungsplatz"
 SAU_additional_research_slot_desc:0 "Unsere industrielle Expansion und das verbesserte Wissen unserer Wissenschaftler könnten es uns ermöglichen, parallel mehr Forschung und Entwicklung durchzuführen."
 SAU_industrialize_desert:0 "Wüste industrialisieren"
 SAU_industrialize_desert_desc:0 "Wüsten bedecken den größten Teil unseres Landes, sind aber noch immer sehr dünn besiedelt. Die Schaffung neuer Siedlungen wird dort eine Herausforderung sein, aber wir werden durch den Bau weiterer Fabriken neuen Lebensraum für unsere Bevölkerung schaffen."
 SAU_us_oil_agreement:0 "US-Ölabkommen"
 SAU_us_oil_agreement_desc:0 "Wir müssen unsere Völker vereinen und uns eine bessere Zukunft aufbauen. Dies können wir durch die Zusammenarbeit mit den Vereinigten Staaten erreichen."
 SAU_build_barracks:0 "Kasernen bauen"
 SAU_build_barracks_desc:0 "Wir müssen die Initiative zur Verstärkung unter allen entscheidenden Menschen unseres Landes verbreiten und mit ihrer Unterstützung neue Militärkasernen bauen."
 SAU_center_of_the_world:0 "Mittelpunkt der Welt"
 SAU_center_of_the_world_desc:0 ""
 SAU_military_stockpile:0 "Militärische Vorräte"
 SAU_military_stockpile_desc:0 "Wir sollten militärische Vorräte anlegen, damit wir, wenn Teile unseres Landes an den Feind fallen, immer noch über eine große Menge an Ausrüstung verfügen, um unsere Armee zu versorgen."
 SAU_change_law:0 "Teilmobilisierung"
 SAU_change_law_desc:0 "Die Gesetze unseres Landes sind veraltet und unsere Industrie leidet darunter. Eine Gesetzesänderung würde es uns ermöglichen, unsere Industrie schneller zu entwickeln. "
 SAU_1938_oil_discovery:0 "1938 Ölfund"
 SAU_1938_oil_discovery_desc:0 "Die Entdeckung von Öl ist ein gewaltiger Vorteil gegenüber unseren Rivalen und verschafft uns eine überragende Rolle bei einigen außenpolitischen Entscheidungen."
 SAU_electronics:0 "Elektronik"
 SAU_electronics_desc:0 "Unser Ziel, den Anschluss an die westlichen Nationen zu finden, können wir nur erreichen, wenn wir unsere Anstrengungen auf die Informations- und Elektronikbranche konzentrieren."
 SAU_nuclear_effort:0 "Atombomben"
 SAU_nuclear_effort_desc:0 "Wir dürfen die Chance nicht verpassen, einen Weg zu finden, das Urfeuer der Kernspaltung zu nutzen."
 SAU_rocketry:0 "Raketentechnik"
 SAU_rocketry_desc:0 "Die Raketenwissenschaft birgt viele Gefahren. Durch die Schaffung sicherer Orte für Experimente haben unsere Raketenwissenschaftler Platz, um Experimente durchzuführen."
 SAU_telecommunication_centers:0 "Telekommunikationszentren"
 SAU_telecommunication_centers_desc:0 "Was früher Wochen dauerte, kann heute in Sekundenschnelle versendet werden. Das müssen wir ausnutzen."
 SAU_aramco_government_schools:0 "Aramco-Regierungsschulen"
 SAU_aramco_government_schools_desc:0 "Unsere Bevölkerung möchte lernen. Wir möchten, dass sie eine Ausbildung erhält. Die Gründung neuer Universitäten, an denen unsere Muttersprache als Unterrichtssprache verwendet wird, wird alle glücklich machen."
 SAU_search_for_steel:0 "Suche nach Stahl"
 SAU_search_for_steel_desc:0 "In dieser riesigen Wüste müssen wir etwas finden."
 SAU_civilize_rub_al_khali:0 "Civilize Rub Al Khali"
 SAU_civilize_rub_al_khali_desc:0 "Der Großteil unserer Industrie und Bevölkerung konzentriert sich an den Küsten, doch nach den jüngsten Ölfunden in den zentralen Teilen unseres Landes können wir neue Fabriken eröffnen und mehr Arbeitsplätze und Wohnraum für neue Menschen schaffen."
 SAU_industrialize_capital:0 "Kapital industrialisieren"
 SAU_industrialize_capital_desc:0 "In unseren Gebieten gibt es noch immer viele Nomaden und Stämme. Indem wir diese Menschen in die Städte einladen, können wir eine schnelle Entwicklung der Industrie in unseren größten Metropolen vorantreiben."

