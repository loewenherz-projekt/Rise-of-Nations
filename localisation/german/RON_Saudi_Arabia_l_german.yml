 SAU_light_tank_equipment_1:0 "Vickers Carden Loyd Modell von 1933"
 SAU_light_tank_equipment_1_short:0 "M1933"
 SAU_light_tank_equipment_1_desc:0 "Die Carden Loyd-Tanketten waren eine Serie britischer Tanketten aus der Zeit vor dem Zweiten Weltkrieg. Sie wurden weltweit zu einem klassischen Tankettendesign, wurden von mehreren Ländern in Lizenz gebaut und dienten als Grundlage für mehrere Designs, die in mehreren verschiedenen Ländern produziert wurden."
 SAU_light_tank_equipment_2:0 "Vickers Carden Loyd Modell von 1936"
 SAU_light_tank_equipment_2_short:0 "M18935"
 SAU_light_tank_equipment_2_desc:0 "Eine Verbesserung gegenüber dem früheren Vickers Carden Loyd Modell von 1936: Dem bestehenden 0,303 wurde ein 0,5-Zoll-Vickers-Maschinengewehr hinzugefügt. Dies verlieh dem Panzer eine angemessene Panzerabwehrfähigkeit gegen andere leichte Panzer. Zusätzlich wurde eine Drei-Mann-Besatzung eingeführt. Die größere Besatzung trug wesentlich zur Effektivität des Panzers bei und verteilte den Wartungsaufwand."
