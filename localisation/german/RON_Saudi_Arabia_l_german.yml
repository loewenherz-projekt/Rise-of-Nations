### Events

arabia.1.t:0 "Araber fragen unsere Kolonien"
 arabia.1.d:0 "Heute überbrachte uns der saudi-arabische Diplomat Ahmut al Pascha einen Vorschlag seines Königs. Er schlägt vor, unsere Kolonien auf der Arabischen Halbinsel unter seine Kontrolle zu bringen. Nach den jüngsten Ölfunden in dieser Region würde ein Nein bedeuten, dass wir kein Öl mehr von ihnen erhalten. Was sollen wir tun?"
 arabia.1.a:0 "Vorschlag annehmen"
 arabia.1.b:0 "Wie können sie es wagen!"
 arabia.2.t:0 "Die Briten haben unseren Forderungen nachgegeben"
 arabia.2.d:0 "Nach freundlichen Verhandlungen hat Großbritannien beschlossen, uns seine Kolonien auf der Arabischen Halbinsel im Gegenzug für das Recht auf den Export und die Förderung von Öl in unserer Region abzutreten."
 arabia.2.a:0 "Der Islam wird wieder auferstehen!"
 arabia.3.t:0 "Großbritannien lehnt unsere Forderungen ab"
 arabia.3.d:0 "Die Briten haben unsere Forderungen abgelehnt und lassen uns keine andere Wahl, als den Ölhandel mit ihnen zu beenden und das Land mit Gewalt einzunehmen."
 arabia.3.a:0 "Wir nehmen uns, was uns gehört!"
 arabia.4.t:0 "Kommerzielle Mengen Öl entdeckt"
 arabia.4.d:0 "Nach fünf Jahren erfolgloser Bohrungen stieß man am 3. März 1938 endlich auf Öl in Bohrloch Nr. 7. Dieser Fund sollte der erste von vielen sein und die größte Erdölquelle der Welt enthüllen. Diese Entdeckung sollte die politischen Beziehungen im Nahen Osten für immer verändern."
 arabia.4.a:0 "Interessant"
 arabia.4.b:0 "Es ist schwarzes Gold!"
 arabia.5.t:0 "Vereint euch mit dem Jemen und dem Oman"
 arabia.5.d:0 "Da wir unser Volk befreit und die rechtmäßige Kontrolle über unsere historischen Gebiete erlangt haben, könnten viele arabische Minderheiten oder in manchen Gebieten sogar Mehrheitsbevölkerungen besser eingesetzt werden. Indem wir loyalen Islamisten die Möglichkeit geben, in ihren Institutionen Platz zu nehmen, können wir die Staaten Oman und Jemen zu Kernstaaten machen, sollten wir das tun?"
 arabia.5.a:0 "Wir müssen es tun"
 arabia.5.b:0 "Zu viel Aufwand, nichts tun"
 arabia.6.t:0 "Einladung aus Arabien"
 arabia.6.d:0 "Heute hat uns der arabische Kalifat-Diplomat Mehmet al Pasha einen Vorschlag unterbreitet. Er schlägt vor, ein Verteidigungsbündnis zwischen unseren islamischen Ländern zu bilden."
 arabia.6.a:0 "Wir akzeptieren!"
 arabia.6.b:0 "Wir werden allein stehen!"
 arabia.7.t:0 "[PER.GetNameDef] tritt unserem Pakt bei"
 arabia.7.d:0 "Es ist klug, in diesen unvorhersehbaren Zeiten Verbündete zu suchen. Wir, die Söhne Mohammeds, müssen zusammenhalten und die islamischen Lehren auf der ganzen Welt verbreiten."
 arabia.7.a:0 "Willkommen!"
 arabia.8.t:0 "[PER.GetNameDef] hat unseren Pakt abgelehnt"
 arabia.8.d:0 "Der Iran lehnte unseren Pakt ab"
 arabia.8.a:0 "Narren"
 arabia.9.t:0 "Ölkonzessionsvertrag unterzeichnet"
 arabia.9.d:0 "Heute, nach der Vergabe der Ölkonzessionsvereinbarung zwischen Saudi-Arabien und der Standard Oil Company, gingen zwei amerikanische Geologen im kleinen Hafen von Jubail an Land. Sie waren gekommen, um die Ölsuche auf der Arabischen Halbinsel zu eröffnen. Sie würden alte Ölbohrungen wieder öffnen und vielen unserer Leute Arbeit geben."
 arabia.9.a:0 "Von dieser Vereinbarung profitieren wir beide"
 arabia.10.t:0 "Vereinen Sie sich mit ehemaligen britischen Kolonien"
 arabia.10.d:0 "Da wir unser Volk befreit und die rechtmäßige Kontrolle über unsere historischen Gebiete erlangt haben, könnten viele arabische Minderheiten oder in manchen Gebieten sogar Mehrheitsbevölkerungen besser eingesetzt werden. Indem wir loyalen Islamisten die Möglichkeit geben, in ihren Institutionen Platz zu nehmen, können wir die ehemaligen britischen Staaten zu Kernstaaten machen, oder?"
 arabia.10.a:0 "Wir müssen es tun"
 arabia.10.b:0 "Zu viel Aufwand, nichts tun"
 arabia.11.t:0 "Arabien lädt uns ein"
 arabia.11.d:0 "Heute hat uns der arabische Kalifat-Diplomat Mehmet al Pasha einen Vorschlag unterbreitet. Er schlägt vor, ein Verteidigungsbündnis zwischen unseren islamischen Ländern zu bilden."
 arabia.11.a:0 "Wir akzeptieren!"
 arabia.11.b:0 "Wir werden allein stehen!"
 arabia.12.t:0 "[TUR.GetNameDef] tritt unserem Pakt bei"
 arabia.12.d:0 "Nach Erhalt unseres Vorschlags hat die Türkei unsere Einladung angenommen"
 arabia.12.a:0 "Willkommen, Brüder!"
 arabia.13.t:0 "[TUR.GetNameDef] hat unseren Pakt abgelehnt"
 arabia.13.d:0 "Die Türkei hat unseren Pakt abgelehnt"
 arabia.13.a:0 "Narren"
 arabia.14.t:0 "Der Fall von Kairo"
 arabia.14.d:0 "Truppen der arabischen Streitkräfte haben sich ihren Weg nach Kairo, der Hauptstadt Ägyptens, erkämpft. \n\nWährend sich die alliierten Streitkräfte ungeordnet weiter in die Wüste zurückzogen, wurden die durch Kairo marschierenden saudi-arabischen Soldaten von vielen Bürgern, die die Briten inzwischen als Unterdrücker betrachteten, als Befreier gefeiert.\n\nDer Fall Kairos stellt einen erheblichen Verlust für die Kriegsanstrengungen der Alliierten dar, und mehrere Experten spekulieren, dass nun ganz Afrika der arabischen Eroberung schutzlos ausgeliefert sei."
 arabia.14.a:0 "Wir sind nicht aufzuhalten!"
 arabia.15.t:0 "Der Fall Ankaras"
 arabia.15.d:0 "Heute früh besetzten die Streitkräfte des arabischen Kalifats erfolgreich die Stadt Ankara, ein wichtiges strategisches Ziel in ihrem Krieg gegen die Türkei. \n\nDie im Zentrum Kleinasiens gelegene Stadt ist der Schlüssel zur arabischen Route nach Europa.\n\nIhre Einnahme ermöglicht es Arabien, den Krieg weiter in den Mittelmeerraum auszudehnen."
 arabia.15.a:0 "Der Sieg gehört uns!"
 arabia.16.t:0 "Der Fall Bagdads"
 arabia.16.d:0 "Nach mehreren widersprüchlichen Berichten wurde nun bestätigt, dass Bagdad an die Araber gefallen ist. \n\nDiese strategisch wichtige Stadt bewacht den Zugang zur Seidenstraße und zwei wichtige Flüsse und galt vor Kriegsbeginn als uneinnehmbar. Die irakische Garnison zog sich in die Tunnel unter der Stadt zurück, wurde jedoch schließlich durch Flammenwerfer und Granaten vertrieben. \n\nMit der arabischen Besetzung Bagdads kam es zu einer dramatischen Machtverschiebung im Nahen Osten."
 arabia.16.a:0 "Der Sieg gehört uns!"
 
