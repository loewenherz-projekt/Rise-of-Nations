 CHI_JAP_diplomacy_to_appease_the_japanese_EXPL:0 "   Setzen Sie §HPolitische Macht§! ein, um feindliche Aktionen von [JAP.GetFlag]§H[JAP.GetName]§! gegen uns zu verzögern.\n"
 CHI_JAP_diplomacy_to_appease_the_japanese_desc:0 "Unser Staat braucht Zeit, um sich auf den bewaffneten Konflikt mit den Japanern vorzubereiten. Deshalb müssen wir ihnen – zumindest vorerst – Zugeständnisse machen, bis wir uns erfolgreich gegen ihre Aggression behaupten können."
