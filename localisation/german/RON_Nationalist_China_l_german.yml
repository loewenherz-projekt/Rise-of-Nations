 kmt.29.d_1:0 "Unser ehemaliger Fraktionsführer hat aufgrund geheimer Dokumente beschlossen, uns aus seiner Fraktion auszuschließen. Es scheint, als sei es unseren Feinden gelungen, uns zu isolieren."
