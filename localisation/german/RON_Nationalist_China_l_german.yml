 CHI_JAP_knowledge_from_the_second_sino_japanese_war_desc:0 "Der Zweite Japanisch-Chinesische Krieg endete für uns mit einer Katastrophe. Unsere Armee konnte ihre Stellung nicht halten, und wir ließen die Japaner in unser Gebiet vordringen. Glücklicherweise konnten wir diesen Konflikt zumindest durch einen vorübergehenden Frieden beenden. In dieser Zeit müssen wir aus unseren Fehlern lernen und unsere Streitkräfte auf die erneute Konfrontation mit den Japanern vorbereiten."      ASD
