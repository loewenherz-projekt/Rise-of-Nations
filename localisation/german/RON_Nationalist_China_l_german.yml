 CHI_work_with_the_warlords_cat:0 "Arbeite mit den Kriegsherren"
 CHI_work_with_the_warlords_cat_desc:0 "China ist zwar ein riesiges Land, in Wirklichkeit jedoch gespalten. Kriegsherren, Banditen und Kommunisten verwüsten die alten Länder und stellen eine ernsthafte Bedrohung für unsere junge Nation dar. Um mit ausländischen Mächten konkurrieren zu können, müssen wir vereint sein. Wir müssen die Ära der Kriegsherren beenden."
 
