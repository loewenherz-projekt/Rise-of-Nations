 ## 30/05/2018 ##
 KMT_dcat_integrate_the_communists:0 "Integration der Kommunisten"
 KMT_dcat_integrate_the_communists_desc:0 "Obwohl die Kommunisten [Root.GetRulingParty] die Treue geschworen haben, wird ihnen im Gegenzug ein hohes Maß an Autonomie zugestanden. Viele hochrangige Beamte betrachten die kommunistische Regierung jedoch immer noch als eine Zeitbombe, die entschärft werden muss, bevor sie explodiert."
 KMT_incorporate_communist_generals:0 "Kommunistische Generäle anlocken"
 KMT_incorporate_communist_generals_desc:0 "Wir können den kommunistischen Generälen einen besseren Platz in unserem Militär anbieten und sie auf unsere Seite locken. Dies wird die Roten sicherlich schwächen."
 KMT_incorporate_communist_talents:0 "Kommunistische Administratoren unter Kontrolle bringen"
 KMT_incorporate_communist_talents_desc:0 "Wir können einigen kommunistischen Politikern oder Verwaltungsbeamten in der Region einen angemessenen Platz in unserer Regierung anbieten. Dies wird ihre Koordination und Fähigkeit, einen Aufstand zu organisieren, schwächen."
 KMT_replace_local_officials:0 "Ersetzen Sie lokale Beamte"
 KMT_replace_local_officials_desc:0 "Jetzt, da alles vorbereitet ist, können wir die örtlichen Beamten durch unsere Männer ersetzen und die unverdiente Autonomie der Kommunisten beenden, die wir ihnen fälschlicherweise zugestanden haben."
Leave_China:0"Verlassen Sie das Festland."
Leave_China_desc_:0"Die Schlacht mag verloren sein, aber der Krieg hat gerade erst begonnen"
