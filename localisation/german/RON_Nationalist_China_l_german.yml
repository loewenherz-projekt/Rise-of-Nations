 KMT_break_alliance_tt_delayed:0 "§H Wenn das Ziel der Anführer der Allianz ist, ziehst du dich aus ihr zurück.\nWenn das Ziel ein Mitglied deiner Allianz ist, wirfst du es raus.\n§RDie oben genannten Aktionen ziehen eine negative Meinung über das Ziel nach sich§!\n\nWenn das Ziel du selbst bist, löst du deine Allianz auf.\n§RDie Auflösung deiner Allianz zieht eine negative Meinung über alle vorherigen Mitglieder nach sich§!§!\n\nWirkung:\n[!KMT_break_alliance_with_target_click]"
