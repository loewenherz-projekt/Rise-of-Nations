 ## 8/7/2016 ##
 kmt.62.t:0 "Französisch-chinesisches Abkommen"
 kmt.62.d:0 "Nach dem Krieg nehmen chinesische Beamte Kontakt mit uns auf, um über die Herrschaft von Guangzhouwan zu diskutieren."
 kmt.62.a:0 "Sie haben im Krieg so viel geopfert, betrachten Sie dies als Entschädigung."
 kmt.62.b:0 "La France ist der Eigentümer!"
 kmt.63.t:0 "Frankreich weigerte sich, Guangzhouwan zurückzugeben"
 kmt.63.d:0 "Die Franzosen bestanden darauf, dass Guangzhouwan eine französische Konzession bleiben werde."
 kmt.63.a:0 "Verdammte Schweine!"
 kmt.64.t:0 "Niederlage akzeptieren?"
 kmt.64.d:0 "Unser gesamter Besitz in Indochina ist gefährdet. Einige Generäle und Beamte haben vorgeschlagen, unsere Verluste hier zu begrenzen und Frieden mit den Chinesen anzustreben."
 kmt.64.a:0 "Wir haben keine Möglichkeit, mehr zu tun ..."
 kmt.64.b:0 "France se battra jusqu&#39;au dernier!"
 kmt.65.t:0 "[From.GetName] Biete Frieden an"
 kmt.65.d:0 "Um weitere Opfer zu verhindern, haben uns die [From.GetAdjective]-Beamten ein Friedensangebot unterbreitet, bei dem sie alle ihre Besitztümer in Indochina aufgeben."
 kmt.65.a:0 "Bußgeld"
 kmt.65.b:0 "Ihre Nation muss besiegt werden!"
 kmt.66.t:0 "Angebot abgelehnt"
 kmt.66.d:0 "Die Chinesen haben unser Friedensangebot abgelehnt, jetzt müssen wir bis zum Ende kämpfen."
 kmt.66.a:0 "Wilde!"
 kmt.67.t:0 "Gemeinsame chinesisch-britische Erklärung"
 kmt.67.d:0 "Unsere Herrschaft in Hongkong ist zu Ende, jetzt müssen wir Hongkong an die Chinesen zurückgeben."
 kmt.67.a:0 "Ein Deal ist ein Deal."
 kmt.67.b:0 "Hongkong soll im Imperium bleiben!"
 kmt.68.t:0 "Die Briten brechen ihr Versprechen"
 kmt.68.d:0 "Die Briten weigerten sich, Hongkong nach ihrer 99-jährigen Herrschaft gemäß dem Vertrag von Nanking zurückzugeben. Diese Demütigung wird nicht unbemerkt bleiben!"
 kmt.68.a:0 "Verdammte Schweine!"
 kmt.69.t:0 "Die Rückkehr von Macau?"
 kmt.69.d:0 "Obwohl wir Macau 1974 als „chinesisches Territorium unter (vorübergehender) portugiesischer Verwaltung“ neu definiert haben und die Chinesen es bald übernehmen werden, behaupten einige unserer Beamten, dass Macau auf jeden Fall portugiesisches Territorium bleiben sollte."
 kmt.69.a:0 "Diese Beamten sind verrückt."
 kmt.69.b:0 "Portugal stark! Macau soll rechtmäßig portugiesisches Land werden!"
 kmt.70.t:0 "Portugal weigerte sich, Macau zurückzugeben"
 kmt.70.d:0 "Die portugiesische Regierung weigerte sich, Macau zurückzugeben!"
 kmt.70.a:0 "Wir werden ihnen die Konsequenzen aufzeigen."
 kmt.71.t:0 "Guangzhouwan kehrte zurück"
 kmt.71.d:0 "Guangzhouwan ist nun zu seinem rechtmäßigen Herrscher zurückgekehrt!"
 kmt.71.a:0 "Juhu!"
 kmt.72.t:0 "Hongkong kehrte zurück"
 kmt.72.d:0 "Hongkong ist nun zu seinem rechtmäßigen Herrscher zurückgekehrt!"
 kmt.72.a:0 "Juhu!"
 kmt.73.t:0 "Macau kehrte zurück"
 kmt.73.d:0 "„Macau“ ist nun zu seinem rechtmäßigen Herrscher zurückgekehrt!"
 kmt.73.a:0 "Juhu!"
 ### 9/7/2016 ###
 kmt.74.t:0 "[CHI.GetName] fordert Unterwerfung"
 kmt.74.d:0 "[CHI.GetName] hat allen Kriegsherren ein Ultimatum mit der Aufforderung zur sofortigen Unterwerfung geschickt. [Root.GetLeader] hat seit Erhalt des Ultimatums stundenlang eine nichtöffentliche Sitzung mit all seinen vertrauenswürdigen Offizieren abgehalten.\n\nWas wäre das Ergebnis dieser Sitzung?"
 kmt.74.a:0 "„Um Blutvergießen zu vermeiden, werden wir ihre Forderung akzeptieren. Wir werden uns ergeben.“"
 kmt.74.b:0 "„Der Tyrann wird nicht siegen!“"
 kmt.75.t:0 "Ultimatum - Warlord Folds"
 kmt.75.a:0 "Ein Schritt in Richtung Vereinigung!"
 kmt.752.t:0 "Ultimatum - Kriegsherr abgelehnt"
 kmt.752.d:0 "[From.GetLeader] hat sich geweigert, sich zu unterwerfen. Und sie behaupten sogar, dass wir der wahre „Tyrann“ sind!"
 kmt.752.a:0 "Wie können sie es wagen!"
 kmt.76.t:0 "Schicksal von Yen Hsi-shan"
 kmt.76.a:0 "Wir müssen auf den bevorstehenden Krieg vorbereitet sein!"
 kmt.76.b:0 "Er wird ein großartiges Beispiel sein"
 kmt.77.t:0 "Das Schicksal von Li Tsung-jen"
 kmt.77.a:0 "Wir müssen auf den bevorstehenden Krieg vorbereitet sein!"
 kmt.77.b:0 "Er wird ein großartiges Beispiel sein"
 kmt.78.t:0 "Schicksal von Lung Yun"
 kmt.78.a:0 "Wir müssen auf den bevorstehenden Krieg vorbereitet sein!"
 kmt.78.b:0 "Er wird ein großartiges Beispiel sein"
 kmt_lzr_join:0 "Li Tsung-jen wird sich unserer Armee anschließen"
 kmt_yxs_join:0 "Yen Hsi-shan wird sich unserer Armee anschließen"
 kmt_ly_join:0 "Lung Yun wird sich unserer Armee anschließen"
 ## 15/7/2016 ##
 kmt.85.t:0 "[SOV.GetNameDef] hat uns im Stich gelassen!"
 kmt.85.d:0 "Aufgrund der jüngsten Aufforderung von [CHI.GetName], unser Land zu annektieren, hat [SOV.GetLeader] beschlossen, dass wir für das Allgemeinwohl geopfert werden!"
 kmt.85.a:0 "Wir müssen dem Befehl von [SOV.GetLeader] Folge leisten …"
 kmt.85.b:0 "Diese rückwärts laufenden Schweine! Wir werden um unsere Existenz kämpfen!"
 kmt.86.t:0 "Anfrage abgelehnt"
 kmt.86.d:0 "[SOV.GetName] hat unsere Anfrage zur Annexion von [SIK.GetName] abgelehnt."
 kmt.86.a:0 "Wir müssen dem Befehl von [SOV.GetLeader] folgen …"
 kmt.86.b:0 "Dann nehmen wir die Sache selbst in die Hand!"
 kmt.87.t:0 "[SIK.GetName]s Annexion"
 kmt.87.d:0 "Mit der Zustimmung von [SOV.GetLeader] ist [SIK.GetName] jetzt ein unveräußerlicher Teil von [CHI.GetName]!"
 kmt.87.a:0 "Alles Lob [SOV.GetLeader]!"
 kmt.88.t:0 "[SIK.GetName]s Widerstand"
 kmt.88.d:0 "Die Unzufriedenheit unter den [SIK.GetAdjective]-Leuten hat eine Widerstandsbewegung gegen die drohende chinesische Besatzung hervorgebracht. Die Widerstandsbewegung schießt sogar auf chinesische Soldaten, zwischen [CHI.GetName] und [SIK.GetName] ist ein Krieg ausgebrochen!"
 kmt.88.a:0 "Wir müssen den Chinesen helfen!"
 kmt.88.b:0 "Diese undankbaren Schweine!"
 kmt.89.t:0 "[SOV.GetName] schließt sich unserem Krieg an"
 kmt.89.d:0 "[SOV.GetName] hat beschlossen, bei dieser Rebellion der Sinkiang-Barbaren auf unserer Seite zu stehen!"
 kmt.89.a:0 "Gegen unsere vereinte Macht haben sie keine Chance!"
 kmt.90.t:0 "Chinas Einladung"
 kmt.90.d:0 "Nachdem China nun beschlossen hat, sich gegen die Komintern zu stellen, sucht es uns als Verbündeten."
 kmt.90.a:0 "Wir werden gemeinsam gegen die revisionistischen Schweine stehen!"
 kmt.90.b:0 "Wir können uns keinen Krieg mit [SOV.GetName] leisten …"
 kmt.91.t:0 "[SIK.GetName] Akzeptiert"
 kmt.91.d:0 "[SIK.GetName] hat unser Angebot angenommen, unserer Fraktion beizutreten. Sie haben Recht, dem wahren Weg des Marxismus-Leninismus zu folgen!"
 kmt.91.a:0 "Ein weiterer Genosse, der frei von der Korruption des Revisionismus ist!"
 kmt.92.t:0 "[SIK.GetName] Abgelehnt"
 kmt.92.d:0 "[SIK.GetName] hat sich geweigert, unserer Fraktion beizutreten. Wie kommt es, dass wir nicht wissen, dass sie die ganze Zeit auch revisionistische Schweine sind?"
 kmt.92.a:0 "Die Korruption des Revisionismus breitet sich aus …"
 kmt.93.t:0 "Chinesischer Druck"
 kmt.93.d:0 "Die Chinesen üben in letzter Zeit großen Druck auf uns aus. Wir müssen uns zwischen der Demokratie und der Vernichtung unserer Nation entscheiden!"
 kmt.93.a:0 "Wir müssen die Existenz unserer Nation sichern!"
 kmt.93.b:0 "Demokratie ist nur eine andere Form der Tyrannei!"
 kmt.94.t:0 "Sinkiang wandte sich der Demokratie zu"
 kmt.94.d:0 "Durch unseren jüngsten Druck wird Sinkiang endlich bewusst, welch glänzende Zukunft ihnen in einer Demokratie bevorsteht. Und wir werden diejenigen sein, die ihnen dabei helfen."
 kmt.94.a:0 "Potentia democratia!"  #Latin
 kmt.95.t:0 "Sinkiang weigerte sich, demokratisch zu werden"
 kmt.95.d:0 "Obwohl wir großen Druck auf sie ausgeübt haben, ist sich die Regierung Sinkiang immer noch nicht der Vorteile der Demokratie bewusst und hat unser großzügiges Angebot abgelehnt."
 kmt.95.a:0 "Es ist Zeit, es auf die harte Tour zu machen ..."
 kmt.96.t:0 "Ultimatum von Chiang"
 kmt.96.d:0 "Chiang fordert unsere sofortige Unterwerfung. Er droht mit Blutvergießen, wenn wir Widerstand leisten. [SIK.GetLeader] verkündet nach einer stundenlangen, nichtöffentlichen Sitzung mit hochrangigen Beamten, dass die Bevölkerung von Sinkiang geschützt werde vor..."
 kmt.96.a:0 "&#39;Krieg&#39;"
 kmt.96.b:0 "&#39;Tyrannei&#39;"
 kmt.97.t:0 "Sinkiang reicht ein"
 kmt.97.d:0 "Nach Jahrzehnten erlangt China endlich die Kontrolle über Sinkiang zurück!"
 kmt.97.a:0 "China wird größer!"
 kmt.98.t:0 "Ultimatum fällig"
 kmt.98.d:0 "Sinkiang hat sich geweigert, sich zu unterwerfen. Jetzt müssen wir uns mit Gewalt das holen, was uns rechtmäßig zusteht!"
 kmt.98.a:0 "Stirb! Barbarenabschaum!"
 ## 5/8/2016 ##
 kmt.100.t:0 "[From.GetLeader]s Ultimatum"
 kmt.100.a:0 "Frieden ist immer die bessere Option"
 kmt.100.b:0 "Sie sind uns nicht gewachsen!"
 kmt.101.t:0 "Handelshäfen zurückgegeben"
 kmt.101.a:0 "Ein kluger Schachzug"
 kmt.102.t:0 "Ultimatum abgelehnt"
 kmt.102.a:0 "Ihre Arroganz wird ihr Untergang sein!"
 kmt.103.d:0 "Die chinesische Regierung hat uns ein Ultimatum gestellt, Macau zurückzugeben. Sollten wir ihnen kein zufriedenstellendes Ultimatum geben, sind militärische Aktionen zu erwarten."
 kmt.104.t:0 "Macau kehrte zurück"
 kmt.104.d:0 "Macau ist zurückgegeben worden, die Menschen im Westen haben allen Grund, unsere Macht zu fürchten!"
 kmt.105.d:0 "Diese abscheulichen westlichen Barbaren haben sich geweigert, friedlich zu kooperieren! Die Menschen in Macau müssen noch ein wenig warten."
 kmt.106.d:0 "Die chinesische Regierung hat uns ein Ultimatum gestellt, Hongkong zurückzugeben. Sollten wir ihnen kein zufriedenstellendes Ultimatum geben, sind militärische Maßnahmen zu erwarten."
 kmt.107.t:0 "Hongkong kehrte zurück"
 kmt.107.d:0 "Hongkong wurde zurückgegeben, die Menschen im Westen haben allen Grund, unsere Macht zu fürchten!"
 kmt.108.d:0 "Diese abscheulichen westlichen Barbaren haben sich geweigert, friedlich zu kooperieren! Die Menschen in Hongkong müssen noch ein wenig warten."
 kmt.112.d:0 "China hat uns Unterstützung angeboten, wenn wir den Handelshafen, den wir in Macau halten, zurückgeben."
 kmt.113.t:0 "Macau kehrte zurück"
 kmt.113.d:0 "[From.GetName] hat dem Angebot zugestimmt und ein Deal wurde abgeschlossen. Macau ist nun offiziell chinesisches Territorium und sie erhalten die Unterstützung, die wir versprochen haben."
 kmt.115.d:0 "China hat uns Unterstützung angeboten, wenn wir den Handelshafen, den wir in Hongkong halten, zurückgeben."
 kmt.116.t:0 "Hongkong kehrte zurück"
 kmt.116.d:0 "[From.GetName] hat dem Angebot zugestimmt und ein Deal wurde abgeschlossen. Hongkong ist nun offiziell chinesisches Territorium und sie erhalten die Unterstützung, die wir versprochen haben."
 kmt.118.t:0 "Guangzhouwan"
 kmt.118.d:0 "Guangzhouwan steht jetzt unter ausländischer Verwaltung und das darf nicht so weitergehen. Wir müssen versuchen, es zurückzuerobern, aber wie?"
 kmt.118.a:0 "Führen Sie einen Putsch durch und stürzen Sie die lokale Verwaltung."
 kmt.118.b:0 "Wir werden es auf diplomatischem Wege tun."
 kmt.118.c:0 "Wir werden es von diesen dreckigen Barbaren verlangen."
 kmt.118.e:0 "Besetzen Sie das Gebiet mit unseren Truppen."
 kmt.120.t:0 "Putsch in Guangzhouwan"
 kmt.120.d_1:0 "Ein Putsch in Guangzhou führte kürzlich zum Sturz unserer Lokalregierung. Zudem wurde ein Referendum abgehalten, um die Stadt wieder unter chinesische Herrschaft zu stellen. Unsere Geheimdienstinformationen deuten jedoch darauf hin, dass dieser Putsch von der chinesischen Regierung inszeniert wurde.\n\nWie sollten wir reagieren?"
 kmt.120.d_2:0 "Unser Putsch in Guangzhouwan war erfolgreich. Das Referendum nach der Einsetzung der pro-chinesischen Lokalregierung führte zur Rückgabe Guangzhouwans. Wir haben keine Zeit zum Feiern, denn die Barbaren planen bestimmt schon Vergeltungsmaßnahmen."
 kmt.120.a:0 "Wir werden diese lästige Nation sofort zerstören!"
 kmt.120.b:0 "Beschwichtigung wird uns beiden Frieden bringen ..."
 kmt.120.c:0 "Wir müssen wachsam bleiben."
 kmt.121.t:0 "Putsch in Guangzhouwan"
 kmt.121.d_1:0 "Vor kurzem wurde in Guangzhou ein Putsch niedergeschlagen. Obwohl dieser keinen größeren Schaden angerichtet hatte, glauben einige Leute, dass die chinesische Regierung einen Putsch geplant habe, um das Gebiet zurückzuerobern."
 kmt.121.d_2:0 "Unser Putsch in Guangzhou ist kläglich gescheitert. Wir müssen alle Beweise beseitigen, die uns mit dem Putsch in Verbindung bringen könnten und umgekehrt. Wir müssen dies vor der Öffentlichkeit geheim halten."
 kmt.121.a:0 "Wir müssen die Chinesen für diese schmutzige Tat anprangern!"
 kmt.121.b:0 "Wir haben wichtigere Dinge, die unsere Aufmerksamkeit erfordern."
 kmt.121.c:0 "Oh, warum..."
 kmt.122.t:0 "China strebt eine engere Bindung zu uns an"
 kmt.122.d:0 "Da wir nun Eigentümer von Guangzhou sind, möchte China es als Zeichen der Freundschaft nutzen und uns bitten, es zurückzugeben, um eine engere Beziehung zwischen unseren Nationen zu schaffen."
 kmt.122.a:0 "Ein starker Verbündeter ist herzlich willkommen"
 kmt.122.b:0 "Wir brauchen sie nicht! Wir kommen allein klar."
 kmt.123.t:0 "China Nachfrage Guangzhouwan"
 kmt.123.d:0 "China erklärt, dass Guangzhouwan ein notwendiger Lebensraum für das chinesische Volk sei und daher zurückgegeben werden müsse."
 kmt.123.a:0 "Wir können uns keinen Krieg mit ihnen leisten"
 kmt.123.b:0 "Was für ein Mist."
 kmt.124.t:0 "China besetzt Guangzhouwan"
 kmt.124.d:0 "China schickte Truppen nach Guangzhou und besetzte die Stadt kurz darauf. Später erklärte es offiziell, wieder unter chinesische Herrschaft zu kommen. Dieser Aggressionsakt löste im Land heftige Debatten aus."
 kmt.124.a:0 "Trotz der Demütigung müssen wir in diesem Fall zurücktreten"
 kmt.124.b:0 "Dies ist eindeutig eine Invasion! Wir müssen unsere Männer auf den Krieg vorbereiten!"
 kmt.125.t:0 "Engere Beziehung zu [From.GetName]"
 kmt.125.d:0 "Nachdem die [From.GetAdjective]-Regierung nun beschlossen hat, uns Guangzhouwan zurückzugeben, können wir uns der Verbesserung unserer Beziehungen zuwenden."
 kmt.125.a:0 "Alles zum Ruhm des Vaterlandes!"
 kmt.126.t:0 "[From.GetName] Abgelehnt"
 kmt.126.d:0 "Die [From.GetAdjective]-Regierung hat sich trotz des großzügigen Angebots geweigert, Guangzhouwan zurückzugeben, jetzt müssen sie den „Strafschnaps“ probieren …"
 kmt.126.a:0 "Niemand soll sich gegen das Mutterland stellen!"
 kmt.127.t:0 "[From.GetName] Akzeptiert"
 kmt.127.d:0 "[From.GetName] hat unsere Forderung nach der Rückgabe von Guangzhouwan akzeptiert!"
 kmt.127.a:0 "Das Mutterland heißt seine Kinder willkommen!"
 kmt.128.t:0 "[From.GetName] Abgelehnt"
 kmt.128.d:0 "[From.GetName] hat unsere Forderung nach der Rückgabe von Guangzhouwan abgelehnt!"
 kmt.128.a:0 "Das Mutterland wird es auf die eine oder andere Weise zurückbekommen!"
 kmt.130.t:0 "Denunziation von [From.GetName]"
 kmt.130.d:0 "[From.GetName] hat irgendwie Beweise dafür gefunden, dass wir hinter dem kürzlich gescheiterten Putsch in Guangzhou stecken, und sie haben uns öffentlich angeprangert!"
 kmt.130.a:0 "Wir werden uns revanchieren und den Handel mit ihnen einstellen!"
 kmt.130.b:0 "Eine neue Chance für uns, Guangzhouwan einzunehmen!"
 kmt.130.c:0 "Ignoriere es einfach ..."
