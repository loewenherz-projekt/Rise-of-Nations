EHB_goverment:0 "Strategie für den Pufferstaat Nordchina"
 EHB_goverment_desc:0 "Die Strategie des Pufferstaats Nordchina ist der Oberbegriff für eine Reihe politischer Manöver, die Japan in den fünf nordchinesischen Provinzen Hebei, Chahar, Suiyuan, Shanxi und Shandong durchführte. Ziel dieser Operation war es, ganz Nordchina von der Macht der nationalistischen Regierung zu lösen und unter japanische Kontrolle bzw. Einfluss zu bringen."
 EHB_jap:0 "Provisorische Regierung der Republik China"
 EHB_jap_desc:0  "Die Provisorische Regierung der Republik China war ein chinesischer Marionettenstaat des Kaiserreichs Japan und existierte von 1937 bis 1940 während des Zweiten Japanisch-Chinesischen Krieges. Sie wurde größtenteils auf Initiative der Befehlshaber der Kaiserlich Japanischen Armee in Nordchina gegründet, bevor die japanische Regierung in Tokio ihre Zustimmung einholte. Somit hatte die Provisorische Regierung nominelle Autorität in den von Japan besetzten Gebieten Nordchinas, während im Süden die Zentralchinesische Expeditionsarmee 1938 die Reformierte Regierung der Republik China gründete, die die Autorität im Gebiet des Jangtsekiang innehatte. "
 EHB_nanjing:0"Reorganisierte Nationalregierung der Republik China"
 EHB_nanjing_desc:0  "Das Wang-Jingwei-Regime ist die gebräuchliche Bezeichnung für die Reorganisierte Nationalregierung der Republik China, die Regierung des Marionettenstaates des Japanischen Kaiserreichs in Ostchina, der einfach Republik China genannt wurde. Diese sollte nicht mit der Republik China unter Chiang Kai-shek verwechselt werden, die im Zweiten Weltkrieg auf der Seite der Alliierten gegen Japan kämpfte. Das Land wurde als Einparteienrepublik unter Wang Jingwei regiert, einem sehr hochrangigen ehemaligen Funktionär der Kuomintang (KMT). Die von ihm verwaltete Region wurde Ende der 1930er Jahre mit Beginn des Zweiten Japanisch-Chinesischen Krieges zunächst von Japan besetzt. Wang, ein Rivale Chiang Kai-sheks und Mitglied der friedensbefürwortenden Fraktion der KMT, lief auf die japanische Seite über und bildete 1940 im besetzten Nanking (Nanjing) (der traditionellen Hauptstadt Chinas) eine Kollaborationsregierung. "

 
 ### CHIANG KAI-SHEK
 CHI_kaishek_T1:0 "Guómín Zhèngfu Zhuxí"
 CHI_kaishek_T2:0 "Generalissimus"
 CHI_kaishek_T3:0 "Antikommunistisch"
 CHI_kaishek_T4:0 "Japanische Bildung"
 CHI_kaishek_T5:0 "Radikale"
 CHI_kaishek_T6:0 "Unangefochtener Diktator"
 CHI_kaishek_T7:0 "Der Rote General ist nicht mehr"
 umc_leader_chiang_kaishek_desc:0 "Chiang Kai-Shek wurde am 31. Oktober 1887 in Fenghua geboren. Schon in jungen Jahren interessierte er sich für Krieg und leitete simulierte Feldzüge mit Holzschwert und Speer. Eine gute Vorbereitung für seine späteren Aufgaben.\nWährend seines Japanaufenthalts 1906 schlug er zunächst eine militärische Laufbahn ein. Im selben Jahr begann er seine militärische Ausbildung an der Militärakademie Baoding. Nach Abschluss seiner Schulzeit diente Chiang von 1909 bis 1911 in der Kaiserlich Japanischen Armee.\nChiang war ein einflussreiches Mitglied der Kuomintang (KMT), der Nationalistischen Partei Chinas, und ein enger Verbündeter Sun Yat-sens. Er wurde Kommandant der Whampoa-Militärakademie der Kuomintang und übernahm nach dem Kanton-Putsch Anfang 1926 Suns Platz als Führer der KMT. Nachdem er den linken Flügel der Partei neutralisiert hatte, führte Chiang Suns lange aufgeschobenen Nordfeldzug an und eroberte oder einigte sich mit Chinas zahlreichen Kriegsherren.\nAb 1928 diente Chiang als Generalissimus der Nationalregierung der Republik China. Aufgrund seiner nationalistischen Ideen und seiner Unfähigkeit, Suns gute Beziehungen zur Kommunistischen Partei Chinas aufrechtzuerhalten, löste er nach dem Massaker von Shanghai ein unangenehmes Nachspiel aus, das zum Herbsternteaufstand von Mao Zedongs Bauernarmee, dem Langen Marsch, führte und seine Stellung als Herrscher Chinas schwächte.\nNun muss er sich mit zahlreichen Kriegsherren, rebellischen Kommunisten und der wachsenden japanischen Bedrohung in der Mandschurei auseinandersetzen."
 
