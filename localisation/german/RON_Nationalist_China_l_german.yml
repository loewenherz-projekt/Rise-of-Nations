 CHI_unite_the_general_staffs:0 "Vereint die Generalstäbe"
 CHI_unite_the_general_staffs_EXPL1:0 "Wenn wir mit [GXC.GetFlag]§H[GXC.GetName]§! in einer Fraktion sind, werden sie zu unserer Marionette.\n"
 CHI_unite_the_general_staffs_EXPL2:0 "Wenn wir mit [YUN.GetFlag]§H[YUN.GetName]§! in einer Fraktion sind, werden sie zu unserer Marionette.\n"
