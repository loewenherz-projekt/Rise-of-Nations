 ### focus ###
 KMT_internal_stability:0 "Priorisieren Sie die interne Stabilität"
 KMT_internal_stability_desc:0 "Während die Japaner eine Hautkrankheit sind, sind die kommunistischen Banditen eine Herzkrankheit. Um China zu retten, müssen wir es zunächst von allen Verrätern säubern."
 KMT_focus:0 "Kuomintang-Fokus"
 KMT_SHX_offer:0 "Das Shanxi-Angebot"
 KMT_SHX_offer_desc:0 "Yans Herrschaft verwehrt uns den militärischen Zugang. Wenn wir ihn mit Gewalt zur Unterwerfung zwingen, können wir die Kommunisten einkreisen und ein für alle Mal vernichten."
 KMT_strike_PRC:0 "Schlag gegen die kommunistischen Banditen"
 KMT_strike_PRC_desc:0 "Die Banditen erholen sich noch immer vom Langen Marsch. Wir müssen zuschlagen, wenn sie schwach sind!"
 KMT_preparation:0 "Antikommunistischer Aufbau"
 KMT_preparation_desc:0 "Nach ihrer beinahe vollständigen Vernichtung während des Langen Marsches verstecken sich die kommunistischen Banditen in der Region Shaanxi. Wir müssen angreifen, bevor sie sich erholen können!"
 KMT_prep_tt:0 "Fügen Sie 2 §YInfrastruktur§! in allen an die VR China angrenzenden Staaten hinzu"
 KMT_warlord:0 "China vereinen"
 KMT_warlord_desc:0 "Nachdem die kommunistischen Banditen vernichtet wurden, ist es Zeit für die Kriegsherren, dem Schwert zu begegnen. Sie haben das Volk schon zu lange ausgeraubt. Wir müssen die Nationale Revolution vollenden!"
 KMT_external_defense:0 "Priorisieren Sie externe Bedrohungen"
 KMT_external_defense_desc:0 "Obwohl die Kommunisten eine ernste Bedrohung darstellen, hat Japan die Fähigkeit, die gesamte chinesische Nation auszulöschen. Sie werden sich nicht mit der Mandschurei zufrieden geben. Eines Tages werden sie versuchen, auch den Rest Chinas einzunehmen. Wir müssen alles tun, um uns auf diesen Sturm vorzubereiten."
 KMT_fortify_land:0 "Bau der Sun-Yat-sen-Linie"
 KMT_fortify_land_desc:0 "Die Japaner erkunden das Gebiet um Peking und ihre Absichten werden deutlich. Wir müssen unsere Grenzen befestigen. Wir werden ihnen keinen Zentimeter heiligen chinesischen Bodens überlassen!"
 KMT_fortify_coast:0 "Zentrale Befestigungen"
 KMT_fortify_coast_desc:0 "Angesichts der japanischen Kontrolle über die Meere werden sie im Kriegsfall zweifellos Küsteninvasionen starten. Wir müssen uns vorbereiten, solange wir können. Das Paris des Orients wird nicht kampflos aufgegeben!"
 KMT_national_def_propaganda:0 "Propaganda zur nationalen Verteidigung"
 KMT_national_def_propaganda_desc:0 "Um uns gegen die japanische Bedrohung zu verteidigen, muss das chinesische Volk so vereint wie möglich sein. Wir hassen sowohl die kommunistischen Banditen als auch die Kriegsherren, aber jeder Mann, jede Frau und jedes Kind muss bereit sein, gemeinsam für Chinas Verteidigung zu kämpfen und zu sterben."
 KMT_alone_or_peace_faction_tt:0 "ist nicht in einer Fraktion oder ist in einer Fraktion, die mit [CHI.GetNameDef] im Frieden steht."
 KMT_tibet_march:0 "Nachfrage Tibet"
 KMT_tibet_march_desc:0 "Tibet ist für Chinas Verteidigung und zukünftige Expansion von entscheidender Bedeutung. Seit der Revolution von 1911 ist die Region jedoch unabhängig von chinesischer Herrschaft. Diesen Fehler müssen wir beheben."
 KMT_tibet_friend:0 "Befreunde dich mit Tibet"
 KMT_tibet_friend_desc:0 "Tibet ist für Chinas Verteidigung und zukünftige Expansion von entscheidender Bedeutung. Nach der Revolution von 1911 erlangte Tibet jedoch seine Unabhängigkeit. Wir müssen uns mit dem Dalai Lama verbünden und unsere Flanken sichern."
 KMT_redraw_mcmahon_tt:0 "Entweder §Y[CHI.GetName]§! oder §Y[TIB.GetName]§! ist der Besitzer von §YXikang§! und §YTibet§!."
 KMT_redraw_mcmahon:0 "McMahon-Linie neu zeichnen"
 KMT_redraw_mcmahon_desc:0 "Tibet stimmte dem beschämenden Simla-Abkommen zu, das die Grenze zu Indien neu zog. Wir müssen dafür sorgen, dass diese Linie zu unseren Gunsten neu gezogen wird."
 KMT_redraw_mcmahon_cancel_tt:0 "weder §Y[CHI.GetName]§! noch §Y[TIB.GetName]§! ist der Eigentümer von §YXikang§! und §YTibet§!."
 KMT_burma_road_tt:0 "Maximale §YInfrastruktur§! in §YYunnan§! hinzufügen\n"
 KMT_the_big_rear_concept_tt:0 "§YShanghai§! ist im aktuellen Krieg in der Hand unseres Feindes"
 big_rear_concept_bp_tt:0 "Nicht genügend Bauplätze in §YXikang§!"
 KMT_lure_them_in_tt:0 "§YHubei§! und §YHunan§! sind im aktuellen Krieg in der Hand unseres Feindes"
 demand_taiwan_tt:0 "Im Frieden mit dem Besitzer von §YTaiwan§!"
 KMT_ocean_hub_tt:0 "Nicht genügend Bauplätze in §YTaiwan§!"
 land_bonus:0 "Armeeausrüstungsbonus"
 KMT_north_plan_effect_tt:0 "Erreichen Sie ein Kriegsziel gegen den ausländischen Eigentümer der besagten Staaten."
 KMT_voting_rights_tt:0 "Wahlen zulassen"
 plan_empire_tt:0 "Setze die Regierungspartei auf §YFaschistisch§!.\n"
 KMT_hundred_flowers_tt:0 "§YDie Hundert-Blumen-Kampagne beginnt.\n\nDem Volk wird es erlaubt sein, auf die Mängel unserer Regierung hinzuweisen und diese zu kritisieren.\n\n§!§RDies ist ein Komplott, um Übeltäter zu entlarven. Ihre Kritik könnte jedoch den Willen unseres Volkes beeinflussen. Das Volk könnte unsere Regierung für unfähig halten und sich anderen Parteien zuwenden, bevor wir diese Übeltäter verhaften.§!\n\n§GGewinne zufällige Kerne in Staaten, die als unveräußerliche Teile gelten und uns gehören und von uns kontrolliert werden.§!\n"
 KMT_industrial_effort:0 "Investieren Sie in die Industrie"
 KMT_industrial_effort_desc:0 "Die chinesische Industrie hinkte der des Westens und Japans immer hinterher. Um unsere Unabhängigkeit zu bewahren, müssen wir unsere Industrieproduktion steigern. Wir können auch ausländischen Unternehmen Investitionen in unsere Industrie ermöglichen."
 KMT_armament_effort:0 "Das Jiangnan-Arsenal wiedergefunden"
 KMT_armament_effort_desc:0 "Das Jiangnan-Arsenal versorgte die Qing-Dynastie mit modernster Ausrüstung. Wir sollten den Namen für einen militärisch-industriellen Komplex übernehmen, der als Keimzelle für unsere wachsende Rüstungsindustrie dienen kann."
 KMT_gain_control_of_the_sea:0 "Erweitern Sie die Marine"
 KMT_gain_control_of_the_sea_desc:0 "Unsere Seeüberlegenheit ist seit langem verloren, da sie in der Schlacht am Yalu-Fluss gebrochen wurde. Da die japanische Marine unseren Handel bedroht, müssen wir einige Anstrengungen unternehmen, um unsere Handelsschiffe auf hoher See zu verteidigen."
 KMT_the_big_rear_concept:0 "Der Big-Hinter-Plan"
 KMT_the_big_rear_concept_desc:0 "Während im Osten Chinas Krieg tobt, ist unser Westen vergleichsweise sicher. Wir müssen versuchen, diese abgelegenen Gebiete zu entwickeln, damit auch sie zum chinesischen Krieg beitragen können."
 KMT_increase_funding_of_german_weaponary:0 "Nehmen Sie Ausrüstung im deutschen Stil an"
 KMT_increase_funding_of_german_weaponary_desc:0 "Obwohl wir von deutschen Beratern wie Von Falkenhausen unterstützt werden und einige deutsche Geräte importiert werden, sind unsere lokal produzierten Modelle von schrecklicher Qualität. Durch die Verwendung deutscher Geräte als Vorlagen in unserem Herstellungsprozess können wir unsere Qualität um das Achtfache steigern!"
 KMT_lure_them_in_strategy:0 "Lock-sie-an-Strategie"
 KMT_lure_them_in_strategy_desc:0 "Angesichts des riesigen Territoriums und des unwegsamen Geländes unseres Landes können wir es uns leisten, uns zurückzuziehen und Eindringlinge auf Schlachtfelder unserer Wahl zu locken. Sollen die Imperialisten doch versuchen, uns zu verfolgen! Hinter jeder Ecke werden sie in einen Hinterhalt stoßen und bei jedem Schritt in eine Sprengfalle lauern!"
 KMT_air_effort:0 "Reorganisieren Sie das ROCAF"
 KMT_air_effort_desc:0 "Unsere Luftwaffe wurde immer vernachlässigt. Wenn wir überhaupt in der Lage sein wollen, in der Luft zu kämpfen, muss diese Teilstreitkraft ernsthaft reformiert werden."
 KMT_air_reform:0 "Die fliegenden Tiger"
 KMT_air_reform_desc:0 "Eine Gruppe amerikanischer Piloten erkannte die Gerechtigkeit unserer Sache und meldete sich freiwillig in großer Zahl für unsere Luftwaffe. Wir sollten diese gut ausgebildeten Männer als Elite-Kern einer neuen und wiederbelebten Luftwaffe einsetzen."
 KMT_study_foreign_ship:0 "Studieren Sie ausländisches Schiffsdesign"
 KMT_study_foreign_ship_desc:0 "Wir hinken anderen Nationen im Schiffsbau hinterher. Wenn wir eines Tages eine erstklassige Marine haben wollen, müssen wir lernen, was ihre Schiffe so überlegen macht, damit wir unsere eigenen bauen können."
 KMT_demand_taiwan:0 "Nachfrage Taiwan"
 KMT_demand_taiwan_desc:0 "Das taiwanesische Volk muss von seinem derzeitigen Herrscher befreit und zu uns zurückgebracht werden. Die lange gespaltene Nation muss sich vereinen."
 KMT_taiwan_fleet_hub:0 "Taiwan Flottenzentrum"
 KMT_taiwan_fleet_hub_desc:0 "Die Ausländer haben in Taiwan eine umfangreiche Infrastruktur hinterlassen. Wir sollten diese Basis ausbauen, um die gesamte Insel in einen einzigen Marinestützpunkt und ein Produktionszentrum zu verwandeln."
 KMT_pacific_fleet:0 "Durchbrechen Sie die erste Inselkette"
 KMT_pacific_fleet_desc:0 "Wenn China sein volles Potenzial ausschöpfen will, dürfen wir uns nicht auf dieser Seite des Pazifiks begnügen. Wir müssen eine Flotte aufbauen, die in der Lage ist, an Taiwan und Japan vorbeizusegeln."
 KMT_sea_fleet:0 "Zeichnen Sie die Elf-Strich-Linie"
 KMT_sea_fleet_desc:0 "Das Südchinesische Meer führt durch viele wichtige Handelsrouten. Wenn wir diese Passage für uns beanspruchen, können wir Südostasien beherrschen. Allerdings benötigen wir eine Flotte, die unsere Ansprüche durchsetzen und allen feindlichen Handelspartnern den Garaus machen kann."
 KMT_pacific_expansion:0 "Zerstöre die zweite Inselkette"
 KMT_pacific_expansion_desc:0 "Nachdem wir nun über eine Flotte verfügen, die in der Lage ist, den Kampf an Japan vorbeizuführen, müssen wir nun eine Flotte aufbauen, die jede Nation im Pazifik den Zorn Chinas spüren lassen kann. Wir werden Zheng He stolz machen."
 KMT_sea_expansion:0 "Erzwingen Sie die Elf-Strich-Linie"
 KMT_sea_expansion_desc:0 "Es scheint, als ob es uns nicht genügte, unsere Ansprüche auf das Südchinesische Meer geltend zu machen. Wir müssen unsere Flotte weiter ausbauen, damit wir den Imperialisten mit Gewalt die Gerechtigkeit unserer Sache vor Augen führen können!"
 KMT_modernize_army:0 "Armee modernisieren"
 KMT_modernize_army_desc:0 "Um einen Krieg zu gewinnen, reichen Kampfgeist und Können nicht aus. Wir brauchen auch moderne Ausrüstung."
 KMT_north_plan:0 "Erobern Sie den Norden zurück"
 KMT_north_plan_desc:0 "Dongbei, im Westen Mandschurei genannt, fiel erst vor wenigen Jahren an die Japaner und ihre Marionetten. Wir müssen es zurückerobern!"
 KMT_pioneering_the_north_east:0 "Gründung der Northeast Development Agency"
 KMT_pioneering_the_north_east_desc:0 "Obwohl die Japaner Teile der Mandschurei erschlossen, blieben weite Landstriche unberührt. Wir sollten große Anstrengungen unternehmen, um diese einst barbarischen Länder vollständig in die moderne Welt zu integrieren."
 KMT_science_effort:0 "Verbreiten Sie die Haipai-Kultur"
 KMT_science_effort_desc:0 "Die Haipai-Kultur Shanghais ist zwar extrem dekadent, hat aber aufgrund ihrer Fortschrittsorientierung auch viele Wissenschaftler, Schriftsteller und Intellektuelle hervorgebracht. Wir sollten versuchen, die positiven Aspekte dieser Bewegung im Rest Chinas zu verbreiten, um eine gebildetere Bevölkerung zu schaffen."
 KMT_extra_research_slot:0 "Erweitern Sie die Peking-Universität"
 KMT_extra_research_slot_desc:0 "Die Peking-Universität ist eine Institution von Weltrang. Wir sollten ihr mehr finanzielle Mittel zukommen lassen und begabten jungen Menschen Stipendien gewähren, um eine Generation qualifizierter Wissenschaftler und Führungskräfte hervorzubringen."
 KMT_national_institute:0 "Asyl für Juden"
 KMT_national_institute_desc:0 "Angesichts von Verfolgung und Tod in Europa haben sich viele Juden in Shanghai niedergelassen. Wir sollten unsere Grenzen für alle jüdischen Flüchtlinge öffnen, damit wir wiederum von ihrem Fachwissen profitieren können. Jüdische Ingenieure haben uns bereits polnische und deutsche Waffenentwürfe gebracht. Was können sie noch für ihre neuen Beschützer tun?"
 KMT_military_science:0 "Militärwissenschaft"
 KMT_military_science_desc:0 "Sowohl die Zivilwissenschaft als auch die Militärwissenschaft sind für die Stärke einer Nation von entscheidender Bedeutung. Eine angemessene Finanzierung der Militärwissenschaft wird unsere Armee noch schlagkräftiger machen."
 KMT_electronics_research:0 "Verstaatlichung eines Elektronikunternehmens"
 KMT_electronics_research_desc:0 "Obwohl die Elektrizität die ländlichen Gebiete noch nicht erreicht hat, produzieren unsere Wissenschaftler bereits fleißig einheimische Elektronikprodukte für den Markt in Shanghai und Hongkong. Wir sollten Ch&#39;eng-kung unter unsere Kontrolle bringen und es für staatliche Forschung nutzen."
 KMT_extra_research_slot_2:0 "Bildung für die Nation"
 KMT_extra_research_slot_2_desc:0 "Es reicht nicht aus, nur denjenigen den Zugang zu den akademischen Einrichtungen zu ermöglichen, die reich genug sind, um sich eine Universitätsausbildung leisten zu können. Wir müssen alle chinesischen Universitäten verstaatlichen und dafür sorgen, dass die Zulassung auf der Grundlage von Verdiensten und nicht von Vermögen erfolgt."
 KMT_bold_hypothesis:0 "Mutige Wissenschaft"
 KMT_bold_hypothesis_desc:0 "Unsere Wissenschaftler haben einen minderwertigen Fortschritt gemacht und glauben, dass sie, egal was sie tun, den Westen niemals übertreffen werden. Wir müssen ein Propagandaprogramm starten, um die Moral unserer Wissenschaftler wiederherzustellen."
 KMT_nuclear_physics:0 "Kernphysik"
 KMT_nuclear_physics_desc:0 "Sollten Einsteins Theorien stimmen, könnte die Atomspaltung eine Waffe von ungeahnter Macht hervorbringen. Diese Möglichkeit sollte weiter erforscht werden."
 KMT_fighter_focus:0 "Kämpferfokus"
 KMT_fighter_focus_desc:0 "Im Luftkampf ist die Luftüberlegenheit unser oberstes Ziel, und diese Aufgabe übernehmen Kampfflugzeuge."
 KMT_bomber_focus:0 "Bomberfokus"
 KMT_bomber_focus_desc:0 "Die Zerstörung der Versorgungslinien und Fabriken unseres Feindes ist die beste Option im Luftkrieg. Daher sollten wir beim Bomber bleiben."
 KMT_cas_effort:0 "CAS-Aufwand"
 KMT_cas_effort_desc:0 "Luftnahunterstützung ist für den Vormarsch unserer Armee am Boden äußerst vorteilhaft. Diese CAS-Kampfflugzeuge werden den Krieg für uns gewinnen."
 KMT_nav_effort:0 "NAV-Aufwand"
 KMT_nav_effort_desc:0 "Marinebomber zeichnen sich durch die Zerstörung feindlicher Schiffe und Häfen aus und sind daher ein unverzichtbarer Bestandteil der Seekriegsführung."
 KMT_political_effort:0 "Nationale Reform"
 KMT_political_effort_desc:0 "Unsere Regierung ist bei den Bürgern alles andere als beliebt. Wenn wir überleben wollen, müssen wir die Korruption ausmerzen."
 KMT_government_reform:0 "Die Republik neu denken"
 KMT_government_reform_desc:0 "Unsere derzeitige Regierungsform ist unerwünscht, wir müssen einen anderen Weg suchen."
 KMT_strengthen_the_republic:0 "Die Republik stärken"
 KMT_strengthen_the_republic_desc:0 "Unsere Bürger sind mit der Republik zufrieden. Um ihr Vertrauen zu stärken, müssen wir unsere Wurzeln im Sun Yat-sen-Gedanken bewahren."
 KMT_democratic_republic:0 "Beenden Sie die Bevormundung des Volkes"
 KMT_democratic_republic_desc:0 "Unsere Bürger sind nun bereit für die Demokratie. Nach Sun Yat-sens Willen werden wir die Ära der Einparteienherrschaft beenden und Wahlen abhalten, sobald diese ordnungsgemäß organisiert werden können."
 KMT_unitary_semi_presidential_republic:0 "Die Vormundschaft des Volkes fortsetzen"
 KMT_unitary_semi_presidential_republic_desc:0 "Obwohl wir große Fortschritte gemacht haben, sind die Menschen noch nicht bereit für die Demokratie. Wir müssen uns weiterhin an der Führung der KMT orientieren."
 KMT_promote_nationalism:0 "Beleben Sie die New Life-Bewegung wieder"
 KMT_promote_nationalism_desc:0 "Unser Land wird seit langem wegen seiner Schwäche und Unfähigkeit gehänselt. Wir sollten unsere früheren Bemühungen fortsetzen, eine nationalistische Bürgerschaft aufzubauen, die China wieder groß machen kann."
 KMT_neutrality_focus:0 "Rückkehr zur Isolation"
 KMT_neutrality_focus_desc:0 "Während andere behaupten, dass es Mut und Weisheit erfordert, in einem globalen Konflikt Partei zu ergreifen, wissen wir, dass es mehr erfordert, sich zu weigern."
 KMT_interventionism_focus:0 "Exportieren Sie die nationale Revolution"
 KMT_interventionism_focus_desc:0 "Wir schätzen die Freiheit aller Menschen, nicht nur unserer eigenen Bürger. Wenn die Verhinderung von Tyrannei Krieg bedeutet, dann ist das so."
 KMT_deterrence:0 "Abschreckung"
 KMT_deterrence_desc:0 "Wenn wir allein dastehen, profitieren wir selten vom Krieg. Glücklicherweise wissen wir, dass die beste Verteidigung eine ist, die so bekannt ist, dass man sie nie anwenden muss."
 KMT_volunteer_corps:0 "Die Sun-Yat-sen-Brigaden"
 KMT_volunteer_corps_desc:0 "Unser Volk zu zwingen, für die Ideale der Freiheit zu sterben, wäre eine Ironie des Schicksals. Doch die Schaffung von Mitteln für diejenigen, die Menschen im Ausland helfen möchten, ist es nicht."
 KMT_foreign_expeditions:0 "Das National Friendship Expeditionary Corps"
 KMT_foreign_expeditions_desc:0 "Da unsere Feinde bereit sind, im Namen ihrer Ideale in weit entfernte Konflikte einzugreifen, müssen wir bereit sein, dasselbe für unsere zu tun."
 KMT_centralizing_power:0 "Zentralisierung der Macht"
 KMT_centralizing_power_desc:0 "Die Phase der Volksvormundschaft ermöglicht es uns langsam, die gesamte Macht, sowohl lokal als auch regional, in den Händen der Zentralregierung zu zentralisieren. Wir werden die Fehler von 1912 und 1916 nicht wiederholen. In einem vereinten China kann es keinen Föderalismus geben."
 KMT_into_despotism:0 "Despotismus"
 KMT_into_despotism_desc:0 "Nach Chiangs Erlass wird China weder der Demokratie, noch dem Faschismus oder dem Kommunismus folgen. China wird der Kuomintang folgen und das Reich der Mitte in die Zukunft führen. Unsere Feinde nennen das Despotie. Wir nennen es Fortschritt."
 KMT_social_experiment:0 "Erweitern Sie das staatliche Labor"
 KMT_social_experiment_desc:0 "Um die technologische Leistungsfähigkeit unseres Landes zu steigern, müssen wir unsere staatlichen Labore erweitern und mehr Wissenschaftler einstellen."
 KMT_voting_rights:0 "Eine neue Verfassung"
 KMT_implement_parliamentary_system:0 "Bewegung für den Wiederaufbau des ländlichen Raums"
 KMT_implement_parliamentary_system_desc:0 "Die Machtbasis der Kommunisten liegt in der unzufriedenen Bauernschaft. Damit die Demokratie in China überleben kann, müssen wir die kommunistische Basis vollständig zerstören, indem wir das Leben der Bauern verbessern. Die Gutsbesitzer müssen zerschlagen, neue landwirtschaftliche Techniken eingeführt, Schulen gegründet und medizinische Versorgung gewährleistet werden. Es ist an der Zeit, dass China beginnt, sich um seine Bevölkerung zu kümmern."
 KMT_universal_sufferage:0 "Die drei Prinzipien des Volkes"
 KMT_universal_sufferage_desc:0 "Im Mittelpunkt des Denkens von Sun Yat-sen stehen die drei Prinzipien des Volkes: Demokratie, Nationalismus und Volkswohl. Während wir in der Vergangenheit nur den Nationalismus erreicht haben, streben wir nun der vollständigen Verwirklichung von Suns Traum entgegen."
 KMT_european_friend:0 "Westliche Zusammenarbeit"
 KMT_european_friend_desc:0 "Die Demokratie ist im Westen viel stärker verankert als in China. Wir sollten uns dem Block der westlichen Demokratien anschließen, um von ihrem Beispiel zu lernen und die Koalition der freien Völker zu stärken."
 KMT_alone_in_the_east:0 "Östliches Bollwerk der Demokratie"
 KMT_alone_in_the_east_desc: "The Western Democracies are embroiled in Chaos. Joining them at the moment would destroy our new and fragile republic. We must stand alone in Asia, as a light of liberty in the East."
 KMT_knowledge_of_the_citizens:0 "Staatsbürgerkunde"
 KMT_knowledge_of_the_citizens_desc:0 "In der Vergangenheit war Bildung für viele Menschen nicht zugänglich. Durch die Erweiterung des nationalen Schulsystems mit einem Lehrplan, der darauf abzielt, Bürger und nicht Untertanen zu formen."
 KMT_westernization:0 "Verwestlichung"
 KMT_westernization_desc:0 "Das Wissen der westlichen Welt übersteigt unsere Vorstellungskraft, die Übernahme ihres Wissens würde eine ganze Kampagne erfordern."
 KMT_fascism_focus:0 "Macht den Blauhemden"
 KMT_fascism_focus_desc:0 "Die Stärke des Deutschen Reiches ist faszinierend. Unsere Nation muss ihrem Weg zum Ruhm folgen. Wir müssen diejenigen im Inland unterstützen, die große Leidenschaft für unser Land gezeigt haben."
 KMT_militarism_focus:0 "Nationale militärische Indoktrination"
 KMT_militarism_focus_desc:0 "Die Leute sagen: „Man soll aus gutem Eisen keine Nägel machen, und aus guten Männern keine Soldaten.“ Eine solche Verachtung des Militärs ist nicht angebracht. Wir müssen das Ansehen der Streitkräfte in den Augen der Bevölkerung stärken."
 KMT_ban_communism:0 "Verbot des Kommunismus"
 KMT_ban_communism_desc:0 "Der Kommunismus ist die Plage der Gesellschaft. Wir müssen diese Plage verbannen, um den Verfall unserer Gesellschaft zu verhindern."
 KMT_planning_our_empire:0 "Baue das Imperium wieder auf"
 KMT_planning_our_empire_desc:0 "China war während des größten Teils der Zivilisationsgeschichte die mächtigste Nation der Erde. Wir müssen unseren Platz an der Sonne zurückerobern."
 KMT_isolation_tactic:0 "Antisowjetische Isolationstaktiken"
 KMT_isolation_tactic_desc:0 "Mit der Ausbreitung der Komintern in Zentralasien werden wir langsam von der roten Bedrohung umzingelt. Wir müssen Misstrauen gegenüber ihrem Bündnissystem säen, um die alten Grenzen wiederherzustellen."
 KMT_war_propaganda:0 "Kriegspropaganda"
 KMT_war_propaganda_desc:0 "Unser Volk einer Gehirnwäsche zu unterziehen und dabei den Vorteil von Krieg und Sieg zu nutzen, ist eine großartige Möglichkeit, unser Volk zu vereinen und ein starkes Militär aufzubauen."
 KMT_military_first:0 "Militär zuerst"
 KMT_military_first_desc:0 "Indem wir unsere Bevölkerung über die Vorteile von Krieg und Expansion informieren, sichern wir uns die Fähigkeit, im Ausland Monster zu töten."
 KMT_war_fanaticism:0 "Kriegsfanatismus"
 KMT_war_fanaticism_desc:0 "Kämpfen und Sterben ist nicht genug. Wir müssen kämpfen und siegen, koste es, was es wolle. Lasst unser Blut China wieder zum Mittelpunkt der Welt machen! ZHONGGUO WANSUI!"
 KMT_claim_territory:0 "Die Ansprüche des Tributsystems"
 KMT_claim_territory_desc:0 "Wir haben sowohl unser eigenes Land als auch unsere Tributpflichtigen an die Imperialisten verloren. Da die Tributpflichtigen formell zu Vasallen des Throns würden, könnten wir Ansprüche auf viele Gebiete in Ostasien erheben ..."
 KMT_integration_of_government:0 "Integration der Regierung"
 KMT_integration_of_government_desc:0 "Unter der Führung Maos werden beide Nationen zu einer einzigen Regierung."
 KMT_hundred_flowers_campaign:0 "Hundert-Blumen-Kampagne"
 KMT_hundred_flowers_campaign_desc:0 "Es gibt immer noch einige Reaktionäre unter uns. Der beste Weg, sie zu entlarven, besteht darin, ihnen die Möglichkeit zu geben, ihre Meinung zu äußern."
 KMT_great_leap_forawrd:0 "Großer Sprung nach vorn"
 KMT_great_leap_forawrd_desc:0 "Wir liegen sowohl gegenüber dem Westen als auch gegenüber der Sowjetunion weit zurück. Um den Kommunismus zu verwirklichen und die Bevölkerung zu schützen, müssen wir eine gigantische Massenkampagne starten, um in kurzer Zeit aufzuholen."
 kmt_integrate_mao_tt:0 "Regierungspartei auf Kommunismus einstellen"
 KMT_socialist_science:0 "Sozialistische Wissenschaft"
 KMT_socialist_science_desc:0 "Die Welt ist, wie der Geist, in ständiger Bewegung. Die Natur befindet sich in einem Zustand ständigen Fortschritts, ja sogar Revolution. Die Prinzipien des dialektischen Materialismus lassen sich sowohl auf die Naturwissenschaften als auch auf die Sozialwissenschaften anwenden."
 ## 4/7/2016 ##
 KMT_demand_soviet_puppets:0 "Fordern Sie zentrale Steppe und Sinkiang"
 KMT_demand_soviet_puppets_desc:0 "Territorialstreitigkeiten müssen nicht in blutigen Kriegen enden. Auch diplomatische Mittel sind eine Option. Wenn man kompromissbereit ist …"
 KMT_demand_soviet_puppets_tt:0 "Der Eigentümer der zentralen Steppenstaaten (§YMongolei§! und §YTannu Tuva§!) und des §YSinkiang§!-Gebiets wird die Forderung erhalten."
 KMT_demand_indochina:0 "Nachfrage Indochina"
 KMT_demand_indochina_desc:0 "Territorialstreitigkeiten müssen nicht in blutigen Kriegen enden. Auch diplomatische Mittel sind eine Option. Wenn man kompromissbereit ist …"
 KMT_demand_indochina_tt:0 "Die Forderung wird an den Eigentümer der Staaten „YLaos“, „YTonkin“, „YAmbodia“ und „Südindochina“ gehen."
 KMT_special_force_training:0 "SACO"
 KMT_special_force_training_desc:0 "Das Ziel der Chinesisch-Amerikanischen Kooperationsorganisation besteht darin, unsere Armee nachrichtendienstlich zu unterstützen und auch Spezialeinheiten für Operationen auszubilden."
 ## 5/7/2016 ##
 KMT_improve_burma_road:0 "Verbesserung der Burma-Straße"
 KMT_improve_burma_road_desc:0 "Obwohl die Briten die Burmastraße gebaut haben, um den Krieg gegen die Japaner zu unterstützen, ist die Straße selbst nicht besonders effizient. Wir sollten sie verbessern."
 ## 7/7/2016 ##
 ## 14/7/2016 ##
 kmt_ftf_tt:0 "Empfange Kämpfer und Piloten aus den USA.\n"
 ## 15/7/2016 ##
 KMT_sinkiang_integration:0 "Schicksal von Sinkiang"
 KMT_sinkiang_integration_desc:0 "Sinkiang ist rechtmäßig chinesisches Land. Jetzt, da wir beide unter der Führung der Großen Sowjetunion stehen, können wir die Gelegenheit nutzen, die Rückgabe Sinkiangs an China zu fordern."
 KMT_invite_sik:0 "Sinkiang einladen"
 KMT_invite_sik_desc:0 "Wenn wir dem wahren Weg des Marxismus-Leninismus folgen wollen, müssen wir Verbündete suchen, um den revisionistischen Schweinen in der Komintern die Stirn zu bieten."
 KMT_war_with_sik:0 "Krieg mit Sinkiang"
 KMT_war_with_sik_desc:0 "Sinkiang ist zweifellos nur eine weitere Nation, die von revisionistischen Schweinen befallen ist. Wir müssen sie beseitigen!"
 ## 27/7/2016 ##
 kmt_force_sik_bp_tt:0 "Sie oder eine mit Ihnen verbündete Nation befinden sich im Krieg mit §YSinkiang§!."
 ## 6/8/2016 ##
 KMT_trade_port_neutral:0 "Die ungleichen Verträge aufheben"
 KMT_trade_port_neutral_desc:0 "Aufgrund der zahlreichen ungleichen Verträge, die die inkompetente Qing-Dynastie mit den westlichen Nationen unterzeichnete, befindet sich ein Teil unseres Landes immer noch in ungerechten Händen. Wir müssen unser Volk unter einem Banner vereinen!"
 KMT_trade_port_demo:0 "Handelshäfen für Unterstützung"
 KMT_trade_port_demo_desc:0 "Da die westlichen Nationen und wir eine Demokratie praktizieren, müssen wir uns gegenseitig helfen, wenn wir in Not sind. Diese Hilfe wird jedoch ihren Preis haben für die Demütigungen, die sie uns zugefügt haben, als wir schwach waren."
 KMT_trade_port_fascism:0 "Die chinesischen Häfen"
 KMT_trade_port_fascism_desc:0 "Die Abspaltung der Handelshäfen im Rahmen der ungleichen Verträge ist für die Chinesen eine äußerst demütigende Erfahrung, da unser Handel nun durch die Westler eingeschränkt und unsere Länder geteilt werden. Wir müssen diese Länder zurückerobern und China wieder groß machen!"
 ## 22/8/2016 ##
 KMT_trade_port_commie_comintern:0 "Sowjetische Präsenz anfordern"
 KMT_trade_port_commie_comintern_desc:0 "Wenn die westliche Welt in der Frage der Handelshäfen keine Kompromisse eingeht, müssen wir die Sowjetunion um ihre Anwesenheit bitten, um unsere Chancen zu erhöhen."
 KMT_trade_port_commie_own:0 "Nachfrage Handelshäfen"
 KMT_trade_port_commie_own_desc:0 "Wir müssen die Handelshäfen der westlichen Welt zurückerobern, sie stehen uns zu."
 KMT_industrialization_NW:0 "Lokale Industrialisierung: Nordwesten"
 KMT_industrialization_NW_desc:0 "Die Region Nordwest mag derzeit noch wie ein Ödland aussehen, doch schon bald wird sie zu einer der am stärksten industrialisierten Regionen werden."
 KMT_excavation_NW:0 "Nordwest-Ausgrabung"
 KMT_excavation_NW_desc:0 "Wir müssen in unserem Land nach mehr Ressourcen suchen, um von importierten Ressourcen unabhängig zu werden."
 KMT_industrialization_S:0 "Lokale Industrialisierung: Süden"
 KMT_industrialization_S_desc:0 "Der Süden mag zwar zu den am stärksten industrialisierten Regionen gehören, aber es besteht noch viel Verbesserungspotenzial."
 KMT_excavation_S:0 "Kautschukplantage"
 KMT_excavation_S_desc:0 "Das Klima im Süden eignet sich sehr gut für den Kautschukanbau, wir sollten es gut nutzen."
 KMT_excavation_NE:0 "Nordost-Prospektion"
 KMT_excavation_NE_desc:0 "Die Japaner haben in der Gegend zahlreiche Werkzeuge hinterlassen, die wir nutzen können, um in der Gegend neue Ressourcen zu entdecken."
 KMT_ledo_road:0 "Ledo-Straße"
 KMT_ledo_road_desc:0 "Die Burmastraße wurde von Invasoren abgeschnitten, wir müssen eine andere Straße aus Indien für die Versorgung bauen."
 kmt_pekingu_tt:0 "Reduzieren Sie die Strafe für §Yöffentliche Analphabetismus§!\n"
 kmt_neutral_tp_mc:0 "§Y[729.GetName]§! ist nicht im Besitz von §Y[Root.GetName]§! und der Besitzer hat Frieden mit §Y[Root.GetName]§! geschlossen."
 kmt_neutral_tp_gzw:0 "§Y[728.GetName]§! ist nicht im Besitz von §Y[Root.GetName]§! und der Besitzer hat Frieden mit §Y[Root.GetName]§! geschlossen."
 kmt_neutral_tp_hk:0 "§Y[326.GetName]§! ist nicht im Besitz von §Y[Root.GetName]§! und der Besitzer hat Frieden mit §Y[Root.GetName]§! geschlossen."
 kmt_demo_tp_mc:0 "§YPortugal§! besitzt §YMacau§!, hat keinen Bürgerkrieg und lebt im Frieden mit China"
 kmt_demo_tp_gzw:0 "§YFrankreich§! besitzt §YGuangzhouwan§!, hat keinen Bürgerkrieg und lebt im Frieden mit China"
 kmt_demo_tp_hk:0 "§YGroßbritannien§! besitzt §YHongkong§!, hat keinen Bürgerkrieg und lebt im Frieden mit China"
 KMT_dare_to_die_corps:0 "Dare-To-Die-Corps"
 KMT_dare_to_die_corps_desc:0 "Wenn wir den Krieg gegen die Invasoren gewinnen wollen, muss unser Volk mutig genug sein, keine Angst vor dem Tod zu haben."
 ## 28/8/2016 ##
 KMT_air_base_expansion:0 "Erweiterung des Luftwaffenstützpunkts"
 KMT_air_base_expansion_desc:0 "Wir brauchen Luftwaffenstützpunkte, damit unsere Flugzeuge starten und landen können, sonst bleiben sie nur ein paar Ausstellungsstücke im Lager."
 KMT_national_resources_commission:0 "Nationale Ressourcenkommission"
 KMT_national_resources_commission_desc:0 "Die National Resources Commission (NRC) ist ein Institut, das für die Prospektion und Erschließung von Rohstoffvorkommen in China zuständig ist. Ihre Gründung wird unsere Bemühungen zur Gewinnung natürlicher Ressourcen erheblich verstärken."
 KMT_national_defense_council:0 "Nationaler Verteidigungsrat"
 KMT_national_defense_council_desc:0 "Da die Japaner und die kommunistischen Banditen unserem Land Schaden zufügen, müssen wir einen Weg finden, unsere Verteidigung gegen sie zu organisieren. Wir sollten auch versuchen, moderne Ausrüstung aus dem Ausland zu importieren."
 KMT_revive_jiangnan_shipyard:0 "Erweitern Sie die Jiangnan Shipyard Group"
 KMT_revive_jiangnan_shipyard_desc:0 "Wir sollten die Kapazitäten des Jiangnan Arsenals im Schiffsbau ausbauen. Dadurch verfügen wir über eine bessere Marine, um zukünftigen Bedrohungen zu begegnen."
 KMT_revive_hanyang_armory:0 "Beleben Sie das Hanyang Arsenal wieder"
 KMT_revive_hanyang_armory_desc:0 "Das Hanyang-Arsenal war während der von den Qing-Beamten ins Leben gerufenen Selbststärkungsbewegung eine der wichtigsten und erfolgreichsten Waffenlager. Wir können es wiederbeleben, um hochwertige Ausrüstung für unsere Armee herzustellen."
 ## 22/9/2016 ##
 kmt_scale_with_excav_tech:0 "Die Wirkung dieses Fokus skaliert mit §YAusgrabungstechniken§!.\n"
 ## 10/10/2016 ##
 kmt_mbf_go_lead_xsm:0 "Ma Pu-fang wird nun deine Armee verlassen und die Ma&#39;s anführen\n"
 kmt_nw_insurgence_tt:0 "Entweder Sie, §YXi Bei San Ma§! oder §YPRC§! kontrollieren §YGansu§!, §YNingxia§! und §YQinghai§!."
 kmt_yangtze_partition:0 "§RInform der VR China:§!\n Sie werden Eigentümer des südlich des Jangtse gelegenen Chinas und die VR China erhält den nördlich davon gelegenen Teil."
 kmt_taiwan_bastion_tt:0 "Fügen Sie 12 „Küstenfestungen“ in „Taiwan“ hinzu."
 KMT_monetary_reform:0 "Währungsreform"
 KMT_monetary_reform_desc:0 "Die Hyperinflation ruiniert unsere Wirtschaft. Wir müssen die Situation sofort unter Kontrolle bringen."
 KMT_preemptive_preparation:0 "Bereiten Sie sich auf den Bürgerkrieg vor"
 KMT_preemptive_preparation_desc:0 "Es besteht die Notwendigkeit, sich auf die Kommunisten vorzubereiten, da sie sich möglicherweise auch auf uns vorbereiten."
 KMT_taiwan_bastion:0 "Taiwan-Bastion"
 KMT_taiwan_bastion_desc:0 "Es besteht die Möglichkeit, dass wir diesen Krieg verlieren. Um uns auf diesen Fall vorzubereiten, müssen wir Taiwan in eine nationale Bastion verwandeln, von der aus wir abwarten und uns auf die Rückeroberung des Festlands vorbereiten können."
 KMT_yangtze_partition:0 "Jangtse-Teilung"
 KMT_yangtze_partition_desc:0 "Der Krieg mit [From.GetName] verläuft nicht zu unseren Gunsten, aber der Jangtse lässt uns Zeit. Wir können ihn als Chance nutzen, einen Waffenstillstand anzubieten und China mit dem Jangtse als Grenze zu China zu teilen. Das verschafft uns wertvolle Zeit, uns zu erholen und einen Gegenangriff vorzubereiten."
 KMT_north_west_insurgence:0 "Aufstand im Nordwesten"
 KMT_north_west_insurgence_desc:0 "Auch die Menschen im Nordwesten sind mit den Kommunisten nicht zufrieden. Wir können ihre Unzufriedenheit ausnutzen, um eine weitere Front für die Kommunisten zu schaffen."
 KMT_placate_former_puppet_government:0 "Zusammenarbeit mit Mitarbeitern"
 KMT_placate_former_puppet_government_desc:0 "Die ehemaligen Marionetten Japans sind allesamt Verräter, und jeder weiß das. Doch jetzt, wo die Japaner weg sind, können sie in den Dienst neuer Herren gestellt werden."
 KMT_harsh_takeover_focus:0 "Erobere den Hanjian"
 KMT_harsh_takeover_focus_desc:0 "Es besteht kein Grund, gegenüber Verrätern höflich zu sein. Wir werden sie alle verhaften und ihre Ressourcen uns zur Verfügung stellen."
 KMT_retreat_to_taiwan: "Retreat To Taiwan"
 KMT_retreat_to_taiwan_desc:0 "Wir haben diesen Krieg verloren! Wir müssen einen allgemeinen Rückzug nach Taiwan anordnen und uns dort neu organisieren!"
 #KMT_retake_the_mainland:0 "Retake The Mainland"
 #KMT_retake_the_mainland_desc:0 "Mainland is ours by right!"
 KMT_development_of_taiwan:0 "Taiwan entwickeln"
 KMT_development_of_taiwan_desc:0 "Taiwan hat von den Japanern große Aufmerksamkeit erhalten. Angesichts der Tatsache, dass Taiwans Wirtschaftsbasis deutlich höher ist als die des restlichen Chinas, wäre es klug, sie weiterzuentwickeln, damit sie als Modell für die Kompetenz unserer Regierungsführung dienen kann."
 kmt_incorporate_warlord_tt:0 "Hat keinen Nationalgeist §YWarlord Cliques§!"
 KMT_restart_the_civil_war:0 "Den Bürgerkrieg neu entfachen"
 KMT_restart_the_civil_war_desc:0 "Wir werden den Bürgerkrieg neu starten und den Kampf gewinnen!"
 KMT_westerweapons:0 "Rufe gen Westen"
 KMT_westerweapons_desc:0 "Wir werden den Westen um Unterstützung im Bürgerkrieg bitten"
 KMT_Choose_a_side:0 "Kriegsherren zwingen, sich für eine Seite zu entscheiden"
 KMT_Choose_a_side_desc:0 "Wir werden die Kriegsherren zwingen, sich für eine Seite zu entscheiden"
 KMT_into_isolation:0 "Bauen Sie unser Land wieder auf" 
 KMT_into_isolation_desc:0 "China ist gerettet, unsere Arbeit ist getan, wir werden jetzt ohne Einmischung von außen wieder aufbauen"
 ## 20/10/2016 ## Tomorrow I can play Civ VI !!!
 kmt_no_remove_warlord_army_tt:0 "Der Nationalgeist „Warlord Armies“ wird von nun an nicht mehr entfernt."
 ## 22/10/2016 ##
 KMT_increase_sino_german_cooperation:0 "Ausbau der deutsch-chinesischen Zusammenarbeit"
 KMT_increase_sino_german_cooperation_desc:0 "Wir sollten stärker mit Deutschland zusammenarbeiten. Auf diese Weise verschaffen wir uns einen größeren Vorsprung gegenüber unseren Feinden."
 ## 29/10/2016 ##
 KMT_jap_indus_assist_tt:0 "Fügen Sie §Y1 Zivile Fabrik§! in einem zufälligen, kontrollierten Zustand hinzu.\nFügen Sie §Y2 Militärfabriken§! in einem zufälligen, kontrollierten Zustand hinzu.\n"
 KMT_jap_navy_indus_assist_tt:0 "Fügen Sie §Y2 Marinewerften§! in zwei zufälligen, kontrollierten Staaten hinzu.\n"
 ## 14/11/2016 ##
 KMT_support_pro_japanese_faction:0 "Unterstützen Sie die projapanische Fraktion"
 KMT_support_pro_japanese_faction_desc:0 "Vielleicht können wir, anstatt die Japaner zu verärgern, eine friedlichere Lösung finden?"#愤青别打我
 KMT_re_elaborate_hakko_ichiu:0 "Vorschlag für eine chinesisch-japanische Allianz"
 KMT_re_elaborate_hakko_ichiu_desc:0 "Um eine echte „asiatische Wohlstandssphäre“ zu schaffen, müssen wir ein Bündnis mit den Japanern anstreben. Die fortgeschrittene industrielle Stärke wird uns sicherlich einen Vorteil gegenüber unseren Feinden verschaffen."
 KMT_introduce_shipbuilding_technology:0 "Einführung in die Schiffbautechnologie"
 KMT_introduce_shipbuilding_technology_desc:0 "Angesichts der starken Kapazitäten unseres Freundes in der Schiffsindustrie können wir auch in unserem Bereich um seine Unterstützung bitten."
 KMT_introduce_shipbuilding_technology_usa:0 "Einführung in die Schiffbautechnologie"
 KMT_introduce_shipbuilding_technology_usa_desc:0 "Angesichts der starken Kapazitäten unseres Freundes in der Schiffsindustrie können wir auch in unserem Bereich um seine Unterstützung bitten."
 KMT_force_japan_to_accept_peace:0 "Bitte um deutsche Intervention"
 KMT_force_japan_to_accept_peace_desc:0 "Aufgrund unserer derzeitigen Beziehungen zu Deutschland können wir Deutschland um ein Eingreifen in unseren aktuellen Krieg mit den Japanern bitten."
 KMT_force_japan_to_cede_land:0 "Erneute Forderung nach deutscher Intervention"
 KMT_force_japan_to_cede_land_desc:0 "Trotz der Einigung auf Friedensbedingungen weigern sich die Japaner immer noch, uns Land zurückzugeben. Vielleicht ist es an der Zeit, dass wir erneut eine deutsche Intervention fordern ..."
 KMT_pincer_soviet:0 "Zangensowjet"
 KMT_pincer_soviet_desc:0 "Da die Sowjetunion derzeit besetzt ist, können wir sie dort treffen, wo sie es am wenigsten erwarten."
 KMT_japanese_advisors:0 "Japanischer Berater"
 KMT_japanese_advisors_desc:0 "Wir können einige Berater unseres japanischen Freundes anfordern, um unsere Armee zu unterstützen."
 KMT_draw_closer_to_the_empire:0 "Verbesserung der Beziehungen zum Vereinigten Königreich"
 KMT_draw_closer_to_the_empire_desc:0 "Aufgrund unserer gemeinsamen Geschichte mit den Briten können wir etwas tun, um unsere Beziehungen zu verbessern oder vielleicht sogar ein Bündnis mit ihnen eingehen."
 KMT_trans_pacific_friendship_focus:0 "Transpazifische Freundschaft"
 KMT_trans_pacific_friendship_focus_desc:0 "Mit unserem derzeitigen Übergang zur Demokratie können wir unsere Bindung zu den USA, die sich auf der anderen Seite des Pazifiks befinden, stärken."
 KMT_resisist:0 "Widerstand gegen den Kommunismus"
 KMT_resisist_desc:0 "Wenn wir zulassen, dass der Kommunismus in unserer Gesellschaft Fuß fasst, wird Suns Traum nie wahr werden und es wird in China nie eine wahre Demokratie geben!"
 KMT_oust_the_colonizers:0 "Vertreibe die Kolonisatoren"
 KMT_oust_the_colonizers_desc:0 "Der Kolonialismus ist sogar noch schlimmer als der Imperialismus. Deshalb werden wir unsere asiatischen Mitbürger von der Bösartigkeit der westlichen Kolonialherren befreien!"
 KMT_pursuade_britain:0 "Großbritannien überzeugen"
 KMT_pursuade_britain_desc:0 "Angesichts des japanischen Bedarfs an Ressourcen für ihre Kriegsmaschinerie werden sie zweifellos die Kolonien Großbritanniens und der Niederlande in Asien angreifen. Mit diesem Wissen können wir Großbritannien zu einem ersten Angriff bewegen. Gelingt uns dies, gewinnen wir einen mächtigen Verbündeten."
 KMT_spread_the_revolution:0 "Verbreite die Revolution"
 KMT_spread_the_revolution_desc:0 "Da unsere asiatischen Mitbürger von bösen westlichen Kolonialherren unterdrückt werden, müssen wir ihnen den Weg des Kommunismus zeigen und den Teufel aus dem Westen vertreiben!"
 KMT_join_the_axis:0 "Treten Sie der Achse bei"
 KMT_join_the_axis_desc:0 "Es ist Zeit für uns, unsere Bindung zu unseren deutschen Freunden zu stärken."
 KMT_oust_colonisers_available_tt:0 "Jeder Kernstaat von:\n §YVietnam§!\n §YCambodia§!\n §YLaos§!\n §YMalaysia§!\n §YIndonesia§!\n §YIndia§!\n ist nicht Eigentum des jeweiligen Eigentümers.\n Oder es handelt sich um Marionetten nicht-asiatischer Nationen."
 KMT_oust_the_colonizers_tt:0 "Erreichen Sie das Kriegsziel gegenüber allen Kolonialherren in Asien.\n\n§YSie haben die Wahl, jede der oben genannten asiatischen Nationen zu befreien, wenn Sie deren Kernstaat kontrollieren.§!\n\n"
 KMT_spread_the_revolution_tt:0 "In den Kernstaaten der kolonisierten asiatischen Nationen wird es zu Aufständen kommen und in der britischen Kolonialherrschaft und in Siam wird eine kommunistische Revolution ausbrechen."
