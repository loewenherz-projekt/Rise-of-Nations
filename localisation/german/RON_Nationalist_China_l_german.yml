 kmt.31.d_1:0 "Unser ehemaliger Fraktionsführer hat aufgrund geheimer Dokumente beschlossen, uns aus seiner Fraktion auszuschließen. Es scheint, als sei es unseren Feinden gelungen, uns zu isolieren."
 kmt.31.d_2:0 "Unser ehemaliger Fraktionsführer hat beschlossen, uns aus seiner Fraktion auszuschließen und uns auf Grundlage geheimer Dokumente den Krieg zu erklären. Es scheint, als sei es unseren Feinden gelungen, uns zu isolieren."
