 CHI_scorched_earth_tactics_EXPL:0 "   Füge der §HInfrastruktur§! in unseren von [JAP.GetFlag]§H[JAP.GetName]§! kontrollierten Kerngebieten zusätzlichen §RSchaden§! zu.\n"
 CHI_industrial_evacuations_EXPL:0 "   Verlegung von „Zivilisations-“ und „Militärfabriken“ aus bedrohten Küstenstaaten ins Landesinnere.\n"
 CHI_the_god_of_war:0 "Der Gott des Krieges"
 CHI_the_god_of_war_desc:0 "Hsueh Yueh, „Xuē Yuè“, ist ein nationalistischer Veteran des Zentralchinesischen Krieges und des Ersten Chinesischen Bürgerkriegs. Seine militärischen Fähigkeiten brachten ihm bei den Amerikanern den Spitznamen „Patton von Asien“ und bei den Chinesen den Spitznamen „Kriegsgott“ ein. Chiang Kai-shek lobte ihn oft als „wahres Beispiel eines chinesischen Offiziers“."
 
 CHI_seek_the_allied_support:0 "Suchen Sie die Unterstützung der Alliierten"
