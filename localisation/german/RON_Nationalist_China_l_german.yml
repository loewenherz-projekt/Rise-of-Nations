 CHI_end_of_century_of_humiliation:0 "Ende des Jahrhunderts der Demütigung"
 CHI_end_of_century_of_humiliation_desc:0 "Das Jahrhundert der Demütigung – „Bainián Guóchi“ – auch unter anderen Bezeichnungen wie „Hundert Jahre der nationalen Demütigung“ bekannt, ist die Zeit der Intervention und des Imperialismus westlicher Mächte und Japans in China ab 1839. Der Begriff entstand 1915 in der Atmosphäre des erstarkenden chinesischen Nationalismus, der sich gegen die Einundzwanzig Forderungen der japanischen Regierung wandte."
 
