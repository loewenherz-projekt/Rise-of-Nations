 KMT_continuous_naval_production:0 "Marineproduktion"
 KMT_continuous_naval_production_desc:0 "Indem wir die Ressourcen auf unsere Werften konzentrieren und qualifizierte Schiffsbauer vom Militärdienst befreien, können wir die Produktionszeit für Schiffe drastisch verkürzen."
 KMT_continuous_air_production:0 "Luftproduktion"
 KMT_continuous_air_production_desc:0 "Wir können unsere Luftfahrtindustrie umstrukturieren, um Abfall zu vermeiden und die Produktion zu rationalisieren."
 KMT_continuous_non_factory_construct:0 "Bauingenieurwesen"
 KMT_continuous_non_factory_construct_desc:0 "In unserer Bauindustrie herrscht noch immer viel Nachholbedarf. Indem wir unsere Aufmerksamkeit darauf richten, können wir die Baugeschwindigkeit deutlich verbessern. Leider hat sich die Produktion von Werkzeugmaschinen als großer Engpass für die Expansion unserer Schwerindustrie erwiesen, sodass sie von den Bemühungen in diesem Bereich nicht profitieren wird. "
 KMT_continuous_reduce_training_time:0 "Armeeausbildung"
 KMT_continuous_reduce_training_time_desc:0 "Durch die Schaffung spezialisierter Fortbildungseinheiten innerhalb jeder Division können wir auch Divisionen an die Front schicken, die zuvor mit der Ausbildung zurückgehalten worden wären."
 KMT_continuous_suppression:0 "Unterdrückung von Resistenzen"
 KMT_continuous_suppression_desc:0 "Indem wir die großen Widerstandsgruppen in den besetzten Gebieten infiltrieren und ihre Anführer ausschalten, können wir den Schaden, den sie anrichten können, erheblich verringern."
 KMT_continuous_repair:0 "Baureparatur"
 KMT_continuous_repair_desc:0 "Wir werden spezialisierte Reparaturteams aus Fabrik- und Bauarbeitern bilden und ihren Einsatz zentral steuern, um den Wiederaufbau der beschädigten Infrastruktur zu verbessern."
 KMT_continuous_tech_share:0 "Technologieaustausch"
 KMT_continuous_tech_share_desc:0 "Wir werden unsere Forschungsinstitute und Universitäten dazu ermutigen, mit Partnern in verbündeten Ländern in Kontakt zu treten. Dadurch erhalten wir einen Bonus für den Austausch von Technologie."
 KMT_continuous_boost_freedom:0 "Mehr Autonomie"
 KMT_continuous_boost_freedom_desc:0 "Durch die Reorganisation unserer Kolonialbürokratie und die Anwerbung einheimischer Verwalter werden wir mit der Zeit in der Lage sein, unsere Angelegenheiten selbst in die Hand zu nehmen."
 KMT_continuous_restrict_freedom:0 "Unterdrücken von Themen"
 KMT_continuous_restrict_freedom_desc:0 "Unsere Kolonialisten haben ziemlich alberne Vorstellungen von Dingen wie „Selbstbestimmung“ oder „nationaler Unabhängigkeit“. Es ist an der Zeit, sie von diesen Vorstellungen abzubringen."
 KMT_continuous_request_lendlease:0 "Leih- und Pachtvertrag anfordern"
 KMT_continuous_request_lendlease_desc:0 "Unsere Industrieproduktion kann die im Feld verlorene Ausrüstung nicht schnell genug ersetzen. Unter solchen Umständen ist ausländische Hilfe für unsere Kriegsanstrengungen von entscheidender Bedeutung."
 ## 29/1/2017 ##
 KMT_science_effort:0 "Academia Sinica"
 KMT_science_effort_desc:0 "Die 1928 gegründete Academia Sinica überwacht und koordiniert die natur-, sozial- und geisteswissenschaftliche Forschung an allen staatlichen Forschungsinstituten und Universitäten der Republik China. Im Gegensatz zu anderen staatlich geförderten Forschungsinstituten ist die Academia Sinica direkt dem Präsidenten unterstellt."
