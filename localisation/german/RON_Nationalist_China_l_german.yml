 CHI_foreign_investments_cat:0 "Ausländische Investitionen in China"
 CHI_foreign_investments_cat_desc:0 "[CHI_foreign_investments_cat_desc_SL]\n\n[CHI_USA_sl][CHI_ENG_sl][CHI_FRA_sl][CHI_GER_sl][CHI_ITA_sl][CHI_SOV_sl][CHI_JAP_sl][CHI_TUR_sl][CHI_BRA_sl][CHI_AST_sl][INV_USA_sl][INV_ENG_sl][INV_FRA_sl][INV_GER_sl][INV_ITA_sl][INV_SOV_sl][INV_JAP_sl][INV_TUR_sl][INV_BRA_sl][INV_AST_sl]"
 
 CHI_CHI_foreign_investments_cat_desc:0 "Unser Land ist reich an Ressourcen und Möglichkeiten, aber es mangelt an modernen Unternehmen, die diese nutzen würden. Durch die Öffnung unseres Landes für ausländische Investoren könnten wir unseren Modernisierungsprozess beschleunigen und uns schneller an westliche Länder annähern. Wir müssen jedoch vorsichtig sein, denn ein zu großer Einfluss der Investoren könnte unsere innere Stabilität ernsthaft gefährden."
 CHI_INV_foreign_investments_cat_desc:0 "Jede Gelegenheit muss mit offenen Armen ergriffen werden. Wir haben uns darauf geeinigt, in China zu investieren, und das sollten wir auch tun. Schließlich ist es eine unauffällige Möglichkeit, den Einfluss in der Region zu vergrößern."
 
