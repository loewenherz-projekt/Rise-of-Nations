 KMT_become_communism:0 "Untergrundkommunisten"
 KMT_become_communism_desc:0 "Obwohl bei den beiden vorherigen Säuberungen der Kuomintang einige Kommunisten innerhalb der Partei eliminiert wurden, sind immer noch einige übrig."
 KMT_kill_mao:0 "Folgen Sie der Vierten Internationale"
 KMT_kill_mao_desc:0 "Trotzki hatte Recht. Stalin hat die Revolution und das Volk zugunsten der Bürokratie verraten. Wir dürfen nicht der korrupten Sowjetunion folgen, sondern müssen die Revolution fortsetzen."
 KMT_recognize_maos_government:0 "Arbeiten Sie mit CCP"
 KMT_recognize_maos_government_desc:0 "Die KPCh hat bereits eine eigene, gut organisierte Struktur aufgebaut. Ein Zusammenschluss mit ihr würde einen großen Beitrag zur Bauernrevolution leisten."
 KMT_privilege_to_proletarians:0 "Der Rote Putsch"
 KMT_privilege_to_proletarians_desc:0 "Die Zeit ist gekommen, wir werden uns gegen die korrupte Kuomintang erheben und dem Volk die Macht zurückgeben!"
 KMT_help_mao_infiltrate:0 "Infiltrieren Sie die lokalen Behörden"
 KMT_help_mao_infiltrate_desc:0 "Für Maos Männer wäre es schwieriger, in Gebiete einzudringen, da sie keine Mitglieder der Kuomintang sind. Wir hingegen können die Aufgaben leichter erledigen."
 KMT_invite_chen_duxiu:0 "Ch&#39;en Tu-hsiu einladen"
 KMT_invite_chen_duxiu_desc:0 "Ch&#39;en Tu-hsiu wurde nach dem Zusammenbruch der ersten Einheitsfront aus der KPCh ausgeschlossen. Er wurde daraufhin zu einer prominenten trotzkistischen Galionsfigur in China. Mit seinem Beitritt wird unsere Bewegung sicherlich mehr öffentliche Unterstützung gewinnen."
 ## 1/1/2018 ##
 KMT_join_comintern:0 "Zusammenarbeit mit der Sowjetunion"
 KMT_join_comintern_desc:0 "Da wir von Feinden umgeben sind, ist es ratsam, in den Reihen unserer Kameraden aus anderen Nationen Schutz zu suchen. Durch die Zusammenarbeit mit der Sowjetunion können wir unsere Position sichern und die Sache des Kommunismus weltweit voranbringen."
 KMT_boycott_the_comitern:0 "Unser eigener Weg"
 KMT_boycott_the_comitern_desc:0 "Die Sowjetunion ist vom wahren Weg des Marxismus-Leninismus abgekommen. Wir werden unseren eigenen Weg gehen und uns von der Korruption fernhalten, die die Revolution verraten hat."
 KMT_sov_advisors:0 "Sowjetische Hilfe"
 KMT_sov_advisors_desc:0 "Wir können unsere bolschewistischen Freunde um Unterstützung bitten, um unsere Entwicklung zu fördern."
 KMT_from_each_accoring_to_his_ability:0 "Von jedem nach seinen Fähigkeiten ..." #the whole slogan is too long to fit in the limited space of the focus name
 KMT_from_each_accoring_to_his_ability_desc:0 "Wenn die versklavende Unterordnung des Individuums unter die Arbeitsteilung verschwunden ist, wenn die Arbeit nicht nur ein Mittel zum Leben, sondern das wichtigste Bedürfnis des Lebens geworden ist und alle Quellen des genossenschaftlichen Reichtums reichlicher fließen, dann erst kann die Gesellschaft auf ihre Fahnen schreiben: Jeder nach seinen Fähigkeiten, jedem nach seinen Bedürfnissen!" #the whole paragraph is too long to fit in the limited space
