 umc_chi_inv.41.d:0 "Da der Einfluss von [FROM.GetName] einen Punkt erreicht hat, an dem sie Teile unserer Industrie nicht mehr indirekt, sondern vollständig kontrollieren, sind die Rohstoffgewinnung und -industrie in [606.GetName] in ihre Hände gefallen. Ihre Ausrüstung dient nun ausschließlich den Zwecken von [FROM.GetName].\n\nUnsere Wirtschaftspolitiker können nichts anderes tun, als still zu streiten und zuzusehen, wie unsere Wirtschaft weiterhin an Ausländer verkauft."
