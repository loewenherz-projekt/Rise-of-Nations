 ## 03/01/2020 ##
 KMT_dcat_central_government_desc:0 "Nach dem Austausch der Nordostflagge ist China nominell vereint. Die verschiedenen Kriegsherrencliquen genießen jedoch weiterhin ein hohes Maß an Autonomie in ihren jeweiligen Herrschaftsgebieten. Einige versuchen sogar, jeglichen Einfluss der Zentralregierung in ihrem Gebiet zu bekämpfen. Diese interne Spaltung zeigt sich darin, dass mehrere Provinzen den militärischen Zugang der Zentralregierung verweigern, selbst wenn es darum ging, die fliehenden kommunistischen Banditen während der fünften Einkreisungskampagne aufzuspüren und zu eliminieren. Die meisten Kriegsherren und Cliquen hoffen, den Status quo zu erhalten und ihre Gebiete zu verteidigen. Doch wer weiß, ob einer von ihnen den Versuch wagen würde, die nationale Führung zu übernehmen."
 KMT_dcat_central_government_nomaps_desc:0 "Nach dem Austausch der Nordostflagge ist China nominell vereint. Die verschiedenen Kriegsherrencliquen genießen jedoch weiterhin ein hohes Maß an Autonomie in ihren jeweiligen Herrschaftsgebieten. Einige versuchen sogar, jeglichen Einfluss der Zentralregierung in ihrem Gebiet zu bekämpfen. Diese interne Spaltung zeigt sich darin, dass mehrere Provinzen den militärischen Zugang der Zentralregierung verweigern, selbst wenn es darum ging, die fliehenden kommunistischen Banditen während der fünften Einkreisungskampagne aufzuspüren und zu eliminieren. Die meisten Kriegsherren und Cliquen hoffen, den Status quo zu erhalten und ihre Gebiete zu verteidigen. Doch wer weiß, ob einer von ihnen den Versuch wagen würde, die nationale Führung zu übernehmen."
 KMT_ps_tips:0 "Sie haben derzeit [?Root.KMT_ps_ip_spent|-0] Ihrer [?Root.KMT_ps_available_ip_max|+0] Einflusspunkte ausgegeben. \n===========================================\nJeder gültige Teilnehmer an einem Machtkampf verfügt immer über eine §HGrundmenge an Einflusspunkten§! (§H §G4§! für die Zentralregierung und §G1§! für Regionalmächte§!), mit §H1 zusätzlichem Einflusspunkt für jeweils 10 % Stabilität§!.\n\nDer Nationalgeist der §RKommunistischen Banditen§! verhindert die Verwendung von Einflusspunkten, aber jeder Staat, den er besitzt, erhöht passiv die Unterstützung der Bevölkerung, ohne dass Einflusspunkte zugewiesen werden müssen. Die Gründung einer Guerillazelle in Staaten führt zu einer weiteren Steigerung der Unterstützung in der Bevölkerung dieses Staates.\n\n§H Einflusspunkte können Staaten zugewiesen werden, um §HIhren Unterstützungszuwachs dort zu beschleunigen§!.\n§HDie Zentralregierung§! kann Einflusspunkte auch verwenden, um §Hdie Loyalität der Kriegsherren zu erhöhen§!.\nFür §HKriegsherren§! kostet §Hdie Aufrechterhaltung einer Allianz 1 Einflusspunkt§!.§!\n\n[This.GetInfluenceStateAmt][This.GetInfluenceLoyaltyAmt][This.GetInfluenceAllianceAmt]"
 ## 23/01/2020 ##
 KMT_dcat_chinese_focus:0 "Innere Stabilität"
 KMT_switch_focus_to_internal_stability:0 "Fokus auf interne Stabilität"
 KMT_switch_focus_to_internal_stability_desc:0 "Da die externe Bedrohung unerwartet verschwunden ist, können wir uns nun stattdessen auf die interne Stabilität konzentrieren."
 KMT_the_next_offensive_mission:0 "Die nächste Offensive"
 KMT_the_next_offensive_mission_desc:0 "Auf Befehl der Zentralregierung werden wir in Kürze eine weitere Offensive gegen die Kommunisten durchführen. Wir sind nicht in der Lage, diesem Befehl zu widersprechen, es sei denn, die Zentralregierung ist mit einer anderen dringenden Angelegenheit beschäftigt."
 ## 31/01/2020 ##
 KMT_dcat_skirmishes_with_commies:0 "Scharmützel mit den Kommunisten"
 KMT_dcat_skirmishes_with_commies_desc:0 "Wir wurden von der Zentralregierung mit der Haupttruppe zur „Banditenbekämpfung“ beauftragt. Von uns wird erwartet, die Überreste der Roten Armee der KPCh nach ihrer verheerenden „Flucht nach Westen“ schnell und vollständig zu vernichten. Wir haben diese kommunistischen Banditen jedoch maßlos unterschätzt und erlitten daher in fast jedem Gefecht eine vernichtende Niederlage. \n\nUnsere Männer sind zwar moralisch schwach und kampfunwillig, doch die Zentralregierung drängt uns weiterhin zu Angriffen in die Gebiete der kommunistischen Banditen."
 KMT_the_next_offensive_mission:0 "Die nächste Offensive"
 KMT_the_next_offensive_mission_desc:0 "Die Zentralregierung fordert, dass die nächste Offensive unabhängig von der Situation bald durchgeführt wird."
 KMT_seek_ceasefire_with_commie:0 "Waffenstillstand mit den Kommunisten"
 KMT_seek_ceasefire_with_commie_desc:0 "Da wir nun die Freiheit haben, unsere eigenen Entscheidungen zu treffen, können wir diese Gelegenheit auch nutzen, um einen Waffenstillstand mit den Kommunisten anzustreben."
 KMT_all_out_assault:0 "Der letzte Angriff"
 KMT_all_out_assault_desc:0 "[KMT_central_gov_tag.GetLeader] ist persönlich in [Root.Capital.GetName] eingetroffen, um unsere Banditenbekämpfung zu überwachen. Außerdem wurde ein Großangriff auf die kommunistischen Banditen gefordert. Diesem Befehl kann man nicht entkommen, es sei denn ..."
 KMT_arrest_chiang:0 "Halten Sie [KMT_central_gov_tag.GetLeader] als Geisel"
 KMT_arrest_chiang_desc:0 "[KMT_central_gov_tag.GetLeader]s Priorität auf innerer Stabilität würde Chinas Untergang bedeuten. Seine Tötung würde jedoch nur zu einer ähnlichen Situation wie nach Yuan Shikais Tod führen: Die regionale Macht würde China erneut in einen umfassenden Bürgerkrieg stürzen. Vor diesem Hintergrund ist es besser, ihn als Geisel zu nehmen, als einen Kurswechsel der Zentralregierung zu fordern."
 KMT_assasinatte_chiang:0 "Ermorden [KMT_central_gov_tag.GetLeader]"
 KMT_assasinatte_chiang_desc:0 "Nur der Tod von [KMT_central_gov_tag.GetLeader] kann den Wandel herbeiführen, der notwendig ist, damit China den aufziehenden Sturm übersteht. Wir werden tun, was getan werden muss."
 KMT_dcat_xian_incident:0 "Xian-Vorfallverhandlung"
 KMT_dcat_xian_incident_desc:0 "Chiang Kai-shek wurde von [ZXL.GetNameDef] als Geisel genommen, um die Zentralregierung zu zwingen, der externen Bedrohung Priorität einzuräumen. Verhandlungen zwischen der Zentralregierung und [ZXL.GetNameDef] laufen.\n\n @CHI[KMT_central_gov_tag.GetName]:\n[This.GetCGDemands][This.GetCGDemands2]\n\n @ZXL[ZXL.GetName]:\n[This.GetZXLemands][This.GetZXLemands2]\n\n @CHI[KMT_central_gov_tag.GetName]:[This.GetCGSignedStatus]\n @ZXL[ZXL.GetName]:[This.GetZXLSignedStatus]\n\n"
 KMTStopAllCivilWars:0 "              -Soll alle Bürgerkriege innerhalb der Nation beenden\n"
 KMTNoProsecution:0 "              - Das Personal von [ZXL.GetName], das am aktuellen Vorfall beteiligt war, soll nicht strafrechtlich verfolgt werden\n"
 KMTReleaseCKS:0 "              -Soll Chiang Kai-shek aus der Gefangenschaft entlassen\n"
 KMTSubmission:0 "              - Soll sich unverzüglich der Zentralregierung unterwerfen und unter der militärischen Führung der Zentralregierung neu organisiert werden\n"
 KMT_xian_incident_negotiate_mission:0 "Ungeduld innerhalb von [ZXL.GetName]"
 KMT_xian_incident_negotiate_mission_desc:0 "Da die Verhandlungen immer länger dauern, werden Soldaten und Generäle immer ungeduldiger. Sobald ihnen die Geduld ausgeht, werden sie [ZXL.GetLeader] mit Sicherheit entweder zur Hinrichtung Chiangs zwingen oder es selbst tun. In beiden Fällen wären die Folgen verheerend."
 KMT_dcat_liangguang_incident:0 "Liangguang-Vorfall"
 KMT_dcat_liangguang_incident_desc:0 "Die Kriegsherren des Südens waren schon immer gegen die Zentralregierung, jetzt bietet sich die Gelegenheit, uns die Entfernung der [YUT.GetName] zu ermöglichen."
 #KMT_attend_hhm_funeral_mission:0 "Hu Hanmin's Funeral"
 #KMT_attend_hhm_funeral_mission_desc:0 "Hu Hanmin, on of the most pretigeous individuals in the Republic, had passed away recently. If we fail to show up at his funeral, it may be seen as a disrespect to the man and the Republic."
 #KMT_attend_hhm_funeral:0 "Attend Hu Hanmin's Funeral"
 #KMT_attend_hhm_funeral_desc:0 "We will attend Hu Hanmin's funeral, and give a speech to garner public support."
 #KMT_attend_hhm_funeral_start_liangguang:0 "Meet [YUT.GetLeader] at the Funeral"
 #KMT_attend_hhm_funeral_start_liangguang_desc:0 "[YUT.GetLeader] has ruled [593.GetName] with great autonomy for quite some time and is evidently not the most loyal of officials. We will use the funeral as an opportunity to approach him and make him an "offer"."
 KMT_liangguang_negotiation_mission:0 "Verhandlung"
 KMT_liangguang_negotiation_mission_desc:0 "Zwischen [KMT_central_gov_tag.GetName] und [GXC.GetName] laufen Verhandlungen, um die bestmögliche Lösung für die aktuelle Situation zu finden."
 KMT_reputation_damaged_mission:0 "Mediendruck"
 KMT_reputation_damaged_mission_desc:0 "Aus irgendeinem Grund unterstützen die Medien und die Öffentlichkeit den verräterischen [GXC.GetName]. Dies wird sich negativ auf unsere Regierung auswirken."
