 ##### INV events
 ### Initial event - CHI opens up to F. INVESTMENTS
 umc_chi_inv.10.t:0 "[CHI.GetName] öffnet sich für ausländische Investitionen"
 umc_chi_inv.10.d:0 "Unser Botschafter in China wurde kürzlich von TV Soong kontaktiert und über die deutliche Änderung der chinesischen Politik gegenüber ausländischen Investitionen informiert. \n\nEs scheint, als ob China wieder für ausländische Investoren geöffnet wird. Es ist allgemein bekannt, dass China über große natürliche Vorkommen verfügt, die noch nicht vollständig ausgeschöpft sind. Dies bietet eine großartige Gelegenheit, unseren Einfluss in Asien zu stärken und unser wirtschaftliches Potenzial zu steigern."
 umc_chi_inv.10.a:0 "Eine großartige Gelegenheit, unseren Einfluss in China zu vergrößern."
 INV_invest_in_china_EXPL:0 "   Entwickeln Sie §HNaturressourcen§! und §HCivilianische Fabriken§! in [CHI.GetFlag]§H[CHI.GetName]§! und erhalten Sie im Gegenzug §HCivilianische Fabriken§! außerhalb der Karte.\n Erfüllen Sie verschiedene §HForderungen§!, wenn Sie genügend Einfluss gewinnen.\n"
 umc_chi_inv.10.b:0 "Kein Interesse."
 
 umc_chi_inv.11.t:0 "[FROM.GetName] stimmt weiteren Investitionen zu"
 umc_chi_inv.11.d:0 "Nach kurzer Zeit hat uns der Wirtschaftsminister von [FROM.GetName] kontaktiert und uns mitgeteilt, dass er an einer Ausweitung seiner Investitionen in China interessiert sei. Der Fokus liegt dabei vor allem auf der Entwicklung lokaler natürlicher Ressourcen und der damit verbundenen Fabriken.\n\nDa er nicht der einzige Interessent ist, sollten wir darüber nachdenken, welchen Ländern wir Einfluss auf unsere Wirtschaft gewähren lassen sollten und welchen nicht."
 umc_chi_inv.11.a:0 "Gut."
 CHI_FROM_will_be_able_to_invest_in_CHI_EXPL:0 "[FROM.GetFlag]§H[FROM.GetName]§! §GWird in der Lage sein,§! zusätzliche §HInvestitionen§! in unserem Land bereitzustellen.\n"
 umc_chi_inv.11.b:0 "Nicht sie."
 CHI_FROM_will_not_be_able_to_invest_in_CHI_EXPL:0 "[FROM.GetFlag]§H[FROM.GetName]§! §RWerden nicht in der Lage sein§!, zusätzliche §HInvestitionen§! in unserem Land bereitzustellen.\n"
 
 umc_chi_inv.12.t:0 "[FROM.GetName] Lehnen Sie die Investitionsmöglichkeit ab"
 umc_chi_inv.12.d:0 ""
 umc_chi_inv.12.a:0 "Ihr Verlust."
 
 ### CHI LOWERS our INFLUENCE
 umc_chi_inv.20.t:0 "[CHI.GetName] verringert unseren Einfluss"
 umc_chi_inv.20.d:0 ""
 umc_chi_inv.20.a:0 "Die Sicherung unserer Investitionen ist wichtiger als unser Einfluss in ihrem Land."
 umc_chi_inv.20.b:0 "Unsere Geschäfte mit ihnen sind beendet."
 
 umc_chi_inv.21.t:0 "[FROM.GetName] zieht seine Investitionen ab"
 umc_chi_inv.21.d:0 "Nach dem starken Rückgang ihres Einflusses in unserem Land hat [FROM.GetLeader] entschieden, dass es nicht im besten Interesse seines Landes ist, weiterhin in China zu investieren. Es wurden offizielle Empfehlungen herausgegeben, unsere Wirtschaft und Entwicklung nicht länger zu beeinträchtigen.\n\nObwohl nur wenige ausländische Investoren bleiben, haben die meisten begonnen, ihre Unternehmen hier langsam zu verkaufen und verlassen schließlich unser Land."
 umc_chi_inv.21.a:0 "Sie haben ihren Wert erfüllt."
 CHI_fi_FROM_nationalize_investments_dec_EXPL1:0 "Unsere §HStability§! wird §RLowered§! basierend auf dem verbleibenden §HInfluence§! von [FROM.GetFlag]§H[FROM.GetName]§!:\n"
 INV_will_no_more_invest_EXPL:0 "[FROM.GetFlag]§H[FROM.GetName]§! wird nicht mehr in unser Land §HInvestieren§!.\n"
 
 ### CHI NATIONALIZE our BUSINESS                   - COMPLETE (options should CANCEL investing in CHI & do something )
 umc_chi_inv.30.t:0 "[CHI.GetName] verstaatlicht unser Geschäft"
 umc_chi_inv.30.d:0 "Aus China trafen skandalöse Nachrichten ein. Offenbar haben nationalistische Truppen in der Nacht sämtliche Firmen und Geschäfte gestürmt und besetzt. Schlimmer noch: Die Regierung von [CHI.GetLeader] verurteilt diese Aktion nicht nur, sie scheint sie sogar offiziell zu unterstützen.\n\nSo eine Aktion kann jedoch nicht ohne angemessene Reaktion erfolgen. Unsere Führung kann diesen Verstoß gegen internationales Recht nicht ignorieren und muss sich schnell auf geeignete Maßnahmen gegen China einigen."
 umc_chi_inv.30.a:0 "Maßnahmen? Wir haben anderswo genug Probleme."
 umc_chi_inv.30.b:0 "Fordern Sie eine sofortige finanzielle Entschädigung."
 umc_chi_inv.30.c:0 "Der einzige Weg ist eine schnelle militärische Reaktion."
 
 umc_chi_inv.31.t:0 "[FROM.GetName] behält eine neutrale Haltung bei"
 umc_chi_inv.31.d:0 ""
 umc_chi_inv.31.a:0 "Das zeigt unsere Stärke."
 
 umc_chi_inv.32.t:0 "[FROM.GetName] fordert sofortige Entschädigung"
 umc_chi_inv.32.d:0 ""
 umc_chi_inv.32.a:0 "Ein kleiner Preis, der bezahlt werden muss."
 umc_chi_inv.32.b:0 "Das glauben wir nicht."
 
 umc_chi_inv.33.t:0 "[CHI.GetName] bietet Entschädigung"
 umc_chi_inv.33.d:0 ""
 umc_chi_inv.33.a:0 "Besser als nichts..."
 
 umc_chi_inv.34.t:0 "[CHI.GetName] ist mit der Entschädigung nicht einverstanden"
 umc_chi_inv.34.d:0 ""
 umc_chi_inv.34.a:0 "Wir müssen unsere Forderungen mit Gewalt durchsetzen."
 umc_chi_inv.34.b:0 "Wir haben hier versagt."
 
 umc_chi_inv.35.t:0 "[FROM.GetName] bereitet sich auf militärische Aktionen vor"
 umc_chi_inv.35.d:0 ""
 umc_chi_inv.35.a:0 "Wir werden nicht nachgeben."
 umc_chi_inv.35.b:0 "Das ging zu weit und wir sind darauf nicht vorbereitet."
 
 umc_chi_inv.36.t:0 "[CHI.GetName] Erträge und Angebote zur Bereitstellung einer vollständigen Entschädigung"
 umc_chi_inv.36.d:0 ""
 umc_chi_inv.36.a:0 "Das ist alles, was wir uns wünschen."
 umc_chi_inv.36.b:0 "Zu spät."
 
 umc_chi_inv.37.t:0 "[FROM.GetName] bricht militärische Vorbereitungen ab"
 umc_chi_inv.37.d:0 ""
 umc_chi_inv.37.a:0 "Das war knapp."

