 KMT_ps_alliance_benefits_tt:0 "Ihre Allianzmitglieder werden Ihnen zu Hilfe kommen, wenn Sie sich im Krieg mit der Zentralregierung befinden.\n\n§R Allianzmitglieder können sich jedoch entscheiden, die Allianz während ihres Krieges gegen die Zentralregierung zu verraten und zu einer dritten Partei zu werden.§!\n\n§HSie können auf diese Schaltfläche klicken, um Ihre aktuelle Allianz zu verraten und zur dritten Partei zu werden, wenn die folgenden Voraussetzungen erfüllt sind:§!\n[!KMT_benefits_modifiers_click_enabled]\n\nWirkung:\n[!KMT_benefits_modifiers_click]"
 KMT_ps_alliance_willingness_tt:0 "Folgendes beeinflusst die Bereitschaft der KI, Ihre Einladung oder Anfrage anzunehmen und Ihnen zu ermöglichen, in ihrer Allianz zu bleiben:\n§G+Sie haben Opposition erklärt\n+Sie hegen eine geringe Loyalität gegenüber der Zentralregierung\n+Sowohl Sie als auch das Ziel haben Opposition erklärt\n+Hohe Meinung Ihnen gegenüber\n+Befindet sich in Ihrer Nähe\n++Sie haben die Aufforderung der Zentralregierung, sich zu unterwerfen, abgelehnt§!\n§R-Sie haben nicht die gleiche Ideologie (insbesondere gegenüber Kommunisten)\n-Sie hegen eine hohe Loyalität gegenüber der Zentralregierung\n-Sie haben eine Meinung von weniger als -20 Ihnen gegenüber\n-Sie sind mächtiger als der Anführer der Allianz\n--Haben schon einmal eine andere Allianz verraten§!\n\n§RBevor Ihr Ziel Opposition erklärt hat, ist die Chance, dass es Ihre Anfrage annimmt, sehr gering§.!"
