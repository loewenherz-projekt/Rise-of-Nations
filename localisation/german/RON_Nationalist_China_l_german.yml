 KMT_if_have_1922_1936_ca_researched_tt:0 "\n§H Wenn ich die schweren Kreuzer von 1922 und 1936 erforscht habe:§!\n\n"
 KMT_if_have_not_1922_1936_ss_researched_tt:0 "\n§H Wenn Sie die U-Boote von 1922 und 1936 nicht erforscht haben:§!\n\n"
 KMT_if_have_1922_1936_ss_researched_tt:0 "\n§H Wenn ich U-Boote von 1922 und 1936 erforscht habe:§!\n\n"
 ## 17/3/2018 ##
 KMT_incorporate_warlord_forces:0 "[Root.GetIncorporateWarlordForcesName]"
 KMT_INTEGRATE_WARLORD_FORCES:0 "Integrieren Sie die Streitkräfte des Kriegsherrn"
 KMT_DESTROY_FACTIONS_IN_THE_ARMY:0 "Zerstöre Fraktionen in der Armee"
 KMT_DISBAND_MILITIA:0 "Milizen auflösen"
 KMT_incorporate_warlord_forces_desc:0 "[Root.GetIncorporateWarlordForcesDesc]"
 KMT_INTEGRATE_WARLORD_FORCES_DESC:0 "Unser derzeitiges Militär besteht aus zentralen Streitkräften und den Kriegsherren. Die Streitkräfte der Kriegsherren sind unseren Befehlen gegenüber jedoch nicht sehr gehorsam. Wenn wir ihr Vertrauen gewinnen könnten, hätten wir ein effizienteres Militär."
 KMT_DESTROY_FACTIONS_IN_THE_ARMY_DESC:0 "Da einige der Militärführer während unseres Putsches eine wichtige Rolle spielten, haben sie innerhalb unserer Armee Fraktionen gebildet, um ihre Positionen zu sichern. Obwohl sie keine Bedrohung für unsere Herrschaft darstellen, wäre es möglicherweise besser, diese Fraktionen zu entfernen, um die Koordination unserer Armee zu verbessern."
 KMT_DISBAND_MILITIA_DESC:0 "Während unserer Revolution gegen das korrupte alte Regime haben sich zahlreiche lokale Bauern und Arbeiter zusammengeschlossen und Milizen gebildet, um unsere Sache zu unterstützen. Diese Milizen sind jedoch lose organisiert und geraten manchmal sogar in Konflikte mit unserer regulären Armee. Es könnte an der Zeit sein, die Dinge ein wenig aufzurütteln."
 KMT_focus_on_our_own_army:0 "[Root.GetFocusOnCentralArmyName]"
 KMT_FOCUS_ON_CENTRAL_ARMY:0 "Fokus auf die Zentralarmee"
 KMT_ENCOURAGE_FACTIONALISM_IN_THE_ARMY:0 "Fördern Sie Fraktionalismus in der Armee"
 KMT_MILITIA_ASSAULT_TACTICS:0 "Miliz-Sturmtruppen"
 KMT_focus_on_our_own_army_desc:0 "[Root.GetFocusOnCentralArmyDesc]"
 KMT_FOCUS_ON_CENTRAL_ARMY_DESC:0 "Die undisziplinierten Streitkräfte der Kriegsherren verdienen unsere Aufmerksamkeit nicht. Sie dienen lediglich als Kanonenfutter und Köder, während unsere Zentralarmee unseren Feinden den Schlag versetzt."
 KMT_ENCOURAGE_FACTIONALISM_IN_THE_ARMY_DESC:0 "Während die Fraktionskämpfe in unserer Armee zu kleineren Schwierigkeiten bei der Koordination von Angriff und Verteidigung geführt haben, hat der Konkurrenzgeist der verschiedenen Fraktionen die Soldaten dazu veranlasst, härter zu kämpfen, um ihrer Clique Vorteile zu verschaffen. Wir können diese Phänomene nutzen, um eine schlagkräftigere Armee aufzubauen."
 KMT_MILITIA_ASSAULT_TACTICS_DESC:0 "Bauern und Arbeiter haben während unserer Revolution gegen das alte Regime lose organisierte Milizen gebildet. Diese Milizen verfügen zwar über unterdurchschnittliche Kampffähigkeiten, können aber als Sturmtruppen oder Kanonenfutter eingesetzt werden, um unsere Feinde zu zermürben, bevor unsere regulären Streitkräfte den entscheidenden Schlag ausführen."
 ## 12/4/2018 ##
 KMT_closer_tie_with_fra:0 "Wenden Sie sich an [FRA.GetName]"
 KMT_closer_tie_with_fra_desc:0 "Die [FRA.GetAdjective] haben den großen Krieg gewonnen und ihre Armee gilt als eine der stärksten der Welt. Wir könnten unsere vielleicht verbessern, wenn wir mit ihnen ein Abkommen schließen könnten."
 KMT_closer_tie_with_eng:0 "[ENG.GetAdjective] Hilfe"
 KMT_closer_tie_with_eng_desc:0 "Die fortschrittliche Technologie und Industrie der [ENG.GetAdjective] könnte uns einige Vorteile bringen, wenn sie sich bereit erklären, bei der Entwicklung unseres Landes mitzuhelfen."
 KMT_invite_foreign_investors:0 "Ausländische Investoren anziehen"
 KMT_invite_foreign_investors_desc:0 "Ausländisches Kapital wäre für die Industrie unseres Landes von Vorteil."
 KMT_closer_tie_with_usa:0 "Engere Verbindung mit [USA.GetName]"
 KMT_closer_tie_with_usa_desc:0 "Obwohl [USA.GetName] schwer unter der Weltwirtschaftskrise litt, ist es nach wie vor eine starke Wirtschaftsmacht. Ihre Stärke würde erheblich zu unserem technologischen und industriellen Fortschritt beitragen, wenn wir uns mit ihnen anfreunden."
 KMT_closer_tie_with_jap:0 "Zusammenarbeit mit dem [JAP.GetAdjective]"
 KMT_closer_tie_with_jap_desc:0 "Die Macht, die [JAP.GetAdjective] zeigt, ist überwältigend. Wir sollten uns unterwerfen und die Vorteile nutzen, die diese Stärke mit sich bringt!"
 KMT_civ_control_of_mil:0 "Zivile Kontrolle des Militärs"
 KMT_civ_control_of_mil_desc:0 "Derzeit steht die Nationale Revolutionsarmee unter der direkten Kontrolle von [Root.GetRulingParty]. Wir sollten die Kontrolle an die Zivilbevölkerung übergeben, um sicherzustellen, dass das Militär für das Volk und die Interessen der Nation kämpft und nicht für die der Partei."
 KMT_ministry_of_national_defense:0 "Ministerium für Nationale Verteidigung"
 KMT_ministry_of_national_defense_desc:0 "Für eine starke Nation ist eine zentrale nationale Verteidigungsbehörde unabdingbar."
 KMT_allow_commie:0 "Toleriere den Kommunismus"
 KMT_allow_commie_desc:0 "Der ideologische Konflikt zwischen uns und den Kommunisten hat dem Volk zu viel Leid zugefügt. Es ist Zeit für uns, diesen Konflikt zu beenden und den Wohlstand in der Zentralebene wiederherzustellen."
 KMT_military_dictatorship:0 "Militärdiktatur"
 KMT_military_dictatorship_desc:0 "Demokratie wird überbewertet. Ein Staat, der von einem Mann mit absoluter Macht regiert wird, ist effizienter als ein Staat, der von einem Haufen plappernder Clowns im Parlament regiert wird."
 KMT_our_own_fascism:0 "Faschismus chinesischer Prägung"
 KMT_our_own_fascism_desc:0 "Früher haben wir versucht, die Politik und Verwaltung anderer faschistischer Nationen zu imitieren, um unsere Stärke an die der großen Nationen anzunähern. Diese Versuche erwiesen sich jedoch als wirkungslos, da die Verantwortlichen die tatsächliche Situation in China ignorieren und blind folgen. Wir müssen Chinas wahre Bedürfnisse berücksichtigen und einen Faschismus entwickeln, der perfekt in das [Root.GetAdjective]-System passt."
 KMT_supreme_leader:0 "Festigung der Herrschaft unseres Führers"
 KMT_supreme_leader_desc:0 "Damit [Root.GetLeader] [Root.GetName] ins Rampenlicht der Welt rücken kann, müssen wir sicherstellen, dass die Richtlinien von [Root.GetLeader] ohne Hindernisse umgesetzt werden können."
 KMT_order_destroyers:0 "Zerstörer bestellen"
 KMT_order_destroyers_desc:0 "Wir haben ausländische Hilfe erhalten. Um unsere Marine zu verbessern, müssen wir die Konstruktion unserer Schiffe verbessern. Die Bestellung und Untersuchung ausländischer Zerstörer wäre ein guter Anfang."
 KMT_cruiser_researches:0 "Leichte Kreuzerforschung"
 KMT_cruiser_researches_desc:0 "Das Studium ausländischer Entwürfe für leichte Kreuzer würde unserer Marine zugutekommen."
 KMT_sub_researches:0 "U-Boot-Forschung"
 KMT_sub_researches_desc:0 "Die Effizienz, die U-Boote bei kommerziellen Angriffen zeigen, ist außergewöhnlich. Wir sollten uns stärker um einen uneingeschränkten U-Boot-Krieg bemühen."
 KMT_train_marines:0 "Marine-Trainingsprogramm"
 KMT_train_marines_desc:0 "Die zunehmende Bedeutung der amphibischen Kriegsführung macht die Entwicklung einer modernen amphibischen Angriffstruppe erforderlich."
 KMT_heavy_cruiser_researches:0 "Forschung zu schweren Kreuzern"
 KMT_heavy_cruiser_researches_desc:0 "Aufgrund ihrer großen Feuerkraft und hohen Geschwindigkeit auf See waren Schwere Kreuzer nach den Maßstäben dieser Zeit ein integraler Bestandteil einer starken Marine."
 KMT_coastal_patrol_planes:0 "Entwicklung von Marinebombern"
 KMT_coastal_patrol_planes_desc:0 "Die Mühe, ein Schiff zu bauen, wäre vergebens, wenn es versenkt würde. Flugzeuge hingegen sind vergleichsweise schneller zu bauen und leichter zu entbehren. Sie wären daher von großem Nutzen, um die Flottenstärke unserer Feinde zu verringern, bevor unsere eigene zur entscheidenden Schlacht eingreift."
 KMT_battleship_supremacy:0 "Schlachtschiff-Überlegenheit"
 KMT_battleship_supremacy_desc:0 "Mit ihrer überragenden Feuerkraft und Luftabwehrfähigkeit, gepaart mit einer undurchdringlichen Panzerung, symbolisieren diese Giganten auf See die absolute Dominanz über die Gewässer."
 KMT_naval_aviation:0 "Marineflieger"
 KMT_naval_aviation_desc:0 "Wenn wir unsere Feinde außerhalb ihrer Schussweite angreifen, nehmen wir ihnen die Möglichkeit, Vergeltung zu üben. Flugzeugträger werden der neue Standard einer starken Marine sein und ein neues Kapitel in der Seekriegsführung aufschlagen."
 KMT_saco:0 "SACO"
 KMT_saco_desc:0 "Das Ziel der Chinesisch-Amerikanischen Kooperationsorganisation besteht darin, unsere Armee nachrichtendienstlich zu unterstützen und auch Spezialeinheiten für Operationen auszubilden."
 KMT_hire_chennault:0 "Chennault mieten"
 KMT_hire_chennault_desc:0 "Die Notwendigkeit einer organisierten Luftwaffe kann nicht ignoriert werden. Claire Lee Chennault, ein pensionierter amerikanischer Pilot, verfügt über das dringend benötigte Wissen, um unsere Luftwaffe auf den neuesten Stand zu bringen. Wir sollten erwägen, ihn als unseren Luftfahrtberater einzustellen."
 KMT_cacw:0 "Chinesisch-Amerikanisches Verbund-Luftgeschwader"
 KMT_cacw_desc:0 "Das chinesisch-amerikanische Verbundgeschwader besteht aus chinesischen und amerikanischen Piloten und verfügt überwiegend über amerikanische Flugzeuge. Dieses neue Geschwader würde entscheidend dazu beitragen, den Kampf in der Luft für uns zu gewinnen."
 KMT_the_international_squadron:0 "Das internationale Geschwader"
 KMT_the_international_squadron_desc:0 "Chennault hat ein Söldnergeschwader aus Piloten verschiedener Nationalitäten organisiert. Dieses „Internationale Geschwader“ würde unserem Land auch einen Einblick in den Luftkampf ermöglichen."
 KMT_reorganise_the_air_force:0 "Reorganisieren Sie die Luftwaffe"
 KMT_reorganise_the_air_force_desc:0 "Da wir nun über ausreichende Einblicke und Kenntnisse in die Luftkämpfe verfügen, können wir eine gründliche Reform unserer Luftwaffe durchführen und sie auf den neuesten Stand bringen."
 
 KMT_improve_design:0 "Verbessern Sie das Design des Kampfflugzeugs"
 KMT_improve_design_desc:0 "Mit den neuen Erkenntnissen von Chennault können wir unsere Kampfflugzeugdesigns weiter verbessern."
 KMT_fighter_purchases:0 "Kämpferkäufe"
 KMT_fighter_purchases_desc:0 "Da unsere derzeitige Industrie mangelhaft ist, sollten wir auf den Import ausländischer Kampfflugzeuge setzen, um Einblicke in die Flugzeugherstellung zu gewinnen."
 KMT_develop_our_own_fighters:0 "Entwickeln Sie unsere eigenen Kämpfer"
 KMT_develop_our_own_fighters_desc:0 "Sobald die bestellten Kampfflugzeuge eingetroffen sind, können wir uns mit ihrem Design befassen und versuchen, einige funktionierende Nachbildungen herzustellen."
 KMT_the_burma_road:0 "Bau der Burmastraße"
 KMT_the_burma_road_desc:0 "Wir müssen nicht jahrelang darauf warten, dass die ausgelagerten Unternehmen die Burmastraße fertigstellen. Wir werden sie selbst bauen!"
 KMT_british_training:0 "[ENG.GetAdjective] Training"
 KMT_british_training_desc:0 "Wir sollten einige unserer Soldaten zur zusätzlichen Kampfausbildung in einige [ENG.GetAdjective]-Lager schicken."
 KMT_joint_burma_def_agreement_tt:0 "§GGewinne 5 Einheiten, wenn das§! §H[ENG.GetAdjective] Training§! §GNationalgeist erlischt.§!"
 KMT_setup_camco_assembly_plants:0 "Richten Sie CAMCO-Montagewerke ein"
 KMT_setup_camco_assembly_plants_desc:0 "Über die Burma Road kommen Flugzeugteile herein, wir sollten dort Montagewerke für eine optimale Flugzeugproduktion errichten."
 KMT_local_fighter_prod:0 "Lokale Kampfflugzeugproduktion"
 KMT_local_fighter_prod_desc:0 "Mit den in den Montagewerken erworbenen Fähigkeiten und Kenntnissen können wir jetzt vor Ort mehr Kampfflugzeuge produzieren."
 KMT_local_bomber_prod:0 "Lokale Bomberproduktion"
 KMT_local_bomber_prod_desc:0 "Mit den in den Montagewerken erworbenen Fähigkeiten und Kenntnissen können wir jetzt vor Ort Bomber in höherer Stückzahl produzieren."
 KMT_yunnan_bahn:0 "Die Yunnan-Haiphong-Eisenbahn"
 KMT_yunnan_bahn_desc:0 "Die Yunnan-Haiphong-Eisenbahn verbindet Haiphong in Indochina mit Kunming in Yunnan. Sie kann als praktikable Versorgungsroute dienen und einen stabilen Zustrom ausländischer Lieferungen gewährleisten."
 KMT_purchase_french_equipments:0 "Kauf [FRA.GetAdjective] Ausrüstung"
 KMT_purchase_french_equipments_desc:0 "Durch das Studium der [FRA.GetAdjective]-Ausrüstung können wir möglicherweise einen Blick auf die Geheimnisse einer starken Armee werfen."
 KMT_french_military_mission:0 "[FRA.GetAdjective] Militärische Mission"
 KMT_french_military_mission_desc:0 "Die Einstellung pensionierter Offiziere der französischen Armee als Berater würde unsere Bemühungen zur Reform unserer Armee unterstützen."
 KMT_french_drill:0 "[FRA.GetAdjective] Bohren"
 KMT_french_drill_desc:0 "Wenn wir den Standards der [FRA.GetAdjective]-Armee folgen, wird unsere Armee in kürzester Zeit so stark sein wie ihre."
 KMT_static_defense:0 "Statischer Verteidigungsfokus"
 KMT_static_defense_desc:0 "Man kann daraus schließen, dass die [FRA.GetAdjective] den Ersten Weltkrieg dadurch gewonnen haben, dass sie einen Abnutzungskrieg mit Hilfe der statischen Verteidigung gewonnen haben. Mit der uns zur Verfügung stehenden Mannzahl und den riesigen Gebieten wären wir sogar noch besser als die [FRA.GetAdjective] in der Lage, eine statische Verteidigung einzuführen und einen Abnutzungskrieg zu führen."
 KMT_mountaineers_training:0 "Bergsteigertraining"
 KMT_mountaineers_training_desc:0 "Das bergige Gelände in Yunnan erfordert ein spezielles Training, damit die Truppen im Kampf alle Vorteile nutzen können."
 KMT_defense_of_indo_china:0 "Angelegenheiten Indochinas"
 KMT_defense_of_indo_china_desc:0 "[FRA.GetName] ist gefallen. Wir können sie bitten, die Verteidigung Indochinas für sie zu übernehmen. Dies würde es ihnen ermöglichen, ihre Kräfte auf den europäischen Kriegsschauplatz zu konzentrieren."
 KMT_joint_tank_dev:0 "Gemeinsame Panzerentwicklung"
 KMT_joint_tank_dev_desc:0 "Mit dem Wissen ausländischer Panzerdesigner werden wir in kürzester Zeit in der Lage sein, unseren ersten gleichwertigen Panzer zu entwickeln."
 KMT_local_tank_assembly_plants:0 "Lokales Tankmontagewerk"
 KMT_local_tank_assembly_plants_desc:0 "Eine lokale Panzerproduktionslinie wird einen Meilenstein in der militärischen Entwicklung unseres Landes darstellen."
 KMT_mechanised_warfare:0 "Mechanisierte Kriegsführung"
 KMT_mechanised_warfare_desc:0 "Die Zeiten, in denen der Sieg durch das Werfen von Körpern auf den Feind errungen wurde, sind vorbei. Gepanzerte Fahrzeuge werden in zukünftigen Kriegen eine wichtige Rolle spielen."
 KMT_sino_soviet_non_agression_pact:0 "Chinesischer Nichtangriffspakt"
 KMT_sino_soviet_non_agression_pact_desc:0 "[SOV.GetName]s Stärke ist sehr einschüchternd. Wenn wir einen Nichtangriffspakt mit ihnen schließen könnten, könnten wir ihren Einfluss auf unser Land möglicherweise verhindern und vielleicht sogar davon profitieren."
 KMT_soviet_volunteer_groups:0 "[SOV.GetAdjective] Freiwilligengruppe"
 KMT_soviet_volunteer_groups_desc:0 "[SOV.GetName] hat grünes Licht für [SOV.GetAdjective] Luftfreiwillige gegeben, um unseren aktuellen Krieg zu unterstützen."
 KMT_purchase_soviet_aircrafts:0 "Kaufen Sie [SOV.GetAdjective] Flugzeuge"
 KMT_purchase_soviet_aircrafts_desc:0 "Wir brauchen dringend einsatzfähige Flugzeuge, um unsere Feinde zu bekämpfen. [SOV.GetNameDefCap] wäre ein großartiges Ziel für die Beschaffung von Flugzeugen."
 KMT_soviet_advisors:0 "Stellen Sie [SOV.GetAdjective] Militärberater ein"
 KMT_soviet_advisors_desc:0 "Das militärische Wissen von [SOV.GetName] würde unserer Entwicklung sicherlich helfen."
 KMT_soviet_tanks:0 "Kaufen Sie [SOV.GetAdjective] Panzer"
 KMT_soviet_tanks_desc:0 "[Root.GetSOVTankFocusDesc]"
 KMT_soviet_tanks_desc_1:0 "Um mit der Entwicklung der modernen Kriegsführung Schritt zu halten, benötigen wir eigene Panzertruppen. Derzeit verfügen wir jedoch nicht über die industriellen Kapazitäten, um eine eigene Panzerproduktionslinie aufzubauen. Der Import von Panzern aus [SOV.GetNameDef] würde vorerst ausreichen."
 KMT_soviet_tanks_desc_2:0 "Durch die Bestellung ausländischer Panzer könnten wir Einblicke in die Armeeentwicklung gewinnen."
 KMT_soviet_equipments:0 "Kaufe [SOV.GetAdjective] Ausrüstung"
 KMT_soviet_equipments_desc:0 "Durch das Studium der [SOV.GetAdjective]-Ausrüstung können wir möglicherweise einen Blick auf die Geheimnisse einer starken Armee werfen."
 KMT_chinese_general_staff:0 "Chinesischer Generalstab"
 KMT_chinese_general_staff_desc:0 "Der Generalstab hat sich als äußerst effizientes Gremium für strategische Planung erwiesen. Wir sollten versuchen, uns an ihm ein Beispiel zu nehmen und unseren eigenen Generalstab zu gründen."
 KMT_war_gaming_division:0 "Wargaming-Abteilung"
 KMT_war_gaming_division_desc:0 "Die Erweiterung unseres Generalstabs um eine Abteilung, die sich ausschließlich mit Kriegsspielen beschäftigt, würde die Qualität unserer Kriegspläne erheblich verbessern."
 KMT_german_tanks:0 "Bestellen Sie [GER.GetAdjective] Tanks"
 KMT_german_tanks_desc:0 "Die [GER.GetAdjective]s haben einige andere Vorstellungen über den Einsatz von Panzern als andere traditionelle Landmachtsmächte wie [FRA.GetName]. Wir könnten uns diese neuen Ideen vielleicht anschauen, indem wir ihre Panzerentwürfe untersuchen."
 KMT_falkenhausen_citizenship:0 "Schicken Sie Kadetten an [GER.GetAdjective] Akademien"
 KMT_falkenhausen_citizenship_desc:0 "Wenn wir Kadetten zum Studium ins Ausland an Militärakademien schicken, könnten wir vielleicht einen Einblick in fortgeschrittenere Militärstrategien gewinnen."
 ## 15/08/2018 ##
 KMT_jap_no_longer_a_threat_tt:0 "[JAP.GetName] stellt keine unmittelbare Bedrohung mehr für unser Land dar."
 ## 19/09/2018 ##
 KMT_voting_rights_desc:0 "[Root.GetNewConstitutionDesc]"
 KMT_voting_rights_normal_desc:0 "Die bisherige Verfassung reichte nicht aus, um Tyrannei und Korruption zu verhindern. Für den vollständigen Übergang zu einer demokratischen Republik brauchen wir eine neue Verfassung. Wahlrecht, Freiheitsrecht und ein System der gegenseitigen Kontrolle müssen eingeführt werden. China muss ein Rechtsstaat werden, nicht ein Menschenstaat."
 KMT_voting_rights_dictator_desc:0 "Die neue Institution soll die Position unseres Führers als alleiniger Herrscher des Landes festigen und eine rechtliche Grundlage dafür schaffen, jegliche Opposition im Keim zu ersticken."
 ## 24/10/2018 ##
 kmt_neutral_tp_tsingtao:0 "§Y[743.GetName]§! ist nicht im Besitz von §Y[Root.GetName]§! und der Besitzer hat Frieden mit §Y[Root.GetName]§! geschlossen."
