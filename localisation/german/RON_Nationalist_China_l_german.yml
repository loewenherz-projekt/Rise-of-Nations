 ## 03/02/2020 ##
 xian.15.e:0 "Wir werden [SOV.GetNameDef] beitreten!"
 xian.20.t:0 "[From.GetName] möchte sich uns anschließen"
 xian.20.d:0 "Während in Zentralchina ein weiterer Bürgerkrieg tobt, hat [From.GetLeader] die Gelegenheit genutzt, um zu versuchen, der Kontrolle der Zentralregierung zu entkommen und sich unserer glorreichen Union anzuschließen!"
 xian.20.a:0 "Willkommen an Bord, Kamerad!"
 xian.20.b:0 "Wir werden solche verräterischen Schweine nicht in die Union aufnehmen."
 xian.21.t:0 "[From.GetName] Akzeptiert"
 xian.21.d:0 "[From.GetName] hat uns in die Union aufgenommen."
 xian.21.a:0 "Herrlich!"
 xian.22.t:0 "[From.GetName] lehnt ab"
 xian.22.d:0 "[From.GetName] hat unseren Antrag auf Beitritt zur Union abgelehnt."
 xian.22.a:0 "Schade"
 xian.23.t:0 "[SIK.GetLeader] tritt [SOV.GetName] bei"
 xian.23.d:0 "[SIK.GetLeader] hat unseren Bürgerkrieg als Gelegenheit genutzt, der Kontrolle der Zentralregierung zu entgehen. Nachdem sie unser Personal in Sinkiang durch Massenverhaftungen und Hinrichtungen eliminiert haben, haben sie sich nun [SOV.GetNameDef] angeschlossen und [SIK.GetNameDef] gegründet."
 xian.23.a:0 "Was für ein Verrat!"
 KMT_will_not_prosecute_tt:0 "[ZXL.GetName] wird nicht strafrechtlich verfolgt\n"
 
 
 
 ## central government events ##
 claim_central.1.t:0 "Die Position der Zentralregierung"
 claim_central.1.d:0 "Obwohl [KMT_central_gov_tag.GetName] behauptet, die einzige legitime Regierung Chinas zu sein, findet diese arrogante Behauptung wenig Unterstützung. Angesichts der korrupten Bürokratie und der mangelnden Unterstützung der Bevölkerung ist klar, dass sie nicht länger geeignet sind, China zu regieren. Jetzt müssen wir diesen Tyrannen besiegen und das chinesische Volk befreien."
 claim_central.1.a:0 "Gehen Sie zu [KMT_central_gov_tag.Capital.GetName]!"
 KMT_can_claim_central_government_tt:0 "Nehmen Sie [KMT_central_gov_capital_state.GetName] und Sie können die Position der Zentralregierung beanspruchen."
 claim_central.2.t:0 "Wir sind die Zentralregierung!"
 claim_central.2.d:0 "Da [KMT_central_gov_tag.GetName] den Krieg verloren hat, ist ihre Legitimität nun nicht mehr vorhanden. Jetzt können wir ihre Position übernehmen und uns zur Zentralregierung und einzigen legitimen Regierung Chinas erklären."
 claim_central.2.a:0 "Ein herrlicher Tag!"
 claim_central.3.t:0 "Usurpation!"
 claim_central.3.d:0 "Die verräterischen Rebellen von [KMT_central_gov_tag.GetName] haben beschlossen, unsere Regierung zu stürzen und ihre eigene an die Macht zu bringen, um China zu beherrschen."
 claim_central.3.a:0 "Wie können sie es wagen!"
 KMT_central_gov_core_tt:0 "Gewinnen Sie Kerne in der Region China"
 claim_central.2.b:0 "Verlegen Sie unsere Hauptstadt nach Nanking."
 claim_central.0.t:0 "Prüfen"
 claim_central.0.d:0 "Die derzeitige Zentralregierung ist [KMT_central_gov_tag.GetName]"
 ## 25/4/2017 ##
 claim_central.4.t:0 "Geringe Legitimität"
 claim_central.4.d:0 "Wir haben die Kontrolle über die meisten unserer Provinzen verloren und unser Anspruch, die Zentralregierung zu sein, ist drastisch geschwächt."
 claim_central.4.a:0 "Unglücklich"
 claim_central.5.t:0 "Erhöhte Legitimität"
 claim_central.5.d:0 "Mit der Zunahme der von uns kontrollierten Bundesstaaten wird unser Anspruch als Zentralregierung durch die öffentliche Unterstützung gestützt."
 claim_central.5.a:0 "Hübsch"
 claim_central.6.t:0 "Niederlage der Zentralregierung"
 claim_central.6.d:0 "Wenn die Zentralregierung durch ausländische Kräfte besiegt wird, können wir diese Position nicht mehr für uns beanspruchen."
 claim_central.7.t:0 "Triumph im Bürgerkrieg"
 claim_central.7.d:0 "Mit unserem jüngsten Sieg im Bürgerkrieg haben wir erfolgreich die Position der Zentralregierung für uns beansprucht."
 claim_central.8.t:0 "Position der Zentralregierung geändert"
 claim_central.8.d:0 "[KMT_central_gov_tag.GetName] hat im jüngsten Bürgerkrieg gesiegt und die Position der Zentralregierung beansprucht."
 claim_central.8.a:0 "Wir haben noch unsere Chancen."
 ## 8/5/2017 ##
 KMT_diable_central_government_tt:0 "§RDie vorherige Zentralregierung wurde zerstört.§!"
 low_l:0 "Geringe Legitimität"
 ## 18/02/2020 ##
 claim_central.9.t:0 "Territoriale Ansprüche"
 claim_central.9.d:0 "Unsere Beamten haben einige Diskrepanzen zwischen unseren Gebietsansprüchen und denen der vorherigen Zentralregierung festgestellt. Was sollen wir tun?"
 claim_central.9.a:0 "Unsere Ansprüche stehen an erster Stelle!"
 claim_central.9.b:0 "Die Forderungen der Vorgängerregierung scheinen lukrativer zu sein."
 claim_central.9.c:0 "Erstrecken sich diese Behauptungen nicht bereits auf die gesamte Region Großchina?"
 ## 21/02/2020 ##
 claim_central.10.t:0 "Botschafter des Friedens"
 claim_central.10.d:0 "Mit dem jüngsten Wechsel in der chinesischen Führung hat eine neue Clique die Macht in der Zentralregierung übernommen. Diese neue Regierung hat ihre Bereitschaft gezeigt, den aktuellen Konflikt zu beenden, und mehrere Delegierte zu Friedensverhandlungen nach [Root.Capital.GetName] entsandt."
 claim_central.10.a:0 "Wir werden Frieden haben, wenn das Leben unserer gefallenen Soldaten gerächt ist!"
 claim_central.10.b:0 "Dann herrscht Frieden."
 claim_central.11.t:0 "[From.GetName] Friedensangebot abgelehnt"
 claim_central.11.d:0 "Die kriegstreiberischen Schurken in [From.Capital.GetName] haben unser Friedensangebot abgelehnt und darauf bestanden, dass unser aktueller Konflikt erst enden wird, wenn sie oder wir vernichtet sind."
 claim_central.11.a:0 "Also haben sie den Tod gewählt."
 claim_central.12.t:0 "[From.GetName] hat das Friedensangebot angenommen"
 claim_central.12.d:0 "Die Verhandlungen waren kurz, aber erfolgreich. Beide Parteien akzeptierten die Bedingungen und ein Friedensabkommen wurde unterzeichnet, das unseren Krieg mit dem Status quo ante bellum beendete. "
 claim_central.12.a:0 "Endlich."
 claim_central.13.t:0 "Das Ende der Allianz"
 claim_central.13.d:0 "Nachdem [From.GetLeader] erfolgreich die Position des nationalen Führers übernommen hat, gibt es für unsere Allianz, die ausschließlich dazu dient, [From.GetLeader] im Machtkampf gegen die vorherige Zentralregierung zu unterstützen, keine praktische Grundlage mehr für ihren Fortbestand."
 claim_central.13.a:0 "Wir schwören unserem Anführer immer noch Treue."
 claim_central.14.t:0 "[From.GetLeader] Hat die nationale Führung an sich gerissen"
 claim_central.14.d:0 "Nachdem unsere Streitkräfte die vorherige Zentralregierung erfolgreich zum Rücktritt gezwungen haben, scheint es logisch, dass der Anführer unserer Allianz den Sitz des nationalen Führers besteigen würde.\n\nIn einem Akt unvorstellbaren Verrats verkündet [From.GetLeader] jedoch, dass sie den Titel der Zentralregierung an sich gerissen haben und die Früchte des Sieges ganz für sich beanspruchen."
 claim_central.14.a:0 "Dieser elende Hund!"
 claim_central.15.t:0 "Das Ende der Allianz"
 claim_central.15.d:0 "Nachdem unsere Streitkräfte die vorherige Zentralregierung erfolgreich zum Rücktritt gezwungen haben, scheint es logisch, dass [Root.GetLeader] den Sitz des nationalen Führers besteigen würde.\n\nIn einem Akt unvorstellbaren Verrats verkündet [From.GetLeader] jedoch die Aneignung des Titels der Zentralregierung und beansprucht, was rechtmäßig uns zusteht!"
 claim_central.15.a:0 "[From.GetLeader] muss niedergeschlagen werden!"
 claim_central.16.t:0 "[KMT_central_gov_capital_state.GetName] an [From.GetName] übergeben?"
 claim_central.16.d:0 "Nach dem Ende unseres Kampfes gegen die vorherige Zentralregierung kontrollierten wir die Hauptstadt des ehemaligen Regimes. [From.GetLeader] hat nun darum gebeten, dass wir ihnen die ehemalige Hauptstadt übergeben, damit sie ihre Legitimität beweisen und der nächste Staatschef werden können."
 claim_central.16.b:0 "Natürlich"
 claim_central.16.a:0 "WIR sind jetzt die Zentralregierung!"
 claim_central.17.t:0 "[KMT_central_gov_capital_state.GetName] Erreicht"
 claim_central.17.d:0 "[From.GetLeader] hat [KMT_central_gov_capital_state.GetName] umgehend unter unsere Verwaltung gestellt."
 claim_central.17.a:0 "Jetzt können wir mit unserem Plan fortfahren."
 claim_central.18.t:0 "[From.GetLeader] beansprucht die nationale Führung in China"
 claim_central.18.d:0 "Der Machtkampf in China hat endlich ein kurzes Ende gefunden, als [From.GetLeader], Vorsitzender von [From.GetRulingParty], die nationale Führung von der vorherigen Regierung beansprucht. Die neue Zentralregierung hat bereits damit begonnen, einige politische Maßnahmen der vorherigen Regierung zu ändern. Einige erwarten, dass die neue Regierung ihre territorialen Ansprüche ausweitet, doch es ist unklar, ob dies der Wahrheit entspricht. \n\nDie größte Sorge der Parteien ist jedoch, ob die neue Regierung dem Weg der vorherigen folgen und von der Macht verdrängt werden wird."
 claim_central.18.a:0 "Interessante Entwicklung."
 ## 23/02/2020 ##
 claim_central.19.t:0 "[From.GetLeader] verkündet Opposition"
 claim_central.19.d:0 "Unzufrieden mit der Situation in China, insbesondere mit der Herrschaft von [KMT_central_gov.GetLeader], hat [From.GetLeader] offen seine Opposition gegen die Zentralregierung angekündigt."
 claim_central.19.a:0 "Interessant"
 claim_central.19.b:0 "Sie werden uns nicht usurpieren!"
 claim_central.20.t:0 "[From.GetLeader] Schwört Treue"
 claim_central.20.d:0 "Als Zeuge der Größe, die wir China gebracht haben, hat [From.GetLeader] uns seine bedingungslose Loyalität bekundet."
 claim_central.20.a:0 "Exzellent!"
 claim_central.21.t:0 "[From.GetLeader] schließt sich der Revolution an"
 claim_central.21.d:0 "Nachdem [From.GetLeader] das Versprechen des Kommunismus erkannt hat, hat er beschlossen, sich unserer Sache anzuschließen und gemeinsam für die Revolution zu kämpfen."
 
 
 ## Cairo Conference ##
 cairoC.1.t:0 "Eine Konferenz mit [CHI.GetName] und [ENG.GetName] abhalten?"
 cairoC.1.d:0 "Angesichts unseres anhaltenden Krieges mit [JAP.GetName] ist es nur vernünftig, dass wir zusammenstehen, um der [JAP.GetAdjective]-Bedrohung entgegenzutreten. Dazu sollten wir mit ihren Führern sprechen und eine engere Zusammenarbeit anstreben."
 cairoC.1.a:0 "Senden Sie die Nachricht."
 cairoC.1.b:0 "Es ist nicht notwendig."
 cairoC.2.t:0 "Nachricht von [From.GetName]"
 cairoC.2.d:0 "[From.GetLeader] hat eine Nachricht an [Root.GetLeader] gesendet, um den Wunsch nach einer engeren Zusammenarbeit zwischen denjenigen auszudrücken, die die Ambitionen von [JAP.GetName] behindern können. [CHI.GetLeader] ist ebenfalls eingeladen."
 cairoC.2.d_2:0 "[From.GetLeader] hat eine Nachricht an [Root.GetLeader] gesendet, um den Wunsch nach einer engeren Zusammenarbeit zwischen denjenigen auszudrücken, die die Ambitionen von [JAP.GetName] behindern können. [ENG.GetLeader] ist ebenfalls eingeladen."
 cairoC.2.a:0 "Vielleicht können wir davon profitieren."
 cairoC.2.b:0 "Wir können [JAP.GetName] ohne ihre Hilfe besiegen."
 cairoC.3.t:0 "[From.GetName] Akzeptiert"
 cairoC.3.d:0 "[From.GetLeader] hat [Root.GetLeader] geantwortet und erklärt, dass sie an der Konferenz teilnehmen werden."
 cairoC.3.a:0 "Gemeinsam sind wir stärker."
 cairoC.4.t:0 "[From.GetLeader] Abgelehnt"
 cairoC.4.d:0 "[From.GetLeader] hat unsere Einladung abgelehnt und erklärt, dass unsere Zusammenarbeit nicht im Geringsten notwendig sei."
 cairoC.4.a:0 "Was für eine Enttäuschung."
 cairoC.5.t:0 "Die Bedingungen"
 cairoC.5.d:0 "Nachdem alle Teilnehmer eingetroffen und alles vorbereitet war, konnte die Diskussion beginnen. Die folgenden Bedingungen wurden vorgelegt und warten auf ihre Genehmigung."
 cairoC.5.a:0 "Scheint akzeptabel."
 cairoC.5.b:0 "Ist das eine Art Betrug?"
 cairoC.6.t:0 "[CairoC_venue.GetName] Konferenz"
 cairoC.6.d_fail:0 "Trotz [USA.GetLeaders]s Versuch, eine engere Zusammenarbeit zwischen denjenigen zu erreichen, die [JAP.GetName]s Ambitionen stoppen könnten, scheiterte die Idee vollständig. Die Diskussion führte zu keiner Einigung, und einige befürchten, dass dies zu zukünftigen Konflikten zwischen den zur Konferenz Eingeladenen führen könnte, nachdem [JAP.GetName] besiegt wurde."
 cairoC.6.d_noUS:0 "Obwohl es [USA.GetLeader]s Idee war, endet die Konferenz mit [USA.GetLeader]s leerem Platz. [CHI.GetLeader] und [ENG.GetLeader] haben eine Vereinbarung getroffen, die [USA.GetLeader] nicht akzeptieren kann. [ENG.GetLeader] scheint jedoch ziemlich angewidert darüber zu sein, dass [CHI.GetName] aus den Bedingungen politischen Nutzen ziehen könnte.\n\nEinige Experten sagen, dass diese Konferenz dazu führen würde, dass sich das Verhältnis von [ENG.GetName] zu [USA.GetName] in den folgenden Jahren ziemlich schnell verschlechtern und sogar zu Blockaden innerhalb der demokratischen Welt führen könnte."
 cairoC.6.d_noBR:0 "[CHI.GetLeader] und [USA.GetLeader] haben eine Vereinbarung zur Bekämpfung der [JAP.GetAdjective]-Bedrohung getroffen. [ENG.GetLeader], der ebenfalls zur Konferenz eingeladen war, verließ die Konferenz jedoch aus nicht bekannt gegebenen Gründen, bevor er die Vereinbarung unterzeichnete.\n\nEs wird vermutet, dass [ENG.GetLeader] zurücktritt, weil die besprochenen Bedingungen seinen persönlichen Interessen zuwiderlaufen, da sie [CHI.GetName] enorme politische Vorteile verschaffen und den kolonialen Interessen von [ENG.GetName] in der Region schaden würden."
 cairoC.6.d_noCN:0 "Nach einer hitzigen Debatte verließ [CHI.GetLeader] die Konferenz unzufrieden, da die Bedingungen laut einem Sprecher von [CHI.GetName] als „inakzeptabel“ erachtet wurden. Zurück in [CairoC_venue.GetName] haben [ENG.GetLeader] und [USA.GetLeader] eine Vereinbarung unterzeichnet, die ihre Kriegsanstrengungen zur Niederlage von [JAP.GetName] unterstützen soll."
 cairoC.6.d_suc:0 "[ENG.GetLeader], [CHI.GetLeader] und [USA.GetLeader] haben nach langen Diskussionen eine Vereinbarung zur engeren Zusammenarbeit im Kampf gegen die [JAP.GetAdjective]-Bedrohung getroffen. Einige Experten sagen, diese Konferenz werde den Untergang von [JAP.GetName] in nicht allzu ferner Zukunft markieren, da drei der mächtigsten Nationen der Welt beschlossen haben, gemeinsam gegen [JAP.GetName] vorzugehen. Sollte das stimmen, könnte [JAP.GetAdjective] eine schwere Zeit bevorstehen."
 cairoC.6.a:0 "Nieder mit den [JAP.GetAdjective] Hunden!"
 cairoC.6.b:0 "Ein Kinderspiel..."
 cairoC.6.c:0 "Interessante Entwicklung..."
 cairoC.8.d:0 "Die folgenden Bedingungen wurden genehmigt und jetzt werden wir uns gemeinsam gegen die [JAP.GetAdjective]-Bedrohung stellen!"
 KMT_no_seperate_peace_with_JAP:0 "Wird nicht in der Lage sein, einen separaten Frieden mit [JAP.GetName] zu unterzeichnen.\nWenn [JAP.GetName] kapituliert, wird er Eigentümer aller von [JAP.GetAdjective] besetzten chinesischen Kerngebiete."
 ## 10/10/2017 ##
 cairoC.8.d_no:0 "Die Konferenz ist im Streit auseinandergebrochen und hat nichts Konstruktives hervorgebracht."
 cairoC.6.d_suc_2:0 "Alle eingeladenen Staats- und Regierungschefs haben sich nach langen Diskussionen auf eine engere Zusammenarbeit im Kampf gegen die [JAP.GetAdjective]-Bedrohung geeinigt. Einige Experten sagen, diese Konferenz werde in nicht allzu ferner Zukunft den Untergang von [JAP.GetName] markieren, da zwei der mächtigsten Nationen der Welt beschlossen haben, gemeinsam gegen [JAP.GetName] vorzugehen. Sollte das stimmen, könnte [JAP.GetAdjective] eine schwere Zeit bevorstehen."
 
 ## foreign supply routes ##
 kmt_fsr.15.t:0 "[From.GetNameDefCap] Teile der Yunnan-Haiphong-Eisenbahn werden wiedereröffnet"
 kmt_fsr.15.desc:0 "Nach der erfolgreichen Rückeroberung eines Großteils der Yunnan-Haiphong-Eisenbahn haben die Behörden den Verkehr auf der Strecke wieder zugelassen. Zwar machen Überreste feindlicher Truppen die Reise noch gefährlicher als zuvor, doch die Versorgung ist wieder gewährleistet."
 kmt_fsr.15.a:0 "Ein guter erster Schritt."
 kmt_fsr.16.t:0 "[From.GetNameDefCap] Wiedereröffnung der Yunnan-Haiphong-Eisenbahn"
 kmt_fsr.16.desc:0 "Der erste Versorgungskonvoi über die wiedereröffnete Yunnan-Haiphong-Eisenbahn hat heute Yunnan erreicht. Es wird zwar einige Zeit dauern, bis der Verkehr wieder reibungslos fließt, aber die Lieferungen erreichen uns wieder."
 kmt_fsr.16.a:0 "Tolle Neuigkeiten!"
 KMT_yunnan_bahn_reopen_state:0 "Die Yunnan-Haiphong-Eisenbahn wird in diesem Bundesstaat wiedereröffnet.\n" 
 
 ## power struggle ##
 kmt_powerstruggle.3.t:0 "[Root.GetInviteJoin]"
 KMTPSInvite:0 "[From.GetName] lädt uns zu ihrer Allianz ein"
 KMTPSJoin.3.t:0 "[From.GetName] möchte unserer Allianz beitreten"
 kmt_powerstruggle.3.d:0 "[Root.GetInviteJoinDesc]"
 KMTPSInviteDesc:0 "Mit der Absicht, ihr Bündnis zu erweitern, um dem Einfluss der Zentralregierung entgegenzuwirken, sendet [From.GetLeader] eine Einladung an [Root.GetLeader] mit der Bitte, in Zeiten der Not zusammenzukommen."
 KMTPSJoinDesc:0 "Da [From.GetLeader] erkannt hat, dass unsere Ziele übereinstimmen, hat er ein Treffen mit [Root.GetLeader] vereinbart, um den Beitritt zu unserer Allianz zu besprechen. Dies ist eine hervorragende Gelegenheit für uns, unseren Einfluss und unsere Macht zu erweitern."
 kmt_powerstruggle.3.a:0 "Gemeinsam stehen wir"
 kmt_powerstruggle.3.b:0 "Wir werden keine Wölfe zu unseren Häusern führen."
 kmt_powerstruggle.4.t:0 "[Root.GetLeftKick]"
 KMTPSLeft:0 "[From.GetName] verlässt die Allianz"
 KMTPSKick:0 "[From.GetName] wirft uns aus der Allianz"
 kmt_powerstruggle.4.d:0 "[Root.GetLeftKickDesc]"
 KMTPSLeftDesc:0 "Da unsere Ziele nicht mehr dieselben sind, kündigte [From.GetLeader] an, die Zusammenarbeit zwischen uns und ihnen mit sofortiger Wirkung einzustellen. Sie haben sich außerdem aus unserer Allianz zurückgezogen."
 KMTPSKickDesc:0 "Da [From.GetLeader] davon überzeugt ist, dass wir zu einer Belastung geworden sind, hat es beschlossen, uns aus seiner Allianz auszuschließen, mit der Begründung, dass unsere weitere Teilnahme an seinem Plan dessen Fortschritt nur bremsen würde."
 kmt_powerstruggle.4.a:0 "Diese heimtückischen Hunde!"
 kmt_powerstruggle.5.t:0 "[From.GetName] löst Allianz auf"
 kmt_powerstruggle.5.d:0 "[From.GetLeader] hat erkannt, dass ein drastischer Kurswechsel notwendig ist, und hat ein Treffen aller Allianzmitglieder einberufen. Da die Allianz aufgrund der jüngsten Entwicklungen in China ihren Zweck verloren habe, hat [From.GetLeader] beschlossen, sie aufzulösen."
 kmt_powerstruggle.5.a:0 "Sie wollen also allen Ruhm und alle Beute für sich beanspruchen!" 
 KMT_ps_we_joined:0 "§GWir sind der §H[From.GetName]§! Allianz§ beigetreten!"
 KMT_ps_joined_us:0 "§G§H[From.GetName]§! sind unserer Allianz beigetreten§!"
 kmt_powerstruggle.6.t:0 "[From.GetName] Akzeptiert"
 kmt_powerstruggle.6.d:0 "[From.GetName] hat unsere Anfrage angenommen und wir sind nun in derselben Allianz. Weitere Zusammenarbeit ist zu erwarten."
 kmt_powerstruggle.6.a:0 "Exzellent!"
 kmt_powerstruggle.7.t:0 "[From.GetName] lehnt ab"
 kmt_powerstruggle.7.d:0 "[From.GetName] hat uns die Möglichkeit verweigert, in einer für beide Seiten vorteilhaften Allianz zusammenzuarbeiten."
 kmt_powerstruggle.7.a:0 "Schade."
 kmt_powerstruggle.9.t:0 "[From.GetName] ist zu einer anderen Allianz gegangen"
 kmt_powerstruggle.9.d:0 "[From.GetName] hat vor Kurzem seinen Austritt aus unserer Allianz und einen neuen Plan für die Zusammenarbeit zwischen ihnen und [From.From.GetName] angekündigt."
 kmt_powerstruggle.9.a:0 "Opportunistische Hunde!"
 KMT_ps_left_for_another_tt:0 "§R§H[From.GetName]§! hat Ihre Allianz verlassen und ist §H[From.From.GetName]§!&#39;s§! beigetreten!"
 KMT_ps_alliance_dismatle_no_member_tt:0 "§RIhre Allianz wurde aufgrund von Mitgliedermangel automatisch aufgelöst§!"
 KMT_ps_alliance_dismantled_FROMFROM_tt:0 "§Die Allianz von R[From.From.GetName] wurde automatisch aufgelöst§!"
 KMT_ps_alliance_removed_tt:0 "§R[From.GetName]wurde automatisch aus deiner Allianz entfernt§!"
 kmt_powerstruggle.10.t:0 "Ein Ruf zu den Waffen"
 kmt_powerstruggle.10.d:0 "Ein Mitglied unserer Allianz befindet sich in bewaffneten Konflikten mit einem externen Gegner. Gemäß der ungeschriebenen Verfassung der Allianz müssen sich alle Mitglieder im Kriegsfall gegenseitig zu Hilfe kommen. Da dieser Konflikt mit Sicherheit bald zu einem umfassenden Krieg eskalieren wird, ist es für uns das Beste, unserem Verbündeten zu Hilfe zu kommen."
 kmt_powerstruggle.10.a:0 "Unsere vereinte Macht wird triumphieren!"
 kmt_powerstruggle.10.b:0 "Das ist Selbstmord! Wir geben auf!"
 kmt_powerstruggle.10.c:0 "Zeit, beide zu zerstören."
 kmt_powerstruggle.12.t:0 "[From.GetName] kommt uns zu Hilfe"
 kmt_powerstruggle.12.d:0 "[From.GetName] ist unserem Ruf zu den Waffen gefolgt und hat sich unserem Krieg angeschlossen."
 kmt_powerstruggle.12.a:0 "Wir werden triumphieren!"
 kmt_powerstruggle.13.t:0 "[From.GetName] schließt sich unserem Feind an"
 kmt_powerstruggle.13.d:0 "[From.GetName] hat beschlossen, sich auf die Seite unseres Feindes zu stellen und sich gegen uns zu stellen."
 kmt_powerstruggle.13.a:0 "Null plus Null ist immer noch Null."
 kmt_powerstruggle.14.t:0 "[From.GetName] lehnt den Ruf zu den Waffen ab"
 kmt_powerstruggle.14.d:0 "[From.GetName] ist der Ansicht, dass die Teilnahme an unserem Krieg für sie zu riskant ist, und hat beschlossen, sich vollständig aus der Allianz zurückzuziehen."
 kmt_powerstruggle.14.a:0 "So eine Feigheit!"
 kmt_powerstruggle.15.t:0 "[From.GetName] tritt zurück"
 kmt_powerstruggle.15.d:0 "Da unsere Macht unüberwindbar ist, hat [From.GetLeader] die weise Entscheidung getroffen, dem Ruf seines Verbündeten zu den Waffen nicht zu folgen."
 kmt_powerstruggle.15.a:0 "Leider müssen wir einen weiteren Krieg gegen sie führen."
 kmt_powerstruggle.16.t:0 "[From.GetName] gibt Drittanbieter an"
 kmt_powerstruggle.16.d:0 "Da sie unseren aktuellen Krieg als eine Möglichkeit sehen, alle ihre Feinde mit einem Schlag zu vernichten, haben sie [From.GetLeader] offen ihre Feindseligkeit uns und ihren früheren Verbündeten gegenüber erklärt."
 kmt_powerstruggle.17.t:0 "Zerstörung von [From.From.GetName]"
 #kmt_powerstruggle.17.d:0 "[This.GetKMTPS17Desc]"
 kmt_powerstruggle.17.d:0 "Mit der vollständigen Annexion von [From.From.GetName] durch [From.GetName] und dem Unvermögen der Allianzmitglieder, sich auf einen neuen Anführer zu einigen, kann sich die Allianz nicht länger selbst erhalten."
 #KMTPS17NewLeader:0 "The alliance is no more."
 kmt_powerstruggle.17.a:0 "Die Allianz besteht nicht mehr."
 kmt_powerstruggle.18.t:0 "Das Ende der Allianz"
 #kmt_powerstruggle.18.d:0 "[This.GetKMTPS18Desc]"
 kmt_powerstruggle.18.d:0 "Nach den jüngsten innenpolitischen Turbulenzen haben sie ihr Desinteresse an der Aufrechterhaltung ihres derzeitigen Bündnisses bekundet und sich anschließend umgehend aus allen Bündnisangelegenheiten zurückgezogen. Da man sich in der Frage des nächsten Anführers nicht einigen konnte, ist das Bündnis unwiederbringlich zerbrochen."
 #KMTPS18NewLeader:0 "After a recent upheaval in [From.GetAdjective] internal politics, they have announced their disinterest in maintaining their current alliance and prompty withdrawn from any alliance affairs afterwards. As the last remaining member of the alliance, we have automatically assumed leadership."
 kmt_powerstruggle.19.t:0 "[From.GetName] verrät die Allianz"
 kmt_powerstruggle.19.d:0 "In einem Akt des Verrats hat [From.GetName] seine Feindseligkeit gegenüber [From.From.GetName] offenbart. Nun werden wir entscheiden, ob wir uns gegen den Verräter verbünden oder diese zerfallende Allianz verlassen."
 kmt_powerstruggle.19.a:0 "Verrat wird nicht toleriert!"
 kmt_powerstruggle.19.b:0 "Diese Allianz ist voller verräterischer Maden, wir werden nicht länger bleiben."
 kmt_powerstruggle.20.t:0 "[From.GetName] möchte unser Militär eingliedern"
 kmt_powerstruggle.20.d:0 "Mit der Begründung, dass dies die Koordination zwischen unserem und ihrem Militär verbessern würde, hat [From.GetRulingParty] uns die Möglichkeit angeboten, unsere Armee offiziell in ihre zu integrieren."
 kmt_powerstruggle.20.a:0 "Zum Nutzen beider Seiten."
 kmt_powerstruggle.20.b:0 "Dies ist ein verräterischer Plan, unsere kostbare Autonomie zu untergraben!"
 kmt_powerstruggle.21.t:0 "[From.GetName] Military Incorporated"
 kmt_powerstruggle.21.d:0 "Wir haben das Militär von [From.GetName] erfolgreich integriert. Jetzt müssen wir ihm nur noch seine Autonomie nehmen, und schon bald wird ein vereintes China auf der Weltbühne erscheinen."
 kmt_powerstruggle.21.a:0 "Ausgezeichnet"
 kmt_powerstruggle.22.t:0 "[From.GetName] Abgelehnte Gründung"
 kmt_powerstruggle.22.d:0 "Aus Angst, dass ein solches Vorgehen ihre Autonomie untergraben würde, lehnte [From.GetName] unseren Vorschlag zur Eingliederung ihres Militärs ab. Dies stellt einen kleinen Rückschlag auf unserem Weg zur Verwirklichung eines vereinten Chinas dar."
 kmt_powerstruggle.22.a:0 "Sie werden sich uns nicht widersetzen."
 kmt_powerstruggle.23.t:0 "[From.GetName] gewinnt an Autonomie"
 kmt_powerstruggle.23.d:0 "Nach einer Reihe politischer Manöver von [From.GetLeader] haben sie sich schnell des Großteils unseres Einflusses innerhalb ihrer Regierung entledigt. Unser Einfluss auf sie ist deutlich geschwächt."
 kmt_powerstruggle.23.a:0 "Diese schleimigen Bastarde!"
 kmt_powerstruggle.24.t:0 "[From.GetName] sendet Ausrüstung"
 kmt_powerstruggle.24.d:0 "[From.GetName] hat uns einige Waffenvorräte geschickt und erklärt, dass sie als Zeichen der Freundschaft dienen würden."
 kmt_powerstruggle.24.a:0 "Wir nehmen das gerne an."
 kmt_powerstruggle.24.b:0 "Wir werden derartige Bestechungsversuche nicht akzeptieren."
 kmt_powerstruggle.25.t:0 "[From.GetName] nimmt unser Geschenk an"
 kmt_powerstruggle.25.d:0 "[From.GetName] hat die von uns gesendeten Waffen gerne angenommen."
 kmt_powerstruggle.25.a:0 "Sie kennen ihren Platz ganz sicher."
 kmt_powerstruggle.26.t:0 "[From.GetName] lehnt unser Geschenk ab"
 kmt_powerstruggle.26.d:0 "[From.GetName] hat unser Angebot abgelehnt und Berichten zufolge die von uns gesendeten Caches zerstört."
 kmt_powerstruggle.26.a:0 "So eine Unverschämtheit!"
 kmt_powerstruggle.27.t:0 "Gerüchte über die Gründung"
 kmt_powerstruggle.27.d:0 "Gerüchte, dass die Zentralregierung versucht, unsere Regierung zu übernehmen, sind bis [Root.GetLeader] vorgedrungen. Wenn wir unseren Untergang verhindern wollen, müssen wir jetzt handeln."
 kmt_powerstruggle.27.a:0 "Vielleicht wäre es besser, in die Zentralregierung integriert zu werden?"
 KMT_ps_break_free_tt:0 "§GSie können die Entscheidung „Befreien Sie sich von der Zentralregierung“ treffen, sich zu befreien und die Eingliederung zu stoppen§!\n"
 kmt_powerstruggle.28.t:0 "Eingetragen"
 kmt_powerstruggle.28.d:0 "Unsere Regierung wurde in die Zentralregierung integriert."
 kmt_powerstruggle.28.a:0 "Unsere Herrschaft ist vorbei."
 kmt_powerstruggle.29.t:0 "Ultimatum von [From.GetLeader]"
 kmt_powerstruggle.29.d:0 "Nachdem er genügend öffentliche Unterstützung gesammelt hatte, hat [From.GetLeader] seinen verräterischen Plan, unsere Position an sich zu reißen, vorangetrieben. Nun sind seine unverschämten Forderungen bei [Root.GetLeader] gelandet: Er fordert den sofortigen Verlust seines Amtes als Staatsoberhaupt und die Ernennung von [From.GetLeader] zum legitimen Nachfolger.\n\nDie Mehrheit der Beamten hat einen Präventivschlag gegen diese verräterischen Wiesel vorgeschlagen, doch angesichts der aktuellen Unterstützung in der Bevölkerung müssen wir mit Konsequenzen rechnen."
 kmt_powerstruggle.29.a:0 "Sie haben sich die Unterstützung der Bevölkerung verdient, vielleicht sollten sie auch unsere haben."
 kmt_powerstruggle.29.b:0 "Auf keinen Fall werden diese Schlangen [Root.GetLeader] aus dem Amt drängen!"
 kmt_powerstruggle.30.t:0 "[From.GetLeader] Zurückgetreten"
 kmt_powerstruggle.30.d:0 "Nach sorgfältiger Prüfung der Bedingungen des Ultimatums kam [From.GetLeader] schließlich zu dem Schluss, dass ein Nachgeben gegenüber unseren Forderungen das Beste für die Nation ist.\n\nWährend einer eilig einberufenen Zeremonie zur Machtübergabe von [From.GetLeader] an [Root.GetLeader] versprach [Root.GetLeader], dass China unter einer neuen Führung nie geahnten Ruhm und Reichtum erleben werde. Die Zeremonie endete mit tosendem Applaus zur Feier von [Root.GetLeader]s Machtübernahme."
 kmt_powerstruggle.30.a:0 "So viel Macht zu haben ..."
 kmt_powerstruggle.31.t:0 "[From.GetLeader] Abgelehntes Ultimatum"
 kmt_powerstruggle.31.d:0 "Kurz nach der Übermittlung des Ultimatums meldeten unsere Informanten die Mobilisierung von [From.GetAdjective]-Truppen gegen uns. Es ist offensichtlich, dass die Diplomatie gescheitert ist und das Schlachtfeld zum neuen Verhandlungstisch wird."
 kmt_powerstruggle.31.a:0 "Vergeblicher Widerstand."
 kmt_powerstruggle.32.t:0 "[From.GetLeader] Erklären Sie uns den Krieg"
 kmt_powerstruggle.32.d:0 "Nachdem [From.GetLeader] eine Liste unserer „Vergehen“ bei der Wahrung der nationalen Einheit veröffentlicht hatte, kündigte er den Beginn seines „Krieges zur Wahrung der chinesischen Einheit“ gegen uns an. Ob der Name ihrer Aggression irgendjemanden zu der Annahme verleitet hat, ihre Taten seien rechtmäßig, spielt keine Rolle. [Root.GetLeader] weiß, dass es sich dabei nur um eine Fassade für ihren hinterhältigen Usurpationsversuch handelt."
 kmt_powerstruggle.32.a:0 "Wir werden ihnen die Masken vom Kopf reißen!"
 kmt_powerstruggle.33.t:0 "Allianz aufgelöst"
 kmt_powerstruggle.33.d:0 "Ihre Allianz wird aufgrund fehlender Mitglieder aufgelöst."
 kmt_powerstruggle.33.a:0 "Wir kommen alleine zurecht."
 
 
 
 
 
