 CHI_GER_cooperation_I1:0 "Deutsch-Chinesische Zusammenarbeit"
 CHI_GER_cooperation_I1_desc:0 "Die Zusammenarbeit zwischen China und Deutschland begann 1926 mit dem dringenden Bedürfnis nach Modernisierung unseres Militärs und unserer nationalen Verteidigungsindustrie sowie Deutschlands Bedarf an einer stabilen Rohstoffversorgung. Dies brachte uns auf den Weg enger Beziehungen.\n\nHeute ist Deutschland unser größter Handelspartner. Sein Ministerium fördert regelmäßig große Investitionen in unserem Gebiet. Unsere Armee wird von erfahrenen deutschen Generälen unter der Führung von Falkenhausens ausgebildet.\n§W---------------§!\nDieser Nationalgeist wird §RRemoved§!, wenn [GER.GetFlag]§H[GER.GetName]§! §HAlexander von Falkenhausen§! abruft und die deutsch-chinesische Zusammenarbeit §REnds§! beendet."
