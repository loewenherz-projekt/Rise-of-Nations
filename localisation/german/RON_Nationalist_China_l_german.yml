 kmt.32.t:0 "Die Hundert-Blumen-Kampagne beginnt"
 kmt.32.d:0 "Die Hundert-Blumen-Kampagne ist gestartet. Jetzt müssen wir nur noch warten, bis die rechten Schweine auftauchen."
 kmt.32.a:0 "Lass hundert Blumen blühen, damit wir sie pflücken können."
 kmt.33.t:0 "Fortschritt der Kampagne"
 kmt.33.d:0 "Die Kampagne läuft erst seit wenigen Monaten, und schon jetzt kritisieren einige Anhänger des Kapitalismus die Regierung. Wir können diese Kampagne fortsetzen und weitere reaktionäre Schweine aus ihren Höhlen locken, aber ihre Ansichten könnten den Glauben der Bevölkerung an den Kommunismus schwächen."
 kmt.33.a:0 "Wir werden diese rechten Schweine jetzt verhaften."
 kmt.33.b:0 "Wir sollten mehr von ihnen herauslocken."
 kmt.34.t:0 "Mehr Kritik aus der Bevölkerung"
 kmt.34.d:0 "Je länger der Wahlkampf dauert, desto mehr Kritik erntet die Regierung. Wenn wir nicht bald die Fraktionsgewalt in die Hand nehmen, wird sich die Lage noch weiter verschärfen."
 kmt.34.a:0 "Wir werden den dissidenten Abschaum ins Gefängnis werfen."
 kmt.34.b:0 "Wir müssen geduldig sein."
 KMT_baihua_stage_2_tt:0 "Immer mehr Rechte schließen sich den Reihen der Kritiker an"
 kmt.35.t:0 "Kritik wird radikaler"
 kmt.35.d:0 "Anfangs war die Kritik milde. Doch mit der Zeit werden immer extremere Stimmen laut, die zum Handeln aufrufen. Wenn wir nicht bald handeln, droht uns eine Konterrevolution."
 kmt.35.a:0 "Wir werden dafür sorgen, dass sie nie wieder etwas sagen."
 kmt.35.b:0 "Sie sind nur die Lakaien der wahren Reaktionäre. Wir müssen warten, bis die Führer der Reaktion ihr Gesicht zeigen."
 KMT_baihua_stage_3_tt:0 "Kritik wird extremer"
 kmt.36.t:0 "Aufrufe zum Aufstand"
 kmt.36.d:0 "Während wir die radikalen Kommentare ignorieren, fordern einige Idioten den sofortigen Sturz der Volksregierung. Einige Kader fürchten um ihr Leben. Sollten wir die Kampagne jetzt beenden?"
 kmt.36.a:0 "Sie können sich jetzt nirgends mehr verstecken."
 kmt.36.b:0 "Wir haben fast alle Bastarde, nur noch ein paar Wochen und wir können ihnen allen mit einem Schlag die Köpfe abschlagen!"
 KMT_baihua_stage_4_tt:0 "Die Menschen verlieren allmählich den Glauben an den Kommunismus"
 kmt.37.t:0 "Am Rande des Zusammenbruchs"
 kmt.37.d:0 "Das Ausmaß und die Menge der verbalen Angriffe auf die Regierung sind unerträglich geworden. Um die Arbeiter- und Bauernrevolution zu schützen, müssen wir alle Unruhestifter sofort verhaften!"
 kmt.37.a:0 "Im Interesse der Partei müssen wir jeglicher Opposition ein Ende setzen. Und zwar dauerhaft."
 baihua_end_now:0 "Die Kampagne endet jetzt.\n"
 kmt.39.t:0 "Der große Sprung nach vorn beginnt"
 kmt.39.d:0 "Der Große Sprung nach vorn hat begonnen. Bald werden wir einen totalen und wissenschaftlichen Kommunismus erreichen!"
 kmt.39.a:0 "Wir werden die westliche Welt übertreffen!"
 kmt.40.t:0 "Hinterhoföfen gebaut"
 kmt.40.d:0 "Einige Menschen haben ohne staatliche Intervention ihre eigenen Öfen im Hinterhof gebaut. Dies ist ein wahres Zeichen der Einheit unserer Nation."
 kmt.40.a:0 "Mit solchen Fortschritten werden wir die westliche Welt im Handumdrehen überholen!"
 kmt.43.t:0 "Hungersnot"
 kmt.43.d:0 "In einigen unserer Provinzen herrscht Hungersnot, weil die Bauern ihre landwirtschaftlichen Geräte in die Öfen warf. Ohne die entsprechende Ausrüstung kann niemand die Ernte einbringen. Die geernteten Ernten werden ins Ausland geschickt, um Industrieanlagen zu finanzieren."
 kmt.43.a:0 "Aber den Berichten zufolge sind die Ernteerträge um 400 % gestiegen …"
 kmt.46.t:0 "Der große Sprung nach vorn ist rückwärts gelandet"
 kmt.46.d:0 "Nach einem Parteitag beschloss Vorsitzender Mao mit großem Bedauern, den Großen Sprung nach vorn zu beenden. Die Leichen verhungerter Bauern und Roheisenreste liegen überall auf dem Land. Es stellt sich heraus, dass man im eigenen Hinterhof doch keinen Stahl herstellen kann."
 kmt.46.a:0 "Der Große Sprung nach vorn hat China eher eine Hungersnot als einen Fortschritt beschert."
 kmt.47.t:0 "Mao besuchte die örtliche Kommune"
 kmt.47.d:0 "Der Vorsitzende Mao war äußerst erfreut über das Engagement der Bauern einer Kommune in Henan. Um ihren proletarischen Geist zu ehren, gab er solchen Kommunen in ganz China seinen Segen."
 kmt.47.a:0 "Unsere Leute sind der Partei wirklich ergeben!"
 kmt.49.t:0 "China möchte der Komintern beitreten."
 kmt.49.d:0 "Unsere Genossen in der KPCh haben große Fortschritte gemacht. Sie sind wirklich bereit, sich ernsthaft der Weltrevolution anzuschließen."
 kmt.49.a:0 "Eine willkommene Ergänzung."
 kmt.49.b:0 "Nein! Dieser Mao ist ein linker Opportunist!"
 ## 4/7/2016 ##
 kmt.52.t:0 "China fordert Territorium"
 kmt.52.d:0 "Nachdem [CHI.GetName] dieses Land als ihr Kerngebiet beansprucht hat, verlangt es nun, dass es ihnen bedingungslos übergeben wird."
 kmt.52.a:0 "Gegen ihre ganze Macht haben wir keine Chance."
 kmt.52.b:0 "Geiziger chinesischer Abschaum! Die wollen keinen Zentimeter!"
 kmt.53.t:0 "Zurückgegebene Kerne"
 kmt.53.d:0 "Unsere rechtmäßigen Gebiete sind zurück!"
 kmt.53.a:0 "Wir sollten von nun an eine weitere Expansion planen."
 kmt.54.t:0 "Nachfrage abgelehnt"
 kmt.54.d:0 "Diese Barbaren haben unsere friedliche Forderung zurückgewiesen und zwingen uns, die Situation mit Gewalt zu lösen."
 kmt.54.a:0 "Barbaren müssen gesäubert werden!"
