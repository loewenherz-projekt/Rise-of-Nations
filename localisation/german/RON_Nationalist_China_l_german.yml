 CHI_alexander_von_falkenhausen_desc:0 "Alexander von Falkenhausen dient seit 1930 als Militärberater von Chiang Kai-shek. Er leitet eine deutsche Militärmission, deren Ziel es ist, die chinesische Armee und Wirtschaft auf westliches Niveau zu bringen. Seine Verdienste und Fortschritte sind zweifellos von großem Nutzen für die NRA. Es muss in unserem größten Interesse sein, die deutsch-chinesische Zusammenarbeit so lange wie möglich aufrechtzuerhalten."
 
