 umc_chi.105.a:0 "Der Bürgerkrieg geht also weiter."
 
 umc_chi.106.t:0 "Zusammenarbeit zwischen KMT und KPCh verbessert sich"
 umc_chi.106.d:0 "Nach unserer Vereinigung mit dem kommunistischen Teil Chinas einigten sich die Kuomintang und die Kommunistische Partei Chinas auf Koexistenz und Zusammenarbeit, um China, seinem Volk und seinen Interessen das bestmögliche Schicksal zu sichern. Auch wenn diese Zusammenarbeit nicht immer einfach ist, sichert sie unserem Land die dringend benötigte Stabilität, den Fortschritt und die Einheit gegen ausländische Bedrohungen.\n\nNach einiger Zeit verläuft die Zusammenarbeit nun reibungsloser denn je. Gelegentliche Unruhen und Verschwörungen werden erfolgreich bewältigt, die radikalsten Mitglieder beider Parteien werden entweder ihrer Ämter enthoben oder entfernt. Die Stimmen, die an diesen friedlichen Lösungen zweifelten, werden immer leiser, während die allgemeine Unterstützung dafür größer ist denn je.\n\nEs besteht kein Zweifel daran, dass [CHI.GetLeader]s Entscheidung die richtige war, und er wird als Chinas größter Führer seit Sun Yat Sen gefeiert."
 umc_chi.106.a:0 "Einheit wird unsere Nation stärken."
 
 umc_chi.107.t:0 "Die Zusammenarbeit zwischen KMT und KPCh nimmt ab"
 umc_chi.107.d:0 ""
 umc_chi.107.a:0 ""
 
 umc_chi.108.t:0 "CPC erkennt die Vorteile der Zusammenarbeit an"
 umc_chi.108.d:0 "Die Zusammenarbeit zwischen Kuomintang und Kommunistischer Partei Chinas läuft so gut, dass selbst die enthusiastischsten und radikalsten Mitglieder erkennen, wie vorteilhaft diese Einheit für China (und sie selbst) ist. Sie beginnen, die Interessen Chinas über ihre eigenen oder die ihrer Partei zu stellen – und erhöhen so die Stabilität unseres Landes. Heutzutage gibt es keine lauten Zweifel mehr an [CHI.GetLeader]s Entscheidung, unser Land friedlich zu vereinen. Alle arbeiten zum Wohle Chinas, und unser Land ist stärker denn je!"
 umc_chi.108.a:0 "KMT und CPC vereint."
 umc_chi.108.a_EXPL:0 "Der politische Berater §HMao Zedong§! erhält eine bessere §HTeigenschaft§!.\n"
 
