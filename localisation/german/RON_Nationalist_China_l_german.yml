 KMT_communists_overthrow_white_peace_window_mission:0 "Option „White Peace“ verfügbar"
 KMT_communists_overthrow_white_peace_window_mission_desc:0 "Wir haben das alte Regime gestürzt. Dies eröffnet unserem kriegszerrütteten Land die Möglichkeit, sich aus dem aktuellen Krieg zurückzuziehen. Wenn wir jedoch nicht bald reagieren, könnten die Leute denken, wir würden den Krieg fortsetzen, und es wäre zu spät, jetzt einen weißen Frieden anzustreben."
