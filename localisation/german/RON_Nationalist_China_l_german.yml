 umc_chi.109.a:0 ""
 
 ### REQUEST CHIANG CHING-KUO'S RETURN
 umc_chi.110.t:0 "[CHI.GetName] fordert Chiang Ching-kuos Rückkehr"
 umc_chi.110.d:0 "Chiang Ching-kuo ist der älteste und einzige leibliche Sohn von Chiang Kai-shek. Als Teenager wurde er 1925 während der Ersten Einheitsfront zum Studium in die Sowjetunion geschickt, als die Nationalistische Partei seines Vaters und die Kommunistische Partei Chinas ein Bündnis bildeten. Er besuchte dort die Universität, doch als die chinesischen Nationalisten gewaltsam mit den Kommunisten brachen, wurde er zur Arbeit in eine Stahlfabrik im Uralgebirge geschickt. Chiang Kai-shek lehnte es ab, über einen Gefangenenaustausch seines Sohnes gegen einen Führer der Kommunistischen Partei Chinas zu verhandeln, mit der Begründung: „Es lohnt sich nicht, die Interessen des Landes für meinen Sohn zu opfern.“\n\nJetzt jedoch, angesichts unserer jüngsten Annäherung an das nationalistische China, scheint es rentabler, sich erneut auf die Seite der Nationalisten statt der Kommunisten zu stellen. Und wer könnte dieses potenzielle Bündnis besser sichern als der Sohn des Führers, der bereits die größten Helden des kommunistischen Regimes in sich trägt?"
 umc_chi.110.a:0 "Er könnte uns zu Hause nützlich sein."
 umc_chi.110_EXPL:0 "\nDurch Auswahl dieser Option werden prokommunistische und prosowjetische Schwerpunkte für [CHI.GetFlag]§H[CHI.GetName]§! §CEntsperrt§!.\n"
 umc_chi.110.b:0 "Er wird hier bleiben, als Absicherung."
 
 umc_chi.111.t:0 "[SOV.GetName] Gibt Chiang Ching-kuo zurück"
 umc_chi.111.d:0 "Nach unserer Annäherung an die Sowjetunion akzeptierte deren Führer [SOV.GetLeader] unsere Forderungen nach der Rückkehr von Chiang Ching-kuo, dem einzigen Sohn von Chiang Kai-shek. Er wurde zusammen mit seiner aus Weißrussland stammenden Frau Faina Ipat&#39;evna Vakhreva und ihrem Sohn Hsiao-wen sicher aus Swerdlowsk überführt.\n\nNach seiner Ankunft in China wurde ihm ein Tutor, Hsu Dau-lin, zugewiesen, der ihm bei der Wiedereingliederung in China helfen sollte."
 umc_chi.111.a:0 "Er wird hier zu Hause nützlich sein."
 
 umc_chi.112.t:0 "[SOV.GetName] weigert sich, Chiang Ching-kuo zurückzugeben"
 umc_chi.112.d:0 ""
 umc_chi.112.a:0 "Wir werden ihn holen."
 
 ### CHIANG CHING-KUO EVENTS
 umc_chi.120.t:0 "Ching-kuos Kampf gegen Korruption, Opiumkonsum und Analphabetismus"
 umc_chi.120.d:0 "Sobald Chiang Ching-kuo zum Spezialisten für die abgelegenen Gebiete Jiangxis ernannt worden war, ergriff er energische Maßnahmen zur Bekämpfung von Korruption, Opiumkonsum und Analphabetismus. Viele beobachten seine Schritte mit großem Interesse, da Chiang Kai-Shek Sohn den Chinesen bis vor kurzem nahezu unbekannt war. Andere befürchten, dass sein Handeln ihre gesicherten Positionen gefährden oder ihre Geschäfte beeinträchtigen könnte. Eines ist sicher – es ist nicht das letzte Mal, dass wir von Chiang Ching-kuo und seinem Wirken in China gehört haben."
 umc_chi.120.a:0 "Mal sehen, was er kann."
 
 umc_chi.121.t:0 "Gannan New Deal"
 umc_chi.121.d:0 "1939 wurde Chiang Ching-kuo zum Kommissar der Präfektur Gannan ernannt, wo er sofort seine Erfolge als Spezialist für Jiangxi fortsetzte. Er verbot Rauchen, Glücksspiel und Prostitution, studierte Regierungsführung, ermöglichte wirtschaftliche Expansion und einen Wandel der gesellschaftlichen Perspektive. Dadurch erreichte er soziale und wirtschaftliche Stabilität und stärkte die Unterstützung der Bevölkerung für die Kuomintang. Sobald diese Hauptziele erreicht waren, konzentrierte er sich auf die Stärkung von Bildung und Kultur und nutzte dabei sein in der Sowjetunion erworbenes Wissen. Dies sollte durch die Erhöhung der Zahl der Volks- und Mittelschulen sowie durch eine Politik zur Beseitigung des Analphabetismus erreicht werden. Auch Zeitungen und andere Medien sollten ausgebaut werden.\n\nDie Eckpfeiler seines ersten Dreijahresplans für die Süd-Süd-Bewegung sind die Beseitigung des in der Gesellschaft verankerten Feudalismus, die Stärkung des Nationalismus und die Verbesserung der Produktionskompetenzen bei der Umsetzung einer nationalen Erziehung auf Grundlage der Drei Prinzipien von Sun Yat-sen.\n\nSeine Bemühungen werden als Wunder im politischen Krieg in China gefeiert und als „Gannan New Deal“ bezeichnet. Einige Mitglieder der Kuomintang kritisieren ihn jedoch auch für die Verwendung beinahe kommunistischer Methoden und sagen, dass „Chiang Ching-kuo ein echter Kommunist ist und Südchina bereits rot ist“."
 umc_chi.121.a:0 "Es ist ein strahlender Morgen in China."
 
 umc_chi.122.t:0 "Aber was ist mit den Prostituierten?"
 umc_chi.122.d:0 "Nach dem Verbot der Prostitution in der Präfektur Gannan führte Chiang Ching-kuo eine Politik ein, die ehemalige Prostituierte in Fabriken beschäftigte. Obwohl diese Politik zunächst mit einer gewissen Skepsis aufgenommen wurde, besteht kein Zweifel daran, dass sie positive Auswirkungen auf ganz Gannan hat."
 umc_chi.122.a:0 "Gannan ist ein Beispiel."
 
 umc_chi.123.t:0 "Formulare des Sanmin Zhuyi Jugendkorps"
 umc_chi.123.d:0 "Das paramilitärische Sanmin Zhuyi Jugendkorps wurde kürzlich im Auftrag von Chiang Ching-kuo gegründet, um die Kontrolle und Ordnung in der Präfektur Gannan aufrechtzuerhalten. Bestehend aus jungen Kadetten, die von Wang Sheng, einem engen Freund Ching-kuos, ausgebildet wurden, stellt es nun einen weiteren kleinen Machtbereich in Shanxi dar, mit dem man rechnen muss."
 umc_chi.123.a:0 "Dies trägt dazu bei, die Kontrolle zu sichern."
 umc_chi.123.a_EXPL:0 "Gewinnen Sie §H2§! Milizdivisionen in Jiangxi.\n" 
 
 
