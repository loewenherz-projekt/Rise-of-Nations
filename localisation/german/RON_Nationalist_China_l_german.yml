 ### KUOMINTANG CORRUPTION
 umc_chi.70.t:0 "Korruption in der Kuomintang"
 umc_chi.70.d:0 "Die Kuomintang Chinas, 1919 von Sun Yat-sen gegründet, ist seit 1928 die alleinige Regierungspartei der Republik China. Nach Sun Yat-sens Tod 1925 fiel die politische Führung der KMT an Wang Jingwei und Hu Hanmin, die beiden Parteiführer des linken bzw. rechten Flügels. Die wahre Macht lag jedoch in den Händen von Chiang Kai-shek, der als Leiter der Whampoa-Militärakademie nahezu die vollständige Kontrolle über das Militär innehatte.\n\nHeute, lange nach ihrer Gründung, ist die Kuomintang von Korruption und Missverhältnissen durchzogen. Und die Lage verschlechtert sich täglich, da die Stabilität unseres Staates abnimmt und die Menschen sich mehr um sich selbst als um die chinesische Republik kümmern."
 umc_chi.70.a:0 "Wir werden uns später damit befassen."
 
 ### STRENGTHEN COOPERATION WITH GERMANY
 umc_chi.80.t:0 "[CHI.GetName] möchte unsere Zusammenarbeit verstärken"
 umc_chi.80.d:0 ""
 umc_chi.80.a:0 "China ist und wird uns als Testgelände oder sogar als potenzieller Verbündeter nützlich sein."
 umc_chi.80.b:0 "Wir haben dort bereits genug investiert."
 
 umc_chi.81.t:0 "Stärkung der deutsch-chinesischen Zusammenarbeit"
 umc_chi.81.d:0 "Die Zusammenarbeit zwischen China und Deutschland begann 1926 mit dem dringenden Bedürfnis nach Modernisierung unseres Militärs und unserer nationalen Verteidigungsindustrie sowie Deutschlands Bedarf an einer stabilen Rohstoffversorgung. Dies brachte uns auf den Weg enger Beziehungen.\n\nHeute ist Deutschland unser größter Handelspartner. Sein Ministerium fördert regelmäßig große Investitionen in unserem Gebiet. Unsere Armee wird von erfahrenen deutschen Generälen unter der Führung von Falkenhausens ausgebildet.\n\nDa diese Zusammenarbeit für unsere Nationen von entscheidender Bedeutung ist, haben wir Mittel bereitgestellt, um ihre Fortsetzung zu gewährleisten, und die Deutschen haben glücklicherweise zugestimmt. Die deutsch-chinesischen Beziehungen können weiterhin florieren."
 umc_chi.81.a:0 "Dies wird dazu beitragen, unser Land an westliche Standards anzupassen."
 
 umc_chi.82.t:0 "[GER.GetName] weigert sich, unsere Zusammenarbeit zu stärken"
 umc_chi.82.d:0 ""
 umc_chi.82.a:0 "Wir müssen uns darauf einstellen, dann ohne all das zu leben."
 
