 KMT_has_idea_cg_warlords:0 "Hat Nationalgeist §YIs Kommunalverwaltung§!"
 KMT_retreat_to_sichuan:0 "Rückzug nach [605.GetName]"
 KMT_retreat_to_sichuan_desc:0 "Der aktuelle Krieg läuft gegen uns. Wir sollten einen Rückzug in die Bergregion von [605.GetName] in Erwägung ziehen. Unsere Feinde werden es schwer haben, das Gebiet zu erobern und uns wertvolle Zeit für ausländische Hilfe zu verschaffen."
 KMT_back_to_nanking:0 "Kapital verschieben nach [613.GetName]"
 KMT_join_central:0 "Treten Sie [KMT_central_gov_tag.GetName] bei"
 KMT_join_central_desc:0 "Der chinesische Bürgerkrieg ist wieder in vollem Gange, wir sollten darüber nachdenken, Partei zu ergreifen."
 KMT_join_prc:0 "Treten Sie [PRC.GetName] bei"
 KMT_join_prc_desc:0 "Der chinesische Bürgerkrieg ist wieder in vollem Gange, wir sollten darüber nachdenken, Partei zu ergreifen."
 KMT_fuckem_all:0 "Zerstöre sie alle"
 KMT_fuckem_all_desc:0 "Alle Kriegsparteien im aktuellen Bürgerkrieg sind gleichermaßen korrupt. Wir werden sie alle vernichten und China für uns beanspruchen!"
 KMT_retake_the_mainland:0 "Erobern Sie das Festland von [From.GetName] zurück"
 KMT_dcat_fate_of_collaborators:0 "Schicksal der Kollaborateure"
 KMT_dcat_fate_of_collaborators_desc:0 "Viele [Root.GetAdjective]-Bürger haben sich entschieden, mit unseren Feinden zu kollaborieren, als unsere Nation am Rande der Niederlage stand. Doch Victoria steht auf unserer Seite, und die Feinde sind besiegt. Es ist an der Zeit, dass sich diese Verräter ihren verspäteten Prozessen stellen."
 KMT_deal_with_them_mission:0 "Entscheiden Sie über das Schicksal der Kollaborateure"
 KMT_deal_with_them_mission_desc:0 "Wir müssen schnell über ihr Schicksal entscheiden. Sonst wird unser Volk mit unserer Ineffizienz unzufrieden sein. Einige von ihnen könnten zu Bürgerwehren werden und die öffentliche Ordnung stören."
 KMT_deal_with_them_purge:0 "Säubern Sie die Kollaborateure"
 KMT_deal_with_them_purge_desc:0 "Heilige mögen barmherzig genug sein, diesen Verrätern zu vergeben, aber wir sind keine Heiligen. Diesen schändlichen Abschaum erwartet nur die Hölle."
 KMT_deal_with_them_reorganise:0 "Absorbieren Sie ihr Militär"
 KMT_deal_with_them_reorganise_desc:0 "Sie mögen Verrat begangen haben, aber ihre Streitkräfte sind immer noch ziemlich ausreichend. Wir werden sie zwingen, unter unserer Flagge zu kämpfen."
 KMT_deal_with_them_forgive:0 "Zusammenarbeit mit Mitarbeitern"
 KMT_deal_with_them_forgive_desc:0 "Das Wissen und die Erfahrung, die unser Feind an die Kollaborateure weitergibt, sind äußerst wirkungsvoll. Wenn wir mit ihnen zusammenarbeiten, können wir möglicherweise einige technologische oder militärische Erkenntnisse gewinnen."
