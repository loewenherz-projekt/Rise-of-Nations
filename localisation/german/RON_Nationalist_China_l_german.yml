 ## 26/02/2020 ##
 KMT_dcat_corruption:0 "Korruption in der Regierung"
 KMT_dcat_corruption_desc:0 "Korrupte und mächtige Personen in unserer Regierung, insbesondere die „Vier Familien“, haben unsere Wirtschaft in einen besonders schlechten Zustand versetzt."
 KMT_corruption_investigate_tvsoong:0 "Untersuchen Sie Soong Tse-ven"
 KMT_corruption_investigate_tvsoong_desc:0 "Soong Tse-ven, ein Finanzexperte und Mitglied der Soong-Familie, einer der „Vier Familien“, gilt seit langem als unverschämt und opportunistisch. Er hat mit Sicherheit ein beträchtliches Vermögen angehäuft. Da er jedoch Mitglied der „Vier Familien“ und Bruder von Soong Mei-ling ist, würde eine Untersuchung gegen ihn auf viele Hindernisse stoßen."
 KMT_corruption_investigate_hhkung:0 "Untersuchen Sie Kung Hsiang-hsi"
 KMT_corruption_investigate_hhkung_desc:0 "Kung Hsiang-hsi, einer der treibenden Kräfte hinter der Fiat-Währung, hatte den großen Wunsch, seinen Posten als Zentralbankchef zu nutzen, um persönlichen Reichtum anzuhäufen. Es würde die Korruption in unserem Land deutlich reduzieren, wenn wir ihn von der Macht entfernen könnten. Da er jedoch aus der Familie Kung stammt, einer der „Vier Familien“,", make things difficult.
 KMT_root_out_corruption:0 "Kampf gegen die Korruption"
 KMT_root_out_corruption_desc:0 "Da Soong Tse-ven und Kung Hsi-hsiang aus ihren wichtigen Positionen entfernt wurden, ist es viel einfacher, mit den übrigen korrupten Beamten umzugehen. Wir können diese Situation als Chance nutzen, um die Korruption in unserer Regierung auszumerzen."
