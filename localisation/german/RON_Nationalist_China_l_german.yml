 KMT_effective_integration:0 "[Root.GetEffectiveIntegrationIdeaName]"
 KMT_EFFICIENT_INTEGRATION:0 "Effiziente Integration"
 KMT_FACTIONS_IN_ARMY_DESTROYED:0 "Fraktionen in der Armee zerstört"
 KMT_MILITIAS_DISBANDED:0 "Milizen aufgelöst"
 KMT_effective_integration_desc:0 "[Root.GetEffectiveIntegrationIdeaDesc]"
 KMT_EFFICIENT_INTEGRATION_DESC:0 "Die reibungslose und effiziente Integration der Streitkräfte des Kriegsherrn gibt uns mehr Kontrolle über das Militär und ermöglicht uns eine schnellere Entscheidungsfindung."
 KMT_FACTIONS_IN_ARMY_DESTROYED_DESC:0 "Früher gab es innerhalb unserer Armee Fraktionen, die die Koordination zwischen den verschiedenen Streitkräften erschwerten. Diese Situation besteht nun nicht mehr und unsere Streitkräfte können wieder gut geplante und koordinierte Operationen durchführen."
 KMT_MILITIAS_DISBANDED_DESC:0 "Die lose organisierten Milizen, die während der Revolution gegen das alte Regime entstanden waren, wurden aufgelöst. Die Kampfkraft unserer Streitkräfte hat sich insgesamt erhöht."
 KMT_focus_on_own_army:0 "[Root.GetFocusOnOwnArmyIdeaName]"
 KMT_FOCUS_ON_CENTRAL_ARMY_IDEA:0 "Fokus auf die Zentralarmee"
 KMT_FACTIONALISM_ENCOURAGED:0 "Fraktionalismus wird gefördert"
 KMT_MILITIA_STORMTROOPERS:0 "Miliz-Sturmtruppen"
 KMT_focus_on_own_army_desc:0 "[Root.GetFocusOnOwnArmyIdeaDesc]"
 KMT_FOCUS_ON_CENTRAL_ARMY_IDEA_DESC:0 "Die Streitkräfte des Kriegsherrn sind zu schlecht ausgerüstet und undiszipliniert. Wir sollten uns mehr auf unsere Zentralarmee als auf ihre verlassen, um keine wichtigen Mittel zu verschwenden."
 KMT_FACTIONALISM_ENCOURAGED_DESC:0 "Obwohl die Fraktionsbildung innerhalb unserer Armee die Durchführung gut koordinierter Operationen verhindert, würden die Soldaten jeder Clique auf dem Schlachtfeld erbitterter kämpfen, um die lukrativen Belohnungen zu erhalten, die wir anbieten."
 KMT_MILITIA_STORMTROOPERS_DESC:0 "Aufgrund ihrer unterdurchschnittlichen Kampffähigkeiten sind die Milizen im Alleingang unterlegen. Als Sturmtruppen an vorderster Front können sie uns jedoch dabei helfen, unsere Feinde zu zermürben, bevor unsere regulären Streitkräfte eingreifen und den entscheidenden Schlag versetzen."
 KMT_warlord_cliques_war:0 "[Root.GetWarlordArmyName]"
 KMT_WARLORD_ARMIES:0 "Kriegsherrenarmeen"
 KMT_FACTIONS_WITHIN_THE_ARMY:0 "Fraktionen innerhalb der Armee"
 KMT_MILITIAS:0 "Milizen"
 KMT_warlord_cliques_war_desc:0 "[Root.GetWarlordArmyDesc]"
 KMT_WARLORD_ARMIES_DESC:0 "Obwohl sich die Armeen der Kriegsherren in unsere integriert haben, sind sie offensichtlich nur ihrem Herrn treu."
 KMT_FACTIONS_WITHIN_THE_ARMY_DESC:0 "Mächtige Persönlichkeiten in der Armee haben Cliquen gebildet, um ihre Positionen zu sichern. Obwohl sie keine Bedrohung für unsere Herrschaft darstellen, haben Konflikte zwischen Cliquen zu Schwierigkeiten bei der Koordinierung militärischer Operationen geführt."
 KMT_MILITIAS_DESC:0 "Um unsere Sache zu unterstützen, haben sich lokale Bauern und Arbeiter zu Milizen zusammengeschlossen. Diese Einheiten verfügen jedoch nur über geringe Kampfkraft und geraten manchmal sogar in Konflikte mit unseren regulären Streitkräften."
