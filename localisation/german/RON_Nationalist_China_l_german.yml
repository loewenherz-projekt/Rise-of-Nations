 ### INV - USE INFLUENCE BRANCH
 CHI_rss_controled_by_INV_FLAG:0 "Ressourcen, die einem anderen Land als „China“ gehören."
 
 CHI_fi_INV_political_concessions_dec:0 "Fordern Sie politische Zugeständnisse"
 CHI_fi_INV_political_concessions_dec_desc:0 ""
 CHI_fi_INV_demand_control_over_mines_dec:0 "Fordern Sie die Kontrolle über die chinesischen Minen"
 CHI_fi_INV_demand_control_over_mines_dec_EXPL:0 "   Wählen Sie einen Staat aus §H[606.GetName]§!, §H[608.GetName]§!, §H[716.GetName]§!, §H[599.GetName]§!, §H[593.GetName]§!, §H[592.GetName]§!, §H[594.GetName]§! und §H[714.GetName]§!, in dem wir §HResource Rights§! anfordern.\n Der ausgewählte Staat muss von [CHI.GetFlag]§H[CHI.GetName]§! kontrolliert werden und kein anderes Land darf dort Ressourcenrechte haben.\n"
 CHI_fi_INV_demand_control_over_mines_dec_desc:0 "Wir haben so viel Einfluss angehäuft, dass wir die direkte Übernahme eines der chinesischen Ausgrabungszentren fordern können. Ihnen wird keine andere Wahl bleiben, als dies zu akzeptieren. Schließlich ist der Großteil ihrer Gewinne Ihren erheblichen Investitionen zu verdanken."
 CHI_fi_INV_demand_lend_lease_of_port_city_dec:0 "Fordern Sie die Kontrolle über eine der Konzessionsstädte an"
 CHI_fi_INV_demand_lend_lease_of_port_city_dec_EXPL:0 "   Wählen Sie einen Zustand aus §H[745.GetName]§!, §H[887.GetName]§!, §H[743.GetName]§!, §H[883.GetName]§!, §H[886.GetName]§!, §H[326.GetName]§!, §H[885.GetName]§!, §H[729.GetName]§! und §H[728.GetName]§! aus, der an uns §Hübertragen§! werden soll. Der ausgewählte Zustand muss von [CHI.GetFlag]§H[CHI.GetName]§! gesteuert werden."
 CHI_fi_INV_demand_lend_lease_of_port_city_dec_desc:0 "Die Ausländer besaßen in der Vergangenheit die meisten wichtigen Häfen Chinas und konnten somit den größten Teil des Handels kontrollieren. Jetzt haben wir die einmalige Gelegenheit, unseren wachsenden Einfluss zu nutzen und erneut die Kontrolle über eine der Hafenstädte zu erlangen."
 
 CHI_fi_INV_support_kai_shek_opposition_dec:0 "Unterstützen Sie die Kai-Shek-Opposition"
 CHI_fi_INV_support_kai_shek_opposition_dec_EXPL1:0 "Wir müssen unseren oben genannten §HInfluence§! (§H10§!) 180 Tage lang aufrechterhalten, sonst wird die §HOpposition§! §RDefeated§!!\n"
 CHI_fi_INV_support_kai_shek_opposition_dec_EXPL2:0 "Sie werden in der Lage sein, unseren Einfluss zu verringern und die Opposition zu besiegen, bevor der Bürgerkrieg ausbricht.\n"
 CHI_fi_INV_support_kai_shek_opposition_dec_EXPL3:0 "Sie §Hwerden in der Lage sein§!, entweder §HDefinierte Neutralität zu erklären§!, §RUnterstützen§! [CHI.GetFlag]§H[CHI.GetName]§! und so unseren §HInfluence§! zu verringern oder §Gdie §HOpposition§! zu unterstützen§!.\n"
 CHI_fi_INV_support_kai_shek_opposition_dec_desc:0 "Das chinesische Regime von [CHI.GetLeader] nützt uns nichts mehr. Wir haben genug Einfluss, um die Gestaltung der Politik und Wirtschaft Chinas direkt zu bestimmen. Ein Marionettenregime in China ist unser ultimatives Ziel."
 CHI_fi_INV_support_kai_shek_opposition_pp_dec:0 "Zusätzliche politische Unterstützung für die Opposition"
 CHI_fi_INV_support_kai_shek_opposition_pp_dec_desc:0 ""
