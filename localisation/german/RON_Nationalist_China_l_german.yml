 KMT_ps_cg_modifier:0 "§HDie Zentralregierung§!\n----------------\nDie Clique, die derzeit die Zentralregierung führt, ist §H[KMT_central_gov_tag.GetRulingParty]§!, mit §H[KMT_central_gov_tag.GetLeader]§! als nationalem Führer.[This.GetCoreBonus]"
 KMT_ps_cg_modifiers_enabled:0 "\n\n§HDie Zentralregierung genießt die folgenden Vorteile durch die Staaten, die sie innerhalb der Region Großchina angesiedelt hat§!:\n Stabilität: [?global.KMT_ps_cg_stability_bonus|+%=]\n Politischer Machtgewinn: [?global.KMT_ps_cg_ppfactor_bonus|+%=]"
 KMT_ps_warlords_modifier:0 "§HRegionalmächte§!\n----------------\nDie Anwesenheit von Regionalmächten schwächt die Verwaltung der Zentralregierung.\n\n§HMit der aktuellen Anzahl an Regionalmächten erhält die Zentralregierung die folgenden Modifikatoren:§!\n Kosten politischer Macht: [?global.KMT_warlord_pp_cost_mod|=-]\n Stabilität: [?global.KMT_warlord_stability_mod|=%+]\n Stabilitätsmodifikator für defensive Kriegsstrafen: [?global.KMT_warlord_defensive_stab_mod|%+]\n Rekrutierbarer Bevölkerungsfaktor: [?global.KMT_warlord_conscription_factor_mod|%=+]\n\nRegionalmächte ohne den Nationalgeist der §RKommunistischen Banditen§! haben den folgenden Modifikator:\n [!KMT_ps_warlords_modifiers_click]"
 ## 18/02/2020 ##
 KMT_dcat_inalienable_parts_tt:0 "§HGroßraum China§!"
 KMT_dcat_inalienable_parts_tt_delayed:0 "[This.GetDisabledMechanicTT]"
 KMT_useful:0 "Staaten in taupefarbener Farbe stellen Staaten dar, die von der aktuellen Zentralregierung entkernt wurden.\n\nWenn einige Gebiete von der aktuellen Zentralregierung aufgegeben werden (was bedeutet, dass sie nicht länger als „unveräußerliche Teile Chinas“ betrachtet werden), werden die Staaten in diesen Gebieten nicht angezeigt, die Grenzlinien bleiben jedoch bestehen.\n\n§GSie können Staaten, die sie als unveräußerliche Teile Chinas betrachten, entkernen, indem Sie eine Schaltfläche in der ausgewählten Staatsoberfläche verwenden.§!\n\n§RHindem Sie 0 Einfluss in Staaten haben, die nicht Ihnen gehören und von Ihnen kontrolliert werden, wird Ihr Kern in diesem Staat entfernt.§!"
 KMT_break_free_from_cg:0 "Befreien Sie sich von der Zentralregierung"
 KMT_break_free_from_cg_desc:0 "Wir haben genug von der eisernen Herrschaft von [KMT_central_gov_tag.GetLeader] und [KMT_central_gov_tag.GetRulingParty], es ist Zeit für uns, unsere wohlverdiente Autonomie zu erlangen."
 KMT_ps_atleast_loyal_tt:0 "Ihr Treuestatus ist mindestens §GLoyal§!(§G1§!)"
 KMT_ps_suppress_loyalists:0 "Unterdrückt Loyalisten"
 KMT_ps_suppress_loyalists_desc:0 "Diejenigen, die der Zentralregierung treu sind, gefährden nur unsere Herrschaft. Wir dürfen ihnen nicht erlauben, in UNSERER Regierung Fuß zu fassen!"
