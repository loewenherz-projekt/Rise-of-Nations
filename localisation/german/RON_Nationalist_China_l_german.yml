 CHI_kuomintang_corruption_I10:0 "Korruption in der Kuomintang"
 CHI_kuomintang_corruption_I10_desc:0 "Die Kuomintang Chinas, 1919 von Sun Yat-sen gegründet, ist seit 1928 die alleinige Regierungspartei der Republik China. Nach Sun Yat-sens Tod 1925 fiel die politische Führung der KMT an Wang Jingwei und Hu Hanmin, die linken bzw. rechten Parteiführer. Die wahre Macht lag jedoch in den Händen von Chiang Kai-shek, der als Leiter der Whampoa-Militärakademie nahezu die vollständige Kontrolle über das Militär hatte.\n\nHeute, lange nach ihrer Gründung, ist die Kuomintang von Korruption und Missverhältnissen durchzogen. Und es wird sich sicherlich noch verschlimmern, wenn keine Schritte unternommen werden, um dem entgegenzuwirken.\n§W---------------§!\nDieser Nationalgeist ist ausgeglichen (§R10§!)."
 CHI_kuomintang_corruption_I9:0 "Korruption in der Kuomintang"
