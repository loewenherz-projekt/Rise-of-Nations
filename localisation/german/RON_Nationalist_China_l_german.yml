 CHI_hanoi_route:0 "Hanoi-Route"
 CHI_hanoi_route_desc:0 "Die Straße von Indochina nach Hanoi kann uns im Kampf gegen Japan die größte Unterstützung bieten. Wir müssen diese Gelegenheit nutzen, solange Indochina noch von den Franzosen kontrolliert wird. Ihre materielle Unterstützung ist entscheidend für unseren Erfolg."
