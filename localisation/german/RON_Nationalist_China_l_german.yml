 CHI_unite_the_general_staffs_EXPL4:0 "Wenn wir mit [SHX.GetFlag]§H[SHX.GetName]§! in einer Fraktion sind, werden sie zu unserer Marionette und [PRC.GetFlag]§H[PRC.GetName]§! wird Eigentümer und Kontrolleur von §H[746.GetName]§! und §H[621.GetName]§!.\n"
