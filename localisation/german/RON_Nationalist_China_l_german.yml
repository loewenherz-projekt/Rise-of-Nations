 ### Demand outer Manchuria from CHI
 umc_chi.20.t:0 "[CHI.GetName] fordert die Rückgabe der Äußeren Mandschurei"
 umc_chi.20.d:0 "Sobald [CHI.GetName] die Mandschurei von den Japanern und sogenannten chinesischen Legimisten zurückeroberte, richtete sich ihr Blick noch weiter nach unserem Gebiet im Fernen Osten. Sie nennen es jedoch die Äußere Mandschurei, das Gebiet, das wir China nach dem Vertrag von Aigun 1858 abgenommen hatten.\n\nNun wurden wir von den Gesandten von [CHI.GetLeader] kontaktiert, um das Schicksal des Fernen Ostens erneut zu besprechen. Sie machten unmissverständlich klar, dass ihre Forderungen nach der Rückgabe „ihres“ Gebiets sehr ernst zu nehmen seien, da sich die chinesische Nationalarmee bereits als Drohsignal an unserer gemeinsamen Grenze bereit mache.\n\nSchlimmer noch: Sollten wir dies ablehnen, könnten sie andere Nationen um Vermittlung bitten – und dieser Streit könnte sich zu einem globalen Konflikt ausweiten."
 umc_chi.20.a:0 "Der Ferne Osten ist für uns wertlos."
 umc_chi.20.b:0 "Die Sowjetunion bleibt standhaft."
 CHI_SOV_will_be_able_to_ask_for_mediation_USA_EXPL:0 "[CHI.GetFlag]§H[CHI.GetName]§! kann eine §RMediation§! von [USA.GetFlag]§H[USA.GetName]§! anfordern.\n"
 CHI_SOV_will_be_able_to_ask_for_mediation_JAP_EXPL:0 "[CHI.GetFlag]§H[CHI.GetName]§! kann §RMediation§! von [JAP.GetFlag]§H[JAP.GetName]§! anfordern.\n" 

 umc_chi.21.t:0 "[SOV.GetName] überträgt Äußere Mandschurei"
 umc_chi.21.d:0 "Angesichts der sich verschlechternden Lage hat [SOV.GetLeader] zugestimmt, die Äußere Mandschurei wieder unter unsere Kontrolle zu stellen.\n\nDieses Gebiet, das wir nach dem Vertrag von Aigun 1858 verloren haben, ist heute hoch entwickelt – seine Fabriken nutzen moderne sowjetische Technologie und seine Minen gehören zu den profitabelsten der Welt. Darüber hinaus könnte uns das Goldene Horn mit Stadt und Hafen in Wladiwostok als Marinestützpunkt dienen.\n\nDies ist ein großer Erfolg für uns und ganz China, und die Bevölkerung wird unsere Regierung sicherlich noch stärker unterstützen. Wir haben es geschafft, selbst eine der stärksten Nationen der Welt ohne einen einzigen Schuss zu besiegen – jetzt kann uns niemand mehr als zweitrangigen Staat betrachten."
 umc_chi.21.a:0 "Eines der durch die Ungleichen Verträge verursachten Unrechte wird endlich wiedergutgemacht."
 
 umc_chi.22.t:0 "[SOV.GetName] Weigert sich, Äußere Mandschurei zu übertragen"
 umc_chi.22.d:0 "Unsere Gesandten kehren mit unbefriedigenden Nachrichten zurück. [SOV.GetLeader] weigerte sich, uns die Äußere Mandschurei zurückzugeben – unser rechtmäßiges Gebiet, das wir 1858 im Ungleichen Vertrag verloren hatten.\n\nWir mussten im Vertrag von Aigun nachgeben. Wir wurden durch die Eröffnung einer zweiten Front seitens Russlands bedroht, während wir im Zweiten Opiumkrieg und im Taiping-Aufstand kämpften.\n\nDoch jetzt – rund 80 Jahre später – ist die Situation ganz anders als zuvor. Unsere Armee ist gut ausgebildet, vorbereitet und bereit, bei Bedarf ins eisige Sibirien zu marschieren. Und mit etwas Glück finden wir vielleicht sogar einen Vermittler unter unseren japanischen oder amerikanischen Nachbarn in Übersee."
 umc_chi.22.a:0 "Dann werden wir es mit Gewalt einnehmen."
 umc_chi.22.b:0 "Suchen Sie Hilfe in den USA."
 umc_chi.22.c:0 "Suchen Sie Hilfe im Staat Japan."
 umc_chi.22.e:0 "Sie haben es klargestellt: Wir sind dafür nicht stark genug."
 
