 umc_chi.23.d:0 ""
 umc_chi.23.a:0 "Dies wird die Sowjets schwächen und die Kommunisten weiter von unserer Küste wegdrängen."
 umc_chi.23.b:0 "Das könnte uns eine Menge Ärger einbringen."
 
