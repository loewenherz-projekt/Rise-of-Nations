 KMT_deal_with_separatist:0 "Separatisten in die Herde zurückbringen [From.GetAdjective]"
 KMT_deal_with_separatist_desc:0 "Die Separatisten in [From.GetName] haben sich während des Bürgerkriegs von uns losgesagt. Es ist an der Zeit, dass wir uns jetzt mit ihrem abweichenden Verhalten auseinandersetzen."
 KMT_deal_with_separatist_window:0 "Duldung der Unabhängigkeit"
 KMT_deal_with_separatist_window_desc:0 "Wenn wir nicht rechtzeitig diplomatische Maßnahmen ergreifen, können die während des Bürgerkriegs abgespaltenen Separatisten festes Terrain errichten. Danach wird es zu einer mühsamen Aufgabe, sie zu bekämpfen."
 KMT_declare_independence:0 "Unabhängigkeit erklären"
 KMT_declare_independence_desc:0 "Da [From.GetName] mit dem Bürgerkrieg beschäftigt ist, können wir nun in diesem Fenster unsere Unabhängigkeit erklären. Sollte [From.GetName] jedoch nach dem Bürgerkrieg siegreich hervorgehen, könnten uns schlimme Konsequenzen drohen."
