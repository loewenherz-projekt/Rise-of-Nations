 KMT_colonisers_exists:0 "Jeder asiatische Staat gehört einem Land, dessen Hauptstadt nicht in Asien liegt (außer [SOV.GetName]), oder jedes asiatische Land wird von einem Oberherrn regiert, dessen Hauptstadt nicht in Asien liegt."
