 ## 22/8/2016 ##
 kmt.157.t:0 "[From.GetName] Intervention"
 kmt.157.d_1:0 "[From.GetName] hat sich in das Problem mit den Handelshäfen eingemischt, das wir mit [From.From.GetName] als Fraktionsführer haben. "
 kmt.157.d_2:0 "[From.GetName] hat sich in das Problem der Handelshäfen eingemischt, das wir mit [From.From.GetName] haben. Sie behaupten, dass der Handel zwischen uns besser werden würde, wenn wir uns darauf einigen, die Handelshäfen zurückzugeben."
 kmt.157.a_1:0 "Wir müssen [From.GetAdjective]-Befehlen Folge leisten!"
 kmt.157.a_2:0 "Faszinierend..."
 kmt.157.b_1:0 "Die [From.GetFactionName] sind ein verrottendes Höllenloch, wir werden ihnen nicht mehr folgen!"
 kmt.157.b_2:0 "Ihre Ressourcen sind nicht das, was wir wollen!"
 kmt.158.t:0 "[From.GetName] Intervention anfordern"
 kmt.158.d:0 "[From.GetName] hat Probleme mit den Handelshäfen, die sie der westlichen Welt in den ungleichen Verträgen der untergehenden Qing-Dynastie zugestanden haben. Sie bitten um unsere Anwesenheit in diesen Angelegenheiten, damit sie ihre Interessen schützen können."
 kmt.158.a:0 "Wir stehen zusammen!"
 kmt.158.b:0 "Sie müssen lernen, geduldig zu sein!"
 kmt.159.t:0 "[From.GetName] lehnt Vorschlag ab"
 kmt.159.d:0 "[From.GetLeader] hat sich geweigert, in unseren Angelegenheiten zu vermitteln, und hat uns angewiesen, in dieser Angelegenheit zurückzutreten."
 kmt.159.a:0 "Die Entscheidung von Genosse [From.GetLeader] ist immer richtig …"
 kmt.159.b:0 "Wir nehmen die Sache selbst in die Hand!"
 kmt.164.t:0 "Hongkong kehrte zurück"
 kmt.164.d:0 "[SOV.GetName] konnte unsere Angelegenheiten erfolgreich vermitteln und Hongkong wird uns nun zurückgegeben."
 kmt.164.a:0 "Wir müssen ihnen danken"
 kmt.179.t:0 "Industrie verbessert"
 kmt.179.d:0 "Mit der zunehmenden Anzahl an Fabriken stieg auch die Qualität der Produkte."
 kmt_incompetent_indus_tt:0 "Reduzieren Sie die Strafe für „inkompetente Industrie“!\nFügen Sie in jedem Staat, den Sie besitzen, freie Bauplätze hinzu."
 kmt.179.a:0 "Bald wird unsere Industriemacht eine der stärksten sein!"
 kmt_incompetent_indus_remove_tt:0 "Entfernen Sie den Nationalgeist §YInkompetente Industrie§!\nFügen Sie in jedem Staat, den Sie besitzen, 1 freien Gebäudeplatz hinzu."
 kmt.183.t:0 "Schicksal von Ma Pu-fang"
 kmt.183.d:0 "Dieser islamische Kriegsherr ist nach der Niederlage seiner Clique gefangen genommen worden. Nun müssen wir über sein Schicksal entscheiden."
 kmt_mbf_join:0 "Ma Pu-fang wird der Armee beitreten"
 kmt.185.t:0 "Die japanische Bedrohung"
 kmt.185.d:0 "Die Japaner haben eine Offensive gestartet, während wir uns noch mit der internen Bedrohung auseinandersetzen müssen! Sollten wir unsere Waffen gegenüber unseren chinesischen Mitbürgern niederlegen und sie auf die imperialistischen Invasoren richten?"
 kmt.185.a:0 "Unsere Nation befindet sich in einer äußerst verzweifelten Lage!"
 kmt.185.b:0 "Noch wichtiger ist die innere Stabilität."
 kmt.186.t:0 "[From.GetRulingParty] Strebt nach Frieden"
 kmt.186.d:0 "Angesichts der japanischen Invasion hat [From.GetLeader] beschlossen, [Root.GetLeader] zu Friedensgesprächen einzuladen, damit sie sich stattdessen auf die japanischen Invasoren konzentrieren können."
 kmt.186.a:0 "Es wird Frieden zwischen uns herrschen, aber wir werden uns nicht an ihrem Krieg beteiligen."
 kmt.186.b:0 "Schließlich sind wir alle Chinesen ..."
 kmt.186.c:0 "Es wird keinen Frieden zwischen uns geben!"
 kmt.186.e:0 "Wir können uns mit den Japanern verbünden!"
 kmt.187.t:0 "Frieden!"
 kmt.187.d_1:0 "[From.GetLeader] hat einem weißen Frieden zugestimmt, jetzt können wir uns mehr auf die japanischen Invasoren konzentrieren."
 kmt.187.d_2:0 "[From.GetLeader] hat einem weißen Frieden zugestimmt und sich uns bei der Abwehr der japanischen Invasoren angeschlossen!"
 kmt.187.a:0 "Wir können uns später immer noch darum kümmern."
 kmt.188.t:0 "[From.GetName] verweigert den Frieden"
 kmt.188.d:0 "[From.GetLeader] hat sich geweigert, Frieden zwischen uns zu schließen, [Root.GetLeader] ist empört."
 kmt.188.a:0 "Sie sollen gelöscht werden!"
 kmt.189.t:0 "[From.GetName] will an unserer Seite kämpfen"
 kmt.189.d:0 "[From.GetLeader] war empört über die Aktionen von [KMT_central_gov_tag.GetLeader] und beschloss, ihm gemeinsam mit uns eine Lektion zu erteilen."
 kmt.189.a:0 "Die große Wohlstandssphäre Ostasiens wächst!"
 kmt.189.b:0 "Menschen, die ihre Nation verraten, haben keine Ehre!"
 kmt.190.t:0 "[JAP.GetName] Akzeptiert"
 kmt.190.d:0 "[JAP.GetName] hat unser Angebot angenommen und jetzt werden wir [KMT_central_gov_tag.GetName] von seinem Platz stürzen!"
 kmt.190.a:0 "Tod dem [KMT_central_gov_tag.GetLeader]!"
 kmt.191.t:0 "[JAP.GetName] Abgelehnt"
 kmt.191.d:0 "[JAP.GetName] hat unseren Vorschlag abgelehnt und unsere Tat verurteilt, mit der Begründung, dass [Root.GetLeader] keine Ehre habe."
 kmt.191.a:0 "Wir haben wahrscheinlich zwei Giganten verärgert ..."
 kmt.192.t:0 "[From.GetName] schließt sich der japanischen Aggression an"
 kmt.192.d:0 "[From.GetLeader] hat sich den Japanern bei der Invasion chinesischen Territoriums angeschlossen!"
 kmt.192.a:0 "Hanjian! Zougou!"
 kmt.193.t:0 "Der Versuch von [From.GetName], sich Japan anzuschließen, ist fehlgeschlagen"
 kmt.193.d:0 "Der Geheimdienst hat erklärt, dass [From.GetLeader] versucht hat, mit den Japanern Kontakt aufzunehmen, um eine gemeinsame Streitmacht gegen uns zu bilden, was jedoch abgelehnt wurde und von den Japanern als ehrlos verurteilt wurde."
 kmt.193.a:0 "Für Verräter der Nation wird es kein gutes Ende nehmen."
 kmt_fascism_tp_728_coup_tt:0 "Ein Putsch wird im Gange sein und die Erfolgschancen sind größer, wenn Ihre Kriegsunterstützung hoch ist."
 kmt_manpower_transfer_tt:0 "Transfer von 20.000 Arbeitskräften"
 kmt_fascism_tp_728_inc_tt:0 "Guangzhouwan wird von unseren Streitkräften besetzt werden, was einen Krieg auslösen könnte."
 kmt_fascism_tp_729_inc_tt:0 "Macau wird von unseren Streitkräften besetzt werden, was einen Krieg auslösen könnte."
 kmt_fascism_tp_326_inc_tt:0 "Hongkong wird von unseren Streitkräften besetzt, was einen Krieg auslösen könnte."
 kmt.196.t:0 "Sinkiang unter Kontrolle"
 kmt.196.d:0 "Nach dem Aufstand des Sinkiang-Volkes kommt Sinkiang schließlich unter unsere Herrschaft."
 kmt.196.a:0 "Der Tod hätte verhindert werden können, wenn die Sinkiang-Leute klüger gewesen wären ..."
 ## 5/9/2016 ##
 kmt.197.t:0 "[From.GetName] verbessert unsere Beziehung"
 kmt.197.d:0 "[From.GetLeader] versucht, unsere Beziehungen zu verbessern, indem er seine Ansprüche auf Tibet aufgibt. Unsere Beamten haben vor Falschmeldungen und Tricks gewarnt, aber eine solche Entscheidung sollte letztlich [TIB.GetLeader] selbst treffen."
 kmt.197.a:0 "Behandle andere gut, und andere werden dich gut behandeln."
 kmt.197.b:0 "[From.GetRulingParty] wird uns zu Größe führen!"
 kmt.197.c:0 "Auch wir werden unsere Freundlichkeit zeigen."
 kmt.197.e:0 "Auf solch einen naiven Trick fallen wir nicht herein!"
 kmt.198.t:0 "[From.GetName] nimmt unsere Freundlichkeit an"
 kmt.198.d:0 "[From.GetLeader] hat beschlossen, dass wir gemeinsam auf eine bessere Zukunft hinarbeiten werden."
 kmt.198.a:0 "Niemand will Blutvergießen"
 kmt.199.t:0 "[From.GetName] wird zu unserer Marionette"
 kmt.199.d:0 "[From.GetLeader] entschied, dass [Root.GetRulingParty] sie zu Größe führen wird und übergab uns daher ihre politischen Angelegenheiten."
 kmt.199.a:0 "Wir werden sie nicht enttäuschen"
 kmt.200.t:0 "[From.GetName] Verzicht auf Ansprüche auf Sikang"
 kmt.200.d:0 "[From.GetLeader] hat aus Freundschaft beschlossen, dass sie Sikang nicht länger als ihren Kernstaat beanspruchen werden."
 kmt.200.a:0 "Gegenseitiger Respekt ist das Wichtigste"
 kmt.201.t:0 "[From.GetName] hat unsere Freundlichkeit abgelehnt"
 kmt.201.d:0 "[From.GetLeader] ist der Ansicht, dass unser Akt der Freundschaft nichts weiter als ein erbärmlicher Trick ist, und hat eine weitere Diskussion zu diesem Thema abgelehnt. "
 kmt.201.a:0 "Warum können sie keine Gründe erkennen?"
 ## 6/9/2016 ##
 kmt.202.t:0 "Der Bürgerkrieg ist vorbei"
 kmt.202.a:0 "Jetzt werden wir Verbündete auf der ganzen Welt suchen."
 ## 8/9/2016 ##
 ## 3/10/2016 ##
 kmt.208.t:0 "Gehaltsscheck für die kommunistische Armee"
 kmt.208.d:0 "Die Acht-Routen-Armee und die Neue Vierte Armee fordern nun ihre Gehälter an. Derzeit haben wir jedoch nicht genug Geld, um allen den Gehaltsscheck auszuzahlen, den sie verdienen."
 kmt.208.b:0 "UNSERE Armee hat das alles getan, die Kommunisten verdienen es nicht, bezahlt zu werden!"
 kmt_probable_inflation:0 "§RDies wird zu einer starken Inflation führen, da wir kein zusätzliches Gold als Deckung haben!§!"
 kmt.209.t:0 "Die Inflation setzt ein"
 kmt.209.d:0 "Unsere quantitative Lockerung hat zu einer starken Inflation in unserer Wirtschaft geführt. Und wir verlieren nun die Unterstützung unserer Bürger, insbesondere der Mittelschicht. Und einige unserer Soldaten laufen zu den Kommunisten über!"
 kmt.209.a:0 "Hätte es besser wissen müssen ..."
 kmt.210.t:0 "[From.GetRulingParty] Weigerung, den Gehaltsscheck auszuhändigen"
 kmt.210.d:0 "[From.GetRulingParty] behauptet, dass unsere Soldaten während des Krieges nichts getan hätten, um die Gehaltsschecks zu verdienen."
 kmt.210.a:0 "Das ist unerhört!"
 ## 10/10/2016 ##
 kmt.212.t:0 "Jangtse-Teilung"
 kmt.212.d:0 "Die [From.GetRulingParty]-Armee steht vor einer Niederlage, aber wir haben Schwierigkeiten, den Jangtse zu überqueren. [From.GetRulingParty] nutzt dies zu ihrem Vorteil und schlägt nun eine Teilung Chinas mit dem Jangtse als Grenze vor."
 kmt.212.a:0 "Ihre Niederlage ist nur eine Frage der Zeit, wir können warten."
 kmt.212.b:0 "Sie sind jetzt am Ende, wir dürfen ihnen keine Zeit geben, sich zu erholen!"
 kmt.213.t:0 "[From.GetName] Partition vereinbaren"
 kmt.213.d:0 "[From.GetName] hat unserem Vorschlag zugestimmt, China anhand des Jangtse als Grenze aufzuteilen."
 kmt.213.a:0 "Ein falscher Frieden ..."
 kmt_yangtze_partition_tt_prc:0 "Wir werden die chinesischen Staaten nördlich des Jangtse einnehmen und sie werden die südlich davon einnehmen."
 kmt_yangtze_partition_tt_prc:0 "Wir werden die chinesischen Staaten südlich des Jangtse einnehmen, und sie werden die im Norden einnehmen."
 kmt.214.t:0 "[From.GetName] Partition ablehnen"
 kmt.214.d:0 "[From.GetName] hat unseren Vorschlag abgelehnt, China anhand des Jangtse als Grenze aufzuteilen."
 kmt.214.a:0 "Wir müssen nach einer anderen Methode suchen, um unsere Existenz zu sichern!"
 ## 20/10/2016 ## Tomorrow I can play Civ VI !!!
 ## 29/10/2016 ##
 kmt.220.t:0 "Aufstieg der pro-japanischen Fraktion in [From.GetName]"
 kmt.220.d:0 "In letzter Zeit haben einige pro-japanische Beamte in der [From.GetRulingParty]-Regierung in [From.GetName] an Boden gewonnen. Wenn wir sie unterstützen, können wir China als Verbündeten gewinnen, ohne einen Krieg zu beginnen, und auf seine Ressourcen zugreifen."
 kmt.220.a:0 "Das wird uns Kugeln und Leben retten."
 kmt.220.b:0 "Sie bewahren lediglich indirekt ihre erbärmliche Nation."
 kmt.221.t:0 "Diplomat von [From.GetName]"
 kmt.221.d_1:0 "Ein Diplomat aus [From.GetName] ist an unserem Hof eingetroffen und hat die Ideologie des Panasiatischen Glaubens ausführlich erläutert. Nach der Präsentation haben die Überreste der Kodoha wieder öffentliche Unterstützung gewonnen. Dies bringt die Toseiha in eine schwierige Lage."
 kmt.221.d_2:0 "Ein Diplomat aus [From.GetName] ist an unserem Hof eingetroffen und hat die Ideologie des Panasiatischen Glaubens ausführlich erläutert. Nach der Präsentation haben Mitglieder der Kodoha einen Vorschlag für ein chinesisch-japanisches Bündnis ausgearbeitet."
 kmt.221.a:0 "Lassen Sie die neue Idee übernehmen und folgen Sie unseren chinesischen Mitbürgern."
 kmt.221.b:0 "Wir werden Asien zum Ruhm führen."
 kmt.221.c:0 "Die neue Idee muss gestoppt werden!"
 kmt.222.t:0 "[JAP.GetName] lehnt die neue Idee ab"
 kmt.222.d:0 "[JAP.GetLeader] hat die neue Idee des Panasiatismus abgelehnt und die Kodoha, die sie unterstützen, eliminiert. Unser Versuch, eine chinesisch-japanische Allianz zu bilden, ist gescheitert"
 kmt.222.a:0 "Ich wünschte, ich würde in aufgeklärteren Zeiten leben …"
 kmt.224.d:0 "Unsere chinesischen Landsleute bitten uns, einige unserer Schiffsbautechniken mit ihnen zu teilen, damit sie eine bessere Marine aufbauen können."
 kmt.224.a:0 "Asiaten sollen sich gegenseitig helfen"
 kmt.224.b:0 "[Root.GetAdjective] Technologien gehören uns, nicht ihnen!"
 kmt.225.t:0 "[From.GetName] gewährt Unterstützung"
 kmt.225.d:0 "[From.GetName] hat unserer Marineindustrie Unterstützung gewährt."
 kmt.225.a:0 "Lasst uns Schiffe bauen!"
 kmt.226.t:0 "[From.GetName] verweigert Unterstützung"
 kmt.226.d:0 "[From.GetName] hat die Unterstützung unserer Marineindustrie abgelehnt."
 kmt.226.a:0 "Verdammt!"
 ## 6/11/2016 ##
 kmt.233.t:0 "[From.GetName] bittet um unser Eingreifen"
 kmt.233.d:0 "Aufgrund unserer guten Beziehung zu [From.GetName] und [JAP.GetName] in unserer Fraktion hat [From.GetLeader] darum gebeten, dass wir in ihren aktuellen Konflikt eingreifen und die Aggression von [JAP.GetName] beruhigen."
 kmt.233.a:0 "Wie es die deutsch-chinesische Freundschaft vorsieht."
 kmt.233.b:0 "Wir sind im Moment zu beschäftigt, die Chinesen sind auf sich allein gestellt."
 kmt.234.t:0 "[From.GetAdjective] Intervention"
 kmt.234.d:0 "[From.GetLeader] hat einen offiziellen Brief an [Root.GetLeader] geschickt, in dem er erklärt, dass wir unsere Aggression gegenüber [From.From.GetName] sofort einstellen sollten."
 kmt.234.a:0 "Bei näherer Betrachtung ist eine Invasion Chinas möglicherweise doch nicht so vorteilhaft wie propagiert."
 kmt.234.b:0 "Scheiß auf die Deutschen."
 kmt.235.t:0 "[From.GetName] weigerte sich einzugreifen"
 kmt.235.d:0 "Da [GER.GetLeader] derzeit zu viel zu tun hat, hat er sich geweigert, in unseren aktuellen Konflikt mit den Japanern einzugreifen."
 kmt.235.a:0 "Schade."
 kmt.236.t:0 "Frieden mit [JAP.GetName]"
 kmt.236.d:0 "Nach der Intervention der Deutschen ziehen sich die japanischen Truppen nun aus den besetzten Gebieten zurück. Sie weigern sich jedoch weiterhin, uns die Mandschurei zurückzugeben."
 kmt.236.a:0 "Sie werden es sehen."
 kmt.237.t:0 "Frieden zwischen [Root.GetName] und [JAP,GetName]"
 kmt.237.d:0 "Nach der Intervention der Deutschen ziehen sich die japanischen Truppen nun aus den besetzten Gebieten zurück. Sie weigern sich jedoch weiterhin, uns die Mandschurei zurückzugeben."
 kmt.237.d_2:0 "Nach unserer Intervention ziehen sich die japanischen Truppen nun aus dem besetzten Gebiet zurück."
 kmt.237.a:0 "Sie werden es sehen."
 kmt.237.b:0 "Ein kluger Schachzug."
 kmt.238.t:0 "[JAP.GetName] weigert sich, sich zu beruhigen"
 kmt.238.d:0 "Trotz der Intervention weigert sich die japanische Regierung noch immer, ihre Waffen niederzulegen."
 kmt.238.a:0 "Das ist ihre Entscheidung."
 kmt.238.b:0 "Wir werden diese Demütigung nicht dulden."
 kmt.240.t:0 "[From.GetName] fordert erneut unser Eingreifen an"
 kmt.240.d:0 "Nach unserer letzten Intervention gibt es zwischen Japan und China immer noch große Reibereien. Insbesondere in der Mandschurei- und Taiwan-Frage. Aus diesem Grund hat [From.GetLeader] erneut einen offiziellen Brief an [GER.GetLeader] geschickt und um eine weitere Intervention gebeten."
 kmt.240.a:0 "Hoffe, das war das letzte Mal."
 kmt.241.t:0 "[GER.GetName] greift erneut ein"
 kmt.241.d:0 "[GER.GetLeader] hat erneut einen offiziellen Brief an [Root.GetLeader] geschickt, in dem es heißt, dass wir Taiwan und die Mandschurei an [From.From.GetName] zurückgeben sollten."
 kmt.241.a:0 "Für einen dauerhaften Frieden in Asien."
 kmt.243.t:0 "[JAP.GetName] kompromittiert"
 kmt.243.d:0 "Nach reiflicher Überlegung hat [JAP.GetLeader] beschlossen, die Mandschurei und Taiwan zurückzugeben und gleichzeitig die in der Region etablierten Marionettenregierungen aufzulösen."
 kmt.245.t:0 "[JAP.GetName] weigert sich, Gebiete zurückzugeben."
 kmt.245.d:0 "Trotz der Intervention weigert sich die japanische Regierung weiterhin, die besetzten Gebiete zurückzugeben."
 kmt.247.t:0 "[From.GetName] möchte unserer Fraktion beitreten"
 kmt.247.d:0 "Die starken Anführer von [From.GetRulingParty] haben große Fortschritte gemacht und bieten an, sich unserer Sache anzuschließen. Die Nation China ist bereit, für das Reich zu kämpfen."
 kmt.247.a:0 "Ein Verbundeter aus dem Osten"
 kmt.247.b:0 "Nein!"
 kmt.248.t:0 "Unsere Kolonien in Asien befreien sich!"
 kmt.248.d:0 "Kommunistische Revolutionäre in unseren Kolonien sind aufgestanden und haben die Kolonialregierung gestürzt, bevor wir überhaupt reagieren konnten. Jetzt haben sie die volle Kontrolle über das Gebiet und ihre Unabhängigkeit erklärt!"
 kmt.248.a:0 "Wir müssen diesen Fehler korrigieren!"
 kmt.248.b:0 "Wir haben keine Zeit dafür ..."
 kmt.249.t:0 "[CHI.GetLeader]s Überzeugung"
 kmt.249.d:0 "[CHI.GetLeader] ist gekommen, um [Root.GetLeader] persönlich zu treffen, in der Hoffnung, dass [Root.GetName] sich ihrem Krieg gegen die Japaner anschließen kann."
 kmt.249.a:0 "Gemeinsam stellen wir uns gegen den Faschismus!"
 kmt.249.b:0 "Wir wollen daran nichts teilhaben."
 kmt.250.t:0 "[ENG.GetName] lehnt ab"
 kmt.250.d:0 "[ENG.GetName] haben sich geweigert, sich unserem Krieg gegen die Japaner anzuschließen."
 kmt.250.a:0 "Wenn wir fallen, werden sie bald folgen."
 kmt.251.t:0 "[CHI.GetName]s neue Agenda"
 kmt.251.d:0 "Nachdem einige unserer Beamten die neuesten Pläne der chinesischen Regierung kennen, sind sie der Meinung, wir sollten unsere Kolonien in Asien aufgeben, um nicht von den Chinesen zertrampelt zu werden."
 kmt.251.a:0 "Wir sollten unsere Kolonien aufgeben." 
 kmt.251.b:0 "Bah, erinnern sie sich nicht daran, wie wir damals Macau eingenommen haben?"
 ## 14/11/2016 ##
 kmt.254.t:0 "Vietnam befreien?"
 kmt.254.d:0 "Als unsere Armee in eine große vietnamesische Stadt einmarschiert, jubelt die Bevölkerung und heißt ihre Ankunft willkommen.\n\nSollen wir ihre Stadt befreien und unser Versprechen erfüllen?"
 kmt.254.a:0 "Sie werden ein souveräner Staat."
 kmt.254.b:0 "Sie brauchen noch mehr Anleitung."
 kmt.254.c:0 "Dies ist nicht unser eigentliches Ziel."
 kmt.255.t:0 "Laos befreien?"
 kmt.255.d:0 "Unsere Armee erhält etwas Unterstützung von den lokalen laotischen Partisanen und erlangt die vollständige Kontrolle über das Gebiet.\n&#39;nSollen wir ihnen als Zeichen für ihre Hilfe und zur Erfüllung unseres Versprechens die Souveränität gewähren?"
 kmt.256.t:0 "Kambodscha befreien?"
 kmt.256.d:0 "Mit Hilfe der Einheimischen vertreiben wir unseren Feind schließlich aus der Khmer-Region.\n\nSollen wir die Kambodschaner wie versprochen befreien?"
 kmt.257.t:0 "Malaysia befreien?"
 kmt.257.d:0 "Die malaysische Bevölkerung begrüßt unsere Truppen begeistert und überreicht ihnen Blumen und Küsse, wenn sie in malaysische Städte und Dörfer einmarschieren.\n\nVielleicht werden sie ein souveräner Staat?"
 kmt.258.t:0 "Indonesien befreien?"
 kmt.258.d:0 "Die Niederländer haben die Indonesier nicht gezwungen, Niederländisch zu lernen, weil sie maximalen Profit wollten, was auch die nationalistischen Gefühle in den Indonesiern aufrechterhielt.\n\nJetzt, da wir die Kontrolle über indonesisches Land erlangt haben, sollten wir sie wie versprochen freilassen?"
 kmt.259.t:0 "Freies Indien?"
 kmt.259.d:0 "Nachdem die britische Kolonialregierung in Indien kapituliert hat, können wir das indische Volk von seinem unterdrückerischen britischen Oberherrn befreien. Gandhi dürfte mit unserer Methode zur Befreiung Indiens jedoch nicht zufrieden sein."#Gandhi prefers nukes
 kmt.259.a:0 "Die Inder werden nun über ihre eigene Nation herrschen und nicht länger von den Briten unterdrückt werden!"
 kmt.260.t:0 "Wir haben Hongkong eingenommen!"
 kmt.260.d:0 "Hongkong steht wieder unter chinesischer Herrschaft!"
 kmt.260.a:0 "Zhong Hua Min Zu Wan Sui!"
 kmt.261.t:0 "Wir haben Guangzhouwan eingenommen!"
 kmt.261.d:0 "Guangzhouwan steht wieder unter chinesischer Herrschaft!"
 kmt.262.t:0 "Wir haben Macao erobert!"
 kmt.262.d:0 "Macao steht wieder unter chinesischer Herrschaft!"
 kmt.263.t:0 "Befreite Vietnamesen"
 kmt.263.d:0 "Die vietnamesische Bevölkerung der kürzlich eroberten Regionen wurde befreit und schloss sich ihrer Nation an."
 kmt.263.a:0 "Asien wird wieder großartig sein!"
 kmt.264.t:0 "Malaysische Befreite"
 kmt.264.d:0 "Die malaysische Bevölkerung der kürzlich eroberten Regionen wurde befreit und schloss sich ihrer Nation an."
 kmt.265.t:0 "Befreite Indonesier"
 kmt.265.d:0 "Die indonesische Bevölkerung der kürzlich eroberten Regionen wurde befreit und schloss sich ihrer Nation an."
 kmt.266.t:0 "Asien entkolonialisiert"
 kmt.266.d:0 "Mit der Befreiung der meisten asiatischen Nationen von den bösen westlichen Kolonialherren ist unser Versprechen erfüllt und vielleicht ist für die neu gegründete Nation unserer asiatischen Mitbürger Frieden wichtiger als Krieg."
 kmt.266.a:0 "Frieden bringt Wohlstand."
 kmt.267.t:0 "Japanischer Support"
 kmt.267.d:0 "Unsere aktuellen Bemühungen, eine projapanische Fraktion in unserer Regierung zu unterstützen, wurden von der japanischen Regierung unterstützt. Unsere Beziehungen haben sich verbessert."
 kmt.267.a:0 "Gemeinsam werden wir Asien zum Ruhm führen!"
 kmt.268.t:0 "Japan zeigt Feindseligkeit"
 kmt.268.d:0 "Unsere aktuellen Bemühungen, eine projapanische Fraktion in unserer Regierung zu unterstützen, haben zu einer feindseligen Reaktion Japans geführt. Sie behaupten, wir wollten lediglich einen Krieg vermeiden, statt wirklich mit ihnen zusammenarbeiten zu wollen, und wir seien ehrlos."
 kmt.268.a:0 "Sie sind zu engstirnig."
 ## 30/12/2016 ##
 kmt.269.t:0 "Freies Malaysia?"
 kmt.269.d:0 "Nachdem die britische Kolonialregierung in Malaysia kapituliert hat, können wir das malaysische Volk von seinem unterdrückerischen britischen Oberherrn befreien."
 kmt.269.a:0 "Die Malaysier werden nun über ihre eigene Nation herrschen und nicht länger von den Briten unterdrückt werden!"
 kmt.270.t:0 "Freies Indonesien?"
 kmt.270.d:0 "Nachdem die niederländische Kolonialregierung in Indonesien kapituliert hat, können wir das indonesische Volk von seinem unterdrückerischen niederländischen Oberherrn befreien."
 kmt.270.a:0 "Die Indonesier werden nun über ihre eigene Nation herrschen und nicht länger von den Niederländern unterdrückt werden!"
 kmt.271.t:0 "Xi Bei San Ma"
 kmt.271.d:0 "Die Kommunisten sind erledigt und Ma Pu-fang ist in die Zentralregierung zurückgekehrt."
 kmt.271.a:0 "[Root.GetRulingParty] ist die einzige legitime Partei in China!"
 ## 2/1/2017 ##
 kmt.94.b:0 "So wie es sein sollte."
 ## 19/1/2017 ##
 kmt.275.t:0 "Rückkehr des Monarchismus"
 kmt.275.d:0 "Nachdem [MCK.GetLeader] seine Unabhängigkeit von [JAP.GetName] erklärt hatte, erklärte es, dass [MCK.GetNameDef] zurückgekehrt sei.\n\nNachdem wir China zuvor vom Monarchismus befreit hatten, wie sollten wir mit diesem sogenannten „[MCK.GetNameDef]“ umgehen?"
 kmt.275.a:0 "Tod den Mandschu-Schweinen!"
 kmt.275.b:0 "Vielleicht können wir doch koexistieren."
 kmt.275.c:0 "Unser Fokus muss woanders liegen."
 kmt.276.t:0 "[From.GetName] strebt Nichtangriffspakt an"
 kmt.276.d:0 "Ein Diplomat aus [From.GetName] hat Dokumente für einen Nichtangriffspakt zwischen unserem Imperium und ihrer Nation mitgebracht."
 kmt.276.a:0 "Dies bedeutet, dass unsere Stärke von anderen anerkannt wird."
 kmt.276.b:0 "Das Imperium wird über sie alle herrschen!"
 kmt.277.t:0 "Pakt unterzeichnet"
 kmt.277.d:0 "[From.GetName] hat den Nichtangriffspakt unterzeichnet."
 kmt.277.a:0 "Wird dies wirklich Frieden bringen?"
 kmt.278.t:0 "Pakt abgelehnt"
 kmt.278.d:0 "[From.GetName] hat sich geweigert, den Nichtangriffspakt zu unterzeichnen."
 kmt.278.a:0 "Wir müssen unsere Männer vorbereiten!"
 ## 21/1/2017 ##
 kmt.272.t:0 "Krieg!"
 kmt.272.d:0 "Unsere Regierung betrachtet den aktuellen Krieg als das wichtigste aktuelle Problem. Da sich die Beamten nun auf den Krieg konzentrieren, ist die Korruption weniger gravierend."
 kmt.272.a:0 "Wir sollten einen Weg finden, die Korruption vollständig auszurotten."
 kmt.273.t:0 "Korruption erreicht wieder das Vorkriegsniveau"
 kmt.273.d:0 "Nach dem Ende des Krieges begannen die Behörden erneut, die Bevölkerung auszubeuten."
 ## 22/1/2017 ##
 kmt.279.t:0 "Wahl"
 ## 29/1/2017 ##
 kmt.78.d:0 "Lung Yun ist nach der Zerschlagung seiner Clique gefangen genommen worden. Nun müssen wir über sein Schicksal entscheiden. Manche meinen, er wäre eine willkommene Verstärkung, andere meinen, er sollte hingerichtet werden, um ein Exempel zu statuieren."
 kmt.77.d:0 "Der ehemalige Herrscher der Guang-Xi-Clique, Li Tsung-jen, ist nach der Zerschlagung seiner Clique gefangen genommen worden. Nun liegt es an uns, über sein Schicksal zu entscheiden. Manche meinen, er wäre eine willkommene Ergänzung, andere meinen, er sollte hingerichtet werden, um ein Exempel zu statuieren."
 kmt.76.d:0 "Dieser ehemalige „König von Shanxi“ ist nach der Zerschlagung seiner Clique gefangen genommen worden. Nun müssen wir über sein Schicksal entscheiden. Manche meinen, er wäre eine willkommene Ergänzung für die Reihen, andere meinen, er sollte hingerichtet werden, um ein Exempel zu statuieren."
 ## 5/2/2017 ##
 kmt.281.t:0 "Schicksal von [YUT.GetLeader]"
 kmt.281.d:0 "Der ehemalige Kwangtung-Kriegsherr ist nach der Zerschlagung seiner Clique gefangen genommen worden. Nun müssen wir über sein Schicksal entscheiden. Manche meinen, er wäre eine willkommene Verstärkung für die Soldaten, andere meinen, er sollte hingerichtet werden, um ein Exempel zu statuieren."
 kmt_yhm_join:0 "Yu Han-mou wird der Armee beitreten"
 kmt_cjt_join:0 "Chen Chi-teng wird der Armee beitreten"
 ## 11/2/2017 ##
 kmt.224.t:0 "[From.GetName] Unterstützung in der Schifffahrtsindustrie anfordern"
 ## 19/2/2017 ##
 kmt.282.t:0 "Kampf ums Überleben"
 kmt.282.d:0 "Immer mehr unserer Soldaten und Generäle haben erkannt, dass der aktuelle Krieg nur gewonnen werden kann, wenn sie sich voll und ganz darauf einlassen. Dies hat die Leistung unserer Armee auf dem Schlachtfeld mehr oder weniger verbessert."
 kmt.282.a:0 "Für China!"
 kmt.283.t:0 "Die verzweifeltsten Stunden"
 kmt.284.t:0 "Die Mängel unserer Armee"
 kmt.284.d:0 "Die Beobachtung der Leistung unserer Armeen im Feld zeigt, dass die Schwächen unserer Armeen für den Feind immer deutlicher erkennbar werden. Wenn wir diese Schwächen weiterhin ignorieren, ist das Überleben unserer Nation in den kommenden Stürmen sehr fraglich."
 kmt.284.a:0 "Wir müssen etwas dagegen tun."
 kmt.285.t:0 "Armee verbessert"
 kmt.285.d:0 "Die jüngsten Reformen unserer Armee sind fruchtbar, unsere Armee ist jetzt besser."
 kmt.285.a:0 "Es ist gut, Fortschritte zu sehen."
 ## 20/2/2017 ##
 kmt.286.t:0 "Die Blauhemden"
 kmt.286.d:0 "Die Blauhemden und ihre untergeordnete Behörde BIS (Bureau of Investigation and Statistic) haben maßgeblich zu unserem Aufstieg beigetragen. Es wäre selbstverständlich, wenn sie als Belohnung für ihre Bemühungen größere Macht erhalten würden. Doch da [Root.GetLeader] befürchtet, dass sie sich gegen ihn wenden könnten, scheint er einen anderen Plan zu haben ..."
 kmt.286.a:0 "Man kann ihnen vertrauen"
 kmt.286.b:0 "Löst die Blauhemden auf!"
 ## 9/3/2017 ##
 kmt.287.t:0 "Luftschutzplan"
 kmt.287.d:0 "[Root.GetLeader] hat kürzlich bei einem Treffen mit dem Vereinigten Stabschef im Weißen Haus seinen Wunsch geäußert, einen Luftangriff auf die japanischen Heimatinseln durchzuführen. Ein erfolgreicher Angriff könnte die Moral unserer Armee erheblich stärken und die Toten von Pearl Harbor rächen."
 kmt.287.a:0 "Machen Sie sich bereit dafür."
 kmt.287.b:0 "Zu riskant"
 kmt.288.t:0 "Erfolgreicher Luftangriff"
 kmt.288.d:0 "Der von James H. Doolittle angeführte Angriff war erfolgreich, auch wenn die meisten B-25-Bomber in der Region China abstürzten oder notwasserten. Einige japanische Fabriken wurden dabei schwer bombardiert. Dies hat die Moral unserer Soldaten deutlich gestärkt."
 kmt.288.a:0 "Verdammt, ja!"
 kmt.289.t:0 "Versagen"
 kmt.289.d:0 "Der Luftangriff auf Tokio war verheerend. Unser Flugzeugträger wurde vom feindlichen Radar erfasst und alarmierte den Feind. Unsere Bomber wurden unter schweres Boden-Luft-Feuer gestellt und viele von ihnen abgeschossen. James H. Doolittle wurde als gefallen bestätigt."
 kmt.289.a:0 "Das ist nicht gut."
 kmt.290.t:0 "[From.GetAdjective] Luftangriff"
 kmt.290.d:0 "Ein Luftangriff der [From.GetAdjective] hat in der Region [Root.Capital.GetName] Chaos angerichtet. Fabriken wurden zerstört und Bürger verletzt."
 kmt.290.a:0 "Bakayarou!"
 kmt.291.t:0 "[From.GetAdjective] Piloten gelandet"
 kmt.291.d:0 "Einige [From.GetAdjective]-Piloten sind nach einem Luftangriff auf Japan in unserem Gebiet gelandet. Unsere Truppen haben sie vor Ort gefunden und die Behörden beraten derzeit, wie mit der Situation umgegangen werden soll."
 kmt.291.a:0 "Helfen Sie ihnen, zu [From.GetName] zurückzukehren."
 kmt.291.b:0 "Haltet diese weißen Schweine fest!"
 kmt.292.t:0 "[From.GetAdjective] In Wladiwostok gelandet"
 kmt.292.d:0 "Ein Pilot aus [From.GetAdjective] ist nach einem Luftangriff auf die japanische Heimatinsel in Wladiwostok gelandet. Die örtliche Polizei hat den Piloten in Gewahrsam genommen. Eine Rückführung des Piloten nach [From.GetName] könnte unsere Beziehungen zu Japan verschlechtern. Wie sollen wir mit diesem Problem umgehen?"
 kmt.292.a:0 "Halten Sie den Piloten fest"
 kmt.292.b:0 "Helfen Sie dem Piloten, nach [From.GetName] zurückzukehren."
 kmt.292.c:0 "Übergeben Sie den Piloten an Japan"
 kmt.293.t:0 "[From.GetAdjective] Luftangriff"
 kmt.293.d:0 "Heute hat ein Luftangriff der [From.GetAdjective] die Öffentlichkeit in Panik versetzt. Ihre Bemühungen waren jedoch vergeblich, da unsere gut vorbereiteten Truppen ihre Flugzeuge mit Leichtigkeit vom Himmel holen. Wir hatten kaum Verluste. Diese erbärmliche Operation ist ein klarer Beweis dafür, dass wir den Krieg gegen diese barbarischen Schweine gewinnen werden!"
 kmt.293.a:0 "Muda, muda, muda!"
 kmt.294.t:0 "[From.GetAdjective] Unterstützen Sie unsere Piloten"
 kmt.294.d:0 "Die [From.GetAdjective]-Regierung hat unseren in ihrem Hoheitsgebiet gelandeten Piloten Hilfe angeboten, und sie werden in Kürze nach Hause zurückkehren. Ihr Handeln wird die Beziehungen zwischen unseren beiden Nationen sicherlich verbessern."
 kmt.294.a:0 "Sie sind zu nett."
 kmt.295.t:0 "[From.GetName] hat unsere Piloten festgenommen"
 kmt.295.d:0 "Unsere Piloten, die in [From.GetAdjective]-Gebieten gelandet sind, wurden von [From.GetName] festgehalten. Sie lehnen außerdem jegliche Verhandlungen ab."
 kmt.295.a:0 "Möge Gott mit ihnen sein."
 kmt.296.t:0 "[From.GetName] hilft [USA.GetAdjective] Piloten"
 kmt.296.d:0 "[From.GetName] hat den in Wladiwostok gelandeten [USA.GetAdjective]-Piloten geholfen, nach [USA.GetName] zurückzukehren, dies hat die Beziehung zwischen uns verschlechtert."
 kmt.296.a:0 "Ich wusste, dass Barbaren Barbaren helfen werden!"
 kmt.297.t:0 "[From.GetName] übergibt unseren Piloten an Japan"
 kmt.297.d:0 "Unser Pilot, der in Wladiwostok gelandet ist, wurde von [From.GetName] an [JAP.GetName] übergeben. Dies wird die Beziehungen zwischen unseren beiden Nationen verschlechtern."
 kmt.297.a:0 "Wir hoffen, dass sie wissen, dass sie dem Teufel helfen."
 kmt.298.t:0 "[USA.GetAdjective] Pilot aus [From.GetName]"
 kmt.298.d:0 "[From.GetName] hat beschlossen, uns den in Wladiwostok gelandeten [USA.GetAdjective]-Piloten zu übergeben. Dies soll als Zeichen des Vertrauens zwischen unseren beiden Nationen dienen."
 kmt.298.a:0 "Begrüßen wir unseren „Furendo“."
 kmt.299.t:0 "Probleme in Sichuan"
 kmt.299.a:0 "Es ist mir völlig egal."
 kmt.299.b:0 "Schicken Sie Hilfe."
 ## 17/3/2017 ##
 kmt.300.t:0 "Fall von [From.GetName]"
 kmt.300.d:0 "Mit der Kapitulation von [From.GetName] im aktuellen Krieg können wir unsere Macht in der Region China weiter zentralisieren, indem wir ihre verbleibenden Streitkräfte in unsere „eingliedern“ …"
 kmt.300.a:0 "Sie sollten froh sein, dass wir ihnen Positionen in unserer Armee anbieten!"
 kmt.301.t:0 "Der zweite chinesische Bürgerkrieg"
 kmt.301.d_1:0 "Der zweite chinesische Bürgerkrieg zwischen [PRC.GetRulingParty] und [CHI.GetRulingParty] ist ausgebrochen. Sollen wir [PRC.GetRulingParty] helfen, die tyrannische Herrschaft der [CHI.GetRulingParty] zu besiegen?"
 kmt.301.d_2:0 "Der zweite chinesische Bürgerkrieg zwischen [CHI.GetRulingParty] und [PRC.GetRulingParty] ist ausgebrochen. Sollen wir [CHI.GetRulingParty] dabei helfen, die kommunistischen Banditen zu besiegen?"
 kmt.301.a:0 "Natürlich sollten wir das!"
 kmt.301.b:0 "Ich wäre in diesem Kampf lieber der Fischer."
 kmt.302.t:0 "[From.GetName] unterstützt unsere Sache"
 kmt.302.d_1:0 "[From.GetName] hat beschlossen, sich uns anzuschließen, um die kommunistischen Banditen zu besiegen!"
 kmt.302.d_2:0 "[From.GetName] hat beschlossen, sich unserer Seite anzuschließen, um die chinesischen Bauern von der tyrannischen [CHI.GetRulingParty] zu befreien!"
 kmt.302.a:0 "Tod den Kommunisten!"
 kmt.302.b:0 "Erhebt euch! Ihr, die ihr euch weigert, Sklaven zu sein!"
 ## 5/4/2017 ##
 kmt.303.t:0 "Schicksal von Puyi"
 kmt.303.d:0 "Aisin Gioro Puyi wurde in einem Bahnhof gefunden, wo er auf seinen Fluchtzug wartete. Nach dem Tod seiner japanischen Leibwächter ergab er sich unserer Armee. Wie sollen wir mit diesem „letzten Kaiser“ umgehen?"
 kmt.303.a:0 "Verschone ihn, er ist nur eine Schachfigur."
 kmt.303.b:0 "Stirb, Verräter!"
 ## 10/4/2017 ##
 kmt.304.t:0 "Der Feind rückt näher an Zhengzhou heran"
 kmt.304.d:0 "Unser Feind ist jetzt sehr nahe an Zhengzhou. Vielleicht könnten wir die Deiche am Gelben Fluss öffnen und die Flut nutzen, um unsere Feinde abzuschrecken."
 kmt.304.a:0 "Dies dient dem Allgemeinwohl."
 kmt.304.b:0 "Das ist Wahnsinn!"
 hyk_flood:0 "Flut"
 ## 23/4/2017 ##
 kmt.321.t:0 "[GXC.GetName] schließt sich uns an"
 kmt.321.d:0 "Wie vereinbart hat sich [GXC.GetName] unserem Krieg gegen die japanischen Invasoren angeschlossen."
 kmt.321.a:0 "Wir werden die imperialistischen Schweine besiegen!"
 kmt.322.t:0 "Wir sind [CHI.GetName] beigetreten"
 kmt.322.d:0 "Wie vereinbart haben wir uns [CHI.GetName] in ihrem Krieg gegen die japanischen Invasoren angeschlossen."
 kmt.322.a:0 "Wir werden die imperialistischen Schweine besiegen!"
 kmt.323.t:0 "Chongqing vorbereiten"
 kmt.323.a:0 "Wir werden jetzt Chongqing übernehmen"
 kmt.324.t:0 "Industrie verlagert"
 kmt.324.d:0 "Nach der Invasion der Japaner wurden einige Maschinen und Fabriken in der Nähe der Frontlinie nach Sichuan verlegt."
 kmt.324.a:0 "Hier sollten sie sicher sein."
 KMT_will_die_if_nanking_fall_tt:0 "§RIm Falle von Nanking werdet ihr bedingungslos von [CHI.GetName] annektiert.§!"
 ## 24/4/2017 ##
 kmt.325.t:0 "[KMT_central_gov_tag.GetName] Unter Beschuss!"
 kmt.325.d:0 "[KMT_central_gov_tag.GetName] wurde von ausländischen Invasoren angegriffen, wir sollten ihnen helfen!"
 kmt.325.a:0 "Wir werden sie aus chinesischem Boden vertreiben!"
 kmt.325.b:0 "Ich glaube, sie werden ohne uns klarkommen."
 kmt.326.t:0 "[From.GetName] schließt sich uns an"
 kmt.326.d:0 "[From.GetName] hat sich uns in unserem Krieg gegen die japanischen Invasoren angeschlossen!"
 ## 25/4/2017 ##
 kmt.327.t:0 "[From.GetName] beendet den Bürgerkrieg"
 kmt.327.d:0 "[From.GetLeader] hat erkannt, dass die Japaner eine größere Bedrohung darstellen als die Kommunisten, und hat beschlossen, den aktuellen Bürgerkrieg mit den Kommunisten zu beenden. Die Offensive der Nordostarmee wurde eingestellt."
 kmt.327.a:0 "Endlich!"
 ## 4/5/2017 ##
 kmt.328.t:0 "Taktik der verbrannten Erde"
 kmt.328.d:0 "Die vorrückenden Invasoren haben unsere Städte und Dörfer besetzt. Unsere Truppen sind zum Rückzug gezwungen, um ihre Stärke zu erhalten. Es gelingt ihnen jedoch, vor ihrem Abzug die lokale Infrastruktur zu zerstören, was den Vormarsch unserer Feinde behindert."
 kmt.328.a:0 "Gut gemacht"
 ## 8/5/2017 ##
 kmt.323.d:0 "Nanking ist an unseren Feind gefallen. Wir müssen einen anderen Ort finden, von dem aus wir unser Kommando übernehmen können. Chongqing muss sich auf diese Aufgabe vorbereiten.\n\nWir haben außerdem die Nachricht erhalten, dass General Liu Hsiang an den Folgen seiner Krankheit verstorben ist."
 ## 5/6/2017 ##
 kmt.336.t:0 "Treffen mit den Kommunisten?"
 kmt.336.d:0 "Da der Krieg gegen die Japaner vorbei ist, sind die kommunistischen Banditen nicht mehr unser Ziel. Eine direkte Offensive könnte sich unter den gegebenen Umständen jedoch negativ auf unseren Ruf auswirken. Wir könnten uns auch mit [PRC.GetLeader] treffen und dann handeln."
 kmt.336.a:0 "Schicken Sie jemanden zum Meeting."
 kmt.336.b:0 "Wir werden ihnen auflauern, wenn sie ankommen."
 kmt.336.c:0 "Wir werden koexistieren."
 kmt.336.e:0 "Wen interessiert so ein Mist wie „Ruf“?"
 kmt.337.t:0 "Eine Einladung"
 kmt.337.d:0 "[Root.GetLeader] hat von [From.GetRulingParty] eine Einladung zu einem Treffen erhalten. Es wird gesagt, dass sich das Treffen auf die Zukunft Chinas konzentrieren und versuchen wird, eine friedlichere Lösung für unsere derzeit angespannten Beziehungen zu finden. Einige glauben jedoch, dass es sich um eine Falle handelt, um unseren [Root.GetLeader] loszuwerden."
 kmt.337.a:0 "Es gibt nichts, wovor Sie Angst haben müssen."
 kmt.337.b:0 "Wir werden die Initiative ergreifen und ihnen auflauern."
 kmt.337.c:0 "Schlagen Sie sie jetzt, damit werden sie nie rechnen!"
 kmt.339.t:0 "Hinterhalt!"
 kmt.339.d_rep_killed:0 "Der dreckige Abschaum von [From.GetRulingParty] hat uns überfallen! Sie haben überall Wachen postiert und fangen an, auf unsere Männer zu schießen, sobald wir den Besprechungsraum betreten. Glücklicherweise überlebte [Root.GetLeader] den Angriff mit leichten Verletzungen durch Querschläger. [Root.GetLeader] konnte erfolgreich ein Flugzeug besteigen und flog zurück nach [Root.Capital.GetName]. Das Feuer des Bürgerkriegs ist neu entfacht."
 kmt.339.d_fight:0 "Die [From.GetRulingParty]-Dreckskerle hatten dasselbe im Sinn wie wir und schickten Streitkräfte zum Ort! Der Besprechungsraum und die Umgebung verwandelten sich in ein Schlachtfeld, nachdem beide Seiten ihre wahre Absicht offenbart hatten, sich vor Ort gegenseitig zu eliminieren. Das Feuer des Bürgerkriegs ist neu entfacht."
 kmt.339.a:0 "Tod für [From.GetLeader]!"
 kmt.340.d_rep_killed:0 "Unser Hinterhalt war erfolgreich und schaltete viele Staatsfeinde vor Ort aus. Ihr Anführer erlitt jedoch nur leichte Verletzungen und floh zurück in Sicherheit."
 kmt.340.d_fight:0 "Auch unser Feind hat versucht, uns in einen Hinterhalt zu locken! Unsere Truppen sind auf ihre getroffen, und in der Gegend sind Kämpfe ausgebrochen. Wir sollten unsere Männer organisieren und uns auf weitere Aktionen vorbereiten."
 kmt.340.a:0 "Egal, am Ende werden wir triumphieren."
 kmt.341.t:0 "[From.GetName] Akzeptiert"
 kmt.341.d:0 "[From.GetLeader] hat unsere Einladung angenommen und uns mitgeteilt, dass wir mit ihrer Anwesenheit rechnen können."
 kmt.341.a:0 "Wir werden sehen..."
 kmt.342.t:0 "[From.GetName] erklärt uns den Krieg"
 kmt.342.d_p:0 "[From.GetName] hat uns den Krieg erklärt! Es scheint, als würden sie nicht mehr mit uns zusammenarbeiten und uns ein für alle Mal loswerden wollen!"
 kmt.342.d_k:0 "[From.GetName] hat uns den Krieg erklärt! Die elenden Banditen haben sich geweigert, vernünftig zu sein und ihre barbarische Natur gezeigt!"
 kmt.342.a:0 "Wir wussten es!"
 kmt.343.t:0 "Das Treffen"
 kmt.343.d:0 "Vertreter beider Seiten sind vor Ort eingetroffen. Was soll unser Vertreter tun?"
 kmt.343.a:0 "Geben Sie uns Zeit zur Vorbereitung."
 kmt.343.b:0 "Suchen Sie nach Zusammenarbeit"
 kmt.344.d_stall:0 "Die Menschen vermuten nun, dass die Vertreter von [From.GetRulingParty] tatsächlich versuchen, Zeit zu schinden und Zeit für ihre Vorbereitungen zu gewinnen. Wenn das wirklich der Fall ist, müssen wir Maßnahmen zu unserem Schutz ergreifen."
 kmt.344.d_c:0 "Die [From.GetRulingParty] hat ihren Wunsch geäußert, eine gemeinsame Regierung zu bilden. Sollten wir ihr Angebot annehmen und China gemeinsam regieren?"
 kmt.343.c:0 "Dann warten wir auch mal ab …"
 kmt.344.a:0 "Wir werden die Initiative ergreifen und sie zuerst angreifen!"
 kmt.344.b:0 "Eine gemeinsame Regierung erscheint mir wünschenswert."
 kmt.345.d:0 "[From.GetName] hat die Offensive gestartet und beginnt, uns anzugreifen!"
 kmt.346.t:0 "[From.GetName] Einverstanden"
 kmt.346.d:0 "[From.GetName] hat sich auf eine gemeinsame Regierung geeinigt."
 kmt.346.a:0 "Gut für alle"
 ## 7/6/2017 ##
 KMT_united_chinese_gov:0 "Gemeinsame chinesische Regierung"
 kmt.347.t:0 "Rückzug nach Taiwan?"
 kmt.347.d:0 "Der gegenwärtige Krieg läuft für uns nicht besonders gut. Manche meinen, wir sollten uns nach Taiwan zurückziehen und von dort aus einen Gegenangriff vorbereiten."
 kmt.347.a:0 "Das ist nur ein taktischer Rückzug ..."
 kmt.347.b:0 "Niemals!"
 kmt.348.t:0 "Jangtse-Teilung"
 kmt.348.d:0 "Der aktuelle Krieg läuft nicht gut für uns. Manche schlagen vor, wir sollten den Kommunisten ein Friedensangebot machen und China spalten. Wir könnten die Zeit nutzen, um uns neu zu formieren und sie zu eliminieren, sobald unsere Armee wieder bereit ist."
 kmt.348.a:0 "Klingt gut."
 kmt.349.t:0 "[From.GetName] hat uns verlassen"
 kmt.349.d:0 "[From.GetLeader] hat beschlossen, der Forderung von [JAP.GetAdjective] nachzugeben und uns aufzugeben."
 kmt.349.a:0 "Wir können einem so großen Bösen nicht standhalten ..."
 kmt.349.b:0 "Wir sterben lieber, als zum Spielball eines großen Übels zu werden!"
 kmt.350.t:0 "[From.GetName] Trotz"
 kmt.350.d:0 "[From.GetName] hat beschlossen, unsere Besetzung ihres Territoriums abzulehnen, obwohl [CHI.GetLeader] die Erlaubnis dazu erteilt hat."
 kmt.350.d_2:0 "[From.GetName] hat die kluge Entscheidung getroffen, unsere Marionette zu werden."
 kmt.350.a:0 "Bakamono ga! Nihon no Pawā wa sekaiichi!" 
 kmt.335.t:0 "Verbesserung der Burma-Straße"
 kmt.335.d:0 "Während unserer Arbeit rieten uns einige Experten, einige Ressourcen für den Bau einer Reihe von Festungen entlang des südlichen Teils von Yunnan zu verwenden, um unsere Feinde wirksam aufzuhalten, falls sie aus dem Süden eindringen wollten."
 kmt.335.a:0 "Klingt gut."
 kmt.335.b:0 "Darüber besteht kein Grund zur Sorge."
 KMT_burma_rd_forts_tt:0 "§YAnstelle einer zivilen Fabrik werden entlang der Südgrenze des Staates Yunnan Festungen errichtet.§!"
 kmt.351.t:0 "[From.GetName] möchte Befestigungen in unseren Gebieten bauen"
 kmt.351.d:0 "[From.GetName] hat versucht, Soldaten und Militäringenieure in unser Gebiet zu schicken, um Befestigungen zu errichten, die potenzielle Eindringlinge abwehren und sie daran hindern sollen, strategische Punkte zu erobern. Dies kann zwar unsere lokale Verteidigung stärken, doch wenn wir ihnen erlauben, in unser Gebiet einzudringen, wird die Position von [Root.GetLeader] in große Gefahr geraten."
 kmt.351.a:0 "NEIN! Sie können die Festungen woanders bauen!"
 kmt.351.b:0 "Zum Wohle der chinesischen Nation ..."
 kmt.352.t:0 "[From.GetLeader]s Rat"
 kmt.352.d:0 "[From.GetLeader] hat erklärt, dass sich [From.Capital.GetName] derzeit in einer sehr instabilen Lage befindet und unseren Männern „empfehlen“ würde, nicht dorthin zu gehen. [From.GetLeader] erklärte außerdem, dass sie die Befestigungen selbst bauen würden. Wir alle wissen jedoch besser, warum er unsere Männer vor der Tür halten will …"
 kmt.352.a:0 "Er gefährdet die gesamte Nation, wir müssen ihn loswerden!"
 kmt.352.b:0 "Wir dürfen in dieser Notsituation unsere Waffen nicht auf unsere Brüder richten ..."
 kmt.353.t:0 "Befestigungen gebaut"
 kmt.353.d:0 "[From.GetLeader] hat unsere Männer willkommen geheißen, als sie in die Provinz Shantung einmarschierten, um die für das Überleben unserer Nation notwendigen Befestigungen zu bauen."
 kmt.353.a:0 "Gut zu hören."
 KMT_CQ_stall_time_tt:0 "§REs wird keine Folgeveranstaltungen geben§!\n"
 PRC_stall_time_tt:0 "Habe mich entschieden, bei einem Nachkriegstreffen mit der [CHI.GetRulingParty] Zeit zu schinden"
 ## 9/6/2017 ##
 kmt.355.t:0 "Wehrpflicht"
 kmt.355.d:0 "Einige Beamte hatten die Idee, Männer, darunter auch Studenten, zwangsweise zum Militärdienst einzuziehen."
 kmt.355.a:0 "Ein ungeschliffener Edelstein funkelt nicht."
 kmt.355.b:0 "Klingt schrecklich."
 ## 14/6/2017 ##
 kmt.203.t:0 "Feind nähert sich [KMT_treasure_state.GetName]"
 kmt.203.d:0 "Unser Feind rückt immer näher an [KMT_treasure_state.GetName] heran, wo sich unsere Nationalschätze befinden. Sollten sie diese Schätze entdecken, würden sie ihnen mit Sicherheit irreparablen Schaden zufügen. Wir müssen sie bewahren und an einen sichereren Ort bringen!"
 kmt.203.a:0 "Dies kann als Instrument zur Stärkung der Moral unserer Soldaten genutzt werden."
 kmt.203.b:0 "Wir müssen diese Artefakte bewahren!"
 kmt.204.t:0 "Geplünderte Artefakte"
 kmt.204.d:0 "Da wir die Artefakte nicht umgehend übergeben haben, wurden sie von unserem Feind geplündert. Es heißt, einige der Artefakte seien für einen leichteren Transport in kleinere Stücke zerbrochen worden. Diese Nachrichten haben unserer Nation und dem Geist unseres Volkes großen Schaden zugefügt."
 kmt.204.a:0 "Wie konnten sie nur!"
 KMT_will_be_destination_tt:0 "Wird der neue Standort der Artefakte\n"
 ## 16/6/2017 ##
 kmt.356.t:0 "Begegnung mit unserem Nachbarn"
 kmt.356.d:0 "Nach den jüngsten Ereignissen sind in unserer Umgebung neue Nachbarn entstanden. Wir könnten eine gute Beziehung zu ihnen aufbauen und unsere Macht in der Region stärken."
 kmt.356.a:0 "Klingt gut."
 kmt.356.b:0 "Alleine kommen wir besser zurecht."
 kmt.357.t:0 "[From.GetAdjective] Delegation"
 kmt.357.d:0 "[From.GetName] hat Delegationen entsandt, um eine enge Beziehung zu uns aufzubauen."
 kmt.357.a:0 "Wir werden zusammenarbeiten"
 kmt.357.b:0 "Wir suchen lieber Schutz im Schatten des Riesen."
 kmt.357.c:0 "Wir werden nicht zulassen, dass der Einfluss des Teufels noch weiter zunimmt!"
 kmt.358.t:0 "Gemeinsam stärker"
 kmt.358.d:0 "[From.GetName] hat einer Zusammenarbeit mit uns zugestimmt."
 kmt.358.d_p:0 "[From.GetName] hat beschlossen, bei uns Schutz zu suchen und einen Teil seiner Autonomie aufgegeben."
 kmt.358.a:0 "Kluge Entscheidung."
 kmt.359.t:0 "[From.GetName] Abgelehnt"
 kmt.359.d:0 "[From.GetName] hat beschlossen, unser Angebot abzulehnen."
 kmt.359.a:0 "Wir müssen unsere Interessen in diesem Gebiet sichern, auch mit Gewalt!"
 ## 15/7/2017 ##
 kmt.320.t:0 "[SOV.GetAdjective] Unterstützung"
 kmt.320.d:0 "[SOV.GetName] hat uns weitere Ausrüstung geschickt, die uns beim Kampf gegen unseren Feind hilft!"
 kmt.320.a:0 "Fantastisch!"
 ## 19/7/2017 ##
 kmt.362.t:0 "Niederlage durch [From.GetName]"
 kmt.362.d:0 "Unser Konflikt mit [BDW_victor.GetName] hat zu unserer Niederlage geführt. Ihre Truppen sind mit minimalem Widerstand in unser Gebiet einmarschiert und haben die Kontrolle über das Gebiet übernommen."
 kmt.362.a:0 "Sehr bedauerlich."
 kmt.363.t:0 "Sieg gegen [From.GetName]"
 kmt.363.d:0 "Wir sind aus einem kürzlichen Konflikt mit [From.GetName] siegreich hervorgegangen. Unsere Truppen haben nun das Gebiet übernommen, in dem sie einst ihren Widerstand gegen uns leisteten."
 kmt.363.a:0 "Ein glorreicher Sieg!"
 kmt.364.t:0 "Schicksal von Han Fu-chu"
 kmt.364.d:0 "Dieser ehemalige Kriegsherr von Shantung wurde von unseren Männern gefangen genommen. Er konnte ein hohes Maß an Autonomie in Shantung bewahren, während er noch das Oberhaupt der Region war, und stellte eine große Bedrohung für die Autorität der Zentralregierung dar.\n\nWie soll mit ihm verfahren werden?"
 ## 21/7/2017 ##
 kmt.100.t:0 "[From.GetLeader]s Ultimatum"
 ## 26/7/2017 ##
 kmt.366.t:0 "Gelegenheit"
 kmt.366.d:0 "Quellen zufolge gibt es in [PRC.GetName] landesweite Unruhen. Das könnte unsere Chance sein, das Festland von diesem kommunistischen Abschaum zurückzuerobern!"
 kmt.366.a:0 "Bereiten Sie unsere Männer vor!"
 kmt.366.b:0 "Es ist noch nicht soweit."
 ## 26/8/2017 ##
 kmt.367.t:0 "Japanische Kollaborateure"
 kmt.367.d:0 "Einige Chinesen haben beschlossen, ihr Land für ihre eigenen Güter zu verraten, während wir gegen die japanische Bedrohung kämpfen. Diese „Hanjianer“ sind nun nach Kriegsende in unsere Hände gefallen. Sie verdienen vielleicht den Tod für ihren Verrat, aber angesichts der aktuellen Situation gibt es vielleicht einen anderen Weg, mit ihnen umzugehen …"
 kmt.367.a:0 "Diese verräterischen Hunde erwartet nur der Tod!" 
 kmt.367.b:0 "Zwingen Sie sie, unter unserem Banner zu kämpfen!"
 kmt.367.c:0 "Wir können noch von ihrer Stärke und ihrem Wissen profitieren …"
 kmt.368.t:0 "Kollaborateure und Überläufer"
 kmt.368.d:0 "[CHI.GetName]s harte Behandlung der kapitulierten Kollaborateure hat zu Desertionen in den Reihen der neu organisierten Divisionen geführt. Diese Überläufer suchen Schutz bei uns und könnten, nachdem sie die tyrannische Tat der [CHI.GetRulingParty] miterlebt haben, genauso gut an unserer Seite kämpfen. Einige unserer Kameraden sind jedoch immer noch der Meinung, dass diese Kollaborateure keine zweite Chance verdienen ..."
 kmt.368.a:0 "Wir könnten mehr Männer gebrauchen."
 kmt.368.b:0 "Wir werden keine Verräter dulden."
 ## 31/8/2017 ##
 kmt.208.a:0 "Drucken Sie mehr Geld aus."
 kmt.369.t:0 "[CHI.GetLeader] zum Ruhestand zwingen?"
 kmt.369.d:0 "[CHI.GetLeader] hat sich als unfähig erwiesen, unser Land zu führen. Wenn man ihm die Führung des Landes und des Militärs noch länger überlässt, werden unsere Chancen, diesen Krieg zu gewinnen, verschwindend gering sein. Es ist Zeit für ihn, zurückzutreten und unseren Vizepräsidenten [Root.GetLeader] seinen Platz einnehmen zu lassen."
 kmt.369.a:0 "Sagen Sie ihm, er soll zurücktreten."
 kmt.369.b:0 "Es ist besser, sich ihm nicht zu widersetzen ..."
 kmt.370.t:0 "Zurücktreten"
 kmt.370.d:0 "[From.GetLeader] hat sich mit [XIA.GetLeader] verbündet, um [Root.GetLeader] zum Rücktritt zu zwingen. Sie sagen, dass ein neuer Präsident nötig sei, um die Rote Pest, die in China wütet, überhaupt überleben zu können."
 kmt.370.a:0 "Bußgeld."
 kmt.370.b:0 "Niemals!"
 kmt.371.t:0 "Erfolg"
 kmt.371.d:0 "[Root.GetLeader] ist jetzt Präsident von [CHI.GetName]."
 kmt.371.a:0 "Gut"
 kmt.372.t:0 "[From.GetLeader] lehnt ab"
 kmt.372.d:0 "[From.GetLeader] hat sich geweigert, zurückzutreten."
 kmt.372.a:0 "Verdammt!"
 kmt.373.t:0 "Holen Sie sich Hilfe von [USA.GetName]"
 kmt.373.d:0 "Unsere derzeitige Lage ist katastrophal. Wenn wir diesen Krieg gewinnen wollen, müssen wir möglicherweise ausländische Hilfe in Anspruch nehmen."
 kmt.373.a:0 "Schicken Sie jemanden zu [USA.Capital.GetName], um Hilfe zu erhalten."
 kmt.373.b:0 "Das ist eine chinesische Angelegenheit!"
 kmt.374.t:0 "Hilfe an [CHI.GetName] senden?"
 kmt.374.d:0 "Der aktuelle Krieg von [CHI.GetName] läuft nicht sehr gut für sie und sie haben Vertreter um Hilfe geschickt."
 kmt.374.a:0 "Wir müssen ihnen helfen."
 kmt.374.b:0 "Wir werden unsere Ressourcen nicht verschwenden."
 kmt.375.t:0 "[USA.GetAdjective] Vorräte"
 kmt.375.d:0 "[USA.GetName] hat sich bereit erklärt, uns zu helfen und uns Vorräte geschickt!"
 kmt.375.a:0 "Dies sollte uns im Krieg einen Vorteil verschaffen."
 kmt.376.t:0 "[USA.GetName] Abgelehnt"
 kmt.376.d:0 "[USA.GetName] hat sich geweigert, uns Vorräte zu schicken."
 kmt.376.a:0 "Oh nein..."
 kmt.377.t:0 "Hyperinflation in [CHI.GetName]"
 kmt.377.d:0 "Der Wirtschaft in [CHI.GetName] geht es nicht besonders gut, da es aufgrund der Inkompetenz der Regierung zu einer Hyperinflation gekommen ist. Sollten wir ihnen helfen, die Situation zu lindern?"
 kmt.377.b:0 "Es wäre in unserem besten Interesse, wenn wir ihnen helfen würden."
 kmt.377.a:0 "Enttäuschung..."
 kmt.378.t:0 "[USA.GetAdjective] Darlehen"
 kmt.378.d:0 "[USA.GetName] hat uns einige Kredite gewährt, um unsere Inflation zu lindern."
 kmt.378.a:0 "Fantastisch!"
 kmt.379.t:0 "Inflation weniger stark"
 kmt.379.d:0 "Mit der Hilfe von [USA.GetName] ist die Inflation jetzt weniger stark."
 kmt.382.t:0 "[YUN.GetLeader]"
 kmt.382.d:0 "Wir haben herausgefunden, dass [YUN.GetLeader] während des Krieges Kontakt zu einigen Kommunisten aufgenommen hat. Da sein strategischer Nutzen nachgelassen hat, sollten wir handeln, bevor er und seine kommunistischen Mitverschwörer dies tun."
 kmt.382.a:0 "Stürmen Sie sein Büro und nehmen Sie ihn fest!"
 kmt.382.b:0 "Kein Grund zur Sorge."
 kmt.383.t:0 "[From.GetRulingParty] hat das Büro von [Root.GetLeader] übernommen"
 kmt.383.d:0 "[From.GetLeader] hat das Büro von [Root.GetLeader] angegriffen und ihn seines Amtes enthoben. Das Amt des Gouverneurs von Yunnan liegt nun in den Händen von Lu Han."
 kmt.383.a:0 "Sehr bedauerlich."
 kmt.383.b:0 "Wir werden nur der Führung von [Root.GetLeader] folgen!"
 kmt.384.t:0 "Schicksal von Lung Yun"
 kmt.384.d:0 "Wir haben Lung Yun festgenommen und unter Hausarrest gestellt."
 kmt.384.a:0 "Er könnte beim Militär von Nutzen sein."
 kmt.384.b:0 "Halten Sie ihn unter Hausarrest."
 kmt.385.t:0 "[From.GetLeader] Revolten"
 kmt.385.d:0 "Die Männer von [From.GetLeader] haben sich gegen uns aufgelehnt, weil wir versucht haben, [From.GetLeader] festzunehmen!"
 kmt.385.a:0 "Das wird ein Kinderspiel."
 kmt.217.t:0 "Militärische Aktivitäten in Fujian einstellen?"
 kmt.217.d:0 "Unsere Eroberung Taiwans verlangsamt sich aufgrund unserer mangelnden See- und Luftstreitkräfte. Es wäre vielleicht das Beste für uns, die militärischen Aktivitäten in Fujian einzustellen und eine bessere See- und Luftwaffe aufzubauen. Dann können wir Taiwan problemlos von der korrupten [CHI.GetRulingParty] erobern."
 kmt.217.a:0 "Auf dieser winzigen Insel stellen sie keine große Bedrohung dar und unser Volk braucht etwas Ruhe."
 kmt.217.b:0 "Wir werden nicht ruhen, bis die [CHI.GetRulingParty] ausgerottet ist!"
 kmt.386.t:0 "[From.GetName] hat militärische Aktivitäten eingestellt"
 kmt.386.d:0 "Unseren Frontberichten zufolge hat [From.GetName] seine militärischen Aktivitäten eingestellt."
 kmt.386.a:0 "Wir müssen uns darauf vorbereiten, das Festland zurückzuerobern!"
 kmt.387.t:0 "Chiang-Li-Rivalität"
 kmt.387.d:0 "Obwohl [Root.GetLeader] der derzeitige Präsident ist, kann Chiang seinen eigenen Armeen immer noch direkte Befehle erteilen und seine Armeen folgen lieber Chiangs Befehlen als denen von Li. Die Rivalität der beiden beeinträchtigt nun die Leistung unserer Armee."
 kmt.387.a:0 "..."
 kmt.388.d:0 "Die Rivalität zwischen Chiang und Li hält an, und wenn das so bleibt, wird unsere Armee die Kommunisten nicht besiegen können, da es ihnen an Koordination mangelt. Li hat jedoch genug von Chiangs Einmischung und plant, das Land zu verlassen, da er sich eine Zukunft Chinas unter Chiangs Herrschaft nicht vorstellen kann."
 kmt.388.a:0 "Lass ihn gehen."
 kmt.388.b:0 "Wir brauchen ihn!"
 kmt.389.t:0 "Indochina"
 kmt.389.d:0 "Die ehemalige Kolonie Indochinas wurde vor einiger Zeit von den Japanern „erworben“. Nun haben wir die japanische Präsenz in der Region gemildert und es ist an der Zeit, zu entscheiden, was mit diesem Land geschehen soll."
 kmt.389.a:0 "Befreit die kolonisierten Völker!"
 kmt.389.b:0 "Befreien Sie die kolonisierten Völker ... natürlich unter unserer Führung ..."
 kmt.389.c:0 "Geben Sie den Besitz der Region an [FRA.GetName] zurück."
 kmt.389.e:0 "Wir haben kein Interesse an der Gegend."
 ## 1/9/2017 ##
 kmt.390.t:0 "[From.GetName] befreit Indochina"
 kmt.390.d:0 "[From.GetName] hat Indochina befreit, dies hat unseren kolonialen Interessen in der Region schweren Schaden zugefügt."
 kmt.390.a:0 "Comment osent-ils!?"
 kmt.391.t:0 "[From.GetName] Zurückgegeben Indochina"
 kmt.391.d:0 "[From.GetName] hat uns Indochina zurückgegeben, dies wird die Beziehungen zwischen unseren Nationen stärken."
 kmt.391.a:0 "Dieu soit loué!"
 kmt.359.b:0 "Was auch immer."
 ## 3/9/2017 ##
 kmt.393.t:0 "[From.GetAdjective] Bürgerkrieg"
 kmt.393.d:0 "In [From.GetName] ist ein Bürgerkrieg ausgebrochen. Vielleicht könnten wir uns auf eine Seite schlagen und uns ein paar Vorteile verschaffen?"
 kmt.393.a:0 "Hilfe [From.GetName]"
 kmt.393.b:0 "Gegen [From.GetName]"
 kmt.393.c:0 "Die können alle zur Hölle fahren!"
 kmt.393.e:0 "Ist mir völlig egal."
 ## 8/9/2017 ##
 kmt.394.t:0 "Wahl?"
 kmt.394.d:0 "Es ist eine Wahl geplant, aber wir haben derzeit alle Hände voll zu tun. Sollen wir die Wahl abhalten?"
 kmt.394.a:0 "Natürlich."
 kmt.394.b:0 "Wir sollten warten, bis der Krieg vorbei ist."
 ## 26/9/2017 ##
 kmt.279.c:0 "[Root.GetLeader] sollte an der Macht bleiben."
 kmt.279.b:0 "Ch&#39;u Chengs antikommunistische Haltung ist das, was die Menschen wirklich brauchen."
 kmt.279.d:0 "Unsere erste Wahl findet jetzt in dieser Sitzung statt. Dies ist ein wichtiger Meilenstein auf dem Weg unseres Landes zur Demokratie."
 kmt.397.d:0 "Derzeit finden Wahlen statt. Die Herrschaft von [Root.GetLeader] wurde von einigen Leuten in Frage gestellt. Würden diese Wahlen Veränderungen in den inneren Angelegenheiten von [Root.GetName] mit sich bringen?"
 kmt.279.e:0 "Die Politik von Li Tsung-jen wird der Armee Vorteile bringen."
 kmt.279.a:0 "Chiang Kai-shek ist die beste Option für die Menschen."
 kmt.397.a:0 "Xu Fulin."
 kmt.398.t:0 "[Root.GetLeader] Wiedergewählt"
 kmt.398.d:0 "Mangels anderer Kandidaten wurde [Root.GetLeader] automatisch als Präsident von [Root.GetName] wiedergewählt."
 kmt.398.a:0 "Herzlichen Glückwunsch ... nehme ich an?"
 kmt.399.t:0 "Tod von Chiang Kai-shek"
 kmt.399.d:0 "Chiang Kai-shek, der [Root.GetNameDef] in den letzten Jahrzehnten regierte, ist kürzlich in der Shilin-Residenz verstorben. Als Todesursache wurde Nierenversagen in Verbindung mit einer Herzerkrankung festgestellt.\n\nChiang litt an einer Lungenentzündung und einem Herzinfarkt und hatte sich monatelang politisch eingeschränkt. Obwohl er dem Namen nach immer noch Präsident war, waren Vizepräsident Yen Chia-kan und der Premierminister des Exekutiv-Yuan, Chiang Ching-kuo, der auch Chiangs ältester Sohn ist, de facto Regierungschef.\n\nVizepräsident Yen hat die Position des Aktionspräsidenten übernommen, obwohl viele glauben, dass die wahre Macht in den Händen von Chiang Ching-kuo liegt.\n\n„Yi Guo&#39;jia Xing&#39;wang Wei Ji Ren, Zhi Ge&#39;ren Si&#39;sheng Yu Du Wai.“"
 kmt.399.a:0 "Ein unersetzlicher Verlust."
 kmt.400.t:0 "Chiang Ching-kuo zum Präsidenten gewählt"
 kmt.400.d:0 "Mangels anderer Kandidaten wurde Chiang Ching-kuo, der einzige Kandidat der Kuomintang, automatisch zum Präsidenten von [Root.GetNameDef] gewählt."
 kmt.400.a:0 "Was für eine „Wahl“, die wir hier haben …"
 kmt.401.a:0 "Ein neuer Präsident."
 ## 13/10/2017 ##
 kmt.403.t:0 "Kriegsherren eliminiert"
 kmt.403.d:0 "Nach vielen Kämpfen haben wir endlich alle Kriegsherren entfernt, die unsere Position bedrohen."
 kmt.79.t:0 "Kriegsherren"
 kmt.79.d:0 "Aufgrund der veränderten Anzahl der Kriegsherren hat sich auch unser Einfluss in China verändert."
 kmt.79.a:0 "Interessant"
 kmt.402.t:0 "Vereintes China"
 kmt.402.d:0 "Nachdem wir alle unsere verlorenen Gebiete zurückerobert haben, ist unser Nationalgeist sprunghaft gestiegen!"
 kmt.402.a:0 "Alle sollen sich vor dem Reich der Mitte verneigen!"
 kmt.403.a:0 "Gut"
 kmt.404.t:0 "Vertriebene"
 kmt.404.d:0 "Wir wurden aus unseren Kerngebieten vertrieben, unser Einfluss auf unsere neuen Gebiete hat nachgelassen."
 kmt.404.a:0 "Wir haben schon Schlimmeres gesehen."
 kmt.406.t:0 "Ein Pakt mit [SOV.GetNameDef]?"
 kmt.406.d:0 "Mit unserer aktuellen Industrie benötigen wir möglicherweise ausländische Hilfe, um im aktuellen Krieg eine Chance zu haben. Da auch ihr Interesse an der Eindämmung unseres Feindes besteht, könnte [SOV.GetNameDef] uns dabei helfen."
 kmt.406.a:0 "Bitten Sie sie um Hilfe."
 kmt.406.b:0 "Man kann ihnen nicht trauen."
 kmt.407.t:0 "Ein Pakt mit [From.GetName]?"
 kmt.407.d:0 "[From.GetName] hat Vertreter geschickt, um bei uns Hilfe für ihre aktuellen Kriegsanstrengungen zu erbitten."
 kmt.407.a:0 "Es wäre in unserem Interesse, wenn sie durchhalten."
 kmt.407.b:0 "Das ist nicht unser Problem."
 kmt.408.t:0 "Chinesisch-sowjetischer Nichtangriffspakt"
 kmt.408.d:0 "[From.GetName] hat zugestimmt, uns zu helfen!"
 kmt.408.a:0 "Fantastisch!"
 kmt.409.t:0 "[SOV.GetName] Abgelehnt"
 kmt.409.d:0 "[From.GetName] hat sich geweigert, uns zu helfen."
 kmt.409.a:0 "Nicht ideal."
 kmt.83.t:0 "Kriegsherrentruppen"
 kmt.83.d:0 "Einige Truppen der Kriegsherren missachten unsere Befehle und befolgen nur die Befehle ihres eigenen Herrn. Dies hat sich negativ auf die Leistung unserer Armee ausgewirkt."
 kmt.83.a:0 "Diese Schädlinge..."
 kmt_hfq_join:0 "Han Fu-chu wird der Armee beitreten."
 ## 15/10/2017 ##
 kmt.399.d_2:0 "Chiang Kai-shek, der [Root.GetNameDef] in den letzten Jahrzehnten regiert hatte, ist kürzlich in der Shilin-Residenz verstorben. Als Todesursache wurde Nierenversagen in Verbindung mit einer Herzerkrankung festgestellt.\n\nChiang litt an einer Lungenentzündung und einem Herzinfarkt und hatte sich monatelang politisch eingeschränkt.\n\n„Yi Guo&#39;jia Xing&#39;wang Wei Ji Ren, Zhi Ge&#39;ren Si&#39;sheng Yu Du Wai.“"
 ## 16/10/2017 ##
 kmt.411.t:0 "Deserteure"
 kmt.411.d:0 "Nach der kürzlichen Umsetzung der neuen ländlichen Wiederaufbaubewegung durch [CHI.GetRulingParty] hat sich die Lebenssituation der Bauern im Land verbessert. Einige unserer Kameraden erwägen sogar, auf ihre Felder zurückzukehren und ihr Leben fortzusetzen, bevor sie sich unserer Partei anschließen. Dies hat zu einer beträchtlichen Anzahl von Deserteuren in unseren Streitkräften geführt."
 kmt.411.a:0 "Gehen Sie gegen solches Verhalten vor!"
 kmt.411.b:0 "Wir können nichts tun."
 kmt.412.t:0 "Deserteure der Roten Armee"
 kmt.412.d:0 "Nach unserer jüngsten Kampagne zum Wiederaufbau des ländlichen Raums wurden Desertionen in der Roten Armee beobachtet. Manchmal treffen unsere Truppen auf eine große Zahl von Deserteuren, die versuchen, die Frontlinie zu passieren.\n\nWas sollen wir mit diesen Deserteuren tun?"
 kmt.412.a:0 "Entwaffnen Sie sie und lassen Sie sie gehen."
 kmt.412.b:0 "Verhaftet sie alle!"
 kmt.413.t:0 "Deserteure kehrten zurück"
 kmt.413.d:0 "[CHI.GetRulingParty] hat begonnen, alle unsere Deserteure auf der Stelle zu verhaften. Diese Nachrichten haben diejenigen, die ihren Posten verlassen wollen, wirksam abgeschreckt. Darüber hinaus kehren einige der Deserteure jetzt zu uns zurück."
 kmt.413.a:0 "Richtet diese Verräter hin!"
 kmt.413.b:0 "Heißen Sie sie herzlich willkommen."
 kmt.414.t:0 "Banditen!"
 kmt.414.t:0 "Deserteure der Roten Armee haben in abgelegenen Gebieten zahlreiche Banditenclans gegründet, um ihr Überleben zu sichern. Sie belästigen gelegentlich lokale Händler und kapern sogar Versorgungszüge. Dies hat in ländlichen Gebieten zu erheblichen Sicherheitsproblemen geführt."
 kmt.414.a:0 "Verdammt!"
 kmt.415.t:0 "Banditen sabotierten die Infrastruktur"
 kmt.415.d:0 "Bei einer kürzlich durchgeführten Operation haben die Banditen einige Infrastrukturen zerstört, um eine Versorgungsroute zu kapern. Es wird einige Zeit dauern, bis der Schaden behoben ist."
 KMT_ex_commie_peasant_forces_tt:0 "Erhalte 5 Truppen."
 kmt.416.t:0 "Ehemalige Soldaten der Roten Armee melden sich freiwillig zum Kampf"
 kmt.416.d:0 "Einige Bauern, ehemalige Soldaten der Roten Armee, melden sich freiwillig zur Unterstützung der Kriegsanstrengungen. Wo sollen wir sie einsetzen?"
 kmt.416.a:0 "Die Frontlinie."
 kmt.416.b:0 "Hinter der Frontlinie unserer Feinde."
 kmt.416.c:0 "Das Ackerland natürlich."
 ## 18/10/2017 ##
 kmt.299.d:0 "Berichte über Hunger und Dürre in Sichuan erscheinen in den Zeitungen. Einige Organisationen sammeln Spenden für die Betroffenen, und [From.GetLeader] fordert uns auf, dasselbe zu tun. Wenn wir den Menschen in Sichuan helfen, könnte uns das möglicherweise mehr politische Macht in der Region verschaffen."
 kmt.417.d:0 "In den Zeitungen erscheinen Berichte über Hungersnöte und Dürre in Sichuan. Was sollen wir tun?"
 kmt.417.a:0 "Bitten Sie die Zentralregierung um Hilfe."
 kmt.418.t:0 "[From.GetRulingParty] weigert sich, Hilfe zu schicken"
 kmt.418.d:0 "Obwohl wir deutliche Beweise für das Leid der Sezuaner vorlegten, weigerten sich die Beamten von [From.GetRulingParty] kaltherzig, Hilfe zu schicken."
 kmt.419.t:0 "[From.GetRulingParty] sendet Hilfe"
 kmt.419.d:0 "Angesichts des Leids der Sezuaner haben die Beamten von [From.GetRulingParty] ein spezielles Komitee eingerichtet, das sich mit den Problemen befassen und den Betroffenen dringend benötigte Hilfe zukommen lassen soll."
 kmt.419.a:0 "Gut zu hören."
 ## 25/10/2017 ##
 ### kmt.420 doesn't really need a Chinese localisation, as it primarily changes how the names are spelled in English. Can delete the event if want to.###
 kmt.420.t:0 "Postromanisierung"
 kmt.420.d:0 "Möchten Sie Städtenamen in postalische Romanisierung ändern?\n\nHINWEIS: \n- Die Änderungen gelten nicht für Namen von Kriegsherrencliquen und Ortsnamen in Ereignissen, es sei denn, sie werden durch bestimmte Befehle zurückgegeben.\n- Durch erneutes Auslösen dieses Ereignisses können Sie die Änderungen nicht rückgängig machen.\n- Namen, die bereits in postalischer Romanisierung vorliegen, sind davon nicht betroffen, z. B. die Namen einiger Staaten in der Mandschurei."
 kmt.420.a:0 "OK"
 kmt.420.b:0 "NEIN"
 kmt.421.t:0 "Umbenennung zurückeroberter Städte"
 kmt.421.d:0 "Einige unserer Städte wurden von den Invasoren umbenannt, als sie sie für sich beanspruchten. Sollten wir sie nach der Rückeroberung dieser Gebiete wieder umbenennen?"
 kmt.421.a:0 "Natürlich"
 kmt.421.b:0 "Das ist nicht nötig."
 ## 29/10/2017 ##
 kmt.361.t:0 "[USA.GetAdjective] Hilfe"
 kmt.361.d:0 "[USA.GetName] hat uns weitere Ausrüstung geschickt, die uns im Kampf gegen unseren Feind hilft!"
 ## 11/11/2017 ##
 kmt.332.t:0 "[From.GetName] fordert engere Zusammenarbeit"
 kmt.332.d:0 "[From.GetName] hat seinen Wunsch zum Ausdruck gebracht, die Bindung zwischen unseren beiden Nationen zu stärken."
 kmt.332.a:0 "Gerne"
 kmt.332.b:0 "Wir halten lieber Abstand"
 kmt.333.t:0 "[From.GetName] Akzeptiert"
 kmt.333.d:0 "[From.GetName] hat zugestimmt, unsere Bindung zu stärken."
 kmt.333.a:0 "Hübsch"
 kmt.334.t:0 "[From.GetName] lehnt ab"
 kmt.334.d:0 "[From.GetName] hat eine weitere Zusammenarbeit zwischen uns abgelehnt."
 kmt.334.a:0 "Schade"
 ## 15/11/2017 ##
 kmt.426.t:0 "Untergang der Hunan-Clique"
 kmt.426.d:0 "Die Hunan-Clique wurde vernichtet und ihr ehemaliger Anführer zusammen mit anderen Funktionären von unseren Truppen gefangen genommen. Jetzt ist es an der Zeit, zu entscheiden, wie sie ihre Rehabilitierung vorantreiben."
 kmt.426.a:0 "Sie werden sich auf dem Spielfeld rehabilitieren."
 kmt.426.b:0 "Der Tod ist die einzige Nachsicht."
 kmt.427.t:0 "Untergang der Szechuan-Clique"
 kmt.427.d:0 "Die Sichuan-Clique wurde vernichtet und ihr ehemaliger Anführer zusammen mit anderen Funktionären von unseren Truppen gefangen genommen. Jetzt ist es an der Zeit, zu entscheiden, wie sie ihre Rehabilitierung vorantreiben."
 kmt.428.t:0 "Schicksal von Liu Wen-hui"
 kmt.428.d:0 "Nachdem seine Sikang-Armee besiegt und in unsere Armee eingegliedert wurde, scheint Liu Wen-hui für uns kein Interesse mehr zu wecken. Wie wird sein Schicksal entschieden?"
 kmt.429.t:0 "Überreste der Nordostarmee"
 kmt.429.d:0 "Nachdem ihre Operationsbasis verschwunden ist, besteht die Nordostarmee, einst die Elitetruppe der Kriegsherren, nur noch aus unorganisierten Soldaten. Das gibt uns die Chance, sie ein für alle Mal zu erledigen."
 kmt.429.a:0 "Sie sollen in unsere Armee eingegliedert werden."
 kmt.429.b:0 "Verhaften Sie sie im Namen des Staats- und Parteiverrats!"
 kmt_xia_generals_join:0 "Einige Generäle werden sich unserer Armee anschließen.\n"
 kmt_lwh_join:0 "Liu Wen-hui wird sich unserer Armee anschließen.\n"
 kmt.361.t:0 "[USA.GetAdjective] Unterstützung"
 kmt.361.d:0 "[USA.GetName] hat uns weitere Ausrüstung geschickt, die uns im Kampf gegen unseren Feind hilft!"
 ## 19/11/2017 ##
 kmt.432.t:0 "Ein weiterer chinesischer Bürgerkrieg"
 kmt.432.d:0 "In China ist zwischen der projapanischen und der antijapanischen Fraktion ein Bürgerkrieg ausgebrochen."
 kmt.432.a:0 "Unterstützen Sie die projapanische Fraktion."
 kmt.432.b:0 "Unterstützen Sie die antijapanische Fraktion."
 kmt.432.c:0 "Wir werden sie zerstören."
 kmt.432.e:0 "Kein Grund zur Sorge."
 kmt.434.t:0 "Hinrichtung von Han Fu-chu"
 kmt.434.d:0 "[From.GetName] hat die Hinrichtung von Han Fu-chu angeordnet, nachdem dieser beschuldigt wurde, „seinen Posten verlassen“ zu haben, um die Stärke seiner direkten Armee zu erhalten. Liu Hsiang brach zusammen und verstarb, als er diese Nachricht hörte."
 kmt.434.a:0 "Oh Gott."
 ## 20/11/2017 ##
 kmt.75.d:0 "[From.GetName] hat erkannt, dass Widerstand gegen uns nicht gut ausgehen würde. Sie haben sich friedlich unterworfen."
 ## 25/11/2017 ##
 KMT_fortify_land_hn_tt:0 "Fügen Sie §Y6 Landfestungen§! entlang des Gelben Flusses in §YHenan§! hinzu.\n"
 KMT_fortify_land_sd_tt:0 "Fügen Sie §Y6 Landfestungen§! entlang des Gelben Flusses in §YJinan§! hinzu.\n"
 ## 26/11/2017 ## 
 kmt.218.t:0 "Unterschiedliche Meinungen darüber, wo befestigt werden sollte"
 kmt.218.d:0 "Einige unserer Generäle sind unterschiedlicher Meinung darüber, wo wir unsere Hauptbemühungen im Bereich der Befestigungen einsetzen sollten. Einige schlagen vor, Beiping zu halten und Befestigungen rund um die Stadt und Tianjin zu errichten. Die Gegenseite meint jedoch, der Bau von Befestigungen in diesem Gebiet würde die Japaner auf unsere Ablehnung des He-Umezu-Abkommens aufmerksam machen und einen vorzeitigen Krieg riskieren. Um die Japaner nicht zu alarmieren, schlagen sie vor, den Gelben Fluss als natürliche Barriere zu nutzen und entlang dessen Befestigungen zu errichten.\n\nWessen Meinung sollen wir folgen?"
 kmt.218.a:0 "Peking wird nicht fallen!"
 kmt.218.b:0 "Wir können uns keinen vorzeitigen Krieg mit [JAP.GetName] leisten."
 ## 29/11/2017 ##
 kmt.437.t:0 "[PGR.GetName] schließt sich uns an"
 kmt.437.d:0 "[PGR.GetName] hat sich unserem Krieg angeschlossen."
 kmt.437.a:0 "OK"
 kmt.438.t:0 "Shanghai remilitarisieren?"
 kmt.438.d:0 "Nach dem Vorfall vom 28. Januar wurden Shanghai und die umliegenden Gebiete im Rahmen des Shanghaier Waffenstillstandsabkommens entmilitarisiert. Dies verbietet unserer Armee die Stationierung in und um Shanghai und verhindert, dass wir das Gebiet im Falle eines Kriegsausbruchs wirksam verteidigen können. \n\nIm Rahmen unserer derzeitigen Politik, externe Bedrohungen zu priorisieren, schlagen einige unserer Beamten vor, wir könnten einen „Vorfall“ inszenieren und ihn als Anlass nehmen, mehr Truppen in der Region zu stationieren. Dadurch würde Shanghai ohne großen politischen Aufwand de facto zu einem entmilitarisierten Gebiet."
 kmt.438.a:0 "Klingt vielversprechend."
 kmt.438.b:0 "Zu riskant."
 KMT_fortification_discovered_tt:0 "§RUnsere Aktionen werden von den Japanern entdeckt§!\n"
 KMT_nothing_happens_tt:0 "Nichts passiert\n"
 kmt.439.t:0 "[JAP.GetAdjective] Truppen entdecken unsere Befestigungen"
 kmt.439.d:0 "Die örtlichen Garnisonen haben die verstärkte Truppenstärke und die verstärkten Verteidigungsanlagen in der Region bemerkt und behaupten, wir hätten das He-Umezu-Abkommen gebrochen und den Frieden in der Region gebrochen. Das Hauptquartier der Garnison hat uns außerdem aufgefordert, die Kontrolle über die Provinz Hebei aufzugeben und sie ihnen zu übergeben, mit der Begründung, dass die Region unter ihrer Aufsicht „friedlicher“ sei."
 kmt.439.a:0 "Wir werden ihnen keinen Zentimeter nachgeben!"
 kmt.439.b:0 "Wir sind noch nicht auf das vorbereitet, was kommen wird."
 KMT_may_lead_to_war_with_JAP_tt:0 "§RMöglicherweise zu einem Krieg mit [JAP.GetName] führen§!\n"
 kmt.440.t:0 "[CHI.GetName] macht weitere Zugeständnisse"
 kmt.440.d:0 "Nach einigen Verhandlungen mit unseren Garnisonen im Gebiet Beiping-Tianjin hat uns die [CHI.GetAdjective]-Regierung weitere Zugeständnisse gemacht, um militärische Konflikte zu verhindern."
 kmt.440.a:0 "Gut."
 kmt.441.t:0 "Shanghai wieder militarisiert"
 kmt.441.d:0 "Nach einem kürzlichen Vorfall, bei dem Japaner in einem Lagerhaus einige Chinesen zu Tode geprügelt hatten, hat die [CHI.GetAdjective]-Regierung beschlossen, die Sicherheitsmaßnahmen zu verstärken und unter dem Namen „Bewaffnete Polizeikräfte“ zusätzliche Truppen nach Shanghai zu schicken. Die Westmächte haben keine Einwände gegen dieses Vorgehen erhoben, und Shanghai ist nun de facto entmilitarisiert.\n\nMit der verstärkten Präsenz von [CHI.GetAdjective]-Truppen in der Region wird es für unsere Streitkräfte schwieriger, diesen strategisch wichtigen Punkt einzunehmen, sobald wir uns entschieden haben, gegen [CHI.GetName] in den Krieg zu ziehen. Vielleicht ist es Zeit für uns, einzugreifen."
 kmt.441.a:0 "Sagen Sie ihnen, dass unsere Polizei die Aufgabe übernehmen wird, die Täter festzunehmen."
 kmt.441.b:0 "Kein Grund zur Sorge."
 kmt.442.t:0 "[JAP.GetAdjective] Intervention"
 kmt.442.d:0 "Nachdem unsere „bewaffneten Polizeikräfte“ in Shanghai einmarschiert sind, werden sie von einem [JAP.GetAdjective]-Beamten begrüßt, der behauptet, die japanische Polizei werde den Fall übernehmen und unsere Truppen zum Rückzug aus dem Gebiet auffordern. Sollten wir Kompromisse eingehen, würde Shanghai de facto wieder zu einer entmilitarisierten Zone. Wie sollten wir auf eine solche Aufforderung reagieren?"
 kmt.442.a:0 "Ignorieren Sie die Anfrage."
 kmt.442.b:0 "Wir sind noch nicht vorbereitet."
 kmt.443.t:0 "Chinesische Truppen abgezogen"
 kmt.443.d:0 "Nach einer kurzen Diskussion haben sich die chinesischen „bewaffneten Polizeikräfte“ friedlich aus Shanghai zurückgezogen und sind in die Außenbezirke der Stadt Suzhou zurückgekehrt."
 kmt.443.a:0 "Sie sind uns nicht gewachsen."
 kmt.444.d:0 "Unsere Aufforderung zum Abzug der bewaffneten Polizeikräfte wurde ignoriert und die Truppen bezogen Stellung in der Stadt. Es scheint, als sei die Diplomatie gescheitert."
 kmt.444.a:0 "Zeit, den Vorfall vom 28. Januar nachzustellen …"
 kmt.444.b:0 "Wie dem auch sei, sie werden sowieso keine Chance haben."
 KMT_shanghai_incident_later_tt:0 "§GEin Vorfall wird arrangiert.§!\n"
 kmt.447.t:0 "[CHI.GetRulingParty] Aufsicht"
 kmt.447.d:0 "Nach dem Tod von Ho Ying-chin scheint die [CHI.GetRulingParty] bestrebt zu sein, das He-Umezu-Abkommen zu wiederholen. In letzter Zeit haben hochrangige Beamte die lokalen Gouverneure häufig besucht, und es scheint, als würde uns unsere Autonomie bald entzogen."
 kmt.447.a:0 "Akzeptiere unser Schicksal."
 kmt.447.b:0 "Lehnen Sie alle Besuche von [CHI.GetRulingParty] ab!"
 kmt.447.c:0 "Die Japaner könnten am Ende doch noch unsere Retter sein."
 kmt.447.d_2:0 "Die Japaner haben sich geweigert, uns zu helfen. Wir stehen jetzt wieder am Anfang."
 kmt.448.t:0 "Unkooperative Gouverneure"
 kmt.448.d:0 "Die lokalen Gouverneure in Peking haben sich als ziemlich schwierig erwiesen. Unsere Bestechungsgelder wurden abgelehnt, und nun haben sie auch neue Ernennungen und Besuche unserer Beamten abgelehnt. Unser Versuch, die Kontrolle über die Region zurückzugewinnen, scheint gescheitert zu sein."
 kmt.448.a:0 "Tun Sie, was nötig ist."
 kmt.448.b:0 "Was auch immer"
 kmt.449.t:0 "Kontrolle über Beiping"
 kmt.449.d:0 "Mit unserem Zuckerbrot-und-Peitsche-Ansatz haben die lokalen Gouverneure unseren Beamten die Unterstützung gegeben, die wir brauchen, um unsere Kontrolle über die Region Beiping zurückzugewinnen."
 kmt.449.a:0 "Die Partei hat die Oberhand."
 kmt.450.t:0 "Zhabei-Vorfall"
 kmt.450.d:0 "Etwa 20 selbsternannte „patriotische Chinesen“ verübten gestern im Bezirk Zhabei eine Reihe antijapanischer Vandalismusakte, offenbar ermutigt durch die verstärkte chinesische Militärpräsenz in der Stadt. Ihre Aktionen führten zu zahlreichen Sachschäden bei den japanischen Geschäftsleuten vor Ort; die Kosten werden noch berechnet.\n\nDie japanische Regierung hat die Festnahme aller Täter innerhalb von 24 Stunden gefordert, und diese Frist ist nun abgelaufen. Unsere Polizeikräfte konnten jedoch nur drei Verdächtige festnehmen. Trotz unserer „Ineffizienz“ beim Schutz des Eigentums der Einwohner Shanghais haben die ausländischen Mächte mit Konzessionen in Shanghai – allen voran Japan – gefordert, dass wir die Verantwortung für die lokale Sicherheit an Japan übertragen.\n\nDies würde Japan faktisch die vollständige Kontrolle über Shanghai geben und die öffentliche Unterstützung für unsere Regierung erheblich untergraben."
 ## 12/2/2017 ##
 kmt.450.a:0 "Unsinn!"
 kmt.451.t:0 "[From.GetName] weigerte sich, Shanghai aufzugeben"
 kmt.451.d:0 "Trotz unseres lautstarken Protests hat die [CHI.GetRulingParty] den Vorschlag abgelehnt, dass unsere Streitkräfte die Aufgabe übernehmen, die lokale Sicherheit in Shanghai aufrechtzuerhalten."
 kmt.451.a:0 "Wie erwartet."
 kmt.452.t:0 "Shanghai unter Kontrolle"
 kmt.452.d:0 "Nach einigen Verhandlungen hat sich das [CHI.GetAdjective] dazu entschlossen, unserer Forderung nachzukommen und seine sogenannten „bewaffneten Polizeikräfte“ aus der Stadt abzuziehen. Inzwischen haben wir mehr Truppen in der Stadt stationiert und so unsere Kontrolle über das Gebiet deutlich erhöht."
 kmt.453.t:0 "Delegieren von [From.GetName]"
 kmt.453.d:0 "Einige Vertreter der projapanischen Fraktion innerhalb von [From.GetNameDef] sind in unserem Garnisonshauptquartier in Tianjin eingetroffen. Sie äußerten ihre Besorgnis über die jüngste Infiltration der [CHI.GetRulingParty] in der Region und forderten unser Eingreifen. Wenn wir zustimmen, werden sie uns ihre Autonomie zu unserem Schutz überlassen."
 kmt.453.a:0 "Ausgezeichnete Ideen!"
 kmt.453.b:0 "Kein Interesse."
 kmt.454.t:0 "[JAP.GetAdjective] Intervention"
 kmt.454.d:0 "Die [JAP.GetAdjective]-Regierung hat sich bereit erklärt, uns zu helfen, und wir haben unsere Autonomie wie versprochen abgegeben. Die pro-[CHI.GetRulingParty]-Fraktion wurde nach einigen kleineren Zusammenstößen aus der Region vertrieben."
 kmt.454.a:0 "Gut gemacht."
 kmt.455.t:0 "[PGR.GetName]"
 kmt.455.d:0 "Unsere Infiltration in der Region Beiping hat offenbar die projapanische Fraktion innerhalb der lokalen Regierung zum Handeln angeregt. Sie haben ihre Autonomie gegen den Schutz der Japaner eingetauscht."
 kmt.455.a:0 "Wahnsinn!"
 KMT_fortify_land_xiangyang_tt:0 "Fügen Sie §Y3 Landfestungen§! entlang des Gelben Flusses in §YXiangyang§! hinzu.\n"
 kmt.456.t:0 "Tod von Ho Ying-chin"
 kmt.456.d:0 "Auf seinem Flug nach [Root.Capital.GetName], den er auf Anweisung von [CHI.GetLeader] erhalten hatte, erlitt Ho Ying-chin ein katastrophales Schicksal: Sein Flugzeug stürzte auf der Landebahn ab. Das Flugzeug ging in Flammen auf, und er wurde noch vor Ort für tot erklärt. [CHI.GetLeader] hat einen Nachruf veröffentlicht. Seine Beerdigung wird einige Tage später stattfinden."
 kmt.456.a:0 "Mission erfüllt..."
 ## 4/12/2017 ##
 kmt.457.t:0 "Kwantung-Armee ergreift Maßnahmen"
 kmt.457.d:0 "Wir haben Informationen erhalten, die darauf schließen lassen, dass die Kwantung-Armee erneut auf eigene Faust handelt und diesmal versucht, den Chinesen mit Krieg um die Kontrolle über Nordchina zu drohen. Unsere Spione in [CHI.GetName] haben jedoch berichtet, dass ihre Regierung eine Politik der Priorisierung externer Bedrohungen verfolgt und das Vorgehen der Kwantung-Armee höchstwahrscheinlich zu einem totalen Krieg zwischen unseren beiden Nationen führen wird.\n\nSeit der Ermordung von Tsuyoshi Inukai wird das gesamte Land vom Militär manipuliert. Vielleicht ist es an der Zeit, dass die Regierung die Kontrolle zurückerlangt."
 kmt.457.a:0 "Militarismus ist die einzige Zukunft für [Root.GetName]!"
 kmt.457.b:0 "Wir müssen die Macht des Militärs einschränken!"
 KMT_JAP_military_may_act_independently_to_declare_war_tt:0 "§RWurde in 10 Tagen zum Krieg mit [CHI.GetName] führen§!\n"
 ## 26/12/2017 ##
 kmt.458.t:0 "Die Kommunisten verleumden?"
 kmt.458.d:0 "Unser Plan verlief bisher planmäßig. Einige prominente Mitglieder schlagen jedoch vor, die Kommunisten zu verleumden und so mehr Nachwuchs anzulocken. Dazu bräuchten wir Beweise, die unsere Anschuldigungen gegen die Kommunisten stützen, und das Erschaffen solcher Beweise würde sicherlich unerwünschte Aufmerksamkeit erregen.\n\nDer Plan sieht die Ermordung einiger Generäle vor, die für ihren Einsatz gegen die Kommunisten bekannt sind. Sobald dies erledigt ist, werden wir die Leute daran erinnern, wie [JAP.GetName] alle Bemühungen gegen den Kommunismus unterstützen wird."
 kmt.458.a:0 "Risiko bedeutet Gewinn"
 kmt.458.b:0 "Lass uns eine Weile unten bleiben"
 kmt.459.t:0 "Ermordung von Generälen"
 kmt.459.d:0 "Einige Generäle wurden von unseren Agenten ermordet, und Beweise gegen die Kommunisten liegen praktischerweise vor Ort. Wir haben unsere Ressourcen auch genutzt, um Zeugen zu „schaffen“. Dies wird dem Ruf der Kommunisten sicherlich einen schweren Schlag versetzen und ihre Unterstützung schwächen. In der Zwischenzeit werden wir versuchen, frisches Blut für unseren Plan zu gewinnen."
 kmt.459.a:0 "Gut gemacht."
 kmt.460.t:0 "Ermordung von NRA-Generälen"
 kmt.460.d:0 "Einige NRA-Generäle wurden von Unbekannten ermordet. Beweise deuten jedoch darauf hin, dass wir diese Gräueltaten begangen haben. [Root.GetLeader] ist klar geworden, dass jemand versucht, unseren Ruf zu schädigen und sich möglicherweise Vorteile zu verschaffen.\n\nEinige unserer Kameraden haben vorgeschlagen, dass wir selbst eine gründliche Untersuchung durchführen. Dadurch werden wir vielleicht nicht herausfinden, wer die eigentlichen Täter sind, aber zumindest wird sich zeigen, dass wir nicht die Schuldigen sind."
 kmt.460.a:0 "Wir müssen unseren Ruf verteidigen!"
 kmt.460.b:0 "Der Ruf wird überbewertet"
 KMT_will_get_rid_of_bad_idea_tt:0 "§YLöst nach 25 Tagen ein Ereignis aus.§!\n"
 kmt.461.t:0 "Wir sind nicht die Täter"
 kmt.461.d:0 "Die Berichte unserer Agenten deuten darauf hin, dass wir nicht hinter den Attentaten stecken. Sie wurden landesweit in unseren Zeitungen veröffentlicht. Obwohl manche glauben, diese Berichte seien gefälscht, scheint die Mehrheit daran zu glauben. Der Täter lauert jedoch weiterhin im Verborgenen."
 kmt.461.a:0 "Die Dinge sollten jetzt wieder normal laufen"
 kmt.462.t:0 "Suchen Sie [JAP.GetAdjective] Unterstützung?"
 kmt.462.d:0 "Einige Mitglieder unseres inneren Kreises haben vorgeschlagen, dass wir uns Unterstützung von [JAP.Capital.GetName] holen sollten. Dies würde uns mehr Ressourcen für die Planung unserer nächsten Schritte geben, wenn [JAP.Capital.GetName] zustimmt."
 kmt.462.a:0 "Natürlich."
 kmt.463.t:0 "Pro-japanische Fraktionen in [From.GetName]"
 kmt.463.d:0 "Ein Mitglied einer projapanischen Fraktion in [From.GetName] ist heute eingetroffen, um sich mit einigen hochrangigen Beamten zu treffen, und hat um Unterstützung bei ihren Plänen zur Errichtung einer projapanischen Regierung in China gebeten."
 kmt.463.a:0 "Klingt vielversprechend"
 kmt.463.b:0 "Weise ihn ab"
 kmt.464.t:0 "[From.GetName] erklärt sich bereit zu helfen"
 kmt.464.d:0 "[From.GetName] hat zugestimmt, unsere Bemühungen zu unterstützen."
 kmt.464.a:0 "Sehr schön"
 kmt.465.t:0 "[From.GetName] weigert sich zu helfen"
 kmt.465.d:0 "[From.GetName] hat sich geweigert, unsere Bemühungen zu unterstützen."
 kmt.465.a:0 "Das ist schlecht"
 kmt.466.t:0 "Beamte bestechen?"
 kmt.466.d:0 "Mit der Hilfe der Japaner stehen uns nun mehr Optionen bei der Umsetzung unseres Plans zur Verfügung. In der derzeitigen Regierung grassiert die Korruption. Mit der neuen finanziellen Unterstützung könnten wir diese Schwäche ausnutzen, um mehr Beamte auf unsere Seite zu ziehen."
 kmt.466.a:0 "Sicher"
 kmt.467.t:0 "Die Regierung infiltrieren?"
 kmt.467.d:0 "Wir haben derzeit kaum Unterstützung aus der Regierung selbst, und ohne die Unterstützung Japans könnten wir uns keine weitere Unterstützung leisten. Unsere Männer könnten jedoch versuchen, die Regierung zu infiltrieren und wichtige Positionen zu besetzen. Auf diese Weise würde ihre Regierung im Falle eines Putsches in Unordnung geraten."
 kmt.467.a:0 "Es heißt: Siegen oder Sterben."
 kmt.468.t:0 "Ho Ying-chin"
 kmt.468.d:0 "Es ist ganz klar, dass Ho Ying-chin ein Opportunist ist. Wir könnten versuchen, ihn zu überzeugen, sich mit seinen Truppen unserer Seite anzuschließen. Auf diese Weise hätten wir mehr Männer, die auf unserer Seite kämpfen."
 kmt.468.a:0 "Klingt gut"
 kmt.469.t:0 "Guerillas entsenden?"
 kmt.469.d:0 "Der Tag unseres Putsches rückt näher, doch die Größe unserer Truppen scheint nicht ausreichen zu können, um gegen die reguläre Armee zu kämpfen. Es wurde vorgeschlagen, dass wir in einigen Provinzen die lokalen Sicherheitskräfte infiltrieren sollten, um Guerillataktiken durchzuführen."
 kmt.469.a:0 "Es würde nichts Schlimmes dabei herauskommen."
 kmt.470.t:0 "Wir sind erwischt!"
 kmt.470.d:0 "Das Bureau of Investigation and Statistics hat unsere Aktion irgendwie entdeckt und unsere Operationsbasis überfallen. Obwohl prominente Mitglieder unsere Basis vor ihrer Ankunft verlassen können, müssen wir unseren Putsch jetzt starten!"
 kmt.470.a:0 "Verdammt!"
 kmt.471.t:0 "Feindliche Guerillas"
 kmt.471.d:0 "Feindliche Guerillas haben einige Infrastrukturen im Hinterland sabotiert!"
 kmt.471.a:0 "Wie kommen sie dorthin?"
 ## 3/1/2018 ##
 kmt.201.b:0 "So eine Unverschämtheit!"
 ## 6/1/2018 ##
 kmt.84.t:0 "Schicksal von [SIK.GetName]"
 kmt.84.d_1:0 "Wir können die Separatisten in [SIK.GetNameDef] nicht länger tolerieren. Es ist Zeit für uns, eine Lösung zu finden, um mit diesem Ungeziefer fertig zu werden."
 kmt.84.d_2:0 "Die Narren in [SIK.GetNameDef] haben sich geweigert, friedlich zu kooperieren, wir müssen zu anderen Mitteln greifen."
 kmt.84.a:0 "Unser Militär wird die perfekte Lösung sein!"
 kmt.84.b:0 "Mal sehen, ob die Diplomatie funktioniert …"
 kmt.84.c:0 "Fordern Sie unseren Fraktionsführer auf, einzugreifen."
 kmt.84.e:0 "Vielleicht haben sie ihre Unabhängigkeit doch verdient …"
 kmt.485.t:0 "[CHI.GetName] erfordert Integration von [SIK.GetName]"
 kmt.485.d:0 "[CHI.GetName] hat uns um Unterstützung bei der Integration von [SIK.GetName] gebeten."
 kmt.485.a:0 "Fordern Sie [SIK.GetLeader] zur Zusammenarbeit auf, um Blutvergießen zu vermeiden."
 kmt.485.b:0 "Fordern Sie [CHI.GetLeader] auf, diese Idee aufzugeben."
 kmt.486.t:0 "Herold von [From.GetName]"
 kmt.486.d:0 "[From.GetLeader] hat verlangt, dass wir uns [CHI.GetName] friedlich unterwerfen, um weiteres Blutvergießen zu vermeiden."
 kmt.486.a:0 "Sie haben Recht, es geht um das Wohl unseres Volkes."
 kmt.486.b:0 "So ein Unsinn! Wir werden nicht kampflos aufgeben!"
 kmt.487.d:0 "[From.GetLeader] hat verlangt, dass wir unseren Plan zur Integration von [SIK.GetName] aufgeben."
 kmt.487.a:0 "Die Worte von [From.GetLeader] sind nicht die weisesten, die von [Root.GetLeader] schon!"
 kmt.487.b:0 "Ziehen Sie keine unerwünschte Aufmerksamkeit auf sich."
 kmt.488.t:0 "[FromFrom.GetName] Intervention"
 kmt.488.d:0 "Durch die Intervention von [FromFrom.GetName] hat sich [SIK.GetName] uns friedlich unterworfen."
 kmt.488.a:0 "So oder so, unser Ziel ist erreicht."
 kmt.489.t:0 "[SIK.GetName] Trotzig"
 kmt.489.d:0 "[SIK.GetLeader] hat sich geweigert, sich [CHI.GetName] friedlich zu unterwerfen!"
 kmt.489.a:0 "Wie können sie es wagen, unseren Befehlen nicht zu folgen!"
 kmt.490.t:0 "[CHI.GetName] Trotzig"
 kmt.490.d:0 "[CHI.GetLeader] hat sich geweigert, seinen Plan zur Integration von [SIK.GetName] aufzugeben!"
 kmt.491.t:0 "[CHI.GetLeader] Hat unseren Befehl befolgt"
 kmt.491.d:0 "[CHI.GetLeader] hat seinen Plan zur Invasion von [SIK.GetName] aufgegeben!"
 kmt.491.a:0 "Zumindest kennen sie noch ihren Platz."
 kmt.492.t:0 "[From.GetNameADJ] Verstärkungen"
 kmt.492.d:0 "In Bezug auf [SIK.GetName]s Widerstandsfähigkeit gegenüber Unterwerfung hat [From.GetName] Verstärkung geschickt, um uns zu helfen."
 prc_sov_reinforcements:0 "Erhalte 8 Divisionen von [SOV.GetName]"
 kmt.492.a:0 "Diese Kräfte werden für unsere Bemühungen von entscheidender Bedeutung sein!"
 kmt.493.d:0 "In Bezug auf die Kriegstreiberei von [CHI.GetName] hat [From.GetName] Verstärkung geschickt, um uns zu helfen."
 ## 7/1/2018 ##
 kmt.472.t:0 "Genossen innerhalb der [From.GetRulingParty]"
 kmt.472.d:0 "Trotz der beiden vorangegangenen brutalen Säuberungen scheint es immer noch einige Kommunisten innerhalb der [From.GetRulingParty] zu geben. Nun haben diese „Genossen“ Kontakt zu uns aufgenommen und wollen diese korrupte Struktur von innen heraus zerstören."
 kmt.472.a:0 "Eine unschätzbare Gelegenheit."
 kmt.472.b:0 "Wir können diesen sogenannten „Genossen“ nicht vertrauen."
 kmt.473.t:0 "[From.GetName] Akzeptiert"
 kmt.473.d:0 "[From.GetName] hat zugestimmt, mit uns zusammenzuarbeiten."
 kmt.473.a:0 "Bald wird die Herrschaft der korrupten [Root.GetRulingParty] enden!"
 kmt.474.t:0 "[From.GetName] Abgelehnt"
 kmt.474.d:0 "[From.GetName] hat die Zusammenarbeit mit uns abgelehnt."
 kmt.474.a:0 "Wir müssen einen anderen Weg finden"
 kmt.475.t:0 "[TIB.GetName] bricht aus"
 kmt.475.d:0 "Unter dem Druck von [CHI.GetName] hat sich [TIB.GetName] von unserer Regel losgesagt und sich [CHI.GetName] angeschlossen!"
 kmt.475.a:0 "Wir werden diese Demütigung nicht dulden!"
 kmt.475.b:0 "Wir können nichts tun ..."
 kmt.476.t:0 "[SOV.GetName] Akzeptiert"
 kmt.476.d:0 "[SOV.GetName] hat uns in [SOV.GetFactionName] aufgenommen!"
 kmt.476.a:0 "Gemeinsam sind wir stärker."
 kmt.477.t:0 "[SOV.GetName] lehnt ab"
 kmt.477.d:0 "[SOV.GetName] hat unsere Anfrage, ihrer Fraktion beizutreten, abgelehnt."
 kmt.477.a:0 "Schade..."
 kmt.478.t:0 "[JAP.GetName] Akzeptiert"
 kmt.478.d:0 "[JAP.GetName] hat uns in [JAP.GetFactionName] aufgenommen!"
 kmt.479.t:0 "Unser Plan wurde kompromittiert!"
 kmt.479.d:0 "Unser Plan wurde von Geheimagenten der Regierung aufgedeckt und es kam zu zahlreichen Verhaftungen. Einige unserer Genossen haben daraufhin begonnen, gegen Polizei und Militär zu kämpfen. Ihren Hauptstreitkräften gelang es, Nanking unter ihre Kontrolle zu bringen und den ehemaligen Regierungschef zum Umzug zu zwingen. Trotz dieses Erfolgs hat sich die ehemalige Regierung neu organisiert und ist entschlossen, uns zu vernichten."
 kmt.479.a:0 "Die Revolution hat begonnen."
 kmt.480.t:0 "Bürgerkrieg!"
 kmt.480.d:0 "Obwohl es unseren Hauptangriffstruppen gelang, Nanking zu besetzen und möglichst viele korrupte Bürokraten hinzurichten, gelang es den führenden Persönlichkeiten der ehemaligen Regierung zu fliehen. Nachdem sie nun ihre Kräfte neu organisiert und ihre Truppen gesammelt haben, scheint ein Bürgerkrieg unvermeidlich."
 kmt.480.a:0 "Der Wille des Volkes wird triumphieren!"
 kmt.481.t:0 "Erfolgreicher bewaffneter Putsch!"
 kmt.481.d:0 "Unsere Streitkräfte haben jegliche Opposition in Nanking und Umgebung rasch ausgeschaltet. Der ehemalige Regierungschef konnte trotz der Verfolgung durch unsere Kameraden in sein Fluchtflugzeug einsteigen, das jedoch später von unseren Soldaten mit leichten Maschinengewehren abgeschossen wurde. Ohne ihren Anführer gerieten die feindlichen Streitkräfte schnell in Unordnung, und viele von ihnen liefen auf unsere Seite über."
 kmt.481.a:0 "Die Revolution war erfolgreich!"
 kmt.482.d:0 "Jetzt, wo die Kommunisten und die [HYQ.GetRulingParty] gegeneinander kämpfen, sollten wir vielleicht Partei ergreifen und unseren Anteil an der Beute einfordern?"
 kmt.482.a:0 "Unterstützen Sie die Kommunisten"
 kmt.482.b:0 "Unterstützen Sie die [HYQ.GetRulingParty]"
 kmt.483.t:0 "[From.GetName] fordert unsere Unterwerfung"
 kmt.483.d:0 "[From.GetName] hat ein Ultimatum gestellt, in dem wir aufgefordert werden, uns friedlich und sofort zu ergeben. Wenn wir dem nicht nachkommen, haben sie keine andere Wahl, als uns mit der gesamten Macht ihres Militärs zu vernichten."
 kmt.483.a:0 "Es ist besser, als Feigling zu leben, als zu sterben und dabei vorzugeben, ein Held zu sein."
 kmt.483.b:0 "Die volle Macht ihres Militärs? Wir werden sehen ..."
 kmt.484.t:0 "[From.GetName] sendet"
 kmt.484.d:0 "[From.GetLeader] hat die weise Entscheidung getroffen, sich uns friedlich zu unterwerfen. Trotz einiger rebellischer Elemente, die einen Guerillakrieg gegen unsere Besatzungstruppen führen, haben wir nun die absolute Kontrolle über das Gebiet."
 kmt.484.a:0 "Lang lebe [Root.GetNameDef]!"
 kmt.497.t:0 "[From.GetName] verweigert die Übermittlung"
 kmt.497.d:0 "[From.GetLeader] hat sich geweigert, sich zu unterwerfen und hat, arrogant genug, unser Militär als bloßes unorganisiertes Fußvolk verspottet. Dies hat zahlreiche Militäroffiziere provoziert und unser Volk fordert sofortige militärische Maßnahmen gegen diese Demütigung!"
 kmt.497.a:0 "Gut, das haben sie sich selbst eingebrockt."
 kmt.497.b:0 "Vielleicht... später?"
 kmt.496.t_1:0 "Genossen von der KPCh"
 kmt.496.t_2:0 "Neue Mitglieder"
 kmt.496.d_1:0 "Einige unserer Kameraden haben sich freiwillig gemeldet, um unsere Operation innerhalb der [Root.GetRulingParty] zu unterstützen und unseren Fortschritt voranzutreiben. Allerdings könnte es etwas mehr Aufwand erfordern, sie dazu zu bringen ..."
 kmt.496.d_2:0 "Einige unserer Genossen konnten neue Mitglieder für unsere Bewegung gewinnen. Wenn es uns gelingen würde, sie in die Regierung zu holen, würde das unserem Plan zweifellos zugutekommen."
 kmt.496.a:0 "Wir können immer zusätzliche Hände gebrauchen."
 kmt.496.b:0 "Diese Anstrengungen könnten anderswo besser eingesetzt werden."
 ## 11/1/2018 ##
 kmt.498.t:0 "Kommunistische Bewegung gestoppt"
 kmt.498.d:0 "Angesichts des anhaltenden Krieges hat die Regierung verstärkt Ressourcen in die Bekämpfung subversiver Aktivitäten im Land gesteckt. Wir waren gezwungen, unsere Bewegung einzustellen, um zu verhindern, dass unser Plan gefährdet wird."
 kmt.498.a:0 "Wir müssen einfach warten ..."
 kmt.499.t:0 "Wiederaufnahme der kommunistischen Bewegung"
 kmt.499.d:0 "Da der Krieg vorbei ist, können wir wieder mit der Verbreitung unserer Propaganda fortfahren."
 kmt.499.a:0 "Endlich."
 ## 12/1/2018 ##
 kmt.202.d_1:0 "Nachdem sich der Staub des chinesischen Bürgerkriegs gelegt hat, gehen wir als Sieger hervor. [CHI.GetNameDefCap] wurde besiegt und wir müssen nicht länger alleine handeln."
 kmt.202.d_2:0 "Nachdem sich der Staub des chinesischen Bürgerkriegs gelegt hat, gehen wir als Sieger hervor. [PRC.GetNameDefCap] wurde besiegt und wir müssen nicht länger alleine handeln."
 ## 12/2/2018 ##
 kmt.500.t:0 "[From.GetName] strebt weitere Zusammenarbeit an"
 kmt.500.d:0 "[From.GetName] hat Delegierte geschickt, um eine weitere Zusammenarbeit mit uns anzustreben."
 kmt.500.a:0 "Dieses Angebot klingt gut."
 kmt.500.b:0 "Man kann ihnen nicht trauen."
 kmt.501.t:0 "[From.GetName] stimmt weiterer Zusammenarbeit zu"
 kmt.501.d:0 "[From.GetName] hat einer weiteren Zusammenarbeit zwischen uns zugestimmt."
 kmt.501.a:0 "Fantastisch!"
 kmt.502.t:0 "[From.GetName] lehnt weitere Zusammenarbeit ab"
 kmt.502.d:0 "[From.GetName] hat eine weitere Zusammenarbeit zwischen uns abgelehnt."
 kmt.502.a:0 "Schade"
 kmt.504.t:0 "Training beendet"
 kmt.504.d:0 "Die Divisionen, die wir zur Ausbildung in britische Gebiete geschickt haben, sind zurückgekehrt."
 kmt.504.d:0 "Diese Truppen werden für unseren Sieg im Krieg von entscheidender Bedeutung sein."
 kmt.507.t:0 "Eine neue Versorgungsroute"
 kmt.507.d:0 "[CHI.GetName]s Feind hat Mandalay eingenommen und Myitkyina überwältigt. Fast alle möglichen Versorgungsrouten nach [CHI.GetName] sind entweder abgeschnitten oder feindlichem Beschuss ausgesetzt. Es gibt jedoch noch eine plausible Lösung: Lufttransporte über den Himalaya. Obwohl diese Route für die Piloten sehr gefährlich ist, da keine unserer Maschinen diese Höhe halten und den eisigen Temperaturen standhalten kann, ist sie die einzige Möglichkeit für [CHI.GetName], Nachschub aus dem Ausland zu erhalten. Sollte [CHI.GetName] fallen, könnte die Bedrohung für uns noch größer werden."
 kmt.507.a:0 "Wir müssen tun, was wir können."
 kmt.507.b:0 "Die Bedeutung der territorialen Integrität von [CHI.GetName] wird überschätzt."
 kmt.508.t:0 "[From.GetName] möchte Versorgungsgüter per Lufttransport nach [CHI.GetName] bringen" 
 kmt.508.d:0 "[From.GetName] hat eine Idee, wie man ausländische Hilfsgüter nach [CHI.GetName] bringen kann. Allerdings ist diese Vorgehensweise extrem gefährlich. Sie haben beschlossen, Hilfsgüter per Lufttransport von Assam über den Himalaya nach Kunming zu bringen."
 kmt.508.a:0 "Sie können es schaffen."
 kmt.508.d:0 "Wir haben ein strategisches Interesse daran, dies zu verhindern."
 kmt.509.t:0 "Der Buckel"
 kmt.509.d:0 "Ausländische Lieferungen kommen jetzt über eine neue Flugroute über den Himalaya.\n\nDie Piloten nennen die neue Route „The Hump“, da die Bergketten des Himalaya ihrer Meinung nach einem Kamelhöcker ähneln."
 kmt.509.a:0 "Dennoch fließen die Lieferungen wieder ein."
 ## 13/2/2018 ##
 kmt.510.d:0 "Ausländische Lieferungen fließen nun über eine neue Flugroute über den Himalaya nach [CHI.GetName]. Die Piloten nennen die neue Route „The Hump“, da die Bergketten des Himalaya ihrer Meinung nach einem Kamelhöcker ähneln."
 kmt.511.t:0 "[From.GetName] Abgelehnt"
 kmt.511.d:0 "[From.GetName] hat uns den Zugang zu ihren Luftwaffenstützpunkten verweigert, um Versorgungsgüter nach [CHI.GetName] zu transportieren."
 kmt.511.a:0 "Was denken sie sich?!"
 kmt.514.d:0 "[CHI.GetName]s Feind hat Mandalay eingenommen und die Burmastraße abgeschnitten. Als Reaktion darauf schlug General Josepg Stiltwell den Bau einer neuen Straße von Ledo nach Kunming vor, solange Myitktina noch in freundlicher Hand ist. Diese neue Route ermöglicht es uns, [CHI.GetName]s Kriegsanstrengungen weiterhin zu unterstützen."
 kmt.514.a:0 "Genehmigen Sie den Vorschlag."
 kmt.515.t:0 "[From.GetName] möchte eine neue Straße bauen"
 kmt.515.d:0 "Um den Versorgungsfluss nach [CHI.GetName] aufrechtzuerhalten, hat [From.GetName] beschlossen, eine neue Straße von Ledo nach Kunming zu bauen, die als neue Landversorgungsroute für [CHI.GetName] dienen soll, um ausländische Unterstützung zu erhalten."
 kmt.516.t:0 "Die Ledo-Straße"
 kmt.516.d:0 "[USA.GetName] hat für uns eine neue Straße gebaut, über die wir ausländische Vorräte beschaffen können.\n\nDa sie in Ledo beginnt, wird sie als Ledo Road bezeichnet."
 kmt.517.t:0 "[From.GetName] stimmt zu."
 kmt.517.d:0 "[From.GetName] hat dem Bau der neuen Straße zugestimmt."
 kmt.517.a:0 "Dies wird für die Unterstützung der Kriegsanstrengungen von [CHI.GetName] von entscheidender Bedeutung sein."
 kmt.518.d:0 "[From.GetName] hat den Bau der neuen Straße abgelehnt."
 kmt.519.d:0 "Der Bau der Ledo Road ist nun abgeschlossen."
 KMT_ledo_road_construction_start_tt:0 "§H Die Ledo Road wird in ungefähr§! §Y2§! §H Jahren fertiggestellt sein.§!\n"
 ## 4/3/2018 ##
 kmt.503.t:0 "Die Yunnan-Haiphong-Eisenbahn"
 kmt.503.d:0 "Die Yunnan-Haiphong-Eisenbahn ist jetzt voll ausgelastet und bringt zusätzliches Material aus dem Ausland, um die Kriegsanstrengungen von [CHI.GetName] zu unterstützen."
 kmt.503.a:0 "Hübsch"
 kmt.523.t:0 "Die Burma-Straße"
 kmt.523.d:0 "Die Burmastraße ist fertiggestellt und zusätzliches Material aus dem Ausland strömt nach [CHI.GetName], um ihre Kriegsanstrengungen zu unterstützen."
 kmt.520.t:0 "Angelegenheiten Indochinas"
 kmt.520.d:0 "Angesichts der aktuellen Lage ist unser Einfluss auf die Kolonien in Übersee, insbesondere in Asien, deutlich geschwächt. [CHI.GetName] hat daher vorgeschlagen, dass wir ihnen vorübergehend den Besitz unserer Kolonien in Indochina übertragen, damit sie die Region schützen können und sich unsere Truppen stattdessen auf den europäischen Kriegsschauplatz konzentrieren können."
 kmt.520.a:0 "Wir können Indochina in unserer derzeitigen Situation nicht schützen, dies ist die beste Lösung."
 kmt.520.b:0 "Wir können ihnen nicht vertrauen."
 kmt.521.t:0 "[From.GetName] Einverstanden"
 kmt.521.d:0 "[From.GetName] hat zugestimmt. Wir kontrollieren jetzt Indochina."
 kmt.521.a:0 "Sehr gut."
 kmt.522.t:0 "[From.GetName] Abgelehnt"
 kmt.522.d:0 "[From.GetName] hat sich geweigert, Indochina an uns zu übertragen."
 kmt.522.a:0 "Also gut."
 kmt.524.t:0 "Die beiden französischen Regierungen"
 kmt.524.d:0 "[FRA.GetName] ist nun in zwei verfeindete Regierungen gespalten, die beide behaupten, die einzige legitime französische Autorität zu sein. Wir müssen uns entscheiden, an welche Regierung wir unsere Anfrage richten, aber das würde die andere sicherlich verärgern."
 kmt.524.a:0 "[FRA.GetLeader]s Regierung."
 kmt.524.b:0 "Rivale von [FRA.GetLeader]."
 kmt.525.t:0 "[CHI.GetName] hat unseren Feind erkannt"
 kmt.525.d:0 "[CHI.GetName] hat eine Anfrage zur Übertragung Indochinas an unsere rivalisierende Regierung gesendet. Dies würde bedeuten, dass sie ihre Legitimität als französische Autorität anerkannt haben."
 kmt.525.a:0 "Empörend!"
 kmt.525.b:0 "Wir können nichts tun."
 kmt.526.t:0 "[From.GetAdjective] Protest"
 kmt.526.d:0 "[FRA.GetName] hat gegen unsere jüngsten diplomatischen Manöver Protest eingelegt."
 kmt.526.a:0 "Was auch immer"
 kmt.527.t:0 "Freies Vietnam?"
 kmt.527.d:0 "Die Kolonialregierung in Vietnam ist zusammengebrochen, nachdem alle kriegslüsternen Beamten festgenommen und inhaftiert wurden. Liegt es nun an uns, über das Schicksal des vietnamesischen Volkes zu entscheiden?"
 kmt.527.a:0 "Sie sollen die Kolonialregierung übernehmen und über ihr eigenes Schicksal entscheiden!"
 kmt.528.t:0 "Freies Kambodscha?"
 kmt.528.d:0 "Nachdem die Khmer-Guerilla den Kolonialgouverneur bei seiner Flucht aus dem Land gefangen genommen hatte, brach die Kolonialregierung zusammen. Unsere Spitzenbeamten diskutieren nun, was mit dem kambodschanischen Volk geschehen soll."
 kmt.528.a:0 "Kambodscha soll von Kambodschanern regiert werden!"
 kmt.529.t:0 "Freies Laos?"
 kmt.529.d:0 "In einem verzweifelten Versuch, das Gouverneursgebäude zu halten, wurden alle verbleibenden Kolonialgarnisonen in Laos eliminiert, und der Gouverneur ergab sich unseren Streitkräften. Nun wird ein neuer Führer für Laos benötigt."
 kmt.529.a:0 "Wir werden uns nicht in die inneren Angelegenheiten von Laos einmischen."
 kmt.530.t:0 "Freies Siam?"
 kmt.530.d:0 "Die letzten Reste der Kolonialgarnisonen in Siam haben sich unseren Streitkräften ergeben und damit die vollständige Kapitulation der siamesischen Kolonialregierung markiert. Das siamesische Volk sehnt sich danach, von den Fesseln der Kolonialherrschaft befreit zu werden und fordert von uns die Unterstützung seiner Unabhängigkeit von seinem ehemaligen Oberherrn."
 kmt.530.a:0 "Selbstverständlich erhalten sie dabei unsere Unterstützung."
 kmt.531.t:0 "Freie Philippinen?"
 kmt.531.d:0 "Nach dem Zusammenbruch der Kolonialregierung auf den Philippinen haben unsere Truppen die Aufgabe übernommen, die Inseln zu besetzen. Obwohl sie mit unserer Hilfe bei der Vertreibung der westlichen Kolonisten zufrieden sind, würden die einheimischen Filipinos es vorziehen, wenn wir die Dekolonisierungsbemühungen noch weiter vorantreiben würden."
 kmt.531.a:0 "Sie sollen jetzt ihre Unabhängigkeit erlangen."
 kmt.532.t:0 "Indien befreien?"
 kmt.532.d:0 "Obwohl das indische Volk unter der direkten Herrschaft seines Oberherrn steht, hegt es noch immer ein starkes nationalistisches Gefühl und spielt eine große Rolle dabei, unseren Streitkräften beim Sieg über die Kolonialmächte zu helfen.\n\nSollten wir ihre Nation als Anerkennung ihrer Tapferkeit befreien und unser Versprechen erfüllen?"
 kmt.532.a:0 "Indien wird nicht länger das Juwel in der Krone eines Ausländers sein!"
 kmt.533.t:0 "Siam befreien?"
 kmt.533.d:0 "Mit Hilfe der siamesischen Guerillas konnten die Kolonialgarnisonen in Siam leicht besiegt werden. Nun hat sich der König von Siam, der geistige Führer des siamesischen Volkes seit seiner Unterstellung unter direkte Herrschaft, an unsere Beamten gewandt und seinen Wunsch nach einem souveränen siamesischen Staat zum Ausdruck gebracht.\n\nWie sollen wir reagieren?"
 kmt.533.a:0 "Sie werden nun von den Fesseln des Kolonialismus befreit sein!"
 kmt.534.t:0 "Die Philippinen befreien?"
 kmt.534.d:0 "Nach einigen erfolgreichen amphibischen Angriffen auf den Archipel haben wir uns auf den Philippinen fest etabliert. Die Einheimischen sind mehr als bereit, unseren Krieg gegen die Kolonialherren zu unterstützen, und würden es uns noch mehr danken, wenn wir ihre Unabhängigkeit unterstützen.\n\nSollten wir das tun?"
 kmt.534.a:0 "Natürlich! Sie sollen ein souveräner Staat werden."
 kmt.535.t:0 "Befreite Indianer"
 kmt.535.d:0 "Während unsere Truppen im Indischen Kriegsgebiet vorrücken, werden sie von den Einheimischen mit Blumen, Essen und Jubel begrüßt. Sie sind nun von den niederträchtigen westlichen Kolonialherren befreit und haben sich [RAJ.GetNameDef] angeschlossen."
 kmt.536.t:0 "Siamesen befreit"
 kmt.536.d:0 "Die siamesischen Einheimischen im neu befreiten Gebiet haben eine große Feier abgehalten und sich gerne der [SIA.GetNameDef] angeschlossen."
 kmt.537.t:0 "Befreite Filipinos"
 kmt.537.d:0 "Die Filipinos jubeln über ihre Rettung – unsere Truppen rücken durch den Archipel vor. Das neu befreite Gebiet ist [PHI.GetNameDef] beigetreten."
 ## 16/3/2018 ##
 kmt.538.t:0 "[From.GetName] zieht die Unterstützung zurück"
 kmt.538.d:0 "[From.GetName] hat uns seine Unterstützung entzogen."
 kmt.538.a:0 "Schade"
 ## 28/3/2018 ##
 kmt.350.t_2:0 "[From.GetName] sendet"
 ## 13/4/2018 ##
 kmt.539.t:0 "Kommunistischer Putsch!"
 kmt.539.d:0 "Heute Morgen drang eine große Gruppe bewaffneter Kommunisten massakriert in das Anwesen von [Roo.GetLeader] ein und forderte die Übertragung der gesamten Macht des Landes an ihren Anführer. [Root.GetLeader] wird nun als Geisel gehalten. Sollten wir dem nicht nachkommen, wird [Root.GetLeader] mit Sicherheit sofort hingerichtet."
 kmt.539.a:0 "Es lebe die Revolution!"
 kmt.539.b:0 "Besser tot als rot!"
 kmt.540.t:0 "[From.GetName] sucht Frieden"
 kmt.540.d:0 "Nachdem das kommunistische Regime die alte Regierung gestürzt hat, hat [From.GetLeader] seinen Wunsch geäußert, sich aus unserem aktuellen Konflikt zurückzuziehen."
 kmt.540.a:0 "Es ist zu viel Blut vergossen worden."
 kmt.540.b:0 "Abscheuliche kommunistische Bastarde! Sie werden durch unsere Hand umkommen!"
 kmt.541.t:0 "Frieden mit [From.GetName]"
 kmt.541.d:0 "[From.GetLeader] hat beschlossen, mit uns Frieden zu schließen."
 kmt.541.a:0 "Fantastisch!"
 kmt.542.t:0 "[From.GetName] lehnt Friedensangebot ab"
 kmt.542.d:0 "[From.GetLeader] hat unser Friedensangebot abgelehnt."
 kmt.542.a:0 "Schade."
 kmt.543.t:0 "Kommunistischer Putsch in [From.GetName] gescheitert"
 kmt.543.d:0 "Der von uns inszenierte kommunistische Putsch in [From.GetName] ist gescheitert. Obwohl ihr Anführer hingerichtet wurde, nachdem sich das lokale Regime geweigert hatte, die Macht an die Kommunisten zu übergeben, wurden die Kommunisten schnell vom [From.GetAdjective]-Militär entmachtet. Aufgrund der geringen Größe von [From.GetName] ist es für die [From.GetAdjective]-Behörden kein Problem, das Hauptquartier der Kommunisten ausfindig zu machen und einen erfolgreichen Überfall durchzuführen.\n\nObwohl alle Beweise, die auf uns als Drahtzieher dieses Putsches hinweisen, vor dem Überfall auf das Hauptquartier vernichtet wurden, wurden derzeit alle von uns unterstützten Kommunisten in [From.GetName] hingerichtet, und vielleicht ist es Zeit für uns, direkt einzugreifen."
 kmt.543.a:0 "Die Revolution wird siegen!"
 kmt.544.t:0 "Kommunisten putschen in [From.GetNameOld]"
 kmt.544.d:0 "[From.GetAdjective] Die Kommunisten haben erfolgreich die Kontrolle über ihr Land übernommen und ihre Unabhängigkeit erklärt. Wie sollen wir reagieren?"
 kmt.544.a:0 "Zerquetsche dieses rote Ungeziefer!"
 kmt.544.b:0 "Die Macht unserer Nation schwindet!"
 kmt.546.d:0 "Da [From.GetName] keinen Sinn mehr darin sieht, mit uns zu kämpfen, hat er beschlossen, unsere Unabhängigkeit aufzugeben und uns einen weißen Frieden vorzuschlagen."
 kmt.546.a:0 "Die Revolution hat gesiegt!"
 kmt.546.b:0 "Wir werden die Revolution nach [From.Capital.GetName] tragen!"
 kmt.547.a:0 "Endlich Frieden."
 kmt.553.t:0 "[GER.GetName] zieht Berater zurück"
 kmt.553.d:0 "[GER.GetName] hat beschlossen, seine Militärmission abzubrechen."
 kmt.553.a:0 "Das ist nicht ideal."
 kmt.554.t:0 "[ENG.GetAdjective] Ausgebildete Einheiten kehren zurück"
 kmt.554.d:0 "Nach einer Ausbildung in [ENG.GetAdjective]-Lagern sind die Einheiten, die wir geschickt haben, zurückgekehrt."
 kmt.554.a:0 "Wir werden sehen, welchen Nutzen sie aus den Schulungen ziehen."
 kmt.555.t:0 "[From.GetLeader] Strebt Koalitionsregierung an"
 kmt.555.d:0 "[From.GetLeader] hat beschlossen, dass wir die internen Machtkämpfe beenden und uns als Waffenbrüder zusammenschließen sollten. Eine Koalitionsregierung wurde vorgeschlagen und wartet auf unsere Antwort. Sollten wir dieses Angebot ablehnen, müssen wir mit Gewaltanwendung durch [From.GetRulingParty] rechnen."
 kmt.555.a:0 "Das klingt gut."
 kmt.555.b:0 "Unsinn!"
 kmt.556.t:0 "[From.GetLeader] stimmt der Bildung einer Koalitionsregierung zu"
 kmt.556.d:0 "[From.GetLeader] hat zugestimmt, mit uns eine Koalitionsregierung zu bilden."
 kmt.556.a:0 "Dies sollte das Ende des Bürgerkriegs markieren."
 kmt.557.t:0 "[From.GetLeader] Weigert sich, eine Koalitionsregierung zu bilden"
 kmt.557.d:0 "[From.GetLeader] hat sich geweigert, mit uns eine Koalitionsregierung zu bilden."
 kmt.557.a:0 "Dann ist es an der Zeit, dass die Waffen sprechen."
 kmt.557.b:0 "Der Frieden muss gewahrt werden …"
 ## 14/4/2018 ##
 kmt.558.t:0 "Indochina an [FRA.GetName] zurückgeben?"
 kmt.558.d:0 "Nachdem [FRA.GetName] nun wieder freie Hand hat, haben sie die Rückgabe des Eigentums an Indochina wie vereinbart gefordert."
 kmt.558.a:0 "Rückkehr nach Indochina."
 kmt.558.b:0 "Indichina war schon immer ein integraler Bestandteil Chinas!"
 kmt.559.t:0 "[From.GetName] Zurückgegeben Indochina"
 kmt.559.d:0 "Indochina wurde in unsere Hände zurückgegeben."
 kmt.559.a:0 "Sehr gut"
 kmt.560.t:0 "[From.GetName] weigerte sich, Indochina zurückzugeben"
 kmt.560.t:0 "[From.GetName] hat erklärt, dass sie an Indochina festhalten werden, da es ihrer Aussage nach immer ein integraler Bestandteil ihres Territoriums gewesen sei."
 kmt.560.d:0 "Quelle est cette absurdité!?"
 ## 20/5/2018 ##
 kmt.561.t:0 "Änderungen in unserem Fokus"
 kmt.561.d:0 "Seit den jüngsten Unruhen in [JAP.GetName] scheinen sie keine Bedrohung mehr für uns darzustellen. Wir können nun all unsere Anstrengungen darauf konzentrieren, die Kommunisten und Kriegsherren auszurotten."
 kmt.561.a:0 "Die Dinge laufen zu unseren Gunsten."
 ## 30/5/2018 ##
 kmt.562.t:0 "Generäle verließen Angebote für [From.GetRulingParty]"
 kmt.562.d:0 "Einige unserer Generäle haben uns zugunsten der Angebote von [From.GetRulingParty] verlassen."
 kmt.562.a:0 "Das sieht nicht gut aus."
 kmt.563.t:0 "Ehemalige Kommunisten treten unserem Militär bei"
 kmt.563.d:0 "Unsere Angebote haben eine beträchtliche Anzahl militärischer Talente aus der hochautonomen kommunistischen Verwaltung in [From.Capital.GetName] angezogen."
 kmt.563.a:0 "So können weitere Pläne problemlos umgesetzt werden."
 kmt.564.t:0 "Lokale Beamte werden ersetzt"
 kmt.564.d:0 "[From.GetRulingParty] hat einige Beamte geschickt, um unsere lokale Verwaltung zu ersetzen. Wenn wir ihnen das erlauben, endet unsere Autonomie."
 kmt.564.b:0 "Zeit, meine Waffen abzustauben."
 kmt.564.a:0 "Harmonie steht über allem."
 kmt.565.t:0 "Übernahme"
 kmt.565.d:0 "Die ehemalige hochautonome kommunistische Regierung gibt es nicht mehr, unsere Nation ist endlich unter dem Banner von [Root.GetRulingParty] vereint."
 kmt.565.a:0 "Ehre sei [Root.GetName]!"
 kmt.566.t:0 "Kommunisten rebellieren"
 kmt.566.d:0 "Die kommunistische Regierung hat den Machtwechsel in der Region behindert. Später eskalierte die Situation zu bewaffneten Konflikten. Milizen und reguläre Armee liefern sich in der Region einen Schlagabtausch."
 kmt.566.a:0 "Wir werden diesen Aufstand niederschlagen."
 ## 29/07/2018 ##
 kmt.330.t:0 "Gemeinsame Forschung beendet"
 kmt.330.d:0 "Aufgrund unserer sich verschlechternden Beziehungen zu [GER.GetNameDef] wurde das gemeinsame Forschungsprogramm beendet."
 kmt.330.a:0 "Was auch immer"
 kmt.331.d:0 "Aufgrund unserer sich verschlechternden Beziehung zu [CHI.GetNameDef] wurde das gemeinsame Forschungsprogramm beendet."
 ## 10/10/2018 ##
 kmt.12.d:0 "[From.GetName] hat zugestimmt, die McMahon-Linie zu unseren Gunsten neu zu ziehen. Wir expandieren nun weiter nach Westen."
 kmt.14.d:0 "[From.GetName] hat unseren Vorschlag, die McMahon-Linie neu zu ziehen, abgelehnt. Sie bestehen darauf, dass die Linie unverändert bleiben muss."
 ## 14/10/2018 ##
 KMT_transfer_all_from_owned_indochina_states_tt2:0 "§RÜbertragen Sie alle Staaten in unserem Besitz in Indochina an [From.GetName]§!\n"
 KMT_transfer_all_from_owned_indochina_states_tt:0 "§G[From.GetName] überträgt alle ihnen gehörenden Staaten in Indochina an uns§!\n"
 KMT_transfer_all_from_owned_steppe_states_tt2:0 "§RÜbertragen Sie alle Staaten in unserem Besitz in der Zentralsteppe und Zentralasien an [From.GetName]§!\n"
 KMT_transfer_all_from_owned_steppe_states_tt:0 "§G[From.GetName] überträgt uns alle Staaten, die ihnen in der Zentralsteppe und in Zentralasien gehören§!\n"
 kmt.577.t:0 "[From.GetName] sucht Frieden"
 kmt.577.d:0 "[From.GetName] hat nun alle unsere Gebiete in Indochina besetzt. Sie möchten den Krieg nun unter der Bedingung beenden, dass wir ihnen alle unsere Besitztümer in Indochina übergeben."
 kmt.577.a:0 "Fairer Deal"
 kmt.577.b:0 "Niemals!"
 kmt.578.t:0 "[From.GetName] stimmt zu"
 kmt.578.d:0 "[From.GetAdjective] Die Beamten haben dem von uns vorgeschlagenen Friedensabkommen zugestimmt."
 kmt.578.a:0 "Großartig!"
 kmt.579.t:0 "[From.GetName] lehnt ab"
 kmt.579.d:0 "[From.GetAdjective] Beamte haben das von uns vorgeschlagene Friedensabkommen abgelehnt."
 kmt.579.a:0 "Schade"
 kmt.580.t:0 "[From.GetAdjective] Inkompetenz"
 kmt.580.d:0 "Da [From.From.GetName] seinen Einfluss in Indochina ausweiten möchte und [From.GetAdjective] Besitztümer in der Region fordert, hat [From.GetNameDef] beschlossen, nachzugeben. Das bedeutet, dass wir nun auf [From.From.GetAdjective] angewiesen sind."
 kmt.580.a:0 "Wir werden die Sache selbst in die Hand nehmen."
 kmt.580.b:0 "Wir müssen dem Willen unseres Herrn gehorchen."
 kmt.581.t:0 "[From.GetName] erklärt Unabhängigkeit"
 kmt.581.d:0 "Empört über unsere Entscheidung, dem Druck nachzugeben, hat [From.GetName] die pro-[Root.GetAdjective]-Regierung gestürzt und eine eigene Regierung eingesetzt. Damit sind sie de facto eine unabhängige Nation, die sich außerhalb unseres Einflussbereichs befindet."
 kmt.581.a:0 "Wir konnten nichts tun, um es zu verhindern."
 KMT_transfer_all_fromfrom_owned_indochina_states_tt2:0 "§RÜbertragen Sie alle Staaten in unserem Besitz in Indochina an [From.From.GetName]§!\n"
 KMT_transfer_all_fromfrom_owned_steppe_states_tt2:0 "§RÜbertragen Sie alle Staaten in unserem Besitz in der Zentralsteppe und Zentralasien nach [From.From.GetName]§!\n"
 kmt.58.t:0 "[From.GetName] lehnt Anfrage ab"
 ## 25/10/2018 ##
 kmt.100.t_2:0 "Nachfrage von [From.GetName]"
 kmt.100.d:0 "Die Regierung von [From.GetName] hat uns ein Ultimatum gestellt, dass wir die in unserem Besitz befindlichen Handelshäfen zurückgeben müssen. Sollten wir ihnen kein zufriedenstellendes Ultimatum stellen, sind militärische Maßnahmen zu erwarten."
 kmt.101.d:0 "Die Handelshäfen, die sie halten, wurden zurückgegeben. Sie haben allen Grund, unsere Macht zu fürchten!"
 kmt.102.d:0 "Diese abscheulichen Barbaren aus dem Westen haben sich geweigert, friedlich mit uns zu kooperieren! Unsere Leute dort müssen noch ein wenig warten."
 kmt.109.t:0 "[From.GetName]s Angebot"
 kmt.109.d:0 "[From.GetName] hat angeboten, sein militärisches Wissen mit uns zu teilen, wenn wir die Handelshäfen zurückgeben, die wir halten."
 kmt.109.a:0 "Guter Vorschlag"
 kmt.109.b:0 "Das ist es nicht wert"
 kmt.110.t:0 "Handelshäfen zurückgegeben"
 kmt.110.d:0 "[From.GetName] hat dem Angebot zugestimmt und der Deal ist abgeschlossen. Die Handelshäfen, die sie zuvor innehatten, stehen nun wieder offiziell unter unserer Verwaltung."
 kmt.110.a:0 "Ein fairer Deal."
 kmt.111.t:0 "[From.GetName] Abgelehnt"
 kmt.111.d:0 "Trotz unserer Großzügigkeit lehnte die [From.GetAdjective]-Regierung unser Angebot ab und beschloss, an den Handelshäfen festzuhalten."
 kmt.111.a:0 "Eine große Enttäuschung"
 ## 28/10/2018 ##
 kmt.585.t:0 "Sieg in [KMT_port.GetName]"
 kmt.585.d:0 "VON: [From.GetName]"
 kmt.585.d_1:0 "Da es auf der Macau-Halbinsel keine natürlichen Barrieren gab, besetzten unsere Truppen das Gebiet rasch. Einige der [KMT_defender.GetAdjective]-Garnisonen konnten sich mit Fähren nach Concelho das Ilhas im Süden zurückziehen und improvisierte Küstenverteidigungen errichten. \n\nSie konnten jedoch aufgrund von Munitions- und Personalmangel nicht lange standhalten. \n\nUnsere Truppen besiegten schließlich die verbleibenden Garnisonen und feierten ihren Sieg mit Fotos vor den Ruinen der St. Paul&#39;s-Kirche."
 kmt.585.d_2:0 "Unsere Garnison in [From.GetName] war zunächst schlecht auf einen bewaffneten Konflikt vorbereitet und wurde recht schnell nach Concelho das Ilhas südlich der Macau-Halbinsel zurückgedrängt. Sie konnte jedoch eine improvisierte Küstenverteidigung errichten, um die wütenden [KMT_attacker.GetAdjective]-Truppen abzuschrecken.\n\nNach der Reorganisation konnten unsere Garnisonen eine Gegenoffensive starten und dank ihrer Kenntnisse der Stadt die [KMT_attacker.GetAdjective]-Truppen erfolgreich von der Macau-Halbinsel verdrängen. Der Konflikt endete später in einer Pattsituation, und von beiden Seiten waren keine weiteren militärischen Aktivitäten zu beobachten."
 kmt.585.d_3:0 "Die Garnisonen der [KMT_defender.GetAdjective] konnten das Landesinnere des gepachteten Gebiets nicht halten und zogen sich auf die Insel Donghai zurück. Unseren Truppen gelang es trotz kostspieliger Anstrengungen, im nordöstlichen Teil der Insel Donghai einen Brückenkopf zu errichten und die verbleibenden Garnisonen rasch zu besiegen."
 kmt.585.d_4:0 "Der Überraschungsangriff der [KMT_attacker.GetAdjective]-Truppen überraschte unsere örtliche Garnison in [From.GetName]. Unsere Truppen konnten jedoch in Fort Bayard standhalten, bis Verstärkung eintraf. Da ihr Überraschungsangriff nicht den erwarteten Erfolg brachte, zogen sich die [KMT_attacker.GetAdjective]-Truppen bald aus dem [From.GetName]-Gebiet zurück."
 kmt.585.d_5:0 "Nach der Überquerung des Sham Chun konnten unsere Truppen zügig bis zur Shing Mun Redoubt vorrücken, wo heftige Kämpfe stattfanden.\n\nTrotz einiger Verluste verlief die Besetzung Kowloons recht zügig. Die Garnisonen der [KMT_defender.GetAdjective] hielten jedoch eine starke Verteidigungsposition auf Hong Kong Island, und direkte Angriffe hatten zu schweren Verlusten geführt. Einer kleinen Gruppe von Kämpfern gelang es, die Dunkelheit der Nacht zu nutzen und auf der Insel zu landen. Bald wurde eine vorgeschobene Position eingenommen, woraufhin die fassungslose und desorganisierte Garnison rasch besiegt wurde."
 kmt.585.d_6:0 "Unsere lokalen Garnisonen konnten die vorrückenden [KMT_attacker.GetAdjective]-Truppen bei Shing Mun Redoubt und nahe Tide Cove aufhalten. Die heftigen Kämpfe hatten beide Seiten zermürbt.\n\nDa es ihnen nicht gelang, die Initiative zu ergreifen, mussten sich die [KMT_attacker.GetAdjective]-Truppen zurückziehen und neu formieren. Weitere Angriffe auf [Root.GetAdjective]-Verteidigungsstellungen wurden gestartet, jedoch ohne Erfolg. Die hohen Verluste und erfolglosen Operationen führten schließlich zum Rückzug der [KMT_attacker.GetName]-Truppen nördlich des Sham Chun-Flusses, um potenziellem politischen Druck zu entgehen."
 kmt.585.d_7:0 "Die [KMT_defender.GetAdjective]-Verteidiger auf der Westseite der Kiautschou-Bucht ergaben sich schnell, nachdem sie auf die Insel Daqiao zurückgedrängt worden waren und ihnen alle Rückzugswege versperrt waren.\n\nAuf der anderen Seite der Kiautschou-Bucht war der Kampf im Stadtgebiet viel heftiger, aber am Ende gingen wir siegreich hervor und eroberten die [743.GetName] zurück."
 kmt.585.d_8:0 "Obwohl die [KMT_attacker.GetAdjective]-Truppen unsere Garnisonen in [From.GetName] mit ihren Angriffen überraschten, gelang es ihnen nicht, unsere äußere Verteidigung zu durchbrechen. Sie stellten alle militärischen Operationen bald ein, da sie keine nennenswerten Fortschritte feststellen konnten. Für diesen kleinen „Unfall“ wurde später von den lokalen [KMT_attacker.GetAdjective]-Behörden eine kleine Entschädigung gewährt."
 kmt.585.a:0 "Wir haben ihnen unsere Stärke gezeigt."
 ## 29/10/2018 ##
 kmt.586.t:0 "Niederlage in [KMT_port.GetName]"
 kmt.586.d_1:0 "Unseren Truppen gelang es, die lokalen Garnisonen der [KMT_defender.GetAdjective] in die südliche Gemeinde zurückzudrängen. Die dort errichtete Küstenverteidigung erwies sich jedoch als sehr effektiv. Unseren Truppen gelang es nicht, dort eine vorgeschobene Stellung zu errichten, und bald begann eine Gegenoffensive. Unsere Truppen zogen sich rasch in ihre Ausgangsposition zurück, und das Oberkommando beschloss, die Operation abzubrechen. Glücklicherweise unternahm die [KMT_defender.GetAdjective] keine weiteren militärischen Operationen."
 kmt.586.d_2:0 "Die [KMT_attacker.GetAdjective]-Truppen griffen unsere lokale Garnison in [KMT_port.GetName] unerwartet an, und bald waren unsere Männer gezwungen, sich von der Macau-Halbinsel in den südlichen Concelho das Ilhas zurückzuziehen. Die improvisierten Verteidigungsstellungen reichten aufgrund des Mangels an Munition und Männern nicht aus, um die [KMT_attacker.GetAdjective] abzuschrecken.\n\n[KMT_port.GetName] ist nun verloren."
 kmt.586.d_3:0 "Trotz anfänglicher Erfolge gelang es unseren Truppen nicht, die [KMT_defender.GetAdjective]-Garnisonen in Fort Bayard zu vertreiben. Nachdem das Oberkommando die Ankunft von [KMT_defender.GetAdjective]-Verstärkungen beobachtet hatte, erklärte es die Mission für gescheitert und befahl unseren Männern, sich aus [KMT_port.GetName] zurückzuziehen. Das [KMT_defender.GetAdjective] schien wenig Interesse an einer weiteren Eskalation zu haben."
 kmt.586.d_4:0 "Das Landesinnere von [KMT_port.GetName] wurde zu einem Friedhof der [KMT_defender.GetAdjective]-Garnisonen, da sie den wütenden [KMT_attacker.GetAdjective]-Truppen zahlenmäßig weit unterlegen waren. Die letzte Schlacht der lokalen Garnisonen fand auf der Insel Donghai statt, wo sie Angriffswellen standhalten konnten, bevor die [KMT_attacker.GetAdjective]-Truppen eine vorgeschobene Position im nordöstlichen Teil der Insel einnahmen. Da ihnen keine andere Wahl blieb, flohen die lokalen [KMT_defender.GetAdjective]-Garnisonen auf einem neutralen Handelsschiff aus dem Hafen."
 kmt.586.d_5:0 "Der Vormarsch durch die Neuen Gebiete verlief bis zur Schlacht um die Shing-Mun-Redoute recht mühelos. Unsere Truppen konnten die Stellung nicht zerstören und erlitten schwere Verluste, ebenso wie eine andere Gruppe, die einen Umweg in der Nähe von Tide Cove machte. Die hohe Zahl der Todesopfer zwang unsere Truppen zum Rückzug und zur Neugruppierung. Später wurden weitere Angriffe auf die Stellungen gestartet, die jedoch erfolglos blieben. Da sich die Operation hinzog, brach das Oberkommando sie aus Angst vor internationalem Druck ab.\n\nDie [KMT_defender.GetAdjective] unternahm nach dem Rückzug unserer Truppen nördlich des Sham-Chun-Flusses keinen Gegenangriff."
 kmt.586.d_6:0 "Obwohl die lokalen [KMT_defender.GetAdjective]-Garnisonen den [KMT_attacker.GetAdjective]-Streitkräften am Shing Mun Redoubt einige Schläge versetzten, fiel die Stellung aufgrund von Missverständnissen und loser Organisation bald in die Hände von [KMT_attacker.GetAdjective]. Die verbleibenden Garnisonen hatten eine starke Position auf Hong Kong Island gehalten und zahlreiche Landungsversuche vereitelt. Einer kleinen Gruppe von [KMT_attacker.GetAdjective]-Kämpfern gelang es jedoch, sich auf die Insel zu schleichen. Unsere ratlosen Truppen wurden überrascht, gerieten bald in Unordnung und wurden kurzerhand besiegt.\n\nWir haben die Kontrolle über Hong Kong verloren."
 kmt.586.d_7:0 "Trotz unserer Initiative verfügten die [KMT_defender.GetAdjective]-Garnisonen in [KMT_port.GetName] über eine gut erhaltene Verteidigung, und unsere Truppen waren nicht in der Lage, ihre Linien zu durchbrechen. Schockiert von den Berichten beschloss das Einsatzkommando, die Operation umgehend abzubrechen. Die Operation wurde als bloßer „Unfall“ vertuscht, und dem [KMT_port.GetName] wurde später ein kleiner Betrag als Entschädigung zugeteilt."
 kmt.586.d_8:0 "Unsere an der Westseite der Kiautschou-Bucht stationierten Truppen konnten ihre Stellungen gegen die anstürmenden [KMT_attacker.GetAdjective]-Truppen nicht verteidigen und kapitulierten bald.\n\nAuf der anderen Seite der Bucht kam es zu brutalen Häuserkämpfen, bei denen unsere örtlichen Garnisonen bis zum letzten Mann kämpften.\n\n[KMT_port.GetName] ist nun in [KMT_attacker.GetAdjective]-Händen."
 kmt.586.a:0 "Empörend!"
 kmt.587.t:0 "Patt in [KMT_port.GetName]"
 kmt.587.d_1:0 "Die Schlacht um Macau endete mit einem Status quo ante bellum zwischen den [KMT_attacker.GetAdjective]-Streitkräften und den [KMT_defender.GetAdjective]-Garnisonen. Dies war die Folge zahlreicher gescheiterter amphibischer Angriffe auf [KMT_defender.GetAdjective]-Stellungen auf Taipa und Coloane und der Unfähigkeit der [KMT_defender.GetAdjective]-Garnisonen, eine erfolgreiche Gegenoffensive zur Rückeroberung der Macau-Halbinsel zu starten."
 kmt.587.d_2:0 "Da sich die lokalen Garnisonen auf die Insel Donghai zurückzogen, konnten die Truppen der KMT nicht weiter vorrücken. Aus Angst vor politischem Druck unterzeichnete der lokale Kommandant heimlich einen Waffenstillstand und gab alles in den Zustand vor dem Konflikt zurück. Der widerspenstige Kommandant wurde später für sein Handeln vor Gericht gestellt."
 kmt.587.d_3:0 "Obwohl unsere Truppen auf ihrem Marsch durch die Neuen Territorien auf wenig Widerstand stießen, entwickelte sich die Schlacht um die Shing-Mun-Redoute zu einem Blutbad. Beide Seiten erlitten während der Kämpfe schwere Verluste. Da das Oberkommando die Mission für gescheitert hielt, kontaktierte es die [KMT_port.GetName]-Lokalregierung, um einen Waffenstillstand zu vereinbaren und Friedensbedingungen zu besprechen. Der Konflikt endete mit dem Rückzug der [KMT_attacker.GetAdjective]-Truppen in den Norden des Sham-Chun-Flusses."
 kmt.587.d_4:0 "Nach der Entsendung der [KMT_defender.GetAdjective]-Garnisonen auf der Westseite der Kiautschou-Bucht wurden die [KMT_attacker.GetAdjective] auf der Ostseite jedoch zurückgeschlagen. Die [KMT_defender]-Garnisonen begannen daraufhin, zivile Schiffe zu requirieren, um die andere Seite der Bucht zu erreichen, wurden jedoch von landgestützten [KMT_attacker.GetAdjective]-Vergeltungsschlägen empfangen. Die [KMT_attacker.GetAdjective]-Streitkräfte kopierten bald die Methoden der [KMT_defender.GetAdjective], und es kam zu Kämpfen zwischen Soldaten auf kleinen Schiffen in der Kiautschou-Bucht.\n\nDer Konflikt endete, als die Zivilbevölkerung begann, die Requirierungsanfragen abzulehnen. Kurz darauf wurde ein Waffenstillstand unterzeichnet, der den Zustand vor dem Konflikt wiederherstellte."
 kmt.587.a:0 "Nun ja."
 kmt.588.t:0 "[From.GetAdjective] Ehrgeiz"
 kmt.588.d:0 "Geheimdienstinformationen zufolge plant [From.GetLeader] die Rückeroberung der Handelshäfen. Wir wissen noch nicht, wie sie ihr Ziel erreichen wollen, sollten aber auf bewaffnete Auseinandersetzungen vorbereitet sein."
 kmt.588.a:0 "Alarmierend."
 ## 30/10/2018 ##
 KMT_too_low_stability_tt:0 "§RNur diese Option ist verfügbar, da die Stabilität unter 25 % liegt§!\n"
 KMT_high_war_support_tt:0 "§H Diese Option ist verfügbar, da die Kriegsunterstützung mindestens 75 % und die Stabilität mindestens 25 % beträgt§!\n"
 kmt.586.b:0 "§H Wir können nichts tun§!"
 kmt.586.c:0 "§H Wir fordern die Rückgabe der Häfen!§!"
 ## 31/10/2018 ##
 kmt.589.t:0 "[From.GetName] fordert die Rückgabe von [From.From.GetName] an"
 kmt.589.d:0 "Nach einer langen Diskussion eines Krisenausschusses zu den Angelegenheiten von [From.From.GetName] hat [From.GetName] beschlossen, die Rückgabe von [From.From.GetName] an sie und den vollständigen und sofortigen Abzug unserer Truppen aus dem Gebiet zu fordern. Im Gegenzug werden sie unsere Taten übersehen. Andernfalls könnten sie in der aktuellen Situation gewalttätiger vorgehen."
 kmt.589.a:0 "Zeitgenössischer Frieden ist vorzuziehen."
 kmt.589.b:0 "Ein heftiger Käfer ist immer noch nur ein Käfer."
 kmt.590.t:0 "[From.GetName] lehnt ab"
 kmt.590.d:0 "Die Antwort kam schnell und bestand nur aus vier chinesischen Buchstaben, die „Wir lehnen ab“ bedeuteten."
 kmt.590.a:0 "Unsere Blufftaktik hat sich nicht ausgezahlt."
 kmt.590.b:0 "Diese Wilden können mehr über Demut lernen, nachdem wir sie besänftigt haben."
 kmt.591.t:0 "[From.GetName] erklärt den Krieg"
 kmt.591.d:0 "Die arroganten [From.GetAdjective] haben beschlossen, das aktuelle Problem mit Blut und Eisen zu lösen."
 kmt.591.a:0 "Mut oder Dummheit? Wahrscheinlich Letzteres."
 kmt.592.t:0 "[KMT_temp_port.GetName] zurückgegeben"
 kmt.592.d:0 "[From.GetName] hat beschlossen, nachzugeben und [KMT_temp_port.GetName] an uns zurückzugeben. [From.GetAdjective]-Truppen haben sich ebenfalls aus dem Gebiet zurückgezogen."
 kmt.592.a:0 "Wir hoffen, dass sie nichts anderes planen …"
 ## 01/11/2018 ##
 kmt.593.t:0 "[From.GetAdjective] Angriffe [KMT_no_div_temp_port.GetName]"
 kmt.593.d:0 "[From.GetAdjective]-Truppen haben die Grenze von [KMT_no_div_temp_port.GetName] überschritten und versuchen, das Gebiet mit Gewalt zu besetzen. Da wir dort kaum oder gar keine Truppen stationiert haben, durfte der Gouverneur Einheimische zur Aufstellung einer Verteidigungstruppe einziehen."
 kmt.593.a:0 "Was zur Hölle?"
 KMT_create_1unit:0 "Erstelle 1 Einheit in [KMT_no_div_temp_port.GetName]\n"
 ## 02/11/2018 ##
 KMT_may_lead_to_war_with_FROM_tt:0 "§RMündet zu Krieg mit [From.GetName] führen!§!\n"
 KMT_no_negotiation:0 "§RWerden vor der totalen Niederlage einer der beiden Seiten keinen Frieden aushandeln können!§!\n"
 kmt.102.a:0 "Wir können uns einen Krieg mit ihnen nicht leisten."
 kmt_sov_ref_interv_tt:0 "Erstellen Sie ein Kriegsziel für fremde Länder mit Handelshäfen\n"
 kmt.160.t:0 "[From.GetName] Gibt Handelshäfen zurück"
 kmt.160.d:0 "[From.GetName] hat den Bedingungen zugestimmt und alle Handelshäfen aufgegeben, die sich zuvor in seinem Besitz befanden."
 kmt.160.a:0 "Das bestmögliche Ergebnis."
 kmt.161.t:0 "[From.GetName] Abgelehnt"
 kmt.161.d:0 "Trotz unserer Anwesenheit weigert sich [From.GetName] immer noch, die Handelshäfen aufzugeben. Das ist verächtlich!"
 kmt.161.a:0 "Ihre Apokalypse hat begonnen!"
 kmt.162.t:0 "[From.GetName] Abgelehnt"
 kmt.162.d:0 "Trotz der Anwesenheit von [From.From.GetAdjective] weigert sich [From.GetName] immer noch, uns den Handelshafen zurückzugeben. Das ist verächtlich!"
 kmt.162.a:0 "Wir werden sie begraben!"
 kmt.163.t:0 "[From.GetName] Decamps"
 kmt.163.d:0 "Unzufrieden mit unserer Untätigkeit beim Schutz ihrer Interessen hat [From.GetName] unsere Fraktion verlassen und versucht nun, die Häfen auf eigene Faust zurückzuerobern."
 kmt.163.a:0 "Unverschämte gelbe Männer! Ohne uns werden sie nichts erreichen!"
 KMT_transfer_all_from_owned_ports_states_tt2:0 "§RÜbertrage alle Handelshäfen in unserem Besitz nach [From.GetName]§!\n"
 KMT_transfer_all_from_owned_ports_states_tt:0 "§G[From.GetName] überträgt alle eigenen Handelshäfen an uns§!\n"
 KMT_transfer_all_fromfrom_owned_indochina_states_tt2:0 "§RÜbertrage alle Handelshäfen in unserem Besitz nach [From.From.GetName]§!\n"
 KMT_transfer_all_fromfrom_owned_steppe_states_tt2:0 "§RÜbertrage alle Handelshäfen im Besitz nach [From.From.GetName]§!\n"
 ## 07/11/2018 ##
 kmt.594.t:0 "[From.GetName] Sendeunterstützung"
 kmt.594.d:0 "Zur Unterstützung unseres aktuellen Bürgerkriegs hat [From.GetName] Männer und Ausrüstung geschickt, um uns zu helfen."
 kmt.594.a:0 "Großartig!"
 ## 08/11/2018 ##
 kmt.595.t:0 "[From.GetName]s Verrat"
 kmt.595.d:0 "[From.GetLeader] bietet in dieser Stunde der Not nicht nur keinerlei Hilfe an, sie haben sogar ihre Unabhängigkeit von uns erklärt!"
 kmt.595.a:0 "Unerhörter Verrat!"
 KMT_can_deal_with_them_later_tt:0 "§YWir können uns um sie kümmern, sobald der Bürgerkrieg vorbei ist.§!\n"
 kmt.596.t:0 "Kehre zur Herde zurück"
 kmt.596.d:0 "Nach unserer Unabhängigkeitserklärung von [From.GetName] gingen sie irgendwie als Sieger aus dem Bürgerkrieg hervor.\n\nJetzt fordern sie, dass wir wieder ihre Marionette werden."
 kmt.596.b:0 "[Root.GetLeader] Schützt!"
 kmt.596.a:0 "Ich schätze, wir haben keine andere Wahl"
 kmt.597.t:0 "[From.GetName] kehrt in die Herde zurück"
 kmt.597.d:0 "Da [From.GetName] unserem Druck nicht standhalten konnte, gab er schließlich unserer Forderung nach. [From.GetLeader] wurde zum Rücktritt gezwungen und wegen Hochverrats und Sezession verhaftet."
 kmt.597.a:0 "Sie sollten sich geehrt fühlen."
 kmt.598.t:0 "[From.GetName] lehnt ab"
 kmt.598.d:0 "[From.GetLeader] behauptet, sie würden lieber sterben, als wieder unser Untertan zu werden, und stellt entschieden klar, dass ihre Unabhängigkeit eine vollendete Tatsache sei und dies auch bleiben werde."
 kmt.598.a:0 "Auch ihre Niederlage ist eine vollendete Tatsache."
 ## 10/11/2018 ##
 kmt.599.t:0 "[From.GetName] erklärt den Krieg"
 kmt.599.d:0 "[From.GetName] haben endlich ihre kriegstreiberische Natur offenbart. Ihre Kriegsmaschinen nähern sich nun unseren Territorien und zielen darauf ab, alles Leben von [Root.GetName] zu unterwerfen!"
 kmt.599.a:0 "[Root.GetName] werden niemals Sklaven sein!"
 kmt.600.t:0 "[From.GetName] Anforderungen [605.GetName]"
 kmt.600.d:0 "Als Reaktion auf die eindringenden Feinde hat [From.GetLeader] die Verlegung der Hauptstadt nach [605.GetName] angeordnet. Dies erfordert jedoch, dass wir ihnen die gesamte Verwaltung der Region übergeben."
 kmt.600.a:0 "Zum Wohle des [From.GetAdjective]-Volkes."
 kmt.600.b:0 "Niemals!"
 kmt.601.t:0 "[From.GetAdjective] Verrat"
 kmt.601.d:0 "Trotz unserer jüngsten Manöver hat [From.GetLeader] beschlossen, die [Root.GetAdjective]-Nation zu verraten."
 kmt.601.a:0 "Jetzt zeigen sie ihr wahres Gesicht."
 ## 14/11/2018 ##
 kmt.251.t:0 "[From.GetName] stimmt zu"
 kmt.251.d:0 "Nach einer langen Debatte in ihrem Parlament haben [From.GetLeader] und die [From.GetRulingParty] schließlich beschlossen, in unseren aktuellen Konflikt mit [JAP.GetNameDef] einzugreifen."
 kmt.251.a:0 "Großartig!"
 ## 8/10/2019 ##
 kmt.603.t:0 "Der neue Fokus von [From.GetName]"
 kmt.603.d:0 "Aufgrund der jüngsten Unruhen in Japan hat [From.GetLeader] entschieden, dass die externe Bedrohung für China nicht mehr besteht und das Land nun mehr Ressourcen für die Aufrechterhaltung der inneren Stabilität einsetzen wird. Das heißt, unsere Existenz könnte in Gefahr sein, wir müssen uns auf das Kommende vorbereiten."
 kmt.603.a:0 "Dies könnte unser letzter Kampf sein."
 ## 03/02/2020 ##
 kmt.604.t:0 "Siegreich in Scharmützeln"
 kmt.604.d:0 "Unsere jüngsten Scharmützel mit [From.GetAdjective]-Streitkräften führten zum Sieg."
 kmt.604.a:0 "Herrlich"
 kmt.605.t:0 "In Scharmützeln besiegt"
 kmt.605.d:0 "Unsere jüngsten Scharmützel mit [From.GetAdjective]-Streitkräften haben zu unserer Niederlage geführt."
 kmt.605.a:0 "Das dürfen wir nicht zulassen!"
 kmt.606.t:0 "Unvollendete Scharmützel"
 kmt.606.d:0 "Bei den jüngsten Gefechten mit [From.GetAdjective]-Streitkräften konnten Soldaten beider Seiten keine großen Erfolge erzielen. Beide Seiten beschlossen, sich vorerst zurückzuziehen."
 kmt.606.a:0 "Eine vorübergehende Atempause."
 KMT_next_offensive_expected:0 "Die Zentralregierung erwartet unsere nächste Offensive bald."
 ## 26/02/2020 ##
 kmt.607.t:0 "Soong Tse-ven aus dem Amt entlassen"
 kmt.607.d:0 "Bei einem gestern von Fu Ssu-nien organisierten Treffen, an dem hochrangige Beamte teilnahmen, darunter auch Soong Tse-ven, legte Fu eine Fülle von Beweisen für Soong Tse-vens Korruption vor. Während Fu wütend Soongs Vergehen aufzählte, schwieg Soong, wirkte aber sichtlich verärgert. Noch bevor Fu seinen Vortrag beendet hatte, stand Soong auf und verließ umgehend den Veranstaltungsort. Fus heftige Anschuldigungen blieben unbeantwortet. Die Nachricht von Soong Tse-vens Amtsenthebung machte heute Schlagzeilen."
 kmt.607.a:0 "Einen „Königsherren“ zu Fall zu bringen, ist keine leichte Aufgabe."
 kmt.608.t:0 "Rücktritt von Kung Hsiang-hsi"
 kmt.608.d:0 "Gerade als Kung Hsiang-hsi seinen Bericht über ein kürzlich abgehaltenes Treffen zu Ende gelesen hatte, begann Fu Ssu-nien, Kung Hsiang-hsi wegen seines verdächtig hohen persönlichen Vermögens anzugreifen, bevor er Beweise für Kungs Veruntreuung vorlegte. Kung versuchte schockiert Vergeltung, war jedoch Fus scharfer Rhetorik und der Glaubwürdigkeit der Beweise nicht gewachsen.\n\nNachdem Kung seine Niederlage erkannt hatte, kündigte er seinen Rücktritt als Zentralbankchef aufgrund seiner Verfehlungen an, bevor sich der Fokus des Treffens anderen Themen zuwandte."
 kmt.609.t:0 "Korruption ist jetzt beherrschbar"
 kmt.609.d:0 "Unsere jahrelange Kampagne gegen Korruption hat endlich Früchte getragen. Das Ausmaß der Korruption ist auf ein beherrschbares Maß gesunken."
 kmt.609.a:0 "Ausgezeichnet!"
 ## 27/02/2020 ##
 kmt.610.t:0 "Garnison in Shanghai"
 kmt.610.d:0 "Unsere Garnison in Shanghai hat sich nun unserem Krieg angeschlossen"
 kmt.610.a:0 "Tenno Heika Banzai!"
 kmt.611.t:0 "Feindliche Garnison in Shanghai"
 kmt.611.d:0 "Die Garnison unseres Feindes in Shanghai hat begonnen, unsere dort stationierten Truppen anzugreifen!"
 kmt.611.a:0 "Verdammt!"
 ## 18/08/2020 ##
 kmt.612.t:0 "[From.From.GetName] schließt sich unserem Krieg an"
 kmt.612.d:0 "[From.From.GetName] hat beschlossen, seine Streitkräfte zu mobilisieren, um uns in unserem aktuellen Krieg gegen [From.GetName] zu unterstützen."
 kmt.612.a:0 "Exzellent"
 kmt.613.t:0 "[From.GetName] mobilisiert gegen uns"
 kmt.613.d:0 "[From.GetName] hat beschlossen, seine Streitkräfte zu mobilisieren, um der Zentralregierung gegen uns zu helfen."
 kmt.613.a:0 "Weitere Schädlinge müssen ausgerottet werden"
 
 
 
 
 
 ## sunfall ##
 sfl.1.t:0 "Naisen!"
 sfl.1.d:0 "Die Empörung in der Öffentlichkeit und unter einigen Beamten hat einen Höhepunkt erreicht, ein Bürgerkrieg scheint unvermeidlich! Schlimmer noch: Die Zivilisten in Taiwan und Korea haben sich erhoben, alle unsere lokalen Beamten getötet und sind unter chinesische Herrschaft zurückgekehrt!"
 sfl.1.a:0 "Beschütze Kaiser Hirohito um jeden Preis!"
 sfl.3.t:0 "Die auserwählte Halbinsel"
 sfl.3.d:0 "Die Auserwählte Halbinsel, ursprünglich die Heimat der Auserwählten Dynastie, war seit 1910 in japanischer Hand. Vielleicht ist es für uns an der Zeit, ihnen die lang ersehnte Unabhängigkeit zu gewähren."
 sfl.3.a:0 "Sie sollen eine freie Nation werden!"
 ## 11/7/2016 ##
 sfl.4.t:0 "Japan gibt Territorium zurück"
 sfl.4.d:0 "Nach dem erfolgreichen Putsch der Demokraten in Japan möchte die neue Regierung ihre Beziehungen zu uns verbessern, indem sie die von der ehemaligen faschistischen Regierung besetzten Gebiete zurückgibt."
 sfl.4.a:0 "Dieses Land gehört rechtmäßig uns!"
 sfl.5.t:0 "Japans Freundschaftsbekundung"
 sfl.5.d:0 "Nach dem erfolgreichen Putsch der Demokraten in Japan möchte die neue Regierung ihre Beziehungen zu uns verbessern, indem sie Ansprüche auf umstrittene Gebiete zwischen unseren beiden Nationen aufgibt."
 sfl.5.a:0 "Sie sind klug, diese Ländereien aufzugeben."
 sfl.6.t:0 "Inseln in der Bismarcksee"
 sfl.6.d:0 "Nach dem erfolgreichen Putsch der Demokraten in Japan möchte die neue Regierung ihre Beziehungen zu uns verbessern, indem sie uns Inseln gibt, die im Ersten Weltkrieg dem Deutschen Reich abgenommen wurden."
 sfl.6.a:0 "Wir nehmen diese Freundschaftsbekundung an"
 sfl_aftermath_chi_tt:0 "[Root.GetName] übernimmt die Kontrolle über chinesische Staaten im Besitz von [JAP.GetName]"
 sfl.7.t:0 "Korea befreit"
 sfl.7.d:0 "Die Auserwählte Halbinsel ist in ausländische Hände gefallen und sie haben das koreanische Volk befreit."
 sfl.7.a:0 "Das ist Wahnsinn!"
 sfl.7.b:0 "Wir haben keine Zeit für diese koreanische Plage!"
 sfl.8.t:0 "Chinesische Gebiete"
 sfl.8.d:0 "Mit dem Ende des faschistischen Regimes sollten auch die von ihm begangenen Übeltaten beseitigt werden. Die Besetzung der Mandschurei ist eine davon. Sollen wir sie dem chinesischen Volk zurückgeben?"
 sfl.8.a:0 "[CHI.GetName] soll jenes Land übernehmen"
 sfl.8.b:0 "Wir müssen der kommunistischen Welt gefallen, sonst gehen wir unter der sowjetischen Macht zugrunde."
 sfl.8.c:0 "Dies ist nicht unsere Priorität"
 sfl.9.t:0 "Umstrittene Gebiete mit [SOV.GetName]"
 sfl.9.d:0 "Die umstrittenen Gebiete um die Insel Sachalin sind eine großartige Gelegenheit, den roten Riesen über uns zufriedenzustellen und für unsere Sicherheit zu sorgen."
 sfl.9.a:0 "Wir dürfen nicht unsere eigene Zerstörung herbeiführen!"
 sfl.9.b:0 "Unsinn, die kommunistische Welt wird niemals über die Welt der Freiheit triumphieren!"
 sfl.10.t:0 "Inseln im Pazifik"
 sfl.10.d:0 "[USA.GetName] ist ein großartiger Verbündeter, da wir die Ideologie teilen, dass wir ihnen mit den Inseln, die wir dem Deutschen Reich im Ersten Weltkrieg abgenommen haben, eine Freude machen sollten. Daher können wir auf eine sehr starke Unterstützung zählen."
 sfl.10.a:0 "Ein großartiger Verbündeter ist unbezahlbar"
 sfl.10.b:0 "Wir kommen alleine klar!"
 sfl.11.t:0 "Japan weigerte sich, die Mandschurei an uns zurückzugeben"
 sfl.11.d_prc:0 "[JAP.GetName] hat beschlossen, die besetzten chinesischen Gebiete an [CHI.GetName] zurückzugeben. Das ist eine Demütigung für unsere Regierung!"
 sfl.11.d_chi:0 "[JAP.GetName] hat beschlossen, die besetzten chinesischen Gebiete an [PRC.GetName] zurückzugeben. Das ist eine Demütigung für unsere Regierung!"
 sfl.11.a:0 "Wir werden diese Demütigung nicht dulden!" 
 sfl.12.t:0 "Mandschurei-Problem ignoriert"
 sfl.12.d:0 "Die japanische Regierung in [JAP.GetName] hat angekündigt, dass die Debatte über die Mandschurei-Frage auf unbestimmte Zeit verschoben wurde. Sie will dieses Land offensichtlich nicht zurückgeben!"
 sfl.12.a:0 "Wenn dies toleriert werden kann, was kann dann nicht toleriert werden?" #是可忍,孰不可忍!
 sfl.13.t:0 "Korea"
 sfl.13.d:0 "Sollten wir die Koreaner befreien und sie in Ruhe lassen?"
 sfl.13.a:0 "Definitiv"
 sfl.13.b:0 "Was für ein Witz"
 ## 26/8/2016 ##
 sfl.14.t:0 "Streben Sie Frieden mit der Achse"
 sfl.14.d:0 "Da Japan nun nicht mehr mit uns im Krieg ist, gibt es auch keine Gründe mehr, warum andere Achsenmächte gegen uns Krieg führen. Vielleicht sollten wir Frieden mit ihnen suchen, anstatt weiter zu kämpfen."
 sfl.14.a:0 "Wir werden sie kontaktieren, um Frieden zu stiften."
 sfl.14.b:0 "Wir können in diesem Krieg einige Gewinne erzielen ..."
 sfl.15.t:0 "[From.GetName] Rufe nach Frieden"
 sfl.15.d:0 "Die Regierung von [From.GetName] hat [Root.GetLeader] zu Friedensgesprächen eingeladen, da sie sich nicht mehr im Krieg mit Japan befindet und der Meinung ist, dass wir keinen Grund mehr haben, den Krieg zwischen uns fortzusetzen."
 sfl.15.a:0 "Sie haben Recht, der Krieg zwischen uns wird enden."
 sfl.15.b:0 "Wir kämpfen für unsere eigenen Interessen!"
 sfl.16.t:0 "[From.GetName] Vereinbaren Sie Frieden zwischen uns"
 sfl.16.d:0 "[From.GetLeader] hat entschieden, dass es keinen Grund mehr gibt, mit uns zu kämpfen, und hat daher einen weißen Frieden zwischen unseren Nationen unterzeichnet."
 sfl.16.a:0 "Ihnen gebührt unser aufrichtiger Dank."
 sfl.17.t:0 "[From.GetName] Friedensgespräch abgelehnt"
 sfl.17.d:0 "[From.GetLeader] erklärte, dass sie nicht nur als Zeichen der Allianz mit Japan gegen unser Land in den Krieg ziehen, sondern aus eigenem Interesse!"
 sfl.17.a:0 "Verdammter imperialistischer Schweinehund!"
 ## 24/9/2016 ##
 kmt_kor_north_liberated:0 "5 Einheiten erheben sich in Pjöngjang"
 kmt_kor_south_liberated:0 "5 Wohneinheiten entstehen in Seoul"
 ## 10/10/2016 ##
 sfl.18.t:0 "Verzweifelte Situation"
 sfl.18.d:0 "Mit der Befreiung Koreas, unserem Scheitern bei der Eroberung Chinas und dem andauernden Bürgerkrieg sind unsere Kräfte am Ende. Kaiser und Militär haben beschlossen, die Kontinentalpolitik aufzugeben und sich stattdessen auf den Bürgerkrieg zu konzentrieren. Obwohl diese Entscheidung schwerfällt, ist sie angesichts der aktuellen Lage möglicherweise die beste."
 sfl.18.a:0 "Ja, der Kaiser hat recht."
 sfl.18.b:0 "So ein Unsinn!"
 sfl.19.t:0 "Japan strebt nach Frieden"
 sfl.19.d:0 "Japans gescheiterter Krieg hat das Land zu der Entscheidung veranlasst, seine Kontinentalpolitik aufzugeben. Das bedeutet, dass es chinesische Gebiete aufgibt, um seine Kräfte auf den andauernden Bürgerkrieg zu konzentrieren.\n\nWie sollten wir reagieren?"
 sfl.19.a:0 "Sie sind auf jeden Fall erledigt, Sie müssen keine Zeit damit verschwenden."
 sfl.19.b:0 "Ein vorübergehender Waffenstillstand ..."
 sfl.19.c:0 "Keine Ruhe für imperialistische Hunde!"
 sfl_jap_forfeit_land:0 "[Root.GetName] übernimmt chinesische Ländereien, die Japan gehören\n"
 sfl_later_war_with_jap:0 "Sie können sich nach einem Monat entscheiden, gegen Japan in den Krieg zu ziehen. §RGeachtet ihrer Ideologie.§!"
 sfl.20.t:0 "Frieden mit [CHI.GetName]"
 sfl.20.d:0 "[CHI.GetName] hat einem Frieden zwischen uns zugestimmt."
 sfl.20.a:0 "Wir können uns jetzt auf den Bürgerkrieg konzentrieren."
 sfl.22.t:0 "Kein Frieden mit [CHI.GetName]"
 sfl.22.d:0 "[CHI.GetName] lehnt einen Frieden zwischen uns ab."
 sfl.22.a:0 "Ist das unser Schicksal?"
 sfl.23.t:0 "Krieg mit Japan?"
 sfl.23.d:0 "Es ist Zeit zu entscheiden, ob wir [JAP.GetName] den Krieg erklären oder nicht."
 sfl.23.a:0 "Das japanische Volk wird für seine Gräueltaten bezahlen!"
 sfl.23.b:0 "Es gibt bereits zu viel Blutvergießen."
 sfl.24.t:0 "[CHI.GetName] Erkläre uns den Krieg!"
 sfl.24.d:0 "Die Chinesen haben ihren Waffenstillstand aufgekündigt und uns den Krieg erklärt!"
 sfl.24.a:0 "Hinterhältiger Abschaum!"
 sfl_cant_peace_with_axis_later:0 "§RSie werden in Zukunft keinen separaten Frieden mit den Achsenmächten schließen können.§!\n"
 ## 19/10/2016 ##
 sfl.25.t:0 "Eigentum an Indochina"
 sfl.25.d:0 "Wie sollten wir in der Indochina-Frage vorgehen?"
 sfl.25.a:0 "[FRA.GetName] kann es zurückhaben."
 sfl.25.b:0 "[CHI.GetName] kann es haben."
 sfl.25.c:0 "Wir werden es behalten."
 sfl.26.t:0 "[From.GetName] Übergabe Indochina"
 sfl.26.d:0 "[From.GetName] hat beschlossen, Indochina unter unsere Herrschaft zu stellen."
 sfl.26.a:0 "Ein kluger Schachzug."
 sfl.27.t:0 "[From.GetName] Ignorieren Sie unseren Anspruch auf Indochina"
 sfl.27.d:0 "Trotz unseres berechtigten Anspruchs hat [From.GetName] beschlossen, Indochina nicht an uns abzutreten."
 sfl.27.a:0 "Dann werden wir es mit Gewalt nehmen."
 ## 24/10/2016 ##
 sfl.3.c:0 "In unserem Interesse soll eine Marionettenregierung eingesetzt werden."
 ## 13/4/2017 ##
 sfl.28.t:0 "Ryūkyū"
 sfl.28.d:0 "Die Japaner haben den Namen unserer Heimat in Okinawa geändert, nachdem sie unser Königreich vor langer Zeit annektiert hatten. Jetzt, da wir endlich frei sind, sollten wir unsere Städte wieder so umbenennen, wie sie vorher hießen."
 sfl.28.a:0 "Streichen Sie die japanischen Namen!"
 sfl.28.b:0 "Das wäre zu aufwendig..."
 ## 23/4/2017 ##
 sfl.3.b:0 "Wir überlassen sie den Japanern."
 ## 14/10/2017 ##
 sfl.29.t:0 "Heimatinseln gefährdet"
 sfl.29.d:0 "Unsere Feinde haben unsere Küstenverteidigung durchbrochen und einen Brückenkopf auf den Heimatinseln errichtet! Wir müssen unsere Nation bis zum letzten Mann verteidigen!"
 sfl.29.a:0 "Tennou heika banzai!!"
 
 
 ### news event ###
 kns.1.t:0 "Japanischer Bürgerkrieg"
 kns.1.d:0 "Mit dem Scheitern der Eroberung Chinas kam es zu Aufständen in der japanischen Bevölkerung. Dieser schwere Rückschlag für Japan gab den Demokraten die Chance, eine Revolution zum Sturz der faschistischen Regierung zu organisieren. Mit dem verlorenen Krieg und den Dissidenten im Volk ist Hirohitos Traum nun nur noch eine zerplatzte Seifenblase.\n\nEinige von Japans Verbündeten haben Japan ihrem Schicksal überlassen, da sie sich nicht mehr auf sie verlassen können."
 kns.1.a:0 "Das ist eine totale Niederlage für die faschistischen Bastarde!"
 kns.1.b:0 "Interessante Entwicklung."
 kns.1.c:0 "Unser Verbündeter ist gefallen, wir können uns jetzt nicht mehr auf ihn verlassen."
 kns.2.t:0 "Ende des japanischen Bürgerkriegs"
 kns.2.d_f:0 "Trotz zahlreicher Guerillakämpfe und der Unterstützung der Bevölkerung wurden die demokratischen Anhänger im japanischen Bürgerkrieg besiegt. Alle Verdächtigen wurden festgenommen oder hingerichtet. Um die Lage zu stabilisieren, hielt Kaiser Hirohito eine Rede an die japanische Öffentlichkeit und erklärte, Krieg sei ihr einziges Schicksal. Die Reaktion der Menge ließ jedoch etwas anderes vermuten."
 kns.2.d_d:0 "Nach stundenlangem Angriff auf den Kaiserbunker kapitulierte das faschistische Regime vor den demokratischen Anhängern. Nach dem Sieg im Bürgerkrieg versucht das demokratische Kabinett nun, die Wunden zu heilen, die das ehemalige faschistische Regime geschlagen hat. „Wir hoffen nicht auf Vergebung, aber wir werden trotzdem unseren Teil dazu beitragen“, sagte ein japanischer demokratischer Revolutionär."
 kns.2.a:0 "Hoffentlich wissen die Japaner, was sie tun …"
 kns.3.t:0 "Der Fall von [608.GetName]"
 kns.3.d:0 "Nach einem gescheiterten Angriff auf das japanische Fronthauptquartier erlitten die Chinesen enorme Verluste. Um weitere Verluste zu verhindern, befahl der chinesische Kommandant den Truppen den Rückzug aus [608.GetName]. Die japanische Armee marschierte später mit minimalem Widerstand in die Stadt ein.\n\nBerichten zufolge wurden aus dem Verbotenen Palast einige Artefakte von den Japanern entfernt. Glücklicherweise wurde der Großteil bereits 1933 nach Süden evakuiert. Die Japaner konnten lediglich einige große Bronzewannen und einige Kanonenteile mitnehmen."
 ## 10/10/2016 ##
 kns.5.t:0 "[CHI.GetName] Waffenstillstand mit [JAP.GetName] brechen"
 kns.5.d:0 "[CHI.GetName] hat den Waffenstillstand mit [JAP.GetName] gebrochen und ihnen den Krieg erklärt. Dadurch geraten beide Nationen erneut in einen Krieg, doch diesmal geht [CHI.GetName] in die Offensive. Diese hinterhältige Tat von [CHI.GetName] hat weltweit für Besorgnis gesorgt."
 kns.5.a:0 "Tod den imperialistischen Hunden!"
 kns.5.b:0 "Ihre Kriegstreiberei wird die Welt in ein neues dunkles Zeitalter stürzen!"
 ## 13/11/2016 ##
 kns.6.t:0 "Der [From.GetFactionName]"
 kns.6.d:0 "Die asiatische Politik wurde heute auf den Kopf gestellt, als chinesische und japanische Diplomaten einen Militärpakt zwischen [CHI.GetName] und [JAP.GetName] bekannt gaben. Sie erklärten, dass zu viel Blut vergossen worden sei, während andere Mächte ihre Vernichtung anstreben.\n\n[JAP.GetName] forderte alle dazu auf, darüber nachzudenken, was es bedeutet, dass die alten Feinde, anstatt sich gegenseitig zu schwächen, gemeinsam noch stärker werden."
 kns.6.a:0 "Nichts kann [From.GetFactionName] bedrohen!"
 kns.6.b:0 "Ein unerwarteter Umbruch in der asiatischen Diplomatie."
 kns.7.t:0 "[CHI.GetName] tritt [From.GetFactionName] bei!"
 kns.7.d:0 "Chinesische und deutsche Diplomaten haben vor Kurzem in [GER.Capital.GetName] gemeinsam einen Militärpakt unterzeichnet, der die Bindung zwischen den beiden Nationen stärkt.\n\nManche vermuten, dass das Ziel dieser Allianz darin besteht, [SOV.GetName] in die Zange zu nehmen, doch Beamte von [CHI.GetName] und [GER.GetName] haben dies weder bestätigt noch dementiert."
 kns.7.c:0 "Eine Großmacht entsteht."
 kns.8.t:0 "[GER.GetName] lehnt chinesische Allianz ab!"
 kns.8.d:0 "[From.GetLeader] wies die diplomatischen Annäherungsversuche von [CHI.GetAdjective] zurück und gab öffentlich bekannt, dass [From.GetName] keinen Militärpakt mit [CHI.GetName] anstreben würde."
 kns.8.b:0 "Und doch habe ich alein..."
 ## 11/10/2017 ##
 kns.10.d_no_submit:0 "Obwohl [CHI.GetName] sich bereit erklärt, den [JAP.GetAdjective] weitere Zugeständnisse zu machen, weigern sich einige lokale Kriegsherren in Nordchina, ihre Gebiete aufzugeben. Einige befürchten, dass dies zu militärischen Aktionen der [JAP.GetAdjective]-Regierung führen könnte."
 ## 19/10/2017 ##
 kns.11.t:0 "Der Fall von [794.GetName]"
 kns.11.d:0 "[794.GetName], das Paris des Orients, ist nach langwierigen Kämpfen zwischen den verteidigenden chinesischen Truppen und der japanischen Marine endgültig in japanische Hände gefallen. Die Japaner setzten zudem See- und Luftangriffe ein, die den chinesischen Verteidigern enorme Verluste zufügten und die Metropole verwüsteten.\n\nEin kleines Bataillon chinesischer Truppen kämpfte noch im Sihang-Lagerhaus, bevor es sich in die neutrale internationale Siedlung auf der anderen Seite des Suzhou-Flusses zurückzog."
 
 ### jap events ###
 jap.1.t:0 "Kodoha hat einen Militärputsch gestartet!"
 jap.1.d:0 "Intensive politische Rivalitäten haben landesweit eine Reihe von Attentaten auf Politiker ausgelöst. Kodoha, der Drahtzieher dieser Taten, will seinen Rivalen Toseiha vernichten, da er glaubt, dessen parlamentarisches Vorgehen sei lediglich eine Belastung für die Herrschaft des Kaisers. Nun hat der Kaiser den Vorfall bekannt gegeben und in einer öffentlichen Rede erklärt:"
 jap.1.a:0 "...Kodohas gewalttätige Praxis muss sofort aufhören!"
 jap.1.b:0 "...die Bürger werden ermutigt, die Kodoha bei der Rückgabe der Macht an den Kaiser zu unterstützen."
 jap.2.t:0 "Taisei Yokusankai"
 jap.2.d:0 "Taisei Yokusankai, eine Organisation zur Unterstützung der Herrschaft des Kaisers, wurde gegründet."
 jap.2.a:0 "Nihon Banzai!"
 
 ### jyutgwai events ###
 jyutgwai.1.t:0 "Tod von Hu Hanmin"
 jyutgwai.1.d:0 "Hu Hanmin, einer der ersten konservativen Fraktionsführer der Kuomintang während der chinesischen Revolution, ist leider verstorben. Seine Beerdigung soll fünf Tage später stattfinden. Es wird erwartet, dass viele wichtige Persönlichkeiten zur Beerdigung erscheinen, darunter auch Chiang."
 jyutgwai.1.a:0 "Seine Taten werden nicht vergessen werden."
 jyutgwai.2.t:0 "Hu Hanmins Beerdigung"
 jyutgwai.2.d:0 "Nach Hu Hanmins Tod wird seine Beerdigung einige Tage später stattfinden. Chiang hat geplant, sich dort mit [YUT.GetLeader] zu treffen und ihn um Hilfe bei der Zerschlagung der Neuen Kwangsi-Clique zu bitten, zusammen mit seinem politischen Rivalen Li Tsung-jen."
 jyutgwai.2.a:0 "Ein solider Plan."
 jyutgwai.2.b:0 "Ein solcher Ansatz ist nicht erforderlich, unsere Armee erledigt die Arbeit."
 jyutgwai.2.c:0 "Ein solcher Vorschlag liegt nicht im Interesse von [Root.GetRulingParty]."
 jyutgwai.3.t:0 "Chiangs Vorschlag"
 jyutgwai.3.d:0 "Nach einem Treffen mit [CHI.GetLeader] während Hu Hanmins Beerdigung erhielt [Root.GetLeader] einen Vorschlag – oder, wie manche es nennen würden, ein Ultimatum – von ihm. Darin geht es darum, uns bei der Zerschlagung von [GXC.GetLeader]s Clique zu unterstützen. [Root.GetLeader] befürchtet, dass seine Clique bald dasselbe Schicksal erleiden würde, wenn die Neue Kwangsi-Clique zerschlagen würde."
 jyutgwai.3.a:0 "Kontaktieren Sie [GXC.GetLeader] für eine geschlossene Front!"
 jyutgwai.3.b:0 "Wir werden Nanking einnehmen und das Regime von [CHI.GetLeader] stürzen!"
 jyutgwai.3.c:0 "Senden Sie es, bevor es zu spät ist!"
 jyutgwai.4.t:0 "Vorschlag von [YUT.GetLeader]"
 jyutgwai.4.d:0 "[YUT.GetLeader] hat [CHI.GetLeader]s Plan enthüllt, unsere Clique zu zerstören. Da sie jedoch befürchten, dass ihnen bald unser Schicksal widerfahren könnte, wenn wir zerstört würden, streben sie nun ein Bündnis mit uns an, anstatt der [CHI.GetRulingParty] zu helfen."
 jyutgwai.4.a:0 "Wir werden uns gemeinsam gegen eine solche Tyrannei stellen."
 jyutgwai.4.b:0 "Sie werden uns nur auf den Arm nehmen."
 jyutgwai.5.t:0 "Allianz akzeptiert"
 jyutgwai.5.d:0 "[GXC.GetLeader] hat unseren Bündnisvorschlag angenommen und bereitet jetzt seine Truppen vor!"
 jyutgwai.5.a:0 "Tod für [CHI.GetLeader]!"
 jyutgwai.6.t:0 "Allianz abgelehnt"
 jyutgwai.6.d:0 "[GXC.GetLeader] hat unseren Allianzvorschlag abgelehnt!"
 jyutgwai.6.a:0 "Wie konnten sie nur!"
 jyutgwai.7.t:0 "[YUT.GetName] weigert sich zu senden"
 jyutgwai.7.d:0 "[YUT.GetLeader] hat sich geweigert, uns bei der Zerstörung der Clique von [GXC.GetLeader] zu helfen!"
 jyutgwai.8.t:0 "Yu Han-mou"
 jyutgwai.8.a:0 "Helfen Sie Chen Chi-teng bei der Flucht nach Hongkong!"
 jyutgwai.8.b:0 "Überzeugen Sie Chen Chi-teng, der New Kwangsi Clique beizutreten!"
 jyutgwai.9.t:0 "Die neue Kwangsi-Clique"
 jyutgwai.9.d:0 "Da Chen Chi-teng und sein rebellisches Verhalten aus dem Weg sind, stehen uns nur noch [GXC.GetLeader] und seine Männer gegenüber."
 jyutgwai.9.a:0 "Versuchen Sie zunächst, [GXC.GetName] zu bestechen."
 jyutgwai.9.b:0 "Unser Fokus sollte auf den Japanern liegen."
 jyutgwai.10.t:0 "Notfallrekrutierung"
 jyutgwai.10.d:0 "Die [CHI.GetRulingParty] hat einige Maßnahmen ergriffen. Ihre Bestechung hat zu Zwietracht in der Kwangtung-Clique geführt. Wir sollten unsere Männer auf den Fall eines Kriegsausbruchs vorbereiten!"
 jyutgwai.11.t:0 "Druck durch die Massenmedien"
 jyutgwai.11.d:0 "Angesichts der anhaltenden Spannungen zwischen uns und [GXC.GetLeader] unterstützt die Mehrheit der Medien [GXC.GetLeader] statt uns. Dies liegt hauptsächlich an unserer aktuellen Politik, der inneren Stabilität Vorrang vor der japanischen Bedrohung zu geben."
 jyutgwai.11.a:0 "Wir müssen zuerst die Herzkrankheit loswerden!"
 jyutgwai.11.b:0 "Wenn wir so weitermachen, verlieren wir möglicherweise noch mehr Unterstützung in der Öffentlichkeit."
 jyutgwai.12.t:0 "Vorfall behoben"
 jyutgwai.12.d:0 "Nach längeren Diskussionen der Vertreter beider Seiten wurde ein Konsens erzielt. Der sogenannte „Liangguang-Vorfall“ ist inzwischen gelöst."
 jyutgwai.12.a:0 "Dies dient dem Wohl des chinesischen Volkes."
 jyutgwai.15.t:0 "Chen Chi-teng hat eingereicht"
 jyutgwai.15.d:0 "Chen Chi-teng hat beschlossen, sich der Zentralregierung zu unterwerfen."
 jyutgwai.15.a:0 "Eine weise Entscheidung."
 jyutgwai.8.c:0 "Dieser verräterische Bastard!"
 ## 5/2/2017 ##
 KMT_may_war:0 "§RDas wird sehr wahrscheinlich zu einem Krieg führen§!\n"
 GXC_reject_1_tt:0 "„Wir werden das Kwangtung-Gebiet übernehmen, wenn sie diesen Gegenvorschlag annehmen.“"
 CHI_reject_1_tt:0 "„Wenn sie diesen Gegenvorschlag annehmen, werden sie zu unserer Marionette.“"
 jyutgwai.10.a:0 "Wir müssen Vertreter nach Nanking schicken, um eine friedlichere Lösung zu finden."
 jyutgwai.10.b:0 "Jaak3 si2 laa1, zoeng2 gaai3 sek6"
 jyutgwai.13.t:0 "[From.GetName] sendet Vertreter"
 jyutgwai.13.d:0 "Einige Vertreter von [From.GetName] sind in [Root.Capital.GetName] eingetroffen. Sie erklärten, dass ihre Mission darin besteht, eine friedlichere Lösung für die aktuelle Situation zu finden."
 jyutgwai.13.a:0 "Mal sehen, was sie zu bieten haben."
 jyutgwai.13.b:0 "Verhaften Sie diese Mitverschwörer!"
 jyutgwai.14.t:0 "Feindseligkeit von [From.GetLeader]"
 jyutgwai.14.d:0 "[From.GetLeader] hat beschlossen, die aktuelle Situation mit Gewalt zu lösen."
 jyutgwai.14.a:0 "Also gut."
 jyutgwai.16.t:0 "Gelegenheit?"
 jyutgwai.16.d:0 "Während des anhaltenden Krieges zwischen [CHI.GetLeader]s [CHI.GetRulingParty] und [GXC.GetLeader]s [GXC.GetRulingParty] schenkt uns die Zentralregierung keine Beachtung. Wir könnten diese Gelegenheit nutzen, um eine Offensive zu starten und zu versuchen, ihre Herrschaft in [CHI.Capital.GetName] zu stürzen."
 jyutgwai.16.a:0 "Nächster Halt, [CHI.Capital.GetName]!"
 jyutgwai.16.b:0 "Wo ist nochmal mein Oolong?"
 jyutgwai.17.t:0 "[From.GetLeader] Verhandlungsvereinbarung"
 jyutgwai.17.d:0 "Nach reiflicher Überlegung hat [From.GetLeader] zugestimmt, ein Treffen mit beiden und ihren Vertretern abzuhalten, um eine friedlichere Lösung zur Beilegung der aktuellen Situation zu besprechen."
 jyutgwai.17.a:0 "Wir müssen auf alles vorbereitet sein."
 negotiate_in_20:0 "§YEin Ereignis wird in etwa 35 Tagen ausgelöst.§!\n\n"
 jyutgwai.18.t:0 "Abgeordnete festgenommen"
 jyutgwai.18.d:0 "Unsere Vertreter, die zu Verhandlungen mit der [CHI.GetRulingParty] geschickt wurden, wurden festgenommen. Es scheint, als wolle [CHI.GetLeader] dies auf dem Schlachtfeld lösen."
 jyutgwai.18.a:0 "Gut, unsere Männer werden bis zum letzten Atemzug kämpfen!"
 jyutgwai.19.t:0 "[From.GetName] startet Offensive"
 jyutgwai.19.d:0 "Da [From.GetLeader] glaubt, dass wir von unserem aktuellen Konflikt mit [GXC.GetLeader]s [GXC.GetRulingParty] abgelenkt sind, hat er beschlossen, uns anzugreifen!"
 jyutgwai.19.a:0 "Verräter!"
 jyutgwai.20.t:0 "Forderungen von beiden Seiten"
 jyutgwai.20.d:0 "Nach längeren Debatten haben Vertreter beider Seiten einen Konsens erzielt.\n\nDas Ergebnis ihrer Diskussion lautet wie folgt:\n\n[CHI.GetName] und [GXC.GetName] werden ihre Truppen abziehen.\nDie Zentralregierung wird in den Angelegenheiten von Liangguang nicht vermitteln.\n[GXC.GetName] sollte den Befehlen der Zentralregierung unbedingt Folge leisten, sobald der Krieg ausbricht.\n\nAllerdings müssen [CHI.GetLeader] und [GXC.GetLeader] diesen Bedingungen zustimmen, damit sie in Kraft treten."
 jyutgwai.20.a:0 "Akzeptabel"
 jyutgwai.20.b:0 "Demütigend!"
 jyutgwai.22.t:0 "Gegenvorschlag von [CHI.GetName]"
 jyutgwai.22.d:0 "Da er die Bedingungen als ungleich und erniedrigend ansieht, hat [CHI.GetLeader] einen Gegenvorschlag in Auftrag gegeben, der verlangt, dass unsere Clique unter seine direkte Kontrolle gestellt wird."
 jyutgwai.22.a:0 "Bringen Sie es einfach hinter sich."
 jyutgwai.22.b:0 "Fang shen me gou pi!"
 jyutgwai.23.t:0 "Gegenvorschlag von [GXC.GetName]"
 jyutgwai.23.d:0 "Da [GXC.GetLeader] die Bedingungen als ungleich und erniedrigend ansieht, hat er einen Gegenvorschlag in Auftrag gegeben, der als Entschädigung die direkte Kontrolle des Liangguang-Gebiets fordert."
 jyutgwai.24.t:0 "Gegenvorschlag abgelehnt"
 jyutgwai.24.d:0 "Unser Gegenvorschlag wurde abgelehnt, es scheint nur noch ein Weg zu geben."
 jyutgwai.24.a:0 "Machen Sie sich bereit!"
 jyutgwai.25.t:0 "Gegenvorschlag angenommen"
 jyutgwai.25.d:0 "Zu unserer Überraschung wurde unser Gegenvorschlag angenommen."
 jyutgwai.25.a:0 "Wenigstens müssen wir nicht in den Krieg ziehen."
 jyutgwai.26.t:0 "Verhandlung fehlgeschlagen"
 jyutgwai.26.d:0 "Beide Seiten haben die Bedingungen abgelehnt. Weitere Verhandlungen scheinen nahezu unmöglich, beide Seiten haben mit der Mobilisierung von Truppen für einen Krieg begonnen."
 jyutgwai.26.a:0 "Wir wussten es!"
 jyutgwai.27.t:0 "Problem gelöst"
 jyutgwai.27.d:0 "Beide Seiten haben ihre Truppen abgezogen, die Spannungen haben sich inzwischen entspannt."
 jyutgwai.27.a:0 "Gut für alle."
 ## 20/3/2017 ##
 jyutgwai.15.b:0 "Wir werden bald die Kontrolle über die Zentralebene zurückgewinnen."
 ## 20/4/2017 ##
 jyutgwai.7.a:0 "Versuchen Sie, einige ihrer Männer zu bestechen."
 jyutgwai.7.b:0 "Wenn ich es mir recht überlege, sollten wir vielleicht damit aufhören."
 jyutgwai.29.t:0 "[From.GetRulingParty] hat beschlossen, uns in Ruhe zu lassen"
 jyutgwai.29.d:0 "Aus irgendeinem Grund haben die Beamten bei [From.GetRulingParty] beschlossen, uns gehen zu lassen und keine weiteren Maßnahmen gegen uns zu ergreifen."
 jyutgwai.29.a:0 "Äh... was? Meinen die das ernst?"
 jyutgwai.8.d:0 "Einige unserer Männer wurden von [From.GetLeader] bestochen und sind zum Feind übergelaufen. Die Zentralregierung hat Chen Chi-teng zudem von seinem Dienst entbunden. Nun hat Yu Han-mou, der sich für Chiang eingesetzt hatte, Chen Chi-tengs Position übernommen. Chen Chi-teng wird ein Ultimatum gestellt, seine Macht über die Armee aufzugeben und sich der Zentralregierung zu unterwerfen."
 jyutgwai.30.t:0 "Bestechungsversuch gescheitert"
 jyutgwai.30.d:0 "Trotz unserer Großzügigkeit scheinen die Generäle und Soldaten der [From.GetName] ihren Herrn nicht im Stich lassen zu wollen. Unser Bestechungsversuch ist gescheitert."
 jyutgwai.30.a:0 "Dann greifen Sie zur Gewalt."
 jyutgwai.31.t:0 "Bestechung akzeptiert"
 jyutgwai.31.d:0 "Unser Bestechungsgeld wurde von den meisten Generälen in [From.GetName] begrüßt und viele von ihnen sind auf unsere Seite übergelaufen."
 jyutgwai.31.a:0 "Das hat nur bewiesen, wie schwach sie sind."
 jyutgwai.32.t:0 "Unsere Männer widerstanden der Bestechung"
 jyutgwai.32.d:0 "Unsere Männer haben der Bestechung von [From.GetLeader] widerstanden. Wir sind jetzt vereinter als zuvor!"
 jyutgwai.32.a:0 "Die Gerechtigkeit soll siegen!"
 ## 21/4/2017 ##
 jyutgwai.33.t:0 "Liangguang-Vorfall"
 jyutgwai.33.d:0 "Während der Liangguang-Vorfall andauert, ist [CHI.GetLeader] nun damit beschäftigt, das Problem im Süden zu lösen. Dies ist eine Gelegenheit für uns zu handeln. Wir können zunächst Frieden mit den Kommunisten anstreben, um unsere Männer zu retten."
 jyutgwai.33.a:0 "Fordern Sie einen Waffenstillstand."
 jyutgwai.33.b:0 "Nein, der Kommunismus ist ein Ungeziefer für das chinesische Volk."
 jyutgwai.34.t:0 "[From.GetLeader] Will einen Waffenstillstand"
 jyutgwai.34.d:0 "[From.GetLeader] hat einen Vertreter geschickt, um einen Waffenstillstand zwischen unseren Truppen zu fordern. Da [CHI.GetLeader] im Süden beschäftigt ist, können wir diese Gelegenheit zur Erholung nutzen."
 jyutgwai.34.a:0 "Bußgeld"
 jyutgwai.34.b:0 "Es muss eine Falle sein!"
 jyutgwai.35.t:0 "[From.GetName] Einverstanden"
 jyutgwai.35.d:0 "[From.GetName] hat einem Waffenstillstand zugestimmt, jetzt können wir uns erholen und versuchen, unseren Plan umzusetzen."
 jyutgwai.35.a:0 "Genial!"
 jyutgwai.36.t:0 "[From.GetLeader] Abgelehnt"
 jyutgwai.36.d:0 "[From.GetName] hat das Waffenstillstandsabkommen abgelehnt, wir müssen weiterkämpfen."
 jyutgwai.36.a:0 "Das ist nicht gut."
 jyutgwai.37.t:0 "Chang Hsueh-liang stellt seine Angriffe ein"
 jyutgwai.37.d:0 "Wir haben herausgefunden, dass Chang Hsueh-liang seine Angriffe auf die Kommunisten eingestellt hat. Er glaubt wohl, wir seien jetzt mit den Kriegsherren im Süden beschäftigt und würden ihm keine Beachtung schenken, um einen seiner schändlichen Pläne in die Tat umzusetzen."
 jyutgwai.37.a:0 "Wir werden uns später darum kümmern ..."
 jyutgwai.38.t:0 "Dilemma"
 jyutgwai.38.d:0 "Da die Truppen von [CHI.GetLeader] auf unsere Grenze zugehen und der Vertreter von [GXC.GetLeader] [Root.GetLeader] überzeugt, befinden wir uns nun in einem Dilemma zwischen [CHI.GetRulingParty] und [GXC.GetRulingParty]. Sollten wir uns mit einem von ihnen verbünden, wird der andere sicherlich unzufrieden sein. Und die Situation verbietet unsere Neutralität."
 jyutgwai.38.a:0 "Versuchen Sie, [CHI.GetLeader] auszutricksen, indem Sie seine Truppen an die Front schicken."
 jyutgwai.38.b:0 "Verbünde dich mit [CHI.GetRulingParty]"
 jyutgwai.38.c:0 "Verbündeter der [GXC.GetRulingParty]"
 jyutgwai.39.t:0 "[From.GetLeader]s Vorschlag"
 jyutgwai.39.d:0 "In dieser Dilemma-Situation hat [From.GetLeader] versucht, sich mit uns zu verbünden und einen Vorschlag gesendet, in dem es heißt, dass die Streitkräfte von [Root.GetLeader] an die Front geschickt werden sollten, um bei der bevorstehenden Offensive einen effektiven Schlag durchführen zu können."
 jyutgwai.39.b:0 "Dies ist eindeutig ein Plan zur Schwächung unserer Streitkräfte!"
 jyutgwai.39.a:0 "Klingt gut."
 jyutgwai.40.t:0 "Vorschlag angenommen"
 jyutgwai.40.d:0 "[From.GetLeader] hat unseren Vorschlag angenommen und seine Kräfte an die Front geschickt."
 jyutgwai.40.a:0 "Zum Glück für uns."
 jyutgwai.41.t:0 "Vorschlag abgelehnt"
 jyutgwai.41.d:0 "[From.GetLeader] hat He Jians Trick durchschaut und ist nun unverschämt. He Jian wurde vom Dienst entbunden."
 jyutgwai.41.a:0 "Nun ja..."
 jyutgwai.42.t:0 "[From.GetName] schließt sich uns an"
 jyutgwai.42.d:0 "Nachdem er von beiden Seiten unter Druck stand, hat [From.GetLeader] beschlossen, sich uns anzuschließen!"
 jyutgwai.42.a:0 "Gut"
 jyutgwai.43.t:0 "[From.GetName] schließt sich unserem Feind an"
 jyutgwai.43.d:0 "Da er von beiden Seiten unter Druck stand, hat [From.GetLeader] beschlossen, sich unserem Feind anzuschließen!"
 jyutgwai.43.a:0 "Wie können sie es wagen!"
 jyutgwai.44.t:0 "Unsere Männer wurden bestochen"
 jyutgwai.44.d:0 "Unsere Männer wurden von [CHI.GetLeader] bestochen und ein neuer Anführer ernannt, der pro-[CHI.GetLeader] ist."
 jyutgwai.30.c:0 "Mal sehen, wohin die Reise geht."
 ## 7/5/2017 ##
 jyutgwai.45.t:0 "[From.GetName] hat uns den Krieg erklärt"
 jyutgwai.45.d:0 "[From.GetName] hat beschlossen, unsere aktuellen Probleme auf dem Schlachtfeld zu lösen."
 jyutgwai.45.a:0 "So sei es."
 jyutgwai.46.t:0 "Unsere Stärke bewahren"
 jyutgwai.46.d:0 "Obwohl wir uns mit der [CHI.GetRulingParty] verbündet haben, möchte [Root.GetLeader] sich nicht wirklich in den Streit zwischen [CHI.GetLeader] und [GXC.GetLeader] einmischen. Er hat sich nun einen Plan ausgedacht, um unsere Streitkräfte zu erhalten und die von [CHI.GetLeader] im Falle eines Kriegsausbruchs zu schwächen."
 jyutgwai.46.a:0 "Senden Sie den Vorschlag."
 jyutgwai.46.b:0 "Wir würden in Schwierigkeiten geraten, wenn sie unsere Absicht erkennen würden!"
 ## 10/5/2017 ##
 jyutgwai.30.b:0 "Wir werden sie mit unseren Kräften vernichten!"
 ## 29/8/2017 ##
 jyutgwai.44.b:0 "Wir werden bis zum Letzten kämpfen!"
 jyutgwai.44.a:0 "Wir akzeptieren unser Schicksal..."
 ## 14/10/2017 ##
 jyutgwai.49.t:0 "Frieden mit [GXC.GetName]?"
 jyutgwai.49.d:0 "Es scheint, dass es für uns keinen ersichtlichen Grund gibt, unseren Kampf mit [GXC.GetName] fortzusetzen. Vielleicht wäre ein Waffenstillstand für uns beide besser."
 jyutgwai.49.a:0 "Beenden Sie diesen Konflikt."
 jyutgwai.49.b:0 "Es gibt viele Gründe, warum dieser Kampf fortgesetzt werden sollte."
 jyutgwai.50.t:0 "[From.GetName] fordert Waffenstillstand"
 jyutgwai.50.d:0 "[From.GetName] hat entschieden, dass unser aktueller Konflikt für uns beide keinen Nutzen bringt, und drängt darauf, dass wir uns auf einen Waffenstillstand einigen."
 jyutgwai.51.t:0 "Ein Waffenstillstand"
 jyutgwai.51.d:0 "[From.GetName] hat einem Waffenstillstand zugestimmt, unsere Truppen werden nun in unsere Gebiete zurückkehren."
 jyutgwai.51.a:0 "Gut"
 jyutgwai.52.t:0 "Der Kampf geht weiter"
 jyutgwai.52.d:0 "[From.GetName] hat sich geweigert, den aktuellen Konflikt zu beenden."
 jyutgwai.52.a:0 "Was für eine Blutlust!"
 ## 16/3/2018 ##
 jyutgwai.3.t_2:0 "[GXC.GetName] lehnt ab"
 jyutgwai.3.d_2:0 "[GXC.GetName] hat sich geweigert, eine Allianz gegen [CHI.GetLeader] zu bilden.\n\nWir sind jetzt auf uns allein gestellt."
 jyutgwai.9.c:0 "Wir sollten zuerst [YUT.GetName] zerstören."
 jyutgwai.9.d_2:0 "Obwohl einige Generäle von [YUT.GetName] auf unsere Seite übergelaufen sind, stehen [YUT.GetLeader] und einige seiner loyalen Truppen immer noch gegen uns."
 jyutgwai.55.t:0 "Unter ausländischem Angriff"
 jyutgwai.55.d:0 "Unser Land wird derzeit von außen angegriffen. Beamte haben vorgeschlagen, das aktuelle Problem mit [GXC.GetName] sofort zu lösen, um Ressourcen für die Abwehr der ausländischen Invasoren freizusetzen."
 jyutgwai.55.d:0 "Unser Land wird derzeit von außen angegriffen. Beamte haben vorgeschlagen, das aktuelle Problem mit [YUT.GetName] sofort zu lösen, um Ressourcen für die Abwehr der ausländischen Invasoren freizusetzen."
 jyutgwai.55.a:0 "Das Überleben unserer Nation ist in Gefahr!"
 jyutgwai.55.b:0 "Das wird nicht lange dauern."
 jyutgwai.56.t:0 "[From.GetName] versucht, das Problem zu lösen"
 jyutgwai.56.d:0 "Nach Einschätzung der aktuellen Situation hat [From.GetName] beschlossen, das aktuelle Problem zwischen uns zu lösen."
 jyutgwai.56.a:0 "Klingt gut"
 jyutgwai.56.b:0 "Sie werden nicht erwarten, dass wir jetzt eine Offensive starten."
 jyutgwai.57.t:0 "[From.GetName] Akzeptiert"
 jyutgwai.57.d:0 "[From.GetName] hat zugestimmt, dass das aktuelle Problem sofort gelöst werden muss."
 jyutgwai.57.a:0 "Großartig!"
 jyutgwai.58.t:0 "[From.GetName] startet Offensive"
 jyutgwai.58.d:0 "[From.GetName] hat beschlossen, uns genau in dieser Situation anzugreifen!"
 jyutgwai.58.a:0 "Sie müssen verrückt gewesen sein!"
 jyutgwai.59.t:0 "[GXC.GetName] übermittelt"
 jyutgwai.59.d:0 "[GXC.GetName] ist der Bestechung von [CHI.GetRulingParty] zum Opfer gefallen und wurde zerschlagen. Wir sind jetzt auf uns allein gestellt."
 jyutgwai.59.a:0 "Wir können uns nur einreihen."
 jyutgwai.59.b:0 "Wir werden bis zum letzten Mann kämpfen!"
 jyutgwai.60.t:0 "[From.GetName] sendet"
 jyutgwai.60.d:0 "Angesichts des Niedergangs von [GXC.GetName] hat [From.GetName] beschlossen, sich anzupassen und die lokale Regierung aufzulösen."
 jyutgwai.60.a:0 "Ein kluger Schachzug."
 ## 31/01/2020 ##
 KMT_zxl_stopped_attack_tt:0 "§GDie Mission §HDie nächste Offensive§! wird nicht mehr aktiviert.§!\n"
 ## 03/02/2020 ##
 jyutgwai.61.t:0 "Waffenstillstand"
 jyutgwai.61.d:0 "Nach der Vereinbarung eines Waffenstillstands zwischen uns und [From.GetLeader] haben unsere Scharmützel mit ihnen aufgehört. Viele unserer Männer haben lange genug auf diese dringend benötigte Ruhepause gewartet."
 jyutgwai.61.a:0 "Eine Sorge weniger."
 jyutgwai.62.t:0 "Probleme im Süden"
 jyutgwai.62.d:0 "Berichte von [592.GetName] haben enthüllt, dass ein politischer Plan von [KMT_central_gov_tag.GetLeader] zur Übernahme von [YUT.GetNameDef] vereitelt wurde. Da sich [KMT_central_gov_tag.GetLeader] nun auf die Auseinandersetzung mit den Kriegsherren des Südens konzentriert, hat ihre Aufmerksamkeit für unsere Aktionen nachgelassen. Dies ist unsere Chance, selbst aktiv zu werden."
 jyutgwai.62.a:0 "Ein Geschenk des Himmels!"
 KMT_can_ceasefire_tt:0 "§GSie können jetzt einen Waffenstillstand mit den Kommunisten anstreben§!\n"
 KMT_yut_joins_alliance_tt:0 "§G[YUT.GetName] tritt deiner Allianz bei§!\n"
 KMT_from_joins_alliance_tt:0 "§G[From.GetName] tritt deiner Allianz bei§!\n"
 jyutgwai.63.t:0 "[From.GetName] löst Allianz auf"
 jyutgwai.63.d:0 "Gemäß den vereinbarten Bedingungen hat [From.GetName] ihre Allianz aufgelöst."
 jyutgwai.63.a:0 "Immerhin hat sich die Lage entschärft."
 jyutgwai.64.t:0 "Öffentliche Unzufriedenheit"
 jyutgwai.64.d:0 "Während sich der Konflikt im Inland zu einem weiteren Bürgerkrieg ausweitet, ist die Öffentlichkeit empört über unsere Unfähigkeit, den Frieden zu wahren."
 jyutgwai.64.a:0 "Verdammte Idioten!"
 KMT_gxc_may_offer_negotiation_tt:0 "§G[GXC.GetName] kann Verhandlungen anbieten§!\n"
 
 
 
 
 
 ## lure-them-in events ##
 lti.1.t:0 "Lock-sie-an-Strategie"
 lti.1.d:0 "Unsere Soldaten beginnen nun, die Anweisungen unserer neuen „Lock-sie-herein“-Strategie umzusetzen. Wenn alles gut geht, sollte dies bald einige Veränderungen im Krieg mit sich bringen."
 lti.1.a:0 "Hoffen wir das Beste."
 lti.2.d:0 "Unsere neue Strategie hat sich als recht erfolgreich erwiesen. Unsere Soldaten können sich nun effektiver gegen unsere Feinde verteidigen."
 lti.2.a:0 "Ein gutes Zeichen"
 lti.6.t:0 "Feindliche Partisanen"
 lti.6.d:0 "In letzter Zeit wurde von vereinzelten Aktivitäten feindlicher Partisanen hinter unserer Front berichtet. Obwohl derzeit keine ernsthafte Bedrohung besteht, schlagen einige Beamte vor, dass wir unseren Feind vernichten sollten, bevor seine Partisanen unsere Versorgungslinie bedrohen."
 lti.6.a:0 "Wir werden sehen..."
 lti.7.d:0 "Es werden immer mehr parteipolitische Aktivitäten gemeldet, die Situation wird immer schlimmer!"
 lti.7.a:0 "Verdammt!"
 lti.11.t:0 "Unsachgemäßes Frontlinienkommando"
 lti.11.d:0 "Die Mängel unserer Frontführung waren für [From.GetName] noch nie so offensichtlich. Ihre Streitkräfte nutzen nun die Gelegenheit, um zurückzuschlagen."
 lti.11.a:0 "Diese inkompetenten Generäle sollten Seppuku begehen!"
 
 ## resources ##
 kmt_res.1.t:0 "Ressourcen im Nordosten"
 kmt_res.1.d:0 "Dank unserer verbesserten Technologie können wir nun mehr Ressourcen aus den Vorkommen in unseren nordöstlichen Gebieten gewinnen."
 kmt_res.1.a:0 "Genial!"
 kmt_res.2.t:0 "Ressourcen im Nordwesten"
 kmt_res.2.d:0 "Dank unserer verbesserten Technologie können wir nun mehr Ressourcen aus den Lagerstätten in unseren nordwestlichen Gebieten gewinnen."
 kmt_res.3.t:0 "Ressourcenausstoß erhöht"
 kmt_res.3.d:0 "Dank unserer verbesserten Technologie können wir nun mehr Ressourcen aus den Lagerstätten im Zentrum Chinas gewinnen."
 
 ## Xi'an Incident ##
 KMT_will_stop_civil_war_tt:0 "   Wird den Bürgerkrieg beenden und eine Einheitsfront gegen die japanischen Invasoren bilden.\n"
 KMT_will_release_chiang_tt:0 "   Wird Chiang Kai-shek freilassen.\n"
 accept_all_demand:0 "Akzeptieren"
 KMT_chiang_return_tt:0 "Chiang Kai-shek wird freigelassen."
 demand.t:0 "Nachfrageliste"
 demand.d:0 "Die Forderungen beider Seiten lauten wie folgt: "
 reject_all_demand_and_war:0 "Lehnen Sie alles ab und erklären Sie den Krieg."
 demand_rejected_war.t:0 "KRIEG!"
 demand_rejected_war.d:0 "[From.GetName] hat die Geduld verloren und beschlossen, das aktuelle Problem durch Krieg zu lösen. Sie haben die Offensive gestartet, und wir müssen unsere Männer jetzt vorbereiten!"
 demand_rejected_war.a:0 "Unzivilisierte Barbaren!"
 KMT_chi_stop_civil_war_demand_rejected_tt:0 "[From.GetName] hat unsere Forderung nach Beendigung des Bürgerkriegs und der Schaffung einer Einheitsfront abgelehnt.\n"
 KMT_chi_demand_submission_tt:0 "[From.GetName] hat unsere Einreichung verlangt.\n"
 KMT_will_submit_to_chiang_tt:0 "   Wird an [CHI.GetName] übermittelt.\n"
 KMT_chi_demand_submission_rejected_tt:0 "[From.GetName] hat unsere Aufforderung zur Einreichung ihrer Unterlagen abgelehnt.\n"
 resolved.t:0 "Vorfall behoben"
 resolved.d:0 "Beide Seiten haben allen Bedingungen zugestimmt, das Problem wurde gelöst.\n\nDie Bedingungen lauten wie folgt: "
 xian.1.t:0 "Chang Hsueh-liang"
 xian.1.d:0 "Da Chang Hsueh-liang ohne Benachrichtigung der Zentralregierung aufgehört hat, die kommunistischen Banditen anzugreifen, verlangsamt sich die Eliminierung der Kommunisten. [Root.GetLeader] hat beschlossen, Zhang in Xi&#39;an einen Besuch abzustatten."
 xian.1.a:0 "Das wird ihnen zeigen, wer das Sagen hat."
 xian.1.b:0 "Es ist nichts Wichtiges."
 xian.2.t:0 "Ankunft von [CHI.GetLeader]"
 xian.2.d:0 "[CHI.GetLeader] ist in Xi&#39;an angekommen, um sich mit [Root.GetLeader] zu treffen. [CHI.GetLeader] hat einen Großangriff auf die Kommunisten angeordnet."
 xian.2.a:0 "Wir müssen etwas tun."
 xian.2.b:0 "Wir können nichts tun."
 KMT_will_Die_tt:0 "§RSie werden annektiert, wenn es Ihnen nicht gelingt, die Kommunisten innerhalb von drei Monaten zu eliminieren.§!\n"
 xian.3.t:0 "Chiang Kai-shek als Geisel"
 xian.3.d:0 "Chang Hsueh-liang hat Chiangs Aufenthaltsort in Xi&#39;an angegriffen und gefangen genommen. Zhang fordert nun, dass wir den Bürgerkrieg beenden und uns auf die Japaner konzentrieren. Wenn wir diesen Bedingungen zustimmen, werden sie Chiang freilassen."
 xian.3.a:0 "Schicken Sie jemanden, der mit ihnen verhandelt!"
 xian.3.b:0 "Wir werden Chiang mit Gewalt zurückerobern!"
 xian.4.t:0 "[From.GetRulingParty] Sendet Vertreter"
 xian.4.d:0 "Ein Vertreter von [CHI.GetRulingParty] ist eingetroffen, um das aktuelle Problem zu besprechen.\n\nWir werden folgende Forderungen stellen: "
 xian.4.a:0 "Sehr gut"
 xian.5.t:0 "[CHI.GetRulingParty] startet Offensive!"
 xian.5.d:0 "[CHI.GetRulingParty] hat beschlossen, Chiang mit Gewalt zurückzuerobern!"
 xian.5.a:0 "Bereitet euch vor, Männer!"
 xian.6.t:0 "Xi&#39;an-Vorfall"
 xian.6.d:0 "Chang Hsueh-liang hat Chiang Kai-shek als Geisel genommen, in der Hoffnung, dass er sich auf die Japaner statt auf die Kommunisten von [PRC.GetLeader] konzentrieren würde."
 xian.6.a:0 "Das ist nicht das, was wir sehen wollen."
 xian.6.b:0 "Wir sollten Zhangs Bemühungen unterstützen."
 xian.7.d:0 "Chang Hsueh-liang hat Chiang Kai-shek als Geisel genommen, in der Hoffnung, dass er sich auf die Japaner statt auf uns konzentrieren würde."
 xian.7.a:0 "Wir hoffen, dass ihm das gelingt."
 xian.8.t:0 "[SOV.GetName] Unzufrieden"
 xian.8.d:0 "[SOV.GetName] ist nicht sehr erfreut über unsere Aktion, Chiang als Geisel zu halten, und hat uns gebeten, ihn jetzt freizulassen."
 xian.8.a:0 "Wir dürfen nicht nachgeben!"
 xian.9.t:0 "Nachricht von [SOV.GetName]"
 xian.9.d:0 "[SOV.GetName] scheint mit unserer Initiative zur Bildung einer Einheitsfront recht zufrieden zu sein und hat uns ermutigt, nicht nachzugeben."
 xian.9.a:0 "Ihnen gilt unser Dank."
 xian.10.t:0 "[CHI.GetRulingParty] übernimmt"
 xian.10.d:0 "Es ist uns nicht gelungen, die Kommunisten in drei Monaten zu eliminieren, [CHI.GetRulingParty] hat jetzt unsere Arbeit übernommen."
 xian.10.a:0 "..."
 xian.11.t:0 "Wir haben übernommen"
 xian.11.d:0 "Wir haben die Nordostarmee übernommen, da sie die Frist zur Eliminierung der Kommunisten innerhalb von drei Monaten nicht eingehalten hat."
 xian.11.a:0 "Wir werden die Kommunisten vernichten."
 xian.100.a:0 "Wir werden nicht mit den Kommunisten zusammenarbeiten!"
 xian.100.b:0 "Wir werden ihre Unterwerfung fordern!"
 xian.100.c:0 "Wir werden uns niemals unterwerfen!"
 xian.12.t:0 "Zhang verhaften?"
 xian.12.d:0 "Chang Hsueh-liang ist Chiang zurück nach Nanjing gefolgt. Chiang hat Zhangs Tat noch nicht verziehen. Er plant nun, Zhang unter Hausarrest zu stellen und ihn so außer Kontrolle zu bringen."
 xian.12.a:0 "Er muss wissen, dass es zu ihm kommen wird."
 xian.12.b:0 "Das ist nicht nötig."
 KMT_chi_stop_civil_war_demand_again_tt:0 "Sie bestanden darauf, dass der Bürgerkrieg beendet werden müsse.\n"
 xian.100.d:0 "Wir fordern eine geschlossene Front!"
 KMT_chiang_returns_tt:0 "Chiang Kai-shek als Feldmarschall verfügbar\n"
 xian.13.t:0 "Chiang Kai-shek gerettet"
 xian.13.d:0 "Nachdem Zhangs Truppen vernichtet waren, fanden unsere Soldaten Chiang und befreiten ihn."
 xian.13.a:0 "Gegen uns haben sie nie eine Chance."
 xian.1.d_2:0 "Die Eliminierung der Kommunisten geht nur langsam voran. [CHI.GetLeader] hat beschlossen, [ZXL.GetLeader] einen Besuch abzustatten und ihn zu drängen, die Kommunisten schnell zu erledigen."
 ## 9/7/2017 ##
 xian.14.t:0 "Chiang Kai-shek getötet"
 xian.14.d:0 "[ZXL.GetLeader] hat die Hinrichtung von Chiang Kai-shek angeordnet. Sein Tod führte zu einem Machtvakuum innerhalb der [Root.GetRulingParty]. Der Wettbewerb ist extrem tödlich geworden und ein Bürgerkrieg zwischen zwei mächtigen Fraktionen ist unvermeidlich."
 xian.14.a:0 "Wir müssen standhaft bleiben."
 xian.14.b:0 "Unterstützen Sie die gegnerische Fraktion."
 xian.2.c:0 "Führen Sie [CHI.GetLeader] aus"
 xian.15.d:0 "Mit den jüngsten politischen Unruhen in China ist ein neuer Bürgerkrieg ausgebrochen. Dies bietet uns eine unschätzbare Gelegenheit, unseren Einfluss in der Region geltend zu machen oder auszuweiten."
 xian.15.t:0 "Bürgerkrieg in China"
 xian.15.a:0 "Wählen Sie eine Seite."
 xian.15.a_hyq:0 "Unterstützen Sie Ho Ying-chin"
 xian.15.a_fyx:0 "Unterstützen Sie Feng Yu-hsiang"
 xian.15.b:0 "Die Region für uns erobern!"
 xian.15.c:0 "Lassen Sie uns noch ein wenig beobachten."
 xian.16.t:0 "[From.GetName] möchte uns helfen"
 xian.16.d:0 "Angesichts unseres aktuellen Bürgerkriegs hat [From.GetName] beschlossen, uns bei unseren Kriegsanstrengungen zu unterstützen."
 xian.16.a:0 "Ein unschätzbarer Verbündeter."
 xian.16.b:0 "Opportunistische Schweine."
 xian.17.t:0 "[From.GetName] nimmt unsere Hilfe an"
 xian.17.d:0 "[From.GetLeader] hat unsere Hilfe angenommen und wir kämpfen jetzt an ihrer Seite."
 xian.17.a:0 "Bravo!"
 xian.18.t:0 "[From.GetName] hat unsere Hilfe abgelehnt"
 xian.18.d:0 "[From.GetLeader] hat unsere Hilfe abgelehnt."
 xian.18.a:0 "Verdammt!"
 xian.19.t:0 "[From.GetName] erklärt uns den Krieg"
 xian.19.d:0 "[From.GetName] hat unsere internen Machtkämpfe als Gelegenheit genutzt, uns auszulöschen!"
 xian.19.a:0 "Verdammnis!"
