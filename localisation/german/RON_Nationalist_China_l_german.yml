 l_german:
 ### events ###
 kmt.1.t:0 "Das Shanxi-Angebot"
 kmt.1.d:0 "Die [CHI.GetNameADJ]-Regierung verlangt unsere Unterwerfung. Sie sagt, wenn wir Widerstand leisten, wird es Blutvergießen geben."
 kmt.1.a:0 "Es wird keine zweite Chance geben! Wir sollten uns unterwerfen, bevor es blutig wird."
 kmt.1.b:0 "Eine Marionette zu sein ist besser als eine vollständige Annexion."
 kmt.1.c:0 "Niemals!"
 kmt.2.t:0 "Shanxi annektiert"
 kmt.2.d:0 "Der Kriegsherr von Shanxi hat unser Angebot angenommen. Die Banditen sind als Nächstes dran."
 kmt.2.a:0 "Da ihr Hinterteil nun frei liegt, wird es einfacher sein, die Banditen zu vernichten."
 kmt.3.t:0 "Shanxi-Marionettenvorschlag"
 kmt.3.d:0 "Obwohl sie sich bereit erklärt haben, sich uns zu unterwerfen, verlangen sie im Gegenzug Autonomie."
 kmt.3.a:0 "Eine akzeptable Forderung: Lasst sie unsere Vasallen werden."
 kmt.3.b:0 "Inakzeptabel! Wir müssen die absolute Kontrolle haben!"
 kmt.4.t:0 "Shanxi lehnte ab"
 kmt.4.d:0 "Der Kriegsherr von Shanxi weigerte sich zu kooperieren. [Root.GetLeader] kann diese Demütigung der Zentralregierung nicht ertragen. Der Kriegsherr von Shanxi muss zur Rechenschaft gezogen werden."
 kmt.4.a:0 "Sie werden ihre Entscheidung bereuen"
 kmt.5.t:0 "Marionette abgelehnt"
 kmt.5.d:0 "Die chinesische Regierung lehnte unseren Gegenvorschlag ab. Sie fordert die vollständige Kontrolle über das Gebiet. Sollten wir dem nicht nachkommen, droht ihnen eine Offensive."
 kmt.5.a:0 "Wir haben nicht genug Kräfte, um gegen sie zu kämpfen. Wir müssen uns unterwerfen."
 kmt.5.b:0 "Wir werden uns nicht unterwerfen!"
 kmt.6.t:0 "Propaganda diskreditiert"
 kmt.6.d:0 "Unsere Propaganda zur Landesverteidigung ist diskreditiert. Unser Volk hält uns für Lügner, wenn wir unsere chinesischen Mitbürger angreifen."
 kmt.6.a:0 "Sie sind Narren, die das große Ganze nicht sehen können."
 kmt.8.t:0 "[From.GetName] fordert Einreichung"
 kmt.8.d:0 "[From.GetNameDef] betrachtet Tibet als chinesisches Territorium. Sie fordern unsere vollständige und sofortige Annexion."
 kmt.8.a:0 "Sie sind zu mächtig, um Widerstand zu leisten"
 kmt.8.b:0 "Der Dalai Lama wird sich niemals unterwerfen!"
 kmt.9.t:0 "[From.GetName] Kompromiss"
 kmt.9.d:0 "Der Dalai Lama hat unseren Bedingungen zugestimmt. Tibet gehört jetzt uns."
 kmt.9.a:0 "Tibet gehört uns von Rechts wegen!"
 kmt.10.t:0 "[From.GetName] Abgelehnt"
 kmt.10.d:0 "Der tibetische Führer lehnte unser großzügiges Angebot ab. Sie behaupten, dass sie sich unserer „Tyrannei“ niemals unterwerfen werden."
 kmt.10.a:0 "Das werden wir sehen..."
 kmt.11.t:0 "[KMT_central_gov_tag.GetName] Forderung nach Neuziehung der McMahon-Linie"
 kmt.11.d:0 "Jetzt, da Tibet unter der Kontrolle der [KMT_central_gov_tag.GetAdjective] steht, fordern sie, dass die McMahon-Linie zu ihren Gunsten neu gezogen wird. "
 kmt.11.a:0 "Nutzloses Land für ein nutzloses Volk"
 kmt.11.b:0 "Übertragen Sie den Fall an [KMT_kmt11_temp_overlord.GetNameDef]"
 kmt.11.c:0 "Wir werden ihnen keinen Zentimeter nachgeben!"
 kmt.11.c_tt:0 "§RMöglicherweise zu einem Krieg mit [KMT_central_gov_tag.GetName] führen§!"
 kmt.12.t:0 "McMahon-Linie neu gezeichnet"
 kmt.12.a:0 "Ein wundervoller Tag für die [Root.GetAdjective]-Leute"
 kmt.14.t:0 "Neuzeichnung abgelehnt"
 kmt.14.a:0 "Wir wollen im Moment keinen weiteren Krieg"
 kmt.14.b:0 "Diese Barbaren werden unsere Wut zu spüren bekommen! [Root.GetName] wird größer werden"
 kmt.15.t:0 "[From.GetName] fordert Taiwan"
 kmt.15.d_2:0 "Taiwan war einst Teil Chinas und [From.GetName] fordert, dass es unter ihre Herrschaft „zurückgegeben“ wird" 
 kmt.15.d_1:0 "Obwohl wir zu den Ersten gehörten, die Taiwan regierten, verlangt [From.GetName], dass wir es ihnen überlassen. Was sollen wir tun?" 
 kmt.15.a_1:0 "Wir möchten den Frieden zwischen uns bewahren."
 kmt.15.a_2:0 "Sie können dieses feuchte Höllenloch haben, wenn sie es so sehr wollen."
 kmt.15.b_1:0 "Wie können diese Barbaren es wagen, diese Forderung zu stellen? Taiwan gehört uns von Rechts wegen!"
 kmt.15.b_2:0 "Vielleicht haben sie in der Vergangenheit über die Insel geherrscht, aber jetzt herrschen wir darüber!"
 kmt.16.t:0 "Taiwan kehrte zurück"
 kmt.16.d:0 "Taiwan wurde dem chinesischen Volk zurückgegeben. Unsere Bürger feiern seine Rückkehr."
 kmt.16.a:0 "Das beste Ergebnis, das wir uns erhoffen konnten."
 kmt.17.t:0 "Taiwan bleibt versklavt"
 kmt.17.d:0 "Sie haben unsere Forderung abgelehnt, uns das zurückzugeben, was uns rechtmäßig zusteht. Ihre Tyrannei ist sonnenklar."
 kmt.17.a:0 "Wir werden sie niederstrecken!"
 kmt.21.t:0 "[From.GetName] möchte sich den Verbündeten anschließen"
 kmt.21.d:0 "Demokratische Kräfte in [From.GetNameDef] haben die Kontrolle übernommen. Sie wollen sich den Alliierten als Zeichen ihres Vertrauens und ihrer Freundschaft anschließen."
 kmt.21.a:0 "Ein Verbündeter im Osten, warum nicht?"
 kmt.21.b:0 "Zur Zeit nicht"
 kmt.22.t:0 "[From.GetName] Akzeptiert"
 kmt.22.d:0 "[From.GetName] hat uns erlaubt, uns den Alliierten anzuschließen. Wir sind nun in der Sache der Freiheit vereint."
 kmt.22.a:0 "Die demokratische Welt ist jetzt stärker."
 kmt.23.t:0 "[From.GetName] Abgelehnt"
 kmt.23.d:0 "Den Grund für die Ablehnung haben sie uns nicht genannt, aber es scheint, als hätten sie im Moment alle Hände voll zu tun."
 kmt.23.a:0 "Arrogante Narren! Vielleicht erkennen sie später ihren Fehler."
 kmt.25.t:0 "Geheime Dokumente erhalten"
 kmt.25.d:0 "Wir haben geheime Dokumente unbekannter Herkunft erhalten. Sie zeigen, dass [From.GetName] unzufrieden damit ist, dass wir die Anführer unserer Fraktion sind. Sie wollen uns stürzen!"
 kmt.25.a:0 "[From.GetName] ist ein vertrauenswürdiger Verbündeter. Diese Dokumente müssen ein erbärmlicher Trick unserer Feinde sein."
 kmt.25.b:0 "Wir werden sie dann aus unserer Fraktion entfernen."
 kmt.25.c:0 "Wir werden diesen Akt der Usurpation nicht tolerieren."
 kmt.26.t:0 "Fraktionsmitgliedschaft entzogen"
 kmt.26.d_1:0 "Unser ehemaliger Fraktionsführer hat aufgrund geheimer Dokumente beschlossen, uns aus seiner Fraktion auszuschließen. Es scheint, als sei es unseren Feinden gelungen, uns zu isolieren."
 kmt.26.d_2:0 "Unser ehemaliger Fraktionsführer hat beschlossen, uns aus seiner Fraktion auszuschließen und uns auf Grundlage geheimer Dokumente den Krieg zu erklären. Es scheint, als sei es unseren Feinden gelungen, uns zu isolieren."
 kmt.26.a:0 "Wir müssen uns jetzt auf uns selbst verlassen."
 kmt.27.t:0 "Neutrale Außenpolitik"
 kmt.27.d:0 "Unsere Regierungsvertreter vertreten eine Politik der Neutralität. Wir werden uns aus dem kleinlichen Bündnisgeflecht der Welt heraushalten. Lasst die kleineren Nationen sich in sinnlosen Kriegen gegenseitig umbringen."
 kmt.27.a:0 "Ein unsicherer Plan in einer unsicheren Welt."
 kmt.28.t:0 "Geheime Dokumente erhalten"
 kmt.28.d:0 "Wir haben geheime Dokumente unbekannter Herkunft erhalten. Sie zeigen, dass [SIK.GetName] unzufrieden damit ist, dass wir der Anführer unserer Fraktion sind. Sie wollen uns stürzen!"
