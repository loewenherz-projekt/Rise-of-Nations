 ##### POLITICAL ADVISORS
 CHI_soong_mei_ling_T:0 "Frau Chiang"
 CHI_soong_mei_ling_desc:0 "Soong Mei-ling, oder „Sòng Měilíng“ auf Chinesisch, ist eine bedeutende politische Persönlichkeit und First Lady der Republik China, die Ehefrau von Generalissimus und Präsident Chiang Kai-shek. Fähig, stark und angesehen, ist sie seine Muse, seine Augen, seine Ohren, Englischübersetzerin, Sekretärin und Beraterin und seine treueste Verfechterin.\n\nVon 1930 bis 1932 war sie Mitglied des Legislativ-Yuan und seit 1936 Generalsekretärin der chinesischen Kommission für Luftfahrtangelegenheiten. Madame Chiang, wie sie oft genannt wird, ist zudem eine der Hauptinitiatorinnen der New Life-Bewegung."
 
 CHI_chiang_ching_kuo_T:0 "Das Arbeitspferd der Kuomintang"
 CHI_chiang_ching_kuo_desc:0 "Chiang Ching-kuo, geboren 1910, ist der älteste und einzige leibliche Sohn von Chiang Kai-shek. Als Teenager wurde er während der Ersten Einheitsfront 1925, als die Nationalistische Partei Chinas und die Kommunistische Partei Chinas verbündet waren, zum Studium in die Sowjetunion geschickt. Er besuchte dort die Universität, doch als die chinesischen Nationalisten gewaltsam mit den Kommunisten brachen, schickte Stalin ihn zur Arbeit in eine Stahlfabrik im Uralgebirge. Dort heiratete er die gebürtige Weißrussin Faina Ipatjewna Wachrewa, die ihm einen Sohn, Hsiao-wen, schenkte. Er war ein begeisterter Anhänger der kommunistischen Ideologie, insbesondere des Trotzkismus. Sein Wissen konnte er – natürlich in begrenztem Umfang – auch hier zu Hause anwenden."
 CHI_chiang_ching_kuo_EXPL:0 "\nChiang Ching-kuo als §HPolitischer Berater§! wird aufgrund seiner Aktionen in China §Gverursachen§!, dass weitere §HEreignisse§! eintreten.\n"
 CHI_chiang_ching_kuo_available_FLAG:0 "Chiang Ching-kuo ist aus der Sowjetunion zurückgekehrt."
 
