 KMT_deal_with_SIK:0 "Sinkiang-Problem"
 KMT_deal_with_SIK_desc:0 "Sinkiang ist ein unveräußerlicher Teil Chinas. Der dortige Gouverneur hat sich als Separatist erwiesen. Daher ist ihre schnelle und sofortige Unterwerfung erforderlich. Wenn dieses Ultimatum nicht funktioniert, sollte unser Militär ausreichen, um sie zur Kapitulation zu bewegen."
