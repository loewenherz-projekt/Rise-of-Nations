 KMT_promoted_new_officers:0 "Beförderte neue Offiziere"
 ## 10/12/2018 ##
 KMT_switched_to_internal:0 "Veränderter politischer Fokus auf innere Stabilität"
 ## 16/05/2018 ##
 KMT_north_plan_tt:0 "Kein Staat in der §HMandschurei§! oder §HNordchina§! ist Eigentum von §H[Root.GetName]§!, und sein aktueller Besitzer befindet sich nicht im Krieg mit §H[Root.GetName]§!"
