 ### FROM supports the OPPOSITION                   - COMPLETE
 umc_chi_inv.60.t:0 "[FROM.GetName] unterstützt die Opposition der Kuomintang"
 umc_chi_inv.60.d:0 ""
 umc_chi_inv.60.a:0 ""
 umc_chi_inv.60.b:0 ""
 
 
 umc_chi_inv.70.t:0 "[FROM.GetName] Destabilisierung der Lage in China"
 umc_chi_inv.70.d:0 "Die jüngsten Nachrichten aus China sind beunruhigend. [FROM.GetName] scheint sich nicht damit zufrieden zu geben, seinen Einfluss im Land zu vergrößern, sondern die Staatsführung selbst in die Hand zu nehmen. Dies stellt zweifellos einen schweren Verstoß gegen das internationale Abkommen dar, das allen Nationen gleiche Rechte und Grenzen zusichert.\n\nEines ist sicher: Wenn sich keine andere große Nation gegen dieses verräterische Vorgehen stellt, werden keine Gespräche eine Lösung bringen, und China wird erneut in den blutigen Konflikt hineingezogen. Denn bereits jetzt werden heimlich Lieferungen von Kriegsmaterial und militärischer Unterstützung an die Kuomintang-Opposition geliefert.\n\nEinige Mitglieder unserer Regierung sehen die Situation jedoch anders. Sie sehen darin keine potenzielle Bedrohung unserer eigenen Interessen, sondern vielmehr eine Chance für unser Land – sollten wir uns entscheiden, [FROM.GetName] zu unterstützen."
 umc_chi_inv.70.a:0 "Die Lage in China ist instabil? Was für eine unerwartete Nachricht ..."
 umc_chi_inv.70.b:0 "Wir müssen [CHI.GetName] unterstützen und unsere Interessen dort wahren."
 umc_chi_inv.70.c:0 "Wenn wir die richtige Seite wählen, können wir vielleicht einiges davon haben."
 
 
 
 
 
 umc_chi_inv.85.t:0 "[FROM.GetName] schlägt ein mögliches Friedensabkommen vor"
 umc_chi_inv.85.d:0 "Angesichts der sich verschlechternden Lage im Umgang mit den vom Ausland unterstützten Rebellen wandte sich [FROM.GetLeader] an unsere Regierung und schlug ihr vor, alle Feindseligkeiten einzustellen, falls wir die Neuen Gebiete offiziell als Staat anerkennen.\n\nDie Forderungen sind klar. Die Neuen Gebiete würden die Kontrolle über Südwestchina mit Nanjing als Hauptstadt erlangen. Sämtliches ausländisches Kapital würde schrittweise hierher verlagert.\n\nZweifellos ein offensives Angebot. Sollten wir es annehmen, würde dies zudem unsere Staatsverwaltung in immer größere Schwierigkeiten bringen. Denn die Kommunisten zögern nie, jede sich ihnen bietende Gelegenheit zu nutzen."
 umc_chi_inv.85.a:0 "Wir müssen nachgeben."
 CHI_INV_PRC_will_be_able_to_strike_EXPL1:0 "\n[PRC.GetFlag]§H[PRC.GetName]§! und andere §RWerden in der Lage sein§!, diese Situation zu ihrem §RAnvorteil§ zu nutzen!!\n"
 umc_chi_inv.85.b:0 "Wir haben keine Zeit dafür, drängen Sie die Verräter zurück!"
 
 
 
 
 
