 kmt.30.d:0 "Wir haben geheime Dokumente unbekannter Herkunft erhalten. Sie zeigen, dass [TAN.GetName] unzufrieden damit ist, dass wir der Anführer unserer Fraktion sind. Sie wollen uns stürzen!"
