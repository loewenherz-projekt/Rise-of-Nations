 ##### DEMOCRATIC BRANCH
 CHI_the_principle_of_minquan:0 "Das Mínquán-Prinzip"
 CHI_the_principle_of_minquan_EXPL:0 "\nDurch die §CAbwicklung§! dieses Schwerpunkts begeben wir uns auf den Weg zur §HChinesischen Republik§!. Wir §Gwerden in der Lage§!, um §HAlliierte Unterstützung§! und §HVermittlung§! zu bitten. Sie werden Ihre Forderungen bezüglich umstrittener Gebiete auch eher §Gakzeptieren§!. Die folgenden Schwerpunkte werden durch die Abwicklung dieses Schwerpunkts positiv §Gbeeinflusst§!:\n - §HDemission des Vertrags über neue Gebiete§!\n - §HZweiter Chinesischer Bürgerkrieg§!\n"
 CHI_the_principle_of_minquan_desc:0 "Die von Dr. Sun Yat-Sen begonnene Reise muss letztendlich zu einer Republik führen. Es wird zweifellos eine lange Reise sein, aber wir gehen sie Schritt für Schritt an."
 
 ##### CULT OF GENERALISSIMO BRANCH
 CHI_cult_of_generalissimo:0 "Kult des Generalissimus"
 CHI_cult_of_generalissimo_EXPL:0 "\nIndem wir diesen Fokus §Cabschließen§!, begeben wir uns auf den Weg zur §Hchinesischen Diktatur§!. Wir §RWerden nicht in der Lage sein§!, um §HAlliierte Unterstützung§! zu bitten und einen §HZweiten Chinesischen Bürgerkrieg§! zu verhindern.\n"
 CHI_cult_of_generalissimo_desc:0 "Unser Generalissimus Chiang Kai-Shek ist die beste Option für eine glänzende Zukunft Chinas. Wir können uns nicht auf willensschwache Demokraten verlassen, um die dringendsten Veränderungen herbeizuführen. Generalissimus wird uns zu einem vereinten China führen – und dabei die Japaner und den Westen vom asiatischen Festland vertreiben."
 CHI_employ_law_enforcing_militias:0 "Setzen Sie Milizen zur Durchsetzung des Gesetzes ein"
 CHI_employ_law_enforcing_militias_desc:0 "Zu viele unserer potenziellen Ressourcen gehen aufgrund der ineffektiven Bürokratie verloren. Wir werden jetzt handeln, um das zu ändern. Durch den Einsatz von Milizen zur Durchsetzung der Gesetze können wir sicherstellen, dass jeder Beamte seine Arbeit gesetzeskonform verrichtet und seine persönlichen Interessen nicht über die des chinesischen Staates stellt."
 CHI_support_the_blue_shirts_society:0 "Unterstützen Sie die Blue Shirts Society"
 CHI_support_the_blue_shirts_society_EXPL:0 "Erhalte §H2§! ausgebildete Generäle.\n"
 CHI_support_the_blue_shirts_society_desc:0 "Die Blauhemden-Gesellschaft ist eine faschistische Clique innerhalb der Kuomintang. In ihrer Anfangsphase kamen die Mitglieder der Gesellschaft aus der Whampoa-Militärakademie und bildeten Elemente der Whampoa-Clique der KMT. In den 1930er Jahren weitete sich ihr Einfluss jedoch auf militärische und politische Bereiche aus und beeinflusste die chinesische Gesellschaft. Durch ein Bündnis mit ihnen könnten wir die politische Stabilität in China erheblich erhöhen."
 CHI_perfect_guns_for_perfect_soldiers:0 "Perfekte Waffen für perfekte Soldaten"
 CHI_perfect_guns_for_perfect_soldiers_desc:0 ""
 CHI_end_the_feudal_influences:0 "Beenden Sie die feudalen Einflüsse"
 CHI_end_the_feudal_influences_desc:0 "Das Feudalsystem ist in China noch immer stark verwurzelt. Um China auf den Weg der Modernisierung, Stabilität und Prosperität zu bringen, müssen wir die Grundherren so schnell wie möglich loswerden."
 
 ##### WELFARE BRANCH
 CHI_the_principle_of_minsheng:0 "Das Prinzip von Mínshēng"
 CHI_the_principle_of_minsheng_desc:0 "Ein moderner Staat kümmert sich um seine Bürger, sodass diese ihn im Notfall verteidigen können und wollen."
 CHI_invite_foreign_investors_EXPL1:0 "Wenn sie unser Angebot annehmen, können sie in unserem Gebiet investieren. Dies führt zu:\n der Entwicklung unserer natürlichen Ressourcen.\n der Entwicklung unserer zivilen Fabriken.\n Vorsicht! Wenn sie zu viel Einfluss in unserem Land gewinnen, könnte dies zu einer Verringerung der Stabilität und sogar zu einem potenziell vom Ausland unterstützten Bürgerkrieg führen."
 
 ##### NATIONALISM BRANCH
 CHI_the_principle_of_minzu:0 "Das Prinzip von\nMínzú"
 CHI_the_principle_of_minzu_desc:0 "Die Idee der Zugehörigkeit zu einer Nation – und nicht zu einem Stamm oder einer Religion – macht aus einer Gruppe von Menschen einen Staat."
 CHI_path_for_united_china:0 "Weg für ein vereintes China"
 CHI_path_for_united_china_EXPL1:0 "Erhalte §H2§! Milizdivisionen.\n"
 CHI_path_for_united_china_EXPL2:0 "   Führen Sie einen „Grenzkrieg“ gegen unsere Gebiete durch.\n" 
 CHI_path_for_united_china_desc:0 "China ist zwischen verschiedenen Kriegsherren und kommunistisch kontrollierten Gebieten aufgeteilt. Doch das wird nicht mehr lange so bleiben. China muss vereint werden – notfalls mit Gewalt. Jeder Kriegsherr muss entmachtet und sein Territorium von der offiziellen chinesischen Regierung annektiert werden. Anschließend müssen wir uns auch mit dem kommunistischen Abschaum auseinandersetzen."
 CHI_end_the_warlord_era:0 "Beenden Sie die Ära der Kriegsherren"
 CHI_end_the_warlord_era_EXPL:0 "   Steigern Sie Ihren Einfluss für §HWarlords§! und machen Sie sie schließlich zu §HPuppet§!"
 CHI_end_the_warlord_era_desc:0 ""
 CHI_unite_the_arsenals:0 "Vereint die Arsenale"
 CHI_unite_the_arsenals_EXPL1:0 "Wenn wir oder ein unterworfener §HKriegsherr§! §H[594.GetName]§! kontrollieren, fügen Sie in diesem Staat §H2 Militärfabrik§! hinzu und erhalten Sie eine kleine Menge §HInfanterieausrüstung§! und §HGezogene Artillerie§!.\n"
