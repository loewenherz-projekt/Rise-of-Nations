 early_motorised_infantry:0 "Frühe motorisierte Infanterie"
 motorised_infantry_desc:0 "Die neuen Fortschritte in der Kriegsführung während und nach dem Ersten Weltkrieg ermöglichten die Entwicklung neuer Ausrüstungstypen. Einer dieser Typen ermöglicht unseren Truppen, sich mit unvorhergesehener Geschwindigkeit zu bewegen und bietet ihnen auf dem Schlachtfeld große Flexibilität."

 night_vision3:0 "Nachtsicht III"
 night_vision3_desc:0 "Unsere neuen Infrarot-Zielfernrohre verfügen über eine größere Sichtweite. Diese Geräte machen die Effektivität von Nachteinsätzen äußerst effizient."

 oil_plant:0 "Ölpflanze"
 improved_oil_plant:0 "Verbesserte Ölpflanze"
 improved_oil_plant_desc:0 "Durch die Übertragung bisher experimenteller Destillationsmethoden auf großtechnische Verfahren können wir uns besser an die verfügbaren Materialien und Anforderungen anpassen."
 advanced_oil_plant:0 "Fortschrittliche Ölanlage"
 advanced_oil_plant_desc:0 "Neue experimentelle Reinigungstechniken wie Hydrotreating können bei der Ölherstellung eingesetzt werden, um das Endprodukt erheblich zu verbessern."
 advanced_oil_plant_2:0 "Fortschrittliche Ölanlage 2"
 advanced_oil_plant_2_desc:0 "Neue experimentelle Reinigungstechniken wie Hydrotreating können bei der Ölherstellung eingesetzt werden, um das Endprodukt erheblich zu verbessern."
 advanced_oil_plant_3:0 "Fortschrittliche Ölanlage 3"
 advanced_oil_plant_3_desc:0 "Neue experimentelle Reinigungstechniken wie Hydrotreating können bei der Ölherstellung eingesetzt werden, um das Endprodukt erheblich zu verbessern."
 strategic_bomber4:0 "Strategischer Bomber IV"
 early_landing_craft:0 "Frühe Landungsboote"
 early_landing_craft_desc:0 "Spezielle Invasionsschiffe machen die Landung in feindlichem Gebiet etwas weniger problematisch."
 advanced_early_landing_craft:0 "Fortgeschrittenes Frühlandungsboot"
 advanced_early_landing_craft_desc:0 "Durch die Weiterentwicklung unserer Landungsboote können wir schneller und besser landen."

