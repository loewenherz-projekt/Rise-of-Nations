kaiserschlachtvictory.265.t:0 "Einladung aus Deutschland"
kaiserschlachtvictory.265.d:0 "Wir haben eine Einladung aus Deutschland erhalten, der Deutsch-Chinesischen Hafenbehörde beizutreten. Diese soll alle deutschen Hafenkonzessionen in China beaufsichtigen und verwalten. Dies könnte unsere operative Effizienz und unser diplomatisches Ansehen in der Region verbessern. Sollten wir diese Einladung annehmen?"
kaiserschlachtvictory.265.a:0 "Nehmen Sie die Einladung an"
kaiserschlachtvictory.265.a:1 "Lehnen Sie die Einladung ab"

WW2_italy.7.t:0 "Wir ergeben uns!"
WW2_italy.7.d:0 "Nach der erfolgreichen Invasion Siziliens und dem Sturz Benito Mussolinis durch die neue Regierung unter Pietro Badoglio und Vitorio Emmanuel wurde am 3. September in Sizilien nach Geheimverhandlungen mit den Alliierten ein geheimer Waffenstillstand unterzeichnet, der nun offiziell verkündet wird. Es ist nur eine Frage der Zeit, bis die Italiener, die öffentlich erklärt haben, weiterhin an der Seite der Deutschen zu kämpfen, mit den Achsenmächten in Konflikt geraten. Da die Verhandlungen der neuen italienischen Regierung über den Waffenstillstand jedoch so lange gedauert haben, ist davon auszugehen, dass die Deutschen auf diesen baldigen groß angelegten Übertritt vorbereitet sein könnten."
WW2_italy.7.a:0 "Es ist Zeit, gegen Deutschland vorzugehen!"
WW2_italy.7.b:0 "Ich bin ein Spieler und habe keine Lust zu kapitulieren"
WW2_italy.8.t:0 "Mussolinis Sturz"
WW2_italy.8.d:0 "Am 25. Juli 1943 wurde Benito Mussolini von seinem eigenen Großen Rat abgewählt und verhaftet, als er ein Treffen mit König Vittorio Emanuele verließ, der dem Duce mitgeteilt hatte, der Krieg sei verloren, und ihn als Premierminister abgesetzt hatte. Berichten zufolge reagierte der Duce kaum, war benommen und unrasiert und protestierte. Er soll nun in einen geheimen Bereich gebracht werden, wo er bis Kriegsende gefangen gehalten wird."
WW2_italy.8.a:0 "Il Duce gibt es nicht mehr!"


canada_vanilla.1.title:0 "Ronnie, das Bren Gun Girl"
canada_vanilla.1.desc:0 "Rund eine Million kanadische Frauen traten während des Zweiten Weltkriegs ins Berufsleben ein. In den nationalen Medien wurden sie durch ein Symbol der Widerstandsfähigkeit und des Patriotismus repräsentiert: Veronica Foster, im Volksmund Ronnie, das Bren Gun Girl genannt. Sie arbeitete für John Inglis and Company in einer Waffenfabrik in Toronto, während ihre drei Brüder in Übersee kämpften. Die Plakate und Kurzfilme, in denen sie und andere Frauen wie sie an den Kriegsanstrengungen teilnahmen, inspirierten wahrscheinlich die bekanntere Medienkampagne um „Rosie the Riveter“ nach dem Kriegseintritt Amerikas."
canada_vanilla.1.opt:0 "„Fabrikarbeit ist nicht schwieriger als Hausarbeit“, heißt es in den Wochenschauen."



generic.19.t:1 "Ein dritter Forschungsplatz!"
generic.19.d:1 "Wir haben eine industrielle Basis aufgebaut und so kluge Köpfe angezogen und ausgebildet, um die Interessen unseres Landes zu fördern!"
generic.19.b:0 "Hurra!"
generic.20.t:1 "Ein vierter Forschungsplatz!"
generic.20.d:1 "Unser Land verfügt heute über eine Industrie, die mit der europäischen vergleichbar ist, und wir können es uns jetzt leisten, Wissenschaftler zu Forschungsarbeiten einzuladen!"
generic.20.b:0 "Hurra!"
generic.21.t:1 "Ein fünfter Forschungsplatz!"
generic.21.d:1 "Dank unserer renommierten Branche konnten wir viele kluge Köpfe gewinnen, die für uns arbeiten möchten."
generic.21.b:0 "Hurra!"


germany.258.t:0 "Hitlerjugend wächst"
germany.258.d:0 "Hitlers Reden und Machtdemonstrationen haben unsere Jugend stolz gemacht. Sie sind bereit, sich ohne Angst vor dem Tod in die Schlacht zu stürzen und kämpfen so gut wie ein dämlicher Kommunist. Die Hitlerjugend wird eingesetzt, um unsere Reihen zu füllen, während unsere Armee immer schwächer wird."
germany.258.a:0 "Sie wissen sehr gut, was die Alternative ist."


