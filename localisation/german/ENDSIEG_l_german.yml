ww2_germany.154.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.155.t:0 "Suez-Frage beantwortet, Deutschland sagt: „Verlasst den Suezkanal“"
ww2_germany.155.d:0 "Wir haben beschlossen, den Suezkanal und Ägypten vollständig unter britischer Kontrolle zu belassen, um anderswo weitere Zugeständnisse zu erwirken."
ww2_germany.155.a:0 "Fortfahren"
ww2_germany.155.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.156.t:0 "Vertrag von Gent, Teil II, Gibraltar"
ww2_germany.156.d:0 "Wenn wir Gibraltar für uns beanspruchen, könnte dies das letzte Zugeständnis sein, das wir Großbritannien machen können. \n\n Wenn wir die Kontrolle über Gibraltar an die Spanier zurückgeben, werden die Briten dies mit weitaus weniger Abneigung betrachten und wir könnten bestenfalls noch ein paar kleinere Zugeständnisse von den Briten erreichen."
ww2_germany.156.a:0 "Nehmen wir Gibraltar"
ww2_germany.156.b:0 "Gib Gibraltar an Spanien"
ww2_germany.156.c:0 "Verlassen Sie Gibraltar"
ww2_germany.157.t:0 "Deutschland sagt: „Nehmt Gibraltar“"
ww2_germany.157.d:0 "Wir haben uns entschieden, Gibraltar für uns zu beanspruchen, anstatt es vielleicht an Spanien abzutreten. Diese Option haben wir, weil wir den Suezkanal nicht beansprucht haben. Danach werden sich jedoch alle weiteren Zugeständnisse wahrscheinlich auf einige Mittelmeerinseln beschränken."
ww2_germany.157.a:0 "Fortfahren"
ww2_germany.157.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.158.t:0 "Deutschland sagt: „Gebt Gibraltar Spanien“"
ww2_germany.158.d:0 "Wir haben aus reiner Herzensgüte beschlossen, Gibraltar an seinen rechtmäßigen Eigentümer Spanien zurückzugeben. Dies wird als ein weitaus weniger aggressiver Ansatz angesehen und wir müssen noch einige kleine Entscheidungen über künftige geringfügige Zugeständnisse treffen."
ww2_germany.158.a:0 "Fortfahren"
ww2_germany.158.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.159.t:0 "Deutschland sagt: „Verlasst Gibraltar“"
ww2_germany.159.d:0 "Wir haben uns entschieden, Gibraltar seinem derzeitigen Eigentümer zu überlassen, in der Hoffnung, später anderswo weitere Konzessionen zu erhalten."
ww2_germany.159.a:0 "Fortfahren"
ww2_germany.159.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.160.t:0 "Vertrag von Gent, Teil II, Gibraltar"
ww2_germany.160.d:0 "Aufgrund anderer früherer Forderungen haben wir zwei Möglichkeiten: Gibraltar an Spanien abzutreten oder es den Briten zu überlassen. Die beste Option wäre, es den Spaniern zu überlassen, da es letztlich nicht in den Händen der Briten wäre, obwohl Spanien weiterhin eine unberechenbare Option bleibt."
ww2_germany.160.a:0 "Gib Gibraltar an Spanien"
ww2_germany.160.b:0 "Verlassen Sie Gibraltar"
ww2_germany.161.t:0 "Deutschland sagt: „Gebt Gibraltar Spanien“"
ww2_germany.161.d:0 "Wir haben uns aus reiner Herzensgüte dazu entschlossen, Gibraltar an seinen rechtmäßigen Besitzer Spanien zurückzugeben. Wir müssen jedoch noch einige kleine Entscheidungen über künftige kleinere Zugeständnisse treffen."
ww2_germany.161.a:0 "Fortfahren"
ww2_germany.161.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.162.t:0 "Deutschland sagt: „Verlasst Gibraltar“"
ww2_germany.162.d:0 "Wir haben uns entschieden, Gibraltar seinem derzeitigen Eigentümer zu überlassen, in der Hoffnung, später anderswo weitere Konzessionen zu erhalten."
ww2_germany.162.a:0 "Fortfahren"
ww2_germany.162.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.163.t:0 "Vertrag von Gent, Teil III, Malta"
ww2_germany.163.d:0 "Da wir Gibraltar nicht eingenommen haben, haben wir die Möglichkeit, Malta für uns selbst zu nehmen oder es, wenn wir uns dafür entscheiden, als Zeichen unserer Großzügigkeit Italien zu geben. Natürlich haben wir immer die Möglichkeit, Malta seinem derzeitigen Besitzer zu überlassen."
ww2_germany.163.a:0 "Nehmen wir Malta"
ww2_germany.163.b:0 "Gib Malta an Italien"
ww2_germany.163.c:0 "Malta verlassen"
ww2_germany.164.t:0 "Deutschland sagt: „Nehmt Malta“"
ww2_germany.164.d:0 "Wir haben beschlossen, Malta für uns zu beanspruchen, um eine weitere strategische Position im Mittelmeerraum zu haben."
ww2_germany.164.a:0 "Fortfahren"
ww2_germany.164.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.165.t:0 "Deutschland sagt: „Gebt Malta Italien“"
ww2_germany.165.d:0 "Aus reiner Großzügigkeit haben wir uns dazu entschieden, Malta aus britischer Hand in italienische Hände zu übergeben."
ww2_germany.165.a:0 "Fortfahren"
ww2_germany.165.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.166.t:0 "Deutschland sagt: „Verlasst Malta“"
ww2_germany.166.d:0 "Wir haben uns entschieden, Malta seinem derzeitigen Eigentümer zu überlassen, in der Hoffnung, anderswo weitere Konzessionen zu erhalten."
ww2_germany.166.a:0 "Fortfahren"
ww2_germany.166.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.167.t:0 "Vertrag von Gent, Teil III, Malta"
ww2_germany.167.d:0 "Da wir Gibraltar eingenommen haben, können wir Malta nicht für uns beanspruchen. Wenn wir möchten, können wir es jedoch als Zeichen unserer Großzügigkeit an Italien abgeben. So wird es am Ende zumindest nicht in den Händen der Briten sein. Natürlich haben wir immer noch die Möglichkeit, Malta seinem derzeitigen Besitzer zu überlassen."
ww2_germany.167.a:0 "Gib Malta an Italien"
ww2_germany.167.b:0 "Malta verlassen"
ww2_germany.168.t:0 "Deutschland sagt: „Gebt Malta Italien“"
ww2_germany.168.d:0 "Aus reiner Großzügigkeit haben wir uns dazu entschieden, Malta aus britischer Hand in italienische Hände zu übergeben."
ww2_germany.168.a:0 "Fortfahren"
ww2_germany.168.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.169.t:0 "Deutschland sagt: „Verlasst Malta“"
ww2_germany.169.d:0 "Wir haben uns entschieden, Malta seinem derzeitigen Eigentümer zu überlassen, in der Hoffnung, anderswo weitere Konzessionen zu erhalten."
ww2_germany.169.a:0 "Fortfahren"
ww2_germany.169.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.170.t:0 "Vertrag von Gent, Teil IV, Zypern"
ww2_germany.170.d:0 "Als letzte Handlungsoption können wir uns wahrscheinlich dafür entscheiden, die Insel Zypern für uns zu beanspruchen. Unsere türkischen Verbündeten würden es jedoch sehr begrüßen, wenn wir ihnen Zypern wieder übergeben könnten. Sie werden unsere Großzügigkeit sicherlich nicht vergessen. Natürlich haben wir immer noch die Möglichkeit, die Insel ihrem derzeitigen Besitzer zu überlassen."
ww2_germany.170.a:0 "Nehmen wir Zypern"
ww2_germany.170.b:0 "Transfer von Zypern in die Türkei"
ww2_germany.170.c:0 "Zypern verlassen"
ww2_germany.171.t:0 "Deutschland sagt: „Nehmt Zypern“"
ww2_germany.171.d:0 "Wir haben uns entschieden, Zypern für uns zu beanspruchen. Dadurch gewinnen wir eine weitere strategische Position im Mittelmeerraum, die wir später zu unserem Vorteil nutzen können. Natürlich sind die Türken mit dieser Entscheidung möglicherweise nicht zufrieden, aber wir hoffen, dass sie letztendlich darüber hinwegkommen werden."
ww2_germany.171.a:0 "Fortfahren"
ww2_germany.171.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.172.t:0 "Deutschland sagt: „Gebt Zypern der Türkei“"
ww2_germany.172.d:0 "Aus tiefstem Herzen haben wir uns dazu entschieden, Zypern wieder in türkische Hände zu geben, wo es unserer Ansicht nach rechtmäßig hingehört. Dies wird die Bindung zwischen unseren beiden Nationen für die Zukunft in dieser Nachkriegswelt weiter stärken."
ww2_germany.172.a:0 "Fortfahren"
ww2_germany.172.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.173.t:0 "Deutschland sagt: „Verlasst Zypern“"
ww2_germany.173.d:0 "Wir haben uns entschieden, Zypern seinem derzeitigen Eigentümer zu überlassen."
ww2_germany.173.a:0 "Fortfahren"
ww2_germany.173.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.174.t:0 "Vertrag von Gent, Teil IV, Zypern"
ww2_germany.174.d:0 "Als letzte Handlungsoption haben wir höchstwahrscheinlich die Wahl, Zypern entweder zu verlassen oder es unseren türkischen Verbündeten zu überlassen. Diese würden es sehr begrüßen, wenn wir ihnen Zypern wieder übergeben könnten. Sie werden unsere Großzügigkeit sicherlich nicht vergessen. Natürlich haben wir immer noch die Wahl, es bei seinem derzeitigen Besitzer zu belassen."
ww2_germany.174.a:0 "Transfer von Zypern in die Türkei"
ww2_germany.174.b:0 "Zypern verlassen"

ww2_germany.242.t:0 "Vertrag von Frankfurt"
ww2_germany.242.d:0 "Der Frieden von Frankfurt, unterzeichnet am 28. Juni 1919, genau fünf Jahre nach dem Tod von Erzherzog Franz Ferdinand, beendete offiziell den Kriegszustand zwischen Frankreich und den USA. Im Rahmen des Frankfurter Friedensvertrags musste Frankreich die Gebiete um Nancy und einen kleinen Teil der Champagne auf dem europäischen Festland abtreten. Deutschland besetzte jedoch auch Teile französischer Kolonialgebiete, vor allem in Mittelafrika, um seinen Mittelafrika-Plan umzusetzen. Auch Marokko wurde erobert. Insgesamt zwang der Vertrag Frankreich zur Abrüstung, zu verschiedenen Gebietszugeständnissen an Deutschland und zur Zahlung von Reparationen in Höhe von rund 100 Milliarden Mark. Viele Franzosen betrachteten dies als einen Stich in die Wunde der französischen Niederlage im Deutsch-Französischen Krieg von 1871."
ww2_germany.242.a:0 "Dreimal Hurras für den Sieg!"
ww2_germany.243.t:0 "Vertrag von Gent"
ww2_germany.243.d:0 "Der Vertrag von Gent, der am 15. Juli 1919 von den Mittelmächten auf der einen und Großbritannien und Belgien auf der anderen Seite unterzeichnet wurde, erwies sich als ein ganz anderer Vertrag. Anders als Frankreich, das vor der totalen Kapitulation stand, da es sich auf derselben Landmasse wie Deutschland befand, verfügte Großbritannien immer noch über die größte Marine der Welt, die Deutschland nicht schlagen konnte, zumindest nicht jetzt. Trotzdem stimmte Großbritannien der Abtretung von Territorium nur unter der Bedingung zu, dass das belgische Festland frei und unabhängig von jeglichem deutschen Einfluss blieb, was Deutschland dazu veranlasste, in Europa kleinere territoriale Zugeständnisse zu machen und ganz Belgisch-Kongo einzunehmen. In Afrika eroberte Deutschland höchstens den Suezkanal, da die Briten immer noch großen Einfluss auf die Deutschen hatten. Als Gegenleistung für die deutsche Eroberung des Suezkanals erhielten die Briten im Gegensatz zu ihrem französischen Gegenstück keine nennenswerten Reparationen, da die Briten der Erweiterung der deutschen Flotte durch Großbritannien zugestimmt hatten."
ww2_germany.243.a:0 "Es ist fair genug ..."
ww2_germany.244.t:0 "Vertrag von Konstantinopel"
ww2_germany.244.d:0 "Der Vertrag von Konstantinopel wurde am 25. August 1919 von den Mittelmächten auf der einen und Griechenland auf der anderen Seite unterzeichnet. Da Griechenland erst so spät in den Krieg eingetreten war, fielen die Gegenreaktionen nicht so heftig aus wie gegenüber Frankreich oder Großbritannien. Es wurden kleinere Zugeständnisse gemacht, wie etwa die Übergabe ganz Thrakiens an Bulgarien und einiger Ägäischer Inseln an die Osmanen. Außerdem wurde Alexander I. abgesetzt und durch seinen zuvor abgesetzten Vater Konstantin I. ersetzt, der mit dem Deutschen Reich sympathisiert hatte."
ww2_germany.244.a:0 "Großartig!"
ww2_germany.245.t:0 "Vertrag von Sarajevo"
ww2_germany.245.d:0 "Der Vertrag von Sarajevo wurde am 10. September 1919 von den Mittelmächten auf der einen und Serbien und Montenegro auf der anderen Seite unterzeichnet. Der Vertrag von Sarajevo war sehr hart, da Serbien und Montenegro kapituliert hatten und drei Jahre zuvor de facto aufgehört hatten zu existieren. Serbien wurde aus „Sicherheitsgründen“ zu einem kleinen Rumpfstaat degradiert und stand weitgehend unter der Kontrolle des österreichisch-ungarischen Militärs. Auch Montenegro wurde de facto zu einer dauerhaften Marionette Österreich-Ungarns. Bulgarien erhielt den größten Teil des serbischen Mazedoniens, das es bereits während der Hälfte des Krieges kontrolliert hatte."
ww2_germany.245.a:0 "Das passiert, wenn man den Erzherzog tötet!"
ww2_germany.246.t:0 "Vertrag von Innsbruck"
ww2_germany.246.d:0 "Der Vertrag von Innsbruck wurde am 5. August 1919 von den Mittelmächten auf der einen und dem Königreich Italien auf der anderen Seite unterzeichnet. Bei diesen Friedensverhandlungen herrschte zwischen beiden Seiten eine deutlich ausgeprägte Hassstimmung, da Italien den geschlossenen Dreibundpakt vertrat. Der Vertrag war jedoch hinsichtlich der Landnahme nicht allzu streng, da Österreich-Ungarn den Staat Venetien annektierte. Das Königreich Italien war daraufhin gezwungen, Deutschland in Bezug auf Handel und Schifffahrt die Meistbegünstigung zu gewähren und eine Summe von 30 Milliarden Mark als Reparationen zu zahlen."
ww2_germany.246.a:0 "Diese Verräter haben es verdient!"
ww2_germany.247.t:0 "Korsika-Frage"
ww2_germany.247.d:0 "Was Korsika betrifft, könnten wir nett sein und versuchen, Italien dazu zu bringen, die wirtschaftliche und politische Dominanz Deutschlands in Europa zu akzeptieren, indem wir ihnen als Gegenleistung für die bittere Überraschung Korsika von Frankreich anbieten. Wir könnten es aber auch einfach den Franzosen überlassen."
ww2_germany.247.a:0 "Gib Korsika Italien"
ww2_germany.247.b:0 "Überlassen Sie es Frankreich"
ww2_germany.248.t:0 "Kuwait-Frage"
ww2_germany.248.d:0 "Kuwait im äußersten Süden des Irak könnte von uns als strategischer Hafen genutzt werden. Allerdings wäre es jetzt wahrscheinlich nicht mehr so wichtig, da uns der Großteil Mittelafrikas gehört. Schaden würde es aber nicht. Andererseits könnten wir immer fair und gerecht sein und es dem Osmanischen Reich zurückgeben, das die Rückgabe dieses Gebiets vom britischen Imperialismus sicherlich zu schätzen wüsste."
ww2_germany.248.a:0 "Nehmen wir Kuwait"
ww2_germany.248.b:0 "Gebt Kuwait den Türken"
ww2_germany.249.t:0 "Japanische Frage"
ww2_germany.249.d:0 "Die Japaner wurden ebenso wie die Briten durch ihren Inselstatus, ihre Marine und die relative Entfernung zu Deutschland sowie ihre Kontrolle über alle unsere asiatischen Kolonien vor einem weitgehend demütigenden und lähmenden Friedensvertrag bewahrt. Wir könnten unseren Konflikt mit Japan zwar einfach dadurch beenden, dass wir unsere asiatischen Kolonien widerwillig und mit säuerlicher Haltung abtreten, aber wir könnten uns auch mit den Japanern gut stellen und ihnen zusätzlich Französisch-Indochina anbieten. Dies würde nicht nur die guten Beziehungen zwischen unseren beiden Nationen festigen und zeigen, dass Deutschland kein Feind Japans ist, sondern die Japaner werden wahrscheinlich in ein oder zwei Jahrzehnten danach streben, die britischen Kolonien im Pazifik zu kontrollieren. Zusammen mit unserer beider Seemacht könnten wir dieses Imperium zu Grabe tragen, sollte es dazu kommen."
ww2_germany.249.a:0 "*Salty Yermans* Nimm Indochina"
ww2_germany.249.b:0 "Übergebt Indochina an Japan"
ww2_germany.250.t:0 "Drang Nach Osten"
ww2_germany.250.d:0 "Da der Krieg in Europa offiziell zu Ende ist, ist es an der Zeit, dass wir unseren Blick ein letztes Mal gen Osten richten und die barbarischen Bolschewiken niederschlagen, solange sie noch in der Wiege liegen. Wenn wir jetzt nicht schnell handeln und sie loswerden, könnten wir später mit ernsten Konsequenzen konfrontiert werden, und es besteht die Gefahr, dass sich die „rote Pest“ auf Deutschland selbst ausbreitet. \n\n Wir haben gesehen, wozu sie fähig sind. Das rote Biest zeigt keine Gnade und kümmert sich nicht um Menschenleben. Es ist unsere Aufgabe, sie aus dieser Welt zu holen, so wie wir sie in sie gebracht haben."
ww2_germany.250.a:0 "Die Revolution soll niedergeschlagen werden!"
ww2_germany.250.b:0 "Ich bin ein dreckiger bolschewistischer Wichser und mag den Kommunismus"
ww2_germany.251.t:0 "Sowjetrussland kapituliert!"
ww2_germany.251.d:0 "Mit der Einnahme Moskaus durch deutsche Truppen ist die bolschewistische Regierung unter dem Druck der Ostfront und der weißrussischen Streitkräfte offiziell zusammengebrochen. Alexander Koltschak, der als oberster Herrscher Russlands gilt, wird vorübergehend die Leitung des Landes übernehmen. Viele unserer Politiker haben diesen Schritt in Frage gestellt, da Koltschak seine Kontrolle über das riesige Russland möglicherweise nicht aufgeben möchte. \n\n Das Schicksal und die Zukunft Russlands hängen jedoch von unserem Handeln und der Entscheidung ab, wen und welche Regierung wir einsetzen."
ww2_germany.251.a:0 "Russland hängt in der Schwebe ..."
ww2_germany.252.t:0 "Vertrag von Moskau"
ww2_germany.252.d:0 "Der Vertrag von Moskau wurde heute von der russischen Übergangsregierung unterzeichnet und beinhaltete geringfügige Änderungen, wie die Gründung der Volksrepublik Kuban und der Bergrepublik."
ww2_germany.252.a:0 "Gut"
ww2_germany.253.t:0 "Japan Wladiwostok geben?"
ww2_germany.253.d:0 "Wenn wir angesichts des britischen Kolonialismus und der britischen Seemacht ein gutes Verhältnis zu den Japanern haben und uns möglicherweise in Zukunft mit ihnen verbünden möchten, könnten wir ihnen das Gebiet von Wladiwostok anbieten, auf das die Japaner ein Auge geworfen haben."
ww2_germany.253.a:0 "Gib ihnen Wladiwostok"
ww2_germany.253.b:0 "Auf keinen Fall"
ww2_germany.254.t:0 "Wer wird Russland regieren?"
ww2_germany.254.d:0 "Nach dem Abschluss des Moskauer Vertrags bleibt nur noch die Frage zu klären: Wer wird Russland regieren? \n\n Wir könnten Alexander Kerenski erneut ins Amt wählen und ihn zum Präsidenten einer demokratischen Russischen Republik machen. Das käme uns gelegen, da Russland höchstwahrscheinlich ein Rumpfstaat bleiben wird, der sich nur sehr langsam von den Verletzungen des Ersten Weltkriegs und des Bürgerkriegs erholt. \n\n Wir könnten Koltschak immer noch an der Macht lassen, doch anders als bei diesem gäbe es hierfür viele Möglichkeiten, und Koltschak wäre unberechenbar. Es gäbe viele verschiedene Wege für Russland, die für uns gut oder schlecht sein könnten … \n\n Andererseits könnten wir die Monarchie immer noch wiederherstellen, doch das wäre keine gute Idee, da die Legitimität der monarchistischen Regierung seit Nikolaus II.‘ schrecklichem Umgang mit dem Ersten Weltkrieg den Bach runtergeht. Sie würde höchstwahrscheinlich durch einen bevorstehenden Putsch ausgelöscht werden, der praktisch jeden an der Macht lassen könnte. \n\n Schließlich könnten wir immer noch einen Sohn des Kaisers auf den Thron setzen. Wie bei letzterem könnte die Monarchie jedoch durch einen Putsch ausgelöscht werden, vielleicht sogar schneller, da das russische Volk höchstwahrscheinlich keinen ausländischen Herrscher tolerieren würde, der sich offiziell im Krieg mit ihm befindet. Dies lässt die gleiche Möglichkeit offen, dass praktisch jeder in Russland nach einem Putsch an die Macht kommt. \n\n Denken Sie daran ... Murphys Gesetz: Alles, was schiefgehen kann, wird schiefgehen."
ww2_germany.254.a:0 "Installieren Sie Kerensky neu"
ww2_germany.254.b:0 "Halten Sie Kolchak"
ww2_germany.254.c:0 "Monarchy neu installieren"
ww2_germany.254.dd:0 "Installieren Sie einen deutschen Prinzen"
ww2_germany.255.t:0 "Polnischer Grenzstreifen annektiert"
ww2_germany.255.d:0 "Nach dem Ende des Ersten Weltkriegs wurden die Pläne deutscher Politiker, einen bis zu 30.000 km² großen Grenzstreifen vom Königreich Polen abzutrennen – etwa so groß wie Belgien – endlich in die Tat umgesetzt. Es wird erwartet, dass mit der Annexion dieses Gebiets die rund drei Millionen polnischen Einwohner gewaltsam vertrieben werden, um Platz für deutsche Siedler zu schaffen und so die polnischen Bewohner des preußischen Großpolens von denen in Kongresspolen zu trennen."
ww2_germany.255.a:0 "Tolle Neuigkeiten!"
ww2_germany.256.t:0 "Ägyptische Revolution von 1919"
ww2_germany.256.d:0 "Die ägyptische Revolution von 1919 hat sich in unserem Protektorat Anglo-Ägyptisch-Sudan ausgebreitet. Viele Ägypter und Sudanesen haben nach unserer faktischen Niederlage im Ersten Weltkrieg und ihrem Anführer Saad Zagloul die Waffen gegen das Britische Empire erhoben und die Anerkennung der ägyptischen Unabhängigkeit sowie der ägyptischen Souveränität über den Sudan gefordert. Es ist jedoch unwahrscheinlich, dass sich die Regierung kampflos mit ihnen arrangieren wird."
ww2_germany.256.a:0 "Was für eine Katastrophe!"
ww2_germany.257.t:0 "Unterstützen Sie die Unabhängigkeit Ägyptens"
ww2_germany.257.d:0 "Angesichts der im anglo-ägyptischen Sudan beginnenden Bewegung zur Unabhängigkeit Ägyptens könnten wir durchaus davon profitieren, die Ägypter zu beliefern, um ihre Unabhängigkeit vom Vereinigten Königreich zu sichern. Auf diese Weise müssen wir uns nicht mehr so viele Sorgen darüber machen, dass der Suezkanal von den Briten im Nachbarland bedroht wird ..."
ww2_germany.257.a:0 "Versorge die Ägypter"
ww2_germany.257.b:0 "Deutschland nimmt neutrale Haltung ein"
ww2_germany.258.t:0 "Hitlerjugend nimmt an der Armee teil"
ww2_germany.258.d:0 "Heute hat Adolf Hitler zur Freude unseres Volkes verfügt, dass die Hitlerjugend eine größere Rolle in der Armee spielen wird. Sie ist ebenso kämpferisch wie effizient und wird unsere Frontlinie gut verstärken."
ww2_germany.258.a:0 "Das sollte nicht nötig sein ..."
ww2_germany.259.t:0 ""
ww2_germany.259.d:0 ""
ww2_germany.259.a:0 ""
kaiserschlachtvictory.259.t:0 "Die Deutsch-Chinesische Hafenbehörde-Initiative"
kaiserschlachtvictory.259.d:0 "Wir haben die Möglichkeit, unsere chinesischen Hafenkonzessionen in einer einzigen Organisation zu bündeln: der Deutsch-Chinesischen Hafenbehörde. Diese Organisation würde alle unsere Hafenkonzessionen in China beaufsichtigen und verwalten und so die Handelseffizienz und den diplomatischen Einfluss steigern. Um ihre Legitimität zu stärken und die internationale Zusammenarbeit zu fördern, könnten wir erwägen, mehrere wichtige Nationen zur Teilnahme an dieser Initiative einzuladen. Sollten wir diesen Plan umsetzen?"
kaiserschlachtvictory.259.a:0 "Fortsetzung der Initiative der Deutsch-Chinesischen Hafenbehörde"
kaiserschlachtvictory.259.b:0 "Nicht fortfahren"

kaiserschlachtvictory.260.t:0 "Einladung nach Japan"
kaiserschlachtvictory.260.d:0 "Japan wäre mit seiner starken Präsenz in der Region ein wertvoller Partner für die Deutsch-Chinesische Hafenbehörde. Sein Engagement könnte die operative Effizienz und das diplomatische Ansehen der Organisation stärken. Japans Ambitionen könnten jedoch zu Interessenkonflikten führen."
kaiserschlachtvictory.260.a:0 "Japan einladen"
kaiserschlachtvictory.260.b:0 "Laden Sie Japan nicht ein"

kaiserschlachtvictory.261.t:0 "Einladung nach Österreich"
kaiserschlachtvictory.261.d:0 "Als enger Verbündeter Österreichs würde eine Beteiligung an der Deutsch-Chinesischen Hafenbehörde eine starke mitteleuropäische Einheit symbolisieren. Dies könnte jedoch als Vetternwirtschaft angesehen werden und die Unparteilichkeit der Organisation beeinträchtigen."
kaiserschlachtvictory.261.a:0 "Österreich einladen"
kaiserschlachtvictory.261.b:0 "Österreich nicht einladen"

kaiserschlachtvictory.262.t:0 "Einladung nach Frankreich"
kaiserschlachtvictory.262.d:0 "Die Einladung Frankreichs, der Deutsch-Chinesischen Hafenbehörde beizutreten, könnte den Weg für verbesserte Beziehungen und eine bessere Zusammenarbeit ebnen. Historische Spannungen könnten diese Entscheidung jedoch umstritten machen."
kaiserschlachtvictory.262.a:0 "Frankreich einladen"
kaiserschlachtvictory.262.b:0 "Frankreich nicht einladen"

kaiserschlachtvictory.263.t:0 "Einladung nach Großbritannien"
kaiserschlachtvictory.263.d:0 "Die globale Reichweite und der Einfluss Großbritanniens würden das Ansehen und die operative Leistungsfähigkeit der Deutsch-Chinesischen Hafenbehörde deutlich steigern. Ihr Engagement könnte jedoch unsere Führungsrolle in den Schatten stellen."
kaiserschlachtvictory.263.a:0 "Laden Sie das Vereinigte Königreich ein"
kaiserschlachtvictory.263.b:0 "Laden Sie das Vereinigte Königreich nicht ein"

kaiserschlachtvictory.264.t:0 "Einladung nach Russland"
kaiserschlachtvictory.264.d:0 "Russlands enorme Ressourcen und strategischen Interessen in Asien machen die Beteiligung des Landes an der Deutsch-Chinesischen Hafenbehörde äußerst vorteilhaft. Allerdings könnten seine Ambitionen die Beziehungen zu anderen Mitgliedern erschweren."
kaiserschlachtvictory.264.a:0 "Russland einladen"
kaiserschlachtvictory.264.b:0 "Laden Sie Russland nicht ein"

kaiserschlachtvictory.267.t:0 "Einladung nach Portugal"
kaiserschlachtvictory.267.d:0 "Portugal hat Interesse daran gezeigt, seinen Einfluss in China auszuweiten. Eine Einladung Portugals, der Deutsch-Chinesischen Hafenbehörde beizutreten, könnte unsere diplomatischen Beziehungen stärken und unserer Initiative zusätzliche Ressourcen verschaffen. Allerdings könnte die Beteiligung Portugals die Beziehungen zu anderen Ländern erschweren."
kaiserschlachtvictory.267.a:0 "Portugal einladen"
kaiserschlachtvictory.267.b:0 "Portugal nicht einladen"

kaiserschlachtvictory.266.t:0 "Einladung aus Deutschland"
kaiserschlachtvictory.266.d:0 "Wir haben eine Einladung aus Deutschland erhalten, der Deutsch-Chinesischen Hafenbehörde beizutreten. Diese soll alle deutschen Hafenkonzessionen in China beaufsichtigen und verwalten. Dies könnte unsere operative Effizienz und unser diplomatisches Ansehen in der Region verbessern. Sollten wir diese Einladung annehmen?"
kaiserschlachtvictory.266.a:0 "Nehmen Sie die Einladung an"
kaiserschlachtvictory.266.b:0 "Lehnen Sie die Einladung ab"


