 ### MODERN DAY DOCTRINES
 
 #Land Doctrines
 TITLE_LEGACY_DOCTRINES:0 "Vermächtnislehren"
 LEGACY_DOCTRINES_TITLE:0 "Legacy-Doktrinen sind Doktrinen aus der Zeit des Kalten Krieges, die noch immer einen spürbaren Einfluss auf das moderne militärische Denken haben."
 legacy_doctrines_MD:0 "Vermächtnislehren"
 legacy_doctrines_MD_desc:0 "Legacy-Doktrinen sind Doktrinen aus der Zeit des Kalten Krieges, die noch heute einen spürbaren Einfluss auf das moderne militärische Denken haben. Obwohl sich Doktrinen im Laufe der Zeit ändern, ist die Vergangenheit in jeder Streitmacht tief verwurzelt."
 modern_blitzkrieg_MD:0 "Moderner Blitzkrieg"
 modern_blitzkrieg_MD_desc:0 "Die deutsche Blitzkrieg-Doktrin war in der Anfangsphase des Zweiten Weltkriegs unglaublich erfolgreich und wurde von vielen kopiert. Sie entwickelte sich zu einer tragenden Säule des strategischen Denkens im Kalten Krieg – insbesondere in NATO-Kreisen. Ihr Ziel ist die Konzentration mobiler Streitkräfte, die kontinuierlich in feindliches Gebiet vordringen und dabei feindliche Stützpunkte meiden."
 forward_defense_MD:0 "Vorwärtsverteidigung"
 forward_defense_MD_desc:0 "Um der Bedrohung durch sowjetische Panzer, die Westeuropa überrannten, entgegenzuwirken, entwickelten die NATO-Strategen die Doktrin der Vorwärtsverteidigung. Vorgeplante Verteidigungskräfte, bewaffnet mit Panzerabwehr- und Flugabwehrwaffen, sollten den ersten Vorstoß abwehren, während Reserven dahinter mobilisiert würden. Die Idee dahinter war, dass die ersten Schlachten gigantischen Ausmaßes den Ausgang des Krieges entscheiden würden, weshalb der Großteil der aktiven Streitkräfte so nah wie möglich an der Front stationiert werden sollte."
 encourage_nco_iniative_MD:0 "Unteroffiziersinitiative fördern"
 encourage_nco_iniative_MD_desc:0 "Die westliche Militärtheorie förderte die Initiative der Unteroffiziere (untere Kommandoebene) und betrachtete sie als Rückgrat ihrer Armeen. In sich schnell ändernden Situationen konnte ein Unteroffizier Chancen auf dem Schlachtfeld nutzen, die ihm sonst entgehen würden, da er nicht die gesamte Befehlskette durchlaufen musste."
 air_land_battle_MD:0 "Luft-Land-Schlacht"
 air_land_battle_MD_desc:0 "Bei AirLand Battle lag der Schwerpunkt auf der engen Koordination der Landstreitkräfte, die als aggressiv manövrierende Verteidigung agierten. Die Luftstreitkräfte griffen die nachrückenden Truppen an, die die gegnerische Frontlinie verstärkten, und entlasteten so den Hauptvorstoß des Feindes. Ziel war es, den Feind aufzuhalten und so ein Zeitfenster zu schaffen, in dem die Fronttruppen besiegt werden konnten, während gleichzeitig die Nachhut schwer beschädigt wurde."
 grand_battleplan_MD:0 "Großer Schlachtplan"
 grand_battleplan_MD_desc:0 "Die Grand-Battleplan-Doktrin befürwortet eine umfassende Vorplanung jeder Kampfphase, da die Seite mit der besten Planung siegen wird. Richtig umgesetzt, kann sie sehr wirkungsvoll sein, da sich die Truppen auf die Perfektionierung ihres Planaspekts konzentrieren können und gleichzeitig gemeinsame Operationen mit Streitkräften möglich sind, die nicht in der Lage sind, sich in Echtzeit zu koordinieren. Gute Planung vermeidet zwar logistische Probleme, ist aber langsam, reduziert die Initiative und bietet angesichts einer unbeständigen Frontlinie keine wirkliche Flexibilität."
 rigid_hierarchy_MD:0 "Starre Hierarchie"
 rigid_hierarchy_MD_desc:0 "Angesichts der berechtigten Angst, dass die eigene Armee die größte Bedrohung für das Überleben des Regimes darstellt, wurden Kommandopositionen oft aus politischer Loyalität statt aus Kompetenz besetzt. Große Schießübungen fanden in der Regel nicht statt. Darüber hinaus wurden Entscheidungen zentralisiert, was sie angesichts sich entwickelnder Bedrohungen langsam und unflexibel machte."
 praetorian_guard_MD:0 "Prätorianer"
 praetorian_guard_MD_desc:0 "Da die politische Führung die Armee auf den Schutz des Regimes konzentrierte, wurden separate Eliteeinheiten mit ideologisch ausgewählten und ausgebildeten Berufssoldaten gebildet. Diese erhielten die besten Waffen und die beste Ausbildung und waren daher bestens aufgestellt, um die politische Führung vor Aufständen und Putschversuchen der regulären Wehrpflichtarmee zu schützen."
 armoured_mass_assault_MD:0 "Massenpanzerangriff"
 armoured_mass_assault_MD_desc:0 "Der Massenpanzerangriff, der nach dem sowjetischen Konzept der „Tiefenschlacht“ konzipiert wurde, legte den Schwerpunkt auf die Zusammenarbeit kombinierter Waffen, offensive Aktionen und schwer gepanzerte Stoßeinheiten. Langsamere, feuerstarke Einheiten führten mehrere Angriffe an einer Front durch, um die gegnerische taktische Zone zu durchbrechen. Gleichzeitig wurden hochmobile Panzer- und mechanisierte Kräfte in Reserve gehalten, die an die Front vorrückten, sobald Lücken entstanden. Dies unterscheidet sich vom Blitzkrieg, der sich auf einzelne Schwachstellen statt auf mehrere Kontaktpunkte konzentriert."
 deep_echelon_advance_MD:0 "Deep Echelon Advance"
 deep_echelon_advance_MD_desc:0 "Nachdem erfolgreich Lücken in den feindlichen Linien geschaffen wurden, griffen mehrere schwer gepanzerte Stoßtruppen mit hoher Geschwindigkeit in den Rücken des Feindes vor und umgingen dabei starke Punkte des feindlichen Widerstands. So konnten sie den Vorstößen der weniger schweren Infanterie folgen. Ziel war es, feindliches Gebiet mit halsbrecherischer Geschwindigkeit einzunehmen und so Bedingungen zu schaffen, unter denen der Feind die Bereitschaft zur operativen Verteidigung verlor."
 army_group_operational_freedom_MD:0 "Heeresgruppe Operative Freiheit"
 army_group_operational_freedom_MD_desc:0 "Obwohl die sowjetische Doktrin eine starre taktische Aufstellung vorsah, gewährte sie den Heeresgruppenformationen erhebliche operative Freiheiten und ermöglichte den Bodenkommandeuren schnelle Entscheidungen. Diese Freiheit war damals größer als bei den NATO-Streitkräften, erstreckte sich jedoch nicht auf untergeordnete Offiziere und Kommandeure."
 massed_artillery_MD:0 "Massierte Artillerie"
 massed_artillery_MD_desc:0 "Durch den Einsatz großer Mengen regulärer Artillerie und Raketenartillerie, die auf die feindliche Front konzentriert wurden, hoffte man, deren normale Funktionen zu unterbrechen und zu stören. Der Einsatz solcher Artillerie in großer Zahl reduzierte zudem den Bedarf an Luftunterstützung. Aufgrund der schieren Übermacht bezeichneten viele sowohl die russische als auch die sowjetische Armee als „Artilleriearmee mit Panzern“."
 infiltration_assault_MD:0 "Infiltrationsangriff"
 infiltration_assault_MD_desc:0 "Bei der Infiltrationsangriffsdoktrin wird nächtliches Eindringen hinter feindliche Stützpunkte verwendet, um Überraschungsangriffe auf normalerweise gut verteidigte Stellungen erfolgreich zu machen, indem man sie von Verstärkungen abschneidet."
 defence_in_depth_MD:0 "Tiefenverteidigung"
 defence_in_depth_MD_desc:0 "Bei der Tiefenverteidigung, oft auch „elastische Verteidigung“ genannt, geht es darum, den Vormarsch des Feindes zu verzögern, anstatt ihn gänzlich zu verhindern. Versorgungsdepots und vorgefertigte Befestigungen sollten ebenso wie der Großteil der Streitkräfte weit entfernt von der Front platziert werden. Durch Zeitgewinn und zusätzliche Verluste beim Feind durch Raumgewinn wird der Vormarsch des Feindes durch die Zermürbung geschwächt."
 armoured_counterpunch_MD:0 "Gepanzerter Gegenschlag"
 armoured_counterpunch_MD_desc:0 "Aufbauend auf der Strategie der Tiefenverteidigung geht es bei dieser Strategie darum, zu günstigen Zeitpunkten erhebliche Panzertruppen einzusetzen, um Vorstöße in tiefere Staffeln abzuschneiden und so einen entscheidenden Sieg zu erringen. Solche Konzentrationen sind jedoch anfällig für feindliche Luftangriffe."
 frontline_defence_MD:0 "Frontlinienverteidigung"
 frontline_defence_MD_desc:0 "Wenn wir den Großteil der im Voraus geplanten Verteidigungskräfte so nah wie möglich an der Grenze zusammenziehen, haben wir die größte Chance, unser Territorium zu verteidigen. Dies ist von entscheidender Bedeutung, wenn wir nur über ein begrenztes Rückzugsgebiet verfügen."
 early_Tunnel_Warfare_MD:0 "Frühe Tunnelkriegsführung"
 early_Tunnel_Warfare_MD_desc:0 "Der Bau ausgedehnter unterirdischer Tunnelnetze ermöglicht verdeckte Nachschubversorgung, Truppenverlagerungen und eine bessere Verteidigung durch Hinterhalte. So können unsere Truppen ruhen, ohne der feindlichen Luftwaffe ausgesetzt zu sein."
 guerilla_specialisation_MD:0 "Guerilla-Spezialisierung"
 guerilla_specialisation_MD_desc:0 "Ziel des Guerillakriegs ist es, die militärische Überlegenheit des Gegners zu brechen, indem man ihm direkte Kampfhandlungen verwehrt, außer in den wenigen Gebieten, in denen durch Geländevorteile oder Hinterhalte Gleichstand erreicht werden kann. Außerdem zielt man darauf ab, den Feind durch Angriffe auf leichtere Ziele, wie etwa Versorgungskonvois, einer ständigen Zermürbung auszusetzen."
 Century_Re_Evaluation_MD:0 "Neubewertung im 21. Jahrhundert"
 Century_Re_Evaluation_MD_desc:0 "Das Ende des Kalten Krieges verschaffte den Militärplanern auf der ganzen Welt den nötigen Freiraum, um neue Doktrinen für die Zukunft auszuwählen."
 TITLE_NETWORK:0 "Netzwerkzentrierte Kriegsführung"
 NETWORK_CENTRIC_WARFARE_TITLE:0 "Bei der netzwerkzentrierten Kriegsführung geht es darum, alle Aspekte der Kriegsführung mit hochentwickelten Computernetzwerken zu verknüpfen, um aus der Informationsüberlegenheit eine umfassende Dominanz der Kriegsführung zu machen."																																																						 
 Network_Centric_Warfare_MD:0 "Netzwerkzentrierte Kriegsführung"
 Network_Centric_Warfare_MD_desc:0 "Die netzwerkzentrierte Kriegsführung wurde in den 90er Jahren von den USA entwickelt. Sie basiert auf der Einführung von Kommando- und Kontrollsystemen sowie intelligenten Sensoren auf immer niedrigeren Ebenen der Streitkräfte. Dies ermöglicht Entscheidungsträgern und Kampftruppen ein verbessertes Lagebewusstsein sowie eine schnelle Zielerfassung mithilfe von Supercomputern und verkürzt so die Planungszeiten."
 TITLE_DECENTRALIZED:0 "Dezentrale Kriegsführung"
 DECENTRALIZED_WARFARE_TITLE:0 "Durch die Dezentralisierung von Kommandostrukturen und die Ausweitung des Informationskriegs auf alle Bereiche der Gesellschaft kann man dem Feind die Lagewahrnehmung vorenthalten und sich so lokale operative Vorteile verschaffen."
 Decentralized_Warfare_MD:0 "Dezentrale Kriegsführung"
 Decentralized_Warfare_MD_desc:0 "Die dezentrale und asymmetrische Kriegsführung wurde vom Iran und Russland vorangetrieben. Sie geht davon aus, dass ein Konflikt mit einem vernetzten und technologisch überlegenen Gegner die Kommando- und Kontrollstrukturen lahmlegen kann. Die Antwort darauf ist die Umwandlung in kleinere Militäreinheiten mit unabhängigen Entscheidungs- und Kommandostrukturen, um kampffähig zu bleiben. Dabei wird großer Wert auf alternative Kriegsführung und eine enge Abstimmung mit befreundeten lokalen Kräften gelegt, um einen Informationsvorteil zu erlangen."
 TITLE_GUERILLA:0 "Guerillakrieg"
 GUERILLA_WARFARE_TITLE:0 "Indem wir einem überlegenen Feind eine entscheidende Schlacht verwehren und stattdessen seine Unterstützungsstrukturen angreifen, werden wir ihn zwingen, sich in kleinere Einheiten aufzuteilen, die wir überraschen können. Indem wir die Grenzen zwischen Kämpfern und Zivilisten verwischen, verbreiten wir Chaos und demoralisieren den Feind, sodass er seine Niederlage eingesteht."
 Guerilla_Warfare_MD:0 "Guerillakrieg"
 Guerilla_Warfare_MD_desc:0 "Guerillakrieg ist weit verbreitet und wird von nichtstaatlichen Akteuren eingesetzt. Ziel ist es, die militärische Überlegenheit des Gegners zu brechen, indem ihm direkte Kampfhandlungen verwehrt werden, außer in den wenigen Gebieten, in denen aufgrund des Geländes oder von Hinterhalten Gleichstand erreicht werden kann. Im Kampf um ein politisches Ziel werden nichtmilitärische Mittel wie psychologische Kriegsführung eingesetzt, um die Stabilität und den Kampfeswillen des Gegners zu schwächen. Ironischerweise können wir durch die Verbreitung von Chaos Unterstützung für uns selbst aufbauen und so als einzige stabile Alternative für die Gesellschaft dienen."
 Civilian_Infiltration_MD:0 "Zivile Infiltration"
 Civilian_Infiltration_MD_desc:0 "Der Kern jedes erfolgreichen Aufstands besteht darin, sich in die allgemeine Bevölkerung einzufügen, sowohl zum Schutz als auch als Rekrutierungsbasis, sodass ein gezieltes, chirurgisches Vorgehen gegen den Aufstand unmöglich ist."
 Drug_Manufacture_MD:0 "Arzneimittelherstellung"
 Drug_Manufacture_MD_desc:0 "Jeder Aufstand braucht Geld und durch die Kontrolle der Herstellung und des Vertriebs illegaler Drogen lassen sich große Einnahmen erzielen."
 Ideological_Purity_MD:0 "Ideologische Reinheit"
 Ideological_Purity_MD_desc:0 "Durch den Verzicht auf mögliche Einnahmen aus Drogen kann eine moralische Überlegenheit gegenüber dem Gegner erreicht werden. Die Organisation wird außerdem davor geschützt, dass ihre Ziele durch Gier vereinnahmt werden, und erreicht die ideologische Reinheit, die für den Erfolg erforderlich ist."
 Social_Services_MD:0 "Sozialdienste"
 Social_Services_MD_desc:0 "Indem wir den Mangel an staatlichen Dienstleistungen oder unsere eigene Störung dieser Dienstleistungen ausnutzen, können die Sozialdienste dazu genutzt werden, die Loyalität der Bevölkerung an uns zu binden."
 Human_Shield_MD:0 "Menschlicher Schutzschild"
 Human_Shield_MD_desc:0 "Dank der Loyalität der Einheimischen können wir uns vor massiven Bombenangriffen des Gegners schützen, indem wir uns in unmittelbarer Nähe von Zivilisten aufhalten. Sollten wir dennoch bombardiert werden, können zivile Opfer als Propagandamittel eingesetzt werden, um die Kriegsunterstützung des Gegners zu verringern."
 Youth_Indoctination_MD:0 "Jugendindoktrination"
 Youth_Indoctination_MD_desc:0 "Indem wir die Kontrolle über die Bildung übernehmen, können wir eine ideologische Indoktrination der Jugend etablieren, um uns zukünftige Soldaten zu verschaffen, die bereit sind, alles für die Sache zu opfern."
 Hit_and_Run_Tactics_MD:0 "Hit-and-Run-Taktiken"
 Hit_and_Run_Tactics_MD_desc:0 "Mit offensiven Hit-and-Run-Taktiken wollen wir den Gegner zwingen, seine Truppen geografisch zu zerstreuen und ihn so zu einem leichteren Ziel für uns zu machen. Gleichzeitig verbessern erfolgreiche Operationen unser Image und minimieren gleichzeitig unsere Verluste."
 Prison_Raids_MD:0 "Gefängnisrazzien"
 Prison_Raids_MD_desc:0 "Indem wir Gefängnisse angreifen und die Gefangenen freilassen, können wir einen fruchtbaren Boden für die Rekrutierung schaffen, da diese Gefangenen uns dankbar sein werden und wahrscheinlich für unsere Sache zu den Waffen greifen, da sie noch nicht in der Lage sind, ein normales Leben zu führen."
 Urban_Focus_MD:0 "Urbaner Fokus"
 Urban_Focus_MD_desc:0 "Indem wir uns auf Operationen in der Stadt spezialisieren, können wir die Schlachtfeldoperationen für unseren Gegner sehr chaotisch gestalten, während wir für uns selbst die Dinge reibungsloser gestalten."
 3D_Swarming_MD:0 "3D-Schwärmen"
 3D_Swarming_MD_desc:0 "Indem wir das städtische Stadtbild zu unserem Vorteil nutzen, können wir uns durch mehrstöckige Gebäude bewegen und uns dem Feind von oben und unten nähern. Dabei können wir aus mehreren Richtungen tödliche Gewalt konzentrieren und den Feind in einem Sektor brechen."
 No_Surrender_MD:0 "Keine Kapitulation"
 No_Surrender_MD_desc:0 "Indem wir uns in urbanem Gelände niederlassen, sind wir anfällig für eine feindliche Einkreisung. Da es jedoch keinen offensichtlichen Ausweg gibt, gewinnen unsere Truppen die Willenskraft, bis zum Tod zu kämpfen."
 Rural_Focus_MD:0 "Ländlicher Fokus"
 Rural_Focus_MD_desc:0 "Indem wir uns auf Operationen im ländlichen Raum spezialisieren, können wir im Hinterland an Stärke gewinnen, wo der Gegner am schwächsten ist. Wir gewinnen an Mobilität und können uns einen Rückzug leisten, wenn dies für uns von Vorteil ist."
 Tactical_Retreats_MD:0 "Taktische Rückzüge"
 Tactical_Retreats_MD_desc:0 "Durch einen Rückzug zu einem günstigen Zeitpunkt können wir unsere Truppen erhalten und gleichzeitig andere Gebiete stärken. Da der Feind nicht alle zurückeroberten Gebiete ausreichend schützen kann, können wir später immer noch zu den meisten zurückkehren. Indem wir dem Feind jeden entscheidenden Sieg verwehren, können wir seine Moral schwächen."
 Covert_Relocation_MD:0 "Verdeckte Verlegung"
 Covert_Relocation_MD_desc:0 "Da wir über die strategische Tiefe verfügen, um unsere Streitkräfte zu bewegen, und uns nicht um unsere eigene territoriale Integrität kümmern müssen, können wir unsere Streitkräfte verdeckt dorthin verlegen, wo der Feind schwach ist, und uns so entscheidende Vorteile verschaffen."
 Autonomus_Combat_Cells_MD:0 "Autonome Kampfzellen"
 Autonomus_Combat_Cells_MD_desc:0 "Indem wir die Kommandostruktur dezentralisieren, sodass sehr kleine Gruppen unabhängig voneinander agieren können, und gleichzeitig sicherstellen, dass keine einzelne Person oder Gruppe mehrere andere Gruppen identifizieren kann, unterbrechen wir die Bemühungen des Feindes, Informationen zu sammeln."
 Tunnel_Warfare_MD:0 "Tunnelkrieg"
 Tunnel_Warfare_MD_desc:0 "Der Bau ausgedehnter unterirdischer Tunnelnetze ermöglicht verdeckte Nachschubversorgung, Truppenverlagerungen und eine bessere Verteidigung durch Hinterhalte. Da der Feind in Tunneln weder Luftangriffe noch Panzereinheiten einsetzen kann, wird das Kräfteverhältnis ausgeglichen."
 Rhizome_Manoeuver_MD:0 "Rhizom-Manöver"
 Rhizome_Manoeuver_MD_desc:0 "Das Rhizom-Manöver ist eine Taktik für urbane Gebiete und bedeutet im Wesentlichen „durch Wände gehen“. Dabei wird die städtische Umgebung nicht als Straßennetz, sondern als flexibles, fast flüssiges Medium betrachtet, das sich ständig verändert. Dies ermöglicht unbeobachtete Bewegungen und unerwartete Angriffe. Die beispiellose Mobilität von Parkour-ausgebildeten Spezialeinheiten kann dies zusätzlich verbessern."
 Light_Infantry_Focus_MD:0 "Fokus auf leichte Infanterie"
 Light_Infantry_Focus_MD_desc:0 "Indem wir uns auf leichte Infanterie konzentrieren, um Hinterhalte und Angriffe durchzuführen, können wir den Aufstand verstärken und die konventionelle Kriegsführung, die zur vollständigen Kontrolle eines Gebiets erforderlich ist, besser beherrschen."
 IED_and_Mine_Focus_MD:0 "Fokus auf IEDs und Minen"
 IED_and_Mine_Focus_MD_desc:0 "Durch den Einsatz von improvisierten Sprengsätzen (IED) und Landminen können wir den Gegner bei Angriffen gegen uns zu sehr langsamen Bewegungen zwingen, wodurch er berechenbarer und leichter auszuweichen ist. Die psychologischen Auswirkungen der ständigen Zermürbung von Konvois durch IEDs können den Feind zudem demoralisieren. Mit diesem Ansatz können wir dem Feind Verluste zufügen, ohne selbst welche zu erleiden."
 Cult_of_Martyrs_MD:0 "Kult der Märtyrer"
 Cult_of_Martyrs_MD_desc:0 "Die Würdigung des Opfers von Menschenleben für eine Sache verleiht dieser eine religiöse Dimension und ist ein mächtiges ideologisches Instrument, um andere für unsere Sache zu gewinnen."
 Suicide_Bombings_MD:0 "Selbstmordattentate"
 Suicide_Bombings_MD_desc:0 "Wenn die Überzeugung stark genug ist, können Menschen dazu gebracht werden, freiwillig das ultimative Opfer zu bringen und den Feind mit ins Grab zu nehmen. Die überzeugende Idee dahinter ist, dass der Freiwillige nicht ausgebildet sein muss, um effektiv zu sein."
 Combat_Applications_MD:0 "Kampfanwendungen"
 Combat_Applications_MD_desc:0 "Selbstmordattentate, kombiniert mit Angriffen leichter Infanteriekräfte, werden Verwirrung stiften und den Feind lähmen, was uns ermöglicht, ihm entscheidende Schläge zu versetzen."
 Lone_Wolf_Terrorism_MD:0 "Einzeltäter-Terrorismus"
 Lone_Wolf_Terrorism_MD_desc:0 "Durch Propaganda können wir isolierte Akteure zu Terroranschlägen ermutigen, meist gegen zivile Ziele. Ziel ist es, Angst und Chaos zu verbreiten und durch diese Angst die politische Landschaft des Feindes zu verändern. Dies kann dazu führen, dass sie über das Ziel hinausschießen oder übermäßige Vergeltungsmaßnahmen ergreifen und so den Kreislauf der Gewalt, auf dem unsere Unterstützung basiert, weiter anheizen."
 Major_Terror_Attacks_MD:0 "Schwere Terroranschläge"
 Major_Terror_Attacks_MD_desc:0 "Durch gut geplante Terroranschläge auf symbolische oder militärische Ziele gewinnen wir weltweite Aufmerksamkeit, steigern unser Prestige und können neue Mitglieder rekrutieren. Je spektakulärer der Anschlag, desto besser für uns. Allerdings könnten wir uns dadurch auch mehr Feinde machen."
 Cyber_Propaganda_MD:0 "Cyber-Propaganda"
 Cyber_Propaganda_MD_desc:0 "Indem wir den Kampf in den Cyberspace tragen, können wir den Diskurs manipulieren. Wir können unsere Gegner zu noch extremeren Ansichten verleiten und unsere gemäßigten Unterstützer zu noch loyalerer Seite machen. Cyberangriffe und die Infiltration populärer Websites können uns ebenfalls dabei helfen, unsere Propaganda zu verbreiten."
 ThreeD_Swarming_MD:0 "3D-Schwärmen"
 ThreeD_Swarming_MD_desc:0 "3D Dimensional Swarming betrachtet die Anordnung bebauter Gebiete und die Natur des urbanen Kampfes nicht als Straßenkämpfe, sondern als vielschichtige Todeszonen, in denen vertikal vorbereitete Kampfpositionen zusammentreffen, um Angriffe aus allen Richtungen gleichzeitig zu ermöglichen. Indem wir den Anflug des Feindes mit Minen und Sprengfallen kontrollieren, locken wir ihn in den sicheren Tod, während wir uns durch Tunnel von Gebäude zu Gebäude bewegen, um Flexibilität zu gewährleisten, da wir nicht feststecken und Positionen bei Bedarf verstärken können."
 Networked_Battlefield_MD:0 "Vernetztes Schlachtfeld"
 Networked_Battlefield_MD_desc:0 "Da Software auf dem Schlachtfeld eine immer wichtigere Rolle spielt, müssen wir sicherstellen, dass unsere Streitkräfte an dieser wachsenden Front stets über ausreichende Kapazitäten verfügen. Durch den Einsatz modernster Systeme können wir sicherstellen, dass unsere Streitkräfte wie ein Organismus funktionieren, der ständig operiert und sich an die Bewegungen anderer anpasst."
 Maneuver_Warfare_MD:0 "Manöverkrieg"
 Maneuver_Warfare_MD_desc:0 "Die Doktrin des Bewegungskriegs betrachtet Kriegsstile als ein Spektrum, wobei Abnutzungskrieg und Manöverkrieg an den entgegengesetzten Enden stehen. Im Abnutzungskrieg wird der Feind als eine Ansammlung von Zielen betrachtet, die es zu finden und zu zerstören gilt. Der Abnutzungskrieg nutzt Manöver, um die Feuerkraft einzusetzen und die feindlichen Streitkräfte zu vernichten. Der Bewegungskrieg hingegen nutzt Feuerkraft und Abnutzung an Schlüsselelementen der gegnerischen Streitkräfte."
 Sensor_Capability_Integration_MD:0 "Integration der Sensorfunktionen"
 Sensor_Capability_Integration_MD_desc:0 "Dank fortschrittlicher Sensorfusion können Einheiten die Informationen aller ihrer Sensoren nutzen, um ein einheitliches Bild des Gefechtsfelds zu erstellen. Alle gesammelten Informationen werden dann automatisch über modernste Datenverbindungen mit anderen Einheiten und Kommandozentralen im Netzwerk geteilt."
 Rapid_Dominance_MD:0 "Schnelle Dominanz"
 Rapid_Dominance_MD_desc:0 "Durch die Erzwingung einer schnellen Dominanz wird einem Gegner sofort oder rechtzeitig ein überwältigendes Maß an Schock und Ehrfurcht aufgezwungen, um seinen Willen zum Weitermachen zu lähmen, die Kontrolle über die Umgebung zu übernehmen und die Wahrnehmung und das Verständnis des Gegners für die Ereignisse zu lähmen oder so zu überlasten, dass der Feind auf taktischer und strategischer Ebene nicht mehr in der Lage wäre, Widerstand zu leisten."
 RTSA_MD:0 "RTSA"
 RTSA_MD_desc:0 "Mithilfe der Echtzeit-Situationserkennung (RTSA) können Flugbesatzungen während Lufttransporten, Abwürfen und vielen anderen Operationen mit dem Bodenpersonal kommunizieren. Die zunehmende Komplexität von Kampfeinsätzen erfordert, dass Flugbesatzungen eingehende Informationen schnell verarbeiten und darauf reagieren, um die Missionsziele zu erreichen."
 Shock_Awe_MD:0 "Cyber-Schock und Ehrfurcht"
 Shock_Awe_MD_desc:0 "Cyber-Schock und -Einschüchterung sind ein neuer Ansatz für Schock und Einschüchterung sowie eine neue Vision für die Vorbereitung eines Angriffs. Ziel ist es, die Infrastruktur, Energieversorgung, Wirtschaft und Kommunikation des Gegners lahmzulegen, bevor der erste Schuss abgefeuert wird. Der Gegner soll in solcher Verwirrung sein, dass er die Vorstellung, es handele sich überhaupt um die Vorbereitung eines Angriffs, zweifeln lässt."
 Resilient_Communications_MD:0 "Robuste Kommunikation"
 Resilient_Communications_MD_desc:0 "Katastrophenbedingte Ausfälle können ein Kommunikationsnetz ernsthaft beeinträchtigen und dessen Dienste unbrauchbar machen. Solche Störungen können durch Naturkatastrophen, technische Ausfälle oder böswillige Angriffe verursacht werden. Zahl, Intensität und Ausmaß dieser Störungen nehmen nachweislich zu. Dieses Problem muss dringend angegangen werden, da in den bestehenden Netzwerken geeignete Mechanismen fehlen. Wenn Netzwerkdienste, die Teil einer kritischen Infrastruktur sind, nicht mehr verfügbar sind, sind wirtschaftliche und/oder gesellschaftliche Probleme die unvermeidliche Folge."
 Full_Spectrum_Dominance_MD:0 "Vollspektrum-Dominanz"
 Full_Spectrum_Dominance_MD_desc:0 " Auch als „Full Spectrum Superiority“ bekannt, bezeichnet die Erlangung der Kontrolle einer militärischen Einheit über alle Dimensionen des Gefechtsraums und die effektive Nutzung einer überwältigenden Vielfalt an Ressourcen in Bereichen wie terrestrischer, luftgestützter, maritimer, unterirdischer, außerirdischer, psychologischer sowie bio- und cybertechnologischer Kriegsführung. Die „Full Spectrum Dominance“ umfasst den physischen Gefechtsraum (Luft, Oberfläche und Untergrund) sowie das elektromagnetische Spektrum und den Informationsraum. Kontrolle bedeutet, dass die Freiheit der gegnerischen Streitkräfte, den Gefechtsraum auszunutzen, vollständig eingeschränkt ist."
 Target_Aquisition_Computing_MD:0 "Zielerfassungsberechnungen"
 Target_Aquisition_Computing_MD_desc:0 "KI/ATR ist eine äußerst wichtige Technologie für militärische Operationen, die ihr volles taktisches Potenzial noch nicht ausgeschöpft hat. Eine absolut zuverlässige KI/ATR kann die Tödlichkeit und Überlebensfähigkeit von Kampfflugzeugen und Plattformen erhöhen. KI/ATR nutzt Sensordaten, um Informationen für die Entscheidungsfindung zu verarbeiten. Der Hauptnutzen eines KI/ATR-Waffensystems liegt in der Verkürzung der Einsatzzeit für die Zielerfassung."
 Freedom_Of_Maneuver_MD:0 "Handlungsfreiheit"
 Freedom_Of_Maneuver_MD_desc:0 "Durch die Nutzung aktueller GPS- und 3D-Modellierung können wir den besten Reiseweg für alle unsere Einheiten implementieren und simulieren, wodurch die Mobilität und damit die Kampfeffektivität erheblich verbessert werden."
 Multi_Domain_Battle_MD:0 "Multi-Domain-Kampf"
 Multi_Domain_Battle_MD_desc:0 "Multidomain Battle (MDB) ist ein Konzept, das auf diese sich verändernde Welt zugeschnitten ist. Wir müssen in der Lage sein, die integrierten Verteidigungsfähigkeiten unseres Gegners zu überwinden, Domänenisolation und -zersplitterung zu vermeiden und unsere Handlungsfreiheit zu wahren. Wir müssen in der Lage sein, seine Verteidigung zu einem Zeitpunkt und an einem Ort unserer Wahl in mehr als einer Domäne zu durchdringen, indem wir Fenster der Domänenüberlegenheit öffnen, um Manöver innerhalb der integrierten Verteidigung unseres Gegners zu ermöglichen."
 Air_Blitzkrieg_MD:0 "Luftblitzkrieg"
 Air_Blitzkrieg_MD_desc:0 "Diese Strategie konzentriert sich auf die Luftkomponente der schnellen Dominanz und bringt unsere gesamte Luftstreitmacht in einer schnellen Mobilisierung zum Einsatz, um alle gegnerischen Bereiche zu eliminieren und zu schwächen, bevor sie eine wirksame Verteidigung aufbauen können."
 WOF_Advantages_MD:0 "WOF-Vorteile"
 WOF_Advantages_MD_desc:0 "Da es in der modernen Kriegsführung schnell zur Normalität werden kann, eingekesselt zu sein, müssen Soldaten die Initiative ergreifen, um flüchtige Momente vorübergehender Vorteile zu nutzen. Soldaten müssen lernen, in kleinen Einheiten mit minimaler Unterstützung zu operieren und mit allem, was ihnen zur Verfügung steht, enge Zeitfenster zu öffnen."
 High_Lethality_MD:0 "Hohe Letalität"
 High_Lethality_MD_desc:0 "Nein, sie verwundeten, verkrüppelten oder kampfunfähig machten. Diese Doktrin unterstreicht die Überzeugung, dass unsere Waffen und unser Militär so tödlich wie möglich sein müssen, um nicht nur im tatsächlichen Kampf, sondern auch als Abschreckung ihre maximale Wirksamkeit zu entfalten. Unsere Gegner und vor allem die Männer und Frauen, die für sie kämpfen, wissen, dass ein Angriff unserer Nation den Tod zur Folge hat."
 Centralized_Desicionmaking_MD:0 "Zentralisierte Entscheidungsfindung"
 Centralized_Desicionmaking_MD_desc:0 "Eine gute Zentralisierung der Autorität unserer Organisation erleichtert die Umsetzung gemeinsamer Praktiken für das gesamte Militär, erleichtert die Koordination und Kontrolle von der Zentrale aus und ermöglicht eine „strategischere“ Entscheidungsfindung." 
 Decentralized_Initiative_MD:0 "Dezentrale Initiative"
 Decentralized_Initiative_MD_desc:0 "Indem wir sicherstellen, dass die Kommandeure kleiner Einheiten in der Lage sind, mit kleinen Manövern entscheidende Momente auf einem sich ständig verändernden Schlachtfeld auszunutzen, schaffen wir eine Streitmacht, die strategisch solide und dennoch taktisch anpassungsfähig ist."
 Disrupt_Deny_MD:0 "Unterbrechen Verweigern"
 Disrupt_Deny_MD_desc:0 "Wenn die direkte Eroberung eines Gebiets nicht die praktikabelste Operation ist, ist es von entscheidender Bedeutung, dass unsere Kämpfer nicht untätig herumsitzen, sondern stattdessen dafür sorgen, dass alle Bemühungen unserer Gegner in diesem Gebiet zunichte gemacht werden und wir ihnen jedes weitere Vordringen in dieses Gebiet verwehren."
 HUMINT_MD:0 "HUMINT"
 HUMINT_MD_desc:0 "Human Intelligence-Aktivitäten bestehen aus Verhören und Gesprächen mit Personen, die Zugang zu Informationen haben. HUMINT ist sowohl eine Quelle für positive Informationen als auch für Informationen mit hohem Spionageabwehrwert. Interviews sollten alle bekannten Informationsanforderungen sowohl der Richtlinien zur Informationsbeschaffung als auch der Anforderungen der Spionageabwehr berücksichtigen."
 TITLE_COIN:0 "Aufstandsbekämpfung"
 COIN_MD:0 "MÜNZE"
 COIN_MD_desc:0 "Mit effektiven Counter-Insurgency Ops (COIN) können wir politische, sicherheitspolitische, wirtschaftliche und informationelle Komponenten integrieren und synchronisieren, die die Legitimität und Effektivität der Regierung stärken und gleichzeitig den Einfluss der Aufständischen auf die Bevölkerung verringern."
 Urban_operations_MD:0 "Städtischer Betrieb"
 Urban_operations_MD_desc:0 "Kämpfe in urbaner Umgebung können schwächeren Verteidigern oder Guerillakämpfern durch Verluste in Hinterhalten Vorteile bieten. Die angreifende Armee muss häufiger drei Dimensionen berücksichtigen und folglich mehr Personal einsetzen, um unzählige Gebäude und Berge von Trümmern zu sichern."
 Battalion_support_MD:0 "Bataillonsunterstützung"
 Battalion_support_MD_desc:0 "Die Hauptquartiere für Befehls- und Kontrollfunktionen, die Wartungsunterstützung mit Maschinenteams und die medizinische Unterstützung der Stufe II müssen alle überarbeitet werden, damit unsere Unterstützung auf Bataillonsebene effizienter wird."
 Digitalized_Army_MD:0 "Digitalisierte Armee"
 Digitalized_Army_MD_desc:0 "Dieses Konzept basiert auf Informationstechnologie und der Digitalisierung des Schlachtfelds. Die Entwicklung und Ausbildung von Soldaten und Führungskräften mit den notwendigen Fähigkeiten, um in diesem Umfeld effektiv zu sein, ist eine Herausforderung, die bewältigt werden muss, damit die „menschliche“ Komponente dieser Transformation wirksam ist."
 Infantry_Embedded_Armor_MD:0 "Eingebettete Infanteriepanzerung"
 Infantry_Embedded_Armor_MD_desc:0 "Der Einbau schwerer Panzer in unsere Infanterieeinheiten war traditionell eine schwierige Strategie. Dank mobilerer und anpassungsfähigerer Panzer können wir jetzt jedoch auf Artillerieunterstützung verzichten und stattdessen direkt gepanzerte Einheiten einsetzen, um schweren Schaden zuzufügen."
 Covert_Deception_MD:0 "Verdeckte Täuschung"  
 Covert_Deception_MD_desc:0 "Psychologische Operationen, Informationskrieg, visuelle Täuschung und andere Methoden. Als Form der strategischen Nutzung von Informationen (Desinformation) überschneidet sie sich mit der psychologischen Kriegsführung. Ein Feind, der auf die Täuschung hereinfällt, verliert das Vertrauen, wenn die Täuschung auffliegt, und zögert möglicherweise, wenn er mit der Wahrheit konfrontiert wird."
 Three_Dimensional_warfare_MD:0 "Dreidimensionale Kriegsführung"
 Three_Dimensional_warfare_MD_desc:0 "Der Begriff der 3D-Taktik wurde aus dem Konzept der sphärischen Sicherheit entwickelt. Das 3D-Taktikmodell identifiziert einige der wichtigsten Phänomene, die in städtischen Umgebungen auftreten. Insbesondere die „inhärenten Eigenschaften der Informationstäuschung“, die bei einer „vertikalen statt horizontalen Umhüllung“ auftreten."
 Rapid_strike_MD:0 "Schneller Schlag"
 Rapid_strike_MD_desc:0 "Durch die weitere Konzentration auf die Geschwindigkeit und Mobilität der Aktionen können sich unsere Einheiten schneller und geschlossener bewegen und so die Fähigkeit unserer Gegner einschränken, effektiv zu reagieren."
 Siege_warfare_MD:0 "Belagerungskrieg"
 Siege_warfare_MD_desc:0 "Diese Strategie beinhaltet neue Methoden, um typische Merkmale moderner Belagerungen zu überwinden. Da der Verteidiger der Belagerung besser standhalten kann, besteht das Hauptziel des Angreifers darin, die Einsatzkräfte einzuschränken oder eine strategische Ablenkung zu schaffen, anstatt die Belagerung zu Ende zu führen."
 Close_combat_lethality_MD:0 "Tödlichkeit im Nahkampf"
 Close_combat_lethality_MD_desc:0 "Die CCLTF analysiert und gibt gezielte Empfehlungen zu den Bemühungen des Militärs, eine Überlegenheit zu erreichen und so zu verhindern, dass Infanterieeinheiten in faire Kämpfe verwickelt werden. Um dieses Problem zu lösen, sind Änderungen im Personalmanagement, der Ausbildung und der Ausrüstung der Infanterieeinheiten erforderlich – Änderungen, die die Tödlichkeit und Überlebensfähigkeit erhöhen und so eine Überlegenheit erreichen."
 Casualty_Retention_MD:0 "Unfallrückhaltung"
 Casualty_Retention_MD_desc:0 "Wir müssen die Methoden und Praktiken im Umgang mit Kriegsopfern grundlegend überdenken. Ein Kriegsopfer bedeutet nicht zwangsläufig, dass der Verletzte nicht mehr in den Kampf zurückkehren kann. Dank der jüngsten medizinischen Fortschritte können auch frühere Langzeitverletzungen schneller behandelt werden."
 Concentration_of_Force_MD:0 "Konzentration der Kraft"
 Concentration_of_Force_MD_desc:0 "Wir müssen uns auf die Konzentration einer militärischen Streitmacht konzentrieren, um einem Teil der feindlichen Streitkräfte eine so überwältigende Macht entgegenzusetzen, dass allein das Kräfteverhältnis zwischen den beiden Streitkräften als Kraftmultiplikator zugunsten der konzentrierten Streitkräfte wirkt."
 Decapitation_Strike_MD:0 "Enthauptungsschlag"
 Decapitation_Strike_MD_desc:0 "Ein Enthauptungsschlag ist eine militärische Strategie, die darauf abzielt, die Führung oder das Kommando einer feindlichen Regierung oder Gruppe zu beseitigen. Die Strategie, einen Feind durch die Eliminierung seiner militärischen und politischen Führung zu zerschlagen oder zu besiegen, wird seit langem in der Kriegsführung angewendet. Mit dem Aufkommen präziserer Waffen können wir diese Strategie jedoch auch auf taktischer Ebene gegen feindliche Einheiten und Feldkommandeure anwenden."
 Indiscriminate_Force_MD:0 "Wahllose Gewalt"
 Indiscriminate_Force_MD_desc:0 "Totaler Krieg auf taktischer Ebene: Wenn Präzision und Zielerfassung versagen und wir mit dem Rücken zur Wand stehen, müssen unsere Streitkräfte alle ihnen zur Verfügung stehenden Ressourcen nutzen, um mit allen Mitteln den Sieg zu erringen. Das bedeutet, dass keine Granate, kein Geschoss und keine Rakete ungefeuert bleibt, egal ob der Feind durch Zivilisten geschützt ist oder nicht."
 Unrestricted_Warfare_MD:0 "Uneingeschränkte Kriegsführung"
 Unrestricted_Warfare_MD_desc:0 "Die Macht des Gegners lässt sich auf verschiedene Weisen schwächen, die nicht durch direkte militärische Konfrontation erreicht werden können. Diese alternativen Methoden haben die gleiche oder sogar noch größere Zerstörungskraft als militärische Kriegsführung und haben bereits zu ernsthaften Bedrohungen der nationalen Sicherheit geführt, die sich von der Vergangenheit unterscheiden und in vielerlei Hinsicht eine größere Rolle spielen."
 Networked_Swarming_Tactics_MD:0 "Vernetzte Schwarmtaktiken"
 Networked_Swarming_Tactics_MD_desc:0 "Vernetzte Schwarmkriegsführung (NSW) ist eine weitreichende Manöverkriegsführung, bei der der Feind durch flexible Nutzung von „Sammlung“ und „Zerstreuung“ dynamisch und parallel angegriffen wird. Dabei werden die zahlreichen, weit verteilten Kräfte in einem mehrdimensionalen Raum in ein operatives Netzwerk mit offensichtlich fließenden Merkmalen integriert. Dadurch erhalten wir eine vernetzte Operationsform, die einen organisatorischen Fluss ermöglicht, sodass die auf dem Schlachtfeld verteilten Kampfeinheiten rasch operative Schwärme bilden können, die sich auf ihre Ziele konzentrieren und entsprechend den Anforderungen der Schlachtfeldumgebung neu aufgebaut werden können."
 Assymetrical_Swarming_MD:0 "Asymmetrisches Schwärmen"
 Assymetrical_Swarming_MD_desc:0 "Ähnlich wie beim Schwarmangriff im herkömmlichen Sinn versucht diese Methode, nur unkonventionelle Mittel wie Aufstände, die Platzierung von Sprengsätzen und Guerillakrieg einzusetzen, allerdings im Ausmaß eines massiven konventionellen Angriffs."
 Small_unit_networking_MD:0 "Vernetzung kleiner Einheiten"
 Small_unit_networking_MD_desc:0 "Die Integration von Situationsbewusstseinstechnologie für den Einsatz in taktischen Situationen durch kleinere Einheiten verleiht ihnen eine größere Kampfeffektivität sowie die Fähigkeit, viele traditionelle taktische Fehltritte zu vermeiden, die kleine Einheiten machen, z. B. das unwissentliche Betreten der feindlichen Stellung."
 Eternal_Recurrence_MD:0 "Ewige Wiederkehr"
 Eternal_Recurrence_MD_desc:0 "Studien und Praxiserfahrungen haben gezeigt, dass die Durchführung von COIN-Operationen in der vorgeschriebenen Weise und in der tatsächlichen Umsetzung zwei völlig unterschiedliche Dinge sind. Wir müssen sicherstellen, dass unsere Einheiten die für COIN-Operationen festgelegten Doktrinen einhalten, um sichtbare Fortschritte zu erzielen, da sich der derzeitige Weg als ineffektiv erweist."
 Tactical_Flexibility_MD:0 "Taktische Flexibilität"
 Tactical_Flexibility_MD_desc:0 "Obwohl viele der früheren Doktrinen auf die eine oder andere Weise darauf abzielten, die taktische Flexibilität zu verbessern, zielt diese Doktrin darauf ab, alle unsere Bemühungen im Gesamten zu betrachten und sie so gut wie möglich miteinander zu korrelieren, um die Möglichkeit zu schaffen, Taktiken einfach und schnell zu ändern, um neuen Umständen und Bedingungen gerecht zu werden."
 Battlespace_Dispersion_MD:0 "Verteilung im Gefechtsraum"
 Battlespace_Dispersion_MD_desc:0 "Wenn die Situation eintritt, dass eine direkte Konfrontation mit unserem Feind eine sichere Niederlage bedeuten würde, können wir eine Strategie anwenden, die auf einer modernen Version der detaillierten Niederlage basiert. Dabei breiten wir das Schlachtfeld so weit wie möglich aus, lassen unseren mobilsten Einheiten jedoch die Möglichkeit, die daraus resultierenden kleineren Konflikte schnell zu unseren Gunsten zu entscheiden."
 Economy_of_force_MD:0 "Ökonomie der Kraft"
 Economy_of_force_MD_desc:0 "Kein Teil einer Streitmacht sollte jemals zwecklos sein. Die Verteilung der verfügbaren Kampfkraft auf Aufgaben wie begrenzte Angriffe, Verteidigung, Verzögerungen, Täuschung oder sogar Rückzugsoperationen wird sorgfältig abgewogen, um an entscheidenden Punkten auf dem Schlachtfeld Masse zu erreichen."
 Strategic_Defense_MD:0 "Strategische Verteidigung"
 Strategic_Defense_MD_desc:0 "Strategische Verteidigung erfordert, dass ein Verteidiger seine Ressourcen wie Befestigungen, Feldbefestigungen und Militäreinheiten an und weit hinter der Frontlinie einsetzt. Angreifern fällt es zwar leichter, die schwächer verteidigte Frontlinie zu durchbrechen, stoßen aber beim Vorrücken weiterhin auf Widerstand. Je tiefer sie vordringen, desto verwundbarer werden ihre Flanken, und sollte der Vormarsch stocken, besteht die Gefahr, dass sie eingekesselt werden."
 Mimicking_operations_MD:0 "Nachahmung von Operationen"
 
 
 ### AIR DOCTRINES
 
 infiltration_bombing_MD:0 "Infiltrationsbombardements"
 air_skirmish_MD:0 "Infiltrationsbombardements"
 high_level_bombing_MD:0 "Bombenangriffe auf hoher Ebene"
 offensive_focus_MD:0 "Fokus auf offensive kombinierte Waffen"
 offensive_focus_MD_desc:0 "Da die Luftüberlegenheit für offensive Operationen von entscheidender Bedeutung ist, wird der Luftabwehr zur Unterstützung der Bodentruppen an der Front Priorität eingeräumt."
 lr_maritime_strike_MD:0 "Langstrecken-Seeangriff"
 lr_maritime_strike_MD_desc:0 "Taktischer Einsatz landgestützter Bomberflugzeuge zum Angriff auf Kriegsschiffe auf See."
 rw_frontline_focus_MD:0 "Drehflügler-Frontline-Fokus"
 rw_frontline_focus_MD_desc:0 "Aufgrund der geringen Kampfradien und der geringeren Fluggeschwindigkeiten im Vergleich zu Starrflügelflugzeugen sind Hubschrauber für Tiefangriffe weniger geeignet. Daher werden Taktiken entwickelt, um ihre Effektivität bei der direkten Luftunterstützung der Fronttruppen zu maximieren."
 recon_strike_complex_MD:0 "Aufklärungsangriffskomplex"
 recon_strike_complex_MD_desc:0 "Ein Kriegskonzept, das die Kombination von luft- und weltraumgestützten Überwachungssystemen mit weitreichenden Angriffsmitteln auf der Ebene großer Formationen vorsieht. Dies ermöglicht die nahezu Echtzeit-Zerstörung hochwertiger Ziele tief hinter der Front."
 roaving_fighters_MD:0 "Frei herumlaufende Kämpfer"
 roaving_fighters_MD_desc:0 "Die Erkennung und Zerstörung von Überwachungsgeräten aus der Luft erfordert gut ausgebildete und erfahrene Piloten, denen die Initiative zur Jagd auf ihre Ziele übertragen wird."
 pilot_adversarial_training_oi_MD:0 "Piloten-Konflikttraining"
 pilot_adversarial_training_oi_MD_desc:0 "Fortgeschrittene Pilotenausbildung zur Simulation der Flugzeuge und Taktiken wahrscheinlicher feindlicher Streitkräfte."
 aviation_fire_strike_MD:0 "Flugzeug-Feuerschlag"
 aviation_fire_strike_MD_desc:0 "Ein konzentrierter Erstschlag, bei dem alle Arten der Feuerabgabe zum Einsatz kommen, darunter Raketen, Flugzeuge und elektronische Mittel."
 alcm_raid_oi_MD:0 "Luftgestützte Marschflugkörperangriffe"
 alcm_raid_oi_MD_desc:0 "Taktische Doktrin, die den großflächigen Einsatz von Marine-Kampfflugzeugen vorsieht, die Anti-Schiffs-Raketen gegen Flotten abfeuern."
 jsead_MD:0 "JSEAD"
 jsead_MD_desc:0 "Gemeinsame Unterdrückung der feindlichen Luftabwehr. Taktiken zur koordinierten Unterdrückung oder Zerstörung von SAM- und AAA-Standorten ermöglichen es Piloten, ihre Luftunterstützungsmissionen mit geringerem Risiko durchzuführen."
 terminal_attack_controllers_MD:0 "Terminal-Angriffscontroller"
 terminal_attack_controllers_MD_desc:0 "Hochqualifiziertes Bodenpersonal, das in die Fronteinheiten integriert ist, lenkt die Luftstreitkräfte auf die Ziele und erhöht so deren Tödlichkeit und Effektivität erheblich."
 large_strike_packages_MD:0 "Große Streikpakete"
 large_strike_packages_MD_desc:0 "Um das Kriegsführungsprinzip der Masse auf der Ebene der taktischen Luftfahrt umzusetzen, sind besondere Planungsüberlegungen erforderlich."
 flight_and_element_air_taskings_MD:0 "Flug- und Elementluftaufgaben"
 flight_and_element_air_taskings_MD_desc:0 "Der Einsatz von Flugmitteln in Organisationen unterhalb der Staffel ermöglicht eine größere Detailliertheit und Flexibilität bei der Verfolgung von Zielen."
 all_weather_attack_procedures_MD:0 "Allwetter-Angriffsverfahren"
 all_weather_attack_procedures_MD_desc:0 "Die Koordination mit der Wetteraufklärung und die Entwicklung spezieller Kampfmittel ermöglichen wirksame Bombenangriffe bei jedem Wetter und in der Nacht."
 strike_coordination_and_reconnaissance_MD:0 "Angriffskoordination und Aufklärung"
 strike_coordination_and_reconnaissance_MD_desc:0 "Bei SCAR-Missionen kann ein Flugzeug andere Kampfflugzeuge auf Gelegenheitsziele im Nah- und Hinterland des Kampfgebiets lenken."
 joint_air_operations_MD:0 "Gemeinsame Luftoperationen"
 joint_air_operations_MD_desc:0 "Gemeinsame Luftoperationen kodifizieren den koordinierten Einsatz von Luftfahrzeugen über mehrere Zweige/Teilstreitkräfte desselben Militärs hinweg unter einem einzigen Luftkomponentenkommandeur."
 master_air_attack_plan_MD:0 "Master-Luftangriffsplan"
 master_air_attack_plan_MD_desc:0 "Der MAAP ermöglicht eine gemeinsame Anstrengung bei der Verwirklichung der Vision des Kommandanten hinsichtlich der Verfolgung von Zielen zur Unterstützung des gesamten Bodenmanöverplans."
 standoff_precision_strikes_MD:0 "Distanz-Präzisionsschläge"
 standoff_precision_strikes_MD_desc:0 "Fortschritte in der Computer- und Sensortechnologie ermöglichen theoretisch eine präzise Zielbekämpfung aus großer Höhe und großer Entfernung. Dies reduziert zwar das Risiko für das Flugzeug, doch aufgrund des Nebels des Krieges sind solche Angriffe oft nur begrenzt wirksam."
 low_altitude_air_support_MD:0 "Luftunterstützung in geringer Höhe"
 low_altitude_air_support_MD_desc:0 "Angesichts der zunehmenden Verbreitung von schultergestützten Raketen und radargesteuerter Flugabwehrartillerie ist ein „niedriges und langsames“ CAS-System höchst riskant. Es bietet dem Piloten jedoch die beste Lageübersicht, um Bodenziele präzise anzugreifen."
 dynamic_strike_package_retasking_MD:0 "Dynamisches Streikpaket – Neuzuweisung"
 dynamic_strike_package_retasking_MD_desc:0 "Der Zugriff auf aktuelle Informationen, robuste Kommunikationsmittel und gut geübte Verfahren zur Luftraumkontrolle ermöglichen die Umverteilung von Angriffsmissionen auf wertvolle und gewinnbringende Ziele mit zeitkritischer Natur."
 killbox_keypad_airspace_management_MD:0 "Killbox / Keypad-Luftraummanagement"
 killbox_keypad_airspace_management_MD_desc:0 "Durch die Aufteilung des Luftraums in Gitterquadrate, die je nach Bedarf zugewiesen und freigegeben werden können, wird eine detaillierte Granularität des Kampfraums sowie eine klare und präzise Konfliktvermeidung mit anderen Feuerunterstützungsmitteln ermöglicht."
 digital_close_air_support_MD:0 "Digitale Luftnahunterstützung"
 air_accompaniment_MD:0 "Luftbegleitung"
 air_accompaniment_MD_desc:0 "Mit dem raschen Vorrücken der Durchbruchstruppen wird ihre Reichweite die der Bodenartillerie nicht mehr erreichen. Die Langstreckenluftfahrt wird dann den Großteil des Feuers zur Unterstützung der Ausbeutung übernehmen."
 vector_navigation_MD:0 "Vektorisierung und Navigationspunkte"
 vector_navigation_MD_desc:0 "Hinter den eigenen Linien gelegene Vectoring- und Target Designation Points (VTDPs) und Radio Navigation Points (RNPs) erleichtern die Luftraumverwaltung und unterstützen befreundete Flugzeuge bei der Navigation zu ihren Zielgebieten."
 wvr_maneuver_MD:0 "WVR-Manöver"
 wvr_maneuver_MD_desc:0 "Die Luftüberlegenheit hängt davon ab, dass die Kampfflugzeuge die Gefechte gewinnen, und innerhalb der Sichtweite sind Wendigkeit und Taktik oft der entscheidende Faktor."
 battlefield_support_MD:0 "Schlachtfeldunterstützung"
 BATTLEFIELD_SUPPORT_desc:0 "Gemäß der Standarddoktrin der NATO bezeichnen wir die Luftstreitkräfte als primäre Methode, um der Front und dem Hinterland des Feindes flexible und verheerende Unterstützung auf dem Gefechtsfeld zu bieten und so dessen Streitkräfte, Zusammenhalt und Kommunikation zu zerstören."
 TITLE_OPERATIONAL_INTEGRITY:0 "Betriebsintegrität"
 OPERATIONAL_INTEGRITY_desc:0 "Da wir auf dem Schlachtfeld bereits über Artillerieunterstützung verfügen, konzentrieren wir unsere Luftwaffe in erster Linie darauf, die Luftüberlegenheit des Feindes über dem Schlachtfeld zu verhindern und so die operative Integrität unserer Bodentruppen zu gewährleisten."

