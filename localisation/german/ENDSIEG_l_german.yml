 FR3_cas_2_desc:0 ""
 FR3_support_italian_claim:0 "Unterstützen Sie die Ansprüche Italiens"
 FR3_support_italian_claim_desc:0 "Wenn wir Italiens Ansprüche auf die österreichisch-ungarische Monarchie unterstützen, ist es sehr wahrscheinlich, dass sich das Land auf unserer Seite schlägt, um bei der Friedenskonferenz ein Stück des alten Kaiserreichs abzubekommen."
 FR3_give_ita_savoy_corsica:0 "Savoyen und Korsika an Italien abtreten"
 FR3_give_ita_savoy_corsica_desc:0 "Ich würde dringend davon abraten, die Macht unseres Landes so herunterzuspielen, aber wenn wir den Italienern Savoyen und Korsika geben, hätten sie keine andere Wahl, als der Entente beizutreten."
 FR3_invite_britain:0 "Großbritannien einladen"
 FR3_invite_britain_desc:0 "Da die Deutschen die belgische Neutralität verletzen, haben die Briten keine andere Wahl, als sich uns in diesem Konflikt anzuschließen!"
 FR3_britain_reinforcement:0 "Britische Verstärkungen"
 FR3_britain_reinforcement_desc:0 "Die französische Armee allein wird nicht in der Lage sein, die Westfront zusammenzuhalten. Deshalb müssen die französischen und britischen Armeen vereint in einer erfolgreichen Verteidigungshaltung bleiben und schließlich zum Gegenangriff übergehen."
 FR3_invite_italy:0 "Laden Sie Italien zur Entente ein"
 FR3_send_troops_serbia:0 "Schicken Sie Verstärkung nach Serbien"
 FR3_send_troops_serbia_desc:0 "Um unserem Verbündeten Serbien gegen die zahlenmäßig überlegenen Streitkräfte Österreichs zu helfen, können wir einige unserer Truppen entsenden, um die Frontlinie gegen etwaige Offensiven zu halten."
 FR3_allied_blockade_greece:0 "Zwangsblockade gegen Griechenland"
 FR3_allied_blockade_greece_desc:0 "Um den pro-mittelmächten Monarchen Konstantin I. zu zwingen, könnten wir Griechenland eine Blockade aufzwingen, die im Land Zwietracht säen und Konstantin zur Abdankung zugunsten seines pro-entente Sohnes Alexander zwingen würde."
 FR3_invite_greece:0 "Griechenland einladen"
 FR3_invite_greece_desc:0 "Da Konstantin I. abgedankt hat und durch seinen pro-ententeistischen Sohn ersetzt wurde, können wir Griechenland nun in unsere Fraktion einladen."
 FR3_support_greece:0 "Unterstützen Sie Griechenland"
 FR3_support_greece_desc:0 "Um unseren Verbündeten Griechenland an der Front gegen die Mittelmächte zu unterstützen, können wir ihm Hilfe in Form von Waffen schicken, die ihm möglicherweise fehlen."
 FR3_troops_greece:0 "Truppen nach Griechenland schicken"
 FR3_troops_greece_desc:0 "Um den Druck auf die Mittelmächte zu erhöhen, könnten wir die Armee d&#39;Orient nach Griechenland schicken und die griechische Armee massiv verstärken, um sie zusammen mit unseren Truppen zu einer gewaltigen Streitmacht zu machen."
 FR3_russian_reinforcement:0 "Truppen aus Russland anfordern"
 FR3_russian_reinforcement_desc:0 "Da das Russische Reich über praktisch unbegrenzte Reserven verfügt, könnten wir im Austausch gegen Munition die Entsendung mehrerer Divisionen an die Westfront verlangen, wo uns Männer fehlen und wir eine zahlenmäßige Überlegenheit gegenüber den Deutschen benötigen."
 FR3_entente_diplomacy:0 "Entente-Diplomatie"
 FR3_entente_diplomacy_desc:0 "Diplomatische Maßnahmen mit unseren Verbündeten"
 FR3_convince_romania:0 "Rumänien zum Beitritt zur Entente bewegen"
 FR3_convince_romania_desc:0 "Wir könnten versuchen, das Königreich Rumänien davon zu überzeugen, der Entente beizutreten. Allerdings muss die Ostfront stabilisiert werden, bevor wir dies tun, sonst ist ein Beitritt der Rumänen höchst unwahrscheinlich!"
 FR3_invite_romania:0 "Rumänien einladen"
 FR3_invite_romania_desc:0 "Da es uns gelungen ist, das Königreich Rumänien davon zu überzeugen, sich unserer Seite anzuschließen, können wir sie nun einladen"
 FR3_diplomatic_effort:0 "Diplomatische Bemühungen"
 FR3_diplomatic_effort_desc:0 ""
 FR3_european_diplomacy:0 "Europäische Diplomatie"
 FR3_european_diplomacy_desc:0 ""
 FR3_anti_german_propaganda:0 "Antideutsche Stimmung"
 FR3_anti_german_proapganda_desc:0 "Nach unserer demütigenden Niederlage im Deutsch-Französischen Krieg von 1871 und der gewaltsamen Annexion des rechtmäßigen französischen Gebiets Elsass-Lothringen durch Deutschland bleibt uns nichts anderes übrig als antideutsche Gefühle …"
 FR3_pro_russia:0 "Pro-russische Beziehungen"
 FR3_pro_russia_desc:0 "Obwohl das Russische Reich in keiner Weise demokratisch ist, ist es für uns immer noch ein sehr wichtiger Verbündeter gegen das Deutsche Reich, das jetzt zwischen uns eingeklemmt ist. Solange wir Verbündete sind, werden die Deutschen keine Bedrohung darstellen!"
 FR3_agadir_crisis:0 "Agadir-Krise"
 FR3_agadir_crisis_desc:0 "Um unsere Präsenz in Marokko weiter auszudehnen, könnten wir eine beträchtliche Anzahl unserer Truppen ins Landesinnere Marokkos verlegen, allerdings könnten wir mit Vergeltungsschlägen aus Berlin rechnen."
 FR3_prepare_for_war:0 "Bereite dich auf den Krieg vor"
 FR3_prepare_for_war_desc:0 ""
 FR3_defend_border:0 "Grenzverteidigung"
 FR3_defend_border_desc:0 "Es würde nicht schaden, unsere Grenze zu Deutschland noch stärker zu befestigen."
 FR3_sacred_union:0 "Heilige Vereinigung"
 FR3_sacred_union_desc:0 "Kriegszeiten sind nicht die Zeit, um über Politik zu streiten und Meinungsverschiedenheiten zu schüren. Wir müssen alle zusammenkommen und das für den Moment hinter uns lassen."
 FR3_defend_colonies:0 "Koloniale Verteidigung"
 FR3_defend_colonies_desc:0 "Es würde nicht schaden, unsere Kolonialhochburgen zu befestigen."
 FR3_volunteers_1:0 "Arbeitskräfte aus den Kolonien"
 FR3_volunteers_1_desc:0 "Da das französische Festland nicht über so viele Arbeitskräfte verfügt, wie die Deutschen aufbieten können, könnten wir dies immer noch durch die Anwerbung von Männern aus den Kolonien kompensieren."
 FR3_volunteers_2:0 "Arbeitskräfte aus den Kolonien"
 FR3_volunteers_2_desc:0 "Da das französische Festland nicht über so viele Arbeitskräfte verfügt, wie die Deutschen aufbieten können, könnten wir dies immer noch durch die Anwerbung von Männern aus den Kolonien kompensieren."
 FR3_volunteers_3:0 "Arbeitskräfte aus den Kolonien"
 FR3_volunteers_3_desc:0 "Da das französische Festland nicht über so viele Arbeitskräfte verfügt, wie die Deutschen aufbieten können, könnten wir dies immer noch durch die Anwerbung von Männern aus den Kolonien kompensieren."
