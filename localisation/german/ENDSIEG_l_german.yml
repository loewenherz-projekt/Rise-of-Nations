ww2_germany.69.d:0 "Die Stadt Stettin ist widerwillig in die Hände des Feindes gefallen, wir müssen sie um jeden Preis zurückerobern!"
ww2_germany.69.a:0 "Alles ist verloren ..."
ww2_germany.70.t:0 "Vienna Falls"
ww2_germany.70.d:0 "Die Stadt Wien, die ehemalige Hauptstadt Österreichs, ist widerwillig in die Hände des Feindes gefallen. Wir müssen sie um jeden Preis zurückerobern!"
ww2_germany.70.a:0 "Das ist eine Katastrophe!"
ww2_germany.71.t:0 "Führer hält Neujahrsansprache"
ww2_germany.71.d:0 "Der Führer hat heute eine Neujahrsansprache an alle Volksdeutschen gehalten, in der er keinerlei Informationen über die Lage auf dem Schlachtfeld oder einen Hinweis darauf enthielt, dass der Krieg sich seinem Ende nähere. Er erklärte lediglich, dass der Krieg so lange andauern werde, bis der Sieg errungen sei."
ww2_germany.71.a:0 "Der Krieg wird gewonnen!"
ww2_germany.72.t:0 "Führers letztes Treffen an der Westfront"
ww2_germany.72.d:0 "Der Führer hat heute ein letztes Treffen mit Rundstedt und Walter Model auf dem Alderhorst abgehalten und ihnen strikte Anweisungen gegeben, die Westalliierten so lange wie möglich in Schach zu halten, damit sich das Reich auf die Niederlage der bolschewistischen Bestie im Osten konzentrieren kann. \n\n Danach bestieg der Führer einen Zug, um die Westfront nie wieder zu besuchen...."
ww2_germany.72.a:0 "Wir müssen sie so lange wie möglich zurückhalten"
ww2_germany.73.t:0 "Adolf Hitlers neuer Wohnsitz im Führerbunker"
ww2_germany.73.d:0 "Der Führer ist vor Kurzem nach Berlin zurückgekehrt und hat seinen neuen Wohnsitz im Führerbunker bezogen, wo er die meiste Zeit damit verbringen wird, neue Strategien zu entwickeln, um den Krieg für das Reich zu gewinnen."
ww2_germany.73.a:0 "Der Sieg ist nah"
ww2_germany.74.t:0 "Volkssturm gegründet"
ww2_germany.74.d:0 "Der Volkssturm wurde heute gegründet, um dem Rest der Welt zu zeigen, dass das Reich und sein Volk, die Volksdeutschen, in diesem Kampf um den Sieg nicht aufgeben werden! Dr. Goebbels hielt heute in Berlin eine Rede vor den Rekruten des Volkssturms, in der er sagte: „Männer des Berliner Volkssturms, Sie haben soeben als Männer des Volkssturms den Eid auf den Führer, auf die Freiheit des Reiches und auf die Zukunft unseres Volkes geschworen, um Ihrem Volk und der Welt zu beweisen, dass Deutschland an der Front und im Inland über Millionen von Männern verfügt, die entschlossen sind zu kämpfen und einen unerschütterlichen Willen haben, sich beim Anblick des Feindes niemals zu ergeben und niemals zu kapitulieren.“ \n\n Der Volkssturm besteht aus Männern im Alter zwischen 16 und 60 Jahren, die noch nicht beim Militär gedient haben, und damit hat das Reich endlich die letzte Komponente des totalen Krieges abgeschlossen."
ww2_germany.74.a:0 "Wir werden die militärische Stärke durch Willenskraft überwinden!"
ww2_germany.75.t:0 "Führerpreise Hitlerjugend"
ww2_germany.75.d:0 "Der Führer hatte heute einen seltenen öffentlichen Auftritt, vielleicht sogar seinen letzten vor dem Sieg, und zeichnete mehrere Mitglieder der Hitlerjugend persönlich aus. Diese Jungen im Alter von 10 bis 16 Jahren sind das größte Vorbild für alle im Reich, die bereit sind, ihr Leben um jeden Preis für die Verteidigung Deutschlands zu opfern."
ww2_germany.75.a:0 "Ruhm den Helden!"
ww2_germany.76.t:0 "Die Ardennenoffensive beginnt"
ww2_germany.76.d:0 "Die Ardennenoffensive, auch bekannt als Operation Rheinwache, begann am 16. Dezember 1944 und war die letzte große deutsche Offensive im westlichen Kriegsgebiet für den Rest des Krieges. Sie führte durch die waldreichen Ardennen in der wallonischen Region Belgiens, Frankreichs und Luxemburgs. Bei dichtem Nebel, der die alliierten Luftangriffe behinderte, starteten die Deutschen einen gewaltigen Vorstoß, der jedoch schließlich gestoppt wurde und die verbleibende deutsche Militärstärke stark schwächte. Ziel der Operation war es, die alliierte Nutzung des Hafens von Antwerpen zu stoppen und die alliierten Linien zu spalten, um den deutschen Streitkräften die Einkreisung und Vernichtung von vier alliierten Armeen zu ermöglichen und die Westalliierten zum Friedensschluss zu zwingen."
ww2_germany.76.a:0 "Der Kampf beginnt"
ww2_germany.77.t:0 "In Stettin erheben sich Volkssturmbataillone"
ww2_germany.77.d:0 "Mein Führer, als die bolschewistische Horde sich Stettin näherte, haben unsere Volksdeutschen es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat tapfer bis zum Tod oder Sieg zu verteidigen, wie es sich für jeden Volksdeutschen gehört!"
ww2_germany.77.a:0 "Ein großartiges Beispiel für andere Volksdeutsche"
ww2_germany.78.t:0 "In Danzig erheben sich Volkssturmbataillone"
ww2_germany.78.d:0 "Mein Führer, als die bolschewistische Horde auf Danzig zusteuerte, haben unsere Volksdeutschen es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat tapfer bis zum Tod oder Sieg zu verteidigen, wie es jeder Volksdeutsche tun sollte!"
ww2_germany.78.a:0 "Ruhm den Helden"
ww2_germany.79.t:0 "Volkssturmbataillone erheben sich in Königsberg"
ww2_germany.79.d:0 "Mein Führer, als die bolschewistische Horde sich Königsberg näherte, haben unsere Volksdeutschen es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat tapfer bis zum Tod oder Sieg zu verteidigen, wie es jeder Volksdeutsche tun sollte!"
ww2_germany.79.a:0 "Eine tapfere Anstrengung!"
ww2_germany.80.t:0 "In Posen erheben sich Volkssturmbataillone"
ww2_germany.80.d:0 "Mein Führer, als die bolschewistische Horde auf Posen zukam, haben unsere Volksdeutschen es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat tapfer bis zum Tod oder Sieg zu verteidigen, wie es jeder Volksdeutsche tun sollte!"
ww2_germany.80.a:0 "Ihre Bemühungen werden nicht vergessen"
ww2_germany.81.t:0 "In Breslau erheben sich Volkssturmbataillone"
ww2_germany.81.d:0 "Mein Führer, als die bolschewistische Horde auf Breslau zusteuerte, haben unsere Volksdeutschen es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat tapfer bis zum Tod oder Sieg zu verteidigen, wie es sich für jeden Volksdeutschen gehört!"
ww2_germany.81.a:0 "Andere Volksdeutsche sollen inspiriert werden!"
ww2_germany.82.t:0 "In Dresden und Leipzig erheben sich Volkssturmbataillone"
ww2_germany.82.d:0 "Mein Führer, als die bolschewistische Horde auf Dresden und Leipzig zusteuerte, haben unsere Volksdeutschen es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat tapfer bis zum Tod oder Sieg zu verteidigen, wie es jeder Volksdeutsche tun sollte!"
ww2_germany.82.a:0 "Eine tapfere Anstrengung!"
ww2_germany.83.t:0 "In Erfurt erheben sich Volkssturmbataillone"
ww2_germany.83.d:0 "Mein Führer, als die bolschewistische Horde auf Erfurt zusteuerte, haben unsere Volksdeutschen es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat tapfer bis zum Tod oder Sieg zu verteidigen, wie es sich für jeden Volksdeutschen gehört!"
ww2_germany.83.a:0 "Wir werden die Bolschewiki nicht gewinnen lassen!"
ww2_germany.84.t:0 "Volkssturmbataillone erheben sich in der Kriegsstadt Berlin!"
ww2_germany.84.d:0 "Mein Führer, die bolschewistische Horde nähert sich dem Herzen des Reiches, Berlin selbst. Unsere Volksdeutschen, die in der Stadt leben, haben es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat und die Hauptstadt des Reiches tapfer bis zum Tod oder Sieg zu verteidigen, wie es sich für jeden Volksdeutschen gehört."
ww2_germany.84.a:0 "Der Führer wird ihnen in dieser und der nächsten Schlacht zur Seite stehen!"
ww2_germany.85.t:0 "In Frankfurt erheben sich Volkssturmbataillone"
ww2_germany.85.d:0 "Mein Führer, als der Feind sich Frankfurt näherte, haben unsere Volksdeutschen es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat tapfer bis zum Tod oder Sieg zu verteidigen, wie es jeder Volksdeutsche tun sollte!"
ww2_germany.85.a:0 "Bis zum letzten Mann!"
ww2_germany.86.t:0 "In Stuttgart erheben sich Volkssturmbataillone"
ww2_germany.86.d:0 "Mein Führer, als der Feind sich Stuttgart näherte, haben unsere Volksdeutschen es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat tapfer bis zum Tod oder Sieg zu verteidigen, wie es sich für jeden Volksdeutschen gehört!"
ww2_germany.86.a:0 "Sie werden es nicht nehmen!"
ww2_germany.87.t:0 "In Köln, Essen und Dortmund erheben sich Volkssturmbataillone"
ww2_germany.87.d:0 "Mein Führer, der Feind nähert sich Köln, Essen und Dortmund. Unsere Volksdeutschen haben es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat tapfer bis zum Tod oder Sieg zu verteidigen, wie es jeder Volksdeutsche tun sollte!"
ww2_germany.87.a:0 "Sie dürfen nicht fallen!"
ww2_germany.88.t:0 "In München erheben sich Volkssturmbataillone"
ww2_germany.88.d:0 "Mein Führer, als der Feind sich München näherte, haben unsere Volksdeutschen es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat tapfer bis zum Tod oder Sieg zu verteidigen, wie es sich für jeden Volksdeutschen gehört!"
ww2_germany.88.a:0 "Bis zum letzten Mann!"
ww2_germany.89.t:0 "In Wien erheben sich Volkssturmbataillone"
ww2_germany.89.d:0 "Mein Führer, als die bolschewistische Horde sich Wien näherte, haben unsere Volksdeutschen es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat tapfer bis zum Tod oder Sieg zu verteidigen, wie es sich für jeden Volksdeutschen gehört!"
ww2_germany.89.a:0 "Kapitellerien? Nein!"
ww2_germany.90.t:0 "Volkssturmbataillone erheben sich in Nürnberg"
ww2_germany.90.d:0 "Mein Führer, als der Feind sich Nürnberg näherte, haben unsere Volksdeutschen es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat tapfer bis zum Tod oder Sieg zu verteidigen, wie es sich für jeden Volksdeutschen gehört!"
ww2_germany.90.a:0 "Wir werden siegen!"
ww2_germany.91.t:0 "In Hannover und Bremen erheben sich Volkssturmbataillone"
ww2_germany.91.d:0 "Mein Führer, angesichts der Nähe des Feindes zu Hannover und Bremen haben unsere Volksdeutschen es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat tapfer bis zum Tod oder Sieg zu verteidigen, wie es sich für jeden Volksdeutschen gehört!"
ww2_germany.91.a:0 "Ruhm den Helden!"
ww2_germany.92.t:0 "In Rostock erheben sich Volkssturmbataillone"
ww2_germany.92.d:0 "Mein Führer, als die bolschewistische Horde auf Rostock zukam, haben unsere Volksdeutschen es sich zur Aufgabe gemacht, Bataillone zu bilden, die aus Jungen ab 11 Jahren und Männern bis Mitte 60 bestehen, gelegentlich auch aus Frauen. Sie planen, ihre Heimat tapfer bis zum Tod oder Sieg zu verteidigen, wie es sich für jeden Volksdeutschen gehört!"
ww2_germany.92.a:0 "Vorbildliches Volksdeutsch"
ww2_germany.93.t:0 "Führers Geburtstag"
ww2_germany.93.d:0 "An diesem schönen Tag feiern wir den Geburtstag des Führers und danken ihm, denn nur er ist der Grund, warum Deutschland heute noch lebt."
ww2_germany.93.a:0 "Der Sieg wird bald kommen!"
ww2_germany.94.t:0 "Alte Depots aus dem Ersten Weltkrieg eröffnet"
ww2_germany.94.d:0 "Mein Führer, in einem verzweifelten Versuch, den Volkssturm zu bewaffnen, für den wir kaum oder gar keine Waffen mehr übrig haben, haben wir die alten Depots geöffnet, die Gewehre, Maschinengewehre und andere Waffen aus dem Ersten Weltkrieg enthalten."
ww2_germany.94.a:0 "Nun, das muss einfach reichen"
ww2_germany.95.t:0 "Himmler verhandelt mit den Alliierten"
ww2_germany.95.d:0 "Mein Führer, wir haben heute erfahren, dass der sogenannte „treue Heinrich“ hinter unserem Rücken kürzlich einen Friedensvertrag ausgehandelt hat. Dies ist vielleicht einer der schlimmsten Verrätereien, die je begangen wurden."
ww2_germany.95.a:0 "Himmler ist ein toter Mann ..."
ww2_germany.96.t:0 "Jugoslawische Partisanen erheben sich"
ww2_germany.96.d:0 "Mein Führer, die kommunistisch geführten jugoslawischen Partisanen sind aus ihren Verstecken aufgetaucht und haben uns angegriffen."
ww2_germany.96.a:0 "Sie müssen eingeschläfert werden!"
