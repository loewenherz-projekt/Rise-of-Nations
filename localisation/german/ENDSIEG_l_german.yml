ww2_germany.112.d:0 "Mein Führer, die kommunistisch geführten jugoslawischen Partisanen sind aus ihren Verstecken aufgestanden und haben uns angegriffen."
ww2_germany.112.a:0 "Sie müssen niedergeschlagen werden"
ww2_germany.113.t:0 "Nichts"
ww2_germany.113.a:0 "Nichts"
ww2_germany.114.t:0 "Führer verlässt Berlin"
ww2_germany.114.d:0 "Berlin steht kurz vor der Einnahme, und der Führer hat sich verabschiedet und kämpft mit den Volksdeutschen bis zum Ende weiter. Dann fliegt der deutsche Jagdflieger Hannah Rietsch, die einzige Frau im Reich, die das Eiserne Kreuz erster Klasse trägt, den Führer in Sicherheit, von wo aus der Kampf bis zum Sieg weitergeht!"
ww2_germany.114.a:0 "Der Krieg geht weiter!"
ww2_germany.115.t:0 "Hannah Rietsch kommt"
ww2_germany.115.d:0 "Doch auch jetzt hat Hitler noch einen Schutzengel: die Kampfpilotin Hannah Rietsch, die einzige weibliche Fliegerassträgerin, die das Eiserne Kreuz Erster Klasse erhielt. Sie ist dem Führer absolut ergeben. Sie steuerte ein Leichtflugzeug ins Herz des umkämpften Berlins und landete im Tiergarten nahe dem Brandenburger Tor. Von dort aus unternahm sie mit General Ritter von Greim eine gefährliche Reise zu Hitlers Bunker. Hannah Rietsch ist Hitlers letzte Chance zu fliehen, doch er will nicht gehen, er beschließt, seinem Schicksal in Berlin zu begegnen..."
ww2_germany.115.a:0 "Der Führer wird nicht fliehen!"
ww2_germany.116.t:0 "Willkommen beim Mod"
ww2_germany.116.d:0 "Willkommen bei Endsieg: Ultimate Victory! Dieser Mod wird derzeit von einer Person entwickelt. Wenn Sie also helfen möchten, kontaktieren Sie mich einfach! Vielen Dank an meinen Freund Soldier, der mit einigen technischen Grafiken geholfen hat, und an Dethorath, der eine ganze Reihe von Ereignissen für die Zwischenkriegszeit geschrieben hat. \n\n Ardennenoffensive/Endsieg-Szenario \n\n Deutschland ist derzeit in einer schlechten Lage, SEHR SEHR SCHLECHT. Die Alliierten rücken von drei Seiten vor, in Italien, im Osten und im Westen. Es gibt wenig Hoffnung auf Erfolg. Das Reich hat noch immer große Macht über die Gebiete, die es kontrolliert, und die Volksdeutschen sind bereit, bis zum letzten Mann zu kämpfen."
ww2_germany.116.a:0 "OK"
ww2_germany.117.t:0 "Kurt Knispel im Kampf gefallen"
ww2_germany.117.d:0 "Kurt Knispel, ein Sudetendeutscher und unser bester Panzerass mit 168 bestätigten Panzerabschüssen, wurde heute in der Nähe von Urbau in der Tschechoslowakei getötet. Zweifellos hat er bis zu seinem Tod ehrenhaft gegen die Bolschewiken gekämpft ..."
ww2_germany.117.a:0 "Ein tragischer Verlust..."
ww2_germany.117.b:0 "Erfahren Sie mehr über Kurt Knispel"
ww2_germany.118.t:0 "Wer ist Kurt Knispel?"
ww2_germany.118.d:0 "Kurt Knispel war ein Sudetendeutscher und mit 168 (möglicherweise sogar 195) bestätigten Panzerabschüssen der erfolgreichste Kämpfer in der Panzerkriegsführung. Dennoch hört man sehr selten von ihm. Warum? \n\n Anders als Michael Wittmann, der vielleicht der berühmteste Panzerass damals wie heute ist, ist Kurt Knispel trotz seiner Erfolge relativ unbekannt. Während seiner Dienstzeit bei den Panzertruppen kämpfte er in praktisch jedem Panzertyp und diente als Richtschütze, Ladeschütze und Kommandant. Schließlich wurde er mit dem Eisernen Kreuz Erster Klasse und dem Panzerabwehrabzeichen in Gold ausgezeichnet. \n\n Knispel wurde jedoch nie schnell befördert oder erhielt das Ritterkreuz, obwohl er mehrmals dafür vorgeschlagen wurde. Dies lag an seiner rebellischen Haltung und seinen Auseinandersetzungen mit seinen Vorgesetzten. Außerdem war er aufgrund seiner Neutralität gegenüber den Ideen des Nationalsozialismus kein perfektes Propagandamaterial. Kurt Knispel strebte nie nach Ruhm oder Anerkennung, er war einfach ein sehr fähiger Panzerkommandant, Ladeschütze und Richtschütze, der von seinen Kameraden als freundlich und sehr hilfsbereit beschrieben wurde und dafür bekannt war, seinen Kameraden Panzerabschüsse zu ermöglichen."
ww2_germany.118.a:0 "Einer der besten Soldaten und einer der am wenigsten bekannten"
ww2_germany.119.t:0 "Großbritannien stimmt Waffenstillstand zu!"
ww2_germany.119.d:0 "Nach dem Fall Frankreichs und der Vertreibung der britischen Streitkräfte vom europäischen Festland hat Großbritannien bitterlich einem Waffenstillstand zwischen unseren beiden Nationen zugestimmt, der heute in Calais unterzeichnet wurde. Zwar soll bald ein endgültiger Vertrag zwischen unseren Nationen ausgehandelt werden, doch ist es unwahrscheinlich, dass wir drastische Entscheidungen treffen können, da Großbritannien nach wie vor über die größte Flotte der Welt verfügt und mit seiner Insellage den besten Schutz vor Invasionen bietet."
ww2_germany.119.a:0 "Der Sieg gehört uns!"
ww2_germany.120.t:0 "Amerikaner stimmen Waffenstillstand zu!"
ww2_germany.120.d:0 "Die Amerikaner, die erst im vergangenen Jahr in den Krieg eingetreten sind und erst Anfang dieses Jahres eine bedeutende Rolle spielten, haben nach der Kapitulation Frankreichs einem Waffenstillstand in Calais mit den Briten zugestimmt. Der Frieden, der zwischen unseren beiden Nationen besteht, ist und bleibt ein weißer Frieden, wobei die Amerikaner höchstwahrscheinlich zu ihrer isolationistischen Haltung zurückkehren werden."
ww2_germany.120.a:0 "Tolle Neuigkeiten!"
ww2_germany.121.t:0 "Italien stimmt Waffenstillstand zu"
ww2_germany.121.d:0 "Nachdem Frankreich abgezogen ist und Großbritannien und die Amerikaner kurz darauf folgten, haben die Italiener widerwillig einem Waffenstillstand in der Nähe von Vittorio Veneto zugestimmt. Auch unter dem Druck der Bevölkerung, bei der der Krieg in den letzten Jahren immer unbeliebter geworden ist, soll bald mit der Ausarbeitung eines endgültigen Vertrags begonnen werden."
ww2_germany.121.a:0 "Hätte bei uns bleiben sollen!"
ww2_germany.122.t:0 "Griechenland stimmt Waffenstillstand zu"
ww2_germany.122.d:0 "Das Königreich Griechenland hat einem Waffenstillstand zugestimmt, der heute in Vardar, Mazedonien, unterzeichnet wurde. Damit werden alle Feindseligkeiten auf dem Balkan zwischen Griechenland und den Mittelmächten eingestellt. Die Griechen stimmten den Bedingungen des Gefangenenaustauschs, der Einstellung der Feindseligkeiten, der Zusage von Reparationen, der Kapitulation der griechischen Seestreitkräfte vor den Osmanen und dem Rückzug aller griechischen Streitkräfte hinter die eigenen Grenzen zu. Albanien wurde als souveräner Staat wiederhergestellt, nachdem die österreichisch-ungarischen und griechischen Streitkräfte das Gebiet verlassen hatten und Wilhelm von Wied die Macht zurückeroberte. Schließlich wurde Westthrakien von Bulgarien vorübergehend an Griechenland zurückgegeben. Verhandlungen über einen endgültigen Vertrag werden in den kommenden Monaten beginnen."
ww2_germany.122.a:0 "Wie ein Kartenhaus ..."
ww2_germany.123.t:0 "Beginn der Gespräche zum Vertrag von Antwerpen, belgische Frage"
ww2_germany.123.d:0 "Heute haben die Gespräche mit Großbritannien über die Zukunft Belgiens begonnen. \n\n Gestalten Sie Ihren eigenen Friedensvertrag! Jede Option hat ihre Vor- und Nachteile. \n\n Eine Annexion Belgiens würde unsere Verhandlungsposition gegenüber Großbritannien später stark einschränken, da die Briten die Annexion Antwerpens als direkte Bedrohung ansehen würden, da das Land ein Pufferstaat für Großbritannien ist und der Hafen von Antwerpen in unseren Händen eine Bedrohung für ihre Position darstellen würde. \n\n Eine Marionettenpolitik gegenüber Belgien würde ähnlich gesehen werden wie eine Annexion. \n\n Die Einnahme aller Gebiete hinter der Maas und die Unabhängigkeit des restlichen Belgiens wäre für die Briten ideal. \n\n Neben der Einnahme von Lüttich und des Landes hinter der Maas können wir auch Belgisch-Kongo einnehmen. \n\n Eine Aufteilung Belgiens in zwei separate Staaten, Wallonien und Flandern, wobei Wallonien de facto unter unsere Herrschaft fällt und wir unseren eigenen Pufferstaat gegen die mit Großbritannien verbündeten Länder Flandern und Frankreich haben könnten. Auch Belgisch-Kongo würde unter unsere Kontrolle fallen. Allerdings werden die Briten nicht so geneigt sein, viele ihrer anderen Besitztümer aufzugeben, wenn wir einen aggressiveren Ansatz verfolgen."
ww2_germany.123.a:0 "Anhang Belgien"
ww2_germany.123.b:0 "Marionette Belgien"
ww2_germany.123.c:0 "Land hinter der Maas einnehmen"
ww2_germany.123.dd:0 "Land hinter der Maas und Belgisch-Kongo einnehmen"
ww2_germany.123.e:0 "Belgien teilen und Belgisch-Kongo einnehmen"
ww2_germany.123.f:0 "Belgien in Ruhe lassen, keine Zugeständnisse"
ww2_germany.124.t:0 "Belgische Frage beantwortet Deutschland sagt: „Annex Belgien“"
ww2_germany.124.d:0 "Wir haben beschlossen, den gesamten Staat Belgien zu annektieren, um unsere größtmögliche Sicherheit in Europa zu gewährleisten und die Oberhand über die Briten zu gewinnen. Dies wird jedoch sehr schwerwiegende Auswirkungen haben und könnte das einzige Hauptthema des Vertrags sein, mit wenigen bis keinen anderen territorialen Zugeständnissen."
ww2_germany.124.a:0 "Lasst uns weitermachen"
ww2_germany.124.b:0 "Ich ändere meine Meinung"
ww2_germany.125.t:0 "Belgische Befragung beantwortet: Deutschland sagt: „Marionettenbelgien“"
ww2_germany.125.d:0 "Wir haben beschlossen, den Staat Belgien zu einer Marionettenregierung zu machen und ein prodeutsches Regime einzusetzen. Obwohl dies eine bessere Option ist als die Annexion des gesamten belgischen Staates, ist es dennoch sehr bedrohlich, wenn auch nicht so bedrohlich wie die Annexion des gesamten Landes. Außerdem werden wir nach dieser Entscheidung kaum noch andere territoriale Zugeständnisse haben, die wir vom Vereinigten Königreich anderswo fordern können."
ww2_germany.125.a:0 "Lasst uns weitermachen"
ww2_germany.125.b:0 "Ich ändere meine Meinung"
ww2_germany.126.t:0 "Belgische Frage beantwortet, Deutschland sagt: „Nehmen Sie Land hinter der Maas, lassen Sie Belgien unabhängig“"
ww2_germany.126.d:0 "Wir haben beschlossen, das Land hinter der Maas einzunehmen und den Rest Belgiens unabhängig und neutral zu lassen, wie es vor dem Krieg der Fall war. Dies wird den Briten sehr entgegenkommen, und wir werden in den Verhandlungen mehr Flexibilität haben, um anderswo Zugeständnisse zu fordern."
ww2_germany.126.a:0 "Lasst uns weitermachen"
ww2_germany.126.b:0 "Ich ändere meine Meinung"
ww2_germany.127.t:0 "Belgische Frage beantwortet, Deutschland sagt: „Nehmt Land hinter der Maas und Belgisch-Kongo“"
ww2_germany.127.d:0 "Wir haben beschlossen, das gesamte Land hinter der Maas zu besetzen und ihnen auch die Kolonie Belgisch-Kongo zu überlassen. Dies mag als etwas aggressiver angesehen werden und unsere territorialen Zugeständnisse einschränken, allerdings nicht in großem Ausmaß. Wir hätten bei weiteren Verhandlungen mit Großbritannien immer noch einen relativ guten Spielraum."
ww2_germany.127.a:0 "Lasst uns weitermachen"
ww2_germany.127.b:0 "Ich ändere meine Meinung"
ww2_germany.128.t:0 "Belgische Frage beantwortet, Deutschland sagt: „Spaltet Belgien in zwei Staaten, nehmt den Kongo“"
ww2_germany.128.d:0 "Wir haben beschlossen, Belgien in zwei separate Staaten aufzuteilen: Wallonien und Flandern. Wallonien wird unsere Marionette, während Flandern ein unabhängiger Staat im Norden wird. Dabei respektieren wir weiterhin die britischen Verteidigungsinteressen und halten die belgischen Häfen von uns fern. Darüber hinaus fällt mit diesem Abkommen der Kongo in unsere Hände, was als leicht aggressiver Akt gewertet wird. Wir hätten jedoch immer noch eine gewisse Flexibilität bei den Verhandlungen, dürfen aber keine absurden Forderungen stellen."
ww2_germany.128.a:0 "Lasst uns weitermachen"
ww2_germany.128.b:0 "Ich ändere meine Meinung"
ww2_germany.129.t:0 "Vertrag von Gent, die Suezfrage"
ww2_germany.129.d:0 "Wenn wir den Suezkanal selbst einnehmen würden, würde das die britische Machtprojektion im Mittelmeerraum erheblich schwächen und wir könnten höchstwahrscheinlich keine ernsthafteren Forderungen stellen, auf der anderen Seite hätten wir jedoch eine große Macht und könnten den Kanal kontrollieren. \n\n Wenn wir den Suezkanal verlassen, können wir im weiteren Verlauf der Diskussion weitere Forderungen stellen. \n\n Den Türken den Suezkanal zu überlassen, würde das Osmanische Reich zufriedenstellen und die Briten eher bereit machen, das Gebiet abzutreten. Allerdings liegt es in den Händen der Türken, wem es „gehört“. Obwohl sie technisch gesehen unsere Marionette sind, könnten wir bei einem Führungswechsel bedroht sein. \n\n Die Gründung eines unabhängigen Ägypten würde unsere weiteren Forderungen an die Briten erheblich einschränken, jedoch würde dies die gesamte britische Machtprojektion im Mittelmeerraum beseitigen und das ägyptische Sultanat de facto zu einer Marionette des Reiches machen. \n\n Die Übergabe Ägyptens an die Türken würde auch unsere späteren Forderungen einschränken, und wenn unser Bündnis mit den Türken später zerbricht, werden wir keinen dieser Vorteile haben. \n\n Die Eingliederung Ägyptens in unsere Kolonie wäre vielleicht die drastischste Entscheidung, die viel Schande nach sich ziehen und weitere Verhandlungen stark einschränken würde."
ww2_germany.129.a:0 "Suez für uns selbst einnehmen"
ww2_germany.129.b:0 "Gebt den Türken den Suezkanal"
ww2_germany.129.c:0 "Gründung des unabhängigen Ägypten"
ww2_germany.129.dd:0 "Transfer von Ägypten in die Türkei"
ww2_germany.129.e:0 "Annex Ägypten"
ww2_germany.129.f:0 "Keine Zugeständnisse"
ww2_germany.130.t:0 "Antwort auf die belgische Frage: Deutschland fordert „Belgien unabhängig“ – keine Zugeständnisse"
ww2_germany.130.d:0 "Wir haben uns entschieden, Belgien in seinem Vorkriegszustand zu belassen. Für die Briten ist das die beste Option, und wenn der Vertrag in die Tat umgesetzt wird, werden wir uns später sicherlich noch viel mehr erlauben können."
ww2_germany.130.a:0 "Lasst uns weitermachen"
ww2_germany.130.b:0 "Ich ändere meine Meinung"
ww2_germany.131.t:0 "Suez-Frage beantwortet „Deutschland sagt: Wir nehmen den Suezkanal“"
ww2_germany.131.d:0 "Wir haben uns entschieden, den Suezkanal einzunehmen und den Briten den Rest ihrer ägyptischen Kolonie zu überlassen. Dies wird unsere Seemacht auf See erheblich stärken, aber wir müssen unseren neuen Standort sichern, da die Gefahr einer britischen Invasion nie allzu weit entfernt ist und sie wahrscheinlich rachsüchtig und direkt nebenan sind."
ww2_germany.131.a:0 "Fortfahren"
ww2_germany.131.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.132.t:0 "Suez-Frage beantwortet, Deutschland sagt: „Gebt den Türken den Suezkanal“"
ww2_germany.132.d:0 "Wir haben uns entschieden, den Suezkanal nicht für uns zu beanspruchen, sondern ihn unserem Verbündeten, dem Osmanischen Reich, zu überlassen. Dies würde von den Briten als neutralerer Ansatz angesehen werden. Da die Osmanen jedoch stark unter unserem Einfluss stehen, könnte das Schicksal des Suezkanals in eine andere Richtung gehen, wenn wir uns zerstreiten."
ww2_germany.132.a:0 "Fortfahren"
ww2_germany.132.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.133.t:0 "Suezfrage beantwortet, Deutschland sagt: „Bilden Sie ein unabhängiges Ägypten“"
ww2_germany.133.d:0 "Wir haben uns nicht nur entschlossen, den Suezkanal einzunehmen, sondern die Engländer auch zur Aufgabe ihrer gesamten ägyptischen Kolonie zu zwingen, in der Hoffnung, die Region insgesamt zu sichern. Sie steht nun unter unserem Einfluss als Marionette, und wir müssen keine Invasion einer benachbarten feindlichen Kolonie befürchten. Dies wird jedoch die Menge an weiteren Forderungen, die wir danach stellen können, erheblich einschränken."
ww2_germany.133.a:0 "Fortfahren"
ww2_germany.133.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.134.t:0 "Suez-Frage beantwortet, Deutschland sagt: „Übergeben Sie Ägypten an die Türken“"
ww2_germany.134.d:0 "Angesichts der türkischen Interessen in der Region haben wir beschlossen, die ägyptische Kolonie in türkische Hände zu geben. Aus britischer Sicht wäre dies ein neutralerer Ansatz, da die Kolonie nicht vollständig unter unserer Kontrolle, sondern nur unter unserem Einfluss stünde. Ein Streit mit den Türken könnte jedoch bedeuten, dass Ägypten in feindliche Hände fällt."
ww2_germany.134.a:0 "Fortfahren"
ww2_germany.134.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.135.t:0 "Suezfrage beantwortet, Deutschland sagt: „Ägypten ins Reich eingliedern“"
ww2_germany.135.d:0 "Wir haben beschlossen, die ägyptische Kolonie direkt aus der britischen Herrschaft in unsere vollständige und absolute Kontrolle zu überführen. Dies würde jedoch von Natur aus als sehr aggressiver Akt angesehen werden und unsere sonstigen Forderungen erheblich einschränken."
ww2_germany.135.a:0 "Fortfahren"
ww2_germany.135.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.136.t:0 "Suez-Frage beantwortet, Deutschland sagt: „Verlasst den Suezkanal“"
ww2_germany.136.d:0 "Wir haben beschlossen, den Suezkanal und Ägypten vollständig unter britischer Kontrolle zu belassen, um anderswo weitere Zugeständnisse zu erwirken."
ww2_germany.136.a:0 "Fortfahren"
ww2_germany.136.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.137.t:0 "Vertrag von Gent, die Suezfrage"
ww2_germany.137.d:0 "Da wir uns entschieden haben, Belgien vollständig zu annektieren, haben wir nur die kleine Wahl, den Suezkanal einfach den Türken zu überlassen."
ww2_germany.137.a:0 "Übergebt Suez an die Türkei"
ww2_germany.138.t:0 "Vertrag von Gent, die Suezfrage"
ww2_germany.138.d:0 "Eine Übernahme des Suezkanals würde die britische Macht im Mittelmeerraum erheblich schwächen und wir könnten höchstwahrscheinlich keine ernsthafteren Forderungen stellen, andererseits würden wir diese Machtposition jedoch auch erhalten. \n\n Eine Übergabe des Suezkanals an die Türken würde das Osmanische Reich zufriedenstellen und die Briten eher zur Abtretung des Gebiets bereit machen. Allerdings liegt es in den Händen der Türken, wem es „gehört“. Obwohl sie technisch gesehen unsere Marionette sind, könnten wir bei einem Führungswechsel bedroht sein. \n\n Wenn wir den Suezkanal verlassen, können wir im weiteren Verlauf der Diskussion weitere Forderungen stellen."
ww2_germany.138.a:0 "Nehmen Sie Suez"
ww2_germany.138.b:0 "Übergebt Suez an die Türkei"
ww2_germany.138.c:0 "Keine Zugeständnisse"
ww2_germany.139.t:0 "Suez-Frage beantwortet, Deutschland sagt: „Gebt den Türken den Suezkanal“"
ww2_germany.139.d:0 "Wir haben uns entschieden, den Suezkanal nicht für uns zu beanspruchen, sondern ihn unserem Verbündeten, dem Osmanischen Reich, zu überlassen. Dies würde von den Briten als neutralerer Ansatz angesehen werden. Da die Osmanen jedoch stark unter unserem Einfluss stehen, könnte das Schicksal des Suezkanals in eine andere Richtung gehen, wenn wir uns zerstreiten."
