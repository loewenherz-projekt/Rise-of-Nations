 AUS_war_exhaustion_desc:0 "Die Bevölkerung Österreich-Ungarns ist des Kämpfens müde, es ist klar, dass das Reich verliert und dass die Überreste des Reiches von Massendesertion und Arbeiterstreiks geplagt werden."
 GE1_war_exhaustion_desc:0 "Die Menschen in Deutschland sind des Krieges müde, die Unterstützung für den Krieg nimmt täglich ab, die Menschen hungern, die Soldaten bekommen kaum noch genug zu essen. Die Menschen in Deutschland haben aufgegeben."
 BNN_war_exhaustion_desc:0 "Bulgarien hat tapfer gegen die Mittelmächte gekämpft, doch das Königreich ist kriegsmüde, und unsere Truppen sind unterausgerüstet, einige hungern, und viele desertieren. Tag für Tag schwindet die Unterstützung für den Krieg und damit auch unsere Überlebenschancen."
 OTT_war_exhaustion_desc:0 "Das Osmanische Reich hat tapfer gekämpft und mehr erreicht als erwartet, aber wir haben keine Chance gegen die Verbündeten, die bereits tief in unser Land eingedrungen sind, Jerusalem und Bagdad eingenommen haben und schnell weiter nach Norden vorrücken."
 AUH_multiethnic_desc:0 "Österreich-Ungarn ist ein Vielvölkerreich, und die Aufteilung mehrerer Ethnien in einem Land hat ihm nicht gut getan. Sie erschwert die Kommunikation und die Befehlsgebung, und unter Nichtösterreichern und Ungarn ist Patriotismus nicht vorhanden."
 GER_lowsupply_desc:0 "Deutschlands Heimatfront versagt, was sich auch an der Kriegsfront widerspiegelt, da die Versorgung mit Nachschub von Tag zu Tag schwieriger wird, da unsere industrielle Basis immer schwächer wird und der neue amerikanische Riese auf der feindlichen Seite steht."
 GER_hitler_jugend:0 "Hitlerjugend"
 hitler_jugend:0 "Hitlerjugend"
 GER_kaiserschlacht_desc:0 "Am 21. März 1918 führte das deutsche Oberkommando die Operation Michael durch, in einem letzten verzweifelten Versuch, die europäischen Verbündeten auszuschalten, bevor die US-Truppen in großer Zahl eintrafen."
 FRA_hundred_days_offensive_desc:0 "Da die deutsche Frühjahrsoffensive eindeutig gescheitert war, reagierten die Alliierten mit einem Gegenangriff, der zu einer Reihe schneller Siege gegen die nun erschöpfte, sich zurückziehende deutsche Armee führte."
 GRE_vardar_offensive_desc:0 "Im September 1918 starteten die Griechen mit Unterstützung der Alliierten eine Offensive gegen Bulgarien in Vardar-Mazedonien, die schließlich zum bulgarischen Zusammenbruch führte."

