 RUS_request_allied_support_1:0 "Alliierte Unterstützung I"
 RUS_request_allied_support_1_desc:0 "Die westlichen Alliierten sind vorerst bereit, uns mit Uniformen und Munition zu unterstützen, doch wenn wir bei ihnen in Ungnade fallen, werden wir ebenso leicht von diesem kostenlosen Vorrat an Vorräten abgeschnitten sein."
 RUS_request_allied_support_2:0 "Alliierte Unterstützung II"
 RUS_request_allied_support_2_desc:0 "Die westlichen Alliierten sind vorerst bereit, uns mit Uniformen und Munition zu unterstützen, doch wenn wir bei ihnen in Ungnade fallen, werden wir ebenso leicht von diesem kostenlosen Vorrat an Vorräten abgeschnitten sein."
 RUS_request_allied_support_3:0 "Alliierte Unterstützung III"
 RUS_request_allied_support_3_desc:0 "Die westlichen Alliierten sind vorerst bereit, uns mit Uniformen und Munition zu unterstützen, doch wenn wir bei ihnen in Ungnade fallen, werden wir ebenso leicht von diesem kostenlosen Vorrat an Vorräten abgeschnitten sein."
 RUS_request_allied_support_4:0 "Alliierte Unterstützung IV"
 RUS_request_allied_support_4_desc:0 "Die westlichen Alliierten sind vorerst bereit, uns mit Uniformen und Munition zu unterstützen, doch wenn wir bei ihnen in Ungnade fallen, werden wir ebenso leicht von diesem kostenlosen Vorrat an Vorräten abgeschnitten sein."
 RUS_befriend_japan:0 "Befreunde dich mit Japan"
 RUS_befriend_japan_desc:0 ""
 RUS_offer_siberian_land:0 "Angebot Japan Gebiet"
 RUS_offer_siberian_land_desc:0 "Es besteht kein Zweifel, dass die Japaner unseren Bürgerkrieg als eine mögliche Gelegenheit nutzen, einen großen Teil unseres sibirischen Territoriums einzunehmen, aber sie sind immer noch skeptisch. Wenn wir ihnen einen großen Teil Sibiriens anbieten, werden sie vielleicht ganz auf unserer Seite in den Bürgerkrieg eintreten und uns helfen, die Bolschewiken zu vernichten. Mit den Japanern könnten wir uns später befassen ..."
 RUS_restore_order:0 "Reihenfolge wiederherstellen"
 RUS_restore_order_desc:0 "Die Nationen, die ihre Unabhängigkeit erklärt haben und früher Teil des Zarenreichs waren, sind in ihrer Existenz nichts weiter als illegitim. Es ist unsere Pflicht, sie ins Mutterland zurückzubringen!"
