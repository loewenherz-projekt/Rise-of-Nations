 IT1_claims_libya:0 "Ansprüche an Libyen"
 IT1_claims_libya_desc:0 "Seit dem Russisch-Türkischen Krieg von 1877 haben wir mit der Zustimmung der anderen Großmächte öffentlich unsere Augen auf Tripolitanien gerichtet."
 IT1_italo_turkish_war:0 "Italienisch-Türkischer Krieg"
 IT1_italo_turkish_war_desc:0 "Es ist an der Zeit, dem kranken Mann Europa das zu nehmen, was uns gehört. Dieser Krieg dürfte höchstens ein einfacher militärischer Marsch sein, und schon bald wird das rohstoffreiche Nordafrika uns gehören!"
 IT1_supress_senussi:0 "Unterdrücken Sie den Senussi-Orden"
 IT1_supress_senussi_desc:0 "Seit wir Tripolitanien erobert haben, befinden sich die Separatisten des Senussi-Ordens im Krieg mit uns und kämpfen als Guerillas in den Wüsten Tripolitaniens."
 IT1_establish_italian_presence:0 "Aufbau einer italienischen Militärpräsenz"
 IT1_establish_italian_presence_desc:0 "Seit der Übergabe Tripolitaniens in unsere Hände war die Besetzung nicht gerade einfach. Die Bevölkerung Tripolitaniens ist grundsätzlich gegen unsere Herrschaft und unterstützt Dissidenten wie den Senussi-Orden. Deshalb ist es wichtig, eine stärkere Militärpräsenz aufzubauen, um diesen Dissidenten in Nordafrika einzudämmen."
 IT1_prepare_for_war:0 "Bereite dich auf den Krieg vor"
 IT1_prepare_for_war_desc:0 ""
 IT1_support_germany:0 "Unterstützen Sie den Dreibund"
 IT1_support_germany_desc:0 "Vielleicht sollten wir beim guten alten Dreibund bleiben, schließlich ist er ziemlich strategisch und wir können noch viel gewinnen."
 IT1_claim_france:0 "Italienische Ansprüche auf Frankreich"
 IT1_claim_france_desc:0 "Die Italiener auf Korsika und in Savoyen sehnen sich seit der französischen Machtübernahme nach der Wiedervereinigung mit unserer großen Nation, und auch in Österreich gibt es viele, mit deren Wiedervereinigung wir uns später befassen können …"
 IT1_demand_tyrol:0 "Nachfrage Südtirol"
 IT1_demand_tyrol_desc:0 "Die Mittelmächte brauchen uns offensichtlich, also warum versuchen wir nicht, mit ihnen ein Abkommen zu schließen, in dem wir ihnen zumindest Tirol für unsere Teilnahme an ihrem Krieg überlassen."
 IT1_honor_alliance:0 "Ehre Dreibund"
 IT1_honor_alliance_desc:0 "Für uns ist die Zeit gekommen, den Dreibund zu ehren und uns unseren Verbündeten in ihrem Krieg anzuschließen."
 IT1_honor_alliance_2:0 "Ehre Dreibund"
 IT1_honor_alliance_2_desc:0 "Für uns ist die Zeit gekommen, den Dreibund zu ehren und uns unseren Verbündeten in ihrem Krieg anzuschließen."
 IT1_neutral_stance:0 "Vorübergehende neutrale Haltung"
 IT1_neutral_stance_desc:0 "Wir werden uns unseren „Verbündeten“ in ihrem Angriffskrieg gegen Serbien nicht anschließen, da der Dreibund als Verteidigungspakt gedacht war und wir nicht verpflichtet sind, uns an einem Angriffskrieg zu beteiligen."
 IT1_deal_with_france:0 "Londoner Pakt"
 IT1_deal_with_france_desc:0 "Wir haben einen geheimen Pakt zwischen uns und der Entente geschlossen, in dem uns die Entente große Teile Österreich-Ungarns im Norden Italiens und im Osten jenseits der Adria versprochen hat. Auch die Briten haben uns finanzielle Unterstützung zugesagt."
 IT1_join_war:0 "Schließe dich dem Krieg an"
 IT1_join_war_desc:0 "Für Italien ist die Zeit gekommen, in den Ersten Weltkrieg einzutreten. Wenn wir siegen, werden wir uns mit allen Italienern vereinen, die derzeit von Österreich-Ungarn unterworfen sind."
 IT1_entente_diplomacy:0 "Entente-Diplomatie"
 IT1_entente_diplomacy_desc:0 "Angesichts der Tatsache, dass es sich bei der Entente um unsere derzeitigen Verbündeten im Krieg handelt, ist die Verbesserung unserer Beziehungen zur Entente von entscheidender Bedeutung."
 IT1_request_allied_support:0 "Allied Support anfordern"
 IT1_request_allied_support_desc:0 "Allein hatten wir in letzter Zeit Mühe, den Krieg zu bewältigen und einen totalen Sieg zu erringen. Hinzu kamen unterdurchschnittliche Ergebnisse an der Front."

 # German Empire Hocus Pocus

 GE1_alternative_diplomacy:0 "Alternative Diplomatie"
 GE1_alternative_diplomacy_desc:0 "Vielleicht gelingt es uns, mit anderen Ländern ein paar Abkommen zu schließen, um sie zu neutralisieren oder in unseren Einflussbereich zu holen, aber nichts davon ist garantiert."
 GE1_negotiate_sweden:0 "Mit Schweden verhandeln"
 GE1_negotiate_sweden_desc:0 "Wir können versuchen, mit Schweden zu verhandeln und ihnen ihr früheres Territorium Finnlands zurückzugeben, wenn sie sich dem Krieg gegen Russland anschließen. Es ist jedoch sehr unwahrscheinlich, dass sie dies akzeptieren werden."
 GE1_silesia_to_austria:0 "Bieten Sie Österreich Schlesien für die italienische Neutralität an"
 GE1_silesia_to_austria_desc:0 "Wir können Österreich-Ungarn Schlesien anbieten, wobei dieses im Gegenzug Südtirol an Italien abtreten würde, um in diesem Konflikt neutral zu bleiben. Allerdings besteht keine Garantie dafür, dass dies klappt."
 GE1_offer_bessarabia:0 "Bieten Sie Rumänien Besserabia für Neutralität an"
 GE1_offer_bessarabia_desc:0 "Wir können Rumänien nach dem Zusammenbruch Russlands das Gebiet Bessarabiens anbieten, damit es in diesem Konflikt neutral bleibt, aber das ist alles andere als garantiert."
 GE1_invite_sweden:0 "Schweden zu den Mittelmächten einladen"
 GE1_zimmerman:0 "Zimmerman Telegram"
 GE1_zimmerman_desc:0 "Da die Vereinigten Staaten aufgrund unserer Politik des uneingeschränkten U-Boot-Krieges bereits damit drohen, uns den Krieg zu erklären, wäre es für den Fall, dass die Vereinigten Staaten im Namen der Entente direkt eingreifen, von Vorteil, wenn wir Mexiko auf unsere Seite ziehen könnten."
 GE1_diplomatic_effort:0 "Diplomatische Bemühungen"
 GE1_diplomatic_effort_desc:0 "Durch die Verbesserung unserer diplomatischen Haltung in Europa und der Welt sind wir besser auf einen möglichen zukünftigen globalen Konflikt vorbereitet."
 GE1_mittelafrika_plan:0 "Mittelafrika-Plan"
 GE1_mittelafrika_plan_desc:0 "Mittelafrika war vor dem Ersten Weltkrieg Ausdruck des außenpolitischen Ziels Deutschlands, die Region, insbesondere die Region zwischen den Kolonien Deutsch-Ostafrika, Südwestafrika und Kamerun, unter deutsche Herrschaft zu bringen und eine zusammenhängende Einheit zu schaffen, die den gesamten afrikanischen Kontinent vom Atlantik bis zum Indischen Ozean abdeckt."
 GE1_reinforce_colonies:0 "Kolonien verstärken"
 GE1_reinforce_colonies_desc:0 "Wir sollten versuchen, die Kolonien zu verstärken und besser zu befestigen, falls ein Konflikt ausbricht."
 GE1_befriend_turkey:0 "Befreunde dich mit der Türkei"
 GE1_ottoman_german_alliance:0 "Osmanisch-Deutsches Bündnis"
 GE1_ottoman_german_alliance_desc:0 "Ein Bündnis mit der Türkei würde im Falle eines Krieges britische Besitztümer bedrohen, wie etwa die in Persien, wo es viele Ölfelder gibt, und den Suezkanal, der den schnellsten Zugang zu Britisch-Indien kontrolliert."
 GE1_befriend_jabal_shammar:0 "Befreunde dich mit Jabal Shammar"
 GE1_befriend_jabal_Shammar:0 "Das Emirat Jabal Shamar ist zwar ein schwacher Staat, könnte aber dennoch Unterstützung gegen die Briten im Nahen Osten leisten."
 GE1_invite_jabal_shammar:0 "Laden Sie Jabal Shammar zu den Mittelmächten ein"
 GE1_invite_jabal_Shammar_desc:0 "Es ist an der Zeit, Jabal Schammar den Mittelmächten zuzuordnen. Durch ihren Beitritt können wir die Osmanen in ihrem Kampf im Nahen Osten unterstützen und ihre Fronten stabilisieren."
 GE1_berlin_baghdad_1:0 "Berlin-Bagdad-Bahn I"
 GE1_berlin_baghdad_1_desc:0 "Wenn die Bagdad-Berlin-Bahn fertiggestellt wäre, könnten wir einen Hafen am Persischen Golf errichten und so den Suezkanal umgehen, um Zugang zu den östlichen Teilen unseres Kolonialreichs zu erhalten. Gleichzeitig würden wir den türkischen Einfluss und die türkische Infrastruktur stärken."
 GE1_berlin_baghdad_2:0 "Berlin-Bagdad-Bahn II"
 GE1_berlin_baghdad_2_desc:0 "Wenn die Bagdad-Berlin-Bahn fertiggestellt wäre, könnten wir einen Hafen am Persischen Golf errichten und so den Suezkanal umgehen, um Zugang zu den östlichen Teilen unseres Kolonialreichs zu erhalten. Gleichzeitig würden wir den türkischen Einfluss und die türkische Infrastruktur stärken."
 GE1_berlin_baghdad_3:0 "Berlin-Bagdad-Bahn III"
 GE1_berlin_baghdad_3_desc:0 "Wenn die Bagdad-Berlin-Bahn fertiggestellt wäre, könnten wir einen Hafen am Persischen Golf errichten und so den Suezkanal umgehen, um Zugang zu den östlichen Teilen unseres Kolonialreichs zu erhalten. Gleichzeitig würden wir den türkischen Einfluss und die türkische Infrastruktur stärken."
 GE1_berlin_baghdad_4:0 "Berlin-Bagdad-Bahn IV"
 GE1_berlin_baghdad_4_desc:0 "Wenn die Bagdad-Berlin-Bahn fertiggestellt wäre, könnten wir einen Hafen am Persischen Golf errichten und so den Suezkanal umgehen, um Zugang zu den östlichen Teilen unseres Kolonialreichs zu erhalten. Gleichzeitig würden wir den türkischen Einfluss und die türkische Infrastruktur stärken."
 GE1_colonial_defense:0 "Kolonialverteidigung I"
 GE1_colonial_defense_desc:0 "Wir sollten versuchen, die Kolonien zu verstärken und besser zu befestigen, falls ein Konflikt ausbricht."
 GE1_colonial_defense_2:0 "Kolonialverteidigung II"
 GE1_colonial_defense_2_desc:0 "Wir sollten versuchen, die Kolonien zu verstärken und besser zu befestigen, falls ein Konflikt ausbricht."
 GE1_agadir_crisis:0 "Agadir-Krise"
 GE1_agadir_crisis_desc:0 "Angesichts der territorialen Expansion Frankreichs in Marokko sollten wir im Gegenzug für uns selbst eine territoriale Entschädigung an anderer Stelle fordern. Auch wenn dies ein sehr riskanter und feindseliger Schritt ist, ist es nur fair, dass wir unseren Anteil vom Kuchen bekommen."
 GE1_prepare_for_war:0 "Bereite dich auf den Krieg vor"
 GE1_prepare_for_war_desc:0 "Ein großer Krieg droht. Angesichts der Agadir-Krise drängen unsere Diplomaten unsere Regierung, sich zu bewaffnen und vorzubereiten. §Y enthüllt Entscheidungen zum deutschen Kriegsplan §!"
 GE1_rupprecht_plan:0 "Rupprecht-Plan"
 GE1_rupprecht_plan_desc:0 "Der Rupprecht-Plan unterscheidet sich vom Schlieffen-Plan dadurch, dass der Haupteinmarsch nach Frankreich über die neutrale Schweiz an Belgien vorbei erfolgen würde. Aufgrund der Schweizer Berglandschaft wird dies jedoch viel schwieriger sein. \n §RDieser Schwerpunkt kann auch nach dem Krieg mit Frankreich erreicht werden.§!"
 GE1_schlieffen_plan:0 "Schlieffen-Plan"
 GE1_schlieffen_plan_desc:0 "Der Schlieffen-Plan sah eine Invasion Belgiens vor, um die wichtigsten französischen Befestigungen an der Grenze zu Deutschland zu umgehen und Paris schnell zu erobern, wodurch eine französische Kapitulation erzwungen und der Krieg beendet werden sollte.\n §RDieser Fokus kann durch ein Ereignis eingenommen werden, nachdem Sie sich im Krieg mit Frankreich befinden.§!"
 GE1_kronprinz_plan:0 "Kronprinz-Plan"
 GE1_kronprinz_plan_desc:0 "Der Kronprinz-Plan unterschied sich vom Schlieffen-Plan, da er jede Art von Invasion Belgiens vermied und nur einen Krieg gegen Russland und Frankreich vorsah.\n §RDieser Fokus kann durch ein Ereignis eingenommen werden, nachdem Sie sich im Krieg mit Frankreich befinden.§!"
 GE1_goeben_breslau:0 "Die Goeben und die Breslau"
 GE1_goeben_breslau_desc:0 "Da die SMS Goeben und die SMS Breslau im Mittelmeer festsitzen und die britische Mittelmeerflotte versucht, sie abzufangen, können wir der britischen Flotte ausweichen, indem wir durch die Dardanellen fahren und Konstantinopel erreichen, wo wir sie dem Osmanischen Reich übergeben."
 GE1_albania_negotiations:0 "Verhandlungen mit Albanien"
 GE1_albania_negotiations_desc:0 "Da Prinz Wilhelm von Wied deutscher Abstammung ist, können wir versuchen, mit ihm über einen Beitritt Albaniens auf der Seite der Mittelmächte zu verhandeln, trotz der Neutralität Albaniens im Rahmen des Londoner Vertrags."
 GE1_boer_revolt:0 "Unterstützen Sie die Buren"
 GE1_boer_revolt_desc:0 "Wir können die Buren in Südafrika unterstützen, die immer noch bereit sind, erneut zu kämpfen und die Südafrikanische Republik wiederherzustellen. Wenn alles gut geht, werden wir mit der neuen Südafrikanischen Republik verbündet sein und die britischen Interessen bedrohen."
 GE1_asien_corps:0 "Asiatisches Korps"
 GE1_asien_corps_desc:0 "Wir können unseren türkischen Verbündeten helfen, indem wir Einheiten entsenden, die beim Straßenbau helfen und mit osmanischen Sanitäts- und medizinischen Einheiten zusammenarbeiten."
 GE1_advisors_turkey:0 "Berater für die Türkei"
 GE1_advisors_turkey_desc:0 "Wir können unseren türkischen Verbündeten weiter helfen, indem wir ihnen Militärberater zur Unterstützung ihrer Kampagnen schicken."
 GE1_befriend_bulgaria:0 "Befreunde dich mit Bulgarien"
 GE1_befriend_bulgaria_desc:0 "Bulgarien ist für unseren Erfolg auf dem Balkan von entscheidender Bedeutung. Sollten wir Bulgarien an die Entente verlieren, wäre ein Sieg gegen Serbien nicht nur noch übertriebener, sondern könnte auch Konstantinopel selbst bedrohen."
 GE1_invite_bulgaria:0 "Bulgarien einladen"
 GE1_invite_bulgaria_desc:0 "Da Bulgarien kurz davor steht, sich den Mittelmächten anzuschließen, können wir den Druck auf Österreich-Ungarn in Serbien verringern und Serbien aus dem Krieg drängen, wodurch wir Österreich-Ungarn die dringend benötigte Verstärkung gegen Russland verschaffen."
 GE1_septemberprogramme:0 "Septemberprogramm"
 GE1_septemberprogramme_desc:0 "Das Septemberprogramm war ein Plan zur territorialen Expansion des Deutschen Reiches auf Kosten des Russischen Reiches, Frankreichs und Belgiens. Es gab Einblick in die deutschen Kriegsziele und den Umfang seiner territorialen Expansionen."
 GE1_polish_puppet:0 "Polnische Puppe erstellen"
 GE1_polish_puppet_desc:0 "Da wir das Gebiet Polens erobert haben, können wir den Polen eine Wiederherstellung versprechen, um unsere militärische Besetzung zu legitimieren und in Zukunft möglicherweise Freiwillige für den Kriegseinsatz gegen die Entente zu sammeln."
 GE1_polish_volunteers:0 "Freiwillige aus Polen anfordern"
 GE1_polish_volunteers_desc:0 "Da wir einen polnischen Marionettenstaat geschaffen haben, der Unabhängigkeit verspricht, können wir auch Freiwillige anfordern, um unsere Kriegsanstrengungen fortzusetzen"
 GE1_send_lenin:0 "Senden Sie Lenin"
 GE1_send_lenin_desc:0 "Um Russland zu destabilisieren und aus dem Krieg zu drängen, können wir den im Exil lebenden Wladimir Lenin zurückschicken, der großen Einfluss auf die Kommunisten in Russland hat, die zur Revolution aufrufen."
 GE1_huerta_power:0 "Bringt Huerta zurück"
 GE1_huerta_power_desc:0 "Um Mexiko auf unsere Seite zu ziehen, wäre es am besten, mit Victoriano Huerta zusammenzuarbeiten. Dieser hat versprochen, dass er, sollten wir ihm bei der Wiedererlangung der Macht helfen, dem Kaiser zweifellos seine Unterstützung zeigen wird, selbst wenn das bedeutet, den Vereinigten Staaten den Krieg zu erklären ... aber wer weiß? Vielleicht ist es ein Bluff ..."
 GE1_grain_ukraine:0 "Durchsetzung eines autoritären Regimes in der Ukraine"
 GE1_grain_ukraine_desc:0 "Um unsere Ernährungslage zu verbessern, können wir in der Ukraine ein autoritäreres Regime durchsetzen, um die Getreidelieferungen zu beschleunigen."
 GE1_supply_dervish_state:0 "Versorgung des Derwisch-Staates"
 GE1_supply_dervish_state_desc:0 "Der Derwischstaat befindet sich seit langem mit einem Großteil der Entente im Krieg, insbesondere mit Großbritannien. Würden wir sie beliefern, würde dies einige der britischen Streitkräfte ablenken."
 GE1_befriend_dervish:0 "Befreunde dich mit Dervish State"
 GE1_befriend_dervish_desc:0 "Wir und der Derwischstaat haben ähnliche Feinde, warum also nicht Freunde sein?"
 GE1_invite_dervish:0 "Laden Sie den Derwischstaat zu den Mittelmächten ein"
 GE1_invite_dervish_desc:0 "Da wir gegen denselben Feind kämpfen, können wir den Derwischstaat auch offiziell in die Mittelmächte einladen."
 GE1_political_effort:0 "Politische Bemühungen"
 GE1_political_effort_desc:0 ""
 GE1_power_to_kaiser:0 "Macht dem Kaiser"
 GE1_power_to_kaiser_desc:0 "Wenn wir den Kaiser unterstützen, können wir mehr Reformen und Entscheidungen durchsetzen. Dies würde es einfacher machen, den Kaiser an der Macht zu halten."
 GE1_power_to_military:0 "Macht für das Militär"
 GE1_power_to_military_desc:0 "Wenn wir das Militär unterstützen, erhalten wir mehrere Prämien für unsere Truppen, allerdings auf Kosten der Machtminderung des Kaisers und der Machtsteigerung des Militärs."
 GE1_home_by_christmas:0 "Bis Weihnachten zu Hause"
 GE1_home_by_christmas_desc:0 ""
 GE1_fund_insurrectionists_india:0 "Unterstützen Sie die Unabhängigkeit Indiens"
 GE1_fund_insurrectionists_india_desc:0 "Obwohl es sich um ein sehr gewagtes und großes Komplott handelte, könnte es, wenn es wie geplant aufginge, zu einem bewaffneten Aufstand in Indien kommen, der den Briten einen schweren Rückschlag versetzen würde."
 GE1_befriend_afgahnistan:0 "Befriend Afghanistan"
 GE1_befriend_afgahnistan_desc:0 "Afghanistan könnte als guter Ausgangspunkt für eine Invasion Indiens dienen, sollte dieses später einem Bündnis zustimmen."
 GE1_negotiate_afgahnistan:0 "Verhandlungen mit Afghanistan"
 GE1_negotiate_afgahnistan_desc:0 "So unwahrscheinlich dies auch sein mag, da der afghanische Emir von den Briten selbst bezahlt wird, könnten wir einen bedeutenden Angriff starten, wenn wir einen Deal auf Grundlage territorialer Gewinne in Indien aufkündigen und der afghanische Emir zustimmen würde. Der Angriff auf Afghanistan wäre Britisch-Indien ein Dorn im Auge und würde Truppen und Ressourcen abziehen."
 GE1_continue_unrestricted_sub:0 "Wiederaufnahme des uneingeschränkten U-Boot-Krieges"
 GE1_continue_unrestricted_sub_desc:0 "Trotz der Möglichkeit eines Krieges mit den Vereinigten Staaten hat der Generalstab erklärt, dass wir, wenn wir diesen Krieg gewinnen wollen, den uneingeschränkten U-Boot-Krieg wieder aufnehmen müssen. Eine Intervention der USA, falls es dazu kommen sollte, stelle keine Bedrohung dar, da es zu lange dauern würde, bis die Amerikaner eingreifen, und wir bis dahin bereits gewonnen hätten."
 GE1_industrial_effort:0 "Industrielle Anstrengungen"
 GE1_industrial_effort_desc:0 "Unser Imperium ist bereits zur stärksten Macht in der Region geworden und eine weitere Industrialisierung wird unsere Chancen erhöhen, einen zukünftigen Krieg zu gewinnen."
 GE1_infrastructure_effort_1:0 "Infrastrukturbemühungen I"
 GE1_infrastructure_effort_1_desc:0 "Die Infrastruktur ist für unser Land von entscheidender Bedeutung, da sich unser Territorium von Metz bis Memel erstreckt. Da unser Land größer ist als die meisten anderen europäischen Länder, wird eine gut ausgebaute Infrastruktur den Lebensstandard verbessern und gleichzeitig die Wirksamkeit unserer schnellen Mobilisierung im Rahmen des Schliffen-Plans erhöhen."
 GE1_infrastructure_effort_2:0 "Infrastrukturbemühungen II"
 GE1_infrastructure_effort_2_desc:0 "Der weitere Ausbau unserer Infrastruktur wird dazu beitragen, die Arbeitslosigkeit in unserem Reich zu senken und gleichzeitig unseren Bürgern einen besseren Lebensstandard zu bieten."
 GE1_infrastructure_effort_3:0 "Infrastrukturbemühungen III"
 GE1_infrastructure_effort_3_desc:0 "Durch die kontinuierliche Verbesserung unserer Infrastruktur werden wir zweifellos nicht nur in Europa, sondern vielleicht auf der ganzen Welt zur führenden Wirtschafts- und Militärmacht aufsteigen."
