 OTT_middle_east:0 "Diplomatie im Nahen Osten"
 OTT_middle_east_desc:0 ""
 OTT_befriend_jabal_shammar:0 "Befreunde dich mit Jabal Shammar"
 OTT_befriend_jabal_shammar_desc:0 "Das Emirat Jabal Shammar steht uns schon lange nahe, sein Todfeind ist jedoch das von den Saudis regierte Emirat Nejd, mit denen wir ebenfalls keineswegs befreundet sind ..."
 OTT_befriend_persia:0 "Befreunde dich mit Persien"
 OTT_befriend_persia_desc:0 "Um Persien wird ebenso wie um uns von den europäischen Großmächten gekämpft, insbesondere von Großbritannien und Russland, die versuchen, es zu kontrollieren. Wir sollten uns mit ihnen anfreunden und gemeinsam gegen diesen europäischen Imperialismus kämpfen."
 OTT_anti_persia:0 "Antipersische Stimmung"
 OTT_anti_persia_desc:0 "Ganz Pesien gehört zum größeren Osmanischen Reich und wird bald ein Teil davon werden."
 OTT_mission_afgahnistan:0 "Mission nach Afghanistan"
 OTT_mission_afgahnistan_desc:0 "Wenn es uns gelänge, Afghanistan auf unsere Seite zu ziehen, könnten sie mit ihrer Invasion einen großen Beitrag dazu leisten, die Briten abzulenken und in Indien Aufruhr zu schüren."
 OTT_back_shammar:0 "Unterstützen Sie das Emirat Jabal Shammar"
 OTT_back_shammar_desc:0 ""
 OTT_help_shammar_defeat_saud:0 "Helfen Sie dem Emirat, Saud zu besiegen"
 OTT_help_shammar_defeat_saud_desc:0 "Wenn wir dem Haus Rashid helfen, die Saudis ein für alle Mal zu eliminieren, könnten wir einen mächtigen und kontrollierbaren Verbündeten in Arabien an unserer Seite haben."
 OTT_libya_work_locals:0 "Hilfe für die libysche Bevölkerung"
 OTT_libya_work_locals_desc:0 "Viele Bürger der türkischen Tripolitanien haben sich freiwillig gemeldet, um uns in unseren Kriegsanstrengungen gegen Italien auf jede erdenkliche Weise zu unterstützen, beispielsweise durch Guerillakämpfe."
