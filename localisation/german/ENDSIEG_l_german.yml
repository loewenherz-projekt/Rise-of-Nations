# Industrialisation #
 industrialisation.1.t:0 "Traditionalisten argumentieren gegen die Industrialisierung"
 industrialisation.1.d:0 "Traditionalisten in der Regierung haben sich gegen unseren Übergang zu einer Industriegesellschaft ausgesprochen. Sie argumentieren, dass wir seit Hunderten von Jahren von einer Agrarwirtschaft leben und es daher nicht notwendig sei, jetzt in Richtung einer Industriegesellschaft zu gehen. \n\n Nichtsdestotrotz wird die Reform durchgeführt, aber die Traditionalisten werden die Regierung vorerst etwas spalten..."
 industrialisation.1.a:0 "nun ja"
 industrialisation.2.t:0 "Unruhen unter den Arbeitern"
 industrialisation.2.d:0 "Die Industrialisierung in unserem Land schreitet nur langsam voran, und das nicht ohne Probleme. Viele Fabrikbesitzer suchten nicht mehr nach Facharbeitern, sondern stellten ungelernte Arbeitskräfte als billigere Arbeitskräfte ein. Dies führte zu wachsender Unruhe in der neuen Arbeiterklasse. Zwar ist dies noch nicht ganz so gravierend, aber die Blase wird irgendwann platzen."
 industrialisation.2.a:0 "Für den Moment sind wir gut!"
 industrialisation.3.t:0 "Vorindustrielle Gesellschaft"
 industrialisation.3.d:0 "Wir gelten heute als vorindustrielle Gesellschaft und haben uns von der Agrargesellschaft, die wir einst waren, effektiv entfernt. Natürlich war unser Weg dorthin nicht ohne Probleme, aber der Weg, der vor uns liegt, ist noch lang und steinig."
 industrialisation.3.a:0 "Ein Hoch auf die Industrialisierung!"
 industrialisation.4.t:0 "Eisenbahnbau"
 industrialisation.4.d:0 "Um die Effizienz des Gütertransports im ganzen Land zu steigern, hat unsere Regierung die Initiative ergriffen und mit dem Bau einer großen Eisenbahnstrecke begonnen. Allein dadurch dürften viele Arbeiter beschäftigt werden. Die Kosten werden allerdings recht hoch sein, aber wenn wir planen, weiter voranzukommen, wird es sich am Ende lohnen."
 industrialisation.4.a:0 "Fangen Sie an zu arbeiten!"
 industrialisation.5.t:0 "Die Mentalität der Menschen"
 industrialisation.5.d:0 "Trotz unserer Bemühungen, Industrialisierungsreformen einzuleiten, haben viele unserer Bürger immer noch eine rückständige Einstellung zur Industrialisierung. Viele unserer reichen Kapitalisten investieren immer noch lieber in Land als in Unternehmen. Sie halten Investitionen in die Industrie für riskant, was den Landkauf deutlich attraktiver macht."
 industrialisation.5.a:0 "Das ist auf lange Sicht eine schlechte Mentalität!"
 industrialisation.6.t:0 "Frühindustrielle Gesellschaft"
 industrialisation.6.d:0 "Wir werden heute von der Welt als eine frühindustrielle Gesellschaft betrachtet und haben uns damit faktisch von unserem früheren Status als vorindustrielle Gesellschaft entfernt. Wir ähneln nun eher einigen europäischen Nationen, die in puncto Industrie erhebliche Fortschritte gemacht haben."
 industrialisation.6.a:0 "Zweimal Hurra für die Industrialisierung!"
 industrialisation.7.t:0 "Großer Arbeiterstreik"
 industrialisation.7.d:0 "Die Probleme der Vergangenheit, in denen ungelernte Arbeiter zu niedrigeren Löhnen als qualifizierte Arbeiter eingestellt wurden, sind nicht vergessen. In einem unserer wichtigsten Industriegebiete kam es zu einem großen Streik, bei dem die Arbeiter für höhere Löhne und kürzere Arbeitszeiten protestierten. Dies belastete unsere Produktionsleistung. Wenn dieses Problem nicht schnell gelöst wird, wird es zu einem Problem."
 industrialisation.7.a:0 "Geben Sie ihnen, was sie wollen ..."
 industrialisation.8.t:0 "Proteste von Traditionalisten"
 industrialisation.8.d:0 "Auch wenn wir noch weiter voranschreiten, sind die Traditionalisten keineswegs verschwunden. Es gibt immer noch einen großen Kampf, nicht nur mit einigen rückständigen Politikern, sondern auch mit den Menschen selbst, die dieselbe traditionalistische Mentalität haben und Veränderungen ablehnen!"
 industrialisation.8.a:0 "Verdammt"
 industrialisation.9.t:0 "Bevölkerung im Laufe der Jahre"
 industrialisation.9.d:0 "Die Tatsache, dass unser Land nicht über genügend landwirtschaftlich nutzbares Land verfügt, um unsere wachsende Bevölkerung zu ernähren, erschwert die Lage erheblich. Viele meinen, dass wir auch in Zukunft bei der Nahrungsmittelversorgung auf die Hilfe anderer Länder angewiesen sein werden."
 industrialisation.9.a:0 "Sie haben recht ..."
 industrialisation.10.t:0 "Grundlegende Industriegesellschaft"
 industrialisation.10.d:0 "Wir werden heute von der Welt als eine Basisindustriegesellschaft betrachtet, liegen aber wie die meisten europäischen Nationen knapp hinter den großen Ländern."
 industrialisation.10.a:0 "Dreimal Hoch auf die Industrialisierung!"
 industrialisation.11.t:0 "Arbeiterstreik gerät außer Kontrolle!"
 industrialisation.11.d:0 "In unserer am stärksten industrialisierten Region haben Arbeiter einen Streik für höhere Löhne, kürzere Arbeitszeiten, bessere Arbeitsbedingungen und allgemeines Wahlrecht begonnen. Der Streik begann zunächst klein, weitete sich aber schnell auf Tausende Protestierende aus. Die Lokalregierung entsandte daraufhin eine Armeeeinheit, um den Protest unter Kontrolle zu halten. Dieser artete jedoch schnell in ein Blutbad aus, als Schüsse auf die Menge abgefeuert wurden."
 industrialisation.11.a:0 "Nicht gut..."
 industrialisation.12.t:0 "Ressourcenproblem"
 industrialisation.12.d:0 "Wenn wir die Industrialisierung noch weiter vorantreiben, wird es ziemlich schwierig, da viele der erforderlichen Ressourcen derzeit nicht in ausreichender Menge vorhanden sind oder produziert werden, was bedeutet, dass unser Fortschritt vorerst erheblich verlangsamt wird."
 industrialisation.12.a:0 "Verdammt"
 industrialisation.13.t:0 "Neue aufstrebende soziale Klasse"
 industrialisation.13.d:0 "Da unser industrielles Wachstum eine starke Zuwanderung in unsere Städte und Industriezentren fördert, sind wir nicht in der Lage, dieses enorme Bevölkerungswachstum zu bewältigen. Es können nicht rechtzeitig genügend Wohnungen gebaut werden, um genügend Menschen unterzubringen. Viele sind gezwungen, unter schrecklichen Bedingungen zusammenzuleben und dann unter diesen Bedingungen zu arbeiten. Dies führt zur Entstehung einer neuen sozialen Klasse, die für revolutionäre Ideen sehr empfänglich sein könnte."
 industrialisation.13.a:0 "Erschreckend"
 industrialisation.14.t:0 "Industriegesellschaft"
 industrialisation.14.d:0 "Wir haben die Spitze der Leiter erreicht und gelten nun offiziell als Industriegesellschaft. Wir sind den meisten Ländern der Welt weit voraus."
 industrialisation.14.a:0 "Viermal Hoch auf die Industrialisierung!"

# WW1 Britain #
 ww1_britain.1.t:0 "Antideutsche Stimmung"
 ww1_britain.1.d:0 "Seit dem Tod von Königin Victoria und den imperialistischen und maritimen Ambitionen Kaiser Wilhelms II., die unsere Nation bedrohen, besteht zwischen Deutschland und dem Vereinigten Königreich eine große Kluft."
 ww1_britain.1.a:0 "Diese Hunnen werden uns nicht überholen!"
 ww1_britain.2.t:0 "Kriegsvorbereitungen"
 ww1_britain.2.d:0 "Die Lunte, die zum Pulverfass führt, ist angezündet. Es ist nur eine Frage der Zeit, bis der Krieg ausbricht, und wir müssen uns auf das vorbereiten, was daraus werden kann, egal, ob es gut oder schlecht ist."
 ww1_britain.2.a:0 "In Ordnung"
 ww1_britain.3.t:0 "Britische Neutralität"
 ww1_britain.3.d:0 "Obwohl wir uns stark auf die Seite der Entente gestellt haben, haben wir in diesem Konflikt vorerst unsere Neutralität erklärt. Das bedeutet zwar nicht, dass wir während der gesamten Dauer des Krieges neutral bleiben werden, aber wir werden den Verlauf des Krieges vorerst aufmerksam beobachten und möglicherweise später eingreifen."
 ww1_britain.3.a:0 "Wir werden vorerst einen Sicherheitsabstand einhalten..."
 ww1_britain.4.t:0 "Unterstützung Frankreichs!"
 ww1_britain.4.d:0 "Da die Deutschen die Neutralität Belgiens verletzten und gegen jegliche britischen Interessen vorgingen, haben wir die notwendigen Schritte unternommen, um uns der Entente im Krieg gegen sie anzuschließen."
 ww1_britain.4.a:0 "Wir werden unsere Verbündeten nicht im Stich lassen!"
 ww1_britain.5.t:0 "Großbritannien erklärt den Mittelmächten den Krieg"
 ww1_britain.5.d:0 "Obwohl wir zuvor eine vorübergehende Neutralität erklärt hatten, beobachteten wir den Krieg und ergriffen nun Maßnahmen, um uns selbst auf die Seite der Entente zu stellen, die letztlich die britischen Interessen schützt."
 ww1_britain.5.a:0 "Wir werden die deutsche Hegemonie über Europa nicht akzeptieren!"
 ww1_britain.6.t:0 "Nordseeblockade"
 ww1_britain.6.d:0 "Um die maritime Versorgung der Mittelmächte mit Gütern einzuschränken, haben wir Maßnahmen ergriffen, um alle Konvois nach Deutschland oder zu anderen Mittelmächten zu blockieren. Das Deutsche Reich ist stark auf Importe angewiesen, um seine Bevölkerung zu ernähren und seine Rüstungsindustrie zu versorgen. Dies dürfte daher gravierende Auswirkungen auf die innere Stabilität und die Kriegsführung haben."
 ww1_britain.6.a:0 "Gut"
 ww1_britain.7.t:0 "Beginn der Wehrpflicht in Irland"
 ww1_britain.7.d:0 "Obwohl unsere Versuche, die irische Bevölkerung zum Militärdienst einzuziehen, auf heftigen Protest gestoßen sind und wir nach dem Osteraufstand in einer schwierigen Lage waren, ist dies dennoch notwendig, da wir dringend mehr Personal brauchen, um die Reihen zu füllen."
 ww1_britain.7.a:0 "Eine notwendige Aktion"
 ww1_britain.8.t:0 "Irische Wehrpflichtkrise"
 ww1_britain.8.d:0 "Die Forderung nach einer allgemeinen Wehrpflicht in Irland stieß auf heftigen Protest und Widerstand. Daher haben wir uns gegen die Einführung einer allgemeinen Wehrpflicht entschieden. Obwohl uns dadurch möglicherweise notwendige Arbeitskräfte entzogen werden, ist es dennoch sinnvoller und stabilisiert die Nation in einer Zeit, in der Stabilität notwendig ist, um eine Revolution zu vermeiden."
 ww1_britain.8.a:0 "Widerspruch ist das Letzte, was wir brauchen"
 ww1_britain.9.t:0 "Forderung an Skandinavien, mit Deutschland zu brechen"
 ww1_britain.9.d:0 "So wie die Vereinigten Staaten beschlossen haben, mit Deutschland zu brechen, haben wir die skandinavischen Monarchen – Håkon VII. von Norwegen, Gustav V. von Schweden und Christian X. von Dänemark – gebeten, einen Bruch mit Deutschland in Erwägung zu ziehen. Die Nordseeblockade ist zwar wirksam, wird aber niemals hundertprozentig wirksam sein, wenn die skandinavischen Nationen weiterhin mit Deutschland Handel treiben."
 ww1_britain.9.a:0 "Hoffentlich folgen sie Amerikas Beispiel"
 ww1_britain.901.t:0 "Skandinavien weigert sich, mit Deutschland zu brechen"
 ww1_britain.901.d:0 "Die skandinavischen Monarchen haben kürzlich eine Konferenz in Kopenhagen abgehalten und sich letztlich geweigert, die diplomatischen und Handelsbeziehungen mit Deutschland wegen des „rücksichtslosen“ U-Boot-Krieges abzubrechen."
 ww1_britain.901.a:0 "Verdammt!"
 ww1_britain.902.t:0 "Skandinavien stimmt dem Bruch mit Deutschland zu"
 ww1_britain.902.d:0 "Die skandinavischen Monarchen haben kürzlich eine Konferenz in Kopenhagen abgehalten und sich schließlich darauf geeinigt, die diplomatischen und Handelsbeziehungen mit Deutschland wegen des erbarmungslosen U-Boot-Krieges abzubrechen."
 ww1_britain.902.a:0 "Großartig"
 ww1_britain.10.t:0 "Unsere Freunde Portugal"
 ww1_britain.10.d:0 "Die Portugiesen sind uns schon seit langem nahe. Es ist allgemein bekannt, dass die Portugiesen und Deutschland kein gutes Verhältnis zueinander haben und es zwischen beiden Ländern zu erheblichen Spannungen kommt, wenn es um den U-Boot-Krieg geht."
 ww1_britain.10.a:0 "OK"
 ww1_britain.11.t:0 "Portugal tritt der Entente bei"
 ww1_britain.11.d:0 "Da es zwischen den Portugiesen und Deutschland aufgrund der Entscheidung Deutschlands, einen uneingeschränkten U-Boot-Krieg zu führen, der zum Untergang zahlreicher portugiesischer Schiffe führte, zu erheblichen Spannungen kam, haben sich die Portugiesen letztlich für einen Beitritt zur Entente entschieden."
 ww1_britain.11.a:0 "Großartig"
 ww1_britain.12.t:0 "Verhandlungen mit Bulgarien"
 ww1_britain.12.d:0 "Bulgarien ist der Schlüssel zum Erfolg auf dem Balkan. Sollten die Mittelmächte Bulgarien zum Beitritt bewegen, wird unser Verbündeter Serbien wahrscheinlich fallen und Deutschland könnte die Türkei direkt beliefern. Sollte sich Bulgarien jedoch uns anschließen, wäre die türkische Hauptstadt Konstantinopel ernsthaft bedroht und Serbiens Position weiter gestärkt. Im Gegensatz zu den Mittelmächten haben wir Bulgarien wenig anzubieten. Wir haben Serbien jedoch aufgefordert, einen Teil seines Territoriums an Bulgarien abzutreten, in der Hoffnung, Bulgarien zum Beitritt zu bewegen. Es ist jedoch nicht so viel, wie die Mittelmächte anbieten. Die Bulgaren werden unser Angebot wahrscheinlich nicht in Betracht ziehen, aber es besteht immer noch eine Chance, dass sie es tun."
 ww1_britain.12.a:0 "Hoffen wir, dass sie es in Betracht ziehen"
 ww1_britain.1201.t:0 "Großbritannien bietet uns einen Deal an"
 ww1_britain.1201.d:0 "Die Briten haben versucht, uns auf ihre Seite zu ziehen, indem sie den Osmanen einige unserer Ansprüche in Serbien und Edirne angeboten haben. Obwohl dies nicht so viel ist, wie die Mittelmächte zu bieten bereit sind, ist es angesichts der Unfähigkeit Deutschlands, die Meere zu kontrollieren, wahrscheinlich, dass es diesen Krieg gewinnen wird?"
 ww1_britain.1201.a:0 "Britischen Deal akzeptieren"
 ww1_britain.1201.b:0 "Wir sind nicht interessiert"
 ww1_britain.1202.t:0 "Bulgarien nimmt unser Angebot an"
 ww1_britain.1202.d:0 "Die Bulgaren haben unser großzügiges Angebot territorialer Gewinne dankbar angenommen. Obwohl es nicht so viel ist wie das, was die Mittelmächte wahrscheinlich angeboten hatten, scheinen sie zur Vernunft gekommen zu sein und zu glauben, dass wir diesen Krieg letzten Endes gewinnen werden."
 ww1_britain.1202.a:0 "Großartig!"
 ww1_britain.1203.t:0 "Bulgarien lehnt unser Angebot ab"
 ww1_britain.1203.d:0 "Wie wir vorausgesagt haben, haben die Bulgaren unser Angebot territorialer Gewinne leider abgelehnt. Dies liegt höchstwahrscheinlich daran, dass die Mittelmächte weit mehr versprochen haben, als wir bieten konnten. So bedauerlich es auch ist, dass wir Bulgarien nicht auf unsere Seite ziehen konnten, werden wir diesen Krieg letztlich gewinnen, ob mit oder ohne sie."
 ww1_britain.1203.a:0 "Wirklich ziemlich bedauerlich"
 ww1_britain.13.t:0 "Bulgarien tritt der Entente bei"
 ww1_britain.13.d:0 "Die Bulgaren haben ihre Vorbereitungen für den Konflikt endlich abgeschlossen und ihren Beitritt zur Entente offiziell erklärt. Mit ihrer Hilfe werden wir die Türkei und Deutschland weiterhin entzweien, Konstantinopel bedrohen und die Position Serbiens dauerhaft stärken."
 ww1_britain.13.a:0 "Großartig!"
 ww1_britain.14.t:0 "Unsere Freunde Amerika"
 ww1_britain.14.d:0 "Obwohl die Vereinigten Staaten im europäischen Konflikt ihre Neutralität erklärt haben, bevorzugen sie uns angesichts unseres demokratischen Status letztlich weit mehr als die Mittelmächte."
 ww1_britain.14.a:0 "Hoffentlich können wir sie dazu bewegen, mitzumachen"
 ww1_britain.15.t:0 "USA tritt der Entente bei"
 ww1_britain.15.d:0 "Die Vereinigten Staaten haben die Entente während des gesamten Krieges lange Zeit unterstützt, doch letztlich ist jede von ihnen erklärte Neutralität im Laufe der Zeit verkümmert, und sie haben sich schließlich dazu entschlossen, sich offiziell dem europäischen Konflikt anzuschließen."
 ww1_britain.15.a:0 "Das Blatt hat sich gewendet"
 ww1_britain.16.t:0 "Befestigung des Suezkanals"
 ww1_britain.16.d:0 "Der Suezkanal ist ein strategisch wichtiger Punkt und daher haben wir die notwendigen Maßnahmen ergriffen, um den Kanal für den Fall eines zukünftigen Krieges zu befestigen."
 ww1_britain.16.a:0 "Es ist von strategischer Bedeutung"
 ww1_britain.17.t:0 "Sicherung Südpersiens"
 ww1_britain.17.d:0 "Angesichts des wahrscheinlichen Beitritts der Türkei auf der Seite der Mittelmächte haben wir Maßnahmen ergriffen, um die südpersischen Ölfelder und die Route nach Indien zu sichern."
 ww1_britain.17.a:0 "Gut"
 ww1_britain.18.t:0 "Türkische Schiffe in die Royal Navy aufgenommen"
 ww1_britain.18.d:0 "Die türkischen Schiffe „Osmân-ı Evvel“ und „Reşadiye“ wurden auf Befehl Winston Churchills in die Royal Navy eingegliedert, der nicht riskieren wollte, dass die Schiffe gegen uns eingesetzt werden. Da die Bezahlung der Schiffe jedoch teilweise durch öffentliche Spenden, von Tavernen, Cafés, Schulen und Märkten finanziert wurde, hat diese Aktion im Osmanischen Reich erheblichen Unmut hervorgerufen. Die Beschlagnahmung der Schiffe hat die öffentliche Meinung im Osmanischen Reich über uns erheblich negativ beeinflusst."
 ww1_britain.18.a:0 "Verdammt"
 ww1_britain.19.t:0 "Arabischer Aufstand"
 ww1_britain.19.d:0 "Hussein bin Ali, der Sharif von Mekka, hat den Arabischen Aufstand initiiert, um die Unabhängigkeit von den herrschenden Osmanen zu erreichen und einen einheitlichen arabischen Staat zu schaffen. Der Sharif behauptet, die Jungtürken hätten die heiligen Grundsätze des Islam verletzt und rief die arabischen Muslime zum Aufstand gegen die angeblich „gottlose“ osmanische Regierung auf. \n\n Obwohl der Aufstand von unserer Regierung unterstützt wird, ist er dennoch nicht so populär, wie wir es uns erhofft hatten, da die Mehrheit der Araber dem Osmanischen Reich weiterhin treu bleibt."
 ww1_britain.19.a:0 "Tolle Neuigkeiten"
 ww1_britain.20.t:0 "Britisches Raj erlebt industrielles Wachstum"
 ww1_britain.20.d:0 "Mit Unterstützung der britischen Regierung haben wir dem britischen Raj genügend Mittel zugeteilt, um ihm einen erheblichen Schub für das industrielle Wachstum zu geben, der hoffentlich die Kolonie stärken und mehr Arbeitsplätze schaffen sollte."
 ww1_britain.20.a:0 "Großartig"
 ww1_britain.21.t:0 "Unterstützen Sie Südafrika"
 ww1_britain.21.d:0 "Mit Unterstützung der britischen Regierung haben wir Südafrika ausreichende Mittel zur Verfügung gestellt, um dem Land einen deutlichen Schub für sein industrielles Wachstum zu geben, der den Staat hoffentlich stärken und mehr Arbeitsplätze schaffen sollte."
 ww1_britain.21.a:0 "Gut"
 ww1_britain.22.t:0 "Australien erlebt industrielles Wachstum"
 ww1_britain.22.d:0 "Mit Unterstützung der britischen Regierung haben wir Australien ausreichende Mittel zugewiesen, um dem Land einen deutlichen Schub für sein industrielles Wachstum zu geben, der die Kolonie hoffentlich stärken und mehr Arbeitsplätze schaffen sollte."
 ww1_britain.22.a:0 "Großartig"
 ww1_britain.23.t:0 "Kanada erlebt industrielles Wachstum"
 ww1_britain.23.d:0 "Mit Unterstützung der britischen Regierung haben wir Kanada ausreichende Mittel zugewiesen, um dem Land einen deutlichen Schub für sein industrielles Wachstum zu geben, der die Kolonie hoffentlich stärken und mehr Arbeitsplätze schaffen sollte."
 ww1_britain.23.a:0 "Gut"
 ww1_britain.24.t:0 "Soldaten aus der britischen Kolonialzeit"
 ww1_britain.24.d:0 "Obwohl die Rekruten aus der britischen Kolonialzeit wohl nicht die besten sind und in der Regel hinsichtlich der Qualität ihrer Ausbildung und Leistung nachlassen, ist es uns dennoch gelungen, einen großen Teil unserer Arbeitskräfte für den Einsatz im europäischen Kriegsschauplatz zu gewinnen."
 ww1_britain.24.a:0 "Gut"
 ww1_britain.25.t:0 "Planung der Gallipoli-Kampagne"
 ww1_britain.25.d:0 "Die britische Admiralität hat einen gewagten Plan vorgeschlagen, Truppen auf der Halbinsel Gallipoli zu landen und von dort aus die für die Türken sehr wichtige Hauptstadt des Osmanischen Reiches, Konstantinopel, zu erobern. Sollten wir sie einnehmen, würden wir sie wahrscheinlich aus dem Krieg drängen."
 ww1_britain.25.a:0 "Es kann funktionieren"
 ww1_britain.26.t:0 "Beginn der Landungen auf Gallipoli"
 ww1_britain.26.d:0 "Die Landung auf Gallipoli hat begonnen. Leider sind unsere Truppen im falschen Gebiet gelandet, was sie strategisch etwas schwächt, aber na ja. Innerhalb von zwei Monaten sollten weitere Verstärkungen eintreffen. Hoffentlich können wir die Invasion ausnutzen, solange es noch möglich ist, und die Macht haben, die Türken aus Konstantinopel zu vertreiben."
 ww1_britain.26.a:0 "Wir müssen die Türken vertreiben!"
 ww1_britain.2601.t:0 "Verstärkungen treffen in Gallipoli ein"
 ww1_britain.2601.d:0 "Endlich sind Verstärkungen zur Unterstützung der ersten Landung auf Gallipoli eingetroffen. Hoffentlich können wir sie optimal einsetzen und die Türken zurückschlagen."
 ww1_britain.2601.a:0 "Großartig"
 ww1_britain.27.t:0 "Kanadische Expeditionstruppe"
 ww1_britain.27.d:0 "Das kanadische Expeditionskorps ist kampfbereit in Frankreich eingetroffen. Insgesamt haben sich bisher rund 300.000 Mann aus dem Dominion Kanada zum Kampf an der Westfront gemeldet."
 ww1_britain.27.a:0 "Großartig"
 ww1_britain.28.t:0 "Das Baltic-Projekt"
 ww1_britain.28.d:0 "Admiral Lord Fisher hat dieses „Baltikum-Projekt“ gefördert und verspricht einen schnellen Sieg über Deutschland. Der Plan sieht die Landung einer beträchtlichen Streitmacht britischer oder russischer Soldaten oder beider an den flachen Stränden Pommerns an der norddeutschen Küste vor, die knapp 160 Kilometer von Berlin entfernt liegt. \n\n Ein solcher Plan würde jedoch natürlich eine riesige Spezialflotte mit U-Booten und umfangreiche Minen erfordern, um die Landungstruppe vor der deutschen Marine zu schützen. Es wäre machbar, aber wird es sich letztendlich lohnen?"
 ww1_britain.28.a:0 "Hmmm, sollten wir es auf Eis legen?"
 ww1_britain.29.t:0 "Ressourcen für das Baltic-Projekt sammeln"
 ww1_britain.29.d:0 "Wir haben uns entschieden, am Ostseeprojekt teilzunehmen und haben mit dem Aufbau der Flotte begonnen, die erforderlich ist, um die Landungstruppe vor der deutschen Marine zu schützen. Dazu werden etwa 600 Schiffe benötigt, darunter Landungsboote, Minensuchboote, Zerstörer, leichte Kreuzer, Monitore und einige schwere Unterstützungsschiffe mit geringem Tiefgang."
 ww1_britain.29.a:0 "Lasst uns diese Kraft bündeln!"
 ww1_britain.30.t:0 "Die Invasion Pommerns beginnt"
 ww1_britain.30.d:0 "Unsere Schiffe sind vor der Küste Pommerns angekommen und die Landungen haben begonnen, ohne dass die deutsche Kaiserliche Marine etwas dagegen unternehmen kann. Wenn wir dies ausnutzen wollen, müssen wir Deutschland einen endgültigen K.O.-Schlag versetzen, indem wir Berlin angreifen und das Land zur Kapitulation zwingen."
 ww1_britain.30.a:0 "Ich wette, sie haben das nicht erwartet"
 ww1_britain.301.t:0 "Erste Verstärkungswelle trifft in Pommern ein"
 ww1_britain.301.d:0 "Die erste Verstärkungswelle ist in Pommern angekommen und mehrere russische Divisionen greifen in den Kampf ein."
 ww1_britain.301.a:0 "Gut"
 ww1_britain.302.t:0 "Zweite Verstärkungswelle erreicht Pommern"
 ww1_britain.302.d:0 "Die zweite und letzte Verstärkungswelle ist endlich in Pommern angekommen. Wir hoffen, dass sie ausreicht, um eine strategische Position einzunehmen, die Deutschen zurückzuschlagen und sie zur Kapitulation zu zwingen."
 ww1_britain.302.a:0 "Hoffen wir es"
 ww1_britain.31.t:0 "Südafrika erlangt Unabhängigkeit"
 ww1_britain.31.d:0 "Acht Jahre nach dem Ende des Zweiten Burenkriegs und nach vierjährigen Verhandlungen gewährte das britische Parlament 1909 mit einem Gesetz die nominelle Unabhängigkeit und gründete schließlich die Südafrikanischen Union, die heute die ehemaligen Gebiete der Kapstadt, der Natal-Kolonien, Transvaals und des Oranje-Freistaats umfasst."
 ww1_britain.31.a:0 "Es muss sein"
 ww1_britain.32.t:0 "Vereint angesichts der Aggression"
 ww1_britain.32.d:0 "Da uns das Deutsche Reich durch die Verletzung der belgischen Neutralität dazu zwingt, an diesem weitgehend unnötigen Krieg teilzunehmen, hat sich unser Volk weitgehend dazu entschlossen, seine Meinungsverschiedenheiten oder Widersprüche gegenüber der Regierung beiseite zu legen und sich angesichts der deutschen Aggression zu vereinen."
 ww1_britain.32.a:0 "Gut"
 ww1_britain.33.t:0 "Wehrdienstgesetz"
 ww1_britain.33.d:0 "Das Wehrpflichtgesetz wurde verabschiedet. Es legt fest, dass alleinstehende Männer im Alter von 18 bis 40 Jahren künftig zum Militärdienst eingezogen werden können, es sei denn, sie sind verwitwet und haben Kinder oder sind Geistliche. Aufgrund der politischen Lage wird die Wehrpflicht nur in England, Schottland und Wales eingeführt, Irland hingegen nicht."
 ww1_britain.33.a:0 "Füllt die Reihen auf!"
 ww1_britain.34.t:0 "Gesetz zur Verteidigung des Reiches verabschiedet"
 ww1_britain.34.d:0 "Der Defense of the Realm Act (DORA) wurde verabschiedet. Er verleiht der Regierung weitreichende Vollmachten, etwa die Möglichkeit, für den Krieg benötigte Gebäude oder Grundstücke zu beschlagnahmen oder Gesetze zu erlassen, die Straftaten begründen. DORA verleiht der Regierung außerdem die Macht zur Zensur und anderen autoritären sozialen Kontrollmechanismen."
 ww1_britain.34.a:0 "Eine dringend notwendige Veränderung in dieser Kriegszeit"
 ww1_britain.35.t:0 "Massive Kriegsanstrengungen"
 ww1_britain.35.d:0 "Um unsere Kriegsanstrengungen noch weiter zu maximieren, haben wir noch mehr Maßnahmen ergriffen, um den Schwerpunkt der gesamten Produktion auf die Militärproduktion zu verlagern."
 ww1_britain.35.a:0 "Weiter so"
 ww1_britain.36.t:0 "Frontline Focus Teil I"
 ww1_britain.36.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu richten, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_britain.36.a:0 "OK"
 ww1_britain.37.t:0 "Frontline Focus Teil II"
 ww1_britain.37.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu richten, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_britain.37.a:0 "OK"
 ww1_britain.38.t:0 "Frontline Focus Teil III"
 ww1_britain.38.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu legen, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_britain.38.a:0 "OK"
 ww1_britain.39.t:0 "Fokus auf die Heimatfront, Teil I"
 ww1_britain.39.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_britain.39.a:0 "OK"
 ww1_britain.40.t:0 "Fokus auf die Heimatfront, Teil II"
 ww1_britain.40.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_britain.40.a:0 "OK"
 ww1_britain.41.t:0 "Fokus auf die Heimatfront, Teil III"
 ww1_britain.41.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_britain.41.a:0 "OK"
 ww1_britain.42.t:0 "Edward VII. stirbt"
 ww1_britain.42.d:0 "Unser König Edward VII. ist heute leider verstorben. Sein Sohn Georg V. folgte ihm als nächster König des Vereinigten Königreichs nach. Die Beerdigung des Königs war die bisher größte Zusammenkunft von Königen und Würdenträgern an einem Ort."
 ww1_britain.42.a:0 "Tragisch"
 ww1_britain.43.t:0 "Kitchener und Mitarbeiter ertrinken!"
 ww1_britain.43.d:0 "Lord Kitchener und sein Stab sind heute leider ertrunken, nachdem sie an Bord der HMS Hampshire gegangen waren, um eine diplomatische Mission nach Russland anzutreten. Kurz vor 19:30 Uhr desselben Tages lief die HMS Hampshire auf dem Weg zum russischen Hafen Archangelsk auf eine Mine eines deutschen U-Boots und sank vor der Westküste der Orkney-Inseln. Von den 749 Menschen an Bord haben nur zwölf überlebt. \n\n Die Nachricht von Kitcheners Tod ist zweifellos ein Schock für die Bevölkerung des Commonwealth. Viele glaubten fest daran, dass Großbritanniens Sieg sicher sei, wenn Kitchener überlebte. Doch nun gibt es in diesen dunklen Zeiten nicht den geringsten Hoffnungsschimmer. Man wird um ihn trauern."
 ww1_britain.43.a:0 "Oh nein, nicht Kitchener!"
 ww1_britain.44.t:0 "Osteraufstand"
 ww1_britain.44.d:0 "In der Osterwoche hat in Irland ein bewaffneter Aufstand begonnen! Berichten zufolge wurde der Aufstand von irischen Republiken ins Leben gerufen, die „die britische Herrschaft in Irland beenden und eine unabhängige irische Republik gründen“ wollen. Sie haben uns einen Seitenhieb versetzt, während wir andernorts mit dem deutschen Imperialismus beschäftigt sind. Dies ist wohl der bedeutendste Aufstand in Irland der letzten hundert Jahre, und wir müssen ihn schnell unter Kontrolle bringen, bevor er außer Kontrolle gerät!"
 ww1_britain.44.a:0 "Oh, diese Fawkin Tater &#39;aters"
 ww1_britain.45.t:0 "Der Derwischkrieg"
 ww1_britain.45.d:0 "Der Derwischkrieg dauert seit etwa zehn Jahren an und ist ein ziemlich langwieriger Konflikt mit Mohammed Abdullah Hassan (von unseren Männern „Verrückter Mullah“ genannt) und seinen Derwisch-Truppen, die bisher unbesiegt geblieben sind. Obwohl dieser „Verrückte Mullah“ sicherlich keine allzu große Bedrohung darstellt, wäre es dennoch das Beste, diese Rebellen auszulöschen."
 ww1_britain.45.a:0 "Wir kommen, um dich zu holen, verrückter Mullah!"
 ww1_britain.46.t:0 "Aufstand in Libyen"
 ww1_britain.46.d:0 "In letzter Zeit hat sich der Widerstand in unserem Teil Libyens verhundertfacht. Die religiöse Gruppe der Senussi hat die Kontrolle über das Gebiet beansprucht, und mit der geringen Zahl an Aktivisten vor Ort können wir ihnen kaum etwas entgegensetzen. Was sollen wir tun?"
 ww1_britain.46.a:0 "Lass sie dieses Stück Staub haben!"
 ww1_britain.46.b:0 "Wer jetzt aufgibt, gibt für immer auf!"
