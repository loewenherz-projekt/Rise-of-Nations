l_german:
    welcome.1.t:0 "Willkommen im Mod (1910)"
    welcome.1.d:0 "Willkommen, mein Freund! Wie läuft dein Tag? Du hast das Szenario 1910 gewählt, die Ruhe vor dem Sturm. Viel Spaß! \n\n Falls du Fehler findest, melde sie bitte in der Fehlerdiskussion, damit ich sie beheben kann. \n\n Credits: Lev Slav, MisterJay und Knifepony"
    welcome.1.a:0 "Lasst uns mit der Show loslegen"
    welcome.2.t:0 "Willkommen im Mod (1914)"
    welcome.2.d:0 "Willkommen, mein Freund! Wie läuft dein Tag? Du hast das Szenario von 1914 gewählt. Mach dich bereit, denn mein Instinkt (SPOILER-ALARM) sagt mir, dass in Europa etwas im Gange ist und ein gewisser Franz Ferdinand beim Anzünden des Balkan-Pulverfasses ermordet werden könnte. \n\n Wenn du einen Fehler findest, melde ihn bitte in der Fehlerdiskussion, damit ich ihn beheben kann. \n\n Credits: Lev Slav und MisterJay und Knifepony"
    welcome.2.a:0 "Oh oh! Das kann nicht sein ... nicht Franz Ferdinand!"
    welcome.3.t:0 "Willkommen im Mod (1918)"
    welcome.3.d:0 "Willkommen, mein Freund! Wie läuft dein Tag? Du hast das Szenario von 1918 gewählt. Der Krieg dauert nun schon vier lange Jahre, aber es läuft nicht alles schlecht für die Mittelmächte, die Russland besiegt haben. Das bedeutet, dass sie alle ihre östlichen Divisionen an der Westfront konzentrieren können, was ihnen eine zahlenmäßige Überlegenheit verschafft. Dies veranlasste Erich Ludendorff, die Kaiserschlacht zu planen. Doch im Inneren zerfallen die Mittelmächte langsam. Desertion, Kriegsmüdigkeit und die Blockade fordern ihren Tribut, und sie werden entweder schnell gewinnen oder schnell verlieren. \n\n Wenn du Fehler findest, melde sie bitte in der Fehlerdiskussion. Vielen Dank im Voraus für die Hilfe. \n\n Credits: Lev Slav und MisterJay und Knifepony"
    welcome.3.a:0 "Solche düsteren Zeiten"
    welcome.41.t:0 "Willkommen im Mod (1941)"
    welcome.41.d:0 "Hallo und willkommen zum neuen Endsieg-Szenario. Dies ist das erste neue Szenario von MisterJay und wird noch erheblich erweitert. Dieses Szenario spielt sich am besten im Duo, mit einer Sowjetunion und einem deutschen Team! Wenn du es alleine spielst, empfehle ich dir, den schweren Modus zu wählen. Viel Glück und mach den Führer stolz!"
    welcome.41.a:0 "Sie meinen also, ich kann tatsächlich gewinnen?"
    welcome.4.t:0 "Willkommen im Mod (1943)"
    welcome.4.d:0 "Willkommen, mein Freund! Wie läuft dein Tag? Du hast das Szenario von 1943 gewählt. Deutschland hat derzeit seine Truppen für seine (historisch) letzte große Offensive an der Ostfront am Kursker Bogen versammelt. Die Sowjets, die im Voraus von dieser Operation (Zitadelle) erfahren haben, haben sich jedoch tief verschanzt. In Italien sind die Alliierten gelandet und haben den größten Teil Siziliens eingenommen. Die Italiener stehen nun zwischen den Alliierten und den Achsenmächten. Japan hat seinen Zenit in Asien erreicht, und die USA beginnen, hart gegen sie vorzugehen. In China sind sie jedoch relativ erfolgreich. \n\n Wenn du Fehler findest, melde sie bitte in der Fehlerdiskussion. Vielen Dank im Voraus, das hilft allen. \n\n Credits: Lev Slav, MisterJay und Matteo Bosso für die neuen OOBs"
    welcome.4.a:0 "Eine ungewisse Zukunft"
    welcome.5.t:0 "Willkommen im Mod (Juni 1944)"
    welcome.5.d:0 "Willkommen, mein Freund, wie läuft dein Tag? Du hast das Szenario vom 20. Juni 1944 gewählt. Deutschland wird derzeit von Osten und Westen angegriffen. Im Westen sind die Alliierten in der Normandie gelandet und bringen täglich mehr Truppen, im Osten haben die Sowjets die Operation Bagration gestartet und drängen die Deutschen in Weißrussland hart an. In Asien fällt Japan zurück, während die USA beachtliche Erfolge beim Inselhüpfen in Richtung des japanischen Festlands und der Befreiung alliierter Gebiete erzielen, während Japan China immer noch fest im Griff hat. Das ist wahrlich das Schicksal der Götter (Götterdämmerung). \n\n Wenn du Fehler findest, melde sie unbedingt in der Fehlerdiskussion. Vielen Dank im Voraus, es hilft allen. \n\n Credits: Lev Slav MisterJay und Matteo Bosso für die neuen OOBs"
    welcome.5.a:0 "Was wird das Schicksal der Götter sein?"
    welcome.6.t:0 "Willkommen im Mod (Dezember 1944)"
    welcome.6.d:0 "Willkommen, mein Freund! Wie läuft dein Tag? Du hast das Szenario vom 16. Dezember 1944 gewählt. An der Westfront starten deutsche Truppen im Schutz des Nebels (der glücklicherweise die alliierte Luftwaffe außer Gefecht setzte) ihr letztes Wagnis: Sie starten eine große (überraschende) Gegenoffensive in der Hoffnung, die Alliierten durch die Einnahme von Antwerpen und die Vernichtung von vier alliierten Armeen abzuschneiden. Im Osten ist die Rote Armee gerade erst in Deutschland einmarschiert und hat Rumänien, Bulgarien und einen Teil Jugoslawiens „befreit“, das nach Ungarn vordringt. Nun ist die Zeit gekommen, der letzte Kampf ums Vaterland. Ist es zu spät für Deutschland? In Asien sind die Amerikaner gerade auf den Philippinen gelandet, und die japanische Marine wurde praktisch ausgelöscht, bis auf wenige Überreste. China wird noch immer von ihnen beherrscht. \n\n Wenn du Fehler findest, melde sie bitte in der Fehlerdiskussion. Vielen Dank im Voraus, das hilft allen. \n\n Credits: Lev Slav MisterJay und Matteo Bosso für die neuen OOBs"
    welcome.6.a:0 "Die Achsenmächte sind am Boden"
    welcome.7.t:0 "Willkommen im Mod (1945)"
    welcome.7.d:0 "Willkommen, mein Freund! Wie läuft dein Tag? Du hast dich mutig (wenn du Deutschland spielst, was willst du dann mit der Sowjetunion machen? Mal ehrlich, wenn ja... warum nur?) für das Szenario 1945 entschieden. An beiden Fronten wurden die Deutschen schwer zurückgedrängt, aber Goebbels ruft weiterhin zum Endsieg auf, und der Führer ist dennoch voller Hoffnung auf eine Wende. In Asien kämpfen die Amerikaner derzeit eine siegreiche Schlacht bei Iwo Jima, direkt neben dem inzwischen völlig zerbombten japanischen Festland. \n\n Falls du Fehler findest, melde sie bitte in der Fehlerdiskussion, damit ich sie beheben kann. Vielen Dank im Voraus. \n\n Credits: Lev Slav MisterJay und Matteo Bosso für die neuen OOBs"
    welcome.7.a:0 "Eine Welt in Flammen ..."
    welcome.8.t:0 "Willkommen im Mod (1948)"
    welcome.8.d:0 "Willkommen, mein Freund, wie läuft dein Tag? Du hast das alternative Geschichtsszenario von 1948 gewählt, in dem Deutschland den Zweiten Weltkrieg gewissermaßen gewonnen hat. Nach dem entscheidenden deutschen Sieg in Moskau und Stalingrad einigten sich Deutschland und die Sowjetunion widerwillig auf einen Vertrag. In Italien drängten die Alliierten auf eine Großinvasion, was den italienischen König Vittorio Emanuele dazu veranlasste, nach dem anfänglichen Erfolg der Alliierten die Seiten zu wechseln. Infolgedessen schlugen die Deutschen die italienischen Truppen, die Montenegro, Albanien und Griechenland besetzten, schnell zurück und gründeten ihre eigenen Vasallenstaaten, bevor sie eine loyale Italienische Sozialrepublik unter Benito Mussolini gründeten und die alliierte Invasion abwehrten. Da es in den folgenden Jahren keiner Seite gelang, die Pattsituation zu überwinden, wurde 1945 ein Waffenstillstand ohne Vertrag vereinbart – ein Frieden ohne Sieg. Japan war nicht beteiligt und wurde daher noch im selben Jahr besiegt. Großbritannien befindet sich weiterhin in einer Kriegswirtschaft und ist zu jedem Angriff bereit, und die Alliierten planen offenbar eine weitere Großinvasion, möglicherweise angesichts des instabilen Friedens. \n\n Wenn Sie Fehler finden, melden Sie diese bitte in der Fehlerdiskussion. Vielen Dank im Voraus, das hilft allen. \n\n Credits: Lev Slav und MisterJay"
    welcome.8.a:0 "Dies ist die Neue Ordnung"
    welcome.9.t:0 "Verpflegung"
    welcome.9.d:0 "Nun kannst du wählen, ob du Endsieg normal oder mit kostenlosen und günstigeren Rationen spielen möchtest. Beachte, dass du diesen Buff nicht mehr loswirst, sobald du spielst. Wähle also mit Bedacht."
    welcome.9.a:0 "Ich mag keine Rationen. Sie sind grob und rau und irritierend und sie gelangen überall hin."
    welcome.9.b:0 "Geben Sie mir endlich ein paar kostenlose Rationen!"
    welcome.9.c:0 "Ich bevorzuge den ECHTEN Endsieg."
    welcome.10.t:0 "Cheat-Menü"
    welcome.10.d:0 "Hallo und Mitspieler von Endsieg! Diese Mod galt schon immer als „schwierig“, und wir sind hier, um das zu ändern! Endsieg wird immer den gleichen Charakter behalten, aber wir wollten auch Gelegenheitsspielern etwas bieten. Hier ist unser neues Cheat-System!"
    welcome.10.a:0 "Verpflegung"
    welcome.10.b:0 "Schwierigkeitsgradauswahl"
    welcome.10.c:0 "Verstärkungsrate"
    welcome.10.f:0 "Benutzerdefinierte Peacedeals"
    welcome.10.dee:0 "Ich bin fertig!"
    welcome.11.t:0 "Schwierigkeitsgradauswahl"
    welcome.11.d:0 "Hier können Sie den Schwierigkeitsgrad auswählen! Beachten Sie, dass Sie diesen Buff nicht mehr entfernen können, sobald Sie mit dem Spielen begonnen haben. Wählen Sie also mit Bedacht."
    welcome.11.a:0 "Ich möchte ein einfaches Spiel"
    welcome.11.b:0 "Was glaubst du, wer ich bin? Gib mir einfach den normalen Schwierigkeitsgrad!"
    welcome.11.c:0 "Ich mag es, bestraft zu werden"
    welcome.11.dee:0 "FÜR SPARTAAAA!!"
    welcome.12.t:0 "Verstärkungsrate"
    welcome.12.d:0 "Endsieg ist manchmal ein schwieriger Mod in der Abteilung Verstärkungsrate. Hier können Sie wählen, ob Sie das verbessern möchten!"
    welcome.12.a:0 "Ich bin schon genug gestärkt"
    welcome.12.b:0 "Ich mag eine gewisse Verstärkungsrate"
    welcome.12.c:0 "Endsieg ist zu hart..."
    welcome.12.dee:0 "Geben Sie mir einfach diese Verstärkungsrate"
    welcome.13.t:0 "Benutzerdefinierte Peacedeals"
    welcome.13.d:0 "Für alle, die geskriptete Friedensabkommen nicht mögen: Klickt hier, wenn ihr als (oder gegen) das Deutsche Reich spielen wollt. Bitte beachtet, dass Endsieg nicht so gedacht war, und wenn ihr in den Zweiten Weltkrieg wechseln wollt, wird das ein großes Chaos. HINWEIS: Dies ist noch in Arbeit, also erwartet nicht, dass JEDES geskriptete Friedensabkommen behoben wird. Bitte hinterlasst einen Kommentar im Steam Workshop, wenn ihr eines findet, das nicht behoben ist."
    welcome.13.a:0 "Für mich gibt es keine Friedensabkommen nach dem Drehbuch."
    welcome.13.b:0 "Ich möchte das volle Endsieg-Erlebnis."
    welcome.131.t:0 "Spieloptimierungsoptionen"
    welcome.131.desc:0 "Endsieg bietet eine Reihe von Annehmlichkeiten. Aktuell stehen dir geskriptete Friedensdeals, verbesserte Spielgeschwindigkeit und Schwierigkeit zur Auswahl. Um deine Auswahl zu bestätigen oder zu ändern, wähle einfach eine Option aus. Um das Menü wieder zu öffnen, klicke auf das Fragezeichen unter Treibstoff und drücke auf Einstellungen."
    welcome.131.a:0 "Ich möchte geskriptete Friedensabkommen deaktivieren!"
    welcome.131.b:0 "Ich möchte eine höhere Spielgeschwindigkeit!"
    welcome.131.c:0 "Ich möchte den Schwierigkeitsgrad ändern!"
    welcome.131.d:0 "Madman-Optionen"
    welcome.131.e:0 "Optionen zur Kriegserschöpfung"
    welcome.131.f:0 "Ideen und Ideologie des Zweiten Weltkriegs"
    welcome.131.z:0 "Ich bin fertig!"
    welcome.131.x:0 "Nächste Seite"
    welcome.14.t:0 "Verbesserte Spielgeschwindigkeit"
    welcome.14.d:0 "Wenn dein PC nicht der beste ist, wähle diese Option. Dieses Ereignis wird südamerikanische Länder sowie Tibet und Butan in benachbarte Länder eingliedern, um Verzögerungen zu reduzieren. Beachte, dass einige Ereignisse nicht richtig funktionieren und manche möglicherweise gar nicht stattfinden. Bei Problemen informiere uns bitte im Steam Workshop."
    welcome.14.a:0 "Ich spiele Endsieg auf einem Toaster ;("
    welcome.14.b:0 "Ich habe einen dieser schicken Gaming-PCs"
    welcome.28.t:0 "Madman-Optionen"
    welcome.28.desc:0 "Willkommen in der neuen „Geheimecke“ von Endsieg! Heute haben wir ein paar interessante neue Dinge für Sie, die Sie aktivieren können … Jetzt haben Sie die Möglichkeit …"
    welcome.28.a:0 "Aktivieren Sie die Zeit des Ersten Weltkriegs!"
    welcome.28.b:0 "Aktivieren Sie die Zwischenkriegszeit!"
    welcome.28.c:0 "Aktivieren Sie die Zeit des Zweiten Weltkriegs!"
    welcome.28.d:0 "Nichts tun, das gefällt mir überhaupt nicht ..."
    welcome.29.t:0 "Optionen für Kriegserschöpfung"
    welcome.29.desc:0 "Wir haben schon lange Fragen zur Kriegserschöpfung und warum sie nicht für alle Länder aktiviert ist. Wir haben lange behauptet, es sei aus Gründen der Spielbalance. Wir stehen dazu, sind aber auch Befürworter der Spielerwahl und geben euch hiermit die Möglichkeit, die Kriegserschöpfung für bestimmte/alle Länder zu aktivieren. Ich möchte die Kriegserschöpfung aktivieren für..."
    welcome.29.a:0 "Alle!"
    welcome.29.b:0 "Alle Nationen in der deutschen Fraktion!"
    welcome.29.c:0 "Alle Nationen in der französischen Fraktion!"
    welcome.29.d:0 "Alle Nationen in der Fraktion der Sowjetunion!"
    welcome.29.e:0 "Niemand sonst. Ich bin schon müde genug."
    welcome.32.t:0 "Es ist der Zweite Weltkrieg und ich habe eine ganze Menge Käfer!"
    welcome.32.desc:0 "Ich kann meine Einheiten im 2. Weltkrieg nicht sehen! Falls du deine Einheiten nicht siehst: halte kurz inne. Das liegt am Whitepeacing-System von Paradox. \n\nIch habe keinen Fokusbaum im 2. Weltkrieg! Das ist neu bei Endsieg: Wir haben jetzt WW1- und WW2-Fokusbäume kombiniert, für den WW2-Teil musst du nach unten scrollen. In Zukunft (sprich: in sehr ferner Zukunft) werden wir auch einen Zwischenkriegsbaum hinzufügen."
    welcome.32.a:0 "Danke für den Tipp!"
    welcome.42.t:0 "Willkommen bei Endsieg (1942)"
    welcome.42.d:0 "Hallo und willkommen zum Stalingrad-Szenario. Viel Spaß beim Spielen dieses brandneuen Szenarios. Es ist mein erstes Szenario und es können Fehler auftreten. Ich bin für jeden gemeldeten Fehler dankbar. Credits: Sanaa Ripper"
    welcome.42.a:0 "Lass uns gehen !"
    welcome.43.t:0 "Willkommen im Mod (1916)"
    welcome.43.d:0 "Grüße! Willkommen zum Szenario von 1916. Dieses Szenario befindet sich in einem frühen Entwicklungsstadium. Weitere Inhalte werden in Zukunft hinzugefügt. \n\n Credits: Sanaa Ripper"
    welcome.43.a:0 "Lasst uns die Geschichte neu schreiben"
 
