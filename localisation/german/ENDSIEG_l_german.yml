 OTT_befriend_germany:0 "Befriend Germany"
 OTT_befriend_germany_desc:0 "Die Briten sind unsere Feinde. Sie haben uns benutzt, um ihre Kolonien auf dem Gebiet zu errichten, das früher unser Land war, und unsere Wirtschaft auszubeuten. Es gibt nur einen Ausweg, und das ist die neue Ordnung!"
 OTT_german_reform:0 "Deutsche Militärreform I"
 OTT_german_reform_desc:0 "Die türkische Armee hat schon bessere Zeiten erlebt, doch mit deutscher Ausbildung könnten wir wahrscheinlich eine Menge lernen und so die Leistung unserer Armee verbessern."
 OTT_army_reform_II:0 "Deutsche Militärreform II"
 OTT_army_reform_II_desc:0 "Die türkische Armee hat schon bessere Zeiten erlebt, doch mit deutscher Ausbildung könnten wir wahrscheinlich eine Menge lernen und so die Leistung unserer Armee verbessern."
