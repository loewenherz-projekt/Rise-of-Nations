 SO2_southern_expansion:0 "Südliche Expansion"
 SO2_treaty_of_kars:0 "Vertrag von Kars"
 SO2_treaty_of_kars_desc:0 "Nachdem die transkaukasischen Staaten besiegt und wieder integriert wurden, ist es an der Zeit, unsere Grenzen zur Republik Türkei endgültig festzulegen."
 SO2_intervene_PSSR:0 "In Persien eingreifen"
 SO2_intervene_PSSR_desc:0 "Die Persische Sozialistische Republik wird nicht allein gewinnen. Sie wird die Hilfe der mächtigen Roten Armee benötigen, um die bösen Autokraten in Teheran zu besiegen."
 SO2_supply_PSSR:0 "Versorgung der persischen SR"
 SO2_supply_PSSR_desc:0 "Die Persische Sozialistische Republik wird unsere Lieferungen nur erhalten, wenn wir es uns nicht leisten können, dort eine weitere Intervention der Alliierten auszulösen."
 SO2_demand_jap_evac:0 "Fordern Sie die Evakuierung der Japaner aus Europa"
 SO2_demand_jap_evac_desc:0 "Es ist Zeit, dass die Japaner unser Land verlassen!"
 SO2_reintegrate_FAR:0 "Reintegration der Fernöstlichen Republik"
 SO2_reintegrate_FAR_desc:0 "Da die Japaner keine Bedrohung mehr darstellen, ist für uns die Zeit gekommen, die Fernöstliche Republik wieder zu integrieren."
 SO2_SO2_JAP_convention:0 "Sowjetisch-Japanisches Abkommen"
 SO2_SO2_JAP_convention_desc:0 "Wir sollten versuchen, unsere Beziehungen zu den Japanern wiederherzustellen, die während des Bürgerkriegs zerstört wurden."
 SO2_invade_mongolia:0 "Invasion der Mongolei"
 SO2_invade_mongolia_desc:0 "Da Roman von Ungern-Sternberg aus imperialistischen Gründen in die Mongolei einmarschierte, diente dies als perfekter Casus Beli, um dort einzumarschieren und die Bevölkerung der Mongolei zu retten."
