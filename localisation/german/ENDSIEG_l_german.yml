endsieg_achieved.51.t:0 "Endsieg erreicht"
endsieg_achieved.51.d:0 "Herzlichen Glückwunsch, lieber Endsieg-Spieler! Du hast den ultimativen Sieg errungen. Was jetzt folgt, ist ein ziemlich langer Ladebildschirm und eine Reihe von Landtransfers. Diese finden über mehrere Tage statt, also keine Angst, dass du kein Land bekommst. Das Spiel ist sehr CPU-intensiv, daher kann es eine Weile dauern. Du hast den Führer sehr stolz gemacht, und weißt, dass das Deutsche Reich nun wahrlich tausend Jahre bestehen wird!\n\nHier sind einige Statistiken zu deinem Spiel: \nAusgewähltes Szenario: [showStatsScenario] \nGewählter Schwierigkeitsgrad: [showStatsDifficulty] \nMag keine Rationen: [showStatsRations] \n\nStatus der alliierten Hauptmächte: \n[showStatsUSA] und [showStatsUK] \n\nSonstiges: \n[showStatsFinland] \n[showStatsVichy] \n[showIronman]"
