 OTT_hold_on_to_land:0 "Behalten Sie das europäische Territorium"
 OTT_hold_on_to_land_desc:0 "Die europäische Türkei wird immer ein Teil des Imperiums bleiben!"
 OTT_let_go_of_land:0 "Europäisches Territorium abtreten"
 OTT_let_go_of_land_desc:0 "Vielleicht wäre es eine bessere Idee, in Zukunft weiteren Tod und weitere Zerstörung zu vermeiden und einfach den Großteil unserer europäischen Besitztümer abzutreten."
 OTT_befriend_bulgaria:0 "Befreunde dich mit Bulgarien"
 OTT_befriend_bulgaria_desc:0 "Bulgarien wäre ein guter Verbündeter auf dem Balkan, da wir ihr einziger Freund in der Region wären."
 OTT_send_aid:0 "Hilfe für Bulgarien"
 OTT_send_aid_desc:0 "Wir sollten unsere bulgarischen Verbündeten bei ihren Kriegsanstrengungen an der Balkanfront unterstützen."
 OTT_befriend_britain:0 "Befreunde dich mit Großbritannien"
 OTT_befriend_britain_desc:0 "Vielleicht wäre es eine bessere Wahl, sich der alten Ordnung anzuschließen, die in der Vergangenheit immer gewonnen hat, egal, wer der Gegner war."
