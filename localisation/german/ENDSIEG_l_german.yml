 ww1_zeppelin_equipment_1:0 "Luftschiff I"
 ww1_zeppelin_equipment_1_desc:0 "Luftschiffe waren die ersten Luftfahrzeuge, die einen kontrollierten Motorflug ermöglichten. Ihre Verwendung nahm jedoch mit der Zeit ab, da ihre Fähigkeiten von denen der Flugzeuge übertroffen wurden."

