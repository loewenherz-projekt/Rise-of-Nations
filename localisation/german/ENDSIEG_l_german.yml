 RUS_battle_of_the_chiefs:0 "Schlacht der Häuptlinge"
 RUS_battle_of_the_chiefs_desc:0 "Im Sommer 1918 hatten die Weißen im Süden zwei historische Optionen. Die erste ist Pjotr Krasnow, der bereit ist, sich mit der Ukraine und den neuen unabhängigen Staaten des ehemaligen Russischen Reiches zu verbünden, um die Bolschewiki zu bekämpfen. Seine Priorität ist es, Zarizyn anzugreifen und sich mit den Weißen im Osten zu verbünden, bevor er gemeinsam mit ihnen Moskau angreift. Die zweite Option wurde von Anton Denikin unterstützt, der sich weigerte, die Kontrolle über die Gebiete des Russischen Reiches aufzugeben. Denikins Priorität ist es, den Kuban und den Nordkaukasus zu befreien, bevor er Moskau von Süden her durch die Ukraine angreift."
 RUS_raf_squadrons:0 "RAF-Staffeln"
