ww2_germany.154.t:0 "Suezfrage beantwortet, Deutschland sagt: „Bilden Sie ein unabhängiges Ägypten“"
ww2_germany.154.d:0 "Wir haben uns nicht nur entschlossen, den Suezkanal einzunehmen, sondern die Engländer auch zur Aufgabe ihrer gesamten ägyptischen Kolonie zu zwingen, in der Hoffnung, die Region insgesamt zu sichern. Sie steht nun unter unserem Einfluss als Marionette, und wir müssen keine Invasion einer benachbarten feindlichen Kolonie befürchten. Dies wird jedoch die Menge an weiteren Forderungen, die wir danach stellen können, erheblich einschränken."
