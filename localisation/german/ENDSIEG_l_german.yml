 IT1_shorter_training:0 "Kürzere Ausbildung"
 IT1_shorter_training_desc:0 "Da sich der Krieg hinzieht und immer mehr Menschenleben fordert, brauchen wir mehr Männer, um die Verluste auszugleichen. Eine Verkürzung der Ausbildung würde dabei helfen."
 IT1_war_front:0 "Frontlinienfokus I"
 IT1_war_front_desc:0 "Wenn man sich auf die Front konzentriert, erhält man zwar mehr Kriegsunterstützung, verliert aber an Stabilität an der Heimatfront."
