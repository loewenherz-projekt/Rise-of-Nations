ww2_germany.151.d:0 "Wenn wir den Suezkanal selbst einnehmen würden, würde dies die britische Machtprojektion im Mittelmeerraum erheblich schwächen und wir könnten höchstwahrscheinlich keine ernsthafteren Forderungen stellen, auf der anderen Seite hätten wir jedoch eine große Machtposition und könnten den Kanal kontrollieren. \n\n Wenn wir den Suezkanal verlassen, können wir im weiteren Verlauf der Diskussion weitere Forderungen stellen. \n\n Den Türken den Suezkanal zu überlassen, würde das Osmanische Reich zufriedenstellen und die Briten eher bereit machen, das Gebiet abzutreten. Allerdings liegt es in den Händen der Türken, wem es „gehört“. Obwohl sie technisch gesehen unsere Marionette sind, könnten wir bei einem Führungswechsel bedroht sein. \n\n Die Gründung eines unabhängigen Ägypten würde unsere weiteren Forderungen an die Briten erheblich einschränken, jedoch würde dies die gesamte britische Machtprojektion im Mittelmeerraum beseitigen und das ägyptische Sultanat de facto zu einer Marionette des Reiches machen. \n\n Die Übergabe Ägyptens an die Türken würde auch unsere späteren Forderungen einschränken, und wenn unser Bündnis mit den Türken später zerbricht, werden wir keinen dieser Vorteile haben. \n\n Die Eingliederung Ägyptens in unsere Kolonie wäre vielleicht die drastischste Entscheidung, die viel Schande nach sich ziehen und weitere Verhandlungen stark einschränken würde."
