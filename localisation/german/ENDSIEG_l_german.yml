 OTT_strike_russian_port:0 "Angriff auf russische Häfen"
 OTT_strike_russian_port_desc:0 "Für uns ist die Zeit gekommen, uns diesem Großen Krieg gegen die bösen Imperialisten anzuschließen, die aus unserem Elend Profit schlagen wollen."
 OTT_senussi_revolt:0 "Helfen Sie dem Senussi-Aufstand"
 OTT_senussi_revolt_desc:0 "Seit wir Nordafrika verlassen haben, gab es viele Proteste und Guerillakämpfer. Vielleicht sollten wir der größten Gruppe, dem Senussi-Orden, bei einem umfassenden Aufstand helfen."
