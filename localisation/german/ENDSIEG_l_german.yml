 endsieg_news.1.t:0 "Mehmed V stirbt"
 endsieg_news.1.d:0 "Sultan Mehmed V. starb tragischerweise am 3. Juli 1918 im Alter von 73 Jahren (nur vier Monate vor dem Ende des Ersten Weltkriegs; er erlebte den Untergang des Reiches daher nicht mehr). Während seiner Herrschaft seit der erzwungenen Abdankung seines Bruders Abdulhamid II. durch die Jungtürkische Revolution 1908 hatte Mehmed V. keine „echte Macht“, er war vor allem eine Galionsfigur. Seine wichtigste politische Handlung war die Erklärung des Dschihad, also des Kampfes gegen die Entente-Mächte, am 14. November 1914, nachdem das Osmanische Reich beschlossen hatte, auf der Seite der Mittelmächte in den Krieg einzutreten."
 endsieg_news.1.b:0 "Er starb in Frieden, ohne den Zusammenbruch seines Imperiums miterleben zu müssen"
 endsieg_news.2.t:0 "Die Türkei kapituliert! Waffenstillstand in Mudros unterzeichnet"
 endsieg_news.2.d:0 "Der Waffenstillstand von Mudros vom 30. Oktober 1918 beendete offiziell die Feindseligkeiten im Nahen Osten zwischen dem Osmanischen Reich und den Alliierten. Der Waffenstillstand wurde vom osmanischen Marineminister Rauf Bey und dem britischen Admiral Somerset Arthur Gough-Calthorpe an Bord der HMS Agamemnon im Hafen von Mudros auf der griechischen Insel Limnos unterzeichnet. \n\n Zu den Bedingungen gehörte die Kapitulation der Osmanen in ihren Garnisonen außerhalb Anatoliens und die Besetzung der Festungen an den Mündungsarmen der Dardanellen und des Bosporus durch die Alliierten. Die osmanische Luftwaffe wurde demobilisiert und alle Häfen, Eisenbahnen usw. wurden den Alliierten zur Nutzung freigegeben. Im Kaukasus mussten sich die Osmanen an die russisch-türkischen Grenzen vor dem Ersten Weltkrieg zurückziehen. Dem Waffenstillstand folgte die Teilung des Osmanischen Reiches durch Großbritannien und Frankreich entsprechend dem Sykes-Picot-Abkommen."
 endsieg_news.2.b:0 "Es hat seine Zeit längst überschritten"
 endsieg_news.3.t:0 "Türkischer Unabhängigkeitskrieg"
 endsieg_news.3.d:0 "Der türkische Unabhängigkeitskrieg, auch bekannt als Befreiungskrieg, wurde zwischen der türkischen Nationalbewegung unter Mustafa Kemal „Atatürk“ und den Alliierten, vor allem Griechenland und Armenien, geführt. Frankreich, Italien und Großbritannien beteiligten sich nur geringfügig daran. Nur sehr wenige britische, französische und italienische Truppen waren im Einsatz oder an Kampfhandlungen beteiligt."
 endsieg_news.3.b:0 "Das Blutvergießen geht weiter"
 endsieg_news.4.t:0 "Roter Baron abgeschossen!"
 endsieg_news.4.d:0 "Um 11:45 Uhr begann ein erbitterter Luftkampf, als das JG1 und die alliierten Staffeln unter Roy Brown und Oliver LeBoutillier über Sailly-le-Sec aufeinanderprallen. Um 11:50 Uhr entdeckt Mellersh einen einzelnen Dreidecker, überschlägt sich halb und zwingt ihn zur Landung. May kreist am Rande des Gefechts, bis er Richtofens Cousin Wolfram vor sich sieht. Richtofen sieht seinen Cousin unter Beschuss, nähert sich ihm und eröffnet das Feuer. Der unerfahrene May gerät außer Kontrolle und rettet ihm wahrscheinlich das Leben. Richtofen bricht seine eigene Regel und folgt ihm nach unten, während May erdwärts stürzt, erlangt aber kurz über der Somme die Kontrolle zurück und folgt dem Fluss nach Westen – und in die Sicherheit seiner eigenen Linien. Mays Freund Roy Brown sieht die Verfolger und stürzt sich zur Hilfe; es folgt eine Verfolgungsjagd im Tiefflug. Bei starkem Ostwind wird Richtofen immer weiter über die feindlichen Linien getrieben … allein … und unter ständigem Bodenfeuer. Richtofen scheint sich auf das Ziel zu fixieren und bemerkt nicht, dass Brown hinter ihm abtaucht. Genau in diesem Moment schießt Cedric Popkin von der 24. australischen Maschinengewehrkompanie zusammen mit Soldaten der 53. Batterie der Royal Australian Artillery auf den roten Dreidecker. Als Brown eine Salve abfeuert, bäumt sich der Dreidecker nach rechts auf, in der Nähe von Vaux-sur-Somme wird Richtofen durch eine einzige tödliche Schusswunde in der Brust verletzt."
 endsieg_news.4.b:0 "Möge er in Frieden ruhen"
 endsieg_news.5.t:0 "Vertrag von Bukarest"
 endsieg_news.5.d:0 "Der Vertrag von Bukarest vom 7. Mai 1918 war der endgültige Friedensvertrag zwischen Rumänien und der Mittelmächte, nachdem Rumänien nach Russlands Ausscheiden aus dem Ersten Weltkrieg an der Ostfront isoliert worden war. Die Vertragsbedingungen sahen die Rückgabe Süd-Dobrudschas und des südlichen Teils Nord-Dobrudschas an Bulgarien vor, während der Rest Nord-Dobrudschas unter gemeinsamer Kontrolle der Mittelmächte verblieb. Rumänien musste Österreich-Ungarn zudem geringfügige Zugeständnisse bei den Karpatenpässen machen. Rumänien musste außerdem Ölquellen für 90 Jahre an Deutschland verpachten, erkannte jedoch zu Rumäniens Gunsten die Union Bessarabiens mit Rumänien an. Hinter den Kulissen wurde Rumänien de facto zu einer deutschen Marionette gemacht, wobei deutsche Beamte das Recht hatten, Entscheidungen rumänischer Kabinettsminister mit einem Veto zu belegen und rumänische Beamte zu entlassen, da diese in die einzelnen rumänischen Ministerien berufen worden waren."
 endsieg_news.5.b:0 "Okay"
 endsieg_news.6.t:0 "Bulgarien kapituliert! Waffenstillstand von Saloniki unterzeichnet!"
 endsieg_news.6.d:0 "Der Waffenstillstand von Saloniki wurde am 29. September 1918 in Thessaloniki zwischen Bulgarien und den Alliierten unterzeichnet, nachdem fünf Tage zuvor, am 24. September, ein Waffenstillstandsersuchen eingegangen war. Das Ersuchen folgte auf die erfolgreiche Vardar-Offensive der Alliierten, die die bulgarischen Verteidigungslinien in Mazedonien durchbrach und von der sich die Mittelmächte nie erholten. Der Waffenstillstand sah die sofortige Einstellung aller bulgarischen Militäraktivitäten, die Räumung der von Bulgarien besetzten griechischen und serbischen Gebiete sowie die Erlaubnis Bulgariens für die Alliierten vor, durch bulgarisches Gebiet zu ziehen."
 endsieg_news.6.b:0 "Bald wird das ganze Haus einstürzen"
 endsieg_news.7.t:0 "Österreich kapituliert! Waffenstillstand von Villa Giusti unterzeichnet!"
 endsieg_news.7.d:0 "Der Waffenstillstand von Villa Giusti vom 3. November 1918 beendete offiziell den Krieg zwischen Österreich-Ungarn und Italien. Ende Oktober 1918 war die österreichisch-ungarische Armee nach der großen Niederlage in der Schlacht von Vittorio Veneto, wo sich die österreichisch-ungarischen Truppen chaotisch zurückzogen, bis hin zur vollständigen Auflösung der österreichisch-ungarischen Armee, vernichtend geschlagen. Die österreichisch-ungarische Regierung versuchte zwar, einen Waffenstillstand auszuhandeln, da sie zögerte, einen Waffenstillstandstext zu unterzeichnen, unterzeichnete den Waffenstillstand jedoch erst, nachdem die Italiener am 3. November gedroht hatten, die Verhandlungen abzubrechen. Der Waffenstillstand trat am 4. November um 15:00 Uhr in Kraft, obwohl die Armee die Kämpfe offiziell am 3. November einstellte. Anschließend annektierte das Königreich Italien Südtirol, Triest und das österreichische Küstenland."
 endsieg_news.7.b:0 "Von hier an ist alles vorbei"
 endsieg_news.8.t:0 "Kaiser Wilhelm Geschütz schießt Paris"
 endsieg_news.8.d:0 "Das Kaiser-Wilhelm-Geschütz, besser bekannt als Pariser Kanone, war eine schwere Haubitze mit großer Reichweite, die die Stadt Paris während des Krieges mehrmals bombardierte. Obwohl sie ziemlich wirkungslos war, schädigte sie die Moral der Einwohner der Stadt."
 endsieg_news.8.b:0 "Das ist ein langer Weg für eine Shell"
 endsieg_news.9.t:0 "Attentat auf Wladimir Lenin!"
 endsieg_news.9.d:0 "Am 30. August 1918, nachdem Wladimir Lenin in der Hammer-und-Sichel-Fabrik in Moskau gesprochen hatte, verließ er das Gebäude. Fanny Kaplan, eine radikale Revolutionärin, die Lenin als „Verräter der Revolution“ ansah, rief Lenin etwas zu, und als er sich zu ihr umdrehte, feuerte sie drei Schüsse aus einer Browning-Pistole ab. \n\n Eine der Kugeln durchschlug Lenins Mantel, die anderen beiden trafen ihn, eine durchschlug seinen Hals und die anderen durchbohrten einen Teil seiner linken Lunge und blieben in seiner linken Schulter stecken. Lenin wurde in seine Unterkunft im Kreml zurückgebracht. Aus Angst vor anderen Verschwörern weigerte er sich, sofort ärztliche Hilfe in Anspruch zu nehmen. Später wurden Ärzte zu seiner Behandlung gerufen, die nicht in der Lage waren, die Kugeln sofort zu entfernen. Lenin schaffte es jedoch bemerkenswerterweise zu überleben, obwohl er sich gesundheitlich nie wieder vollständig erholte."
 endsieg_news.9.a:0 "Er ist dort einer Kugel ausgewichen"
 endsieg_news.10.t:0 "Die Krim-Operation"
 endsieg_news.10.d:0 "Die Taurische Sozialistische Sowjetrepublik, kurz TSSR, besetzt die Krim, ein Gebiet, das von der Ukraine beansprucht wird. Die deutschen Behörden gehen derzeit hart gegen diesen Schurkenstaat vor und drängen nach Sewastopol, um die Ordnung wiederherzustellen."
 endsieg_news.10.a:0 "In Ordnung"
 endsieg_news.11.t:0 "Die Regionalregierung der Krim"
 endsieg_news.11.d:0 "Mit dem Fall der Taurischen Sozialistischen Sowjetrepublik erlangten die Deutschen die Kontrolle über die im Vertrag von Brest-Litowsk besetzten Gebiete zurück. Eine neue Regierung wurde eingesetzt, um die Ordnung auf der Krim wiederherzustellen und den wichtigen Marinestützpunkt Sewastopol zu verwalten."
 endsieg_news.11.a:0 "In Ordnung"
 endsieg_news.12.t:0 "Flug über Wien"
 endsieg_news.12.d:0 "Am 9. August 1918 flog Gabriele D&#39;Annuzio mit seiner Staffel 11 Ansaldo SVA 1.200 km von ihrem Flugplatz in Due Carrare, Italien, nach Wien, wo sie insgesamt rund 50.000 Flugblätter über der Stadt abwarfen. Die dreifarbigen Flugblätter Grün, Weiß und Rot – die italienische Flagge – waren von D&#39;Annuzio selbst geschrieben und nicht ins Deutsche übersetzt worden. Dies rief Kritik an ihm hervor, wie etwa: „Er schreibt, aber er kann nicht handeln!“. Sein Text galt als wirkungslos und nicht ins Deutsche übersetzbar. Zusätzlich warfen sie 350.000 Flugblätter von Ugo Ojetti ab."
 endsieg_news.12.a:0 "Die Menschen sind müde"
 endsieg_news.13.t:0 "Skoropadsky, ukrainischer Hetman!"
 endsieg_news.13.d:0 "Der ukrainische Kosak Pawlo Skoropatski ist nach einem Putsch an die Macht gekommen, der die vorherige Regierung der Ukrainischen Volksrepublik stürzte. Skoropatski wurde von Bischof Nykodym in der Sophienkathedrale zum Hetman der Ukraine geweiht und versucht, die Ordnung in der weitgehend gesetzlosen ländlichen Region der Ukraine wiederherzustellen."
 endsieg_news.13.a:0 "OK"
 endsieg_news.14.t:0 "Ungarisch-Rumänischer Krieg"
 endsieg_news.14.d:0 "Der Ungarisch-Rumänische Krieg dauerte von November 1918 bis März 1920 und wurde zwischen der Ersten Ungarischen Republik und ab dem 21. März 1919 der Ungarischen Räterepublik ausgetragen. Nach dem Zusammenbruch Österreich-Ungarns wurde die Union Siebenbürgens mit Rumänien erklärt, woraufhin die Rumänen das Land besetzten. Der ungarische Kronrat in Bukarest lehnte dies jedoch ab, woraufhin die Rumänen 1919 mit einer Offensive entlang der ungarisch-rumänischen Demarkationslinie reagierten. Im März 1919 brach die Erste Ungarische Republik jedoch zusammen und eine kommunistische Regierung unter Béla Kun übernahm die Macht. Dieser versprach, Ungarns Grenzen vor den Gebietsabtretungsforderungen der Entente zu schützen. Letztendlich scheiterte die Ungarische Räterepublik jedoch und brach zusammen, als die Rumänen Budapest besetzten, was den Krieg ein für alle Mal beendete."
 endsieg_news.14.a:0 "In Ordnung"
 endsieg_news.15.t:0 "Vertrag von Trianon unterzeichnet!"
 endsieg_news.15.d:0 "Der Vertrag von Trianon war ein endgültiges Friedensabkommen, das den Ersten Weltkrieg zwischen den Alliierten und Ungarn, dem Nachfolgestaat der österreichisch-ungarischen Monarchie, formell beendete. Der Vertrag machte Ungarn zu einem Binnenstaat, 3,3 Millionen ethnische Ungarn wurden aus dem Land vertrieben, und fünf der zehn größten Städte Ungarns lagen außerhalb seiner Grenzen. Die Armee war auf mickrige 35.000 Mann begrenzt, und die Ungarn mussten zudem Kriegsentschädigungen an ihre Nachbarn zahlen. Der Vertrag war für die Ungarn ein Skandal, und die ungarische Delegation unterzeichnete ihn am 4. Juni 1920 unter Protest."
 endsieg_news.15.a:0 "Frieden in unserem Leben"
 endsieg_news.16.t:0 "Königliche Familie ermordet"
 endsieg_news.16.d:0 "Am 17. Juli 1918 wurden der Zar und seine Familie während ihrer Gefangenschaft in Jekaterinburg von bolschewistischen Truppen unter Führung von Jakow Jurowski auf Befehl des Ural-Regionalsowjets getötet, da die Weiße Armee vorrückte und drohte, die Stadt einzunehmen. Hätte Nikolaus den Weißen in die Hände gefallen, befürchtete man, er würde als Fanal für die weiße Sache missbraucht werden. Hätte der Zar sich auf die Seite der Weißen gestellt, hätte dies eine verstärkte ausländische Intervention der Alliierten bedeutet, die den Zaren als legitimen Herrscher Russlands angesehen hätten. Nach der Tötung der Familie eroberte die Weiße Armee die Stadt innerhalb einer Woche."
 endsieg_news.16.a:0 "Wie schrecklich!"
 endsieg_news.17.t:0 "RMS Carpathia gesunken"
 endsieg_news.17.d:0 "Am 15. Juli 1918 wurde die Carpathia, die in einem Konvoi mit Ziel Boston von Liverpool abfuhr, in der Keltischen See von dem deutschen U-Boot U-55 versenkt. Sechs Jahre zuvor war die Carpathia als erstes Schiff zur Rettung der Titanic-Besatzung eingetroffen. Von den 223 an Bord befindlichen Schiffen überlebten 218."
 endsieg_news.17.a:0 "OK"
 endsieg_news.18.t:0 "Vereinigung Rumäniens mit Bessarabien"
 endsieg_news.18.d:0 "Am 9. April 1918 proklamierte der Nationalrat Bessarabiens offiziell die Union mit dem Königreich Rumänien. Der rumänische Premierminister Alexandru Marghiloman betonte jedoch, dass die Vereinigung eher in Rumänien als in Bessarabien beschlossen worden sei, da die Führer Molaviens sich des weit verbreiteten Misstrauens gegenüber der rumänischen Herrschaft bewusst waren und daher befürchteten, dass eine offene Annexion zu einer revolutionären Situation ähnlich der in Russland führen würde."
 endsieg_news.18.a:0 "In Ordnung"
 endsieg_news.19.t:0 "Kaiser Wilhelm dankt ab"
 endsieg_news.19.d:0 "Da das Deutsche Reich aktiv einen Waffenstillstand mit den Alliierten anstrebte und eine Revolution die instabile politische Lage Deutschlands gegen Kriegsende bedrohte, wurden die Forderungen nach einer Abdankung des Kaisers immer lauter. Wilhelm II. selbst zögerte zutiefst, ein solches Opfer zu bringen. Während seine Militärberater darauf bestanden, dass man sich nicht länger auf die Armee verlassen könne, äußerte Wilhelm dennoch die Idee, die Armeen von der Westfront aus nach Deutschland zurückzuführen. Nach dem Kieler Aufstand verlor Wilhelm II. jedoch alle Hoffnung. Die Marine war seine größte Freude und Errungenschaft. Als diese rebellierte, erkannte er, dass der Krieg tatsächlich verloren war. Angesichts des Schicksals der russischen Zarenfamilie, seiner Cousins, dankte er am 9. November ab, was Kanzler Prinz Max von Baden in einer Proklamation am selben Tag bekannt gab, und ging ins niederländische Exil. Die Abdankungsproklamation des Kaisers wurde am 30. November 1918 offiziell veröffentlicht und sah sich hinsichtlich der Art der Abdankung des deutschen Generalstabschefs heftiger Kritik ausgesetzt. Paul von Hindenburg gab am 20. März 1919 eine Erklärung ab, in der er den Ablauf der Ereignisse erläuterte und die Rolle des Kaisers verteidigte."
 endsieg_news.19.a:0 "In Ordnung"
 endsieg_news.20.t:0 "Vertrag von Versaille"
 endsieg_news.20.d:0 "Der Vertrag von Versailles, unterzeichnet am 28. Juni 1919, genau fünf Jahre nach der Ermordung von Erzherzog Franz Ferdinand, beendete offiziell den Kriegszustand zwischen Deutschland und den Alliierten. Im Versailler Vertrag sollte Deutschland die Verantwortung für „alle Verluste und Schäden, die Deutschland und seine Verbündeten während des Krieges verursacht haben“ übernehmen. Dies war eine der wichtigsten und umstrittensten Forderungen, die später als „Kriegsschuldklausel“ bekannt wurde. Insgesamt zwang der Vertrag Deutschland zur Abrüstung, zu territorialen Zugeständnissen an Frankreich, Belgien und Polen und zur Zahlung von Reparationen in Höhe von 132 Milliarden Mark, umgerechnet 442 Milliarden US-Dollar im Jahr 2017. Viele Menschen empfanden den Vertrag damals als „zu hart“, während andere, wie der französische Feldmarschall Ferdinand Foch, ihn als zu nachsichtig empfanden und sagten: „Dies ist kein Frieden. Es ist ein Waffenstillstand für 20 Jahre“, von dem er fast drei Monate entfernt war."
 endsieg_news.20.a:0 "Gib es diesen Hunnen!"
 endsieg_news.21.t:0 "Waffenstillstand von Compiègne"
 endsieg_news.21.d:0 "Der Waffenstillstand vom 11. November 1918, besser bekannt als Waffenstillstand zwischen der Entente und Deutschland, beendete den Ersten Weltkrieg offiziell. Er trat am 11. November 1918 um 11 Uhr Pariser Zeit in Kraft, also zur elften Stunde des elften Tages des elften Monats. Während die Deutschen weitgehend auf die von Präsident Woodrow Wilson in seinen Vierzehn Punkten vorgeschlagene Politik reagierten, wurden die eigentlichen Bedingungen des späteren Versailler Vertrags größtenteils sechs Monate später von den Franzosen ausgearbeitet und beschlossen, die damit den Frieden besiegelten. Der Waffenstillstand beinhaltete die Einstellung aller Feindseligkeiten, den Rückzug der deutschen Truppen an die eigenen Grenzen, den Erhalt der Infrastruktur, den Austausch von Gefangenen, die Zusage von Reparationen und die Übergabe deutscher Kriegsschiffe und U-Boote an die Alliierten."
 endsieg_news.21.a:0 "Endlich ist der Krieg vorbei."
 endsieg_news.22.t:0 "Monarchie im Norden"
 endsieg_news.22.d:0 "Die Monarchie des Nordens, offiziell Königreich Portugal, war eine kurzlebige Revolution und monarchistische Regierung, die am 19. Januar 1919 in Porto im Norden Portugals ausgerufen wurde. Angeführt wurde die Bewegung von Henrique Mitchell de Paiva Couceiro, einem prominenten Mitglied der portugiesischen Kaiserregierung. Er erklärte, die Revolution sei notwendig, denn „wenn der Norden sich nicht mit dem Süden einig wird, werde ich bis zum Ende auf der Seite derer stehen, die der Tradition treu sind.“ Aufgrund ihrer unorganisierten Struktur konnte die Revolution jedoch im ganzen Land keine breite Unterstützung in der Bevölkerung gewinnen, was zu ihrem schnellen Ende und der Wiedereinsetzung des portugiesischen republikanischen Regimes in Porto führte."
 endsieg_news.22.a:0 "Interessante Entwicklung"
 endsieg_news.23.t:0 ""
 endsieg_news.23.d:0 ""
 endsieg_news.23.a:0 ""
 endsieg_news.24.t:0 "Ausrufung der Banater Republik"
 endsieg_news.24.d:0 " Die Banater Republik war ein kurzlebiger Staat, der am 1. November 1918, einen Tag nach dem Zerfall der österreichisch-ungarischen Monarchie, in Temeswar ausgerufen wurde. Die Republik wurde nur von Ungarn anerkannt und am 15. November von der Armee des benachbarten Serbiens besetzt. Im darauffolgenden Jahr wurde ihr Territorium hauptsächlich zwischen dem Königreich der Serben, Kroaten und Slowenen und Rumänien aufgeteilt."
 endsieg_news.24.a:0 "Interessant"
 endsieg_news.25.t:0 "Die Tschechoslowakei erklärt ihre Unabhängigkeit"
 endsieg_news.25.d:0 "Als die österreichisch-ungarische Monarchie langsam zerfiel, forderte Außenminister Baron Istvan Bruain von Rajecz einen Waffenstillstand auf Grundlage der Vierzehn Punkte, in denen Woodrow Wilson den Nationalitäten des Reiches „die freieste Möglichkeit zur autonomen Entwicklung“ einräumte. Zwei Tage später erließ Kaiser Karl I. eine Proklamation, die die Struktur der Monarchie drastisch veränderte und das Reich in eine föderale Union verwandelte. Am selben Tag schloss sich die provisorische tschechoslowakische Regierung den Verbündeten an und begann am 13. Oktober mit der Ausarbeitung einer Unabhängigkeitserklärung, die am 16. Oktober fertiggestellt und schließlich am 18. Oktober in Paris öffentlich veröffentlicht wurde, als die tschechoslowakische Unabhängigkeit erklärt wurde."
 endsieg_news.25.a:0 "Das Imperium zerfällt"
 endsieg_news.26.t:0 "Martin-Erklärung"
 endsieg_news.26.d:0 "Die Martin-Erklärung wurde am 30. Oktober 1918 in Martin, Slowakei, verkündet. Sie erklärte die Unabhängigkeit vom Königreich Ungarn und vereinigte die Slowakei mit den böhmischen Kronländern zur Tschechoslowakei. Obwohl einige slowakische Abgeordnete für Autonomie und eine eigene Nationalversammlung plädierten, lehnte die tschechische Regierung dies ab. Die Slowaken wurden bald zu einer nationalen Minderheit degradiert."
 endsieg_news.26.a:0 "Interessant"
 endsieg_news.27.t:0 "Aster Revolution"
 endsieg_news.27.d:0 "Angeführt von Graf Mihály Károlyi gründete er den sozialdemokratischen Ungarischen Nationalrat, der die Abspaltung Ungarns von Österreich-Ungarn forderte. Mit Unterstützung von Soldaten der Honvéd trugen Demonstranten des HNC am frühen Morgen des 31. Oktober 1918 Astern und halfen, öffentliche Gebäude in ganz Budapest zu besetzen. Am Ende des Tages akzeptierte König Karl IV. (I. von Österreich) den Putsch widerwillig und die Erste Ungarische Republik wurde gegründet, wodurch Österreich-Ungarn de facto aufgelöst wurde."
 endsieg_news.27.a:0 "Das Imperium zerfällt"
 endsieg_news.28.t:0 "Rumänien rückt bis zur Demarkationslinie vor"
 endsieg_news.28.d:0 "Auf rumänische Bitte hin erlaubte das alliierte Kommando im Osten unter französischer Führung der rumänischen Armee, bis zur Linie der Westkarpaten und in Richtung Cluj vorzurücken, wo sie am 24. Dezember eintraf. Am 22. Januar 1919 kontrollierte die rumänische Armee das gesamte Gebiet bis zu dieser Demarkationslinie."
 endsieg_news.28.a:0 "Hoffentlich endet diese Tortur in Transsilvanien friedlich …"
 endsieg_news.29.t:0 "Proklamation der Westukrainischen Republik"
 endsieg_news.29.d:0 "Die Westukrainische Volksrepublik wurde am 1. November 1918 ausgerufen. Kurz nach der Ausrufung der Republik kam es in der Stadt Dezarus (heute Lviv) zu einem Volksaufstand. Die meisten Einwohner waren Polen und waren überrascht, sich in einem nicht-polnischen Staat wiederzufinden, während die ländliche Region mehrheitlich von Ukrainern bewohnt war."
 endsieg_news.29.a:0 "OK"
 endsieg_news.30.t:0 "Proklamation der Huzulenrepublik"
 endsieg_news.30.d:0 "Die Huzulenrepublik wurde am 8. Januar 1919 ausgerufen, als sich die Bevölkerung von Rachiw gegen das ungarische Gendarmenbataillon erhob und 500 ungarische Polizisten festnahm. Die Region wurde de facto als abtrünniger Staat von der tschechoslowakischen Karpatenruthenie eingestuft."
 endsieg_news.30.a:0 "OK"
 endsieg_news.31.t:0 "Proklamation der Republik Kománcza"
 endsieg_news.31.d:0 "Die Republik Komancza war ein Zusammenschluss von dreißig Lemkendörfern rund um Komancza im Osten Lemkiwschtschynas und wurde am 4. November 1918 gegründet. Es handelte sich um einen proukrainischen Staat, der sich letztendlich mit der Westukrainischen Volksrepublik vereinigen sollte, jedoch von der polnischen Regierung unterdrückt wurde."
 endsieg_news.31.a:0 "OK"
 endsieg_news.32.t:0 "Erklärung der Lemko-Republik"
 endsieg_news.32.d:0 "Am 5. Dezember 1918 erklärte die Lemkische Rusinenrepublik ihre Unabhängigkeit. Ihr Zentrum war Florynka, ein Dorf im Südosten des heutigen Polens. Sie war sehr russophil eingestellt und lehnte eine Vereinigung mit der Westukrainischen Volksrepublik ab. Stattdessen strebte sie eine Vereinigung mit einem demokratischen Russland an."
 endsieg_news.32.a:0 "OK"
 endsieg_news.33.t:0 "Polnisch-Ukrainischer Krieg"
 endsieg_news.33.d:0 "Der Polnisch-Ukrainische Krieg begann am 1. November 1918 und dauerte bis zum 17. Juli des folgenden Jahres wegen der komplizierten Frage Galiziens. Aufgrund der komplizierten Geschichte Galiziens unter langjähriger Herrschaft der Habsburger entwickelte sich im Laufe der Zeit eine nationale Identität der Ukrainer, um den polnischen Autonomieforderungen entgegenzuwirken. Nach der faktischen Auflösung und dem Zusammenbruch der österreichisch-ungarischen Regierung im Oktober 1918 übernahmen zwei Regimenter, größtenteils aus Ukropen bestehend, in dem Bemühen, die westukrainischen Gebiete mit dem ehemaligen österreichisch-ungarischen Reich zu vereinen, die Kontrolle über die Stadt Lwiw und erklärten sie zu ihrer Hauptstadt. Die Polaken, die in der Stadt die Mehrheit gestellt hatten, waren schockiert, in einem ukrainischen Staat zu sein, und schließlich begannen Kämpfe zwischen ukrainischen und polnischen Streitkräften, die sich hauptsächlich um die Stadt Lwiw konzentrierten."
 endsieg_news.33.a:0 "OK"
 endsieg_news.34.t:0 "Das ukrainische Hetmanat stürzt"
 endsieg_news.34.d:0 "Nach der Niederlage der Mittelmächte im Ersten Weltkrieg konnte Skoropadsky nicht länger auf die Unterstützung Deutschlands und Österreichs zählen. Am 13. November 1918 gründeten seine Gegner eine rivalisierende Truppe namens „Direktorium“, deren Streitkräfte von den neu gegründeten Sich-Schützen angeführt wurden. Die meisten von Skoropadskys Truppen schlossen sich dem Direktorium an. Skoropadsky wandte sich an einige russische Offiziere, die an der Seite Denikins kämpften, um eine kleine Truppe zu bilden. Diese war jedoch nicht in der Lage, den Truppen des Direktoriums Paroli zu bieten. Nach der Einnahme Kiews übernahmen die Truppen des Direktoriums offiziell die Macht, stürzten Skoropadskys Regime und gründeten die Ukrainische Volksrepublik neu."
 endsieg_news.34.a:0 "OK"
 endsieg_news.35.t:0 "Ukrainisch-Sowjetischer Krieg"
 endsieg_news.35.d:0 "Der Ukrainisch-Sowjetische Krieg brach kurz nach dem Fall Deutschlands und des ukrainischen Hetmanats wieder aus, als das Direktorat der Ukraine das Hetmanat mit Hilfe der Bolschewiki stürzte. Ab Januar 1919 marschierten die Bolschewiki mit voller Macht in die Ukraine ein, und das Direktorat erklärte der Russischen SFSR am 16. Januar 1919 erneut den Krieg, nachdem mehrere vorläufige Ultimaten an den Sownarkom der Russischen SFSR zum Abzug ihrer Truppen gescheitert waren."
 endsieg_news.35.a:0 "OK"
 endsieg_news.36.t:0 "Sowjetische Westoffensive"
 endsieg_news.36.d:0 "Die sowjetische Westoffensive von 1918-1918 war ein genereller Vorstoß der Russischen SFSR in Gebiete, die von den Garnisonen in Ober Ost aufgegeben worden waren, die aus den im vorherigen Vertrag von Brest-Litowsk gebildeten Nationalstaaten nach Deutschland abgezogen worden waren. Die zunächst erfolgreiche Offensive scheiterte schließlich weitgehend gegen Estland, Lettland, Litauen, Polen und Rumänien und war in der Ukraine erfolgreich, wo die Sowjetukraine gegründet und in die UdSSR eingegliedert wurde."
 endsieg_news.36.a:0 "OK"
 endsieg_news.37.t:0 "Polnisch-Sowjetischer Krieg"
 endsieg_news.37.d:0 "Zwischen Februar 1919 und März 1921 tobte der Polnisch-Sowjetische Krieg zwischen Polen und Sowjetrussland sowie der Ukrainischen SSR um umstrittene Gebiete in der UdSSR und Weißrussland. Die Russische SFSR hoffte mit ihrer erfolgreichen Westoffensive, Polen schließlich ganz zu besetzen und zu einer Marionettenmacht zu machen und von dort aus die Revolution auf den Rest Europas, insbesondere Deutschland, auszuweiten. Der Konflikt begann 1919 mit kleineren Zusammenstößen an der Grenze zwischen beiden Ländern, entwickelte sich jedoch 1920 zu einem umfassenden Krieg, den weder Sowjetrussland noch die Polnische Republik geplant hatten."
 endsieg_news.37.a:0 "OK"
 endsieg_news.38.t:0 "Litauisch-Sowjetischer Krieg"
 endsieg_news.38.d:0 "Nach der Entscheidung der sowjetisch-russischen Regierung, den Vertrag von Brest-Litowsk am 13. November 1918 aufzukündigen, der Litauens Unabhängigkeit zusicherte, folgte die bolschewistische Westarmee dem Rückzug der deutschen Truppen, die stark demoralisiert waren und den Sowjets wertvolle Waffen und andere Ausrüstung überließen. Die Russische SFSR versuchte, die globale proletarische Revolution auszubreiten und strebte die Gründung von Sowjetrepubliken in der Region an. Sie betrachtete die baltischen Staaten als Barriere oder Brücke nach Westeuropa, wo sie sich der deutschen und ungarischen Revolution anschließen konnten. Ende Dezember 1918 erreichten bolschewistische Truppen Ostlitauen."
 endsieg_news.38.a:0 "OK"
 endsieg_news.39.t:0 "Estnischer Unabhängigkeitskrieg"
 endsieg_news.39.d:0 "Der am 28. November 1918 beginnende estnische Unabhängigkeitskrieg war ein Verteidigungskrieg gegen die Offensive der Sowjets an der Westfront und die Aggression der Baltischen Landeswehr, die für die Wahrung der deutschen Vorherrschaft im Baltikum kämpfte."
 endsieg_news.39.a:0 "OK"
 endsieg_news.40.t:0 "Lavianischer Unabhängigkeitskrieg"
 endsieg_news.40.d:0 "Der Lettische Unabhängigkeitskrieg begann am 5. Dezember 1918 mit dem Einmarsch der RSFSR in Lettland im Rahmen ihrer Westoffensive. In den Krieg war auch die deutsche Baltische Landeswehr verwickelt, die die deutsche Vorherrschaft im Baltikum bewahren wollte und eine deutsche Vorherrschaft in Lettland anstrebte."
 endsieg_news.40.a:0 "OK"
 endsieg_news.41.t:0 "Aufteilung der Banatregion"
 endsieg_news.41.d:0 "Nach der Alba-Iulia-Resolution und der Übernahme und Besetzung der Banat-Region durch Serbien am 15. November 1918 wurde die Region kurz darauf zwischen dem Königreich Jugoslawien und Rumänien aufgeteilt."
 endsieg_news.41.a:0 "OK"
 endsieg_news.42.t:0 "Tragische Woche"
 endsieg_news.42.d:0 "Die Tragische Woche war eine Reihe von Unruhen und Massakern, die in der Woche vom 7. Januar 1919 in Buenos Aires, Argentinien stattfanden. Die Unruhen wurden von Anarchisten und Kommunisten angeführt und schließlich von der argentinischen Bundespolizei unter Luis Dellepiane und dem Eingreifen der Armee niedergeschlagen. Sie forderten insgesamt 700 Todesopfer. Der Konflikt begann mit einem Streik in einem britischen Werk in einem Vorort von Buenos Aires, der zunächst unbemerkt blieb, bis streikende Arbeiter schließlich auf eine Gruppe Polizisten schossen. Nachdem die Polizei sich im Metallwerk Vasena eine Schlacht mit den streikenden Arbeitern geliefert hatte, brach kurz darauf in der ganzen Stadt ein Mob aus, und alles geriet außer Kontrolle. Gruppen warfen Straßenbahnen um und brannten sie nieder, raubten Geschäfte aus, um Waffen zu erbeuten, und im Kongress brach Gewalt aus."
 endsieg_news.42.a:0 "OK"
 endsieg_news.43.t:0 "Kronstädter Aufstand"
 endsieg_news.43.d:0 "Der Kronstädter Aufstand, der am 7. März 1921 begann, war ein großer Aufstand auf der Insel Kotlin, einer Marinefestung in Kronstadt, gegen die Bolschewiki im März 1921. Er bestand hauptsächlich aus russischen Matrosen, Soldaten und Zivilisten und wurde durch Lenins Argumentation ausgelöst, die Kontrolle über die russische Wirtschaft zu lockern (Neue Ökonomische Politik). Der Aufstand war jedoch weitgehend erfolglos und wurde nach einem zwölftägigen Feldzug, der insgesamt etwa 3.000 bis 4.000 Todesopfer forderte, niedergeschlagen."
 endsieg_news.43.a:0 "OK"
 endsieg_news.44.t:0 "Weiße gewinnen"
 endsieg_news.44.d:0 "Nach einem langen und brutalen Bürgerkrieg in Russland endete dieser mit der Niederlage der bolschewistischen Roten Bewegung. Der Kampf ist jedoch noch lange nicht vorbei, die weiße Bewegung ist untereinander stark gespalten, und es bleibt noch viel zu tun, bevor Russland wieder als stabil gelten kann."
 endsieg_news.44.a:0 "OK"
 endsieg_news.46.t:0 "Der Sieg der Roten"
 endsieg_news.46.d:0 "Nach einem langen und brutalen Bürgerkrieg in Russland endete dieser mit der Niederlage der Weißen Bewegung gegen die bolschewistischen Roten. Den Westmächten ist es letztlich nicht gelungen, den Kommunismus im Keim zu ersticken. Ob man dies bedauern wird oder nicht, wird die Zeit zeigen."
 endsieg_news.46.a:0 "OK"
 endsieg_news.45.t:0 "Fernöstliche Republik erklärt"
 endsieg_news.45.d:0 "Die Fernöstliche Republik (FAR) wurde nach dem Russischen Bürgerkrieg gegründet. Während das Gebiet unter der Kontrolle der weißsibirischen Regierung unter Koltschak stand, entstand nach dem Abzug der japanischen und weißen Truppen ein politisches Vakuum in der Region. In Tschita wurde eine neue Zentralregierung zur Verwaltung der FAR eingerichtet. Sie galt als vorübergehender Pufferstaat zwischen der Russischen SFSR und den noch von Japan und seinen Alliierten besetzten Gebieten. Im April 1920 räumten amerikanische Truppen jedoch Sibirien, sodass Japan die alleinige Besatzungsmacht blieb. Die Bolschewiki betrachteten die FAR als eine Art Vertrag von Brest-Litowsk im Osten. Die FAR verschaffte dem Regime eine Atempause, um sich wirtschaftlich und militärisch zu erholen, und fungierte als Pufferstaat zu Japan. Japan erkannte den neuen Pufferstaat schließlich in einem am 15. Juli 1920 unterzeichneten Waffenstillstand mit der Roten Armee an."
 endsieg_news.45.a:0 "OK"
 endsieg_news.47.t:0 "Putsch in der fernöstlichen Republik"
 endsieg_news.47.d:0 "Am 26. Mai 1921 kam es in Wladiwostok zu einem von den japanischen Besatzungstruppen unterstützten Putsch der Weißen, bei dem eine provisorische Regierung ausgerufen wurde. Dieser Putsch verhinderte jedoch erfolglos die Mobilisierung antibolschewistischer Kräfte, und nach der Evakuierung der Japaner ab Juni 1922 waren die Weißen isoliert."
 endsieg_news.47.a:0 "OK"
 endsieg_news.48.t:0 "Japaner evakuieren Sibirien"
 endsieg_news.48.d:0 "Aus Angst vor dem Kommunismus und aufgrund persönlicher Interessen hofften die Japaner eine Zeit lang, einen Pufferstaat bzw. eine Marionette zwischen der Russischen SFSR und sich selbst zu errichten. Nachdem jedoch alle Alliierten evakuiert und das Land verlassen hatten, blieb Japan in Ruhe und wurde bald darauf von den Alliierten unter Druck gesetzt, ebenfalls zu evakuieren, was sie im Juni 1922 auch taten. Kommunisten übernehmen die Fernöstliche Republik \n\nAls die japanischen Streitkräfte die Fernöstliche Republik räumten, näherte sich die als Armee der Fernöstlichen Republik getarnte Rote Armee, errichtete das kommunistische Regime wieder und eroberte Wladiwostok am 25. Oktober 1922 zurück, was den Russischen Bürgerkrieg effektiv beendete."
 endsieg_news.48.a:0 "OK"
 endsieg_news.49.t:0 "Wiedereingliederung der Fernöstlichen Republik in die RSFSR"
 endsieg_news.49.d:0 "Nach dem Ende des Bürgerkriegs übernahm die Russische SFSR am 15. November 1922 die Fernöstliche Republik. Die Regierung der Fernöstlichen Republik löste sich auf und übergab ihre gesamte Autorität und ihr Territorium an die bolschewistische Regierung in Moskau. Japan behielt jedoch bis 1925 die nördliche Hälfte der Insel Sachalin."
 endsieg_news.49.a:0 "OK"
 endsieg_news.50.t:0 "Erster Kongress der Komintern"
 endsieg_news.50.d:0 "Der Erste Kongress der Komintern war ein internationales Treffen kommunistischer, revolutionärer und syndikalistischer Delegierter in Moskau, bei dem die Kommunistische Internationale, auch bekannt als KOmintern, offiziell gegründet wurde. An dem Treffen vom 2. bis 6. März 1919 nahmen 51 Vertreter aus mehr als zwei Dutzend Ländern Europas, Nordamerikas und Asiens teil."
 endsieg_news.50.a:0 "OK"
 endsieg_news.51.t:0 "Alexander I. von Griechenland stirbt"
 endsieg_news.51.d:0 "Am 2. Oktober 1920 versuchte König Alexander, einen Berberaffen, der seinen Deutschen Schäferhund angriff, zu befreien. Dabei wurde er von einem anderen Affen tief in Bein und Rumpf gebissen. Der König hielt den Vorfall für nicht schwerwiegend, und seine Wunden wurden umgehend gereinigt und verbunden. Am Abend entzündeten sich seine Wunden jedoch, und er bekam hohes Fieber, das eine Blutvergiftung auslöste. Seine Ärzte erwogen, sein Bein zu amputieren, doch niemand wollte die Verantwortung für eine so drastische Maßnahme übernehmen. 23 Tage später, am 25. Oktober 1920, starb Alexander an einer Blutvergiftung, und sein Leichnam wurde in die Kathedrale von Athen überführt."
 endsieg_news.51.a:0 "Möge er in Frieden ruhen ..."
 endsieg_news.52.t:0 "Konstantin I. kehrt an die Macht zurück"
 endsieg_news.52.d:0 "Am 22. November 1920 fand in Griechenland nach dem Tod seines Sohnes, König Alexander, ein Referendum über die Rückkehr von König Konstantin I. statt. Der Vorschlag wurde von 99,0 % der Wähler positiv angenommen. Das Ergebnis sicherte und bestätigte die Vorherrschaft des antivenizelistischen Lagers im Land."
 endsieg_news.52.a:0 "OK"
 endsieg_news.53.t:0 "Großpolnischer Aufstand"
 endsieg_news.53.d:0 "Der Großpolnische Aufstand war ein militärischer Aufstand der Polen in der Region Großpolen gegen die deutsche Herrschaft. Der Aufstand hatte großen Einfluss auf den Versailler Vertrag, der schließlich das von den polnischen Aufständischen eroberte Gebiet der Zweiten Polnischen Republik zusprach. Die Region war Teil der Polnisch-Litauischen Union, bevor sie 1793 mit der Zweiten Teilung Polens dem Königreich Preußen zufiel."
 endsieg_news.53.a:0 "OK"
 endsieg_news.54.t:0 "Deutsche Flotte versenkt in Scapa Flow!"
 endsieg_news.54.d:0 "Die Versenkung der deutschen Flotte fand auf dem Stützpunkt der Royal Navy im schottischen Scapa Flow statt. Nach dem Ende des Ersten Weltkriegs wurde die deutsche Hochseeflotte gemäß dem Waffenstillstand von Compiègne interniert, während über das Schicksal der Schiffe verhandelt wurde. Aus Angst vor einer Beschlagnahmung und Aufteilung aller Schiffe unter den Alliierten beschloss der deutsche Admiral Ludwig von Reuter die endgültige Entscheidung und versenkte die gesamte Flotte. Diese Versenkung geschah am 21. Juni 1919, kurz nach der Entscheidung in Versailles. 52 der 74 Schiffe sanken. Es war der letzte deutsche Sieg über die Alliierten."
 endsieg_news.54.a:0 "Verschwendung von gutem Stahl!"
 endsieg_news.55.t:0 "Blutige Nacht"
 endsieg_news.55.d:0 "In der Nacht des 19. auf den 20. Oktober 1921 kam es in Lissabon zu einem radikalen Aufstand, der auf Portugiesisch „Noite Sangrenta“ genannt wird. Während der Blutigen Nacht wurden der Regierungschef Antonio Granjo sowie die Politiker Machado Santos und José Carlos da Maia, die an der Revolution vom Oktober 1910 beteiligt waren, die zur Gründung der Ersten Portugiesischen Republik führte, und andere kaltblütig ermordet. Der Aufstand ereignete sich in der Nacht des 19. Oktober 1921, nach dem Jahrestag der Ausrufung der Republik. Eine Gruppe von Soldaten erhob sich gegen die Absetzung der Regierung unter Liberato Pinto, dem Protektor der Guarda Nacional Republicana."
 endsieg_news.55.a:0 "Tragisch"
 endsieg_news.56.t:0 "Verbot tritt in Kraft"
 endsieg_news.56.d:0 "Der 18. Zusatzartikel zur Verfassung der Vereinigten Staaten wurde am 18. Dezember 1917 vom US-Senat vorgeschlagen. Am 18. November 1918, noch vor der Ratifizierung des 18. Zusatzartikels, verabschiedete der US-Kongress den Wartime Prohibition Act, der den Verkauf alkoholischer Getränke mit einem Alkoholgehalt von über 1,28 Prozent verbot. (Dieses Gesetz, das Getreide für die Kriegsanstrengungen einsparen sollte, wurde nach der Unterzeichnung des Waffenstillstands am 11. November 1918 verabschiedet, der den Ersten Weltkrieg beendete.) Nach der Zustimmung eines 36. Bundesstaates am 16. Januar 1919 wurde der Zusatzartikel als Teil der Verfassung ratifiziert."
 endsieg_news.56.a:0 "OK"
 endsieg_news.57.t:0 "US-Senat weigert sich, den Versailler Vertrag zu ratifizieren"
 endsieg_news.57.d:0 "Der Kongress der Vereinigten Staaten weigerte sich, den Vertrag zu ratifizieren und lehnte ihn insbesondere hinsichtlich des Abschnitts über den Völkerbund ab, da man argumentierte, dass die USA im Rahmen des Völkerbundes zu viel Macht aufgeben würden. Der Mehrheitsführer im Senat, Henry Cabot Lodge, verfasste daraufhin 14 Vorbehalte – passend zu Wilsons 14 Punkten –, die den Einfluss des Völkerbundes auf die USA verringerten. Es gab auch eine Fraktion im Senat, die den Vertrag mit oder ohne Vorbehalte ablehnte. Während der Senat den Vertrag noch beriet, hielt Henry Borah eine zweistündige, leidenschaftliche Rede, in der er erklärte, dass wir mit der Zustimmung zum Vertrag „ein für alle Mal die große Politik der ‚Vermeidung von Bündnissen‘ verwirkt und aufgegeben haben, auf der die Stärke dieser Republik seit 150 Jahren beruht.“"
 endsieg_news.57.a:0 "OK"
 endsieg_news.58.t:0 "Koltschak tot!"
 endsieg_news.58.d:0 "Die Tschechoslowaken versprachen Koltschak freies Geleit zur britischen Militärmission in Irkutsk. Stattdessen wurde er am 14. Januar 1920 den linkssowjetrussischen Behörden in Irkutsk übergeben. Am 20. Januar übergab die Regierung in Irkutsk die Macht an ein bolschewistisches Militärkomitee. Die Weiße Armee unter dem Kommando von General Wladimir Kappel rückte auf Irkutsk vor, während Koltschak vom 21. Januar bis 6. Februar neun Tage lang von einer fünfköpfigen Kommission des Revolutionskomitees (REVKOM) verhört wurde. Trotz eines gegenteiligen Befehls aus Moskau wurde Admiral Koltschak zusammen mit seinem Premierminister Viktor Pepeljajew zum Tode verurteilt. Beide Gefangenen wurden am frühen Morgen des 7. Februar 1920 vor ein Erschießungskommando gebracht. Augenzeugen zufolge war Koltschak völlig ruhig und furchtlos, „wie ein Engländer“."
 endsieg_news.58.a:0 "Er starb tapfer für seine Sache"
 endsieg_news.59.t:0 "Großer Sibirischer Eismarsch"
 endsieg_news.59.d:0 "Nach Alexander Koltschaks Niederlage und seinem anschließenden Rückzug durch Sibirien im Winter 1919/20 (unter der Verfolgung der Roten Armee), der in der Nähe von Irkutsk zum Stillstand kam, erlitt die Weiße Armee enorme Verluste. In Irkutsk angekommen, versuchte sie mit ihrem Besitz und dem gestohlenen Gold aus Kasan über den damals zugefrorenen Baikalsee zu fliehen. Gleichzeitig wehten die arktischen Winde ungehindert über den See, und viele Soldaten und ihre Familien erfroren auf dem See. Im Frühjahr verschwanden die Leichen und ihre Besitztümer im tiefsten See der Welt, und auch Wladimir Kappel, einer der Generäle der Weißen Armee, fiel diesem Tod zum Opfer. Man nimmt an, dass der größte Teil des Zarengoldes hier verschwand und auf den Grund des Sees sank."
 endsieg_news.59.a:0 "Die Weiße Bewegung ist sicher dem Untergang geweiht"
 endsieg_news.60.t:0 "Irischer Unabhängigkeitskrieg"
 endsieg_news.60.d:0 "Der irische Unabhängigkeitskrieg, der am 21. Januar 1919 begann, wurde zwischen der Irisch-Republikanischen Armee (IRA) und den britischen Sicherheitskräften in Irland ausgetragen und stellte eine Eskalation der irischen Revolutionszeit in einen bewaffneten Konflikt dar. Nach dem Erdrutschsieg von Sinn Féin im Dezember 1918 in Irland bildete diese am 21. Januar 1919 eine abtrünnige Regierung und erklärte ihre Unabhängigkeit von Großbritannien. Später am selben Tag wurden in der Grafschaft Tipperary zwei Mitglieder der bewaffneten Polizei von IRA-Mitgliedern auf eigene Faust erschossen, was den Beginn des Konflikts markierte. Der Konflikt eskalierte später, als die britische Regierung das Dáil und Sinn Féin verbot. Die IRA begann, Patrouillen der RIC und der britischen Armee zu überfallen, ihre Kasernen anzugreifen und isolierte Kasernen zur Aufgabe zu zwingen."
 endsieg_news.60.a:0 "OK"
 endsieg_news.61.t:0 "Anglo-Irischer Vertrag"
 endsieg_news.61.d:0 "Der Anglo-Irische Vertrag war ein Abkommen zwischen Großbritannien und Irland, das den Irischen Unabhängigkeitskrieg beendete und den Irischen Freistaat als selbstverwaltetes Dominion etablierte. Er bot Nordirland zudem die Möglichkeit, aus dem Irischen Freistaat auszutreten, von der auch Gebrauch gemacht wurde. Die Ratifizierung des Abkommens durch eine Versammlung der gewählten Mitglieder des Unterhauses von Südirland war erforderlich. Tatsächlich debattierte das Dâl Éireann den Vertrag jedoch zunächst und ratifizierte ihn dann; anschließend führte die Versammlung weiter. Die Ratifizierung des Vertrags erfolgte jedoch nur knapp, was zu einer Spaltung des Landes und dem irischen Bürgerkrieg führte."
 endsieg_news.61.a:0 "Endlich Frieden"
 endsieg_news.62.t:0 "Irischer Bürgerkrieg"
 endsieg_news.62.d:0 "Der irische Bürgerkrieg folgte auf den irischen Unabhängigkeitskrieg. Er entstand aus einer Spaltung zwischen den Befürwortern und Gegnern des anglo-irischen Vertrags, den irischen Republikanern und irischen Nationalisten. Die republikanische Opposition betrachtete den Vertrag als Verrat an der irischen Republik, und viele der Kämpfer waren während des Unabhängigkeitskrieges Mitglieder der IRA. Die vertragsbefürwortenden Truppen wurden von der britischen Regierung gestellt. Letztlich forderte der Konflikt mehr Todesopfer als der Unabhängigkeitskrieg und hinterließ eine über Generationen gespaltene und verbitterte irische Gesellschaft."
 endsieg_news.62.a:0 "Der Kampf geht weiter"
 endsieg_news.63.t:0 "Ägyptische Revolution"
 endsieg_news.63.d:0 "Die Ägyptische Revolution (1919) war eine landesweite Revolution in Ägypten gegen die britische Besatzung Ägyptens und des Sudan. Sie wurde von Ägyptern und Sudanesen durchgeführt, nachdem der Revolutionsführer Saad Zaghlul und andere Mitglieder der Wafd-Partei 1919 von Großbritannien ins Exil geschickt worden waren. Die Revolution führte schließlich 1922 zur Anerkennung der ägyptischen Unabhängigkeit durch Großbritannien und 1923 zur Einführung einer neuen Verfassung. Großbritannien weigerte sich jedoch, die volle ägyptische Souveränität über den Sudan anzuerkennen und seine Truppen aus der Suezkanalzone abzuziehen. Obwohl Ägypten keine vollständige Unabhängigkeit erlangte, wurde seine Souveränität durch die „Reserved Points“-Klausel stark eingeschränkt."
 endsieg_news.63.a:0 "OK"
 endsieg_news.64.t:0 "Auflösung des Vereinigten Baltischen Herzogtums"
 endsieg_news.64.d:0 "Nach dem Zusammenbruch Deutschlands und dem Rückzug der deutschen Truppen aus den besetzten Nationalstaaten Brest-Litowsk entstand sofort ein Machtvakuum und viele der zuvor eingesetzten pro-deutschen Regierungen wurden ersetzt. Im Vereinigten Baltischen Herzogtum wurde die Regentschaft kurz nach der Unterzeichnung des Waffenstillstands von Compiègne sofort aufgehoben, wodurch die Existenz des Herzogtums endete und an seiner Stelle Estland und Lettland gebildet wurden."
 endsieg_news.64.a:0 "Ein Traumzustand"
 endsieg_news.65.t:0 "Vertrag von Riga"
 endsieg_news.65.d:0 "Der am 11. August 1920 unterzeichnete Vertrag von Riga beendete offiziell den lettischen Unabhängigkeitskrieg und die RSFSR erkannte die Unabhängigkeit Lettlands „für alle Zukunft“ an."
 endsieg_news.65.a:0 "OK"
 endsieg_news.66.t:0 "Vertrag von Tartu"
 endsieg_news.66.d:0 "Der Vertrag von Tartu vom 2. Februar 1920 beendete den sowjetisch-estnischen Krieg formell. Die Vertragsbedingungen sahen vor, dass die RSFSR die Unabhängigkeit der Republik Estland de jure anerkannte und auf alle Rechte am estnischen Territorium verzichtete. Die RSFSR erließ Estland außerdem alle Schulden aus der Zarenzeit und erhielt einen Anteil an den Goldreserven des ehemaligen Russischen Reiches. Dies war die erste Anerkennung Estlands und auch für die diplomatisch isolierte RSFSR von Bedeutung."
 endsieg_news.66.a:0 "OK"
 endsieg_news.67.t:0 "Moskauer Friedensvertrag"
 endsieg_news.67.d:0 "Der sowjetisch-litauische Vertrag, auch bekannt als Moskauer Friedensvertrag, wurde am 12. Juli 1920 nach der Kapitulation Sowjetrusslands im Sowjetisch-Litauischen Krieg zwischen Litauen und der Russischen SFSR unterzeichnet. Im Gegenzug für Litauens Neutralität und die Erlaubnis Sowjetrusslands, während des Polnisch-Sowjetischen Krieges militärisch durch litauisches Territorium vorzudringen, erkannte die Russische SFSR die Unabhängigkeit Litauens offiziell an. Dies war ein wichtiger Meilenstein für Litauens Kampf um internationale Anerkennung."
 endsieg_news.67.a:0 "OK"
 endsieg_news.68.t:0 "Ermordung von Amir Haabibullah"
 endsieg_news.68.d:0 "Emir Habibullah wurde am 20. Februar 1919 während eines Jagdausflugs in der Provinz Laghman ermordet. Sein Bruder Nasrullah Khan, der hinter dem Attentat steckte, folgte ihm kurzzeitig als Emir von Afghanistan nach und hielt vom 21. bis 28. Februar 1919 eine Woche lang die Macht, bevor er von Habibullahs drittem Sohn, Amanullah Khan, gestürzt und inhaftiert wurde."
 endsieg_news.68.a:0 "Tragisch"
 endsieg_news.69.t:0 "Dritter Anglo-Afghanischer Krieg"
 endsieg_news.69.d:0 "Der Dritte Anglo-Afghanische Krieg begann am 6. Mai 1919 nach der Ermordung Amir Habibullahs und dem anschließenden Aufstieg seines Sohnes an die Macht. Dieser musste die Konservativen in Afghanistan besänftigen, um an der Macht zu bleiben. Um den internen Konflikten und den damit verbundenen Unruhen in Indien Abhilfe zu schaffen, beschloss Amanullah, in Britisch-Indien einzumarschieren."
 endsieg_news.69.a:0 "OK"
 endsieg_news.70.t:0 "Anglo-afghanischer Vertrag"
 endsieg_news.70.d:0 "Der Anglo-Afghanische Vertrag von 1919 war ein Waffenstillstand zwischen Großbritannien und Afghanistan nach dem Ende des Dritten Anglo-Afghanischen Krieges. In dem Dokument erkannte Großbritannien die Unabhängigkeit Afghanistans an und stimmte zu, dass Britisch-Indien nicht über den Khyber-Pass hinausreichen würde. Zudem stellte Großbritannien die britischen Subventionen für Afghanistan ein."
 endsieg_news.70.a:0 "OK"
 endsieg_news.71.t:0 "Gründung des Völkerbundes"
 endsieg_news.71.d:0 "Der Völkerbund wurde am 10. Januar 1920 als Ergebnis der Pariser Friedenskonferenz nach dem Ende des Ersten Weltkriegs gegründet. Die diplomatische Philosophie des Völkerbundes stellte einen grundlegenden Wandel gegenüber den vorangegangenen hundert Jahren dar. Der Völkerbund verfügte jedoch nicht über eigene Streitkräfte und war bei der Durchsetzung seiner Beschlüsse stark von den Großmächten abhängig, die dies in der Regel nur widerwillig taten. Letztendlich ist der Völkerbund, wie Mussolini es ausdrückte, „sehr gut, wenn die Spatzen schreien, aber überhaupt nichts, wenn die Adler herausfallen“, und er war für die Wahrung des Weltfriedens weitgehend nutzlos. Obwohl er einige bemerkenswerte Erfolge vorweisen konnte, erwies er sich letztlich als unfähig, die Aggression der Achsenmächte in den 1930er Jahren zu verhindern. Mit Beginn des Zweiten Weltkriegs verfehlte der Völkerbund seinen Hauptzweck, zukünftige Weltkriege zu verhindern."
 endsieg_news.71.a:0 "Eine großartige Grundlage für ewigen Frieden!"
 endsieg_news.72.t:0 "Erster Nonstop-Transatlantikflug"
 endsieg_news.72.d:0 "Die britischen Piloten John Alcock und Arthur Brown unternahmen im Juni 1919 den ersten Nonstop-Transatlantikflug. Sie flogen mit einem umgebauten Vickers Vimy-Bomber aus dem Ersten Weltkrieg von St. John&#39;s, Neufundland, nach Clifden, Connemara, County Galway, Irland. Zusätzlich beförderte der Flug eine kleine Menge Post, was ihn zugleich zum ersten transatlantischen Luftpostflug machte. Nach ihrem Erfolg wurden die beiden Piloten eine Woche später von König Georg V. auf Schloss Windsor mit dem Orden des „Most Excellent Order of the British Empire“ ausgezeichnet."
 endsieg_news.72.a:0 "Ein neuer Rekord!"
 endsieg_news.73.t:0 "Faisal-Weizmann-Abkommen"
 endsieg_news.73.d:0 "Das Faisal-Weizmann-Abkommen wurde am 3. Januar 1919 von Emir Faisal, der 1920 für kurze Zeit König von Syrien war, und Chaim Weizmann, dem Präsidenten der Zionistischen Weltorganisation, unterzeichnet. Es handelte sich um ein kurzlebiges Abkommen zur arabisch-jüdischen Zusammenarbeit bei der Entwicklung einer jüdischen Heimat in Palästina und einer arabischen Nation in weiten Teilen des Nahen Ostens."
 endsieg_news.73.a:0 "OK"
 endsieg_news.74.t:0 "Pakt des Völkerbundes"
 endsieg_news.74.d:0 "Die Satzung des Völkerbundes wurde am 28. Juni 1919 unterzeichnet und war die Charta des Völkerbundes. Erste Entwürfe für eine mögliche Satzung gab es bereits vor dem Ersten Weltkrieg, und die britische Völkerbundgesellschaft nahm 1915 entsprechende Vorschläge an. Während der Pariser Friedenskonferenz wurde eine Kommission eingesetzt, um sich auf eine Satzung zu einigen. Viele Nationen waren sich jedoch uneinig über die genaue Funktionsweise des Völkerbundes. Die USA lehnten die Satzung grundsätzlich ab, da sie sich nicht zur internationalen Verteidigung eines anderen Völkerbundmitglieds verpflichten wollten. Frankreich hingegen wollte, dass der Völkerbund eine internationale Armee bildete, während Großbritannien eine französische Vorherrschaft befürchtete."
 endsieg_news.74.a:0 "Für den Weltfrieden!"
 endsieg_news.75.t:0 "1920 Palästina-Unruhen"
 endsieg_news.75.d:0 "Die Palästina-Unruhen von 1920 ereigneten sich zwischen Sonntag, dem 4., und Mittwoch, dem 7. April 1920 rund um die Altstadt von Jerusalem. Insgesamt wurden dabei fünf Juden und vier Araber getötet, mehrere Hundert wurden verletzt. Die Unruhen ereigneten sich kurz nach der Schlacht von Tel Hai und dem zunehmenden Druck auf arabische Nationalisten in Syrien im Zuge des französisch-syrischen Krieges."
 endsieg_news.75.a:0 "Unglücklich"
 endsieg_news.76.t:0 "Smyrna in Flammen!"
 endsieg_news.76.d:0 "Ein Großbrand hat infolge des Griechisch-Türkischen Krieges große Teile der Hafenstadt Smyrna in Schutt und Asche gelegt. Augenzeugenberichten zufolge begann das Feuer am 13. September 1922 und wurde am 22. gelöscht. Die Stadt war drei Jahre lang von der griechischen Armee kontrolliert worden, bis sie am 9. September 1922 von der türkischen Armee zurückerobert wurde und der Krieg damit beendet war. Es gibt zahlreiche Berichte über griechische und armenische Flüchtlinge, die unter harten Bedingungen am Hafen zusammengepfercht wurden. Auch von Gräueltaten der türkischen Streitkräfte, darunter Vergewaltigungen von Frauen und Massaker an Flüchtlingen, wird berichtet."
 endsieg_news.76.a:0 "Schnapp dir einen Eimer!"
 endsieg_news.77.t:0 "Vertrag von Rapallo"
 endsieg_news.77.d:0 "Der Vertrag von Rapallo wurde unterzeichnet, um einen Streit über Gebiete der ehemaligen österreichischen Küsten-, Oberadria- und Dalmatienregion zu lösen. Der Vertrag wurde am 12. November 1920 in Rapallo bei Genua, Italien, unterzeichnet. Die Spannungen zwischen Italien und Jugoslawien erreichten am Ende des Ersten Weltkriegs einen Höhepunkt, als die Österreichisch-Ungarische Monarchie zerfiel und Italien die Gebiete beanspruchte, die ihm durch den geheimen Londoner Pakt von 1915 zugeteilt worden waren. Laut dem am 26. April 1915 in London vom Königreich Italien, dem Vereinigten Königreich, Frankreich und dem Russischen Reich unterzeichneten Pakt sollte Italien im Falle eines Sieges am Ende des Ersten Weltkriegs mehrere Gebietsgewinne erhalten, darunter Zara und Sebenico."
 endsieg_news.77.a:0 "In Ordnung"
 endsieg_news.78.t:0 "Englische Archäologen finden Eingang zu Tutanchamuns Grab"
 endsieg_news.78.d:0 "Im Jahr 1915 beauftragte George Herbert, 5. Earl of Carnarvon, der Geldgeber der Suche und Ausgrabung des Grabes von Tutanchamun im Tal der Könige, den englischen Archäologen Howard Carter mit der Erforschung des Grabes. Nach einer systematischen Suche entdeckte Carter im November 1922 das eigentliche Grab von Tutanchamun (KV62)."
 endsieg_news.78.a:0 "Tolle Entdeckung!"
 endsieg_news.79.t:0 "Dawes-Plan"
 endsieg_news.79.d:0 "Der Dawes-Plan war 1924 ein Versuch, das Reparationsproblem Deutschlands nach dem Ersten Weltkrieg zu lösen, der von der internationalen Politik und dem Versailler Vertrag geprägt war. Die Besetzung des Ruhrgebiets durch Frankreich und Belgien trug zur Hyperinflationskrise in Deutschland bei, da sie die deutsche Wirtschaft effektiv schwächte. Der Plan sah ein Ende der alliierten Besatzung und einen gestaffelten Zahlungsplan für die deutschen Kriegsentschädigungen vor. Da der Plan eine schwere internationale Krise löste, erhielt Dawes 1925 für seine Arbeit den Friedensnobelpreis. Der Plan war jedoch nur eine Übergangslösung und erwies sich letztendlich als undurchführbar. Er wurde 1929 durch den Young-Plan ersetzt."
 endsieg_news.79.a:0 "Gute Idee"
 endsieg_news.80.t:0 "Erste Weltumrundung aus der Luft"
 endsieg_news.80.d:0 "Die erste Weltumrundung aus der Luft wurde 1924 von einem Pilotenteam des United States Army Air Service (Vorläufer der US Air Force) durchgeführt. Die Reise dauerte 175 Tage und umfasste über 44.342 Kilometer. "
 endsieg_news.80.a:0 "Ein weiterer Rekord gebrochen!"
 endsieg_news.81.t:0 "Ätna bricht aus!"
 endsieg_news.81.d:0 "Zum ersten Mal seit 1669 wurde durch einen Ausbruch des sizilianischen Vulkans Ätna ein besiedeltes Zentrum zerstört. Der Ausbruch begann am 2. November hoch oben an der Nordostflanke des Vulkans. Anschließend öffneten sich in abnehmender Höhe entlang der Vulkanflanke neue Eruptionsspalten. Der dritte und heftigste dieser Risse öffnete sich am späten Abend des 4. November in ungewöhnlich niedriger Höhe, etwa 1.200 Metern über dem Meeresspiegel. Laut örtlichen Geologen wurde das Dorf Mascali bis auf eine Kirche und einige umliegende Gebäude im nördlichen Teil des Dorfes fast vollständig zerstört."
 endsieg_news.81.a:0 "Hoffen wir auf minimale Zerstörung"
 endsieg_news.82.t:0 "Großes Kanto-Erdbeben"
 endsieg_news.82.d:0 "Ein schweres Erdbeben hat die japanische Hauptinsel erschüttert und Tokio, die Hafenstadt Yokohama sowie die umliegenden Präfekturen Chiba, Kanagawa und Shizuoka verwüstet. Aus der gesamten Region wurden weitreichende Schäden gemeldet. Die Wucht des Erdbebens war so groß, dass sich die 93 Short Tons schwere Große Buddha-Statue um fast einen halben Meter bewegte. Informationen über die Zahl der Todesopfer werden noch immer veröffentlicht; die aktuelle Schätzung liegt bei rund 142.800 Toten."
 endsieg_news.82.a:0 "Die Erde bebt unter Tokio"
 endsieg_news.83.t:0 "Abdulmecid II. zum Kalifen gewählt"
 endsieg_news.83.d:0 "Obwohl das osmanische Sultanat am 1. November 1922 offiziell abgeschafft wurde, blieb das Kalifat vorerst bestehen und Kronprinz Abdulmecid wurde von der türkischen Nationalversammlung mit Sitz in Ankara zum Kalifen gewählt. Am 24. November 1922 ließ er sich in Konstantinopel nieder."
 endsieg_news.83.a:0 "OK"
 endsieg_news.84.t:0 "Erdbeben in Haiyuan"
 endsieg_news.84.d:0 "Das Erdbeben von Haiyuan ereignete sich am 16. Dezember 1920 im Kreis Haiyuan in der Provinz Ningxia in der Republik China. Das Beben hatte eine Stärke von 7,8 und richtete Berichten zufolge „totale Zerstörung“ (Stufe XII (Extrem)) an. Im Kreis Haiyuan kamen über 73.000 Menschen ums Leben, und ein Erdrutsch begrub das Dorf Suhiaje im Kreis Xiji unter sich. Im Kreis Guyuan kamen über 30.000 Menschen ums Leben, und in den Städten Longde und Huining stürzten fast alle Häuser ein. Das Beben war vom Gelben Meer bis nach Tsinghai und sogar noch weiter in die Innere Mongolei zu spüren."
 endsieg_news.84.a:0 "Hoffen wir auf minimalen Schaden"
 endsieg_news.85.t:0 "Erstes Treffen des Völkerbundes"
 endsieg_news.85.d:0 "Die Plenarsitzungen der Ersten Versammlung des Völkerbundes fanden vom 15. November bis 18. Dezember in Genf (Schweiz) statt. Zu Beginn der Sitzung waren 41 der insgesamt 42 Mitgliedsstaaten anwesend. Sechs Staaten (Albanien, Österreich, Bulgarien, Costa Rica, Finnland und Luxemburg) wurden im Laufe der Sitzung aufgenommen und waren daher auch während der Sitzung vertreten. Insgesamt fanden 31 Plenarsitzungen statt. Die wichtigsten Fragen der ersten Sitzung betrafen unter anderem die Organisation des Sekretariats, die Aufnahme neuer Mitgliedsstaaten, die Beziehungen zwischen Rat und Versammlung sowie den polnisch-sowjetischen Krieg und die Repatriierung von Kriegsgefangenen."
 endsieg_news.85.a:0 "Ein Weg in eine friedliche Zukunft!"
 endsieg_news.86.t:0 "Genfer Protokoll"
 endsieg_news.86.d:0 "Das Genfer Protokoll, das am 17. Juni 1925 verfasst und unterzeichnet wurde, verbot den Einsatz erstickender, giftiger oder anderer Gase sowie bakteriologischer Kriegsmethoden. Es verbot den Einsatz chemischer und biologischer Waffen in internationalen bewaffneten Konflikten und wurde schließlich am 7. September 1929 in die Verträge des Völkerbundes aufgenommen. Obwohl es den Einsatz chemischer und/oder biologischer Waffen generell verbot, enthielt es keine Bestimmungen zu deren Herstellung, Lagerung oder Weitergabe; diese wurden erst in späteren Verträgen geregelt."
 endsieg_news.86.a:0 "Schluss mit Chemiekriegen!"
 endsieg_news.87.t:0 "Rheinhochwasser"
 endsieg_news.87.d:0 "Köln wurde von einem Hochwasser des Rheins heimgesucht; 50.000 Menschen mussten ihre Häuser verlassen. Der Fluss trat auf beiden Seiten bis zu drei Kilometer über seine natürlichen Ufer, und die gesamte Landschaft wurde ebenso verwüstet wie in den Kriegsjahren. Dutzende Dörfer am Flussufer stehen völlig unter Wasser, nicht einmal ihre Dächer ragen aus der Wasseroberfläche."
 endsieg_news.87.a:0 "Hoffen wir, dass der Wasserstand bald sinkt!"
 endsieg_news.88.t:0 "Attentat auf Mussolini gescheitert"
 endsieg_news.88.d:0 "Am 7. April 1926 überlebte Mussolini einen ersten Attentatsversuch durch Violet Gibson, die ihm in den Kopf schoss. Doch Mussolini konnte sich gerade noch rechtzeitig umdrehen, und der Schuss durchbohrte seine Nase. Gegen sie wurde keine Anklage erhoben, sie wurde jedoch wegen Geisteskrankheit abgeschoben."
 endsieg_news.88.a:0 "Wir sind froh, dass es ihm gut geht! (Vielleicht)"
 endsieg_news.89.t:0 "Zweiter Attentatsversuch auf Mussolini"
 endsieg_news.89.d:0 "Am 31. Oktober 1926 versuchte der 15-jährige Anteo Zamboni, Mussolini in Bologna zu erschießen. Zamboni wurde auf der Stelle gelyncht. Mussolini überlebte auch ein gescheitertes Attentat des Anarchisten Gino Lucetti in Rom sowie einen geplanten Anschlag des italienischen Anarchisten Michele Schirru, der mit Schirrus Gefangennahme und Hinrichtung endete."
 endsieg_news.89.a:0 "Alles in Ordnung, Musso?"
 endsieg_news.90.t:0 "Roald Amundsen fliegt über den Nordpol"
 endsieg_news.90.d:0 "In Begleitung von Lincoln Ellsworth, dem Piloten Hjalmar Riiser-Larsen und drei weiteren Teammitgliedern flog Amundsen mit zwei Flugbooten des Typs Dornier Do J, der N-24 und der N-25, auf 87° 44′ Nord. Dies war der nördlichste Breitengrad, der bis dahin von einem Flugzeug erreicht worden war. Die Flugzeuge landeten ohne Funkkontakt einige Meilen voneinander entfernt, doch die Besatzungen konnten sich wieder vereinen. Die N-24 wurde beschädigt. Amundsen und seine Mannschaft arbeiteten mehr als drei Wochen lang daran, eine Start- und Landebahn vom Eis zu säubern. Sie schaufelten 600 Tonnen Eis und nahmen dabei nur ein Pfund (400 g) ihrer Tagesration an Essen zu sich. Schließlich wurden sechs Besatzungsmitglieder in die N-25 gepfercht. In einer bemerkenswerten Leistung hob Riiser-Larsen ab und sie kamen über dem knackenden Eis kaum in die Luft. Sie kehrten triumphierend zurück, als alle dachten, sie seien für immer verloren."
 endsieg_news.90.a:0 "Großartige Leistung!"
 endsieg_news.91.t:0 "Sidney Reilly hingerichtet"
 endsieg_news.91.d:0 "Sidney Reilly, allgemein bekannt als „Ass der Spione“, war ein britischer Geheimagent und spionierte angeblich für mindestens vier verschiedene Mächte. Er war an einer vereitelten Operation zum Sturz des bolschewistischen Regimes im Jahr 1918 beteiligt, indem er versuchte, Wladimir Lenin zu ermorden, bevor die Verschwörung aufflog (und diente später auch als Inspiration für James Bond). Im September 1925 lockten verdeckte Ermittler der OGPU, der Nachfolgerin der Tscheka, Reilly ins bolschewistische Russland, um ihn dort mit einer angeblichen antikommunistischen Organisation zu treffen. Alexander Jakuschew, ein verdeckter sowjetischer Agent, erinnerte sich: „Der erste Eindruck von ihm ist unangenehm. Seine dunklen Augen drückten etwas Bissiges und Grausames aus; seine Unterlippe hing tief und war zu glatt – das ordentliche schwarze Haar, der demonstrativ elegante Anzug.“ Nachdem Reilly später die finnische Grenze überquert hatte, wurde er von den Sowjets gefangen genommen, deportiert und im Lubjanka-Gefängnis verhört. Während seines Verhörs behaupteten die Sowjets öffentlich, er sei beim Versuch, die finnische Grenze zu überqueren, erschossen worden. Später, nach dem Verhör, kam der Befehl, Reilly zu töten, direkt von Stalin und er wurde in einem Wald in der Nähe von Moskau hingerichtet."
 endsieg_news.91.a:0 "Wir können nicht mit allem davonkommen"
 endsieg_news.92.t:0 ""
 endsieg_news.92.d:0 ""
 endsieg_news.92.a:0 ""
 endsieg_news.93.t:0 "Proteste vom 22. Juli in Athen"
 endsieg_news.93.d:0 "Am 22. Juli 1943 kam es im von den Achsenmächten besetzten Athen zu massiven Protesten gegen die deutschen Pläne zur Ausweitung der bulgarischen Besatzungszone in Griechisch-Mazedonien. Diese waren aufgrund des Abzugs italienischer Truppen vom Balkan notwendig geworden. Die Deutschen waren gezwungen, mehr Truppen der Achsenmächte als Ersatz für die italienischen Truppen in Garnisonen einzusetzen. Adolf Hitler forderte daraufhin die bulgarische Regierung auf, ihre Besatzungszone auf weitere Gebiete in Serbien und Mazedonien auszudehnen. Die Griechen reagierten wütend und am 13. Juli begann ein Proteststreik, der sehr erfolgreich war. Rund 400.000 Menschen beteiligten sich und führten dazu, dass die Ausweitung der Besatzungszone für immer verschoben wurde."
 endsieg_news.93.a:0 "Interessante Entwicklungen"
 endsieg_news.94.t:0 "Boris III. tot!"
 endsieg_news.94.d:0 "Kurz nach seiner Rückkehr von einem Treffen mit Hitler nach Sofia starb Boris III. am 28. August 1943 offenbar an Herzversagen. Man geht davon aus, dass der König von zwei deutschen Ärzten vergiftet wurde, die ihn behandelt hatten. Einer von ihnen, Hans Eppinger, glaubt, dasselbe Gift gefunden zu haben, das er angeblich zwei Jahre zuvor bei einer Obduktion von Ioannis Metaxas gefunden hatte – ein langsam wirkendes Gift, das wochenlang braucht, um zu wirken. Boris&#39; Nachfolger wird sein sechsjähriger Sohn Simeon II. unter einem Regentschaftsrat unter dem Vorsitz von Prinz Kiril von Bulgarien."
 endsieg_news.94.a:0 "Möge er in Frieden ruhen"
 endsieg_news.95.t:0 "Gran Sasso-Raid"
 endsieg_news.95.d:0 "Am 12. September 1943 wurde Benito Mussolini, der im Hotel Campo Imperatore „heimlich“ festgehalten wurde, in einer gewagten Operation unter der Leitung von Otto Skorzeny gerettet, bei der weder von beiden Seiten ein einziger Schuss abgefeuert wurde und es keine Opfer gab. Skorzeny soll nach der offiziellen Begrüßung Mussolinis gesagt haben: „Il Duce, der Führer hat mich geschickt, um Sie zu befreien!“, worauf Mussolini antwortete: „Ich wusste, mein Freund würde mich nicht im Stich lassen!“. Mussolini wurde anschließend sicher nach Wien geflogen. Man kann mit Sicherheit sagen, dass Otto Skorzeny der gefährlichste Mann Europas ist …"
 endsieg_news.95.a:0 "Ein wahrhaft gewagter Überfall!"
 endsieg_news.96.t:0 "Italienische Sozialrepublik gegründet!"
 endsieg_news.96.d:0 "Nach dem Angriff auf den Gran Sasso und der Rettung Mussolinis zwang Hitler den widerstrebenden Mussolini zur Gründung eines neuen faschistischen Staates in Norditalien, der Italienischen Sozialrepublik. Dieser beanspruchte Rom als Hauptstadt, doch die De-facto-Hauptstadt wurde die kleine Stadt Salo zwischen Mailand und Venedig. Die Italienische Sozialrepublik ist kaum mehr als ein Marionettenstaat, der vollständig von Deutschland abhängig ist, das ist heute jedem klar."
 endsieg_news.96.a:0 "Der Krieg wird weitergehen"
 endsieg_news.97.t:0 "Italien kapituliert!"
 endsieg_news.97.d:0 "Nach der erfolgreichen Invasion Siziliens und dem Sturz Benito Mussolinis durch die neue Regierung unter Pietro Badoglio und Vitorio Emmanuel wurde am 3. September in Sizilien nach geheimen Verhandlungen mit den Alliierten ein geheimer Waffenstillstand unterzeichnet, der nun offiziell bekannt gegeben wird. Es ist nur eine Frage der Zeit, bis die Italiener, die öffentlich erklärt haben, weiterhin an der Seite der Deutschen zu kämpfen, mit den Achsenmächten in Konflikt geraten. Da die Verhandlungen der neuen italienischen Regierung über den Waffenstillstand jedoch so lange gedauert haben, ist davon auszugehen, dass die Deutschen auf diesen baldigen groß angelegten Übertritt vorbereitet sein könnten."
 endsieg_news.97.a:0 "Sie waren von Anfang an schwach"
 endsieg_news.98.t:0 "Der Libanon erlangt seine Unabhängigkeit"
 endsieg_news.98.d:0 "Nach dem zunehmenden Druck des libanesischen Volkes gab die französische Regierung schließlich seinen Forderungen nach und gewährte dem Libanon am Montagmorgen, dem 22. November 1943, die Unabhängigkeit. Die erste libanesische Flagge wurde am 11. November 1943 in der Residenz von Hussein El Halabi gehisst."
 endsieg_news.98.a:0 "In Ordnung"
 endsieg_news.99.t:0 "Moskauer Deklarationen"
 endsieg_news.99.d:0 "Die Dritte Moskauer Konferenz zwischen den wichtigsten Alliierten des Zweiten Weltkriegs fand vom 18. Oktober bis 11. November 1943 im Moskauer Kreml und im Spiridnowka-Palast statt. An der Konferenz nahmen hochrangige Diplomaten, Minister und Generäle teil, die offen über die Zusammenarbeit in den Kriegsanstrengungen diskutierten und die vier Moskauer Erklärungen verabschiedeten: eine Erklärung der Vier Nationen zur allgemeinen Sicherheit, eine Erklärung zu Italien, eine Erklärung zu Österreich und eine Erklärung zu den Gräueltaten."
 endsieg_news.99.a:0 "OK"
 endsieg_news.100.t:0 "Mussolini stürzt!"
 endsieg_news.100.d:0 "Am 25. Juli 1943 wurde Benito Mussolini von seinem eigenen Großen Rat abgewählt und verhaftet, als er ein Treffen mit König Vittorio Emanuele verließ, der dem Duce mitgeteilt hatte, der Krieg sei verloren, und ihn als Premierminister abgesetzt hatte. Berichten zufolge reagierte der Duce kaum, war benommen und unrasiert und widersprach nicht. Er soll nun in einen geheimen Bereich gebracht werden, wo er bis Kriegsende gefangen gehalten wird."
 endsieg_news.100.a:0 "Was für eine überraschende Wendung der Ereignisse!"
 endsieg_news.101.t:0 "Bombenanschlag auf Ploesti"
 endsieg_news.101.d:0 "Im Rahmen der Ölkampagne, die den Achsenmächten den Zugang zu erdölbasiertem Treibstoff verwehren sollte, beteiligten sich die in Libyen und Süditalien stationierten US-Luftstreitkräfte an einem strategischen Bombenangriff, der die Ölförderung in Ploesti, die zur Versorgung der deutschen Streitkräfte diente, drastisch reduzieren sollte. Dieser Angriff erwies sich als einer der kostspieligsten für die USAAF in Europa und war der zweitgrößte Verlust, den die USAAF je bei einem einzelnen Einsatz erlitten hat. Das Datum wird als „Schwarzer Sonntag“ bezeichnet."
 endsieg_news.101.a:0 "Was für eine schreckliche Wahlbeteiligung"
 endsieg_news.102.t:0 "Rom bombardiert!"
 endsieg_news.102.d:0 "Die Bombardierung Roms erfolgte am 19. Juli 1943 durch 500 amerikanische Bomber, die rund 1.168 Tonnen Bomben abwarfen. Der Bombenangriff zerstörte kaum bedeutende Ziele und traf nur wenige militärische Ziele. Dennoch war dieser Angriff ein Weckruf für die Italiener, die sich langsam gegen den Duce wandten."
 endsieg_news.102.a:0 "Der Duce ist erledigt!"
 endsieg_news.103.t:0 "Vatikan bombardiert!"
 endsieg_news.103.d:0 "Die Bombardierung der Vatikanstadt erfolgte am Abend des 5. November 1943, als aus der Luft Bomben auf den Südwestsektor des Petersdoms abgeworfen wurden. Dabei entstand erheblicher Schaden, es gab jedoch keine Opfer."
 endsieg_news.103.a:0 "Hoppla"
 endsieg_news.104.t:0 "Deutscher Sieg!"
 endsieg_news.104.d:0 "Mit dem erfolgreichen Vormarsch des Deutschen Reiches in der Champagne und der Einnahme von Paris hat die Französische Republik offiziell kapituliert und strebt einen Waffenstillstand mit den Deutschen an."
 endsieg_news.104.a:0 "In Ordnung"
 endsieg_news.105.t:0 "Finnischer Bürgerkrieg vorbei: Die Weißen gewinnen!"
 endsieg_news.105.d:0 "Der Finnische Krieg, der am 27. Januar 1918 begann, endete heute endlich. Die finnischen Weißen haben dank der Unterstützung der Kaiserlich Deutschen Armee, die sie während des gesamten Krieges regelmäßig verstärkte, die volle Kontrolle über das Land. Es besteht kein Zweifel daran, dass das Deutsche Reich seine Hegemonie in Finnland gesichert hat und plant, eine von Deutschland geführte finnische Monarchie zu errichten. Der Bürgerkrieg hat die Nation jedoch noch immer gespalten, und es ist ungewiss, wann die finnische Gesellschaft wirklich wieder vereint sein wird."
 endsieg_news.105.a:0 "Es ist endlich vorbei!"
 endsieg_news.106.t:0 "Belagerung Leningrads aufgehoben!"
 endsieg_news.106.d:0 "Die fast zweieinhalb Jahre dauernde Belagerung Leningrads war möglicherweise eine der längsten und verheerendsten Belagerungen der Geschichte und mit fast zwei Millionen Toten auf sowjetischer Seite auch die verlustreichste. Berichten zufolge ließen sich die deutschen Armeen beim Rückzug Zeit, die historischen Paläste der Zaren zu plündern und zu zerstören. Ihre wertvollen Kunstsammlungen wurden ins Herz des Reiches gebracht."
 endsieg_news.106.a:0 "Die sowjetische Dampfwalze schreitet voran"
 endsieg_news.107.t:0 "Operation Margarethe durchgeführt!"
 endsieg_news.107.d:0 "Nachdem Hitler von den Gesprächen Miklós Horthys mit den Alliierten über einen Waffenstillstand erfahren hatte, fühlte sich der deutsche Führer von den Ungarn verraten und befahl den deutschen Truppen, am 12. März 1944 die Operation Margarethe durchzuführen, um wichtige ungarische Einrichtungen einzunehmen. Hitler hatte Horthy in das Schloss Klessheim in Österreich eingeladen, und während sie ihre Verhandlungen führten, drangen deutsche Truppen heimlich in Ungarn ein. Das Treffen war lediglich ein Vorwand, um Horthy aus dem Land fernzuhalten und die Armee ohne Befehle zu lassen."
 endsieg_news.107.a:0 "Schnell und unblutig"
 endsieg_news.108.t:0 "Ostpreußen fällt"
 endsieg_news.108.d:0 "Die sowjetische Dampfwalze rückt erneut vor und erobert diesmal Ostpreußen, schließlich das deutsche Kernland selbst. Die in Ostpreußen lebende deutsche Bevölkerung war sich der rasch vorrückenden Roten Armee aufgrund der Endsieg-Propaganda der Nazis, die den wahren Stand der militärischen Angelegenheiten verschleierte, nicht bewusst."
 endsieg_news.108.a:0 "Vor der Niederlage kann man sich jetzt nicht mehr verstecken!"
 endsieg_news.109.t:0 "Hitler-Komplott scheitert!"
 endsieg_news.109.d:0 "Heute, am 20. Juli 1944, scheiterte ein Anschlag auf den deutschen Führer Adolf Hitler in seinem Hauptquartier „Wolfsschanze“. Der Versuch, einen möglichst schnellen Frieden mit den Westalliierten zu erreichen, scheiterte. Die Verschwörer werden zweifellos einen hohen Preis zahlen, aber wir bewundern ihren Mut."
 endsieg_news.109.a:0 "Das Ende für Deutschland ist nahe"
 endsieg_news.110.t:0 "Hitler tot!"
 endsieg_news.110.d:0 "Der deutsche Führer Adolf Hitler hat sich heute in seinem Führerbunker das Leben genommen. Weltweit jubeln die Menschen über die Nachricht, dass dieser Tyrann endlich ins Gras beißt. Es ist jedoch eine Schande, dass er nicht vor Gericht gestellt wird und die wahre Demütigung erfährt. \n\n Nach Hitlers Tod hat Admiral Dönitz offiziell die Kontrolle über Deutschland übernommen und mit den Worten „Wir kämpfen weiter“ deutlich gemacht, dass der Krieg noch lange nicht vorbei ist."
 endsieg_news.110.a:0 "Eine griechische Tragödie"
 endsieg_news.111.t:0 "Finnischer Bürgerkrieg vorbei: Die Roten gewinnen!"
 endsieg_news.111.d:0 "Der finnische Bürgerkrieg, der am 27. Januar 1918 begann, ist heute endlich zu Ende gegangen. Die finnischen Roten haben dank der Hilfe der sowjetischen Roten, die die Krankheit des Kommunismus immer weiter in den Rest Westeuropas getragen haben, die volle Kontrolle über das Land übernommen. Es besteht kein Zweifel mehr daran, dass diese rote Pest jetzt ausgerottet werden muss, bevor sie sich weiter ausbreitet!"
 endsieg_news.111.a:0 "Beängstigend..."
 endsieg_news.112.t:0 "Mussolinis letzte Rede"
 endsieg_news.112.d:0 "Benito Mussolini hielt am 16. Dezember 1944 im Teatro Lirico in Mailand eine Rede, die möglicherweise seine letzte sein wird. Obwohl er behauptete, neue deutsche Waffen würden den Krieg entscheiden, scheint es sich dabei eindeutig um ein politisches Testament zu handeln. Er versuchte, sich vor der Geschichte zu verteidigen und zeichnete das düstere Bild eines bolschewistischen Europas im Falle eines Sieges der Alliierten, während die alliierten Streitkräfte die letzten Überreste der Achsenmächte umzingeln."
 endsieg_news.112.a:0 "Eine kraftvolle Rede..."
 endsieg_news.113.t:0 "Horthy verhandelt mit Verbündeten!"
 endsieg_news.113.d:0 "Der ungarische Regent, Admiral Miklos Horthy, gab heute in einer Radioansprache bekannt, dass er bereits einen Separatfrieden mit der Sowjetunion geschlossen habe, der Ungarn offiziell aus dem Krieg zurückziehen würde. Wie sich dies auf die deutsche Besatzung Ungarns auswirken wird, wo die Kämpfe noch andauern, ist noch unklar."
 endsieg_news.113.a:0 "Die Achse zerfällt"
 endsieg_news.114.t:0 "Warschauer Aufstand!"
 endsieg_news.114.d:0 "Heute beteiligen sich die Polen in Warschau angesichts der immer näher rückenden Sowjetarmee an einem landesweiten Plan. Ziel ist es, die Deutschen aus der Stadt zu vertreiben und von dort aus die Alliierten im Kampf gegen die Nazis zu unterstützen. Das zweite Ziel ist die Befreiung Warschaus vor den Sowjets, um die polnische Souveränität zu unterstreichen, bevor die von der Sowjetunion unterstützte kommunistische Regierung die Kontrolle übernehmen kann."
 endsieg_news.114.a:0 "Na dann viel Glück"
 endsieg_news.115.t:0 "Horthy von der Macht entfernt!"
 endsieg_news.115.d:0 "Ungarns Regent Miklos Horthy wurde gewaltsam entmachtet, nachdem eine Spezialeinheit unter Otto Skorzeny Horthy und seinen Sohn gefangen genommen und in Gewahrsam genommen hatte. Horthy wurde unter Androhung des Todes seines Sohnes zur Machtabgabe gezwungen. Der Pfeilkreuzlerführer Ferenc Szalasi übernahm Horthys Platz und wird den Krieg bis zum Ende fortsetzen."
 endsieg_news.115.a:0 "Ungarn kämpft weiter!"
 endsieg_news.116.t:0 "Schwarzer Baron tot!"
 endsieg_news.116.d:0 "Am 8. August 1944 starteten anglo-kanadische Streitkräfte die Operation Totalize. Im Schutz der Dunkelheit eroberten britische und kanadische Panzer, begleitet von Soldaten, eine taktisch wichtige Anhöhe nahe der Stadt Saint-Aignan-de-Cramesnil. Hier hielten sie an und warteten auf einen Luftangriff, der die nächste Phase des Angriffs einläuten würde. Kurt Meyer von der 12. SS-Hitlerjugend-Division kannte den Grund für den Halt der alliierten Streitkräfte nicht und befahl Teilen seines Kommandos, einen Gegenangriff durchzuführen und die Anhöhe zurückzuerobern. \n\n Panzerass Michael Wittmann, auch bekannt als der „Schwarze Baron“, der 135 bestätigte Panzerabschüsse vorweisen konnte, führte eine Gruppe von sieben Tiger-Panzern an, die von weiteren Panzern und Infanterie unterstützt wurden. Seine Gruppe von Tigern, die ein offenes Gelände in Richtung der Anhöhe überquerten, geriet in einen Hinterhalt von Panzern der A-Staffel des 1. Northamptonshire Yeomanry, der A-Staffel des Sherbrooke Fusilier Regiment und der B-Staffel des 144. Regiments des Royal Armoured Corps. Während des Hinterhalts durchschlugen Panzerabwehrgranaten britischer oder kanadischer Panzer die obere Wanne von Wittmanns Panzer und entzündeten die Munition. Das Feuer erfasste den Panzer und sprengte den Turm ab. Die Besatzung des zerstörten Panzers wurde anschließend in einem anonymen Grab begraben."
 endsieg_news.116.a:0 "Möge er in Frieden ruhen"
 endsieg_news.117.t:0 "Il Duce nicht mehr ..."
 endsieg_news.117.d:0 "Benito Mussolini, der einst gefürchtete faschistische Diktator Italiens, ist schließlich seinen eigenen Ambitionen erlegen und wurde zusammen mit seiner Geliebten Clara Petacci von Partisanen hingerichtet. Beide wurden öffentlich gehängt, damit das italienische Volk seiner Wut auf seinen ehemaligen Unterdrücker Ausdruck verleihen konnte, indem es auf die Leichen pinkelte oder spuckte, während sie in der Sommerhitze an den Zehen hingen. Mussolini versuchte offenbar ein zweites Mal, dem Tod zu entkommen, doch das Glück war ihm nicht hold, und die Gerechtigkeit nahm ihren Lauf."
 endsieg_news.117.a:0 "Ein Diktator weniger"
 endsieg_news.118.t:0 "Tannu Tuva tritt der UdSSR bei"
 endsieg_news.118.d:0 "Das Parlament von Tannu Tuva, der Tuva-Chural, hat kürzlich beschlossen, offiziell als Autonome Oblast Tuwa Teil der Sowjetunion zu werden. Die Annexion wird am 1. November 1944 offiziell formalisiert."
 endsieg_news.118.a:0 "In Ordnung"
 endsieg_news.119.t:0 "Risto Ryti tritt zurück"
 endsieg_news.119.d:0 "Der finnische Präsident Risto Ryti ist heute zurückgetreten und hat sein Amt niedergelegt, nachdem es an der finnischen Front zu einer katastrophalen Wendung der Ereignisse kam: Die neue sowjetische Offensive durchbrach die Karelische Landenge und viele der in den Vorjahren erzielten Erfolge gingen verloren. Sein Nachfolger wird der beliebte General Carl Gustaf Emil (CGE) Mannerheim, der sehr wahrscheinlich einen anderen Plan hat, als diesen Krieg fortzusetzen."
 endsieg_news.119.a:0 "In Ordnung"
 endsieg_news.120.t:0 "Der Lapplandkrieg beginnt"
 endsieg_news.120.d:0 "Heute hat Finnland, kurz nach der Unterzeichnung des Moskauer Waffenstillstands, mit dem Kampf gegen deutsche Divisionen im eigenen Land begonnen, um die verzweifelt fliehenden deutschen Divisionen aus Nordfinnland zu vertreiben."
 endsieg_news.120.a:0 "Interessante Wendung der Ereignisse"
 endsieg_news.121.t:0 "Finnland stimmt dem Waffenstillstand zu!"
 endsieg_news.121.d:0 "Heute hat Finnland einen Waffenstillstand mit der Sowjetunion und Großbritannien unterzeichnet, der den Fortsetzungskrieg offiziell beendet. Der Vertrag stellt den Moskauer Friedensvertrag von 1940 mit einigen Modifikationen wieder her. Die Wendung der Ereignisse mit der neuen sowjetischen Offensive, die Anfang des Jahres in die Karelische Landenge vordrang und durchbrach, ist nicht überraschend."
 endsieg_news.121.a:0 "Die Achse ist nicht mehr"
 endsieg_news.122.t:0 "Hitler flieht!"
 endsieg_news.122.d:0 "Die Befürchtungen der Dritten Sowjetischen Stoßarmee haben sich bewahrheitet. Es scheint, dass sich in dem Flugzeug, das kurz vor seiner Eroberung aus Berlin abflog, tatsächlich Hitler an Bord befand, der mit der deutschen Fliegerass Hannah Rietsch geflohen war, um den Kampf fortzusetzen."
 endsieg_news.122.a:0 "Verdammt!"
 endsieg_news.123.t:0 "FDR stirbt"
 endsieg_news.123.d:0 "Der amerikanische Präsident Franklin Delano Roosevelt ist heute an den Folgen einer Hirnblutung gestorben. Er wird das Kriegsende vielleicht nicht mehr erleben, doch sein Beitrag war großartig. Sein Nachfolger wird Vizepräsident Truman."
 endsieg_news.123.a:0 "Tragisch"
 endsieg_news.124.t:0 "Rumänien erklärt Deutschland den Krieg!"
 endsieg_news.124.d:0 "Nach dem Zusammenbruch der nordöstlichen rumänischen Front angesichts einer erfolgreichen sowjetischen Offensive entließ König Michael mutig die Regierung von Ion Antonescu, die zuvor mit Unterstützung der Armee auf der Seite der Achsenmächte gestanden hatte. Dies kam für die Antonescu-Regierung, die den König zuvor nur als „Galionsfigur“ betrachtet hatte, völlig unerwartet."
 endsieg_news.124.a:0 "Die Achse zerfällt"
 endsieg_news.125.t:0 "König in Finnland gewählt!"
 endsieg_news.125.d:0 "In Finnland wurde heute der in Deutschland geborene Prinz Friedrich Karl von Hessen nach dem Sieg der Weißen Fraktion und der Verabschiedung einer neuen Verfassung zum finnischen König gewählt."
 endsieg_news.125.a:0 "Interessant"
 endsieg_news.126.t:0 "Karl Friedrich dankt ab!"
 endsieg_news.126.d:0 "In Finnland wurde heute offiziell bekannt gegeben, dass Friedrich Karl von Hessen seinen Thron in Finnland aufgegeben hat. Dies ist höchstwahrscheinlich auf Druck des Westens zurückzuführen, der nach der Niederlage Deutschlands vor etwas mehr als einem Monat seine Absetzung forderte."
 endsieg_news.126.a:0 "Königreich Finnland nicht mehr"
 #endsieg_news.127.t:0 "Titanic Sinks Four Hours After Hitting Iceburg"
 #endsieg_news.127.d:0 "The first news of the disaster to the Titanic was recieved by the Marconi wireless station at Cape Race 22:25 o'clock last night. The Titanic was first heard giving the distress signal 'C.Q.D.,' which was answered by a number of ships including Carpathia, the Baltic, and Olympic. The Titanic said she had struck and iceberg and was in immediate need of assitance. By 22:55 o'clock the Titanic reported she was sinking by the head. By 23:36 o'clock the Titanic informed the Olympic they were putting women off in boats and instructed the Olympic to have her boats ready to transfer passengers. The Titanic, during all this time, continued to give distress signals announcing her position. The last signals heard from the Titanic were received at 0:27 when the Virginian reported having heard a few blrred signals which ended abruptly. \n\n The Titanic foundered at about 2:20, so far 655 souls have been saved of the crew and passengers, most of the latter presumably women and children. Sources say 1,500 to 1,800 were still aboard the ship when it went down. J.J. Astor one of the richest men in the world and the richest on board is presumed to be dead with a many other notable elite figures. Captain Smith said to have gone down with the ship in her final moments along with ship designer Thomas Andrews while J. Bruce Ismay also called 'J. Brute Ismay' or the 'Coward of the Titanic' had deserted the ship while women and children were on board with many negative cartoons being published depicting him deserting the ship."
 #endsieg_news.127.a:0 "What an unimaginable disaster..."
 #endsieg_news.128.t:0 "Largest Ship in the World Launched"
 #endsieg_news.128.d:0 "The RMS Olympic, the first in a new class of superliners has started her Maiden Voyage gaining considerable worldwide attention from the press and public, it is said that as many as up to 10,000 are waiting spectate her arrival in New York. Whilst not a particularly fast ship traveling at most 22 knots the Olympic is mainly designed as a luxury ship with a swimming pool, gymnasum, turkish bath, a Veranda Cafe decorated with palm trees, and more."
 #endsieg_news.128.a:0 "Interesting"
 #endsieg_news.129.t:0 "Germany Surrenders, Victory in Europe!"
 #endsieg_news.129.d:0 "Today the definitive text for the German surrender of all forces was signed in Karlshorst, Berlin, the representatives of three armed services of the Oberkommando der Wehrmacht (OKW) and the Allied Expeditionary Force together with the Supreme High Command of the Red Army, with further French and U.S. representatives signing as witnesses. The first instrument of surrender was signed at Reis by Alfred Jodl who had unfortunately failed to negotiate better terms of surrender. However a few hours later the Soviet Union called for a unique surrender in Berlin were the seat of the German agression first sprung from, also making a point the surrender at Reims did not explicitly require German soldiers to law down their arms and give themselves up. Eisenhower then agreed and the definitive act of unconditional surrender for the German military was signed in berlin by Field-Marshal Wilhelm Keitl."
 #endsieg_news.129.a:0 "Hurrah!"
 endsieg_news.127.t:0 "Schweden schließt sich den Mittelmächten an"
 endsieg_news.127.d:0 "Das Königreich Schweden hat sich heute offiziell den Mittelmächten angeschlossen. Gustav V. forderte kurz darauf eine Kriegserklärung an Russland und die Entente. Obwohl der Insider-Deal, der Schweden auf die Seite Deutschlands brachte, eher unbekannt ist, ist es nicht weit von der Realität entfernt, dass das halbautonome Königreich Finnland, eine ehemalige Region des schwedischen Reiches, auf dem Verhandlungstisch steht."
 endsieg_news.127.a:0 "Interessante Entwicklungen …"
 endsieg_news.128.t:0 "Rumänien schließt sich den Mittelmächten an"
 endsieg_news.128.d:0 "Das Königreich Rumänien hat sich heute offiziell den Mittelmächten angeschlossen. Ferdinand I. forderte eine Kriegserklärung an die Entente. Obwohl nicht klar ist, was das Königreich Rumänien zum Beitritt zu den Mittelmächten bewogen hat, ist es wahrscheinlich, dass Bessarabien und die beträchtliche militärische Stärke der Mittelmächte im Gespräch waren."
 endsieg_news.128.a:0 "Interessante Entwicklungen …"
 endsieg_news.129.t:0 "Agadir-Krise"
 endsieg_news.129.d:0 "Die Französische Republik hat heute erhebliche Truppen ins Landesinnere Marokkos entsandt. Deutschland erhebt zwar keine Einwände gegen die französische Expansion, fordert jedoch eine territoriale Entschädigung für die Kriegsdrohung und die Entsendung eines Kanonenbootes. Dies hat viele deutsche Nationalisten wütend gemacht." # and negotiations have quickly goen underway between Berlin and Paris which have resolved the Crisis, the French have in turn taken over Morocco and in return have given Spain the Rif territory whilst giving Germany their requested concessions in Cameroon
 endsieg_news.129.a:0 "Nichts allzu Ernstes"
 endsieg_news.130.t:0 "Deutschland setzt Rupprecht-Plan um"
 endsieg_news.130.d:0 "Angesichts der deutlich steigenden Spannungen in der Julikrise, die schließlich zu einer umfassenden Kriegserklärung eskalierten, hat sich das Deutsche Reich heute dazu entschlossen, den eher merkwürdigen Rupprecht-Plan umzusetzen, der darauf abzielt, Frankreich über die neutrale Schweiz statt über Belgien zu erobern, um zu verhindern, dass sich die Briten dem Krieg mit Frankreich und Russland anschließen."
 endsieg_news.130.a:0 "Was ist aus der Schweizer Neutralität geworden?"
 endsieg_news.131.t:0 "Die Goeben und die Breslau"
 endsieg_news.131.d:0 "Heute kam es zu bedeutenden Entwicklungen im Mittelmeer: Die deutschen Schiffe SMS Goeben und SMS Breslau, Teil der Mittelmeerdivision, wurden von der britischen Mittelmeerflotte verfolgt, die erfolglos versuchte, sie abzufangen. Die Goeben und die Breslau konnten der britischen Mittelmeerflotte jedoch entkommen und durchquerten die Dardanellen nach Konstantinopel, wo sie dem Osmanischen Reich übergeben wurden. Das Osmanische Reich gab an, die Schiffe gekauft zu haben, aber wir alle wissen nur zu gut, was wahrscheinlich tatsächlich passiert ist …"
 endsieg_news.131.a:0 "Ziemlich irreführend ..."
 endsieg_news.132.t:0 "Deutschland führt den Kronprinz-Plan durch"
 endsieg_news.132.d:0 "Angesichts der deutlich zunehmenden Spannungen in der Julikrise, die schließlich zu einer umfassenden Kriegserklärung eskalierten, hat sich das Deutsche Reich heute dazu entschlossen, den einfachen Kronprinz-Plan umzusetzen. Dabei wird eine kleine Verteidigungstruppe an der deutsch-französischen Grenze stationiert, um die Briten zu beschwichtigen und ihre Neutralität zu wahren, während die Hauptstreitkräfte nach Osten verlegt werden, um Russland schnell aus dem Krieg zu drängen."
 endsieg_news.132.a:0 "Und da sind die Dominosteine ..."
 endsieg_news.133.t:0 "Deutschland setzt Schlieffen-Plan um"
 endsieg_news.133.d:0 "Angesichts der im Zuge der Julikrise deutlich gestiegenen Spannungen, die schließlich zu einer umfassenden Kriegserklärung führten, beschloss das Deutsche Reich heute, den „Schlieffen-Plan“ umzusetzen. Ziel ist es, den Großteil der deutschen Invasionstruppen durch das neutrale Belgien zu verlegen, um so die stärksten französischen Befestigungen an der deutsch-französischen Grenze zu umgehen und schließlich Paris schnell einzunehmen. Dies wiederum hat Großbritannien schwer verärgert."
 endsieg_news.133.a:0 "Was ist aus der belgischen Neutralität geworden?"
 endsieg_news.134.t:0 "Albanien schließt sich den Mittelmächten an"
 endsieg_news.134.d:0 "Da Prinz Wilhelm von Albanien in hohem Maße von österreichischen Subventionen abhängig war, um den Zusammenbruch seines Regimes zu verhindern, hatte er keine andere Wahl, als die deutsche und die österreichische Regierung Albanien aufforderten, sich den Mittelmächten anzuschließen, um so zur Schwächung und Spaltung der serbischen Streitkräfte an der Balkanfront beizutragen."
 endsieg_news.134.a:0 "Interessante Entwicklungen …"
 endsieg_news.135.t:0 "Maritz-Rebellion"
 endsieg_news.135.d:0 "Die Deutschen scheinen heute erfolgreich mit Manie Maritz verhandelt zu haben. Dieser hat beschlossen, mit uns zusammenzuarbeiten und von der Initiative Südafrikas, die Kontrolle über die deutsche Kolonie Deutsch-Südafrika zu übernehmen, abzurücken und stattdessen gegen die Südafrikaner selbst zu den Waffen zu greifen."
 endsieg_news.135.a:0 "Alter Groll stirbt nie"
 endsieg_news.136.t:0 "Bulgarien schließt sich den Mittelmächten an"
 endsieg_news.136.d:0 "Heute hat sich das Zarenreich Bulgarien offiziell den Mittelmächten angeschlossen und Serbien den Krieg erklärt. Dies ist jedoch alles andere als eine Neuigkeit angesichts der tragischen Geschichte Bulgariens, das in den letzten Jahren durch Serbien und seine Verbündeten erhebliche Gebietsverluste erlitten hat. Diese Verluste sollte Bulgarien erst durch den Beitritt zu den Mittelmächten wiedererlangen."
 endsieg_news.136.a:0 "Serbien ist dem Untergang geweiht!"
 endsieg_news.137.t:0 "Regentschaftskönigreich Polen proklamiert"
 endsieg_news.137.d:0 "Heute bestehen Hindenburg und Ludendorff im Deutschen Reich, die ihre Verluste auf dem Schlachtfeld ersetzen wollen und auch die derzeitigen Oberbefehlshaber des deutschen Militärs sind, auf der Errichtung eines von Deutschland abhängigen polnischen Staates und beschleunigen so den Prozess der Schaffung eines polnischen Staates. \n\n Ein Provisorischer Staatsrat wurde als provisorische Regierung eingerichtet und beide Generäle hoffen, bald mit der Rekrutierung von Polen für die Armee beginnen zu können, die die Deutschen als ihre Befreier von ihren ehemaligen russischen Herrschern feiern sollen."
 endsieg_news.137.a:0 "Unwahrscheinlich"
 endsieg_news.138.t:0 "Eidkrise"
 endsieg_news.138.d:0 "Heute haben in Deutschland die Polnischen Legionen zum großen Entsetzen Hindenburgs und Ludendorffs die Aufforderung, Kaiser Bill Treue und Gehorsam zu schwören, mehrheitlich abgelehnt. Angeblich war dies auf die Überredung durch Jozef Pilsudski zurückzuführen, den Kommandeur der Polnischen Legionen, der nun verhaftet werden soll. \n\n Dennoch verliefen die deutschen Bemühungen, in Polen eine Polnische Wehrmacht aufzustellen, sehr erfolglos und größtenteils ein riesiges Desaster... Österreich-Ungarn ist Berichten zufolge jedoch weitergegangen und hat eine Truppe von 3.000 Mann aus der Polnischen Legion zwangsrekrutiert."
 endsieg_news.138.a:0 "Der Stimmzettel ist stärker als die Kugel"
 endsieg_news.139.t:0 "Lenin im Panzerzug nach Russland geschickt"
 endsieg_news.139.d:0 "Der russische Revolutionär Wladimir Lenin durfte Berichten zufolge von der Schweiz nach Deutschland einreisen und einen Panzerzug besteigen, von dem aus er über Schweden und dann durch das russische Finnland nach Petrograd gebracht werden sollte. Obwohl es für die Deutschen recht ungewöhnlich erscheint, scheinen ihre Bemühungen eher auf die Destabilisierung der russischen Regierung als auf einen Akt der Freundlichkeit oder Sympathie für den Revolutionär abzuzielen."
 endsieg_news.139.a:0 "Wer ist dieser Lenin?"
 endsieg_news.140.t:0 "Untergang der Lusitania"
 endsieg_news.140.d:0 "Heute wurde die RMS Lusitania auf tragische Weise von einem deutschen U-Boot, der U-20, torpediert. An Bord befanden sich vermutlich etwa 124 Amerikaner, die dabei ums Leben kamen. Insgesamt starben 1.198 Menschen, 761 überlebten. Dies wird die USA definitiv gegen das Deutsche Reich aufbringen und sie möglicherweise sogar dazu bringen, selbst in den Krieg einzutreten."
 endsieg_news.140.a:0 "Es ist eine Ungerechtigkeit!"
 endsieg_news.141.t:0 "Deutschland beginnt den uneingeschränkten U-Boot-Krieg"
 endsieg_news.141.d:0 "Es scheint, als hätten sich die Deutschen entschieden, das Gesetz zu missachten, im Gegensatz zu den Prisenregeln, die vorschreiben, dass U-Boote auftauchen, Handelsschiffe durchsuchen und die Besatzungen an einem „sicheren Ort“ absetzen müssen, bevor sie versenkt werden. Sie hoffen, dass dies den Briten den Nachschub an Nachschub für ihre Insel entziehen wird, was jedoch wahrscheinlich andere Nationen, insbesondere die USA, verärgern wird."
 endsieg_news.141.a:0 "Ist das ethisch vertretbar?"
 endsieg_news.142.t:0 "Afghanistan schließt sich den Mittelmächten an"
 endsieg_news.142.d:0 "Das Emirat Afghanistan hat sich heute offiziell den Mittelmächten angeschlossen. Der Emir rief zum Dschihad in Indien auf. Obwohl unbekannt ist, was den afghanischen Emir dazu bewegte, ist es wahrscheinlich, dass die Deutschen dem Emir Unterstützung zugesagt und ihn mit den Dschihad-Ideen ihrer türkischen Freunde vertraut gemacht haben."
 endsieg_news.142.a:0 "Steckt Indien jetzt in Schwierigkeiten?"
 endsieg_news.143.t:0 "Bürgerkrieg in Indien"
 endsieg_news.143.d:0 "Heute ist ein deutsches Komplott, einen gesamtindischen Aufstand in der britischen Kolonialherrschaft anzuzetteln, scheinbar gegen alle Erwartungen weitgehend erfolgreich gewesen und dürfte sich innerhalb weniger Tage wie ein Lauffeuer in ganz Indien ausbreiten. Die provisorische Regierung Indiens wurde vorerst in Nordindien nahe Afghanistan eingesetzt. Mahendra Pratap übernimmt die Führung der Revolution und stellt den revolutionären Staat auf die Seite der Mittelmächte."
 endsieg_news.143.a:0 "Schlechte Nachrichten für Großbritannien"
 endsieg_news.144.t:0 "Deutsche Verschwörung in Indien vereitelt"
 endsieg_news.144.d:0 "Heute wurde vom britischen Geheimdienst ein deutsches Komplott aufgedeckt, das einen gesamtindischen Aufstand im britischen Raj anzetteln sollte. Es wurde vereitelt. Berichten zufolge verfolgten einige Garnisonen in ganz Indien den Plan jedoch weiter und griffen trotzdem zu den Waffen. Sie wurden jedoch schnell von den Briten niedergeschlagen."
 endsieg_news.144.a:0 "Ein gewagter Versuch"
 endsieg_news.145.t:0 "Huerta kehrt an die Macht zurück"
 endsieg_news.145.d:0 "Heute, angeblich nach Verhandlungen mit dem deutschen Kapitän Franz von Rintelen vom deutschen Marinegeheimdienst und Victoriano Huerta über den Kauf von Waffen und die Landung eines U-Boots zur Unterstützung von Huertas Rückkehr, für die ihm als Verhandlungsmasse versprochen wurde, im Erfolgsfall Krieg gegen die USA zu führen, ist es Huerta allen Widrigkeiten zum Trotz gelungen, den in Newman, New Mexico, auf ihn wartenden US-Streitkräften zu entkommen und die Grenze nach Mexiko zu überqueren, wo er auf die Unterstützung von General Pascual Orozco stieß und erneut die Macht übernahm."
 endsieg_news.145.a:0 "Besorgniserregend"
 endsieg_news.146.t:0 "Huerta gefangen genommen"
 endsieg_news.146.d:0 "Heute, nach Verhandlungen mit dem deutschen Kapitän Franz von Rintelen vom deutschen Marinegeheimdienst und Victoriano Huerta über den Kauf von Waffen und die Landung eines U-Boots zur Unterstützung von Huertas Rückkehr, für die er als Verhandlungsmasse versprach, im Erfolgsfall Krieg gegen die USA zu führen, ist es US-Streitkräften, die die Treffen zwischen den beiden beobachtet hatten, gelungen, Huerta abzufangen, als er versuchte, nach Mexiko zurückzukehren, wo er angeblich von Pascual Orozco und einigen gut bewaffneten mexikanischen Unterstützern erwartet wurde."
 endsieg_news.146.a:0 "OK"
 endsieg_news.147.t:0 "Der Schattenkaiser"
 endsieg_news.147.d:0 "Wilhelm II. spielte in Kriegszeiten in letzter Zeit eine immer schwächer werdende Rolle, da er nun größtenteils nur noch für die Durchführung von Preisverleihungen und Ehrenpflichten zuständig war und ein Großteil der Macht in den Händen der mächtigen Generäle Hindenburg und Ludendorff lag. Infolgedessen wurde das Deutsche Reich de facto in eine Militärdiktatur unter der Kontrolle von Feldmarschall Paul von Hindenburg und General Erich Ludendorff verwandelt. \n\n Der Kaiser wurde zunehmend von der Realität und den politischen Entscheidungsprozessen abgeschnitten und schwankte zwischen Defätismus und großen Siegesträumen. Obwohl Wilhelm II. noch immer die höchste Autorität in politischen Ernennungsfragen hat und für größere Änderungen im Oberkommando seine Zustimmung erforderlich ist, ist er nicht mehr der Mann, der er einmal war."
 endsieg_news.147.a:0 "Die Kriegsmaschinerie hat sich gegen ihren Schöpfer gewendet!"
 endsieg_news.148.t:0 "Deutschland erklärt Portugal den Krieg"
 endsieg_news.148.d:0 "Heute, als Folge früherer portugiesischer Aktionen zu Beginn des Jahres, wie etwa der Einhaltung des De-facto-Bündnisses mit Großbritannien durch die Kaperung deutscher Schiffe, die im Hafen von Lissabon vor Anker lagen, und der früheren Feindseligkeit der beiden Länder gegenüber einander, zwang Portugal mit Hilfe der Entente Deutschland zur Versenkung seiner Konvois. Zu diesem Zeitpunkt könnten sich die beiden Nationen bereits im Krieg befinden, da die Fronten abgesteckt sind und die Portugiesen sich eindeutig auf die Seite der Entente gestellt haben."
 endsieg_news.148.a:0 "Die Linien sind gezogen"
 endsieg_news.149.t:0 "Der Aufstieg von Richtofen"
 endsieg_news.149.d:0 "In Deutschland gibt es einen neuen Fliegerass namens „Der Rote Baron“, auch bekannt als Manfred von Richtofen. Seinen Spitznamen erhielt er aufgrund der ungewöhnlichen roten Lackierung seiner Maschine, die normalerweise nicht verwendet wird, da sie vom Feind leicht entdeckt werden kann. Richtofen sagt jedoch, dies sei Absicht und solle dem Feind Angst einjagen."
 endsieg_news.149.a:0 "Asse kommen und gehen"
 endsieg_news.150.t:0 "Deutschland nimmt den uneingeschränkten U-Boot-Krieg wieder auf!"
 endsieg_news.150.d:0 "Der deutsche Admiral Henning von Holtzendorff hat Berichten zufolge überzeugende Argumente für die Wiederaufnahme des uneingeschränkten U-Boot-Krieges gegen die Entente vorgebracht, von dem er hofft, dass er die Briten erfolgreich aushungern wird. Ohne diesen Krieg hätte Deutschland keine Chance, den Krieg zu gewinnen. Obwohl dies sehr wahrscheinlich den Kriegseintritt Amerikas bedeuten würde, rechnete das deutsche Oberkommando damit, dass die amerikanische Mobilisierung zu langsam wäre, um ihren Sieg an der Westfront zu verhindern."
 endsieg_news.150.a:0 "Interessante Entscheidung"
 endsieg_news.151.t:0 "Deutschland mobilisiert"
 endsieg_news.151.d:0 "Angesichts des drohenden Krieges rief das Deutsche Reich zur allgemeinen Mobilmachung auf und stellte Reservedivisionen im ganzen Land einsatzbereit auf. Die Soldaten scheinen zuversichtlich, dass der Krieg zumindest bis Weihnachten vorbei sein wird."
 endsieg_news.151.a:0 "Oh oh ..."
 endsieg_news.152.t:0 "Sidonio Pais ermordet"
 endsieg_news.152.d:0 "Der heutige portugiesische sogenannte „Präsident-König“ machte sich am Abend des 14. Dezember 1914 auf den Weg zum Bahnhof Lissabon-Rossio, nachdem er zuvor in Begleitung seines Bruders und seines Sohnes im Restaurant Silva zu Abend gegessen und mit dem Zug nach Porto fahren wollte, um sich mit den Militärjuntas des Nordens zu beraten. Als er jedoch gegen 23 Uhr den Bahnhof betrat, wurde er von einem republikanischen Gardisten in Empfang genommen, der den Präsidenten beschützen sollte. Dies konnte die Stimmung jedoch nicht trüben, da eine Band ein bekanntes Lied spielte, als der Präsident den Bahnhof betrat. Im Bahnhof erwartete ihn bereits José Julio da Costa, ein linker Aktivist, der eine Pistole in seinem Umhang versteckte. Als der Präsident vorbeikam, durchbrach Da Costa die doppelte Polizeiabsperrung, die den Präsidenten umgab, und feuerte zwei Schüsse auf Pais ab, der zunächst noch lebte, aber auf dem Weg ins Krankenhaus seinen Verletzungen erlag."
 endsieg_news.152.a:0 "Tragisch"
 endsieg_news.153.t:0 "Revolution in Portugal!"
 endsieg_news.153.d:0 "Das Königreich Portugal war in den letzten Jahren durch den britischen Druck auf die portugiesischen Kolonien, die Ausgaben der königlichen Familie und den Königsmord an König Carlos und dem Thronfolger stark destabilisiert worden. Befürworter der Republik nutzten die Situation aus und riefen am 3. Oktober 1910 die Republik aus. Zweitausend Soldaten und Matrosen rebellierten. Eine provisorische Regierung unter Teofilo Braga stürzte die konstitutionelle Monarchie und forderte die Verbannung Manuels II. aus Portugal."
 endsieg_news.153.a:0 "Eine interessante Wendung der Ereignisse"
 endsieg_news.154.t:0 "Der portugiesische Bürgerkrieg beginnt"
 endsieg_news.154.d:0 "Da Manuel II. seine Macht nicht aufgeben wollte, zog er sich mit seinen Anhängern in den Norden nach Porto zurück, wo der Großteil der portugiesischen Monarchisten lebt."
 endsieg_news.154.a:0 "Interessant"
 endsieg_news.155.t:0 "Monarchisten gewinnen den portugiesischen Bürgerkrieg!"
 endsieg_news.155.d:0 "In Portugal scheint die monarchistische Fraktion am Ende über die republikanischen Kräfte gesiegt zu haben. König Manuel II. hat wieder die Kontrolle über das gesamte Land übernommen und wird voraussichtlich strenge Maßnahmen gegen jeden ergreifen, der verdächtigt wird, ihn erneut zu unterwerfen."
 endsieg_news.155.a:0 "Interessant"
 endsieg_news.156.t:0 "Portugals neuer Diktator"
 endsieg_news.156.d:0 "Angesichts der politischen Instabilität in Portugal, die offen gegensätzliche Feindseligkeit vieler Parteien und die weitgehend unkontrollierbare Nationalversammlung hat Präsident Manuel de Arriaga die Nationalversammlung einseitig aufgelöst, um den Einfluss der Republikanischen Partei Portugals zu verringern. In der Folge setzte er Joaquim Pimenta de Castro als Regierungschef ein. \n\n Pimenta de Castro ernannte umgehend mehrere Militärs in verschiedene Ministerien, löste die Nationalversammlung auf und führt die Regierung nun als Diktator."
 endsieg_news.156.a:0 "nun ja"
 endsieg_news.157.t:0 "Putsch in Portugal"
 endsieg_news.157.d:0 "Am heutigen 14. Mai begann in Lissabon ein politisch-militärischer Aufstand mit dem Ziel, die Diktatur von General Pimenta de Castro zu stürzen und die Regierung zu den Grundsätzen der Verfassung von 1911 zurückzuführen. \n\n Am Morgen des 14. Mai besetzte eine Gruppe von Revolutionären, darunter Marinesoldaten und reguläre Soldaten, das Marinearsenal in Lissabon und erbeutete sofort Waffen. Pimenta de Castros Truppen versuchten, das Marinearsenal einzukesseln, wurden jedoch von republikanischen Schiffen, darunter der NRP Vasco da Gama, bombardiert. Obwohl Pimenta de Castros Regierung entkommen konnte, ergab sie sich schließlich aufgrund der unverhältnismäßig großen Zahl an bewaffneten Kräften, die ihr gegenüberstanden. Einigen Quellen zufolge wurden 200 Menschen getötet und 1000 verletzt."
 endsieg_news.157.a:0 "Da geht noch ein Diktator"
 endsieg_news.158.t:0 "Portugals neuer starker Mann"
 endsieg_news.158.d:0 "Heute, am 5. Dezember 1917, führte Portugals Teilnahme am Ersten Weltkrieg zu einer politischen, wirtschaftlichen und sozialen Umwälzung des Landes. Sidonio Pais führte einen triumphalen Militäraufstand an, der zur Bildung einer Militärjunta führte. Das Parlament wurde aufgelöst, die Regierung von Afonso Costa gestürzt und Präsident Bernardino Machado abgesetzt. Pais schlug die Gründung einer „Neuen Republik“ vor und setzte die Verfassung von 1911 außer Kraft. Er wurde in direkter Wahl zum Präsidenten der Republik gewählt, wodurch ein Berufssenat geschaffen wurde."
 endsieg_news.158.a:0 "Er klingt gar nicht so schlecht"
 endsieg_news.159.t:0 "Italien schließt sich den Mittelmächten an"
 endsieg_news.159.d:0 "Heute hat sich das Königreich Italien offiziell den Mittelmächten angeschlossen und der Entente den Krieg erklärt."
 endsieg_news.159.a:0 "Das wären schlechte Nachrichten für die Entente"
 endsieg_news.160.t:0 "Krönung Karls I."
 endsieg_news.160.d:0 "Nach dem Tod von Franz Josef, der Österreich-Ungarn fast sieben Jahrzehnte lang regierte, legte der mutmaßliche Thronfolger Karl heute an der Dreifaltigkeitssäule vor der Matthiaskirche seinen Krönungseid ab. In seinem kroatischen Krönungseid soll er die Vereinigung des Dreieinigen Königreichs Kroatien, Dalmatien und Slawonien mit Rijeka anerkannt und die Schaffung einer dritten kroatischen politischen Einheit befürwortet haben. Dies hat die Ungarn jedoch etwas verärgert, da sie die Macht nicht mit anderen teilen wollen."
 endsieg_news.160.a:0 "Vielleicht kann er eine echte Veränderung im System bewirken"
 endsieg_news.161.t:0 "Franz Joseph tot!"
 endsieg_news.161.d:0 "Der österreichische Kaiser verstarb heute Abend im Schloss Schönbrunn. Er erkrankte mehrere Tage nach einer Erkältung bei einem Spaziergang im Schönbrunner Park mit dem bayerischen König an einer Lungenentzündung in der rechten Lunge. Sein Nachfolger wird sein Großneffe Karl I. sein. Es ist jedoch fraglich, wie das Kaiserreich nach dem Verlust einer so bedeutenden Persönlichkeit, die knapp sieben Jahrzehnte lang regierte, bestehen bleiben soll."
 endsieg_news.161.a:0 "Sicherlich ein großer Erfolg für das Imperium"
 endsieg_news.162.t:0 "Ermordung von Franz Ferdinand!"
 endsieg_news.162.d:0 "Am 28. Juni 1914 wurden Erzherzog Franz Ferdinand von Österreich, Thronfolger Österreich-Ungarns, und seine Frau in Sarajevo von einem Terroristen namens Gavrilo Princip erschossen. Obwohl die ultrakonservative österreichische Regierung den liberalen Franz Ferdinand nicht übermäßig betrauert, nutzen Kaiser Franz Josef und die österreichische Militärführung seinen Tod angeblich als Vorwand, um einen Krieg gegen Serbien zu fordern."
 endsieg_news.162.a:0 "Tragisch"
 endsieg_news.163.t:0 "Österreich stellt Serbien ein Ultimatum"
 endsieg_news.163.d:0 "Österreich hat dem Königreich Serbien ein Ultimatum gestellt und den serbischen Staat aufgefordert, die gegen Serbien gerichtete „gefährliche Propaganda“ offiziell und öffentlich zu verurteilen. Ihr letztendliches Ziel soll die „Abspaltung der ihr gehörenden Gebiete von der Monarchie“ sein. Belgrad solle diese kriminelle und terroristische Propaganda mit allen Mitteln unterdrücken. Sollte Serbien die Kriegsbedingungen nicht akzeptieren, ist die Reaktion Österreichs ungewiss, aber wahrscheinlich nicht allzu freundlich."
 endsieg_news.163.a:0 "So schlimm kann es nicht sein"
 endsieg_news.164.t:0 "Serbien lehnt österreichisches Ultimatum ab"
 endsieg_news.164.d:0 "Der serbische Premierminister Nicola Pasic hat offenbar die Mobilisierung der serbischen Armee angeordnet und gleichzeitig die serbische Antwort auf das Ultimatum kurz vor Ablauf der Frist um 18 Uhr in der österreichischen Botschaft in Gieslingen übergeben. Serbien akzeptierte damit alle Bedingungen des Ultimatums, mit der Ausnahme, dass es die Teilnahme Österreich-Ungarns an internen Untersuchungen nicht akzeptieren würde, da dies einen Verstoß gegen die Verfassung und das Strafprozessrecht darstellen würde. Diese Antwort fand bei Pasic und seinem Land sowie bei vielen internationalen Beobachtern Anklang, änderte jedoch kaum etwas an Österreich, da die Doppelmonarchie die diplomatischen Beziehungen zu Serbien abbrach."
 endsieg_news.164.a:0 "Oh oh ..."
 endsieg_news.165.t:0 "Österreich entscheidet sich für den Krieg!"
 endsieg_news.165.d:0 "Nachdem sich Franz Josef weigerte, alle Bedingungen des an Serbien gerichteten Ultimatums zu akzeptieren, veröffentlichte er am 28. Juli 1914 in Bad Ischl das Manifest „An mein Volker“. Der Text war eine typische Schlagzeile für Kriegsmanifeste, die nach der Kriegserklärung des Kaiserreichs an Serbien gedruckt wurden. Das Dokument wurde im ganzen Kaiserreich verteilt und von zahlreichen Medien veröffentlicht. Der Text stellte die Aggressivität Serbiens als Kriegsgrund dar und behauptete, das Kaiserreich habe alles versucht, um den Konflikt zu vermeiden."
 endsieg_news.165.a:0 "Hoffen wir einfach, dass es ein lokaler Konflikt bleibt"
 endsieg_news.166.t:0 "Waffenstillstand der Villa Giusti unterzeichnet"
 endsieg_news.166.d:0 "Heute sind die österreichischen Truppen besiegt und haben praktisch ihre Kampfkraft verloren, was in den letzten Wochen zu einem chaotischen Rückzug geführt hat. Darüber hinaus hat die Nation selbst mit der Unabhängigkeitserklärung mehrerer Staaten, darunter Ungarn, das die Hälfte unseres Namens ausmacht, in vielerlei Hinsicht aufgehört zu existieren. Aufgrund der Schwäche der Armee waren die Kommandeure gezwungen, einen Waffenstillstand anzustreben und unterzeichneten den Waffenstillstand von Villa Giusti, der außerhalb von Padua in Venetien unterzeichnet wurde und heute in Kraft tritt. Das Königreich Italien hat bereits Südtirol, Triest und das österreichische Küstenland annektiert."
 endsieg_news.166.a:0 "Da geht ein weiteres Imperium"
 endsieg_news.167.t:0 "Ausrufung der Banater Republik"
 endsieg_news.167.d:0 "Im Banat haben führende Mitglieder der Sozialdemokratischen Partei heute beschlossen, die Unabhängigkeit auszurufen und eine Republik unter Führung des sozialdemokratischen Parteichefs Otto Roth zu gründen. Die Rumänen, die aus mehreren großen Ethnien bestehen, streben Berichten zufolge keine Autonomie, sondern eine Vereinigung mit dem Königreich Rumänien an."
 endsieg_news.167.a:0 "Was für ein seltsamer Zustand"
 endsieg_news.168.t:0 "Die Tschechoslowakei erklärt ihre Unabhängigkeit!"
 endsieg_news.168.d:0 "Als die österreichisch-ungarische Monarchie langsam zerfiel, forderte Außenminister Baron Istvan Bruain von Rajecz einen Waffenstillstand auf Grundlage der Vierzehn Punkte, in denen Woodrow Wilson den Nationalitäten des Reiches „die freieste Möglichkeit zur autonomen Entwicklung“ einräumte. Zwei Tage später erließ Kaiser Karl I. eine Proklamation, die die Struktur der Monarchie drastisch veränderte und das Reich in eine föderale Union verwandelte. Am selben Tag schloss sich die provisorische tschechoslowakische Regierung den Verbündeten an und begann am 13. Oktober mit der Ausarbeitung einer Unabhängigkeitserklärung, die am 16. Oktober fertiggestellt und schließlich am 18. Oktober in Paris öffentlich veröffentlicht wurde, als die tschechoslowakische Unabhängigkeit erklärt wurde."
 endsieg_news.168.a:0 "Ist das das Ende Österreichs?"
 endsieg_news.169.t:0 "Die Westukraine erklärt ihre Unabhängigkeit"
 endsieg_news.169.d:0 "Heute wurde die Westukrainische Volksrepublik ausgerufen, wobei die Polen mit der Ausrufung des Polnischen Liquidationskomitees überrascht wurden, das bereit war, von Krakau nach Lwiw zu ziehen. Bei den polnischen Bürgern in Lwiw, die nicht Teil dieser ukrainischen Nation sein wollen, ist ein tiefer Unmut entstanden."
 endsieg_news.169.a:0 "Noch einer?"
 endsieg_news.170.t:0 "Martin-Erklärung verkündet"
 endsieg_news.170.d:0 "Die Martin-Erklärung wurde im slowakischen Martin etwa zehn Tage nach der tschechischen Unabhängigkeitserklärung als Unabhängigkeitserklärung von der Habsburgermonarchie verkündet. Obwohl es Forderungen nach einer vollständigen Unabhängigkeit der Slowakei, auch von der Tschechischen Republik, gab, wurden die separatistischen Bestrebungen der Slowaken weitgehend auf Eis gelegt, da die Tschechen den Bedingungen einer slowakischen Unabhängigkeit nicht zustimmen wollten. \n\n Das slowakische Volk irrte sich jedoch, denn es würde in diesem Staat keine gleichberechtigten Partner sein. Und als Edvard Beneš, der Außenminister der provisorischen tschechischen Regierung, erklärte, es würde sich um einen föderalen Staat nach schweizerischem Vorbild handeln, wurden die Slowaken schnell zu einer nationalen Minderheit degradiert."
 endsieg_news.170.a:0 "Interessant"
 endsieg_news.171.t:0 "Aster Revolution"
 endsieg_news.171.d:0 "Angeführt vom Sozialdemokraten Graf Mihály Károly, dem Gründer des Sozialdemokratischen Ungarischen Nationalrats (HNC), forderte Károlyi heute mit Unterstützung von Soldaten der ungarischen Armee die Abspaltung Ungarns vom Habsburgerreich. HNC-Demonstranten trugen Astern und halfen bei der Besetzung öffentlicher Gebäude in ganz Budapest. Premierminister Sandor Wekerle trat zurück, und der ehemalige Premierminister István Tisza wurde ermordet."
 endsieg_news.171.a:0 "Wenn das nicht schon das Ende von Österreich-Ungarn wäre …"
 endsieg_news.172.t:0 "Jugoslawien marschiert in die Banater Republik ein"
 endsieg_news.172.d:0 "Da die Banater Republik einen beträchtlichen Anteil an Serben und Rumänen hat, beschloss das Königreich Jugoslawien, in die kurzlebige Republik einzumarschieren, in der Hoffnung, sie mit den Rumänen aufzuteilen."
 endsieg_news.172.a:0 "Oh, diese hilflosen Banatianer"
 endsieg_news.173.t:0 "Teilung des Banats"
 endsieg_news.173.d:0 "Nach der Eroberung der Banater Republik durch jugoslawische Streitkräfte wurde das Land entlang ethnischer Grenzen zwischen Ost- und Westbanat zwischen Jugoslawien und Rumänien aufgeteilt."
 endsieg_news.173.a:0 "In Ordnung"
 endsieg_news.174.t:0 "Britische Neutralität"
 endsieg_news.174.d:0 "Obwohl sich die Briten stark auf die Seite der Entente gestellt haben, haben sie in diesem Konflikt vorerst ihre Neutralität erklärt. Das bedeutet zwar nicht, dass sie während des gesamten Krieges neutral bleiben werden, aber sie werden den Verlauf des Krieges vorerst aufmerksam beobachten und möglicherweise später eingreifen."
 endsieg_news.174.a:0 "Falls später noch etwas übrig bleibt..."
 endsieg_news.175.t:0 "Großbritannien unterstützt Frankreich!"
 endsieg_news.175.d:0 "Da die Deutschen die Neutralität Belgiens verletzten und gegen jegliche britischen Interessen verstießen, unternahm das Vereinigte Königreich die notwendigen Schritte, um sich der Entente im Krieg gegen die Deutschen anzuschließen."
 endsieg_news.175.a:0 "Eine große Eskalation"
 endsieg_news.176.t:0 "Nordseeblockade"
 endsieg_news.176.d:0 "Um die maritime Versorgung der Mittelmächte mit Gütern einzuschränken, blockierten die Briten sämtliche Konvois nach Deutschland oder zu anderen Mittelmächten. Das Deutsche Reich ist stark auf Importe angewiesen, um seine Bevölkerung zu ernähren und seine Rüstungsindustrie zu versorgen. Dies dürfte die innere Stabilität und Kriegsführung ernsthaft beeinträchtigen."
 endsieg_news.176.a:0 "Schlechte Nachrichten für Deutschland"
 endsieg_news.177.t:0 "Portugal tritt der Entente bei"
 endsieg_news.177.d:0 "Da es zwischen den Portugiesen und Deutschland aufgrund der Entscheidung Deutschlands, einen uneingeschränkten U-Boot-Krieg zu führen, der zum Untergang zahlreicher portugiesischer Schiffe führte, zu erheblichen Spannungen kam, haben sich die Portugiesen letztlich für einen Beitritt zur Entente entschieden."
 endsieg_news.177.a:0 "Es musste so oder so passieren"
 endsieg_news.178.t:0 "Bulgarien tritt der Entente bei"
 endsieg_news.178.d:0 "Die Bulgaren haben das Angebot des Vereinigten Königreichs angenommen, ihnen im Gegenzug für ihre Teilnahme am Kampf gegen die Mittelmächte Gebietsgewinne zu gewähren. Obwohl dies nicht so viel ist, wie die Mittelmächte wahrscheinlich angeboten hatten, scheinen die Briten sie letztlich doch von ihrem endgültigen Sieg überzeugt zu haben."
 endsieg_news.178.a:0 "Auf jeden Fall bedeutsam"
 endsieg_news.179.t:0 "Die Vereinigten Staaten erklären Deutschland den Krieg!"
 endsieg_news.179.d:0 "Viel zu lange haben die Amerikaner angesichts der deutschen Aggression gegen ihr Land untätig zugesehen, doch nun ist mit der Wiederaufnahme des uneingeschränkten U-Boot-Krieges und dem Zimmermann-Telegramm der Tropfen gekommen, der das Fass zum Überlaufen bringt. Das amerikanische Volk wollte zu Beginn dieses Krieges Neutralität, doch durch die jüngsten Aktionen wurde es selbst in diesen Krieg gezwungen."
 endsieg_news.179.a:0 "Sie wollen vielleicht keinen Krieg, aber der Krieg will Sie"
 endsieg_news.180.t:0 "Der arabische Aufstand"
 endsieg_news.180.d:0 "Hussein bin Ali, der Sharif von Mekka, hat den Arabischen Aufstand mit dem Ziel initiiert, die Unabhängigkeit von den herrschenden Osmanen zu erreichen und einen einheitlichen arabischen Staat zu schaffen. Der Sharif behauptet, die Jungtürken hätten die heiligen Grundsätze des Islam verletzt und rief die arabischen Muslime zum heiligen Aufstand gegen die angeblich „gottlose“ osmanische Regierung auf."
 endsieg_news.180.a:0 "Wahrscheinlich das Werk der Briten"
 endsieg_news.181.t:0 "Die Invasion von Gallipoli beginnt!"
 endsieg_news.181.d:0 "Großbritannien hat heute einen Angriff auf die türkischen Truppen durchgeführt und diese an der Küste der Halbinsel Gallipoli gelandet. Die Truppen landeten jedoch im falschen Gebiet und sind dadurch strategisch etwas geschwächt. Innerhalb von zwei Monaten dürften weitere Verstärkungen eintreffen. Wenn Großbritannien die Invasion nutzen kann, solange es noch möglich ist, und die Macht hat, die Türken aus Konstantinopel zu vertreiben, wäre dies ein schwerer Schlag für die Mittelmächte."
 endsieg_news.181.a:0 "Eine interessante Wendung der Ereignisse"
 endsieg_news.182.t:0 "Beginn der Landungen der Entente in Pommern"
 endsieg_news.182.d:0 "Britische Schiffe sind vor der Küste Pommerns eingetroffen und die Landungen haben begonnen, ohne dass die deutsche Kaiserliche Marine etwas dagegen unternehmen kann. Wenn die Briten dies ausnutzen wollen, müssen sie Deutschland einen endgültigen K.O.-Schlag versetzen, indem sie Berlin angreifen und das Land, jetzt, wo es so nah ist, zur Kapitulation zwingen."
 endsieg_news.182.a:0 "„Riesige Invasionstruppe“ ist eine Untertreibung …"
 endsieg_news.183.t:0 "Südafrika erlangt Unabhängigkeit"
 endsieg_news.183.d:0 "Acht Jahre nach dem Ende des Zweiten Burenkriegs und nach vierjährigen Verhandlungen gewährte das britische Parlament 1909 mit einem Gesetz die nominelle Unabhängigkeit und gründete schließlich die Südafrikanischen Union, die heute die ehemaligen Gebiete der Kapstadt, der Natal-Kolonien, Transvaals und des Oranje-Freistaats umfasst."
 endsieg_news.183.a:0 "In Ordnung"
 endsieg_news.184.t:0 "Edward VII. tot!"
 endsieg_news.184.d:0 "Der britische König Edward VII. ist heute leider verstorben. Sein Sohn Georg V. folgte ihm als König des Vereinigten Königreichs nach. Die Beerdigung des Königs war die größte Zusammenkunft von Königen und Würdenträgern, die je an einem Ort versammelt war."
 endsieg_news.184.a:0 "Ein bedauerlicher Verlust"
 endsieg_news.185.t:0 "Kitchener und Mitarbeiter ertrinken!"
 endsieg_news.185.d:0 "Lord Kitchener und sein Stab sind heute leider ertrunken, nachdem sie an Bord der HMS Hampshire zu einer diplomatischen Mission nach Russland gegangen waren. Kurz vor 19:30 Uhr desselben Tages lief die HMS Hampshire auf dem Weg zum russischen Hafen Archangelsk auf eine Mine eines deutschen U-Bootes und sank vor der Westküste der Orkney-Inseln. Von den 749 Menschen an Bord haben nur zwölf überlebt. Die Nachricht von Kitcheners Tod ist für die Bevölkerung des Commonwealth ein Schock. Viele glaubten fest daran, dass Großbritanniens Sieg sicher sei, wenn Kitchener überlebte. Doch nun gibt es in diesen dunklen Zeiten nicht den geringsten Hoffnungsschimmer. Man wird um ihn trauern."
 endsieg_news.185.a:0 "Ein großer Verlust für das Britische Empire"
 endsieg_news.186.t:0 "Osteraufstand"
 endsieg_news.186.d:0 "In der Osterwoche hat in Irland ein bewaffneter Aufstand begonnen! Berichten zufolge wurde der Aufstand von irischen Republiken ins Leben gerufen, die „die britische Herrschaft in Irland beenden und eine unabhängige irische Republik gründen“ wollen. Sie haben die britische Regierung angegriffen, während sie selbst andernorts mit dem deutschen Imperialismus beschäftigt sind. Dies ist wohl der bedeutendste Aufstand in Irland der letzten hundert Jahre, und er muss bekämpft werden, bevor er außer Kontrolle gerät!"
 endsieg_news.186.a:0 "Eine interessante Wendung der Ereignisse"
 endsieg_news.187.t:0 "Italien tritt der Entente bei"
 endsieg_news.187.d:0 "Heute hat das Königreich Italien seinen Beitritt zur Entente bekannt gegeben und den Mittelmächten den Krieg erklärt. Angesichts der enormen Gebietsansprüche Italiens gegenüber Österreich kam diese Entwicklung nicht unerwartet."
 endsieg_news.187.a:0 "Schlechte Nachrichten für Österreich"
 endsieg_news.188.t:0 "Zweiter Balkankrieg"
 endsieg_news.188.d:0 "Während des Ersten Balkankrieges gelang es Bulgarien zusammen mit der Balkanliga, das Osmanische Reich aus den meisten seiner europäischen Besitzungen zu vertreiben. Durch die Schaffung eines unabhängigen Albaniens, das eigentlich an Serbien fallen sollte, wurden Bulgarien jedoch die Beute in Mazedonien verweigert, die ihm durch ein geheimes Abkommen zwischen Bulgarien und Serbien versprochen worden war. Stattdessen beanspruchte Serbien unsere Ansprüche. Bulgarien sieht es nun als seine Pflicht an, für das zu kämpfen, was ihm gehört."
 endsieg_news.188.a:0 "Ein weiterer Krieg auf dem Balkan?"
 endsieg_news.189.t:0 "Blockade Griechenlands"
 endsieg_news.189.d:0 "Um Griechenland zu zwingen, sich ihrem Krieg gegen die Mittelmächte anzuschließen, hat die Französische Republik eine Blockade gegen Griechenland begonnen, um König Konstantin I. zum Rücktritt zugunsten seines Sohnes Alexander I. zu zwingen, der entweder für die Entente ist oder sich unterwirft."
 endsieg_news.189.a:0 "Sprechen Sie über Gruppenzwang"
 endsieg_news.190.t:0 "Schlachtschiff Liberté explodiert"
 endsieg_news.190.d:0 "Auf dem französischen Schlachtschiff Liberté, einem Vor-Dreadnought-Schlachtschiff, kam es heute, am 25. September 1911, zu einer Explosion in einem seiner vorderen Munitionsmagazine für die Sekundärgeschütze, die das Schiff zerstörte. Die Explosion der Sekundärmagazine breitete sich aus und führte später zur Explosion der Hauptmagazine, wodurch ein 37 Tonnen schweres Stück Panzerplatte auf das Schlachtschiff Republique zuschlug und erheblichen Schaden anrichtete."
 endsieg_news.190.a:0 "Schrecklicher Unfall"
 endsieg_news.191.t:0 "Rumänien tritt der Entente bei"
 endsieg_news.191.d:0 "Das Königreich Rumänien hat dem Vorschlag der Entente zugestimmt, ihm die Bukowina und ganz Siebenbürgen anzubieten, falls es der Entente beitritt und den Mittelmächten den Krieg erklärt. Ein weiterer wichtiger Faktor ist natürlich die Tatsache, dass die Front an der Ostfront stabilisiert wurde."
 endsieg_news.191.a:0 "Werden sie wirklich einen Unterschied machen?"
 endsieg_news.192.t:0 "Jean Jaures ermordet!"
 endsieg_news.192.d:0 "Jean Jaurès, ein französischer Sozialistenführer, wurde am 31. Juli 1914 von einem Fanatiker ermordet. Nachdem er im Café du Croissant zu Abend gegessen hatte, stürmte Raoul Villain, ein 29-jähriger junger französischer Nationalist, durch das Fenster des Restaurants und feuerte zwei Schüsse in Jaurès Rücken ab. Die Ermordung eines der charismatischsten und überzeugendsten Redner Frankreichs löste in den Straßen von Paris Schockwellen aus."
 endsieg_news.192.a:0 "Ein unglücklicher Tod"
 endsieg_news.193.t:0 "Paris von Zeppelinen bombardiert"
 endsieg_news.193.d:0 "Am 29. Januar 1916 fiel Paris zum ersten Mal einem deutschen Luftangriff zum Opfer. Eine Gruppe Zeppeline bombardierte die Stadt. Die französische Luftwaffe konnte den Vorfall zwar nicht verhindern, versicherte der Bevölkerung jedoch, dass dies das letzte Mal sein werde, dass so etwas passiert."
 endsieg_news.193.a:0 "Erschreckend"
 endsieg_news.194.t:0 "Der italienisch-türkische Krieg beginnt"
 endsieg_news.194.d:0 "Die italienischen Ansprüche auf Libyen gehen auf die Niederlage der Osmanen im Russisch-Türkischen Krieg (1877) zurück. Nun möchte das Königreich Italien diese Träume verwirklichen und sich das Land nehmen, das ihm angeblich gehört. Es behauptet, die Türken würden das Land nicht nutzen und es wäre besser in ihren Händen, wenn sie nichts anderes tun könnten als das, was sie dort tun könnten."
 endsieg_news.194.a:0 "Der kranke Mann Europas ist dem Untergang geweiht"
 endsieg_news.195.t:0 "Vertrag von Ouchy unterzeichnet"
 endsieg_news.195.d:0 "Nach der Niederlage der osmanischen Türken beschlossen italienische Diplomaten, die Situation für einen günstigen Friedensschluss auszunutzen und unterzeichneten in Ouchy bei Lausanne einen Vertrag. Die wichtigsten Bestimmungen des Vertrags sehen vor, dass die Osmanen sämtliches Militärpersonal aus Libyen abziehen. Im Gegenzug geben die Italiener Rhodos und andere Ägäisinseln zurück, die sie von den Türken gehalten hatten."
 endsieg_news.195.a:0 "In Ordnung"
 endsieg_news.196.t:0 "Italien ehrt Dreibund"
 endsieg_news.196.d:0 "Da sich Europa nun im Krieg mit den Mittelmächten befindet, hat sich das scheinbar halbwegs skeptische Königreich Italien letztlich dazu entschlossen, den Dreibund anzuerkennen, anstatt neutral zu bleiben."
 endsieg_news.196.a:0 "Interessant"
 endsieg_news.197.t:0 "Japan stellt Deutschland ein Ultimatum"
 endsieg_news.197.d:0 "In Erfüllung ihres Bündnisabkommens mit Großbritannien aus dem Jahr 1902 stellten die Japaner dem Deutschen Reich ein Ultimatum und forderten die Herausgabe aller ihrer pazifischen Kolonien mit Ausnahme der Salomonen, des Bismarck-Archipels und Deutsch-Neuguineas. Dieser Krieg bietet Japan eine großartige Gelegenheit, seine eigenen Interessen im Fernen Osten zu verfolgen!"
 endsieg_news.197.a:0 "Schlechte Nachrichten für Deutschland"
 endsieg_news.198.t:0 "Deutschland stimmt Ultimatum zu"
 endsieg_news.198.d:0 "Das Deutsche Reich hat das japanische Ultimatum akzeptiert und sich bereit erklärt, die im Ultimatum geforderten Gebiete unverzüglich abzutreten."
 endsieg_news.198.a:0 "Ein kluger Schachzug"
 endsieg_news.199.t:0 "Deutschland weigert sich, Ultimatum zu akzeptieren"
 endsieg_news.199.d:0 "Das Deutsche Reich hat auf das japanische Ultimatum nicht reagiert, was von seiner Regierung als völlige Ablehnung aufgefasst wurde. Deshalb sagt es, es werde die Sache selbst in die Hand nehmen und diese Gebiete trotzdem einnehmen!"
 endsieg_news.199.a:0 "Und so breitet sich der Krieg nach Osten aus"
 endsieg_news.200.t:0 "Emilio Zapata getötet"
 endsieg_news.200.d:0 "Am 10. April 1919 lud Guajardo Zapata zu einem Treffen ein und deutete an, dass er beabsichtige, zu den Revolutionären überzulaufen. Als Zapata jedoch eintraf, wurde er von Guajardos Männern mit Kugeln durchsiebt und niedergeschossen."
 endsieg_news.200.a:0 "Er starb, wie er lebte"
 endsieg_news.201.t:0 "Porfirio Diaz begrüßte den Sieger in Mexiko"
 endsieg_news.201.d:0 "Der langjährige mexikanische Präsident Porfirio Diaz gilt als „Wahlsieger“. Es bleibt jedoch umstritten, ob die Wahlen manipuliert wurden, da Maderos Wahlkampfteam auf heftigen Widerstand des Diaz-Regimes stieß. Kurz vor den Wahlen wurde er wegen Anstiftung zum Aufstand verhaftet, und viele berichten von Wahlbetrug."
 endsieg_news.201.a:0 "Verdächtig..."
 endsieg_news.202.t:0 "Die Maderista-Revolution beginnt"
 endsieg_news.202.d:0 "Madero, der in den USA Zuflucht gesucht hat, überquerte kürzlich mit seinen Anhängern den Rio Grande und veröffentlichte ein Manifest, in dem er die mexikanischen Wahlen von 1910 aufgrund von Wahlbetrugsvorwürfen für null und nichtig erklärte. Er behauptete, das Amt des Präsidenten und Vizepräsidenten Mexikos sei vakant und ernenne sich selbst zum provisorischen Präsidenten Mexikos."
 endsieg_news.202.a:0 "Köpfe werden rollen"
 endsieg_news.203.t:0 "Diaz gibt die Macht ab"
 endsieg_news.203.d:0 "Porfirio Diaz, ermutigt von seinem Berater José Yves Limantour, hat nach bedeutenden Siegen auf Seiten der Maderisten eine kluge Entscheidung getroffen und von der Macht zurückgetreten. Alle Kämpfe wurden eingestellt, und Diaz soll aus Mexiko verbannt werden. Maderos vage versprochene Sozialreformen wurden jedoch nie umgesetzt, sodass die Opposition in Mexiko weiterhin groß ist."
 endsieg_news.203.a:0 "Endlich Frieden"
 endsieg_news.204.t:0 "Die zehn tragischen Tage"
 endsieg_news.204.d:0 "In der Nacht des 8. Februar 1913 wurde Felix Diaz nach einer kurzen Unterredung freigelassen, die mit dem Tod des Kommandanten des zivilen Gefängnisses endete, als dieser sich in das städtische Arsenal zurückzog, wo er die Kontrolle über das Waffenlager übernahm. \n\n Madero war absolut davon überzeugt, dass dieser Aufstand ebenso wie die vorherigen niedergeschlagen werden würde. Während die Kämpfe in der Hauptstadt mehrere Tage andauerten, verbündete sich General Victoriano Huerta schließlich mit Felix Diaz, verriet Madero, verhaftete und ermordete seinen Bruder und bot Madero Schutz vor den Streitkräften von Diaz/Reyez an, wurde jedoch von Huerta verraten und verhaftet, kurz darauf zum Rücktritt gezwungen und anschließend ermordet."
 endsieg_news.204.a:0 "Was für eine Tragödie ..."
 endsieg_news.205.t:0 "Verfassungsrechtler erheben sich"
 endsieg_news.205.d:0 "Nach dem Aufstieg von Victoriano Huerta, der Mexiko eine brutale Militärdiktatur aufzwang, begannen die Streitkräfte von Venustiano Carranza einen Aufstand gegen Huerta, um ihn aus dem Amt zu drängen und die Demokratie in Mexiko wiederherzustellen."
 endsieg_news.205.a:0 "Interessant"
 endsieg_news.206.t:0 "Fall von Huerta"
 endsieg_news.206.d:0 "Nach enormem internen und externen Druck und wiederholten Niederlagen vor Ort gegen die Villista-Constitutionalista-Zapatista-Allianz hat Victoriano Huerta heute entschieden, widerwillig von seinem Amt als „Präsident“ zurückzutreten."
 endsieg_news.206.a:0 "Eine neue Ära des Friedens in Mexiko"
 endsieg_news.207.t:0 "Überfall auf das Schwarze Meer"
 endsieg_news.207.d:0 "In der Türkei hatte Enver Pascha Admiral Souchon zuvor zu einem Manöver im Schwarzen Meer aufgefordert, um die russische Flotte anzugreifen, sollte sich „eine passende Gelegenheit bieten“. Dieser Befehl wurde nicht über die normale Befehlskette weitergegeben. Souchon handelte heute, indem er sein bevorzugtes Kriegsschiff, die Goeben, die inzwischen unter türkischer Flagge fährt, und mehrere Zerstörer einsetzte, die das Feuer auf die Küstenbatterien von Sewatopol eröffneten und später mehrere kleine russische Schiffe versenkten. Infolge dieser Aktion erklärte das Russische Reich der Türkei den Krieg, und zwischen der Türkei und der Entente herrscht nun Kriegszustand."
 endsieg_news.207.a:0 "Wenn nur diese beiden Schiffe abgefangen würden"
 endsieg_news.208.t:0 "Die Türkei erklärt den Dschihad"
 endsieg_news.208.d:0 "Sultan Mehmed V. hat heute offiziell den Dschihad ausgerufen und sagte: „Oh Muslime. Wisst, dass unser Reich sich im Krieg mit den Todfeinden des Islam befindet: den Regierungen Moskaus, Großbritanniens und Frankreichs. Der Befehlshaber der Gläubigen ruft euch zum Dschihad auf.“"
 endsieg_news.208.a:0 "Der Kampf geht weiter"
 endsieg_news.209.t:0 "Deutsche Militärmission in der Türkei"
 endsieg_news.209.d:0 "Wir hören von der deutschen Militärmission in der Türkei, was nicht überraschend ist, wenn man bedenkt, dass die militärischen Beziehungen zwischen beiden Ländern fast 30 Jahre alt sind und die deutsche Militärmission sich als äußerst hilfreich für die Modernisierung der Armee erwiesen hat. Die Deutschen haben den Türken viel beigebracht und ihrer Armee einige Reformen aufgezwungen, um ihre Effizienz zu steigern."
 endsieg_news.209.a:0 "Die Türken entfernen sich immer mehr von Großbritannien"
 endsieg_news.210.t:0 "Überfall auf die Hohe Pforte"
 endsieg_news.210.d:0 "Heute wurde ein Staatsstreich von Mitgliedern des Komitees für Einheit und Fortschritt (Jungtürken) unter Führung von Enver Pascha und Tallat Pascha durchgeführt. Sie stürmten überraschend das zentrale osmanische Regierungsgebäude, die Hohe Pforte. Während des Putsches wurde der Marineminister Nazim Pascha ermordet und der Großwesir Kamil Pascha zum Rücktritt gezwungen. Mit dem Sturz der alten Regierung fiel die neue Regierung in die Hände der Jungtürken, die nun unter der Führung des Triumvirats der „Drei Paschas“, bestehend aus Enver, Tallat und Djemal Pascha, stehen."
 endsieg_news.210.a:0 "Interessant..."
 endsieg_news.211.t:0 "Albanischer Aufstand von 1912"
 endsieg_news.211.d:0 "Heute wurde über einen weiteren albanischen Aufstand in einer Reihe zahlreicher Aufstände in den letzten Jahren berichtet. Dieses Mal offenbar aufgrund von Änderungen für die Albaner, die von den Jungtürken eingeführt wurden. Diese umfassen Steuererhöhungen, die Wehrpflicht für Albaner und die Entwaffnung der albanischen Zivilbevölkerung."
 endsieg_news.211.a:0 "Oh, diese dummen Albaner"
 endsieg_news.212.t:0 "Albanischer Aufstand von 1911"
 endsieg_news.212.d:0 "In Albanien kam es dieses Jahr zu einem weiteren Aufstand, der heute, am 24. März 1911, begann. Es wird gesagt, dass das Königreich Montenegro den Aufstand unterstützt hat, indem es das Hauptquartier der Rebellen in Montenegro und Montenegro mit Waffen versorgte. Es wird auch gesagt, dass der König von Montenegro versprochen hat, sie mit Waffen zu unterstützen und ihren Familien Unterschlupf zu gewähren. Währenddessen beteuerte er der Türkei, er halte „strikte Neutralität“, obwohl er offensichtlich in den Aufstand verwickelt war! Es ist wahrscheinlich, dass König Nikolas Strategie darin besteht, Unruhen in Nordalbanien zu schüren, um einzugreifen und weiteres Gebiet für Montenegro zu annektieren."
 endsieg_news.212.a:0 "Oh, diese dummen Albaner"
 endsieg_news.213.t:0 "Albanischer Aufstand von 1910"
 endsieg_news.213.d:0 "In Albanien kam es heute zu einem Aufstand als Reaktion auf die neue Zentralisierungspolitik der jungtürkischen osmanischen Regierung. Die Rebellen wurden angeblich vom Königreich Serbien unterstützt. Nach der Tötung eines osmanischen Kommandanten, der Blockade der Eisenbahnlinie durch Aufständische und albanischen Angriffen auf Osmanen in Pristine und Ferizovik wurde das Kriegsrecht ausgerufen."
 endsieg_news.213.a:0 "Irgendwas sagt mir, dass Kosovo Serbien ist …"
 endsieg_news.2131.t:0 "Unabhängigkeit Montenegros verkündet"
 endsieg_news.2131.d:0 "Heute, am 28. August 1910, während der Jubiläumsfeierlichkeiten von Prinz Nikolaus, nahm Prinz Nikolaus gemäß einer Petition der Skupstina den Königstitel an, mit der Montenegro offiziell und endgültig als unabhängige Einheit vom Osmanischen Reich getrennt wurde."
 endsieg_news.2131.a:0 "Interessant"
 endsieg_news.214.t:0 "Explosion in der Haidar Pasha Station"
 endsieg_news.214.d:0 "Konstantinopels wichtigster Bahnhof in Haidar Pascha am Bosporus wurde von einer gewaltigen Explosion erschüttert, die entweder durch den hastigen Umgang mit Munition oder durch die Bemühungen britischer Agenten verursacht wurde. In dem Inferno gingen beträchtliche Mengen Munition und Öl verloren, was die Kriegsanstrengungen erheblich beeinträchtigte."
 endsieg_news.214.a:0 "Eine Katastrophe für die osmanischen Kriegsanstrengungen"
 endsieg_news.215.t:0 "Brussilow-Offensive im Osten beginnt"
 endsieg_news.215.d:0 "Nachdem die Städte Lviv und Kovel im Vorjahr an die Mittelmächte verloren gegangen waren, genehmigte Zar Nikolaus, der zuvor persönlich das Kommando über die Armee übernommen hatte, einen von Alexei Brusilov ausgearbeiteten Angriffsplan."
 endsieg_news.215.a:0 "Wir werden sehen, wie das läuft"
 endsieg_news.216.t:0 "St. Petersburg umbenannt"
 endsieg_news.216.d:0 "Als Folge des Kriegsausbruchs zwischen unserem Land und Deutschland hat die kaiserliche Regierung Maßnahmen ergriffen, um die Stadt St. Petersburg in Petrograd umzubenennen und die deutschen Wörter „Sankt“ und „Burg“ zu entfernen."
 endsieg_news.216.a:0 "Ich bin nicht sicher, was das bringen soll ..."
 endsieg_news.217.t:0 "Februarrevolution"
 endsieg_news.217.d:0 "Heute hören wir von der Februarrevolution in Russland. Die sogenannte „Februarrevolution“ brach in Petrograd aus, nachdem lange Zeit Unzufriedenheit mit der Monarchie herrschte, die am 8. März zu Massenprotesten gegen die Lebensmittelrationierung führte. Die revolutionären Aktivitäten beschränkten sich weitgehend auf die Hauptstadt und ihre Umgebung und dauerten etwa acht Tage. Es kam zu Massendemonstrationen und bewaffneten Auseinandersetzungen mit Polizei und Gendarmen, den letzten zaristischen Kräften der russischen Monarchie. Am 12. März schließlich stellten sich meuternde russische Streitkräfte auf die Seite der Revolutionäre, was die Monarchie in Gefahr brachte."
 endsieg_news.217.a:0 "So geht es der Monarchie?"
 endsieg_news.218.t:0 "Nikolaus II. dankt ab"
 endsieg_news.218.d:0 "Nach dem Ende der Februarrevolution beschloss Nikolaus II., auf den Thron zu verzichten. Zunächst dankte er zugunsten seines Sohnes Alexi ab, machte jedoch wenige Stunden später einen Rückzieher, nachdem er erfahren hatte, dass der Zarewitsch ohne seine Eltern, die ins Exil geschickt werden sollten, nicht lange leben würde. Nikolaus dankte daher im Namen seines Sohnes ab und verfasste ein neues Manifest, in dem er seinen Bruder, Großfürst Michael, zum nächsten Kaiser ganz Russlands ernannte. Dieser hatte die Thronbesteigung abgelehnt und damit die drei Jahrhunderte lange Herrschaft der Romanows beendet."
 endsieg_news.218.a:0 "Das Ende der Autokratie in Russland"
 endsieg_news.219.t:0 "Fürst Lwow tritt zurück"
 endsieg_news.219.d:0 "Der Chef der russischen provisorischen Regierung, Fürst Lwow, ist heute bedauerlicherweise zurückgetreten, nachdem er nicht genügend Unterstützung in der Bevölkerung gewinnen konnte. Er trat zugunsten seines Kriegsministers Alexander Kerenski zurück, der nun neuer Chef der provisorischen Regierung ist. Es heißt, sein Haar sei in den wenigen Monaten, die er an der Spitze der Regierung stand, völlig weiß geworden."
 endsieg_news.219.a:0 "Der Stress macht dir zu schaffen ..."
 endsieg_news.220.t:0 "Die Julitage"
 endsieg_news.220.d:0 "Am 16. Juli demonstrierten Soldaten, Matrosen und Industriearbeiter in Petrograd spontan und bewaffnet gegen die russische Provisorische Regierung. Im Vergleich zu den Demonstrationen der Februarrevolution war die Stimmung unter den Demonstranten noch wütender und düsterer. Die Provisorische Regierung machte die Bolschewiki für die Gewalt verantwortlich. Bei einem darauffolgenden harten Vorgehen gegen die Bolschewistische Partei wurde diese aufgelöst und viele ihrer Führungsmitglieder verhaftet. Wladimir Lenin soll nach Finnland geflohen sein, auch Leo Trotzki wurde verhaftet."
 endsieg_news.220.a:0 "Schrecklich"
 endsieg_news.221.t:0 "Kornilow-Affäre"
 endsieg_news.221.d:0 "Lawr Kornilow wurde zuvor gebeten, Truppen der provisorischen Regierung nach Petrograd zu verlegen, um der Bedrohung durch die radikale Petrograder Garnison unter sowjetischer Kontrolle entgegenzuwirken. Daraufhin marschierte Kornilow nach Petrograd, angeblich um die provisorische Regierung von revolutionären Elementen zu „säubern“, die möglicherweise eine Militärdiktatur errichten wollten. Kerensy begegnete Kornilow mit der Bewaffnung der bolschewistisch beeinflussten Sowjets, darunter Leo Trotzkis Roten Garden. Kornilows Armee konnte daraufhin nicht in Petrograd einmarschieren, und er und seine engsten Berater wurden inhaftiert, was die dauerhafte Bewaffnung und Machtergreifung der Bolschewiki zur Folge hatte."
 endsieg_news.221.a:0 "Schlechte Nachrichten für die Provisorische Regierung"
 endsieg_news.222.t:0 "Oktoberrevolution"
 endsieg_news.222.d:0 "Als die Kornilow-Affäre die Schwäche der Provisorischen Regierung offenlegte, gewannen die Bolschewiki stark an Popularität, während Kerenskis Regierung an Popularität verlor. Darüber hinaus errangen die Bolschewiki erst kürzlich die Mehrheit im Petrograder Sowjet. Wladimir Lenin, der sich noch immer in Finnland versteckt hielt, erkannte darin eine riesige Chance und verkleidete sich als alter Trunkenbold mit Zahnschmerzen. Er reiste unbemerkt nach Petrograd und versteckte sich im Smolny-Institut. In der Dunkelheit der Nacht begannen bolschewistische Truppen, strategische Gebiete in Petrograd zu besetzen, ohne dass dabei Schüsse abgefeuert wurden. Am Morgen war die Provisorische Regierung im Winterpalast vollständig umzingelt und Kerenski fliehte. Nur einen Tag später wurde der Winterpalast von Junkers besetzt und mit den verbliebenen Ministern der Provisorischen Regierung besetzt. Alle Minister wurden verhaftet und in der Peter-und-Paul-Festung eingesperrt."
 endsieg_news.222.a:0 "Schockierende Neuigkeiten für die Welt ..."
 endsieg_news.223.t:0 "Dreihundertjähriges Jubiläum der Romanows"
 endsieg_news.223.d:0 "Am heutigen 1. März 1913 feiert Russland das 300-jährige Jubiläum der Romanow-Dynastie mit einer landesweiten Feier zu Ehren der herrschenden Romanow-Dynastie. Nach einer grandiosen Zurschaustellung von Reichtum und Macht in St. Petersburg und einer Woche voller Empfänge im Winterpalast brach die kaiserliche Familie zu einer Reise auf, die der Route Michails I. Romanows nach seiner Wahl zum König im Jahr 1613 folgte und eine Art Pilgerfahrt zu den Städten des alten Moskaus beinhaltete. Die Feierlichkeiten wurden als „extravagantes Pompspektakel“ und gewaltige Propagandamaßnahme beschrieben; zu ihren Hauptzielen gehört jedoch, „Ehrfurcht und öffentliche Unterstützung für das Prinzip der Autokratie zu wecken“ sowie die Vergangenheit neu zu interpretieren und „das Epos vom ‚volkstümlichen Zaren‘ neu zu erzählen“. Diese Feierlichkeiten zeigten die „wahre Ergebenheit“ der russischen Bauernmassen für den Zaren."
 endsieg_news.223.a:0 "In Ordnung"
 endsieg_news.224.t:0 "Bürgerkrieg in Russland!"
 endsieg_news.224.d:0 "Ein Aufstand der Tschechoslowakischen Legion brach aus, die Legionäre übernahmen die Kontrolle über Tscheljabinsk, während russische Offiziersorganisationen die Bolschewiki in Petropawlowsk und Omsk stürzten. Die Weißen kontrollieren bereits den größten Teil der Transsibirischen Eisenbahn zwischen Baikalsee und Ural, während die bolschewistische Macht in Sibirien praktisch eliminiert ist. Die Freiwilligenarmee (Weiße) ist jedoch weit verstreut, hat mehrere Anführer und ist nicht zwischen ihren westlichen und östlichen Kriegsschauplätzen verbunden. Um zu gewinnen, müssen die Bolschewiki die Verbindung beider Kriegsschauplätze durch die Einnahme von Zarizyn verhindern."
 endsieg_news.224.a:0 "Wie wird das enden?"
 ww1_kuk.61.b:0 "Nein"

 endsieg_news.225.t:0 "Vertrag von Brest-Litowsk unterzeichnet"
 endsieg_news.225.d:0 "Nach mehreren Monaten brutaler Verhandlungen einigten sich die sowjetische und die deutsche Regierung auf einen endgültigen Vertrag, um weitere Vorstöße deutscher und österreichisch-ungarischer Streitkräfte zu stoppen. Dem Vertrag zufolge wird Sowjetrussland sämtliche Verpflichtungen des kaiserlichen Russlands gegenüber der Triple Entente nicht erfüllen. Im Vertrag werden alle baltischen Staaten an Deutschland abgetreten, die zu deutschen Vasallenstaaten unter deutschen Fürsten werden sollen, die Unabhängigkeit der Ukraine wird anerkannt, Weißrussland wird abgetreten und die Oblast Kars im Südkaukasus wird an die Osmanen abgetreten. Die Bedingungen sind mehr als hart, und es wird sogar gesagt, der deutsche Unterhändler sei von der Härte schockiert gewesen."
 endsieg_news.225.a:0 "Bedeutet dies das Ende der Entente?"
 endsieg_news.226.t:0 "Lafayette Escadrille"
 endsieg_news.226.d:0 "Obwohl die USA noch immer neutral sind, gelang es ihnen, die französische Regierung vom Wert einer freiwilligen amerikanischen Lufteinheit zu überzeugen, die für Frankreich fliegt. Die Anerkennung ihrer Leistungen durch die amerikanische Öffentlichkeit könnte möglicherweise das amerikanische Interesse wecken, die Neutralität aufzugeben und selbst in den Kampf einzugreifen."
 endsieg_news.226.a:0 "Interessant"
 endsieg_news.227.t:0 "USA verurteilen uneingeschränkten U-Boot-Krieg"
 endsieg_news.227.d:0 "Die Versenkung amerikanischer Schiffe durch die Deutschen hat bei den US-Bürgern und der Regierung für enorme Empörung gesorgt. Am bekanntesten war der jüngste Untergang der Lusitania mit rund 100 US-Bürgern an Bord. Die USA forderten die Deutschen auf, den uneingeschränkten U-Boot-Krieg einzustellen, andernfalls könnten sie ihre Neutralität verlieren. Sie werden ihre Reaktion darauf abwarten."
 endsieg_news.227.a:0 "Wie werden die Deutschen reagieren?"
 endsieg_news.228.t:0 "USA erklären Deutschland den Krieg!"
 endsieg_news.228.d:0 "Der US-Kongress und Präsident Wilson haben erklärt, dass sie angesichts der deutschen Aggression gegen ihr eigenes Land zu lange untätig geblieben seien! Sie schickten ein Telegramm nach Mexiko, in dem sie ihr Land anboten, und brachen ihr Versprechen, den uneingeschränkten U-Boot-Krieg wiederaufzunehmen, obwohl sie zuvor angekündigt hatten, damit aufzuhören. Das amerikanische Volk wollte zu Beginn dieses Krieges Neutralität, doch die jüngsten Aktionen zeigen deutlich, dass es selbst in diesen Krieg gezwungen wurde."
 endsieg_news.228.a:0 "Das Blatt hat sich gewendet"
 endsieg_news.229.t:0 "Amerikanische Expeditionstruppen nach Frankreich geschickt"
 endsieg_news.229.d:0 "Es ist kein Geheimnis, dass Frankreich und England dringend frische Truppen an der Westfront benötigen. Glücklicherweise konnten die USA diese nun mit ausreichend Transportschiffen versorgen und werden jeden Monat rund 100.000 Mann über den Atlantik schicken. Es besteht die Hoffnung, dass dies ausreicht, um das Blatt endgültig zu wenden."
 endsieg_news.229.a:0 "Sie können hoffen"
 endsieg_news.230.t:0 "USA ziehen sich aus Veracruz zurück"
 endsieg_news.230.d:0 "Mit dem Sturz des Huerta-Regimes in Mexiko haben die USA zu Recht beschlossen, das zuvor besetzte Gebiet von Veracruz zurückzugeben. Es besteht die Hoffnung, dass die guten Beziehungen zu Mexiko wiederhergestellt werden können."
 endsieg_news.230.a:0 "OK"
 endsieg_news.231.t:0 "USA verurteilen Huerta-Regime"
 endsieg_news.231.d:0 "Die US-Regierung missbilligt den Aufstieg von Victoriano Huerta in Mexiko zutiefst. Seine Handlungen als brutaler Diktator haben in ganz Mexiko Wellen geschlagen und dazu geführt, dass er den vorherigen Präsidenten Francisco Madero, der rechtmäßig gewählt wurde, zu Fall gebracht hat."
 endsieg_news.231.a:0 "Keine Frage, er ist ein Diktator"
 endsieg_news.232.t:0 "USA besetzen Veracruz"
 endsieg_news.232.d:0 "Der deutsche Dampfer SS Ypiranga wollte der Huerta-Regierung unter Verletzung des US-Waffenembargos Waffen und Munition liefern, und Huerta weigerte sich, nach der ungerechtfertigten Gefangennahme mehrerer unbewaffneter US-Matrosen den 21-Schuss-Salut vor der US-Flagge abzugeben. Der Präsident sah sich gezwungen, die Besetzung des Hafens von Veracruz durch das US-Militär anzuordnen. Dieser Schritt war äußerst unpopulär und brachte die USA und die mexikanische Regierung an den Rand eines Krieges."
 endsieg_news.232.a:0 "Was macht Deutschland jetzt..."
 endsieg_news.233.t:0 "Neuer Präsident in den USA!"
 endsieg_news.233.d:0 "Der demokratische Kandidat Woodrow Wilson hat heute in den gesamten Vereinigten Staaten mit 435 Stimmen einen überwältigenden Sieg errungen. William H. Taft, der zur Wiederwahl antrat, konnte jedoch nur 8 Stimmen auf sich vereinen und wurde damit Dritter nach Thedore Roosevelt, der 88 Stimmen erhielt."
 endsieg_news.233.a:0 "Herzlichen Glückwunsch, Wilson!"
 endsieg_news.234.t:0 "Panamakanal fertig!"
 endsieg_news.234.d:0 "Nach zehn langen Jahren des Baus des Panamakanals, der ursprünglich von den Franzosen begonnen wurde, ist es den Vereinigten Staaten endlich gelungen, die 80 Kilometer lange Passage fertigzustellen. Damit eröffnen sich grenzenlose Möglichkeiten für Handel und Transport, ohne dass der südamerikanische Kontinent länger durchquert werden muss."
 endsieg_news.234.a:0 "Eine enorme Leistung"
 endsieg_news.235.t:0 "USA besetzen Haiti"
 endsieg_news.235.d:0 "Auf Befehl von Präsident Woodrow Wilson sind rund 330 US-Marines in Port-au-Prince, Haiti, gelandet und haben die Kontrolle über das Land übernommen, nachdem der Diktator Vilbrun Guillaume Sam von Aufständischen ermordet worden war, die über seine politischen Hinrichtungen an der Elite der Opposition erzürnt waren. Die USA betrachten den Aufstand gegen Sam als Bedrohung amerikanischer Geschäftsinteressen im Land und veranlassten die Invasion, nachdem Rosalvo Bobo als nächster Präsident, der zunehmend antiamerikanisch eingestellt war, auf den Plan trat."
 endsieg_news.235.a:0 "Haiti? Dieser Ort ist ein Drecksloch!"
 endsieg_news.236.t:0 "Black Tom Explosion"
 endsieg_news.236.d:0 "Am 30. Juli 1916 ereignete sich in Jersey City auf Black Tom Island eine Explosion, bei der zahlreiche amerikanische Munitionsvorräte, die an die Alliierten geliefert werden sollten, zerstört wurden. Die Explosion entsprach einem Erdbeben der Stärke 5,0 bis 5,5 auf der Richterskala und war Berichten zufolge bis nach Philadelphia zu spüren. Fenster gingen in bis zu 40 Kilometern Entfernung zu Bruch. Nach eingehender Untersuchung stellte sich heraus, dass die Explosion keineswegs ein Unfall, sondern das Werk deutscher Agenten war!"
 endsieg_news.236.a:0 "Hmmm..."
 endsieg_news.237.t:0 "USA besetzen die Dominikanische Republik"
 endsieg_news.237.d:0 "Die US-Regierung reagierte nicht freundlich auf die Machtübernahme des dominikanischen Kriegsministers Desiderio Arias von Juan Isidro. Konteradmiral William B. Caperton befahl Arias den Rücktritt und drohte Santo Domingo mit einem Angriff auf die Insel. Obwohl versucht wurde, der Invasion Widerstand zu leisten, setzten sich unsere Streitkräfte schließlich durch und stellten in weiten Teilen der Republik die Ordnung wieder her. Im ganzen Land gab es jedoch weiterhin minimalen Widerstand."
 endsieg_news.237.a:0 "Die DR? Das ist ein anderes...! Ähm..."
 endsieg_news.238.t:0 "Frieden ohne Sieg"
 endsieg_news.238.d:0 "Woodrow Wilson hat in einer Erklärung die europäischen Gegner dazu aufgerufen, sich zusammenzuschließen und einen Waffenstillstand zu schließen – einen Frieden ohne Sieger oder Verlierer, einen Frieden ohne Sieg. Es ist jedoch alles andere als wahrscheinlich, dass es dazu kommt, da beide Seiten für einen rein weißen Frieden zu viel verloren haben und zu viele Expansionspläne schmieden."
 endsieg_news.238.a:0 "Nur in einer utopischen Welt Wilson"
 endsieg_news.239.t:0 "Der Derwischkrieg"
 endsieg_news.239.d:0 "Seit über zehn Jahren hat der Derwisch-Staat unter Führung von Mohammed Abdullah Hassan, der von seinen englischen Feinden „Verrückter Mullah“ genannt wird, obwohl er weder verrückt noch ein Mullah ist, mit seinen Derwisch-Truppen mehrere britische Versuche abgewehrt, den 1900 in Britisch-Somaliland entstandenen Derwisch-Staat zu zerschlagen. Durch die erfolgreiche Zurückschlagung des Britischen Empires in vier Militärexpeditionen, die die Briten zum Rückzug an die Küste zwangen, hat der Staat in der muslimischen Welt und bis zu einem gewissen Grad sogar im Westen Weltruf erlangt."
 endsieg_news.239.a:0 "Ihr Kampf ist lobenswert"
 endsieg_news.240.t:0 "Georg I. ermordet"
 endsieg_news.240.d:0 "Georg I. des griechischen Königreichs wurde heute auf tragische Weise ermordet, nachdem er sich wie üblich ohne nennenswerte Schutztruppe in Thessaloniki aufgehalten hatte. Bei einem Nachmittagsspaziergang wurde er aus nächster Nähe von einem gewissen Alexandros Schinas in den Rücken geschossen. Schinas soll einer sozialistischen Organisation angehört haben und erklärte bei seiner Verhaftung, er habe den König getötet, als dieser ihm Geld verweigerte."
 endsieg_news.240.a:0 "Ein tragischer Verlust für Griechenland"
 endsieg_news.241.t:0 "Japanischer Kawachi explodiert!"
 endsieg_news.241.d:0 "Heute, am 12. Juli 1918, explodierte die Kawachi unerwartet, obwohl sie mehrere Monate zuvor ohne Probleme inspiziert worden war. Das Schiff sank innerhalb von etwa vier Minuten nach der Explosion und forderte den Tod von 600 Seeleuten, 443 überlebten. Es konnte kein plausibler Verdächtiger oder Grund für die Explosion gefunden werden, und es wird berichtet, dass das Kordit im Magazin aufgrund von Zersetzung möglicherweise spontan ignoriert wurde. Schließlich erwog die Marine die Bergung des Schiffes, entschied jedoch, dass dies zu teuer wäre und den Bau eines Schlachtkreuzers um über ein Jahr verzögern würde, und strich das Schiff von der Liste der Marine."
 endsieg_news.241.a:0 "All diese Arbeit!"
 endsieg_news.242.t:0 "Reisunruhen in Japan!"
 endsieg_news.242.d:0 "Von Juli bis September 1918 kam es in ganz Japan zu einer Reihe von Volksunruhen. Auslöser war ein rapider Anstieg des Reispreises, der insbesondere in ländlichen Gebieten, in denen Reis das wichtigste Grundnahrungsmittel ist, zu extremen wirtschaftlichen Schwierigkeiten führte. Die Reisunruhen sollen in Ausmaß, Ausmaß und Gewalt beispiellos gewesen sein. Der anfängliche Protest soll friedlich begonnen haben, eskalierte jedoch schnell zu umfassenden Krawallen, Streiks, Plünderungen, Brandanschlägen auf Polizeistationen und Regierungsgebäude sowie bewaffneten Auseinandersetzungen. Rund 25.000 Menschen wurden verhaftet, 8.200 wegen verschiedener Verbrechen verurteilt. Premierminister Terauchi übernahm die Verantwortung für den Vorfall, der zum Sturz der Regierung Terauchi Masatake in Japan führte."
 endsieg_news.242.a:0 "Klingt hektisch"
 endsieg_news.243.t:0 "Bewegung vom 1. März"
 endsieg_news.243.d:0 "Die Bewegung des 1. März ist ein deutliches öffentliches Zeichen des koreanischen Widerstands gegen die japanische Herrschaft auf der koreanischen Halbinsel. Angeblich veröffentlichten viele koreanische Studenten in Tokio nach Wilsons Vierzehn-Punkte-Rede, inspiriert von ihrer Haltung, eine Erklärung, in der sie Freiheit von der Kolonialherrschaft forderten. Der Tod des ehemaligen koreanischen Kaisers Gojong im Januar, der für Kontroversen sorgte und den Verdacht auf Vergiftung auslöste, verschärfte dies zusätzlich."
 endsieg_news.243.a:0 "Vielleicht helfen die USA in einigen Jahrzehnten"
 endsieg_news.244.t:0 "Aufstieg von Zewditu in Äthiopien"
 endsieg_news.244.d:0 "Da Iyasu V. aufgrund seines labilen Verhaltens beim Adel weithin unbeliebt war und die Kirche ihn wegen angeblicher Sympathien für den Islam verdächtigte, wurde er nie gekrönt. Er wurde heute gewaltsam abgesetzt. Zewditu wurde daraufhin in die Hauptstadt gerufen, und die äthiopische Kirche setzte Iyasu zugunsten Zewditus ab, die nun den Titel „Königin der Könige“ trägt."
 endsieg_news.244.a:0 "Interessante Entwicklungen"
 endsieg_news.245.t:0 "Tod von Rama V."
 endsieg_news.245.d:0 "König Chulalongkorn von Siam, auch bekannt als Rama V., ist heute im Amphorn Sathan Residential Hall im Dusit-Palast verstorben. Sein Nachfolger wurde sein Sohn Vahiravudh. Chulalongkorns Leistungen und Erfolge für die Nation, die er so sehr liebte, waren unglaublich. Nun können die Menschen in Siam nur hoffen, dass ihr nächster Herrscher unserem letzten ähnlicher wird."
 endsieg_news.245.a:0 "Ein unglücklicher Tod"
 endsieg_news.246.t:0 "Rumänischer König gestorben!"
 endsieg_news.246.d:0 "Karl I. regierte Rumänien lange und trug so zu dessen rasanter Entwicklung während seiner Herrschaft bei, wofür das rumänische Volk ihm sicherlich dankbar war. Obwohl er mit Ausbruch des Ersten Weltkriegs vor kurzem geneigt war, auf der Seite der Mittelmächte in den Krieg einzutreten, da er davon überzeugt war, dass ein Kriegseintritt zugunsten des Deutschen Reiches und seines Cousins Wilhelm II. ehrenhaft wäre, ist er verstorben, und so liegt die Zukunft Rumäniens in den Händen seines Ferdinand."
 endsieg_news.246.a:0 "Ein tragischer Tod"
