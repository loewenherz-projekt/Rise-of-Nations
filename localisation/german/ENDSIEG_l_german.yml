 news_1942.1.t:0 "Das Vichy-Regime kämpft gegen die Alliierten"
 news_1942.1.desc:0 "Nach einem diplomatischen Telegramm der USA an das Vichy-Regime wurde klar, dass das Vichy-Regime den Alliierten nicht helfen würde. Dies führte zu einer gemeinsamen Invasion amerikanischer, englischer und französischer Streitkräfte sowie mehrerer Commonwealth-Mitglieder in Nordafrika. Es herrscht großes Chaos, da ehemalige Landsleute nun gegeneinander kämpfen. Es bleibt abzuwarten, ob das Vichy-Regime seine kolonialen Ansprüche aufrechterhalten kann."
 news_1942.1.a:0 "Wir müssen ihr Heimatland erobern!"
 news_1942.1.b:0 "Das wird uns helfen."
 news_1942.1.c:0 "Wir werden uns durchsetzen."
 news_1942.1.d:0 "Sie bekämpfen ihr eigenes Volk ..."

 news_1942.2.t:0 "Das Vichy-Regime schließt sich den Alliierten an"
 news_1942.2.desc:0 "Ein diplomatisches Telegramm der USA an das Vichy-Regime machte deutlich, dass das Vichy-Regime den Alliierten helfen würde, nachdem es mit einer Invasion des Landes gedroht hatte. Für die Achsenmächte war dies eine große Überraschung, die nun versuchten, den verbleibenden französischen Boden zu besetzen. "
 news_1942.2.a:0 "Wir müssen ihr Heimatland erobern!"
 news_1942.2.b:0 "Das wird uns helfen."
 news_1942.2.c:0 "Wir werden uns durchsetzen."
 news_1942.2.d:0 "Sie bekämpfen ihr eigenes Volk ..."

 news_1942.3.t:0 "Vichy-Regime bleibt neutral"
 news_1942.3.desc:0 "Ein diplomatisches Telegramm der USA an das Vichy-Regime machte deutlich, dass die USA die Neutralität Vichys schützen wollten. Für die Alliierten war dies eine große Überraschung, da sie mit einer erzwungenen Invasion der USA gerechnet hatten. "
 news_1942.3.a:0 "Ein weiterer Verbündeter ist weg ..."
 news_1942.3.b:0 "Das wird uns helfen."
 news_1942.3.c:0 "Wir werden es alleine schaffen."
 news_1942.3.d:0 "Wir werden unser Land schützen."

 news_1942.4.t:0 "Operation Fackel"
 news_1942.4.desc:0 "Nach einem diplomatischen Telegramm der USA an das Vichy-Regime wurde klar, dass das Vichy-Regime den Alliierten nicht helfen würde. Dies führte zu einer gemeinsamen Invasion Nordafrikas durch amerikanische, englische und französische Streitkräfte sowie mehrere Commonwealth-Mitglieder. Die Operation Torch umfasste Landungen in Nordwestafrika. Sie sollte den Druck auf die alliierten Streitkräfte in Ägypten verringern und eine Invasion in Südeuropa ermöglichen. Die US-Kommandeure lehnten den Plan zunächst entschieden ab, doch die vereinten alliierten Truppen führten ihn schließlich doch noch durch."
 news_1942.4.a:0 "Sie bedrohen unseren Einfluss in Afrika!"
 news_1942.4.b:0 "Eine gute Ablenkung."
 news_1942.4.c:0 "Wir müssen uns um unsere Verteidigung kümmern!"
 news_1942.4.d:0 "Wie werden sie überleben?"

 EFR_1942.1.t:0 "Diplomatisches Telegramm an Vichy"
 EFR_1942.1.desc:0 "Der französische Widerstand gegen das Vichy-Regime in Nordafrika wächst. Wenn wir etwas unternehmen wollen, sollten wir es jetzt versuchen. Es gibt Pläne für eine Invasion in Nordwestafrika, aber wir könnten auch versuchen, die Franzosen friedlich dazu zu zwingen."
 EFR_1942.1.a:0 "Senden Sie das Ultimatum."
 EFR_1942.1.b:0 "Wir werden ihre Neutralität respektieren."

 EFR_1942.2.t:0 "Diplomatisches Telegramm der USA an Vichy"
 EFR_1942.2.desc:0 "Die USA fragen, ob wir uns den Alliierten anschließen. Sollten wir dieser Aufforderung nicht nachkommen, wird dies mit Sicherheit zu militärischen Reaktionen führen. Insbesondere da unsere Spionageabwehr darauf hindeutet, dass die Widerstandsbewegung in Nordafrika an Boden gewinnt und sich gegen unsere Autorität erheben könnte."
 EFR_1942.2.a:0 "Wir werden unsere Strände verteidigen!"
 EFR_1942.2.b:0 "Wir werden ihr Ultimatum akzeptieren!"

 EFR_1942.3.t:0 "Diplomatisches Telegramm der USA an Vichy"
 EFR_1942.3.desc:0 "Nach diplomatischen Kontakten mit den USA machten sie deutlich, dass das Vichy-Regime aus diesem Krieg herausgehalten und seine Neutralität nicht gebrochen werde."
 EFR_1942.3.a:0 "Hübsch."

 EFR_1942.4.t:0 "Operation Fackel"
 EFR_1942.4.desc:0 "Das Vichy-Regime hat deutlich gemacht, dass es in diesem Kampf nicht auf unserer Seite steht. Wir müssen sofort zu militärischen Maßnahmen greifen."
 EFR_1942.4.a:0 "Geben Sie den Befehl ab."

 EFR_1942.5.t:0 "Fall Anton"
 EFR_1942.5.desc:0 "Operation Anton, auch bekannt als Fall Anton, war der Deckname für die militärische Besetzung Vichy-Frankreichs durch Deutschland und Italien im November 1942. Sie markierte das Ende des Vichy-Regimes als nominell unabhängiger Staat und die Auflösung seiner Armee (der stark eingeschränkten Waffenstillstandsarmee), das Vichy-Regime blieb jedoch als Marionettenregierung im besetzten Frankreich bestehen. Eine der letzten Aktionen der Streitkräfte vor ihrer Auflösung war die Selbstversenkung der französischen Flotte in Toulon, um zu verhindern, dass sie in die Hände der Achsenmächte fiel."
 EFR_1942.5.a:0 "Wir müssen alles besetzen."
 EFR_1942.5.b:0 "Wir werden ein Marionettenregime installieren und Italien seine Ansprüche zusprechen."
 EFR_1942.5.c:0 "Wir werden ein Marionettenregime installieren."

 SOV_1942.1.t:0 "Deutsche initiieren Fall Blau"
 SOV_1942.1.d:0 "Die Deutschen haben ihre strategische Sommeroffensive im Kaukasus begonnen. Sie versuchen, unsere wertvollen Ölfelder einzunehmen. Wir müssen sie um jeden Preis aufhalten!"
 SOV_1942.1.a:0 "Setzt die Reserven ein!"

 SOV_1942.2.t:0 "Deutsche starten Operation Zitadelle"
 SOV_1942.2.d:0 "Die Deutschen haben ihre Pläne zur Einkreisung des Kursker Frontbogens in die Tat umgesetzt. Wir müssen unseren Plan, die strategische Verteidigungsoperation Kursk, umsetzen. Diese törichte Operation der Deutschen, unsere Heeresgruppe einzukreisen, könnte unsere Chance sein, ihre Ostfront endgültig zu erschöpfen."
 SOV_1942.2.a:0 "Wir werden niemals zulassen, dass Kursk eingenommen wird!"
SOV_age_update.t:0 "Stalin-Zeitalter"
SOV_age_update.d:0"Josef Stalin, der Führer der Sowjetunion, geht auf Ende 60 zu und die Sorge um seinen Gesundheitszustand und seine Fähigkeit, effizient zu regieren, wächst. Stalin, der seit den späten 1920er Jahren an der Macht ist, sah sich zahlreichen Herausforderungen gegenüber, darunter dem Zweiten Weltkrieg und dem Wiederaufbau des Landes. Sein von autoritärer Kontrolle und Personenkult geprägter Führungsstil hat jedoch auch zu weit verbreiteter Angst und Unterdrückung geführt. Trotz seines fortgeschrittenen Alters bleibt Stalin eine dominierende Figur in der sowjetischen Politik, und ein klarer Nachfolger ist nicht in Sicht. Sein Gesundheitszustand wird streng geheim gehalten und es gibt zahlreiche Gerüchte über seinen körperlichen und geistigen Zustand. Einige spekulieren, dass sein Alter und der Druck der Führung ihren Tribut fordern, während andere glauben, er sei so beeindruckend wie eh und je. Während die Welt zuschaut, wirft die Frage nach Stalins Altern und dessen Auswirkungen auf die sowjetische Politik und Stabilität große Schatten auf."
SOV_age_update.a:0"Okay"
 remaining_1943.1.t:0 "Operation Husky"
 remaining_1943.1.d:0 "Die alliierte Invasion Siziliens, Codename Operation Husky, war eine der größten Operationen des Zweiten Weltkriegs, bei der die Alliierten den Achsenmächten die Insel Sizilien abnahmen. Sie begann mit einer großen Amphibien- und Luftlandeoperation, gefolgt von einer sechswöchigen Landkampagne, und leitete den Italienfeldzug ein. \nHusky begann in der Nacht vom 9. auf den 10. Juli 1943 und endete am 17. August. Strategisch erreichte Husky die von den alliierten Planern gesteckten Ziele; die Alliierten vertrieben die Luft-, Land- und Seestreitkräfte der Achsenmächte von der Insel, und die Mittelmeerschifffahrtswege wurden zum ersten Mal seit 1941 für alliierte Handelsschiffe geöffnet. Der italienische Staatschef Benito Mussolini wurde in Italien gestürzt, und der Weg war frei für die alliierte Invasion Italiens. Der deutsche Staatschef Adolf Hitler „brach eine Großoffensive bei Kursk nach nur einer Woche ab, teilweise um Truppen nach Italien umzuleiten“, was zu einer Verringerung der deutschen Truppenstärke an der Ostfront führte."
 remaining_1943.1.a:0 "Geben Sie den Befehl ab."

 germany.500.desc:0 "Nach seinem immensen Erfolg in Afrika wurde Erwin Rommel mit dem Großkreuz des Eisernen Kreuzes ausgezeichnet, der zweithöchsten Auszeichnung, die ein General oder Feldmarschall erhalten kann. Er kämpfte mit so großem Können und so viel Tapferkeit, dass er dem deutschen Volk für immer in Erinnerung bleiben wird."

 germany.501.desc:0 "Eine Zeit lang war Erwin Rommel Hitlers Lieblingsgeneral. Rommel erlangte 1940 Bekanntheit als Kommandeur einer Panzerdivision, die die französische Verteidigung zerschlug. Später befehligte er das Afrikakorps, wo sein taktisches Genie und seine Fähigkeit, seine Truppen zu inspirieren und begrenzte Ressourcen optimal zu nutzen, Hitler dazu veranlassten, ihn in den Rang eines Feldmarschalls zu erheben. 1943 übertrug Hitler Rommel das Kommando über die Befestigung des „Atlantikwalls“ entlang der französischen Küste, der die unvermeidliche Invasion der Alliierten in Europa abwehren sollte. \n\nAnfang 1943 schwand Rommels Glaube an die Fähigkeit Deutschlands, den Krieg zu gewinnen, ebenso wie seine Einschätzung Hitlers. Bei seiner Deutschlandreise war Rommel entsetzt über die verheerenden Auswirkungen der alliierten Bombenangriffe und die schwindende Moral der Bevölkerung. Er erfuhr auch zum ersten Mal von den Todeslagern, der Sklavenarbeit, der Vernichtung der Juden und den anderen Gräueltaten des Nazi-Regimes. Rommel gelangte zu der Überzeugung, dass ein Sieg für Deutschland aussichtslos war und eine Verlängerung des Krieges zur Zerstörung seines Heimatlandes führen würde. Er kam mit einer wachsenden Verschwörung in Kontakt, deren Ziel der Sturz Hitlers und ein Separatfrieden mit den Westalliierten war. \n\nAm 17. Juli 1944 wurde Rommels Wagen von einem alliierten Flugzeug getroffen, wodurch der Feldmarschall schwer verletzt wurde. Er wurde in ein Krankenhaus und anschließend nach Hause nach Deutschland gebracht. Drei Tage später wäre Hitler beinahe durch eine Attentäterbombe getötet worden. Bei den darauf folgenden blutigen Vergeltungsaktionen belasteten einige Verdächtige Rommel. Rommels „defätistische“ Haltung genügte, um Hitlers Zorn auf sich zu ziehen. Er zwang Rommel, sich entweder einem Prozess zu unterziehen, bei dem er mit Sicherheit schuldig gesprochen worden wäre, oder sich das Leben zu nehmen. Er entschied sich für Letzteres."

 germany_1943.1.t:0 "Operation Isabella"
 germany_1943.1.d:0 "Die Umsetzung der Operation Isabella hängt maßgeblich von der Beteiligung Spaniens ab. Wir haben zwei Möglichkeiten: Wir können versuchen, mit Spanien zu verhandeln, oder den eisernen Weg gehen. Die Operation Isabella war ein Plan, den Druck auf Großbritannien durch die Einnahme Gibraltars und die Sicherung von Flughäfen auf dem spanischen Festland weiter zu erhöhen."
 germany_1943.1.a:0 "Beginnen Sie mit den Verhandlungen."
 germany_1943.1.b:0 "Wir werden den Eisenweg nehmen."

 germany_1943.2.t:0 "Operation Isabella"
 germany_1943.2.d:0 "Deutschland hat uns auf diplomatischem Wege kontaktiert, um die Operation Isabella durchzuführen. Die Operation Isabella war ein Plan, den Druck auf Großbritannien durch die Einnahme Gibraltars und die Sicherung von Flughäfen auf dem spanischen Festland weiter zu erhöhen. Wir könnten aus diesem Krieg einen guten Profit ziehen."
 germany_1943.2.a:0 "Nachfrage Gibraltar, Marokko und Kamerun"
 germany_1943.2.b:0 "Nachfrage Gibraltar und Marokko"
 germany_1943.2.c:0 "Nachfrage nur Gibraltar"

 germany_1943.3.t:0 "Operation Isabella – Spanische Reaktion"
 germany_1943.3.d:0 "Spanien hat uns eine Antwort geschickt: Sie fordern Gibraltar, Marokko und Kamerun, wenn sie in den Krieg eintreten wollen. Das ist kaum eine vernünftige Forderung: Hitler hatte erklärt, dass er der Meinung sei, der afrikanische Staat aus dem Ersten Weltkrieg müsse zurückgegeben werden, ein deutsches Kamerun. Daher ist dies fast undenkbar."
 germany_1943.3.a:0 "Zum Wohle unserer Nation müssen wir uns einigen."
 germany_1943.3.b:0 "Wir können dieser unangemessenen Forderung nicht nachkommen."

 germany_1943.4.t:0 "Operation Isabella – Spanische Reaktion"
 germany_1943.4.d:0 "Spanien hat uns eine Antwort geschickt: Es fordert Gibraltar und Marokko, wenn es in den Krieg eintreten soll. Diese Forderung ist berechtigt: Spanien hat seinen Anspruch auf Kamerun aufgegeben, das Hitler als rechtmäßigen deutschen Boden betrachtet. Wie sollen wir reagieren?"
 germany_1943.4.a:0 "Zum Wohle unserer Nation müssen wir uns einigen."
 germany_1943.4.b:0 "Das ist kein gutes Geschäft."

 germany_1943.5.t:0 "Operation Isabella – Spanische Reaktion"
 germany_1943.5.d:0 "Spanien hat uns eine Antwort geschickt: Sie verlangen nur Gibraltar, wenn sie am Krieg teilnehmen wollen. Das ist eine sehr vernünftige Forderung: Sie haben ihren Anspruch auf Kamerun aufgegeben, das Hitler als rechtmäßigen deutschen Boden betrachtet. Wie sollen wir reagieren?"
 germany_1943.5.a:0 "Zum Wohle unserer Nation werden wir zustimmen."
 germany_1943.5.b:0 "Das ist kein gutes Geschäft."

 germany_1943.6.t:0 "Operation Isabella – Deutsche Reaktion"
 germany_1943.6.d:0 "Die Deutschen haben uns unsere Forderung übermittelt und wir werden unsere Ansprüche durchsetzen! "
 germany_1943.6.a:0 "Sehr gut!"

 germany_1943.7.t:0 "Operation Isabella – Deutsche Reaktion"
 germany_1943.7.d:0 "Die Deutschen haben unsere Bitte abgelehnt und werden uns den Krieg erklären! "
 germany_1943.7.a:0 "Es scheint, als hätte Deutschland tatsächlich mit der spanischen Inquisition gerechnet …"

 germany_1943.8.t:0 "Operation Isabella – Phase 2 einleiten"
 germany_1943.8.d:0 "Es ist Zeit, Phase 2 unserer Operation einzuleiten. Diese Phase beinhaltet den Angriff auf Portugal und Gibraltar. Falls wir den Angriff mit oder gegen Spanien noch nicht organisiert haben, sollten wir uns beeilen."
 germany_1943.8.a:0 "Wir sind bereit!"

 
 news_1941.1.t:0 "Fall von Kiew"
 news_1941.1.desc:0 "Am [GetDateText] wurde Kiew, die Hauptstadt der Ukrainischen SSR, von den vorrückenden [kiev_occupier.GetAdjective]-Armeen der Sowjetunion eingenommen. \n\nDie Einnahme einer ihrer wichtigsten Städte ist ein schwerer Schlag für die Sowjets, doch es bleibt die Frage, ob die [kiev_occupier.GetAdjective] ihren Vormarsch fortsetzen können. Kurz nach der Einnahme der Stadt durch die [kiev_occupier.GetAdjective] wurden offenbar Tausende von vom NKWD gelegten Minen in Gebäuden entlang der Hauptstraße Chreschtschatyk gezündet, was die bereits zerstörte Stadt noch weiter zerstörte.\n\nNun blicken die Invasionstruppen nach Osten."
 news_1941.1.a:0 "Eine beunruhigende Entwicklung ..."

 news_1941.2.t:0 "Rückeroberung Kiews"
 news_1941.2.desc:0 "Nach der kürzlichen Besetzung Kiews durch die [kiev_occupier.GetName] war der sowjetische Gegenangriff erfolgreich. Die Sowjetunion kontrolliert die Stadt erneut, eine Schlüsselstadt ihres Widerstands."
 news_1941.2.a:0 "Der sowjetische Bär hat bewiesen, dass er kampffähig ist …"

 news_1941.3.t:0 "Fall Moskaus"
 news_1941.3.desc:0 "Am [GetDateText] durchbrachen [moscow_occupier.GetAdjective]-Panzer hastig errichtete Sperren auf den Straßen Moskaus, und Halbkettenfahrzeuge wurden dabei beobachtet, wie sie auf dem Roten Platz Panzergrenadiere abluden. \nDicker, schweifender Rauch der vielen Brände in den Vororten stieg in die Luft, als [moscow_occupier.GetAdjective]-Infanterie den Kreml stürmte. Berichten zufolge wurden Granaten und Flammenwerfer benötigt, um die hartnäckigen NKWD-Verbände zu bekämpfen, die jeden Zentimeter des Komplexes verteidigen wollten. Die russische Hauptstadt ist nun in [moscow_occupier.GetAdjective]-Händen, aber sie ist nur noch eine brennende Ruine. \n\nUnbestätigten Berichten zufolge wurde Lenins einbalsamierter Leichnam sicher nach Osten evakuiert."
 news_1941.3.a:0 "Ein Schlag ins Herz der Sowjets ..."

 news_1941.4.t:0 "Rückeroberung Moskaus"
 news_1941.4.desc:0 "Nach den immensen Kämpfen und dem unvermeidlichen Untergang Moskaus hat die Sowjetunion erneut bewiesen, dass ihre mangelnde Ausrüstung nicht ihrer ungebrochenen Moral entspricht. Moskau steht erneut unter kommunistischer Kontrolle."
 news_1941.4.a:0 "Werden die Sowjets dieses Mal die Kontrolle behalten?"

 news_1941.5.t:0 "Fall von Stalingrad"
 news_1941.5.desc:0 "Vorrückende [stalingrad_occupier.GetAdjective]-Speerspitzen haben Stalingrad, Stalins gleichnamige Stadt an der Wolga, eingenommen. \n\nNachdem sie sich ihren Weg durch die zerstörte Stalingrader Traktorenfabrik erkämpft und die strategisch wichtigen Höhen des Mamajew-Kurgans erobert hatten, haben die [stalingrad_occupier.GetAdjective] die letzten sowjetischen Verteidiger über die Wolga an ihr Ostufer gezwungen. Es bleibt abzuwarten, ob die Rumänen ihre Stellung halten können ..."
 news_1941.5.a:0 "Wird Stalin „seine“ Stadt zurückerobern?"

 news_1941.6.t:0 "Rückeroberung Stalingrads"
 news_1941.6.desc:0 "Heute ist Stalingrad von den [stalingrad_occupier.GetAdjective]-Truppen befreit. Die Kämpfe waren erbittert und dauerten mancherorts wochenlang. Die Flagge der Vereinigten Sozialistischen Sowjetrepubliken weht wieder stolz über der Stadt."
 news_1941.6.a:0 "Eine beunruhigende Entwicklung ..."

 news_1941.7.t:0 "Fall Leningrads"
 news_1941.7.desc:0 "Leningrad, Geburtsort der Russischen Revolution, ist den vorrückenden [leningrad_fallen.GetAdjective]-Truppen zum Opfer gefallen. \n\nAus einigen Vororten sind noch vereinzelte Kämpfe zu hören, doch über dem Rest der zerstörten Stadt scheint sich eine seltsame Ruhe eingebreitet zu haben.\n\nHeute marschierten Kolonnen von [leningrad_fallen.GetAdjective]-Soldaten an der Isaakskathedrale vorbei, deren große Kuppel von Pionieren der Roten Armee grau gestrichen wurde, um die Aufmerksamkeit marodierender Bomber der Luftwaffe zu vermeiden. \nTrotz ihrer Bemühungen ist sie von Einschusslöchern und Granatsplittern übersät."
 news_1941.7.a:0 "Eine beunruhigende Entwicklung ..."

 news_1941.8.t:0 "Rückeroberung Leningrads"
 news_1941.8.desc:0 "Nach wochenlangen Kämpfen in der Stadt, die als Geburtsort der Russischen Revolution gilt, hat sich der Staub endlich gelegt. Für jeden Beobachter ist klar, dass die Sowjets wieder die Kontrolle haben. Ob das so bleiben wird, ist fraglich."
 news_1941.8.a:0 "Gründlich befragt..."

 news_1941.9.t:0 "Fall von Sewastopol"
 news_1941.9.desc:0 "Die schwer befestigte Stadt Sewastopol, Stützpunkt der sowjetischen Schwarzmeerflotte, ist den Angriffen von [sevastopol_occupier.GetAdjective] endgültig erlegen. \n\nIhr Verlust wird jeden sowjetischen Versuch, das Schwarze Meer zu erobern, erheblich behindern, und der Fall der Stadt wird als bedeutender [sevastopol_occupier.GetAdjective] Sieg angesehen.\n\nAus Berlin wurde bereits ein Erlass erlassen, der besagt, dass die Stadt fortan nach Theoderich dem Großen „Theodorichshafen“ heißen soll."
 news_1941.9.a:0 "Eine beunruhigende Entwicklung ..."

 news_1941.10.t:0 "Rückeroberung Sewastopols"
 news_1941.10.desc:0 "Sewastopol, der ehemalige Stützpunkt der sowjetischen Schwarzmeerflotte, wurde von der UdSSR zurückerobert. Die vorübergehend verbannte Flotte kann nun mit maximaler Effizienz operieren, da ihr Haupthafen wieder geöffnet ist. Es müssen jedoch noch viele Reparaturen durchgeführt werden ..."
 news_1941.10.a:0 "Lassen Sie ihnen ihre Basis ..."

 news_1941.11.t:0 "Fall von Baku"
 news_1941.11.desc:0 "Heute früh besetzten [baku_occupier.GetAdjective]-Truppen erfolgreich die Stadt Baku, ein wichtiges strategisches Ziel im Krieg gegen die Sowjetunion. \n\nDie am Kaspischen Meer gelegene Stadt ist der Schlüssel zum Kaukasus, und ihre zahlreichen Ölfelder werden den deutschen Kriegsanstrengungen mit Sicherheit zugutekommen.\n\nIhre Einnahme versetzt die Achsenmächte in die Lage, den Krieg auf den Nahen Osten und möglicherweise sogar auf Indien auszuweiten."
 news_1941.11.a:0 "Eine beunruhigende Entwicklung ..."

 news_1941.12.t:0 "Rückeroberung Bakus"
 news_1941.12.desc:0 "Nach wochenlangen Kämpfen in den reichen Ölfeldern Bakus hat die Sowjetunion bewiesen, dass ihre Moral besser ist denn je. Sie konnte den Vormarsch der [baku_occupier.GetAdjective] trotz einer Unterzahl von zwei zu eins und in unwegsamem Gelände abwehren. Diese Schlacht wird sich als entscheidend für die sowjetische Panzerproduktion erweisen und die Deutschen in Zukunft sicherlich einen hohen Preis kosten ..."
 news_1941.12.a:0 "Öl? Haben sie auch keine Demokratie?"

 news_1941.13.t:0 "Fall von Pearl Harbor"
 news_1941.13.desc:0 "Japanische Streitkräfte haben Honolulu, die größte Stadt auf der hawaiianischen Insel O&#39;ahu, gestürmt und eingenommen. Auch der Marinestützpunkt Pearl Harbor, das ehemalige Hauptquartier der US-Pazifikflotte, wurde eingenommen. Augenzeugenberichten zufolge zogen sich bedrängte amerikanische Matrosen und Marines nach Ford Island zurück, wo sie hartnäckigen Widerstand leisteten, bis sie heftigem Artillerie- und Luftangriff ausgesetzt wurden. Mit der Kontrolle dieser Insel hat die Kaiserlich Japanische Marine ihren Einflussbereich noch weiter ausgebaut."
 news_1941.13.a:0 "Eine beunruhigende Entwicklung ..."

 news_1941.14.t:0 "Rückeroberung von Pearl Harbor"
 news_1941.14.desc:0 "Heute, am [GetDateText], wurde Pearl Harbor von der amerikanischen Armee zurückerobert. Es war eine gemeinsame Anstrengung mit einwöchigem Küstenbeschuss durch die Marine und Luftangriffen der Luftwaffe. Die Japaner hielten angesichts der Umstände unglaublich lange durch und verließen die Insel nur zögerlich. Dennoch halten sich noch immer viele Japaner versteckt..."
 news_1941.14.a:0 "Gute Arbeit, Jungs"

 news_1941.15.t:0 "Fall von Manila"
 news_1941.15.desc:0 "Manila, die Hauptstadt der Philippinen, fiel nach dem Abzug der amerikanischen und philippinischen Verteidiger an die Japaner. Der Zugang zur strategisch wichtigen Bucht von Manila blieb nach dem Fall der Stadt aufgrund der starken Konzentration amerikanischer Küstenartillerie auf der Insel Corregidor lange Zeit umkämpft, doch nach einem gezielten japanischen Angriff verstummten die Geschütze schließlich. \n\nNachdem Manila nun unter japanischer Kontrolle ist, dürfte der Rest der Philippinen bald folgen. Dies ist eine herbe Niederlage für die amerikanischen Streitkräfte in Asien und im Pazifik."
 news_1941.15.a:0 "Eine beunruhigende Entwicklung ..."

 news_1941.16.t:0 "Rückeroberung Manilas"
 news_1941.16.desc:0 "Gemeinsame US-amerikanische und philippinische Streitkräfte haben heute die Hauptstadt Manila zurückerobert. Dies war für die japanische Kommandostruktur auf den Philippinen von entscheidender Bedeutung und schwächt deren Macht über die Insel erheblich. Obwohl ihr Einfluss im asiatischen Raum nach wie vor groß ist, wird er zunehmend weniger bedrohlich."
 news_1941.16.a:0 "Trotzdem besteht immer noch eine Bedrohung …"

 news_1941.17.t:0 "Untergang Singapurs"
 news_1941.17.desc:0 "Singapur, das „Gibraltar des Ostens“, wurde von den kaiserlich-japanischen Streitkräften eingenommen, obwohl es von seinen früheren britischen Besitzern als uneinnehmbare Festung angesehen wurde.\n\nDie japanische Militärverwaltung von Singapur hat das Fullerton Building zu ihrem Hauptquartier gewählt und die Stadt in Syonanto umbenannt, was so viel bedeutet wie „Südliche Insel, die im Zeitalter von Showa gewonnen wurde“. Man sieht die Kempeitai in Massen durch die Straßen patrouillieren, um die Botschaft einzuhämmern, dass die Japaner hier bleiben werden."
 news_1941.17.a:0 "Eine beunruhigende Entwicklung ..."

 news_1941.18.t:0 "Rückeroberung Singapurs"
 news_1941.18.desc:0 "So schnell wie Singapur fiel, wurde es auch wieder zurückerobert. Mit einer überwältigenden Streitmacht von über Zehntausenden wurden die Japaner von einer kombinierten indischen, malaiischen und englischen Armee angegriffen. Obwohl ihre Verluste hoch waren, war ihr Sieg erstaunlich. "
 news_1941.18.a:0 "Entwicklung der Taktik ..."

 news_1941.19.t:0 "Fall von Kairo"
 news_1941.19.desc:0 "Truppen des Deutschen Afrikakorps haben sich gemeinsam mit dem italienischen Korps nach Kairo, der Hauptstadt Ägyptens, durchgekämpft. \n\nWährend sich die alliierten Streitkräfte ungeordnet weiter in die Wüste zurückzogen, wurden die durch Kairo marschierenden deutschen Soldaten von vielen Bürgern, die die Briten mittlerweile als Unterdrücker betrachteten, als Befreier gefeiert.\n\nDer Fall Kairos stellt einen erheblichen Verlust für die Kriegsanstrengungen der Alliierten dar, und mehrere Experten spekulieren, dass nun der gesamte Nahe Osten für die Achsenmächte offen steht."
 news_1941.19.a:0 "Eine beunruhigende Entwicklung ..."

 news_1941.20.t:0 "Rückeroberung Kairos"
 news_1941.20.desc:0 "Erwin Rommel – auch bekannt als der „Wüstenfuchs“ – hatte in Nordafrika aufgrund seiner unglaublichen Befehlsgewalt und guten Ausrüstung immer einen Vorteil. Doch dieser Vorteil schwindet nun schnell aufgrund mangelnder Ausrüstung und der überwältigenden alliierten Streitmacht."
 news_1941.20.a:0 "Bedeutet dies das Ende des von den Achsenmächten kontrollierten Afrikas?"

 news_1941.21.t:0 "Untergang Londons"
 news_1941.21.desc:0 "Berichte aus London bestätigen die Einnahme der englischen Hauptstadt durch vorrückende [london_taker.GetAdjective]-Truppen. \n\nAus einigen Bezirken ist noch Kleinwaffenfeuer zu hören, in der Stadt wurden jedoch keine nennenswerten britischen Truppen gesichtet.\n\nEine Abteilung Fallschirmjäger hat den Buckingham Palace gestürmt, doch man geht davon aus, dass die königliche Familie lange vor dem Angriff evakuiert wurde. \n\nZum ersten Mal seit Wilhelm dem Eroberer ist London an einen ausländischen Invasor gefallen."
 news_1941.21.a:0 "Eine beunruhigende Entwicklung ..."

 news_1941.22.t:0 "Rückeroberung Londons"
 news_1941.22.desc:0 "Noch immer werden Brände gelöscht und Gebäude abgerissen, doch den Londonern ist das egal. Nach wochenlangen Kämpfen ist ihre Stadt von der Besatzung der Achsenmächte befreit. Dies ist ein schwerer Rückschlag für die Achsenmächte, und es bleibt abzuwarten, ob sie ihren Brückenkopf in England halten können."
 news_1941.22.a:0 "Also doch nicht so toll wie William …"

 news_1941.23.t:0 "Die Atlantik-Charta"
 news_1941.23.desc:0 "Die Atlantik-Charta war eine zentrale politische Erklärung des Zweiten Weltkriegs, die am 14. August 1941 veröffentlicht wurde und die Ziele der Alliierten für die Nachkriegswelt definierte. Die Staatschefs Großbritanniens und der Vereinigten Staaten verfassten das Werk und alle Alliierten des Zweiten Weltkriegs bestätigten es später. \n\nDie Charta formulierte die idealen Ziele des Krieges: keine territoriale Vergrößerung, keine Gebietsänderungen gegen den Willen des Volkes, Selbstbestimmung, Wiederherstellung der Selbstverwaltung für diejenigen, denen diese verwehrt blieb, Abbau von Handelsbeschränkungen, globale Zusammenarbeit zur Sicherung besserer wirtschaftlicher und sozialer Bedingungen für alle, Freiheit von Furcht und Not, Freiheit der Meere, Verzicht auf Gewaltanwendung und Abrüstung der Aggressornationen."
 news_1941.23.a:0 "Gemeinsam sind wir stark."
 news_1941.23.b:0 "Unsere Feinde kriechen wie Schlangen zusammen ..."
 news_1941.23.c:0 "Ein Hoch auf unsere neuen kapitalistischen Freunde!"
 news_1941.23.d:0 "Wird dies eine Intervention der USA bedeuten?"

 news_1941.24.t:0 "Der Greer-Vorfall"
 news_1941.24.desc:0 "Allem Anschein nach feuerte ein deutsches U-Boot (später als U-652 identifiziert) auf die Greer, kam jedoch zu keinem Kontakt. Als die Nachricht von der Begegnung die Vereinigten Staaten erreichte, war die Öffentlichkeit sehr beunruhigt. Ersten Berichten zufolge half ein britisches Flugzeug bei der Abwehr des Angriffs. Deutschland antwortete darauf, „der Angriff sei nicht von dem deutschen U-Boot ausgegangen; im Gegenteil ... das U-Boot sei mit Wasserbomben angegriffen, in der deutschen Blockadezone kontinuierlich verfolgt und bis Mitternacht mit Wasserbomben beschossen worden.“ Das Kommuniqué implizierte, dass der US-Zerstörer die ersten Wasserbomben abgeworfen hatte. Deutschland warf Präsident Roosevelt vor, „mit allen ihm zur Verfügung stehenden Mitteln zu versuchen, Zwischenfälle zu provozieren, um das amerikanische Volk in den Krieg zu treiben“. "
 news_1941.24.a:0 "Langsam eskaliert es weiter..."
 news_1941.24.b:0 "Die USA provozieren uns gezielt!"
 news_1941.24.c:0 "Ein gefährliches Spiel..."
 news_1941.24.d:0 "Die USA rücken immer näher an den Weltkrieg heran …"

 news_1941.25.t:0 "Die erste Moskauer Konferenz"
 news_1941.25.desc:0 "Am 29. September trafen sich die Staats- und Regierungschefs der Alliierten und der Sowjetunion, um die Bedingungen für die Hilfe für die Sowjetunion im Kampf gegen Nazideutschland zu besprechen. Vertreter der USA war Averell Harriman, Großbritannien wurde von Lord Beaverbrook vertreten. Josef Stalin war sein eigener Vertreter in dieser Angelegenheit. "
 news_1941.25.a:0 "Unsere Zusammenarbeit wird von Tag zu Tag intensiver."
 news_1941.25.b:0 "Sie schließen sich zusammen wie Ratten ..."
 news_1941.25.c:0 "Eine starke Kooperation."

 news_1941.26.t:0 "Der Drama-Aufstand"
 news_1941.26.desc:0 "Nach der Besetzung von Teilen Griechenlands durch Bulgarien brach am 28. September 1941 ein Aufstand aus. Unter Führung des mazedonischen Politbüros der Kommunistischen Partei Griechenlands begann dieser in der Stadt Drama und breitete sich rasch in der gesamten Umgebung aus. In Drama, Doxato, Choristi und vielen anderen Städten und Dörfern kam es zu Zusammenstößen mit den Besatzungstruppen. Am 29. September marschierten bulgarische Truppen in Drama und die anderen aufständischen Städte ein, um den Aufstand niederzuschlagen, und nahmen alle Männer zwischen 18 und 45 Jahren fest. Berichten zufolge richteten sie allein in Drama über 3.000 Menschen hin. Schätzungsweise 15.000 Griechen wurden in den darauffolgenden Wochen von der bulgarischen Besatzungsarmee getötet und auf dem Land wurden ganze Dörfer mit Maschinengewehren beschossen und geplündert. Die meisten Mitglieder des mazedonischen Politbüros der Kommunistischen Partei Griechenlands wurden von den Bulgaren niedergemetzelt, bis auf ein Mitglied."
 news_1941.26.a:0 "Eine tapfere Anstrengung."
 news_1941.26.b:0 "Sie müssen schnell bearbeitet werden."
 news_1941.26.c:0 "Sie kämpfen für ein besseres Leben."

 news_1941.27.t:0 "Der serbische Aufstand"
 news_1941.27.desc:0 "Der Aufstand in Serbien wurde im Juli 1941 von der Kommunistischen Partei Jugoslawiens gegen die deutschen Besatzungstruppen und ihre serbischen Quisling-Hilfstruppen im Gebiet des Militärbefehlshabers in Serbien angezettelt. Zunächst führten die jugoslawischen Partisanen Ablenkungsmanöver und Sabotageakte durch und griffen Vertreter von Aćimovićs Quisling-Regierung an. Ende August schlossen sich einige Tschetniks dem Aufstand an und befreiten Loznica. Der Aufstand erreichte bald Massenausmaße. Partisanen und Tschetniks eroberten Städte, die von schwachen deutschen Garnisonen aufgegeben worden waren. Der bewaffnete Aufstand erfasste bald weite Teile des besetzten Gebiets. Das größte befreite Gebiet im besetzten Europa wurde von den Partisanen in Westserbien geschaffen und war als Republik Užice bekannt."
 news_1941.27.a:0 "Ihr Kampf wird weitergehen."
 news_1941.27.b:0 "Das gerät außer Kontrolle!"
 news_1941.27.c:0 "Sie kämpfen für die Freiheit."

 news_1941.28.t:0 "Montenegrinischer Aufstand"
 news_1941.28.desc:0 "Der Aufstand in Montenegro, allgemein bekannt als der Aufstand des 13. Juli, war ein Aufstand gegen die italienischen Besatzungstruppen in Montenegro. Die Aufständischen wurden von Kommunisten und ehemaligen Offizieren der Königlich Jugoslawischen Armee aus Montenegro angeführt. Einige der Offiziere waren kurz zuvor aus Kriegsgefangenschaftslagern entlassen worden, nachdem sie während der Invasion Jugoslawiens gefangen genommen worden waren. Die Kommunisten leiteten die Organisation und stellten politische Kommissare, während die aufständischen Streitkräfte von ehemaligen Offizieren angeführt wurden. Die gesamte Nation lehnte die von den Besatzern angebotene privilegierte Stellung ab und lehnte die Kapitulation ab, um für Jugoslawien zu kämpfen. Innerhalb von drei Wochen nach Beginn des Aufstands gelang es den Aufständischen, fast ganz Montenegro einzunehmen. Die italienischen Truppen wurden zum Rückzug gezwungen."
 news_1941.28.a:0 "Eine Sache, für die es sich zu sterben lohnt."
 news_1941.28.b:0 "Werden diese Aufstände aufhören?"
 news_1941.28.c:0 "Der Faschismus wird nicht siegen."

 news_1941.50.t:0 "Die Belagerung Leningrads"
 news_1941.50.desc:0 "Die Einnahme Leningrads war eines der drei strategischen Ziele des deutschen Unternehmens Barbarossa und das Hauptziel der Heeresgruppe Nord. Motiviert wurde diese Strategie durch Leningrads politischen Status als ehemalige Hauptstadt Russlands und symbolische Hauptstadt der Russischen Revolution, seine militärische Bedeutung als Hauptstützpunkt der sowjetischen Baltischen Flotte und seine industrielle Stärke mit zahlreichen Rüstungsfabriken. Bis 1939 war die Stadt für 11 % der gesamten sowjetischen Industrieproduktion verantwortlich. \n\nBerichten zufolge war Adolf Hitler so zuversichtlich, Leningrad einnehmen zu können, dass er Einladungen zu den Siegesfeierlichkeiten im Hotel Astoria drucken ließ."
 news_1941.50.a:0 "Wir müssen unseren Waffenbrüdern helfen!"
 news_1941.50.b:0 "Es wird ein siegreicher Kampf!"
 news_1941.50.c:0 "Wir müssen unsere Stadt verteidigen!"
 news_1941.50.d:0 "Eine beunruhigende Entwicklung ..."

 news_1941.51.t:0 "Der Winter kommt..."
 news_1941.51.desc:0 "Der erste Schnee ist zu sehen. Der russische Winter, bekannt als einer der Gründe für Napoleons Niederlage im Jahr 1812, hat begonnen. Ein weiterer Faktor, der militärische Manöver beeinträchtigt, ist die „Rasputiza“, auch bekannt als „allgemeiner Schlamm“. Dieses Phänomen tritt in Russland bei herbstlichen Regenfällen und Tauwetter im Frühjahr auf und erschwert den Transport auf unbefestigten Straßen."
 news_1941.51.a:0 "Darauf sind wir nicht vorbereitet!"

 news_1941.52.t:0 "Der Winter kommt..."
 news_1941.52.desc:0 "Der erste Schnee ist zu sehen. Der russische Winter, bekannt als einer der Gründe für Napoleons Niederlage im Jahr 1812, hat begonnen. Ein weiterer Faktor, der militärische Manöver beeinträchtigt, ist die „Rasputiza“, auch bekannt als „allgemeiner Schlamm“. Dieses Phänomen tritt in Russland bei herbstlichen Regenfällen und Tauwetter im Frühjahr auf und erschwert den Transport auf unbefestigten Straßen."
 news_1941.52.a:0 "Dies wird der Wendepunkt sein!"

 news_1941.53.t:0 "Das Massaker von Nikolaev"
 news_1941.53.desc:0 "Das Massaker von Nikolajew war ein Massaker während des Zweiten Weltkriegs, bei dem vom 16. bis 30. September 1941 35.782 Sowjetbürger, die meisten von ihnen Juden, ums Leben kamen. Es ereignete sich in und um die Stadt Mykolajiw (auch bekannt als Nikolajew) und die benachbarte Stadt Cherson in der heutigen Südukraine (damals UdSSR). Das Massaker wurde von deutschen Truppen der Einsatzgruppe D unter dem Kommando von Otto Ohlendorf verübt. Die Tötungen wurden größtenteils von denselben Truppen verübt, die auch das Massaker von Babi Jar verübt hatten. Die Opfer wurden gezählt und in einem Dokument der Einsatzgruppe vom 2. Oktober 1941 als „Juden und Kommunisten“ beschrieben."
 news_1941.53.a:0 "Diese armen Leute ..."
 news_1941.53.b:0 "Der Führer wird sich freuen..."

 news_1941.54.t:0 "Das Massaker von Babi Jar"
 news_1941.54.desc:0 "Die Achsenmächte, hauptsächlich deutsche, besetzten Kiew am 19. September 1941. Zwischen dem 20. und 28. September richteten vom sowjetischen NKWD platzierte Sprengsätze in der Stadt große Schäden an; am 24. September erschütterte eine Explosion das Hauptquartier der Heeresgruppe Süd. Zwei Tage später, am 26. September, trafen sich Generalmajor Kurt Eberhard, der Militärgouverneur, und SS-Obergruppenführer Friedrich Jeckeln, der SS- und Polizeiführer, im Hauptquartier der Heeresgruppe Süd. Dort beschlossen sie die Vernichtung der Juden Kiews und gaben an, dies sei eine Vergeltung für die Explosionen. Ebenfalls anwesend waren SS-Standartenführer Paul Blobel, Kommandeur des Sonderkommandos 4c, und sein Vorgesetzter, SS-Brigadeführer Dr. Otto Rasch, Kommandeur der Einsatzgruppe C."
 news_1941.54.a:0 "Wie können sie damit leben?"
 news_1941.54.b:0 "Wir tun Gottes Werk"

 news_1941.100.t:0 "Der Waffenstillstand von Saint Jean d&#39;Acre"
 news_1941.100.desc:0 "Am 10. Juli, als die australische 21. Brigade kurz vor dem Einmarsch in Beirut stand, strebten die Vichy-Verteidiger einen Waffenstillstand an. Am 12. Juli, eine Minute nach Mitternacht, trat ein Waffenstillstand in Kraft und beendete den Feldzug. Der Waffenstillstand von Saint Jean d&#39;Acre (auch bekannt als „Konvention von Acre“) wurde am 14. Juli in der Sidney-Smith-Kaserne am Rande der Stadt Acre unterzeichnet. Dies war ein wichtiger Sieg für die Alliierten, die nun wieder die volle Kontrolle über die ehemalige französische Kolonie hatten."
 news_1941.100.a:0 "Gut gemacht, Jungs!"
 news_1941.100.b:0 "Wir müssen unsere anderen Gebiete verteidigen!"
 news_1941.100.c:0 "Wie lange kann sich das Vichy-Regime noch halten?"

 news_1941.150.t:0 "Der Angriff auf Pearl Harbor"
 news_1941.150.desc:0 "Am 7. Dezember griff das japanische Kaiserreich Pearl Harbor an. Bei dem japanischen Angriff auf Pearl Harbor wurden fast 20 amerikanische Schiffe und über 300 Flugzeuge außer Gefecht gesetzt oder zerstört. Trockendocks und Flugplätze wurden ebenfalls zerstört. Vor allem aber kamen 2.403 Matrosen, Soldaten und Zivilisten ums Leben, etwa 1.000 Menschen wurden verletzt. Am Tag nach dem Angriff hielt Roosevelt vor einer gemeinsamen Sitzung des Kongresses seine berühmte „Infamy Speech“, in der er eine formelle Kriegserklärung an das japanische Kaiserreich forderte. Der Kongress kam seiner Forderung weniger als eine Stunde später nach. Der Angriff war für alle Alliierten im Pazifikkrieg ein erster Schock. Weitere Verluste verschlimmerten diesen alarmierenden Rückschlag. Nur Stunden später griff Japan die Philippinen an."
 news_1941.150.a:0 "Gut, dass wir einen Nichtangriffspakt haben …"
 news_1941.150.b:0 "Unseren Verbündeten geht es gut!"
 news_1941.150.c:0 "Wir sind nicht aufzuhalten!"
 news_1941.150.d:0 "Sie sind unbesiegbar!"
 news_1941.150.e:0 "Eine furchterregende Machtdemonstration ..."

 news_1941.200.t:0 "Peru-Ecuadorianischer Krieg"
 news_1941.200.desc:0 "1936 wurde ein Abkommen unterzeichnet, das die Gebiete anerkannte, die sich de facto im Besitz beider Länder befanden. 1938 kam es jedoch erneut zu kleineren Grenzscharmützeln zwischen beiden Nationen. In Quito kam es zu öffentlichen Demonstrationen, bei denen die Menschen „Nieder mit Peru! Lang lebe Ecuador!“ skandierten. Perus Außenminister Carlos Concha reagierte auf die Ereignisse in Ecuador mit den Worten: „In Peru haben wir noch nicht den Kopf verloren, und die Regierungschefs müssten völlig verrückt sein, um an Krieg zu denken.“ Am 11. Januar 1941 ordnete der peruanische Präsident unter dem Vorwurf, die Ecuadorianer hätten Einfälle durchgeführt, die Bildung der Nordgruppe an, einer Militäreinheit, die für das nördliche Operationsgebiet zuständig war. Am 5. Juli wurde der Krieg erklärt."
 news_1941.200.a:0 "Wir werden sie niederstrecken!"
 news_1941.200.b:0 "Wir müssen uns um unsere Verteidigung kümmern!"
 news_1941.200.c:0 "Wen interessiert schon Südamerika?"

############### USA EVENTS ###################
 USA_1941.1.t:0 "Schützt Island"
 USA_1941.1.d:0 "Als Dänemark den einfallenden deutschen Truppen zum Opfer fiel, versuchte Großbritannien im Rahmen seiner Seeblockade, strenge Exportkontrollen gegen Island zu verhängen und so lukrative Lieferungen nach Deutschland zu verhindern. London bot Island Hilfe an und bemühte sich um eine Zusammenarbeit „als Kriegspartei und Verbündeter“, doch Reykjavik lehnte ab und bekräftigte seine Neutralität. Die deutsche diplomatische Präsenz in Island und die strategische Bedeutung der Insel beunruhigten die Briten. Nach einigen gescheiterten Versuchen, die isländische Regierung auf diplomatischem Wege zum Beitritt zu den Alliierten und zur Beteiligung am Krieg gegen die Achsenmächte zu bewegen, marschierten die Briten am 10. Mai 1940 in Island ein. Wir müssen versuchen, die Neutralität des Landes wiederherzustellen."
 USA_1941.1.a:0 "Wir werden dich beschützen!"

 USA_1941.100.t:0 "Übertragung von Island"
 USA_1941.100.d:0 "Die Vereinigten Staaten von Amerika haben angeboten, die strategisch wichtige Insel Island zu schützen. Wir sind mit Gewalt einmarschiert, auch weil die Regierung unsere Einladung zur Mitgliedschaft in den Bündnissen nicht angenommen hat. Was sollten wir tun?"
 USA_1941.100.a:0 "Übertragen Sie die Insel."
 USA_1941.100.b:0 "Wir werden seine Verteidiger sein."

 USA_1941.2.t:0 "Übertragung von Island"
 USA_1941.2.d:0 "Als Dänemark den einfallenden deutschen Truppen zum Opfer fiel, versuchte Großbritannien im Rahmen seiner Seeblockade, strenge Exportkontrollen gegen Island zu verhängen und so lukrative Lieferungen nach Deutschland zu verhindern. London bot Island Hilfe an und bemühte sich um eine Zusammenarbeit „als Kriegspartei und Verbündeter“, doch Reykjavik lehnte ab und bekräftigte seine Neutralität. Die deutsche diplomatische Präsenz in Island und die strategische Bedeutung der Insel beunruhigten die Briten. Nach einigen gescheiterten Versuchen, die isländische Regierung auf diplomatischem Wege zum Beitritt zu den Alliierten und zur Beteiligung am Krieg gegen die Achsenmächte zu bewegen, marschierten die Briten am 10. Mai 1940 in Island ein. Heute liegt die Verteidigung Islands in den Händen der Vereinigten Staaten."
 USA_1941.2.a:0 "Wieder einmal neutral."

 USA_1941.3.t:0 "Übertragung von Island"
 USA_1941.3.d:0 "Nach harten Verhandlungen hat Großbritannien unser Angebot angenommen! Sie haben uns den Inselstaat übertragen und von nun an werden wir seine Beschützer sein."
 USA_1941.3.a:0 "Wir werden Sie gut bedienen."

 USA_1941.200.t:0 "Übertragung von Island"
 USA_1941.200.d:0 "Nach harten Verhandlungen hat Großbritannien unser Angebot abgelehnt! Sie haben sich geweigert, den Inselstaat unter unseren Schutz zu stellen. Es scheint, als würden sie Abstand zu uns suchen."
 USA_1941.200.a:0 "Dann werden wir auch unseren Abstand wahren..."

 USA_1941.4.t:0 "Die Atlantik-Charta"
 USA_1941.4.d:0 "Angesichts der Bedrohung unserer Marine und unserer Bevölkerung erscheint es ratsam, eine Art Basisbündnis mit Großbritannien anzustreben. Sollten wir den ersten Schritt unternehmen?"
 USA_1941.4.a:0 "Ja, es ist von enormer Bedeutung."
 USA_1941.4.b:0 "Nein. Sie haben uns schon einmal verraten."

 USA_1941.5.t:0 "Die Atlantik-Charta"
 USA_1941.5.d:0 "Heute haben uns die Vereinigten Staaten ein Angebot unterbreitet. Sie sind bereit, ein Dokument mit gemeinsamen Grundsätzen und Hoffnungen für eine friedliche Nachkriegswelt zu unterzeichnen. Sollten wir uns darauf einlassen?"
 USA_1941.5.a:0 "Ja, es ist von enormer Bedeutung."
 USA_1941.5.b:0 "Nein. Wir werden das alleine machen."


 USA_1941.6.t:0 "Großbritannien hat unsere Anfrage angenommen"
 USA_1941.6.d:0 "Nachdem wir unsere Botschaft der friedlichen Zusammenarbeit übermittelt hatten, nahm Großbritannien unser Angebot dankbar an. Es scheint, als ob dort noch immer an gegenseitige Hilfe geglaubt wird."
 USA_1941.6.a:0 "Eine große Bedrohung liegt vor uns."

 USA_1941.7.t:0 "Großbritannien lehnte unseren Antrag ab"
 USA_1941.7.d:0 "Nachdem wir unsere Botschaft der friedlichen Zusammenarbeit übermittelt hatten, lehnte Großbritannien das Angebot brüsk ab. Es scheint, als wolle man die Hilfe der Vereinigten Staaten von Amerika nicht."
 USA_1941.7.a:0 "Sie werden es alleine schaffen."

 USA_1941.8.t:0 "Die Atlantik-Charta"
 USA_1941.8.d:0 "US-Präsident Franklin D. Roosevelt und der britische Premierminister Winston Churchill entwarfen die Atlantik-Charta auf der Atlantikkonferenz in Placentia Bay, Neufundland. Sie veröffentlichten sie als gemeinsame Erklärung am 14. August 1941 auf dem Marinestützpunkt Argentia.\nDie acht Hauptpunkte der Charta waren: \nWeder die Vereinigten Staaten noch das Vereinigte Königreich sollten territoriale Gewinne anstreben. Territoriale Anpassungen müssen im Einklang mit den Wünschen der betroffenen Völker erfolgen. Alle Völker haben ein Recht auf Selbstbestimmung. Handelsschranken müssen abgebaut werden. Es sollte eine globale wirtschaftliche Zusammenarbeit und die Förderung des sozialen Wohlergehens geben. Die Teilnehmer würden sich für eine Welt ohne Not und Furcht einsetzen. Die Teilnehmer würden sich für die Freiheit der Meere einsetzen. Aggressornationen sollten entwaffnet werden und nach dem Krieg sollte eine gemeinsame Abrüstung stattfinden."
 USA_1941.8.a:0 "Ein interessantes Angebot."

############### MINOR EVENTS ###################
 minor_1941.1.t:0 "Ecuadorianisch-Peruanischer Krieg"
 minor_1941.1.d:0 "Ecuador ist rechtmäßiger Eigentümer des peruanischen Tons. Es ist Zeit, dieses Unrecht wiedergutzumachen."
 minor_1941.1.a:0 "Erklären Sie den Krieg."
 minor_1941.2.t:0 "Ecuador kapituliert!"
 minor_1941.2.d:0 "Das feige Land Ecuador hat sich unseren überwältigenden Streitkräften ergeben. Wir haben den Staat Pastaza in den Kämpfen eingenommen."
 minor_1941.2.a:0 "Unterschreiben Sie den Vertrag."
 minor_1941.3.t:0 "Drama-Aufstand"
 minor_1941.3.d:0 "Der Drama-Aufstand war ein Aufstand der Bevölkerung der nordgriechischen Stadt Drama und der umliegenden Dörfer am 28. und 29. September 1941 gegen das bulgarische Besatzungsregime. Dem Aufstand fehlten Organisation und militärische Mittel, und wir sollten in der Lage sein, ihn rasch niederzuschlagen. "
 minor_1941.3.a:0 "Wir werden uns schnell darum kümmern ..."
############### GERMANY EVENTS ###################
 germany_1941.1.t:0 "Gründung der Regierung der Nationalen Rettung"
 germany_1941.1.d:0 "Die Regierung der Nationalen Rettung, auch Nedić-Regime genannt, war nach der Kommissarregierung die zweite serbische Marionettenregierung, die während des Zweiten Weltkriegs auf dem Gebiet des deutschen Militärbefehlshabers in Serbien errichtet wurde. Sie wurde vom deutschen Militärbefehlshaber in Serbien ernannt und war vom 29. August 1941 bis Oktober 1944 im Amt. Sie wurde ursprünglich eingesetzt, weil die vorherige Regierung nicht über die Mittel verfügte, die kommunistischen Partisanen zu kontrollieren."
 germany_1941.1.a:0 "Setzen Sie die Regierung der Nationalen Rettung ein"
 germany_1941.2.t:0 "Massaker von Nikolajew"
 germany_1941.2.d:0 "Nach unserer Ankunft in der Ukraine stießen wir auf enormen Widerstand der Sowjetunion. Sie sprengten Städte und setzten an allen möglichen Fronten die Taktik der verbrannten Erde ein. Geheimdienstberichte deuten darauf hin, dass in der Stadt Nikolajew viele Juden und Kommunisten leben. Die Einsatzgruppe D unter dem Kommando von Otto Ohlendorf ordnete ihre Hinrichtung an."
 germany_1941.2.a:0 "Waren sie alle Juden und Kommunisten?"

 germany_1941.3.t:0 "Massaker von Babi Jar"
 germany_1941.3.d:0 "Die Stadt Babi Jar liegt am Stadtrand von Kiew in der von den Nazis besetzten Ukraine. \nSonderkommandos der SS bereiteten sich darauf vor, Adolf Hitlers Befehl auszuführen und alle dort befindlichen Juden und sowjetischen Beamten zu vernichten. Ab dem 29. September wurden mehr als 30.000 Juden in kleinen Gruppen in die Schlucht von Babi Jar nördlich der Stadt getrieben und dort ermordet."
 germany_1941.3.a:0 "Schrecklich."
 germany_1941.4.t:0 "Das Volk der Ukraine"
 germany_1941.4.desc:0 "Als wir in die Ukraine kamen, feierte uns das ukrainische Volk als seine Retter. Von der Sowjetunion schwer unterdrückt, gezielt ausgehungert, massakriert und mehr, sahen sie das Deutsche Reich als ihren Befreier. Mit der kürzlich erfolgten Besetzung des ukrainischen Bodens mussten die Besatzer ihre Politik gegenüber den Ukrainern neu ausrichten. Viele Menschen, wie Slawen und Juden, gelten in den Augen des deutschen Volkes als „unwürdig“, und das deutsche Volk könnte sich gegen uns wenden, wenn wir nicht überzeugend handeln."
 germany_1941.4.a:0 "Geben Sie den Befehl."
 germany_1941.5.t:0 "Aufstand in Serbien"
 germany_1941.5.d:0 "Der Aufstand in Serbien wurde im Juli 1941 von der Kommunistischen Partei Jugoslawiens gegen die deutschen Besatzungstruppen und ihre serbischen Quisling-Hilfstruppen im Gebiet des Militärbefehlshabers in Serbien begonnen. Zunächst hatten die jugoslawischen Partisanen Ablenkungsmanöver und Sabotageakte durchgeführt und Vertreter von Acimovics Quisling-Regierung angegriffen. Ende August schlossen sich einige Tschetniks dem Aufstand an und befreiten Loznica. Der Aufstand erreichte bald Massenausmaße. \n\nPartisanen und Tschetniks eroberten Städte, die von schwachen deutschen Garnisonen aufgegeben worden waren. Der bewaffnete Aufstand erfasste bald weite Teile des besetzten Gebiets. Das größte befreite Gebiet im besetzten Europa wurde von den Partisanen in Westserbien geschaffen und war als Republik Uzice bekannt. Die Rebellen teilten sich die Macht im befreiten Gebiet; das Zentrum des von den Partisanen befreiten Gebiets war Uzice, und die Tschetniks hatten ihr Hauptquartier auf Ravna Gora."
 germany_1941.5.a:0 "Wir müssen gegen diese Bauern vorgehen."
 germany_1941.6.t:0 "Aufstand in Montenegro"
 germany_1941.6.d:0 "Durch den Zusammenbruch der jugoslawischen Armee hatte die Bevölkerung Montenegros leichten Zugang zu großen Mengen an militärischen Waffen und Munition. Im Juli 1941 hatte die Kommunistische Partei Jugoslawiens über 1.800 Mitglieder und weitere 3.000 junge Mitglieder in Montenegro, Kotor und Sandschak. Die meisten von ihnen waren bereit, einen bewaffneten Aufstand gegen die Achsenmächte und insbesondere die italienischen Besatzer zu beginnen. Beschwerden betrafen vor allem die Vertreibung der Montenegriner aus dem Kosovo und der Vojvodina sowie den Zustrom von Flüchtlingen aus anderen Teilen Jugoslawiens. Andere Flüchtlinge flohen vor dem Terror der Ustascha in den Grenzgebieten zu Bosnien und Herzegowina. \n\n Auslöser des Aufstands war jedoch die Proklamation des wiederhergestellten Königreichs Montenegro unter einem italienischen Regenten und dem montenegrinischen Separatisten Sekula Drljević und seinen Anhängern, den sogenannten „Grünen“, angeführt. Diese Proklamation wurde vom italienischen Außenministerium verkündet und der von Italien einberufenen Versammlung montenegrinischer Separatisten am 12. Juli 1941 vorgelegt. Der Aufstand brach am folgenden Tag aus."
 germany_1941.6.a:0 "Ist das nicht italienischer Ton?"
############### JAPAN EVENTS ###################
 JAP_1941.1.t:0 "Angriff auf Pearl Harbor"
 JAP_1941.1.d:0 "Heute stehen wir an einem Wendepunkt. Das japanische Kaiserreich wird heute gegen die Vereinigten Staaten von Amerika vorgehen. Wir werden zeigen, dass man mit uns nicht spaßen kann, und wir werden unsere Vorherrschaft in Asien sichern. Wir werden die riesigen Ölfelder sichern und die amerikanischen Dreckskerle vertreiben."
 JAP_1941.1.a:0 "Für den Kaiser!"
JAP_1941.1.b:0 "Wir werden Amerika vorerst verschonen …"
 JAP_1941.2.t:0 "Japan bittet um unsere Unterstützung"
 JAP_1941.2.d:0 "Nach Japans gewagtem Angriff auf die Amerikaner baten sie uns als unsere Waffenbrüder um Unterstützung in ihrem Kampf. Wir würden dem Dreimächtepakt gerecht werden, wenn wir ihnen helfen würden."
 JAP_1941.2.a:0 "Es war nur eine Frage der Zeit ..."
 JAP_1941.3.t:0 "Invasion von Siam"
 JAP_1941.3.d:0 "Seit der Gründung unseres Eroberungsziels Asien hatten wir stets ein Auge auf eines der wichtigsten Länder geworfen: Thailand. Als die japanische Regierung jedoch um militärischen Zugang bat, lehnten sie unsere Anfrage ab. Uns bleibt keine andere Wahl als anzugreifen, da sie die für unsere Invasionspläne wichtige Infrastruktur kontrollieren."
 JAP_1941.3.a:0 "Befehlen Sie die Invasion."
 JAP_1941.4.t:0 "Siam bietet Waffenstillstand an"
 JAP_1941.4.d:0 "Trotz ihres tapferen Kampfes haben die Siamesen nach fünf Stunden Kampf unvorstellbare Verluste erlitten. Sie streben einen Waffenstillstand an, um ein angemessenes Friedensabkommen zu erreichen."
 JAP_1941.4.a:0 "Ja, wir können ihre Häfen gut nutzen …"
 JAP_1941.4.b:0 "Nein, wir werden uns durch Stahl durchsetzen!"
############### ENGLAND EVENTS ###################
 ENG_1941.1.t:0 "Operation Antlitz"
 ENG_1941.1.d:0 "Viele Jahrzehnte lang pflegten der Iran und das Deutsche Reich enge Beziehungen, teilweise als Gegengewicht zu den imperialen Ambitionen Großbritanniens, des Russischen Reichs und später der Sowjetunion. Der Handel mit Deutschland war für den Iran attraktiv, da die Deutschen im Gegensatz zu den Briten und Russen keine imperialistische Geschichte in der Region hatten. Iranische Botschaften in von Deutschen besetzten europäischen Hauptstädten retteten über 1.500 Juden und verliehen ihnen heimlich die iranische Staatsbürgerschaft, sodass sie in den Iran auswandern konnten. Die Briten begannen, den Iran zu beschuldigen, den Nationalsozialismus zu unterstützen und prodeutsch zu sein. Obwohl Reza Schah zu Beginn des Zweiten Weltkriegs seine Neutralität erklärte, gewann der Iran für die britische Regierung an strategischer Bedeutung, da diese befürchtete, die Abadan-Raffinerie könnte in deutsche Hände fallen; die Raffinerie, die 1940 acht Millionen Tonnen Öl produzierte, war ein entscheidender Teil der Kriegsanstrengungen der Alliierten. \n\nNach der Operation Barbarossa, dem deutschen Überfall auf die Sowjetunion im Juni 1941, wurden Großbritannien und die Sowjetunion formelle Verbündete, was einer alliierten Invasion weiteren Auftrieb gab. Während die deutsche Armee stetig in die Sowjetunion vorrückte, war der Persische Korridor, der durch die Transiranische Eisenbahn gebildet wurde, für die Alliierten eine der einfachsten Möglichkeiten, die Sowjets im Rahmen des Leih- und Pachtgesetzes mit Nachschub aus den USA per Seeweg zu versorgen. Britische und sowjetische Planer erkannten die Bedeutung dieser Eisenbahnlinie und versuchten, sie zu kontrollieren. Da zunehmende U-Boot-Angriffe und Wintereis Konvois nach Archangelsk gefährlich machten, wurde die Eisenbahn zu einer zunehmend attraktiven Route."
 ENG_1941.1.a:0 "Feuern Sie den Befehl ab!"
############### SOVIET EVENTS ###################
 SOV_1941.1.t:0 "Stalin fordert die Verbrannte Erde"
 SOV_1941.1.d:0 "Als Deutschland im Juni 1941 die Sowjetunion angriff, ergriffen viele Bezirksregierungen die Initiative und begannen eine Politik der „verbrannten Erde“, um den Invasoren den Zugang zu Elektrizität, Telekommunikation, Eisenbahn und Industrie zu verwehren. Teile des Telegrafennetzes wurden zerstört, einige Eisenbahn- und Straßenbrücken gesprengt, die meisten Generatoren durch die Demontage wichtiger Komponenten sabotiert und viele Bergwerke zum Einsturz gebracht. Stalin hat heute den offiziellen Befehl zur umfassenden Umsetzung der „verbrannten Erde“ gegeben. Jeder Bauernhof soll brennen und jedes Haus soll brennen!"
 SOV_1941.1.a:0 "Für unsere Kameraden!"
 SOV_1941.2.t:0 "Der Große Vaterländische Krieg"
 SOV_1941.2.d:0 "Um die Moral unseres Volkes zu stärken, nennen einige Zeitungen den Krieg inzwischen den Großen Vaterländischen Krieg. Er hat den Kampfeswillen unserer Männer enorm gestärkt und die Flamme unseres Glaubens neu entfacht. Wir werden das Deutsche Reich besiegen. Wir werden siegen."
 SOV_1941.2.a:0 "Für das Vaterland!"

 SOV_1941.3.t:0 "Verteidigung von Stalingrad"
 SOV_1941.3.d:0 "Die Invasion unseres Landes hat die Einheit unseres Landes wiederhergestellt. Mehrere nationalistische Einheiten haben sich in Stalingrad erhoben und werden bis zum Ende kämpfen, um unsere Stadt zu schützen!"
 SOV_1941.3.a:0 "Bilden Sie die Divisionen"
 SOV_1941.3.a.tt:0 "Erzeugt Divisionen entlang der Wolga."
 SOV_1941.4.t:0 "Die Sibirier sind angekommen!"
 SOV_1941.4.d:0 "Da die Bedrohung durch Japan kein Thema mehr ist, müssen wir diese Einheiten sofort an die Front schicken und Moskau vor der faschistischen Bedrohung schützen. Diese Einheiten sind Eliteeinheiten, die im Gebirgs- und Schneekampf ausgebildet sind und dem Deutschen Reich zweifellos ohne Angst gegenübertreten werden."
 SOV_1941.4.a:0 "Erteilen Sie die Bestellung"
 SOV_1941.4.a.tt:0 "Bringt 18 Infanteriedivisionen, 3 Panzerdivisionen und 14 Gebirgsdivisionen in der Nähe von Jaroslawl hervor."

 SOV_1941.5.t:0 "Extra Russisch Schwierigkeit"
 SOV_1941.5.d:0 "Sehen Sie, Genosse Deutschland ist KI. Deutschland ist dumm. Wie bekämpfen wir Dummheit, fragen Sie sich vielleicht, Genosse. Wir sorgen für noch mehr Dummheit. Sie haben die Entscheidung getroffen, dem Deutschen Reich zusätzliche Divisionen im Osten zu geben."
 SOV_1941.5.a:0 "Ja, Genosse, ich will noch mehr Dummheiten."
 SOV_1941.5.b:0 "Ich will einen fortgeschrittenen, dummen Kameraden."
 SOV_1941.5.c:0 "Ich bin selbst dumm genug und betrachte mich nicht als Sowjet."
 SOV_1941.5.a.tt:0 "Erzeugt eine enorme Anzahl an Divisionen für Deutschland.\n"
 SOV_1941.5.b.tt:0 "Erzeugt eine enorme Menge an Divisionen für Deutschland und gibt das Ereignis erneut.\n"
 SOV_1941.5.c.tt:0 "Erzeugt keine Divisionen für Deutschland. Wählen Sie diese Option, wenn Sie mit der aktuellen Anzahl an Divisionen zufrieden sind."
############### VICHY EVENTS ###################
 EFR_1941.1.t:0 "Waffenstillstand im Libanon"
 EFR_1941.1.d:0 "Nach heftigen Kämpfen ist klar geworden, dass wir im Libanon nicht an unserem Boden festhalten können. Es ist Zeit für eine Einigung."
 EFR_1941.1.a:0 "Senden Sie die Nachricht!"
 EFR_1941.2.t:0 "Waffenstillstand im Libanon"
 EFR_1941.2.d:0 "Die Vichy-Verteidiger des Libanon sind mit einem Abkommen zu uns gekommen. Sie streben einen Waffenstillstand an, da sie erkannt haben, dass sie unserer Macht nicht Paroli bieten können."
 EFR_1941.2.a:0 "Auf Nimmerwiedersehen."
 
 ww1_finland.9.t:0 "Moskauer Friedensvertrag"
 ww1_finland.9.d:0 "Der Moskauer Friedensvertrag wurde am 12. März 1940 in Moskau unterzeichnet. Ein Waffenstillstand trat am nächsten Tag um 12 Uhr Leningrader Zeit bzw. 11 Uhr Helsinkier Zeit in Kraft. Damit trat Finnland einen Teil Kareliens, die gesamte Karelische Landenge und Land nördlich des Ladogasees ab. Das Gebiet umfasste Finnlands viertgrößte Stadt Wyborg, einen Großteil des finnischen Industriegebiets und bedeutende Gebiete, die sich noch immer in finnischer Militärbesitz befanden – insgesamt 11 Prozent des Territoriums und 30 Prozent des Wirtschaftsvermögens des Vorkriegsfinnlands. Zwölf Prozent der finnischen Bevölkerung, 422.000 bis 450.000 Karelier, wurden evakuiert und verloren ihre Häuser. Finnland trat einen Teil der Region Salla, die Halbinsel Rybachy in der Barentssee und vier Inseln im Finnischen Meerbusen ab. Die Halbinsel Hanko wurde der Sowjetunion für 30 Jahre als Militärstützpunkt verpachtet. Die Region Petsamo, die während des Krieges von der Roten Armee erobert wurde, wurde gemäß dem Vertrag an Finnland zurückgegeben. Eine Zeichnung zeigt, dass die Finnen einen kleinen Teil der Halbinsel Rybachy und einen Teil von Salla im finnischen Lappland abtraten; und ein Teil von Karelien und die Inseln des Finnischen Meerbusens im Süden sowie ein Pachtgebiet für die Halbinsel Hanko im Südwesten Finnlands. Die finnischen Zugeständnisse und Gebietsverluste übertrafen die sowjetischen Vorkriegsforderungen. Vor dem Krieg forderte die Sowjetunion, dass die Grenze zwischen der UdSSR und Finnland auf der Karelischen Landenge nach Westen bis zu einem Punkt 30 Kilometer östlich von Wyborg bis zur Linie zwischen Koivisto und Lipola verschoben wird, dass bestehende Befestigungen auf der Karelischen Landenge abgerissen werden und die Inseln Suursaari, Tytärsaari und Koivisto im Finnischen Meerbusen und auf der Halbinsel Rybachy abgetreten werden. Im Gegenzug schlug die Sowjetunion vor, Repola und Porajärvi aus Ostkarelien abzutreten, ein Gebiet, das doppelt so groß war wie die ursprünglich von den Finnen geforderten Gebiete."
 ww1_finland.9.a:0 "Es ist Zeit, diesen Krieg zu beenden"
 
 ww1_finland.10.t:0 "Finnische Guerilla-Taktiken"
 ww1_finland.10.d:0 "In den Schlachten von Ladoga-Karelien bis zum arktischen Hafen Petsamo setzten die Finnen Guerillataktiken ein. Die Rote Armee war zahlenmäßig und materiell überlegen, doch die Finnen nutzten die Vorteile von Geschwindigkeit, Manöverführung und Kräfteökonomie. Insbesondere an der Ladoga-Karelien-Front und während der Schlacht an der Raate-Straße isolierten die Finnen kleinere Teile der zahlenmäßig überlegenen sowjetischen Streitkräfte. Die sowjetischen Streitkräfte wurden in kleinere Gruppen aufgeteilt, die Finnen gingen einzeln gegen sie vor und griffen sie von allen Seiten an."
 ww1_finland.10.a:0 "Nein, Molotoff!"
 
 endsieg_news.263.t:0 "Finnland und die UdSSR unterzeichnen Friedensvertrag"
 endsieg_news.263.d:0 "Heute hat Finnland einen Friedensvertrag mit der Sowjetunion unterzeichnet, der den Winterkrieg offiziell beendet. Die finnischen Zugeständnisse und Gebietsverluste übertrafen die von den Sowjets vor dem Krieg geforderten Grenzen. Finnland musste etwa die Hälfte Finnisch-Kareliens (mit Finnlands Industriezentrum, darunter Wyborg/Viipuri (Finnlands viertgrößte Stadt) und Käkisalmi, Sortavala und Suojärvi sowie die gesamte Viipuri-Bucht mit ihren Inseln; insgesamt fast 10 % des Territoriums) abtreten, obwohl große Teile noch von der finnischen Armee gehalten wurden. Truppen und verbliebene Zivilisten wurden hastig innerhalb der neuen Grenzen evakuiert; 422.000 Karelier, 12 % der finnischen Bevölkerung, verloren ihr Zuhause."
 endsieg_news.263.a:0 "Der Winterkrieg ist zu Ende"
 
ww2_germany.260.t:0 "Unterzeichnen Sie einen Waffenstillstand mit den Alliierten"
ww2_germany.260.d:0 "Erschöpft und kampfmüde haben die Alliierten Friedensbedingungen verlängert, um das sinnlose Blutbad zu beenden. Die Friedensbedingungen lauten wie folgt: Die Westmächte teilen Europa einschließlich Deutschland mit der Sowjetunion auf. Westeuropa einschließlich Westdeutschland bleibt im alliierten Einflussbereich, Osteuropa und Ostdeutschland im sowjetischen Einflussbereich. Finnland darf neutral bleiben, orientiert sich aber an der sowjetischen Politik. Uns werden keine Kriegsverbrechen zur Last gelegt, und wir dürfen auf dem Gebiet des ehemaligen Österreichs existieren, sofern wir auf alle Landansprüche anderer Staaten verzichten."
ww2_germany.260.a:0 "Besser als nichts, denke ich ..."
 

INT_germany.3.t:0 "Hindenburg übernimmt die Macht!"
INT_germany.3.d:0 ""
INT_germany.3.a:0 "Ich hoffe, er macht keine Dummheiten ..."

