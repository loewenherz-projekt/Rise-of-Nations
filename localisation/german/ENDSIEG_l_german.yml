ww2_germany.143.b:0 "Ich möchte wählen"
ww2_germany.144.t:0 "Vertrag von Gent, die Suezfrage"
ww2_germany.144.d:0 "Wenn wir den Suezkanal selbst einnehmen würden, würde dies die britische Machtprojektion im Mittelmeerraum erheblich schwächen und wir könnten höchstwahrscheinlich keine ernsthafteren Forderungen stellen, auf der anderen Seite hätten wir jedoch eine große Machtposition und könnten den Kanal kontrollieren. \n\n Wenn wir den Suezkanal verlassen, können wir im weiteren Verlauf der Diskussion weitere Forderungen stellen. \n\n Den Türken den Suezkanal zu überlassen, würde das Osmanische Reich zufriedenstellen und die Briten eher bereit machen, das Gebiet abzutreten. Allerdings liegt es in den Händen der Türken, wem es „gehört“. Obwohl sie technisch gesehen unsere Marionette sind, könnten wir bei einem Führungswechsel bedroht sein. \n\n Die Gründung eines unabhängigen Ägypten würde unsere weiteren Forderungen an die Briten erheblich einschränken, jedoch würde dies die gesamte britische Machtprojektion im Mittelmeerraum beseitigen und das ägyptische Sultanat de facto zu einer Marionette des Reiches machen. \n\n Die Übergabe Ägyptens an die Türken würde auch unsere späteren Forderungen einschränken, und wenn unser Bündnis mit den Türken später zerbricht, werden wir keinen dieser Vorteile haben. \n\n Die Eingliederung Ägyptens in unsere Kolonie wäre vielleicht die drastischste Entscheidung, die viel Schande nach sich ziehen und weitere Verhandlungen stark einschränken würde."
ww2_germany.144.a:0 "Suez für uns selbst einnehmen"
ww2_germany.144.b:0 "Gebt den Türken den Suezkanal"
ww2_germany.144.c:0 "Gründung des unabhängigen Ägypten"
ww2_germany.144.dd:0 "Transfer von Ägypten in die Türkei"
ww2_germany.144.e:0 "Keine Zugeständnisse"
ww2_germany.145.t:0 "Suez-Frage beantwortet „Deutschland sagt: Wir nehmen den Suezkanal“"
ww2_germany.145.d:0 "Wir haben uns entschieden, den Suezkanal einzunehmen und den Briten den Rest ihrer ägyptischen Kolonie zu überlassen. Dies wird unsere Seemacht auf See erheblich stärken, aber wir müssen unseren neuen Standort sichern, da die Gefahr einer britischen Invasion nie allzu weit entfernt ist und sie wahrscheinlich rachsüchtig und direkt nebenan sind."
ww2_germany.145.a:0 "Fortfahren"
ww2_germany.145.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.146.t:0 "Suez-Frage beantwortet, Deutschland sagt: „Gebt den Türken den Suezkanal“"
ww2_germany.146.d:0 "Wir haben uns entschieden, den Suezkanal nicht für uns zu beanspruchen, sondern ihn unserem Verbündeten, dem Osmanischen Reich, zu überlassen. Dies würde von den Briten als neutralerer Ansatz angesehen werden. Da die Osmanen jedoch stark unter unserem Einfluss stehen, könnte das Schicksal des Suezkanals in eine andere Richtung gehen, wenn wir uns zerstreiten."
ww2_germany.146.a:0 "Fortfahren"
ww2_germany.146.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.147.t:0 "Suezfrage beantwortet, Deutschland sagt: „Bilden Sie ein unabhängiges Ägypten“"
ww2_germany.147.d:0 "Wir haben uns nicht nur entschlossen, den Suezkanal einzunehmen, sondern die Engländer auch zur Aufgabe ihrer gesamten ägyptischen Kolonie zu zwingen, in der Hoffnung, die Region insgesamt zu sichern. Sie steht nun unter unserem Einfluss als Marionette, und wir müssen keine Invasion einer benachbarten feindlichen Kolonie befürchten. Dies wird jedoch die Menge an weiteren Forderungen, die wir danach stellen können, erheblich einschränken."
ww2_germany.147.a:0 "Fortfahren"
ww2_germany.147.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.148.t:0 "Suez-Frage beantwortet, Deutschland sagt: „Übergeben Sie Ägypten an die Türken“"
ww2_germany.148.d:0 "Angesichts der türkischen Interessen in der Region haben wir beschlossen, die ägyptische Kolonie in türkische Hände zu geben. Aus britischer Sicht wäre dies ein neutralerer Ansatz, da die Kolonie nicht vollständig unter unserer Kontrolle, sondern nur unter unserem Einfluss stünde. Ein Streit mit den Türken könnte jedoch bedeuten, dass Ägypten in feindliche Hände fällt."
ww2_germany.148.a:0 "Fortfahren"
ww2_germany.148.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.149.t:0 "Suez-Frage beantwortet, Deutschland sagt: „Verlasst den Suezkanal“"
ww2_germany.149.d:0 "Wir haben beschlossen, den Suezkanal und Ägypten vollständig unter britischer Kontrolle zu belassen, um anderswo weitere Zugeständnisse zu erwirken."
ww2_germany.149.a:0 "Fortfahren"
ww2_germany.149.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.150.t:0 "Vertrag von Gent, die Suezfrage"
ww2_germany.150.d:0 "Wenn wir den Suezkanal selbst einnehmen würden, würde das die britische Machtprojektion im Mittelmeerraum erheblich schwächen und wir könnten höchstwahrscheinlich keine ernsthafteren Forderungen stellen, auf der anderen Seite hätten wir jedoch eine große Macht und könnten den Kanal kontrollieren. \n\n Wenn wir den Suezkanal verlassen, können wir im weiteren Verlauf der Diskussion weitere Forderungen stellen. \n\n Den Türken den Suezkanal zu überlassen, würde das Osmanische Reich zufriedenstellen und die Briten eher bereit machen, das Gebiet abzutreten. Allerdings liegt es in den Händen der Türken, wem es „gehört“. Obwohl sie technisch gesehen unsere Marionette sind, könnten wir bei einem Führungswechsel bedroht sein. \n\n Die Gründung eines unabhängigen Ägypten würde unsere weiteren Forderungen an die Briten erheblich einschränken, jedoch würde dies die gesamte britische Machtprojektion im Mittelmeerraum beseitigen und das ägyptische Sultanat de facto zu einer Marionette des Reiches machen."
