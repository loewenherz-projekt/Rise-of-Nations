 spain1.1.t:0 "Ermordung von Eduardo Dato e Iradier"
 spain1.1.d:0 "Am 8. März 1921 wurde der spanische Premierminister Eduardo Dato in Madrid auf dem Weg vom Parlamentsgebäude vor die Puerta de Alcalá von drei katalanischen Anarchisten, Luis Nicolau, Pere Mateu und Ramon Casanelles, auf einem Motorrad ermordet. Dies war der zweite Mord an einem spanischen Premierminister innerhalb von weniger als einem Jahrzehnt."
 spain1.1.a:0 "Tragisch"
 spain1.2.t:0 "Gründung der spanischen Fremdenlegion"
 spain1.2.d:0 "Die spanische Fremdenlegion wurde durch ein königliches Dekret von König Alfons XIII. am 28. Januar 1920 gegründet. Kriegsminister José Villalba Riquelme erklärte: „Mit der Bezeichnung ‚Ausländerregiment‘ wird eine bewaffnete Militäreinheit geschaffen, deren Uniformen und Vorschriften für die Rekruten vom Kriegsminister festgelegt werden.“ Die meisten der fünf Bataillone der Legion bestanden jedoch hauptsächlich aus gebürtigen Spaniern, da Ausländer nicht leicht zu rekrutieren waren und die meisten der rekrutierten ausländischen Mitglieder aus Kuba stammten."
 spain1.2.a:0 "Großartig!"
 spain1.3.t:0 "Marokko rebelliert gegen unsere Herrschaft!"
 spain1.3.d:0 "Berberstämme unter der Führung von Mohamed Abd el-Grim führten im Januar 1919 einen Aufstand gegen die spanisch-marokkanische Regierung an. Spanische Truppen besetzten am 15. Januar 1921 Sheshuan und Annoual im Rifgebirge. Berberrebellen griffen am 21. und 22. Juli 1921 den Militärposten Abarran an. Dabei starben General Silvestre und rund 8.000 Regierungssoldaten. Infolge dieses Aufstands gründete Mohamed Abd el-Krim 1922 die Rifrepublik."
 spain1.3.a:0 "Sie werden schon bald genug die Zivilisation sehen ..."
 white.1.t:0 "Koltschak hingerichtet"
 white.1.d:0 "Die Tschechoslowaken versprachen Koltschak freies Geleit zur britischen Militärmission in Irkutsk. Stattdessen wurde er am 14. Januar 1920 den linkssowjetrussischen Behörden in Irkutsk übergeben. Am 20. Januar übergab die Regierung in Irkutsk die Macht an ein bolschewistisches Militärkomitee. Die Weiße Armee unter dem Kommando von General Wladimir Kappel rückte auf Irkutsk vor, während Koltschak vom 21. Januar bis 6. Februar neun Tage lang von einer fünfköpfigen Kommission des Revolutionskomitees (REVKOM) verhört wurde. Trotz eines gegenteiligen Befehls aus Moskau wurde Admiral Koltschak zusammen mit seinem Premierminister Viktor Pepeljajew zum Tode verurteilt. Beide Gefangenen wurden am frühen Morgen des 7. Februar 1920 vor ein Erschießungskommando gebracht. Augenzeugen zufolge war Koltschak völlig ruhig und furchtlos, „wie ein Engländer“. Der Admiral fragte den Kommandeur des Erschießungskommandos: „Wären Sie so freundlich, meiner Frau in Paris eine Nachricht zu schicken und auszurichten, dass ich meinen Sohn segne?“ Der Kommandeur antwortete: „Ich werde sehen, was sich tun lässt, wenn ich es nicht vergesse.“ Ein Priester der russisch-orthodoxen Kirche erteilte beiden Männern die letzte Ölung. Das Kommando feuerte, und beide Männer fielen. Die Leichen wurden mit Füßen getreten und gestoßen einen Abhang hinuntergestoßen und unter dem Eis des zugefrorenen Flusses Angara begraben. Als die Weiße Armee von den Hinrichtungen erfuhr, beschloss ihre verbliebene Führung, sich weiter nach Osten zurückzuziehen. Es folgte der Große Sibirische Eismarsch. Die Rote Armee marschierte erst am 7. März in Irkutsk ein, und erst dann wurde die Nachricht von Koltschaks Tod offiziell bekannt gegeben und der Traum von der Wiederherstellung der Monarchie in Russland zerplatzt."
 white.1.a:0 "Wie schrecklich!"
 white.2.t:0 "Großer sibirischer Eismarsch"
 white.2.d:0 "Nach Alexander Koltschaks Niederlage und seinem anschließenden Rückzug durch Sibirien im Winter 1919/20 (unter der Verfolgung der Roten Armee), der in der Nähe von Irkutsk zum Stillstand kam, erlitt die Weiße Armee enorme Verluste. In Irkutsk angekommen, versuchte sie mit ihrem Besitz und dem gestohlenen Gold aus Kasan über den damals zugefrorenen Baikalsee zu fliehen. Gleichzeitig wehten die arktischen Winde ungehindert über den See, und viele Soldaten und ihre Familien erfroren auf dem See. Im Frühjahr verschwanden die Leichen und ihre Besitztümer im tiefsten See der Welt, und auch Wladimir Kappel, einer der Generäle der Weißen Armee, fiel diesem Tod zum Opfer. Man nimmt an, dass der größte Teil des Zarengoldes hier verschwand und auf den Grund des Sees sank."
 white.2.a:0 "Wir dürfen nicht aufgeben!"
