 WW2_shared_industrialisation:0 "Industrialisierungsbemühungen"
 WW2_shared_industrialisation_desc:0 "Lebensmittel mögen im Alltag unverzichtbar sein, doch der Konsum von Lebensmitteln allein macht ein Land noch nicht groß. Wie Großbritanniens industrielle Revolution gezeigt hat, sind diese sogenannten Industrien heutzutage für die Macht einer Nation von entscheidender Bedeutung."
 WW2_GEN_pre_industrial_path_1:0 "Vorindustrielle Anstrengung I"
 WW2_GEN_pre_industrial_path_1_desc:0 "Wir müssen zunächst die Adligen überwältigen, die große Ländereien besitzen und sehr darauf bedacht sind, den Bankrott aufgrund nicht wettbewerbsfähiger Preise und sowohl faktischer als auch de jure Leibeigenschaft zu verhindern."
 WW2_GEN_pre_industrial_path_2:0 "Vorindustrielle Anstrengung II"
 WW2_GEN_pre_industrial_path_2_desc:0 "Selbst der Durchschnittsbürger ist sich nicht ganz bewusst, wie schlecht er lebt, und protestiert gegen Veränderungen. Wir sollten diese Meinung ändern..."
 WW2_GEN_pre_industrial_path_3:0 "Vorindustrielle Anstrengung III"
 WW2_GEN_pre_industrial_path_3_desc:0 "Nachdem die anfänglichen Hindernisse der Industrialisierung überwunden sind, sollten wir uns nun daran machen, die kleine Industrie – wenn man sie überhaupt so nennen kann – tatsächlich in eine richtige Industrie umzuwandeln."
 WW2_GEN_early_industrial_path_1:0 "Frühe Industriebemühungen I"
 WW2_GEN_early_industrial_path_1_desc:0 "Erstens müssen wir unsere unterschiedlichen Industrien miteinander verknüpfen, und die Eisenbahn ist sicherlich der Weg, dies zu erreichen."
 WW2_GEN_early_industrial_path_2:0 "Frühe Industriebemühungen II"
 WW2_GEN_early_industrial_path_2_desc:0 "Wir müssen die Menschen von ihren alten Ansichten abbringen und sie davon überzeugen, dass die Industrialisierung nicht nur der Nation, sondern dem ganzen Volk zugutekommt! Darüber hinaus sollten wir damit beginnen, der Mehrheit unserer Bevölkerung das Lesen beizubringen..."
 WW2_GEN_early_industrial_path_3:0 "Frühe Industriebemühungen III"
 WW2_GEN_early_industrial_path_3_desc:0 "Da unsere Länder nun miteinander verbunden sind und wir über eine enthusiastischere und gebildetere Bevölkerung verfügen, können wir nun mit der richtigen Industrialisierung unseres Landes beginnen."
 WW2_GEN_basic_industrial_path_1:0 "Grundlegende Industrieanstrengung I"
 WW2_GEN_basic_industrial_path_1_desc:0 "Eine gebildetere Bevölkerung führt zu einem stärkeren Bewusstsein. Die grassierende Unsicherheit, die langen Arbeitszeiten und die unerträglichen Bedingungen in den Fabriken haben dazu geführt, dass viele Menschen bessere Bedingungen am Arbeitsplatz und in der Gesellschaft fordern."
 WW2_GEN_basic_industrial_path_2:0 "Grundlegende Industriebemühungen II"
 WW2_GEN_basic_industrial_path_2_desc:0 "Trotz der positiven Auswirkungen der Industrialisierung gibt es immer noch Menschen, die dadurch arbeitslos werden oder ihre Geschäfte aufgeben müssen. Kaufleute, Bauern, Handwerker und Adlige protestieren gleichermaßen gegen den Fortschritt, denn für sie bedeutet Fortschritt eine Verschlechterung der Lebensbedingungen, des Wohlstands und der Chancen."
 WW2_GEN_basic_industrial_path_3:0 "Grundlegende Industrieanstrengungen III"
 WW2_GEN_basic_industrial_path_3_desc:0 "Da die Menschen in die Städte ziehen und die Lebenshaltungskosten in die Höhe schnellen, können sich die Menschen weniger Kinder leisten. Trotz modernerer und produktiverer Bauernhöfe sind die Mieten immer noch zu hoch!"
 WW2_GEN_basic_industrial_path_4:0 "Grundlegende Industrieanstrengungen IV"
 WW2_GEN_basic_industrial_path_4_desc:0 "Wir verfügen mittlerweile über eine solide industrielle Basis. Die Fabriken selbst sind jedoch wahrscheinlich nicht so effizient und sicher wie in Europa oder den USA. Wir müssen noch an der Entwicklung neuer Technologien und der Standardisierung der Fabriken arbeiten …"
 WW2_GEN_industrial_path_1:0 "Schwerindustrie-Anstrengung I"
 WW2_GEN_industrial_path_1_desc:0 "Werkzeugmaschinen, austauschbare Teile und das Bessemer-Verfahren. All dies sind wichtige Aspekte einer modernen Industrie, die wir so schnell wie möglich umsetzen müssen!"
 WW2_GEN_industrial_path_2:0 "Schwerindustrie II"
 WW2_GEN_industrial_path_2_desc:0 "Das Fließband, eine Idee, die die Produktion rationalisiert und gleichzeitig die Verwaltung von Fabriken vereinfacht hat."
 WW2_GEN_industrial_path_3:0 "Schwerindustrie-Anstrengung III"
 WW2_GEN_industrial_path_3_desc:0 "Elektrizität. Man mag sie zunächst für eine Neuheit halten, doch in Kombination mit der entsprechenden Infrastruktur und Industrie werden wir, bei Gott, in nie dagewesenem Luxus und Licht leben."
 WW2_GEN_industrial_path_4:0 "Schwerindustrie-Anstrengung IV"
 WW2_GEN_industrial_path_4_desc:0 "Jetzt fehlt nur noch ein letzter Anstoß, um einige Vorschriften zu formalisieren und einige Verbesserungen bei den Regierungsabteilungen vorzunehmen. Wir haben unsere Branche nun auf den höchsten Standard modernisiert!"

 #Shared WW2
 shared_army_effort:0 "Armeeeinsatz"
 shared_army_effort_desc:0 "Trotz der zunehmenden Möglichkeiten der Luft- und Seekriegsführung bleibt der Bodenkampf auch in den Kriegen von morgen von zentraler Bedeutung. Mit entsprechender Vorbereitung können wir die Hölle der Schützengräben vermeiden."
 shared_equipment_effort:0 "Geräteaufwand"
 shared_equipment_effort_desc:0 "Die Grenzen der Ausrüstung, die von Infanterie getragen werden kann, werden ständig erweitert. Wir werden uns darauf konzentrieren, unseren Truppen die beste verfügbare Ausrüstung zur Verfügung zu stellen."
 shared_motorization_effort:0 "Motorisierungsbemühungen"
 shared_motorization_effort_desc:0 "Mobilität und Schutz sind entscheidend für den sicheren Transport der Infanterie ins Feld und wieder hinaus. Wenn wir uns auf diese Entwicklungen konzentrieren, können wir schnell handeln."
 shared_doctrine_effort:0 "Lehrbemühungen"
 shared_doctrine_effort_desc:0 "Die militärischen Doktrinen, die den Bodenkampf im Ersten Weltkrieg bestimmten, sind überholt. Wir müssen unsere besten Köpfe mit der Aufgabe betrauen, das militärische Denken von morgen zu gestalten."
 shared_equipment_effort_2:0 "Ausrüstungsaufwand II"
 shared_equipment_effort_2_desc:0 "Wir werden unsere Bemühungen fortsetzen, sicherzustellen, dass unsere Infanterie- und Unterstützungstruppen mit der bestmöglichen Ausrüstung unserer Zeit ausgestattet sind."
 shared_mechanization_effort:0 "Mechanisierungsbemühungen"
 shared_mechanization_effort_desc:0 "Indem wir die Möglichkeiten der motorisierten Infanterie überdenken, können wir die Grenzen der heute konstruierbaren Fahrzeuge erweitern."
 shared_doctrine_effort_2:0 "Lehrbemühung II"
 shared_doctrine_effort_2_desc:0 "Das Schlachtfeld hat sich nicht nur in der Zwischenkriegszeit, sondern auch im Verlauf der jüngsten Konflikte verändert. Wir müssen unsere Doktrinen kontinuierlich neu bewerten, um dies widerzuspiegeln."
 shared_equipment_effort_3:0 "Ausrüstungsaufwand III"
 shared_equipment_effort_3_desc:0 "Anstatt ausländische Ausrüstung zu imitieren oder zu kaufen, sollten wir darauf abzielen, weltweit führend im Bereich Infanteriewaffen zu werden."
 shared_armor_effort:0 "Rüstungsaufwand"
 shared_armor_effort_desc:0 "Indem wir das anwenden, was wir bei der Mechanisierung unserer Infanterie gelernt haben, können wir auch unsere gepanzerten Fahrzeuge verbessern."
 shared_special_forces:0 "Spezialeinheiten"
 shared_special_forces_desc:0 "Wir brauchen Elitetruppen; Gebirgsjäger und Fallschirmjäger sollten unsere Priorität sein."
 shared_aviation_effort:0 "Luftfahrtbemühungen"
 shared_aviation_effort_tt:0 "Nicht genügend Bauplätze für §YAir Base§!"
 shared_aviation_effort_desc:0 "Nirgendwo schreitet der technologische Fortschritt schneller voran als in der Luftkriegsführung. Die Luftfahrt ist ein Gebiet, das jede moderne Nation beherrschen muss."
 shared_fighter_focus:0 "Kämpferfokus"
 shared_fighter_focus_desc:0 "Luftkämpfe haben im Ersten Weltkrieg noch nicht stattgefunden. Wenn wir bei der Entwicklung von Kampfflugzeugen die Nase vorn haben, werden wir auch in Zukunft einen Vorteil haben."
 shared_bomber_focus:0 "Bomberfokus"
 shared_bomber_focus_desc:0 "Wenn die Menschen in Zukunft vom Schrecken der heutigen Kriege sprechen, wird Feuer, das vom Himmel regnet, eine zentrale Rolle spielen. Wir werden unser Bestes tun, um sicherzustellen, dass diese Geschichten auch von unseren Feinden erzählt werden."
 shared_aviation_effort_2:0 "Luftfahrtbemühungen II"
 shared_aviation_effort_2_desc:0 "Um unsere Luftwaffe gut in andere Zweige des Militärs zu integrieren, sind weitere Fortschritte in der Luftfahrt erforderlich."
 shared_CAS_effort:0 "CAS-Aufwand"
 shared_CAS_effort_desc:0 "Eine moderne Armee benötigt nicht nur am Boden, sondern auch in der Luft die Unterstützung durch Fahrzeuge."
 shared_rocket_effort:0 "Raketenanstrengung"
 shared_rocket_effort_desc:0 "Raketen- und Düsentriebwerke ermöglichen sowohl unbemannten als auch bemannten Schiffen beispiellose Geschwindigkeiten. Die Entwicklung dieser Technologien wird es uns ermöglichen, den Feind zu überraschen."
 shared_NAV_effort:0 "NAV-Aufwand"
 shared_NAV_effort_desc:0 "So wie die neue Seekriegsführung teilweise unter der Wasseroberfläche stattfindet, findet ein Teil davon in der Luft über dem Wasser statt."
 shared_naval_effort:0 "Marinebemühungen"
 shared_naval_effort_tt:0 "Nicht genügend Bauplätze für §YNaval Dockyards§!"
 shared_naval_effort_desc:0 "Der Ausbau unserer Marine sollte unsere oberste Priorität sein. Alle verfügbaren Ressourcen sollten für neue Werften und die Erforschung leichter Überwasserschiffe eingesetzt werden."
 shared_flexible_navy:0 "Flexibles Marineblau"
 shared_flexible_navy_desc:0 "Durch die Neugestaltung der Seekriegsführung unter Berücksichtigung der Fortschritte in der U-Boot-Technologie können wir feindliche Konvois effizient bekämpfen."
 shared_large_navy:0 "Große Marine"
 shared_large_navy_desc:0 "Die Anpassung unserer Marinedoktrinen an große Schiffe und die Gewährleistung der Sicherheit unserer Handelskonvois wird uns viel darüber beibringen, welche Art von Schiffen wir benötigen."
 shared_submarine_effort:0 "U-Boot-Anstrengungen"
 shared_submarine_effort_desc:0 "Der U-Boot-Krieg ist die spannendste Entwicklung in der Marine seit der Erfindung des Torpedoboots. Wir tun gut daran, uns nicht nur vor U-Booten zu schützen, sondern sie auch gegen feindliche Schiffe einzusetzen."
 shared_cruiser_effort:0 "Kreuzeraufwand"
 shared_cruiser_effort_desc:0 "Bevor wir uns auf die Erforschung fortgeschrittener Schlachtschiffe konzentrieren können, müssen die kleineren Kreuzer ersetzt werden."
 shared_destroyer_effort:0 "Zerstörer-Anstrengung"
 shared_destroyer_effort_desc:0 "Durch die Untersuchung der Konstruktion und des strategischen Einsatzes von U-Booten haben wir auch gelernt, wie wir diesen Strategien entgegenwirken können. Zerstörer werden dabei eine entscheidende Rolle spielen."
 shared_capital_ships_effort:0 "Großkampfschiff-Anstrengung"
 shared_capital_ships_effort_desc:0 "Die Nation mit den meisten Schlachtschiffen wird die Weltmeere beherrschen. Schlachtschiffe und Flugzeugträger repräsentieren die alte und die neue Seeüberlegenheit."
 shared_industrial_effort:0 "Industrielle Anstrengungen"
 shared_industrial_effort_desc:0 "Konzentrieren Sie alle unsere politischen Anstrengungen darauf, die zivile Industrie mit einem großen Sprung nach vorne aufzubauen."
 shared_industrial_effort_2:0 "Industrielle Anstrengung II"
 shared_industrial_effort_2_desc:0 "Mit eisernem Willen und einer unermüdlichen Arbeitsmoral können wir die Menschen zu einer weiteren großen industriellen Anstrengung mobilisieren."
 shared_construction_effort:0 "Bauaufwand"
 shared_construction_effort_tt:0 "Nicht genügend Bauplätze für §YCivilian Factories§!"
 shared_construction_effort_desc:0 "Auch wenn weltweit ein Krieg droht, darf die zivile Industriekapazität nicht unterschätzt werden."
 shared_production_effort:0 "Rüstungsanstrengungen"
 shared_production_effort_tt:0 "Nicht genügend Bauplätze für §YMilitärfabrik§!"
 shared_production_effort_desc:0 "Wer Traktoren bauen kann, kann auch Panzer bauen! Wir dürfen nicht zulassen, dass unsere militärische Produktionskapazität zurückbleibt."
 shared_construction_effort_2:0 "Baumaßnahme II"
 shared_construction_effort_2_desc:0 "Durch den weiteren Ausbau unserer Fabriken können wir die Produktion von Waren für den Handel und weitere Bauvorhaben beschleunigen."
 shared_production_effort_2:0 "Rüstungsanstrengung II"
 shared_production_effort_2_desc:0 "Der Versuch, zivile Fabriken für die Produktion militärischer Ausrüstung umzurüsten, ist ineffizient. Wir sollten uns jetzt auf die Vorbereitung der Rüstungsproduktion konzentrieren."
 shared_production_effort_3:0 "Rüstungsanstrengung III"
 shared_production_effort_3_desc:0 "Um den Bedarf an neuer Ausrüstung zu decken, sind kontinuierliche Anstrengungen zum Ausbau unserer Militärfabriken erforderlich."
 shared_infrastructure_effort:0 "Infrastrukturaufwand"
 shared_infrastructure_effort_desc:0 "Ein Land ohne angemessene Infrastruktur kann keine fortschrittlichen Projekte oder Bauvorhaben durchführen."
 shared_infrastructure_effort_tt:0 "Nicht genügend Bauplätze für §YInfrastruktur§!"
 shared_synth_oil_effort_tt:0 "Nicht genügend Bauplätze für $YSynthetic Refinery$!"
 shared_infrastructure_effort_2:0 "Infrastrukturbemühungen II"
 shared_infrastructure_effort_2_desc:0 "Der weitere Ausbau unserer Infrastruktur wird die für geheime Hightech-Projekte notwendigen Transport- und Kommunikationsmittel ermöglichen."
 shared_construction_effort_3:0 "Baumaßnahme III"
 shared_construction_effort_3_desc:0 "Durch den Ausbau unseres Infrastrukturnetzes haben wir unsere Baukapazitäten deutlich verbessert."
 shared_nuclear_effort:0 "Nukleare Anstrengungen"
 shared_nuclear_effort_desc:0 "Wir stehen am Rande einer weltverändernden Entdeckung und können nicht zulassen, dass andere das Feuer entfachen, das eines Tages die Erde verzehren könnte."
 shared_extra_tech_slot:0 "Zusätzlicher Forschungsplatz"
 shared_extra_tech_slot_desc:0 "Unsere industrielle Expansion und andere aktuelle Fortschritte könnten es uns ermöglichen, parallel mehr Forschung und Entwicklung durchzuführen."
 shared_extra_tech_slot_2:0 "Zusätzlicher Forschungsplatz II"
 shared_extra_tech_slot_2_desc:0 "Die schnelle Industrialisierung unseres Landes hat neue Möglichkeiten in Forschung und Entwicklung eröffnet, die wir nutzen sollten."
 shared_technology_sharing:0 "Technologieaustausch"
 shared_technology_sharing_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion die Forschung und Entwicklung im Kriegsfall effizienter durchführen."
 shared_secret_weapons:0 "Geheimwaffen"
 shared_secret_weapons_desc:0 "Es ist verlockend, alle zusätzlichen Ressourcen in die Entwicklung von Panzern und Flugzeugen zu stecken, aber das Geheimnis, Kriege zu gewinnen, liegt in ganz neuen Wissenschaftsbereichen: Elektronik, Raketentechnik und Nuklearforschung."
 shared_political_effort:0 "Politische Bemühungen"
 shared_political_effort_desc:0 "Um Veränderungen in der Welt herbeizuführen, müssen wir in der Lage sein, Veränderungen in unserem eigenen Land herbeizuführen. Die Stärkung unserer politischen Position sollte dabei an erster Stelle stehen."
 shared_collectivist_ethos:0 "Kollektivistisches Ethos"
 shared_collectivist_ethos_desc:0 "Unsere Feinde mögen kleinere Nationen spalten und erobern, aber unser Volk wird vereint bleiben. Einer für alle, alle für einen."
 shared_liberty_ethos:0 "Freiheitsethos"
 shared_liberty_ethos_desc:0 "In dieser Zeit ideologischer Fanatiker, die den menschlichen Geist ersticken wollen, werden wir die individuellen Freiheiten und die Unabhängigkeit schützen."
 shared_militarism:0 "Militarismus"
 shared_militarism_desc:0 "Wer das Militär als notwendiges Übel betrachtet, ist dazu verdammt, angesichts des Krieges zu zögern. Wir werden den Militarismus in unsere Kultur einprägen, um ein Volk von Soldaten zu werden."
 shared_political_correctness:0 "Politische Korrektheit"
 shared_political_correctness_desc:0 "Menschen mit leicht kontroversen oder anderweitig peinlichen Ansichten scheinen sich Sorgen zu machen, dass es eine weitreichende Verschwörung gegen sie gibt. Das scheint eine hervorragende Idee zu sein."
 shared_neutrality_focus:0 "Neutralitätsfokus"
 shared_neutrality_focus_desc:0 "Während andere behaupten, dass es Mut und Weisheit erfordert, in einem globalen Konflikt Partei zu ergreifen, wissen wir, dass es mehr erfordert, sich zu weigern."
 shared_interventionism_focus:0 "Interventionismus-Fokus"
 shared_interventionism_focus_desc:0 "Wir schätzen die Freiheit aller Menschen, nicht nur unserer eigenen Bürger. Wenn die Verhinderung von Tyrannei Krieg bedeutet, dann ist das so."
 shared_military_youth:0 "Militärjugend"
 shared_military_youth_desc:0 "Organisationen zur Förderung der Disziplin und politischen Bildung junger Menschen in unserem Land werden frühzeitig Loyalität und Selbstaufopferung fördern."
 shared_deterrence:0 "Abschreckung"
 shared_deterrence_desc:0 "Wenn wir allein dastehen, profitieren wir selten vom Krieg. Glücklicherweise wissen wir, dass die beste Verteidigung eine ist, die so bekannt ist, dass man sie nie anwenden muss."
 shared_volunteer_corps:0 "Freiwilligenkorps"
 shared_volunteer_corps_desc:0 "Unser Volk zu zwingen, für die Ideale der Freiheit zu sterben, wäre eine Ironie des Schicksals. Doch die Schaffung von Mitteln für diejenigen, die Menschen im Ausland helfen möchten, ist es nicht."
 shared_paramilitarism:0 "Paramilitarismus"
 shared_paramilitarism_desc:0 "Militärische Prinzipien finden auch außerhalb des Militärs Anwendung. Mit der Entwicklung halbmilitarisierter Einheiten zur Ergänzung unserer Streitkräfte werden mehr Menschen eine militärische Ausbildung erhalten."
 shared_indoctrination_focus:0 "Indoktrination"
 shared_indoctrination_focus_desc:0 "Nachdem wir unsere Ideologie als wahrheitsgetreu etabliert haben, kann sie auch als Wahrheit gelehrt werden. Bildung und Medien müssen diese Lehre widerspiegeln."
 shared_foreign_expeditions:0 "Auslandsexpeditionen"
 shared_foreign_expeditions_desc:0 "Da unsere Feinde bereit sind, im Namen ihrer Ideale in weit entfernte Konflikte einzugreifen, müssen wir bereit sein, dasselbe für unsere zu tun."
 shared_why_we_fight:0 "Warum wir kämpfen"
 shared_why_we_fight_desc:0 "Die Welt wird immer unsicherer. Unsere Bevölkerung muss die Gräueltaten der Machtgierigen sehen. Es ist Zeit, die Bevölkerung für unsere Sache zu gewinnen und sicherzustellen, dass alle bereit sind, für unsere Freiheit zu kämpfen."
 shared_political_commissars:0 "Politische Kommissare"
 shared_political_commissars_desc:0 "Um sicherzustellen, dass unsere Richtlinien in der militärischen Praxis befolgt werden, werden wir politisch ernannte Beamte in die militärischen Ränge aufnehmen."
 shared_internationalism_focus:0 "Internationalismus-Fokus"
 shared_internationalism_focus_desc:0 "Ideologie kennt keine Grenzen. Eine andere Nation mag sich als souverän bezeichnen, doch unsere Überzeugungen stehen über solchen Ansprüchen."
 shared_nationalism_focus:0 "Fokus auf Nationalismus"
 shared_nationalism_focus_desc:0 "Unsere Nation ist einzigartig und unsere politischen Errungenschaften konnten nur hier erzielt werden. Dafür müssen wir um jeden Preis kämpfen."
 shared_ideological_fanaticism:0 "Ideologischer Fanatismus"
 shared_ideological_fanaticism_desc:0 "Unsere politisch etablierten Werte und Ziele sind es wert, für sie zu sterben, genauso wie für jeden alten Glauben. Jeder Anhänger sollte darauf vorbereitet sein, dem Tod ins Auge zu sehen, und diejenigen, die vom Glauben abirren, sollten besser darauf vorbereitet sein, dem Tod ins Auge zu sehen."
 shared_air_innovation:0 "Luftinnovationen"
 shared_air_innovation_desc:0 "Moderne Kriege können nicht gewonnen werden, ohne den Himmel zu beherrschen. Wir müssen alles in unserer Macht Stehende tun, um die Luftwaffe auszubauen!"
 shared_air_innovation_2:0 "Luftinnovationen II"
 shared_air_innovation_2_desc:0 "Jeder Vorteil, den wir in der Luft erlangen können, ist wertvoll. Wir sollten all unsere Anstrengungen auf die Entwicklung unserer Kampfflugzeuge konzentrieren."
 shared_naval_air_effort:0 "Luftangriffe der Marine"
 shared_naval_air_effort_desc:0 "Die Wirksamkeit von Luftangriffen auf Seeziele wurde von den Amerikanern bereits 1921 demonstriert. Wir sollten diesen Zweig der Luftwaffe nicht vernachlässigen, wenn wir Krieg gegen eine Seemacht führen wollen."
