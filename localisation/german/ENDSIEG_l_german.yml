 #poland.1.t:0 "Ceasefire between Poland and Ukraine"
 #poland.1.d:0 "A Ceasefire has been signed between Poland and Ukraine following Ukraine's defeat in the Polish-Ukraniain in which all claimed territory by the First Polish Republic from Ukraine has been ceded."
 #poland.1.a:0 "Alright"
 #poland.2.t:0 "Ceasefire between Poland and Ukraine"
 #poland.2.d:0 "Following a Polish defeat in the Polish-Ukranian War a ceasefire has been signed between both parties and all claimed territory by the First Polish Republic has been ceded to the Ukraine."
 #poland.2.a:0 "Alright"
 # poland.3.t:0 "Poland's Wedding to the Sea"
 #poland.3.d:0 "The Polish Wedding to the Sea was a nationalist ceremony carried out on February 10th, 1920 by General Jozef Haller and his staff at Puck to symbolize Polish restored access to the Baltic Sea that was lost in the Partitions of Poland roughly 100 years earlier."
 #poland.3.a:0 "...I do"
 #poland.4.t:0 "Interallied Mission to Poland"
 #poland.4.d:0 "Launched by British Prime Minister David Lloyd George on July 21st 1920, at the height of the Polish-Soviet War, weeks before the decisive Battle of Warsaw. The purpose of this mission was to send a number of high level personages from Britain and France to Poland in an attempt to influence Polish policy. The mission members included French diplomat Jean Jules Jusserand, General Maxime Weygand, chief of staff to marshal Ferdinand Foch and the British Diplomat Lord Edgar Vincent D’abernon. The crucial battle of Warsaw was won in the early days of August, before the mission could achieve anything of importance. The only tangible result being the installation of Weygand as an advisor to the Polish General Staff, where his role was negligible. Nevertheless, after the battle and for various political reasons, a myth arose that Weygand was the author of the Polish Victory in the battle of Warsaw."
 #poland.4.a:0 "Alright"
 # poland.5.t:0 "Soviet-Polish Negotiations Begin"
 #poland.5.d:0 "After the Russian SFSR failed to defeat the Polish forces who made a successful counter attack negotiations began between the two in Minsk but were eventually shifted to Riga as Polish troops advanced closer to Minsk."
 #poland.5.a:0 "Ok"
 #poland.6.t:0 "Peace of Riga"
 # poland.6.d:0 "The Peace of Riga alternatively known as the Treaty of Riga was signed in Riga on the 18 March, 1921 between Poland and the Russian SFSR and Soviet Ukraine. The Treaty effectively ended the Polish-Soviet War. Due to the Soviets military setbacks the Soviet delegation offered Poland a substantial amount of territorial concessions however for many observers it looked like the Poles were conducting the Riga talks as if Poland lost as the Polish delegation was dominated by members of the National Democrat movement, Pilsudski's political opponents. The National Democrats didn't want non-Polish minorities to constitute more than one third of the overall population and was prepared to accept a Polish-Soviet border that was substantially to the west of what was being offered by the Soviet side, even though this would leave hundreds of thousands of ethnic poles on the Soviet side of the border."
 #poland.6.a:0 "Success? Or failure"
 #poland.7.t:0 "End of the Polish Regency"
 #poland.7.d:0 "After the failure of Germany’s 1918 Spring Offensive and Germany’s acceptance of Wilson’s Fourteen Points which say the disestablishment of military administration in countries occupied by Germany, the Polish Regency Council came to an end adopting the Fourteen Points as well. With the release of General Pilsudski the Regency Council and Dasznyski’s Polish People’s Republic ceded all authority to him and de facto dissolved which led to the creation of the first independent Polish State since Napoleon’s invasion of Russia."
 #poland.7.a:0 "Free at last!"
 #poland.8.t:0 "May Coup"
 #poland.8.d:0 "The May Coup d'etat was a coup d'état carried out in Poland by Marshal Józef Piłsudski between 12 and 14 May 1926. The coup overthrew the government of President Stanisław Wojciechowski and Prime Minister Wincenty Witos. A new government was installed, headed by Lwów Polytechnic professor Kazimierz Bartel. The events were partly inspired by the need for extraordinary measures in the face of newly emerging threats to stability of Poland's independence by Piłsudski's own assessment of the foreign treaties signed by Weimar Germany with France in 1925 (fundamentally abandoning Poland) and with Soviet Russia in April 1926, to which Poland's representatives had not been invited."
 #poland.8.a:0 "We are with Pilsudski!"
 ww2_soviet.1.t:0 "Attentat auf Lenin"
 ww2_soviet.1.d:0 "Am 30. August 1918, nachdem Wladimir Lenin in der Hammer-und-Sichel-Fabrik in Moskau gesprochen hatte, verließ er das Gebäude. Fanny Kaplan, eine radikale Revolutionärin, die Lenin als „Verräter der Revolution“ ansah, rief Lenin etwas zu, und als er sich zu ihr umdrehte, feuerte sie drei Schüsse aus einer Browning-Pistole ab. \n\n Eine der Kugeln durchschlug Lenins Mantel, die anderen beiden trafen ihn, eine durchschlug seinen Hals und die anderen durchbohrten einen Teil seiner linken Lunge und blieben in seiner linken Schulter stecken. Lenin wurde in seine Unterkunft im Kreml zurückgebracht. Aus Angst vor anderen Verschwörern weigerte er sich, sofort ärztliche Hilfe in Anspruch zu nehmen. Später wurden Ärzte zu seiner Behandlung gerufen, die nicht in der Lage waren, die Kugeln sofort zu entfernen. Lenin schaffte es jedoch bemerkenswerterweise zu überleben, obwohl er sich gesundheitlich nie wieder vollständig erholte."
 ww2_soviet.1.a:0 "Sie ist die Verräterin der Revolution!"
 ww2_soviet.2.t:0 "Die königliche Familie hinrichten?"
 ww2_soviet.2.d:0 "Am 17. Juli 1918 wurden der Zar und seine Familie während ihrer Gefangenschaft in Jekaterinburg von bolschewistischen Truppen unter Führung von Jakow Jurowski auf Befehl des Ural-Regionalsowjets getötet, da die Weiße Armee vorrückte und drohte, die Stadt einzunehmen. Hätte Nikolaus den Weißen in die Hände gefallen, befürchtete man, er würde als Fanal für die weiße Sache missbraucht werden. Hätte der Zar sich auf die Seite der Weißen gestellt, hätte dies eine verstärkte ausländische Intervention der Alliierten bedeutet, die den Zaren als legitimen Herrscher Russlands angesehen hätten. Nach der Tötung der Familie eroberte die Weiße Armee die Stadt innerhalb einer Woche."
 ww2_soviet.2.a:0 "Richten Sie diese verdammten Aristokraten aus"
 ww2_soviet.2.b:0 "Lasst sie leben, sie stellen keine Bedrohung für uns dar"
 ww2_soviet.3.t:0 "Ukrainisch-Sowjetischer Krieg"
 ww2_soviet.3.d:0 "Der Ukrainisch-Sowjetische Krieg brach kurz nach dem Fall Deutschlands und des ukrainischen Hetmanats wieder aus, als das Direktorat der Ukraine das Hetmanat mit Hilfe der Bolschewiki stürzte. Ab Januar 1919 marschierten die Bolschewiki mit voller Macht in die Ukraine ein, und das Direktorat erklärte der Russischen SFSR am 16. Januar 1919 erneut den Krieg, nachdem mehrere vorläufige Ultimaten an den Sownarkom der Russischen SFSR zum Abzug ihrer Truppen gescheitert waren."
 ww2_soviet.3.a:0 "Die Ukrops werden mit der Macht der Roten Armee zerschlagen"
 ww2_soviet.4.t:0 "Sowjetische Westoffensiven"
 ww2_soviet.4.d:0 "Die sowjetische Westoffensive von 1918-1918 war ein genereller Vorstoß der Russischen SFSR in Gebiete, die von den Garnisonen in Ober Ost aufgegeben worden waren, die aus den im vorherigen Vertrag von Brest-Litowsk gebildeten Nationalstaaten nach Deutschland abgezogen worden waren. Die zunächst erfolgreiche Offensive scheiterte schließlich weitgehend gegen Estland, Lettland, Litauen, Polen und Rumänien und war in der Ukraine erfolgreich, wo die Sowjetukraine gegründet und in die UdSSR eingegliedert wurde."
 ww2_soviet.4.a:0 "In Ordnung"
 ww2_soviet.5.t:0 "Polnisch-Sowjetischer Krieg"
 ww2_soviet.5.d:0 "Zwischen Februar 1919 und März 1921 tobte der Polnisch-Sowjetische Krieg zwischen Polen und Sowjetrussland sowie der Ukrainischen SSR um umstrittene Gebiete in der UdSSR und Weißrussland. Die Russische SFSR hoffte mit ihrer erfolgreichen Westoffensive, Polen schließlich ganz zu besetzen und zu einer Marionettenmacht zu machen und von dort aus die Revolution auf den Rest Europas, insbesondere Deutschland, auszuweiten. Der Konflikt begann 1919 mit kleineren Zusammenstößen an der Grenze zwischen beiden Ländern, entwickelte sich jedoch 1920 zu einem umfassenden Krieg, den weder Sowjetrussland noch die Polnische Republik geplant hatten."
 ww2_soviet.5.a:0 "Wir werden in Warschau einmarschieren und die Revolution in ganz Europa verbreiten!"
 ww2_soviet.6.t:0 "Litauisch-Sowjetischer Krieg"
 ww2_soviet.6.d:0 "Nach der Entscheidung der sowjetisch-russischen Regierung, den Vertrag von Brest-Litowsk am 13. November 1918 aufzukündigen, der Litauens Unabhängigkeit zusicherte, folgte die bolschewistische Westarmee dem Rückzug der deutschen Truppen, die stark demoralisiert waren und den Sowjets wertvolle Waffen und andere Ausrüstung überließen. Die Russische SFSR versuchte, die globale proletarische Revolution auszubreiten und strebte die Gründung von Sowjetrepubliken in der Region an. Sie betrachtete die baltischen Staaten als Barriere oder Brücke nach Westeuropa, wo sie sich der deutschen und ungarischen Revolution anschließen konnten. Ende Dezember 1918 erreichten bolschewistische Truppen Ostlitauen."
 ww2_soviet.6.a:0 "Sie werden unter unserer Macht zermalmt werden"
 ww2_soviet.7.t:0 "Estnischer Unabhängigkeitskrieg"
 ww2_soviet.7.d:0 "Der am 28. November 1918 beginnende estnische Unabhängigkeitskrieg war ein Verteidigungskrieg gegen die Offensive der Sowjets an der Westfront und die Aggression der Baltischen Landeswehr, die für die Wahrung der deutschen Vorherrschaft im Baltikum kämpfte."
 ww2_soviet.7.a:0 "Die Rote Armee ist die stärkste"
 ww2_soviet.8.t:0 "Lettischer Unabhängigkeitskrieg"
 ww2_soviet.8.d:0 "Der Lettische Unabhängigkeitskrieg begann am 5. Dezember 1918 mit dem Einmarsch der RSFSR in Lettland im Rahmen ihrer Westoffensive. In den Krieg war auch die deutsche Baltische Landeswehr verwickelt, die die deutsche Vorherrschaft im Baltikum bewahren wollte und eine deutsche Vorherrschaft in Lettland anstrebte."
 ww2_soviet.8.a:0 "Wir werden die Revolution verbreiten!"
 ww2_soviet.9.t:0 "Kronstädter Aufstand"
 ww2_soviet.9.d:0 "Der Kronstädter Aufstand, der am 7. März 1921 begann, war ein großer Aufstand auf der Insel Kotlin, einer Marinefestung in Kronstadt, gegen die Bolschewiki im März 1921. Er bestand hauptsächlich aus russischen Matrosen, Soldaten und Zivilisten und wurde durch Lenins Argumentation ausgelöst, die Kontrolle über die russische Wirtschaft zu lockern (Neue Ökonomische Politik). Der Aufstand war jedoch weitgehend erfolglos und wurde nach einem zwölftägigen Feldzug, der insgesamt etwa 3.000 bis 4.000 Todesopfer forderte, niedergeschlagen."
 ww2_soviet.9.a:0 "Verräter!"
 ww2_soviet.10.t:0 "Die Sowjetunion kapituliert, der Sieg der Weißen!"
 ww2_soviet.10.d:0 "Nach einem langen und brutalen Krieg zwischen der Russischen SFSR und der Weißen Bewegung haben die russischen Roten schließlich kapituliert, nachdem die Weiße Bewegung die wichtigsten Stützpunkte Moskau, Petrograd und Zarizyn erobert hatte. Obwohl die Roten endgültig verloren haben, ist der Weg für die stark gespaltene Weiße Bewegung noch immer ungeklärt, was sich bereits während des Bürgerkriegs mit mehreren Anführern zeigte. Der darauffolgende Machtkampf wird die Nation sicherlich noch stärker belasten, doch für den Moment haben wir gegen die bösen bolschewistischen Kräfte gewonnen, und das ist jetzt das Wichtigste …"
 ww2_soviet.10.a:0 "Nieder mit den Roten!"
 ww2_soviet.11.t:0 "Gründung der Republik im Fernen Osten"
 ww2_soviet.11.d:0 "Die Fernöstliche Republik (FAR) wurde nach dem Russischen Bürgerkrieg gegründet. Während das Gebiet unter der Kontrolle der weißsibirischen Regierung unter Koltschak stand, entstand nach dem Abzug der japanischen und weißen Truppen ein politisches Vakuum in der Region. In Tschita wurde eine neue Zentralregierung zur Verwaltung der FAR eingerichtet. Sie galt als vorübergehender Pufferstaat zwischen der Russischen SFSR und den noch von Japan und seinen Alliierten besetzten Gebieten. Im April 1920 räumten amerikanische Truppen jedoch Sibirien, sodass Japan die alleinige Besatzungsmacht blieb. Die Bolschewiki betrachteten die FAR als eine Art Vertrag von Brest-Litowsk im Osten. Die FAR verschaffte dem Regime eine Atempause, um sich wirtschaftlich und militärisch zu erholen, und fungierte als Pufferstaat zu Japan. Japan erkannte den neuen Pufferstaat schließlich in einem am 15. Juli 1920 unterzeichneten Waffenstillstand mit der Roten Armee an."
 ww2_soviet.11.a:0 "Es ist eine notwendige Vorsichtsmaßnahme ..."
 ww2_soviet.12.title:0 "Weiße Bewegung besiegt! Sieg der Bolschewisten ..."
 ww2_soviet.12.d:0 "Nach einem langen und brutalen Krieg zwischen der Russischen Sozialistischen Sowjetrepublik und der Weißen Bewegung scheiterte die gespaltene und unentschlossene Weiße Bewegung schließlich an ihren eigenen Fehlern und erholte sich nie wieder. Die Roten übernahmen die totale Vorherrschaft in Politik und Regierung des neuen Staates. Die Weißen haben endgültig verloren, doch dem Land stehen noch schwere Zeiten bevor. Wir müssen aus der aktuellen Lage einen erfolgreichen Weg zum Kommunismus ebnen und die Revolution verbreiten!"
 ww2_soviet.12.a:0 "Ruhm!"
 ww2_soviet.13.t:0 "Putsch in der Fernöstlichen Republik"
 ww2_soviet.13.d:0 "Am 26. Mai 1921 kam es in Wladiwostok zu einem von den japanischen Besatzungstruppen unterstützten Putsch der Weißen, bei dem eine provisorische Regierung ausgerufen wurde. Dieser Putsch verhinderte jedoch erfolglos die Mobilisierung antibolschewistischer Kräfte, und nach der Evakuierung der Japaner ab Juni 1922 waren die Weißen isoliert."
 ww2_soviet.13.a:0 "Das ist nur ein Kartenhaus ..."
 ww2_soviet.14.t:0 "Japan evakuiert Truppen aus Sibirien"
 ww2_soviet.14.d:0 "Aus Angst vor dem Kommunismus und aufgrund persönlicher Interessen hofften die Japaner eine Zeit lang, einen Pufferstaat bzw. eine Marionette zwischen der Russischen SFSR und sich selbst zu errichten. Nachdem jedoch alle Alliierten evakuiert und das Land verlassen hatten, blieb Japan in Ruhe und wurde bald darauf von den Alliierten unter Druck gesetzt, ebenfalls zu evakuieren, was sie im Juni 1922 auch taten. Kommunisten übernehmen die FAR\n\n Als die japanischen Streitkräfte die Fernöstliche Republik räumten, näherte sich die als Armee der FAR getarnte Rote Armee dem kommunistischen Regime, errichtete es wieder und eroberte Wladiwostok am 25. Oktober 1922 zurück, was den russischen Bürgerkrieg effektiv beendete."
 ww2_soviet.14.a:0 "Die gehören hier sowieso nicht hin!"
 ww2_soviet.15.t:0 "Wiedereingliederung der Fernöstlichen Republik"
 ww2_soviet.15.d:0 "Nach dem Ende des Bürgerkriegs übernahm die Russische SFSR am 15. November 1922 die Fernöstliche Republik. Die Regierung der Fernöstlichen Republik löste sich auf und übergab ihre gesamte Autorität und ihr Territorium an die bolschewistische Regierung in Moskau. Japan behielt jedoch bis 1925 die nördliche Hälfte der Insel Sachalin."
 ww2_soviet.15.a:0 "Endlich vereint!"
 ww2_soviet.16.t:0 "1. Kongress der Komintern"
 ww2_soviet.16.d:0 "Der Erste Kongress der Komintern war ein internationales Treffen kommunistischer, revolutionärer und syndikalistischer Delegierter in Moskau, bei dem die Kommunistische Internationale, auch bekannt als KOmintern, offiziell gegründet wurde. An dem Treffen vom 2. bis 6. März 1919 nahmen 51 Vertreter aus mehr als zwei Dutzend Ländern Europas, Nordamerikas und Asiens teil."
 ww2_soviet.16.a:0 "Vereinigt euch, Revolutionäre der Welt!"
 int_soviet.17.t:0 "Lenin ist gestorben!"
 int_soviet.17.d:0 "Im März 1923 erlitt Wladimir Lenin einen dritten Schlaganfall und verlor seine Fähigkeit zu sprechen. Im selben Monat erlitt er eine teilweise Lähmung seiner rechten Körperhälfte und begann, eine sensorische Aphasie zu entwickeln. Im Mai schien er sich langsam zu erholen, da er seine Beweglichkeit sowie seine Sprach- und Schreibfähigkeiten wiedererlangte. Im Oktober stattete er Moskau und dem Kreml einen letzten Besuch ab. In seinen letzten Wochen erhielt Lenin Besuch von Sinowjew Kamenew und Bucharin. Bucharin besuchte ihn an seinem Todestag in seiner Gorki-Villa. Lenin starb am 21. Januar 1924 in seinem Haus in Gorki, nachdem er zuvor am selben Tag ins Koma gefallen war. Als offizielle Todesursache wurde eine unheilbare Gefäßerkrankung angegeben."
 int_soviet.17.a:0 "Lenin hat gelebt, Lenin lebt, Lenin wird weiterleben!"
 int_soviet.18.t:0 "Lenin-Mausoleum"
 int_soviet.18.d:0 "Nach Wladimir Lenins Tod am 21. Januar 1921 wurde der Architekt Alexei Schtschussew damit beauftragt, ein geeignetes Bauwerk für die Trauernden zu errichten. Zunächst wurde an der Kremlmauer ein hölzernes Grabmal errichtet, das am 27. Januar fertig war. Später am selben Tag wurde Lenins Sarg hineingestellt, und in den folgenden sechs Wochen besuchten über 100.000 Menschen das Grabmal. Bis August 1924 ließ Schtschussew das Grabmal durch ein größeres ersetzen und Lenins Leichnam in einen vom Architekten Konstantin Melnikow entworfenen Sarkophag überführen. Alexei Abrikosow hatte den Leichnam kurz nach Lenins Tod einbalsamiert, doch 1929 stellte man fest, dass es möglich sein würde, den Leichnam viel länger als üblich aufzubewahren. Daher wurde im darauffolgenden Jahr ein neues Mausoleum aus Marmor, Porphyr, Granit und Labradorit fertiggestellt."
 int_soviet.18.a:0 "Er ist das Abbild der Revolution!"
 int_soviet.19.t:0 "Pjotr Wojkow ermordet"
 int_soviet.19.d:0 "Wojkow leitete den Verkauf der kaiserlichen Schätze aus der Rüstkammer des Kremls und dem Diamantenfonds, darunter auch Fabergé-Eier, die ihren Weg ins Ausland fanden. Im Oktober 1924 wurde Wojkow zum sowjetischen „bevollmächtigten Vertreter“ in Polen ernannt und 1927 in Warschau von Boris Kowerda ermordet. Der Mord wurde später als Rache für Wojkows Beteiligung an der Ermordung des Zaren und seiner Familie gerechtfertigt. Wojkows Leichnam wurde nach Moskau überführt und auf dem Roten Platz begraben. Dieser Vorfall belastete die sowjetisch-polnischen Beziehungen, die bereits durch den Polnisch-Sowjetischen Krieg von 1921 belastet waren, weiter. Die Sowjets brachen die Verhandlungen über einen Nichtangriffspakt ab und beschuldigten die Polen, den antisowjetischen weißen Widerstand zu unterstützen."
 int_soviet.19.a:0 "Diese dreckigen Polaken!"
 #soviet.20.t:0 "Siege of Leningrad Lifted!"
 #soviet.20.d:0 "After a two-year long siege by German forces, one of the longest and most destrcutive sieges in history has finally ended with the fascist beast finally being driven away from the outskirts of the city. We have suffered great losses in this with close to two million dead, they will be forever remembered as heroes who did not cave in under any circumstances to the fascist beast!"
 #soviet.20.a:0 "Next stop, Berlin!"
 #soviet.21.t:0 "Annexation of Tannu Tuva"
 #soviet.21.d:0 "At the request of the Tuva's Small People's Khural, Tuva shall become part of our great nation as the Tuvan Autonomous Oblast following the decision of the Presidium of the Supreme Soviet. The annexation will be officially formalized on 1st November, 1944."
 #soviet.21.a:0 "Glorious"
 afghan.1.t:0 "Emir Habibullah ermordet"
 afghan.1.d:0 "Emir Habibullah wurde am 20. Februar 1919 während eines Jagdausflugs in der Provinz Laghman ermordet. Sein Bruder Nasrullah Khan, der hinter dem Attentat steckte, folgte ihm kurzzeitig als Emir von Afghanistan nach und hielt vom 21. bis 28. Februar 1919 eine Woche lang die Macht, bevor er von Habibullahs drittem Sohn, Amanullah Khan, gestürzt und inhaftiert wurde."
 afghan.1.a:0 "Möge er in Frieden ruhen ..."
 afghan.2.t:0 "Dritter Anglo-Afghanischer Krieg"
 afghan.2.d:0 "Der Dritte Anglo-Afghanische Krieg begann am 6. Mai 1919 nach der Ermordung Amir Habibullahs und dem anschließenden Aufstieg seines Sohnes an die Macht. Dieser musste die Konservativen in Afghanistan besänftigen, um an der Macht zu bleiben. Um den internen Konflikten und den damit verbundenen Unruhen in Indien Abhilfe zu schaffen, beschloss Amanullah, in Britisch-Indien einzumarschieren."
 afghan.2.a:0 "Wir müssen unsere Souveränität sichern!"
 afghan.3.t:0 "Anglo-afghanischer Vertrag"
 afghan.3.d:0 "Der Anglo-Afghanische Vertrag von 1919 war ein Waffenstillstand zwischen Großbritannien und Afghanistan nach dem Ende des Dritten Anglo-Afghanischen Krieges. In dem Dokument erkannte Großbritannien die Unabhängigkeit Afghanistans an und stimmte zu, dass Britisch-Indien nicht über den Khyber-Pass hinausreichen würde. Zudem stellte Großbritannien die britischen Subventionen für Afghanistan ein."
 afghan.3.a:0 "Wir haben uns befreit!"
 afghan.4.t:0 ""
 afghan.4.d:0 ""
 afghan.4.a:0 ""
 afghan.5.t:0 ""
 afghan.5.d:0 ""
 afghan.5.a:0 ""
 int_bulgaria.2.t:0 "Ferdinand I. dankt vom Thron ab"
 int_bulgaria.2.d:0 "Um den bulgarischen Thron zu retten, übergab Ferdinand, der zu diesem Zeitpunkt beim Volk sehr unbeliebt geworden war, da er zwei große Konflikte verloren hatte, die zu Gebietsverlusten führten, den Thron durch Abdankung am 3. Oktober 1918 an seinen ältesten Sohn, Zar Boris III. Unter dieser neuen Führung ergab sich Bulgarien den Alliierten."
 int_bulgaria.2.a:0 "Boris III. wird uns zurückbringen!"
 int_bulgaria.3.t:0 "Angriff auf die St. Nedelya-Kirche"
 int_bulgaria.3.d:0 "Der Anschlag auf die St.-Nedelja-Kirche in Sofia, Bulgarien, war ein Terroranschlag. Er ereignete sich am 16. April 1925, als eine Gruppe von Mitgliedern der Kommunistischen Partei Bulgariens während der Trauerfeier für General Konstantin Georgiev, der am 14. April bei einem früheren kommunistischen Anschlag getötet worden war, das Dach der Kirche sprengte. 150 Menschen, hauptsächlich Angehörige der politischen und militärischen Elite des Landes, wurden bei dem Anschlag getötet und rund 500 verletzt."
 int_bulgaria.3.a:0 "Tragisch"
 int_bulgaria.4.t:0 "Boris III. stirbt"
 int_bulgaria.4.d:0 "Kurz nach seiner Rückkehr von einem Treffen mit Hitler nach Sofia starb Boris III. am 28. August 1943 angeblich an Herzversagen. Man geht davon aus, dass der König während seines Aufenthalts in Deutschland vergiftet wurde. Hans Eppinger glaubt, er habe dasselbe Gift gefunden, das er zwei Jahre zuvor bei einer Obduktion von Ioannis Metaxas gefunden hatte – ein langsam wirkendes Gift, das wochenlang braucht, um zu wirken. Boris&#39; Nachfolger wird sein sechsjähriger Sohn Simeon II. unter einem Regentschaftsrat unter dem Vorsitz von Prinz Kiril von Bulgarien."
 int_bulgaria.4.a:0 "Was für eine Tragödie!"
 crybabia.1.t:0 "Eroberung von Ha&#39;il"
 crybabia.1.d:0 "Die Eroberung von Ha&#39;il, auch bekannt als der Zweite Saudi-Rashidi-Krieg, wurde zwischen saudischen Streitkräften, die britische Militärunterstützung erhielten, gegen das Emirat Jabal Shammar unter dem letzten Rashidi-Herrscher ausgetragen, der Jabal Shammar am 2. November 1921 an die saudischen Streitkräfte übergab."
 crybabia.1.a:0 "Hagel wird auf uns niedergehen!"


ww2_france.1.t:0 "Der Libanon erlangt seine Unabhängigkeit"
ww2_france.1.d:0 "Nach dem zunehmenden Druck des libanesischen Volkes gab die französische Regierung schließlich seinen Forderungen nach und gewährte dem Libanon am Montagmorgen, dem 22. November 1943, die Unabhängigkeit. Die erste libanesische Flagge wurde am 11. November 1943 in der Residenz von Hussein El Halabi gehisst."
ww2_france.1.a:0 "Nun ja..."
ww2_france.2.t:0 "Weitere alliierte Streitkräfte treffen ein"
ww2_france.2.d:0 "Die vereinten Kräfte der Westalliierten füllen langsam den Riss in der Normandie, was uns vom Druck ihrer Gegenoffensiven und Versuche, die Invasion ins Meer zurückzudrängen, befreien soll."
ww2_france.2.a:0 "Wir brauchen so viele Männer wie möglich!"
ww2_france.8.t:0 "Beginn der Landungen am D-Day"
ww2_france.8.d:0 "Die alliierte Invasion in der Normandie, auch bekannt als Operation Overlord oder D-Day, hat heute begonnen. Es ist von entscheidender Bedeutung, dass wir die Alliierten daran hindern, im Westen Fuß zu fassen, denn wenn ihnen das gelingt, können sie immer mehr Verstärkung schicken, eine ganz neue Front eröffnen und möglicherweise Frankreich zurückerobern."
ww2_france.8.a:0 "Wenn wir ihnen den kleinen Finger geben, gehen sie die ganze Meile ..."
ww2_france.9.t:0 "Operation Dragoon"
ww2_france.9.d:0 "Die alliierte Invasion in Südfrankreich, auch bekannt als Operation Dragoon, hat begonnen. Die Landung muss sofort niedergeschlagen werden, da wir uns nicht auf so viele Fronten gleichzeitig konzentrieren können. Es wäre ratsam, diese Operation im Keim zu ersticken, bevor sie weitere wichtige Häfen erobert, die den Nachschub der Alliierten ermöglichen würden."
ww2_france.9.a:0 "Es muss zerquetscht werden!"

ww2_germany.1.t:0 "Waffenstillstand von Compiègne"
ww2_germany.1.d:0 "Der Waffenstillstand vom 11. November 1918, besser bekannt als Waffenstillstand zwischen der Entente und Deutschland, beendete den Ersten Weltkrieg offiziell. Er trat am 11. November 1918 um 11 Uhr Pariser Zeit in Kraft, also zur elften Stunde des elften Tages des elften Monats. Während die Deutschen weitgehend auf die von Präsident Woodrow Wilson in seinen Vierzehn Punkten vorgeschlagene Politik reagierten, wurden die eigentlichen Bedingungen des späteren Versailler Vertrags größtenteils sechs Monate später von den Franzosen ausgearbeitet und beschlossen, die damit den Frieden besiegelten. Der Waffenstillstand beinhaltete die Einstellung aller Feindseligkeiten, den Rückzug der deutschen Truppen an die eigenen Grenzen, den Erhalt der Infrastruktur, den Austausch von Gefangenen, die Zusage von Reparationen und die Übergabe deutscher Kriegsschiffe und U-Boote an die Alliierten."
ww2_germany.1.a:0 "Zerstörerisch..."
ww2_germany.3.t:0 "Richtofen erlegt 81. Abschuss!"
ww2_germany.3.d:0 "Das Ass aller Asse, Manfred von Richthofen, auch bekannt als „Der Rote Baron“, der mit seiner rot gefärbten Fokker Dreizeiler dem Feind Angst einjagte, ist mit seinem 81. Abschuss aus einem weiteren erfolgreichen Luftkampf hervorgegangen, nachdem er Wilfred May dabei beobachtet hatte, wie er seinen jungen Cousin Wolfram beäugte. Nichtsdestotrotz gingen beide siegreich und wohlbehalten hervor. Unsere Truppen blicken in ihren Schützengräben zu ihm auf, er ist ihr Engel in der Luft."
ww2_germany.3.a:0 "Gott segne ihn"
ww2_germany.4.t:0 "Willkommen beim Mod!"
ww2_germany.4.d:0 "Willkommen zum Endsieg: Totaler Sieg! \n\n Dieser Mod wird derzeit von einer Person entwickelt, einigen Freunden sei jedoch für ihre begrenzte Hilfe bei der Grafik gedankt. Der Mod soll dem Spieler die Möglichkeit geben, die Zwischenkriegsphase irgendwann durchzuspielen. Derzeit befindet sich die Zwischenkriegsphase in der Entwicklung, nähert sich aber der Fertigstellung. Die Kaiserschlacht am 21. März 1918 ist nicht der Hauptstart des Mods oder der Hauptpunkt. Sie soll dem Spieler vorerst nur eine Herausforderung bieten, falls er eine sucht. Später wird dem Start der Kaiserschlacht mehr Bedeutung beigemessen, da ein Sieg der Mittelmächte eine Alternative zur Zwischenkriegszeit und zum Zweiten Weltkrieg bietet. \n\n Was ist die Kaiserschlacht? \n\n Die Kaiserschlacht (ausgesprochen KAI-SER-SH-LA-AH-HH-T), auch bekannt als Operation Michael, Ludendorff-Offensive oder Frühjahrsoffensive 1918, war der letzte Versuch der Deutschen in der zweiten Hälfte des Ersten Weltkriegs und der letzte verzweifelte Versuch, die alliierten Linien zu durchbrechen und die Kanalhäfen einzunehmen, die die britischen Expeditionstruppen versorgten. Ludendorff änderte den Plan jedoch gegen Ende und beschloss eine Offensive entlang der gesamten britischen Front nördlich der Somme mit dem Ziel, die britische und die französische Armee zu trennen, die Briten ins Meer zu treiben und die Franzosen zu isolieren. Nichtsdestotrotz war der Plan zunächst sehr erfolgreich, und die Deutschen gewannen für den Ersten Weltkrieg SEHR VIEL LAND, doch so weit sie vorrückten, hatten die Deutschen nicht genügend Nachschub, um das eroberte Gebiet zu halten, das zudem unter Artilleriefeuer litt und kaum zu verteidigen war."
ww2_germany.4.a:0 "Okay!"
ww2_germany.5.t:0 "Richtoven erzielt 80. Kill!"
ww2_germany.5.d:0 "Manfred von Richtofen, besser bekannt als der Rote Baron, hat heute, am 20. April 1918, seinen 80. Abschuss erzielt. \N\N Mit seinem 80. Abschuss am 20. April übertraf Richtofen alle anderen Fliegerasse des 1. Weltkriegs und wurde als „Ass der Asse“ bekannt (zumindest während des 1. Weltkriegs, siehe Erich Hartmann zu den Assen der Asse der Asse der Asse …). Richtofens Leben war jedoch von Tragödien heimgesucht. Die meisten seiner Freunde und ihm nahestehenden Kameraden waren im Jahr zuvor wie die Fliegen vom Himmel gefallen und Richtofen soll in eine schwere Depression gefallen sein und das Leben als sinnlos angesehen haben. Bevor er am nächsten Tag zu seinem Flug aufbrach, erzählte er seiner Mutter, dass er Zahnschmerzen habe und sie antwortete: „Geh zum Zahnarzt“, doch Richtofen sagte: „Das ist nicht nötig, ich bin sowieso weg.“"
ww2_germany.5.a:0 "Ein weiterer glorreicher Sieg für Richtofen!"
ww2_germany.6.t:0 "Kaiser Wilhelm Geschütz schießt Paris"
ww2_germany.6.d:0 "Das Kaiser-Wilhelm-Geschütz, besser bekannt als Pariser Kanone, war eine schwere Haubitze mit großer Reichweite, die die Stadt Paris während des Krieges mehrmals bombardierte. Obwohl sie ziemlich wirkungslos war, schädigte sie die Moral der Einwohner der Stadt."
ww2_germany.6.a:0 "Das ist ein langer Weg für eine Shell"
ww2_germany.7.t:0 "Krim-Operation"
ww2_germany.7.d:0 "Ab dem 13. April 1918 wurde die neu gegründete Taurische Sozialistische Sowjetrepublik von den Streitkräften der Ukrainischen Volksrepublik und des Deutschen Reiches besetzt, die Hilfe leisteten. Bis Ende April 1918 wurde die Mehrheit der Führer dieses kurzlebigen kommunistischen Krimstaates von aufständischen Krimtataren verhaftet und erschossen. Am 30. April desselben Monats wurde der kommunistische Staat offiziell abgeschafft und durch eine von Deutschland geschützte Krim-Regionalregierung ersetzt."
ww2_germany.7.a:0 "Die Warmwasserhäfen der Krim sollen uns gehören!"
ww2_germany.9.t:0 "Wilhelmshavener Meuterei"
ww2_germany.9.d:0 "In der Nacht vom 29. auf den 30. Oktober 1918 lag die deutsche Flotte in Wilhelmshaven vor Anker und erwartete eine geplante letzte Schlacht vor Kriegsende. Die Matrosen an Bord der SMS Thüringen und der SMS Helgoland begingen jedoch Meuterei und Sabotage als Reaktion auf die Angriffspläne, die sie als letzten Versuch des Oberkommandos und als völlig sinnlos betrachteten, was sie auch größtenteils waren. Einen Tag später richteten Torpedoboote ihre Kanonen auf diese Schiffe, und die Meuterer gaben widerstandslos auf. Das 3. Marinegeschwader wurde nach Kiel zurückbeordert, da man sich auf die Loyalität der Besatzung nicht länger verlassen konnte. Dies führte später zum Kieler Aufstand am 3. November, der weitgehend die deutsche Revolution auslöste, die Monarchie innerhalb weniger Tage hinwegfegte und das Ende des Deutschen Reiches herbeiführte."
ww2_germany.9.a:0 "Unsere eigenen Männer haben sich gegen uns erhoben, der Krieg ist verloren"
ww2_germany.8.t:0 "Gründung der Regionalregierung der Krim"
ww2_germany.8.d:0 "Die Regionalregierung der Krim wurde am 25. Juni 1918 kurz nach der Krimoffensive ukrainischer und deutscher Truppen im April 1918 gegründet. Nach dem Fall der Taurischen Sozialistischen Republik annektierte Deutschland das ehemalige Gebiet der TSR und gründete später unter deutschem Schutz die Regionalregierung der Krim. Zwar gab es Bemühungen der Ukraine, die Kontrolle über die Krim zu erlangen, doch scheiterten diese mit deutscher Unterstützung, sodass die Regionalregierung von der Ukraine getrennt blieb."
ww2_germany.8.a:0 "Dies wird als guter Hafen dienen"
ww2_germany.10.t:0 "Wilsons Vierzehn Punkte akzeptieren?"
ww2_germany.10.d:0 "Angesichts des nahenden Ersten Weltkriegs und des unbestreitbaren Scheiterns der Ludendorff-Offensive von 1918 akzeptierte der deutsche Reichskanzler Prinz Max von Baden Wilsons Vierzehn Punkte, um die Härte des Friedensabkommens für Deutschland zu mildern. Er hoffte, damit die Westmächte zufriedenzustellen und Deutschland demokratischer zu gestalten. Mit der Annahme dieser Punkte war Deutschland faktisch auch gezwungen, seine besetzten Verwaltungsgebiete in Osteuropa aufzugeben. Sollten wir die Vierzehn Punkte nicht akzeptieren, werden wir sicherlich mit schwerwiegenderen Konsequenzen rechnen müssen. Doch wenn wir es tun, haben wir zu diesem Zeitpunkt nichts mehr zu verlieren. Der Krieg ist verloren. Lasst uns das Beste daraus machen, solange wir noch können."
ww2_germany.10.a:0 "Akzeptieren Sie Wilsons vierzehn Punkte"
ww2_germany.10.b:0 "Ignoriere sie"
ww2_germany.11.t:0 "Die Taurische SSR kapituliert!"
ww2_germany.11.d:0 "Die Taurische SSR hat kapituliert und ihre Gebiete werden direkt an uns übergeben, damit wir sie unter Kontrolle halten. Während der ukrainische Staat das Gebiet der Taurischen SSR als sein rechtmäßiges Eigentum betrachtete und auf eine Föderation hoffte, hielt das Deutsche Reich beide Gebiete getrennt und überwachte das Gebiet der ehemaligen TSSR persönlich, indem es es unter seiner Kontrolle hielt und de facto von der Ukraine trennte."
ww2_germany.11.a:0 "Es ist besser in unseren Händen"
ww2_germany.12.t:0 "Kaiser dankt ab!"
ww2_germany.12.d:0 "Da das Deutsche Reich aktiv einen Waffenstillstand mit den Alliierten anstrebte und eine Revolution die instabile politische Lage Deutschlands gegen Kriegsende bedrohte, wurden die Forderungen nach einer Abdankung des Kaisers immer lauter. Wilhelm II. selbst zögerte zutiefst, ein solches Opfer zu bringen. Während seine Militärberater darauf bestanden, dass man sich nicht länger auf die Armee verlassen könne, äußerte Wilhelm dennoch die Idee, die Armeen von der Westfront aus nach Deutschland zurückzuführen. Nach dem Kieler Aufstand verlor Wilhelm II. jedoch alle Hoffnung. Die Marine war seine größte Freude und Errungenschaft. Als diese rebellierte, erkannte er, dass der Krieg tatsächlich verloren war. Angesichts des Schicksals der russischen Zarenfamilie, seiner Cousins, dankte er am 9. November ab, was Kanzler Prinz Max von Baden in einer Proklamation am selben Tag bekannt gab, und ging ins niederländische Exil. Die Abdankungsproklamation des Kaisers wurde am 30. November 1918 offiziell veröffentlicht und sah sich hinsichtlich der Art der Abdankung des deutschen Generalstabschefs heftiger Kritik ausgesetzt. Paul von Hindenburg gab am 20. März 1919 eine Erklärung ab, in der er den Ablauf der Ereignisse erläuterte und die Rolle des Kaisers verteidigte."
ww2_germany.12.a:0 "Er war sowieso nur ein „Schattenkaiser“"
ww2_germany.13.t:0 "Vertrag von Versaille"
ww2_germany.13.d:0 "Der Vertrag von Versailles, unterzeichnet am 28. Juni 1919, genau fünf Jahre nach der Ermordung von Erzherzog Franz Ferdinand, beendete offiziell den Kriegszustand zwischen Deutschland und den Alliierten. Im Versailler Vertrag sollte Deutschland die Verantwortung für „alle Verluste und Schäden, die Deutschland und seine Verbündeten während des Krieges verursacht haben“ übernehmen. Dies war eine der wichtigsten und umstrittensten Forderungen, die später als „Kriegsschuldklausel“ bekannt wurde. Insgesamt zwang der Vertrag Deutschland zur Abrüstung, zu territorialen Zugeständnissen an Frankreich, Belgien und Polen und zur Zahlung von Reparationen in Höhe von 132 Milliarden Mark, umgerechnet 442 Milliarden US-Dollar im Jahr 2017. Viele Menschen empfanden den Vertrag damals als „zu hart“, während andere, wie der französische Feldmarschall Ferdinand Foch, ihn als zu nachsichtig empfanden und sagten: „Dies ist kein Frieden. Es ist ein Waffenstillstand für 20 Jahre“, von dem er fast drei Monate entfernt war."
ww2_germany.13.a:0 "Was für ein Fehler!"
ww2_germany.14.t:0 "Schleswiger Volksabstimmungen"
ww2_germany.14.d:0 "Die Schleswigschen Volksabstimmungen waren zwei Volksabstimmungen, die gemäß Abschnitt XII, Artikel 109 bis 114 des Versailler Vertrags am 28. Juni 1919 abgehalten wurden, um die zukünftige Grenze zwischen Dänemark und Deutschland durch das ehemalige Herzogtum Schleswig festzulegen. Der Prozess wurde von Vertretern Frankreichs, Großbritanniens, Norwegens und Schwedens überwacht. Das Endergebnis war die Übergabe Südjütlands/Schleswigs an Dänemark nach einem Referendum, bei dem die dänische Bevölkerung Südjütlands für den Anschluss an Dänemark stimmte."
ww2_germany.14.a:0 "Wir werden an jeder Ecke ausgeraubt ..."
ww2_germany.15.t:0 "Großpolnischer Aufstand"
ww2_germany.15.d:0 "Der Großpolnische Aufstand war ein militärischer Aufstand der Polen in der Region Großpolen gegen die deutsche Herrschaft. Der Aufstand hatte großen Einfluss auf den Versailler Vertrag, der schließlich das von den polnischen Aufständischen eroberte Gebiet der Zweiten Polnischen Republik zusprach. Die Region war Teil der Polnisch-Litauischen Union, bevor sie 1793 mit der Zweiten Teilung Polens dem Königreich Preußen zufiel."
ww2_germany.15.a:0 "Das ist absurd!"
ww2_germany.16.t:0 "Deutsche Flotte bei Scapa Flow versenkt"
ww2_germany.16.d:0 "After the singing of the Armistice at Compiegne, France, which effectively ended WWI. The Allied powers were unstable to agree upon what would happen to the German surface fleet, whilst the Americans suggested the German  surface fleet be interned in a neutral port until a final decision was agreed upon two countries that were approached Norway and Spain refused. After that it was suggested they be interned at Scapa Flow, Britain with a skeleton crew of German sailors being guarded by the Grand Fleet and such was agreed upon. Once at Scapa Flow the mood amongst the sailors was still very mutinous and all of them had been heavily demoralized unable to go ashore and the food supplies coming from Germany of very poor quality. In addition none of the sailors were allowed to visit other ships or communicate. At the negotiations at the Paris Peace Conference the French and Italians wanted a quarter of the ships whilst the British wanted all of them destroyed since they saw redistribution as a threat to the supremacy of the Royal Navy. Rear-Admiral Ludwig von Reuter who had been given command of the ship's heard of the possible terms and began to prepare detailed plans to scuttle his ships, on June 18th he gave out orders which stated “It is my intention to sink the ships only if the enemy should attempt to obtain possession of them without the assent of our government.” While the signing of Versaille was scheduled for noon 21 June 1919 the First Battle Squadron prepared to board the German ships to check for signs of the crew preparing to scuttle however they had been misinformed the deadline of the treaty was extended to 19:00 23 June. Around 10:00 a.m. on 21 June 1919 Ludwig von Reuter sent a signal flag ordering the fleet to scuttle which began almost immediately. There was no noticeable effect until noon when the ‘Friedrich der Grosse’ began to list heavily starboard and all the ships hoisted the Imperial German Ensign on their main masts. It was a great disaster for the Allies as 52 of the 74 ships sunk. Whilst Admiral Fremantle in charge of the supervision of the German surface fleet scorned Von Reuter and his men he privately remarked “I could not resist feeling some sympathy for von Reuter, who had preserved his dignity when placed against his will in a highly unpleasant and invidious position."
ww2_germany.16.a:0 "Besser als in ihren Händen!"
ww2_germany.17.t:0 "Ostpreußische Volksabstimmung"
ww2_germany.17.d:0 "Die Abstimmung in Ostpreußen, auch bekannt als Volksabstimmung von Allenstein und Marienwerder, war eine Volksabstimmung zur Selbstbestimmung der Regionen Ermland, Masuren und Powiśle, die gemäß dem Versailler Vertrag Teile des ostpreußischen Regierungsbezirks Allenstein und des westpreußischen Regierungsbezirks Marienwerder gewesen waren. Sie wurde Anfang des Jahres vorbereitet und fand am 11. Juli 1920 statt. Durchgeführt wurde die Volksabstimmung von den deutschen Behörden. Sowohl die deutsche als auch die polnische Regierung waren der Ansicht, dass der Ausgang der Volksabstimmung durch den anhaltenden Polnisch-Bolschewistischen Krieg, einen Teil des Russischen Bürgerkriegs, entschieden wurde, der die Existenz der neu entstandenen polnischen Nation bedrohte. Daher stimmten sogar viele deutsche Bürger polnischer Abstammung in der Region für Deutschland, aus Angst, dass das Gebiet im Falle einer Zuteilung an Polen bald unter sowjetische Herrschaft fallen würde."
ww2_germany.17.a:0 "Ostpreußen gehört uns!"
ww2_germany.18.t:0 "Kapp-Putsch"
ww2_germany.18.d:0 "Am 13. März 1920 starteten Wolfgang Kapp und Walther von Lüttwitz einen geplanten Putsch, um die Weimarer Republik zu stürzen und an ihrer Stelle eine rechtsgerichtete Regierung zu etablieren. Unterstützt wurde der Putsch von Teilen der Reichswehr und anderen konservativen, nationalistischen und monarchistischen Fraktionen. Der Putsch begann in Berlin und zwang die legitime Weimarer Regierung zur Flucht aus der Stadt. Er scheiterte nach wenigen Tagen, als große Teile der deutschen Bevölkerung, angestachelt von der legitimen Regierung, einen Generalstreik begannen, bei dem die Teilnehmer die Zusammenarbeit mit Kapp und seinen Verbündeten verweigerten. Trotz seines Scheiterns hatte der Putsch erhebliche Folgen für die Zukunft der Weimarer Republik und sollte ein Vorbote zukünftiger Entwicklungen sein."
ww2_germany.18.a:0 "Wir befinden uns in einem fragilen Zustand..."
ww2_germany.19.t:0 "Ruhraufstand"
ww2_germany.19.d:0 "Der Ruhraufstand, auch Märzaufstand genannt, fand im März 1920 im Ruhrgebiet statt. Es handelte sich um einen Aufstand linker Arbeiter und der Aufstand diente ursprünglich der Unterstützung des Aufrufs zum Generalstreik, den die sozialdemokratischen Mitglieder der deutschen Regierung, der Gewerkschaften und anderer Parteien als Reaktion auf den rechtsgerichteten Kapp-Putsch vom 13. März 1920 erlassen hatten. Die Kommunisten und Sozialisten im Ruhrgebiet hatten jedoch bereits zuvor Pläne geschmiedet, im Falle eines Generalstreiks „die politische Macht durch die Diktatur des Proletariats zu erobern“."
ww2_germany.19.a:0 "Besser tot als rot"
ww2_germany.20.t:0 "Spartakusaufstand"
ww2_germany.20.d:0 "Der Spartakusaufstand war ein Generalstreik mit bewaffneten Kämpfen im Übergangsdeutschland vom 4. bis 15. Januar 1919. \n\n Während sich Deutschland mitten in einer Nachkriegsrevolution befand, waren zwei der möglichen Wege nach vorn entweder eine Sozialdemokratie oder eine Räterepublik. Der Aufstand war in erster Linie ein Machtkampf zwischen der gemäßigten Sozialdemokratischen Partei (SPD) und den radikaleren Kommunisten der Kommunistischen Partei unter der Führung von Karl Liebknecht und Rosa Luxemburg, die beide später nach der Niederschlagung des Aufstands hingerichtet wurden."
ww2_germany.20.a:0 "Besser tot als rot!"
ww2_germany.21.t:0 "Die Bayerische Räterepublik spaltet sich ab"
ww2_germany.21.d:0 "Am 6. April 1919 wurde in Bayern offiziell die Räterepublik ausgerufen. Sie wurde zunächst von USPD-Mitgliedern und Anarchisten regiert. Am Sonntag, dem 12. April 1919, ergriff die Kommunistische Partei offiziell die Macht. Eugen Levine führte kommunistische Reformen durch, initiierte den Aufbau einer Roten Armee, beschlagnahmte Bargeld und Lebensmittel, enteignete Luxuswohnungen und gab sie an Obdachlose weiter. Fabriken wurden den Arbeitern unterstellt. Die Republik war jedoch nur von kurzer Dauer, da die verbliebenen loyalen Mitglieder der deutschen Armee die Opposition niederschlugen und Levine hinrichteten."
ww2_germany.21.a:0 "Sie werden sich einreihen"
ww2_germany.22.t:0 "Explosion in Oppau"
ww2_germany.22.d:0 "Am 21. September 1921 ereignete sich in der deutschen Stadt Oppau eine Explosion epischen Ausmaßes. Berichte gehen ein, dass in einem BASF-Werk in Oppau ein Hochsilo explodiert sei, in dem 4.500 Tonnen einer Mischung aus Ammoniumsulfat und Ammoniumnitrat-Dünger gelagert waren. 500 bis 600 Menschen kamen ums Leben, 2.000 weitere wurden verletzt."
ww2_germany.22.a:0 "Unglücklich"
ww2_germany.23.t:0 "Hamburger Aufstand"
ww2_germany.23.d:0 "Der Hamburger Aufstand war ein Aufstand in der Weimarer Republik, der am 23. Oktober von einer der militantesten Sektionen der Hamburger KPD, der KP Wasserkante, begonnen wurde. Die Rebellen stürmten 24 Polizeiwachen, 17 in Hamburg und sieben in der Provinz Schleswig-Holstein in Preußen. Über 100 Menschen starben während des Aufstands."
ww2_germany.23.a:0 "Dieser Aufstand wird behandelt"
ww2_germany.24.t:0 "Küstriner Putsch"
ww2_germany.24.d:0 "Der Küstriner Putsch, auch Buchrucker-Putsch genannt, war eine Reaktion auf die Niederschlagung des Widerstands der deutschen Regierung gegen die Besetzung des Ruhrgebiets am 26. September. Unter Führung von Bruno Ernst Buchrucker wollten Gruppen der Schwarzen Reichswehr die Reichsregierung von Reichskanzler Gustav Stresemann stürzen und die parlamentarisch-demokratische Republik durch eine nationale Diktatur ersetzen. Ein weiteres Motiv für den Putsch war die Entscheidung der Reichswehr, Arbeitskommandos aufzulösen, wodurch viele ihrer Mitglieder ihre Lebensgrundlage verloren. Der Versuch, die Garnisonsstadt Küstrin zu besetzen, wurde von Einheiten der Reichswehr vereitelt. Buchrucker und andere Offiziere wurden verhaftet und wegen Hochverrats zu Festungs- oder Gefängnishaft verurteilt. Der Großteil der Rebellen kam bald darauf frei und blieb straffrei."
ww2_germany.24.a:0 "Es hätte schlimmer kommen können"
ww2_germany.25.t:0 "Bierhallenputsch"
ww2_germany.25.d:0 "Am 8. November 1923 stürmten Hitler und die SA eine von Gustav Ritter von Kahr organisierte öffentliche Versammlung mit 3.000 Menschen im Bürgerbräukeller, einem Bierlokal in München. Er unterbrach Kahrs Rede, verkündete den Beginn der nationalen Revolution und rief die Bildung einer neuen Regierung unter Ludendorff aus. Hitler zog sich in ein Hinterzimmer zurück und verlangte mit vorgehaltener Waffe die Unterstützung von Kahr, Seisser und Lossow, die er auch erhielt. Hitlers Truppen gelang es zunächst, das örtliche Reichswehr- und Polizeipräsidium zu besetzen, doch Kahr und seine Kohorten zogen ihre Unterstützung schnell zurück. Weder die Armee noch die Staatspolizei verbündeten sich mit Hitler. Am nächsten Tag marschierten Hitler und seine Anhänger vom Bierlokal zum Bayerischen Kriegsministerium, um die Bayerische Regierung zu stürzen, doch die Polizei zerstreute sie. Sechzehn NSDAP-Mitglieder und vier Polizisten wurden bei dem gescheiterten Putsch getötet."
ww2_germany.25.a:0 "Die Nation steht auf schwachen Stützen"
ww2_germany.26.t:0 "Hitler zu Gefängnis verurteilt"
ww2_germany.26.d:0 "Infolge des Hitlerputsches im Bürgerbräukeller floh Hitler in das Haus von Ernst Hanfstaengl und dachte einigen Berichten zufolge an Selbstmord. Als er am 11. November 1923 wegen Hochverrats verhaftet wurde, war er deprimiert, aber ruhig. Sein Prozess vor einem Sondervolksgericht in München begann im Februar 1924 und Alfred Rosenberg wurde vorübergehend Vorsitzender der NSDAP. Am 1. April wurde Hitler zu fünf Jahren Gefängnis im Gefängnis Landsberg verurteilt. Dort wurde er von den Wächtern freundlich behandelt und durfte Post von Anhängern und regelmäßige Besuche von Parteigenossen empfangen. Er wurde vom Bayerischen Obersten Landesgericht begnadigt und am 20. Dezember 1924 gegen den Einspruch der Staatsanwaltschaft aus der Haft entlassen."
ww2_germany.26.a:0 "Wo er hingehört!"
ww2_germany.27.t:0 "Hitler freigelassen"
ww2_germany.27.d:0 "Am 1. April 1924 wurde Hitler zu fünf Jahren Haft im Landsberger Zuchthaus verurteilt. Er wurde jedoch später vom Bayerischen Obersten Landesgericht begnadigt und am 20. Dezember 1924 gegen den Einspruch der Staatsanwaltschaft aus der Haft entlassen. Einschließlich der Untersuchungshaft saß Hitler etwas mehr als ein Jahr im Gefängnis."
ww2_germany.27.a:0 "Willkommen zurück in der Gesellschaft!"
ww2_germany.28.t:0 "Mein Kampf veröffentlicht"
ww2_germany.28.d:0 "„Mein Kampf“ wurde von Adolf Hitler während seiner Haftstrafe verfasst und weniger als ein Jahr nach seiner Entlassung am 18. Juli 1925 veröffentlicht. Es skizzierte Hitlers politische Ideologie und Zukunftspläne für Deutschland und wurde von Hitlers Stellvertreter Rudolf Heß herausgegeben. Er begann mit dem Buch, während er nach dem gescheiterten Putsch in München wegen seiner Ansicht nach „politischer Verbrechen“ inhaftiert war. Allerdings empfing er anfangs viele Besucher und widmete sich bald ganz dem Buch. Im Laufe der Zeit wurde ihm klar, dass es kein zweibändiges Buch werden musste, da der erste Band Anfang 1925 erscheinen sollte. Der Gouverneur von Landsberg bemerkte damals: „Er hofft, dass das Buch viele Auflagen erleben wird, um ihm so zu ermöglichen, seinen finanziellen Verpflichtungen nachzukommen und die während seines Prozesses anfallenden Kosten zu bestreiten.“"
ww2_germany.28.a:0 "Ich werde es unbedingt lesen!"
ww2_germany.29.t:0 "Hitler wird Führer der NSDAP"
ww2_germany.29.d:0 "Ab 1921 konnte Adolf Hitler immer besser vor immer größeren Menschenmengen sprechen und im Februar sprach er in München vor fast 6.000 Menschen. Als Hitler München jedoch verließ, um rechtsextreme nationalistische Gruppen in Berlin, der Zentrale der NSDAP, zu besuchen, kam es zu einer inneren Revolte in der Partei. Die Partei, die immer noch von einem Vorstand geführt wurde, dessen ursprüngliche Mitglieder Hitler für höchst anmaßend und diktatorisch hielten, wollte Hitlers Position schwächen und schloss ein Bündnis mit einer Gruppe Sozialisten aus Augsburg. Hitler eilte daraufhin nach München zurück und begegnete ihnen mit der Ankündigung seines Parteiaustritts am 11. Juli 1921. Die Partei erkannte, dass Hitlers Verlust praktisch das Ende der NSDAP bedeuten würde und Hitler nutzte die Gelegenheit und verkündete seine Rückkehr unter der Bedingung, dass er zum Vorsitzenden ernannt und mit der absoluten Macht ausgestattet würde. Wütende Vorstandsmitglieder hielten zunächst durch, gaben aber schließlich nach und bei einer Abstimmung erhielt Hitler 543 Stimmen dafür und nur eine Gegenstimme. Bei der nächsten Versammlung am 29. Juli 1921 wurde Hitler als Führer der NSDAP vorgestellt. Dies war das erste Mal, dass dieser Titel öffentlich für seine Anrede verwendet wurde."
ww2_germany.29.a:0 "Der beste Mann dafür!"
ww2_germany.30.t:0 "Matthias Erzberger ermordet!"
ww2_germany.30.d:0 "Matthias Erzberger war ein deutscher Publizist und Politiker. Als bevollmächtigter Vertreter der Reichsregierung unterzeichnete er persönlich den Waffenstillstand zwischen Deutschland und den Alliierten. Diese Tat machte ihn in der politischen Rechten berüchtigt und er wurde schließlich am 26. August 1921 bei einem Spaziergang in Bad Griesbach ermordet. Der Mord wurde von Manfred von Killinger, einem führenden Mitglied des Germanenordens, geplant, der zwei Mitglieder der ultranationalistischen Todesschwadron Organisation Consul rekrutierte."
ww2_germany.30.a:0 "kann nicht sagen, dass es nicht gekommen wäre …"
ww2_germany.31.t:0 "Klaipeda-Aufstand"
ww2_germany.31.d:0 "Der Klaipėda-Aufstand ereignete sich vom 10. bis 15. Januar 1923 in der Region Klaipėda, auch bekannt als Memelland. Die Region wurde im Versailler Vertrag von Ostpreußen abgetrennt, zum Mandatsgebiet des Völkerbundes erklärt und unter provisorische französische Verwaltung gestellt, bis eine dauerhaftere Lösung gefunden werden konnte. Litauen wollte sich aufgrund der großen litauischsprachigen Minderheit mit der Region vereinigen, und der große Hafen in Memel war für Litauen der einzige praktikable Zugang zur Ostsee. Da die Botschafterkonferenz stattdessen dafür war, die Region als kleine freie Stadt nach dem Vorbild der Freien Stadt Danzig zu belassen, organisierten und inszenierten die Litauer einen Aufstand, der mit der Übergabe der Region an Litauen endete."
ww2_germany.31.a:0 "Memel gehört uns!"
ww2_germany.32.t:0 "Endlich ein richtiger Kanzler"
ww2_germany.32.d:0 "Nach vielen bürokratischen Kämpfen wurde ein neuer, richtiger Kanzler des Deutschen Reiches gewählt."
ww2_germany.32.a:0 "OK"
ww2_germany.33.t:0 "Italienische Sozialrepublik gegründet!"
ww2_germany.33.d:0 "Nach dem Angriff auf den Gran Sasso und der Rettung Mussolinis zwang Hitler den widerstrebenden Mussolini zur Gründung eines neuen faschistischen Staates in Norditalien, der Italienischen Sozialrepublik. Dieser beanspruchte Rom als Hauptstadt, doch die De-facto-Hauptstadt wurde die kleine Stadt Salo zwischen Mailand und Venedig. Die Italienische Sozialrepublik ist kaum mehr als ein Marionettenstaat, der vollständig von Deutschland abhängig ist, das ist heute jedem klar."
ww2_germany.33.a:0 "Dieser Kampf muss weitergehen!"
ww2_germany.34.t:0 "Italiens Übertritt steht unmittelbar bevor"
ww2_germany.34.d:0 "Nach Mussolinis Sturz und seiner Gefangennahme sowie der neuen Regierung unter König Viktor Emanuel III. und Pietro Badoglio ist ein Seitenwechsel Italiens kaum abwegig. Er dürfte unmittelbar bevorstehen, da die italienische Kampfbereitschaft nach diesen Ereignissen dramatisch sinkt. Wir müssen eine beträchtliche Anzahl von Truppen nach Italien schicken, um den Seitenwechsel vorzubereiten und die Kontrolle zu übernehmen, bevor die Alliierten dies tun."
ww2_germany.34.a:0 "Wir müssen die Kontrolle über Italien übernehmen!"
ww2_germany.35.t:0 "Frankreich kapituliert! Waffenstillstand von Marne unterzeichnet!"
ww2_germany.35.d:0 "Nach unserer erfolgreichen Frühjahrsoffensive und der anschließenden Einnahme von Paris hat die Dritte Französische Republik offiziell einem Waffenstillstand zugestimmt, der heute in Marne unterzeichnet wurde und den Krieg zwischen unseren beiden Ländern beendet. Frankreich hat sich bereit erklärt, sein Militär zu demobilisieren und die britischen Streitkräfte so schnell wie möglich vom Festland zu vertreiben. Unsere Politikerkollegen werden demnächst eine entsprechende Verhandlung durchführen. \n\n Nach dem Ausscheiden Frankreichs aus dem Krieg werden Großbritannien, Italien und Amerika bald mit Waffenstillstandsverhandlungen nachziehen."
ww2_germany.35.a:0 "Wir sind siegreich!"
ww2_germany.36.t:0 "Operation Margarethe"
ww2_germany.36.d:0 "Nachdem Hitler von den Gesprächen Miklós Horthys mit den Alliierten über einen Waffenstillstand erfahren hatte, fühlte sich der deutsche Führer von den Ungarn verraten und befahl den deutschen Truppen, am 12. März 1944 die Operation Margarethe durchzuführen, um wichtige ungarische Einrichtungen einzunehmen. Hitler hatte Horthy in das Schloss Klessheim in Österreich eingeladen, und während sie ihre Verhandlungen führten, drangen deutsche Truppen heimlich in Ungarn ein. Das Treffen war lediglich ein Vorwand, um Horthy aus dem Land fernzuhalten und die Armee ohne Befehle zu lassen."
ww2_germany.36.a:0 "Verräter!"
ww2_germany.37.t:0 "Ostpreußen fällt"
ww2_germany.37.d:0 "Ostpreußen ist der schnell vorrückenden Roten Armee zum Opfer gefallen. Unsere Zivilisten und Soldaten versuchen verzweifelt, ihrem Vormarsch zu entkommen. Sie entern Flüchtlingsschiffe und versuchen zu entkommen. Einige dieser Schiffe sind gesunken. Die Gesamtzahl der getöteten Zivilisten wird auf etwa 300.000 geschätzt."
ww2_germany.37.a:0 "Eine blutige Katastrophe!"
ww2_germany.38.t:0 "Der Plan vom 20. Juli scheitert!"
ww2_germany.38.d:0 "Heute, während sich der Führer in seinem Feldhauptquartier „Wolfsschanze“ in Ostpreußen aufhielt, wurde ein Attentat auf ihn verübt. Offenbar zielte das Attentat darauf ab, unseren geliebten Führer zu töten, die politische Kontrolle über Deutschland und seine Streitkräfte zu übernehmen und so schnell wie möglich Frieden mit den Westalliierten zu schließen. Wir haben so viele Verschwörer wie möglich festgenommen, und sie werden dafür als Vergeltung streng bestraft!"
ww2_germany.38.a:0 "Sie sind einfach nur dreckige Feiglinge!"
ww2_germany.39.t:0 "Führer tot!"
ww2_germany.39.d:0 "Der Führer, dessen schnell vorrückende Rote Armee sich Straße für Straße seinem Führerbunker nähert, hat bis zum letzten Moment tapfer gekämpft und sich entschlossen, Selbstmord zu begehen, um das Leben des deutschen Volkes zu retten und es von seinen Eiden zu entbinden. Zweifellos ist sein Tod nicht aus Feigheit, sondern aus Tapferkeit entstanden. Er ruht nun mit den Millionen anderer Menschen, die für das Reich ihr Leben riskiert und gestorben sind."
ww2_germany.39.a:0 "Der Krieg geht weiter!"
ww2_germany.3901.t:0 "Jodel und Keitl kapitulieren alle deutschen Streitkräfte"
ww2_germany.3901.d:0 "Heute wurde in Berlin-Karlshorst der endgültige Text für die deutsche Kapitulation aller Streitkräfte von Vertretern dreier Teilstreitkräfte des Oberkommandos der Wehrmacht (OKW) und der Alliierten Expeditionsstreitkräfte zusammen mit dem Obersten Oberkommando der Roten Armee unterzeichnet. Weitere französische und US-amerikanische Vertreter unterzeichneten als Zeugen. Die erste Kapitulationsurkunde wurde in Reims von Alfred Jodl unterzeichnet, dem es leider nicht gelungen war, bessere Kapitulationsbedingungen auszuhandeln. Wenige Stunden später rief die Sowjetunion jedoch in Berlin zu einer einmaligen Kapitulation auf, wo diese „deutsche Aggression“ ihren Ursprung hatte, und stellte gleichzeitig klar, dass die Kapitulation von Reims von den deutschen Soldaten nicht ausdrücklich verlangte, ihre Waffen niederzulegen und sich zu ergeben. Eisenhower stimmte zu und die endgültige Urkunde über die bedingungslose Kapitulation des deutschen Militärs wurde in Berlin von Feldmarschall Wilhelm Keitl unterzeichnet."
ww2_germany.3901.a:0 "Alles ist verloren ..."
Recent_coup:0 "Jüngster Putsch"
ww2_germany.40.t:0 "Die Türkei beendet die diplomatischen Beziehungen zu uns!"
ww2_germany.40.d:0 "Während des Zweiten Weltkriegs unterhielt die Türkei bis August 1944 diplomatische Beziehungen zu Deutschland. Am 18. Juni 1941 unterzeichneten Deutschland und die Türkei den deutsch-türkischen Nichtangriffspakt, dem bald das „Clodius-Abkommen“ folgte, in dem die Türkei 45.000 Tonnen Chromiterz und 90.000 Tonnen Mineralien nach Deutschland exportieren sollte. Um dem entgegenzuwirken, versuchten die USA und Großbritannien, das türkische Chromiterz vor Deutschland aufzukaufen, selbst wenn sie keines benötigten. Als die Rote Armee im August 1944 in Bulgarien einmarschierte und damit den Landkontakt zwischen der Türkei und den Achsenmächten abbrach, beschloss die Türkei, die diplomatischen und kommerziellen Beziehungen zu Deutschland abzubrechen."
ww2_germany.40.a:0 "Wir werden von der Welt lebendig begraben ..."
ww2_germany.41.t:0 "Der Warschauer Aufstand beginnt"
ww2_germany.41.d:0 "In Warschau ist die polnische Widerstandsarmee der Heimatarmee aufgestanden, hat vorübergehend die Kontrolle über die Stadt übernommen und unsere Truppen zusammengetrieben. Dieser Aufstand ist höchstwahrscheinlich auf die schnell vorrückende Rote Armee zurückzuführen, die sich derzeit den Vororten der Stadt nähert. Da sie jedoch keine Unterstützung von außen hat, dürfte es nicht schwer sein, sie niederzuschlagen."
ww2_germany.41.a:0 "Dafür werden wir Warschau in Stücke reißen!"
ww2_germany.43.t:0 "Rommel tot!"
ww2_germany.43.d:0 "Erin Rommel, der fälschlicherweise beschuldigt wurde, unschuldig in das Attentat vom 20. Juli verwickelt gewesen zu sein, wurde zum Tode verurteilt. Hitler wusste jedoch, dass dies Rommel als Verräter brandmarken und die Moral an der Heimatfront schädigen würde, was Rommel die Möglichkeit geben würde, sich das Leben zu nehmen. Am 14. Oktober 1944 nahm er eine Zyankalitablette und wurde für tot erklärt. Zeugen waren beeindruckt von dem Lächeln tiefer Verachtung auf Rommels Gesicht nach seinem Tod, das er zu Lebzeiten noch nie gesehen hatte. Seine Frau hatte gedacht, es gelte Hitler."
ww2_germany.43.a:0 "Legenden sterben nie"
ww2_germany.44.t:0 "Operation Panzerfaust"
ww2_germany.44.d:0 "Der Führer hat kürzlich erfahren, dass Miklos Horthy, der ungarische Staatschef, heimlich über die Kapitulation seines Landes vor der vorrückenden Roten Armee verhandelt. Er hat daraufhin Otto Skorzeny und weitere Spezialeinheiten entsandt, um die Lage zu klären. Der Führer befürchtet, dass diese Kapitulation die deutsche Südflanke, wo Rumänien bereits gegen das Reich vorgegangen ist und viele unserer Truppen abgeschnitten hat, noch weiter gefährden wird."
ww2_germany.44.a:0 "Horthy muss entfernt werden!"
ww2_germany.45.t:0 "Kluge tot aufgefunden"
ww2_germany.45.d:0 "Feldmarschall Gunther von Kluge wurde heute tot aufgefunden. Er hatte sich mit einer Zyankalitablette das Leben genommen, nachdem er vom Führer nach Berlin zurückgerufen worden war, nachdem das monströse Attentat gescheitert war. Kluge spielte dabei zwar eine untergeordnete, aber eine bedeutende Rolle bei seinem verräterischen Verrat am Reich und seinem Volk."
ww2_germany.45.a:0 "Untreues Schwein"
ww2_germany.46.t:0 "Willkommen beim Mod"
ww2_germany.46.d:0 "Willkommen bei Endsieg: Ultimate Victory! Dieser Mod wird derzeit von einer Person entwickelt. Wenn Sie also helfen möchten, kontaktieren Sie mich einfach! Vielen Dank an meinen Freund Soldier, der mit einigen technischen Grafiken geholfen hat, und an Dethorath, der eine ganze Reihe von Ereignissen für die Zwischenkriegszeit geschrieben hat. \n\n Ardennenoffensive/Endsieg-Szenario \n\n Deutschland ist derzeit in einer schlechten Lage, SEHR SEHR SCHLECHT. Die Alliierten rücken von drei Seiten vor, in Italien, im Osten und im Westen. Es gibt wenig Hoffnung auf Erfolg. Das Reich hat noch immer große Macht über die Gebiete, die es kontrolliert, und die Volksdeutschen sind bereit, bis zum letzten Mann zu kämpfen."
ww2_germany.46.a:0 "OK"
ww2_germany.47.t:0 "Königsberger Wasserfälle"
ww2_germany.47.d:0 "Die Stadt Königsberg ist widerwillig in die Hände des Feindes gefallen, wir müssen sie um jeden Preis zurückerobern!"
ww2_germany.47.a:0 "Das sind schlechte Nachrichten ..."
ww2_germany.48.t:0 "Danzig Falls"
ww2_germany.48.d:0 "Die Stadt Danzig ist widerwillig in die Hände des Feindes gefallen, wir müssen sie um jeden Preis zurückerobern!"
ww2_germany.48.a:0 "Wir müssen weiterkämpfen"
ww2_germany.49.t:0 "Prager Wasserfälle"
ww2_germany.49.d:0 "Die Stadt Prag ist widerwillig in die Hände des Feindes gefallen, wir müssen sie um jeden Preis zurückerobern!"
ww2_germany.49.a:0 "Das Ende ist nah..."
ww2_germany.50.t:0 "Zagreb Falls"
ww2_germany.50.d:0 "Die Hauptstadt unseres Verbündeten Kroatien, Zagreb, ist widerwillig in die Hände des Feindes gefallen. Wir müssen sie um jeden Preis zurückerobern!"
ww2_germany.50.a:0 "Wir müssen es zurückholen!"
ww2_germany.51.t:0 "Breslau Falls"
ww2_germany.51.d:0 "Die Stadt Breslau ist widerwillig in die Hände des Feindes gefallen, wir müssen sie um jeden Preis zurückerobern!"
ww2_germany.51.a:0 "Das Ende ist nah..."
ww2_germany.52.t:0 "Berlin Falls"
ww2_germany.52.d:0 "Straße für Straße, Haus für Haus, bis zum letzten Mann und bis zur letzten Frau wird gekämpft. Die Reichshauptstadt Berlin selbst ist nach einigen der erbittertsten Kämpfe, die es je gab, schließlich widerwillig in die Hände des Feindes gefallen. Doch mit oder ohne Berlin, der Krieg wird weitergehen!"
ww2_germany.52.a:0 "Der Krieg geht weiter!"
ww2_germany.53.t:0 "Budapest Falls"
ww2_germany.53.d:0 "Die Hauptstadt unseres Verbündeten Ungarn, Budapest, ist widerwillig in die Hände des Feindes gefallen. Wir müssen sie um jeden Preis zurückerobern!"
ww2_germany.53.a:0 "Das sind schlechte Nachrichten ..."
ww2_germany.54.t:0 "Sarajevo-Wasserfälle"
ww2_germany.54.d:0 "Die Stadt unseres Verbündeten Kroatien, Sarajevo, ist widerwillig in die Hände des Feindes gefallen. Wir müssen sie um jeden Preis zurückerobern!"
ww2_germany.54.a:0 "Wir müssen weiterkämpfen"
ww2_germany.55.t:0 "Frankfurt Falls"
ww2_germany.55.d:0 "Die Stadt Frankfurt ist widerwillig in die Hände des Feindes gefallen, wir müssen sie um jeden Preis zurückerobern!"
ww2_germany.55.a:0 "Sie sind ins Herz des Reiches eingedrungen!"
ww2_germany.56.t:0 "Münchener Wasserfälle"
ww2_germany.56.d:0 "Die Stadt München ist widerwillig in die Hände des Feindes gefallen, wir müssen sie um jeden Preis zurückerobern!"
ww2_germany.56.a:0 "Sie sind bis ins Herz des Reiches vorgedrungen!"
ww2_germany.57.t:0 "Wittmann in der Normandie getötet!"
ww2_germany.57.d:0 "Am 8. August 1944 starteten anglo-kanadische Streitkräfte die Operation Totalize. Im Schutz der Dunkelheit eroberten britische und kanadische Panzer, begleitet von Soldaten, eine taktisch wichtige Anhöhe nahe der Stadt Saint-Aignan-de-Cramesnil. Hier hielten sie an und warteten auf einen Luftangriff, der die nächste Phase des Angriffs einläuten würde. Kurt Meyer von der 12. SS-Hitlerjugend-Division kannte den Grund für den Halt der alliierten Streitkräfte nicht und befahl Teilen seines Kommandos, einen Gegenangriff durchzuführen und die Anhöhe zurückzuerobern. \n\n Panzerass Michael Wittmann, auch bekannt als der „Schwarze Baron“, der 135 bestätigte Panzerabschüsse vorweisen konnte, führte eine Gruppe von sieben Tiger-Panzern an, die von weiteren Panzern und Infanterie unterstützt wurden. Seine Gruppe von Tigern, die offenes Gelände in Richtung der Anhöhe überquerten, geriet in einen Hinterhalt von Panzern der A-Staffel des 1. Northamptonshire Yeomanry, der A-Staffel des Sherbrooke Fusilier Regiment und der B-Staffel des 144. Regiments des Royal Armoured Corps. Während des Hinterhalts durchschlugen Panzerabwehrgranaten britischer oder kanadischer Panzer die obere Wanne von Wittmanns Panzer und entzündeten die Munition. Das Feuer erfasste den Panzer und sprengte den Turm ab. Die Besatzung des zerstörten Panzers wurde anschließend in einem anonymen Grab begraben."
ww2_germany.57.a:0 "Er starb bei der Verteidigung des Reiches!"
ww2_germany.58.t:0 "Wittmann erringt 136. Abschuss!"
ww2_germany.58.d:0 "Michael Wittmann, besser bekannt als der „Schwarze Baron“, ist aus einer weiteren Schlacht siegreich aus seinem Tiger-Panzer zurückgekehrt! Seine Legende flößt dem Feind mehr Angst ein als jede andere, und er ist ein bekannter Held des Reiches und seines Volkes, das in diesen dunklen Zeiten und einer düsteren Zukunft mehr als jeder andere einen Helden braucht …"
ww2_germany.58.a:0 "Möge Gott ihn beschützen"
ww2_germany.59.t:0 "Nichts"
ww2_germany.59.d:0 "Nichts"
ww2_germany.59.a:0 "Nichts"
ww2_germany.60.t:0 "Amsterdam Falls"
ww2_germany.60.d:0 "Die Stadt Amsterdam ist widerwillig in die Hände des Feindes gefallen, wir müssen sie um jeden Preis zurückerobern!"
ww2_germany.60.a:0 "Wir müssen es zurückholen!"
