 GER_ussr_war_goal:1 "Unternehmen Barbarossa"
 GER_danzig_or_war:1 "Fall Weiss"
 GER_war_with_france:1 "Herbstfäule"
 GER_around_maginot:1 "Fall Gelb"
 GER_fall_of_france:0 "Fall Frankreichs"
 GER_fall_of_france_desc:0 "Es ist uns gelungen, Frankreich zu erobern!"
 GER_fall_of_uk:0 "Untergang des Vereinigten Königreichs"
 GER_fall_of_uk_desc:0 "Es ist uns gelungen, das Vereinigte Königreich zu erobern!"
 GER_fall_of_soviet_union:0 "Untergang der Sowjetunion"
 GER_fall_of_soviet_union_desc:0 "Es ist uns gelungen, die Sowjetunion zu erobern!"
 GER_operation_seelowe:0 "Operation Seelöwe"
 GER_operation_seelowe_desc:0 "Operation Seelöwe oder Operation Sealion war der Deckname für die Invasion Großbritanniens. Nach dem Fall Frankreichs hatten wir gehofft, dass die Engländer einen Waffenstillstand anstreben würden, doch da sie dies ablehnten, mussten wir zu entschiedeneren Maßnahmen greifen. Für diese Operation bräuchten wir eine enorme Anzahl an Schiffen und Luftunterstützung."
 GER_fall_grun:0 "Fall Grün"
 GER_fall_grun_desc:0 "„Fall Grün“ war ein umfassender Operationsplan für die Invasion Irlands zur Unterstützung der Operation Seelöwe. Es handelte sich hauptsächlich um einen Divisionsplan, aber wir konnten ihn natürlich auch in die Tat umsetzen."
 GER_operation_wacht_am_rhein:0 "Operation Wacht am Rhein"
 GER_operation_wacht_am_rhein_desc:0 "Auch bekannt als Ardennenoffensive, ist dies unsere letzte Chance auf einen unglaublichen Sieg gegen die Alliierten. Wir können unseren ersten Sieg gegen die Franzosen in den Ardennen wiederholen, und ihnen sollte keine Zeit zum Reagieren bleiben. Wir sollten in der Lage sein, riesige Divisionen einzukesseln, wodurch unsere Männer für die Verteidigung im Osten frei werden."
 GER_operation_nordwind:0 "Operation Nordwind"
 GER_operation_nordwind_desc:0 "Um die Operation „Wacht am Rhein“ zu unterstützen, müssen wir den Angriff durch die Ardennen unterstützen und die amerikanischen Linien durchbrechen. Sollte uns dies gelingen, sollten wir in der Lage sein, die gesamte dort stationierte Armee zu vernichten."
 GER_operation_typhoon_desc:0 "Unsere Pläne für einen Angriff auf die sowjetische Hauptstadt können endlich in die Tat umgesetzt werden. Unser Angriff wird aus zwei Zangenoffensiven bestehen, eine nördlich von Moskau gegen die Kalinin-Front und die andere südlich der Oblast Moskau gegen die Westfront. Diese Operation wird den Ausgang dieses Krieges entscheidend beeinflussen."
 GER_fall_anton:0 "Fall Anton"
 GER_fall_anton_desc:0 "Angesichts des Angriffs der Alliierten auf das Vichy-Regime ist es an der Zeit, zum Schutz unserer Interessen zu handeln."
 GER_operation_citadel_desc:0 "Wir haben die Schlacht um die Ölfelder und den Kaukasus verloren, aber der Krieg ist nicht verloren. Wir kontrollieren immer noch große Teile der Sowjetunion, genug, um einen gestaffelten Rückzug entlang der Front zu führen und die Sowjets zu zermürben. Doch bevor wir mit Verteidigungsoperationen beginnen können, müssen wir eine weitere Offensive starten, um die Frontlinie zu stabilisieren."
 GER_fall_blau_desc:0 "Wir haben unsere Ziele des letzten Jahres nicht erreicht, haben aber die Initiative an der Ostfront noch nicht verloren. Der Großteil der sowjetischen Streitkräfte ist in und um Moskau sowie entlang unserer zentralen Front stationiert. Wir haben die Möglichkeit, nach Süden vorzustoßen und die wichtigen Ölfelder von Baku sowie die Stadt Stalins einzunehmen, was ein schwerer Schlag für die Bolschewiken wäre."

