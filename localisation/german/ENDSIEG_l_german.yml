# WW1 Bulgaria #
 ww1_bulgaria.1.t:0 "Der Zweite Balkankrieg"
 ww1_bulgaria.1.d:0 "Während des Ersten Balkankrieges gelang es uns gemeinsam mit der Balkanliga, das Osmanische Reich aus den meisten seiner europäischen Besitzungen zu vertreiben. Durch die Schaffung eines unabhängigen Albaniens, das eigentlich an Serbien hätte fallen sollen, wurden uns jedoch die Beuteansprüche in Mazedonien verweigert, die uns durch ein geheimes Abkommen zwischen uns und Serbien versprochen worden waren. Stattdessen beanspruchte Serbien unsere Ansprüche. Es ist nun unsere Pflicht, für das zu kämpfen, was uns gehört!"
 ww1_bulgaria.1.a:0 "Wir werden ihnen die Macht Bulgariens zeigen!"
 ww1_bulgaria.1.b:0 "Wir sind zufrieden mit dem, was wir bekommen haben"
 ww1_bulgaria.101.t:0 "Bulgarien überfallen?"
 ww1_bulgaria.101.d:0 "Da Bulgarien mit seinen ehemaligen Verbündeten um das umstrittene Gebiet Vardar-Mazedonien im Krieg liegt, sollten wir die Situation vielleicht ausnutzen und uns Serbien und Griechenland in ihrem Kampf gegen den bulgarischen Imperialismus um das Gebiet der südlichen Dobrudscha anschließen."
 ww1_bulgaria.101.a:0 "Dringt in sie ein!"
 ww1_bulgaria.101.b:0 "Wir bleiben lieber neutral"
 ww1_bulgaria.102.t:0 "Bulgarien überfallen?"
 ww1_bulgaria.102.d:0 "Da Bulgarien mit seinen ehemaligen Verbündeten um das umstrittene Gebiet Vardar-Mazedonien im Krieg liegt, sollten wir die Situation vielleicht ausnutzen und uns Serbien und Griechenland in ihrem Kampf gegen den bulgarischen Imperialismus um unser verlorenes Gebiet Adrianopel anschließen."
 ww1_bulgaria.102.a:0 "Dringt in sie ein!"
 ww1_bulgaria.102.b:0 "Wir bleiben lieber neutral"
 ww1_bulgaria.102.c:0 "Mit ihnen an unserer Seite sind wir nicht aufzuhalten!"
 ww1_bulgaria.2.t:0 "Vertrag von Bukarest/Konstantinopel 1913"
 ww1_bulgaria.2.d:0 "Mit der Niederlage Bulgariens vergrößerte sich das Territorium des Königreichs Serbien von 38.300 auf 87.780 km². Die Ostgrenze Serbiens verlief vom Gipfel des Patarika an der alten Grenze entlang der Wasserscheide zwischen den Flüssen Vardar und Struma bis zur griechisch-bulgarischen Grenze und umfasste somit Zentral-Vardar-Mazedonien. Die Grenze Griechenlands verlief vom Gipfel des Belasica bis zur Mündung der Mesta in die Ägäis. Das annektierte Gebiet umfasste weite Teile Mazedoniens, darunter Thessaloniki, und beschränkte die Ägäisküste Bulgariens auf eine unbedeutende Ausdehnung von 110 km. Rumänien erhielt Süddobrudscha und in einem separaten Friedensvertrag mit den Osmanen wurde das Gebiet um Adrianopel an die Türken zurückgegeben."
 ww1_bulgaria.2.a:0 "Verdammt!"
 ww1_bulgaria.3.t:0 "Waffenstillstand von Saloniki"
 ww1_bulgaria.3.d:0 "Da sich der Krieg gegen uns wendet und die Front in Vardar-Mazedonien von den Alliierten zurückgedrängt wird, die mit unseren kriegsmüden, demoralisierten Truppen kaum Probleme haben, blieb uns keine andere Wahl, als in Saloniki einen Waffenstillstand mit der Entente zu unterzeichnen, der unsere Teilnahme am Ersten Weltkrieg beendet hatte. Der Waffenstillstand sah eine sofortige Demobilisierung aller bulgarischen Militäraktivitäten vor und ordnete die Räumung der von Bulgarien besetzten griechischen und serbischen Gebiete an. Wir wurden gezwungen, der Entente vollen militärischen Zugang zu ganz Bulgarien zu gewähren, und unseren ehemaligen Verbündeten wurde eine Frist von vier Wochen gesetzt, um ihre Truppen von unseren Grenzen abzuziehen."
 ww1_bulgaria.3.a:0 "Verdammt!"
 ww1_bulgaria.4.t:0 "Waffenstillstand von Saloniki"
 ww1_bulgaria.4.d:0 "Da sich der Krieg gegen uns wendet und die Front in Vardar-Mazedonien von den Alliierten zurückgedrängt wird, die mit unseren kriegsmüden, demoralisierten Truppen kaum Probleme haben, blieb uns keine andere Wahl, als in Saloniki einen Waffenstillstand mit der Entente zu unterzeichnen, der unsere Teilnahme am Ersten Weltkrieg beendet hatte. Der Waffenstillstand sah eine sofortige Demobilisierung aller bulgarischen Militäraktivitäten vor und ordnete die Räumung der von Bulgarien besetzten griechischen und serbischen Gebiete an. Wir wurden gezwungen, der Entente vollen militärischen Zugang zu ganz Bulgarien zu gewähren, und unseren ehemaligen Verbündeten wurde eine Frist von vier Wochen gesetzt, um ihre Truppen von unseren Grenzen abzuziehen."
 ww1_bulgaria.4.a:0 "Verdammt!"
 ww1_bulgaria.5.t:0 ""
 ww1_bulgaria.5.d:0 ""
 ww1_bulgaria.5.a:0 ""
 ww1_bulgaria.6.t:0 "Sieg im Zweiten Balkankrieg!"
 ww1_bulgaria.6.d:0 "Wir haben der ganzen Welt gezeigt, dass wir die stärkste Nation auf dem Balkan sind. Sollten wir die Übertragung der Gebiete erzwingen, die uns eigentlich schon gehören sollten, oder wollen wir uns davor hüten, um uns vor künftigen Konflikten zu schützen?"
 ww1_bulgaria.6.a:0 "Es ist bulgarischer Ton!"
 ww1_bulgaria.6.b:0 "Stabilität in der Balkanregion!"

# China events #
 ww1_china.1.t:0 "Aufstand der neuen Armee von Gengxu"
 ww1_china.1.d:0 "Kürzlich kam es in Guangzuo zu einem erneuten Aufstand, bei dem es zu Konflikten zwischen Bürgern und der örtlichen Polizei gegen die Neue Armee kam. Nachdem der Revolutionsführer Ni Yingdian von unseren Streitkräften getötet worden war, wurden die verbleibenden Revolutionäre rasch niedergeschlagen, und der Aufstand konnte glücklicherweise nicht an Boden gewinnen."
 ww1_china.1.a:0 "Gute Handhabung..."
 ww1_china.2.t:0 "Zweiter Guangzuo-Aufstand"
 ww1_china.2.d:0 "Vor kurzem kam es in Guangzuo zu einem weiteren Aufstand, der mit einer weiteren Niederlage der Revolutionäre endete. Leider wurden die 72 Revolutionäre, die identifiziert werden konnten, anschließend jedoch als Märtyrer der Revolution gefeiert, was zu verstärktem Widerstand im Land führte!"
 ww1_china.2.a:0 "Verdammt"
 ww1_china.3.t:0 "Wuchang-Aufstand"
 ww1_china.3.d:0 "Am 9. Oktober hatten Revolutionäre, die unsere Dynastie stürzen wollten, Bomben gebaut. Eine davon explodierte, was den Aufstand früher als erwartet auslöste. Der Aufstand erwies sich jedoch als schwieriger zu bewältigen und endete schließlich mit einem Erfolg für die Revolutionäre, die die gesamte Stadt Wuchang einnahmen. Wenn wir diesen Aufstand jetzt nicht niederschlagen, wird sich die Revolution wie ein Lauffeuer ausbreiten!"
 ww1_china.3.a:0 "Verdammt!"
 ww1_china.3.b:0 "(Spielen Sie als Revolutionäre)"
 ww1_china.4.t:0 "Changsha-Restaurierung"
 ww1_china.4.d:0 "Nach dem erfolgreichen Aufstand in Wuchang führten Jian Dafend und Chen Zuoxin in Changsha eine bewaffnete Gruppe von Revolutionären an, um den Aufstand noch weiter nach Changsha auszudehnen. Sie eroberten schließlich die Stadt und töteten den örtlichen kaiserlichen General."
 ww1_china.4.a:0 "Sie müssen zerquetscht werden!"
 ww1_china.5.t:0 "Shaanxi-Aufstand"
 ww1_china.5.d:0 "In Shaanxi kam es zu einem weiteren Aufstand mit dem Ziel, Xi&#39;an einzunehmen. Dieser war nach einem zweitägigen harten Kampf zwischen beiden Seiten erfolgreich und bewies den Revolutionären den Sieg."
 ww1_china.5.a:0 "Wir sind dem Untergang geweiht!"
 ww1_china.6.t:0 "Jiujiang-Aufstand"
 ww1_china.6.d:0 "Am 23. Oktober planten Lin Sen, Jiang Qun, Cai Hui und andere Mitglieder der Tongmenghui in der Provinz Jiangxi einen Aufstand der Einheiten der Neuen Armee und errangen den Sieg, indem sie die Militärregierung von Jiujang gründeten."
 ww1_china.6.a:0 "Verdammt!"
 ww1_china.7.t:0 "Aufstand in Shanxi Taiyuan"
 ww1_china.7.d:0 "Am 2. Oktober führte Yan Xishan von der Neuen Armee einen Aufstand in Taiyuan, der Hauptstadt der Provinz Shanxi, an und schaffte es, den Gouverneur der Qing-Dynastie zu töten und die Kontrolle über Taiyuan zu übernehmen."
 ww1_china.7.a:0 "Dies ist das Ende der Qing-Dynastie"
 ww1_china.8.t:0 "Kunming-Aufstand"
 ww1_china.8.d:0 "Am 30. Oktober gelang es mehreren Revolutionären in der Provinz Yunna mit Hilfe der Offiziere der Neuen Armee, Kunming einzunehmen."
 ww1_china.8.a:0 "Verdammt!"
 ww1_china.9.t:0 "Angriff der tibetischen Miliz!"
 ww1_china.9.d:0 "Vor kurzem hat in Tibet eine tibetische Miliz unsere Garnison angegriffen und sie damit faktisch aus Tibet vertrieben, wodurch ein unabhängiger tibetischer Staat gegründet wurde."
 ww1_china.9.a:0 "Verdammt!"
 ww1_china.10.t:0 "Shanghai-Aufstand"
 ww1_china.10.d:0 "Am 3. November gelang es mehreren Revolutionären in Shanghai, mit Unterstützung der örtlichen Polizei einen bewaffneten Aufstand zu organisieren. Die Rebellen eroberten rasch ganz Shanghai von unseren Männern."
 ww1_china.10.a:0 "Wir sind dem Untergang geweiht!"
 ww1_china.11.t:0 "Guizhuo-Zhejiang-Aufstand"
 ww1_china.11.d:0 "Am 4. November führten Revolutionäre in Zhejiang und Guizhuo erfolgreiche Aufstände durch und eroberten Guiyang in Guizhuo und Hangzhuo in Zhejiang."
 ww1_china.11.a:0 "Verdammt!"
 ww1_china.12.t:0 "Jiangsu-Ahui-Aufstand"
 ww1_china.12.d:0 "Am 5. November begannen Revolutionäre in den Provinzen Jiangsu und Anhui Aufstände, die sich als erfolgreich erwiesen und zur Niederlage unserer Streitkräfte in diesen Gebieten führten."
 ww1_china.12.a:0 "Dies ist das Ende der Qing-Dynastie"
 ww1_china.13.t:0 "Guangxi-Aufstand"
 ww1_china.13.d:0 "Am 7. November beschloss das politische Ministerium von Guangxi, sich von der Qing-Regierung abzuspalten. Lu Rongting soll der neue Gouverneur der Provinz werden und den ehemaligen Qing-Gouverneur Shen Bingkun ersetzen."
 ww1_china.13.a:0 "Verdammt!"
 ww1_china.14.t:0 "Fujian-Aufstand"
 ww1_china.14.d:0 "Am 11. November erklärte die gesamte Provinz Fujian ihre Unabhängigkeit und die Neue Armee startete einen Aufstand gegen die Qing-Armee, der kurz darauf von den revolutionären Kräften schnell besiegt wurde."
 ww1_china.14.a:0 "Alle wenden sich gegen uns!"
 ww1_china.15.t:0 "Aufstand in Guangdong"
 ww1_china.15.d:0 "Mehrere lokale Milizionäre in Guangdong haben in der gesamten Provinz Guangdong Aufstände angezettelt, um unsere Streitkräfte zu vertreiben, und die lokalen Vertreter von Guangdong haben beschlossen, die Revolution zu unterstützen."
 ww1_china.15.a:0 "Verdammt!"
 ww1_china.16.t:0 "Shandong-Aufstand"
 ww1_china.16.d:0 "Am 13. November stimmten mehrere Offiziere der Neuen Armee und der Qing-Gouverneur von Shandong, Sun Baoqi, einem Austritt aus der Regierung zu, und verkündeten die Unabhängigkeit Shandongs zur Unterstützung der Revolution."
 ww1_china.16.a:0 "Wir sind dem Untergang geweiht!"
 ww1_china.17.t:0 "Ningxia-Aufstand"
 ww1_china.17.d:0 "Am 23. November begann in der Provinz Ningxia ein Aufstand. Kurz darauf wurde die Revolutionäre Militärregierung von Ningxia gegründet, die die Revolution unterstützte."
 ww1_china.17.a:0 "Alle wenden sich gegen uns!"
 ww1_china.18.t:0 "Unabhängigkeit Sichuans"
 ww1_china.18.d:0 "Am 22. November erklärten Chengdu und Sichuan ihre Unabhängigkeit und stimmten zu, die Revolution zu unterstützen, wobei Qing-Beamte ermordet wurden."
 ww1_china.18.a:0 "Verdammt!"
 ww1_china.19.t:0 "Kaiser Puyi dankt ab!"
 ww1_china.19.d:0 "Nach dem Beginn des Wuhna-Aufstands waren unsere Streitkräfte nicht in der Lage, die Revolution einzudämmen, die sich wie ein Lauffeuer im ganzen Reich ausbreitete. Yuan Shikai, der starke Mann, der von unserem Hof entsandt wurde, um die Revolution niederzuschlagen, ist selbst gescheitert, und viele haben keine Lust mehr, für eine Dynastie zu kämpfen, die das Mandat des Himmels verloren zu haben scheint. \n\n Nach einem von Yuan Shikai vermittelten Abkommen unterzeichnete Kaiserinwitwe Longyu das „Kaiserliche Edikt zur Abdankung des Qing-Kaisers“, wodurch das Qing-Reich aufhörte zu existieren. Puyi darf seine kaiserlichen Titel behalten und in der nördlichen Hälfte der Stadt Frobidden bleiben, wo er eine kräftige jährliche Subvention der Republik erhält."
 ww1_china.19.a:0 "Das Qing-Reich fällt ..."
 ww1_china.20.t:0 "Die zweite Revolution"
 ww1_china.20.d:0 "Als sich die Spannungen zwischen der KMT und Yuan wegen Yuan Shikais diktatorischen Handlungen verschärften, floh Sun Yat-sen nach Japan und rief zu einer zweiten Revolution auf, diesmal jedoch gegen unseren Führer Yuan Shikai. Als Reaktion auf diesen Aufruf zur zweiten Revolution löste Yuan Shikai die National- und Provinzversammlungen sowie das Repräsentantenhaus und den Senat auf und ersetzte sie durch den neu gegründeten Staatsrat. \N\N Yuan Shikai bezeichnete die KMT als heimtückische Organisation und ordnete die Auflösung und den Rauswurf aller Abgeordneten an."
 ww1_china.20.a:0 "Wir werden sie vernichten!"
 ww1_china.21.t:0 "Yuan Shikai der neue Präsident!"
 ww1_china.21.d:0 "Aufgrund Yuans bedeutenden Beitrag zur Revolution, indem er die Kaiserinwitwe davon überzeugte, das Edikt zur Abdankung des Kaisers zu unterzeichnen, forderte Yuan Shikai zu Recht seine Präsidentschaft als Gegenleistung für seine Tat. Nach einigen internen Streitigkeiten stimmte Sun Yat-sen Yuan als Präsident zu."
 ww1_china.21.a:0 "In Ordnung"
 ww1_china.22.t:0 "Yuan Shikai ernennt sich selbst zum Kaiser!"
 ww1_china.22.d:0 "Heute, am 20. November 1915, hielt Präsident Yuan Shikai eine eigens einberufene „Versammlung der Repräsentanten“ ab, die einstimmig dafür stimmte, Yuan den Thron anzubieten. Yuan nahm die Einladung an und ernannte sich selbst zum Kaiser des chinesischen Kaiserreichs unter dem Epochennamen Hongxian. \n\n Das neue Kaiserreich China soll offiziell am 1. Januar 1916 gegründet werden. Kaiser Yuan Shikai beabsichtigt, die Thronbesteigungszeremonie durchzuführen und hat ein 40.000-teiliges Porzellanservice im Wert von 1,4 Millionen Yuan, ein großes Jadesiegel und zwei kaiserliche Roben im Wert von je 400.000 Yuan bestellt. \n\n Obwohl gesagt werden muss, dass es im In- und Ausland in ganz China viele offene Proteste gegen den Kaiser gegeben hat, ist selbst Japan, das versprochen hatte, Yuans Thronbesteigung zu unterstützen, gleichgültig oder offen feindselig geworden und hat Yuan nicht die erwartete Anerkennung zuteilwerden lassen. Und jetzt machen Gerüchte die Runde, dass Sun Yat-sen, der Tokio unter Druck gesetzt hat, ein weiteres Komplott zum Sturz Yuans plant."
 ww1_china.22.a:0 "Ehre sei dem Kaiser!"
 ww1_china.23.t:0 "Der nationale Schutzkrieg beginnt!"
 ww1_china.23.d:0 "Nach Yuan Shikais Wiedereinführung der Monarchie und seiner Thronbesteigung kam es in China zu erheblichen Unruhen. Die Regierung von Yuan Shikai hat sich dabei völlig verschätzt und erhielt weder internationale Unterstützung noch Anerkennung. In der Provinz Yunnan erklärten Militärführer wie Tang Jiyao, Cae E. und Li Liejun ihre Unabhängigkeit und starteten Feldzüge gegen Yuan."
 ww1_china.23.a:0 "Verdammt!"
 ww1_china.24.t:0 "Yuan Shikai dankt ab"
 ww1_china.24.d:0 "Angesichts des zunehmenden Drucks ist Yuan Shikai nun gezwungen, sich für eine von zwei Optionen zu entscheiden: Entweder er gibt die Monarchie vollständig auf, um das Volk und seine Feinde zufriedenzustellen, indem er die Republik mit sich selbst als Präsidenten wiederherstellt, oder er klammert sich an den Thron und versucht, diesen großen Aufstand endgültig niederzuschlagen."
 ww1_china.24.a:0 "Den Thron abdanken"
 ww1_china.24.b:0 "Klammere dich an den Thron"
 ww1_china.25.t:0 "Yuan Shikai stirbt"
 ww1_china.25.d:0 "Mit dem Tod von Yuan Shikai wurde der Nationale Schutz als Erfolg gefeiert und die rebellierenden Provinzen widerriefen ihre Unabhängigkeitserklärungen. \n\n Yuan Shikai starb um 10 Uhr morgens im Alter von 56 Jahren an Urämie. Sein Trauerzug soll bald in Peking stattfinden, wo seine sterblichen Überreste in einem großen Mausoleum beigesetzt werden."
 ww1_china.25.a:0 "Endlich Frieden"
 ww1_china.26.t:0 "Wiederbelebung der Monarchie?"
 ww1_china.26.d:0 "Viele Anhänger Yuan Shikais plädierten für eine Wiederbelebung der Monarchie und sagten, die Republik habe nur als Übergangsphase zur Beendigung der Mandschu-Herrschaft gedient. Sie argumentierten beispielsweise, dass Chinas politische Lage Stabilität erfordere, die nur eine Monarchie gewährleisten könne, und dass die chinesischen Massen seit langem an autokratische Herrschaft gewöhnt seien."
 ww1_china.26.a:0 "Was wird daraus?"
 ww1_china.27.t:0 "Kämpfe brechen um die Mandschurei aus …"
 ww1_china.27.d:0 "Russische und japanische Truppen haben begonnen, um Einfluss in der Mandschurei zu kämpfen. Sollte die Eskalation anhalten, könnte es zu einem offenen Krieg zwischen den beiden Mächten kommen. China muss entscheiden, was als nächstes zu tun ist, bevor ein weiterer Krieg Europa erfasst …"
 ww1_china.27.a:0 "Seite an Seite mit Japan"
 ww1_china.27.b:0 "Seite an Seite mit Russland"
 ww1_china.27.c:0 "Wir müssen unsere Unabhängigkeit behaupten!"
 ww1_china.28.t:0 "Eine Seite wählen..."
 ww1_china.28.d:0 "Wir müssen entscheiden, wer Einfluss auf unser Land haben kann, oder vielleicht können wir dies als Vorwand nutzen, um unabhängiger zu werden!"
 ww1_china.28.a:0 "Schöne Zeit!"
 ww1_china.29.t:0 "China fordert, dass wir unsere Einflusszonen verlassen"
 ww1_china.29.d:0 "China hat gefordert, dass wir unsere Einflusszonen verlassen und China verlassen. Dies stellt offensichtlich eine Bedrohung für uns und unsere Ansprüche gegenüber China dar. Wir müssen entscheiden, wie unsere Antwort aussehen wird."
 ww1_china.29.a:0 "Wir werden mehr chinesisches Land besetzen!"
 ww1_china.29.b:0 "Wir werden nichts tun"
 ww1_china.31.t:0 "Chinesische Industrie"
 ww1_china.31.d:0 "Schlagzeilen über Smog in Peking lenken regelmäßig die Aufmerksamkeit auf Chinas aktuelle Umweltkrise. Beobachter bringen einige dieser Probleme zu Recht mit der rasanten Wirtschaftsentwicklung der letzten Jahrzehnte in Verbindung. Doch ein Blick zurück ins späte 19. Jahrhundert liefert Hinweise auf die Ursprünge der chinesischen Industrialisierung und die heutige Umweltsituation. Auch die Chinesen unter der Herrschaft der Qing-Dynastie (1644 bis heute) waren mit vielfältigen Umweltproblemen konfrontiert. Das rasante Bevölkerungswachstum der vorangegangenen Jahrhunderte führte zu Landknappheit und der Erschöpfung natürlicher Ressourcen aller Art – von Wildtieren bis hin zu Biomassebrennstoffen. Abholzung und Bodenerosion verstärkten Überschwemmungen und untergruben nach und nach die ökologische Widerstandsfähigkeit der landwirtschaftlichen Systeme in den großen Flusstälern des Landes."
 ww1_china.31.a:0 "Wir werden unser Land entwickeln!"
# WW1 Ethiopia #
 ww1_ethiopia.1.t:0 "Menelik II. stirbt"
 ww1_ethiopia.1.d:0 "Der Kaiser war bereits nach einem schweren Schlaganfall im Jahr 1909 nur noch ein Schatten seiner selbst. Es heißt, sein Geist sei gestorben. In den frühen Morgenstunden des heutigen Tages starb er eines natürlichen Todes. Nach seinem Tod regierte der Regentschaftsrat, der nach seinem Schlaganfall die Macht übernahm, weiterhin über das Land, wobei Lij Iyasu die Macht als Regent übernahm."
 ww1_ethiopia.1.a:0 "Ein tragischer Verlust"
 ww1_ethiopia.2.t:0 "Himmelfahrt von Zewditu"
 ww1_ethiopia.2.d:0 "Da Iyasu V. aufgrund seines labilen Verhaltens beim Adel weithin unbeliebt war und die Kirche ihn wegen angeblicher Sympathien für den Islam verdächtigte, wurde er nie gekrönt. Heute wurde er gewaltsam abgesetzt. Zewditu wurde in die Hauptstadt gerufen, und die Kirche setzte Iyasu ab und ließ Zewditu den Titel „Königin der Könige“ verleihen."
 ww1_ethiopia.2.a:0 "Interessant..."

# WW1 France
 ww1_france.1.t:0 "Unterstützung italienischer Ansprüche"
 ww1_france.1.d:0 "In dem Bemühen, das Königreich Italien auf unsere Seite zu ziehen, haben wir ihm einen Vorschlag unterbreitet, der alle seine Ansprüche innerhalb der österreichisch-ungarischen Monarchie unterstützt und ihm diese im endgültigen Vertrag zuspricht, falls es der Entente beitritt."
 ww1_france.1.a:0 "Hoffen wir, dass sie einverstanden sind"
 ww1_france.101.t:0 "Frankreich schlägt Geheimvertrag vor"
 ww1_france.101.d:0 "Die Französische Republik hat einen Geheimvertrag vorgeschlagen, der, sollten wir ihn annehmen, alle unsere Ansprüche innerhalb der österreichisch-ungarischen Monarchie unterstützen und sie uns im endgültigen Friedensvertrag mit Österreich nach Kriegsende zusprechen würde, sollten wir der Entente beitreten."
 ww1_france.101.a:0 "Klingt gut"
 ww1_france.101.b:0 "Wir werden höflich ablehnen"
 ww1_france.102.t:0 "Italien stimmt Geheimvertrag zu"
 ww1_france.102.d:0 "Das Königreich Italien hat unseren Vorschlag, alle seine Ansprüche innerhalb Österreichs zu unterstützen und sie ihm nach Kriegsende zu übertragen, gern angenommen. Es wird bald der Entente beitreten."
 ww1_france.102.a:0 "Großartig"
 ww1_france.103.t:0 "Italien lehnt Vorschlag ab"
 ww1_france.103.d:0 "Das Königreich Italien hat unseren Vorschlag, alle seine Ansprüche innerhalb Österreichs zu unterstützen und sie ihm nach Kriegsende zu übertragen, leider abgelehnt. Es hat sich entschieden, lieber neutral zu bleiben, oder vielleicht plant es doch, sich mit den Mittelmächten gegen uns zu verbünden …"
 ww1_france.103.a:0 "Besorgniserregend"
 ww1_france.2.t:0 "Abtretung von Savoyen und Korsika an Italien"
 ww1_france.2.d:0 "In einem verzweifelten Versuch, das Königreich Italien auf unsere Seite zu ziehen, haben wir beschlossen, auf seine Ansprüche auf unser Gebiet, Savoyen und Korsika, zu verzichten. Danach bleibt ihnen nichts anderes übrig, als sich unserem Krieg gegen die Mittelmächte anzuschließen."
 ww1_france.2.a:0 "So weit ist es gekommen..."
 ww1_france.3.t:0 "Italien tritt der Entente bei"
 ww1_france.3.d:0 "Das Königreich Italien ist endlich bereit, sich uns im Krieg gegen die Mittelmächte anzuschließen."
 ww1_france.3.a:0 "Großartig"
 ww1_france.4.t:0 "Truppen nach Serbien schicken"
 ww1_france.4.d:0 "Um unseren serbischen Verbündeten gegen den Großangriff der österreichisch-ungarischen Armee beizustehen, haben wir beschlossen, mehrere unserer eigenen Divisionen zu entsenden, um bei der Verteidigung des Landes zu helfen und eine eventuelle Gegenoffensive vorzubereiten."
 ww1_france.4.a:0 "Hoffen wir, dass es einen Unterschied macht"
 ww1_france.5.t:0 "Blockade Griechenlands"
 ww1_france.5.d:0 "Um Griechenland zu zwingen, sich dem Krieg gegen die Mittelmächte auf unserer Seite anzuschließen, haben wir eine Blockade gegen Griechenland begonnen, um König Konstantin I. zum Rücktritt oder zur Unterwerfung zu zwingen."
 ww1_france.5.a:0 "Griechenland ist der Schlüssel zur Balkanfront"
 ww1_france.6.t:0 "Griechenland tritt der Entente bei"
 ww1_france.6.d:0 "Nach unserer erfolgreichen Blockade Griechenlands, die zur Abdankung Konstantins I. und zur Machtübernahme seines Entente-freundlichen Sohnes Alexander I. führte, ist Griechenland offiziell der Entente beigetreten, um sich unserem Kampf gegen die Mittelmächte zu widersetzen."
 ww1_france.6.a:0 "Großartig!"
 ww1_france.7.t:0 "Militärhilfe für Griechenland"
 ww1_france.7.d:0 "Um Griechenland zu helfen und seine Effektivität an der Balkanfront zu erhöhen, haben wir Maßnahmen ergriffen und eine große Menge militärischer Ausrüstung dorthin geschickt, was hoffentlich einen Unterschied machen sollte."
 ww1_france.7.a:0 "OK"
 ww1_france.8.t:0 "Armée d&#39;Orient"
 ww1_france.8.d:0 "Um die Kampfkraft Griechenlands an der Balkanfront zu erhöhen, sind wir einmarschiert und haben mehrere gut ausgebildete und gut ausgerüstete französische Divisionen entsandt, die die griechische Armee ausreichend verstärken sollten."
 ww1_france.8.a:0 "Gut"
 ww1_france.9.t:0 "Schlachtschiff Liberté explodiert"
 ww1_france.9.d:0 "Unser Schiff, die Liberté, ein Schlachtschiff aus der Zeit vor dem Dreadnought-Regiment, erlitt heute, am 25. September 1911, eine versehentliche Explosion in einem seiner vorderen Munitionsmagazine für die Sekundärgeschütze, die das Schiff zerstörte. Die Explosion der Sekundärmagazine breitete sich aus und führte später zur Explosion der Hauptmagazine, wodurch ein 37 Tonnen schweres Stück Panzerplatte auf das Schlachtschiff Republique zuschlug und erheblichen Schaden anrichtete."
 ww1_france.9.a:0 "Tragisch"
 ww1_france.10.t:0 "Russische Verstärkung"
 ww1_france.10.d:0 "Auf unsere Bitte hin, russische Truppen an die Seite unserer Armee an der Westfront zu schicken, stimmte der russische Kaiser Nikolaus II. der Entsendung mehrerer Einheiten nach Frankreich zu, die dort an der Seite unserer Armee dienen werden. Im Gegenzug sollen wir den Russen eine angemessene Summe französischer Munition überlassen."
 ww1_france.10.a:0 "Danke"
 ww1_france.11.t:0 "Rumänien überzeugen"
 ww1_france.11.d:0 "Das Königreich Rumänien, das in diesem Krieg bislang neutral geblieben ist, könnte zu diesem Zeitpunkt von beiden Seiten beeinflusst werden. Es dürfte nicht viel kosten, sie auf unsere Seite zu ziehen, wenn wir alle ihre Gebietsansprüche, darunter die Bukowina und Tansylvanien, anbieten. Rumäniens Beitritt ist jedoch auch entscheidend für die Lage Russlands. Wenn es Russland schlecht geht, wird es sich nicht unserer Seite anschließen."
 ww1_france.11.a:0 "Hoffen wir, dass sie akzeptieren"
 ww1_france.1101.t:0 "Frankreich erhebt Gebietsansprüche"
 ww1_france.1101.d:0 "Die Französische Republik hat uns einen geheimen Vorschlag zukommen lassen, wonach sie, sollten wir uns der Entente anschließen und auf ihrer Seite gegen die Mittelmächte kämpfen, die österreichische Regierung am Ende des Krieges zwingen wird, auf alle unsere Ansprüche in Traminbürgen und der Bukowina zu verzichten."
 ww1_france.1101.a:0 "Treten Sie der Entente bei"
 ww1_france.1101.b:0 "Bleiben Sie neutral"
 ww1_france.1102.t:0 "Rumänien stimmt dem Vorschlag zu"
 ww1_france.1102.d:0 "Das Königreich Rumänien hat unserem Vorschlag, Siebenbürgen und der Bukowina im Gegenzug für ihre Unterstützung in unserem Krieg gegen die Mittelmächte anzubieten, freundlicherweise zugestimmt. Sie werden sich den Kriegsanstrengungen anschließen, sobald sie dazu bereit sind."
 ww1_france.1102.a:0 "Großartig"
 ww1_france.1103.t:0 "Rumänien lehnt Vorschlag ab und beruft sich auf Neutralität"
 ww1_france.1103.d:0 "Das Königreich Rumänien hat unser großzügiges Angebot, Siebenbürgen und die Bukowina als Gegenleistung für ihre Unterstützung in unserem Krieg gegen die Mittelmächte anzubieten, leider abgelehnt. Als Hauptgrund für die Weigerung, sich am Krieg zu beteiligen, nennen sie – zumindest vorerst – die rumänische Neutralität."
 ww1_france.1103.a:0 "Schade..."
 ww1_france.12.t:0 "Rumänien tritt der Entente bei"
 ww1_france.12.d:0 "Das Königreich Rumänien hat unserem Vorschlag zugestimmt, ihnen die Bukowina und ganz Siebenbürgen anzubieten, falls sie der Entente beitreten und den Mittelmächten den Krieg erklären."
 ww1_france.12.a:0 "Großartig"
 ww1_france.13.t:0 "Großbritannien tritt der Entente bei"
 ww1_france.13.d:0 "Das Vereinigte Königreich ist nun offiziell Teil unserer Fraktion und unterstützt unsere Kriegsanstrengungen gegen die Mittelmächte."
 ww1_france.13.a:0 "Großartig"
 ww1_france.14.t:0 "Britische Expeditionstruppe"
 ww1_france.14.d:0 "Unser Land, das dringend mehr Männer an der Front benötigt, hat reichlich Unterstützung vom Vereinigten Königreich erhalten, das bereit ist, die Kontrolle über die nördliche Hälfte der Westfront zu übernehmen. Dies sollte glücklicherweise der deutschen zahlenmäßigen Überlegenheit ein Ende setzen, sodass wir mit unseren eigenen Gegenoffensiven beginnen können."
 ww1_france.14.a:0 "Großartig!"
 ww1_france.15.t:0 "Antideutsche Propaganda"
 ww1_france.15.d:0 "Die Deutschen sind seit langem unsere Feinde. Zuletzt haben sie uns auf grausame Weise das Gebiet von Elsass-Lothringen eingenommen und uns im Deutsch-Französischen Krieg zutiefst gedemütigt. Das deutsche Biest wird seine gerechte Strafe bekommen!"
 ww1_france.15.a:0 "Wir vergessen und vergeben nicht."
 ww1_france.16.t:0 "Unser Freund, das Russische Reich"
 ww1_france.16.d:0 "Das Russische Reich und unser Land haben einen gemeinsamen Feind: das Deutsche Reich, das sich zwischen uns isoliert hat. Solange Russland auf unserer Seite steht, werden die Deutschen für immer zwischen zwei größeren Mächten stehen, die die Sicherheit Frankreichs gewährleisten sollten."
 ww1_france.16.a:0 "Gut"
 ww1_france.17.t:0 "Agadir-Krise"
 ww1_france.17.d:0 "Wir haben erhebliche Truppen ins Landesinnere Marokkos entsandt. Deutschland jedoch erhebt zwar keine Einwände gegen die französische Expansion, fordert aber eine territoriale Entschädigung für die Kriegsdrohung und die Entsendung eines Kanonenbootes. Dies hat viele deutsche Nationalisten aufgebracht, und rasch begannen Verhandlungen zwischen Berlin und Paris, die zur Lösung der Krise führten. Wir haben Marokko übernommen und im Gegenzug Spanien das Rif-Gebiet überlassen, während Deutschland die geforderten Zugeständnisse in Kamerun erhielt."
 ww1_france.17.a:0 "Nun ja..."
 ww1_france.18.t:0 "Kriegsvorbereitungen"
 ww1_france.18.d:0 "Die Lunte, die zum Pulverfass führt, ist angezündet. Es ist nur eine Frage der Zeit, bis der Krieg ausbricht, und wir müssen uns auf das vorbereiten, was daraus werden kann, egal, ob es gut oder schlecht ist."
 ww1_france.18.a:0 "In Ordnung"
 ww1_france.19.t:0 "Verteidigung der Grenze"
 ww1_france.19.d:0 "Um unsere Grenze noch besser gegen eine deutsche Bedrohung zu verteidigen, haben wir beschlossen, die Befestigungen entlang unserer und der deutschen Grenze zu verstärken. Diese sollten ausreichen, um eine etwaige deutsche Invasion abzuwehren, sollte es zu einer solchen kommen."
 ww1_france.19.a:0 "Klingt gut"
 ww1_france.20.t:0 "Heilige Union"
 ww1_france.20.d:0 "Die Gewerkschaft „Sacrée“ wurde heute nach Ausbruch des Ersten Weltkriegs gegründet. Sie stellt einen politischen Waffenstillstand mit der Linken dar, der sich verpflichtete, weder Widerstand gegen die Regierung zu leisten noch zu Streiks aufzurufen. Im Namen des Patriotismus gegründet, widerspricht sie dem Versprechen der französischen Sektion der Arbeiterinternationale und ihres ehemaligen Führers Jean Jaurès, sich nicht in einen „bürgerlichen Krieg“ einzulassen."
 ww1_france.20.a:0 "Wir bleiben vereint"
 ww1_france.21.t:0 "Verteidigung der Kolonien"
 ww1_france.21.d:0 "Um die Verteidigung unserer Kolonien zu verbessern, haben wir in unseren Kolonien in Afrika mit dem Bau kleinerer Verteidigungsanlagen begonnen."
 ww1_france.21.a:0 "In Ordnung"
 ww1_france.22.t:0 "Männer aus den Kolonien"
 ww1_france.22.d:0 "Da wir an der Westfront dringend immer mehr Männer brauchen, haben wir beschlossen, mehr Männer aus den Kolonien auf das französische Festland zu verlegen, wo sie dienen und so hoffentlich unsere Personalprobleme etwas lösen werden."
 ww1_france.22.a:0 "Großartig"
 ww1_france.23.t:0 "Männer aus den Kolonien"
 ww1_france.23.d:0 "Da wir an der Westfront dringend immer mehr Männer brauchen, haben wir beschlossen, mehr Männer aus den Kolonien auf das französische Festland zu verlegen, wo sie dienen und so hoffentlich unsere Personalprobleme etwas lösen werden."
 ww1_france.23.a:0 "Großartig"
 ww1_france.24.t:0 "Männer aus den Kolonien"
 ww1_france.24.d:0 "Da wir an der Westfront dringend immer mehr Männer brauchen, haben wir beschlossen, mehr Männer aus den Kolonien auf das französische Festland zu verlegen, wo sie dienen und so hoffentlich unsere Personalprobleme etwas lösen werden."
 ww1_france.24.a:0 "Großartig"
 ww1_france.25.t:0 "Jean Jaures ermordet"
 ww1_france.25.d:0 "Jean Jaurès, ein französischer Sozialistenführer, wurde am 31. Juli 1914 von einem Fanatiker ermordet. Nachdem er im Café du Croissant zu Abend gegessen hatte, stürmte Raoul Villain, ein 29-jähriger junger französischer Nationalist, durch das Fenster des Restaurants und feuerte zwei Schüsse in Jaurès Rücken ab. Die Ermordung eines der charismatischsten und überzeugendsten Redner Frankreichs löste in den Straßen von Paris Schockwellen aus."
 ww1_france.25.a:0 "Ein unglücklicher Tod"
 ww1_france.26.t:0 "Einheit über alles"
 ww1_france.26.d:0 "In dem Bemühen, die gesamte Aufmerksamkeit auf die Kriegsanstrengungen gegen Deutschland zu lenken, haben wir vor allem zur Einheit der Nation aufgerufen, um als Akt der Ehre und des Patriotismus im Krieg zu helfen."
 ww1_france.26.a:0 "OK"
 ww1_france.27.t:0 "Massive Kriegsanstrengungen"
 ww1_france.27.d:0 "Um unsere Kriegsanstrengungen noch weiter zu maximieren, haben wir noch mehr Maßnahmen ergriffen, um den Schwerpunkt der gesamten Produktion auf die Militärproduktion zu verlagern."
 ww1_france.27.a:0 "Weiter so"
 ww1_france.28.t:0 "Bau neuer Verteidigungsanlagen"
 ww1_france.28.d:0 "Im Bemühen, mit Ausbruch des Krieges mit Deutschland die Verteidigungsanlagen in ganz Frankreich zu verstärken, haben wir mit Bauarbeiten begonnen, die den deutschen Vormarsch hoffentlich aufhalten werden."
 ww1_france.28.a:0 "Hoffen wir, dass wir es rechtzeitig bauen können"
 ww1_france.29.t:0 "Bauaufwand"
 ww1_france.29.d:0 "Um die militärische Produktivität zu steigern, haben wir uns für den Bau weiterer Rüstungsfabriken eingesetzt, die für den Sieg in diesem Krieg von entscheidender Bedeutung sind."
 ww1_france.29.a:0 "Gut"
 ww1_france.30.t:0 "Fokus auf die Heimatfront, Teil I"
 ww1_france.30.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_france.30.a:0 "OK"
 ww1_france.31.t:0 "Fokus auf die Heimatfront, Teil II"
 ww1_france.31.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_france.31.a:0 "OK"
 ww1_france.32.t:0 "Fokus auf die Heimatfront, Teil II"
 ww1_france.32.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_france.32.a:0 "OK"
 ww1_france.33.t:0 "Frontline Focus Teil I"
 ww1_france.33.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu richten, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_france.33.a:0 "OK"
 ww1_france.34.t:0 "Frontline Focus Teil II"
 ww1_france.34.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu legen, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_france.34.a:0 "OK"
 ww1_france.35.t:0 "Frontline Focus Teil III"
 ww1_france.35.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu legen, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_france.35.a:0 "OK"
 ww1_france.36.t:0 "Paris von deutschen Zeppelinen bombardiert"
 ww1_france.36.d:0 "Heute, am 29. Januar 1916, fiel unsere Hauptstadt Paris zum ersten Mal einem deutschen Luftangriff zum Opfer. Eine Gruppe Zeppeline bombardierte die Stadt. Es ist bedauerlich, dass wir dies nicht verhindern konnten, doch wir haben der Bevölkerung versichert, dass dies das letzte Mal sein wird, dass so etwas passiert."
 ww1_france.36.a:0 "Verdammt!"
 ww1_france.37.t:0 "Ernest Monis wird Premierminister"
 ww1_france.37.d:0 "Ernest Monis von der Radikalsozialistischen Partei hat das Amt des neuen Premierministers Frankreichs übernommen."
 ww1_france.37.a:0 "OK"
 ww1_france.38.t:0 "Joseph Caillaux wird Premierminister"
 ww1_france.38.d:0 "Joseph Caillaux von der Radikal-Sozialistischen Partei hat das Amt des Premierministers übernommen."
 ww1_france.38.a:0 "OK"
 ww1_france.39.t:0 "Raymond Poincaré wird Premierminister"
 ww1_france.39.d:0 "Raymond Poincaré von der Republikanischen Demokratischen Partei ist neuer Premierminister Frankreichs geworden"
 ww1_france.39.a:0 "OK"
 ww1_france.40.t:0 "Aristide Briand wird erneut Premierminister"
 ww1_france.40.d:0 "Aristide Brinad von der Republikanisch-Sozialistischen Partei hat erneut das Amt des Premierministers übernommen."
 ww1_france.40.a:0 "OK"
 ww1_france.41.t:0 "Louis Barthou wird Premierminister"
 ww1_france.41.d:0 "Louis Barthou von der Republikanischen Demokratischen Partei ist der neue Premierminister Frankreichs"
 ww1_france.41.a:0 "OK"
 ww1_france.42.t:0 "Gaston Doumergue wird Premierminister"
 ww1_france.42.d:0 "Gaston Doumergue von der Radikal-Sozialistischen Partei ist neuer Premierminister Frankreichs geworden"
 ww1_france.42.a:0 "OK"
 ww1_france.43.t:0 "Alexandre Ribot wird neuer Premierminister"
 ww1_france.43.d:0 "Alexandre Ribot von der Republikanischen Demokratischen Partei ist der neue Premierminister Frankreichs"
 ww1_france.43.a:0 "OK"
 ww1_france.44.t:0 "René Viviani wird neuer Premierminister"
 ww1_france.44.d:0 "René Viviani von der Sozialistischen Republikanischen Partei ist der neue Premierminister Frankreichs"
 ww1_france.44.a:0 "OK"
 ww1_france.45.t:0 "Aristide Briand wird erneut Premierminister"
 ww1_france.45.d:0 "Aristide Briand von der Republikanischen Sozialistischen Partei hat erneut das Amt des neuen Premierministers übernommen."
 ww1_france.45.a:0 "OK"
 ww1_france.46.t:0 "Alexandre Ribot wird erneut Premierminister"
 ww1_france.46.d:0 "Alexandre Ribot von der Republikanischen Demokratischen Partei ist erneut der neue Premierminister Frankreichs"
 ww1_france.46.a:0 "OK"
 ww1_france.47.t:0 "Paul Painleve wird neuer Premierminister"
 ww1_france.47.d:0 "Paul Painleve von der Republikanisch-Sozialistischen Partei hat das Amt des neuen Premierministers Frankreichs übernommen"
 ww1_france.47.a:0 "OK"
 ww1_france.48.t:0 "Georges Clemenceau wird neuer Premierminister"
 ww1_france.48.d:0 "Georges Clemenceau von der Partei Inepdendent ist als neuer Premierminister Frankreichs angetreten."
 ww1_france.48.a:0 "OK"
 ww1_france.49.t:0 "Beginn der Generalmobilmachung"
 ww1_france.49.d:0 "Angesichts des drohenden Krieges hat die Regierung zur allgemeinen Mobilmachung aufgerufen und Reservedivisionen im ganzen Land einsatzbereit gemacht. Die Soldaten sind zuversichtlich, dass der Krieg zumindest bis Weihnachten vorbei sein wird."
 ww1_france.49.a:0 "An die Front!"
 ww1_france.50.t:0 "Hunderttageoffensive beginnt"
 ww1_france.50.d:0 "Nach dem Scheitern der deutschen Kaiserschlacht oder Ludendorff-Offensive Mitte Juli und der darauffolgenden inneren Schwächung der deutschen Armee aufgrund von Versorgungsengpässen starteten die Alliierten vom 8. August bis zum Waffenstillstandstag eine Reihe von Gegenoffensiven gegen Deutschland. Diese sogenannte „Hunderttageoffensive“ zwang die Deutschen aus Frankreich und über die Hindenburg-Linie hinaus, was schließlich zur Unterzeichnung des Waffenstillstands am 11.11.18 führte. \n\n Wenn Sie ein Spieler sind (oder auch ein KI), werden Sie auf die Idee der „Hunderttageoffensive“ kommen, die Ihnen 120 Tage lang einen Vorteil gegenüber den Deutschen verschafft. Nutzen Sie sie gut!"
 ww1_france.50.a:0 "Treten Sie diese morsche Tür ein und alles wird zusammenbrechen"
 ww1_france.51.t:0 "Die Expeditionstruppen der Vereinigten Staaten sind eingetroffen!"
 ww1_france.51.d:0 "Die Vereinigten Staaten erreichten Europa erst im Sommer 1918 mit voller Stärke, was der Hauptgrund für die deutsche Frühjahrsoffensive 1918 war. Die USA konnten jeden Monat etwa 100.000 Mann nach Frankreich entsenden, wodurch die Alliierten eine beträchtliche zahlenmäßige Überlegenheit gegenüber dem Deutschen Reich erlangten, das zu diesem Zeitpunkt seine Reserven aufgebraucht hatte und Mühe hatte, seine Verluste auszugleichen."
 ww1_france.51.a:0 "Wir brauchen diese Unterstützung dringend!"

# WW1 Germany #
 ww1_germany.1.t:0 "Osmanisch-Deutsches Bündnis"
 ww1_germany.1.d:0 "Heute wurde ein Bündnis zwischen unserem großen Reich und dem der osmanischen Türken offiziell ratifiziert. Das Bündnis ist Teil einer gemeinsamen Anstrengung, die das türkische Militär stärken und modernisieren und gleichzeitig deutschen Truppen sicheres Geleit in die benachbarten britischen Kolonien ermöglichen soll."
 ww1_germany.1.a:0 "Großartig!"
 ww1_germany.2.t:0 "Deutsche beliefern den Derwisch-Staat"
 ww1_germany.2.d:0 "In dem Bemühen, den britischen Imperialismus mit anderen Mitteln als einem direkten Krieg zwischen unseren beiden Ländern zu bekämpfen, haben wir beschlossen, den Derwisch-Staat zu unterstützen, der seit fast zwei Jahrzehnten in Somalia für die Freiheit kämpft."
 ww1_germany.2.a:0 "Hoffentlich hilft es"
 ww1_germany.3.t:0 "Unsere Freunde, das Emirat Jabal Shammar"
 ww1_germany.3.d:0 "Wir haben kürzlich Diplomaten in das Emirat Jabal Schammar entsandt, einen engen Verbündeten der Osmanen und vielleicht auch in naher Zukunft von uns. Unsere Diplomaten haben festgestellt, dass wir viele gemeinsame Interessen und Feinde haben, insbesondere Großbritannien und seine Verbündeten, insbesondere das Emirat Nejd, das das Emirat Jabal Schammar unter Kontrolle hat."
 ww1_germany.3.a:0 "Tolle Ergebnisse!"
 ww1_germany.4.t:0 "Unsere Freunde, der Derwischstaat"
 ww1_germany.4.d:0 "Der Derwisch-Staat ist weniger ein Staat als vielmehr eine aktive Rebellion. Dennoch teilen wir viele gemeinsame Interessen gegenüber unseren Feinden, dem Britischen Empire. Sollte es in Zukunft zu einem Krieg zwischen uns und den Briten kommen, könnten wir direkte Verbündete des Derwisch-Staates sein."
 ww1_germany.4.a:0 "Hoffentlich können wir Verbündete werden!"
 ww1_germany.5.t:0 "Der Derwischstaat schließt sich den Mittelmächten an"
 ww1_germany.5.d:0 "Der Derwischstaat hat sich nun offiziell uns und unseren Verbündeten im Kampf gegen die Entente angeschlossen. Wir haben denselben Feind, wir teilen dieselben Interessen und kämpfen nun gemeinsam im selben Krieg."
 ww1_germany.5.a:0 "Großartig!"
 ww1_germany.6.t:0 "Jabal Shammar schließt sich den Mittelmächten an"
 ww1_germany.6.d:0 "Das Emirat Jabal Schammar hat sich nun offiziell uns und unseren Verbündeten im Kampf gegen die Entente angeschlossen. Mit dem Einmarsch des Emirats Jabal Schammar wird der Widerstand gegen die Briten im Nahost-Feldzug noch verstärkt. Darüber hinaus haben wir versprochen, dass wir, sollten das Deutsche Reich und unsere Verbündeten den Ersten Weltkrieg gewinnen, der Familie Rashid in einem Angriffskrieg gegen die Familie Saud (Emirat Nejd) helfen werden."
 ww1_germany.6.a:0 "Hurra!"
 ww1_germany.7.t:0 "Bau der Bahnstrecke Berlin-Bagdad geht weiter"
 ww1_germany.7.d:0 "Unsere Bemühungen, Berlin mit der osmanischen Stadt Bagdad zu verbinden, gehen nur langsam voran. Sobald dies abgeschlossen ist, werden wir Zugang zu den mutmaßlichen Ölfeldern Mesopotamiens sowie zum Hafen von Basra am Persischen Golf erhalten und so unsere Macht stärken."
 ww1_germany.7.a:0 "Hoffen wir, dass es bald fertig wird!"
 ww1_germany.8.t:0 "Bau der Bahnstrecke Berlin-Bagdad geht weiter"
 ww1_germany.8.d:0 "Unsere Bemühungen, Berlin mit der osmanischen Stadt Bagdad zu verbinden, gehen nur langsam voran. Sobald dies abgeschlossen ist, werden wir Zugang zu den mutmaßlichen Ölfeldern Mesopotamiens sowie zum Hafen von Basra am Persischen Golf erhalten und so unsere Macht stärken."
 ww1_germany.8.a:0 "Hoffen wir, dass es bald fertig wird!"
 ww1_germany.9.t:0 "Bau der Bahnstrecke Berlin-Bagdad geht weiter"
 ww1_germany.9.d:0 "Unsere Bemühungen, Berlin mit der osmanischen Stadt Bagdad zu verbinden, gehen nur langsam voran. Sobald dies abgeschlossen ist, werden wir Zugang zu den mutmaßlichen Ölfeldern Mesopotamiens sowie zum Hafen von Basra am Persischen Golf erhalten und so unsere Macht stärken."
 ww1_germany.9.a:0 "Hoffen wir, dass es bald fertig wird!"
 ww1_germany.10.t:0 "Berlin-Bagdad-Bahn fertiggestellt!"
 ww1_germany.10.d:0 "Jetzt, da die Bagdad-Eisenbahn offiziell fertiggestellt ist, sollten wir nicht nur mehr Einfluss im Nahen Osten haben, um die Briten zu bedrohen, sondern auch die mutmaßlichen Ölfelder Mesopotamiens verschaffen uns einen Vorteil gegenüber den Briten, die uns ihr persisches Öl vorenthalten haben. Hinzu kommt der Hafen von Basra, der uns bei der Verbindung mit unseren Kolonien in Ostafrika nützlich sein wird."
 ww1_germany.10.a:0 "Dreimal Hurra für die Vollendung!"
 ww1_germany.11.t:0 "Schlesien bis Österreich-Ungarn"
 ww1_germany.11.d:0 "Um die Neutralität des Königreichs Italien in diesem Krieg zu wahren, hat der Reichstag einen Plan ausgearbeitet, der vorsieht, Österreich das Gebiet Schlesiens nur dann anzubieten, wenn es Südtirol an Italien abtritt und sich unter den gegebenen Bedingungen zur Neutralität bereit erklärt."
 ww1_germany.11.a:0 "Klingt gut, mal sehen, wie es läuft!"
 ww1_germany.1101.t:0 "Deutschland bietet Schlesien an"
 ww1_germany.1101.d:0 "Unser Verbündeter, das Deutsche Reich, hat uns angeboten, uns das industriereiche Gebiet Schlesiens abzutreten, wenn wir im Gegenzug Südtirol an das Königreich Italien abtreten, sofern dieses sich bereit erklärt, im Krieg neutral zu bleiben, und zwar zu den Bedingungen, die es erhält."
 ww1_germany.1101.a:0 "Klingt gut"
 ww1_germany.1101.b:0 "Wir werden NICHT zustimmen"
 ww1_germany.1102.t:0 "Österreich bietet Südtirol"
 ww1_germany.1102.d:0 "Das Österreichisch-Ungarische Reich hat uns das Gebiet Südtirols nur unter der Bedingung angeboten, dass wir in dem Konflikt neutral bleiben."
 ww1_germany.1102.a:0 "Hmmm... okay"
 ww1_germany.1102.b:0 "Wir geben uns nicht zufrieden!"
 ww1_germany.12.t:0 "Mit Schweden verhandeln"
 ww1_germany.12.d:0 "Es wurden Verhandlungen mit dem Königreich Schweden aufgenommen. Unsere Diplomaten versuchen, die Schweden dazu zu bewegen, auf unserer Seite in den Krieg einzutreten. Dies ist jedoch höchstwahrscheinlich unwahrscheinlich. Sollte es jedoch dazu kommen, würde dies die russische Front überdehnen, was unsere Lage an der Ostfront entspannen sollte."
 ww1_germany.12.a:0 "Hoffen wir, dass sie einverstanden sind"
 ww1_germany.13.t:0 "Zimmerman Telegram"
 ww1_germany.13.d:0 "Eine angeblich geheime diplomatische Mitteilung unseres Außenministeriums vom Januar 1917 schlug ein Militärbündnis zwischen Deutschland und Mexiko für den Fall vor, dass die USA in den Ersten Weltkrieg gegen Deutschland eintreten. Wir haben Mexiko, Texas, Arizona und New Mexico angeboten, falls die USA gegen uns in den Krieg eintreten. Leider wurde diese Mitteilung jedoch vom britischen Geheimdienst abgefangen und entschlüsselt und hat die USA so sehr verärgert, dass sie nun wahrscheinlich in den Krieg eintreten werden."
 ww1_germany.13.a:0 "Das ging furchtbar nach hinten los ..."
 ww1_germany.1301.t:0 "Zimmerman Telegram"
 ww1_germany.1301.d:0 "In einer angeblich geheimen diplomatischen Mitteilung des deutschen Auswärtigen Amtes wurde uns ein Deal angeboten, der vorsieht, dass wir im Falle eines Eintritts der Vereinigten Staaten in den Ersten Weltkrieg gegen Deutschland Deutschland in den Kampf gegen die Vereinigten Staaten einbeziehen und, wenn wir siegreich daraus hervorgehen – was natürlich der Fall sein wird –, Arizona, New Mexico und Texas zurückgewinnen."
 ww1_germany.1301.a:0 "Akzeptieren Sie den Deal"
 ww1_germany.1301.b:0 "Klingt verlockend, aber wir müssen ablehnen"
 ww1_germany.14.t:0 "Verhandlungen mit Deutschland"
 ww1_germany.14.d:0 "Vor kurzem sind mehrere deutsche Diplomaten in Stockholm eingetroffen, um einen Deal zu besprechen. Das heißt, wenn wir, das Königreich Schweden, uns Deutschland in seinem Krieg gegen die Entente, insbesondere gegen Russland, anschließen, werden wir das Gebiet Finnlands zurückgewinnen, wenn wir es haben wollen."
 ww1_germany.14.a:0 "Wir akzeptieren den Deal"
 ww1_germany.14.b:0 "Krieg liegt nicht in unserem Interesse"
 ww1_germany.15.t:0 "Angebot Bessarabiens an Rumänien"
 ww1_germany.15.d:0 "Wir haben kürzlich Diplomaten nach Bukarest geschickt, die den Rumänen im Falle eines deutschen Sieges über das Russische Reich Bessarabien anbieten. Im Gegenzug müssen die Rumänen, wenn sie diesem Deal zustimmen, während des gesamten Konflikts neutral bleiben. Dies ist zwar unwahrscheinlich, da sie durch einen Beitritt zur Entente und die Rückeroberung des österreichisch-ungarischen Siebenbürgens mehr zu gewinnen hätten, aber wer weiß?"
 ww1_germany.15.a:0 "Hoffentlich stimmen sie zu"
 ww1_germany.1501.t:0 "Deutschland bietet Bessarabua an"
 ww1_germany.1501.d:0 "Im Falle eines deutschen Sieges über das Russische Reich haben uns die Deutschen das Gebiet Bessarabiens angeboten, wenn wir und Rumänien uns bereit erklären, während des gesamten Konflikts neutral zu bleiben. Unserer Ansicht nach hätten wir jedoch mehr davon, wenn wir uns zur richtigen Zeit der Entente anschließen würden."
 ww1_germany.1501.a:0 "Akzeptieren Sie den Deal"
 ww1_germany.1501.b:0 "Respektvoll ablehnen"
 ww1_germany.16.t:0 "Kolonialverteidigung in Ostafrika"
 ww1_germany.16.d:0 "Wir haben in ganz Deutsch-Ostafrika mehrere Verteidigungsanlagen errichtet, damit unsere Kolonien im Falle eines Krieges angemessen verteidigt werden können."
 ww1_germany.16.a:0 "Gut"
 ww1_germany.17.t:0 "Kolonialverteidigung in Südwestafrika"
 ww1_germany.17.d:0 "Wir haben in ganz Deutsch-Südwestafrika mehrere Verteidigungsanlagen errichtet, damit unsere Kolonien im Falle eines Krieges angemessen verteidigt werden können."
 ww1_germany.17.a:0 "Gut"
 ww1_germany.18.t:0 "Kolonialverteidigung in Deutsch-Kamerun"
 ww1_germany.18.d:0 "Wir haben in ganz Deutsch-Kamerun mehrere Verteidigungsanlagen errichtet, damit unsere Kolonien im Falle eines Krieges angemessen verteidigt werden können."
 ww1_germany.18.a:0 "Gut"
 ww1_germany.19.t:0 "Agadir-Krise"
 ww1_germany.19.d:0 "Es wird berichtet, dass die Franzosen erhebliche Truppen ins Landesinnere Marokkos entsandt haben. Der Kaiser hatte zwar keine Einwände gegen die französische Expansion, forderte aber eine territoriale Entschädigung für die Kriegsdrohung Deutschlands und die Entsendung eines Kanonenbootes. Dies hat viele wütende deutsche Nationalisten aufgestachelt." # and negotiations have quickly goen underway between Berlin and Paris which have resolved the Crisis, France took over Morocco and in return have Spain the Rif territory whilst giving us concessions in Cameroon.
 ww1_germany.19.a:0 "Diese dreckigen Baguettes ..."
 ww1_germany.20.t:0 "Rupprecht-Plan"
 ww1_germany.20.d:0 "Im Gegensatz zum Schlieffen-Plan werden wir nach dem Rupprecht-Plan nicht durch Belgien, sondern durch die Schweiz einmarschieren. Das dürfte die französischen Baguettes überraschen! Allerdings wird es höchstwahrscheinlich sehr schwierig sein, das Schweizer Bergland zu durchqueren, und selbst dann werden wir ziemlich weit von Paris entfernt sein."
 ww1_germany.20.a:0 "Die Invasion beginnt!"
 ww1_germany.21.t:0 "Schlieffen-Plan"
 ww1_germany.21.d:0 "Der Schlieffen-Plan wurde vom deutschen Generalstabschef Alfred von Schlieffen entwickelt und sah kurz gesagt eine Invasion durch Belgien vor, bei der die schwer verteidigte deutsch-französische Grenze umgangen und in nur dürftig verteidigtes französisches Gebiet vorgedrungen werden sollte, um Paris einzunehmen und einen schnellen Frieden mit der Französischen Republik zu erzwingen."
 ww1_germany.21.a:0 "Erklären Sie den Krieg!"
 ww1_germany.22.t:0 "Kronprinz-Plan"
 ww1_germany.22.d:0 "Der Kronprinz-Plan war einfach: Anstatt in Belgien oder der Schweiz einzumarschieren und den Kriegseintritt Großbritanniens zu riskieren, würde Deutschland lediglich entlang der deutsch-französischen Grenze gegen Frankreich kämpfen und eine kleinere Streitmacht zurücklassen, die zur Verteidigung benötigt würde, während es den Großteil unserer Streitkräfte mitnahm und sie mit der größeren Bedrohung, dem Russischen Reich im Osten, fertig werden ließ."
 ww1_germany.22.a:0 "Erklären Sie den Krieg!"
 ww1_germany.23.t:0 "Der Goeben und der Breslau"
 ww1_germany.23.d:0 "Mein Kaiser! Im Mittelmeer wurden unsere Schiffe, die SMS Goeben und die SMS Breslau, Teil der Mittelmeerdivision, von der britischen Mittelmeerflotte verfolgt, die erfolglos versuchte, sie abzufangen. Glücklicherweise gelang es der Goeben und der Breslau, der britischen Mittelmeerflotte zu entkommen und durch die Dardanellen nach Konstantinopel zu gelangen, wo wir sie dem Osmanischen Reich übergaben. \n\n Wenn alles nach Plan läuft, können wir die Osmanen früher oder später in den Krieg ziehen..."
 ww1_germany.23.a:0 "Gute Nachrichten!"
 ww1_germany.24.t:0 "Albanien schließt sich den Mittelmächten an"
 ww1_germany.24.d:0 "Prinz Wilhelm von Albanien zeigte sich bei Kriegsausbruch stur und weigerte sich, Partei zu ergreifen und forderte albanische Neutralität. Da die Österreicher den Prinzen jedoch nicht überzeugen konnten, schickten wir unsere eigenen Diplomaten dorthin, die drohten, ihm seine Bezüge zu streichen, was den Prinzen wahrscheinlich entmachten würde. Wir haben außerdem versprochen, dass Albanien im Falle eines deutschen Sieges, der natürlich sehr wahrscheinlich ist, die Region Kosovo von Serbien erhält. \n\n Als der Prinz die wahre Lage erkannte, überdachte er seinen früheren Aufruf zur Neutralität und ratifizierte ein Bündnis zwischen unseren beiden Ländern, das der Welt bald bekannt gegeben werden soll."
 ww1_germany.24.a:0 "Das wird die Serben ablenken"
 ww1_germany.25.t:0 "Asienkorps in die Türkei entsandt"
 ww1_germany.25.d:0 "Um die osmanischen Türken in ihrem Nahostfeldzug zu unterstützen, haben wir beschlossen, eine Abteilung der deutschen Armee sowie eine medizinische Expedition zu entsenden, um die osmanischen Sanitätseinheiten bei der Bekämpfung von Epidemien und der Behandlung von Soldaten zu unterstützen. Außerdem haben wir einige Pioniere entsandt, um beim Straßenbau in den betroffenen Gebieten zu helfen. Hoffentlich können unsere osmanischen Verbündeten davon profitieren."
 ww1_germany.25.a:0 "Großartig!"
 ww1_germany.2501.t:0 "Deutschland schickt uns Unterstützung"
 ww1_germany.2501.d:0 "Das Deutsche Reich hat uns eine Abteilung der deutschen Armee geschickt, um uns bei unserem Feldzug zu unterstützen. Zu der entsandten Expedition gehören auch Sanitätseinheiten zur Bekämpfung von Epidemien und zur Behandlung von Verwundeten sowie Pioniere, die uns beim Bau von Straßen dort unterstützen, wo diese benötigt werden, insbesondere auf dem Sinai."
 ww1_germany.2501.a:0 "Vielen Dank an unseren deutschen Verbündeten!"
 ww1_germany.26.t:0 "Berater in die Türkei geschickt"
 ww1_germany.26.d:0 "Wir haben mehrere deutsche Militärkommandeure in die Türkei entsandt, um die osmanischen Streitkräfte unter deutschem Kommando zu stärken und ihre Schlagkraft zu steigern."
 ww1_germany.26.a:0 "Gut"
 ww1_germany.2601.t:0 "Deutschland entsendet Berater"
 ww1_germany.2601.d:0 "Das Deutsche Reich hat mehrere deutsche Militärkommandeure/Berater entsandt, um uns dabei zu helfen, unsere Streitkräfte insgesamt schlagkräftiger zu machen."
 ww1_germany.2601.a:0 "Danke Deutschland"
 ww1_germany.27.t:0 "Maritz-Rebellion"
 ww1_germany.27.d:0 "Wir haben erfolgreich mit Manie Maritz verhandelt, der sich entschlossen hat, mit uns zusammenzuarbeiten und von der Initiative Südafrikas, die Kontrolle über unsere Kolonie Deutsch-Südafrika zu übernehmen, abzuweichen und stattdessen die Waffen gegen die Südafrikaner selbst zu erheben."
 ww1_germany.27.a:0 "Gut"
 ww1_germany.28.t:0 "Unsere Freunde, das Zarenreich Bulgarien"
 ww1_germany.28.d:0 "Die Bulgaren haben im Zweiten Balkankrieg einen Großteil ihres Kerngebiets verloren und sinnen auf Rache. Unseren Diplomaten in Bulgarien ist es gelungen, einen vernünftigen Deal auszuhandeln, der Bulgarien im Falle einer Invasion den serbischen Teil Mazedoniens zusichert. Derzeit laufen die Vorbereitungen für den offiziellen Kriegseintritt Bulgariens."
 ww1_germany.28.a:0 "Großartig, hoffen wir, dass sie bald beitreten."
 ww1_germany.2801.t:0 "Unsere Freunde, das Deutsche Reich"
 ww1_germany.2801.d:0 "Mehrere deutsche Diplomaten haben vor kurzem erfolgreiche Gespräche mit uns über unsere Gebietsansprüche auf Serbien geführt, falls wir auf der Seite der Mittelmächte in den Krieg eintreten sollten. Es wird jedoch noch mehrere Monate dauern, bis wir bereit sind, in den Krieg einzutreten."
 ww1_germany.2801.a:0 "Diese Serben werden dafür bezahlen!"
 ww1_germany.29.t:0 "Bulgarien schließt sich den Mittelmächten an"
 ww1_germany.29.d:0 "Das Zarenreich Bulgarien hat sich heute offiziell den Mittelmächten angeschlossen und Serbien den Krieg erklärt. Mit bulgarischer Hilfe wird der serbische Widerstand hoffentlich endgültig niedergeschlagen. Darüber hinaus wird der Beitritt Bulgariens einen geografischen Kanal für materielle Hilfe aus Deutschland nach Konstantinopel schaffen und so die türkischen Kriegsanstrengungen verstärken."
 ww1_germany.29.a:0 "Bulgarien mit uns!"
 ww1_germany.2901.t:0 "Kriegseintritt"
 ww1_germany.2901.d:0 "Heute sind wir offiziell auf der Seite der Mittelmächte in den Ersten Weltkrieg eingetreten, indem wir Serbien den Krieg erklärt haben. Die Serben hatten mit unserem plötzlichen Einmarsch sicherlich nicht gerechnet und ihre Westgrenze sollte leer sein, was wir schnell ausnutzen sollten."
 ww1_germany.2901.a:0 "Die Rückzahlung kommt"
 ww1_germany.30.t:0 "Septemberprogramm"
 ww1_germany.30.d:0 "Das Septemberprogramm wurde kürzlich entworfen und enthält unseren Plan zur territorialen Expansion für den Fall eines baldigen Sieges. Der Plan wurde vor allem in Auftrag gegeben, um die Meinung unserer wirtschaftlichen und militärischen Eliten einzuholen."
 ww1_germany.30.a:0 "Hoffen wir, dass dieser Plan einigermaßen verwirklicht werden kann"
 ww1_germany.31.t:0 "Gründung des Königreichs Polen"
 ww1_germany.31.d:0 "In der Hoffnung, die militärischen Verluste zu ersetzen, bestanden die Generäle Hindenburg und Ludendorff, die derzeitigen Oberbefehlshaber der deutschen Armee, auf der Gründung eines von Deutschland abhängigen polnischen Staates und beschleunigten so den Prozess der Schaffung eines polnischen Staates. \n\nEin provisorischer Staatsrat wurde als provisorische Regierung eingerichtet und wir können hoffentlich bald damit beginnen, Polen für die Armee zu rekrutieren, die uns als Befreier von ihren ehemaligen russischen Herrschern feiern werden."
 ww1_germany.31.a:0 "Gut gut..."
 ww1_germany.32.t:0 "Polnische Wehrmacht"
 ww1_germany.32.d:0 "Die Eingliederung der Polnischen Legion in eine deutsche Streitmacht ist im Gange, wobei die Einheiten dem Kaiser einen Treueeid schwören werden."
 ww1_germany.32.a:0 "Wir brauchen diese Einheiten"
 ww1_germany.3201.t:0 "Deutsches Reich fordert Eid"
 ww1_germany.3201.d:0 "Das Deutsche Reich hat von unseren polnischen Legionen unter dem Kommando von Józef Piłsudski verlangt, Kaiser Wilhelm II. Treue und Gehorsam zu schwören. Es scheint jedoch, dass Polen im Falle eines deutschen Sieges nichts weiter als ein Marionetten-Pufferstaat Deutschlands sein wird."
 ww1_germany.3201.a:0 "Stimmen Sie zu, den Eid zu leisten"
 ww1_germany.3201.b:0 "Weigerung, den Eid zu leisten"
 ww1_germany.3202.t:0 "Eidkrise"
 ww1_germany.3202.d:0 "Zu großer Bestürzung lehnten die Polnischen Legionäre die Aufforderung, unserem Kaiser Wilhelm II. einen Treueid und Gehorsam zu schwören, mehrheitlich ab. Angeblich war dies auf Jozef Pilsudski zurückzuführen, den Kommandeur der Polnischen Legionen, der nun infolgedessen verhaftet werden soll. \n\n Dennoch waren unsere Bemühungen in Polen, eine Polnische Wehrmacht aufzustellen, sehr erfolglos und größtenteils ein riesiges Desaster. Österreich-Ungarn machte jedoch weiter und rekrutierte zwangsweise eine Truppe von 3.000 Mann aus der Polnischen Legion."
 ww1_germany.3202.a:0 "Wie können sie es wagen?!"
 ww1_germany.3203.t:0 "Geschworener Eid"
 ww1_germany.3203.d:0 "Die Polnische Legion ging voran und schwor dem Kaiser einen Eid. Nun stehen ihre Streitkräfte offiziell unter unserem uneingeschränkten Kommando. Unsere Bemühungen zur Schaffung einer Polnischen Wehrmacht dürften mehrere Zehntausend Männer zur Rekrutierung in den polnischen Gebieten anziehen."
 ww1_germany.3203.a:0 "Großartig!"
 ww1_germany.33.t:0 "Lenin im Zug nach Russland"
 ww1_germany.33.d:0 "Ein prominenter kommunistischer Revolutionär namens Wladimir Lenin hat eine Überfahrt von Deutschland nach Russland ausgehandelt, nachdem er uns gezeigt hatte, wie Lenin und seine Mitdissidenten unseren russischen Feinden viele interne Probleme bereiten könnten. Er wurde in einen versiegelten Zugwaggon gesetzt und sollte in den nächsten Tagen in Petrograd eintreffen."
 ww1_germany.33.a:0 "Hoffentlich kann er echten Schaden anrichten …"
 #ww1_germany.34.t:0 ""
 #ww1_germany.34.d:0 ""
 #ww1_germany.34.a:0 ""
 ww1_germany.35.t:0 "Macht dem Kaiser"
 ww1_germany.35.d:0 "Anstatt unser Vertrauen so sehr in das Militär selbst zu setzen, haben wir uns entschieden, unser Vertrauen eher in den Kaiser selbst zu setzen. Das bedeutet, dass wir, sollte es in Zukunft dazu kommen, keinem Militärkommandanten erlauben werden, nachträglich die Kontrolle zu übernehmen."
 ww1_germany.35.a:0 "Gut"
 ww1_germany.36.t:0 "Macht dem Militär"
 ww1_germany.36.d:0 "Wir haben uns entschieden, auf das Militär zu vertrauen. Der Kaiser selbst vertraut darauf und sagt: „Die Soldaten und die Armee, nicht parlamentarische Mehrheiten und Entscheidungen, haben das Deutsche Reich zusammengehalten. Ich setze mein Vertrauen in die Armee.“"
 ww1_germany.36.a:0 "Guter Punkt"
 ww1_germany.37.t:0 "Wiederaufbau der Marine"
 ww1_germany.37.d:0 ""
 ww1_germany.37.a:0 ""
 ww1_germany.38.t:0 "Untergang der Lusitania"
 ww1_germany.38.d:0 "Die RMS Lusitania war kürzlich von einem unserer deutschen U-Boote, der U-20, torpediert worden. An Bord befanden sich vermutlich etwa 124 Amerikaner, die dabei umkamen. Insgesamt starben 1.198 Menschen, 761 überlebten. Dies wird die USA definitiv gegen uns aufbringen und sie möglicherweise dazu zwingen, selbst in den Krieg einzutreten."
 ww1_germany.38.a:0 "Nun, es enthielt Munition!"
 ww1_germany.39.t:0 "Uneingeschränkter U-Boot-Krieg"
 ww1_germany.39.d:0 "Im Gegensatz zu den Prisenregeln, die vorschreiben, dass U-Boote auftauchen, Handelsschiffe durchsuchen und die Besatzungen an einem „sicheren Ort“ unterbringen müssen, bevor sie versenkt werden, haben wir uns entschieden, dieses Gesetz zu missachten. Dies sollte den Briten zwar den Nachschub an Gütern von und nach Großbritannien verwehren, könnte jedoch einige Nationen, insbesondere die USA, verärgern."
 ww1_germany.39.a:0 "Wir werden sie durch Hunger unterwerfen"
 ww1_germany.40.t:0 "Fokus Heimatfront I"
 ww1_germany.40.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_germany.40.a:0 "Klingt gut"
 ww1_germany.41.t:0 "Fokus Heimatfront II"
 ww1_germany.41.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_germany.41.a:0 "Klingt gut"
 ww1_germany.42.t:0 "Heimatfront Focus III"
 ww1_germany.42.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_germany.42.a:0 "Klingt gut"
 ww1_germany.43.t:0 "Frontlinienfokus I"
 ww1_germany.43.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu legen, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_germany.43.a:0 "Klingt gut"
 ww1_germany.44.t:0 "Frontline Focus II"
 ww1_germany.44.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu legen, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_germany.44.a:0 "Klingt gut"
 ww1_germany.45.t:0 "Frontlinienfokus III"
 ww1_germany.45.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu legen, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_germany.45.a:0 "Klingt gut"
 ww1_germany.46.t:0 "Ausreichende Getreidelieferungen aus der Ukraine"
 ww1_germany.46.d:0 "Mit der Machtübernahme des sehr deutschfreundlichen Pawlo Skoropadski in der Ukraine sollten wir mehr Getreidelieferungen aus der Ukraine erhalten. Hoffentlich wird dies der Nordseeblockade, die die Briten seit mehreren Jahren verhängen, etwas entgegensetzen."
 ww1_germany.46.a:0 "Getreide für alle!"
 ww1_germany.47.t:0 "Kriegsvorbereitungen"
 ww1_germany.47.d:0 "Die Lunte, die zum Pulverfass führt, ist angezündet. Es ist nur eine Frage der Zeit, bis der Krieg ausbricht, und wir müssen uns auf das vorbereiten, was daraus werden kann, egal, ob es gut oder schlecht ist."
 ww1_germany.47.a:0 "OK"
 ww1_germany.48.t:0 "Bis Weihnachten zu Hause"
 ww1_germany.48.d:0 "Da der Krieg gerade erst begonnen hat, glauben viele, dass er recht schnell, in wenigen Tagen oder Wochen, aber auf jeden Fall bis Weihnachten vorbei sein wird! Der Kaiser selbst hat den Soldaten öffentlich erklärt: „Sie werden zu Hause sein, bevor die Blätter von den Bäumen fallen.“"
 ww1_germany.48.a:0 "Hoffentlich wird es so sein"
 ww1_germany.49.t:0 "Kürzere Ausbildungszeiten"
 ww1_germany.49.d:0 "Aufgrund der extremen Verluste auf dem Schlachtfeld müssen wir diese ersetzen. Daher müssen wir die Ausbildungszeit verkürzen und die Jungs so schnell wie möglich aufs Feld schicken. Obwohl dies ihre Fähigkeiten, echte Spezialisten zu werden, etwas einschränkt, ist es besser, die Lücken in den Reihen so schnell wie möglich zu füllen."
 ww1_germany.49.a:0 "Hoffentlich hilft es"
 ww1_germany.50.t:0 "Unsere Freunde Afghanistan"
 ww1_germany.50.d:0 "Da die Erklärung des Dschihad durch die osmanischen Türken nicht ausreichte, um die Afghanen dazu zu bewegen, sich unseren Kriegsanstrengungen gegen die Entente anzuschließen, haben wir beschlossen, eine Expedition nach Afghanistan zu schicken, um unsere Interessen, die sich als ziemlich ähnlich herausgestellt hatten, zu diskutieren und mitzuteilen."
 ww1_germany.50.a:0 "Hoffentlich können wir sie in den Krieg hineinziehen ..."
 ww1_germany.51.t:0 "Verhandlungen mit Afgahni Sultan"
 ww1_germany.51.d:0 "Unsere Expedition, die zuvor nach Afghanistan entsandt worden war, um die Beziehungen zwischen unseren beiden Nationen zu verbessern, diskutierte den Eintritt Afghanistans in den Ersten Weltkrieg auf unserer Seite. Für Afghanistan ist ein Einmarsch in Indien entscheidend, damit Großbritannien verliert, was den Krieg definitiv zu unseren Gunsten entscheiden würde. Das eigentliche Problem ist, dass die Haupteinnahmequelle des afghanischen Sultans britische Subventionen sind. Daher könnte er zögern, unser Abkommen anzunehmen und auf unserer Seite in den Krieg einzutreten."
 ww1_germany.51.a:0 "Hoffen wir, dass er zustimmt"
 ww1_germany.5101.t:0 "Deutschland bietet uns einen Deal an"
 ww1_germany.5101.d:0 "Die deutsche diplomatische Vertretung in Kabul hat die Beziehungen zwischen unseren beiden Ländern in letzter Zeit intensiviert. Sie hat uns jedoch kürzlich ein Abkommen vorgeschlagen, das uns im Falle eines Sieges Gebiete von Indien und möglicherweise auch von Russland anbietet. Das Problem ist jedoch, dass die Haupteinnahmequelle des Sultans aus britischen Subventionen besteht. Wenn wir uns auf die Seite der Mittelmächte stellen, würden wir diese Subventionen verlieren und damit unsere wichtigste Einnahmequelle. Ganz zu schweigen davon, dass die Folgen für unser Land im Falle einer Niederlage wahrscheinlich katastrophal wären."
 ww1_germany.5101.a:0 "Lehnen Sie ihr Angebot ab"
 ww1_germany.5101.b:0 "Akzeptieren Sie ihr Angebot"
 ww1_germany.5102.t:0 "Afghanistans Niedergang"
 ww1_germany.5102.d:0 "Der Sultan von Afghanistan hat unser Angebot abgelehnt, uns im Falle eines Sieges Land von der britischen Kolonialherrschaft und möglicherweise auch von Russland zu versprechen. Wahrscheinlicher ist, dass die Haupteinnahmequelle des afghanischen Sultans darin besteht, dass die Briten den Krieg zu etwas führen, das nicht in seinem Interesse liegt."
 ww1_germany.5102.a:0 "Das ist eine Schande"
 ww1_germany.5103.t:0 "Afghanistan akzeptiert"
 ww1_germany.5103.d:0 "Der Sultan von Afghanistan hat unser Angebot dankend angenommen und Afghanistan ist nun ein offizielles Mitglied der Mittelmächte. Hoffentlich können sie dem britischen Raj wirklichen Schaden zufügen und die Inder zum Aufstand treiben."
 ww1_germany.5103.a:0 "Tolle Neuigkeiten!"
 ww1_germany.52.t:0 "Die hinduistisch-deutsche Verschwörung"
 ww1_germany.52.d:0 "Um einen Aufstand in Britisch-Indien anzuzetteln, haben wir einen Deal mit dem Präsidenten der ersten provisorischen Regierung Indiens unter Führung des indischen Freiheitskämpfers Mahendra Pratap ausgehandelt. Gelingt der Plan, dürfte es zu einem erfolgreichen Aufstand der indischen Untergrundrevolutionäre und im Exil lebender oder selbstexilierter Nationalisten kommen, verbunden mit einer panindischen Meuterei in der britisch-indischen Armee, die vom Punjab bis nach Singapur reicht. \n\n Dies dürfte jedoch keine leichte Aufgabe sein und könnte leicht vereitelt werden, sollte der britische Geheimdienst dahinter kommen."
 ww1_germany.52.a:0 "Hoffen wir, dass es klappt..."
 ww1_germany.5202.t:0 "Panindischer Aufstand erfolgreich!"
 ww1_germany.5202.d:0 "Entgegen aller Erwartungen war unser Plan, einen panindischen Aufstand in der britischen Kolonialherrschaft anzuzetteln, weitgehend erfolgreich und wird sich innerhalb weniger Tage wie ein Lauffeuer in ganz Indien ausbreiten. Die provisorische Regierung Indiens wurde vorerst in Nordindien nahe Afghanistan eingesetzt. Mahendra Pratap übernimmt die Führung der Revolution und stellt den revolutionären Staat auf die Seite der Mittelmächte. \n\n Wenn alles gut geht und die Revolution erfolgreich ist, steht das Ende des Britischen Empires zweifellos bevor..."
 ww1_germany.5202.a:0 "Hurra!"
 ww1_germany.52021.t:0 "Aufstand in Guharat"
 ww1_germany.52021.d:0 "Lokale Revolutionäre im Bundesstaat Guharat haben zu den Waffen gegriffen und eine lokale Miliz gegründet, die sich Mahendra Pratap in seiner Revolution für die Unabhängigkeit Indiens gegen die britische Hegemonie über Indien anschließt."
 ww1_germany.52021.a:0 "Verdammt!"
 ww1_germany.52022.t:0 "Aufstände in Mumbai, Madhya Pradesh und Jharkhand"
 ww1_germany.52022.d:0 "Lokale Revolutionäre in den Bundesstaaten Mumbai, Madhya Pradesh und Jharkhand haben sich gegen uns erhoben und sich den revolutionären Kräften von Mahendra Pratap angeschlossen, um gegen die britische Hegemonie über Indien zu kämpfen."
 ww1_germany.52022.a:0 "Ist dies das Ende der britischen Herrschaft?"
 ww1_germany.52023.t:0 "Aufstand in Mysore, Madras, Orissa und Bihar"
 ww1_germany.52023.d:0 "Vor kurzem haben lokale Revolutionäre in Mysore, Madras, Orissa und Bihar die Waffen gegen die britische Herrschaft erhoben und sich damit Mahendra Prataps Revolution gegen die britische Hegemonie über Indien angeschlossen."
 ww1_germany.52023.a:0 "Blut soll vergossen werden ..."
 ww1_germany.5203.t:0 "Komplott in Indien vereitelt"
 ww1_germany.5203.d:0 "Leider wurde unser Plan, einen gesamtindischen Aufstand in der britischen Kolonialherrschaft anzuzetteln, vom britischen Geheimdienst aufgedeckt und vereitelt. Einige Garnisonen in ganz Indien verfolgten den Plan zwar weiter und griffen trotzdem zu den Waffen, wurden aber schnell von den Briten niedergeschlagen. \n\n Aber wer weiß, vielleicht ist es gar nicht nötig, einen Aufstand anzuzetteln, wenn wir diesen Krieg lange genug fortsetzen, und vielleicht passiert er von selbst ..."
 ww1_germany.5203.a:0 "Was haben wir erwartet?"
 ww1_germany.52031.t:0 "Indische Revolution vereitelt"
 ww1_germany.52031.d:0 "Dank des Erfolgs des britischen Geheimdienstes konnten wir einen geplanten panindischen Aufstand während der britischen Kolonialherrschaft vereiteln, der uns wahrscheinlich die Kontrolle über die Kolonie gekostet hätte, wenn er nach Plan verlaufen wäre. Zwar kam es immer noch zu Aufständen in einigen indischen Garnisonen, doch handelte es sich dabei um sehr seltene Fälle, die mit wenig bis gar keinem Widerstand niedergeschlagen werden konnten."
 ww1_germany.52031.a:0 "Diese niederträchtigen Deutschen ..."
 ww1_germany.53.t:0 "Die Huerta-Verschwörung"
 #ww1_germany.53.d:0 ""
 #ww1_germany.53.a:0 ""
 ww1_germany.5301.t:0 "Huerta-Komplott vereitelt"
 ww1_germany.5301.d:0 "Nach Verhandlungen mit Kapitän Franz von Rintelen vom deutschen Marinegeheimdienst und Victoriano Huerta über den Kauf von Waffen und die Landung eines U-Boots zur Unterstützung von Huertas Rückkehr, für die er als Verhandlungspartner versprach, im Erfolgsfall Krieg gegen die USA zu führen, gelang es US-Streitkräften, die die Treffen zwischen den beiden beobachteten, Huerta abzufangen, nachdem er versucht hatte, nach Mexiko zurückzukehren, wo er angeblich von Pascual Orozco und einigen gut bewaffneten mexikanischen Unterstützern erwartet wurde."
 ww1_germany.5301.a:0 "Verdammt!"
 ww1_germany.5302.t:0 "Erfolgreiches Huerta-Plot"
 ww1_germany.5302.d:0 "Nach Verhandlungen mit Kapitän Franz von Rintelen vom deutschen Marinegeheimdienst und Victoriano Huerta über den Kauf von Waffen und die Landung eines U-Boots zur Unterstützung von Huertas Rückkehr, für die er als Verhandlungspartner versprach, im Erfolgsfall Krieg gegen die USA zu führen, gelang es Huerta trotz aller Widrigkeiten, den in Newman, New Mexico, auf ihn wartenden US-Streitkräften zu entkommen und die Grenze nach Mexiko zu überqueren, wo er auf die Unterstützung von General Pascual Orozco stieß und erneut die Macht übernahm."
 ww1_germany.5302.a:0 "Und nun zu diesem Verhandlungschip …"
 ww1_germany.5303.t:0 "Huerta verhaftet; Plan zur Rückkehr vereitelt"
 ww1_germany.5303.d:0 "US-Geheimdienstberichten zufolge wurde Kapitän Franz von Rintelen (deutscher Marinegeheimdienst) bei seiner Kommunikation mit Victoriano Huerta abgefangen. Huerta einigte sich darauf, den USA den Krieg zu erklären, sollte Deutschland ihn mit Waffen unterstützen, um nach Mexiko zurückzukehren und dort einen Versuch zu unternehmen, wieder an die Macht zu kommen. Glücklicherweise wurde Huerta jedoch auf seinem Weg nach Mexiko von US-Streitkräften in Newman, New Mexico, abgefangen und schaffte es nicht, die Grenze zu überqueren, wo General Pascual Orozco auf ihn wartete."
 ww1_germany.5303.a:0 "Gut"
 ww1_germany.54.t:0 "Schattenkaiser"
 ww1_germany.54.d:0 "Wilhelm II. hatte in Kriegszeiten in letzter Zeit immer weniger Macht, da er nun größtenteils nur noch für die Durchführung von Preisverleihungen und Ehrenpflichten zuständig war und ein Großteil der Macht in den Händen der mächtigen Generäle Hindenburg und Ludendorff lag. Infolgedessen wurde das Deutsche Reich de facto in eine Militärdiktatur unter der Kontrolle von Feldmarschall Paul von Hindenburg und General Erich Ludendorff verwandelt. \n\n Der Kaiser wurde zunehmend von der Realität und den politischen Entscheidungsprozessen abgeschnitten und schwankte zwischen Defätismus und großen Siegesträumen. Dennoch behält Wilhelm II. weiterhin die höchste Autorität in politischen Ernennungsfragen und für größere Änderungen im Oberkommando ist seine Zustimmung erforderlich."
 ww1_germany.54.a:0 "Interessante Zeiten in der Tat"
 ww1_germany.55.t:0 "Kriegserklärung an Portugal"
 ww1_germany.55.d:0 "Aufgrund früherer Aktionen zu Beginn des Jahres, bei denen Portugal sein De-facto-Bündnis mit Großbritannien einhielt, indem es unsere im Hafen von Lissabon vor Anker liegenden Schiffe beschlagnahmte, und aufgrund unserer früheren Feindseligkeit gegenüber der portugiesischen Hilfe für die Entente, die uns zwang, ihre Konvois zu versenken, könnten wir uns jetzt genauso gut im Krieg befinden, die Fronten sind gezogen und die Portugiesen haben sich auf die Seite des Feindes gestellt."
 ww1_germany.55.a:0 "Es war nur eine Frage der Zeit"
 ww1_germany.56.t:0 "Neues Ass: Manfred von Richtofen"
 ww1_germany.56.d:0 "In Deutschland gibt es einen neuen Fliegerass namens Manfred von Richthofen, der wegen der ungewöhnlichen Lackierung seines Flugzeugs, das seiner Aussage nach dem Feind Angst einjagen soll, auch unter dem Pseudonym „Der Rote Baron“ bekannt ist."
 ww1_germany.56.a:0 "Ehre sei ihm!"
 ww1_germany.57.t:0 "Wiederaufnahme des uneingeschränkten U-Boot-Krieges"
 ww1_germany.57.d:0 "Admiral Henning von Holtzendorff hat überzeugende Argumente vorgebracht, dass wir die Briten aushungern würden, wenn wir unsere U-Boot-Angriffe auf die Entente wieder uneingeschränkt fortführen würden. Ohne diese Angriffe hätten wir keine Chance, den Krieg zu gewinnen. Obwohl dies höchstwahrscheinlich den Angriff Amerikas gegen uns bedeuten würde, hat das Oberkommando berechnet, dass die amerikanische Mobilisierung zu langsam wäre, um unseren Sieg an der Westfront zu verhindern."
 ww1_germany.57.a:0 "Eine notwendige Aktion"
 ww1_germany.58.t:0 "Waffenstillstand von Compiègne unterzeichnet"
 ww1_germany.58.d:0 "Da sich der Krieg gegen uns wendete und die Entente bedeutende Fortschritte auf dem Schlachtfeld erzielte, sahen wir uns widerwillig gezwungen, einen Waffenstillstand zu unterzeichnen, der alle Kämpfe beendete. Zu den Bedingungen der Entente gehören unter anderem die sofortige Einstellung der Feindseligkeiten, der Rückzug deutscher Truppen hinter die eigenen Grenzen, der Erhalt der Infrastruktur, ein Gefangenenaustausch, die Zusage von Reparationen, die Bereitstellung deutscher Kriegsschiffe und U-Boote sowie Bedingungen für die Verlängerung oder Beendigung des Waffenstillstands. \n\n Wir müssen einfach abwarten, was sie sich für einen Vertrag einfallen lassen ..."
 ww1_germany.58.a:0 "Katastrophal"
 ww1_germany.58.b:0 "Wir dürfen nicht aufgeben!"
 ww1_germany.59.t:0 "Waffenstillstand von Compiègne unterzeichnet"
 ww1_germany.59.d:0 "Da sich der Krieg gegen uns wendete und die Entente bedeutende Fortschritte auf dem Schlachtfeld erzielte, sahen wir uns widerwillig gezwungen, einen Waffenstillstand zu unterzeichnen, der alle Kämpfe beendete. Zu den Bedingungen der Entente gehören unter anderem die sofortige Einstellung der Feindseligkeiten, der Rückzug deutscher Truppen hinter die eigenen Grenzen, der Erhalt der Infrastruktur, ein Gefangenenaustausch, die Zusage von Reparationen, die Bereitstellung deutscher Kriegsschiffe und U-Boote sowie Bedingungen für die Verlängerung oder Beendigung des Waffenstillstands. \n\n Wir müssen einfach abwarten, was sie sich für einen Vertrag einfallen lassen ..."
 ww1_germany.59.a:0 "Katastrophal"
 #ww1_germany.60.t:0 ""
 #ww1_germany.60.d:0 ""
 #ww1_germany.60.a:0 ""
 ww1_germany.61.t:0 "Der Rote Baron stirbt über der Somme"
 ww1_germany.61.d:0 "Am 21. April 1918, nachdem sich der Nebel über dem Flugplatz Cappy gelichtet hatte, startete JG1 nach Berichten über feindliche Luftaktivitäten. Jasta 11 hebt ab, angeführt von Manfred von Richtofen (dem Roten Baron), mit Hans Joachim-Wolff und Richtofens Cousin Wolfram, der zum ersten Mal in die Schlacht zieht. \n\n Um 11:50 Uhr entdeckt Mellersh einen einzelnen Dreidecker, überschlägt sich halb und zwingt ihn zur Landung. May kreist am Rande des Kampfgeschehens, bis er Richtofens Cousin Wolfram sieht, der seine Front kreuzt. Richtofen sieht seinen Cousin unter Beschuss, nähert sich ihm und eröffnet das Feuer. Der unerfahrene May gerät außer Kontrolle und rettet ihm wahrscheinlich das Leben. Richtofen bricht seine eigene Regel und folgt ihm nach unten, als May erdwärts stürzt, erlangt aber kurz über der Somme die Kontrolle zurück und folgt dem Fluss nach Westen – und in die Sicherheit seiner eigenen Linien. Mays Freund Roy Brown sieht die Verfolger und stürzt sich zur Hilfe; es folgt eine Verfolgungsjagd im Tiefflug. Nach einem deutlichen Sieg im Osten wird Richtofen immer weiter über die feindlichen Linien gedrängt ... allein ... und unter ständigem Bodenfeuer. Richtofen scheint sich auf sein Ziel zu fixieren und bemerkt nicht, dass Brown hinter ihm hertaucht. Genau in diesem Moment schießt Cedric Popkin von der 24. australischen Maschinengewehrkompanie zusammen mit Soldaten der 53. Batterie der Royal Australian Artillery auf den roten Dreidecker. Als Brown eine Salve abfeuert, bäumt sich der Dreidecker um 12:00 Uhr in der Nähe von Vaux-sur-Somme nach rechts auf. Richtofen erleidet eine einzelne tödliche Schusswunde in der Brust. Der rote Dreidecker Fokker stürzt senkrecht ab, richtet sich aber im letzten Moment wieder auf, höchstwahrscheinlich noch unter Richtofens Kontrolle. Doch als das Flugzeug zum Stehen kommt ... ist Richtofen tot. Bis heute weiß niemand, wer den Roten Baron getötet hat, da sowohl die Sopwith als auch das Bodenfeuer Vickers .303 verwendeten. May, Mellersh und LeBoutillier behaupten jedoch alle, gesehen zu haben, wie sich der Dreidecker aufbäumte, als Roy Brown feuerte, obwohl der Schuss, der in die rechte Unterachsel eindrang und unter seiner linken Brustwarze wieder austrat, die Vermutung nahelegte, dass er durch Bodenfeuer abgeschossen wurde."
 ww1_germany.61.a:0 "Alles kaputt..."
 ww1_germany.62.t:0 "Richtofen erlegt 81. Abschuss!"
 ww1_germany.62.d:0 "Das Ass aller Asse, Manfred von Richthofen, auch bekannt als „Der Rote Baron“, der mit seiner rot gefärbten Fokker Dreizeiler dem Feind Angst einjagte, ist mit seinem 81. Abschuss aus einem weiteren erfolgreichen Luftkampf hervorgegangen, nachdem er Wilfred May dabei beobachtet hatte, wie er seinen jungen Cousin Wolfram beäugte. Nichtsdestotrotz gingen beide siegreich und wohlbehalten hervor. Unsere Truppen blicken in ihren Schützengräben zu ihm auf, er ist ihr Engel in der Luft."
 ww1_germany.62.a:0 "Und auf viele mehr!"
 ww1_germany.63.t:0 "Kaiser Wilhelm Geschütz bombardiert Paris"
 ww1_germany.63.d:0 "Das Kaiser-Wilhelm-Geschütz, auch bekannt als Pariser Kanone, unsere schwere Langstreckenhaubitze, ist erneut im Einsatz und bombardiert die Stadt Paris. Obwohl der Schaden, den das Geschütz anrichtet, in Bezug auf Gebäudeschäden ziemlich ineffektiv ist, dient es als gutes Demoralisierungsmittel für die Einwohner von Paris, die höchstwahrscheinlich in Panik geraten, da sie wissen, dass eine Granate aus diesem Geschütz sie jederzeit auslöschen könnte."
 ww1_germany.63.a:0 "Schlag sie hart!"
 ww1_germany.64.t:0 "Die Krim-Operation"
 ww1_germany.64.d:0 "Die Taurische Sozialistische Sowjetrepublik ist eine illegitime Regierung und kontrolliert das Gebiet der Krim und Cherson. Daher haben wir beschlossen, mit ukrainischer Unterstützung auf der Krim einzumarschieren, um den wertvollen Hafen Sewastopol für das Kaiserreich einzunehmen!"
 ww1_germany.64.a:0 "Ein Hafen im Schwarzen Meer wäre nützlich."
 ww1_germany.64.b:0 "Lass sie in Ruhe."
 ww1_germany.65.t:0 "Bildung der Regionalregierung der Krim"
 ww1_germany.65.d:0 "Wir haben die Regionalregierung der Krim eingerichtet, die unter deutschem Schutz steht, mit dem Lipka-Tataren-General Maciej Sulkiewicz als Premierminister. Zwar gab es einige Versuche der Ukraine, die Kontrolle über die Krim zu erlangen, doch haben wir diese Bemühungen rasch niedergeschlagen und die Trennung zwischen der Krim und der Ukraine herbeigeführt."
 ww1_germany.65.a:0 "Geben Sie Cherson der Ukraine, geben Sie den Tataren nur die Halbinsel Krim"
 ww1_germany.65.b:0 "Gebt den Tataren alle ehemaligen Gebiete der Taurischen SSR!"
 ww1_germany.65.c:0 "Direkte Herrschaft aus Berlin!"
 ww1_germany.66.t:0 "Taurische SSR kapituliert"
 ww1_germany.66.d:0 "Nach einer erfolgreichen Offensive kapitulierte die Taurische SSR, und wir haben unser gesamtes Gebiet zunächst unter die direkte deutsche Militärkontrolle gestellt. Die Ukraine hat jedoch versucht, uns zur Übergabe des Gebiets zu bewegen. Sollten wir dies akzeptieren, verlieren wir später die Möglichkeit, eine starke strategische Position im Schwarzen Meer einzunehmen."
 ww1_germany.66.a:0 "Vorübergehende deutsche Militärbesatzung!"
 ww1_germany.66.b:0 "Übergeben Sie alle Gebiete an die Ukraine!"
 ww1_germany.67.t:0 "Dankt Kaiser Wilhelm II. ab?"
 ww1_germany.67.d:0 "Da das Deutsche Reich aktiv einen Waffenstillstand mit den Alliierten anstrebte und gegen Kriegsende eine Revolution die instabile politische Lage Deutschlands bedrohte, wurden die Forderungen nach einer Abdankung des Kaisers immer lauter. Wilhelm II. selbst zögerte zutiefst, ein solches Opfer zu bringen. Während seine militärischen Berater darauf bestanden, dass man sich nicht länger auf die Armee verlassen könne, äußerte Wilhelm dennoch die Idee, die Armeen von der Westfront zurück nach Deutschland zu führen. Nach dem Kieler Aufstand verlor Wilhelm II. jedoch alle Hoffnung. Die Marine war seine größte Freude und Errungenschaft. Als diese rebellierte, wurde ihm klar, dass der Krieg tatsächlich verloren war. Angesichts des Schicksals der russischen Zarenfamilie, seiner Cousins, stand er vor einer schweren Entscheidung. Sollte der Kaiser abdanken?"
 ww1_germany.67.a:0 "Er war sowieso nur ein „Schattenkaiser“"
 ww1_germany.67.b:0 "Nein! Er ist nur eine Marionette, aber er wird es bleiben!"
 ww1_germany.67.c:0 "Nein! Unser treuer Anführer wird uns zum Sieg führen!"
 ww1_germany.68.t:0 "Beginn der Generalmobilmachung"
 ww1_germany.68.d:0 "Angesichts des drohenden Krieges hat die Regierung zur allgemeinen Mobilmachung aufgerufen und Reservedivisionen im ganzen Land einsatzbereit gemacht. Die Soldaten sind zuversichtlich, dass der Krieg zumindest bis Weihnachten vorbei sein wird."
 ww1_germany.68.a:0 "An die Front!"
 ww1_germany.69.t:0 "Die Schlacht des Kaisers"
 ww1_germany.69.d:0 "Der Krieg dauert nun schon vier lange Jahre, doch es läuft nicht alles schlecht für uns, denn wir haben Russland kürzlich besiegt. Das bedeutet, dass wir alle seine östlichen Divisionen an der Westfront konzentrieren können, was uns eine zahlenmäßige Überlegenheit gegenüber der Entente verschafft. Erich Ludendorff plant diese Operation schon seit einiger Zeit und nennt sie die „Kaiserschlacht“. Im Erfolgsfall wird sie uns nach Paris führen und uns den endgültigen Sieg bringen. Innerlich zerfällt unsere Gesellschaft jedoch langsam. Desertion, insbesondere bei unseren Verbündeten Österreich-Ungarn und der Türkei, die Blockade und die Kriegsmüdigkeit fordern ihren Tribut, und wir werden entweder schnell gewinnen oder schnell verlieren."
 ww1_germany.69.a:0 "Der Kampf beginnt ..."

 ww1_germany.70.t:0 "Auswahl unserer Kriegspläne"
 ww1_germany.70.d:0 "Da wir uns nun im Krieg befinden, ist es an der Zeit, unseren Kriegsplan zu wählen. Wählen wir den Schlieffen-Plan, der durch Belgien und Luxemburg führt, um die stark befestigten französischen Linien zu umgehen, oder machen wir dasselbe, nur durch die Schweiz mit dem Rupprecht-Plan? Schließlich haben wir die Möglichkeit, andere Fronten zu ignorieren und Russland zunächst aus dem Krieg zu drängen."
 ww1_germany.70.a:0 "Wählen Sie den Schlieffen-Plan"
 ww1_germany.70.b:0 "Wählen Sie den Kronprinz-Plan"
 ww1_germany.70.c:0 "Wählen Sie den Rupprecht-Plan"
 ww1_germany.75.t:0 "Die Ermordung Kaiser Wilhelms"
 ww1_germany.75.d:0 "Heute Morgen starb der Kaiser bei einem Attentat. Der Mörder war ein österreichischer Agent. Er wurde von der Kaiserlichen Garde verhaftet, verhört und gehängt. Beide Nationen befinden sich im Krieg. Das neue Staatsoberhaupt, Paul von Hindenburg, verurteilte dieses Attentat entschieden und will den Tod des Kaisers rächen. Das Attentat geschah zum denkbar ungünstigsten Zeitpunkt, da der deutsche Staat bereits in Stabilitätsproblemen steckte. "
 ww1_germany.75.a:0 "Oh nein..."
 ww1_germany.76.t:0 "Kaiser Wilhelm überlebt Attentat"
 ww1_germany.76.d:0 "Heute Morgen wurde ein Attentat auf Kaiser Wilhelm aufgedeckt. Der Verdächtige ist ein österreichischer Agent. Er trug einen Revolver und eine Bombe bei sich und versuchte, sich dem Kaiser zu nähern. Der Verdächtige wurde von der Kaiserlichen Garde festgenommen. Kaiser Wilhelm steht nun unter strengem Schutz und verurteilte den schändlichen Versuch Österreich-Ungarns, den andauernden Krieg zwischen den beiden Nationen zu beenden."
 ww1_germany.76.a:0 "Was wird jetzt passieren?"
 ww1_germany.79.t:0 "Elsässischer Widerstand"
 ww1_germany.79.d:0 "In letzter Zeit haben sich in Elsaß-Lothringen zahlreiche antideutsche und unabhängigkeitsorientierte Bewegungen gebildet, die höchstwahrscheinlich von der französischen Regierung unterstützt werden. Wir müssen schnell handeln, um eine zu große Ausbreitung zu verhindern."
 ww1_germany.79.a:0 "Schickt die Armee!"
 ww1_germany.79.b:0 "Geben Sie ihnen etwas Unabhängigkeit"

# WW1 Italy #
 ww1_italy.1.t:0 "Italienisch-Türkischer Krieg"
 ww1_italy.1.d:0 "Unsere Ansprüche auf Libyen reichen bis zur Niederlage der Osmanen im Russisch-Türkischen Krieg von 1877 zurück. Jetzt ist es an der Zeit, diese Träume zu verwirklichen und uns das zu nehmen, was uns gehört, denn die Türken nutzen dieses Land nicht. Libyen wäre unter unserer Herrschaft sicherlich besser dran!"
 ww1_italy.1.a:0 "Das sollte einfach sein!"
 ww1_italy.101.t:0 "Vertrag von Ouchy"
 ww1_italy.101.d:0 "Nach der Niederlage der Osmanen beschlossen unsere Diplomaten, die Situation zu nutzen, um einen günstigen Friedensvertrag auszuhandeln. In Ouchy bei Lausanne unterzeichneten wir einen Vertrag. Die wichtigsten Bestimmungen des Vertrags sehen vor, dass die Osmanen sämtliches Militärpersonal aus Libyen abziehen. Im Gegenzug geben wir Rhodos und andere Ägäisinseln zurück, die wir von den Türken besetzt hatten."
 ww1_italy.101.a:0 "Ein großartiger Sieg!"
 ww1_italy.101.b:0 "Wir werden die gesamte Türkei erobern!"
 ww1_italy.102.t:0 "Sieg in Libyen!"
 ww1_italy.102.d:0 "Wir haben die Italiener erfolgreich aus Libyen vertrieben. Wir können uns nun für einen Weißen Frieden entscheiden oder dafür, die Italiener vollständig zu vertreiben."
 ww1_italy.102.a:0 "Wir nehmen das Angebot an."
 ww1_italy.102.b:0 "Wir werden die Kakerlaken entfernen..."
 ww1_italy.2.t:0 "Unsere Ansprüche an Libyen"
 ww1_italy.2.d:0 "Unsere Ansprüche auf Libyen gehen auf die Niederlage der Osmanen im Russisch-Türkischen Krieg zurück, als unsere Diplomaten den Großmächten Hinweise gaben, falls es Widerstand geben sollte. Mit französischer Unterstützung unterzeichneten wir einen Vertrag, der uns Interventionsfreiheit in Tripolitanien und Marokko einräumte. \N\N Um die Massen zu beschwichtigen, haben wir eine groß angelegte Lobbykampagne für eine Invasion Libyens gestartet. Dabei stellen wir das Gebiet als reich an Mineralien, gut bewässert und nur von 4.000 türkischen Soldaten verteidigt dar. Die Bevölkerung soll zudem als feindlich gegenüber den Türken und freundlich gegenüber uns Italienern dargestellt werden, da die Invasion für uns kaum mehr als eine kleine Militärübung sein wird."
 ww1_italy.2.a:0 "Libyen gehört zu uns!"
 ww1_italy.3.t:0 "Aufbau einer Präsenz in Libyen"
 ww1_italy.3.d:0 "Um in Libyen für Recht und Ordnung zu sorgen, haben wir unsere Präsenz in unserer nordafrikanischen Kolonie deutlich verstärkt, um Dissidenten jeglicher Art zu unterdrücken, insbesondere jene, die die Unabhängigkeit anstreben und den Senussi-Orden bekämpfen oder unterstützen."
 ww1_italy.3.a:0 "Bestellen, aber nicht über Senussi."
 ww1_italy.4.t:0 "Unterdrückung des Senussi-Ordens"
 ww1_italy.4.d:0 "Obwohl wir die Türken in Libyen besiegt haben, ist der Senussi-Orden, wie sie sich selbst nennen, eine Bande rebellischer Killer, deren Armee teilweise aus denselben Milizen besteht, die im italienisch-türkischen Krieg gegen uns gekämpft haben. Der Senussi-Orden hindert uns daran, in unserer neuen Kolonie für Ordnung zu sorgen, und alle Mittel, die wir ergreifen müssen, um ihn zu unterdrücken, sind für die Sicherheit unserer Truppen und die Entwicklung unserer neuen Kolonie notwendig."
 ww1_italy.4.a:0 "Ah, Imper- ich meine Ordnung, ja?"
 ww1_italy.5.t:0 "Kriegsvorbereitungen"
 ww1_italy.5.d:0 "Die Lunte, die zum Pulverfass führt, ist angezündet. Es ist nur eine Frage der Zeit, bis ein großer Krieg ausbricht, auf den wir uns vorbereiten müssen, egal, was daraus werden könnte."
 ww1_italy.5.a:0 "Wo sollen wir stehen?"
 ww1_italy.6.t:0 "Unser Freund Deutschland"
 ww1_italy.6.d:0 "Obwohl die Deutschen mit Österreich-Ungarn verbündet sind, das einen großen Teil der italienischen Gebiete besitzt, wäre es vielleicht besser, sich auf ihre Seite zu stellen und stattdessen nach Westen zu den Franzosen zu blicken, die derzeit Savoyen und Korsika halten."
 ww1_italy.6.a:0 "Zwei neue Nationen, zwei vereinte Nationen."
 ww1_italy.7.t:0 "Italienische Neutralität"
 ww1_italy.7.d:0 "Mit Ausbruch des Ersten Weltkriegs sind wir formal gesehen Mitglied des Dreibundes, was uns verpflichtet, unsere Verbündeten zu unterstützen, die sich im Krieg befinden. Wir werden uns unseren Verbündeten jedoch nicht anschließen. Die Regierung stellte dies bereits vor Kriegsbeginn klar, da wir mit der österreichischen Auffassung, der Angriff auf Serbien sei „defensiver Natur“, nicht einverstanden waren. Der Premierminister hat klargestellt, dass die Bedingungen des Dreibundes von 1882 nicht gelten, da weder Österreich-Ungarn noch Deutschland angegriffen wurden. Angesichts der erheblichen Kriegsgegnerschaft in Italien werden wir neutral bleiben."
 ww1_italy.7.a:0 "Wir werden wahrscheinlich nicht in den Krieg ziehen ... Wahrscheinlich."
 ww1_italy.8.t:0 "Geheimpakt mit der Entente"
 ww1_italy.8.d:0 "Wir haben uns entschieden, auf die Seite der Entente zu treten. Unsere Regierung ist zunehmend davon überzeugt, dass die Unterstützung Österreichs, unseres traditionellen Feindes, Italien nicht die Gebiete verschaffen wird, die es so dringend benötigt. Obwohl es Verhandlungen mit den Mittelmächten gab, die versucht haben, uns neutral zu halten, werden wir angesichts solcher Gebietsgewinne auf Seiten der Entente nicht neutral bleiben."
 ww1_italy.8.a:0 "Wir werden ganz Italien vereinen!"
 ww1_italy.9.t:0 "Beitritt zur Entente"
 ww1_italy.9.d:0 "In den letzten Tagen haben wir den Dreibund öffentlich aufgekündigt, doch die Mehrheit des Parlaments lehnte trotz nationalistischer Proteste weiterhin eine Kriegserklärung ab. Mit der Unterzeichnung des Londoner Pakts und um einen Konflikt zwischen der Krone und dem Parlament und die damit verbundenen Folgen für die innere Stabilität und die außenpolitischen Beziehungen zu verhindern, akzeptierte das Parlament die Kriegserklärung."
 ww1_italy.9.a:0 "Ruhm für Italien!"
 ww1_italy.10.t:0 "Anfrage zur Unterstützung der Alliierten"
 ww1_italy.10.d:0 "Wir sind auf einen so langen und langwierigen Konflikt nicht wirklich vorbereitet und brauchen daher Unterstützung. Glücklicherweise konnten uns die Briten und Franzosen mit Ausrüstung und einigen Infanteriedivisionen unterstützen."
 ww1_italy.10.a:0 "Großartig"
 ww1_italy.11.t:0 "Massive Kriegsanstrengungen"
 ww1_italy.11.d:0 "Um unsere Kriegsanstrengungen noch weiter zu maximieren, haben wir noch mehr Maßnahmen ergriffen, um den Schwerpunkt der gesamten Produktion auf die Militärproduktion zu verlagern."
 ww1_italy.11.a:0 "Weiter so"
 ww1_italy.12.t:0 "Ehrung des Dreibundes"
 ww1_italy.12.d:0 "Da sich unsere Verbündeten nun im Krieg befinden, ist für Italien die Zeit gekommen, den Dreibund zu ehren. Zwar wollen wir auf Seiten unserer Verbündeten eine beträchtliche Menge an Gebieten erobern, doch ebenso viele befinden sich in den Händen der Franzosen."
 ww1_italy.12.a:0 "Wir sind bei Ihnen!"
 ww1_italy.13.t:0 "Nachfrage Südtirol"
 ww1_italy.13.d:0 "Obwohl wir nicht dafür sind, uns dem Dreibund in seinem Angriffskrieg anzuschließen, könnten wir die Situation ebenso gut ausnutzen und unsere Unterstützung zum Verkauf anbieten, wobei der Preis Südtirol wäre."
 ww1_italy.13.a:0 "Ein fairer Preis, wenn Sie mich fragen"
 ww1_italy.1301.t:0 "Italien fordert Südtirol"
 ww1_italy.1301.d:0 "Damit Italien sich uns im Krieg anschließt, hat es einen Preis verlangt: Südtirol. Wenn wir das Gebiet abtreten, verspricht es, sich unserem Krieg anzuschließen oder zumindest in dem Konflikt neutral zu bleiben."
 ww1_italy.1301.a:0 "Niemals!"
 ww1_italy.1301.b:0 "Bußgeld..."
 ww1_italy.1302.t:0 "Österreicher weigern sich, Südtirol abzutreten"
 ww1_italy.1302.d:0 "Als die Österreicher von unserem Angebot hörten, sie beim Kaufpreis Südtirols zu unterstützen, widersprachen sie dem offenbar entschieden und erklärten, Südtirol werde niemals ein Teil Italiens werden."
 ww1_italy.1302.a:0 "Was nun?"
 ww1_italy.1303.t:0 "Österreicher stimmen der Abtretung Südtirols zu"
 ww1_italy.1303.d:0 "Als die dankbaren Österreicher von unserem Angebot hörten, sie zum einfachen Preis von Südtirol zu unterstützen, stimmten sie schnell und ohne viel Aufhebens der Abtretung des Staates zu."
 ww1_italy.1303.a:0 "Großartig"
 ww1_italy.14.t:0 "Ehrung des Dreibundes"
 ww1_italy.14.d:0 "Da sich unsere Verbündeten nun im Krieg befinden, ist für Italien die Zeit gekommen, den Dreibund zu ehren. Zwar wollen wir auf Seiten unserer Verbündeten eine beträchtliche Menge an Gebieten erobern, doch ebenso viele befinden sich in den Händen der Franzosen."
 ww1_italy.14.a:0 "Wir sind bei Ihnen!"
 ww1_italy.15.t:0 "Ansprüche auf französisches Territorium"
 ww1_italy.15.d:0 "Unsere Ansprüche auf französisches Territorium sind ebenso zahlreich wie jene auf Österreich-Ungarn. Vielleicht wäre es nicht klug, unser gut etabliertes und strategisches Bündnis mit den Mittelmächten zu gefährden. Ich bin sicher, dass wir unsere territorialen Ambitionen in Österreich zumindest vorerst opfern können."
 ww1_italy.15.a:0 "All diese Länder gehören uns"
 ww1_italy.16.t:0 "Massive Kriegsanstrengungen"
 ww1_italy.16.d:0 "Um unsere Kriegsanstrengungen noch weiter zu maximieren, haben wir noch mehr Maßnahmen ergriffen, um den Schwerpunkt der gesamten Produktion auf die Militärproduktion zu verlagern."
 ww1_italy.16.a:0 "Weiter so"
 ww1_italy.17.t:0 "Frontlinienfokus I"
 ww1_italy.17.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu richten, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_italy.17.a:0 "Großartig"
 ww1_italy.18.t:0 "Frontline Focus II"
 ww1_italy.18.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu legen, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_italy.18.a:0 "Großartig"
 ww1_italy.19.t:0 "Frontlinienfokus III"
 ww1_italy.19.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu richten, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_italy.19.a:0 "Großartig"
 ww1_italy.20.t:0 "Fokus auf die Heimatfront I"
 ww1_italy.20.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_italy.20.a:0 "Klingt gut"
 ww1_italy.21.t:0 "Homefront Focus II"
 ww1_italy.21.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_italy.21.a:0 "Klingt gut"
 ww1_italy.22.t:0 "Homefront Focus III"
 ww1_italy.22.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_italy.22.a:0 "Klingt gut"
 ww1_italy.23.t:0 "Patriotischer Eifer"
 ww1_italy.23.d:0 "Italien befindet sich derzeit im Krieg mit seinen Todfeinden, die eine größere italienische Nation und die Vereinigung aller italienischen Völker verhindern wollen. Unser Volk hat dem Krieg große nationalistische Unterstützung entgegengebracht. Tausende von Männern haben sich bereits freiwillig gemeldet, sogar aus anderen Ländern, um für nichts anderes als den Ruhm Italiens zu kämpfen!"
 ww1_italy.23.a:0 "Ruhm für Italien!"
 ww1_italy.24.t:0 "Senussi-Aufstand"
 ww1_italy.24.d:0 "Die Senussi sind eine muslimische Religionsgemeinschaft, die von den Osmanen unterstützt wird. Nach der Niederlage der Osmanen in Libyen ist der Widerstand heftig geworden, und nun hat die Gruppe offen erklärt, unsere Kolonien in Afrika für sich zu beanspruchen. Wir müssen zurückschlagen!"
 ww1_italy.24.a:0 "Wild und entschlossen"
 ww1_italy.25.t:0 "Letzte Offensive gegen die Senussi"
 ww1_italy.25.d:0 "Nach unserem Angriff 1914 auf die religiöse Gruppe flohen sie in die von England kontrollierten Gebiete, wo sie ihre Schreckensherrschaft fortsetzten. Jetzt bietet sich uns die Gelegenheit, die Gruppe für immer zu besiegen. Dies würde jedoch einen enormen Einsatz an Ausrüstung und Männern erfordern, worauf unser Land möglicherweise nicht vorbereitet ist. Jetzt ist es endlich an der Zeit, sie vollständig auszulöschen."
 ww1_italy.25.a:0 "Und bleiben Sie diesmal unten."
 ww1_italy.25.b:0 "Wir müssen uns auf unsere Wirtschaft konzentrieren."
 ww1_italy.26.t:0 "Italiener fordern Nichteinmischung"
 ww1_italy.26.d:0 "Die italienische Regierung hat in den vergangenen Monaten Interesse an afrikanischem Land gezeigt. Heute Morgen haben sich italienische Diplomaten an uns gewandt und eine Garantie dafür verlangt, dass wir ihre zukünftigen Bemühungen nicht behindern. Sollten wir einen solchen Pakt unterzeichnen?"
 ww1_italy.26.a:0 "Klar, unterschreib es"
 ww1_italy.26.b:0 "Nein, wir können solche Dinge nicht garantieren"
 ww1_italy.27.t:0 "Italienisches Ultimatum"
 ww1_italy.27.d:0 "Die Italiener erheben Anspruch auf unsere Gebiete in Nordafrika und drohen uns, wenn wir dieses Land nicht abtreten. Die Italiener versuchen, unser Reich zu zerstören!"
 ww1_italy.27.a:0 "Lehnen Sie ihre Anfragen ab!"
 ww1_italy.27.b:0 "Diese Länder sind nutzlos, überlasst sie"
 ww1_italy.29.t:0 "Die Osmanen lehnten unser Ultimatum ab"
 ww1_italy.29.d:0 "Heute Morgen gab uns ein osmanischer Attaché eine Antwort auf unsere nordafrikanischen Ansprüche. Die osmanische Regierung weigerte sich, die libyschen Gebiete abzutreten. Die Osmanen versuchten sogar, uns für diese Forderungen zu verspotten. Wir werden gegen sie vorgehen."
 ww1_italy.29.a:0 "Sie wissen, was das bedeutet ..."


# WW1 Japan #
 ww1_japan.1.t:0 "Ultimatum an Deutschland gesendet"
 ww1_japan.1.d:0 "In Anerkennung unseres Bündnisabkommens mit Großbritannien aus dem Jahr 1902 haben wir dem Deutschen Reich ein Ultimatum gestellt, das die Herausgabe aller seiner Pazifikkolonien mit Ausnahme der Salomonen, des Bismarck-Archipels und Deutsch-Neuguineas forderte. Dieser Krieg wird uns eine großartige Gelegenheit bieten, unsere eigenen Interessen im Fernen Osten zu verfolgen!"
 ww1_japan.1.a:0 "Ultimatum senden"
 ww1_japan.1.b:0 "Senden Sie ein erweitertes Ultimatum"
 ww1_japan.101.t:0 "Japan stellt uns ein Ultimatum"
 ww1_japan.101.d:0 "Die japanische Regierung hat uns ein Ultimatum gestellt und fordert die Herausgabe praktisch aller unserer Pazifikkolonien mit Ausnahme von Neuguinea, dem Bismarck-Archipel und den Salomonen. Auch wenn es uns schwerfallen mag, unsere Kolonialbesitzungen aufzugeben, wäre es vielleicht letztlich besser, dem Ultimatum zuzustimmen und so möglicherweise eine Intervention Japans in diesem Krieg zu vermeiden, die die Macht des Feindes schwächen würde?"
 ww1_japan.101.a:0 "Akzeptiere das Ultimatum"
 ww1_japan.101.b:0 "Ignoriere es"
 ww1_japan.102.t:0 "Deutschland akzeptiert Ultimatum"
 ww1_japan.102.d:0 "Das Deutsche Reich hat unser Ultimatum akzeptiert und sich bereit erklärt, die im Ultimatum geforderten Gebiete unverzüglich abzutreten. Wir könnten zwar unsere Versprechen einhalten, uns aber trotzdem immer noch auf die Seite unserer Verbündeten stellen und Deutschland den Krieg erklären."
 ww1_japan.102.a:0 "Halten Sie unser Versprechen"
 ww1_japan.102.b:0 "Helfen Sie unseren Verbündeten"
 ww1_japan.103.t:0 "Deutschland reagiert nicht"
 ww1_japan.103.d:0 "Das Deutsche Reich hat auf unser Ultimatum nicht reagiert, was unsere Regierung als völlige Ablehnung auffassen wird. Deshalb werden wir die Sache selbst in die Hand nehmen und diese Gebiete trotzdem einnehmen!"
 ww1_japan.103.a:0 "Erklären Sie den Krieg!"
 ww1_japan.103.b:0 "Zurück nach unten"
 ww1_japan.104.t:0 "Japan stellt uns ein Ultimatum"
 ww1_japan.104.d:0 "Die japanische Regierung hat uns ein absolut unvorstellbares Ultimatum geschickt, in dem sie ALLE unsere pazifischen Kolonien fordert. Ein solches Ultimatum ist absolut absurd. Aber wollen wir wirklich einen weiteren Feind auf die Liste setzen?"
 ww1_japan.104.a:0 "Akzeptieren Sie das Ultimatum widerwillig"
 ww1_japan.104.b:0 "Weigere dich, überhaupt zu antworten"
 ww1_japan.105.t:0 "Deutschland akzeptiert verlängertes Ultimatum"
 ww1_japan.105.d:0 "Das Deutsche Reich hat unser Ultimatum akzeptiert und sich bereit erklärt, die im Ultimatum geforderten Gebiete unverzüglich abzutreten. Wir könnten zwar unsere Versprechen einhalten, uns aber trotzdem immer noch auf die Seite unserer Verbündeten stellen und Deutschland den Krieg erklären."
 ww1_japan.105.a:0 "Halten Sie unser Versprechen"
 ww1_japan.105.b:0 "Helfen Sie unseren Verbündeten"
 ww1_japan.106.t:0 "Deutschland reagiert nicht"
 ww1_japan.106.d:0 "Das Deutsche Reich hat auf unser Ultimatum nicht reagiert, was unsere Regierung als völlige Ablehnung auffassen wird. Deshalb werden wir die Sache selbst in die Hand nehmen und diese Gebiete trotzdem einnehmen!"
 ww1_japan.106.a:0 "Erklären Sie den Krieg!"
 ww1_japan.106.b:0 "Zurück nach unten"
 ww1_japan.2.t:0 "Kawachi explodiert!"
 ww1_japan.2.d:0 "Heute, am 12. Juli 1918, explodierte die Kawachi unerwartet, obwohl sie mehrere Monate zuvor ohne Probleme inspiziert worden war. Das Schiff sank innerhalb von etwa vier Minuten nach der Explosion und forderte den Tod von 600 Seeleuten, 443 überlebten. Es konnte kein plausibler Verdächtiger oder Grund für die Explosion gefunden werden, und es wird berichtet, dass das Kordit im Magazin aufgrund von Zersetzung möglicherweise spontan ignoriert wurde. Schließlich erwog die Marine die Bergung des Schiffes, entschied jedoch, dass dies zu teuer wäre und den Bau eines Schlachtkreuzers um über ein Jahr verzögern würde, und strich das Schiff von der Liste der Marine."
 ww1_japan.2.a:0 "Was für eine Stahlverschwendung!"
 ww1_japan.3.t:0 "Reisunruhen von 1918"
 ww1_japan.3.d:0 "Von Juli bis September 1918 kam es in ganz Japan zu einer Reihe von Volksunruhen. Auslöser war ein rapider Anstieg des Reispreises, der insbesondere in ländlichen Gebieten, in denen Reis das wichtigste Grundnahrungsmittel ist, zu extremen wirtschaftlichen Schwierigkeiten führte. Die Reisunruhen sollen in Ausmaß, Ausmaß und Gewalt beispiellos gewesen sein. Der anfängliche Protest soll friedlich begonnen haben, eskalierte jedoch schnell zu umfassenden Krawallen, Streiks, Plünderungen, Brandanschlägen auf Polizeistationen und Regierungsgebäude sowie bewaffneten Auseinandersetzungen. Rund 25.000 Menschen wurden verhaftet, 8.200 wegen verschiedener Verbrechen verurteilt. Premierminister Terauchi übernahm die Verantwortung für den Vorfall, der zum Sturz der Regierung Terauchi Masatake in Japan führte."
 ww1_japan.3.a:0 "Dem müssen wir ein Ende setzen!"
 ww1_japan.4.t:0 "Bewegung vom 1. März"
 ww1_japan.4.d:0 "Die Bewegung des 1. März ist ein klares öffentliches Zeichen des koreanischen Widerstands gegen unsere Herrschaft auf der koreanischen Halbinsel. Angeblich veröffentlichten viele koreanische Studenten in Tokio nach Wilsons Vierzehn-Punkte-Rede, inspiriert von ihrer Haltung, eine Erklärung, in der sie Freiheit von der Kolonialherrschaft forderten. Die Bewegung wurde durch den Tod des ehemaligen koreanischen Kaisers Gojong im Januar noch verschärft, der für Kontroversen sorgte und den Verdacht auf eine Vergiftung auslöste."
 ww1_japan.4.a:0 "Unabhängigkeit für Korea? Lächerlich"
 ww1_japan.5.t:0 "Korea integriert!"
 ww1_japan.5.d:0 "Heute hat der Kaiser von Korea den Annexionsvertrag zwischen Japan und Korea mit einem verschmitzten Lächeln unterzeichnet. Mit diesem Vertrag wird unser Land Korea formell integrieren, nachdem Korea im früheren Japanisch-Koreanischen Vertrag von 1905 zu einem Protektorat unseres Landes erklärt und im späteren Japanisch-Koreanischen Vertrag von 1907 großzügig auf seine Verwaltungs- und Innenpolitikrechte verzichtet und sie uns überlassen hatte. Viele unserer japanischen Kommentatoren sagen voraus, dass sich die Koreaner problemlos in das Kaiserreich integrieren werden!"
 ww1_japan.5.a:0 "Tolle Neuigkeiten!"
 ww1_japan.6.t:0 "Tod von Kaiser Meiji"
 ww1_japan.6.d:0 "Kaiser Meiji ist heute leider an Urämie gestorben. Kurz nach seinem Tod verabschiedete das japanische Parlament eine Resolution, die seiner Rolle in der glorreichen Meiji-Restauration gedenkt. Ein Irisgarten in einem Viertel Tokios, das Kaiser Meiji bekanntlich häufig besuchte, wurde als Standort für den Shinto-Schrein Meiji Jingū ausgewählt. Die Taten des Kaisers werden unvergessen bleiben. Er leitete eine Zeit des raschen Wandels zum Besseren in Japan, in der sich Japan nach der industriellen Revolution rasch von einem isolierten Feudalstaat zu einer kapitalistischen und imperialen Weltmacht wandelte."
 ww1_japan.6.a:0 "Er wird betrauert"
 ww1_japan.7.t:0 "Nogi Maresuke begeht Seppuku"
 ww1_japan.7.d:0 "General Nogi Maresuke, der in Japan lange Zeit ein Nationalheld und ein Vorbild an feudaler Loyalität und Selbstaufopferung war, beging den rituellen Selbstmord Seppuku, weil er seinen Herrn, Kaiser Meiji, nicht überleben wollte, dessen Tod ihn am Tag der Beerdigung des Kaisers zum Selbstmord veranlasste."
 ww1_japan.7.a:0 "Was für ein Held"
ww1_japan.8.t:0 "Japanisch-Korea-Vertrag von 1905"
ww1_japan.8.d:0 "Mit dem Japanisch-Korea-Vertrag von 1905 wird Korea zum Protektorat Japans und untersteht damit faktisch der japanischen Kontrolle über die koreanische Außenpolitik. Dieser Vertrag, der aufgrund militärischer Drohungen Japans unter Zwang unterzeichnet wurde, markiert den Beginn des zunehmenden japanischen Einflusses und der Kontrolle über Korea. Der Vertrag führt zu weiteren Abkommen, wie dem Japanisch-Korea-Vertrag von 1907, die die koreanische Souveränität weiter einschränken und die Grundlage für die spätere Annexion Koreas durch Japan im Jahr 1910 schaffen."
 ww1_japan.8.a:0 "Was soll daraus werden?"
ww1_japan.9.t:0 "Japan stellt uns ein Ultimatum"
ww1_japan.9.d:0 "Japan hat uns ein Ultimatum gestellt und eine stärkere Kontrolle über die koreanischen Außenpolitik gefordert. Dieses Ultimatum folgte auf Japans Sieg im Russisch-Japanischen Krieg, der Japans Einfluss in der Region gestärkt hatte. Angesichts der drohenden Militäraktionen musste Korea entscheiden, ob es Japans Forderungen nachgeben oder einen Konflikt riskieren wollte."
ww1_japan.9.a:0 "Unterwerfen Sie sich den Forderungen Japans, um Konflikte zu vermeiden"
ww1_japan.9.b:0 "Weigere dich, dich zu unterwerfen und riskiere militärische Maßnahmen"

# Austria Hungary #
 ww1_kuk.1.t:0 "Bosnienkrise"
 ww1_kuk.1.d:0 "Obwohl Bosnien und Herzegowina formal noch immer Teil des Osmanischen Reiches ist, hatten unsere Behörden die faktische Kontrolle über das Land. Mit der Jungtürkischen Revolution bot sich nun die perfekte Gelegenheit, Bosnien und Herzegowina in das Osmanische Reich einzugliedern. Wir haben unsere Angst vor einem Übergreifen der Revolution auf Bosnien und Herzegowina geäußert und Unterstützung von bosnischen Muslimen und Serben erhalten. Daraufhin verkündete Franz Joseph die Annexion Bosniens und beauftragte den Finanzminister mit der Ausarbeitung einer Verfassung, die die Annexion zwei Tage später verkünden soll. \n\n Dies könnte jedoch eine kurze Krise auslösen..."
 ww1_kuk.1.a:0 "Großartig"
 ww1_kuk.2.t:0 "Antiserbische Stimmung"
 ww1_kuk.2.d:0 "Die Serben unterstützen ständig ethnisch-irrdentistische Ansprüche auf unsere Regionen, wie Vojvodina und Bosnien-Herzgowina, und hegen Sympathien für andere südslawische Minderheiten innerhalb des Reiches. Wenn wir Serbien vollständig unterwerfen wollen, müssen wir den Panslawismus zerschlagen und eine vollständige und totale Einflusssphäre auf dem Balkan errichten."
 ww1_kuk.2.a:0 "Diese dreckigen Serben ..."
 ww1_kuk.3.t:0 "Dominanz im Einflussbereich des Balkans"
 ww1_kuk.3.d:0 "In unseren Bemühungen, die Balkan-Einflusssphäre zu dominieren, unsere Position dort zu sichern und den Panslawismus zu zerschlagen, ist es uns offensichtlich gelungen, das Russische Reich, das mit vielen Balkanstaaten verbündet bzw. befreundet ist und den Panslawismus in der Region fördert, stark zu verärgern. \n\n Dennoch werden wir nicht in der Lage sein, den Panslawismus vollständig zu zerschlagen oder unsere Einflusssphäre zu etablieren und die Region zu dominieren, bis Serbien auf Normalmaß reduziert ist..."
 ww1_kuk.3.a:0 "Nun ja..."
 ww1_kuk.4.t:0 "Unser Freund, das Deutsche Reich"
 ww1_kuk.4.d:0 "Wir haben kürzlich Besuch von Kaiser Wilhelm bekommen, der im Jagdschloss unseres mutmaßlichen Thronfolgers Erzherzog Franz Ferdinand im böhmischen Konopischt eingetroffen ist. Beide Männer haben viel über die Zukunft unserer beiden Länder gesprochen, vor allem über politische Angelegenheiten auf dem Balkan und dergleichen. Nichtsdestotrotz hat der Erzherzog dem Kaiser von der serbischen Drohung erzählt und um Unterstützung gebeten, falls die Serben in Zukunft aggressiv werden sollten. Der Kaiser hat dem teilweise, aber noch nicht vollständig zugestimmt, was verständlich ist."
 ww1_kuk.4.a:0 "Gut"
 ww1_kuk.5.t:0 "Unser Freund, das Zarenreich Bulgarien"
 ww1_kuk.5.d:0 "Wir haben kürzlich Diplomaten nach Sofia in Bulgarien entsandt, um die Beziehungen zu Bulgarien zu verbessern. Wir hoffen, dass dies der Dominanz und Stärke Serbiens auf dem Balkan entgegenwirken und den Serben eine größere Front bieten wird. Da Bulgarien nun auf unserer Seite ist, müssen wir uns keine Sorgen um eine Bedrohung Konstantinopels machen und sollten in der Lage sein, mehr Nachschub und vielleicht sogar Truppen ins Osmanische Reich zu schicken, wenn wir Serbien ausschalten können."
 ww1_kuk.5.a:0 "Großartig"
 ww1_kuk.6.t:0 "Unser Freund, das Osmanische Reich"
 ww1_kuk.6.d:0 "Wir haben kürzlich Diplomaten nach Konstantinopel in der Türkei entsandt, um die ehemals schlechten Beziehungen wiederherzustellen und auszubauen. Obwohl wir und die Türken in der Vergangenheit keine besonders guten Freunde waren, stellen sie auf dem Balkan eine gewisse Stärke dar, insbesondere mit Bulgarien und einem guten Konter gegen Russland im Kaukasus."
 ww1_kuk.6.a:0 "Großartig"
 ww1_kuk.7.t:0 "Kriegsvorbereitungen"
 ww1_kuk.7.d:0 "Die Lunte, die zum Pulverfass führt, ist angezündet. Es ist nur eine Frage der Zeit, bis der Krieg ausbricht, und wir müssen uns auf das vorbereiten, was daraus werden kann, egal, ob es gut oder schlecht ist."
 ww1_kuk.7.a:0 "OK"
 ww1_kuk.8.t:0 "Albanische Freiwillige"
 ww1_kuk.8.d:0 "Aufgrund der Verletzung der albanischen Neutralität waren wir gezwungen, den serbischen Truppen in die Region zu folgen, konnten aber glücklicherweise eine Albanische Legion bestehend aus 9 Bataillonen aufstellen, die sich zumindest als einigermaßen nützlich erweisen sollte."
 ww1_kuk.8.a:0 "Wir werden sie nehmen"
 ww1_kuk.9.t:0 "Beschlagnahmung serbischen Getreides"
 ww1_kuk.9.d:0 "Nachdem Serbien unter unsere Kontrolle gefallen war, haben wir die ländlichen Gebiete auf der Suche nach Getreide und anderen Nahrungsmitteln für unsere Armee geplündert, der es an solchen Vorräten mangelt. Auch wenn es vielleicht unethisch ist, ist es das, was wir tun müssen, um der Nahrungsmittelknappheit zu begegnen."
 ww1_kuk.9.a:0 "Das ist, was getan werden muss"
 ww1_kuk.10.t:0 "Mazedonien an Bulgarien abtreten"
 ww1_kuk.10.d:0 "Eines unserer Versprechen an Bulgarien bestand darin, für den Fall, dass das Land in den Konflikt eintreten sollte, alle verlorenen Gebiete zurückzugeben. Wir könnten ihnen auch gleich ihr Stück des serbischen Mazedoniens zur Verwaltung überlassen, bis der Krieg endet und es vollständig Teil ihres Landes wird."
 ww1_kuk.10.a:0 "Bitte schön"
 ww1_kuk.11.t:0 "Massive Kriegsanstrengungen"
 ww1_kuk.11.d:0 "Um unsere Kriegsanstrengungen noch weiter zu maximieren, haben wir noch mehr Maßnahmen ergriffen, um den Schwerpunkt der gesamten Produktion auf die Militärproduktion zu verlagern."
 ww1_kuk.11.a:0 "Weiter so"
 ww1_kuk.12.t:0 "Separater Frieden?"
 ww1_kuk.12.d:0 "Nach dem Tod Franz Josefs versucht der neue Kaiser Karl I., der einer Fortsetzung des Krieges weitaus weniger abgeneigt ist, Gespräche mit den Führern der Entente zu arrangieren, um Österreich-Ungarn heil aus dem Krieg herauszuholen. Sollten die Deutschen davon allerdings erfahren, wären sie nicht im Geringsten erfreut ..."
 ww1_kuk.12.a:0 "Lass es uns versuchen"
 ww1_kuk.12.b:0 "Aber egal, ich bin kein Feigling!"
 ww1_kuk.13.t:0 "Unser Freund, das Königreich Italien"
 ww1_kuk.13.d:0 "Wir haben kürzlich Diplomaten nach Rom entsandt, um die Beziehungen zu verbessern. Obwohl wir offiziell verbündet sind (Dreierbund), sind die Italiener nicht gerade in unserem Bündnis verankert. Sie hegen weiterhin eine starke Abneigung gegen unsere Kontrolle über das, was sie als „rechtmäßiges italienisches Territorium“ bezeichnen. Obwohl wir gute Gespräche führen konnten, können wir die Italiener nur dann an uns binden, wenn wir ihnen geben, was sie wollen, was möglicherweise nicht in unserem Interesse liegt …"
 ww1_kuk.13.a:0 "Hmmm"
 ww1_kuk.14.t:0 "Italien unterwerfen"
 ww1_kuk.14.d:0 "In dem Bemühen, Italien um jeden Preis aus dem Krieg herauszuhalten, haben wir den Italienern das angeboten, was die Entente ihnen wahrscheinlich anbietet, nur ohne den unnötigen Verlust von Menschen im Krieg. \n\n Versprechen sind jedoch nur begrenzt zielführend. Wenn wir sie nicht einhalten, wird es auf jeden Fall Krieg mit den Italienern geben. Deshalb müssen wir so schnell wie möglich handeln."
 ww1_kuk.14.a:0 "Sollten wir?"
 ww1_kuk.15.t:0 "Abtretung Südtirols"
 ww1_kuk.15.d:0 "Wir haben unseren Versprechen nachgekommen und den Italienern Südtirol statt Südtirol und Istrien gegeben. Dies könnte von ihnen jedoch als Verrat angesehen werden, und sie könnten wieder auf die Seite der Entente zurückkehren, wenn sie erkennen, dass sie uns auf diese Weise den Rest ihres beanspruchten Territoriums abnehmen können."
 ww1_kuk.15.a:0 "Es ist riskant..."
 ww1_kuk_1501.t:0 "Angebot aus Österreich"
 ww1_kuk_1501.d:0 "Herr Präsident, die österreichisch-ungarische Regierung hat uns ein Angebot unterbreitet, in dem sie uns verspricht, dass wir das Angebot annehmen könnten, wenn wir in dem Krieg, in dem sie bereit sind, Südtirol ohne Blutvergießen zu überlassen, neutral bleiben. Allerdings fällt es etwas geringer aus als das, was uns die Entente versprochen hat."
 ww1_kuk_1501.a:0 "Wir werden es nehmen"
 ww1_kuk.1501.b:0 "Wir lehnen es ab,"
 ww1_kuk_1502.t:0 "Italien nimmt unser Angebot an"
 ww1_kuk_1502.d:0 "Das Königreich Italien hat unser Angebot, Südtirol im Gegenzug für italienische Neutralität im Krieg abzutreten, dankbar angenommen. Wir sind froh, dass weiteres Blutvergießen verhindert werden konnte und dies unsere Westfront dauerhaft sichern sollte."
 ww1_kuk_1502.a:0 "Großartig"
 ww1_kuk_1503.t:0 "Italien lehnt unser Angebot ab"
 ww1_kuk_1503.d:0 "Der Abschaum des Königreichs Italien hat unser faires Angebot, Südtirol im Gegenzug für seine Neutralität abzutreten, abgelehnt. Wenn noch mehr Blut vergossen wird, werden wir ihnen geben, was sie wollen, und diesen dreckigen Italienern zeigen, aus welchem Holz sie geschnitzt sind! "
 ww1_kuk_1503.a:0 "Tod Italien!"
 ww1_kuk.16.t:0 "Abtretung Südtirols und Istriens"
 ww1_kuk.16.d:0 "Wir haben unsere Versprechen eingehalten und den Italienern alles gegeben, was wir ihnen versprochen haben. Ihre Neutralität ist daher für den Rest des Krieges de facto garantiert."
 ww1_kuk.16.a:0 "Großartig"
 ww1_kuk.1601.t:0 "Österreich tritt Ansprüche an uns ab"
 ww1_kuk.1601.d:0 "Die österreichisch-ungarische Regierung ist großzügig ihrem Versprechen nachgekommen und hat uns alle unsere starken Ansprüche auf ihr Territorium abgetreten, wofür wir uns im Gegenzug für den Rest des Krieges zu völliger Neutralität verpflichtet haben."
 ww1_kuk.1601.a:0 "Klingt fair"
 ww1_kuk.17.t:0 "Vorschlag an Italien"
 ww1_kuk.17.d:0 "Um unseren bisherigen Erfolg mit Italien zu maximieren, können wir ihnen vielleicht Korsika und Savoyen aus Frankreich anbieten, um zu versuchen, sie dazu zu bewegen, sich uns im Krieg anzuschließen. Dies würde uns noch mehr nützen, als wenn die Italiener ihre Neutralität wahren würden."
 ww1_kuk.17.a:0 "Hoffen wir, dass ihnen die Idee gefällt"
 ww1_kuk.1701.t:0 "Italien akzeptiert Deal"
 ww1_kuk.1701.d:0 "Die italienische Regierung hat unseren Vorschlag angenommen und bietet die Gebiete Savoyen und Korsika an, falls das Königreich Italien auf unserer Seite in den Krieg eintritt. Jetzt müssen wir sie nur noch dazu bewegen, in den Krieg einzutreten …"
 ww1_kuk.1701.a:0 "Großartig!"
 ww1_kuk.1702.t:0 "Italien lehnt unseren Deal ab"
 ww1_kuk.1702.d:0 "Die undankbare italienische Regierung hat unseren Vorschlag, ihnen die Gebiete Savoyen und Korsika anzubieten, für den Fall, dass sie sich den Mittelmächten im Krieg anschließen, leider abgelehnt."
 ww1_kuk.1702.a:0 "Naja, zumindest sind sie neutral"
 ww1_kuk.1703.t:0 "Österreich bietet Klagen in Frankreich an"
 ww1_kuk.1703.d:0 "Nachdem unsere Neutralität gesichert war, war die österreichisch-ungarische Regierung so freundlich, uns einen Deal vorzuschlagen. Sollten wir uns den Mittelmächten im Krieg gegen die Entente anschließen und gewinnen, sollten wir die beanspruchten Gebiete Korsika und Savoyen erhalten. Das klingt nach einem guten Deal, aber die Frage ist: Ist es das Risiko wert?"
 ww1_kuk.103.a:0 "Akzeptieren Sie den Deal"
 ww1_Kuk.1703.b:0 "Den Deal ablehnen"
 ww1_kuk.18.t:0 "Italien schließt sich unseren Fraktionen an"
 ww1_kuk.18.d:0 "Da Italien unser Angebot angenommen hat, im Falle unseres Sieges Korsika und Savoyen von Frankreich zu erhalten, ist es offiziell Mitglied der Mittelmächte geworden und wird sich innerhalb von ein oder zwei Tagen den Kriegsanstrengungen anschließen."
 ww1_kuk.18.a:0 "Hurra!"
 ww1_kuk.19.t:0 "Deutsche Berater"
 ww1_kuk.19.d:0 "Da unsere Armee größtenteils unter mangelnder Führung leidet, haben die Deutschen, die unsere relativ geringe Beteiligung auf dem Schlachtfeld gesehen haben, ihrerseits Unterstützung angeboten, indem sie kaiserlich-deutsche Offiziere mit mehr als ausreichenden Führungsqualitäten entsandten. Dies wird hoffentlich die Leistung des KUK verbessern."
 ww1_kuk.19.a:0 "Wir könnten die Hilfe gebrauchen"
 ww1_kuk.20.t:0 "Ankunft deutscher Truppen"
 ww1_kuk.20.d:0 "Während wir bereits deutsche Berater in Form von Offizieren zur Verbesserung unserer Führung erhalten haben, haben wir vor kurzem auch eine kleine Verstärkung deutscher Divisionen erhalten, die uns bei unseren militärischen Operationen helfen sollen."
 ww1_kuk.20.a:0 "Wir könnten die Hilfe gebrauchen"
 ww1_kuk.21.t:0 "Senden Sie Deutschland Hilfe"
 ww1_kuk.21.d:0 "Um unserem Verbündeten Deutschland bei seinen Militäroperationen an der West-/Ostfront zu helfen, haben wir beschlossen, unserem Verbündeten eine große Menge an Ausrüstung zu schicken. Schließlich sollten wir für die Hilfe, die er uns bisher gewährt hat, sehr dankbar sein."
 ww1_kuk.21.a:0 "Ein nettes Geschenk"
 ww1_kuk.22.t:0 "Schicken Sie deutsche Truppen"
 ww1_kuk.22.d:0 "Um die Westfront endgültig zu binden, haben wir beschlossen, mehrere österreichisch-ungarische Divisionen nach Deutschland zu schicken, um sie bei allen Operationen im Westen einzusetzen. Die zusätzlichen Divisionen sollten für eine zusätzliche zahlenmäßige Überlegenheit sorgen, die den Deutschen gegenüber den vereinten Streitkräften Frankreichs und Großbritanniens bisher weitgehend gefehlt hat."
 ww1_kuk.22.a:0 "Hoffen wir, dass es einen Unterschied machen kann"
 ww1_kuk.2201.t:0 "Österreich schickt Verstärkung"
 ww1_kuk.2201.d:0 "Die österreichisch-ungarische Regierung hat uns freundlicherweise angeboten, mehrere ihrer nicht mehr benötigten Divisionen für den Einsatz an der Westfront bereitzustellen, in der Hoffnung, uns so die dringend benötigten zusätzlichen Männer zur Verfügung zu stellen."
 ww1_kuk.2201.a:0 "Danke!"
 ww1_kuk.23.t:0 "Türkische Verstärkungen"
 ww1_kuk.23.d:0 "Unser Verbündeter, das Osmanische Reich, hat uns freundlicherweise Verstärkung geschickt, um die Ostfront zu unterstützen, da wir eine eher schwache Leistung gezeigt haben und mehr Truppen benötigen."
 ww1_kuk.23.a:0 "Danke"
 ww1_kuk.24.t:0 "Schicken Sie türkische Truppen"
 ww1_kuk.24.d:0 "Obwohl wir den Türken in Bezug auf Truppen nicht viel versprechen können, da wir alle unsere Truppen einsetzen könnten, haben wir uns bereit erklärt, eine beträchtliche Anzahl an Truppen bereitzustellen, um die Osmanen bei ihren Militäroperationen zu unterstützen und wichtige Gebiete zu besetzen."
 ww1_kuk.24.a:0 "Ich habe gehört, es ist heiß da unten"
 ww1_kuk.25.t:0 "Senden Sie Truthahnausrüstung"
 ww1_kuk.25.d:0 "Das Osmanische Reich ist bei weitem ein Industriestaat, der in der Lage ist, seine eigene militärische Ausrüstung herzustellen. Deshalb haben wir angeboten, ihnen einen beträchtlichen Teil dessen zu geben, was wir geben können. Hoffentlich können sie davon Gebrauch machen."
 ww1_kuk.25.a:0 "Eine freundliche Spende"
 ww1_kuk.26.t:0 "Imperiale Stabilität"
 ww1_kuk.26.d:0 "Aufgrund der großen Anzahl unterschiedlicher Ethnien innerhalb des Reiches in einem Zeitalter des Nationalismus ist es relativ instabil geworden und wird wie ein Kartenhaus zusammengehalten. Der Hauptgrund, der das Reich derzeit zusammenhält, ist die lange Herrschaft von Franz Josef. Daher müssen wir weitere Kompromisse eingehen, um die Stabilität des Reiches für die kommenden Jahre zu gewährleisten."
 ww1_kuk.26.a:0 "Es muss zusammengehalten werden"
 ww1_kuk.27.t:0 "Fokus auf Militär"
 ww1_kuk.27.d:0 "Anstatt uns darauf zu konzentrieren, alle unsere politischen Ressourcen für den Zusammenhalt des Imperiums einzusetzen, haben wir uns stattdessen für eine Erhöhung unserer Militärausgaben und die Modernisierung von Heer, Marine und Luftwaffe entschieden. Dies könnte zwar letztendlich zu unseren Lasten fallen, würde uns aber in späteren militärischen Konflikten definitiv helfen."
 ww1_kuk.27.a:0 "Die Armee ist wichtiger"
 ww1_kuk.28.t:0 "Fokus auf interne Themen"
 ww1_kuk.28.d:0 "Anstatt uns darauf zu konzentrieren, noch mehr unserer politischen und wirtschaftlichen Ressourcen für das Militär einzusetzen, haben wir beschlossen, uns stattdessen auf die internen Probleme des Imperiums zu konzentrieren, um die Stabilität für die Zukunft zu gewährleisten."
 ww1_kuk.28.a:0 "Einheit ist der Schlüssel"
 ww1_kuk.29.t:0 "Unterdrückung von Minderheiten"
 ww1_kuk.29.d:0 "Um die Meinungsverschiedenheiten innerhalb des Imperiums zu verringern, haben wir Maßnahmen ergriffen, um rebellische Minderheiten wie die Serben zu unterdrücken, die ständig vom Panslawismus und einem großen vereinigten slawischen Staat auf dem Balkan sprechen."
 ww1_kuk.29.a:0 "Es wird ein Traum bleiben"
 ww1_kuk.30.t:0 "Einen Kompromiss anbieten"
 ww1_kuk.30.d:0 "Das Reich wird nur noch durch einen seidenen Faden zusammengehalten, und ob es uns nun gefällt oder nicht, wir haben Maßnahmen ergriffen, um die Zukunft des Reiches dauerhaft zu sichern, indem wir den einzelnen Ethnien innerhalb des Reiches mehr Autonomie gewähren, wie etwa im Fall Ungarn."
 ww1_kuk.30.a:0 "Hoffen wir, dass es sich gelohnt hat …"
 ww1_kuk.31.t:0 "Polnische Legion"
 ww1_kuk.31.d:0 "Mit Kriegsausbruch wurde die Gründung der Polnischen Legionen von Józef Piłsudski verkündet. Unsere Regierung, die für das Gebiet zuständig ist, hat der Gründung offiziell zugestimmt und die Einheit zu einer unabhängigen Formation der österreichisch-ungarischen Armee gemacht."
 ww1_kuk.31.a:0 "Wir könnten ihre Hilfe gebrauchen"
 ww1_kuk.32.t:0 "Ungarischer Support"
 ww1_kuk.32.d:0 "Mit Beginn des Krieges haben wir die Unterstützung Ungarns gewonnen, um gemeinsam mit uns so viel wie möglich zum Krieg beizutragen."
 ww1_kuk.32.a:0 "Gut"
 ww1_kuk.33.t:0 "Krönung Karls I. (IV.)"
 ww1_kuk.33.d:0 "Nach dem Tod von Franz Josef, der unser Reich fast sieben Jahrzehnte lang regierte, ist es nun an der Zeit, dass Karl, der mutmaßliche Thronfolger, sein Amt antritt. Er legte heute an der Dreifaltigkeitssäule vor der Matthiaskirche seinen Krönungseid ab. In seinem kroatischen Krönungseid soll er die Vereinigung des dreieinigen Königreichs Kroatien, Dalmatien und Slawonien mit Rijeka anerkannt und die Schaffung einer dritten kroatischen politischen Einheit befürwortet haben. Dies hat die Ungarn, die die Macht mit niemand anderem teilen wollen, jedoch etwas verärgert."
 ww1_kuk.33.a:0 "Wir begrüßen den neuen Kaiser!"
 ww1_kuk.34.t:0 "Kriegsanstrengungen I"
 ww1_kuk.34.d:0 "Wir haben begonnen, weitere Maßnahmen zu ergreifen, um die Effizienz der Militärproduktion zu steigern und mehr Ressourcen für die Kriegsanstrengungen bereitzustellen. Außerdem wurde eine Rationierung eingeführt, um die Vorräte und Lebensmittel im Land zu schonen."
 ww1_kuk.34.a:0 "OK"
 ww1_kuk.35.t:0 "Kriegsanstrengungen II"
 ww1_kuk.35.d:0 "Wir haben begonnen, weitere Maßnahmen zu ergreifen, um die Effizienz der Militärproduktion zu steigern und mehr Ressourcen für die Kriegsanstrengungen bereitzustellen. Außerdem wurde eine Rationierung eingeführt, um die Vorräte und Lebensmittel im Land zu schonen."
 ww1_kuk.35.a:0 "OK"
 ww1_kuk.36.t:0 "Kriegsanstrengungen III"
 ww1_kuk.36.d:0 "Wir haben begonnen, weitere Maßnahmen zu ergreifen, um die Effizienz der Militärproduktion zu steigern und mehr Ressourcen für die Kriegsanstrengungen bereitzustellen. Außerdem wurde eine Rationierung eingeführt, um die Vorräte und Lebensmittel im Land zu schonen."
 ww1_kuk.36.a:0 "OK"
 ww1_kuk.37.t:0 "Frontlinienfokus I"
 ww1_kuk.37.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu legen, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_kuk.37.a:0 "Großartig"
 ww1_kuk.38.t:0 "Frontline Focus II"
 ww1_kuk.38.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu legen, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_kuk.38.a:0 "Großartig"
 ww1_kuk.39.t:0 "Frontlinienfokus III"
 ww1_kuk.39.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu legen, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_kuk.39.a:0 "Großartig"
 ww1_kuk.40.t:0 "Fokus Heimatfront I"
 ww1_kuk.40.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_kuk.40.a:0 "Großartig"
 ww1_kuk.41.t:0 "Fokus Heimatfront II"
 ww1_kuk.41.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_kuk.41.a:0 "Großartig"
 ww1_kuk.42.t:0 "Fokus Heimatfront III"
 ww1_kuk.42.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_kuk.42.a:0 "Großartig"
 ww1_kuk.43.t:0 "Tod von Franz Josef"
 ww1_kuk.43.d:0 "Unser Kaiser ist heute Abend leider im Schloss Schönbrunn verstorben, nachdem er sich mehrere Tage zuvor bei einem Spaziergang mit dem bayerischen König im Schloss Schönbrunn eine Erkältung zugezogen hatte. Ihm folgt sein Großneffe Karl I., doch es ist fraglich, wie das Kaiserreich nach dem Verlust einer so bedeutenden Persönlichkeit, die knapp sieben Jahrzehnte regierte, bestehen bleiben soll."
 ww1_kuk.43.a:0 "Ein schrecklicher Verlust..."
 ww1_kuk.44.t:0 "Ermordung von Franz Ferdinand"
 ww1_kuk.44.d:0 "Am 28. Juni 1914 wurden Erzherzog Franz Ferdinand von Österreich, Erbe des österreichisch-ungarischen Throns, und seine Frau Sophie, Herzogin von Hohenberg, in Sarajevo von Gavrilo Princip erschossen. Der Attentäter war einer von sechs bosnisch-serbischen Mördern, die von der paramilitärischen Gruppe „Schwarze Hand“ koordiniert wurden. Das politische Ziel des Attentats war die Abspaltung der südslawischen Provinzen Österreich-Ungarns, um sie zu einem „Großserbien“ zu vereinigen. \n\n Obwohl die ultrakonservative österreichische Regierung nicht übermäßig um den liberal gesinnten Franz Ferdinand trauert, wird Kaiser Franz Josef und der österreichischen Militärführung nachgesagt, dass sie seinen Tod als Vorwand nutzen, um einen Krieg mit Serbien zu fordern."
 ww1_kuk.44.a:0 "Tragisch und bedauerlich"
 ww1_kuk.45.t:0 "Deutsche Unterstützung gegen Serbien?"
 ww1_kuk.45.d:0 "Wir haben Graf Hoyos nach Berlin geschickt, um Deutschlands Unterstützung in der aktuellen Krise mit Serbien zu bestätigen, sollte es zu einem Krieg kommen …"
 ww1_kuk.45.a:0 "Sie müssen zustimmen!"
 ww1_kuk.4501.t:0 "Österreich verlangt „Blankoscheck“"
 ww1_kuk.4501.d:0 "Die österreichisch-ungarische Regierung hat uns um die Zusage gebeten, ihr beizustehen, sollte sich die Lage mit Serbien zu einem umfassenden Konflikt ausweiten."
 ww1_kuk.4501.a:0 "Geben Sie ihnen unseren Blankoscheck"
 ww1_kuk.46.t:0 "Blankoscheck aus Deutschland erhalten"
 ww1_kuk.46.d:0 "Wir schickten Alexander, auch bekannt als Graf Hoyos, mit dem Memorandum und dem Brief des Kaisers nach Berlin, um Botschafter Szögyenys Unterstützung zu sichern. Am Abend telegrafierte Szögyeny über die Zusage des Kaisers, „volle deutsche Unterstützung“ zu gewähren. Hoyos erhielt während seines Treffens eine ähnliche Nachricht von Zimmermann. Am folgenden Tag trafen sich die beiden Diplomaten mit Bundeskanzler Bethmann-Hollweg und Zimmermann. Die Zusagen des Kaisers wurden bestätigt, und Österreich-Ungarn erhielt einen Blankoscheck für die Verhandlungen mit Serbien."
 ww1_kuk.46.a:0 "Großartig!"
 ww1_kuk.47.t:0 "Ultimatum an Serbien"
 ww1_kuk.47.d:0 "Wir haben dem Königreich Serbien ein Ultimatum gestellt, in dem wir den serbischen Staat auffordern, die gegen unser Land gerichtete „gefährliche Propaganda“ offiziell und öffentlich zu verurteilen. Ihr letztendliches Ziel soll darin bestehen, „der Monarchie die ihr gehörenden Gebiete abzutrennen“. Darüber hinaus soll Belgrad „diese verbrecherische und terroristische Propaganda mit allen Mitteln unterdrücken“. \N\N Darüber hinaus soll die serbische Regierung aufgefordert werden, \n\n 1. Alle Veröffentlichungen zu unterdrücken, die „Hass und Verachtung gegenüber der österreichisch-ungarischen Monarchie schüren“ und „sich gegen ihre territoriale Integrität richten“. \n\n 2. Die serbisch-nationalistische Organisation Narodna Odbrana (Volksverteidigung) und alle anderen derartigen Gesellschaften in Serbien aufzulösen. \n\n 3. Sämtliche Propaganda gegen Österreich-Ungarn unverzüglich aus Schulbüchern und öffentlichen Dokumenten zu entfernen. \n\n 4. Alle Offiziere und Funktionäre, deren Namen die österreichisch-ungarische Regierung bekannt geben wird, aus der serbischen Militär- und Zivilverwaltung zu entfernen. \n\n 5. Aufnahme von „Vertretern der österreichisch-ungarischen Regierung“ in Serbien zur „Unterdrückung subversiver Bewegungen“. \n\n 6. Anklageerhebung aller an der Ermordung des Erzherzogs Beteiligten und Zulassung „österreichisch-ungarischer Delegierter“ zur Teilnahme an den Ermittlungen. \n\n 7. Verhaftung von Major Vojislav Tankosic und des Beamten Milan Ciganovic, die als Teilnehmer des Attentatskomplotts genannt wurden. \n\n 8. Beendigung der Zusammenarbeit mit den serbischen Behörden beim „Waffen- und Sprengstoffhandel über die Grenze“. Entlassung und Bestrafung der Beamten des Grenzdienstes von Sabac und Loznica, die „der Unterstützung der Täter des Sarajevo-Verbrechens schuldig“ sind. \n\n 9. Abgabe von „Erklärungen“ gegenüber der österreichisch-ungarischen Regierung bezüglich „serbischer Beamter“, die sich in Interviews „feindselig gegenüber der österreichisch-ungarischen Regierung“ geäußert haben. \n\n und schließlich 10. Benachrichtigen Sie die österreichisch-ungarische Regierung „unverzüglich“ über die Durchführung der im Ultimatum enthaltenen Maßnahmen."
 ww1_kuk.47.a:0 "Hoffen wir, dass sie sich daran halten? Oder eher, dass sie es nicht tun ..."
 ww1_kuk.48.t:0 "Serbien lehnt Ultimatum ab"
 ww1_kuk.48.d:0 "Der serbische Premierminister Nicola Pasic hat offenbar die Mobilisierung der serbischen Armee angeordnet und gleichzeitig kurz vor Ablauf der Frist um 18 Uhr die serbische Antwort auf das Ultimatum in der österreichischen Botschaft in Gieslingen übergeben. Serbien akzeptierte damit praktisch alle Bedingungen des Ultimatums, mit der Ausnahme, dass es die Teilnahme Österreich-Ungarns an internen Untersuchungen nicht akzeptieren würde, da dies einen Verstoß gegen die Verfassung und das Strafprozessrecht darstellen würde. Diese Antwort hat Pasic und sein Land sowie viele internationale Beobachter angesprochen, für uns änderte sie jedoch kaum etwas, da die Doppelmonarchie die diplomatischen Beziehungen zu Serbien abgebrochen hat."
 ww1_kuk.48.a:0 "Das bedeutet Krieg..."
 ww1_kuk.49.t:0 "An meine Völker!"
 ww1_kuk.49.d:0 "Nach der Weigerung, alle Bedingungen des an Serbien gerichteten Ultimatums zu akzeptieren, veröffentlichte Franz Josef am 28. Juli 1914 in Bad Ischl das Manifest „An mein Volker“. Der Text war eine typische Schlagzeile für Kriegsmanifeste, die nach der Kriegserklärung des Kaiserreichs an Serbien gedruckt wurden. Das Dokument wurde im ganzen Kaiserreich verteilt und von zahlreichen Medien veröffentlicht. Der Text stellte die Aggressivität Serbiens als Kriegsgrund dar und behauptete, das Kaiserreich habe alles versucht, um den Konflikt zu vermeiden."
 ww1_kuk.49.a:0 "Der Krieg hat begonnen"
 ww1_kuk.50.t:0 "Antiserbische Unruhen in Sarajevo"
 ww1_kuk.50.d:0 "Nach der Ermordung Erzherzog Franz Ferdinands kam es in Sarajevo zu massiver antiserbischer Gewalt, die von der Regierung gefördert wurde. Die gewalttätigen Demonstrationen nahmen pogromartige Züge an und führten zu ethnischen Spaltungen, wie sie in der Geschichte der Stadt beispiellos waren. Zwei Serben wurden bisher getötet und zahlreiche weitere angegriffen, während zahlreiche Häuser, Geschäfte und Einrichtungen serbischer Eigentümer dem Erdboden gleichgemacht oder geplündert wurden."
 ww1_kuk.50.a:0 "Das ist Rache!"
 ww1_kuk.51.t:0 "Waffenstillstand von Villa Giusti"
 ww1_kuk.51.d:0 "So schmerzlich es auch ist, es zuzugeben: Unsere Truppen wurden besiegt und existieren nicht mehr als Kampftruppe, was in den letzten Wochen zu einem chaotischen Rückzug führte. Darüber hinaus hat die Nation selbst mit der Unabhängigkeitserklärung mehrerer Staaten, darunter Ungarn, das die Hälfte unseres Namens ausmacht, in vielerlei Hinsicht aufgehört zu existieren. Aufgrund der Schwäche der Armee waren unsere Kommandeure gezwungen, einen Waffenstillstand anzustreben und unterzeichneten den Waffenstillstand von Villa Giusti, der außerhalb von Padua in Venetien unterzeichnet wurde und heute in Kraft tritt. Das Königreich Italien hat bereits Südtirol, Triest und das österreichische Küstenland annektiert."
 ww1_kuk.51.a:0 "Alles kaputt..."
 ww1_kuk.51.b:0 "Wir müssen den Kampf für das Wohl unserer Nation fortsetzen …"
 ww1_kuk.52.t:0 "Die Republik Banat erklärt ihre Unabhängigkeit"
 ww1_kuk.52.d:0 "Im Banat haben führende Mitglieder der Sozialdemokratischen Partei heute beschlossen, die Unabhängigkeit auszurufen und eine Republik unter Führung des sozialdemokratischen Parteichefs Otto Roth zu gründen. Die Rumänen, die aus mehreren großen Ethnien bestehen, streben Berichten zufolge keine Autonomie, sondern eine Vereinigung mit dem Königreich Rumänien an."
 ww1_kuk.52.a:0 "Es wird nicht lange dauern"
 ww1_kuk.52.b:0 "Diese Nation wird mit Blut und Eisen zusammengehalten!"
 ww1_kuk.53.t:0 "Tschechien erklärt seine Unabhängigkeit"
 ww1_kuk.53.d:0 "Angesichts des drohenden Zusammenbruchs des Habsburgerreichs Österreich-Ungarn verkündete die provisorische Regierung die Unabhängigkeit der tschechischen Nation. US-Außenminister Robert Lansing verkündete den Entwurf der Unabhängigkeitserklärung auf Grundlage der vierzehn Punkte Wilsons und legte ihn den USA vor. Er antwortete, die Alliierten seien nun den Anliegen der Tschechen, Slowaken und Südslawen verpflichtet. Der zehnte der vierzehn Punkte (Autonomie der Nationalitäten) reiche nicht mehr aus, da Kaiser Karl I. unter diesen Bedingungen das Reich zusammenhalten wolle."
 ww1_kuk.53.a:0 "Dies ist die Sterbeurkunde des Imperiums ..."
 ww1_kuk.53.b:0 "Behalten Sie um jeden Preis die Fassung!"
 ww1_kuk.54.t:0 "Westukrainische Volksrepublik fordert Unabhängigkeit"
 ww1_kuk.54.d:0 "Heute wurde die Westukrainische Volksrepublik ausgerufen, wobei die Polen mit der Ausrufung des Polnischen Liquidationskomitees überrascht wurden, das bereit war, von Krakau nach Lwiw zu ziehen. Bei den polnischen Bürgern in Lwiw, die nicht Teil dieser ukrainischen Nation sein wollen, ist ein tiefer Unmut entstanden."
 ww1_kuk.54.a:0 "Wir werden ohne diese Ukrops klarkommen"
 ww1_kuk.54.b:0 "Zeigt ihnen unsere Macht!"
 ww1_kuk.55.t:0 "Martin-Erklärung: Vereinte Slowakei mit Tschechien"
 ww1_kuk.55.d:0 "Die Martin-Erklärung wurde im slowakischen Martin etwa zehn Tage nach der tschechischen Unabhängigkeitserklärung als Unabhängigkeitserklärung von der Habsburgermonarchie verkündet. Obwohl es Forderungen nach einer vollständigen Unabhängigkeit der Slowakei, auch von der Tschechischen Republik, gab, wurden die separatistischen Bestrebungen der Slowaken weitgehend auf Eis gelegt, da die Tschechen den Bedingungen einer slowakischen Unabhängigkeit nicht zustimmen wollten. \n\n Das slowakische Volk irrte sich jedoch, denn es würde in diesem Staat keine gleichberechtigten Partner sein. Und als Edvard Beneš, der Außenminister der provisorischen tschechischen Regierung, erklärte, es würde sich um einen föderalen Staat nach schweizerischem Vorbild handeln, wurden die Slowaken schnell zu einer nationalen Minderheit degradiert."
 ww1_kuk.55.a:0 "Diese Verräter!"
 ww1_kuk.56.t:0 "Aster-Revolution in Ungarn"
 ww1_kuk.56.d:0 "Angeführt vom Sozialdemokraten Graf Mihály Károly, dem Gründer des Sozialdemokratischen Ungarischen Nationalrats (HNC), forderte Károlyi heute mit Unterstützung von Soldaten der ungarischen Armee die Abspaltung Ungarns vom Habsburgerreich. HNC-Demonstranten trugen Astern und halfen bei der Besetzung öffentlicher Gebäude in ganz Budapest. Premierminister Sandor Wekerle trat zurück, und der ehemalige Premierminister István Tisza wurde ermordet."
 ww1_kuk.56.a:0 "Dies bedeutet die Auflösung des Imperiums"
 ww1_kuk.56.b:0 "Ich werde diesen Putsch nicht akzeptieren!"
 ww1_kuk.57.t:0 "Frage der Banatregion"
 ww1_kuk.57.d:0 "Seit der Unabhängigkeitserklärung der Region Banat vor knapp zwei Wochen ist das Land bislang ein unruhiger Staat. Die ethnische Mehrheit des Landes, die Rumänen, fordern die Vereinigung mit dem Rest der rumänischen Nation, und in der anderen Hälfte des Banats leben viele Jugoslawen. Angesichts der Tatsache, dass dieses Land nur vom besiegten Ungarn internationale Unterstützung erhält, könnten wir es ohne internationale Gegenreaktionen angreifen und zwischen uns und Rumänien aufteilen."
 ww1_kuk.57.a:0 "Nimm es!"
 ww1_kuk.57.b:0 "Verschone sie"
 ww1_kuk.58.t:0 "Teilung des Banats"
 ww1_kuk.58.d:0 "Da unsere Truppen die Region Banat vollständig unter ihre Kontrolle gebracht haben, ist es an der Zeit, den Staat aus Gründen der Gerechtigkeit auf der Grundlage ethnischer Mehrheiten zwischen uns und dem Königreich Rumänien aufzuteilen."
 ww1_kuk.58.a:0 "Gut"
 ww1_kuk.59.t:0 "Waffenstillstand von Villa Giusti"
 ww1_kuk.59.d:0 "So schmerzhaft es auch sein mag, es zuzugeben: Unsere Truppen wurden besiegt und existieren nicht mehr als Kampftruppe, was in den letzten Wochen zu einem chaotischen Rückzug führte. Darüber hinaus hat die Nation selbst in vielerlei Hinsicht aufgehört zu existieren, mit Forderungen nach Unabhängigkeit aus allen Teilen des Landes, einschließlich des Königreichs Ungarn, das die Hälfte unseres Namens ausmacht. Angesichts der Schwäche der Armee waren unsere Kommandeure gezwungen, einen Waffenstillstand anzustreben und unterzeichneten den Waffenstillstand von Villa Giusti, der außerhalb von Padua in Venetien unterzeichnet wurde und heute in Kraft tritt. Das Königreich Italien hat bereits Südtirol, Triest und das österreichische Küstenland annektiert."
 ww1_kuk.59.a:0 "Alles kaputt..."
 ww1_kuk.60.t:0 "Beginn der Frühjahrsoffensive"
 ww1_kuk.60.d:0 "Der Krieg dauert nun schon vier lange Jahre, doch für die Mittelmächte, die Russland besiegt haben, ist es nicht nur schlecht. Sie können nun alle ihre östlichen Divisionen an der Westfront konzentrieren und sind damit zahlenmäßig überlegen. Dies veranlasste Erich Ludendorff, die Kaiserschlacht zu planen. Doch im Inneren zerfallen die Mittelmächte langsam: Desertion, Kriegsmüdigkeit und die Blockade fordern ihren Tribut, und sie werden entweder schnell gewinnen oder schnell verlieren. "
 ww1_kuk.60.a:0 "Das ist nicht gerade vielversprechend …"
 ww1_kuk.61.t:0 "Tiroler Ehrenamtliche!"
 ww1_kuk.61.d:0 "Italien hat in letzter Zeit einige sehr verdächtige Aktivitäten an der Grenze erlebt. Angesichts der dort versammelten Truppen könnte man meinen, sie bereiten sich trotz des Dreibunds auf einen Verrat und eine Invasion vor. Daher haben unsere eigenen Bürger in den Grenzregionen gut ausgebildete Bergmilizen gebildet, um sich gegen diese potenzielle italienische Aggression zu verteidigen."
 ww1_kuk.61.a:0 "Diese unverschämten Italiener!"
 ww1_kuk.65.t:0 "Der 11. Kreuzzug"

# WW1 Mexico #
 ww1_mexico.1.t:0 "Zapata getötet!"
 ww1_mexico.1.d:0 "Anfang 1919 befahl General Pablo Gonzalez seinen Untergebenen, Handelsoperationen gegen die Zapatisten in den Bergen durchzuführen. Doch als Gonzalez seinen Untergebenen Guajardo bei einem Zechgelage in einer Cantina antraf, wurde er verhaftet. Am 21. März versuchte Zapata, Guajardo eine Nachricht zuzuschmuggeln und ihn aufzufordern, die Seiten zu wechseln. Die Nachricht erreichte Guajardo jedoch nie, sondern landete auf General Gonzalez&#39; Schreibtisch. Gonzalez nutzte dies jedoch zu seinem Vorteil und versprach Guajardo, ihn zu begnadigen, wenn dieser Zapata versprach, seine Männer und Vorräte herüberzubringen, wobei Zapata allen Bedingungen zustimmte. Am 10. April 1919 lud Guajardo Zapata zu einem Treffen ein und deutete an, dass er beabsichtige, zu den Revolutionären überzulaufen. Als Zapata jedoch eintraf, wurde er von Guajardos Männern von Kugeln durchsiebt und niedergeschossen."
 ww1_mexico.1.a:0 "Ohne ihn ist unsere Nation der Vereinigung näher gekommen!"
 ww1_mexico.2.t:0 "Pancho Villa ermordet"
 ww1_mexico.2.d:0 "Am Freitag, dem 20. Juli 1923, wurde Villa bei einem Besuch in Parral getötet. Er fuhr häufig von seiner Ranch nach Parral, um Bankgeschäfte oder andere Besorgungen zu erledigen, und fühlte sich dort im Allgemeinen sicher. Normalerweise wurde Villa von seinem Gefolge aus Dorados (seinen Leibwächtern) begleitet, doch an diesem Tag war er ohne sie in die Stadt gegangen und hatte nur ein paar Freunde mitgenommen. Er wollte eine Lieferung Gold von der örtlichen Bank abholen, um damit die Angestellten seiner Ranch in Canutillo zu bezahlen. Auf der Rückfahrt durch die Stadt in seinem schwarzen Dodge Touring von 1919 kam Villa an einer Schule vorbei. Ein Kürbiskernverkäufer rannte auf sein Auto zu und rief „Viva Villa!“, ein Zeichen für eine Gruppe von sieben Schützen, die daraufhin mitten auf der Straße erschienen und mehr als 40 Schüsse auf das Auto abfeuerten. Bei dem Kugelhagel trafen neun Dumdum-Geschosse, die normalerweise für die Großwildjagd verwendet werden, Villa in Kopf und Brust und töteten ihn sofort."
 ww1_mexico.2.a:0 "Tragisch"
 ww1_mexico.3.t:0 "Wahl 1910"
 ww1_mexico.3.d:0 "Unser großer Führer Porfirio Díaz hat die Wahlen zweifellos gewonnen, auch wenn die Frage, ob die Wahlen manipuliert wurden, weiterhin heftig umstritten ist, da Maderos Wahlkampfteam auf heftigen Widerstand des Díaz-Regimes stieß. Kurz vor den Wahlen wurde er wegen Anstiftung zum Aufstand verhaftet, und viele haben Wahlbetrug bei den Wahlen festgestellt."
 ww1_mexico.3.a:0 "Das sind falsche Behauptungen"
 ww1_mexico.3.b:0 "Wie erwartet"
 ww1_mexico.4.t:0 "Madero-Kampagne äußerst erfolgreich"
 ww1_mexico.4.d:0 "Francisco Madero, der als Präsidentschaftskandidat antritt, war in seinem Wahlkampf in letzter Zeit sehr erfolgreich. Er zog große Menschenmengen an und beschwichtigte die Bevölkerung mit seinen Plänen für Reformen und Veränderungen in Mexiko. Sollte er die Wahl gewinnen, wird dieser Mann ein großes Hindernis darstellen, wenn wir vorhaben, noch ein wenig länger an der Macht zu bleiben ..."
 ww1_mexico.4.a:0 "Er wird ein Hindernis sein ..."
 ww1_mexico.5.t:0 "Madero entkommt!"
 ww1_mexico.5.d:0 "Obwohl Francisco Madero kurz vor den Wahlen inhaftiert wurde, ist es ihm dennoch gelungen, uns durch die Finger zu schlüpfen, indem er zu Pferd über die mexikanische Grenze in die Vereinigten Staaten flüchtete. Dort soll er sogar eine Revolution planen, um uns von der Macht zu vertreiben …"
 ww1_mexico.5.a:0 "Verdammt!"
 ww1_mexico.6.t:0 "Madero überquert den Rio Grande"
 ww1_mexico.6.d:0 "Madero, der in den USA Zuflucht gesucht hat, überquerte kürzlich mit seinen Anhängern den Rio Grande und veröffentlichte ein Manifest, in dem er die mexikanischen Wahlen von 1910 aufgrund von Wahlbetrugsvorwürfen für null und nichtig erklärte. Er behauptete, das Amt des Präsidenten und Vizepräsidenten Mexikos sei vakant und ernenne sich selbst zum provisorischen Präsidenten Mexikos."
 ww1_mexico.6.a:0 "Die Revolution hat begonnen!"
 ww1_mexico.6.b:0 "Gegen die Aristokratie!"
 ww1_mexico.7.t:0 "Diaz kapituliert"
 ww1_mexico.7.d:0 "Porfirio Diaz, ermutigt von seinem Berater José Yves Limantour, hat nach bedeutenden Siegen auf Seiten der Maderisten eine kluge Entscheidung getroffen und von der Macht zurückgetreten. Alle Kämpfe wurden eingestellt, und Diaz soll aus Mexiko verbannt werden. Maderos vage versprochene Sozialreformen wurden jedoch nie umgesetzt, sodass die Opposition in Mexiko weiterhin groß ist."
 ww1_mexico.7.a:0 "Endlich Frieden!"
 ww1_mexico.8.t:0 "Befreiungsarmee des Südens"
 ww1_mexico.8.d:0 "Emiliano Zapata hat sich der Revolution mit Madero angeschlossen, nachdem dieser einige vage Versprechungen bezüglich der Landreform gemacht hatte, was das einzige Thema ist, das Zapata interessiert."
 ww1_mexico.8.a:0 "Diaz ist dem Untergang geweiht"
 ww1_mexico.9.t:0 "Emiliano Zapata drängt auf Landreform"
 ww1_mexico.9.d:0 "Das vage Versprechen, das Madero Zapata in der Frühphase der Revolution gegeben hat, nämlich Zapatas Ideen für eine Landreform in die Tat umzusetzen, und das bis heute nicht eingehalten wurde, hat Zapata ziemlich wütend gemacht. Wenn wir nichts dagegen unternehmen, könnte es zu einer Rebellion kommen ..."
 ww1_mexico.9.a:0 "Hmm..."
 ww1_mexico.10.t:0 "Pascual Orozco startet Rebellion"
 ww1_mexico.10.d:0 "Einer von Maderos ehemaligen Generälen, Pascual Orozco, hat kürzlich in Chihuahua einen Aufstand angezettelt. Madero reagierte darauf mit der Entsendung von Truppen unter dem Kommando von Victoriano Huerta nach der Niederlage von José Gonzelez Salas. Der Aufstand ist sehr klein und wird kaum an Boden gewinnen."
 ww1_mexico.10.a:0 "Verräter!"
 ww1_mexico.11.t:0 "Bernardo Reyes startet Rebellion"
 ww1_mexico.11.d:0 "Bernardo Reyes, ein ehemaliger General unter Porfirio Diaz, hat in Nuevo Leon einen Aufstand angezettelt, der jedoch nur begrenzten Erfolg hatte und nach 11 Tagen niedergeschlagen wurde. Reyes wurde in Mexiko-Stadt inhaftiert."
 ww1_mexico.11.a:0 "In Mexiko wird es Stabilität geben!"
 ww1_mexico.12.t:0 "Felix Diaz startet Rebellion"
 ww1_mexico.12.d:0 "Der Neffe von Porfirio Diaz hat in Veracruz einen Aufstand angezettelt und behauptet, er wolle „die Ehre der von Madero niedergetrampelten Armee wiederherstellen“. Glücklicherweise wurde der Aufstand jedoch innerhalb weniger Tage niedergeschlagen und Diaz wurde in Mexiko-Stadt inhaftiert."
 ww1_mexico.12.a:0 "Welche Ehre?!"
 ww1_mexico.13.t:0 "Gerüchte über eine Verschwörung Huertas mit Feinden"
 ww1_mexico.13.d:0 "Victorianoo Huerta, der derzeitige Oberbefehlshaber der Streitkräfte, soll mit Felix Diaz, Bernardo Reyes und dem US-Botschafter Henry Lane Wilson gegen den derzeitigen Präsidenten Francisco Madero konspirieren. Zwei dieser Personen haben in der Vergangenheit aktiv gegen Madero rebelliert..."
 ww1_mexico.13.a:0 "Hier ist etwas faul ..."
 ww1_mexico.14.t:0 "Die zehn tragischen Tage"
 ww1_mexico.14.d:0 "In der Nacht des 8. Februar 1913 wurde Felix Diaz nach einer kurzen Unterredung freigelassen, die mit dem Tod des Kommandanten des Zivilgefängnisses endete, als dieser sich in das städtische Arsenal zurückzog, wo er die Kontrolle über das Waffenlager übernahm. \n\n Madero war absolut davon überzeugt, dass dieser Aufstand ebenso wie die vorherigen niedergeschlagen werden würde. Während die Kämpfe in der Hauptstadt mehrere Tage andauerten, verbündete sich General Victoriano Huerta schließlich mit Felix Diaz, verriet Madero, verhaftete und ermordete seinen Bruder und bot Madero Schutz vor den Streitkräften von Diaz/Reyez an, wurde jedoch von Huerta verraten und verhaftet, kurz darauf zum Rücktritt gezwungen und anschließend ermordet."
 ww1_mexico.14.a:0 "Was für eine Tragödie ..."
 ww1_mexico.15.t:0 "Zapatas Landreformen akzeptieren?"
 ww1_mexico.15.d:0 "Wenn wir Zapatas Landreformen akzeptieren, müssen wir uns keine Sorgen machen, dass er sich gegen uns erhebt, und Mexiko könnte weiterhin eine friedliche Zukunft haben. Sollten wir jedoch unser vages Reformversprechen brechen, könnte uns eine Rebellion Zapatas bevorstehen, die Mexiko möglicherweise in eine weitere Revolution bzw. einen weiteren Bürgerkrieg stürzen könnte."
 ww1_mexico.15.a:0 "Zapatas Landreform umsetzen"
 ww1_mexico.15.b:0 "Zapata ignorieren"
 ww1_mexico.16.t:0 "Zapata erhebt sich!"
 ww1_mexico.16.d:0 "Zapata ist wütend darüber, dass Madero sein vage Versprechen, in ganz Mexiko Landreformen durchzuführen, ignoriert hat und hat gegen uns zu den Waffen gegriffen! Obwohl seine Truppen klein sind und derzeit keine große Gefahr darstellen, ist es besser, das Feuer schnell zu löschen ..."
 ww1_mexico.16.a:0 "Verdammt"
 ww1_mexico.17.t:0 "Verfassungsrechtler erheben sich"
 ww1_mexico.17.d:0 "Nach dem Aufstieg von Victoriano Huerta, der Mexiko eine brutale Militärdiktatur aufzwang, starteten die Streitkräfte von Venustiano Carranza einen Aufstand gegen Huerta, um ihn aus dem Amt zu drängen und die Demokratie in Mexiko wiederherzustellen."
 ww1_mexico.17.a:0 "Verdammt!"
 ww1_mexico.18.t:0 "Villistas erheben sich"
 ww1_mexico.18.d:0 "Nach dem Aufstieg von Victoriano Huerta, der Mexiko eine brutale Militärdiktatur aufzwang, haben sich die Kräfte von Pancho Villa den Constitutionalistas von Venustiano Carranza gegen Huerta angeschlossen, um ihn aus dem Amt zu drängen und die Demokratie in Mexiko wiederherzustellen."
 ww1_mexico.18.a:0 "Verdammt!"
 ww1_mexico.19.t:0 "Zapatisten erheben sich"
 ww1_mexico.19.d:0 "Nach dem Aufstieg von Victoriano Huerta, der Mexiko eine brutale Militärdiktatur aufzwang, haben sich die Kräfte von Emiliano Zapata mit den Constitutionalistas von Venustiano Carranza und den Villistas von Pancho Villa gegen Huerta verbündet, um ihn aus dem Amt zu drängen und die Demokratie in Mexiko wiederherzustellen."
 ww1_mexico.19.a:0 "Verdammt!"
 ww1_mexico.20.t:0 "Sturz des Huerta-Regimes"
 ww1_mexico.20.d:0 "Nach enormem internen und externen Druck und wiederholten Niederlagen vor Ort gegen die Villista-Constitutionalista-Zapatista-Allianz hat Victoriano Huerta heute entschieden, widerwillig von seinem Amt als „Präsident“ zurückzutreten."
 ww1_mexico.20.a:0 "Eine neue Ära des Friedens!"

# WW1 Portugal #
 ww1_portugal.1.t:0 "Monarchie des Nordens"
 ww1_portugal.1.d:0 "Die Monarchie des Nordens, offiziell Königreich Portugal, war eine kurzlebige Revolution und monarchistische Regierung, die am 19. Januar 1919 in Porto im Norden Portugals ausgerufen wurde. Angeführt wurde die Bewegung von Henrique Mitchell de Paiva Couceiro, einem prominenten Mitglied der portugiesischen Kaiserregierung. Er erklärte, die Revolution sei notwendig, denn „wenn der Norden sich nicht mit dem Süden einig wird, werde ich bis zum Ende auf der Seite derer stehen, die der Tradition treu sind.“ Aufgrund ihrer unorganisierten Struktur konnte die Revolution jedoch im ganzen Land keine breite Unterstützung in der Bevölkerung gewinnen, was zu ihrem schnellen Ende und der Wiedereinsetzung des portugiesischen republikanischen Regimes in Porto führte."
 ww1_portugal.1.a:0 "Sie werden zerquetscht!"
 ww1_portugal.1.b:0 "Es lebe der König!"
 ww1_portugal.2.t:0 "Blutige Nacht"
 ww1_portugal.2.d:0 "In der Nacht des 19. auf den 20. Oktober 1921 kam es in Lissabon zu einem radikalen Aufstand, der auf Portugiesisch „Noite Sangrenta“ genannt wird. Während der Blutigen Nacht wurden der Regierungschef Antonio Granjo sowie die Politiker Machado Santos und José Carlos da Maia, die an der Revolution vom Oktober 1910 beteiligt waren, die zur Gründung der Ersten Portugiesischen Republik führte, und andere kaltblütig ermordet. Der Aufstand ereignete sich in der Nacht des 19. Oktober 1921, nach dem Jahrestag der Ausrufung der Republik. Damals erhob sich eine Gruppe von Soldaten gegen die Absetzung der Regierung unter Liberato Pinto, dem Protektor der Guarda Nacional Republicana."
 ww1_portugal.2.a:0 "Wie schrecklich ..."
 ww1_portugal.3.t:0 "Sidonio Pais ermordet!"
 ww1_portugal.3.d:0 "Nachdem der Präsident am Abend des 14. Dezember 1914 nach einem Abendessen im Restaurant Silva den Bahnhof Lissabon-Rossio erreicht hatte, wollten er und sein Bruder mit ihrem Sohn den Zug nach Porto nehmen, um sich mit den Militärjuntas des Nordens zu beraten. Als er jedoch gegen 23 Uhr den Bahnhof betrat, wurde er von einem republikanischen Gardisten in Empfang genommen, der den Präsidenten beschützen sollte. Dies konnte die Stimmung jedoch nicht trüben, da eine Band ein bekanntes Lied spielte, als der Präsident den Bahnhof betrat. Im Bahnhof erwartete ihn bereits José Julio da Costa, ein linker Aktivist, der eine Pistole in seinem Umhang versteckte. Als der Präsident vorbeikam, durchbrach Da Costa die doppelte Polizeiabsperrung, die den Präsidenten umgab, und feuerte zwei Schüsse auf Pais ab, der zunächst noch lebte, aber auf dem Weg ins Krankenhaus seinen Verletzungen erlag."
 ww1_portugal.3.a:0 "Was werden wir ohne ihn tun?"
 ww1_portugal.4.t:0 "Attentat auf den Präsidenten!"
 ww1_portugal.4.d:0 "Am 5. Dezember 1918 kam es während einer Preisverleihung für die Überlebenden des Marinetrawlers Augusto de Castilho zu einem Attentat auf den Präsidentenkönig Sidonio Pais, bei dem glücklicherweise niemand verletzt wurde."
 ww1_portugal.4.a:0 "Gut, dass es nicht geklappt hat!"
 ww1_portugal.5.t:0 "Staatsstreich vom 28. Mai 1926"
 ww1_portugal.5.d:0 "Der Staatsstreich vom 28. Mai 1926, manchmal auch Revolution des 28. Mai oder während der Zeit des autoritären Estado Novo Nationale Revolution genannt, war ein Militärputsch nationalistischen Ursprungs, der der instabilen Ersten Portugiesischen Republik ein Ende setzte und die Ditadura Nacional einleitete. Die chronische politische Instabilität und die Vernachlässigung der Armee durch die Regierung boten Gelegenheit für militärische Verschwörungen. Bereits 1925 gab es zwei gescheiterte Putschversuche, am 18. April und 19. Juli. Die Verschwörer wurden von einem Militärgericht freigesprochen. Im Winter 1925 und Frühjahr 1926 plante eine Gruppe junger Offiziere einen neuen Putsch und suchte nach einem höheren Offizier als Galionsfigur ihrer Bewegung. Sie entschieden sich für General Manuel Gomes da Costa, der sich am 25. Mai bereit erklärte, sich den Verschwörern anzuschließen."
 ww1_portugal.5.a:0 "Nieder mit der Republik!"
 ww1_portugal.6.t:0 "José Mendes Cabeçadas abgesetzt!"
 ww1_portugal.6.d:0 "Cabecadas war der neunte Präsident der Republik, die eine Militärdiktatur war. Andere Revolutionäre, darunter Gomes da Costa und Oscar Carmona, hielten ihn für unfähig, und bei einem Treffen in Sacavém am 17. Juni 1926 wurde Mendes Cabecadas gezwungen, zugunsten von Gomes da Costa auf sein Amt als Präsident der Republik zu verzichten. Er schloss sich daraufhin der Opposition gegen das Regime an, beteiligte sich an mehreren Revolutionsversuchen und unterzeichnete zahlreiche Manifeste gegen die Diktatur."
 ww1_portugal.6.a:0 "Wir begrüßen Gomes da Costa!"
 ww1_portugal.7.t:0 "Gomes da Costa gestürzt!"
 ww1_portugal.7.d:0 "Gomes da Costas Regierung hielt fast ebenso kurz wie die seines Vorgängers, da sie am 9. Juli desselben Jahres durch einen erneuten Putsch gestürzt wurde. Dieser Versuch wurde von João José Sinel de Cordes und Oçar Carmona nachgeahmt, nachdem Gomes da Costa versucht hatte, Carmona als Außenminister abzusetzen. Der neue Präsident Carmona benutzte den Vorwand, Gomes da Costa sei „amtsunfähig“, und schickte ihn ins Exil auf die Azoren, während er ihn gleichzeitig zum Marschall der portugiesischen Armee ernannte."
 ww1_portugal.7.a:0 "Carmona ist die bessere Wahl!"
 ww1_portugal.8.t:0 "Salazar kommt an die Macht"
 ww1_portugal.8.d:0 "Nachdem Präsident Carmona Salazar zum Finanzminister ernannt hatte, war er von seinem Charima und seinen Qualitäten sehr beeindruckt und ernannte ihn 1932 zum Premierminister, wodurch er ihm praktisch die Kontrolle über die Regierung übergab."
 ww1_portugal.8.a:0 "Salazar wird uns zum Sieg führen!"
 ww1_portugal.9.t:0 "5. Oktober 1910 Revolution"
 ww1_portugal.9.d:0 "Das Königreich Portugal war in den letzten Jahren durch den britischen Druck auf die portugiesischen Kolonien, die Ausgaben der königlichen Familie und den Königsmord an König Carlos und dem Thronfolger stark destabilisiert worden. Befürworter der Republik nutzten die Situation aus und riefen am 3. Oktober 1910 die Republik aus. Zweitausend Soldaten und Matrosen rebellierten. Eine provisorische Regierung unter Teofilo Braga stürzte die konstitutionelle Monarchie und forderte die Verbannung Manuels II. aus Portugal."
 ww1_portugal.9.a:0 "Ruhm der Republik!"
 ww1_portugal.9.b:0 "Der Thron gehört mir!"
 ww1_portugal.10.t:0 "Die portugiesische Monarchie bittet um Hilfe"
 ww1_portugal.10.d:0 "Die portugiesischen monarchistischen Streitkräfte haben um Unterstützung in ihrem aktuellen Kampf im portugiesischen Bürgerkrieg gegen die Streitkräfte der Republik gebeten. Es wäre für uns von Vorteil, diese Republikaner loszuwerden, damit unser eigenes Volk nicht auf die Idee kommt, etwas Ähnliches in Spanien zu tun …"
 ww1_portugal.10.a:0 "Unterstützen Sie die Monarchisten"
 ww1_portugal.10.b:0 "Ich möchte mich lieber nicht einmischen"
 ww1_portugal.11.t:0 "Sieg der Monarchisten, Bürgerkrieg vorbei!"
 ww1_portugal.11.d:0 "Mit dem erneuten Einmarsch monarchistischer Kräfte in die republikanische Hauptstadt Lissabon begann die Republik auch andernorts zu zerfallen, was zu einem entscheidenden Sieg der Monarchie in Portugal führte. Es ist an der Zeit, die autoritären Machtbefugnisse des Königs zu stärken, um weitere Revolutionen der Republikaner zu verhindern, sollten diese erneut ausbrechen."
 ww1_portugal.11.a:0 "Hurra!"
 ww1_portugal.12.t:0 "Angriff auf Chaves"
 ww1_portugal.12.d:0 "Ein Angriff des royalistischen Führers Henrique Paiva Couceiro wurde in der Stadt Chaves vereitelt. Die Royalisten, die angeblich vom spanischen König Alfons XIII. heimlich bewaffnet worden waren, kamen aus dem spanischen Galizien. Doch glücklicherweise endete ihr Angriff mit einer entscheidenden Niederlage, die ihn laut Paiva Couceiro dazu veranlasste, die monarchistische Sache aufzugeben."
 ww1_portugal.12.a:0 "Sie werden nicht zurückkommen!"
 ww1_portugal.13.t:0 "Spanien erklärt sich bereit, Hilfe zu leisten"
 ww1_portugal.13.d:0 "Alfons XIII. vom Königreich Spanien hat beschlossen, uns Hilfe aus Spanien zu gewähren, die wir gegen die republikanischen Streitkräfte einsetzen können. Hoffentlich können wir davon profitieren und werden diesen Akt der Großzügigkeit der Spanier nicht vergessen."
 ww1_portugal.13.a:0 "Großartig!"
 ww1_portugal.14.t:0 "Nationalversammlung aufgelöst!"
 ww1_portugal.14.d:0 "Angesichts der politischen Instabilität, der offen feindseligen Haltung vieler Parteien im Parlament und der weitgehend unkontrollierbaren Nationalversammlung löste Präsident Manuel de Arriaga die Nationalversammlung einseitig auf, um den Einfluss der Republikanischen Partei Portugals zu verringern. In der Folge setzte er Joaquim Pimenta de Castro als Regierungschef ein. \n\n Pimenta de Castro ernannte umgehend mehrere Militärs in verschiedene Ministerien, löste die Nationalversammlung auf und führt die Regierung nun als Diktator."
 ww1_portugal.14.a:0 "Sie sind Verräter der Republik ..."
 ww1_portugal.15.t:0 "Aufstand vom 14. Mai"
 ww1_portugal.15.d:0 "Heute, am 14. Mai, begann in Lissabon ein politisch-militärischer Aufstand mit dem Ziel, die Macht von General Pimenta de Castro zu stürzen und die Regierung zu den Grundsätzen der Verfassung von 1911 zurückzuführen. \n\n Am Morgen des 14. Mai besetzte eine Gruppe von Revolutionären, darunter Marinesoldaten und reguläre Soldaten, das Marinearsenal in Lissabon und erbeutete sofort Waffen. Pimenta de Castros Streitkräfte versuchten, das Marinearsenal einzukesseln, wurden jedoch von republikanischen Schiffen, darunter der NRP Vasco da Gama, bombardiert. \N\N Obwohl Pimenta de Castros Regierung die Flucht gelang, ergab sie sich schließlich aufgrund der unverhältnismäßig großen Zahl bewaffneter Kräfte, die ihr gegenüberstanden. Obwohl es sich um ein kleines und kurzes Ereignis handelte, wurden einigen Quellen zufolge 200 Menschen getötet und 1000 verletzt."
 ww1_portugal.15.a:0 "Nieder mit der Diktatur!"
 ww1_portugal.16.t:0 "Militärjunta, Sidonio Pais übernimmt die Macht"
 ww1_portugal.16.d:0 "Heute, am 5. Dezember 1917, führte Portugals Teilnahme am Ersten Weltkrieg zu einer politischen, wirtschaftlichen und sozialen Umwälzung des Landes. Sidonio Pais führte einen triumphalen Militäraufstand an, der zur Bildung einer Militärjunta führte. Das Parlament wurde aufgelöst, die Regierung von Afonso Costa gestürzt und Präsident Bernardino Machado abgesetzt. Pais schlug die Gründung einer „Neuen Republik“ vor und setzte die Verfassung von 1911 außer Kraft. Er wurde in direkter Wahl zum Präsidenten der Republik gewählt, wodurch ein Berufssenat geschaffen wurde."
 ww1_portugal.16.a:0 "Die Bevölkerung begrüßt diese Veränderung"
 ww1_portugal.17.t:0 "Gesetz zur Trennung von Kirche und Staat"
 ww1_portugal.17.d:0 "Um die Beziehungen zur römisch-katholischen Kirche zu normalisieren, die seit 1911 mit dem republikanischen Regime im Krieg liegt, hat der Präsident heute das Gesetz zur Trennung von Kirche und Staat geändert. Obwohl dies eine sofortige und heftige Reaktion der traditionellen Republikaner und Freimaurer hervorrief, fand es breite Unterstützung bei Katholiken, gemäßigten Republikanern und der Landbevölkerung – insgesamt bei der großen Mehrheit der portugiesischen Bevölkerung."
 ww1_portugal.17.a:0 "Es ist ein Schritt nach vorne"
 ww1_portugal.18.t:0 "Pais verkündet „allgemeines Wahlrecht“"
 ww1_portugal.18.d:0 "Heute, am 11. März, hat Sidonio Pais einen weiteren „verfassungswidrigen“ Schritt unternommen, indem er die direkte Wahl des Präsidenten durch Volksabstimmung und allgemeines Wahlrecht verfügte."
 ww1_portugal.18.a:0 "Wahlrecht für alle!"

# WW1 Romania #
 ww1_romania.1.t:0 "Carol I. stirbt"
 ww1_romania.1.d:0 "Karl I. regierte Rumänien lange und trug so zu dessen rasanter Entwicklung während seiner Herrschaft bei, wofür ihm das rumänische Volk sicherlich dankbar ist. Obwohl er geneigt war, auf Seiten der Mittelmächte in den Krieg einzutreten, war er überzeugt, dass ein Kriegseintritt zugunsten des Deutschen Reiches und damit zur Unterstützung seines Cousins Wilhelm II. ehrenhaft wäre. Doch er ist verstorben, und so liegt die Zukunft Rumäniens in den Händen seines Ferdinand."
 ww1_romania.1.a:0 "Was wird das Schicksal Rumäniens sein?"

# WW1 Russia
 ww1_russia.1.t:0 "Unser Freund Rumänien"
 ww1_russia.1.d:0 "Während der Krieg noch andauert, haben wir mit Rumänien erfolgreiche Gespräche über die Neutralität des Landes geführt. Sofern wir an unserer Front gegen die Mittelmächte keine nennenswerten Fortschritte erzielen, will Rumänien sich nicht einmischen."
 ww1_russia.1.a:0 "In Ordnung"
 ww1_russia.2.t:0 "Slawische Bruderschaft"
 ww1_russia.2.d:0 "Wir haben unsere Beziehungen zu unseren slawischen Brüdern auf dem Balkan, insbesondere zu Serbien und Montenegro, erheblich verbessert."
 ww1_russia.2.a:0 "Gut"
 ww1_russia.3.t:0 "Unterstütze Serbien"
 ww1_russia.3.d:0 "Da Franz Ferdinand tot ist, müssen wir schnell handeln, bevor Österreich etwas unternimmt, und die Unabhängigkeit Serbiens garantieren, um das Land zu schützen, sollte Österreich eine Kriegserklärung in Erwägung ziehen."
 ww1_russia.3.a:0 "Wir werden nicht zulassen, dass Serbien zum Opfer wird!"
 ww1_russia.4.t:0 "Petrograder Verteidigung"
 ww1_russia.4.d:0 "Zum Schutz der Hauptstadt wäre es ratsam, mehrere Marine-/Küstenfestungen zu bauen, falls die Hauptstadt von einer feindlichen Marine bedroht wird."
 ww1_russia.4.a:0 "Gut"
 ww1_russia.5.t:0 "Westliche Investitionen"
 ww1_russia.5.d:0 "Aus dem Westen sind zahlreiche Industrieinvestitionen geflossen, die während der jüngsten, einigermaßen erfolgreichen Industrialisierungsphase gefördert wurden."
 ww1_russia.5.a:0 "Großartig"
 ww1_russia.6.t:0 "Bau der Transsibirischen Eisenbahn"
 ww1_russia.6.d:0 "Die Transsibirische Eisenbahn wird nach ihrer Fertigstellung Moskau mit dem Fernen Osten (Wladiwostok) verbinden. Bislang ist sie seit etwa zwei Jahrzehnten im Bau. Nach ihrer Fertigstellung werden wir in der Lage sein, an mehr Handelsmöglichkeiten im Fernen Osten teilzunehmen und so unsere wirtschaftlichen Möglichkeiten zu verbessern."
 ww1_russia.6.a:0 "Lass uns das beenden"
 ww1_russia.7.t:0 "Transsibirische Eisenbahn fertiggestellt"
 ww1_russia.7.d:0 "Die Transsibirische Eisenbahn wird nach ihrer Fertigstellung Moskau mit dem Fernen Osten (Wladiwostok) verbinden. Bislang ist sie seit etwa zwei Jahrzehnten im Bau. Nach ihrer Fertigstellung werden wir in der Lage sein, an mehr Handelsmöglichkeiten im Fernen Osten teilzunehmen und so unsere wirtschaftlichen Möglichkeiten zu verbessern."
 ww1_russia.7.a:0 "Hurra!"
 ww1_russia.8.t:0 "Kriegsvorbereitungen"
 ww1_russia.8.d:0 "Die Lunte, die zum Pulverfass führt, ist angezündet. Es ist nur eine Frage der Zeit, bis der Krieg ausbricht, und wir müssen uns auf das vorbereiten, was daraus werden kann, egal, ob es gut oder schlecht ist."
 ww1_russia.8.a:0 "OK"
 ww1_russia.9.t:0 "Besetzen Sie Nordpersien"
 ww1_russia.9.d:0 "Da uns das vorherige englisch-russische Abkommen den uneingeschränkten Einfluss auf Nordpersien zusagte, haben wir uns aus Sicherheitsgründen dazu entschlossen, das Gebiet zu besetzen, da uns das Osmanische Reich nun feindlich gesinnt ist."
 ww1_russia.9.a:0 "In Ordnung"
 ww1_russia.10.t:0 "Frontlinienfokus I"
 ww1_russia.10.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu legen, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_russia.10.a:0 "Klingt gut"
 ww1_russia.11.t:0 "Frontline Focus II"
 ww1_russia.11.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu legen, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_russia.11.a:0 "Klingt gut"
 ww1_russia.12.t:0 "Frontlinienfokus III"
 ww1_russia.12.d:0 "Um diesen Krieg so schnell wie möglich zu beenden, haben wir beschlossen, unseren Fokus voll und ganz auf die Frontlinie zu legen, um uns einen Vorteil gegenüber unseren Feinden zu verschaffen. Dies bedeutet allerdings, dass wir die Heimatfront etwas vernachlässigen, was später zu Problemen führen kann."
 ww1_russia.12.a:0 "Klingt gut"
 ww1_russia.13.t:0 "Beginn der Brusilow-Offensive"
 ww1_russia.13.d:0 "Nachdem die Städte Lviv und Kovel im Vorjahr an die Mittelmächte verloren gegangen waren, genehmigte Zar Nikolaus, der zuvor persönlich das Kommando über die Armee übernommen hatte, einen von Alexei Brusilov ausgearbeiteten Angriffsplan."
 ww1_russia.13.a:0 "Wir werden sie zurückdrängen!"
 ww1_russia.14.t:0 "Expeditionstruppen nach Frankreich"
 ww1_russia.14.d:0 "Unser Verbündeter Frankreich hat darum gebeten, dass russische Truppen an die Seite seiner eigenen Armee an der Westfront geschickt werden, während einige sich gegen die Entsendung von Truppen aussprachen, obwohl der Zar die Entsendung mehrerer Einheiten genehmigt hatte."
 ww1_russia.14.a:0 "Hoffentlich können sie das nutzen"
 ww1_russia.15.t:0 "Militärhilfe I"
 ww1_russia.15.d:0 "Aufgrund unserer geringen Vorkriegsbestände waren wir nicht in der Lage, genügend Waffen für die Gesamtzahl unserer Soldaten zu produzieren. Glücklicherweise konnten uns unsere Verbündeten jedoch auch begrenzte Waffen schicken und uns so vielleicht zumindest in gewisser Weise helfen."
 ww1_russia.15.a:0 "Danke"
 ww1_russia.16.t:0 "Militärhilfe II"
 ww1_russia.16.d:0 "Aufgrund unserer geringen Vorkriegsbestände waren wir nicht in der Lage, genügend Waffen für die Gesamtzahl unserer Soldaten zu produzieren. Glücklicherweise konnten uns unsere Verbündeten jedoch auch begrenzte Mengen an Waffen schicken und uns so vielleicht zumindest in gewisser Weise helfen."
 ww1_russia.16.a:0 "Danke"
 ww1_russia.17.t:0 "Mongolischer Pufferstaat"
 ww1_russia.17.d:0 "Durch die Xinhai-Revolution in China hatten wir die Möglichkeit, einige Gebiete zu erobern und einen quasi-unabhängigen Pufferstaat zu errichten, nämlich die Mongolei."
 ww1_russia.17.a:0 "Gut"
 ww1_russia.18.t:0 "Russische Dominanz in Asien"
 ww1_russia.18.d:0 "Wenn wir die Xinhai-Revolution noch stärker ausnutzen, können wir in Zukunft vielleicht sogar noch größere Forderungen stellen und nach Japan unsere eigene Vorherrschaft in Asien etablieren."
 ww1_russia.18.a:0 "Klingt gut"
 ww1_russia.19.t:0 "Besetzung der Mandschurei"
 ww1_russia.19.d:0 "Wir haben uns aus der Xinhai-Revolution einen größeren Vorteil verschafft als die Errichtung eines quasi-unabhängigen mongolischen Pufferstaates und beschlossen, die gesamte Mandschurei zu besetzen. Natürlich wird dies Japan höchstwahrscheinlich sehr verärgern."
 ww1_russia.19.a:0 "Gut, aber schlecht"
 ww1_russia.20.t:0 "Unterdrücke Revolutionäre"
 ww1_russia.20.d:0 "Seit der Revolution von 1905 stellen Revolutionäre in Russland eine große Bedrohung für unsere autokratische Regierung dar und müssen daher unterdrückt werden, um die Stabilität im Land zu wahren."
 ww1_russia.20.a:0 "Es muss getan werden"
 ww1_russia.21.t:0 "Russifizierung fortsetzen"
 ww1_russia.21.d:0 "In unserem Bemühen, die russische Kultur unter unserer nichtrussischen Bevölkerung zu etablieren, haben wir Maßnahmen ergriffen, um katholische Kirchen zu zerstören und zu versuchen, der Jugend durch Bildung Fremdsprachen beizubringen."
 ww1_russia.21.a:0 "Gut"
 ww1_russia.22.t:0 "St. Petersburg umbenannt"
 ww1_russia.22.d:0 "Als Folge des Kriegsausbruchs zwischen unserem Land und Deutschland hat die kaiserliche Regierung Maßnahmen ergriffen, um die Stadt St. Petersburg in Petrograd umzubenennen und die deutschen Wörter „Sankt“ und „Burg“ zu entfernen."
 ww1_russia.22.a:0 "Ich bin nicht sicher, was das bringen soll ..."
 ww1_russia.23.t:0 "Verteidigt unsere slawischen Brüder"
 ww1_russia.23.d:0 "Um unsere slawischen Brüder auf dem Balkan vor der österreichisch-ungarischen Aggression zu schützen, haben wir beschlossen, die Unabhängigkeit Serbiens und Montenegros zu garantieren, die derzeit einer ständigen Bedrohung durch die österreichischen Ambitionen auf dem Balkan ausgesetzt sind."
 ww1_russia.23.a:0 "Wir werden unsere Brüder verteidigen"
 ww1_russia.24.t:0 "Februarrevolution"
 ww1_russia.24.d:0 "Die Februarrevolution brach in Petrograd aus, nachdem lange Zeit Unzufriedenheit mit der Monarchie herrschte und am 8. März Massenproteste gegen die Lebensmittelrationierung ausbrachen. Die revolutionären Aktivitäten beschränkten sich weitgehend auf die Hauptstadt und ihre Umgebung und dauerten etwa acht Tage. Es kam zu Massendemonstrationen und bewaffneten Auseinandersetzungen mit Polizei und Gendarmen, den letzten zaristischen Kräften der russischen Monarchie. Am 12. März schließlich stellten sich meuternde russische Armeetruppen auf die Seite der Revolutionäre, die die Monarchie in Gefahr brachten."
 ww1_russia.24.a:0 "Das ist nicht gut..."
 ww1_russia.25.t:0 "Zar Nikolaus II. dankt ab"
 ww1_russia.25.d:0 "Nach dem Ende der Februarrevolution beschloss Nikolaus II., auf den Thron zu verzichten. Zunächst dankte er zugunsten seines Sohnes Alexi ab, machte jedoch wenige Stunden später einen Rückzieher, nachdem er erfahren hatte, dass der Zarewitsch ohne seine Eltern, die ins Exil geschickt werden sollten, nicht lange leben würde. Nikolaus dankte daher im Namen seines Sohnes ab und verfasste ein neues Manifest, in dem er seinen Bruder, Großfürst Michael, zum nächsten Kaiser ganz Russlands ernannte. Dieser hatte die Thronbesteigung abgelehnt und damit die drei Jahrhunderte lange Herrschaft der Romanows beendet."
 ww1_russia.25.a:0 "Das Ende der Autokratie!"
 ww1_russia.26.t:0 "Gründung der Polnischen Legion"
 ww1_russia.26.d:0 "Um die Polen im gleichen Maße zu beschwichtigen wie die Mittelmächte, haben wir beschlossen, innerhalb der Armee eine separate polnische Legion zu gründen, die in St. Petersburg stationiert werden soll."
 ww1_russia.26.a:0 "Gut"
 ww1_russia.27.t:0 "Nicholas übernimmt das Kommando über die Armee"
 ww1_russia.27.d:0 "Der Zar hat kürzlich die Rolle des Oberbefehlshabers übernommen, nachdem er seinen Cousin Nikolai Nikolajewitsch entlassen hatte. Aus diesem Grund wird er sich von seinem abgelegenen Hauptquartier in Mogilew fernhalten und nicht an der Führung des Reiches beteiligt sein. Dieser Schritt hat weitgehend symbolischen Charakter, da alle wichtigen militärischen Entscheidungen von seinem Stabschef getroffen werden."
 ww1_russia.27.a:0 "In Ordnung"
 ww1_russia.28.t:0 "Heimatfront-Fokus I"
 ww1_russia.28.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_russia.28.a:0 "Klingt gut"
 ww1_russia.29.t:0 "Fokus Heimatfront II"
 ww1_russia.29.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_russia.29.a:0 "Klingt gut"
 ww1_russia.30.t:0 "Fokus Heimatfront III"
 ww1_russia.30.d:0 "Wir haben uns entschieden, uns auf unsere Heimatfront zu konzentrieren. Obwohl wir uns weiterhin stark auf die Frontlinie selbst konzentrieren, werden wir die Heimatfront nicht völlig vernachlässigen und weiterhin großen Wert darauf legen, die Lage zu Hause stabil zu halten."
 ww1_russia.30.a:0 "Klingt gut"
 ww1_russia.31.t:0 "Fürst Lwow tritt zurück"
 ww1_russia.31.d:0 "Der Chef der russischen provisorischen Regierung, Fürst Lwow, ist heute bedauerlicherweise zurückgetreten, da es ihm nicht gelungen war, genügend Unterstützung in der Bevölkerung zu gewinnen. Sein Rücktritt erfolgte zugunsten seines Kriegsministers Alexander Kerenski, der nun das neue Oberhaupt der provisorischen Regierung ist."
 ww1_russia.31.a:0 "In Ordnung"
 ww1_russia.32.t:0 "Die Julitage"
 ww1_russia.32.d:0 "Am 16. Juli demonstrierten Soldaten, Matrosen und Industriearbeiter in Petrograd spontan und bewaffnet gegen die russische Provisorische Regierung. Im Vergleich zu den Demonstrationen der Februarrevolution war die Stimmung unter den Demonstranten noch wütender und düsterer. Die Provisorische Regierung machte die Bolschewiki für die Gewalt verantwortlich. Bei einem anschließenden brutalen Vorgehen gegen die Bolschewistische Partei wurde diese aufgelöst und viele ihrer Führungsmitglieder verhaftet. Wladimir Lenin soll nach Finnland geflohen sein, auch Leo Trotzki wurde verhaftet."
 ww1_russia.32.a:0 "Gehen Sie hart gegen diese kommunistischen Bastarde vor!"
 ww1_russia.33.t:0 "Kornilow-Affäre"
 ww1_russia.33.d:0 "Lawr Kornilow war zuvor aufgefordert worden, Truppen der provisorischen Regierung nach Petrograd zu verlegen, um der Bedrohung durch die radikale Petrograder Garnison unter sowjetischer Kontrolle entgegenzuwirken. Daraufhin marschierte Kornilow nach Petrograd, angeblich um die provisorische Regierung von revolutionären Elementen zu „säubern“, die möglicherweise eine Militärdiktatur errichten wollten. Kerensy begegnete Kornilow mit der Bewaffnung der bolschewistisch beeinflussten Sowjets, darunter Leo Trotzkis Roten Garden. Kornilows Armee konnte daraufhin nicht in Petrograd einmarschieren, und er und seine engsten Berater wurden inhaftiert, was die dauerhafte Bewaffnung und Machtergreifung der Bolschewiki zur Folge hatte."
 ww1_russia.33.a:0 "Gut und schlecht ... sehr schlecht"
 ww1_russia.34.t:0 "Oktoberrevolution"
 ww1_russia.34.d:0 "Als die Kornilow-Affäre die Schwäche der Provisorischen Regierung offenlegte, gewannen die Bolschewiki stark an Popularität, während Kerenskis Regierung an Popularität verlor. Darüber hinaus errangen die Bolschewiki erst kürzlich die Mehrheit im Petrograder Sowjet. Wladimir Lenin, der sich noch immer in Finnland versteckt hielt, erkannte darin eine riesige Chance und verkleidete sich als alter Trunkenbold mit Zahnschmerzen, reiste unbemerkt nach Petrograd und versteckte sich im Smolny-Institut. In der Dunkelheit der Nacht begannen bolschewistische Truppen, strategische Gebiete in Petrograd zu besetzen, ohne dass dabei Schüsse abgefeuert wurden. Am Morgen ist die Provisorische Regierung im Winterpalast vollständig umzingelt und Kerenski flieht. \n\n Nur einen Tag später wird der Winterpalast von den Junkers besetzt und die verbliebenen Minister der Provisorischen Regierung werden gestürmt, alle Minister verhaftet und in der Peter-und-Paul-Festung eingesperrt."
 ww1_russia.34.a:0 "Ruhm den Helden!"
 ww1_russia.35.t:0 "Wahlen zur verfassunggebenden Versammlung"
 ww1_russia.35.d:0 "Die Wahlen zur verfassunggebenden Versammlung ergaben folgende Ergebnisse: Die Sozialrevolutionäre Partei (die in einer Koalition mit den Bolschewiki steht) erhielt mit 40,4 % der Stimmen die deutliche Mehrheit. Die Bolschewiki hingegen landeten mit nur 24,0 % der Stimmen auf dem zweiten Platz. Die Partei der Konstituierenden Demokraten, auch bekannt als die Kadetten, erhielt nur 4,7 % der Stimmen. Die Menschewiki landeten mit 2,6 % der Stimmen auf dem letzten Platz, zusammen mit 18,40 % der Stimmen verschiedener anderer Minderheitsparteien."
 ww1_russia.35.a:0 "In Ordnung"
 ww1_russia.36.t:0 "Konstituierende Versammlung aufgelöst"
 ww1_russia.36.d:0 "Die heutige Sitzung der Konstituierenden Versammlung mit den Bolschewiki am 5. Januar 1918 war der erste und einzige Sitzungstag, an dem die Konstituierende Versammlung in Konflikt mit den Sowjets geriet, die sowjetische Dekrete zu Frieden und Land ablehnten, was letztendlich zur gewaltsamen Auflösung der Konstituierenden Versammlung auf Anordnung des Sowjetkongresses führte."
 ww1_russia.36.a:0 "Es muss getan werden"
 ww1_russia.37.t:0 "Rückkehr Lenins"
 ww1_russia.37.d:0 "Der Führer der Bolschewiki, Wladimir Lenin, der zuvor sein Leben außerhalb der Grenzen Russlands im Exil verbracht hatte, ist mit Hilfe der deutschen Regierung aus der Schweiz zurückgekehrt. Die deutsche Regierung ermöglichte ihm die Zugreise über Deutschland und Finnland nach Petrograd."
 ww1_russia.37.a:0 "Hoffen wir, dass er keinen Ärger macht"
 ww1_russia.38.t:0 "April Thesen"
 ww1_russia.38.d:0 "Nach seiner Rückkehr aus dem Exil nach Petrograd erließ Wladimir Lenin zehn Direktiven. Die Thesen richteten sich vor allem an seine russischen Mitbolschewisten und an diejenigen, die aus dem Exil nach Russland zurückkehrten. Unter dem Motto „Alle Macht den Sowjets“ rief er zur Machtübernahme durch die Sowjets auf, verurteilte Liberale und Sozialrevolutionäre in der Provisorischen Regierung und forderte die Bolschewiki auf, die Zusammenarbeit mit der Provisorischen Regierung zu verweigern und stattdessen eine neue kommunistische Politik zu fordern."
 ww1_russia.38.a:0 "Es stehen uns harte Zeiten bevor ..."
 ww1_russia.39.t:0 "Die Miljukow-Note"
 ww1_russia.39.d:0 "Nach dem Vorfall mit der Miljukow-Note nahm die Unterstützung für die Bolschewiki schlagartig zu, während das Misstrauen gegenüber der russischen Provisorischen Regierung allgemein zunahm. Die Bolschewiki, die schon seit einiger Zeit glaubten, die Provisorische Regierung würde den Krieg auf dieselbe Weise fortsetzen wie die zaristische Regierung, hatten dafür kaum Beweise und warteten auf den richtigen Zeitpunkt, um Maßnahmen zu ergreifen und das Misstrauen gegenüber der Provisorischen Regierung zu schüren. Außenminister Pawel Miljukow sandte den Alliierten ein Telegramm, das sich als schädlich erweisen sollte. Es enthielt die Aussage, die Provisorische Regierung würde den Krieg im Sinne der zaristischen Kriegsziele fortsetzen. \n\n Das Telegramm wurde den Bolschewiki von einem Insider zugespielt und es kam zu Protesten gegen die Provisorische Regierung, die dem Volk versprochen hatte, der Terror des Zarismus sei beendet."
 ww1_russia.39.a:0 "Verdammt!"
 ww1_russia.40.t:0 "Dreihundertjähriges Jubiläum der Romanows"
 ww1_russia.40.d:0 "Heute, am 1. März 1913, feiern wir das 300. Jahr der Machtübernahme der Romanow-Dynastie mit einer landesweiten Feier zu Ehren der herrschenden Romanow-Dynastie. Nach einer großartigen Zurschaustellung von Reichtum und Macht in St. Petersburg und einer Woche voller Empfänge im Winterpalast brach die kaiserliche Familie zu einer Reise auf, die der Route Michails I. Romanows nach seiner Wahl zum König im Jahr 1613 folgte und eine Art Pilgerfahrt zu den Städten des alten Moskaus beinhaltete. \n\n Die Feierlichkeiten wurden als „extravagantes Pompspektakel“ und gewaltige Propagandamaßnahme beschrieben; zu ihren Hauptzielen gehört jedoch, „Ehrfurcht und öffentliche Unterstützung für das Prinzip der Autokratie zu wecken“ sowie die Vergangenheit neu zu interpretieren und „das Epos vom ‚volkstümlichen Zaren‘ neu zu erzählen“. Diese Feierlichkeiten zeigten die „wahre Ergebenheit“ der russischen Bauernmassen für den Zaren."
 ww1_russia.40.a:0 "Ruhm dem Zaren"
 ww1_russia.41.t:0 "Der Eismarsch"
 ww1_russia.41.d:0 "Der Eismarsch, auch bekannt als Erste Kuban-Kampagne, war ein militärischer Rückzug, der von Februar bis Mai 1918 dauerte und einer der entscheidenden Momente des russischen Bürgerkriegs war. Die Freiwilligenarmee wurde von der Roten Armee angegriffen, die aus dem Norden vorrückte und sich von der Stadt Rostow nach Süden in Richtung Kuban zurückzog, wo sie gehofft hatte, die Unterstützung der Donkosaken gegen die bolschewistische Regierung zu gewinnen."
 ww1_russia.41.a:0 "Interessante Zeiten ..."
 ww1_russia.42.t:0 "Russischer Bürgerkrieg"
 ww1_russia.42.d:0 "Ein Aufstand der Tschechoslowakischen Legion brach aus, die Legionäre übernahmen die Kontrolle über Tscheljabinsk, während russische Offiziersorganisationen die Bolschewiki in Petropawlowsk und Omsk stürzten. Die Weißen kontrollieren bereits den größten Teil der Transsibirischen Eisenbahn zwischen Baikalsee und Ural, während die bolschewistische Macht in Sibirien praktisch eliminiert ist. Die Freiwilligenarmee (Weiße) ist jedoch weit verstreut, hat mehrere Anführer und ist nicht zwischen ihren westlichen und östlichen Kriegsschauplätzen verbunden. Um zu gewinnen, müssen die Bolschewiki die Verbindung beider Kriegsschauplätze durch die Einnahme von Zarizyn verhindern."
 ww1_russia.42.a:0 "Tod den Bolschewiki!"
 ww1_russia.42.b:0 "Macht den Sowjets!"
 ww1_russia.43.t:0 "Vertrag von Brest-Litowsk"
 ww1_russia.43.d:0 "Nach mehreren Monaten brutaler Verhandlungen einigten sich unsere Regierungen auf einen endgültigen Vertrag, um weitere Vorstöße deutscher und österreichisch-ungarischer Streitkräfte zu stoppen. Dem Vertrag zufolge werden wir sämtliche Verpflichtungen des kaiserlichen Russlands gegenüber der Triple Entente nicht erfüllen. Im Vertrag werden wir alle baltischen Staaten an Deutschland abtreten, die zu deutschen Vasallenstaaten unter deutschen Fürsten werden sollen, die Unabhängigkeit der Ukraine anerkennen, Weißrussland abtreten und die Oblast Kars im Südkaukasus an die Osmanen abtreten. Die Bedingungen sind mehr als hart, und es wird sogar gesagt, der deutsche Unterhändler sei von der Härte schockiert gewesen."
 ww1_russia.43.a:0 "Wir werden diese Ländereien später zurückbekommen!"
 ww1_russia.44.t:0 "Beginn der Generalmobilmachung"
 ww1_russia.44.d:0 "Angesichts des drohenden Krieges hat die Regierung zur allgemeinen Mobilmachung aufgerufen und Reservedivisionen im ganzen Land einsatzbereit gemacht. Die Soldaten sind zuversichtlich, dass der Krieg zumindest bis Weihnachten vorbei sein wird."
 ww1_russia.44.a:0 "An die Front!"
 ww1_russia.45.t:0 "Finnland erklärt seine Unabhängigkeit"
 ww1_russia.45.d:0 "Die finnische Unabhängigkeitserklärung wurde heute, am 6. Dezember 1917, vom finnischen Parlament angenommen. In der Erklärung wurde Finnland zu einer unabhängigen Nation erklärt und beendete seine Autonomie innerhalb Russlands als Großherzogtum Finnland. Dabei wurde auf einen gleichzeitig dem Landtag vorgelegten Gesetzentwurf verwiesen, der Finnland stattdessen zu einer unabhängigen Republik machen sollte."
 ww1_russia.45.a:0 "Wir werden das nicht durchgehen lassen ..."
 ww1_russia.45.b:0 "Spiele als Finnland"
 ww1_russia.46.t:0 "Der finnische Bürgerkrieg beginnt"
 ww1_russia.46.d:0 "Die finnische Gesellschaft hat in den vergangenen Jahren ein schnelles Bevölkerungswachstum, eine Industrialisierung, Urbanisierung und den Aufstieg einer Arbeiterbewegung erlebt. Zusammen mit dem Zusammenbruch des Russischen Reiches, der in Finnland ein Machtvakuum verursachte, führte dies zu einem Kampf um die Vorherrschaft zwischen der linksgerichteten Arbeiterbewegung im Süden, die in den Industriegebieten lebt, und den Konservativen, die im Norden, in den ländlichsten Regionen, angesiedelt sind."
 ww1_russia.46.a:0 "Tod den Roten!"
 ww1_russia.46.b:0 "Macht den Sowjets"

# WW1 Serbia #
 ww1_serbia.1.t:0 "Die Balkanliga"
 ww1_serbia.1.d:0 "Da die Osmanen durch ihre Niederlage im Italienisch-Türkischen Krieg geschwächt sind und immer noch einen beträchtlichen Teil der Balkanhalbinsel beherrschen, wäre es eine kluge Idee, diese Situation zu unserem Vorteil zu nutzen und ein Bündnis mit den anderen Balkanstaaten gegen die Osmanen zu schließen. Mit diesem Bündnis werden wir die Türken endgültig aus Europa vertreiben können!"
 ww1_serbia.1.a:0 "Es ist an der Zeit, unsere Macht zu zeigen!"
 ww1_serbia.101.t:0 "Der Balkanliga beitreten?"
 ww1_serbia.101.d:0 "Serbien hat eine interessante Idee vorgeschlagen: Die Balkanstaaten sollten sich zusammenschließen und das türkische Joch ein für alle Mal abschütteln!"
 ww1_serbia.101.a:0 "Natürlich! Wir werden der Balkanliga beitreten."
 ww1_serbia.101.b:0 "Aber ich mag meinen Döner ..."
 ww1_serbia.102.t:0 "Was sollen wir mit der Balkanliga machen?"
 ww1_serbia.102.d:0 "Serbien hat die Gründung einer Balkanliga vorgeschlagen, mit ziemlicher Sicherheit, um die Türken aus Europa zu vertreiben. Was sollen wir tun?"
 ww1_serbia.102.a:0 "Senden Sie Token-Hilfe."
 ww1_serbia.102.b:0 "Treten Sie der Liga bei!"
 ww1_serbia.102.c:0 "Nichts."
 ww1_serbia.2.t:0 "Erster Balkankrieg"
 ww1_serbia.2.d:0 "Mit der Gründung des Balkanbundes wären die Osmanen uns allen gegenüber strategisch und zahlenmäßig unterlegen. Mit unseren vereinten Armeen werden wir sie hoffentlich besiegen und alle verbleibenden europäischen Gebiete des Osmanischen Reiches erobern!"
 ww1_serbia.2.a:0 "Gott ist mit uns!"
 ww1_serbia.3.t:0 "Vertrag von London 1913"
 ww1_serbia.3.d:0 "Nach dem Ende des Ersten Balkankrieges und der Niederlage des Osmanischen Reiches versammelten sich die europäischen Großmächte, um die territorialen Regelungen zu klären. Entgegen unseren Plänen drängten die Großmächte, insbesondere Italien und Österreich-Ungarn, jedoch stark auf die Schaffung eines unabhängigen albanischen Staates. Dies zwang uns, unseren Vertrag mit den Bulgaren aufzukündigen und das Gebiet von Vardar-Mazedonien abzutreten. Denn wenn wir Albanien in diesem Krieg nicht zurückbekämen, hätten wir auch nichts bekommen, wenn wir die Vardar-Region abtreten würden."
 ww1_serbia.3.a:0 "Die Karte Europas wird erneut neu gezeichnet."
 ww1_serbia.301.t:0 "Frieden mit den Türken?"
 ww1_serbia.301.d:0 "Die Türken haben die Kontrolle über die meisten, wenn nicht alle ihrer europäischen Besitztümer verloren. Im Idealfall würden wir um Frieden bitten, bevor sie ihre Kräfte sammeln und zurückschlagen."
 ww1_serbia.301.a:0 "Senden Sie das Friedensangebot."
 ww1_serbia.301.b:0 "Es wird ein totaler Sieg oder eine totale Niederlage sein."
 ww1_serbia.301.c:0 "Wir haben 1453 gerächt!"
 ww1_serbia.301.w:0 "Delegieren Sie die Entscheidung an Bulgarien"
 ww1_serbia.301.x:0 "Delegieren Sie die Entscheidung an Griechenland"
 ww1_serbia.301.y:0 "Delegieren Sie die Entscheidung an Montenegro"
 ww1_seriba.301.z:0 "Delegieren Sie die Entscheidung an Rumänien"
 ww1_serbia.302.t:0 "Frieden?"
 ww1_serbia.302.d:0 "Wir wurden aus Europa vertrieben ... Die Serben bieten uns Friedensbedingungen an und wir sollen fast alle unsere europäischen Besitztümer nach ihrem Willen an die Balkanstaaten abtreten."
 ww1_serbia.302.a:0 "So sei es. Der Balkan bringt nichts als Ärger."
 ww1_serbia.302.b:0 "Nein, wir werden die dreckigen Giours zurückdrängen!"

# WW1 Siam #
 ww1_siam.1.t:0 "Tod von Rama V."
 ww1_siam.1.d:0 "König Chulalongkorn ist heute leider im Amphorn Sathan Residential Hall im Dusit-Palast verstorben. Sein Nachfolger wurde sein Sohn Vahiravudh, auch bekannt als Rama VI. Chulalongkorns Leistungen und Erfolge für die Nation, die er so sehr liebte, werden unvergessen bleiben. Wir können nur hoffen, dass unser nächster Herrscher unserem letzten ähnlicher wird."
 ww1_siam.1.a:0 "Ein trauriger Tag für Siam"
 ww1_siam.2.t:0 "Palastaufstand von 1912"
 ww1_siam.2.d:0 "Heute gibt es eine Gruppe von Verschwörern, die mit der Herrschaft des neuen Königs und seiner Bevorzugung des Wild Tiger Corps unzufrieden waren. Etwa sieben Armeeoffiziere beschlossen daraufhin, den König zu stürzen. Später stieg die Zahl der Offiziere auf 91 an. Glücklicherweise wurde Hauptmann Yut Khongyu, der per Losverfahren für die Ermordung des Monarchen ausgewählt worden war, von Schuldgefühlen erfüllt und gestand alle Pläne. Er nannte die Namen der Verschwörer, die daraufhin verhaftet und vor einem Militärgericht verurteilt wurden."
 ww1_siam.2.a:0 "Diese Lektion sollte dem König nicht entgehen ..."

# WW1 Turkey #
 ww1_turkey.1.t:0 "Unser Freund, das Deutsche Reich"
 ww1_turkey.1.d:0 "Bei einem kürzlichen diplomatischen Treffen wurde uns klar, dass wir und das Deutsche Reich weitgehend dieselben Ansichten haben, einschließlich unserer besonderen Abneigung gegenüber Großbritannien, das uns weitgehend als Werkzeug benutzt. Die Deutschen hingegen haben uns angeboten, uns bei der Modernisierung des Militärs zu helfen, und haben in den letzten zehn Jahren beinahe beim Bau der Bagdad-Eisenbahn mitgeholfen."
 ww1_turkey.1.a:0 "So nette Leute"
 ww1_turkey.2.t:0 "Überfall auf das Schwarze Meer"
 ww1_turkey.2.d:0 "Enver Pascha hatte Admiral Souchon zuvor angewiesen, im Schwarzen Meer zu manövrieren und die russische Flotte anzugreifen, sollte sich „eine passende Gelegenheit bieten“. Dieser Befehl wurde nicht über die normale Befehlskette weitergegeben. Souchon handelte heute, indem er sein bevorzugtes Kriegsschiff, die Goeben, die jetzt unter unserer Flagge fährt, und mehrere Zerstörer einsetzte, die das Feuer auf die Küstenbatterien von Sewatopol eröffneten und später mehrere kleine russische Schiffe versenkten. Infolge dieser Aktion hat uns das Russische Reich den Krieg erklärt, und zwischen uns und der Entente herrscht nun Kriegszustand."
 ww1_turkey.2.a:0 "Gott will es"
 ww1_turkey.3.t:0 "Festhalten am Balkan"
 ww1_turkey.3.d:0 "Wir haben beschlossen, unser gesamtes verbleibendes Territorium auf dem Balkan zu behalten, und sollte eine der kleineren Nationen ein Stück unseres Territoriums haben wollen, muss sie dafür kämpfen!"
 ww1_turkey.3.a:0 "Wir werden nicht kampflos gehen ..."
 ww1_turkey.4.t:0 "Abtretung des Balkangebiets"
 ww1_turkey.4.d:0 "Anstatt an unserem Territorium auf dem Balkan festzuhalten und den unvermeidlichen großen Krieg zwischen uns und den Balkanstaaten um ihr Kerngebiet hinauszuzögern, haben wir uns stattdessen dazu entschieden, unser Territorium abzutreten. Dies wird uns schwach aussehen lassen, wir werden jedoch nicht viel mehr als Prestige verlieren."
 ww1_turkey.4.a:0 "Nun ja..."
 ww1_turkey.5.t:0 "Unser Freund, das Zarenreich Bulgarien"
 ww1_turkey.5.d:0 "Wir haben kürzlich Diplomaten nach Sofia, Bulgarien, entsandt, um die Beziehungen zu Bulgarien zu verbessern. Wir hoffen, dass dies der Dominanz und Stärke Serbiens auf dem Balkan entgegenwirken und den Serben eine größere Front bieten wird. Da Bulgarien nun auf unserer Seite ist, müssen wir uns keine Sorgen um eine Bedrohung Konstantinopels machen und können nach dem Fall Serbiens eine direkte Verbindung zu unseren deutschen Verbündeten aufrechterhalten."
 ww1_turkey.5.a:0 "Großartig!"
 ww1_turkey.6.t:0 "Hilfe für Bulgarien"
 ww1_turkey.6.d:0 "Um unsere bulgarischen Verbündeten im Kampf gegen ihre Nachbarn auf dem Balkan zu unterstützen, haben wir beschlossen, ihnen Ausrüstung und Truppen zu schicken, die sie gegen ihre Feinde einsetzen können."
 ww1_turkey.6.a:0 "Hoffentlich schaffen sie es"
 ww1_turkey.7.t:0 "Unser Freund, das Britische Empire"
 ww1_turkey.7.d:0 "Abgesehen davon, dass das Britische Empire uns in gewisser Weise ausgenutzt hat, sind wir zu der Einsicht gelangt, dass jeder Krieg gegen die Briten zum Scheitern verurteilt ist und dass es für uns mehr Vorteile hätte, auf ihrer Seite zu stehen als auf der der Verlierer."
 ww1_turkey.7.a:0 "Besser auf der Gewinnerseite sein"
 ww1_turkey.8.t:0 "Kriegsvorbereitungen"
 ww1_turkey.8.d:0 "Die Lunte, die zum Pulverfass führt, ist angezündet. Es ist nur eine Frage der Zeit, bis der Krieg ausbricht, und wir müssen uns auf das vorbereiten, was daraus werden kann, egal, ob es gut oder schlecht ist."
 ww1_turkey.8.a:0 "OK"
 ww1_turkey.9.t:0 "Beitritt zur Entente"
 ww1_turkey.9.d:0 "Um unsere Freundschaft mit den Briten weiter zu festigen, haben wir beschlossen, der Entente beizutreten."
 ww1_turkey.9.a:0 "Hurra"
 ww1_turkey.10.t:0 "Deutsche Militärmission"
 ww1_turkey.10.d:0 "Die militärischen Beziehungen unserer beiden Länder reichen fast 30 Jahre zurück, und die deutsche Militärmission hat sich als äußerst hilfreich für die Modernisierung unserer Armee erwiesen. Die Deutschen haben uns viel beigebracht und uns gezwungen, unsere Armee zu reformieren, um effizienter arbeiten zu können."
 ww1_turkey.10.a:0 "Wir lernen gerne"
 ww1_turkey.11.t:0 "Kriegsvorbereitungen"
 ww1_turkey.11.d:0 "Die Lunte, die zum Pulverfass führt, ist angezündet. Es ist nur eine Frage der Zeit, bis der Krieg ausbricht, und wir müssen uns auf das vorbereiten, was daraus werden kann, egal, ob es gut oder schlecht ist."
 ww1_turkey.11.a:0 "OK"
 ww1_turkey.12.t:0 "Erklärung des Dschihad"
 ww1_turkey.12.d:0 "Sultan Mehmed V. hat heute offiziell den Dschihad ausgerufen und sagte: „Oh Muslime. Wisst, dass unser Reich sich im Krieg mit den Todfeinden des Islam befindet: den Regierungen Moskaus, Großbritanniens und Frankreichs. Der Befehlshaber der Gläubigen ruft euch zum Dschihad auf.“"
 ww1_turkey.12.a:0 "Der Ruf zum Dschihad ergeht"
 ww1_turkey.13.t:0 "Hilfe für die Senussi"
 ww1_turkey.13.d:0 "In dem Bemühen, unseren ehemaligen Feinden, dem Königreich Italien, das uns riesige Gebiete in Afrika abgenommen hat, Schaden zuzufügen, haben wir uns im Gegenzug dazu entschlossen, deren Feinden, dem Senussi-Orden, zu helfen, der immer noch in einen Guerillakrieg gegen die Italiener in ganz Libyen verwickelt ist."
 ww1_turkey.13.a:0 "Hoffen wir, dass sie uns davon überzeugen können"
 ww1_turkey.14.t:0 "Massive Kriegsanstrengungen"
 ww1_turkey.14.d:0 "Um unsere Kriegsanstrengungen noch weiter zu maximieren, haben wir noch mehr Maßnahmen ergriffen, um den Schwerpunkt der gesamten Produktion auf die Militärproduktion zu verlagern."
 ww1_turkey.14.a:0 "Gut"
 ww1_turkey.15.t:0 "Befestigung der Dardanellen"
 ww1_turkey.15.d:0 "Um Istanbul vor einer möglicherweise größeren Seestreitmacht, insbesondere einer möglichen britischen/französischen Flotte, zu schützen, haben wir beschlossen, die Befestigung der Dardanellen zu verstärken, um unsere Hauptstadt im Falle einer solchen Operation zu schützen."
 ww1_turkey.15.a:0 "An die Arbeit!"
 ww1_turkey.16.t:0 "Festung von Gallipoli"
 ww1_turkey.16.d:0 "Die Gegend um Gallipoli bleibt ein gefährdetes Gebiet, in dem die Alliierten möglicherweise eine Invasion von See aus starten könnten. Zur Vorbereitung könnten wir in der Gegend Befestigungen errichten, um etwaige Angriffsversuche abzuwehren, falls sie stattfinden sollten."
 ww1_turkey.16.a:0 "Klingt gut"
 ww1_turkey.17.t:0 "Deutsche Militärmission geht weiter"
 ww1_turkey.17.d:0 "Wir haben die deutsche Militärmission fortgesetzt, die unserer Armee kontinuierlich geholfen hat. Mehrere deutsche Kommandeure dienen jetzt im osmanischen Militär und General Liman von Sanders hat uns viel über den Kampf gegen unsere Feinde, das Russische Reich, und die Funktionsweise seiner Streitkräfte beigebracht."
 ww1_turkey.17.a:0 "Sie sind hier immer willkommen"
 ww1_turkey.18.t:0 "Verteidigung Bagdads"
 ww1_turkey.18.d:0 "Sollte die Möglichkeit eines Rückzugs an die mesopotamische Front eintreten, beginnen wir mit dem Bau von Verteidigungsanlagen in Bagdad, um die Stadt um jeden Preis zu halten."
 ww1_turkey.18.a:0 "Gut"
 ww1_turkey.19.t:0 "Verteidigung Jerusalems"
 ww1_turkey.19.d:0 "Sollte die Möglichkeit eines Rückzugs an der palästinensischen Front bestehen, beginnen wir mit dem Bau von Verteidigungsanlagen im wichtigen religiösen Zentrum Jerusalems."
 ww1_turkey.19.a:0 "Gut"
 ww1_turkey.20.t:0 "Verteidigung von Damaskus"
 ww1_turkey.20.d:0 "Sollte die Möglichkeit eines größeren Rückzugs aus Jerusalem eintreten, beginnen wir mit dem Bau großer Verteidigungsanlagen in Damaskus, um die Stadt um jeden Preis zu halten und ein Vordringen alliierter Truppen nach Kleinasien zu verhindern."
 ww1_turkey.20.a:0 "Gut"
 ww1_turkey.21.t:0 "Unsere Freunde, das Emirat Jabal Shammar"
 ww1_turkey.21.d:0 "Wir sind dem Emirat Jabal Schammar seit langem freundschaftlich verbunden und teilen viele gemeinsame Interessen und Werte. Es ist seit langem bekannt, dass die Raschid-Dynastie des Emirats Jabal Schammar seit langem mit den Sauds verfeindet ist und umgekehrt. Vielleicht können wir ihnen in Zukunft irgendwie dabei helfen …"
 ww1_turkey.21.a:0 "Freunde für immer"
 ww1_turkey.22.t:0 "Befreunde dich mit Persien"
 ww1_turkey.22.d:0 "Bei einer kürzlichen diplomatischen Mission nach Persien wurde uns klar, dass unsere beiden Nationen gemeinsame Feinde haben, insbesondere Russland und das Vereinigte Königreich, die um ihren Einfluss in Persien kämpfen und ihn wie einen Kuchen aufteilen."
 ww1_turkey.22.a:0 "Tolle Ergebnisse"
 ww1_turkey.23.t:0 "Unser Feind, Persien"
 ww1_turkey.23.d:0 "Persien ist ein relativ schwacher Nachbar, den wir ausnutzen und dem Panturkismus gerecht werden sollten, indem wir zu einem späteren Zeitpunkt die übrigen Türken in Zentralasien vereinen."
 ww1_turkey.23.a:0 "Herrliche Ideen"
 ww1_turkey.24.t:0 "Mission nach Afghanistan"
 ww1_turkey.24.d:0 "Wir haben eine Mission nach Afghanistan geschickt, um ein Bündnis zwischen unseren beiden Nationen zu schmieden. Der Einmarsch in Afghanistan wäre für unsere Kriegsziele von entscheidender Bedeutung, da es zu einer möglichen afghanischen Invasion der britischen Kolonialmacht kommen könnte."
 ww1_turkey.24.a:0 "Hoffen wir einfach, dass sie einverstanden sind"
 ww1_turkey.2401.t:0 "Mission aus der Türkei"
 ww1_turkey.2401.d:0 "Wir haben eine diplomatische Mission aus dem Osmanischen Reich empfangen, die uns davon zu überzeugen versucht, uns auf ihrer Seite dem Krieg anzuschließen. Sie behauptet, dies sei ein wichtiger Dschihad gegen ihre Feinde Großbritanniens und ruft uns als treue Diener Allahs dazu auf, uns diesem Kampf anzuschließen, in den das Kalifat verwickelt ist."
 ww1_turkey.2401.a:0 "Tritt dem Krieg bei"
 ww1_turkey.2401.b:0 "Wir bleiben neutral"
 ww1_turkey.2402.t:0 "Afghanistan tritt in den Krieg ein"
 ww1_turkey.2402.d:0 "Unsere diplomatische Mission in Afghanistan war ein großer Erfolg. Der Emir von Afghanistan hat sich bereit erklärt, sich dem Krieg anzuschließen und in Indien einzumarschieren, was sich als sehr nützliches Ablenkungsmanöver erweisen und den Druck an unserer Front verringern dürfte."
 ww1_turkey.2402.a:0 "Großartig"
 ww1_turkey.2403.t:0 "Afghanistan beansprucht Neutralität"
 ww1_turkey.2403.d:0 "Unsere diplomatische Mission in Afghanistan war leider ein Fehlschlag. Der Emir von Afghanistan behauptet, er werde von den Briten dafür bezahlt, neutral zu bleiben, was seine Haupteinnahmequelle sei. Wenn er weiterhin Geld fließen lassen wolle, habe er keine andere Wahl, als neutral zu bleiben."
 ww1_turkey.2403.a:0 "Verdammt"
 ww1_turkey.25.t:0 "Unterstützung für Jabal Shammar"
 ww1_turkey.25.d:0 "Wir haben Maßnahmen ergriffen und beschlossen, das Emirat Jabal Shammar zu unterstützen, falls es in einen Konflikt mit seinen Nachbarn gerät. Vielleicht können wir ihm in Zukunft dabei helfen, das Emirat Nejd zu zerschlagen."
 ww1_turkey.25.a:0 "Klingt gut"
 ww1_turkey.26.t:0 "Helfen Sie Jabal Shammar, Saud zu besiegen"
 ww1_turkey.26.d:0 "Wir haben uns entschieden, Jabal Shammar in einem Krieg gegen das Emirat Nejd unter Führung des bösen Hauses Saud zu unterstützen. Was unsere militärischen Fähigkeiten angeht, wird Saud mit uns auf der Seite der Raschiden mit Sicherheit wie ein Käfer zerquetscht werden."
 ww1_turkey.26.a:0 "Wir werden Saud wie einen Käfer zerquetschen!"
 ww1_turkey.27.t:0 "Zusammenarbeit mit libyschen Einheimischen"
 ww1_turkey.27.d:0 "Wir haben im jüngsten Krieg zwischen uns und Italien mit der libyschen Bevölkerung zusammengearbeitet, und viele der Einheimischen haben sich unserer Verteidigungsstrategie gegen die vorrückenden italienischen Streitkräfte angeschlossen."
 ww1_turkey.27.a:0 "Wir freuen uns über ihre Unterstützung"
 ww1_turkey.28.t:0 "Unterstützung des Senussi-Ordens"
 ww1_turkey.28.d:0 "Nach unserer Niederlage im italienisch-türkischen Krieg sind wir zwar nach Hause gegangen, aber tief in Libyen versteckt sich noch immer eine große Anzahl bewaffneter Truppen, wo der Senussi-Orden weiterhin gegen die italienischen Streitkräfte operiert. Wir werden sie unterstützen, um dem Königreich Italien mit subversiven Mitteln zu schaden ..."
 ww1_turkey.28.a:0 "Der Kampf wird weitergehen"
 ww1_turkey.29.t:0 "Anti-CUP-Haltung"
 ww1_turkey.29.d:0 "Der CUP führt im gesamten Reich gefährliche Reformen durch und unterzieht das Reich einer Verwestlichung, die nicht toleriert werden sollte. Auch der Sultan hat keine Macht mehr. Das muss sich ändern, wir müssen in die guten alten Zeiten zurückgeführt werden."
 ww1_turkey.29.a:0 "OK"
 ww1_turkey.30.t:0 "Anti-CUP-Putsch"
 ww1_turkey.30.d:0 "Die Jungtürken wurden vor kurzem von den Massen gestürzt, die dem Sultan die Möglichkeit zur absoluten Herrschaft wiedergegeben haben, die ihm die Jungtürken 1908 entzogen hatten."
 ww1_turkey.30.a:0 "Herrlich"
 ww1_turkey.31.t:0 "Abschaffung der Verfassung"
 ww1_turkey.31.d:0 "Wenn wir mit der Säuberung der Überreste der Jungtürken noch einen Schritt weiter gehen, werden wir alle ihre Reformen durchführen."
 ww1_turkey.31.a:0 "Gut"
 #ww1_turkey.32.t:0 ""
 #ww1_turkey.32.d:0 ""
 #ww1_turkey.32.a:0 ""
 ww1_turkey.33.t:0 "Wiederherstellung des Kalifats"
 ww1_turkey.33.d:0 "Wir haben weitere Maßnahmen ergriffen und dem Kalifen seine wahre Macht zurückgegeben, sodass das Kalifat nicht mehr nur eine Galionsfigur ohne wahre Macht ist, sondern zu einem einflussreichen Teil der muslimischen Welt geworden ist."
 ww1_turkey.33.a:0 "Großartig"
 ww1_turkey.34.t:0 "Pro-CUP"
 ww1_turkey.34.d:0 "Das Komitee für Einheit und Fortschritt hat sehr fortschrittliche Ideen für das Empire und Reformpläne, die unserem Land hoffentlich seinen rechtmäßigen Platz an der Sonne zurückgeben und es wieder zu einer Großmacht machen sollen."
 ww1_turkey.34.a:0 "Die Zukunft ist rosig"
 ww1_turkey.35.t:0 "Überfall auf die Hohe Pforte"
 ww1_turkey.35.d:0 "Heute wurde von mehreren Mitgliedern des Komitees für Einheit und Fortschritt (Jungtürken) unter der Führung von Enver Pascha und Tallat Pascha ein Staatsstreich durchgeführt, der überraschend das zentrale Regierungsgebäude des Osmanischen Reiches, die Hohe Pforte, stürmte. Während des Putsches wurde der Marineminister Nazim Pascha ermordet und der Großwesir Kamil Pascha zum Rücktritt gezwungen. \N\N Mit dem Sturz der alten Regierung fiel die neue Regierung in die Hände der Jungtürken, die nun unter der Führung des Triumvirats der „Drei Paschas“, bestehend aus Enver, Tallat und Djemal Pascha, stehen."
 ww1_turkey.35.a:0 "Es wird Veränderungen geben"
 ww1_turkey.36.t:0 "Reformen Teil I"
 ww1_turkey.36.d:0 "Das nun an der Macht befindliche Komitee für Einheit und Fortschritt hat seine Versprechen eingelöst und mit der Durchführung von Reformen innerhalb des Imperiums begonnen, die unser Land hoffentlich wieder groß und würdig genug machen werden, neben den anderen Großmächten zu stehen."
 ww1_turkey.36.a:0 "Gut"
 ww1_turkey.37.t:0 "Reformen Teil II"
 ww1_turkey.37.d:0 "Das nun an der Macht befindliche Komitee für Einheit und Fortschritt hat seine Versprechen eingelöst und mit der Durchführung von Reformen innerhalb des Imperiums begonnen, die unser Land hoffentlich wieder groß und würdig genug machen werden, neben den anderen Großmächten zu stehen."
 ww1_turkey.37.a:0 "Gut"
 ww1_turkey.38.t:0 "Reformen Teil III"
 ww1_turkey.38.d:0 "Das nun an der Macht befindliche Komitee für Einheit und Fortschritt hat seine Versprechen eingelöst und mit der Durchführung von Reformen innerhalb des Imperiums begonnen, die unser Land hoffentlich wieder groß und würdig genug machen werden, neben den anderen Großmächten zu stehen."
 ww1_turkey.38.a:0 "Gut"
 ww1_turkey.39.t:0 "Türkischer Nationalismus"
 ww1_turkey.39.d:0 "Mit der Machtübernahme der Jungtürken hat das Reich offiziell eine nationalistischere Ideologie angenommen und seine Führer, allen voran Enver Pascha, haben die Ideen des Panturkismus gefördert, wodurch mehrere panturkische Bewegungen entstanden sind."
 ww1_turkey.39.a:0 "Großartig"
 ww1_turkey.40.t:0 "Osmanische Identität"
 ww1_turkey.40.d:0 "Mit der Machtübernahme des CUP erlebte der Osmanismus, der zuvor inaktiv gewesen war, eine Renaissance. Die Idee förderte die Gleichheit aller Ethnien des Reiches, unabhängig von ihrer Religion, und machte alle Untertanen vor dem Gesetz gleich."
 ww1_turkey.40.a:0 "Vereint als Einheit"
 ww1_turkey.41.t:0 "Armenier im Osmanischen Reich"
 ww1_turkey.41.d:0 "Die Spannungen zwischen Armeniern und Türken haben ein neues Niveau erreicht. Einige Armenier in der Region haben sich aktiv auf die Seite der Russen gestellt, und Enver Pascha hat die „Direktive 8682“ über „verstärkte Sicherheit und Vorsichtsmaßnahmen“ an alle Militäreinheiten herausgegeben, in der er die Entfernung aller in den osmanischen Streitkräften dienenden ethnischen Armenier von ihren Posten und ihre Demobilisierung fordert. "
 ww1_turkey.41.a:0 "Ziemlich drastisch."
 ww1_turkey.42.t:0 "Anglo-Osmanische Konvention von 1913"
 ww1_turkey.42.d:0 "Die Anglo-Osmanische Konvention von 1913 war ein Abkommen zwischen der Hohen Pforte des Osmanischen Reiches und der Regierung des Vereinigten Königreichs, das die Grenzen der osmanischen Gerichtsbarkeit im Persischen Golf in Bezug auf Kuwait, Katar und Bahrain sowie den Schatt al-Arab festlegte. Das Abkommen wurde zwar unterzeichnet, aber nie ratifiziert, prägte aber nachhaltig den Status Kuwaits."
 ww1_turkey.42.a:0 "In Ordnung"
 ww1_turkey.43.t:0 "Erde unter Burdur rumpelt"
 ww1_turkey.43.d:0 "Heute, am 3. Oktober 1914, erschütterte um 00:007 Uhr Ortszeit Burdur ein Erdbeben der Stärke 7 auf der Oberflächenwellenskala und einer maximalen Intensität von 9 auf der Mercalli-Skala. Das Epizentrum des Erdbebens lag in der Nähe des Burdur-Sees im Südwesten Anatoliens. Mehr als 17.000 Häuser wurden zerstört, 2.344 Menschen kamen ums Leben. Fast 100 % der Häuser in Burdur wurden zerstört."
 ww1_turkey.43.a:0 "Wie bedauerlich"
 ww1_turkey.44.t:0 "Armenischer Kongress in Erzurum"
 ww1_turkey.44.d:0 "Der armenische Kongress in Erzurum, der von Ende Juli bis zum 2. August 1914 stattfand, war ein Wendepunkt. Vertreter des Komitees für Einheit und Fortschritt forderten die Armenische Revolutionäre Föderation auf, einen Aufstand der russischen Armenier gegen das zaristische Regime anzuzetteln, um im Falle eines Krieges mit Russland die Eroberung Transkaukasiens zu erleichtern. Die Armenier lehnten es jedoch ab, ihre Landsleute zu einem Aufstand im Russischen Reich zu zwingen."
 ww1_turkey.44.a:0 "Diese Armenier ..."
 ww1_turkey.45.t:0 "1. Zeitun-Widerstand"
 ww1_turkey.45.d:0 "Die armenische Miliz der Hunchaks in der Stadt Zeitun leistete Widerstand und begann am 30. August mit einem bewaffneten Konflikt. Berichten zufolge gibt es dort rund 20.000 bewaffnete armenische Milizionäre. Unsere Truppen sind gerade auf dem Weg dorthin und werden diesen rebellischen Abschaum zerschlagen."
 ww1_turkey.45.a:0 "Rebellischer Abschaum ..."
 ww1_turkey.46.t:0 "2. Zeitun-Widerstand"
 ww1_turkey.46.d:0 "Die armenische Miliz der Hunchaks, die bereits am 30. August rebelliert und niedergeschlagen wurde, ist in der Stadt Zeitun erneut aufgestanden, wird jedoch wie in der Vergangenheit erneut niedergeschlagen werden."
 ww1_turkey.46.a:0 "Sie haben keine Chance"
 ww1_turkey.47.t:0 "Urfa-Widerstand"
 ww1_turkey.47.d:0 "Es gibt Berichte über armenischen Widerstand in Urfa. Die Armenier haben unseren Streitkräften erheblichen Widerstand geleistet, es wird jedoch erwartet, dass sie letztlich niedergeschlagen werden, wie es auch beim Zeitun-Aufstand der Fall war."
 ww1_turkey.47.a:0 "Tod ihnen"
 ww1_turkey.48.t:0 "Tehcir Law"
 ww1_turkey.48.d:0 "Das Tehcir-Gesetz, auch bekannt als Umsiedlungs- und Neuansiedlungsgesetz, wurde heute, am 27. Mai 1915, vom osmanischen Parlament verabschiedet und autorisierte die Deportation der rebellischen und Anne-Franke-artigen Bevölkerung des Reiches."
 ww1_turkey.48.a:0 "Das wird ihnen eine Lektion erteilen!"
 ww1_turkey.49.t:0 "Belagerung von Van"
 ww1_turkey.49.d:0 "Eine Gruppe armenischer Milizen ist heute, am 19. April 1915, aufgestanden und hat die Stadt Van eingenommen. In der Stadt befinden sich rund 2.000 Milizen, die derzeit von unseren Streitkräften belagert werden."
 ww1_turkey.49.a:0 "Sie werden zermalmt werden"
 ww1_turkey.50.t:0 "Vertrag von Daan"
 ww1_turkey.50.d:0 "Heute, am 9. Oktober 1911, wurde in Daan im Vilajet Jemen der Vertrag von Daan von einem Vertreter des Sultans und Imams Yahya Muhammad Hamid ed-Din, dem zaiditischen Imam des Jemen, unterzeichnet. Der Vertrag sollte die Autonomie des Jemen im Osmanischen Reich ausweiten. Dem Vertrag zufolge sollte das Imamat nach der Scharia regiert werden, und der Imam sollte die Befugnis erhalten, Gouverneure und Richter zu ernennen sowie Steuern einzutreiben, während er unter osmanischer Autorität blieb."
 ww1_turkey.50.a:0 "In Ordnung"
 ww1_turkey.51.t:0 "Osmanische Parlamentswahlen 1912"
 ww1_turkey.51.d:0 "Die vorgezogenen Parlamentswahlen fanden im April 1912 statt. Das regierende Komitee für Union und Fortschritt errang beeindruckende 2.269 der 275 Sitze in der Abgeordnetenkammer, während die Oppositionspartei, die Liberale Entente, nur die restlichen sechs Sitze errang."
 ww1_turkey.51.a:0 "Was für ein überwältigender Sieg."
 ww1_turkey.52.t:0 "Staatsstreich von 1912"
 ww1_turkey.52.d:0 "Am 17. Juli 1912 soll es im Land zu einem Militärputsch gegen die kurz zuvor gewählte Regierung des Komitees für Einheit und Fortschritt (CUP) gekommen sein. Der Putsch wurde von einer Gruppe von Offizieren durchgeführt, die sich selbst „Retteroffiziere“ nannten und den militärischen Flügel der Liberalen Entente bildeten, die nach den Wahlen von 1912 zur wichtigsten Oppositionspartei wurde."
 ww1_turkey.52.a:0 "Was für ein politisch instabiles Umfeld"
 ww1_turkey.53.t:0 "Albanischer Aufstand von 1912"
 ww1_turkey.53.d:0 "Heute wurde über einen weiteren albanischen Aufstand in einer Reihe zahlreicher Aufstände in den letzten Jahren berichtet. Dieses Mal offenbar aufgrund von Änderungen für die Albaner, die von den Jungtürken eingeführt wurden. Diese haben Steuererhöhungen und die Wehrpflicht für Albaner zur Folge und sind dazu übergegangen, die albanische Zivilbevölkerung zu entwaffnen."
 ww1_turkey.53.a:0 "Diese verdammten Albaner!"
 ww1_turkey.54.t:0 "Albanischer Aufstand von 1910"
 ww1_turkey.54.d:0 "In Albanien kam es heute zu einem Aufstand als Reaktion auf die neue Zentralisierungspolitik der jungtürkischen osmanischen Regierung. Die Rebellen wurden angeblich vom Königreich Serbien unterstützt. Nach der Tötung eines osmanischen Kommandanten, der Blockade der Eisenbahnlinie durch Aufständische und albanischen Angriffen auf Osmanen in Pristine und Ferizovik wurde das Kriegsrecht ausgerufen."
 ww1_turkey.54.a:0 "Wie unhöflich"
 ww1_turkey.55.t:0 "Albanischer Aufstand von 1911"
 ww1_turkey.55.d:0 "In Albanien kam es dieses Jahr zu einem weiteren Aufstand, der heute, am 24. März 1911, begann. Es wird gesagt, dass das Königreich Montenegro den Aufstand unterstützt hat, indem das Hauptquartier der Rebellen in Montenegro stationiert war und Montenegro die Aufständischen mit Waffen versorgte. Es wird auch gesagt, dass der König von Montenegro versprochen hat, sie mit Waffen zu unterstützen und ihren Familien Unterschlupf zu gewähren. Währenddessen beteuerte er, er verhalte sich „strengster Neutralität“, obwohl er eindeutig in den Aufstand verwickelt war! \n\n Es ist wahrscheinlich, dass König Nikolas Strategie darin besteht, Unruhen in Nordalbanien zu schüren, um einzugreifen und weiteres Gebiet für Montenegro zu annektieren."
 ww1_turkey.55.a:0 "Sie sollen bezahlen"
 ww1_turkey.56.t:0 "Karak-Aufstand"
 ww1_turkey.56.d:0 "Der Karak-Aufstand war ein Aufstand gegen die osmanische Herrschaft in der transjordanischen Stadt Al-Karak, der am 4. Dezember 1910 ausbrach. Der Aufstand brach aus, nachdem Sami Pascha, der Gouverneur von Damaskus, die Einwohner von Al-Karak mit denselben Maßnahmen wie Wehrpflicht, Besteuerung und Entwaffnung belegen wollte, die zuvor den Hauran-Drusenaufstand ausgelöst hatten. Glücklicherweise wurde der Aufstand nach einem willkürlichen Massaker und der Hinrichtung von zehn Anführern des Aufstands brutal niedergeschlagen, obwohl er die Karakis zutiefst verärgerte."
 ww1_turkey.56.a:0 "Verdammt"
 ww1_turkey.57.t:0 "Unabhängigkeit Montenegros verkündet"
 ww1_turkey.57.d:0 "Heute, am 28. August 1910, während der Jubiläumsfeierlichkeiten von Prinz Nikolaus, nahm Prinz Nikolaus gemäß einer Petition der Skupstina den Königstitel an, mit der Montenegro offiziell und endgültig als unabhängige Einheit vom Osmanischen Reich getrennt wurde."
 ww1_turkey.57.a:0 "Verdammt!"
 ww1_turkey.58.t:0 "Vertrag von Mudros unterzeichnet"
 ww1_turkey.58.d:0 "Da sich der Krieg gegen die Mittelmächte wendet und unsere Truppen größtenteils in Lumpen und demoralisiert sind und sich täglich weiter zurückziehen, hatten wir keine andere Wahl, als einen Waffenstillstand mit der Entente zu unterzeichnen. Der Waffenstillstand wurde heute vom Marineminister Rauf Bey und dem britischen Admiral Somerset Arthur Gough-Calthorpe an Bord der HMS Agamemnon im Hafen von Moudros auf der griechischen Insel Lembnos unterzeichnet. Zu den verschiedenen Bedingungen gehörten die Aufgabe der verbliebenen Garnisonen außerhalb Anatoliens und die Einräumung des Rechts der Entente, Festungen zu besetzen, die die Meerenge der Dardanellen und den Bosporus kontrollieren; sowie das Recht, im Falle von Unruhen jedes osmanische Gebiet zu besetzen, falls die Sicherheit der Entente bedroht sein sollte. Wir mussten die Luftwaffe und das Heer zwangsweise demobilisieren und alle Häfen, Eisenbahnlinien und sonstigen strategischen Punkte den Alliierten zur Verfügung stellen."
 ww1_turkey.58.a:0 "Wir sind kaputt!"
 ww1_turkey.58.b:0 "Wir müssen den Kampf fortsetzen"
 ww1_turkey.59.t:0 "Vertrag von Mudros unterzeichnet"
 ww1_turkey.59.d:0 "Da sich der Krieg gegen die Mittelmächte wendet und unsere Truppen größtenteils in Lumpen und demoralisiert sind und sich täglich weiter zurückziehen, hatten wir keine andere Wahl, als einen Waffenstillstand mit der Entente zu unterzeichnen. Der Waffenstillstand wurde heute vom Marineminister Rauf Bey und dem britischen Admiral Somerset Arthur Gough-Calthorpe an Bord der HMS Agamemnon im Hafen von Moudros auf der griechischen Insel Lembnos unterzeichnet. Zu den verschiedenen Bedingungen gehörten die Aufgabe der verbleibenden Garnisonen außerhalb Anatoliens und die Einräumung des Rechts der Entente, Festungen zu besetzen, die die Meerenge der Dardanellen und den Bosporus kontrollieren; sowie das Recht, im Falle von Unruhen jedes osmanische Gebiet zu besetzen, falls die Sicherheit der Entente bedroht ist. Wir mussten die Luftwaffe und das Heer zwangsweise demobilisieren und alle Häfen, Eisenbahnen und sonstigen strategischen Punkte den Alliierten zur Verfügung stellen."
 ww1_turkey.59.a:0 "Wir sind kaputt!"
 ww1_turkey.60.t:0 "Mehmed V stirbt"
 ww1_turkey.60.d:0 "Sultan Mehmed V. verstarb heute, am 3. Juli 1918, im Alter von 73 Jahren. Seit der erzwungenen Abdankung seines Bruders Abdulhamid II. durch die Jungtürkische Revolution 1908 hatte Mehmed V. während seiner Herrschaft keine wirkliche Macht, sondern war vor allem eine Galionsfigur. Seine wichtigste politische Handlung war die Erklärung des Dschihad gegen die Entente-Mächte am 14. November 1914, nachdem das Osmanische Reich beschlossen hatte, auf Seiten der Mittelmächte in den Krieg einzutreten. Dennoch wird er betrauert."
 ww1_turkey.60.a:0 "Ein tragischer Verlust für die Nation"
 ww1_turkey.61.t:0 "Vertrag von Sèvres „unterzeichnet“" #TODO

 ww1_turkey.71.t:0 "Explosion in der Haidar Pasha Station"
 ww1_turkey.71.d:0 "Konstantinopels wichtigster Bahnhof in Haidar Pascha am Bosporus wurde von einer gewaltigen Explosion erschüttert, die entweder durch den hastigen Umgang mit Munition oder durch die Bemühungen britischer Agenten verursacht wurde. Bemerkenswerterweise gingen in dem Inferno beträchtliche Mengen Munition und Öl verloren, was die Kriegsanstrengungen erheblich beeinträchtigte."
 ww1_turkey.71.a:0 "Eine Katastrophe für die osmanischen Kriegsanstrengungen"

# WW1 Ukraine #
 ww1_ukraine.1.t:0 "Die ukrainische Republik verliert ihre Macht"
 ww1_ukraine.1.d:0 "Am 28. April, nach der Auflösung des Zentralrats der Ukrainischen Volksrepublik, wurde die Ukraine in eine provisorische Diktatur unter dem Führer Pawlo Skoropadski verwandelt, der den Titel „Hetman der Ukraine“ für sich beanspruchte, weshalb die Ukraine als Ukrainisches Hetmanat, Ukrainischer Staat, bezeichnet werden konnte. Der Putsch war vom Deutschen Reich selbst gebilligt und genehmigt worden, das mit der Unfähigkeit der republikanischen Regierung unzufrieden war, die versprochenen und dringend benötigten Getreidelieferungen an die hungernde deutsche Armee zu liefern. Skoropadski wurde noch am selben Tag von der Kirche christlich geweiht und zum Hetman der Ukraine ernannt. Viele ukrainische Nationalisten warfen Skoropadski vor, ein deutscher Kollaborateur zu sein, der von reichen Landbesitzern unterstützt wurde. Er galt als zu prorussisch und diktatorisch. Trotzdem war seine Regierung sehr effizient und organisiert, baute viele Schulen und Universitäten und schloss einen vorübergehenden Frieden mit der UdSSR."
 ww1_ukraine.1.a:0 "Der Hetman wird die wahre Ordnung wiederherstellen"
 ww1_ukraine.2.t:0 "Ukrainisch-Polnischer Krieg"
 ww1_ukraine.2.d:0 "Der Polnisch-Ukrainische Krieg begann am 1. November 1918 und dauerte bis zum 17. Juli des folgenden Jahres wegen der komplizierten Frage Galiziens. Aufgrund der komplizierten Geschichte Galiziens unter langjähriger Herrschaft der Habsburger entwickelte sich im Laufe der Zeit eine nationale Identität der Ukrainer, um den polnischen Autonomieforderungen entgegenzuwirken. Nach der faktischen Auflösung und dem Zusammenbruch der österreichisch-ungarischen Regierung im Oktober 1918 übernahmen zwei Regimenter, größtenteils aus Ukropen bestehend, in dem Bemühen, die westukrainischen Gebiete mit dem ehemaligen österreichisch-ungarischen Reich zu vereinen, die Kontrolle über die Stadt Lwiw und erklärten sie zu ihrer Hauptstadt. Die Polaken, die in der Stadt die Mehrheit gestellt hatten, waren schockiert, in einem ukrainischen Staat zu sein, und schließlich begannen Kämpfe zwischen ukrainischen und polnischen Streitkräften, die sich hauptsächlich um die Stadt Lwiw konzentrierten."
 ww1_ukraine.2.a:0 "Wir werden unser rechtmäßiges Land verteidigen!"
 ww1_ukraine.3.t:0 "Das ukrainische Hetmanat stürzt"
 ww1_ukraine.3.d:0 "Nach der Niederlage der Mittelmächte im Ersten Weltkrieg konnte Skoropadsky nicht länger auf die Unterstützung Deutschlands und Österreichs zählen. Am 13. November 1918 gründeten seine Gegner eine rivalisierende Truppe namens „Direktorium“, deren Streitkräfte von den neu gegründeten Sich-Schützen angeführt wurden. Die meisten von Skoropadskys Truppen schlossen sich dem Direktorium an. Skoropadsky wandte sich an einige russische Offiziere, die an der Seite Denikins kämpften, um eine kleine Truppe zu bilden. Diese war jedoch nicht in der Lage, den Truppen des Direktoriums Paroli zu bieten. Nach der Einnahme Kiews übernahmen die Truppen des Direktoriums offiziell die Macht, stürzten Skoropadskys Regime und gründeten die Ukrainische Volksrepublik neu."
 ww1_ukraine.3.a:0 "Ruhm den Helden!"
 ww1_ukraine.4.t:0 "Akt Zluky"
 ww1_ukraine.4.d:0 "Das Gesetz „Zluky“ war ein Abkommen, das am 22. Januar 1919 von der Ukrainischen Volksrepublik und der Westukrainischen Volksrepublik auf dem Sophienplatz in Kiew unterzeichnet wurde. Ziel war die Schaffung eines vereinten ukrainischen Staates. Das Gesetz „Zluky“ trug jedoch wenig zur Vereinigung der Staaten bei, sondern hatte rein symbolischen Charakter, da beide Regierungen ihre eigenen Armeen, Verwaltungen und Regierungsstrukturen beibehielten. Im Text des Abkommens, das vom Direktorat der Ukrainischen Volksrepublik unterzeichnet wurde, heißt es: „Das über Jahrhunderte geteilte Gebiet der Ukraine, einschließlich Galizien, Bukowina, Karpatenruthenien und der Dnjepr-Ukraine, wird nun zu einer großen, vereinten Ukraine. Träume, für die die besten Söhne der Ukraine kämpften und starben, sind wahr geworden.“ Die Ukraine konnte jedoch letztendlich nie ihre Unabhängigkeit erlangen."
 ww1_ukraine.4.a:0 "Ruhm den Helden!"
 ww1_ukraine.5.t:0 "Die Krim wurde uns übertragen!"
 ww1_ukraine.5.d:0 "Die Deutschen haben beschlossen, uns die Kontrolle über die ehemaligen Gebiete der Sozialistischen Republik Taurida zu überlassen!"
 ww1_ukraine.5.a:0 "Hurra!"
 ww1_ukraine.5.b:0 "Geben Sie den Tataren Autonomie."

# WW1 USA #
 ww1_usa.1.t:0 "Unterstützen Sie Entente"
 ww1_usa.1.d:0 "Obwohl wir weder an diesem europäischen Konflikt teilnehmen noch uns persönlich darin einmischen möchten, ist das Deutsche Reich letztlich ein autokratischer Staat und ein Feind der Demokratie. Daher wäre es besser, die Entente zu unterstützen, die zumindest unsere demokratischen Werte teilt."
 ww1_usa.1.a:0 "OK"
 ww1_usa.2.t:0 "Gründung der Lafayette Escadrille"
 ww1_usa.2.d:0 "Obwohl wir noch immer ein neutrales Land sind, ist es uns gelungen, die französische Regierung vom Wert einer freiwilligen amerikanischen Lufteinheit zu überzeugen, die für Frankreich fliegt. Vielleicht könnte die Anerkennung ihrer Leistungen durch die amerikanische Öffentlichkeit das amerikanische Interesse wecken, die Neutralität aufzugeben und selbst in den Kampf einzugreifen."
 ww1_usa.2.a:0 "Viel Glück den Freiwilligen"
 ww1_usa.3.t:0 "Versand von Materialien I"
 ww1_usa.3.d:0 "Obwohl das amerikanische Volk nicht in den europäischen Krieg verwickelt werden möchte und diplomatisch allein agiert, liegt es nicht in unserem Interesse, dass die Mittelmächte diesen Krieg gewinnen. Obwohl wir uns derzeit nicht selbst am Kampf beteiligen können, könnten wir in Form von Lieferungen, Rohstoffen und Geld einen Beitrag leisten."
 ww1_usa.3.a:0 "Hoffentlich zählt es etwas"
 ww1_usa.4.t:0 "Materialien versenden II"
 ww1_usa.4.d:0 "Obwohl das amerikanische Volk nicht in den europäischen Krieg verwickelt werden möchte und diplomatisch allein agiert, liegt es nicht in unserem Interesse, dass die Mittelmächte diesen Krieg gewinnen. Obwohl wir uns derzeit nicht selbst am Kampf beteiligen können, könnten wir in Form von Lieferungen, Rohstoffen und Geld einen Beitrag leisten."
 ww1_usa.4.a:0 "Hoffentlich zählt es etwas"
 ww1_usa.5.t:0 "Materialien senden III"
 ww1_usa.5.d:0 "Obwohl das amerikanische Volk nicht in den europäischen Krieg verwickelt werden möchte und diplomatisch allein agiert, liegt es nicht in unserem Interesse, dass die Mittelmächte diesen Krieg gewinnen. Obwohl wir uns derzeit nicht selbst am Kampf beteiligen können, könnten wir in Form von Lieferungen, Rohstoffen und Geld einen Beitrag leisten."
 ww1_usa.5.a:0 "Hoffentlich zählt es etwas"
 ww1_usa.6.t:0 "USA verurteilen deutschen uneingeschränkten U-Boot-Krieg"
 ww1_usa.6.d:0 "Die Versenkung amerikanischer Schiffe durch die Deutschen hat bei den US-Bürgern und der Regierung für enorme Empörung gesorgt. Am bekanntesten war der Untergang der Lusitania mit rund 100 US-Bürgern an Bord. Wir haben die Deutschen aufgefordert, den uneingeschränkten U-Boot-Krieg einzustellen, andernfalls könnten wir nicht länger neutral bleiben. Wir warten auf ihre Reaktion."
 ww1_usa.6.a:0 "So oder so wird es aufhören"
 ww1_usa.601.t:0 "USA fordern Einstellung des uneingeschränkten U-Boot-Krieges"
 ww1_usa.601.d:0 "Die Vereinigten Staaten haben unseren uneingeschränkten U-Boot-Krieg verurteilt. Obwohl er ein gutes Mittel gegen den britischen Nordseeblock ist, sollten wir vielleicht damit aufhören, bevor die Vereinigten Staaten selbst in diesen Krieg eingreifen und möglicherweise das Blatt zugunsten unserer Feinde wenden. Natürlich könnten wir den uneingeschränkten U-Boot-Krieg jederzeit fortsetzen, aber die Reaktion der USA ist ungewiss."
 ww1_usa.601.a:0 "Zurück nach unten"
 ww1_usa_601.b:0 "Machen Sie damit weiter"
 ww1_usa.602.t:0 "Deutschland macht einen Rückzieher"
 ww1_usa.602.d:0 "Das Deutsche Reich hat unsere äußerste Missbilligung der Fortsetzung seines uneingeschränkten U-Boot-Krieges zur Kenntnis genommen und uns umgehend mit der Ankündigung geantwortet, dass es damit sofort aufhören werde."
 ww1_usa.602.a:0 "Sieht aus, als wäre der Frieden gewahrt"
 ww1_usa.603.t:0 "Deutschland weigert sich, nachzugeben"
 ww1_usa.603.d:0 "Das Deutsche Reich hat von uns erfahren, dass die Fortsetzung seines uneingeschränkten U-Boot-Krieges aufs äußerste missbilligt wird, und hat umgehend geantwortet, dass es damit fortfahren wird. Wenn wir wollen, dass es damit aufhört, müssen die Briten zuerst die Nordseeblockade aufheben. Natürlich könnten wir angesichts dieser Reaktion immer neutral bleiben, aber das Verantwortungsvollste wäre, gegen das Deutsche Reich vorzugehen!"
 ww1_usa.603.a:0 "Bleiben Sie neutral"
 ww1_usa.603.b:0 "Es ist Zeit, sich zu engagieren"
 ww1_usa.7.t:0 "USA verurteilen Zimmerman-Telegramm"
 ww1_usa.7.d:0 "Die Deutschen haben unser Vertrauen in die USA missbraucht, indem sie kürzlich ein Zimmermann-Telegramm nach Mexiko schickten und dort den Krieg gegen uns forderten! Sie boten uns unser Land an und schlossen einen Friedensvertrag aus, der unser Land spaltet! Solche Aktionen sind absolut inakzeptabel, und es ist erstaunlich, dass wir noch nicht in den Krieg eingetreten sind."
 ww1_usa.7.a:0 "Wir bleiben neutral"
 ww1_usa.7.b:0 "Das war der Tropfen, der das Fass zum Überlaufen brachte!"
 ww1_usa.8.t:0 "USA erklären Deutschland den Krieg"
 ww1_usa.8.d:0 "Zu lange haben wir angesichts der deutschen Aggression gegen unser Land untätig zugesehen! Sie schickten ein Telegramm nach Mexiko, in dem sie UNSER Land anboten, und haben den uneingeschränkten U-Boot-Krieg wieder aufgenommen, obwohl sie versprochen hatten, ihn einzustellen. Das amerikanische Volk wollte zu Beginn dieses Krieges Neutralität, doch durch die jüngsten Aktionen wurden wir selbst in diesen Krieg gezwungen."
 ww1_usa.8.a:0 "Diese Krauts werden ein Stück von uns abbekommen!"
 ww1_usa.9.t:0 "Expeditionstruppe nach Frankreich geschickt"
 ww1_usa.9.d:0 "Die Franzosen und Engländer benötigen an der Westfront dringend frische Truppen, die wir ihnen dankenswerterweise zur Verfügung stellen können, da wir nun über genügend Transportschiffe verfügen. Wir werden jeden Monat rund 100.000 Mann über den Atlantik schicken. Hoffentlich reicht das aus, um das Blatt ein für alle Mal zu wenden."
 ww1_usa.9.a:0 "Wir kommen rüber und wir kommen nicht zurück, bis es da drüben ist"
 ww1_usa.10.t:0 "Neutralität der USA"
 ww1_usa.10.d:0 "Die Vereinigten Staaten haben ihre Neutralität im europäischen Konflikt bereits erklärt. Wir werden jedoch in diesem Krieg in keiner Weise eine der beiden Seiten bevorzugen. Wer auch immer gewinnt, wird gewinnen. Diese Form der europäischen Diplomatie ist es letztlich nicht wert, dass für sie unser Blut vergossen wird oder dass wir unser Geld dafür ausgeben."
 ww1_usa.10.a:0 "Wir bleiben hier"
 ww1_usa.11.t:0 "Isolationismus der USA"
 ww1_usa.11.d:0 "Wir haben uns während des gesamten Konflikts für eine Politik der Nichtintervention entschieden und vermeiden es, in Bündnisse und damit in Kriege hineingezogen zu werden, die nicht mit unserer direkten territorialen Selbstverteidigung in Zusammenhang stehen. Viele Menschen im Land stimmen dieser Politik zu, und deshalb werden wir sie auch weiterhin verfolgen."
 ww1_usa.11.a:0 "OK"
 ww1_usa.12.t:0 "Armee an die mexikanisch-amerikanische Grenze geschickt"
 ww1_usa.12.d:0 "Angesichts der Spannungen in Mexiko im Zuge der aktuellen Revolution und der anhaltenden Kämpfe an der Grenze sind leider mehrere amerikanische Städte Opfer dieser Kämpfe geworden, die sich auf unsere Grenzen ausgeweitet haben. Um diesen Konflikten ein Ende zu setzen oder sie zumindest stark einzuschränken, haben wir beschlossen, die Armee zum Schutz der Grenze zu entsenden, damit es in Zukunft nicht mehr zu solchen Vorfällen kommt."
 ww1_usa.12.a:0 "Wir lassen es nicht überschwappen"
 ww1_usa.13.t:0 "US-Intervention auf Seiten der Maderistas"
 ww1_usa.13.d:0 "Das Regime von Porfirio Diaz ist nicht populär und deshalb haben wir uns entschieden, Francisco Madero zu unterstützen, der die jüngsten Wahlen in Mexiko zu Recht gewonnen hat und in unserem Land Zuflucht gesucht hat. Es ist unwahrscheinlich, dass Porfirio Diaz angesichts der Macht der USA gegen ihn auch nur versuchen wird, an seiner Macht festzuhalten. Letztendlich wird er einknicken und die Macht an Madero abtreten."
 ww1_usa.13.a:0 "Demokratie für alle!"
 ww1_usa.14.t:0 "Hilfe für die Maderistas"
 ww1_usa.14.d:0 "Das Regime von Porfirio Diaz ist nicht beliebt, und wir haben uns kürzlich entschieden, Francisco Madero zu unterstützen, der die letzten Wahlen in Mexiko zwar zu Recht gewonnen hat, aber von Porfirio Diaz, der seine Position behalten will, aus dem Land vertrieben wurde. Hoffentlich wird Madero mit unserer Hilfe letztendlich gewinnen, seine Revolution unterstützen und die Demokratie in Mexiko wiederherstellen!"
 ww1_usa.14.a:0 "Viel Glück für Madero"
 ww1_usa.15.t:0 "Befestigung der mexikanisch-amerikanischen Grenze"
 ww1_usa.15.d:0 "Im Einklang mit unserer Entscheidung, einen Teil der US-Armee an die mexikanisch-amerikanische Grenze zu schicken, um ein Übergreifen der Truppen von mexikanischer Seite zu verhindern, haben wir auch Maßnahmen zur Befestigung der Grenze für den Fall eines Krieges ergriffen, was angesichts der aktuellen Spannungen zwischen unseren beiden Ländern nicht ausgeschlossen ist."
 ww1_usa.15.a:0 "Es ist eine gute Vorsichtsmaßnahme"
 ww1_usa.16.t:0 "Unterstützen Sie die Anti-Huertista-Revolution"
 ww1_usa.16.d:0 "Victoriano Huerta ist kein Freund der Demokratie. Genau wie Porfirio Díaz ist er ein brutaler Diktator, vielleicht sogar noch schlimmer. Unglücklicherweise hatte er zuvor den beliebten Francisco Madero durch List in den Tod gestürzt und die Macht an sich gerissen. Mit Huertas Aufstieg hat sich nun eine neue Allianz zwischen Villistas, Constitutionalistas und Zapatistas gebildet, um Mexiko wieder zu stabilisieren und Victoriano Huerta loszuwerden."
 ww1_usa.16.a:0 "Nieder mit Huerta!"
 ww1_usa.17.t:0 "Rückzug aus Veracruz"
 ww1_usa.17.d:0 "Mit dem Sturz des Huerta-Regimes in Mexiko haben wir zu Recht beschlossen, das zuvor besetzte Gebiet von Veracruz zurückzugeben. Hoffentlich können unsere guten Beziehungen zu Mexiko wiederhergestellt werden."
 ww1_usa.17.a:0 "Los geht&#39;s, Jungs"
 ww1_usa.18.t:0 "Verurteilung von Victoriano Huerta"
 ww1_usa.18.d:0 "Die US-Regierung missbilligt den Aufstieg von Victoriano Huerta in Mexiko zutiefst. Seine Handlungen als brutaler Diktator haben in ganz Mexiko Wellen geschlagen und dazu geführt, dass er den vorherigen Präsidenten Francisco Madero, der rechtmäßig gewählt wurde, zu Fall gebracht hat."
 ww1_usa.18.a:0 "Er kann nicht an der Macht bleiben!"
 ww1_usa.19.t:0 "Versorgen Sie anti-huertistische Revolutionäre"
 ww1_usa.19.d:0 "Um das Huerta-Regime hoffentlich so schnell wie möglich zu stürzen, haben wir Maßnahmen ergriffen, um die Anti-Huertista-Allianz mit militärischer Ausrüstung zu versorgen, in der Hoffnung, ihre Bemühungen zu unterstützen."
 ww1_usa.19.a:0 "Gut"
 ww1_usa.20.t:0 "USA verurteilen Villa"
 ww1_usa.20.d:0 "Der mexikanische Revolutionär Pancho Villa, einst ein guter Verbündeter der USA, ist schnell zu einem Feind der USA geworden. Als Vergeltung für unsere Unterstützung der Constitutionalistas unter Venustiano Carranza, von denen sich Villa nach dem Fall von Huerta faktisch abgespalten hat, hat Villa US-Grenzstädte angegriffen und wird dies wahrscheinlich auch weiterhin tun. Wenn er dies nicht tut, müssen wir so schnell wie möglich Vergeltung üben."
 ww1_usa.20.a:0 "Das ist absurd"
 ww1_usa.21.t:0 "Die Neutralität der USA im Krieg"
 ww1_usa.21.d:0 "Präsident Wilson hat dem amerikanischen Volk versichert, dass die Vereinigten Staaten in diesem neuen europäischen Konflikt neutral bleiben und sich, solange er Präsident ist, aus dem Krieg heraushalten werden. Seine Bemerkung zur Neutralität der USA stieß bei den amerikanischen Bürgern auf Zustimmung, die sich ebenfalls eine Neutralität des Landes wünschen."
 ww1_usa.21.a:0 "Wir werden uns nicht einmischen"
 ww1_usa.22.t:0 "Ausgabe von Liberty-Anleihen"
 ww1_usa.22.d:0 "Um unsere Sache im Krieg zu unterstützen, haben wir Liberty Bonds ausgegeben. Insgesamt 5,5 Millionen Menschen kauften Anleihen und sammelten so rund 2 Milliarden US-Dollar für die Kriegsanstrengungen."
 ww1_usa.22.a:0 "Denken Sie daran, einen Libert Bond zu kaufen!"
 ww1_usa.23.t:0 "Erhöhte Kriegsanstrengungen"
 ww1_usa.23.d:0 "Um unsere Kriegsanstrengungen noch weiter zu maximieren, haben wir noch mehr Maßnahmen ergriffen, um den Schwerpunkt der gesamten Produktion auf die Militärproduktion zu verlagern."
 ww1_usa.23.a:0 "Weiter so"
 ww1_usa.24.t:0 "Allgemeine Wehrpflicht"
 ww1_usa.24.d:0 "Um eine nationale Armee für den Kriegsdienst aufzustellen, hat die Regierung der Vereinigten Staaten den Selective Service Act verabschiedet, nachdem der Präsident erkannt hatte, dass freiwillige Truppen nicht ausreichen würden und das Land für die Teilnahme eine viel größere Armee benötigen würde."
 ww1_usa.24.a:0 "Machen Sie sich bereit, dorthin zu gehen!"
 ww1_usa.25.t:0 "Regierung verurteilt Sowjetrussland"
 ww1_usa.25.d:0 "Die Regierung hat die illegitime Sowjetregierung angeprangert, die kürzlich die rechtmäßige und demokratische russische Übergangsregierung gestürzt hat. Da Russland dank der kommunistischen Machthaber nun faktisch aus dem Krieg ausgeschieden ist, wird Deutschland an der Westfront eine noch größere Machtposition einnehmen."
 ww1_usa.25.a:0 "Kommunistische Bastarde"
 ww1_usa.26.t:0 "US-Aids-Weißrussland"
 ww1_usa.26.d:0 "Mit Beginn des russischen Bürgerkriegs hat die Regierung beschlossen, die legitime Regierung Weißrusslands im Kampf gegen Sowjetrussland zu unterstützen. Wenn alles nach Plan läuft und Weißrussland diesen internen Kampf gewinnt, wird die Demokratie im Land hoffentlich wiederhergestellt, wie sie unter der russischen Provisorischen Regierung sein sollte. Einige unserer Männer wurden ebenfalls entsandt, hauptsächlich jedoch als Garnison, insbesondere in Wladiwostok."
 ww1_usa.26.a:0 "Wir wünschen ihnen viel Glück!"
 ww1_usa.27.t:0 "Die Rote Angst"
 ww1_usa.27.d:0 "Wenn es auf der Welt eine größere Bedrohung für die Demokratie gibt, dann sind es die Bolschewiki, die aktiv eine kommunistische Revolution anzetteln. Und es besteht eine sehr wahrscheinliche und große Gefahr, dass es auch hier in den Vereinigten Staaten zu einer kommunistisch inspirierten Revolution kommen könnte. Aus diesem Grund haben wir begonnen, radikale Organisationen zu unterdrücken, illegale Durchsuchungen und Beschlagnahmungen zuzulassen und ungerechtfertigte Verhaftungen von Personen vorzunehmen, die im Verdacht stehen, Radikale oder Anarchisten zu sein."
 ww1_usa.27.a:0 "Hoffen wir, dass es sich nicht hierher ausbreitet!"
 ww1_usa.28.t:0 "Besetzung von Veracruz"
 ww1_usa.28.d:0 "Da der deutsche Dampfer „SS Ypiranga“ unter Verletzung des von uns verhängten Waffenembargos Waffen und Munition an die Huerta-Regierung liefern wollte und Huerta sich nach der ungerechtfertigten Gefangennahme mehrerer unbewaffneter US-Matrosen weigerte, den 21-Schuss-Salut vor der US-Flagge abzugeben, sah sich der Präsident gezwungen, die Besetzung des Hafens von Veracruz durch das US-Militär anzuordnen. Dieser Schritt war äußerst unpopulär und brachte unsere und die mexikanische Regierung an den Rand eines Krieges."
 ww1_usa.28.a:0 "Zumindest liegt es nicht in den Händen von Huerta"
ww1_usa.28.b:0 "Da halten wir uns lieber raus..."
 ww1_usa.29.t:0 "Woodrow Wilson gewinnt Wahl"
 ww1_usa.29.d:0 "Der demokratische Kandidat Woodrow Wilson hat heute in den gesamten Vereinigten Staaten mit 435 Stimmen einen überwältigenden Sieg errungen. William H. Taft, der zur Wiederwahl antrat, konnte jedoch nur 8 Stimmen auf sich vereinen und wurde damit Dritter nach Thedore Roosevelt, der 88 Stimmen erhielt."
 ww1_usa.29.a:0 "Wir begrüßen den neuen Präsidenten"
 ww1_usa.30.t:0 "Panamakanal fertiggestellt"
 ww1_usa.30.d:0 "Nach zehn langen Jahren des Baus des Panamakanals ist es uns endlich gelungen, die 50 Meilen lange Passage fertigzustellen."
 ww1_usa.30.a:0 "Hurra!"
 ww1_usa.31.t:0 "Gründung der Federal Reserve"
 ww1_usa.31.d:0 "Heute wurde der Federal Reserve Act offiziell in Kraft gesetzt. Der Kongress erließ ein Gesetz zur Gründung des Federal Reserve Systems, auch bekannt als das Zentralbanksystem der USA, und schuf die Befugnis zur Ausgabe von Federal Reserve Notes. Das Gesetz wurde von Präsident Woodrow Wilson offiziell unterzeichnet."
 ww1_usa.31.a:0 "OK"
 ww1_usa.32.t:0 "US-Besatzung Haitis"
 ww1_usa.32.d:0 "Auf Befehl von Präsident Woodrow Wilson sind rund 330 US-Marines in Port-au-Prince, Haiti, gelandet und haben die Kontrolle über das Land übernommen, nachdem der Diktator Vilbrun Guillaume Sam von Aufständischen ermordet worden war, die über seine politischen Hinrichtungen an der Elite der Opposition erzürnt waren. Die USA betrachten den Aufstand gegen Sam als Bedrohung amerikanischer Geschäftsinteressen im Land und veranlassten die Invasion, nachdem Rosalvo Bobo als nächster Präsident, der zunehmend antiamerikanisch eingestellt war, auf den Plan trat."
 ww1_usa.32.a:0 "Es musste getan werden"
 ww1_usa.33.t:0 "Schlacht von Columbus"
 ww1_usa.33.d:0 "Heute kam es in New Mexico zu einem Angriff der Norddivision von Pancho Villa auf die US-Grenzstadt Columbus, der zu einer offenen Schlacht zwischen den Villistas und der US-Armee führte. Obwohl Villa schließlich von Teilen des 13. Kavallerieregiments nach Mexiko zurückgedrängt wurde, konnte er der Stadt dennoch erheblichen Schaden zufügen. Dieser Angriff erzürnte viele US-Bürger und den Präsidenten, der nun möglicherweise zum Handeln gezwungen ist."
 ww1_usa.33.a:0 "Dies wird nicht toleriert!"
 ww1_usa.34.t:0 "Black Tom Explosion"
 ww1_usa.34.d:0 "Am 30. Juli 1916 ereignete sich in Jersey City auf Black Tom Island eine Explosion, bei der zahlreiche amerikanische Munitionsvorräte, die an die Alliierten geliefert werden sollten, zerstört wurden. Die Explosion entsprach einem Erdbeben der Stärke 5,0 bis 5,5 auf der Richterskala und war Berichten zufolge bis nach Philadelphia zu spüren. Fenster gingen in bis zu 40 Kilometern Entfernung zu Bruch. Nach eingehender Untersuchung stellte sich heraus, dass die Explosion keineswegs ein Unfall, sondern das Werk deutscher Agenten war!"
 ww1_usa.34.a:0 "Das ist inakzeptabel"
 ww1_usa.35.t:0 "US-Besatzung der Dominikanischen Republik"
 ww1_usa.35.d:0 "Die US-Regierung reagierte nicht freundlich auf die Machtübernahme des dominikanischen Kriegsministers Desiderio Arias von Juan Isidro. Konteradmiral William B. Caperton befahl Arias den Rücktritt und drohte Santo Domingo mit einem Angriff auf die Insel. Obwohl versucht wurde, der Invasion Widerstand zu leisten, setzten sich unsere Streitkräfte schließlich durch und stellten in weiten Teilen der Republik die Ordnung wieder her. Im ganzen Land gab es jedoch weiterhin minimalen Widerstand."
 ww1_usa.35.a:0 "Unter unserer Aufsicht wird es besser"
 ww1_usa.36.t:0 "Wilson spricht von einem Frieden ohne Sieg"
 ww1_usa.36.d:0 "Woodrow Wilson hat in einer Erklärung die europäischen Gegner dazu aufgerufen, sich zusammenzuschließen und einen Waffenstillstand zu schließen – einen Frieden ohne Sieger oder Verlierer, einen Frieden ohne Sieg. Es ist jedoch alles andere als wahrscheinlich, dass es dazu kommt, da beide Seiten für einen rein weißen Frieden zu viel verloren haben und zu viele Expansionspläne schmieden."
 ww1_usa.36.a:0 "Schade, dass sie nicht zuhören"
 ww1_usa.39.t:0 "Bürgerunruhen"
 ww1_usa.39.d:0 "Die amerikanische Bevölkerung ist nach der deutschen Invasion Bostons in Aufruhr. Es entstanden verschiedene Gruppen. Diese Gruppen fordern einen Vertrag zwischen uns und den Deutschen. Sie befürchten, dass weitere Städte wie Boston von den Deutschen besetzt werden könnten. Ein solcher Vertrag würde uns zum Verzicht auf amerikanischen Einfluss in der Karibik zwingen und Deutschland ermöglichen, seinen Einfluss auszuweiten. Wir müssen eine Lösung für diese Situation finden, sonst könnte sie sich verschlimmern!"
 ww1_usa.39.a:0 "Lasst uns nach Deutschland gehen"

 ww1_greece.1.t:0 "Georg I. ermordet"
 ww1_greece.1.d:0 "Als sich Georg I. dem 50. Jahrestag seiner Thronbesteigung näherte, plante der König, unmittelbar nach der Feier seines goldenen Thronjubiläums im Oktober 1913 zugunsten seines Sohnes Konstantin abzudanken. Georg bewegte sich ohne nennenswerte Schutztruppe in Thessaloniki. Bei einem Nachmittagsspaziergang in der Nähe des Weißen Turms am 18. März 1913 wurde er aus nächster Nähe von Alexandros Schinas in den Rücken geschossen. Dieser soll „einer sozialistischen Organisation angehört“ und „erklärte bei seiner Verhaftung, er habe den König getötet, weil dieser ihm kein Geld geben wollte“. Georg war sofort tot, die Kugel hatte sein Herz durchdrungen. Die griechische Regierung bestritt jegliches politische Motiv für das Attentat und behauptete, Schinas sei ein alkoholkranker Landstreicher gewesen."
 ww1_greece.1.a:0 "Ein schreckliches Ergebnis!"

 aidumb.1.t:0 "Personal hinzufügen"
 aidumb.1.d:0 "Möchten Sie wissen, warum dies überhaupt ein Land ist? Warten Sie einfach auf das nächste Ereignis"
 aidumb.1.a:0 "OK"
 aidumb.2.t:0 "Personal hinzufügen"
 aidumb.2.d:0 "Möchten Sie wissen, warum dies überhaupt ein Land ist? Warten Sie einfach auf das nächste Ereignis"
 aidumb.2.a:0 "Yokay"
 aidumb.3.t:0 "Kontrolle über die Fronten in Palästina und Mesopotamien?"
 aidumb.3.d:0 "Hallo, ich entschuldige mich für die ganze Sache mit „Britain 2“ und „Britain 3“, wie ich sie nenne, aber sie sind notwendig, weil die KI dumm ist und dumme Dinge tut, und Leute, die dumme Dinge tun, sterben. Trotzdem, wenn Sie die KI von der mesopotamischen Front aus steuern möchten, können Sie das tun."
 aidumb.3.a:0 "Ich möchte die mesopotamische Front kontrollieren"
 aidumb.3.b:0 "Nein danke, mir geht es gut"
 aidumb.4.t:0 "Die Fronten in Mesopotamien und Palästina kontrollieren?"
 aidumb.4.d:0 "Hallo, ich entschuldige mich für die ganze Sache mit „Britain 2“ und „Britain 3“, wie ich sie nenne, aber sie sind notwendig, weil die KI dumm ist und dumme Dinge tut, und Menschen, die dumme Dinge tun, sterben. Trotzdem, wenn Sie die KI von der Palästinensischen Front aus steuern möchten, können Sie das tun."
 aidumb.4.a:0 "Ich möchte die Palästinensische Front kontrollieren"
 aidumb.4.b:0 "Nein danke, mir geht es gut"
 aidumb.5.t:0 "Die Fronten in Mesopotamien und Jerusalem kontrollieren?"
 aidumb.5.d:0 "Da Sie als Spieler die Briten spielen, können Sie die Fronten wahrscheinlich besser kontrollieren, als die KI es je könnte. Möchten Sie also die Kontrolle über die palästinensische und mesopotamische Front?"
 aidumb.5.a:0 "Ja, bitte."
 aidumb.5.b:0 "NEIN."
 aidumb.6.t:0 "Platzhalter"
 aidumb.6.d:0 "Platzhalter"
 aidumb.6.a:0 "Platzhalter"

###### WW1 victory localisation is in events_l_english on line 4329 #######
kaiserschlachtvictory.1.t:0 "Den Franzosen ein Friedensangebot unterbreiten?"
kaiserschlachtvictory.1.d:0 "Wir haben die Kontrolle über Nordfrankreich und damit über den Großteil der französischen Industrie und Ressourcen übernommen. Wir haben die Tore von Paris und Versailes betreten, genau wie 1871. Sollen wir diesen Krieg, genau wie unsere Vorfahren, mit einem ehrenvollen Frieden beenden?"
kaiserschlachtvictory.1.a:0 "Senden Sie das Angebot. Wir sorgen dafür, dass diesmal Ruhe herrscht."
kaiserschlachtvictory.1.b:0 "Nein, wir werden alles erobern!"

kaiserschlachtvictory.2.t:0 "Deutschland schlägt Waffenstillstand vor!"
kaiserschlachtvictory.2.d:0 "Wir haben den Großteil unserer Industrie, unserer Ressourcen und vor allem unserer Hauptstadt Paris verloren. Wir könnten den gefürchteten Boches zwar Widerstand leisten, aber die Deutschen werden uns wahrscheinlich nur härtere Bedingungen auferlegen, wenn wir den Waffenstillstand jetzt ablehnen."
kaiserschlachtvictory.2.a:0 "Wir müssen diesen Krieg beenden, auch wenn wir auf der Verliererseite stehen."
kaiserschlachtvictory.2.b:0 "Wir werden bis zum bitteren Ende kämpfen."

kaiserschlachtvictory.3.t:0 "Die Franzosen lehnen den Waffenstillstand ab!"
kaiserschlachtvictory.3.d:0 "Die Franzosen haben unser Waffenstillstandsangebot abgelehnt! Wir haben keine andere Wahl, als jetzt bis zum bitteren Ende zu kämpfen."
kaiserschlachtvictory.3.a:0 "Wenn die Franzosen dieses sinnlose Gemetzel fortsetzen wollen, dann soll es so sein."

kaiserschlachtvictory.4.t:0 "Frankreich kapituliert! Waffenstillstand von Marne unterzeichnet!"
kaiserschlachtvictory.4.d:0 "Nach unserer erfolgreichen Frühjahrsoffensive, der sogenannten Kaiserschlacht, wie die Soldaten sie heute nennen, und der anschließenden Einnahme von Paris hat die Dritte Französische Republik offiziell einem Waffenstillstand zugestimmt, der heute in Marne unterzeichnet wurde und den Krieg zwischen unseren beiden Ländern beendet. Frankreich hat sich bereit erklärt, sein Militär zu demobilisieren und die britischen Streitkräfte so schnell wie möglich vom Festland zu vertreiben. Ein Friedensvertrag wird in Kürze zu unseren Bedingungen abgeschlossen. \n\n Mit dem Ausscheiden Frankreichs aus dem Krieg wird der Rest der Entente diesem Beispiel folgen und bald Verhandlungen über einen Waffenstillstand und einen endgültigen Vertrag aufnehmen."
kaiserschlachtvictory.4.a:0 "Wir sind siegreich!"

kaiserschlachtvictory.5.t:0 "Die Franzosen haben den deutschen Waffenstillstand akzeptiert"
kaiserschlachtvictory.5.d:0 "Die Franzosen haben einem Waffenstillstand mit den Deutschen zugestimmt, und damit ist der Krieg auf dem europäischen Festland beendet. Ungeachtet der Siege und Niederlagen in den Schlachten scheint der Krieg verloren. Nach dem Rückzug der Franzosen ist es nur eine Frage der Zeit, bis die Deutschen über die Türken nach Afrika strömen, um es zurückzuerobern. Unsere Wirtschaft und Bevölkerung werden einen endlosen Krieg niemals unterstützen."
kaiserschlachtvictory.5.a:0 "Auf einen Frieden mit Ehre."
kaiserschlachtvictory.5.b:0 "Briten dürfen niemals Sklaven sein!"

kaiserschlachtvictory.6.t:0 "Großbritannien stimmt Waffenstillstand zu!"
kaiserschlachtvictory.6.d:0 "Nach dem Fall Frankreichs und der Vertreibung der britischen Streitkräfte vom europäischen Festland hat Großbritannien bitterlich einem Waffenstillstand zwischen unseren beiden Nationen zugestimmt, der heute in Calais unterzeichnet wurde. Zwar soll bald ein endgültiger Vertrag zwischen unseren Nationen ausgehandelt werden, doch ist es unwahrscheinlich, dass wir drastische Entscheidungen treffen können, da Großbritannien nach wie vor über die größte Flotte der Welt verfügt und mit seiner Insellage den besten Schutz vor Invasionen bietet."
kaiserschlachtvictory.6.a:0 "Der Sieg gehört uns!"

kaiserschlachtvictory.7.t:0 "Die Briten verweigern den Frieden!"
kaiserschlachtvictory.7.d:0 "Die Briten haben unsere Waffenstillstandsangebote abgelehnt, obwohl abzuwarten bleibt, ob wir erneut gegen sie in den Krieg ziehen werden …"
kaiserschlachtvictory.7.a:0 "Absurd!"

kaiserschlachtvictory.8.t:0 "Frieden mit den Mittelmächten?"
kaiserschlachtvictory.8.d:0 "Seit wir dem Dreibund, heute den Mittelmächten, den Rücken gekehrt haben, scheinen die Versprechen Großbritanniens und Frankreichs nie in Erfüllung zu gehen. So sehr wir uns auch die Vereinigung Italiens wünschen, hätten wir uns stattdessen für die Rückeroberung unserer alten Besitztümer in Frankreich entscheiden sollen …"
kaiserschlachtvictory.8.a:0 "Hoffen wir auf einen milden Frieden."
kaiserschlachtvictory.8.b:0 "Der Traum von Italia Irridente, einem vereinten Italien, wird niemals sterben!"

kaiserschlachtvictory.9.t:0 "Italien stimmt Waffenstillstand zu"
kaiserschlachtvictory.9.d:0 "Nachdem Frankreich abgezogen ist und Großbritannien und die Amerikaner kurz darauf folgten, haben die Italiener widerwillig einem Waffenstillstand in der Nähe von Vittorio Veneto zugestimmt. Auch unter dem Druck der Bevölkerung, bei der der Krieg in den letzten Jahren immer unbeliebter geworden ist, soll bald mit der Ausarbeitung eines endgültigen Vertrags begonnen werden."
kaiserschlachtvictory.9.a:0 "Sie hätten bei uns bleiben sollen!"

kaiserschlachtvictory.10.t:0 "Italien lehnt Waffenstillstand ab!"
kaiserschlachtvictory.10.d:0 "Die Italiener haben sich entschieden, bis zum bitteren Ende zu kämpfen. Da uns die Diplomatie in dieser Notlage im Stich lässt, müssen wir es auf die harte Tour schaffen."
kaiserschlachtvictory.10.a:0 "Narren!"
kaiserschlachtvictory.10.b:0 "Verräterischer Abschaum!"

kaiserschlachtvictory.11.t:0 "Das Deutsche Reich bietet einen Waffenstillstand an!"
kaiserschlachtvictory.11.d:0 "Ein ferner Krieg in Europa – Kriege, die uns normalerweise egal sind – wurde in diese Zeit hineingezogen. Die Deutschen versprechen uns milde Bedingungen und keinerlei Reparationen. Im Grunde kommen wir ungeschoren davon. Was sollen wir tun?"
kaiserschlachtvictory.11.a:0 "Das war nicht unser Krieg."
kaiserschlachtvictory.11.b:0 "Wir werden bis zum Ende kämpfen!"

kaiserschlachtvictory.12.t:0 "Amerikaner stimmen Waffenstillstand zu!"
kaiserschlachtvictory.12.d:0 "Die Amerikaner, die erst im vergangenen Jahr in den Krieg eingetreten sind und erst Anfang dieses Jahres eine bedeutende Rolle spielten, haben nach der Kapitulation Frankreichs einem Waffenstillstand in Calais mit den Briten zugestimmt. Der Frieden, der zwischen unseren beiden Nationen besteht, ist und bleibt ein weißer Frieden, wobei die Amerikaner höchstwahrscheinlich zu ihrer isolationistischen Haltung zurückkehren werden."
kaiserschlachtvictory.12.a:0 "Hurra! Brot!"

kaiserschlachtvictory.13.t:0 "Amerikaner lehnen Waffenstillstand ab!"
kaiserschlachtvictory.13.d:0 "Trotz unseres milden Friedensangebots haben die Amerikaner unsere Friedensangebote abgelehnt."
kaiserschlachtvictory.13.a:0 "Dann sei es so. Wir werden lernen, sie rechtzeitig zu erobern ..."

kaiserschlachtvictory.14.t:0 "Ein Brief des deutschen Kaisers"
kaiserschlachtvictory.14.d:0 "Die Imperien Japan und Deutschland stehen sich distanziert gegenüber und genießen auf internationaler Ebene einen Mangel an Respekt. Sachalin, eine von den Japanern im Krieg von 1905 zu Recht errungene Trophäe, wurde Ihnen aufgrund mangelnden Respekts der Briten und Amerikaner vorenthalten. Das Deutsche Reich ist bereit, die Übertragung von Französisch-Indochina in den endgültigen Friedensvertrag einzubeziehen, ebenso wie die Übertragung aller vom japanischen Kaiserreich gehaltenen Inseln, die derzeit zum Deutschen Kaiserreich gehören. Das Deutsche Reich ist bereit, das japanische Kaiserreich auf internationaler Ebene als gleichwertig zu behandeln und eine zukünftige Freundschaft mit ihm zu pflegen."
kaiserschlachtvictory.14.a:0 "Sehr gut. Es ist Frieden."
kaiserschlachtvictory.14.b:0 "Das scheint zu schön, um wahr zu sein."

kaiserschlachtvictory.15.t:0 "Die Japaner haben einem Waffenstillstand zugestimmt!"
kaiserschlachtvictory.15.d:0 "Die Japaner haben einem Waffenstillstand zugestimmt. Wilhelm II. selbst verfasste einen Brief mit einem Appell an den japanischen Kaiser. Obwohl der genaue Inhalt unbekannt ist, werden wir wahrscheinlich einige Zugeständnisse im Osten machen müssen, um sie zufriedenzustellen."
kaiserschlachtvictory.15.a:0 "Es sind sowieso nur ein paar verlassene Inseln."
kaiserschlachtvictory.16.t:0 "Japan lehnt Waffenstillstand ab"
kaiserschlachtvictory.16.d:0 "Die Japaner haben den Frieden abgelehnt, obwohl Wilhelm II. in einem Brief angeblich lautstark um Frieden gebeten hatte."
kaiserschlachtvictory.16.a:0 "Unser Kaiser ist nicht sehr diplomatisch, oder?"

kaiserschlachtvictory.17.t:0 "Frieden?"
kaiserschlachtvictory.17.d:0 "Unsere Beteiligung an diesem fernen europäischen Krieg ist weitgehend nominell. Eine formelle Einstellung der Feindseligkeiten wird vor Ort kaum etwas ändern, aber wir könnten den Status der deutschen Zugeständnisse erfragen."
kaiserschlachtvictory.17.a:0 "Lassen Sie uns nicht darauf drängen. Fordern Sie Frieden, unabhängig von den Bedingungen."
kaiserschlachtvictory.17.b:0 "Wir wollen Qingdao!"
kaiserschlachtvictory.17.c:0 "Wir werden diesen Krieg fortsetzen, zumindest auf dem Papier!"

kaiserschlachtvictory.18.t:0 "Chinesischer Waffenstillstand - Anerkennung des deutschen Qingdao"
kaiserschlachtvictory.18.d:0 "Die Chinesen haben unsere Konzession in Qingdao seltsamerweise bestehen lassen. Sollten die Chinesen tatsächlich die Kontrolle über Qingdao erlangen, werden wir unsere normale Verwaltung umgehend wieder aufnehmen. Sollte jedoch ein anderes Land, beispielsweise Japan, die Kontrolle über Qingdao innehaben, wird es den Vertragshafen nicht räumen."
kaiserschlachtvictory.18.a:0 "Okay."

kaiserschlachtvictory.19.t:0 "Das Schicksal von Tsingdao"
kaiserschlachtvictory.19.d:0 "Die Chinesen stimmen einem Frieden nur zu, wenn wir das Ende unserer Zugeständnisse anerkennen. Allerdings müssen wir sie nicht unbedingt kontrollieren ..."
kaiserschlachtvictory.19.a:0 "Gib es ihnen."
kaiserschlachtvictory.19.b:0 "Unterstützen Sie ihre Behauptung!"
kaiserschlachtvictory.19.c:0 "Tsingdao ist zu Recht deutsch!"

kaiserschlachtvictory.20.t:0 "Tsingdao übertragen?"
kaiserschlachtvictory.20.d:0 "Deutschland hat den Besitz von Qingdao/Tsingdao mit China bestätigt, doch derzeit liegt es in unseren Händen. Sollen wir den Anspruch anerkennen?"
kaiserschlachtvictory.20.a:0 "Ja, übergeben Sie Qingdao an die Chinesen."
kaiserschlachtvictory.20.b:0 "Nein, Qingdao gehört uns!"

kaiserschlachtvictory.21.t:0 "Chinesen lehnen Waffenstillstand ab"
kaiserschlachtvictory.21.d:0 "Auch wenn die Feindseligkeiten de facto eingestellt sind, haben die Chinesen auf dem Papier beschlossen, den Kampf gegen uns fortzusetzen."
kaiserschlachtvictory.21.a:0 "Seltsam."

kaiserschlachtvictory.22.t:0 "Wir haben Qingdao verloren!"
kaiserschlachtvictory.22.d:0 "Wir haben die Kontrolle über Qingdao verloren und die Chinesen haben es in ihren Staat eingegliedert. Was sollen wir tun?"
kaiserschlachtvictory.22.a:0 "Wir sind besiegt. Unterschreiben Sie."
kaiserschlachtvictory.22.b:0 "Wir werden es zurückerobern und noch mehr."

kaiserschlachtvictory.23.t:0 "Noch eine Demütigung."
kaiserschlachtvictory.23.d:0 "Wir haben einen weiteren Krieg gegen die dreckigen Barbaren verloren, und dennoch fordert das Volk die Übergabe unserer Gebiete. Was nun?"
kaiserschlachtvictory.23.a:0 "Akzeptieren Sie den Verlust von Qingdao."
kaiserschlachtvictory.23.b:0 "Wir werden sie vom chinesischen Boden vertreiben!"

kaiserschlachtvictory.24.t:0 "" #TODO
kaiserschlachtvictory.24.d:0 ""
kaiserschlachtvictory.24.a:0 ""
kaiserschlachtvictory.24.b:0 ""

kaiserschlachtvictory.25.t:0 "Die Franzosen haben kapituliert!"
kaiserschlachtvictory.25.d:0 "Unsere französischen Verbündeten liegen geschlagen da, unsere Länder sind überfallen. Das bedeutet die faktische Aufhebung der Entente Cordiale, denn wir stehen nun allein gegen die deutsche Kriegsmaschinerie!"
kaiserschlachtvictory.25.a:0 "Explosion!"

kaiserschlachtvictory.123.t:0 "Das Schicksal Belgiens"
kaiserschlachtvictory.123.d:0 "Der Status Belgiens im Vertrag ist derzeit offen. Was sollen wir mit diesem künstlichen Pufferstaat tun?"
kaiserschlachtvictory.123.a:0 "Fügen Sie alles hinzu."
kaiserschlachtvictory.123.b:0 "Marionette Belgien."
kaiserschlachtvictory.123.c:0 "Bringen Sie Ländereien an die Maas und machen Sie sie dann zu Marionetten."
kaiserschlachtvictory.123.dd:0 "Nehmen Sie ihnen ihr Maas-Land, machen Sie sie zu Marionetten und nehmen Sie den Kongo ein."
kaiserschlachtvictory.123.e:0 "Belgien aufteilen"
kaiserschlachtvictory.123.f:0 "Status Quo Ante Bellum."
kaiserschlachtvictory.124.t:0 "Bestätigung."
kaiserschlachtvictory.124.d:0 "Sie möchten Belgien annektieren."
kaiserschlachtvictory.124.a:0 "Ja"
kaiserschlachtvictory.124.b:0 "NEIN"
kaiserschlachtvictory.125.t:0 "Bestätigung"
kaiserschlachtvictory.125.d:0 "Sie möchten Belgien als Marionette benutzen"
kaiserschlachtvictory.125.a:0 "Ja"
kaiserschlachtvictory.125.b:0 "NEIN"
kaiserschlachtvictory.126.t:0 "Bestätigung"
kaiserschlachtvictory.126.d:0 "Sie möchten Belgien Land an der Maas abnehmen, aber NICHT DEN KONGO."
kaiserschlachtvictory.126.a:0 "Ja"
kaiserschlachtvictory.126.b:0 "NEIN"
kaiserschlachtvictory.127.t:0 "Bestätigung"
kaiserschlachtvictory.127.d:0 "Sie möchten das Land hinter der Maas und dem Kongo einnehmen"
kaiserschlachtvictory.127.a:0 "Ja"
kaiserschlachtvictory.127.b:0 "NEIN"
kaiserschlachtvictory.128.t:0 "Bestätigung"
kaiserschlachtvictory.128.d:0 "Sie möchten Belgien in Flandern und Wallonien aufteilen und den Kongo einnehmen"
kaiserschlachtvictory.128.a:0 "Ja"
kaiserschlachtvictory.128.b:0 "NEIN"
kaiserschlachtvictory.129.t:0 "Das Schicksal Ägyptens"
kaiserschlachtvictory.129.d:0 "Ägypten ist derzeit ein englisches De-facto-Protektorat. Zuvor war es jedoch lange Zeit Teil des Osmanischen Reiches und unter Muhammad Ali kurzzeitig ein unabhängiger Staat. Welche Forderungen sind hier zu stellen? Ich persönlich schlage vor, dass wir die Kontrolle über den Suezkanal erlangen, Sir."
kaiserschlachtvictory.129.a:0 "Übergeben Sie den Suezkanal an uns Deutsche!"
kaiserschlachtvictory.129.b:0 "Übergeben Sie den Suezkanal an die Türken."
kaiserschlachtvictory.129.c:0 "Wir wollen eine ägyptische Marionette."
kaiserschlachtvictory.129.dd:0 "Übergebt Ägypten den Türken."
kaiserschlachtvictory.129.e:0 "Übertragen Sie uns das Protektorat!"
kaiserschlachtvictory.129.f:0 "Status Quo."
kaiserschlachtvictory.130.t:0 "Bestätigung"
kaiserschlachtvictory.130.d:0 "Sie möchten Belgien so zurücklassen, wie es vor dem Krieg war, ohne Verluste."
kaiserschlachtvictory.130.a:0 "Ja"
kaiserschlachtvictory.130.b:0 "NEIN"
kaiserschlachtvictory.131.t:0 "Bestätigung"
kaiserschlachtvictory.131.d:0 "Sind Sie mit Ägypten zufrieden?"
kaiserschlachtvictory.131.a:0 "Ja."
kaiserschlachtvictory.131.b:0 "NEIN."
kaiserschlachtvictory.156.t:0 "Das Schicksal Gibraltars"
kaiserschlachtvictory.156.d:0 "Gibraltar ist für die Briten auf ihrer Route nach Indien ein wichtiger Hafen, da es das Tor zum Mittelmeer ist, über das Schiffe in den Suezkanal ein- und auslaufen."
kaiserschlachtvictory.156.a:0 "Es soll uns gehören."
kaiserschlachtvictory.156.b:0 "Geben Sie es den Spaniern."
kaiserschlachtvictory.156.c:0 "Status Quo."
kaiserschlachtvictory.157.t:0 "Bestätigung"
kaiserschlachtvictory.157.d:0 "Gibraltar soll der Person gehören, die Sie ausgewählt haben, wie auf der Karte angezeigt!"
kaiserschlachtvictory.157.a:0 "Ja."
kaiserschlachtvictory.157.b:0 "NEIN."
kaiserschlachtvictory.163.t:0 "Das Schicksal Maltas"
kaiserschlachtvictory.163.d:0 "Malta, ein Engpass im Mittelmeer. Wer es kontrolliert, kontrolliert die Passage von Ost nach West und steht derzeit unter britischer Oberhoheit. Was sollen wir damit tun?"
kaiserschlachtvictory.163.a:0 "Lasst es uns ergreifen!"
kaiserschlachtvictory.163.b:0 "Geben Sie es den Italienern."
kaiserschlachtvictory.163.c:0 "Lassen Sie es die Briten behalten."
kaiserschlachtvictory.164.t:0 "Bestätigung"
kaiserschlachtvictory.164.d:0 "Ist dies das Schicksal Maltas, das Sie sich wünschen?"
kaiserschlachtvictory.164.a:0 "Ja."
kaiserschlachtvictory.164.b:0 "NEIN."

kaiserschlachtvictory.242.t:0 "Der Zweite Vertrag von Frankfurt – Die deutsch-französische Grenze"
kaiserschlachtvictory.242.desc:0 "Der französische Anspruch auf Elsass-Lothringen trug zum Ausbruch dieses Krieges bei, und Bismarck war gegen die Annexion französischen Landes. Die Franzosen sind jedoch nicht in der Lage zu verhandeln, und es scheint, dass das deutsche Militär bereits Vorbereitungen für die Annexion eines lothringischen Streifens von Nanzig bis Briey-Longwy getroffen hat. Im Falle eines erneuten Krieges werden diese von den Franzosen errichteten Festungen vermutlich gegen sie verwendet werden ..."
kaiserschlachtvictory.242.a:0 "Wir nehmen nur den Streifen Lothringen."
kaiserschlachtvictory.242.0:0 "Wir werden nichts hinnehmen und den Status Quo von 1871 wiederherstellen!"
kaiserschlachtvictory.242.b:0 "Teilweise Lothringen und teilweise Französisch-Afrika!"
kaiserschlachtvictory.242.c:0 "Nehmen Sie das französische Festland!"
kaiserschlachtvictory.242.d:0 "Nehmen Sie so viel wie wir können!"

kaiserschlachtvictory.243.t:0 ""
kaiserschlachtvictory.243.d:0 ""
kaiserschlachtvictory.243.a:0 ""

kaiserschlachtvictory.244.t:0 "Vertrag von Konstantinopel"
kaiserschlachtvictory.244.d:0 "Mit der Niederlage der Griechen und Serben stehen die einst in deren Besitz befindlichen Länder nun anderen offen. Vor allem die Bulgaren wollen ihren Traum von Großbulgarien verwirklichen, und die Türken wollen ihre Ägäisküste sichern."
kaiserschlachtvictory.244.a:0 "Endlich hat Bulgarien seinen Platz an der Sonne!"
kaiserschlachtvictory.244.b:0 "Kleine Ausbeute, aber dennoch wichtig."

kaiserschlachtvictory.245.t:0 "Das Schicksal des Balkans"
kaiserschlachtvictory.245.d:0 "Mit dem Sieg der Mittelmächte über die Entente können wir nun den Balkan in den Griff bekommen. Wenn die Osmanen dazu in der Lage sind, werden sie uns helfen, die Stabilität aufrechtzuerhalten."
kaiserschlachtvictory.245.a:0 "Sehr gut, aber was ist mit den Bulgaren?"

kaiserschlachtvictory.246.t:0 "Der Vertrag von Innsbruck!"
kaiserschlachtvictory.246.d:0 "Im Falle des Königreichs Italien wurden im Vertrag von Innsbruck die afrikanischen Besitzungen aufgelöst und der Derwischstaat als ihr De-facto-Eigentümer anerkannt. Der von allen wichtigen Kriegsbeteiligten unterzeichnete Vertrag erkannte die Unabhängigkeit des Derwischstaates sowie die Übertragung einiger Gebiete an, beispielsweise die Rückgabe Rhodos an die Türken und die Übertragung Venedigs und Friauls an die Österreicher."
kaiserschlachtvictory.246.a:0 "Das geschieht diesen Hinterhältigen recht!"

kaiserschlachtvictory.247.t:0 "Italienische Länder"
kaiserschlachtvictory.247.d:0 "Die Franzosen besitzen Ländereien, die historisch oder sprachlich stärker mit der italienischen Halbinsel verbunden sind. Was sollen wir mit diesen Gebieten tun?"
kaiserschlachtvictory.247.a:0 "Geben Sie den Italienern Korsika"
kaiserschlachtvictory.247.b:0 "Lassen Sie die Franzosen diese Länder behalten."
kaiserschlachtvictory.247.c:0 "Es wäre klug, den Italienern etwas zu geben …"

kaiserschlachtvictory.248.t:0 "Kuwait-Frage"
kaiserschlachtvictory.248.d:0 "Kuwait im äußersten Süden des Irak könnte von uns als strategischer Hafen genutzt werden. Da uns jedoch der Großteil Mittelafrikas gehört, wäre dies wahrscheinlich nicht mehr so wichtig. Schaden würde es jedoch nicht. Andererseits könnten wir immer fair und gerecht sein und es dem Osmanischen Reich zurückgeben, das die Rückgabe dieses Gebiets vom britischen Imperialismus sicherlich zu schätzen wüsste."
kaiserschlachtvictory.248.a:0 "Nehmen wir Kuwait"
kaiserschlachtvictory.248.b:0 "Gebt Kuwait den Türken"

kaiserschlachtvictory.249.t:0 "Das Schicksal Französisch-Indochinas"
kaiserschlachtvictory.249.d:0 "Nach der Kapitulation Frankreichs werden die Franzosen ihre Kolonien in Asien nicht mehr verwalten können. Diese sind sehr prekär und liegen am anderen Ende der Welt. So sehr wir sie wegen ihrer Kautschukplantagen auch mögen, die Japaner streben ebenfalls nach Kolonialbesitz. Sollte es erneut zu einem Krieg gegen die Briten kommen, können wir uns einen langfristigen Verbündeten in der Region sichern, indem wir den Japanern trotz der Kriegsniederlage asiatische Besitzungen überlassen."
kaiserschlachtvictory.249.a:0 "Wie wäre es, wenn wir es stattdessen ergreifen?"
kaiserschlachtvictory.249.b:0 "Lasst uns ausnahmsweise mal Freunde statt Feinde finden."

kaiserschlachtvictory.250.t:0 "Das Schicksal der deutschen Pazifik-Besitztümer"
kaiserschlachtvictory.250.d:0 "Die Japaner haben während des Krieges unsere Besitzungen im Pazifik beschlagnahmt und sind nicht bereit, sie zurückzugeben. Auf diesen Inseln gibt es ohnehin nichts, und wir können der US-Marine absolut nicht Paroli bieten. Japan hat jedoch ein Interesse an ihnen, und wir könnten tatsächlich einen Gewinn erzielen, wenn wir mit Japan einen Vertrag über diese Inseln abschließen."
kaiserschlachtvictory.250.a:0 "Verkaufen Sie sie."
kaiserschlachtvictory.250.b:0 "Wir wollen sie zurück!"

kaiserschlachtvictory.251.t:0 "Ein faires Angebot."
kaiserschlachtvictory.251.d:0 "Die Deutschen möchten unseren Besitz ihrer pazifischen Inselkolonien gegen einen sehr vernünftigen Preis anerkennen."
kaiserschlachtvictory.251.a:0 "Also gut, kaufen Sie die Inseln!"
kaiserschlachtvictory.251.b:0 "Wir besitzen sie bereits, wir brauchen keine Zahlung."

kaiserschlachtvictory.252.t:0 "Die Deutschen fordern die Rückgabe der Inseln."
kaiserschlachtvictory.252.d:0 "Die Deutschen fordern die Rückgabe ihrer Pazifikkolonien!"
kaiserschlachtvictory.252.a:0 "Gib sie zurück."
kaiserschlachtvictory.252.b:0 "Wir werden sie behalten."

kaiserschlachtvictory.253.t:0 "Japan hat unsere Forderung abgelehnt!"
kaiserschlachtvictory.253.d:0 "Es scheint, als müssten wir diese Inseln mit Gewalt einnehmen."
kaiserschlachtvictory.253.a:0 "Bah!"

kaiserschlachtvictory.254.t:0 "Der Vertrag von Brest-Litowsk"
kaiserschlachtvictory.254.d:0 "Nach mehreren Monaten brutaler Verhandlungen einigten sich unsere Regierungen auf einen endgültigen Vertrag, um weitere Vorstöße deutscher und österreichisch-ungarischer Streitkräfte zu stoppen. Dem Vertrag zufolge werden wir sämtliche Verpflichtungen des kaiserlichen Russlands gegenüber der Triple Entente nicht erfüllen. Im Vertrag werden wir alle baltischen Staaten an Deutschland abtreten, die zu deutschen Vasallenstaaten unter deutschen Fürsten werden sollen, die Unabhängigkeit der Ukraine anerkennen, Weißrussland abtreten und die Oblast Kars im Südkaukasus an die Osmanen abtreten. Die Bedingungen sind mehr als hart, und es wird sogar gesagt, der deutsche Unterhändler sei von der Härte schockiert gewesen."
kaiserschlachtvictory.254.a:0 "Exzellent!"

kaiserschlachtvictory.255.t:0 "Das Schicksal der Schweizer"
kaiserschlachtvictory.255.d:0 "Die Schweizer waren historisch neutral, sprechen aber einen deutschen Dialekt, von dem sie schlichtweg leugnen, dass er deutsch sei. Wir könnten sie langsam integrieren, aber wir könnten sie auch einfach dem Status Quo überlassen."
kaiserschlachtvictory.255.a:0 "Machen Sie sie zu Marionetten."
kaiserschlachtvictory.255.b:0 "Die Schweizer sollen neutral bleiben, wir wollten nur in Frankreich einmarschieren …"

kaiserschlachtvictory.256.t:0 "Der Vertrag von Bologna"
kaiserschlachtvictory.256.d:0 "Durch unsere Teilnahme auf deutscher Seite im Sinne des Dreibundes konnten wir auch Kriegsbeute erbeuten! Wir erhalten das uns zu Unrecht verweigerte tunesische Protektorat sowie Savoyen, Nizza und die dazwischenliegenden Alpen. Die Gebiete bis zur Rhone werden auf französischer Seite entmilitarisiert."
kaiserschlachtvictory.256.a:0 "Der Traum von Italia Irridenta ist noch immer unvollendet."


## Interwar Events


interwar_greece.1.t:0 "Vardar-Offensive beginnt"
interwar_greece.1.d:0 "Die Vardar-Offensive wurde vom 15. bis 29. September 1918 ausgetragen und führte schließlich zur Niederlage des Königreichs Bulgarien an der mazedonischen Front; ein endgültiger Waffenstillstand wurde unterzeichnet. Eine vereinte Streitmacht aus serbischen, französischen und griechischen Truppen griff die von Bulgarien gehaltenen Schützengräben in Dobro Pole, dem heutigen Mazedonien, an. Die zuvor zweimal besiegten Alliierten hatten durch Artillerievorbereitungen und Angriffe eine verheerende Wirkung auf die Moral der Bulgaren, was zu chaotischen Massendesertionen entlang der Front führte. Nachdem die Alliierten das ehemalige Hauptquartier von Uskub erobert und die Überreste der 11. Armee durch den Ausbruch eines antimonarchistischen Radomir-Aufstands gefährdet hatten, war das Königreich Bulgarien gezwungen, den Waffenstillstand von Saloniki zu unterzeichnen und zog sich aus dem Krieg zurück. \n\n Wenn Sie Spieler sind, verstehen Sie die „Vardar-Offensive“, die Ihnen jede Menge Boni einbringt. Viel Glück!"
interwar_greece.1.a:0 "Sie werden wie Glas zerspringen"
interwar_greece.2.t:0 "Tod Alexanders I."
interwar_greece.2.d:0 "Am 2. Oktober 1920 versuchte König Alexander, einen Berberaffen, der seinen Deutschen Schäferhund angriff, zu befreien. Dabei wurde er von einem anderen Affen tief in Bein und Rumpf gebissen. Der König hielt den Vorfall für nicht schwerwiegend, und seine Wunden wurden umgehend gereinigt und verbunden. Am Abend entzündeten sich seine Wunden jedoch, und er bekam hohes Fieber, das eine Blutvergiftung auslöste. Seine Ärzte erwogen, sein Bein zu amputieren, doch niemand wollte die Verantwortung für eine so drastische Maßnahme übernehmen. 23 Tage später, am 25. Oktober 1920, starb Alexander an einer Blutvergiftung, und sein Leichnam wurde in die Kathedrale von Athen überführt."
interwar_greece.2.a:0 "Möge er in Frieden ruhen ..."
interwar_greece.3.t:0 "Referendum zur Rückkehr Konstantins I."
interwar_greece.3.d:0 "Am 22. November 1920 fand in Griechenland nach dem Tod seines Sohnes, König Alexander, ein Referendum über die Rückkehr von König Konstantin I. statt. Der Vorschlag wurde von 99,0 % der Wähler positiv angenommen. Das Ergebnis sicherte und bestätigte die Vorherrschaft des antivenizelistischen Lagers im Land."
interwar_greece.3.a:0 "Gott schütze den König!"
interwar_greece.4.t:0 "Konstantin I. dankt ab!"
interwar_greece.4.d:0 "Nach dem gescheiterten Kleinasienfeldzug verlor der König seine neu gewonnene Popularität wieder und nach dem Armeeaufstand dankte Konstantin am 26. September 1922 erneut vom Thron ab. Sein ältester Sohn Georg II. wurde sein Nachfolger."
interwar_greece.4.a:0 "Nieder mit der Monarchie!"
interwar_greece.5.t:0 "Revolution vom 11. September 1922"
interwar_greece.5.d:0 "Die Revolution vom 11. September 1922 war ein Aufstand der griechischen Armee und Marine gegen die Regierung in Athen. Nach der Niederlage der griechischen Armee im Kleinasienfeldzug und ihrer Evakuierung aus Anatolien auf die griechischen Inseln in der östlichen Ägäis herrschte unter den Offizieren und Soldaten mittleren Ranges große Unzufriedenheit über die Führung der königlichen Regierung im Feldzug. Diese mündete in einem bewaffneten Aufstand unter der Führung provenizelistischer und antiroyalistischer Offiziere. Die Meuterei breitete sich schnell aus und führte zur Machtergreifung in Athen. König Konstantin I. wurde kurz darauf zur Abdankung und zum Verlassen des Landes gezwungen. Die Militärregierung behielt die Kontrolle über das Land bis 1924, als die griechische Monarchie offiziell abgeschafft wurde."
interwar_greece.5.a:0 "Die Monarchie hat nichts als Ärger gebracht!"
interwar_greece.6.t:0 "Konstantin I. stirbt"
interwar_greece.6.d:0 "Nach seiner Abdankung wurde er nach Italien verbannt und lebte nur noch vier Monate, bis er am 11. Januar 1923 in Palermo auf Sizilien an Herzversagen starb. Sein Leben und seine Herrschaft, die unter den besten Vorzeichen begonnen hatten, endeten im völligen Ruin."
interwar_greece.6.a:0 "Er wird hier nicht fehlen"
interwar_greece.7.t:0 "Zweite Hellenische Republik ausgerufen!"
interwar_greece.7.d:0 "Die Zweite Griechische Republik wurde am 25. März 1924 im Anschluss an die Niederlage Griechenlands gegen die Türkei im Kleinasienfeldzug ausgerufen, für die weithin die royalistische Regierung verantwortlich gemacht wurde."
interwar_greece.7.a:0 "Es lebe die Republik!"
interwar_greece.8.t:0 "Referendum zur Griechischen Republik"
interwar_greece.8.d:0 "Am 13. April 1924 fand in Griechenland ein Referendum über die Gründung einer Republik statt. Es folgte auf den katastrophalen Ausgang des Kleinasiatischen Feldzugs, bei dem die griechischen Träume von der Rückeroberung Konstantinopels zunichte gemacht wurden. Infolgedessen wurde Konstantin I. zur Abdankung gezwungen, und Georg II., der mutmaßliche Thronfolger, lebte weiterhin in Rumänien, während die Regierung über das Schicksal der Monarchie debattierte. Letztendlich kam es zu einem Plebiszit, bei dem 70 % der Menschen für die Republik stimmten und nur 30 % dagegen."
interwar_greece.8.a:0 "Eine bessere Zukunft erwartet Sie!"
interwar_greece.9.t:0 "Korfu-Vorfall: Unsere Antwort"
interwar_greece.9.d:0 "Die italienische Regierung hat uns eine Liste alberner Forderungen vorgelegt, wie etwa einen Salut an ihre Flotte, die Hinterlegung von 50.000.000 Lire und eine Entschuldigung für etwas, für das wir nicht einmal verantwortlich waren. Die Frage ist: Lohnt es sich, einfach aufzugeben oder unser Prestige zu wahren und einen Krieg zwischen unseren beiden Ländern zu riskieren?"
interwar_greece.9.a:0 "Frieden"
interwar_greece.9.b:0 "Wir werden unsere Ehre schützen!"
interwar_greece.10.t:0 "Pangalos übernimmt die Macht!"
interwar_greece.10.d:0 "Am 24. Juni 1925 stürzten Pangalos treue Offiziere die Regierung, da sie befürchteten, dass die politische Instabilität sein Land gefährde. Sie zwangen Präsident Pavlos Kountouriotis, Pangalos zum Premierminister zu ernennen. Pangalos schaffte die junge Republik umgehend ab und begann, jeden zu verfolgen, der seine Autorität in Frage stellte, darunter auch seinen alten Chef Plastiras. Die Pressefreiheit wurde abgeschafft und eine Reihe repressiver Gesetze erlassen (darunter ein Gesetz, das die Länge von Röcken für Frauen auf maximal 30 cm über dem Boden vorschrieb). Pangalos verlieh sich selbst das Großkreuz des Erlöserordens."
interwar_greece.10.a:0 "Er wird nicht lange durchhalten ..."
interwar_greece.11.t:0 "Pavlos Jountoriotis beendet die Diktatur"
interwar_greece.11.d:0 "Nachdem Theodoros Pangalos in einem schnellen Militärputsch die Macht übernommen und die Republik wegen Instabilität abgeschafft hatte, geriet das Land in Gefahr. Schon bald begann er, seine Macht verantwortungslos einzusetzen und erließ eine Reihe repressiver Gesetze. So wurde beispielsweise die Rocklänge für Frauen auf maximal 30 cm über dem Boden festgelegt. Er verlieh sich selbst das Großkreuz des Erlöserordens und verfolgte jeden, der sich ihm widersetzte. Am 29. August 1926 wurde er durch einen Gegenputsch unter Führung von General Georgios Kondylis abgesetzt. Pavlos Kountouriotis kehrte als Präsident an die Macht zurück, während Pangalos zwei Jahre lang in der Festung Izzeddin inhaftiert war."
interwar_greece.11.a:0 "Verschwinde von hier, du Diktator!"
interwar_greece.12.t:0 "Willkommen beim Mod"
interwar_greece.12.d:0 "Die griechische Situation \n\nGriechenland war im Sommer 1917 auf Seiten der Alliierten in den Krieg eingetreten, nachdem der prodeutsche König Konstantin I. abgesetzt worden war und sein proalliierter Sohn Alexander I. die Macht übernommen hatte. So entstand die makedonische Front, die bis dahin weitgehend stabil geblieben war..."
interwar_greece.12.a:0 "OK!"

interwar_soviet.1.t:0 "Gründung der Komintern"
interwar_soviet.1.d:0 "Nach der bedauerlichen Auflösung der Zweiten Internationale gründeten wir im Anschluss an einen Kongress, der heute in Moskau vor dem Hintergrund des russischen Bürgerkriegs stattfand, die Kommunistische Internationale, auch bekannt als Komintern oder Dritte Internationale. Auf dem Kongress waren 52 Delegierte aus 34 Parteien anwesend, die beschlossen, ein Exekutivkomitee mit Vertretern der wichtigsten Sektionen zu bilden. Auch andere Parteien, die der Internationale beitreten, sollten ihre eigenen Vertreter stellen."
interwar_soviet.1.a:0 "Arbeiter aller Länder, vereinigt euch!"
interwar_soviet.2.t:0 "Unterstützung der persischen SR"
interwar_soviet.2.d:0 "Da die Persische Sozialistische Republik in einem schwachen Zustand ist und Hilfe braucht, haben wir beschlossen, unseren kommunistischen Mitbürgern unter die Arme zu greifen und sie mit Waffen für ihren glorreichen Kampf gegen die Kapitalisten zu versorgen!"
interwar_soviet.2.a:0 "Hoffen wir, dass sie diese Vorräte gut gebrauchen können!"
interwar_soviet.3.t:0 "Die Westoffensive"
interwar_soviet.3.d:0 "Da die ehemaligen Gebiete an Deutschland abgetreten wurden und die Garnisonen in Ober Ost, die nach ihrer Niederlage nach Deutschland zurückgezogen wurden, nun von seinen Marionetten im Stich gelassen wurden, haben wir beschlossen, unsere Truppen in diese verlassenen Gebiete zurückzuziehen, um sie wieder dort anzusiedeln, wo sie hingehören: bei uns!"
interwar_soviet.3.a:0 "Wir bekommen unser Land zurück!"
interwar_soviet.4.t:0 "Intervention auf Seiten der Ungarn"
interwar_soviet.4.d:0 "Da die Ungarische Sowjetrepublik in einer benachteiligten Lage ist, den Ruhm des Kommunismus unter den sie umgebenden erbärmlichen Kapitalisten zu verbreiten, haben wir uns entschlossen, ihre Bemühungen zu unterstützen und sicherzustellen, dass sie nicht umsonst sind, da wir in der Lage sind, unseren kommunistischen Mitbürgern an der Grenze zu ihren Feinden, den Rumänen, zu helfen."
interwar_soviet.4.a:0 "Erhebt euch, meine Kameraden!"
interwar_soviet.5.t:0 "Intervenieren Sie auf der Seite des Roten Finnlands"
interwar_soviet.5.d:0 "Da das rote Finnland in einer benachteiligten Position ist, den Ruhm des Kommunismus unter den elenden Kapitalisten um es herum zu verbreiten, haben wir uns entschlossen, uns ihren Bemühungen anzuschließen und sicherzustellen, dass sie nicht umsonst sind, da wir in der Lage sind, unseren kommunistischen Mitbürgern zu helfen!"
interwar_soviet.5.a:0 "Erhebt euch, meine Kameraden!"
interwar_soviet.6.t:0 "Invasion Aserbaidschans"
interwar_soviet.6.d:0 "Nach der Niederlage der Mittelmächte im Ersten Weltkrieg gibt es weder einen Vertrag noch ausländische Armeen, die diese elenden, einsamen und isolierten kapitalistischen Staaten verteidigen könnten, die zum Mutterland gehören!"
interwar_soviet.6.a:0 "Du gehörst zu UNS!"
interwar_soviet.7.t:0 "Invasion Georgiens"
interwar_soviet.7.d:0 "Nach der Niederlage der Mittelmächte im Ersten Weltkrieg gibt es weder einen Vertrag noch ausländische Armeen, die diese elenden, einsamen und isolierten kapitalistischen Staaten verteidigen könnten, die zum Mutterland gehören!"
interwar_soviet.7.a:0 "Du gehörst zu UNS!"
interwar_soviet.8.t:0 "Invasion Armeniens"
interwar_soviet.8.d:0 "Nach der Niederlage der Mittelmächte im Ersten Weltkrieg gibt es weder einen Vertrag noch ausländische Armeen, die diese elenden, einsamen und isolierten kapitalistischen Staaten verteidigen könnten, die zum Mutterland gehören!"
interwar_soviet.8.a:0 "Du gehörst zu UNS!"
interwar_soviet.9.t:0 "Vertrag von Kars"
interwar_soviet.9.d:0 "Nach der Niederlage der transkaukasischen Staaten haben wir beschlossen, eine gemeinsame Grenze zwischen unseren türkischen Freunden und uns zu errichten. Der in der Stadt Kars unterzeichnete Vertrag hat das Gebiet von Kars, das im Russisch-Türkischen Krieg von 1877-78 vom Russischen Reich erobert worden war, an die heutige Republik Türkei zurückgegeben."
interwar_soviet.9.a:0 "Es ist keine große Sache!"
interwar_soviet.10.t:0 "Unterstützung des roten Finnlands"
interwar_soviet.10.d:0 "Da das rote Finnland geschwächt ist und Hilfe braucht, haben wir beschlossen, unseren kommunistischen Mitbürgern unter die Arme zu greifen und sie mit Waffen für ihren glorreichen Kampf gegen die Kapitalisten zu versorgen!"
interwar_soviet.10.a:0 "Hoffen wir, dass sie diese Vorräte gut gebrauchen können!"
interwar_soviet.11.t:0 "Hilfe für die Ungarische Räterepublik"
interwar_soviet.11.d:0 "Da die Ungarische Sowjetrepublik schwach ist und Hilfe braucht, haben wir beschlossen, unseren kommunistischen Mitbürgern unter die Arme zu greifen und sie mit Waffen für ihren glorreichen Kampf gegen die Kapitalisten zu versorgen!"
interwar_soviet.11.a:0 "Hoffen wir, dass sie diese Vorräte gut gebrauchen können!"
interwar_soviet.12.t:0 "Gründung der Rumänischen Sozialistischen Sowjetrepublik"
interwar_soviet.12.d:0 "Da Rumänien im Kampf gegen die gescheiterten Versuche, die Ausbreitung des so glorreichen Kommunismus zu stoppen, eine Niederlage erlitten hat, haben wir beschlossen, diese Gelegenheit zu nutzen und in Rumänien einen kommunistischen Staat zu errichten, der die alte Regierung ersetzt. Denn wo wir unsere Feinde besiegen, müssen wir neue Verbündete gewinnen!"
interwar_soviet.12.a:0 "Gut"
interwar_soviet.13.t:0 "Marionettenspiel der Ungarischen SR"
interwar_soviet.13.d:0 "Da die Ungarische Sowjetrepublik uns gegenüber in einer schwachen Position ist und bei ihrer Verteidigung weitgehend auf unsere Unterstützung angewiesen ist, haben wir beschlossen, diese Gelegenheit nicht ungenutzt verstreichen zu lassen und einen Marionettenstaat für uns selbst zu schaffen, um sicherzustellen, dass das Leuchtfeuer des Kommunismus im Zentrum Europas verbleibt und uns bei Bedarf in der Zukunft zur Seite steht."
interwar_soviet.13.a:0 "Gut"
interwar_soviet.14.t:0 "Vertrag von Tartu"
interwar_soviet.14.d:0 "Nach monatelangen Verhandlungen wurde mit dem Vertrag von Tartu die endgültige Grenze zwischen Finnland und unserem Land nach dem finnischen Bürgerkrieg festgelegt. Der Vertrag wurde in Tartu unterzeichnet und beim Völkerbund registriert."
interwar_soviet.14.a:0 "OK"
interwar_soviet.15.t:0 "Marionettenspiel Rotes Finnland"
interwar_soviet.15.d:0 "Da das rote Finnland uns gegenüber in einer schwachen Position ist und bei seiner Verteidigung und beim Machterhalt im Land weitgehend auf unsere Unterstützung angewiesen ist, haben wir beschlossen, diese Gelegenheit nicht ungenutzt verstreichen zu lassen und einen Marionettenstaat für uns geschaffen, um sicherzustellen, dass Finnland zumindest in gewisser Weise mit uns verbunden bleibt, wie in alten Zeiten."
interwar_soviet.15.a:0 "Großartig"
interwar_soviet.16.t:0 "Japanische Evakuierung"
interwar_soviet.16.d:0 "Die Japaner haben die Weiße Fraktion stark unterstützt, höchstwahrscheinlich in der Hoffnung, Territorium zu gewinnen oder ihren Einfluss im Fernen Osten zu vergrößern. Nach der Niederlage Weißrusslands werden wir jedoch kein weiteres japanisches Engagement unbemerkt lassen, sie müssen gehen."
interwar_soviet.16.a:0 "Sie müssen gehen"
interwar_soviet.17.t:0 "Wiedereingliederung der Fernöstlichen Republik"
interwar_soviet.17.d:0 "Da die Bedrohung durch Japan weitgehend abgenommen hat, haben wir Maßnahmen ergriffen, um die Fernöstliche Republik wieder zu integrieren. Die Regierung löste sich auf und übertrug ihre gesamte Autorität und ihr gesamtes Territorium an unsere Regierung in Moskau zurück."
interwar_soviet.17.a:0 "Gut"
interwar_soviet.18.t:0 "Sowjetisch-Japanisches Abkommen"
interwar_soviet.18.d:0 "Da unsere Beziehungen während des Bürgerkriegs infolge der Unterstützung der Weißen Fraktion durch Japan und der anschließenden Besetzung von Gebieten im Fernen Osten schwer beschädigt wurden, haben wir beschlossen, die Beziehungen zwischen unseren beiden Ländern hoffentlich durch die Unterzeichnung des sowjetisch-japanischen Grundkonventionsvertrags zu normalisieren."
interwar_soviet.18.a:0 "Gut, wir sollten keine Feinde sein"
interwar_soviet.19.t:0 "Invasion der Mongolei"
interwar_soviet.19.d:0 "Angesichts der Invasion von Roman von Ungern-Sternberg, einem Mitglied der Weißen Bewegung, in der Mongolei in der Hoffnung, das sogenannte „Mongolische Reich“ wiederherzustellen, ist es unsere Pflicht, den Mongolen im Kampf gegen diesen imperialistischen Größenwahnsinnigen zu helfen."
interwar_soviet.19.a:0 "Sie werden gerettet!"
interwar_soviet.20.t:0 ""
interwar_soviet.20.d:0 ""
interwar_soviet.20.a:0 ""
interwar_soviet.21.t:0 "Kriegskommunismus"
interwar_soviet.21.d:0 "Mit dem Ziel, die Städte und die Rote Armee mit Lebensmitteln und Waffen zu versorgen, haben wir das System des Kriegskommunismus eingeführt, das notwendig ist, da der andauernde Krieg die normalen wirtschaftlichen Mechanismen und Beziehungen stört. \n\n Der Kriegskommunismus wird die folgenden Maßnahmen beinhalten: 1. Verstaatlichung aller Industrien, 2. Staatliche Kontrolle des Außenhandels, 3. Strenge Disziplin für Arbeiter, Streiks verboten, 4. Zwangsarbeit für nicht arbeitende Klassen, 5. Prodraswyorstka, 6. Rationierung von Lebensmitteln und den meisten Waren, 7. Verbot privater Unternehmen und 8. Militärische Kontrolle der Eisenbahn."
interwar_soviet.21.a:0 "Eine notwendige Sache"
interwar_soviet.22.t:0 "Gründung der CHEKA"
interwar_soviet.22.d:0 "Die vom Rat der Volkskommissare gegründete Tscheka steht unter der Führung von Felix Dserschinski, der diese Geheimpolizeiorganisation leiten wird. Die Tscheka wird Arbeitslager überwachen, Lebensmittel beschlagnahmen und politische Gegner geheim verhaften (Inhaftierung, Folter und standrechtliche Hinrichtung). Sie wird auch Aufstände und Unruhen der Arbeiter und Bauern sowie Meutereien der von Desertion geplagten Roten Armee niederschlagen."
interwar_soviet.22.a:0 "Großartig!"
interwar_soviet.23.t:0 "Entkosakisierung"
interwar_soviet.23.d:0 "Da die Kosaken uns und unseren Idealen weitgehend ablehnend gegenüberstehen, haben wir uns zu einer systematischen Repression gegen die Kosaken des ehemaligen Russischen Reiches entschlossen, insbesondere gegen die Don- und Kuban-Kosaken, die die Weiße Bewegung in den südlichen Regionen offen und stark unterstützt haben. Dies wird hoffentlich die Kosaken als eigenständige ethnische, politische und wirtschaftliche Einheit beseitigen."
interwar_soviet.23.a:0 "Gut"
interwar_soviet.24.t:0 "Roter Terror"
interwar_soviet.24.d:0 "Angesichts der Notwendigkeit politischer Unterdrückung der inneren Feinde, die uns zerstören wollen, haben wir eine landesweite Aktion gestartet, um diese Verräter mit allen erforderlichen Mitteln loszuwerden …"
interwar_soviet.24.a:0 "Tod den Feinden!"
interwar_soviet.25.t:0 "Neue Wirtschaftspolitik"
interwar_soviet.25.d:0 "Die Neue Ökonomische Politik, die der berühmte Wladimir Lenin vorschlug, bezeichnete er als eine Weiterentwicklung des Staatskapitalismus im Arbeiterstaat UdSSR. Lenin charakterisierte seine NEP-Politik als „freien Markt und Kapitalismus unter staatlicher Kontrolle“, während vergesellschaftete Staatsunternehmen auf Profitbasis wirtschaften sollten. All dies wurde nach dem tödlichen und zerstörerischen russischen Bürgerkrieg als notwendig erachtet, um die Wirtschaft des fast völlig ruinierten Landes wieder anzukurbeln."
interwar_soviet.25.a:0 "Eine notwendige Aktion"
interwar_soviet.26.t:0 ""
interwar_soviet.26.d:0 ""
interwar_soviet.26.a:0 ""
interwar_soviet.27.t:0 "Konkretisierung von Getreide"
interwar_soviet.27.d:0 "Um unsere Truppen mit Lebensmitteln zu versorgen, mussten wir ein System der Getreidebeschlagnahmung bei den Bauern einführen, um unseren Bedarf zu decken. Dies hat jedoch wiederum zu heftigen Gegenreaktionen seitens der Bauern geführt, von denen einige zu unseren Feinden geworden sind."
interwar_soviet.27.a:0 "Schade, aber notwendig"
interwar_soviet.28.t:0 "Vertrag zur Gründung der UdSSR"
interwar_soviet.28.d:0 "Heute wurde der Vertrag zur Gründung der UdSSR offiziell unterzeichnet. Damit wurde der Zusammenschluss mehrerer Sowjetrepubliken legalisiert und eine neue zentralisierte Bundesregierung geschaffen, deren Schlüsselfunktionen in Moskau zentralisiert werden sollen."
interwar_soviet.28.a:0 "Großartig"
interwar_soviet.29.t:0 "Die Notwendigkeit von Arbeitslagern"
interwar_soviet.29.d:0 "Unter dem glorreichen Führer Wladimir Lenin wurde eine neue Regierungsbehörde geschaffen, die Hauptverwaltung der Besserungsarbeitslager. In den Lagern soll ein breites Spektrum an Sträflingen untergebracht werden, von Kleinkriminellen bis hin zu politischen Gefangenen."
interwar_soviet.29.a:0 "Ein großartiger Ort, um unsere Feinde unterzubringen!"
interwar_soviet.30.t:0 "GOELRO-Plan"
interwar_soviet.30.d:0 "Nach dem Ende des russischen Bürgerkriegs schlug der ruhmreiche Führer Wladimir Lenin einen Plan für die erste nationale wirtschaftliche Erholung und Entwicklung der Nation vor. Der Plan sieht die Elektrifizierung ganz Russlands vor. Lenin sagte: „Kommunismus ist die Sowjetregierung plus die Elektrifizierung des ganzen Landes.“"
interwar_soviet.30.a:0 "Wir begrüßen diese Entwicklung!"
interwar_soviet.31.t:0 ""
interwar_soviet.31.d:0 ""
interwar_soviet.31.a:0 ""
interwar_soviet.32.t:0 ""
interwar_soviet.32.d:0 ""
interwar_soviet.32.a:0 ""
interwar_soviet.33.t:0 "Integration des Roten Finnlands"
interwar_soviet.33.d:0 "Der Sieg des Roten Finnlands aus dem finnischen Bürgerkrieg ist größtenteils uns und unserer Unterstützung zu verdanken. Aufgrund ihrer Abhängigkeit von uns haben wir den sozialistischen Staat stillschweigend, aber effektiv dazu gebracht, wieder ein Teil des Mutterlandes zu werden."
interwar_soviet.33.a:0 "Großartig!"
interwar_soviet.34.t:0 "Intervention in Persien"
interwar_soviet.34.d:0 "Die Persische Sozialistische Republik wird keine Fortschritte machen, wenn wir lediglich Nachschub über das Kaspische Meer schicken. Was sie braucht, ist die Macht der Roten Armee, um die persischen Autokraten in Teheran schnell und effektiv zu zerschlagen."
interwar_soviet.34.a:0 "Wir helfen ihnen dabei"
interwar_soviet.35.t:0 "Beschäftigung zaristischer Offiziere"
interwar_soviet.35.d:0 "Aufgrund unseres Mangels an guter Führung ist es notwendig geworden, russische Offiziere zwangsweise anzuwerben und ihre Familien zu bedrohen, um sie zu unterstützen. Dennoch ist dies ein bemerkenswerter Versuch. Mit ihrer Führung sollten wir in der Lage sein, die Rote Armee zu einer viel organisierteren und kompetenteren Truppe zu machen, die der Weißen Bewegung gegenübersteht."
interwar_soviet.35.a:0 "Gut"
interwar_soviet.36.t:0 "Attentat auf Lenin!"
interwar_soviet.36.d:0 "Heute, am 30. August 1918, nachdem Wladimir Lenin im Anschluss an seine Rede in der Hammer-und-Sichel-Fabrik in Moskau das Gebäude verließ, rief Fanny Kaplan, eine radikale Revolutionärin, die Lenin als „Verräter der Revolution“ ansah, Lenin zu, und als er sich zu ihr umdrehte, feuerte sie drei Schüsse aus einer Browning-Pistole ab. \n\n Eine der Kugeln durchschlug Lenins Mantel, die anderen beiden trafen ihn, eine durchschlug seinen Hals und die anderen durchbohrten einen Teil seiner linken Lunge und blieben in seiner linken Schulter stecken. Lenin wurde in seine Unterkunft im Kreml zurückgebracht, und aus Angst vor anderen Verschwörern weigerte er sich, sofort ärztliche Hilfe in Anspruch zu nehmen. Später wurden Ärzte gerufen, um ihn zu behandeln, und konnten die Kugeln nicht sofort entfernen. Lenin hat es jedoch bemerkenswerterweise geschafft zu überleben."
interwar_soviet.36.a:0 "Sie ist eine Verräterin der Revolution!"
interwar_soviet.37.t:0 "Die königliche Familie hinrichten?"
interwar_soviet.37.d:0 "Am 17. Juli 1918 wurden der Zar und seine Familie während ihrer Gefangenschaft in Jekaterinburg von Jakow Jurowski auf Befehl des Ural-Regionalsowjets ermordet, da die Weiße Armee vorrückte und drohte, die Stadt einzunehmen. Sollte Nikolaus II. in die Hände der Weißen fallen, befürchtete man, dass er als Fanal für die weiße Sache eingesetzt werden würde. Stünde der Zar auf der Seite der Weißen, hätte dies eine verstärkte ausländische Intervention der Alliierten zur Folge, die den Zaren als legitimen Herrscher Russlands ansehen würden."
interwar_soviet.37.a:0 "Richten Sie diese verdammten Aristokraten aus"
interwar_soviet.37.b:0 "Lass sie leben"
interwar_soviet.38.t:0 "Kronstädter Aufstand"
interwar_soviet.38.d:0 "Heute, am 7. März 1921, kam es auf der Insel Kotlin, einer Marinefestung in Kronstadt, zu einem großen Aufstand gegen uns. Der Aufstand bestand hauptsächlich aus russischen Matrosen, Soldaten und Zivilisten und wurde nach Angaben der Rebellen durch Lenins Entscheidung ausgelöst, die Kontrolle über die russische Wirtschaft zu lockern (Neue Ökonomische Politik). Der Aufstand war jedoch weitgehend erfolglos und wurde nach einem zwölftägigen Feldzug, der insgesamt rund 3.000 bis 4.000 Todesopfer forderte, niedergeschlagen."
interwar_soviet.38.a:0 "Verräter!"
interwar_soviet.39.t:0 "Sowjetrussland besiegt: Weißer Sieg!"
interwar_soviet.39.d:0 "Nach einem langen und brutalen Krieg zwischen Sowjetrussland und der Weißen Bewegung haben die russischen Roten schließlich kapituliert, nachdem die Weiße Bewegung die wichtigsten Stützpunkte Moskau, Petrograd und Zarizyn erobert und die Roten in mehreren Gebieten abgeschnitten und eingekesselt hatte. Obwohl die Roten endgültig verloren haben, ist der Weg für die stark gespaltene Weiße Bewegung noch immer nicht frei, was sich bereits während des Bürgerkriegs zeigte, als die Führung der Bewegung aus mehreren Anführern statt einem bestand. Der folgende Machtkampf wird die Nation sicherlich noch tiefer in Trümmer legen, doch für den Moment haben wir gegen die bösen bolschewistischen Kräfte gewonnen, und das ist im Moment das Wichtigste ..."
interwar_soviet.39.a:0 "Tod den Bolschewiki!"
interwar_soviet.40.t:0 "Weißrussland besiegt: Sieg der Bolschewisten!"
interwar_soviet.40.d:0 "Nach einem langen und brutalen Krieg zwischen der Russischen Sozialistischen Sowjetrepublik und der Weißen Bewegung scheiterte die gespaltene und unentschlossene Weiße Bewegung schließlich an ihren eigenen Fehlern und erholte sich nie wieder. Die Roten übernahmen die totale Vorherrschaft in Politik und Regierung des neuen Staates. Die Weißen haben endgültig verloren, doch dem Land stehen noch schwere Zeiten bevor. Wir müssen aus der aktuellen Lage einen erfolgreichen Weg zum Kommunismus ebnen und die Revolution verbreiten!"
interwar_soviet.40.a:0 "Macht den Sowjets!"
interwar_soviet.41.t:0 "Gründung der Republik im Fernen Osten"
interwar_soviet.41.d:0 "Die Fernöstliche Republik wurde gegründet, da nach dem Ende des russischen Bürgerkriegs, der zur Evakuierung japanischer und einheimischer weißer Truppen führte, in dieser Region ein politisches Vakuum entstand. In Tschita wurde eine neue Zentralregierung zur Verwaltung der Fernöstlichen Republik eingerichtet. Sie gilt als vorübergehender Pufferstaat zwischen uns und den noch von Japan und seinen Verbündeten besetzten Gebieten. Die Fernöstliche Republik wird als eine Art Vertrag von Brest-Litowsk im Osten betrachtet, der uns etwas Luft verschafft und uns ermöglicht, uns wirtschaftlich und militärisch zu erholen, bevor wir das Gebiet wieder eingliedern können."
interwar_soviet.41.a:0 "Eine notwendige Vorsichtsmaßnahme"
interwar_soviet.42.t:0 "Goldzug in Kasan bricht zusammen"
interwar_soviet.42.d:0 "Der Zug mit den russischen Goldreserven des ehemaligen Zarenreichs ist im Kasaner Bahnhof blockiert. Wir werden ihn nicht vor Anfang Oktober reparieren können. Wir müssen Kasan lange genug halten, um den Zug zu reparieren und seine Einnahme durch die Weißen Streitkräfte zu verhindern. In ihren Händen wird ihnen das Gold enorm dabei helfen, ihre Armeen aufzubauen und ausländische Waffen zu kaufen."
interwar_soviet.42.a:0 "Oh oh!"
interwar_soviet.43.t:0 "Gründung der Don-Sowjetrepublik"
interwar_soviet.43.d:0 "Nach unserem Sieg über die Don-Republik besteht nun die Möglichkeit, eine Don-Sowjetrepublik zu gründen. Dies würde die Stabilität in der Region erhöhen, Verwaltungsaufgaben entlasten und die lokale Unterstützung stärken. Allerdings hätten wir dann weniger direkte Kontrolle über das Gebiet."
interwar_soviet.43.a:0 "Wir brauchen ihre Unterstützung."
interwar_soviet.43.b:0 "Wir werden unsere eigene Unterstützung sichern."
interwar_soviet.44.t:0 "Das Schicksal der Don-Sowjetrepublik"
interwar_soviet.44.d:0 "Nach Kriegsende muss nun das Schicksal der Don-Sowjetrepublik entschieden werden. Soll sie als anerkannter Staat der Sowjetunion unterstellt werden oder direkt in die Sowjetunion eingegliedert werden?"
interwar_soviet.44.a:0 "Sie werden voll anerkannt."
interwar_soviet.44.b:0 "Teilweise Anerkennung für teilweisen Schutz."
interwar_soviet.44.c:0 "Wir werden sie annektieren."
interwar_soviet.45.t:0 ""
interwar_soviet.45.d:0 ""
interwar_soviet.45.a:0 ""
interwar_soviet.46.t:0 "Estland bietet Frieden"
interwar_soviet.46.d:0 "Estnische Politiker boten ein Ende des Krieges an, um die Kriegsmüdigkeit und die Spannungen zu beenden, während sie sich nur auf ihre Unabhängigkeit von den Russen und den Erhalt ihrer neu geschaffenen nationalen Souveränität berufen. Die Verhandlungen in Tartu begannen, und sie strebten nicht nur Unabhängigkeit und Frieden an, sondern auch die Anerkennung des neuen Regimes."
interwar_soviet.46.a:0 "Es ist ein Sieg gegen den Imperialismus!"
interwar_soviet.46.b:0 "Unsere Kameraden dürfen nicht im Stich gelassen werden"
interwar_soviet.47.t:0 "Litauen bietet Frieden an"
interwar_soviet.47.d:0 "Litauische Politiker boten ein Ende des Krieges an, um die Kriegsmüdigkeit und die Spannungen zu beenden, während sie sich nur auf ihre Unabhängigkeit von den Russen und den Erhalt ihrer neu geschaffenen nationalen Souveränität berufen. Sie strebten nicht nur nach Unabhängigkeit und Frieden, sondern auch nach der Anerkennung des neu etablierten Regimes. Unsere Genossen suchen nach einer guten taktischen Gelegenheit gegen das polnische Regime, da ein militärischer Vormarsch durch ihr Territorium diskutiert wird."
interwar_soviet.47.a:0 "Es ist eine gute Gelegenheit"
interwar_soviet.47.b:0 "Unsere Kameraden dürfen nicht im Stich gelassen werden"
interwar_soviet.48.t:0 "Lettland bietet Frieden an"
interwar_soviet.48.d:0 "Lettische Politiker boten ein Ende des Krieges an, um die Kriegsmüdigkeit und die Spannungen zu beenden, während sie sich nur auf ihre Unabhängigkeit von den Russen und den Erhalt ihrer neu geschaffenen nationalen Souveränität berufen. Die Verhandlungen in Riga haben begonnen, und sie streben nicht nur Unabhängigkeit und Frieden an, sondern auch die Anerkennung des neuen Regimes."
interwar_soviet.48.a:0 "Wir werden diesen unsinnigen Krieg beenden"
interwar_soviet.48.b:0 "Unsere Kameraden dürfen nicht im Stich gelassen werden"
interwar_soviet.49.t:0 "Das Schicksal von Pavel Dybenko"
interwar_soviet.49.d:0 "Pavel Dybenko hatte bereits bewiesen, dass er nicht das ideale Profil für einen Soldaten hatte und kein vertrauenswürdiger Soldat für uns war. Er verriet unsere Kameraden bereits, wenn sich die Gelegenheit bot, und verbündete sich mit den Anarchisten und VolkstümlerInnen. Seine Trunkenheit und Feigheit schadeten unserer Bewegung bereits, als er zusammen mit der Marine in seinem Kommando nach Saufgelagen aus der Schlacht floh. Doch auch danach könnte er noch gebraucht werden, seine Führung könnte der Revolution sehr nützlich sein."
interwar_soviet.49.a:0 "Er wird noch gebraucht."
interwar_soviet.49.b:0 "Kein solcher Mann sollte das rote Banner schwingen."
interwar_soviet.50.t:0 "Der Tod von Michail Frunse"
interwar_soviet.50.d:0 "Am 31. Oktober verstarb unser geschätzter Genosse Michail Frunse. Sein Gesundheitszustand verschlechterte sich nach jahrelangem Leiden an einem chronischen Magengeschwür rapide. Dennoch ist dies für unsere Genossen insgesamt ein Schock, da Frunse zweifellos einer der charakterstärksten Genies der revolutionären Partei war und seine Verdienste um die Rote Armee unvergessen sind und nie in Vergessenheit geraten werden. Er ist einer der möglichen Erben von Lenins Erbe. Seine Entscheidung, sich trotz des Rats seiner Vertrauten nicht operieren zu lassen, hatte schwerwiegende Folgen."
interwar_soviet.50.a:0 "Ein großer Verlust für die Sowjets."
interwar_soviet.56.t:0 "Die fünf sowjetischen Marschälle"
interwar_soviet.56.d:0 "After a major wave of Red Army restructuring, it became evident the need for new major heads for the Army, comprised of those who demonstrated guts defending the revolution, and shown to be the  exemplar commanders, standing out among other of our comrades, they will be the ones assigned to the great responsibility of dealing with the revolutionary army reforms, using of the socialist democracy to work with it.\n\ Kliment Voroshilov, Semyon Budyonny, Mikhail Tukhachevsky, Vasily Blucher, Alexander Yegorov, those are the name of our dearest comrades.
interwar_soviet.56.a:0 "Ein großer Schritt"


interwar_white_russia.1.t:0 "Die Schlacht der Häuptlinge!"
interwar_white_russia.1.d:0 "WICHTIG BITTE LESEN\n\n Im Sommer 1918 hatten die Weißen im Süden zwei historische Optionen. Beide Optionen wurden von zwei verschiedenen Anführern unterstützt, die davon ausgingen, die einzigen Oberbefehlshaber der Weißen Bewegung zu sein. Der erste ist Pjotr Krasnow, ein autonomer Anführer der Donkosaken und ehemaliger Oberbefehlshaber der provisorischen Regierung der Republik Kerenski von 1917. Krasnow ist bereit, sich mit der Ukraine und den neuen unabhängigen Staaten des ehemaligen Russischen Reiches zu verbünden, um die Bolschewiken zu bekämpfen. Seine Priorität besteht darin, Zarizyn anzugreifen und sich mit den Weißen im Osten zu verbünden, bevor er mit ihnen Moskau angreift.\n\n Die zweite Option wurde von Anton Denikin, dem Anführer der Russischen Freiwilligen, unterstützt. Denikin weigert sich, die Kontrolle über die Gebiete des Russischen Reiches aufzugeben und ist nicht bereit, die Ukraine und andere Nachbarstaaten des ehemaligen Zarenreichs anzuerkennen und sich mit ihnen zu verbünden. Denikins Priorität besteht darin, das Kubangebiet und den Nordkaukasus von den Bolschewiken zu befreien, bevor er Moskau von Süden her durch die Ukraine angreift. \N\N Wenn Sie sich für die Krasnov-Strategie entscheiden und es ihm gelingt, die Schlüsselstadt Zarizyn zu erobern, wird ihn dieser große Sieg zum Anführer der westlichen Weißen machen. Als autonomer Donkosak würde er sich dann mit den ukrainischen Nationalisten verbünden, anstatt sie zu bekämpfen. Nicht zuletzt wäre dies ein erster Schritt zur Vereinigung der weißen Fraktionen an der Wolga."
interwar_white_russia.1.a:0 "Krasnov-Strategie"
interwar_white_russia.1.b:0 "Denikin-Strategie"
interwar_white_russia.2.t:0 "Die Wiederherstellung der Ordnung"
interwar_white_russia.2.d:0 "Jetzt, da das Deutsche Reich gefallen ist und seine Garantien für die Staaten nach Brest-Litowsk erloschen sind, ist es für uns an der Zeit, die Ordnung in den Gebieten des ehemaligen Zarenreichs wiederherzustellen. Polen, Finnland, die baltischen Staaten, die Ukraine und die Kaukasusstaaten sind illegitime Regierungen, die ins Mutterland zurückgebracht werden müssen."
interwar_white_russia.2.a:0 "Wir werden die wahre Ordnung wiederherstellen!"
interwar_white_russia.3.t:0 "Wiederherstellung der Ordnung in Polen"
interwar_white_russia.3.d:0 "Diese lästigen Polen haben sich früher mit den Deutschen angefreundet, die ihnen zu ihrer Unabhängigkeit verholfen haben, aber jetzt, da die Deutschen den Krieg verloren und sich aus ihren ehemaligen Marionettenstaaten zurückgezogen haben, haben die Polen keinen Beschützer mehr. Daher sehen wir es als unsere Pflicht an, dieses illegitime Land auszulöschen und es zu zwingen, sich unserer Macht zu unterwerfen."
interwar_white_russia.3.a:0 "Zerquetschen Sie diese Kakerlaken!"
interwar_white_russia.4.t:0 "Wiederherstellung der Ordnung in der Ukraine"
interwar_white_russia.4.d:0 "Diese lästigen Ukropen wurden früher vom Deutschen Reich beschützt, das ihnen nach dem Vertrag von Brest-Litowsk zu ihrer Unabhängigkeit verhalf. Doch jetzt, da die Deutschen den Krieg verloren und sich aus ihren ehemaligen Marionettenstaaten zurückgezogen haben, haben die Ukropen keinen Beschützer mehr. Daher sehen wir es als unsere Pflicht an, dieses illegitime Land auszulöschen und es zu zwingen, sich unserer Macht zu unterwerfen."
interwar_white_russia.4.a:0 "Was zum Teufel ist eine „Ukraine“?"
interwar_white_russia.5.t:0 "Wiederherstellung der Ordnung in Finnland"
interwar_white_russia.5.d:0 "Diese lästigen Finnen wurden früher vom Deutschen Reich beschützt, das ihnen nach der finnischen Unabhängigkeitsbewegung zu ihrer Unabhängigkeit verhalf. Doch jetzt, da die Deutschen den Krieg verloren und sich aus ihren ehemaligen Marionettenstaaten zurückgezogen haben, haben die Finnen – ob rot oder weiß – keinen Beschützer mehr. Daher sehen wir es als unsere Pflicht an, dieses illegitime Land auszulöschen und es zu zwingen, sich unserer Macht zu unterwerfen."
interwar_white_russia.5.a:0 "Wie in den guten alten Zeiten"
interwar_white_russia.6.t:0 "Wiederherstellung der Ordnung im Baltikum"
interwar_white_russia.6.d:0 "Diese lästigen baltischen Staaten wurden früher vom Deutschen Reich beschützt, das ihnen nach dem Vertrag von Brest-Litowsk zu ihrer Unabhängigkeit verhalf. Doch jetzt, da die Deutschen den Krieg verloren und sich aus ihren ehemaligen Marionettenstaaten zurückgezogen haben, haben die baltischen Staaten keinen Beschützer mehr. Daher sehen wir es als unsere Pflicht an, diese illegitimen Länder auszulöschen und sie zu zwingen, sich unserer Macht zu unterwerfen."
interwar_white_russia.6.a:0 "Jetzt hilft dir keiner mehr!"
interwar_white_russia.7.t:0 "Wiederherstellung der Ordnung im Kaukasus"
interwar_white_russia.7.d:0 "Diese lästigen Kaukasusstaaten wurden zuvor weitgehend vom Deutschen Reich und den Türken beschützt, die ihnen nach dem Vertrag von Brest-Litowsk zu ihrer Unabhängigkeit verholfen hatten. Doch jetzt, da die Deutschen und das Osmanische Reich den Krieg verloren und sich aus ihren ehemaligen Marionettenstaaten zurückgezogen haben, haben die Kaukasusstaaten keine Beschützer mehr. Daher sehen wir es als unsere Pflicht an, diese illegitimen Länder auszulöschen und sie zu zwingen, sich unserer Macht zu unterwerfen."
interwar_white_russia.7.a:0 "Die Ordnung soll wiederhergestellt werden!"
interwar_white_russia.8.t:0 "Die Anerkennung ehemaliger Zarenstaaten"
interwar_white_russia.8.d:0 "Obwohl das Deutsche Reich und seine Verbündeten gefallen sind und damit sämtliche Garantien für die ehemaligen Staaten des Zarenreichs sowie deren Unabhängigkeit null und nichtig geworden sind, wäre es zumindest vorerst ein viel klügerer Schachzug, sich mit diesen neuen Nationen zu verbünden und unsere vereinte Macht einzusetzen, um die bolschewistische Bestie ein für alle Mal zu zerschlagen, sodass der Kommunismus weder jetzt noch in Zukunft eine Bedrohung für Europa darstellt."
interwar_white_russia.8.a:0 "Gemeinsam werden wir die Roten besiegen!"
interwar_white_russia.9.t:0 "Anerkennung Polens"
interwar_white_russia.9.d:0 "Die Republik Polen hat sich bereit erklärt, sich mit uns gegen die Bolschewiken zu verbünden. Daher haben wir uns zu ihren Bedingungen bereit erklärt, ihre Unabhängigkeit anzuerkennen und sie in Zukunft nicht in Frage zu stellen. Ihre Hilfe wird uns sehr helfen, diese bolschewistische Bestie ein für alle Mal zu besiegen!"
interwar_white_russia.9.a:0 "nun ja"
interwar_white_russia.10.t:0 "Anerkennung der Ukraine"
interwar_white_russia.10.d:0 "Die Ukraine hat sich bereit erklärt, sich mit uns gegen die Bolschewiken zu verbünden. Daher haben wir uns zu ihren Bedingungen bereit erklärt, ihre Unabhängigkeit anzuerkennen und sie in Zukunft nicht in Frage zu stellen. Ihre Hilfe wird uns sehr helfen, diese bolschewistische Bestie ein für alle Mal zu besiegen!"
interwar_white_russia.10.a:0 "Es schmerzt mich, aber na ja"
interwar_white_russia.11.t:0 "Anerkennung der baltischen Staaten"
interwar_white_russia.11.d:0 "Die baltischen Staaten haben sich bereit erklärt, sich mit uns gegen die Bolschewiken zu verbünden. Daher haben wir uns zu ihren Bedingungen bereit erklärt, ihre Unabhängigkeit anzuerkennen und sie in Zukunft nicht in Frage zu stellen. Ihre Hilfe wird uns sehr helfen, diese bolschewistische Bestie ein für alle Mal zu besiegen!"
interwar_white_russia.11.a:0 "Gemeinsam werden wir triumphieren!"
interwar_white_russia.12.t:0 "Anerkennung Finnlands"
interwar_white_russia.12.d:0 "Finnland hat sich bereit erklärt, sich mit uns gegen die Bolschewiken zu verbünden. Daher haben wir uns zu ihren Bedingungen bereit erklärt, ihre Unabhängigkeit anzuerkennen und sie in Zukunft nicht in Frage zu stellen. Ihre Hilfe wird uns sehr nützlich sein, um diese bolschewistische Bestie ein für alle Mal zu besiegen!"
interwar_white_russia.12.a:0 "Unsere Konflikte liegen in der Vergangenheit"
interwar_white_russia.13.t:0 "Anerkennung der Caucus-Staaten"
interwar_white_russia.13.d:0 "Die Kaukasusstaaten haben sich bereit erklärt, sich mit uns gegen die Bolschewiken zu verbünden. Daher haben wir uns zu ihren Bedingungen bereit erklärt, ihre Unabhängigkeit anzuerkennen und sie in Zukunft nicht in Frage zu stellen. Ihre Hilfe wird uns sehr helfen, diese bolschewistische Bestie ein für alle Mal zu besiegen!"
interwar_white_russia.13.a:0 "Die Bolschewiki haben keine Chance!"
interwar_white_russia.14.t:0 "Koltschak erklärt sich selbst zum „Obersten Herrscher Russlands“"
interwar_white_russia.14.d:0 "Heute wurde in einem regionalen Staatsstreich die Regierung der Region Omsk gestürzt. Die verbliebenen Kabinettsmitglieder, die für die Absetzung stimmten, ernannten Alexander Koltschak zum Obersten Herrscher. Mit dieser Beförderung wurde Koltschak selbst zum Admiral befördert, und die sozialrevolutionären Politiker wurden verhaftet und aus Sibirien verbannt. Koltschak hat Folgendes gesagt: \n\n „Die provisorische allrussische Regierung ist zu Ende. Der Ministerrat, der alle Macht in seinen Händen hält, hat mir, Admiral Alexander Koltschak, diese Macht übertragen. Ich habe diese Verantwortung unter den außergewöhnlich schwierigen Umständen des Bürgerkriegs und der völligen Desorganisation des Landes übernommen und erkläre hiermit, dass ich weder den reaktionären Weg noch den tödlichen Pfad des Parteikampfes einschlagen werde. Meine Hauptziele sind die Organisation einer Streitmacht, der Sturz des Bolschewismus und die Herstellung von Recht und Ordnung, damit das russische Volk eine Regierungsform nach seinen Wünschen wählen und die hohen Ideen von Freiheit und Unabhängigkeit verwirklichen kann. Ich rufe Sie, liebe Bürger, auf, sich zu vereinen und im Kampf gegen den Bolschewismus, wenn nötig, Ihr Bestes zu geben.“ \n\n Linke sozialrevolutionäre Führer haben Koltschak angeprangert und sogar zu seiner Ermordung aufgerufen, was zu einem kleinen Aufstand in Omsk führte, der jedoch schnell niedergeschlagen wurde, als sich die Sozialrevolutionäre den Bolschewiki anschlossen."
interwar_white_russia.14.a:0 "Für ein vereintes Russland!"
interwar_white_russia.15.t:0 "Die königliche Familie ist wiederhergestellt!"
interwar_white_russia.15.d:0 "Nachdem die königliche Familie aus der Gefangenschaft der Bolschewiken befreit wurde, haben wir beschlossen, die Monarchie wiederherzustellen, in der Hoffnung, mehr internationale Unterstützung zu gewinnen, da sie dann eine legitimere Regierung wäre als die der Bolschewiken oder der zersplitterten Weißen Bewegung."
interwar_white_russia.15.a:0 "Gott schütze den Zaren!"
interwar_white_russia.16.t:0 "Die weißen Fraktionen vereinen"
interwar_white_russia.16.d:0 "Da die weißen Bewegungen in Ost- und Westrussland nun miteinander verbunden sind, haben wir uns für die Schaffung einer vereinten provisorischen weißen Regierung entschieden, die sich aus den wichtigsten antibolschewistischen politischen Parteien und Militärführern zusammensetzt. Diese Regierung wird sich auf die verbleibenden Abgeordneten der Verfassunggebenden Versammlung von 1917 stützen. \N\N Aus diesem Grund sollten die liberalen Regierungen der Westalliierten in der Lage sein, die Vereinigung diplomatisch, finanziell und logistisch gut zu unterstützen."
interwar_white_russia.16.a:0 "Endlich vereint!"
interwar_white_russia.17.t:0 "Von den westlichen Alliierten anerkannte Regierung"
interwar_white_russia.17.d:0 "Die westlichen Alliierten haben sich bereit erklärt, die Unabhängigkeit unserer Weißen Bewegung offiziell anzuerkennen, nachdem es uns gelungen ist, alle Fraktionen auf demokratische Weise zu vereinen und die neue vereinigte Regierung auf den verbleibenden Abgeordneten der verfassunggebenden Versammlung von 1917 aufzubauen."
interwar_white_russia.17.a:0 "Die Bolschewisten haben jetzt keine Chance mehr!"
interwar_white_russia.18.t:0 "Die Autonomen Republiken"
interwar_white_russia.18.d:0 "Wir haben beschlossen, den wichtigsten Kosakenrepubliken bzw. den Republiken der nationalen Minderheiten, die in Russland nach 1917 und dem Ende des Zarenreichs ausgerufen wurden, politische Autonomie zu gewähren. Dies würde in einigen Gebieten eine starke politische Unterstützung für die weiße Regierung gewährleisten und mehr Freiwillige in die weißen Armeen bringen."
interwar_white_russia.18.a:0 "Ein notwendiges Opfer"
interwar_white_russia.19.t:0 "Nationale Minderheiten wütend, weil ihnen keine Autonomie gewährt wird"
interwar_white_russia.19.d:0 "Die nationalen Minderheiten sind wütend, weil wir ihnen immer noch keine Autonomie gewähren. Dies führt dazu, dass Tausende Kosaken und Angehörige anderer nationaler Minderheiten die Hoffnung auf die Weiße Regierung verlieren und meutern oder desertieren, weil wir unsere Autonomieversprechen nicht einhalten."
interwar_white_russia.19.a:0 "Verdammt!"
interwar_white_russia.20.t:0 "Die Autonomen Republiken"
interwar_white_russia.20.d:0 "Wir haben beschlossen, den wichtigsten Kosakenrepubliken bzw. den Republiken der nationalen Minderheiten, die in Russland nach 1917 und dem Ende des Zarenreichs ausgerufen wurden, politische Autonomie zu gewähren. Dies würde in einigen Gebieten eine starke politische Unterstützung für die weiße Regierung gewährleisten und mehr Freiwillige in die weißen Armeen bringen."
interwar_white_russia.20.a:0 "Ein notwendiges Opfer"
interwar_white_russia.21.t:0 "Landreformen gewährt"
interwar_white_russia.21.d:0 "Obwohl es derzeit unklug wäre, Landreformen durchzuführen, während wir uns mitten in einem schweren Bürgerkrieg befinden, haben wir uns dennoch dazu entschlossen, Landreformen zu gewähren, da die Menschen zunehmend unruhig werden und die Bolschewiken mit all ihren Versprechungen und einigen der Reformen, die sie umgesetzt haben, recht beschwichtigend klingen."
interwar_white_russia.21.a:0 "Ein notwendiges Opfer"
interwar_white_russia.22.t:0 "Weißer Terror"
interwar_white_russia.22.d:0 "Angesichts der Notwendigkeit politischer Unterdrückung der inneren Feinde, die uns zerstören wollen, haben wir eine landesweite Aktion gestartet, um diese Verräter mit allen erforderlichen Mitteln loszuwerden …"
interwar_white_russia.22.a:0 "Ein guter Bolschewik ist ein toter Bolschewik"
interwar_white_russia.23.t:0 "Getreidebeschlagnahmung"
interwar_white_russia.23.d:0 "Auch wenn es als falsch angesehen werden mag, werden wir, wenn wir diesen Krieg gewinnen wollen, gezwungen sein, zumindest einige unethische Dinge zu tun. Logistik verhält sich zu Qualität wie drei zu eins, und wenn wir unsere Männer nicht ernähren können, werden wir diesen Krieg verlieren, was uns dazu bringt, den örtlichen Bauern gewaltsam ihr Getreide wegzunehmen."
interwar_white_russia.23.a:0 "nun ja"
interwar_white_russia.24.t:0 "Die verfassunggebende Versammlung wurde wiederhergestellt"
interwar_white_russia.24.d:0 "Die verfassunggebende Versammlung wurde seit dem Aufstieg der Bolschewiki in der Oktoberrevolution de facto abgeschafft und später unter ihrer Macht aufgelöst. Eine Wiedereinführung der verfassunggebenden Versammlung würde von den westlichen Alliierten in einem positiveren Licht gesehen werden und die politische Stabilität in Russland verbessern."
interwar_white_russia.24.a:0 "Gut"
interwar_white_russia.25.t:0 "Ilja-Muromez-Attentäter festgenommen"
interwar_white_russia.25.d:0 "Der strategische Bomber Ilja Muromez ist einer der besten der Welt und bis heute weitgehend konkurrenzlos. Ein erheblicher Teil dieser Bomber wurde von unserer Regierung beschlagnahmt, einige Piloten sind jedoch in die Ukraine und nach Polen übergelaufen und die verbleibende Hälfte wurde von der Sowjetunion beschlagnahmt."
interwar_white_russia.25.a:0 "Besser als nichts"
interwar_white_russia.26.t:0 "Französisch-griechisches Expeditionskorps trifft ein"
interwar_white_russia.26.d:0 "Ein französisch-griechisches Expeditionskorps hat die Häfen von Odessa, Sewatopol und Cherson eingenommen und uns übergeben. Obwohl die französische und die verbündeten Regierungen diese Truppe gerne im Kampf gegen die Bolschewiken unterstützen würden, sind die Expeditionstruppen nicht motiviert. Französische Soldaten warten sehnsüchtig auf ihre Demobilisierung nach langem und abgelegenem Einsatz an den Ostfronten. Das Expeditionskorps wird jedoch nicht in den Konflikt verwickelt, es sei denn, es wird angegriffen."
interwar_white_russia.26.a:0 "Großartig!"
interwar_white_russia.27.t:0 "Britische Panzer treffen ein"
interwar_white_russia.27.d:0 "Da der Erste Weltkrieg weitgehend vorbei ist, sind im Westen große Mengen an Waffen übrig. Die meisten dieser Länder beobachten die kommunistische Bedrohung mit Argwohn und Sorge und liefern uns deshalb Waffen. Die Briten haben uns in Südrussland rund sechzig wertvolle Panzerfahrzeuge zur Verfügung gestellt. Hoffentlich können wir diese zu unserem Vorteil nutzen."
interwar_white_russia.27.a:0 "Wir werden die Reds zerschmettern!"
#interwar_white_russia.28.t:0 "Invasion of Mongolia"
#interwar_white_russia.28.d:0 "Roman von Ungern-Sternberg has taken a few thousand men to the border of Mongolia where he will"
#interwar_white_russia.28.a:0 ""
interwar_white_russia.29.t:0 "Roman von Ungern-Sternberg fällt in die Mongolei ein"
interwar_white_russia.29.d:0 "Der erzkonservative Panmonarchist Roman von Ungern-Sternberg strebt die Wiederherstellung der russischen Monarchie und nun auch die Wiederbelebung des Mongolischen Reiches unter der Herrschaft des Bogd Khan an. Roman, von seinen Männern „Der verrückte Baron“ genannt, ist sogar zum Buddhismus konvertiert, hat chinesische Truppen aus der Mongolei vertrieben und strebt die Wiederherstellung der monarchischen Macht des Bogd Khan an."
interwar_white_russia.29.a:0 "Dieser Mann ist verrückt!"
interwar_white_russia.30.t:0 "Territoriale Zugeständnisse an Japan?"
interwar_white_russia.30.d:0 "Die Japaner werden sich am ehesten direkt auf unserer Seite in den Bürgerkrieg einmischen. Sie hassen den Kommunismus, aber sie werden sich nicht einfach so einmischen, außer durch die Besetzung einiger Eisenbahnstrecken im fernen Osten Sibiriens und Wladiwostoks. Vielleicht sollten wir ihnen ein Stück Sibiriens anbieten, um uns die Unterstützung der Japaner zu sichern und diesen Bürgerkrieg zu gewinnen?"
interwar_white_russia.30.a:0 "Bieten Sie ihnen ein Stück Sibirien an"
interwar_white_russia.30.b:0 "Ein solches Angebot wird es nicht geben!"
interwar_white_russia.31.t:0 "Kaiserlicher Goldzug beschlagnahmt!"
interwar_white_russia.31.d:0 "Der Zug mit den russischen Goldreserven des ehemaligen Zarenreichs wurde im Bahnhof von Kasan blockiert. Dadurch konnten wir die Stadt einnehmen, bevor der Zug repariert werden konnte. Zwar gelang es den Bolschewiki, vor unserer Eroberung etwas Gold herauszuholen, doch aufgrund der Schwere des Elements waren es weniger als 3 % der gesamten Reserve. Dieses Gold wird uns beim Aufbau unserer Armeen sehr helfen, und dank der Zahlungsgarantie in Gold können wir regelmäßig ausländische Finanzhilfe oder Waren erhalten."
interwar_white_russia.31.a:0 "Genial!"
interwar_white_russia.32.t:0 "Königliche Familie gerettet!"
interwar_white_russia.32.d:0 "Es ist uns gelungen, die Zarenfamilie zu retten! Sie wurde zwischenzeitlich von bolschewistischen Truppen in Jekaterinburg gefangen gehalten, doch unser hoher Vormarsch überraschte die Roten und ermöglichte uns die Einnahme der Stadt, ohne dass der Zar und seine Familie verletzt wurden."
interwar_white_russia.32.a:0 "Selbst Autokraten verdienen es nicht, solche"
interwar_white_russia.33.t:0 "Wilson entfernt sich von der Weißen Bewegung"
interwar_white_russia.33.d:0 "Gemeinsam mit Wilsons wichtigstem Russlandberater, dem ehemaligen Chef der russischen Provisorischen Regierung, Alexander Kerenski, hat er dem Präsidenten bösartige Lügen aufgetischt, etwa, Koltschak sei ein „Reaktionär“, der „ein Regime einführen würde, das kaum weniger blutig und repressiv sei als das der Bolschewiki“. Dies hat zu einer deutlichen Kluft zwischen Koltschak und dem Westen geführt, da er von den USA nicht als künftiger russischer Führer favorisiert wird. Die Amerikaner haben deutlich gemacht, dass ihre Truppen in Sibirien weniger sind, um uns zu helfen, als vielmehr, um die Japaner an der Annexion des russischen Fernen Ostens zu hindern, wie Tokio dies offen erwägt."
interwar_white_russia.33.a:0 "Verdammt..."
interwar_white_russia.34.t:0 "Koltschak gefangen genommen und hingerichtet!"
interwar_white_russia.34.d:0 "Koltschak war von den Tschechoslowaken freies Geleit zur britischen Militärmission in Irkutsk versprochen worden. Stattdessen wurde er den linkssowjetrussischen Behörden in Irkutsk übergeben. Später übergab die Regierung in Irkutsk die Macht an ein bolschewistisches Militärkomitee. Die nunmehr Weiße Armee unter dem Kommando von General Wladimir Kappel rückte auf Irkutsk vor, während Koltschak von einer fünfköpfigen Kommission des Revolutionskomitees verhört wurde. Trotz eines gegenteiligen Befehls aus Moskau wurde Admiral Koltschak zusammen mit seinem Premierminister Viktor Pepeljajew zum Tode verurteilt. Beide Gefangenen wurden heute früh erschossen. Einem Augenzeugen zufolge war Koltschak völlig ruhig und furchtlos, „wie ein Engländer“."
interwar_white_russia.34.a:0 "Er kämpfte für ein freies und vereintes Russland!"
interwar_white_russia.35.t:0 "Der Große Sibirische Eismarsch beginnt"
interwar_white_russia.35.d:0 "Nach Alexander Koltschaks Niederlage und seinem Tod erlitt die Weiße Armee in letzter Zeit enorme Verluste. In Irkutsk angekommen, versuchte die Weiße Armee unter dem Kommando von Wladimir Kappel mit ihrem Besitz und den erbeuteten kaiserlichen Goldreserven über den zugefrorenen Baikalsee zu fliehen. Gleichzeitig fegten die arktischen Winde ungehindert über den See, und viele Soldaten und ihre Familien erfroren auf dem See. Auch Wladimir Kappel, ein Generäle der Weißen Armee, fiel dem zum Opfer. Man nimmt an, dass der größte Teil des Zarengoldes hier verschwand und auf den Grund des Sees sank, nachdem dieser wieder aufgetaut war."
interwar_white_russia.35.a:0 "Wir dürfen nicht aufgeben!"
interwar_white_russia.36.t:0 "General Kornilow getötet!"
interwar_white_russia.36.d:0 "Kornilow führte die Freiwilligenarmee auf dem epischen „Eismarsch“ durch die leere Steppe Richtung Kuban. Obwohl er zahlenmäßig weit unterlegen war, entkamen er und die Freiwilligenarmee der Vernichtung durch die bolschewistischen Truppen, die daraufhin die von Weißen besetzte Stadt Jekaterinodar belagerten. Eine sowjetische Granate traf jedoch sein Hauptquartier auf einem Bauernhof und tötete ihn. Er wurde in einem nahegelegenen Dorf begraben."
interwar_white_russia.36.a:0 "Sein Mut wird nicht in Vergessenheit geraten!"
interwar_white_russia.37.t:0 "Schlacht der Häuptlinge: Krasnov siegreich"
interwar_white_russia.37.d:0 "Nachdem Pjotr Krasnow die Stadt Zarizyn erfolgreich erobert und gehalten hatte, führte dieser gigantische Sieg der Weißen Bewegung dazu, dass er anstelle von Anton Denikin zum Anführer der Westlichen Weißen ernannt wurde."
interwar_white_russia.37.a:0 "Herrlich!"
interwar_white_russia.38.t:0 "Schlacht der Häuptlinge: Denikin siegreich"
interwar_white_russia.38.d:0 "Pjotr Krasnow konnte die Stadt Zaizyn nicht erobern. Anton Denikin bleibt somit der unangefochtene Anführer der Westlichen Weißen. Krasnow ist in den Hintergrund gedrängt worden und wird wahrscheinlich bald zurücktreten."
interwar_white_russia.38.a:0 "In Ordnung"
interwar_white_russia.39.t:0 "Ataman Krasnov zieht sich aus dem Krieg zurück"
interwar_white_russia.39.d:0 "Pjotr Krasnow musste Denikins Autorität über die Weiße Bewegung im Westen anerkennen und wurde verbannt. Die meisten der von ihm angeführten Donkosaken, die des Separatismus verdächtigt wurden, werden aus dem Oberkommando der russischen Weißen entlassen. Es ist mit Desertionen einiger Kosaken unter den Truppen zu rechnen."
interwar_white_russia.39.a:0 "nun ja"


INT_hungary.1.t:0 "Vertrag von Trianon"
INT_hungary.1.d:0 "Mit unserer Niederlage im Ungarisch-Rumänischen Krieg haben wir ein Friedensabkommen geschlossen, das den Ersten Weltkrieg endgültig beendete und unseren Status als unabhängiger Staat offiziell regelte sowie unsere Grenzen definierte. Der Vertrag von Trianon hat uns von Land umgeben, wobei das verbleibende Gebiet 28 % des ursprünglichen Vorkriegskönigreichs Ungarn ausmacht. Die Bevölkerung beträgt weiterhin nur 7,6 Millionen, also 36 % unserer Vorkriegsbevölkerung von 20,9 Millionen, wobei 3,3 Millionen Ungarn außerhalb unserer Grenzen leben. Der Vertrag hat außerdem unsere Armee auf 35.000 Offiziere und Mannschaften begrenzt und uns gezwungen, unseren Nachbarn Kriegsentschädigungen zu zahlen. Wir hatten keine andere Wahl, als diese schrecklichen Bedingungen zu akzeptieren. Vielleicht wird das eines Tages rückgängig gemacht …"
INT_hungary.1.a:0 "Verdammt!"
INT_hungary.2.t:0 "Kommunisten übernehmen die Regierung"
INT_hungary.2.d:0 "Nachdem Mihály Károlyi den Rücktritt der Regierung Denes Berinkey angekündigt und den Ministerrat darüber informiert hatte, dass nur die Sozialdemokraten eine neue Regierung bilden könnten, da sie die Partei mit der größten Unterstützung in der Bevölkerung seien, begannen die Sozialdemokraten ohne Parteichef Mihály Károlyi im Bemühen, eine Regierungskoalition zu bilden, Geheimverhandlungen mit den noch immer inhaftierten kommunistischen Führern. Diese Verhandlungen führten schließlich zur Fusion der Sozialdemokratischen Partei und der Ungarischen Kommunistischen Partei zu einer Regierung unter dem Namen Ungarische Sozialistische Partei. Károlyi, der hierüber nicht informiert war und zudem ein ausgesprochener Antikommunist war, sah sich schnell einer von Kommunisten dominierten Regierung gegenüber und trat zurück. Nach der Freilassung von Béla Kun und anderen Kommunisten aus dem Gefängnis übernahmen die Kommunisten die Macht und gründeten die Ungarische Räterepublik."
INT_hungary.2.a:0 "Erhebt euch, meine Kameraden!"
INT_hungary.3.t:0 "Jugoslawische Besetzung der Vojvodina"
INT_hungary.3.d:0 "Nachdem das Gebiet der Vojvodina dem neuen jugoslawischen Staat versprochen worden war, verkündete die Versammlung der Serben und anderer Staatsangehöriger der Vojvodina in Novi Sad die Vereinigung der Vojvodina mit Jugoslawien. Daraufhin rückten jugoslawische Truppen in die Region vor und marschierten an unsere Grenze."
INT_hungary.3.a:0 "Aber die Ungarn dort?!"
INT_hungary.4.t:0 "Tschechische Besetzung der Karpatenruthenien"
INT_hungary.4.d:0 "Tschechische Truppen, die in Abstimmung mit rumänischen Streitkräften aus dem Osten vorgingen – beide unter französischer Schirmherrschaft –, drangen in das Gebiet ein und vernichteten dort die örtlichen ungarischen Milizen, bevor sie es in die Tschechoslowakei eingliederten."
INT_hungary.4.a:0 "Wir kommen wieder!"
INT_hungary.5.t:0 "Der ungarisch-rumänische Krieg beginnt"
INT_hungary.5.d:0 "Da wir uns nicht auf die „Vix-Note“ einigen konnten, haben die Rumänen die Sache selbst in die Hand genommen und eine Offensive an der Grenze vorbereitet. Bela Kun, der zuvor versucht hatte, unserem Land Zeit zu verschaffen, sich auf mögliche Kriegssituationen vorzubereiten, drängte daraufhin auf eine sofortige Offensive, um die Rumänen zu überraschen. Wenn es uns gelingt, die Rumänen lange genug aufzuhalten, könnte uns Sowjetrussland zu Hilfe kommen und die Rumänen von Osten her angreifen."
INT_hungary.5.a:0 "Wir werden unser Territorium nicht aufgeben!"
INT_hungary.6.t:0 "Die Vix-Note"
INT_hungary.6.d:0 "Im Gegenzug für Ungarns Zustimmung zu den in der Vix-Note festgelegten Bedingungen haben die Alliierten versprochen, die Blockade Ungarns aufzuheben und den Gebietsverlust Ungarns an Rumänien, die Tschechoslowakei und Jugoslawien wohlwollend zu behandeln. Sollten wir die Vix-Note akzeptieren, werden die Rumänen ganz Siebenbürgen einnehmen, wo Millionen von Ungarn leben. Das dürfen wir nicht zulassen!"
INT_hungary.6.a:0 "Wir werden zurückweichen"
INT_hungary.6.b:0 "So etwas Absurdes würden wir nicht akzeptieren!"
INT_hungary.7.t:0 "Kommunisten verhaftet"
INT_hungary.7.d:0 "Heute kam es zu gewalttätigen Demonstrationen radikaler Kommunisten, die gegen die Medien und Karoliys liberale Regierung protestierten. Die Demonstranten griffen die Redaktion der offiziellen Zeitung der Sozialdemokratischen Partei Ungarns, „Volkswort“, an, wobei mehrere Menschen und Polizisten getötet wurden. \n\n Diese Ruhestörung veranlasste die Sozialdemokratische Partei, die Führer der Kommunistischen Partei zu verhaften, die Vörös Ujsag zu verbieten und das Gebäude der Kommunistischen Partei zu schließen."
INT_hungary.7.a:0 "Eine notwendige Aktion"
INT_hungary.8.t:0 "Sieg in Ungarn"
INT_hungary.8.d:0 "Wir haben die Ungarn besiegt. Wir können nun entscheiden, ob wir einen moderaten Friedensvertrag wollen, wobei wir bedenken müssen, dass Ungarn, obwohl es besiegt ist, einst eine mächtige Nation war, oder ob wir uns dafür entscheiden, so viel Land wie möglich zu besetzen."
INT_hungary.8.a:0 "Wir wollen keinen Riesen wecken"
INT_hungary.8.b:0 "Ich will alles"
INT_hungary.9.t:0 ""
INT_hungary.9.d:0 ""
INT_hungary.9.a:0 ""
INT_hungary.10.t:0 ""
INT_hungary.10.d:0 ""
INT_hungary.10.a:0 ""
INT_hungary.11.t:0 "Prekmurje erklärt Unabhängigkeit!"
INT_hungary.11.d:0 "Das Gebiet von Prejmurje wurde 1918 von den kroatischen Armeen kontrolliert, bis wir es kurz darauf wieder besetzten. Es war mehrere Monate lang in unserer Kontrolle, doch gestern erklärte ein ungarischer Sozialist, unterstützt von lokalen protestantischen Organisationen, Prejmurje zu einem unabhängigen, souveränen Staat. Unsere Streitkräfte sind verwundbar und wir werden daran arbeiten, das Gebiet in den kommenden Monaten zurückzuerobern."
INT_hungary.11.a:0 "Die Bastarde!"
INT_hungary.12.t:0 "Die Annexion von Prekmurje"
INT_hungary.12.d:0 "Prekmurje hat vor einem Monat seine Unabhängigkeit erklärt, doch unsere Soldaten haben die junge Republik unter Kontrolle gebracht und die Kontrolle wiederhergestellt."
INT_hungary.12.a:0 "Exzellent!"

INT_italy.1.t:0 "Marsch auf Rom"
INT_italy.1.d:0 "Der italienische Diktator Benito Mussolini hat einen Marsch auf die italienische Hauptstadt Rom organisiert. Das Quadrumvirat der faschistischen Partei, General Emilio De Bono, Italo Balbo (einer der berühmtesten Vertreter), Michele Bianchi und Cesare Maria de Vecchi, organisierte den Marsch, während der Duce die meiste Zeit des Marsches im Gelände blieb, obwohl er zuließ, dass Fotos von ihm zusammen mit den faschistischen Demonstranten gemacht wurden. Die Generäle Gustavo Fara und Sante Ceccherini halfen bei den Vorbereitungen des Marsches am 18. Oktober. Weitere Organisatoren des Marsches waren der Marquis Dino Perrone Compagni und Ulisse Igliori."
INT_italy.1.a:0 "Macht dem Duce!"
INT_italy.2.t:0 "Tellini ermordet"
INT_italy.2.d:0 "1923 gehörte der italienische General Enrico Tellini einem italienischen Team an, das vom Völkerbund entsandt wurde, um die umstrittene Grenze zwischen Griechenland und Albanien zu vermessen. Während der Mission wurde er zusammen mit vier Begleitern erschossen, nachdem ihr Auto auf der Straße, die entlang der umstrittenen Grenze nahe der Stadt Ioannina auf dem Weg zur albanischen Grenze verlief, von einem umgestürzten Baum aufgehalten wurde. Die Verantwortlichen wurden nie gefunden, und der Vorfall hätte von beiden Seiten verübt werden können. Die Italiener unter Benito Mussolini gaben jedoch den Griechen die Schuld, die jede Verantwortung von sich wiesen. Benito Mussolini forderte von Griechenland 50 Millionen Lira Reparationen, die diese jedoch ablehnten."
INT_italy.2.a:0 "Wir werden uns rächen!"
INT_italy.3.t:0 "Italien besetzt Korfu"
INT_italy.3.d:0 "Nachdem Griechenland sich weigerte, alle Forderungen des italienischen Ultimatums vom 29. August 1923 zu erfüllen, erklärten die Italiener, die mit der Antwort der griechischen Regierung unzufrieden waren, diese für inakzeptabel. Am 31. August 1923 begann ein Geschwader der italienischen Marine mit dem Bombardement der griechischen Insel Korfu und landete 5.000 bis 10.000 Soldaten. Flugzeuge unterstützten den Angriff, und das italienische Feuer konzentrierte sich auf die alte Festung der Stadt, die lange Zeit entmilitarisiert war und als Zufluchtsort für Flüchtlinge diente. Der Beschuss dauerte 15 bis 30 Minuten. 16 Zivilisten wurden getötet, 30 verletzt und zwei mussten Gliedmaßen amputiert werden. Unter den Opfern befanden sich keine Soldaten, und die meisten Getöteten waren Kinder."
INT_italy.3.a:0 "Das ist der Preis, den sie zahlen müssen!"
INT_italy.4.t:0 "Lösung des Korfu-Vorfalls"
INT_italy.4.d:0 "Großbritannien war dafür, die Korfu-Angelegenheit an den Völkerbund zu verweisen, doch Frankreich lehnte ein solches Vorgehen ab, da es befürchtete, es würde einen Präzedenzfall für eine Beteiligung des Völkerbundes an der Ruhrbesetzung schaffen. Angesichts der Drohung Mussolinis, Italien aus dem Völkerbund auszutreten, und der mangelnden französischen Unterstützung in dieser Angelegenheit kam es zur Botschafterkonferenz. Italiens Ansehen wurde gewahrt, und die Franzosen wurden von jeglicher Verbindung zwischen Korfu und dem Ruhrgebiet entbunden. Die griechische Flotte musste der italienischen Flotte einen Salut mit 21 Kanonen abfeuern, das griechische Kabinett sollte an einer Trauerfeier teilnehmen, Griechenland musste INT_italy 50.000.000 Lire zahlen, die höchste griechische Militärbehörde musste sich bei den britischen, französischen und italienischen Vertretern in Athen entschuldigen, und es sollte eine griechische Untersuchung der Morde eingeleitet werden. Italien räumte schließlich die Insel, und die Angelegenheit war geklärt."
INT_italy.4.a:0 "Gut, dass es nicht weiter ging"
INT_italy.5.t:0 "Griechenland sagt: „Wir werden den Forderungen nicht nachkommen“"
INT_italy.5.d:0 "Die Griechen haben auf unsere Forderungsliste geantwortet, dass sie diesen nicht nachkommen würden, dies würde Krieg bedeuten oder wir könnten sie einfach gehen lassen. Dies würde jedoch einen erheblichen Verlust unseres Ansehens und einen Vertrauensverlust in die Regierung seitens unseres Volkes bedeuten, das dies als schwachen Schachzug ansehen würde."
INT_italy.5.a:0 "Das bedeutet Krieg!"
INT_italy.5.b:0 "Lass sie gehen"
INT_italy.6.t:0 "Nationale Faschistische Partei in Italien gegründet"
INT_italy.6.d:0 "Die Nationale Faschistische Partei (Partito Nazionale Fascista) war eine italienische politische Partei, die von Benito Mussolini als politischer Ausdruck des Faschismus (zuvor vertreten durch Gruppen namens Fasci) gegründet wurde. Sie wurde am 9. November 1921 von Benito Mussolini gegründet und war tief im italienischen Nationalismus und dem Wunsch verwurzelt, italienische Gebiete wiederherzustellen und zu erweitern, was die italienischen Faschisten für notwendig hielten, damit eine Nation ihre Überlegenheit und Stärke behaupten und dem Verfall entgehen konnte. Die Gruppe behauptete, das moderne Italien sei das Erbe des antiken Roms und seines Erbes und unterstützte historisch die Schaffung eines italienischen Kaiserreichs, um „Lebensraum“ für die Kolonisierung durch italienische Siedler zu schaffen und die Kontrolle über das Mittelmeer zu erlangen."
INT_italy.6.a:0 "Interessant"

INT_generic.1.t:0 "Fabrikrichtlinie"
INT_generic.1.d:0 "Da die Zwischenkriegszeit bereits begonnen hat, sollten wir unsere neue Fabrikpolitik definieren. Wir könnten uns auf die Massenproduktion konzentrieren oder den Schwerpunkt auf innere Stabilität und langsamen Fortschritt legen."
INT_generic.1.a:0 "Unser Land wird ALLE Waffen produzieren."
INT_generic.1.b:0 "Für uns steht unser Land an erster Stelle und unsere Produktion an zweiter."

INT_generic.2.t:0 "Der Zustand der Ehefrau"
INT_generic.2.d:0 "In dieser neuen Zeit, in der alles möglich ist und nichts aus heiterem Himmel kommt, werden wir in ein neues Zeitalter geführt. Ein Zeitalter, in dem Frauen neue Chancen haben und die Chance haben, etwas für unser Land zu leisten. Wir stehen an einem Scheideweg, der für die Zukunft unseres Landes von entscheidender Bedeutung sein könnte."
INT_generic.2.a:0 "Dies ist sicherlich eine Angelegenheit von großer Bedeutung."

INT_generic.3.t:0 "[FROM.getName]-Kundgebungen gegen den Kommunismus!"
INT_generic.3.d:0 "[FROM.getName] hat der Welt gezeigt, dass es gegen uns ist. Sie sind ein Feind unserer Lebensweise, unserer Traditionen. Wenn sie unseren Weg nicht verstehen, hat ihre Nation keine Existenzberechtigung. "
INT_generic.3.a:0 "Wir werden uns sicher daran erinnern."

INT_generic.4.t:0 "[FROM.getName] demonstriert gegen den Nationalismus!"
INT_generic.4.d:0 "[FROM.getName] hat der Welt gezeigt, dass es gegen uns ist. Sie sind ein Feind unserer Lebensweise, unserer Traditionen. Wenn sie unseren Weg nicht verstehen, hat ihre Nation keine Existenzberechtigung. "
INT_generic.4.a:0 "Wir werden uns sicher daran erinnern."




 austria.13.t:0 "Habsburger Recht"
 austria.13.d:0 "Das am 3. April 1919 verabschiedete Habsburgergesetz setzte das Haus Habsburg-Lothringen offiziell und rechtskräftig als Herrscher Österreichs ab, nachdem dieses im November 1918 zur Republik erklärt worden war. Alle Habsburger wurden aus Österreich ausgewiesen, sofern sie nicht auf ihre Titel verzichteten und formell abdankten. Das Gesetz konfiszierte zudem ihr Eigentum. Das Gesetz wurde 1935 vorübergehend aufgehoben und die Familie erhielt ihr Eigentum zurück. Nach dem Anschluss Österreichs an die Sowjetunion wurde es jedoch vom nationalsozialistischen Deutschland wieder eingeführt."
 austria.13.a:0 "Sie sind hier nicht willkommen!"
 austria.14.t:0 "Kärntner Volksabstimmung"
 austria.14.d:0 "Die Kärntner Volksabstimmung fand am 10. Oktober 1920 in dem überwiegend von Kärntner Slowenen besiedelten Gebiet statt. Sie legte die endgültige Südgrenze zwischen der Republik Österreich und dem nach dem Ersten Weltkrieg neu gegründeten Jugoslawien fest. Das Kärntner Gebiet war zwischen Deutschösterreich und Jugoslawien umstritten, doch am 5. November drangen jugoslawische Truppen in das Gebiet ein, was zu der Forderung nach einer Volksabstimmung für diese Region mit gemischter Bevölkerung führte. Die Besetzung Südostkärntens durch jugoslawische Truppen führte zu bewaffneten Auseinandersetzungen. Im Vorfeld der Volksabstimmung führten beide Seiten intensive Propagandakampagnen, in denen sie insbesondere Österreich eine Brüderschaft versprachen. Das Ergebnis war jedoch: 59,1 % stimmten für den Anschluss an Österreich und 40,9 % für den Anschluss an Jugoslawien. Da die österreichische Option in der slowenischen Zone A die Mehrheit der Stimmen erhielt, wurde die zweite Stufe des Referendums in der nördlichen Zone B nicht durchgeführt und ein weiterer Vorstoß Jugoslawiens wurde von den Entente-Mächten entschieden zurückgewiesen."
 austria.14.a:0 "Überraschende Auflösung"
 austria.15.t:0 "Marburgs Blutsonntag"
 austria.15.d:0 "Der Blutsonntag von Marburg ereignete sich am Montag, dem 27. 1919, in der slowenischen Stadt Maribor. Jugoslawische Soldaten unter dem Kommando des slowenischen Offiziers Rudolf Maister töteten bei einer Demonstration auf einem Platz im Stadtzentrum zwischen neun und 13 Zivilisten deutscher Herkunft und verletzten weitere 60. Die Schätzungen der Opferzahlen gehen in slowenischen und österreichischen Quellen auseinander."
 austria.15.a:0 "Schrecklich!"
 austria.16.t:0 "Vertrag von Saint-Germain-en-Laye"
 austria.16.d:0 "Der Vertrag von Saint-Germain-en-Laye wurde am 10. September 1919 von den Alliierten und der Republik Deutschösterreich unterzeichnet. Er enthielt die Satzung des Völkerbundes und wurde daher von den Vereinigten Staaten nicht ratifiziert. Der Vertrag erklärte die Auflösung Österreich-Ungarns und die Übernahme der Verantwortung für den Krieg mit den übrigen Mittelmächten durch Österreich. Er sah hohe Summen an Kriegsgeldern bzw. Reparationen an die Alliierten vor und hinderte Österreich daran, auf seine Unabhängigkeit zu verzichten oder diese direkt/indirekt zu gefährden. Das bedeutete, dass Österreich ohne Zustimmung des Völkerbundes keine politische oder wirtschaftliche Union mit dem Deutschen Reich eingehen konnte. Der ursprünglich selbstgewählte Name der neuen Republik „Deutschösterreich“ musste in „Österreich“ geändert werden, die Wehrpflicht wurde abgeschafft und die österreichische Armee auf 30.000 Freiwillige begrenzt. \n\n Der enorme Rückgang an Bevölkerung, Territorium und Ressourcen richtete verheerende Schäden an der Wirtschaft an, und Wien, die ehemalige kaiserliche Hauptstadt, stand nun ohne ein Reich da, das sie verwalten oder unterstützen konnte. Die Einheit des Landes selbst wurde in Frage gestellt, und anders als Ungarn war Österreich trotz seiner 700-jährigen Existenz nie eine Nation im eigentlichen Sinne gewesen. Es hatte keine andere einigende Kraft als die Loyalität gegenüber den Habsburgern, die nun endgültig abgesetzt waren."
 austria.16.a:0 "Wir sind kaputt..."
 austria.17.t:0 "US-österreichischer Friedensvertrag"
 austria.17.d:0 "Der US-österreichische Friedensvertrag wurde am 24. August 1921 in Wien zwischen den Vereinigten Staaten und Österreich unterzeichnet. Dieser separate Friedensvertrag war notwendig, da der Senat der Vereinigten Staaten sich weigerte, die Ratifizierung des multilateralen Vertrags von Saint-Gemrain-en-Laye aus dem Jahr 1919 zu beraten und zu genehmigen. Der Vertrag legte den Grundstein für die Zusammenarbeit zwischen den USA und Österreich und die US-Regierung begann, der österreichischen Regierung teilweise dabei zu helfen, die Last der im Vertrag von Saint-Germain auferlegten Kriegsentschädigungen zu erleichtern."
 austria.17.a:0 "Großartig!"
 #hungary.6.t:0 "Hungarian-Czechoslovak War"
 #hungary.6.d:0 "The Hungarian-Czechoslovak war was fought between the First Hungarian Republic and the First Czechoslovak Republic from November 1918 to March 1920. After the collapse of Austria-Hugary which led to a declaration that formed Czechsolovakia, the Czechs and Slovaks wanted to ensure success of their territorial demands and started a counterattack on Hungary. During th ewar the Hungarian Red Army fought seperate battles against troops from Czechoslovakia and Romania, France had also been highly involved diplomatically in the conflict. 120,000 troops on both sides were involved and the war was appealing to Hungarians who were promised of regaining lost land to Czechoslovakia by Bela Kun."
 #hungary.6.a:0 "We will retain what is rightfully ours!"
 hungary.7.t:0 "Osterkrise: Teil I"
 hungary.7.d:0 "Am 26. März 1921, dem Karsamstag jenes Jahres, tagte das Parlament Publicum nicht und das diplomatische Korps befand sich zu diesem Zeitpunkt im Land. Der ungarische Regent Horthy hatte einen ruhigen Urlaub mit seiner Familie im königlichen Palast geplant. Karl war von seinem Schweizer Gefolge informiert worden, das dem ehemaligen Kaiser von Versprechungen aus europäischen royalistischen Kreisen erzählte und Karl dazu veranlasste, „diese Ruhe“ auszunutzen, entgegen den Warnungen seiner vielen Anhänger und Horthys selbst, der sagte, die Zeit sei nicht reif für eine Rückkehr auf den Thron. Dies änderte jedoch nichts an seiner Haltung, da er optimistisch war. In seinen Geheimverhandlungen mit Aristide Briand versprach ihm der französische Premierminister im Falle seines Erfolgs französische Unterstützung und keine bewaffnete Intervention von Ungarns Nachbarn, der „Kleinen Entente“, die sehr bereit waren, in Ungarn einzumarschieren, sollte ein Habsburger an die Macht zurückkehren. Karl verließ seine Schweizer Villa und kam am 26. März unentdeckt in Szombathely an, wo er sich auf den Weg zum Palast des Grafen Janos Mikes machte, eines prominenten Legitimisten. Von dort verbreitete sich die Neuigkeit wie ein Lauffeuer unter den örtlichen Legitimisten und am 27. März hatte Karl bereits einen kleinen Geheimrat gewonnen, dem auch Horthys Bildungsminister angehörte. Nachdem Karl den Premierminister Pal Teleki getroffen hatte, antwortete dieser Karl mit den Worten „zu früh, zu früh“ vor Karl und drängte ihn, in die Schweiz zurückzukehren, da bei einer Intervention der Kleinen Entente ein Bürgerkrieg ausbrechen würde. Karl traf eine endgültige Vereinbarung mit Horthy und als er im Palast ankam, erschien er völlig unangemeldet, gerade als Horthy sich mit seiner Frau zu einem Osteressen setzte. Nachdem Horthy seine Suppe gegessen hatte, führte er Karl in das Büro des Regenten und führte ein zweistündiges „emotionales“ Gespräch mit Karl, das Horthy als „den schwierigsten Moment meines ganzen Lebens“ beschrieb. Karl dankte Horthy für seine Dienste als Regent, sagte jedoch, es sei an der Zeit, „mir die Macht zu übergeben“. Horthy erwiderte: „Das ist eine Katastrophe. Im Namen Gottes müssen Eure Majestät sofort abreisen und in die Schweiz zurückkehren, bevor es zu spät ist und die Mächte von Ihrer Anwesenheit in Budapest erfahren.“ Frustriert sagte Karl, er habe „alle Brücken hinter sich abgebrochen“. Er sprach Deutsch und stritt sich ständig mit Horthy und erinnerte ihn an seinen unter Tränen im November 1918 im Schloss Schönbrunn abgelegten Treueeid und den ihm geschworenen Gehorsamseid, von dem er nie entbunden wurde. Horthy revanchierte sich, indem er Ungarn einen Eid schwor. Schockiert sagte Karl, er würde bei seiner Position bleiben und gab Horthy fünf Minuten Bedenkzeit. Horthy war skeptisch gegenüber Karls Behauptungen, Premierminister Briand habe ihm Zusicherungen gegeben, und wiederholte seine Angst vor einem Bürgerkrieg. Horthy erwartete, Karl würde Ungarn verlassen und entweder nach Wien marschieren oder sich in die Schweiz zurückziehen."
 hungary.7.a:0 "Wir werden sehen, wie sich das entwickelt …"
 hungary.8.t:0 "Osterkrise: Teil II"
 hungary.8.d:0 "Am 28. März erklärten tschechoslowakische und jugoslawische Gesandte eine Restauration zum „Casus Belli“. Am 1. April verabschiedete der Landtag bei Enthaltung der Legitimisten einstimmig eine Resolution zur Bestätigung des Status quo und die Forderungen nach Karls Verhaftung wurden lauter, was Horthy jedoch ablehnte. Am 3. April dementierte der französische Premierminister Briant jegliches Abkommen, das Karls Position erheblich geschwächt hätte. Da die Armee Horthy weiterhin treu ergeben war, reiste Karl am 5. April widerwillig mit dem Zug ab und erreichte noch am selben Tag Schloss Hertenstein. Zwei Tage später erklärte er sich dennoch zum rechtmäßigen ungarischen Herrscher, was in der Zeitung erschien, und die Schweizer Regierung verhängte strengere Beschränkungen für seine politische Betätigung. Karl verließ Ungarn mit großer Abneigung gegen Horthy, da er glaubte, die Großmächte würden sich einer Restauration nicht widersetzen und er halte die Macht aus persönlichen Gründen. Er glaubte, das ungarische Volk sehnte sich nach seiner Rückkehr, obwohl es während der Osterkrise in Ungarn außer kleineren Demonstrationen in traditionell royalistischen Komitaten keine Demonstrationen der Unterstützung gab. Die Menschen begegneten ihm im Allgemeinen mit Gleichgültigkeit, und Teleki trat am 6. April aufgrund seiner schlechten Regierungsführung zurück."
 hungary.8.a:0 "Schlechtes Timing, Charles"
 hungary.9.t:0 "Marsch auf Budapest: Teil I"
 hungary.9.d:0 "Am 23. Oktober 1921 sollte im Burgenland eine vom Versailler Vertrag vorgeschriebene Volksabstimmung stattfinden. Graf Gyula Ostenburg-Moravek, Oberst Lehar und andere legitimistische Offiziere beschlossen daher, die angespannte Lage auszunutzen und ließen Karl eine Botschaft zukommen, in der sie ihn aufforderten, vor dem 23. Oktober die Macht zu ergreifen. Sie teilten ihm mit, dass er aufgrund der politischen Lage mit keinem Widerstand zu rechnen habe und seine Wiedereinsetzung überall begrüßt würde. Karl, der die Botschaft nach der Diktierübung seines Willens erhalten hatte, unternahm einen waghalsigen Flug (der Motor des Flugzeugs fiel mehrmals aus) in einem Eindecker Ad Astra Aero Junkers F.13, landete heimlich in Westungarn auf einem Feld, das einem Legitimisten gehörte, und flog von dort nach Sopron. Er hatte nicht die Absicht, einen Kompromiss mit Horthy zu suchen, dessen Kabinett er für illegitim hielt, und bildete seine eigene provisorische Regierung. An diesem Tag wurde in Sopron eine Gruppe Panzerzüge ausgerüstet, die von Ostenburgs Truppen bewacht wurden. Diese hatten erfahren, dass in Budapest ein kommunistischer Aufstand ausgebrochen sei und Horthy Karl aufgefordert hatte, die Ordnung wiederherzustellen. Das Bataillon legte den traditionellen Honved-Eid auf „Karl von Habsburg, König von Ungarn und König von Böhmen“ ab. Von dort brachen sie am späten Vormittag ins 190 km entfernte Budapest auf. Die Armada hielt an jedem Dorfbahnhof, damit die örtliche Garnison und die öffentlichen Beamten den Treueeid ablegten und Gruppen loyaler Bauern „Lang lebe der König!“ rufen und dem Königspaar huldigen konnten. Dies dauerte ungefähr 10 Stunden, was Horthy Gelegenheit gab, sich neu zu formieren. Am späten 21. Oktober erreichte Horthy ein Bericht, und er war schockiert, dass Lehár und Ostenburg ihn verraten hatten. Horthy teilte seine Entscheidung mit, dass notfalls Gewalt angewendet werden würde, und verwies auf die Gefahr einer Zerstörung Ungarns. In einer militärischen Proklamation erklärte er, er werde die Macht behalten und verlangte Loyalität von seiner Armee. Die meisten, die entlang der Route der Königlichen Armada stationiert waren, konnten Karl gegenüber nicht illoyal sein. Als Karl sich Budapest näherte, bekräftigten die Entente-Mächte ihren Widerstand gegen die Restauration, und tschechische, jugoslawische und rumänische Minister machten deutlich, dass ein solcher Schritt als Casus Belli angesehen würde. Horthy schickte daraufhin einen Brief an Karl, in dem er ihn zum Aufgeben aufforderte, doch Karl las den Brief nicht einmal."
 hungary.9.a:0 "Charles muss diese dumme Mission aufgeben!"
 hungary.10.t:0 "Marsch auf Budapest: Teil II"
 hungary.10.d:0 "Am Morgen des 23. Oktober schien Ungarn am Rande eines Bürgerkriegs zu stehen. Karls Armee befand sich vor Budapest und 30 km vom Bahnhof Kelenföld entfernt. Zu diesem Zeitpunkt war in Budapest bereits das Kriegsrecht verhängt worden. Die Tschechoslowakei meldete sich gleichzeitig und behauptete, mobil zu machen. Der britische Gesandte Thomas Hohler war überzeugt, dass alles verloren war, da er erwartete, dass Karl Budapest noch am selben Nachmittag besiegen würde. Horthy erhielt die Nachricht, dass die Verteidigung Budapests zusammenbrechen würde, wenn die Legitimisten einen Angriff starten würden. General Pal Hegedus, ein mit Karl verbündeter Legitimist, traf sich mit Hohler, dem britischen Gesandten, der ihm mitteilte, dass Großbritannien „Karl niemals anerkennen und niemals die Rückkehr eines Habsburgers zulassen würde“. Später warnte er Budapest, sollte es von den königlichen Truppen eingenommen werden, würde es innerhalb einer Woche von den Tschechen überrannt werden. Hegedus bestritt nun, mit Karl in Verbindung zu stehen und bot die Vermittlung eines Waffenstillstands an, nachdem er erfahren hatte, dass Karls Beteuerungen, er werde von den Großmächten unterstützt, falsch waren. Später am selben Tag traf sich Horthy mit einer großen Freiwilligentruppe, die die Stadt bewacht hatte, und hielt eine Rede, in der er warnte, dass im Falle einer Machtübernahme Karls des Großen die Albrechtsherrschaft wiederaufleben und Ungarn wieder seine untergeordnete Stellung einnehmen würde. Er sagte auch, Karls Armee bestehe hauptsächlich aus „österreichischen und tschechischen Freiwilligen“. Dies ermutigte die Armee, die begann, auf Karls Truppen zu schießen. Nachdem die Nachricht von der Schlacht bei Budaörs (einem Dorf in der Nähe von Budapest) die Runde machte, waren viele von Karls Anhängern überrascht und verloren die Moral, da sie dachten, der Marsch würde nach Budapest führen. Als Karls Armee sah, dass Horthy entschlossen war, Widerstand zu leisten, und herausfand, dass Karl und seine Offiziere gelogen hatten, als sie sagten, es gäbe einen Ausbruch eines bolschewistischen Aufstands in Budapest, wuchs die Unterstützung für Horthy. Inzwischen stimmte Karl widerstrebend einem Waffenstillstand zu und arrangierte für den nächsten Morgen einen Waffenstillstand."
 hungary.10.a:0 "Wir sind nicht in der Lage, Charles als König zu akzeptieren!"
 hungary.10.b:0 "Gott schütze König Karl IV.!"
 hungary.11.t:0 "Nachwirkungen des Marsches auf Budapest"
 hungary.11.d:0 "Am 24. Oktober 1921 hatte Horthy zu diesem Zeitpunkt einen entscheidenden militärischen Vorteil. Es wurden harte Bedingungen formuliert (Karl wurde aufgefordert, seinen Truppen zu befehlen, die Waffen niederzulegen und sämtliches Kriegsmaterial abzugeben); Karls Sicherheit wäre nur garantiert, wenn er schriftlich abdanke. Im Gegenzug würden alle Unterstützer der Restauration, „außer Agitatoren und Rädelsführern“, amnestiert. Während Karl diese Bedingungen verlas, fielen Schüsse, ein Querschläger traf den königlichen Zug, der sich westwärts in Bewegung setzte. Lehra und Ostenburg riefen zum „letzten Gefecht“ und „Kampf bis zum letzten Blutstropfen“. Karl jedoch zögerte, befahl dem Zug anzuhalten, öffnete das Fenster und rief: „Lehár! Ostenburg! Halt an und komm zurück! Ich verbiete weitere Kämpfe! Es ist jetzt alles völlig sinnlos ...“. Dann diktierte er den endgültigen Kapitulationsbefehl. Viele prominente Legitimisten wurden verhaftet und Karl kam allen Forderungen nach, mit der Ausnahme, dass er nicht auf den Thron verzichtete, was von beiden Parteien vereinbart worden war."
 hungary.11.a:0 "Es war sowieso eine verlorene Sache"


 hungary.13.t:0 "Exil Karls IV."
 hungary.13.d:0 "Am 3. November 1921 verließ das britische Kanonenboot HMS Glowworm mit der königlichen Familie an Bord ungarische Gewässer. Zu diesem Zeitpunkt legte Bethlen dem Parlament einen Gesetzentwurf vor, der die Pragmatische Sanktion von 1713 aufheben und die Habsburger im Wesentlichen entthronen sollte, Ungarn jedoch eine Monarchie blieb. Karl wurde nach Madeira gebracht, wo er dauerhaft verbannt wurde."
 hungary.13.a:0 "Er wird nicht so bald zurückkommen"
 hungary.12.t:0 "Ungarischer Bürgerkrieg"
 hungary.12.d:0 "Karl IV. hat zwar seine Chance auf die Eroberung Budapests verspielt, doch der Kampf wird weitergehen. Karl weigert sich, aufzugeben und wird weiterkämpfen. Es wird jedoch kein leichter Kampf, weder für Karl noch für Horthy. Selbst wenn Karl die Initiative ergreift, besteht eine hohe Wahrscheinlichkeit, dass die Kleine Entente gegen Karl interveniert, um weitere territoriale Zugeständnisse von Ungarn zu erzwingen."
 hungary.12.a:0 "Nieder mit dem König!"
 hungary.12.b:0 "Gott schütze den König!"
 hungary.14.t:0 "Niederlage Karls IV."
 hungary.14.d:0 "Karl IV. hat sich nach seinem gescheiterten Versuch, die Kontrolle über Ungarn zu übernehmen, endgültig ergeben und das Land in einen offenen Bürgerkrieg gestürzt. Nach seiner endgültigen Niederlage stellte er sich den Horthy-freundlichen Behörden und wird an Bord der HMS Glowworm gebracht und auf die portugiesische Insel Madeira geschickt, wo er mit seiner Familie im Exil leben wird."
 hungary.14.a:0 "Für all den Schaden, den er angerichtet hat, verdient er Schlimmeres!"
 hungary.15.t:0 "Karl IV. unterstützen?"
 hungary.15.d:0 "Karl IV. führte geheime Verhandlungen mit dem französischen Premierminister Aristide Briand, der ihn zu der Annahme veranlasst hatte, dass die Franzosen ihn unterstützen würden, wenn er Erfolg hätte und es zu keiner bewaffneten Intervention der Nachbarn Ungarns käme."
 hungary.15.a:0 "Unterstütze Charles"
 hungary.15.b:0 "Ich kann mich nicht erinnern, mit Charles gesprochen zu haben?"
 hungary.16.t:0 "Rumänische Intervention?"
 hungary.16.d:0 "Nach Karls Versuch, auf Budapest zu marschieren, drohte die Kleine Entente, die geschworen hatte, nie wieder einen Habsburger an die Macht kommen zu lassen, mit einer Mobilisierung und einem Marsch auf Budapest, um einen Frieden zwischen beiden Parteien zu erzwingen. Wenn wir Karls Seite folgen, sind wir in keiner Weise direkt bedroht. Wenn wir jedoch eingreifen, könnten wir Ungarn weitere Gebiete abjagen."
 hungary.16.a:0 "Eingreifen"
 hungary.16.B:0 "Es ist es nicht wert"
 hungary.17.t:0 "Tschechische Intervention?"
 hungary.17.d:0 "Nach Karls Versuch, auf Budapest zu marschieren, drohte die Kleine Entente, die geschworen hatte, nie wieder einen Habsburger an die Macht kommen zu lassen, mit einer Mobilisierung und einem Marsch auf Budapest, um einen Frieden zwischen beiden Parteien zu erzwingen. Wenn wir Karls Seite folgen, sind wir in keiner Weise direkt bedroht. Wenn wir jedoch eingreifen, könnten wir Ungarn weitere Gebiete abjagen."
 hungary.17.a:0 "Eingreifen"
 hungary.17.b:0 "Es ist es nicht wert"
 hungary.18.t:0 "Jugoslawische Intervention"
 hungary.18.d:0 "Nach Karls Versuch, auf Budapest zu marschieren, drohte die Kleine Entente, die geschworen hatte, nie wieder einen Habsburger an die Macht kommen zu lassen, mit einer Mobilisierung und einem Marsch auf Budapest, um einen Frieden zwischen beiden Parteien zu erzwingen. Wenn wir Karls Seite folgen, sind wir in keiner Weise direkt bedroht. Wenn wir jedoch eingreifen, könnten wir Ungarn weitere Gebiete abjagen."
 hungary.18.a:0 "Eingreifen"
 hungary.18.b:0 "Es ist es nicht wert"
 hungary.19.t:0 "Horthy verhandelt einen Separatfrieden"
 hungary.19.d:0 "Unser tapferer Führer Miklos Horthy hat heute allen Ungarn verkündet, dass er mit der Sowjetunion über einen separaten Frieden verhandelt, der Ungarn aus diesem verheerenden Krieg herausholen soll. Angesichts der starken deutschen Truppen, die Ungarn besetzen, ist jedoch nicht bekannt, wie viel davon wahr ist."
 hungary.19.a:0 "Eine wirklich prekäre Situation …"
 hungary.20.t:0 "Horthy verhandelt einen Separatfrieden"
 hungary.20.d:0 "Unser tapferer Führer Miklos Horthy hat heute allen Ungarn verkündet, dass er mit der Sowjetunion über einen separaten Frieden verhandelt, der Ungarn aus diesem verheerenden Krieg herausholen soll. Angesichts der starken deutschen Truppen, die Ungarn besetzen, ist jedoch nicht bekannt, wie viel davon wahr ist."
 hungary.20.a:0 "Eine wirklich prekäre Situation …"


 int_yugoslavia.1.t:0 "Alexander I. ermordet!"
 int_yugoslavia.1.d:0 "Nach dem Velebit-Aufstand im November 1932 sagte Alexander ironisch: „Wenn Sie in Jugoslawien schwere Unruhen anzetteln oder einen Regimewechsel herbeiführen wollen, müssen Sie mich töten. Schießen Sie auf mich und stellen Sie sicher, dass Sie mich erledigt haben, denn das ist der einzige Weg, in Jugoslawien Veränderungen herbeizuführen.“ Und genau das geschah tatsächlich; am 9. Oktober 1934, als Alexander I. in Marseille ankam, um einen Staatsbesuch in Frankreich anzutreten, in der Hoffnung, das Bündnis der beiden Länder in der Kleinen Entente zu stärken, wurde er plötzlich von dem Bulgaren Vladi Chernozemski angeschossen, als er von der Straße trat und den König zweimal erschoss, während er langsam durch die Straßen gefahren wurde. Es war eines der ersten Attentate, das auf Film festgehalten wurde. Der Attentäter war Mitglied der pro-bulgarischen Inneren Mazedonischen Revolutionären Organisation, die eng mit der kroatischen Ustascha-Gruppe zusammenarbeitete."
 int_yugoslavia.1.a:0 "Es werden Änderungen vorgenommen!"
 int_yugoslavia.2.t:0 "Tod von Peter I."
 int_yugoslavia.2.d:0 "König Peter I. starb am 16. August 1921 im Alter von 77 Jahren in Belgrad. Sein Vermächtnis jedoch wird weiterleben: die Vereinigung der Mehrheit der Südslawen zu dem, was wir heute als Jugoslawien kennen."
 int_yugoslavia.2.a:0 "Er wird uns fehlen!"
 int_yugoslavia.3.t:0 "Stjepan Radic ermordet!"
 int_yugoslavia.3.d:0 "Stjepan Radic war ein kroatischer Politiker und Gründer der Kroatischen Volksbauernpartei. Er lehnte den Anschluss an Jugoslawien und die serbische Hegemonie im vereinigten Staat weitgehend ab. Obwohl die Radikale Partei 1928 geschwächt war, gelang es Radics eigener bäuerlich-demokratischer Koalition nicht, eine Regierung zu bilden. Dies führte zu einer zunehmend instabilen und ethnisch motivierten Stimmung im Parlament. Im Parlament wurden Morddrohungen und Gewaltandrohungen gegen Radic ausgesprochen, und man warnte ihn vor einem Attentat. Er antwortete jedoch, er sei wie ein Soldat im Krieg, in den Schützengräben, und es sei seine Pflicht, dorthin zu gehen. In der Versammlung erhob sich Punisa Racic, ein Mitglied der Radikalen Volkspartei, und hielt eine provokative Rede, die einen stürmischen Aufschrei der Opposition hervorrief. Radic blieb jedoch vollkommen still. Als Punisa Racic zum Rednerpult ging und den Kroaten gegenüberstand, steckte er seine Hand in die Tasche, in der er einen Revolver hielt, und zog seine Waffe. Minister Vujicic griff nach seiner Waffe, konnte sich jedoch losreißen und Schüsse abfeuern, die Radic töteten. Dies führte dazu, dass Alexander I. später die Verfassung abschaffte, das Parlament auflöste und eine königliche Diktatur ausrief."
 int_yugoslavia.3.a:0 "Das kroatische Problem ist gelöst...vorerst"
 int_yugoslavia.4.t:0 "6. Januar Diktatur"
 int_yugoslavia.4.d:0 "Als Reaktion auf die politische Krise, die durch die Ermordung von Stjepan Rdaic ausgelöst wurde, schaffte König Alexander die Verfassung ab, löste das Parlament auf, rief eine persönliche/königliche Diktatur aus (die sogenannte Diktatur des 6. Januar) und änderte den Namen des Landes in Königreich Jugoslawien."
 int_yugoslavia.4.a:0 "Die Ordnung soll wiederhergestellt werden!"
 int_yugoslavia.5.t:0 "Velebit-Aufstand"
 int_yugoslavia.5.d:0 "Der Velebit-Aufstand ereignete sich in der Nacht vom 6. auf den 7. September 1932, als die Ustaše einen Angriff auf eine Polizeistation im Dorf Brusane in der Nähe von Gospic startete. Die jugoslawischen Behörden waren durch den kleinen Aufstand verunsichert, da die Macht der Ustaše zu diesem Zeitpunkt unbekannt war. Daher wurden umfangreiche Sicherheitsmaßnahmen ergriffen, und diese Aktion hatte große Auswirkungen auf die ausländischen Medien, insbesondere die italienische und ungarische Presse."
 int_yugoslavia.5.a:0 "Das ist ein Aufstand? Eher ein Witz!"
 int_yugoslavia.6.t:0 "Jugoslawische Verfassung von 1931"
 int_yugoslavia.6.d:0 "Die jugoslawische Verfassung von 1931 war die endgültige Verfassung des Königreichs Jugoslawien und wurde per Dekret am 3. September 1931 erlassen. Sie verbot den Besitz von Schusswaffen durch Parlamentsmitglieder während der Sitzung und übertrug die Exekutivgewalt an Alexander I. Wahlen sollten nach allgemeinem Männerwahlrecht erfolgen. Die Bestimmung einer geheimen Abstimmung wurde gestrichen, und der Druck auf öffentliche Angestellte, für die Regierungspartei zu stimmen, sollte bei allen Wahlen unter Alexanders Verfassung ein Bestandteil sein. Der König durfte außerdem die Hälfte des Oberhauses direkt ernennen, und Gesetze konnten mit der Zustimmung eines der beiden Häuser in Kraft treten, sofern sie auch vom König genehmigt wurden."
 int_yugoslavia.6.a:0 "Interessant"
 shammar.1.t:0 "Saud bin Abdulaziz ermordet!"
 shammar.1.d:0 "Der 9. Emir des Emirats Jabal Shammar, Saud bin Abdulaziz aus dem Hause Rashid, wurde auf tragische Weise von seinem Cousin Abdullah bin Talal ermordet."
 shammar.1.a:0 "Wie schrecklich!"
 shammar.2.t:0 "Untergang der Mittelmächte"
 shammar.2.d:0 "Die Mittelmächte sind gefallen und damit kann auch unser größter Verbündeter, das Osmanische Reich, unsere Unabhängigkeit nicht länger unterstützen. Dies werden die härtesten Zeiten für das Emirat, und es wird überlebenswichtig sein. Aber können wir das? Da das ehrgeizige Nedschd im Süden relativ gute Beziehungen zu den Engländern pflegt, haben wir im Falle eines Konflikts möglicherweise keine Chance ..."
 shammar.2.a:0 "Wir sind von Feinden umgeben"


 #news.42.d:0 "The Tragic Week was a series of riots and massacres that took place in Buenos Aires, Argentina during the week of January 7th, 1919. The riot was led by anarchists and communists, and was eventually crushed by the Argentine Federal Police under Luis Dellepiane and the intervention of the Army. It resulted in a total of 700 hundred casualties. The conflict began as a strike at a British owned plant in the suburbs of Buenos Aires which at first attracted no attention but eventually picketing workers fired on a group of policemen. Eventually after the police fought it out with the striking workers at the Vasena metal works, shortly after mobs went loose all over the city and everything went out of control. Groups overturned and burned street cars and robbed shops for guns, and violence erupted in Congress."
 argentina.1.t:0 "Die tragische Woche"
 argentina.1.d:0 "Die Tragische Woche war eine Reihe von Unruhen und Massakern, die in der Woche vom 7. Januar 1919 in Buenos Aires, Argentinien stattfanden. Die Unruhen wurden von Anarchisten und Kommunisten angeführt und schließlich von der argentinischen Bundespolizei unter Luis Dellepiane und dem Eingreifen der Armee niedergeschlagen. Sie forderten insgesamt 700 Todesopfer. Der Konflikt begann mit einem Streik in einem britischen Werk in einem Vorort von Buenos Aires, der zunächst unbemerkt blieb, bis streikende Arbeiter schließlich auf eine Gruppe Polizisten schossen. Nachdem die Polizei sich schließlich mit den streikenden Arbeitern des Vasena-Metallwerks angelegt hatte, brach kurz darauf in der ganzen Stadt ein Mob aus, und alles geriet außer Kontrolle. Gruppen warfen Straßenbahnen um und brannten sie nieder, raubten Geschäfte aus, um Waffen zu erbeuten, und im Kongress brach Gewalt aus."
 argentina.1.a:0 "Wie tragisch ..."
 argentina.2.t:0 "Napalpi-Massaker"
 argentina.2.d:0 "Am 19. Juli 1924 griff in der Stadt Napalpí im argentinischen Chaco eine Gruppe von 130 Polizisten, Viehzüchtern und weißen Bürgern, bewaffnet mit Winchester- und Mauser-Gewehren, die indigene Bevölkerung an, die sich nur mit Speeren verteidigen konnte. Der Angriff dauerte 40 Minuten. Am Ende wurden die Verletzten, darunter Frauen und Kinder, mit Macheten getötet."
 argentina.2.a:0 "Was für ein schrecklicher Vorfall"


 int_usa.1.t:0 "Explosion in der Shell-Verladeanlage der TA Gillespie Company"
 int_usa.1.d:0 "Die Explosion in der Shell-Verladeanlage der TA Gillespie Company ereignete sich am 4. Oktober 1918 in einer Munitionsfabrik aus dem Ersten Weltkrieg im Stadtteil Morgan von Sayreville im Middlesex County, New Jersey. Die erste Explosion galt als Unfall und löste einen Brand und eine Serie von Explosionen aus, die drei Tage lang anhielten und insgesamt etwa 6 Kilotonnen (⅓ der Sprengkraft der Hiroshima-Bombe) erreichten. Etwa 100 Menschen kamen dabei ums Leben. Die Anlage war damals eine der größten der Welt und zerstörte 300 umliegende Gebäude sowie genügend Munition, um die Westfront sechs Monate lang zu versorgen."
 int_usa.1.a:0 "Was für eine Katastrophe!"
 int_usa.2.t:0 "Große Melasseflut"
 int_usa.2.d:0 "Die Große Melasseflut ereignete sich am 15. Januar 1919 im Stadtteil North End in Boston, Massachusetts. Ein großer Melassetank platzte, woraufhin eine Melassewelle mit 56 km/h durch die Straßen strömte. 21 Menschen starben, 150 wurden verletzt."
 int_usa.2.a:0 "Das ist eine heikle Situation"
 int_usa.3.t:0 "Achtzehnter Zusatzartikel verabschiedet"
 int_usa.3.d:0 "Der 18. Zusatzartikel zur US-Verfassung, der das Verbot alkoholischer Getränke festlegte und die Herstellung, den Transport und den Verkauf von Alkohol für illegal erklärte, wurde am 16. Januar 1919 ratifiziert und trat am 16. Januar 1920, dem folgenden Jahr, in Kraft."
 int_usa.3.a:0 "Das Verbot ist auf dem Weg!"
 int_usa.4.t:0 "Verbot tritt in Kraft"
 int_usa.4.d:0 "Der US-Senat schlug den 18. Zusatzartikel zur Verfassung am 18. Dezember 1917 vor. Am 18. November 1918, noch vor der Ratifizierung des 18. Zusatzartikels, verabschiedete der US-Kongress den vorübergehenden Wartime Prohibition Act, der den Verkauf alkoholischer Getränke mit einem Alkoholgehalt von über 1,28 Prozent verbot. (Dieses Gesetz, das Getreide für die Kriegsanstrengungen einsparen sollte, wurde nach der Unterzeichnung des Waffenstillstands am 11. November 1918 verabschiedet, der den Ersten Weltkrieg beendete.) Nach der Zustimmung eines 36. Bundesstaates am 16. Januar 1919 wurde der Zusatzartikel als Teil der Verfassung ratifiziert. Der Wartime Prohibition Act trat am 30. Juni 1919 in Kraft, wobei der 1. Juli 1919 als „Thirsty First“ bekannt wurde. Am 28. Oktober 1919 verabschiedete der Kongress trotz des Vetos von Präsident Woodrow Wilson den Volstead Act, den umgangssprachlichen Namen für den National Prohibition Act. Das Gesetz legte die rechtliche Definition alkoholischer Getränke sowie die Strafen für deren Herstellung fest. Obwohl der Volstead Act den Verkauf von Alkohol verbot, fehlten der Bundesregierung die Mittel, um dies durchzusetzen."
 int_usa.4.a:0 "Kein Bier für dich!"
 int_usa.5.t:0 "US-Senat weigert sich, den Versailler Vertrag zu ratifizieren"
 int_usa.5.d:0 "Der Kongress der Vereinigten Staaten weigerte sich, den Vertrag zu ratifizieren und lehnte ihn insbesondere hinsichtlich des Abschnitts über den Völkerbund ab, da man argumentierte, dass die USA im Rahmen des Völkerbundes zu viel Macht aufgeben würden. Der Mehrheitsführer im Senat, Henry Cabot Lodge, verfasste daraufhin 14 Vorbehalte – passend zu Wilsons 14 Punkten –, die den Einfluss des Völkerbundes auf die USA verringerten. Es gab auch eine Fraktion im Senat, die den Vertrag mit oder ohne Vorbehalte ablehnte. Während der Senat den Vertrag noch beriet, hielt Henry Borah eine zweistündige, leidenschaftliche Rede, in der er erklärte, dass wir mit der Zustimmung zum Vertrag „ein für alle Mal die große Politik der ‚Vermeidung von Bündnissen‘ verwirkt und aufgegeben haben, auf der die Stärke dieser Republik seit 150 Jahren beruht.“"
 int_usa.5.a:0 "Dies können wir nicht berücksichtigen!"
 int_usa.6.t:0 "Bombenanschlag auf die Wall Street"
 int_usa.6.d:0 "Der Wall-Street-Anschlag ereignete sich am 16. September 1920 um 12:01 Uhr im Finanzviertel von Manhattan, New York City. Die Explosion tötete 30 Menschen sofort, weitere acht erlagen später ihren Verletzungen. 143 Menschen wurden schwer verletzt, insgesamt mehrere Hundert. Der Anschlag wurde nie aufgeklärt, Historiker und Ermittler gehen jedoch davon aus, dass er von italienischen Anarchisten verübt wurde, die im Jahr zuvor für eine Reihe von Bombenanschlägen verantwortlich waren. Der Anschlag stand im Zusammenhang mit den sozialen Unruhen, Arbeitskämpfen und der antikapitalistischen Bewegung der Nachkriegszeit in den USA."
 int_usa.6.a:0 "Wie schrecklich!"
 int_usa.7.t:0 "Warren G. Harding gestorben"
 int_usa.7.d:0 "Warren G. Hrading ging am 27. Juli 1923 früh abends zu Bett und klagte später bei seinem Arzt über Oberbauchschmerzen. Dr. Joel T. Boone vermutete ein Herzproblem, und der Zug eilte nach San Francisco. Harding fühlte sich besser, als sie am 29. Juli 1923 ankamen. Er bestand darauf, vom Zug zum Auto zu gehen, das ihn zum Palace Hotel brachte, wo er einen Rückfall erlitt. Die Ärzte stellten fest, dass er nicht nur Herzprobleme hatte, sondern auch eine Lungenentzündung – eine ernste Angelegenheit in der Zeit vor wirksamen Antibiotika. Am Nachmittag des 2. August 1923 erlaubten die Ärzte Harding, sich im Bett aufzusetzen. Während seine Frau ihm einen Artikel über ihn vorlas, begann er sich krampfhaft zu winden und brach zusammen. Die Ärzte konnten ihn nicht wiederbeleben. Er soll an einem Herzinfarkt gestorben sein. Sein Tod war ein großer Schock für die Nation, da er beliebt und bewundert war. Neun Millionen Menschen säumten die Gleise, als sein Leichnam von San Francisco nach Washington, D.C. überführt wurde."
 int_usa.7.a:0 "Er wird uns fehlen"
 int_usa.8.t:0 "Washingtoner Flottenvertrag"
 int_usa.8.d:0 "Der Washingtoner Flottenvertrag war ein Vertrag zwischen den großen Siegermächten des Ersten Weltkriegs, der ein Wettrüsten durch die Begrenzung des Schiffsbaus verhindern sollte. Er wurde auf der Washingtoner Flottenkonferenz ausgehandelt, die von November 1921 bis Februar 1922 in Washington, D.C. stattfand, und von den Regierungen Großbritanniens, der USA, Japans, Frankreichs und Italiens unterzeichnet. Er beschränkte den Bau von Schlachtschiffen, Schlachtkreuzern und Flugzeugträgern durch die Unterzeichner. Die Anzahl anderer Kategorien von Kriegsschiffen wie Kreuzern, Zerstörern und U-Booten wurde durch den Vertrag nicht begrenzt, allerdings auf 10.000 Tonnen Verdrängung. Der Vertrag wurde am 6. Februar 1922 geschlossen."
 int_usa.8.a:0 "Frieden für die Ewigkeit!"
 int_usa.9.t:0 "Teekannen-Kuppel-Skandal"
 int_usa.9.d:0 "Der Teapot-Dome-Skandal war ein Bestechungsskandal, der sich von 1921 bis 1922 während der Amtszeit von Präsident Warren G. Harding in den USA ereignete. Innenminister Albert Bacon Fall hatte die Ölreserven der Marine in Teapot Dome in Wyoming und an zwei weiteren Standorten in Kalifornien ohne Ausschreibung zu niedrigen Preisen an private Ölkonzerne verpachtet. In den Jahren 1922 und 1923 wurden die Pachtverträge Gegenstand aufsehenerregender Ermittlungen von Senator Thomas J. Walsh. Fall wurde später wegen Annahme von Bestechungsgeldern von den Ölkonzernen verurteilt und war das erste Kabinettsmitglied, das ins Gefängnis musste. Niemand wurde jedoch jemals wegen der Zahlung von Bestechungsgeldern verurteilt."
 int_usa.9.a:0 "Lasst uns der Korruption ein Ende setzen"
 int_usa.10.t:0 "Unbekannter Soldat begraben"
 int_usa.10.d:0 "Das Grabmal des unbekannten Soldaten ist ein Denkmal für amerikanische Soldaten, deren sterbliche Überreste nicht identifiziert werden konnten. Es ist auch als Grabmal des unbekannten Soldaten bekannt, wurde aber nie offiziell so genannt. Es befindet sich auf dem Arlington National Cemetery in Virginia. Der „Unbekannte“ aus dem Ersten Weltkrieg ist Träger der Medal of Honor, des Victoria-Kreuzes und der höchsten Verdienstauszeichnungen mehrerer anderer Nationen. Die beigesetzten unbekannten Soldaten der USA sind ebenfalls Träger der Medal of Honor, die ihnen von den US-Präsidenten überreicht wird, die ihre Beerdigung leiteten."
 int_usa.10.a:0 "Er diente tapfer"
 int_usa.11.t:0 "Ende der amerikanischen Besetzung der Dominikanischen Republik"
 int_usa.11.d:0 "Nach dem Ersten Weltkrieg wandte sich die öffentliche Meinung in den Vereinigten Staaten gegen die Besetzung der Dominikanischen Republik. Warren G. Harding, der im März 1921 Woodrow Wilsons Nachfolger wurde, hatte gegen die Besetzung Haitis und der Dominikanischen Republik gekämpft. Im Juni 1921 legten US-Vertreter einen Rückzugsvorschlag vor, den sogenannten Harding-Plan. Dieser sah die Ratifizierung aller Gesetze der Militärregierung durch die Dominikanische Republik, die Genehmigung eines Darlehens in Höhe von 2,5 Millionen US-Dollar für öffentliche Bauvorhaben und andere Ausgaben, die Entsendung amerikanischer Polizeibeamter sowie die Abhaltung von Wahlen unter US-Aufsicht vor. Die Reaktion der Bevölkerung auf den Plan war überwiegend negativ. Gemäßigte dominikanische Politiker nutzten den Plan jedoch als Grundlage für weitere Verhandlungen, die am 30. Juni 1922 zu einer Einigung zwischen US-Außenminister Charles Evans Hughes und dem dominikanischen Botschafter in den Vereinigten Staaten, Francisco J. Peynado, führten. Diese Einigung ermöglichte die Wahl eines provisorischen Präsidenten, der bis zur Organisation von Wahlen regieren sollte. Bei den Präsidentschaftswahlen vom 15. März 1924 besiegte Horacio Vásquez Lajara, ein amerikanischer Verbündeter, der mit der US-Regierung kooperierte, Peynado mühelos. Mit seiner Amtseinführung am 13. Juli fiel die Kontrolle über die Republik wieder in dominikanische Hände."
 int_usa.11.a:0 "Sie können Ihr Land zurückbekommen"
 int_usa.12.t:0 "Scopes-Studie"
 int_usa.12.d:0 "Der Scopes-Prozess war ein US-amerikanischer Rechtsstreit im Mai 1925, in dem der Aushilfslehrer John T. Scopes beschuldigt wurde, gegen den Butler Act des Staates Tennessee verstoßen zu haben, der den Unterricht über die menschliche Evolution an staatlichen Schulen verbot. Der Prozess wurde bewusst inszeniert, um die Aufmerksamkeit der Kleinstadt Dayton im Bundesstaat Tennessee, wo er stattfand, auf sich zu ziehen. Scopes war sich nicht sicher, ob er jemals die Evolutionstheorie gelehrt hatte, belastete sich jedoch absichtlich selbst, um einen Angeklagten in dem Fall zu haben. Scopes wurde schließlich für schuldig befunden und zu einer Geldstrafe von 100 US-Dollar (heute 1366 US-Dollar) verurteilt. Das Urteil wurde jedoch aus formalen Gründen aufgehoben. Der Prozess erfüllte jedoch seinen Zweck: Er erregte landesweite Aufmerksamkeit, da nationale Reporter nach Dayton strömten, um über die namhaften Anwälte zu berichten, die sich bereit erklärt hatten, beide Seiten zu vertreten."
 int_usa.12.a:0 "Lächerlich!"
 int_usa.13.t:0 "Paraden des Ku-Klux-Klans in Washington D.C."
 int_usa.13.d:0 "Am 8. August marschierten zwischen 25.000 und 400.000 Mitglieder des Ku-Klux-Klans in die US-Hauptstadt, um ihre Unterstützung für ihre Gruppe zu zeigen und Einwanderungsbeschränkungen aufgrund von Rasse und Herkunftsland zu fordern."
 int_usa.13.a:0 "Nette Leute..."
 int_usa.14.t:0 "FDR tot!"
 int_usa.14.d:0 "Unser geliebter Präsident Franklin Delano Roosevelt ist nach einer Hirnblutung verstorben. In hundert Jahren werden die Menschen Gott auf Knien danken, dass Franklin D. Roosevelt im Weißen Haus saß ..."
 int_usa.14.a:0 "So endete eine Ära, so begann eine neue"
 georgia.1.t:0 "Erdbeben von Gori 1920"
 georgia.1.d:0 "Das Erdbeben von Gori 1920 erschütterte am 20. Februar die Demokratische Republik Georgien mit einer Stärke von 7,2. Es richtete schwere Schäden an und forderte in der Stadt Gori weitere 114 bis 130 Todesopfer."
 georgia.1.a:0 "Es hätte viel schlimmer kommen können"
 georgia.2.t:0 "Putschversuch 1920"
 georgia.2.d:0 "Am 3. Mai 1920 scheiterte ein Putschversuch der Bolschewiki in der Demokratischen Republik Georgien. Die Bolschewiki versuchten, eine Militärschule und Regierungsgebäude in der georgischen Hauptstadt Tiflis zu besetzen. Die georgische Regierung unterdrückte jedoch Unruhen in Tiflis und konzentrierte ihre Kräfte darauf, den Vormarsch russischer Truppen an der aserbaidschanisch-georgischen Grenze erfolgreich zu blockieren. Der georgische Widerstand und der unruhige Krieg mit Polen veranlassten die rote Führung, Pläne zur Sowjetisierung Georgiens aufzugeben und Georgien im Moskauer Vertrag vom 7. Mai vorerst als unabhängigen Staat anzuerkennen."
 georgia.2.a:0 "Das ist absurd!"
 georgia.3.t:0 "Vertrag von Moskau 1920"
 georgia.3.d:0 "Der am 7. Mai 1920 zwischen der Russischen SFSR und der Demokratischen Republik Georgien unterzeichnete Moskauer Vertrag gewährte Georgien de jure die Anerkennung seiner Unabhängigkeit im Austausch für das Versprechen, Truppen von Mächten, die dem bolschewistischen Russland feindlich gesinnt waren, auf georgischem Boden kein Asyl zu gewähren."
 georgia.3.a:0 "Wie lange wird dieser Scheinfrieden halten?"

 ww1_baltic.1.t:0 "Auflösung des Vereinigten Baltischen Herzogtums"
 ww1_baltic.1.d:0 "Nach dem Zusammenbruch Deutschlands und dem Rückzug der deutschen Truppen aus den besetzten Nationalstaaten Brest-Litowsk entstand sofort ein Machtvakuum und viele der zuvor eingesetzten pro-deutschen Regierungen wurden ersetzt. Im Vereinigten Baltischen Herzogtum wurde die Regentschaft kurz nach der Unterzeichnung des Waffenstillstands von Compiègne sofort aufgehoben, wodurch die Existenz des Herzogtums endete und an seiner Stelle Estland und Lettland gebildet wurden."
 ww1_baltic.1.a:0 "Das Ende ist gekommen..."
 ww1_baltic.2.t:0 "Vertrag von Riga"
 ww1_baltic.2.d:0 "Der am 11. August 1920 unterzeichnete Vertrag von Riga beendete offiziell den lettischen Unabhängigkeitskrieg und die RSFSR erkannte die Unabhängigkeit Lettlands „für alle Zukunft“ an."
 ww1_baltic.2.a:0 "Großartig!"
 ww1_baltic.3.t:0 "Vertrag von Tartu"
 ww1_baltic.3.d:0 "Der Vertrag von Tartu vom 2. Februar 1920 beendete den sowjetisch-estnischen Krieg formell. Die Vertragsbedingungen sahen vor, dass die RSFSR die Unabhängigkeit der Republik Estland de jure anerkannte und auf alle Rechte am estnischen Territorium verzichtete. Die RSFSR erließ Estland außerdem alle Schulden aus der Zarenzeit und erhielt einen Anteil an den Goldreserven des ehemaligen Russischen Reiches. Dies war die erste Anerkennung Estlands und auch für die diplomatisch isolierte RSFSR von Bedeutung."
 ww1_baltic.3.a:0 "Großartig!"
 ww1_baltic.4.t:0 "Moskauer Friedensvertrag"
 ww1_baltic.4.d:0 "Der sowjetisch-litauische Vertrag, auch bekannt als Moskauer Friedensvertrag, wurde am 12. Juli 1920 nach der Kapitulation Sowjetrusslands im Sowjetisch-Litauischen Krieg zwischen Litauen und der Russischen SFSR unterzeichnet. Im Gegenzug für Litauens Neutralität und die Erlaubnis Sowjetrusslands, während des Polnisch-Sowjetischen Krieges militärisch durch litauisches Territorium vorzudringen, erkannte die Russische SFSR die Unabhängigkeit Litauens offiziell an. Dies war ein wichtiger Meilenstein für Litauens Kampf um internationale Anerkennung."
 ww1_baltic.4.a:0 "Großartig!"
 ww1_baltic.5.t:0 "1919 gescheiterter polnischer Putschversuch Litauen"
 ww1_baltic.5.d:0 "Zwischen August und September 1919 sollte die Polnische Militärorganisation einen Staatsstreich durchführen. Ziel war es, die litauische Regierung zu stürzen. Der Putsch sollte als Initiative der einheimischen Litauer dargestellt werden, die sich von der deutschen Fremdherrschaft befreien wollten. Das eigentliche Ziel war jedoch die Einsetzung eines propolnischen Kabinetts, das einer polnisch-litauischen Union zustimmen würde."
 ww1_baltic.5.a:0 "Das bedeutet Krieg..."
 ww1_baltic.6.t:0 "Polnisch-Litauischer Krieg"
 ww1_baltic.6.d:0 "Zwischen August und September 1919 sollte die Polnische Militärorganisation einen Staatsstreich durchführen. Ziel war es, die litauische Regierung zu stürzen. Dabei sollte der Anschein erweckt werden, es handele sich um eine Initiative der einheimischen Litauer, die sich von der deutschen Fremdherrschaft befreien wollten. Das eigentliche Ziel bestand jedoch darin, ein propolnisches Kabinett einzusetzen, das einer polnisch-litauischen Union zustimmen würde."
 ww1_baltic.6.a:0 "Vilnius gehört uns!"
 ww1_baltic.7.t:0 "Suwałki-Abkommen"
 ww1_baltic.7.d:0 "Das Suwalki-Abkommen war ein Abkommen, das am 7. Oktober 1920 in der Stadt Suwalki zwischen Polen und Litauen unterzeichnet wurde. Es war hauptsächlich auf Druck des Völkerbundes auf Polen zurückzuführen, der den polnisch-litauischen Konflikt beenden wollte."
 ww1_baltic.7.a:0 "Endlich Frieden"
 ww1_baltic.8.t:0 "Zeligowski-Meuterei"
 ww1_baltic.8.d:0 "Im Oktober 1920 kontaktierte Pilsudski den polnischen General Zeligowski und schlug ihm Ende September vor, eine Meuterei zu organisieren. Der Plan bestand darin, eine Desertion aus der polnischen Armee vorzutäuschen und die Kontrolle über die Region und die Stadt Vilnius zu übernehmen. Die polnische Regierung bestritt offiziell jegliche Beteiligung und wahrte so ihren Ruf auf der internationalen Bühne. Nach der Meuterei wurde die Zentrallitauische Republik ausgerufen, die de facto eine Marionette Polens war und schließlich in das Land integriert wurde."
 ww1_baltic.8.a:0 "Vilnius gehört uns!"
 ww1_baltic.9.t:0 "Von der Sowjetunion unterstützter Putsch in Estland scheitert!"
 ww1_baltic.9.d:0 "Am 1. Dezember 1924 verübte die Komintern in Estland einen Putschversuch. Die Kommunisten waren größtenteils aus der Sowjetunion eingeschleust. Von den 279 aktiv beteiligten Kommunisten fielen 125, über 500 wurden verhaftet. Die Regierungstruppen verloren 26 Mann. Der Putsch wurde später als „Tallinn-Aufstand“ bezeichnet."
 ww1_baltic.9.a:0 "Diese dreckigen Kommunisten!"
 ww1_baltic.10.t:0 "1926 Litauischer Putsch"
 ww1_baltic.10.d:0 "Der litauische Staatsstreich von 1926 war ein Militärputsch in Litauen, der zur Ersetzung der demokratisch gewählten Regierung durch eine konservative autoritäre Regierung unter Antanas Smetona führte. Der Putsch fand am 17. Dezember 1926 statt und wurde größtenteils vom Militär organisiert; Smetonas Rolle ist bis heute umstritten. Der Putsch brachte die Litauische Nationalistische Union, die damals konservativste Partei, an die Macht. Vor 1926 war sie eine relativ neue und unbedeutende nationalistische Partei gewesen: 1926 zählte sie etwa 2.000 Mitglieder und hatte bei den Parlamentswahlen nur drei Sitze gewonnen. Die Litauische Christdemokratische Partei, damals die größte Partei im Seimas, kollaborierte mit dem Militär und verlieh dem Putsch verfassungsmäßige Legitimität, übernahm jedoch keine wichtigen Posten in der neuen Regierung und zog sich im Mai 1927 zurück. Nachdem das Militär die Macht an die Zivilregierung übergeben hatte, spielte es keine direkte Rolle mehr im politischen Leben."
 ww1_baltic.10.a:0 "Wir begrüßen diese neue Führung!"
 ww1_baltic.11.t:0 "Das Ende der litauischen Monarchie"
 ww1_baltic.11.d:0 "Nach der endgültigen Niederlage Deutschlands im Ersten Weltkrieg und der Unterzeichnung des Waffenstillstands von Compiègne wurde die litauische Regierung offiziell zur Republik erklärt und die Monarchie endgültig abgeschafft."
 ww1_baltic.11.a:0 "Auf Nimmerwiedersehen!"
 ww1_finland.1.t:0 "Ostkarelischer Aufstand"
 ww1_finland.1.d:0 "Am 6. November 1921 kämpften ostkarelische Separatisten mit Unterstützung finnischer Freiwilliger gegen die RSFSR und hofften auf Unabhängigkeit. Diese Auseinandersetzung wurde von einigen finnischen Nationalisten mit der Idee eines „Großfinnlands“ unterstützt, galt aber nicht als Krieg zwischen Russland und Finnland."
 ww1_finland.1.a:0 "Interessant..."
 ww1_finland.2.t:0 "Bürgerkrieg vorbei!"
 ww1_finland.2.d:0 "Der Bürgerkrieg, der am 27. Januar 1918 begann, ist heute endlich beendet. Die finnischen Weißen haben dank der Hilfe der Kaiserlich Deutschen Armee, die sie während des Krieges regelmäßig verstärkte, die volle Kontrolle über das Land. Es besteht kein Zweifel daran, dass das Deutsche Reich seine Hegemonie in Finnland gesichert hat und plant, eine von Deutschland geführte finnische Monarchie zu errichten. Der Bürgerkrieg hat die Nation jedoch weiterhin gespalten, und es ist ungewiss, wann die finnische Gesellschaft wirklich wieder vereint sein wird."
 ww1_finland.2.a:0 "Gott sei Dank!"
 ww1_finland.3.t:0 "Bürgerkrieg vorbei!"
 ww1_finland.3.d:0 "Der Bürgerkrieg, der am 27. Januar 1918 zwischen den finnischen Roten und Weißen begann, endete heute endlich. Die Roten behielten dank der Hilfe unserer sowjetischen Verbündeten, die derzeit noch ihren eigenen Bürgerkrieg führen, die volle Kontrolle über das Land. Es besteht kein Zweifel daran, dass die Revolution in alle Teile der Welt getragen werden sollte, und wir planen, dies gemeinsam mit unserem sowjetischen Verbündeten zu erreichen. Der Bürgerkrieg hat unsere Nation jedoch gespalten, und es ist ungewiss, wann die finnische Gesellschaft endgültig geheilt sein wird."
 ww1_finland.3.a:0 "Hurra!"
 ww1_finland.4.t:0 "Waffenstillstand in Moskau"
 ww1_finland.4.d:0 "Der Krieg war für Finnland nicht so gnädig. Obwohl wir einen Großteil unseres im Winterkrieg von der Sowjetunion annektierten Landes zurückeroberten, hat sich das Blatt gegen uns gewendet. Bevor es zu spät ist, sollten wir einen Waffenstillstand unterzeichnen, um die Kämpfe zu beenden, sonst enden wir wie einer der anderen Verbündeten Deutschlands, der vom Kommunismus überfallen und von einer bolschewistischen Marionettenregierung gegen den Willen des Volkes eingesetzt wird."
 ww1_finland.4.a:0 "Es ist Zeit, diesen Krieg zu beenden"
 ww1_finland.4.b:0 "Wir werden weiterkämpfen!"
 ww1_finland.5.t:0 "Risto Ryti tritt zurück"
 ww1_finland.5.d:0 "Unser Präsident Risto Ryti hat seinen Rücktritt angekündigt, nachdem die sowjetische Offensive uns zurückgedrängt und uns bis zur Karelischen Landenge durchbrechen ließ. Sein Nachfolger wird niemand anderes als Carl Gustaf Emil Mannerheim sein, der entschlossen ist, eine Alternative zu suchen, anstatt diesen Krieg, den wir nicht gewinnen können, fortzusetzen."
 ww1_finland.5.a:0 "Hoffen wir, dass sich die Dinge ändern können"
 ww1_finland.6.t:0 "Der Lapplandkrieg beginnt"
 ww1_finland.6.d:0 "Heute hat unsere Regierung, kurz nach der Unterzeichnung des Moskauer Waffenstillstands, mit dem Kampf gegen die deutschen Divisionen in ihrem Land begonnen, um die verzweifelt fliehenden deutschen Divisionen aus Nordfinnland zu vertreiben."
 ww1_finland.6.a:0 "Wir werden kämpfen, wenn es sein muss!"
 ww1_finland.7.t:0 "König proklamiert"
 ww1_finland.7.d:0 "Nach dem Sieg der weißen Fraktion im Bürgerkrieg wurde die Sozialdemokratische Partei aus dem Parlament ausgeschlossen, wo eine neue Verfassung verabschiedet wurde, die es heute ermöglicht, Karl Friedrich von Hessen auf den finnischen Thron zu wählen."
 ww1_finland.7.a:0 "Das Königreich Finnland ist also"
 ww1_finland.8.t:0 "Friedrich Karl dankt ab!"
 ww1_finland.8.d:0 "Nach der deutschen Niederlage im Ersten Weltkrieg vor kaum einem Monat war der Westen es leid, einen in Deutschland geborenen Prinzen als König von Finnland zu haben. Nach mehreren Warnungen konnte Friedrich Karl heute davon überzeugt werden, auf den Thron zu verzichten. CGE Mannerheim wurde bis zu den bevorstehenden Wahlen zum Regenten ernannt."
 ww1_finland.8.a:0 "Es war nie so gedacht"

 norway.1.t:0 "Christiania in Norwegen ändert den Namen in Oslo"
 norway.1.d:0 "Nachdem die Stadt während der Herrschaft von Christian IV. von Dänemark nach der Zerstörung durch einen Brand im Jahr 1624 näher an die Festung Akershus heranrückte, wurde sie ihm zu Ehren in Christiania umbenannt. Von 1877 bis 1925 war sie jedoch unter dem Namen Kristiania bekannt und erhielt schließlich am 1. Januar 1925 wieder ihren ursprünglichen norwegischen Namen „Oslo“."
 norway.1.a:0 "Es ist Oslo!"
 transcauc.1.t:0 "Georgia tritt aus!"
 transcauc.1.d:0 "Die Demokratische Republik Georgien hat sich von der Transkaukasischen Demokratischen Föderativen Republik abgespalten, nachdem ihr die Deutschen versprochen hatten, ihr die Unabhängigkeit und internationale Anerkennung zu garantieren."
 transcauc.1.a:0 "Feiglinge haben alle aufgegeben"
 transcauc.1.b:0 "Abspaltung? Niemals!"
 transcauc.1.c:0 "Endlich ist Georgien frei!"
 transcauc.2.t:0 "Das Ende Transkaukasiens"
 transcauc.2.d:0 "Nach der Abspaltung Georgiens und dem darauffolgenden Vertrag von Poti lösten Armenien und Aserbaidschan die Transkaukasische Demokratische Föderative Republik am 28. Mai 1918 formell auf und Armenien wurde kurz darauf gezwungen, den Vertrag von Batum zu unterzeichnen."
 transcauc.2.a:0 "Für Armenien!"
 transcauc.2.b:0 "Für Aserbaidschan!"
 transcauc.3.t:0 "Vertrag von Poti"
 transcauc.3.d:0 "Der am 28. Mai 1918 unterzeichnete Vertrag von Poti war ein Abkommen zwischen dem Deutschen Reich und der neu gegründeten Demokratischen Republik Georgien, die sich zwei Tage zuvor von der Transkaukasischen Demokratischen Föderativen Republik abgespalten hatte. Deutschland versprach darin Schutz vor den Osmanen und die Anerkennung des neu gegründeten Staates. Deutschland sollte die freie und uneingeschränkte Nutzung der georgischen Eisenbahnen und aller in georgischen Häfen verfügbaren Schiffe für die Besetzung strategischer Punkte durch deutsche Expeditionstruppen, den freien Umlauf deutscher Währung in Georgien, die Gründung einer gemeinsamen deutsch-georgischen Bergbaugesellschaft und den Austausch diplomatischer und konsularischer Vertreter erhalten. Die Zusammenarbeit zwischen den beiden Ländern war ungleich und kurzlebig, erwies sich jedoch als sehr vorteilhaft für Georgien und ermöglichte dem Land, das Jahr 1918 zu überleben. Georgien weigerte sich jedoch, sich formell mit den Mittelmächten zu verbünden, und setzte die Verhandlungen über einen endgültigen Vertrag fort, die jedoch nach der militärischen Niederlage Deutschlands scheiterten."
 transcauc.3.a:0 "Zumindest ist uns die Unabhängigkeit garantiert"
 transcauc.4.t:0 "26 Baku-Kommissare"
 transcauc.4.d:0 "Die 26 Baku-Kommissare waren bolschewistische Mitglieder der kurzlebigen Bakuer Sowjetkommune, die am 13. April 1918 in Baku gegründet wurde. Die dort stationierten Truppen bestanden größtenteils aus Armeniern und waren an Gräueltaten gegen die lokale muslimische Bevölkerung beteiligt. Die Garnison erhielt geringfügige Unterstützung von den Bolschewiken, die Getreide über das Meer schickten, das hauptsächlich für die Truppen bestimmt war. Die osmanischen Türken, die die Stadt einnehmen wollten, griffen am 5. Juni 1918 an und wurden weitgehend zurückgeschlagen. Später starteten sie jedoch eine Gegenoffensive auf Ganja und mussten sich nach Baku zurückziehen, wo sie Verhandlungen mit General Dunsterville, dem Befehlshaber der britischen Streitkräfte in Persien, aufnahmen."
 transcauc.4.a:0 "Sie werden nicht lange halten"
 transcauc.4.b:0 "Zerschmettere sie!"
 transcauc.5.t:0 "Fall der Kommune von Baku"
 transcauc.5.d:0 "Nachdem die Verhandlungen mit den Briten begonnen hatten, wurden die Bolschewiki, die die Kommune von Baku kontrolliert hatten, rasch durch die Menschewiki ersetzt, die den Staat mit Sitz in der Stadt Baku zur Zentralkaspischen Diktatur ernannten und die Briten um Unterstützung baten, die diese ihnen gewährten. Die Stadt fiel jedoch innerhalb von zwei Monaten, als die osmanisch-aserbaidschanischen Streitkräfte Baku einnahmen."
 transcauc.5.a:0 "Nieder mit den Roten!"
 transcauc.6.t:0 "Märztage"
 transcauc.6.d:0 "Zwischen dem 30. März und dem 2. April schlugen armenische und bolschewistische Streitkräfte in der Stadt Baku während des interethnischen Kampfes einen muslimischen Aufstand gewaltsam nieder. Auslöser war ein politischer Machtkampf zwischen den Bolschewiki, die von der Armenischen Revolutionären Föderation unterstützt wurden, und der aserbaidschanischen Musavat-Partei. Dies führte zu einem Massaker an 3.000 bis 12.000 Aserbaidschanern und anderen Muslimen."
 transcauc.6.a:0 "Schrecklich..."
 transcuac.7.t:0 "Spitzbergen-Vertrag"
 transcauc.7.d:0 "Der am 9. Februar 1920 unterzeichnete Spitzbergenvertrag erkannte die Souveränität Norwegens über den arktischen Archipel Spitzbergen an. Der Vertrag regelte die Entmilitarisierung des Archipels und gewährte den Unterzeichnern gleiche Rechte bei der Ausübung kommerzieller Aktivitäten, vor allem im Kohlebergbau auf den Inseln."
 transcauc.7.a:0 "OK"
 transcauc.8.t:0 "Leipziger Kriegsverbrecherprozesse"
 transcauc.8.d:0 "Die Leipziger Kriegsverbrecherprozesse von 1921 waren eine Reihe von Prozessen gegen mutmaßliche deutsche Kriegsverbrecher des Ersten Weltkriegs vor dem Reichsgericht in Leipzig. Diese Prozesse waren Teil der Strafen, die der deutschen Regierung im Rahmen des Versailler Vertrags auferlegt wurden. \n\n Während des Ersten Weltkriegs entwickelten die alliierten Führer ein neues Konzept: Nach einem Sieg sollten feindliche Führer wegen während des Krieges begangener Verstöße gegen das Völkerrecht angeklagt werden. Jede der alliierten Großmächte – Großbritannien, Frankreich, Italien, die Vereinigten Staaten und Japan – war mit einem Richter vertreten. Kaiser Wilhelm II. wurde als Kriegsverbrecher eingestuft und die niederländische Regierung, die ihm Asyl gewährt hatte, forderte seine Auslieferung. Die Alliierten legten der deutschen Regierung eine weitere Liste mit 900 Namen von Personen vor, die beschuldigt wurden, mutmaßliche Kriegsverbrechen begangen zu haben. Die Deutschen weigerten sich jedoch, deutsche Staatsbürger an die alliierten Regierungen auszuliefern, und schlugen stattdessen vor, sie vor deutsche Justiz zu stellen, was auch geschah. Die deutsche Regierung reduzierte die Liste auf 45 Angeklagte. Es war äußerst schwierig, glaubwürdige Beweise zu finden und diese Personen aufzuspüren."
 transcauc.8.a:0 "Schlecht ausgeführt"
 transcauc.9.t:0 "Die Alliierten fordern die Niederlande auf, Kaiser Wilhelm II. auszuliefern"
 transcauc.9.d:0 "Am 23. Januar 1920 lehnte die niederländische Regierung die Forderungen der Alliierten nach der Auslieferung Wilhelms II. ab, der seit November 1918 im Exil lebte. Im Januar 1920 hatten die Alliierten Wilhelm II. nach der Unterzeichnung des Versailler Vertrags ganz oben auf die Liste der sogenannten „Kriegsverbrecher“ gesetzt. Wilhelmina, die Königin der Niederlande, lehnte jedoch seine Auslieferung zur Strafverfolgung ab, und Wilhelm blieb in Holland."
 transcauc.9.a:0 "„Ich habe nichts falsch gemacht, oder, Leute?“"
 transcauc.10.t:0 "Transkaukasischer Zusammenbruch – KI-Ereignis"
 transcauc.10.a:0 "Veröffentlicht ARM und AZR!"
 transcauc.10.d:0 "Dieses Ereignis dient dazu, einen Absturz zu verhindern. Transkaukasien wird als Mensch ein anderes Ereignis erleben."


 persia.1.t:0 "Persischer Couo d&#39;etat von 1921"
 persia.1.d:0 "Im Jahr 1920 bereitete sich die Persische SSR in Rascht mit einer „Guerillatruppe aus 1.500 Bengalen, Kurden, Armeniern und Aserbaidschanern“, verstärkt durch die Rote Armee, auf den Marsch auf Teheran vor. Dies sowie verschiedene andere Unruhen, Meutereien und Unruhen im Land führten zu einer akuten politischen Krise in der Hauptstadt. 1921 war die herrschende Kadscharen-Dynastie Persiens als korrupt und ineffizient bekannt und war militärisch und wirtschaftlich auf die Unterstützung Großbritanniens und Russlands angewiesen. Ein Bürgerkrieg war eine ständige Bedrohung und die einzige militärische Kraft zu dieser Zeit waren die Kosakenbrigaden. 1921 wurde der Kadscharen-Schah Ahmad im Alter von 11 Jahren gekrönt und galt daher als schwacher und inkompetenter Herrscher. Insgesamt hatte der Ruf der Kadscharen-Regierung schwer gelitten und sie erwies sich in Kriegszeiten als machtlos. Selbst Großbritannien war bestürzt über die Unfähigkeit der Regierung, effizient zu regieren, und in Persien blieb ein Machtkampf zwischen Großbritannien und Russland ausgetragen. Am 14. Januar 1921 beförderte der britische General Ironside Reza Khan, der ein Bataillon aus Täbris anführte, einen Monat später eine ganze Brigade unter britischer Führung nach Teheran. Am 18. Februar 1921 erreichten die Kosaken Teheran, stießen jedoch auf wenig Widerstand; lediglich einige überraschte Polizisten wurden getötet oder verwundet. Mit Unterstützung der Truppen zwang Khan die Regierung zur Auflösung und übernahm de facto die Macht."
 persia.1.a:0 "Nieder mit der Kadscharen-Regierung!"
 persia.2.t:0 "Russisch-Persischer Freundschaftsvertrag"
 persia.2.d:0 "Der Russisch-Persische Freundschaftsvertrag wurde am 26. Februar 1921 zwischen Vertretern des Iran und der Russischen SFSR unterzeichnet. Alle vorherigen Vereinbarungen zwischen den Unterzeichnern, einschließlich des Vertrags von Turkmentschai, wurden aufgehoben. Die Russische SFSR und Persien erhielten zudem volle und gleiche Schifffahrtsrechte im Kaspischen Meer sowie das Recht, ihre Nationalflaggen auf Handelsschiffen zu hissen. Der ursprüngliche Zweck des Vertrags bestand darin, zu verhindern, dass weißrussische konterrevolutionäre Kräfte, die nach der bolschewistischen Revolution in den Iran geflohen waren, die RSFSR von persischem Gebiet aus angreifen konnten."
 persia.2.a:0 "Großartig!"
 persia.3.t:0 "Gründung der Persischen Sozialistischen Sowjetrepublik"
 persia.3.d:0 "Im Mai 1920 lief die sowjetische Kaspische Flotte in den kaspischen Hafen von Anzali ein. Diese Mission galt den Angaben zufolge lediglich der Verfolgung russischer Schiffe und Munition, die der weißrussische Konterrevolutionär General Denikin nach Anzali gebracht hatte. Er hatte in Anzali Asyl erhalten und wurde bald darauf evakuiert. Die dortigen Jangalis (eine Gruppe, die gegen die monarchistische Herrschaft im Iran rebellierte) waren der Meinung, dass die Bolschewiki eine echte Lösung für die Probleme boten, die sowohl Russland als auch Persien teilten: die Vorherrschaft der Oberschicht und des kaiserlichen Hofes. Kuchik Khans Stellvertreter war Kommunist geworden und befürwortete ein Bündnis mit den Bolschewiki. Kutchik Khan zögerte zunächst aufgrund seines religiösen und nationalistischen Hintergrunds, schloss aber schließlich ein Abkommen mit den Bolschewiki. Im Mai 1920 wurde die Persische Sozialistische Sowjetrepublik ausgerufen. 1921 beschlossen die Sowjets jedoch, die Persische Sozialistische Sowjetrepublik nicht weiter zu unterstützen. Sie schlossen ein Abkommen mit den Briten und unterzeichneten den russisch-persischen Freundschaftsvertrag. Die Sowjetrepublik Gilan endete offiziell im September 1921."
 persia.3.a:0 "Die Revolution breitet sich aus"
 persia.4.t:0 "Ende der Persischen Sozialistischen Sowjetrepublik"
 persia.4.d:0 "Nachdem die Sowjets 1921 eine Vereinbarung mit den Briten getroffen und den Russisch-Persischen Vertrag unterzeichnet hatten, wurde entschieden, dass keine weitere Unterstützung für die Persische Sozialistische Sowjetrepublik erforderlich sei, und die Republik endete offiziell im September 1921."
 persia.4.a:0 "Großartig!"
