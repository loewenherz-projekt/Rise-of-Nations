 US2_neutrality:0 "Vollständige Neutralität der USA"
 US2_neutrality_desc:0 "Wir meinten es ernst, als wir sagten, wir seien neutral und würden uns nicht einmischen!"
 US2_isolationism:0 "Isolationismus der USA"
 US2_isolationism_desc:0 ""
 US2_support_entente:0 "Unterstützen Sie Entente"
 US2_support_entente_desc:0 "Obwohl wir uns nicht in diesen europäischen Konflikt einmischen wollen, ist die Entente die gute Seite in diesem Krieg, und wir werden die Demokratie in ihrem Kampf gegen die Autokraten unterstützen, egal was passiert. Die Tatsache, dass Russland zur Entente gehört, beunruhigt uns jedoch sehr."
 US2_condemn_unrestricted_sub:0 "Verurteilen Sie den uneingeschränkten U-Boot-Krieg"
 US2_condemn_unrestricted_sub_desc:0 "Die Deutschen dürfen mit ihren feindseligen und unmenschlichen Aktionen des uneingeschränkten U-Boot-Krieges nicht davonkommen. Wir werden nicht zulassen, dass noch mehr amerikanische Bürger durch U-Boote umkommen."
 US2_send_munitions_1:0 "Munition an Entente I senden"
 US2_send_munitions_1_desc:0 ""
 US2_send_munitions_2:0 "Munition an Entente II senden"
 US2_send_munitions_2_desc:0 ""
 US2_send_munitions_3:0 "Munition an Entente III senden"
 US2_send_munitions_3_desc:0 ""
 US2_condemn_zimmerman:0 "Verurteilen Sie das Zimmerman-Telegramm"
 US2_condemn_zimmerman_desc:0 "Die Deutschen haben Glück, dass wir ihnen noch keinen Krieg erklärt haben! Ihre jüngsten Versuche, Mexiko in einen Krieg gegen uns zu verwickeln, sind absolut verräterisch! Wir können uns einfach nicht in Ruhe lassen, wie es scheint ..."
 US2_declare_war_on_germany:0 "Deutschland den Krieg erklären"
 US2_declare_war_on_germany_desc:0 "Für uns ist die Zeit gekommen, den bösen Hunnen, die eine neue imperialistische Ordnung in Europa errichten wollen, den Krieg zu erklären."
 US2_send_expeditionary_force_france:0 "Senden Sie UEF nach Frankreich"
 US2_send_expeditionary_force_france_desc:0 "Um unseren französischen Verbündeten an der Front mit dringend benötigter frischer Personalstärke zu helfen, müssen wir das amerikanische Expeditionskorps entsenden."
 US2_mexican_revolution_actions:0 "Aktionen in Mexiko"
 US2_mexican_revolution_actions_desc:0 ""
 US2_send_army_to_border:0 "Schicken Sie eine Armee an die Grenze"
 US2_send_army_to_border_desc:0 "Angesichts der anhaltenden mexikanischen Revolution werden wir nicht dulden, dass die dortigen Kämpfe auf unsere Grenzen übergreifen!"
 US2_support_revolution:0 "Unterstütze Maderistas"
 US2_support_revolution_desc:0 "Die Maderistas sind Demokraten und möchten die wahren Ergebnisse der jüngsten Wahlen in Mexiko wiederherstellen. Wir jedenfalls begrüßen eine solche Regierung."
 US2_intervention_in_mexico:0 "Intervenieren Sie auf der Seite der Maderistas"
 US2_intervention_in_mexico_desc:0 "Die Maderistas sind Demokraten und möchten die wahren Ergebnisse der jüngsten Wahlen in Mexiko wiederherstellen. Wir jedenfalls begrüßen eine solche Regierung und sind bereit, einen schnellen Kampf zu führen, um Diaz zu stürzen."
 US2_fortify_border:0 "Befestigung der mexikanisch-amerikanischen Grenze"
 US2_fortify_border_desc:0 "Da die Revolution zeitweise auch auf unsere Grenzen übergreift und einige Revolutionäre einen Krieg gegen uns fordern, wäre es eine kluge Idee, unsere Grenze zu Mexiko zu befestigen."
 US2_withdraw_from_veracruz:0 "Rückzug aus Veracruz"
 US2_withdraw_from_veracruz_desc:0 "Es ist Zeit, sich aus Veracruz zurückzuziehen. Wir möchten die mexikanischen Revolutionäre nicht noch mehr verärgern, als wir es bereits getan haben."
 US2_condemn_huerta:0 "Verurteilen Sie Huerta"
 US2_condemn_huerta_desc:0 "Huerta ist eine exakte Kopie seines früheren Gegenstücks Diaz, er ist nichts weiter als ein brutaler Diktator, der dort zur Ruhe gebracht werden muss, wo er hingehört: in der Hölle!"
 US2_back_revolutionaries_2:0 "Unterstützen Sie die Revolutionäre gegen Huerta"
 US2_back_revolutionaries_2_desc:0 "Mit dem Aufstand der Constitutionalistas und Villistas gegen Huerta können wir das Ende des Huerta-Regimes mit stillen Mitteln unterstützen."
 US2_condemn_villa:0 "Verurteilen Villa"
 US2_condemn_villa_desc:0 "Villa war in der Vergangenheit ein Verbündeter von uns, aber jetzt ist er zu einer Bedrohung geworden, die beseitigt werden muss!"
