 GE1_homefront:0 "Heimatfront-Fokus I"
 GE1_homefront_desc:0 "Wenn Sie sich auf die Heimatfront konzentrieren, erreichen Sie mehr Stabilität im eigenen Land, anstatt den Krieg zu unterstützen."
 GE1_homefront_2:0 "Homefront Focus II"
 GE1_homefront_2_desc:0 "Wenn Sie sich auf die Heimatfront konzentrieren, erreichen Sie mehr Stabilität im eigenen Land, anstatt den Krieg zu unterstützen."
 GE1_homefront_3:0 "Homefront Focus III"
 GE1_homefront_3_desc:0 "Wenn Sie sich auf die Heimatfront konzentrieren, erreichen Sie mehr Stabilität im eigenen Land, anstatt den Krieg zu unterstützen."
 GE1_shorter_training:0 "Kürzere Ausbildung"
 GE1_shorter_training_desc:0 "Da sich der Krieg hinzieht und immer mehr Menschenleben fordert, brauchen wir mehr Männer, um die Verluste auszugleichen. Eine Verkürzung der Ausbildung würde dabei helfen."
 GE1_war_front:0 "Frontlinienfokus I"
 GE1_war_front_desc:0 "Wenn man sich auf die Front konzentriert, erhält man zwar mehr Kriegsunterstützung, verliert aber an Stabilität an der Heimatfront."
 GE1_war_front_2:0 "Frontline Focus II"
