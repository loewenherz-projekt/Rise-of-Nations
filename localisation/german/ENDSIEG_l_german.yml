ww2_germany.152.b:0 "Ich möchte eine andere Option wählen"
ww2_germany.153.t:0 "Suez-Frage beantwortet, Deutschland sagt: „Gebt den Türken den Suezkanal“"
ww2_germany.153.d:0 "Wir haben uns entschieden, den Suezkanal nicht für uns zu beanspruchen, sondern ihn unserem Verbündeten, dem Osmanischen Reich, zu überlassen. Dies würde von den Briten als neutralerer Ansatz angesehen werden. Da die Osmanen jedoch stark unter unserem Einfluss stehen, könnte das Schicksal des Suezkanals in eine andere Richtung gehen, wenn wir uns zerstreiten."
