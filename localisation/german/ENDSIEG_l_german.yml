 gas_mask_category:0 "Gasmaske"
 rations_desc:0 "Rationen dienen der Ernährung Ihrer Truppen. Stellen Sie sicher, dass Sie genügend davon produzieren, da sonst die Organisation und Versorgung Ihrer Einheiten beeinträchtigt wird."
 early_infantry_equipment_desc:0 "Infanterieausrüstung"
 fuel_desc:0 "Kraftstoff wird zum Betrieb Ihrer Tanks verwendet. Stellen Sie sicher, dass Sie genug haben, sonst wird die Organisation und Versorgung eingeschränkt."
 bicycle_equipment_desc:0 "Fahrräder gehören zu den frühesten Formen motorisierter Einheiten und verleihen Ihren Infanterieeinheiten einen kleinen Geschwindigkeitsschub."
 early_tank_equipment_desc:0 "Der Early Tank war im Ersten Weltkrieg und in den Zwanzigern sehr effektiv und verfügte über eine große Durchbruchskraft."
 early_fighter_equipment_desc:0 "Jäger sind schnell und wendig und können viele Aufgaben erfüllen. Vom Kampf um die Lufthoheit über den Schutz Ihrer Bomber bis hin zum Abfangen feindlicher Bomber."
 early_tac_bomber_equipment_desc:0 "Taktische Bomber sind kleinere, schnelle Bomber, die Bodentruppen unterstützen und feindliche Gebäude bombardieren können."
 motorized_equipment_0:0 "Frühe Motorisierung"
 motorized_equipment_0_desc:0 "Die Motorisierung der Infanterie ist der erste Schritt zur Mechanisierung einer Armee. Zivile Lastwagen lassen sich problemlos für militärische Zwecke umbauen, zum Transport von Soldaten, zum Ziehen von Waffen sowie zum Transport von Ausrüstung und Vorräten. Dies erhöht die strategische Mobilität von Infanterieeinheiten, die sonst auf Märsche angewiesen wären, erheblich."
 rations:0 "Verpflegung"

 ROM_medium_tank_destroyer_equipment_3:0 "Maresal"
 ROM_medium_tank_destroyer_equipment_3_short:0 "Maresal"
 ROM_medium_tank_aa_equipment_3:0 "Maresal 37mm TA"
 ROM_medium_tank_aa_equipment_3_short:0 "Maresal 37mm TA"

 GER_light_tank_destroyer_equipment_2_desc:0 "Der Marder II war ein deutscher Panzerzerstörer auf Basis des Panzer-II-Fahrgestells."
 GER_medium_tank_artillery_equipment_3_desc:0 "Das Konzept einer selbstfahrenden Artilleriekanone wurde 1944 von Krupp auf Basis von Panther-Komponenten mit einer 12,8-cm-Haubitze vorgeschlagen. Historisch gesehen kam es nie über das Konzeptstadium hinaus."
 GER_medium_tank_aa_equipment_3_desc:0 "Der Flakpanzer Coelian war ein selbstfahrendes Flugabwehrgeschütz, das Rheinmetall im Zweiten Weltkrieg für die deutschen Streitkräfte entwickelte. Es sollte mit zwei 3,7-cm-FlaK-43-Geschützen in einem vollständig geschlossenen, drehbaren Turm auf der Wanne eines mittleren Panther-Panzers bewaffnet werden, wurde aber vor Kriegsende in Europa nicht gebaut."





































 ww1_anti_air_equipment_2:0 "Zwischenkriegs-Flugabwehr"
 ww1_anti_air_equipment_2_short:0 "Zwischenkriegs-Flugabwehr"
 ww1_anti_air_equipment_2_desc:0 "Die Hauptaufgabe der Flugabwehrartillerie besteht darin, feindliche Flugzeuge abzuschießen, obwohl die Schnellfeuerkanonen auch gegen Bodenziele wirksam sein können."

