 SO2_treaty_of_tartu:0 "Unterzeichnung des Vertrags von Tartu (Finnland)"
 SO2_treaty_of_tartu_desc:0 "Nach dem Ende des finnischen Bürgerkriegs sollten wir die endgültigen Grenzen unserer Länder festlegen."
 SO2_send_supplies_HNN:0 "Hilfe für die Ungarische Sowjetrepublik"
 SO2_send_supplies_HNN_desc:0 "Die Ungarische Sowjetrepublik ist dringend auf unsere Unterstützung in jeder erdenklichen Weise angewiesen, da sie von Feinden umgeben ist."
 SO2_intervene_in_hungary:0 "Intervenieren in Ungarn"
 SO2_intervene_in_hungary_desc:0 "Um in Ungarn eingreifen zu können, müssen wir sicherstellen, dass wir eine gemeinsame Grenze mit Rumänien haben und den Ungarn in ihrem Krieg gegen das Land helfen."
 SO2_puppet_hungarian_sr:0 "Marionette Sowjetungarn"
 SO2_puppet_hungarian_sr_desc:0 "Die Ungarn sind für ihren Schutz bereits auf uns angewiesen, es bleibt nur noch, den letzten Schritt nach vorne zu tun."
 SO2_establish_rumanian_sr:0 "Gründung der Rumänischen Sozialistischen Sowjetrepublik"
 SO2_establish_rumanian_sr_desc:0 "Nachdem Rumänien besiegt und besetzt ist, sollten wir den Kommunismus weiter verbreiten und eine loyalistische kommunistische Regierung im Land errichten."
 SO2_send_supplies_FNR:0 "Aid Red Finnland"
 SO2_send_supplies_FNR_desc:0 "RedFinland braucht dringend unsere Unterstützung in seinem aussichtslosen Kampf gegen die zahlenmäßig überlegene White Finnish Movement."
 SO2_intervene_finland:0 "Intervenieren Sie in Finnland"
 SO2_intervene_finland_desc:0 "Das rote Finnland wird den Krieg niemals allein gewinnen. Wir müssen ihm zu Hilfe kommen, wenn wir den Kommunismus bis an die finnischen Grenzen ausbreiten wollen."
 SO2_puppet_fnr:0 "Marionette Rot Finnland"
 SO2_puppet_fnr_desc:0 "Das rote Finnland ist in Bezug auf seinen Schutz und seine Wirtschaft bereits von uns abhängig. Dies zu erreichen, ist nur noch ein weiterer Schritt nach vorn …"
 SO2_integrate_FNR:0 "Integrieren Sie Red Finland"
 SO2_integrate_FNR_desc:0 "Finnland war in der Vergangenheit lange Zeit ein Teil des Russischen Reiches und wird wieder ein Teil des Mutterlandes werden."
 SO2_european_diplomacy:0 "Diplomatie in Europa"
 SO2_european_diplomacy_desc:0 ""
 SO2_found_comintern:0 "Gründete die Komintern"
 SO2_found_comintern_desc:0 "Arbeiter aller Länder, vereinigt euch!"
 SO2_reconquista:0 "Die Reconquista"
 SO2_reconquista_desc:0 "Nach der Niederlage der Mittelmächte im Ersten Weltkrieg ist der Vertrag von Brest-Litowsk nur noch ein fiktives Stück Papier. Es ist Zeit für die Reconquista unserer ehemals abgetretenen Gebiete."
 SO2_westward_offensive:0 "Die Westoffensive"
 SO2_westward_offensive_desc:0 "Um unsere alten Gebiete zurückzuerobern, haben wir an der Westfront eine Armee der Roten Garde versammelt, die bereit ist, den Feind anzugreifen und unser Land zurückzuerobern!"

