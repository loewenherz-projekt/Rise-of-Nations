ww2_germany.109.d:0 "Mein Führer, die kommunistisch geführten jugoslawischen Partisanen sind aus ihren Verstecken aufgestanden und haben uns angegriffen."
ww2_germany.109.a:0 "Sie müssen niedergeschlagen werden"
