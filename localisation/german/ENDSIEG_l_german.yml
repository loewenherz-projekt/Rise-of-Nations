 EN1_join_war:0 "Tritt dem Krieg bei"
 EN1_join_war_desc:0 "Schließen Sie sich dem Krieg auf der Seite der Entente an."
 EN1_western_diplomacy:0 "Westliche Diplomatie"
 EN1_western_diplomacy_desc:0 "Diplomatie im Westen"
 EN1_befriend_US:0 "Befreunden Sie sich mit den Vereinigten Staaten"
 EN1_befriend_US_desc:0 "Wir brauchen die Unterstützung der Vereinigten Staaten in einem großen europäischen Krieg, daher wäre es klug, uns so gut wie möglich mit ihnen anzufreunden, in der Hoffnung, dass sie uns eines Tages helfen können."
 EN1_bring_america_in:0 "Laden Sie die USA ein"
 EN1_bring_america_in_desc:0 "Die Vereinigten Staaten haben lange genug ihre neutrale Haltung beibehalten, es ist Zeit für sie, sich dem Konflikt anzuschließen"
 EN1_anti_german_sentiment:0 "Antideutsche Stimmung"
 EN1_anti_german_sentiment_desc:0 "Im letzten Jahrzehnt kam es zwischen Großbritannien und Deutschland zu zunehmenden Spannungen im Zusammenhang mit dem Wettrüsten zur See. Der Kaiser will jedoch nicht nachgeben und bedroht damit unsere Seeüberlegenheit und damit auch die Insel Großbritannien."
 EN1_prepare_for_war:0 "Bereite dich auf den Krieg vor"
 EN1_stay_neutral:0 "Bleiben Sie neutral"
 EN1_stay_neutral_desc:0 "Vielleicht wäre es klug, ein Jahr lang auszuharren, wenn überhaupt, können wir später immer noch einsteigen."
 EN1_back_france:0 "Zurück Frankreich"1
 EN1_back_france_desc:0 "Angesichts der Verletzung der belgischen Neutralität ist es unsere Pflicht zu zeigen, dass sich irgendein dreckiger Typ nicht über unsere Worte hinwegsetzen wird!"
 EN1_north_sea_blockade:0 "Umsetzung der Nordseeblockade"
 EN1_north_sea_blockade_desc:0 "Um die Deutschen hoffentlich auszuhungern und sie von den Ressourcen der Welt abzuschneiden, wäre die Verhängung einer Blockade eine großartige Idee."
 EN1_cosncript_irish:0 "Wehrpflichtige Iren"
 EN1_cosncript_irish_desc:0 "Obwohl es angesichts der bisherigen Lage beim Osteraufstand keine gute Idee wäre, die Iren einzuziehen, brauchen wir mehr Männer an der Front und das wird völlig ausreichen."
 EN1_dont_conscript_irish:0 "Iren nicht einziehen"
 EN1_dont_conscript_irish_desc:0 "Die Iren werden nicht eingezogen, egal, ob wir mehr Männer brauchen."
 EN1_nordic_country_trading:0 "Aufruf an Skandinavien, die Beziehungen zu Deutschland abzubrechen"
 EN1_nordic_country_trading_desc:0 "Die nordischen Länder, insbesondere Schweden, versorgen die Deutschen mit Kriegsmaterial, das nicht blockiert werden kann, da die Deutschen die Kontrolle über die Ostsee haben. Wir könnten sie jedoch jederzeit auffordern, damit aufzuhören und die Beziehungen zu Deutschland abzubrechen."
 EN1_portugal_friend:0 "Richten Sie Portugal mit uns aus"
 EN1_portugal_friend_desc:0 "Zwischen den Portugiesen und den Deutschen gab es erhebliche Spannungen, da die Deutschen eine ganze Reihe portugiesischer Schiffe versenkten und es in Afrika zu kolonialen Spannungen kam. Davon könnten wir profitieren und Portugal auf unsere Seite ziehen, um es hoffentlich irgendwann dazu zu bewegen, der Entente beizutreten."
 EN1_invite_portugal:0 "Portugal einladen"
 EN1_invite_portugal_desc:0 "Die Portugiesen haben genug von den versenkten Konvois der Deutschen und den Spannungen an ihren Kolonialgrenzen und sind bereit, der Entente beizutreten."
 EN1_bulgaria_talks:0 "Mit Bulgarien verhandeln"
 EN1_bulgaria_talks_desc:0 "Obwohl wir nicht alles anbieten können, was die Mittelmächte wahrscheinlich an Territorium bieten können, müssen wir alles tun, was wir können, um Bulgarien auf unsere Seite zu ziehen. Dies würde den unmittelbaren Zusammenbruch der Türkei bedeuten, wenn man bedenkt, wie nah die Grenze zu Konstantinopel ist. Territoriale Zugeständnisse an Bulgarien anzubieten, würde die Serben verärgern, aber so wird es eben sein müssen."
 EN1_invite_bulgaria:0 "Bulgarien einladen"
 EN1_invite_bulgaria_desc:0 "Bulgarien hat unseren Verhandlungen zugestimmt und ist bereit, der Entente beizutreten"
 EN1_ww1_baltic_project_part_1:0 "Baltisches Projekt Teil I"
 EN1_ww1_baltic_project_part_1_desc:0 "Admiral Lord Fisher hat einen Plan vorgeschlagen, der einen schnellen Sieg verspricht. Sein Plan sieht die Landung einer beträchtlichen Streitmacht britischer und/oder russischer Soldaten an den flachen Stränden Pommerns an der norddeutschen Küste vor, weniger als 160 Kilometer von Berlin entfernt. Um die Invasion vor der Kaiserlichen Marine zu schützen, wäre eine beträchtliche Flotte erforderlich, doch Lord Fisher versichert, dass sich dies absolut lohnen wird."
 EN1_ww1_baltic_project_part_2:0 "Baltisches Projekt Teil II"
 EN1_ww1_baltic_project_part_2_desc:0 "Im Zuge des Übergangs von der Planungsphase in die Vorbereitungsphase haben wir mit der Zusammenstellung der großen Spezialflotte begonnen, die mehr als 600 Spezialschiffe umfassen wird."
 EN1_ww1_baltic_project_part_3:0 "Baltisches Projekt Teil III"
 EN1_ww1_baltic_project_part_3_desc:0 "Lasst die Invasion beginnen!"
 EN1_middle_east_diplomacy:0 "Nahostdiplomatie"
 EN1_middle_east_diplomacy_desc:0 "Diplomatie im Nahen Osten"
 EN1_fortify_suez:0 "Suezkanal befestigen"
 EN1_fortify_suez_desc:0 "Für den Fall eines Krieges wäre es ratsam, den Suezkanal zu befestigen."
 EN1_secure_southern_persia:0 "Sichern Sie Südpersien"
 EN1_secure_southern_persia_desc:0 "Um die persischen Ölfelder im Süden und den Weg nach Indien zu sichern, müssen wir Südpersien vorerst unter britische Besatzung stellen, da eine türkische Beteiligung wahrscheinlich ist."
 EN1_hold_back_turk_ships:0 "Beschlagnahmung türkischer Schiffe"
 EN1_hold_back_turk_ships_desc:0 "Das Osmanische Reich hat zwei fertiggestellte Schiffe gekauft. Angesichts der sehr wahrscheinlichen Beteiligung der Türkei am Krieg wäre es jedoch ratsam, sie zu beschlagnahmen, um sicherzustellen, dass sie nicht in die Hände des Feindes fallen."
 EN1_arab_revolt:0 "Arabischer Aufstand"
 EN1_arab_revolt_desc:0 "Wenn wir den arabischen Nationalismus in Hedschas unterstützen, könnten wir den Türken eine weitere Front eröffnen, die ihnen Sorgen bereitet. Diese Araber werden eng mit uns zusammenarbeiten, um dem Osmanischen Reich ein Ende zu bereiten."
 EN1_colonial_focus:0 "Kolonialer Fokus"
 EN1_british_raj:0 "Entwicklung der britischen Herrschaft"
 EN1_british_raj_desc:0 ""
 EN1_south_africa:0 "Entwicklung Südafrikas"
 EN1_south_africa_desc:0 ""
 EN1_australia:0 "Australien entwickeln"
 EN1_australia_desc:0 ""
 EN1_canada:0 "Kanada entwickeln"
 EN1_canada_desc:0 ""
 EN1_indian_manpower:0 "Arbeitskräfte aus Indien"
 EN1_indian_manpower_desc:0 "Das britische Raj verfügt über Millionen wehrbereiter Männer. Diese Reserven werden unserer Sache eine große Hilfe sein."
 EN1_plan_gallipoli_campaign:0 "Kampagne „Plan Gallipoli“"
 EN1_plan_gallipoli_campaign_desc:0 "Wenn wir die Türken schnell aus dem Krieg werfen wollen, könnten wir dies unter anderem durch eine Seeinvasion auf der Halbinsel Gallipoli erreichen, die wir erobern und dann nach Konstantinopel vorrücken, einem äußerst wichtigen Symbol des Reiches."
 EN1_execute_gallipoli:0 "Führen Sie eine Invasion auf Gallipoli durch"
 EN1_execute_gallipoli_desc:0 "Die Zeit ist gekommen, die Seeinvasion von Gallipoli zu starten, möge Gott mit uns sein!"
 EN1_canadian_troops:0 "Verstärkung aus Kanada"
 EN1_canadian_troops_desc:0 "Wenn wir möchten, könnten wir mehrere kanadische Divisionen an die Westfront schicken, wo sie mit Sicherheit gebraucht werden."
 EN1_political_effort:0 "Politische Bemühungen"
 EN1_political_effort_desc:0 ""
 EN1_grant_south_african_indep:0 "Gewähren Sie Südafrika die Unabhängigkeit"
 EN1_grant_south_african_indep_desc:0 "Die Rufe nach südafrikanischer Unabhängigkeit sind nicht verstummt, wir werden tun, was unser Volk verlangt."
 EN1_democracy:0 "Demokratismus"
 EN1_democracy_desc:0 ""
 EN1_free_speech:0 "Meinungsfreiheit"
 EN1_free_speech_desc:0 ""
 EN1_united_people:0 "Vereint gegen unsere Feinde"
 EN1_united_people_desc:0 "Da der Krieg näher rückt, müssen wir im Kampf gegen unsere Feinde vereint bleiben."
 EN1_defence_of_realm_act:0 "Gesetz zur Verteidigung des Reiches"
 EN1_defence_of_realm_act_desc:0 "Der Defence of the Realm Act (DORA) verleiht der Regierung weitreichende Vollmachten. So kann sie beispielsweise für die Kriegsanstrengungen benötigte Gebäude oder Grundstücke beschlagnahmen oder Vorschriften erlassen, die Straftatbestände und autoritäre soziale Kontrollmechanismen wie Zensur schaffen."
 EN1_combined_war_effort_1:0 "Kriegsanstrengungen"
 EN1_combined_war_effort_1_desc:0 ""
 EN1_military_service_act:0 "Wehrdienstgesetz"
 EN1_military_service_act_desc:0 "Es wäre zwar schön, wenn die Wehrpflicht nicht erforderlich wäre, doch mit unseren derzeitigen Rekrutierungsmethoden, die eine allgemeine Wehrpflicht erfordern, bekommen wir nicht genügend Männer."

