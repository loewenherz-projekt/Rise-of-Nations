 AUH_entente_diplomacy_desc:0 "Diplomatie mit der Entente"
 AUH_seperate_peace:0 "Separater Frieden"
 AUH_seperate_peace_desc:0 "Ein Separatfrieden mit der Entente könnte unser Land retten."
 AUH_befriend_italy:0 "Befreunde dich mit Italien"
 AUH_befriend_italy_desc:0 "Das Beste wäre, die Beziehungen zu den Italienern so weit wie möglich zu verbessern."
 AUH_subdue_italy:0 "Italien unterwerfen"
 AUH_subdue_italy_desc:0 "Um zu verhindern, dass der Westen in Italien Einfluss gewinnt und in unserem Namen territoriale Zugeständnisse ohne unseren Vorteil anbietet, sollten wir als Erste eingreifen und diese Zugeständnisse anbieten. Es wäre nicht angenehm, es mit drei Fronten gleichzeitig zu tun zu haben ..."
 AUH_cede_tyrol:0 "Abtretung Südtirol"
 AUH_cede_tyrol_desc:0 "Während die Italiener Südtirol und Istrien viel lieber hätten, könnten wir mit etwas Glück sehen, ob sie diesen Vorschlag annehmen."
 AUH_cede_tyrol_and_istria:0 "Südtirol und Istrien abtreten"
 AUH_cede_tyrol_and_istria_desc:0 "Die Italiener würden dieses Angebot sehr wahrscheinlich annehmen, es besteht jedoch immer die Möglichkeit, dass sie es nicht tun."
 AUH_promise_italy:0 "Versprechen Italien Ansprüche in Frankreich"
 AUH_promise_italy_desc:0 "Wir könnten den Italienern ein beträchtliches Stück französischen Territoriums versprechen, sobald der Sieg gesichert ist und sie bequem am Friedenstisch sitzen."
 AUH_italy_central_power:0 "Italien einladen"
 AUH_italy_central_power_desc:0 "Die italienische Allianz mit den Mittelmächten ist nun gesichert, jetzt müssen sie nur noch eingeladen werden."
 AUH_diplomatic_effort:0 "Diplomatische Bemühungen"
 AUH_diplomatic_effort_desc:0 ""
 AUH_annex_bosnia:0 "Annex Bosnien"
 AUH_annex_bosnia_desc:0 "Angesichts der Revolution der Jungtürken in der Türkei und einer momentanen inneren Krise wäre jetzt der perfekte Zeitpunkt, ihnen das Gebiet Bosniens zu entreißen und es dem Reich einzuverleiben."
 AUH_anti_serb_rhetoric:0 "Antiserbische Rhetorik"
 AUH_anti_serb_rhetoric_desc:0 "Die Serben sind eine Bedrohung für unsere Vorherrschaft auf dem Balkan"
 AUH_dominate_balkan_SOI:0 "Dominieren Sie den Einflussbereich des Balkans"
 AUH_dominate_balkan_SOI_desc:0 "Wenn wir über eine Einflusssphäre auf dem Balkan verfügen, können wir die Region effektiv kontrollieren. Solange es Serbien gibt, ist dies jedoch unwahrscheinlich."
 AUH_pro_germany:0 "Pro-deutsche Beziehungen"
 AUH_pro_germany_desc:0 "Obwohl das Deutsche Reich früher unser Feind war, ist es heute unser großer Freund."
 AUH_bulgaria_friend:0 "Verbesserung der Beziehungen zu Bulgarien"
 AUH_bulgaria_friend_desc:0 "Wenn es etwas gibt, das Österreich und Bulgarien gemeinsam haben, dann ist es unser Hass auf Serbien."
 AUH_prepare_for_war:0 "Bereite dich auf den Krieg vor"
 AUH_prepare_for_war_desc:0 ""
 AUH_ottoman_friends:0 "Verbesserung der Beziehungen zur Türkei"
 AUH_ottoman_friends_desc:0 "Während die Osmanen und wir uns in der Vergangenheit mit Bosnien und der Kontrolle über den Balkan nicht gut verstanden haben, liegt das alles nun hinter uns und es ist besser, wenn wir uns in Zukunft auf eine Freundschaft mit den Türken konzentrieren."
 AUH_confiscate_serb_grain:0 "Beschlagnahmt serbisches Getreide"
 AUH_confiscate_serb_grain_desc:0 "Da wir nun ganz Serbien kontrollieren, wäre es eine kluge Idee, das Land seiner Getreidevorräte zu berauben, um unsere eigenen Männer zu ernähren, denen es an diesen notwendigen Vorräten mangelt."
 AUH_volunteer_albania:0 "Freiwillige aus Albanien"
 AUH_volunteer_albania_desc:0 "Einige tausend albanische Freiwillige haben sich bereit erklärt, dem österreichisch-ungarischen Militär beizutreten"
 AUH_cede_macedonia_bulgaria:0 "Mazedonien an Bulgarien abtreten"
 AUH_cede_macedonia_bulgaria_desc:0 "Da wir Bulgarien seine rechtmäßigen Ansprüche in Mazedonien versprochen haben, könnten wir ihnen jederzeit die militärische Kontrolle über das Gebiet übertragen, sodass wir uns nicht mit diesen rebellischen Mördern auseinandersetzen müssen."
 AUH_massive_war_effort:0 "Massive Kriegsanstrengungen"
 AUH_massive_war_effort_desc:0 ""
 AUH_central_powers_diplomacy:0 "Diplomatie der Mittelmächte"
 AUH_central_powers_diplomacy_desc:0 "Diplomatie mit unseren Verbündeten"
 AUH_german_advisors:0 "Deutsche Berater anfordern"
 AUH_german_advisors_desc:0 "Da unsere militärische Führung eher mangelhaft ist, wäre es eine gute Idee, deutsche Offiziere anzufordern, um die Effizienz unserer Truppen zu erhöhen"
 AUH_german_troops:0 "Deutsche Verstärkungen"
 AUH_german_troops_desc:0 "Um unsere militärische Effizienz weiter zu steigern, könnten wir mehrere deutsche Divisionen anfordern, die uns bei unseren militärischen Bemühungen unterstützen könnten."
 AUH_send_germany_aid:0 "Senden Sie Deutschland Militärhilfe"
 AUH_send_germany_aid_desc:0 "Unser Verbündeter Deutschland ist maßgeblich an den Kriegsanstrengungen gegen Russland und Frankreich beteiligt. Wir könnten ihnen sicherlich mit einem beträchtlichen Teil unserer militärischen Ausrüstung helfen."
 AUH_send_germany_troops:0 "Schicken Sie Verstärkung nach Deutschland"
 AUH_send_germany_troops_desc:0 "Die Deutschen brauchen dringend eine zahlenmäßige Überlegenheit an ihrer Front gegen die Franzosen. Wir könnten ihnen sicherlich helfen, indem wir mehrere unserer Divisionen einsetzen."
 AUH_turkish_reinforcements:0 "Türkische Verstärkungen"
 AUH_turkish_reinforcements_desc:0 "Wir haben in letzter Zeit an der Ostfront schwere Verluste erlitten. Die Türken sind bereit, uns Verstärkung zu schicken, wenn wir dies wünschen."
 AUH_send_turkey_troops:0 "Truppen in die Türkei schicken"
 AUH_send_turkey_troops_desc:0 "Um unserem Verbündeten Türkei an der Front zu helfen, könnten wir anbieten, ihm mehrere Garnisonsdivisionen und große Kampfdivisionen zur Unterstützung zu schicken."
 AUH_send_turkey_weapons:0 "Waffen in die Türkei schicken"
 AUH_send_turkey_weapons_desc:0 "Es ist eine bekannte Tatsache, dass das Osmanische Reich bei weitem eine Industrienation ist, die in der Lage ist, ausreichend eigene Kriegsgüter zu produzieren. Wenn wir ihnen dabei helfen, dürfte ihnen das sicherlich sehr zugute kommen."
 AUH_political_effort:0 "Politische Bemühungen"
 AUH_political_effort_desc:0 "Als loses Imperium mit Dutzenden von Ethnien ist es möglicherweise die einzige Möglichkeit, unsere große Nation zu retten, wenn wir in unserer Politik hart vorgehen."
 AUH_imperial_stability:0 "Imperiale Stabilität"
 AUH_imperial_stability_desc:0 "Das Imperium ist alles andere als stabil, und der Nationalismus ist derzeit auf dem Höhepunkt. Deshalb ist imperiale Stabilität der Schlüssel zum Erhalt des Imperiums."
 AUH_focus_military:0 "Fokus auf Militär"
 AUH_focus_military_desc:0 "Sich auf das Militär zu konzentrieren bedeutet, die internen Probleme zu ignorieren, was das Risiko eines Zusammenbruchs des Imperiums noch weiter erhöhen könnte."
 AUH_focus_internal_issues:0 "Konzentrieren Sie sich auf interne Probleme"
 AUH_focus_internal_issues_desc:0 "Die Konzentration auf interne Angelegenheiten bedeutet zwar, dass das Militär etwas in den Hintergrund tritt, sichert jedoch die Stabilität des Imperiums für einen viel längeren Zeitraum."
 AUH_supress_minorities:0 "Unterdrückung von Minderheiten"
 AUH_supress_minorities_desc:0 "Die nationalistischen Tendenzen der Minderheiten müssen unterdrückt werden, sonst könnte alles schiefgehen."
 AUH_polish_legions:0 "Polnische Legion gründen"
 AUH_polish_legions_desc:0 ""
 AUH_war_effort_1:0 "Kriegsanstrengungen I"
 AUH_war_effort_1_desc:0 "Wenn wir unsere Bürger hinter den Krieg stellen würden, würde das unser Land einen und vielleicht für eine Weile dazu führen, dass die lästigen Nationalisten, die über unser ganzes Reich verstreut sind, ihre langjährigen Ansichten zur Unabhängigkeit aufgeben."
 AUH_war_effort_2:0 "Kriegsanstrengungen II"
 AUH_war_effort_2_desc:0 "Wenn wir unsere Bürger hinter den Krieg stellen würden, würde das unser Land einen und vielleicht für eine Weile dazu führen, dass die lästigen Nationalisten, die über unser ganzes Reich verstreut sind, ihre langjährigen Ansichten zur Unabhängigkeit aufgeben."
 AUH_war_effort_3:0 "Kriegsanstrengungen III"
 AUH_war_effort_3_desc:0 "Wenn wir unsere Bürger hinter den Krieg stellen würden, würde das unser Land einen und vielleicht für eine Weile dazu führen, dass die lästigen Nationalisten, die über unser ganzes Reich verstreut sind, ihre langjährigen Ansichten zur Unabhängigkeit aufgeben."
 AUH_hungarian_support:0 "Ungarischer Support"
 AUH_hungarian_support_desc:0 "Wenn wir in diesen Krieg eintreten und einen gewissen Erfolg erwarten wollen, benötigen wir umfassende Unterstützung von der ungarischen Seite des Reiches."
 AUH_coronation:0 "Krönung Karls"
 AUH_coronation_desc:0 "Mit dem Tod von Franz Joseph ist es an der Zeit, den neuen König und Kaiser Karl I. (IV.) vorzustellen."
AUH_strategic_bomber_research_1:0 "Strategische Bomberforschung"
AUH_strategic_bomber_research_1_desc:0 ""
AUH_dockyard_1:0 "Werftbau 1"
AUH_dockyard_1_desc:0 "Auch wenn unsere Marine nicht zu den führenden der Welt gehört, können einige zusätzliche Werften doch zu einem gewissen Erfolg auf See gegen unsere Rivalen im Mittelmeer führen."
AUH_dockyard_2:0 "Werftbau 2"
AUH_dockyard_2_desc:0 "Auch wenn unsere Marine nicht zu den führenden der Welt gehört, können einige zusätzliche Werften doch zu einem gewissen Erfolg auf See gegen unsere Rivalen im Mittelmeer führen."
AUH_dockyard_3:0 "Werftbau 3"
AUH_dockyard_3_desc:0 "Auch wenn unsere Marine nicht zu den führenden der Welt gehört, können einige zusätzliche Werften doch zu einem gewissen Erfolg auf See gegen unsere Rivalen im Mittelmeer führen."
AUH_dockyard_4:0 "Werftbau 4"
AUH_dockyard_4_desc:0 "Auch wenn unsere Marine nicht zu den führenden der Welt gehört, können einige zusätzliche Werften doch zu einem gewissen Erfolg auf See gegen unsere Rivalen im Mittelmeer führen."

