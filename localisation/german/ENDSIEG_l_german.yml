 EN1_shorter_training:0 "Kürzere Ausbildung"
 EN1_shorter_training_desc:0 "Da sich der Krieg hinzieht und immer mehr Menschenleben fordert, brauchen wir mehr Männer, um die Verluste auszugleichen. Eine Verkürzung der Ausbildung würde dabei helfen."
 EN1_frontline_focus_1:0 "Frontlinienfokus I"
