 RUS_balkan_diplomacy:0 "Balkandiplomatie"
 RUS_balkan_diplomacy_desc:0 "Diplomatie auf dem Balkan"
 RUS_slavic_brotherhood:0 "Slawische Bruderschaft"
 RUS_slavic_brotherhood_desc:0 "Verbesserung der Beziehungen zu allen slawischen Nationen auf dem Balkan"
 RUS_support_serbia:0 "Unterstütze Serbien"
 RUS_support_serbia_desc:0 "Wir müssen unsere Unterstützung für Serbien zeigen, um die Österreicher davon abzuhalten, den Franz-Ferdinand-Krieg als Vorwand für eine Invasion zu nutzen!"
 RUS_befriend_romania:0 "Befreunde dich mit Rumänien"
 RUS_befriend_romania_desc:0 "Was Rumänien betrifft, haben wir einen gemeinsamen Rivalen, die Österreicher."
 RUS_diplomatic_effort:0 "Diplomatische Bemühungen"
 RUS_diplomatic_effort_desc:0 ""
 RUS_european_diplomacy:0 "Europäische Diplomatie"
 RUS_european_diplomacy_desc:0 "Diplomatie in Europa"
 RUS_investments_from_west:0 "Investitionen aus dem Westen"
 RUS_investments_from_west_desc:0 "Wenn wir Investitionen aus dem Westen akzeptieren, werden wir mit einer Industrie konfrontiert sein, die sich größtenteils in ausländischem Besitz befindet. Auf der anderen Seite hätten wir aber auch einen schnelleren Industrialisierungsprozess."
 RUS_railway_construction:0 "Bau der Transsibirischen Eisenbahn I"
 RUS_railway_construction_desc:0 "Sobald wir die Transsibirische Eisenbahn fertiggestellt haben, werden wir mehr Kontrolle über das Land haben und wirtschaftlich stark profitieren, da wir einen viel einfacheren Zugang zum östlichen Hafen Wladiwostok haben."
 RUS_prepare_for_war:0 "Bereite dich auf den Krieg vor"
 RUS_prepare_for_war_desc:0 ""
 RUS_railway_construction_2:0 "Transsibirische Eisenbahn in Finnland"
 RUS_railway_construction_2_desc:0 "Sobald wir die Transsibirische Eisenbahn fertiggestellt haben, werden wir mehr Kontrolle über das Land haben und wirtschaftlich stark profitieren, da wir einen viel einfacheren Zugang zum östlichen Hafen Wladiwostok haben."
 RUS_occupy_northern_persia:0 "Besetzen Sie Nordpersien"
 RUS_occupy_northern_persia_desc:0 "Um die persischen Ölfelder zu schützen, wäre es klug, Nordpersien zu besetzen, da die Türkei durchaus in diesen Konflikt verwickelt werden könnte …"
 RUS_brusilov_offensive:0 "Starten Sie die Brusilow-Offensive"
 RUS_brusilov_offensive_desc:0 "Der Beginn der Brussilow-Offensive verschafft Ihnen einen zeitlich abgestimmten Eindruck mit erheblichen militärischen Boni, Sie müssen jedoch ein bestimmtes Gebiet kontrollieren und dürfen von den Österreichern nicht zu weit zurückgedrängt werden."
 RUS_petrograd_defense:0 "Petrograder Verteidigung"
 RUS_petrograd_defense_desc:0 "Da unsere Hauptstadt Petrograd eine Küstenstadt ist, wäre es ratsam, die Befestigungen zu verstärken, falls die deutsche Flotte sie in Zukunft bombardieren sollte."
 RUS_asian_diplomacy:0 "Asiatische Diplomatie"
 RUS_asian_diplomacy_desc:0 "Diplomatie in Asien"
 RUS_mongolian_bufferstate:0 "Zurück Mongolischer Pufferstaat"
 RUS_mongolian_bufferstate_desc:0 "Indem wir das Chaos in China und die dortige Revolution ausnutzen, haben wir die Möglichkeit, die Gründung eines mongolischen Staates zu unterstützen, um einen Puffer zwischen unseren beiden Ländern zu schaffen."
 RUS_russian_dominance:0 "Russische Dominanz in Asien"
 RUS_russian_dominance_desc:0 "Wir könnten die Situation in China noch stärker ausnutzen und eine russische Dominanz in der Region durchsetzen"
 RUS_take_manchuria:0 "Annex Mandschurei"
 RUS_take_manchuria_desc:0 "Um unsere Dominanz zu untermauern, haben wir beschlossen, unsere Truppen in das Gebiet der Mandschurei zu verlegen, wo die Chinesen, die bereits innerlich gespalten sind und ihre eigenen Probleme haben, keine Vergeltung üben."
 RUS_entente_diplomacy:0 "Entente-Diplomatie"
 RUS_entente_diplomacy_desc:0 "Diplomatie mit unseren Verbündeten"
 RUS_send_troops_france:0 "Truppen nach Frankreich schicken"
 RUS_send_troops_france_desc:0 "Um unseren französischen Verbündeten an der Westfront zu helfen, könnten wir ihnen russische Truppen zur Unterstützung gegen die zahlenmäßig überlegenen Deutschen schicken."
 RUS_request_aid:0 "Hilfe anfordern I"
 RUS_request_aid_desc:0 "Zwar dürfte es angesichts der Tatsache, dass die Ostsee und das Schwarze Meer von den Mittelmächten abgeschnitten sind, ziemlich schwierig sein, Hilfe zu leisten, doch angesichts unserer Engpässe würde zumindest etwas helfen."
 RUS_request_aid_2:0 "Antrag auf Hilfe II"
 RUS_request_aid_2_desc:0 "Zwar dürfte es angesichts der Tatsache, dass die Ostsee und das Schwarze Meer von den Mittelmächten abgeschnitten sind, ziemlich schwierig sein, Hilfe zu leisten, doch angesichts unserer Engpässe würde zumindest etwas helfen."
 RUS_political_effort:0 "Politische Bemühungen"
 RUS_political_effort_desc:0 ""
 RUS_supress_revolutionaries:0 "Unterdrücke Revolutionäre"
 RUS_supress_revolutionaries_desc:0 "Das Land ist in letzter Zeit mit verschiedenen radikalen Revolutionären gefüllt worden. Wir können sie zwar mit Geheimpolizei unterdrücken, aber am Ende werden wir wenig Kontrolle über den Willen des Volkes haben."
 RUS_continue_russification:0 "Russifizierung fortsetzen"
 RUS_continue_russification_desc:0 "Um den Widerstand der Minderheiten zu verringern, sollten wir unsere Politik der Russifizierung fortsetzen."
 RUS_pan_slavism:0 "Panslawismus"
 RUS_pan_slavism_desc:0 "Alle slawischen Völker sollten sich vereinen"
 RUS_reinforce_tsars_authority:0 "Stärkung der Autorität des Zaren"
 RUS_reinforce_tsars_authority_desc:0 "Die Autorität des Zaren darf nicht untergraben werden."
 RUS_nicholas_on_front:0 "Verlegung von Nikolaus an die Front"
 RUS_nicholas_on_front_desc:0 "Sollte Nikolaus an die Front versetzt werden, würde dies die Moral der Soldaten stärken."
 RUS_form_polish_legion:0 "Gründung der Polnischen Legion"
 RUS_form_polish_legion_desc:0 "Durch die Gründung einer polnischen Legion stehen uns einige zusätzliche polnische Divisionen zur Verfügung."


