 RUS_british_tanks:0 "Britische Panzer importieren"
 RUS_british_tanks_desc:0 "Nach dem Ende des Ersten Weltkriegs waren die Briten im Gegensatz zu den Franzosen bereit, große Mengen ihrer übrig gebliebenen Militärausrüstung kostenlos abzugeben, darunter auch ihre Panzer, die von den Westlichen Weißen in der Schlacht von Zarizyn 1918-1918 eingesetzt wurden."
 RUS_recognize_ex_tsarist_states:0 "Anerkennung unabhängiger Staaten"
 RUS_recognize_ex_tsarist_states_desc:0 "Anstatt diesen neuen unabhängigen Staaten die kalte Schulter zu zeigen und ihnen sogar die Möglichkeit eines Krieges für eine spätere Wiedereingliederung aufzuzeigen, wäre es vielleicht klüger, sich mit ihnen zu verbünden und gemeinsam zu versuchen, den einen Feind zu beseitigen, den wir alle gemeinsam haben: die Bolschewiki."
