 endsieg_news.261.t:0 "Kaiser Wilhelm bleibt an der Macht"
 endsieg_news.261.d:0 "Da das Deutsche Reich aktiv einen Waffenstillstand mit den Alliierten anstrebte und gegen Kriegsende eine Revolution die instabile politische Lage Deutschlands bedrohte, wurden die Forderungen nach einer Abdankung des Kaisers immer lauter. Wilhelm II. selbst zögerte zutiefst, ein solches Opfer zu bringen. Obwohl seine Militärberater darauf bestanden, dass man sich auf die Armee nicht länger verlassen könne, äußerte Wilhelm dennoch die Idee, die Armeen von der Westfront zurück nach Deutschland zu führen. Nach dem Kieler Aufstand verlor Wilhelm II. jedoch alle Hoffnung. Die Marine war seine größte Freude und Errungenschaft. Als diese rebellierte, wurde ihm klar, dass der Krieg tatsächlich verloren war. Angesichts des Schicksals der russischen Zarenfamilie, seiner Cousins, beschloss er, die Bindungen der Armee zu bekräftigen. Der Kaiser war zu diesem Zeitpunkt äußerst unbeliebt, entschied sich jedoch, an der Macht zu bleiben, anstatt abzudanken, wie ihm seine engen Freunde dringend empfohlen hatten."
 endsieg_news.261.a:0 "Eine seltsame Wahl ..."
 endsieg_news.262.t:0 "Kaiser Wilhelm bleibt an der Macht"
 endsieg_news.262.d:0 "Da das Deutsche Reich aktiv einen Waffenstillstand mit den Alliierten anstrebte und eine Revolution die instabile politische Lage Deutschlands bis Kriegsende bedrohte, sollte man erwarten, dass die Forderungen nach einer Abdankung des Kaisers lauter würden. Doch das Gegenteil ist der Fall. Das Volk vertraute Wilhelm II., da er ihr alleiniger Herrscher war. Die Armee vertraute ihm vollkommen, und sollte er abdanken, wäre der Krieg mit Sicherheit verloren. "
 endsieg_news.262.a:0 "Eine gute Entscheidung."

