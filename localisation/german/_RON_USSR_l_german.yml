 SOV_Lenin_Cult:0"Lenin-Kult"
 SOV_Lenin_Cult_desc:0"Wir müssen die Hingabe an die Religion durch die Hingabe an den Staat ersetzen."
 SOV_New_Soviet_Woman:0"Die neue Sowjetfrau"
 SOV_New_Soviet_Woman_desc:0"Wir haben in unserer Gesellschaft große Fortschritte bei der Gleichberechtigung der Geschlechter gemacht. Lassen Sie uns diesen Weg weiterverfolgen und Frauen auffordern, ebenfalls im Kampf zu dienen. Wir können sie für unterstützende Aufgaben an der Front und für einige begrenzte Kampfeinsätze einsetzen, um gesunde Männer für den Kampf freizustellen. Nur mit wahrer Gleichberechtigung und echtem Engagement für die Sache können wir der Aggression ausländischer Mächte widerstehen."
 
 SOV_Trotskyite_Coup:0"Trotzkistischer Putsch"
 SOV_Trotskyite_Coup_desc:0"Trotzki ist heimlich in die Sowjetunion zurückgekehrt, und seine Anhänger haben sich in Stellung gebracht, um einen Machtwechsel zu ermöglichen. Wenn alles nach Plan läuft, wird Stalins Herrschaft ein schnelles Ende finden. Dieser Regimewechsel wird zweifellos Folgen für die Leistungsfähigkeit unserer Gesellschaft haben, aber wir werden sie überwinden!"
 SOV_Organize_Labor:0"Organisieren Sie die Arbeit"
 SOV_Organize_Labor_desc:0"Desorganisierte Arbeiter sind ebenso wenig eine Nation wie eine Gruppe von Pöbeln eine Armee ist."

 SOV_Integrate_Labor_Into_The_Military:0"Integration der Arbeit in das Militär"
 SOV_Integrate_Labor_Into_The_Military_desc:0"Jeder dient. Manche benutzen Gewehre, andere Hämmer. Die Arbeiter müssen lernen, beides zu benutzen."
 SOV_A_Gun_In_Every_Hand:0"Eine Waffe in jeder Hand"
 SOV_A_Gun_In_Every_Hand_desc:0"Die Macht kommt aus den Läufen eines langen Gewehrs. Wir müssen sicherstellen, dass wir für die Befreiung des Proletariats der Welt genügend Waffen vorrätig haben."
 SOV_New_Infantry_Equipment:0"Neue Infanterieausrüstung"
 SOV_New_Infantry_Equipment_desc:0"Mit modernisierter Ausrüstung erhalten unsere glorreichen Soldaten die Werkzeuge, die sie brauchen, um die Welt von der kapitalistischen Unterdrückung zu befreien."
 SOV_Red_Mountaineers:0"Rote Bergsteiger"
 SOV_Red_Mountaineers_desc:0"Wir müssen ein Ausbildungsprogramm für Truppen starten, die für den Kampf in bergigem Gelände gerüstet sind. Diese unter härtesten Bedingungen ausgebildeten Gebirgsjäger werden die Speerspitze unserer Befreiung der Welt sein."
 SOV_Jungle_Training:0"Dschungeltraining"
 SOV_Jungle_Training_desc:0"Wir müssen Methoden entwickeln und unsere Soldaten ausbilden, um in tropischen Gebieten Krieg führen zu können. Das Proletariat der tropischen Klimazonen muss befreit werden, genau wie die in England und Frankreich ausgebeuteten."
 SOV_Nationwide_Wargame:0"Landesweite Kriegsspiele"
 SOV_Nationwide_Wargame_desc:0"Mit einem umfassenden Kriegsspiel, das die gesamte Breite der UdSSR abdeckt, können wir die notwendige Erfahrung sammeln, um in der modernen Ära effektiv Krieg zu führen."
 SOV_Work_On_Logistics:0"Verbessern Sie unsere Logistikkapazität"
 SOV_Work_On_Logistics_desc:0"Soldaten benötigen ständig Nahrung und Munition, um auf dem Schlachtfeld schlagkräftig zu sein. Um die Versorgung der Armee sicherzustellen, ist ein Elitekorps von Offizieren erforderlich. Alexander Wassiljewski ist ein äußerst kompetenter Kommandeur und verfügt über die notwendigen Fähigkeiten, diese neue Elitetruppe zusammenzustellen."
 SOV_Military_Machine:0"Militärmaschine"
 SOV_Military_Machine_desc:0"Die sowjetische Militärmaschinerie wird weiterhin Waffen produzieren, bis das gesamte Proletariat von der Unterdrückung befreit ist."
 SOV_Develop_Resources:0"Ressourcen entwickeln"
 SOV_Develop_Resources_desc:0"Die Industrie benötigt Erze und andere Ressourcen zur Herstellung von Waffen für das Militär. Um diesen Bedarf zu decken, müssen wir neue Minen eröffnen."
 SOV_more_tech:0"Investieren Sie in die Wissenschaft"
 SOV_more_tech_desc:0"Wir müssen die Grenzen des menschlichen Wissens weiter verschieben. Mit Hilfe der Wissenschaft können wir eine bessere Gesellschaft für die Menschen schaffen."
 SOV_The_Working_Man:0"Der Arbeiter"
 SOV_The_Working_Man_desc:0"Der Arbeiter ist der Inbegriff der trotzkistischen Revolution. Wenn er seinen Platz in dieser glorreichen Revolution nicht kennt, werden unsere Hoffnungen und Träume ein unglückliches Ende finden."
 SOV_Restrict_Political_Expression:0"Einschränkung der politischen Meinungsäußerung"
 SOV_Restrict_Political_Expression_desc:0"Obwohl die Meinungsfreiheit und andere politische Freiheiten große Annehmlichkeiten darstellen, erfordern die heutigen Zeiten andere Maßnahmen. Diejenigen, die zu Aufständen aufrufen und Dissens schüren, müssen gejagt und aus der Bevölkerung entfernt werden."
 SOV_One_Dream_One_China:0"Ein Traum, ein China"
 SOV_One_Dream_One_China_desc:0"Wir werden der wahren chinesischen Regierung helfen, die Bauern von den verschiedenen Kriegsherren zu befreien, die in den letzten Jahren an die Macht gekommen sind. Der oberste Kriegsherr, Chiang Kai Shek, wird ein harter Gegner sein, daher werden wir dieses Unterfangen militärisch unterstützen."
 SOV_Return_Of_Japanese_Occupied_China:0"Verhandlungen über die Rückgabe des von Japan besetzten China"
 SOV_Return_Of_Japanese_Occupied_China_desc:0"Wir werden den Streit zwischen Japanern und Chinesen vermitteln und eine für beide Seiten faire Lösung finden. Wir garantieren den Ausgang des Verfahrens und sorgen für einen reibungslosen Ablauf. Genosse Trotzki lässt sich nicht zum Narren halten."
 SOV_Indian_Communism:0"Indischer Kommunismus"
 SOV_Indian_Communism_desc:0"Wir werden die Verbreitung kommunistischer Ideen unter den indischen Bauern fördern, um ihnen zu helfen, sich von ihren dekadenten britischen Oberherren zu befreien."
 SOV_Free_The_Peasants:0"Befreit die Bauern"
 SOV_Free_The_Peasants_desc:0"Wir werden Indien bei der Industrialisierung unterstützen, indem wir das Land bei der Verstaatlichung seiner Industrien unterstützen und die Bevölkerung generell von den Bauernhöfen in neu errichtete Fabriken holen."
 SOV_Independence_For_India:0"Unabhängigkeit für Indien"
 SOV_Independence_For_India_desc:0"Indien wird endlich unabhängige Bürger aus dem abscheulichen, imperialistischen Imperium Großbritannien aufnehmen."
 SOV_World_Revolution:0"Weltrevolution"
 SOV_World_Revolution_desc:0"Die Bauern und Werktätigen der Welt müssen von kapitalistischer und faschistischer Unterdrückung befreit werden. Dabei ist jedoch Vorsicht geboten. Die Regierungen dieser Länder werden es nicht begrüßen, wenn wir unsere Ideologie verbreiten und offene Rebellionen in ihrem eigenen Hinterhof fördern. Die westlichen Oligarchen könnten der Befreiung der Arbeiter mit Gewalt entgegentreten, um nicht vom Weg abzukommen."
 SOV_Expansion_of_Communism:0"Ausbreitung des Kommunismus"
 SOV_Expansion_of_Communism_desc:0"Wir werden mehr Menschen dazu ermutigen, das Licht des Kommunismus zu erkennen, indem wir ihnen die Vorteile aufzeigen, die er bietet."
 SOV_European_Sphere:0"Der europäische Raum"
 SOV_European_Sphere_desc:0"Je mehr Menschen unsere kommunistische Ideologie annehmen, desto größer werden die Grenzen unserer Nation. Eines Tages werden wir weder Nationen noch Grenzen brauchen und unter einer zentralisierten Weltregierung leben. Wir werden die ehemaligen Nationen Deutschlands, Frankreichs und Italiens vollständig integrieren und zu unserem Kerngebiet machen. Es lebe die Union der Sozialistischen Sowjetrepubliken!"
 SOV_Get_New_Communists_On_Board:0"Neue Kommunisten an Bord holen"
 SOV_Get_New_Communists_On_Board_desc:0"Um potenzielle Kommunisten zu gewinnen, müssen wir ihnen zeigen, dass der Kommunismus tatsächlich das beste System ist, um den arbeitenden Menschen ein qualitativ hochwertiges Leben zu gewährleisten. Daher werden wir beginnen, einen Großteil der Produktion auf Konsumgüter und den allgemeinen Konsum zu konzentrieren."
 SOV_Dawn_Of_A_Better_World:0"Der Beginn einer besseren Welt"
 SOV_Dawn_Of_A_Better_World_desc:0"Wir müssen uns um den Aufbau einer einheitlichen Menschheitsnation bemühen, die alle einschließt und von einer einzigen kommunistischen Regierung zum Wohle aller regiert wird. Auch wenn dies noch in weiter Ferne liegt, müssen wir weiter auf dieses Ziel hinarbeiten, auch wenn dieser Traum so weit entfernt scheint wie eh und je."
 SOV_Perpetual_Warfare:0"Zustand des ewigen Krieges"
 SOV_Perpetual_Warfare_desc:0"Wir werden kämpfen, bis im Kampf für die Freiheit der gesamten Menschheit auch der letzte Tropfen Blut, jede Kugel, jede Bombe und jeder Bissen Nahrung vergossen ist."
 SOV_The_Polish_Question:0"Die polnische Frage"
 SOV_The_Polish_Question_desc:0"Die Polen haben uns immer verachtet, und es ist an der Zeit, ihrer Unverschämtheit ein Ende zu setzen. Polen würde lieber die Welt zerstört sehen, als uns die Befreiung des Proletariats zu gestatten oder die Deutschen an der Eroberung Europas zu hindern."
 SOV_3_Way_Parition_Of_Poland:0"Teilung Polens"
 SOV_3_Way_Parition_Of_Poland_desc:0"Wir werden Polen mit den Deutschen teilen, um das Unrecht von Versailles wiedergutzumachen. Den Tschechen wird außerdem aus humanitären Gründen ein Teil des Territoriums zugeteilt, so dass Juden und Flüchtlinge sich dorthin begeben können, wenn sie dies wünschen. Schließlich tun wir nur das Richtige."
 SOV_Stalin_Cult:0"Stalin-Kult"
 SOV_Stalin_Cult_desc:0"Die Förderung des Personenkults um Genosse Stalin wird unserer Regierung Legitimität verleihen und die Arbeitsleistung steigern. Das sowjetische Volk braucht nach vielen turbulenten Jahren eine Zeit der Stabilität, und diese darf ihm nicht verwehrt werden!"
 
 
 SOV_Go_With_Molotov:0"Ersetzen Sie Litvinov durch Molotow"
 SOV_Go_With_Molotov_desc:0"Wir müssen den Deutschen zeigen, dass wir bereit sind, mit ihnen zusammenzuarbeiten. Dazu müssen wir als Signal an Hitler das Außenministerium von Juden säubern. Maxim Litwinow muss gehen. Wjatscheslaw Molotow wird der neue Volkskommissar für Auswärtige Angelegenheiten."
 SOV_French_Soviet_Reapproachment:0"Französisch-sowjetische Annäherung"
 SOV_French_Soviet_Reapproachment_desc:0"Es ist klar, dass die Nazis versuchen werden, unser Land als Lebensraum zu erobern. Wir müssen die Beziehungen zu Frankreich verbessern, um die Bedrohung durch den Faschismus einzudämmen."
 SOV_Help_For_France:0"Hilfe für Frankreich"
 SOV_Help_For_France_desc:0"Wir müssen unsere neuen französischen Freunde bei ihren Bemühungen unterstützen, eine Rüstungsindustrie aufzubauen, damit sie nicht dem faschistischen Ansturm zum Opfer fallen."
 SOV_Reconcile_French_Comintern:0"Versöhnung der französischen Komintern"
 SOV_Reconcile_French_Comintern_desc:0"Wir sollten unsere ideologischen Differenzen mit den französischen Kommunisten beiseite legen und gemeinsam auf gemeinsame Ziele hinarbeiten."
 SOV_French_Soviet_Treaty:0"Französisch-sowjetischer Vertrag"
 SOV_French_Soviet_Treaty_desc:0"Unsere Panzerforschung stagniert. Wenn wir uns mit den Franzosen zusammentun, können wir wieder hochmoderne Designs entwickeln."
 SOV_Assist_The_Czechs:0"Assistieren Sie den Tschechen"
 SOV_Assist_The_Czechs_desc:0"Wir müssen unseren slawischen Mitbürgern helfen, dem Angriff der Nazis standzuhalten. Wir werden ihnen Ingenieure und andere Berater schicken, um sie bei der Vorbereitung auf die Invasion zu unterstützen."
 SOV_Guarantee_For_Czechoslovakia:0"Garantieren Sie den Tschechen"
 SOV_Guarantee_For_Czechoslovakia_desc:0"Wir müssen die Expansion der Nazis auf Schritt und Tritt verhindern. Wir müssen den Tschechen und der Welt klarmachen, dass ihre Souveränität von der mächtigen Sowjetunion geschützt wird."
 SOV_Pressure_Poland:0"Druck Polen"
 SOV_Pressure_Poland_desc:0"Wir können zwei Fliegen mit einer Klappe schlagen. Wir brauchen einen Versorgungskorridor in die Tschechoslowakei, um im Kriegsfall Truppen dorthin schicken zu können, und wir müssen außerdem die Fehler von Versailles beheben. Damit erreichen wir beides."
 SOV_Socialism_In_One_Country:0"Sozialismus im Inland"
 SOV_Socialism_In_One_Country_desc:0"Unser Land hat erheblichen Schaden erlitten. Unsere Infrastruktur, unsere Industrie, unsere Bevölkerung und unsere Wirtschaft insgesamt wurden durch den Nazi-Angriff schwer beschädigt. Wir müssen wieder aufbauen und stark werden. Wir werden das langfristige Überleben der Sowjetunion sichern."
 SOV_Warm_Water_Ports:0"Warmwasseranschlüsse"
 SOV_Warm_Water_Ports_desc:0"Um unsere Schwarzmeerflotte auszubauen, müssen wir den Zugang über den Bosporus sicherstellen. Die Türkei ist ein unzuverlässiger Nachbar, und die Amerikaner und andere sind sich einig, dass das sowjetische Volk einen Zugang zum Mittelmeer verdient. Konstantinopol gehört uns!"
 SOV_Trotsky_Was_Right:0"Sozialismus im Ausland"
 SOV_Trotsky_Was_Right_desc:0"Die Idee des „Sozialismus in einem Land“ hat uns viele Jahre lang geholfen; wir brauchten Zeit, um Kraft zu sammeln und unsere sozialistische Utopie im eigenen Land aufzubauen. Doch jetzt, nach der Niederlage der Hitlerfaschisten und ihrer Anhänger, ist es an der Zeit, den Funken einer weltweiten Arbeiterrevolution neu zu entzünden. Wir werden den Kommunismus auf der ganzen Welt verbreiten!"
 SOV_Support_Greek_Communists:0"Unterstützen Sie die griechischen Kommunisten"
 SOV_Support_Greek_Communists_desc:0"Wir haben dringende Nachrichten von Kommunisten aus Griechenland erhalten, die uns verzweifelt um Hilfe bitten. Wir müssen tun, was wir können, um zu helfen, denn ihre Sache ist auch unsere."
 SOV_Northern_Neighbors:0"Nördliche Nachbarn"
 SOV_Northern_Neighbors_desc:0"Die nordischen Völker im Norden leben auf einem Land, das reich an natürlichen Ressourcen ist. Wir müssen die Bedürftigen umverteilen und die skandinavische Halbinsel von der kapitalistischen Unterdrückung befreien."
 SOV_A_New_Soviet_Military:0"Ein neues sowjetisches Militär"
 SOV_A_New_Soviet_Military_desc:0"Die Rote Armee muss reformiert werden, um mit den Waffenarsenalen des Faschismus und Kapitalismus konkurrieren zu können. Nur dann können die Arbeiter der Welt befreit werden."
 SOV_A_Modern_Military:0"Ein modernes Militär"
 SOV_A_Modern_Military_desc:0"Wir müssen unsere Soldaten besser ausrüsten, damit sie auf dem Schlachtfeld den Sieg erringen können."
 SOV_Early_APCs:0"Erforschen Sie frühe APC-Modelle"
 SOV_Early_APCs_desc:0"Wir arbeiten an der Entwicklung effizienter Einsatzfahrzeuge für Panzergrenadiere. Halbkettenfahrzeuge genügen vorerst."
 SOV_Modern_Military_Research:0"Moderne militärische Forschungseinrichtungen"
 SOV_Modern_Military_Research_desc:0"Wissenschaft und Technologie sind der Schlüssel zur Zukunft. Ohne die fortschrittlichen Waffen von morgen wird das Feuer der Revolution erlöschen."
 SOV_NKVD_Intelligence:0"Gründung des Geheimdienstes NKWD"
 SOV_NKVD_Intelligence_desc:0"Nun wird der NKWD über ausländische Aktivitäten berichten, sowohl über die von Freunden als auch von Feinden."
 SOV_German_Scientists:0"Infiltrieren Sie die deutsche Raketenforschung"
 SOV_German_Scientists_desc:0"Der NKWD hat Dokumente erhalten, die dazu beitragen werden, unsere Raketentechnologie auf eine Stufe mit der der Nazis zu stellen."
 SOV_German_Scientists_tt:0"Stehlen Sie Geheimnisse der §YRaketentechnik§! vom Hitler-Regime - dies wird einen §YBonus§! für unsere eigenen Forschungsbemühungen bedeuten \n \n"
 SOV_The_Mig_Project:0"Das Mig-Projekt"
 SOV_The_Mig_Project_desc:0"Wir haben Raketenentwürfe erhalten. Wir haben unsere Konstrukteure über diese neuen Entwicklungen informiert und sie haben uns neue Flugzeugmodelle mit diesen neuen Düsentriebwerken versprochen."
 SOV_Mig_Project_tt:0"Wir werden unsere eigene „Düsentechnologie“ entwickeln und dabei das nutzen, was wir in der Vergangenheit vom Hitler-Regime übernommen haben. Außerdem werden wir technische Daten verwenden, die wir von allen Düsenflugzeugen gestohlen haben, die sie möglicherweise produziert haben. \n \n"
 SOV_Manhattan:0"Infiltrieren Sie das Manhattan-Projekt"
 SOV_Manhattan_desc:0"Der NKWD hat herausgefunden, dass die westlichen Alliierten in New Mexico heimlich an neuen Superwaffen arbeiten. Wir müssen an ihre Daten gelangen, um nicht im Regen stehen zu bleiben!"
 SOV_Manhattan_tt:0"Stehlen Sie den Westmächten §YNuklear§!-Geheimnisse - dies wird einen §YBonus§! für unsere eigenen Forschungsanstrengungen bedeuten \n \n"
 SOV_Our_Own_B29:0"Unsere eigene B29"
 SOV_Our_Own_B29_desc:0"Der amerikanische B-29-Bomber ist eine Superwaffe, die wir weder abfangen noch übertreffen können. Wir konnten Informationen über dieses Flugzeug sammeln und müssen mit dem Bau unseres eigenen beginnen, bevor wir Tausende von ihnen über Moskau sehen!"

 SOV_France_In_The_Comintern:0"Laden Sie Frankreich zur Komintern ein"
 SOV_France_In_The_Comintern_desc:0"Nachdem wir nun eine gemeinsame Basis mit unseren französischen kommunistischen Brüdern gefunden haben, sollten wir sie einladen, sich unseren Reihen im Streben nach der Freiheit des Proletariats anzuschließen." 
 SOV_Czechoslovakia_In_The_Comintern:0"Laden Sie die Tschechoslowakei zur Komintern ein"
 SOV_Czechoslovakia_In_The_Comintern_desc:0"Wir sollten unsere tschechischen Freunde zur Komintern einladen. Sie werden von unserem Schutz profitieren und wir können die Ausweitung des deutschen Einflusses in Mitteleuropa verhindern."
 SOV_Red_Marines:0"Rote Marines"
 SOV_Red_Marines_desc:0"Wir sollten unsere jungen Marines zu den besten der Welt ausbilden. In der Vergangenheit haben wir zugelassen, dass unsere Spezialeinheitenprogramme hinter anderen in der Welt zurückgefallen sind. Das können wir nicht länger hinnehmen." 
 SOV_Red_Paratroopers:0"Rote Fallschirmjäger"
 SOV_Red_Paratroopers_desc:0"Unsere Fallschirmjäger werden mit ihrer überlegenen Ausbildung und Taktik vom Himmel regnen und unseren Feinden unsägliche Zerstörung zufügen."
 SOV_Russian_Democracy:0"Demokratischer Sozialismus"
 SOV_Russian_Democracy_desc:0"Die Bevölkerung schreit laut nach Demokratie. Es ist nun die Aufgabe der Regierungsorganisationen, die Forderungen der Bevölkerung zu erfüllen und Wahlen abzuhalten. Dies muss geschehen, bevor das Land durch Spaltung und Revolution zerrissen wird."
 SOV_A_Fascist_State:0"Förderung des Wachstums des Faschismus"
 SOV_A_Fascist_State_desc:0"Ein starker Staat ist notwendig, um die Bevölkerung vor ausländischen Angriffen zu schützen. Doch der Kommunismus ist nicht die Lösung. Wir müssen uns von diesem gottlosen Regime abwenden und eine neue Regierungsform annehmen."
 SOV_Normalize_Relations_With_The_West:0"Normalisierung der Beziehungen zum Westen"
 SOV_Normalize_Relations_With_The_West_desc:0"Wir müssen diplomatische Beziehungen zu den westlichen Nationen aufbauen und versuchen, die Ereignisse der Vergangenheit hinter uns zu lassen."
 SOV_American_Cooperation:0"Amerikanische Zusammenarbeit"
 SOV_American_Cooperation_desc:0"Von einer Demokratie zur anderen: Die Amerikaner können uns bei der wirtschaftlichen Entwicklung sehr unterstützen, während wir versuchen, Russland in die Moderne zu führen."
 SOV_American_Industrial_Assistance:0"Amerikanische Industriehilfe"
 SOV_American_Industrial_Assistance_desc:0"Während wir weiterhin gute Beziehungen zu den Amerikanern aufbauen und die Wirtschaft boomt, haben Unternehmen aus aller Welt begonnen, in beiden Ländern zu investieren."
 SOV_Moving_Forward:0"Vorwärts gehen"
 SOV_Moving_Forward_desc:0"Wir müssen in die wissenschaftliche Zusammenarbeit mit anderen demokratischen Regierungen weltweit investieren. Gemeinsam wird es uns sicherlich viel leichter fallen, uns gegen Bedrohungen zu verteidigen, als wenn wir es allein täten."
 SOV_New_World_Order:0"Eine neue Weltordnung"
 SOV_New_World_Order_desc:0"Die alte Weltordnung, die auf Imperium und Monarchie basierte, ist verrottet und zerfällt um uns herum. Die Deutschen versuchen, die Welt für die arische Rasse umzugestalten, während die Imperialisten schnell ins Hintertreffen geraten. Die wahren Demokratien der Welt müssen sich zusammenschließen, um die Freiheit aller Menschen zu verteidigen."
 SOV_Improve_TransSiberian_Railway:0"Verbesserung der Transsibirischen Eisenbahn"
 SOV_Improve_TransSiberian_Railway_desc:0"Wir sollten den Ausbau der Eisenbahnlinien, die den Osten und Westen des Landes verbinden, einschließlich der Transsibirischen Eisenbahn und angeschlossener Eisenbahnlinien, fortsetzen. Wir müssen in der Lage sein, Versorgungsgüter und andere Güter zu Verteidigungszwecken effizient quer durch das Land zu transportieren."
 SOV_Develop_Oil_Concern:0"Ölkonzern entwickeln"
 SOV_Develop_Oil_Concern_desc:0"Wir müssen in die Suche nach Öl und den Bau weiterer Raffinerien investieren, um unsere riesigen Ölvorkommen im Kaukasus auszunutzen."
 SOV_Look_Eastward:0"Blick nach Osten"
 SOV_Look_Eastward_desc:0"Wir müssen uns vor Aggressionen im Osten in Acht nehmen. Es ist an der Zeit, unsere Macht in dieser Region zu festigen und unsere Verteidigung vorzubereiten."
 SOV_Non_Aggression_With_Japan:0"Nichtangriffspakt mit Japan"
 SOV_Non_Aggression_With_Japan_desc:0"Wir können mit den Japanern zu einer Einigung kommen, um Gewalt und unnötiges Blutvergießen zu verhindern."
 SOV_End_Of_Non_Aggression_With_Japan:0"Nichtangriffspakt mit Japan aufkündigen"
 SOV_End_Of_Non_Aggression_With_Japan_desc:0"Die Vereinbarung mit Japan war fehlerhaft. Wir hätten ein solches Abkommen nicht eingehen sollen. Es ist an der Zeit, den Japanern klarzumachen, dass wir austreten wollen."
 SOV_Develop_The_Ural_Moutain_Region:0"Entwicklung der Ural-Gebirgsregion"
 SOV_Develop_The_Ural_Moutain_Region_desc:0"Im Uralgebirge gibt es zahlreiche Mineralvorkommen, die wir ausbeuten können, um armen Bauern Arbeitsplätze und verschlafenen Fabriken Erze zu verschaffen."
 SOV_Further_Development_of_Ural_Mountain_Mining_Facilities:0"Weiterentwicklung der Bergbauanlagen im Uralgebirge"
 SOV_Further_Development_of_Ural_Mountain_Mining_Facilities_desc:0"Mehr Erz ist besser als weniger Erz."
 SOV_Increase_Productivity:0"Steigern Sie die Mitarbeiterproduktivität"
 SOV_Increase_Productivity_desc:0"Wir müssen unsere Arbeiter dazu ermutigen, härter zu arbeiten und zum Wohle der Gemeinschaft auf Selbstzufriedenheit zu verzichten. Sie müssen wissen, dass ihr Land von ihnen abhängt!"
 SOV_Comforts_For_The_People:0"Komfort für die Menschen"
 SOV_Comforts_For_The_People_desc:0"Wir haben die Menschen bis an ihre Grenzen gebracht, um unserem Land eine vielversprechende Zukunft zu ermöglichen. Jetzt ist es an der Zeit, dass sie die Früchte ihrer Arbeit ernten. Wir werden unsere Konsumgüterindustrie ausbauen, um unseren Menschen den dringend benötigten Komfort zu bieten."
 SOV_Military_Expansion:0"Militärische Expansion"
 SOV_Military_Expansion_desc:0"Wir werden unser Militär ausbauen, um uns gegen ausländische Aggressionen zu verteidigen. Während die kapitalistischen Länder Pläne schmieden und Reichtum horten, werden wir fleißig Waffen horten, um unser Volk zu verteidigen."
 SOV_Establish_Mobile_Construction_Units:0"Mobile Baueinheiten einrichten"
 SOV_Establish_Mobile_Construction_Units_desc:0"Wir müssen Gruppen patriotischer Bürger organisieren, die in Kriegszeiten auf Abruf bereitstehen, um Infrastruktur und Industrie zu reparieren."
 SOV_Weapons_Of_War:0"Waffen des Krieges"
 SOV_Weapons_Of_War_desc:0"Manche Männer kämpfen mit Waffen, andere mit Verstand. Aber eines ist sicher: Jeder muss dienen."
 
 
 SOV_Education_Initiative:0"Bildungsinitiative"
 SOV_Education_Initiative_desc:0"Soziale Unruhen und die Nachlässigkeit des Zaren führten zu einer sehr niedrigen Alphabetisierungsrate in der Sowjetunion. Ein nationales Bildungsprogramm kann die Grundbildung sicherstellen und eine spätere technische Ausbildung ermöglichen."
 SOV_Mass_Immunizations:0"Massenimpfungen"
 SOV_Mass_Immunizations_desc:0"Die Sowjetunion wurde von massiven Epidemien heimgesucht. Besonders verheerend war die Ausbreitung von Typhus. Wir können jahrzehntelanges Leid beenden, indem wir Impfstoffe gegen einfache Krankheiten entwickeln und verabreichen sowie nach besseren Medikamenten und Behandlungsmöglichkeiten für diese Krankheiten forschen."
 SOV_Social_Welfare:0"Soziale Wohlfahrt"
 SOV_Social_Welfare_desc:0"Nachdem wir alle physischen Bedürfnisse unserer Gesellschaft erfüllt haben, können wir auch Mittel für die psychischen Bedürfnisse unserer Bevölkerung bereitstellen. Wenn der Staat denjenigen, die zu alt oder zu schwach zum Arbeiten sind, eine Rente und denjenigen, die Hunger haben, Nahrung garantieren kann, können wir die Produktivität unserer gesamten Gesellschaft steigern und das Vertrauen der Menschen in den Staat stärken."
 SOV_Liberalize_Our_Regime:0"Beibehaltung der Liberalisierung während des Krieges"
 SOV_Liberalize_Our_Regime_desc:0"Wir werden unseren Bürgern größere individuelle Freiheiten einräumen und den Handel und kulturellen Austausch mit dem Westen ausbauen."
 SOV_Founding_the_UN:0"Gründung der UNO"
 SOV_Founding_the_UN_desc:0"Wenn wir gemeinsam mit den USA eine neue diplomatische Organisation gründen, können wir den Ausbruch eines weiteren Weltkriegs verhindern und die Menschheit vor der Zerstörung bewahren, die ein solcher Konflikt mit sich bringt. Wir können ausländische Streitigkeiten schlichten und so für mehr Frieden und Stabilität sorgen. Wer würde schon einen Konflikt mit den beiden größten Supermächten der Welt eingehen wollen?"
 SOV_Fascist_Counter_Coup:0"Faschistischer Gegenputsch"
 SOV_Fascist_Counter_Coup_desc:0"Die trotzkistische Revolution genießt nicht mehr die Unterstützung des Volkes. Die Unzufriedenheit mit dem gegenwärtigen Regime ist so groß, dass man auf der Straße manchmal die Sehnsucht nach der Zarenherrschaft vernehmen kann. Es ist Zeit für das sowjetische Volk, sein Schicksal neu zu lenken und falsche Versprechungen aufzugeben."
 SOV_Total_War:0"Total War"
 SOV_Total_War_desc:0"Unser Heimatland wird derzeit von feindlichen Armeen überfallen, die unsere Häuser, unser Volk und unsere Ideologie zerstören wollen. Was sie nicht wissen, ist, dass wir gerade erst begonnen haben zu kämpfen. Wir werden neue Arbeiter in die Fabriken und neue Soldaten auf die Schlachtfelder schicken."
 
 
 
 
 SOV_Get_Out_Of_Jail_Free:0"Industrielle Notfallentwicklung"
 SOV_Get_Out_Of_Jail_Free_desc:0"Die Sowjetunion steht kurz davor, einen großen Landkrieg gegen einen ausländischen Gegner zu verlieren. Die Folgen einer solchen Katastrophe wären wahrscheinlich nichts weniger als die Auflösung unserer Union, das Ende der Arbeiterrevolution und die Versklavung der hier lebenden slawischen Völker. Dies muss um jeden Preis verhindert werden. Wir werden Jung und Alt mobilisieren, um unseren tapferen jungen Männern bei der Verteidigung unseres Vaterlandes zu helfen." 
 SOV_Ask_For_Arms:0"Bitte um Waffen"
 SOV_Ask_For_Arms_desc:0"Wir werden uns an den Westen wenden und ihn um Waffen bitten. Verzweifelte Zeiten erfordern verzweifelte Maßnahmen, schließlich ist der Feind meines Feindes mein Freund."
 SOV_Lend_Lease_Programme:0"Leih- und Pachtprogramm"
 SOV_Lend_Lease_Programme_desc:0"Da die notwendigen diplomatischen Kanäle bereits geöffnet sind, haben wir begonnen, mit den Vereinigten Staaten über die Möglichkeit einer materiellen Unterstützung der Sowjetunion zu sprechen. Unser Außenministerium hat sie davon überzeugt, uns Ressourcen und Vorräte zu schicken, um uns in unserem Kampf zu unterstützen. Mit den Worten von Genosse Stalin wird dies eine enorme Hilfe in unserem Kampf gegen den „blutrünstigen Hitlerismus“ sein. SOV_Get_Trotsky:0&quot;Get Trotsky"
 SOV_Get_Trotsky_desc:0"Beauftragen Sie den NKWD, Trotzki zu finden und zu ermorden. Er ist der Sowjetunion schon viel zu lange ein Dorn im Auge der Konterrevolutionäre."
 SOV_Fix_Industry:0"Fix-Branche"
 SOV_Fix_Industry_desc:0"Die Säuberungen haben die Industrieführer eingeschüchtert und zu einer gefährlichen Inkompetenz in unseren militärischen Produktionsstätten geführt. Dieses Problem muss Stalin persönlich angehen."
 SOV_Invest_in_the_Military:0"Investieren Sie in das Militär"
 SOV_Invest_in_the_Military_desc:0"Stalin ist kein vertrauensseliger Mensch. Besonders paranoid reagiert er gegenüber jenen, die innerhalb der sowjetischen Hierarchie mit seiner Macht konkurrieren könnten – wie etwa Marschall Tuchatschewski. Wenn sich Marschall Tuchatschewski mit Stalin zusammensetzen und ihre Differenzen besprechen könnte, könnte Stalin vielleicht davon überzeugt werden, sein Vertrauen in das sowjetische Offizierskorps zu setzen."
 SOV_Military_Excellence:0"Militärische Exzellenz"
 SOV_Military_Excellence_desc:0"Da die Frage der Loyalität bereits gelöst ist, kann das sowjetische Oberkommando mit Stalins voller Unterstützung das beste Offizierskorps der Welt aufbauen."
 SOV_Deep_Operations:0"Tiefe Operationen"
 SOV_Deep_Operations_desc:0"Stalin ist sich bewusst, dass seine Meinungsverschiedenheiten mit Marschall Tuchatschewski den Wert von Tuchatschewskis Militärtheorie nicht schmälern. Stalin hat angeordnet, dass diese Doktrin weiterentwickelt wird."
 
 SOV_Czech_Puppet:0"Tschechische Marionette"
 SOV_Czech_Puppet_desc:0"Wir werden die Tschechen und Slowaken beschützen. Sie wissen, dass ihre Möglichkeiten begrenzt sind, und als Slawen wissen sie, dass unsere Absichten rein sind. Wir werden verhindern, dass ihre Nachbarn sie versklaven, und so die Armen aus der Sklaverei der Reichen befreien."
 SOV_Cold_War_World:0"Welt des Kalten Krieges"
 SOV_Cold_War_World_desc:0"Wir müssen uns an die Amerikaner wenden, um über das Schicksal der durch den Krieg zerstörten Nationen zu entscheiden. Wir werden im Osten Marionetten einsetzen, und die Amerikaner werden die Souveränität der Demokratien im Westen sichern. Aber wir müssen über das Schicksal Österreichs, Jugoslawiens, Koreas, Japans, Chinas, Ostdeutschlands und Polens entscheiden. Mischen wir uns in ihre Grenzen ein oder lassen wir sie in Ruhe?"
 SOV_The_League_of_Communists_in_Yugoslavia:0"Der Bund der Kommunisten in Jugoslawien"
 SOV_The_League_of_Communists_in_Yugoslavia_desc:0"Die kommunistische Bewegung Jugoslawiens würde von unserer Hilfe enorm profitieren. Unsere Agenten vor Ort berichten uns, dass die Bevölkerung der Idee des Kommunismus gegenüber aufgeschlossen ist und ein wenig Unterstützung aus dem Mutterland viel bewirken würde. Möglicherweise erleben wir noch ein rotes Jugoslawien."
 SOV_Black_Sea_Dispute:0"Schwarzmeerstreit"
 SOV_Black_Sea_Dispute_desc:0"Seit Jahrhunderten liegen die russischen und türkischen Völker im Streit. Unzählige Kämpfe wurden zwischen uns ausgetragen, die nichts als Tod und Elend für alle brachten. Wir müssen diesen Teufelskreis des Todes durchbrechen und unserem südlichen Rivalen ein Friedensangebot unterbreiten. Möge dies der Beginn einer neuen Ära russisch-türkischer Zusammenarbeit sein."
 SOV_Bulgarian_Question:0"Bulgarische Frage"
 SOV_Bulgarian_Question_desc:0"Obwohl es der kommunistischen Bewegung in Bulgarien an Arbeitskräften mangelt und sie nur schwer an Fahrt gewinnen kann, haben wir uns entschlossen, sie zu unterstützen. Es gibt einige prominente bulgarische Kommunisten in der Komintern, die unseren Beitrag zur Arbeiterbefreiung in ihrem Heimatland zu schätzen wissen."
 SOV_Iron_Grip_Over_The_Balkans:0"Eiserner Griff über dem Balkan"
 SOV_Iron_Grip_Over_The_Balkans_desc:0"Wir haben unseren Einfluss auf dem Balkan langsam ausgebaut und nun ist es an der Zeit, unsere Position dauerhaft zu festigen. Wir nehmen es auf uns, die kommunistischen Völker hier vor den despotischen westlichen Regierungen zu schützen, die sie versklaven wollen."
 
 
 
 SOV_Trial_of_Stalin:0"Stalin für seine Verbrechen vor Gericht stellen"
 SOV_Trial_of_Stalin_desc:0"Wir haben den konterrevolutionären Verräter am Leben erhalten, um ein öffentliches Tribunal zu veranstalten, das seine Verbrechen aufdeckt. Ein solches Ereignis wäre die perfekte Gelegenheit, dem sowjetischen Volk und der Welt zu zeigen, dass die Sowjetunion eine neue Richtung einschlägt. Der kommunistische Gigant ist erwacht."
 SOV_A_New_Approach:0"Ein neuer Ansatz"
 SOV_A_New_Approach_desc:0"Leo Trotzki kehrte müde in die Sowjetunion zurück. Die Zeit fernab seiner Heimat gab Trotzki Zeit, sich eine neue Sowjetunion vorzustellen – eine aufgeklärte Nation, in der Männer und Frauen zusammenarbeiten, um ein Arbeiterparadies zu schaffen, gefördert durch staatliche Anreize statt Zwang."
 SOV_Appease_Dissenters:0"Andersdenkende beschwichtigen"
 SOV_Appease_Dissenters_desc:0"Trotzki hat deutlich gemacht, dass er den stalinistischen Einfluss der Partei auf ihre Mitglieder und die gesamte Sowjetunion lockern will. Die Ära der staatlichen Meinungsfreiheit ist weitgehend vorbei. Wenig überraschend äußern Trotzkis Kritiker ihre Bedenken immer lauter. Trotzki muss sie schnell zur Verantwortung ziehen, bevor diese Neinsager einen eigenen Putschversuch unternehmen!"
 SOV_Anti_Imperialist_Foreign_Policy:0"Antiimperialistische Außenpolitik"
 SOV_Anti_Imperialist_Foreign_Policy_desc:0"Wir werden Programme zur Förderung aller Menschen starten, die mutig genug sind, sich gegen die Fremdherrschaft in den afrikanischen und südostasiatischen Kolonien auszusprechen, einer Region, die weitgehend vom Britischen Empire kontrolliert wird."
 SOV_Polish_Rapproachment:0"Annäherung an Polen"
 SOV_Polish_Rapproachment_desc:0"Man muss schon ein großer Mann sein, um zuzugeben, dass er im Unrecht war. Wir sollten an besseren Beziehungen zu Polen arbeiten und historische Gräben schließen, nicht nur um die rassistische Nazi-Bedrohung einzudämmen, sondern auch, um unsere Union auf einen moralisch vertretbaren Weg zu bringen. Nur weil ein guter Kommunist Religion verachtet, heißt das nicht, dass er keine Moral hat."
 SOV_Resist_Colonial_Subjugation:0"Widerstehen Sie der kolonialen Unterwerfung"
 SOV_Resist_Colonial_Subjugation_desc:0"Wir werden alle Opfer des westlichen Kolonialismus ermutigen, sich für ihre Unabhängigkeit einzusetzen. Wir werden diese Kampagne finanziell unterstützen. Möge dies das Ende der Ära des Imperialismus und den Beginn einer Ära des Wohlstands für die gesamte Menschheit bedeuten."
 SOV_Importance_of_the_Comintern:0"Kommunisten im Ausland"
 SOV_Importance_of_the_Comintern_desc:0"Kommunisten im Ausland können ermutigt werden, die UdSSR zu loben. Wir sollten diese Visionäre davon überzeugen, sich in ihren eigenen Ländern für bessere Beziehungen zur Sowjetunion einzusetzen."
 SOV_Comintern_Expansion:0"Erweiterung der Komintern"
 SOV_Comintern_Expansion_desc:0"Wir müssen alle kommunistischen Nationen ermutigen, unserer Komintern beizutreten und Teil einer vereinten, weltweiten Arbeiterrevolution zu werden."
 SOV_Communism_for_the_Peasantry:0"Kommunismus für die Bauern"
 SOV_Communism_for_the_Peasantry_desc:0"Wir werden den Bauern der westlichen Kolonialmächte Marx und Trotzki beibringen. Die Arbeiter werden die Vorzüge des Kommunismus kennenlernen und schätzen lernen, und wenn sie schließlich befreit sind, werden sie sich unserer Komintern als Waffenbrüder anschließen."
 SOV_Afghan_Communism:0"Afghanischer Kommunismus"
 SOV_Afghan_Communism_desc:0"Die Grenzregion Afghanistans ist ein Bauernreich. Wir können nicht mit Despotismus, Faschismus oder anderen Formen der Versklavung koexistieren, insbesondere nicht an unserer eigenen Grenze! Wir müssen uns für jahrelanges Schweigen rehabilitieren und eine solche Arbeiterrevolution fördern. Was Despoten angeht, ist Mohammed Zahir Schah ein recht liberaler Mann und sollte einen relativ friedlichen Übergang ermöglichen."
 SOV_Bulgarian_Communism:0"Bulgarischer Kommunismus"
 SOV_Bulgarian_Communism_desc:0"Wir werden den bulgarischen Kommunisten bei der Befreiung ihres Volkes durch die Lehren von Marx und Trotzki helfen. Dies wird den bulgarischen Sowjets in der Komintern zweifellos gefallen."
 SOV_Support_Freedom:0"Unterstützen Sie die Freiheit"
 SOV_Support_Freedom_desc:0"Unsere ausländischen Agenten werden beginnen, demokratische Ideen in Ländern zu verbreiten, die von unterdrückerischen faschistischen Regimen regiert werden. Wir sind uns bewusst, dass es noch lange dauern wird, bis wir unser Arbeiterparadies mit allen Menschen der Welt teilen können. Wir werden uns darauf konzentrieren, sie Schritt für Schritt von der Unterdrückung zu befreien. Vielleicht gelingt es ihnen eines Tages, einen Sozialisten zu wählen und den Übergang zu beschleunigen."
 SOV_Walkback_Stance_on_Bureaucracy:0"Rückzieher in der Bürokratie"
 SOV_Walkback_Stance_on_Bureaucracy_desc:0"Trotzki beschloss, seine Kritiker weiter zu beschwichtigen, indem er seine Ansichten über die bürokratischen Zweige der Sowjetregierung revidierte. Trotzki wird der Öffentlichkeit verkünden, dass die Bürokratie in der UdSSR durchaus ihren Platz habe – nämlich den, den Bedürfnissen des Volkes zu dienen und den politischen Vertretern des Volkes Rechenschaft abzulegen."
 SOV_Government_Sponsored_Urbanization:0"Staatlich geförderte Urbanisierung"
 SOV_Government_Sponsored_Urbanization_desc:0"Wir werden den Bauernarbeitern dabei helfen, in die ausgedehnten Zentren der Ubran zu ziehen und sich der neuen sowjetischen Mittelschicht anzuschließen."
 SOV_A_Better_Union:0"Eine bessere Union"
 SOV_A_Better_Union_desc:0"Mit neuen öffentlichen Arbeitsbeschaffungsprogrammen läutete Trotzki erfolgreich eine neue Ära des sowjetischen Kommunismus ein. Die Ära Stalins ist nun endgültig vorbei. Die sowjetische Gesellschaft beginnt zur Normalität zurückzukehren, während die staatlichen Zusicherungen sowjetischer Stabilität und Prosperität die verunsicherten Gemüter beruhigen."
 SOV_Lenin_University:0"Lenin-Universität"
 SOV_Lenin_University_desc:0"Wir haben erhebliche Mittel in den Aufbau weiterer Hochschulen investiert – das Kronjuwel dieser Projekte ist die Lenin-Universität, die ihren treffenden Namen trägt. Sie entwickelt sich rasch zur besten und renommiertesten Hochschule der Sowjetunion."
 SOV_A_Liberal_Union:0"Eine liberale Union"
 SOV_A_Liberal_Union_desc:0"Wir werden versuchen, eine wirklich moderne Gesellschaft zu schaffen und sie durch die Modernisierung unserer Kultur effizienter zu machen. Wir werden nicht an archaischen Überzeugungen und Praktiken festhalten, die für eine primitive Zeit bestimmt waren."
 SOV_Meritocratic_Societies:0"Meritokratische Gesellschaften"
 SOV_Meritocratic_Societies_desc:0"Wir müssen die Entwicklung des intellektuellen Denkens in unserem Land fördern. Wir sollten Vereine und Organisationen unterstützen, die die Erweiterung des Geistes fördern und ihn zum Wohle unserer Union einsetzen. Wir müssen unser Land unseren besten und klügsten Köpfen überlassen, und wir werden sehen, welche Zukunft sie uns bringen werden."
 SOV_Soviet_Technocracy:0"Sowjetische Technokratie"
 SOV_Soviet_Technocracy_desc:0"Wir werden die zunehmende Verfeinerung unserer Bürokratie in allen technischen Belangen fördern, im allgemeinen Bemühen, eine technologisch fortgeschrittene Gesellschaft aufzubauen."
 SOV_Return_Of_The_Church:0"Rückkehr der Kirche"
 SOV_Return_Of_The_Church_desc:0"Die Unterdrückung der orthodoxen Kirche war ein Fehler. Die Stalinisten trieben diese Idee auf die Spitze, und Tausende starben und noch mehr litten. Wir werden die Präsenz der Kirche tolerieren und mit den Kirchenführern zusammenarbeiten, um ihre religiösen Lehren mit denen des trotzkistischen Kommunismus in Einklang zu bringen."
 SOV_Enlightenment_of_the_Masses:0"Aufklärung der Massen"
 SOV_Enlightenment_of_the_Masses_desc:0"Wir werden neue Bildungsinitiativen und Medienkanäle entwickeln, um die Bildung unserer Bevölkerung zu fördern."
 SOV_A_Free_Market_Of_Ideas:0"Ein freier Markt der Ideen"
 SOV_A_Free_Market_Of_Ideas_desc:0"Wir fördern freies Denken und rationale Debatten. Um eine möglichst effiziente Gesellschaft zu schaffen, müssen wir die effizientesten Mittel zur Problemlösung finden."
 SOV_Free_Love:0"Freie Liebe"
 SOV_Free_Love_desc:0"Wir werden unsere Gesellschaft weiter liberalisieren, indem wir alte soziale Regeln und Einschränkungen der Sexualität aufgeben. Menschen sollten die Möglichkeit haben, selbst Entscheidungen zu treffen, um wahres Glück zu erlangen. Diese neue Politik soll die Menschen glücklicher machen und sie hoffentlich produktiver machen."
 SOV_Support_Religion:0"Religion unterstützen"
 SOV_Support_Religion_desc:0"Die Kirche ist zu dem Schluss gekommen, dass die Lehren Christi nicht nur mit dem trotzkistischen Kommunismus vereinbar sind, sondern dass Trotzki möglicherweise von Gott gesandt wurde, um das sowjetische Volk zu retten. Vielleicht bietet die Kirche unserem Volk ja doch eine sinnvolle Lehre. Wir haben uns entschieden, unsere Politik der Religionsfeindlichkeit aufzugeben und sie stattdessen aktiv zu unterstützen."
 SOV_Chinese_Communism:0"Chinesischer Kommunismus"
 SOV_Chinese_Communism_desc:0"Wir werden Ressourcen investieren, um die chinesische Bauernschaft davon zu überzeugen, dass es an der Zeit ist, das korrupte nationalistische Regime, das sie versklavt hat, zu stürzen. Indem sie sich an die Lehren von Marx halten, können sie sich aus der wirtschaftlichen Knechtschaft befreien."
 SOV_Meddle_in_China:0"Einmischung in China"
 SOV_Meddle_in_China_desc:0"Wir werden die Unterstützung unserer Ideologie in China weiter verstärken und die Bauern aktiv dazu aufrufen, sich dem chinesischen kommunistischen Aufstand anzuschließen."
 SOV_Depose_Mao:0"Engere Bindungen"
 SOV_Depose_Mao_desc:0"Wir werden die Beziehungen zu den chinesischen Kommunisten verbessern. Wir werden jedoch deutlich machen, dass ihr derzeitiger Führer ein inakzeptabler Vertreter marxistischer Werte ist. Wir werden einen besseren Kandidaten vorschlagen, der die chinesischen Bauern aus der Dunkelheit in die Freiheit führt."
 SOV_Begin_A_Four_Year_Plan:0"Entwurf eines Vierjahresplans"
 SOV_Begin_A_Four_Year_Plan_desc:0"Trotzki forderte die Ausarbeitung eines neuen Wirtschaftsplans zur Stärkung der Wirtschaft und der Produktionskapazität der Sowjetunion. Als Stichtag hat er den heutigen Tag auf vier Jahre festgelegt."
 SOV_Finish_The_Four_Year_Plan:0"Den Vierjahresplan abschließen"
 SOV_Finish_The_Four_Year_Plan_desc:0"Trotzkis Plan für die industrielle und wirtschaftliche Entwicklung steht kurz vor der Vollendung. Ein kleiner politischer Anstoß genügt, um Trotzkis Zielvorgaben zu erreichen."
 SOV_A_New_Trotskyite_Vision:0"Eine neue trotzkistische Vision"
 SOV_A_New_Trotskyite_Vision_desc:0"Wir haben in der Sowjetunion – dem Beispiel Leo Trotzkis folgend – viel Großartiges geleistet. Doch Trotzki ist noch lange nicht am Ende. Er hat angekündigt, dass die Sowjetunion in den kommenden Tagen noch radikalere Veränderungen erleben wird. Leo Trotzki hat geschworen, dem sowjetischen Volk und seiner Revolution gerecht zu werden. Er hat angekündigt, dieses Versprechen nun einzulösen."
 SOV_A_Meritocratic_Nomenklatura:0"Eine meritokratische Nomenklatura"
 SOV_A_Meritocratic_Nomenklatura_desc:0"Wir werden dafür sorgen, dass immer mehr Politiker mit technischen Fähigkeiten und wissenschaftlicher Expertise besetzt werden. Wir brauchen die besten Wissenschaftler und Ingenieure, die an der Entwicklung neuer Technologien arbeiten und von ihren wissenschaftlichen Kollegen geleitet werden – natürlich mit der richtigen politischen Einstellung."
 SOV_A_Moral_Society:0"Eine moralische Gesellschaft"
 SOV_A_Moral_Society_desc:0"Wir werden den Weg des Lichts gehen und nur das Richtige tun. Wir werden uns im Kampf gegen die Korruption nicht korrumpieren lassen. Wir werden unseren Feind lieben und alles tun, um ihn von seiner Bosheit zu befreien. Nur wenn die Gedanken des Menschen rein sind, können seine Taten wahrhaft gerecht sein."
 SOV_A_Classless_Society:0"Eine klassenlose Gesellschaft"
 SOV_A_Classless_Society_desc:0"Wir werden nicht nur das Konzept der Klassenunterschiede abschaffen, sondern die gesamte Idee der sozialen Klasse. Kein Genosse darf anders behandelt werden als ein anderer Genosse."
 SOV_A_New_Age_Of_Soviet_Science:0"Ein neues Goldenes Zeitalter der sowjetischen Wissenschaft"
 SOV_A_New_Age_Of_Soviet_Science_desc:0"Durch die Investition erheblicher Ressourcen und die Entwicklung umfangreicher technischer und pädagogischer Infrastrukturen haben wir unserer wissenschaftlichen Gemeinschaft neuen Schwung verliehen, und im Gegenzug hat sie uns zahlreiche Durchbrüche beschert."
 SOV_Increased_Collectivism:0"Zunehmender sozialer Kollektivismus"
 SOV_Increased_Collectivism_desc:0"Wir sollten einander gerecht behandeln und die Idee einer landesweiten Familie entwickeln, einer Familie, der man vertrauen kann, dass sie diejenigen in der Gesellschaft schützt, die schwächer oder anfälliger für die Übel der Welt sind."
 SOV_Efficient_Collectivization:0"Effiziente Kollektivierung"
 SOV_Efficient_Collectivization_desc:0"Der Staat wird alle produzierten Ressourcen einsammeln und gleichmäßig an die Bevölkerung verteilen, sodass jeder die Möglichkeit hat, die gleiche Menge zu konsumieren. Es darf keine Diskriminierung oder Vorzugsbehandlung geben, denn dies wäre ein Verstoß gegen die wahre kommunistische Ideologie."
 SOV_Leon_Trotsky_Institute_of_Technology:0"Leo-Trotzki-Institut für Technologie"
 SOV_Leon_Trotsky_Institute_of_Technology_desc:0"Es ist Zeit, den Ausbau einer weiteren Universität abzuschließen. Das Technische Institut Leon Trotzki entwickelt sich zu einer der führenden Institutionen der Welt. Es ist das Kronjuwel des sowjetischen Hochschulsystems, und Wissenschaftler führender Institutionen aus aller Welt haben sich um die entsprechenden Stellen beworben."
 SOV_Reinforce_Traditional_Gender_Roles:0"Traditionelle Geschlechterrollen stärken"
 SOV_Reinforce_Traditional_Gender_Roles_desc:0"Unsere Gesellschaft kann nur dann effizient funktionieren, wenn Männer sich wie Männer und Frauen wie Frauen verhalten. Mit dem Übergang in die Moderne werden wir neue Werkzeuge und Spielzeuge nutzen, aber wir müssen die traditionelle Familienstruktur bewahren, die uns so lange geholfen hat."
 SOV_Factories_in_the_Fields:0"Fabriken auf den Feldern"
 SOV_Factories_in_the_Fields_desc:0"Zu lange konzentrierte sich die Entwicklung auf die Bourgeoisie Moskaus und anderer städtischer und kultureller Zentren der Sowjetunion. Es ist an der Zeit, den Reichtum zu verteilen und in den vielen entlegenen Regionen der Sowjetunion neue Industriezentren zu errichten."
 SOV_A_New_Feminism:0"Ein neuer Feminismus"
 SOV_A_New_Feminism_desc:0"Die Sowjetunion war ein Vorreiter in der Gleichbehandlung von Frauen und Männern in der Gesellschaft. Wir werden noch einen Schritt weitergehen und Frauen mehr Möglichkeiten und Ressourcen bieten, damit sie Positionen in der Gesellschaft einnehmen können, die ihnen historisch verwehrt waren. Die Sowjetunion soll eine gleiche Anzahl weiblicher und männlicher Führungskräfte haben."
 SOV_Military_Men:0"Militärmänner"
 SOV_Military_Men_desc:0"Wir müssen unsere traditionellen Werte um jeden Preis schützen. Viele in anderen Ländern wollen uns ausnutzen, unser Volk vergewaltigen und unser Land nehmen. Unsere Soldaten werden mit gutem Gewissen kämpfen, im Wissen, dass sie ihr Leben nicht nur für den Schutz ihrer Kinder, sondern für den Schutz aller Kinder der Sowjetunion geben."
 SOV_Decentralization_of_the_State:0"Dezentralisierung des Staates"
 SOV_Decentralization_of_the_State_desc:0"Die Machtkonzentration an einem geografischen Ort führt zwangsläufig zu Ungleichheit, da die Interessen einer Region im Vergleich zu denen der übrigen Sowjetunion überrepräsentiert sind. Um diese Ungleichheit zu beseitigen, werden wir die Regierung dezentralisieren und die Entscheidungsbefugnis einer Versammlung von Sowjets übertragen, die jeweils in ihrem Heimatbezirk ansässig sind."
 SOV_Maturation_of_Trotskyite_Communism:0"Reifung des trotzkistischen Kommunismus"
 SOV_Maturation_of_Trotskyite_Communism_desc:0"Trotzkis Reformen haben eine völlig andere Sowjetunion geschaffen. Die Menschen weltweit haben dieses Beispiel einer kommunistischen Utopie gesehen und werden unserem Beispiel folgen wollen. Trotzki hat deutlich gemacht, dass diese Revolution nicht durch das Feuer unaufhörlicher Kriege, sondern durch den menschlichen Wunsch nach einer besseren Welt vorangetrieben wird."
 SOV_International_Trotskyite_Communism:0"Internationaler trotzkistischer Kommunismus"
 SOV_International_Trotskyite_Communism_desc:0"Es ist an der Zeit, den Menschen weltweit die Vorteile von Freiheit und Gleichheit aufzuzeigen, die Trotzkis kommunistische Vision bietet. Wenn sie unsere Werte annehmen, werden sie vielleicht andere Regierungsformen ausprobieren – aber wir können geduldig sein und auf die letztendliche, unvermeidliche Sehnsucht nach vollständiger Arbeiterbefreiung warten, ob sie nun in diesem oder im nächsten Jahrzehnt kommt."
 
 
 
 SOV_Two_Year_Plan:0"Entwurf eines chinesischen Zweijahresplans"
 SOV_Two_Year_Plan_desc:0"Wir werden den chinesischen Kommunisten dabei helfen, ihren eigenen Plan zur industriellen Expansion zu entwickeln."
 SOV_Complete_Two_Year_Plan:0"Unterstützung bei der Fertigstellung des chinesischen Zweijahresplans"
 SOV_Complete_Two_Year_Plan_desc:0"Wir müssen den Chinesen dabei helfen, ihr Industrieentwicklungsprogramm abzuschließen, denn sie können es nicht allein beenden."
 SOV_Get_Rid_of_Mao:0"Mao absetzen"
 SOV_Get_Rid_of_Mao_desc:0"Wir müssen die Volksrepublik China vom Konterrevolutionär Mao Zedong befreien. Er ist ein starker Mann im stalinistischen Stil, aber weitaus destruktiver. Mao konzentriert seine Bemühungen auf den Aufbau seiner eigenen Pseudo-Dynastie und verhöhnt den Kampf der Arbeiter. Er muss gewaltsam entfernt werden. Wir haben die Unterstützung der wahren Kommunisten in China. Wir müssen jetzt handeln, bevor es zu spät ist!"
 SOV_Communist_Heartland:0"Kommunistisches Kernland"
 SOV_Communist_Heartland_desc:0"Es ist an der Zeit, die Erinnerung an Stalin auszulöschen, seine Stadt umzubenennen und sie in ein Zentrum des Trotzkismus zu verwandeln, so wie es der Rest der Sowjetunion ist. Trotzki wird ein neues Machtzentrum in der UdSSR aufbauen und gleichzeitig die Bedeutung Moskaus anerkennen, das, wie selbst Trotzki zugibt, unersetzlich ist."
 SOV_Trotskyite_Dominance:0"Politische trotzkistische Dominanz"
 SOV_Trotskyite_Dominance_desc:0"Trotzkis politische und militärische Erfolge haben ihm enorme politische Macht innerhalb des Sowjetstaates verliehen."
 
 
 SOV_Order_No_227:0"Bestellnummer 227"
 SOV_Order_No_227_desc:0"Kein Schagu! „Der Feind ... dringt tief in die Sowjetunion ein, erobert neue Gebiete, zerstört unsere Städte und Dörfer und vergewaltigt, plündert und tötet die sowjetische Bevölkerung ... Ein weiterer Rückzug bedeutet, uns selbst und gleichzeitig unser Vaterland zu vernichten ... Es ist Zeit, den Rückzug zu beenden. Keinen Schritt zurück! Das sollte jetzt unsere Hauptparole sein.“"
 SOV_Refuse_Detente:0"Entspannung ablehnen"
 SOV_Refuse_Detente_desc:0"Wir werden nicht mit Kapitalisten verhandeln. Wir sind zwar offen für die Möglichkeit einer Koexistenz mit den Demokratien des Westens, werden aber nicht mit ihnen zusammenarbeiten."
 SOV_Formation_of_a_Nuclear_Deterent:0"Eine nukleare Abschreckung"
 SOV_Formation_of_a_Nuclear_Deterent_desc:0"Wir werden den amerikanischen Atomwaffen unsere eigenen entgegensetzen. Wir werden der Welt klarmachen, dass die Sowjetunion nicht wehrlos ist, dass wir die Fähigkeit und den Willen haben, Atomwaffen einzusetzen, um uns und unser Vaterland zu verteidigen!"
 SOV_Missions_Over_The_Arctic_Circle:0"Missionen über dem Polarkreis"
 SOV_Missions_Over_The_Arctic_Circle_desc:0"Die sowjetische Luftwaffe hat über dem Polarkreis Übungen zur Vorbereitung auf einen möglichen Atomkrieg zwischen unserem Land und den Vereinigten Staaten durchgeführt. In diesem Fall hätten unsere Bomber die nötige Reichweite, um große amerikanische Städte zu erreichen."
 SOV_Warsaw_Pact:0"Warschauer Pakt"
 SOV_Warsaw_Pact_desc:0"Es ist Zeit für die Bildung einer neuen kommunistischen, antiwestlichen Allianz. Wir werden ein kollektives Verteidigungsabkommen schließen, in dem jedes Mitgliedsland schwört, jedem Mitgliedsland beizustehen, das von einem kriegführenden Staat angegriffen wird."
 
 
 
 
 
 
 
 SOV_Siberian_Industry:0"Sibirische Industrie"
 SOV_Siberian_Industry_desc:0""
 SOV_Move_Industry_Eastward:0"Industrie nach Osten verlagern"
 SOV_Move_Industry_Eastward_desc:0""
 SOV_Invest_in_Engineering:0"Investieren Sie in Engineering"
 SOV_Invest_in_Engineering_desc:0"Wir werden neue Ingenieurunternehmen gründen, die sich auf die Produktion moderner Militärausrüstung konzentrieren. Diese Unternehmen werden eine Vorreiterrolle bei der nationalen Verteidigung einnehmen."
 SOV_New_Soviet_Feminism:0"Neuer sowjetischer Feminismus"
 SOV_New_Soviet_Feminism_desc:0"Wir werden Frauen ermutigen, mehr zu sein als bloße Mütter und Hausfrauen. Von nun an werden sowjetische Frauen nicht nur genauso gebildet und geschätzt wie Männer, sondern sie werden auch immer mehr dieselben Aufgaben und Pflichten erfüllen wie ihre männlichen Kollegen."
 
 
 SOV_Escalate_the_Purge:0"Eskalieren Sie die Säuberung"
 SOV_Escalate_the_Purge_desc:0""
 
 SOV_Functional_Improvements:0"Funktionale militärische Verbesserungen"
 SOV_Functional_Improvements_desc:0""
 SOV_Expand_Red_Army_Prestige:0"Erhöhen Sie das Ansehen der Roten Armee"
 SOV_Expand_Red_Army_Prestige_desc:0""
 SOV_End_the_Cult_of_Personality:0"Beenden Sie den Personenkult"
 SOV_End_the_Cult_of_Personality_desc:0"Es ist an der Zeit, Stalins Personenkult zu beenden. Stalin war der Meinung, dass solch enorme Macht und Einfluss nicht in den Händen eines einzelnen Mannes liegen sollten. Stalin hat die kommunistische Flamme lange genug vor der Welt abgeschirmt. Nun ist es an der Zeit, sie mit der Welt zu teilen."
 SOV_Merits_of_Humanism:0"Verdienste des Humanismus"
 SOV_Merits_of_Humanism_desc:0"Wir werden dem Wohl der Arbeitnehmer in unserer Gewerkschaft Priorität einräumen und eine neue Interpretation des kommunistischen Utilitarismus fördern."
 SOV_Soviet_Cultural_Evolution:0"Sowjetische kulturelle Entwicklung"
 SOV_Soviet_Cultural_Evolution_desc:0"Wir werden einen Weg des kulturellen Wandels hin zu einem fortgeschritteneren Zustand einschlagen."
 SOV_Invest_in_Soviet_Science:0"Investieren Sie in die sowjetische Wissenschaft"
 SOV_Invest_in_Soviet_Science_desc:0"Wir werden in Forschung und Technologie investieren und dafür sorgen, dass unsere wissenschaftlichen Fähigkeiten ihre eigenen Früchte tragen."
 SOV_An_End_to_Warmongering:0"Schluss mit der Kriegstreiberei"
 SOV_An_End_to_Warmongering_desc:0"Um eine stabilere und wohlhabendere Union zu schaffen, ist es notwendig, der fast chauvinistischen Haltung unserer Propaganda und Medien ein Ende zu setzen."
 SOV_The_Soviet_Beacon:0"Das sowjetische Leuchtfeuer"
 SOV_The_Soviet_Beacon_desc:0"Wir werden ein kommunistisches Leuchtfeuer sein, dem die Welt folgen und nach dem sie streben kann. Die Welt wird uns um die kommunistische Utopie beneiden, die wir hier für uns aufgebaut haben."
 SOV_Forced_Urbanization:0"Erzwungene Urbanisierung"
 SOV_Forced_Urbanization_desc:0"Wir werden die Bauern zur Migration in die städtischen Zentren zwingen, während wir uns auf eine massive Expansion unserer Industrien vorbereiten."
 SOV_Industrial_Development:0"Industrielle Entwicklung"
 SOV_Industrial_Development_desc:0"Im Rahmen unserer neuen industriellen Bemühungen werden wir unser Augenmerk auf die Entwicklung besserer Methoden zur Massenproduktion lebenswichtiger Materialien richten."
 SOV_Industrial_Development_II:0"Industrielle Entwicklung II"
 SOV_Industrial_Development_II_desc:0"Im Rahmen unserer industriellen Offensive werden wir versuchen, revolutionäre Produktionsmethoden zu entwickeln, die in puncto Raffinesse weltweit führend sind."
 SOV_Industrial_Meddling:0"Industrielle Einmischung"
 SOV_Industrial_Meddling_desc:0"In seiner großen Weisheit wird Stalin persönlich in die laufenden Produktionslinien eingreifen, um die Effizienz zu verbessern und wichtige militärische Materialien herzustellen."
 SOV_French_Cooperation:0"Sowjetisch-französische Militärkooperation"
 SOV_French_Cooperation_desc:0"Wir werden eine allgemeine militärische Zusammenarbeit und Koordination mit den Franzosen einleiten und dazu eine Reihe von Militärübungen durchführen, die der Steigerung der militärischen Effizienz und Effektivität dienen. Mit der Zeit wird sich die Koordination unserer Streitkräfte in einem taktischen Vorteil gegenüber dem gemeinsamen Gegner niederschlagen."
 SOV_Replace_The_Alliance_System:0"Ersetzen Sie das Allianzsystem"
 SOV_Replace_The_Alliance_System_desc:0"Wir werden in Europa ein neues Instrument zur Eindämmung der deutschen Aggression schaffen. Dieser neue Mechanismus wird den Namen „Pakt von Marseille“ tragen. Gemeinsam mit unseren französischen Freunden werden wir diese Nazibestie in Mitteleuropa eindämmen und uns verpflichten, jedes europäische Land zu verteidigen, das in einem Konflikt mit Deutschland unsere Unterstützung in Anspruch nimmt."
 SOV_Western_Claims:0"Westliche Ansprüche"
 SOV_Western_Claims_desc:0"Es ist an der Zeit, das Land zurückzufordern, das uns nach dem Ersten Weltkrieg zu Unrecht genommen wurde. Ländereien, die jahrhundertelang vom Russischen Reich kontrolliert wurden, wurden nach diesem Konflikt an Polen und Rumänien verschenkt. Jetzt sind wir hier, um das zurückzufordern, was uns rechtmäßig zusteht."
 SOV_Formalize_an_Alliance:0"Formalisieren Sie eine Allianz"
 SOV_Formalize_an_Alliance_desc:0"Wir werden ein Bündnis mit den Westmächten formalisieren, um die gefährliche Bedrohung durch den deutschen Expansionismus einzudämmen. Auch wenn die Lage zwischen uns wahrscheinlich angespannt sein wird, sind die westlichen Kapitalisten wahrscheinlich das kleinere Übel."
 SOV_Expand_the_Soviet_Officer_Corps:0"Erweitern Sie das sowjetische Offizierskorps"
 SOV_Expand_the_Soviet_Officer_Corps_desc:0"Wir werden unser Militär der Ausbildung kluger, junger Offiziere widmen, die unsere bolschewistischen Streitkräfte in jedem Konflikt, der uns aufgezwungen werden könnte, zum Sieg führen werden. Für Stalin!"
 SOV_Expand_the_NKVD:0"Erweitern Sie den NKWD"
 SOV_Expand_the_NKVD_desc:0"Wir werden den NKWD über seine Spionage- und Grenzschutzfunktion hinaus ausbauen und ihn aktiver an der Verteidigung des Kommunismus in Kriegszeiten beteiligen. Dazu müssen wir sicherstellen, dass er weiterhin so funktioniert wie während der Säuberungen. Konterrevolutionäre werden aufgespürt und vor Gericht gestellt. Mit diesen Methoden werden wir unsere Rote Armee und die gesamte sowjetische Gesellschaft unter Kontrolle halten."
 SOV_Victory_in_Europe:0"Sieg in Europa"
 SOV_Victory_in_Europe_desc:0"Mit dem Herannahen unseres wohlverdienten Sieges über die westlichen Imperialisten ist es an der Zeit, die Wunden zu heilen, die unserer Union zugefügt wurden, und aus dieser Erfahrung zu lernen, damit sich ein derartiger schrecklicher Konflikt nie wieder ereignet!"
 
