 SOV_sp_prog_decrease_spending_tt:0"§YVerringerung§! Ausgaben"
 cw_sov.1.t:0"Berichte des Weltraumprogramms"
 cw_sov.1.d:0"Die neuesten Berichte zu unserem Raumfahrtprogramm sind eingetroffen. Unsere Wissenschaftler machen große Fortschritte, und auch unser Kosmonauten-Trainingsprogramm ist recht effizient. Wir könnten bald unsere Überlegenheit im Weltraum unter Beweis stellen! Doch zunächst müssen wir dem Programm ein Budget zuweisen, um die Arbeit fortzusetzen und die Dynamik aufrechtzuerhalten. Was sollen wir mit dem Budget tun?"
 cw_sov.1.a:0"Ausgaben erhöhen"
 cw_sov.1.b:0"Das aktuelle Budget einhalten"
 cw_sov.1.c:0"Wir haben größere Probleme ..."
 cw_sov.6.t:0"N1-Rakete versagt"
 cw_sov.6.d:0"Berichten zufolge hat unsere Mondrakete N1 die Qualifikationstests nicht bestanden. Wenige Sekunden nach dem Start setzte ein Raketentriebwerk aus, was zu Schwingungen in der Struktur führte. Der integrierte Computer schaltete alle Triebwerke ab, um weitere Schäden zu verhindern. Die Rakete fiel daraufhin auf die Startrampe zurück, wo sie in tausend Stücke zerbrach. Dies ist ein Rückschlag für unser Mondprogramm, da wir das Problem so schnell wie möglich finden und beheben müssen, wenn wir unser Tempo beibehalten wollen." 
 cw_sov.6.a:0"Solch eine komplizierte Maschine"
 cw_sov.7.t:0"N1-Rakete hebt ab"
 cw_sov.7.d:0"Unser herausragendes Stück Technologie, die N1-Mondrakete, ist heute gestartet. Diese Rakete, die einen Kosmonauten zum Mond bringen soll, wurde zu einer Testkampagne gestartet, um die große Reise vorzubereiten. Der Start scheint erfolgreich gewesen zu sein. Die Rakete umkreist nun die Erde und wird in wenigen Stunden ihr Triebwerk zünden, um sie zum Mond zu bringen. Im nächsten Schritt wird ein sowjetischer Kosmonaut auf die Rakete gesetzt, um ihn zum Mond zu bringen."
 cw_sov.7.a:0"Ein weiterer Sieg!"
 cw_sov.13.t:0"Tito ermordet"
 cw_sov.13.d:0"Unser Plan gegen den Anführer von [YUG.GetName] war erfolgreich. Unsere Agenten melden Titos Tod. Er wurde heute Nacht im Schlaf getötet. Seine Wachen entdeckten seine Leiche in seinen blutverschmierten Bettlaken. Wir sollten nun die Instabilität nutzen können, um eine neue Regierung einzusetzen."
 cw_sov.13.a:0"Gründung der Balkanunion"
 cw_sov.13.b:0"Lassen Sie sie ihren Anführer wählen"
 Vasily_Stalin_desc:0"Als Sohn Stalins verbrachte Wassili seine Kindheit mit Wachen und Soldaten."
