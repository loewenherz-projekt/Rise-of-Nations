ENG.2.t:0 "Aufruhr an der Universität Cambridge"
ENG.2.d:0 "Was als einfacher Akt des Vandalismus in einem Pub in Cambridge begann, hat sich zu einem nationalen Vorfall innerhalb der britischen Union entwickelt, der rasch außer Kontrolle gerät! Nach der Festnahme zweier Studenten der lokalen Organisation „Youth for Workplace Democracy“ wegen Sachbeschädigung kam es heute Morgen zu massiven Protesten an der Universität Cambridge. Die Studentenschaft forderte die sofortige Freilassung der beiden Studenten, mehr Meinungsfreiheit und mehr Demokratie in Bildung und Beruf und unterstützte ihre Forderungen mit fast überwältigender Mehrheit. Bereitschaftspolizei, unterstützt von Einheiten der Revolutionsgarde, traf gegen 10 Uhr ein, um die Menge zu zerstreuen. Diese Bemühungen haben die Lage jedoch nur noch schlimmer gemacht: Proteste werden zu Krawallen, Straßen werden gesperrt, und Geschichten über blutige Nasen und höhnische Rufe dringen bis in die Stadt. Die Behörden bereiten verschärfte Maßnahmen vor, und die Nation schaut mit müden Augen zu. Könnte dies ein denkwürdiger Moment sein? "
ENG.2.a:0 "Die Jugend von heute!"
ENG.3.t:0 "Die englischen Sozialisten unterstützen die Demonstranten"
ENG.3.d:0 "Die britische Regierung ist in eine politische Katastrophe geraten! Nach den gescheiterten Verhandlungen haben führende Vertreter der englisch-sozialistischen Fraktion ihren allgemeinen Austritt aus dem Gewerkschaftskongress erklärt.\n\nDie Fraktionsvertreter kritisierten vor allem das anhaltende gewaltsame Vorgehen gegen protestierende Studenten und Arbeiter in Städten Nordenglands. Nun stehen sowohl Gewerkschaftsmitglieder als auch Gewerkschaftsvertreter selbst an denselben Barrikaden in Städten wie Cambridge.\n\n Das Vertrauen in die Regierung und den Vorsitzenden ist irreparabel beschädigt, und der TUC muss nun die Lücke füllen, die der Verlust einer Säule der britischen Politik hinterlassen hat. Viele fragen sich, ob die Situation weiter eskalieren könnte, sollte die Regierung gegen die ausgetretenen Gewerkschaften vorgehen."
ENG.3.a:0 "Verhaften Sie alle ihre Anführer"
ENG.3.b:0 "Wir können es nicht riskieren"
ENG.4.t:0 "Arbeiterrevolutionsrat von Großbritannien"
ENG.4.d:0 "Die Lage in der Britischen Union ist in barbarische Zustände abgeglitten, die auf die gescheiterte Verhandlungsrunde mit anhaltenden Streiks, Niederschlagungen und Unruhen zurückzuführen sind! Angesichts des Versagens der Regierung, die Situation zu lösen, haben Studenten und Gewerkschaftsvertreter von einer gewaltsamen Revolution Abstand genommen und in Birmingham eine neue Regierung ausgerufen: den Workers Revolutionary Council. Obwohl dieser offiziell nur dazu dient, die Aktionen der Demonstranten zu koordinieren, hegen nur wenige Illusionen, dass dieses Gremium mehr als eine Doppelherrschaft ist, die Londons Autorität in Frage stellt. Gewaltsame Kämpfe mit Einheiten der Revolutionsgarde und der Polizei sind bereits ausgebrochen, und die Stadt Birmingham hat sich faktisch aus der Union abgespalten. Vorwürfe russischer Sabotage, Tyrannei durch den Vorsitzenden und parteiischer Repressalien sind allgegenwärtig. Die Britischen Inseln warten mit angehaltenem Atem, umgeben von Festungen aus umgestürzten Autos und Straßenbarrikaden."
ENG.4.a:0 "Wir müssen die Verhandlungen wieder aufnehmen, bevor es schlimmer wird"
ENG.4.b:0 "Zerstöre sie jetzt!"
ENG.5.t:0 "Der große nationale Streik"
ENG.5.d:0 "Heute schreibt das britische Volk Geschichte. Seit Monaten beobachtet die Welt, wie sich die „britische Situation“ immer weiter zuspitzt. Heute hat sie ihren Höhepunkt erreicht. Heftige Straßenschlachten und gescheiterte Verhandlungen mündeten in einem massiven „Generalstreik in ganz Großbritannien“, der die gesamte Wirtschaft zum Stillstand brachte. Arbeiter, Bürokraten und Studenten skandieren gemeinsam von London bis Glasgow, und überall weht die rote Fahne. Darüber hinaus drucken ausländische und einige inländische Druckereien unterstützen die Bewegung. Viele ziehen nervöse Vergleiche mit der Revolution von 1925, und es scheint, als sei die Regierung Mosley praktisch tot. Eine neue Ära beginnt mit Sicherheit bald …"
ENG.5.a:0 "England, du bist zu grausam"
ENG.5.b:0 "Erhebt euch, ihr Arbeiter!"
ENG.5.c:0 "Das reicht!"
ENG.7.t:0 "Die englische Revolution"
ENG.7.d:0 "Das Chaos, das die Britische Union so lange im Würgegriff hatte, ist zu Ende. Im ganzen Land vergossen Millionen Tränen, und weitere Millionen jubeln. Oswald Mosley, der große Beschützer der Britischen Union, Retter der Revolution, Terrorist der Nacht und schwarzes Schaf des sozialistischen Lagers, ist nicht mehr. Angesichts einer lahmgelegten Wirtschaft und einer Bevölkerung am Rande eines Bürgerkriegs gab der Vorsitzende schließlich nach. Mosley trat von seinem Posten zurück und nahm sein gesamtes Kabinett mit.\n\nMit dem Ende der sogenannten „Zweiten Glorreichen Revolution“ brach sofort ein Machtkampf zwischen radikaleren Linken aus Birmingham und den englischen sozialistischen Milizen aus.\n\nBündnisse wurden geschlossen und wieder gebrochen, wilde Schießereien endeten sporadisch in Blutvergießen, und es kam zu zahlreichen Verhaftungen. Als sich der Staub gelegt hat, steht der Sieger fest. Die englischen Sozialisten haben die Kontrolle über die Britische Union übernommen. Trotz der vergeblichen Versuche radikaler Kräfte, das englische Volk zur Abkehr von seiner eigenen Identität zu zwingen, haben die englischen Sozialisten gesiegt. Die Seele Englands ist unangetastet geblieben, und der einzigartige Charakter der britischen Revolution ist erhalten geblieben. Minister Blair verspricht Vernunft, Stabilität und ein Ende der Mosley-Kleptokratie. Würde er es selbst erleben, wäre er von diesem Ausgang sicherlich ermutigt."
ENG.7.a:0 "Die lange, lange Nacht ist vorbei"
ENG.6.t:0 "Die WRC übernahm die Regierung"
ENG.6.d:0 "Das Chaos, das die Britische Union so lange erdrückte, hat ein Ende. Im ganzen Land vergießen Millionen Tränen, und Millionen weitere jubeln. Oswald Mosley, der große Beschützer der Britischen Union, Retter der Revolution, Schrecken der Nacht und schwarzes Schaf des sozialistischen Blocks, ist nicht mehr. Angesichts einer lahmgelegten Wirtschaft und einer Bevölkerung am Rande eines Bürgerkriegs gab der Vorsitzende schließlich nach. Mosley trat von seinem Posten zurück und nahm sein gesamtes Kabinett mit.\n\nNach dem Ende der international als „Zweite Revolution“ bezeichneten Revolution unternahmen Vertreter der englischen sozialistischen Fraktion rasche Schritte, um Macht und Stabilität zu sichern. Diese Maßnahmen erwiesen sich jedoch schnell als wirkungslos, da sich herausstellte, dass der Pöbel nicht bereit war, auch nur die geringsten Überreste der alten Ordnung zu akzeptieren.\n\nSo schritt die in Birmingham gebildete Gegenregierung, der „Workers Revolutionary Council“, ein, um das Vakuum mit ihrer Miliz zu füllen. Mit dem Versprechen, „zu vollenden, was 1925 begonnen wurde“, scheint eine wahre proletarische Revolution im Gange zu sein, die alle Überreste der bürgerlichen Gesellschaft niederreißt. Endlich wird der britische Arbeiter sein Schicksal selbst in die Hand nehmen! Endlich leuchtet die Fackel der Freiheit hell über Großbritannien!"
ENG.6.a:0 "Proletarier aller Länder, vereinigt euch!"
Uob.1.t:0 "Neuer Britannien-Plan"
Uob.1.d:0 "Captain Nicholas Mosley, die Republikanische Armee spricht jetzt!\n\n&quot;Liebe Kameraden, liebe Soldaten und alle Bürger, heute ist ein historischer Tag für unser Land. Die Feierlichkeiten zu unserem jüngsten Bürgerfest, die Wahl zum Industriekongress, sind gerade vorbei, und wir sind bereit, unser Staatsschiff in eine neue Richtung zu lenken. Diese Richtung wurde durch den Willen der Nation bei den Wahlen in den Fabriken Großbritanniens deutlich gemacht. Das britische Volk steht hinter seinem Traum, dem Traum, den mein Vater in den schicksalshaften Tagen des Jahres 1937 formulierte: einem glorreichen und freien Großbritannien, befreit von den Fesseln der Armut und Angst. Mein Vater hat euch versprochen: Gewinnt den Krieg, und die Welt gehört uns. Doch das Volk war damals nicht bereit, der Krieg forderte noch immer seinen Tribut, und wir haben unsere Chance verpasst, sein Feuer in eine neue Revolution umzuwandeln. Der Genosse Vorsitzender hat die Stimmen des Volkes gehört, und wir haben gewartet, aber jetzt, jetzt ist die Stunde und jetzt ist die Zeit. Wir, die Soldaten, die heldenhaften Arbeiter, können nicht länger warten. Bevor das Feuer unserer einmaligen Gelegenheit zur nationalen Mobilisierung vergeht, rufe ich die Minister des Staates, die Beamten, die ruhmreichen Arbeiter und Bauern, unsere Waffenbrüder, die weiterhin in ganz Europa ihre ehrenvolle internationalistische Pflicht erfüllen, auf: Vereinigt euch! Vereinigt euch! Lasst uns als Kreuzzugsregimenter vorwärts schreiten, bewaffnet mit dem glühenden Geist, dass auf Erden für immer Gerechtigkeit herrschen möge!“"
Uob.1.a:0 "Ruhm für Neubritannien, Ruhm für seine Helden"
Uob.2.t:0 "Eine Nation aus Kohle und Stahl" 
Uob.2.d:0 "Als in unserer großen Nation die ersten Maschinen zum Dreschen von Weizen und Baumwolle gebaut wurden, brach ein neues Zeitalter an. Die alte Tradition einfacher, langsamer Produktion in malerischen Dörfern verschlafener Nationen, angeführt von märchenhaft reichen Monarchen, die sich bewusst von der breiten Masse abgrenzten, war dahin. Fabriken, in denen die Produkte eines neuen Maschinenzeitalters hergestellt wurden, erblühten wie Blumen in unserem Land. Diese Fabriken brauchten Brennstoff, deshalb wurden tiefe Minen in den Schoß der Erde gegraben, um Kohle aus ihren Tiefen zu holen. \n\nViel Blut, viele Tränen, große und kleine Glieder und immer wieder große Ströme von Schweiß wurden vergossen, damit Großbritannien in das moderne, merkantile Zeitalter vordringen konnte. Ein großes Imperium wurde auf mechanischen Grundlagen errichtet. Natürlich überdauerte dieses Zeitalter seine Zeit, und schließlich, nach Kriegen, die sein Überleben sicherten, wurde Großbritannien zu Recht und glorreich rot angestrichen.\n\nSeit der Revolution ist Großbritannien immer stärker industrialisiert. Um den Verlust des Empires auszugleichen, wurden große Fabriken errichtet, die zum Nettoexporteur von Industriegütern für die Sozialistischen Republiken Europas und nach dem Zweiten Weltkrieg für ganz Westeuropa wurden. Der Zweite Weltkrieg führte auch zu einem starken Wachstum der britischen Industrie auf militärischer Ebene, wobei die britischen Rüstungsgüter zur zentralen Angriffslinie antireaktionärer Rebellen weltweit wurden. Unsere Kohle versorgt Europa mit Energie und zeigt die Macht des Sozialismus sogar aus dem Weltraum!"
Uob.2.a:0 "Wir haben viel, worauf wir stolz sein können"
Uob.3.t:0 "Englische Lebensart" 
Uob.3.d:0 "Die Union und der illegitime Staat vor ihr haben ihre Macht immer aus der Einheit bezogen. Die Union wurde auf der Grundlage von Einheit und Arbeit gegründet, das ist die englische Lebensweise. "
Uob.3.a:0 "Der englische Lebensstil ist der beste Lebensstil"
Uob.4.t:0 "Die Felder Großbritanniens" 
Uob.4.d:0 "Trotz der Industrialisierung Großbritanniens ist unser Nationalbewusstsein noch immer von den Grafschaften und Feldern dieses Landes geprägt – vom hügeligen Norden bis zu den flachen, schilfbewachsenen Landschaften Cornwalls. Während der Amtszeit von Vorsitzendem Mosley sprachen viele staatlich geförderte Dichter skurril über das große grüne Land, das zunehmend zugunsten der aufstrebenden Industrie zurückgedrängt wurde. Die Landbevölkerung wurde als Hinterwäldler abgetan, als Relikte einer vergangenen Ära, während die großen historischen Wahrzeichen des Landes verstaubten und in Vergessenheit gerieten. \n\nDamit ist Schluss! Vorsitzender Mosley und seine Regierung haben gemeinsam beschlossen, den ländlichen Gebieten des Landes deutlich mehr Aufmerksamkeit zu schenken. *Echte* Aufmerksamkeit, nicht nur ein paar lyrische Dichter oder symbolische Angebote. Landwirte sollen neue Subventionen erhalten, sterbende Gemeinden sollen die seit langem so dringend benötigten wirtschaftlichen Stärkungsmittel erhalten, während die Rückführung ländlicher Gebiete gefördert wird. \n\nAuch die allgemeine Bevölkerung außerhalb des ländlichen Raums soll in dieses Bestreben einbezogen werden. Landwirtschaftliche Entwürfe werden seit Jahren vorgeschlagen und als gute altmodische Methode angepriesen, der Jugend harte Arbeit beizubringen und den „Stadtmenschen“ die Erde ihrer Vorfahren näherzubringen."
Uob.4.a:0 "Scheint ziemlich gut zu sein!"
Uob.5.t:0 "Auf dem Weg zur Nahrungsmittelautarkie" 
Uob.5.d:0 "Damit die Union stark bleibt, müssen wir uns manchmal auf andere verlassen, aber bei einer so wichtigen Ressource wie Weizen und Getreide sollten wir in der Lage sein, uns selbst zu behaupten. Wir werden die Union in Richtung Nahrungsmittelautarkie bewegen."
Uob.5.a:0 "Die Gewerkschaft steht stark"
Uob.6.t:0 "Britisches Eisenbahnkollektiv" 
Uob.6.d:0 "Seit wir die Eisenbahn erfunden haben, konnten wir die Versorgungsketten unseres Landes dicht und funktionsfähig halten. Ohne die Eisenbahn könnten unsere Züge jedoch nirgendwo hinfahren. Wir müssen unsere Eisenbahnen wieder aufbauen und unsere Bahnlinien fertigstellen. Wir werden unsere Gleise und unsere Nation wieder aufbauen!"
Uob.6.a:0 "Gleise müssen gebaut werden"
Uob.7.t:0 "Eine nationale Bourgeoisie" 
Uob.7.d:0 "Die Wirtschaft der Britischen Union basierte lange Zeit auf den ökonomischen Prinzipien des Syndikalismus, einem sozialistischen Zweig, der auf Gewerkschaften und Genossenschaften basierte. Vorsitzender Mosley, der lange Zeit die dominierende Strömung der sozialen und wirtschaftlichen Entwicklung war, begann im Laufe seiner Amtszeit, sich gegen dieses Modell zu wenden und die Wirtschaftsorgane in seinen neuen und reformierten Ministerien zu zentralisieren. Dieser Schritt hat sich immer wieder als richtig erwiesen – von den Bedürfnissen der Massenmobilisierung im Zweiten Weltkrieg über die Wiederaufbauinitiativen nach dem Krieg bis hin zu den Bedürfnissen ganz Europas. Heute ist die europäische Wirtschaft noch gieriger und „bedürftiger“ geworden, da sie sich größtenteils von den Härten der Kriegsjahre erholt. Da Großbritannien zum industriellen Kernland der sozialistischen Ordnung in Europa wird, erfordert die Verantwortung der sozialistischen Volkswirtschaften, dass wir kreativ werden und vielleicht einige Orthodoxien aufbrechen. Daher haben Vorsitzender Mosley und seine Verbündeten einen grundlegenden Plan ausgearbeitet, um die Wirtschaft zu erneuern und so den neuen Anforderungen gerecht zu werden und unsere eigene wirtschaftliche Entwicklung zu fördern. Der Plan, offiziell als „Wirtschaftsentwicklungsinitiative von 1952“ bekannt, sieht die Wiedereinführung einiger marktwirtschaftlicher Aspekte in unsere Volkswirtschaften sowie die Schaffung einer kontrollierten Klasse der „Nationalen Bourgeoisie“ vor, die diese Veränderungen überwachen soll. Daher wird dieser Plan umgangssprachlich auch als „Plan der Nationalen Bourgeoisie“ bezeichnet. Natürlich wird keine dieser Reformen die grundlegenden Aspekte des sozialistischen Staates verändern, und diese neue Klasse wird stets den arbeitenden Männern und Frauen Großbritanniens gegenüber rechenschaftspflichtig sein."
Uob.7.a:0 "Zum Wohle Großbritanniens"
Uob.8.t:0 "Sozialismus der Mittelklasse" 
Uob.8.d:0 "Im Laufe der Jahre, in denen wir Frieden hatten, begann die Mittelschicht zu wachsen. Damit werden auch unsere Industrie und unsere Bevölkerung wachsen. Die Union ist ein Zufluchtsort für die Mittelschicht."
Uob.8.a:0 "Okay"
Uob.9.t:0 "Immer mit der Ruhe" 
Uob.9.d:0 "Der Neubritannien-Plan des Genossen Großprotektors Mosley ist offiziell in sein sechzehntes Jahr eingetreten; und was für glorreiche Jahre das waren! Seit der frühen Revolutionszeit hat sich so viel verbessert. Unsere Industrie hat ein Wachstum erreicht, von dem man im Kapitalismus nicht einmal zu träumen gewagt hätte, und das selbst die größten Befürworter der Industrialisierung in der sozialistischen Welt schockierte. Unsere Landwirtschaft hat begonnen, sich zu ordnen, und Genossenschaften und privater Landbesitz werden von Jahr zu Jahr produktiver.\n\nAuch kulturell hat sich unsere Nation verbessert. Der durchschnittliche Brite kann Shakespeare und andere berühmte Dramatiker auswendig zitieren, während staatlich finanzierte Schauspieltruppen das Land durchziehen. Restaurants servieren aufwendige Gerichte mit einfachen Zutaten, die direkt von unseren Inseln stammen. "
Uob.9.a:0 "Nach vorne!"
ENG.9.t:0 "Der Tod von Eric Blair"
ENG.9.d:0 "Die Nacht war lang und anstrengend gewesen, voller Hustenanfälle und Streitereien über die richtige Teezubereitung. Es war eine Kakophonie aus Bedauern, Geschrei und Nachdenken gewesen, und letzten Endes: Liebe Grüße! Eric war immer wieder bewusstlos, ein schiefes Lächeln lag auf seinem Gesicht. Passiv beobachtete er die Menge aus Freunden und Familie, die vor ihm im Raum umhertanzten. Nach all seinen Jahren als Pfarrer, mitten in hitzigen Debatten, hätte er es nicht anders gewollt. Erst gegen 4 Uhr morgens, als der Pöbel endlich verstummte, richteten sich alle Augen auf Blair. Er räusperte sich, und ein leises Krächzen entfuhr seinen Lippen. Als die Morgenvögel auf den grünen Hügeln zu zwitschern begannen, fiel Eric Blair schließlich in einen tiefen Schlaf. Leises Schluchzen erfüllte den Raum, nur unterbrochen von ein paar stoischen Freunden aus dem Gottesdienst. Obwohl er nicht auf den Inseln geboren war, empfand Blair grenzenlose Liebe zu England. Am Ende erwiderte England seine Gunst. Er hauchte seinen letzten Atemzug aus und sein Körper erschlaffte. So endete eine Ära."
ENG.9.a:0 "England wird einen treuen Sohn vermissen."
ENG.10.a:0 "England erwartet seine Sieger"
ENG.11.t:0 "Die Wahlen beginnen!"
ENG.11.d:0 "Wieder einmal nehmen die Briten an der heiligen Tradition demokratischer Wahlen teil. Kandidaten zahlreicher Fraktionen buhlen um die Gunst der Bevölkerung und versprechen alles Mögliche, von besseren Straßen bis hin zu weniger Regulierung in der Landwirtschaft. Drei Hauptfraktionen haben sich herausgebildet: die National Labour-Anhänger, die Maximalisten und die Englischen Sozialisten. Jede von ihnen hat ihre eigenen Ideen, wie die Union verbessert und die Position des Durchschnittsbriten gestärkt werden kann. National Labour ist eine Fraktion gemäßigter Labour-Anhänger, die nach dem Scheitern von Mosleys Machtteilungspakt 1937 nur noch ein Juniorpartner war. Diese Fraktion unterstützt wirtschaftliche Liberalisierung, weniger staatliche Eingriffe und freiere Märkte. Gerüchten zufolge wäre ein Wahlsieg von 1950 jedoch sicherlich kein Sieg, der auf der Popularität von National Labour beruhte, sondern würde erneut ein Kabinett bilden, das hauptsächlich aus Ja-Sagern Mosleys besteht. Die Englischen Sozialisten sind weder zu radikal noch zu gemäßigt, rufen aber dennoch zu einer eigenen Revolution auf, inspiriert von einer patriotischen und romantischen Vision des englischen Lebensstils. Diese Fraktion priorisiert die landwirtschaftliche Entwicklung, da sie als Maßstab für Englands Nahrungsmittelabhängigkeit dient. Ein weiterer Punkt ist ihre völlige Ablehnung des Pazifismus. Diese Fraktion befürwortet eine schnelle Aufrüstung zur britischen Landesverteidigung und Machtdemonstration. Obwohl diese Fraktion Mosley in vielerlei Hinsicht unterstützt, bekennt sie sich größtenteils zu den Prinzipien der Demokratie. Es gab jedoch Zweifel, dass nach ihrem Wahlsieg in Mosleys Demokratie nur ein gemäßigtes Kabinett mit weniger einflussreichen Stimmen, allen voran ein gewisser Hugh Dalton, die Macht übernehmen könnte.\n\nDie Mosleyiten unterstützen die klare, wenn auch höchst unorthodoxe und repressive Vision des „Großprotektors“ für England. Diese Fraktion vertritt Mosleys persönlichen Versuch, an der Macht zu bleiben, und ist ein wahrscheinlicher Gewinner jeder kommenden Wahl. Sollte der Vorsitzende erneut gewinnen, wird erwartet, dass er seine Kontrolle weiter festigen wird."
ENG.11.a:0 "Nationale Labour-Anhänger"
ENG.11.b:0 "Maximalisten"
ENG.11.c:0 "Englische Sozialisten"
ENG.12.t:0 "Nationale Labour-Partei gewinnt Wahl"
ENG.12.d:0 "Die britischen Wahlen haben ein schockierendes Ergebnis gebracht. Die Labour-Fraktion hat mit knapper Mehrheit die Wahl gewonnen. Sie vertritt eine gemäßigte Linie und versucht, Mosleys Politik „vernünftig“ und „maßvoll“ zu halten, ohne in Fanatismus zu verfallen. Kurioserweise fordern sie auch eine Rücknahme der Wirtschaftspolitik der Mosley-Anhänger, eine Position, die sie in der britischen Öffentlichkeit sicherlich nicht sofort beliebt gemacht hat. Großprotektor Mosley lobte in Erklärungen die reibungslose Wahl und die neu gewählten Abgeordneten und erklärte: „Ihre Ehrlichkeit und Gewissenhaftigkeit angesichts der Opposition ist genau das, was Großbritannien jetzt braucht.“ Unterdessen lobte Labour-Chef Malcolm MacDonald die Opposition für ihren „guten Kampf“. Da sie trotz ihrer offensichtlichen Abhängigkeit und Unterwürfigkeit gegenüber Mosley konzeptionell eher gegen Mosley eingestellt sind, bleibt abzuwarten, wie sie mit der derzeitigen Mosley-Regierung zusammenarbeiten werden."
ENG.12.a:0 "Das sollte nicht passieren – ich meine, herzlichen Glückwunsch!"
ENG.13.t:0 "Maximalisten gewinnen Wahlen!"
ENG.13.d:0 "In einem Ergebnis, das absolut niemanden überrascht, ging die Fraktion um Großprotektor Oswald Molsey als Sieger aus den jüngsten Wahlen in der Britischen Union hervor. Als überzeugte Anhänger der Doktrinen des Maximalismus und Totalitarismus haben die Maximalisten geschworen, Mosleys Politik und Ideale um jeden Preis fortzuführen. Großprotektor Mosley lobte in Erklärungen den reibungslosen Wahlverlauf und die neu gewählten Abgeordneten und erklärte: „Ihr Engagement und ihre Standhaftigkeit angesichts der Opposition sind genau das, was Großbritannien jetzt braucht.“ Die Maximalisten selbst lobten derweil den „guten Kampf“ ihrer Opposition. Als überzeugte Anhänger von Mosleys Idealen werden die Maximalisten in den Augen des derzeitigen Regimes hervorragende Steuermänner sein und die glorreiche Revolution und ihre Politik fortführen."
ENG.13.a:0 "Glückwunsch!"
ENG.14.t:0 "Englische Sozialisten gewinnen die Wahlen!"
ENG.14.d:0 "Die Wahlen haben ein etwas überraschendes Ergebnis gebracht. Die sogenannten „Englischen Sozialisten“ haben mit einem recht komfortablen Vorsprung die Wahl gewonnen. Als Romantiker lehnen sie den Einfluss des französischen Marxismus ab und glauben an das Ideal eines sozialistischen Englands mit einem einzigartigen englischen Sozialismus. Sie stehen Mosley in keiner Weise ablehnend gegenüber, sind auch keine sklavischen Maximalisten und könnten Mosley in einigen wichtigen Fragen widersprechen. Großprotektor Mosley hat Erklärungen veröffentlicht, in denen er den reibungslosen Wahlverlauf und die neu gewählten Abgeordneten lobt und verkündet: „Ihr Idealismus und Patriotismus angesichts der Opposition ist genau das, was Großbritannien jetzt braucht.“ Hugh Dalton, der Anführer der Englischen Sozialisten, hat der Opposition zu ihrem „guten Kampf“ gratuliert. Da sie trotz ihrer offensichtlichen Abhängigkeit und Unterwürfigkeit gegenüber Mosley konzeptionell etwas gegen Mosley eingestellt sind, bleibt abzuwarten, wie sie mit der derzeitigen Mosley-Regierung zusammenarbeiten werden."
ENG.14.a:0 "Das sollte nicht passieren – ich meine, herzlichen Glückwunsch!"
