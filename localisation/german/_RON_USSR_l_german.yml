RON_Russian_Alt_History.119.t:1"[SOV.GetName] spricht sich gegen [GER.GetName] aus"
 RON_Russian_Alt_History.119.d:0"Die jüngste gegen uns gerichtete Rhetorik Russlands schadet unserem Ruf in Europa zunehmend. Verleumderische Anschuldigungen unserer angeblichen „Aggression“ schüren allmählich Angst und führen zu Missverständnissen hinsichtlich unserer Absichten."
 RON_Russian_Alt_History.119.a:0"Starten Sie eine Reihe großer Militärübungen, um sie alle einzuschüchtern!"
 RON_Russian_Alt_History.119.b:1"Wir müssen unseren Ruf retten und reibungslose Beziehungen gewährleisten."
 RON_Russian_Alt_History.119.c:0"Glauben sie, dass es uns interessiert, was sie über uns sagen?"
 
 RON_Russian_Alt_History.124.t:1"Die große preußische Bedrohung"
 RON_Russian_Alt_History.124.d:1"Sowohl auf offiziellem als auch auf inoffiziellem Wege haben die Russen deutlich gemacht, dass der Militarismus eine große Bedrohung für die Stabilität Europas darstellt und dies auch in der jüngeren Geschichte immer war. Sie haben uns eindringlich daran erinnert, dass wir mit der Bedrohung durch den Faschismus nicht allein sind und dass wir den Adler besiegen können, wenn sich der Kontinent nur vereint."
 RON_Russian_Alt_History.124.a:0"Hoffen wir, dass sie Recht haben."
 
 RON_Russian_Alt_History.125.t:0"Der [GER.GetName] glättet die Beziehungen"
 RON_Russian_Alt_History.125.d:0"Die [GER.GetName] haben sich nach Kräften bemüht, die Sorgen der europäischen Nationen zu zerstreuen. In einer öffentlichen Erklärung haben sie erklärt, dass sie keine feindseligen Absichten hegen, und hoffen, dass ihre zurückhaltende Reaktion auf die kriegerische [SOV.GetAdjective]-Rhetorik für sie spricht."
 RON_Russian_Alt_History.125.a:0"Das bleibt abzuwarten."
 
RON_Russian_Alt_History.200.t:0"Russland schlägt gemeinsame Invasion Deutschlands vor"
RON_Russian_Alt_History.200.d:0"Russland schlägt vor, dass wir im Austausch für Westdeutschland gemeinsam mit ihnen in das Deutsche Reich einmarschieren. Den Rest würden sie nach eigenem Ermessen neu aufteilen."
RON_Russian_Alt_History.200.a:1"Wir werden den Faschismus zerstören"
RON_Russian_Alt_History.200.b:1"Wir werden uns nicht einmischen"
RON_Russian_Alt_History.200.c:1"Wir verurteilen diesen Akt der Aggression"

