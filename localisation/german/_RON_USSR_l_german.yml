 SOV_all_russian_nation_category_desc:0"Trotz der Überlegenheit des russischen Volkes klammern sich viele in unserem Land hoffnungslos an ihre rückständigen Kulturen und Religionen und untergraben damit die große russische Nation. Um uns mit Stolz Russen nennen zu können, müssen wir diese Plagegeister mit allen Mitteln loswerden. \n\nWenn die Stabilität unter 10 % fällt, werden die ethnischen Minderheiten gegen unsere Herrschaft rebellieren."
