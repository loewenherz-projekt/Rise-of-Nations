 NKVD_Agency:0"Geheimdienst NKWD"
 NKVD_Agency_desc:0"Der Spionagearm der sowjetischen Staatssicherheitskräfte. Geheimdienstoffiziere des NKWD haben die Aufgabe, durch den Einsatz platzierter Vermögenswerte und desillusionierter kommunistischer Sympathisanten Zugang zu streng geheimen Dokumenten zu erhalten, um der Sowjetunion einen Vorteil gegenüber ausländischen Rivalen zu verschaffen."
 women_in_the_military_focus:0"Soldatinnen"
 women_in_the_military_focus_desc:0"Frauen können in unterstützenden Frontrollen und in begrenzten Kampfeinsätzen dienen. Dies wird benötigte Arbeitskräfte freisetzen und unsere Männer möglicherweise noch härter kämpfen lassen."
 home_of_revolution2:0"Heimat der Revolution"
 home_of_revolution2_desc:0"Genossen, nach der Niederlage der niederträchtigen trotzkistischen Konterrevolutionäre konnten wir uns auf die Verteidigung der Revolution konzentrieren. Unser Ziel, unsere Hoffnung, unser Slogan lautet: Sozialismus in einem Land. Wir werden hier in der Sowjetunion eine sozialistische Utopie errichten, die der Rest der Welt unweigerlich annehmen wird."
 home_of_revolution3:0"Heimat der Revolution"
 home_of_revolution3_desc:0"Genossen, nach der Niederlage der niederträchtigen trotzkistischen Konterrevolutionäre konnten wir uns auf die Verteidigung der Revolution konzentrieren. Unser Ziel, unsere Hoffnung, unser Slogan ist „Sozialismus in einem Land“. Wir werden hier in der Sowjetunion eine sozialistische Utopie errichten, die der Rest der Welt unweigerlich annehmen wird."
