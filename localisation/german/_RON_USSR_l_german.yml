rus.27.d:0 "Russland erwartet von Ihnen, dass Sie Ihre Pflicht erfüllen"
rus.27.a:0 "Es lebe der Woschd"
rus.28.t:0 "Warschauer Konferenz"
rus.28.d:0 "Die inkompetenten Idioten des Ministeriums haben heute eine Petition an Moskau gerichtet. Sie behaupten, dass es unseren Besatzungstruppen trotz des „außerordentlichen Heldentums“ nicht gelungen sei, den seit fast einem halben Jahr andauernden finnischen Aufstand niederzuschlagen.\n\n Obwohl es demütigend ist, haben wir ein Treffen mit dem Feind in Warschau vereinbart. Im Gegensatz zum Generalgouverneur scheinen sie vernünftig zu sein. Im Bewusstsein, dass ihre sogenannte „Geheimarmee“ uns nicht ewig standhalten kann, haben sie Bedingungen diktiert..\n\nZu diesen Bedingungen gehören die Wiederherstellung einer unabhängigen Verfassung, eines Parlaments und eines nationalen Führers anstelle eines Ministeriumsbürokraten.\n\n General Levitov lehnt Zugeständnisse jeglicher Art entschieden ab. Seiner Ansicht nach wäre ein solcher Deal „Unabhängigkeit in jeder Hinsicht außer dem Namen“ und würde „einen bolschewistischen Stützpunkt an unserer Grenze schaffen“. Er glaubt außerdem, dass der Aufstand an Schwung verliert. Stattdessen hat Levitov eine vollständige Invasion Finnlands durch die Streitkräfte des Nordwestens gefordert.\n\nNatürlich wären die politischen Folgen der Aufstellung mehrerer Feldarmeen zur Bekämpfung eines Aufstands, dessen Existenz wir wiederholt geleugnet haben, verheerend. Ein Krieg gegen die finnische Bevölkerung könnte zu einer blutigen Angelegenheit werden, ganz zu schweigen vom Schaden für unser internationales Image. Andererseits könnte ein Zugeständnis gegenüber diesen Bastarden ebenso verheerend sein.\n\n Sollen wir Frieden akzeptieren?"
rus.28.a:0 "Akzeptieren Sie den Deal, verabschieden Sie das Finnland-Gesetz"
rus.28.b:0 "Schaffen Sie das Kommando des Ministeriums ab und bereiten Sie eine Invasion vor."
rus.29.t:0 "Blockade von Tallinn"
rus.29.d:0 "Einer nach dem anderen fallen die Dominosteine, und während panische Soldaten in Richtung unserer Westgrenzen eilen, beginnt eine andere Region ihren wilden Fluchtversuch aus der russischen Kontrolle.\n\nEine Gruppe ehemaliger Offiziere, radikaler Studenten und Nationalisten hat heute in der Hauptstadt des estnischen Gouvernements, der Baltischen Verwaltung, einen Putsch gestartet. Eine Gruppe, die sich selbst „Liga der Freiheitskämpfer Estlands“ nennt, wittert Blut im Wasser und überwältigt die spärlich ausgerüsteten Polizeikräfte der Stadt und ruft einen Freistaat aus!\n\nWir müssen diese Mistkerle schnell vernichten, bevor sie in die anderen baltischen Staaten marschieren oder, schlimmer noch, sich mit den finnischen Rebellen im Norden verbünden können. Sollten wir unsere baltischen Häfen verlieren, wären die Folgen verheerend!"
rus.29.a:0 "Ist das nicht zu viele Revolten?"
rus.30.t:0 "Kosakenputsch in Rostow am Don"
rus.30.d:0 "Wir haben die Kontrolle über Rostow am Don verloren! Berichte aus der Stadt deuten darauf hin, dass sie von einer abtrünnigen Kosakengruppe unter der Führung des selbsternannten Atamans Andrei Shkuro eingenommen wurde.\n\nUnter dem Kommando dieses Terroristen steht eine ganze Truppe in Divisionsstärke, die sich ganz dem Kampf gegen unsere sogenannte &quot;Anti-Kosaken-Politik&quot; und unser Landprogramm verschrieben hat.\n\nEs wurden Forderungen nach der vollständigen Wiederherstellung der Don-Kuban-Autonomie erhoben, eine Forderung, die wir niemals erfüllen können! Tod den Verrätern!"
rus.30.a:0 "Aufleuchten!"
rus.31.t:0 "Sibirische Verschwörung"
rus.31.d:0 "Sibirien rebelliert! Inspiriert von seinem Don-Kollegen Iwan Kalmykow hat ein weiterer selbsternannter „Ataman“ seinen ganz eigenen Schachzug in die Tat umgesetzt. Gemeinsam mit den verbliebenen sibirischen Kosakentruppen haben er und seine opportunistischen Banditen einen großen Teil der Transsibirischen Eisenbahn besetzt und halten ihn als Geisel, bis auch ihre absurden Forderungen erfüllt werden. Wir werden nicht zulassen, dass Kriminelle und Koltschak-Elemente in Sibirien unsere Nation zerstören!"
rus.31.a:0 "Ok, wer ist nicht abstoßend?"
rus.32.t:0 "Kasachischer Bauernkrieg"
rus.32.d:0 "Heute hat sich eine Masse verärgerter Bauern auf das verwundete Tier Russland gestürzt. Eine große Gruppe von Bürgern und ehemaligen Soldaten der verarmten Autonomieregion Alasch-Orda hat heute revoltiert und weite Teile des Landes für einen Kreis von Intellektuellen, das sogenannte Turkestanische Nationalkomitee, besetzt. Unter der Führung eines gewissen Mustafa Shokay haben sie unser Landprogramm für illegitim erklärt und die Anerkennung einer kasachischen Nation gefordert. Soldaten wurden mobilisiert, doch angesichts ähnlicher Revolten in Russland auf allen Seiten ist es gut möglich, dass sie uns durch die Finger gleiten."
rus.32.a:0 "Ist das schon das Letzte?"
rus.33.t:0 "Wer bist du ?"
rus.33.d:0 "Der große Aufstand gegen Russland ist im Gange, Commander. Auf welcher Seite stehen Sie?"
rus.33.a:0 "deshalb müssen wir Finnen sein."
rus.33.b:0 "Du wirst Russe sein"
rus.33.c:0 "Ruhm der Ukraine"
rus.33.e:0 "Ich kämpfe für Kleinrussland"
rus.33.f:0 "Russland braucht mich"
rus.34.t:0 "Finnland befriedet"
rus.34.d:0 "Diejenigen, die an der Weisheit der zentralistischen Politik des Staates zweifeln, wurden durch die großen Aufstände, die Russland bedrohen, sicherlich gedemütigt. Die verräterischen finnischen Exilanten, die ein Jahrzehnt lang im Geheimen Pläne schmiedeten, stürzten sich auf die laxe Politik von Gouverneur Taboritsky. Sie nutzten seine Schwäche für einen Aufstand, der an 1917 erinnert!\n\nDoch das Schicksal des slawischen Volkes ist unermüdlich, und Russland hat noch immer viele tapfere patriotische Ritter unter seinen Bürgern. Der neue Generalgouverneur Schatilow hat über diese Bastarde triumphiert! Damit hat er den Nationalstolz gerettet und verhindert, dass die gottlosen Sozialisten in unserem Gebiet Fuß fassen konnten.\n\nDie rechtmäßige Einheit zwischen dem finnischen und dem russischen Volk kann niemals gebrochen werden. Wir werden für immer gemeinsam gegen den Westen stehen. Mögen die Rebellen in ihren gefrorenen Gräbern verrotten!"
rus.34.a:0 "Geben Sie Gouverneur Shalitov eine Medaille!"
rus.40.t:0 "Die baltischen Gesetze"
rus.40.d:0 "Dem russischen Volk wünsche ich einen guten Abend. Das komplexe Netz aus Problemen und Besonderheiten, die unser Heimatland plagen, ist lang, und ich möchte Sie über vieles informieren... und damit komme ich zum Zustand unserer baltischen Besitzungen, einem Land, in dem das russische Volk viel zu lange in seinem eigenen angestammten Heimatland mit Füßen getreten wurde! Trotz seiner Rückkehr nach dem gerechten Feldzug unseres Wohzd, Lawr Kornilow, im Vaterländischen Krieg hat die jahrzehntelange Herrschaft der Deutschen ihre Spuren hinterlassen...\n\n In Verwaltungs-, Land- und sogar Militärfragen herrscht eine besorgniserregende Lage...\n\n... in unserem unaufhörlichen Krieg um das nationale Überleben wird Russland keine potenzielle fünfte Kolonne dulden. Alle, die ihre eigene Abstammung über das Wohl des Vaterlandes stellen, müssen kategorisiert werden. Zu diesem Zweck gebe ich hiermit meine Ratifizierung der „Gesetze zum Schutz der russischen, slawischen und eurasischen nationalen Interessen“ bekannt, wie sie zuvor in der Duma vorgeschlagen wurden …"
rus.40.a:0 "Zu lange haben die Hunnen ihren Willen durchgesetzt"
rus.41.t:0 "Landreformen im Baltikum"
rus.41.d:0 "Die Deutschen kontrollieren zu viel Land und Eigentum"
rus.41.a:0 "Wer ist jetzt der Kulake? Ja, das stimmt, nicht du"
rus.41.b:0 "Nimm das Geld und verpiss dich"
rus.42.t:0 "Verstaatlichung des Offizierskorps"
rus.42.d:0 "Deutsche Kadetten, deutsche Offiziere, deutsche Generäle sind alle schlecht"
rus.42.a:0 "Entfernen Sie sie aus führenden Positionen"
rus.42.b:0 "Säubern Sie das Offizierskorps vollständig vom Einfluss der Germanen"
rus.42.c:0 "Selektive Entfernung unzuverlässiger Hintergründe"
rus.43.t:0 "Gesetze zur Neuordnung des öffentlichen Dienstes"
rus.43.d:0 "Deutsche Bürgermeister, deutsche Stadträte, deutsche Sekretäre sind alle schlecht"
rus.43.a:0 "Wir brauchen die Germanen nicht, um unser eigenes Volk zu regieren"
rus.43.b:0 "Es könnte Vorteile haben, erfahrene Beamte einzusetzen"
rus.43.c:0 "Ersetzen Sie sie durch einheimische Beamte"
rus.44.t:0 "Integration und Versöhnung der baltischen Gouvernements"
rus.44.d:0 "Jetzt, da alle Deutschen von der Macht verschwunden sind, werden wir die größtmögliche Kontrolle über die russischen Gebiete ausüben."
rus.44.a:0 "Ruhm sei Russland!"
rus.45.t:0 "Zukunft der russischen Schwerindustrie"
rus.45.d:0 "Freier Markt oder Staat"
rus.45.a:0 "Freier Markt ist gut"
rus.45.b:0 "Sind wir blind? Setzen Sie die State Corporation ein"
rus.46.t:0 "Allrussisches jüdisches Freiwilligenkorps"
rus.46.d:0 "Die Bemühungen von General Alexander Wilenkin und seiner „Föderation jüdischer Soldaten in Russland“ wurden gemäß der Politik der nationalen Einheit der illynischen Regierung endlich belohnt. Die Veranstaltung ist eine Zeremonie zur Einweihung des Korps, der Verleihung der Kornivlow-Farbe und schließlich der Aufnahme seines neuen Offizierskorps in die ROVS. Das Korps soll zunächst die Ordnung in den vielen Regionen Russlands wiederherstellen, die von Gewalt zwischen den Gemeinschaften und Progromen an den Militärgrenzen geplagt sind. Dieses Problem wird von der illynischen Regierung als äußerst gefährlich für die soziale und politische Stabilität Russlands angesehen, da sie Recht und Ordnung notfalls mit allen Mitteln der Gewalt wiederherstellen muss. Die Integration der Juden in das nationale Leben ist einer der ersten Schritte zur Sicherung der ewigen Stabilität."
rus.46.a:0 "Mazal tov, Söhne der Rus"
rus.50.t:0 "Eine neue Lebensweise"
rus.50.d:0 "Juden, gedeiht, lebt und atmet Russisch"
rus.50.a:0 "Lasst uns vereinen!"
rus.52.t:0 "Nationale Argo-Industrieumfrage"
rus.52.d:0 "Russische Zwergwalhalter sind unproduktiv"
rus.52.a:0 "Gründung der Nationalfarmen"
rus.52.b:0 "Umverteilung der Ländereien größerer Ländereien"
rus.53.t:0 "Kommission für nationale Landentwicklung"
rus.53.d:0 "BERICHT: KOMMISSION FÜR DIE NATIONALE INIATIVE ZUR LANDSANIERUNG\n\nWir sind zu dem Schluss gekommen, dass unsere treuen Bauern, ob groß oder klein, mit neuem Werkzeug ausgestattet werden müssen, um die hohen Quoten zu erfüllen. Wir empfehlen die Anschaffung mehrerer tausend neuer Traktoren sowie verschiedener Pflüge und Handgeräte. Würde der Staat diese Mittel verteilen, würden die Ernteerträge zweifellos steigen. Ein großer Kauf aus Staatsmitteln würde ausreichen, um diese Fahrzeuge zu beschaffen."
rus.53.a:0 "Kommen wir zum Traktor"
rus.60.t:0 "Die Transamur-Frage"
rus.60.d:0 "Die Geschichte der Region Transamur ist eine Geschichte des Verrats und der Hinterlist. Es ist ein Land, das seiner rechtmäßigen Ehre beraubt und zunächst von einem verräterischen Scharlatan, Alexander Koltschack, geraubt wurde. Sein opportunistischer Größenwahn wurde nur von seiner Inkompetenz übertroffen, die zu seiner rechtmäßigen Vertreibung durch seine eigenen Minister und das Volk führte.\n\nLeider scheiterten die Pläne der verbliebenen lokalen Verwaltung zur Wiedervereinigung mit dem Mutterland. Koltschacks japanische Auftraggeber handelten zu schnell, und Wladiwostok wurde erneut eingenommen, diesmal von intriganten Ausländern. Beim sogenannten „Zweiten Amur-Zwischenfall“ von 1946 wurden russische Truppen gestoppt, bevor sie die Grenze überqueren konnten, und alle loyalen Formationen der Stadt wurden in ihren Kasernen verhaftet.\n\nSeitdem ist Transamur ein schwarzer Fleck auf einem ansonsten makellosen Ruf. Es ist eine große Demütigung, dass das Land nicht zurückerobert wurde, als die Wohsd ihren Lebensunterhalt verdiente. Interne Unruhen haben uns in der Vergangenheit daran gehindert, dieses Unrecht zu korrigieren, doch das wird nicht länger so bleiben! Seit unserem überwältigenden Sieg im Großen Vaterländischen Krieg steht die Bevölkerung der Region ihren Besatzern offen feindselig gegenüber. Mit dem richtigen Anstoß und dem Einsatz getarnter Agitatoren können wir diese Stimmung vielleicht ausnutzen … "
rus.60.a:0 "Sorgen Sie dafür, dass es erledigt wird ..."
rus.61.t:0 "Chaos in Transamur!"
rus.61.d:0 "Bei unserem Bestreben, die asiatische Bevölkerung vom schädlichen Einfluss des westlichen Imperialismus zu befreien, sind wir auf ein weiteres Hindernis gestoßen. In der Transamaur-Region, die wir im Kampf gegen den wahnsinnigen Admiral Koltschak für den Kaiser erobert hatten, kommt es zu Unruhen und Protesten. Berichte über brennende Kasernen und geplünderte Werften geraten außer Kontrolle, und die Verwaltungskommission in Wladiwostok fordert dringend Verstärkung an.\n\nDie slawischen Undankbaren, die die Region gemeinsam mit unseren einheimischen Bürgern bewohnen, waren unserem Einfluss schon immer misstrauisch gegenüber. Doch was einst ein Ärgernis war, hat sich zu einer schockierenden Störung entwickelt. Vielleicht reagieren sie einfach auf den jüngsten Kriegssieg ihres Heimatlandes, oder vielleicht sind solche Ereignisse angesichts eines so ungehobelten Volkes einfach unvermeidlich.\n\nUngeachtet dessen hat die russische Regierung bereits einmal versucht, uns die Region zu entreißen. Die Situation muss schnell und hart angegangen werden, um keine Schwäche zu zeigen. Wir werden den Imperialisten keine weitere Gelegenheit geben!"
rus.61.a:0 "Kümmern Sie sich darum ... jetzt!"
rus.62.t:0 "Der nächste Schritt"
rus.62.d:0 "Unsere Agitatoren haben selbst die optimistischsten Erwartungen übertroffen, denn Transamur ist von drastischen Unruhen heimgesucht! Fotos von brennenden Gebäuden auf dem Land und der wie Ratten umherhuschenden Polizei von Wladiwostok tauchen in den Medien auf. Wir müssen unseren nächsten Schritt entscheiden, denn die Dominosteine fallen, und die Gelegenheit ist lukrativ, aber zeitkritisch.\n\nZwei Optionen wurden präsentiert, und sowohl die TaGop als auch die Armee streiten über deren Durchführbarkeit.\n\nDas erste Szenario ist zurückhaltender, aber wahrscheinlich äußerst effektiv. Es sieht den Einsatz mehrerer Trupps vor, schwer bewaffneter und professionell ausgebildeter TaGOP-Agenten, die Schlüsselpunkte angreifen. Diese Trupps würden unter glaubhafter Abstreitbarkeit agieren, was den Randalierern die vollständige Kontrolle über die Region ermöglichen und uns einen Vorsprung verschaffen würde, einzugreifen und die „Ordnung wiederherzustellen“..\n\nDas zweite Szenario ist sicherlich mutig und angemessen schnell, könnte jedoch mit harter Hand durchgeführt werden. Die Armee befürwortet eine Masseninfiltrationsoperation im Schutz der Nacht. Dann würden unsere Soldaten im richtigen Moment in Aktion treten. Die Japaner haben sich durch die aufständischen Randalierer bereits eine blutige Nase geholt. Würde das überwältigende Eingreifen unserer Soldaten sie nicht zu einem vollständigen Rückzug zwingen?\n\nDas Zeitfenster wird immer kleiner. Wir müssen jetzt handeln."
rus.62.a:0 "Der TaGop wird den Weg weisen."
rus.62.b:0 "Die Armee wird dieses schwere Unrecht wiedergutmachen!"
rus.64.t:0 "Tödliches Versagen"
rus.64.d:0 "Als der Lastwagen immer langsamer wurde, atmete Agent Amelin langsam aus. Er runzelte die Stirn unter seinem Baklava, und die Taschenlampe seines Gewehrs leuchtete auf. Dies war ein Ritual, das selten praktiziert, aber schon lange gemeistert wurde. In gewisser Weise war es eine Meditation. Intensive Konzentration und ein geschultes Muskelgedächtnis sorgten dafür, dass alle Gedanken verschwanden und nur ein Gefühl von Präsenz und Gelassenheit wich. Er schulterte seine Waffe, erhob sich aus seinem Sitz, und gemeinsam machten sie sich auf den Weg.\n\nKilometerweit entfernt verließ ein Lastwagen chaotisch Chabarowsk. Am Steuer saß Mr. Nakamura, ein Vater, der ängstlich seine schwangere Frau und sein kleines Kind transportierte. Begierig darauf, dem Chaos im Stadtzentrum zu entkommen, brausten sie über alte Feldwege in Richtung der Nachbarstädte davon. Es war purer Zufall, dass der abgenutzte Wagen im Sumpfland einen Reifen platzte, und noch unwahrscheinlicher, dass sein Kind eine verirrte Taschenlampe im Wald entdeckte. Doch beide Ereignisse ereigneten sich, und als die Familie ihr Ziel erreichte, erzählte Mr. Nakamura jedem japanischen Beamten, der zuhören wollte, eifrig davon.\n\nAmelin und seine Brüder würden Chawarowsk nie erreichen.\n\nStattdessen würde der zukünftige Amelin sich gurgelnd in Dreck und Blut wiederfinden, regungslos dem Sternenhimmel entgegen. Seine Ruhe wich animalischer Panik, als er sich umdrehte und Agent Drugov erblickte; sein Kopf war von einer schwarzen Tasche bedeckt, und seine Hände waren auf dem Rücken gefesselt.\n\n„Scheiße …“, flüsterte er niedergeschlagen. Dieser Satz sollte bald hundertfach von seinem sehr lebendigen Vorgesetzten in Irkutsk wiederholt werden, einem kleinen, ungeduldigen Mann, der ihn in einem Wutanfall neben dem Funkgerät aussprach..\n\nWieder einmal war Transamur knapp außer Reichweite geraten. Die Vohzd würden nicht erfreut sein."
rus.64.a:0 "Dafür wird jemand erschossen!"
rus.63.t:0 "Sabatouers festgenommen!"
rus.63.d:0 "Da die Unruhen in Transamur immer heftiger wurden, begannen einige in unserer Regierung zu hinterfragen, ob eine Einmischung im Gange sei. Heute hat sich dieser Verdacht bestätigt! Mehrere unbekannte Männer wurden heute Morgen vor Sonnenaufgang in den Marschen rund um Chabarowsk gefunden, nachdem ein Hinweis eines einheimischen Zivilisten unsere Streitkräfte auf ihre Anwesenheit aufmerksam gemacht hatte. Bewaffnete Randalierer sind in der Region heutzutage zwar keine Seltenheit, doch diese Angreifer fielen in Kleidung und Verhalten ungewöhnlich auf. Sie trugen professionelle Waffen, waren in taktischer Ausrüstung ausgerüstet und verhielten sich wie ein geschlossenes Einsatztrupp. Obwohl sie keine Uniformen trugen und sich bisher weigerten, Angaben zu ihren Motiven zu machen, steht außer Frage, dass es sich nicht einfach nur um Mitglieder des Pöbels handelte. In Anbetracht dieser Faktoren und ihres Standorts nahe der Grenze ist es sehr wahrscheinlich, dass es sich bei den Männern um Bedienstete der russischen Regierung handelt. Nach dem Vorfall wurde militärische Verstärkung im Norden Transamurs genehmigt, und die bestehenden Polizeipatrouillen wurden in noch höhere Alarmbereitschaft versetzt. Wir bleiben auf der Hut, falls es noch jemandem gelungen ist, sich nach Süden zu schleichen, doch im Moment scheint dies ein großer Sieg für unser Reich zu sein!"
rus.63.a:0 "Halten wir die Augen offen."
rus.65.t:0 "TaGop-Infiltration erfolgreich!"
rus.65.d:0 "Als der Lastwagen immer langsamer wurde, atmete Agent Amelin langsam aus. Er runzelte die Stirn unter seinem Baklava, und die Taschenlampe seines Gewehrs leuchtete auf. Dies war ein Ritual, das selten praktiziert, aber schon lange gemeistert wurde. In gewisser Weise war es eine Meditation. Intensive Konzentration und ein geschultes Muskelgedächtnis sorgten dafür, dass alle Gedanken verschwanden und nur ein Gefühl von Präsenz und Gelassenheit Platz machte. Er schulterte seine Waffe, erhob sich von seinem Sitz, und gemeinsam begannen sie ihre Wanderung.\n\nEs waren kilometerweit bis Chabarowsk, aber sie konnten es nicht riskieren, direkt zu schießen. Die Wanderung verlief größtenteils friedlich. Anfangs war nichts zu hören außer dem Knirschen von Zweigen unter ihren Füßen und dem Rascheln gefallener Blätter. Erst als sie Sumpfland erreichten, tauchte Ärger auf: eine Familie japanischer Kolonialisten reparierte ihren platten Reifen. Agent Amelin schaltete besorgt seine Taschenlampe aus, doch glücklicherweise wurde keiner seiner Kameraden entdeckt. Auf dieser Etappe der Reise unterdrückte er einen winzigen Anflug von Wut auf die Familie, die er aus sicherer Entfernung beobachtete. Sie waren ausländische Bastarde, die das spirituelle Territorium seines Volkes stahlen! Er zwang sich, den Gedanken zu verdrängen und konzentrierte sich wieder auf seine Mission.\n\nEndlich erreichten sie die Außenbezirke der Stadt, und die Luft war rauchig. Ein Postamt diente sowohl als Umkleidekabine als auch als vorgeschobener Stützpunkt. Nachdem er sich in Zivil gekleidet hatte, wandte sich Agent Amelin dem großen Tisch zu, den Agent Drugov in die Mitte des Raumes gezogen hatte. Darauf lagen Broschüren, Poster und Briefe. Er lächelte und ließ seinen Gefühlen freien Lauf."
rus.65.a:0 "Meine Herren, machen wir uns an die Arbeit!"
rus.67.t:0 "Russische Streitkräfte in Transamur eingekesselt!"
rus.67.d:0 "Seit den ersten Protesten in der Region Transamur warten wir gespannt darauf, was die Russen tun würden. Heute haben wir die Antwort erhalten: Ihr feiger Plan wurde vereitelt!\n\nNachdem Aufklärungsmissionen eine große Truppenbewegung an der Grenze entdeckt hatten, beschloss der örtliche Kommandant kurzerhand, den Bau einfacher Befestigungsanlagen zu genehmigen. Er setzte darauf, dass die Russen glaubten, wir wüssten nichts von ihren Aktionen – ein Wagnis, das sich als erfolgreich erwies. Infiltrierende russische Truppen wurden zunächst nahe Chabarowsk angegriffen und dann auf ihrem Rückzug zügig eingekesselt.\n\nTrotz unserer zahlenmäßigen Unterlegenheit haben wir ihr gesamtes Expeditionskorps vernichtet! Obwohl unser Kommandant mit diesem Manöver seinen ursprünglichen Befehlen widersprach, war das Ergebnis verblüffend. Wir haben diese Mistkerle wieder einmal gedemütigt! Wäre eine Beförderung und eine Feier angebracht?"
rus.67.a:0 "Transamur wird für immer uns gehören!"
rus.68.t:0 "Überlistet und unterlegen"
rus.68.d:0 "Private Konstantin hatte noch nie in seinem Leben solche Angst gehabt. Es war ein Kriegsgebiet, und er lief, als gäbe es keine Sorgen auf der Welt. Sie alle liefen verdammt schnell, wohlgemerkt, und Marschieren wäre vielleicht das bessere Wort gewesen, aber das Tempo reichte trotzdem nicht aus!\n\nEr blickte erneut auf die mickrige PPS-42-Maschinenpistole in seinen Händen und umklammerte sie, bis seine Knöchel weiß wurden. Jeder Mann im Trupp hielt sie oder eine Variante davon, außer Alexi natürlich, der das Glück hatte, eine verdammte Schrotflinte zu tragen. Er stöhnte laut auf und zog sowohl unerwünschte Aufmerksamkeit als auch böse Blicke auf sich. Wenn keiner von ihnen ein Ziel in mehr als zweieinhalb Metern Entfernung treffen konnte, welche Chance hatten sie dann gegen die Japaner?\n\nAlles war schon vor Stunden den Bach runtergegangen, obwohl es sich wie Jahre anfühlte. Sie waren gerade einmal eine Meile hinter der Grenze. Konstantin hatte sich tatsächlich darauf gefreut, seinen Teil zur Befreiung Transamurs beizutragen. Der Plan war, in die Stadt einzudringen und sich mit dem lokalen Aufstand abzustimmen. Mit ihrer Häuserkampftaktik hätten sie die Japaner in einem Überraschungsangriff schnell überwältigt! Stattdessen fanden sie eine befestigte Landschaft mit schweren Maschinengewehrstellungen und getarnten Scharfschützen in den Bäumen vor. Sie hatten keine Chance gehabt und hatten Glück, lebend herauszukommen. Nun kehrten sie so schnell wie möglich nach Hause zurück, wohl wissend, dass sie so tief im feindlichen Gebiet eine Einkesselung wahrscheinlich machten. Die Mission war gescheitert, und ihnen blieb nur noch, mit eingezogenen Schwänzen zu fliehen und zu überleben.\n\nVor ihnen begann ein Gefreiter, den Konstantin nicht kannte, zu schreien und zu weinen und die Bäume anzubrüllen. Sein Vorgesetzter stürzte sich augenblicklich auf den Mann, bereit, Gerechtigkeit walten zu lassen. Konstantin wurde wütend bei diesem Anblick und bereute sofort, selbst geschrien zu haben. Doch die Strafe sollte ihn nicht treffen, denn seine Strafe war viel schwerer.\n\nDie Lichtung ergoss sich in einen Hagel aus Blut, Kugeln und einem einzigen vergeblichen Schrotschuss. Dann, so schnell wie das Blutbad begonnen hatte, war es auch vorbei. Konstantins letzter Anblick waren seine herausquellenden, zerfetzten Eingeweide, und seine letzten Gedanken galten der Demütigung."
rus.68.a:0 "Was für eine verdammte Katastrophe!"
rus.72.t:0 "Eine Kammer in Saratow"
rus.72.d:0 "Der Marschall kniete vor dem Altar, das Kreuz in der Hand, und murmelte vor sich hin. Er paraphrasierte ein Gedicht Turgenjews und verdrehte dessen Feindseligkeit und Apathie gegenüber dem Heiligen Russland zu einer Beschwörung von beißender und trauriger Bedeutung.\n\n„In diesen Zeiten des Zweifels, in diesen Tagen schmerzlichen Grübelns über das Schicksal meines Landes bist du allein mein Stab und Zepter, oh großes, mächtiges, wahres und freies Russland – eins und unteilbar, heilig und strahlend. Du bist mein Trost und mein Ziel, mein Traum und mein Wunsch. Du allein bist mein Herr ... du allein.“\n\nDie Gedanken des Marschalls schweiften zum Ersten Weltkrieg, zum Kampf gegen die Deutschen, zum Anführen der Legionen des Heiligen Russland, zum Vordringen nach Westen und zum triumphierenden Stampfen seiner Füße in Berlin. Er erinnerte sich an die Tage, als er – Petr Nikolajewitsch – und Kornilow – dieser großartige Bastard – Seite an Seite standen und die tapferen Jugendlichen vorführten, die so viel für einen hart erkämpften Sieg geopfert hatten. Doch heute ist Russland korrupt. Als Kornilow in ein anderes, friedlicheres Reich aufbrach, entwickelte sich die Nation immer selbstsüchtiger und egoistischer. Die jungen Kornilowisten! Wie können sie es wagen, sich so zu nennen! Russland schwächelt, und überall sind Risse in der Gesellschaft zu sehen. Wie lange würde es dauern, bis der Woschd das merkt?! Während des Gottesdienstes murmelte Vrangel immer wieder dieselben Worte …"
rus.72.a:0 "Russland, ich werde da sein"
rus.71.t:0 "Misstrauensantrag"
rus.71.d:0 "Das ROVS-Zentralkomitee hat Nikolai Skoblin offiziell von seinem Amt als Vorsitzender und de facto als Vohzhship Russlands abberufen."
rus.71.a:0 "Der Teufel holt dich!"
rus.78.t:0 "Wrangel und Drozdovsky kommen in Moskau an"
rus.78.d:0 "Skoblin rief den Wachen zu, sie sollten ihm den Weg aus dem Kreml freimachen, doch vergebens. Levitov saß derweil einfach auf seinem Stuhl und fügte sich kampflos in sein Schicksal. Lustigerweise hatten sie sich noch vor wenigen Minuten angeschrien. Dann hörten sie einen lauten Knall, als die Tür von schwarz gekleideten Soldaten mit Gewehren in den Händen aufgerissen wurde. Hinter ihnen kam ein weiterer Mann, diesmal groß und in schwarzer Kosakenuniform – ein Anblick, den jeder als den sehr alten und verärgerten Schwarzen Baron wiedererkennen würde. Bemerkenswerterweise stand ihm neben ihm ein Mann mit Brille, Michail Drosdowski.\n\n„Nikolai Wladimirowitsch, Michail Nikolajewitsch, ich habe gehört, dass es zwischen Ihnen beiden einen Streit gibt“, sagte Wrangel mit einem Anflug von grausamem Sarkasmus. „Ich denke, es ist unsere Aufgabe, zwischen Ihnen beiden zu vermitteln“, sagte Wrangel, als er mit seinen Truppen in die Mitte des Raumes trat. Skoblin lehnte sich sofort an die Wand, als ihn ein plötzliches Gefühl der Schwäche überkam.\n\n„Wenn Sie beide so sehr nach Macht streben … dann ist das eben so.“ Vielleicht hat es keiner von Ihnen beiden verdient.“ Wrangel warf einen kleinen Gegenstand auf den Tisch, woraufhin Levitov zusammenzuckte und Skoblin – am anderen Ende des Raumes – erschauderte. Es war ein Stift. „Wir sind uns … einig“, Wrangel nickte in Richtung Drozdovsky, bevor er fortfuhr, „dass die Armee eine Grundlage hat, Sie beide von Ihren Posten zu entfernen, und dass dies die beste Vorgehensweise ist, um das Heilige Russland zu retten. Und jetzt machen Sie weiter – unterschreiben Sie hier und hier.“ Skoblin und Levitov unterzeichneten beide widerwillig die Dokumente – es waren zwei getrennte Rücktrittsschreiben. Dann wurde nach einer kurzen Abstimmung Wrangel zum Woschd und Drozdovsky zu seinem Stellvertreter gewählt. Hinter verschlossenen Türen wurden Russlands zwei mächtigste Persönlichkeiten mit wenig bis gar keiner Gewalt aus der Politik entfernt, oder vielleicht doch nicht."
rus.78.a:0 "Heil dem Vohzd!"
rus.73.t:0 "Die Züge von Saratow"
rus.73.d:0 "Wenn zwei Brüder streiten, leidet die Mutter am meisten.\n\n Als Skoblin und Levitov sich gegenseitig auseinanderrissen, brach der Traum zusammen. Die Geister der Vergangenheit des Mutterlandes stürzten herab; die verdammten ethnischen Geier an den Rändern, die satanische Plage des Sozialismus und die ewig illoyale Bauernschaft. Ein solcher Feind kam jedoch aus dem Inneren. Wrangel und Drozdovodogsky, wahnhaft in ihrer Anbetung unserer gescheiterten imperialen Vergangenheit, trafen uns in unserer Stunde der Not. Als die Radios quäkten und die Telefonisten hilflos waren, schien alles verloren. \n\n In Saratow leisteten wir Widerstand. Mit dem Rücken zu den Zügen und den Augen zum Fluss gerichtet, versammelten sich unsere müden Männer zu einem letzten Gefecht gegen die Diener dieser inzestuösen Feiglinge. Mit Kugeln und Bomben wurde unsere Zukunft entschieden; Evolution oder Regression?\n\nAls die Luft still wird und das Schluchzen verstummt, ertönt ein Seufzer der Erleichterung. Dann wächst die Freude in immer schnellerem Tempo. Wir haben es geschafft. Die Putschisten liegen regungslos da, getötet im Namen unseres Volksstaates!"
rus.73.a:0 "Es lebe das wiedergeborene Russland!"
rus.74.t:0 "Die Züge von Saratow"
rus.74.d:0 "Wenn zwei Brüder streiten, ist es die Mutter, die am meisten leidet.\n\n Als Skoblin und Levitov sich gegenseitig auseinanderrissen, brach der Traum zusammen. Die Geister der Vergangenheit des Mutterlandes stürzten herab; die verdammten ethnischen Geier an den Rändern, die satanische Plage des Sozialismus und die ewig illoyale Bauernschaft. Ein solcher Feind kam jedoch aus dem Inneren. Wrangel und Drozdovsky, wahnhaft in ihrer Anbetung unserer gescheiterten imperialen Vergangenheit, trafen uns in unserer Stunde der Not. Als die Radios quäkten und die Telefonisten hilflos waren, schien alles verloren. \n\n In Saratow leisteten wir Widerstand. Mit dem Rücken zu den Zügen und den Augen zum Fluss gerichtet, versammelten sich unsere müden Männer zum letzten Gefecht gegen die Diener dieser inzestuösen Feiglinge. Mit Kugeln und Bomben wurde unsere Zukunft entschieden; Evolution oder Rückschritt?\n\nDie Luft ist jetzt still, bis auf vereinzeltes Schluchzen. Wrangel und Drosdowski wandeln siegreich durch die Ruinen. Bald werden sie das Undenkbare versuchen: die Zukunft in die Vergangenheit zu holen. Alle Augen richten sich auf Moskau …"
rus.74.a:0 "Russland erwartet den Helden"
rus.77.t:0 "Die Lorbeeren Sibiriens"
rus.77.d:0 "So muss sich Raskolnikow gefühlt haben, dachte General Krakowezki verwirrt. Der Mord an einem einfachen Pfandleiher löste eine Kaskade von Ereignissen aus. Was dieser Protagonist angerichtet hatte, schien kein Ende zu nehmen. Aus einem Verbrechen wurden zwei, aus zwei wurden drei und aus drei eine eskalierende Reihe verzweifelter Vertuschungen und Beinahe-Geständnisse.\n\n„Ach, Scheiße“, dachte er, als er aus seinem Tagtraum erwachte. „Wenn man sich in einem Fluss befindet, was nützt es dann, der Strömung zu widerstehen?“\n\nObwohl einige Teile der Geschichte dem General gefielen, hatte er kein Verbrechen begangen. Stattdessen klopfte sein Herz vor Aufregung. Hoch zu Ross, vor Soldatenkolonnen, hatte er die Außenbezirke der Stadt erreicht. Jubelnde Menschenmengen erwarteten sie, eine Versammlung der Besitzlosen, die sich in Hoffnung verwandelt hatte.\n\nDas große russische Spiel, 1919 von diesem verdammten Wladimir Iljitsch entfacht, neigte sich seinem raschen Ende zu. Nach dem Sieg in Saratow waren keine Kräfte mehr übrig, die das Unvermeidliche hinauszögern konnten. Während die Menge sang und impulsive Soldaten Blumen kauften, um sie in ihre Fässer zu legen, grinste der General. Vernunft und Mitgefühl, die im Lauf der Geschichte verloren geglaubt worden waren, hatten gesiegt!\n\nEinige Zeit später erreichten die Männer das Stadtzentrum. Schwere Türen wurden unter Jubelrufen aufgestoßen und alle Räume gesichert. Zum Entsetzen des Kornilow-Gesandten waren weder „Heil Russland“ noch „Heil dem Woschd“ zu hören. Stattdessen nahm Krakowezkis Stimme eine unerwartete Wendung.\n\n„Zum Teufel mit den Demagogen!“, dröhnte der General seinen Kameraden zu. „Heute ist ein Sieg für das Volk!“"
rus.77.a:0 "Er kann das einfach tun?"
rus.79.t:0 "Schlafloses Moskau"
rus.79.d:0 "In einem kleinen Gebäude mit einer Metallspitze standen fünf Männer, zwei Geiseln und eine Leiche. Sie lehnten sich über einen Tisch im Schein einer blassen Leuchtstoffröhre, die nur wenig wärmer war als die kalte Nacht draußen. Eine stille Anspannung lag über allen Anwesenden, die sie mit der Stadt unter ihnen teilten.\n\nDer erste der fünf hielt seine Waffe in die Ecke, wo die Geiseln niedergeschlagen saßen. Der zweite spielte nervös herum, ein angespannter Kerl, dem es nicht gelang, der komplexen Funkanlage einen Ton zu entlocken. Der dritte legte die Schallplatte auf und stand ungeduldig mit der Nadel in der Hand da.\n\nNach einigem Gefummel entspannte sich der zweite Mann. Sein strenges Gesicht verzog sich zu einem Lächeln, und er nickte dem Nadelhalter zu. Es dauerte einen Moment, bis das Kratzen verstummte, und dann, trotz des kalten Windes und der furchtbaren Geiseln, ertönte ein Geräusch. Erst leise, dann lauter.\n\nIn ganz Moskau regten sich in dieser Nacht die Menschen aus ihrem Schlaf. Vorsichtig öffneten sich Fenster, die Bedürftigen erstarrten, und die Soldaten blickten auf. Die sanften Worte waren wunderschön, ganz gleich, welche Zukunft sie bedeuteten.\n\nSowohl im Funkturm als auch in der Stadt darunter sangen vereinzelte Stimmen diese bekannte Melodie. "
rus.79.a:0 "Alexandra, Alexandra, diese schöne Stadt gehört uns ..."
rus.81.t:0 "Propaganda erscheint in Transamur!"
rus.81.d:0 "Die Unruhen in Transamur scheinen eine neue Dimension angenommen zu haben! In den Städten der gesamten Region scheint sich im Schutz der Nacht ein Netzwerk zur Verbreitung von Propaganda entwickelt zu haben. Überall findet man Flugblätter in den Händen der Menschen, sie liegen nass in den Gossen und wehen im Wind durch die Straßen. Außerdem sind in vielen Gassen und an jedem Laternenpfahl Plakate zu sehen.\n\nSlogans aus diesen Propagandablättern finden sich mittlerweile in den üblichen Protestgesängen wieder, ebenso wie wilde Gerüchte über Massaker an Kindern und sogar lokalen Beamten! So musste beispielsweise ein Minister namens Sergei Antonow in Wladiwostok mehrmals öffentlich auftreten, nachdem ein Flugblatt veröffentlicht worden war, in dem behauptet wurde, er sei tot – hingerichtet durch unsere Polizeikräfte!\n\nSo absurd diese Propaganda auch ist, ihre Wirksamkeit lässt sich nicht leugnen. Jegliche Hoffnung auf ein Ende der Unruhen ist zerplatzt und die Polizei kämpft weiterhin mit den mittlerweile allabendlichen Unruhen in der gesamten Region."
rus.81.a:0 "Organisieren Sie japanische Freiwillige, um diese schmutzigen Lügen zu beseitigen!"
rus.82.t:0 "Die Macht der Worte"
rus.82.d:0 "Pavel humpelte durch die Tür, stieß einen tiefen Seufzer aus und sank rückwärts in seinen Lieblingssessel. Seine Mutter schlief im Nebenzimmer, und er war sich sicher, dass sie ihn hereinkommen gehört hatte. Als sie nicht erwachte, verspürte Pavel ein leichtes Schuldgefühl. Heute war er den dritten Tag in Folge mit seinen Kollegen in den Werften „protestiert“. Jedes Mal widersetzte sich Pavel ihr; dieser unterbezahlten Frau, die nur ihre Familie beschützen wollte. Er verstand ihre Zurückhaltung. Staatliche Repressalien in ihrer winzigen Wohnung waren das Letzte, was Baby Isaak brauchte.\n\nWas sie nicht verstand, war, dass er auch Isaak beschützte. Zwar hegte Pavel seinen eigenen gerechten Zorn auf die Japaner, aber er war nicht nur egoistisch. Der wahre Ursprung all seiner Handlungen war Hoffnung. Er hoffte verzweifelt, dass die Zukunft für seinen kleinen Bruder besser werden würde, denn er konnte es nicht ertragen, dieses Kind unter Fremdherrschaft aufwachsen zu sehen, so nah an der Grenze zum Mutterland.\n\nIsaak schüttelte niedergeschlagen den Kopf. Es war die dritte Nacht in Folge. Seine Knochen schmerzten und seine Muskeln schrien nach seiner Flucht vor der Polizei, und er war erschöpft. Sie alle hatten Parolen gerufen, Kundgebungen organisiert und Ziegelsteine durch Fenster geworfen. Er war sogar Männern begegnet, die mit Gewehren auf ihre Besatzer schossen. Ein mulmiges Gefühl überkam ihn, als seine anfängliche Hartnäckigkeit schwankte. Wie konnte eine so unorganisierte Bewegung über die Japaner triumphieren? Die Menschen trugen so viel Wut in sich, und doch hatte sie sich nur in chaotischer Raserei entladen.\n\nEr stand steif auf und grunzte, obwohl sein Körper nach Schlaf verlangte. Pavel musste seinen Kopf frei bekommen, also zog er sich den Schal wieder an und stieg die Stufen hinunter. Doch gerade als er sich zur Tür umdrehen wollte, fiel ihm ein Flugblatt ins Auge. Er drehte es in der Handfläche und öffnete es. Darin stand in fetten Buchstaben „Mörder!“, begleitet von einem Bild des örtlichen Pfarrers Sergej Antonow. Er verschlang die Worte und hörte die Geschichte der brutalen Grausamkeit, die dem armen Russen angetan worden war. Plötzlich waren Müdigkeit und Schmerzen verschwunden. Er warf einen Blick auf die Uhr an der Wand über sich und kniff die Augen zusammen.\n\nFür Sergej konnte sich Pavel noch ein paar Stunden auf der Werft leisten."
rus.82.a:0 "Für die Verbrechen gegen unsere Rasse und unser Volk werden die Japaner bezahlen!"
rus.95.t:0 "Eine zweite Sonne in St. Petersburg"
rus.95.d:0 "Der Schnitt des Rasiermessers war tief und saugte leuchtend rote Flüssigkeit aus Dimitris Kinn. Sie rann wie Wasser über Glas und tropfte zu Boden. Dimitri bemerkte es nicht einmal. Zwei Fäuste umklammerten den Rand des Waschbeckens, und seine großen Augen starrten in den Spiegel. Im Hintergrund hörte er Rufe und Schreie. Er zweifelte nicht an der Bluttat. Er schätzte, dass die Hälfte der Männer betete und die andere Hälfte diejenigen verprügelte, die feige waren. Sie hatten die Front noch nicht einmal erreicht, und wahrscheinlich waren Männer tot.\n\nHalb rasiert, aber endlich bei Bewusstsein, rannte Dimitri aus dem Badezimmer, um seinen Verdacht zu bestätigen. Die Kaserne war leer, bis auf einen einzigen schlafenden Mann. Dimitri überlegte, ihn zu wecken, bevor er sich dagegen entschied. Wenn es wirklich passierte, blieb er lieber dort.\n\nJetzt draußen. Die Offiziere hämmerten auf das Hauptquartier ihres Vorgesetzten ein paar Meter entfernt ein. Einen besonders wütenden Mann konnte man sogar von dort, wo er stand, schreien hören. \n\n„Sie sagten, wir seien schnell genug vorangekommen!“\n\nSein Blick wanderte vom Offizier zum Himmel. Er fühlte sich unwirklich, als der Streifen seinen langen Bogen beschrieb. Seine Angst wich einem Lachen. Es hatte nur Sekunden gedauert, bis jede Sehnsucht verflogen war. Memento Mori.\n\nSeine Pupillen brannten augenblicklich, wie die von St. Petersburg."
rus.95.a:0 "Heute gibt es eine zweite Sonne..."
rus.90.t:0 "Die Krone des Heiligen Georg"
rus.90.d:0 "Wrangel seufzte, rieb sich die Schläfen und kicherte leise. Im Großen und Ganzen war es auf diese absurde Art wirklich komisch. Er ließ das Telefon auf den Schreibtisch fallen, mit Wählton und allem Drum und Dran. Er hatte gedacht, der Wahnsinn sei vorbei, Gottes Spielchen hätten aufgehört. Es war seine Pflicht gewesen, Russland von diesen verwöhnten Kindern zu befreien, von Heuchlern, die das Land in Anarchie versinken ließen, nur um ihre eigene Haut zu retten. Der russische Führer behielt selten lange dasselbe Gesicht, und er hatte vor, es zu stabilisieren.\n\n Als die Schritte im Flur immer lauter wurden, wurde ihm klar, dass alles umsonst gewesen war. Drozdovsky war trotz seines hohen Alters nur ein dummes Kind. Pytor war der einzige Erwachsene, der noch in Russland übrig war. Obwohl er wusste, dass es sündig war, dachte er in solchen Momenten nur daran, sich auf seine Datscha zurückzuziehen. „Du gewinnst“, sagte er zynisch und fügte leise „kreischende Gören“ hinzu.\n\n Die Türen öffneten sich wie aufs Stichwort und mit ihnen kamen die spitzen Fässer. Er wandte sich nur an Drozdovodgosky, die Apathie in seiner Stimme war deutlich zu hören.\n\n „Sag mir, Michail Gordejewitsch, war es die Landreform oder die vorgeschlagene Verfassung?“\n\n Pjotr ging, bevor er wirklich eine Antwort erhielt, überzeugt, dass seine Tage gezählt waren. Es schien, als sei Drozdovsky nostalgischer, als er zuvor gedacht hatte. All das Blutbad seit 1914 wäre nun völlig sinnlos; ein kosmischer Witz. Der absolute Zarismus war aus seiner Pause zurückgekehrt, und Wrangel konnte es nicht ertragen, Gott möge ihm vergeben."
rus.90.a:0 "Gott rettet das Land"
rus.100.t:0 "Moskau ruft"
rus.100.d:0 "„Sir, bitte bestätigen Sie diesen Befehl.“\n\nDer General hasste alles daran. Er saß in einer Gruft, einem weitläufigen Durcheinander aus Schotten und schwach beleuchteten Tunneln voller stickiger Luft. Über ihm wimmelte es von barbarischen Horden, Horden, die einst große Städte wie Berlin, Paris und Rom in ihrer Gewalt hatten. Seine Familie befand sich unter den vielen Bürgern, die bald ihren Launen unterworfen sein würden. Wie sehr sehnte er sich nach einem anderen Ort, wo er tapfer mit dem Gewehr in der Hand kämpfen und den Weg für seine Frau und Kinder freimachen konnte. So lebte ein Mann. Er war keine Ratte, die sich in der Kanalisation verkroch.\n\n„Bestätigt. Sie leiten die Startsequenz ein“, sagte er entschieden.\n\n„Verstanden, Sir. Sequenz gestartet.“\n\nDer General rieb sich müde die Augen, während er auf die Gelegenheit wartete, den nächsten Schritt zu tun. Das Ganze ergab keinen Sinn, solange der Feind vor den Toren stand. Truppen mussten Befehlen gehorchen, und ein einziger Befehl hätte genügen sollen.\n\n Plötzlich überkam ihn wieder das unerklärliche Gefühl, beobachtet zu werden. Der General korrigierte leicht seine Haltung und blickte sich im Raum um. In der Mitte stand ein langer, runder Tisch, an dem Männer mit kleinen Stahlnadeln auf der Brust saßen. Von all diesen Männern hatte er die „Ehre“, ans Telefon zu gehen.\n\nAm anderen Ende stand der Vohzd, eine gewaltige Gestalt, die in den letzten Stunden im Käfig etwas Menschliches angenommen hatte. Der General hatte jedoch nichts an Respekt vor seinem Anführer verloren, im Gegenteil, er hatte sich verdoppelt. Zu sehen, dass eine solche Vision von einem Sterblichen in die Tat umgesetzt werden konnte, war ein inspirierender Gedanke.\n\nSein Blick wanderte zu dem Handlanger zu seiner Rechten, der offenbar Schwierigkeiten hatte, sich eine Zigarette anzuzünden. Seine Hände zitterten, schlecht versteckt. Der General wollte lachen, unterdrückte es aber, bevor er ihm Feuer anbot."
rus.100.a:0 "Was lastet schwerer auf der Brust: die Pflicht oder die Medaillen?"
