 soviet.1955.a:0"Lassen Sie die USA Japan als Marionette dienen, wir teilen Korea." 
 soviet.1955.b:0"Eine Spaltung Japans und Koreas erscheint gerechter." 
 soviet.1955.c:0"Wir werden in der Region nicht eingreifen." 
 
 soviet.1956.t:0"Die Sowjets haben vorgeschlagen, dass wir Japan besetzen und Korea in zwei Hälften teilen"
 soviet.1956.d:0"" 
 soviet.1956.a:0"Ein sehr vernünftiger Plan." 
 
