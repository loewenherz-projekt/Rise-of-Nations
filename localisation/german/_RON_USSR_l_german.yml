the_people_know:0 "§RDas Wissen über den Korridor wird öffentlich gemacht!§!"
the_french_lose:0 "§GDie perfiden Franzosen werden nicht mehr in der Lage sein, Finnland Hilfe zu schicken.§!"
the_corridor_closes:0 "Der finnische Korridor"
the_corridor_unlocks:0 "§YEntscheidungen bezüglich des Finnischen Krieges und des Finnischen Korridors werden offen sein.§!"
the_corridor_closes_desc:0 "Die Franzosen sind stets bereit, den Untergang anderer zu beschleunigen. Über die Ostsee versorgen sie die finnischen Terroristen mit Waffen und Freiwilligen. Doch wenn in einem unserer Häfen mindestens zehn U-Boote bereitstehen, werden die Franzosen wissen, dass wir so etwas nicht dulden."
