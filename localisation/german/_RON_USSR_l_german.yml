 soviet.68.t:0"Prozess gegen Stalin"
 soviet.68.d:0"In einem von vielen als Scheingericht bezeichneten Verfahren befand das Sondergremium, das die Verbrechen des ehemaligen sowjetischen Führers untersuchen sollte, ihn in allen 859 Anklagepunkten für schuldig. Das Gremium erklärte, Stalins größtes Verbrechen sei die kriminelle Unvorbereitetheit der Roten Armee gewesen, den Kommunismus zu verbreiten, und der verräterische Mangel an Willen dazu. Stalin wurde anschließend per Live-Radioübertragung durch ein Erschießungskommando hingerichtet."
 soviet.68.a:0"Verstörend."
 soviet.68.b:0"Eine notwendige Scharade."
 
 soviet.69.t:0"Die Rückkehr des japanisch besetzten China"
 soviet.69.d:0"Wir werden von Japan die Rückgabe der in früheren Konflikten von China eroberten Gebiete an das chinesische Volk fordern. Trotzki hat das Außenministerium angewiesen, mit Krieg zu drohen, falls die Japaner unseren Vorschlag ablehnen. Wir werden großzügig sein und ihnen Nord-Sachalin geben, wenn sie ihn annehmen." 
 soviet.69.a:0"Senden Sie ihnen ein Angebot, das sie nicht ablehnen können."
 
 soviet.70.t:0"Die Sowjetunion fordert die Rückgabe des Landes an China"
 soviet.70.d:0"Die Sowjets haben verlangt, dass wir Mengkukuo, Mandschukuo und das besetzte Hebei an die Volksrepublik China abtreten, andernfalls würden sie uns den Krieg erklären. Im Gegenzug versprechen sie uns Nord-Sachalin. Das ist ein sehr schlechter Tausch, aber einen Krieg mit den Sowjets können wir uns nicht leisten. Was sollen wir tun?" 
 soviet.70.a:0"Wir werden ihren unangemessenen Forderungen nachkommen."
 soviet.70.b:0"Wir werden versuchen, ein besseres Angebot zu bekommen."
 soviet.70.c:0"Wir werden ihre Anfrage ablehnen."
 
 soviet.71.t:0"Japaner treten chinesische Ländereien sofort ab"
 soviet.71.d:0"Die Japaner haben sich entschieden, unseren Forderungen nachzukommen. Truppen der Volksrepublik China haben bereits die Kontrolle über die Mandschurei und Peking übernommen. Nun liegt es an uns, unseren Teil der Abmachung zu erfüllen." 
 soviet.71.a:0"Sehr gut."
 
 soviet.72.t:0"Die Japaner weisen uns zurück"
 soviet.72.d:0"Die Japaner haben unseren Vorschlag abgelehnt und unsere Diplomaten ausgewiesen. Dass sie so etwas wagen würden, ist unvorstellbar. Trotzki muss ihnen, wie versprochen, den Krieg erklären, sonst verliert er jegliche Glaubwürdigkeit. Zum Glück für uns hat unser eifriger Generalstab bereits eine Operation in Gang gesetzt, um die Japaner für ihre Unverschämtheit zu bestrafen." 
 soviet.72.a:0"Darauf haben wir uns vorbereitet."
 
 soviet.73.t:0"Sowjetische Truppen erobern Hokkaido"
 soviet.73.d:0"Das japanische Oberkommando war heute schockiert, als es erfuhr, dass sowjetische Fallschirmjäger in der Region Hokkaido landen, unsere Garnisonen dort vernichten und die gesamte Region für die Sowjetunion sichern. Es ist nur eine Frage der Zeit, bis sowjetische Marineinfanterie, begleitet von Infanterie- und Panzerdivisionen, landet. Die Invasion unserer Heimatinseln beginnt!" 
 soviet.73.a:0"Vor einer Kriegserklärung angegriffen?!"
 
 soviet.74.t:0"Japan möchte tauschen"
 soviet.74.d:0"Die Japaner haben uns mitgeteilt, dass sie bereit sind, Land an die Chinesen zurückzugeben, wir ihnen aber ein besseres Angebot machen müssen. Dass wir mit den Japanern wie kapitalistische Schweine feilschen müssen, ist äußerst beleidigend. Wie sollen wir reagieren?" 
 soviet.74.a:0"Wir machen Ihnen ein besseres Angebot."
 soviet.74.b:0"Wir werden Gewalt anwenden."
 soviet.74.c:0"Vergiss es, das ist Zeitverschwendung."
 
 soviet.75.t:0"Die Sowjetunion sendet uns eine Kriegserklärung"
 soviet.75.d:0"In einer unerwarteten Wendung teilte uns die sowjetische Delegation mit, dass die Sowjetunion die Gespräche aufgrund unserer „Ablehnung“ ihres Ultimatums abgebrochen habe. Sie überreichte uns eine Kriegserklärung." 
 soviet.75.a:0"Es kommt zu Feindseligkeiten."
 
 soviet.76.t:0"Die Sowjets bieten uns Werften an"
 soviet.76.d:0"Auf unsere Anfrage hin hat die Sowjetunion angeboten, uns Werftausrüstung zu liefern, damit wir neue Trockendocks bauen können. Dabei sollen ihre eigenen Trockendockmaschinen demontiert werden. Offenbar wollen sie uns Industriegüter überlassen, die wir nicht zur Herstellung von Waffen gegen sie verwenden können. Sind wir mit diesem Deal zufrieden?" 
 soviet.76.a:0"Es ist zufriedenstellend."
 soviet.76.b:0"Fragen Sie stattdessen nach Industriegütern."
 
 soviet.77.t:0"Japan akzeptiert Werften"
 soviet.77.d:0"Die Japaner haben unseren Vorschlag angenommen, unsere Werftmaschinen zu demontieren und im Austausch gegen chinesisches Land nach Japan zu verschiffen. Obwohl dies mehr ist, als wir ursprünglich aufgeben wollten, haben wir unser Ziel erreicht, und dies muss als Sieg für Trotzki und das gesamte sowjetische Volk gewertet werden." 
 soviet.77.a:0"Ein fairer Deal."
 
 soviet.78.t:0"Die japanische Nachfrage nach Industriegütern"
 soviet.78.d:0"Die Japaner haben unser Angebot, ihnen Werften zur Verfügung zu stellen, abgelehnt und stattdessen vorgeschlagen, dass wir ihnen Industriegüter liefern. Die Japaner behaupten, sie hätten Verständnis für unsere Zurückhaltung, etwas zu liefern, das in Zukunft gegen uns verwendet werden könnte, aber diese Industriegüter würden für den zivilen Bedarf verwendet." 
 soviet.78.a:0"Sehr gut, wir akzeptieren den Deal."
 soviet.78.b:0"Wir glauben nicht, die Japaner lügen."
 
 soviet.79.t:0"Die Sowjets akzeptieren unseren Vorschlag"
 soviet.79.d:0"Die Sowjets haben sich bereit erklärt, uns die zivile Industrie zu überlassen, was für sie selbst wirtschaftliche Kosten bedeutet. Letztendlich war es kein allzu schlechtes Geschäft, denn wir sollten in der Lage sein, diese neu erworbene Industrie zu nutzen, um unsere eigene Rüstungsindustrie wiederzubeleben." 
 soviet.79.a:0"Das bestmögliche Ergebnis."
 
 soviet.80.t:0"Gespräche scheitern"
 soviet.80.d:0"Die Sowjets haben unseren Vorschlag nicht nur abgelehnt, sondern offenbar auch das Interesse an der Angelegenheit völlig verloren. Wir haben gerade erfahren, dass die sowjetische Delegation abgereist ist, und unser Außenministerium bezweifelt, dass wir in absehbarer Zeit von ihr hören werden." 
 soviet.80.a:0"Was für eine Erleichterung."
 
 soviet.81.t:0"Beginn des Leih- und Pachtgesetzes"
 soviet.81.d:0"Die amerikanische Hilfe wird für uns von unschätzbarem Wert sein. Sie wird uns helfen, unsere Produktion zu spezialisieren und zu ergänzen, und zwar dort, wo es noch Defizite gibt. Leider wird es noch einige Monate dauern, bis die erste größere Lieferung eintrifft." 
 soviet.81.a:0"Wir müssen warten."
 
 soviet.82.t:0"Erste Lieferung"
 soviet.82.d:0"Die erste Lieferung aus dem Leih- und Pachtgesetz ist eingetroffen. Die schiere Menge an Fahrzeugen, Jeeps und diverser Ausrüstung ist überwältigend. Überraschenderweise haben uns auch die Briten eine beträchtliche Menge an Hilfsgütern geschickt. Die erhaltenen Lastwagen sind nicht nur für den Transport von Vorräten nützlich, sondern auch zum Abschleppen unserer alten Artillerie, die in unseren Reserven lagert." 
 soviet.82.a:0"Wurde auch Zeit."
 
 soviet.83.t:0"Zweite Lieferung"
 soviet.83.d:0"Diese zweite alliierte Lieferung übertrifft die letzte hinsichtlich der gelieferten Ausrüstung. Die amerikanischen Lastwagen sind sehr zuverlässig und robust – eine hervorragende Plattform für unsere neuen Raketenartillerieplattformen. Wir werden die amerikanischen Studebakers in Katusha-Raketenwerfer umbauen und die deutschen Linien in Angst und Schrecken versetzen." 
 soviet.83.a:0"Exzellent."
 
 soviet.84.t:0"Dritte Lieferung"
 soviet.84.d:0"Wir haben im Vergleich zur letzten großen Lieferung eine deutlich erhöhte Menge an Panzern und gepanzerten Fahrzeugen sowie Flugzeugen erhalten." 
 soviet.84.a:0"Pünktlich."
 
 soviet.85.t:0"Vierte Lieferung"
 soviet.85.d:0"Unsere westlichen Verbündeten unterstützen unsere Produktion weiterhin. Auch wenn diese Vereinbarung bald ausläuft, war sie für uns im Kampf gegen den Faschismus zweifellos eine bedeutende Hilfe." 
 soviet.85.a:0"Weiter so."
 
 soviet.86.t:0"Endgültige Lieferung"
 soviet.86.d:0"Heute haben wir unsere letzte große Leih- und Pachtlieferung aus den westlichen Demokratien erhalten. Leider teilen sie uns mit, dass sie uns nicht mehr helfen können. Positiv ist jedoch, dass die meisten unserer derzeit im Einsatz befindlichen Geräte vor Kriegsende verschlissen und verschrottet werden, wodurch unsere Schulden gegenüber den Amerikanern im Rahmen des Leih- und Pachtgesetzes getilgt sind."
 soviet.86.a:0"Schade."
 
 soviet.87.t:0"Der Fall Moskaus"
 soviet.87.d:0"Leider haben wir Moskau verloren. Wir haben uns auf diesen Fall vorbereitet und unsere Hauptstadt nach Kuibyschew verlegt, wo sie hoffentlich außerhalb der Reichweite der aktuellen feindlichen Offensive liegt." 
 soviet.87.a:0"Wir müssen unsere Hauptstadt verlegen!"
 
 soviet.88.t:0"Moskau zurückerobert"
 soviet.88.d:0"Wir haben Moskau zurückerobert und beginnen mit der Rückführung unseres Personals und unserer Ausrüstung. Hoffentlich verlieren wir die Stadt nicht noch einmal." 
 soviet.88.a:0"Wir können unsere Hauptstadt jetzt zurückverlegen."
 
 soviet.89.t:0"Der Große Vaterländische Krieg"
 soviet.89.d:0"Der deutsche Verrat wird nicht unbeantwortet bleiben. Das Mutterland hat frische Truppenreserven zusammengestellt, um sie in den Kampf zu schicken. Angesichts solch überwältigender Gegner können die Nazis nicht gewinnen. Unsere Männer werden alle kämpfen und als Helden sterben, bis der Nazi-Abschaum kein Futter mehr für unsere Schlächterei hat." 
 soviet.89.a:0"Wir werden bis zum letzten Blutstropfen kämpfen."
 
 soviet.90.t:0"Fortsetzung des Großen Vaterländischen Krieges"
 soviet.90.d:0"Die Erinnerung an den deutschen Verrat wird uns immer begleiten. Wir werden nie diejenigen vergessen, die aufgrund der Toleranz gegenüber dem Faschismus, die einst auf der ganzen Welt herrschte, umkamen." 
 soviet.90.a:0"Wir werden den schmutzigen Verrat Hitlers nie vergessen."
 
 
 soviet.91.t:0"Die Sowjetunion testet die Detonation einer Plutoniumbombe"
 soviet.91.d:0"Die Sowjetunion hat die Welt an ihre Fortschritte in der Atomforschung erinnert. Ihr Arsenal an Atombomben reicht aus, um jeden Feind davon abzuhalten, unbeschadet Krieg gegen sie zu führen."
 soviet.91.a:0"Offensichtlich sind wir in eine Ära der gegenseitigen Vernichtung eingetreten. Wir können es uns nicht leisten, in den Krieg zu ziehen."
 soviet.91.b:0"Was für gefährliche Zeiten, in denen wir leben."
 
 soviet.93.t:0"Die Sowjetunion testet die Detonation einer Atomwaffe"
 soviet.93.d:0"Die Sowjetunion hat der Welt den Erfolg ihres Atombombenprojekts bewiesen, indem sie auf dem Atomwaffentestgelände Semipalatinsk in Kasachstan erfolgreich den „Ersten Blitz“ (Pervaya molniya oder Joe-1) zündete."
 soviet.93.a:0"Offensichtlich sind wir in eine Ära der gegenseitigen Vernichtung eingetreten. Wir können es uns nicht leisten, in den Krieg zu ziehen."
 soviet.93.b:0"Was für gefährliche Zeiten, in denen wir leben."
 soviet.93.c:0"Hoffentlich macht uns das sicherer."
 
 soviet.94.t:0"Die Vereinigten Staaten erklären ihren Nichtangriffskurs gegenüber der Sowjetunion"
 soviet.94.d:0"Die Amerikaner haben über private Kanäle sehr deutlich zum Ausdruck gebracht, dass sie sich eine friedliche Koexistenz unserer beiden Länder wünschen und betonten, dass ein Scheitern dieser Möglichkeit möglicherweise zur Vernichtung der Menschheit führen könnte."
 soviet.94.a:0"Vielleicht ist es uns gelungen, „Frieden in unserer Zeit“ zu erreichen?"
 
 
 soviet.92.t:0"Erste Wahlen in der Sowjetunion"
 soviet.92.d:0"Heute fanden in der Sowjetunion die ersten demokratischen Wahlen statt. Das Ergebnis überraschte die Pessimisten der neuen Entwicklung nicht: Josef Stalin gewann mit 74 % der abgegebenen Stimmen deutlich. Viele fragen sich: „Hat sich in der Sowjetunion wirklich etwas verändert?“ Die Zeit wird es zeigen." 
 soviet.92.a:0"Scheint nicht gerade Freiheit zu sein."
 
