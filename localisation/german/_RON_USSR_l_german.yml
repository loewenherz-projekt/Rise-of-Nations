RON_Russian_Alt_History.180.b:0"Es sei denn..."

 RON_Russian_Alt_History.184.t:0"Faschistischer Aufstand!"
 RON_Russian_Alt_History.184.d:0"Ein Bürgerkrieg ist ein Krieg zwischen organisierten Gruppen innerhalb eines Staates (oder Landes). Ziel einer Seite kann die Übernahme der Kontrolle über das Land oder eine Region, die Erlangung der Unabhängigkeit einer Region oder eine Änderung der Regierungspolitik sein. Der Begriff ist eine Lehnübersetzung des lateinischen „bellum civile“, das für die verschiedenen Bürgerkriege der Römischen Republik im 1. Jahrhundert v. Chr. verwendet wurde. Die meisten modernen Bürgerkriege sind mit der Intervention externer Mächte verbunden. Ein Bürgerkrieg ist ein anhaltender, organisierter und groß angelegter Konflikt mit hoher Intensität, an dem oft reguläre Streitkräfte beteiligt sind. Bürgerkriege können zu zahlreichen Opfern und dem Verbrauch erheblicher Ressourcen führen."
 RON_Russian_Alt_History.184.a:0"Wir werden diesen Aufstand niederschlagen!"
 
 RON_Russian_Alt_History.185.t:0"Faschistische Verschwörung vereitelt!"
 RON_Russian_Alt_History.185.d:0"Ein Staatsstreich ist die Entmachtung einer Regierung und ihrer Macht. Typischerweise handelt es sich dabei um eine illegale Machtergreifung durch eine politische Fraktion, eine Rebellengruppe, das Militär oder einen Diktator. Viele Wissenschaftler betrachten einen Putsch als erfolgreich, wenn die Usurpatoren die Macht ergreifen und mindestens sieben Tage lang halten."
 RON_Russian_Alt_History.185.a:0"Narren..."


RON_Russian_Alt_History.65.t:0"Intervention im zweiten russischen Bürgerkrieg"
RON_Russian_Alt_History.65.d:0"Die Union der Sozialistischen Sowjetrepubliken steht in Flammen. Zwei Regierungen erheben jeweils den Anspruch, die legitime Regierung des Landes zu sein. Es ist an der Zeit, dass wir entscheiden, welche Seite wir unterstützen, wenn überhaupt."
RON_Russian_Alt_History.65.a:0"Unterstützen Sie das Militär"
RON_Russian_Alt_History.65.b:0"Unterstützen Sie die Kommunisten"
RON_Russian_Alt_History.65.c:0"Besser nicht einmischen"

RON_Russian_Alt_History.66.t:0"[From.GetName] sendet Hilfe"
RON_Russian_Alt_History.66.d:0"Die Regierung von [From.GetName] hat uns gerade eine Waffenlieferung geschickt."
RON_Russian_Alt_History.66.a:0"Großartig!"

RON_Russian_Alt_History.67.t:0"Das Haus Romanow"
RON_Russian_Alt_History.67.d:0"Das Haus Romanow war von 1613 bis 1917 das regierende Zarenhaus Russlands. Es erlangte große Bekanntheit, nachdem die Zarin Anastasia Romanowa den ersten Zaren Russlands, Iwan den Schrecklichen, geheiratet hatte."
RON_Russian_Alt_History.67.a:0"Lang lebe der Zar!"

RON_Russian_Alt_History.68.t:0"Die Sozialistische Revolutionäre Partei"
RON_Russian_Alt_History.68.d:0"Die Sozialistische Revolutionäre Partei war eine bedeutende politische Partei im späten kaiserlichen Russland und in beiden Phasen der Russischen Revolution sowie im frühen Sowjetrussland."
RON_Russian_Alt_History.68.a:0"Durch Kampf erlangen Sie Ihre Rechte!"

RON_Russian_Alt_History.70.t:0"Die Militärregierung"
RON_Russian_Alt_History.70.d:0"Eine Militärdiktatur ist eine Diktatur, in der das Militär die vollständige oder weitgehende Kontrolle über die politische Autorität ausübt. Der Diktator ist häufig ein hochrangiger Offizier. Eine Militärjunta ist eine Regierung, die von einem Komitee militärischer Führer geführt wird. Der Begriff „Junta“ bedeutet „Versammlung“ oder „Komitee“ und stammt ursprünglich von der nationalen und lokalen Junta, die vom spanischen Widerstand gegen Napoleons Invasion in Spanien im Jahr 1808 organisiert wurde. Heute wird der Begriff für eine autoritäre Regierungsform verwendet, die durch eine oligarchische Militärdiktatur gekennzeichnet ist. Im Unterschied zu anderen Kategorien autoritärer Herrschaft, insbesondere dem starken Mann (autokratische Militärdiktaturen), der Maschinerie (oligarchische Parteidiktaturen) und dem Bossismus (autokratische Parteidiktaturen), wird damit eine Junta oft durch einen Staatsstreich an die Macht gebracht. Die Junta kann entweder formell die Macht als Regierungsorgan des Landes übernehmen und per Dekret regieren oder ihre Macht durch verbindliche (aber informelle) Kontrolle über eine nominell zivile Regierung ausüben. Diese beiden Formen der Juntaherrschaft werden auch als offene und verschleierte Herrschaft bezeichnet. Verschleierte Herrschaft kann die Form der Zivilisierung oder der indirekten Herrschaft annehmen. Zivilisierung liegt vor, wenn eine Junta ihre offensichtlich militärischen Merkmale öffentlich aufgibt, aber ihre Dominanz beibehält. Beispielsweise kann die Junta das Kriegsrecht aufheben, auf Militäruniformen zugunsten ziviler Kleidung verzichten, die Regierung mit ehemaligen Militäroffizieren „kolonisieren“ und sich politischer Parteien oder Massenorganisationen bedienen. „Indirekte Herrschaft“ bedeutet, dass die Junta verdeckt und hinter den Kulissen Kontrolle über eine zivile Marionette ausübt. Indirekte Herrschaft durch das Militär kann entweder eine umfassende Kontrolle über die Regierung oder die Kontrolle über einen engeren Satz von Politikbereichen wie Militär oder nationale Sicherheitsfragen umfassen. Wer wird die Militärregierung führen?"
RON_Russian_Alt_History.70.a:1"Eine Junta ist vorzuziehen"
RON_Russian_Alt_History.70.b:1"Andrej Wlassow"
RON_Russian_Alt_History.70.c:1"Anton Denikin"

RON_Russian_Alt_History.71.t:0"Die Russische Faschistische Partei"
RON_Russian_Alt_History.71.d:0"Die Russische Faschistische Partei (RFP), manchmal auch Allrussische Faschistische Partei genannt, war eine kleine russische Emigrantenbewegung mit Sitz in Mandschukuo in den 1930er und 1940er Jahren. Die Niederlage der Weißen Armeen im Russischen Bürgerkrieg von 1917–1922, die die älteren weißen Führer diskreditierte, und der Aufstieg des Faschismus in Italien veranlassten viele jüngere russische Emigranten, den Faschismus als eine Alternative zum Kommunismus zu betrachten. Die faschistische Bewegung unter den weißen Emigranten existierte weltweit, die Mehrheit ihrer Anhänger lebte jedoch in der Mandschurei und in den Vereinigten Staaten. Zahlreiche Russen hatten sich in der Mandschurei niedergelassen, als das Russische Reich die Region von 1900 bis 1905 besetzt hielt, und ihre Zahl stieg durch den Zustrom von Flüchtlingen nach dem Sieg der Roten Armee im Russischen Bürgerkrieg. Eine geheime Versammlung der verschiedenen Gruppen führte zur Gründung der RFP unter dem Vorsitz von Generalmajor Wladimir Dmitriewitsch Kosmin. Konstantin Rodsajewski wurde am 26. Mai 1931 Generalsekretär des Zentralkomitees und damit de facto Parteiführer. Unter dem Slogan „Gott, Nation, Arbeit“ und der Zeitschrift „Nazija“ rief die Partei zum Faschismus italienischen Stils auf, um die unsichere Position der bolschewistischen Führung angesichts äußerer und innerer Opposition auszunutzen."
RON_Russian_Alt_History.71.a:0"Gott – Nation – Arbeit"

RON_Russian_Alt_History.72.t:0"Die Allrussische Faschistische Organisation"
RON_Russian_Alt_History.72.d:0"Die Allrussische Faschistische Organisation (WFO) war eine Gruppe weißer russischer Emigranten unter der Führung von Anastassij Vonsjatski. Sie hatte ihren Sitz in Putnam (Connecticut, USA) und wurde am 10. Mai 1933 gegründet. 1934 versuchten die Russische Faschistische Partei (RFP) und die WFO in Yokohama, zu einer neuen Einheit, der Allrussischen Faschistischen Partei, zu fusionieren. Am 3. April 1934 unterzeichneten Vertreter beider Organisationen Protokoll Nr. 1, das die Fusion von RFP und WFO und die Gründung der Allrussischen Faschistischen Partei (WFP) verkündete. Die neue Organisation sollte die Organisationsstruktur der RFP mit den finanziellen Ressourcen der WFO verbinden. Am 26. April 1934 fand in Harbin auf dem 2. Kongress der Russischen Faschisten (Einheit) der formelle Zusammenschluss von VFO und RFP und die Gründung der Allrussischen Faschistischen Partei statt."
RON_Russian_Alt_History.72.a:0"OK"

