ENG.15.d:0 ""
ENG.15.a:0 "Verhaften Sie alle ihre Anführer"
ENG.15.b:0 "Machen Sie Kompromisse mit ihnen"
ENG.16.t:0 " die Kommissare oder nicht"
ENG.16.d:0 ""
