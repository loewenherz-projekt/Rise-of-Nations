 energia:0"OKB-1"
 energia_desc:0"Das 1946 als Spezialkonstruktionsbüro Nr. 1 des Forschungs- und Entwicklungsinstituts Nr. 88 gegründete Büro war maßgeblich am sowjetischen Raumfahrtprogramm beteiligt und produzierte später Sputnik 1 und Wostok 1."
 
