ENG_winter_of_discontent:0 "Winter der Unzufriedenheit"
ENG_winter_of_discontent_desc:0 "Seit der Verschwörung vom 14. Juli, die die Revolution dem Vergessen entriss, agieren unsere inneren Sicherheitskräfte unter einem einfachen Motto: „Nie wieder!“ Wir müssen unsere Bemühungen fortsetzen, sonst fallen wir alle in ein Zeitalter der Barbarei und Dekadenz zurück."
