 niip:0"NIIIP"
 niip_desc:0"Das 1911 in St. Petersburg gegründete und 1922 nach der Komintern in Radiotelegraphenwerk umbenannte Institut entwickelte jahrzehntelang Radargeräte für die Rote Armee."
 
 nmz_zis:0"Josef-Stalin-Fabrik Nr. 92"
