 petrov_design_bureau:0"Petrov Designbüro"
 petrov_design_bureau_desc:0"Der Artilleriekonstrukteur Fjodor F. Petrow vom Konstruktionsbüro der Artilleriefabrik Nr. 9 entwickelte zahlreiche Artilleriegeschütze für die Produktion in der gesamten Sowjetunion, darunter auch für die größte Waffenfabrik Uralmasch."
 
 zis:0"ZiS"
 zis_desc:0"Stark beeinflusst von den im Rahmen des Leih- und Pachtgesetzes in die Sowjetunion gelieferten Studebaker US6-Lastwagen entwickelte ZiS, auch bekannt als Automobilwerk Nr. 2, Zavod imeni Stalina, nach dem Krieg eine neue Generation robuster, zuverlässiger Lastwagen."
 
 black_sea_shipyard:0"Marti Naval Yard"
 black_sea_shipyard_desc:0"Die 1895 im ukrainischen Mykolajiw gegründete Schwarzmeerwerft war eines der wichtigsten Schiffbauzentren des Russischen Reiches. Nach der Oktoberrevolution ruhte sie viele Jahre, bis zur Expansion der sowjetischen Marine in den 1930er Jahren. Nun wird sie als Konstruktionsbüro wieder in Betrieb genommen..."
 
 baltic_shipyard:0"Ordschonikidse-Werft"
 baltic_shipyard_desc:0"Als eine der ältesten Werften der Russischen SSR baute sie mächtige Schlachtschiffe für die Flotte des Zaren. Die Baltischen Werften produzieren derzeit Schiffe für die Sowjetunion und haben sich auf den Bau und nun auch auf das Design von Schlachtkreuzern spezialisiert."
 
 admiralty_shipyard:0"Admiralitätswerft"
 admiralty_shipyard_desc:0"Die Admiralitätswerft ist möglicherweise die älteste große Werft in der Russischen SSR und wurde 1704 gegründet. Sie befindet sich in Leningrad, in der Nähe der Baltischen Werft, und ihre Aufgabe ist die Entwicklung von Zerstörern der nächsten Generation für die sowjetische Marine."
 
 rubin_design_bureau:0"Rubin Design Bureau"
 rubin_design_bureau_desc:0"Das Büro mit Hauptsitz in Leningrad konzentriert sich auf die Konstruktion von U-Booten und ist für den Großteil der sowjetischen U-Boot-Innovationen verantwortlich."
 
 amtorg_trading_corporation:0"Amtorg Trading Corporation"
 amtorg_trading_corporation_desc:0""
 
 
 
 
 degtyarev_plant:0"Degtyarev-Werk"
 degtyarev_plant_desc:0"Das 1916 in Kovrov gegründete Werk war ein bedeutender Hersteller der Waffen PTRD-41, DP-27, PPSh-41 und SG-43, benannt nach dem berühmten Waffenkonstrukteur Wassili Alexejewitsch Degtjarjow."
 
 kbp_Instrument_design_bureau:0"Instrumentenkonstruktionsbüro"
 kbp_Instrument_design_bureau_desc:0"Das am 1. Oktober 1927 als Organisation der Tulaer Waffenfabrik gegründete Konstruktionsbüro produzierte die Flugkanonen SchWAK, SchKAS, UB, WJA und B-20. Über 80 % der einheimischen Flugzeuge der sowjetischen Luftwaffe waren mit Waffen der Tulaer Konstrukteure ausgestattet."
 
 dux:0"Dux"
 dux_desc:0"Ursprünglich war hier das Konstruktionsbüro Polikarpow angesiedelt, und während des Ersten Weltkriegs produzierte das Werk Flugzeuge für den Zaren. Vor dem Großen Vaterländischen Krieg wurde das Werk erweitert und schließlich aufgeteilt. Während des Krieges blieb es ein wichtiger Bestandteil der sowjetischen Luftfahrtindustrie."
 
 chelyabinsk_tractor_plant:0"Traktorenwerk Tscheljabinsk"
 chelyabinsk_tractor_plant_desc:0"Das Werk wurde 1933 als Projekt des ersten Fünfjahresplans gegründet und produzierte bis 1940 100.000 Traktoren. Während des Zweiten Weltkriegs wurden sieben weitere Industriebetriebe (darunter der Großteil des Kirow-Werks) nach Tscheljabinsk verlagert, um dort „Tankograd“ zu gründen. Das Werk produzierte 18.000 Panzer und 48.500 Panzerdieselmotoren sowie über 17 Millionen Munition für die Rote Armee."
 
 kirovsky_zavod:0"Kirow-Werk Nr. 100"
 kirovsky_zavod_desc:0"Das 1789 in St. Petersburg gegründete Unternehmen stellte während des Großen Vaterländischen Krieges KV-Panzer her und diente als wichtiger Bestandteil von „Tankograd“."
  
 mytishchi_machine_building_plant:0"Maschinenbaufabrik Mytischtschi"
 mytishchi_machine_building_plant_desc:0"Das 1897 gegründete Unternehmen baute zunächst Triebwagen und produzierte während des Großen Vaterländischen Krieges Selbstfahrlafetten und Traktoren für die Rote Armee."
 
 uralmash:0"Uraler Schwermaschinenbauwerk"
 uralmash_desc:0"Das 1933 im Rahmen des Fünfjahresplans gegründete Werk produzierte Bergbauausrüstung für die sowjetischen Bergbauprojekte im Uralgebirge und produzierte während des Großen Vaterländischen Krieges T-34-Chassis und abgeleitete Designs sowie Artilleriegeschütze wie die Haubitze M-30 für die Rote Armee."
 
 barnaul_cartridge_plant:0"Fabrik Nr. 17"
 barnaul_cartridge_plant_desc:0"Das heute als Patronenfabrik Barnaul bekannte Werk 17 wurde im 19. Jahrhundert in St. Petersburg als „Arsenal P“ gegründet und 1918 nach Podolsk evakuiert. Während des Großen Vaterländischen Krieges wurde das Werk nach Barnaul verlegt und lieferte Kleinwaffenmunition an die Rote Armee."
 
 elektrosignal_plant:0"Elektrosignalanlage"
 elektrosignal_plant_desc:0""
 
 izhmash:0"Ischewsk Waffen- und Stahlfabriken"
 izhmash_desc:0"Das Maschinenbauwerk Nr. 74 war der wichtigste Waffenhersteller der Roten Armee und produzierte während des Großen Vaterländischen Krieges 11.450.000 Gewehre und Karabiner, 15.000 Flugzeuggeschütze und 130.000 Panzerabwehrwaffen."
 
 red_sormovo:0"Nischni Nowgorod Maschinenfabrik"
 red_sormovo_desc:0"Die Fabrik wurde 1849 als Werft gegründet und baute während des Großen Vaterländischen Krieges T-34 für die Rote Armee."
 
 krasnogorskiy_mechanicheskiy:0"Mechanisches Werk Krasnogorsk"
 krasnogorskiy_mechanicheskiy_desc:0"Das Werk wurde 1942 gegründet, um optische Linsen für die Rote Armee herzustellen. Nach dem Krieg baute das Werk Kameras nach den Spezifikationen der ehemaligen Carl-Zeiss-Fabrik in Jena, die die Rote Armee als Reparationsleistung erbeutet hatte."
 
