ENG_industrial_research_grant:0 "Industrielle Forschungsstipendien"
ENG_industrial_research_grant_desc:0 "Großbritannien, die Wiege der industriellen Revolution, ist bereits vollständig industrialisiert und verfügt gemessen an seiner Größe über eine der größten Industriebasen der Welt. Um in einer solchen Ära die Produktion weiter auszubauen und eine weltweit führende Industrienation zu bleiben, muss ein größerer Teil des Haushalts nicht für den Ausbau der Industrie und den Bau neuer Fabriken, sondern für die Weiterentwicklung von Technologie und Produktionseffizienz verwendet werden."
