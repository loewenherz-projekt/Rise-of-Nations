ENG_british_workers_government:0 "Britische Arbeiterregierung"
ENG_british_workers_government_desc:0 "Wir können den Kommunismus jetzt so retten, wie es Karl Marx gewollt hätte: indem wir ihn umgestalten und alte Fehler wiedergutmachen, die der vorherigen Regierung nicht gelungen sind."
ENG_national_labour_victory:0 "Nationaler Labour-Sieg"
ENG_national_labour_victory_desc:0 ""
ENG_mosleys_democratic_election:0 "Mosleys demokratische Wahl"
ENG_mosleys_democratic_election_desc:0 "Die Wahlen stehen vor der Tür und bringen große Veränderungen mit sich. Radikale mögen höhnen und schreien, doch die wahre Macht in England liegt beim TUC und der neuen Regierung, die Vorsitzender Mosley mit viel Mühe aufgebaut hat. Mit dem Ende der Kriegsregierung und dem Aufstieg eines neuen englischen Sozialismus vermeiden wir die Fehler der alten Labour-Partei und bleiben gleichzeitig der Demokratie treu."
ENG_english_socialist_victory:0 "Sieg der englischen Sozialisten"
