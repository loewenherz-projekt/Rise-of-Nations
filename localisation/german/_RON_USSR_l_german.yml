 soviet.230.t:0"Der Fall des antisowjetischen Blocks der Rechten und Trotzkisten"
 soviet.230.d:0"Den Angeklagten, darunter Nikolai Bucharin, Alexei Rykow und Genrich Jagoda, wird seit der Oktoberrevolution mehrfache Verschwörung zur Ermordung Lenins und Stalins sowie Konspiration mit Deutschland und Japan vorgeworfen. Die Beweislage, darunter zahlreiche Geständnisse, ist erdrückend. Die einzige Frage, die bleibt, ist das Schicksal dieser Männer."
 soviet.230.a:0"Verschonen Sie Bucharin und wahren Sie Ihr Gesicht, indem Sie den Rest hinrichten."
 soviet.230.b:0"Nur Bucharin hinrichten."
 soviet.230.c:0"Alle müssen sich für ihre Verbrechen verantworten."
 
 
 
 soviet.231.t:0"Josef Stalin fordert Bosporus oder Krieg"
 soviet.231.d:0""
 soviet.231.a:0"Kapitulieren Sie vor den Forderungen."
 soviet.231.b:0"Wir sind bereit, dafür zu kämpfen!"
 
 soviet.232.t:0"Die Türken reagieren auf unsere Forderungen"
 soviet.232.d:0""
 soviet.232.a:0"Die Türken geben unseren Forderungen nach."
 soviet.232.b:0"Die Türken ignorieren unsere berechtigte Bitte."
 
 soviet.233.t:0"Schaposchnikow geht aus gesundheitlichen Gründen in den Ruhestand"
 soviet.233.d:0"Marschall Boris Schaposchnikow, dessen Gesundheitszustand sich in letzter Zeit verschlechterte, hat den aktiven Dienst zugunsten einer weniger anspruchsvollen Position niedergelegt. Der Marschall ist ein hoch angesehener Mann und hat viel zur Entwicklung der Roten Armee und vieler ihrer besten jungen Offiziere beigetragen. Wir müssen dem Genossen Marschall für seinen patriotischen Dienst danken."
 soviet.233.a:0"Vielen Dank für Ihr Opfer für die Sache."
 
 
 soviet.234.t:0"Säubern Sie den NKWD"
 soviet.234.d:0"Die Große Säuberung neigt sich dem Ende zu. Es ist nur angemessen, dass wir nun diejenigen aus dem Verkehr ziehen, die für diese Katastrophe verantwortlich sind: die Spitzenoffiziere des NKWD."
 soviet.234.a:0"Säubern Sie nur die oberste Führungsebene."
 soviet.234.b:0"Es ist Zeit für eine umfassende Reform des NKWD, niemand darf aus der Verantwortung entlassen werden."
 
 
 soviet.235.t:0"Die Sowjetunion bietet der Tschechoslowakei Hilfe an"
 soviet.235.d:0""
 soviet.235.a:0"Das ist sicherlich eine gute Sache."

 soviet.236.t:0"Erzählen Sie den Briten und Franzosen von unserem Engagement für die Tschechen"
 soviet.236.d:0""
 soviet.236.a:0"Sagen Sie ihnen, dass wir lieber in den Krieg ziehen würden, als Deutschland nachzugeben."
 soviet.236.b:0"Sagen Sie ihnen, dass wir uns für die Unabhängigkeit der Tschechoslowakei einsetzen."
 soviet.236.c:0"Erzählen Sie ihnen von unserem schwachen Engagement."
 
