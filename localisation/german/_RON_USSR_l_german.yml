RON_Russian_Alt_History.1000.t:0"Die Teilung Polens"
RON_Russian_Alt_History.1000.d:0"Die Teilungen Polens waren drei Teilungen des polnisch-litauischen Staatenbundes, die gegen Ende des 18. Jahrhunderts stattfanden und die Existenz des Staates beendeten. Polen und Litauen waren 123 Jahre lang nicht mehr souverän. Die Teilungen wurden von der Habsburgermonarchie, dem Königreich Preußen und dem Russischen Reich durchgeführt, die die Ländereien des Staatenbundes im Zuge territorialer Beschlagnahmungen und Annexionen schrittweise unter sich aufteilten."
