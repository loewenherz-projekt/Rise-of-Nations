 soviet.245.t:0"[SOV.GetNameDef] Angebote zur Teilung des Iran"
 soviet.245.d:0"Der Korrespondent von [SOV.GetNameDef] in [ENG.Capital.GetCapitalVictoryPointName] hat der Regierung einen Deal angeboten, der vorsieht, dass wir und [SOV.GetNameDef] in den Iran einmarschieren, um das Land unter unseren Regierungen aufzuteilen. \n\nWir könnten die ölreichen Gebiete im Süden besetzen, während [SOV.GetAdjective] den Norden besetzen und anderswo eine Marionettenregierung einsetzen würde. \n\nWir hätten zwar genügend Unterstützung für einen Einmarsch in den Iran, doch manche befürchten, dass dies der Beginn einer Abwärtsspirale in den Chauvinismus wäre."
 soviet.245.a:0"Diese Gelegenheit ist zu gut, um sie verstreichen zu lassen."
 soviet.245.b:0"Wir müssen das Völkerrecht respektieren."

 soviet.246.t:0"Die Briten stimmen der Teilung des Iran zu"
 soviet.246.d:0"Die Briten unter [ENG.GetLeader] haben der Teilung des Iran zugestimmt und mit den Vorbereitungen für eine Invasion begonnen."
 soviet.246.a:0"Exzellent."

 soviet.247.t:0"Großbritannien weigert sich, den Iran zu teilen"
 soviet.247.d:0"Trotz des sehr lukrativen Angebots von [SOV.GetLeader] hat [ENG.GetLeader] unser Angebot nicht nur abgelehnt, sondern auch heftig kritisiert, indem er auf sein Bekenntnis zum Völkerrecht verwies und gleichzeitig das Fehlen unseres Bekenntnisses beklagte."
 soviet.247.a:0"Vielleicht haben sie recht."
 soviet.247.b:0"Mehr Land für uns."

