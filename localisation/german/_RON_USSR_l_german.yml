 #Events
 
 RON_Russian_Alt_History.1.t:0"Zweiter russischer Bürgerkrieg"
RON_Russian_Alt_History.1.d:0"Da sich die Überreste des kommunistischen Regimes jenseits des Uralgebirges verschanzt haben und sich weigern, auf unsere Kapitulationsforderungen einzugehen, scheint die einzige verbleibende Handlungsmöglichkeit darin zu bestehen, diese verräterischen Regionen mit Gewalt einzunehmen."
RON_Russian_Alt_History.1.a:0"Das ist eine Katastrophe..."

RON_Russian_Alt_History.2.t:0"Stalin in Haft"
RON_Russian_Alt_History.2.d:0"Der Sturm auf den Kreml verlief genau wie geplant. Obwohl die Geheimpolizei NKWD erbittert kämpfte, war ihr Widerstand angesichts unserer weit überlegenen Streitkräfte zwecklos. Stalin wurde in Gewahrsam genommen und musste einen Erlass unterzeichnen, der der Militärregierung unter Andrej Wlassow außerordentliche Exekutivvollmachten erteilte."
RON_Russian_Alt_History.2.a:0"Exzellent"

RON_Russian_Alt_History.3.t:0"Stalin im Kreuzfeuer getötet"
RON_Russian_Alt_History.3.d:0"Der Sturm auf den Kreml war teilweise erfolgreich, wir konnten das Gebäude sichern und Moskau fest in unserer Hand halten. Obwohl die Geheimpolizei NKWD erbittert kämpfte, war ihr Widerstand angesichts unserer weit überlegenen Streitkräfte zwecklos. Unglücklicherweise wurde Stalin jedoch von einer Querschlägerkugel getroffen. Er wurde ins nächstgelegene Krankenhaus gebracht, starb aber Minuten später. Innenkommissar Lawrentij Beria ist nun amtierender Generalsekretär. Berichten zufolge ist er nach Sibirien geflohen, wo die östlichsten Regionen der kommunistischen Regierung die Treue geschworen haben."
RON_Russian_Alt_History.3.a:0"Nicht das, was wir beabsichtigt hatten"

RON_Russian_Alt_History.4.t:0"Stalins Flucht"
RON_Russian_Alt_History.4.d:0"Der Sturm auf den Kreml war teilweise erfolgreich, wir konnten das Gebäude sichern und Moskau fest in unserer Hand halten. Obwohl die Geheimpolizei des NKWD erbittert kämpfte, war ihr Widerstand angesichts unserer weit überlegenen Streitkräfte zwecklos. Doch in einer verheerenden Entwicklung wurde Stalin in letzter Sekunde von seinem letzten verbliebenen NKWD-Sicherheitspersonal durch eine Reihe geheimer Tunnel entführt. Berichten zufolge ist er nach Sibirien geflohen, wo die östlichsten Regionen der kommunistischen Regierung die Treue geschworen haben."
RON_Russian_Alt_History.4.a:0"Verdammt"

RON_Russian_Alt_History.5.t:0"Der Wlassow-Putsch"
RON_Russian_Alt_History.5.d:0"Wlassow-treue Truppen haben den Kreml umzingelt und Stalin wurde ein Ultimatum gestellt."
RON_Russian_Alt_History.5.a:1"Sturm auf den Kreml"

