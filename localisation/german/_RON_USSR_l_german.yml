ENG_fields_of_britain_campaign:0 "Fields Of Britain-Kampagne"
ENG_fields_of_britain_campaign_desc:0 "Das Herz der Nation ist ihr Boden, die atemberaubenden Felder und Hügel, die alle guten Briten lieben. Mit Hilfe romantischer Dichter und Schriftsteller werden wir eine Kampagne starten, um dem britischen Volk – und insbesondere der kriegsgeplagten Jugend – die Schönheit ihrer Heimat näherzubringen. Im Rahmen dieser Kampagne zur Rückkehr aufs Land werden britische Jugendliche aufs Land geschickt, wo sie ihr Land kennenlernen und den alternden Bauerngemeinden helfen, ihnen einen Hauch von Jugendlichkeit und dringend benötigter Hilfe schenken. Durch Arbeit soll unsere Jugend Tugend lernen und eine großartige Generation idealistischer, tugendhafter Männer und Frauen heranwachsen."
ENG_fishing_industry_expansion:0 "Expansion der Fischereiindustrie"
ENG_fishing_industry_expansion_desc:0 "Großbritannien ist als Inselstaat von riesigen Meeren umgeben. In diesen Gewässern schlummert eine reichhaltige Nahrungsquelle, von der unsere Vorfahren lebten, und die heute noch lange nicht ausgeschöpft wird. Durch Investitionen in den Ausbau der Fischereiindustrie und die großflächige Einführung moderner Methoden können wir die britische Bevölkerung mit diesen nahrhaften Nahrungsmitteln versorgen und unsere Unabhängigkeit von ausländischen Quellen stärken. Ein solch rasanter Ausbau könnte einige unserer reaktionären Nachbarn, die unsere Meere überproportional ausbeuten, verärgern, doch Großbritannien ist eine stolze Nation und wird sich nicht vor der Meinung dieser rückständigen Ameisen fürchten."
