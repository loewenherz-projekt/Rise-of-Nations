ENG_national_bourgeoise_initiative:0 "Nationale Bürgerinitiative"
ENG_national_bourgeoise_initiative_desc:0 "Die Nationale Bourgeoisie-Initiative ist ein von unserer Regierung vorgelegter Entwicklungs- und Reformplan mit dem Ziel, die britische Wirtschaft anzukurbeln und die Voraussetzungen für eine vollständige Erholung vom Krieg und eine Ära des Wachstums und Wohlstands für unsere Nation zu schaffen."
