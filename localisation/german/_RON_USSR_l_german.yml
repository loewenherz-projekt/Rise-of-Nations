ENG_destruction_of_the_regime:0 "Zerstörung des Regimes"
ENG_destruction_of_the_regime_desc:0 "Wir können nicht hoffen, eine bessere Zukunft für Großbritannien zu schaffen, solange sich andere noch an das alte Regime erinnern. Wenn wir immer zurückblicken, kommen wir nicht voran, so einfach ist das. Wir werden die Vergangenheit für die Zukunft vergessen."
ENG_london_peoples_court:0 "Londoner Volksgericht"
ENG_london_peoples_court_desc:0 "Wie kann es sein, dass eine kommunistische Regierung nicht einmal an die Wünsche des Volkes glaubt? Das ist einfach nicht möglich! Deshalb wird das Volk ab heute im britischen Justizsystem mitreden dürfen, und alles wird gut."
