ENG_exports_revolution:0 "Exportrevolution"
ENG_exports_revolution_desc:0 "Um unsere Ideologie und unsere Lebensweise zu schützen und unsere Bürger vor möglichen zukünftigen Bedrohungen zu bewahren, werden wir unsere britischen Truppen in Überseegebieten belassen und versuchen, kommunistische und sozialistische Revolutionen in anderen Ländern zu inspirieren, um die Idee lebendig und aktuell zu halten. Die Überzeugungen von Karl Marx dürfen heute nicht enden!"
