 RON_Russian_Alt_History_News.109.t:0"[GER.GetName] kündigt groß angelegte Übungen an"
 RON_Russian_Alt_History_News.109.desc:0"Als Reaktion auf die ihrer Ansicht nach „zunehmend feindselige [SOV.GetAdjective] Rhetorik“ hat das [GER.GetAdjective] Militär eine Reihe großangelegter Militärübungen für dieses Jahr angekündigt.\n\nLaut Sprechern der [SOV.GetAdjective] Regierung hofft man, dass die erhöhte Bereitschaft das [SOV.GetAdjective] davon abhalten wird, „mit seiner verleumderischen Tirade fortzufahren“."
 RON_Russian_Alt_History_News.109.a:0"Sie haben uns direkt in die Hände gespielt!"
 RON_Russian_Alt_History_News.109.b:0"Das wird sie sicherlich zum Nachdenken anregen."
 RON_Russian_Alt_History_News.109.c:0"Hoffen wir, dass die [SOV.GetAdjective] uns nicht im Stich lassen …"
 RON_Russian_Alt_History_News.109.d:0"Sie tragen nicht dazu bei, die Situation zu entschärfen …"

 RON_Russian_Alt_History_News.121.t:0"[From.GetName] spricht sich gegen [GER.GetName] aus"
 RON_Russian_Alt_History_News.121.desc:0"Die [SOV.GetAdjective]-Regierung hat ihre Rhetorik gegen [GER.GetName] verschärft und warnt, dass Europas zentraler Nachbar eine „große preußische Bedrohung“ sei, die über dem Kontinent drohe. Ob es sich dabei um Panikmache oder um Tatsachen handelt, ist umstritten, aber es scheint, als ob die [SOV.GetName] darauf abzielt, den Kontinent gegen [GER.GetName] zu vereinen."
 RON_Russian_Alt_History_News.121.a:0"Die Welt muss von der [GER.GetAdjective]-Bedrohung erfahren!"
 RON_Russian_Alt_History_News.121.b:0"Wie können sie es wagen, uns so zu verleumden?!"
 RON_Russian_Alt_History_News.121.d:0"Wir werden sehen, wie die [GER.GetAdjective] das aufnehmen."
 

RON_Russian_Alt_History_News.1.t:0"Zweiter russischer Bürgerkrieg"
RON_Russian_Alt_History_News.1.d:0"Nachdem das Hauptziel des Sturms auf den Kreml, Stalin lebend gefangen zu nehmen, nicht erreicht wurde, scheint das Land nun in einen zweiten Bürgerkrieg verstrickt zu sein."
RON_Russian_Alt_History_News.1.a:0"OK"

RON_Russian_Alt_History_News.2.t:0"Nachkomme der Romanows zum Zaren gekrönt"
RON_Russian_Alt_History_News.2.d:0"Das Haus Romanow war von 1613 bis 1917 das regierende Zarenhaus Russlands. Es erlangte große Bekanntheit, nachdem die Zarin Anastasia Romanowa den ersten Zaren Russlands, Iwan den Schrecklichen, geheiratet hatte."
RON_Russian_Alt_History_News.2.a:0"OK"

RON_Russian_Alt_History_News.3.t:0"Sozialistische Revolutionäre Partei an der Macht in Russland"
RON_Russian_Alt_History_News.3.d:0"Die Sozialistische Revolutionäre Partei war eine bedeutende politische Partei im späten kaiserlichen Russland und in beiden Phasen der Russischen Revolution sowie im frühen Sowjetrussland."
RON_Russian_Alt_History_News.3.a:0"OK"

RON_Russian_Alt_History_News.4.t:0"Militärregierung in Russland an der Macht"
RON_Russian_Alt_History_News.4.d:0"Eine Militärdiktatur ist eine Diktatur, in der das Militär die vollständige oder weitgehende Kontrolle über die politische Autorität ausübt und der Diktator oft ein hochrangiger Militäroffizier ist."
RON_Russian_Alt_History_News.4.a:1"OK"

RON_Russian_Alt_History_News.5.t:0"Russische Faschistische Partei"
RON_Russian_Alt_History_News.5.d:0"Die Russische Faschistische Partei (RFP), manchmal auch Allrussische Faschistische Partei genannt, war eine kleine russische Emigrantenbewegung mit Sitz in Mandschukuo in den 1930er und 1940er Jahren."
RON_Russian_Alt_History_News.5.a:0"OK"

RON_Russian_Alt_History_News.6.t:0"Allrussische faschistische Organisation"
RON_Russian_Alt_History_News.6.d:0"Die Allrussische Faschistische Organisation (VFO) war eine Gruppe weißer russischer Emigranten unter der Führung von Anastasy Vonsyatsky. Sie hatte ihren Sitz in Putnam, Connecticut, USA, und wurde am 10. Mai 1933 gegründet."
RON_Russian_Alt_History_News.6.a:0"OK"

RON_Russian_Alt_History_News.9.t:0"Zweiter russischer Bürgerkrieg vorbei"
RON_Russian_Alt_History_News.9.d:0"Der Zweite Russische Bürgerkrieg ist mit einem Sieg der Militärregierung zu Ende gegangen."
RON_Russian_Alt_History_News.9.a:0"OK"

RON_Russian_Alt_History_News.10.t:0"Zweiter russischer Bürgerkrieg vorbei"
RON_Russian_Alt_History_News.10.d:0"Der Zweite Russische Bürgerkrieg ist mit einem Sieg der kommunistischen Regierung zu Ende gegangen."
RON_Russian_Alt_History_News.10.a:0"OK"

