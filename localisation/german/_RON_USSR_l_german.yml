ENG_a_professional_workforce:0 "Eine professionelle Belegschaft"
ENG_a_professional_workforce_desc:0 "Marx sprach bereits vor einem Jahrhundert von den revolutionären Auswirkungen der Arbeitsteilung auf die Welt und stellte damit die Weichen für unsere Befreiung aus dem jahrtausendealten Gefängnis feudaler Armut. Indem man die Produktion zur kollektiven Anstrengung vieler Arbeiter macht, die sich jeweils auf ihre eigene Arbeit spezialisieren, anstatt den gesamten Prozess einzeln zu wiederholen, kann man eine deutlich höhere Effizienz in der Produktion erreichen. Und das werden wir auch! Indem jeder Arbeiter auf seine Aufgabe spezialisiert wird und in eine gezielte Weiterbildung investiert, um diese vollständig zu meistern, profitiert die gesamte Gesellschaft. Dieser erstaunliche Prozess zeigt deutlich den unbestreitbaren Vorteil kollektiver, bewusster Anstrengung gegenüber der vieler Einzelner."
