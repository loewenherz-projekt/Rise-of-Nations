FNR_finnish_rebellion:0 "Finnland-Aufstand"
FNR_finnish_rebellion_desc:0 "Die Garnisonstruppen des Ministeriums wurden massenhaft mobilisiert, um diesen Aufstand niederzuschlagen. Wir müssen diesen Terroristen um jeden Preis Widerstand leisten! Es steht nicht nur die Sicherheit Russlands auf dem Spiel, sondern auch unser Leben und unsere Ehre.\n\nEin Erschießungskommando in Petrograd droht dem Generalgouverneur. Wir müssen siegen."
RUS_NOELRUD:0 "NOELRUD"
RUS_NOELRUD_desc:0 "Nationale Kommission zur Elektrifizierung ländlicher Gebiete"
RUS_failed_NEP:0 "Wirtschaftliche Stagnation"
RUS_successful_NEP:0 "Erfolge der NEP"
RUS_minorities_crisis:0 "Narodnost-Krise"
RUS_minorities_crisis_desc:0 "Unser Staat existiert, um für unser Volk zu sorgen, seine Traditionen gegen heimtückische Horden zu verteidigen und die natürliche Schönheit seines Mutterlandes zu bewahren. Doch was genau macht das russische Volk aus? Sollen wir Kasachen, Finnen, Esten oder sogar Juden als Russen betrachten? Die Frage, welcher Bevölkerungsgruppe unser Staat dienen soll und wie wir die zerstreuten Völker, die unter unserer Flagge stehen, wieder integrieren können, ist nach wie vor Gegenstand heftiger Debatten."
