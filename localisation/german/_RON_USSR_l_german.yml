RON_Russian_Alt_History.91.t:0"Von Russland gesponserter monarchistischer Putsch"
RON_Russian_Alt_History.91.d:0"Eine Monarchie ist eine Regierungsform, in der eine Person, der Monarch, auf Lebenszeit oder bis zur Abdankung Staatsoberhaupt ist. Die politische Legitimität und Autorität des Monarchen kann von eingeschränkt und weitgehend symbolisch (konstitutionelle Monarchie) bis hin zu vollständig autokratischer (absolute Monarchie) variieren und sich auf die Bereiche Exekutive, Legislative und Judikative erstrecken."

RON_Russian_Alt_History.92.t:0"Von Russland gesponserter monarchistischer Putsch"
RON_Russian_Alt_History.92.d:0"Eine Monarchie ist eine Regierungsform, in der eine Person, der Monarch, auf Lebenszeit oder bis zur Abdankung Staatsoberhaupt ist. Die politische Legitimität und Autorität des Monarchen kann von eingeschränkt und weitgehend symbolisch (konstitutionelle Monarchie) bis hin zu vollständig autokratischer (absolute Monarchie) variieren und sich auf die Bereiche Exekutive, Legislative und Judikative erstrecken."

