ENG_Import_Dependency_fishing_desc:0 "Unsere glorreiche Revolution beendete das rücksichtslose Kolonialregime vor über zwei Jahrzehnten. Doch mit dem Verlust der Kolonien, obwohl unvermeidlich und gerecht, ging auch Schaden für das Heimatland einher, insbesondere im Bereich der Landwirtschaft. Das Heimatland hat vor vielen Jahren seine landwirtschaftliche Selbstversorgung verloren und ist mit dem Verlust billiger Importe aus den Kolonien auf Lebensmittelimporte aus Frankreich und anderen Verbündeten angewiesen, was unsere Wirtschaft belastet."
