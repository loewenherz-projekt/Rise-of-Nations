 soviet.490.t:0"Tuchatschewski startet einen Putsch!"
 soviet.490.d:0"Marschall Tuchatschewski hat den vertrauensseligen Stalin ausgetrickst und einen Militärputsch gestartet. Einige loyale Offiziere haben sich um Stalin geschart, doch das Militär ist fast gespalten. Dieser Krieg muss schnell beendet werden, bevor alle Fortschritte und Errungenschaften des sowjetischen Volkes zunichte gemacht werden."
 soviet.490.a:0"Es geht um den Krieg."
 soviet.65.t:0"Trotzki verrät die Arbeiterrevolution!"
 soviet.65.d:0"Das sowjetische Volk hat erfahren, dass Trotzki ein stillschweigendes diplomatisches Bündnis mit dem faschistischen Reich Deutschland geschlossen hat. Verständlicherweise ist es empört, dass die Arbeiterrevolution auf Eis gelegt wurde, um einen Pakt mit dem Teufel zu schließen. Unruhen in der Sowjetunion breiten sich wie ein Lauffeuer aus."
 soviet.65.a:0"Ein schwerer Rückschlag."
 soviet.66.t:0"Vereinter Widerstand gegen die sowjetische Expansion"
 soviet.66.d:0"Die Sowjetunion setzt militärische Gewalt ein, um in unserem Land eine marxistische Revolution zu beginnen. Das ist nicht hinnehmbar. Auch wenn wir diesem Ungetüm allein nicht Paroli bieten können, können wir unsere Nachbarn, die sich ebenfalls Sorgen um die sowjetische Bedrohung machen, um Hilfe bitten."
 soviet.66.a:0"Rufen Sie andere freie Nationen zum Kampf auf."
 soviet.67.t:0"[From.GetName] ruft freie europäische Nationen zum Krieg auf"
 soviet.67.d:1"Der Antisowjetpakt verpflichtet alle Unterzeichnerstaaten, sich an Verteidigungskonflikten mit der Sowjetunion zu beteiligen. [From.GetName] wurde nun von den Sowjets angegriffen und hat alle Paktmitglieder um sofortige Hilfe gebeten. Es ist an der Zeit, [Root.GetAdjective] zu zeigen, dass man die Welt ein für alle Mal vor der Bedrohung durch die Sowjetunion schützen will."
 soviet.67.d:1"Es darf nicht zugelassen werden, dass die Sowjetunion ihre militärische Macht nutzt, um die Ausbreitung des Kommunismus in Europa zu erzwingen. Der Kommunismus ist eine abscheuliche Plage für die Welt und widerspricht allem, was uns lieb und teuer ist. [From.GetName] wurde nun von den Sowjets angegriffen und hat alle freien europäischen Nationen um sofortige Hilfe gebeten."
 soviet.67.a:2"[From.GetName] steht nicht allein"
 
 
