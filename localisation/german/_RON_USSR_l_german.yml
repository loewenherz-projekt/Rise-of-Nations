 news.1995.t:0"Die Sowjetunion beginnt mit massiven Militärübungen"
 news.1995.d:0"Infanterie lag in sorgfältig vorbereiteten Stellungen, während verschiedene Angriffe simuliert wurden. Panzerkolonnen rasten über die russische Steppe, unterstützt von Tieffliegern und berittener Infanterie, und steuerten mit atemberaubender Geschwindigkeit auf ihre Ziele zu. Die militärische Macht der Sowjetunion wurde der Welt präsentiert – ein beeindruckendes Schauspiel." 
 news.1995.a:0"Versuchen sie, uns einzuschüchtern?" 
 news.1995.b:0"Herrlich." 
 
 news.1996.t:0"Die Sowjetunion mobilisiert Einheiten"
 news.1996.d:0"Heute mobilisierte die Sowjetunion Reservedivisionen. Tausende Männer eilten von ihren Arbeitsplätzen zu verschiedenen Sammelpunkten. Schnell wurden die Männer in ihre jeweiligen Einheiten eingeteilt und für den Einsatz in den Krieg vorbereitet." 
 news.1996.a:0"Die friedlichen Kommunisten sind wieder dabei ..." 
 news.1996.b:0"Hoffen wir, dass wir sie nicht zum Kämpfen zwingen." 
 
 
 
 
 
 
 
 soviet.200.t:0"Der Prozess gegen die Sechzehn"
 soviet.200.d:0"Wir haben eine Gruppe von sechzehn geständigen Terroristen, die versucht haben, Stalin und andere Mitglieder der Sowjetregierung zu ermorden, des Hochverrats angeklagt. Da sie der Planung einer Verschwörung gegen den Staat für schuldig befunden wurden, müssen sie zum Schutz unserer Union unverzüglich hingerichtet werden." 
 soviet.200.a:0"Die Sicherheit unserer Union und ihrer Bevölkerung hat oberste Priorität." 
 
 soviet.201.t:0"Der Prozess gegen das parallele antisowjetische trotzkistische Zentrum"
 soviet.201.d:0"Siebzehn Männer stehen wegen Hochverrats vor Gericht. Die Anklage lautet: Verschwörung zum Staatssturz, Zusammenarbeit mit dem im Exil lebenden Konterrevolutionär Trotzki und Komplott zum Sturz unseres Premiers Stalin! Die Anklage gegen die Siebzehn ist eindeutig. Wir haben Geständnisse der Angeklagten. Radek hat uns mitgeteilt, dass eine dritte Organisation von Trotzkisten-Sympathisanten unter uns operiert. Wir müssen entscheiden, wie es weitergeht. Wo wollen wir als Nächstes säubern?"
 soviet.201.a:0"Radek hat Tuchatschewski belastet, wir müssen das Oberkommando säubern!" 
 #soviet.201.b:0"Bukharin has been implicated, we must interrogate him next to find what he knows!" 
 soviet.201.c:0"Landau hat Stalin kritisiert. Wir können nicht zulassen, dass sich diese Fäulnis unter unseren Wissenschaftlern ausbreitet!" 
 
 soviet.202.t:0"Die Verhaftung Tuchatschewskis und hochrangiger Offiziere"
 soviet.202.d:0"Wir haben herausgefunden, dass Tuchatschewski mit dem faschistischen deutschen Regime konspiriert hat, um unsere Union zu stürzen und Josef Stalin zu töten. Die uns vorliegenden Geheimdienstberichte sind belastbar. Unsere Spione im Reich konnten Dokumente aus Reinhardt Heydrichs Schreibtisch beschaffen, die Tuchatschewskis Verrat bestätigen."
 soviet.202.a:0"Tuchatschewski ist die Wurzel der Fäulnis, nehmen Sie nur ihn."
 soviet.202.b:0"Finden Sie einen Mittelweg, nehmen Sie so viele wie möglich, aber nicht zu viele."
 soviet.202.c:0"Wir dürfen nichts unversucht lassen und sie alle mitnehmen."
 
 soviet.203.t:0"Der Fall Landau"
 soviet.203.d:0"Es wurde berichtet, dass einer unserer Spitzenwissenschaftler das derzeitige Regime kritisierte. Selbstverständlich regelten die staatlichen Sicherheitskräfte die Angelegenheit, indem sie ihn inhaftierten. Nun hat einer seiner Kollegen einen Brief an Stalin geschickt und mit Rücktritt gedroht."
 soviet.203.a:0"Lassen Sie Landau sofort frei!"
 soviet.203.b:0"Landau muss in Haft bleiben."
 
 soviet.204.t:0"Die Verhaftung von Landau und prominenten Wissenschaftlern"
 soviet.204.d:0"Dem Staatssicherheitsdienst ist zu Ohren gekommen, dass einige unserer Spitzenwissenschaftler das derzeitige Regime kritisiert haben. Da es sich um eine potenziell heikle Angelegenheit handelt, wartete der NKWD Stalins Reaktion ab, bevor er handelte."
 soviet.204.a:0"Es scheint, als ginge es hauptsächlich um Landau, ihn einzusperren und damit wäre die Sache erledigt."
 soviet.204.b:0"Wir müssen diesen Verfall weiter untersuchen."
 soviet.204.c:0"Ausländischer Einfluss muss um jeden Preis gestoppt werden, wo immer er auftritt."
 
 soviet.205.t:0"Der Fall Tuchatschewski"
 soviet.205.d:0"Es wurde festgestellt, dass Tuchatschewski möglicherweise an einem Komplott mit Hitler-Agenten beteiligt war, um Stalin zu stürzen und die Arbeiterrevolution in der UdSSR zu untergraben. Der NKWD hat Nazi-Dokumente sichergestellt, die dies belegen. Würde die Angelegenheit an die Öffentlichkeit gelangen, wäre dies ein riesiger Skandal."
 soviet.205.a:0"Weisen Sie ihm eine untergeordnete Position im Generalstab zu."
 soviet.205.b:0"Er muss eingesperrt werden."
  
 soviet.206.t:0"Der Fall der trotzkistischen antisowjetischen Militärorganisation"
 soviet.206.d:0""
 soviet.206.a:0"Fokus auf die Armeegeneräle"
 soviet.206.b:0"Konzentrieren Sie sich auf die Admirale der Marine"
 soviet.206.c:0"Fokus auf die Generäle der Militärluftwaffe"
 
 soviet.207.t:0"Verhör der Armeegeneräle"
 soviet.207.d:0""
 soviet.207.a:0"Wir müssen nachsichtig sein – die militärische Notwendigkeit erfordert es!"
 soviet.207.b:0"Suchen Sie den Mittelweg – richten Sie die schlimmsten Übeltäter hin und begnadigen Sie den Rest."
 soviet.207.c:0"Alle Beteiligten müssen mit den Konsequenzen rechnen!"
 
 soviet.208.t:0"Verhör der Marineadmirale"
 soviet.208.d:0""
 soviet.208.a:0"Wir müssen nachsichtig sein – die militärische Notwendigkeit erfordert es!"
 soviet.208.b:0"Suchen Sie den Mittelweg – richten Sie die schlimmsten Übeltäter hin und begnadigen Sie den Rest."
 soviet.208.c:0"Alle Beteiligten müssen mit den Konsequenzen rechnen!"
 
 soviet.209.t:0"Verhör der Generäle der Luftwaffe"
