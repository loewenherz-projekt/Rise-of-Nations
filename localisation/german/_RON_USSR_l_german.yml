ENG_noninterventionalism:0 "Nichtinterventionismus"
ENG_noninterventionalism_desc:0 "Um sicherzustellen, dass wir unseren kommunistischen Überzeugungen treu bleiben, werden ab sofort alle im Ausland stationierten britischen Truppen nach London zurückgerufen, sofern sie uns nicht den Krieg erklären oder eine Bedrohung für die Arbeiter und unsere Ideologie darstellen. Es geht um die Arbeiter, und das muss funktionieren."
ENG_the_british_nationalities:0 "Über die britischen Nationalitäten"
ENG_the_british_nationalities_desc:0 "Das heutige Großbritannien besteht nicht nur aus Engländern, sondern auch aus Walisern im Westen und Schotten im Norden. Um ein bescheidenes und glückliches Großbritannien zu schaffen, müssen wir auf jede einzelne Kultur eingehen, um sicherzustellen, dass niemand rebelliert."
