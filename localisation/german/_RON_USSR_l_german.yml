### Cosmetic Tag ###

### Starting Ideas ### 

ENG_united_britain:0 "Vereinigtes Großbritannien"
ENG_united_britain_desc:0 "Sein Name ist uralt, doch seine Geschichte ist geprägt vom Leid zweier Nationen, die ewig im Krieg liegen. Eine Nation der vergessenen, sanften Kinder der englischen Weiden, verdammt zu tausend Jahren der Demütigung und des Elends durch die Nation der Faulenzer und des spaltenden Stammesdenkens, das Brüder gegen Brüder aufhetzte, wie Schotten gegen Anglos. Nicht mehr, die Ketten sind gesprengt, Großbritannien ist wieder eine Nation."
ENG_postwar_recession:0 "Nachkriegsrezession"
ENG_postwar_recession_desc:0 "Das Revolutionäre Industrieprogramm von Genosse Mosley hat unsere Nation auf den jüngsten titanischen Kampf vorbereitet und uns den Lorbeer des Siegers auf die Stirn gebracht. Doch der Frieden ist zurückgekehrt, und die Wirtschaft kämpft darum, zur Normalität zurückzukehren."
ENG_french_rivalry:0 "Französische Rivalität – geringe Feindseligkeit"
ENG_french_rivalry_desc:0 "Der Sozialismus ist kein Altar, auf dem wir sterben, sondern das bewegende Herz des Volkes. Die Arroganz von Paris würde uns etwas anderes erzählen, und das ist ihr gutes Recht, aber im schönen Britannien haben wir eine bestimmte Art, Dinge zu tun. Während die französisch dominierte Internationale Großbritanniens Weg zum Sozialismus bisher toleriert, könnte sich diese Politik in Zukunft ändern und schwierige Zeiten mit sich bringen."
ENG_food_import:0 "Abhängigkeit von Nahrungsmittelimporten"
ENG_food_import_desc:0 "Unsere glorreiche Revolution beendete das rücksichtslose Kolonialregime vor über zwei Jahrzehnten. Doch mit dem Verlust der Kolonien, obwohl unvermeidlich und gerecht, ging auch Schaden für das Heimatland einher, insbesondere im Bereich der Landwirtschaft. Das Heimatland hat vor vielen Jahren seine landwirtschaftliche Selbstversorgung verloren und ist mit dem Verlust billiger Importe aus den Kolonien auf Lebensmittelimporte aus Frankreich und anderen Verbündeten angewiesen, was unsere Wirtschaft belastet."


