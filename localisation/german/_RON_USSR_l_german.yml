ENG_rural_renovation:0 "Ländliche Renovierung"
ENG_rural_renovation_desc:0 "Großbritanniens ländliche Gebiete dürfen nicht länger vernachlässigt werden! Die ländlichen Arbeiter bilden das Rückgrat unserer Nation, jene ehrlichen Männer, die unsere Lebensmittel anbauen. Alte, kaputte Infrastruktur soll wiederaufgebaut, vernachlässigte, sterbende Dörfer wieder zum Leben erweckt und rückständige Bauernhöfe mit der nötigen Aufmerksamkeit auf das Niveau fortschrittlicher Produktion gebracht werden, das einem modernen Land würdig ist."
