 soviet.237.d:0""
 soviet.237.a:0"Unterstützen Sie die kriegsgefährdeten Tschechen!"
 soviet.237.b:0"Unterstützung der tschechischen Souveränität."
 soviet.237.c:0"Schließen Sie sich der sowjetischen Solidarität mit den Tschechen an."
 soviet.237.e:0"Weigern Sie sich, die Tschechoslowakei zu unterstützen."
 
 soviet.238.t:0"Die Westmächte reagieren auf unsere Bitte, der Tschechoslowakei zu helfen"
 soviet.238.d:0""
 soviet.238.a:0"Großartig!"
 soviet.238.b:0"Wie schade."
 
 soviet.239.t:0"Das sowjetische Bekenntnis zur tschechoslowakischen Souveränität"
 soviet.239.d:0""
 soviet.239.a:0"Treten Sie der sowjetischen Einflusssphäre bei."
 soviet.239.b:0"Einen solchen Fehler können wir uns nicht leisten."
 
