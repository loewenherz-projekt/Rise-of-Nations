assassinate_tito_name:0"Tito ermorden"
assassinate_tito_desc:0"Tito wählte seinen eigenen Weg, seine unabhängige Politik bedroht unseren Einfluss in der Region. Der Titoismus stellt unsere Vision des Kommunismus in Frage, deshalb sollten wir die Situation in den Griff bekommen, bevor sie außer Kontrolle gerät."
#
SOV_cw_shattered_star:0"Zerschmetterter Stern"
SOV_cw_shattered_star_desc:0"Die Sowjetunion hat an der Front katastrophale Niederlagen erlitten. Unser einst mächtiger Stern ist zerbrochen, und wir müssen nun die Scherben aufsammeln. Dies ist eine Zeit großer Gefahren, aber auch voller Chancen. Wir müssen unsere Verteidigung neu organisieren und verstärken und die Bevölkerung mobilisieren, um dem Ansturm standzuhalten. Nur durch schiere Entschlossenheit und strategisches Geschick können wir überleben und unseren verlorenen Ruhm zurückgewinnen."
SOV_CW_assess_our_losses:0"Bewerten Sie unsere Verluste"
SOV_CW_assess_our_losses_desc:0"Die jüngsten Niederlagen haben unser Militär und unsere Infrastruktur in Trümmern hinterlassen. Wir müssen unsere Verluste gründlich analysieren, um das volle Ausmaß des Schadens zu erfassen. Nur so können wir fundierte Entscheidungen über den Einsatz unserer verbleibenden Ressourcen und die Planung der Bergung und des Wiederaufbaus unserer Streitkräfte und unseres Territoriums treffen."
SOV_CW_prepare_for_hard_times:0"Bereiten Sie sich auf harte Zeiten vor"
SOV_CW_prepare_for_hard_times_desc:0"Die kommenden Tage werden voller Not und Kampf sein. Wir müssen uns auf die bevorstehenden schwierigen Zeiten vorbereiten, indem wir Vorräte anlegen, unsere Verteidigung stärken und sicherstellen, dass unser Volk bereit ist, die kommenden Prüfungen zu bestehen. Nur durch Widerstandsfähigkeit und Einigkeit können wir hoffen, die bevorstehenden Widrigkeiten zu überwinden."
SOV_CW_dissolve_state:0"Den Staat auflösen"
SOV_CW_dissolve_state_desc:0"Der Zusammenbruch unserer zentralisierten Staatsstruktur nach den verheerenden Kriegsverlusten hat uns gezwungen, unser Regierungsmodell zu überdenken. Wir werden den bestehenden Staatsapparat auflösen und die Macht auf regionale Gremien übertragen. Diese Dezentralisierung wird den Weg für die Gründung der Russischen Sowjetrepublik ebnen. Ziel ist es, unser Land zu stabilisieren und die lokale Führung in diesen turbulenten Zeiten zu stärken."
SOV_CW_rebuild_economy:0"Wirtschaftliche Grundlagen neu beleben"
SOV_CW_rebuild_economy_desc:0"Nach dem Konflikt liegt unsere Wirtschaft in Trümmern. Wir müssen umfassende Anstrengungen unternehmen, um unsere wirtschaftlichen Grundlagen wiederaufzubauen. Dabei müssen wir uns auf die Wiederbelebung der Industrien, die Wiederherstellung der Handelsnetzwerke und die Stabilisierung unserer Finanzinstitute konzentrieren."
SOV_CW_launch_mongolian_campaign:0"Starten Sie die mongolische Kampagne"
SOV_CW_launch_mongolian_campaign_desc:0"Es ist an der Zeit, der mongolischen Bedrohung entschieden entgegenzutreten. Ein militärischer Feldzug gegen die Mongolei sichert unsere Grenzen, festigt unsere Dominanz in der Region und beseitigt diese anhaltende Bedrohung unserer Souveränität."
SOV_CW_infrastructure_development:0"Modernisierung der Infrastruktur"
SOV_CW_infrastructure_development_desc:0"Unsere Infrastruktur hat unter den Kriegszerstörungen schwer gelitten. Wir müssen dringend ein umfassendes Infrastrukturentwicklungsprogramm in Angriff nehmen, um unsere Straßen, Eisenbahnen und Kommunikationsnetze zu reparieren und zu modernisieren."
SOV_CW_technological_advancements:0"Technologische Innovation fördern"
SOV_CW_technological_advancements_desc:0"Um unsere Zukunft zu sichern, müssen wir in technologischen Fortschritt investieren. Durch die Förderung von Innovation und Forschung können wir technologische Überlegenheit erreichen und deren Vorteile für das Wachstum unseres Landes nutzen."
SOV_CW_internal_stability:0"Interne Stabilität gewährleisten"
SOV_CW_internal_stability_desc:0"In diesen turbulenten Zeiten ist die Gewährleistung der inneren Stabilität von größter Bedeutung. Wir müssen soziale Unruhen bekämpfen, die Regierungsführung stärken und die Rechtsstaatlichkeit wahren, um unser Land vor inneren Bedrohungen zu schützen."
SOV_CW_industrial_reforms:0"Industriereformen umsetzen"
SOV_CW_industrial_reforms_desc:0"Die Modernisierung unseres Industriesektors ist für den Wiederaufbau unserer Stärke von entscheidender Bedeutung. Die Umsetzung von Industriereformen wird die Effizienz steigern, die Produktionskapazität erhöhen und unsere wirtschaftliche Widerstandsfähigkeit stärken."
SOV_CW_agricultural_recovery:0"Wiederherstellung des Agrarsektors"
SOV_CW_agricultural_recovery_desc:0"Unser Agrarsektor hat Rückschläge erlitten. Wir müssen der Erholung der Landwirtschaft Priorität einräumen, um die Ernährungssicherheit zu gewährleisten, die landwirtschaftliche Produktion zu steigern und die ländlichen Gemeinden zu unterstützen."
SOV_CW_education_reforms:0"Reform des Bildungssystems"
SOV_CW_education_reforms_desc:0"Bildung ist der Grundstein unseres zukünftigen Wohlstands. Reformen im Bildungsbereich fördern die Ausbildung qualifizierter Arbeitskräfte, fördern Innovationen und stärken die Selbstbestimmung unserer Bürger."
SOV_CW_healthcare_investment:0"Investieren Sie in das Gesundheitswesen"
SOV_CW_healthcare_investment_desc:0"Die Verbesserung der Gesundheitsversorgung ist für das Wohlergehen unserer Bevölkerung von entscheidender Bedeutung. Investitionen in die Gesundheitsinfrastruktur, die Ausbildung von medizinischem Fachpersonal und die Gewährleistung des Zugangs zu einer hochwertigen Gesundheitsversorgung tragen zur Verbesserung der öffentlichen Gesundheit bei."
SOV_CW_energy_independence:0"Erreichen Sie Energieunabhängigkeit"
SOV_CW_energy_independence_desc:0"Die Erreichung der Energieunabhängigkeit ist für unsere nationale Sicherheit und wirtschaftliche Stabilität von entscheidender Bedeutung. Wir müssen erneuerbare Energiequellen entwickeln, die Energieinfrastruktur verbessern und die Abhängigkeit von ausländischer Energie verringern."
SOV_CW_political_stability:0"Stärkung der politischen Institutionen"
SOV_CW_political_stability_desc:0"Politische Stabilität ist für eine effektive und vertrauensbildende Regierungsführung unerlässlich. Die Stärkung der politischen Institutionen, die Förderung der Konsensbildung und die Gewährleistung von Transparenz sichern die Stabilität unseres Landes."
SOV_CW_diplomatic_ties:0"Verbesserung der diplomatischen Beziehungen"
SOV_CW_diplomatic_ties_desc:0"Der Aufbau starker diplomatischer Beziehungen ist für die Gestaltung internationaler Beziehungen von entscheidender Bedeutung. Wir müssen proaktiv mit anderen Nationen zusammenarbeiten, Allianzen schmieden und diplomatische Maßnahmen ergreifen, um unsere nationalen Interessen zu fördern."
SOV_CW_security_measures:0"Sicherheitsmaßnahmen verbessern"
SOV_CW_security_measures_desc:0"Die Verbesserung der Sicherheitsmaßnahmen ist zum Schutz unserer Grenzen und Bürger unerlässlich. Die Stärkung der militärischen Bereitschaft, die Stärkung der Strafverfolgungsbehörden und die Verbesserung der Geheimdienstfähigkeiten werden unser Land schützen."
SOV_CW_counterintelligence:0"Implementieren Sie Spionageabwehr"
SOV_CW_counterintelligence_desc:0"Um unser Land vor internen und externen Bedrohungen zu schützen, bedarf es einer umfassenden Spionageabwehr. Wir müssen Spionageaktivitäten aufdecken und neutralisieren, sensible Informationen schützen und nationale Interessen wahren."
SOV_CW_international_relations:0"Förderung internationaler Beziehungen"
SOV_CW_international_relations_desc:0"Die Förderung positiver internationaler Beziehungen ist der Schlüssel zur Verbesserung unseres globalen Ansehens. Vertrauensbildung, die Förderung der Zusammenarbeit und diplomatisches Engagement stärken unseren Einfluss auf der Weltbühne."
SOV_CW_border_security:0"Sichere Grenzverteidigung"
SOV_CW_border_security_desc:0"Die Sicherung unserer Grenzen ist für die nationale Verteidigung und Souveränität von entscheidender Bedeutung. Durch die Verbesserung der Grenzsicherheit, die Verstärkung der Verteidigungsanlagen und den Einsatz wirksamer Grenzkontrollmaßnahmen wird unsere territoriale Integrität geschützt."
SOV_CW_propoganda_campaign:0"Starten Sie eine Propagandakampagne"
SOV_CW_propoganda_campaign_desc:0"Die öffentliche Meinungsbildung ist für die Stärkung der nationalen Einheit von entscheidender Bedeutung. Der Start einer Propagandakampagne stärkt die Moral, weckt Patriotismus und stärkt die Unterstützung für unsere Regierung."
SOV_CW_alliance_building:0"Bauen Sie strategische Allianzen auf"
SOV_CW_alliance_building_desc:0"Die Stärkung von Bündnissen mit gleichgesinnten Nationen ist für die gemeinsame Sicherheit und den Wohlstand von entscheidender Bedeutung. Der Aufbau strategischer Partnerschaften, die Förderung des Vertrauens und die gegenseitige Zusammenarbeit werden unseren diplomatischen Einfluss stärken."
SOV_CW_crisis_management:0"Krisenmanagement entwickeln"
SOV_CW_crisis_management_desc:0"Die Entwicklung effektiver Krisenmanagementstrategien ist unerlässlich, um in Notfällen schnell und entschlossen reagieren zu können. Die Festlegung von Protokollen, die Schulung von Einsatzkräften und die Koordinierung von Ressourcen mindern Risiken und schützen unser Land."
SOV_CW_rebuild_airforce:0"Wiederaufbau der Luftwaffe"
SOV_CW_rebuild_airforce_desc:0"Unsere Luftwaffe hat erhebliche Verluste erlitten. Der Wiederaufbau unserer Luftwaffenkapazitäten, die Modernisierung der Ausrüstung und die Ausbildung qualifizierter Piloten sind entscheidende Schritte zur Wiedererlangung der Lufthoheit."
SOV_CW_rebuild_army:0"Wiederaufbau der Bodentruppen"
SOV_CW_rebuild_army_desc:0"Nach den jüngsten Konflikten ist der Wiederaufbau unserer Bodentruppen von größter Bedeutung. Die Stärkung der Militäreinheiten, die Auffüllung der Vorräte und die Verbesserung der Kampfbereitschaft werden die Schlagkraft unserer Armee wiederherstellen."
SOV_CW_reorganize_military_leadership:0"Optimieren Sie die militärische Führung"
SOV_CW_reorganize_military_leadership_desc:0"Die Optimierung der militärischen Führung ist für operative Effizienz und strategische Führung von entscheidender Bedeutung. Die Bewertung der Führung, die Förderung talentierter Offiziere und die Implementierung effektiver Kommandostrukturen tragen zur Optimierung der militärischen Effektivität bei."
SOV_CW_dominate_the_skies:0"Erlangen Sie die Luftüberlegenheit"
SOV_CW_dominate_the_skies_desc:0"Luftüberlegenheit ist entscheidend für militärischen Erfolg. Der Ausbau unserer Luftkampffähigkeiten, die Entwicklung fortschrittlicher Flugzeugtechnologien und intensives Training sichern unsere Dominanz am Himmel."
SOV_CW_strategic_planning:0"Strategische Planung"
SOV_CW_strategic_planning_desc:0"Die Entwicklung umfassender strategischer Pläne ist für die Erreichung nationaler Ziele unerlässlich. Die Formulierung klarer Ziele, die Bewertung von Risiken und die effektive Koordination von Ressourcen ebnen unseren Weg zum Erfolg."
SOV_CW_logistics_preparation:0"Logistik vorbereiten"
SOV_CW_logistics_preparation_desc:0"Die Stärkung der logistischen Kapazitäten ist für die Unterstützung militärischer Operationen von entscheidender Bedeutung. Die Verbesserung von Lieferketten, die Erweiterung der Transportnetzwerke und die Optimierung des Ressourcenmanagements gewährleisten die Einsatzbereitschaft."
SOV_CW_prepare_for_mongolian_invasion:0"Bereiten Sie sich auf den Mongolenfeldzug vor"
SOV_CW_prepare_for_mongolian_invasion_desc:0"Um der mongolischen Bedrohung entgegenzutreten, ist Vorbereitung unerlässlich. Der Aufbau von Verteidigungsanlagen, die Mobilisierung von Streitkräften und die Planung strategischer Einsätze gewährleisten unsere Bereitschaft zu entschlossenem Handeln."
SOV_CW_negotiate_stage_1:0"Beginnen Sie mit den Verhandlungen"
SOV_CW_negotiate_stage_1_desc:0"Beginnen Sie Verhandlungen mit den Nachbarstaaten, um territoriale Zugeständnisse zu sichern, insbesondere in Regionen wie Sibirien. Diplomatische Bemühungen sind entscheidend, um verlorene Gebiete zurückzugewinnen und unsere Grenzen zu stärken."
SOV_CW_negotiate_siberia:0"Verhandeln Sie über Sibirien"
SOV_CW_negotiate_siberia_desc:0"Wir nehmen diplomatische Verhandlungen mit den Nachbarländern auf, um territoriale Zugeständnisse in den sibirischen Regionen zu sichern. Mit friedlichen Mitteln wollen wir verlorene Gebiete zurückgewinnen und stabile Grenzen schaffen."
SOV_CW_negotiate_sakhalin:0"Verhandeln Sie Sachalin"
SOV_CW_negotiate_sakhalin_desc:0"Wir gehen in die dritte Phase der Verhandlungen mit den Nachbarstaaten über territoriale Zugeständnisse auf der Insel Sachalin. Unsere diplomatischen Bemühungen sind entscheidend, um verlorene Gebiete zurückzugewinnen und unsere Grenzen zu stärken."
SOV_CW_negotiate_stage_2:0"Phase 2 Verhandlungen"
SOV_CW_negotiate_stage_2_desc:0"Die zweite Phase der Verhandlungen mit den Nachbarländern soll über territoriale Zugeständnisse in den östlichen Regionen eingeleitet werden. Diplomatische Initiativen sind für die Rückgewinnung verlorener Gebiete und die Gewährleistung der nationalen Sicherheit von entscheidender Bedeutung."
SOV_CW_reclaim_eastern_lands:0"Erobern Sie die östlichen Länder zurück"
SOV_CW_reclaim_eastern_lands_desc:0"Starten Sie eine strategische Initiative zur Rückeroberung und Sicherung der Gebiete in den östlichen Regionen durch militärische Operationen und diplomatische Verhandlungen. Diese Bemühungen sind für die Konsolidierung unserer Landesgrenzen und die Wiederherstellung historischer Gebiete von entscheidender Bedeutung."
SOV_CW_occupational_planning:0"Berufsplanung"
SOV_CW_occupational_planning_desc:0"Entwickeln Sie detaillierte Pläne für die Besatzungsverwaltung der kürzlich erworbenen Gebiete, um Stabilität, Ressourcennutzung und Integration in den strategischen Rahmen der Sowjetunion sicherzustellen."
SOV_cw_end_of_riots:0"§RDie Unruhen unterdrücken§!"
SOV_cw_end_of_riots_desc:0"Nach einer Zeit heftiger Unruhen und Proteste in verschiedenen Regionen gelang es den sowjetischen Behörden, den Widerstand durch entschlossene Maßnahmen zu unterdrücken. Die Lage ist nun unter Kontrolle, und in den betroffenen Gebieten ist die Ordnung wiederhergestellt. Dies ist ein bedeutender Moment in unseren Bemühungen, Stabilität und Einheit innerhalb unserer Grenzen zu wahren."
# events
RI_reliant_on_german:0 "Auf deutsche Infrastruktur angewiesen"
RI_reliant_on_german_desc:0 "Die Sowjetunion ist für ihre wirtschaftlichen und militärischen Operationen zunehmend von der deutschen Infrastruktur abhängig. Diese Abhängigkeit stellt erhebliche strategische und politische Herausforderungen dar und verdeutlicht die Schwachstellen des sowjetischen Logistiknetzwerks. Angesichts zunehmender Spannungen wird der Aufbau einer unabhängigen Infrastruktur immer dringlicher."
SOV_CW_ger_vic.1.t:0"Sowjetische Demilitarisierung der Westgrenze"
SOV_CW_ger_vic.1.d:0"Nach der verheerenden Niederlage gegen §b[GER.GetName]§! war die Sowjetunion gezwungen, ihre Westgrenzen an das §bReichskommissariat Moskau§!, §bDon-Wolga§! und §bKaukasus§! zu demilitarisieren. Gemäß den Bedingungen der siegreichen deutschen Streitkräfte wird die Rote Armee ihre Einheiten aus diesen strategischen Gebieten abziehen. Dies markiert einen bedeutenden Wandel in der sowjetischen Militärstrategie mit dem Ziel, eine weitere Eskalation zu verhindern. Die Demilitarisierung beinhaltet den Abbau von Befestigungen, die Auflösung militärischer Einheiten und die Einstellung aller Verteidigungsoperationen entlang der festgelegten Grenzen, um den Forderungen von §b[GER.GetName]§! nachzukommen und Stabilität zu gewährleisten. Offizielle Stellen von §R[This.GetName]§! erklären, dieser notwendige Schritt diene dem Erhalt der Nation und der Vorbereitung auf zukünftige Herausforderungen, da der Widerstandsgeist in der sowjetischen Bevölkerung nach wie vor stark sei."
SOV_CW_ger_vic.1.a:0"§CReorganisation und Compliance§!"
SOV_CW_ger_vic.2.t:0"Eskalierende Unruhen in Kasachstan"
SOV_CW_ger_vic.2.d:0"Berichte aus Kasachstan deuten auf eine Zunahme von Unruhen hin, die durch tiefsitzenden Groll gegen die sowjetische Besatzung und Politik angeheizt werden. Die Unruhen haben sich verschärft und stellen eine ernsthafte Herausforderung für die sowjetische Herrschaft in der Region dar. Zu den Beschwerden zählen wirtschaftliche Not, kulturelle Unterdrückung und wahrgenommene politische Unterdrückung, was die weit verbreitete Unzufriedenheit der lokalen Bevölkerung widerspiegelt. Die Behörden mobilisieren zusätzliche Kräfte, um die Unruhen zu unterdrücken und die Ordnung wiederherzustellen, da eine weitere Eskalation und Destabilisierung befürchtet wird."
SOV_CW_ger_vic.2.a:0"Unterdrückt die §RTräter§!"
SOV_CW_ger_vic.2.b:0"§BNegotiations§ einleiten!"
SOV_CW_ger_vic.3.t:0"Umfassende Bewertung der Kriegsschäden"
SOV_CW_ger_vic.3.d:0"Der jüngste Konflikt hat unserem Land verheerende Schäden zugefügt und kritische Sektoren auf allen Ebenen beeinträchtigt. Unsere Luftwaffe hat schwer gelitten: Strategische Stützpunkte wurden bombardiert und Flugplätze in Trümmern hinterlassen. Unsere Fähigkeit, unseren Luftraum zu verteidigen und Luftunterstützung zu leisten, ist dadurch stark beeinträchtigt. Am Boden steht unsere Armee vor Herausforderungen, da wichtige Militäreinrichtungen massiv angegriffen wurden. Dies führte zum Verlust wichtiger Ausrüstung und logistischer Knotenpunkte und beeinträchtigt unsere Einsatzbereitschaft und Verteidigungsfähigkeit erheblich. Auch unsere Wirtschaft ist stark betroffen: Industriezentren liegen in Trümmern, Verkehrsnetze sind unterbrochen und wichtige Ressourcen erschöpft, was unsere Wirtschaft in Aufruhr und Unsicherheit stürzt. Die kumulativen Auswirkungen dieser Schäden stellen eine immense Herausforderung dar, die sofortiges und strategisches Handeln erfordert, um den Wiederaufbau einzuleiten und die Widerstandsfähigkeit unseres Landes zu gewährleisten."
SOV_CW_ger_vic.3.a:0"Priorisierung der Bemühungen zum militärischen Wiederaufbau"
SOV_CW_ger_vic.3.b:0"Schwerpunkt auf wirtschaftlicher Sanierung und Wiederaufbau der Infrastruktur"
SOV_CW_ger_vic.4.t:0"§RGeburt der Russischen Sowjetrepublik§!"
SOV_CW_ger_vic.4.d:0"Nach den katastrophalen Verlusten der jüngsten Konflikte und dem Zusammenbruch der zentralisierten Macht hat die Sowjetunion einen historischen Schritt getan: Sie löste ihre alte Struktur auf und gründete die Russische Sowjetrepublik. Diese wegweisende Entscheidung zielte auf eine Dezentralisierung der Regierungsführung ab und übertrug den regionalen Behörden mehr Autonomie, um ihre Angelegenheiten an die lokalen Bedürfnisse und Herausforderungen anzupassen. Die Geburt der Russischen Sowjetrepublik symbolisiert einen tiefgreifenden Strategiewechsel, der Anpassungsfähigkeit und Widerstandsfähigkeit nach den verheerenden Kriegsrückschlägen in den Vordergrund stellt. Mit diesem neuen Modell will die sowjetische Führung die Stabilität festigen, die Einheit der verschiedenen Regionen fördern und eine einheitliche Front gegen äußere Bedrohungen aufbauen."
SOV_CW_ger_vic.4.a:0 "Ein neues Russland entsteht"
SOV_CW_ger_vic.5.t:0"Sowjetische Invasion in der Mongolei"
SOV_CW_ger_vic.5.d:0"Berichte bestätigen eine kühne sowjetische Invasion in der Mongolei, die eine deutliche Eskalation der regionalen Spannungen bedeutet. Die Invasion löste internationalen Aufschrei und Verurteilung aus, und die Nachbarmächte sind durch die plötzliche Aggression alarmiert. Sowjetische Streitkräfte, gestärkt durch ihre enorme Militärmacht, eroberten rasch strategische Positionen auf mongolischem Gebiet. Die Lage bleibt weiterhin unbeständig, und diplomatische Bemühungen zur Entschärfung der Krise sind im Gange."
SOV_CW_ger_vic.5.a:0"Die Welt wartet"
SOV_CW_ger_vic.6.t:0"§G[SOV.GetAdjectiveCap] Sieg in der Mongolei§!"
SOV_CW_ger_vic.6.d:0"Nach erbitterten Kämpfen und strategischen Manövern haben die Streitkräfte von §R[SOV.GetAdjectiveCap]§! einen entscheidenden Sieg in der Mongolei errungen, die Kontrolle über Schlüsselgebiete gesichert und alle oppositionellen Kräfte zurückgedrängt. Dieser Triumph markiert einen bedeutenden Meilenstein in ihrem Feldzug und zeigt die Stärke und Entschlossenheit des sowjetischen Militärs bei der Verteidigung seiner Interessen und der Ausweitung seines Einflusses in der Region."
SOV_CW_ger_vic.6.a:0 "Könnten die [SOV.GetAdjectiveCap]s zurückkommen?"
SOV_CW_ger_vic.7.t:0"§R[SOV.GetAdjectiveCap] Rückzug aus der Mongolei§!"
SOV_CW_ger_vic.7.d:0"Nach heftigem Widerstand und logistischen Herausforderungen hat §R[SOV.GetName]§! einen strategischen Rückzug aus der Mongolei angekündigt. Diese Entscheidung folgt auf langwierige Gefechte und die Unfähigkeit, Operationen in der Region effektiv aufrechtzuerhalten. Die sowjetischen Streitkräfte gruppieren sich neu, um ihre Positionen zu festigen und ihr Vorgehen in diesem Konfliktgebiet zu überdenken."
SOV_CW_ger_vic.7.a:0"Das ist das Ende des Kommunismus"
SOV_CW_ger_vic.8.t:0"§Die sowjetische Remilitarisierung schockiert die Welt§!"
SOV_CW_ger_vic.8.d:0"Die Sowjetunion remilitarisiert still und leise ihre Westgrenzen. In einem überraschenden Schritt hat die Sowjetunion begonnen, ihre Westgrenzen zu remilitarisieren, insbesondere in der Nähe des Reichskommissariats Moskau, des Don-Wolga-Gebiets und des Kaukasus. Diese verdeckte Aktion, die ohne vorherige Ankündigung durchgeführt wurde, lässt die Welt gespannt auf die Reaktion der Sowjetunion warten. Diese plötzliche Eskalation unterstreicht die gestiegenen Spannungen und gibt Anlass zur Sorge um die regionale Stabilität. Beobachter spekulieren über die Auswirkungen dieses kühnen Manövers, während die diplomatischen Beziehungen angespannt bleiben."
SOV_CW_ger_vic.8.a:0 "Die Sowjets bewegen sich einfach in ihrem eigenen Hinterhof."
SOV_CW_ger_vic.9.t:0"§RDeutschland reagiert auf die sowjetische Remilitarisierung§!"
SOV_CW_ger_vic.9.d:0 "Wir haben Berichte erhalten, die die „Remilitarisierung“ sowjetischer Streitkräfte entlang unserer Westgrenzen in der Nähe des Reichskommissariats Moskau, des Don-Wolga-Gebiets und des Kaukasus bestätigen. Diese Entwicklung stellt uns vor eine kritische Entscheidung: Sollen wir „für eine zweite sowjetische Invasion mobilisieren“ oder „die Provokation ignorieren“ und stattdessen diplomatische Maßnahmen ergreifen? Die Welt beobachtet aufmerksam, wie die Spannungen zwischen unseren Nationen erneut zunehmen."
SOV_CW_ger_vic.9.a:0 "Wir beginnen mit dem Herbst Blau"
SOV_CW_ger_vic.9.b:0 "Wir sollten zuerst Japan informieren."
SOV_CW_ger_vic.9.c:0 "Wir brauchen uns keine Sorgen zu machen"
SOV_CW_ger_vic.10.t:0"§BDeutschland startet Operation Fall Blau§!"
SOV_CW_ger_vic.10.d:0"Die §W§b[GER.GetName]§! hat als Reaktion auf die provokative Remilitarisierung der sowjetischen Streitkräfte an ihrer Westgrenze die Operation Fall Blau gestartet. Ziel dieser Offensive mit dem Codenamen Fall Blau ist es, der sowjetischen Eskalation entschieden entgegenzuwirken und die Stabilität in der Region wiederherzustellen. Deutsche Truppen mobilisieren entlang der Front, bereit, tief in sowjetisches Territorium einzudringen und die neu befestigten Stellungen zu zerstören. Die Welt hält den Atem an, während ein neues Kapitel im anhaltenden Konflikt zwischen diesen beiden Mächten aufgeschlagen wird."
SOV_CW_ger_vic.10.a:0 "Ist dies das Ende der Sowjets?"
SOV_CW_ger_vic.11.t:0"§BJapan erwägt Intervention an der Ostfront§!"
SOV_CW_ger_vic.11.d:0"Berichte aus dem europäischen Kriegsschauplatz haben Tokio erreicht und berichten detailliert über den deutschen Einmarsch in die Sowjetunion. Die japanische Regierung steht nun vor der wichtigen Entscheidung, ob sie in dem anhaltenden Konflikt eine neue Front eröffnen soll. Derzeit finden hochrangige Diskussionen zwischen Militärstrategen und politischen Entscheidungsträgern statt, um die Durchführbarkeit und die strategischen Auswirkungen einer solchen Intervention zu bewerten. Während die Spannungen zunehmen und sich globale Allianzen verschieben, wartet die Welt mit angehaltenem Atem auf Japans Entscheidung."
SOV_CW_ger_vic.11.a:0 "Wir werden die Operation Kuroshio starten"
SOV_CW_ger_vic.11.b:0 "Wir brauchen uns keine Sorgen zu machen"
SOV_CW_ger_vic.12.t:0"§BJapan startet Operation Kuroshio§!"
SOV_CW_ger_vic.12.d:0"Japan hat als Reaktion auf die besorgniserregende sowjetische Remilitarisierung seiner Westgrenzen die Operation Kuroshio gestartet. Dieser strategische Schritt soll Japans Interessen in der Region wahren und die Stabilität in Ostasien gewährleisten. Japanische See- und Luftstreitkräfte werden eingesetzt, um möglichen Bedrohungen durch die sowjetische Eskalation entgegenzuwirken. Während die Spannungen eskalieren, beobachtet die Welt aufmerksam, wie sich diese neue Phase des Konflikts entwickelt."
SOV_CW_ger_vic.12.a:0 "Ein Zweifrontenkrieg? Wo habe ich das schon einmal gesehen?"
SOV_CW_ger_vic.13.t:0"§BUnsere Reaktion auf die deutsche Invasion§!"
SOV_CW_ger_vic.13.d:0"Wir haben Berichte über die deutsche Invasion sowjetischen Territoriums erhalten. Japan steht nun vor einer kritischen Entscheidung: Sollen wir von Deutschland die Einrichtung einer Neutralitätszone entlang unserer gemeinsamen Grenzen fordern, um einen direkten Konflikt zu verhindern, oder sollen wir uns auf einen Krieg vorbereiten, um unsere Interessen zu wahren und eine deutsch-japanische Grenze zu verhindern? Der Ausgang dieses Ultimatums wird tiefgreifende Auswirkungen auf die Zukunft Ostasiens und unserer strategischen Allianzen haben."
SOV_CW_ger_vic.13.a:0 "Wir senden Deutschland die Bedingungen"
SOV_CW_ger_vic.13.c:0 "Wir sorgen dafür, dass eine Zone eingerichtet wird"
SOV_CW_ger_vic.13.b:0 "Wir werden nicht antworten"
SOV_CW_ger_vic.14.t:0"§RJapans Ultimatum§!"
SOV_CW_ger_vic.14.d:0"Wir haben ein Ultimatum aus Japan erhalten. Sie verlangen, dass wir alle Feindseligkeiten sofort einstellen und entlang unserer gemeinsamen Grenze eine entmilitarisierte Zone einrichten. Sollten wir uns weigern, droht Japan mit einer Kriegserklärung. Es steht viel auf dem Spiel, und unsere Entscheidung wird erhebliche Folgen für die Zukunft unseres Landes und der Welt haben. Wie sollen wir reagieren?"
SOV_CW_ger_vic.14.a:0 "Wir werden nicht reagieren, wir sind bereit, uns Japan zu stellen"
SOV_CW_ger_vic.14.b:0 "Wir werden an unserer Grenze eine DMZ errichten"
SOV_CW_ger_vic.15.t:0"§BAusbruch des 3. Weltkrieges§!"
SOV_CW_ger_vic.15.d:0"Deutschland lehnte Japans Forderung nach einer Neutralitätszone entlang der gemeinsamen Grenzen ab, woraufhin Japan zur Verteidigung seiner territorialen Integrität und seiner strategischen Interessen den Krieg erklärte. Der Zusammenstoß markiert den Beginn des Dritten Weltkriegs. Die Achsenmächte befinden sich nun in einer direkten militärischen Konfrontation, die die geopolitische Landschaft zu verändern droht."
SOV_CW_ger_vic.15.a:0 "Ist das das Ende der Welt?"
#tooltips
SOV_riot:0"§RUnruhen breiten sich wie ein Lauffeuer aus§!; §Yerneut wird unsere Autorität in Frage gestellt. §CWir hatten es schon früher mit Dissens zu tun und müssen nun entscheiden, wie wir damit umgehen. §GDie Behörden bereiten sich darauf vor, inmitten der wachsenden Unruhen in unseren Gebieten die Ordnung wiederherzustellen."
SOV_cw_perm_martial_law:0"§RPermanentes Kriegsrecht§! - Nach der Eskalation innerer Unruhen und äußerer Bedrohungen hat die Sowjetregierung das permanente Kriegsrecht verhängt und dem Militär weitreichende Befugnisse zur Aufrechterhaltung von Ordnung und Sicherheit eingeräumt. Die bürgerlichen Freiheiten sind auf unbestimmte Zeit ausgesetzt, während sich die Nation auf die anhaltenden Herausforderungen vorbereitet."
sov_republic:0 "Sozialistische Sowjetrepublik"
sovcampaginlaunch:0"§!Starten Sie den Mongolei-Feldzug! Wir haben eine umfassende Militäroperation in der Mongolei eingeleitet, mit dem Ziel, innerhalb von 90 Tagen entscheidende Siege zu erringen. Sollten wir unsere Ziele in diesem Zeitrahmen nicht erreichen, müssen wir einen Rückzug aus der Mongolei in Erwägung ziehen."
mongolian_campagin:0"Start der Mongolenkampagne"
mongolian_campagin_desc:0"Die Sowjetunion startet offiziell eine neue Militärkampagne, um ihren Einfluss auszuweiten und strategische Ziele zu erreichen. Dieses ehrgeizige Unterfangen markiert einen Wendepunkt in der sowjetischen Militärstrategie, da die Streitkräfte mobilisiert werden, um die Vorherrschaft in der Region zu erlangen. Politische Führer betonen die Notwendigkeit dieser Kampagne zur Wahrung nationaler Interessen und zur Förderung sozialistischer Ideale."
RI_national_security:0"Nationale Sicherheit"
st_planning2:0 "Strategische Planung"
st_planning1:0"Strategische Planung"

rus.1.t:0 "Russland, wir grüßen dich"
rus.1.d:0 "Nach der Niederlage der perfiden bolschewistischen Horden im Jahr 1920 hoffte man, das russische Volk könne endlich Ruhe finden. Doch das Schicksal hatte noch mehr zu bieten, und die Geschichte neigt zu einem schrägen Humor. Die republikanische Regierung, die auf den Sieg folgte, war ein verrottendes Haus auf einer verdrehten Struktur. An ihrer Spitze stand Kerenski, eine ineffektive Galionsfigur, die im Vertrag von Brest-Litowsk den Verkauf angestammter Ländereien zuließ. Doch trotz dieser Lage war nicht alles verloren. Kerenskis Tage waren nach dem Koltschak-Putsch von 1924 und der darauf folgenden katastrophalen Niederlage von Transamaur gezählt. Insgeheim wartete Russlands Held Lawr Kornilow auf den richtigen Zeitpunkt. Er hatte die Bolschewiki schon einmal besiegt, und so würde er die ineffektiven Marionetten in der Duma erneut besiegen.\n\n1936 kam der unvermeidliche Tag. Noch bevor Kerenskis Leiche von den Stufen des Senats geborgen worden war, wurden rasche Pläne in die Tat umgesetzt. In Saratow mobilisierten sich die Söhne des Vaterlandes, begierig darauf, das Volk endlich vor sich selbst zu retten. Hätten sie sich geweigert zu handeln, wäre nicht abzusehen gewesen, wen die Demokraten und ihre Freimaurer ernannt hätten. Es war Kornilow, der dem Land seinen Ruhm zurückgab, Kornilow, der die Hunnen besiegte, Kornilow, der das Volk einte, und Kornilow, der das fünfköpfige Regime errichtete. Russland war wieder stark, stolz und frei! Das Volk jubelte und lobte die Leistungen seines Woschd. Doch nachdem er seine heilige Pflicht erfüllt hatte, reiste der Woschd gen Himmel, bereit, seine Feinde auf der Astralebene zu beseitigen.\n\nnHeute regiert ein neues Gesicht: Nikolai Skoblin, ein Mann, der allem Anschein nach nicht in die Fußstapfen seiner Vorgänger tritt. Seine Fraktion der Jungen Kornilowiten regiert mit einer Mischung aus List und Nostalgie und wird von Michail Lewitow, Skoblins Stellvertreter und rechter Hand, angeführt. Gemeinsam versuchen sie, die Vision ihres großen Helden zu verwirklichen und halten sich eng, wenn auch einfallslos, an seine Lehren. Unter der Oberfläche brodeln dunkle Mächte. Mit jedem Tag wächst die Unzufriedenheit der „loyalen“ Minderheiten, und die Eurasier, Iljinisten und Schwarzhunderter planen, die Nation nach ihrem Bild umzugestalten. Ohne die lenkende Hand ihres Vaters zeigt die Unordnung erneut ihr hässliches Gesicht. Sollte der Nationalstaat scheitern, wird die Welt den dekadenten Sozialisten überlassen. Möge Gott Russland beistehen, denn niemand sonst wird es tun …"
rus.1.a:0 "Russland zu dienen, ist unsere Bestimmung"
rus.3.t:0 "Nationaler Argo-Industriebericht"
rus.3.d:0 "Ein allgemeiner Bericht über die staatliche Erhebung zum aktuellen Zustand aller produktiven Agrarflächen Russlands ist eingetroffen. Entgegen den Hoffnungen vieler Regierungsvertreter konnten die Details des Berichts ihre Hoffnungen auf einen erfolgreichen Verlauf der Erhebung nicht bestätigen. Das war nicht der Fall.\n\nEin erheblicher Teil der Großgrundbesitze in ganz Russland zeigt keinerlei Anzeichen einer Produktivitätsverbesserung. Auch nach wiederholten Berechnungen und sorgfältiger Prüfung gibt es weiterhin keine Anzeichen für eine positive Veränderung der Erträge der Großgrundbesitze, die in der Erhebung als unzureichend eingestuft wurden. Und diese Großgrundbesitze sind trotz ihrer insgesamt miserablen Leistung stark von staatlichen Subventionen abhängig.\n\nDer Bericht stellte außerdem fest, dass die meisten kleineren Landgüter und die Ländereien der übrigen in der Landwirtschaft und Agrarindustrie Russlands tätigen Personen zwar gut, aber nicht gut genug wirtschaften. Es gab Beschwerden und Anmerkungen, dass diese Ländereien und Ländereien viel zu klein seien, um die für die Zukunft prognostizierten Erträge zu erwirtschaften. Ohne Verbesserungen und ohne staatliche Unterstützung ist es möglich, dass die Gesamtproduktion all dieser kleinen Güter und Ländereien nicht einmal annähernd ausreicht, um den Staat und die gesamte Bevölkerung Russlands zu ernähren. Alleine könnten sie die Bevölkerung nicht ernähren."
rus.3.a:0 "Wir haben sie gehört."
rus.12.t:0 "Ukraine-Aufstand"
rus.12.d:0 "Trotz unserer umfassenden staatlichen Zensurmaßnahmen häufen sich in letzter Zeit Berichte über verräterische Städte am Rande der von Russland kontrollierten Ukraine und vereinzelte Schießereien auf Bauernhöfen. Doch nun scheint der Damm offiziell gebrochen zu sein, und das Ausmaß der Situation ist wahrlich erschütternd.\n\nIn der gesamten Ostukraine scheint derzeit ein groß angelegter Aufstand im Gange zu sein, der sogar Kiew bedroht! Hektische Truppenaufmarschierungen und panische Gopnik-Abteilungen wurden in die Ukraine verlegt.\n\nEine bislang unbekannte Gruppe namens „Ukrainische Revolutionsarmee“ unter der Führung des sogenannten „Gentleman-Generals“ Andriy Melnyk, deren Wurzeln im Militär des alten Regimes liegen, scheint der Hauptverschwörer hinter dieser verräterischen Affäre zu sein."
rus.12.a:0 "Keine Gnade für die Verräter"
rus.13.t:0 "Finnland-Aufstand"
rus.13.d:0 "Erschreckende Nachrichten aus Finnland berichten von einem bewaffneten Massenaufstand. Obwohl Helsinki noch in einiger Entfernung liegt, könnte der Aufstand aufgrund seiner Heftigkeit die Stadt bald erreichen. Angeführt wird der Angriff von einer Organisation namens „Finnische Geheimarmee“, die sich aus verbliebenen Generälen der alten Streitkräfte zusammensetzt und mit der ehemaligen norwegischen Exilregierung in Verbindung steht. Vermutlich inspiriert von ähnlichen Entwicklungen in der Ukraine und genährt vom Unmut der einheimischen Bevölkerung. Ein von der TaGoP abgefangenes offizielles Kommuniqué löste in Moskau Alarm aus.\n\n/„Volk Finnlands, eure Streitkräfte haben sich nie ergeben! Wir haben unsere Zeit abgewartet und bitten nun um eure Hilfe. Das Vaterland ruft alle Patrioten auf, ein letztes Mal zum Kampf aufzustehen.“"
rus.13.a:0 "Vielleicht sollten sie ... Dampf ablassen" 
rus.14.t:0 "Levitvos Zorn"
rus.14.d:0 "Levitow eilte mit übermenschlicher Geschwindigkeit durch die langgestreckten Hallen des Kremls, getrieben von seiner Wut. Neben ihm standen mehrere Offiziere, die alle darum kämpften, ihre disziplinierte Haltung beizubehalten und gleichzeitig mit dem General Schritt zu halten. Levitow schlug mit der Schulter gegen das Hartholz und spannte die müden Scharniere. Die Wachen sahen nur erstaunt zu.\n\n„Nikolai Wladimirowitsch! Du feiger Hund! Hast du kürzlich aus dem Fenster geschaut? Oder soll ich das jetzt auch für dich tun?“\n\nSkoblins Verwirrung verwandelte sich in Wut, die der des Generals entsprach. Er stand von seinem Schreibtischstuhl auf, nahm eine selbstbewusste Haltung ein und erwiderte.\n\n„Beruhige dich, Michail! Ich habe dir viele Privilegien gewährt, aber Gehorsamsverweigerung gehörte nicht dazu! Ich bin dein Wohsd!“\n\nLevitow brach bei dieser Behauptung in schallendes Gelächter aus, amüsiert über die greifbare Ironie, die in der Luft lag. Er war gerade aus Kiew zurückgekehrt, wo die Früchte von Skoblins Arbeit in brennenden Gebäuden und verwundeten Soldaten zu sehen waren. Er holte tief Luft und starrte seinen alten Freund an. Plötzlich erkannte er die Sinnlosigkeit seines Unterfangens. Im Büro des Woschd durfte es keinen Platz für Schwäche oder kleinliche Ausbrüche geben. Es war seine kalte Entschlossenheit, mit der Kornilow Russland schon einmal gerettet hatte, und so würde es auch wieder sein. Eines war überdeutlich geworden: Die Faulheit, die alle Bürokraten befiel, hatte sich auch auf seinen alten Freund ausgebreitet." 
rus.14.a:0 "Was könnte dieser Mann vorhaben?"
rus.15.t:0 "Eine Rede vor der Duma"
rus.15.d:0 "&quot;Verehrte Abgeordnete der Duma, Söhne und Töchter Russlands, angesichts meiner Verdienste um das Vaterland bitte ich Sie lediglich, mir in unserer Stunde der Not Ihr Ohr zu schenken. Ich werde kein Blatt vor den Mund nehmen.&quot;\n\n&quot;Russland liegt im Sterben. Überall in unserem Vaterland untergraben Täuschung und Sabotage unser großes Experiment. Unsere einst loyalen Minderheiten, die im Herzen schwach sind, wurden erneut von ausländischen Ideologien und feigen Gefühlen vergiftet. Dies sind die Fakten, die durch die jüngsten Ereignisse für alle sichtbar geworden sind.&quot;\n\n&quot;Tapfere Patriotische Ritter; Waffenbrüder, die tapfer gegen die monströsen Horden kämpfen, die die Welt dem Bolschewismus verdammen wollen, sind derzeit an unseren Rändern stationiert. Ich selbst habe sie, wie Sie wissen, angeführt.&quot;\n\n&quot;Ein großer Verrat ist im Gange, in den höchsten Ebenen unserer Regierung. Im Büro großer Männer sitzt heute ein Feigling. Ein erbärmlicher Kerl lauert in den Hallen des Kremls und fettet sich an den Mühsal unserer Landsleute, die zufrieden dasitzen, während die Apokalypse vor unserer Tür steht.&quot;\n\n&quot;Brüder, ich bitte euch, mir bei der Verwirklichung meiner Ziele zu helfen. Wir müssen diesen verräterischen Vorwand für einen Vohzd um jeden Preis beseitigen. Ich strebe nicht nach persönlichem Ruhm, sondern nur nach der Rettung Russlands und der gesamten Menschheit. Die Stunde der Entscheidung ist gekommen. Wer wird sich mir anschließen?"
rus.15.a:0 "Verhaften Sie ihn"
rus.15.b:0 "Was ist mit dir los, Mikhail"
rus.16.t:0 "Verhaftung von Levitov"
rus.16.d:0 "Nach den massiven Revolten am Rande des russischen Staates, die mit jedem Tag schlimmer zu werden scheinen, spielt sich in den Straßen Moskaus ein großes Drama ab. Im gnadenlosen, darwinistischen Spiel der russischen Politik hat General Michail Lewitow eine gewagte Operation eingeleitet. Lewitow, ein langjähriger politischer Verbündeter des aktuellen Woschd, Nikolai Wladimirowitsch Skoblin, fordert nun offen den Rücktritt des Führers. Neben allgemeinem Spott beklagte er sich über die unzureichende Reaktion auf die Aufstände und die allgemeine Feigheit bei der Erfüllung seiner Pflicht. Natürlich löste eine solch verräterische Erklärung eines einst beliebten Generals Schockwellen in Russland aus, und die Geheimpolizei wurde umgehend mobilisiert, um Lewitow zu verhaften. Als sich der Staub legte, wurde eines klar: Lewitow hat den Sturm überstanden. Seine Ansichten waren offenbar weiter verbreitet als bisher bekannt, und zusammen mit seinem legendären Image gelang es dem ehrgeizigen General, die Schwarzen und Roten für seine Sache zu gewinnen. Nun muss der Vohzd sicherlich seine eigene Verhaftung befürchten. Das Militär selbst blieb angesichts der anhaltenden Revolten neutral, obwohl es große Sympathien für Levitov hegt."
rus.16.a:0 "Es lebe der Woschd"
rus.17.t:0 "Verhaftung von Levitov"
rus.17.d:0 "Nach den massiven Revolten am Rande des russischen Staates, die mit jedem Tag schlimmer zu werden scheinen, spielt sich in den Straßen Moskaus ein großes Drama ab. In dem gnadenlosen, darwinistischen Spiel der russischen Politik hat General Michail Lewitow eine gewagte Operation eingeleitet. Lewitow, ein langjähriger politischer Verbündeter des aktuellen Woschd, Nikolai Wladimirowitsch Skoblin, fordert nun offen den Rücktritt des Anführers. Neben allgemeinem Spott beklagte Lewitow auch die unzureichende Reaktion auf die Aufstände und die allgemeine Feigheit, seine Pflicht zu erfüllen. Natürlich löste eine solch verräterische Erklärung eines einst beliebten Generals Schockwellen in Russland aus, und die Geheimpolizei wurde umgehend mobilisiert, um Lewitow zu verhaften.\n\n Als sich der Staub gelegt hat, ist eines klar: Der Woschd hat den Sturm überstanden. Nachdem es ihm nicht gelungen war, Unterstützung bei den Schwarz-Roten zu gewinnen und es im Armeehauptquartier zu einer Schießerei kam, wurde General Lewitow gefangen genommen! Zwar verbleiben noch viele Sympathisanten in der Armee, doch Vohzds Autorität kann nicht mehr in Frage gestellt werden, und der Verräter wird zu gegebener Zeit bestraft werden."
rus.17.a:0 "Es lebe der Woschd"
rus.18.t:0 "Wrangel ist zurück!"
rus.18.d:0 "Während sich die alten Verbündeten Levitov und Skoblin in einem albernen Duell mit heftigen Schlägen gegenseitig zerfleischen, beobachtet ein einzelner Mann aus dem Schatten und sammelt Kraft. Lange hat er auf einen solchen Moment gewartet. Einen Moment, in dem die jungen Kornilow-Anhänger abgelenkt sein könnten, was angesichts ihres ausgeprägten Egos sicherlich unvermeidlich war. Seit 1948, als der Vater unserer Nation, Lawr Kornilow, starb, ist er in den Untergrund gezwungen. Als die treuesten Verbündeten des alten Vohzd ersetzt oder verbannt wurden, verstummte Pjotor Wrangel, scheinbar müde von solch dreister Zurschaustellung von Opportunismus und jugendlicher Torheit. Nun ist er zurückgekehrt. Um ihn versammelt sich eine Gruppe der Entfremdeten: Militäroffiziere, die des Spektakels müde sind, Überreste der alten Garde und prominente Weiße. Bei Levitows Versuch, einen „schwachen“ Wohsd abzusetzen, hat er seine eigene Schwäche und seinen verräterischen Ehrgeiz offenbart.\n\nHeute marschierte die Partei nach Moskau ein und zwang Skoblin mit Unterstützung des Militärs nach Levitows gescheitertem Stunt zum Rücktritt. Nach der Niederlage der beiden Undankbaren ist die alte Ordnung in Russland zurückgekehrt. Wohsd Wrangel wird die Nation wieder auf den rechten Weg bringen, Maßnahmen zur Beschwichtigung des Volkes erarbeiten und dafür sorgen, dass solche Aufstände nie wieder vorkommen. Die große Abrechnung steht bevor, alle Verräter mögen sich in Acht nehmen!"
rus.18.a:0 "Es lebe der Woschd"
rus.19.t:0 "Stellen Sie einen neuen Rat zusammen"
