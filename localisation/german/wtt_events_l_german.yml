 lar_collab_gov.1.t:0 "[From.GetAdjective] Partisanen in [Root.GetNameDef]"
 lar_collab_gov.1.d:0 "[From.GetNameDefCap] haben in letzter Zeit ihre Bemühungen um eine Zusammenarbeit innerhalb unseres Landes verstärkt. Eine Reihe von [This.GetAdjective]-Politikern äußern sich mittlerweile recht wohlwollend über das [From.GetAdjective]-Regime, und viele Parteigänger unseres Landes verwandeln ihre [From.GetRulingIdeology]-Einstellung in direkte Unterstützung für [From.GetNameDef].\n\nDer wachsende [From.GetAdjective]-Einfluss in unserem Land wird zweifellos den [Root.GetAdjective]-Widerstand verringern und könnte im Falle einer Kapitulation von [Root.GetNameDef] sogar zu einer neuen [From.GetRulingIdeology]-Regierung in Zusammenarbeit mit [From.GetNameDef] führen."
 ETH_events.1.t:0 "Äthiopien schlägt weißen Frieden vor"
 ETH_events.1.d:0 "Da die Kontrolle über Somaliland und Eritrea bis auf wenige Widerstandsnester fast vollständig verloren ist, hat die äthiopische Regierung vorgeschlagen, die Feindseligkeiten friedlich zu beenden. Italien wird seine Invasion in Äthiopien offiziell beenden und die besetzten Gebiete in Ostafrika an Äthiopien abtreten. Wie sollten wir reagieren?"
 ETH_events.1.a:0 "Unterzeichnen Sie den Vertrag."
 ETH_events.1.b:0 "Wir können uns keine weitere Demütigung leisten!"
 ETH_events.101.t:0 "[From.GetNameDefCap] Verweigert den Frieden"
 ETH_events.101.d:0 "Obwohl [From.GetLeader] die Kontrolle über alle Gebiete Ostafrikas verloren hat, hat er unser Angebot eines weißen Friedens abgelehnt. Es scheint, als ob eine totale Kapitulation die einzige Möglichkeit ist, diesen Krieg jemals zu beenden."
 ETH_events.101.a:0 "Traurig."
usa_congress_house_events.1.t:0 "Repräsentantenhaus debattiert über Gesundheitsreform"
usa_congress_house_events.1.d:0 "Das derzeitige Gesundheitssystem steht auf dem Prüfstand. Im Repräsentantenhaus wird derzeit heftig über Reformvorschläge debattiert. Verschiedene Fraktionen im Repräsentantenhaus plädieren für unterschiedliche Ansätze zur Verbesserung der Zugänglichkeit und Bezahlbarkeit der Gesundheitsversorgung. Wie sollte das Repräsentantenhaus vorgehen?"
usa_congress_house_events.1.a:0 "Verabschieden Sie das Reformgesetz."
usa_congress_house_events.1.b:0 "Verschieben Sie die Abstimmung für weitere Diskussionen."

usa_congress_senate_events.1.t:0 "Senat erwägt Infrastrukturinvestitionen"
usa_congress_senate_events.1.d:0 "Da die Infrastruktur des Landes Anzeichen von Alterung und Ineffizienz zeigt, berät der Senat über einen umfassenden Infrastrukturinvestitionsplan. Die Senatoren sind sich über Umfang und Finanzierung des vorgeschlagenen Plans uneinig. Wie soll der Senat vorgehen?"
usa_congress_senate_events.1.a:0 "Genehmigen Sie den Infrastrukturplan."
usa_congress_senate_events.1.b:0 "Überarbeiten Sie den Plan, um eine bessere Kosteneffizienz zu erzielen."

usa_congress_house_events.2.t:0 "Das Repräsentantenhaus debattiert über die Steuerreform"
usa_congress_house_events.2.d:0 "Um die Wirtschaft anzukurbeln, erwägt das Repräsentantenhaus eine umfassende Reform des Steuersystems. Die vorgeschlagenen Reformen zielen darauf ab, das Steuerrecht zu vereinfachen und die Steuerlast für bestimmte Gruppen zu senken. Es gibt jedoch Bedenken hinsichtlich der Auswirkungen auf die Staatseinnahmen. Wie sollte das Repräsentantenhaus vorgehen?"
usa_congress_house_events.2.a:0 "Verabschieden Sie das Steuerreformgesetz."
usa_congress_house_events.2.b:0 "Senden Sie den Gesetzentwurf zur weiteren Prüfung an den Ausschuss."

usa_congress_senate_events.2.t:0 "Senat berät über Einwanderungspolitik"
usa_congress_senate_events.2.d:0 "Da Einwanderung ein umstrittenes Thema ist, debattiert der Senat über verschiedene Vorschläge zur Reform der Einwanderungspolitik des Landes. Die Vorschläge reichen von strengeren Grenzkontrollen bis hin zu Möglichkeiten zur Staatsbürgerschaft für Einwanderer ohne Papiere. Wie sollte der Senat dieses Thema angehen?"
usa_congress_senate_events.2.a:0 "Stimmen Sie über ein umfassendes Gesetz zur Einwanderungsreform ab."
usa_congress_senate_events.2.b:0 "Halten Sie Anhörungen ab, um weitere Informationen zu sammeln."

usa_congress_house_events.3.t:0 "Repräsentantenhaus erwägt Maßnahmen zur Waffenkontrolle"
usa_congress_house_events.3.d:0 "Nach den jüngsten Massenschießereien steht das Repräsentantenhaus unter Druck, Waffengewalt durch Gesetzgebung zu bekämpfen. Verschiedene Vorschläge, wie allgemeine Hintergrundüberprüfungen und das Verbot bestimmter Schusswaffen, werden derzeit diskutiert. Wie sollte das Repräsentantenhaus auf diese Vorschläge reagieren?"
usa_congress_house_events.3.a:0 "Verabschieden Sie ein umfassendes Gesetz zur Waffenkontrolle."
usa_congress_house_events.3.b:0 "Leiten Sie das Problem zur weiteren Prüfung an einen Sonderausschuss weiter."

usa_congress_house_events.4.t:0 "Dringende Sitzung des Repräsentantenhauses zur Wirtschaftskrise"
usa_congress_house_events.4.d:0 "Das Land befindet sich in einer schweren Wirtschaftskrise. Das Repräsentantenhaus wurde zu einer Krisensitzung einberufen, um die Krise zu bewältigen. Die Arbeitslosigkeit steigt rasant, Unternehmen schließen, und Familien kämpfen ums Überleben. Welche Maßnahmen sollte das Repräsentantenhaus ergreifen, um die Auswirkungen der Depression zu mildern?"
usa_congress_house_events.4.a:0 "Verabschieden Sie ein Konjunkturpaket, um Arbeitsplätze zu schaffen und das Wirtschaftswachstum anzukurbeln."
usa_congress_house_events.4.b:0 "Schlagen Sie Steuersenkungen für Privatpersonen und Unternehmen vor, um Ausgaben und Investitionen anzukurbeln."

usa_congress_senate_events.4.t:0 "Senat debattiert über Finanzregulierung"
usa_congress_senate_events.4.d:0 "Angesichts der Wirtschaftskrise debattiert der Senat über neue Regelungen, um einen ähnlichen Finanzkollaps in Zukunft zu verhindern. Die Vorschläge beinhalten eine strengere Aufsicht über Banken und Finanzinstitute sowie Maßnahmen zum Verbraucherschutz. Wie sollte der Senat die Finanzregulierung angehen?"
usa_congress_senate_events.4.a:0 "Erlassen Sie strengere Vorschriften für Banken und Finanzinstitute."
usa_congress_senate_events.4.b:0 "Richten Sie eine überparteiliche Kommission ein, um die Ursachen der Krise zu untersuchen und Lösungen vorzuschlagen."

usa_congress_house_events.5.t:0 "Ausschuss des Repräsentantenhauses untersucht Praktiken der Wall Street"
usa_congress_house_events.5.d:0 "Inmitten der wirtschaftlichen Turbulenzen hat ein Ausschuss des Repräsentantenhauses eine Untersuchung der Praktiken von Wall-Street-Firmen und ihrer Rolle in der Finanzkrise eingeleitet. Der Ausschuss will etwaiges Fehlverhalten aufdecken und die Verantwortlichen zur Rechenschaft ziehen. Wie soll das Repräsentantenhaus mit der Untersuchung fortfahren?"
usa_congress_house_events.5.a:0 "Halten Sie öffentliche Anhörungen ab, um Aussagen von Branchenexperten und Aufsichtsbehörden einzuholen."
usa_congress_house_events.5.b:0 "Fordern Sie Dokumente und Aufzeichnungen von Wall-Street-Firmen zur weiteren Überprüfung vor."
