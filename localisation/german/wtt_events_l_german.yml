 wtt_news.53.t:0 "Vereinigung Skandinaviens"
 wtt_news.53.desc:0 "Mit Waffengewalt hat [From.GetOldName] die skandinavischen Völker unter seiner Herrschaft vereint, und seine Regierung integriert nun die neu eroberten Gebiete. Um die Bevölkerung hinter dem Staat zu vereinen, verstärkte sich die pannationalistische Propaganda mit klarer Unterstützung der Regierung.\n\nAls Nebeneffekt haben Befürworter einer skandinavischen Vereinigung bereits begonnen, historische Parallelen zu zitieren und darauf hinzuweisen, dass der aktuelle Stand der Dinge lediglich als natürliche Fortsetzung früherer Versuche einer Einigung der Region angesehen werden könne. Die [From.GetOldAdjective]-Regierung ist eifrig auf diesen Zug aufgesprungen und hat nun offiziell die „Wiederherstellung der Kalmarer Union“ verkündet und das Land in „[From.GetNameDef]“ umbenannt."
 wtt_news.53.a:0 "Ein herrlicher Tag für alle Skandinavier!"
 wtt_news.53.b:0 "Gemeinsam ist Skandinavien stärker."
 wtt_news.53.c:0 "Es wird nicht lange dauern!"
 wtt_news.54.t:0 "Vereinigung der nordischen Länder"
 wtt_news.54.desc:0 "Mit der Eroberung aller nordischen Länder hat die [From.GetOldAdjective]-Regierung nun verstärkte Integrationsmaßnahmen in den neu eroberten Gebieten eingeleitet. Um die Bevölkerung hinter dem Staat zu vereinen, verstärkte sich die pannationalistische Propaganda mit klarer Unterstützung der Regierung.\n\nEin [From.GetOldAdjective]-Beamter wurde mit den Worten zitiert: „Die nordischen Länder haben sich schon immer stark verbunden gefühlt. Es ist nur natürlich, dass sie vereint sind und unsere Völker Seite an Seite koexistieren.“ Offenbar hat die Regierung beschlossen, diese Verbundenheit zu nutzen, um die Bevölkerung zu einen. Sie hat nun die „wahre nordische Einheit“ proklamiert und das Land in „[From.GetNameDef]“ umbenannt."
 wtt_news.54.a:0 "Der vereinte Norden wird stark bleiben!"
 wtt_news.54.b:0 "Der Norden könnte sich für seine Nachbarn durchaus als problematisch erweisen …"
 wtt_news.55.t:0 "Wiedergeburt von [From.GetNameDef]"
 wtt_news.55.desc:0 "Nachdem die [From.GetOldAdjective]-Regierung alle Gebiete des alten Großkolumbien zurückerobert hat, unternimmt sie nun verstärkte Schritte zur Integration der neu eroberten Gebiete. Um die Bevölkerung hinter dem Staat zu vereinen, verstärkte sie daher die pannationalistische Propaganda mit klarer Unterstützung der Regierung.\n\n[From.GetOldAdjective]-Beamte haben wiederholt ihre Überzeugung zum Ausdruck gebracht, dass ganz Nordsüdamerika auf seine gemeinsame Geschichte zurückblicken und diese Verbundenheit als Grundlage für einen vereinten Staat nutzen sollte. Nun ist die [From.GetOldAdjective]-Regierung noch einen Schritt weiter gegangen und hat die „Wiederbelebung von Bolívars Erbe“ proklamiert und das Land in „[From.GetNameDef]“ umbenannt."
 wtt_news.55.a:1 "Der Traum eines vereinten Lateinamerikas wartet!"
 wtt_news.55.b:0 "Die Geburt einer neuen amerikanischen Supermacht?"
 wtt_news.56.t:0 "Wiedergeburt von [From.GetNameDef]"
 wtt_news.56.desc:0 "Nachdem die [From.GetOldAdjective]-Regierung als Vertreterin des letzten verbliebenen Nachfolgestaates alle österreichisch-ungarischen Gebiete an sich gerissen hat, beginnt sie nun mit der Wiedereingliederung dieser Gebiete. Regierungspropaganda flammt auf und preist die „glorreichen Tage des Kaiserreichs“ – ein klarer Versuch, die Bevölkerung für die umfassenden nationalen Reformen und die Rückkehr zu imperialen Normen zu gewinnen.\n\nIm Rahmen dieser Reformen hat die [From.GetOldAdjective]-Regierung die Wiederherstellung von [From.GetNameDef] angekündigt und den offiziellen Namen des Landes entsprechend geändert."
 wtt_news.56.a:0 "Indivisibiliter ac untrennbar!"
 wtt_news.56.b:0 "Die Doppelmonarchie ersteht erneut."
 wtt_news.57.t:0 "Wiedergeburt von [From.GetNameDef]"
 wtt_news.57.desc:0 "Da Polen und Litauen wieder von einem einzigen Staat regiert werden, nutzt die [From.GetOldAdjective]-Regierung für ihre Propaganda die Geschichte, um die Bevölkerung hinter ihrer Politik zu vereinen. „Geschichtsexperten“ bombardieren die Bevölkerung mit den verschiedenen Möglichkeiten, wie ein vereintes Polen und Litauen den Bedrohungen an ihren Grenzen begegnen könnte, und erzählen Geschichten aus der Blütezeit der polnisch-litauischen Union. Dieser Ansatz scheint die Empörung der Bevölkerung zu lenken und ihre Gedanken auf die glorreichen Zeiten vergangener Zeiten zu lenken.\n\nHeute ist die [From.GetOldAdjective]-Regierung noch einen Schritt weiter gegangen und hat die Wiederherstellung der Union proklamiert und das Land in „[From.GetNameDef]“ umbenannt."
 wtt_news.57.a:0 "Wenn Gott mit uns ist, wer ist dann gegen uns?"
 wtt_news.57.b:0 "Wird es die Teilung dieses Mal überstehen?"
 wtt_news.58.t:0 "Wiedervereinigung der Niederlande"
 wtt_news.58.desc:0 "Nach der Eroberung der anderen Niederlande durch [From.GetOldAdjective] hat deren Regierung ihr Vorgehen lautstark verteidigt. Sie erheben nun den Anspruch, die unmittelbaren und rechtmäßigen Nachfolger des Vereinigten Königreichs der Niederlande zu sein, und haben den Londoner Vertrag von 1839 mit der Begründung zurückgewiesen, er sei ihrer Regierung damals von außen kriminell aufgezwungen worden. Da die Nation nie aufgehört hat zu existieren, hat [From.GetOldNameDef] lediglich die Kontrolle über Land zurückgewonnen, das ihnen bereits gehörte.\n\nDie [From.GetOldAdjective]-Regierung hat ihren Worten Taten folgen lassen und das Land in „[From.GetNameDef]“ umbenannt. Außerdem laufen bereits umfangreiche Propagandamaßnahmen, um die Bevölkerung zu einen und die aktuellen globalen Krisen als äußere Bedrohung zu nutzen."
 wtt_news.58.a:0 "Wieder vereint, wie 1815 geplant ..."
 wtt_news.58.b:0 "Ja ... Das scheint alles eine interne Angelegenheit zu sein ..."
 wtt_news.59.t:0 "Wiedergeburt von [From.GetNameDef]"
 wtt_news.59.desc:0 "Nach der [From.GetOldAdjective]-Eroberung der anderen zentralamerikanischen Staaten hat die Regierung dieses Landes ihr Vorgehen international lautstark verteidigt. Sie sieht sich selbst als rechtmäßigen Nachfolger der Föderativen Republik Mittelamerika und brandmarkt die in den späten 1830er Jahren ausgetretenen Nationen als illegale Separatisten. Die jüngsten Kämpfe werden stets als rechtmäßige Versuche der Regierung bezeichnet, die Kontrolle über diese Gebiete wiederherzustellen.\n\nDie [From.GetOldAdjective]-Regierung hat ihren Worten Taten folgen lassen und das Land in „[From.GetNameDef]“ umbenannt. Außerdem laufen bereits umfangreiche Propagandamaßnahmen, um die Bevölkerung zu einen und die aktuellen globalen Krisen als äußere Bedrohung zu nutzen."
 wtt_news.59.a:0 "Ein notwendiger erster Schritt zum Aufstieg auf die Weltbühne."
 wtt_news.59.b:0 "Es entstehen weitere Vereinigte Staaten von Amerika."
 wtt_news.60.t:0 "Vereinigung des Baltikums"
 wtt_news.60.desc:0 "Mit der Eroberung aller baltischen Länder hat die [From.GetOldAdjective]-Regierung nun begonnen, die neu eroberten Gebiete stärker zu integrieren. Um die Bevölkerung hinter dem Staat zu vereinen, verstärkte sich die pannationalistische Propaganda mit klarer Unterstützung der Regierung. Ein [From.GetOldAdjective]-Beamter wurde mit den Worten zitiert: „Die baltischen Länder haben sich schon immer stark verbunden gefühlt. Ihre Vereinigung ist nur natürlich, insbesondere angesichts der Bedrohungen an unseren Grenzen. Nur wenn unsere Völker zusammenstehen, können sie unabhängig und frei bleiben.“ Daher proklamierten sie nun die „wahre baltische Einheit“ und benannten das Land in „[From.GetNameDef]“ um."
 wtt_news.60.a:0 "Es ist für unser Überleben notwendig."
 wtt_news.60.b:0 "Aber wird der neue Staat stark genug sein?"
 wtt_news.61.t:0 "Wiedergeburt von [From.GetNameDef]"
 wtt_news.61.desc:0 "Nachdem die [From.GetOldAdjective]-Regierung als Vertreterin des osmanischen Nachfolgestaates alle osmanischen Gebiete aus der Vorkriegszeit gesichert hatte, begann sie nun mit der Wiedereingliederung dieser Gebiete. Regierungspropaganda entbrannte, die die Teilungen der Alliierten im Ersten Weltkrieg anprangerte und die „glorreichen Tage des Reiches“ preist. Dies ist ein klarer Versuch, die Bevölkerung der neu eroberten Länder für die umfassenden nationalen Reformen und eine Rückkehr zu imperialen Normen zu gewinnen.\n\nIn diesem Zusammenhang verkündete die [From.GetOldAdjective]-Regierung die Wiederherstellung von [From.GetNameDef] und änderte den offiziellen Namen des Landes, um dies widerzuspiegeln."
 wtt_news.61.a:0 "Wir haben die Partitionen endlich rückgängig gemacht!"
 wtt_news.61.b:0 "Der Ewige Staat ist wieder auferstanden ..."
 wtt_news.62.t:0 "Vereinigung Europas"
 wtt_news.62.desc:0 "Die wichtigsten Mächte Kontinentaleuropas lagen besiegt vor [From.GetOldNameDef], und zum ersten Mal scheinen die jüngsten Träume eines vereinten Europas erreichbar. Verschiedene „Experten“, vermutlich auf der Gehaltsliste der Regierung, haben bereits wiederholt damit begonnen, die aktuelle politische Situation als einzigen Weg zu bezeichnen, „künftige europäische Konflikte zu verhindern“.\n\nUm nach außen hin den Anschein einer „Nation für alle Europäer“ zu erwecken, werden Regierungsreformen auf nationaler und lokaler Ebene mit beeindruckendem Tempo vorangetrieben. Im Rahmen dieser Reformen wurde heute angekündigt, dass das Land künftig „[From.GetNameDef]“ heißen soll, damit „sich alle Europäer darin willkommen fühlen“."
 wtt_news.62.a:0 "Ist dies das Ende aller europäischen Kriege?"
 wtt_news.62.b:0 "Mal sehen, ob sie es schaffen."
 wtt_news.63.t:0 "Aufstieg von [From.GetNameDef]"
 wtt_news.63.desc:0 "Während die [From.GetOldAdjective]-Nation in ihre Nachbarländer hineinwächst, werden die Bemühungen der Regierung, historische Kontinuität zu schaffen, immer deutlicher, offenbar um die Bevölkerung zu einen. Die Errungenschaften des Großreichs Simbabwe wurden stark romantisiert, doch unaufhörliche Propaganda scheint die öffentliche Meinung zu beeinflussen.\n\nHeute ist die [From.GetOldAdjective]-Regierung noch einen Schritt weiter gegangen und hat das Land in „[From.GetNameDef]“ umbenannt, eine Ankündigung, die von ausgelassenen Menschenmengen in den Straßen der Großstädte begrüßt wurde."
 wtt_news.63.a:0 "Ein Afrika für Afrikaner!"
 wtt_news.63.b:0 "Ist dies das Ende des kolonialen Afrikas?"
 wtt_news.64.t:0 "Aufstieg von [From.GetNameDef]"
 wtt_news.64.desc:0 "Der militärische Vormarsch von [From.GetOldAdjective] scheint unaufhaltsam, und die Idee, die in den letzten Jahren von vielen belächelt wurde – die Schaffung eines neuen Römischen Reiches – scheint nun für die Italiener in greifbare Nähe gerückt. Die meisten kontinentaleuropäischen Mächte, die ihnen Widerstand leisten könnten, wurden praktisch eliminiert, sodass die Italiener nun ihren Willen den eroberten Völkern aufzwingen können.\n\nZusätzlich zur beginnenden Integration der bereits als „zurückeroberten römischen Gebiete“ bezeichneten Gebiete hat die italienische Regierung nun die Wiedergeburt des Römischen Reiches verkündet und die Nation in „[From.GetNameDef]“ umbenannt."
 wtt_news.64.a:0 "Roma Invicta!"
 wtt_news.64.b:0 "Das kann nicht ihr Ernst sein!"
 wtt_news.65.t:0 "Aufstieg von [From.GetNameDef]"
 wtt_news.65.desc:0 "Während der [From.GetOldAdjective]-Vormarsch weitergeht, sind die historischen Parallelen auch Kennern der persischen Geschichte nicht entgangen. Namhafte Persönlichkeiten des öffentlichen Lebens vergleichen diese Expansion bereits mit der Zeit Kyros des Großen, und in der gesamten [From.GetOldAdjective]-Gesellschaft wächst der Nationalstolz.\n\nDa die Regierung die Kontrolle über die neuen Gebietseroberungen ausweitet und von der hohen öffentlichen Zustimmung profitiert, wurde nun von offiziellen Stellen bestätigt, dass die Nation offiziell in „[From.GetNameDef]“ umbenannt wird."
 wtt_news.65.a:0 "Unsere Stärke wächst weiter!"
 wtt_news.65.b:0 "Wird es Frieden und Stabilität in die Region bringen?"
 wtt_news.66.t:0 "Aufstieg von [From.GetNameDef]"
 wtt_news.66.desc:0 "[From.GetOldAdjectiveCap]s Aufstieg hat viele Militärexperten weltweit verblüfft, doch die Ergebnisse sprechen für sich. In nur wenigen Jahren haben die Griechen den Balkan völlig beherrscht, Istanbul zurückerobert und jeglichen organisierten türkischen Widerstand in Anatolien niedergeschlagen. Es scheint, als sei der endgültige Abschluss eines über fünf Jahrhunderte andauernden griechisch-türkischen Konflikts erreicht.\n\nUm den Nationalstolz weiter zu stärken, hat die [From.GetOldAdjectiveCap]-Regierung die historische Kontinuität ausgenutzt und ihre militärischen Erfolge als „byzantinische Rückeroberung der türkischen Invasoren“ dargestellt. Als Teil dieser Propaganda und inmitten einer extravaganten zeremoniellen Parade im neu umbenannten Konstantinopel wurde bekannt gegeben, dass [From.GetOldNameDef] seinen offiziellen Namen in „[From.GetNameDef]“ geändert hat."
 wtt_news.66.a:0 "Lasst die Rückeroberung beginnen."
 wtt_news.66.b:0 "Eine wundersame Wende des Schicksals ..."
 wtt_news.67.t:0 "Vereinigung Arabiens"
 wtt_news.67.desc:0 "Mit der [From.GetOldAdjective] Eroberung des größten Teils der arabischen Welt nutzte die Regierung die erneute Welle des Panarabismus, die sich in der Region ausbreitete. Da internationale Meinungsverschiedenheiten durch die vollständige Beseitigung widerspenstiger ausländischer Regierungen mit militärischen Mitteln „gelöst“ wurden, schien die arabische Vereinigung in greifbare Nähe gerückt, und die [From.GetOldAdjective]-Regierung hat bereits ihre Bereitschaft gezeigt, dieses Ziel zu verfolgen.\n\nOb es nun lediglich darum geht, auf der Welle des öffentlichen Wohlwollens zu reiten, als Heimat für alle Araber zu gelten oder einfach um die regionale Integration zu erleichtern: [From.GetOldAdjective]-Beamte haben nun bestätigt, dass der offizielle Name des Landes in „[From.GetNameDef]“ geändert werden soll."
 wtt_news.67.a:0 "Zaydans Traum ist wahr geworden."
 wtt_news.67.b:0 "Wird dies zu einem dauerhaften Frieden in der Region führen?"
 wtt_news.68.t:0 "Aufstieg von [From.GetNameDef]"
 wtt_news.68.desc:0 "Während die [From.GetOldAdjective]-Nation in ihre Nachbarländer hineinwächst, werden die Bemühungen der Regierung, historische Kontinuität zu schaffen, immer deutlicher, offenbar um die Bevölkerung zu einen. Die Errungenschaften des Majapahit-Reiches wurden stark romantisiert, doch die unaufhörliche Propaganda scheint die öffentliche Meinung zu beeinflussen.\n\nHeute ist die [From.GetOldAdjective]-Regierung noch einen Schritt weiter gegangen und hat das Land in „[From.GetNameDef]“ umbenannt, um die Geschichte der Region zu würdigen und zu hoffen, dass sich jeder in der Region damit identifizieren kann."
 wtt_news.68.a:0 "Dies ist das Ende des asiatischen Kolonialismus!"
 wtt_news.68.b:0 "Sie haben ihr Schicksal selbst in die Hand genommen."
 wtt_news.69.t:0 "Wiedergeburt von [From.GetNameDef]"
 wtt_news.69.desc:0 "Während die [From.GetOldAdjective]-Nation in ihre Nachbarländer hineinwächst, hat die Regierung ihre Abkehr vom Namen Rattanakosin überdacht. Da die heutigen Grenzen immer mehr denen aus der historischen Blütezeit des Königreichs ähneln, werden die Errungenschaften des Königreichs Rattanakosin zunehmend dazu genutzt, die öffentliche Meinung zu beeinflussen.\n\nHeute ist die [From.GetOldAdjective]-Regierung noch einen Schritt weiter gegangen und hat das Land offiziell in „[From.GetNameDef]“ umbenannt, um Legitimität aus der Geschichte zu ziehen."
 wtt_news.69.a:0 "Wir haben unsere Hegemonie wiederhergestellt."
 wtt_news.69.b:0 "Zerfallen die Kolonialreiche?"
 wtt_news.70.t:0 "Wiedergeburt von [From.GetNameDef]"
 wtt_news.70.desc:0 "Unter der Herrschaft von Kaiserin Victoria hat [From.GetOldNameDef] seine Grenzen stark erweitert und sogar die des alten Heiligen Römischen Reiches übertroffen. Alle kontinentalen Feinde, die ihre Herrschaft in Frage stellten, wurden von der [From.GetOldAdjective]-Militärmaschinerie in die Knie gezwungen, sodass sie ihre Politik ungehindert fortsetzen konnte.\n\nNun hat die Kaiserin verfügt, dass die sich bietende Gelegenheit genutzt werden soll und die Nation zum geistigen Nachfolger des Heiligen Römischen Reiches werden soll. Um dies zu verdeutlichen, wurde die Nation nun offiziell umbenannt, und damit ist endlich die politische Vereinigung der Region gelungen, die den Kaisern jahrhundertelang entgangen war."
 wtt_news.70.a:0 "Aquila Elegit Iovis Omnia Vincit!"
 wtt_news.70.b:0 "Ihre Pracht und Herrlichkeit sind unbestreitbar!"

 
