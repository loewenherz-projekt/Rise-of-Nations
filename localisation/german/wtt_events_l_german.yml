l_german:
 generic.8.t:0 "Meister des Atoms"
 generic.8.d:0 "Wir haben die erste Atomwaffe der Welt eingesetzt und uns damit an die Spitze des aktuellen Wettrüstens gesetzt. Unsere immensen Anstrengungen haben sich gelohnt, und die Welt wird vorerst keine andere Wahl haben, als unsere Macht zu bewundern. Sie könnten uns eines Tages ebenbürtig sein, aber wir haben dafür gesorgt, dass sie uns niemals übertreffen werden."
 generic.8.a:0 "Zerschmettere unsere Feinde zu Staub!"
 generic.9.t:0 "Im Schatten der Anderen"
 generic.9.d:0 "Andere haben die erste Atomwaffe der Welt eingesetzt und liegen damit klar an der Spitze des aktuellen Wettrüstens. Trotz unserer Bemühungen sind wir wehrlos und haben keine Möglichkeit zur Vergeltung. Völlig unterlegen, bleibt uns keine andere Wahl, als unsere Anstrengungen zu verdoppeln und die Lücke zu schließen, bevor sie noch größere Zerstörung anrichten können."
 generic.9.a:0 "Das Programm muss alles bekommen, was wir entbehren können."
 generic.10.t:0 "Mächtige Freunde"
 generic.10.d:0 "Unsere Verbündeten haben die erste Atomwaffe der Welt eingesetzt und damit die Führung im aktuellen Wettrüsten übernommen. Obwohl wir unterlegen sind, beherrscht unser Verbündeter die Waffe. Das sichert uns die Möglichkeit, zurückzuschlagen, sollte ein Feind selbst die Kontrolle über das Atom erlangen."
 generic.10.a:0 "Ein akzeptables Ergebnis."
 wtt_denmark.1.t:0 "Isländische Unabhängigkeit" 
 wtt_denmark.1.d:0 "Mit dem Abbruch der Kontakte nach der Invasion hat das isländische Parlament die Kontrolle über die Außenpolitik des Landes übernommen. Dies ist als vorübergehende Maßnahme bis zum Ende der Besatzung zu verstehen."
 wtt_denmark.1.a:0 "Na dann viel Glück."
 news.331.t:0 "Island übernimmt die Kontrolle über die Außenpolitik"
 news.331.desc:0 "Mit der Kapitulation seines Unionspartners Dänemark hat das isländische Parlament die Kontrolle über seine Außenpolitik übernommen und ist damit faktisch zu einem völlig unabhängigen Staat geworden. Der neu gewählte provisorische Gouverneur hat bereits die Neutralität Islands im aktuellen Konflikt verkündet, trotz der Invasion des Mutterlandes."
 news.331.a:0 "Die Neutralität hat Dänemark nicht gerettet."
 wtt_britain.24.t:0 "Der MacDonald-Vorschlag"
 wtt_britain.24.d:0 "Da der aktuelle Krieg die britischen Konvois stark belastet, sind unsere östlichen Nachbarn zunehmend an der Nutzung unserer Luft- und Marinestützpunkte interessiert, um von dort aus die Schutzabdeckung ihrer Konvoirouten ausweiten zu können. Ein britischer Gesandter namens Malcolm MacDonald ist nun eingetroffen und schlägt die Rückgabe Nordirlands an die irische Souveränität vor, wenn wir im Gegenzug auf Seiten Großbritanniens sofort in den Krieg eintreten würden."
 wtt_britain.24.a:0 "Eine hervorragende Idee."
 wtt_britain.24.b:0 "Der Preis ist die Kosten nicht wert."
 wtt_britain.25.t:0 "Britische Nachfrage nach französischer Flotte"
 wtt_britain.25.d:0 "Britische Flotten sind vor den Haupthäfen unserer Flotte aufgetaucht, und wir haben ein Ultimatum erhalten, das die sofortige Kapitulation unserer Marine fordert. Wenn wir unsere Schiffe nicht sofort in britische Häfen bringen, hat der britische Admiral gedroht, das Feuer zu eröffnen."
 wtt_britain.25.a:0 "Wir haben keine andere Wahl..."
 wtt_britain.25.b:0 "Wir werden niemals zulassen, dass eine andere Nation unsere Flotte übernimmt!"
 wtt_britain.26.t:0 "Französische Kapitulationsflotte"
 wtt_britain.26.d:0 "Die Franzosen haben die weise Entscheidung getroffen, ihre Schiffe in unsere Häfen zu schicken. Wir haben nun die vollständige Kontrolle über die französische Flotte."
 wtt_britain.26.a:0 "Zumindest haben wir es vor den Deutschen bewahrt."
 wtt_britain.27.t:0 "Franzosen lehnen Ultimatum ab"
 wtt_britain.27.d:0 "Die Franzosen haben unsere Forderungen abgelehnt. Wir stehen nun vor der wenig beneidenswerten Wahl, entweder nachzugeben oder uns gegen unsere ehemaligen Verbündeten zu wenden …"
 wtt_britain.27.a:0 "Wir können nicht zulassen, dass die französische Flotte deutschen Interessen dient!"
 wtt_britain.27.b:0 "Das ist zu unangenehm. Wir müssen einen Rückzieher machen."
 news.332.t:0 "Französische Kapitulationsflotte"
 news.332.desc:0 "Gestern blockierten britische Marineeinheiten ihre französischen Gegenstücke in wichtigen Marinestützpunkten in Nordafrika und stellten den Franzosen ein Ultimatum, unverzüglich britische Häfen anzulaufen und die Kontrolle über ihre Flotte aufzugeben. Andernfalls würden die Briten das Feuer auf ihren ehemaligen Verbündeten eröffnen. Angesichts der überlegenen Feuerkraft akzeptierten die Franzosen das Ultimatum, und ihre Flotte steht nun unter britischer Kontrolle."
 news.332.a:0 "Eine weise Entscheidung."
 news.332.b:0 "Glücklicherweise konnte ein Blutvergießen verhindert werden."
 news.332.c:0 "Wie können sie es wagen?!"
 news.332.d:0 "Wir hatten keine Wahl."
 news.332.e:0 "Sie werden den Kampf unter der Herrschaft der Briten fortsetzen."
 news.333.t:0 "Britischer Angriff auf Mers-el-Kébir"
 news.333.desc:0 "Gestern blockierten britische Marineeinheiten ihre französischen Gegenstücke in wichtigen Marinestützpunkten in Nordafrika und stellten den Franzosen ein Ultimatum, unverzüglich britische Häfen anzulaufen und die Kontrolle über ihre Flotte aufzugeben. Andernfalls würden die Briten das Feuer auf ihren ehemaligen Verbündeten eröffnen. Als Frankreich die britischen Forderungen ablehnte, kam es zu einem Schusswechsel, bei dem mindestens ein französisches Schlachtschiff sank und große Teile der französischen Flotte schwer beschädigt wurden."
 news.333.a:0 "Wir haben getan, was getan werden musste."
 news.333.b:0 "Das ist unerhört!"
 news.333.c:0 "Vielleicht haben wir sie unterschätzt."
 news.333.d:0 "Wir werden diesen Verrat nicht so schnell vergessen!"
 news.333.e:0 "Sie haben ihre Entschlossenheit bewiesen."
 wtt_britain.28.t:0 "Irland akzeptiert MacDonalds Vorschlag"
 wtt_britain.28.d:0 "Die irische Regierung hat unseren Vorschlag angenommen und sich im Gegenzug für Nordirland unserer Sache angeschlossen."
 wtt_britain.29.t:0 "Irland lehnt MacDonalds Vorschlag ab"
 wtt_britain.29.d:0 "Die irische Regierung hat unseren Vorschlag abgelehnt und sich geweigert, sich unserem Kampf für die Demokratie anzuschließen."
 wtt_britain.29.a:0 "Wer wird ihnen helfen, wenn die Deutschen sie holen kommen?"
 wtt_britain.30.t:0 "Amerikanische Notwaffenlieferungen"
 wtt_britain.30.d:0 "Die amerikanische Regierung hat uns mit freundlicher Unterstützung des American Committee for Defense of British Homes eine Notlieferung alter Gewehre, Ausrüstung und einiger Artilleriegeschütze zukommen lassen. Die Auswahl ist zu vielfältig, um für unsere Armee wirklich von Nutzen zu sein, aber sie wird zweifellos einen großen Beitrag zur schnellen Ausrüstung der Garnisonen der Home Guard leisten."
 wtt_britain.30.a:0 "Sie haben uns vor einer Invasion gerettet!"
 wtt_germany.1.t:0 "Wehrmachtsoffiziere fordern Hitler heraus"
 wtt_germany.1.d:0 "Die latente Unzufriedenheit mit Hitlers Herrschaft hat in der aktuellen Krise, die durch die Remilitarisierung des Rheinlands ausgelöst wurde, ihren Höhepunkt erreicht. Mehrere Wehrmachtsgeneräle haben sich hinter den bekannten Feldmarschall August von Mackensen gestellt, der Pläne zur Absetzung Hitlers und zur Vertreibung der NSDAP aus Deutschland in die Tat umsetzt. Da die Spaltung des deutschen Oberkommandos auch im Ausland deutlich sichtbar wird, protestieren ausländische Mächte nicht gegen die Remilitarisierung. Sie sind mehr besorgt über die wachsende innerdeutsche Instabilität. Der alternde Feldmarschall hat rasch reagiert und bereits eine provisorische Regierung eingesetzt, der sich zahlreiche Anhänger aus Protest gegen die Nazi-Regierung angeschlossen haben. Der Militärputsch ist bereits in vollem Gange."
 wtt_germany.1.a:0 "Säubert unser Land von diesem Nazi-Abschaum!"
 wtt_germany.2.t:0 "Deutsche Auswanderer unterstützen die Sache"
 wtt_germany.2.d:0 "Nach der jüngsten harten Behandlung und Zwangsausbürgerung in ihrem Heimatland sind viele unserer vertriebenen deutschen Kameraden in unsere Umgebung geströmt. Mit etwas Führung ist es uns gelungen, aus diesen eifrigen Rekruten mehrere Divisionen zu bilden, die nun bereit sind, gegen unsere Feinde zu kämpfen!"
 wtt_germany.3.t:0 "Deutschland hebt Exil Wilhelms II. auf"
 wtt_germany.3.d:0 "Deutschland hat Wilhelm II. eingeladen, als Kaiser in sein Vaterland zurückzukehren. Angesichts der jüngsten turbulenten Ereignisse könnte dies den Deutschen helfen, Frieden und Stabilität in ihrem Land zu schaffen. Die Augen der Welt sind jedoch auf uns gerichtet, da viele den schrecklichen Konflikt, in den uns der alte Kaiser vor knapp zwei Jahrzehnten gestürzt hat, noch nicht vergessen haben."
 wtt_germany.3.a:0 "Wir müssen ihm erlauben, zurückzukehren und sein Volk zu führen."
 wtt_germany.3.b:0 "Wir müssen ihn aufhalten – wir können keinen weiteren Großen Krieg riskieren."
 wtt_germany.4.t:0 "Kaiser kehrt nach Deutschland zurück"
 wtt_germany.4.d:0 "Unter rauschenden Feierlichkeiten ist Wilhelm II. als Kaiser ins Deutsche Reich zurückgekehrt! Die Niederlande sind zu Dank verpflichtet, weil sie ihm in den vergangenen Jahrzehnten sichere Zuflucht gewährt und seine Auslieferung an unsere ehemaligen Feinde mehrfach abgelehnt haben. Obwohl die Nation im jüngsten Bürgerkrieg schwer gelitten hat, ist zu hoffen, dass die Rückkehr des Kaisers weitere Stabilität und Einheit bringen wird."
 wtt_germany.4.a:0 "Er wird die Nation zweifellos gut führen."
 wtt_germany.5.t:0 "Niederlande verhindern Rückkehr des Kaisers"
 wtt_germany.5.d:0 "Die niederträchtigen Niederlande, die Wilhelm II. so lange edelmütig Zuflucht gewährt hatten, blockierten nun den Versuch des Kaisers, die Grenze nach Deutschland zu überqueren, und eskortierten ihn zurück in seine Residenz, Huis Doorn. Als Grund für die Verweigerung der Rückkehr des Kaisers auf den deutschen Thron nannten die Niederländer die Sorge um die Stabilität des Kontinents."
 wtt_germany.5.a:0 "Wir werden ihnen einige dringendere Anliegen geben!"
 wtt_germany.5.b:1 "Vielleicht haben sie recht ... Wir haben andere Kandidaten."
 wtt_germany.5_tt:0 "Der alte Kaiser könnte seinem Sohn bei seiner Herrschaft durchaus helfen.\n"
 wtt_germany.6.t:0 "Wilhelm II. befreit"
 wtt_germany.6.d:0 "Nachdem unsere Truppen die Gegend um Huis Doorn von niederländischen Truppen geräumt hatten, fanden sie den Kaiser bei guter Gesundheit vor und brachten ihn in einem Autokonvoi nach Deutschland zurück. Wilhelm II. überquerte erst vor wenigen Stunden triumphierend die Grenze und übernahm bei seiner Ankunft in Berlin feierlich die Verantwortung als Kaiser des Deutschen Reiches."
 wtt_germany.6.a:0 "Niemand wird uns aufhalten."
 GER_fascism_civil_war_tt:0 "Die faschistischen Anhänger beginnen einen Bürgerkrieg.\n"
 wtt_germany.7.t:0 "Unkontrollierte wirtschaftliche Abhängigkeit von [From.GetName]"
 wtt_germany.7.d:0 "Mit der allmählichen Abwärtsspirale in den Einflussbereich von [From.GetNameDef] ist unsere Wirtschaft immer abhängiger von der unseres Verbündeten geworden. Als die Deutschen heute endlich die Kontrolle über unsere Wirtschaft übernahmen, waren wir machtlos, sie aufzuhalten. Infolgedessen hat die deutsche Kontrolle über unsere Außenpolitik ein beispielloses Ausmaß erreicht."
 wtt_germany.7.a:0 "Wir müssen mit der Situation klarkommen ... vorerst."
 wtt_germany.8.t:0 "Deutschland bietet Unterstützung für monarchistischen Putsch an"
 wtt_germany.8.d:0 "[From.GetNameDefCap] hat sich an monarchiefreundliche und antifaschistische Elemente der italienischen Regierung und des Untergrunds gewandt und Pläne für die Ermordung Mussolinis und die Einsetzung Viktor Emanuels III. als Staatsoberhaupt geäußert. Die Deutschen versichern uns, dass sie das Attentat durchführen können; wir müssen lediglich unsere Bereitschaft zur Bildung einer Ersatzregierung bekräftigen und die deutschen Bemühungen künftig militärisch unterstützen."
 wtt_germany.8.a:0 "Wir müssen in der kommenden Zeit auf die Monarchie achten."
 wtt_germany.8.b:0 "Unglaublich! Wir werden unsere Gewohnheiten niemals aufgeben!"
 wtt_germany.9.t:0 "Italiener akzeptieren Putschvorschlag"
 wtt_germany.9.d:0 "Teile der italienischen Regierung und des Untergrunds haben unseren Putschvorschlag akzeptiert. Sie treffen Vorbereitungen für eine schnelle Machtübernahme des Königs, sobald das Attentat stattgefunden hat."
 wtt_germany.9.a:0 "Wir können unsere Pläne in die Tat umsetzen."
 wtt_germany.10.t:0 "Italiener lehnen Putschvorschlag ab"
 wtt_germany.10.d:0 "Die von uns kontaktierten Elemente der italienischen Regierung und des Untergrunds haben uns in nicht gerade freundlichen Worten mitgeteilt, dass sie an unserem Putschvorschlag kein Interesse hätten. Sie drohten, unsere Pläne der italienischen Regierung zu offenbaren, sollten wir es wagen, das gleiche Angebot noch einmal zu machen."
 wtt_germany.10.a:0 "Wie schade."
 wtt_germany.11.t:0 "Deutsche Ermordung Mussolinis"
 wtt_germany.11.d:0 "Der deutsche Plan wurde in die Tat umgesetzt und Mussolini wurde heute in seinem Auto auf den Straßen Roms erschossen. König Viktor Emanuel III. hat die Zügel der Nation übernommen und versprochen, sich an der Seite von [From.GetNameDef] den Mittelmächten anzuschließen."
 wtt_germany.11.a:0 "Wir müssen unsere Dankbarkeit zeigen."
 wtt_germany.12.t:0 "Mussolinis Ermordung gelingt"
 wtt_germany.12.d:0 "Unser Plan wurde fehlerlos ausgeführt, und Viktor Emanuel III. übernahm die Führung seines Landes. Seine erste Amtshandlung war die Unterzeichnung eines Vertrags, der Italien den Beitritt zum Bündnis der Mittelmächte sicherte."
 wtt_germany.12.a:0 "Die Monarchien werden wieder auferstehen!"
 wtt_germany.13.t:0 "Wiedervereinigung Österreich-Ungarns"
 wtt_germany.13.d:0 "Mit unserer Unterstützung hat [From.GetOldName] die Führung bei der Wiedervereinigung der österreichisch-ungarischen Monarchie übernommen. Heute Morgen wurden Verträge zwischen den beteiligten Parteien unterzeichnet, die zwei Jahrzehnte separatistischer Stimmungen ein Ende setzen. Die neue Einheitsregierung sicherte unserer Sache umgehend militärische Unterstützung zu und wurde Mitglied der Mittelmächte."
 wtt_germany.13.a:0 "Unser alter Verbündeter ist auf unsere Seite zurückgekehrt."
 wtt_germany.14.t:0 "Deutschland bietet Gebietsgarantie an"
 wtt_germany.14.d:0 "[From.GetNameDefCap] hat uns ein Angebot unterbreitet, das beiden Seiten Vorteile bringen könnte. Angesichts der aktuellen politischen Lage und der Bedrohung an unserer Ostgrenze bieten die Deutschen eine Garantie für militärische Hilfe im Falle eines Krieges mit der Sowjetunion an. Im Gegenzug verlangen sie lediglich die Rückgabe ihrer verlorenen Gebiete Danzig und Posen."
 wtt_germany.14.a:0 "Ihre militärische Macht ist für uns nützlicher als Land."
 wtt_germany.14.b:0 "Wir werden unser Land niemals aufgeben!"
 wtt_germany.15.t:0 "Polen nimmt Angebot an"
 wtt_germany.15.d:0 "Die Polen haben sich entschlossen, unser Angebot anzunehmen und haben Vereinbarungen getroffen, um ihre Grenzprovinzen an uns zu übertragen. Sie haben ihr Vertrauen in uns gesetzt und fordern uns auf, im Falle einer sowjetischen Aggression bereit zu sein."
 wtt_germany.15.a:0 "Dieser Schandfleck von Versailles ist endlich beseitigt!"
 wtt_germany.16.t:0 "Polen lehnt Angebot ab"
 wtt_germany.16.d:0 "Die Polen haben beschlossen, unser Angebot abzulehnen. In eindringlichen Worten haben sie klargestellt, dass sie ihr Territorium niemals freiwillig aufgeben werden und sich jedem Feind lieber allein stellen würden, wenn dies der Preis für Hilfe ist."
 wtt_germany.16.a:0 "Wir werden unsere Ansprüche niemals aufgeben!"
 wtt_germany.16.b:0 "Vielleicht müssen wir uns damit abfinden."
 wtt_germany.17.t:0 "Deutsche Kommunisten fliehen nach Frankreich"
 wtt_germany.17.d:0 "Die deutsche Regierung ist hart gegen den Kommunismus vorgegangen und hat ihn ins Ausland verbannt. Infolgedessen erhalten wir jetzt einen großen Zustrom kommunistischer Ideologen aus unserem Nachbarland ..."
 wtt_germany.17.a:0 "Wenn das Land dadurch nur nicht zu sehr destabilisiert würde …"
 wtt_germany.18.t:0 "Nazi-Führung gefangen genommen"
 wtt_germany.18.d:1 "Endlich haben wir unser Land aus den Fängen unserer Feinde befreit, und die loyalen Bürger, die sich für unsere Sache erhoben, können nun endlich in ihre Heimat zurückkehren. Als Nation können wir mit dem langen und mühsamen Wiederaufbau beginnen. Die Führung des Landes wiederum kann sich auf die Zukunft konzentrieren: Demokratie oder eine Rückkehr zur alten Monarchie.\n\nEine letzte Sache bleibt jedoch noch zu klären. Mit dem Ende des Bürgerkriegs gelang es unseren Truppen, einen großen Teil der Nazi-Führung gefangen zu nehmen. Nun bleibt nur noch die Entscheidung, wie mit diesem unappetitlichen Teil unserer jüngeren Geschichte verfahren werden soll."
 wtt_germany.18.a:0 "Hängen Sie sie auf!"
 wtt_germany.18.b:0 "Sperren Sie sie lebenslang ein, sie könnten in der Zukunft nützlich sein."
 wtt_germany.19.t:0 "[From.GetName] spricht sich gegen die Sowjetunion aus"
 wtt_germany.19.d:0 "Die jüngste Rhetorik gegen uns schadet unserem Ruf in Europa zunehmend. Verleumderische Anschuldigungen unserer angeblichen „Aggression“ führen zu Ängsten und Missverständnissen hinsichtlich unserer Absichten."
 wtt_germany.19.a:0 "Starten Sie eine Reihe großer Militärübungen, um sie alle einzuschüchtern!"
 GER_soviet_military_exercises:0 "Militärübungen"
 wtt_germany.19.b:1 "Wir müssen unseren Ruf retten und reibungslose Beziehungen gewährleisten."
 GER_soviet_smoothes_relationships:0 "Geglättete Beziehungen"
 wtt_germany.19.c:0 "Glauben sie, dass es uns interessiert, was sie über uns sagen?"
 wtt_germany.20.t:0 "Deutschland gründet mitteleuropäische Allianz"
 wtt_germany.20.d:0 "Die Deutschen setzen ihre Verleumdungskampagne gegen uns fort und haben nun die Gründung eines neuen Bündnisses angekündigt. Es besteht wenig Zweifel daran, dass dieses Bündnis sich gegen uns richtet und dass sie in unseren Einflussbereich eingreifen wollen."
 wtt_germany.20.a:0 "Sie sollten sich besser aus unserem Einflussbereich heraushalten!"
 GER_soviet_reiterated_claims:0 "Wiederholte Behauptungen"
 wtt_germany.20.b:0 "Wir dürfen ihnen keinen Vorwand für eine weitere Eskalation liefern."
 wtt_germany.21.t:0 "Deutsche laden Balten ein"
 wtt_germany.22.t:0 "Deutsche laden Polen ein"
 wtt_germany.23.t:0 "Deutsche laden Finnland ein"
 wtt_germany.21.d:0 "Die Deutschen haben einem Land in unserem unmittelbaren Einflussbereich die Mitgliedschaft angeboten. Die Bedrohung für das Mutterland ist offensichtlich!"
 wtt_germany.21.a:0 "Wir müssen zuschlagen, um den Rest zu sichern!"
 GER_soviet_securing_sphere:0 "Einflussbereich sichern"
 wtt_germany.21.b:0 "Wir können es uns nicht leisten, den Westen zu verärgern."
 wtt_germany.24.t:0 "Die große rote Bedrohung"
 wtt_germany.24.d:0 "Über offizielle und inoffizielle Kanäle haben die [From.GetAdjective] deutlich gemacht, dass die Sowjetunion seit ihrer Gründung vor zwei Jahrzehnten die größte Bedrohung für die Stabilität Europas darstellt und war. Sie haben uns eindringlich daran erinnert, dass wir mit der Bedrohung durch den Kommunismus nicht allein sind und dass wir den Bären besiegen können, wenn sich der Kontinent nur vereint."
 wtt_germany.24.a:0 "Hoffen wir, dass sie Recht haben."
 wtt_germany.25.t:0 "Die Sowjetunion glättet die Beziehungen"
 wtt_germany.25.d:0 "Die Sowjetunion hat sich nach Kräften bemüht, die Sorgen der europäischen Nationen zu zerstreuen. In einer öffentlichen Erklärung hat sie erklärt, sie hege keine feindseligen Absichten und hofft, dass ihre zurückhaltende Reaktion auf die kriegerische Rhetorik für sie spricht."
 wtt_germany.25.a:0 "Das bleibt abzuwarten."
 wtt_germany.26.t:0 "Wilhelm II. stirbt"
 wtt_germany.26.d:0 "Gestern Nacht ist Wilhelm II., unser geliebter Kaiser, friedlich im Schlaf gestorben. Trotz seines langen Exils hatte die Vorsehung es für angebracht befunden, ihm die Rückkehr ins Vaterland lange vor seinem Tod zu ermöglichen, und seit seiner Rückkehr hat er unser Land gut geführt. Sein Sohn Friedrich Wilhelm hat nun die Zügel der Nation übernommen und wird nach seiner Krönung Wilhelm III. heißen."
 wtt_germany.26.a:0 "Es lebe der Kaiser!"
 wtt_germany.27.t:0 "August Von Mackensen stirbt"
 wtt_germany.27.d:0 "Gestern Abend ist August von Mackensen, unser hochgeschätzter Feldmarschall, friedlich im Schlaf verstorben. Seine gefeierten Heldentaten im Ersten Weltkrieg und die Vertreibung der faschistischen Unterdrücker aus unserer Heimat werden uns noch lange in Erinnerung bleiben. Der Sohn des verbannten Kaisers, Friedrich Wilhelm, hat das Machtvakuum der Nation gefüllt und wird nach seiner Krönung als Wilhelm III. das Reich als erster Kaiser seit der Abdankung seines Vaters im Jahr 1918 regieren."
 wtt_germany.28.t:0 "Deutschland hebt Exil Wilhelms II. auf"
 wtt_germany.28.d:0 "Das Deutsche Reich hat die Verbannung Wilhelms II. aufgehoben und sich nun an die Niederlande gewandt, um die Rückkehr des alten Kaisers zu erbitten. Trotz zahlreicher Auslieferungsappelle an die niederländische Regierung, ihn für den Ausbruch des Ersten Weltkriegs zur Rechenschaft zu ziehen, scheint der Kriegstreiber zurückzukehren und die Zügel des Deutschen Reiches zu übernehmen."
 wtt_germany.28.d.2:0 "Das Deutsche Reich hat die Verbannung Wilhelms II. aufgehoben und sich nun an die Niederlande gewandt, um die Rückkehr des alten Kaisers zu erbitten. Da die Niederlande seine Rückkehr verweigern, eskaliert die Situation nun zu einem militärischen Konflikt!"
 germany.60.c:0 "Sie werden nicht allein stehen! Versammelt die Briten zum Krieg!"
 wtt_germany.29.d:0 "Das Deutsche Reich hat die Verbannung Wilhelms II. aufgehoben und sich nun an die Niederlande gewandt, um die Rückkehr des alten Kaisers zu erbitten. Trotz zahlreicher Auslieferungsappelle an die niederländische Regierung, um ihn für den Ausbruch des Ersten Weltkriegs zur Rechenschaft zu ziehen, scheint der Kriegstreiber zurückzukehren und die Zügel des Deutschen Reiches zu übernehmen.\n\nDie Franzosen haben dies bereits für inakzeptabel erklärt und scheinen ein Ultimatum mit militärischer Gewalt zu stellen. Die britische Bevölkerung ist gegen einen Krieg, doch wenn wir uns weigern, den Franzosen beizustehen, wird unser Bündnis mit ihnen aufgelöst."
 wtt_germany.29.d.2:0 "Das Deutsche Reich hat die Verbannung Wilhelms II. aufgehoben und sich nun an die Niederlande gewandt, um die Rückkehr des alten Kaisers zu fordern. Angesichts der Weigerung der Niederlande, seine Rückkehr zu gestatten, haben sie dies nun zu einem militärischen Konflikt eskalieren lassen!\n\nDie Franzosen haben bereits entschieden, dass dies inakzeptabel ist, und scheinen entschlossen, ein Ultimatum zu stellen, das mit militärischer Gewalt untermauert wird. Die öffentliche Meinung in Großbritannien ist gegen einen Krieg, aber wenn wir uns weigern, den Franzosen beizustehen, wird unser Bündnis mit ihnen aufgelöst."
 germany.61.c:0 "Wir müssen den Holländern zu Hilfe kommen!"
 wtt_germany.30.d:0 "Das Deutsche Reich hat die Verbannung Wilhelms II. aufgehoben und sich nun an die Niederlande gewandt, um die Rückkehr des alten Kaisers zu erbitten. Trotz zahlreicher Auslieferungsappelle an die niederländische Regierung, um ihn für den Ausbruch des Ersten Weltkriegs zur Rechenschaft zu ziehen, scheint der Kriegstreiber zurückzukehren und die Zügel des Deutschen Reiches zu übernehmen.\n\nDie Franzosen scheinen sich in ihrer Reaktion auf diesen Skandal auf diplomatische Einwände zu beschränken, und die öffentliche Meinung in Großbritannien ist entschieden gegen einen Krieg."
 wtt_germany.31.d:0 "Die Briten weigern sich, uns im Kampf gegen Deutschland zu unterstützen, da sie behaupten, die Frage der deutschen Monarchie sei eine interne Angelegenheit. Sollten wir gegen die Deutschen in den Krieg ziehen, wären wir auf uns allein gestellt. Die öffentliche Meinung in Frankreich ist gegen einen Krieg, doch Deutschland würde nur stärker werden, und die Rückkehr des Kaisers könnte neue imperialistische Stimmungen hervorrufen. Ein Ultimatum wäre ohne Großbritannien an unserer Seite weniger bedrohlich. Sollten wir allein gegen sie vorgehen?"
 wtt_germany.32.d:0 "Obwohl die Unterstützung der britischen Bevölkerung für einen Krieg gering ist, hat die britische Regierung die Bedrohung durch die Deutschen erkannt und uns ihre volle Unterstützung zugesagt. Wir werden Deutschland ein letztes Ultimatum stellen, um die Rückkehr des kriegstreiberischen Kaisers zu verhindern. Sollte Deutschland sich weigern, ist es Zeit für unsere Truppen, tief in Deutschland einzudringen und seinem tyrannischen Regime ein Ende zu setzen!"
 wtt_germany.33.d:0 "Briten und Franzosen lehnen die Rückkehr unseres Kaisers ab und bezeichnen es als „Unverschämtheit“, dass der angebliche Anstifter des Ersten Weltkriegs auf seinen Thron zurückkehren darf. Sie mobilisieren ihre Streitkräfte gegen uns und haben ein Ultimatum gestellt: Unsere Truppen müssen sich sofort zurückziehen und den Kaiser in sein Exil zurückschicken, andernfalls befinden sich unsere Nationen im Krieg."
 wtt_germany.33.a:0 "Wir dürfen nicht nachgeben! Es lebe der Kaiser!"
 wtt_germany.34.d:0 "Die Briten haben Einsicht gezeigt und die Rückkehr des Kaisers akzeptiert, doch die wütenden Franzosen weigern sich, nachzugeben! Sie behaupten, dieser Vorfall stelle eine direkte Bedrohung für die Sicherheit ihres Landes dar, mobilisieren ihre Streitkräfte und könnten jeden Moment über die Grenze einmarschieren! Wir befinden uns im Krieg!"
 wtt_germany.35.d:0 "Obwohl wir klargestellt hatten, dass die Rückkehr Wilhelms II. auf den deutschen Thron als kriegerischer Akt angesehen würde, weigerte sich Deutschland, nachzugeben und seinen Kaiser ins Exil zu schicken. Trotz unserer Bemühungen, den Frieden zu wahren, ist in Europa erneut ein Krieg ausgebrochen."
 wtt_germany.38.t:0 "Deutsche fordern Rückgabe von Qingdao"
 wtt_germany.38.desc:0 "Das Deutsche Reich drängt in letzter Zeit immer lauter auf eine Rückkehr zum Kolonialismus. Auf diplomatischem Weg fordert es nun die Rückgabe seiner alten Enklave in Qingdao. Vielleicht lässt sich dies für eine lukrative Vereinbarung nutzen …"
 wtt_germany.38.a:0 "Fordern Sie im Gegenzug die weitere Unterstützung von Falkenhausen."
 wtt_germany.38.b:0 "Vielleicht ist es in der Gegend nützlich, sie zu haben."
 wtt_germany.38.c:0 "Wir werden unser Hoheitsgebiet nie wieder aufgeben!"
 wtt_germany.39.t:0 "China bietet Qingdao Handelsabkommen an"
 wtt_germany.39.desc:0 "Chinesische Beamte haben uns ein Handelsangebot unterbreitet, das ihrer Meinung nach beide Seiten zufriedenstellen wird. Sie schlagen vor, Qingdao in rechtmäßige deutsche Hände zurückzugeben, im Gegenzug für die Garantie, dass wir von Falkenhausens Mission nicht zurückrufen werden."
 wtt_germany.39.a:0 "Dem können wir zustimmen."
 wtt_germany.39.b:0 "Nein, wir müssen uns alle Optionen offen halten."
 wtt_germany.40.t:0 "[From.GetNameDefCap] lehnt Qingdao-Forderung ab"
 wtt_germany.40.desc:0 "[From.GetNameDefCap] hat unsere Forderungen nach der Rückgabe Qingdaos strikt zurückgewiesen. Wir werden keine andere Wahl haben, als die Rückgabe zu einem späteren Zeitpunkt zu fordern."
 wtt_germany.40.a:0 "Wir können geduldig sein."
 wtt_germany.41.t:0 "Deutschland akzeptiert Qingdao-Handel"
 wtt_germany.41.desc:0 "Das Deutsche Reich hat unseren Handelsvorschlag für Qingdao angenommen und uns die weitere Unterstützung von Falkenhausen zugesichert."
 wtt_germany.42.t:0 "Deutschland lehnt Handel mit Qingdao ab"
 wtt_germany.42.desc:0 "Das Deutsche Reich hat unseren Handelsvorschlag für Qingdao abgelehnt. Es dürfte sich nicht allzu sehr um seine Enklave gefreut haben."
 wtt_germany.43.t:0 "Deutsche fordern Rückgabe von Qingdao"
 wtt_germany.43.desc:0 "Das Deutsche Reich hat in letzter Zeit immer lauter die Rückkehr zum Kolonialismus gefordert. Trotz des Verlustes von Qingdao – unserer Eroberung 1914 – haben die Deutschen nun diplomatische Verhandlungen aufgenommen und die Rückgabe ihrer alten Enklave Qingdao gefordert. Vielleicht können wir dies nutzen, um zu einer lukrativen Vereinbarung zu kommen …"
 wtt_germany.43.a:0 "Fordern Sie im Gegenzug den Abzug von Falkenhausen durch die Deutschen."
 wtt_germany.43.b:0 "Sie werden nie wieder einen Fuß in den Fernen Osten setzen!"
 wtt_germany.44.t:0 "Japan bietet Qingdao Handelsabkommen an"
 wtt_germany.44.desc:0 "Japanische Beamte haben uns mit einem möglichen Handelsangebot kontaktiert, das ihrer Meinung nach beide Seiten zufriedenstellen wird. Sie schlagen vor, Qingdao in rechtmäßige deutsche Hände zurückzugeben, im Gegenzug für den sofortigen Rückzug von Falkenhausens Mission aus China."
 wtt_germany.46.desc:0 "Das Deutsche Reich hat unseren Handelsvorschlag für Qingdao angenommen und die Mission von Falkenhausen nach China umgehend zurückgezogen."
 wtt_germany.48.t:0 "[From.GetNameDefCap] Akzeptiert Anforderungen"
 wtt_germany.48.desc:0 "[From.GetNameDefCap] hat unsere Forderungen akzeptiert und die sofortige Rückgabe Qingdaos in deutsche Hände veranlasst!"
 wtt_germany.49.t:0 "Nazi-Vertreibung fordert schweren Tribut von [nazi_state_withdrawn.GetName]"
 wtt_germany.49.desc:0 "Wir haben es endlich geschafft, die Kontrolle über [nazi_state_withdrawn.GetName] zu erlangen, doch die Kämpfe waren heftig. Die Nazis werden mit unserem Vormarsch immer fanatischer und verzweifelter und kämpfen oft, bis die umliegende Gegend in Trümmern liegt. Es gibt auch Berichte über die Taktik der verbrannten Erde gemäß Hitlers Nerobefehl.\n\nBis zum Ende dieses Krieges ist mit weiteren Zerstörungen dieses Ausmaßes zu rechnen."
 wtt_germany.49.a:0 "Ein kleiner Preis, um unser Vaterland von ihnen zu befreien."
 wtt_germany.50.t:0 "Hitler tot aufgefunden"
 wtt_germany.50.desc:0 "Bei der Einnahme Berlins entdeckten unsere Truppen Hitlers Leiche in einem Bunker der Stadt. Hitler nahm sich offenbar lieber das Leben, als zuzusehen, wie antifaschistische Elemente das Land übernahmen, als eine Gefangennahme zu riskieren.\n\nAn seiner Stelle übernahm nun Heinrich Himmler die Führung der Nazis und bekräftigte bereits, dass die Regierung in ihrem Kampf gegen den „antideutschen Landesverrat“ nicht nachlassen werde."
 wtt_germany.50.a:0 "Es ist der Anfang vom Ende der Nazis."
 wtt_germany.51.t:0 "Die gefangene Nazi-Führung wieder einsetzen?"
 wtt_germany.51.desc:0 "Der Krieg hat sich so lange hingezogen und verheerend ausgewirkt, dass nun alle erwachsenen Deutschen zum Dienst einberufen wurden. Auch wenn sie nicht unseren ideologischen Ansichten entsprechen, verfügen die gefangenen Nazi-Führer über Fähigkeiten, die uns in dieser Zeit der Not nützlich sein könnten.\n\nWir könnten ihnen anbieten, nach dem Krieg ihre Freiheit wiederzuerlangen, wenn sie uns im Gegenzug ihre Fähigkeiten jetzt zur Verfügung stellen."
 wtt_germany.51.a:0 "Ja, die Nazi-Führung teilweise wieder einsetzen."
 reinstate_nazi_leadership_TT:0 "Nur faschistische Berater sind wieder dienstberechtigt.\n"
 wtt_germany.51.b:0 "Nein, es geht ihnen gut, wo sie sind."
 wtt_germany.51.c:0 "Wir können ihnen nicht erlauben, ihre Freiheit wiederzuerlangen, wenn der Krieg schlecht verläuft ... Hängen Sie sie auf!"
 wtt_germany.52.t:0 "Demokratischer Bürgerkrieg in [From.From.GetName]"
 wtt_germany.52.desc:0 "Demokratische Kräfte in [From.From.GetName] haben einen Bürgerkrieg begonnen, um freie Wahlen wiederherzustellen und die Macht an das Volk zurückzugeben. Sie könnten unsere Hilfe benötigen, und ihr Erfolg wird uns einen zukünftigen Verbündeten für unsere Sache sichern."
 wtt_germany.52.a:0 "Wir stehen zur Demokratie!"
 wtt_germany.52.b:0 "Sie werden ihre Probleme selbst lösen müssen."
 wtt_germany.53.t:0 "Österreichs pro-deutsche Stimmung steigt"
 wtt_germany.53.desc:0 "Die deutsche Stimmung in unserem südlichen Nachbarn Österreich hat sich seit längerem, seit wir Verbündete sind, deutlich verbessert. Es wäre durchaus möglich, dass ein Referendum zur Wiedervereinigung mit Deutschland die Zustimmung der österreichischen Bevölkerung findet. Sollten wir die österreichische Regierung dazu drängen?"
 wtt_germany.53.a:0 "Ja, die kleindeutsche Lösung war ein Fehler."
 wtt_germany.53.b:0 "Nein, die großdeutsche Lösung wäre ein Fehler."
 wtt_germany.54.t:0 "Deutsche Regierung drängt auf Volksentscheid zur Wiedervereinigung"
 wtt_germany.54.desc:0 "Die deutsche Regierung ist mit dem Vorschlag einer Wiedervereinigung an uns herangetreten, sollte das österreichische Volk dies wünschen. Sie drängt uns dazu, eine Volksabstimmung abzuhalten, um dies herauszufinden."
 wtt_germany.54.a:0 "Kampagne für die Vereinigung."
 wtt_germany.54.b:0 "Kampagne gegen die Vereinigung."
 wtt_germany.55.t:0 "Österreicher stimmen für die Vereinigung"
 wtt_germany.55.desc:0 "Das österreichische Volk hat für die Vereinigung mit seinen nördlichen Brüdern gestimmt. Die Integration der österreichischen Bundesländer und ihres Militärs wird unverzüglich beginnen."
 wtt_germany.55.a:0 "Ein großartiger Tag für die Deutsche Frage!"
 wtt_germany.56.t:0 "Die deutschen Gebiete"
 wtt_germany.56.desc:0 "Unser Krieg gegen die Sowjetunion verläuft nicht gut, und wir riskieren, alles zu verlieren. Im Westen hat Deutschland in den letzten Jahren rasante Veränderungen durchgemacht, ist heute aber ein unerschütterlicher Verteidiger demokratischer Werte. Eine schnelle Rückgabe der alten deutschen Gebiete Danzig und Posen würde zweifellos Millionen vor der Unterdrückung durch die Sowjetunion retten."
 wtt_germany.56.a:0 "Lieber Deutschland als die Sowjets!"
 wtt_germany.56.b:0 "Niemals! Was polnisch ist, soll polnisch werden!"
 wtt_germany.57.t:0 "Polen bietet die Rückgabe deutscher Gebiete an"
 wtt_germany.57.desc:0 "Da der Krieg Polens mit der Sowjetunion nicht gut verläuft, hat sich die polnische Regierung über geheime Kanäle an uns gewandt und die schnelle Rückgabe unserer alten Gebiete Danzig und Posen angeboten. Sie argumentiert, dass es ihrem Volk unter demokratischer deutscher Herrschaft zweifellos besser gehen werde als unter der Unterdrückung durch die Sowjetunion."
 wtt_germany.57.a:0 "So eine List! Wir werden sie beschützen."
 wtt_germany.57.b:0 "Nein, wir können keine sowjetischen Vergeltungsschläge riskieren."
 wtt_germany.58.t:0 "Österreicher lehnen Vereinigung ab"
 wtt_germany.58.desc:0 "Das österreichische Volk hat unsere Forderungen nach einer Vereinigung abgelehnt und zieht es vor, die österreichische Unabhängigkeit zumindest noch für kurze Zeit aufrechtzuerhalten."
 wtt_germany.58.a:0 "Wir müssen ihre Wünsche respektieren."
 wtt_germany.59.t:0 "Deutschland akzeptiert Danzig und Posen"
 wtt_germany.59.desc:0 "Die deutsche Regierung hat beschlossen, ihre alten Gebiete anzuerkennen und feierlich geschworen, für den Schutz der polnischen Bürger der Region einzutreten."
 wtt_germany.59.a:0 "Zumindest werden sie in Sicherheit sein."
 wtt_germany.60.t:0 "Deutschland lehnt Danzig und Posen ab"
 wtt_germany.60.desc:0 "Die deutsche Regierung hat uns mitgeteilt, dass sie unser Angebot nicht annehmen kann. Sie fürchtet sowjetische Vergeltungsmaßnahmen und ist daher der Ansicht, dass sie das Risiko nicht eingehen kann."
 wtt_germany.60.a:0 "Wer wird ihnen helfen, wenn alle an die Reds gefallen sind?"
 wtt_germany.62.t:0 "Unternehmen fordern MEFO-Zahlung"
 wtt_germany.62.desc:0 "Nach dem Ende des Krieges drängen die Unternehmen, denen wir MEFO-Rechnungen ausgestellt haben, nun auf die Zahlung. Sie behaupten, es sei nicht länger notwendig, Zahlungen „zum Wohle des Vaterlandes“ zurückzuhalten."
 wtt_germany.62.a:0 "Sehr gut."
 wtt_germany.63.t:0 "[GER.GetName] Reintegriert Elsass-Lothringen"
 wtt_germany.63.desc:0 "Die [GER.GetAdjective]-Regierung hat ein Gesetz erlassen, das die Wiedereingliederung Elsass-Lothringens und Luxemburgs in die [GER.GetName] vorsieht. Die Massenrekrutierung unserer Bevölkerung hat bereits begonnen..."
 wtt_germany.63.a:0 "Die Mistkerle! Das ist noch nicht vorbei!"
 wtt_germany.64.t:0 "[GER.GetName] Reintegriert Luxemburg"
 wtt_germany.64.a:0 "Was können wir tun?"
 wtt_germany.65.t:0 "[From.GetName] fordert Kriegsteilnahme an"
 wtt_germany.65.desc:0 "[From.GetNameDefCap] hat uns informiert, dass sie unser Land benötigen, um ihre Truppen zum sowjetischen Feind zu marschieren. Sie erinnern uns daran, dass wir unter ihrem Schutz gegen die Kommunisten stehen und dass wir ihnen daher unsere Unterstützung in ihrem aktuellen Krieg schulden."
 wtt_germany.65.a:0 "Sie haben Recht – wir werden uns ihrem Krieg anschließen."
 wtt_germany.65.b:0 "Was glauben die, wer sie sind?! Niemals!"
 wtt_germany.66.t:0 "[From.GetName] akzeptiert Anforderungen"
 wtt_germany.66.desc:0 "[From.GetNameDefCap] hat beschlossen, sich uns in unserem Krieg gegen [SOV.GetNameDef] anzuschließen, was den zusätzlichen Vorteil hat, dass unsere Streitkräfte durch ihr Land durchziehen können."
 wtt_germany.67.t:0 "[From.GetName] lehnt Forderungen ab"
 wtt_germany.67.desc:0 "[From.GetNameDefCap] hat unsere Forderungen nach einer Kriegsbeteiligung zurückgewiesen und hält seine Grenzen weiterhin für unsere Truppen geschlossen. Wenn die Polen nicht bereit sind, unseren Truppen Zugang zu gewähren, müssen wir eben über sie hinweg."
 wtt_germany.67.a:0 "Sie haben es selbst verschuldet."
 wtt_germany.68.t:0 "[From.GetName] schlägt imperiale Reintegration vor"
 wtt_germany.68.desc:0 "Die [From.GetAdjective]-Regierung ist mit einem Vorschlag zur Wiedereingliederung des ehemaligen österreichisch-ungarischen Reiches an uns herangetreten. Da in unseren jeweiligen Ländern eine starke pro-imperiale Stimmung herrscht, behauptet sie, eine Vereinigung unserer Nationen liege im Interesse aller."
 wtt_germany.68.a:0 "Eine hervorragende Idee! Wir werden sie annehmen."
 wtt_germany.68.b:0 "Sich ihnen freiwillig anschließen? Niemals!"
 wtt_germany.69.t:0 "[From.GetName] Akzeptiert Integration"
 wtt_germany.69.desc:0 "Die [From.GetAdjective]-Regierung hat auf unseren Vorschlag zur Wiedereingliederung der ehemaligen österreichisch-ungarischen Monarchie reagiert. Sie erkennt die Vorteile dieses Schritts an und hat ihre Bereitschaft erklärt, ihr Land in unseres zu integrieren, sofern alle Parteien damit einverstanden sind."
 wtt_germany.70.t:0 "[From.GetName] lehnt Integration ab"
 wtt_germany.70.desc:0 "Die [From.GetAdjective]-Regierung hat auf unseren Vorschlag zur Wiedereingliederung des ehemaligen österreichisch-ungarischen Reiches reagiert. Sie hat unmissverständlich klargestellt, dass sie unsere Führung bei einem solchen Unterfangen niemals freiwillig akzeptieren wird."
 wtt_germany.71.t:0 "Die Neugründung der österreichisch-ungarischen Monarchie"
 wtt_germany.71.desc:0 "Unsere beiden benachbarten Nachfolgestaaten Österreich-Ungarns haben die vorgeschlagene Wiedereingliederung ihrer Länder in unsere Nation akzeptiert und sich damit wieder zum Österreichisch-Ungarischen Reich formiert. Die Unterzeichnung des Wiedervereinigungsvertrags wurde von begeisterten Massen auf den Straßen begrüßt, und die [GER.GetAdjective]-Regierung hat uns freudig wieder in ihr Bündnis aufgenommen."
 wtt_germany.71.a:0 "Für Österreich-Ungarn bricht eine neue Ära an."
 wtt_germany.72.t:0 "[From.GetName] schlägt wirtschaftliche Integration vor"
 wtt_germany.72.desc:0 "Da wir bereits eng verbündet sind, hat [From.GetNameDef] einen Vorschlag unterbreitet, der uns beim Ausbau unserer Militärwirtschaft durch eine stärkere Integration unserer Volkswirtschaften unterstützen soll. Dies würde unser militärisches Wachstum erheblich fördern, würde uns aber auch in außenpolitischen Fragen unterordnen."
 wtt_germany.72.a:0 "Eine tolle Idee – unsere Schicksale waren sowieso miteinander verflochten."
 wtt_germany.72_tt:0 "§RWir werden die Kontrolle über alle unsere Untertanen verlieren.§!\n"
 wtt_germany.72.b:0 "Wir glauben nicht, unsere Souveränität ist zu wertvoll."
 wtt_germany.73.t:0 "[From.GetName] akzeptiert wirtschaftliche Integration"
 wtt_germany.73.desc:0 "Die [From.GetAdjective]-Regierung teilt uns mit, dass sie unseren Vorschlag zur Integration unserer Kriegswirtschaften akzeptiert. Sie wartet gespannt auf unsere Anleitung, damit sie ihr Militär nach unserem Erfolgsmodell ausrichten kann."
 wtt_germany.73.a:0 "Unter unserer Führung werden ihre Armeen anwachsen."
 wtt_germany.74.t:0 "[From.GetName] lehnt wirtschaftliche Integration ab"
 wtt_germany.74.desc:0 "Die [From.GetAdjective]-Regierung teilt uns mit, dass sie unseren Vorschlag zur Integration unserer Kriegswirtschaften ablehnt. Ihre Souveränität ist ihr wichtiger als der Nutzen ihrer Armeen …"
 wtt_germany.74.a:0 "Sie lehnen die Größe selbst ab!"
 wtt_germany.999.t:0 "[From.GetLeader] Fordert die Wiederherstellung der königlichen Titel"
 wtt_germany.999.desc:0 "Im Namen von Kaiser [From.GetLeader] hat die [From.GetAdjective]-Regierung darum gebeten, dass wir die Aberkennung britischer Adelstitel und Königstitel an deutsche Königs- und Fürstenfamilien rückgängig machen, wie es der Titles Deprivation Act 1917 erlaubt. Sie argumentieren, dass dies der Welt zeigen würde, dass die britischen und deutschen Königs- und Fürstenfamilien bereits zu ihren guten Beziehungen aus der Vorkriegszeit zurückgekehrt sind, und somit als Symbol der zukünftigen englisch-deutschen Freundschaft dienen würde."
 wtt_germany.999.a:0 "Das ist eine großartige Idee!"
 wtt_germany.999.b:0 "Wir glauben nicht."
 wtt_germany.1000.t:0 "[From.GetAdjective] Regierung akzeptiert Anfrage"
 wtt_germany.1000.desc:0 "Die [From.GetAdjective]-Regierung hat beschlossen, unseren Antrag auf Wiedereinsetzung britischer Adelstitel und Königstitel an deutsche Königs- und Fürstenfamilien zu unterstützen. Sie schlägt eine große „königliche Zeremonie des Jahrhunderts“ vor, zu der alle deutschen Mitglieder des Königshauses eingeladen sind, um die ihnen vor zwei Jahrzehnten zu Unrecht entzogenen Titel persönlich zurückzugeben.\n\nKaiserliche Berater schlagen vor, dass die gesamte erweiterte Königsfamilie mit Hilfe modernster deutscher Technologie einen großen Auftritt hinlegt. Das hochmoderne Luftschiff Hindenburg würde diesem Anlass perfekt gerecht werden."
 wtt_germany.1000.a:0 "Eine ausgezeichnete Idee! Wir werden einen Verbindungsmann schicken."
 wtt_germany.1000.a_tt:1 "Prinzessin Victoria Louise wird vorausgeschickt, um bei den Vorbereitungen dieser großen Zeremonie zu helfen. Dies wird die Ressourcen unserer Regierung etwas belasten.\n"
 wtt_germany.1000.b:0 "Eine hervorragende Idee! Wir werden alle zusammen reisen."
 wtt_germany.1000.b_tt:0 "Die gesamte erweiterte königliche Familie wird an Bord der Hindenburg zu der Zeremonie reisen. Dies wird das Ansehen der kaiserlichen Familie in den Augen unserer Verbündeten und unseres Volkes steigern und die Position unserer Regierung stärken.\n"
 wtt_germany.1001.t:0 "Hindenburg in Flammen in London"
 wtt_germany.1001.desc:1 "Bei einer schrecklichen Tragödie wurde die Hindenburg heute beim Anlegen in London zerstört. Aus noch ungeklärten Gründen geriet das Luftschiff in Flammen und stürzte ab. Dabei kamen alle Passagiere und Besatzungsmitglieder an Bord ums Leben – darunter praktisch alle Mitglieder der erweiterten deutschen Kaiserfamilie.\n\nDie einzige Überlebende ist Prinzessin Victoria Louise, die vorausgeschickt worden war, um bei den Vorbereitungen der Zeremonie zu helfen. Die Prinzessin, die dritte Trägerin des Namens „Victoria“ nach ihrer Großmutter, der deutschen Kaiserin Victoria, und ihrer Urgroßmutter, Königin Victoria, ist somit die einzige verbliebene Thronfolgerin. Noch immer erschüttert vom Verlust ihrer Familie, bestieg sie nun dennoch als Kaiserin Victoria I. des Deutschen Reiches den Thron."
 wtt_germany.1001.a:0 "Der Kaiser ist tot ... Lang lebe die Kaiserin!"
 wtt_germany.1002.desc:0 "Bei einer schrecklichen Tragödie wurde die Hindenburg heute beim Anlegen in London zerstört. Aus noch ungeklärten Gründen geriet das Luftschiff in Flammen und stürzte ab. Dabei kamen alle Passagiere und Besatzungsmitglieder an Bord ums Leben – darunter auch alle Mitglieder der erweiterten deutschen Kaiserfamilie.\n\nMit der völligen Eliminierung der Kaiserfamilie hat die Regierung die direkte Kontrolle übernommen, doch es ist unwahrscheinlich, dass dies kurzfristig zu einer Rückkehr der Demokratie führen wird."
 wtt_germany.1002.a:0 "Eine Tragödie!"
 wtt_germany.1003.t:0 "[From.GetAdjective] Regierung lehnt Anfrage ab"
 wtt_germany.1003.desc:0 "Die [From.GetAdjective]-Regierung hat nach einer langen Parlamentssitzung beschlossen, unseren Antrag auf Wiedereinsetzung britischer Adels- und Königstitel in deutsche Königs- und Fürstenfamilien abzulehnen."
 wtt_germany.1003.a:0 "Das ist höchst bedauerlich ..."
 wtt_news.1000.desc:0 "Bei einer schrecklichen Tragödie wurde die Hindenburg heute beim Versuch, in London anzudocken, zerstört. Aus noch ungeklärten Gründen geriet das Luftschiff in Flammen und stürzte ab. Dabei kamen alle Passagiere und Besatzungsmitglieder an Bord ums Leben – darunter praktisch alle Mitglieder der erweiterten deutschen Kaiserfamilie.\n\nDie einzige Überlebende ist Prinzessin Victoria Louise, die vorausgeschickt worden war, um bei den Vorbereitungen der Zeremonie zu helfen. Die Prinzessin, die dritte königliche Person, die den Namen „Victoria“ nach ihrer Großmutter, der deutschen Kaiserin Victoria, und ihrer Urgroßmutter, Königin Victoria, trug, ist somit die einzige verbliebene Thronfolgerin. Noch immer erschüttert vom Verlust ihrer Familie, bestieg sie nun dennoch den Thron als Kaiserin Victoria I. des Deutschen Reiches."
 wtt_news.1000.a:0 "Eine schreckliche Tragödie ... mit unerwarteten Folgen."
 wtt_news.1001.desc:0 "Bei einer schrecklichen Tragödie wurde die Hindenburg heute beim Anlegen in London zerstört. Aus noch ungeklärten Gründen geriet das Luftschiff in Flammen und stürzte ab. Dabei kamen alle Passagiere und Besatzungsmitglieder an Bord ums Leben – darunter auch alle Mitglieder der erweiterten deutschen Kaiserfamilie.\n\nNach der völligen Dezimierung der Kaiserfamilie hat die Regierung die direkte Kontrolle übernommen, doch es ist unwahrscheinlich, dass dies kurzfristig zu einer Rückkehr der Demokratie führen wird."
 wtt_news.1001.a:0 "So eine schreckliche Tragödie!"
 wtt_news.1.t:0 "Deutschland im Bürgerkrieg verwickelt"
 wtt_news.1.desc:0 "Ein plötzlicher Putsch der Wehrmacht unter Führung des berühmten Feldmarschalls August von Mackensen hat heute Morgen in Deutschland einen Bürgerkrieg ausgelöst. Faschisten, Royalisten und Demokraten greifen gleichermaßen zu den Waffen gegen ihre ehemaligen Landsleute, und Militäreinheiten wurden von den Grenzen abgezogen, um die Bedrohung von innen zu bekämpfen.\n\nDie Faschisten haben auf Befehl Hitlers bereits geschworen, die Nation lieber zu zerstören, als sie in die Hände „verräterischer Deutscher“ fallen zu lassen."
 wtt_news.1.a:0 "Jetzt gibt es kein Zurück mehr."
 wtt_news.1.b:0 "Vom Militär verraten! Das dürfen wir nicht erleiden."
 wtt_news.1.c:0 "Hoffen wir, dass in Europa bald wieder Frieden einkehrt …"
 wtt_news.2.t:0 "[From.GetNameDefCap] Blockiert die Rückkehr von Wilhelm II"
 wtt_news.2.desc:0 "Kurz nachdem das Deutsche Reich gestern Morgen überraschend die Verbannung Wilhelms II. aufgehoben hatte, blockierten die niederländischen Behörden die Wagenkolonne des alten Kaisers vor der deutschen Grenze und zwangen sie zur Rückkehr in seine Residenz Huis Doorn.\n\nEin offizielles niederländisches Kommuniqué äußert Bedenken hinsichtlich einer Destabilisierung des Kontinents, sollte Wilhelm II. erneut den deutschen Thron besteigen dürfen. Die niederländische Regierung hat es daher auf sich genommen, den alten Kaiser unter Hausarrest zu stellen.\n\nEine deutsche Reaktion auf die Krise steht noch aus, doch in der Öffentlichkeit wird unter anderem der Einsatz militärischer Gewalt gefordert, um die Rückkehr des Kaisers zu erzwingen.\n"
 wtt_news.2.a:0 "Wie können sie es wagen?!"
 wtt_news.2.b:0 "Sie sollten besser wissen, was sie tun ..."
 wtt_news.2.c:0 "Jemand musste Stellung beziehen."
 wtt_news.3.t:0 "Wilhelm II. kehrt ins Deutsche Reich zurück"
 wtt_news.3.desc:0 "In einer überraschenden Ankündigung hob die deutsche Regierung gestern Morgen offiziell das Exil Wilhelms II. auf. Später am selben Tag passierte die Wagenkolonne des ehemaligen Kaisers die niederländisch-deutsche Grenze, und nach seiner Rückkehr nach Berlin wurde er feierlich als Kaiser des Deutschen Reiches wieder eingesetzt.\n\nDer Kaiser hat bereits geschworen, Deutschland zu seiner alten Größe zurückführen zu wollen, doch es bleibt abzuwarten, welche diplomatische Richtung das Land einschlagen wird."
 wtt_news.3.a:0 "Es lebe der Kaiser!"
 wtt_news.3.b:0 "Eine Rückkehr zum Beginn des Jahrhunderts?"
 wtt_news.3.c:0 "Wir haben unseren Teil dazu beigetragen, ihn zu schützen."
 wtt_news.3.d:0 "Wir hätten die Niederländer stärker zu seiner Auslieferung drängen sollen!"
 wtt_news.4.t:0 "Wilhelm II. aus niederländischem Hausarrest entlassen"
 wtt_news.4.desc:0 "Trotz vergeblicher niederländischer Versuche, dem deutschen Vormarsch Widerstand zu leisten, sah die Regierung angesichts der überwältigenden deutschen Streitmacht keine andere Wahl, als zu kapitulieren. Deutsche Truppen befreiten den alten Kaiser aus seinem Hausarrest in Huis Doorn, und nach seiner Rückkehr nach Berlin wurde er feierlich als Kaiser des Deutschen Reiches wiedereingesetzt.\n\nDer Kaiser hat bereits geschworen, Deutschland zu seiner alten Größe zurückführen zu wollen, doch es bleibt abzuwarten, welche diplomatische Richtung das Land einschlagen wird."
 wtt_news.4.a:0 "Niemand wird das Deutsche Reich aufhalten!"
 wtt_news.4.b:0 "Es war eine dumme Geste der Niederländer."
 wtt_news.4.c:0 "Vielleicht war das doch keine so gute Idee …"
 wtt_news.5.t:0 "Mussolinis Ermordung"
 wtt_news.5.desc:0 "Berichten aus Rom zufolge wurde der Duce heute am helllichten Tag auf offener Straße erschossen. Gleichzeitig unternahmen Teile der Regierung Schritte, um den italienischen Faschisten die Macht zu entreißen. Es kam zu einer Verhaftungswelle, Militäreinheiten riegelten Regierungsgebäude und Straßen ab und verhängten eine Ausgangssperre.\n\nSprecher der Putschregierung erklärten ihre Loyalität gegenüber Viktor Emanuel III., und in seiner ersten Amtshandlung als italienischer Staatschef unterzeichnete der König einen Bündnisvertrag mit dem Deutschen Reich."
 wtt_news.5.a:0 "Alles hat perfekt geklappt."
 wtt_news.5.b:0 "Es lebe der König!"
 wtt_news.5.c:0 "Die Deutschen müssen dabei ihre Finger im Spiel gehabt haben …"
 wtt_news.6.t:0 "Österreich-Ungarn reformiert"
 wtt_news.6.desc:1 "Die Donaunachfolgestaaten des österreichisch-ungarischen Reiches haben in jüngster Zeit eine Welle pro-kaiserlicher Stimmung erlebt und sich unter der Führung von [From.GetOldNameDef] dazu entschlossen, ihre jeweiligen Länder erneut zu Österreich-Ungarn zu vereinen.\n\nDie neue österreichisch-ungarische Regierung unternahm sofort Schritte, um einen formellen Bündnisvertrag mit dem Deutschen Reich zu unterzeichnen und bekannte sich offen zur deutschen antibritischen und antifranzösischen Außenpolitik."
 wtt_news.6.a:0 "Und wir mussten keinen einzigen Schuss abgeben."
 wtt_news.6.b:0 "Wieder vereint!"
 wtt_news.6.c:0 "Ein neuer Machtblock in Europa? Beunruhigend."
 wtt_news.7.t:0 "Polen gibt Danzig zurück"
 wtt_news.7.desc:0 "Die polnische Regierung hat den deutschen Vorschlag zur Rückgabe Danzigs im Austausch gegen militärische Garantien angenommen. Ein Vertrag wurde aufgesetzt, der den Polen im Falle von Feindseligkeiten deutsche Hilfe zusichert.\n\nObwohl der Preis hoch war – die Polen erneut vollständig vom Meer abzuschneiden –, könnte er sich angesichts der kommunistischen Bedrohung im Osten durchaus gelohnt haben."
 wtt_news.7.a:0 "„Danzig oder Krieg“? Haha! Die Diplomatie siegt wieder einmal."
 wtt_news.7.b:0 "Hoffen wir, dass sich die Kosten gelohnt haben."
 wtt_news.7.c:0 "Die Deutschen mischen sich in unseren Einflussbereich ein ..."
 wtt_news.7.d:0 "Ein vorteilhafter Deal für beide? Wir werden sehen."
 wtt_news.8.t:0 "Der deutsche Bürgerkrieg endet"
 wtt_news.8.desc:0 "Der Bürgerkrieg, der Deutschland erschütterte, ist nun zu Ende. Die Kämpfe waren außerordentlich heftig, und der fanatische Widerstand der Nazis verursachte Verwüstungen, die an den Ersten Weltkrieg erinnerten. Hitler ist offenbar tot, die Nazi-Führung inhaftiert oder hingerichtet. Die provisorische Regierung hat nun erklärt, dass es notwendig sei, ihre Macht über den Staat zu sichern und die Stabilität im Land wiederherzustellen, bevor an Verfassungsreformen gedacht werden könne."
 wtt_news.8.a:0 "Lasst den Wiederaufbau beginnen."
 wtt_news.8.b:0 "Hoffen wir, dass das neue Regime entgegenkommender ist …"
 wtt_news.9.t:0 "Sowjets kündigen groß angelegte Übungen an"
 wtt_news.9.desc:0 "Als Reaktion auf die ihrer Ansicht nach „zunehmend feindselige Rhetorik“ hat das sowjetische Militär für dieses Jahr eine Reihe großangelegter Militärübungen angekündigt.\n\nSprecher der sowjetischen Regierung sagten, man hoffe, dass die erhöhte Bereitschaft den Feind davon abhalten werde, „seine verleumderischen Tiraden fortzusetzen“."
 wtt_news.9.a:0 "Sie haben uns direkt in die Hände gespielt!"
 wtt_news.9.b:0 "Das wird sie sicherlich zum Nachdenken anregen."
 wtt_news.9.c:0 "Hoffen wir, dass die Deutschen uns nicht im Stich lassen …"
 wtt_news.9.d:0 "Sie tragen nicht dazu bei, die Situation zu entschärfen …"
 wtt_news.10.t:0 "Sowjets verstärken militärische Aufrüstung"
 wtt_news.10.desc:0 "Als Reaktion auf die jüngste deutsche Ankündigung, ein mitteleuropäisches Bündnis gegen die sowjetische Aggression zu gründen, hat die sowjetische Regierung Maßnahmen zur drastischen Beschleunigung der Rüstungsproduktion ergriffen. Ein Kreml-Sprecher machte unmissverständlich klar, dass die Sowjetunion dieser Bedrohung an ihren Grenzen nicht tatenlos zusehen könne. Es müssten sofort Gegenmaßnahmen ergriffen werden, und das wurde auch schon getan."
 wtt_news.10.a:0 "Sie helfen unserer Sache weiterhin unwissentlich!"
 wtt_news.10.b:0 "Sie werden es sicher nicht wagen, noch etwas Dümmeres zu versuchen!"
 wtt_news.10.c:0 "Zumindest wurde eine Allianz gebildet."
 wtt_news.10.d:0 "Das eskaliert rapide..."
 wtt_news.11.t:0 "Sowjets streben nach einer sicheren Sphäre"
 wtt_news.11.desc:0 "Mit der Einladung eines ihrer Anrainerstaaten zum [GER.GetFactionName] hat die sowjetische Regierung unmissverständlich vor weiteren Einmischungen in die Angelegenheiten „ihrer Einflusssphäre“ gewarnt.\n\nUnbestätigten Berichten zufolge kommt es zu einer Mobilisierung der sowjetischen Streitkräfte, möglicherweise zur Vorbereitung auf einen Krieg."
 wtt_news.11.a:0 "Haben wir sie endlich weit genug getrieben?"
 wtt_news.11.b:0 "Wir müssen unsere Grenzen sichern!"
 wtt_news.11.c:0 "Gemeinsam können wir ihnen die Stirn bieten!"
 wtt_news.11.d:0 "Ist das der Funke?"
 wtt_news.11.e:0 "Wir müssen uns auf den Krieg vorbereiten!"
 wtt_news.12.t:0 "Protest gegen den Kaiser führt zum Krieg"
 wtt_news.12.desc:0 "Als Reaktion auf die deutsche Entscheidung, Wilhelm II. zurückkehren zu lassen, haben [FRA.GetNameDef] und [Eng.GetNameDef] [GER.GetNameDef] den Krieg erklärt. Als Ursache für diese Eskalation nennen die Franzosen und Briten die „eklatante deutsche Sturheit“, einem „bekannten Kriegsverbrecher“ erneut die Macht an der Spitze des Staates zu überlassen.\n\nSprecher ihrer jeweiligen Regierungen argumentieren, es sei völlig unmoralisch, dem „Hauptinitiator“ des Ersten Weltkriegs erneut die deutsche Krone zu überlassen, und die deutsche Regierung habe alle Warnungen ignoriert. „Wir hatten keine andere Wahl.“"
 wtt_news.12.a:0 "Sie maßen sich an, uns zu sagen, wer unser Anführer sein kann?!"
 wtt_news.12.b:0 "Sie haben uns zum Handeln gezwungen!"
 wtt_news.12.c:0 "Und so sind wir wieder im Jahr 1914."
 wtt_news.13.t:0 "Der Wilhelm-III.-Kompromiss"
 wtt_news.13.desc:0 "Als Reaktion auf den heftigen englisch-französischen Widerstand gegen die Rückkehr Wilhelms II. als Kaiser hat die deutsche Regierung einen Kompromiss vorgeschlagen, bei dem Wilhelm II. weiterhin im Exil leben wird, sein Sohn jedoch als Wilhelm III. den deutschen Thron besteigen wird.\n\nNachdem dieser von [ENG.GetNameDef] und [FRA.GetNameDef] angenommen wurde, hofft man, dass dies zu einem dauerhaften Frieden zwischen den großen europäischen Mächten führen wird."
 wtt_news.13.a:0 "Wir hatten keine andere Wahl."
 wtt_news.13.b:0 "Zum Glück haben die Deutschen Einsicht gezeigt."
 wtt_news.13.c:0 "Der Frieden wurde gewahrt..."
 wtt_news.14.desc:0 "Als Reaktion auf die deutsche Entscheidung, Wilhelm II. zurückkehren zu lassen, und trotz fehlender britischer Unterstützung hat [FRA.GetNameDef] [GER.GetNameDef] den Krieg erklärt. Die Franzosen nennen als Ursache für diese Eskalation die „eklatante deutsche Sturheit“, einem „bekannten Kriegsverbrecher“ erneut die Macht an der Spitze des Staates zu überlassen.\n\nSprecher der französischen Regierung argumentieren, es sei völlig unmoralisch, dem „Hauptinitiator“ des Ersten Weltkriegs erneut die deutsche Krone zu überlassen, und die deutsche Regierung habe alle Warnungen ignoriert. „Wir hatten keine andere Wahl.“"
 wtt_news.14.c:0 "Dumme, eigensinnige Franzosen!"
 wtt_news.14.d:0 "Aber was werden die Briten tun?"
 wtt_news.15.desc:0 "Als Reaktion auf den heftigen französischen Widerstand gegen die Rückkehr Wilhelms II. als Kaiser hat die deutsche Regierung einen Kompromiss vorgeschlagen, bei dem Wilhelm II. weiterhin im Exil leben wird, sein Sohn jedoch als Wilhelm III. den deutschen Thron besteigen wird.\n\nNachdem [FRA.GetNameDef] diesen Kompromiss akzeptiert hat, hofft man, dass er zu einem dauerhaften Frieden zwischen den großen kontinentaleuropäischen Mächten führen wird."
 wtt_news.15.c:0 "Zum Glück waren die Deutschen vernünftiger als die Franzosen …"
 wtt_news.16.t:0 "China stellt die deutsche Herrschaft in Tsingtau wieder her"
 wtt_news.16.desc:0 "Die chinesische Regierung hat beschlossen, den jüngsten deutschen Forderungen nach Rückgabe ihrer alten Enklave in Qingdao nachzukommen.\n\nMit sofortiger Wirkung wurde die deutsche Kontrolle innerhalb der Stadtgrenzen wiederhergestellt und die deutsche Regierung hat die Stadt wieder in ihren alten deutschen Namen Tsingtao umbenannt."
 wtt_news.16.a:0 "Wir werden noch unsere Rückkehr zum kolonialen Ruhm erleben."
 wtt_news.16.b:0 "Es war nur ein geringer Preis."
 wtt_news.16.c:0 "Wir haben es ihnen schon einmal weggenommen, wir können es ihnen wieder abnehmen!"
 wtt_news.16.d:0 "Erneuter deutscher Kolonialismus?"
 wtt_news.17.t:0 "Japan stellt die deutsche Herrschaft in Tsingtau wieder her"
 wtt_news.17.desc:0 "Die japanische Regierung hat beschlossen, den jüngsten deutschen Forderungen nach der Rückgabe ihrer alten Enklave in Qingdao nachzukommen.\n\nMit sofortiger Wirkung wurde die deutsche Kontrolle innerhalb der Stadtgrenzen wiederhergestellt und die deutsche Regierung hat die Stadt wieder in ihren alten deutschen Namen Tsingtao umbenannt."
 wtt_news.17.b:0 "Wie können sie es wagen, -unser- Territorium aufzugeben?!"
 wtt_news.17.c:0 "Denken Sie sogar an das Jahr 1914."
 wtt_news.18.t:0 "Österreich stimmt für Beitritt zu Deutschland"
 wtt_news.18.desc:0 "Seit Beginn der engen Zusammenarbeit zwischen [AUS.GetNameDef] und [GER.GetNameDef] ist die Stimmung für eine Vereinigung in Österreich dramatisch gestiegen. Bei einer gestern abgehaltenen Volksabstimmung stimmte das österreichische Volk mit überwältigender Mehrheit für die Vereinigung mit seinen nördlichen Nachbarn.\n\nDie Integration des österreichischen Staates wurde umgehend vorangetrieben, und der alte Staat wurde heute Morgen abgeschafft."
 wtt_news.18.a:0 "Für ein Großdeutschland."
 wtt_news.18.b:0 "Es war, was sie sich wünschten."
 wtt_news.19.t:0 "Polen gibt Danzig und Posen zurück"
 wtt_news.19.desc:0 "Angesichts des anhaltenden sowjetischen Angriffs hat die polnische Regierung heute Morgen die sofortige Rückgabe der ehemaligen deutschen Gebiete Danzig und Posen an [GER.GetNameDef] angekündigt.\n\nTrotz des völligen Schweigens der polnischen und deutschen Regierung zu den Gründen sind sich Experten einig, dass es sich höchstwahrscheinlich um einen Versuch handelt, diese Gebiete angesichts des drohenden militärischen Zusammenbruchs Polens aus den Händen der Sowjets zu halten."
 wtt_news.19.a:0 "Wir werden sie mit unserem Leben beschützen."
 wtt_news.19.b:0 "Es war die beste Option ..."
 wtt_news.19.c:0 "Hinterhältiges und hinterhältiges diplomatisches Herumgefummel!"
 wtt_news.19.d:0 "Eine bemerkenswert raffinierte diplomatische Vereinbarung ..."
 wtt_news.20.t:0 "Deutschland kündigt antisowjetischen Pakt an"
 wtt_news.20.desc:0 "Angesichts der zunehmenden sowjetischen Aggression hat [GER.GetName] „Staaten, die unmittelbar vom Kommunismus bedroht sind“ die Möglichkeit geboten, ein Bündnis gegen [SOV.GetName] zu bilden. Jedes Mitgliedsland dieses Bündnisses verpflichtet sich, Krieg gegen [SOV.GetName] zu führen, sollte es zu einem Angriff auf ein Mitgliedsland kommen."
 wtt_news.21.t:0 "[From.GetName] spricht sich gegen die Sowjetunion aus"
 wtt_news.21.desc:0 "Die [From.GetAdjective]-Regierung hat ihre Rhetorik gegen die Sowjetunion verschärft und warnt, Europas östlicher Nachbar sei eine „große rote Gefahr“, die über dem Kontinent drohe. Ob es sich dabei um Panikmache oder um Tatsachen handelt, ist umstritten, aber es scheint, als wollten die Deutschen den Kontinent gegen den Osten einen."
 wtt_news.21.a:0 "Die Welt muss von der sowjetischen Bedrohung erfahren!"
 wtt_news.21.b:0 "Wie können sie es wagen, uns so zu verleumden?!"
 wtt_news.21.d:0 "Wir werden sehen, wie die Sowjets das aufnehmen."
 wtt_news.22.t:0 "[From.GetName] kündigt mitteleuropäische Allianz an"
 wtt_news.22.desc:1 "Deutschland hat seine antisowjetische Rhetorik fortgesetzt und nun einen konkreten Plan entwickelt, um den sowjetischen Einfluss auf dem Rest des Kontinents einzudämmen. Ein neues Bündnis, die Mitteleuropäische Allianz, wurde gegründet und wird seinen Mitgliedern hoffentlich mit der Zeit Schutz vor der „ungezügelten sowjetischen Aggression“ bieten können, wie die Deutschen es nennen."
 wtt_news.22.a:0 "Wir werden das freie Europa gegen die Bedrohung durch den Kommunismus führen!"
 wtt_news.22.b:0 "Sie bedrohen unsere Position zunehmend …"
 wtt_news.22.c:0 "Endlich unternehmen die Deutschen Schritte."
 wtt_news.22.d:0 "Es ist unwahrscheinlich, dass die Sowjets das tatenlos hinnehmen werden …"
 wtt_news.23.t:0 "Annexion von Vichy-Frankreich"
 wtt_news.23.desc:0 "Eine deutsche Operation zur Annexion Vichy-Frankreichs, die Anfang dieser Woche begann, wurde inzwischen erfolgreich abgeschlossen. Den deutschen Streitkräften gelang es, den Marinestützpunkt Toulon einzunehmen, bevor der Befehl zur Versenkung der französischen Flotte erteilt werden konnte. Damit fiel die gesamte französische Flotte unversehrt in deutsche Hände."
 wtt_news.23.a:0 "Ein voller Erfolg!"
 wtt_news.23.b:0 "Sie haben ihre Pflicht nicht erfüllt ..."
 wtt_news.23.c:0 "Die Deutschen sind skrupellos."
 wtt_news.24.t:0 "Französische Selbstversenkungsflotte"
 wtt_news.24.desc:0 "Eine deutsche Operation zur Annexion Vichy-Frankreichs, die Anfang dieser Woche gestartet wurde, konnte inzwischen erfolgreich abgeschlossen werden. Allerdings gelang es den deutschen Streitkräften nicht, den Marinestützpunkt Toulon einzunehmen, bevor der Befehl zur Versenkung der französischen Flotte erteilt werden konnte. Daher wurde die gesamte französische Flotte versenkt, um sie vor den Deutschen zu schützen."
 wtt_news.24.a:0 "Eine Enttäuschung, aber ohne Bedeutung."
 wtt_news.24.b:0 "Sie haben ihr Wort bis zum Ende gehalten."
 wtt_news.24.c:0 "Ein letzter Akt französischen Widerstands."
 wtt_burma_road.1.t:0 "Burma Road gesperrt"
 wtt_burma_road.1.desc:0 "[occupying_country.GetAdjective]-Truppen, die [state_occupied.GetName] angreifen, haben die Burma-Straße erreicht und den Weg an mehreren Stellen abgeschnitten. Auf diesem Weg können wir keinen weiteren Nachschub mehr erhalten."
 wtt_burma_road.1.a:0 "Das macht die Sache nicht einfacher."
 wtt_burma_road.2.desc:0 "Die [From.GetAdjective]-Regierung hat beschlossen, den Verkehr auf der Burma-Straße nicht mehr zuzulassen. Alle Konvois auf dieser Straße wurden angehalten und zur Umkehr aufgefordert. Auf diesem Weg können uns keine weiteren Lieferungen erreichen."
 wtt_burma_road.2.desc_war_with_from:0 "[From.GetAdjective] Truppen sind schnell die Burmastraße entlang vorgerückt und haben mehrere wichtige Brücken und Übergänge überrannt. Die Straße ist nun für den gesamten Verkehr gesperrt, und über diese Route können wir keinen weiteren Nachschub mehr erhalten."
 wtt_burma_road.3.t:0 "[From.GetNameDefCap] Teil der Burmastraße wieder geöffnet"
 wtt_burma_road.3.desc:0 "Nach der erfolgreichen Rückeroberung eines Großteils der Burmastraße haben die Behörden den Verkehr auf der Straße wieder zugelassen. Zwar machen Überreste feindlicher Truppen die Reise noch gefährlicher als zuvor, doch die Versorgung ist wieder gewährleistet."
 wtt_burma_road.3.a:0 "Ein guter erster Schritt."
 wtt_burma_road.4.t:0 "[From.GetNameDefCap] Öffnet die Burmastraße wieder"
 wtt_burma_road.4.desc:0 "Der erste Versorgungskonvoi über die wiedereröffnete Burma-Straße hat heute Yunnan erreicht. Es wird zwar einige Zeit dauern, bis der Verkehr wieder reibungslos fließt, aber die Lieferungen erreichen uns wieder."
 wtt_burma_road.4.a:0 "Eine dringend benötigte Erleichterung."
 wtt_ledo_road.1.t:0 "Ledo Road gesperrt"
 wtt_ledo_road.1.desc:0 "[occupying_country.GetAdjective]-Truppen, die [state_occupied.GetName] angreifen, haben die Straße nach Ledo erreicht und den Weg an mehreren Stellen abgeschnitten. Auf diesem Weg können wir keinen weiteren Nachschub mehr erhalten."
 wtt_ledo_road.2.desc:0 "Die [From.GetAdjective]-Regierung hat beschlossen, den Verkehr auf der Ledo-Straße nicht mehr zuzulassen. Alle Konvois auf dieser Straße wurden angehalten und zur Umkehr aufgefordert. Auf diesem Weg können wir keine weiteren Lieferungen erhalten."
 wtt_ledo_road.2.desc_war_with_from:0 "[From.GetAdjective]-Truppen sind schnell die Ledo-Straße entlang vorgerückt und haben mehrere wichtige Brücken und Übergänge überrannt. Die Straße ist nun für den gesamten Verkehr gesperrt, und über diese Route können wir keinen weiteren Nachschub mehr erhalten."
 wtt_ledo_road.3.t:0 "[From.GetNameDefCap] Teil der Ledo Road wieder geöffnet"
 wtt_ledo_road.3.desc:0 "Nach der erfolgreichen Rückeroberung eines Großteils der Ledo Road haben die Behörden den Verkehr auf dem Weg wieder zugelassen. Zwar machen Überreste feindlicher Truppen die Reise noch gefährlicher als zuvor, doch die Versorgung ist wieder gewährleistet."
 wtt_ledo_road.3.a:0 "Ein guter erster Schritt."
 wtt_ledo_road.4.t:0 "[From.GetNameDefCap] Öffnet die Ledo Road wieder"
 wtt_ledo_road.4.desc:0 "er erste Versorgungskonvoi über die wiedereröffnete Ledo-Straße hat heute Yunnan erreicht. Es wird zwar einige Zeit dauern, bis der Verkehr wieder reibungslos fließt, aber die Lieferungen erreichen uns wieder."
 wtt_ledo_road.4.a:0 "Tolle Neuigkeiten!"
 wtt_the_hump.1.t:0 "Luftbrücke über den Hump ausgesetzt"
 wtt_the_hump.1.desc:0 "[occupying_country.GetAdjective]-Truppen haben mehrere Flugplätze in [state_occupied.GetName] überrannt und die lokalen Lufttransportgeschwader, die die Himalaya-Route fliegen, zur Evakuierung gezwungen. Da die Bedrohung durch feindliche Kampfflugzeuge zunimmt und die größeren Entfernungen es unmöglich machen, das Ziel mit einer einzigen Treibstoffladung zu erreichen, wurde der Lufttransport eingestellt. Über diese Route können wir keinen weiteren Nachschub mehr erhalten."
 wtt_the_hump.2.desc:0 "Die [From.GetAdjective]-Regierung hat mit sofortiger Wirkung die Einstellung aller Flüge über den Himalaya angeordnet. Trotz sofortiger Proteste gibt es keine Anzeichen dafür, dass sie ihre Vorgehensweise überdenken könnte."
 wtt_the_hump.2.desc_war_with_from:0 "[From.GetAdjective] Truppen haben die Flugplätze der Hump-Luftbrücke erobert, sodass wir auf dem Luftweg nicht mehr versorgt werden können. Von diesem Weg aus sind keine weiteren Lieferungen zu erwarten."
 wtt_the_hump.3.t:0 "[From.GetNameDefCap] Startet die Hump-Luftbrücke neu"
 wtt_the_hump.3.desc:0 "Die ersten Flugzeuge sind eingetroffen und transportieren lebenswichtige Güter über den Himalaya. Zwar stellen feindliche Aktionen noch immer eine Bedrohung für die Flugzeuge dar, doch die Versorgung ist wieder aufgenommen worden."
 wtt_the_hump.3.a:0 "Ein guter erster Schritt."
 wtt_the_hump.4.t:0 "[From.GetNameDefCap] Startet die Hump-Luftbrücke neu"
 wtt_the_hump.4.desc:0 "Die Luftbrücke über dem Himalaya läuft wieder auf Hochtouren und bringt nach einem streng kontrollierten Zeitplan täglich große Mengen dringend benötigter Hilfsgüter."
 wtt_the_hump.4.a:0 "Geschenke vom Himmel!"
 wtt_hanoi_route.1.t:0 "Hanoi-Route geschlossen"
 wtt_hanoi_route.1.desc:0 "Frachtschiffe mit Nachschub für unsere Armee wurden vom Hafen von Hanoi abgewiesen, da die Route nach Norden in Richtung der chinesischen Grenze von [GetVietnamOwner] gesperrt wurde. \n\nÜber diese Route kann kein weiterer Nachschub transportiert werden."
 wtt_hanoi_route.2.desc:0 "Die lokalen Behörden haben den Befehl erhalten, das Entladen von Kriegsmaterial in Hanoi für den Transport zur chinesischen Grenze zu unterbinden. Bewaffnete Wachen wurden an den Docks postiert, um zu verhindern, dass Besatzungen die Blockade durchbrechen. Die Küstenwache weist alle noch auf See befindlichen Schiffe ab. \n\nÜber diesen Kanal sind keine weiteren Lieferungen zu erwarten."
 wtt_hanoi_route.2.desc_war_with_from:0 "[From.GetAdjective] Die Besatzungstruppen von Hanoi haben mehrere Frachtschiffe mit Versorgungsgütern für uns gekapert. Die noch auf See befindlichen Schiffe sind umgekehrt und fliehen in neutrale Häfen.\n\nAuf dieser Route sind keine weiteren Versorgungsgüter zu erwarten."
 CHI_vietnam_JAP:0 "die japanische Armee"
 CHI_vietnam_FRA:0 "die französischen Behörden"
 wtt_china.1.t:0 "China fordert Unterwerfung"
 wtt_china.1.desc:0 "Es scheint, dass [From.GetLeader] beschlossen hat, seine Macht endgültig auf die entlegensten Gebiete Chinas auszudehnen. Ein Vertreter der Zentralregierung ist eingetroffen und fordert, dass wir den Anweisungen von [From.GetLeader] Folge leisten oder durch eine gehorsamere Regierung ersetzt werden."
 wtt_china.1.a:0 "Gemeinsam sind wir stark!"
 wtt_china.1.b:0 "Lass ihn es versuchen."
 wtt_china.2.t:0 "[From.GetLeader] Sendet"
 wtt_china.2.desc:0 "[From.GetLeader] hat den Boten mit einer persönlichen Nachricht zurückgeschickt, in der er verspricht, unseren Befehlen strikt Folge zu leisten und sich mit unserer Regierung abzustimmen."
 wtt_china.2.a:0 "Guter Mann."
 wtt_china.3.t:0 "[From.GetLeader] lehnt ab"
 wtt_china.3.desc:0 "[From.GetLeader] hat unsere Nachricht zurückgeschickt und behauptet, dass die Zentralregierung nicht die rechtliche Befugnis habe, einen Provinzgouverneur zu ersetzen. Dem Schreiben war ein detaillierter Bericht beigefügt, in dem die Kampfbereitschaft seiner Truppen dargelegt wurde."
 wtt_china.3.a:0 "Das werden wir sehen."
 wtt_china.10.t:0 "China fordert Unterwerfung"
 wtt_china.10.desc:0 "Die Regierung von [From.GetLeader] hat eine scharfe Botschaft gesendet und auf eine Reihe politischer Entscheidungen hingewiesen, die wir in den letzten Monaten getroffen haben und die ihrer Ansicht nach den nationalen Interessen von [From.GetNameDef] zuwiderlaufen. Wenn wir unsere Politik nicht stärker an die der [From.GetAdjective]-Regierung angleichen, wird sie „die Maßnahmen ergreifen, die sie für notwendig erachtet“."
 wtt_china.10.a:0 "Wir haben keine Wahl."
 wtt_china.10.b:0 "Wir werden kämpfen!"
 wtt_china.11.t:0 "[From.GetNameDefCap] sendet"
 wtt_china.11.desc:0 "Die [From.GetAdjective]-Regierung hat auf unsere Mitteilung reagiert und versprochen, uns bei allen weiteren Entscheidungen zu konsultieren. Unser Botschafter in [From.GetNameDef] wurde zum Sonderbeauftragten befördert und soll dafür sorgen, dass die [From.GetAdjective] nicht zu weit vom Thema abweichen."
 wtt_china.11.a:0 "Großartig!"
 wtt_china.12.t:0 "[From.GetNameDefCap] Trotzig"
 wtt_china.12.desc:0 "Unsere diplomatische Note an [From.GetNameDef] ist offenbar an die Presse durchgesickert, die nun in Aufruhr ist. Sogar die internationalen Zeitungen haben äußerst ungünstige Leitartikel verfasst und unsere berechtigten Konsultationsanfragen als „Einmischung in innere Angelegenheiten“, „gefährlichen Präzedenzfall“ und sogar „unverhohlenen Imperialismus“ bezeichnet. \n\nUnnötig zu erwähnen, dass die [From.GetAdjective]-Regierung sich weigert, die Angelegenheit weiter zu diskutieren, und angedeutet hat, dass eine erneute Erörterung zur vollständigen Einstellung der diplomatischen Kontakte führen würde."
 wtt_china.12.a:0 "Es müssen Maßnahmen ergriffen werden."
 wtt_infiltration.1.t:0 "Gegeninfiltrations-Sweep"
 wtt_infiltration.2.t:0 "Kommunistische Zelle in [infiltrated_state.GetName] entdeckt"
 wtt_infiltration.2.desc:0 "Ermittlungen unserer Behörden haben einen kommunistischen Stützpunkt in [infiltrated_state.GetName] aufgedeckt. Unsere Streitkräfte müssen so schnell wie möglich mit aller Kraft gegen diese Banditen vorgehen. Jede Verzögerung könnte ihnen den Ausbau ihrer Operationsbasis ermöglichen und ihre Ausrottung erheblich erschweren."
 wtt_infiltration.2.a:0 "Schicken Sie die Truppen."
 wtt_infiltration.3.t:0 "Kommunisten enthalten"
 wtt_infiltration.3.desc:0 "Bei unseren jüngsten Razzien in bekannten kommunistischen Verstecken gingen unsere Agenten leer aus. Wir wissen, dass kommunistische Infiltratoren in unserem Land weiterhin aktiv sind, aber es scheint, dass es keine Zellen gibt, von denen wir nicht schon vorher wussten."
 wtt_infiltration.3.a:0 "Lassen Sie uns die ausrotten, die wir gefunden haben!"
 wtt_infiltration.4.t:0 "Kommunistische Infiltration besiegt?"
 wtt_infiltration.4.desc:0 "Berichte über eine weitverbreitete kommunistische Unterwanderung scheinen maßlos übertrieben. Razzien in mehreren bekannten Verstecken und bei kommunistischen Aktivisten brachten nichts zutage. Das bedeutet entweder, dass es den Kommunisten nicht gelungen ist, Zellen zu gründen, oder dass wir die von ihnen geschaffenen Zellen zerschlagen haben. Wir müssen jedoch wachsam bleiben, denn sie werden zweifellos versuchen, uns in Sicherheit zu wiegen, bevor sie ihre Bemühungen von neuem beginnen."
 wtt_infiltration.4.a:0 "Hoffentlich sind wir sie alle losgeworden."
 wtt_infiltration.5.t:0 "[infiltrated_state.GetName] Basisbereich entdeckt"
 wtt_infiltration.5.desc:0 "Nationalistische Patrouillen haben sich unserem Stützpunkt in [infiltrated_state.GetName] genähert. Wenn sie bereit sind, die nötigen Ressourcen einzusetzen, könnten sie ihn in einer konzertierten Militäroperation auslöschen."
 wtt_infiltration.5.a:0 "Hoffen wir, dass es nicht soweit kommt."
 wtt_infiltration.6.t:0 "[infiltrated_state.GetName] Basisgebiet angegriffen"
 wtt_infiltration.6.desc:1 "Feindliche Streitkräfte haben ihren Angriff auf unser Basisgebiet in [infiltrated_state.GetName] begonnen. Von unseren Kameraden im Staat sind keine Nachrichten eingegangen, aber die feindliche Presse berichtet vom Abschluss der „Einkreisungs- und Ausrottungskampagne von [infiltrated_state.GetName]. Wir müssen vom Schlimmsten ausgehen."
 wtt_infiltration.6.a:0 "Die Revolution hat einen Rückschlag erlitten."
 wtt_infiltration.10.t:0 "Kommunistischer Aufstand"
 wtt_infiltration.10.desc:0 "In der Kommunistischen Partei ist einiges im Gange. Unser Geheimdienst hat mehrere Kuriere abgefangen, die zwischen den Stützpunkten unterwegs waren und geheime Befehle über den „Revolutionären Gegenschlag“ überbrachten, der in geheimen Stützpunkten im ganzen Land vorbereitet wird. Soldaten und Vorräte werden für eine Großoperation – vielleicht sogar einen landesweiten Aufstand – zusammengetragen. Wir müssen sofort Vorbereitungen treffen."
 wtt_infiltration.10.a:0 "Bereiten Sie sich darauf vor, für China zu kämpfen!"
 wtt_infiltration.21.t:0 "Kommunistische Zelle in [infiltrated_state.GetName] entdeckt"
 wtt_infiltration.21.desc:0 "Aufgrund von Informationen des Geheimdienstes haben unsere Patrouillen ein großes kommunistisches Stützpunktgebiet entdeckt. Wir sollten sofort zuschlagen, bevor sie sich besser organisieren und unseren Vertreibungsversuchen Widerstand leisten können."
 wtt_infiltration.21.a:0 "Geschwindigkeit ist entscheidend."
 wtt_infiltration.23.t:0 "Schwindet die kommunistische Bedrohung?"
 wtt_infiltration.23.desc:0 "Eine Reihe von Razzien in bekannten kommunistischen Verstecken hat kaum Neuigkeiten über das Ausmaß der kommunistischen Unterwanderung ans Licht gebracht. Ausführliche Verhöre der verhafteten Kommunisten brachten nichts ans Licht, was wir nicht schon vorher wussten. \n\nEs scheint, als hätte unser Geheimdienst die Angelegenheit recht gut im Griff."
 wtt_infiltration.23.a:0 "Wir sollten die wenigen Zellen, von denen wir wissen, beseitigen."
 wtt_infiltration.24.a:0 "Hoffentlich sind wir sie alle losgeworden."
 wtt_infiltration.24.t:0 "Kommunistische Bedrohung besiegt"
 wtt_infiltration.24.desc:0 "Es scheint, als hätten die Kommunisten in den letzten Monaten schwere Schläge und Rückschläge erlitten. Unsere Agenten haben eine wachsende Zahl von Nachrichten aus der Zentrale der Kommunistischen Partei abgefangen, in denen lokale Führer nach ihrem Status gefragt wurden – oft nachdem sie besagte Führer verhaftet und den Kurieren aufgelauert hatten. Im Moment scheinen die Kommunisten in der Defensive zu sein, da ihre Organisation auf staatlicher Ebene bis zur Ineffektivität zerstört ist. \n\nWir müssen jedoch wachsam bleiben, denn solange die Kommunistische Partei in irgendeiner Form existiert, könnte sie sich noch zu einer Erneuerung ihrer Bemühungen entschließen."
 CHI_xian_warlords_upset:0 "Dies wird die Kriegsherren verärgern. Sie könnten sich dazu entschließen, Ihre Fraktion zu verlassen, Ihre Versuche, sie zu kontrollieren, abzulehnen und sich in Zukunft an diese Beleidigung zu erinnern."
 wtt_xian_incident.1.t:0 "Eine Einladung von [From.GetLeader]"
 wtt_xian_incident.1.desc:0 "[From.GetLeader] hat eine formelle Einladung an [CHI.GetLeader] zu einem Treffen in Xi&#39;an geschickt, um die aktuelle Situation und zukünftige Schritte im Konflikt gegen die Kommunisten zu besprechen.\n\nDie Ablehnung dieser Einladung wird von [From.GetLeader] als persönliche Beleidigung angesehen und wird zweifellos von den anderen Kriegsherren bemerkt werden."
 wtt_xian_incident.1.a:0 "Gehen"
 wtt_xian_incident.1.b:0 "Geh nicht"
 wtt_xian_incident.2.t:0 "[From.GetLeader] kommt in Xi&#39;an an"
 wtt_xian_incident.2.desc:0 "Mit nur einer kleinen Eskorte ist [From.GetLeader] nach Xi&#39;an gekommen, um die Lage mit uns zu besprechen. Er erwartet zweifellos, dass wir unser Engagement gegen die Kommunisten erneuern und sie vernichten. Da die japanische Armee vor unserer Haustür steht, müssen wir ihm die Lage klarmachen."
 wtt_xian_incident.2.a:0 "Bitten Sie ihn, sich mit den Kommunisten zu verbünden."
 wtt_xian_incident.3.t:0 "[From.GetLeader] lehnt ein Treffen ab."
 wtt_xian_incident.3.desc:0 "Unter Berufung auf eine schlimme Erkältung hat [CHI.GetLeader] unsere Einladung „widerwillig“ abgelehnt. Ob dies bedeutet, dass er in naher Zukunft die direkte Kontrolle über unser Land übernehmen will oder ob ihm jemand unsere Pläne verraten hat, bleibt abzuwarten."
 wtt_xian_incident.3.a:0 "Vielleicht ist er wirklich erkältet?"
 wtt_xian_incident.4.t:0 "[From.GetLeader] schlägt ein Bündnis mit den Kommunisten vor"
 wtt_xian_incident.4.desc:0 "Bei dem Treffen in Xi&#39;an hat [From.GetLeader] einen überraschenden Vorschlag gemacht: Er glaubt, wir sollten ein Bündnis mit den Kommunisten schmieden, um der japanischen Bedrohung als geschlossene Front begegnen zu können."
 wtt_xian_incident.4.a:0 "Vielleicht hat er recht."
 wtt_xian_incident.4.b:0 "Wir erinnern uns noch daran, wie das letzte Mal gelaufen ist."
 wtt_xian_incident.5.t:0 "[CHI.GetLeader] schlägt eine Allianz vor."
 wtt_xian_incident.5.desc:0 "Es scheint, als ob das nationalistische Lager es endlich satt hat, uns von der Landkarte zu tilgen. Bei einem Treffen in Xi&#39;an hat [CHI.GetLeader] offenbar zugestimmt, die Möglichkeit eines Bündnisses mit uns gegen die Japaner zu prüfen.\n\nWir sollten unsere Optionen sorgfältig abwägen."
 wtt_xian_incident.5.a:0 "Die Japaner sind die größere Bedrohung."
 wtt_xian_incident.5.b:0 "Keine Deals mit den Nationalisten!"
 wtt_xian_incident.6.t:0 "[From.GetLeader] weigert sich, sich mit den Kommunisten zu verbünden"
 wtt_xian_incident.6.desc:0 "Trotz unserer Argumente und Forderungen, diesen unnötigen Krieg zu beenden, weigert sich [From.GetLeader], eine Einheitsfront mit den Kommunisten in Erwägung zu ziehen. Es ist klar, dass entschiedenere Maßnahmen erforderlich sind. Sollen wir ihn verhaften und den Kommunisten ausliefern?"
 wtt_xian_incident.6.a:0 "Es ist unsere einzige Option."
 wtt_xian_incident.6.b:0 "Das könnte leicht außer Kontrolle geraten."
 wtt_xian_incident.7.t:0 "[CHI.GetLeader] in [CHI_xian_instigator.GetNameDef] verhaftet!"
 wtt_xian_incident.7.desc_a:1 "[CHI_xian_instigator.GetLeader] hat eine Nachricht gesendet, in der er mitteilt, dass er [CHI.GetLeader] verhaftet hat und bereit ist, ihn uns auszuliefern. \n\nDies ist möglicherweise die beste Chance, die wir jemals haben werden, um diesen Volksfeind hinzurichten!"
 wtt_xian_incident.7.desc_b:0 "[From.GetLeader] hat unseren Vorschlag, [CHI.GetLeader] hinzurichten, abgelehnt. Stattdessen sollen wir ein Bündnis mit den Nationalisten eingehen, da wir offenbar noch nicht bereit sind, die Revolution anzuführen und uns gleichzeitig gegen die Japaner zu verteidigen."
 wtt_xian_incident.7.a:0 "Bitten Sie die Sowjets um Genehmigung."
 wtt_xian_incident.7.b:0 "Kopf ab!"
 wtt_xian_incident.7.c:0 "Wir sollten uns mit ihm gegen die Japaner verbünden."
 wtt_xian_incident.7.d:0 "Ihn jetzt zu töten würde zu einem Krieg führen, den wir nicht gewinnen können. Lassen Sie ihn gehen."
 wtt_xian_incident.8.t:0 "[From.GetLeader] hat [CHI.GetLeader] verhaftet!"
 wtt_xian_incident.8.desc:0 "Wir haben eine Nachricht von [From.GetLeader] abgefangen, in der es heißt, dass er [CHI.GetLeader] in Gewahrsam hält und ihn den Kommunisten ausliefern will. Angesichts des Hasses, den sie gegen ihn hegen, ist es unwahrscheinlich, dass er dies lange überleben wird. \n\nWenn wir verhindern wollen, dass [CHI.GetLeader] von [PRC.GetLeader] einem Schauprozess unterzogen und hingerichtet wird, müssen wir schnell und entschlossen handeln!"
 wtt_xian_incident.8.a:0 "Schicken Sie die Truppen!"
 wtt_xian_incident.8.b:0 "Sie würden ihm nichts antun. Warten wir ab."
 wtt_xian_incident.9.t:0 "[CHI.GetLeader] in [CHI_xian_instigator.GetNameDef] verhaftet!"
 wtt_xian_incident.9.desc:0 "[PRC.GetLeader] hat eine Nachricht gesendet, in der es heißt, dass die Kommunisten die einmalige Gelegenheit haben, [CHI.GetLeader] für seine Verbrechen gegen das Volk und die Revolution vor Gericht zu stellen. Seine Hinrichtung wäre ein großer Sieg für die Kommunistische Partei im Kampf um die Führung in China. \n\nAllerdings würde es auch die Nationalisten in einem kritischen Moment schwächen und den Japanern möglicherweise weitere Fortschritte in China ermöglichen."
 wtt_xian_incident.9.a:0 "Ein weiterer bürgerlicher Feind findet sein Ende."
 wtt_xian_incident.9.b:0 "Er wird noch gebraucht."
 wtt_xian_incident.10.t:0 "[PRC.GetLeader] schlägt eine Allianz vor"
 wtt_xian_incident.10.desc:0 "Statt des erwarteten Schauprozesses und der anschließenden Hinrichtung haben die Kommunisten signalisiert, dass sie ein formelles Bündnis gegen die Japaner bevorzugen. \n\nSie spielen offensichtlich auf Zeit, da sie wissen, dass ein weiterer Angriff sie vernichten würde. Wenn sie [CHI.GetLeader] tatsächlich tot sehen wollten, wäre er bereits hingerichtet worden.\n\nEinige Leute in unserer Regierung fragen sich jedoch, warum die Kommunisten jetzt auf ein Bündnis drängen – vielleicht wissen sie etwas, was wir nicht wissen?"
 wtt_xian_incident.10.a:0 "Solange sie unseren Befehlen folgen."
 wtt_xian_incident.10.b:0 "Keine Deals mit den Kommunisten!"
 wtt_china_shared.1.t:0 "[From.GetNameDefCap] bietet Unterstützung"
 wtt_china_shared.1.desc:0 "[From.GetLeader] ist in unserer Hauptstadt eingetroffen, um unsere Situation zu besprechen. Bei einem Treffen mit Unabhängigkeitsaktivisten und der Regierung erklärte er, dass unsere Unabhängigkeit ein vitales nationales Interesse von [From.GetNameDef] sei und sie bereit seien, jeden Versuch zu unterstützen, in Richtung größerer Unabhängigkeit zu gelangen."
 wtt_china_shared.1.a:0 "Ihre Hilfe ist mehr als willkommen."
 wtt_china_shared.1.b:0 "Wir sind mit unserer aktuellen Situation recht zufrieden."
 wtt_china_shared.2.t:0 "[From.GetNameDefCap] akzeptiert unsere Unterstützung"
 wtt_china_shared.2.desc:0 "In einem privaten Gespräch haben Regierungsvertreter von [From.GetNameDef] großes Interesse an unseren Möglichkeiten zur Unterstützung eines unabhängigen Staates bekundet. Es wurden Mittel für Gruppen bereitgestellt, die sich für mehr Unabhängigkeit einsetzen, und wir haben mit der Organisation einer „Provisorischen Freien [From.GetAdjective] Exilregierung“ begonnen."
 wtt_china_shared.2.a:0 "Ihr Kampf ist unser Kampf."
 wtt_china_shared.3.t:0 "[From.GetNameDefCap] lehnt unsere Unterstützung ab"
 wtt_china_shared.3.desc:0 "[From.GetLeader] hat uns in einer strengen Note mitgeteilt, dass seine Regierung keine Einmischung in interne [From.GetAdjective]-Angelegenheiten dulden würde. Das diplomatische Protokoll verbietet es, [From.From.GetLeader] zur Persona non grata zu erklären und ihm die Einreise zu verweigern. Stattdessen wurde praktisch unserer gesamten Delegation die Rückkehr nach [From.GetNameDef] untersagt."
 wtt_china_shared.3.a:0 "Scham."
 wtt_china_shared.4.t:0 "Unabhängigkeitsbewegung in [From.GetNameDef] gewinnt an Stärke"
 wtt_china_shared.4.desc:0 "Es scheint, dass [From.From.GetLeader]s jüngster Besuch bei [From.GetNameDef] nicht nur ein Austausch von Nettigkeiten bei einer Tasse Tee war. In letzter Zeit haben die zuvor getrennten und zersplitterten Unabhängigkeitsbewegungen des Landes begonnen, sich deutlich besser zu koordinieren. Es scheint fast so, als würde ihnen jemand aus dem Ausland bei der Organisation helfen."
 wtt_china_shared.4.a:0 "Beunruhigend."
 wtt_china_shared.10.t:0 "Die fliegenden Tiger"
 wtt_china_shared.10.desc_a:0 "Soong Mei-Ling, die Ehefrau von Chiang Kai-Shek und eine seiner engsten Beraterinnen, ist nach Washington gereist, um für mehr Unterstützung Chinas im Kampf gegen Japan zu werben. Die chinesische Luftwaffe benötigt dringend moderne Flugzeuge und erfahrene Piloten, um diese zu fliegen. Soongs Appell fand großen Anklang in der Öffentlichkeit, und einige unserer Piloten haben ihren Dienst quittiert, um sich einem chinesischen Unternehmen anzuschließen und dort „Ausbildung und Schulung“ für chinesische Piloten anzubieten. Nachdem die Pilotenfrage geklärt ist, hat sich Soong Mei-Ling mit der Bitte an uns gewandt, die Übergabe von etwa 150 unserer modernsten Kampfflugzeuge zur Neuausrüstung der chinesischen Luftwaffe zu genehmigen."
 wtt_china_shared.10.desc_b:0 "Der Krieg in China hat die chinesische Luftwaffe stark belastet. Obwohl sie ihren Gegnern zahlenmäßig und waffentechnisch unterlegen war, kämpfte sie tapfer um die Vorherrschaft im Himmel über China. \n\nTrotz der Tapferkeit ihrer Piloten sucht die [From.GetAdjective]-Luftwaffe verzweifelt nach neuen Flugzeugen und Piloten, um ihre Verluste zu ersetzen. Eine von [From.GetLeader] entsandte Delegation ist in Washington eingetroffen, um über die Übergabe von etwa 150 modernen Kampfflugzeugen zu verhandeln und einer ähnlichen Anzahl von Piloten die Entsendung dieser Flugzeuge nach China zu ermöglichen."
 wtt_china_shared.10.a:0 "Wir müssen sie auf jede erdenkliche Weise unterstützen."
 wtt_china_shared.10.b:0 "Wir dürfen uns nicht in diesen Konflikt hineinziehen lassen."
 wtt_china_shared.11.t:0 "Die sowjetische Freiwilligengruppe"
 wtt_china_shared.11.desc_a:0 "Die anhaltenden Kämpfe in China erfordern Luftunterstützung für unsere Kameraden in der [From.GetAdjective] Roten Armee. [From.GetLeader] hat uns wegen der Entsendung einer freiwilligen Gruppe von Piloten und Flugzeugen kontaktiert. Er bittet um etwa 50 Bomber und 100 Jagdflugzeuge als Eskorte. \n\nDies könnte unseren Piloten wertvolle Erfahrungen vermitteln und uns ermöglichen, unsere neuesten Entwicklungen im Einsatz zu testen."
 wtt_china_shared.11.desc_b:0 "Der Krieg in China dauert an und die Luftwaffe von [From.GetAdjective] ist mit der Verteidigung des Luftraums über [From.GetNameDef] und der Bereitstellung von Luftunterstützung für die kämpfenden Truppen überfordert. [From.GetLeader] hat einen persönlichen Appell an [SOV.GetLeader] gerichtet, Unterstützung in Form einer kombinierten Streitmacht aus etwa 50 Mittelstreckenbombern und 100 Jagdflugzeugen zu schicken.\n\nDies könnte sich als nützliche Gelegenheit erweisen, unsere modernste Ausrüstung unter Kampfbedingungen zu testen."
 wtt_china_shared.11.a:0 "Wir müssen sie auf jede erdenkliche Weise unterstützen."
 wtt_china_shared.11.b:0 "Sie müssen mit dem auskommen, was sie haben."
 wtt_china_shared.12.t:0 "Ein neuer General für [From.GetNameDef]"
 wtt_china_shared.12.desc:0 "[From.GetLeader] hat einen Brief an [USA.GetLeader] geschickt und vorgeschlagen, einen unserer Generäle als Stabschef in die [From.GetAdjective]-Armee zu schicken. \n\nDadurch würden wir die persönliche Dankbarkeit von [From.GetLeader] gewinnen und unserem General wertvolle Erfahrungen vermitteln. Außerdem könnten die Streitkräfte von [From.GetLeader] den Krieg gewinnen. \n\nWelchen unserer Generäle sollten wir schicken?"
 wtt_china_shared.12.a:0 "Senden Sie Joseph Stillwell"
 wtt_china_shared.12.b:0 "Sie werden für sich selbst sorgen müssen."
 wtt_china_shared.12.c:0 "Senden Sie Douglas MacArthur"
 wtt_china_shared.12.d:0 "Senden Sie Dwight Eisenhower"
 wtt_china_shared.13.t:0 "[CHI_USA_General.GetName] kommt nach China"
 wtt_china_shared.13.desc:0 "[From.GetLeader] hat unsere Bitte um Unterstützung angenommen und [CHI_USA_General.GetName] angewiesen, sich so schnell wie möglich hier in China zum Dienst zu melden.\n\nDer General soll nicht nur ein Berater von [Root.GetLeader] sein, sondern auch Truppen im Feld befehligen, was ihm Erfahrungen aus erster Hand im Kampf in einem modernen Krieg verschafft."
 wtt_china_shared.13.a:0 "Eine wertvolle Ergänzung."
 wtt_china_shared.14.t:0 "Keine Hilfe von [From.GetNameDef]"
 wtt_china_shared.14.desc:0 "Unsere Anfrage an [From.GetLeader] stieß auf taube Ohren. Mehrere hochrangige Offiziere der US-Armee haben zwar signalisiert, dass sie bereit wären, den Auftrag zu übernehmen, doch sowohl der Kriegsminister als auch Präsident [From.GetLeader] haben ihr Veto eingelegt, da dies unpraktisch und nicht im nationalen Interesse sei."
 wtt_china_shared.14.a:0 "Sind sie Feiglinge, Narren oder beides?"
 wtt_prc.1.t:0 "[From.GetLeader] schlägt eine Allianz vor"
 wtt_prc.1.desc:0 "Nach Jahren wirkungsloser Konflikte und angesichts der drohenden Gefahr durch Japan im Hintergrund haben uns die Kommunisten mit dem Angebot einer gemeinsamen Regierung kontaktiert. Unsere Armeen würden Seite an Seite kämpfen, und wir würden unsere Politik koordinieren.\n\nDas Motiv für diesen plötzlichen Sinneswandel der Kommunisten ist weniger klar, und einige Regierungsmitglieder glauben, dass dies lediglich der erste Schritt eines Plans zur Übernahme des Landes sei."
 wtt_prc.1.a:0 "Wir müssen uns gegen unsere Feinde vereinen."
 wtt_prc.1.b:0 "Auf diesen billigen Trick fallen wir nicht herein."
 wtt_prc.2.t:0 "[From.GetLeader] lehnt Allianz ab."
 wtt_prc.2.desc:0 "Nach langer Überlegung hat [From.GetLeader] beschlossen, unsere Delegation abzuweisen. Unsere Quellen in der Regierung berichten, dass er überall kommunistische Verschwörungen sieht und glaubt, dass wir versuchen, die Regierung zu übernehmen und ihm das Land zu entreißen."
 wtt_prc.2.a:0 "Wie paranoid."
 wtt_prc.10.t:0 "[From.GetNameDefCap] fordert unsere Zusammenarbeit"
 wtt_prc.10.desc:0 "Nach der Gründung der Nationalen Verteidigungsregierung hat [From.GetNameDef] deutlich gemacht, dass er „übermäßige Unabhängigkeit und Gehorsamsverweigerung“ nicht toleriert. Da ein Krieg gegen Japan immer wahrscheinlicher wird, wird jeder, der nicht auf der Seite der Nationalen Verteidigungsregierung steht, als potenzieller Feind behandelt. [From.GetLeader] hat offen erklärt, dass er nicht warten wird, bis ein Krieg ausbricht, um gegen die Warlords vorzugehen, die sich weigern, sich zu beugen."
 wtt_prc.10.a:0 "Wir versuchen unser Glück mit der Regierung."
 wtt_prc.10.b:0 "Dieser polternde Idiot blufft eindeutig."
 wtt_prc.11.t:0 "[From.GetNameDefCap] tritt der Regierung der Nationalen Verteidigung bei"
 wtt_prc.11.desc:0 "[From.GetLeader] hat Einsicht gewonnen und sich entschieden, unserer Allianz beizutreten. Seine Truppen werden uns nun in den kommenden Schlachten unterstützen."
 wtt_prc.12.t:0 "[From.GetNameDefCap] lehnt ab"
 wtt_prc.12.desc:0 "Aus unverständlichen Gründen weigert sich [From.GetLeader], selbst in den grundlegendsten Angelegenheiten mit uns zusammenzuarbeiten. Er behauptet, wir seien nichts weiter als eine Bande von Banditen, die schon bald ausgelöscht werden würden, und hat andere Kriegsherren dazu aufgerufen, sich ihm anzuschließen und Widerstand zu leisten."
 wtt_prc.12.a:0 "Er wird zur Räson gebracht."
 PRC_provoke_japan_korea:0 "Korea"
 PRC_provoke_japan_manchuria:0 "Mandschurei"
 wtt_prc.20.t:0 "Chinesische Provokation"
 wtt_prc.20.desc:0 "Neue Details zum jüngsten Angriff auf unser Territorium sind aufgetaucht. Zwar konnte bisher keiner der Täter gefasst werden, doch deuten die Beweise eindeutig darauf hin, dass es sich um eine bewusste Provokation der Chinesen handelte. \n\nDie chinesische Regierung hat den Angriff verdächtig langsam verurteilt, und chinesische Zeitungen priesen ihn als heroischen Akt des Widerstands gegen den „japanischen Imperialismus“. \n\nDas Kabinett ist zusammengetreten, um die Angelegenheit zu besprechen und Maßnahmen gegen den eklatanten Angriff vorzuschlagen."
 wtt_prc.20.a:0 "Fordern Sie eine Entschuldigung."
 wtt_prc.20.b:0 "Mobilisieren Sie die Truppen und bereiten Sie sich auf den Krieg vor."
 wtt_prc.21.t:0 "Sabotage einer Waffenfabrik"
 wtt_prc.21.desc:0 "Aus einer unserer Fabriken in [JAP.GetManchuriaPuppet] sind Meldungen eingegangen, dass gestern Abend ein Großbrand ausgebrochen ist. Die örtliche Feuerwehr kämpft noch gegen den Brand, ist aber zuversichtlich, ihn bis zum Ende des Tages unter Kontrolle zu haben. Der Schaden in der Fabrik scheint erheblich zu sein, da das Feuer offenbar im Lagerbereich für leicht entzündliche Chemikalien ausgebrochen ist. Der Militärgeheimdienst hat eine gründliche Untersuchung eingeleitet, um herauszufinden, wie das Feuer trotz strengster Sicherheitsvorkehrungen ausbrechen konnte. Erste Hinweise deuten stark auf Brandstiftung hin."
 wtt_prc.21.a:0 "Wer würde so etwas tun?"
 wtt_prc.22.t:0 "Sabotage einer zivilen Fabrik"
 wtt_prc.23.t:0 "Brücke gesprengt"
 wtt_prc.23.desc:0 "Irgendwann in der letzten Nacht brach eine wichtige Eisenbahnbrücke in [JAP.GetManchuriaPuppet] unter dem Gewicht eines vorbeifahrenden Munitionszuges zusammen. Rettungs- und Bergungsarbeiten wurden durch die Sekundärexplosionen der Munition erschwert. Die Zugbesatzung wird weiterhin vermisst und gilt als tot.\n\nDer Militärgeheimdienst hat ein Team entsandt, um die Stelle zu untersuchen, sobald dies sicher möglich ist. Ziel ist es herauszufinden, wie eine stabile Brücke ohne Warnschilder einstürzen konnte.\n\nÖrtliche Zeugen berichten, am Tag vor dem Einsturz eine kleine Gruppe im Tal unterhalb der Brücke gesehen zu haben. Ihr Aufenthaltsort ist derzeit unbekannt."
 wtt_prc.24.t:0 "Patrouille in einen Hinterhalt geraten"
 wtt_prc.24.desc:0 "Eine unserer Patrouillen in [JAP.GetManchuriaPuppet] hat sich nicht gemeldet. Ein Suchtrupp, der den Weg der Patrouille verfolgte, stieß auf ein Schlachtfeld mit Anzeichen dafür, dass die Patrouille überrascht und in einem brutalen Nahkampf vernichtet wurde.\n\nOb die Angreifer Verluste erlitten haben, ist derzeit nicht bekannt, aber die einzigen gefundenen Leichen gehören Soldaten der japanischen Armee.\n\nSie scheinen fast absichtlich zurückgelassen worden zu sein, vielleicht um eine Botschaft zu übermitteln."
 wtt_japan.1.t:0 "[From.GetNameDefCap] will die Oberherrschaft über unsere Kolonien"
 wtt_japan.1.desc:1 "Die [From.GetAdjective] haben die Gelegenheit genutzt, die uns unsere Schwäche bietet, und uns angeboten, uns bei der Aufrechterhaltung der Ordnung in unseren Kolonien zu „helfen“. Sie argumentieren, dass wir mit dem Fall unseres Festlands keine Möglichkeit mehr haben, unsere Macht zu behaupten.\n\nEs handelt sich eindeutig um eine List, um uns die Kontrolle über unsere Kolonien zu entreißen, aber welche Wahl haben wir?"
 wtt_japan.1.a:0 "Es ist an der Zeit, die japanische Dominanz im Osten zu akzeptieren."
 wtt_japan.1.b:0 "Sie müssen sie mit Gewalt nehmen!"
 wtt_japan.2.t:0 "[From.GetNameDefCap] Gewährt die Oberherrschaft über Kolonien"
 wtt_japan.2.desc:0 "[From.GetNameDefCap] haben unser Angebot, in ihren Kolonien „für Ordnung zu sorgen“, sorgfältig geprüft und beschlossen, es anzunehmen. Sie haben uns praktisch die vollständige Kontrolle übertragen."
 wtt_japan.2.a:0 "Eine weise Entscheidung."
 wtt_japan.3.t:0 "[From.GetNameDefCap] Lehnt die Oberherrschaft über Kolonien ab"
 wtt_japan.3.desc:0 "[From.GetNameDefCap] haben unser Angebot, in ihren Kolonien „für Ordnung zu sorgen“, sorgfältig geprüft und beschlossen, es abzulehnen."
 wtt_japan.3.a:0 "Wir werden sehen, wie das für sie ausgeht."
 wtt_japan.11.t:0 "Nichtangriffspakt mit [From.GetNameDef]"
 wtt_japan.11.desc:0 "Obwohl die Spannungen zwischen [From.GetAdjective] und [Root.GetNameDef] bis vor Kurzem zugenommen haben, haben die [From.GetAdjective] nun Verhandlungen über einen Nichtangriffspakt aufgenommen. Die Vorteile für uns liegen auf der Hand, aber was uns Sorgen bereiten sollte, sind die Vorteile für die [From.GetAdjective] und ob wir diesen Schritt noch bereuen werden."
 wtt_japan.11.a:0 "Wir müssen Frieden haben ... vorerst."
 wtt_japan.11.b:0 "Ihnen jeglichen Vorteil zu verwehren hat Vorrang!"
 wtt_japan.12.t:0 "[From.GetNameDefCap] Akzeptiert Nichtangriffspakt"
 wtt_japan.12.desc:0 "[From.GetNameDefCap] hat unser Angebot eines Nichtangriffspakts formell angenommen."
 wtt_japan.12.a:0 "Sie spielen uns direkt in die Hände."
 wtt_japan.13.t:0 "[From.GetNameDefCap] lehnt Nichtangriffspakt ab"
 wtt_japan.13.desc:0 "Aus irgendeinem Grund hat [From.GetNameDef] unser Angebot eines Nichtangriffspakts abgelehnt."
 wtt_japan.13.a:0 "Planen sie etwas gegen uns?"
 wtt_japan.21.t:0 "Austausch von [From.GetAdjective] Generälen"
 wtt_japan.21.desc:0 "Die [From.GetAdjective] haben beschlossen, ihre linksgerichteten Beamten und Generäle abzuberufen und haben uns stattdessen ihre rechtsgerichteten Generäle und Beamten ins inoffizielle Exil geschickt."
 wtt_japan.21.a:0 "Es scheint, als ob in [From.GetNameDef] etwas im Gange ist …"
 wtt_japan.22.t:0 "[Root.GetAdjective] Generäle ausgetauscht"
 wtt_japan.22.desc:0 "Der Prozess des Austauschs unserer rechtsgerichteten Generäle und Beamten gegen die linksgerichteten, die wir zuvor ins inoffizielle Exil nach [From.GetNameDef] geschickt hatten, ist nun abgeschlossen."
 wtt_japan.22.a:0 "Dies wird unseren Einfluss auf [Root.GetNameDef] stärken."
 wtt_japan.31.t:0 "Schicksal der kaiserlichen Familie"
 wtt_japan.31.desc:0 "Es ist an der Zeit, sich um das Schicksal des Kaisers und seiner Familie zu kümmern. Erblicher sozialer Status hat in dem Japan, das wir aufbauen, keinen Platz. Was soll aus ihnen werden?"
 wtt_japan.31.a:0 "Verbannen Sie sie!"
 wtt_japan.31.b:0 "Nimm ihre Köpfe!"
 wtt_japan.32.t:0 "Verbannte kaiserliche Familie"
 wtt_japan.32.desc:0 "[From.GetNameDefCap] hat die kaiserliche Familie verbannt und uns damit einen großen Segen erwiesen! Er ist nun in [Root.GetNameDef] angekommen und trotz seiner Verbannung ist sein Einfluss auf das Volk und die Truppen immer noch groß."
 wtt_japan.32.a:0 "Wir müssen würdig sein, sein Zuhause zu sein!"
 wtt_japan.101.t:0 "Die mandschurische Wiedervereinigung"
 wtt_japan.101.desc:0 "Mit ihrem jüngsten Sieg gegen [MAN.GetName] hat die japanische Regierung die chinesischen Verbindungen zur Region anerkannt und uns mit sofortiger Wirkung die gesamte Kontrolle übertragen. Mit dieser Geste des guten Willens bieten sie uns ein Bündnis an."
 wtt_japan.101.a:0 "Vielleicht kann man mit den Japanern tatsächlich fertig werden."
 wtt_japan.101.b:0 "Wir werden die Mandschurei akzeptieren, aber nicht ihre Freundlichkeit."
 wtt_japan.102.desc:0 "[From.GetNameDefCap] dankt uns für die Rückgabe der Mandschurei und hat unser Bündnisangebot angenommen."
 wtt_japan.103.desc:0 "[From.GetNameDefCap] dankt uns für die Rückgabe der Mandschurei, hat aber unser Bündnisangebot abgelehnt."
 wtt_japan.104.t:0 "Philippinische Souveränität"
 wtt_japan.104.desc:0 "[From.GetNameDefCap] hat offen und öffentlich erklärt, dass sie nicht länger tatenlos zusehen können, wie ein Land in ihrer Interessenssphäre weiterhin unter westlicher Herrschaft steht. Sie fordern nun, dass wir unseren Zeitplan für die Entkolonialisierung beschleunigen und den Philippinen unverzüglich die volle Souveränität gewähren."
 wtt_japan.104.a:0 "Sie haben Recht. Sie verdienen ihre Freiheit."
 wtt_japan.104.b:0 "Die Philippinen bleiben amerikanisch!"
 wtt_japan.105.desc:0 "[From.GetNameDefCap] hat auf unsere Forderungen nach der vollständigen Unabhängigkeit der Philippinen reagiert und die amerikanische Regierung hat nun sofortige Vorkehrungen getroffen, um ihrem Untertan im Pazifik die volle Souveränität zu gewähren."
 wtt_japan.105.a:0 "Zumindest sind sie vernünftig."
 wtt_japan.106.desc:0 "[From.GetNameDefCap] hat auf unsere Forderungen nach der vollständigen Unabhängigkeit der Philippinen reagiert und die „lebenswichtigen amerikanischen Interessen“ bekräftigt, die die Philippinen in der Region vertreten."
 wtt_japan.106.a:0 "Und sie nennen sich selbst die „Verteidiger der Freiheit“?"
 wtt_japan.107.desc:0 "[From.GetNameDefCap] hat auf die Forderungen Japans nach unserer vollständigen Unabhängigkeit reagiert und die amerikanische Regierung hat nun sofortige Vorkehrungen getroffen, um uns die volle Souveränität zu gewähren!"
 wtt_japan.107.a:0 "Lobt die Japaner!"
 wtt_japan.108.t:0 "Coup eines jungen Offiziers"
 wtt_japan.108.desc:0 "Einer Gruppe junger Offiziere ist es gelungen, mehrere Regierungsbeamte sowie den Premierminister zu ermorden. Sie besetzten Tokio und übernahmen die Kontrolle über den Kaiserpalast. Sie verkündeten, die Regierung von „korrupten Beamten“ und „ideologischen Bedrohungen“ zu säubern und den Kaiser als alleinigen Herrscher der Nation wieder einzusetzen.\n\nIhre Aktionen fanden unerwartet große Unterstützung beim Militär, wo geplante Gegenoperationen durch Massenverhaftungen und Morde an loyalen Regierungsmitgliedern vereitelt wurden. Angesichts der plötzlichen und überwältigenden Ereignisse und der Kontrolle der Rebellen über den Palast unternahm der Kaiser keine Anstalten, die Rebellen zu verurteilen.\n\nDer organisierte Widerstand der Regierung scheint bereits zu bröckeln, und es wird erwartet, dass die Rebellen jederzeit die vollständige Kontrolle des Imperiums über alle Bereiche der Innen-, Außen- und Militärpolitik ankündigen werden."
 wtt_japan.108.a:0 "Tennōheika Banzai!"
 wtt_japan.109.t:0 "Japan schlägt Dreiparteienpakt vor"
 wtt_japan.109.desc:0 "[From.GetNameDefCap] hat unsere Fühler ausgestreckt, um unser Interesse an einem Dreimächtepakt zwischen uns, dem [JAP_initiator.GetAdjective] und den [ITA_fascism.GetAdjective]s zu ermitteln. Der [JAP_initiator.GetAdjective] argumentiert, dass es angesichts der zunehmend feindseligen globalen Meinung, die sich gegen unsere Bemühungen richtet, zwingend notwendig sei, dass wir uns gegenseitig unterstützen."
 wtt_japan.109.a:0 "Eine ausgezeichnete Idee. Wir werden den Pakt unterzeichnen."
 wtt_japan.109.b:0 "Nein, wir dürfen nicht riskieren, die Welt gegen uns aufzubringen."
 wtt_japan.110.desc:0 "[JAP_initiator.GetNameDefCap] hat unser Interesse an einem Dreimächtepakt zwischen uns, dem [JAP_initiator.GetAdjective] und den [GER_fascism.GetAdjective]s erkundet. Der [JAP_initiator.GetAdjective] argumentiert, dass unsere gegenseitige Unterstützung angesichts der zunehmend feindseligen globalen Stimmung gegen unsere Bemühungen unerlässlich sei. Die [GER_fascism.GetAdjective]s haben ihre Unterstützung für die Idee bereits zugesagt."
 wtt_japan.111.t:0 "Dreimächtepakt unterzeichnet"
 wtt_japan.111.desc:0 "Die Regierungen von [GER_fascism.GetAdjective] und [ITA_fascism.GetAdjective] haben sich bereit erklärt, den vorgeschlagenen Dreimächtepakt zu unterzeichnen und sich verpflichtet, im Kriegsfall an unserer Seite zu stehen."
 wtt_japan.112.t:0 "[From.GetNameDefCap] lehnt Dreimächtepakt ab"
 wtt_japan.112.desc:0 "Die [From.GetAdjective]-Regierung hat den vorgeschlagenen Dreimächtepakt abgelehnt und zieht es vor, allein weiterzumachen."
 wtt_japan.113.t:0 "[From.GetNameDefCap] unterzeichnet Dreimächtepakt"
 wtt_japan.113.desc:0 "Die [ITA_fascism.GetAdjective]-Regierung hat sich bereit erklärt, den vorgeschlagenen Dreimächtepakt zu unterzeichnen und sich verpflichtet, im Kriegsfall an unserer Seite zu stehen."
 wtt_japan.114.t:0 "Demokratische Elemente inszenieren einen Putsch"
 wtt_japan.114.desc:0 "Demokratische Elemente in der Regierung haben überraschend die Macht im Land übernommen, nachdem das Militär gedroht hatte, die hart erkämpften demokratischen Rechte des Volkes erneut einzuschränken. Mit überraschender Schnelligkeit griff ein erheblicher Teil des Militärs zu den Waffen, um das Volk und seine Freiheitsrechte zu verteidigen. Diese Spaltung des Militärs ermöglichte es den Volksvertretern, die Macht in Legislative und Exekutive zu übernehmen. Obwohl die Kämpfe gerade erst begonnen haben, ist es unwahrscheinlich, dass die derzeitige Regierung leicht gestürzt werden kann."
 wtt_japan.114.a:0 "Nie wieder soll das Militär über uns herrschen!"
 wtt_japan.115.t:0 "[From.GetName] greift die Sowjetunion an"
 wtt_japan.115.desc:0 "[From.GetNameDefCap] hat die Sowjetunion trotz unseres Nichtangriffspakts einseitig angegriffen. Uns bleibt keine andere Wahl, als entweder unser Bündnis zu ehren und den [From.GetAdjective]-Angriff zu unterstützen oder unseren Nichtangriffspakt mit den Sowjets zu ehren und den Angriff zu verurteilen."
 wtt_japan.115.a:0 "Wir werden uns unseren Verbündeten anschließen!"
 wtt_japan.115.b:0 "Unsere Vereinbarungen können nicht gebrochen werden ... noch nicht."
 wtt_japan.116.t:0 "[From.GetName] tritt dem Krieg bei"
 wtt_japan.116.desc:0 "[From.GetNameDefCap] hat sich trotz des früheren Nichtangriffspakts mit den Sowjets entschieden, sich unserem Krieg gegen sie anzuschließen."
 wtt_japan.116.a:0 "So wie es sein sollte."
 wtt_japan.117.t:0 "[From.GetName] verurteilt unseren Krieg"
 wtt_japan.117.desc:0 "[From.GetNameDefCap] hat beschlossen, den Nichtangriffspakt mit den Sowjets trotz ihrer Verbündeten zu ehren. Sie haben unsere Aggression verurteilt, offenbar in dem Versuch, die diplomatische Lage mit ihrem Paktpartner zu retten."
 wtt_japan.117.a:0 "Das ist höchst bedauerlich."
 wtt_japan.118.t:0 "[From.GetName] bittet um Unterstützung"
 wtt_japan.118.desc:0 "[From.GetNameDefCap] ist derzeit in einen verheerenden Bürgerkrieg verwickelt und hat Mühe, der militärischen Stärke des Feindes gewachsen zu sein. Die Übergangsregierung hat sich nun an unsere Vertreter gewandt und ihnen angeboten, die Halbinsel Süd-Sachalin gegen die dringend benötigte militärische Unterstützung einzutauschen.\n\nAuf diese Weise könnten sie im Austausch für einige Freiwilligendivisionen leicht Land erhalten."
 wtt_japan.118.a:0 "Eine hervorragende Idee!"
 wtt_japan_118_TT:0 "Diese Freiwilligen werden in den Arbeitskräftepool zurückgeführt, wenn §Y[From.GetName]§! den Bürgerkrieg gewinnt."
 wtt_japan.118.b:0 "Das ist kein guter Handel für uns."
 wtt_japan.119.t:0 "[From.GetName] akzeptiert Handel"
 wtt_japan.119.desc:0 "[From.GetNameDefCap] hat unser Angebot angenommen, die Halbinsel Süd-Sachalin gegen militärische Unterstützung einzutauschen. Sie haben einige Divisionen von „Freiwilligen“ entsandt, um uns in unserem Kampf zu unterstützen!"
 wtt_japan.119.a:0 "Sie werden sehr nützlich sein!"
 wtt_japan.119.TT:0 "Gewinnen Sie 8 Einheiten mit §Y12 Infanterie§! und §Y3 Unterstützungsbataillonen§!"
 wtt_japan.120.t:0 "[From.GetName] lehnt Handel ab"
 wtt_japan.120.desc:0 "[From.GetNameDefCap] hat uns informiert, dass sie unser Angebot, die Halbinsel Süd-Sachalin gegen militärische Unterstützung einzutauschen, abgelehnt haben."
 wtt_japan.120.a:0 "Wir sind auf uns allein gestellt..."
 wtt_japan.121.t:0 "[From.GetName] erobert Tokio"
 wtt_japan.121.desc:0 "[From.GetNameDefCap] hat die japanische Hauptstadt eingenommen und die faschistische [From.From.GetAdjective]-Regierung ist gestürzt. Wenn wir handeln wollen, müssen wir sofort handeln. Um die kommunistische Bedrohung einzudämmen, ist es unerlässlich, dass wir schnell handeln, die Kontrolle über die entlegenen japanischen Inseln sichern und das Kommando über die verbleibenden faschistischen Elemente übernehmen."
 wtt_japan.121.a:0 "Setzen Sie diesen Plan um."
 wtt_japan.121.b:0 "Dies interessiert uns derzeit nicht."
 wtt_japan.122.t:0 "Faschisten fliehen in die Mandschurei"
 wtt_japan.122.desc:0 "Mit der Einnahme Tokios ist die faschistische Regierung gestürzt und ihre verbliebenen Anhänger und Militäreinheiten sind nach [MAN.GetName] geflohen, das die Kontrolle über die vorgelagerten Inseln und koreanischen und chinesischen Besitzungen übernommen hat.\n\nDer Bürgerkrieg ist praktisch vorbei, aber der Waffenstillstand ist bestenfalls brüchig, da die Faschisten nicht entscheidend besiegt wurden."
 wtt_japan.122.a:0 "Wir werden uns später damit befassen."
 wtt_japan.123.t:0 "Der faschistische Widerstand bricht zusammen"
 wtt_japan.123.desc:0 "Mit der Einnahme Tokios ist die faschistische Regierung völlig zusammengebrochen. Ihre verbliebenen Anhänger und Militäreinheiten haben keine Stütze mehr und beginnen sich zu zerstreuen, was die Eroberung der übrigen und abgelegenen Gebiete erleichtert."
 wtt_japan.123.a:0 "Der Krieg ist gewonnen."
 wtt_japan.124.t:0 "Freiwillige kehren nach Hause zurück"
 wtt_japan.124.desc:0 "Mit dem Sieg der Kommunisten in Japan sind unsere überlebenden Freiwilligen nun nach Hause zurückgekehrt."
 wtt_japan.125.t:0 "Sowjets geben die Mandschurei zurück"
 wtt_japan.125.desc:0 "Nachdem [From.GetNameDef] die Mandschurei von den Japanern befreit und den abgesetzten Qing-Kaiser losgeworden ist, bietet er uns nun die Rückgabe der Mandschurei an und behauptet, sie solle in die rechtmäßigen [Root.GetAdjective] Hände zurückkehren."
 wtt_japan.126.t:0 "[From.GetName] bietet Frieden"
 wtt_japan.126.desc:1 "[From.GetAdjective] Beamte sind mit einem Friedensangebot an uns herangetreten. Sie werden den Kontinent vollständig verlassen, im Gegenzug für eine sofortige Einstellung der Feindseligkeiten."
 wtt_japan.126.a:0 "Der Krieg ist gewonnen."
 wtt_japan.126.b:0 "Wir werden nur mit einem totalen Sieg zufrieden sein!"
 wtt_japan.127.t:0 "[From.GetName] akzeptiert Frieden"
 wtt_japan.127.desc:0 "[From.GetNameDef] hat unser Friedensangebot angenommen und im Gegenzug für unsere kontinentalen Besitztümer die Feindseligkeiten eingestellt."
 wtt_japan.127.a:0 "Sie haben uns besiegt ... vorerst."
 wtt_japan.128.t:0 "[From.GetName] lehnt Frieden ab"
 wtt_japan.128.desc:0 "[From.GetNameDef] hat unser Friedensangebot abgelehnt und geschworen, den Krieg so lange fortzusetzen, bis eine bedingungslose Kapitulation erreicht wird."
 wtt_japan.128.a:0 "Dann werden wir bis zum Letzten kämpfen!"
 wtt_japan.40.t:0 "[From.GetLeader] Forderungen der Mandschurei"
 wtt_japan.40.desc:0 "Vor einigen Tagen begann die Regierung von [From.GetNameDef], gezielt Druck auf uns auszuüben. Leitartikel in Zeitungen forderten die Rückgabe der Mandschurei an [From.GetAdjective]. Dabei handelt es sich nicht nur um eine Propagandaaktion für den internen Gebrauch, sondern Vertreter von [From.GetLeader] haben uns über inoffizielle diplomatische Kanäle kontaktiert, um eine Einigung über die Zukunft der mandschurischen Gebiete zu erzielen.\n\nHeute hat sich [From.GetLeader] selbst zu Wort gemeldet und die baldige Rückgabe der Mandschurei an [From.GetNameDef] gefordert. Andernfalls müsste seine Regierung unsere derzeitige Zusammenarbeit überdenken."
 wtt_japan.40.a:0 "Es gehört ihnen."
 wtt_japan.40.b:0 "Sie sind noch nicht bereit, sich selbst zu regieren."
 wtt_japan.41.t:0 "Militärhilfe von [From.GetNameDef]"
 wtt_japan.41.desc:0 "Das Kaiserlich Japanische Hauptquartier hat eine grundlegende Änderung seiner strategischen Ausrichtung beschlossen. In einer Konferenz mit dem Kaiser stellte der Armeeminister einen neuen Plan vor, der davon ausgeht, dass in naher Zukunft ein Krieg mit der Sowjetunion ausbrechen wird. Zur Vorbereitung auf diesen Krieg hat die Kaiserlich Japanische Armee beschlossen, dass unsere Streitkräfte in der Lage sein müssen, Teile der Front zu verteidigen. Zu diesem Zweck wurde eine große Menge kaum veralteter Ausrüstung bereitgestellt."
 wtt_japan.41.a:0 "Wie nett von ihnen."
 wtt_news.25.t:0 "[JAP.GetNameDefCap] übernimmt die Kontrolle über [From.GetAdjective]-Kolonien"
 wtt_news.25.desc:0 "Angesichts der aktuellen Schwäche von [From.GetNameDef] ist es vielleicht keine Überraschung, dass [JAP.GetAdjective] den Druck auf die Kontrolle über die [From.GetAdjective] ostasiatischen Besitztümer erhöht haben. Heute Morgen gaben Regierungsvertreter jedoch überraschend bekannt, dass die Kontrolle über die [From.GetAdjective] Kolonien mit sofortiger Wirkung an [JAP.GetNameDef] übertragen werde."
 wtt_news.25.a:0 "Asien den Asiaten!"
 wtt_news.25.b:0 "Ein trauriger Tag für Europa..."
 wtt_news.25.c:0 "Ist es das Ende des Kolonialismus?"
 wtt_news.26.t:0 "Unabhängigkeit der Philippinen"
 wtt_news.26.desc:0 "Aufgrund des Drucks von [JAP.GetAdjective] hat die [From.GetAdjective]-Regierung nun die sofortige Beendigung der [From.GetAdjective]-Kolonialherrschaft über den Archipel angekündigt. Ab heute wurde [PHI.GetNameDef] die volle Souveränität gewährt."
 wtt_news.26.b:0 "Wir wollten sowieso dekolonisieren."
 wtt_news.26.c:0 "Ein freudiger Tag!"
 wtt_news.27.t:0 "Putsch eines jungen japanischen Offiziers"
 wtt_news.27.desc:0 "Einer Gruppe junger Offiziere ist es gelungen, die Regierung zu stürzen und den Kaiser als obersten Herrscher Japans wieder einzusetzen. Offenbar war dies eine Reaktion auf die Bedrohung durch weit verbreitete Korruption in der Regierung und Anhänger feindlicher Ideologien. Die Offiziere, die das Land bereits immer häufiger mit imperialen Begriffen bezeichnen, kündigten an, die Säuberungen fortzusetzen, bis „alle unappetitlichen Elemente aus Militär und Regierung entfernt“ seien. Kaiser Hirohito selbst veröffentlichte eine kurze Erklärung, in der er die ihm von den Rebellen angebotene Führung übernahm und klare Annäherungsversuche mit China und den westlichen Kolonialmächten im Pazifik unternahm."
 wtt_news.27.a:0 "Banzai!"
 wtt_news.27.b:0 "Beunruhigende Neuigkeiten ... Sie haben uns gegenüber keine derartigen Annäherungsversuche unternommen ..."
 wtt_news.27.c:0 "Ist dies eine Garantie für den Frieden im Pazifik?"
 wtt_news.27.d:0 "Eine plötzliche Wendung der Ereignisse.&quot;"
 wtt_news.30.t:0 "Chiang Kai-Shek hingerichtet"
 wtt_news.30.desc:0 "Nach seiner Verhaftung durch [CHI_xian_instigator.GetLeader] wurde Chiang Kai-Shek heute Morgen Berichten zufolge von einem kommunistischen Erschießungskommando hingerichtet. Nach einem Schnellprozess wegen Verbrechen gegen Volk und Partei verkündete [PRC.GetLeader] das Todesurteil gegen Chiang Kai-Shek. Selbst ein direktes Eingreifen eines Vertreters der Sowjetregierung konnte sein Leben nicht retten.\n\n[SOV.GetLeader] ist Berichten zufolge wütend über den „Verrat“ von [PRC.GetLeader] und hat die Verhaftung der chinesischen Komintern-Delegation angeordnet.\n\nDer neue nationalistische Führer [CHI.GetLeader] hat geschworen, Chiangs Tod zu rächen und die Kommunisten „auszurotten“."
 wtt_news.30.a:0 "Er hat bekommen, was er verdient hat."
 wtt_news.30.b:0 "Sie haben einen Mord begangen und es Gerechtigkeit genannt!"
 wtt_news.30.c:0 "Dies wird Konsequenzen haben."
 wtt_news.30.d:0 "China wird die Lage noch weiter destabilisieren."
 wtt_news.31.t:0 "Chiang Kai-Shek hingerichtet"
 wtt_news.31.desc:0 "Nach seiner Verhaftung durch [CHI_xian_instigator.GetLeader] wurde Chiang Kai-Shek heute Morgen Berichten zufolge von einem kommunistischen Erschießungskommando hingerichtet. Nach einem Schnellprozess wegen Verbrechen gegen das Volk und die Partei, Hochverrat und konterrevolutionärer Aktivitäten verkündete [PRC.GetLeader] das Todesurteil gegen Chiang Kai-Shek. Der sowjetische Repräsentant fungierte als Ankläger im Prozess, was Spekulationen nährte, dass [SOV.GetLeader] die Entscheidung heimlich genehmigte. \nDer neue nationalistische Führer [CHI.GetLeader] schwor, Chiangs Tod zu rächen und die Kommunisten „auszurotten“."
 wtt_news.31.c:0 "Wir haben die richtige Entscheidung getroffen."
 wtt_news.32.t:0 "Chiang Kai-Shek aus dem Hausarrest entlassen"
 wtt_news.32.desc:0 "Nachdem [CHI_xian_instigator.GetLeader] ihn verhaftet und den Kommunisten übergeben hatte, ist [CHI.GetLeader] nach umfangreichen Verhandlungen Berichten zufolge in seine Heimat zurückgekehrt. Die Berichte sind noch vage, doch es gibt Hinweise darauf, dass [PRC.GetLeader] ein Bündnis gegen die Japaner angeboten hat. Beide Seiten dementierten derartige Gerüchte. [PRC.GetLeader] erklärte, er würde das Land lieber niederbrennen sehen, als gemeinsame Sache mit den Nationalisten zu machen – eine Haltung, die [CHI.GetLeader] schnell wieder aufgriff."
 wtt_news.32.a:0 "Welche Pläne haben sie mit uns?"
 wtt_news.32.c:0 "Wie streitende Kinder ..."
 wtt_news.32.d:0 "Japan wird dies zu seinem Vorteil nutzen."
 wtt_news.32.e:0 "Wir könnten dies zu unserem Vorteil nutzen."
 wtt_news.33.t:0 "[PRC.GetLeader] verurteilt nationalistischen Verrat"
 wtt_news.33.desc:0 "Nach einem Treffen zwischen [CHI.GetLeader] und [PRC.GetLeader] verurteilte dieser den seiner Meinung nach „eklatanten und durchsichtigen Versuch, die Rote Armee für nationalistische und konterrevolutionäre Zwecke zu missbrauchen“. [CHI.GetLeader] weigerte sich, sich zu dem Thema zu äußern und erklärte lediglich, die nationalistischen Armeen stünden bereit, China gegen jeden Angreifer zu verteidigen. \n\nBerichten zufolge diskutierten die beiden Staatschefs die Möglichkeit einer Einheitsfront gegen Japan.\n\nOb dieser Zusammenbruch zu einem erneuten Konflikt zwischen den beiden Parteien führt, bleibt abzuwarten."
 wtt_news.33.b:0 "Warum haben wir jemals gedacht, dass sie sich ändern würden?"
 wtt_news.34.t:0 "Flying Tigers gegründet"
 wtt_news.34.desc:0 "Nach einem chinesischen Aufruf an amerikanische Piloten und Mechaniker, sich einer Freiwilligentruppe anzuschließen, hat US-Präsident [USA.GetLeader] die Übergabe von über hundert modernen Kampfflugzeugen an die chinesische Luftwaffe offiziell genehmigt. Piloten der US Army, Navy und des Marine Corps erhalten ebenfalls die Erlaubnis, sich dieser Einheit anzuschließen. Die ersten Schiffe mit den neuen Kampfflugzeugen sollen ablegen, sobald die notwendige Ausrüstung montiert ist. Kongressabgeordnete äußerten Bedenken, dass ein solches Umgehen des Völkerrechts Konsequenzen nach sich ziehen könnte."
 wtt_news.34.a:0 "Waidmanns Heil!"
 wtt_news.34.b:0 "Sie sind herzlich willkommen."
 wtt_news.34.c:0 "Freiwillige? Eher Söldner!"
 wtt_news.34.d:0 "Das Ende der US-Isolation?"
 wtt_news.35.t:0 "Der Shanghai-Vorfall"
 wtt_news.35.desc:1 "Die Spannungen zwischen China und Japan haben sich nach einem Zusammenstoß in Shanghai gestern Abend deutlich verschärft. \n\nBerichten westlicher Beobachter zufolge kam es zu einer Schlägerei zwischen der chinesischen Polizei und einer Gruppe japanischer Matrosen, bei der es auf beiden Seiten zu Verletzungen kam. Als eine japanische Patrouille zur Untersuchung des Vorfalls eintraf, hatten chinesische Armeeeinheiten bereits den gesamten Zugang zum Gelände gesperrt und die japanischen Matrosen festgenommen. Gegen sie wird Anklage wegen versuchten Mordes erhoben. \n\nDie japanische Regierung hat eindringlich gewarnt, dass Maßnahmen zu ihrer Freilassung ergriffen würden, falls die Matrosen nicht sofort freigelassen würden."
 wtt_news.35.a:0 "Empörend!"
 wtt_news.35.b:0 "Alles nach Plan."
 wtt_news.35.c:0 "Krieg liegt in der Luft."
 wtt_news.35.d:0 "Dies scheint vorsätzlich zu sein."
 wtt_news.36.t:0 "Chiang Kai-Shek bei Flugzeugabsturz gestorben"
 wtt_news.36.desc:0 "[CHI.GetNameDef] ereignete sich heute eine Tragödie, als ein Flugzeug mit Chiang Kai-Shek an Bord nur wenige Augenblicke nach dem Start in der Luft explodierte. Rettungsmannschaften durchsuchen noch immer das Wrack, doch nur wenige hoffen, Überlebende unter Besatzung und Passagieren zu finden.\n\nSowohl der Generalissimus als auch seine Frau gelten als tot.\n\nDer neue chinesische Staatschef [CHI.GetLeader] hat eine umfassende Untersuchung der Ursachen der Katastrophe versprochen. Es gibt Gerüchte über ein Komplott zur Ermordung des Generalissimus, das von vielen als Hindernis für die Vereinigung der verschiedenen Fraktionen in China angesehen wird."
 wtt_news.36.a:0 "Ein Problem weniger, über das Sie sich Sorgen machen müssen."
 wtt_news.36.b:0 "Das war kein Zufall."
 wtt_news.36.d:0 "Tragisch."
 wtt_news.37.t:0 "Die Volksrepublik China erklärte"
 wtt_news.37.desc:0 "In einer triumphalen Rede verkündete [PRC.GetLeader], dass „das chinesische Volk aufgestanden“ sei und den Kommunisten im chinesischen Bürgerkrieg zum Sieg verholfen habe. Mit dem Rückzug der Nationalisten hat die Kommunistische Partei nach Jahrzehnten des Konflikts endlich den Sieg errungen. Aus einer kleinen Rebellengruppe, die sich in abgelegenen Bergdörfern versteckte, wird künftig eine vollwertige Regierung in der Volksrepublik China."
 wtt_news.37.a:0 "Ein toller Tag."
 wtt_news.37.b:0 "Eine reine Formalität."
 wtt_news.37.d:0 "Aus ihnen wird nie etwas werden."
 wtt_news.38.t:0 "[PRC.GetLeader] gewinnt internen Machtkampf"
 wtt_news.38.desc:0 "Die Kämpfe zwischen den Fraktionen innerhalb der Kommunistischen Partei Chinas scheinen sich gelegt zu haben, und [PRC.GetLeader] hat sich als oberster Führer etabliert. Mao Tse-tung und die gemäßigteren Fraktionen haben erheblich an Einfluss verloren, da es dem von der Sowjetunion unterstützten [PRC.GetLeader] gelungen ist, sie beide auszumanövrieren. Welche Rolle [SOV.GetLeader] in dieser Episode spielte, ist Gegenstand vieler Spekulationen."
 wtt_news.38.a:0 "Möge er uns zum Sieg führen!"
 wtt_news.38.b:0 "Unbedeutend."
 wtt_news.38.c:0 "Ein nützlicher Verbündeter."
 wtt_news.38.d:0 "Er erbt eine schwierige Position."
 wtt_news.39.t:0 "Die China-Befriedungskampagne"
 wtt_news.39.desc:0 "Nach einer Reihe von Vorfällen, die als „eklatante Provokationen“ bezeichnet wurden, hat die japanische Regierung einen „bewaffneten Konflikt“ in China ausgerufen. Sie behauptet, die Zentralregierung von [CHI.GetLeader] sei unwillig oder unfähig, die Verantwortlichen strafrechtlich zu verfolgen. Sie kündigte daher die Entsendung einer „Friedenstruppe“ japanischer Soldaten in das Land an, um die Ordnung wiederherzustellen und weitere Angriffe zu verhindern."
 wtt_news.39.a:0 "Planmäßig."
 wtt_news.39.b:0 "Wer hat das getan?"
 wtt_news.39.c:0 "Was haben wir getan!?"
 wtt_news.39.d:0 "Eine durchsichtige Ausrede."
 wtt_news.39.e:0 "Sie werden erkennen, dass sie Fehler gemacht haben."
 wtt_warlord.1.t:0 "[From.GetNameDefCap] Bietet Unterwerfung an"
 wtt_warlord.1.desc:0 "Da die chinesische Zentralregierung völlig unfähig ist, die Sicherheit ihrer Bevölkerung vor Banditen und Kommunisten zu gewährleisten, hat [From.GetLeader] endlich seine Lage verstanden und sich an uns gewandt, um seine Position zu sichern. Er würde uneingeschränkt mit uns kooperieren und unseren Truppen freies Durchkommen gewähren. Im Gegenzug verlangt er lediglich, dass wir einige Truppen zum Schutz seines Territoriums stationieren und uns an seinen Beitrag erinnern, wenn wir mit der Neuordnung Chinas fertig sind."
 wtt_warlord.1.a:0 "Endlich mal jemand Vernünftiges!"
 wtt_warlord.1.b:0 "In unseren Plänen ist für sie kein Platz."
 wtt_warlord.2.t:0 "[From.GetNameDefCap] Akzeptiert"
 wtt_warlord.2.desc:0 "Die [From.GetAdjective]-Regierung hat unseren Vorschlag angenommen. Im Gegenzug für ihren Schutz müssen wir die Verhaltensempfehlungen „sorgfältig berücksichtigen“. Ein [From.GetAdjective]-Regierungsbeamter ist eingetroffen, um unsere Maßnahmen zu koordinieren."
 wtt_warlord.2.a:0 "Ein kleiner Preis für unser Überleben."
 wtt_warlord.3.t:0 "[From.GetNameDefCap] lehnt ab"
 wtt_warlord.3.desc:0 "Die [From.GetAdjective]-Regierung hat auf unsere Mitteilung mit der klaren Ablehnung reagiert, darüber zu diskutieren, und erklärt, dass uns die Autorität fehle, mit einer ordentlichen nationalen Regierung zu verhandeln."
 wtt_warlord.3.a:0 "Wir werden stark werden und es ihnen zeigen."
 wtt_britain_lease_azores.1.t:0 "[From.GetNameDefCap] Fordert Pacht der Azoren an"
 wtt_britain_lease_azores.1.desc:0 "Die [From.GetAdjective] haben sich mit der Bitte an uns gewandt, die Azoren für die Dauer des Krieges zu pachten. Aufgrund ihrer strategischen Lage sind die Inseln ein wichtiger Stützpunkt für die Überwachung der Seewege über den Atlantik. Nach Beendigung der Feindseligkeiten sollen die Inseln zurückgegeben werden."
 wtt_britain_lease_azores.1.a:0 "Besser, als uns in den Krieg zu ziehen ..."
 wtt_britain_lease_azores.1.b:0 "Worin liegt der Nutzen für uns?"
 wtt_britain_lease_azores.2.t:0 "[From.GetNameDefCap] Akzeptiert"
 wtt_britain_lease_azores.2.desc:0 "Die [From.GetAdjective]-Regierung hat unserem Antrag stattgegeben und uns die volle Kontrolle über die Azoren übertragen, mit der Maßgabe, dass wir nun für die Verteidigung gegen Angriffe verantwortlich sind. Eine kleine Vorhut ist bereits auf den Inseln eingetroffen, um eine Operationsbasis einzurichten."
 wtt_britain_lease_azores.2.a:0 "Dies wird sich als nützlich erweisen."
 wtt_britain_lease_azores.3.t:0 "[From.GetNameDefCap] lehnt ab"
 wtt_britain_lease_azores.3.desc:0 "Unter Berufung auf ihre erklärte Neutralität und das Kriegsrecht hat die Regierung von [From.GetLeader] unseren Antrag auf Stationierungsrechte auf den Azoren abgelehnt. Sofern wir keinen Weg finden, sie auf unsere Seite zu ziehen, bleiben uns die Inseln verwehrt."
 wtt_britain_lease_azores.3.a:0 "Wir werden uns daran erinnern."
 wtt_britain_lease_azores.4.t:0 "Azoren-Pachtvertrag abgeschlossen"
 wtt_britain_lease_azores.4.desc:0 "Nach dem Ende der Feindseligkeiten in Europa hat uns die [POR.GetAdjective]-Regierung daran erinnert, dass die Pacht der Azoren nur für die Dauer des Krieges gewährt wurde. Es ist an der Zeit, ihr die Kontrolle über die Inseln zurückzugeben."
 wtt_britain_lease_azores.4.a:0 "Die Briten zahlen immer ihre Schulden."
 wtt_britain_lease_azores.5.t:0 "Großbritannien verlässt die Azoren"
 wtt_britain_lease_azores.5.desc:0 "Da der Krieg in Europa beendet ist, hat [From.GetNameDef] unsere Vereinbarung eingehalten und uns die Azoren zurückgegeben. Wir haben bereits eine Gruppe von Administratoren entsandt, um die Kontrolle zurückzugewinnen."
 wtt_britain_lease_azores.5.a:0 "Das bestmögliche Ergebnis."
 wtt_soviet_hold_city_t_success:0 "[state.GetName] steht"
 wtt_soviet_hold_city_d_success:0 "Trotz des feindlichen Ansturms hielten die Verteidiger von [state.GetName] stand und hielten den Feind in Schach. Die Angreifer bluteten an den Verteidigungsanlagen und zahlten für jeden eroberten Zentimeter einen hohen Preis. Die Geschichten der Helden von [state.GetName] werden noch Generationen in Erinnerung bleiben!"
 wtt_soviet_hold_city_o_success:0 "[state.GetName] bleibt unser!"
 wtt_soviet_hold_city_t_fail:0 "[state.GetName] Falls"
 wtt_soviet_hold_city_d_fail:0 "Die [controller.GetAdjective]-Invasoren mobilisierten alle verfügbaren Kräfte und durchbrachen unsere Verteidigung außerhalb von [state.GetName]. [controller.GetAdjective]-Truppen sind in die Stadt eingedrungen. Während unsere Verteidiger den Feind in erbitterte Straßenschlachten verwickeln, wird die Stadt voraussichtlich innerhalb weniger Tage fallen."
 decisions.1.t:0 "Loyalität gegenüber dem Unteren Heereskommando"
 decisions.1.desc:0 "Einige Offiziere in den unteren Rängen des Militärs haben „alternative“ Ansichten über die Führung des Landes geäußert. Um Misstrauen zu vermeiden, sollten wir unsere Bemühungen darauf beschränken, nur einen potenziellen Unterstützer anzusprechen und keine Ressourcen scheuen, um seine Loyalität zu erkaufen."
 decisions.1.a:0 "Jeder ist geeignet, wir brauchen nur jemanden, der unsere Armeen anführt."
 decisions.1.b:0 "Wir brauchen jemanden, der zumindest weiß, was er tut."
 decisions.1.c:0 "Qualität steht an erster Stelle, wir sollten bei den Kosten keine Kompromisse eingehen."
 decisions.1.d:0 "Nur das Allerbeste ist gut genug."
 decisions.2.t:0 "Loyalität des Oberkommandos der Armee"
 decisions.2.desc:0 "Einige Offiziere in den oberen Rängen des Militärs haben „alternative“ Ansichten über die Führung des Landes geäußert. Um Misstrauen zu vermeiden, sollten wir unsere Bemühungen darauf beschränken, nur einen potenziellen Unterstützer anzusprechen und keine Ressourcen scheuen, um seine Loyalität zu erkaufen."
 wtt_soviet_hold_city_o_fail:0 "Ein kleiner Rückschlag."
 wtt_news.40.t:0 "Suezkanal gesprengt"
 wtt_news.40.desc_eng:0 "Als Reaktion auf feindliche Truppen, die sich dem Suezkanal nähern und riskieren, diese wichtige Handelsroute an den Feind zu verlieren, hat [From.GetNameDef] beschlossen, den Kanal zu sprengen, um sicherzustellen, dass er ihnen nicht mehr zur Verfügung steht. Durch eine Kombination aus Blockaden, Sprengungen und Verminung ist die Zerstörung nahezu vollständig, und die Reparatur wird voraussichtlich Monate intensiver industrieller Anstrengungen erfordern."
 wtt_news.40.desc_not_eng:0 "In einer mutigen und brillanten Militäroperation ist es [From.GetNameDef] gelungen, die lebenswichtige Handelsader des Suezkanals zu durchtrennen. Durch eine Kombination aus Blockaden, Sprengungen und Verminung ist die Zerstörung nahezu vollständig, und die Reparatur wird voraussichtlich Monate intensiver industrieller Anstrengungen erfordern."
 wtt_news.40.a:0 "Eine Katastrophe!"
 wtt_news.40.b:0 "Wir konnten nicht zulassen, dass der Feind es benutzte."
 wtt_news.40.c:0 "Wir werden ihre Entschlossenheit nicht noch einmal unterschätzen."
 wtt_news.40.d:0 "Wir haben die Verbindung zu ihrem Imperium gekappt!"
 wtt_news.40.e:0 "Ein großartiger Schlag gegen die Briten!"
 wtt_news.40.f:0 "Sie haben die richtige Entscheidung getroffen."
 wtt_news.40.g:0 "Ein schwerer Schlag gegen unseren Verbündeten ..."
 wtt_news.40.h:0 "Dies wird Auswirkungen auf die ganze Welt haben ..."
 wtt_news.41.t:0 "Panamakanal gesprengt"
 wtt_news.41.desc_usa:0 "Da [From.GetNameDef] den Panamakanal nicht verteidigen konnte und riskierte, diese wichtige militärische Kommunikationsverbindung an den Feind zu verlieren, entschied sich [From.GetNameDef] stattdessen für die Sprengung des Kanals, um dessen Nutzung zu verhindern. Durch eine Kombination aus Blockaden, Sprengungen und Verminung ist die Zerstörung nahezu vollständig, und die Reparatur wird voraussichtlich Monate intensiver industrieller Anstrengungen erfordern."
 wtt_news.41.desc_not_usa:0 "In einer mutigen und brillanten Militäroperation ist es [From.GetNameDef] gelungen, die lebenswichtige militärische Kommunikationsader, den Panamakanal, zu durchtrennen. Durch eine Kombination aus Blockaden, Sprengungen und Verminung ist die Zerstörung nahezu vollständig, und die Reparatur wird voraussichtlich Monate intensiver industrieller Anstrengungen erfordern."
 wtt_news.41.a:0 "Eine Katastrophe!"
 wtt_news.41.b:0 "Wir konnten nicht zulassen, dass der Feind es benutzte."
 wtt_news.41.c:0 "Wir werden ihre Entschlossenheit nicht noch einmal unterschätzen."
 wtt_news.41.d:0 "Ihre Marine ist auf der anderen Seite abgeschnitten!"
 wtt_news.41.e:0 "Ein grandioser Schlag gegen die Amerikaner!"
 wtt_news.41.f:0 "Sie haben die richtige Entscheidung getroffen."
 wtt_news.41.g:0 "Ein schwerer Schlag gegen unseren Verbündeten ..."
 wtt_news.41.h:0 "Pazifik und Atlantik sind erneut geteilt."
 wtt_news.42.t:0 "Suezkanal repariert"
 wtt_news.42.desc:0 "Mit enormen industriellen Anstrengungen ist es [From.GetNameDef] gelungen, den Suezkanal zu reparieren. Heute Morgen wurde die wichtige Handelsroute zum Mittelmeer nach über einem halben Jahr intensiver Reparaturarbeiten wieder geöffnet."
 wtt_news.42.a:0 "Wir haben die Verbindung zu unserem Imperium wiederhergestellt."
 wtt_news.42.b:0 "Eine notwendige Investition für unsere Nation."
 wtt_news.42.c:0 "Dies wird unsere Bemühungen erheblich unterstützen."
 wtt_news.42.d:0 "Sie haben den Rückschlag wiedergutgemacht …"
 wtt_news.42.e:0 "Die Auswirkungen werden für alle spürbar sein."
 wtt_news.43.t:0 "Panamakanal repariert"
 wtt_news.43.desc:0 "Mit enormen industriellen Anstrengungen ist es [From.GetNameDef] gelungen, den Panamakanal zu reparieren. Heute Morgen wurde die wichtige militärische Verbindung zwischen Atlantik und Pazifik nach über einem Jahr intensiver Reparaturarbeiten wiedereröffnet."
 wtt_news.43.a:0 "Wir haben die lebenswichtige Verbindung zwischen unseren Ozeanen wiederhergestellt."
 wtt_news.43.b:0 "Möglicherweise bewegen wir uns erneut vom Pazifik in den Atlantik."
 wtt_news.43.c:0 "Dies wird unsere Bemühungen erheblich unterstützen."
 wtt_news.43.d:0 "Sie haben den Rückschlag wiedergutgemacht …"
 wtt_news.43.e:0 "Die Auswirkungen werden für alle spürbar sein."
 wtt_news.44.t:0 "[MAN.GetLeader] beansprucht das Mandat des Himmels"
 wtt_news.44.desc:0 "In reich verzierten Gewändern, wie es sich für einen Kaiser von China gehört, hat [MAN.GetLeader], Sohn des Himmels, Herr der Zehntausend Jahre, Kaiser der großen Qing-Dynastie, in einer ungewöhnlichen zweiten Krönungszeremonie den Drachenthron bestiegen und residiert nun wie seine Vorfahren in der Verbotenen Stadt. Unter Berufung auf alte Bräuche behauptet [MAN.GetLeader], der Sieg seiner Truppen im chinesischen Bürgerkrieg beweise, dass er ein Mandat des Himmels habe, China zu führen.\n\nOb er beabsichtigt, seine Herrschaft auszudehnen, bis sie „alles unter dem Himmel“ umfasst, wie frühere Kaiser behaupteten, bleibt abzuwarten."
 wtt_news.44.a:0 "Der Sohn des Himmels kehrt zurück."
 wtt_news.44.b:0 "Ein Fehler, der wiedergutgemacht wird."
 wtt_news.44.c:0 "Was glaubt er, wer er ist?"
 wtt_news.44.d:0 "Was für ein Comeback."
 wtt_news.44.e:0 "Absurd!"
 wtt_news.45.t:0 "[new_leader.GetLeader] übernimmt die nationale Führung in China"
 wtt_news.45.desc:1 "Nach einem langen Machtkampf zwischen [old_leader.GetLeader] und [new_leader.GetLeader] hat ersterer schließlich seine Niederlage eingestanden und sich mit [new_leader.GetLeader] in dessen Residenz getroffen. Nach nur zweistündigen Verhandlungen hat [old_leader.GetLeader] offenbar den Vorschlag angenommen, die Macht an [new_leader.GetLeader] zu übertragen und als Premierminister der Republik zurückzutreten. \n\nZuvor hatten sich Gruppen von Anhängern der beiden Politiker vor dem Haus versammelt, was je nach Ausgang der Verhandlungen Befürchtungen gewaltsamer Zusammenstöße zwischen den beiden Seiten auslöste.\n\nEs wurden jedoch keine Gewaltausbrüche gemeldet, und der Machtwechsel verlief offenbar relativ reibungslos."
 wtt_news.45.a:0 "Politik. Politik ändert sich nie."
 wtt_news.45.b:0 "Ein überwältigender Erfolg."
 wtt_news.45.c:0 "Der Gewalt vorzuziehen."
 wtt_news.45.d:0 "Möglicherweise haben sie gerade einen Bürgerkrieg abgewendet."
 wtt_news.46.t:0 "[From.GetLeader] verkündet die Ein-China-Politik"
 wtt_news.46.desc:0 "Vor einer Gruppe von Anhängern verkündete [From.GetLeader] heute einen grundlegenden Wandel in seiner Regierung. Zuvor hatte [From.GetLeader] die weitgehende Unabhängigkeit einiger Teile Chinas toleriert. Dies ist nun vorbei. Von heute an betrachtet [From.GetNameDef] als alleinige Regierung Chinas ganz China als seine Verantwortung. Jeder, der sich den Befehlen der einzig legitimen chinesischen Regierung widersetzt, wird als Rebell oder Verräter betrachtet und entsprechend behandelt. \n\nEs bleibt jedoch abzuwarten, ob die Regierung von [From.GetLeader] ihre Drohung wahr machen kann oder ob es sich nur um einen bloßen Propaganda-Schachzug zur Stärkung der Unterstützung der Bevölkerung handelt."
 wtt_news.46.a:0 "Eine direkte Bedrohung."
 wtt_news.46.b:0 "Wir werden ganz China vereinen!"
 wtt_news.46.d:0 "Bessere Männer haben versagt."
 wtt_news.47.t:0 "[From.GetNameDefCap] beansprucht Indochina"
 wtt_news.47.desc:0 "Die Regierung von [From.GetLeader] hat erklärt, dass die aktuelle Situation in Indochina eine klare und gegenwärtige Gefahr für die [From.GetAdjective] Sicherheit darstellt. Keine Regierung der Welt, so die offizielle Erklärung, würde einen Dolchstoß hinnehmen, der auf diese Weise direkt auf ihre empfindliche Unterlage gerichtet ist. Solange die Region nicht befriedet wird oder die [671.Controller.GetAdjective] Behörden nicht durch Gouverneure ersetzt werden, die bereitwilliger mit [From.GetNameDef] zusammenarbeiten, wird die Bedrohung der [From.GetAdjective] Interessen bestehen bleiben.\n\nEin Sprecher von [From.GetLeader] betonte zwar, dass die [From.GetAdjective] Regierung eine friedliche Lösung anstreben werde, eine militärische Option sei jedoch nicht ausgeschlossen."
 wtt_news.47.a:0 "Jemand musste es tun."
 wtt_news.47.b:0 "Komm und hol sie dir!"
 wtt_news.47.c:0 "Daraus wird sicherlich nichts Schlimmes entstehen."
 wtt_news.47.d:0 "Zwingen Sie uns nicht, dorthin zu kommen!"
 wtt_news.48.t:0 "Der Mandschurische Unabhängigkeitskrieg"
 wtt_news.48.desc:0 "Nach einer Zeit interner Machtkämpfe zwischen den japanischen Verwaltern und der Regierung von [MAN.GetLeader] hat der Kampf um die Vorherrschaft in der Mandschurei nun endlich einen Siedepunkt erreicht. \n\nBerichten zufolge wurde die Konfrontation durch einen Vorfall im Kaiserhaus ausgelöst, bei dem ein japanischer General den Kaiser von Mandschukuo beleidigt haben soll, indem er von ihm eine Verbeugung verlangte.\n\nEmpört antwortete [MAN.GetLeader], dass „der Sohn des Himmels sich nicht verbeugt“, und schlug den General mit seinem Stock, bevor er seinem Militär befahl, alle japanischen Soldaten unverzüglich von chinesischem Boden zu entfernen."
 wtt_news.48.a:0 "Der Welpe brüllt?"
 wtt_news.48.b:0 "Wir werden unser Schicksal in die Tat umsetzen!"
 wtt_news.48.c:0 "Dieser kleine Verräter!"
 wtt_news.48.d:0 "Der Drache schlägt die ... Sonne?"
 wtt_news.50.t:0 "Hitler ermordet"
 wtt_news.50.desc:0 "Der deutsche Rundfunk meldete heute einen Putschversuch verräterischer Militärs. Nach einer Explosion im Führerhauptquartier, bei der Hitler getötet und mehrere weitere verletzt wurden, griffen Armeeeinheiten mehrere SS-Büros und -Einheiten an. \n\nObwohl [GER.GetLeader] behauptet, er habe die volle Kontrolle über das Land und sein Militär, gehen weiterhin Berichte über Feuergefechte zwischen Loyalisten und Rebellen im ganzen Land ein.\n\nGerüchten zufolge planen auch andere führende Mitglieder der NSDAP im Chaos ihren eigenen Machtkampf."
 wtt_news.50.a:0 "Abscheulicher Verrat!"
 wtt_news.50.b:0 "Die Situation hat sich nicht verbessert."
 wtt_news.50.c:0 "Auf Nimmerwiedersehen!"
 wtt_news.50.d:0 "Er hat sie zu weit getrieben."
 wtt_news.51.t:0 "Attentat auf [GER.GetLeader]"
 wtt_news.51.desc:0 "Der deutsche Rundfunk meldete heute einen Putschversuch verräterischer Militärs. Nach einer Explosion im Führerhauptquartier, bei der Hitler wie durch ein Wunder nur leicht verletzt und mehrere weitere verletzt wurden, versuchten Armeeeinheiten, mehrere Regierungsgebäude in Berlin einzunehmen. \n\nDie Nachricht von [GER.GetLeader]s Überleben verbreitete sich schnell, und die meisten Einheiten unter der Kontrolle der Putschisten sind inzwischen in ihre Kasernen zurückgekehrt.\n\nNach dem gescheiterten Versuch begingen mehrere hochrangige deutsche Offiziere Selbstmord, anstatt sich der Demütigung eines Prozesses vor dem berüchtigten Volksgerichtshof zu stellen."
 wtt_news.51.c:0 "Der Anfang vom Ende?"
 wtt_news.52.desc:0 "Der deutsche Rundfunk verkündete heute, dass [GER.GetLeader] die Regierung übernommen habe. Nach einem Schusswechsel im Führerbunker, bei dem der Führer tödlich verwundet wurde, marschierten SS-Einheiten schnell ein und besetzten alle wichtigen Straßen und Eisenbahnknotenpunkte, die aus Berlin herausführten. Inzwischen wurden Berichten zufolge Einheiten der Luftwaffe und des Heeres nach Berlin beordert, um die Ordnung wiederherzustellen."

