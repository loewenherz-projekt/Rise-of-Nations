l_german:
 SWI_GATHERING_STORM_DESC:0 "Die Schweiz blieb als kleiner neutraler Staat im Ersten Weltkrieg von direkten militärischen Ereignissen verschont. Dennoch wurde das Land von grossen wirtschaftlichen und politischen Schwierigkeiten hart getroffen. Angesichts der jüngsten Veränderungen in der Weltpolitik ist es ungewiss, ob die Schweiz ihre derzeitige Position als sicheres Land behaupten kann. Nur durch ein Umdenken in der politischen Lage können diese Werte gesichert werden."
 SWI_BLITZKRIEG_DESC:0 "Der bevorstehende Krieg stellt eine enorme Gefahr für die neutrale Schweiz dar. Das Deutsche Reich würde sicherlich nicht zögern, in das Land einzumarschieren, und angesichts der aktuellen Lage würde es keine Verteidigungslinie aufhalten. Es ist Zeit, das Militär auf einen Verteidigungskrieg vorzubereiten. Ein neuer General und neue Befestigungen in verschiedenen Gebieten der Schweiz müssen unser Land zu einer Festung machen. Wir werden unsere Werte um jeden Preis verteidigen..."

