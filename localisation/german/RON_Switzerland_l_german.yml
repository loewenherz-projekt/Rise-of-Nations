 SWI_active_propaganda:0 "Aktive Propaganda"
 SWI_active_propaganda_desc:0 "Unser Volk möchte seine Kinder nicht in den Krieg schicken, um dort zu sterben, doch viele Politiker sehen die Notwendigkeit eines Eingreifens. Propaganda, die den Feind dämonisiert und zum offenen Konflikt aufruft, ist möglicherweise nicht nur ein Werkzeug für Tyrannen."
 SWI_aggressive_focus:0 "Aggressiver Fokus"
 SWI_aggressive_focus_desc:0 "Wir können nicht tatenlos zusehen, wie Feinde an unsere Grenzen vordringen. Der Verteidigungsplan „Réduit Nationale“ ist überholt und nicht mehr brauchbar. Nur Aggression kann uns einen Vorteil verschaffen. Bereiten Sie unsere Armee vor!"
 SWI_agrarian_reform:0 "Agrarreform"
 SWI_agrarian_reform_desc:0 "Die Schweiz ist traditionell ein Agrarland. Angesichts des drohenden Krieges ist es an der Zeit, unsere Agrarpolitik zu reformieren, damit unsere Landwirte in diesen schwierigen Zeiten die Nation ernähren können."
 SWI_armament_effort:0 "Rüstungsanstrengungen"
 SWI_armament_effort_desc:0 "Die Schweiz ist auf eine Invasion durch eine fremde Macht nicht vorbereitet. Der Ausbau einer eigenen Rüstungsindustrie ist unerlässlich, damit die Eidgenossenschaft nie schutzlos dasteht."
 SWI_armament_effort_eq_1:0 "Bauaufwand"
 SWI_armament_effort_eq_1_desc:0 "Die Schweiz ist auf eine Invasion durch eine fremde Macht nicht vorbereitet. Der Ausbau einer eigenen Rüstungsindustrie ist unerlässlich, damit die Eidgenossenschaft nie schutzlos dasteht."
 SWI_armament_effort_eq_2:0 "Bauaufwand"
 SWI_armament_effort_eq_2_desc:0 "Wir werden unsere Bemühungen fortsetzen, sicherzustellen, dass unsere Armee mit der bestmöglichen Ausrüstung unserer Zeit verstärkt wird."
 SWI_armed_neutrality:0 "Bewaffnete Neutralität"
 SWI_armed_neutrality_desc:0 "Neutralität bedeutet nicht, dass wir alle Waffen niederlegen müssen. Wichtig ist, dass sich unser Land im Kriegsfall verteidigen kann."
 SWI_armor_effort:0 "Rüstungsaufwand"
 SWI_armor_effort_desc:0 "Indem wir das anwenden, was wir bei der Mechanisierung unserer Infanterie gelernt haben, können wir auch unsere gepanzerten Fahrzeuge verbessern."
 SWI_army_effort:0 "Armeeeinsatz"
 SWI_army_effort_desc:0 "Trotz der zunehmenden Möglichkeiten der Luft- und Seekriegsführung bleibt der Bodenkampf auch in den Kriegen von morgen von zentraler Bedeutung. Wir müssen jetzt handeln, um sicherzustellen, dass unsere Truppen kampfbereit sind."
 SWI_army_reform:0 "Armeereform"
 SWI_army_reform_desc:0 "Keine Infanterieeinheit oder Hightech-Panzer allein werden uns den Krieg gewinnen lassen. Wir müssen unsere Anstrengungen darauf konzentrieren, sowohl unsere taktischen als auch unsere strategischen Fähigkeiten zu entwickeln. Mit den richtigen Leuten an der richtigen Stelle können wir uns als Armee weiterentwickeln."
 SWI_army_youth:0 "Armeejugend"
 SWI_army_youth_desc:0 "Organisationen zur Förderung der Disziplin und politischen Bildung junger Menschen in unserem Land werden uns auf jede ausländische Invasion vorbereiten."
 SWI_aviation_effort:0 "Luftfahrtbemühungen"
 SWI_aviation_effort_2:0 "Luftfahrtbemühungen II"
 SWI_aviation_effort_2_desc:0 "Um unsere Luftwaffe gut in andere Zweige des Militärs zu integrieren, sind weitere Fortschritte in der Luftfahrt erforderlich."
 SWI_aviation_effort_desc:0 "Nirgendwo schreitet der technologische Fortschritt schneller voran als in der Luftkriegsführung. Die Luftfahrt ist ein Gebiet, das jede moderne Nation beherrschen muss."
 SWI_banking_act:0 "Kreditwesengesetz"
 SWI_banking_act_desc:0 "Deutschland hat immer wieder versucht, Informationen über jüdische Bankkonten zu erhalten. Als neutrales Land ist es unsere Pflicht, den Einzelnen vor der Macht eines fremden Staates zu schützen."
 SWI_canton_of_south_tyrol:0 "Kanton Südtirol"
 SWI_canton_of_south_tyrol_desc:0 "Italien hält an seinem Anspruch auf Südtirol fest. Wir sollten diesen Anspruch anfechten, solange die Demokratische Partei noch existiert und bevor sie diesen Anspruch als Kriegsgrund nutzt."
 SWI_centralize_the_government:0 "Zentralisierung der Regierung"
 SWI_centralize_the_government_desc:0 "Wir haben unsere Position in diesem Krieg klar vertreten. Um unser Land weiter zu stärken, ist es wichtig, die Regierung stärker zu zentralisieren. Nur dann können wir unsere Position behaupten."
 SWI_commission_on_atomic_energy:0 "Kommission für Atomenergie"
 SWI_commission_on_atomic_energy_desc:0 "Wir können nicht einfach am Rande einer weltverändernden Entdeckung tatenlos zusehen. Eine neue Kommission soll sich mit der Nutzung der Nukleartechnologie befassen."
 SWI_construction_effort:0 "Bauaufwand"
 SWI_construction_effort_desc:0 "Auch wenn weltweit ein Krieg droht, darf die zivile Industriekapazität nicht unterschätzt werden."
 SWI_construction_effort_eq_1:0 "Bauaufwand"
 SWI_construction_effort_eq_1_desc:0 "Auch wenn weltweit ein Krieg droht, darf die zivile Industriekapazität nicht unterschätzt werden."
 SWI_construction_effort_eq_2:0 "Baumaßnahme II"
 SWI_construction_effort_eq_2_desc:0 "Durch den weiteren Ausbau unserer Fabriken können wir die Produktion von Waren für den Handel und weitere Bauvorhaben beschleunigen."
 SWI_czech_tanks:0 "Tschechische Panzer"
 SWI_czech_tanks_desc:0 "Die Tschechische Republik hat in ihrer Panzertechnologie große Fortschritte erzielt. Wir müssen jetzt mit dem Import dieser Kriegsmaschinen beginnen, bevor unsere Streitkräfte an Boden verlieren."
 SWI_doctrine_effort:0 "Lehrbemühungen"
 SWI_doctrine_effort_desc:0 "Die militärischen Doktrinen, die den Bodenkampf im Ersten Weltkrieg bestimmten, sind überholt. Wir müssen unsere besten Köpfe mit der Aufgabe betrauen, das militärische Denken von morgen zu gestalten."
 SWI_domestic_industry:0 "Heimische Industrie"
 SWI_domestic_industry_desc:0 "Angesichts der aktuellen Lage lässt sich eine kriegsbedingte Isolation nicht vermeiden. Durch den Ausbau unserer heimischen Industrie wären wir auf diese Situation besser vorbereitet."
 SWI_education_reform:0 "Bildungsreform"
 SWI_education_reform_desc:0 "Überall tauchen vielversprechende junge Köpfe auf. Wir müssen ihnen die nötigen Forschungsmöglichkeiten bieten. Technologische Fortschritte können uns dort einen Vorsprung verschaffen, wo wir ihn am meisten brauchen."
 SWI_elvetismo:0 "Elvetismus"
 SWI_elvetismo_desc:0 "Die Sprache der Schweizer unterscheidet sich stark von der der Deutschen. Wir haben das Recht, unsere Sprache unsere eigene zu nennen und nicht länger im Schatten Deutschlands zu stehen."
 SWI_embargo_germany:0 "Embargo Deutschland"
 SWI_embargo_germany_desc:0 "Deutschland bedroht die Demokratie schon lange genug. Auch wenn ein Embargo gegen das Land unsere Wirtschaft schwächen würde, können wir diese Aggression nicht länger ignorieren."
 SWI_equipment_effort:0 "Ausrüstungsaufwand I"
 SWI_equipment_effort_2:0 "Ausrüstungsaufwand II"
 SWI_equipment_effort_2_desc:0 "Anstatt ausländische Ausrüstung zu imitieren oder zu kaufen, sollten wir darauf abzielen, weltweit führend im Bereich Infanteriewaffen zu werden."
 SWI_equipment_effort_desc:0 "Die Grenzen der Ausrüstung, die von Infanterie getragen werden kann, werden ständig erweitert. Wir werden uns darauf konzentrieren, unseren Truppen die beste verfügbare Ausrüstung zur Verfügung zu stellen."
 SWI_eth_industrial_research:0 "ETH Industrieforschung"
 SWI_eth_industrial_research_desc:0 "Unsere Universität genießt weltweit hohes Ansehen. Hier werden die Ideen und Innovationen der Zukunft geschmiedet."
 SWI_expand_ptt:0 "Erweitern Sie die PTT"
 SWI_expand_ptt_desc:0 "Die Schweizerische Post-, Telegrafen- und Telefonagentur hat ihre Aufgaben bisher erfolgreich gemeistert. Ein Ausbau dieser Agentur könnte im Hinblick auf die neuen Formen der modernen Kommunikation sehr hilfreich sein."
 SWI_expand_sbb:0 "Ausbau der SBB"
 SWI_expand_sbb_desc:0 "Die Schweizerischen Bundesbahnen sind eine unserer größten Errungenschaften. Es ist höchste Zeit, unser nationales Eisenbahnnetz auszubauen."
 SWI_expand_university:0 "Die Universität Bern erweitern"
 SWI_expand_university_desc:0 "Die jüngsten Entwicklungen in unserer Branche haben zu bedeutenden Fortschritten bei neuen Technologien geführt. Mit der Erweiterung der Universität Bern können wir diese Errungenschaften weiter vorantreiben."
 SWI_french_tanks:0 "Französische Panzer"
 SWI_french_tanks_desc:0 "Die Franzosen haben sich bereit erklärt, uns bei der Panzerentwicklung zu unterstützen. Diese Zusammenarbeit kann unsere Streitkräfte dort stärken, wo wir sie am meisten brauchen."
 SWI_generalmobilmachung:0 "Generalmobilmachung"
 SWI_generalmobilmachung_desc:0 "Angesichts der aktuellen Entwicklungen scheint ein Krieg unvermeidlich. Die Regierung muss eine Generalmobilmachung anordnen, damit jeder Schweizer Bürger sein Leben für die Verteidigung unseres Heimatlandes geben kann."
 SWI_german_fighters:0 "Deutsche Kämpfer"
 SWI_german_fighters_desc:0 "Unsere Luftwaffe ist in ihren Fähigkeiten begrenzt. Deutschland ist sehr stolz auf seine neu entwickelten Kampfflugzeuge. Dies sind die neuen Waffen, die unser Militär braucht."
 SWI_german_tanks:0 "Deutsche Panzer"
 SWI_german_tanks_desc:0 "Die deutschen Panzer sind mit ihrer Geschwindigkeit und Durchschlagskraft vielen anderen Modellen deutlich überlegen. Der Import dieser neuen Fahrzeuge könnte sich als sinnvoll erweisen."
 SWI_gotthardstellung:0 "Gotthardstellung"
 SWI_gotthardstellung_desc:0 "Der Gotthard ist eine der wichtigsten Routen in den Schweizer Alpen, die auf keinen Fall in feindliche Hände fallen darf. Wir müssen diese Position mit neuen Verteidigungsmaßnahmen umfassend sichern."
 SWI_grosse_eidgenossenschaft:0 "Große Eidgenossenschaft"
 SWI_grosse_eidgenossenschaft_desc:0 "Die Vorarlberger haben ihre Verbundenheit zur Schweiz oft betont. Die aktuellen politischen Turbulenzen könnten die Integration dieser Region fördern."
 SWI_join_allies:0 "Schließen Sie sich Verbündeten an"
 SWI_join_allies_desc:0 "Die Ereignisse der Vergangenheit haben gezeigt, dass kein neutrales Land vor dem Deutschen Reich sicher ist. Die Alliierten haben erklärt, dass sie Frieden und Freiheit in unserem Land sichern werden. Wir müssen uns ihnen anschließen, um unser Volk vor Hitlers faschistischer Unterdrückung zu retten."
 SWI_join_axis:0 "Achse beitreten"
 SWI_join_axis_desc:0 "Das Deutsche Reich wird zu einer Macht, mit der man rechnen muss. Seine Vision einer besseren Zukunft lässt sich mit unseren Interessen vereinbaren. Wir sollten es unterstützen, und sobald sich der Staub gelegt hat, wird Frankreich seinen rechtmäßigen Anteil an Europa bekommen."
 SWI_join_comintern:0 "Treten Sie der Komintern bei"
 SWI_join_comintern_desc:0 "Da wir überall Feinde haben, müssen wir unsere Position durch mächtige Verbündete stärken. Unsere Verbindungen zur Komintern sind stärker geworden, und es ist an der Zeit, uns voll und ganz ihrer Sache zu widmen."
 SWI_labour_peace:0 "Arbeit Frieden"
 SWI_labour_peace_desc:0 "Labour hat sich seit seiner Gründung für die Arbeiterklasse eingesetzt, und viele unserer Führungspersönlichkeiten stammen aus der Arbeiterklasse. Setzen wir uns für einen umfassenderen Schutz und mehr Macht für die Gewerkschaften ein."
 SWI_lenins_legacy:0 "Lenins Vermächtnis"
 SWI_lenins_legacy_desc:0 "Während Lenin in der Schweiz lebte, versuchte er ständig, die Schweizer Kommunisten zu überzeugen, die internationale Revolution voranzutreiben. Jetzt, da die KPS neue Stärke erlangt hat, ist es an der Zeit, seinen Wünschen nachzukommen."
 SWI_liberty_ethos:0 "Freiheitsethos"
 SWI_liberty_ethos_desc:0 "In dieser Zeit ideologischer Fanatiker, die den menschlichen Geist ersticken wollen, werden wir die individuellen Freiheiten und die Unabhängigkeit schützen."
 SWI_limmatstellung:0 "Limmatstellung"
 SWI_limmatstellung_desc:0 "Da der Verteidigungsplan in Arbeit ist, ist es an der Zeit, unsere Stellungen entlang der Limmat mit neuen Befestigungen auszustatten. Dies gibt unseren Truppen die Möglichkeit, den Feind im Falle einer Invasion erfolgreich zurückzuschlagen."
 SWI_march_on_berne:0 "Marsch auf Bern"
 SWI_march_on_berne_desc:0 "Es gibt nur ein starkes Land wie die Schweiz. Die Politiker wollen uns weismachen, deutsche Ideen seien gefährlich. Wir marschieren nach Bern und überzeugen die Bevölkerung vom Gegenteil!"
 SWI_national_science_foundation:0 "Nationale Wissenschaftsstiftung"
 SWI_national_science_foundation_desc:0 "Die Welt entwickelt sich immer schneller. Mit einer nationalen Wissenschaftsstiftung können wir unsere Position in der globalen Wissenschaft und Innovation behaupten."
 SWI_new_national_language:0 "Neue Landessprache"
 SWI_new_national_language_desc:0 "Die romanische Bevölkerung der Schweiz fühlt sich in ihren Rechten ausgeschlossen. Obwohl wir bereits drei Landessprachen haben, ist es unsere Pflicht, auch diese Minderheit anzuerkennen."
 SWI_peoples_council:0 "Volksrat"
 SWI_peoples_council_desc:0 "Das alte System hat das Proletariat lange genug unterdrückt. Um unsere Revolution zu vollenden, muss die Bundesregierung durch den neuen Volksrat ersetzt werden."
 SWI_preserve_neutrality:0 "Neutralität wahren"
 SWI_preserve_neutrality_desc:0 "Trotz der gefährlichen Ereignisse auf der ganzen Welt dürfen wir unsere hochgeschätzten Werte nicht verlieren. Die Schweiz ist und bleibt ein neutrales Land, egal was passiert!"
 SWI_preserve_the_vaterland:0 "Bewahrt das Vaterland"
 SWI_preserve_the_vaterland_desc:0 "Unser Vaterland steht am Rande des Ruins. Wir Nationalisten müssen die Rücksichtslosigkeit der Landesverräter um jeden Preis stoppen. Nur eine vereinte Nation ist stark."
 SWI_rearmament:0 "Wiederbewaffnung"
 SWI_rearmament_desc:0 "Diese schwierigen Zeiten erfordern ernsthafte Maßnahmen. Die Bundesversammlung muss zusammenkommen, um einen neuen Aufrüstungsplan zu diskutieren, bevor wir mit ausländischen Bedrohungen konfrontiert werden."
 SWI_reduit_national:0 "Réduit Nationale"
 SWI_reduit_national_desc:0 "Die Schweiz verfügt nicht über die Ressourcen für einen Angriffskrieg. Wir sollten unserem Verteidigungsplan „Réduit Nationale“ folgen und unser Land in eine Festung verwandeln."
 SWI_restoration:0 "2. Restaurierung"
 SWI_restoration_desc:0 "Kommunisten und Demokraten haben unsere Schweizer Werte in den Schmutz gezogen. Wir müssen Land und Volk wieder zu altem Glanz verhelfen. Es lebe die Eidgenossenschaft!"
 SWI_rocket_effort:0 "Raketenanstrengung"
 SWI_rocket_effort_desc:0 "Raketen- und Düsentriebwerke ermöglichen sowohl unbemannten als auch bemannten Schiffen beispiellose Geschwindigkeiten. Durch die Entwicklung dieser Technologien können wir den Feind überraschen."
 SWI_ruetlirapport:0 "Rütlirapport"
 SWI_ruetlirapport_desc:0 "Unser General hat erklärt, dass unsere Offiziere über die neuesten Kriegspläne informiert werden müssen. Es ist Zeit, die Kommandeure auf der Rütliwiese zu versammeln."
 SWI_spiritual_national_defence:0 "Geistige Landesverteidigung"
 SWI_spiritual_national_defence_desc:0 "Freiheit, Einheit und Gerechtigkeit sind die Merkmale, die die Schweiz ausmachen. Indem wir diese Werte und Bräuche fördern, können wir unser Land und seine Bevölkerung vor staatlicher Propaganda aus den Nachbarländern schützen."
 SWI_status_quo:0 "Status Quo"
 SWI_status_quo_desc:0 "Trotz der politischen Unruhen dürfen wir nicht zulassen, dass unsere Werte in den Hintergrund geraten. Unser Land wird sich unter allen Umständen für die Aufrechterhaltung der Stabilität in der Region einsetzen."
 SWI_strengthen_the_ptt:0 "Stärkung der PTT"
 SWI_strengthen_the_ptt_desc:0 "Die jüngsten Errungenschaften des Krieges haben die Bedeutung moderner Kommunikation nur allzu deutlich gezeigt. Wir müssen nun die PTT stärken, um mit diesen Entwicklungen Schritt halten zu können." 
 SWI_strengthen_the_sbb:0 "Die SBB stärken"
 SWI_strengthen_the_sbb_desc:0 "Wenn der Krieg etwas gezeigt hat, dann, dass die Infrastruktur über den Untergang und Aufstieg der Länder entschieden hat. Mit dem Ausbau der SBB stehen wir auf der Seite der Erfolgreichen."
 SWI_support_urbanization:0 "Urbanisierung unterstützen"
 SWI_support_urbanization_desc:0 "Die Veränderungen in der Wirtschaftslandschaft haben die Urbanisierung fast zu einer Notwendigkeit gemacht. Wir sollten alles tun, um diese Veränderungen nach Möglichkeit zu unterstützen."
 SWI_swiss_mercenaries:0 "Schweizer Söldner"
 SWI_swiss_mercenaries_desc:0 "Unsere Söldner haben eine Tradition, die bis ins Mittelalter zurückreicht. Die aktuelle politische Lage macht zusätzliche Truppen in jedem Land unabdingbar. Wir könnten von dieser Möglichkeit sicherlich profitieren."
 SWI_swiss_oil_refinery:0 "Schweizer Ölraffinerie"
 SWI_swiss_oil_refinery_desc:0 "Öl ist eine der wichtigsten Ressourcen und für die moderne Kriegsführung unverzichtbar. Eine Schweizer Ölraffinerie würde unser Militär erheblich stärken."
 SWI_swiss_steel_mills:0 "Schweizer Stahlwerke"
 SWI_swiss_steel_mills_desc:0 "Ohne Stahl gäbe es diesen Krieg nicht. Die Schweiz kann sich nicht allein auf Importe aus dem Ausland verlassen. Neue Stahlwerke müssen unsere Bemühungen unterstützen."
 SWI_vollmachtenregime:0 "Vollmachtsregime"
 SWI_vollmachtenregime_desc:0 "Angesichts der weltweit angespannten Lage können wir uns nicht länger auf langwierige demokratische Prozesse verlassen. Die Einführung eines Notstandsgesetzes würde es uns ermöglichen, schnell auf die aktuellen Entwicklungen zu reagieren."
 SWI_war_bonds:0 "Kriegsanleihen"
 SWI_war_bonds_desc:0 "Mit der Unterstützung der Bevölkerung durch den Kauf von Kriegsanleihen können wir unsere Militärausgaben in diesen schwierigen Zeiten sichern."
 SWI_war_economy:0 "Kriegswirtschaft"
 SWI_war_economy_desc:0 "Wir können einen Krieg nicht länger vermeiden. Die Industrie und die Bevölkerung müssen sich unserem Ziel vollständig unterordnen, nur dann können wir einen Sieg erringen."

 SWI_surrounded_by_war:0 "Umgeben vom Krieg"
 SWI_surrounded_by_war_desc:0 "Der Krieg breitet sich in Europa aus! Als neutrales Land, das von allen Seiten vom Krieg umgeben ist, befinden wir uns in einer schwierigen Lage. Nur wenn wir zu unserer Neutralität stehen, können wir uns aus diesem Konflikt heraushalten. Durch sorgfältig geplante politische Maßnahmen könnten wir jedoch auch von diesem Krieg profitieren... "
 SWI_request_from_germany:0 "Deutschland soll den Gotthard nutzen"
 SWI_request_from_germany_desc:0 "Aufgrund unserer zentralen Lage in Europa hat die deutsche Regierung angekündigt, ihre Güterzüge durch den Gotthardtunnel nach Italien schicken zu wollen. Die Zusammenarbeit mit [GER.GetLeader] würde unserer Legitimität als neutraler Staat sicherlich schaden, die Wirtschaft würde sich jedoch sicherlich freuen."
 SWI_haute_savoy_integration:0 "Haute-Savoyen strebt Integration an"
 SWI_haute_savoy_integration_desc:0 "Während Frankreich im Krieg steckte, kündigte die Regierung von Haute-Savoyen ihren Wunsch an, der Schweizerischen Eidgenossenschaft beizutreten. Obwohl die Absichten dahinter offensichtlich sind, sollten wir dieses Angebot nicht einfach ablehnen."

 SWI_strong_haute:0 "Die Schweiz beansprucht Haute-Savoyen"
 SWI_haute:0 "Die Schweiz beansprucht Haute-Savoyen"
 SWI_german_yes:0 "Die Schweiz hilft dem Deutschen Reich"
 
 


 switzerland.100.t:0 "Allgemeine Rekrutierung"
 switzerland.100.d:0 "Angesichts der jüngsten Ereignisse und der drohenden Kriegsgefahr hat die Bundesversammlung einen neuen General gewählt: einen einzigartigen Rang, der nur im nationalen Notstand gewählt wird. Mit überwältigender Mehrheit der Stimmen wird Henri Guisan die Schweiz und ihr Volk auf ihre Verteidigung vorbereiten."
 switzerland.100.a:0 "Henri Guisan ist der Richtige!"
 switzerland.101.t:0 "Österreich akzeptiert Referendum"
 switzerland.101.d:0 "Die österreichische Regierung blickt mit Unmut auf das Wahlergebnis vom vergangenen Sonntag. Mit 81% Zustimmung fordern die Vorarlberger die Integration in die Schweiz. Da diese Forderung nicht ignoriert werden kann, beginnen nun in Wien Verhandlungen zwischen der Schweiz und [AUS.GetLeader]."
 switzerland.101.a:0 "Für unsere Brüder!"
 switzerland.102.t:0 "Österreich lehnt Referendum ab"
 switzerland.102.d:0 "Die Wahlen vom vergangenen Sonntag endeten mit einer Enttäuschung. Obwohl die Vorarlberger Bevölkerung mit 81% Zustimmung für den Anschluss an die Schweiz gestimmt hatte, gibt die österreichische Regierung nicht nach. In einem offiziellen Bericht [AUS.GetLeader] heißt es, Vorarlberg „gehöre zu Österreich und nur zu Österreich“."
 switzerland.102.a:0 "Warum ließ man sie damals wählen?"
 switzerland.103.t:0 "Italien akzeptiert Forderung"
 switzerland.103.d:0 "Nach intensiven Diskussionen kündigte die italienische Regierung an, die Forderungen der Schweiz zu akzeptieren. Italien bestätigt die Argumente der Schweizerischen Eidgenossenschaft und erklärt, dass alle Ansprüche auf das Gebiet Südtirols fallengelassen werden."
 switzerland.103.a:0 "Gut!"
 switzerland.104.t:0 "Italien lehnt Forderung ab"
 switzerland.104.d:0 "Trotz der Forderungen der Schweizerischen Eidgenossenschaft hat die italienische Regierung heute erklärt, dass sie ihren Anspruch auf das Gebiet Südtirols aufrechterhält. Italien hat zudem erklärt, dass es keine weiteren Meinungsverschiedenheiten über die Rechtmäßigkeit seiner Ansprüche zulassen werde."
 switzerland.104.a:0 "Inakzeptabel!"
 switzerland.107.t:0 "Die Schweiz ruft zur Landesverteidigung auf"
 switzerland.107.d:0 "Der Schweizer Bundesrat hat heute in einem Dokument angekündigt, dass er angesichts der aktuellen politischen Lage in der Welt sein Volk geistig auf die Landesverteidigung vorbereiten wird.\n\nIn dem Dokument heißt es: „Während die bewaffnete Landesverteidigung sowie deren Vorbereitung und Organisation ausschließlich Sache des Staates ist, wollen wir die geistige Landesverteidigung in erster Linie in den Händen der Bürger belassen.\n\nOb diese Maßnahmen die Schweiz vor ausländischen Einflüssen schützen können, wird sich erst mit der Zeit zeigen..."
 switzerland.107.a:0 "Gemeinsam sind wir stark!"
 switzerland.107.b:0 "Gut, dass die Schweiz ihre Werte verteidigt!"
 switzerland.107.c:0 "Werden sie für ihre Spiritualität einen Guru nutzen?"
 switzerland.108.t:0 "Zusammenfassung des Rütlirapports"
 switzerland.108.d:0 "An diesem Tag befahl General Henri Guisan der Schweizer Armee allen höheren Offizieren, sich auf der Rütliwiese zu melden. Die aktuelle Kriegslage wurde besprochen und die Offiziere über die notwendigen Verteidigungspläne informiert.\n\nNach der Besprechung verkündete Henri Guisan: „Solange es in Europa Millionen bewaffneter Männer gibt und solange uns jederzeit bedeutende Kräfte angreifen können, muss die Armee auf ihrem Posten bleiben.“"
 switzerland.108.a:0 "Das ist gut zu hören!"
 swi_austria.101.t:0 "Die Schweiz fordert Vorarlberg"
 swi_austria.101.d:0 "Schweiz will Vorarlberg"
 swi_austria.101.a:0 "Sie können es haben ..."
 swi_austria.101.b:0 "Niemals!"
 swi_italy.101.t:0 "Schweiz fordert Südtirol"
 swi_italy.101.d:0 "Schweiz will Südtirol"
 swi_italy.101.a:0 "Sie können es haben ..."
 swi_italy.101.b:0 "Niemals!"
