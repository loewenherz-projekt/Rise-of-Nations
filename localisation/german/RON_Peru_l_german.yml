peru.412.a:0 "Dagegen kann man nichts tun"
peru.412.b:0 "Wir müssen sie vom Kontinent vertreiben!"

peru.903.t:0 "[FROM.GetName] fordert den Beitritt Paraguays zur Komintern"
peru.903.desc:0 "Heute ist ein interessanter Vorschlag von Diplomaten aus [FROM.GetName] eingegangen: Sie suchen aktiv nach Verbündeten in ihrer Region und möchten ihre Bemühungen mit denen Paraguays bündeln. Sollten wir sie der Komintern beitreten lassen?"
peru.903.a:0 "Ja"
peru.903.b:0 "NEIN"

peru.904.t:0 "[FROM.GetName] stimmt zu"
peru.904.desc:0 "Heute wurde ein Abkommen zwischen Diplomaten von [SOV.GetName] und [PAR.GetName] unterzeichnet. Jetzt haben wir einen Verbündeten in der südamerikanischen Region!"
peru.904.a:0 "Eine weise Entscheidung"

peru.905.t:0 "[FROM.GetName] ist nicht einverstanden"
peru.905.desc:0 "Unsere Bitte an Paraguay, der Komintern beizutreten, wurde von Moskau abgelehnt. Vielleicht kennt die Sowjetunion als Führer des Bündnisses eine bessere Strategie für die Entwicklung des Bündnisses."
peru.905.a:0 "Moskau will die Meinung seiner Verbündeten nicht berücksichtigen"

peru.510.t:0 "[FROM.GetName] verlangt Einhaltung"
peru.510.desc:0 "Heute haben Diplomaten des Staates [FROM.GetName] die Forderung nach der Auflösung unserer Regierung und der Errichtung eines neuen Regimes im Land ignoriert. Höchstwahrscheinlich fühlen sie sich von uns bedroht und wollen uns zu ihrer eigenen Sicherheit zu Marionetten machen. Was sollen wir tun?"
peru.510.a:0 "Widerstand ist zwecklos"
peru.510.b:0 "Die Souveränität unseres Heimatlandes ist unantastbar"

peru.511.t:0 "[FROM.GetName] gehorcht"
peru.511.desc:0 "[FROM.GetName] hat seine Bereitschaft zu Zugeständnissen gegenüber unserer Militärmacht angekündigt. Wir müssen mit der Bildung unserer Vertreter in allen Zweigen ihrer Regierung beginnen."
peru.511.a:0 "Unser Einfluss wächst"

peru.512.t:0 "[FROM.GetName] widersteht"
peru.512.desc:0 "[FROM.GetName] ist nicht bereit, Zugeständnisse zu machen. Höchstwahrscheinlich glauben sie, dass ihre Armee stark genug ist, um mit unserer zu konkurrieren und sie schützen zu können. Es ist notwendig, den nächsten Schritt zu überdenken."
peru.512.a:0 "Dagegen kann man nichts tun"
peru.512.b:0 "Die diplomatischen Bemühungen sind beendet. Tanken Sie auf"

