l_german:



PRU_politics:0 "Politische Bemühungen"
PRU_politics_desc:0 "Um Veränderungen in der Welt herbeizuführen, müssen wir in der Lage sein, Veränderungen in unserem eigenen Land herbeizuführen. Die Stärkung unserer politischen Position sollte dabei an erster Stelle stehen."
PRU_continue_facism:0 "Weiter Faszination"
PRU_continue_facism_desc:0 "Unser Land hat vor kurzem einen neuen Entwicklungspfad eingeschlagen. Es ist notwendig, unsere Ideologie zu stärken und neue Verbündete in der Außenwelt zu finden."
PRU_change_course:0 "Kurs ändern"
PRU_change_course_desc:0 "Der Faschismus wird unsere Nation nicht zum Erfolg führen. Es ist notwendig, die politische Situation im Land zu ändern."
PRU_join_japan:0 "Stärkung der Beziehungen zu Japan"
PRU_join_japan_desc:0 "Japan ist ein Land auf der anderen Seite des Pazifiks mit einer starken Flotte. Wir müssen unsere diplomatischen Bemühungen auf die Freundschaft zwischen unseren Ländern konzentrieren. Unsere Zusammenarbeit wird sowohl für Japan als auch für uns von strategischem Nutzen sein."
PRU_shipbuilt_tt:0 "§RIndem innerhalb von drei Jahren nach der Wiederannäherung an Japan nicht mit dem Flottenaufrüstungsprogramm begonnen wird, wird ein Bürgerkrieg ausbrechen!§!\n"
PRU_join_germany:0 "Die Beziehungen zu Deutschland stärken"
PRU_join_germany_desc:0 "Deutschland ist das erfolgreichste Land, das die gleiche Ideologie wie wir verfolgt. Für eine weitere Zusammenarbeit ist es notwendig, die Beziehungen zwischen unseren Ländern zu stärken."
PRU_join_allies:0 "Schließen Sie sich Verbündeten an"
PRU_join_allies_desc:0 "Schließen Sie sich Verbündeten an"
PRU_join_ussr:0 "Treten Sie der Komintern bei"
PRU_join_ussr_desc:0 "Die Sowjetunion ist derzeit die größte Weltmacht. Wir sollten nach Wegen suchen, uns ihr anzuschließen."
PRU_expansion_preparation:0 "Vorbereitung auf die Erweiterung"
PRU_expansion_preparation_desc:0 "Um eine große Nation zu werden, müssen wir unsere Grenzen erweitern. Zunächst müssen wir jedoch Armee und Industrie auf eine erfolgreiche Expansion vorbereiten."
PRU_expand_army:0 "Armee vergrößern"
PRU_expand_army_desc:0 "Aktive Kämpfe auf dem Kontinent erfordern eine große Armee. Das Wehrpflichtprogramm muss ausgeweitet werden."
PRU_militarize_economic:0 "Militarisierung der Wirtschaft"
PRU_militarize_economic_desc:0 "Jede große Armee wird von einer starken Wirtschaft getragen. Bevor eine große Armee aufgebaut werden kann, ist es notwendig, strategische Industrien zu militarisieren."
PRU_annex_neighbors:0 "Annexion der Nachbarländer"
PRU_annex_neighbors_desc:0 "Bolivien und Ecuador waren einst, wie wir, Teil des spanischen Kolonialreichs. Es ist Zeit, sich wieder zu vereinen, dieses Mal jedoch als unabhängiger Staat."
PRU_nationalize_ecu:0 "Verstaatlichung Ecuadors"
PRU_nationalize_ecu_desc:0 "Nach der Eroberung Ecuadors können wir ein Programm zur Verstaatlichung der Bevölkerung und der Industrie starten."
PRU_nationalize_bol:0 "Verstaatlichung Boliviens"
PRU_nationalize_bol_desc:0 "Nach der Eroberung Boliviens können wir ein Programm zur Verstaatlichung der Bevölkerung und der Industrie starten."
PRU_continue_expansion:0 "Ausbau fortsetzen"
PRU_continue_expansion_desc:0 "Um das einst größte Reich auf dem südamerikanischen Kontinent wiederzubeleben, ist eine weitere Ausweitung unserer Grenzen notwendig."
PRU_develop_resources:0 "Ressourcenentwicklung"
PRU_develop_resources_desc:0 "Wir haben viele neue Ländereien beansprucht und können nun mit der Erschließung neuer Ressourcen beginnen."
PRU_claim_continent:0 "Den Kontinent vereinen"
PRU_claim_continent_desc:0 "Es ist an der Zeit, den gesamten südamerikanischen Kontinent in einem Land zu vereinen."
PRU_annex_panama:0 "Kontrolle über den Panamakanal"
PRU_annex_panama_desc:0 "Wir haben fast unser gesamtes Reich vereint. Es bleibt nur noch, die letzte Region zu beanspruchen. Diese Aufgabe könnte jedoch die schwierigste auf unserem Weg zur vollständigen Vereinigung werden."

PRU_jap_trade:0 "Handelsabkommen mit Japan"
PRU_jap_trade_desc:0 "Ein günstiges Handelsabkommen mit Japan wird der erste Schritt zur Annäherung unserer Länder sein."
PRU_jap_help:0 "Technische Hilfe aus Japan"
PRU_jap_help_desc:0 "Wir fordern Japan auf, unsere Forschungen in seine Verteidigungsindustrie zu integrieren"
PRU_navy_effort_1:0 "Marine erweitern"
PRU_navy_effort_1_desc:0 "Jahrhundertelang waren die Herrscher des amerikanischen Kontinents Länder mit einer großen Marine. Wir müssen unsere Anstrengungen auf den Aufbau einer Flotte konzentrieren, die sowohl die Sicherheit unserer Küste gewährleisten als auch eine große Offensivoperation durchführen kann."
PRU_navy_effort_2:0 "Entwicklung von Screen-Schiffen"
PRU_navy_effort_2_desc:0 "Zerstörer und Kreuzer sind ein wesentlicher Bestandteil der großen Ozeanflotte. Es ist notwendig, mit dem Aufbau der Marine mit solchen Schiffen zu beginnen."
PRU_capital_ship_focus:0 "Schlachtschiff-Vorherrschaft"
PRU_capital_ship_focus_desc:0 "Während die Theoretiker über Luft- oder Seeherrschaft streiten, möchte niemand die Kanonen eines Schlachtschiffs auf seinen Palast gerichtet haben. Selbst wenn die Trägerenthusiasten am Ende Recht behalten, werden Schlachtschiffe die Weltmeere noch jahrelang beherrschen."
PRU_carrier_focus:0 "Vorrang der Träger"
PRU_carrier_focus_desc:0 "Unter Marinetheoretikern wird heftig über die weitere Überlebensfähigkeit des Schlachtschiffs gestritten. Manche argumentieren, dass die moderne Luftwaffe die Seemacht dominieren wird und dass der Flugzeugträger das Schlachtschiff als König der Weltmeere ablösen wird."
PRU_carrier_planes:0 "Trägerflugzeuge"
PRU_carrier_planes_desc:0 "Ein Flugzeugträger ist nur so gut wie seine Flugzeuge. Ohne moderne Flugzeuge ist jeder Flugzeugträger eine Fehlinvestition."
PRU_buy_carriers:0 "Träger kaufen"
PRU_buy_carriers_desc:0 "Japan verfügt über eine beeindruckende Trägerflotte, und unsere Industrie kann sich den gesamten Produktionsprozess solcher Schiffe noch nicht leisten. Wir können uns an Japan wenden, um zwei Stapellaufrümpfe zu kaufen und sie in unseren Werften nachzurüsten."
PRU_buy_cpital_ships:0 "Schlachtschiffe kaufen"
PRU_buy_cpital_ships_desc:0 "Ein Schlachtschiff ist eine äußerst komplexe und teure Konstruktion. Wir können drei unfertige japanische Schiffe kaufen, die nach ihrer Fertigstellung den Kern unserer Flotte bilden könnten."
PRU_navy_doctrine_1:0 "Marinedoktrin"
PRU_navy_doctrine_1_desc:0 "Durch die Verbesserung der Qualität der Besatzungsausbildung und der Ausbildung der Kommandanten können wir die Effektivität unserer Flotte steigern."
PRU_marine_effort_1:0 "Amphibischer Angriff"
PRU_marine_effort_1_desc:0 "Eine große Flotte wird es uns ermöglichen, Feinde nicht nur zu Land, sondern auch von See aus anzugreifen. Für diese Aufgaben müssen wir ein Marinekorps bilden."
PRU_shipbuidl:0 "Flotten-Notfall-Erweiterungsprogramm"
PRU_shipbuidl_desc:0 "Die Lage in der Welt verändert sich extrem schnell, aber wir verfügen noch immer nicht über eine beeindruckende Flotte. Die Vergrößerung der Marine sollte eine äußerst wichtige Aufgabe werden."
PRU_air_effort_1:0 "Luftfahrtbemühungen"
PRU_air_effort_1_desc:0 "Schon der Erste Weltkrieg zeigte die Bedeutung der Luftwaffe. Im kommenden Krieg wird sie eine noch größere Rolle spielen."
PRU_fighter_effort_1:0 "Kämpferentwicklung"
PRU_fighter_effort_1_desc:0 "Luftkämpfe haben im Ersten Weltkrieg noch nicht stattgefunden. Wenn wir bei der Entwicklung von Kampfflugzeugen die Nase vorn haben, werden wir auch in Zukunft einen Vorteil haben."
PRU_nav_bomber_effort_1:0 "Entwicklung von Marinebombern"
PRU_nav_bomber_effort_1_desc:0 "Es wird für unsere Flotte nicht leicht sein, die Geschwader anderer großer Länder herauszufordern. Wir können ihre Aufgabe jedoch erheblich erleichtern, indem wir spezialisierte Flugzeuge gegen die feindliche Flotte einsetzen."
PRU_heavy_fighter_effort_1:0 "Entwicklung schwerer Kampfflugzeuge"
PRU_heavy_fighter_effort_1_desc:0 "Südamerika ist ein großer Kontinent mit einem schlecht ausgebauten Netz von Luftwaffenstützpunkten. Schwere Jäger können Gebiete abdecken, die einmotorige Flugzeuge nicht erreichen können."
PRU_bomber_effort_1:0 "Entwicklung der taktischen Luftfahrt"
PRU_bomber_effort_1_desc:0 "Die Zeiten, in denen Armeen Kriege gewinnen konnten, ohne in den Himmel zu blicken, sind vorbei. Wir müssen unsere taktischen Bomber weiterentwickeln, um unseren Soldaten die Luftunterstützung zu bieten, die sie brauchen."
PRU_CAS_effort_1:0 "Luftnahunterstützung"
PRU_CAS_effort_1_desc:0 "Flugzeuge zur Unterstützung unserer Landstreitkräfte und Schiffe waren eine sehr effiziente Ergänzung bei relativ geringen Investitionen. Für diese Flugzeuge gibt es nun mehrere Verbesserungsvorschläge. Unsere Ingenieure können die nächste Generation von Unterstützungsflugzeugen entwickeln."
PRU_strat_bomber_effort_1:0 "Entwicklung strategischer Bomber"
PRU_strat_bomber_effort_1_desc:0 "Der Sieg wird durch die Zerstörung der feindlichen Industrien errungen. Wir müssen unsere Anstrengungen auf die Entwicklung und Produktion strategischer Bomber konzentrieren."
PRU_airborne_effort_1:0 "Luftlandedivisionen"
PRU_airborne_effort_1_desc:0 "Die Weiterentwicklung der Reichweite und Nutzlast von Flugzeugen eröffnet zahlreiche Möglichkeiten. Transportflugzeuge könnten ganze Truppendivisionen weit hinter die feindlichen Linien bringen und dort verheerende Schäden anrichten."
PRU_air_doctrine_effort_1:0 "Luftdoktrin"
PRU_air_doctrine_effort_1_desc:0 "Wir haben genügend Erfahrung gesammelt, um neue Theorien der Luftkriegsführung schneller zu testen. Dies ermöglicht es uns, neue taktische und strategische Möglichkeiten zu erkunden. Der Luftkampf ist der Schlüssel zur modernen Kriegsführung."
PRU_land_effort_1:0 "Armeeeinsatz"
PRU_land_effort_1_desc:0 "Trotz der zunehmenden Möglichkeiten der Luft- und Seekriegsführung bleibt der Bodenkampf auch in den Kriegen von morgen von zentraler Bedeutung. Mit entsprechender Vorbereitung können wir die Hölle der Schützengräben vermeiden."
PRU_infantry_effort_1:0 "Infanteriearmee"
PRU_infantry_effort_1_desc:0 "Südamerika ist eine Region mit extrem schwierigem Gelände. Wir werden nicht alle Vorteile der motorisierten Kriegsführung nutzen können, daher ist es besser, unsere Bemühungen auf den Aufbau einer großen Infanteriearmee zu konzentrieren."
PRU_infantry_effort_2:0 "Allgemeine Wehrpflicht"
PRU_infantry_effort_2_desc:0 "Um eine große Armee aufzustellen, ist eine Überarbeitung des Wehrpflichtprogramms erforderlich."
PRU_motorized_effort_1:0 "Motorisierte Kriegsführung"
PRU_motorized_effort_1_desc:0 "Moderne Probleme erfordern moderne Lösungen. Der Erste Weltkrieg zeigte ein trauriges Ergebnis, das zum Einsatz von Infanteriearmeen mit eingeschränkter Mobilität führte. Es ist notwendig, eine mobile Armee aufzubauen, um innerhalb weniger Tage kilometerlanges feindliches Gebiet zu erobern."
PRU_motorized_effort_2:0 "Priorisierung der Fahrzeugproduktion"
PRU_motorized_effort_2_desc:0 "Um eine mobile Armee aufzubauen, ist es notwendig, spezialisierte Industriekomplexe für die Produktion von Fahrzeugen für den Bedarf der Armee zu schaffen."
PRU_support_effort_1:0 "Entwicklung unterstützen"
PRU_support_effort_1_desc:0 "Keine moderne Armee kann ohne gut organisierte Logistik- und Pioniereinheiten kämpfen. Dies muss bei der Planung von Angriffen berücksichtigt werden."
PRU_tank_effort_1:0 "Panzer"
PRU_tank_effort_1_desc:0 "Panzer sind ein hervorragendes Mittel, um die feindlichen Linien zu durchbrechen. Durch die Schaffung von Panzerformationen in unserer Armee werden wir ihre Offensivkraft deutlich steigern."

PRU_facism_rise:0 "Stärkung der Ideologie"
PRU_facism_rise_desc:0 "Wenn wir wollen, dass die Deutschen uns als starke Nation betrachten, die es wert ist, ihre Verbündeten zu sein, müssen wir unsere Ideologie stärken."
PRU_german_experience:0 "Deutsche Erfahrung"
PRU_german_experience_desc:0 "Die Deutschen verfügen über viele Militärtechnologien, die uns noch nicht zur Verfügung stehen. Wenn wir uns als gute Verbündete erweisen, könnten sie uns einige ihrer besten Technologien zur Verfügung stellen."
PRU_invite_german_scientists:0 "Deutsche Wissenschaftler einladen"
PRU_invite_german_scientists_desc:0 "Deutschland verfügt über zahlreiche Fachkräfte. Für sie können wir in unseren Forschungsinstituten Arbeitsplätze schaffen."
PRU_land_effort_2:0 "Armeeeinsatz"
PRU_land_effort_2_desc:0 "Trotz der zunehmenden Möglichkeiten der Luft- und Seekriegsführung bleibt der Bodenkampf auch in den Kriegen von morgen von zentraler Bedeutung. Mit entsprechender Vorbereitung können wir die Hölle der Schützengräben vermeiden."
PRU_tank_effort_2:0 "Panzerentwicklung"
PRU_tank_effort_2_desc:0 "Wir hinken bei der Entwicklung gepanzerter Fahrzeuge unseren Feinden und Verbündeten weit hinterher. Dieses Problem muss dringend gelöst werden. Wir müssen große politische Anstrengungen unternehmen, damit Deutschland uns hilft, den Rückstand schnell aufzuholen."
PRU_light_tank_effort:0 "Leichte Panzer"
PRU_light_tank_effort_desc:0 "Leichte Panzer – einfach herzustellende, mobile Fahrzeuge. Im Gegensatz zu schwereren Fahrzeugen stellen sie eine deutlich selbstfahrendere Kampfeinheit dar. Darüber hinaus sind leichte Panzer für unsere Gegend am besten geeignet."
PRU_medium_tank_effort:0 "Mittlere Panzer"
PRU_medium_tank_effort_desc:0 "Mittlere Panzer stellen den Mittelweg zwischen Panzerung, Mobilität und Feuerkraft dar. Wir können es uns nicht leisten, eine große Bandbreite an Fahrzeugen für verschiedene Aufgaben zu produzieren, daher ist es notwendig, uns auf mittlere Panzer zu konzentrieren."
PRU_create_light_divisions:0 "Leichte Panzerdivisionen"
PRU_create_light_divisions_desc:0 "Es ist notwendig, spezialisierte leichte Panzerdivisionen zu schaffen, die aus Panzerbataillonen und motorisierter Infanterie bestehen."
PRU_create_medium_divisions:0 "Mittlere Panzerdivisionen"
PRU_create_medium_divisions_desc:0 "Es ist notwendig, spezialisierte mittlere Panzerdivisionen zu schaffen, die aus Panzerbataillonen und motorisierter Infanterie bestehen."
PRU_buy_tanks:0 "Tanks kaufen"
PRU_buy_tanks_desc:0 "Wir verfügen über große Mengen Öl und Deutschland verfügt über die nötige Industriekapazität für die Panzerproduktion. Wir könnten ein für beide Seiten vorteilhaftes Handelsabkommen abschließen und deutsche Panzer als Treibstoff kaufen."
PRU_local_tanks:0 "Lokaler Blitzkrieg"
PRU_local_tanks_desc:0 "Südamerika unterscheidet sich mit seinem relativ flachen Gelände deutlich von Europa. Die Deutschen haben uns ihre Panzerkriegstaktiken beigebracht, wir müssen jedoch die Doktrin der manövrierfähigen Kriegsführung selbstständig an die Bedingungen unserer Region anpassen."
PRU_local_tanks_tech_tt:0 "Aktiviert: §HLokaler Blitzkrieg§!\n§HPanzer\n Dschungel§!: Angriff: §G+25%§!\n §!Dschungel§!: Bewegungsgeschwindigkeit: §G+20%§!\n §!Berge§!: Angriff: §G+30%§!\n §!Berge§!: Bewegungsgeschwindigkeit: §G+30%§!\n§HMotorisierte Infanterie\n Dschungel§!: Angriff: §G+25%§!\n §!Dschungel§!: Bewegungsgeschwindigkeit: §G+20%§!\n §!Berge§!: Angriff: §G+30%§!\n §!Berge§!: Bewegungsgeschwindigkeit: §G+30%§!\n§HMechanisiert Infanterie\n Dschungel§!: Angriff: §G+25%§!\n §!Dschungel§!: Bewegungsgeschwindigkeit §G+20%§!\n §!Berge§!: Angriff: §G+30%§!\n §!Berge§!: Bewegungsgeschwindigkeit: §G+30%§!\n§Gepanzerte Fahrzeuge\n Dschungel§!: Angriff: §G+25%§!\n §!Dschungel§!: Bewegungsgeschwindigkeit: §G+20%§!\n §!Berge§!: Angriff: §G+30%§!\n §!Berge§!: Bewegungsgeschwindigkeit: §G+30%§!\n"
PRU_infantry_effort_3:0 "Infanterieeinsatz"
PRU_infantry_effort_3_desc:0 "Südamerika ist eine Region mit extrem schwierigem Gelände. Wir werden nicht alle Vorteile der motorisierten Kriegsführung nutzen können, daher ist es besser, unsere Bemühungen auf den Aufbau einer großen Infanteriearmee zu konzentrieren."
PRU_motorized_effort_3:0 "Mororisierte Anstrengung"
PRU_motorized_effort_3_desc:0 "Moderne Probleme erfordern moderne Lösungen. Der Erste Weltkrieg zeigte ein trauriges Ergebnis, das zum Einsatz von Infanteriearmeen mit eingeschränkter Mobilität führte. Es ist notwendig, eine mobile Armee aufzubauen, um innerhalb weniger Tage kilometerlanges feindliches Territorium zu erobern."
PRU_motorized_effort_4:0 "Priorisierung der Fahrzeugproduktion"
PRU_motorized_effort_4_desc:0 "Um eine mobile Armee aufzubauen, ist es notwendig, spezialisierte Industriekomplexe für die Produktion von Fahrzeugen für den Bedarf der Armee zu schaffen."
PRU_land_doctrine_1:0 "Landdoktrin"
PRU_land_doctrine_1_desc:0 "Die militärischen Doktrinen, die den Bodenkampf im Ersten Weltkrieg bestimmten, sind überholt. Wir müssen unsere besten Köpfe mit der Aufgabe betrauen, das militärische Denken von morgen zu gestalten."
PRU_support_effort_2:0 "Entwicklung unterstützen"
PRU_support_effort_2_desc:0 "Keine moderne Armee kann ohne gut organisierte Logistik- und Pioniereinheiten kämpfen. Dies muss bei der Planung von Angriffen berücksichtigt werden."
PRU_special_forces_effort_1:0 "Spezialeinheiten"
PRU_special_forces_effort_1_desc:0 "Wir brauchen Elitetruppen; Gebirgsjäger und Fallschirmjäger sollten unsere Priorität sein."
PRU_air_effort_2:0 "Luftfahrtbemühungen"
PRU_air_effort_2_desc:0 "Schon der Erste Weltkrieg zeigte die Bedeutung der Luftwaffe. Im kommenden Krieg wird sie eine noch größere Rolle spielen."
PRU_fighter_effort_2:0 "Entwicklung der Kämpfer"
PRU_fighter_effort_2_desc:0 "Luftkämpfe haben im Ersten Weltkrieg noch nicht stattgefunden. Wenn wir bei der Entwicklung von Kampfflugzeugen die Nase vorn haben, werden wir auch in Zukunft einen Vorteil haben."
PRU_CAS_effort_2:0 "Luftnahunterstützung"
PRU_CAS_effort_2_desc:0 "Flugzeuge zur Unterstützung unserer Landstreitkräfte und Schiffe waren eine sehr effiziente Ergänzung bei relativ geringen Investitionen. Für diese Flugzeuge gibt es nun mehrere Verbesserungsvorschläge. Unsere Ingenieure können die nächste Generation von Unterstützungsflugzeugen entwickeln."
PRU_buy_planes:0 "Flugzeugkauf"
PRU_buy_planes_desc:0 "Wir verfügen über große Ölvorkommen und Deutschland verfügt über die nötige Industrie für die Flugzeugproduktion. Wir könnten ein für beide Seiten vorteilhaftes Handelsabkommen abschließen und deutsche Flugzeuge für unseren Treibstoff kaufen."
PRU_tactical_effort_1:0 "Entwicklung der taktischen Luftfahrt"
PRU_tactical_effort_1_desc:0 "Die Zeiten, in denen Armeen Kriege gewinnen konnten, ohne in den Himmel zu blicken, sind vorbei. Wir müssen unsere taktischen Bomber weiterentwickeln, um unseren Soldaten die Luftunterstützung zu bieten, die sie brauchen."
PRU_strat_bomber_effort_2:0 "Entwicklung strategischer Bomber"
PRU_strat_bomber_effort_2_desc:0 "Der Sieg wird durch die Zerstörung der feindlichen Industrien errungen. Wir müssen unsere Anstrengungen auf die Entwicklung und Produktion strategischer Bomber konzentrieren."
PRU_super_weapon:0 "Nukleare Anstrengungen"
PRU_super_weapon_desc:0 "Wir stehen am Rande einer weltverändernden Entdeckung und können nicht zulassen, dass andere das Feuer entfachen, das eines Tages die Erde verzehren könnte."
PRU_navy_effort_3:0 "Bemühungen der Marine"
PRU_navy_effort_3_desc:0 "Anstatt die feindlichen Schlachtschiffe zu jagen, werden wir unsere Anstrengungen darauf konzentrieren, ihnen mit unserer Flotte den größtmöglichen wirtschaftlichen Schaden zuzufügen und sie in die entsprechende Richtung zu entwickeln."
PRU_navy_effort_4:0 "Oberflächenflotte"
PRU_navy_effort_4_desc:0 "Trotz der Effektivität von U-Booten sind Überwasserschiffe immer noch die Hauptherrscher aller Ozeane."
PRU_navy_effort_5:0 "Erstellen von Raider-Schiffen"
PRU_navy_effort_5_desc:0 "Wir brauchen Hochgeschwindigkeitsschlachtschiffe, die feindliche Handelskonvois problemlos überholen und ihnen die ganze Kraft ihrer schweren Artillerie entgegenschlagen können."
PRU_navy_effort_6:0 "Fokus auf die Handelsflotte"
PRU_navy_effort_6_desc:0 "Unsere Schiffe sind nicht für direkte Kämpfe mit feindlichen Überwasserstreitkräften ausgelegt. Raider verfügen über eine gute Panzerung und hervorragende Seetüchtigkeit, die es ihnen ermöglicht, einem Kampf mit der feindlichen Flotte ohne nennenswerte Schäden auszuweichen, den Verfolgern zu entkommen und so schnell wie möglich wieder die Handelsflotte anzugreifen."
PRU_submarine_effort_1:0 "U-Boot-Anstrengungen"
PRU_submarine_effort_1_desc:0 "Der U-Boot-Krieg ist die spannendste Entwicklung in der Marine seit der Erfindung des Torpedoboots. Wir tun gut daran, uns nicht nur vor U-Booten zu schützen, sondern sie auch gegen feindliche Schiffe einzusetzen."
PRU_submarine_effort_2:0 "U-Boote kaufen"
PRU_submarine_effort_2_desc:0 "Die Deutschen werden sich nicht weigern, einige ihrer U-Boote zu verkaufen. Durch unsere Position können wir feindliche Konvois sowohl im Westatlantik als auch im Pazifik viel effizienter abfangen."
PRU_submarine_effort_3:0 "Uneingeschränkter U-Boot-Krieg"
PRU_submarine_effort_3_desc:0 "Die Geschichte hat gezeigt, dass jeder gut gemeinte Vertrag zur Kontrolle des U-Boot-Krieges das Papier nicht wert ist, auf dem er geschrieben steht. Wir sollten uns nicht an etwas gebunden fühlen, das unsere Feinde ohnehin ignorieren würden."
PRU_navy_doctrine_2:0 "Marinedoktrin"
PRU_navy_doctrine_2_desc:0 "Durch die Verbesserung der Qualität der Besatzungsausbildung und der Ausbildung der Kommandanten können wir die Effektivität unserer Flotte steigern."



PRU_communism_rise:0 "Kollektivistische Propaganda"
PRU_communism_rise_desc:0 "In der modernen Welt gibt es keinen Platz für individuellen Ruhm. Unsere Propaganda sollte kollektive Anstrengungen, übertroffene Produktionsziele, erfolgreiche Expeditionen und massive Bauprojekte stark betonen."
PRU_expand_industry:0 "Branchenaufbau"
PRU_expand_industry_desc:0 "Der Ausbau unserer Branche sollte eine der Prioritäten für das kommende Jahr sein."
PRU_five_year_plans:0 "Fünfjahrespläne"
PRU_five_year_plans_desc:0 "Aus der sowjetischen Erfahrung wissen wir bereits, dass die Fünfjahrespläne ihre volle Wirksamkeit entfalten. Es ist notwendig, entsprechende Pläne für unsere Wirtschaft zu entwickeln."
PRU_soviet_help:0 "Sowjetische Hilfe"
PRU_soviet_help_desc:0 "Die Sowjetunion verfügt über die mächtigste Rüstungsindustrie der Welt. Sie wird uns gern einen Teil ihrer Ausrüstung zur Verfügung stellen, wenn sie davon überzeugt ist, dass wir diese zum Wohle der Weltrevolution einsetzen werden."
PRU_soviet_science:0 "Sozialistische Wissenschaft"
PRU_soviet_science_desc:0 "Die Sowjetunion ist einer der führenden Staaten im Bereich der militärischen Entwicklung. Wir müssen mit ihr Kontakt aufnehmen, um wissenschaftliche und technische Unterstützung sowie Dokumentation für die neuesten Modelle der Militärindustrie anzufordern."
PRU_work_on_soviet_objects:0 "Arbeit an sowjetischen Objekten"
PRU_work_on_soviet_objects_desc:0 "In der UdSSR gibt es zahlreiche wissenschaftliche, technische und militärische Einrichtungen. Es ist notwendig, unsere Wissenschaftler dorthin zu schicken."
PRU_land_effort_3:0 "Armeeeinsatz"
PRU_land_effort_3_desc:0 "Trotz der zunehmenden Möglichkeiten der Luft- und Seekriegsführung bleibt der Bodenkampf auch in den Kriegen von morgen von zentraler Bedeutung. Mit entsprechender Vorbereitung können wir die Hölle der Schützengräben vermeiden."
PRU_infantry_effort_4:0 "Infanterieeinsatz"
PRU_infantry_effort_4_desc:0 "Südamerika ist eine Region mit extrem schwierigem Gelände. Wir werden nicht alle Vorteile der motorisierten Kriegsführung nutzen können, daher ist es besser, unsere Bemühungen auf den Aufbau einer großen Infanteriearmee zu konzentrieren."
PRU_artillery_effort_1:0 "Artillerieeinsatz"
PRU_artillery_effort_1_desc:0 "Schon während des Ersten Weltkriegs sorgte Artillerie auf den Schlachtfeldern für Schrecken. Durch die Verbesserung der Artilleriewaffen und ballistischen Ableiter werden wir in der Lage sein, den Feind zu vernichten, ohne auch nur in den Nahkampf mit ihm zu treten."
PRU_anti_effort_1:0 "AT/AA-Entwicklung"
PRU_anti_effort_1_desc:0 "In modernen Kriegen kommt eine große Vielfalt an militärischer Ausrüstung zum Einsatz. Um sie zu bekämpfen, ist die Entwicklung spezialisierter Artillerie notwendig."
PRU_infantry_effort_5:0 "Allgemeine Wehrpflicht"
PRU_infantry_effort_5_desc:0 "Um eine große Armee aufzustellen, ist eine Überarbeitung des Wehrpflichtprogramms erforderlich."
PRU_support_effort_3:0 "Entwicklung unterstützen"
PRU_support_effort_3_desc:0 "Keine moderne Armee kann ohne gut organisierte Logistik- und Pioniereinheiten kämpfen. Dies muss bei der Planung von Angriffen berücksichtigt werden."
PRU_special_forces_effort_2:0 "Spezialeinheiten"
PRU_special_forces_effort_2_desc:0 "Wir brauchen Elitetruppen; Gebirgsjäger und Fallschirmjäger sollten unsere Priorität sein."
PRU_nkvd:0 "Zusammenarbeit mit dem NKWD"
PRU_nkvd_desc:0 "Es ist notwendig, die Zusammenarbeit unseres Geheimdienstes mit dem NKWD zu intensivieren. Durch die Bündelung unserer Kräfte werden wir die militärischen Pläne des Feindes erhalten, noch bevor die Bataillone an der Front sie erreichen."
PRU_land_doctrine_2:0 "Landdoktrin I"
PRU_land_doctrine_2_desc:0 "Die militärischen Doktrinen, die den Bodenkampf im Ersten Weltkrieg bestimmten, sind überholt. Wir müssen unsere besten Köpfe mit der Aufgabe betrauen, das militärische Denken von morgen zu gestalten."
PRU_motorized_effort_5:0 "Motorische Anstrengung"
PRU_motorized_effort_5_desc:0 "Moderne Probleme erfordern moderne Lösungen. Der Erste Weltkrieg zeigte ein trauriges Ergebnis, das zum Einsatz von Infanteriearmeen mit eingeschränkter Mobilität führte. Es ist notwendig, eine mobile Armee aufzubauen, um innerhalb weniger Tage kilometerlanges feindliches Gebiet zu erobern."
PRU_heavy_tank_effort_1:0 "Schwere Panzer"
PRU_heavy_tank_effort_1_desc:0 "Schwere Panzer stellen den Höhepunkt der Panzerentwicklung dar. Riesige, unverwundbare Stahlmonster können die Verteidigung des Feindes äußerst effektiv durchbrechen."
PRU_create_heavy_divisions:0 "Schwere Panzerdivisionen"
PRU_create_heavy_divisions_desc:0 "Es ist notwendig, spezialisierte schwere Panzerdivisionen zu schaffen, die aus Panzerbataillonen und motorisierter Infanterie bestehen."
PRU_rszo_effort_1:0 "MLRS entwickeln"
PRU_rszo_effort_1_desc:0 "Mehrfachraketenwerfer sind eine vielversprechende Waffe, die die Artillerie in jeder Hinsicht übertrifft. Dank ihres geringen Gewichts kann sie auf einer Fahrzeughalterung montiert werden, um schnell an der Frontlinie zu erscheinen, dem Feind tödliche Schläge zu versetzen und sich zurückzuziehen, bevor sich der Staub gelegt hat."
PRU_create_rszo_divisions:0 "Erstellen Sie MLRS-Divisionen"
PRU_create_rszo_divisions_desc:0 "Es ist notwendig, spezialisierte mobile MLRS-Divisionen zu schaffen, die den Feind in Angst und Schrecken versetzen, wo immer sie auftauchen."
PRU_heavy_anti_effort_1:0 "Spezialtanks"
PRU_heavy_anti_effort_1_desc:0 "Wir können unsere schweren Panzer mit der besten Flugabwehr- und Panzerabwehrartillerie kombinieren."
PRU_land_doctrine_3:0 "Landdoktrin II"
PRU_land_doctrine_3_desc:0 "Die militärischen Doktrinen, die den Bodenkampf im Ersten Weltkrieg bestimmten, sind überholt. Wir müssen unsere besten Köpfe mit der Aufgabe betrauen, das militärische Denken von morgen zu gestalten."
PRU_red_army:0 "Die Rote Armee"
PRU_red_army_desc:0 "Unsere Armee muss die mächtigste auf beiden amerikanischen Kontinenten werden!"


PRU_air_effort_3:0 "Luftfahrtbemühungen"
PRU_air_effort_3_desc:0 "Schon der Erste Weltkrieg zeigte die Bedeutung der Luftwaffe. Im kommenden Krieg wird sie eine noch größere Rolle spielen."
PRU_fighter_effort_3:0 "Kämpferentwicklung"
PRU_fighter_effort_3_desc:0 "Luftkämpfe haben im Ersten Weltkrieg noch nicht stattgefunden. Wenn wir bei der Entwicklung von Kampfflugzeugen die Nase vorn haben, werden wir auch in Zukunft einen Vorteil haben."
PRU_CAS_effort_3:0 "Luftnahunterstützung"
PRU_CAS_effort_3_desc:0 "Flugzeuge zur Unterstützung unserer Landstreitkräfte und Schiffe waren eine sehr effiziente Ergänzung bei relativ geringen Investitionen. Für diese Flugzeuge gibt es nun mehrere Verbesserungsvorschläge. Unsere Ingenieure können die nächste Generation von Unterstützungsflugzeugen entwickeln."
PRU_CAS_effort_4:0 "Fliegende Artillerie"
PRU_CAS_effort_4_desc:0 "In modernen Schlachten kann die Artillerie nicht mit den Bodentruppen mithalten. CAS kann ihre Rolle übernehmen."
PRU_tactical_effort_2:0 "Entwicklung der taktischen Luftfahrt"
PRU_tactical_effort_2_desc:0 "Die Zeiten, in denen Armeen Kriege gewinnen konnten, ohne in den Himmel zu blicken, sind vorbei. Wir müssen unsere taktischen Bomber weiterentwickeln, um unseren Soldaten die Luftunterstützung zu bieten, die sie brauchen."
PRU_strat_bomber_effort_3:0 "Entwicklung strategischer Bomber"
PRU_strat_bomber_effort_3_desc:0 "Der Sieg wird durch die Zerstörung der feindlichen Industrien errungen. Wir müssen unsere Anstrengungen auf die Entwicklung und Produktion strategischer Bomber konzentrieren."
PRU_jet_effort_1:0 "Triebwerksforschung"
PRU_jet_effort_1_desc:0 "Raketen- und Düsentriebwerke ermöglichen sowohl unbemannten als auch bemannten Schiffen beispiellose Geschwindigkeiten. Die Entwicklung dieser Technologien wird es uns ermöglichen, den Feind zu überraschen."


PRU_navy_effort_7:0 "Bemühungen der Marine"
PRU_navy_effort_7_desc:0 "Wir müssen eine Flotte aufbauen, die aus leichten Schiffen besteht und in der Lage ist, unsere Küsten vor dem Feind zu schützen."
PRU_navy_effort_8:0 "Zerstöreraufwand"
PRU_navy_effort_8_desc:0 "Durch die Untersuchung der Konstruktion und des strategischen Einsatzes von U-Booten haben wir auch gelernt, wie wir diesen Strategien entgegenwirken können. Zerstörer werden dabei eine entscheidende Rolle spielen."
PRU_navy_effort_9:0 "Anstrengung der Kreuzer"
PRU_navy_effort_9_desc:0 "Bevor wir uns auf die Erforschung fortgeschrittener Schlachtschiffe konzentrieren können, müssen die kleineren Kreuzer ersetzt werden."
PRU_submarine_effort_4:0 "U-Boot-Anstrengungen"
PRU_submarine_effort_4_desc:0 "Der U-Boot-Krieg ist die spannendste Entwicklung in der Marine seit der Erfindung des Torpedoboots. Wir tun gut daran, uns nicht nur vor U-Booten zu schützen, sondern sie auch gegen feindliche Schiffe einzusetzen."
PRU_create_patrol_fleet:0 "Küstenverteidigungsgeschwader"
PRU_create_patrol_fleet_desc:0 "Es ist notwendig, ein hochmobiles Geschwader von Schiffen aufzubauen, das schnell in den Regionen erscheinen kann, in denen es benötigt wird."
PRU_nav_bomber_effort_2:0 "Entwicklung von Marinebombern"
PRU_nav_bomber_effort_2_desc:0 "Es wird für unsere Flotte nicht leicht sein, die Geschwader anderer großer Länder herauszufordern. Wir können ihre Aufgabe jedoch erheblich erleichtern, indem wir spezialisierte Flugzeuge gegen die feindliche Flotte einsetzen."
PRU_navy_doctrine_3:0 "Marinedoktrin"
PRU_navy_doctrine_3_desc:0 "Durch die Verbesserung der Qualität der Besatzungsausbildung und der Ausbildung der Kommandanten können wir die Effektivität unserer Flotte steigern."

PRU_neighbors_communism:0 "Südamerikanischer Kommunismus"
PRU_neighbors_communism_desc:0 "Uns wurde die schwierige Aufgabe anvertraut, das Proletariat auf dem gesamten südamerikanischen Kontinent zu befreien. In den Nachbarländern muss ein Propagandaprogramm gestartet werden."
PRU_ask_to_invite_PAR:0 "Einladung von Paraguay"
PRU_ask_to_invite_PAR_desc:0 "Paraguay ist das einzige Land in Südamerika, das dieselben Ziele verfolgt wie wir. Es ist notwendig, sich mit dem Vorschlag an die Sowjetunion zu wenden, sie in das Bündnis aufzunehmen."
PRU_communism_unite:0 "Rotes Kolumbien"
PRU_communism_unite_desc:0 "Es ist notwendig, den Norden unseres Kontinents, einst eine spanische Kolonie, zu einem einzigen sozialistischen Einheitsstaat zu vereinen."
PRU_punch_colonialists:0 "Vertreibe die Kolonialisten vom Kontinent"
PRU_punch_colonialists_desc:0 "Südamerika befindet sich in der Endphase der Entkolonialisierung, die europäischen Imperialisten besitzen noch immer einige Gebiete auf dem Kontinent und werden diese, ob sie wollen oder nicht, in absehbarer Zeit aufgeben müssen."
PRU_force_compliance:0 "Erzwungene Einhaltung"
PRU_force_compliance_desc:0 "Um die Gleichberechtigung des gesamten Proletariats und die Ausbreitung des Sozialismus auf dem gesamten Kontinent zu gewährleisten, ist die Errichtung von Marionettenregimen in allen Nachbarstaaten notwendig."
PRU_attack_usa:0 "Streik Vereinigte Staaten"
PRU_attack_usa_desc:0 "Die USA sind unser größter ideologischer Feind. Früher oder später musste dies geschehen. Es ist an der Zeit, den Kapitalismus in seinem Innersten zu treffen!"



PRU_industrial_effort:0 "Zentralisierung"
PRU_industrial_effort_desc:0 "Die Zentralisierung unserer Branche wird ihre Effizienz steigern und ihre Regulierung verbessern."
PRU_civilian_effort_1:0 "Zivile Industrieentwicklung I"
PRU_civilian_effort_1_desc:0 "Konzentrieren Sie alle unsere politischen Anstrengungen darauf, die zivile Industrie mit einem großen Sprung nach vorne aufzubauen."
PRU_civilian_effort_2:0 "Zivile Industrieentwicklung II"
PRU_civilian_effort_2_desc:0 "Mit eisernem Willen und einer unermüdlichen Arbeitsmoral können wir die Menschen zu einer weiteren großen industriellen Anstrengung mobilisieren."
PRU_military_effort_1:0 "Entwicklung der Militärindustrie I"
PRU_military_effort_1_desc:0 "Wer Traktoren bauen kann, kann auch Panzer bauen! Wir dürfen nicht zulassen, dass unsere militärische Produktionskapazität zurückbleibt."
PRU_military_effort_2:0 "Entwicklung der Militärindustrie II"
PRU_military_effort_2_desc:0 "Durch den weiteren Ausbau unserer Fabriken können wir die Produktion von Waren für den Handel und weitere Bauvorhaben beschleunigen."
PRU_research_slot_1:0 "Zusätzlicher Forschungsplatz"
PRU_research_slot_1_desc:0 "Unsere industrielle Expansion und andere aktuelle Fortschritte könnten es uns ermöglichen, parallel mehr Forschung und Entwicklung durchzuführen."
PRU_infrastructure_effort_1:0 "Infrastrukturaufwand I"
PRU_infrastructure_effort_1_desc:0 "Ein Land ohne angemessene Infrastruktur kann keine fortschrittlichen Projekte oder Bauvorhaben durchführen."
PRU_infrastructure_effort_2:0 "Infrastrukturmaßnahmen II"
PRU_infrastructure_effort_2_desc:0 "Durch den Ausbau unseres Infrastrukturnetzes haben wir unsere Baukapazitäten deutlich verbessert."
PRU_excavation_effort_1:0 "Aushubaufwand"
PRU_excavation_effort_1_desc:0 "Wir können die neue Infrastruktur für die Bedürfnisse der Bergbauindustrie nutzen."
PRU_research_slot_2:0 "Zusätzlicher Forschungsplatz II"
PRU_research_slot_2_desc:0 "Die schnelle Industrialisierung unseres Landes hat neue Möglichkeiten in Forschung und Entwicklung eröffnet, die wir nutzen sollten."
PRU_construction_effort_1:0 "Bauaufwand"
PRU_construction_effort_1_desc:0 "Wir müssen mehr Baustellen für unsere Industrie schaffen."



