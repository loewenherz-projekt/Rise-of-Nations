peru.9.t:0 "Sowjetischer Einfluss in Amerika"
peru.1.d:0 "Nach der Umsetzung des Militärhilfeprogramms der Sowjetunion in [PRU.GetName] wuchs der sowjetische Einfluss im Land so stark, dass nun alle politischen Maßnahmen des Landes tatsächlich von Moskau diktiert werden."
peru.1.a:0 "[SOV.GetName] wird erweitert"
peru.1.b:0 "Wir hatten keine Wahl ..."
peru.1.c:0 "Ein weiterer Sieg für Sowjetrussland"

peru.22.t:0 "[PRU.GetName] gibt die Gründung der Pazifikflotte bekannt"
peru.2.d:0 "Heute gab das Marinekommando von [PRU.GetName] offiziell die Indienststellung des letzten für die Pazifikflotte gebauten Schiffes bekannt. Es ist erwiesen, dass [PRU.GetNameDef] über mindestens vier große Schiffe, mehr als zwei Dutzend Torpedozerstörer und einige leichte Kreuzer verfügt. Experten streiten bereits darüber, ob ihre Flotte mit den Seestreitkräften pazifischer Hegemonialmächte wie [USA.GetName] und [JAP.GetName] konkurrieren und deren Dominanz in der Region verringern kann."
peru.2.a:0 "Das Gleichgewicht im Pazifik verändert sich rapide"
peru.2.b:0 "Wir haben unser Recht, den Titel einer Seemacht zu tragen, voll und ganz erklärt"
peru.2.c:0 "Es ist notwendig, neue Kraft zu überwachen"

peru.111.t:0 "[PRU.GetName] erfordert die Gründung von Red Colombia"
peru.111.desc:0 "Heute hat ein Botschafter des Staates [PRU.GetName] ein Ultimatum gestellt, in dem [PRU.GetName] die Integration unseres Landes in einen neuen kommunistischen Staat fordert. Dies würde einen vollständigen Verlust der Souveränität bedeuten, doch Widerstand könnte eine militärische Reaktion von [PRU.GetName] nach sich ziehen."
peru.111.a:0 "Wir haben keine andere Wahl, als zuzustimmen"
peru.111.b:0 "Die Souveränität unseres Heimatlandes ist unantastbar"

peru.121.t:0 "[FROM.GetName] stimmt zu"
peru.121.desc:0 "[FROM.GetName] stimmte der Integration zu. Ab heute werden unsere Länder den Weg der Annäherung beschreiten, um einen einzigen Staat zu schaffen."
peru.121.a:0 "Sie haben die richtige Wahl getroffen."

peru.120.t:0 "[FROM.GetName] ist nicht einverstanden"
peru.120.desc:0 "Die Regierung von [FROM.GetName] war mit der Integration nicht einverstanden. Ihre Führung war nicht weitsichtig genug, um alle Vorteile der Zusammenarbeit unserer Länder zu erkennen."
peru.120.a:0 "Dagegen kann man nichts tun"
peru.120.b:0 "Die diplomatischen Bemühungen sind beendet. Tanken Sie auf"


peru.210.t:0 "[PRU.GetName] fordert die Befreiung der südamerikanischen Kolonien"
peru.210.desc:0 "Heute hat ein Botschafter von [PRU.GetName] ein Ultimatum gestellt, in dem [PRU.GetName] die Freigabe aller unserer südamerikanischen Ländereien und deren Überstellung unter das Protektorat von [PRU.GetName] fordert."
peru.210.a:0 "Wir haben keine andere Wahl, als zuzustimmen"
peru.210.b:0 "Das ist unser Land!"

peru.211.t:0 "[FROM.GetName] stimmt zu"
peru.211.desc:0 "Heute haben Vertreter von [FROM.GetName] vereinbart, uns ihre Überseegebiete in Südamerika friedlich zu überlassen. Für diese Regionen ist die Ära der Unterdrückung durch die europäischen Imperialisten endlich vorbei."
peru.211.a:0 "Sie haben die richtige Wahl getroffen."

peru.212.t:0 "[FROM.GetName] ist anderer Meinung"
peru.212.desc:0 "[FROM.GetName] war nicht damit einverstanden, den Staaten, die sie seit Jahren ausbeuten, friedlich ihre Souveränität zu gewähren. Imperialisten ändern sich nie."
peru.212.a:0 "Dagegen kann man nichts tun"
peru.212.b:0 "Wir müssen sie vom Kontinent vertreiben!"

peru.310.t:0 "[PRU.GetName] fordert die Befreiung der südamerikanischen Kolonien"
peru.310.desc:0 "Heute hat ein Botschafter von [PRU.GetName] ein Ultimatum gestellt, in dem [PRU.GetName] die Freigabe aller unserer südamerikanischen Ländereien und deren Überstellung unter das Protektorat von [PRU.GetName] fordert."
peru.310.a:0 "Wir haben keine andere Wahl, als zuzustimmen"
peru.310.b:0 "Das ist unser Land!"

