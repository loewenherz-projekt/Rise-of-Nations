l_german:
 #options
 cp.1.t:0 "Willkommen bei Colored Puppets &amp; Country specific names"
 cp.1.d:0 "Mit diesem Mod können Sie die Farbe Ihrer Puppenzustände ändern. Beachten Sie, dass die Änderung der Farbe eines Zustands, der seinen Namen oder seine Farbe aufgrund einer Aktion in einem Spiel mit einem anderen Mod geändert hat, diese Änderung möglicherweise für immer verloren geht. Entscheiden Sie vor Spielbeginn, ob die KI die Farbe ihrer eigenen Puppenzustände ändern soll oder nicht."
 cp.1.a:0 "Lassen Sie die KI die Farben ändern"
 cp.1.b:0 "KI daran hindern, Farben zu ändern"
 #decisions
 colored_puppets_set:0 "CP&amp;CSN (Satz)"
 colored_puppets_reset:0 "CP&amp;CSN (Wiederherstellen)"
 colour_puppet:0 "Farbe und Namen von [From.GetName] ändern"
 reset_color:0 "Farbe und Namen wiederherstellen"
 cp_start:0 "Mod gestartet"
 color_changed:0 "Farbe und Name geändert"
 remove_color:0 "Farbe und Namen von [From.GetName] wiederherstellen"
