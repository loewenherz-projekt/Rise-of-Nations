 COL_army_production:0 "Produktion für die Kriegsanstrengungen"
 COL_army_production_desc:0 "Es ist Zeit, in die Rüstungsindustrie zu investieren. Das wird Arbeitsplätze schaffen und unsere Armee stärker machen."
 COL_war_with_peru_experience:0 "Erfahrungen aus dem Krieg mit Peru"
 COL_war_with_peru_experience_desc:0 "Zeit, sich die After Action Reports anzusehen und zu analysieren, was wir richtig und was wir falsch gemacht haben, um unsere Doktrinen und Taktiken zu verbessern"
 COL_yarumos:0 "Anstrengung der Dschungelarmee"
 COL_yarumos_desc:0 "Unser Landkreis befindet sich in einer rauen Umgebung, wir müssen handeln! „Das führt letztendlich dazu, dass wir eine Vorlage für die Dschungeldivision bekommen.“"  
 COL_awaite:0 "Aufklärungsbemühungen"
 COL_awaite_desc:0 "Mit Unterstützungsbataillonen und Ausrüstung kann der Kampf in unwegsamem Gelände einfach sein. Nach dem Freischalten von Aufklärung + Feldlazarett erhalten Sie einige kostenlose Divisionsvorlagen"
 COL_equipment_effort:0 "Geräteaufwand"
 COL_equipment_effort_desc:0 "Die Grenzen der Ausrüstung, die von Infanterie getragen werden kann, werden ständig erweitert. Wir werden uns darauf konzentrieren, unseren Truppen die beste verfügbare Ausrüstung zur Verfügung zu stellen."
 COL_hermano_bolivariano:0 "Bolivarischer Bruder"
 COL_hermano_bolivariano_desc:0 "Unsere bolivarische Vergangenheit ruft uns dazu auf, eine neue und starke Nation zu sein. Der Versuch, Venezuela kampflos zu annektieren, ist wahrscheinlicher, wenn beide Regierungen die gleiche Ideologie vertreten, auch wenn beide faschistisch sind. Dies wird durch die Kriegserklärung an Venezuela umgangen."
 COL_industrial_effort:0 "Industrielle Anstrengungen"
 COL_industrial_effort_desc:0 "Konzentrieren Sie alle unsere politischen Anstrengungen darauf, die zivile Industrie mit einem großen Sprung nach vorne aufzubauen."
 COL_acerias_pdr:0 "Industriebetrieb in Paz de Rio"
 COL_acerias_pdr_desc:0 "Wir haben sowohl Kohle als auch Eisen. Mit ausländischen Investitionen können wir mehr Stahl produzieren. Wir müssen uns dem „Freihandel“ öffnen!"
 COL_puerto_buenaventura:0 "Eje Buenaventura-Cali" 
 COL_puerto_buenaventura_desc:0 "Es ist Zeit, die fruchtbaren Ebenen des Valle del Cauca mit dem Tiefseehafen von Buenaventura zu verbinden"
 COL_indumil:0 "INDUMIL I"
 COL_indumil_desc:0 "Es ist Zeit, die Industria Militar wieder groß zu machen."
 COL_infrastructure_caribe:0 "Verbesserung der Karibikküste"
 COL_infrastructure_caribe_desc:0 "Es können viele Anstrengungen unternommen werden, um den Fluss Magdalena mit Cartagena zu verbinden, den Hafen in Barranquilla zu verbessern und die wachsende Industrie in Medellin zu unterstützen."
 COL_indumil_2:0 "INDUMIL II"
 COL_indumil_2_desc:0 "Es sind schlimme Zeiten angebrochen! Es ist Zeit, mit der zweiten Phase der Verbesserung der Militärindustrie zu beginnen."
 COL_indumil_3:0 "INDUMIL III"
 COL_indumil_3_desc:0 "Dies ist die dritte und letzte Phase der Branchenverbesserung. Hoffentlich brauchen wir keine weiteren."
 COL_fortify_caribe:0 "Befestigen Sie die Karibikküste"
 COL_fortify_caribe_desc:0 "Großmächte können keine Seeinvasionen in den USA durchführen."
 COL_fortify_caribe_aa:0 "Befestigen Sie die Karibikküste AA"
 COL_fortify_caribe_aa_desc:0 "Unsere karibische Mauer wird den Himmel erreichen!" 
 COL_infrastructure_harsh:0 "Infrastrukturaufwand"
 COL_infrastructure_harsh_desc:0 "Es ist Zeit, die wilden Regionen Kolumbiens zu zähmen" 
 COL_industry_effort_2:0 "Industrielle Anstrengung II"
 COL_industry_effort_2_desc:0 "Verbesserungen im Bauingenieurwesen, wir erkennen, dass eine große Armee eine große Industrie hinter sich braucht"
 COL_war_with_andeans:0 "Krieg mit den Andenbewohnern"
 COL_war_with_andeans_desc:0 "Es ist an der Zeit, Peru und Bolivien davon zu überzeugen, sich unserer großen Sache anzuschließen. Die Anden sind schwer zu bewältigen. Die neue Fallschirmjägerdivision Condor wird bei der Kampagne helfen"
 COL_etnocacerismo:0 "Ethnocacerismo"
 COL_etnocacerismo_desc:0 "Der erste „Unabhängigkeitsschrei“ kam von Tupac Amaruc. Es ist Zeit, alle Andenbewohner unter denselben Werten zu vereinen!"
 COL_etnocacerismo_2:0 "Ethnocacerismo II"
 COL_etnocacerismo_2_desc:0 "Wir sind jetzt nahe daran, eine große, untrennbare Nation zu sein" 
 COL_altillanura_ress:0 "Erkunden Sie die Orinoquia"
 COL_altillanura_ress_desc:0 "Es ist Zeit, in die große Region Orinoquia zu investieren, die Kautschukproduktion zu verbessern und die Bauxitvorkommen auszugraben."
 COL_gran_colombia:0 "Anspruch auf Gran Colombia"
 COL_gran_colombia_desc:0 "Nur eine große Nation zu sein, ist eine Garantie, die Bedrohungen in der Welt zu überleben"
 COL_motorization_effort:0 "Motorisierungsbemühungen"
 COL_motorization_effort_desc:0 "Mobilität und Schutz sind entscheidend für den sicheren Transport der Infanterie ins Feld und wieder hinaus. Wenn wir uns auf diese Entwicklungen konzentrieren, können wir schnell handeln."
 COL_doctrine_effort:0 "Lehrbemühungen"
 COL_doctrine_effort_desc:0 "Die militärischen Doktrinen, die den Bodenkampf im Ersten Weltkrieg definierten, sind überholt. Wir müssen unsere besten Köpfe mit der Aufgabe betrauen, das militärische Denken von morgen zu gestalten. Auch wenn wir in den Bergen leben, müssen wir uns darauf spezialisieren"
 COL_equipment_effort_2:0 "Ausrüstungsaufwand II"
 COL_equipment_effort_2_desc:0 "Wir werden unsere Bemühungen fortsetzen, sicherzustellen, dass unsere Infanterie- und Unterstützungstruppen mit der bestmöglichen Ausrüstung unserer Zeit ausgestattet sind."
 COL_mechanization_effort:0 "Mechanisierungsbemühungen"
 COL_mechanization_effort_desc:0 "Indem wir die Möglichkeiten der „motorisierten Infanterie“ überdenken, können wir die Grenzen der heute konstruierbaren Fahrzeuge erweitern."
 COL_doctrine_effort_ii:0 "Lehrbemühung II"
 COL_doctrine_effort_ii_desc:0 "Das Schlachtfeld hat sich nicht nur in den Jahren zwischen den Weltkriegen, sondern auch im Laufe der jüngsten Konflikte verändert. Es ist Zeit, sich an unsere Umgebung anzupassen und im rauen Dschungel zu kämpfen."
 COL_doctrine_effort_iii:0 "Lehrbemühung III"
 COL_doctrine_effort_iii_desc:0 "Es ist endlich an der Zeit, unsere Doktrinänderungen abzuschließen, und wir hoffen, dass sie für dieses Jahrhundert der Unsicherheit ausreichen."
 COL_equipment_effort_3:0 "Ausrüstungsaufwand III"
 COL_equipment_effort_3_desc:0 "Anstatt ausländische Ausrüstung zu imitieren oder zu kaufen, sollten wir darauf abzielen, das weltweit führende Land in der Entwicklung von Infanteriewaffen zu werden." 
 COL_tanque_ligero:0 "Leichte Rüstung"
 COL_tanque_ligero_desc:0 "Wir haben vielleicht nicht die Ressourcen, um die großen Maschinen zu bauen, aber die leichte Version ist gut genug für uns" 
 COL_armor_effort:0 "Rüstungsaufwand"
 COL_armor_effort_desc:0 "Durch die Anwendung unserer Erkenntnisse können wir auch unsere mittelschweren und leicht gepanzerten Fahrzeuge verbessern." 
 COL_arma_comunicaciones:0 "Signalaufwand"
 COL_arma_comunicaciones_desc:0 "Die §Yarma de comunicaciones§! wurde 1929 gegründet, jetzt ist es Zeit, dass wir unsere Technologie verbessern, um es wert zu machen"
 COL_support_effort:0 "Unterstützungsaufwand"
 COL_support_effort_desc:0 "Die Anpassung an den Dschungel und das Hochgebirge ist nicht kostenlos, sie erfordert Ausrüstung; §YUnterstützungsausrüstung§!" 
 COL_nuclear_effort:0 "Nukleare Anstrengungen"
 COL_nuclear_effort_desc:0 "Wir stehen am Rande einer weltverändernden Entdeckung und können nicht zulassen, dass andere das Feuer entfachen, das eines Tages die Erde verzehren könnte."
 COL_extra_tech_slot:0 "Zusätzlicher Forschungsplatz"
 COL_extra_tech_slot_desc:0 "Unsere industrielle Expansion und andere aktuelle Fortschritte könnten es uns ermöglichen, parallel mehr Forschung und Entwicklung durchzuführen."
 COL_extra_tech_slot_2:0 "Zusätzlicher Forschungsplatz II"
 COL_extra_tech_slot_2_desc:0 "Die schnelle Industrialisierung unseres Landes hat neue Möglichkeiten in Forschung und Entwicklung eröffnet, die wir nutzen sollten."
 COL_technology_sharing:0 "Technologieaustausch"
 COL_technology_sharing_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion die Forschung und Entwicklung im Kriegsfall effizienter durchführen."
 COL_secret_weapons:0 "Geheimwaffen"
 COL_secret_weapons_desc:0 "Es ist verlockend, alle unsere zusätzlichen Ressourcen für die Entwicklung von Panzern und Flugzeugen aufzuwenden, aber das Geheimnis, Kriege zu gewinnen, liegt in einem völlig neuen Wissenschaftsbereich: der Elektronik, Raketentechnik und Nuklearforschung."
 COL_political_effort:0 "Politische Bemühungen"
 COL_political_effort_desc:0 "Um Veränderungen in der Welt herbeizuführen, müssen wir in der Lage sein, Veränderungen in unserem eigenen Land herbeizuführen. Die Stärkung unserer politischen Position sollte dabei an erster Stelle stehen."
 COL_collectivist_ethos:0 "Kollektivistisches Ethos"
 COL_collectivist_ethos_desc:0 "Unsere Feinde mögen kleinere Nationen spalten und erobern, aber unser Volk wird vereint bleiben. Einer für alle, alle für einen."
 COL_liberty_ethos:0 "Freiheitsethos"
 COL_liberty_ethos_desc:0 "In dieser Zeit ideologischer Fanatiker, die den menschlichen Geist ersticken wollen, werden wir die individuellen Freiheiten und die Unabhängigkeit schützen."
 COL_militarismx:0 "Militarismus"
 COL_militarismx_desc:0 "Wer das Militär als notwendiges Übel betrachtet, ist dazu verdammt, angesichts des Krieges zu zögern. Wir werden den Militarismus in unsere Kultur einprägen, um ein Volk von Soldaten zu werden."
 COL_political_correctness:0 "Politische Korrektur"
 COL_political_correctness_desc:0 "Es ist Zeit, die politische Unterstützung für die Gründung der Gran Colombian Socialist Union in @COL, @ECU und @VEN zu korrigieren."
 COL_neutrality_focus:0 "Neutralitätsfokus"
 COL_neutrality_focus_desc:0 "Während andere behaupten, dass es Mut und Weisheit erfordert, in einem globalen Konflikt Partei zu ergreifen, wissen wir, dass es mehr erfordert, sich zu weigern."
 COL_interventionism_focus:0 "Interventionismus-Fokus"
 COL_interventionism_focus_desc:0 "Wir schätzen die Freiheit aller Menschen, nicht nur unserer eigenen Bürger. Wenn die Verhinderung von Tyrannei Krieg bedeutet, dann ist das so."
 COL_military_youth:0 "Militärjugend"
 COL_military_youth_desc:0 "Organisationen zur Förderung der Disziplin und politischen Bildung junger Menschen in unserem Land werden frühzeitig Loyalität und Selbstaufopferung fördern."
 COL_deterrence:0 "Abschreckung"
 COL_deterrence_desc:0 "Wenn wir allein dastehen, profitieren wir selten vom Krieg. Glücklicherweise wissen wir, dass die beste Verteidigung eine ist, die so bekannt ist, dass man sie nie anwenden muss."
 COL_volunteer_corps:0 "Freiwilligenkorps"
 COL_volunteer_corps_desc:0 "Unser Volk zu zwingen, für die Ideale der Freiheit zu sterben, wäre eine Ironie des Schicksals. Doch die Schaffung von Mitteln für diejenigen, die Menschen im Ausland helfen möchten, ist es nicht."
 COL_paramilitarism:0 "Paramilitarismus"
 COL_paramilitarism_desc:0 "Militärische Prinzipien finden auch außerhalb des Militärs Anwendung. Mit der Entwicklung halbmilitarisierter Einheiten zur Ergänzung unserer Streitkräfte werden mehr Menschen eine militärische Ausbildung erhalten."
 COL_indoctrination_focus:0 "Indoktrination"
 COL_indoctrination_focus_desc:0 "Die Macht des Proletariats ist unaufhaltsam. Immer mehr Brüder können sich uns anschließen, wenn wir sie indoktrinieren. Jetzt erhalten @BOL und @PRU eine politische Korrektur"
 COL_foreign_expeditions:0 "Auslandsexpeditionen"
 COL_foreign_expeditions_desc:0 "Da unsere Feinde bereit sind, im Namen ihrer Ideale in weit entfernte Konflikte einzugreifen, müssen wir bereit sein, dasselbe für unsere zu tun."
 COL_why_we_fight:0 "Warum wir kämpfen"
 COL_why_we_fight_desc:0 "Die Welt wird immer unsicherer. Unsere Bevölkerung muss die Gräueltaten der Machtgierigen sehen. Es ist Zeit, die Bevölkerung für unsere Sache zu gewinnen und sicherzustellen, dass alle bereit sind, für unsere Freiheit zu kämpfen."
 COL_political_commissars:0 "Politische Kommissare"
 COL_political_commissars_desc:0 "Um sicherzustellen, dass unsere Richtlinien in der militärischen Praxis befolgt werden, werden wir politisch ernannte Beamte in die militärischen Ränge aufnehmen."
 COL_internationalism_focus:0 "Internationalismus-Fokus"
 COL_internationalism_focus_desc:0 "Ideologie kennt keine Grenzen. Eine andere Nation mag sich als souverän bezeichnen, doch unsere Überzeugungen stehen über solchen Ansprüchen."
 COL_nationalism_focus:0 "Fokus auf Nationalismus"
 COL_nationalism_focus_desc:0 "Unsere Nation ist einzigartig und unsere politischen Errungenschaften konnten nur hier erzielt werden. Dafür müssen wir um jeden Preis kämpfen."
 COL_ideological_fanaticism:0 "Ideologischer Fanatismus"
 COL_ideological_fanaticism_desc:0 "Unsere politisch etablierten Werte und Ziele sind es wert, für sie zu sterben, genauso wie für jeden alten Glauben. Jeder Anhänger sollte darauf vorbereitet sein, dem Tod ins Auge zu sehen, und diejenigen, die vom Glauben abirren, sollten besser darauf vorbereitet sein, dem Tod ins Auge zu sehen."
 COL_mosquitos:0 "Legitimieren Sie La Gran Colombia"
 COL_mosquitos_desc:0 "Es ist Zeit, die Großkolumbianer als Teil einer vereinten Nation zu bezeichnen. Vergessen Sie nicht die Mückenküste! Sie war Teil Großkolumbiens und muss es wieder sein! Marinesoldaten werden in der Karibik und bei der Überquerung des großen Flusses in Südamerika benötigt."  
 COL_avion_ligero_focus:0 "Leichte Luft"
 COL_avion_ligero_focus_desc:0 "Wir konzentrieren uns auf die Entwicklung leichterer Flugzeugdesigns, um den Weg für größere Projekte zu ebnen"
 COL_avion_pesado_focus:0 "Schwere Luft"
 COL_avion_pesado_focus_desc:0 "Wenn die Menschen in Zukunft von den Schrecken der heutigen Kriege sprechen, wird Feuer, das vom Himmel regnet, das Hauptthema sein. Wir werden unser Bestes tun, um sicherzustellen, dass diese Geschichten auch von unseren Feinden erzählt werden."
 COL_avion_production:0 "Luftproduktion"
 COL_avion_production_desc:0 "Unsere Produktionskapazität ist begrenzt. Es ist Zeit, zwischen Luftwaffe oder Marine zu wählen"
 COL_naval_air_effort:0 "Luftangriffe der Marine"
 COL_naval_air_effort_desc:0 "Die Effizienz von Luftangriffen auf Seeziele wurde von den Amerikanern bereits 1921 unter Beweis gestellt. Wir sollten diesen Zweig der Luftwaffe nicht vernachlässigen, wenn wir Krieg gegen eine Seemacht führen wollen."  
 COL_aviation_effort:0 "Luftfahrtbemühungen"
 COL_aviation_effort_tt:0 "Nicht genügend Bauplätze für §YAir Base§!"
 COL_aviation_effort_desc:0 "Kein anderer Zweig ist stärker von der Technologie abhängig als die Luftwaffe. Wenn wir eine starke, moderne Nation sein wollen, müssen wir die Flugzeugtechnik beherrschen."
 COL_aviation_effort_2:0 "Luftfahrtbemühungen II"
 COL_aviation_effort_2_desc:0 "Um unsere Luftwaffe gut in andere Zweige des Militärs zu integrieren, sind weitere Fortschritte in der Luftfahrt erforderlich."
 COL_CAS_effort:0 "CAS-Aufwand"
 COL_CAS_effort_desc:0 "Eine moderne Armee benötigt nicht nur am Boden, sondern auch in der Luft die Unterstützung durch Fahrzeuge."
 COL_rocket_effort:0 "Raketenanstrengung"
 COL_rocket_effort_desc:0 "Raketen und Düsentriebwerke ermöglichen sowohl unbemannten als auch bemannten Schiffen beispiellose Geschwindigkeiten. Die Entwicklung dieser Technologien wird es uns ermöglichen, den Feind zu überraschen."
 COL_NAV_effort:0 "NAV-Aufwand"
 COL_NAV_effort_desc:0 "So wie die neue Seekriegsführung teilweise unter der Wasseroberfläche stattfindet, findet ein Teil davon in der Luft über dem Wasser statt."
 COL_naval_effort:0 "Marinebemühungen"
 COL_naval_effort_tt:0 "Nicht genügend Bauplätze für §YNaval Dockyards§!"
 COL_naval_effort_desc:0 "Der Ausbau unserer Marine sollte unsere oberste Priorität sein. Alle verfügbaren Ressourcen sollten für neue Werften und die Erforschung leichter Überwasserschiffe eingesetzt werden."
 COL_doctrine_navy:0 "Marinedoktrin"
 COL_doctrine_navy_desc:0 "Neuerfindung der Seekriegsführung"
 COL_navy_production:0 "Marineproduktion"
 COL_navy_production_desc:0 "Unsere Produktionskapazität ist begrenzt. Es ist Zeit, zwischen Air oder Navy zu wählen"
 COL_submarine_effort:0 "U-Boot-Anstrengungen"
 COL_submarine_effort_desc:0 "Der U-Boot-Krieg ist die spannendste Entwicklung in der Marine seit der Erfindung des Torpedoboots. Wir tun gut daran, uns nicht nur vor U-Booten zu schützen, sondern sie auch gegen feindliche Schiffe einzusetzen."
 COL_heavy_cruisers:0 "Schwerer Kreuzer-Einsatz"
 COL_heavy_cruisers_desc:0 "Bevor wir in die fortgeschrittene Schlachtschiffforschung einsteigen, müssen die kleineren Kreuzer durch Hauptschiffe ersetzt werden."
 COL_cruiser_effort:0 "Produktion schwerer Kreuzer"
 COL_cruiser_effort_desc:0 "U-Boote können eine Zeit lang gut sein, aber das eigentliche Problem sind Großkampfschiffe" 
 COL_mobile_effort:0 "Mobiler Aufwand"
 COL_mobile_effort_desc:0 "Für U-Boote und Zerstörer"
 COL_carriers_effort:0 "Trägeraufwand"
 COL_carriers_effort_desc:0 "Die Nation mit den meisten Flugzeugträgern wird die Weltmeere beherrschen. Flugzeugträger stellen die neue Form der Seeüberlegenheit dar."  
 COL_armor_support:0 "Rüstungsaufwand II"
 COL_armor_support_desc:0 "Lernen Sie, sich nie zu übernehmen. Mangelnde Versorgung kann tödlich sein"  
 COL_axis_leanings_focus:0 "Befriend Germany"
 COL_axis_leanings_focus_desc:0 "Die Achse bringt einige technologische Vorteile mit sich. "   
 COL_axis_leanings_focus_2:0 "Befreunde dich mit Deutschland II"
 COL_axis_leanings_focus_2_desc:0 "Mehr Technik auf Kosten einiger Exporte"  
 COL_montana_effort:0 "Alta Montaña-Anstrengung"
 COL_montana_effort_desc:0 "Es ist Zeit, sich auf den Krieg in „Los Andes“ vorzubereiten!" 
 COL_explore_amazonia:0 "Entdecken Sie das Amazonasgebiet"
 COL_explore_amazonia_desc:0 "Der Staat kontrolliert die Kautschukproduktion in Guaviarie nicht vollständig. Es ist Zeit, unseren legitimen Staat in die Verantwortung zu nehmen. Auch unsere Truppen können einiges über das Überleben im Dschungel lernen."
 COL_minning:0 "Großbergbau"
 COL_minning_desc:0 "Die ersten Erkundungen unseres Geländes lassen darauf schließen, dass hier eine große Menge Erze vorhanden ist, die nur darauf warten, abgebaut zu werden. Wir müssen die Infrastruktur aufbauen, um die Grundlage für den Abbau zu schaffen."
 COL_hidroelectrics:0 "Wasserkraft"
 COL_hidroelectrics_desc:0 "Die Geographie unseres Landes ist ideal für den Bau von Staudämmen, da wir jetzt in ein neues Zeitalter der Elektronik eintreten."
 COL_coffee_growth:0 "Kaffeewachstum"
 COL_coffee_growth_desc:0 "Die Nachfrage nach Kaffee steigt weltweit und die Preise steigen. Wir werden diese Lücke füllen."
 COL_conquistador:0 "Der Konquistador"
 COL_conquistador_desc:0 "Nachdem unser Oberkommando ganz Südamerika unter einer einzigen Flagge vereint hat, gibt es seine Erfahrungen weiter und steigert so unsere Kampfkraft."
 COL_caribe:0 "Die Karibik"
 COL_caribe_desc:0 "Die Karibik"
 COL_reconquista:0 "Rückeroberung"
 COL_rockets:0 "Raketen"
 COL_rockets_desc:0 "Zuschüsse zur Raketenentwicklung."
 COL_ATs:0 "AT-Ausrüstung"
 COL_ATs_desc:0 "Zuschüsse für die Entwicklung von AT-Geräten."
