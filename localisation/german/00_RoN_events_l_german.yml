change_era.3.t:0 "Bonus-Forschungsslot"
change_era.3.d:0 "Forschung und Entwicklung (F&amp;E, F+E) umfasst die Gesamtheit innovativer Aktivitäten von Unternehmen oder Regierungen zur Entwicklung neuer Dienstleistungen oder Produkte sowie zur Verbesserung bestehender. Forschung und Entwicklung stellen die erste Phase der Entwicklung einer potenziellen neuen Dienstleistung oder des Produktionsprozesses dar. Die F&amp;E-Aktivitäten unterscheiden sich von Institution zu Institution. Dabei gibt es zwei Hauptmodelle[1] einer F&amp;E-Abteilung: Entweder sind sie mit Ingenieuren besetzt und direkt mit der Entwicklung neuer Produkte beauftragt, oder sie sind mit Industriewissenschaftlern besetzt und mit angewandter Forschung in wissenschaftlichen oder technologischen Bereichen betraut, die die zukünftige Produktentwicklung erleichtern kann. F&amp;E unterscheidet sich von den meisten Unternehmensaktivitäten dadurch, dass sie nicht auf unmittelbaren Gewinn abzielt und im Allgemeinen mit höheren Risiken und einer ungewissen Kapitalrendite verbunden ist. Dennoch ist F&amp;E von entscheidender Bedeutung, um durch die Vermarktung neuer Produkte größere Marktanteile zu gewinnen."
change_era.3.a:0 "OK"

change_era.4.t:0 "Wirtschaftskrise"
change_era.4.d:0 "Eine Finanzkrise ist eine von vielen Situationen, in denen Finanzanlagen plötzlich einen großen Teil ihres Nominalwerts verlieren. Im 19. und frühen 20. Jahrhundert waren viele Finanzkrisen mit Bankenpaniken verbunden, und viele Rezessionen fielen mit diesen Paniken zusammen. Weitere Situationen, die oft als Finanzkrisen bezeichnet werden, sind Börsencrashs und das Platzen anderer Finanzblasen, Währungskrisen und Staatsbankrotte. Finanzkrisen führen direkt zum Verlust von Papiervermögen, aber nicht unbedingt zu signifikanten Veränderungen in der Realwirtschaft (wie z. B. die Krise infolge der berühmten Tulpenblase im 17. Jahrhundert). Viele Ökonomen haben Theorien darüber aufgestellt, wie Finanzkrisen entstehen und wie sie verhindert werden könnten. Es besteht jedoch kein Konsens, und Finanzkrisen treten weiterhin von Zeit zu Zeit auf."
change_era.4.a:0 "OK"

change_era.5.t:0 "Wirtschaftskrise"
change_era.5.d:0 "Eine Finanzkrise ist eine von vielen Situationen, in denen Finanzanlagen plötzlich einen großen Teil ihres Nominalwerts verlieren. Im 19. und frühen 20. Jahrhundert waren viele Finanzkrisen mit Bankenpaniken verbunden, und viele Rezessionen fielen mit diesen Paniken zusammen. Weitere Situationen, die oft als Finanzkrisen bezeichnet werden, sind Börsencrashs und das Platzen anderer Finanzblasen, Währungskrisen und Staatsbankrotte. Finanzkrisen führen direkt zum Verlust von Papiervermögen, aber nicht unbedingt zu signifikanten Veränderungen in der Realwirtschaft (wie z. B. die Krise infolge der berühmten Tulpenblase im 17. Jahrhundert). Viele Ökonomen haben Theorien darüber aufgestellt, wie Finanzkrisen entstehen und wie sie verhindert werden könnten. Es besteht jedoch kein Konsens, und Finanzkrisen treten weiterhin von Zeit zu Zeit auf."
change_era.5.a:0 "OK"

