AM_political.11.desc:0 "Manche werden sagen, sie hätten es kommen sehen. Sowohl diejenigen, die vor den Gefahren des Nationalsozialismus warnten, als auch diejenigen, die ihn als Retter von [Root.GetName] priesen, haben heute ihre Prophezeiungen wahr werden sehen, als das Militär in [Root.Capital.GetName] die von [Root.GetRulingParty] geführte Regierung stürzte und die Macht übernahm. [Root.GetLeader] wird vermisst und soll Gerüchten zufolge ins Exil gegangen sein, und der Putsch stieß zunächst auf wenig Widerstand.\n\nAuch die neue [Root.GetAdjective]-Führung hat nicht vor, den Widerstand wachsen zu lassen. Das Kriegsrecht wurde ausgerufen, und angesichts der laufenden Veränderungen dürfte sich das, was danach kommt, kaum ändern." 

