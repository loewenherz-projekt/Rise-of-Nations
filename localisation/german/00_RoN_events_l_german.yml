RON_WELCOME_TO_WW1_DESCRIPTION:0 "Dieses Ereignis soll als Brücke zwischen der Ära des Beginns des neuen Jahrhunderts (1900–1909) (DNC) und der Ära des Ersten Weltkriegs (1910–1918) (WW1) dienen. Fokusbäume, Parteinamen, Generäle, Politiker und andere können neu geladen werden, um ein kontinuierliches Gameplay zu ermöglichen."
RON_WELCOME_TO_INT_DESCRIPTION:0 "Dieses Event soll als Brücke zwischen der Zeit des Ersten Weltkriegs (1910–1918) (WW1) und der Zwischenkriegszeit (1919–1932) (INT) dienen. Fokusbäume, Parteinamen, Generäle, Politiker und andere können neu geladen werden, um ein kontinuierliches Gameplay zu ermöglichen."
RON_WELCOME_TO_WW2_DESCRIPTION:0 "Dieses Event soll als Brücke zwischen der Zwischenkriegszeit (1919–1932) (INT) und der Zeit des Zweiten Weltkriegs (1933–1948) (WW2) dienen. Fokusbäume, Parteinamen, Generäle, Politiker und mehr können neu geladen werden, um ein kontinuierliches Gameplay zu ermöglichen."
RON_WELCOME_TO_ECW_DESCRIPTION:0 "Dieses Event soll als Brücke zwischen der Zeit des Zweiten Weltkriegs (1933–1948) und der frühen Ära des Kalten Krieges (1949–1979) dienen. Fokusbäume, Parteinamen, Generäle, Politiker und mehr können neu geladen werden, um ein kontinuierliches Gameplay zu ermöglichen."
RON_WELCOME_TO_LCW_DESCRIPTION:0 "Dieses Event soll als Brücke zwischen der frühen Ära des Kalten Krieges (1949–1979) (ECW) und der späten Ära des Kalten Krieges (1980–1999) (LCW) dienen. Fokusbäume, Parteinamen, Generäle, Politiker und andere Elemente können neu geladen werden, um ein kontinuierliches Gameplay zu ermöglichen."
RON_WELCOME_TO_MD_DESCRIPTION:0 "Dieses Event soll als Brücke zwischen der späten Ära des Kalten Krieges (1980–1999) (LCW) und der modernen Ära (2000+) (MD) dienen. Fokusbäume, Parteinamen, Generäle, Politiker und andere können neu geladen werden, um ein kontinuierliches Gameplay zu ermöglichen."

