 as_waffen_ss.1.title:0 "Bildung der Leibstandarte Adolf Hitler Division"
 as_waffen_ss.1.desc:0 "Die 1. SS-Panzerdivision „Leibstandarte SS Adolf Hitler“ begann als Adolf Hitlers persönliche Leibwache und war für den Schutz der Person, der Büros und der Residenzen des Führers verantwortlich. Ursprünglich so groß wie ein Regiment, wuchs die LSSAH schließlich zu einer Eliteeinheit in Divisionsgröße heran."
 as_waffen_ss.1.option_a:0 "Ausgezeichnet (Historisch)"
 as_waffen_ss.1.option_b:0 "Wir brauchen nur die Wehrmacht"
 as_waffen_ss.2.title:0 "Bildung der Division Das Reich"
 as_waffen_ss.2.desc:0 "The 2nd SS Panzer Division Das Reich was an elite division of the Nazi Waffen-SS during World War II. In October 1939 the SS-Verfügungstruppe (SS-VT) regiments, Deutschland, Germania and Der Führer, were organized into the SS-Verfügungs-Division with Paul Hausser as commander. It would eventually be known as the Das Reich SS-Panzer-Division."
 as_waffen_ss.2.option_a:0 "Ausgezeichnet (Historisch)"
 as_waffen_ss.2.option_b:0 "Wir brauchen nur die Wehrmacht"
 as_waffen_ss.3.title:0 "Bildung der Totenkopf-Division"
 as_waffen_ss.3.desc:0 "Die 3. SS-Panzer-Division Totenkopf (Totenkopf), während ihrer Existenz auch als 3. SS-Panzergrenadier-Division Totenkopf oder 3. SS-Division Totenkopf bekannt, war eine von 38 Divisionen der Waffen-SS."
 as_waffen_ss.3.option_a:0 "Ausgezeichnet (Historisch)"
 as_waffen_ss.3.option_b:0 "Wir brauchen nur die Wehrmacht"
 as_waffen_ss.4.title:0 "Gründung der Polizeidivision"
 as_waffen_ss.4.desc:0 "Die Polizeidivision wurde im Oktober 1939 gegründet, als 15.000 Angehörige der Ordnungspolizei eingezogen und zusammen mit Artillerie- und Nachrichteneinheiten eingesetzt wurden, die von der Armee übernommen wurden. Diese Männer wurden nicht in die SS aufgenommen und blieben Polizisten, wobei sie ihre Orpo-Rangordnung und -Abzeichen behielten. Himmlers Ziel bei der Gründung der Division war es, in einer Zeit hitziger bürokratischer Machtkämpfe und des Wettbewerbs um Arbeitskräfte die Rekrutierungsbeschränkungen zu umgehen, die die Wehrmacht der SS auferlegt hatte. Gleichzeitig bot sie seinen Polizisten die Möglichkeit, ihrer Wehrpflicht nachzukommen und der Wehrpflicht zu entgehen."
 as_waffen_ss.4.option_a:0 "Ausgezeichnet (Historisch)"
 as_waffen_ss.4.option_b:0 "Wir brauchen nur die Wehrmacht"
 as_waffen_ss.5.title:0 "Gründung der Wiking-Freiwilligenabteilung"
 as_waffen_ss.5.desc:0 "Die 5. SS-Panzerdivision Wiking war eine Elite-Panzerdivision unter den 38 Waffen-SS-Divisionen Nazideutschlands. Sie wurde aus ausländischen Freiwilligen in Dänemark, Norwegen, Schweden, Finnland, Estland, den Niederlanden und Belgien unter dem Kommando deutscher Offiziere rekrutiert."
 as_waffen_ss.5.option_a:0 "Sie sind im Grunde Deutsche (Historisch)"
 as_waffen_ss.5.option_b:0 "Die Waffen-SS ist nur für Deutsche"
 as_waffen_ss.6.title:0 "Gründung der Division Nord"
 as_waffen_ss.6.desc:0 "Nach dem Norwegenfeldzug 1940 und der erfolgreichen Eroberung des norwegischen Festlands wollte Adolf Hitler nicht, dass Einheiten der Wehrmacht die neue Grenze zwischen dem besetzten Norwegen und der Sowjetunion bewachten, die durch die Annexion Nordfinnlands durch Josef Stalin entstanden war. Daher entsandte er die spätere 6. SS-Gebirgs-Division „Nord“. Die Division war die einzige Waffen-SS-Einheit, die am Polarkreis kämpfte, als sie zwischen Juni und November 1941 in Finnland und Nordrussland stationiert war."
 as_waffen_ss.6.option_a:0 "Ausgezeichnet (Historisch)"
 as_waffen_ss.6.option_b:0 "Wir brauchen nur die Wehrmacht"
 as_waffen_ss.7.title:0 "Gründung der Freiwilligendivision „Prinz Eugen“"
 as_waffen_ss.7.desc:0 "Die 7. SS-Freiwilligen-Gebirgsdivision „Prinz Eugen“ war eine deutsche Gebirgsjägerdivision der Waffen-SS, des bewaffneten Flügels der deutschen NSDAP, die während des Zweiten Weltkriegs in Jugoslawien an der Seite der Wehrmacht diente, aber nie offiziell Teil dieser war. Sie wurde 1941 aus volksdeutschen Freiwilligen und Wehrpflichtigen aus dem Banat, dem Unabhängigen Staat Kroatien (NDH), Ungarn und Rumänien gebildet und kämpfte in einem Aufstandsbekämpfungsfeldzug gegen kommunistisch geführte jugoslawische Partisanen im besetzten Serbien, NDH und Montenegro. Den Titel „Prinz Eugen“ erhielt sie nach Prinz Eugen von Savoyen, einem herausragenden militärischen Führer des Habsburgerreichs, der im Österreichisch-Türkischen Krieg 1716–1718 das Banat und Belgrad vom Osmanischen Reich befreite."
 as_waffen_ss.7.option_a:0 "Großartig (historisch)"
 as_waffen_ss.7.option_b:0 "Die Waffen-SS ist nur für Deutsche"
 as_waffen_ss.8.title:0 "Gründung der Florian Geyer Freiwilligenabteilung"
 as_waffen_ss.8.desc:0 "Die 8. SS-Kavallerie-Division Florian Geyer war eine Kavalleriedivision der Waffen-SS im Zweiten Weltkrieg. Sie wurde 1942 aus einem Kader der SS-Kavalleriebrigade gebildet."
 as_waffen_ss.8.option_a:0 "Großartig (historisch)"
 as_waffen_ss.8.option_b:0 "Die Waffen-SS ist nur für Deutsche"
 as_waffen_ss.9.title:0 "Bildung der Hohenstaufen-Division"
 as_waffen_ss.9.desc:0 "Die 9. SS-Panzerdivision Hohenstaufen wurde zusammen mit ihrer Schwesterformation, der 10. SS-Panzerdivision Frundsberg, im Februar 1943 in Frankreich aufgestellt. Die Division bestand hauptsächlich aus Wehrpflichtigen des Reichsarbeitsdienstes (RAD). Ursprünglich war Hohenstaufen als Panzergrenadierdivision vorgesehen, wurde aber im Oktober 1943 zur vollwertigen Panzerdivision befördert. Bei ihrer Aufstellung wurde Hohenstaufen von SS-Obergruppenführer Wilhelm Bittrich kommandiert. Der Titel Hohenstaufen stammt von der Dynastie der Hohenstaufen, einem germanischen Adelsgeschlecht, das im 12. und 13. Jahrhundert n. Chr. mehrere Könige und Kaiser hervorbrachte. Es wird angenommen, dass die Division speziell nach Friedrich II. benannt wurde, der von 1194 bis 1250 lebte."
 as_waffen_ss.9.option_a:0 "Ausgezeichnet (Historisch)"
 as_waffen_ss.9.option_b:0 "Wir brauchen nur die Wehrmacht"
 as_waffen_ss.10.title:0 "Gründung der Frundsberg-Division"
 as_waffen_ss.10.desc:0 "Die 10. SS-Panzer-Division Frundsberg oder 10. SS-Panzer-Division Frundsberg war eine deutsche Panzerdivision der Waffen-SS. Die Division wurde Anfang 1943 als Reserve für die erwartete Invasion der Alliierten in Frankreich aufgestellt."
 as_waffen_ss.10.option_a:0 "Ausgezeichnet (Historisch)"
 as_waffen_ss.10.option_b:0 "Wir brauchen nur die Wehrmacht"
 as_waffen_ss.11.title:0 "Gründung der Freiwilligenabteilung Nordland"
 as_waffen_ss.11.desc:0 "Im Februar 1943 ordnete Hitler die Aufstellung einer SS-Division an, deren Offiziere ausländische Freiwillige sein sollten. Im März 1943 wurde das SS-Panzergrenadier-Regiment Nordland der Wikings, ein skandinavisches Freiwilligenregiment, von der Wiking-Division abgetrennt und aus der Front genommen, um als Kern der neuen Division zu dienen, die als 11. SS-Freiwilligen-Panzergrenadier-Division Nordland bekannt wurde."
 as_waffen_ss.11.option_a:0 "Großartig (historisch)"
 as_waffen_ss.11.option_b:0 "Die Waffen-SS ist nur für Deutsche"
 as_waffen_ss.12.title:0 "Bildung der Hitlerjugend-Division"
 as_waffen_ss.12.desc:0 "Die 12. SS-Panzerdivision Hitlerjugend war eine deutsche Panzerdivision der Waffen-SS im Zweiten Weltkrieg. Die Mehrheit ihrer jüngeren Mannschaften stammte aus der Hitlerjugend, während die höheren Unteroffiziere und Offiziere aus anderen Divisionen der Waffen-SS stammten."
 as_waffen_ss.12.option_a:0 "Ausgezeichnet (Historisch)"
 as_waffen_ss.12.option_b:0 "Wir brauchen nur die Wehrmacht"
 as_waffen_ss.13.title:0 "Bildung der kroatischen Division Handschar"
 as_waffen_ss.13.desc:0 "The 13th Waffen Mountain Division of the SS Handschar (1st Croatian) was a mountain infantry division of the Waffen-SS. On 6 December 1942, Reichsführer-SS Heinrich Himmler and key Waffen-SS recruiting officer SS-Obergruppenführer und General der Waffen-SS Gottlob Berger approached Hitler with the proposal to raise a Bosnian Muslim SS division. In April 1943, the Mufti of Jerusalem, Mohammad Amin al-Husayni, was invited by Berger to assist in organising and recruiting Muslims into the Waffen-SS and other units. He was escorted by von Krempler, who spoke Turkish. The Mufti successfully convinced the Muslims to ignore the declarations of the Sarajevo, Mostar and Banja Luka Ulama (Islamic clerics), who in 1941 forbade them from collaborating with the Ustaše."
 as_waffen_ss.13.option_a:0 "Wir können sie verwenden (Historisch)"
 as_waffen_ss.13.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.14.title:0 "Bildung der ukrainischen Division Galizien"
 as_waffen_ss.14.desc:0 "Die 14. Waffengrenadier-Division der SS (1. Galizische Division), vor 1944 als 14. SS-Freiwilligen-Division „Galizien“ bezeichnet, war eine deutsche Militärformation aus dem Zweiten Weltkrieg, die zunächst aus Freiwilligen aus der Region Galizien mit ukrainischem ethnischen Hintergrund bestand, später aber auch Slowaken, Tschechen und niederländische Freiwillige und Offiziere umfasste."
 as_waffen_ss.14.option_a:0 "Gut (Historisch)"
 as_waffen_ss.14.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.15.title:0 "Bildung der ersten lettischen Division"
 as_waffen_ss.15.desc:0 "Nach der Bildung lettischer Polizeibataillone im Reichskommissariat Ostland gründete Heinrich Himmler im Januar 1943 die Lettische SS-Freiwilligen-Legion. Im Februar 1943 wurde die Lettische SS-Freiwilligen-Division gebildet, die später die Nummernbezeichnung 15 erhielt. Die Legion wurde in Lettische SS-Freiwilligen-Brigade umbenannt, kurz darauf wurde die Nummernbezeichnung hinzugefügt."
 as_waffen_ss.15.option_a:0 "Gut (Historisch)"
 as_waffen_ss.15.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.16.title:0 "Aufstellung der 16. SS-Pz.Gr.Div. „Reichsführer SS“"
 as_waffen_ss.16.desc:0 "Gegründet im November 1943, als Volksdeutsche Rekruten der Sturmbrigade Reichsführer SS beitraten, diente diese als Kader für die Bildung der neuen Division. Eine Kampfgruppe der Division kämpfte am Brückenkopf von Anzio, während der Rest der Division an der Besetzung Ungarns teilnahm. Von Mai 1944 bis zu ihrer Verlegung nach Ungarn im Februar 1945 kämpfte sie als Division in Italien."
 as_waffen_ss.16.option_a:0 "Gut (Historisch)"
 as_waffen_ss.16.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.17.title:0 "17.SS-Pz.Gr.Div.&#39;Götz Berlichingen&#39;" 
 as_waffen_ss.17.desc:0 "Die 17. SS-Panzergrenadier-Division „Götz von Berlichingen“ (deutsch: 17. SS-Panzergrenadier-Division „Götz von Berlichingen“) war eine deutsche Division der Waffen-SS, die im Zweiten Weltkrieg an der Westfront im Einsatz war. Die Division wurde im Oktober 1943 in der Nähe von Poitiers, Frankreich, als Panzer-Grenadier-Division „Götz von Berlichingen“ aufgestellt. Sie wurde aus dem Nichts gebildet, wobei der Großteil ihres ursprünglichen Kaders aus Ersatzeinheiten und Wehrpflichtigen bestand, von denen viele Rumäniendeutsche und französische Freiwillige waren."
 as_waffen_ss.17.option_a:0 "Gut (Historisch)"
 as_waffen_ss.17.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.18.title:0 "18.SS-Pz.Gr.Div.&#39;Horst Wessel&#39;" 
 as_waffen_ss.18.desc:0 "Die 18. SS-Freiwilligen-Panzergrenadier-Division „Horst Wessel“ wurde 1944 um einen Kader der 1. SS-Infanteriebrigade herum aufgestellt und bestand hauptsächlich aus Volksdeutschen aus Ungarn. Das 1. Bataillon mit etwa 1000 Mann wurde der SS-Division „Horst Wessel“ zugeteilt und nach Galizien geschickt."
 as_waffen_ss.18.option_a:0 "Gut (Historisch)"
 as_waffen_ss.18.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.19.title:0 "19. Lettische SS-Freiw.-Div."
 as_waffen_ss.19.desc:0 "Die 19. Waffen-Grenadier-Division der SS (2. lettisch) (deutsch: 19. Waffen-Grenadier-Division der SS (lettische Nr. 2)), lettisch: 19. ieroču SS grenadieru divīzija (latviešu Nr. 2)) war eine Infanteriedivision der Waffen-SS im Zweiten Weltkrieg."
 as_waffen_ss.19.option_a:0 "Gut (Historisch)"
 as_waffen_ss.19.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.20.title:0 "20.Estische SS-Freiw.-Div." 
 as_waffen_ss.20.desc:0 "Die 20. Waffen-Grenadier-Division der SS (1. Estnisch) (deutsch: 20. Waffen-Grenadier-Division der SS (estnische Nr. 1)), estnisch: 20. eesti diviis) war eine Einheit der deutschen Waffen-SS, die am 25. Mai 1944 im deutsch besetzten Estland während des Zweiten Weltkriegs aufgestellt wurde."
 as_waffen_ss.20.option_a:0 "Gut (Historisch)"
 as_waffen_ss.20.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.21.title:0 "21.Waffen-SS Geb.Div.&#39;Skanderbeg&#39;" 
 as_waffen_ss.21.desc:0 "Die 21. Waffen-Gebirgsdivision der SS Skanderbeg (1. Albanische) war eine deutsche Gebirgsjägerdivision der Waffen-SS, dem bewaffneten Flügel der deutschen NSDAP, die im Zweiten Weltkrieg an der Seite der Wehrmacht diente, aber nie offiziell Teil davon war."
 as_waffen_ss.21.option_a:0 "Gut (Historisch)"
 as_waffen_ss.21.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.22.title:0 "22.SS-Kav.Div.&#39;Maria Theresia&#39;" 
 as_waffen_ss.22.desc:0 "Die 22. SS-Freiwilligen-Kavallerie-Division war eine deutsche Kavalleriedivision der Waffen-SS, die während des Zweiten Weltkriegs an der Ostfront aktiv war. Die Division bestand hauptsächlich aus Wehrpflichtigen der ungarischen Volksdeutschen, die nach einem Abkommen zwischen Deutschland und Ungarn zur Waffen-SS überstellt wurden."
 as_waffen_ss.22.option_a:0 "Gut (Historisch)"
 as_waffen_ss.22.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.23.title:0 "23. Waffen-Gebirgs-Div. der SS &#39;Kama&#39; (kroatisch. Nr. 2)" 
 as_waffen_ss.23.desc:0 "Die 23. Waffen-Gebirgsdivision der SS Kama (2. kroatische Division) war eine deutsche Gebirgsjägerdivision der Waffen-SS. Sie bestand aus deutschen Offizieren und bosnisch-muslimischen Soldaten. Sie wurde nach einem kleinen Dolch der Balkanhirten benannt und war eine der 38 Divisionen der Waffen-SS im Zweiten Weltkrieg."
 as_waffen_ss.23.option_a:0 "Gut (Historisch)"
 as_waffen_ss.23.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.24.title:0 "24.Waffen-SS Geb.Div.&#39;Karstjäger&#39;"
 as_waffen_ss.24.desc:0 "Die 24. Waffen-Gebirgsdivision der SS „Karstjäger“ war eine deutsche Gebirgsjägerdivision der Waffen-SS, dem bewaffneten Flügel der deutschen NSDAP, die im Zweiten Weltkrieg an der Seite der Wehrmacht diente, aber nie offiziell Teil dieser war. Unter dem Namen „Karstjäger“ war sie eine von 38 Divisionen der Waffen-SS. Während ihrer gesamten Existenz als Bataillon, Division und Brigade war sie hauptsächlich im Kampf gegen Partisanen im Karstplateau an der Grenze zu Jugoslawien, Italien und Österreich tätig; das bergige Gelände erforderte spezialisierte Gebirgstruppen und entsprechende Ausrüstung."
 as_waffen_ss.24.option_a:0 "Gut (Historisch)"
 as_waffen_ss.24.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.25.title:0 "25.Waffen-Gr.Div.d.SS &#39;Hunyadi&#39;" 
 as_waffen_ss.25.desc:0 "Die 25. Waffen-Grenadier-Division der SS „Hunyadi“ (1. Ungarische) war eine kurzlebige Infanteriedivision der Waffen-SS, eines bewaffneten Zweigs der deutschen NSDAP, der im Zweiten Weltkrieg an der Seite der Wehrmacht diente, aber nie offiziell Teil dieser war. Sie wurde im November 1944 nach dem deutschen Sturz des ungarischen Regimes von Miklós Horthy aufgestellt und bestand hauptsächlich aus Truppen der 13. Honvéd-Division der Königlich Ungarischen Armee."
 as_waffen_ss.25.option_a:0 "Gut (Historisch)"
 as_waffen_ss.25.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.26.title:0 "26.Waffen-Gr.Div. d.SS&#39;Hungaria&#39;" 
 as_waffen_ss.26.desc:0 "Die 26. Waffen-Grenadier-Division der SS (2. Ungarische) war eine kurzlebige Infanteriedivision der Waffen-SS."
 as_waffen_ss.26.option_a:0 "Gut (Historisch)"
 as_waffen_ss.26.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.27.title:0 "27.SS-Freiw.-Div.&#39;Langemark&#39;" 
 as_waffen_ss.27.desc:0 "Die Flämische Legion (niederländisch: Vlaams Legioen) war eine kollaborative Militärformation, die aus niederländischsprachigen Freiwilligen aus dem deutsch besetzten Belgien, insbesondere aus Flandern, rekrutiert wurde. Sie kämpfte im Zweiten Weltkrieg an der Ostfront."
 as_waffen_ss.27.option_a:0 "Gut (Historisch)"
 as_waffen_ss.27.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.28.title:0 "28.SS-Freiw.-Div.&#39;Wallonien&#39;" 
 as_waffen_ss.28.desc:0 "Die Wallonische Legion (französisch: Légion Wallonie) war eine kollaborative Militärformation, die während des Zweiten Weltkriegs aus französischsprachigen Freiwilligen aus dem deutsch besetzten Belgien, insbesondere aus Brüssel und Wallonien, rekrutiert wurde. Die Einheit wurde im Juli 1941, kurz nach dem deutschen Einmarsch in die Sowjetunion, gegründet und von der Rexistischen Partei als Zeichen ihrer Loyalität gegenüber Nazideutschland unterstützt. Sie diente an der Ostfront, zunächst als Einheit der Wehrmacht und ab Juni 1943 in der Waffen-SS."
 as_waffen_ss.28.option_a:0 "Gut (Historisch)"
 as_waffen_ss.28.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.29.title:0 "29.Italienische Waffen-Div.d.SS" 
 as_waffen_ss.29.desc:0 "Die 29. Waffen-Grenadier-Division der SS (1. Italienische), auch Legione SS Italiana (deutsch: 29. Waffen-Grenadier-Division der SS (italienische Nr. 1)), war eine SS-Formation Nazi-Deutschlands während des Zweiten Weltkriegs. Sie wurde ursprünglich 1943 in der Marionettenrepublik Italienische Sozialrepublik als Italienische Legion gegründet und später in eine Brigade umbenannt. Die Einheit wurde am 10. Februar 1945 in den Divisionsstatus erhoben."
 as_waffen_ss.29.option_a:0 "Gut (Historisch)"
 as_waffen_ss.29.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.30.title:0 "30.Weissruth.Waffen-Div.d.SS" 
 as_waffen_ss.30.desc:0 "Die 30. Waffen-Grenadier-Division der SS (deutsch: 30. Waffen-Grenadier-Division der SS) war eine deutsche Infanteriedivision der Waffen-SS, die im August 1944 in Warschau, Polen, größtenteils aus belarussischem, russischem und ukrainischem Personal der Schutzmannschaft-Brigade Siegling gebildet wurde."
 as_waffen_ss.30.option_a:0 "Gut (Historisch)"
 as_waffen_ss.30.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.31.title:0 "31.SS-Freiwilligen-Grenadier-Div." 
 as_waffen_ss.31.desc:0 "Die 31. SS-Freiwilligen-Grenadier-Division (deutsch: 31. SS-Freiwilligen-Grenadier-Division) war eine Einheit der deutschen Streitkräfte im Zweiten Weltkrieg. Sie wurde im September 1944 aus ungarischen Volksdeutschen, hauptsächlich aus der Batschka, gebildet. Im November 1944 war sie an der ungarischen Front im Einsatz."
 as_waffen_ss.31.option_a:0 "Gut (Historisch)"
 as_waffen_ss.31.option_b:0 "Die Waffen-SS ist nur für Germanen" 
 as_waffen_ss.32.title:0 "32.SS-Freiw.Div.&#39;30. Januar&#39;" 
 as_waffen_ss.32.desc:0 "Die 32. SS-Freiwilligen-Grenadier-Division „30. Januar“ wurde im Januar 1945 aus den Überresten anderer Einheiten, des Personals und der Schüler von SS-Schulen sowie verschiedener anderer Truppenteile gebildet. Die Division kämpfte als Teil des V. SS-Gebirgskorps an der Oderfront nördlich von Fürstenburg und in der Schlacht um Berlin."
 as_waffen_ss.32.option_a:0 "Gut (Historisch)"
 as_waffen_ss.32.option_b:0 "Die Waffen-SS ist nur für Germanen" 
 as_waffen_ss.33.title:0 "33.Waffen-Gr.Div.d.SS&#39;Charlemagne&#39;" 
 as_waffen_ss.33.desc:0 "Die 33. Waffen-Grenadier-Division der SS Charlemagne (1. Französische Nr. 1) und das Regiment Charlemagne sind Sammelbezeichnungen für Einheiten französischer Freiwilliger der Wehrmacht und später der Waffen-SS im Zweiten Weltkrieg. Auf ihrem Höhepunkt im Jahr 1944 dienten schätzungsweise 7.340 bis 11.000 Mann in der Einheit. Die Mitglieder der Einheit nahmen an den letzten Tagen der Schlacht um Berlin im Bereich des Führerbunkers teil und gehörten zu den letzten Achsenmächten, die kapitulierten."
 as_waffen_ss.33.option_a:0 "Gut (Historisch)"
 as_waffen_ss.33.option_b:0 "Die Waffen-SS ist nur für Germanen" 
 as_waffen_ss.34.title:0 "34.SS-Freiw.Div.&#39;Landstorm Nederland&#39;" 
 as_waffen_ss.34.desc:0 "Die 34. SS-Freiwilligen-Grenadier-Division „Landstorm Nederland“ war eine Division der Waffen-SS im Zweiten Weltkrieg. Sie entstand durch die Umwandlung der SS-Freiwilligenbrigade „Landstorm Nederland“ in eine Division. Sie bestand aus Freiwilligen niederländischer Herkunft und war an der Westfront im Einsatz, erreichte aber nie mehr als die Stärke einer Brigade."
 as_waffen_ss.34.option_a:0 "Gut (Historisch)"
 as_waffen_ss.34.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.35.title:0 "35. SS- und Polizei-Grenadier-Division" 
 as_waffen_ss.35.desc:0 "Die 35. SS- und Polizei-Grenadier-Division (deutsch: 35. SS- und Polizei-Grenadier-Division) war eine Infanteriedivision der Waffen-SS im nationalsozialistischen Deutschland während des Zweiten Weltkriegs. Sie entstand aus SS-Polizei-Einheiten, die der Waffen-SS übertragen wurden."
 as_waffen_ss.35.option_a:0 "Gut (Historisch)"
 as_waffen_ss.35.option_b:0 "Die Waffen-SS ist nur für Germanen" 
 as_waffen_ss.36.title:0 "36.Waffen-Grenadier-Div.der SS" 
 as_waffen_ss.36.desc:0 "The Dirlewanger Brigade, also known as the SS-Sturmbrigade Dirlewanger (1944), or the 36th Waffen Grenadier Division of the SS (German: 36. Waffen-Grenadier-Division der SS), was a unit of the Waffen-SS during World War II. Composed of criminals expected to die fighting on the front line, the unit was led by Oskar Dirlewanger. Originally formed for counter-insurgency duties against the Polish resistance movement, the unit was used in the Bandenbekämpfung ('bandit fighting') actions in German-occupied Europe. During its operations, it engaged in raping, pillaging and mass murder of civilians."
 as_waffen_ss.36.option_a:0 "Gut (Historisch)"
 as_waffen_ss.36.option_b:0 "Die Waffen-SS ist nur für Germanen" 
 as_waffen_ss.37.title:0 "37.SS-Freiw.-Kav.Div.&#39;Lützow&#39;" 
 as_waffen_ss.37.desc:0 "Die 37. SS-Freiwilligen-Kavallerie-Division „Lützow“ (deutsch: 37. SS-Freiwilligen Kavallerie-Division „Lützow“) war eine Einheit der Waffen-SS des nationalsozialistischen Deutschlands im Zweiten Weltkrieg. Sie wurde im Februar 1945 gegründet und bestand aus Überresten der SS-Kavallerie-Division Florian Geyer und der SS-Kavallerie-Division Maria Theresia sowie überwiegend minderjährigen deutschen, ungarischen Volksdeutschen und ethnischen ungarischen Rekruten. Die Division sollte über drei Kavallerieregimenter mit jeweils zwei Bataillonen verfügen, konnte jedoch aufgrund von Personal- und Ausrüstungsmangel nur zwei unterbesetzte Regimenter als Hauptkampfeinheiten einsetzen."
 as_waffen_ss.37.option_a:0 "Gut (Historisch)"
 as_waffen_ss.37.option_b:0 "Die Waffen-SS ist nur für Germanen" 
 as_waffen_ss.38.title:0 "38.SS-Grenadier-Division „Nibelungen“" 
 as_waffen_ss.38.desc:0 "Die 38. SS-Division „Nibelungen“ (deutsch: 38. SS-Panzergrenadier-Division „Nibelungen“) war eine Waffen-SS-Formation Nazi-Deutschlands während des Zweiten Weltkriegs. Sie wurde im März 1945 aus dem Personal und den Auszubildenden der SS-Junkerschule (SS-Ausbildungslager) in Bad Tölz gebildet und nach der deutschen Legende der Nibelungen benannt."
 as_waffen_ss.38.option_a:0 "Gut (Historisch)"
 as_waffen_ss.38.option_b:0 "Die Waffen-SS ist nur für Germanen"
 as_waffen_ss.39.title:0 "Erweiterung der Schutzstaffel"  
 as_waffen_ss.39.desc:0 "Die Schutzstaffel (SS) war eine bedeutende paramilitärische Organisation unter Adolf Hitler und der NSDAP im nationalsozialistischen Deutschland und später im gesamten deutsch besetzten Europa während des Zweiten Weltkriegs. Sie begann mit einer kleinen Wacheinheit namens Saal-Schutz, die aus freiwilligen NSDAP-Mitgliedern bestand und für die Sicherheit bei Parteiversammlungen in München sorgte. 1925 trat Heinrich Himmler der Einheit bei, die inzwischen reformiert und mit ihrem endgültigen Namen versehen worden war. Unter seiner Leitung (1929–1945) wuchs sie von einer kleinen paramilitärischen Formation zu einer der mächtigsten Organisationen im nationalsozialistischen Deutschland heran. Von 1929 bis zum Zusammenbruch des Regimes 1945 war die SS die wichtigste Sicherheits-, Überwachungs- und Terrorbehörde in Deutschland und im deutsch besetzten Europa."
 as_waffen_ss.39.option_a:0 "Gut (Historisch)"
 as_waffen_ss.39.option_b:0 "Wir brauchen nur die Wehrmacht"
 as_waffen_ss.40.title:0 "Gründung der Allgemeinen SS"  
 as_waffen_ss.40.desc:0 "Die Allgemeine SS war ein wichtiger Zweig der paramilitärischen Schutzstaffel (SS) im nationalsozialistischen Deutschland und wurde vom SS-Hauptamt verwaltet. Die Allgemeine SS wurde im Herbst 1934 offiziell gegründet, um ihre Mitglieder von der SS-Verfügungstruppe (SS-VT), der späteren Waffen-SS, und den SS-Totenkopfverbänden (SS-TV) abzugrenzen, die für die Konzentrations- und Vernichtungslager der Nazis zuständig waren, in denen Millionen von Menschen getötet wurden."
 as_waffen_ss.40.option_a:0 "Gut (Historisch)"
 as_waffen_ss.40.option_b:0 "Wir brauchen nur die Ordnungspolizei"
 as_waffen_ss.41.title:0 "Gründung der Waffen-SS"  
 as_waffen_ss.41.desc:0 "Die Waffen-SS war der bewaffnete Flügel der SS der NSDAP. Zu ihren Formationen gehörten Männer aus Nazideutschland sowie Freiwillige und Wehrpflichtige aus besetzten und unbesetzten Gebieten. Die Waffen-SS wuchs im Zweiten Weltkrieg von drei Regimentern auf über 38 Divisionen an und diente an der Seite des Heeres (reguläre Armee), der Ordnungspolizei (uniformierte Polizei) und anderer Sicherheitseinheiten. Ursprünglich unterstand sie dem SS-Führungshauptamt unter Reichsführer-SS Heinrich Himmler. Mit Beginn des Zweiten Weltkriegs wurde die taktische Kontrolle vom Oberkommando der Wehrmacht (OKW) ausgeübt, wobei einige Einheiten dem Kommandostab Reichsführer-SS unterstellt wurden, der direkt Himmler unterstand."
 as_waffen_ss.41.option_a:0 "Gut (Historisch)"
 as_waffen_ss.41.option_b:0 "Wir brauchen nur die Wehrmacht"
 as_waffen_ss.42.title:0 "Schwere Panzerbataillone der Waffen-SS"  
 as_waffen_ss.42.desc:0 "Eine deutsche Schwere Panzerabteilung (Schwere Panzerabteilung) war eine Elite-Panzereinheit der Wehrmacht und der Waffen-SS im Zweiten Weltkrieg in Bataillonsstärke, ausgerüstet mit schweren Panzern des Typs Tiger I und später Tiger II. Ursprünglich für den Angriff bei Durchbruchoperationen vorgesehen, erforderten die deutschen Realitäten in der Spätkriegszeit den Einsatz in der Defensive, indem sie schwere Feuerunterstützung leisteten und Gegenangriffe auf feindliche Panzerdurchbrüche starteten, oft organisiert in Ad-hoc-Kampfgruppen. Die deutschen schweren Panzerbataillone zerstörten insgesamt 9.850 feindliche Panzer bei einem Verlust von nur 1.715 eigenen Panzern, was einem Abschuss-Verlust-Verhältnis von 5,74 entspricht. Die 1.715 deutschen Verluste beinhalten auch Abschreibungen nicht kampfbezogener Panzer."
 as_waffen_ss.42.option_a:0 "Gut (Historisch)"
 as_waffen_ss.42.option_b:0 "Wir brauchen nur die Wehrmacht"
 as_waffen_ss.43.title:0 "Ausländische Freiwillige der Waffen-SS"  
 as_waffen_ss.43.desc:0 "Während des Zweiten Weltkriegs rekrutierte die Waffen-SS eine beträchtliche Anzahl Nichtdeutscher, sowohl als Freiwillige als auch als Wehrpflichtige. Insgesamt wurden zwischen 1940 und 1945 rund 500.000 Nichtdeutsche und ethnische Deutsche aus dem Ausland, hauptsächlich aus dem deutsch besetzten Europa, rekrutiert. Die Einheiten unterstanden dem SS-Führungshauptamt unter Reichsführer-SS Heinrich Himmler. Nach der Mobilisierung wurde die taktische Kontrolle der Einheiten dem Oberkommando der Wehrmacht übertragen."
 as_waffen_ss.43.option_a:0 "Gut (Historisch)"
 as_waffen_ss.43.option_b:0 "Die Waffen-SS ist nur für Germanen" 
 
 GER_waffen_ss_will_never_be_formed:0 "Die Waffen-SS wird niemals gegründet werden."
 GER_waffen_ss_will_never_accept_volunteers:0 "Die Waffen-SS wird niemals ausländische Freiwillige aufnehmen."
 
 as_politics.1.t:0 "Vampirisierte Wirtschaft"
 as_politics.1.d:0 "Unser Land steht unter dem Einfluss einer ausländischen Wirtschaftsmacht. Ihre Kontrolle über unsere wichtigsten Wirtschaftszweige durch hegemoniale Industriebeteiligungen, die durch spezielle Gesetze geschützt sind, stört drastisch jede autonome Entwicklung unserer eigenen Wirtschaft."
 as_politics.1.option_a:0 "Wenigstens bezahlen sie uns gut …"
 as_politics.2.t:0 "Befreit vom Imperialismus"
 as_politics.2.d:0 "Es ist uns gelungen, unsere Industrie von den ausländischen Einflüssen zu befreien, denen sie unterworfen war. Wir sind jetzt in der Lage, eine echte Wirtschaft für unser eigenes Volk aufzubauen."
 as_politics.2.option_a:0 "Nun, zumindest scheint es jetzt möglich zu sein …"
 
 wehrmachtevents.1.t:0 "1. Fallschirm-Jäger-Division"
 wehrmachtevents.1.d:0 "Die 1. Fallschirmjäger-Division (deutsch: 1. Fallschirmjäger-Division) war eine deutsche Elite-Fallschirmjägerdivision, die im Zweiten Weltkrieg kämpfte. Eine Fallschirmjägerdivision wurde als Fallschirmjägerdivision bezeichnet. Aus Geheimhaltungsgründen wurde sie ursprünglich als 7. Luftwaffendivision oder Fliegerdivision aufgestellt, bevor sie 1943 in 1. Fallschirmjägerdivision umbenannt und neu organisiert wurde."
 wehrmachtevents.1.a:0 "Gut (Historisch)"
 wehrmachtevents.1.b:0 "Wir können nichts entbehren."
 
 wehrmachtevents.2.t:0 "Panzer-Grenadier-Division Großdeutschland"
 wehrmachtevents.2.d:0 "Die Panzergrenadier-Division Großdeutschland war eine Elite-Kampfeinheit des deutschen Heeres, die im Zweiten Weltkrieg an der Ostfront kämpfte. Großdeutschland war eine der am besten ausgerüsteten Einheiten des deutschen Heeres. Die Einheit begann in den 1920er Jahren ursprünglich als zeremonielle Wacheinheit und entwickelte sich bis Ende der 1930er Jahre zu einem Regiment der vereinten deutschen Wehrmacht. Das Regiment wurde später erweitert und 1942 in Infanteriedivision Großdeutschland umbenannt. Nach einer umfassenden Reorganisation erhielt es im Mai 1943 den neuen Namen Panzergrenadier-Division Großdeutschland."
 wehrmachtevents.2.a:0 "Gut (Historisch)"
 wehrmachtevents.2.b:0 "Wir können nichts entbehren."
 
 wehrmachtevents.3.t:0 "Panzer-Grenadier-Division Brandenburg"
 wehrmachtevents.3.d:0 "Die Brandenburger gehörten während des Zweiten Weltkriegs zur brandenburgischen Spezialeinheit. Ursprünglich war die Einheit eine Erweiterung des militärischen Geheimdienstes Abwehr und operierte als solche. Mitglieder dieser Einheit beteiligten sich an der Eroberung operativ wichtiger Ziele durch Sabotage und Infiltration. Im weiteren Kriegsverlauf wurden Teile der Spezialeinheit im Kampf gegen Partisanen in Jugoslawien eingesetzt, bevor die Division in den letzten Kriegsmonaten umklassifiziert und in eine der Panzergrenadierdivisionen eingegliedert wurde."
 wehrmachtevents.3.a:0 "Gut (Historisch)"
 wehrmachtevents.3.b:0 "Wir können nichts entbehren."
 
 wehrmachtevents.4.t:0 "Panzer-Lehr-Division"
 wehrmachtevents.4.d:0 "Die Panzer-Lehr-Division war eine deutsche Elite-Panzerdivision im Zweiten Weltkrieg. Sie wurde ab 1943 aus in Deutschland stationierten Ausbildungs- und Demonstrationstruppen (Lehr = „lehren“) gebildet, um zusätzliche Panzerstärke für die erwartete alliierte Invasion in Westeuropa bereitzustellen. Sie war die einzige Panzerdivision der Wehrmacht, die vollständig mit Panzern und Halbkettenfahrzeugen zum Transport ihrer mechanisierten Infanterie ausgerüstet war."
 wehrmachtevents.4.a:0 "Gut (Historisch)"
 wehrmachtevents.4.b:0 "Wir können nichts entbehren."
 
 wehrmachtevents.5.t:0 "Fallschirm-Panzer-Division 1. Hermann Göring"
 wehrmachtevents.5.d:0 "Die Fallschirm-Panzer-Division 1. Hermann Göring (abgekürzt Fallschirm-Panzer-Div. 1 HG) war eine Elite-Panzerdivision der deutschen Luftwaffe. Die HG war in Nordafrika, Sizilien, Italien und an der Ostfront im Einsatz. Die Division begann 1933 als bataillonsgroße Polizeieinheit. Im Laufe der Zeit wuchs sie zu einem Regiment, einer Brigade und einer Division heran und wurde schließlich 1944 mit der Fallschirm-Panzer-Division 2. Hermann Göring zu einem Panzerkorps unter dem damaligen Reichsmarschall vereinigt. Sie ergab sich am 8. Mai 1945 der sowjetischen Armee nahe Dresden."
 wehrmachtevents.5.a:0 "Gut (Historisch)"
 wehrmachtevents.5.b:0 "Wir können nichts entbehren."
 
 wehrmachtevents.6.t:0 "369. (Kroatische) Infanterie-Division"
 wehrmachtevents.6.d:0 "Die 369. (Kroatische) Infanterie-Division (deutsch: 369. (Kroatische) Infanterie-Division, kroatisch: 369. (hrvatska) pješačka divizija) war eine sogenannte „Legionärsdivision“ der Wehrmacht und bestand aus etwa 8.500 Soldaten, die aus dem Unabhängigen Staat Kroatien (NDH) rekrutiert wurden. Unter dem Kommando von etwa 3.500 deutschen Offizieren, Unteroffizieren und Spezialisten."
 wehrmachtevents.6.a:0 "Gut (Historisch)"
 wehrmachtevents.6.b:0 "Wir können nichts entbehren."
 
 wehrmachtevents.7.t:0 "373. (Kroatische) Infanterie-Division"
 wehrmachtevents.7.d:0 "Die 373. (Kroatische) Infanterie-Division (deutsch: 373. (Kroatische) Infanterie-Division, kroatisch: 373. (hrvatska) pješačka divizija) war eine Division der deutschen Armee im Zweiten Weltkrieg. Sie wurde im Juni 1943 aus einer Brigade der kroatischen Heimatverteidigung (NDH) und einem zusätzlichen deutschen Kader gebildet. Die Division wurde fast immer bis auf Bataillons- und sogar Kompanieebene von Deutschen kommandiert und allgemein als „Legionärsdivision“ bezeichnet. Ursprünglich für den Einsatz an der Ostfront aufgestellt, wurde sie bis Kriegsende stattdessen für Partisanenbekämpfungsoperationen im Gebiet der NDH eingesetzt. Sie kämpfte hauptsächlich in den westlichen Gebieten der NDH und war im Mai 1944 an dem Versuch beteiligt, den Anführer der Partisanen, Josip Broz Tito, zu töten oder gefangen zu nehmen. Durch Desertion stark geschwächt, zog sich die Division in den ersten Monaten des Jahres 1945 in Richtung Reichsgrenze zurück und ergab sich schließlich am 10. Mai 1945 in der Nähe von Brežice im heutigen Slowenien den Partisanen."
 wehrmachtevents.7.a:0 "Gut (Historisch)"
 wehrmachtevents.7.b:0 "Wir können nichts entbehren."
 
 wehrmachtevents.8.t:0 "392. (Kroatische) Infanterie-Division"
 wehrmachtevents.8.d:0 "Die 392. (Kroatische) Infanterie-Division (deutsch: 392. (Kroatische) Infanterie-Division, kroatisch: 392. (hrvatska) pješačka divizija) war eine sogenannte „Legionärsdivision“ der deutschen Armee während des Zweiten Weltkriegs. Sie wurde im August 1943 aus kroatischen Heimwehrsoldaten mit deutschem Kader gebildet. Die Division wurde fast immer bis auf Bataillons- und sogar Kompanieebene von Deutschen kommandiert. Ursprünglich für den Einsatz an der Ostfront aufgestellt, kam dies jedoch nicht zustande, und die Division wurde bis Kriegsende in der Partisanenbekämpfung im Unabhängigen Staat Kroatien (NDH) eingesetzt. Sie war allgemein als die Blaue Division bekannt."
 wehrmachtevents.8.a:0 "Gut (Historisch)"
 wehrmachtevents.8.b:0 "Wir können nichts entbehren."
 
 wehrmachtevents.9.t:0 "Division Española de Voluntarios"
 wehrmachtevents.9.d:0 "Die Blaue Division (spanisch: División Azul, deutsch: Blaue Division), von der spanischen Armee offiziell als División Española de Voluntarios bezeichnet und 250. Infanterie-Division in der deutschen Armee, war eine Einheit spanischer Freiwilliger und Wehrpflichtiger, die im Zweiten Weltkrieg in der deutschen Armee an der Ostfront dienten. Zu ihr gehörten auch 1.000 Mann der portugiesischen Legion, die vom portugiesischen Estado Novo unter spanischer Flagge entsandt worden waren und von denen viele bereits im spanischen Bürgerkrieg in den Viriatos gekämpft hatten."
 wehrmachtevents.9.a:0 "Gut (Historisch)"
 wehrmachtevents.9.b:0 "Wir können nichts entbehren."
 
 wehrmachtevents.10.t:0 "Indische Legion"
 wehrmachtevents.10.d:0 "Die Indische Legion (deutsch: Freie Indien-Legion), offiziell Infanterie-Regiment 950 (indisches), IR 950, war eine während des Zweiten Weltkriegs im nationalsozialistischen Deutschland aufgestellte Militäreinheit. Sie sollte als Befreiungstruppe für das britisch regierte Indien dienen und bestand aus indischen Kriegsgefangenen und in Europa ausgewanderten Soldaten. Aufgrund ihrer Ursprünge in der indischen Unabhängigkeitsbewegung war sie auch als „Tiger Legion“ und „Azad Hind Fauj“ bekannt."
 wehrmachtevents.10.a:0 "Gut (Historisch)"
 wehrmachtevents.10.b:0 "Wir können nichts entbehren."
 
 wehrmachtevents.11.t:0 "Legion Freies Arabien"
 wehrmachtevents.11.d:0 "Die Freie Arabische Legion (deutsch: Legion Freies Arabien) war eine nationalsozialistische deutsche Militäreinheit, die während des Zweiten Weltkriegs aus arabischen Freiwilligen aus dem Nahen Osten und Nordafrika gebildet wurde."
 wehrmachtevents.11.a:0 "Gut (Historisch)"
 wehrmachtevents.11.b:0 "Wir können nichts entbehren."
 
 wehrmachtevents.12.t:0 "Légion des volontaires français contre le bolchévisme"
 wehrmachtevents.12.d:0 " Die Legion französischer Freiwilliger gegen den Bolschewismus (französisch: Légion des volontaires français contre le bolchévisme, oder einfach Légion des volontaires français, LVF) war eine Kollaborateursmiliz des Vichy-Frankreichs, die am 8. Juli 1941 gegründet wurde. Sie versammelte verschiedene Kollaborateursparteien, darunter Marcel Bucards Mouvement Franciste, Marcel Déats Nationale Volksversammlung, Jacques Doriots Französische Volkspartei, Eugène Deloncles Sozialrevolutionäre Bewegung, Pierre Clémentis Französische Nationalkollektivistische Partei und Pierre Costantinis Französische Liga. Sie meldete sich freiwillig zum Kampf gegen die Sowjetunion an der Ostfront. Offiziell war sie unter ihrer deutschen Bezeichnung als 638. Infanterieregiment (Infanterieregiment 638) bekannt."
 wehrmachtevents.12.a:0 "Gut (Historisch)"
 wehrmachtevents.12.b:0 "Wir können nichts entbehren."
 
 wehrmachtevents.13.t:0 "1. Kosaken-Kavallerie-Division"
 wehrmachtevents.13.d:0 "Die 1. Kosaken-Kavalleriedivision war eine russische Kosakendivision der deutschen Armee, die im Zweiten Weltkrieg diente. Sie wurde an der Ostfront hauptsächlich aus Donkosaken aufgestellt, die bereits in der Wehrmacht dienten, vor der vorrückenden Roten Armee geflohen waren und aus sowjetischen Kriegsgefangenen bestanden."
 wehrmachtevents.13.a:0 "Gut (Historisch)"
 wehrmachtevents.13.b:0 "Wir können nichts entbehren."
 
wehrmachtevents.14.t:0 "Ausländische Freiwillige der Wehrmacht"  
wehrmachtevents.14.d:0 "Unter den rund einer Million ausländischen Freiwilligen und Wehrpflichtigen, die während des Zweiten Weltkriegs in der Wehrmacht dienten, befanden sich ethnische Deutsche, Belgier, Tschechen, Niederländer, Finnen, Franzosen, Griechen, Ungarn, Norweger, Polen, Portugiesen, Spanier, Schweden und Briten sowie Menschen aus den baltischen Staaten und vom Balkan."
wehrmachtevents.14.a:0 "Gut (Historisch)"
 
 wehrmachtevents.0.t:0 "Gründung des Afrikakorps"
 wehrmachtevents.0.d:0 "Das Deutsche Afrikakorps (DAK) war das deutsche Expeditionskorps in Afrika während des Nordafrikafeldzugs im Zweiten Weltkrieg. Ursprünglich als Stütztruppe zur Unterstützung der italienischen Verteidigung in den afrikanischen Kolonien eingesetzt, kämpfte die Einheit unter verschiedenen Bezeichnungen von März 1941 bis zu ihrer Kapitulation im Mai 1943 in Afrika. Der bekannteste Kommandeur der Einheit war Feldmarschall Erwin Rommel."
 wehrmachtevents.0.a:0 "Gut (Historisch)"
 wehrmachtevents.0.b:0 "Wir können nichts entbehren."
 
 wehrmachtevents.15.t:0 "1. Brandenburger-Division"
 wehrmachtevents.15.d:0 "Die Brandenburger waren Mitglieder der brandenburgischen Spezialeinheit im Zweiten Weltkrieg. Ursprünglich wurde die Einheit von der Abwehr gegründet und fungierte als Erweiterung des militärischen Geheimdienstes. Mitglieder dieser Einheit beteiligten sich an der Eroberung operativ wichtiger Ziele durch Sabotage und Infiltration. Als ausländische deutsche Staatsbürger und überzeugte Nazi-Freiwillige hatten die Mitglieder im Ausland gelebt, beherrschten Fremdsprachen und waren mit den Lebensgewohnheiten in ihrem Einsatzgebiet vertraut."
 wehrmachtevents.15.a:0 "Gut (Historisch)"
 wehrmachtevents.15.b:0 "Wir können nichts entbehren."
 
 wehrmachtevents.16.t:0 "Ukrainische Nationalarmee (UNA)"
 wehrmachtevents.16.d:0 "Die Ukrainische Nationalarmee (UNA) war eine ukrainische Militärgruppe aus dem Zweiten Weltkrieg, die am 17. März 1945 in Weimar, Deutschland, gegründet wurde und dem Ukrainischen Nationalkomitee unterstand."
 wehrmachtevents.16.a:0 "Gut (Historisch)"
 wehrmachtevents.16.b:0 "Wir können nichts entbehren."
 
 wehrmachtevents.17.t:0 "Russische Befreiungsarmee (ROA)"
 wehrmachtevents.17.d:0 "Die Russische Befreiungsarmee (Russisch: Русская освободительная армия, Russkaya osvoboditel&#39;naya armiya, abgekürzt als РОА, ROA, auch bekannt als Wlassow-Armee (Власовская армия, Vlasovskaya armiya)) war eine Kollaborationsformation, die hauptsächlich aus Russen bestand und unter deutschem Kommando kämpfte während des Zweiten Weltkriegs. Angeführt wurde die Armee von Andrei Wlassow, einem übergelaufenen General der Roten Armee, und die Mitglieder der Armee werden oft als Wlassowzy (Власовцы) bezeichnet. Im Jahr 1944 wurde es als „Streitkräfte des Komitees zur Befreiung der Völker Russlands“ (Вооружённые силы Комитета освобождения народов России, Vooruzhonnyye sily Komiteta osvobozhdeniya narodov Rossii, abgekürzt als ВС) bekannt КОНР, VS KONR)."
 wehrmachtevents.17.a:0 "Gut (Historisch)"
 wehrmachtevents.17.b:0 "Wir können nichts entbehren."
 
 
   # Annexation of Poland
  
landgrabevents.0.t:0 "Annexion Polens"
landgrabevents.0.d:0 "Der Polnische Korridor (deutsch: Polnischer Korridor, polnisch: Pomorze, Korytarz polski), auch bekannt als Danziger Korridor, Korridor zum Meer oder Danziger Korridor, war ein Gebiet in der Region Pommern (Woiwodschaft Pommern, Ostpommern, ehemals Teil Westpreußens), das der Zweiten Republik Polen (1920–1939) Zugang zur Ostsee verschaffte und so den größten Teil Deutschlands (Weimarer Republik) von der Provinz Ostpreußen trennte. Die Freie Stadt Danzig (heute die polnische Stadt Gdańsk) war sowohl von Polen als auch von Deutschland getrennt. Ein ähnliches Gebiet, gelegentlich auch als Korridor bezeichnet, war zwischen 1466 und 1772 als Teil des Königlichen Preußens mit der polnischen Krone verbunden.\n \nAm 1. September 1939 marschierte Deutschland in Polen ein. Deutsche Truppen besiegten die polnische Pommernarmee, die mit der Verteidigung dieser Region beauftragt worden war, und eroberten den Korridor bis zum 5. September in der Schlacht im Tucheler Wald. Weitere bedeutende Schlachten fanden auf der Westerplatte, beim polnischen Postamt in Danzig, in Oksywie und in Hel statt. Nach einer kurzen Zeit unter Militärverwaltung wurde ein großer Teil Westpolens unter deutscher Besatzung in das Deutsche Reich integriert."
landgrabevents.0.a:0 "Exzellent."

# Annexation of Alsace
 
landgrabevents.1.t:0 "Annexion des Elsass"
landgrabevents.1.d:0 "Das Reichsland Elsaß-Lothringen (auch Elsass-Lothringen genannt) wurde 1871 vom Deutschen Reich gegründet, nachdem es nach seinem Sieg im Deutsch-Französischen Krieg den größten Teil des Elsass und das lothringische Département Moselle annektiert hatte. Der elsässische Teil lag im Rheintal westlich des Rheins und östlich der Vogesen. Der lothringische Teil befand sich im oberen Moseltal nördlich der Vogesen.\n \nDas Gebiet umfasste 93 % des Elsass und 26 % Lothringens, während die übrigen Gebiete zu Frankreich gehörten. Aus historischen Gründen gelten in diesem Gebiet noch heute bestimmte Rechtsvorschriften in Form eines „Ortsrechts“. Aufgrund seines besonderen Rechtsstatus wird das Gebiet seit seiner Rückgabe an Frankreich nach dem Ersten Weltkrieg verwaltungsmäßig als Elsass-Mosel bezeichnet.\n \nNach der erneuten deutschen Annexion im Zweiten Weltkrieg wurden Moselle und Elsass später Teil des Gaus Westmark bzw. des Reichsgaus Oberrhein."
landgrabevents.1.a:0 "Exzellent."

 # Annexation of Italian Territories
    
landgrabevents.2.t:0 "Anschluss Südtirols und Istriens"
landgrabevents.2.d:0 "Südtirol als Verwaltungseinheit entstand während des Ersten Weltkriegs. Die Alliierten versprachen Italien das Gebiet im Londoner Vertrag von 1915 als Anreiz, auf ihrer Seite in den Krieg einzutreten. Bis 1918 war es Teil der österreichisch-ungarischen Fürstengrafschaft Tirol, doch dieses fast vollständig deutschsprachige Gebiet wurde nach Kriegsende im November 1918 von Italien besetzt und 1919 dem Königreich Italien angegliedert. Die Provinz in ihrer heutigen Form entstand 1926 nach einer Verwaltungsreorganisation des Königreichs Italien und wurde zusammen mit der Provinz Trient in die neu geschaffene Region Venezia Tridentina („Trentiner Venetien“) eingegliedert.\n \nDas darauffolgende Bündnis zwischen Adolf Hitler und Benito Mussolini erklärte, dass Südtirol nicht dem Schicksal Österreichs folgen würde, das dem Dritten Reich angegliedert worden war. Stattdessen stimmten die Diktatoren zu, die deutschsprachige Bevölkerung in deutsch beherrschtes Gebiet umzusiedeln oder über Italien zu verteilen. Der Ausbruch des Zweiten Weltkriegs verhinderte jedoch die vollständige Umsetzung ihres Vorhabens. Jeder einzelne Bürger hatte die freie Wahl, im faschistischen Italien zu bleiben und seine deutsche Kultur und Identität aufzugeben oder nach Nazi-Deutschland zu ziehen, um dort seine Kultur und Identität weiterzuleben, aber seine Heimat zu verlassen. Die Folge war, dass in diesen schwierigen Zeiten des Faschismus die einzelnen Südtiroler Familien gespalten und getrennt wurden.\n \nAls die italienische Regierung 1943 einen Waffenstillstand mit den Alliierten unterzeichnete, wurde die Region von Deutschland besetzt, das sie zur Operationszone Alpenvorland umorganisierte und der Verwaltung von Gauleiter Franz Hofer unterstellte. Die Region war bis Kriegsende de facto dem Deutschen Reich (zusammen mit der Provinz Belluno) angegliedert. Dieser Status endete mit dem Ende des Nazi-Regimes, und die italienische Herrschaft wurde 1945 wiederhergestellt."
landgrabevents.2.a:0 "Exzellent."

# Annexation of Biyalistok

landgrabevents.3.t:0 "Annexion von Bialystok"
landgrabevents.3.d:0 "Der Bezirk Bialystok (deutsch für Kreis Białystok, auch Belostok) war eine Verwaltungseinheit Nazi-Deutschlands, die während des Überfalls auf die Sowjetunion im Zweiten Weltkrieg geschaffen wurde. Er lag südöstlich von Ostpreußen, im heutigen Nordostpolen sowie in kleineren Teilen des angrenzenden heutigen Weißrusslands und Litauens.\n \nDas Gebiet lag östlich der Molotow-Ribbentrop-Linie und wurde in der Folge von der Sowjetunion besetzt und in die Weißrussische Sozialistische Sowjetrepublik eingegliedert. Nach dem deutschen Angriff auf die Sowjetunion im Juni 1941 wurde der westliche Teil Sowjet-Weißrusslands (der bis 1939 zum polnischen Staat gehörte) der deutschen Zivilverwaltung unterstellt. Als Bezirk Bialystok stand das Gebiet von 1941 bis 1944 unter deutscher Herrschaft, ohne jemals formell in das Deutsche Reich eingegliedert zu werden.\n \nDer Bezirk wurde aufgrund seiner militärischen Bedeutung als Brückenkopf am anderen Ufer der Memel gegründet. Deutschland hatte bereits während des Ersten Weltkriegs den Wunsch verspürt, das Gebiet zu annektieren. Grundlage hierfür war der historische Anspruch aus der Dritten Teilung Polens, in deren Rahmen Białystok von 1795 bis 1806 an Preußen fiel (siehe Neu-Ostpreußen).\n \nIm Gegensatz zu den meisten anderen Gebieten östlich der Molotow-Ribbentrop-Linie, die nach dem Zweiten Weltkrieg dauerhaft von der Sowjetunion annektiert wurden, wurde der Großteil des Gebiets später an Polen zurückgegeben."
landgrabevents.3.a:0 "Exzellent."

 
landgrabevents.4.t:0 "Annexion von Eupen-Malmedy"
landgrabevents.4.d:0 "Eupen-Malmedy oder Eupen-Malmédy ist eine kleine, überwiegend deutschsprachige Region im Osten Belgiens. Sie besteht aus drei Verwaltungskantonen rund um die Kleinstädte Eupen, Malmedy und Sankt Vith, die zusammen eine Fläche von etwa 730 Quadratkilometern (280 Quadratmeilen) umfassen. In der Region selbst wird die Region als Ostbelgien bezeichnet. Anderswo in Belgien wird die Region üblicherweise als Ostkantone (französisch: Cantons de l&#39;Est, niederländisch: Oostkantons) bezeichnet.\n \nEupen-Malmedy wurde nach dem Ersten Weltkrieg Teil Belgiens. Die Region, die zuvor zu Preußen und dem Deutschen Reich gehört hatte, wurde durch den Vertrag von Versailles Belgien zugeteilt. Nach einer umstrittenen Volksabstimmung im Jahr 1920 wurde sie formell annektiert und 1925 Teil der Provinz Lüttich. Agitationen deutscher Nationalisten in der Zwischenkriegszeit führten im Zweiten Weltkrieg zu ihrer erneuten Annexion durch Nazi-Deutschland. Es wurde 1945 an Belgien zurückgegeben. Heute ist es ein großer Bestandteil der Deutschsprachigen Gemeinschaft Belgiens, einer der drei föderalen Gemeinschaften Belgiens."
landgrabevents.4.a:0 "Exzellent."
 
landgrabevents.5.t:0 "Annexion Nordschleswigs"
landgrabevents.5.d:0 "Etwa 15.000 Menschen in Dänemark gehören einer autochthonen ethnischen deutschen Minderheit an, die auf Dänisch traditionell als „hjemmetyskere“ (Einheimische Deutsche) und auf Deutsch als „Nordschleswiger“ bezeichnet wird. Diese deutsche Minderheit besitzt die dänische Staatsbürgerschaft und bezeichnet sich selbst als ethnische Deutsche. Sie sprechen im Allgemeinen Deutsch oder Niederdeutsch sowie den südjütländischen Dialekt des Dänischen als ihre Muttersprachen. Darüber hinaus leben in Dänemark mehrere tausend deutsche Einwanderer, die keine historische Verbindung zu dieser Gruppe haben. Im Jahr 1920, nach dem Ersten Weltkrieg, fanden im nördlichsten Teil der preußischen Provinz Schleswig-Holstein (der nördlichen Hälfte des ehemaligen Herzogtums Schleswig) zwei Volksabstimmungen statt. Nord-Schleswig wird in den Gau Schleswig-Holstein eingegliedert. Wieder einmal wurde Deutschland eine unrechtmäßig gestohlene Provinz zurückgegeben!"
landgrabevents.5.a:0 "Exzellent."
 
landgrabevents.6.t:0 "Annexion Luxemburgs"
landgrabevents.6.d:0 "Gustav Simon wurde am 21. Juli 1940 vom Oberkommando des Heeres zum Chef der Zivilverwaltung (CdZ) ernannt. Sein Ziel war es, „Luxemburg so schnell wie möglich für die deutsche Nation zurückzugewinnen“. Er war überzeugt, dass die Luxemburger lediglich ein gewisses Maß an Bildung und Aufklärung brauchten, um freiwillig ihre Loyalität zu Deutschland zu erklären. Er schloss dies aus seiner Überzeugung, dass sie tatsächlich Deutsche „von Blut und Abstammung“ seien. Für den Gauleiter war die Unabhängigkeit Luxemburgs eine „absurde Idee“, die nur existierte, weil Monarchie und Regierung sie gefördert hatten. Wenn den Luxemburgern Beweise für ihre Zugehörigkeit zur deutschen Nation vorgelegt würden, müsse ihr Wille zur Unabhängigkeit verschwinden."
landgrabevents.6.a:0 "Exzellent."

landgrabevents.7.t:0 "Annexion Belgiens"
landgrabevents.7.d:0 "Im Dezember 1944 wurde Belgien (theoretisch einschließlich der beiden französischen Départements) in einen Reichsgau Flandern, einen Reichsgau Wallonien und einen Distrikt Brüssel aufgeteilt, die alle nominell vom Großdeutschen Reich annektiert wurden (mit Ausnahme der geplanten Provinz Brabant). In Flandern wurde die Partei DeVlag unter der Führung von Jef van de Wiele die einzige politische Partei, in Wallonien die Rexist Party unter der Führung von Léon Degrelle. Van de Wiele wurde zum „Nationalen Führer des flämischen Volkes“ (Landsleider van het Vlaamsche volk) ernannt, zusätzlich zu den üblichen Titeln Gauleiter und Reichsstatthalter, die nationalsozialistischen deutschen Regionalverwaltern verliehen wurden. Er wurde außerdem „Vorsitzender des Flämischen Befreiungskomitees“ (Hoofd van het Vlaamsche Bevrijdingscomité)."
landgrabevents.7.a:0 "Exzellent."

