ron_welcomeevents.2.t:0 "WARNUNG: ARBEITEN IN ARBEIT"
ron_welcomeevents.2.d:0 "Wenn du diese Warnung erhältst, bedeutet das, dass das von dir gewählte Szenario noch nicht 100% fertig ist. Wir arbeiten daran. Wir empfehlen die folgenden Epochen:\n\n- Beginn eines neuen Jahrhunderts 1900-1910\n- Erster Weltkrieg 1910-1918\n- Zweiter Weltkrieg 1933-1945\n- Kalter Krieg 1946-1950\n\nWenn du dieses Szenario trotzdem spielen möchtest, dann mach weiter, aber beschwer dich nicht über fehlende Inhalte. Wir haben dich gewarnt."
ron_welcomeevents.2.a:0 "OMG LEERER MOD"

ron_welcomeevents.3.t:0 "Wollen Sie Friedensabkommen, die auf dem Papier stehen?"
ron_welcomeevents.3.d:0 "Diese Option ist für Spieler gedacht, die geskriptete Friedensabkommen nicht mögen. Lasse sie aktiviert, wenn du ein historisches Spiel spielen möchtest. Wenn du hingegen Sandbox- oder ahistorisches Gameplay bevorzugst, empfehlen wir dir, sie zu deaktivieren.\n\n§RHINWEIS = Dies ist noch in Arbeit. Erwarte also nicht, dass JEDES geskriptete Friedensabkommen behoben wird. Bitte hinterlasse einen Kommentar im Bug Reports Channel, wenn du ein Problem findest, das nicht behoben wurde.§!"
ron_welcomeevents.3.a:0 "Ja (Historisch)"
ron_welcomeevents.3.b:0 "Nein (ahistorisch)"

