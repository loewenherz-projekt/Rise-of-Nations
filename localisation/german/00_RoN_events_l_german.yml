  #### WW2 NEWS
  
 ww2news.500.t:0 "Unternehmen Barbarossa"
 ww2news.500.d:0 "Unternehmen Barbarossa war der Deckname für den Überfall Nazideutschlands auf die Sowjetunion im Zweiten Weltkrieg, der am 22. Juni 1941 begann. Über 4,5 Millionen Soldaten der Achsenmächte marschierten entlang einer 2.900 Kilometer langen Front in die UdSSR ein. Neben der großen Truppenstärke waren auch 600.000 Kraftfahrzeuge und 750.000 Pferde im Einsatz. Die Planungen für das Unternehmen Barbarossa begannen am 18. Dezember 1940; die geheimen Vorbereitungen und die Militäroperation selbst dauerten fast ein Jahr, vom Frühjahr bis zum Winter 1941." 
 ww2news.500.a:0 "Auf geht&#39;s, Deutschland!"
 ww2news.500.b:0 "Faschistische Bastarde!"
 ww2news.500.c:0 "Besorgniserregend."
 ww2news.500.e:0 "Die ganze Welt hält den Atem an."
 
 ww2germany.5.t:0 "Unternehmen Barbarossa"
 ww2germany.5.d:0 "Unternehmen Barbarossa (deutsch: Unternehmen Barbarossa, für Friedrich I.) war der Deckname für den Einmarsch Nazideutschlands in die Sowjetunion während des Zweiten Weltkriegs, der am 22. Juni 1941 begann. Über 4,5 Millionen Soldaten der Achsenmächte marschierten entlang einer 2.900 Kilometer langen Front in die UdSSR ein. Neben der großen Truppenstärke waren auch 600.000 Kraftfahrzeuge und 750.000 Pferde im Einsatz. Die Planungen für das Unternehmen Barbarossa begannen am 18. Dezember 1940; die geheimen Vorbereitungen und die Militäroperation selbst dauerten fast ein Jahr, vom Frühjahr bis zum Winter 1941." 
 ww2germany.5.a:0 "Lasst uns den Bolschewismus zerschlagen!"
 
 ww2operations.0.t:0 "Operation Weserübung"
 ww2operations.0.d:0 "Operation Weserübung war der Deckname für den deutschen Angriff auf Dänemark und Norwegen während des Zweiten Weltkriegs und der Auftakt zum Norwegenfeldzug. Der Name leitet sich vom deutschen Wort für „Operation Weser-Übung“ ab, da die Weser ein deutscher Fluss ist. Am frühen Morgen des 9. April 1940 (Wesertag) marschierte Deutschland in Dänemark und Norwegen ein, angeblich um die beiden Länder vor einem möglichen Angriff Frankreichs und Großbritanniens zu schützen."
 ww2operations.0.a:0 "OK."
 
 ww2operations.1.t:0 "Operation Seelöwe"
 ww2operations.1.d:0 "Operation Seelöwe, Sealion (Unternehmen Seelöwe), war der Deckname Nazi-Deutschlands für den Plan zur Invasion des Vereinigten Königreichs während der Luftschlacht um England im Zweiten Weltkrieg. Die Invasion fand nicht statt, obwohl die Vorbereitungen sehr intensiv waren und die Bedrohung durch eine Invasion lange Zeit bestehen blieb, zunächst um den psychologischen Druck auf die britische Bevölkerung und Regierung aufrechtzuerhalten und anschließend, um die Pläne der Deutschen für einen Angriff auf die Sowjetunion zu vertuschen."
 ww2operations.1.a:0 "OK."
 
 ww2operations.2.t:0 "Gehäuse Blau"
 ww2operations.2.d:0 "„Fall Blau“ war der Name der deutschen Streitkräfte für ihren Plan für die strategische Sommeroffensive 1942 in Südrussland zwischen dem 28. Juni und dem 24. November 1942 während des Zweiten Weltkriegs. Die Operation war eine Fortsetzung der Operation Barbarossa des Vorjahres und sollte die Sowjetunion aus dem Krieg werfen. Sie umfasste einen zweigleisigen Angriff: einen von der rechten Flanke der Achsenmächte auf die Ölfelder von Baku (Unternehmen Edelweiß) und einen von der linken Flanke in Richtung Stalingrad entlang der Wolga (Unternehmen Fischreiher)."
 ww2operations.2.a:0 "OK."
 
 ww2operations.3.t:0 "Operation Wache am Rhein"
 ww2operations.3.d:0 "Die Ardennenoffensive, auch bekannt als Ardennenoffensive, fand vom 16. Dezember 1944 bis zum 25. Januar 1945 statt und war die letzte große deutsche Offensive an der Westfront im Zweiten Weltkrieg. Sie führte gegen Kriegsende durch die dicht bewaldeten Ardennen in Wallonien in Ostbelgien, Nordostfrankreich und Luxemburg. Ziel der Offensive war es, die Nutzung des belgischen Hafens Antwerpen durch die Alliierten zu stoppen und die alliierten Linien zu spalten. So konnten die Deutschen vier alliierte Armeen einkreisen und vernichten und die Westalliierten zu Friedensverhandlungen zugunsten der Achsenmächte zwingen."
 ww2operations.3.a:0 "OK."
 
 ww2operations.4.t:0 "Operation Fackel"
 ww2operations.4.d:0 "Operation Torch war eine anglo-amerikanische Invasion in Französisch-Nordafrika während des Zweiten Weltkriegs. Ziel war es, den Druck auf die alliierten Streitkräfte in Ägypten zu verringern und eine Invasion in Südeuropa zu ermöglichen. Der amerikanische General Dwight D. Eisenhower, der die Operation befehligte, plante einen dreigleisigen Angriff mit Zielen auf Casablanca (Westen), Oran (Mitte) und Algier (Osten), gefolgt von einem schnellen Vormarsch auf Tunis."
 ww2operations.4.a:0 "OK."
 
 ww2operations.5.t:0 "Operation Husky"
 ww2operations.5.d:0 "Die alliierte Invasion Siziliens, bekannt als Operation Husky, begann in der Nacht vom 9. auf den 10. Juli 1943 und endete am 17. August. Strategisch erreichte Husky die von den alliierten Planern gesteckten Ziele; die Alliierten vertrieben die Luft-, Land- und Seestreitkräfte der Achsenmächte von der Insel und die Mittelmeer-Seewege wurden zum ersten Mal seit 1941 für alliierte Handelsschiffe geöffnet. Der italienische Präsident Benito Mussolini wurde in Italien gestürzt und der Weg für die alliierte Invasion Italiens war frei. Der deutsche Präsident Adolf Hitler „brach eine Großoffensive bei Kursk nach nur einer Woche ab, teilweise um Truppen nach Italien umzuleiten“, was zu einer Verringerung der deutschen Stärke an der Ostfront führte. Der Zusammenbruch Italiens machte es erforderlich, dass deutsche Truppen die italienischen in Italien und in geringerem Maße auf dem Balkan ersetzten, wodurch ein Fünftel der gesamten deutschen Armee von Ost- nach Südeuropa umgeleitet wurde, ein Anteil, der bis fast Kriegsende bestehen blieb."
 ww2operations.5.a:0 "OK."
 
 ww2operations.6.t:0 "Operation Overlord"
 ww2operations.6.d:0 "Operation Overlord, eine Militäroperation der Alliierten während des Zweiten Weltkriegs, die zur Befreiung der von Nazideutschland besetzten Gebiete Westeuropas führte. Die Operation begann am 6. Juni 1944, besser bekannt als D-Day, mit der Landung in der Normandie. Alle Marineoperationen erhielten den Schlüsselnamen Operation Neptune. Einem Luftangriff von 1.200 Flugzeugen ging die amphibische Landung mit 5.000 Schiffen voraus. Am 6. Juni überquerten 160.000 Soldaten den Kanal zwischen England und Frankreich, und gegen Ende August zählten mehr als drei Millionen alliierte Truppen auf französischem Boden."
 ww2operations.6.a:0 "OK."
 
 ww2operations.7.t:0 "Operation Dragoon"
 ww2operations.7.d:0 "Operation Dragoon (ursprünglich Operation Anvil) war der Deckname für die alliierte Invasion in Südfrankreich am 15. August 1944. Die Operation sollte ursprünglich parallel zur Operation Overlord, der Landung der Alliierten in der Normandie, durchgeführt werden. Mangels Ressourcen musste die zweite Landung jedoch abgesagt werden. Im Juli 1944 wurde die Landung überdacht, da die überlasteten Häfen in der Normandie nicht über die Kapazitäten verfügten, die alliierten Streitkräfte ausreichend zu versorgen. Gleichzeitig drängte das französische Oberkommando auf eine Wiederaufnahme der Operation unter Beteiligung großer französischer Truppen. Infolgedessen wurde die Operation im Juli schließlich genehmigt und im August durchgeführt."
 ww2operations.7.a:0 "OK."
 
 ww2operations.8.t:0 "Operation Bagration"
 ww2operations.8.d:0 "Operation Bagration, auch bekannt als Bagrationsoffensive, war der Codename für die Massenoffensive der Roten Armee zur Vernichtung der deutschen Heeresgruppe Mitte im Sommer 1944. Im Juni 1944, drei Jahre nach dem deutschen Überfall auf die Sowjetunion, begannen die sowjetischen Streitkräfte mit der Operation. Die Offensive zur Vernichtung der deutschen Heeresgruppe Mitte erreichte ihren Höhepunkt fünf Wochen später, als die Rote Armee vor den Toren Warschaus eintraf. Diese Militäroperation bedeutete die völlige Vernichtung von insgesamt 17 Divisionen der Heeresgruppe Mitte, 50 weitere wurden schwer beschädigt. Es war die schlimmste Niederlage der deutschen Landstreitkräfte im Zweiten Weltkrieg und kostete die Wehrmacht weitaus mehr Mann und Material als die Schlacht von Stalingrad Monate zuvor."
 ww2operations.8.a:0 "OK."
 
 ww2operations.9.t:0 "Operation Seelöwe"
 ww2operations.9.d:0 "Operation Seelöwe, Sealion (Unternehmen Seelöwe), war der Deckname Nazi-Deutschlands für den Plan zur Invasion des Vereinigten Königreichs während der Luftschlacht um England im Zweiten Weltkrieg. Die Invasion fand nicht statt, obwohl die Vorbereitungen sehr intensiv waren und die Bedrohung durch eine Invasion lange Zeit bestehen blieb, zunächst um den psychologischen Druck auf die britische Bevölkerung und Regierung aufrechtzuerhalten und anschließend, um die Pläne der Deutschen für einen Angriff auf die Sowjetunion zu vertuschen."
 ww2operations.9.a:0 "OK."
 
 ww2operations.10.t:0 "Operation Seelöwe"
 ww2operations.10.d:0 "Operation Seelöwe, Sealion (Unternehmen Seelöwe), war der Deckname Nazi-Deutschlands für den Plan zur Invasion des Vereinigten Königreichs während der Luftschlacht um England im Zweiten Weltkrieg. Die Invasion fand nicht statt, obwohl die Vorbereitungen sehr intensiv waren und die Bedrohung durch eine Invasion lange Zeit bestehen blieb, zunächst um den psychologischen Druck auf die britische Bevölkerung und Regierung aufrechtzuerhalten und anschließend, um die Pläne der Deutschen für einen Angriff auf die Sowjetunion zu vertuschen."
 ww2operations.10.a:0 "OK."
 
 ww2operations.11.t:0 "Operation Taifun"
 ww2operations.11.d:0 "Die deutsche strategische Offensive, Operation Taifun, sah zwei Zangenoffensiven vor: eine nördlich von Moskau gegen die Kalininfront durch die 3. und 4. Panzerarmee, die gleichzeitig die Eisenbahnlinie Moskau–Leningrad unterbrachen, und eine weitere südlich der Moskauer Oblast gegen die Westfront südlich von Tula durch die 2. Panzerarmee, während die 4. Armee von Westen her direkt auf Moskau vorrückte. Laut Andrew Roberts war Hitlers Offensive auf die sowjetische Hauptstadt nichts weniger als ein „Totalangriff“. „Es ist keine Übertreibung zu behaupten, dass der Ausgang des Zweiten Weltkriegs während dieses massiven Angriffs auf dem Spiel stand.“"
 ww2operations.11.a:0 "OK."
 
 ww2operations.12.t:0 "Operation Zitadelle"
 ww2operations.12.d:0 "Das Unternehmen Zitadelle (deutsch: Operation Zitadelle) war eine deutsche Offensive gegen die sowjetischen Streitkräfte im Kursker Bogen während des Zweiten Weltkriegs an der Ostfront, die die Schlacht um Kursk einleitete. Diese gezielte Verteidigungsoperation der Sowjets zur Abwehr der deutschen Offensive wird als Strategische Verteidigungsoperation Kursk bezeichnet. Der deutschen Offensive begegneten zwei sowjetische Gegenoffensiven: die Operation Polkowodez Rumjanzew (russisch: Полководец Румянцев) und die Operation Kutusow (russisch: Кутузов). Für die Deutschen war die Schlacht die letzte strategische Offensive, die sie an der Ostfront starten konnten. Als die alliierte Invasion Siziliens begann, war Adolf Hitler gezwungen, in Frankreich ausgebildete Truppen umzuleiten, um den alliierten Bedrohungen im Mittelmeerraum zu begegnen, anstatt sie als strategische Reserve für die Ostfront einzusetzen. Die enormen Verluste Deutschlands an Soldaten und Panzern sorgten dafür, dass die siegreiche sowjetische Rote Armee für den Rest des Krieges die strategische Initiative innehatte."
 ww2operations.12.a:0 "OK."
 
 ww2operations.13.t:0 "Operation Market Garden"
 ww2operations.13.d:0 "Operation Market Garden war eine gescheiterte Militäroperation des Zweiten Weltkriegs, die vom 17. bis 25. September 1944 in den Niederlanden ausgetragen und hauptsächlich von den Generälen Brereton und Williams von der USAAF geplant wurde. Der Luftlandeteil der Operation wurde von der 1. alliierten Luftlandearmee durchgeführt, die Landoperation vom XXX. Korps der britischen 2. Armee. Ziel war es, einen 103 km langen Frontvorsprung in deutsches Gebiet mit einem Stützpunkt über dem Rhein zu schaffen und so den Alliierten eine Invasionsroute nach Norddeutschland zu eröffnen. Dies sollte durch die Einnahme von neun Brücken durch Luftlandetruppen erreicht werden, denen Landtruppen rasch über die Brücken folgten. Im Rahmen der Operation konnten die niederländischen Städte Eindhoven und Nijmegen sowie zahlreiche andere Orte befreit werden, wodurch ein 97 km langer Frontvorsprung in deutsches Gebiet geschaffen und Abschussstellen für V-2-Raketen ausgeschaltet wurden. Der Operation gelang es jedoch nicht, einen Stützpunkt über dem Rhein zu sichern, und sie blieb am Fluss stehen."
 ww2operations.13.a:0 "OK."
 
 ww2operations.14.t:0 "Unternehmen Barbarossa"
 ww2operations.14.d:0 "Unternehmen Barbarossa (deutsch: Unternehmen Barbarossa, für Friedrich I.) war der Deckname für den Einmarsch Nazideutschlands in die Sowjetunion während des Zweiten Weltkriegs, der am 22. Juni 1941 begann. Über 4,5 Millionen Soldaten der Achsenmächte marschierten entlang einer 2.900 Kilometer langen Front in die UdSSR ein. Neben der großen Truppenstärke waren auch 600.000 Kraftfahrzeuge und 750.000 Pferde im Einsatz. Die Planungen für das Unternehmen Barbarossa begannen am 18. Dezember 1940; die geheimen Vorbereitungen und die Militäroperation selbst dauerten fast ein Jahr, vom Frühjahr bis zum Winter 1941." 
 ww2operations.14.a:0 "Lasst uns den Bolschewismus zerschlagen!"
 
 ww2operations.15.t:0 "Sabotage durch die französische Résistance!"
 ww2operations.15.d:0 "Die französische Résistance spielte eine bedeutende Rolle beim schnellen Vormarsch der Alliierten durch Frankreich nach der Invasion der Normandie am 6. Juni 1944 und der weniger bekannten Invasion der Provence am 15. August, indem sie militärische Informationen über die deutschen Verteidigungsanlagen, den sogenannten Atlantikwall, sowie über die Aufstellungen und Schlachtordnungen der Wehrmacht lieferte. Die Résistance plante, koordinierte und führte auch Sabotageakte am Stromnetz, an Verkehrseinrichtungen und Telekommunikationsnetzen durch."
 ww2operations.15.a:0 "Das ist eine Katastrophe!"
 
 ww2operations.16.t:0 "Operation Auguststurm"
 ww2operations.16.d:0 "Die sowjetische Invasion in der Mandschurei, offiziell bekannt als Mandschurische Strategische Offensive (Манчжурская стратегическая наступательная операция, wörtlich Manchzhurskaya Strategicheskaya Nastupatelnaya Operatsiya) oder einfach Mandschurische Operation (Маньчжурская операция), begann am 9. August 1945 mit der sowjetischen Invasion des japanischen Marionettenstaates Mandschukuo. Es war der letzte Feldzug des Zweiten Weltkriegs und der größte des sowjetisch-japanischen Krieges von 1945. Nach fast sechs Jahren Frieden flammten die Feindseligkeiten zwischen der Union der Sozialistischen Sowjetrepubliken und dem Kaiserreich Japan wieder auf. Die sowjetischen Eroberungen auf dem Kontinent umfassten Mandschukuo, Mengjiang (Innere Mongolei) und Nordkorea. Der sowjetische Kriegseintritt und die Niederlage der Kwantung-Armee waren ein wesentlicher Faktor für die Entscheidung der japanischen Regierung zur bedingungslosen Kapitulation. Dies machte deutlich, dass die Sowjetunion nicht die Absicht hatte, als dritte Partei über ein bedingtes Ende der Feindseligkeiten zu verhandeln."
 ww2operations.16.a:0 "OK."
 
 ww2operations.17.t:0 "Gehäuse Gelb"
 ww2operations.17.d:0 "Die Schlacht um Frankreich, auch bekannt als der Fall Frankreichs, war die deutsche Invasion in Frankreich und den Niederlanden während des Zweiten Weltkriegs. In den sechs Wochen ab dem 10. Mai 1940 besiegten deutsche Truppen die alliierten Streitkräfte durch mobile Operationen und eroberten Frankreich, Belgien, Luxemburg und die Niederlande, wodurch die Landoperationen an der Westfront bis zum 6. Juni 1944 eingestellt wurden. Italien trat am 10. Juni 1940 in den Krieg ein und marschierte über die Alpen in Frankreich ein. Im Fall Gelb drangen deutsche Panzereinheiten durch die Ardennen und dann entlang des Somme-Tals vor, schnitten die nach Belgien vorgedrungenen alliierten Einheiten ab und umzingelten sie, um der erwarteten deutschen Invasion entgegenzutreten. Als britische, belgische und französische Streitkräfte durch die mobile und gut organisierte deutsche Operation zum Meer zurückgedrängt wurden, evakuierten die Briten im Rahmen der Operation Dynamo das British Expeditionary Force (BEF) und die französischen Divisionen aus Dünkirchen."
 ww2operations.17.a:0 "OK."
 
ww2operations.18.t:0 "Wiener Offensive"
ww2operations.18.d:0 "Die Wiener Offensive wurde von der 2. und 3. Ukrainischen Front der Sowjetunion im Zweiten Weltkrieg mit dem Ziel gestartet, Wien einzunehmen. Sie dauerte vom 2. bis 13. April 1945. Die Sowjets belagerten die Stadt und standen nur einem einzigen Panzerkorps gegenüber. Nach einigen Tagen Straßenkämpfen hatten die Verteidiger bis auf zwei alle Donaubrücken zerstört, und die Panzer entkamen der Einkesselung. Die einmarschierenden Sowjets verwüsteten die Altstadt, und es kam zu brutalen Übergriffen gegen die Zivilbevölkerung. Stalin stimmte der Wiederherstellung Österreichs als souveräner Staat zu."
ww2operations.18.a:0 "OK."

ww2operations.19.t:0 "Weichsel-Oder-Offensive"
ww2operations.19.d:0 "Die Weichsel-Oder-Offensive war eine erfolgreiche Operation der Roten Armee an der Ostfront im europäischen Kriegsschauplatz des Zweiten Weltkriegs im Januar 1945. Sie führte zum Fall von Krakau, Warschau und Posen. Die Rote Armee hatte ihre Truppenstärke um mehrere wichtige Brückenköpfe herum aufgebaut und zwei Fronten unter dem Kommando von Marschall Georgi Schukow und Marschall Iwan Konew gebildet. Ihnen gegenüber war die deutsche Heeresgruppe A unter Generaloberst Josef Harpe (der bald durch Generaloberst Ferdinand Schörner ersetzt wurde) 5,1 Mann zahlenmäßig unterlegen. Innerhalb weniger Tage evakuierten die deutschen Kommandanten die Konzentrationslager und schickten die Gefangenen auf Todesmärsche nach Westen, wohin auch ethnische Deutsche zu fliehen begannen. In etwas mehr als zwei Wochen war die Rote Armee 483 Kilometer von der Weichsel bis zur Oder vorgerückt und lag nur noch 69 Kilometer vom unverteidigten Berlin entfernt. Doch Schukow ordnete aufgrund des anhaltenden deutschen Widerstands an seiner Nordflanke (Pommern) einen Stopp an, und der Vormarsch auf Berlin musste bis April verschoben werden."
ww2operations.19.a:0 "OK."

ww2operations.20.t:0 "Dnjepr-Offensive"
ww2operations.20.d:0 "Die Schlacht am Dnjepr war eine militärische Operation, die 1943 an der Ostfront des Zweiten Weltkriegs stattfand. Sie war eine der größten Operationen des Zweiten Weltkriegs und umfasste fast 4 Millionen Soldaten gleichzeitig an einer 1.400 Kilometer langen Front. Während der viermonatigen Schlacht wurde das Ostufer des Dnjepr von fünf Fronten der Roten Armee von den deutschen Streitkräften zurückerobert. Diese führten mehrere Angriffsüberquerungen durch, um am Westufer mehrere Stellungen zu errichten. Anschließend wurde Kiew in der Schlacht um Kiew befreit."
ww2operations.20.a:0 "OK."

ww2operations.21.t:0 "Dnjepr-Karpaten-Offensive"
ww2operations.21.d:0 "Die Dnjepr-Karpaten-Offensive, in sowjetischen Geschichtsquellen auch als Befreiung der rechtsufrigen Ukraine bekannt, fand vom 24. Dezember 1943 bis zum 17. April 1944 statt. Es handelte sich um eine strategische Offensive der 1., 2., 3. und 4. Ukrainischen Front sowie der 1. Weißrussischen Front gegen die deutsche Heeresgruppe Süd mit dem Ziel, alle von den Achsenmächten besetzten ukrainischen und moldauischen Gebiete zurückzuerobern. Es war eine der größten Offensiven des Zweiten Weltkriegs. Sie erstreckte sich über eine Frontlänge von über 1.000 km und umfasste fast 3.500.000 Soldaten beider Seiten."
ww2operations.21.a:0 "OK."

ww2operations.22.t:0 "Operation Mars"
ww2operations.22.d:0 "Operation Mars, auch bekannt als Zweite Rschew-Sytschewka-Offensive, war der Codename für eine Offensive sowjetischer Streitkräfte gegen deutsche Streitkräfte während des Zweiten Weltkriegs. Sie fand zwischen dem 25. November und dem 20. Dezember 1942 rund um den Rschew-Bogen in der Nähe von Moskau statt."
ww2operations.22.a:0 "OK."

ww2operations.23.t:0 "Operation Uranus"
ww2operations.23.d:0 "Operation Uranus war der Codename der sowjetischen strategischen Operation im Zweiten Weltkrieg vom 19. bis 23. November 1942, die zur Einkesselung der deutschen 6. Armee, der 3. und 4. rumänischen Armee sowie Teilen der deutschen 4. Panzerarmee führte. Die Operation wurde ungefähr in der Mitte der fünfmonatigen Schlacht um Stalingrad durchgeführt und zielte auf die Vernichtung der deutschen Streitkräfte in und um Stalingrad. Die Planungen für die Operation Uranus hatten im September 1942 begonnen und wurden zeitgleich mit den Plänen zur Einkesselung und Vernichtung der deutschen Heeresgruppe Mitte (Operation Mars) und der deutschen Streitkräfte im Kaukasus entwickelt. Die Rote Armee nutzte die schlechte Vorbereitung der deutschen Armee auf den Winter und die Überlastung ihrer Streitkräfte im Süden der Sowjetunion bei Stalingrad aus und setzte schwächere rumänische Truppen zur Bewachung ihrer Flanken ein. Die Ausgangspunkte der Offensiven wurden entlang des Frontabschnitts direkt gegenüber den rumänischen Streitkräften festgelegt. Diesen Achsenarmeen fehlte es an schwerem Gerät, um mit den sowjetischen Panzern fertig zu werden."
ww2operations.23.a:0 "OK."

ww2operations.24.t:0 "Winterfeldzug 1941–42"
ww2operations.24.d:0 "Als Winterfeldzug 1941–1942 bezeichnete das sowjetische Militärkommando den Zeitraum vom 5. Dezember 1941 bis zum 7. Mai 1942, der den Beginn der Moskauer strategischen Offensive (besser bekannt als Schlacht um Moskau) markierte. Die Eröffnungsphase der strategischen Gegenoffensive der Roten Armee in der Sowjetunion war ein bedeutender, wenn auch kostspieliger Sieg für die Sowjets."
ww2operations.24.a:0 "OK."

weather_events.1.t:0 "Russischer Winter"
weather_events.1.d:0 "Russischer Winter, allgemeiner Winter, allgemeiner Frost oder allgemeiner Schnee bezieht sich auf das raue Winterklima Russlands als einen Faktor, der zum militärischen Scheitern mehrerer Invasionen in Russland beitrug. Ein Faktor, der militärische Manöver beeinträchtigt, ist „allgemeiner Schlamm“ („rasputitsa“), ein Phänomen, das bei Herbstregen und Tauwetter im Frühjahr in Russland auftritt, wobei der Transport auf unbefestigten Straßen durch schlammige Bedingungen erschwert wird."
weather_events.1.a:0 "OK."
 
ww2news.0.t:0 "Gran Sasso-Raid"
ww2news.0.d:0 "Am 12. September 1943 wurde Benito Mussolini, der im Hotel Campo Imperatore „heimlich“ festgehalten wurde, in einer gewagten Operation unter der Leitung von Otto Skorzeny gerettet, bei der weder von beiden Seiten ein einziger Schuss abgefeuert wurde und es keine Opfer gab. Skorzeny soll nach der offiziellen Begrüßung Mussolinis gesagt haben: „Il Duce, der Führer hat mich geschickt, um Sie zu befreien!“, worauf Mussolini antwortete: „Ich wusste, mein Freund würde mich nicht im Stich lassen!“. Mussolini wurde anschließend sicher nach Wien geflogen. Man kann mit Sicherheit sagen, dass Otto Skorzeny der gefährlichste Mann Europas ist …"
ww2news.0.a:0 "Ein wahrhaft gewagter Überfall!"
ww2news.1.t:0 "Italienische Sozialrepublik gegründet!"
ww2news.1.d:0 "Nach dem Angriff auf den Gran Sasso und der Rettung Mussolinis zwang Hitler den widerstrebenden Mussolini zur Gründung eines neuen faschistischen Staates in Norditalien, der Italienischen Sozialrepublik. Dieser beanspruchte Rom als Hauptstadt, doch die De-facto-Hauptstadt wurde die kleine Stadt Salo zwischen Mailand und Venedig. Die Italienische Sozialrepublik ist kaum mehr als ein Marionettenstaat, der vollständig von Deutschland abhängig ist, das ist heute jedem klar."
ww2news.1.a:0 "Der Krieg wird weitergehen"
ww2news.2.t:0 "Italien kapituliert!"
ww2news.2.d:0 "Nach der erfolgreichen Invasion Siziliens und dem Sturz Benito Mussolinis durch die neue Regierung unter Pietro Badoglio und Vitorio Emmanuel wurde am 3. September in Sizilien nach geheimen Verhandlungen mit den Alliierten ein geheimer Waffenstillstand unterzeichnet, der nun offiziell bekannt gegeben wird. Es ist nur eine Frage der Zeit, bis die Italiener, die öffentlich erklärt haben, weiterhin an der Seite der Deutschen zu kämpfen, mit den Achsenmächten in Konflikt geraten. Da die Verhandlungen der neuen italienischen Regierung über den Waffenstillstand jedoch so lange gedauert haben, ist davon auszugehen, dass die Deutschen auf diesen baldigen groß angelegten Übertritt vorbereitet sein könnten."
ww2news.2.a:0 "Sie waren von Anfang an schwach"

ww2news.3.t:0 "Mussolini stürzt!"
ww2news.3.d:0 "Am 25. Juli 1943 wurde Benito Mussolini von seinem eigenen Großen Rat abgewählt und verhaftet, als er ein Treffen mit König Vittorio Emanuele verließ, der dem Duce mitgeteilt hatte, der Krieg sei verloren, und ihn als Premierminister abgesetzt hatte. Berichten zufolge reagierte der Duce kaum, war benommen und unrasiert und protestierte. Er soll nun in einen geheimen Bereich gebracht werden, wo er bis Kriegsende gefangen gehalten wird."
ww2news.3.a:0 "Was für eine überraschende Wendung der Ereignisse!"
ww2news.4.t:0 "Rom bombardiert!"
ww2news.4.d:0 "Die Bombardierung Roms erfolgte am 19. Juli 1943 durch 500 amerikanische Bomber, die rund 1.168 Tonnen Bomben abwarfen. Der Bombenangriff zerstörte kaum bedeutende Ziele und traf nur wenige militärische Ziele. Dennoch war dieser Angriff ein Weckruf für die Italiener, die sich langsam gegen den Duce wandten."
ww2news.4.a:0 "Der Duce ist erledigt!"

ww2news.5.t:0 "Deutschland erklärt den Vereinigten Staaten den Krieg!"
ww2news.5.d:0 "Am 11. Dezember 1941, vier Tage nach dem japanischen Angriff auf Pearl Harbor und der Kriegserklärung der USA an das japanische Kaiserreich, erklärte Nazi-Deutschland den USA den Krieg. Die Erklärung war eine Reaktion auf angebliche Provokationen der US-Regierung, als die USA während des Zweiten Weltkriegs offiziell noch neutral waren. Die Entscheidung zur Kriegserklärung traf Adolf Hitler scheinbar spontan und fast ohne Rücksprache. Später am selben Tag erklärten die USA Deutschland den Krieg."
ww2news.5.a:0 "Interessant."

ww2news.6.t:0 "Japan erklärt den Vereinigten Staaten den Krieg!"
ww2news.6.d:0 "Der Angriff auf Pearl Harbor war ein überraschender Militärschlag der Kaiserlich Japanischen Marine gegen den US-Marinestützpunkt Pearl Harbor im Hawaii-Territorium am Morgen des 7. Dezember 1941. Der Angriff, auch bekannt als die Schlacht von Pearl Harbor, führte zum Eintritt der USA in den Zweiten Weltkrieg. Die japanische Militärführung bezeichnete den Angriff als Hawaii-Operation und Operation AI sowie während der Planung als Operation Z."
ww2news.6.a:0 "Interessant."

ww2news.7.t:0 "Militärputsch im Irak!"
ww2news.7.d:0 "Der irakische Staatsstreich von 1941, auch Rashid Ali Al-Gaylani-Putsch oder Golden Square-Putsch genannt, war ein nationalistischer und pro-nazistischer Staatsstreich im Irak am 1. April 1941, der das pro-britische Regime von Regent Abd al-Ilah und seinem Premierminister Nuri al-Said stürzte und Rashid Ali al-Gaylani als Premierminister einsetzte. Der Putsch wurde von vier irakischen nationalistischen Armeegenerälen angeführt, die als „Golden Square“ bekannt waren und den Krieg nutzen wollten, um nach der 1932 gewährten begrenzten Unabhängigkeit die vollständige Unabhängigkeit des Irak zu erzwingen. Zu diesem Zweck arbeiteten sie mit dem deutschen Geheimdienst zusammen und nahmen militärische Unterstützung aus Deutschland und Italien an."
ww2news.7.a:0 "Interessant."

ww2news.8.t:0 "Das Britische Empire besetzt Island"
ww2news.8.d:0 "Die Invasion Islands war eine britische Militäroperation der Royal Navy und der Royal Marines während des Zweiten Weltkriegs mit dem Ziel, Island zu besetzen und Deutschland vorzuenthalten. Zu Kriegsbeginn verhängte Großbritannien im Rahmen seiner Seeblockade strenge Exportkontrollen für isländische Waren und verhinderte so gewinnbringende Lieferungen nach Deutschland. Großbritannien bot Island Hilfe an und bat um Zusammenarbeit „als Kriegspartei und Verbündeter“, doch Reykjavik lehnte ab und bekräftigte seine Neutralität. Die deutsche diplomatische Präsenz in Island und die strategische Bedeutung der Insel alarmierten die Briten. Nachdem es den Briten nicht gelungen war, die isländische Regierung davon zu überzeugen, sich den Alliierten anzuschließen, marschierten sie am Morgen des 10. Mai 1940 ein. Die erste Truppe von 746 britischen Royal Marines unter dem Kommando von Colonel Robert Sturges ging in der Hauptstadt Reykjavík an Land. Da die Truppen auf keinen Widerstand stießen, rückten sie rasch vor, um Kommunikationsnetze lahmzulegen, strategische Standorte zu sichern und deutsche Staatsbürger zu verhaften."
ww2news.8.a:0 "Interessant."

ww2news.9.t:0 "Die Vereinigten Staaten von Amerika besetzen Grönland"
ww2news.9.d:0 "Am 9. April 1941, dem Jahrestag der deutschen Besatzung, unterzeichnete der dänische Gesandte Kauffmann entgegen den Anweisungen seiner Regierung ein Durchführungsabkommen mit Außenminister Cordell Hull, das die Anwesenheit amerikanischer Truppen erlaubte und Grönland de facto zu einem Protektorat der Vereinigten Staaten machte."
ww2news.9.a:0 "Interessant."

ww2news.10.t:0 "Der Anglo-Irakische Krieg"
ww2news.10.d:0 "Der Anglo-Irakische Krieg (2.–31. Mai 1941) war ein von Großbritannien angeführter Feldzug der Alliierten gegen das Königreich Irak unter Führung der Achsenmächte-Regierung von Rashid Ali, die während des Zweiten Weltkriegs die Macht ergriffen hatte. Der Feldzug führte zum Sturz von Alis Regierung, zur Wiederbesetzung des Irak durch das Britische Empire und zur Rückkehr des irakischen Regenten Prinz Abd al-Ilah, eines Verbündeten des britischen Imperiums, an die Macht."
ww2news.10.a:0 "Interessant."

ww2news.11.t:0 "Die anglo-sowjetische Invasion Persiens"
ww2news.11.d:0 "Die anglo-sowjetische Invasion des Iran, auch bekannt als die anglo-sowjetische Invasion Persiens, war die gemeinsame Invasion des Britischen Commonwealth und der Sowjetunion im Iran im Jahr 1941 während des Zweiten Weltkriegs. Die Invasion dauerte vom 25. August bis zum 17. September 1941 und trug den Codenamen Operation Countenance. Ihr Zweck war es, iranische Ölfelder zu sichern und die alliierten Versorgungslinien (siehe Persischer Korridor) für die UdSSR sicherzustellen, die an der Ostfront gegen die Achsenmächte kämpfte. Obwohl der Iran neutral war, betrachteten die Alliierten Reza Schah als deutschfreundlich, setzten ihn während der anschließenden Besatzung ab und ersetzten ihn durch seinen jungen Sohn Mohammad Reza Pahlavi."
ww2news.11.a:0 "Interessant."

ww2italy.0.t:0 "Wir ergeben uns!"
ww2italy.0.d:0 "Nach der erfolgreichen Invasion Siziliens und dem Sturz Benito Mussolinis durch die neue Regierung unter Pietro Badoglio und Vitorio Emmanuel wurde am 3. September in Sizilien nach geheimen Verhandlungen mit den Alliierten ein geheimer Waffenstillstand unterzeichnet, der nun offiziell bekannt gegeben wird. Es ist nur eine Frage der Zeit, bis die Italiener, die öffentlich erklärt haben, weiterhin an der Seite der Deutschen zu kämpfen, mit den Achsenmächten in Konflikt geraten. Da die Verhandlungen der neuen italienischen Regierung über den Waffenstillstand jedoch so lange gedauert haben, ist davon auszugehen, dass die Deutschen auf diesen baldigen groß angelegten Übertritt vorbereitet sein könnten."
ww2italy.0.a:0 "Es ist Zeit, gegen Deutschland vorzugehen!"
ww2italy.0.b:0 "Wir werden niemals kapitulieren!"
ww2italy.1.t:0 "Mussolini stürzt die Macht"
ww2italy.1.d:0 "Am 25. Juli 1943 wurde Benito Mussolini von seinem eigenen Großen Rat abgewählt und verhaftet, als er ein Treffen mit König Vittorio Emanuele verließ, der dem Duce mitgeteilt hatte, der Krieg sei verloren, und ihn als Premierminister abgesetzt hatte. Berichten zufolge reagierte der Duce kaum, war benommen und unrasiert und protestierte. Er soll nun in einen geheimen Bereich gebracht werden, wo er bis Kriegsende gefangen gehalten wird."
ww2italy.1.a:0 "Il Duce gibt es nicht mehr!"

ww2germany.0.t:0 "Italienische Sozialrepublik gegründet!"
ww2germany.0.d:0 "Nach dem Angriff auf den Gran Sasso und der Rettung Mussolinis zwang Hitler den widerstrebenden Mussolini zur Gründung eines neuen faschistischen Staates in Norditalien, der Italienischen Sozialrepublik. Dieser beanspruchte Rom als Hauptstadt, doch die De-facto-Hauptstadt wurde die kleine Stadt Salo zwischen Mailand und Venedig. Die Italienische Sozialrepublik ist kaum mehr als ein Marionettenstaat, der vollständig von Deutschland abhängig ist, das ist heute jedem klar."
ww2germany.0.a:0 "Dieser Kampf muss weitergehen!"
ww2germany.1.t:0 "Italiens Übertritt steht unmittelbar bevor"
ww2germany.1.d:0 "Nach Mussolinis Sturz und seiner Gefangennahme sowie der neuen Regierung unter König Viktor Emanuel III. und Pietro Badoglio ist ein Seitenwechsel Italiens kaum abwegig. Er dürfte unmittelbar bevorstehen, da die italienische Kampfbereitschaft nach diesen Ereignissen dramatisch sinkt. Wir müssen eine beträchtliche Anzahl von Truppen nach Italien schicken, um den Seitenwechsel vorzubereiten und die Kontrolle zu übernehmen, bevor die Alliierten dies tun."
ww2germany.1.a:0 "Wir müssen die Kontrolle über Italien übernehmen!"


ww2germany.2.t:0 "Der Plan vom 20. Juli scheitert!"
ww2germany.2.d:0 "Heute, während sich der Führer in seinem Feldhauptquartier „Wolfsschanze“ in Ostpreußen aufhielt, wurde ein Attentat auf ihn verübt. Offenbar zielte das Attentat darauf ab, unseren geliebten Führer zu töten, die politische Kontrolle über Deutschland und seine Streitkräfte zu übernehmen und so schnell wie möglich Frieden mit den Westalliierten zu schließen. Wir haben so viele Verschwörer wie möglich festgenommen, und sie werden dafür als Vergeltung streng bestraft!"
ww2germany.2.a:0 "Sie sind einfach nur dreckige Feiglinge!"
ww2germany.3.t:0 "Führer tot!"
ww2germany.3.d:0 "Der Führer, dessen schnell vorrückende Rote Armee sich Straße für Straße seinem Führerbunker nähert, hat bis zum letzten Moment tapfer gekämpft und sich entschlossen, Selbstmord zu begehen, um das Leben des deutschen Volkes zu retten und es von seinen Eiden zu entbinden. Zweifellos ist sein Tod nicht aus Feigheit, sondern aus Tapferkeit entstanden. Er ruht nun mit den Millionen anderer Menschen, die für das Reich ihr Leben riskiert und gestorben sind."
ww2germany.3.a:0 "Der Krieg geht weiter!"
ww2germany.4.t:0 "Jodel und Keitl kapitulieren alle deutschen Streitkräfte"
ww2germany.4.d:0 "Heute wurde in Berlin-Karlshorst der endgültige Text für die deutsche Kapitulation aller Streitkräfte von Vertretern dreier Teilstreitkräfte des Oberkommandos der Wehrmacht (OKW) und der Alliierten Expeditionsstreitkräfte sowie dem Obersten Oberkommando der Roten Armee unterzeichnet. Weitere französische und US-amerikanische Vertreter unterzeichneten als Zeugen. Die erste Kapitulationsurkunde wurde in Reims von Alfred Jodl unterzeichnet, dem es leider nicht gelungen war, bessere Kapitulationsbedingungen auszuhandeln. Wenige Stunden später rief die Sowjetunion jedoch in Berlin zu einer einmaligen Kapitulation auf, wo diese „deutsche Aggression“ ihren Ursprung hatte, und stellte gleichzeitig klar, dass die Kapitulation von Reims von den deutschen Soldaten nicht ausdrücklich verlangte, ihre Waffen niederzulegen und sich zu ergeben. Eisenhower stimmte zu und die endgültige Urkunde über die bedingungslose Kapitulation des deutschen Militärs wurde in Berlin von Feldmarschall Wilhelm Keitl unterzeichnet."
ww2germany.4.a:0 "Alles ist verloren ..."


ww2news.12.t:0 "Il Duce nicht mehr ..."
ww2news.12.d:0 "Benito Mussolini, der einst gefürchtete faschistische Diktator Italiens, ist schließlich seinen eigenen Ambitionen erlegen und wurde zusammen mit seiner Geliebten Clara Petacci von Partisanen hingerichtet. Beide wurden öffentlich gehängt, damit das italienische Volk seiner Wut auf seinen ehemaligen Unterdrücker Ausdruck verleihen konnte, indem es auf die Leichen pinkelte oder spuckte, während sie in der Sommerhitze an den Zehen hingen. Mussolini versuchte offenbar ein zweites Mal, dem Tod zu entkommen, doch das Glück war ihm nicht hold, und die Gerechtigkeit nahm ihren Lauf."
ww2news.12.a:0 "Ein Diktator weniger"

ww2news.13.t:0 "Hitler-Komplott scheitert!"
ww2news.13.d:0 "Heute, am 20. Juli 1944, scheiterte ein Anschlag auf den deutschen Führer Adolf Hitler in seinem Hauptquartier „Wolfsschanze“. Damit scheiterte auch der Putschversuch, der einen möglichst schnellen Frieden mit den Westalliierten zum Ziel hatte. Zweifellos werden die Verschwörer einen hohen Preis zahlen, aber wir bewundern ihren Mut."
ww2news.13.a:0 "Das Ende für Deutschland ist nahe"
ww2news.14.t:0 "Hitler tot!"
ww2news.14.d:0 "Der deutsche Führer Adolf Hitler hat sich heute in seinem Führerbunker das Leben genommen. Weltweit jubeln die Menschen über die Nachricht, dass dieser Tyrann endlich ins Gras beißt. Es ist jedoch eine Schande, dass er nicht vor Gericht gestellt wird und die wahre Demütigung erfährt. \n\n Nach Hitlers Tod hat Admiral Dönitz offiziell die Kontrolle über Deutschland übernommen und mit den Worten „Wir kämpfen weiter“ deutlich gemacht, dass der Krieg noch lange nicht vorbei ist."
ww2news.14.a:0 "Das Ende für Deutschland ist nahe"

#ww2news.1500.t:0 "The Yalta Conference"
#ww2news.1500.d:0 "Seeing a joint victory against [GER.GetNameDef] as inevitable, The Allies and the Comintern are looking to secure future stability in Europe. They, and leaders for other countries participating in the war effort have met to agree on the fate of [GER.GetNameDef].\n\nDays of negotiations have led to the drawing of a new map of Europe. This new European order is divided between the east and the west by the wound about to be carved through the middle of [GER.GetNameDef].\n\nIt remains to be seen whether this will truly lead to lasting peace in Europe."
#ww2news.1500.a:0 "Don't praise the day before the evening's over."
#ww2news.1500.b:0 "We showed those Nazis."
#ww2news.1500.c:0 "Now to address the Commie in the room..."
#ww2news.1500.e:0 "This may be the end of [GER.GetNameDef]."

ww2news.15.t:0 "Der Krieg in Europa ist beendet!"
ww2news.15.d:0 "Reims, Frankreich, 7. Mai – Deutschland hat heute um 2:41 Uhr französischer Zeit bedingungslos vor den Westalliierten und der Sowjetunion kapituliert. Die Kapitulation fand in einem kleinen roten Schulhaus statt, in dem sich das Hauptquartier von General Dwight D. Eisenhower befindet. Die Kapitulation, die den Krieg in Europa nach fünf Jahren, acht Monaten und sechs Tagen des Blutvergießens und der Zerstörung formell beendete, wurde für Deutschland von Generaloberst Gustav Jodl unterzeichnet. General Jodl ist der neue Stabschef des deutschen Heeres. Für das Oberste Alliierte Kommando wurde die Kapitulation von Generalleutnant Walter Bedell Smith, dem Stabschef von General Eisenhower, unterzeichnet. Sie wurde außerdem von General Ivan Susloparoff für die Sowjetunion und von General Francois Sevez für Frankreich unterzeichnet. General Eisenhower war bei der Unterzeichnung nicht anwesend, doch unmittelbar danach wurden General Jodl und sein Mitdelegierter, Generaladmiral Hans Georg Friedeburg, vom Oberbefehlshaber der Alliierten Armee empfangen."
ww2news.15.a:0 "Sie haben tapfer gekämpft."
ww2news.15.b:0 "Wir haben es diesen Nazis gezeigt."
ww2news.15.c:0 "Nun zu den Kommunisten im Raum ..."
ww2news.15.e:0 "Dies ist das Ende von [GER.GetNameDef]."

ww2news.16.t:0 "Japan kapituliert, Kriegsende!"
ww2news.16.d:0 "Washington, 14. August – Japan hat heute bedingungslos sein mit Gewalt erobertes und über zwei Jahre lang nahezu intakt gehaltenes Imperium auf der westlichen Hemisphäre aufgegeben und der aufstrebenden Macht der USA und ihrer Verbündeten im Pazifikkrieg standhalten können. Der blutige Traum der japanischen Militärkaste löste sich im Text einer Note an die Vier Mächte auf, in der diese die Bedingungen der Potsdamer Erklärung vom 26. Juli 1945 akzeptierten, die die Kairoer Erklärung von 1943 ergänzte. Wie die vorherigen Punkte der Kapitulationskorrespondenz wurde auch das heutige japanische Dokument über das Schweizer Auswärtige Amt in Bern und die Schweizer Gesandtschaft in Washington weitergeleitet. Die Note der vollständigen Kapitulation wurde dem Außenministerium um 18.10 Uhr vom Geschäftsträger der Gesandtschaft zugestellt, nach dem dritten und angespanntesten Tag des Wartens auf Tokio, wobei die Angst durch mehrere voreilige oder falsche Berichte über den Ausgang des Zweiten Weltkriegs noch verstärkt worden war."
ww2news.16.a:0 "Sie haben tapfer gekämpft."
ww2news.16.b:0 "Wir haben es diesen Faschisten gezeigt."
ww2news.16.c:0 "Nun zu den Kommunisten im Raum ..."
ww2news.16.e:0 "Dies ist das Ende von [JAP.GetNameDef]."

ww2japan.0.t:0 "Kapitulation Japans"
ww2japan.0.d:0 "Am 6. August 1945 um 8:15 Uhr Ortszeit zündeten die Vereinigten Staaten eine Atombombe über der japanischen Stadt Hiroshima. Sechzehn Stunden später rief der amerikanische Präsident Harry S. Truman Japan erneut zur Kapitulation auf und warnte die Japaner, sie müssten „mit einem verheerenden Regen aus der Luft rechnen, wie ihn die Erde noch nie erlebt hat“. Am späten Abend des 8. August 1945 erklärte die Sowjetunion Japan gemäß den Abkommen von Jalta, jedoch unter Verletzung des sowjetisch-japanischen Neutralitätspakts, den Krieg und marschierte kurz nach Mitternacht des 9. August 1945 in den kaiserlich-japanischen Marionettenstaat Mandschukuo ein. Später am selben Tag warfen die Vereinigten Staaten eine zweite Atombombe ab, diesmal auf die japanische Stadt Nagasaki. Nach diesen Ereignissen intervenierte Kaiser Hirohito und befahl dem Obersten Rat für die Kriegsleitung, die in der Potsdamer Erklärung der Alliierten festgelegten Bedingungen zur Beendigung des Krieges zu akzeptieren. Nach mehreren weiteren Tagen der Verhandlungen hinter den Kulissen und einem gescheiterten Staatsstreich hielt Kaiser Hirohito am 15. August eine aufgezeichnete Radioansprache im ganzen Reich. In der Radioansprache, die als „Jewel Voice Broadcast“ bezeichnet wurde, verkündete er die Kapitulation Japans vor den Alliierten."
ww2japan.0.a:0 "Alles ist verloren ..."

 ww2japan.1.t:0 "Amerikanische Kapitulation"
 ww2japan.1.d:0 "Die Zeit ist gekommen. Eine erfolgreiche Invasion der Vereinigten Staaten von Amerika wurde gestartet, und nach langen Kämpfen und zahlreichen Opfern haben die Amerikaner kapituliert. Gemäß dem mit Deutschland unterzeichneten Vertrag teilen wir den nordamerikanischen Kontinent entlang der Rocky Mountains auf und schaffen so eine neutrale Zone zwischen unseren beiden Supermächten. Nun müssen wir entscheiden, was wir mit unserem Teil des ehemaligen amerikanischen Territoriums tun."
 ww2japan.1.a:0 "Integrieren Sie es in Dai-Nippon Teikoku!"
 ww2japan.1.b:0 "Setzen Sie eine freundliche Regierung ein."
 ww2japan.1.c:0 "Satellit."
 ww2japan.1.e:0 "Die japanischen Pazifikstaaten."
 
ww2japan.2.t:0 "Kanadische Kapitulation"
ww2japan.2.d:0 "Die Zeit ist gekommen. Eine erfolgreiche Invasion Kanadas wurde gestartet, und nach einigen Kämpfen und einigen Verlusten haben die Kanadier kapituliert. Gemäß dem mit Deutschland unterzeichneten Vertrag teilen wir den nordamerikanischen Kontinent entlang der Rocky Mountains auf und schaffen so eine neutrale Zone zwischen unseren beiden Supermächten. Nun müssen wir entscheiden, was wir mit unserem Teil des ehemaligen kanadischen Territoriums tun."
ww2japan.2.a:0 "Integrieren Sie es in Dai-Nippon Teikoku!"
ww2japan.2.b:0 "Setzen Sie eine freundliche Regierung ein."
ww2japan.2.c:0 "Satellit."
ww2japan.2.e:0 "Die japanischen Pazifikstaaten."

 ww2germany.6.t:0 "Amerikanische Kapitulation"
 ww2germany.6.d:0 "Die Zeit ist gekommen. Eine erfolgreiche Invasion der Vereinigten Staaten von Amerika wurde gestartet, und nach langen Kämpfen und zahlreichen Opfern haben die Amerikaner kapituliert. Gemäß dem mit Japan unterzeichneten Vertrag teilen wir den nordamerikanischen Kontinent entlang der Rocky Mountains auf und schaffen so eine neutrale Zone zwischen unseren beiden Supermächten. Nun müssen wir entscheiden, was wir mit unserem Teil des ehemaligen amerikanischen Territoriums tun."
 ww2germany.6.a:0 "Integrieren Sie es in das Reich!"
 ww2germany.6.b:0 "Setzen Sie eine freundliche Regierung ein."
 ww2germany.6.c:0 "Satellit."
 ww2germany.6.e:0 "Deutsch-Nordamerika."
 
ww2germany.7.t:0 "Kanadische Kapitulation"
ww2germany.7.d:0 "Die Zeit ist gekommen. Eine erfolgreiche Invasion Kanadas wurde gestartet, und nach einigen Kämpfen und einigen Verlusten haben die Kanadier kapituliert. Gemäß dem mit Japan unterzeichneten Vertrag teilen wir den nordamerikanischen Kontinent entlang der Rocky Mountains auf und schaffen so eine neutrale Zone zwischen unseren beiden Supermächten. Nun müssen wir entscheiden, was wir mit unserem Teil des ehemaligen kanadischen Territoriums tun."
ww2germany.7.a:0 "Integrieren Sie es in das Reich!"
ww2germany.7.b:0 "Setzen Sie eine freundliche Regierung ein."
ww2germany.7.c:0 "Satellit."
ww2germany.7.e:0 "Deutsch-Nordamerika."

 ww2germany.8.t:0 "Entstehung des nationalsozialistischen Amerikas"
 ww2germany.8.d:0 "Das Territorium des Nazi-Amerikas besteht aus den östlichen und mittleren Teilen der ehemaligen Vereinigten Staaten – von Maine bis Florida und von North Dakota bis Texas – sowie den östlichen zwei Dritteln von Montana, dem östlichen Drittel von Wyoming, dem östlichen Viertel von Colorado, dem östlichen Drittel von New Mexico und dem gesamten östlichen Staatsgebiet Kanadas östlich der Neutralen Zone."
 ww2germany.8.a:0 "Exzellent."
 indep_war_won.wp:0 "Das rebellierende Land und sein ehemaliger Oberherr unterzeichneten ein „Abkommen“."
 
 
 
 INT_baltics.1.t:0 "Die Sowjets schlagen Frieden vor"
 INT_baltics.1.d:0 "Die bolschewistische Regierung hat sich an uns gewandt und fordert einen weißen Frieden zwischen unseren beiden Ländern. Der Krieg brach zu Beginn des russischen Bürgerkriegs aus, als wir versuchten, die Unabhängigkeit zu erlangen. Sollten wir das Angebot annehmen?"
 INT_baltics.1.a:0 "Genug von diesem Krieg!"
 INT_baltics.1.b:0 "Wir werden alles nehmen!"

 space_race.1.t:0 "[?ROOT.wants_to_join_astronauts.GetName] Kandidaten für das Astronautentraining"
 space_race.1.d:0 "Unser nationales Ausbildungsbüro für Astronauten hat uns informiert: [?ROOT.wants_to_join_astronauts.GetName] bewirbt sich für die nächste Astronautenausbildung. Da er aktives Mitglied des Offizierskorps ist, benötigen sie eine Bestätigung, um ihn rekrutieren zu können. Sollen wir ihn bewerben lassen?\n\n §RAstronaut ist ein gefährlicher Job, die Wahrscheinlichkeit, dass dieser Einheitsführer bei einem Unfall verloren geht, ist ziemlich hoch§!"
 space_race.1.a:0 "Lass ihn sich bewerben"
 space_race.1.b:0 "Wir brauchen ihn auf der Erde."
 space_race.15.t:0 "Verlorenes Schiff kehrt zurück"
 space_race.15.d:0 "Nach dem Kommunikationsverlust war alle Hoffnung auf eine Rückkehr der vorherigen Mission verloren. Doch offenbar ermöglichten die automatisierten Aufgaben des Hauptcomputers die Rückkehr zur Erde. Das Schiff trat 50 km nördlich der ursprünglichen Bergungszone in die Erdatmosphäre ein. Als das Rettungsteam den Riegel öffnete, brach Panik aus: Die Hälfte der Besatzung wurde vermisst, die andere Hälfte wurde verstümmelt aufgefunden. Es ist noch immer unklar, was passiert ist, und eine größere Frage bleibt: Wollen wir es wirklich wissen?"
 space_race.15.a:0 "Ein beunruhigendes Ereignis ..."
