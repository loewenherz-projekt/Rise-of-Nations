 AM_political.14.t:0 "Syndikalismus auf dem Vormarsch"
 AM_political.14.d:0 "Während Arbeiter auf der ganzen Welt gegen ihre Unterdrücker aufbegehren, sitzen diejenigen, die behaupten, in [Root.GetName] Klassenbewusstsein erreicht zu haben, untätig herum und warten auf Veränderungen aus dem Inneren eines politischen Systems, das so durch und durch korrupt ist, dass nur eine Revolution uns davor retten kann!&#39;\n\nSo sprechen neue Stimmen in der [Root.GetAdjective] syndikalistischen Bewegung. Sie bezeichnen die Herrschaft von [Root.GetRulingParty] als Diktatur der Bourgeoisie und fordern, diese mit allen erforderlichen Mitteln zu stürzen. Ob diese Mittel von innen oder von außen kommen, bleibt abzuwarten."
 AM_political.14.a:0 "Möglicherweise gibt es in der Regierung selbst Leute, die solche Ideen unterstützen."
 AM_political.14.a.tt:0 "Erhöht die Chance auf interne Unterstützung für einen syndikalistischen Putsch."
 AM_political.14.b:0 "Eine Bewegung für das Volk muss die Unterstützung des Volkes suchen."
 AM_political.14.b.tt:0 "Erhöht die Chance auf öffentliche Unterstützung für einen syndikalistischen Aufstand."
 
 AM_political.15.t:0 "Syndikalisten führen Putsch durch"
 AM_political.15.d:0 "Während die Volksbewegung für eine syndikalistische Revolution lautstark und furchteinflößend war, verhielt sich ein Teil der politischen Bewegung weitgehend ruhig und abwartend. Das Warten hat nun ein Ende. Als sich die [Root.GetRulingParty]-Führung und die Armee heute auf einen landesweiten Aufstand vorbereiteten, stellten einige Regierungsvertreter [Root.GetAdjective] [Root.GetLeader] kurzerhand unter Hausarrest und begannen Verhandlungen mit den Rebellen.\n\nUnter dem Vorwand, die Ordnung zu wahren, liefen die Verhandlungen in Wirklichkeit darauf hinaus, denjenigen, die kooperierten, Positionen im neuen sozialistischen Staat zu sichern. Der Putsch war beendet, bevor ihn jemand stoppen konnte, und diejenigen, die kooperiert hätten, werden nun vom neuen Regime inhaftiert, verbannt oder hingerichtet."
 AM_political.15.a:0 "Die Gezeiten der Geschichte werden die Vergangenheit hinwegfegen."
 
 AM_political.16.t:0 "Der Sozialismus auf dem Vormarsch"
 AM_political.16.d:0 "„Während Arbeiter auf der ganzen Welt gegen ihre Unterdrücker aufbegehren, sitzen diejenigen, die behaupten, in [Root.GetName] Klassenbewusstsein erreicht zu haben, untätig herum und warten auf Veränderungen aus den eigenen Reihen – ein politisches System, das so durch und durch korrupt ist, dass nur eine Revolution uns davor retten kann!“\n\nSo sprechen neue Stimmen in der [Root.GetAdjective] sozialistischen Bewegung. Sie bezeichnen die Herrschaft von [Root.GetRulingParty] als Diktatur der Bourgeoisie und fordern, sie mit allen notwendigen Mitteln zu stürzen. Ob diese Mittel von innen oder von außen kommen, bleibt abzuwarten."
 AM_political.16.a:0 "Möglicherweise gibt es in der Regierung selbst Leute, die solche Ideen unterstützen."
 AM_political.16.a.tt:0 "Erhöht die Chance auf interne Unterstützung für einen sozialistischen Putsch."
 AM_political.16.b:0 "Eine Bewegung für das Volk muss die Unterstützung des Volkes suchen."
 AM_political.16.b.tt:0 "Erhöht die Chance auf öffentliche Unterstützung für einen sozialistischen Aufstand."
 
 AM_political.17.t:0 "Sozialisten führen Putsch durch"
 AM_political.17.d:0 "Während die Volksbewegung für eine sozialistische Revolution lautstark und furchteinflößend war, verhielt sich ein Teil der politischen Bewegung weitgehend ruhig und abwartend. Das Warten hat nun ein Ende. Als sich die Führung und die Armee von [Root.GetRulingParty] heute auf einen landesweiten Aufstand vorbereiteten, stellten einige Regierungsvertreter [Root.GetAdjective] [Root.GetLeader] kurzerhand unter Hausarrest und begannen Verhandlungen mit den Rebellen.\n\nUnter dem Vorwand, die Ordnung zu wahren, sicherten die Verhandlungen de facto Positionen im neuen sozialistischen Staat für diejenigen, die kooperierten. Der Putsch war beendet, bevor ihn jemand stoppen konnte, und diejenigen, die kooperiert hätten, wurden nun vom neuen Regime inhaftiert, verbannt oder hingerichtet."
 AM_political.17.a:0 "Die Gezeiten der Geschichte werden die Vergangenheit hinwegfegen."

 AM_political.18.t:0 "[Root.GetRulingParty] Debatten über Demokratie"
 AM_political.18.d:0 "Überraschenderweise hat die Forderung nach mehr Referenden und weniger repressiven Maßnahmen gegen Regimegegner in parteiinternen Diskussionen auf gewisse Unterstützung gestoßen. Während die Führung von [Root.GetRulingParty] weiterhin skeptisch bleibt, haben sich mehrere einflussreiche Mitglieder für einen Kurswechsel ausgesprochen.\n\nVielleicht vertrauen sie darauf, dass sich in der Praxis wenig ändern wird, oder sie sind insgeheim Verräter der Partei, wie viele ihrer Gegner behaupten. Unabhängig davon sind einige der Führungspersönlichkeiten von [Root.GetName] kompromissbereit, sollte der öffentliche Ruf nach solchen Veränderungen laut werden."
 AM_political.18.a:0 "Die Wahl muss nicht immer zwischen Freiheit und Tod stehen."
 AM_political.18.a.tt:0 "Die Regierung kann Wahlen ansetzen, wenn die Politik von der Mehrheit der Bevölkerung unterstützt wird."

 AM_political.19.t:0 "Öffentlicher Wahlaufruf"
 AM_political.19.d:0 "Die Demonstrationen öffentlichen Widerstands, die einst auf begrenzte Gebiete beschränkt waren, sind heute weit verbreitet. Während sich die Menschen auf den Straßen versammeln, steht die [Root.GetRulingParty] an einem Scheideweg. Wenn wir diese Propaganda weiterhin zulassen, könnten die sowohl innerhalb der Partei selbst als auch in der Opposition vorgeschlagenen Referenden zeigen, dass wir nicht die Unterstützung der Bevölkerung haben. Die Einheit, nach der wir strebten, weicht einer Meinungsvielfalt, die sich gegen uns vereint."
 AM_political.19.a:0 "Auch wenn Reformen stattfinden, müssen wir unsere Stärke zeigen, indem wir diesen Widerstand unterdrücken."
 AM_political.19.b:0 "Geben Sie den Menschen Gehör."
 
