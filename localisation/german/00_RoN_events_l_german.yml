BP_japan.301.t:0 "Schicksal Amerikas"
BP_japan.301.d:0 "Die Zeit ist gekommen. Eine erfolgreiche Invasion der Vereinigten Staaten von Amerika wurde gestartet, und nach langen Kämpfen und zahlreichen Opfern haben die Amerikaner kapituliert. Gemäß dem mit Deutschland unterzeichneten Vertrag teilen wir den nordamerikanischen Kontinent entlang der Rocky Mountains auf und schaffen so eine neutrale Zone zwischen unseren beiden Supermächten. Nun müssen wir entscheiden, was wir mit unserem Teil des ehemaligen amerikanischen Territoriums tun."
BP_japan.301.a:0 "Integrieren Sie es in Dai-Nippon Teikoku!"
BP_japan.301.b:0 "Installieren Sie ein freundliches Regime."
BP_japan.301.c:0 "Schaffen Sie ein Satellitenregime."
BP_japan.301.e:0 "Die japanischen Pazifikstaaten."
 
BP_japan.302.t:0 "Schicksal Kanadas"
BP_japan.302.d:0 "Die Zeit ist gekommen. Eine erfolgreiche Invasion Kanadas wurde gestartet, und nach einigen Kämpfen und einigen Verlusten haben die Kanadier kapituliert. Gemäß dem mit Deutschland unterzeichneten Vertrag teilen wir den nordamerikanischen Kontinent entlang der Rocky Mountains auf und schaffen so eine neutrale Zone zwischen unseren beiden Supermächten. Nun müssen wir entscheiden, was wir mit unserem Teil des ehemaligen kanadischen Territoriums tun."
BP_japan.302.a:0 "Integrieren Sie es in Dai-Nippon Teikoku!"
BP_japan.302.b:0 "Geben Sie es den japanischen Pazifikstaaten."
BP_japan.303.t:0"Schicksal Ostasiens Teil 1 Die Philippinen"
BP_japan.303.d:0"Wir haben das amerikanische Territorium der Philippinen erobert und müssen nun entscheiden, was wir damit tun. Wir können es zwar direkt annektieren, was aber in Zukunft zu Problemen im Umgang mit kommunistischen Rebellen im Land führen könnte, wir können aber auch ein Marionettenregime errichten, das seine eigenen Probleme löst."
BP_japan.303.a:0"Wir werden ein Marionettenregime errichten!"
BP_japan.303.b:0"Wir werden dieses Gebiet direkt vom Heimatland aus verwalten"
BP_japan.304.t:0"Schicksal Ostasiens Teil Zwei Indonesien"
BP_japan.304.d:0"Wir müssen entscheiden, wie groß unsere Verwaltung im niederländischen Territorium Indonesiens sein soll."
BP_japan.304.a:0"Wir werden nur auf indonesischem Territorium eine Marionette errichten und Malaysia annektieren!"
BP_japan.304.b:0"Wir werden starke Verbündete zu unserer Verteidigung brauchen. Wir werden ihnen Malaysia geben!"
BP_japan.305.t:0"Schicksal Ostasiens Teil Drei Das Kronland"
BP_japan.305.d:0"Wir müssen entscheiden, was mit den britischen Kronländern Australien und Neuseeland geschehen soll. Wenn wir das gesamte Gebiet annektieren, könnte dies zu einem Aufstand der Briten führen ..."
BP_japan.305.a:0"Wir werden alles annektieren!"
BP_japan.305.b:0"Wir werden ein Marionettenregime errichten!"
BP_japan.306.t:0"Schicksal Ostasiens Letzte abgelegene Inseln"
BP_japan.306.d:0"Wir müssen sorgfältig entscheiden, was wir mit den abgelegenen Inseln machen, da dies unsere Beziehungen zu Amerika in Zukunft unumkehrbar machen kann. Wenn wir einen Kompromiss erzielen, können wir uns Amerika in Zukunft vielleicht wieder nähern …" 
BP_japan.306.a:0"Wir werden eine eigene Verwaltung für Hawaii einrichten!"
BP_japan.306.b:0"Wir annektieren Hawaii, aber entmilitarisieren alle unsere Inseln...!"
BP_japan.306.c:0"Wir annektieren Hawaii und bestreiten die amerikanischen Ansprüche auf die Insel"
BP_japan.307.t:0"Bedingte Kapitulation vor Japan?"
BP_japan.307.d:0"Das japanische Kaiserreich hat alle unsere östlichen Inseln erobert und uns ein Ultimatum gestellt: Übergeben wir ihnen den Ostpazifik oder wir müssen uns einem totalen Krieg stellen. Die Bevölkerung wartet gespannt auf unsere Entscheidung, das Schicksal des Pazifiks liegt in unseren Händen …"
BP_japan.307.a:0"Die rote Sonne geht im Osten auf"
BP_japan.307.b:0"Wir werden niemals aufgeben!"
BP_germany.806.t:0 "Schicksal Amerikas"
BP_germany.806.d:0 "Die Zeit ist gekommen. Eine erfolgreiche Invasion der Vereinigten Staaten von Amerika wurde gestartet, und nach langen Kämpfen und zahlreichen Opfern haben die Amerikaner kapituliert. Gemäß dem mit Japan unterzeichneten Vertrag teilen wir den nordamerikanischen Kontinent entlang der Rocky Mountains auf und schaffen so eine neutrale Zone zwischen unseren beiden Supermächten. Nun müssen wir entscheiden, was wir mit unserem Teil des ehemaligen amerikanischen Territoriums tun."
BP_germany.806.a:0 "Integrieren Sie es in das Reich!"
BP_germany.806.b:0 "Installieren Sie ein freundliches Regime."
BP_germany.806.c:0 "Schaffen Sie ein Satellitenregime."
BP_germany.806.e:0 "Ein Protektorat ist die klügere Wahl."
 
BP_germany.807.t:0 "Schicksal Kanadas"
BP_germany.807.d:0 "Die Zeit ist gekommen. Eine erfolgreiche Invasion Kanadas wurde gestartet, und nach einigen Kämpfen und einigen Verlusten haben die Kanadier kapituliert. Gemäß dem mit Japan unterzeichneten Vertrag teilen wir den nordamerikanischen Kontinent entlang der Rocky Mountains auf und schaffen so eine neutrale Zone zwischen unseren beiden Supermächten. Nun müssen wir entscheiden, was wir mit unserem Teil des ehemaligen kanadischen Territoriums tun."
BP_germany.807.a:0 "Integrieren Sie es in das Reich!"
BP_germany.807.b:0 "Geben Sie es dem deutschen Nordamerika."
  
 election.1.t:0 "Wahl"
 election.1.desc:0 "Es finden Wahlen statt, und die Stimmen werden bald ausgezählt. Alle großen Parteien blicken in die Regierungsbildung oder in die Konkurrenz zueinander. Wer könnte gewinnen?"
 election.1.o1:0 "Die Sozialisten haben gewonnen."
 election.1.o2:0 "Die Demokraten haben gewonnen."
 election.1.o3:0 "Die Autoritären haben gewonnen."
 election.1.o4:0 "Die Nationalisten haben gewonnen."
 election.1.o5:0 "Die Islamisten haben gewonnen."
 election.1.o6:0 "Die Regierungspartei hat gewonnen."
 
 
 as_news.1.t:0 "Die UdSSR ist besiegt!"
 as_news.1.d:0 "Stalin wurde aus allen Ämtern in Partei und Armee entfernt, bevor er wegen Hochverrats verhaftet wurde. Sein Nachfolger, Lawrenti P. Beria, einigte sich mit der deutschen Regierung auf Friedensbedingungen. Das Reich besetzt den Westen Russlands, während Japan Teile des Fernen Ostens erhält."
 as_news.1.a:0 "Tolle Neuigkeiten!"
 as_news.1.b:0 "Die Nazihorden scheinen unaufhaltsam!" 
 
  as_news.5.t:0 "Operation Antlitz"
 as_news.5.d:0 "Die anglo-sowjetische Invasion des Iran, auch bekannt als anglo-sowjetische Invasion Persiens, war die Invasion des iranischen Kaiserreichs während des Zweiten Weltkriegs durch sowjetische, britische und andere Streitkräfte des Commonwealth. Die Invasion dauerte vom 25. August bis zum 17. September 1941 und trug den Codenamen Operation Countenance. Ihr Zweck war es, iranische Ölfelder zu sichern und die alliierten Versorgungslinien (siehe Persischer Korridor) für die UdSSR sicherzustellen, die an der Ostfront gegen die Achsenmächte kämpfte. Obwohl der Iran neutral war, betrachteten die Alliierten Reza Schah als freundlich gegenüber den Achsenmächten, setzten ihn während der anschließenden Besatzung ab und ersetzten ihn durch seinen jungen Sohn Mohammad Reza Pahlavi."
 as_news.5.a:0 "OK" 
 
 as_sov.14.t:0 "Aufruhr im Politbüro!"
 as_sov.14.d:0 "Stalin hat uns bei der Führung unserer großen Nation im Stich gelassen! Er wurde seines Postens als Parteisekretär der Kommunistischen Partei enthoben. Sein Nachfolger Lawrenti Beria entschied, dass unser Krieg gegen die Faschisten nicht zu gewinnen sei und nur zum Ruin des Vaterlandes führen würde. Tatsächlich scheint die militärische Lage aussichtslos. Wir sollten um Frieden bitten, solange wir noch können!"
 as_sov.14.a:0 "Säubern Sie die Verräter und bitten Sie um Frieden"
 as_sov.14.b:0 "Kämpfe bis zum bitteren Ende!"
 as_sov.15.t:0 "Der bittere Frieden"
 as_sov.15.d:0 "Deutschland stimmte unserem Friedensvorschlag zu. Dieser Krieg ist vorbei, wir haben einen großen Teil unseres Volkes in den Händen der Faschisten zurückgelassen …"
 as_sov.15.a:0 "Leider hatten wir keine Wahl …"
 as_sov.16.t:0 "Ein Kampf auf Leben und Tod!"
 as_sov.16.d:0 "Deutschland hat unseren Friedensvorschlag abgelehnt. Wir können jetzt nur noch auf unsere verbliebenen Truppen zählen und den Partisanenkrieg hinter den feindlichen Linien intensivieren."
 as_sov.16.a:0 "Verdammt..." 
 
AM_political.1.t:0 "Autoritärer Staat auf dem Vormarsch"
AM_political.1.desc:1 "„Das [Root.GetAdjective] Volk war zu lange der inkompetenten Herrschaft von [Root.GetRulingParty] unterworfen! Sie behaupten, das Volk zu vertreten, schaffen es aber nicht einmal, unsere Straßen in Ordnung zu halten! Nur wenn wir sie von der Macht entfernen, können wir dieses Land wachsen lassen!“\n\nDie faschistischen Sprecher von [Root.GetName] haben keinen Hehl daraus gemacht, was sie von unserer derzeitigen Herrschaft und unserem politischen System halten. Reden wie diese haben einen öffentlichen Dissens ausgelöst, der besonders in den autoritäreren Teilen des Militärs ausgeprägt ist."
AM_political.2.t:0 "Autoritärer Staatsstreich"
AM_political.2.desc:0 "Manche werden sagen, sie hätten es kommen sehen. Sowohl diejenigen, die vor den Gefahren autoritärer Regime warnten, als auch diejenigen, die sie als Retter von [Root.GetName] priesen, haben heute ihre Prophezeiungen wahr werden sehen, als das Militär in [Root.Capital.GetName] die von [Root.GetRulingParty] geführte Regierung stürzte und die Macht übernahm. [Root.GetLeader] wird vermisst und soll Gerüchten zufolge ins Exil gegangen sein, und der Putsch stieß zunächst auf wenig Widerstand.\n\nAuch die neue [Root.GetAdjective]-Führung hat nicht vor, wachsenden Widerstand zuzulassen. Das Kriegsrecht wurde ausgerufen, und angesichts der laufenden Veränderungen dürfte sich das, was danach kommt, kaum ändern."
AM_political.4.t:0 "Monarchismus auf dem Vormarsch"
AM_political.4.desc:1 "„Das [Root.GetAdjective] Volk war zu lange der inkompetenten Herrschaft von [Root.GetRulingParty] unterworfen! Sie behaupten, das Volk zu vertreten, schaffen es aber nicht einmal, unsere Straßen in Ordnung zu halten! Nur wenn wir sie von der Macht entfernen, können wir dieses Land wachsen lassen!“\n\nDie faschistischen Sprecher von [Root.GetName] haben keinen Hehl daraus gemacht, was sie von unserer derzeitigen Herrschaft und unserem politischen System halten. Reden wie diese haben einen öffentlichen Widerspruch ausgelöst, der besonders in den royalistischeren Teilen des Militärs ausgeprägt ist."
AM_political.5.t:0 "Monarchistischer Staatsstreich"
AM_political.5.desc:0 "Manche werden sagen, sie hätten es kommen sehen. Sowohl diejenigen, die vor den Gefahren des Monarchismus warnten, als auch diejenigen, die ihn als Retter von [Root.GetName] priesen, haben heute ihre Prophezeiungen wahr werden sehen, als das Militär in [Root.Capital.GetName] die von [Root.GetRulingParty] geführte Regierung stürzte und die Macht übernahm. [Root.GetLeader] wird vermisst und soll Gerüchten zufolge ins Exil gegangen sein, und der Putsch stieß zunächst auf wenig Widerstand.\n\nAuch die neue [Root.GetAdjective]-Führung hat nicht vor, wachsenden Widerstand zuzulassen. Das Kriegsrecht wurde ausgerufen, und angesichts der laufenden Veränderungen dürfte sich das, was danach kommt, kaum ändern." 
AM_political.6.t:0 "Formular der faschistischen Angriffsdivisionen"
AM_political.6.desc:0 "Politisches und Kriegswesen waren im Faschismus schon immer eng miteinander verflochten. Parallel zu seiner wachsenden politischen Bewegung begannen faschistische Parteien, paramilitärische Organisationen zum Schutz vor inneren und äußeren Bedrohungen zu gründen, wobei die inneren Bedrohungen ihre politischen Gegner sind. Obwohl viele Menschen diese Entwicklung beunruhigen, hat die Welle der militaristischen Aufregung zu einem Anstieg der Freiwilligen in unseren Streitkräften geführt.\n\nDie politischen Führer der Bewegung haben darauf hingewiesen, dass ihre Gegner Grund zur Angst haben. Da die Armee auf mehreren Ebenen von so explizit politischen Elementen durchdrungen ist, ähneln sich die Feinde von [Root.GetName] und die Feinde des Faschismus immer mehr."
AM_political.7.t:0 "Soldaten desertieren zu kommunistischen Partisanen"
AM_political.7.desc:0 "„Kapitalisten und Nationalisten würden es gern sehen, wenn ihr an der Front euer Blut vergießt und Brüder gegen Brüder aufhetzt wegen Streitigkeiten, die die Arbeiter nichts angehen! Statt die Waffen gegen Arbeiter zu erheben, die im Ausland kämpfen, erhebt sie gegen die Unterdrücker und stürzt die Tyrannen!“\n\nDie Armee, normalerweise eine Bastion des Patriotismus und der Loyalität, ist nicht immun gegen die sich in [Root.GetName] rasant verbreitende kommunistische Propaganda. Soldaten desertieren, weigern sich, für ihr Land zu kämpfen, und schließen sich manchmal sogar Partisanenbewegungen an, die angeblich eine Revolution vorbereiten."
AM_political.8.t:0 "Theokratie auf dem Vormarsch"
AM_political.8.desc:1 "„Das [Root.GetAdjective] Volk war zu lange der inkompetenten Herrschaft von [Root.GetRulingParty] unterworfen! Sie behaupten, das Volk zu vertreten, schaffen es aber nicht einmal, unsere Straßen in Ordnung zu halten! Nur wenn wir sie von der Macht entfernen, können wir dieses Land wachsen lassen!“\n\nDie faschistischen Sprecher von [Root.GetName] haben keinen Hehl daraus gemacht, was sie von unserer derzeitigen Herrschaft und unserem politischen System halten. Reden wie diese haben einen öffentlichen Widerspruch ausgelöst, der besonders in den theokratischeren Teilen des Militärs ausgeprägt ist."
AM_political.9.t:0 "Theokratischer Staatsstreich"
AM_political.9.desc:0 "Manche werden sagen, sie hätten es kommen sehen. Sowohl diejenigen, die vor den Gefahren der Religion warnten, als auch diejenigen, die sie als Retter von [Root.GetName] priesen, haben heute ihre Prophezeiungen wahr werden sehen, als das Militär in [Root.Capital.GetName] die von [Root.GetRulingParty] geführte Regierung stürzte und die Macht übernahm. [Root.GetLeader] wird vermisst und soll Gerüchten zufolge ins Exil gegangen sein, und der Putsch stieß zunächst auf wenig Widerstand.\n\nAuch die neue [Root.GetAdjective]-Führung hat nicht vor, wachsenden Widerstand zuzulassen. Das Kriegsrecht wurde ausgerufen, und angesichts der laufenden Veränderungen dürfte sich das, was danach kommt, kaum ändern." 


