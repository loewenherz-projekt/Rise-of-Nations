AM_political.41.t:0 "Faschistisch-monarchistischer Staatsstreich"
AM_political.41.desc:0 "Manche werden sagen, sie hätten es kommen sehen. Sowohl diejenigen, die vor den Gefahren des faschistischen Monarchismus warnten, als auch diejenigen, die ihn als Retter von [Root.GetName] priesen, haben heute ihre Prophezeiungen wahr werden sehen, als das Militär in [Root.Capital.GetName] die von [Root.GetRulingParty] geführte Regierung stürzte und die Macht übernahm. [Root.GetLeader] wird vermisst und soll Gerüchten zufolge ins Exil gegangen sein, und der Putsch stieß zunächst auf wenig Widerstand.\n\nAuch die neue [Root.GetAdjective]-Führung hat nicht vor, wachsenden Widerstand zuzulassen. Das Kriegsrecht wurde ausgerufen, und angesichts der laufenden Veränderungen dürfte sich das, was danach kommt, kaum ändern." 

 AM_political.42.t:0 "Maoismus auf dem Vormarsch"
 AM_political.42.d:0 "Während Arbeiter auf der ganzen Welt gegen ihre Unterdrücker aufbegehren, sitzen diejenigen, die behaupten, in [Root.GetName] Klassenbewusstsein erreicht zu haben, untätig herum und warten auf Veränderungen aus dem Inneren eines politischen Systems, das so durch und durch korrupt ist, dass nur eine Revolution uns davor retten kann!&#39;\n\nSo sprechen neue Stimmen in der [Root.GetAdjective] syndikalistischen Bewegung. Sie bezeichnen die Herrschaft von [Root.GetRulingParty] als Diktatur der Bourgeoisie und fordern, diese mit allen erforderlichen Mitteln zu stürzen. Ob diese Mittel von innen oder von außen kommen, bleibt abzuwarten."
 AM_political.42.a:0 "Möglicherweise gibt es in der Regierung selbst Leute, die solche Ideen unterstützen."
 AM_political.42.a.tt:0 "Erhöht die Chance auf interne Unterstützung für einen maoistischen Putsch."
 AM_political.42.b:0 "Eine Bewegung für das Volk muss die Unterstützung des Volkes suchen."
 AM_political.42.b.tt:0 "Erhöht die Chance auf öffentliche Unterstützung für einen maoistischen Aufstand."
 
 AM_political.43.t:0 "Maoisten führen Putsch durch"
 AM_political.43.d:0 "Während die Volksbewegung für die maoistische Revolution lautstark und furchteinflößend war, verhielt sich ein Teil der politischen Bewegung weitgehend ruhig und abwartend. Das Warten hat nun ein Ende. Als sich die [Root.GetRulingParty]-Führung und die Armee heute auf einen landesweiten Aufstand vorbereiteten, stellten einige Regierungsvertreter [Root.GetAdjective] [Root.GetLeader] kurzerhand unter Hausarrest und nahmen Verhandlungen mit den Rebellen auf.\n\nUnter dem Vorwand, die Ordnung zu wahren, liefen die Verhandlungen in Wirklichkeit darauf hinaus, denjenigen, die zur Kooperation bereit waren, Positionen im neuen sozialistischen Staat zu sichern. Der Putsch war beendet, bevor ihn jemand stoppen konnte, und diejenigen, die es getan hätten, werden nun vom neuen Regime inhaftiert, verbannt oder hingerichtet."
 AM_political.43.a:0 "Die Gezeiten der Geschichte werden die Vergangenheit hinwegfegen."
 
 AM_political.44.t:0 "Trotzkismus auf dem Vormarsch"
 AM_political.44.d:0 "Während Arbeiter auf der ganzen Welt gegen ihre Unterdrücker aufbegehren, sitzen diejenigen, die behaupten, in [Root.GetName] Klassenbewusstsein erreicht zu haben, untätig herum und warten auf Veränderungen aus dem Inneren eines politischen Systems, das so durch und durch korrupt ist, dass nur eine Revolution uns davor retten kann!&#39;\n\nSo sprechen neue Stimmen in der [Root.GetAdjective] syndikalistischen Bewegung. Sie bezeichnen die Herrschaft von [Root.GetRulingParty] als Diktatur der Bourgeoisie und fordern, diese mit allen erforderlichen Mitteln zu stürzen. Ob diese Mittel von innen oder von außen kommen, bleibt abzuwarten."
 AM_political.44.a:0 "Möglicherweise gibt es in der Regierung selbst Leute, die solche Ideen unterstützen."
 AM_political.44.a.tt:0 "Erhöht die Chance auf interne Unterstützung für einen trotzkistischen Putsch."
 AM_political.44.b:0 "Eine Bewegung für das Volk muss die Unterstützung des Volkes suchen."
 AM_political.44.b.tt:0 "Erhöht die Chance auf öffentliche Unterstützung für einen trotzkistischen Aufstand."
 
 AM_political.45.t:0 "Trotzkisten führen Putsch durch"
 AM_political.45.d:0 "Während die Volksbewegung für die trotzkistische Revolution lautstark und furchteinflößend war, verhielt sich ein Teil der politischen Bewegung weitgehend ruhig und wartete ab. Das Warten hat nun ein Ende. Als sich die Führung und die Armee von [Root.GetRulingParty] heute auf einen landesweiten Aufstand vorbereiteten, stellten einige Regierungsvertreter [Root.GetAdjective] [Root.GetLeader] kurzerhand unter Hausarrest und nahmen Verhandlungen mit den Rebellen auf.\n\nUnter dem Vorwand, die Ordnung zu wahren, liefen die Verhandlungen in Wirklichkeit darauf hinaus, denjenigen, die kooperierten, Posten im neuen sozialistischen Staat zu sichern. Der Putsch war beendet, bevor ihn jemand stoppen konnte, und diejenigen, die kooperiert hätten, werden nun vom neuen Regime inhaftiert, verbannt oder hingerichtet."
 AM_political.45.a:0 "Die Gezeiten der Geschichte werden die Vergangenheit hinwegfegen."

 

usarmyevents.0.t:0 "1. Paramarine-Division"
usarmyevents.0.d:0 "Die Paramarines (auch bekannt als Marine-Fallschirmjäger) waren eine kurzlebige Spezialkampfeinheit des United States Marine Corps, die für den Fallschirmabwurf aus Flugzeugen ausgebildet war. Die Fallschirmausbildung der Marines begann im Oktober 1940 in New Jersey und endete mit der Auflösung der Fallschirmjägereinheiten im Februar 1944 in Camp Pendleton, Kalifornien. Fallschirmjäger erhielten nach Abschluss der Ausbildung einen deutlich höheren Lohn, sodass es keinen Mangel an Freiwilligen gab, obwohl alle unverheiratet sein mussten. Die Anforderungen an die Fitness waren hoch, und 40 % der Fallschirmjäger fielen durch."
usarmyevents.0.a:0 "Oorah!"
usarmyevents.1.t:0 "1. Marine Raiders Division"
usarmyevents.1.d:0 "Die Marine Raiders waren Eliteeinheiten des United States Marine Corps während des Zweiten Weltkriegs, die spezielle amphibische leichte Infanteriekämpfe führten, insbesondere Landungen in Schlauchbooten und Operationen hinter den Linien. „Edson&#39;s“ Raiders des 1. Marine Raiders Battalion und „Carlson&#39;s“ Raiders des 2. Marine Raiders Battalion gelten als die ersten Spezialeinheiten der Vereinigten Staaten, die im Zweiten Weltkrieg gegründet wurden und im Kampfeinsatz waren."
usarmyevents.1.a:0 "Oorah!"
usarmyevents.2.t:0 "1. Ranger-Division"
usarmyevents.2.d:0 "Am 19. Juni 1942 wurde das 1. Ranger-Bataillon genehmigt, rekrutiert und begann mit der Ausbildung in Carrickfergus, Nordirland. 80 Prozent der ursprünglichen Ranger kamen von der 34. Infanteriedivision."
usarmyevents.2.a:0 "Ranger weisen den Weg."
usarmyevents.3.t:0 "1. Spezialeinheit"
usarmyevents.3.d:0 "Die 1. Special Service Force (auch Devil&#39;s Brigade, Black Devils, Black Devils&#39; Brigade und Freddie&#39;s Freighters genannt) war eine amerikanisch-kanadische Elite-Kommandoeinheit im Zweiten Weltkrieg unter dem Kommando der 5. US-Armee. Die Einheit wurde 1942 gegründet und in Fort William Henry Harrison nahe Helena, Montana, in den USA ausgebildet. Die Truppe diente auf den Aleuten und kämpfte in Italien und Südfrankreich, bevor sie im Dezember 1944 aufgelöst wurde."
usarmyevents.3.a:0 "Das Schlimmste steht noch bevor."
usarmyevents.4.t:0 "5307. Verbundeinheit „Merrills Marodeure“"
usarmyevents.4.d:0 "Merrill&#39;s Marauders (benannt nach Frank Merrill) oder Unit Galahad, offiziell 5307th Composite Unit (Provisional), war eine Spezialeinheit der US-Armee für Langstreckeneinsätze im Dschungelkrieg, die im südostasiatischen Kriegsschauplatz des Zweiten Weltkriegs (China-Burma-Indien-Kriegsschauplatz, CBI) kämpfte. Die Einheit wurde berühmt für ihre Tiefdurchdringungsmissionen hinter den japanischen Linien, bei denen sie oft gegen zahlenmäßig überlegene japanische Streitkräfte kämpfte."
usarmyevents.4.a:0 "Gut (Historisch)"
usarmyevents.5.t:0 "Força Expedicionária Brasileira"
usarmyevents.5.d:0 "Das brasilianische Expeditionskorps oder FEB (portugiesisch Força Expedicionária Brasileira; FEB) bestand aus etwa 25.700 Mann, die von der Armee und der Luftwaffe aufgestellt wurden, um an der Seite der alliierten Streitkräfte im Mittelmeerraum des Zweiten Weltkriegs zu kämpfen."
usarmyevents.5.a:0 "Rauchende Schlangen!"

britisharmyevents.0.t:0 "Britisches Armeekommando"
britisharmyevents.0.d:0 "Die Kommandos, auch bekannt als britische Kommandos, wurden während des Zweiten Weltkriegs im Juni 1940 auf Ersuchen des britischen Premierministers Winston Churchill gegründet. Er forderte eine Truppe, die Angriffe gegen das deutsch besetzte Europa durchführen konnte. Ursprünglich wurden die Kommandos aus Soldaten der britischen Armee rekrutiert, die sich freiwillig für die Special Service Brigade gemeldet hatten. Später wurden die Reihen der Kommandos jedoch von Angehörigen aller Zweige der britischen Streitkräfte und einer Reihe ausländischer Freiwilliger aus den deutsch besetzten Ländern besetzt."
britisharmyevents.0.a:0 "Gemeinsam siegen wir!"
britisharmyevents.1.t:0 "Royal Marine Commando"
britisharmyevents.1.d:0 "Die 3. Kommandobrigade ist eine Kommandoformation der britischen Streitkräfte und die wichtigste Manöverformation der Royal Marines. Ihr Personal besteht überwiegend aus Royal Marines, unterstützt von Einheiten der Royal Engineers, der Royal Artillery und der Fleet Air Arm sowie weiteren qualifizierten Matrosen, Soldaten und Fliegern."
britisharmyevents.1.a:0 "Gemeinsam siegen wir!"
britisharmyevents.2.t:0 "Königliches Marinekommando"
britisharmyevents.2.d:0 "Die Royal Naval Commandos waren eine Kommandoformation der Royal Navy, die während des Zweiten Weltkriegs diente."
britisharmyevents.2.a:0 "Gemeinsam siegen wir!"
britisharmyevents.3.t:0 "Kommando der Royal Air Force"
britisharmyevents.3.d:0 "Die Royal Air Force Commandos wurden während des Zweiten Weltkriegs aus Einheiten der Royal Air Force (RAF) gebildet. Sie wurden 1942 gegründet und dienten in den europäischen und fernöstlichen Kriegsschauplätzen, bevor sie 1946 aufgelöst wurden."
britisharmyevents.3.a:0 "Gemeinsam siegen wir!"
britisharmyevents.4.t:0 "SAS-Kommando"
britisharmyevents.4.d:0 "Der Special Air Service (SAS) ist eine Spezialeinheit der britischen Armee. Der SAS wurde 1941 als Regiment gegründet und 1950 als Korps neu aufgestellt."
britisharmyevents.4.a:0 "Wer wagt, gewinnt!"
britisharmyevents.5.t:0 "SBS-Kommando"
britisharmyevents.5.d:0 "Der Special Boat Service (SBS) ist eine Eliteeinheit der britischen Royal Navy. Seine Ursprünge reichen bis in den Zweiten Weltkrieg zurück, als 1940 die Army Special Boat Section gegründet wurde."
britisharmyevents.5.a:0 "Durch Stärke und List!"
 
