  AM_political.30.t:0 "[Root.GetRulingParty] Debatten Demokratie"
 AM_political.30.d:0 "Überraschenderweise hat die Forderung nach mehr Referenden und weniger repressiven Maßnahmen gegen Regimegegner in parteiinternen Diskussionen auf gewisse Unterstützung gestoßen. Während die Führung von [Root.GetRulingParty] weiterhin skeptisch bleibt, haben sich mehrere einflussreiche Mitglieder für einen Kurswechsel ausgesprochen.\n\nVielleicht vertrauen sie darauf, dass sich in der Praxis wenig ändern wird, oder sie sind insgeheim Verräter der Partei, wie viele ihrer Gegner behaupten. Unabhängig davon sind einige der Führungspersönlichkeiten von [Root.GetName] kompromissbereit, sollte der öffentliche Ruf nach solchen Veränderungen laut werden."
 AM_political.30.a:0 "Die Wahl muss nicht immer zwischen Freiheit und Tod stehen."
 AM_political.30.a.tt:0 "Die Regierung kann Wahlen ansetzen, wenn die Politik von der Mehrheit der Bevölkerung unterstützt wird."

 AM_political.31.t:0 "Öffentlicher Wahlaufruf"
 AM_political.31.d:0 "Die Demonstrationen öffentlichen Widerstands, die einst auf begrenzte Gebiete beschränkt waren, sind heute weit verbreitet. Während sich die Menschen auf den Straßen versammeln, steht die [Root.GetRulingParty] an einem Scheideweg. Wenn wir diese Propaganda weiterhin zulassen, könnten die sowohl innerhalb der Partei selbst als auch in der Opposition vorgeschlagenen Referenden zeigen, dass wir nicht die Unterstützung der Bevölkerung haben. Die Einheit, nach der wir strebten, weicht einer Meinungsvielfalt, die sich gegen uns verbündet."
 AM_political.31.a:0 "Auch wenn Reformen stattfinden, müssen wir unsere Stärke zeigen, indem wir diesen Widerstand unterdrücken."
 AM_political.31.b:0 "Geben Sie den Menschen Gehör."
 
AM_political.32.t:0 "Strasserismus auf dem Vormarsch"
AM_political.32.desc:1 "„Das [Root.GetAdjective] Volk war zu lange der inkompetenten Herrschaft von [Root.GetRulingParty] unterworfen! Sie behaupten, das Volk zu vertreten, schaffen es aber nicht einmal, unsere Straßen in Ordnung zu halten! Nur wenn wir sie von der Macht entfernen, können wir dieses Land wachsen lassen!“\n\nDie faschistischen Redner in [Root.GetName] haben keinen Hehl daraus gemacht, was sie von unserer derzeitigen Herrschaft und unserem politischen System halten. Reden wie diese haben einen öffentlichen Widerspruch ausgelöst, der besonders in den nationalistischeren Teilen des Militärs ausgeprägt ist."
AM_political.33.t:0 "Strasseristischer Staatsstreich"
AM_political.33.desc:0 "Manche werden sagen, sie hätten es kommen sehen. Sowohl diejenigen, die vor den Gefahren des Strasserismus warnten, als auch diejenigen, die ihn als Retter von [Root.GetName] priesen, haben heute ihre Prophezeiungen wahr werden sehen, als das Militär in [Root.Capital.GetName] die von [Root.GetRulingParty] geführte Regierung stürzte und die Macht übernahm. [Root.GetLeader] wird vermisst und soll Gerüchten zufolge ins Exil gegangen sein, und der Putsch stieß zunächst auf wenig Widerstand.\n\nAuch die neue [Root.GetAdjective]-Führung hat nicht vor, den Widerstand wachsen zu lassen. Das Kriegsrecht wurde ausgerufen, und angesichts der laufenden Veränderungen dürfte sich das, was danach kommt, kaum ändern." 

