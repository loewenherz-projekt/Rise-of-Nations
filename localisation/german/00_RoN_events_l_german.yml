 power_status.1.t:0 "Bericht zur Weltpolitik"
 power_status.1.desc:0 "Globalpolitik, auch Weltpolitik genannt, bezeichnet sowohl die Disziplin, die die politischen und wirtschaftlichen Strukturen der Welt untersucht, als auch das untersuchte Feld. Im Zentrum dieses Feldes stehen die verschiedenen Prozesse der politischen Globalisierung im Zusammenhang mit Fragen der sozialen Macht. Die Disziplin untersucht die Beziehungen zwischen Städten, Nationalstaaten, Hüllenstaaten, multinationalen Konzernen, Nichtregierungsorganisationen und internationalen Organisationen. Aktuelle Diskussionsthemen sind die Regelung nationaler und ethnischer Konflikte, Demokratie und die Politik der nationalen Selbstbestimmung, Globalisierung und ihre Beziehung zur Demokratie, Konflikt- und Friedensforschung, vergleichende Politikwissenschaft, politische Ökonomie und die internationale politische Ökonomie der Umwelt. Ein wichtiger Bereich der Globalpolitik ist der weltpolitische Konflikt um Legitimität. Manche argumentieren, Globalpolitik unterscheide sich vom Feld der internationalen Politik (allgemein als Zweig der internationalen Beziehungen angesehen), da sie „den Vorrang zwischenstaatlicher Beziehungen und Transaktionen nicht betont“. Diese Unterscheidung wurde jedoch von Autoren und Politikwissenschaftlern nicht immer vertreten, die den Begriff „internationale Politik“ häufig im Sinne von Globalpolitik verwenden."
 power_status.1.a:0 "OK"
