monte_carlo_casino_desc:0 "Das Casino von Monte Carlo, offiziell Casino de Monte-Carlo, ist ein Glücksspiel- und Unterhaltungskomplex in Monaco. Es umfasst ein Casino, die Opéra de Monte-Carlo und das Büro von Les Ballets de Monte-Carlo. Das Casino de Monte-Carlo gehört der Société des bains de mer de Monaco, einem öffentlichen Unternehmen, an dem die monegassische Regierung und die herrschende Königsfamilie eine Mehrheitsbeteiligung halten. Dem Unternehmen gehören auch die wichtigsten Hotels, Sportclubs, Gastronomiebetriebe und Nachtclubs im gesamten Fürstentum. Bürgern Monacos ist der Zutritt zu den Spielräumen des Casinos jedoch verboten."
