DNC_Expansion_country.8.t:0 "Erster Davis Cup ausgetragen"
DNC_Expansion_country.8.d:0 "Das Turnier wurde 1899 von vier Mitgliedern des Tennisteams der Harvard University ins Leben gerufen, die die Idee hatten, die Briten zu einem Tenniswettbewerb herauszufordern. Nachdem die Idee von der United States Lawn Tennis Association und der British Lawn Tennis Association grünes Licht erhalten hatte, entwarf Dwight F. Davis, einer der vier Harvard-Spieler, ein Turnierformat und kaufte aus eigener Tasche eine passende Trophäe aus Sterlingsilber von Shreve, Crump &amp; Low. Das erste Spiel zwischen den Vereinigten Staaten und den Britischen Inseln fand 1900 im Longwood Cricket Club in Boston, Massachusetts, statt. Das amerikanische Team, zu dem auch Davis gehörte, gewann die ersten drei Spiele und die Challenge"
DNC_Expansion_country.8.a:1 "OK"
