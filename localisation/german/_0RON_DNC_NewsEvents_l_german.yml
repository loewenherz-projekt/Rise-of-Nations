DNC_Expansion_country.24.t:0 "Schlacht um die Taku-Festungen"
DNC_Expansion_country.24.d:0 "Seestreitkräfte der Acht-Nationen-Allianz erobern die Taku-Forts an der Mündung des Hai-Flusses in China. Nach einer kurzen, aber blutigen Schlacht wurden die Taku-Forts von der Acht-Nationen-Allianz eingenommen."
DNC_Expansion_country.24.a:1 "OK"
DNC_Expansion_news.24.t:0 "Schlacht um die Taku-Festungen"
DNC_Expansion_news.24.d:0 "Seestreitkräfte der Acht-Nationen-Allianz erobern die Taku-Forts an der Mündung des Hai-Flusses in China. Nach einer kurzen, aber blutigen Schlacht wurden die Taku-Forts von der Acht-Nationen-Allianz eingenommen. Den Boxern wurde eine Frist zur Kapitulation gesetzt, woraufhin die Chinesen nicht auf deren Ablauf warteten, sondern aus den Forts mit allen Kanonen das Feuer auf die alliierten Schiffe eröffneten."
DNC_Expansion_news.24.a:1 "OK"

DNC_Expansion_country.25.t:0 "Boxer massakrieren Hunderte"
DNC_Expansion_country.25.d:0 "Boxer versammeln rund 20.000 Menschen in der Nähe von Peking und töten Hunderte europäische Bürger, darunter den deutschen Botschafter. Diese unmenschliche Tat wurde von den Staats- und Regierungschefs der Welt verurteilt, und die Acht-Nationen-Allianz wird weitere Truppen entsenden, um den Aufstand schnell niederzuschlagen. "
DNC_Expansion_country.25.a:1 "OK"
