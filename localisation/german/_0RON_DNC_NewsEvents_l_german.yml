DNC_Expansion_country.173.t:0 "Zweite Besetzung Kubas"
DNC_Expansion_country.173.d:0 "Die zweite Besetzung Kubas durch US-amerikanische Streitkräfte, offiziell die provisorische Regierung Kubas. Als die Regierung des kubanischen Präsidenten Tomás Estrada Palma zusammenbrach, befahl US-Präsident Theodore Roosevelt den US-Streitkräften, nach Kuba einzumarschieren. Ihre Mission bestand darin, Kämpfe zwischen den Kubanern zu verhindern, die wirtschaftlichen Interessen der USA zu schützen und freie Wahlen abzuhalten, um eine neue und legitime Regierung zu etablieren."
DNC_Expansion_country.173.a:1 "Hilfe anfordern."
DNC_Expansion_country.173.b:1 "Wir brauchen sie nicht."
DNC_Expansion_news.173.t:0 "Zweite Besetzung Kubas"
DNC_Expansion_news.173.d:0 "Die zweite Besetzung Kubas durch US-amerikanische Streitkräfte, offiziell die provisorische Regierung Kubas. Als die Regierung des kubanischen Präsidenten Tomás Estrada Palma zusammenbrach, befahl US-Präsident Theodore Roosevelt den US-Streitkräften, nach Kuba zu kommen. Ihre Mission bestand darin, Kämpfe zwischen den Kubanern zu verhindern, die wirtschaftlichen Interessen der USA zu schützen und freie Wahlen abzuhalten, um eine neue und legitime Regierung zu etablieren."
ron_diplomatic.113.t:0 "Die Rebellionsdrohung"
ron_diplomatic.113.d:0 "José Miguel Gómez und seine libertäre Partei planen einen Staatsstreich gegen unsere Regierung aufgrund „unfairer“ Wahlen. Sie haben mehr Unterstützung als wir und sind besser bewaffnet. Wir können entweder nachgeben oder die USA um Hilfe bitten. Was sollen wir tun?"
ron_diplomatic.113.a:1 "Bitten Sie um Hilfe"
ron_diplomatic.113.b:1 "Gib auf."
ron_diplomatic.114.t:0 "USA unterstützt José Miguel Gómez"
ron_diplomatic.114.d:0 "Nach langen Verhandlungen im amerikanischen Parlament haben die USA beschlossen, den Libertären José Miguel Gómez zu unterstützen und unser Land zu besetzen."
ron_diplomatic.114.a:1 "OK"
ron_diplomatic.115.t:0 "USA unterstützt Tomás Estrada Palma"
ron_diplomatic.115.d:0 "Nach langen Verhandlungen im amerikanischen Parlament haben die USA beschlossen, den derzeitigen Präsidenten Tomás Estrada Palma zu unterstützen und unser Land zu besetzen."
ron_diplomatic.115.a:1 "OK"


