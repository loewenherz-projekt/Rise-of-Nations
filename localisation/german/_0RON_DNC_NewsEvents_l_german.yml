DNC_Expansion_country.123.t:0 "Japanischer Angriff auf Port Arthur scheitert"
DNC_Expansion_country.123.d:0 "Die Angriffe auf diesen Abschnitt der russischen Linie hatten den Japanern schwere Verluste zugefügt, jedoch ohne Erfolg und ohne Bodengewinn. Als Nogi am 24. August 1904 seinen Versuch, in die Wantai-Schlucht einzudringen, schließlich abbrach, hatte er nur den 174 Meter-Hügel sowie den West- und Ost-Pan-Lung vorzuweisen, was seinen Verlust von über 16.000 Mann bedeutete. Da alle anderen Stellungen weiterhin fest in russischer Hand blieben, beschloss Nogi schließlich, die Frontalangriffe zugunsten einer langwierigen Belagerung aufzugeben."
DNC_Expansion_country.123.a:1 "Banzai?"
DNC_Expansion_news.123.t:0 "Japanischer Angriff auf Port Arthur scheitert"
DNC_Expansion_news.123.d:0 "Die Angriffe auf einen Teil der russischen Linie hatten den Japanern schwere Verluste zugefügt, jedoch ohne Erfolg und ohne Bodengewinn. Als Nogi am 24. August 1904 seinen Versuch, in die Wantai-Schlucht einzudringen, schließlich abbrach, hatte er nur den 174 Meter Hill sowie den West- und Ost-Pan-Lung vorzuweisen, was seinen Verlust von über 16.000 Mann bedeutete. Da alle anderen Stellungen weiterhin fest in russischer Hand blieben, beschloss Nogi schließlich, die Frontalangriffe zugunsten einer langwierigen Belagerung aufzugeben."
DNC_Expansion_news.123.a:1 "OK"

DNC_Expansion_country.124.t:0 "Vorfall auf der Doggerbank"
DNC_Expansion_country.124.d:0 "Der Vorfall auf der Doggerbank ereignete sich in der Nacht vom 21. auf den 22. Oktober 1904, als die Baltische Flotte der Kaiserlich Russischen Marine eine britische Trawlerflotte aus Kingston upon Hull in der Doggerbank der Nordsee mit Torpedobooten der Kaiserlich Japanischen Marine verwechselte und auf sie feuerte. Im Chaos des Gefechts schossen auch russische Kriegsschiffe aufeinander. Zwei britische Fischer starben, sechs weitere wurden verletzt, ein Fischerboot sank und fünf weitere Boote wurden beschädigt. "
DNC_Expansion_country.124.a:1 "OK"
