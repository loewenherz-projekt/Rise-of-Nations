DNC_Expansion_news.196.a:1 "OK"

DNC_Expansion_country.197.t:0 "Japan-Korea-Vertrag von 1907"
DNC_Expansion_country.197.d:0 "Heute wurde dem Kaiserhof ein Vorschlag zur Einschränkung der koreanischen Autonomie vorgelegt. Der Vertrag sah vor, dass Korea unter der Führung eines japanischen Generals agieren sollte. Die Vertragsbestimmungen führten dazu, dass die Verwaltung der inneren Angelegenheiten an Japan übertragen wurde. Da das Koreanische Kaiserreich gemäß dem Eulsa-Vertrag von 1905 ein Protektorat Japans ist, verloren die Koreaner das Recht auf diplomatischen Austausch mit anderen Ländern."
DNC_Expansion_country.197.a:1 "Den Vertrag genehmigen"
DNC_Expansion_country.197.b:1 "Wir brauchen den Vertrag nicht"
DNC_Expansion_news.197.t:0 "Japan-Korea-Vertrag von 1907"
DNC_Expansion_news.197.d:0 "Der Vertrag sah vor, dass Korea unter der Führung eines japanischen Generals handeln sollte. Die Vertragsbestimmungen bewirkten, dass die Verwaltung der inneren Angelegenheiten an Japan übertragen wurde. Das koreanische Kaiserreich war gemäß dem früheren Eulsa-Vertrag von 1905 ein Protektorat Japans geworden und hatte damit das Recht auf diplomatischen Austausch mit anderen Ländern verloren. Der koreanische Kaiser Gojong entsandte heimlich einen Gesandten zur Haager Weltfriedenskonferenz, um gegen Japans Vorgehen zu protestieren."
DNC_Expansion_news.197.a:1 "OK"
