ron_diplomatic.106.t:0 "Expedition nach Tibet"
ron_diplomatic.106.d:0 "Um das lebenswichtige Himalaya-Gebirge vor einer russischen Invasion in Eurasien zu schützen, müssen wir das lebenswichtige tibetische Plateau im China der Qing-Dynastie erobern. Dies wird unter dem Deckmantel einer Expedition geschehen. Um dem internationalen Druck entgegenzuwirken, werden wir nicht auf dem chinesischen Festland einmarschieren."
ron_diplomatic.106.a:1 "Auf in den Krieg!"
ron_diplomatic.107.t:0 "Großbritannien erklärt den Krieg!"
ron_diplomatic.107.d:0 "Heute erreichten uns die Nachrichten, dass die Briten in unser Heimatland einmarschieren werden, um uns das tibetische Plateau abzunehmen. Nach den Ereignissen des Boxeraufstands ist unser Militär stärker geworden und wir müssen eine Invasion abwehren!"
ron_diplomatic.107.a:1 "Bring es an!" 
ron_diplomatic.108.t:0 "Die Lhasa-Konferenz"
ron_diplomatic.108.d:0 "Nach einem überwältigenden Sieg bei der Tibetexpedition schickten uns die Briten Friedensbedingungen, um Anspruch auf das Himalaya-Gebiet östlich von Bhutan zu erheben. Um unsere Nation nicht zu zerstören, waren wir gezwungen, diese Bedingungen zu akzeptieren."
ron_diplomatic.108.a:1 "Sehr gut.."
ron_diplomatic.109.t:0 "Die Lhasa-Konferenz"
ron_diplomatic.109.d:0 "Nach einem überwältigenden Sieg gegen die Tibet-Expedition schickten uns die Chinesen Friedensbedingungen, um Sikkim, Aksai Chin und Arunachal Pradesh zu beanspruchen. Wir waren gezwungen, diese Bedingungen zu akzeptieren, um das Juwel des Ostens nicht zu zerstören."
ron_diplomatic.109.a:1 "Sehr gut.."
ron_diplomatic.110.t:0 "White Peace-Angebot"
ron_diplomatic.110.d:0 "Nach einem langen und verlustreichen Krieg, in dem scheinbar keine Seite gewinnt, haben uns die Engländer ein Friedensabkommen geschickt. Was sollen wir tun?"
ron_diplomatic.110.a:1 "Akzeptiere es."
ron_diplomatic.111.t:0 "White Peace-Angebot"
ron_diplomatic.111.d:0 "Nach einem langen und verlustreichen Krieg, in dem scheinbar keine Seite gewinnt, haben uns die Chinesen ein Friedensabkommen geschickt. Was sollen wir tun?"
ron_diplomatic.111.a:1 "Akzeptiere es."
ron_diplomatic.116.t:0 "Aufstände in Tibet"
ron_diplomatic.116.d:0 "Nach unserer Besetzung Lhasas im Anschluss an die Tibetexpedition ist das tibetische Volk mit unserer Herrschaft nicht zufrieden und könnte revoltieren. Wir können entweder mit den Chinesen ein Abkommen aushandeln, um uns die Zahlungen für Lhasa zu sichern, oder wir können hoffen, dass dies bald scheitert."
ron_diplomatic.116.a:1 "Verhandeln Sie einen Deal."
ron_diplomatic.116.b:1 "Lassen Sie sie tun, was sie wollen."
ron_diplomatic.117.t:0 "Die Briten schicken uns einen Vorschlag"
ron_diplomatic.117.d:0 "Nach der Besetzung Lhasas im Zuge der Tibetexpedition ist das tibetische Volk mit der britischen Herrschaft unzufrieden und könnte revoltieren. Die Briten haben uns einen Deal vorgelegt, der uns gegen Bezahlung die Kontrolle über Lhasa überlässt. Was sollen wir tun?"
ron_diplomatic.117.a:1 "Akzeptiere es!"
ron_diplomatic.117.b:1 "Tibet ist uns egal."
DNC_Expansion_country.116.t:0 "Die Schlacht von Guru"
DNC_Expansion_country.116.d:0 "Heute fand die Schlacht von Guru statt, bei der die britischen Truppen die Tibeter unter schweren Verlusten zurücktrieben. Die Briten waren den schlecht ausgebildeten tibetischen Soldaten in puncto Bewaffnung und Ausrüstung überlegen und konnten so den strategisch wichtigen Guru-Pass sichern."
DNC_Expansion_country.116.a:1 "OK"
DNC_Expansion_news.116.t:0 "Die Schlacht von Guru"
DNC_Expansion_news.116.d:0 "Heute fand die Schlacht von Guru statt, bei der die britischen Truppen die Tibeter unter schweren Verlusten zurücktrieben. Die Briten waren den schlecht ausgebildeten tibetischen Soldaten in puncto Bewaffnung und Ausrüstung überlegen und konnten so den strategisch wichtigen Guru-Pass sichern."
DNC_Expansion_news.116.a:1 "OK"
ron_diplomatic_news.17.t:0 "Die Lhasa-Konferenz"
ron_diplomatic_news.17.d:0 "Nach der Besetzung Lhasas im Zuge der Tibetexpedition ist das tibetische Volk mit der britischen Herrschaft unzufrieden und droht zu revoltieren. Um einen Aufstand zu verhindern, haben die Briten China ein Abkommen angeboten, das ihnen gegen Bezahlung die Kontrolle über Lhasa überträgt. Die Chinesen haben dieses Abkommen akzeptiert und kontrollieren nun Lhasa."
ron_diplomatic_news.17.a:1 "OK"
DNC_Expansion_country.117.t:0 "Die Entende Cordiale"
DNC_Expansion_country.117.d:0 "Die Entente Cordiale umfasste eine Reihe von Abkommen zwischen Großbritannien und der Französischen Republik, die zu einer deutlichen Verbesserung der englisch-französischen Beziehungen führten. Über die unmittelbaren Anliegen der kolonialen Abgrenzung hinaus, die das Abkommen behandelte, markierte die Unterzeichnung der Entente Cordiale das Ende eines fast tausendjährigen, zeitweiligen Konflikts zwischen den beiden Staaten und ihren Vorgängerstaaten und ersetzte den seit dem Ende der Napoleonischen Kriege 1815 bestehenden Modus Vivendi durch ein formelleres Abkommen."
DNC_Expansion_country.117.a:1 "Ein Toast auf unsere neuen Freunde!"
DNC_Expansion_country.117.b:1 "Wir wollen kein Bündnis"
DNC_Expansion_news.117.t:0 "Die Entende Cordiale"
DNC_Expansion_news.117.d:0 "Die Entente Cordiale umfasste eine Reihe von Abkommen zwischen Großbritannien und der Französischen Republik, die zu einer deutlichen Verbesserung der englisch-französischen Beziehungen führten. Über die unmittelbaren Anliegen der kolonialen Abgrenzung hinaus, die das Abkommen behandelte, markierte die Unterzeichnung der Entente Cordiale das Ende eines fast tausendjährigen, zeitweiligen Konflikts zwischen den beiden Staaten und ihren Vorgängerstaaten und ersetzte den seit dem Ende der Napoleonischen Kriege 1815 bestehenden Modus Vivendi durch ein formelleres Abkommen."
DNC_Expansion_news.117.a:1 "OK"
