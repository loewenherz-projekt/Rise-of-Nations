DNC_Expansion_country.15.t:0 "Anarchist schießt auf Prinz von Wales"
DNC_Expansion_country.15.d:0 "Am 4. April 1900 wollte der königliche Zug gerade den Gare du Nord in Brüssel mit Ziel Kopenhagen verlassen, als ein entschlossen aussehender junger Mann aus der Menge der Gratulanten auf dem Bahnsteig auf ihn zukam. Er wartete einen Moment, während ein Schaffner dem im Wagen sitzenden Prinzen und der Prinzessin von Wales Tassen Tee reichte. Als der Schaffner aus dem Weg ging, stürzte er sich auf den Zug und sprang auf eine Stufe an der Seite des Waggons, als dieser den Bahnhof verließ. Er feuerte zwei Schüsse aus einer Pistole in das königliche Abteil ab. Einer verfehlte den Kopf des Prinzen nur knapp, traf aber eine metallene Handauflage und landete auf dem Sitz; der andere flog harmlos durch die Luft. Doch bevor er einen dritten Schuss abgeben konnte, rang der Bahnhofsvorsteher Charles Crocius den Schützen zu Boden. Ein weiterer Schuss wurde abgefeuert, als andere herbeieilten, um zu helfen. Der Bahnhofsvorsteher durchwühlte seine Taschen und fand anarchistische Literatur und Papiere, die ihn als den 15-jährigen Jean-Baptiste Sipido, einen Blechschmiedlehrling, identifizierten."
DNC_Expansion_country.15.a:1 "OK"
