DNC_Expansion_country.182.t:0 "Frauenwahlrechtsbewegung"
DNC_Expansion_country.182.d:0 "Die National Union of Women&#39;s Suffrage Societies (NUWSS) organisierte am 9. Februar 1907 den ersten großen Marsch für das Frauenwahlrecht. Die Frauen wollten vom Hyde Park zur Exeter Hall marschieren, einem großen Versammlungssaal an der Nordseite des Strandes. Doch das Wetter war nicht auf der Seite der Marschierenden, und starker Regen machte die Straßen Londons sehr matschig, daher der Name des Marsches. Trotzdem wurde der Marsch als großer Erfolg gewertet."
DNC_Expansion_country.182.a:1 "OK"
