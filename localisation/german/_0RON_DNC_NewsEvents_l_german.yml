DNC_Expansion_country.36.t:0 "Der Texas Gusher"
DNC_Expansion_country.36.d:0 "Am 10. Januar 1901 brachte Kapitän Anthony Lucas die sprudelnde Quelle an Land, die den Ölboom in Texas auslöste. Lucas, ein kroatischer Einwanderer mit umfangreicher Erfahrung im Salzbohren in Louisiana, wurde 1899 von Pattillo Higgins in die Gegend von Spindletop Hill geholt, um ein neues Bohrunternehmen zu gründen. Higgins, Mitglied der Gladys City Oil, Gas and Manufacturing Co., hatte sieben Jahre lang unter trockenen Bohrlöchern gelitten. Die Ölforscher waren überzeugt, dass Spindletop mit seinen Schwefelquellen und Erdgasaustrittsstellen ein idealer Standort für Rohöl war. Da ihre Quelle 175 Meter tief war, ging den beiden Männern das Geld aus und sie waren, wie viele andere vor ihnen, bereit aufzugeben, als zwei Investoren aus Pittsburgh – John Galey und James Guffey – einstiegen. Lucas wurde auf einen winzigen Anteil reduziert und Higgins aus dem Unternehmen gedrängt, doch Lucas hatte das Geld, um weiter tiefer zu bohren."
DNC_Expansion_country.36.a:1 "OK"
