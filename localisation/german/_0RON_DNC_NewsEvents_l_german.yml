DNC_Expansion_country.63.t:0 "Schneesturm im Hakkōda-Gebirge"
DNC_Expansion_country.63.d:0 "Der Vorfall im Hakkōda-Gebirge ereignete sich heute, als sich eine Gruppe von Soldaten der Kaiserlich Japanischen Armee auf dem Weg zur Tashiro-Thermalquelle im Hakkōda-Gebirge in der Präfektur Aomori im Norden von Honshu, Japan, in einem Schneesturm verirrte. Die 199 Todesopfer bei einem einzigen Aufstieg machen dies zur tödlichsten Katastrophe in der modernen Geschichte des Bergsteigens."
DNC_Expansion_country.63.a:1 "Warum besteigen unsere Soldaten Berge?"
DNC_Expansion_news.63.t:0 "Schneesturm im Hakkōda-Gebirge"
