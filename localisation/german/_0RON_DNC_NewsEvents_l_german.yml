DNC_Expansion_country.135.t:0 "Russische Truppen beginnen mit dem Rückzug aus Mukden"
DNC_Expansion_country.135.d:0 "Die Schlacht von Mukden war die entscheidende Landschlacht im Russisch-Japanischen Krieg. Sie war eine der größten Schlachten der Geschichte, an der über eine halbe Million Mann beteiligt waren. Doch heute traf die Nachricht ein, dass es den japanischen Truppen gelungen ist, die Russen zurückzudrängen – mit schweren Verlusten auf beiden Seiten. Es bleibt abzuwarten, wie dieser Krieg weitergeht."
DNC_Expansion_country.135.a:1 "OK"
