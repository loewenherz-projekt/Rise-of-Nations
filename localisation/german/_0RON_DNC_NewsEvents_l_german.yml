DNC_Expansion_country.199.t:0 "UPS wird gegründet"
DNC_Expansion_country.199.d:0 "James Casey gründete zusammen mit Claude Ryan die American Messenger Company in Seattle, Washington, mit einem Fremdkapital von 100 Dollar. Die meisten Lieferungen wurden zu dieser Zeit zu Fuß erledigt, für längere Strecken wurde das Fahrrad genutzt. Die American Messenger Company konzentrierte sich hauptsächlich auf die Paketzustellung an Einzelhandelsgeschäfte und lieferte für ihren größten Kunden, die US-Post, Eilsendungen aus."
DNC_Expansion_country.199.a:1 "OK"
