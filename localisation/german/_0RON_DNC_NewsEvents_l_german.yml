DNC_Expansion_country.100.t:0 " Der Brand in der Pariser Métro"
DNC_Expansion_country.100.d:0 "Gegen 20 Uhr wurde in der Metro Parus ein Feuer entdeckt; der Stromkreis für die Bahnhofsbeleuchtung war zerstört. Der Bahnhof Couronnes versank in Dunkelheit, als aus dem Tunnel nach Ménilmontant eine dichte, erstickende Rauchwolke aufstieg. In weniger als einer Minute verwandelte sich der Bahnhof in eine Todesfalle. Durch den Rauch orientierungslos und weit vom Ausgang entfernt, irrten viele Menschen in die falsche Richtung und erstickten. Insgesamt kamen 84 Menschen ums Leben, 75 in Couronnes, sieben in Ménilmontant und zwei, die versuchten, durch den Tunnel zu fliehen. Der Zug mit der Holzkarosserie wurde vollständig zerstört."
DNC_Expansion_country.100.a:1 "Wie ist das passiert?"
