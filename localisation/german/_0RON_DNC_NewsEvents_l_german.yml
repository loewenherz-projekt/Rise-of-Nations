DNC_Expansion_country.29.t:0 "König Umberto ermordet"
DNC_Expansion_country.29.d:0 "Heute war ein düsterer Tag für Italien: Der italienische König wurde vom Anarchisten Gaetano Bresc viermal angeschossen und kurz darauf tot aufgefunden. Sein Motiv soll Rache für die Opfer der Mai-Unruhen 1898 in Mailand gewesen sein. Er wird in Untersuchungshaft genommen und zu einem späteren Zeitpunkt vor Gericht gestellt. Die Beerdigung des Königs ist für den 9. August 1900 geplant."
DNC_Expansion_country.29.a:1 "Ein weiterer König fällt."
