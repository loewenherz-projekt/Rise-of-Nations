DNC_Expansion_country.156.t:0 "Gesetz zur Trennung von Kirche und Staat"
DNC_Expansion_country.156.d:0 "Das französische Gesetz zur Trennung von Kirche und Staat wurde 1905 von der Abgeordnetenkammer verabschiedet. Es wurde während der Dritten Republik erlassen und etablierte den staatlichen Laizismus in Frankreich. Frankreich wurde damals vom Bloc des gauches (Linke Koalition) unter Emile Combes regiert. Das Gesetz basierte auf drei Prinzipien: der Neutralität des Staates, der Religionsfreiheit und der öffentlichen Gewalt im Zusammenhang mit der Kirche. Dieses Gesetz gilt als Rückgrat des französischen Laïcité-Prinzips."
DNC_Expansion_country.156.a:1 "OK"
