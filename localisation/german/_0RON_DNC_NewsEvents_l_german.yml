DNC_Expansion_country.228.t:0 "Die Bosnienkrise beginnt"
DNC_Expansion_country.228.d:0 "Die Bosnienkrise brach aus, als wir die Annexion von Bosnien und Herzegowina ankündigten, Gebiete, die früher unter der Souveränität des Osmanischen Reiches lagen, seit 1878 aber unter österreichisch-ungarischer Verwaltung standen. Diese einseitige Aktion – zeitlich abgestimmt auf die Unabhängigkeitserklärung Bulgariens vom Osmanischen Reich – wird uns zeigen, was die Großmächte von diesem Schritt halten."
DNC_Expansion_country.228.a:1 "Bosnien gehört rechtmäßig uns!"
DNC_Expansion_news.228.t:0 "Die Bosnienkrise beginnt"
DNC_Expansion_news.228.d:0 "Die Bosnienkrise brach aus, als Österreich-Ungarn die Annexion von Bosnien und Herzegowina ankündigte. Diese Gebiete hatten zuvor zum Osmanischen Reich gehört, standen seit 1878 jedoch unter österreichisch-ungarischer Verwaltung. Diese einseitige Aktion – die zeitlich mit der Unabhängigkeitserklärung Bulgariens vom Osmanischen Reich am 5. Oktober zusammenfiel – löste Proteste aller Großmächte und der Balkannachbarn Österreich-Ungarns, Serbien und Montenegro, aus."
DNC_Expansion_news.228.a:1 "OK"

DNC_Expansion_country.229.t:0 "König Leopold gibt die Kontrolle über den Kongo auf"
DNC_Expansion_country.229.d:0 "Ein Dokument des britischen Diplomaten Roger Casement (1864–1916) aus dem Jahr 1904, in dem Missstände im Kongo-Freistaat, der sich im Privatbesitz von König Leopold II. von Belgien befand, detailliert beschrieben werden. Dieser Bericht trug maßgeblich dazu bei, dass Leopold seine privaten Besitztümer in Afrika aufgab. Er besaß den kongolesischen Staat seit 1885, der ihm von der Berliner Konferenz zugesprochen worden war, und nutzte dessen natürliche Ressourcen (hauptsächlich Kautschuk) zur Erzielung seines Privatvermögens."
DNC_Expansion_country.229.a:1 "OK"
DNC_Expansion_news.229.t:0 "König Leopold gibt die Kontrolle über den Kongo auf"
DNC_Expansion_news.229.d:0 "Ein Dokument des britischen Diplomaten Roger Casement (1864–1916) aus dem Jahr 1904, in dem Missstände im Freistaat Kongo, der sich im Privatbesitz von König Leopold II. von Belgien befand, detailliert beschrieben werden. Dieser Bericht trug maßgeblich dazu bei, dass Leopold seine privaten Besitztümer in Afrika aufgab. Er besaß den kongolesischen Staat seit 1885, der ihm von der Berliner Konferenz zugesprochen worden war, und nutzte dessen natürliche Ressourcen (hauptsächlich Kautschuk) zur Erlangung seines Privatvermögens."
DNC_Expansion_news.229.a:1 "OK"

DNC_Expansion_country.230.t:0 "Kaiser Puyi besteigt mit 2 Jahren den chinesischen Thron"
DNC_Expansion_country.230.d:0 "Von Kaiserinwitwe Cixi auserwählt, wurde Puyi im Alter von zwei Jahren Kaiser, nachdem der Guangxu-Kaiser, Puyis Halbonkel, am 14. November kinderlos gestorben war. Puyis Einführung in das kaiserliche Leben begann, als Palastbeamte in seiner Familienresidenz eintrafen, um ihn abzuholen. Am Abend des 13. November 1908 verließ ohne Vorankündigung eine Prozession von Eunuchen und Gardisten unter Führung des Palastkämmerers die Verbotene Stadt in Richtung des Nördlichen Palastes, um Prinz Chun mitzuteilen, dass sie seinen zweijährigen Sohn Puyi abholen würden, um ihn zum neuen Kaiser zu machen. Der kleine Puyi schrie und wehrte sich, als die Beamten den Eunuchen befahlen, ihn abzuholen. Puyis Eltern sagten nichts, als sie erfuhren, dass sie ihren Sohn verlieren würden"
DNC_Expansion_country.230.a:1 "Eine junge Seele.."
DNC_Expansion_news.230.t:0 "Kaiser Puyi besteigt mit 2 Jahren den chinesischen Thron"
DNC_Expansion_news.230.d:0 "Von Kaiserinwitwe Cixi auserwählt, wurde Puyi im Alter von zwei Jahren Kaiser, nachdem der Guangxu-Kaiser, Puyis Halbonkel, am 14. November kinderlos gestorben war. Puyis Einführung in das kaiserliche Leben begann, als Palastbeamte in seiner Familienresidenz eintrafen, um ihn abzuholen. Am Abend des 13. November 1908 verließ ohne Vorankündigung eine Prozession von Eunuchen und Gardisten unter Führung des Palastkämmerers die Verbotene Stadt in Richtung des Nördlichen Palastes, um Prinz Chun mitzuteilen, dass sie seinen zweijährigen Sohn Puyi abholen würden, um ihn zum neuen Kaiser zu machen. Der kleine Puyi schrie und wehrte sich, als die Beamten den Eunuchen befahlen, ihn abzuholen. Puyis Eltern sagten nichts, als sie erfuhren, dass sie ihren Sohn verlieren würden"
DNC_Expansion_news.230.a:1 "Das ist verrückt!"

DNC_Expansion_country.231.t:0 "USA beenden kubanische Besatzung"
DNC_Expansion_country.231.d:0 "Am 13. Oktober 1906 übernahm Charles Edward Magoon das Amt des provisorischen Gouverneurs Kubas und entschied, dass das Land stabil genug sei, um Wahlen abzuhalten. Am 25. Mai 1908 fanden Regionalwahlen und am 14. November die Präsidentschaftswahlen statt. Beide wurden vom US-Militär überwacht. Die Wahlen verliefen ohne Zwischenfälle, und José Miguel Gómez wurde gewählt. Er trat sein Amt am 28. Januar 1909 an. Die US-Truppen wurden in den folgenden Wochen abgezogen, und die letzten amerikanischen Streitkräfte verließen den Inselstaat."
DNC_Expansion_country.231.a:1 "OK"
DNC_Expansion_news.231.t:0 "USA beenden kubanische Besatzung"
