DNC_Expansion_country.128.t:0 "Transsibirische Eisenbahn offiziell eröffnet"
DNC_Expansion_country.128.d:0 "Die Transsibirische Eisenbahn ist ein Eisenbahnnetz, das Westrussland mit dem russischen Fernen Osten verbindet. Mit einer Länge von über 9.289 Kilometern (5.772 Meilen) ist sie die längste Eisenbahnstrecke der Welt. Sie beginnt in der Hauptstadt Moskau, der größten Stadt Europas, und endet in Wladiwostok, nahe der koreanisch-russischen Grenze."
DNC_Expansion_country.128.a:1 "OK"
