ron_welcomeevents.4.b:0 "NEIN"
ron_welcomeevents.4.a:0 "Ja, bitte"

ron_diplomatic.200.t:0 "[FROM.GetName] Atomtest"
ron_diplomatic.200.d:0 "Das [FROM.GetAdjective] Militär hat eine Atombombe getestet. Eine Atomwaffe (auch Atombombe, Atombombe oder Atomsprengkopf genannt, umgangssprachlich auch A-Bombe oder Nuke) ist ein Sprengsatz, der seine Zerstörungskraft durch Kernreaktionen erhält, entweder durch Kernspaltung (Spaltbombe) oder eine Kombination aus Kernspaltung und Fusion (Thermonuklearbombe), die eine nukleare Explosion auslösen. Beide Bombentypen setzen große Mengen Energie aus relativ kleinen Materiemengen frei."
ron_diplomatic.200.a:1 "Unser Atomprogramm ausbauen"
ron_diplomatic.200.b:1 "Besorgniserregend"

ron_diplomatic.126.t:0 "[FROM.GetName] Akzeptiert"
ron_diplomatic.126.d:0 "Das [FROM.GetAdjective] hat Einsicht gezeigt und unsere Anfrage akzeptiert."
ron_diplomatic.126.a:1 "Exzellent"

ron_diplomatic.127.t:0 "[FROM.GetName] lehnt ab"
ron_diplomatic.127.d:0 "Die [FROM.GetAdjective] haben uns mitgeteilt, dass sie unsere Anfrage ablehnen müssen. Hoffen wir, dass sie uns nicht im Weg stehen."
ron_diplomatic.127.a:1 "Sie werden dafür bezahlen ..."

 ron_diplomatic.128.t:0 "[FROM.GetName] nimmt die Einladung zu [ROOT.GetFactionName] an"
 ron_diplomatic.128.d:0 "[FROM.GetName] hat beschlossen, unser Angebot anzunehmen und sich der [ROOT.GetFactionName] anzuschließen. Von nun an werden wir gemeinsam bestehen oder fallen."
 ron_diplomatic.128.a:0 "Niemand kann uns widerstehen!"
 ron_diplomatic.129.t:0 "[FROM.GetName] lehnt Angebot ab, [ROOT.GetFactionName] beizutreten"
 ron_diplomatic.129.d:0 "[FROM.GetName] hat beschlossen, unser Angebot, der [ROOT.GetFactionName] beizutreten, abzulehnen. Wir müssen ohne ihre Hilfe auskommen."
 ron_diplomatic.129.a:0 "Unsere Hilfe ist nicht erwünscht."
 
ron_diplomatic.130.t:0 "Unsere Unabhängigkeitserklärung"
ron_diplomatic.130.a:0 "Wir sind frei"
ron_diplomatic.131.t:0 "[FROM.GetName] erklärt Unabhängigkeit"
ron_diplomatic.131.d:0 "[FROM.GetName] hat gerade eine diplomatische Note herausgegeben, in der es einseitig erklärt, dass es fortan eine souveräne Nation ist und seine Angelegenheiten selbst regeln wird. Wie werden wir darauf reagieren?"

ron_diplomatic.132.t:0 "Das Schicksal unserer Nation"
ron_diplomatic.132.d:0 "Es scheint, dass wir keine andere Wahl haben, als uns der Autorität von [FROM.GetName] zu unterwerfen."
ron_diplomatic.132.a:0 "Was haben wir uns nur dabei gedacht!"

ron_diplomatic.133.t:0 "Das Schicksal unserer Nation"
ron_diplomatic.133.d:0 "Es ist Zeit für uns zu entscheiden, ob wir eine völlig unabhängige Nation werden oder ob wir ein Teil von [FROM.GetName] bleiben."
ron_diplomatic.133.a:0 "Wir sind frei"
ron_diplomatic.133.b:0 "Was haben wir uns nur dabei gedacht!"




