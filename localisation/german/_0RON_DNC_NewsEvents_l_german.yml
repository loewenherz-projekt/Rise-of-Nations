DNC_Expansion_country.5.t:0 "Gründung der American League of Professional Baseball Clubs"
DNC_Expansion_country.5.d:0 "Die American League of Professional Baseball Clubs, kurz American League (AL), ist eine der beiden Ligen der Major League Baseball (MLB) in den USA und Kanada. Sie entwickelte sich aus der Western League, einer Minor League in den Staaten der Großen Seen, die schließlich den Status einer Major League anstrebte. Sie wird manchmal auch Junior Circuit genannt, da sie in der Saison 1901, 25 Jahre nach der Gründung der National League (dem „Senior Circuit“), den Status einer Major League erwarb."
DNC_Expansion_country.5.a:1 "OK"
