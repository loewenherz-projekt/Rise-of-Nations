DNC_Expansion_country.241.t:0 "USA kauft erstes Militärflugzeug"
DNC_Expansion_country.241.d:0 "Die US-Armee benötigte ein Flugzeug und unterzeichnete Anfang 1908 einen Vertrag mit Orville und Wilbur Wright. Der Vertrag sah bestimmte Tests vor, die das Flugzeug bestehen musste, bevor es von der Armee abgenommen wurde. Nachdem die Gebrüder Wright ihnen das fertige Produkt präsentiert hatten, beschloss die Signal Corp Division der US-Armee, das erste Militärflugzeug der Welt zu kaufen, einen Wright Military Flyer."
