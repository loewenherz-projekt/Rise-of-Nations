DNC_Expansion_country.158.t:0 "Persische Verfassungsrevolution"
DNC_Expansion_country.158.d:0 "Die persische Verfassungsrevolution fand heute statt. Sie ebnete den Weg für grundlegende Veränderungen in Persien und läutete die Moderne ein. In einer Zeit beispielloser Debatten in einer aufstrebenden Presse und neuer wirtschaftlicher Möglichkeiten. Viele Gruppen kämpften darum, den Verlauf der Revolution zu bestimmen. Die alte Ordnung, für deren Aufrechterhaltung König Nassereddin Schah Kadschar so lange gekämpft hatte, wurde schließlich durch neue Institutionen, neue Ausdrucksformen und eine neue soziale und politische Ordnung ersetzt."
DNC_Expansion_country.158.a:1 "Also gut.."
DNC_Expansion_news.158.t:0 "Persische Verfassungsrevolution"
DNC_Expansion_news.158.d:0 "Die persische Verfassungsrevolution, auch bekannt als die Verfassungsrevolution des Iran, fand heute statt. Sie führte zur Gründung eines Parlaments in Persien während der Kadscharen-Dynastie. Die Revolution ebnete den Weg für grundlegende Veränderungen in Persien und läutete die Moderne ein. Es war eine Zeit beispielloser Debatten in einer aufstrebenden Presse und neuer wirtschaftlicher Möglichkeiten. Viele Gruppen kämpften darum, den Verlauf der Revolution zu beeinflussen, und alle Teile der Gesellschaft wurden dadurch in gewisser Weise verändert. Die alte Ordnung, für deren Aufrechterhaltung König Nassereddin Schah Kadschar so lange gekämpft hatte, wurde schließlich durch neue Institutionen, neue Ausdrucksformen und eine neue soziale und politische Ordnung ersetzt."
DNC_Expansion_news.158.a:1 "OK"

france_morocco_protectorate:0 "Marionette Marokko"
france_morocco_protectorate_desc:0 "Nach Jahren der Vorbereitung ist Marokko nun endlich bereit, sich unserer Oberherrschaft zu beugen. Wir müssen sofort handeln, bevor sie ihre Meinung ändern."
DNC_Expansion_country.159.t:0 "Die Konferenz von Algeciras"
DNC_Expansion_country.159.d:0 "Die Algeciras-Konferenz fand im spanischen Algeciras statt. Ziel der Konferenz war es, eine Lösung für die Marokkokrise zwischen Frankreich und Deutschland zu finden. Diese war entstanden, als Deutschland auf Frankreichs Bemühungen reagierte, ein Protektorat über den unabhängigen Staat Marokko zu errichten. Deutschland versuchte nicht, die französische Expansion zu stoppen. Sein Ziel war es, sein internationales Ansehen zu stärken, und scheiterte kläglich. Das Ergebnis war eine deutlich engere Beziehung zwischen Frankreich und Großbritannien, die die Entente Cordiale stärkte, da London und Paris Berlin gegenüber zunehmend misstrauisch wurden."
DNC_Expansion_country.159.a:1 "OK"
DNC_Expansion_news.159.t:0 "Die Konferenz von Algeciras"
DNC_Expansion_news.159.d:0 "Die Algeciras-Konferenz fand im spanischen Algeciras statt. Ziel der Konferenz war es, eine Lösung für die Marokkokrise zwischen Frankreich und Deutschland zu finden. Diese war entstanden, als Deutschland auf Frankreichs Bemühungen reagierte, ein Protektorat über den unabhängigen Staat Marokko zu errichten. Deutschland versuchte nicht, die französische Expansion zu stoppen. Sein Ziel war es, sein internationales Ansehen zu stärken, und scheiterte kläglich. Das Ergebnis war eine deutlich engere Beziehung zwischen Frankreich und Großbritannien, die die Entente Cordiale stärkte, da London und Paris Berlin gegenüber zunehmend misstrauisch wurden."
DNC_Expansion_news.159.a:1 "OK"

DNC_Expansion_country.160.t:0 "HMS Dreadnought wird vom Stapel gelassen"
DNC_Expansion_country.160.d:0 "Nur ein Jahr und einen Tag nach Baubeginn wurde Dampf abgelassen und das Schiff stach heute für zweitägige Probefahrten in Devonport in See. Am 9. Juni absolvierte es seine achtstündigen Vollmotor-Erprobungen vor Polperro an der Küste Cornwalls, bei denen es durchschnittlich 20,05 Knoten und 21,6 Knoten pro Meile erreichte. Es kehrte für Geschütz- und Torpedoversuche nach Portsmouth zurück, bevor es seine endgültige Ausrüstung abschloss. Die Annahme, der Bau sei durch die Verwendung von Geschützen und Geschütztürmen beschleunigt worden, die ursprünglich für die Schlachtschiffe der Lord-Nelson-Klasse entwickelt worden waren, die es vorher gebaut hatte, ist nicht zutreffend, da die Geschütze und Geschütztürme erst im Juli 1905 bestellt wurden."
DNC_Expansion_country.160.a:1 "OK"
DNC_Expansion_news.160.t:0 "HMS Dreadnought wird vom Stapel gelassen"
DNC_Expansion_news.160.d:0 "Nur ein Jahr und einen Tag nach Baubeginn wurde Dampf abgelassen und das Schiff stach heute für zweitägige Probefahrten in Devonport in See. Am 9. Juni absolvierte es seine achtstündigen Vollmotor-Erprobungen vor Polperro an der Küste Cornwalls, bei denen es durchschnittlich 20,05 Knoten und 21,6 Knoten pro Meile erreichte. Es kehrte für Geschütz- und Torpedoversuche nach Portsmouth zurück, bevor es seine endgültige Ausrüstung abschloss. Die Annahme, der Bau sei durch die Verwendung von Geschützen und Geschütztürmen beschleunigt worden, die ursprünglich für die Schlachtschiffe der Lord-Nelson-Klasse entwickelt worden waren, die es vorher gebaut hatte, ist nicht zutreffend, da die Geschütze und Geschütztürme erst im Juli 1905 bestellt wurden."
DNC_Expansion_news.160.a:1 "OK"
ron_diplomatic.112.t:0 "Ein neuer Fortschritt in der Marine"
ron_diplomatic.112.d:0 "Die Briten haben ein neues Schiff vom Stapel gelassen, eine schwere Maschine, die all unsere bisherigen Fortschritte wie ein Kinderspiel erscheinen lässt. Wir stehen nun vor einem Scheideweg: Entweder konzentrieren wir uns auf unsere Marine und bringen sie auf das britische Niveau, oder wir akzeptieren die britische Seeherrschaft."
ron_diplomatic.112.a:1 "Bring es an!"
ron_diplomatic.112.b:1 "Wir haben keine andere Wahl, als es zu akzeptieren."

DNC_Expansion_country.161.t:0 "Papst Pius veröffentlicht die Enzyklika Vehementer Nos"
DNC_Expansion_country.161.d:0 "„Vehementer Nos“ ist eine heute von Papst Pius X. verkündete Enzyklika. Darin verurteilt er das zwei Monate zuvor erlassene französische Gesetz zur Trennung von Kirche und Staat. Er verurteilte die einseitige Aufhebung des Konkordats von 1801 zwischen Napoleon und Papst Pius VII., das der katholischen Kirche einen besonderen Status verliehen und eine Zusammenarbeit zwischen der französischen Regierung und dem Heiligen Stuhl etabliert hatte. Der Titel des Dokuments leitet sich von den lateinischen Anfangsworten ab, die „wir dringend“ bedeuten."
DNC_Expansion_country.161.a:1 "Unsinn."
DNC_Expansion_news.161.t:0 "Papst Pius veröffentlicht die Vehementer Nos"
DNC_Expansion_news.161.d:0 "„Vehementer Nos“ ist eine päpstliche Enzyklika, die Papst Pius X. heute verkündete. Darin verurteilte er das zwei Monate zuvor erlassene französische Gesetz zur Trennung von Kirche und Staat. Er verurteilte die einseitige Aufhebung des Konkordats von 1801 zwischen Napoleon und Papst Pius VII., das der katholischen Kirche einen besonderen Status verliehen und eine Zusammenarbeit zwischen der französischen Regierung und dem Heiligen Stuhl etabliert hatte. Der Titel des Dokuments leitet sich von den lateinischen Anfangsworten ab, die „wir dringend“ bedeuten."
DNC_Expansion_news.161.a:1 "OK"

DNC_Expansion_country.162.t:0 "Grubenunglück von Courrières"
DNC_Expansion_country.162.d:0 "Das Grubenunglück von Courrières ist Europas schwerster Grubenunfall. 1.099 Bergleute kamen dabei in Nordfrankreich ums Leben. Eine Kohlenstaubexplosion, deren Ursache nicht genau bekannt ist, verwüstete eine von der Compagnie des mines de houille de Courrières betriebene Kohlenmine. Opfer lebten in den umliegenden Dörfern Méricourt (404 Tote), Sallaumines (304 Tote), Billy-Montigny (114 Tote) und Noyelles-sous-Lens (102 Tote). Die Mine lag zwei Kilometer östlich von Lens im Département Pas-de-Calais."
DNC_Expansion_country.162.a:1 "OK"
