DNC_Expansion_country.76.t:0 "Das Commonwealth-Franchise-Gesetz"
DNC_Expansion_country.76.d:0 "Der Commonwealth Franchise Act in Australien gewährt Frauen in Australien ansässigen britischen Staatsbürgern (mit Ausnahme bestimmter ethnischer Minderheiten) das Wahlrecht bei Bundeswahlen. Damit ist Australien das erste unabhängige Land, das Frauen das Wahlrecht auf nationaler Ebene gewährt und das erste Land, das ihnen erlaubt, für das Parlament zu kandidieren."
DNC_Expansion_country.76.a:1 "Rechte für einen bedeuten Rechte für alle!"
