DNC_Expansion_country.238.t:0 "Mohammad Ali Schah muss abdanken"
DNC_Expansion_country.238.d:0 "Verfassungsbefürwortende Kräfte marschierten unter der Führung von Sardar As&#39;ad, Sepehdar A&#39;zam, Sattar Khan, Bagher Khan und Yeprem Khan aus den persischen Provinzen nach Teheran, stürzten den Schah und setzten die Verfassung wieder in Kraft. Das Parlament stimmte dafür, Mohammad Ali Schahs elfjährigen Sohn Ahmad Schah auf den Thron zu setzen. Mohammad Ali Schah dankte nach der neuen Verfassungsrevolution ab und gilt seitdem als Symbol der Diktatur. Er verließ Persien und ging ins kaiserliche Russland, angeblich um die Unterstützung von Nikolaus II. von Russland bei der Wiedereroberung des Throns zu bitten."
DNC_Expansion_country.238.a:1 "OK"
