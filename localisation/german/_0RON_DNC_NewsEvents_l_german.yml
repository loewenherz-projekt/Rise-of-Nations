DNC_Expansion_news.37.a:1 "Das Ende der viktorianischen Ära"

DNC_Expansion_country.38.t:0 "Beerdigung von Königin Victoria"
DNC_Expansion_country.38.d:0 "Das Staatsbegräbnis von Königin Victoria fand im Februar 1901 statt; 64 Jahre waren seit der letzten Beerdigung eines Monarchen vergangen. Victoria hinterließ strenge Anweisungen bezüglich des Gottesdienstes und der damit verbundenen Zeremonien und führte eine Reihe von Änderungen ein, von denen einige einen Präzedenzfall für seitdem stattgefundene Staatsbegräbnisse darstellten. Erstens missfiel ihr das vorherrschende Schwarz bei Beerdigungen; fortan sollte es keine schwarzen Umhänge, Vorhänge oder Baldachine mehr geben, und Victoria wünschte sich ein weißes Bahrtuch für ihren Sarg. Zweitens äußerte sie den Wunsch, als „Tochter eines Soldaten“ begraben zu werden. Der Trauerzug wurde daher eher zu einem militärischen Zug, an dem Peers, Geheimräte und Richter nicht mehr in großer Zahl teilnahmen. Ihre Sargträger waren Stallmeister und nicht Herzöge (wie es zuvor üblich war), und zum ersten Mal wurde eine Lafette eingesetzt, um den Sarg der Monarchin zu transportieren. Drittens wünschte Victoria, dass es keine öffentliche Aufbahrung geben sollte. Dies bedeutete, dass die einzige Veranstaltung in London zu diesem Anlass eine Lafettenprozession von einem Bahnhof zum anderen war. Victoria war in Osborne House auf der Isle of Wight gestorben, ihr Leichnam wurde per Schiff und Zug zum Bahnhof Waterloo überführt, dann per Lafette zum Bahnhof Paddington und anschließend per Zug nach Windsor, wo die Trauerfeier stattfand."
DNC_Expansion_country.38.a:1 "OK"
DNC_Expansion_news.38.t:0 "Beerdigung von Königin Victoria in der St. George&#39;s Chapel"
DNC_Expansion_news.38.d:0 "Das Staatsbegräbnis von Königin Victoria fand im Februar 1901 statt; 64 Jahre waren seit der letzten Beerdigung eines Monarchen vergangen. Victoria hinterließ strenge Anweisungen bezüglich des Gottesdienstes und der damit verbundenen Zeremonien und führte eine Reihe von Änderungen ein, von denen einige einen Präzedenzfall für seitdem stattgefundene Staatsbegräbnisse darstellten. Erstens missfiel ihr das vorherrschende Schwarz bei Beerdigungen; fortan sollte es keine schwarzen Umhänge, Vorhänge oder Baldachine mehr geben, und Victoria wünschte sich ein weißes Bahrtuch für ihren Sarg. Zweitens äußerte sie den Wunsch, als „Tochter eines Soldaten“ begraben zu werden. Der Trauerzug nahm daher eher einen militärischen Charakter an, da die Peers, Geheimräte und Richter nicht mehr in großer Zahl teilnahmen."
DNC_Expansion_news.38.a:1 "OK"

DNC_Expansion_country.39.t:0 "Der Hay-Pauncefote-Vertrag wurde unterzeichnet"
DNC_Expansion_country.39.d:0 "Der Hay-Pauncefote-Vertrag wird vom Vereinigten Königreich und den Vereinigten Staaten unterzeichnet, wodurch die Kontrolle über den Panamakanal an die Vereinigten Staaten abgetreten wird. Damit erhält dieser strategisch wichtige Kanal, der für Handel und Marine von entscheidender Bedeutung ist, einen neuen Kontrolleur."
