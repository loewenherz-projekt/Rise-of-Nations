DNC_Expansion_country.246.t:0 "Südafrika wird ein Dominion"
DNC_Expansion_country.246.d:0 "Der South Africa Act von 1909 war ein Gesetz des britischen Parlaments, mit dem die Südafrikanischen Union aus den britischen Kolonien Kap der Guten Hoffnung, Natal, Oranje-Flusskolonie und Transvaal gegründet wurde. Das Gesetz sah auch die zukünftige Aufnahme Rhodesiens als fünfte Provinz in die Union vor, doch die rhodesischen Kolonisten lehnten diese Option in einem Referendum von 1922 ab. Der South Africa Act war das dritte wichtige Gesetz des britischen Parlaments mit der Absicht, verschiedene britische Kolonien zu vereinen und ihnen ein gewisses Maß an Autonomie zu gewähren. Zuvor hatte der British North America Act von 1867 drei Kolonien vereint (die Provinz Kanada (die in Ontario und Quebec aufgeteilt wurde), Nova Scotia und New Brunswick) und der Commonwealth of Australia Constitution Act von 1900 die australischen Kolonien."
DNC_Expansion_country.246.a:1 "Akzeptieren"
DNC_Expansion_country.246.b:1 "Direkte Regel fortsetzen"
DNC_Expansion_news.246.t:0 "Südafrika wird ein Dominion"
DNC_Expansion_news.246.d:0 "Der South Africa Act von 1909 war ein Gesetz des britischen Parlaments, mit dem die Südafrikanischen Union aus den britischen Kolonien Kap der Guten Hoffnung, Natal, Oranje-Flusskolonie und Transvaal gegründet wurde. Das Gesetz sah auch die zukünftige Aufnahme Rhodesiens als fünfte Provinz in die Union vor, doch die rhodesischen Kolonisten lehnten diese Option in einem Referendum von 1922 ab. Der South Africa Act war das dritte wichtige Gesetz des britischen Parlaments mit der Absicht, verschiedene britische Kolonien zu vereinen und ihnen ein gewisses Maß an Autonomie zu gewähren. Zuvor hatte der British North America Act von 1867 drei Kolonien vereint (die Provinz Kanada (die in Ontario und Quebec aufgeteilt wurde), Nova Scotia und New Brunswick) und der Commonwealth of Australia Constitution Act von 1900 die australischen Kolonien."
DNC_Expansion_news.246.a:1 "OK"
