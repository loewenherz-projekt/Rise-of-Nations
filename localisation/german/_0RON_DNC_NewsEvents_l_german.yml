DNC_Expansion_news.142.t:0 "Auflösung der norwegisch-schwedischen Union"
DNC_Expansion_news.142.d:0 "Die Auflösung der Union zwischen den Königreichen Norwegen und Schweden unter dem Haus Bernadotte wurde durch einen Beschluss des Stortings eingeleitet. Nach einigen Monaten der Spannungen und der Angst vor einem Kriegsausbruch zwischen den benachbarten Königreichen (damals in Personalunion) – und einer norwegischen Volksabstimmung am 13. August, die mit überwältigender Mehrheit für die Auflösung stimmte – führten Verhandlungen zwischen den beiden Regierungen dazu, dass Schweden Norwegen als unabhängige konstitutionelle Monarchie anerkannte."
DNC_Expansion_news.142.a:1 "OK"

DNC_Expansion_country.143.t:0 "Meuterei im Potemkin"
DNC_Expansion_country.143.d:0 "Die Potemkin war ein neues Schlachtschiff der Schwarzmeerflotte, das 1903 in Dienst gestellt wurde und eine Besatzung von 800 Mann hatte. Es war kein glückliches Schiff, und einige der Besatzungsmitglieder hegten revolutionäre Sympathien, insbesondere ein energischer junger Unteroffizier namens Matjuschenko, der eine führende Rolle bei der Meuterei spielte."
DNC_Expansion_country.143.a:1 "OK"
