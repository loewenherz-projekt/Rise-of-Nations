DNC_Expansion_country.168.t:0 "Der erste Grand Prix wird ausgetragen"
DNC_Expansion_country.168.d:0 "Der Grand Prix de l&#39;Automobile Club de France von 1906 war ein Autorennen, das auf abgesperrten öffentlichen Straßen außerhalb der Stadt Le Mans ausgetragen wurde. Der Grand Prix wurde vom Automobile Club de France auf Anregung der französischen Automobilindustrie als Alternative zu den Gordon-Bennett-Rennen organisiert, bei denen die Teilnehmerzahl jedes teilnehmenden Landes unabhängig von der Größe seiner Industrie begrenzt war. Frankreich hatte zu dieser Zeit die größte Automobilindustrie Europas, und um dies besser widerzuspiegeln, war die Teilnehmerzahl jedes einzelnen Landes beim Grand Prix nicht begrenzt. Der ACF wählte einen 103,18 Kilometer langen Rundkurs, der hauptsächlich aus mit Teer versiegelten Staubpisten bestand und an beiden Tagen von jedem Teilnehmer sechsmal gefahren werden sollte, was einer Gesamtdistanz von 1.238,16 Kilometern entspricht."
DNC_Expansion_country.168.a:1 "OK"
