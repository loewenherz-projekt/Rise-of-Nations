DNC_Expansion_country.137.t:0 "Katastrophe in der Schuhfabrik Grover"
DNC_Expansion_country.137.d:0 "Die Katastrophe der Grover-Schuhfabrik in Brockton, Massachusetts, war eine Industrieexplosion, die mit einem Gebäudeeinsturz und einem Brand einherging. 58 Menschen starben, 150 wurden verletzt. Nach einer Kesselexplosion stürzte das vierstöckige Holzgebäude ein, die Ruinen gingen in Flammen auf. Die in den Trümmern eingeschlossenen Arbeiter verbrannten. Die Grover-Katastrophe lenkte die Aufmerksamkeit erneut auf die Arbeitssicherheit und führte zu strengen Sicherheitsgesetzen und einer nationalen Verordnung zum sicheren Betrieb von Dampfkesseln."
DNC_Expansion_country.137.a:1 "OK"
