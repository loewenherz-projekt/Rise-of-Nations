DNC_Expansion_country.225.t:0 "Stapellauf des Dreadnought-Schlachtschiffs der Minas Geraes-Klasse"
DNC_Expansion_country.225.d:0 "1904 begann Brasilien mit einem großen Schiffsbauprogramm, das auch den Bau dreier kleiner Schlachtschiffe umfasste. Entwurf und Bestellung der Schiffe dauerten zwei Jahre, doch die Pläne wurden verworfen, nachdem das revolutionäre „Dreadnought“-Konzept den brasilianischen Entwurf obsolet machte. Stattdessen wurden zwei Dreadnoughts aus Großbritannien bestellt, womit Brasilien das dritte Land war, das Schiffe dieses Typs im Bau hatte – noch vor traditionellen Mächten wie Deutschland, Frankreich oder Russland. Die Schiffe sorgten daher für große Unsicherheit in den großen Ländern der Welt, von denen viele fälschlicherweise spekulierten, die Schiffe seien eigentlich für eine rivalisierende Nation bestimmt. Auch in Argentinien und Chile lösten sie große Bestürzung aus."
DNC_Expansion_country.225.a:1 "OK"
