DNC_Expansion_country.164.t:0 "Das Erdbeben von San Francisco"
DNC_Expansion_country.164.d:0 "Das Erdbeben von San Francisco erschütterte die Küste Nordkaliforniens um 5:12 Uhr morgens mit einer geschätzten Momentenmagnitude von 7,9 und einer maximalen Mercalli-Intensität von XI (extrem). Starke Erschütterungen waren von Eureka an der Nordküste bis zum Salinas Valley, einer landwirtschaftlichen Region südlich der San Francisco Bay Area, zu spüren. Bald brachen in der Stadt verheerende Brände aus, die mehrere Tage lang wüteten. Mehr als 3.000 Menschen starben. Über 80 % der Stadt San Francisco wurden zerstört."
DNC_Expansion_country.164.a:1 "OK"
