DNC_Expansion_country.176.t:0 "Betrüger übernimmt Rathaus"
DNC_Expansion_country.176.d:0 "Friedrich Wilhelm Voigt ist ein deutscher Hochstapler, der, als preußischer Offizier getarnt, eine Anzahl Soldaten unter seinem „Kommando“ zusammentrieb und über 4.000 Mark aus der Stadtkasse „konfiszierte“. Er hatte Teile gebrauchter Hauptmannsuniformen in verschiedenen Geschäften gekauft und ihre Wirkung an Soldaten getestet. Er holte die Uniform aus der Gepäckaufbewahrung, zog sie an und ging zur örtlichen Kaserne, hielt vier Grenadiere und einen Feldwebel auf ihrem Rückweg an und forderte sie auf, mit ihm zu kommen. Sie wurden indoktriniert, den Offizieren bedingungslos zu gehorchen, und folgten ihm. Er entließ den kommandierenden Feldwebel, um sich bei seinen Vorgesetzten zu melden, und requirierte später sechs weitere Soldaten von einem Schießstand. Dann nahm er einen Zug nach Köpenick östlich von Berlin, besetzte mit seinen Soldaten das dortige Rathaus und befahl ihnen, alle Ausgänge zu sichern. Er befahl der örtlichen Polizei, „für Ruhe und Ordnung zu sorgen“ und „Anrufe nach Berlin für eine Stunde“ auf dem örtlichen Postamt zu verhindern."
DNC_Expansion_country.176.a:1 "Wie dumm."
