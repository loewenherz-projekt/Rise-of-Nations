DNC_Expansion_country.222.t:0 "Die Jungtürken-Revolution endet"
DNC_Expansion_country.222.d:0 "Major Ahmed Niyazi, Ismael Enver, Eyub Sabri und andere Unionisten der Dritten Armee flohen in die Berge, um Guerillagruppen aus Freiwilligen und Deserteuren zu organisieren und gleichzeitig Abdulhamid unter Druck zu setzen, die Verfassung wiederherzustellen. Der schnelle Aufschwung der Unionisten, Intrigen innerhalb des Militärs und die Unzufriedenheit mit Abdulhamids autokratischer Herrschaft sowie der Wunsch nach der Verfassung führten dazu, dass Abdulhamid allein dastand und zur Kapitulation gezwungen war. Abdulhamid II. kapitulierte und verkündete die Wiederherstellung der Verfassung von 1876. Damit begann die Zweite Verfassungsära des Osmanischen Reiches. Wichtig ist, dass die CUP die Regierung nicht stürzte und sich nominell zu demokratischen Idealen und Konstitutionalismus bekannte."
DNC_Expansion_country.222.a:1 "OK"
