DNC_Expansion_country.170.t:0 "Alfred Dreyfus wird entlastet"
DNC_Expansion_country.170.d:0 "Die Spionageabwehr der französischen Armee erfuhr, dass ein hochrangiger Spion Informationen über neue Artillerieteile an die Deutschen weitergab. Alfred Dreyfus wurde kurzerhand in einem geheimen Kriegsgerichtsverfahren verurteilt, öffentlich seines Dienstgrads enthoben und zu lebenslanger Haft verurteilt. Heute jedoch wurde Dreyfus von einer Militärkommission offiziell rehabilitiert. Am Tag nach seiner Rehabilitierung wurde er mit der Beförderung zum Major (Chef d&#39;Escadron) wieder in die Armee aufgenommen. Eine Woche später wurde er zum Ritter der Ehrenlegion ernannt und zum Kommandeur einer Artillerieeinheit in Vincennes ernannt."
DNC_Expansion_country.170.a:1 "OK"
