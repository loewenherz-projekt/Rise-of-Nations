DNC_Expansion_country.167.t:0 "RMS Lusitania wird vom Stapel gelassen"
DNC_Expansion_country.167.d:0 "Heute wurde die RMS Lusitania in Glasgow als größtes Schiff der Welt vom Stapel gelassen. Sie ist ein Kreuzfahrtschiff und zugleich ein Passagierschiff. Sie fährt mit einer beeindruckenden Geschwindigkeit von 25,85 Knoten. Sie gehört zu den Cunard-Linern"
DNC_Expansion_country.167.a:1 "OK"
DNC_Expansion_news.167.t:0 "RMS Lusitania wird vom Stapel gelassen"
