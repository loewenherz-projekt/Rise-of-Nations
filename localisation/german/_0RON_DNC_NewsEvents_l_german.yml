DNC_Expansion_news.98.a:1 "Ein weiterer zum Scheitern verurteilter Versuch, die Freiheit zu erlangen."

DNC_Expansion_country.99.t:0 "Papst Pius X. wird Papst"
DNC_Expansion_country.99.d:0 "Papst Pius X. folgt Papst Leo XIII. als 257. Papst nach. Pius X. ist dafür bekannt, dass er sich energisch gegen modernistische Interpretationen der katholischen Lehre stellt und liturgische Reformen sowie scholastische Philosophie und Theologie fördert."
