DNC_Expansion_country.133.t:0 "Die Schlacht von Mukden"
DNC_Expansion_country.133.d:0 "Nach der Schlacht von Liaoyang zogen sich die russischen Streitkräfte an den Fluss Sha Ho südlich von Mukden zurück und formierten sich neu. Während der Schlacht von Shaho starteten die Russen einen erfolglosen Gegenangriff, konnten den japanischen Vormarsch jedoch vorübergehend verlangsamen. Eine zweite russische Gegenoffensive, die Schlacht von Sandepu, blieb ebenfalls erfolglos."
DNC_Expansion_country.133.a:1 "OK"
DNC_Expansion_news.133.t:0 "Die Schlacht von Mukden"
DNC_Expansion_news.133.d:0 "Nach der Schlacht von Liaoyang zogen sich die russischen Streitkräfte an den Fluss Sha Ho südlich von Mukden zurück und formierten sich neu. Während der Schlacht von Shaho starteten die Russen einen erfolglosen Gegenangriff, konnten den japanischen Vormarsch jedoch vorübergehend verlangsamen. Eine zweite russische Gegenoffensive, die Schlacht von Sandepu, blieb ebenfalls erfolglos."
DNC_Expansion_news.133.a:1 "OK"
