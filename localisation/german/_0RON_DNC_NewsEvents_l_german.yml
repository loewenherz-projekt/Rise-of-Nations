DNC_Expansion_country.67.t:0 "Schlacht von Tweebosch"
DNC_Expansion_country.67.d:0 "Koos De la Rey überfiel Methuens Kolonne bei Tweebosch am Little Harts River. Die britische Truppe zählte 1250 Mann, darunter fast 1000 berittene Männer und vier Geschütze. Methuens Truppe bestand größtenteils aus unerfahrenen Soldaten; diese gerieten in Panik und flohen oder ergaben sich. Nur die britischen Berufssoldaten in der Kolonne kämpften hartnäckig in den Kämpfen, die vom Morgengrauen bis 9:30 Uhr dauerten. Die Briten verloren 200 Mann an Toten und Verwundeten, 600 Mann und erbeuteten alle vier Geschütze. Methuen wurde zweimal verwundet und erlitt einen Beinbruch, als sein Pferd auf ihn stürzte. Er wurde gefangen genommen. Bislang ist er der einzige General, der während des Krieges von den Buren gefangen genommen wurde."
DNC_Expansion_country.67.a:1 "OK"
