DNC_Expansion_news.194.a:1 "OK"

DNC_Expansion_country.195.t:0 "Irische Kronjuwelen gestohlen"
DNC_Expansion_country.195.d:0 "1903 wurden die Büros des Ulster King of Arms innerhalb des Dublin Castle-Komplexes vom Bermingham Tower in den Bedford Tower oder Clock Tower verlegt. Die Juwelen wurden in einen neuen Safe gebracht, der im neu errichteten Tresorraum untergebracht werden sollte. Der neue Safe war zu groß für die Türöffnung des Tresorraums, und Sir Arthur Vicars, der Ulster King of Arms, lagerte ihn stattdessen in seinem Büro. Sieben Schlüssel zur Tür des Office of Arms befanden sich im Besitz von Vicars und seinen Mitarbeitern, und zwei Schlüssel zum Safe mit den Insignien befanden sich in der Obhut von Vicars. Heute gelten diese Juwelen als vermisst."
DNC_Expansion_country.195.a:1 "OK"
