DNC_Expansion_country.119.t:0 "Der große Brand von Toronto"
DNC_Expansion_country.119.d:0 "Der Große Brand von Toronto im Jahr 1904 war ein Großbrand, der am 19. April 1904 einen großen Teil der Innenstadt von Toronto, Ontario, Kanada, zerstörte. Es war der zweite Brand dieser Art in der Geschichte der Stadt."
DNC_Expansion_country.119.a:1 "Eine Tragödie."
