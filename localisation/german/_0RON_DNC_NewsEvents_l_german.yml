DNC_Expansion_country.23.t:0 "Reichstag verabschiedet neue deutsche Marinegesetze"
DNC_Expansion_country.23.d:0 "Heute hat der Reichstag das zweite deutsche Flottengesetz verabschiedet, das eine Erweiterung der Kaiserlichen Marine ermöglicht. Dies geschah als Reaktion darauf, dass britische Kreuzer auf Patrouille drei deutsche Postdampfer vor der Küste Afrikas festhielten und durchsuchten, da sie verdächtigt wurden, Material für die Buren zu transportieren."
DNC_Expansion_country.23.a:1 "OK"
