DNC_Expansion_country.236.t:0 "Abdul Hamid II. wird gestürzt"
DNC_Expansion_country.236.d:0 "Eine Gruppe von Menschen, die mit Abdülhamids Herrschaft unzufrieden waren und die Ersetzung der Monarchie durch eine konstitutionelle Regierung forderten, startete in Istanbul einen Aufstand. Der blutige Aufstand dauerte elf Tage. Abdülhamid II. wurde am 27. April 1909 nach 33-jähriger Herrschaft abgesetzt und durch seinen jüngeren Bruder Mehmed V. ersetzt. In derselben Nacht, in der er entthront wurde, wurde er zusammen mit 38 Menschen, darunter auch seine Familienmitglieder, nach Thessaloniki im heutigen Griechenland geschickt."
DNC_Expansion_country.236.a:1 "OK"
