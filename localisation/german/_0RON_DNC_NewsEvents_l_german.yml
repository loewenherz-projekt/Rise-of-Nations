DNC_Expansion_country.210.t:0 "Thomas W. Lawson zerstört"
DNC_Expansion_country.210.d:0 "Die Thomas W. Lawson war ein siebenmastiger Schoner mit Stahlrumpf, der für den Pazifikhandel gebaut wurde, aber hauptsächlich zum Transport von Kohle und Öl entlang der Ostküste der Vereinigten Staaten eingesetzt wurde. Benannt nach dem Kupferbaron Thomas W. Lawson, einem Bostoner Millionär, Börsenmakler, Buchautor und Präsidenten der Boston Bay State Gas Co., lief sie 1902 als größter Schoner und größtes Segelschiff ohne Hilfsmotor vom Stapel, das je gebaut wurde. Die Thomas W. Lawson wurde am 14. Dezember 1907 in einem Sturm vor der unbewohnten Insel Annet auf den Scilly-Inseln zerstört. Bis auf zwei Mann der achtzehnköpfigen Besatzung und einen bereits an Bord befindlichen Hafenlotsen kamen alle ums Leben. Ihre Ladung von 58.000 Barrel leichtem Paraffinöl verursachte eine große Ölpest."
DNC_Expansion_country.210.a:1 "OK"
DNC_Expansion_news.210.t:0 "Thomas W. Lawson zerstört"
DNC_Expansion_news.210.d:0 "Die Thomas W. Lawson war ein siebenmastiger Schoner mit Stahlrumpf, der für den Pazifikhandel gebaut wurde, aber hauptsächlich zum Transport von Kohle und Öl entlang der Ostküste der Vereinigten Staaten eingesetzt wurde. Benannt nach dem Kupferbaron Thomas W. Lawson, einem Bostoner Millionär, Börsenmakler, Buchautor und Präsidenten der Boston Bay State Gas Co., lief sie 1902 als größter Schoner und größtes Segelschiff ohne Hilfsmotor vom Stapel, das je gebaut wurde. Die Thomas W. Lawson wurde am 14. Dezember 1907 in einem Sturm vor der unbewohnten Insel Annet auf den Scilly-Inseln zerstört. Bis auf zwei Mann kamen alle 18 Besatzungsmitglieder und ein bereits an Bord befindlicher Hafenlotse ums Leben. Ihre Ladung von 58.000 Barrel leichtem Paraffinöl verursachte eine große Ölpest."
DNC_Expansion_news.210.a:1 "OK"

DNC_Expansion_country.211.t:0 "Massaker an der Schule Santa María"
DNC_Expansion_country.211.d:0 "Das Massaker an der Santa-María-Schule ist ein Massaker an streikenden Arbeitern, hauptsächlich Bergleuten von Salpeter- (Nitrat-)Bergleuten, sowie deren Frauen und Kindern. Es wurde heute von der chilenischen Armee im chilenischen Iquique verübt. Die Zahl der Opfer ist nicht genau bekannt, wird aber auf über 2.000 geschätzt. Das Massaker ereignete sich auf dem Höhepunkt des Nitratbergbaus. Ort des Massakers war die Domingo-Santa-María-Schule, wo Tausende Bergleute aus verschiedenen Nitratminen im hohen Norden Chiles eine Woche lang kampiert hatten, nachdem sie in der Regionalhauptstadt Iquique zusammengekommen waren, um von der Regierung ein Eingreifen zur Verbesserung ihrer Lebens- und Arbeitsbedingungen zu fordern. Innenminister Rafael Sotomayor Gaete beschloss, den Streik niederzuschlagen, notfalls durch einen Armeeangriff."
DNC_Expansion_country.211.a:1 "OK"
