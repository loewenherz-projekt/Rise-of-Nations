ron_diplomatic_news.1.t:0 "Allianz der Acht Nationen aufgelöst"
ron_diplomatic_news.1.d:0 "Nach der Niederschlagung des Boxeraufstands scheint es keinen weiteren Bedarf für ein so großes Militärbündnis zu geben."
ron_diplomatic_news.1.a:0 "OK"

dnctree.20.title:0 "Die Entente"
dnctree.20.desc:0 "Die Triple Entente bezeichnet die informelle Verständigung zwischen dem Russischen Reich, der Dritten Französischen Republik und Großbritannien. Sie baute auf dem französisch-russischen Bündnis von 1894, der Entente Cordiale zwischen Paris und London von 1904 und der englisch-russischen Entente von 1907 auf. Sie bildete ein mächtiges Gegengewicht zum Dreibund zwischen Deutschland, Österreich-Ungarn und Italien. Im Gegensatz zum Dreibund oder dem französisch-russischen Bündnis selbst war die Triple Entente kein Bündnis der gegenseitigen Verteidigung."
dnctree.20.a:0 "Erstellen Sie die Fraktion"
dnctree.20.b:0 "Wir brauchen keine Verbündeten"
dnctree.21.title:0 "Die Mittelmächte"
dnctree.21.desc:0 "Die Mittelmächte, auch Mittelreiche genannt, waren eine der beiden wichtigsten Koalitionen im Ersten Weltkrieg (1914–18). Sie bestanden aus Deutschland, Österreich-Ungarn, dem Osmanischen Reich und Bulgarien; daher wird sie auch als Quadrupelallianz bezeichnet."
dnctree.21.a:0 "Erstellen Sie die Fraktion"
dnctree.21.b:0 "Wir brauchen keine Verbündeten"
dnctree.24.title:0 "Die Komintern"
dnctree.24.desc:0 "Die Kommunistische Internationale (Komintern), auch Dritte Internationale genannt (1919–1943), war eine internationale Organisation, die den Weltkommunismus propagierte. Sie wurde von der Sowjetunion kontrolliert. Auf ihrem Zweiten Kongress beschloss die Komintern, „mit allen verfügbaren Mitteln, einschließlich Waffengewalt, für den Sturz der internationalen Bourgeoisie und die Schaffung einer internationalen Sowjetrepublik als Übergangsstadium zur vollständigen Abschaffung des Staates zu kämpfen“. Der Komintern ging die Auflösung der Zweiten Internationale im Jahr 1916 voraus."
dnctree.24.a:0 "Erstellen Sie die Fraktion"
dnctree.24.b:0 "Wir brauchen keine Verbündeten"
dnctree.25.title:0 "Die Weiße Bewegung"
dnctree.25.desc:0 "Die Weiße Bewegung und ihr militärischer Arm, die Weiße Armee, die Weißgardisten oder einfach die Weißen, waren ein loser Zusammenschluss antikommunistischer Kräfte, die im russischen Bürgerkrieg gegen die kommunistischen Bolschewiken, auch als die Roten bekannt, kämpften und in geringerem Maße bis etwa zum Zweiten Weltkrieg als militarisierte Vereinigungen von Aufständischen sowohl außerhalb als auch innerhalb der russischen Grenzen in Sibirien weiter operierten."
dnctree.25.a:0 "Erstellen Sie die Fraktion"
dnctree.25.b:0 "Wir brauchen keine Verbündeten"

dnctree.26.title:0 "Der Vertrag von Warschau"
dnctree.26.desc:0 "Der Vertrag von Warschau (auch Polnisch-Ukrainisches Bündnis oder Petljura-Piłsudski-Abkommen) vom April 1920 war ein militärisch-wirtschaftliches Bündnis zwischen der Zweiten Polnischen Republik, vertreten durch Józef Piłsudski, und der Ukrainischen Volksrepublik, vertreten durch Symon Petljura, gegen das bolschewistische Russland. Der Vertrag wurde am 21. April 1920 unterzeichnet, am 24. April wurde ein militärischer Nachtrag hinzugefügt."
dnctree.26.a:0 "Erstellen Sie die Fraktion"
dnctree.26.b:0 "Wir brauchen keine Verbündeten"

dnctree.27.title:0 "Das Britische Empire"
dnctree.27.desc:0 "Das Britische Empire bestand aus den Dominions, Kolonien, Protektoraten, Mandatsgebieten und anderen Territorien, die vom Vereinigten Königreich und seinen Vorgängerstaaten regiert oder verwaltet wurden. Es begann mit den überseeischen Besitzungen und Handelsposten, die England zwischen dem späten 16. und frühen 18. Jahrhundert errichtete. Auf seinem Höhepunkt war es das größte Reich der Geschichte und über ein Jahrhundert lang die führende Weltmacht. 1913 herrschte das Britische Empire über 412 Millionen Menschen, 23 % der damaligen Weltbevölkerung, und 1925 umfasste es 35 Millionen km² (13,5 Millionen Quadratmeilen), 24 % der gesamten Landfläche der Erde. Daher ist sein verfassungsmäßiges, rechtliches, sprachliches und kulturelles Erbe weit verbreitet. Auf dem Höhepunkt seiner Macht wurde es als „das Reich, in dem die Sonne niemals untergeht“ beschrieben, da die Sonne stets auf mindestens eines seiner Gebiete schien."
dnctree.27.a:0 "Erstellen Sie die Fraktion"
dnctree.27.b:0 "Wir brauchen keine Verbündeten"

dnctree.28.title:0 "Die Französische Republik"
dnctree.28.desc:0 "Das französische Kolonialreich umfasste die überseeischen Kolonien, Protektorate und Mandatsgebiete, die ab dem 16. Jahrhundert unter französische Herrschaft kamen. Man unterscheidet im Allgemeinen zwischen dem „Ersten Französischen Kolonialreich“, das bis 1814 existierte und zu diesem Zeitpunkt größtenteils verloren gegangen oder verkauft war, und dem „Zweiten Französischen Kolonialreich“, das mit der Eroberung Algiers 1830 begann. Auf seinem Höhepunkt war das Zweite Französische Kolonialreich eines der größten Reiche der Geschichte. Einschließlich des französischen Mutterlandes erreichte die Gesamtfläche unter französischer Souveränität im Jahr 1920 11.500.000 km² (4.400.000 Quadratmeilen), mit einer Bevölkerung von 110 Millionen Menschen im Jahr 1936."
dnctree.28.a:0 "Erstellen Sie die Fraktion"
dnctree.28.b:0 "Wir brauchen keine Verbündeten"

dnctree.32.title:0 "Alliierten"
dnctree.32.desc:0 "Die Alliierten des Zweiten Weltkriegs waren die Länder, die sich während des Zweiten Weltkriegs gemeinsam den Achsenmächten entgegenstellten. Die Alliierten förderten das Bündnis als Mittel zur Abwehr der deutschen, japanischen und italienischen Aggression."
dnctree.32.a:0 "Erstellen Sie die Fraktion"
dnctree.32.b:0 "Wir brauchen keine Verbündeten"

dnctree.34.title:0 "NATO"
dnctree.34.desc:0 "Die Nordatlantikpakt-Organisation (NATO), auch Nordatlantische Allianz genannt, ist ein zwischenstaatliches Militärbündnis zwischen 30 europäischen und nordamerikanischen Staaten. Die Organisation setzt den am 4. April 1949 unterzeichneten Nordatlantikvertrag um. Die NATO ist ein System der kollektiven Verteidigung, in dem sich ihre unabhängigen Mitgliedstaaten im Falle eines Angriffs durch eine externe Partei zur gegenseitigen Verteidigung verpflichten. Das NATO-Hauptquartier befindet sich in Evere bei Brüssel, Belgien, während sich das Hauptquartier des Allied Command Operations in der Nähe von Mons, Belgien, befindet."
dnctree.34.a:0 "Erstellen Sie die Fraktion"
dnctree.34.b:0 "Wir brauchen keine Verbündeten"

dnctree.35.title:0 "Der Warschauer Pakt"
dnctree.35.desc:0 "Die Organisation des Warschauer Pakts (WTO), offiziell der Vertrag über Freundschaft, Zusammenarbeit und gegenseitigen Beistand, allgemein bekannt als Warschauer Pakt (WP), war ein kollektiver Verteidigungsvertrag, der im Mai 1955 während des Kalten Krieges in Warschau zwischen der Sowjetunion und sieben weiteren sozialistischen Ostblockrepubliken Mittel- und Osteuropas unterzeichnet wurde. Der Warschauer Pakt war die militärische Ergänzung des Rates für gegenseitige Wirtschaftshilfe (CoMEcon), der regionalen Wirtschaftsorganisation der sozialistischen Staaten Mittel- und Osteuropas. Der Warschauer Pakt wurde als Reaktion auf die Integration Westdeutschlands in die NATO im Jahr 1955 im Rahmen der Londoner und Pariser Konferenzen von 1954 gegründet. Es wird aber auch angenommen, dass seine Gründung durch das sowjetische Bestreben motiviert war, die Kontrolle über die Streitkräfte in Mittel- und Osteuropa zu behalten."
dnctree.35.a:0 "Erstellen Sie die Fraktion"
dnctree.35.b:0 "Wir brauchen keine Verbündeten"

dnctree.36.title:0 "Großostasiatische Wohlstandssphäre"
dnctree.36.desc:0 "Die Großostasiatische Wohlstandssphäre (GEACPS) war ein imperialistisches Konzept, das im Japanischen Kaiserreich entwickelt und von 1931 bis 1945 unter den von ihm besetzten asiatischen Völkern verbreitet wurde. Sie erstreckte sich über den gesamten asiatisch-pazifischen Raum und förderte die kulturelle und wirtschaftliche Einheit der Ostasiaten, Südostasiaten, Südasiaten und Ozeanier. Sie erklärte auch die Absicht, einen autarken Block asiatischer Nationen unter japanischer Führung zu schaffen, der frei von der Herrschaft westlicher Mächte wäre. Die Idee wurde in einer Radioansprache mit dem Titel „Die internationale Lage und Japans Position“ verkündet, die Außenminister Hachirō Arita am 29. Juni 1940 hielt."
dnctree.36.a:0 "Erstellen Sie die Fraktion"
dnctree.36.b:0 "Wir brauchen keine Verbündeten"

dnctree.37.title:0 "Organisation des Vertrags über kollektive Sicherheit"
dnctree.37.desc:0 "Die Organisation des Vertrags über kollektive Sicherheit (OStA) ist ein zwischenstaatliches Militärbündnis in Eurasien, das aus ausgewählten postsowjetischen Staaten besteht. Der Vertrag geht auf die sowjetischen Streitkräfte zurück, die schrittweise durch die Vereinigten Streitkräfte der Gemeinschaft Unabhängiger Staaten (GUS) ersetzt wurden. Am 15. Mai 1992 unterzeichneten jedoch sechs postsowjetische Staaten der GUS – Russland, Armenien, Kasachstan, Kirgisistan, Tadschikistan und Usbekistan – den Vertrag über kollektive Sicherheit (auch „Taschkent-Pakt“ oder „Taschkent-Vertrag“ genannt). Drei weitere postsowjetische Staaten – Aserbaidschan, Weißrussland und Georgien – unterzeichneten im darauffolgenden Jahr, und der Vertrag trat 1994 in Kraft. Fünf Jahre später einigten sich sechs der neun – alle außer Aserbaidschan, Georgien und Usbekistan – auf eine Verlängerung des Vertrags um weitere fünf Jahre, und 2002 einigten sich diese sechs darauf, die Organisation des Vertrags über kollektive Sicherheit (OStA) als Militärbündnis zu gründen."
dnctree.37.a:0 "Erstellen Sie die Fraktion"
dnctree.37.b:0 "Wir brauchen keine Verbündeten"

dnctree.38.title:0 "Halbinsel-Schildtruppe"
dnctree.38.desc:0 "Die Peninsula Shield Force ist der militärische Teil des Kooperationsrates der Arabischen Golfstaaten (auch bekannt als Golf-Kooperationsrat oder GCC). Sie soll militärische Aggressionen gegen die Mitgliedsländer des GCC abschrecken und darauf reagieren: Bahrain, Kuwait, Oman, Katar, Saudi-Arabien und die Vereinigten Arabischen Emirate."
dnctree.38.a:0 "Erstellen Sie die Fraktion"
dnctree.38.b:0 "Wir brauchen keine Verbündeten"

dnctree.39.title:0 "Den Warschauer Pakt auflösen"
dnctree.39.desc:0 "Die Organisation des Warschauer Pakts (WTO), offiziell der Vertrag über Freundschaft, Zusammenarbeit und gegenseitigen Beistand, allgemein bekannt als Warschauer Pakt (WP), war ein kollektiver Verteidigungsvertrag, der im Mai 1955 während des Kalten Krieges in Warschau zwischen der Sowjetunion und sieben weiteren sozialistischen Ostblockrepubliken Mittel- und Osteuropas unterzeichnet wurde. Der Warschauer Pakt war die militärische Ergänzung des Rates für gegenseitige Wirtschaftshilfe (CoMEcon), der regionalen Wirtschaftsorganisation der sozialistischen Staaten Mittel- und Osteuropas. Der Warschauer Pakt wurde als Reaktion auf die Integration Westdeutschlands in die NATO im Jahr 1955 im Rahmen der Londoner und Pariser Konferenzen von 1954 gegründet. Es wird aber auch angenommen, dass seine Gründung durch das sowjetische Bestreben motiviert war, die Kontrolle über die Streitkräfte in Mittel- und Osteuropa zu behalten."
dnctree.39.a:0 "Löse es auf"
dnctree.39.b:0 "Bewahren Sie den Warschauer Pakt"

dnctree.40.title:0 "Gründung einer Allianz aus acht Nationen"
dnctree.40.desc:0 "Die Acht-Nationen-Allianz war eine multinationale Militärkoalition, die 1900 in Nordchina einmarschierte, um die ausländischen Gesandtschaften in Peking zu entlasten. Diese wurden von der populären Boxermiliz belagert, die entschlossen war, ausländischen Einfluss auszumerzen, und von Regierungstruppen, die China verteidigen wollten. Die alliierten Streitkräfte bestanden aus etwa 45.000 Soldaten aus den acht Nationen Deutschland, Japan, Russland, Großbritannien, Frankreich, den Vereinigten Staaten, Italien und Österreich-Ungarn. Weder die Chinesen noch die ausländischen Verbündeten gaben eine formelle Kriegserklärung ab, und weder ein Vertrag noch eine formelle Vereinbarung band die Allianz zusammen. Westliche Historiker revidierten die Geschichte und definierten die erste Phase der Feindseligkeiten als im August 1900 begonnen und „mehr oder weniger als Bürgerkrieg“ bezeichnet, obwohl die Schlacht um die Taku-Festungen (1900), die im Juni stattfand, die Qing-Regierung dazu veranlasste, die Boxer zu unterstützen. Mit dem Erfolg der Invasion entwickelten sich die späteren Phasen zu einer Strafexpedition, die Peking und Nordchina über ein Jahr lang plünderte. Die Kämpfe endeten mit der Unterzeichnung des Boxerprotokolls."
dnctree.40.a:0 "Erstellen Sie die Fraktion"
dnctree.40.b:0 "Wir brauchen keine Verbündeten"

dnctree.46.title:0 "Großgermanischer Einheitspakt"
dnctree.46.desc:0 "Der Großgermanische Einheitspakt, international auch als Einheitspakt bekannt, ist ein militärisches und wirtschaftliches Bündnis, das aus Marionetten, Klienten und Verbündeten des Großgermanischen Reiches besteht. Hauptziel des Einheitspakts ist es, Deutschlands Einflussbereich zu erhalten und gleichzeitig die Expansion rivalisierender Fraktionen zu verhindern. Die Mitglieder des Einheitspakts treiben Handel mit anderen Mitgliedern und neutralen Nationen."
dnctree.46.a:0 "Erstellen Sie die Fraktion"
dnctree.46.b:0 "Wir brauchen keine Verbündeten"

dnctree.47.title:0 "Römischer Pakt"
dnctree.47.desc:0 "Der Römische Pakt ist eine Allianz in Europa, dem Nahen Osten und Nordafrika. Er besteht hauptsächlich aus den unabhängigen Staaten Griechenland, Bulgarien, Italien und Spanien sowie deren Vasallenstaaten, Marionettenstaaten und Territorien. Hauptziel des Bündnisses ist es, deutsche Aggressionen zu verhindern und die Überlebenschancen der Mitglieder im Falle einer solchen Aggression zu maximieren. Der Pakt betreibt Handel mit neutralen Staaten, der Organisation Freier Nationen (OFRE) und der Großostasiatischen Wohlstandssphäre."
dnctree.47.a:0 "Erstellen Sie die Fraktion"
dnctree.47.b:0 "Wir brauchen keine Verbündeten"

dnctree.48.title:0 "Achsenmächte"
dnctree.48.desc:0 "Die Achsenmächte, ursprünglich Achse Rom–Berlin genannt, waren eine Militärkoalition, die den Zweiten Weltkrieg auslöste und gegen die Alliierten kämpfte. Ihre wichtigsten Mitglieder waren Nazideutschland, das Königreich Italien und das Kaiserreich Japan. Die Achsenmächte waren sich in ihrer Opposition gegen die Alliierten einig, ansonsten fehlte es ihnen jedoch an vergleichbarer Koordination und ideologischem Zusammenhalt. Die Achse entstand Mitte der 1930er Jahre aus aufeinanderfolgenden diplomatischen Bemühungen Deutschlands, Italiens und Japans, ihre eigenen spezifischen Expansionsinteressen zu sichern. Der erste Schritt war das im Oktober 1936 von Deutschland und Italien unterzeichnete Protokoll, nach dem der italienische Staatschef Benito Mussolini erklärte, dass alle anderen europäischen Länder fortan auf der Achse Rom–Berlin rotieren würden, womit der Begriff „Achse“ geprägt wurde. Im darauffolgenden November wurde der Antikominternpakt ratifiziert, ein antikommunistischer Vertrag zwischen Deutschland und Japan. Italien trat dem Pakt 1937 bei, Ungarn und Spanien folgten 1939. Die Achse Rom-Berlin wurde 1939 im Rahmen des sogenannten Stahlpakts zu einem Militärbündnis. Der Dreimächtepakt von 1940 integrierte die militärischen Ziele Deutschlands, Italiens und Japans formell. Später folgten weitere Nationen. Die drei Pakte bildeten die Grundlage des Achsenbündnisses."
dnctree.48.a:0 "Erstellen Sie die Fraktion"
dnctree.48.b:0 "Wir brauchen keine Verbündeten"

ron_diplomatic.41.t:0 "Philippinisch-Amerikanischer Krieg"
ron_diplomatic.41.d:0 "Der Philippinisch-Amerikanische Krieg, auch Philippinisch-Amerikanischer Krieg, Philippinischer Krieg und früher Philippinischer Aufstand oder Tagalog-Aufstand genannt, war ein bewaffneter Konflikt zwischen der Ersten Philippinischen Republik und den Vereinigten Staaten, der vom 4. Februar 1899 bis zum 2. Juli 1902 dauerte. Während philippinische Nationalisten den Konflikt als Fortsetzung des Unabhängigkeitskampfes betrachteten, der 1896 mit der Philippinischen Revolution begonnen hatte, betrachtete die US-Regierung ihn als Aufstand. Der Konflikt entstand, als die Erste Philippinische Republik Einwände gegen die Bedingungen des Vertrags von Paris erhob, unter dem die Vereinigten Staaten die Philippinen von Spanien übernahmen und damit den Spanisch-Amerikanischen Krieg beendeten."
ron_diplomatic.41.a:1 "Anhängen"
ron_diplomatic.41.b:1 "Gewähren Sie ihnen Unabhängigkeit"
ron_diplomatic.41.c:1 "Staatlichkeit vorschlagen"
ron_decolonizationnews.8.t:0 "Philippinisch-Amerikanischer Krieg"
ron_decolonizationnews.8.d:0 "Der Philippinisch-Amerikanische Krieg, auch Philippinisch-Amerikanischer Krieg, Philippinischer Krieg und früher Philippinischer Aufstand oder Tagalog-Aufstand genannt, war ein bewaffneter Konflikt zwischen der Ersten Philippinischen Republik und den Vereinigten Staaten, der vom 4. Februar 1899 bis zum 2. Juli 1902 dauerte. Während philippinische Nationalisten den Konflikt als Fortsetzung des Unabhängigkeitskampfes betrachteten, der 1896 mit der Philippinischen Revolution begonnen hatte, betrachtete ihn die US-Regierung als Aufstand. Der Konflikt entstand, als die Erste Philippinische Republik Einwände gegen die Bedingungen des Vertrags von Paris erhob, unter dem die Vereinigten Staaten die Philippinen von Spanien in Besitz nahmen und damit den Spanisch-Amerikanischen Krieg beendeten."
ron_decolonizationnews.8.a:1 "Amerikanischer Imperialismus"

