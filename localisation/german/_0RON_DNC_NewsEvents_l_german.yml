DNC_Expansion_news.195.a:1 "OK"

DNC_Expansion_country.196.t:0 "SS Columbia sinkt"
DNC_Expansion_country.196.d:0 "Die Columbia verließ San Francisco, Kalifornien, mit 251 Passagieren und Besatzungsmitgliedern unter der Führung von Kapitän Peter Doran in Richtung Portland, Oregon. Als es Abend wurde, verhüllte sich die Columbia etwa 19 Kilometer vor Shelter Cove in Nebel, doch Kapitän Doran weigerte sich, die Geschwindigkeit des Schiffes zu drosseln. Obwohl in der Nähe das Pfeifen des Dampfschoners San Pedro zu hören war, drosseltten weder Doran noch der Erste Offizier Hendricksen der San Pedro die Geschwindigkeit der beiden Schiffe. Inzwischen hatten sich viele Passagiere wegen Seekrankheit aufgrund der rollenden Wellen in ihre Kabinen zurückgezogen. Fünfzehn Minuten später wurde die San Pedro gesichtet, die direkt auf die Columbia zusteuerte. Doran befahl schließlich, den Rückwärtsgang einzulegen, doch es war zu spät."
DNC_Expansion_country.196.a:1 "OK"
