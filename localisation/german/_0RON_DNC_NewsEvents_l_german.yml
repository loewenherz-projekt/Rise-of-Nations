DNC_Expansion_country.85.t:0 "Venezuela-Krise"
DNC_Expansion_country.85.d:0 "Großbritannien, Deutschland und Italien halten eine Seeblockade gegen Venezuela aufrecht, um die Eintreibung ausstehender finanzieller Forderungen zu erzwingen. Dies führt zur Entwicklung des Roosevelt-Korollars zur Monroe-Doktrin."
DNC_Expansion_country.85.a:1 "OK"
