DNC_Expansion_country.103.t:0 "Hay-Bunau-Varilla-Vertrag unterzeichnet"
DNC_Expansion_country.103.d:0 "Hay-Bunau-Varilla-Vertrag, Abkommen zwischen den Vereinigten Staaten und Panama, das den Vereinigten Staaten exklusive Kanalrechte über den Isthmus von Panama im Austausch für finanzielle Entschädigungen und Schutzgarantien für die neu gegründete Republik gewährte. Die Vereinigten Staaten hatten Kolumbien, das damals Panama kontrollierte, im Hay-Herrán-Vertrag ähnliche Bedingungen angeboten, die jedoch von der kolumbianischen Regierung als Verstoß gegen ihre nationale Souveränität abgelehnt wurden und weil sie die Entschädigung für unzureichend hielt"
DNC_Expansion_country.103.a:1 "OK"
DNC_Expansion_news.103.t:0 "Hay-Bunau-Varilla-Vertrag unterzeichnet"
DNC_Expansion_news.103.d:0 "Hay-Bunau-Varilla-Vertrag, Abkommen zwischen den Vereinigten Staaten und Panama, das den Vereinigten Staaten exklusive Kanalrechte über den Isthmus von Panama im Austausch für finanzielle Entschädigungen und Schutzgarantien für die neu gegründete Republik gewährte. Die Vereinigten Staaten hatten Kolumbien, das damals Panama kontrollierte, im Hay-Herrán-Vertrag ähnliche Bedingungen angeboten, die jedoch von der kolumbianischen Regierung als Verstoß gegen ihre nationale Souveränität abgelehnt wurden und weil sie die Entschädigung für unzureichend hielt"
DNC_Expansion_news.103.a:1 "OK"
ron_diplomatic.70.t:0 "Fordern Sie den Kanal"
ron_diplomatic.70.d:0 "Nachdem die neue panamaische Regierung die Unabhängigkeit Panamas unterstützt hat (im Austausch für die Rechte am Panamakanal), muss sie nun ihr Versprechen einhalten. Andernfalls werden die Konsequenzen für sie verheerend sein."
ron_diplomatic.70.a:1 "Sie müssen akzeptieren!"
ron_diplomatic.71.t:0 "USA fordern Panamakanal"
ron_diplomatic.71.d:0 "Wir hatten mit den Vereinigten Staaten ein Abkommen geschlossen, das ihnen exklusive Kanalrechte über die Landenge von Panama gewährte. Im Gegenzug erhielten sie eine finanzielle Entschädigung und Schutzgarantien für die neu gegründete Republik. Jetzt ist die Zeit gekommen, und wir müssen ihnen den Kanal überlassen."
ron_diplomatic.71.a:1 "Wir müssen unser Versprechen halten."

DNC_Expansion_country.104.t:0 "Schiffbruch der SS Petriana vor der Küste Australiens"
DNC_Expansion_country.104.d:0 "Heute erlitt die SS Petriana Schiffbruch und verursachte die erste große Ölpest der Welt. Sie lief auf ein Riff nahe Point Nepean, Victoria, außerhalb der Port Phillip Bay auf. Das Schiff wurde daraufhin aufgegeben, allerdings zuvor wurde die Ladung im Rahmen der Rettungsmaßnahmen freigegeben. Dies verursachte Australiens erste große Ölpest. Es bleibt abzuwarten, was die Länder weltweit tun werden, um eine erneute Ölpest zu verhindern."
DNC_Expansion_country.104.a:1 "Unglücklich"
