ron_diplomatic.123.t:0 "[From.GetName] schlägt Nichtangriffspakt vor"
ron_diplomatic.123.d:0 "Ein Nichtangriffspakt oder Neutralitätspakt ist ein Vertrag zwischen zwei oder mehreren Staaten/Ländern, der das Versprechen der Unterzeichner beinhaltet, keine militärischen Aktionen gegeneinander durchzuführen. Solche Verträge können auch andere Bezeichnungen haben, z. B. Freundschafts- oder Nichtkriegsabkommen usw."
