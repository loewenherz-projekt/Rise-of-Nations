DNC_Expansion_country.16.t:0 "Belagerung von Mafeking beendet"
DNC_Expansion_country.16.d:0 "Die Belagerung von Mafeking war eine 217-tägige Belagerungsschlacht um die Stadt Mafeking in Südafrika. Die Befreiung von Mafeking hatte kaum strategische Bedeutung, stärkte jedoch die britische Moral enorm. Die Belagerung erregte große Aufmerksamkeit, da sich Lord Edward Cecil, der Sohn des britischen Premierministers, und Lady Sarah Wilson, eine Tochter des Herzogs von Marlborough, in der belagerten Stadt aufhielten. "
