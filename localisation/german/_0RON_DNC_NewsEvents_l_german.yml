DNC_Expansion_country.65.t:0 "Berliner U-Bahn eröffnet"
DNC_Expansion_country.65.d:0 "Die heute eröffnete U-Bahn bedient 175 Stationen auf neun Linien mit einer Gesamtstreckenlänge von 151,7 Kilometern, von denen etwa 80 % unterirdisch verlaufen. Die Züge fahren während der Stoßzeiten alle zwei bis fünf Minuten, tagsüber alle fünf Minuten und abends alle zehn Minuten. Im Laufe eines Jahres legen die U-Bahn-Züge 132 Millionen Kilometer zurück und befördern über 400 Millionen Fahrgäste. Das gesamte System wird von den Berliner Verkehrsbetrieben (BVG) betrieben und gewartet."
DNC_Expansion_country.65.a:1 "OK"
