DNC_Expansion_country.240.t:0 "Tragische Woche in Barcelona"
DNC_Expansion_country.240.d:0 "Die Tragische Woche war eine Reihe gewalttätiger Auseinandersetzungen zwischen der spanischen Armee und Anarchisten, Sozialisten und Republikanern in Barcelona und anderen Städten Kataloniens. Auslöser war die Einberufung von Reservetruppen durch Premierminister Antonio Maura als Verstärkung, als Spanien im sogenannten Zweiten Rifkrieg seine militärisch-kolonialen Aktivitäten in Marokko wieder aufnahm. Viele dieser Reservisten waren die einzigen Ernährer ihrer Familien, während die Wohlhabenden Ersatztruppen anheuern konnten."
