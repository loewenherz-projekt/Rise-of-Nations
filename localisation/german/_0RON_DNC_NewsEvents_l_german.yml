DNC_Expansion_country.2110.t:0 "Die britische Nimrod-Expedition"
DNC_Expansion_country.2110.d:0 "Die Nimrod-Expedition, auch bekannt als Britische Antarktisexpedition, war die erste erfolgreiche Expedition in die Antarktis unter der Leitung von Ernest Shackleton. Ihr Hauptziel, neben einer Reihe geographischer und wissenschaftlicher Ziele, war es, als erste den Südpol zu erreichen. Dies wurde zwar nicht erreicht, doch auf ihrem Weg nach Süden erreichte die Expedition den südlichsten Breitengrad von 88° 23&#39; S, nur 97,5 Seemeilen vom Pol entfernt. Dies war die bis dahin mit Abstand längste Südpolarreise und ein Rekordanflug auf einen der beiden Pole. Eine separate Gruppe unter der Leitung des walisisch-australischen Geologieprofessors Edgeworth David erreichte den geschätzten magnetischen Südpol, und der Expedition gelang zudem die Erstbesteigung des Mount Erebus, des zweithöchsten Vulkans der Antarktis."
DNC_Expansion_country.2110.a:1 "OK"
