DNC_Expansion_country.98.t:0 "Ausrufung der Republik Kruševo"
DNC_Expansion_country.98.d:0 "Rebellen eroberten die Stadt Kruševo im Vilâyet Manastir des Osmanischen Reiches (dem heutigen Nordmazedonien) und errichteten eine revolutionäre Regierung. Angeführt wurde sie von Nikola Karev. Er war ein überzeugter Linker, der den Nationalismus der ethnischen Minderheiten ablehnte und Bündnisse mit einfachen Muslimen gegen das Sultanat befürwortete. Darüber hinaus unterstützte er die Idee einer Balkanföderation."
DNC_Expansion_country.98.a:1 "Geben Sie ihnen eingeschränkte Freiheit."
DNC_Expansion_country.98.b:1 "Unterdrücken Sie sie brutal."
DNC_Expansion_news.98.t:0 "Ausrufung der Republik Kruševo"
