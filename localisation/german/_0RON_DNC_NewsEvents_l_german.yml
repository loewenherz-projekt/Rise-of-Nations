DNC_Expansion_country.220.t:0 "Das Tunguska-Ereignis"
DNC_Expansion_country.220.d:0 "Das Tunguska-Ereignis war eine gewaltige Explosion in der Nähe des Flusses Podkamennaja Tunguska im Gouvernement Jenissejsk, Russland. Die Explosion über der dünn besiedelten ostsibirischen Taiga riss schätzungsweise 80 Millionen Bäume auf einer Waldfläche von 2.150 km² dem Erdboden gleich. Augenzeugenberichten zufolge starben dabei mindestens drei Menschen. Die Explosion wird allgemein auf die Explosion eines etwa 100 Meter großen Steinmeteoroiden zurückgeführt. Obwohl kein Einschlagskrater gefunden wurde, wird das Ereignis als Einschlagsereignis eingestuft. Man geht davon aus, dass das Objekt in einer Höhe von 5 bis 10 Kilometern zerfiel und nicht auf der Erdoberfläche aufschlug."
DNC_Expansion_country.220.a:1 "OK"
DNC_Expansion_news.220.t:0 "Das Tunguska-Ereignis"
