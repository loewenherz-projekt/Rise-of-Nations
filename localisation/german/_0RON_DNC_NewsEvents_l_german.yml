DNC_Expansion_country.130.t:0 "Das Blutsonntag-Massaker"
DNC_Expansion_country.130.d:0 "Der Begriff „Blutsonntag“ bezeichnet mehrere gewalttätige Vorfälle und Auseinandersetzungen in der Geschichte. In Russland bezieht er sich auf die Erschießung unbewaffneter Zivilisten durch zaristische Soldaten in St. Petersburg im Januar 1905. Dabei kamen zahlreiche Menschen ums Leben."
DNC_Expansion_country.130.a:1 "OK"
