DNC_Expansion_country.134.t:0 "Die Frage der Duma"
DNC_Expansion_country.134.d:0 "Die Duma ist ein gewähltes, halbrepräsentatives Organ in Russland. Sie wurde vom Zarenoberhaupt, Zar Nikolaus II., ins Leben gerufen, als die Regierung während eines Aufstands verzweifelt versuchte, die Opposition zu spalten. Die Gründung der Versammlung geschah völlig gegen seinen Willen, doch er hatte versprochen, eine gewählte, nationale, gesetzgebende Versammlung zu schaffen. Nach dieser Ankündigung waren die Hoffnungen groß, dass die Duma Demokratie bringen würde. Doch bald stellte sich heraus, dass die Duma zwei Kammern haben würde, von denen nur eine vom russischen Volk gewählt wurde. Die andere Kammer wurde vom Zaren ernannt, und diese Kammer hatte ein Vetorecht über alle Handlungen der anderen Kammer."
DNC_Expansion_country.134.a:1 "Erstellen Sie es"
DNC_Expansion_country.134.b:1 "Es besteht keine Notwendigkeit"
