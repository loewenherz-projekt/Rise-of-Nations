DNC_Expansion_country.234.t:0 "Das Massaker von Adana"
DNC_Expansion_country.234.d:0 "Das Massaker von Adana ereignete sich im Vilayet Adana des Osmanischen Reiches. Ein Massaker an armenischen Christen durch osmanische Muslime in der Stadt Adana inmitten des osmanischen Gegenputsches weitete sich zu einer Reihe antiarmenischer Pogrome in der gesamten Provinz aus. In Adana und den umliegenden Städten wurden etwa 20.000 bis 25.000 Menschen getötet, hauptsächlich Armenier. Berichten zufolge wurden bei den Massakern auch etwa 1.300 Assyrer getötet. Anders als die früheren Massaker von Hamidian wurden die Ereignisse nicht von der Zentralregierung organisiert, sondern von lokalen Beamten, Intellektuellen und islamischen Geistlichen, darunter auch Anhängern des CUP in Adana, angestiftet."
DNC_Expansion_country.234.a:1 "OK"
