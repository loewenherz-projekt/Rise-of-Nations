DNC_Expansion_country.191.t:0 "Autorennen von Peking nach Paris"
DNC_Expansion_country.191.d:0 "Das Peking-Paris-Autorennen war ein Autorennen, das ursprünglich 1907 zwischen Peking (Qing-China) und Paris (Frankreich) über eine Distanz von 14.994 Kilometern (9.317 Meilen) stattfand. Die Idee für das Rennen entstand durch einen in der Pariser Zeitung Le Matin veröffentlichten Wettbewerb. Das Rennen startete am 10. Juni 1907 vor der französischen Botschaft in Peking. Der Sieger, Prinz Scipione Borghese, traf am 10. August 1907 in Paris ein."
DNC_Expansion_country.191.a:1 "OK"
