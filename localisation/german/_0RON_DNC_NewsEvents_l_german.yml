DNC_Expansion_country.178.t:0 "Russland unterzeichnet Agrarreformen"
DNC_Expansion_country.178.d:0 "Die Stolypin-Landreform war eine Reihe von Maßnahmen der russischen Regierung, die es Bauern ermöglichen sollten, individuellen Landbesitz zu erwerben. Ziel war es, fleißige Bauern zum Erwerb eigenen Landes zu ermutigen und letztlich eine Klasse wohlhabender, konservativer Kleinbauern zu schaffen, die einen stabilisierenden Einfluss auf das Land ausüben und die Autokratie unterstützen sollte. Nach der Befreiung der Leibeigenen im Jahr 1861 teilte die Regierung jedem Bauernhaushalt Land zu, das jedoch im kollektiven Besitz der Dorfkommunen blieb. Die Kommunen teilten das Land traditionell in Streifen auf, die zur Bewirtschaftung unter den Haushalten verteilt wurden."
DNC_Expansion_country.178.a:1 "OK"
