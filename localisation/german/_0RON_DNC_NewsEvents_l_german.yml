DNC_Expansion_country.207.t:0 "RMS Mauretania bricht zu ihrer Jungfernfahrt auf"
DNC_Expansion_country.207.d:0 "Die RMS Mauretania war ein Ozeandampfer, der von Leonard Peskett entworfen und von Wigham Richardson und Swan Hunter für die britische Cunard Line gebaut wurde. Sie lief am Nachmittag des 20. September 1906 vom Stapel. Sie ist das größte und schnellste Schiff der Welt. Die Mauretania erfreute sich bei ihren Passagieren großer Beliebtheit. Heute brach sie zu ihrer Jungfernfahrt von Liverpool nach New York auf."
DNC_Expansion_country.207.a:1 "OK"
