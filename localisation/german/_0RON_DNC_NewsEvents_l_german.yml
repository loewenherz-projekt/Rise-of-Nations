DNC_Expansion_country.141.t:0 "Schlacht von Tsushima"
DNC_Expansion_country.141.d:0 "Die Schlacht wurde in der Tsushima-Straße zwischen Korea und Südjapan ausgetragen. In dieser Schlacht zerstörte die japanische Flotte unter Admiral Tōgō Heihachirō die russische Flotte unter Admiral Zinovy Rozhestvensky, die über 18.000 Seemeilen (33.000 km) zurückgelegt hatte, um den Fernen Osten zu erreichen."
