DNC_Expansion_country.204.t:0 "Das Haager Übereinkommen wird überarbeitet"
DNC_Expansion_country.204.d:0 "Ziel der Konferenz war es, die Haager Konvention von 1899 durch Änderungen und neue Themen zu erweitern. Insbesondere die Seekriegsführung stand im Fokus der Konferenz. Die Briten versuchten, die Rüstungsbeschränkung durchzusetzen, doch die anderen Mächte, allen voran Deutschland, scheiterten an diesem Versuch, das Wachstum der deutschen Flotte zu stoppen. Da Großbritannien über die größte Marine der Welt verfügte, sollten Beschränkungen der Flottenexpansion diese beherrschende Stellung sichern."
DNC_Expansion_country.204.a:1 "OK"
