ron_diplomatic.53.t:0 "Fällige Darlehenszahlungen"
ron_diplomatic.53.d:0 "Vor vielen Jahren haben wir einen Kredit von den europäischen Mächten Deutschland, Großbritannien und Italien aufgenommen. Nun ist der Kredit fällig, doch aufgrund unserer Wirtschaftskrise werden wir Schwierigkeiten haben, ihn zurückzuzahlen. Die Vereinigten Staaten von Amerika werden uns diplomatisch unterstützen und uns möglicherweise aus dieser prekären Lage befreien. Sollten wir jedoch die fristgerechte Zahlung verweigern, droht uns ein Embargo der europäischen Mächte. Was sollen wir tun?"
ron_diplomatic.53.a:1 "Wir müssen unsere Kredite zurückzahlen, egal, was es kostet."
ron_diplomatic.53.b:1 "Versuchen wir, diese Zahlungen zu verlängern."

ron_diplomatic.59.t:0 "Venezuela weigert sich, Kredite zurückzuzahlen"
ron_diplomatic.59.d:0 "Vor vielen Jahren haben wir dem krisengeschüttelten Venezuela einen Kredit gewährt. Nun ist der Kredit fällig, doch aufgrund der Wirtschaftskrise weigert sich das Land, die Schulden zurückzuzahlen. Die Vereinigten Staaten von Amerika werden das Land diplomatisch unterstützen und möglicherweise sogar Druck auf uns ausüben. Eine weitere Möglichkeit besteht darin, die Zahlung durch ein Embargo zu erzwingen. Was sollen wir tun?"
ron_diplomatic.59.a:1 "Wir werden sie mit einem Embargo belegen."
ron_diplomatic.59.b:1 "Lassen wir das durchgehen."

ron_diplomatic.60.t:0 "Europa droht mit Embargo"
ron_diplomatic.60.d:0 "Das Ergebnis ist, wie wir befürchtet hatten: Europa droht uns mit einem Embargo, wenn wir unsere Kredite nicht zurückzahlen. Ein Embargo hätte verheerende Folgen für unsere Wirtschaft und wäre ein politisches Fiasko. Was sollen wir tun?"
ron_diplomatic.60.a:1 "Wir sollten zahlen."
ron_diplomatic.60.b:1 "Wir werden keine Schwäche zeigen!"

ron_diplomatic.61.t:0 "Venezuela verweigert erneut die Zahlung"
ron_diplomatic.61.d:0 "Venezuela verweigert trotz Embargodrohung erneut die Zahlung. Würden wir von unserer Embargodrohung abrücken, würden wir auf der Weltbühne unser Gesicht verlieren. Was sollen wir tun?"
ron_diplomatic.61.a:1 "Weiter mit dem Embargo!"
ron_diplomatic.61.b:1 "Das ist die politische Gegenreaktion nicht wert."

ron_diplomatic.62.t:0 "Venezuela willigt ein, Kredite zurückzuzahlen"
ron_diplomatic.62.d:0 "Venezuela hat sich bereit erklärt, die uns geschuldeten Kredite zurückzuzahlen. Trotz der Wirtschaftskrise war das Land der Macht unserer großen Nation nicht gewachsen."
ron_diplomatic.62.a:1 "Tolle Neuigkeiten!"

ron_diplomatic.63.t:0 "Venezuela erklärte sich bereit, Kredite zurückzuzahlen"
ron_diplomatic.63.d:0 "Nach der Androhung eines Embargos hat Venezuela sich bereit erklärt, die uns geschuldeten Kredite zurückzuzahlen – ein politischer und diplomatischer Erfolg."
ron_diplomatic.63.a:1 "Tolle Neuigkeiten!"

ron_diplomatic_news.6.t:0 "Die venezolanische Krise"
ron_diplomatic_news.6.d:0 "Die venezolanische Krise endet heute, da Venezuela dem europäischen Druck nachgibt und die geschuldeten Kredite mit sofortiger Wirkung zurückzahlt. Dies ist ein trauriger Tag für das venezolanische Volk, das nun weitere Härten und Schwierigkeiten ertragen muss."
ron_diplomatic_news.6.a:1 "OK"

ron_diplomatic.64.t:0 "Das Washingtoner Schiedsverfahren"
ron_diplomatic.64.d:0 "Mit amerikanischer Unterstützung wurde in Washington ein Schiedsspruch unterzeichnet, der uns dazu verpflichtete, nur die Hälfte unserer Kredite an die europäischen Mächte zurückzuzahlen. Das ist zwar ein kleiner Erfolg, aber immerhin ein Erfolg."
ron_diplomatic.64.a:1 "Besser als nichts!"

ron_diplomatic.65.t:0 "Das Washingtoner Schiedsverfahren"
ron_diplomatic.65.d:0 "Nach diplomatischem Druck der USA kam es in Washington zu einer Einigung: Venezuela erklärte sich bereit, die Hälfte des Kredits zurückzuzahlen. Das ist zwar kein voller Erfolg, aber immerhin besser als nichts."
ron_diplomatic.65.a:1 "Zumindest ist es etwas."



DNC_Expansion_country.86.t:0 "Expedition zum Südpol"
DNC_Expansion_country.86.d:0 "Die britischen Entdecker Scott, Shackleton und Wilson erreichen den südlichsten Punkt, der je von Menschen erreicht wurde, südlich von 82°S."
DNC_Expansion_country.86.a:1 "OK"
