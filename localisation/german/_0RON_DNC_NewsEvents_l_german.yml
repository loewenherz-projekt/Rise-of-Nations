DNC_Expansion_country.126.t:0 "Theodore Roosevelt verkündet sein „Korollar“ zur Monroe-Doktrin"
DNC_Expansion_country.126.d:0 "Präsident Theodore Roosevelt verkündete 1904 im Wesentlichen als Konsequenz der Monroe-Doktrin, dass die Vereinigten Staaten militärisch eingreifen könnten, um eine Einmischung europäischer Mächte in der westlichen Hemisphäre zu verhindern."
DNC_Expansion_country.126.a:1 "OK"
DNC_Expansion_country.126.b:1 "Wir brauchen nicht die Ideen eines Demokraten!"
