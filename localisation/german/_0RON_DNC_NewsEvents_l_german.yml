DNC_Expansion_country.91.t:0 "Ratifizierung des Hay-Herrán-Vertrags abgelehnt"
DNC_Expansion_country.91.d:0 "Der Hay-Herrán-Vertrag, der den Vereinigten Staaten das Recht zum Bau des Panamakanals einräumt, wird vom US-Senat ratifiziert. Der kolumbianische Senat lehnt den Vertrag später ab."
DNC_Expansion_country.91.a:1 "OK"
DNC_Expansion_news.91.t:0 "Ratifizierung des Hay-Herrán-Vertrags abgelehnt"
DNC_Expansion_news.91.d:0 "Der Hay-Herrán-Vertrag, der den Vereinigten Staaten das Recht zum Bau des Panamakanals einräumt, wird vom US-Senat ratifiziert. Der kolumbianische Senat lehnt den Vertrag später ab."
DNC_Expansion_news.91.a:1 "OK"
ron_diplomatic.67.t:0 "Vorschlag zur Ratifizierung des Hay-Herrán-Vertrags"
ron_diplomatic.67.d:0 "Der US-Senat hat der kolumbianischen Regierung heute einen Vorschlag zur Ratifizierung des Hay-Herran-Vertrags vorgelegt, der den Vereinigten Staaten von Amerika die exklusiven Rechte für den Bau des Panamakanals einräumt. Ob dieser Vorschlag von der kolumbianischen Regierung angenommen wird, bleibt abzuwarten."
ron_diplomatic.67.a:1 "Es ist unser Recht."
ron_diplomatic.68.t:0"USA senden uns einen Vorschlag"
ron_diplomatic.68.d:0 "Der US-Senat hat unserer Regierung heute einen Vorschlag zur Ratifizierung des Hay-Herran-Vertrags vorgelegt, der den Vereinigten Staaten von Amerika die exklusiven Rechte für den Bau des Panamakanals einräumt. Was sollen wir tun?"
ron_diplomatic.68.a:1 "Wir werden das niemals zulassen"
ron_diplomatic.68.b:1 "Genehmigen Sie die Ratifizierung"
ron_diplomatic.69.t:0 "Kolumbianische Regierung stimmt Ratifizierung zu"
ron_diplomatic.69.d:0 "Die kolumbianische Regierung hat heute die Ratifizierung des Hay-Herran-Vertrags genehmigt, der den Vereinigten Staaten von Amerika die exklusiven Rechte beim Bau des Panamakanals einräumt. Dies ist ein großer Sieg für unsere Diplomaten."
ron_diplomatic.69.a:1 "Tolle Neuigkeiten!"
ron_diplomatic_news.7.t:0 "Ratifizierung des Hay-Herran-Vertrags"
ron_diplomatic_news.7.d:0 "Der Hay-Herrán-Vertrag, der den Vereinigten Staaten das Recht zum Bau des Panamakanals einräumt, wird vom US-Senat ratifiziert. Der kolumbianische Senat nimmt den Vertrag später an."
ron_diplomatic_news.7.a:1 "OK"

DNC_Expansion_country.92.t:0 "Das Kischinew-Pogrom"
DNC_Expansion_country.92.d:0 "Das erste Pogrom in Kischinew findet am Ostersonntag in Kischinew, der Hauptstadt des Gouvernements Bessarabien des Russischen Reiches, statt. Mindestens 47 Juden werden getötet, weitere verletzt. Der Aufruhr wird durch Artikel über Ritualmorde in der Presse angeheizt und von Priestern angeführt. Bis zum dritten Tag unternehmen weder Polizei noch Militär einen Einspruch."
DNC_Expansion_country.92.a:1 "Diese Gräueltaten werden nicht ungelöst bleiben."
