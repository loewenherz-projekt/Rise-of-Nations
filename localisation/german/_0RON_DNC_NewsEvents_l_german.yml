DNC_Expansion_country.193.t:0 "Banküberfall in Tiflis"
DNC_Expansion_country.193.d:0 "Der Banküberfall von Tiflis im Jahr 1907, auch bekannt als Enteignung des Eriwanski-Platzes, war ein bewaffneter Raubüberfall am 26. Juni 1907 in der Stadt Tiflis im Gouvernement Tiflis im Vizekönigreich Kaukasus des Russischen Reiches. Bolschewiki stahlen eine Bargeldlieferung einer Bank, um ihre revolutionären Aktivitäten zu finanzieren. Die Räuber griffen eine Postkutsche der Bank sowie die umstehenden Polizisten und Soldaten mit Bomben und Schusswaffen an, während die Postkutsche Geld über den Eriwanski-Platz (heute Platz der Freiheit) zwischen dem Postamt und der Tiflis-Filiale der Staatsbank des Russischen Reiches transportierte. Bei dem Überfall kamen laut offiziellen Archivdokumenten vierzig Menschen ums Leben, fünfzig weitere wurden verletzt. Die Räuber entkamen mit 241.000 Rubel."
DNC_Expansion_country.193.a:1 "OK"
