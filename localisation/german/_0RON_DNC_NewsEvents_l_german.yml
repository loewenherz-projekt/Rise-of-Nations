DNC_Expansion_country.216.t:0 "Das Gentlemen’s Agreement"
DNC_Expansion_country.216.d:0 "Das Gentlemen&#39;s Agreement ist eine Vereinbarung zwischen den USA und Japan, in der sich Japan verpflichtete, keine Pässe an Auswanderer in die USA auszustellen, mit Ausnahme bestimmter Kategorien von Geschäftsleuten und Berufstätigen. Im Gegenzug verpflichtete sich US-Präsident Theodore Roosevelt, die Stadt San Francisco zu drängen, eine Anordnung aufzuheben, durch die Kinder japanischer Eltern in den Schulen von weißen Schülern getrennt wurden."
DNC_Expansion_country.216.a:1 "OK"
DNC_Expansion_news.216.t:0 "Das Gentlemen’s Agreement"
DNC_Expansion_news.216.d:0 "Das Gentlemen&#39;s Agreement ist eine Vereinbarung zwischen den USA und Japan, in der Japan sich verpflichtete, keine Pässe an Auswanderer in die Vereinigten Staaten auszustellen, mit Ausnahme bestimmter Kategorien von Geschäftsleuten und Berufstätigen. Im Gegenzug verpflichtete sich US-Präsident Theodore Roosevelt, die Stadt San Francisco zu drängen, eine Anordnung aufzuheben, mit der Kinder japanischer Eltern in den Schulen von weißen Schülern getrennt wurden."
DNC_Expansion_news.216.a:1 "OK"

DNC_Expansion_country.217.t:0 "Zugunglück in Sunshine"
DNC_Expansion_country.217.d:0 "Das Eisenbahnunglück von Sunshine ereignete sich an der Kreuzung des Bahnhofs Sunshine, als ein Zug aus Bendigo nach Melbourne mit dem Heck eines Zuges aus Ballarat kollidierte. 44 Menschen kamen ums Leben, über 400 wurden verletzt, fast alle aus dem Zug aus Ballarat, da der Zug aus Bendigo von seinen beiden Lokomotiven abgefedert wurde."
DNC_Expansion_country.217.a:1 "OK"
