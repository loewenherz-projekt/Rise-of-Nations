DNC_Expansion_country.57.t:0 "Caiser-Rettungsboot-Katastrophe"
DNC_Expansion_country.57.d:0 "Die Katastrophe des Rettungsboots Caister ereignete sich vor der Küste von Caister-on-Sea in der englischen Grafschaft Norfolk. Sie ereignete sich während des sogenannten „Großen Sturms“, der an der Ostküste Englands und Schottlands verheerende Schäden anrichtete. Acht Leichen wurden später vor Ort geborgen."
