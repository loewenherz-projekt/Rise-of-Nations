DNC_Expansion_country.120.t:0 "Ingenieure der US-Armee beginnen mit der Arbeit am Panamakanal."
DNC_Expansion_country.120.d:0 "Am 4. Mai 1904 übernahmen die USA offiziell die Kontrolle über das Kanalgelände. Von den Franzosen erbten sie eine dezimierte Belegschaft und ein riesiges Durcheinander an Gebäuden, Infrastruktur und Ausrüstung, die sich größtenteils in schlechtem Zustand befanden. Eine US-Regierungskommission, die Isthmian Canal Commission, wurde eingerichtet, um den Bau zu überwachen. Ihr wurde die Kontrolle über die Panamakanalzone übertragen, über die die Vereinigten Staaten die Souveränität ausübten. Die Kommission berichtete direkt an Kriegsminister William Howard Taft und hatte den Auftrag, die Ineffizienz und Korruption zu verhindern, die die Franzosen 15 Jahre zuvor geplagt hatten."
DNC_Expansion_country.120.a:1 "OK"
DNC_Expansion_news.120.t:0 "Ingenieure der US-Armee beginnen mit der Arbeit am Panamakanal."
DNC_Expansion_news.120.d:0 "Am 4. Mai 1904 übernahmen die USA offiziell die Kontrolle über das Kanalgelände. Von den Franzosen erbten sie eine dezimierte Belegschaft und ein riesiges Durcheinander an Gebäuden, Infrastruktur und Ausrüstung, die sich größtenteils in schlechtem Zustand befanden. Eine US-Regierungskommission, die Isthmian Canal Commission, wurde eingerichtet, um den Bau zu überwachen. Ihr wurde die Kontrolle über die Panamakanalzone übertragen, über die die Vereinigten Staaten die Souveränität ausübten. Die Kommission berichtete direkt an Kriegsminister William Howard Taft und hatte den Auftrag, die Ineffizienz und Korruption zu verhindern, die die Franzosen 15 Jahre zuvor geplagt hatten."
DNC_Expansion_news.120.a:1 "OK"

DNC_Expansion_country.121.t:0 "IJN Hatsuse und Yashima sinken!"
DNC_Expansion_country.121.d:0 "Am Morgen des 15. Mai 1904 führte Konteradmiral Nashiba Tokioki ein Geschwader bestehend aus den Dreadnoughts Hatsuse, Yashima und Shikishima an, um P122ort Arthur zu bombardieren. Sie stießen auf ein Feld aus 50 Minen, die Amur am Abend zuvor gelegt hatte. Die Hatsuse lief auf eine Mine, die ihre Motoren und die Steuerung außer Gefecht setzte, und trieb in eine andere Mine, die eines ihrer vorderen Magazine explodieren ließ. Das Schiff sank innerhalb von etwa 90 Sekunden und riss 496 Mann mit sich in den Untergang. Die Yashima lief auf eine weitere Mine, als sie um die treibende Hatsuse herummanövrierte, wurde aber vom Minenfeld weggeschleppt. Am späten Nachmittag war die Flutung der Yashima nicht mehr aufzuhalten und sie wurde von ihrer Besatzung verlassen. Drei Stunden später kenterte und sank das Schiff."
DNC_Expansion_country.121.a:1 "OK"
DNC_Expansion_news.121.t:0 "IJN Hatsuse und Yashima sinken!"
DNC_Expansion_news.121.d:0 "Am Morgen des 15. Mai 1904 führte Konteradmiral Nashiba Tokioki ein Geschwader bestehend aus den Dreadnoughts Hatsuse, Yashima und Shikishima an, um Port Arthur zu bombardieren. Sie stießen auf ein Feld aus 50 Minen, die die Amur am Abend zuvor gelegt hatte. Die Hatsuse lief auf eine Mine, die ihre Motoren und die Steuerung außer Gefecht setzte, und trieb in eine weitere Mine, die eines ihrer vorderen Magazine explodieren ließ. Das Schiff sank innerhalb von etwa 90 Sekunden und riss 496 Mann mit sich in den Tod. Die Yashima lief auf eine weitere Mine, als sie um die treibende Hatsuse herummanövrierte, wurde aber vom Minenfeld weggeschleppt. Am späten Nachmittag war die Flutung der Yashima nicht mehr aufzuhalten und sie wurde von ihrer Besatzung verlassen. Drei Stunden später kenterte das Schiff und sank."
DNC_Expansion_news.121.a:1 "OK"

DNC_Expansion_country.122.t:0 "Allgemeines Slocum-Feuer"
DNC_Expansion_country.122.d:0 "Am 15. Juni 1904 geriet die General Slocum in Brand und sank im East River von New York City. Zum Zeitpunkt des Unglücks befand sie sich auf einer Charterfahrt mit Mitgliedern der St. Mark&#39;s Evangelical Lutheran Church zu einem Kirchenpicknick. Schätzungsweise 1.021 der 1.342 Menschen an Bord starben."
DNC_Expansion_country.122.a:1 "OK"
