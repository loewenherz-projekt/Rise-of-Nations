DNC_Expansion_news.213.d:0 "„Scouting for Boys – Ein Handbuch zur Erziehung zum guten Bürgertum“ ist ein Buch über die Pfadfinderausbildung. Das Buch war ursprünglich ein Handbuch zum Selbstunterricht in Beobachtung, Fährtenlesen und Holzhandwerk sowie Selbstdisziplin und Selbstverbesserung. Es behandelte das Britische Empire und die Pflichten als Bürger und enthielt eine vielseitige Mischung aus Anekdoten und unverhohlenen persönlichen Beobachtungen und Erinnerungen. Es ist durchdrungen von moralischer Missionierung und Verweisen auf die eigenen Heldentaten des Autors. Es basiert auf seinen Kindheitserlebnissen, seinen Erfahrungen mit dem Mafeking Cadet Corps während des Zweiten Burenkriegs bei der Belagerung von Mafeking und seinem Versuchslager auf Brownsea Island, England."
DNC_Expansion_news.213.a:1 "OK"

DNC_Expansion_country.214.t:0 "Der Königsmord von Lissabon"
DNC_Expansion_country.214.d:0 "Der Königsmord von Lissabon war die Ermordung von König Carlos I. von Portugal und den Algarven und seines künftigen Thronfolgers, Luís Filipe, Prinz Royal von Portugal, durch Attentäter, die mit republikanischen Interessen sympathisierten und von Elementen innerhalb der portugiesischen Carbonária, desillusionierten Politikern und Antimonarchisten unterstützt wurden. Die Ereignisse ereigneten sich am Praça do Comércio am Ufer des Flusses Tejo in Lissabon, der gemeinhin mit dem antiquierten Namen Terreiro do Paço bezeichnet wird."
DNC_Expansion_country.214.a:1 "Die Gräueltat!"
