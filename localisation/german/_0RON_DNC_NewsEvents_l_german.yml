DNC_Expansion_country.223.t:0 "Erster Animationsfilm"
DNC_Expansion_country.223.d:0 "Émile Cohl dreht den ersten vollständig animierten Film, Fantasmagorie. Der Film besteht größtenteils aus einem Strichmännchen, das sich bewegt und auf alle möglichen sich verwandelnden Objekte trifft, wie zum Beispiel eine Weinflasche, die sich in eine Blume verwandelt, die wiederum zu einem Elefanten wird. Es gibt auch Live-Action-Szenen, in denen die Hände des Animators in die Szene eingreifen. Die Hauptfigur wird von der Hand des Künstlers vor der Kamera gezeichnet, und die Hauptfiguren sind ein Clown und ein Gentleman. Weitere Figuren sind eine Frau in einem Kino, die einen großen Hut mit riesigen Federn trägt"
DNC_Expansion_country.223.a:1 "OK"
