DNC_Expansion_country.102.t:0 "Spaltungen der russischen Arbeiterpartei"
DNC_Expansion_country.102.d:0 "Die Sozialdemokratische Arbeiterpartei Russlands spaltet sich in zwei Gruppen: die Bolschewiki (russisch für Mehrheit) und die Menschewiki (russisch für Minderheit). Verwirrenderweise sind die Menschewiki tatsächlich die größere Fraktion, doch die Bezeichnungen Menschewiki und Bolschewiken stammen aus einer Abstimmung auf dem Parteikongress 1903 für die Redaktion der Parteizeitung Iskra."
DNC_Expansion_country.102.a:1 "Eine unbedeutende Änderung."
