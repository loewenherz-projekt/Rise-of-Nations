ron_diplomatic.72.t:0 "Fordern Sie Guantanamo Bay"
ron_diplomatic.72.d:0 "Bevor wir Kuba die Unabhängigkeit gewährten, hatten sie uns versprochen, uns einen Marinestützpunkt in der Nähe von Guantánamo zu errichten. Werden sie dieses Versprechen halten oder brechen?"
ron_diplomatic.72.a:1 "Wir können nur hoffen, dass sie ehrenhaft sind."
ron_diplomatic.72.b:1 "Lass sie in Ruhe."
ron_diplomatic.73.t:0 "USA fordern Guantanamo Bay"
ron_diplomatic.73.d:0 "Bevor uns die kubanische Unabhängigkeit gewährt wurde, hatten wir den USA versprochen, ihnen einen Marinestützpunkt in der Nähe von Guantánamo zu überlassen. Werden wir dieses Versprechen halten oder brechen?"
ron_diplomatic.73.a:1 "Wir werden ihnen einen Marinestützpunkt geben"
ron_diplomatic.73.b:1 "Wen kümmert&#39;s? Mach es kaputt."
ron_diplomatic.74.t:0 "Kuba bricht Versprechen"
ron_diplomatic.74.d:0 "Wir haben erfahren, dass Kuba sein Versprechen, uns einen Marinestützpunkt in der Guantanamo-Bucht zu gewähren, gebrochen hat. Was sollen wir tun?"
ron_diplomatic.74.a:1 "Lass sie in Ruhe."
ron_diplomatic.74.b:1 "Senden Sie ein Ultimatum!"
ron_diplomatic.75.t:0 "USA stellt uns ein Ultimatum"
ron_diplomatic.75.d:0 "Die USA haben beschlossen, uns ein Ultimatum zu stellen. Wenn wir Guantanamo Bay nicht abtreten, werden sie uns den Krieg erklären. Was sollen wir tun?"
ron_diplomatic.75.a:1 "Gib die Bucht ab"
ron_diplomatic.75.b:1 "Wir können sie nehmen."
ron_diplomatic.76.t:0 "Kuba weigert sich erneut"
ron_diplomatic.76.d:0 "Trotz unseres Ultimatums, einen Krieg anzustreben, haben die Kubaner den Kanal nicht abgetreten. Was sollen wir tun?"
ron_diplomatic.76.a:1 "Sie sind dumm."
ron_diplomatic_news.8.t:0 "USA ziehen sich von Kuba zurück"
ron_diplomatic_news.8.d:0 "Bevor die Amerikaner Kuba die Unabhängigkeit gewährten, hatte Kuba ihnen versprochen, ihnen einen Marinestützpunkt in der Nähe von Guantánamo zu gewähren. Nach der Unabhängigkeit weigerte sich Kuba, dieses Versprechen einzuhalten. Die USA machten einen Rückzieher. Dies ist ein großer Sieg für Kuba und seine Souveränität auf der Weltbühne."
ron_diplomatic_news.8.a:1 "OK"
ron_diplomatic_news.9.t:0 "USA im Krieg mit Kuba"
ron_diplomatic_news.9.d:0 "Bevor die Amerikaner Kuba die Unabhängigkeit gewährten, hatte Kuba ihnen versprochen, ihnen einen Marinestützpunkt in der Nähe von Guantánamo zu gewähren. Nach der Unabhängigkeit weigerte sich Kuba, dieses Versprechen einzuhalten. Die USA stellten ihnen ein Ultimatum und erklärten ihnen nach der Weigerung den Krieg. Das sind schlechte Nachrichten für Kuba und seine Souveränität."
ron_diplomatic_news.9.a:1 "OK"
DNC_Expansion_country.90.t:0 "Berlin-Bagdad-Bahn"
DNC_Expansion_country.90.d:0 "Die Bagdadbahn, auch bekannt als Berlin-Bagdad-Bahn, wird gebaut, um Berlin mit der damals osmanischen Stadt Bagdad zu verbinden, von wo aus die Deutschen einen Hafen am Persischen Golf errichten wollten, mit einer 1.600 Kilometer langen Strecke"
