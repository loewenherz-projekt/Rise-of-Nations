DNC_Expansion_news.13.a:1 "OK"

DNC_Expansion_country.14.t:0 "Ankunft der russischen Marine in Korea"
DNC_Expansion_country.14.d:0 "Die Ankunft einer russischen Flotte in Korea bereitet der kaiserlich-japanischen Regierung Sorgen. Dies hat die Spannungen in der Region deutlich verschärft und die Frage aufgeworfen, welche Nation die Kontrolle über die koreanische Region übernehmen wird."
