DNC_Expansion_country.192.t:0 "Zweite Haager Friedenskonferenz"
DNC_Expansion_country.192.d:0 "Die Haager Konventionen sind eine Reihe internationaler Verträge und Erklärungen, die auf zwei internationalen Friedenskonferenzen im niederländischen Den Haag ausgehandelt wurden. Zusammen mit den Genfer Konventionen gehörten die Haager Konventionen zu den ersten formellen Erklärungen des Kriegsrechts und der Kriegsverbrechen im säkularen Völkerrecht. Eine dritte Konferenz war für 1924 geplant."
DNC_Expansion_country.192.a:1 "OK"
