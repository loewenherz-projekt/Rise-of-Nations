DNC_Expansion_country.31.t:0 "Schlacht von Pulang Lupa"
DNC_Expansion_country.31.d:0 "Die Schlacht von Pulang Lupa war ein Gefecht während des Philippinisch-Amerikanischen Krieges zwischen den Streitkräften von Oberst Maximo Abad und Devereux Shields, bei dem Abads Männer die amerikanischen Streitkräfte besiegten."
DNC_Expansion_country.31.a:1 "OK"
