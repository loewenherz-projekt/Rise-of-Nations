DNC_Diplomacy.40.d:0 "Angesichts dieser beispiellosen Situation hat die Regierung von [From.GetAdjectiveCap] beschlossen, den Botschafter von [From.GetName] zu Konsultationen nach [Root.GetName] zurückzurufen."
DNC_Diplomacy.40.a:1 "Unglücklich"

DNC_Diplomacy.41.t:0 "[From.GetName] bricht die diplomatischen Beziehungen zu uns ab"
DNC_Diplomacy.41.d:0 "Der formelle Akt des Abbruchs diplomatischer Beziehungen zu einem anderen Land, um die Missbilligung seiner Handlungen oder Politik zu unterstreichen. Dies wird nur in schwerwiegenden Fällen getan."
DNC_Diplomacy.41.a:1 "So sei es..."

DNC_Diplomacy.42.t:0 "[From.GetName] möchte unsere Infrastruktur aufbauen"
DNC_Diplomacy.42.d:0 "Infrastruktur umfasst die Gesamtheit grundlegender Einrichtungen und Systeme, die die nachhaltige Funktionsfähigkeit von Haushalten und Unternehmen gewährleisten. Sie dient einem Land, einer Stadt oder einem anderen Gebiet und umfasst die für das Funktionieren der Wirtschaft notwendigen Dienstleistungen und Einrichtungen. Infrastruktur besteht aus öffentlichen und privaten physischen Strukturen wie Straßen, Eisenbahnen, Brücken, Tunneln, Wasserversorgung, Kanalisation, Stromnetzen und Telekommunikation (einschließlich Internet- und Breitbandzugang). Im Allgemeinen wird Infrastruktur definiert als „die physischen Komponenten miteinander verbundener Systeme, die Güter und Dienstleistungen bereitstellen, die für die Ermöglichung, Aufrechterhaltung oder Verbesserung der gesellschaftlichen Lebensbedingungen“ und für die Erhaltung der umgebenden Umwelt unerlässlich sind."
DNC_Diplomacy.42.a:1 "Akzeptieren"
DNC_Diplomacy.42.b:1 "Abfall"

