DNC_Expansion_country.50.t:0 "William McKinley ermordet!"
DNC_Expansion_country.50.d:0 "William McKinley, der 25. Präsident der Vereinigten Staaten, wurde heute auf dem Gelände der Panamerikanischen Ausstellung im Temple of Music in Buffalo, New York, erschossen. Sechs Monate nach Beginn seiner zweiten Amtszeit schüttelte er gerade den Menschen die Hände, als der Anarchist Leon Czolgosz ihm zwei Schüsse in den Bauch versetzte. McKinley starb am 14. September an Wundbrand. Er war der dritte amerikanische Präsident, der ermordet wurde, nach Abraham Lincoln 1865 und James A. Garfield 188."
DNC_Expansion_country.50.a:1 "Wie ist das passiert?"
DNC_Expansion_news.50.t:0 "William McKinley ermordet!"
