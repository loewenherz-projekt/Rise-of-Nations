DNC_Expansion_news.205.a:1 "OK"

DNC_Expansion_country.206.t:0 "Massaker von Černová"
DNC_Expansion_country.206.d:0 "Das Massaker von Černová war eine Schießerei, die am 27. Oktober 1907 in Csernova im Königreich Ungarn stattfand. Dabei wurden 15 Menschen getötet und viele verletzt, nachdem Gendarmen in eine Menschenmenge geschossen hatten, die sich zur Weihe der örtlichen katholischen Kirche versammelt hatte. Die Schießereien lösten Proteste in der europäischen und amerikanischen Presse aus und lenkten die Aufmerksamkeit der Welt auf die Behandlung von Minderheiten im ungarischen Teil Österreich-Ungarns."
DNC_Expansion_country.206.a:1 "OK"
