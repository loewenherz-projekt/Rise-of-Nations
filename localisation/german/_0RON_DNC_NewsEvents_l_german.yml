DNC_Expansion_country.3.t:0 "Schlacht von Platrand"
DNC_Expansion_country.3.d:0 "In den frühen Morgenstunden des 6. Januar 1900 begannen burische Sturmtrupps unter General CJ de Villiers, Wagon Hill und Caesar&#39;s Camp zu erklimmen. Sie wurden von britischen Einsatztrupps entdeckt und angegriffen, die gerade Geschütze in Stellung brachten. Die Buren eroberten die Ränder beider Hügel, konnten aber nicht weiter vordringen. Auch britische Gegenangriffe scheiterten. Mittags startete de Villiers einen weiteren Angriff auf Wagon Hill. Einige erschöpfte Verteidiger gerieten in Panik und flohen, doch Hamilton führte Reservetruppen an den Ort und eroberte einige leere Geschützstellungen zurück. Am späten Nachmittag brach ein heftiger Regensturm los, in dessen Schutz sich die Buren zurückzogen. Die Briten hatten 175 Tote und 249 Verwundete zu beklagen. 52 tote Buren blieben in den britischen Stellungen zurück, ihre Gesamtzahl an Verlusten wurde jedoch nicht erfasst."
DNC_Expansion_country.3.a:1 "OK"
