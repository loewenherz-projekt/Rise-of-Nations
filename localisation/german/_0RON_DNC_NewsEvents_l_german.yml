DNC_Expansion_country.213.t:0 "Scouting for Boys beginnt mit der Veröffentlichung"
DNC_Expansion_country.213.d:0 "„Scouting for Boys – Ein Handbuch zur Erziehung zum guten Bürgertum“ ist ein Buch über die Pfadfinderausbildung. Das Buch war ursprünglich ein Handbuch zum Selbstunterricht in Beobachtung, Fährtenlesen und Holzhandwerk sowie Selbstdisziplin und Selbstverbesserung. Es behandelte das Britische Empire und die Pflichten als Bürger und enthielt eine vielseitige Mischung aus Anekdoten und unverhohlenen persönlichen Beobachtungen und Erinnerungen. Es ist durchdrungen von moralischer Missionierung und Verweisen auf die eigenen Heldentaten des Autors. Es basiert auf seinen Kindheitserlebnissen, seinen Erfahrungen mit dem Mafeking Cadet Corps während des Zweiten Burenkriegs bei der Belagerung von Mafeking und seinem Versuchslager auf Brownsea Island, England."
DNC_Expansion_country.213.a:1 "OK"
