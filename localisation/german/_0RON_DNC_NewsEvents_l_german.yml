DNC_Expansion_country.146.t:0 "Eröffnung des Hauptbahnhofs Antwerpen"
DNC_Expansion_country.146.d:0 "Das ursprüngliche Endbahnhofsgebäude wurde zwischen 1895 und 1905 als Ersatz für den ersten Endbahnhof der Eisenbahnstrecke Brüssel-Mechelen-Antwerpen errichtet. Das steinverkleidete Gebäude wurde von Louis Delacenserie entworfen. Auch das Viadukt zum Bahnhof ist ein bemerkenswertes Bauwerk, das vom lokalen Architekten Jan Van Asperen entworfen wurde. Eine Gedenktafel an der Nordwand trägt den Namen Middenstatie, ein im Niederländischen heute veralteter Ausdruck."
DNC_Expansion_country.146.a:1 "OK"
