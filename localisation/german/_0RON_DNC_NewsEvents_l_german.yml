DNC_Expansion_country.27.t:0 "Erster Zeppelinflug durchgeführt"
DNC_Expansion_country.27.d:0 "Der erste Zeppelinflug findet über dem Bodensee in der Nähe von Friedrichshafen statt. Der Konstrukteur war Ferdinand Graf von Zeppelin, ein pensionierter deutscher Offizier."
DNC_Expansion_country.27.a:1 "OK"
