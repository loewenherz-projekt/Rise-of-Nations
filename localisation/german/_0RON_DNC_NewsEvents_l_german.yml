DNC_Expansion_country.232.t:0 "NAAC wird gegründet"
DNC_Expansion_country.232.d:0 "Heute, nach Jahrzehnten der Proteste, Unterdrückung und des Mangels an Grundrechten, wird in New York City die National Association for the Advancement of Colored People gegründet. Dies ist ein großer Fortschritt für die farbige Bevölkerung Amerikas und wird dazu beitragen, die Kluft zwischen den Rassen zu verringern."
DNC_Expansion_country.232.a:1 "Warum Diskriminierung aufgrund der Hautfarbe?"
