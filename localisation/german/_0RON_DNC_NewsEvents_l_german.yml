DNC_Expansion_country.26.t:0 "Taoistischer Mönch entdeckt alte heilige Texte"
DNC_Expansion_country.26.d:0 "Der taoistische Mönch Wang Yuanlu entdeckt die Dunhuang-Manuskripte, einen Schatz antiker Texte von großer historischer und religiöser Bedeutung, in den Mogao-Grotten von Dunhuang, China, wo sie seit dem frühen 11. Jahrhundert versiegelt waren."
DNC_Expansion_country.26.a:1 "OK"
