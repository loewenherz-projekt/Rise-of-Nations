DNC_Expansion_country.30.t:0 "Truppen marschieren in Peking ein und befreien europäische Geiseln"
DNC_Expansion_country.30.d:0 " Ein internationales Truppenkontingent unter britischem Kommando marschierte in Peking ein und befreite die europäischen Geiseln. Dies ist ein gewaltiger Sieg für die Acht-Nationen-Allianz. Es besteht die Möglichkeit, dass die Invasion Pekings den Anfang vom Ende des Boxeraufstands markiert."
DNC_Expansion_country.30.a:1 "Es ist lange genug her!"
