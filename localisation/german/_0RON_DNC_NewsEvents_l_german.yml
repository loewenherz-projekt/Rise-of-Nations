DNC_Expansion_news.31.a:1 "OK"

DNC_Expansion_country.32.t:0 "Schlacht von Mabitac"
DNC_Expansion_country.32.d:0 "Die Schlacht von Mabitac war ein Gefecht im Philippinisch-Amerikanischen Krieg, bei dem am 17. September 1900 Filipinos unter General Juan Cailles eine amerikanische Streitmacht unter dem Kommando von Colonel Benjamin F. Cheatham Jr. besiegten."
DNC_Expansion_country.32.a:1 "OK"
