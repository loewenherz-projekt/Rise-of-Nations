DNC_Diplomacy.5.t:0 "[From.GetName] lehnt unser Angebot ab"
DNC_Diplomacy.5.d:0 "Diplomaten beider Nationen trafen sich in [From.Capital.GetName] und berieten in einer etwas über eine Woche dauernden Konferenz. Leider wurde nicht nur keine Einigung erzielt, sondern unsere große Königsfamilie wurde auch schwer beleidigt."
DNC_Diplomacy.5.a:1 "Sie werden dafür bezahlen ..."
DNC_Diplomacy.5.b:1 "Wie können sie es wagen!"

DNC_Diplomacy.6.t:0 "[From.GetName] schlägt eine Konföderation vor"
DNC_Diplomacy.6.d:0 "Eine Konföderation (auch Staatenbund oder Liga genannt) ist ein Zusammenschluss souveräner Gruppen oder Staaten, die sich zum gemeinsamen Handeln zusammengeschlossen haben. Staatenbünde werden in der Regel durch einen Vertrag geschaffen und dienen der Regelung kritischer Fragen wie Verteidigung, Außenbeziehungen, Binnenhandel oder Währung. Dabei ist die Zentralregierung verpflichtet, alle ihre Mitglieder zu unterstützen. Konföderalismus stellt eine Hauptform des Intergouvernementalismus dar, der als jede Form der Interaktion zwischen Staaten definiert wird, die auf der Grundlage souveräner Unabhängigkeit oder Regierung erfolgt."
DNC_Diplomacy.6.a:1 "Vollständige Integration (Game Over)"
DNC_Diplomacy.6.b:1 "Mit interner Autonomie beitreten"
DNC_Diplomacy.6.c:1 "Wir brauchen sie nicht"

DNC_Diplomacy.7.t:0 "[From.GetName] akzeptiert vollständige Integration"
DNC_Diplomacy.7.d:0 "Eine Konföderation (auch Staatenbund oder Liga genannt) ist ein Zusammenschluss souveräner Gruppen oder Staaten, die sich zum gemeinsamen Handeln zusammengeschlossen haben. Staatenbünde werden in der Regel durch einen Vertrag geschaffen und dienen der Lösung kritischer Fragen wie Verteidigung, Außenbeziehungen, Binnenhandel oder Währung. Dabei ist die Zentralregierung verpflichtet, alle ihre Mitglieder zu unterstützen. Konföderalismus stellt eine Hauptform des Intergouvernementalismus dar, der als jede Form der Interaktion zwischen Staaten definiert wird, die auf der Grundlage souveräner Unabhängigkeit oder Regierung erfolgt."
DNC_Diplomacy.7.a:1 "Exzellent"

DNC_Diplomacy.8.t:0 "[From.GetName] akzeptiert eingeschränkte Selbstverwaltung"
DNC_Diplomacy.8.d:0 "Eine Konföderation (auch Staatenbund oder Liga genannt) ist ein Zusammenschluss souveräner Gruppen oder Staaten, die sich zum gemeinsamen Handeln zusammengeschlossen haben. Staatenbünde werden in der Regel durch einen Vertrag geschaffen und dienen der Lösung kritischer Fragen wie Verteidigung, Außenbeziehungen, Binnenhandel oder Währung. Dabei ist die Zentralregierung verpflichtet, alle ihre Mitglieder zu unterstützen. Konföderalismus stellt eine Hauptform des Intergouvernementalismus dar, der als jede Form der Interaktion zwischen Staaten definiert wird, die auf der Grundlage souveräner Unabhängigkeit oder Regierung erfolgt."
DNC_Diplomacy.8.a:1 "Großartig"

DNC_Diplomacy.9.t:0 "[From.GetName] lehnt unser Angebot ab"
DNC_Diplomacy.9.d:0 "Diplomaten beider Nationen trafen sich in [From.Capital.GetName] und berieten in einer etwas über eine Woche dauernden Konferenz. Leider wurde nicht nur keine Einigung erzielt, sondern unsere großartige Nation wurde auch schwer beleidigt."
DNC_Diplomacy.9.a:1 "Sie werden dafür bezahlen ..."
DNC_Diplomacy.9.b:1 "Wie können sie es wagen!"

DNC_Diplomacy.10.t:0 "[From.GetName] fordert Spanisch-Florida"
DNC_Diplomacy.10.d:0 "Spanisch-Florida war der erste große europäische Landanspruch und Siedlungsversuch in Nordamerika während des europäischen Zeitalters der Entdeckungen. Während der spanischen Kolonialisierung Amerikas war La Florida Teil des Generalkapitäns von Kuba, des Vizekönigreichs Neuspanien und des spanischen Kaiserreichs. Obwohl seine Grenzen nie klar oder formal definiert wurden, war das Gebiet anfangs viel größer als der heutige Bundesstaat Florida und erstreckte sich über weite Teile des heutigen Südostens der Vereinigten Staaten, einschließlich des gesamten heutigen Florida sowie Teilen von Georgia, Alabama, Mississippi, North Carolina, South Carolina und Louisiana. Spaniens Anspruch auf dieses riesige Gebiet stützte sich auf mehrere groß angelegte Expeditionen im 16. Jahrhundert. Im 16. und in geringerem Umfang auch im 17. Jahrhundert existierten zahlreiche Missionen, Siedlungen und kleine Festungen; sie wurden schließlich aufgrund des Drucks der expandierenden englischen und französischen Kolonialsiedlungen, des Zusammenbruchs der einheimischen Bevölkerung und der allgemeinen Schwierigkeiten, landwirtschaftlich oder wirtschaftlich autark zu werden, aufgegeben. Im 18. Jahrhundert erstreckte sich die spanische Kontrolle über La Florida nicht viel weiter als auf eine Handvoll Forts in der Nähe von St. Augustine, St. Marks und Pensacola, die alle innerhalb der Grenzen des heutigen Florida lagen."
DNC_Diplomacy.10.a:1 "Akzeptieren"
DNC_Diplomacy.10.b:1 "Abfall"

