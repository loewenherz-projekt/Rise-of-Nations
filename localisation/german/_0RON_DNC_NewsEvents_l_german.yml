DNC_Expansion_country.227.t:0 "Bulgarien erklärt seine Unabhängigkeit"
DNC_Expansion_country.227.d:0 "Bulgarien war seit dem 3. März 1878, als es im Zuge des Russisch-Türkischen Krieges von der osmanischen Herrschaft befreit wurde, ein weitgehend autonomes Fürstentum. Obwohl es formal noch unter der Oberhoheit der Hohen Pforte stand, handelte es sich dabei um eine juristische Fiktion, die Bulgarien nur formal anerkannte. Es agierte weitgehend als de facto unabhängiger Staat. Am 18. September 1885 vereinigte es sich mit der mehrheitlich bulgarisch-osmanischen autonomen Provinz Ostrumelien. Das Chaos, das nach der Jungtürkischen Revolution von 1908 im Osmanischen Reich ausbrach, bot günstige Bedingungen für die bulgarische Unabhängigkeitserklärung. Viele Großmächte hatten zudem ihre Unterstützung für die Osmanen aufgegeben und strebten stattdessen nach Gebietsgewinnen – Österreich-Ungarn hoffte auf die Annexion des bosnischen Vilâyet, Großbritannien wollte die arabischen Gebiete des Reiches im Osten erobern und das Hauptziel des Russischen Reiches war die Kontrolle über die türkischen Meerengen."
DNC_Expansion_country.227.a:1 "OK"
