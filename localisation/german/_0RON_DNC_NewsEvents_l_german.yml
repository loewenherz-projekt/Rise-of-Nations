DNC_Expansion_country.194.t:0 "Die Orange River Colony erlangt Autonomie"
DNC_Expansion_country.194.d:0 "Die Orangia Unie (Orange Union Party) wurde nach monatelanger Vorbereitung im Mai 1906 formell gegründet. Eine ähnliche Organisation namens Het Volk war im Januar 1905 von den Buren Transvaals gegründet worden. Beide Gewerkschaften hatten eine Verfassung, die nahezu identisch mit der des Afrikaaner Bond, einer ehemaligen panafrikanischen politischen Bewegung, war. Auch ihre Ziele waren ähnlich: die Sicherung der Stellung der Afrikaaner in Staat und Gesellschaft. Sollten wir ihnen Autonomie gewähren oder sie dennoch Teil der britischen Nation bleiben lassen?"
DNC_Expansion_country.194.a:1 "Geben Sie ihnen eingeschränkte Autonomie"
DNC_Expansion_country.194.b:1 "Sie werden Briten sein!"
DNC_Expansion_news.194.t:0 "Die Orange River Colony erlangt Autonomie"
