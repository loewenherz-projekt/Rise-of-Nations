DNC_Expansion_country.172.t:0 "Erdbeben in Valparaíso"
DNC_Expansion_country.172.d:0 "Das Erdbeben von Valparaíso erschütterte Valparaíso, Chile, am 16. August um 19:55 Uhr Ortszeit. Das Epizentrum lag vor der Küste der Region Valparaíso, und die Stärke des Erdbebens wurde auf 8,2 MW geschätzt. Es ereignete sich 30 Minuten nach dem Erdbeben auf den Aleuten-Inseln im Jahr 1906. Große Teile Valparaísos wurden zerstört; in Zentralchile von Illapel bis Talca kam es zu schweren Schäden. Das Erdbeben war von Tacna bis Puerto Montt zu spüren. Berichten zufolge dauerte das Erdbeben vier Minuten. Zudem wurde ein Tsunami ausgelöst. Bei dem Erdbeben kamen 3.882 Menschen ums Leben."
DNC_Expansion_country.172.a:1 "OK"
