DNC_Expansion_country.148.t:0 "HMS Dreadnought auf Kiel gelegt"
DNC_Expansion_country.148.d:0 "Die HMS Dreadnought war ein Schlachtschiff der Royal Navy, dessen Design die Seemacht revolutionierte. Ihre Indienststellung im Jahr 1906 stellte einen derartigen Fortschritt in der Marinetechnologie dar, dass ihr Name mit einer ganzen Generation von Schlachtschiffen, den „Dreadnoughts“, sowie der nach ihr benannten Schiffsklasse in Verbindung gebracht wurde. Ebenso wurde die Schiffsgeneration, die sie überflüssig machte, als „Pre-Dreadnoughts“ bekannt."
DNC_Expansion_country.148.a:1 "OK"
