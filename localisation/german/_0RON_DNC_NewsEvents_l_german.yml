DNC_Expansion_news_china.51.t:0 "Neuer Kaiser von China ernannt"
DNC_Expansion_news_china.51.d:0 "Das Boxerprotokoll wurde heute zwischen dem Qing-Kaiserreich Chinas und der Acht-Nationen-Allianz abgelehnt. Ein neuer Anwärter auf die Macht im chinesischen Kaiserreich hat geschworen, den Aufstand zu beenden und China zurückzuerobern!"
DNC_Expansion_news_china.51.a:1 "China bricht zusammen"
DNC_Expansion_country.51.t:0 "Unterzeichnen Sie das Boxer-Protokoll"
DNC_Expansion_country.51.d:0 "Das Boxerprotokoll wurde heute zwischen dem chinesischen Qing-Reich und dem Acht-Nationen-Bündnis unterzeichnet, das Streitkräfte stellte. Zu diesem Bündnis gehörten Österreich-Ungarn, Frankreich, Deutschland, Großbritannien, Italien, Japan, Russland und die Vereinigten Staaten sowie Belgien, Spanien und die Niederlande. Dies geschah nach der Niederlage Chinas bei der Intervention zur Niederschlagung des Boxeraufstands."
DNC_Expansion_country.51.a:1 "Unterschreiben Sie es"
DNC_Expansion_country.51.b:1 "Wir werden bis zum Tod kämpfen!"
DNC_Expansion_news.51.t:0 "Der Boxeraufstand ist beendet!"
DNC_Expansion_news.51.d:0 "Das Boxerprotokoll wurde heute zwischen dem chinesischen Qing-Reich und dem Acht-Nationen-Bündnis unterzeichnet, das Streitkräfte stellte. Zu diesem Bündnis gehörten Österreich-Ungarn, Frankreich, Deutschland, Großbritannien, Italien, Japan, Russland und die Vereinigten Staaten sowie Belgien, Spanien und die Niederlande. Dies geschah nach der Niederlage Chinas bei der Intervention zur Niederschlagung des Boxeraufstands."
DNC_Expansion_news.51.a:1 "OK"

ron_diplomatic_news.10.t:0 "Qing weigert sich, die Boxer-Protokolle zu unterzeichnen"
ron_diplomatic_news.10.d:0 "Die Unterzeichnung des Boxerprotokolls zwischen dem chinesischen Qing-Reich und dem Acht-Mächte-Bündnis, das Streitkräfte stellte (darunter Österreich-Ungarn, Frankreich, Deutschland, Großbritannien, Italien, Japan, Russland, die USA sowie Belgien, Spanien und die Niederlande), wurde heute abgelehnt. Dies geschah nach Chinas Niederlage bei der Intervention zur Niederschlagung des Boxeraufstands. China hat sich noch nicht ergeben und wird bis zum Tod weiterkämpfen, bevor es vor den imperialistischen Mächten kapituliert."
ron_diplomatic_news.9.a:1 "Wie idiotisch."


