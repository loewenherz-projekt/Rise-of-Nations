DNC_Expansion_country.183.t:0 "Rumänischer Bauernaufstand"
DNC_Expansion_country.183.d:0 "Der rumänische Bauernaufstand fand statt. Er begann in Nordmoldau und breitete sich nach drei Wochen, in denen er sich auf dieses Gebiet beschränkte, rasch auf die Walachei und sogar Oltenien aus. Hauptursache war die Unzufriedenheit der Bauern über die ungleiche Verteilung des Grundbesitzes, der in den Händen weniger Großgrundbesitzer lag. Wir können den Aufstand entweder gewaltsam niederschlagen oder ihren Forderungen nachgeben."
DNC_Expansion_country.183.b:1 "Gib auf."
DNC_Expansion_country.183.a:1 "Zerschmettere sie!"
DNC_Expansion_news.183.t:0 "Rumänischer Bauernaufstand"
DNC_Expansion_news.183.d:0 "Der rumänische Bauernaufstand fand statt. Er begann in Nordmoldau und breitete sich nach dreiwöchiger Beschränkung auf dieses Gebiet rasch auf die Walachei und sogar nach Oltenien aus. Hauptursache war die Unzufriedenheit der Bauern über die ungleiche Verteilung des Grundbesitzes, der in den Händen weniger Großgrundbesitzer lag. Nach dem Sturz der konservativen Regierung am 12. März schlug die neue liberale Regierung den Aufstand mit Unterstützung der rumänischen Armee gewaltsam nieder, wobei Tausende von Bauern getötet wurden."
DNC_Expansion_news.183.a:1 "OK"

