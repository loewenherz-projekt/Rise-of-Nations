DNC_Expansion_country.144.t:0 "Geheimabkommen zwischen Taft und Katsura"
DNC_Expansion_country.144.d:0 "Das Taft-Katsura-Abkommen, auch bekannt als Taft-Katsura-Memorandum, war eine Diskussion zwischen hochrangigen Politikern Japans und der Vereinigten Staaten aus dem Jahr 1905 über die Positionen der beiden Nationen in den Angelegenheiten Ostasiens, insbesondere über den Status Koreas und der Philippinen nach Japans Sieg im Russisch-Japanischen Krieg. Was sollten wir tun? Die Unterzeichnung des Abkommens würde unsere Kontrolle über die Philippinen garantieren."
DNC_Expansion_country.144.a:1 "Unterschreiben Sie es"
DNC_Expansion_country.144.b:1 "Wir brauchen die Japaner nicht"
DNC_Expansion_news.144.t:0 "Geheimabkommen zwischen Taft und Katsura"
DNC_Expansion_news.144.d:0 "Das Taft-Katsura-Abkommen, auch bekannt als Taft-Katsura-Memorandum, war eine Diskussion zwischen hochrangigen Politikern Japans und der Vereinigten Staaten aus dem Jahr 1905 über die Positionen der beiden Nationen in den Angelegenheiten Ostasiens, insbesondere über den Status Koreas und der Philippinen nach Japans Sieg im Russisch-Japanischen Krieg. Das Memorandum wurde nicht als geheim eingestuft, aber kein Wissenschaftler bemerkte es in den Archiven."
DNC_Expansion_news.144.a:1 "OK"
ron_diplomatic.90.t:0 "Geheimabkommen zwischen Taft und Katsura"
ron_diplomatic.90.d:0 "Das Taft-Katsura-Abkommen, auch bekannt als Taft-Katsura-Memorandum, ist eine Diskussion zwischen hochrangigen Politikern Japans und der Vereinigten Staaten aus dem Jahr 1905 über die Positionen der beiden Nationen in den Angelegenheiten Ostasiens, insbesondere über den Status Koreas und der Philippinen nach Japans Sieg im Russisch-Japanischen Krieg. Was sollten wir tun? Die Unterzeichnung würde unsere Kontrolle über Korea garantieren."
ron_diplomatic.90.a:1 "Unterschreiben Sie es"
ron_diplomatic.90.b:1 "Wir brauchen die Amerikaner nicht"
ron_diplomatic.91.t:0 "Verhandlungen scheitern"
ron_diplomatic.91.d:0 "Die Japaner haben uns eine Botschaft übermittelt und das Taft-Katsura-Abkommen abgelehnt. Der Kampf um Asien geht weiter."
ron_diplomatic.91.a:1 "Hartnäckige Narren"
ron_diplomatic.92.t:0 "Verhandlungen erfolgreich"
ron_diplomatic.92.d:0 "Die Japaner haben uns eine Botschaft übermittelt und das Taft-Katsura-Abkommen akzeptiert. Der Kampf um Asien ist nun beendet."
ron_diplomatic.92.a:1 "Exzellent"
ron_diplomatic.101.t:0 "Kuba bittet um Hilfe"
ron_diplomatic.101.d:0 "Nach einem Aufstand gegen die Regierung, der nicht unter Kontrolle gebracht werden konnte, bat uns der kubanische Präsident Tomás Estrada Palma um unser Eingreifen. Auf der einen Seite des Spektrums steht die Regierung von Tomás Estrada Palma, auf der anderen die Partei von José Miguel Gómez. Wen sollten wir unterstützen?"
ron_diplomatic.101.a:1 "Tomás Estrada Palma!"
ron_diplomatic.101.b:1 "José Miguel Gómez!"
will_be_puppet_tt:0 "§RInformiert, werden wir zur Marionette"!§
DNC_Expansion_country.145.t:0 "Pablo Valencia verirrt sich in der Sonora-Wüste"
ron_diplomatic.102.t:0 "Österreich annektiert Bosnien!"
ron_diplomatic.102.d:0 "Nach Jahren österreichischer Herrschaft über unser ehemaliges Territorium in Bosnien haben die Österreicher angesichts der jüngsten Ereignisse im Zusammenhang mit der Unabhängigkeit Bulgariens beschlossen, Bosnien zu annektieren und in das österreichisch-ungarische Reich einzugliedern. Was sollen wir tun?"
ron_diplomatic.102.a:0 "Bosnien ist osmanisch!"
ron_diplomatic.102.b:0 "Wir können uns keinen Krieg leisten."

ron_diplomatic.103.t:0 "Die Situation eskaliert"
ron_diplomatic.103.d:0 "Das Osmanische Reich hat unseren Vorschlag entschieden abgelehnt, es bedroht unsere Grenzen, wir müssen handeln!"
ron_diplomatic.103.a:0 "Dann ist es Krieg."
ron_diplomatic.103.b:0 "Bosnien ist keinen Krieg wert."
DNC_Expansion_country.145.d:0 "Der Goldsucher Pablo Valencia kam im August 1905 dem Tod nur knapp zuvor. Valencia war mit einem gewissen Jesús Rios unterwegs zu einem Claim in Arizona. Zu spät bemerkte er, dass sie nicht genug Wasser mitgebracht hatten, und schickte seinen Begleiter los, um mehr zu besorgen. Rios tat dies, konnte seinen Partner jedoch später nicht mehr finden, da kein Treffpunkt vereinbart worden war. Valencia fand sich daraufhin allein und ohne Wasser mitten in der Sonora-Wüste wieder. In diesem Zustand irrte er mehr als sechs Tage lang umher, mit nichts als seinem eigenen Urin und der Flüssigkeit, die er einem einzigen Skorpion entlocken konnte, und wurde immer schwächer. Mehr tot als lebendig erreichte er schließlich die einzige Wasserquelle weit und breit, Tinajas Altas. Dort wurde er von WJ McGee gesund gepflegt."
DNC_Expansion_country.145.a:1 "OK"
