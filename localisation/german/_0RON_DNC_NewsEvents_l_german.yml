DNC_Expansion_country.245.t:0 "König Albert I. gekrönt"
DNC_Expansion_country.245.d:0 "Nach dem Tod seines Onkels Leopold II. bestieg Albert den belgischen Thron, da Alberts Vater 1905 gestorben war. Frühere belgische Könige hatten ihren Thronbesteigungseid ausschließlich auf Französisch abgelegt; Albert legte ihn nun auch auf Niederländisch ab. Er und seine Frau, Königin Elisabeth, waren in Belgien aufgrund ihres einfachen, bescheidenen Lebensstils und ihres harmonischen Familienlebens beliebt, das in deutlichem Kontrast zum distanzierten, autokratischen Auftreten und dem unregelmäßigen Privatleben Leopolds II. stand."
DNC_Expansion_country.245.a:1 "OK"
