DNC_Expansion_country.83.t:0 "Leopold II. überlebt Attentat"
DNC_Expansion_country.83.d:0 "König Leopold II. reiste im königlichen Gefolge von einer Zeremonie in der Kathedrale Saint-Gudule zum Gedenken an seine kürzlich verstorbene Frau Marie Henriette ab. Nachdem Leopolds Kutsche vorbeigefahren war, feuerte Rubino drei Schüsse auf den Zug ab. Die Schüsse verfehlten Leopold, töteten aber beinahe den Großmarschall des Königs, Graf Charles John d&#39;Oultremont."
