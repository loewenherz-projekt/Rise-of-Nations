DNC_Expansion_country.118.t:0 "Longacre Square wurde in Times Square umbenannt"
DNC_Expansion_country.118.d:0 "In einer Titelgeschichte vom 9. April begründete die Times die Umbenennung mit der Verwechslung einer U-Bahn-Haltestelle mit den Namen „42nd Street“ und „Broadway“. Natürlich hätte die Haltestelle auch einfach „Longacre Square“ heißen können, was völlig klar gewesen wäre."
DNC_Expansion_country.118.a:1 "OK"
