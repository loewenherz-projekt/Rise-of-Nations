DNC_Expansion_country.125.t:0 "Erste U-Bahn-Linie der New Yorker U-Bahn eröffnet"
DNC_Expansion_country.125.d:0 "Die erste regelmäßig betriebene U-Bahn in New York City wurde am 27. Oktober 1904 eröffnet und von der Interborough Rapid Transit Company (IRT) betrieben. Das frühe IRT-System bestand aus einer einzigen Hauptstrecke unterhalb der 96. Straße in Manhattan, mit drei nördlichen Zweigen in Upper Manhattan und der Bronx sowie einem südlichen Zweig nach Brooklyn."
DNC_Expansion_country.125.a:1 "OK"
