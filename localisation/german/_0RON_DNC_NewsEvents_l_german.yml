DNC_Expansion_country.111.t:0 "Das Ålesund-Feuer"
DNC_Expansion_country.111.d:0 "Der Brand von Ålesund ereignete sich am 23. Januar 1904 in der norwegischen Stadt Ålesund. Er zerstörte fast das gesamte Stadtzentrum, das wie die meisten norwegischen Städte größtenteils aus Holz gebaut war. Das vom Wind getriebene Feuer vernichtete große Teile der Stadt. Es wird behauptet, dass das Feuer ausbrach, weil eine Kuh eine Fackel umstieß."
DNC_Expansion_country.111.a:1 "OK"
