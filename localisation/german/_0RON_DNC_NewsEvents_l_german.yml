ron_diplomatic.34.t:0 "Die Boxer unterstützen?"
ron_diplomatic.34.d:0 "Der Boxeraufstand, Boxeraufstand oder Yihetuan-Bewegung war ein bewaffneter und gewalttätiger antichristlicher und antiimperialistischer Aufstand in China zwischen 1899 und 1901, gegen Ende der Qing-Dynastie. Initiiert wurde er von der in Rechtschaffenheit vereinten Miliz (Yìhéquán), die im Englischen als „die Boxer“ bekannt ist, da viele ihrer Mitglieder chinesische Kampfkünste praktiziert hatten, die im Westen damals auch als „Chinesisches Boxen“ bezeichnet wurden. Nach dem Japanisch-Chinesischen Krieg von 1895 hatte sich unter den Dorfbewohnern Nordchinas ein Groll gegen christliche Missionare und die Ausweitung ausländischer Einflusssphären aufgebaut. Während einer schweren Dürre breiteten sich Gewalt und Mord in Shandong und der nordchinesischen Tiefebene aus und zielten auf ausländisches Eigentum, christliche Missionare und chinesische Christen. Im Juni 1900 marschierten Boxkämpfer in der Überzeugung, gegen ausländische Waffen unverwundbar zu sein, mit dem Slogan „Unterstützt die Qing-Regierung und vernichtet die Ausländer“ in Peking ein. Ausländer und chinesische Christen suchten Zuflucht im Gesandtschaftsviertel."
ron_diplomatic.34.a:1 "Unterstützen Sie sie"
ron_diplomatic.34.b:1 "Bleiben Sie neutral"
ron_diplomatic.34.c:1 "Unterdrücke sie"
ron_diplomatic.35.t:0 "Die Qing-Regierung bietet uns volle Unterstützung"
ron_diplomatic.35.d:0 "Der Boxeraufstand, Boxeraufstand oder Yihetuan-Bewegung war ein bewaffneter und gewalttätiger antichristlicher und antiimperialistischer Aufstand in China zwischen 1899 und 1901, gegen Ende der Qing-Dynastie. Initiiert wurde er von der in Rechtschaffenheit vereinten Miliz (Yìhéquán), die im Englischen als „die Boxer“ bekannt ist, da viele ihrer Mitglieder chinesische Kampfkünste praktiziert hatten, die im Westen damals auch als „Chinesisches Boxen“ bezeichnet wurden. Nach dem Japanisch-Chinesischen Krieg von 1895 hatte sich unter den Dorfbewohnern Nordchinas ein Groll gegen christliche Missionare und die Ausweitung ausländischer Einflusssphären aufgebaut. Während einer schweren Dürre breiteten sich Gewalt und Mord in Shandong und der nordchinesischen Tiefebene aus und zielten auf ausländisches Eigentum, christliche Missionare und chinesische Christen. Im Juni 1900 marschierten Boxkämpfer in der Überzeugung, gegen ausländische Waffen unverwundbar zu sein, mit dem Slogan „Unterstützt die Qing-Regierung und vernichtet die Ausländer“ in Peking ein. Ausländer und chinesische Christen suchten Zuflucht im Gesandtschaftsviertel."
ron_diplomatic.35.a:1 "Akzeptieren"
ron_diplomatic.35.b:1 "Wir brauchen sie nicht"
ron_diplomatic.36.t:0 "Kaiserlicher Erlass zur Kriegserklärung an ausländische Mächte"
ron_diplomatic.36.d:0 "Das kaiserliche Dekret zur Kriegserklärung an ausländische Mächte war eine Kriegserklärung der Qing-Dynastie aus dem Jahr 1900 an die Kolonialmächte Russland, die USA, Großbritannien, Japan, Frankreich, Deutschland, Italien, Spanien, Österreich-Ungarn, Belgien und die Niederlande gleichzeitig. Diese Kriegserklärung war eine der direkten Ursachen des Boxeraufstands und des Acht-Nationen-Bündnisses, die wiederum zum Boxerprotokoll führten. Dieses kaiserliche Dekret wurde offiziell im Namen des Kaisers Guangxu erlassen und trug sein offizielles kaiserliches Siegel. Der Kaiser von China stand zu dieser Zeit auf Anordnung der Kaiserinwitwe Cixi de facto unter Hausarrest, und die gesamte Verwaltungsgewalt lag in den Händen der Kaiserinwitwe."
ron_diplomatic.36.a:1 "Krieg erklären"
ron_diplomatic.37.t:0 "Boxer-Rückgang"
ron_diplomatic.37.d:0 "Der Boxeraufstand, Boxeraufstand oder Yihetuan-Bewegung war ein bewaffneter und gewalttätiger antichristlicher und antiimperialistischer Aufstand in China zwischen 1899 und 1901, gegen Ende der Qing-Dynastie. Initiiert wurde er von der in Rechtschaffenheit vereinten Miliz (Yìhéquán), die im Englischen als „die Boxer“ bekannt ist, da viele ihrer Mitglieder chinesische Kampfkünste praktiziert hatten, die in der westlichen Welt damals auch als „Chinesisches Boxen“ bezeichnet wurden. Nach dem Japanisch-Chinesischen Krieg von 1895 hatte sich unter den Dorfbewohnern Nordchinas ein Groll gegen christliche Missionare und die Ausweitung ausländischer Einflusssphären aufgebaut. Während einer schweren Dürre breiteten sich Gewalt und Mord in Shandong und der nordchinesischen Tiefebene aus und zielten auf ausländisches Eigentum, christliche Missionare und chinesische Christen. Im Juni 1900 marschierten Boxkämpfer in der Überzeugung, gegen ausländische Waffen unverwundbar zu sein, mit dem Slogan „Unterstützt die Qing-Regierung und vernichtet die Ausländer“ in Peking ein. Ausländer und chinesische Christen suchten Zuflucht im Gesandtschaftsviertel."
ron_diplomatic.37.a:1 "So sei es"
ron_diplomatic.37.a:1 "Zerschmettere sie"
ron_diplomatic.38.t:0 "Die Qing-Regierung verkündet ihre Neutralität"
ron_diplomatic.38.d:0 "Der Boxeraufstand, Boxeraufstand oder Yihetuan-Bewegung war ein bewaffneter und gewalttätiger antichristlicher und antiimperialistischer Aufstand in China zwischen 1899 und 1901, gegen Ende der Qing-Dynastie. Initiiert wurde er von der in Rechtschaffenheit vereinten Miliz (Yìhéquán), die im Englischen als „die Boxer“ bekannt ist, da viele ihrer Mitglieder chinesische Kampfkünste praktiziert hatten, die in der westlichen Welt damals auch als „Chinesisches Boxen“ bezeichnet wurden. Nach dem Japanisch-Chinesischen Krieg von 1895 hatte sich unter den Dorfbewohnern Nordchinas ein Groll gegen christliche Missionare und die Ausweitung ausländischer Einflusssphären aufgebaut. Während einer schweren Dürre breiteten sich Gewalt und Mord in Shandong und der nordchinesischen Tiefebene aus und zielten auf ausländisches Eigentum, christliche Missionare und chinesische Christen. Im Juni 1900 marschierten Boxkämpfer in der Überzeugung, gegen ausländische Waffen unverwundbar zu sein, mit dem Slogan „Unterstützt die Qing-Regierung und vernichtet die Ausländer“ in Peking ein. Ausländer und chinesische Christen suchten Zuflucht im Gesandtschaftsviertel."
ron_diplomatic.38.a:1 "Feiglinge"
ron_diplomatic.39.t:0 "Die Qing-Regierung bereitet sich auf einen Vorstoß gegen uns vor"
ron_diplomatic.39.d:0 "Der Boxeraufstand, Boxeraufstand oder Yihetuan-Bewegung war ein bewaffneter und gewalttätiger antichristlicher und antiimperialistischer Aufstand in China zwischen 1899 und 1901, gegen Ende der Qing-Dynastie. Initiiert wurde er von der in Rechtschaffenheit vereinten Miliz (Yìhéquán), die im Englischen als „die Boxer“ bekannt ist, da viele ihrer Mitglieder chinesische Kampfkünste praktiziert hatten, die im Westen damals auch als „Chinesisches Boxen“ bezeichnet wurden. Nach dem Japanisch-Chinesischen Krieg von 1895 hatte sich unter den Dorfbewohnern Nordchinas ein Groll gegen christliche Missionare und die Ausweitung ausländischer Einflusssphären aufgebaut. Während einer schweren Dürre breiteten sich Gewalt und Mord in Shandong und der nordchinesischen Tiefebene aus und zielten auf ausländisches Eigentum, christliche Missionare und chinesische Christen. Im Juni 1900 marschierten Boxkämpfer in der Überzeugung, gegen ausländische Waffen unverwundbar zu sein, mit dem Slogan „Unterstützt die Qing-Regierung und vernichtet die Ausländer“ in Peking ein. Ausländer und chinesische Christen suchten Zuflucht im Gesandtschaftsviertel."
ron_diplomatic.39.a:1 "Bring es an"
ron_early_wars_news.432.t:0 "Das Qing-China erklärt ausländischen Mächten den Krieg"
ron_early_wars_news.432.d:0 "Das kaiserliche Dekret zur Kriegserklärung an ausländische Mächte war eine Kriegserklärung der Qing-Dynastie aus dem Jahr 1900 an die Kolonialmächte Russland, die USA, Großbritannien, Japan, Frankreich, Deutschland, Italien, Spanien, Österreich-Ungarn, Belgien und die Niederlande gleichzeitig. Diese Kriegserklärung war eine der direkten Ursachen des Boxeraufstands und des Acht-Nationen-Bündnisses, die wiederum zum Boxerprotokoll führten. Dieses kaiserliche Dekret wurde offiziell im Namen des Kaisers Guangxu erlassen und trug sein offizielles kaiserliches Siegel. Der Kaiser von China stand zu dieser Zeit auf Anordnung der Kaiserinwitwe Cixi de facto unter Hausarrest, und die gesamte Verwaltungsgewalt lag in den Händen der Kaiserinwitwe."
ron_early_wars_news.432.a:0 "Das war ein schlechter Schachzug"
RON_Qing_War_Warning_tt:0 "§RWarning: Diese Option wird zu einem Krieg mit allen Großmächten führen.§!\n \n"
ron_diplomatic.83.t:0 "Laden Sie Russland zur Allianz der Acht Nationen ein"
ron_diplomatic.83.d:0 "Nach dem Ende des russisch-chinesischen Krieges um die Mandschurei hat das russische Reich keine Hintergedanken mehr in China. Wir können es in die Allianz der Acht Nationen einladen und der Bedrohung durch den Boxer ein Ende setzen!"
ron_diplomatic.83.a:1 "Lasst sie uns einladen."

DNC_Expansion_country.18.t:0 "Russland marschiert in die Mandschurei ein"
DNC_Expansion_country.18.d:0 "Die russische Invasion in der Mandschurei erfolgte aufgrund der peinlichen Niederlage der chinesischen Streitkräfte im Gefolge des Ersten Japanisch-Chinesischen Krieges. Damals veranlassten die Sorgen über Chinas Niederlage gegen die Japaner und deren Besetzung der Mandschurei die Russen, ihre seit langem gehegten Pläne zur imperialen Expansion in ganz Eurasien voranzutreiben."
DNC_Expansion_country.18.a:1 "OK"
DNC_Expansion_news.18.t:0 "Russland marschiert in die Mandschurei ein"
DNC_Expansion_news.18.d:0 "Die russische Invasion in der Mandschurei erfolgte aufgrund der peinlichen Niederlage der chinesischen Streitkräfte im Gefolge des Ersten Japanisch-Chinesischen Krieges. Damals veranlassten die Sorgen über Chinas Niederlage gegen die Japaner und deren Besetzung der Mandschurei die Russen, ihre seit langem gehegten Pläne zur imperialen Expansion in ganz Eurasien voranzutreiben."
DNC_Expansion_news.18.a:1 "OK"

ron_diplomatic.77.t:0 "Invasion der Mandschurei"
ron_diplomatic.77.d:0 "Die russische Invasion in der Mandschurei ist notwendig, da wir nach dem Ersten Japanisch-Chinesischen Krieg aufgrund der Besorgnis über Chinas Niederlage gegen die Japaner und deren Besetzung der Mandschurei unsere lang gehegten Pläne zur imperialen Expansion in ganz Eurasien beschleunigen. Mit dem Bau der Südmandschurei-Eisenbahn ist Mukden zu einer russischen Hochburg geworden. Wie sollen wir das mandschurische Territorium erobern? Wir können entweder Diplomatie oder Krieg einsetzen."
ron_diplomatic.77.a:1 "Diplomatie wird nie funktionieren! Auf in den Krieg!"
russian_invasion_of_MAN_wp:0 "Weißer Frieden gegen China"
russian_invasion_of_MAN_wp_qin:0 "Weißer Frieden gegen Russland"
russian_invasion_of_MAN_historic:0 "Unsere Gewinne konsolidieren"
russian_invasion_of_MAN_QIN_peace:0 "Unsere Gewinne konsolidieren"
russian_invasion_of_MAN_historic_ai:0 "Frieden erzwingen"
  russian_invasion_of_MAN_QIN_peace_ai:0 "Frieden erzwingen"
ron_diplomatic.78.t:0 "Russland erklärt den Krieg"
ron_diplomatic.78.d:0 "Nach dem Chinesisch-Japanischen Krieg befürchtete das Russische Reich, dass die Japaner die Mandschurei beanspruchen könnten, und beschloss daher, uns überraschend zu überfallen! Aufgrund des Boxeraufstands werden wir die Macht der Qing nicht auf sie richten können. Aber das wird kein Problem sein."
ron_diplomatic.78.a:1 "Auf in den Krieg!"

ron_diplomatic.79.t:0 "White Peace-Vorschlag"
ron_diplomatic.79.d:0 "Es war ein langer und verlustreicher Krieg, in dem scheinbar keine Seite gewinnt. Die Russen haben uns ein Friedensabkommen vorgelegt. Was sollen wir tun?"
ron_diplomatic.79.a:1 "Akzeptiere es"
ron_diplomatic.79.b:1 "Wir können das noch gewinnen!"

ron_diplomatic.80.t:0 "White Peace-Vorschlag"
ron_diplomatic.80.d:0 "Es war ein langer und verlustreicher Krieg, in dem scheinbar keine Seite gewinnt. Die Russen haben uns ein Friedensabkommen vorgelegt. Was sollen wir tun?"
ron_diplomatic.80.a:1 "Akzeptiere es"
ron_diplomatic.80.b:1 "Wir können das noch gewinnen!"
ron_diplomatic.81.t:0 "Die Frage des Friedens"
ron_diplomatic.81.d:0 "Aus einem langen und grausamen Krieg ist das Russische Reich immer wieder als Sieger hervorgegangen. Wir müssen dem Russischen Reich ein Friedensabkommen zukommen lassen und ihm seine Ansprüche in der Mandschurei zurückgeben."
ron_diplomatic.81.a:1 "Ein trauriger Tag."
ron_diplomatic.81.b:1 "Wir werden bis zum bitteren Ende kämpfen!"
ron_diplomatic.82.t:0 "Die Frage des Friedens"
ron_diplomatic.82.d:0 "Nach einem langen und grausamen Krieg ist das russische Reich wieder aufgetaucht. Wir müssen dem chinesischen Reich einen Friedensvertrag zukommen lassen und ihm seine Ansprüche im Fernen Osten zusprechen."
ron_diplomatic.82.a:1 "Ein trauriger Tag."
ron_diplomatic.82.b:1 "Wir werden bis zum bitteren Ende kämpfen!"

DNC_Expansion_country.19.t:0 "Annexion des Oranje-Freistaats"
DNC_Expansion_country.19.d:0 "Der Oranje-Freistaat kämpfte tapfer und galant mit seinem Schwesterstaat Transvaal, ist heute jedoch unserer überwältigenden Militärmacht erlegen."
DNC_Expansion_country.19.a:1 "OK"
DNC_Expansion_news.19.t:0 "Großbritannien annektiert den Oranje-Freistaat"
DNC_Expansion_news.19.d:0 "Der Oranje-Freistaat kämpfte tapfer und galant mit seinem Schwesterstaat Transvaal, ist heute jedoch dem britischen Gebietsdrang erlegen. Nachdem britische Truppen Bloemfontein besetzt hatten, wurde der Oranje-Freistaat von Großbritannien als Oranje-Flusskolonie annektiert."
DNC_Expansion_news.19.a:1 "OK"

DNC_Expansion_country.20.t:0 "Greife die Belgier an"
DNC_Expansion_country.20.d:0 "Heute griffen die Boxer Belgier im Bahnhof Fengtai an. Der Schaden an der Eisenbahn, den Fahrzeugen und Gebäuden in Fengtai wird auf 150.000 Tael geschätzt. Dreitausend chinesische Soldaten aus Lu-tai werden heute auf dem Weg nach Fengtai hier erwartet. Gerüchten zufolge sind ein oder zwei belgische Ingenieure auf der Lu-han-Linie getötet worden."
DNC_Expansion_country.20.a:1 "OK"
DNC_Expansion_news.20.t:0 "Boxer greifen Belgier an"
DNC_Expansion_news.20.d:0 "Heute griffen die Boxer Belgier im Bahnhof Fengtai an. Der Schaden an der Eisenbahn, den Fahrzeugen und Gebäuden in Fengtai wird auf 150.000 Tael geschätzt. Dreitausend chinesische Soldaten aus Lu-tai werden heute auf dem Weg nach Fentai hier erwartet. Gerüchten zufolge sind ein oder zwei belgische Ingenieure auf der Lu-han-Linie getötet worden."
DNC_Expansion_news.20.a:1 "OK"

DNC_Expansion_country.21.t:1 "Friedenstruppen treffen in China ein"
DNC_Expansion_country.21.d:1 "Friedenstruppen aus verschiedenen europäischen Ländern treffen in China ein und schließen sich dort den japanischen Streitkräften an, um den Boxeraufstand niederzuschlagen. Truppenabordnungen aus Großbritannien, den USA, Japan, Deutschland, Italien, Frankreich und Russland – jeweils etwa 100 Mann stark – wurden nach Peking beordert, um ihre jeweiligen Gesandtschaften zu bewachen."
DNC_Expansion_country.21.a:1 "OK"
