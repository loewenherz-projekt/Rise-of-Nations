DNC_Expansion_country.221.t:0 "Die Jungtürken-Revolution"
DNC_Expansion_country.221.d:0 "Auslöser der Revolution war ein Treffen zwischen Eduard VII. von Großbritannien und Nikolaus II. von Russland im Ostseehafen Reval. Die Anglo-Russische Konvention von 1907 rückte die brüchigen britisch-russischen Beziehungen in den Vordergrund, indem sie die Grenzen festlegte, die ihre jeweilige Kontrolle in Persien und Afghanistan festlegten. Die Verteidigung ihres schrumpfenden Staates war zu einem Gegenstand intensiven Berufsstolzes innerhalb der Militärs geworden, was sie dazu veranlasste, die Waffen gegen ihren Staat zu erheben. Viele unionistische Offiziere der in Saloniki stationierten Dritten Osmanischen Armee befürchteten, dass das Treffen ein Vorspiel zur Teilung Mazedoniens sei, und meuterten gegen Sultan Abdülhamid II. Der Wunsch, den Staat zu erhalten, nicht ihn zu zerstören, trieb die Revolutionäre an."
DNC_Expansion_country.221.a:1 "Für den Sultan!"
ron_diplomatic.121.t:0 "Die Jungtürken erobern Konstantinopel"
ron_diplomatic.121.d:0 "Nach einem langen und brutalen Krieg haben die Jungtürken Konstantinopel eingenommen. Wir waren gezwungen, die Verfassung von 1886 wieder einzuführen, wobei Sultan Abdul Hamid die Macht mit dem demokratischen Parlament teilte."
ron_diplomatic.121.a:1 "Ein fairer Deal."
ron_diplomatic.122.t:0 "Junge Türken zerschlagen"
ron_diplomatic.122.d:0 "Nach einem langen und brutalen Krieg wurden die Jungtürken vernichtend geschlagen und wir haben die Kontrolle über die Stadt Skopje. Alle unsere Generäle, die sich der Revolution angeschlossen hatten, haben sich bereit erklärt, wieder beizutreten, und wir haben unsere Kontrolle über den Balkan gefestigt."
ron_diplomatic.122.a:1 "Ein großartiger Sieg!"
