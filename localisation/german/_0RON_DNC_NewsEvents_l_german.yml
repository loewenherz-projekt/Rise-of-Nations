DNC_Expansion_country.198.t:0 "Pfadfinderlager gegründet"
DNC_Expansion_country.198.d:0 "Das Pfadfinderlager Brownsea Island war der Ort eines Jungencampings auf Brownsea Island im südenglischen Poole Harbour. Generalleutnant Baden-Powell organisierte das Camp, um seine Ideen für das Buch „Scouting for Boys“ zu testen. Jungen aus unterschiedlichen sozialen Schichten nahmen an Aktivitäten rund um Camping, Beobachtung, Holzhandwerk, Ritterlichkeit, Lebensrettung und Patriotismus teil. Das Camp gilt als Ursprung der weltweiten Pfadfinderbewegung."
DNC_Expansion_country.198.a:1 "OK"
