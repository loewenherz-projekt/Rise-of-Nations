ron_diplomatic.27.t:0 "Belagerung von Kimberley wird aufgehoben"
ron_diplomatic.27.d:0 "Während des Zweiten Burenkrieges zwischen den beiden Burenrepubliken und Großbritannien entließ General French Kimberley nach 123 Tagen Belagerung. Trotz zahlreicher Angriffe der Burenkommandos und 5.800 abgefeuerter Granaten hatte die Stadt nur 131 Opfer unter bewaffneten Verteidigern und 21 Zivilisten zu beklagen, doch rund 1.500 Menschen, hauptsächlich Farbige und Schwarze, starben an Hunger und Krankheiten. Die Kindersterblichkeitsrate war während der viermonatigen Belagerung unter Weißen auf 67,1 % und unter Farbigen und Schwarzen auf 91,2 % gestiegen. Die Briten verloren mindestens 2.237 Mann der Entsatztruppen."
ron_diplomatic.27.a:1 "OK"

DNC_Expansion_country.10.t:0 "Schlacht von Paardeberg"
DNC_Expansion_country.10.d:0 "Die Schlacht von Paardeberg oder Perdeberg („Pferdeberg“) war eine der großen Schlachten während des Zweiten Burenkriegs. Sie wurde in der Nähe von Paardeberg Drift an den Ufern des Modder River im Oranje-Freistaat nahe Kimberley ausgetragen. Lord Methuen rückte im November 1899 die Eisenbahnlinie entlang vor, um die belagerte Stadt Kimberley (und die ebenfalls belagerte Stadt Mafeking) zu entsetzen. An dieser Front wurden Schlachten bei Graspan, Belmont und Modder River geschlagen, bevor der Vormarsch nach der britischen Niederlage in der Schlacht von Magersfontein für zwei Monate unterbrochen wurde. Im Februar 1900 übernahm Feldmarschall Lord Roberts persönlich das Kommando über eine erheblich verstärkte britische Offensive. Die Armee des Burengenerals Piet Cronjé zog sich aus ihrer verschanzten Stellung bei Magersfontein in Richtung Bloemfontein zurück, nachdem ihre Kommunikationslinien von Generalmajor John French unterbrochen worden waren, dessen Kavallerie kurz zuvor die Stellung der Buren umgangen hatte, um Kimberley zu entsetzen. Cronjés langsam vorrückende Kolonne wurde von den Franzosen bei Paardeberg abgefangen, wo der Burengeneral nach einer langen Belagerung schließlich kapitulierte, nachdem er einen direkten Angriffsversuch von Generalleutnant Horatio Kitchener abgewehrt hatte."
DNC_Expansion_country.10.a:1 "OK"
