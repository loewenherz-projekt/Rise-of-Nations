DNC_Expansion_country.200.t:0 "Quebec-Brücke stürzt ein"
DNC_Expansion_country.200.d:0 "Edward A. Hoare war während dieser Zeit Chefingenieur des Unternehmens, während Collingwood Schreiber Chefingenieur des Eisenbahn- und Kanalbauamts in Ottawa war. Hoare hatte noch nie an einer Auslegerbrücke mit einer Länge von mehr als 91 Metern gearbeitet. Dies führte schließlich zu einer suboptimalen Konstruktion der Brücke, die schließlich zum Einsturz führte. 88 Menschen starben und weitere wurden verletzt."
DNC_Expansion_country.200.a:1 "OK"
DNC_Expansion_news.200.t:0 "Quebec-Brücke stürzt ein"
DNC_Expansion_news.200.d:0 "Edward A. Hoare war während dieser Zeit Chefingenieur des Unternehmens, während Collingwood Schreiber Chefingenieur des Eisenbahn- und Kanalbauamts in Ottawa war. Hoare hatte noch nie an einer Auslegerbrücke mit einer Länge von mehr als 91 Metern gearbeitet. Dies führte schließlich zu einer suboptimalen Konstruktion der Brücke, die schließlich zum Einsturz führte. 88 Menschen starben und weitere wurden verletzt."
DNC_Expansion_news.200.a:1 "OK"

DNC_Expansion_country.201.t:0 "Anglo-russische Entente unterzeichnet"
DNC_Expansion_country.201.d:0 "Anglo-Russische Entente, ein Pakt, in dem Großbritannien und Russland ihre Kolonialstreitigkeiten in Persien, Afghanistan und Tibet beilegten. Er legte Einflusssphären in Persien fest, legte fest, dass sich kein Land in die inneren Angelegenheiten Tibets einmischen würde, und erkannte den britischen Einfluss in Afghanistan an. Das Abkommen führte zur Gründung der Triple Entente. Graf Alexander Iswolski und Sir Arthur Nicolson unterzeichneten die Anglo-Russische Entente in Sankt Petersburg und sorgten damit für eine Pause im Großen Spiel in Zentralasien."
DNC_Expansion_country.201.a:1 "Tolle Neuigkeiten."
DNC_Expansion_news.201.t:0 "Anglo-russische Entente unterzeichnet"
DNC_Expansion_news.201.d:0 "Anglo-Russische Entente, ein Pakt, in dem Großbritannien und Russland ihre Kolonialstreitigkeiten in Persien, Afghanistan und Tibet beilegten. Er legte Einflusssphären in Persien fest, legte fest, dass sich kein Land in die inneren Angelegenheiten Tibets einmischen würde, und erkannte Großbritanniens Einfluss auf Afghanistan an. Das Abkommen führte zur Gründung der Triple Entente. Graf Alexander Iswolski und Sir Arthur Nicolson unterzeichneten die Anglo-Russische Entente in Sankt Petersburg und sorgten damit für eine Pause im Großen Spiel in Zentralasien."
DNC_Expansion_news.201.a:1 "OK"
epictool_tip_entente:0 "§RDies wird dazu führen, dass Großbritannien nicht in den Ersten Weltkrieg eintritt."!§
ron_diplomatic.118.t:0 "Entente-Vorschlag"
ron_diplomatic.118.d:0 "Nach jahrelangen Streitigkeiten mit dem Russischen Reich in Zentral- und Ostasien hat unser Parlament beschlossen, diese Streitigkeiten beizulegen. Wir sollen der Entente einen Vorschlag unterbreiten. Wenn sie ihn annimmt, wird dies zu einer neuen Allianz führen, die den von Deutschland geführten Mittelmächten Konkurrenz machen wird. Sollen wir ihnen den Vorschlag unterbreiten? "
ron_diplomatic.118.a:1 "Senden Sie es."
ron_diplomatic.118.b:1 "Wir bleiben neutral."
ron_diplomatic.119.t:0 "Großbritannien unterbreitet einen Vorschlag"
ron_diplomatic.119.d:0 "Nach jahrelangen Streitigkeiten mit Großbritannien in Zentral- und Ostasien hat das britische Parlament beschlossen, diese Streitigkeiten beizulegen. Es hat der Entente einen Vorschlag unterbreitet. Sollten wir diesen annehmen, würde dies zu einer neuen Allianz führen, die den von Deutschland geführten Mittelmächten Konkurrenz machen würde. Sollten wir den Vorschlag annehmen?"
ron_diplomatic.119.a:1 "Neue Verbündete!"
ron_diplomatic.119.b:1 "Scheiß auf die Briten!"
ron_diplomatic.120.t:0 "Ein Verbündeter auf der anderen Seite"
ron_diplomatic.120.d:0 "Nach Verhandlungen zwischen Russland und Großbritannien wurde eine Vereinbarung getroffen und Großbritannien tritt nun unserem Bündnis bei. Ein großartiger Tag und eine große Freude für alle drei Nationen!"
ron_diplomatic.120.a:1 "Großartig!"


DNC_Expansion_country.202.t:0 "RMS Lusitania bricht zur Jungfernfahrt auf"
DNC_Expansion_country.202.d:0 "Die Lusitania, die der Cunard Line gehörte, wurde gebaut, um im äußerst lukrativen transatlantischen Passagierverkehr mitzumischen. Der Bau begann 1904, und nach Fertigstellung des Rumpfes und der Hauptaufbauten lief die Lusitania am 7. Juni 1906 vom Stapel. Mit einer Länge von rund 240 Metern und einem Gewicht von rund 31.550 Tonnen ist das Linienschiff das größte Schiff der Welt."
DNC_Expansion_country.202.a:1 "OK"
