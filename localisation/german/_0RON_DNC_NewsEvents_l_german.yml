DNC_Expansion_country.152.t:0 "Die russische Verfassung von 1905"
DNC_Expansion_country.152.d:0 "Die russische Verfassung von 1905 ist eine umfassende Revision der Reichsgrundgesetze von 1832. Sie wandelte den ehemals absolutistischen Staat in einen Staat um, in dem der Kaiser erstmals seine autokratische Macht mit einem Parlament teilte. Die Verfassung trat heute, am Vorabend der Eröffnung der ersten Staatsduma, in Kraft. Diese erste russische Verfassung war eine Revision der früheren Reichsgrundgesetze, die 1832 als Gesetzbuch des Russischen Reiches veröffentlicht worden waren. Sie wurde während der Russischen Revolution von 1905 verabschiedet, als letzter Versuch der Zarenregierung, ihre Existenz zu sichern und ein Abgleiten der Nation in völlige Anarchie zu verhindern."
DNC_Expansion_country.152.a:1 "Neue Verfassung bekannt geben"
DNC_Expansion_country.152.b:1 "So etwas werden wir nicht zulassen"
DNC_Expansion_news.152.t:0 "Die russische Verfassung von 1905"
DNC_Expansion_news.152.d:0 "Die russische Verfassung von 1905 ist eine umfassende Revision der Reichsgrundgesetze von 1832. Sie wandelte den ehemals absolutistischen Staat in einen Staat um, in dem der Kaiser erstmals seine alleinige Macht mit einem Parlament teilte. Das geschah heute, am Vorabend der Eröffnung der ersten Staatsduma. Diese erste russische Verfassung war eine Revision der früheren Reichsgrundgesetze, die 1832 als Gesetzbuch des Russischen Reiches veröffentlicht worden waren. Sie wurde während der Russischen Revolution von 1905 verabschiedet, als letzter Versuch der Zarenregierung, ihre Existenz zu sichern und das Land vor dem Abgleiten in völlige Anarchie zu bewahren."
DNC_Expansion_news.152.a:1 "OK"

DNC_Expansion_country.153.t:0 "Der Eulsa-Vertrag"
DNC_Expansion_country.153.d:0 "Nach dem Sieg des kaiserlichen Japans im Russisch-Japanischen Krieg, dem darauf folgenden Rückzug Koreas aus dem russischen Einflussbereich und dem Taft-Katsura-Abkommen, in dem sich die USA angeblich verpflichteten, sich nicht in Korea betreffende Angelegenheiten in die Angelegenheiten Japans einzumischen, versuchte die japanische Regierung, ihren Einflussbereich auf der koreanischen Halbinsel zu formalisieren. Delegierte beider Kaiserreiche trafen sich in Seoul, um Meinungsverschiedenheiten in Fragen der zukünftigen koreanischen Außenpolitik beizulegen. Da der koreanische Kaiserpalast jedoch von japanischen Truppen besetzt war und die Kaiserlich Japanische Armee an strategischen Standorten in ganz Korea stationiert war, war die koreanische Seite in den Diskussionen deutlich im Nachteil."
DNC_Expansion_country.153.a:1 "Senden Sie an Japan"
DNC_Expansion_country.153.b:1 "Bring es"
