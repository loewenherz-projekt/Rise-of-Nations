DNC_Expansion_country.112.t:0 "Der große Brand von Baltimore"
DNC_Expansion_country.112.d:0 "Der Große Brand von Baltimore wütete vom 7. bis 8. Februar 1904 in Baltimore, Maryland, USA. Mehr als 1.500 Gebäude wurden dem Erdboden gleichgemacht und rund 1.000 schwer beschädigt. Der Sachschaden durch die Katastrophe belief sich auf schätzungsweise 100 Millionen Dollar. 1.231 Feuerwehrleute, darunter professionelle Lkw- und Löschfahrzeuge der Baltimore City Fire Department, halfen, den Brand unter Kontrolle zu bringen."
DNC_Expansion_country.112.a:1 "Ein weiteres Großfeuer, eine weitere Katastrophe."
DNC_Expansion_news.112.t:0 "Der große Brand von Baltimore"
DNC_Expansion_news.112.d:0 "Der Große Brand von Baltimore wütete von Sonntag, dem 7. Februar, bis Montag, dem 8. Februar 1904, in Baltimore, Maryland, USA. Mehr als 1.500 Gebäude wurden dem Erdboden gleichgemacht und rund 1.000 schwer beschädigt. Der Sachschaden durch die Katastrophe belief sich auf schätzungsweise 100 Millionen Dollar. 1.231 Feuerwehrleute, darunter professionelle Lkw- und Löschfahrzeuge der Baltimore City Fire Department, halfen, den Brand unter Kontrolle zu bringen."
DNC_Expansion_news.112.a:1 "OK"

DNC_Expansion_country.113.t:0 "Schlacht von Port Arthur"
DNC_Expansion_country.113.d:0 "Die Schlacht von Port Arthur vom 8. bis 9. Februar 1904 markierte den Beginn des Russisch-Japanischen Krieges. Er begann mit einem überraschenden nächtlichen Angriff eines Geschwaders japanischer Zerstörer auf die neutrale russische Flotte, die in Port Arthur in der Mandschurei vor Anker lag, und wurde am nächsten Morgen mit einem Gefecht fortgesetzt."
DNC_Expansion_country.113.a:1 "Ein kleiner Sieg."
