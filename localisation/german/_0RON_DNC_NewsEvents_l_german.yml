DNC_Expansion_country.218.t:0 "Mann behauptet, Nordpol erreicht zu haben"
DNC_Expansion_country.218.d:0 "Nach seiner letzten Expedition kehrte Cook in die Arktis zurück. Er plante, den Nordpol zu erreichen, gab seine Absicht jedoch erst im August 1907 bekannt, als er sich bereits in der Arktis befand. Er verließ Annoatok, eine kleine Siedlung im Norden Grönlands, im Februar 1908. Cook behauptete, er habe den Pol am 21. April 1908 erreicht, nachdem er von der Axel-Heiberg-Insel nach Norden gereist war und nur zwei Inuit, Ahpellah und Etukishook, mitgenommen hatte. Auf der Reise nach Süden behauptete er, durch offenes Wasser von seiner geplanten Route nach Annoatok abgeschnitten worden zu sein. Diese Behauptung wird von vielen Quellen bestritten."
DNC_Expansion_country.218.a:1 "OK"
