ron_diplomatic.49.t:0 "Ein Bündnis mit Großbritannien"
ron_diplomatic.49.d:0 "Die Bedrohung durch das russische Reich ist groß, und wir brauchen einen würdigen Verbündeten zur Verteidigung, falls die verräterischen Russen uns angreifen sollten. Die Briten wären eine gute Wahl, denn mit ihrem stetig wachsenden Reich und ihrer Flotte können wir unseren Schutz vor einer russischen Invasion garantieren."
ron_diplomatic.49.a:1 "Wir werden ihnen eine Allianz vorschlagen"
ron_diplomatic.49.b:1 "Wir brauchen keine europäische Hilfe."

ron_diplomatic.50.t:0 "Japanischer Antrag auf ein Bündnis"
ron_diplomatic.50.d:0 "Heute trafen japanische Diplomaten in London ein, um über ein Verteidigungsbündnis zu beraten. Die Hauptbedrohung ist das Russische Reich. Ein Bündnis mit Japan im Osten könnte sich im Falle eines Krieges mit dem Russischen Reich oder einer anderen europäischen Macht als lebenswichtig erweisen."
ron_diplomatic.50.a:1 "Dieses Angebot nehmen wir gerne an!"
ron_diplomatic.50.b:1 "Wir brauchen keine japanische Hilfe."

ron_diplomatic.51.t:0 "Großbritannien nimmt unser Angebot an!"
ron_diplomatic.51.d:0 "Britische Diplomaten haben uns eine Antwort geschickt, in der sie sagen, dass sie unser Verteidigungsbündnis akzeptiert haben. Dies ist ein historischer Tag, der die Geburt der anglo-japanischen Allianz markiert."
ron_diplomatic.51.a:1 "Tolle Neuigkeiten!"

ron_diplomatic.52.t:0 "Großbritannien lehnt unser Angebot ab!"
ron_diplomatic.52.d:0 "Britische Diplomaten haben uns eine Antwort geschickt, in der sie sagen, dass sie unser Verteidigungsbündnis ablehnen. Sie halten uns für schwach."
ron_diplomatic.52.a:1 "Wir brauchten sie sowieso nicht"

ron_diplomatic_news.4.t:0 "Großbritannien lehnt anglo-japanisches Bündnis ab"
ron_diplomatic_news.4.d:0 "Am 28. Januar trafen japanische Diplomaten in London ein und begannen Gespräche über ein Verteidigungsbündnis mit Russland als Hauptziel. Die Verhandlungen scheiterten jedoch schnell am britischen Neutralitätsdruck. Ein Bündnis zwischen zwei so weit voneinander entfernten Nationen hätte negative Auswirkungen auf Russland gehabt. Doch heute atmet das Russische Reich auf."
ron_diplomatic_news.4.a:1 "OK"

DNC_Expansion_country.64.t:0 "Anglo-Japanische Allianz "
DNC_Expansion_country.64.d:0 "Das erste anglo-japanische Bündnis wurde zwischen Großbritannien und Japan geschlossen. Das Bündnis wurde am 30. Januar 1902 im Londoner Lansdowne House vom britischen Außenminister Lord Lansdowne und dem japanischen Diplomaten Hayashi Tadasu unterzeichnet. Die größte Bedrohung für beide Seiten geht offenbar von Russland aus."
DNC_Expansion_country.64.a:1 "OK"
DNC_Expansion_news.64.t:0 "Anglo-Japanische Allianz "
DNC_Expansion_news.64.d:0 "Das erste anglo-japanische Bündnis wurde zwischen Großbritannien und Japan geschlossen. Das Bündnis wurde am 30. Januar 1902 im Londoner Lansdowne House vom britischen Außenminister Lord Lansdowne und dem japanischen Diplomaten Hayashi Tadasu unterzeichnet. Die größte Bedrohung für beide Seiten geht offenbar von Russland aus."
