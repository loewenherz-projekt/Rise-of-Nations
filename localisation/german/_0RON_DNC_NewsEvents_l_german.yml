DNC_Expansion_country.169.t:0 "Die Zweite Genfer Konvention"
DNC_Expansion_country.169.d:0 "Das Zweite Genfer Abkommen zur Verbesserung des Loses der verwundeten, kranken und schiffbrüchigen Angehörigen der Streitkräfte zur See wurde heute auf der Zweiten Genfer Konvention diskutiert. Das Genfer Abkommen zur Verbesserung des Loses der verwundeten, kranken und schiffbrüchigen Angehörigen der Streitkräfte zur See soll das Haager Abkommen von 1999 ersetzen. Es überträgt die wichtigsten Schutzbestimmungen des Ersten Genfer Abkommens auf den Kampf auf See."
