DNC_Expansion_news.214.a:1 "OK"

DNC_Expansion_country.215.t:0 "Das Rennen von New York nach Paris"
DNC_Expansion_country.215.d:0 "Das New York-Paris-Rennen war ein Automobilwettbewerb, bei dem die Fahrer versuchten, von New York nach Paris zu fahren. Angesichts des Stands der Automobiltechnik und der Straßeninfrastruktur war dies eine beachtliche Herausforderung. Nur drei von sechs Teilnehmern schafften es, die Strecke zu bewältigen. Sieger wurde das amerikanische Team mit einem Thomas Flyer von 1907."
DNC_Expansion_country.215.a:1 "OK"
