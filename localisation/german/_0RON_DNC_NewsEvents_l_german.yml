ron_diplomatic.31.t:0 "Burengeneral Piet Cronjé kämpft bis zum Tod"
ron_diplomatic.31.d:0 "In der letzten Nacht der Schlacht, dem 26. Februar, wurde das Royal Canadian Regiment of Infantry (heute The Royal Canadian Regiment), das bei einem früheren Angriff auf geschützte Burenstellungen über siebzig Soldaten verloren hatte, erneut zur Führung des täglichen Bataillonswechsels herangezogen. Statt wie erwartet am nächsten Morgen einen weiteren Angriff durchzuführen, rückten die Kanadier mit Hilfe der Royal Engineers nachts auf das Burenlager vor und begannen dann, auf einer Anhöhe 60 Meter von den Burenlinien entfernt Schützengräben auszuheben. Am 27. Februar 1900 wachten die Buren auf und starrten in die Mündungen kanadischer Gewehre. Die Kanadier erwarteten eine sofortige Kapitulation, doch Cronje entschied sich, bis zum letzten Mann für die Sache der Buren zu kämpfen, anstatt zu kapitulieren."
ron_diplomatic.31.a:1 "Heroisch"

DNC_Expansion_country.12.t:0 "FC Bayern München gegründet"
DNC_Expansion_country.12.d:0 "Der Fußball-Club Bayern München, allgemein bekannt als FC Bayern München, FCB, Bayern Munich oder FC Bayern, ist ein deutscher Profisportverein mit Sitz in München, Bayern. Er ist vor allem für seine professionelle Fußballmannschaft bekannt, die in der Bundesliga spielt, der höchsten Spielklasse des deutschen Fußballligasystems. Mit einem Rekord von 30 nationalen Titeln, darunter acht in Folge seit 2013, und 20 nationalen Pokalsiegen sowie zahlreichen europäischen Titeln ist der Bayern München der erfolgreichste Verein in der deutschen Fußballgeschichte. Der FC Bayern München wurde 1900 von 11 Fußballspielern unter der Leitung von Franz John gegründet. Obwohl Bayern 1932 seine erste nationale Meisterschaft gewann, wurde der Verein bei seiner Gründung 1963 nicht für die Bundesliga nominiert. Seine größte Erfolgsgeschichte erlebte der Verein Mitte der 1970er Jahre, als er unter der Führung von Franz Beckenbauer dreimal in Folge (1974–1976) den Europapokal der Landesmeister gewann. Insgesamt hat der FC Bayern elf Europapokal-/UEFA Champions League-Finals erreicht und im Finale 2020 im Rahmen eines kontinentalen Triples seinen sechsten Titel gewonnen. Danach war er erst der zweite europäische Verein, der das kontinentale Triple zweimal erreichen konnte. Bayern hat außerdem einen UEFA-Pokal, einen Europapokal der Pokalsieger, zwei UEFA-Superpokale, zwei FIFA-Klub-Weltmeisterschaften und zwei Weltpokale gewonnen und ist damit einer der international erfolgreichsten europäischen Vereine und der einzige deutsche Verein, der beide internationalen Titel gewonnen hat. Mit dem Gewinn der FIFA Klub-Weltmeisterschaft 2020 wurde Bayern München erst der zweite Verein, der das Sextuple gewann. Der Verein pflegt traditionelle lokale Rivalitäten mit 1860 München und dem 1. FC Nürnberg sowie seit Mitte der 1990er Jahre mit Borussia Dortmund."
DNC_Expansion_country.12.a:1 "OK"
DNC_Expansion_news.12.t:0 "FC Bayern München gegründet"
DNC_Expansion_news.12.d:0 "Der Fußball-Club Bayern München, allgemein bekannt als FC Bayern München, FCB, Bayern Munich oder FC Bayern, ist ein deutscher Profisportverein mit Sitz in München, Bayern. Er ist vor allem für seine professionelle Fußballmannschaft bekannt, die in der Bundesliga spielt, der höchsten Spielklasse des deutschen Fußballs. Bayern ist der erfolgreichste Verein in der deutschen Fußballgeschichte und hat einen Rekord von 30 nationalen Titeln gewonnen, darunter acht in Folge seit 2013, sowie 20 nationale Pokalsiege und zahlreiche europäische Auszeichnungen. Der FC Bayern München wurde 1900 von 11 Fußballspielern unter der Leitung von Franz John gegründet."
DNC_Expansion_news.12.a:1 "OK"

DNC_Expansion_country.13.t:0 "Dr. Karl Landsteiner berichtet über die Klassifizierung der Blutgruppen"
DNC_Expansion_country.13.d:0 "Die menschlichen ABO-Blutgruppen wurden 1901 von dem in Österreich geborenen US-amerikanischen Biologen Karl Landsteiner entdeckt. Landsteiner fand heraus, dass es im Blut Substanzen – Antigene und Antikörper – gibt, die eine Verklumpung der roten Blutkörperchen verursachen, wenn rote Blutkörperchen eines Typs zu denen eines zweiten Typs gegeben werden. Er erkannte drei Gruppen – A, B und O – anhand ihrer Reaktionen aufeinander. Eine vierte Gruppe, AB, wurde ein Jahr später von einem anderen Forschungsteam identifiziert. Rote Blutkörperchen der Gruppe A verklumpen mit Spenderblut der Gruppe B; die der Gruppe B verklumpen mit Blut der Gruppe A; die der Gruppe AB verklumpen mit denen der Gruppe A oder B, weil AB-Zellen sowohl A- als auch B-Antigene enthalten; und die der Gruppe O verklumpen im Allgemeinen mit keiner Gruppe, weil sie weder A- noch B-Antigene enthalten. Die Anwendung der Kenntnisse über das ABO-System in der Bluttransfusionspraxis ist von enormer Bedeutung, da Fehler fatale Folgen haben können."
DNC_Expansion_country.13.a:1 "OK"
