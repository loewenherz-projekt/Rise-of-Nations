DNC_Expansion_country.94.t:0 "Serbische Royals ermordet"
DNC_Expansion_country.94.d:0 "Serbien erlebte heute eines der schockierendsten Ereignisse seiner modernen Geschichte: die Ermordung von König Alexander und Königin Draga. Das Königspaar wurde von einer Gruppe Armeeoffiziere in einem Staatsstreich brutal ermordet, der die Nation und die Welt erschütterte. Die Verschwörer, angeführt von Offizieren, die mit der zunehmend autokratischen Herrschaft des Königs und seiner umstrittenen Ehe mit Königin Draga unzufrieden waren, wollten die Obrenović-Dynastie beenden, die Serbien jahrzehntelang regiert hatte. Der Tod von König Alexander hat ein Machtvakuum im Herzen der serbischen Monarchie hinterlassen. Ohne direkte Thronfolger steht Serbien nun an einem Scheideweg, und die Frage der Nachfolge ist gestellt ... Wer wird das Königreich in eine neue Ära führen?"
DNC_Expansion_country.94.a:1 "Wir werden die Karadordevic-Dynastie an die Macht bringen!"
DNC_Expansion_country.94.b:1 "Die Karadordevic-Dynastie soll vom jungen Prinzen geführt werden!"
DNC_Expansion_country.94.c:1 "Die Karadordevic-Dynastie soll vom älteren Prinzen geführt werden!"
DNC_Expansion_country.94.e:1 "Wir werden die Obrenovic-Dynastie durch seinen Bruder fortführen!"
DNC_Expansion_news.94.t:0 "Serbische Royals ermordet"
DNC_Expansion_news.94.d:0 "Heute werden der serbische König Alexander Obrenović und Königin Draga in Belgrad von der Organisation „Schwarze Hand“ (Crna Ruka) ermordet. Eine Gruppe von Armeeoffizieren brach in den königlichen Palast in Belgrad ein. Sie erschossen den Kommandanten der königlichen Leibwache, schalteten die Lichter aus und irrten wütend fluchend im Dunkeln umher, bis sie in das königliche Schlafzimmer eindrangen und die versteinerten Alexander und Draga in einem Schrank versteckt vorfanden."
DNC_Expansion_news.94.a:1 "Zutiefst traurig."

DNC_Expansion_country.95.t:0 "Ford Motors gefunden"
DNC_Expansion_country.95.d:0 "Die Ford Motor Company wird von Henry Ford mit 28.000 Dollar in bar von zwölf Investoren gegründet. Erster Präsident ist nicht Ford, sondern der lokale Bankier John S. Gray. Er wird gewählt, um die Befürchtungen der Investoren zu zerstreuen, Ford würde das neue Unternehmen so hinterlassen, wie er seinen Vorgänger verlassen hatte: bankrott und unvollständig."
DNC_Expansion_country.95.a:1 "OK"
