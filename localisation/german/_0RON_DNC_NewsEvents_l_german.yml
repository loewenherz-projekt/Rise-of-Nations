DNC_Expansion_country.22.t:0 "Britische Soldaten nehmen Pretoria ein"
DNC_Expansion_country.22.d:0 "In der zweiten Phase des Krieges, nachdem die Zahl der britischen Truppen unter dem Kommando von Lord Roberts stark erhöht worden war, starteten die Briten 1900 eine weitere Offensive zur Befreiung der Belagerungen, die diesmal erfolgreich war. Nachdem Natal und die Kapkolonie gesichert waren, konnte die britische Armee in Transvaal einmarschieren und die Hauptstadt der Republik, Pretoria, schließlich einnehmen."
DNC_Expansion_country.22.a:1 "OK"
