DNC_Expansion_country.187.t:0 "Hershey Park eröffnet"
DNC_Expansion_country.187.d:0 "Milton Hershey, der Besitzer der Hershey Chocolate Company, erkundete ein nahegelegenes Grundstück, das als Freizeitpark für die Mitarbeiter seiner Schokoladenfirma dienen sollte. 1904 und 1905 begannen Besucher das Gelände des zukünftigen Parks zu besuchen, während der erste Pavillon des Parks im Herbst 1905 errichtet wurde. Der Park wurde heute offiziell eröffnet, als er als Hershey Park eröffnet wurde."
