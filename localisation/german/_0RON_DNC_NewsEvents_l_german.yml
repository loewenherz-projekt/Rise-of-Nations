DNC_Expansion_country.233.t:0 "Tel Aviv gefunden"
DNC_Expansion_country.233.d:0 "Eine Gruppe von Juden, darunter auch Einwohner Jaffas, folgte der Initiative von Akiva Aryeh Weiss und schloss sich zur Ahuzat Bayit-Gesellschaft zusammen. Eines der Ziele der Gesellschaft war die Schaffung eines „hebräischen Stadtzentrums in einer gesunden Umgebung, geplant nach den Regeln der Ästhetik und modernen Hygiene“. Die Stadtplanung der neuen Stadt war von der Gartenstadtbewegung beeinflusst. Die ersten 60 Grundstücke wurden in Kerem Djebali bei Jaffa von dem Niederländer Jacobus Kann erworben, der sie auf seinen Namen eintragen ließ, um das türkische Verbot des jüdischen Landerwerbs zu umgehen."
DNC_Expansion_country.233.a:1 "OK"
