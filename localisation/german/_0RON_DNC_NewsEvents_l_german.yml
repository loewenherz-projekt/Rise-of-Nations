DNC_Expansion_country.226.t:0 "Fords Modell T vorgestellt"
DNC_Expansion_country.226.d:0 "Das Ford Modell T ist ein Automobil der Ford Motor Company. Es gilt als das erste erschwingliche Automobil, das der amerikanischen Mittelschicht das Autofahren ermöglichte. Der relativ niedrige Preis war teilweise auf die effiziente Fertigung von Ford zurückzuführen, die Fließbandproduktion anstelle von Einzelanfertigungen in Handarbeit ermöglichte."
