DNC_Expansion_country.11.t:0 "Kapitulation vor den Briten?"
DNC_Expansion_country.11.d:0 "In der letzten Nacht der Schlacht, dem 26. Februar, wurde das Royal Canadian Infantry Regiment (heute The Royal Canadian Regiment), das bei einem früheren Angriff auf geschützte Burenstellungen über siebzig Soldaten verloren hatte, erneut zur Führung des täglichen Bataillonswechsels herangezogen. Statt wie erwartet am nächsten Morgen einen weiteren Angriff durchzuführen, rückten die Kanadier mit Hilfe der Royal Engineers nachts auf das Burenlager vor und begannen dann, auf einer Anhöhe 60 Meter von den Burenlinien entfernt Schützengräben auszuheben. Am 27. Februar 1900 wachten die Buren auf, starrten in die Mündungen kanadischer Gewehre und ergaben sich. Cronjé ergab sich mit etwa 4.019 Männern und 50 Frauen; etwa 10 % der gesamten Burenarmee waren nun gefangen."
DNC_Expansion_country.11.a:1 "Aufgeben"
DNC_Expansion_country.11.b:1 "Kämpfe bis zum letzten Mann"
