DNC_Expansion_country.136.t:0 "Der FC Chelsea wird gegründet"
DNC_Expansion_country.136.d:0 "Der Chelsea Football Club ist ein englischer Profifußballverein mit Sitz in Fulham, London. Der 1905 gegründete Verein spielt in der Premier League, der höchsten englischen Fußballliga. Chelsea zählt zu den erfolgreichsten Vereinen Englands und hat über 30 Meistertitel gewonnen, darunter sechs Meisterschaften und sechs europäische Trophäen. Heimstadion ist Stamford Bridge."
DNC_Expansion_country.136.a:1 "OK"
