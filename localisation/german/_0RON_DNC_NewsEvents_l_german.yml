DNC_Expansion_country.205.t:0 "Finanzkrise in den USA abgewendet"
DNC_Expansion_country.205.d:0 "Die Panik von 1907 war eine dreiwöchige Finanzkrise in den USA ab Mitte Oktober, als die New Yorker Börse im Vergleich zu ihrem Höchststand des Vorjahres um fast 50 % fiel. Die Panik entstand, da dies mitten in einer Wirtschaftsrezession geschah, und es kam zu zahlreichen Anstürmen auf Banken und Treuhandgesellschaften. Die Panik von 1907 breitete sich schließlich im ganzen Land aus, als viele staatliche und lokale Banken und Unternehmen Insolvenz anmeldeten. Hauptursachen für den Ansturm waren ein Rückgang der Marktliquidität bei einigen New Yorker Banken und ein Vertrauensverlust der Einleger, der durch unregulierte Nebenwetten in sogenannten Bucket Shops noch verschlimmert wurde. Diese Krise konnte abgewendet werden, als JP Morgan und andere große amerikanische Bankunternehmen im Austausch gegen Zuschüsse der US-Regierung Geld zur Abwendung der Krise beisteuerten."
DNC_Expansion_country.205.a:1 "OK"
