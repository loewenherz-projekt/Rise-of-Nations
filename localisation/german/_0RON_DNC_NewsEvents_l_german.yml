DNC_Expansion_country.6.t:0 "Die Ermordung von Gouverneur William Goebe"
DNC_Expansion_country.6.d:0 "Während das Wahlergebnis noch umstritten war, begab sich Goebel am Morgen des 30. Januar 1900, flankiert von zwei Leibwächtern, zum Old State Capitol, obwohl er vor einem angeblichen Attentat gewarnt worden war. Über den genauen Hergang des Vorfalls gibt es unterschiedliche Berichte, doch wurden aus dem nahegelegenen State Building fünf oder sechs Schüsse abgefeuert, von denen einer Goebel in die Brust traf und ihn schwer verletzte. Taylor, der bis zur endgültigen Entscheidung über die Wahl als Gouverneur amtierte, rief die Miliz zusammen und berief die Generalversammlung zu einer Sondersitzung ein, die jedoch nicht nach Frankfort, sondern nach London, Kentucky, einem republikanischen Wahlkreis, verlegt werden sollte. Die republikanische Minderheit folgte dem Aufruf und begab sich nach London. Die Demokraten widersetzten sich dem Schritt, viele gingen stattdessen nach Louisville. Beide Gruppen beanspruchten die Autorität, doch die Republikaner waren zu wenige, um beschlussfähig zu sein."
DNC_Expansion_country.6.a:1 "Unglücklich"
DNC_Expansion_news.6.t:0 "Die Ermordung von Gouverneur William Goebe"
DNC_Expansion_news.6.d:0 "Während das Wahlergebnis noch umstritten war, begab sich Goebel am Morgen des 30. Januar 1900, flankiert von zwei Leibwächtern, zum Old State Capitol, obwohl er vor einem mutmaßlichen Attentat gewarnt worden war. Über den genauen Hergang des Vorfalls gibt es unterschiedliche Berichte, doch wurden aus dem nahegelegenen State Building fünf oder sechs Schüsse abgefeuert, von denen einer Goebel in die Brust traf und ihn schwer verletzte. Taylor, der bis zur endgültigen Entscheidung über die Wahl als Gouverneur amtierte, rief die Miliz zusammen und berief die Generalversammlung zu einer Sondersitzung ein, die jedoch nicht nach Frankfort, sondern nach London, Kentucky, einem republikanischen Bezirk, verlegt werden sollte. Die republikanische Minderheit folgte dem Aufruf und begab sich nach London. Die Demokraten widersetzten sich dem Schritt, viele gingen stattdessen nach Louisville. Beide Gruppen beanspruchten die Autorität, doch die Republikaner waren zu wenige, um beschlussfähig zu sein."
DNC_Expansion_news.6.a:1 "OK"

DNC_Expansion_country.7.t:0 "Schlacht von Ladysmith"
DNC_Expansion_country.7.d:0 "Die Schlacht von Ladysmith war eine der ersten Auseinandersetzungen des Zweiten Burenkrieges. Eine große britische Streitmacht, die sich in der Garnisonsstadt Ladysmith konzentriert hatte, startete am 30. Oktober 1899 einen Ausfall gegen die Burenarmeen, die die Stadt langsam umzingelten. Das Ergebnis war eine Katastrophe für die Briten. Der Hauptteil wurde in die Stadt zurückgedrängt, und eine isolierte Abteilung von 800 Mann musste sich Kommandant De Wet ergeben. Die Buren nutzten ihren Vorteil nicht, indem sie in Richtung des strategisch wichtigen Hafens von Durban vorrückten, sondern begannen stattdessen mit der Belagerung von Ladysmith, die nach 118 Tagen beendet wurde. John Norwood wurde für seine Taten während der Schlacht mit dem Victoria-Kreuz ausgezeichnet."
DNC_Expansion_country.7.a:1 "OK"
