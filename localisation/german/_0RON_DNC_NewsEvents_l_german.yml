DNC_Expansion_country.132.t:0 "Die Kathedrale des Allerheiligsten Sakraments wird eröffnet."
DNC_Expansion_country.132.d:0 "Die Kathedrale wurde von Jamieson &amp; Sons erbaut, die auch viele andere bedeutende kirchliche und kommunale Gebäude in Neuseeland errichteten. Petre hatte bereits Erfahrung mit der Verwendung von Beton und entwarf als Zeichner Hafenmauern und Abwasserkanäle. Dieses Wissen ermöglichte es Petre, beim Bau innovative Methoden anzuwenden, wie beispielsweise das Gießen von Kernmauern mit Beton und die anschließende Verblendung mit Stein."
DNC_Expansion_country.132.a:1 "OK"
