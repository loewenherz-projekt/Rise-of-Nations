DNC_Expansion_country.131.t:0 "Beginn der Russischen Revolution von 1905"
DNC_Expansion_country.131.d:0 "Heute beginnt die Russische Revolution nach dem Massaker vom Schwarzen Sonntag. Die Kaiserlich Russische Armee eröffnet das Feuer auf Demonstranten in Riga (Gouvernement Livland). Dabei werden 73 Menschen getötet und 200 verletzt. Die Bevölkerung fordert Reformen und eine Lösung der Agrarprobleme. Diese Revolution kommt zur Unzeit, da der Russisch-Japanische Krieg noch andauert."
DNC_Expansion_country.131.a:1 "OK"
