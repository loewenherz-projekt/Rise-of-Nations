DNC_Expansion_country.9.t:0 "Belagerung von Kimberley wird aufgehoben"
DNC_Expansion_country.9.d:0 "Während des Zweiten Burenkrieges zwischen den beiden Burenrepubliken und Großbritannien entließ General French Kimberley nach 123 Tagen Belagerung. Trotz zahlreicher Angriffe der Burenkommandos und 5.800 abgefeuerter Granaten hatte die Stadt nur 131 Opfer unter bewaffneten Verteidigern und 21 Zivilisten zu beklagen, doch rund 1.500 Menschen, hauptsächlich Farbige und Schwarze, starben an Hunger und Krankheiten. Die Kindersterblichkeitsrate war während der viermonatigen Belagerung unter Weißen auf 67,1 % und unter Farbigen und Schwarzen auf 91,2 % gestiegen. Die Briten verloren mindestens 2.237 Mann der Entsatztruppen."
DNC_Expansion_country.9.a:1 "OK"
