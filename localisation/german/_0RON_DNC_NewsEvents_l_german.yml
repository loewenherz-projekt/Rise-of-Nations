DNC_Expansion_country.2.t:0 "Politik der offenen Tür"
DNC_Expansion_country.2.d:0 "Die „Politik der offenen Tür“ war eine Grundsatzerklärung der USA aus den Jahren 1899 und 1900 zum Schutz gleicher Privilegien zwischen den mit China handelnden Ländern und zur Unterstützung der territorialen und administrativen Integrität Chinas. Die Erklärung wurde in Form von Rundschreiben von US-Außenminister John Hay an Großbritannien, Deutschland, Frankreich, Italien, Japan und Russland veröffentlicht. Die „Politik der offenen Tür“ stieß in den USA auf nahezu allgemeine Zustimmung und bildete über 40 Jahre lang einen Eckpfeiler der amerikanischen Außenpolitik in Ostasien."
DNC_Expansion_country.2.a:1 "Eine neue Ära"
