DNC_Expansion_country.203.t:0 "Neuseeland wird ein Dominion"
DNC_Expansion_country.203.d:0 "Neuseeland entschied sich gegen eine Teilnahme an der Australischen Föderation und wurde durch die Proklamation von König Edward VII. zum Dominion of New Zealand und heute, am Dominion Day. Der Dominion-Status war ein öffentliches Zeichen der politischen Unabhängigkeit, die sich im Laufe eines halben Jahrhunderts durch eine verantwortungsvolle Regierung für Neufundland und Neuseeland entwickelt hatte."
DNC_Expansion_country.203.a:1 "Akzeptieren"
DNC_Expansion_country.203.b:1 "Direkte Regel fortsetzen"
