DNC_Expansion_country.72.t:0 "Kubanische Unabhängigkeit"
DNC_Expansion_country.72.d:0 "Heute ist ein großer Tag für Kuba. Unsere Besatzer, die Amerikaner, haben ihr Versprechen gehalten und uns die Unabhängigkeit gewährt! Kuba wird nun gedeihen, ohne dass es jemals Einfluss von außen oder Besatzung erfährt. Wir werden ein Leuchtfeuer der Hoffnung für den Rest der Welt sein! Oder doch nicht?"
DNC_Expansion_country.72.a:1 "Ein bedeutsamer Tag"
DNC_Expansion_news.72.t:0 "Kubanische Unabhängigkeit"
DNC_Expansion_news.72.d:0 "Heute, nach dreieinhalb Jahren US-Militärbesatzung, erlangt Kuba endlich die Unabhängigkeit von seinen amerikanischen Besatzern, wobei die Amerikaner auf der Insel eine demokratische Regierung einsetzen."
DNC_Expansion_news.72.a:1 "OK"

ron_diplomatic.54.t:0 "Die Frage der Unabhängigkeit"
ron_diplomatic.54.d:0 "Als die Amerikaner uns nach dem Spanisch-Amerikanischen Krieg besetzten, hatten sie uns ein Versprechen gegeben: Unabhängigkeit. Jetzt ist es soweit. Die Straßen Havannas sind voller kubanischer Flaggen, und in Guantánamo herrscht Tränen. Die Frage ist nun: Werden die Amerikaner ihr Versprechen einlösen?"
ron_diplomatic.54.a:1 "Lange genug!"

ron_diplomatic.55.t:0 "Die Kuba-Frage"
ron_diplomatic.55.d:0 "Als wir Kuba nach dem Spanisch-Amerikanischen Krieg besetzten, hatten wir ihnen ein Versprechen gegeben: die Unabhängigkeit. Jetzt ist es soweit. Die Straßen Havannas sind voller kubanischer Flaggen, und Guantánamo ist in Tränen aufgelöst. Die Frage ist nun, ob wir unseren Teil des Versprechens einhalten werden. Die Zeit, den kubanischen Nationalismus zu beenden, ist vorbei. Wir können uns entweder diplomatisch darauf einigen, sie zu Untertanen zu machen, oder ihnen die Unabhängigkeit gewähren."
ron_diplomatic.55.a:1 "Lasst das kubanische Volk frei sein!"
ron_diplomatic.55.b:1 "Machen wir eine Marionette aus ihnen."

ron_diplomatic.56.t:0 "Amerika fordert Einhaltung"
ron_diplomatic.56.d:0 "Die Amerikaner haben uns ein Telegramm geschickt, in dem sie darum bitten, unsere Insel zu einer Marionette des amerikanischen Staates zu machen. Wir könnten in Zukunft unabhängig werden, aber dies ist ein klarer Bruch des Versprechens, das uns die Amerikaner vor Jahren gegeben haben. Was sollen wir tun?"
ron_diplomatic.56.a:1 "Wir werden uns niemals der amerikanischen Oberherrschaft beugen!"
ron_diplomatic.56.b:1 "Wir haben keine Wahl. Ein Untertan zu sein ist besser, als unter amerikanischer Herrschaft zu stehen."

ron_diplomatic.57.t:0 "Kuba lehnt unsere Forderungen ab"
ron_diplomatic.57.d:0 "Heute trafen kubanische Diplomaten in Washington ein, um uns die kubanische Reaktion auf unsere Forderungen mitzuteilen. Sie waren nicht zufrieden. Die Kubaner haben sich entschieden, unsere Forderungen abzulehnen und die Unabhängigkeit zu erlangen, die wahre Unabhängigkeit."
ron_diplomatic.57.a:0 "Das ist schade."

ron_diplomatic.58.t:0 "Kuba akzeptiert unsere Forderungen"
ron_diplomatic.58.d:0 "Heute trafen kubanische Diplomaten in Washington ein, um uns die kubanische Antwort auf unsere Forderungen mitzuteilen. Sie waren froh, von uns „befreit“ zu werden. Die Kubaner haben sich entschieden, unsere Forderungen zu akzeptieren und ihre Unabhängigkeit zu erlangen, unsere Unabhängigkeit."
ron_diplomatic.58.a:1 "Tolle Neuigkeiten!"

ron_diplomatic_news.5.t:0 "Kuba erlangt unter amerikanischer Herrschaft die Unabhängigkeit"
ron_diplomatic_news.5.d:0 "Als die Amerikaner Kuba nach dem Spanisch-Amerikanischen Krieg besetzten, hatten sie Kuba ein Versprechen gegeben: Unabhängigkeit. Heute scheinen die Amerikaner die Unabhängigkeit Kubas zu erfüllen, indem sie ihm die Unabhängigkeit unter amerikanischer Oberhoheit gewährten. Ein halber Kompromiss, aber dennoch Unabhängigkeit."
ron_diplomatic_news.5.a:1 "OK"


DNC_Expansion_country.73.t:0 "Vertrag von Vereeniging"
DNC_Expansion_country.73.d:0 "Heute traf sich die burische Führung in Klerksdorp, Transvaal, nachdem die Briten freies Geleit garantiert hatten. Anwesend waren Marthinus Steyn, Präsident des Freistaats, und Schalk Burger, amtierender Präsident von Transvaal, sowie die Burengeneräle Louis Botha, Jan Smuts, Christiaan de Wet und Koos de la Rey. Sie besprachen den Kriegsverlauf und die Aufnahme von Verhandlungen mit den Briten. Diese Vereinbarung sah die Einstellung der Feindseligkeiten und die spätere Selbstverwaltung von Transvaal (Südafrikanische Republik) und Oranje-Freistaat als britische Kolonien vor. Die Burenrepubliken erklärten sich bereit, unter die Souveränität der britischen Krone zu kommen, und die britische Regierung stimmte verschiedenen Details zu."
DNC_Expansion_country.73.a:1 "OK"
DNC_Expansion_news.73.t:0 "Vertrag von Vereeniging"
DNC_Expansion_news.73.d:0 "Heute traf sich die burische Führung in Klerksdorp, Transvaal, nachdem die Briten freies Geleit garantiert hatten. Anwesend waren Marthinus Steyn, Präsident des Freistaats, und Schalk Burger, amtierender Präsident von Transvaal, sowie die Burengeneräle Louis Botha, Jan Smuts, Christiaan de Wet und Koos de la Rey. Sie besprachen den Kriegsverlauf und die Aufnahme von Verhandlungen mit den Briten. Diese Vereinbarung sah die Einstellung der Feindseligkeiten und die spätere Selbstverwaltung von Transvaal (Südafrikanische Republik) und Oranje-Freistaat als britische Kolonien vor. Die Burenrepubliken erklärten sich bereit, unter die Souveränität der britischen Krone zu kommen, und die britische Regierung stimmte verschiedenen Details zu."
DNC_Expansion_news.73.a:1 "OK"

DNC_Expansion_country.74.t:0 "Streik der Anthrazitkohle"
DNC_Expansion_country.74.d:0 "Der Anthrazitkohlestreik ist ein Streik der United Mine Workers of America in den Anthrazitkohlefeldern im Osten Pennsylvanias. Die Bergleute streikten für höhere Löhne, kürzere Arbeitstage und die Anerkennung ihrer Gewerkschaft. Der Streik droht, die Brennstoffversorgung amerikanischer Großstädte im Winter zu unterbrechen. Sie fordern mehr Rechte, Löhne und bessere Arbeitsbedingungen."
DNC_Expansion_country.74.a:1 "Wir werden ihre Forderungen erfüllen"
DNC_Expansion_country.74.b:1 "Das wird bald aussterben."
