DNC_Expansion_country.28.t:0 "Die Robert-Charles-Unruhen"
DNC_Expansion_country.28.d:0 "Die Robert-Charles-Unruhen in New Orleans, Louisiana, begannen, nachdem der afroamerikanische Arbeiter Robert Charles während einer Auseinandersetzung einen weißen Polizisten erschoss und der Festnahme entging. Es folgte eine groß angelegte Fahndung nach ihm, woraufhin ein weißer Mob in der ganzen Stadt Randale auslöste und Schwarze angriff. "
DNC_Expansion_country.28.a:1 "OK"
