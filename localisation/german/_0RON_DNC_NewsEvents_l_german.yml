DNC_Expansion_country.239.t:0 "Erster Mensch, der über den Kanal flog"
DNC_Expansion_country.239.d:0 "Louis Charles Joseph Blériot ist ein französischer Pilot, Erfinder und Ingenieur. Er entwickelte die ersten praktischen Autoscheinwerfer und baute ein profitables Unternehmen für deren Herstellung auf. Einen Großteil seines Einkommens finanzierte er für den Bau eines erfolgreichen Flugzeugs. Blériot war der Erste, der die bis heute gebräuchliche Kombination aus handbetriebenem Joystick und fußbetriebenem Seitenruder zur Steuerung der Flugzeugsteuerflächen einsetzte. Blériot war auch der Erste, der einen funktionierenden, motorisierten und bemannten Eindecker baute. Weltberühmt wurde er durch den ersten Flug über den Ärmelkanal, für den er den von der Tageszeitung Daily Mail ausgelobten Preis von 1.000 Pfund gewann."
DNC_Expansion_country.239.a:1 "OK"
