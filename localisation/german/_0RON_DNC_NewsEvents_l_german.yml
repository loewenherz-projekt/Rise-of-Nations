DNC_Expansion_country.62.t:0 "Zugunglück in New York"
DNC_Expansion_country.62.d:0 "Bei einem Zugunfall im Park Avenue Tunnel der New York Central Railroad kommen 17 Menschen ums Leben, 38 werden verletzt. Der Unfall führt zu einer erhöhten Nachfrage nach elektrischen Zügen und einem Verbot von Dampflokomotiven in New York City."
DNC_Expansion_country.62.a:1 "OK"
