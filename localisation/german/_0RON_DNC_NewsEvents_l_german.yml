DNC_Diplomacy.1.t:0 "[From.GetName] schlägt königliche Hochzeit vor"
DNC_Diplomacy.1.d:0 "Während das zeitgenössische westliche Ideal die Ehe als einzigartige Verbindung zwischen zwei verliebten Menschen betrachtet, wird die Ehe in Familien, in denen Vererbung eine zentrale Rolle für Macht oder Erbe spielt (wie etwa in Königsfamilien), oft anders gesehen. Oft müssen politische oder andere nicht-romantische Funktionen erfüllt werden, und der relative Reichtum und die Macht der potenziellen Ehepartner werden berücksichtigt. Heiraten aus politischen, wirtschaftlichen oder diplomatischen Gründen waren jahrhundertelang unter europäischen Herrschern gängige Praxis. Die sorgfältige Auswahl des Ehepartners war wichtig, um den königlichen Status einer Familie zu wahren. Je nach Landesrecht konnte ein Prinz oder König, der eine Bürgerliche ohne königliches Blut heiratete, möglicherweise keinen Anspruch auf den königlichen Status seines Vaters erheben, selbst wenn der Erstgeborene als Sohn eines Herrschers anerkannt wurde. Traditionell spielten bei der Vereinbarung königlicher Ehen viele Faktoren eine Rolle. Ein solcher Faktor war die Größe der Ländereien, die die andere Königsfamilie regierte oder kontrollierte. Ein weiterer, damit zusammenhängender Faktor war die Stabilität der Kontrolle über dieses Gebiet; Wenn in einer königlichen Familie territoriale Instabilität herrscht, sind andere Mitglieder des Königshauses weniger geneigt, in diese Familie einzuheiraten. Ein weiterer Faktor waren politische Allianzen. Heirat war ein wichtiges Mittel, um königliche Familien und „ihre Länder in Friedens- und Kriegszeiten“ zusammenzuhalten und konnte viele wichtige politische Entscheidungen rechtfertigen."
DNC_Diplomacy.1.a:1 "Vereinige beide Dynastien (Game Over)"
DNC_Diplomacy.1.b:1 "Eine Personalunion"
DNC_Diplomacy.1.c:1 "Ein Militärbündnis"
DNC_Diplomacy.1.e:1 "Sie sind unter uns"

DNC_Diplomacy.2.t:0 "[From.GetName] Akzeptiert Uniting Dynasties"
DNC_Diplomacy.2.d:0 "Während das zeitgenössische westliche Ideal die Ehe als einzigartige Verbindung zwischen zwei verliebten Menschen betrachtet, wird die Ehe in Familien, in denen Vererbung eine zentrale Rolle für Macht oder Erbe spielt (wie etwa in Königsfamilien), oft anders gesehen. Oft müssen politische oder andere nicht-romantische Funktionen erfüllt werden, und der relative Reichtum und die Macht der potenziellen Ehepartner werden berücksichtigt. Heiraten aus politischen, wirtschaftlichen oder diplomatischen Gründen waren jahrhundertelang unter europäischen Herrschern gängige Praxis. Die sorgfältige Auswahl des Ehepartners war wichtig, um den königlichen Status einer Familie zu wahren. Je nach Landesrecht konnte ein Prinz oder König, der eine Bürgerliche ohne königliches Blut heiratete, möglicherweise keinen Anspruch auf den königlichen Status seines Vaters erheben, selbst wenn der Erstgeborene als Sohn eines Herrschers anerkannt wurde. Traditionell spielten bei der Vereinbarung königlicher Ehen viele Faktoren eine Rolle. Ein solcher Faktor war die Größe der Ländereien, die die andere Königsfamilie regierte oder kontrollierte. Ein weiterer, damit zusammenhängender Faktor war die Stabilität der Kontrolle über dieses Gebiet; Wenn in einer königlichen Familie territoriale Instabilität herrscht, sind andere Mitglieder des Königshauses weniger geneigt, in diese Familie einzuheiraten. Ein weiterer Faktor waren politische Allianzen. Heirat war ein wichtiges Mittel, um königliche Familien und „ihre Länder in Friedens- und Kriegszeiten“ zusammenzuhalten und konnte viele wichtige politische Entscheidungen rechtfertigen."
DNC_Diplomacy.2.a:1 "Exzellent"

