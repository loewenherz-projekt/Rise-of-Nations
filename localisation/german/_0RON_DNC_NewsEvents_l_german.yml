DNC_Diplomacy.15.b:1 "Wir sind nicht bereit für den Krieg"

DNC_Diplomacy.16.t:0 "[From.GetName] nimmt das Angebot an"
DNC_Diplomacy.16.d:0 "Die philippinischen Gebiete im Besitz von [From.GetName] werden nun an uns übertragen."
DNC_Diplomacy.16.a:1 "Exzellent"

DNC_Diplomacy.17.t:0 "[From.GetName] lehnt das Angebot ab"
DNC_Diplomacy.17.d:0 "Diplomaten beider Nationen trafen sich in [From.Capital.GetName] und berieten in einer Konferenz, die sich fünf Tage hinzog. Leider wurde nicht nur keine Einigung erzielt, sondern unsere großartige Nation wurde auch schwer beleidigt."
DNC_Diplomacy.17.a:1 "Das bedeutet Krieg"
DNC_Diplomacy.17.b:1 "Wir können uns keinen Krieg leisten"

DNC_Diplomacy.18.t:0 "[From.GetName] fordert neue spanische Gebiete"
DNC_Diplomacy.18.d:0 "Neuspanien, offiziell das Vizekönigreich Neuspanien oder Königreich Neuspanien, war eine integrale territoriale Einheit des spanischen Reiches, die während der spanischen Kolonialisierung Amerikas vom habsburgischen Spanien gegründet wurde. Es umfasste ein riesiges Gebiet, das das heutige Mexiko, weite Teile des amerikanischen Südwestens und Kaliforniens in Nordamerika, Mittelamerika, die nördlichen Teile Südamerikas sowie mehrere Inselgruppen im Pazifischen Ozean, nämlich die Philippinen und Guam, umfasste."
DNC_Diplomacy.18.a:1 "Akzeptieren"
DNC_Diplomacy.18.b:1 "Abfall"

DNC_Diplomacy.19.t:0 "[From.GetName] Akzeptiert"
DNC_Diplomacy.19.d:0 "Neuspanien, offiziell das Vizekönigreich Neuspanien oder Königreich Neuspanien, war eine integrale territoriale Einheit des spanischen Reiches, die während der spanischen Kolonialisierung Amerikas vom habsburgischen Spanien gegründet wurde. Es umfasste ein riesiges Gebiet, das das heutige Mexiko, weite Teile des amerikanischen Südwestens und Kaliforniens in Nordamerika, Mittelamerika, die nördlichen Teile Südamerikas sowie mehrere Inselgruppen im Pazifischen Ozean, nämlich die Philippinen und Guam, umfasste."
DNC_Diplomacy.19.a:1 "Exzellent"

DNC_Diplomacy.20.t:0 "[From.GetName] lehnt ab"
DNC_Diplomacy.20.d:0 "Neuspanien, offiziell das Vizekönigreich Neuspanien oder Königreich Neuspanien, war eine integrale territoriale Einheit des spanischen Reiches, die während der spanischen Kolonialisierung Amerikas vom habsburgischen Spanien gegründet wurde. Es umfasste ein riesiges Gebiet, das das heutige Mexiko, weite Teile des amerikanischen Südwestens und Kaliforniens in Nordamerika, Mittelamerika, die nördlichen Teile Südamerikas sowie mehrere Inselgruppen im Pazifischen Ozean, nämlich die Philippinen und Guam, umfasste."
DNC_Diplomacy.20.a:1 "Das bedeutet Krieg"
DNC_Diplomacy.20.b:1 "Wir können uns keinen Krieg leisten"

DNC_Diplomacy.21.t:0 "Verhandlungen mit [FROM.GetName]"
DNC_Diplomacy.21.d:0 "Die [FROM.GetAdjective]-Regierung sucht nach Legitimität auf der internationalen Bühne. Sie hat sich an den Papst gewandt, in der Hoffnung, dass wir [FROM.GetLeader] als Nachfolger des christlichen Erbes anerkennen. Wen sollten wir unterstützen?"
DNC_Diplomacy.21.a:0 "Unterstützen Sie Österreich-Ungarn"
DNC_Diplomacy.21.b:0 "Unterstütze Deutschland"
DNC_Diplomacy.21.c:0 "Status Quo beibehalten"

DNC_Diplomacy.22.t:0 "Der Vatikan unterstützt uns"
DNC_Diplomacy.22.d:0 "Nach Verhandlungen mit [FROM.FROM.GetName] beschloss der Vatikan, unsere Politik und Weltanschauung zu unterstützen. Mit dieser Unterstützung ist es offensichtlich, dass niemand mit uns konkurrieren kann. Andererseits bekräftigte Papst [VCT.GetLeader], dass [vatican_not_supported.GetName] diese Unterstützung nicht genießt."
DNC_Diplomacy.22.a:0 "Was für ein Segen!"

DNC_Diplomacy.23.t:0 "Der Vatikan hat unsere Beziehungen abgebrochen"
DNC_Diplomacy.23.d:0 " Nach Verhandlungen mit [FROM.FROM.GetName] hat der Vatikan beschlossen, [vatican_supported.GetName] als wahre Christen anzuerkennen. Dies untergräbt offensichtlich unseren Platz in der Welt als große Nation!"
DNC_Diplomacy.23.a:09 "Fahr zur Hölle!"

DNC_Diplomacy.24.t:0 "Verhandlungen mit [FROM.GetName]"
DNC_Diplomacy.24.d:0 "Die [FROM.GetAdjective]-Regierung sucht [ROOT.GetAdjective]-Unterstützung für ihre zukünftigen Eroberungskriege. Sie hat sich an uns gewandt, in der Hoffnung, dass wir die besagten Eroberungen anerkennen und im Gegenzug einen Anteil an der Kriegsbeute erhalten. Sollen wir annehmen?"
DNC_Diplomacy.24.a:1 "Schließen Sie sich ihnen an"
DNC_Diplomacy.24.b:1 "Höflich ablehnen"
DNC_Diplomacy.24.c:1 "Widersetzen Sie sich ihnen"
DNC_Diplomacy.24.e:1 "Versprechen Neutralität"

DNC_Diplomacy.25.t:0 "[FROM.GetName] Akzeptiert"
DNC_Diplomacy.25.d:0 "Die [FROM.GetAdjective] haben Einsicht gewonnen und beschlossen, unsere zukünftigen Eroberungskriege zu unterstützen, im Austausch für ihren Anteil an der Beute."
DNC_Diplomacy.25.a:1 "Exzellent"

DNC_Diplomacy.26.t:0 "[FROM.GetName] lehnt ab"
DNC_Diplomacy.26.d:0 "Die [FROM.GetAdjective] haben einen Beitritt zu unserer Fraktion höflich abgelehnt. Hoffen wir, dass sie unseren Eroberungen nicht im Weg stehen."
DNC_Diplomacy.26.a:1 "Sie werden dafür bezahlen ..."

DNC_Diplomacy.27.t:0 "[FROM.GetName] lehnt ab"
DNC_Diplomacy.27.d:0 "Die [FROM.GetAdjective] haben unser großzügiges Angebot arrogant abgelehnt. Darüber hinaus haben sie uns gewarnt, dass sie sich jedem Schritt, den wir in diese Richtung unternehmen, aktiv widersetzen werden. Dies könnte möglicherweise zu einem ausgewachsenen Krieg eskalieren."
DNC_Diplomacy.27.a:1 "Das bedeutet Krieg"
DNC_Diplomacy.27.b:1 "Wir können uns keinen Krieg leisten"

DNC_Diplomacy.28.t:0 "[FROM.GetName] warnt uns"
DNC_Diplomacy.28.d:0 "Die [FROM.GetAdjective] haben uns eine Nachricht geschickt, in der sie uns darüber informieren, dass sie planen, ihr Territorium innerhalb unseres Einflussbereichs massiv zu vergrößern. Darüber hinaus haben sie uns gewarnt, dass jeder Versuch unsererseits, sich ihnen entgegenzustellen, zu einem Krieg zwischen uns führen wird."
DNC_Diplomacy.28.a:1 "Ein Präventivschlag"
DNC_Diplomacy.28.b:1 "Widersetzen Sie sich ihnen trotzdem"
DNC_Diplomacy.28.c:1 "Versprechen Neutralität"

DNC_Diplomacy.29.t:0 "[FROM.GetName] Vorbereitung auf den Krieg"
DNC_Diplomacy.29.d:0 "Das [FROM.GetAdjective] hat unsere Warnung ignoriert und scheint für den Krieg zu mobilisieren."
DNC_Diplomacy.29.a:1 "Das bedeutet Krieg"
DNC_Diplomacy.29.b:1 "Wir können uns keinen Krieg leisten"

DNC_Diplomacy.30.t:0 "[FROM.GetName] verspricht Neutralität"
DNC_Diplomacy.30.d:0 "Das [FROM.GetAdjective] ist zur Vernunft gekommen und hat beschlossen, uns in unseren zukünftigen Eroberungskriegen freie Hand zu lassen."
DNC_Diplomacy.30.a:1 "Exzellent"

DNC_Diplomacy.31.t:0 "Boxeraufstand: Der Aufstand zieht sich hin …"
DNC_Diplomacy.31.d:0 "Der Boxeraufstand, auch Yihetuan-Bewegung genannt, war ein bewaffneter Aufstand in China zwischen 1899 und 1901, gegen Ende der Qing-Dynastie. Er wurde von der in Rechtschaffenheit vereinten Miliz (Yìhéquán) initiiert, die im Englischen als „Boxers“ bekannt ist, da viele ihrer Mitglieder chinesische Kampfkünste praktiziert hatten, die damals im Westen auch als „Chinesisches Boxen“ bezeichnet wurden."
DNC_Diplomacy.31.a:1 "Genug schon"
DNC_Diplomacy.31.b:1 "Ihre Sache ist gerecht"

DNC_Diplomacy.32.t:0 "China verspricht, Boxer zu vernichten"
DNC_Diplomacy.32.d:0 "Der Boxeraufstand, auch Yihetuan-Bewegung genannt, war ein bewaffneter Aufstand in China zwischen 1899 und 1901, gegen Ende der Qing-Dynastie. Er wurde von der in Rechtschaffenheit vereinten Miliz (Yìhéquán) initiiert, die im Englischen als „Boxers“ bekannt ist, da viele ihrer Mitglieder chinesische Kampfkünste praktiziert hatten, die damals im Westen auch als „Chinesisches Boxen“ bezeichnet wurden."
DNC_Diplomacy.32.a:1 "Es wurde Zeit."

DNC_Diplomacy.33.t:0 "China wird nichts gegen die Boxer unternehmen"
DNC_Diplomacy.33.d:0 "Der Boxeraufstand, auch Yihetuan-Bewegung genannt, war ein bewaffneter Aufstand in China zwischen 1899 und 1901, gegen Ende der Qing-Dynastie. Er wurde von der in Rechtschaffenheit vereinten Miliz (Yìhéquán) initiiert, die im Englischen als „Boxers“ bekannt ist, da viele ihrer Mitglieder chinesische Kampfkünste praktiziert hatten, die damals im Westen auch als „Chinesisches Boxen“ bezeichnet wurden."
DNC_Diplomacy.33.a:1 "Feiglinge..."

DNC_Diplomacy.34.t:0 "[From.GetName] fordert unsere amerikanischen Kolonien"
DNC_Diplomacy.34.d:0 "Ein Ultimatum ist eine Forderung, deren Erfüllung innerhalb einer bestimmten Frist verlangt wird und die mit einer Drohung für den Fall der Nichterfüllung verbunden ist. Ein Ultimatum ist in der Regel die letzte Forderung in einer Reihe von Forderungen. Daher ist die Frist meist kurz und die Forderung nicht verhandelbar. Die Drohung, die das Ultimatum untermauert, kann je nach Forderung und den sonstigen Umständen variieren."
DNC_Diplomacy.34.a:1 "Akzeptieren"
DNC_Diplomacy.34.b:1 "Abfall"

