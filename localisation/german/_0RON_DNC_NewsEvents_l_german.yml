DNC_Expansion_country.4.t:0 "Schlacht von Spion Kop"
DNC_Expansion_country.4.d:0 "Die Schlacht von Spion Kop war ein militärisches Gefecht zwischen britischen Streitkräften und zwei Burenrepubliken – der Südafrikanischen Republik und dem Oranje-Freistaat – während des britischen Feldzugs zur Befreiung der belagerten Stadt Ladysmith in den ersten Monaten des Zweiten Burenkrieges. Die Schlacht fand vom 23. bis 24. Januar 1900 auf dem Hügel von Spion Kop, etwa 38 Kilometer west-südwestlich von Ladysmith, statt. Sie endete mit einem Sieg der Buren."
DNC_Expansion_country.4.a:1 "Ein glücklicher Sieg."
