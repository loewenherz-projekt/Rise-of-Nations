DNC_Expansion_country.209.t:0 "Bergbaukatastrophe in Monongah"
DNC_Expansion_country.209.d:0 "Heute arbeiteten offiziell 367 Männer in den beiden Minen, die tatsächliche Zahl war jedoch viel höher, da offiziell registrierte Arbeiter oft ihre Kinder und andere Verwandte zur Hilfe mit in die Mine nahmen. Um 10:28 Uhr ereignete sich eine Explosion, die die meisten Männer in der Mine sofort tötete. Die Druckwelle richtete sowohl in der Mine als auch an der Oberfläche erheblichen Schaden an. Die Belüftungssysteme, die für die Frischluftversorgung der Mine notwendig sind, wurden zusammen mit zahlreichen Eisenbahnwaggons und anderer Ausrüstung zerstört. In der Mine wurden die das Dach stützenden Balken heruntergerissen, was zu weiteren Problemen führte, da das Dach einstürzte. Eine offizielle Ursache der Explosion wurde nicht ermittelt, aber die damaligen Ermittler gingen davon aus, dass ein elektrischer Funke oder eine der offenen Flammenlampen der Bergleute Kohlenstaub oder Methangas entzündet hatte."
DNC_Expansion_country.209.a:1 "OK"
