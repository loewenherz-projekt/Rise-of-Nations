DNC_Expansion_country.17.t:0 "Boxeraufstand"
DNC_Expansion_country.17.d:0 "Der Boxeraufstand nimmt eine neue Wendung, als die Boxer drei Dörfer in der Nähe von Peking zerstören und 60 chinesische Christen töten. Die bisher höchste Zahl an Todesopfern ist ein weiterer Beweis dafür, dass die Boxer brutal und schnell niedergeschlagen werden müssen."
