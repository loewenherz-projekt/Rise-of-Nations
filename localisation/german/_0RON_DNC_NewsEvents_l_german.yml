DNC_Expansion_country.166.t:0 "Grundlegende Gesetze, die auf der ersten Duma verkündet wurden"
DNC_Expansion_country.166.d:0 "Die Grundgesetze von 1906 beziehen sich auf eine umfassende Revision der Grundgesetze des Russischen Reiches aus dem Jahr 1832, die den ehemals absolutistischen Staat in einen Staat umwandelten, in dem der Kaiser erstmals seine autokratische Macht mit einem Parlament teilte. Dies geschah am Vorabend der Eröffnung der ersten Staatsduma. Diese erste russische Verfassung war eine Revision der früheren Grundgesetze, die 1832 als Gesetzbuch des Russischen Reiches veröffentlicht worden waren. Sie wurde während der Russischen Revolution von 1905 verabschiedet, als letzter Versuch der kaiserlichen Regierung, ihre eigene Existenz zu sichern und zu verhindern, dass die Nation in völlige Anarchie abrutschte."
DNC_Expansion_country.166.a:1 "OK"
