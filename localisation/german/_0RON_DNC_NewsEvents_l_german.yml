DNC_Expansion_country.163.t:0 "Ausbruch des Vesuvs"
DNC_Expansion_country.163.d:0 "Der Ausbruch des Vesuvs forderte über 100 Todesopfer und schleuderte die größte jemals bei einem Vesuvausbruch registrierte Lavamenge aus. Die italienischen Behörden bereiteten die Olympischen Sommerspiele 1908 vor, als der Vesuv heftig ausbrach und Neapel und die umliegenden Gemeinden verwüstete. Gelder wurden für den Wiederaufbau Neapels verwendet, und ein neuer Austragungsort für die Olympischen Spiele musste gefunden werden."
DNC_Expansion_country.163.a:1 "OK"
