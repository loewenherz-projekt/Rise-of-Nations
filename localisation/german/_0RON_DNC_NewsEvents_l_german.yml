DNC_Expansion_country.155.t:0 "Der Moskauer Aufstand"
DNC_Expansion_country.155.d:0 "Der Moskauer Aufstand, dessen Zentrum zwischen dem 7. und 17. Dezember 1905 im Moskauer Bezirk Presnia lag, war der Höhepunkt der Russischen Revolution von 1905. Tausende Arbeiter beteiligten sich an einem bewaffneten Aufstand gegen die kaiserliche Regierung für bessere sozialdemokratische Bedingungen."
