DNC_Expansion_country.179.t:0 "Erste Radiosendung"
DNC_Expansion_country.179.d:0 "Die erste Radiosendung der Weltgeschichte wurde von Reginald Fessenden gemacht, als er den erstaunten Besatzungen der Schiffe der United Fruit Company im Atlantik und in der Karibik ein „Weihnachtskonzert“ vorspielte. Ausgestrahlt von den 120 Meter hohen Türmen der Sendeanlage in Brant Rock, Massachusetts an der Atlantikküste, begann diese Sendung pünktlich um 9 Uhr mit dem in Punkten und Strichen ausgesendeten „CQ CQ CQ“, was so viel bedeutet wie ein allgemeiner Ruf an alle Stationen in Reichweite. Anschließend hielt Reginald selbst über das Mikrofon eine kurze Ansprache zum folgenden Programm. Unmittelbar darauf schaltete einer der Techniker den Edison-Phonographen ein, und eine Solostimme sang Händels „Largo“."
DNC_Expansion_country.179.a:1 "OK"
