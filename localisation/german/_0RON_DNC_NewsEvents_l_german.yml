DNC_Expansion_country.208.t:0 "Oklahoma wurde in die Union aufgenommen"
DNC_Expansion_country.208.d:0 "Der Sequoyah-Verfassungskonvent tagte in Muskogee. General Pleasant Porter, Oberhäuptling der Muscogee Creek Nation, wurde zum Präsidenten des Konvents gewählt. Die gewählten Delegierten beschlossen, dass die leitenden Beamten der Fünf Zivilisierten Stämme auch zu Vizepräsidenten ernannt werden sollten: William Charles Rogers, Oberhäuptling der Cherokee; William H. Murray, der vom Gouverneur der Chickasaw Douglas H. Johnston zum Vertreter der Chickasaw ernannt wurde; Häuptling Green McCurtain der Choctaw; Häuptling John Brown der Seminolen; und Charles N. Haskell, der zum Vertreter der Creeks gewählt wurde. Nach monatelangen Diskussionen nimmt Präsident Theodore Roosevelt Oklahoma in die Union auf."
DNC_Expansion_country.208.a:1 "OK"
