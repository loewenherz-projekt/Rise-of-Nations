DNC_Expansion_country.37.t:0 "Königin Victoria stirbt"
DNC_Expansion_country.37.d:0 "Als Königin Victoria am 22. Januar 1901 im Alter von 81 Jahren starb, überraschte dies ihre Familie, ihren Hofstaat und ihre Untertanen – nur wenige hatten sich die Sterblichkeit der Monarchin vorstellen können, die fast 64 Jahre lang über Großbritannien und sein Empire geherrscht hatte. Ihr Tod markierte das Ende der viktorianischen Ära. Stewart Richards schildert hier Königin Victorias letzte Momente, die chaotischen Vorbereitungen für ihr Staatsbegräbnis am 2. Februar 1901 und die geheimen Gegenstände in ihrem Sarg …"
DNC_Expansion_country.37.a:1 "Die Krone trauert"
