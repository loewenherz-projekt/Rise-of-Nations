DNC_Diplomacy.12.a:1 "Sie werden dafür bezahlen"
DNC_Diplomacy.12.b:1 "Wir sind nicht bereit für den Krieg"

DNC_Diplomacy.13.t:0 "[From.GetName] fordert Neufrankreich"
DNC_Diplomacy.13.d:0 "Neufrankreich war das von Frankreich kolonisierte Gebiet in Nordamerika, beginnend mit der Erkundung des Sankt-Lorenz-Golfs durch Jacques Cartier im Jahr 1534 und endend mit der Abtretung Neufrankreichs an Großbritannien und Spanien im Jahr 1763 im Rahmen des Vertrags von Paris (1763)."
DNC_Diplomacy.13.a:1 "Akzeptieren"
DNC_Diplomacy.13.b:1 "Abfall"

DNC_Diplomacy.14.t:0 "[From.GetName] Akzeptiert"
DNC_Diplomacy.14.d:0 "Neufrankreich war das von Frankreich kolonisierte Gebiet in Nordamerika, beginnend mit der Erkundung des Sankt-Lorenz-Golfs durch Jacques Cartier im Jahr 1534 und endend mit der Abtretung Neufrankreichs an Großbritannien und Spanien im Jahr 1763 im Rahmen des Vertrags von Paris (1763)."
DNC_Diplomacy.14.a:1 "Exzellent"

