DNC_Expansion_country.89.t:0 "Guantánamo Bay gepachtet"
DNC_Expansion_country.89.d:0 "Guantánamo wurde von den USA gepachtet und dient heute als Kohlenlager und Marinestützpunkt. Es ist der älteste US-Marinestützpunkt im Ausland. Die Pacht beträgt 2.000 Dollar in Gold pro Jahr."
DNC_Expansion_country.89.a:1 "OK"
