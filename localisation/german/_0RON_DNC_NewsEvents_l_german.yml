DNC_Expansion_country.224.t:0 "Sultan Abdelaziz wird abgesetzt"
DNC_Expansion_country.224.d:0 "Abdelaziz von Marokko wurde 1894 im Alter von 16 Jahren Nachfolger seines Vaters Hassan I. von Marokko als Sultan von Marokko. Er gehörte der Dynastie der Alawiten an. Er versuchte, die Zentralregierung durch die Einführung einer neuen Steuer auf Landwirtschaft und Viehzucht zu stärken, eine Maßnahme, die in Teilen der Gesellschaft auf heftigen Widerstand stieß. Dies wiederum veranlasste Abdelaziz, die Zolleinnahmen zu verpfänden und hohe Kredite bei den Franzosen aufzunehmen. Dies führte zu weit verbreiteten Aufständen und einer Revolution, die ihn 1908 zugunsten seines Bruders Abd al-Hafid absetzte."
DNC_Expansion_country.224.a:1 "Ein neuer Sultan!"
