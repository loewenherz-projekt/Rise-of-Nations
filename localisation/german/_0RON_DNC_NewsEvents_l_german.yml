DNC_Expansion_country.138.t:0 "Die Marokko-Frage" 
DNC_Expansion_country.138.d:0 "Frankreich hatte mit Spanien einen Geheimvertrag über die Teilung Marokkos geschlossen und sich verpflichtet, Großbritanniens Vorgehen in Ägypten nicht zu behindern. Im Gegenzug erhielt es freie Hand in Marokko. Deutschland hingegen beharrte auf einer Politik der offenen Tür in der Region. In einer dramatischen Demonstration imperialer Macht besuchte Kaiser Wilhelm II. Tanger und verkündete von seiner Jacht aus die Unabhängigkeit und Integrität Marokkos. Die darauf folgende internationale Panik wurde als Erste Marokkokrise bezeichnet."
DNC_Expansion_country.138.a:1 "Garantie Marokko"
