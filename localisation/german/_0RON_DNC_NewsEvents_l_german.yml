DNC_Expansion_country.127.t:0 "Erste Silvesterfeier findet am Times Square statt"
DNC_Expansion_country.127.d:0 "Die erste Silvesterfeier am Times Square fand am 31. Dezember 1904 statt. Der Eigentümer der New York Times, Adolph Ochs, beschloss, die Eröffnung des neuen Hauptsitzes der Zeitung, One Times Square, mit einem Silvesterfeuerwerk auf dem Süddach des Gebäudes zu feiern und damit das Jahr 1905 willkommen zu heißen. Fast 200.000 Menschen nahmen an der Veranstaltung teil und ersetzten damit die traditionellen Feierlichkeiten, die normalerweise in der Trinity Church stattfanden."
DNC_Expansion_country.127.a:1 "OK"
