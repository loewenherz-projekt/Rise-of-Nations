DNC_Expansion_country.147.t:0 "Vertrag von Portsmouth"
DNC_Expansion_country.147.d:0 "Die japanische Delegation bei der Friedenskonferenz in Portsmouth wurde von Außenminister Komura Jutarō geleitet und von Botschafter Takahira Kogorō unterstützt. Die russische Delegation wurde vom ehemaligen Finanzminister Sergei Witte geleitet, der vom ehemaligen Botschafter in Japan Roman Rosen und dem Spezialisten für Völkerrecht und Schiedsgerichtsbarkeit Friedrich Martens unterstützt wurde. Die Delegationen trafen am 8. August in Portsmouth ein und übernachteten im Hotel Wentworth in New Castle, New Hampshire, wo der Waffenstillstand unterzeichnet wurde. Sie wurden täglich mit Fähren über den Piscataqua River zum Marinestützpunkt in Kittery, Maine, gebracht, wo die Verhandlungen stattfanden, Russland der Abtretung Süd-Sachalins zustimmte, Korea in der japanischen Einflusssphäre anerkannte und die Mandschurei verließ."
DNC_Expansion_country.147.a:1 "Akzeptieren"
DNC_Expansion_country.147.b:1 "Wir werden niemals aufgeben"
