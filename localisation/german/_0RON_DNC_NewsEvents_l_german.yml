DNC_Expansion_country.129.t:0 "Unsere Armee kapituliert in Port Arthur"
DNC_Expansion_country.129.d:0 "Japanische Zerstörer torpedierten Retvizan und Tsesarevich, zwei der mächtigsten Schlachtschiffe der russischen Flotte, sowie den Kreuzer Pallada. Keines der Schiffe wurde jedoch zerstört, und die Wirksamkeit des Angriffs wurde durch Torpedonetze, die einen Großteil der Flotte schützten, eingeschränkt. Die Japaner landeten Truppen und belagerten den Hafen. Nach massiven Verlusten auf beiden Seiten kapitulierten die Russen in Port Arthur."
DNC_Expansion_country.129.a:1 "OK"
