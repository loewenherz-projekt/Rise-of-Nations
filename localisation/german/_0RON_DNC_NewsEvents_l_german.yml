DNC_Expansion_country.212.t:0 "Brand im Rhoads Opera House"
DNC_Expansion_country.212.d:0 "Der Brand im Rhoads Opera House ereignete sich in Boyertown, Pennsylvania, USA. Das Opernhaus geriet während eines Theaterstücks der nahegelegenen lutherischen St. John&#39;s Church in Brand. Der Brand entstand, als eine zur Bühnenbeleuchtung verwendete Petroleumlampe umgeworfen wurde und ein Feuer auf der Bühne auslöste. Kurz darauf entzündete das sich ausbreitende Feuer ein Gemisch aus Leuchtgas und Sauerstoff aus einer defekten Stereoptikon-Maschine, die in der Pause für eine Laterna-Magica-Show verwendet wurde. Die Zuschauer warteten darauf, dass das Theaterpersonal den Brand löschte, und verloren so wertvolle Minuten, die sie für eine sichere Flucht benötigten."
DNC_Expansion_country.212.a:1 "OK"
