DNC_Expansion_country.33.t:0 "Großbritannien annektiert Transvaal"
DNC_Expansion_country.33.d:0 "Heute endet der südafrikanische Kampf mit der vollständigen Annexion Transvaals durch Großbritannien. Die Bevölkerung Transvaals kämpfte brillant, und ihr Kampf wird uns noch lange in Erinnerung bleiben."
