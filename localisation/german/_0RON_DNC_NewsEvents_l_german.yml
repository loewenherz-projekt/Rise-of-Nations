DNC_DiplomacyNews.1.t:0 "Königliche Hochzeit in [From.GetName]"
DNC_DiplomacyNews.1.d:0 "Während das zeitgenössische westliche Ideal die Ehe als einzigartige Verbindung zwischen zwei verliebten Menschen betrachtet, sehen Familien, in denen die Vererbung eine zentrale Rolle für Macht oder Erbe spielt (wie etwa Königsfamilien), die Ehe oft in einem anderen Licht. Oftmals müssen politische oder andere nicht-romantische Funktionen erfüllt werden, und der relative Reichtum und die Macht der potenziellen Ehepartner werden berücksichtigt. Heiraten aus politischen, wirtschaftlichen oder diplomatischen Gründen waren jahrhundertelang unter europäischen Herrschern üblich."
DNC_DiplomacyNews.1.a:1 "Interessant..."

DNC_DiplomacyNews.2.t:0 "[From.GetName] International gedemütigt"
DNC_DiplomacyNews.2.d:0 "Diplomaten beider Länder trafen sich in [From.Capital.GetName] und berieten dort in einer etwas über eine Woche dauernden Konferenz. Leider konnte nicht nur keine Einigung erzielt werden, sondern [From.GetName] wurde auch schwer beleidigt."
DNC_DiplomacyNews.2.a:1 "Wird dies zum Krieg führen?"

DNC_DiplomacyNews.3.t:0 "[From.GetName] tritt der Konföderation bei"
DNC_DiplomacyNews.3.d:0 "Eine Konföderation (auch Staatenbund oder Liga genannt) ist ein Zusammenschluss souveräner Gruppen oder Staaten, die sich zum gemeinsamen Handeln zusammengeschlossen haben. Staatenbünde werden in der Regel durch einen Vertrag geschaffen und dienen der Regelung kritischer Fragen wie Verteidigung, Außenbeziehungen, Binnenhandel oder Währung. Dabei ist die Zentralregierung verpflichtet, alle ihre Mitglieder zu unterstützen. Konföderalismus stellt eine Hauptform des Intergouvernementalismus dar, der als jede Form der Interaktion zwischen Staaten definiert wird, die auf der Grundlage souveräner Unabhängigkeit oder Regierung erfolgt."
DNC_DiplomacyNews.3.a:1 "Hoffentlich wird es einen dauerhaften Frieden geben"

DNC_DiplomacyNews.4.t:0 "[From.GetName] Anhänge Florida"
DNC_DiplomacyNews.4.d:0 "Spanisch-Florida war der erste große europäische Landanspruch und Siedlungsversuch in Nordamerika während des europäischen Zeitalters der Entdeckungen. Während der spanischen Kolonialisierung Amerikas war La Florida Teil des Generalkapitäns von Kuba, des Vizekönigreichs Neuspanien und des spanischen Reiches. Obwohl seine Grenzen nie klar oder formal definiert wurden, war das Gebiet ursprünglich viel größer als der heutige Bundesstaat Florida und erstreckte sich über weite Teile des heutigen Südostens der Vereinigten Staaten, einschließlich des gesamten heutigen Florida sowie Teilen von Georgia, Alabama, Mississippi, North Carolina, South Carolina und Louisiana. Spaniens Anspruch auf dieses riesige Gebiet basierte auf mehreren groß angelegten Expeditionen im 16. Jahrhundert."
DNC_DiplomacyNews.4.a:1 "OK"

DNC_DiplomacyNews.5.t:0 "[From.GetName] annektiert neue französische Gebiete"
DNC_DiplomacyNews.5.d:0 "Neufrankreich war das von Frankreich kolonisierte Gebiet in Nordamerika, beginnend mit der Erkundung des Sankt-Lorenz-Golfs durch Jacques Cartier im Jahr 1534 und endend mit der Abtretung Neufrankreichs an Großbritannien und Spanien im Jahr 1763 im Rahmen des Vertrags von Paris (1763)."
DNC_DiplomacyNews.5.a:1 "OK"

DNC_DiplomacyNews.6.t:0 "[From.GetName] stimmt dem Verkauf der Philippinen zu"
DNC_DiplomacyNews.6.d:0 "Diplomaten beider Nationen trafen sich in [From.Capital.GetName] und berieten dort in einer zweitägigen Konferenz. Das Endergebnis war der Verkauf der Philippinen an [AUH.GetName] für einen nicht genannten Betrag."
DNC_DiplomacyNews.6.a:1 "OK"

DNC_DiplomacyNews.7.t:0 "[From.GetName] annektiert neue spanische Gebiete"
DNC_DiplomacyNews.7.d:0 "Neuspanien, offiziell das Vizekönigreich Neuspanien oder Königreich Neuspanien, war eine integrale territoriale Einheit des spanischen Reiches, die während der spanischen Kolonialisierung Amerikas vom habsburgischen Spanien gegründet wurde. Es umfasste ein riesiges Gebiet, das das heutige Mexiko, weite Teile des amerikanischen Südwestens und Kaliforniens in Nordamerika, Mittelamerika, die nördlichen Teile Südamerikas sowie mehrere Inselgruppen im Pazifischen Ozean, nämlich die Philippinen und Guam, umfasste."
DNC_DiplomacyNews.7.a:1 "OK"

DNC_DiplomacyNews.8.t:0 "[From.GetName] führt Gespräche mit [AUH.GetName]"
DNC_DiplomacyNews.8.d:0 "Diplomaten beider Nationen trafen sich in [From.Capital.GetName] und berieten dort eine Woche lang. Das Endergebnis wurde nicht bekannt gegeben."
DNC_DiplomacyNews.8.a:1 "OK"

DNC_DiplomacyNews.13.t:0 "[From.GetName] überträgt amerikanische Kolonien an [USA.GetName]"
DNC_DiplomacyNews.13.d:0 "Diplomaten beider Nationen trafen sich in [From.Capital.GetName] und berieten dort eine Woche lang. Das Endergebnis war die Übertragung der Kolonien der ersteren auf dem amerikanischen Kontinent an die Verwaltung der [USA.GetName]-Regierung."
DNC_DiplomacyNews.13.a:1 "OK"

DNC_DiplomacyNews.14.t:0 "[From.GetName] überträgt pazifische Provinzen nach [USA.GetName]"
DNC_DiplomacyNews.14.d:0 "Diplomaten beider Nationen trafen sich in [From.Capital.GetName] und berieten dort eine Woche lang. Das Endergebnis war die Übertragung der pazifischen Provinzen der ersteren an die Verwaltung der [USA.GetName]-Regierung."
DNC_DiplomacyNews.14.a:1 "OK"

DNC_DiplomacyNews.15.t:0 "Derwisch-Bewegung ist erfolgreich"
DNC_DiplomacyNews.15.d:0 "Die Derwisch-Bewegung hat die Macht des Britischen Empires auf schockierende Weise besiegt und der Londoner Regierung die Botschaft übermittelt, dass Kolonien ihre Unabhängigkeit erlangen können."
DNC_DiplomacyNews.15.a:1 "Hurra!"
DNC_DiplomacyNews.15.b:1 "Das wird böse enden ..."

