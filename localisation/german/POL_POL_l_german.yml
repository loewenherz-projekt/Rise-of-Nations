l_german: 
POL_ensure_german_does_not_intervene_in_the_war:0 "Stellen Sie sicher, dass Deutschland nicht in den Krieg eingreift"
POL_ensure_german_does_not_intervene_in_the_war_desc:0 "Wir werden Deutschland warnen, nicht in diesen Krieg zur Befreiung der Deutschen einzugreifen, da wir einfach in unser eigenes Territorium eindringen. Sobald Deutschland sich bereit erklärt, nicht einzugreifen, werden wir mit der Planung einer Invasion beginnen."
POL_send_our_demands_to_danzig:0 "Senden Sie unsere Forderungen nach Danzig"
POL_send_our_demands_to_danzig_desc:0 "Wir müssen unsere Forderungen nach Danzig schicken, und wenn es unsere Forderungen ablehnt, werden wir es mit Gewalt einnehmen"
POL_incoraparate_danzig_into_poland:0 "Danzig in Polen eingliedern"
POL_incoraparate_danzig_into_poland_desc:0 "Wir müssen unsere Truppen auf die Invasion Danzigs vorbereiten, da es unser Territorium ist und es uns im Vertrag von Versailles genommen wurde."
POL_keep_danzig_a_part_of_our_empire:0 "Behalte Danzig als Teil unseres Reiches"
POL_keep_danzig_a_part_of_our_empire_desc:0 "Wir müssen Danzig als Teil unseres Reiches erhalten und verhindern, dass es sich von uns loslöst!"
POL_german_polish_summit:0 "Deutsch-polnischer Gipfel"
POL_german_polish_summit_desc:0 "Wir müssen die Bedingungen für die Rückgabe Danzigs an Deutschland besprechen, denn wir werden Land nicht einfach so hergeben."
POL_reject_the_treity:0 "Den Vertrag ablehnen"
POL_reject_the_treity_desc:0 "Wir müssen den Vertrag von Versailles ignorieren und mit Danzig das tun, was wir tun müssen"
POL_subdue_danzig:0 "Unterwerft Danzig"
POL_subdue_danzig_desc:0 "Wir müssen dafür sorgen, dass Danzig in den kommenden Jahren nicht gegen uns rebelliert. Sollte es jemals zu einem Konflikt mit Deutschland kommen, besteht bei einer mehrheitlich deutschen Bevölkerung die Gefahr einer Rebellion!"
POL_tax_and_tarrif_reform:0 "Steuer- und Zollreform"
POL_tax_and_tarrif_reform_desc:0 "Um unsere Sozialleistungen zu finanzieren, müssen wir vorerst unsere Steuern und Zölle erhöhen. Dies mag zwar einige Nachteile mit sich bringen, wird Polen aber insgesamt zu einem besseren Land machen."
POL_war_plan_lithuania:0 "Kriegsplan Litauen"
POL_war_plan_lithuania_desc:0 "Wir brauchen den litauischen Teil des Commonwealth, um diese Idee überhaupt in Betracht zu ziehen. Wir sollten klein anfangen und dann groß rauskommen."
POL_demand_southern_czechoslovakia:0 "Nachfrage Südtschechoslowakei"
POL_demand_southern_czechoslovakia_desc:0 "Historisch gesehen haben wir den südlichen Teil der Tschechoslowakei besetzt, jetzt ist es ein besserer Zeitpunkt denn je, unser rechtmäßiges Territorium zurückzuerobern"
POL_economic_reforms:0 "Wirtschaftsreformen"
POL_economic_reforms_desc:0 "Wir müssen Polens Wirtschaft zu einem neuen sozialistischen Wirtschaftsstil reformieren, das wird sie hoffentlich verbessern"
POL_a_polish_monarchy:0 "Eine polnische Monarchie"
POL_a_polish_monarchy_desc:0 "Polen hat sich entschieden, eine Monarchie mit einem wahren König zu werden! Wir müssen entscheiden, wohin dieser König Polen führen wird und wie es sich verändern wird."
POL_polish_dicatator:0 "Polnischer Diktator"
POL_polish_dicatator_desc:0 "Polen wird mit eiserner Faust regiert werden. Wir müssen damit beginnen, dem wahren Führer Polens Macht zu geben und gegen zivile Aktivitäten vorzugehen."
POL_secure_our_border_with_soviet_russia:0 "Sichern Sie unsere Grenze zu Sowjetrussland"
POL_secure_our_border_with_soviet_russia_desc:0 "Wir können den Russen nicht trauen, da sie jederzeit ihr Land zurückerobern möchten. Vielleicht können wir etwas bauen, das uns vor einer bevorstehenden russischen Invasion schützt."
POL_secure_our_border_with_the_germans:0 "Sichern Sie unsere Grenze zu den Deutschen"
POL_secure_our_border_with_the_germans_desc:0 "Obwohl die Deutschen uns sehr geholfen haben, unsere Unzweckmäßigkeit zu sichern, könnte sich ihre Haltung in den kommenden Jahren ändern, da die Deutschen nun besiegt sind."
POL_better_polish_roads:0 "Bessere polnische Straßen"
POL_better_polish_roads_desc:0 "Wir müssen unsere Infrastruktur verbessern, um Waren und Dienstleistungen schneller transportieren zu können. Dadurch wird Polen mit Sicherheit eine große Nation werden!"
POL_become_a_soviet_puppet:0 "Werde eine sowjetische Marionette"
POL_become_a_soviet_puppet_desc:0 "Wir müssen unter sowjetischen Einfluss geraten und ein Protektorat werden, mit dem wir unsere Unabhängigkeit von äußeren Invasoren garantieren können."
POL_improve_internal_stability:0 "Verbessern Sie die interne Stabilität"
POL_improve_internal_stability_desc:0 "Wir müssen unsere innere Stabilität verbessern, da unser Land mit internen Konflikten zu kämpfen hat. Wir müssen alle extremistischen Parteien ausmerzen und alle internen Machtkämpfe beenden."
POL_monarch_influences:0 "Monarchistische Einflüsse"
POL_monarch_influences_desc:0 "Wir werden in Polen ein monarchistisches Regime errichten und Józef Piłsudski zum König von Polen machen."
POL_far_right_influnces:0 "Rechtsextreme Einflüsse"
POL_far_right_influnces_desc:0 "Da der Putsch erfolgreich war, sollten wir unsere neue Verfassung unter Einbeziehung der rechtsextremen Strömungen entwerfen."
POL_polands_new_leader:0 "Polens neuer Staatschef"
POL_polands_new_leader_desc:0 "Was wird als Nächstes für Polen passieren, nachdem der Putsch erfolgreich war und Józef Piłsudski nun an der Macht ist?"
POL_stay_in_line_with_the_consitution:0 "Bleiben Sie im Einklang mit der Verfassung"
POL_stay_in_line_with_the_consitution_desc:0 "Wir müssen unsere Macht im Zaum halten und unseren neuen Führer auf die Führung Polens vorbereiten."
POL_a_polish_democracy:0 "Eine polnische Demokratie"
POL_a_polish_democracy_desc:0 "Wir werden weiterhin eine Demokratie bleiben und unser Führer wird vom Volk gewählt"
POL_demand_lithuania:0 "Nachfrage Litauen"
POL_demand_lithuania_desc:0 "Wir müssen Litauen auffordern, unserer Union beizutreten und Teil der neuen polnischen Monarchie zu werden."
POL_demand_estonia:0 "Nachfrage Estland"
POL_demand_estonia_desc:0 "Wir müssen fordern, dass Estland unserer Union beitritt, sonst wird es untergehen"
POL_demand_lativia:0 "Nachfrage Lettland"
POL_demand_lativia_desc:0 "Wir müssen Lettland zum Beitritt in unsere Union auffordern oder ihm mit Krieg drohen."
POL_claims_on_the_baltics:0 "Ansprüche auf das Baltikum"
POL_claims_on_the_baltics_desc:0 "Wir müssen alle baltischen Staaten beanspruchen und sie unserer Dynastie unterstellen."
POL_build_up_on_the_russian_boarder:0 "Aufbau an der russischen Grenze"
POL_build_up_on_the_russian_boarder_desc:0 "Wir müssen uns aufbauen und den Bau von Festungen in der Nähe der russischen Grenze vorbereiten. Nur dann können wir die Russen erfolgreich abwehren."
POL_war_plan_germany:0 "Kriegsplan Deutschland"
POL_war_plan_germany_desc:0 "Wir werden Ansprüche auf Oberpreußen erfinden, obwohl wir nicht auf einen Krieg mit Deutschland vorbereitet sind und dies ein riskanter Schritt sein kann. Wir brauchen dies für unsere Zukunft"
POL_demand_russia_release_ukraine:0 "Fordern Sie Russland zur Freilassung der Ukraine auf"
POL_demand_russia_release_ukraine_desc:0 "Russland ist in die Ukraine einmarschiert und besitzt einige unserer Kernstaaten. Wir müssen die Übergabe der Ukraine an Russland fordern."
POL_hold_snap_elections:0 "Halten Sie vorgezogene Wahlen ab"
POL_hold_snap_elections_desc:0 "Da der Kommunismus in unserem Land wächst, müssen wir alle anderen Parteien aus unserem Land verbannen. Wir werden allen demokratischen Parteien und rechtsextremen Verbänden die Teilnahme an den Wahlen in unserem Land verbieten und uns zu einem Einparteienstaat machen."
POL_may_coup:0 "Mai-Putsch"
POL_may_coup_desc:0 "Der Putsch im Mai war ein Staatsstreich, der den Sturz des derzeitigen Präsidenten und Vizepräsidenten Polens zum Ziel hatte und unter dem Namen „Mai-Putsch“ bekannt wurde."
POL_maintain_relations_with_the_soviets:0 "Pflegen Sie die Beziehungen zu den Sowjets"
POL_maintain_relations_with_the_soviets_desc:0 "Wir müssen gute Beziehungen zu den Sowjets pflegen und gleichzeitig unsere demokratischen Werte als Priorität behalten"
POL_secure_the_nimen_river_line:0 "Sicherung der Niémen-Flusslinie"
POL_secure_the_nimen_river_line_desc:0 "Der Fluss Njemen wird als natürliche Frontlinie genutzt. Wir werden den Fluss sichern und ihn im Falle eines Krieges mit den Russen nutzen."
POL_soviet_assistance:0 "Sowjetische Hilfe"
POL_soviet_assistance_desc:0 "Wir werden uns nicht direkt in diesen Konflikt einmischen, aber wir werden den Sowjets Vorräte und Freiwillige schicken, um sich ihrem Kampf anzuschließen."
POL_polish_soviet_war:0 "Polnisch-Sowjetischer Krieg"
POL_polish_soviet_war_desc:0 "Wir müssen unsere verlorenen Gebiete zurückgewinnen, die derzeit von den Sowjets besetzt sind, und unserem Reich zu seinem früheren Glanz verhelfen."
POL_rise_from_the_asashes:0 "Erhebe dich aus der Asche"
POL_rise_from_the_asashes_desc:0 "Die Sowjets kontrollieren derzeit unser Gebiet der Kiewer Rus. Mit dem Erfolg des Aufstands in Großpolen im Jahr 1918 haben wir zum ersten Mal seit 1795 unsere Souveränität wiederhergestellt. Wir sind völlig zuversichtlich, dass wir diesen Krieg gewinnen und die Polen befreien können."
POL_international_support:0 "Internationale Unterstützung"
POL_international_support_desc:0 "Wir müssen internationale Unterstützung gewinnen und andere Nationen um Hilfe bei der Befreiung des polnischen Volkes bitten."
POL_polishlatvian_jointoperations:0 "Polnisch-lettische Gemeinschaftsoperationen"
POL_polishlatvian_jointoperations_desc:0 "Wir haben mit den Letten zusammengearbeitet, um die Sowjets zurückzudrängen. Wir müssen unsere Beziehungen zu den Letten durch gemeinsame Operationen stärken."
POL_kiev_offensive:0 "Kiewer Offensive"
POL_kiev_offensive_desc:0 "Die Kiewer Offensive ist ein offensiver Plan. Wir müssen diese Bemühungen andeuten, um die Sowjets endgültig zurückzudrängen und unser Territorium zurückzuerobern."
POL_offensive_efforts:0 "Offensive Bemühungen"
POL_offensive_efforts_desc:0 "Wir müssen uns auf den Angriff konzentrieren und die Sowjets schnell mit einem starken Durchschlagsangriff vertreiben"
POL_ask_the_united_states_for_supplies:0 "Bitten Sie die Vereinigten Staaten um Lieferungen"
POL_ask_the_united_states_for_supplies_desc:0 "Die Vereinigten Staaten werden uns bei unseren Kriegsanstrengungen helfen. Wir müssen sie um Hilfe und Unterstützung bitten."
POL_ask_france_for_logistical_support:0 "Bitten Sie Frankreich um logistische Unterstützung"
POL_ask_france_for_logistical_support_desc:0 "Wir müssen Frankreich bitten, uns einen Attaché zu schicken und unseren gut ausgebildeten Armeen zu helfen, noch besser zu werden"
POL_fortify_warsaw:0 "Befestigen Sie Warschau"
POL_fortify_warsaw_desc:0 "Wir müssen unsere Grenze befestigen, während die Sowjets näher kommen, und uns auf die Schlacht um Warschau vorbereiten."
POL_defensive_efforts:0 "Abwehrbemühungen"
POL_defensive_efforts_desc:0 "Wir stehen vor einer weitaus größeren Bedrohung, als wir uns vorgestellt haben. Deshalb müssen wir bereit sein, die Souveränität unserer Nation zu verteidigen."
POL_polish_nationalism:0 "Polnischer Nationalismus"
POL_polish_nationalism_desc:0 "Wir müssen Propaganda verbreiten und eine Rekrutierungskampagne starten. Wir müssen alle für Polen kämpfen lassen."
POL_propaganda_campagin:0 "Propagandakampagne"
POL_propaganda_campagin_desc:0 "Wir müssen unsere Verteidigung stark halten und eine Propagandakampagne starten, um noch mehr Rekrutierungen zu erhalten"
POL_finish_the_soviets:0 "Beende die Sowjets"
POL_finish_the_soviets_desc:0 "Wir sind bereits so weit gekommen, dass wir diesen Krieg beenden und den letzten Vorstoß unternehmen müssen, um die Sowjets zu besiegen."
POL_international_expeditionary_forces:0 "Internationale Expeditionstruppen"
POL_international_expeditionary_forces_desc:0 "Wir müssen die in anderen Ländern lebenden Polen dazu bringen, nach Hause zurückzukehren und weiterzukämpfen. Wir müssen diesen Krieg gewinnen und unsere Unabhängigkeit sichern."
POL_invest_money_into_big_business:0 "Investieren Sie Geld in große Unternehmen"
POL_invest_money_into_big_business_desc:0 "Wir werden Geld in große Unternehmen investieren, in der Hoffnung, dass die großen Unternehmen in kleinere Unternehmen investieren und so einen Trickle-down-Effekt erzeugen."
POL_sovietpolish_treaty:0 "Sowjetisch-polnischer Vertrag"
POL_sovietpolish_treaty_desc:0 "Wir werden den Sowjets bei ihrem Rückzug helfen und ihnen im Gegenzug unser Kerngebiet zurückgeben. Wenn sie dies akzeptieren, werden wir uns ihren Bemühungen im Krieg anschließen."
POL_send_the_soviets_our_demands:0 "Senden Sie den Sowjets unsere Forderungen"
POL_send_the_soviets_our_demands_desc:0 "Wir werden unser gesamtes Kerngebiet von den Sowjets zurückfordern. Dies kann zu einem Krieg führen, aber wir sind darauf vorbereitet und werden für unsere Freiheit kämpfen."
POL_befreind_the_soviets:0 "Befreunde dich mit den Sowjets"
POL_befreind_the_soviets_desc:0 "Vielleicht können wir uns mit Russland versöhnen und es im Gegenzug für unser Kerngebiet unterstützen."
POL_independence_day:0 "Unabhängigkeitstag"
POL_independence_day_desc:0 "Wir haben unsere Souveränität nach vielen Jahren deutscher und russischer Besatzung erlangt. Wir sollten den Verbündeten danken, dass sie dies möglich gemacht haben."
POL_test_the_soviets:0 "Testen Sie die Sowjets"
POL_test_the_soviets_desc:0 "Die Sowjets besetzen derzeit Gebiete, und angesichts des aktuellen Bürgerkriegs in Russland können wir vielleicht einen Teil dieses Territoriums zurückgewinnen."
POL_issue_mobilization_laws:0 "Mobilisierungsgesetze erlassen"
POL_issue_mobilization_laws_desc:0 "Wir müssen auf einen umfassenden Krieg mit Russland vorbereitet sein. Wir müssen unsere Unabhängigkeit möglicherweise durch brutale Kämpfe erreichen oder wir können dies mit friedlichen Mitteln tun, aber unser Hauptziel bleibt dasselbe: die endgültige Befreiung aller Polen."
POL_submit_to_the_soviets:0 "Unterwerfe dich den Sowjets"
POL_submit_to_the_soviets_desc:0 "Wir werden uns den Sowjets unterwerfen und ihnen mit allen notwendigen Mitteln helfen, unsere Unabhängigkeit zu sichern, im Austausch für die Rückgabe unseres Kerngebiets und unseren Schutz"
POL_maintain_our_independence:0 "Unsere Unabhängigkeit bewahren"
POL_maintain_our_independence_desc:0 "Vielleicht können wir den Sowjets etwas anderes anbieten, als uns ihnen direkt anzuschließen."
POL_secure_the_german_boarder:0 "Sichern Sie die deutsche Grenze"
POL_secure_the_german_boarder_desc:0 "Wir müssen unsere Grenze im Osten sichern, um sicherzustellen, dass es aufgrund unserer Parteinahme für die Sowjets nicht zu Feindseligkeiten zwischen uns und den Deutschen kommt."
POL_a_polish_victory:0 "Ein polnischer Sieg"
POL_a_polish_victory_desc:0 "Wir haben die Sowjets zurückgeschlagen und den Krieg gewonnen. Wir müssen herausfinden, was als nächstes mit unserem Land geschehen soll."
POL_soviet_polish_technology_sharing:0 "Austausch sowjetisch-polnischer Technologien"
POL_soviet_polish_technology_sharing_desc:0 "Wir müssen uns gegenseitig in der Forschung unterstützen, indem wir Pläne und Technologien austauschen. Dadurch können unsere beiden Nationen ihre"
POL_a_everlasting_alliance:0 "Eine ewige Allianz"
POL_a_everlasting_alliance_desc:0 "Wir sollten unser Bündnis mit der Sowjetunion ausbauen und sicherstellen, dass wir uns gegenseitig vor jedem möglichen Angriffskonflikt schützen."
POL_nie_ma_wolnoci_bez_solidarnoci:0 "Nie ma wolności bez Solidarności"
POL_nie_ma_wolnoci_bez_solidarnoci_desc:0 "Wir müssen für unsere Unabhängigkeit kämpfen. Wir werden eine Propagandakampagne starten und unsere Rekrutierungsbemühungen verstärken."
POL_soviet_volunteers:0 "Sowjetische Freiwillige"
POL_soviet_volunteers_desc:0 "Wir müssen Einheiten in die Sowjetunion schicken, ohne uns direkt in den Konflikt einzumischen. So können wir sie bei ihren Kriegsanstrengungen unterstützen, ohne selbst einen Krieg zu riskieren."
POL_reform_the_government:0 "Reform der Regierung"
POL_reform_the_government_desc:0 "Die Sowjets haben uns sehr geholfen, indem sie uns unser Kerngebiet zurückgegeben haben. Der Kommunismus ist jedoch eine gefürchtete Ideologie und ein kommunistischer Wandel könnte unsere Stabilität beeinträchtigen. Sollten wir uns mit den Sowjets verbünden und bei der Neubewertung helfen oder sollten wir demokratisch bleiben und in diesem Konflikt neutral bleiben?"
POL_appoint_communist_government_advisors:0 "Ernennung kommunistischer Regierungsberater"
POL_appoint_communist_government_advisors_desc:0 "Wir müssen kommunistische Gouverneure an unseren Hof berufen, um den Sowjets zu zeigen, dass wir bereit sind, ihnen nachzukommen und sie zu unterstützen."
POL_secure_our_boarder:0 "Sichern Sie unsere Grenze"
POL_secure_our_boarder_desc:0 "Wir müssen unsere Grenze zu den Sowjets sichern, denn wer auch immer diesen Bürgerkrieg gewinnt, läuft Gefahr, uns zu überfallen."
POL_rewrite_the_constitution:0 "Schreiben Sie die Verfassung neu"
POL_rewrite_the_constitution_desc:0 "Wir werden den Putsch voll ausnutzen und ihn nutzen, um unser Land nach unserem Ermessen umzugestalten."
POL_socialism_in_poland:0 "Sozialismus in Polen"
POL_socialism_in_poland_desc:0 "Mit dem erfolgreichen Putsch können wir nun die Pläne von Józef Piłsudski in die Tat umsetzen und die polnische Wirtschaft und das Land reformieren."
POL_polands_new_king:0 "Polens neuer König"
POL_polands_new_king_desc:0 "Wir müssen den neuen Führer Polens zum König machen und Polen zu einem konstitutionellen Monarchen reformieren"
POL_polands_new_dictator:0 "Polens neuer Diktator"
POL_polands_new_dictator_desc:0 "Wir brauchen einen einzigen wahren Herrscher in Polen, der mit eiserner Faust regiert. In Polen wird eine totale Diktatur errichtet."
POL_memorys_of_piast:0 "Erinnerungen an Piast"
POL_memorys_of_piast_desc:0 "Wir sollten die Piastendynastie zurückbringen und ihren führenden Thronfolger finden. Wir werden die polnische Dynastie und ihre Ländereien wiederherstellen, sei es mit Gewalt oder auf diplomatischem Wege."
POL_carve_out_our_empire:0 "Erschaffe unser Imperium"
POL_carve_out_our_empire_desc:0 "Wir werden unser polnisches Reich durch die Reform des Commonwealth erweitern! Wir werden unser einst zerrüttetes Reich reformieren und von unseren europäischen Nachbarn wieder als Großmacht angesehen werden."
POL_demand_upper_romania:0 "Nachfrage Oberrumänien"
POL_demand_upper_romania_desc:0 "Oberrumänien war historisch ein Teil des polnischen Reiches und wir sollten unser rechtmäßiges Land zurückgewinnen, das unter den Thron gehört."
POL_dig_down_on_the_russian_boarder:0 "Graben Sie an der russischen Grenze"
POL_dig_down_on_the_russian_boarder_desc:0 "Wir müssen uns vertiefen und uns auf einen Stellungskrieg mit Russland vorbereiten. Wir müssen vollständig vor der russischen Bedrohung geschützt sein."
POL_promise_to_not_get_involved_in_any_more_wars:0 "Versprechen, sich nicht mehr in Kriege einzumischen"
POL_promise_to_not_get_involved_in_any_more_wars_desc:0 "Dies kann ein gefährlicher Weg sein, denn wenn wir in den Krieg ziehen und die Bauern weiterhin protestieren, besteht ein größeres Risiko für einen Bauernaufstand, aber dies wird die Proteste für eine gewisse Zeit beruhigen."
POL_polish_socalism:0 "Polnischer Sozialismus"
POL_polish_socalism_desc:0 "Wir müssen in Polen eine sozialistische Wirtschaft einführen, um eine voll industrialisierte Nation zu werden."
POL_print_more_money:0 "Mehr Geld drucken"
POL_print_more_money_desc:0 "Mehr Geld in der Wirtschaft bedeutet mehr Kaufgelegenheiten. Wir werden Geld drucken und es in die polnische Wirtschaft pumpen, um das Land wieder auf Kurs zu bringen!"
POL_offer_loans_to_the_poor:0 "Bieten Sie den Armen Kredite an"
POL_offer_loans_to_the_poor_desc:0 "Vielleicht sollten wir den Armen Kredite geben, um ihnen zu helfen, wieder auf die Beine zu kommen. Sobald sie arbeiten, sollten sie in der Lage sein, ihre persönlichen Schulden zu begleichen, und die Revolten werden köcheln."
POL_put_down_the_peasents:0 "Schlagt die Bauern nieder"
POL_put_down_the_peasents_desc:0 "Das wird nicht gut ankommen, aber wir müssen die Bauern unterdrücken und die Instabilität in Polen ein für alle Mal beenden, indem wir uns unter einer Königin und Monarchin vereinen."
POL_suppress_peoples_rights:0 "Unterdrücken Sie die Rechte der Menschen"
POL_suppress_peoples_rights_desc:0 "Die Bauern sind uns seit Jahren ein Dorn im Auge. Wir müssen ihrer Dummheit ein Ende setzen und die Bauern ein für alle Mal besiegen."
POL_write_the_march_constitution:0 "Schreiben Sie die Märzverfassung"
POL_write_the_march_constitution_desc:0 "Wir haben unsere Grenzen und unsere Unabhängigkeit gesichert. Jetzt müssen wir unsere vorläufige Verfassung umschreiben, damit sie zu unserer dauerhaften Verfassung wird. Dies wird dazu beitragen, unserer Nation Legitimität zu verleihen."
POL_work_on_land_reform:0 "Arbeit an der Landreform"
POL_work_on_land_reform_desc:0 "Wir müssen daran arbeiten, Polens beschädigte und kaputte Infrastruktur zu reformieren und wiederherzustellen. Mit einer besseren Infrastruktur werden wir zu einer schnelleren und effizienteren Nation."
POL_deal_with_the_peasantry:0 "Umgang mit der Bauernschaft"
POL_deal_with_the_peasantry_desc:0 "Die Bauern sind derzeit verärgert und beschweren sich über ihre Verarmung. Sie üben derzeit Druck auf unsere Regierung aus, etwas dagegen zu unternehmen. Wenn wir nicht bald etwas unternehmen, droht uns ein Bauernaufstand!"
POL_industrialization:0 "Industrialisierung"
POL_industrialization_desc:0 "Polen ist derzeit verarmt und verliert in alarmierendem Ausmaß Geld. Wenn wir uns jetzt nicht mit den Problemen befassen, droht unserem Land große Rückschläge!"
POL_roadrepair_programs:0 "Straßenreparaturprogramme"
POL_roadrepair_programs_desc:0 "Wir müssen mit unseren Straßenreparaturprogrammen beginnen, damit unsere Truppen schneller und schneller vorrücken können. Da unser Land unter hohen Straßenschäden und mangelnder Urbanisierung leidet, müssen wir in die Straßen investieren."
POL_a_polish_socialist_state:0 "Ein polnischer sozialistischer Staat"
POL_a_polish_socialist_state_desc:0 "Wir werden ein sozialistischer Staat bleiben und unsere Bürger weiterhin unterdrücken. Schließlich werden wir den vollständigen Sozialismus in unserem Land einführen und ein vollständig sozialistischer Staat werden."
POL_wealth_redistribution:0 "Umverteilung des Reichtums"
POL_wealth_redistribution_desc:0 "Wir müssen den Reichtum von den Reichen zu den Armen umverteilen, um den Armen zu helfen, aus den Fugen zu kommen. Sobald die Armen Geld haben, können sie es in Umlauf bringen, und wir werden in der Lage sein, mehr sozialistische Reformen umzusetzen."
POL_create_the_polish_workers_counsil:0 "Gründung des polnischen Arbeiterrates"
POL_create_the_polish_workers_counsil_desc:0 "Der polnische Arbeiterrat wird eine große Verbesserung für unsere Nation sein. Wir werden die Arbeiter Polens alle unsere Entscheidungen für uns treffen lassen."
POL_dig_down_on_the_russian_boarder:0 "Graben Sie an der russischen Grenze"
POL_dig_down_on_the_russian_boarder_desc:0 "Wir müssen uns tief eingraben und uns auf einen Stellungskrieg mit Russland vorbereiten. Wir müssen vollständig und gegen die russische Bedrohung verteidigt werden."
POL_build_up_on_the_german_boarder:0 "Aufbau an der deutschen Grenze"
POL_build_up_on_the_german_boarder_desc:0 "Wir müssen uns aufbauen und den Bau von Festungen in der Nähe der deutschen Grenze vorbereiten. Nur dann können wir die Deutschen erfolgreich abwehren."
POL_secure_upper_prussia:0 "Sicheres Oberpreußen"
POL_secure_upper_prussia_desc:0 "Wir müssen eine Invasion von oben vermeiden, wir werden unser offenes Gebiet von Oberpreußen aus sichern und eine Verteidigungsgrabenlinie entlang der preußischen Grenze errichten"
POL_address_mass_migration__to_poland:0 "Umgang mit der Massenmigration nach Polen"
POL_address_mass_migration__to_poland_desc:0 "Polen empfängt derzeit eine große Zahl von Einwanderern, die in unsere neue Nation kommen. Dadurch verschärft sich die Klassentrennung noch weiter, da viele Polen nach dem Krieg in ihre Heimat zurückkehren. Wir müssen diese Krise angehen, bevor sie außer Kontrolle gerät."
POL_fix_the_migration_crisis:0 "Die Migrationskrise lösen"
POL_fix_the_migration_crisis_desc:0 "Wir werden die Masseneinwanderung nach Polen beenden und dafür sorgen, dass diese Krise endlich ein Ende findet."
POL_draw_back_migration_laws:0 "Migrationsgesetze zurückziehen"
POL_draw_back_migration_laws_desc:0 "Polen ist ein Land der Migranten. Um unsere Unterstützung für sie zu zeigen, müssen wir unsere Einwanderungsgesetze zurücknehmen."
POL_encourage_migrant_workers:0 "Ermutigen Sie Wanderarbeiter"
POL_encourage_migrant_workers_desc:0 "Wir müssen die Migranten in Polen dazu ermutigen, Fachkräfte zu werden. Da wir ein Land der Migranten sind, sollten wir unsere Situation voll ausnutzen."
POL_curtail_migration_to_poland:0 "Eindämmung der Migration nach Polen"
POL_curtail_migration_to_poland_desc:0 "Wir müssen die gesamte Migration nach Polen einschränken, um die Menschen davon abzuhalten, nach Polen zu migrieren"
POL_offer_free_schooling_to_migrants:0 "Migranten kostenlose Schulbildung anbieten"
POL_offer_free_schooling_to_migrants_desc:0 "Wir werden den Migranten in Polen eine kostenlose Schulbildung anbieten, in der Hoffnung, dass ihnen die Ausbildung zu einem besseren Arbeitsplatz und einer besseren Zukunft verhelfen wird."
POL_create_a_immigration_enforcement_program:0 "Erstellen Sie ein Programm zur Durchsetzung der Einwanderungsbestimmungen"
POL_create_a_immigration_enforcement_program_desc:0 "Wir brauchen ein Einwanderungs-Kontrollprogramm, um die Einwanderung in unser Land zu stoppen. Da polnische Einwanderer polnische Arbeitsplätze besetzen, brauchen wir polnische Menschen, um polnische Arbeitsplätze zu schaffen."
POL_increase_the_navy_budget:0 "Erhöhen Sie das Marinebudget"
POL_increase_the_navy_budget_desc:0 "Wir müssen das Budget unserer Marine erhöhen und eine große Marine aufbauen!"
POL_create_the_polish_navy:0 "Erstellen Sie die polnische Marine"
POL_create_the_polish_navy_desc:0 "Wir müssen eine polnische Marine gründen und formalisieren, um unsere Nation an den Küsten und Wellen der Ostsee zu verteidigen."
POL_the_economic_situation:0 "Die wirtschaftliche Lage"
POL_the_economic_situation_desc:0 "Nach vielen Jahren der Besatzung erlangen wir endlich unsere Unabhängigkeit, doch unsere Wirtschaft liegt in Trümmern. Wir müssen den polnischen Markt vor ausländischen Konkurrenten schützen und bei dem gestiegenen Finanzbedarf helfen."
POL_settle_terms_with__czechoslovakia:0 "Vereinbarungen mit der Tschechoslowakei"
POL_settle_terms_with__czechoslovakia_desc:0 "Die Tschechoslowakei ist ein tragfähiger Handelspartner für die nahe Zukunft, wir müssen mit ihnen Bedingungen vereinbaren"
POL_settle_trade_terms_with_france:0 "Handelsbedingungen mit Frankreich festlegen"
POL_settle_trade_terms_with_france_desc:0 "Wir müssen die Handelsbedingungen mit Frankreich vereinbaren, da dieses Land unser Abkommen am ehesten akzeptieren wird."
POL_settle_terms_with_hungary:0 "Vereinbarung mit Ungarn"
POL_settle_terms_with_hungary_desc:0 "Ungarn ist einer unserer großen Nachbarn, wir müssen Wirtschaftsverträge mit ihnen abschließen"
POL_settle_terms_with_greece:0 "Vereinbarung mit Griechenland"
POL_settle_terms_with_greece_desc:0 "Wir müssen die Handelsbedingungen mit Griechenland vereinbaren. Sobald wir die Handelsbedingungen vereinbart haben, können wir beide von diesem Abkommen profitieren."
POL_expand_our_military:0 "Erweitern Sie unser Militär"
POL_expand_our_military_desc:0 "Wir müssen unsere militärischen Fähigkeiten stärken und auf jeden Konflikt vorbereitet sein!"
POL_stabilize_the_nation:0 "Stabilisieren Sie die Nation"
POL_stabilize_the_nation_desc:0 "Wir müssen die Nation stabilisieren und Polen zu seinem früheren Glanz zurückführen!"
POL_revive_the_polish_state:0 "Den polnischen Staat wiederbeleben"
POL_revive_the_polish_state_desc:0 "Wir müssen unser Land wieder aufbauen und an der vollständigen Industrialisierung Polens arbeiten. Dazu müssen wir wirtschaftliche Maßnahmen gesetzlich verabschieden und die polnische Wirtschaft modernisieren."
POL_german__polish_trade_agreement:0 "Deutsch-Polnisches Handelsabkommen"
POL_german__polish_trade_agreement_desc:0 "Wir müssen das Handelsabkommen mit unserem Nachbarn Deutschland abschließen. Wenn dies gut läuft, können wir im Handel mit Deutschland florieren. Wenn es scheitert, wird unser Handel mit Deutschland für immer ruiniert sein."
POL_do_political_favors:0 "Tun Sie politische Gefälligkeiten"
POL_do_political_favors_desc:0 "Wir müssen politische Gefälligkeiten im Austausch für politische Macht verteilen; dies wird unsere Stabilität verringern, aber unsere politische Macht um ein Vielfaches erhöhen."
POL_the_fate_of_danzig:0 "Das Schicksal Danzigs"
POL_the_fate_of_danzig_desc:0 "Wir müssen über das Schicksal Danzigs entscheiden, da es durch den Vertrag von Versailles geschaffen wurde und in den kommenden Jahren zu Spannungen führen könnte."
POL_obey_the_treaty:0 "Befolgen Sie den Vertrag"
POL_obey_the_treaty_desc:0 "Wir müssen den Vertrag von Versailles einhalten und gute Beziehungen zum Rest Europas pflegen, damit wir einen Weg finden können, es friedlich einzugliedern oder das Territorium zurückzugeben."
POL_return_danzig_to_germany:0 "Rückgabe Danzigs an Deutschland"
POL_return_danzig_to_germany_desc:0 "Da Danzig mehrheitlich deutsch bewohnt ist, müssen wir unsere Vergangenheit vergessen und das Gebiet an Deutschland zurückgeben."
POL_german_polish_friendship_pact:0 "Deutsch-polnischer Freundschaftspakt"
POL_german_polish_friendship_pact_desc:0 "Wir sollten unsere Beziehungen zu den Deutschen weiter ausbauen und uns in Kriegszeiten gegenseitig Hilfe anbieten"
POL_cut_off_trade_to_danzig:0 "Handelsverbot für Danzig"
POL_cut_off_trade_to_danzig_desc:0 "Wir müssen den Handel mit Danzig von der Außenwelt abschneiden, während wir unsere Invasion in Danzig vorbereiten."
