 AC_assigned_factories_button_tt:0 "Wählen Sie aus, wie viele Ihrer zivilen Fabriken Sie diesem Bauprojekt zuweisen möchten.\n\n§YFür Projekte verfügbare Fabriken:§! §G[?Root.num_of_civilian_factories_available_for_projects]§!\n\n§LUmschalt-Klick zum Hinzufügen oder Entfernen von 5.§!"
 
 AC_building_amount_increase_button_tt:0 "Wähle aus, wie viele Gebäude des gewählten Typs du in diesem Zustand errichten möchtest.\n\n§YDie maximale Anzahl hängt vom Gebäude, den freien Plätzen im Zustand und deinen Technologien ab.\n\nDu kannst Gebäude auf Plätzen in die Warteschlange stellen, die der Controller bereits für den Bau reserviert hat, sofern die Gebäudetypen gleich sind. Das Projekt wird am Ende des Baus abgebrochen, wenn keine freien Plätze mehr verfügbar sind.§!\n\n§LUmschalt-Klick zum Hinzufügen oder Entfernen von 5.§!"
 
 AC_political_power_cost_tt:0 "\n\n§YErforderliche politische Macht:§! §R[?Root.AC_political_power_cost]§!"
 
 AC_allied_construction_icon1_tt:0 "Verbündete Bauprojekte\n\n§LErstellen Sie ein Bauprojekt im Staat Ihres Verbündeten.§!"
 
 AC_build_button_text:0 "[AC_GetBuildButtonText]"
 AC_start_project:0 "Projekt starten"
 AC_cancel_project:0 "Projekt abbrechen"
 AC_build_button_tt:0 "Durch Drücken dieser Schaltfläche wird die Erlaubnis des Kontrolleurs des Staates eingeholt. Nimmt dieser die Erlaubnis an, beginnt ein Bauprojekt in Ihrem Entscheidungs-Tab. Dieses Projekt wird wiederholt, bis alle Gebäude in der Warteschlange fertiggestellt sind.\n\n§YDie Baugeschwindigkeit wird um 25 % gegenüber dem Normalwert reduziert (die Modifikatoren Ihres Landes gelten).§![From.AC_GetPoliticalPowerCost]\n\n§LSie können immer nur ein Bauprojekt gleichzeitig aktiv haben.\n\nEin Staat kann nicht gleichzeitig ein Bauprojekt aus mehreren Ländern aktiv haben.\n\nDer Kontrolleur dieses Staates wird die Erlaubnis ablehnen, wenn er eine negative Meinung von Ihnen hat.§!"
 
 AC_assist_repair_button_text:0 "Reparaturhilfe"
 AC_assist_repair_button_tt:0 "Unterstütze dieses Land bei Gebäudereparaturen.\n\n§YTäglicher politischer Machtgewinn:§! §R-1§!\n\n§YDauer:§!§! §G180 Tage\n\n§LDu kannst immer nur ein Land gleichzeitig bei Reparaturen unterstützen.\n\nDu kannst die Reparaturhilfe jederzeit über diese Schaltfläche oder über die Registerkarte „Entscheidungen“ beenden. Es gibt eine Abkühlzeit von einem Tag, bevor du sie wieder aktivieren kannst.§!"

