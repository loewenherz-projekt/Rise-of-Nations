l_german: 
kaiserslachtinterwar.1.title:0 "Der Untergang Frankreichs"
kaiserslachtinterwar.1.desc:0 "Frankreich ist völlig gefallen und der deutschen Macht erlegen! Wir können jetzt mit ihnen machen, was wir wollen! Wenn wir jedoch in unserem Friedensabkommen zu hart vorgehen, wird Frankreich sicherlich erneut einer Aufwertung unterliegen! Wir müssen bei unserer Wahl vorsichtig sein …"
kaiserslachtinterwar.1.a:0 "Eine neue Ära steht vor der Tür"
kaiserslachtinterwar.2.title:0 "Reaktionärer Putsch in Russland"
kaiserslachtinterwar.2.desc:0 "Mit der Eroberung Russlands durch die Deutschen scheint das Reich im Chaos zu versinken. Viele russische Offiziere revoltieren und übernehmen die Regierung. Nur die Zeit wird zeigen, wie es mit dem Reich weitergeht. Vorerst versinkt Russland im Bürgerkrieg."
kaiserslachtinterwar.2.a:0 "Wir müssen um jeden Preis gewinnen"
kaiserslachtinterwar.3.title:0 "Schadensermittlung"
kaiserslachtinterwar.3.desc:0 "Unser Sieg im Weltkrieg hat einen hohen Preis gefordert. Die meisten unserer Truppen sind erschöpft und unsere Gebäude beschädigt. Der Wiederaufbau wird langsam sein, aber sobald er abgeschlossen ist, werden wir bereit sein, Europa zu trotzen!"
kaiserslachtinterwar.3.a:0 "Wir werden stärker!"
kaiserslachtinterwar.4.title:0 "Syndikalisten, erhebt euch!"
kaiserslachtinterwar.4.desc:0 "Angesichts unserer Niederlage im Ersten Weltkrieg erscheint es naheliegend, dass eine Neubewertung möglich ist. Syndikalistische und kommunistische Gruppen sind aufgestanden und haben sich verpflichtet, Frankreich und alle verlorenen Gebiete zurückzuerobern! Es scheint, als hätten Proteste in ganz Frankreich und Massendeserte aus der Armee unserer Regierung massive Probleme bereitet. Wir müssen schnell handeln, sonst verfallen wir dem Syndikalismus."
kaiserslachtinterwar.4.a:0 "Wir werden uns nach Afrika zurückziehen!"
kaiserslachtinterwar.4.b:0 "Wir werden weiterkämpfen!"
kaiserslachtinterwar.4.c:0 "Wir werden uns den Kommunisten anschließen!"
kaiserslachtinterwar.5.title:0 "Frankreich marschiert in Algerien ein!"
kaiserslachtinterwar.5.desc:0 "Französische Monarchisten sind in Algerien einmarschiert! Ein Einmarsch in dieses Gebiet würde Frankreichs Chancen auf eine monarchistische Herrschaft zunichtemachen! Wir müssen uns entscheiden, ob wir dieses Gebiet erobern oder den französischen monarchistischen Geist erstrahlen lassen ..."
kaiserslachtinterwar.5.a:0 "Wir werden dieses Gebiet in unser Reich integrieren ..."
kaiserslachtinterwar.5.b:0 "Wir werden sie zu unserer Sphäre hinzufügen"
kaiserslachtinterwar.5.c:0 "Das hat nichts mit uns zu tun"
kaiserslachtinterwar.6.title:0 "Syndikalistische Proteste!"
kaiserslachtinterwar.6.desc:0 "Angesichts der erfolgreichen syndikalistischen Revolution Frankreichs scheint es, als ob auch unsere Bevölkerung eine kleine Revolution erlebt. Wenn wir die Flammen der Revolution nicht bald löschen, könnte uns dasselbe Schicksal ereilen ..."
kaiserslachtinterwar.6.a:0 "Wir müssen die Syndikalisten vernichten!"
kaiserslachtinterwar.7.title:0 "Sollten wir ein konstitutioneller Monarch werden?"
kaiserslachtinterwar.7.desc:0 "Da der Sieg im Weltkrieg und der Krieg in weite Ferne gerückt scheinen, fordern die Menschen Vertretung. Wenn wir unser Land in eine Demokratie verwandeln wollen, ist jetzt der beste Zeitpunkt dafür. Vielleicht bekommen wir nie wieder eine Gelegenheit dazu."
kaiserslachtinterwar.7.a:0 "Nein, das Volk sollte in unseren Angelegenheiten nichts zu sagen haben"
kaiserslachtinterwar.7.b:0 "Wir sollten den Menschen eine Stimme geben"
kaiserslachtinterwar.8.title:0 "Umgang mit den Protesten"
kaiserslachtinterwar.8.desc:0 "Es gab eine Reihe von syndikalistischen und sodalistischen Protesten am Rhein. Wir müssen eine Strategie entwickeln, wie wir darauf reagieren. Wenn wir aggressiv vorgehen, werden uns andere Länder vielleicht nicht besonders wohlgesonnen sein, aber wenn wir zu schwach sind, werden wir mit Sicherheit einer Revolution zum Opfer fallen!"
kaiserslachtinterwar.8.a:0 "Wir werden sie vernichten"
kaiserslachtinterwar.8.b:0 "Wir werden ihnen ihren Protest ermöglichen"
