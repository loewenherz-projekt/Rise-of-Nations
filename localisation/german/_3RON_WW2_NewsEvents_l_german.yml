preww2_country.31.t:0 "Erste Dust Bowl"
preww2_country.31.d:0 "Die Dust Bowl war eine Periode schwerer Staubstürme, die in den 1930er Jahren die Ökologie und Landwirtschaft der amerikanischen und kanadischen Prärien stark schädigte. Schwere Dürre und die mangelnde Anwendung von Trockenlandwirtschaftsmethoden zur Verhinderung der äolischen Prozesse (Winderosion) verursachten das Phänomen. Die Dürre kam in drei Wellen, 1934, 1936 und 1939–1940, aber einige Regionen der High Plains litten bis zu acht Jahre lang unter Dürrebedingungen. Da die Landwirte die Ökologie der Ebenen nicht ausreichend verstanden, hatten sie im vergangenen Jahrzehnt den jungfräulichen Mutterboden der Great Plains umfassend tief gepflügt. Dies hatte die einheimischen, tiefwurzelnden Gräser verdrängt, die normalerweise selbst in Dürreperioden und bei starkem Wind Boden und Feuchtigkeit speicherten. Die schnelle Mechanisierung landwirtschaftlicher Geräte, insbesondere kleiner Benzintraktoren, und der weite Verbreitung von Mähdreschern trugen dazu bei, dass die Landwirte beschlossen, trockenes Grasland (auf dem größtenteils nicht mehr als 250 mm Niederschlag pro Jahr fielen) in kultiviertes Ackerland umzuwandeln. Während der Dürre der 1930er Jahre verwandelte sich der lose Boden in Staub, den die vorherrschenden Winde in riesigen Wolken davontrugen, die manchmal den Himmel verdunkelten. Diese erstickenden Staubwolken – „schwarze Blizzards“ oder „schwarze Walzen“ genannt – zogen über das Land, erreichten die Ostküste und trafen Städte wie New York City und Washington, D.C. In den Ebenen verringerten sie die Sicht oft auf 1 m oder weniger. Der Reporter der Associated Press, Robert E. Geiger, war zufällig in Boise City, Oklahoma, und wurde Zeuge der schwarzen Blizzards am „Schwarzen Sonntag“ des 14. April 1935. Edward Stanley, der Nachrichtenredakteur der Associated Press aus Kansas City, prägte den Begriff „Dust Bowl“, als er Geigers Nachrichtenbericht umschrieb."
preww2_country.31.a:1 "Oh Junge"
preww2_news.31.t:0 "Erste Dust Bowl in den USA"
preww2_news.31.d:0 "Die Dust Bowl war eine Periode schwerer Staubstürme, die in den 1930er Jahren die Ökologie und Landwirtschaft der amerikanischen und kanadischen Prärien stark schädigte. Schwere Dürre und die mangelnde Anwendung von Trockenlandwirtschaftsmethoden zur Verhinderung der äolischen Prozesse (Winderosion) verursachten das Phänomen. Die Dürre kam in drei Wellen, 1934, 1936 und 1939–1940, aber einige Regionen der High Plains litten bis zu acht Jahre lang unter Dürrebedingungen. Da die Landwirte die Ökologie der Ebenen nicht ausreichend verstanden, hatten sie im vergangenen Jahrzehnt den jungfräulichen Mutterboden der Great Plains umfassend tief gepflügt. Dies hatte die einheimischen, tiefwurzelnden Gräser verdrängt, die normalerweise selbst in Dürreperioden und bei starkem Wind Boden und Feuchtigkeit speicherten."
