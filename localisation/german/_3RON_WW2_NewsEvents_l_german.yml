preww2_country.43.t:0 "John Dillinger flieht aus dem Gefängnis"
preww2_country.43.d:0 "Am 3. März 1934 gelang Dillinger mit Hilfe eines Mithäftlings ein beispielloser Gefängnisausbruch. Mit einer selbstgebauten Holzpistole in der Hand gelang es ihm, 33 Gefängniswärter und die anderen Häftlinge einzuschüchtern und sie dazu zu bewegen, ihn aus seiner Zelle zu entlassen. Nach ihrer Freilassung stahlen Dillinger und sein Partner zwei echte Maschinengewehre aus dem Büro des Gefängnisdirektors, sperrten seine ehemaligen Wärter ein und flohen im gestohlenen Auto des Sheriffs aus dem Lake County Jail."
preww2_country.43.a:1 "&quot;OK"
