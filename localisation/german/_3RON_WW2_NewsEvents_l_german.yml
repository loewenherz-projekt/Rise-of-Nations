preww2_country.28.t:0 "Gründung von Air France"
preww2_country.28.d:0 "Am 17. Mai 1933 fusionierten vier Fluggesellschaften – Société Centrale pour l&#39;Exploitation de Lignes Aériennes (gegründet 1919), Compagnie Internationale de Navigation (1920), Air Union (1923) und Air Orient (1929) – und verhandelten mit der französischen Regierung über die Bildung eines nationalen Systems. Wenige Monate später, am 30. August, fusionierte der Konzern mit Unterstützung der Regierung mit einer anderen Fluggesellschaft, der Compagnie Générale Aéropostale (gegründet 1919), zur Air France, die in den Jahren vor dem Zweiten Weltkrieg eines der umfangreichsten Netzwerke Europas aufbaute."
preww2_country.28.a:1 "Der Boden besteht aus Boden"
