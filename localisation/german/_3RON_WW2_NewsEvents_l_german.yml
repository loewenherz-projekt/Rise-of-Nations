preww2_country.7.t:0 "Schließung des Parlaments"
preww2_country.7.d:0 "Am 4. März 1933 debattierte der Nationalrat hitzig über einen Streik der Eisenbahner. Als klar wurde, dass die Abstimmung über Maßnahmen gegen die streikenden Eisenbahner nur mit hauchdünner Mehrheit entschieden werden würde, traten alle drei Parlamentspräsidenten – Karl Renner (SPD), Rudolf Ramek (Christlichsoziale Partei) und Sepp Straffner (Großdeutsche Volkspartei) – von ihren Ämtern zurück, um an der Abstimmung teilzunehmen. Da ihr Rücktritt in der Geschäftsordnung des Parlaments nicht vorgesehen war, war das Parlament durch Verfahrensstreitigkeiten faktisch lahmgelegt. Ihr Rücktritt ließ das Haus ohne Sprecher zurück, und die Sitzung konnte nicht geschlossen werden, was den Nationalrat handlungsunfähig machte. Die Regierung unter Bundeskanzler Engelbert Dollfuß betrachtete die Situation als eine „in der Verfassung nicht vorgesehene Krise“, sodass dies die letzte reguläre Sitzung des Nationalrats bis nach der Befreiung 1945 war."
preww2_country.7.a:1 "Schließen Sie es"
preww2_country.7.b:1 "Wir werden die Institutionen respektieren"
preww2_news.7.t:0 "Engelbert Dolfuss schließt das Parlament"
preww2_news.7.d:0 "Am 4. März 1933 debattierte der Nationalrat hitzig über einen Streik der Eisenbahner. Als klar wurde, dass die Abstimmung über Maßnahmen gegen die streikenden Eisenbahner nur mit hauchdünner Mehrheit entschieden werden würde, traten alle drei Parlamentspräsidenten – Karl Renner (SPD), Rudolf Ramek (Christlichsoziale Partei) und Sepp Straffner (Großdeutsche Volkspartei) – von ihren Ämtern zurück, um an der Abstimmung teilzunehmen. Da ihr Rücktritt in der Geschäftsordnung des Parlaments nicht vorgesehen war, war das Parlament durch Verfahrensstreitigkeiten faktisch lahmgelegt. Ihr Rücktritt ließ das Haus ohne Sprecher zurück, die Sitzung konnte nicht geschlossen werden, wodurch der Nationalrat handlungsunfähig wurde. Die von der Verfassung gebotenen Möglichkeiten zur Wiederherstellung der parlamentarischen Demokratie wurden nicht genutzt."
preww2_news.7.a:1 "OK"

preww2_country.8.t:0 "Das erste Monopoly-Spiel"
preww2_country.8.d:0 "Charles Darrow erfindet das Spiel Monopoly zusammen mit den Designern Elizabeth Magie, Louis Thun und Fred Thun. Vor Monopoly gab es einige andere Brettspiele, wie zum Beispiel „The Landlord Game“, von dem Monopoly lose abgeleitet ist. Das Brett ist Atlantic City nachempfunden und die Spielsteine sind Modelle von Gegenständen aus Charles Darrows‘ Haus. Parker Brothers griff das Spiel 1935 auf und machte es zu einem allgemein bekannten Namen. Seitdem wurden zahlreiche Variationen des Brettspiels eingeführt. Alles von Star Wars Monopoly bis hin zu Bratz Jr. Monopoly. Das Spiel wurde oft überarbeitet und einige Familien haben „inoffizielle Regeln“ aufgestellt – zum Beispiel, was passiert, wenn man auf „Freies Parken“ landet."
preww2_country.8.a:1 "OK"
preww2_news.8.t:0 "Das erste Monopoly-Spiel"
preww2_news.8.d:0 "Charles Darrow erfindet das Spiel Monopoly zusammen mit den Designern Elizabeth Magie, Louis Thun und Fred Thun. Vor Monopoly gab es einige andere Brettspiele, wie zum Beispiel „The Landlord Game“, von dem Monopoly lose abgeleitet ist. Das Brett ist Atlantic City nachempfunden und die Spielsteine sind Modelle von Gegenständen aus Charles Darrows‘ Haus. Parker Brothers griff das Spiel 1935 auf und machte es zu einem allgemein bekannten Namen. Seitdem wurden zahlreiche Variationen des Brettspiels eingeführt. Alles von Star Wars Monopoly bis hin zu Bratz Jr. Monopoly. Das Spiel wurde oft überarbeitet und einige Familien haben „inoffizielle Regeln“ aufgestellt – zum Beispiel, was passiert, wenn man auf „Freies Parken“ landet."
