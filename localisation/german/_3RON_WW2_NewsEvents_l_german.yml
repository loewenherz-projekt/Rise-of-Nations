preww2_country.46.t:0 "Der Führer trifft sich mit Il Duce"
preww2_country.46.d:0 "Adolf Hitler und Benito Mussolini trafen sich auf der Biennale in Venedig. Der Besuch dauerte drei Tage und am Ende war Mussolini zu dem Schluss gekommen, dass Hitler „un clown, po‘ matto“ (ein Clown, ein bisschen verrückt) sei, während Hitler Mussolini für „einen aufgeblasenen Hanswurst“ hielt."
