preww2_country.32.t:0 "Unsere Beziehung zur Sowjetunion"
preww2_country.32.d:0 "Fast unmittelbar nach seinem Amtsantritt bemühte sich Präsident Roosevelt jedoch um die Aufnahme formeller diplomatischer Beziehungen zwischen den USA und der Sowjetunion. Seine Gründe dafür waren vielschichtig, doch die Entscheidung basierte auf mehreren Hauptfaktoren. Roosevelt hoffte, dass die Anerkennung der Sowjetunion den strategischen Interessen der USA dienen würde, indem sie den japanischen Expansionismus in Asien einschränkte. Zudem glaubte er, dass eine vollständige diplomatische Anerkennung den amerikanischen Handelsinteressen in der Sowjetunion dienen würde – ein Grund zur Sorge für eine Regierung, die mit den Auswirkungen der Weltwirtschaftskrise zu kämpfen hatte. Schließlich waren die USA die einzige Großmacht, die der Sowjetunion weiterhin die offizielle diplomatische Anerkennung verweigerte."
preww2_country.32.a:1 "Beziehungen normalisieren"
preww2_country.32.b:1 "Wir stehen gegen den Kommunismus"
