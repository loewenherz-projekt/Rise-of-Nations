preww2_country.71.t:0 "Letztes Treffen der Komintern"
preww2_country.71.d:0 "Der 7. Weltkongress der Kommunistischen Internationale fand vom 25. Juli bis 20. August 1935 in Moskau statt. Delegierte Vertreter regierender und nicht regierender kommunistischer Parteien aus aller Welt sowie geladene Gäste aus anderen politischen und organisierten Arbeiterorganisationen nahmen daran teil. Die Versammlung ist vor allem für ihre Unterstützung einer Volksfront kommunistischer und nichtkommunistischer Kräfte gegen die wachsende Bedrohung durch den Faschismus in Europa in Erinnerung geblieben und ebnete damit den Weg für die Befürwortung kollektiver Sicherheit zwischen der Sowjetunion und den verschiedenen kapitalistischen Staaten Europas."
preww2_country.71.a:1 "Halt es"
preww2_country.71.b:1 "Es lohnt sich nicht"
