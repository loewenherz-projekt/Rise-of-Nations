preww2_country.75.t:0 "Der zweite italienisch-äthiopische Krieg beginnt"
preww2_country.75.d:0 "Der Zweite Italienisch-Äthiopische Krieg, auch Zweiter Italienisch-Abessinienkrieg genannt, war ein Angriffskrieg zwischen Italien und Äthiopien, der von Oktober 1935 bis Februar 1937 geführt wurde. Er gilt als Beispiel für die expansionistische Politik der Achsenmächte und die Ineffektivität des Völkerbundes vor Ausbruch des Zweiten Weltkriegs. Am 3. Oktober 1935 griffen 200.000 Soldaten der italienischen Armee unter dem Kommando von Marschall Emilio De Bono ohne vorherige Kriegserklärung von Eritrea aus an (damals italienische Kolonialherrschaft). Zur gleichen Zeit griff eine kleinere Truppe unter General Rodolfo Graziani von Italienisch-Somalia aus an. Am 6. Oktober wurde Aduwa erobert, ein symbolträchtiger Ort für die italienische Armee. Am 15. Oktober nahmen italienische Truppen Aksum ein, und der Obelisk, der die Stadt schmückte, wurde von seinem Standort gerissen und nach Rom geschickt, um symbolisch vor dem Gebäude des vom faschistischen Regime errichteten Kolonialministeriums aufgestellt zu werden."
preww2_country.75.a:1 "Wir werden sie besiegen"
preww2_news.75.t:0 "Der Zweite Italienisch-Äthiopische Krieg beginnt"
preww2_news.75.d:0 "Der Zweite Italienisch-Äthiopische Krieg, auch Zweiter Italienisch-Abessinienkrieg genannt, war ein Angriffskrieg zwischen Italien und Äthiopien, der von Oktober 1935 bis Februar 1937 tobte. Er gilt als Beispiel für die expansionistische Politik der Achsenmächte und die Ineffektivität des Völkerbundes vor Ausbruch des Zweiten Weltkriegs. Am 3. Oktober 1935 griffen 200.000 Soldaten der italienischen Armee unter dem Kommando von Marschall Emilio De Bono ohne vorherige Kriegserklärung von Eritrea (damals italienische Kolonialherrschaft) aus an. Gleichzeitig griff eine kleinere Truppe unter General Rodolfo Graziani von Italienisch-Somalia aus an. Am 6. Oktober wurde Aduwa erobert, ein symbolträchtiger Ort für die italienische Armee."
preww2_news.75.a:1 "OK"

preww2_country.76.t:0 "Lebensborn-Programm gegründet"
preww2_country.76.d:0 "Lebensborn war ein von der SS initiierter, staatlich geförderter und eingetragener Verein im nationalsozialistischen Deutschland mit dem Ziel, die Geburtenrate arischer Kinder von Personen zu erhöhen, die auf Grundlage der nationalsozialistischen Rassenhygiene und Gesundheitsideologie als „rassisch rein“ und „gesund“ eingestuft wurden. Lebensborn bot seinen meist unverheirateten Müttern Sozialhilfe an, förderte anonyme Geburten unverheirateter Frauen in ihren Entbindungsheimen und vermittelte die Adoption dieser Kinder durch ebenso „rassisch reine“ und „gesunde“ Eltern, insbesondere SS-Angehörige und deren Familien. Das Ehrenkreuz der Deutschen Mutter wurde den Frauen verliehen, die die meisten arischen Kinder zur Welt brachten. Die Nazis legalisierten Abtreibungen für behinderte Kinder, wurden ansonsten jedoch streng bestraft. Lebensborn wurde 1935 in Deutschland gegründet und expandierte während des Zweiten Weltkriegs in mehrere besetzte europäische Länder mit germanischer Bevölkerung. Dazu gehörte die Auswahl „rassisch wertvoller“ Waisen zur Adoption sowie die Betreuung von Kindern arischer Frauen, die Beziehungen mit SS-Angehörigen gehabt hatten. Ursprünglich waren Kinder aus Verbindungen zwischen einfachen Soldaten und ausländischen Frauen nicht von der Regelung betroffen, da es auf beiden Seiten keinen Beweis für die „Rassenreinheit“ gab. Während des Krieges wurden viele Kinder ihren Eltern entführt und nach arischen Kriterien auf ihre Eignung für die Erziehung in Lebensborn-Heimen und die Pflege durch deutsche Familien geprüft."
preww2_country.76.a:1 "Eine größere Bevölkerung zur Kolonisierung des Ostens"
preww2_news.76.t:0 "Lebensborn-Programm gegründet"
preww2_news.76.d:0 "Lebensborn war ein von der SS initiierter, staatlich geförderter und eingetragener Verein im nationalsozialistischen Deutschland mit dem Ziel, die Geburtenrate arischer Kinder von Personen zu erhöhen, die auf Grundlage der nationalsozialistischen Rassenhygiene und Gesundheitsideologie als „rassisch rein“ und „gesund“ eingestuft wurden. Lebensborn bot seinen meist unverheirateten Müttern Sozialhilfe an, förderte anonyme Geburten unverheirateter Frauen in ihren Entbindungsheimen und vermittelte die Adoption dieser Kinder durch ebenso „rassisch reine“ und „gesunde“ Eltern, insbesondere SS-Angehörige und deren Familien. Das Ehrenkreuz der Deutschen Mutter wurde den Frauen verliehen, die die meisten arischen Kinder zur Welt brachten. Die Nazis legalisierten Abtreibungen für behinderte Kinder, bestraften sie ansonsten jedoch streng. Lebensborn wurde 1935 zunächst in Deutschland gegründet und expandierte während des Zweiten Weltkriegs in mehrere besetzte europäische Länder mit germanischer Bevölkerung."
preww2_news.76.a:1 "Ekelhaft"

preww2_country.77.t:0 "Mao Zedong veröffentlicht das Wayaobu-Manifest"
preww2_country.77.d:0 "Dieses Wayaobu-Manifest wurde im Dezember 1935 von Mao Zedong in Wayaobu im Norden Shaanxis veröffentlicht. Es befasste sich mit politischen Maßnahmen und Strategien zur Abwehr der japanischen Invasion in China. Mao Zedong rief zu einer nationalen Einheitsfront mit der Kuomintang auf, um den Japanern Widerstand zu leisten."
preww2_country.77.a:1 "Gemeinsam sind wir stark"
preww2_news.77.t:0 "Mao Zedong veröffentlicht das Wayaobu-Manifest"
preww2_news.77.d:0 "Dieses Wayaobu-Manifest wurde im Dezember 1935 von Mao Zedong in Wayaobu im Norden Shaanxis veröffentlicht. Es befasste sich mit politischen Maßnahmen und Strategien zur Abwehr der japanischen Invasion in China. Mao Zedong rief zu einer nationalen Einheitsfront mit der Kuomintang auf, um den Japanern Widerstand zu leisten."
preww2_news.77.a:1 "OK"
