preww2_country.74.t:0 "Nürnberger Gesetze erlassen"
preww2_country.74.d:0 "Die Nürnberger Gesetze waren antisemitische und rassistische Gesetze, die am 15. September 1935 im nationalsozialistischen Deutschland in Kraft traten. Es handelte sich um das Gesetz zum Schutz des deutschen Blutes und der deutschen Ehre, das Ehen und außerehelichen Verkehr zwischen Juden und Deutschen sowie die Beschäftigung deutscher Frauen unter 45 Jahren in jüdischen Haushalten verbot, und das Reichsbürgergesetz, das festlegte, dass nur Personen deutscher oder artverwandter Abstammung Reichsbürger sein konnten. Alle anderen galten als Staatsbürger ohne Staatsbürgerrechte. Am 14. November wurde eine ergänzende Verordnung erlassen, die die Definition des Judentums festlegte, und das Reichsbürgergesetz trat an diesem Tag offiziell in Kraft."
preww2_country.74.a:1 "Juden sind verboten"
