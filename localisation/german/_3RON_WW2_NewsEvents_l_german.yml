preww2_country.41.t:0 "Österreichischer Bürgerkrieg"
preww2_country.41.d:0 "Der Österreichische Bürgerkrieg war eine Auseinandersetzung zwischen faschistischen und sozialistischen Kräften zwischen dem 12. und 16. Februar 1934 in Österreich. Die Auseinandersetzungen begannen in Linz und fanden hauptsächlich in den Städten Wien, Graz, Bruck an der Mur, Judenburg, Wiener Neustadt und Steyr statt, aber auch in einigen anderen Industriestädten Ost- und Mittelösterreichs."
