preww2_news.1.t:0 "Adolf Hitler wird zum deutschen Reichskanzler ernannt"
preww2_news.1.d:0 "Am 30. Januar 1933 ernannte Reichspräsident Paul von Hindenburg Adolf Hitler, den Führer der Nationalsozialistischen Deutschen Arbeiterpartei (NSDAP), zum Reichskanzler. 1932 war das Jahr von Hitlers kometenhaftem Aufstieg in Deutschland, der größtenteils durch die Frustration der deutschen Bevölkerung über die düstere Wirtschaftslage und die noch immer schwärenden Wunden der Niederlage im Ersten Weltkrieg und der harten Friedensbedingungen des Versailler Vertrags begünstigt wurde. Als charismatischer Redner kanalisierte Hitler die Unzufriedenheit der Bevölkerung mit der Weimarer Nachkriegsregierung in Unterstützung für seine junge NSDAP. Bei einer Wahl im Juli 1932 gewannen die Nazis 230 Sitze in der Regierung; zusammen mit den Kommunisten, der nächstgrößten Partei, stellten sie über die Hälfte des Reichstags."
preww2_news.1.a:1 "Was könnte möglicherweise schiefgehen?"

preww2_country.2.t:0 "FDR entkommt einem Attentat in Miami"
preww2_country.2.d:0 "Am 15. Februar 1933 feuerte ein geistesgestörter, arbeitsloser Maurer namens Giuseppe Zangara auf den gewählten amerikanischen Präsidenten Franklin D. Roosevelt. Roosevelt hatte gerade vom Rücksitz seines offenen Tourenwagens aus eine Rede im Bayfront Park in Miami gehalten, als Zangara das Feuer mit sechs Schüssen eröffnete. Fünf Menschen wurden getroffen. Der Präsident blieb unverletzt, doch der ebenfalls anwesende Bürgermeister von Chicago, Anton Cermak, erlitt bei dem Angriff eine tödliche Bauchverletzung. Mehrere Männer griffen den Angreifer an und hätten ihn möglicherweise totgeschlagen, wenn Roosevelt nicht eingegriffen und die Menge aufgefordert hätte, die Justiz den Behörden zu überlassen. Zangara erklärte später gegenüber dem FBI, chronische Bauchschmerzen hätten ihn zu seiner Tat veranlasst. Zangaras extreme Aktion spiegelte die Wut und Frustration wider, die viele arbeitende Amerikaner während der Weltwirtschaftskrise empfanden. Zum Zeitpunkt des Attentats war Roosevelt erst der gewählte Präsident und hatte seinen Amtseid noch nicht abgelegt. Seine Politik war noch nicht erprobt, doch Berichte über Roosevelts Gelassenheit während des Attentats füllten die Zeitungen der folgenden Tage und trugen wesentlich dazu bei, Roosevelts öffentliches Image als starker Führer zu festigen. Zangara wurde zunächst wegen versuchten Mordes angeklagt und zu 80 Jahren Gefängnis verurteilt. Als Bürgermeister Cermak später an seinen Verletzungen starb, wurde Zangara erneut vor Gericht gestellt und zum Tode verurteilt. Zangara starb am 20. März 1933 auf dem elektrischen Stuhl."
preww2_country.2.a:1 "Das war knapp!"
preww2_country.2.b:1 "Tatsächlich wurde er erschossen!"

