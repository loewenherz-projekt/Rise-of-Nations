preww2_country.6.t:0 "Beginn der Schnitzereien am Mount Rushmore"
preww2_country.6.d:0 "Im Mittelpunkt des Mount Rushmore National Memorial steht eine kolossale Skulptur, die in die Granitwand des Mount Rushmore in den Black Hills in Keystone, South Dakota, gehauen wurde. Der Bildhauer Gutzon Borglum entwarf die Skulptur und überwachte die Ausführung des Projekts von 1927 bis 1941 mit Hilfe seines Sohnes Lincoln Borglum. Die Skulptur zeigt die 60 Fuß hohen Köpfe der Präsidenten George Washington, Thomas Jefferson, Theodore Roosevelt und Abraham Lincoln, wie von Borglum empfohlen. Die vier Präsidenten wurden ausgewählt, um jeweils die Geburt, das Wachstum, die Entwicklung und den Erhalt der Nation zu repräsentieren."
preww2_country.6.a:1 "OK"
