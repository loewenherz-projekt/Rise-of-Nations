preww2_country.61.t:0 "Referendum über den Saarstatus 1935"
preww2_country.61.d:0 "Bei der Volksabstimmung wurden die Wähler gefragt, ob das Saargebiet unter der Verwaltung des Völkerbundes bleiben, zu Deutschland zurückkehren oder Teil Frankreichs werden sollte. Zur Überraschung neutraler Beobachter und der Nazis selbst stimmten über 90 % für die Wiedervereinigung mit Deutschland. In jedem Wahlkreis sprachen sich mindestens 83 % der Wähler für die Rückgabe des Saargebiets an Deutschland aus. Und trotz Georges Clemenceaus Behauptung, im Saargebiet lebten 150.000 Franzosen, unterstützten weniger als 1 % der Wähler die Annexion des Saargebiets durch Frankreich."
preww2_country.61.a:1 "OK"
