preww2_country.65.t:0 "Der Führer kündigt die Wiederaufrüstung an"
preww2_country.65.d:0 "Am 16. März kündigte Hitler die Wiederaufrüstung an, ebenso wie die Wiedereinführung der Wehrpflicht. Seit 1933 rüstete Deutschland aggressiv auf und schuf Arbeitsplätze. Die geheime Wiederaufrüstung trug maßgeblich zur Lösung der Weltwirtschaftskrise in Deutschland bei und war der Grund dafür, dass das Land im Wettbewerb mit den Alliierten bestehen konnte."
preww2_country.65.a:1 "Es dient Verteidigungszwecken"
preww2_news.65.t:0 "Hitler kündigt deutsche Wiederaufrüstung an"
preww2_news.65.d:0 "Am 16. März kündigte Hitler die Wiederaufrüstung an, ebenso wie die Wiedereinführung der Wehrpflicht. Seit 1933 rüstete Deutschland aggressiv auf und schuf Arbeitsplätze. Die geheime Wiederaufrüstung trug maßgeblich zur Lösung der Weltwirtschaftskrise in Deutschland bei und war der Grund dafür, dass das Land im Wettbewerb mit den Alliierten bestehen konnte."
preww2_news.65.a:1 "Hallo, Völkerbund?"

preww2_country.66.t:0 "Erstes Fernsehprogramm"
preww2_country.66.d:0 "Der Fernsehsender „Paul Nipkow“ in Berlin war der erste öffentlich-rechtliche Fernsehsender der Welt. Er strahlte vom 22. März 1935 bis zu seiner Schließung 1944 Programme des Deutschen Fernseh-Rundfunks aus. Benannt wurde der Sender nach Paul Gottlieb Nipkow, dem Erfinder der Nipkow-Scheibe."
preww2_country.66.a:1 "Deutsche Technologie vom Feinsten"
