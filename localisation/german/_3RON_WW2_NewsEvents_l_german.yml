preww2_country.34.t:0 "Erstes NFL-Meisterschaftsspiel abgehalten"
preww2_country.34.d:0 "Das National Football League Championship Game 1933 war das erste planmäßige Meisterschaftsspiel der National Football League (NFL) seit ihrer Gründung 1920. Es fand am 17. Dezember im Wrigley Field in Chicago statt und wurde auf 25.000 Zuschauer geschätzt. Das Spiel fand zwischen den Meistern der neu geschaffenen Divisionen der Liga statt: den Chicago Bears (10–2–1) der Western Division und den New York Giants (11–3) der Eastern Division. Chicago erhielt aufgrund einer besseren Siegquote in der regulären Saison das Heimrecht; ab diesem Jahr wechselte das Heimrecht: In geraden Jahren empfing der Meister der Eastern Division das Spiel, in ungeraden Jahren die Giants der Western Division. Chicago erzielte den entscheidenden Touchdown weniger als zwei Minuten vor Schluss des vierten Viertels und krönte damit einen 23:21-Sieg. Es war der zweite Meistertitel in Folge für die Bears und der dritte unter ihrem Gründer und Cheftrainer George Halas."
preww2_country.34.a:1 "Amerika-Moment"
preww2_news.34.t:0 "Erstes NFL-Meisterschaftsspiel abgehalten"
preww2_news.34.d:0 "Das National Football League Championship Game 1933 war das erste planmäßige Meisterschaftsspiel der National Football League (NFL) seit ihrer Gründung 1920. Es fand am 17. Dezember im Wrigley Field in Chicago statt und wurde auf 25.000 Zuschauer geschätzt. Das Spiel fand zwischen den Meistern der neu geschaffenen Divisionen der Liga statt: den Chicago Bears (10–2–1) der Western Division und den New York Giants (11–3) der Eastern Division. Chicago sicherte sich den Heimvorteil aufgrund einer besseren Siegquote in der regulären Saison; ab diesem Jahr wechselte das Heimspiel: In geraden Jahren empfing der Meister der Eastern Division das Spiel, in ungeraden Jahren die Giants der Western Division. Chicago erzielte den entscheidenden Touchdown weniger als zwei Minuten vor Schluss des vierten Viertels und krönte damit einen 23:21-Sieg."
preww2_news.34.a:1 "Amerika-Moment"

preww2_country.35.t:0 "Eisenbahnunfall in Lagny-Pomponne"
preww2_country.35.d:0 "Das Eisenbahnunglück von Lagny-Pomponne ereignete sich am 23. Dezember 1933 zwischen Pomponne und Lagny-sur-Marne (48°52′54″N 2°41′47″E), 20 Kilometer östlich von Paris, als die 4-8-2-Lokomotive des Schnellzugs nach Straßburg mit 110 km/h in das Heck eines Hilfszuges nach Nancy krachte, der auf den Gleisen hielt. Durch den Aufprall wurden die letzten fünf Waggons des Nancy-Zuges zertrümmert und zersplittert. Es handelte sich um ältere Holzwaggons, die für die Feiertage in Dienst gestellt worden waren. Beide Züge waren voll mit Menschen, die über Weihnachten zu ihren Familien nach Hause fuhren. 204 Menschen starben, 120 wurden verletzt. Es handelt sich nach der Entgleisung des Zuges Saint-Michel-de-Maurienne im Jahr 1917 um das zweitschlimmste Eisenbahnunglück in der französischen Geschichte und um das schlimmste in Friedenszeiten. Der Unfall ereignete sich bei dichtem Nebel, und es wird vermutet, dass eine Eisbildung auf der AWS-Rampe den ordnungsgemäßen Betrieb der Ausrüstung verhindert haben könnte."
preww2_country.35.a:1 "OK"
preww2_news.35.t:0 "Eisenbahnunfall in Lagny-Pomponne"
preww2_news.35.d:0 "Das Eisenbahnunglück von Lagny-Pomponne ereignete sich am 23. Dezember 1933 zwischen Pomponne und Lagny-sur-Marne (48°52′54″N 2°41′47″E), 20 Kilometer östlich von Paris, als die 4-8-2-Lokomotive des Schnellzugs nach Straßburg mit 110 km/h in das Heck eines Hilfszuges nach Nancy krachte, der auf den Gleisen hielt. Durch den Aufprall wurden die letzten fünf Waggons des Nancy-Zuges zertrümmert und zersplittert. Es handelte sich um ältere Holzwaggons, die für die Feiertage in Dienst gestellt worden waren. Beide Züge waren voll mit Menschen, die über Weihnachten zu ihren Familien nach Hause fuhren. 204 Menschen starben, 120 wurden verletzt. Es handelt sich nach der Entgleisung des Zuges Saint-Michel-de-Maurienne im Jahr 1917 um das zweitschlimmste Eisenbahnunglück in der französischen Geschichte und um das schlimmste in Friedenszeiten."
