preww2_country.1002.t:0 "FDR ist tot!"
preww2_country.1002.d:0 "Giuseppe Zangaras finsterer Plan ist aufgegangen und hat zur erfolgreichen Ermordung des designierten Präsidenten Franklin D. Roosevelt geführt. Die Welt ist entsetzt, als dieser dreiste Gewaltakt weltweit nachhallt und den Lauf der Geschichte für immer verändert. Roosevelt, kurz davor, das höchste Amt der Vereinigten Staaten zu übernehmen, fiel Zangaras tödlichem Anschlag zum Opfer. Chaos bricht aus, während die Nation mit dem Verlust ihres zukünftigen Führers ringt. Die Weltgemeinschaft beobachtet den Vorfall mit angehaltenem Atem, unsicher über die Auswirkungen dieses Ereignisses auf die internationalen Beziehungen und das drohende Schreckgespenst des Zweiten Weltkriegs. Der Mordanschlag löst Schockwellen in der amerikanischen Politik aus, löst Ermittlungen aus, fordert verstärkte Sicherheitsmaßnahmen und verschärft die Spannungen im Land."
preww2_country.1002.a:1 "Was für eine Tragödie!"




preww2_country.3.t:0 "Reichstagsbrand"
preww2_country.3.d:0 "Der Reichstagsbrand war ein dramatischer Brandanschlag am 27. Februar 1933, bei dem das Gebäude des Reichstags (deutsches Parlament) in Berlin niederbrannte. Der frisch ernannte Reichskanzler Adolf Hitler behauptete, der Brand sei Teil eines kommunistischen Versuchs gewesen, die Regierung zu stürzen, und nutzte den Brand als Vorwand, um die absolute Macht in Deutschland zu ergreifen. Damit ebnete er den Weg für den Aufstieg seines Nazi-Regimes."
preww2_country.3.a:1 "Es waren die Kommunisten!"
preww2_news.3.t:0 "Reichstagsbrand"
preww2_news.3.d:0 "In Berlin hat sich ein schockierendes und dramatisches Ereignis abgespielt. In der Nacht des 27. Februar wurde das Reichstagsgebäude, Sitz des Deutschen Parlaments, Ziel eines Brandanschlags. Die Behörden bezeichneten den Anschlag als vorsätzlich. Der frisch ernannte Reichskanzler Adolf Hitler scheut sich nicht, die Kommunisten als Täter zu beschuldigen und erklärt, der Brand sei lediglich Teil eines Komplotts zum Sturz der Regierung gewesen. Der Vorfall wird als Vorwand für Notmaßnahmen genutzt. Es gibt Befürchtungen, dass dies der Beginn eines totalen Rechtsrucks in der deutschen Politik sein könnte, bei dem Hitler und seine Verbündeten umfassende Vollmachten zur „Rettung“ der Nation fordern."
preww2_news.3.a:1 "OK"

preww2_news.4.t:0 "Reichstagsbrandverordnung"
preww2_news.4.d:0 "Die Reichstagsbrandverordnung wurde am 28. Februar 1933 auf Anraten von Reichskanzler Adolf Hitler von Bundespräsident Paul von Hindenburg als unmittelbare Reaktion auf den Reichstagsbrand erlassen. Sie setzte viele wichtige bürgerliche Freiheiten deutscher Bürger außer Kraft. Da Nazis einflussreiche Positionen in der deutschen Regierung innehatten, diente die Verordnung als Rechtsgrundlage für die Inhaftierung von Personen, die als Gegner der Nazis galten, und für die Unterdrückung von Veröffentlichungen, die der Nazi-Sache nicht „freundlich“ gesinnt waren."
preww2_news.4.a:1 "Betreffend..."

preww2_country.5.t:0 "King Kong-Film veröffentlicht"
preww2_country.5.d:0 "King Kong ist ein US-amerikanischer Monster-Abenteuer- und Liebesfilm aus dem Jahr 1933, der vor dem Hays Code entstand. Regie und Produktion stammten von Merian C. Cooper und Ernest B. Schoedsack. Das Drehbuch von James Ashmore Creelman und Ruth Rose basiert auf einer Idee von Cooper und Edgar Wallace. In den Hauptrollen spielen Fay Wray, Robert Armstrong und Bruce Cabot. Der Film erzählt die Geschichte eines riesigen Gorillas namens Kong, der versucht, von einer schönen jungen Frau Besitz zu ergreifen. Der Film enthält Stop-Motion-Animationen von Willis O&#39;Brien und die Musik von Max Steiner."
preww2_country.5.a:1 "Harambe, bist du das?"
