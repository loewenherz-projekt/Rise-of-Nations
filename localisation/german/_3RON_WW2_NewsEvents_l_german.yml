preww2_country.67.t:0 "Schwarzer Sonntag im Mittleren Westen"
preww2_country.67.d:0 "Der Schwarze Sonntag bezeichnet einen besonders schweren Staubsturm, der am 14. April 1935 als Teil der Dust Bowl in den Vereinigten Staaten wütete. Er war einer der schlimmsten Staubstürme der amerikanischen Geschichte und richtete immense wirtschaftliche und landwirtschaftliche Schäden an. Schätzungsweise 300 Millionen Tonnen Mutterboden wurden aus den Präriegebieten verdrängt. Am Nachmittag des 14. April mussten die Bewohner mehrerer Präriestaaten Schutz suchen, als ein Staubsturm oder „schwarzer Blizzard“ durch die Region fegte. Der Sturm traf zuerst den Oklahoma Panhandle und Nordwest-Oklahoma und zog für den Rest des Tages Richtung Süden. Er erreichte Beaver (Oklahoma) gegen 16:00 Uhr, Boise City gegen 17:15 Uhr und Amarillo (Texas) um 19:20 Uhr. Die Bedingungen waren in den Panhandles von Oklahoma und Texas am schlimmsten, aber die Auswirkungen des Sturms waren auch in anderen umliegenden Gebieten zu spüren. Die Kombination aus Dürre, Erosion, nacktem Boden und Wind ließ den Staub ungehindert und mit hoher Geschwindigkeit aufwirbeln."
preww2_country.67.a:1 "Nicht gut"
