preww2_country.70.t:0 "Deutsch-britisches Flottenabkommen"
preww2_country.70.d:0 "Das Deutsch-Englische Flottenabkommen (AGNA) vom 18. Juni 1935 war ein Flottenabkommen zwischen Großbritannien und Deutschland, das die Größe der Kriegsmarine im Verhältnis zur Royal Navy regelte. Das Deutsch-Englische Flottenabkommen legte ein Verhältnis fest, wonach die Gesamttonnage der Kriegsmarine dauerhaft 35 % der Gesamttonnage der Royal Navy betragen sollte. Es wurde am 12. Juli 1935 in die Vertragssammlung des Völkerbundes aufgenommen. Das Abkommen wurde am 28. April 1939 von Adolf Hitler gekündigt."
preww2_country.70.a:1 "Wir sollten es unterschreiben"
preww2_country.70.b:1 "Wir brauchen es nicht"
