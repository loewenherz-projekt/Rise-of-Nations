preww2_country.60.t:0 "Amelia Earharts erster Alleinflug von Hawaii nach Kalifornien"
preww2_country.60.d:0 "Beim ersten Flug dieser Art startete die amerikanische Fliegerin Amelia Earhart vom Wheeler Field in Honolulu, Hawaii, zu einem Alleinflug nach Nordamerika. Hawaiianische Unternehmen boten dem Erstflug eine Belohnung von 10.000 US-Dollar an. Am nächsten Tag landete sie sicher am Oakland Airport in Oakland, Kalifornien, nachdem sie in 18 Stunden 3.800 Kilometer zurückgelegt hatte."
preww2_country.60.a:1 "OK"
