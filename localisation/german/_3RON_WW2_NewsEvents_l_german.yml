preww2_news.9.t:0 "Hitler erlangt die absolute Macht"
preww2_news.9.d:0 "Am 23. März 1933 legte Hitler dem Reichstag das Ermächtigungsgesetz vor. Dieses neue Gesetz gab Hitler die Macht, per Dekret zu regieren, anstatt Gesetze durch den Reichstag und den Reichspräsidenten zu verabschieden. Sollte das Gesetz verabschiedet werden, würde es die Voraussetzungen für eine diktatorische Herrschaft schaffen. Die Atmosphäre des Terrors nach dem Reichstagsbrand und die Unterstützung Hindenburgs und von Papens ließen den Vorschlag legitim und für manche sogar notwendig erscheinen. Für die Verabschiedung des Gesetzes war eine Zweidrittelmehrheit des Reichstags erforderlich. Die Nazis hatten die Unterstützung der DNVP und hatten der kommunistischen Partei KPD die Teilnahme am Gesetz verboten."
preww2_news.9.a:0 "Endlich! Heil Hitler!" #this is just an artistic expression pls dont kill me
preww2_news.9.b:0 "So stirbt also die Freiheit ..."

preww2_country.10.t:0 "Unsere Mitgliedschaft im Völkerbund"
preww2_country.10.d:0 "Die japanische Delegation zog sich heute entgegen der Weltöffentlichkeit aus der Völkerbundversammlung zurück, nachdem diese einen Bericht angenommen hatte, der Japan für die Ereignisse in der Mandschurei verantwortlich machte. Die fassungslose internationale Versammlung, die fast alle Nationen der Welt vertrat, saß schweigend da, während die Delegation, angeführt vom adretten, schwarz gekleideten Yosuke Matsuoka, den Saal verließ. Auf den überfüllten Rängen brachen lautes Zischen und Applaus aus."
preww2_country.10.a:1 "Verlassen"
preww2_country.10.b:1 "Bleiben"
preww2_news.10.t:0 "Japan zieht sich aus der Liga zurück"
