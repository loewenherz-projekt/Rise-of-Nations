preww2_country.58.t:0 "Abessinienkrise"
preww2_country.58.d:0 "Die Abessinienkrise war eine internationale Krise im Jahr 1935, die ihren Ursprung im sogenannten Walwal-Vorfall im damals andauernden Konflikt zwischen dem Königreich Italien und dem Kaiserreich Äthiopien hatte. Der Völkerbund entschied gegen Italien und votierte für Wirtschaftssanktionen, die jedoch nie vollständig umgesetzt wurden. Italien ignorierte die Sanktionen, trat aus dem Völkerbund aus, schloss Sonderabkommen mit Großbritannien und Frankreich und annektierte und besetzte schließlich Abessinien, nachdem es es im Zweiten Italienisch-Äthiopischen Krieg besiegt hatte. Die Krise diskreditierte den Völkerbund und brachte das faschistische Italien einem Bündnis mit Nazideutschland näher. Sowohl Äthiopien als auch Italien verfolgten eine Politik der Provokation gegeneinander, und Italien bereitete sich auf eine Invasion Äthiopiens vor."
preww2_country.58.a:1 "Wir werden sie zivilisieren"
preww2_news.58.t:0 "Abessinienkrise"
preww2_news.58.d:0 "Die Abessinienkrise war eine internationale Krise im Jahr 1935, die ihren Ursprung im sogenannten Walwal-Vorfall im damals andauernden Konflikt zwischen dem Königreich Italien und dem Kaiserreich Äthiopien hatte. Der Völkerbund entschied gegen Italien und votierte für Wirtschaftssanktionen, die jedoch nie vollständig umgesetzt wurden. Italien ignorierte die Sanktionen, trat aus dem Völkerbund aus, schloss Sonderabkommen mit Großbritannien und Frankreich und annektierte und besetzte schließlich Abessinien, nachdem es es im Zweiten Italienisch-Äthiopischen Krieg besiegt hatte. Die Krise diskreditierte den Völkerbund und brachte das faschistische Italien einem Bündnis mit Nazideutschland näher. Äthiopien und Italien verfolgten eine Politik der Provokation gegeneinander, und Italien bereitete sich auf eine Invasion Äthiopiens vor."
preww2_news.58.a:1 "Italien wird Äthiopien schnell vernichten"
