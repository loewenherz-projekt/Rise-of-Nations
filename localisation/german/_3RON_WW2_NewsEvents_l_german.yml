preww2_country.40.t:0 "Unterzeichnen Sie den Balkanpakt"
preww2_country.40.d:0 "Der Balkanpakt war ein Vertrag, der am 9. Februar 1934 in Athen von Griechenland, der Türkei, Rumänien und Jugoslawien unterzeichnet wurde und darauf abzielte, den geopolitischen Status quo in der Region nach dem Ende des Ersten Weltkriegs aufrechtzuerhalten. Der Pakt trat am Tag seiner Unterzeichnung in Kraft und wurde am 1. Oktober 1934 in die Sammlung der Verträge des Völkerbundes aufgenommen. Der Balkanpakt trug dazu bei, den Frieden zwischen den Unterzeichnerstaaten zu sichern, konnte die regionalen Intrigen jedoch nicht beenden."
preww2_country.40.a:1 "Vorschlag für einen gegenseitigen Verteidigungsvertrag"
preww2_country.40.b:1 "Schlagen Sie eine Fraktion vor"
preww2_country.40.c:1 "Wir stehen allein"
