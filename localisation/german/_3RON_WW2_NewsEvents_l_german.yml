preww2_country.11.t:0 "Antijüdischer Boykott"
preww2_country.11.d:0 "Keine drei Monate nach der Machtübernahme in Deutschland inszenierte die NS-Führung einen Wirtschaftsboykott gegen jüdische Geschäfte und Büros jüdischer Fachkräfte. Der Boykott wurde dem deutschen Volk als Vergeltungsmaßnahme und Racheakt für die schlechte internationale Presse gegen Deutschland seit der Machtübernahme Hitlers im Januar 1933 präsentiert. Die Nazis behaupteten, deutsche und ausländische Juden würden „Gräuelgeschichten“ verbreiten, um Deutschlands Ruf zu schädigen. Nazi-Sturmtruppen standen bedrohlich vor jüdischen Kaufhäusern und Einzelhandelsgeschäften sowie vor den Büros jüdischer Fachkräfte, hielten Schilder hoch und riefen Slogans wie „Kauft nicht bei Juden“ und „Die Juden sind unser Unglück“. Obwohl die nationale Boykottkampagne nur einen Tag dauerte und von vielen Deutschen ignoriert wurde, die weiterhin in jüdischen Geschäften einkauften und die Dienste jüdischer Fachkräfte in Anspruch nahmen, markierte der Boykott den Beginn einer landesweiten Kampagne der NSDAP gegen Juden in Deutschland, die im Holocaust gipfeln sollte."
preww2_country.11.a:1 "OK"
preww2_news.11.t:0 "Antijüdischer Boykott im Nazi-Deutschland"
preww2_news.11.d:0 "Keine drei Monate nach ihrer Machtübernahme in Deutschland inszenierte die Nazi-Führung einen Wirtschaftsboykott gegen jüdische Geschäfte und Büros jüdischer Selbständiger. Der Boykott wurde dem deutschen Volk als Vergeltungsmaßnahme und Racheakt für die schlechte internationale Presse gegen Deutschland seit der Machtübernahme Hitlers im Januar 1933 präsentiert. Die Nazis behaupteten, deutsche und ausländische Juden würden „Gräuelgeschichten“ verbreiten, um Deutschlands Ruf zu schädigen. Nazi-SA-Leute standen bedrohlich vor jüdischen Kaufhäusern und Einzelhandelsgeschäften sowie vor den Büros jüdischer Selbständiger, hielten Schilder hoch und riefen Slogans wie „Kauft nicht bei Juden“ und „Die Juden sind unser Unglück“."
preww2_news.11.a:1 "OK"

preww2_country.12.t:0 "Den Haag entscheidet gegen uns"
preww2_country.12.d:0 "Als die Union zwischen den Kronen Dänemarks und Norwegens 1814 aufgelöst wurde, trennte der Kieler Frieden die ehemaligen norwegischen Kolonien und übergab sie der Kontrolle des dänischen Monarchen. Norwegen besetzte im Juli 1931 das damals unbewohnte Ostgrönland als Eriks des Roten Landes und behauptete, es handele sich um Terra Nullius. Norwegen und Dänemark einigten sich 1933 darauf, die Angelegenheit dem Ständigen Internationalen Gerichtshof vorzulegen, der gegen Norwegen entschied."
preww2_country.12.a:1 "Akzeptieren Sie die Entscheidung"
preww2_country.12.b:1 "Nimm es mit Gewalt"
preww2_news.12.t:0 "Den Haag entscheidet gegen Norwegen"
preww2_news.12.d:0 "Als die Union zwischen den Kronen Dänemarks und Norwegens 1814 aufgelöst wurde, trennte der Kieler Frieden die ehemaligen norwegischen Kolonien und übergab sie der Kontrolle des dänischen Monarchen. Norwegen besetzte im Juli 1931 das damals unbewohnte Ostgrönland als Eriks des Roten Landes und behauptete, es handele sich um Terra Nullius. Norwegen und Dänemark einigten sich 1933 darauf, die Angelegenheit dem Ständigen Internationalen Gerichtshof vorzulegen, der gegen Norwegen entschied."
preww2_news.12.a:1 "OK"

preww2_country.13.t:0 "Gesetz zur Wiederherstellung des Berufsbeamtentums"
preww2_country.13.d:0 "Die deutsche Regierung erlässt das Gesetz zur Wiederherstellung des Berufsbeamtentums, das Juden und andere politische Gegner der Nazis von allen Positionen im öffentlichen Dienst ausschließt. Ausgenommen sind zunächst diejenigen, die seit dem 1. August 1914 im öffentlichen Dienst tätig waren, Veteranen des Ersten Weltkriegs oder Personen, deren Vater oder Sohn im Ersten Weltkrieg gefallen ist."
preww2_country.13.a:1 "OK"
preww2_news.13.t:0 "Nazi-Deutschland verabschiedet antisemitische Gesetze"
preww2_news.13.d:0 "Die deutsche Regierung erlässt das Gesetz zur Wiederherstellung des Berufsbeamtentums, das Juden und andere politische Gegner der Nazis von allen Positionen im öffentlichen Dienst ausschließt. Ausgenommen sind zunächst diejenigen, die seit dem 1. August 1914 im öffentlichen Dienst tätig waren, Veteranen des Ersten Weltkriegs oder Personen, deren Vater oder Sohn im Ersten Weltkrieg gefallen ist."
preww2_news.13.a:1 "OK"

preww2_country.14.t:0 "Ungeheuer von Loch Ness gesichtet"
preww2_country.14.d:0 "Die moderne Legende vom Ungeheuer von Loch Ness entstand, als eine Sichtung am 2. Mai 1933 in die Lokalnachrichten gelangte. Die Zeitung Inverness Courier berichtete von einem einheimischen Paar, das behauptete, „ein riesiges Tier gesehen zu haben, das auf der Wasseroberfläche rollte und tauchte“. Die Geschichte des „Monsters“ (ein Spitzname, den der Courier-Herausgeber gewählt hatte) wurde zu einem Medienphänomen. Londoner Zeitungen schickten Korrespondenten nach Schottland, und ein Zirkus setzte eine Belohnung von 20.000 Pfund Sterling für den Fang des Ungeheuers aus."
preww2_country.14.a:1 "OK"
