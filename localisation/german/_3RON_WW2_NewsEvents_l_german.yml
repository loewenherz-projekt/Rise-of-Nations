preww2_country.57.t:0 "König Alexander und französischer Außenminister ermordet"
preww2_country.57.d:0 "Am 9. Oktober wurden der König und Barthou von Velicko Kerin, einem bulgarischen revolutionären Nationalisten, ermordet. Das Attentat war im August 1934 in Rom von Ante Pavelić, dem Chef der kroatischen Ustascha, geplant worden. Pavelić wurde von Georg Percevic, einem ehemaligen Offizier der österreichisch-ungarischen Streitkräfte, unterstützt. Frankreich beantragte erfolglos die Auslieferung von Percevic und Pavelić. Dieses Attentat beendete die Karrieren des Präfekten des Departements Bouches-du-Rhône, Pierre Jouhannaud, und des Direktors der Sûreté Nationale, Jean Berthoin."
preww2_country.57.a:1 "Ruhe in Frieden"
