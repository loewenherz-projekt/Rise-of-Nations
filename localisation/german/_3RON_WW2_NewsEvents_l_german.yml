ronww2_news.1.title:0 "Adolf Hitler wird zum deutschen Reichskanzler ernannt"
ronww2_news.1.desc:0 "Heute hat Paul von Hindenburg in Deutschland den Vorsitzenden der Nationalsodalen Partei zum deutschen Bundeskanzler ernannt. Dies ist ein umstrittener Schritt zur Stabilisierung Deutschlands."
ronww2_news.1.a:0 "Wird dies der deutschen Wirtschaft helfen?"
ronww2_news.2.title:0 "Reichstagsbrand"
ronww2_news.2.desc:0 "Der Reichstag ist in Brand gesteckt worden. Es wird vermutet, dass es sich um einen Brandanschlag auf das Reichstagsgebäude in Berlin handelte, der am Montag, dem 27. Februar 1933, genau vier Wochen nach der Vereidigung Adolf Hitlers als Reichskanzler, verübt wurde. Hitlers neue Regierung erklärte den niederländischen Rätekommunisten Marinus van der Lubbe zum Täter und schrieb den Brand kommunistischen Agitatoren zu."
ronww2_news.2.a:0 "Sagt Hitler die Wahrheit?"
ronww2_news.3.title:0 "Das Ermächtigungsgesetz wird verabschiedet"
ronww2_news.3.desc:0 "Heute in Deutschland: Der Reichstag verabschiedet das Ermächtigungsgesetz, das Adolf Hitler zum Diktator Deutschlands macht. Es ist unklar, wie lange Hitlers Schreckensherrschaft dauern wird und welche neuen Folgen seine neue Außenpolitik haben wird."
ronww2_news.3.a:0 "Eine neue Ideologie bricht über Europa herein"
ronww2_news.4.title:0 "Der Holodomor erreicht seinen Höhepunkt"
ronww2_news.4.desc:0 "Heute hat die Holodomor-Hungersnot in der Ukraine unter dem Sowjetregime ihren Höhepunkt erreicht: Täglich sterben 30.000 Menschen an menschengemachtem Hunger."
ronww2_news.4.a:0 "Werden sich die Sowjets jemals erholen?"
ronww2_news.5.title:0 "Der Goldstandard geht zu Ende"
ronww2_news.5.desc:0 "Heute ist der Goldstandard in Amerika mit der Verabschiedung einer gemeinsamen Resolution des US-Kongresses beendet. Mit der Abschaffung des Goldstandards wurde das Recht der Gläubiger, Zahlungen in Gold zu verlangen, faktisch aufgehoben."
ronww2_news.5.a:0 "Ist das zum Besseren?"
ronww2_news.6.title:0 "Der österreichische Bürgerkrieg beginnt"
ronww2_news.6.desc:0 "Heute sind die Zusammenstöße zwischen faschistischen und sozialistischen Kräften in Österreich in einen Bürgerkrieg ausartet, in dem die Zentralregierung die sodalistischen Kräfte unterdrückt. Es ist unklar, wer diesen Bürgerkrieg gewinnen wird, aber wer auch immer gewinnt, wird die Gestalt Europas für die kommenden Jahre verändern."
ronww2_news.6.a:0 "Welche Seite wird gewinnen?"
ronww2_news.7.title:0 "1934: Deutsche Volksabstimmung angenommen"
ronww2_news.7.desc:0 "Heute wird ein Referendum angenommen, bei dem Adolf Hitler versucht, die totale Kontrolle über Deutschland zu erlangen. 90 % der deutschen Bevölkerung befürworten Hitlers Übernahme der Macht als Führer und Reichskanzler."
ronww2_news.7.a:0 "Die Demokratie ist gefallen"
ronww2_news.8.title:0 "Der Lange Marsch beginnt"
ronww2_news.8.desc:0 "Heute hat die Rote Armee des kommunistischen Chinas einen militärischen Rückzug durchgeführt, um der Verfolgung durch die Kuomintang-Armee zu entgehen. Es ist unklar, ob sie diesen Rückzug überleben wird oder ob dies das Ende des Kommunismus in China bedeutet."
ronww2_news.8.a:0 "China marschiert weiter"
ronww2_news.9.title:0 "Mao Zedong veröffentlicht das Wayaobu-Manifest"
ronww2_news.9.desc:0 "Heute hat Mao Zedong das Wayaobu-Manifest „Über Taktiken gegen den japanischen Imperialismus“ herausgegeben, in dem er zu einer nationalen Einheitsfront gegen die japanische Invasion aufruft."
ronww2_news.9.a:0 "Zwei gegensätzliche Ideologien arbeiten zusammen"
ronww2_news.10.title:0 "Gründung der Hitlerjugend"
ronww2_news.10.desc:0 "Erst heute hat Hitler allen deutschen Jungen im Alter von 10 bis 18 Jahren befohlen, der paramilitärischen Organisation Hitlerjugend beizutreten. Das Hitlerjugendprogramm ist ein Propagandaprogramm zur Sicherung der Zukunft Nazideutschlands und wurde mit der Nazi-Ideologie indoktriniert."
ronww2_news.10.a:0 "Die Kinder jetzt auch?"
ronww2_news.11.title:0 "Die Golden Gate Bridge wird eröffnet"
ronww2_news.11.desc:0 "In Kalifornien wird die Golden Gate Bridge für den Fußgängerverkehr geöffnet und schafft damit eine wichtige Verbindung zwischen San Francisco und Marin County. Am nächsten Tag drückt Präsident Franklin D. Roosevelt in Washington, D.C. einen Knopf und gibt damit den Autoverkehr über die Brücke frei. Es scheint, als würde der Transport von Gütern in Amerika nun einfacher."
ronww2_news.11.a:0 "Kalifornien ist verbunden"
ronww2_news.12.title:0 "Referendum in Irland"
ronww2_news.12.desc:0 "In einem Referendum nimmt das Volk des Irischen Freistaats die neue Verfassung mit 685.105 zu 527.945 Stimmen an. Es scheint, als würde Irland eine Republik bleiben und seine Freiheit gesichert sein."
ronww2_news.12.a:0 "Irland ist eine Republik"
ronww2_news.13.title:0 "FDR abgelehnt"
ronww2_news.13.desc:0 "Heute lehnt der Senat der Vereinigten Staaten den Vorschlag von Präsident Franklin D. Roosevelt ab, dem Obersten Gerichtshof der Vereinigten Staaten mehr Richter hinzuzufügen. Damit endet das von FDR vorgeschlagene System der Gerichtsbesetzung. Es scheint, als müsse er die Unterstützung des Repräsentantenhauses und des Senats gewinnen, um weitermachen zu können."
ronww2_news.13.a:0 "Amerikas Gerichte bleiben dieselben"
ronww2_news.14.title:0 "Petersilienmassaker"
ronww2_news.14.desc:0 "Auf Befehl von Präsident Rafael Trujillo töteten dominikanische Truppen Tausende von Haitianern in der Dominikanischen Republik. Bei dem Massaker handelte es sich um eine Massentötung von Haitianern, die im Oktober 1937 an der nordwestlichen Grenze der Dominikanischen Republik und in bestimmten Teilen der angrenzenden Region Cibao lebten. Die Truppen der Dominikanischen Armee kamen aus verschiedenen Teilen des Landes."
ronww2_news.14.a:0 "Wird Amerika reagieren?"
ronww2_news.15.title:0 "Die neue Verfassung Irlands tritt in Kraft"
ronww2_news.15.desc:0 "Der Irischer Freistaat wird zu „Irland“, und Éamon de Valera wird der erste Taoiseach des neuen Staates. Eine Präsidialkommission, bestehend aus dem Obersten Richter, dem Sprecher des Dáil Éireann und dem Präsidenten des Obersten Gerichtshofs, übernimmt die Machtbefugnisse des neuen Präsidenten, bis im Juni 1938 der erste Präsident Irlands durch das Volk gewählt wird. Die neue Verfassung verbietet die Scheidung"
ronww2_news.15.a:0 "Eine Republik"
ronww2_news.16.title:0 "Bundeskanzler Kurt von Schuschnigg trifft Hitler"
ronww2_news.16.desc:0 "Heute trifft sich der österreichische Bundeskanzler Kurt von Schuschnigg mit Adolf Hitler in Berchtesgaden und wird mit der Gefahr einer Invasion konfrontiert. Er muss den deutschen Forderungen nach einer stärkeren Beteiligung der Nazis an der österreichischen Regierung nachgeben. Es scheint, als wäre heute ein schwarzer Tag für die Demokratie."
ronww2_news.16.a:0 "Ist das das Ende Österreichs?"
ronww2_news.17.title:0 "Hitler verkündet seinen Entschluss, die Tschechoslowakei zu zerstören"
ronww2_news.17.desc:0 "In einer Konferenz in der Reichskanzlei verkündet Hitler seinen Entschluss, die Tschechoslowakei militärisch zu zerstören und befiehlt die sofortige Mobilisierung von 96 Wehrmachtsdivisionen. Es scheint, als würde der tschechoslowakische Staat bald fallen."
ronww2_news.17.a:0 "Ist dies das Ende der Tschechoslowakei?"
ronww2_news.18.title:0 "Polnische Armeemassen entlang der tschechischen Grenze"
ronww2_news.18.desc:0 "Es scheint, als ob nicht nur die Deutschen einmarschieren wollen. Während sich die polnische Armee entlang der tschechischen Grenze versammelt, warnt die Sowjetunion Polen, dass Russland den Nichtangriffspakt von 1932 für ungültig erklären würde, wenn es die tschechische Grenze überschreite. Polen steht vor der Wahl, in die Tschechoslowakei einzumarschieren oder mit der Sowjetunion befreundet zu bleiben."
ronww2_news.18.a:0 "Es scheint, als sei die Tschechoslowakei zum Untergang verurteilt?"
ronww2_news.19.title:0 "Otto Hahn entdeckt die Kernspaltung des Urans"
ronww2_news.19.desc:0 "Heute hat Otto Hahn die Kernspaltung von Uran entdeckt, die wissenschaftliche und technologische Grundlage der Kernenergie, die den Beginn des Atomzeitalters markiert. Ihre aktuelle Verwendung ist unbekannt, aber es wird spekuliert, dass sie zur Weiterentwicklung der Kriegsführung und der Medizin eingesetzt werden könnte."
ronww2_news.19.a:0 "Wofür wird dies verwendet"
ronww2_news.20.title:0 "Hitler hält eine Rede und fordert eine „Exportschlacht“"
ronww2_news.20.desc:0 "Heute hielt Hitler eine Rede vor dem Reichstag, in der er zu einer „Exportschlacht“ aufrief, um die deutschen Devisenbestände zu erhöhen. In der Rede warnte Hitler, dass ein Krieg „jüdischer Finanziers“ gegen Deutschland „die Vernichtung der jüdischen Rasse in Europa“ zur Folge haben werde."
ronww2_news.20.a:0 "Solange es keine Armeeschlacht ist ..."
ronww2_news.21.title:0 "Spanien und Portugal unterzeichnen den Iberischen Pakt"
ronww2_news.21.desc:0 "Heute haben Spanien und Portugal in Lissabon den Iberischen Pakt unterzeichnet und sich damit zur gegenseitigen Verteidigung der Iberischen Halbinsel und zur Neutralität im Falle eines allgemeinen europäischen Krieges verpflichtet. Es scheint, als würden sie sich auf das Schlimmste vorbereiten."
ronww2_news.21.a:0 "Ist dies der Beginn von etwas Größerem?"
ronww2_news.22.title:0 "Adolf Hitler befiehlt der Kriegsmarine, mit den Eröffnungsoperationen für Fall Weiß zu beginnen"
ronww2_news.22.desc:0 "Nachdem Adolf Hitler den Verlauf der Nichtangriffsverhandlungen mit der Sowjetunion bewertet hat, befiehlt er der Kriegsmarine, mit den Eröffnungsoperationen für „Fall Weiß“, eine geplante Invasion Polens, zu beginnen. Das deutsche Panzerschiff Admiral Graf Spee, das deutsche Panzerschiff Deutschland sowie Dutzende U-Boote brechen zu ihren vorgeschobenen Positionen auf. Hitler verbringt die nächsten Tage mit der Sorge, dass die Russen sich nicht rechtzeitig einigen werden, damit die restlichen Invasionspläne wie geplant umgesetzt werden können."
ronww2_news.22.a:0 "Der Krieg steht unmittelbar bevor"
ronww2_news.23.title:0 "Großbritannien mobilisiert"
ronww2_news.23.desc:0 "Als Einzelheiten des Molotow-Ribbentrop-Pakts öffentlich werden, beruft der britische Premierminister Neville Chamberlain das britische Parlament mehrere Wochen früher ein. In einer Flut von Gesetzen verleiht der Emergency Powers Act von 1939 den Verteidigungsvorschriften volle Autorität, die britische Royal Navy wird auf Kriegsfuß gestellt, sämtlicher Militärurlaub wird gestrichen, militärische Reservekräfte, insbesondere Küstenschutz-, Radar- und Flugabwehreinheiten, werden einberufen, und der Zivilschutz wird in Alarmbereitschaft versetzt. Darüber hinaus werden die letzten britischen und französischen Privatbürger in Deutschland von ihren jeweiligen Regierungen aufgefordert, nach Hause zurückzukehren. Es scheint, als stünde der Krieg unmittelbar bevor."
ronww2_news.23.a:0 "Der Krieg wird bald kommen"
ronww2_news.24.title:0 "Beginn der Operation Himmler"
ronww2_news.24.desc:0 "Nazideutsche Truppen, die sich als Polen ausgeben, führen eine Reihe von Operationen unter falscher Flagge an der Grenze durch und liefern damit einen Vorwand für die Invasion Polens. Deutschland hat nun einen Grund für die Invasion Polens ... ein Kriegsziel. Sie sind bereit, die Operation zu beginnen"
ronww2_news.24.a:0 "Polen muss sich auf den Krieg vorbereiten!"
ronww2_news.25.title:0 "Eine gemeinsame Siegesparade wird abgehalten"
ronww2_news.25.desc:0 "Heute findet in Brest-Litowsk eine gemeinsame Siegesparade der Wehrmacht und der Roten Armee zum Abschluss des Polenfeldzugs statt. Es scheint ein schwarzer Tag für Polen zu sein, da es nun nicht mehr existiert."
ronww2_news.25.a:0 "Polen ist weg"
ronww2_news.26.title:0 "Lebensborn wird in Polen umgesetzt"
ronww2_news.26.desc:0 "Heute ist Lebensborn eine Politik der Kinderentführung durch Nazi-Deutschland, die im besetzten Polen begann. Sie wurde von den Weltmächten international verurteilt. Es ist unklar, welche Auswirkungen dies auf die deutschen Kriegsanstrengungen und ihre Bemühungen um mehr Verbündete haben wird."
ronww2_news.26.a:0 "Wie schrecklich"
ronww2_news.27.title:0 "Vorfall in Mechelen"
ronww2_news.27.desc:0 "Heute muss ein deutsches Flugzeug mit geheimen Plänen für die Invasion Westeuropas in Belgien notlanden, was zur Mobilisierung der Verteidigungskräfte in den Niederlanden führt. Es scheint, als würde sich der Krieg schon bald auf Osteuropa ausweiten …"
ronww2_news.28.title:0 "Die Färöer-Inseln werden von britischen Truppen besetzt"
ronww2_news.28.desc:0 "Mit der Invasion Dänemarks werden die Färöer-Inseln von britischen Truppen besetzt. Diese Maßnahme wird ergriffen, um eine mögliche deutsche Besetzung der Inseln zu verhindern, mit schwerwiegenden Folgen für den Verlauf der Schlacht um den Atlantik. Es scheint, als würde der Krieg mit dem Zusammenbruch Dänemarks eskalieren"
ronww2_news.28.a:0 "Wie lange hält Gremany?"
ronww2_news.29.title:0 "Die britische Invasion Islands beginnt."
ronww2_news.29.desc:0 "Als Reaktion auf die deutsche Invasion in Frankreich haben die Briten es sich zur Aufgabe gemacht, die strategisch wichtige Region Island zu sichern. Es ist unklar, ob dies den Verlauf des Krieges beeinflussen wird."
ronww2_news.29.a:0 "Island wird fallen"
ronww2_news.30.title:0 "Das Emergency Powers Act 1939 wird verabschiedet"
ronww2_news.30.desc:0 "Das Parlament des Vereinigten Königreichs verabschiedet den Emergency Powers Act von 1939, der der Regierung die volle Kontrolle über alle Personen und deren Eigentum gibt. Manche argumentieren, dass dies die Macht der Regierung erweitert."
ronww2_news.30.a:0 "Das ist tyrannisch"
ronww2_news.31.title:0 "Das Kriegsministerium von Churchill bietet eine französisch-britische Union an"
ronww2_news.31.desc:0 "Heute hat das Kriegsministerium Churchills im Vereinigten Königreich angeboten, Länder zu vereinen und eine französisch-britische Union zu bilden. Für den französischen Premierminister Paul Reynaud ist es unklar und unwahrscheinlich, dass Frankreich die Union akzeptieren wird, in der Hoffnung, einen Waffenstillstand mit Deutschland zu verhindern. Wir werden bald erfahren, was die Zukunft bringt."
ronww2_news.31.a:0 "Wird eine neue Gewerkschaft gegründet?"
ronww2_news.32.title:0 "Adolf Hitler richtet einen Friedensappell an Großbritannien"
ronww2_news.32.desc:0 "Adolf Hitler richtete heute in einer Rede vor dem Reichstag einen Friedensappell an Großbritannien. Der deutschsprachige BBC-Moderator Sefton Delmer wies diesen Appell umgehend inoffiziell zurück, und der britische Außenminister Lord Halifax lehnte die Friedensbedingungen in einer im Juli ausgestrahlten Antwort rundweg ab."
ronww2_news.32.a:0 "Wird Europa jemals wieder dasselbe sein?"
ronww2_news.33.title:0 "Abschiebung im Juni"
ronww2_news.33.desc:0 "Heute treffen Berichte ein, wonach sowjetische Behörden rund 65.000 Menschen aus Estland, Lettland und Litauen nach Sibirien deportieren. Alle deutschen und italienischen Vermögenswerte in den USA werden eingefroren. Diese Massendeportation erfolgte nach den Richtlinien des NKWD und des KGB. Der sowjetische Volkskommissar für Inneres, Lawrentij Beria, war der oberste Vollstrecker."
ronww2_news.33.a:0 "Los geht&#39;s"
ronww2_news.34.title:0 "Deutschland und Italien erkennen die neu organisierte chinesische Nationalregierung an"
ronww2_news.34.desc:0 "Heute erkennen Deutschland und Italien in einem Akt der Anerkennung gegenüber den Verbündeten die von Japan unterstützte chinesische Reorganisation der Nationalregierung, einen Marionettenstaat Japans unter Wang Jingwei, als legitime Regierung Chinas an. Dies stieß auf massive Kritik der Verbündeten und Chinas."
ronww2_news.34.a:0 "Ist das das wahre Porzellan?"
ronww2_news.35.title:0 "Richard C. Hottelet wird von der Gestapo verhaftet"
ronww2_news.35.desc:0 "Richard Curt Hottelet, ein in Brooklyn geborener amerikanischer Rundfunkjournalist, wurde von der Gestapo wegen „Verdachts der Spionage“ gegen Deutschland verhaftet. Es ist unklar, wie lange er in Gefangenschaft bleiben wird oder ob er lebend herauskommt, aber wir werden warten"
ronww2_news.35.a:0 "WHO?"
ronww2_news.36.title:0 "General Douglas MacArthur wird zum Kommandeur der Philippinen ernannt"
ronww2_news.36.desc:0 "General Douglas MacArthur wird zum Oberbefehlshaber aller US-Streitkräfte auf den Philippinen ernannt; Präsident Roosevelt ordnet die Verstaatlichung der philippinischen Armee an."
ronww2_news.36.a:0 "Weiter geht&#39;s"
ronww2_news.37.title:0 "Die Moskauer Konferenz beginnt"
ronww2_news.37.desc:0 "Heute treffen sich der US-Abgeordnete Averell Harriman und der britische Repräsentant Lord Beaverbrook mit dem sowjetischen Außenminister Wjatscheslaw Molotow, um angesichts der deutschen Invasion dringende Hilfe für Russland zu vereinbaren. Es ist unklar, wie weit die Deutschen dabei gehen werden und ob die Kriegsmaschinerie jemals zum Stillstand kommt."
ronww2_news.37.a:0 "Wird das den Sowjets helfen?"
ronww2_news.38.title:0 "Das Tiraspol-Abkommen wird unterzeichnet"
ronww2_news.38.desc:0 "Heute wird das Tiraspol-Abkommen zwischen Deutschland und Rumänien unterzeichnet. Durch das Abkommen mit der rumänischen Verwaltung der Region Transnistrien wird die Region offiziell zum Gouvernement Transnistrien."
ronww2_news.38.a:0 "Ist dies der Beginn eines Großrumäniens?"
ronww2_news.39.title:0 "Die Hull-Note wird dem Kaiserreich Japan übergeben"
ronww2_news.39.desc:0 "Heute wird die Hull-Note, benannt nach Außenminister Cordell Hull, von den Vereinigten Staaten an das japanische Kaiserreich übergeben. Die Hull-Note besteht aus zwei Teilen. Der erste Teil ist ein „Entwurf einer gemeinsamen Politikerklärung“, in dem die Grundsätze dargelegt werden. Er stellt den ersten Versuch dar, Frieden zwischen Amerika und Japan zu schließen."
ronww2_news.39.a:0 "Ein gescheiterter Friedensversuch"
ronww2_news.40.title:0 "Nacht-und-Nebel-Erlass verkündet"
ronww2_news.40.desc:0 "Heute erlässt Adolf Hitler sein Nacht-und-Nebel-Dekret. Darin wird erklärt, dass alle politischen Gefangenen und alle, die sich am deutschen Widerstand gegen den Nationalsozialismus beteiligten, sowie alle, die sich im gesamten deutsch besetzten Europa gegen den Nationalsozialismus engagierten, von der Gestapo, dem Sicherheitsdienst und anderen Sicherheitskräften unter Heinrich Himmlers Befehl festgenommen werden sollen. Es scheint, als würde Deutschland seine Kontrolle über ganz Europa festigen."
ronww2_news.40.a:0 "Deutschlands Macht wächst"
ronww2_news.41.title:0 "Die Schlacht um Los Angeles beginnt"
ronww2_news.41.desc:0 "Heute werden in Los Angeles über 1.400 Flugabwehrgranaten auf ein unbekanntes, langsam fliegendes Objekt abgefeuert. Das Auftauchen des Objekts löst in weiten Teilen Südkaliforniens eine sofortige Kriegsverdunkelung aus. Tausende Luftschutzwarte werden in der ganzen Stadt eingesetzt. Mindestens fünf Menschen sterben bei dem Vorfall. Trotz des mehrstündigen Sperrfeuers werden keine Flugzeuge abgeschossen."
ronww2_news.41.a:0 "Wurde wegen Luftballons Blut vergossen?"
ronww2_news.42.title:0 "Das Deutsche Opernhaus wird zerstört"
ronww2_news.42.desc:0 "Heute wird das Deutsche Opernhaus in der Bismarckstraße im Berliner Bezirk Charlottenburg bei einem Luftangriff zerstört. Es scheint, als ob nach dem Ende dieses Krieges entweder Deutschland im Rubel bleiben wird oder die Alliierten, nur die Zeit wird es zeigen ..."
ronww2_news.42.a:0 "Ein historisches Denkmal zerstört"
ronww2_news.43.title:0 "Ardeatinisches Massaker"
ronww2_news.43.desc:0 "Aus Rom gehen Berichte über die Ermordung von bis zu 335 Italienern ein, darunter 75 Juden und über 200 Mitglieder der italienischen Widerstandsbewegung verschiedener Gruppen. Zur gleichen Zeit tötet die deutsche Polizei im polnischen Markowa Józef und Wiktoria Ulm, ihre sechs Kinder und acht Juden, die sie versteckt hatten."
ronww2_news.43.a:0 "Wie schrecklich"
ronww2_news.44.title:0 "Die erste Versammlung der ASNOM findet statt"
ronww2_news.44.desc:0 "Heute in Mazedonien: Die erste Versammlung der ASNOM (Antifaschistische Versammlung zur Volksbefreiung Mazedoniens) findet im Kloster Prohor Pčinjski statt. Die erste Sitzung wurde mit der Hymne der Inneren Mazedonischen Revolutionären Organisation „Erhebe dich, Morgen der Freiheit“ eröffnet, die auch zur Hymne der neu ausgerufenen Republik wurde. Im darauffolgenden Jahr wurde sie jedoch von den Behörden wegen bulgarophiler Gesinnung verboten. Die Versammlung veröffentlichte ein Manifest, in dem die Lage in der Banschaft Vardar im ehemaligen Jugoslawien als die einer Kolonie beschrieben wurde. Das Manifest der ersten Sitzung der ASNOM brachte auch ausdrücklich die Hoffnung auf eine „Vereinigung des gesamten mazedonischen Volkes“ zum Ausdruck."
ronww2_news.44.a:0 "Wird diese Bewegung erfolgreich sein?"
ronww2_news.45.title:0 "Bombardierung von Pforzheim"
ronww2_news.45.desc:0 "Heute: Der schwerste einer Reihe von Bombenangriffen alliierter Flugzeuge auf Pforzheim wird von der britischen Royal Air Force durchgeführt. Bei dem Angriff werden bis zu 17.600 Menschen oder 31,4 % der Stadtbevölkerung getötet und etwa 83 % der Gebäude der Stadt, zwei Drittel ihrer Gesamtfläche und zwischen 80 und 100 % der Innenstadt zerstört."
ronww2_news.45.a:0 "Werden die Bombenangriffe jemals aufhören?"


