preww2_news.2.d:0 "Am 15. Februar 1933 feuerte ein geistesgestörter, arbeitsloser Maurer namens Giuseppe Zangara auf den gewählten amerikanischen Präsidenten Franklin D. Roosevelt. Roosevelt hatte gerade vom Rücksitz seines offenen Tourenwagens aus eine Rede im Bayfront Park in Miami gehalten, als Zangara das Feuer mit sechs Schüssen eröffnete. Fünf Menschen wurden getroffen. Der Präsident blieb unverletzt, doch der ebenfalls anwesende Bürgermeister von Chicago, Anton Cermak, erlitt bei dem Angriff eine tödliche Bauchverletzung. Mehrere Männer griffen den Angreifer an und hätten ihn möglicherweise totgeschlagen, wenn Roosevelt nicht eingegriffen und die Menge aufgefordert hätte, die Justiz den Behörden zu überlassen. Zangara erklärte später gegenüber dem FBI, chronische Bauchschmerzen hätten ihn zu seiner Tat veranlasst. Zangaras extreme Aktion spiegelte die Wut und Frustration wider, die viele arbeitende Amerikaner während der Weltwirtschaftskrise empfanden."
