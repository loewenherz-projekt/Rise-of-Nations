preww2_country.55.t:0 "Afghanistan tritt dem Völkerbund bei"
preww2_country.55.d:0 "Afghanistan hat über seinen Minister in London, Ali Mohammad Khan, einen Antrag auf Aufnahme in den Völkerbund gestellt. Dem Antrag wurde am 26. September stattgegeben. Sir Denys Bray erklärt im Namen Indiens, dass Indien sich freuen werde, Afghanistan willkommen zu heißen, das bereits während der Abrüstungskonferenz seinen Willen gezeigt habe, sich für die Ziele des Völkerbundes einzusetzen. Maksim Litvinov hingegen erklärt im Namen Russlands, es sei gut zu wissen, dass alle Nachbarn der UdSSR im Völkerbund vereint seien. Der britische Delegierte Archibald Skelton erklärt, der Beitritt Afghanistans entspreche einem lang gehegten Wunsch Großbritanniens, und auch die Vertreter des Irak, Chinas, Frankreichs und Italiens gratulieren."
preww2_country.55.a:1 "Liga beitreten"
preww2_country.55.b:1 "Wir brauchen sie nicht"
preww2_news.55.t:0 "Afghanistan tritt dem Völkerbund bei"
preww2_news.55.d:0 "Afghanistan stellte über seinen Londoner Minister Ali Mohammad Khan einen Antrag auf Aufnahme in den Völkerbund. Der Antrag wurde am 26. September bewilligt. Bei der Vorstellung des Berichts des damit beauftragten Unterausschusses erklärte Tevfik Rüstü Bey, Afghanistan unternehme „entschlossene Anstrengungen zur internationalen Zusammenarbeit und werde die Friedensarbeit des Völkerbundes wertvoll unterstützen“. Sir Denys Bray erklärte im Namen Indiens, Indien werde Afghanistan, das bereits auf der Abrüstungskonferenz seinen Willen zum Einsatz für den Völkerbund gezeigt habe, gerne willkommen heißen. Maksim Litvinov erklärte im Namen Russlands, es sei gut zu wissen, dass alle Nachbarn der UdSSR im Völkerbund vereint seien. Der britische Delegierte Archibald Skelton erklärte, der afghanische Beitritt entspreche einem lang gehegten Wunsch Großbritanniens."
preww2_news.55.a:1 "OK"

preww2_country.56.t:0 "Der katalanische Staat erklärt seine Unabhängigkeit"
preww2_country.56.d:0 "Am 6. Oktober 1934 rief der Präsident der Generalitat von Katalonien den katalanischen Staat innerhalb der spanischen Föderativen Republik aus. Kurz darauf schlug das spanische Militär den Aufstand rasch nieder und die Anführer wurden verhaftet."
preww2_country.56.a:1 "Wir werden sie vernichten"
preww2_country.56.b:1 "Respektieren Sie ihre Wünsche"
