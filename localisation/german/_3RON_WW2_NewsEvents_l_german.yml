preww2_country.39.t:0 "Aufruhr in Paris"
preww2_country.39.d:0 "Die Krise vom 6. Februar 1934 war eine antiparlamentarische Straßendemonstration in Paris, die von mehreren rechtsextremen Ligen organisiert wurde und in einem Aufstand auf dem Place de la Concorde, nahe dem Sitz der französischen Nationalversammlung, gipfelte. Die Polizei erschoss 15 Demonstranten. Es war eine der größten politischen Krisen während der Dritten Republik."
preww2_country.39.a:1 "Le Fascisme Ne Passera Pas!"
preww2_country.39.b:1 "Suchen Sie einen Kompromiss mit dem rechten Flügel"
