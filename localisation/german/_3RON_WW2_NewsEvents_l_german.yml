ronww2_news.1.t:0 "Mona Lisa gestohlen!"
ronww2_news.1.d:0 "Leonardo da Vincis Mona Lisa, auch bekannt als La Gioconda, ist das berühmteste Gemälde der Welt. Über die Jahre wurde viel Mühe und Tinte darauf verwendet, herauszufinden, wer sie war, was ihr rätselhaftes Lächeln bedeutet, was sie über Weiblichkeit aussagt (wenn überhaupt) und warum sie keine Augenbrauen hat. Leonardo nahm das Gemälde mit, als er 1516 von Franz I. nach Frankreich eingeladen wurde. Der König kaufte es und während der Französischen Revolution wurde es im Louvre ausgestellt. Napoleon nahm es mit, um es in seinem Schlafzimmer aufzuhängen, doch später kehrte es in den Louvre zurück."
ronww2_news.1.a:1 "Es wurde gestohlen, um Italien zu rächen …"
   
## WW2 Flavor Events by Jeff
ronww2_country.1.title:0 "Ein neuer König"
ronww2_country.1.desc:0 "Heute hat der im Exil lebende russische Adlige Boris Skossyreff dem Generalrat vorgeschlagen, ihn zum König und Staatsoberhaupt zu ernennen. Der Antrag wurde mit 23 von 24 Stimmen angenommen, die Krönung ist für morgen angesetzt.\n\nKönig Boris I. will unser Land aus der Armut befreien, indem er ausländische Unternehmen anzieht und Andorra in eine Steueroase verwandelt. 10.000 Exemplare seiner Verfassung werden bereits gedruckt und im ganzen Land verteilt."
ronww2_country.1.a:0 "Es lebe König Boris I.!"
ronww2_country.2.title:0 "Zurück zum Alten"
ronww2_country.2.desc:0 "Die Herrschaft von König Boris endet früher als erwartet. Drei, manche sagen vier, Polizisten der spanischen Guardia Civil verhafteten Boris heute in seinem Herrenhaus in der Taverne Calons in Sant Julià de Lòria, ohne dass er Widerstand leistete. Boris wird derzeit in ein Gefängnis in Barcelona gebracht."
ronww2_country.2.a:0 "Raus mit König Boris I.!"
ronww2_country.3.title:0 "Eine königliche Hochzeit"
ronww2_country.3.desc:0 "Heute ist ein wichtiger Tag für das albanische Königshaus: König Zog I. heiratete Gräfin Geraldine Apponyi de Nagy-Appony, eine halb-ungarische, halb-amerikanische römisch-katholische Aristokratin. Die Hochzeit wurde in ganz Tirana von Radio Tirana übertragen. Nach seiner Affäre mit der Baronin Franziska Janko, der Tochter eines Wiener Gärtners, hoffen viele, dass endlich etwas Legitimität zurückkehrt."
ronww2_country.3.a:0 "Ein dreifaches Hoch auf das Paar!"
ronww2_country.4.title:0 "Die Schlacht von Amba Aradam"
ronww2_country.4.desc:0 "Heute endete die Schlacht von Amba Aradam mit einem entscheidenden italienischen Sieg. Die äthiopischen Streitkräfte unter Ras Mulugeta wurden von unseren Truppen unter Pietro Badoglio eingekesselt. Die Schlacht dauerte neun Tage und forderte 6.000 Mann Verlust und 12.000 Verwundete. Nur 800 tapfere Italiener starben. \n\nNun weht die stolze italienische Flagge, gehisst von der 1. Schwarzhemden-Division „23. März“, über der Stadt. Die äthiopische Armee erlitt erneut eine schwere Niederlage."
ronww2_country.4.a:0 "Die äthiopische Armee steht am Rande des Zusammenbruchs."
ronww2_country.5.title:0 "Marsch des eisernen Willens"
ronww2_country.5.desc:0 "Heute endete der „Marsch des eisernen Willens“, als unsere Truppen ohne Widerstand in die äthiopische Hauptstadt Addis Abeba einmarschierten.\n\nFeldmarschall Pietro Badoglio begann den Marsch vor etwa zehn Tagen, als er einer mechanisierten Kolonne aus 12.500 Soldaten, 1.785 Autos und Lastwagen, einer Schwadron leichter Panzer, Flugzeugen und 193 Pferden befahl, entlang der Kaiserstraße zwischen Dessie und Addis Abeba zu marschieren. Die 1. Eritreische Brigade war die erste, die zu Fuß in die Stadt eindrang, der Rest der Kolonne folgte einen halben Tag später.\n\nHaile Selassie hatte die Stadt bereits verlassen und es lag an uns, die Ordnung wiederherzustellen, aber schließlich, um 17:45 Uhr, wehte die italienische Trikolore siegreich über der Stadt und Badoglio soll zu einem hochrangigen Mitglied der Luftwaffe gesagt haben: „Wir haben es geschafft, wir haben gewonnen!“\n\nDer Fall war erwartet worden, aber nicht nur die Soldaten, sondern auch die Bürger Roms brachen in Freude aus, als sie die Nachricht vom Fall erreichte."
ronww2_country.5.a:0 "Der Krieg in Äthiopien ist so gut wie vorbei."
ronww2_country.6.title:0 "Äthiopien kapituliert"
ronww2_country.6.desc:0 "Die Nachricht, dass das Kaiserreich Äthiopien kapituliert und damit den Zweiten Italienisch-Äthiopischen Krieg beendet hat, erreichte uns. Leider verließ Kaiser Haile Selassie das Land, doch dies ist dennoch ein großer Tag für unser Land."
ronww2_country.6.a:0 "Endlich"

# Russian Liberation Events

RNM_creationevents.1.t:0 "Das Prager Manifest"
RNM_creationevents.1.d:0 "Die Ziele des Komitees wurden in einem Dokument festgehalten, das als Prager Manifest bekannt ist. Die vierzehn Punkte des Manifests garantierten Rede-, Presse-, Religions- und Versammlungsfreiheit sowie das Selbstbestimmungsrecht aller ethnischen Gruppen in den zu Russland gehörenden Gebieten. Das Prager Manifest enthielt keine explizit antisemitische oder anderweitig rassistisch motivierte Rhetorik, was zu Konflikten mit vielen Nazi-Propagandisten führte. Allerdings enthielt die Präambel des Manifests Kritik an den westlichen Alliierten (insbesondere den USA und Großbritannien). Vorsitzender des Komitees war General Andrej Wlassow, der auch die Russische Befreiungsarmee befehligte. Das Komitee wurde als politischer Arm der Russischen Befreiungsarmee angesehen, obwohl es auch mehrere ukrainische und andere ethnische Kräfte vereinte, die antisowjetisch waren.\nIn Bezug auf unsere Zusammenarbeit mit diesem Komitee hat Alfred Rosenberg, der Reichsminister für die besetzten Ostgebiete, drei mögliche politische Einheiten für dieses neue Russland entworfen.\n\nOption A – Ein neues Russland, das nur aus ethnisch russischen Gebieten besteht, wobei die anderen Sowjetrepubliken in unsere Satellitenstaaten umgestaltet werden.\n\nOption B – Ein neues Russland basierend auf unserer Ostgrenze mit der UdSSR von 1938, plus einigen Annexionen unsererseits als Entschädigung für die finanziellen Kosten der Befreiung der UdSSR.\n\nOption C – Ein neues russisches Reich, basierend auf unseren Grenzen mit dem russischen Reich von 1914. Diese Option ist nur verfügbar, wenn Sie das Deutsche Reich sind.\n\nWie sollte dieser neue Staat aussehen?"
RNM_creationevents.1.a:1 "Option A"
RNM_creationevents.1.b:1 "Option B"
RNM_creationevents.1.c:1 "Option C"
RNM_creationevents.1.e:1 "Das Land gehört uns"

