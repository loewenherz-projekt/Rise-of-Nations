preww2_news.63.a:1 "Wird die Liga etwas sagen?"

preww2_country.64.t:0 "Hachiko stirbt"
preww2_country.64.d:0 "Hachiko starb am 8. März 1935 im Alter von 11 Jahren. Er wurde auf einer Straße in Shibuya gefunden. Hachiko war ein japanischer Akita-Hund, der für seine bemerkenswerte Treue zu seinem Besitzer Hidesaburo Ueno bekannt ist, auf den er nach Uenos Tod noch über neun Jahre lang wartete."
preww2_country.64.a:1 "Traurig"
