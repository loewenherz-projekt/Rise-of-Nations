preww2_country.15.t:0 "Verfassungsgesetz 1933"
preww2_country.15.d:0 "Das Constitution (Removal of Oath) Act 1933 (Gesetz Nr. 6 von 1933, zuvor Gesetzentwurf Nr. 2 von 1932) war ein Gesetz des Oireachtas des Irischen Freistaats zur Änderung der Verfassung des Irischen Freistaats und des Constitution of the Irish Free State (Saorstát Eireann) Act 1922. Es hob den Treueeid auf, der von Mitgliedern des Oireachtas (Legislative) und von externen Ministern, die nicht dem Oireachtas angehörten, verlangt wurde. Der Eid, der Treue zur Verfassung und Treue zu Georg V. als König von Irland schwor, war im Anglo-Irischen Vertrag von 1921 vorgeschrieben und war im Irischen Bürgerkrieg von 1922 bis 1923 der symbolische Mittelpunkt der irisch-republikanischen Opposition gegen den Vertrag. Als Fianna Fáil 1926 von Veteranen der unterlegenen Vertragsgegner im Bürgerkrieg gegründet wurde, war die Abschaffung des Eides ein zentrales Ziel. Es war ein zentraler Punkt im Wahlprogramm für den erfolgreichen Wahlkampf von 1932. Anschließend bildete die Partei eine Minderheitsregierung, deren erste Amtshandlung die Einführung des Verfassungsgesetzes (Abschaffung des Eides) von 1932 war. Der Seanad Éireann, zu dem mehr ehemalige Unionisten und andere gegenüber Großbritannien versöhnliche Mitglieder gehörten, lehnte das Gesetz ab, sofern der Vertrag nicht durch ein Abkommen geändert werden konnte. Nach den Wahlen von 1933 konnte die Mehrheitsregierung von Fianna Fáil den Seanad überstimmen und das Gesetz in Kraft setzen."
preww2_country.15.a:1 "Eid abschaffen"
preww2_country.15.b:1 "Eid bekräftigen"
preww2_news.15.t:0 "Irland hebt den Treueeid auf"
preww2_news.15.d:0 "Das Constitution (Removal of Oath) Act 1933 (Gesetz Nr. 6 von 1933, zuvor Gesetzentwurf Nr. 2 von 1932) war ein Gesetz des Oireachtas des Irischen Freistaats zur Änderung der Verfassung des Irischen Freistaats und des Constitution of the Irish Free State (Saorstát Eireann) Act 1922. Es hob den Treueeid auf, der von Mitgliedern des Oireachtas (Legislative) und von externen Ministern, die nicht dem Oireachtas angehörten, verlangt wurde. Der Eid, der Treue zur Verfassung und Treue zu Georg V. als König von Irland schwor, war im Anglo-Irischen Vertrag von 1921 vorgeschrieben und war im Irischen Bürgerkrieg von 1922 bis 1923 der symbolische Mittelpunkt der irisch-republikanischen Opposition gegen den Vertrag. Als Fianna Fáil 1926 von Veteranen der unterlegenen Vertragsgegnerseite im Bürgerkrieg gegründet wurde, war die Abschaffung des Eides ein zentrales Ziel."
preww2_news.15.a:1 "OK"

preww2_news.16.t:0 "Nazis verbrennen Bücher"
preww2_news.16.d:0 "Am 10. Mai 1933 verübten Studentengruppen an Universitäten in ganz Deutschland eine Reihe von Bücherverbrennungen. Die Verbrennungen waren Werke, die die Studenten und führende Mitglieder der NSDAP mit einem „undeutschen Geist“ in Verbindung brachten. Begeisterte Menschenmengen verfolgten die Verbrennung von Büchern von Brecht, Einstein, Freud, Mann und Remarque sowie vielen anderen bekannten Intellektuellen, Wissenschaftlern und Kulturschaffenden, darunter viele Juden. Die größte dieser Bücherverbrennungen fand in Berlin statt. Schätzungsweise 40.000 Menschen versammelten sich, um eine Rede von Propagandaminister Joseph Goebbels zu hören. In dieser Rede verkündete er, der jüdische Intellektualismus sei „tot“, und bekräftigte das Recht der Studenten, „die Trümmer der Vergangenheit zu beseitigen“. "
preww2_news.16.a:1 "OK"

preww2_country.17.t:0 "Gründung der Nasjonal Samling"
preww2_country.17.d:0 "Am 17. Mai 1933, dem norwegischen Verfassungstag, gründeten Quisling und Staatsanwalt Johan Bernhard Hjort die Nasjonal Samling (NS) („Nationale Einheit“), die norwegische nationalsozialistische Partei. Die Nasjonal Samling hatte eine antidemokratische, auf dem Führerprinzip basierende politische Struktur, und Quisling sollte der Führer der Partei sein, ähnlich wie Adolf Hitler der Führer der NSDAP in Deutschland. Die Partei hatte bescheidene Erfolge. Bei den Wahlen von 1933, vier Monate nach ihrer Gründung, erhielt sie 27.850 Stimmen. Sie wurde vom norwegischen Bauernhilfsverein unterstützt, zu dem Quisling aus seiner Zeit als Mitglied der Agrarregierung Verbindungen hatte. Als sich die Parteilinie ab 1935 von einer religiös geprägten zu einer prodeutschen und antisemitischen Hardliner-Politik änderte, schwand die Unterstützung der Kirche, und bei den Wahlen von 1936 erhielt die Partei nur noch etwa 50.000 Stimmen. Die Partei wurde zunehmend extremistisch, und nach der deutschen Invasion schrumpfte die Parteimitgliedschaft auf schätzungsweise 2.000 Mitglieder."
preww2_country.17.a:1 "OK"
preww2_news.17.t:0 "Der Nationalsozialismus in Norwegen nimmt zu"
preww2_news.17.d:0 "Am 17. Mai 1933, dem norwegischen Verfassungstag, gründeten Quisling und Staatsanwalt Johan Bernhard Hjort die Nasjonal Samling (NS) („Nationale Einheit“), die norwegische nationalsozialistische Partei. Die Nasjonal Samling hatte eine antidemokratische, auf dem Führerprinzip basierende politische Struktur, und Quisling sollte der Führer der Partei sein, ähnlich wie Adolf Hitler in Deutschland die NSDAP leitete. Die Partei hatte bescheidene Erfolge. Bei den Wahlen von 1933, vier Monate nach ihrer Gründung, erhielt sie 27.850 Stimmen. Sie wurde vom norwegischen Bauernhilfsverein unterstützt, zu dem Quisling aus seiner Zeit als Mitglied der Agrarregierung Verbindungen hatte."
preww2_news.17.a:1 "OK"

preww2_country.18.t:0 "Gesetz zur Verhütung erbkranken Nachwuchses"
preww2_country.18.d:0 "Die deutsche Regierung verabschiedet das „Gesetz zur Verhütung erbkranken Nachwuchses“, das die Zwangssterilisation bestimmter Personen mit körperlichen und geistigen Behinderungen vorschreibt. Dieses neue Gesetz schafft die Grundlage für die unfreiwillige Sterilisation von Menschen mit körperlichen und geistigen Behinderungen oder psychischen Erkrankungen, Roma (Zigeunern), „asozialen Elementen“ und Afrodeutschen."
preww2_country.18.a:1 "OK"
preww2_news.18.t:0 "Deutschland verabschiedet Eugenik-Gesetze"
preww2_news.18.d:0 "Die deutsche Regierung verabschiedet das „Gesetz zur Verhütung erbkranken Nachwuchses“, das die Zwangssterilisation bestimmter Personen mit körperlichen und geistigen Behinderungen vorschreibt. Dieses neue Gesetz schafft die Grundlage für die unfreiwillige Sterilisation von Menschen mit körperlichen und geistigen Behinderungen oder psychischen Erkrankungen, Roma (Zigeunern), „asozialen Elementen“ und Afrodeutschen."
preww2_news.18.a:1 "OK"

preww2_country.19.t:0 "Holodomor erreicht seinen Höhepunkt"
preww2_country.19.d:0 "Im Frühjahr 1933 stieg die Sterberate in der Ukraine sprunghaft an. Zwischen 1931 und 1934 verhungerten in der gesamten UdSSR mindestens fünf Millionen Menschen. Einer Studie ukrainischer Demografen zufolge befanden sich darunter mindestens 3,9 Millionen Ukrainer. Polizeiarchive enthalten zahlreiche Beschreibungen von Kannibalismus, Gesetzlosigkeit, Diebstahl und Lynchmorden. Überall auf dem Land wurden Massengräber ausgehoben. Auch die Stadtbevölkerung litt unter Hunger, obwohl viele dank Lebensmittelkarten überlebten. In den größten Städten der Ukraine sah man dennoch Leichen auf den Straßen."
preww2_country.19.a:1 "OK"
preww2_news.19.t:0 "Holodomor erreicht seinen Höhepunkt"
preww2_news.19.d:0 "Im Frühjahr 1933 stieg die Sterberate in der Ukraine sprunghaft an. Zwischen 1931 und 1934 verhungerten in der gesamten UdSSR mindestens fünf Millionen Menschen. Einer Studie ukrainischer Demografen zufolge befanden sich darunter mindestens 3,9 Millionen Ukrainer. Polizeiarchive enthalten zahlreiche Beschreibungen von Kannibalismus, Gesetzlosigkeit, Diebstahl und Lynchmorden. Überall auf dem Land wurden Massengräber ausgehoben. Auch die Stadtbevölkerung litt unter Hunger, obwohl viele dank Lebensmittelkarten überlebten. In den größten Städten der Ukraine sah man dennoch Leichen auf den Straßen."
preww2_news.19.a:1 "Das ist schrecklich ..."

preww2_country.20.t:0 "Erstes Autokino"
preww2_country.20.d:0 "Am 6. Juni 1933 parkten begeisterte Autofahrer ihre Autos auf dem Gelände des Park-In Theaters, dem ersten Autokino überhaupt, am Crescent Boulevard in Camden, New Jersey. Park-In Theaters – der Begriff „Drive-In“ setzte sich erst später durch – waren die Idee von Richard Hollingshead, einem Filmfan und Vertriebsleiter in der Firma seines Vaters, Whiz Auto Products, in Camden. Berichten zufolge inspiriert von den Schwierigkeiten seiner Mutter, bequem in traditionellen Kinositzen zu sitzen, kam Hollingshead auf die Idee eines Freiluftkinos, in dem die Besucher bequem von ihrem Auto aus Filme schauen konnten. Anschließend experimentierte er in der Einfahrt seines Hauses mit verschiedenen Projektions- und Tontechniken. Er montierte einen Kodak-Projektor von 1928 auf die Motorhaube seines Autos, befestigte eine Leinwand an einigen Bäumen und platzierte ein Radio hinter der Leinwand für den Ton. Er testete auch Möglichkeiten zum Schutz vor Regen und anderen Witterungseinflüssen und entwickelte die ideale Anordnung für mehrere Autos, damit alle die Leinwand sehen konnten. Der junge Unternehmer erhielt im Mai 1933 ein Patent für sein Konzept und eröffnete weniger als einen Monat später mit einer Anfangsinvestition von 30.000 Dollar die Park-In Theaters, Inc. Hollingshead bewarb das Kino als Unterhaltung für die ganze Familie und verlangte 25 Cent pro Auto und 25 Cent pro Person, wobei keine Gruppe mehr als einen Dollar zahlen durfte. Die Idee setzte sich durch, und nachdem Hollingsheads Patent 1949 aufgehoben wurde, schossen im ganzen Land Autokinos wie Pilze aus dem Boden. Eines der größten war das All-Weather Drive-In in Copiague, New York, mit 2.500 Parkplätzen, einem Kinderspielplatz und einem Restaurant auf einem 28 Hektar großen Gelände."
preww2_country.20.a:1 "OK"
preww2_news.20.t:0 "Erstes Autokino"
preww2_news.20.d:0 "Am 6. Juni 1933 parken eifrige Autofahrer ihre Autos auf dem Gelände des Park-In Theaters, des ersten Autokinos überhaupt am Crescent Boulevard in Camden, New Jersey. Park-In Theaters – der Begriff „Drive-in“ wurde erst später allgemein verwendet – waren die Idee von Richard Hollingshead, einem Filmfan und Verkaufsleiter in der Firma seines Vaters, Whiz Auto Products, in Camden. Inspiriert von den Schwierigkeiten seiner Mutter, bequem in herkömmlichen Kinositzen zu sitzen, kam Hollingshead auf die Idee eines Freiluftkinos, in dem die Besucher bequem von ihren Autos aus Filme ansehen konnten. Dann experimentierte er in der Einfahrt seines Hauses mit verschiedenen Projektions- und Tontechniken: Er montierte einen Kodak-Projektor von 1928 auf die Motorhaube seines Autos, befestigte eine Leinwand an einigen Bäumen und platzierte für den Ton ein Radio hinter der Leinwand."
preww2_news.20.a:1 "OK"

preww2_news.21.t:0 "In Deutschland verbotene politische Parteien"
preww2_news.21.d:0 "Im Juni verbot Hitler die Sozialdemokratische Partei. Die Deutschnationale Partei, die Teil von Hitlers Koalitionsregierung war, löste sich auf, nachdem ihre Abgeordneten zum Rücktritt aufgefordert worden waren, andernfalls würden sie das nächste Ziel sein. Ende des Monats waren 27.000 Menschen in deutschen Konzentrationslagern inhaftiert. Mitte Juli war die NSDAP die einzige im Land zugelassene politische Partei. Auch andere Organisationen wurden auf Linie gebracht. Der Historiker William Sheridan Allen drückte es so aus: „Wenn zwei oder drei versammelt waren, war auch der Führer anwesend.“"
preww2_news.21.a:1 "OK"

preww2_news.23.t:0 "Deutschland und der Heilige Stuhl unterzeichnen einen Pakt"
preww2_news.23.d:0 "Das Reichskonkordat (Konkordat zwischen dem Heiligen Stuhl und dem Deutschen Reich) ist ein Vertrag zwischen dem Vatikan und dem aufstrebenden Nazi-Deutschland. Es wurde am 20. Juli 1933 von Kardinalstaatssekretär Eugenio Pacelli, dem späteren Papst Pius XII., im Namen von Papst Pius XI. und von Vizekanzler Franz von Papen im Namen von Präsident Paul von Hindenburg und der deutschen Regierung unterzeichnet. Es wurde am 10. September 1933 ratifiziert und ist seit diesem Datum in Kraft. Der Vertrag garantiert die Rechte der katholischen Kirche in Deutschland. Artikel 16 besagt, dass Bischöfe bei Amtsantritt einen Treueeid auf den Statthalter oder Präsidenten des gemäß der Verfassung eingesetzten Deutschen Reichs leisten müssen. Der Vertrag verpflichtet auch alle Geistlichen, sich der Tätigkeit in oder für politische Parteien zu enthalten."
preww2_news.23.a:1 "OK"

preww2_country.24.t:0 "Wiley Post fliegt um die Welt!"
preww2_country.24.d:0 "Der amerikanische Pilot Wiley Post kehrt zum Floyd Bennett Field in New York zurück, nachdem er in 7 Tagen, 18 Stunden und 49 Minuten allein um die Welt geflogen ist. Er war der erste Pilot, dem dieses Kunststück gelang. Post, sofort an der Augenklappe zu erkennen, begann die Reise am 15. Juli und flog nonstop nach Berlin. Nach einer kurzen Ruhepause flog er weiter in die Sowjetunion, wo er mehrere Zwischenstopps einlegte, bevor er nach Nordamerika zurückkehrte, mit Zwischenstopps in Alaska, Kanada und schließlich einer triumphalen Landung an seinem Ausgangspunkt in New York. Zwei Jahre zuvor war Post berühmt geworden, als er gemeinsam mit dem Piloten Harold Gatty erfolgreich den nördlichen Teil der Erde umrundete. Bei seinem Alleinflug um die Welt im Jahr 1933 legte er in kürzerer Zeit eine etwas größere Distanz zurück – 15.596 Meilen. Für beide Flüge benutzte er die Winnie Mae, einen Eindecker vom Typ Lockheed Vega, der für Posts Alleinflug mit einem Sperry-Autopiloten und einem Funkgerät ausgestattet war. Im August 1935 versuchte er mit dem amerikanischen Humoristen Will Rogers, über den Nordpol in die UdSSR zu fliegen, als beide Männer bei einem Absturz in der Nähe von Point Barrow, Alaska, ums Leben kamen."
preww2_country.24.a:1 "Irgendwie Swag"
preww2_news.24.t:0 "Wiley Post fliegt um die Welt!"
preww2_news.24.d:0 "Der amerikanische Pilot Wiley Post kehrt zum Floyd Bennett Field in New York zurück, nachdem er in 7 Tagen, 18 Stunden und 49 Minuten allein um die Welt geflogen ist. Er war der erste Pilot, dem dieses Kunststück gelang. Post, sofort an der Augenklappe zu erkennen, begann die Reise am 15. Juli und flog nonstop nach Berlin. Nach einer kurzen Ruhepause flog er weiter in die Sowjetunion, wo er mehrere Zwischenstopps einlegte, bevor er nach Nordamerika zurückkehrte, mit Zwischenstopps in Alaska, Kanada und schließlich einer triumphalen Landung an seinem Ausgangspunkt in New York. Zwei Jahre zuvor war Post berühmt geworden, als er gemeinsam mit dem Piloten Harold Gatty erfolgreich den Norden der Erde umrundete. Bei seinem Alleinflug um die Welt im Jahr 1933 legte er in kürzerer Zeit eine etwas größere Distanz zurück – 15.596 Meilen."
preww2_news.24.a:1 "Irgendwie Swag"

preww2_country.25.t:0 "Simele-Massaker"
preww2_country.25.d:0 "Es folgte ein kaltblütiges und methodisches Massaker an allen Männern des Dorfes, ein Massaker, das aufgrund der finsteren Heimtücke, mit der es geplant und der Gefühllosigkeit, mit der es ausgeführt wurde, ein ebenso abscheuliches Verbrechen war wie jedes andere in den blutbefleckten Annalen des Nahen Ostens. Die Assyrer waren nicht mehr kampfbereit, teilweise aufgrund der Gemütsverfassung, in die sie durch die Ereignisse der vergangenen Woche versetzt worden waren, hauptsächlich aber, weil sie entwaffnet waren. Wären sie bewaffnet gewesen, hätten Ismail Abawi Tohalla und seine Bravos mit Sicherheit gezögert, sie in einem fairen Kampf anzugreifen. Nachdem sie sie entwaffnet hatten, führten sie das Massaker planmäßig durch. Dies dauerte einige Zeit. Nicht, dass es Eile gegeben hätte, denn die Truppen hatten den ganzen Tag vor sich. Ihre Gegner waren hilflos, und es bestand keine Chance auf Einmischung von irgendeiner Seite. Maschinengewehrschützen stellten ihre Gewehre vor den Fenstern der Häuser auf, in denen die Assyrer Zuflucht gesucht hatten, richteten sie auf die verängstigten Elenden in den überfüllten Räumen und feuerten unter sie, bis in dem Chaos kein Mann mehr übrig war. In anderen Fällen nahm die Blutgier der Truppen eine etwas heftigere Form an, und Männer wurden herausgezerrt, erschossen oder zu Tode geprügelt und ihre Leichen auf einen Haufen von Toten geworfen."
preww2_country.25.a:1 "Schrecklich"
