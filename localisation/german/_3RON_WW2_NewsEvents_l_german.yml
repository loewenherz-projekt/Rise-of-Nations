preww2_country.59.t:0 "Französisch-italienisches Abkommen von 1935"
preww2_country.59.d:0 "Die französisch-italienischen Abkommen wurden am 7. Januar 1935 in Rom vom französischen Außenminister Pierre Laval und dem italienischen Ministerpräsidenten Benito Mussolini unterzeichnet. Im Rahmen des Abkommens erhielt Italien einige Teile Afrikas und versprach, keine französischen Besitzungen in Afrika zu beanspruchen."
preww2_country.59.a:1 "OK"
preww2_news.59.t:0 "Französisch-italienisches Abkommen von 1935"
preww2_news.59.d:0 "„Die französisch-italienischen Abkommen wurden am 7. Januar 1935 in Rom vom französischen Außenminister Pierre Laval und dem italienischen Ministerpräsidenten Benito Mussolini unterzeichnet. Das Abkommen sprach Italien einige Teile Afrikas zu und versprach, keine französischen Besitztümer in Afrika zu beanspruchen.“"
