preww2_country.68.t:0 "He-Umezu-Abkommen"
preww2_country.68.d:0 "Das Abkommen gab Japan die faktische Kontrolle über die Provinz Hebei unter der Schirmherrschaft des Autonomen Rates von Ost-Hebei. Obwohl das Abkommen im Geheimen geschlossen wurde, gelangten seine Einzelheiten bald an die Presse, was in China zu wachsender Empörung und antijapanischer Stimmung führte. Der Waffenstillstand hielt bis zum 7. Juli 1937, dem Beginn des Zweiten Japanisch-Chinesischen Krieges."
preww2_country.68.a:1 "Hand Over Hebei"
preww2_country.68.b:1 "Bring es"
