preww2_country.36.t:0 "Premierminister ermordet"
preww2_country.36.d:0 "Wegen Kälte und Schnee hatte der 9:45-Expresszug von Sinaia nach Bukarest eine Nacht Verspätung. Ungeduldig warteten Ministerpräsident Ion Gheorghe Duca (der nach einer Konferenz mit dem König in die Hauptstadt zurückeilte), der ehemalige Bürgermeister von Bukarest Costinescu und der Generalsekretär des Legislativrates Michel Vlashide auf den Zug. Sparsam kauften alle drei Fahrkarten dritter Klasse. Sie bemerkten eine Gruppe von Universitätsstudenten am anderen Ende des Bahnsteigs nicht. Plötzlich gab es einen gelben Blitz, eine laute Explosion. Einer der Studenten, Nicholas Constantinescu, hatte eine Rauchbombe aus seiner Tasche gezogen und schleuderte sie. Bevor sich der Rauch verzogen hatte, ging er langsam auf den unverletzt gebliebenen Ministerpräsidenten zu, legte ihm eine Hand auf die Schulter und feuerte vier Schüsse in seinen Kopf und Körper ab. Beim zweiten Schuss drehte sich Ion Duca um, bekreuzigte sich und fiel zu Boden, Blut sickerte aus seinem Mund. König Carol, der telefonisch von der Tragödie erfuhr, ließ den Leichnam von Premierminister Duca in den königlichen Palast bringen und in einem der Salons aufbahrn. Zweimal in der Nacht schlich Seine Majestät auf Zehenspitzen in den Raum, um seinen toten Premierminister zu sehen, der noch immer seine blutbefleckte Reisekleidung trug."
preww2_country.36.a:1 "Wir verurteilen diese barbarische Tat"
preww2_country.36.b:1 "Die Eiserne Garde sind Patrioten"
preww2_news.36.t:0 "Rumäniens Premierminister ermordet "
preww2_news.36.d:0 "Wegen Kälte und Schnee hatte der 9:45-Expresszug vom pinienbewachsenen Sinaia nach Bukarest letzte Woche eines Nachts Verspätung. Auf dem Bahnsteig hatte sich eine ziemlich große Menschenmenge angesammelt, denn in der Nähe steht der mit extravaganten Türmen geschmückte Palast, der Landsitz von König Carol. Ungeduldig warteten Ministerpräsident Ion Gheorghe Duca, der nach einer Konferenz mit dem König in die Hauptstadt zurückeilte, der ehemalige Bürgermeister von Bukarest Costinescu und der Generalsekretär des Legislativrates Michel Vlashide auf den Zug. Alle drei kauften sparsam Fahrkarten dritter Klasse. Plötzlich gab es einen gelben Blitz, eine laute Explosion. Einer der Studenten, Nicholas Constantinescu, hatte eine Rauchbombe aus der Tasche gezogen und warf sie. Bevor sich der Rauch verzogen hatte, ging er langsam auf den unverletzt gebliebenen Ministerpräsidenten zu, legte ihm eine Hand auf die Schulter und feuerte vier Schüsse in seinen Kopf und Körper ab."
preww2_news.36.a:1 "Wir verurteilen diese barbarische Tat"

preww2_news.37.t:0 "Deutsch-polnischer Nichtangriffspakt"
preww2_news.37.d:0 "Die deutsch-polnische Nichtangriffserklärung war ein Nichtangriffspakt zwischen Nazideutschland und der Zweiten Polnischen Republik, der am 26. Januar 1934 in Berlin unterzeichnet wurde. Beide Länder verpflichteten sich, ihre Probleme durch bilaterale Verhandlungen zu lösen und für einen Zeitraum von zehn Jahren auf bewaffnete Konflikte zu verzichten. Das Abkommen normalisierte die Beziehungen zwischen Polen und Deutschland, die durch Grenzstreitigkeiten im Zusammenhang mit der Gebietsregelung im Versailler Vertrag belastet waren. Deutschland erkannte Polens Grenzen an und beendete einen wirtschaftlich schädlichen Zollkrieg zwischen den beiden Ländern, der im vorangegangenen Jahrzehnt stattgefunden hatte."
preww2_news.37.a:1 "Deutschland wird auf keinen Fall einen weiteren Krieg beginnen!"

