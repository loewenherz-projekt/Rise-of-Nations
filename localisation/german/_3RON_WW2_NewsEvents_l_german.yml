preww2_country.54.t:0 "Die UdSSR tritt dem Völkerbund bei"
preww2_country.54.d:0 "Am 15. September 1934 schlugen auf Initiative Frankreichs 30 Mitgliedsstaaten der UdSSR den Beitritt zum Völkerbund vor. Am 18. September 1934 nahm die Sowjetunion das Angebot an und wurde ständiges Mitglied des Rates. Schon zuvor arbeitete das Land eng mit verschiedenen Ausschüssen des Völkerbundes in einer Vielzahl internationaler Fragen zusammen."
preww2_country.54.a:1 "Liga beitreten"
preww2_country.54.b:1 "Wir brauchen sie nicht"
