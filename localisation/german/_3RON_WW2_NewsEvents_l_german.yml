preww2_country.47.t:0 "Nacht der langen Messer"
preww2_country.47.d:0 "Die Nacht der langen Messer war eine Säuberungsaktion, die vom 30. Juni bis 2. Juli 1934 in Nazi-Deutschland stattfand. Auf Drängen von Hermann Göring und Heinrich Himmler ordnete Reichskanzler Adolf Hitler eine Reihe politischer außergerichtlicher Hinrichtungen an, um seine Macht zu festigen und die Bedenken des deutschen Militärs hinsichtlich der Rolle von Ernst Röhm und der Sturmabteilung, der paramilitärischen Organisation der Nazis, die umgangssprachlich als „Braunhemden“ bekannt war, zu zerstreuen. Die NS-Propaganda stellte die Morde als Präventivmaßnahme gegen einen angeblich bevorstehenden Putsch der SA unter Röhm dar – den sogenannten Röhm-Putsch. Die wichtigsten Instrumente von Hitlers Vorgehen, die die meisten Morde verübten, waren die paramilitärische Schutzstaffel unter Himmler und ihr Sicherheitsdienst sowie die Gestapo unter Reinhard Heydrich. Auch Görings persönliches Polizeibataillon war an den Morden beteiligt."
preww2_country.47.a:1 "Sie waren Feinde des Reiches"
preww2_news.47.t:0 "Nacht der langen Messer"
preww2_news.47.d:0 "Die Nacht der langen Messer war eine Säuberungsaktion, die vom 30. Juni bis 2. Juli 1934 in Nazi-Deutschland stattfand. Auf Drängen von Hermann Göring und Heinrich Himmler ordnete Reichskanzler Adolf Hitler eine Reihe politischer außergerichtlicher Hinrichtungen an, um seine Macht zu festigen und die Bedenken des deutschen Militärs hinsichtlich der Rolle von Ernst Röhm und der Sturmabteilung, der paramilitärischen Organisation der Nazis, die umgangssprachlich als „Braunhemden“ bekannt war, zu zerstreuen. Die NS-Propaganda stellte die Morde als Präventivmaßnahme gegen einen angeblich bevorstehenden Putsch der SA unter Röhm dar – den sogenannten Röhm-Putsch. Die wichtigsten Instrumente von Hitlers Vorgehen, die die meisten Morde verübten, waren die paramilitärische Schutzstaffel unter Himmler und ihr Sicherheitsdienst sowie die Gestapo unter Reinhard Heydrich. Auch Görings persönliches Polizeibataillon war an den Morden beteiligt."
preww2_news.47.a:1 "Wie kommen sie damit durch?"

preww2_country.48.t:0 "Der Führer hält eine Rede"
preww2_country.48.d:0 "Adolf Hitler hielt vor dem Reichstag eine landesweit ausgestrahlte 90-minütige Rede, in der er die Nacht der langen Messer rechtfertigte und die gesäuberten Personen des Landesverrats und der Verschwörung zum Aufstand beschuldigte."
preww2_country.48.a:1 "Sieg Heil"
preww2_news.48.t:0 "Hitler rechtfertigt die Nacht der langen Messer"
preww2_news.48.d:0 "Adolf Hitler hielt vor dem Reichstag eine landesweit ausgestrahlte 90-minütige Rede, in der er die Nacht der langen Messer rechtfertigte und die gesäuberten Personen des Landesverrats und der Verschwörung zum Aufstand beschuldigte."
preww2_news.48.a:1 "Glaubt das wirklich irgendjemand?"

preww2_country.49.t:0 "John Dillinger erschossen"
preww2_country.49.d:0 "John Dillinger besuchte einen Film im Kino. Als der Film zu Ende war, sah er einen FBI-Agenten in seiner Nähe und rannte davon. Der Agent konnte ihn einholen und tötete ihn."
preww2_country.49.a:1 "Gerechtigkeit"
preww2_news.49.t:0 "John Dillinger erschossen"
preww2_news.49.d:0 "John Dillinger besuchte einen Film im Kino. Als der Film zu Ende war, sah er einen FBI-Agenten in seiner Nähe und rannte davon. Der Agent konnte ihn einholen und tötete ihn."
preww2_news.49.a:1 "OK"

preww2_news.50.t:0 "Engelbert Dolfuss ermordet"
preww2_news.50.d:0 "Dollfuß wurde am 25. Juli 1934 von zehn österreichischen Nazis des Regiments 89 ermordet, die bei einem Putschversuch in das Reichskanzleigebäude eindrangen und ihn erschossen. In seinen letzten Augenblicken bat er um Viaticum, die Eucharistie, die Sterbenden gespendet wird, doch seine Mörder verweigerten sie ihm. Mussolini hatte keine Skrupel, den Anschlag dem deutschen Diktator zuzuschreiben: Die Nachricht erreichte ihn in Cesena, wo er die Pläne für eine psychiatrische Klinik prüfte. Mussolini, genannt „Il Duce“, überbrachte die Nachricht persönlich Dollfuß’ Witwe, die mit ihren Kindern in seiner Villa in Riccione zu Gast war. Außerdem stellte er Ernst Rüdiger Starhemberg ein Flugzeug zur Verfügung, mit dem der Prinz nach Wien eilen und sich dort mit seiner Miliz den Angreifern entgegenstellen konnte."
preww2_news.50.a:1 "Deutschland hat das definitiv nicht getan …"

preww2_country.51.t:0 "Präsident Paul von Hindenburg stirbt"
preww2_country.51.d:0 "Mit dem Tod des deutschen Reichspräsidenten Paul von Hindenburg wird Reichskanzler Adolf Hitler unter dem Titel „Führer“ zum absoluten Diktator Deutschlands. Die deutsche Armee leistet ihrem neuen Oberbefehlshaber einen Treueeid und die letzten Überreste der demokratischen Regierung Deutschlands werden zerschlagen, um Platz für Hitlers Drittes Reich zu machen."
preww2_country.51.a:1 "OK"
preww2_news.51.t:0 "Präsident Paul von Hindenburg gestorben"
preww2_news.51.d:0 "Mit dem Tod des deutschen Reichspräsidenten Paul von Hindenburg wird Reichskanzler Adolf Hitler unter dem Titel „Führer“ zum absoluten Diktator Deutschlands. Die deutsche Armee leistet ihrem neuen Oberbefehlshaber einen Treueeid und die letzten Überreste der demokratischen Regierung Deutschlands werden zerschlagen, um Platz für Hitlers Drittes Reich zu machen."
preww2_news.51.a:1 "OK"

preww2_country.52.t:0 "Beenden Sie die haitianische Besatzung"
preww2_country.52.d:0 "Am 1. August 1934 zogen die US-Streitkräfte aus Haiti ab. Damit endete eine fast zwei Jahrzehnte andauernde bewaffnete Intervention. Die Finanzkontrolle der US-Regierung endete 1941. Der Abzug der US-Marines aus Haiti war ein wichtiger Schritt in der Entwicklung der Good Neighbor Policy und ein deutliches Zeichen dafür, dass Hulls Haltung gegen die Intervention in Montevideo ernst gemeint war. Die USA hatten begonnen, ihren Worten Taten folgen zu lassen."
preww2_country.52.a:1 "Beenden Sie die Besatzung"
preww2_country.52.b:1 "Setzen Sie sie unter Druck, der Gewerkschaft beizutreten"
preww2_news.52.t:0 "USA verlassen Haiti"
preww2_news.52.d:0 "Am 1. August 1934 zogen die US-Streitkräfte aus Haiti ab. Damit endete eine fast zwei Jahrzehnte andauernde bewaffnete Intervention. Die Finanzkontrolle der US-Regierung endete 1941. Der Abzug der US-Marines aus Haiti war ein wichtiger Schritt in der Entwicklung der Good Neighbor Policy und ein deutliches Zeichen dafür, dass Hulls Haltung gegen die Intervention in Montevideo ernst gemeint war. Die USA hatten begonnen, ihren Worten Taten folgen zu lassen."
preww2_news.52.a:1 "Was für ein guter Nachbar"

preww2_country.53.t:0 "Deutsches Referendum 1934"
preww2_country.53.d:0 "Das Amt des Reichspräsidenten wird mit dem Amt des Reichskanzlers vereinigt. Damit gehen alle bisherigen Befugnisse des Reichspräsidenten auf den Führer und Reichskanzler Adolf Hitler über. Er selbst ernennt seinen Stellvertreter. Sind Sie, lieber Deutscher und lieber Deutsche, mit dieser Regelung einverstanden?"
preww2_country.53.a:1 "Ja"
preww2_news.53.t:0 "Deutsches Referendum 1934"
