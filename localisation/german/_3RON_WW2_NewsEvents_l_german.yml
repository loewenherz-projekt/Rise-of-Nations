preww2_country.63.t:0 "Hitler ermächtigt die Luftwaffe"
preww2_country.63.d:0 "Am 26. Februar 1935 unterzeichnete Naziführer Adolf Hitler ein geheimes Dekret, das die Gründung der Reichsluftwaffe als dritte deutsche Streitkraft neben dem Reichsheer und der Reichsmarine genehmigte. Im selben Dekret ernannte Hitler Hermann Göring, einen deutschen Luftwaffenhelden aus dem Ersten Weltkrieg und hochrangigen Nazi, zum Oberbefehlshaber der neuen deutschen Luftwaffe."
preww2_country.63.a:1 "Zur Verteidigung des Reiches"
