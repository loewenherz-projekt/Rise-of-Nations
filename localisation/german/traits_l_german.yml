 seawolf:0 "Seewolf"
 seawolf_desc:0 "§LDer Sea Wolf ist besonders geschickt im Überfallen von Konvois§!"
 superior_tactician:0 "Überlegener Taktiker"
 superior_tactician_desc:0 "§LA-Meister der Flottenpositionierung.§!"
 old_guard:0 "Alte Garde"
 old_guard_desc:0 "§LObwohl er nicht der brillanteste Offizier ist, ist es unwahrscheinlich, dass er Ärger macht.§!"
 old_guard_navy:0 "Alte Garde"
 old_guard_navy_desc:0 "§LObwohl er nicht der brillanteste Offizier ist, ist es unwahrscheinlich, dass er Ärger macht.§!"
 trickster:0 "Betrüger"
 trickster_desc:0 "§LDas Unerwartete im Kampf zu tun, kann Ihnen einen großen Vorteil verschaffen.§!"
 logistics_wizard:0 "Logistik-Assistent"
 logistics_wizard_desc:0 "§LDie Lieferungen kommen nie zu spät und auch nie zu früh. Sie kommen genau dann an, wenn ich es vorhabe.§!"
 defensive_doctrine:0 "Verteidigungsdoktrin"
 defensive_doctrine_desc:0 "§LEbesonders geschickt im Defensivkampf.§!"
 offensive_doctrine:0 "Offensive Doktrin"
 offensive_doctrine_desc:0 "§LOffensiver eingestellt als die meisten.§!"
 winter_specialist:0 "Winterspezialist"
 winter_specialist_desc:0 "§LPerhält ein intuitives Verständnis für die Schwierigkeiten des Kampfes unter kalten Bedingungen.§!"
 trait_engineer:0 "Ingenieur"
 trait_engineer_desc:0 "§LBewandert in der Kunst, Flüsse zu überqueren und Feldbefestigungen zu errichten.§!"
 fortress_buster:0 "Festungsbrecher"
 fortress_buster_desc:0 "§LDer Angriff auf eine Festung bereitet diesem Offizier keine Angst.§!"
 panzer_leader:0 "Panzerführer"
 panzer_leader_desc:0 "§LA natürlich mit Panzern und mechanisierten Kräften.§!"
 commando:0 "Kommando"
 commando_desc:0 "§LErfahren in amphibischen Operationen, Luftangriffen und kalten Wetterbedingungen – der Kommando ist ein Mann mit vielen Talenten.§!"
 fast_planner:0 "Schnellplaner"
 fast_planner_desc:0 "§LKennt alle Abkürzungen bei der Vorbereitung auf den Kampf – Effizienz ist der Schlüssel!§!"
 thorough_planner:0 "Gründlicher Planer"
 thorough_planner_desc:0 "§LA strategischer Mastermind. Mit der Zeit wird der gut durchdachte Plan der stärkste sein.§!"
 organisational_leader:0 "Organisation zuerst"
 organisational_leader_desc:0 "§LKennt alle Tricks, um schneller als jeder andere Verstärkung zu bekommen.§!"
 inspirational_leader:0 "Charismatisch"
 inspirational_leader_desc:0 "§L Ein geborener Anführer. Männer können sich ihren schlimmsten Ängsten stellen, wenn sie von einem starken Anführer unterstützt werden.§!"
 desert_fox:0 "Wüstenfuchs"
 desert_fox_desc:0 "§LBeim Kampf in der Wüste völlig zu Hause.§!"
 swamp_fox:0 "Sumpffuchs"
 swamp_fox_desc:0 "§LObwohl er etwas matschig ist, kennt sich der Sumpffuchs in Sümpfen und Marschen aus.§!"
 trait_mountaineer:0 "Bergsteiger"
 trait_mountaineer_desc:0 "§LAn ausgezeichneter Kletterer und erfahren in der Gebirgskriegsführung.§!"
 hill_fighter:0 "Hill Fighter"
 hill_fighter_desc:0 "§LHervorragend geeignet für den Kampf in hügeligem Gelände.§!"
 jungle_rat:0 "Dschungelratte"
 jungle_rat_desc:0 "§Lich von Nagetieren ungewöhnlicher Größe nicht abgeschreckt und erfahren in der Dschungelkriegsführung.§!"
 ranger:0 "Ranger"
 ranger_desc:1 "§LRanger gehen voran, insbesondere wenn es um Kämpfe in Wäldern geht.§!"
 urban_assault_specialist:0 "Spezialist für urbane Angriffe"
 urban_assault_specialist_desc:0 "§LEin Experte darin, in fremden Häusern zu kämpfen und auf den Straßen der Leute Chaos zu verursachen.§!"
 blockade_runner:0 "Blockadebrecher"
 blockade_runner_desc:0 "§L Kann sich schnell aus dem Seekampf zurückziehen.§!"
 spotter:0 "Späher"
 spotter_desc:0 "§LDer Späher achtet besonders darauf, nach feindlichen Flotten Ausschau zu halten.§!"
 fly_swatter:0 "Klatsche"
 fly_swatter_desc:0 "§LDa uns die Gefahr bewusst ist, die selbst für unsere stärksten Schiffe von Flugzeugen ausgeht, beseitigt die Fliegenklatsche schnell alles, was fliegt.§!"
 ironside:0 "Eisenseite"
 ironside_desc:0 "§LDentschlossen, unsere Heimatgewässer mit den stärksten Schiffen zu verteidigen, die unsere Marine aufbieten kann.§!"
