 losing_soverignty_threatened_tt: "§RFinnish Sovereignty Threatened§!: Losing control over a Finnish core state will decrease £GFX_power_balance_texticon §YPublic Trust§!."
 FIN_personal_agenda_svinhufvud_tt: "§GEradicate Socialism§!: Having less than §Y1%§! support for $democratic$ and $communism$ ideologies will increase £GFX_power_balance_texticon §YPublic Trust§!. \n  - §RConcerning Support for Socialists§!: Having more than §Y9%§! support for $democratic$ or $communism$ ideologies will decrease £GFX_power_balance_texticon §YPublic Trust§!. \n  - $losing_soverignty_threatened_tt$"
 FIN_personal_agenda_kallio_tt: "§GEradicate Extremists§!: Having less than §Y1%§! support for $fascism$ and $communism$ ideologies will increase £GFX_power_balance_texticon §YPublic Trust§!. \n  - §RConcerning Support for Extremists§!: Having more than §Y9%§! support for $fascism$ or $communism$ ideologies will decrease £GFX_power_balance_texticon §YPublic Trust§!. \n  - $losing_soverignty_threatened_tt$"
 FIN_personal_agenda_ryti_tt: "§GDream of Greater Finland§!: Occupying Finnish core states owned by an enemy will increase £GFX_power_balance_texticon §YPublic Trust§!. \n  - §RConcerning Support for Socialists§!: Having more than §Y9%§! support for $democratic$ or $communism$ ideologies will decrease £GFX_power_balance_texticon §YPublic Trust§!. \n  - $losing_soverignty_threatened_tt$"
 FIN_personal_agenda_mannerheim_tt: "§GReliable Leader§!: Being at war will increase £GFX_power_balance_texticon §YPublic Trust§!. \n  - §RAppointed Regent§!: Being at peace will decrease £GFX_power_balance_texticon §YPublic Trust§!."
 FIN_personal_agenda_paasikivi_tt: "§GRealist Conservative§!: Having more than §Y95%§! £GFX_stability_texticon $stability$ will increase £GFX_power_balance_texticon §YPublic Trust§!. \n  - §RCaretaker§!: Having less than §Y60%§! £GFX_stability_texticon $stability$ will decrease £GFX_power_balance_texticon §YPublic Trust§!. \n  - $losing_soverignty_threatened_tt$"
 FIN_personal_agenda_annala_tt: "§GStrong Nation§!: Having more than §Y300.000§! £GFX_manpower_texticon  $MANPOWER$ in the field and less than §Y5%§! Surrender Progress while at war will increase £GFX_power_balance_texticon §YPublic Trust§!. \n  - §RConcerning Support for Socialists§!: Having more than §Y9%§! support for $democratic$ or $communism$ ideologies will decrease £GFX_power_balance_texticon §YPublic Trust§!. \n  - $losing_soverignty_threatened_tt$"
 FIN_personal_agenda_tanner_tt: "§GUnited Nation§!: Controlling §YKarjala§! and every owned state while having more than §Y95%§! support for $democratic$ ideology will increase £GFX_power_balance_texticon §YPublic Trust§!. \n  - §RConcerning Support for Extremists§!: Having more than §Y9%§! support for $fascism$ or $communism$ ideologies will decrease £GFX_power_balance_texticon §YPublic Trust§!. \n  - $losing_soverignty_threatened_tt$"
 FIN_personal_agenda_aaltonen_tt: "§GAnti-Fascist Crusade§!: Having a contribution of more than §Y10%§! War Participation in all active wars and less than §Y5%§! Surrender Progress while being at war against a Fascist country will increase £GFX_power_balance_texticon §YPublic Trust§!. \n  - §RDivided Proletariat§!: Having less than §Y80%§! support for $communism$ ideology will decrease £GFX_power_balance_texticon §YPublic Trust§!. \n  - $losing_soverignty_threatened_tt$"
 FIN_personal_agenda_leino_tt: "§GObliteraded European Fascism§!: Having less than §Y1%§! support for $fascism$ ideology while keeping Europe free of Fascist governments will increase £GFX_power_balance_texticon §YPublic Trust§!. \n  - §RDivided Proletariat§!: Having less than §Y80%§! support for $communism$ ideology will decrease £GFX_power_balance_texticon §YPublic Trust§!. \n  - $losing_soverignty_threatened_tt$"
 FIN_personal_agenda_kuusinen_tt: "§GA Solar System of Organizations§!: Having all §YScandinavian§! and §YBaltic core states§! controlled by Finland or an ally will increase £GFX_power_balance_texticon §YPublic Trust§!. \n  - §RForgotten Finno-Karelians§!: Not controlling the states of §YKarjala§!, §YKola§!, §YOnega§! and §YOlonets§! will decrease £GFX_power_balance_texticon §YPublic Trust§!. \n  - $losing_soverignty_threatened_tt$"
 FIN_personal_agenda_von_hesse_tt: "§GDream of Greater Finland§!: Occupying Finnish core states owned by an enemy will increase £GFX_power_balance_texticon §YPublic Trust§!. \n  - §RConcerning Support for Socialists§!: Having more than §Y9%§! support for $democratic$ or $communism$ ideologies will decrease £GFX_power_balance_texticon §YPublic Trust§!. \n  - $losing_soverignty_threatened_tt$"
