l_german:

Entente_cordiale_tt:0 "§Ihr Kolonialgebiet wird von der zweiten Partei anerkannt§!"
rondncnews.1.title:0 "Anführer der Mat-Salleh-Rebellion wird in Tambunan erschossen."
rondncnews.1.desc:0 "Datu Muhammad, der Anführer des Salleh-Aufstands in Malaysia, wurde heute erschossen. Die Regierung Nordborneos bestätigte, dass er am Abend in Tambunan erschossen wurde. Die britische Regierung lehnte eine Stellungnahme ab. Dies wird die Legitimität des Aufstands gefährden und die britische Herrschaft stärken."
rondncnews.1.a:0 "Ist dies das Ende des Aufstands?"
rondncnews.2.title:0 "Britische Truppen marschieren in den Oranje-Freistaat ein."
rondncnews.2.desc:0 "Heute sind über 20.000 britische Soldaten in den Oranje-Freistaat einmarschiert, um die Burenrepubliken in britisches Territorium einzugliedern. Berichten zufolge leisteten die Buren erbitterten Widerstand gegen die britische Herrschaft, töteten rund 279 britische Soldaten und verwundeten 874 Mann. Es wird jedoch erwartet, dass der Widerstand nachlässt und die Briten zum Sieg drängen."
rondncnews.2.a:0 "Das Imperium wächst"
rondncnews.3.title:0 "Die Ankunft einer russischen Marineflotte in Korea sorgt für Spannungen"
rondncnews.3.desc:0 "Die Ankunft einer russischen Flotte in Korea bereitet der kaiserlich-japanischen Regierung Sorgen. Dies hat die Spannungen in der Region deutlich verschärft und die Frage aufgeworfen, welche Nation die Kontrolle über die koreanische Region übernehmen wird."
rondncnews.3.a:0 "Wird dies zu Konflikten führen?"
rondncnews.4.title:0 "Prinz von Wales erschossen!"
rondncnews.4.desc:0 "Heute haben wir düstere Nachrichten aus England: Der Prinz der Wale wurde während eines Besuchs in Belgien beinahe von einem Anarchisten erschossen. Er wird voraussichtlich überleben und der Schütze wurde festgenommen. Der Schütze ist als Sipido bekannt. Er behauptet, er habe aufgrund der Todesfälle während des Boxerkriegs auf ihn geschossen und er machte den Prinzen für den Tod von Millionen von Menschen verantwortlich."
rondncnews.4.a:0 "Die Welt trauert"
rondncnews.5.title:0 "Europäisches Massaker"
rondncnews.5.desc:0 "Heute wurden in Europa Bürger, darunter der deutsche Botschafter, von Boxer-Rebellen ermordet. Es war ein großer Sieg für die Boxer. Sie töteten Tausende von Männern, darunter auch den deutschen Botschafter in China. Es war heute ein großer Sieg für die Boxer, aber wird ihr Sieg ewig währen?"
rondncnews.5.a:0 "Wie unmenschlich"
rondncnews.6.title:0 "König Umberto I. von Italien wird ermordet"
rondncnews.6.desc:0 "Heute war ein düsterer Tag für Italien: Der italienische König wurde vom Anarchisten Gaetano Bresc viermal angeschossen und kurz darauf tot aufgefunden. Sein Motiv soll Rache für die Opfer der Mai-Unruhen 1898 in Mailand gewesen sein. Er wird in Untersuchungshaft genommen und zu einem späteren Zeitpunkt vor Gericht gestellt. Die Beerdigung des Königs ist für den 9. August 1900 geplant."
rondncnews.6.a:0 "Ein weiterer König liegt zur Ruhe"
rondncnews.7.title:0 "Amerikaner erleiden zwei schwere Niederlagen"
rondncnews.7.desc:0 "Amerika hat im Philippinisch-Amerikanischen Krieg zwei Niederlagen erlitten: die Schlachten von Pulang Lupa und Mabitac. Dies hat die interne Unterstützung Amerikas für den Krieg deutlich beeinträchtigt. Während General Juán Cailles jedoch seinen Sieg feiert, fragt sich die Welt, ob diese Niederlagen einen Wendepunkt für den Krieg darstellen oder ob diese Vizekönige nur ein Fehler waren."
rondncnews.7.a:0 "Ist dies das Ende des kolonialen Amerikas?"
rondncnews.8.title:0 "Kleinere Inseln, die vom Vereinigten Königreich annektiert wurden"
rondncnews.8.desc:0 "In zwei großen politischen Erfolgen expandierte das britische Empire mit der kürzlich erfolgten Annexion der afrikanischen Grafschaft Transvaal und der Crooked Islands. Sein Imperium wächst stetig. Manche fragen sich, ob das britische Empire jemals untergehen wird und wie groß der Einflussbereich des Vereinigten Königreichs mit seiner Kolonialpolitik werden wird. Im Moment dreht sich die Welt weiter, während das britische Empire expandiert."
rondncnews.8.a:0 "Die Sonne geht nie unter..."
rondncnews.9.title:0 "Die Geburt der Quantenphysik"
rondncnews.9.desc:0 "Max Planck verkündet die Entdeckung des Schwarzkörperemissionsgesetzes und markiert damit die Geburtsstunde der Quantenphysik. Damit revolutionierte er das menschliche Verständnis atomarer und subatomarer Prozesse. Max Planck wird als einer der Begründer der Quantenphysik in Erinnerung bleiben."
rondncnews.9.a:0 "Großartig"
rondncnews.10.title:0 "Der Gold Standard Act wird ratifiziert"
rondncnews.10.desc:0 "In den USA wurde der Goldstandard Act verabschiedet, der den Goldstandard in den USA einführt. Ob sich dies positiv oder negativ auf die amerikanische Wirtschaft auswirken wird, wird sich in den kommenden Jahren zeigen. Der Status des US-Dollars ist jedoch nach der Verabschiedung des Gesetzes noch ungewiss, da manche Menschen nur Goldscheine, andere Papiergeld verwenden. Wird dies die letzte Währungsumstellung in Amerika sein oder werden die Debatten weitergehen und zu einer erneuten Währungsumstellung führen?"
rondncnews.10.a:0 "Ist es echtes Gold oder nur Katzengold?"
rondncnews.11.title:0 "Chi-hsui und Hsu-cheng-yu werden hingerichtet"
rondncnews.11.desc:0 "Die Anführer des Boxeraufstands, Chi-hsui und Hsu-cheng-yu, wurden heute in Peking hingerichtet. Dies war ein wichtiger Sieg für die Acht-Nationen-Allianz. Es scheint, als hätten wir einen Wendepunkt für diesen Aufstand erreicht und könnten bald einen totalen Sieg Chinas erleben. Die Allianz muss jedoch bis zum totalen Sieg weitermachen, da die Rebellen noch viele Festungen halten und der Krieg noch lange nicht vorbei ist."
rondncnews.11.a:0 "Die Rebellion wird beendet"
rondncnews.12.title:0 "Erdbeben im Schwarzen Meer"
rondncnews.12.desc:0 "Vor der Nordostküste Bulgariens ereignete sich ein Erdbeben im Schwarzen Meer mit einer maximalen Intensität von X. Das Erdbeben löste einen Tsunami aus, der die Provinz Dobritsch vollständig zerstörte. Dies war das mit Abstand stärkste Erdbeben im Schwarzen Meer, das je gemessen wurde. Viele Häuser und Fabriken in Küstennähe wurden vollständig zerstört."
rondncnews.12.a:0 "Wird Bulgarien in Ordnung sein?"
rondncnews.13.title:0 "In Budapest kommt es zu antijüdischen Ausschreitungen."
rondncnews.13.desc:0 "Heute fand in der ungarischen Hauptstadt eine massive antijüdische Kundgebung statt, die in der jüdischen Gemeinde Angst auslöste. Es besteht die Befürchtung, dass sich die Proteste auf die jüdische Gemeinde in Europa ausweiten könnten. Antisemitisches Gedankengut breitet sich weiterhin in ganz Europa aus, während die jüdische Gemeinde in den meisten Teilen Europas weiterhin unterdrückt wird."
rondncnews.13.a:0 "Verabscheuungswürdig"
rondncnews.14.title:0 "Der große Brand von 1901"
rondncnews.14.desc:0 "In Jacksonville ist ein Großbrand ausgebrochen. Sollte er unbekämpft bleiben, wird er voraussichtlich über zehntausend Gebäude zerstören und die amerikanische Wirtschaft erheblich schädigen. Dies könnte eine der schlimmsten Katastrophen in der Geschichte Amerikas werden. Während das Feuer noch wütet, hat Floridas Gouverneur William S. Jennings das Kriegsrecht über Jacksonville verhängt und mehrere Einheiten der Staatsmiliz zur Brandbekämpfung entsandt."
rondncnews.14.a:0 "Wie wird die Regierung damit umgehen?"
rondncnews.15.title:0 "Panik von 1901"
rondncnews.15.desc:0 "Der US-Aktienmarkt erlebte einen starken Rückgang bei den wichtigsten Aktien, andere Aktien scheinen sich jedoch gut zu entwickeln. Dieser starke Rückgang hat die Karrieren Tausender Kleinanleger ruiniert. Auslöser dieser Panik waren Streitigkeiten zwischen E. H. Harriman, Jacob Schiff und J. P. Morgan um die Northern Pacific Railway. Betroffen waren unter anderem Aktien von St. Paul, Union Pacific, Missouri Pacific, Amalgamated Copper, Sugar, Atchison und United States Steel. Allerdings beendeten nicht alle Aktien den Tag mit einem schlechten Ergebnis. Northern Pacific konnte einen Rückgang nicht nur vermeiden, sondern verzeichnete sogar einen Nettogewinn von 16 %. Dies hat die Fragilität und Schwäche von Monopolen in der amerikanischen Wirtschaft gezeigt. Nur die Zukunft wird zeigen, wie Amerika reagieren wird."
rondncnews.15.a:0 "Wir sollten das nächste Mal vorsichtiger sein"
rondncnews.16.title:0 "Völkermord in Südafrika"
rondncnews.16.desc:0 "Die Menschenrechtsaktivistin Emily Hobhouse hat heute ihren Bericht über einen Völkermord veröffentlicht. Dieser Völkermord ereignete sich in 45 britischen Konzentrationslagern für Burenfrauen und -kinder in Südafrika. Innerhalb von 18 Monaten starben dort 26.370 Menschen, darunter 24.000 Kinder unter 16 Jahren. Hobhouse erklärte, ihre Ergebnisse seien möglicherweise zu niedrig angesetzt und es gebe noch weitere zu entdecken."
rondncnews.16.a:0 "Wann wird es enden"
rondncnews.17.title:0 "Booker T. Washington im Weißen Haus."
rondncnews.17.desc:0 "Der afroamerikanische Bürgerrechtler Booker T. Washington wurde heute ins Weiße Haus eingeladen. In der Hoffnung, die Rassenspannungen in Amerika abzubauen und die Beziehungen zwischen den Rassen zu verbessern, lud der US-Präsident Brooker T. Washington ins Weiße Haus ein. Die Einladung stieß in vielen Nordstaaten auf positive Resonanz, während es im Süden zu zahlreichen Unruhen und einer Zunahme rassistisch motivierter Gewalt kam."
rondncnews.17.a:0 "Werden dadurch die Bürgerrechte verbessert?"
rondncnews.18.title:0 "Zugunglück fordert viele Todesopfer!"
rondncnews.18.desc:0 "Heute kam es in New York City zu einem massiven Zugunfall, bei dem 17 Menschen starben und 38 verletzt wurden. Dies löste heftige Reaktionen der Eisenbahnindustrie aus und forderte Dampflokomotiven in New York City im Rahmen einer Bewegung zur Modernisierung der Eisenbahnindustrie. Die Schäden an den Insassen des hinteren Zuges und der vorderen Waggons des Danbury-Zuges waren größtenteils auf Schrecken zurückzuführen."
rondncnews.18.a:0 "Ein weiterer Tag in New York"
rondncnews.19.title:0 "Forderungen nach allgemeinem Wahlrecht in Belgien"
rondncnews.19.desc:0 "In Belgien kam es heute zu zahlreichen körperlichen Auseinandersetzungen zwischen Polizei und Befürwortern des allgemeinen Wahlrechts. Sollten diese Proteste erfolgreich sein, könnten sie einen großen Fortschritt für das Wahlrecht in Belgien bedeuten. Da nicht ganz Belgien das allgemeine Wahlrecht unterstützt, wartet die Welt darauf, ob diese Proteste erfolgreich sein werden und ob die Regierung ihnen zuhört."
rondncnews.19.a:0 "Den USA nacheifern?"
rondncnews.20.title:0 "Zusammenstöße zwischen Polizei und georgischen Arbeitern"
rondncnews.20.desc:0 "Der Sozialrevolutionär Josef Stalin hat heute in Georgien einen Protest/Aufstand angeführt, bei dem 15 Menschen starben, 54 verletzt und 500 Menschen inhaftiert wurden. Dieser gewalttätige Zusammenstoß stieß auf heftigen Widerstand der georgischen Bevölkerung. Nach den darauffolgenden Tagen und den Verhaftungen scheint sich die Lage beruhigt zu haben, doch die Welt bleibt unruhig, da eine neue Ideologie die Welt erobert."
rondncnews.20.a:0 "Wir werden nichts mehr von ihm hören"
rondncnews.21.title:0 "Der Vertrag von Vereeniging wurde unterzeichnet."
rondncnews.21.desc:0 "Heute endete der Burenkrieg mit dem Vertrag von Vereeniging. Der unterzeichnete Vertrag enthält 12 Bedingungen: 1. Alle Burenkämpfer beider Republiken mussten sich ergeben. 2. Alle Kämpfer wurden entwaffnet. 3. Jeder musste der Krone die Treue schwören. 4. Es wurden keine Todesstrafen verhängt. 5. Es galt eine Generalamnestie. 6. In Schulen und Gerichten wurde die Verwendung des Niederländischen erlaubt. 7. Transvaal und dem Oranje-Freistaat wurde schließlich die Selbstverwaltung gewährt. 8. Diskussionen über das Wahlrecht der Ureinwohner sollten vermieden werden, bis ihnen die Selbstverwaltung gewährt worden war. 9. Den Buren wurden 3.000.000 Pfund Wiederaufbauhilfe gezahlt. 10. Die Eigentumsrechte der Buren wurden respektiert. 11. Es wurden keine Grundsteuern eingeführt. 12. Registrierte private Waffen wären erlaubt\n\n\n\nDie Regierungen des Oranje-Freistaats empfinden diese Bedingungen als etwas hart, aber in Zeiten der Taubheit haben sie keine andere Wahl, als zu unterschreiben."
rondncnews.21.a:0 "Ein weiteres Imperium bricht zusammen"
rondncnews.22.title:0 "Großes Erdbeben in Guatemala"
rondncnews.22.desc:0 "Heute erschütterte ein schweres Erdbeben in Mittelamerika Guatemala und tötete über 800 Menschen. Dies geschah nach einem ungewöhnlichen Ereignis mit heftigen Regenfällen, Blitzen und Donner. Die Regierung bezeichnete dies als Krise, da Guatemala-Stadt schlagartig überflutet wurde, nachdem sich in den Straßen riesige Lücken auftaten, Wasserleitungen platzten und Hütten sowie Kathedralen einstürzten. Hunderte Menschen wurden dabei begraben. Innerhalb nur einer Stunde wurden rund 80.000 Menschen obdachlos. Die Hauptstadt liegt in Trümmern, und es ist ungewiss, wie lange der Wiederaufbau dauern wird."
rondncnews.22.a:0 "Kann sich Mittelamerika davon erholen?"
rondncnews.23.title:0 "Philippinisch-Amerikanischer Krieg endet"
rondncnews.23.desc:0 "Der Philippinisch-Amerikanische Krieg endete mit dem Sieg Amerikas und der vollständigen Annexion der Philippinen. Amerika hat damit begonnen, den Rebellenaufstand im Land niederzuschlagen. Es ist nicht abzusehen, wann die Unruhen auf den Philippinen enden werden, aber Amerika wird sein Bestes tun, um den Aufstand niederzuschlagen."
rondncnews.23.a:0 "Amerika bekräftigt seine Ansprüche"
rondncnews.24.title:0 "Beginn der venezolanischen Krise"
rondncnews.24.desc:0 "Großbritannien, Deutschland und Italien haben eine Seeblockade gegen Venezuela verhängt, um die Eintreibung der dort angehäuften Schulden zu erzwingen. Dies führte zur Entwicklung des Roosevelt-Korollars, einer Ergänzung der Monroe-Doktrin. Roosevelt versprach, Venezuela zu schützen und hofft, die Krise friedlich zu beenden."
rondncnews.24.a:0 "Wird Amerika andere Länder schützen?"
rondncnews.25.title:0 "Fortschritt in der Telekommunikation!"
rondncnews.25.desc:0 "Heute ist ein großer Tag für die Kommunikation auf der ganzen Welt. Wir müssen nicht länger lokale Radiosender hören, denn heute wurde der erste transatlantische West-Ost-Radiosender ausgestrahlt und gelangte von den Vereinigten Staaten nach England."
rondncnews.25.a:0 "Tolle Neuigkeiten!"
rondncnews.26.title:0 "Edward VII. wird zum Kaiser von Indien ernannt."
rondncnews.26.desc:0 "In einem großen Sieg für das Vereinigte Königreich hat sich Indien ihnen schließlich unterworfen und heute Prinz Edward VII. zum Kaiser von Indien ausgerufen. Damit behält Großbritannien seine große Kolonie. Edward ist derzeit der älteste Sohn von Königin Victoria und hat seine Herrschaft nach dem Tod von Königin Victoria angetreten."
rondncnews.26.a:0 "Die Krone verstärkt ihren Halt"
rondncnews.27.title:0 "Kuba pachtet Guantánamo Bay"
rondncnews.27.desc:0 "Kuba hat heute die Guantánamo-Bucht an die USA gepachtet. Dies geschah im Rahmen des Unabhängigkeitsabkommens und des Platt Amendments, das die kubanische Regierung verpflichtete, bestimmte Gebiete an die USA zu verpachten oder zu verkaufen. Es ist daher unklar, wann die kubanische Regierung die Bucht zurückerhalten wird. Da das Abkommen unbefristet ist, ist es fraglich, ob die USA überhaupt eine Rückgabe in Erwägung ziehen werden. Derzeit zahlen die USA weiterhin Pachtzahlungen an Kuba."
rondncnews.27.a:0 "Wie lange ist „auf ewig“?"
rondncnews.28.title:0 "Baubeginn der Konstantinopel-Bagdad-Eisenbahn."
rondncnews.28.desc:0 "In einer gemeinsamen Erklärung haben sich das Deutsche und das Osmanische Reich heute auf den Bau einer Eisenbahnstrecke zwischen Konstantinopel und Bagdad geeinigt. Dies wird die deutsch-osmanischen Beziehungen deutlich stärken und die Handelsrouten zwischen ihnen verbessern."
rondncnews.28.a:0 "Je einfacher man sich fortbewegt, desto besser"
rondncnews.29.title:0 "Beginn des Pogroms in Kischinew"
rondncnews.29.desc:0 "Am Ostersonntag begann in Kischinau, der Hauptstadt des Gouvernements Bessarabien, eine Reihe antijüdischer Proteste. Bei den Protesten wurden mindestens 47 Juden getötet und zahlreiche weitere verletzt. Die Demonstranten unterstützten die Idee der Ritualmordlegende, also den Mythos, dass Juden christliche Kinder ermordeten, um ihr Blut für religiöse Rituale zu verwenden. Bis zum dritten Tag der Zerstörung unternahm die Polizei keine Versuche, die Demonstranten aufzuhalten."
rondncnews.29.a:0 "Warum müssen die Juden leiden?"
rondncnews.30.title:0 "Die Briten übernehmen das Fulani-Reich"
rondncnews.30.desc:0 "Heute hat das britische Empire erfolgreich den einheimischen Stamm der Sokoto erobert und annektiert. Der Stamm ist nun vollständig dem Vereinigten Königreich angeschlossen, und ein weiteres Land fällt an das Empire. Viele Menschen fragen sich, wie weit die Briten noch gehen und wie viel Territorium sie erobern werden, bevor sie aufgeben. Im Moment scheint es, als müsse die Welt abwarten, ob die Sonne über dem britischen Empire scheint."
rondncnews.30.a:0 "wenn es nicht die Briten gewesen wären, wäre es jemand anderes gewesen."
rondncnews.31.title:0 "Papst Pius X. folgt Papst Leo XIII. als 257. Papst nach."
rondncnews.31.desc:0 "Heute wird ein neuer Papst ernannt. Da Christen weltweit zölibatär leben, wird erwartet, dass dieser Papst antimodernistisch und traditionalistisch ist. Mit einem neuen Papst fragt sich die Welt, wie der neue Papst auf die Situation in der Welt reagieren wird und wie der Papst darauf reagieren wird."
rondncnews.31.a:0 "Der Papst wird gekrönt!"
rondncnews.32.title:0 "Spaltung der russischen Partei"
rondncnews.32.desc:0 "Heute hat sich die Sozialdemokratische Arbeiterpartei Russlands in zwei Gruppen gespalten, die das russische Land noch stärker spalten. Die beiden Fraktionen bestehen aus den Bolschewiki (die Mehrheit im Russischen) und den Menschewiki (die Minderheit im Russischen). Dies schwächt Russland weiter und spaltet es politisch. Die russische Regierung und der Zar sind jedoch Berichten zufolge froh über die Spaltung, da sie die linksradikalen Parteien in Russland schwächt."
rondncnews.32.a:0 "Ist dies das Ende des Sozialismus?"
rondncnews.33.title:0 "Fluggerät"
rondncnews.33.desc:0 "Gute Nachrichten für die Luftfahrt: Zwei amerikanische Luftfahrtpioniere haben heute den ersten kontrollierten, anhaltenden Flug eines motorisierten, schwereren Flugzeugs namens Wright Flyer erfunden. Dies war ein außergewöhnlicher Fortschritt für die Luftfahrt, und es scheint, als würden sich die Ideen weiterhin weltweit verbreiten. Während Amerika seine Position im technologischen Fortschritt festigt, scheint uns eine neue Art des Reisens bevorzustehen."
rondncnews.33.a:0 "Wird dies in der Kriegsführung eingesetzt?"
rondncnews.34.title:0 "Ein überraschender japanischer Marineangriff auf Port Arthur!"
rondncnews.34.desc:0 "Japan hat unerwartet und ohne Krieg den russischen Hafen von Port Arthur angegriffen! Der Angriff ereignete sich um 22:30 Uhr (GMT+9), als ein Angriffsgeschwader aus 10 japanischen Zerstörern auf patrouillierende russische Zerstörer traf und einen Torpedoangriff gegen die Russen startete. Dies führte zu noch höheren Spannungen innerhalb Russlands und einer formellen Kriegserklärung Russlands an Japan, was den Russisch-Japanischen Krieg auslöste!"
rondncnews.34.a:0 "Können die Japaner eine Nation schlagen, die zehnmal größer ist als sie?"
rondncnews.35.title:0 "Britische Expedition nach Tibet – Britischer Sieg"
rondncnews.35.desc:0 "Heute prangte der Union Jack siegreich über der tibetischen Nation, da sie den Krieg erfolgreich gewonnen und die Beziehungen zu Tibet wiederhergestellt hat und mit der tibetischen Regierung zusammenarbeiten wird, um den Streit um die Grenze zwischen Tibet und Sikkim zu lösen."
rondncnews.35.a:0 "Was ist der Sinn einer Invasion ohne Gebietseroberung?"
rondncnews.36.title:0 "Russischer Sieg auf See"
rondncnews.36.desc:0 "Heute gibt es großartige Neuigkeiten für das Russische Reich! Der russische Minenleger Amur legt etwa 24 Kilometer vor Port Arthur ein Minenfeld und versenkt das japanische Schlachtschiff Hatsuse. Dabei sterben etwa 500 Menschen an Bord. Russland beansprucht den Sieg für sich, doch die Schlacht ist noch nicht vorbei. Während die beiden Nationen um die Macht kämpfen, schaut die Welt zu."
rondncnews.36.a:0 "Können die Japaner durchhalten?"
rondncnews.37.title:0 "Finnischer Nationalist ermordet Nikolai Bobrikov"
rondncnews.37.desc:0 "In einem Akt finnischen Nationalismus wurde heute der russische Generalgouverneur von Finnland durch einen Selbstmordanschlag ermordet. Er ist tödlich verwundet und wird voraussichtlich nicht überleben, da er bereits dreimal angeschossen wurde. Der Mörder wurde tot am Tatort aufgefunden, nachdem er sich selbst zweimal erschossen hatte. Der heutige Tag markiert einen dunklen Tag für Russlands Einfluss weltweit."
rondncnews.37.a:0 "Wird Russland fallen?"
rondncnews.38.title:0 "Vorfall auf der Doggerbank"
rondncnews.38.desc:0 "Die russische Ostseeflotte hat ein britisches Passagierschiff beschossen, das sie für ein japanisches Torpedoboot hielt. Es wird erwartet, dass Großbritannien reagiert, aber es ist unklar, wie aggressiv es sein wird. Wird Großbritannien im weiteren Verlauf des Krieges den Konflikt beenden und den Japanern helfen oder wird es sich zurückhalten und die aufgehende Sonne aufgehen lassen?"
rondncnews.38.a:0 "Das Blatt wendet sich ..."
rondncnews.39.title:0 "Unruhen in Russland"
rondncnews.39.desc:0 "Heute erreichten uns aus dem Kreml schockierende Nachrichten: Friedliche Demonstranten in Riga, Gouvernement Livland, wurden brutal erschossen. Berichten zufolge wurden 73 Menschen getötet, 200 verletzt. Angesichts der mangelnden Industrialisierung Russlands fordern die Menschen offenbar immer mehr Veränderungen. Die Welt ist schockiert, da Russland von Tag zu Tag instabiler zu werden scheint."
rondncnews.39.a:0 "Was ist mit dem Krieg?"
rondncnews.40.title:0 "Massaker am Blutsonntag"
rondncnews.40.desc:0 "Russland hat seine Stärke und seinen Unwillen demonstriert, den Forderungen der Bevölkerung nachzukommen. Rund um Sankt Petersburg sind Schüsse zu hören. Berichten zufolge wurden über tausend Demonstranten angeschossen oder verletzt, über sechstausend verhaftet. Dieses Ereignis wird das ohnehin instabile russische Imperium mit Sicherheit noch weiter ins Chaos stürzen. Während der Anführer der Proteste, der Priester Georgi Gapon, tot ist, kann die Welt nur zusehen, wie Russland seine eiserne Faust gegen sein Volk richtet."
rondncnews.40.a:0 "Wird dies zu einer Revolte führen?"
rondncnews.41.title:0 "Zar Nikolaus II. von Russland stimmt der Schaffung einer gewählten Versammlung zu"
rondncnews.41.desc:0 "Der russische Zar hat sich heute bereit erklärt, den Forderungen der Demonstranten nachzukommen. Die Regierung zeigte sich heute schwach und musste sich dem Volk beugen. Auf Kosten vieler unschuldiger Menschenleben hat sie sich endlich bereit erklärt, den Menschen grundlegende bürgerliche Freiheiten zu gewähren. Eine der Forderungen, die erfüllt wurde, war die Einführung der Durma, eines Wahlsystems mit Gesetzgebungs- und Kontrollbefugnissen. Da der Zar jedoch um seine absolute Macht kämpft, ist unklar, wie lange diese anhalten wird."
rondncnews.41.a:0 "Wird dies Russland Stabilität bringen?"
rondncnews.42.title:0 "Wilhelm II., deutscher Kaiser, behauptet die Gleichberechtigung Deutschlands mit Frankreich in Marokko"
rondncnews.42.desc:0 "Heute hat der deutsche Kaiser seinen Anspruch auf die Teilung Marokkos mit Frankreich geltend gemacht und damit die erste Marokkokrise ausgelöst. Deutschland stellt Frankreichs Einfluss auf die Herrschaft in Frage. Ob diese Krise zu einem Krieg führen wird, ist noch ungewiss. Sicher ist jedoch, dass sie die Beziehungen Deutschlands zu Frankreich und Großbritannien verschlechtern wird."
rondncnews.42.a:0 "Wird das zu etwas Schlimmerem eskalieren?"
rondncnews.43.title:0 "Das norwegische Parlament erklärt die Auflösung der Union zwischen Norwegen und Schweden und gibt Norwegen die volle Unabhängigkeit"
rondncnews.43.desc:0 "Heute ist die Union zwischen Norwegen und Schweden zerbrochen, als das norwegische Parlament das Ende der Vereinigten Königreiche Schweden und Norwegen verkündete. Norwegen erlangt nun seine Unabhängigkeit von Schweden und ist nun auf sich allein gestellt. Nachdem König Oskar II. der Union auf seinen Anspruch auf den norwegischen Thron verzichtet hat, bereitet sich das norwegische Volk darauf vor, für sich selbst zu sorgen und seine neu gewonnene Freiheit zu feiern."
rondncnews.43.a:0 "Das Ende einer Gewerkschaft"
rondncnews.44.title:0 "Taft-Katsura-Abkommen"
rondncnews.44.desc:0 "Heute trafen sich die USA und Japan, um ihre jeweiligen Positionen zu Korea und den Philippinen zu besprechen. Drei Hauptziele verfolgten sie: Erstens die Wahrung des Friedens in Ostasien, zweitens eine friedliche Regierung der Philippinen und drittens die Fortsetzung der japanischen Kolonialisierung Koreas, um einen erneuten russisch-japanischen Krieg zu verhindern."
rondncnews.44.a:0 "Wird dies wirklich den Frieden im Pazifik bewahren?"
rondncnews.45.title:0 "Vertrag von Portsmouth"
rondncnews.45.desc:0 "Heute wird in New Hampshire ein von US-Präsident Theodore Roosevelt vermittelter Vertrag zwischen Japan und Russland unterzeichnet, der den Russisch-Japanischen Krieg beendet. Russland hat sich bereit erklärt, die Insel Sachalin sowie Hafen- und Eisenbahnrechte in der Mandschurei an Japan abzutreten. Insgesamt ist dies eine Blamage für Russland. Es wird sicherlich zu weiterer Instabilität und Chaos in seinem Reich führen, während Japans Zukunft rosig aussieht, während Russland im Schatten der aufgehenden Sonne liegt."
rondncnews.45.a:0 "Die Japaner haben eine Weltmacht besiegt"
rondncnews.46.title:0 "Die Kaiserlich Russische Armee eröffnet das Feuer auf eine Versammlung auf einem Straßenmarkt"
rondncnews.46.desc:0 "Heute ereignet sich im Russischen Reich erneut eine Tragödie: In Tallinn, Estland, eröffneten Truppen das Feuer auf eine Menschenmenge, wobei 94 Menschen getötet und über 200 verletzt wurden. Dies wird mit Sicherheit zu weiterem Chaos und Instabilität im Russischen Reich führen. Es scheint, dass, wenn dies im Russischen Reich so weitergeht, es mit Sicherheit instabil wird und durch eine Revolution zerstört wird."
rondncnews.46.a:0 "Es scheint, als ob Russland keine Pause machen kann"
rondncnews.47.title:0 "Der Japan-Korea-Vertrag von 1905"
rondncnews.47.desc:0 "Der japanisch-koreanische Vertrag von 1905 zeigt, dass Japan seinen Einfluss in Ostasien geltend gemacht hat. Es scheint, dass Japan in dieser Zeit zu einer Großmacht heranwachsen wird. Mit der Vertragsunterzeichnung wurde Korea faktisch zu einem Protektorat Japans und damit in dessen Einflussbereich gebracht."
rondncnews.47.a:0 "Japan könnte die nächste Großmacht sein"
rondncnews.48.title:0 "Aufstand der baltischen Regierung"
rondncnews.48.desc:0 "In den baltischen Gouvernements brennen und plündern Arbeiter und Bauern Hunderte deutschbaltische Herrenhäuser. Die russische Regierung hat versprochen, die Aufstände niederzuschlagen, die zu weiterer Instabilität in Russland führen. Ein Aufstand scheint nun unvermeidlich, und die russische Regierung muss sich auf das Schlimmste vorbereiten."
rondncnews.48.a:0 "Es war unvermeidlich"
rondncnews.49.title:0 "Moskauer Aufstand"
rondncnews.49.desc:0 "Endlich ist es soweit: Das Volk hat genug von der Zentralregierung und der Moskauer Aufstand hat begonnen. Die Revolutionäre haben sich in Moskau verbarrikadiert und stehen nun vor einer Konfrontation mit der kaiserlichen Regierung. Es wird erwartet, dass die kaiserliche Regierung den Aufstand niederschlägt. Dies wird jedoch die russische Regierung in Schwierigkeiten bringen, wenn sie nichts an der aktuellen Lage ändert. Die Aufwertungen könnten sich ausweiten und sich verschärfen, wenn keine Reformen durchgeführt werden."
rondncnews.49.a:0 "Kann Russland den Aufstand bewältigen oder wird es den Roten zum Opfer fallen?"
rondncnews.50.title:0 "Kiew inszeniert einen Massenaufstand"
rondncnews.50.desc:0 "Zur Unterstützung des gegenwärtigen Aufstands in Moskau hat der Rat der Arbeiterdeputierten von Kiew einen eigenen Aufstand begonnen. Es scheint, als würde das Chaos in Russland nicht so bald enden. Mit diesem Aufstand haben sie in der Stadt ihre eigene Nation namens Shuliavka Republik ausgerufen."
rondncnews.50.a:0 "Wird Russland weiter fallen?"
rondncnews.51.title:0 "Das Wettrüsten zur See zwischen Großbritannien und Deutschland beginnt"
rondncnews.51.desc:0 "Das Wettrüsten zwischen Großbritannien und Deutschland hat begonnen. Es begann mit dem Plan des deutschen Admirals Alfred von Tirpitz im Jahr 1897, eine Flotte zu schaffen, um Großbritannien zu diplomatischen Zugeständnissen zu zwingen. Tirpitz rechnete nicht damit, dass die Kaiserliche Marine die Royal Navy besiegen würde. #Beginn der Ereignisse von 1905"
rondncnews.51.a:0 "Verstanden"
rondncnews.52.title:0 "Russisches Reich verabschiedet Grundgesetze"
rondncnews.52.desc:0 "Die Gesetze verwandelten den ehemals absolutistischen Staat in einen Staat, in dem der Kaiser erstmals seine autokratische Macht mit einem Parlament teilte. Die neue Verfassung sah ein Zweikammerparlament vor, ohne dessen Zustimmung keine Gesetze in Russland erlassen werden durften. Diese Legislative bestand aus einem Oberhaus, dem Staatsrat, und einem Unterhaus, der Staatsduma. Die Hälfte der Mitglieder des Oberhauses wurde vom Zaren ernannt, die andere Hälfte von verschiedenen Regierungs-, Kirchen- und Wirtschaftsvertretern gewählt. Die Mitglieder des Unterhauses wurden von verschiedenen Klassen des russischen Volkes durch ein komplexes System indirekter Wahlen bestimmt – wobei das System so gewichtet war, dass die besitzenden Klassen letztlich die Oberhand behielten. Die Duma besaß zwar die Gesetzgebungsgewalt und das Recht, die Minister des Zaren zu befragen, hatte jedoch keine Kontrolle über deren Ernennung oder Entlassung, die allein dem Monarchen vorbehalten war. Auch konnte sie die Verfassung nur auf Initiative des Kaisers ändern. Der Zar behielt ein absolutes Vetorecht bei der Gesetzgebung und das Recht, die Duma jederzeit aus jedem ihm geeigneten Grund aufzulösen. Der Kaiser hatte auch das Recht, während der Abwesenheit der Duma Dekrete zu erlassen. Diese verloren jedoch ihre Gültigkeit, wenn sie nicht innerhalb von zwei Monaten vom neuen Parlament verabschiedet wurden."
rondncnews.52.a:0 "Gut für sie"
rondncnews.53.title:0 "Das erste U-Boot der Kaiserlichen Marine, U-1, wird vom Stapel gelassen."
rondncnews.53.desc:0 "Um das Wettrüsten zu verschärfen, wurde das deutsche U-Boot Typ U 1 als erstes U-Boot der Kaiserlichen Marine gebaut. Nur ein einziges Exemplar wurde gebaut. Die U-1 wurde von der Germaniawerft in Kiel gebaut."
rondncnews.53.a:0 "Das Wettrüsten eskaliert"
rondncnews.54.title:0 "Intervention der Vereinigten Staaten in Kuba"
rondncnews.54.desc:0 "Wieder einmal haben die Vereinigten Staaten Kuba besetzt. Kuba ist nun besetzt und die zweite Besetzung Kubas tritt in Kraft. Die Welt fragt sich, ob die Vereinigten Staaten noch mehr Territorium besetzen werden."
rondncnews.54.a:0 "Wird Kuba für immer in der Sphäre der Vereinigten Staaten bleiben?"
rondncnews.55.title:0 "Fredrik Wilhelm von Otter tritt wegen der Frage der Ausweitung des Wahlrechts als schwedischer Ministerpräsident zurück"
rondncnews.55.desc:0 "Der sympathische Premierminister ist wegen des umstrittenen Themas gleiches Wahlrecht zurückgetreten. Sein Nachfolger wurde der rechtsgerichtete Marineoffizier und Beamte Arvid Lindman. Es scheint, als würde das allgemeine Wahlrecht in Schweden nicht so bald in Kraft treten, und die Debatte tendiert zu einem eingeschränkten Wahlrecht."
rondncnews.55.a:0 "Verstanden"
rondncnews.56.title:0 "Dimitar Petkov wird ermordet!"
rondncnews.56.desc:0 "Heute wurde der bulgarische Premierminister Dimitar Petkow ermordet. Nach seinem Tod wurde Nikola Genadjew sein Nachfolger. Petkows Partei übernahm 1903 nach dem Rücktritt von Stojan Danew die Macht, doch Ferdinand I. von Bulgarien wählte anstelle von Petkow seinen engen Freund Racho Petrow, einen parteilosen Premierminister. Er wurde schließlich zum Premierminister ernannt und bleibt vorerst an der Macht."
rondncnews.56.a:0 "Wir wünschen ihm alles Gute"
rondncnews.57.title:0 "Beginn des rumänischen Bauernaufstands"
rondncnews.57.desc:0 "Der Aufstand begann auf den Ländereien des Pächters Mochi Fischer im Dorf Flămânzi, die von Trifan Roman Grosu, Ion Dolhescu und Grigore Roman verwaltet wurden, da Fischer sich weigerte, die Pachtverträge mit den örtlichen Bauern zu verlängern. Die österreichisch-jüdische Familie Fischer pachtete etwa 75 % des Ackerlandes in drei rumänischen Kreisen in Moldawien.\n\n\nDie Bauern fürchteten, ohne Arbeit und vor allem ohne Nahrung dazustehen, und begannen gewalttätig zu werden. Erschrocken floh Fischer zu einem Freund nach Cernăuți und ließ die Bauern ohne unterschriebene Verträge zurück. Die Angst, arbeitslos zu bleiben, zusammen mit den Aktivitäten mutmaßlicher österreichisch-ungarischer Anstifter, trieben die Bauern zum Aufstand. Der Aufstand breitete sich bald über weite Teile Moldawiens aus. Mehrere Grundbesitzergrundstücke wurden zerstört und viele Pächter getötet oder verletzt. Die konservative Regierung konnte die Situation nicht bewältigen und trat zurück. Die Liberalen unter Dimitrie Sturdza übernahmen die Macht.\n\n\n\nAm 18. März wurde der Ausnahmezustand ausgerufen und anschließend eine allgemeine Mobilmachung durchgeführt. Bis zum 29. März wurden 140.000 Soldaten rekrutiert. Die rumänische Armee begann auf die Bauern zu schießen. Tausende Bauern kamen ums Leben, über 10.000 wurden verhaftet."
rondncnews.57.a:0 "Wird dies das Ende des Österreich-Hunger sein?"
rondncnews.58.title:0 "Ein kommunistischer Raubüberfall?"
rondncnews.58.desc:0 "Heute greifen Bolschewisten in Georgien einen mit Bargeld gefüllten Bankbus im Zentrum von Tiflis an und töten 40 Menschen. Die Welt fragt sich, ob die kommunistischen Ideale jemals weltweit Fuß fassen und sich durchsetzen werden. Derzeit lauern die Kommunisten und verursachen Chaos in den ländlichen Regionen."
rondncnews.58.a:0 "Wir müssen die Bolschewiki stoppen"
rondncnews.59.title:0 "Der Japanisch-Korea-Vertrag von 1907 wurde unterzeichnet!"
rondncnews.59.desc:0 "Heute: Der Japan-Korea-Vertrag von 1907 wurde zwischen dem Kaiserreich Japan und dem Kaiserreich Korea geschlossen. Der Vertrag sah vor, dass Korea unter der Führung eines japanischen Generals agieren sollte. Die Vertragsbestimmungen führten dazu, dass die Verwaltung der inneren Angelegenheiten an Japan übertragen wurde."
rondncnews.59.a:0 "Japan übt seine Dominanz aus"
rondncnews.60.title:0 "Das Große Spiel wurde unterbrochen"
rondncnews.60.desc:0 "Heute haben Graf Alexander Iswolski und Sir Arthur Nicolson in Sankt Petersburg die Anglo-Russische Entente unterzeichnet. Dieses Abkommen erkannte die strikte Unabhängigkeit und Integrität des Landes an, teilte es jedoch in drei separate Zonen auf. Der gesamte Norden des Iran, der an Russlands Besitzungen in Transkaukasien und Zentralasien grenzte, wurde als exklusive Einflusssphäre für russische Interessen ausgewiesen. Die nördliche Zone begann im Westen bei Qasr-e Shirin an der Grenze zum Osmanischen Reich und verlief über Teheran, Isfahan und Yazd bis zur Ostgrenze, wo sich die Grenzen Afghanistans, des Irans und Russlands kreuzten."
rondncnews.60.a:0 "Wird es im Nahen Osten endlich Frieden und Stabilität geben?"
rondncnews.61.title:0 "Das Haager Übereinkommen wird überarbeitet"
rondncnews.61.desc:0 "Heute fand die zweite Haager Friedenskonferenz statt. Der Schwerpunkt der Konferenz lag verstärkt auf der Seekriegsführung. Die Briten versuchten, eine Rüstungsbegrenzung durchzusetzen, scheiterten jedoch an den anderen Mächten, allen voran Deutschland, das einen britischen Versuch befürchtete, das Wachstum der deutschen Flotte zu stoppen. Da Großbritannien über die größte Marine der Welt verfügte, würde eine Begrenzung der Flottenerweiterung diese beherrschende Stellung sichern. Deutschland lehnte zudem Vorschläge für obligatorische Schiedsverfahren ab. Die Konferenz erweiterte jedoch den Mechanismus für freiwillige Schiedsverfahren und verabschiedete Konventionen zur Regelung der Schuldeneintreibung, des Kriegsrechts sowie der Rechte und Pflichten Neutraler."
rondncnews.61.a:0 "Wird dies Frieden in Europa bringen?"
rondncnews.62.title:0 "Die amerikanische Great White Fleet verlässt New York"
rondncnews.62.desc:0 "Heute hat [USA.GetLeader] in einer Demonstration der amerikanischen Seemacht eine Flotte von Schlachtschiffen zur Umrundung der Welt beordert. Ziel ist es, bessere Beziehungen zu anderen Nationen aufzubauen und die amerikanische Seedominanz zu demonstrieren."
rondncnews.62.a:0 "sie setzen ihre Reise fort"
rondncnews.63.title:0 "Der König von Portugal wird in Lissabon erschossen."
rondncnews.63.desc:0 "Heute wurden der König und der Prinz von Portugal bei einem Vorfall erschossen, der als Königsmord von Lissabon bekannt ist. Der Zweck dieses Mordes war ideologisch und die Morde wurden durchgeführt, um die Blutlinie in der monarchischen Nachfolge zu sichern."
rondncnews.63.a:0 "Eine weitere Dynastie ist tot"
rondncnews.64.title:0 "Die japanische Auswanderung in die Vereinigten Staaten ist verboten"
rondncnews.64.desc:0 "Gemäß dem Gentlemen&#39;s Agreement von 1907 war es Japanern nicht mehr möglich, nach Amerika einzuwandern. Das Gentlemen&#39;s Agreement war ein informelles Abkommen zwischen den Vereinigten Staaten von Amerika und dem Kaiserreich Japan. Es sah vor, dass die Vereinigten Staaten der japanischen Einwanderung keine Beschränkungen auferlegten und Japan keine weitere Auswanderung in die Vereinigten Staaten zuließ. Ziel war es, die Spannungen zwischen den beiden pazifischen Nationen abzubauen."
rondncnews.64.a:0 "Vorerst kein japanisches Amerika mehr"
rondncnews.65.title:0 "Jungtürkische Revolution"
rondncnews.65.desc:0 "Major Ahmed Niyazi beginnt mit 200 Anhängern eine offene Revolution, indem er vom 3. Armeekorps in Mazedonien desertiert und ins Bergland zieht. Die osmanische Regierung verspricht, die Revolutionäre niederzuschlagen und Ordnung und Stabilität in die Region zu bringen, während die Rebellen versprechen, die Demokratie im Osmanischen Reich wiederherzustellen."
rondncnews.65.a:0 "Wird die Demokratie siegen?"
rondncnews.66.title:0 "Ultimatum der Jungtürkischen Revolution"
rondncnews.66.desc:0 "Das Komitee für Einheit und Fortschritt hat Sultan Abdul Hamid II. des Osmanischen Reiches ein formelles Ultimatum gestellt, die Verfassung von 1876 im Osmanischen Reich wiederherzustellen. Sollte er das Ultimatum ablehnen, werden sie zu den Waffen greifen und ihre Revolten beginnen."
rondncnews.66.a:0 "Wie wird die Regierung reagieren?"
rondncnews.67.title:0 "Die Bosnienkrise beginnt"
rondncnews.67.desc:0 "Nach der Annexion Bosniens und Herzegowinas durch Österreich-Ungarn kam es zu einer Krise. Einen Tag nachdem Bulgarien seine Unabhängigkeit vom Osmanischen Reich erklärt hatte, verkündete Kaiser Franz Joseph der Bevölkerung dieses osmanischen Gebiets seine Entschlossenheit, das Land anzuerkennen und ihm ein autonomes und verfassungsmäßiges Regime unter seiner Autorität als annektierender Souverän zu gewähren. Am darauffolgenden Tag verkündete Österreich-Ungarn seinen Rückzug aus dem Sandschak von Novi Pazar. Die bulgarische Unabhängigkeit und die bosnische Annexion waren nicht im Berliner Vertrag geregelt und lösten eine Flut diplomatischer Proteste und Diskussionen aus."
rondncnews.67.a:0 "Wird dies zu einem Krieg führen?"
rondncnews.68.title:0 "Kuba erlangt seine Unabhängigkeit"
rondncnews.68.desc:0 "Die letzten US-Truppen haben Kuba verlassen, nachdem sie seit dem Spanisch-Amerikanischen Krieg von 1898 dort stationiert waren. Kuba ist nun völlig unbesetzt und kann sich seinen eigenen Angelegenheiten widmen."
rondncnews.68.a:0 "gut für sie"
rondncnews.69.title:0 "Der Sultan des Osmanischen Reiches wird gestürzt"
rondncnews.69.desc:0 "Heute wird der Sultan des Osmanischen Reiches, Abdul Hamid II., gestürzt und sein Bruder Mehmed V. wird sein Nachfolger. Am nächsten Tag soll er zu seiner Beerdigung in die osmanische Hafenstadt Thessaloniki überführt werden."
rondncnews.69.a:0 "Ein weiterer Führer gestürzt"
rondncnews.70.title:0 "Tragische Woche"
rondncnews.70.desc:0 "In der spanischen Stadt Barcelona kam es zu gewaltsamen Auseinandersetzungen zwischen anarchistischen Sozialisten und Republikanern aus Barcelona. Ihr Ziel ist es, gegen den zweiten Rif-Krieg zu protestieren. Der Konflikt wurde als tragische Woche bezeichnet, da es viele Tote gab und der Konflikt voraussichtlich über eine Woche andauern wird, bis das Chaos nachlässt."
rondncnews.70.a:0 "Wird daraus etwas Größeres entstehen?"
rondncnews.71.title:0 "Japan baut seinen Einfluss in China aus"
rondncnews.71.desc:0 "Heute wurde nach angespannten Verhandlungen das Gando-Abkommen von Japan und China unterzeichnet, das Japan die Möglichkeit gibt, Eisenbahnkonzessionen in der Mandschurei zu erhalten. Da der koreanische Grenzstreit mit China und die große ethnische koreanische Bevölkerung in Gando in Nordostasien kein Geheimnis waren, ist es wahrscheinlich, dass die Japaner das Gando-Abkommen als potenzielle Drohung einsetzten, um weiterhin darauf zu drängen, Gando für Korea als Teil des japanischen Kaiserreichs zu beanspruchen, falls die im Abkommen aufgeführten Zugeständnisse Chinas an Japan nicht gewährt würden."
rondncnews.71.a:0 "Das Imperium wächst"
rondncnews.72.title:0 "In Nicaragua getötete Amerikaner"
rondncnews.72.desc:0 "In Nicaragua wurden 500 Revolutionäre, darunter zwei Amerikaner, auf Befehl des Diktators José Santos Zelaya hingerichtet. Es wird erwartet, dass die USA rasch reagieren werden, und es ist ungewiss, ob dies zu einem Krieg führen wird. Die Amerikaner sind empört über die Tatsache, dass ihre Bürger getötet wurden, und dies könnte zu etwas Schlimmerem führen. Die Welt wartet, während Amerika überlegt, was zu tun ist."
rondncnews.72.a:0 "Der Adler schwebt über seinem Land"
rondncnews.73.title:0 "Vertrag von Portsmouth"
rondncnews.73.desc:0 "Heute wird in New Hampshire ein von US-Präsident Theodore Roosevelt vermittelter Vertrag zwischen Japan und Russland unterzeichnet, der den Russisch-Japanischen Krieg beendet. Japan hat sich bereit erklärt, ganz Korea und die Hafenstadt Dailan an Russland abzutreten. Insgesamt ist dies eine Blamage für Japan. Es wird der Herrschaft des Zaren sicherlich Stabilität verleihen, während Russlands Zukunft rosig aussieht, während Japan im Schatten des russischen Bären steht."
rondncnews.73.a:0 "Die Japaner waren dumm"
